<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline Intel | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-cyan: #00E5FA; --deep-navy: #00050F; --success: #10B981; --warning: #F59E0B; --danger: #EF4444; }
        * { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
        .glass-nav { background: rgba(0, 5, 15, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0, 229, 250, 0.15); }
        .glass-card { background: rgba(0, 20, 40, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.2); border-radius: 12px; }
        .glass-column { background: rgba(0, 15, 30, 0.5); backdrop-filter: blur(8px); border: 1px solid rgba(0, 229, 250, 0.1); border-radius: 12px; }
        .glow-text { text-shadow: 0 0 20px rgba(0, 229, 250, 0.5); }
        .pipeline-card { transition: all 0.2s ease; cursor: grab; }
        .pipeline-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 229, 250, 0.15); }
        .pipeline-card:active { cursor: grabbing; }
        .drop-zone.drag-over { background: rgba(0, 229, 250, 0.1); border: 2px dashed rgba(0, 229, 250, 0.5); }
        .priority-p0 { background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%); }
        .priority-p1 { background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%); }
        .priority-p2 { background: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%); }
        .dafe-bar { height: 4px; border-radius: 2px; background: rgba(255,255,255,0.1); overflow: hidden; }
        .dafe-fill { height: 100%; border-radius: 2px; transition: width 0.3s ease; }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: rgba(0, 229, 250, 0.05); border-radius: 3px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(0, 229, 250, 0.2); border-radius: 3px; }
        .sam-button { background: linear-gradient(135deg, #00E5FA 0%, #0EA5E9 100%); }
        .sam-button:hover { box-shadow: 0 0 20px rgba(0, 229, 250, 0.4); }
        .range-slider { -webkit-appearance: none; background: transparent; width: 60px; }
        .range-slider::-webkit-slider-runnable-track { height: 6px; background: rgba(0, 229, 250, 0.2); border-radius: 3px; }
        .range-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #00E5FA; margin-top: -4px; cursor: pointer; }
        .why-this-tag { background: rgba(139, 92, 246, 0.2); border: 1px solid rgba(139, 92, 246, 0.3); }
    </style>
</head>
<body class="text-white">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Demo data with DAFE scores and Why This discriminators
        const initialProposals = [
            { id: 'prop-001', title: 'DHA MHS Genesis Phase 4', agency: 'DHA', value: 45000000, pWin: 78, priority: 'P-0', daysToSubmit: 12, stage: 'drafting', pm: 'Sarah Chen', shipleyGate: 'Red Team',
              dafe: { decision: 95, authority: 88, funding: 92, evaluation: 85 }, dafeScore: 90, whyThis: ['FedRAMP High', 'DoD Healthcare Exp', 'Incumbent Relationship'], samNumber: 'W81XWH-24-R-0042', naics: '541512', setAside: 'SDVOSB' },
            { id: 'prop-002', title: 'VA EHRM Sustainment', agency: 'VA', value: 28000000, pWin: 65, priority: 'P-1', daysToSubmit: 45, stage: 'capture', pm: 'Mike Torres', shipleyGate: 'Blue Team',
              dafe: { decision: 75, authority: 80, funding: 70, evaluation: 72 }, dafeScore: 74, whyThis: ['Cerner Experience', 'VA Past Performance'], samNumber: '36C10X24R0089', naics: '541519', setAside: '8(a)' },
            { id: 'prop-003', title: 'CDC Data Modernization', agency: 'CDC', value: 15000000, pWin: 45, priority: 'P-2', daysToSubmit: 90, stage: 'opportunity', pm: 'Lisa Park', shipleyGate: 'Gate 1',
              dafe: { decision: 55, authority: 60, funding: 50, evaluation: 58 }, dafeScore: 56, whyThis: ['Cloud Migration Exp'], samNumber: '75D30124R00156', naics: '518210', setAside: 'Small Business' },
            { id: 'prop-004', title: 'NIH Cloud Infrastructure', agency: 'NIH', value: 32000000, pWin: 82, priority: 'P-0', daysToSubmit: 5, stage: 'review', pm: 'James Wilson', shipleyGate: 'Gold Team',
              dafe: { decision: 92, authority: 95, funding: 88, evaluation: 90 }, dafeScore: 91, whyThis: ['AWS Gov Expertise', 'FISMA High', 'NIH OCIO Relationship'], samNumber: '75N95024R00234', naics: '541512', setAside: 'Full & Open' },
            { id: 'prop-005', title: 'CMS Medicare Portal', agency: 'CMS', value: 22000000, pWin: 55, priority: 'P-1', daysToSubmit: 30, stage: 'rfp-analysis', pm: 'Emily Davis', shipleyGate: 'Pink Team',
              dafe: { decision: 70, authority: 65, funding: 75, evaluation: 68 }, dafeScore: 70, whyThis: ['508 Compliance', 'Healthcare.gov Exp'], samNumber: '75FCMC24R0067', naics: '541511', setAside: 'WOSB' },
            { id: 'prop-006', title: 'FDA Drug Safety Platform', agency: 'FDA', value: 18000000, pWin: 72, priority: 'P-1', daysToSubmit: 0, stage: 'submitted', pm: 'Robert Kim', shipleyGate: 'White Glove',
              dafe: { decision: 85, authority: 82, funding: 78, evaluation: 80 }, dafeScore: 81, whyThis: ['Pharma Domain', 'FDA CDER Experience'], samNumber: '75F40124R00089', naics: '541512', setAside: 'HUBZone' },
            { id: 'prop-007', title: 'SAMHSA Telehealth Grants', agency: 'SAMHSA', value: 8500000, pWin: 88, priority: 'P-1', daysToSubmit: -30, stage: 'won', pm: 'Anna Martinez', shipleyGate: 'Complete',
              dafe: { decision: 98, authority: 95, funding: 92, evaluation: 94 }, dafeScore: 95, whyThis: ['Telehealth Pioneer', 'Behavioral Health'], samNumber: '75S20424R00012', naics: '541611', setAside: 'SDVOSB' },
            { id: 'prop-008', title: 'IHS EHR Upgrade', agency: 'IHS', value: 12000000, pWin: 35, priority: 'P-2', daysToSubmit: -15, stage: 'lost', pm: 'David Brown', shipleyGate: 'Complete',
              dafe: { decision: 40, authority: 45, funding: 35, evaluation: 42 }, dafeScore: 41, whyThis: ['Tribal Healthcare'], samNumber: '75H71024R00034', naics: '541512', setAside: 'Indian SB' }
        ];

        const stages = [
            { id: 'opportunity', name: 'Opportunity', icon: '🎯', color: '#6366F1' },
            { id: 'capture', name: 'Capture', icon: '🔍', color: '#8B5CF6' },
            { id: 'rfp-analysis', name: 'RFP Analysis', icon: '📋', color: '#EC4899' },
            { id: 'drafting', name: 'Drafting', icon: '✍️', color: '#F59E0B' },
            { id: 'review', name: 'Review', icon: '🔬', color: '#00E5FA' },
            { id: 'submitted', name: 'Submitted', icon: '📤', color: '#10B981' },
            { id: 'won', name: 'Won', icon: '🏆', color: '#10B981' },
            { id: 'lost', name: 'Lost', icon: '❌', color: '#EF4444' }
        ];

        const agencies = ['All', 'DHA', 'VA', 'CDC', 'NIH', 'CMS', 'FDA', 'SAMHSA', 'IHS'];
        const priorities = ['All', 'P-0', 'P-1', 'P-2'];

        // Navigation
        const NavigationHeader = ({ currentPage }) => {
            const navItems = [
                { id: 'dashboard', label: 'Dashboard', href: 'index.html', icon: '🏠' },
                { id: 'pipeline', label: 'Pipeline', href: 'pipeline.html', icon: '📊' },
                { id: 'warroom', label: 'War Room', href: 'warroom.html', icon: '⚔️' },
                { id: 'agents', label: 'AI Agents', href: 'agent-hub.html', icon: '🤖' },
                { id: 'training', label: 'Training Data', href: 'training-admin.html', icon: '📚' },
                { id: 'playbook', label: 'Playbook', href: 'playbook-manager.html', icon: '📖' },
                { id: 'analytics', label: 'Analytics', href: 'analytics.html', icon: '📈' }
            ];
            return (
                <nav className="glass-nav sticky top-0 z-50">
                    <div className="max-w-full mx-auto px-4">
                        <div className="flex items-center justify-between h-16">
                            <div className="flex items-center space-x-3">
                                <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center"><span className="text-xl">🛡️</span></div>
                                <div><span className="text-xl font-bold glow-text" style={{color: '#00E5FA'}}>MissionPulse</span><span className="text-xs text-gray-400 block">by Mission Meets Tech</span></div>
                            </div>
                            <div className="flex items-center space-x-1">
                                {navItems.map(item => (
                                    <a key={item.id} href={item.href} className={`px-3 py-2 rounded-lg text-sm font-medium transition-all flex items-center space-x-2 ${currentPage === item.id ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' : 'text-gray-300 hover:text-white hover:bg-white/5'}`}>
                                        <span>{item.icon}</span><span className="hidden lg:inline">{item.label}</span>
                                    </a>
                                ))}
                            </div>
                            <div className="flex items-center space-x-3">
                                <div className="text-right hidden md:block"><div className="text-sm font-medium">Mary Womack</div><div className="text-xs text-cyan-400">Capture Manager</div></div>
                                <div className="w-9 h-9 rounded-full bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center text-sm font-bold">MW</div>
                            </div>
                        </div>
                    </div>
                </nav>
            );
        };

        // DAFE Score Component
        const DAFEScore = ({ dafe, showFull = false }) => {
            const items = [
                { key: 'decision', label: 'D', full: 'Decision Timeline', color: '#00E5FA' },
                { key: 'authority', label: 'A', full: 'Authority Identified', color: '#8B5CF6' },
                { key: 'funding', label: 'F', full: 'Funding Confirmed', color: '#10B981' },
                { key: 'evaluation', label: 'E', full: 'Evaluation Criteria', color: '#F59E0B' }
            ];
            const avg = Math.round((dafe.decision + dafe.authority + dafe.funding + dafe.evaluation) / 4);
            
            if (!showFull) {
                return (
                    <div className="flex items-center space-x-1">
                        <span className="text-xs text-gray-500">DAFE:</span>
                        <span className={`font-mono text-xs font-bold ${avg >= 80 ? 'text-green-400' : avg >= 60 ? 'text-yellow-400' : 'text-red-400'}`}>{avg}</span>
                    </div>
                );
            }
            return (
                <div className="space-y-1 p-2 bg-black/20 rounded">
                    {items.map(item => (
                        <div key={item.key} className="flex items-center space-x-2">
                            <span className="text-xs text-gray-500 w-4" title={item.full}>{item.label}</span>
                            <div className="dafe-bar flex-1"><div className="dafe-fill" style={{ width: `${dafe[item.key]}%`, backgroundColor: item.color }} /></div>
                            <span className="text-xs font-mono text-gray-400 w-6">{dafe[item.key]}</span>
                        </div>
                    ))}
                </div>
            );
        };

        // Why This Tags
        const WhyThisTags = ({ tags }) => {
            if (!tags?.length) return null;
            return (
                <div className="flex flex-wrap gap-1 mt-2">
                    {tags.slice(0, 2).map((tag, i) => <span key={i} className="why-this-tag px-1.5 py-0.5 rounded text-xs text-purple-300">{tag}</span>)}
                    {tags.length > 2 && <span className="text-xs text-gray-500">+{tags.length - 2}</span>}
                </div>
            );
        };

        // Pipeline Card
        const PipelineCard = ({ proposal, onDragStart, onDragEnd, showDetails }) => {
            const formatCurrency = (v) => v >= 1000000 ? `$${(v / 1000000).toFixed(1)}M` : `$${(v / 1000).toFixed(0)}K`;
            const getDaysLabel = () => {
                if (['won', 'lost'].includes(proposal.stage)) return null;
                if (proposal.stage === 'submitted') return <span className="text-cyan-400">Pending</span>;
                if (proposal.daysToSubmit <= 0) return <span className="text-red-400 font-bold">Overdue!</span>;
                if (proposal.daysToSubmit <= 7) return <span className="text-red-400">{proposal.daysToSubmit}d</span>;
                if (proposal.daysToSubmit <= 14) return <span className="text-yellow-400">{proposal.daysToSubmit}d</span>;
                return <span className="text-gray-400">{proposal.daysToSubmit}d</span>;
            };
            const priorityClass = { 'P-0': 'priority-p0', 'P-1': 'priority-p1', 'P-2': 'priority-p2' };
            const pwinColor = proposal.pWin >= 70 ? 'text-green-400' : proposal.pWin >= 50 ? 'text-yellow-400' : 'text-red-400';

            return (
                <div draggable onDragStart={(e) => onDragStart(e, proposal)} onDragEnd={onDragEnd} className="pipeline-card glass-card p-3 mb-3">
                    <div className="flex items-start justify-between mb-2">
                        <span className={`px-2 py-0.5 rounded text-xs font-bold text-white ${priorityClass[proposal.priority]}`}>{proposal.priority}</span>
                        <div className="flex items-center space-x-1"><span className={`font-mono font-bold ${pwinColor}`}>{proposal.pWin}%</span><span className="text-gray-500 text-xs">pWin</span></div>
                    </div>
                    <h4 className="font-semibold text-white text-sm mb-1 line-clamp-2">{proposal.title}</h4>
                    <div className="flex items-center justify-between text-xs mb-2">
                        <div className="flex items-center space-x-2">
                            <span className="px-2 py-0.5 bg-cyan-500/20 text-cyan-400 rounded">{proposal.agency}</span>
                            <span className="px-1.5 py-0.5 bg-gray-700/50 text-gray-400 rounded">{proposal.setAside}</span>
                        </div>
                        <span className="font-mono text-green-400">{formatCurrency(proposal.value)}</span>
                    </div>
                    <DAFEScore dafe={proposal.dafe} showFull={showDetails} />
                    <WhyThisTags tags={proposal.whyThis} />
                    <div className="flex items-center justify-between text-xs text-gray-400 mt-2 pt-2 border-t border-gray-700/50">
                        <span>👤 {proposal.pm}</span>{getDaysLabel()}
                    </div>
                    <div className="flex items-center justify-between text-xs mt-1">
                        <span className="text-gray-500">Gate: <span className="text-cyan-400">{proposal.shipleyGate}</span></span>
                        <span className="font-mono text-gray-600 text-[10px]">{proposal.samNumber}</span>
                    </div>
                </div>
            );
        };

        // Pipeline Column
        const PipelineColumn = ({ stage, proposals, onDrop, onDragOver, onDragLeave, isDragOver, onDragStart, onDragEnd, showDetails }) => {
            const stageProps = proposals.filter(p => p.stage === stage.id);
            const totalValue = stageProps.reduce((sum, p) => sum + p.value, 0);
            const avgDafe = stageProps.length ? Math.round(stageProps.reduce((s, p) => s + p.dafeScore, 0) / stageProps.length) : 0;
            const formatCurrency = (v) => v >= 1000000 ? `$${(v / 1000000).toFixed(1)}M` : `$${(v / 1000).toFixed(0)}K`;

            return (
                <div className={`glass-column p-3 min-w-[300px] max-w-[300px] flex flex-col drop-zone ${isDragOver ? 'drag-over' : ''}`}
                    onDrop={(e) => onDrop(e, stage.id)} onDragOver={onDragOver} onDragLeave={onDragLeave}>
                    <div className="flex items-center justify-between mb-3 pb-2 border-b border-gray-700/50">
                        <div className="flex items-center space-x-2"><span className="text-lg">{stage.icon}</span><h3 className="font-semibold text-white text-sm">{stage.name}</h3></div>
                        <span className="px-2 py-0.5 bg-white/10 rounded-full text-xs font-mono">{stageProps.length}</span>
                    </div>
                    <div className="flex items-center justify-between mb-2 text-xs">
                        <span className="text-gray-400">Value: <span className="font-mono text-green-400">{formatCurrency(totalValue)}</span></span>
                        <span className="text-gray-400">DAFE: <span className={`font-mono ${avgDafe >= 80 ? 'text-green-400' : avgDafe >= 60 ? 'text-yellow-400' : 'text-red-400'}`}>{avgDafe || '-'}</span></span>
                    </div>
                    <div className="flex-1 overflow-y-auto scrollbar-thin max-h-[calc(100vh-380px)]">
                        {stageProps.map(p => <PipelineCard key={p.id} proposal={p} onDragStart={onDragStart} onDragEnd={onDragEnd} showDetails={showDetails} />)}
                        {!stageProps.length && <div className="text-center text-gray-500 text-sm py-8">Drop proposals here</div>}
                    </div>
                </div>
            );
        };

        // Stats Bar
        const StatsBar = ({ proposals }) => {
            const active = proposals.filter(p => !['won', 'lost'].includes(p.stage));
            const totalValue = proposals.reduce((s, p) => s + p.value, 0);
            const avgPWin = active.length ? Math.round(active.reduce((s, p) => s + p.pWin, 0) / active.length) : 0;
            const avgDafe = active.length ? Math.round(active.reduce((s, p) => s + p.dafeScore, 0) / active.length) : 0;
            const p0Count = proposals.filter(p => p.priority === 'P-0' && !['won', 'lost'].includes(p.stage)).length;
            const urgent = proposals.filter(p => p.daysToSubmit <= 7 && p.daysToSubmit > 0 && !['won', 'lost', 'submitted'].includes(p.stage)).length;
            const formatCurrency = (v) => v >= 1000000000 ? `$${(v / 1000000000).toFixed(2)}B` : v >= 1000000 ? `$${(v / 1000000).toFixed(1)}M` : `$${(v / 1000).toFixed(0)}K`;

            return (
                <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
                    <div className="glass-card p-4"><div className="text-gray-400 text-xs mb-1">Total Pipeline</div><div className="font-mono text-2xl font-bold text-green-400">{formatCurrency(totalValue)}</div></div>
                    <div className="glass-card p-4"><div className="text-gray-400 text-xs mb-1">Active</div><div className="font-mono text-2xl font-bold text-cyan-400">{active.length}</div></div>
                    <div className="glass-card p-4"><div className="text-gray-400 text-xs mb-1">Avg pWin</div><div className={`font-mono text-2xl font-bold ${avgPWin >= 70 ? 'text-green-400' : avgPWin >= 50 ? 'text-yellow-400' : 'text-red-400'}`}>{avgPWin}%</div></div>
                    <div className="glass-card p-4"><div className="text-gray-400 text-xs mb-1">Avg DAFE</div><div className={`font-mono text-2xl font-bold ${avgDafe >= 80 ? 'text-green-400' : avgDafe >= 60 ? 'text-yellow-400' : 'text-red-400'}`}>{avgDafe}</div></div>
                    <div className="glass-card p-4"><div className="text-gray-400 text-xs mb-1">P-0 Must Win</div><div className="flex items-center space-x-2"><span className="font-mono text-2xl font-bold text-red-400">{p0Count}</span>{urgent > 0 && <span className="px-2 py-1 bg-red-500/20 text-red-400 text-xs rounded animate-pulse">⚠️ {urgent}</span>}</div></div>
                </div>
            );
        };

        // SAM Import Modal
        const SAMImportModal = ({ isOpen, onClose, onImport }) => {
            const [selected, setSelected] = useState([]);
            const results = [
                { id: 'sam-001', title: 'HHS Health Data Analytics Platform', agency: 'HHS', value: 35000000, due: '2025-03-15', naics: '541512' },
                { id: 'sam-002', title: 'DOD Medical Supply Chain Optimization', agency: 'DOD', value: 28000000, due: '2025-04-01', naics: '541614' },
                { id: 'sam-003', title: 'GSA Cloud Services BPA', agency: 'GSA', value: 50000000, due: '2025-02-28', naics: '541519' }
            ];
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50">
                    <div className="glass-card p-6 w-full max-w-2xl mx-4">
                        <div className="flex items-center justify-between mb-4">
                            <h3 className="text-xl font-bold flex items-center space-x-2"><span>🏛️</span><span>SAM.gov Import</span></h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-white text-xl">✕</button>
                        </div>
                        <input type="text" placeholder="Search SAM.gov by keyword, NAICS, agency..." className="w-full bg-white/5 border border-gray-700 rounded-lg px-4 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-cyan-500 mb-4" />
                        <div className="space-y-2 max-h-64 overflow-y-auto scrollbar-thin mb-4">
                            {results.map(r => (
                                <div key={r.id} onClick={() => setSelected(s => s.includes(r.id) ? s.filter(x => x !== r.id) : [...s, r.id])}
                                    className={`p-3 rounded-lg cursor-pointer transition-colors border ${selected.includes(r.id) ? 'bg-cyan-500/20 border-cyan-500/50' : 'bg-white/5 border-gray-700 hover:bg-white/10'}`}>
                                    <div className="flex items-center justify-between">
                                        <div><div className="text-sm font-medium">{r.title}</div><div className="text-xs text-gray-400">{r.agency} • NAICS {r.naics} • Due {r.due}</div></div>
                                        <div className="font-mono text-green-400">${(r.value / 1000000).toFixed(0)}M</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="flex items-center justify-between">
                            <span className="text-sm text-gray-400">{selected.length} selected</span>
                            <div className="flex space-x-3">
                                <button onClick={onClose} className="px-4 py-2 bg-gray-700 rounded-lg hover:bg-gray-600">Cancel</button>
                                <button onClick={() => { onImport(selected); onClose(); }} disabled={!selected.length} className="px-4 py-2 bg-cyan-500 rounded-lg hover:bg-cyan-400 disabled:opacity-50">Import {selected.length}</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Main App
        const App = () => {
            const [proposals, setProposals] = useState(initialProposals);
            const [agencyFilter, setAgencyFilter] = useState('All');
            const [priorityFilter, setPriorityFilter] = useState('All');
            const [searchTerm, setSearchTerm] = useState('');
            const [dafeRange, setDafeRange] = useState([0, 100]);
            const [draggedProposal, setDraggedProposal] = useState(null);
            const [dragOverStage, setDragOverStage] = useState(null);
            const [isImporting, setIsImporting] = useState(false);
            const [showSAMModal, setShowSAMModal] = useState(false);
            const [showDetails, setShowDetails] = useState(false);

            const filtered = proposals.filter(p => {
                if (agencyFilter !== 'All' && p.agency !== agencyFilter) return false;
                if (priorityFilter !== 'All' && p.priority !== priorityFilter) return false;
                if (p.dafeScore < dafeRange[0] || p.dafeScore > dafeRange[1]) return false;
                if (searchTerm && !p.title.toLowerCase().includes(searchTerm.toLowerCase()) && !p.samNumber.toLowerCase().includes(searchTerm.toLowerCase()) && !p.naics.includes(searchTerm)) return false;
                return true;
            });

            const handleDragStart = (e, p) => { setDraggedProposal(p); e.dataTransfer.effectAllowed = 'move'; };
            const handleDragEnd = () => { setDraggedProposal(null); setDragOverStage(null); };
            const handleDragOver = (e, stageId) => { e.preventDefault(); setDragOverStage(stageId); };
            const handleDragLeave = () => setDragOverStage(null);
            const handleDrop = (e, stageId) => { e.preventDefault(); if (draggedProposal) setProposals(prev => prev.map(p => p.id === draggedProposal.id ? { ...p, stage: stageId } : p)); setDragOverStage(null); };
            const handleSAMImport = () => setShowSAMModal(true);
            const handleImportComplete = () => { setIsImporting(true); setTimeout(() => setIsImporting(false), 2000); };

            return (
                <div className="min-h-screen">
                    <NavigationHeader currentPage="pipeline" />
                    <main className="p-6">
                        <div className="mb-6">
                            <h1 className="text-3xl font-bold mb-2 flex items-center space-x-3"><span>📊</span><span>Pipeline Intel</span></h1>
                            <p className="text-gray-400">Track opportunities with DAFE analysis • SAM.gov integrated</p>
                        </div>
                        <StatsBar proposals={proposals} />
                        {/* Filter Bar */}
                        <div className="glass-card p-4 mb-6">
                            <div className="flex flex-wrap items-center gap-4">
                                <input type="text" placeholder="🔍 Search proposals, SAM #, NAICS..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
                                    className="flex-1 min-w-[200px] bg-white/5 border border-gray-700 rounded-lg px-4 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-cyan-500" />
                                <div className="flex items-center space-x-2">
                                    <span className="text-gray-400 text-sm">Agency:</span>
                                    <select value={agencyFilter} onChange={(e) => setAgencyFilter(e.target.value)} className="bg-white/5 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-cyan-500">
                                        {agencies.map(a => <option key={a} value={a} className="bg-gray-900">{a}</option>)}
                                    </select>
                                </div>
                                <div className="flex items-center space-x-2">
                                    <span className="text-gray-400 text-sm">Priority:</span>
                                    <select value={priorityFilter} onChange={(e) => setPriorityFilter(e.target.value)} className="bg-white/5 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-cyan-500">
                                        {priorities.map(p => <option key={p} value={p} className="bg-gray-900">{p}</option>)}
                                    </select>
                                </div>
                                <div className="flex items-center space-x-2 bg-white/5 border border-gray-700 rounded-lg px-3 py-2">
                                    <span className="text-gray-400 text-sm">DAFE:</span>
                                    <span className="text-cyan-400 font-mono text-sm w-6">{dafeRange[0]}</span>
                                    <input type="range" min="0" max="100" value={dafeRange[0]} onChange={(e) => setDafeRange([parseInt(e.target.value), dafeRange[1]])} className="range-slider" />
                                    <span className="text-gray-500">—</span>
                                    <input type="range" min="0" max="100" value={dafeRange[1]} onChange={(e) => setDafeRange([dafeRange[0], parseInt(e.target.value)])} className="range-slider" />
                                    <span className="text-cyan-400 font-mono text-sm w-6">{dafeRange[1]}</span>
                                </div>
                                <button onClick={() => setShowDetails(!showDetails)} className={`px-3 py-2 rounded-lg text-sm transition-colors ${showDetails ? 'bg-purple-500/20 text-purple-400 border border-purple-500/30' : 'bg-white/5 text-gray-400 border border-gray-700'}`}>
                                    {showDetails ? '📊 Details On' : '📊 Details Off'}
                                </button>
                                <button onClick={handleSAMImport} disabled={isImporting} className="sam-button px-4 py-2 rounded-lg text-sm font-semibold text-white flex items-center space-x-2 disabled:opacity-60">
                                    {isImporting ? <><span className="animate-spin">⟳</span><span>Importing...</span></> : <><span>🏛️</span><span>SAM.gov Import</span></>}
                                </button>
                                <button className="px-4 py-2 bg-cyan-500/20 text-cyan-400 rounded-lg hover:bg-cyan-500/30 border border-cyan-500/30 flex items-center space-x-2"><span>➕</span><span>New Opp</span></button>
                            </div>
                        </div>
                        {/* Kanban Board */}
                        <div className="overflow-x-auto pb-4">
                            <div className="flex space-x-4 min-w-max">
                                {stages.map(stage => <PipelineColumn key={stage.id} stage={stage} proposals={filtered} onDrop={handleDrop} onDragOver={(e) => handleDragOver(e, stage.id)} onDragLeave={handleDragLeave} isDragOver={dragOverStage === stage.id} onDragStart={handleDragStart} onDragEnd={handleDragEnd} showDetails={showDetails} />)}
                            </div>
                        </div>
                    </main>
                    <SAMImportModal isOpen={showSAMModal} onClose={() => setShowSAMModal(false)} onImport={handleImportComplete} />
                    <footer className="border-t border-gray-800 mt-8 py-4 px-6">
                        <div className="flex items-center justify-between text-xs text-gray-500">
                            <div>© 2025 Mission Meets Tech • MissionPulse v1.1</div>
                            <span className="px-2 py-1 bg-yellow-500/20 text-yellow-400 rounded">⚠️ AI GENERATED - REQUIRES HUMAN REVIEW</span>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
