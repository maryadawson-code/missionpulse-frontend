<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Personnel | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
        .glass-card:hover { border-color: rgba(0,229,250,0.3); }
        .cyan-glow { box-shadow: 0 0 30px rgba(0,229,250,0.15); }
        .personnel-card { transition: all 0.3s ease; }
        .personnel-card:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const supabaseUrl = 'https://djuviwarqdvlbgcfuupa.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0NDQ0NjUsImV4cCI6MjA4NTAyMDQ2NX0.3s8ufDDN2aWfkW0RBsAyJyacb2tjB7M550WSFIohHcA';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const DEMO_PERSONNEL = [
            { id: '1', first_name: 'Sarah', last_name: 'Chen', email: 'schen@missionmeets.tech', title: 'Program Manager', labor_category: 'Program Manager III', clearance_level: 'top_secret', clearance_status: 'active', years_experience: 15, education_level: 'Masters', certifications: ['PMP', 'ITIL v4', 'SAFe Agilist'], skills: ['Program Management', 'Healthcare IT', 'Agile'], availability_status: 'proposed', current_project: null, hourly_rate: 185 },
            { id: '2', first_name: 'Michael', last_name: 'Torres', email: 'mtorres@missionmeets.tech', title: 'Technical Lead', labor_category: 'Senior Systems Engineer', clearance_level: 'ts_sci', clearance_status: 'active', years_experience: 12, education_level: 'Masters', certifications: ['AWS Solutions Architect', 'CISSP', 'CEH'], skills: ['Cloud Architecture', 'Cybersecurity', 'DevSecOps'], availability_status: 'available', current_project: null, hourly_rate: 195 },
            { id: '3', first_name: 'Jennifer', last_name: 'Walsh', email: 'jwalsh@missionmeets.tech', title: 'Subject Matter Expert', labor_category: 'Healthcare SME', clearance_level: 'secret', clearance_status: 'active', years_experience: 20, education_level: 'Doctorate', certifications: ['CPHIMS', 'FHIMSS'], skills: ['EHR Implementation', 'HIPAA Compliance', 'Clinical Workflows'], availability_status: 'assigned', current_project: 'VA Claims Processing', hourly_rate: 225 },
            { id: '4', first_name: 'David', last_name: 'Kim', email: 'dkim@missionmeets.tech', title: 'Data Scientist', labor_category: 'Data Scientist II', clearance_level: 'secret', clearance_status: 'active', years_experience: 8, education_level: 'Masters', certifications: ['AWS ML Specialty', 'TensorFlow Developer'], skills: ['Machine Learning', 'Python', 'Data Analytics'], availability_status: 'available', current_project: null, hourly_rate: 165 },
            { id: '5', first_name: 'Amanda', last_name: 'Roberts', email: 'aroberts@missionmeets.tech', title: 'Security Engineer', labor_category: 'Cybersecurity Engineer III', clearance_level: 'top_secret', clearance_status: 'active', years_experience: 10, education_level: 'Bachelors', certifications: ['CISSP', 'CISM', 'Security+'], skills: ['Zero Trust', 'FedRAMP', 'CMMC'], availability_status: 'proposed', current_project: null, hourly_rate: 175 },
            { id: '6', first_name: 'James', last_name: 'Wilson', email: 'jwilson@missionmeets.tech', title: 'Software Developer', labor_category: 'Software Engineer II', clearance_level: 'public_trust', clearance_status: 'active', years_experience: 6, education_level: 'Bachelors', certifications: ['AWS Developer', 'React Certified'], skills: ['React', 'Node.js', 'PostgreSQL'], availability_status: 'available', current_project: null, hourly_rate: 135 },
            { id: '7', first_name: 'Emily', last_name: 'Patel', email: 'epatel@missionmeets.tech', title: 'Business Analyst', labor_category: 'Business Analyst III', clearance_level: 'secret', clearance_status: 'interim', years_experience: 9, education_level: 'Masters', certifications: ['CBAP', 'SAFe POPM'], skills: ['Requirements Analysis', 'User Stories', 'Process Mapping'], availability_status: 'available', current_project: null, hourly_rate: 145 },
            { id: '8', first_name: 'Robert', last_name: 'Martinez', email: 'rmartinez@missionmeets.tech', title: 'Project Manager', labor_category: 'Project Manager II', clearance_level: 'secret', clearance_status: 'active', years_experience: 11, education_level: 'Masters', certifications: ['PMP', 'CSM', 'ITIL'], skills: ['Project Management', 'Scrum', 'Risk Management'], availability_status: 'assigned', current_project: 'CMS Data Analytics', hourly_rate: 155 }
        ];

        const DEMO_ASSIGNMENTS = [
            { id: '1', personnel_id: '1', personnel_name: 'Sarah Chen', opportunity_title: 'DHA EHR Modernization', proposed_role: 'Program Manager', commitment_percent: 100, status: 'proposed' },
            { id: '2', personnel_id: '2', personnel_name: 'Michael Torres', opportunity_title: 'DHA EHR Modernization', proposed_role: 'Technical Lead', commitment_percent: 100, status: 'tentative' },
            { id: '3', personnel_id: '5', personnel_name: 'Amanda Roberts', opportunity_title: 'DHA EHR Modernization', proposed_role: 'Security Lead', commitment_percent: 50, status: 'proposed' },
            { id: '4', personnel_id: '3', personnel_name: 'Jennifer Walsh', opportunity_title: 'VA Claims Processing', proposed_role: 'Healthcare SME', commitment_percent: 100, status: 'assigned' },
            { id: '5', personnel_id: '8', personnel_name: 'Robert Martinez', opportunity_title: 'CMS Data Analytics', proposed_role: 'Project Manager', commitment_percent: 100, status: 'assigned' }
        ];

        const DEMO_CERTIFICATIONS = [
            { id: '1', personnel_id: '1', certification_name: 'PMP', issuing_organization: 'PMI', expiration_date: '2027-03-15', status: 'active' },
            { id: '2', personnel_id: '2', certification_name: 'CISSP', issuing_organization: 'ISC2', expiration_date: '2026-08-20', status: 'active' },
            { id: '3', personnel_id: '2', certification_name: 'AWS Solutions Architect', issuing_organization: 'Amazon', expiration_date: '2026-05-10', status: 'active' },
            { id: '4', personnel_id: '5', certification_name: 'CISSP', issuing_organization: 'ISC2', expiration_date: '2026-04-01', status: 'active' },
            { id: '5', personnel_id: '3', certification_name: 'CPHIMS', issuing_organization: 'HIMSS', expiration_date: '2026-12-31', status: 'active' }
        ];

        function PersonnelApp() {
            const [personnel, setPersonnel] = useState([]);
            const [assignments, setAssignments] = useState([]);
            const [certifications, setCertifications] = useState([]);
            const [selectedPerson, setSelectedPerson] = useState(null);
            const [activeTab, setActiveTab] = useState('directory');
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterAvailability, setFilterAvailability] = useState('all');
            const [filterClearance, setFilterClearance] = useState('all');

            useEffect(() => {
                loadData();
            }, []);

            async function loadData() {
                try {
                    const { data: pData } = await supabase.from('key_personnel').select('*').order('last_name');
                    const { data: aData } = await supabase.from('personnel_assignments').select('*');
                    const { data: cData } = await supabase.from('personnel_certifications').select('*');
                    setPersonnel(pData?.length ? pData : DEMO_PERSONNEL);
                    setAssignments(aData?.length ? aData : DEMO_ASSIGNMENTS);
                    setCertifications(cData?.length ? cData : DEMO_CERTIFICATIONS);
                } catch (err) {
                    setPersonnel(DEMO_PERSONNEL);
                    setAssignments(DEMO_ASSIGNMENTS);
                    setCertifications(DEMO_CERTIFICATIONS);
                }
                setLoading(false);
            }

            const getClearanceColor = (level) => {
                const colors = {
                    ts_sci: 'bg-red-500/20 text-red-400 border-red-500/30',
                    top_secret: 'bg-orange-500/20 text-orange-400 border-orange-500/30',
                    secret: 'bg-yellow-500/20 text-yellow-400 border-yellow-500/30',
                    public_trust: 'bg-blue-500/20 text-blue-400 border-blue-500/30',
                    none: 'bg-gray-500/20 text-gray-400 border-gray-500/30'
                };
                return colors[level] || colors.none;
            };

            const getClearanceLabel = (level) => {
                const labels = { ts_sci: 'TS/SCI', top_secret: 'Top Secret', secret: 'Secret', public_trust: 'Public Trust', none: 'None' };
                return labels[level] || level;
            };

            const getAvailabilityColor = (status) => {
                const colors = {
                    available: 'bg-emerald-500/20 text-emerald-400',
                    proposed: 'bg-cyan-500/20 text-cyan-400',
                    assigned: 'bg-purple-500/20 text-purple-400',
                    unavailable: 'bg-red-500/20 text-red-400'
                };
                return colors[status] || 'bg-gray-500/20 text-gray-400';
            };

            const filteredPersonnel = personnel.filter(p => {
                const matchesSearch = `${p.first_name} ${p.last_name}`.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    p.title?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    p.skills?.some(s => s.toLowerCase().includes(searchTerm.toLowerCase()));
                const matchesAvailability = filterAvailability === 'all' || p.availability_status === filterAvailability;
                const matchesClearance = filterClearance === 'all' || p.clearance_level === filterClearance;
                return matchesSearch && matchesAvailability && matchesClearance;
            });

            const availableCount = personnel.filter(p => p.availability_status === 'available').length;
            const proposedCount = personnel.filter(p => p.availability_status === 'proposed').length;
            const assignedCount = personnel.filter(p => p.availability_status === 'assigned').length;
            const tsCount = personnel.filter(p => p.clearance_level === 'top_secret' || p.clearance_level === 'ts_sci').length;

            const personAssignments = selectedPerson ? assignments.filter(a => a.personnel_id === selectedPerson.id) : [];
            const personCerts = selectedPerson ? certifications.filter(c => c.personnel_id === selectedPerson.id) : [];

            // Expiring certifications (within 90 days)
            const expiringCerts = certifications.filter(c => {
                const expDate = new Date(c.expiration_date);
                const now = new Date();
                const diffDays = Math.ceil((expDate - now) / (1000 * 60 * 60 * 24));
                return diffDays > 0 && diffDays <= 90;
            });

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <div className="w-16 h-16 border-4 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="text-gray-400">Loading Personnel Database...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-6">
                    {/* Header */}
                    <div className="flex items-center justify-between mb-8">
                        <div>
                            <div className="flex items-center gap-3 mb-2">
                                <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-purple-500 to-pink-600 flex items-center justify-center">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                                    </svg>
                                </div>
                                <h1 className="text-2xl font-bold">Key Personnel Database</h1>
                            </div>
                            <p className="text-gray-400">Manage personnel, certifications & proposal assignments</p>
                        </div>
                        <button className="flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-cyan-500 to-purple-600 rounded-lg font-medium hover:opacity-90 transition">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
                            </svg>
                            Add Personnel
                        </button>
                    </div>

                    {/* Stats Row */}
                    <div className="grid grid-cols-5 gap-4 mb-8">
                        <div className="glass-card rounded-xl p-4 cyan-glow">
                            <p className="text-gray-400 text-sm mb-1">Total Personnel</p>
                            <p className="text-3xl font-bold text-cyan-400">{personnel.length}</p>
                        </div>
                        <div className="glass-card rounded-xl p-4">
                            <p className="text-gray-400 text-sm mb-1">Available</p>
                            <p className="text-3xl font-bold text-emerald-400">{availableCount}</p>
                        </div>
                        <div className="glass-card rounded-xl p-4">
                            <p className="text-gray-400 text-sm mb-1">Proposed</p>
                            <p className="text-3xl font-bold text-cyan-400">{proposedCount}</p>
                        </div>
                        <div className="glass-card rounded-xl p-4">
                            <p className="text-gray-400 text-sm mb-1">Assigned</p>
                            <p className="text-3xl font-bold text-purple-400">{assignedCount}</p>
                        </div>
                        <div className="glass-card rounded-xl p-4">
                            <p className="text-gray-400 text-sm mb-1">TS/TS-SCI Cleared</p>
                            <p className="text-3xl font-bold text-orange-400">{tsCount}</p>
                        </div>
                    </div>

                    {/* Expiring Certifications Alert */}
                    {expiringCerts.length > 0 && (
                        <div className="bg-yellow-500/10 border border-yellow-500/30 rounded-xl p-4 mb-6">
                            <div className="flex items-center gap-2 text-yellow-400">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                                </svg>
                                <span className="font-medium">{expiringCerts.length} certification(s) expiring within 90 days</span>
                            </div>
                        </div>
                    )}

                    {/* Tabs */}
                    <div className="flex gap-1 mb-6 bg-white/5 p-1 rounded-lg w-fit">
                        {['directory', 'assignments', 'certifications'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 rounded-lg text-sm font-medium transition ${activeTab === tab ? 'bg-cyan-500 text-white' : 'text-gray-400 hover:text-white'}`}>
                                {tab.charAt(0).toUpperCase() + tab.slice(1)}
                            </button>
                        ))}
                    </div>

                    {activeTab === 'directory' && (
                        <>
                            {/* Filters */}
                            <div className="flex gap-4 mb-6">
                                <div className="flex-1">
                                    <input type="text" placeholder="Search by name, title, or skills..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-sm focus:border-cyan-500/50 focus:outline-none" />
                                </div>
                                <select value={filterAvailability} onChange={e => setFilterAvailability(e.target.value)} className="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-sm focus:border-cyan-500/50 focus:outline-none">
                                    <option value="all">All Availability</option>
                                    <option value="available">Available</option>
                                    <option value="proposed">Proposed</option>
                                    <option value="assigned">Assigned</option>
                                </select>
                                <select value={filterClearance} onChange={e => setFilterClearance(e.target.value)} className="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-sm focus:border-cyan-500/50 focus:outline-none">
                                    <option value="all">All Clearances</option>
                                    <option value="ts_sci">TS/SCI</option>
                                    <option value="top_secret">Top Secret</option>
                                    <option value="secret">Secret</option>
                                    <option value="public_trust">Public Trust</option>
                                </select>
                            </div>

                            {/* Personnel Grid */}
                            <div className="grid grid-cols-2 gap-4">
                                {filteredPersonnel.map(person => (
                                    <div key={person.id} onClick={() => setSelectedPerson(person)} className="personnel-card glass-card rounded-xl p-5 cursor-pointer">
                                        <div className="flex items-start gap-4">
                                            <div className="w-14 h-14 rounded-full bg-gradient-to-br from-cyan-500 to-purple-600 flex items-center justify-center text-xl font-bold">
                                                {person.first_name[0]}{person.last_name[0]}
                                            </div>
                                            <div className="flex-1">
                                                <div className="flex items-center justify-between mb-1">
                                                    <h3 className="font-semibold text-lg">{person.first_name} {person.last_name}</h3>
                                                    <span className={`px-2 py-0.5 rounded text-xs ${getAvailabilityColor(person.availability_status)}`}>
                                                        {person.availability_status}
                                                    </span>
                                                </div>
                                                <p className="text-gray-400 text-sm mb-2">{person.title}</p>
                                                <div className="flex items-center gap-2 mb-3">
                                                    <span className={`px-2 py-0.5 rounded text-xs border ${getClearanceColor(person.clearance_level)}`}>
                                                        {getClearanceLabel(person.clearance_level)}
                                                    </span>
                                                    <span className="text-gray-500 text-xs">{person.years_experience} yrs exp</span>
                                                </div>
                                                <div className="flex flex-wrap gap-1">
                                                    {person.certifications?.slice(0, 3).map(cert => (
                                                        <span key={cert} className="px-2 py-0.5 bg-purple-500/20 text-purple-400 rounded text-xs">{cert}</span>
                                                    ))}
                                                    {person.certifications?.length > 3 && (
                                                        <span className="px-2 py-0.5 bg-gray-500/20 text-gray-400 rounded text-xs">+{person.certifications.length - 3}</span>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </>
                    )}

                    {activeTab === 'assignments' && (
                        <div className="glass-card rounded-xl p-6">
                            <h2 className="text-lg font-semibold mb-4">Proposal Assignments ({assignments.length})</h2>
                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead>
                                        <tr className="text-left text-gray-400 text-sm border-b border-white/10">
                                            <th className="pb-3 font-medium">Personnel</th>
                                            <th className="pb-3 font-medium">Opportunity</th>
                                            <th className="pb-3 font-medium">Proposed Role</th>
                                            <th className="pb-3 font-medium">Commitment</th>
                                            <th className="pb-3 font-medium">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-sm">
                                        {assignments.map(assign => (
                                            <tr key={assign.id} className="border-b border-white/5 hover:bg-white/5">
                                                <td className="py-3 font-medium">{assign.personnel_name}</td>
                                                <td className="py-3 text-gray-300">{assign.opportunity_title}</td>
                                                <td className="py-3 text-gray-400">{assign.proposed_role}</td>
                                                <td className="py-3">
                                                    <div className="flex items-center gap-2">
                                                        <div className="w-12 h-2 bg-white/10 rounded-full overflow-hidden">
                                                            <div className="h-full bg-cyan-500" style={{width: `${assign.commitment_percent}%`}}></div>
                                                        </div>
                                                        <span>{assign.commitment_percent}%</span>
                                                    </div>
                                                </td>
                                                <td className="py-3">
                                                    <span className={`px-2 py-1 rounded text-xs ${
                                                        assign.status === 'assigned' ? 'bg-purple-500/20 text-purple-400' :
                                                        assign.status === 'committed' ? 'bg-emerald-500/20 text-emerald-400' :
                                                        assign.status === 'tentative' ? 'bg-yellow-500/20 text-yellow-400' :
                                                        'bg-cyan-500/20 text-cyan-400'
                                                    }`}>
                                                        {assign.status}
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {activeTab === 'certifications' && (
                        <div className="glass-card rounded-xl p-6">
                            <h2 className="text-lg font-semibold mb-4">Certifications Tracker</h2>
                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead>
                                        <tr className="text-left text-gray-400 text-sm border-b border-white/10">
                                            <th className="pb-3 font-medium">Personnel</th>
                                            <th className="pb-3 font-medium">Certification</th>
                                            <th className="pb-3 font-medium">Issuing Org</th>
                                            <th className="pb-3 font-medium">Expiration</th>
                                            <th className="pb-3 font-medium">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-sm">
                                        {certifications.map(cert => {
                                            const person = personnel.find(p => p.id === cert.personnel_id);
                                            const expDate = new Date(cert.expiration_date);
                                            const now = new Date();
                                            const diffDays = Math.ceil((expDate - now) / (1000 * 60 * 60 * 24));
                                            const isExpiring = diffDays <= 90 && diffDays > 0;
                                            return (
                                                <tr key={cert.id} className={`border-b border-white/5 hover:bg-white/5 ${isExpiring ? 'bg-yellow-500/5' : ''}`}>
                                                    <td className="py-3 font-medium">{person ? `${person.first_name} ${person.last_name}` : 'Unknown'}</td>
                                                    <td className="py-3 text-gray-300">{cert.certification_name}</td>
                                                    <td className="py-3 text-gray-400">{cert.issuing_organization}</td>
                                                    <td className="py-3">
                                                        <span className={isExpiring ? 'text-yellow-400' : 'text-gray-300'}>
                                                            {new Date(cert.expiration_date).toLocaleDateString()}
                                                            {isExpiring && <span className="ml-2 text-xs">({diffDays}d)</span>}
                                                        </span>
                                                    </td>
                                                    <td className="py-3">
                                                        <span className={`px-2 py-1 rounded text-xs ${
                                                            cert.status === 'active' ? 'bg-emerald-500/20 text-emerald-400' :
                                                            cert.status === 'expired' ? 'bg-red-500/20 text-red-400' :
                                                            'bg-yellow-500/20 text-yellow-400'
                                                        }`}>
                                                            {cert.status}
                                                        </span>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* Person Detail Modal */}
                    {selectedPerson && (
                        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4" onClick={() => setSelectedPerson(null)}>
                            <div className="glass-card rounded-xl p-6 max-w-3xl w-full max-h-[85vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                                <div className="flex items-start justify-between mb-6">
                                    <div className="flex items-center gap-4">
                                        <div className="w-16 h-16 rounded-full bg-gradient-to-br from-cyan-500 to-purple-600 flex items-center justify-center text-2xl font-bold">
                                            {selectedPerson.first_name[0]}{selectedPerson.last_name[0]}
                                        </div>
                                        <div>
                                            <h2 className="text-xl font-bold">{selectedPerson.first_name} {selectedPerson.last_name}</h2>
                                            <p className="text-gray-400">{selectedPerson.title}</p>
                                            <p className="text-sm text-gray-500">{selectedPerson.labor_category}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setSelectedPerson(null)} className="text-gray-400 hover:text-white">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>
                                </div>

                                {/* Status Badges */}
                                <div className="flex gap-2 mb-6">
                                    <span className={`px-3 py-1 rounded-lg text-sm ${getAvailabilityColor(selectedPerson.availability_status)}`}>
                                        {selectedPerson.availability_status}
                                    </span>
                                    <span className={`px-3 py-1 rounded-lg text-sm border ${getClearanceColor(selectedPerson.clearance_level)}`}>
                                        {getClearanceLabel(selectedPerson.clearance_level)} ({selectedPerson.clearance_status})
                                    </span>
                                </div>

                                {/* Info Grid */}
                                <div className="grid grid-cols-4 gap-4 mb-6">
                                    <div className="bg-white/5 rounded-lg p-3">
                                        <p className="text-gray-400 text-xs mb-1">Experience</p>
                                        <p className="font-medium">{selectedPerson.years_experience} years</p>
                                    </div>
                                    <div className="bg-white/5 rounded-lg p-3">
                                        <p className="text-gray-400 text-xs mb-1">Education</p>
                                        <p className="font-medium">{selectedPerson.education_level}</p>
                                    </div>
                                    <div className="bg-white/5 rounded-lg p-3">
                                        <p className="text-gray-400 text-xs mb-1">Hourly Rate</p>
                                        <p className="font-medium text-emerald-400">${selectedPerson.hourly_rate}</p>
                                    </div>
                                    <div className="bg-white/5 rounded-lg p-3">
                                        <p className="text-gray-400 text-xs mb-1">Email</p>
                                        <p className="font-medium text-cyan-400 text-sm truncate">{selectedPerson.email}</p>
                                    </div>
                                </div>

                                {/* Skills */}
                                <div className="mb-6">
                                    <h3 className="font-medium mb-2">Skills</h3>
                                    <div className="flex flex-wrap gap-2">
                                        {selectedPerson.skills?.map(skill => (
                                            <span key={skill} className="px-3 py-1 bg-cyan-500/20 text-cyan-400 rounded-lg text-sm">{skill}</span>
                                        ))}
                                    </div>
                                </div>

                                {/* Certifications */}
                                <div className="mb-6">
                                    <h3 className="font-medium mb-2">Certifications</h3>
                                    <div className="flex flex-wrap gap-2">
                                        {selectedPerson.certifications?.map(cert => (
                                            <span key={cert} className="px-3 py-1 bg-purple-500/20 text-purple-400 rounded-lg text-sm">{cert}</span>
                                        ))}
                                    </div>
                                </div>

                                {/* Assignments */}
                                {personAssignments.length > 0 && (
                                    <div>
                                        <h3 className="font-medium mb-2">Proposal Assignments</h3>
                                        <div className="space-y-2">
                                            {personAssignments.map(assign => (
                                                <div key={assign.id} className="bg-white/5 rounded-lg p-3 flex items-center justify-between">
                                                    <div>
                                                        <p className="font-medium">{assign.opportunity_title}</p>
                                                        <p className="text-sm text-gray-400">{assign.proposed_role} • {assign.commitment_percent}%</p>
                                                    </div>
                                                    <span className={`px-2 py-1 rounded text-xs ${
                                                        assign.status === 'assigned' ? 'bg-purple-500/20 text-purple-400' :
                                                        assign.status === 'committed' ? 'bg-emerald-500/20 text-emerald-400' :
                                                        'bg-cyan-500/20 text-cyan-400'
                                                    }`}>
                                                        {assign.status}
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="mt-12 text-center text-gray-500 text-sm">
                        © 2026 Mission Meets Tech • MissionPulse v2.0 • Sprint 71
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<PersonnelApp />, document.getElementById('root'));
    </script>
</body>
</html>
