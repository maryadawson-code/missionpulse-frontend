<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MissionPulse | User Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
        .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.1); }
        .glass-hover:hover { background: rgba(0, 229, 250, 0.08); border-color: rgba(0, 229, 250, 0.3); }
        .text-cyan { color: #00E5FA; }
        .bg-cyan { background-color: #00E5FA; }
        .cyan-glow { box-shadow: 0 0 30px rgba(0, 229, 250, 0.15); }
    </style>
</head>
<body class="text-gray-100">
    <div id="root"></div>
    <script src="missionpulse-crud.js"></script>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const ROLES = [
            { id: 'CEO', name: 'CEO', desc: 'Final Go/No-Go authority', permissions: ['all'] },
            { id: 'COO', name: 'COO', desc: 'Capture oversight & operations', permissions: ['capture', 'reports', 'team'] },
            { id: 'CAP', name: 'Capture Manager', desc: 'Win strategy & pursuit lead', permissions: ['opportunities', 'competitors', 'pricing'] },
            { id: 'PM', name: 'Program Manager', desc: 'Schedule & resource management', permissions: ['schedule', 'team', 'milestones'] },
            { id: 'SA', name: 'Solution Architect', desc: 'Technical approach', permissions: ['technical', 'proposals'] },
            { id: 'FIN', name: 'Finance', desc: 'Pricing & cost modeling', permissions: ['pricing', 'lcat', 'boe'] },
            { id: 'CON', name: 'Contracts', desc: 'FAR/DFARS compliance', permissions: ['compliance', 'contracts'] },
            { id: 'DEL', name: 'Delivery', desc: 'Staffing & execution', permissions: ['staffing', 'delivery'] },
            { id: 'QA', name: 'Quality Assurance', desc: 'Review & approval', permissions: ['review', 'approval'] },
            { id: 'Partner', name: 'Partner', desc: 'Limited external access', permissions: ['view_assigned'] },
            { id: 'Admin', name: 'Admin', desc: 'System administration', permissions: ['admin', 'users', 'settings'] }
        ];

        function UserManagement() {
            const [users, setUsers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isDemo, setIsDemo] = useState(false);
            const [showModal, setShowModal] = useState(false);
            const [editingUser, setEditingUser] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterRole, setFilterRole] = useState('all');
            const [filterStatus, setFilterStatus] = useState('all');
            const [currentUserRole, setCurrentUserRole] = useState('CEO'); // Demo: CEO has full access

            useEffect(() => { loadData(); }, []);

            const loadData = async () => {
                setLoading(true);
                const { data, isDemo: demo } = await MissionPulse.users.getAll();
                setUsers(data || []);
                setIsDemo(demo);
                setLoading(false);
            };

            // RBAC Check - only CEO/COO/Admin can manage users
            const canManageUsers = ['CEO', 'COO', 'Admin'].includes(currentUserRole);

            const handleSave = async (formData) => {
                if (!canManageUsers) return alert('Access denied');
                if (editingUser?.id) {
                    await MissionPulse.users.update(editingUser.id, formData);
                } else {
                    await MissionPulse.users.create(formData);
                }
                setShowModal(false);
                setEditingUser(null);
                loadData();
            };

            const handleToggleStatus = async (user) => {
                if (!canManageUsers) return alert('Access denied');
                await MissionPulse.users.update(user.id, { isActive: !user.isActive });
                loadData();
            };

            const handleDelete = async (id) => {
                if (!canManageUsers) return alert('Access denied');
                if (confirm('Remove this user? They will lose access immediately.')) {
                    await MissionPulse.users.delete(id);
                    loadData();
                }
            };

            const filtered = users.filter(u => {
                const matchSearch = !searchTerm || 
                    (u.fullName || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (u.email || '').toLowerCase().includes(searchTerm.toLowerCase());
                const matchRole = filterRole === 'all' || u.role === filterRole;
                const matchStatus = filterStatus === 'all' || 
                    (filterStatus === 'active' && u.isActive) ||
                    (filterStatus === 'inactive' && !u.isActive);
                return matchSearch && matchRole && matchStatus;
            });

            const getRoleBadgeColor = (role) => {
                const colors = {
                    CEO: 'bg-purple-500/20 text-purple-400',
                    COO: 'bg-blue-500/20 text-blue-400',
                    CAP: 'bg-cyan/20 text-cyan',
                    PM: 'bg-green-500/20 text-green-400',
                    SA: 'bg-yellow-500/20 text-yellow-400',
                    FIN: 'bg-orange-500/20 text-orange-400',
                    CON: 'bg-red-500/20 text-red-400',
                    Admin: 'bg-pink-500/20 text-pink-400',
                    Partner: 'bg-gray-500/20 text-gray-400'
                };
                return colors[role] || 'bg-gray-500/20 text-gray-400';
            };

            if (loading) return <div className="flex items-center justify-center min-h-screen"><div className="w-12 h-12 border-4 border-cyan border-t-transparent rounded-full animate-spin"></div></div>;

            return (
                <div className="min-h-screen p-6">
                    {/* Header */}
                    <header className="glass rounded-xl p-6 mb-6 cyan-glow">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <a href="missionpulse-nav-hub.html" className="text-gray-400 hover:text-cyan">← Hub</a>
                                <div>
                                    <div className="flex items-center gap-2">
                                        <h1 className="text-2xl font-bold text-white">User Management</h1>
                                        <span className="bg-purple-500/20 text-purple-400 text-xs px-2 py-0.5 rounded">RBAC</span>
                                    </div>
                                    <p className="text-gray-400 text-sm">Manage team roles & permissions</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                {isDemo && <span className="text-xs text-yellow-400 bg-yellow-400/10 px-2 py-1 rounded">Demo Mode</span>}
                                {canManageUsers && (
                                    <button onClick={() => { setEditingUser(null); setShowModal(true); }} className="bg-cyan text-black px-4 py-2 rounded-lg font-medium hover:bg-cyan/80">
                                        + Invite User
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* RBAC Info */}
                    <div className="glass rounded-xl p-4 mb-6">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <span className="text-2xl">👤</span>
                                <div>
                                    <p className="text-white font-medium">Logged in as: <span className="text-cyan">{currentUserRole}</span></p>
                                    <p className="text-sm text-gray-400">
                                        {canManageUsers ? 'Full user management access' : 'View-only access to user directory'}
                                    </p>
                                </div>
                            </div>
                            <a href="missionpulse-task16-rbac.html" className="text-cyan text-sm hover:underline">RBAC Settings →</a>
                        </div>
                    </div>

                    {/* Stats */}
                    <div className="grid grid-cols-4 gap-4 mb-6">
                        <div className="glass rounded-lg p-4 text-center">
                            <p className="text-2xl font-bold text-cyan">{users.length}</p>
                            <p className="text-gray-400 text-sm">Total Users</p>
                        </div>
                        <div className="glass rounded-lg p-4 text-center">
                            <p className="text-2xl font-bold text-green-400">{users.filter(u => u.isActive).length}</p>
                            <p className="text-gray-400 text-sm">Active</p>
                        </div>
                        <div className="glass rounded-lg p-4 text-center">
                            <p className="text-2xl font-bold text-gray-400">{users.filter(u => !u.isActive).length}</p>
                            <p className="text-gray-400 text-sm">Inactive</p>
                        </div>
                        <div className="glass rounded-lg p-4 text-center">
                            <p className="text-2xl font-bold text-purple-400">{users.filter(u => u.role === 'Partner').length}</p>
                            <p className="text-gray-400 text-sm">Partners</p>
                        </div>
                    </div>

                    {/* Filters */}
                    <div className="glass rounded-xl p-4 mb-6">
                        <div className="flex flex-wrap gap-4">
                            <input type="text" placeholder="Search users..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
                                className="flex-1 min-w-[200px] bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan" />
                            <select value={filterRole} onChange={e => setFilterRole(e.target.value)}
                                className="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white">
                                <option value="all">All Roles</option>
                                {ROLES.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                            </select>
                            <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}
                                className="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white">
                                <option value="all">All Status</option>
                                <option value="active">Active</option>
                                <option value="inactive">Inactive</option>
                            </select>
                        </div>
                    </div>

                    {/* User Table */}
                    <div className="glass rounded-xl overflow-hidden">
                        <table className="w-full">
                            <thead className="bg-white/5">
                                <tr>
                                    <th className="text-left p-4 text-gray-400 font-medium">User</th>
                                    <th className="text-left p-4 text-gray-400 font-medium">Role</th>
                                    <th className="text-left p-4 text-gray-400 font-medium">Status</th>
                                    <th className="text-left p-4 text-gray-400 font-medium">Last Active</th>
                                    {canManageUsers && <th className="p-4"></th>}
                                </tr>
                            </thead>
                            <tbody>
                                {filtered.map(user => (
                                    <tr key={user.id} className="border-t border-white/5 hover:bg-white/5">
                                        <td className="p-4">
                                            <div className="flex items-center gap-3">
                                                <div className="w-10 h-10 rounded-full bg-cyan/20 flex items-center justify-center text-cyan font-bold">
                                                    {(user.fullName || user.email || '?')[0].toUpperCase()}
                                                </div>
                                                <div>
                                                    <p className="font-medium text-white">{user.fullName || 'Unknown'}</p>
                                                    <p className="text-sm text-gray-400">{user.email}</p>
                                                </div>
                                            </div>
                                        </td>
                                        <td className="p-4">
                                            <span className={`px-2 py-1 rounded text-xs font-medium ${getRoleBadgeColor(user.role)}`}>
                                                {user.role || 'Unassigned'}
                                            </span>
                                        </td>
                                        <td className="p-4">
                                            <span className={`flex items-center gap-2 ${user.isActive ? 'text-green-400' : 'text-gray-500'}`}>
                                                <span className={`w-2 h-2 rounded-full ${user.isActive ? 'bg-green-400' : 'bg-gray-500'}`}></span>
                                                {user.isActive ? 'Active' : 'Inactive'}
                                            </span>
                                        </td>
                                        <td className="p-4 text-gray-400 text-sm">
                                            {user.lastActiveAt ? new Date(user.lastActiveAt).toLocaleDateString() : 'Never'}
                                        </td>
                                        {canManageUsers && (
                                            <td className="p-4">
                                                <div className="flex gap-2">
                                                    <button onClick={() => { setEditingUser(user); setShowModal(true); }} className="text-cyan hover:text-white">Edit</button>
                                                    <button onClick={() => handleToggleStatus(user)} className="text-yellow-400 hover:text-yellow-300">
                                                        {user.isActive ? 'Disable' : 'Enable'}
                                                    </button>
                                                    <button onClick={() => handleDelete(user.id)} className="text-red-400 hover:text-red-300">Remove</button>
                                                </div>
                                            </td>
                                        )}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {filtered.length === 0 && <div className="p-8 text-center text-gray-500">No users found.</div>}
                    </div>

                    {/* Roles Reference */}
                    <div className="glass rounded-xl p-6 mt-6">
                        <h3 className="text-lg font-semibold text-white mb-4">Shipley Roles Reference</h3>
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                            {ROLES.map(role => (
                                <div key={role.id} className="bg-white/5 rounded-lg p-3">
                                    <p className="font-medium text-white">{role.name}</p>
                                    <p className="text-xs text-gray-400 mt-1">{role.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Modal */}
                    {showModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                            <div className="glass rounded-xl p-6 w-full max-w-lg">
                                <h2 className="text-xl font-bold mb-4">{editingUser ? 'Edit User' : 'Invite User'}</h2>
                                <UserForm initial={editingUser} onSave={handleSave} onCancel={() => { setShowModal(false); setEditingUser(null); }} />
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function UserForm({ initial, onSave, onCancel }) {
            const [form, setForm] = useState({
                fullName: initial?.fullName || '',
                email: initial?.email || '',
                role: initial?.role || 'PM',
                isActive: initial?.isActive ?? true
            });

            const handleSubmit = (e) => { e.preventDefault(); onSave(form); };

            return (
                <form onSubmit={handleSubmit} className="space-y-4">
                    <div>
                        <label className="block text-sm text-gray-400 mb-1">Full Name *</label>
                        <input type="text" required value={form.fullName} onChange={e => setForm({...form, fullName: e.target.value})}
                            className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white" />
                    </div>
                    <div>
                        <label className="block text-sm text-gray-400 mb-1">Email *</label>
                        <input type="email" required value={form.email} onChange={e => setForm({...form, email: e.target.value})}
                            className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white" />
                    </div>
                    <div>
                        <label className="block text-sm text-gray-400 mb-1">Role *</label>
                        <select value={form.role} onChange={e => setForm({...form, role: e.target.value})}
                            className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white">
                            {ROLES.map(r => <option key={r.id} value={r.id}>{r.name} - {r.desc}</option>)}
                        </select>
                    </div>
                    <div className="flex items-center gap-2">
                        <input type="checkbox" id="active" checked={form.isActive} onChange={e => setForm({...form, isActive: e.target.checked})}
                            className="w-4 h-4 rounded" />
                        <label htmlFor="active" className="text-sm text-gray-400">Account Active</label>
                    </div>
                    <div className="flex gap-3 pt-4">
                        <button type="submit" className="flex-1 bg-cyan text-black py-2 rounded-lg font-medium hover:bg-cyan/80">
                            {initial ? 'Save Changes' : 'Send Invite'}
                        </button>
                        <button type="button" onClick={onCancel} className="flex-1 bg-white/10 py-2 rounded-lg hover:bg-white/20">Cancel</button>
                    </div>
                </form>
            );
        }

        ReactDOM.render(<UserManagement />, document.getElementById('root'));
    </script>
</body>
</html>
