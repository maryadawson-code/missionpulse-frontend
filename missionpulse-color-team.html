<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Team Reviews | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
        .glass-card:hover { border-color: rgba(0,229,250,0.3); box-shadow: 0 0 30px rgba(0,229,250,0.1); }
        .cyan-glow { text-shadow: 0 0 20px rgba(0,229,250,0.5); }
        .gradient-border { background: linear-gradient(135deg, rgba(0,229,250,0.2), rgba(16,185,129,0.2)); }
        .color-pink { background: linear-gradient(135deg, #ec4899, #db2777); }
        .color-red { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .color-gold { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .color-white { background: linear-gradient(135deg, #f8fafc, #e2e8f0); color: #1e293b; }
        .color-blue { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .color-green { background: linear-gradient(135deg, #10b981, #059669); }
        .status-scheduled { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .status-in_progress { background: rgba(245,158,11,0.2); color: #fbbf24; }
        .status-completed { background: rgba(16,185,129,0.2); color: #34d399; }
        .status-cancelled { background: rgba(239,68,68,0.2); color: #f87171; }
        .pulse-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="text-white font-sans">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const supabaseUrl = 'https://djuviwarqdvlbgcfuupa.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0NDQ0NjUsImV4cCI6MjA4NTAyMDQ2NX0.3s8ufDDN2aWfkW0RBsAyJyacb2tjB7M550WSFIohHcA';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const demoReviews = [
            { id: '1', review_type: 'pink', review_name: 'Pink Team - Outline Review', scheduled_date: '2026-02-10T09:00:00Z', duration_hours: 4, location: 'Conference Room A', lead_reviewer: 'Sarah Chen', reviewers: ['Mike Johnson', 'Lisa Park'], status: 'completed', score_technical: 72, score_management: 68, score_compliance: 85, overall_recommendation: 'proceed_with_changes', findings: [{type: 'major', text: 'Technical approach needs more detail on AI integration'}], action_items: [{text: 'Expand Section 3.2', assignee: 'Tech Lead', due: '2026-02-12', status: 'completed'}], opportunity_title: 'DHA MHS GENESIS Support' },
            { id: '2', review_type: 'red', review_name: 'Red Team - Full Draft Review', scheduled_date: '2026-02-15T10:00:00Z', duration_hours: 8, location: 'Virtual - Teams', lead_reviewer: 'James Wilson', reviewers: ['Emily Brown', 'David Lee', 'Anna Martinez'], status: 'scheduled', findings: [], action_items: [], opportunity_title: 'DHA MHS GENESIS Support' },
            { id: '3', review_type: 'gold', review_name: 'Gold Team - Final Review', scheduled_date: '2026-02-20T09:00:00Z', duration_hours: 6, location: 'Executive Boardroom', lead_reviewer: 'CEO Review', reviewers: ['Mary Womack', 'Board Members'], status: 'scheduled', findings: [], action_items: [], opportunity_title: 'DHA MHS GENESIS Support' },
            { id: '4', review_type: 'pink', review_name: 'Pink Team - VA Claims', scheduled_date: '2026-02-08T14:00:00Z', duration_hours: 3, location: 'Virtual', lead_reviewer: 'Tom Richards', reviewers: ['Karen White'], status: 'completed', score_technical: 78, score_management: 82, score_compliance: 90, overall_recommendation: 'proceed', findings: [{type: 'minor', text: 'Consider adding more past performance references'}], action_items: [{text: 'Add 2 more past performance citations', assignee: 'Capture Manager', due: '2026-02-10', status: 'completed'}], opportunity_title: 'VA Claims Processing Modernization' },
            { id: '5', review_type: 'blue', review_name: 'Blue Team - Pricing Review', scheduled_date: '2026-02-18T11:00:00Z', duration_hours: 4, location: 'Finance Conference Room', lead_reviewer: 'CFO', reviewers: ['Finance Team', 'Pricing Analyst'], status: 'scheduled', findings: [], action_items: [], opportunity_title: 'CMS Data Analytics Platform' },
        ];

        const demoOpportunities = [
            { id: '1', title: 'DHA MHS GENESIS Support', nickname: 'GENESIS' },
            { id: '2', title: 'VA Claims Processing Modernization', nickname: 'VA Claims' },
            { id: '3', title: 'CMS Data Analytics Platform', nickname: 'CMS Analytics' },
        ];

        const reviewTypeConfig = {
            pink: { label: 'Pink Team', desc: 'Outline/Storyboard Review', icon: 'fa-file-alt', class: 'color-pink' },
            red: { label: 'Red Team', desc: 'Full Draft Review', icon: 'fa-users', class: 'color-red' },
            gold: { label: 'Gold Team', desc: 'Executive Final Review', icon: 'fa-crown', class: 'color-gold' },
            white_glove: { label: 'White Glove', desc: 'Premium Quality Check', icon: 'fa-gem', class: 'color-white' },
            blue: { label: 'Blue Team', desc: 'Pricing/Cost Review', icon: 'fa-dollar-sign', class: 'color-blue' },
            green: { label: 'Green Team', desc: 'Compliance Review', icon: 'fa-shield-alt', class: 'color-green' },
        };

        const statusConfig = {
            scheduled: { label: 'Scheduled', icon: 'fa-calendar' },
            in_progress: { label: 'In Progress', icon: 'fa-play-circle' },
            completed: { label: 'Completed', icon: 'fa-check-circle' },
            cancelled: { label: 'Cancelled', icon: 'fa-times-circle' },
            rescheduled: { label: 'Rescheduled', icon: 'fa-clock' },
        };

        function App() {
            const [reviews, setReviews] = useState([]);
            const [opportunities, setOpportunities] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedReview, setSelectedReview] = useState(null);
            const [showModal, setShowModal] = useState(false);
            const [filterType, setFilterType] = useState('all');
            const [filterStatus, setFilterStatus] = useState('all');

            useEffect(() => {
                loadData();
            }, []);

            async function loadData() {
                try {
                    const [reviewsRes, oppsRes] = await Promise.all([
                        supabase.from('color_team_reviews').select('*, opportunities(title, nickname)').order('scheduled_date', { ascending: true }),
                        supabase.from('opportunities').select('id, title, nickname')
                    ]);
                    
                    if (reviewsRes.data?.length > 0) {
                        setReviews(reviewsRes.data.map(r => ({...r, opportunity_title: r.opportunities?.title || r.opportunities?.nickname})));
                    } else {
                        setReviews(demoReviews);
                    }
                    setOpportunities(oppsRes.data?.length > 0 ? oppsRes.data : demoOpportunities);
                } catch (err) {
                    console.log('Using demo data');
                    setReviews(demoReviews);
                    setOpportunities(demoOpportunities);
                }
                setLoading(false);
            }

            const filteredReviews = reviews.filter(r => {
                if (filterType !== 'all' && r.review_type !== filterType) return false;
                if (filterStatus !== 'all' && r.status !== filterStatus) return false;
                return true;
            });

            const upcomingReviews = filteredReviews.filter(r => r.status === 'scheduled' || r.status === 'in_progress');
            const completedReviews = filteredReviews.filter(r => r.status === 'completed');

            const stats = {
                total: reviews.length,
                scheduled: reviews.filter(r => r.status === 'scheduled').length,
                completed: reviews.filter(r => r.status === 'completed').length,
                avgScore: reviews.filter(r => r.score_technical).reduce((acc, r) => acc + (r.score_technical + (r.score_management || 0) + (r.score_compliance || 0)) / 3, 0) / (reviews.filter(r => r.score_technical).length || 1)
            };

            function formatDate(dateStr) {
                if (!dateStr) return 'TBD';
                return new Date(dateStr).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            }

            function ScoreBar({ score, label }) {
                const color = score >= 80 ? 'bg-emerald-500' : score >= 60 ? 'bg-amber-500' : 'bg-red-500';
                return (
                    <div className="mb-2">
                        <div className="flex justify-between text-xs mb-1">
                            <span className="text-gray-400">{label}</span>
                            <span className="text-white font-medium">{score || 'N/A'}%</span>
                        </div>
                        <div className="h-2 bg-gray-700 rounded-full overflow-hidden">
                            <div className={`h-full ${color} transition-all duration-500`} style={{width: `${score || 0}%`}}></div>
                        </div>
                    </div>
                );
            }

            function ReviewCard({ review }) {
                const config = reviewTypeConfig[review.review_type] || reviewTypeConfig.pink;
                const statusCfg = statusConfig[review.status] || statusConfig.scheduled;
                const isUpcoming = new Date(review.scheduled_date) > new Date();
                
                return (
                    <div className="glass-card rounded-xl p-5 hover:scale-[1.02] transition-all cursor-pointer" onClick={() => { setSelectedReview(review); setShowModal(true); }}>
                        <div className="flex items-start justify-between mb-4">
                            <div className={`${config.class} w-12 h-12 rounded-xl flex items-center justify-center`}>
                                <i className={`fas ${config.icon} text-xl`}></i>
                            </div>
                            <span className={`status-${review.status} px-3 py-1 rounded-full text-xs font-medium flex items-center gap-1`}>
                                {review.status === 'in_progress' && <span className="w-2 h-2 bg-amber-400 rounded-full pulse-dot"></span>}
                                <i className={`fas ${statusCfg.icon} mr-1`}></i>
                                {statusCfg.label}
                            </span>
                        </div>
                        
                        <h3 className="text-white font-semibold mb-1">{review.review_name}</h3>
                        <p className="text-cyan-400 text-sm mb-3">{review.opportunity_title}</p>
                        
                        <div className="space-y-2 text-sm text-gray-400">
                            <div className="flex items-center gap-2">
                                <i className="fas fa-calendar w-4"></i>
                                <span>{formatDate(review.scheduled_date)}</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <i className="fas fa-clock w-4"></i>
                                <span>{review.duration_hours} hours</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <i className="fas fa-map-marker-alt w-4"></i>
                                <span>{review.location}</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <i className="fas fa-user-tie w-4"></i>
                                <span>{review.lead_reviewer}</span>
                            </div>
                        </div>

                        {review.score_technical && (
                            <div className="mt-4 pt-4 border-t border-gray-700">
                                <ScoreBar score={review.score_technical} label="Technical" />
                                <ScoreBar score={review.score_management} label="Management" />
                                <ScoreBar score={review.score_compliance} label="Compliance" />
                            </div>
                        )}

                        {review.overall_recommendation && (
                            <div className="mt-3 pt-3 border-t border-gray-700">
                                <span className={`text-xs font-medium px-2 py-1 rounded ${
                                    review.overall_recommendation === 'proceed' ? 'bg-emerald-500/20 text-emerald-400' :
                                    review.overall_recommendation === 'proceed_with_changes' ? 'bg-amber-500/20 text-amber-400' :
                                    'bg-red-500/20 text-red-400'
                                }`}>
                                    {review.overall_recommendation.replace(/_/g, ' ').toUpperCase()}
                                </span>
                            </div>
                        )}

                        {review.findings?.length > 0 && (
                            <div className="mt-3 flex items-center gap-2 text-xs text-gray-400">
                                <i className="fas fa-exclamation-triangle text-amber-400"></i>
                                <span>{review.findings.length} finding{review.findings.length > 1 ? 's' : ''}</span>
                                {review.action_items?.length > 0 && (
                                    <>
                                        <span>•</span>
                                        <i className="fas fa-tasks text-cyan-400"></i>
                                        <span>{review.action_items.length} action item{review.action_items.length > 1 ? 's' : ''}</span>
                                    </>
                                )}
                            </div>
                        )}
                    </div>
                );
            }

            function ReviewModal() {
                if (!selectedReview) return null;
                const config = reviewTypeConfig[selectedReview.review_type] || reviewTypeConfig.pink;
                
                return (
                    <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4" onClick={() => setShowModal(false)}>
                        <div className="glass-card rounded-2xl p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                            <div className="flex items-start justify-between mb-6">
                                <div className="flex items-center gap-4">
                                    <div className={`${config.class} w-14 h-14 rounded-xl flex items-center justify-center`}>
                                        <i className={`fas ${config.icon} text-2xl`}></i>
                                    </div>
                                    <div>
                                        <h2 className="text-xl font-bold text-white">{selectedReview.review_name}</h2>
                                        <p className="text-cyan-400">{selectedReview.opportunity_title}</p>
                                    </div>
                                </div>
                                <button onClick={() => setShowModal(false)} className="text-gray-400 hover:text-white">
                                    <i className="fas fa-times text-xl"></i>
                                </button>
                            </div>

                            <div className="grid grid-cols-2 gap-4 mb-6">
                                <div className="glass-card rounded-lg p-4">
                                    <div className="text-gray-400 text-sm mb-1">Scheduled</div>
                                    <div className="text-white font-medium">{formatDate(selectedReview.scheduled_date)}</div>
                                </div>
                                <div className="glass-card rounded-lg p-4">
                                    <div className="text-gray-400 text-sm mb-1">Duration</div>
                                    <div className="text-white font-medium">{selectedReview.duration_hours} hours</div>
                                </div>
                                <div className="glass-card rounded-lg p-4">
                                    <div className="text-gray-400 text-sm mb-1">Location</div>
                                    <div className="text-white font-medium">{selectedReview.location}</div>
                                </div>
                                <div className="glass-card rounded-lg p-4">
                                    <div className="text-gray-400 text-sm mb-1">Lead Reviewer</div>
                                    <div className="text-white font-medium">{selectedReview.lead_reviewer}</div>
                                </div>
                            </div>

                            {selectedReview.reviewers?.length > 0 && (
                                <div className="mb-6">
                                    <h3 className="text-white font-semibold mb-3">Review Team</h3>
                                    <div className="flex flex-wrap gap-2">
                                        {selectedReview.reviewers.map((r, i) => (
                                            <span key={i} className="bg-gray-700/50 px-3 py-1 rounded-full text-sm text-gray-300">
                                                <i className="fas fa-user mr-2"></i>{r}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {selectedReview.score_technical && (
                                <div className="mb-6">
                                    <h3 className="text-white font-semibold mb-3">Scores</h3>
                                    <div className="glass-card rounded-lg p-4">
                                        <ScoreBar score={selectedReview.score_technical} label="Technical Approach" />
                                        <ScoreBar score={selectedReview.score_management} label="Management Approach" />
                                        <ScoreBar score={selectedReview.score_pricing} label="Pricing" />
                                        <ScoreBar score={selectedReview.score_compliance} label="Compliance" />
                                    </div>
                                </div>
                            )}

                            {selectedReview.findings?.length > 0 && (
                                <div className="mb-6">
                                    <h3 className="text-white font-semibold mb-3">Findings</h3>
                                    <div className="space-y-2">
                                        {selectedReview.findings.map((f, i) => (
                                            <div key={i} className={`glass-card rounded-lg p-3 border-l-4 ${f.type === 'major' ? 'border-red-500' : 'border-amber-500'}`}>
                                                <span className={`text-xs font-medium ${f.type === 'major' ? 'text-red-400' : 'text-amber-400'}`}>
                                                    {f.type?.toUpperCase() || 'FINDING'}
                                                </span>
                                                <p className="text-gray-300 text-sm mt-1">{f.text}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {selectedReview.action_items?.length > 0 && (
                                <div className="mb-6">
                                    <h3 className="text-white font-semibold mb-3">Action Items</h3>
                                    <div className="space-y-2">
                                        {selectedReview.action_items.map((a, i) => (
                                            <div key={i} className="glass-card rounded-lg p-3 flex items-start gap-3">
                                                <div className={`w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0 ${a.status === 'completed' ? 'bg-emerald-500' : 'bg-gray-600'}`}>
                                                    <i className={`fas ${a.status === 'completed' ? 'fa-check' : 'fa-clock'} text-xs text-white`}></i>
                                                </div>
                                                <div className="flex-1">
                                                    <p className="text-gray-300 text-sm">{a.text}</p>
                                                    <div className="flex items-center gap-4 mt-1 text-xs text-gray-500">
                                                        <span><i className="fas fa-user mr-1"></i>{a.assignee}</span>
                                                        <span><i className="fas fa-calendar mr-1"></i>{a.due}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="flex gap-3">
                                <button className="flex-1 bg-cyan-500 hover:bg-cyan-600 text-white py-3 rounded-lg font-medium transition-colors">
                                    <i className="fas fa-edit mr-2"></i>Edit Review
                                </button>
                                <button className="flex-1 glass-card hover:bg-white/10 text-white py-3 rounded-lg font-medium transition-colors">
                                    <i className="fas fa-file-export mr-2"></i>Export Report
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <i className="fas fa-spinner fa-spin text-4xl text-cyan-400 mb-4"></i>
                            <p className="text-gray-400">Loading Color Team Reviews...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-6">
                    {/* Header */}
                    <div className="flex items-center justify-between mb-8">
                        <div className="flex items-center gap-4">
                            <a href="index.html" className="text-gray-400 hover:text-cyan-400 transition-colors">
                                <i className="fas fa-arrow-left text-xl"></i>
                            </a>
                            <div>
                                <h1 className="text-3xl font-bold text-white cyan-glow">Color Team Reviews</h1>
                                <p className="text-gray-400">Schedule and manage proposal review cycles</p>
                            </div>
                        </div>
                        <button className="bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-600 hover:to-blue-600 text-white px-6 py-3 rounded-lg font-medium transition-all flex items-center gap-2">
                            <i className="fas fa-plus"></i>
                            Schedule Review
                        </button>
                    </div>

                    {/* Stats */}
                    <div className="grid grid-cols-4 gap-4 mb-8">
                        <div className="glass-card rounded-xl p-5">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-gray-400 text-sm">Total Reviews</span>
                                <i className="fas fa-layer-group text-cyan-400"></i>
                            </div>
                            <div className="text-3xl font-bold text-white">{stats.total}</div>
                        </div>
                        <div className="glass-card rounded-xl p-5">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-gray-400 text-sm">Scheduled</span>
                                <i className="fas fa-calendar-alt text-blue-400"></i>
                            </div>
                            <div className="text-3xl font-bold text-white">{stats.scheduled}</div>
                        </div>
                        <div className="glass-card rounded-xl p-5">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-gray-400 text-sm">Completed</span>
                                <i className="fas fa-check-circle text-emerald-400"></i>
                            </div>
                            <div className="text-3xl font-bold text-white">{stats.completed}</div>
                        </div>
                        <div className="glass-card rounded-xl p-5">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-gray-400 text-sm">Avg Score</span>
                                <i className="fas fa-chart-line text-amber-400"></i>
                            </div>
                            <div className="text-3xl font-bold text-white">{stats.avgScore.toFixed(0)}%</div>
                        </div>
                    </div>

                    {/* Review Type Legend */}
                    <div className="flex flex-wrap gap-3 mb-6">
                        {Object.entries(reviewTypeConfig).map(([key, cfg]) => (
                            <button
                                key={key}
                                onClick={() => setFilterType(filterType === key ? 'all' : key)}
                                className={`flex items-center gap-2 px-4 py-2 rounded-lg transition-all ${filterType === key ? 'ring-2 ring-cyan-400' : 'opacity-70 hover:opacity-100'}`}
                            >
                                <div className={`${cfg.class} w-8 h-8 rounded-lg flex items-center justify-center`}>
                                    <i className={`fas ${cfg.icon} text-sm`}></i>
                                </div>
                                <span className="text-sm text-white">{cfg.label}</span>
                            </button>
                        ))}
                    </div>

                    {/* Filters */}
                    <div className="flex gap-4 mb-6">
                        <select 
                            value={filterStatus} 
                            onChange={e => setFilterStatus(e.target.value)}
                            className="bg-gray-800/50 border border-gray-700 rounded-lg px-4 py-2 text-white focus:border-cyan-400 focus:outline-none"
                        >
                            <option value="all">All Statuses</option>
                            {Object.entries(statusConfig).map(([key, cfg]) => (
                                <option key={key} value={key}>{cfg.label}</option>
                            ))}
                        </select>
                    </div>

                    {/* Upcoming Reviews */}
                    {upcomingReviews.length > 0 && (
                        <div className="mb-8">
                            <h2 className="text-xl font-semibold text-white mb-4 flex items-center gap-2">
                                <i className="fas fa-calendar-check text-cyan-400"></i>
                                Upcoming Reviews
                            </h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {upcomingReviews.map(review => (
                                    <ReviewCard key={review.id} review={review} />
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Completed Reviews */}
                    {completedReviews.length > 0 && (
                        <div>
                            <h2 className="text-xl font-semibold text-white mb-4 flex items-center gap-2">
                                <i className="fas fa-history text-emerald-400"></i>
                                Completed Reviews
                            </h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {completedReviews.map(review => (
                                    <ReviewCard key={review.id} review={review} />
                                ))}
                            </div>
                        </div>
                    )}

                    {filteredReviews.length === 0 && (
                        <div className="text-center py-16 glass-card rounded-xl">
                            <i className="fas fa-calendar-times text-4xl text-gray-600 mb-4"></i>
                            <p className="text-gray-400">No reviews found matching your filters</p>
                        </div>
                    )}

                    {/* Modal */}
                    {showModal && <ReviewModal />}

                    {/* Footer */}
                    <footer className="mt-12 pt-6 border-t border-gray-800 text-center text-gray-500 text-sm">
                        © 2026 Mission Meets Tech • MissionPulse v2.0 • Sprint 66
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
