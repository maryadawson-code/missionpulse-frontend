<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposal Calendar | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.15); }
        .timeline-line { position: absolute; left: 20px; top: 40px; bottom: 0; width: 2px; background: linear-gradient(180deg, #00E5FA 0%, rgba(0,229,250,0.2) 100%); }
    </style>
</head>
<body class="min-h-screen text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const supabaseUrl = 'https://djuviwarqdvlbgcfuupa.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc0OTc5MzMsImV4cCI6MjA1MzA3MzkzM30.pBPpVaJmVkzhCcUvJPN2KnMGnstuc55sNv8CVsERRPg';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const DEMO_CALENDAR = {
            id: '1',
            calendar_name: 'DHA MHS Genesis AI Support',
            rfp_release_date: '2026-01-15',
            proposal_due_date: '2026-03-15',
            questions_due_date: '2026-02-01',
            orals_date: '2026-04-10',
            award_date: '2026-05-01',
            status: 'active',
            milestones: [
                { id: 'm1', milestone_name: 'RFP Release', milestone_type: 'government', due_date: '2026-01-15', status: 'completed', color: '#10B981', owner: 'Government' },
                { id: 'm2', milestone_name: 'Kick-off Meeting', milestone_type: 'internal', due_date: '2026-01-16', status: 'completed', color: '#00E5FA', owner: 'Capture Lead' },
                { id: 'm3', milestone_name: 'Questions Due to Government', milestone_type: 'government', due_date: '2026-02-01', status: 'completed', color: '#F59E0B', owner: 'Contracts' },
                { id: 'm4', milestone_name: 'Pink Team Review', milestone_type: 'review', due_date: '2026-02-10', status: 'completed', color: '#EC4899', owner: 'PM' },
                { id: 'm5', milestone_name: 'Government Q&A Response', milestone_type: 'government', due_date: '2026-02-15', status: 'completed', color: '#10B981', owner: 'Government' },
                { id: 'm6', milestone_name: 'Red Team Review', milestone_type: 'review', due_date: '2026-02-25', status: 'in_progress', color: '#EF4444', owner: 'PM' },
                { id: 'm7', milestone_name: 'Gold Team Review', milestone_type: 'review', due_date: '2026-03-05', status: 'pending', color: '#F59E0B', owner: 'Executive' },
                { id: 'm8', milestone_name: 'Final Production', milestone_type: 'internal', due_date: '2026-03-12', status: 'pending', color: '#00E5FA', owner: 'Production' },
                { id: 'm9', milestone_name: 'Proposal Due', milestone_type: 'government', due_date: '2026-03-15', status: 'pending', color: '#EF4444', owner: 'Contracts' },
                { id: 'm10', milestone_name: 'Orals Preparation', milestone_type: 'internal', due_date: '2026-03-20', status: 'pending', color: '#8B5CF6', owner: 'Orals Lead' },
                { id: 'm11', milestone_name: 'Oral Presentations', milestone_type: 'government', due_date: '2026-04-10', status: 'pending', color: '#8B5CF6', owner: 'Orals Team' },
                { id: 'm12', milestone_name: 'Expected Award', milestone_type: 'government', due_date: '2026-05-01', status: 'pending', color: '#10B981', owner: 'Government' }
            ]
        };

        const MILESTONE_TYPES = ['government', 'internal', 'review', 'deliverable'];

        function ProposalCalendar() {
            const [calendar, setCalendar] = useState(null);
            const [loading, setLoading] = useState(true);
            const [viewMode, setViewMode] = useState('timeline');
            const [showModal, setShowModal] = useState(false);
            const [newMilestone, setNewMilestone] = useState({ milestone_name: '', milestone_type: 'internal', due_date: '', owner: '', color: '#00E5FA' });

            useEffect(() => { fetchCalendar(); }, []);

            async function fetchCalendar() {
                try {
                    const { data, error } = await supabase.from('proposal_calendar').select('*').limit(1).single();
                    if (error) throw error;
                    setCalendar(data ? { ...data, milestones: [] } : DEMO_CALENDAR);
                } catch (err) {
                    console.log('Using demo data:', err.message);
                    setCalendar(DEMO_CALENDAR);
                }
                setLoading(false);
            }

            function handleAddMilestone() {
                const milestone = { id: `m${Date.now()}`, ...newMilestone, status: 'pending' };
                const milestones = [...calendar.milestones, milestone].sort((a, b) => new Date(a.due_date) - new Date(b.due_date));
                setCalendar({ ...calendar, milestones });
                setShowModal(false);
                setNewMilestone({ milestone_name: '', milestone_type: 'internal', due_date: '', owner: '', color: '#00E5FA' });
            }

            function handleStatusChange(id, status) {
                const milestones = calendar.milestones.map(m => m.id === id ? { ...m, status } : m);
                setCalendar({ ...calendar, milestones });
            }

            function getDaysUntil(date) {
                const today = new Date();
                const target = new Date(date);
                const diff = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
                return diff;
            }

            function formatDate(date) {
                return new Date(date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            }

            const statusColor = (status) => ({
                'completed': 'bg-emerald-500',
                'in_progress': 'bg-cyan-500',
                'pending': 'bg-gray-500',
                'overdue': 'bg-red-500'
            }[status] || 'bg-gray-500');

            const typeIcon = (type) => ({
                'government': '🏛️',
                'internal': '🏢',
                'review': '📋',
                'deliverable': '📦'
            }[type] || '📌');

            if (loading) {
                return <div className="min-h-screen flex items-center justify-center text-gray-400">Loading...</div>;
            }

            const upcomingMilestones = calendar.milestones.filter(m => m.status !== 'completed').slice(0, 5);
            const completedCount = calendar.milestones.filter(m => m.status === 'completed').length;
            const progressPercent = Math.round((completedCount / calendar.milestones.length) * 100);

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="border-b border-cyan-500/20 bg-black/40 backdrop-blur-xl sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <a href="index.html" className="text-cyan-400 hover:text-cyan-300">← Back</a>
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-indigo-400 to-purple-600 flex items-center justify-center text-xl">📅</div>
                                    <div>
                                        <h1 className="text-xl font-bold">Proposal Calendar</h1>
                                        <p className="text-xs text-gray-400">Track Milestones • Meet Deadlines</p>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="flex bg-white/10 rounded-lg p-1">
                                    <button onClick={() => setViewMode('timeline')} className={`px-3 py-1 rounded text-sm ${viewMode === 'timeline' ? 'bg-cyan-500 text-white' : 'text-gray-400'}`}>Timeline</button>
                                    <button onClick={() => setViewMode('list')} className={`px-3 py-1 rounded text-sm ${viewMode === 'list' ? 'bg-cyan-500 text-white' : 'text-gray-400'}`}>List</button>
                                </div>
                                <button onClick={() => setShowModal(true)} className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium transition-all">
                                    + Milestone
                                </button>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto px-6 py-8">
                        {/* Calendar Header */}
                        <div className="glass-card rounded-xl p-6 mb-6">
                            <div className="flex items-center justify-between mb-4">
                                <div>
                                    <h2 className="text-xl font-bold">{calendar.calendar_name}</h2>
                                    <p className="text-gray-400 text-sm">Proposal Due: {formatDate(calendar.proposal_due_date)}</p>
                                </div>
                                <div className="text-right">
                                    <div className="text-3xl font-bold text-cyan-400">{getDaysUntil(calendar.proposal_due_date)}</div>
                                    <div className="text-xs text-gray-500">Days Until Due</div>
                                </div>
                            </div>
                            <div className="mb-2 flex items-center justify-between text-sm">
                                <span className="text-gray-400">Progress</span>
                                <span className="text-cyan-400">{completedCount}/{calendar.milestones.length} milestones</span>
                            </div>
                            <div className="h-3 bg-white/10 rounded-full overflow-hidden">
                                <div className="h-full bg-gradient-to-r from-cyan-500 to-emerald-500 transition-all" style={{ width: `${progressPercent}%` }}></div>
                            </div>
                        </div>

                        {/* Key Dates */}
                        <div className="grid grid-cols-5 gap-4 mb-6">
                            {[
                                { label: 'RFP Release', date: calendar.rfp_release_date, icon: '📄' },
                                { label: 'Questions Due', date: calendar.questions_due_date, icon: '❓' },
                                { label: 'Proposal Due', date: calendar.proposal_due_date, icon: '📨' },
                                { label: 'Orals', date: calendar.orals_date, icon: '🎤' },
                                { label: 'Award', date: calendar.award_date, icon: '🏆' }
                            ].map((item, idx) => (
                                <div key={idx} className="glass-card rounded-xl p-4 text-center">
                                    <div className="text-2xl mb-1">{item.icon}</div>
                                    <div className="text-xs text-gray-500 mb-1">{item.label}</div>
                                    <div className="font-medium text-sm">{item.date ? formatDate(item.date) : 'TBD'}</div>
                                </div>
                            ))}
                        </div>

                        <div className="grid lg:grid-cols-3 gap-6">
                            {/* Timeline View */}
                            <div className="lg:col-span-2">
                                {viewMode === 'timeline' ? (
                                    <div className="glass-card rounded-xl p-6">
                                        <h3 className="font-semibold mb-6">Milestone Timeline</h3>
                                        <div className="relative">
                                            <div className="timeline-line"></div>
                                            <div className="space-y-4">
                                                {calendar.milestones.map((milestone, idx) => {
                                                    const daysUntil = getDaysUntil(milestone.due_date);
                                                    const isOverdue = daysUntil < 0 && milestone.status !== 'completed';
                                                    return (
                                                        <div key={milestone.id} className="relative pl-12">
                                                            <div className={`absolute left-3 w-6 h-6 rounded-full flex items-center justify-center text-xs ${milestone.status === 'completed' ? 'bg-emerald-500' : isOverdue ? 'bg-red-500' : 'bg-white/20'}`}
                                                                style={{ backgroundColor: milestone.status === 'completed' ? '#10B981' : isOverdue ? '#EF4444' : milestone.color }}>
                                                                {milestone.status === 'completed' ? '✓' : idx + 1}
                                                            </div>
                                                            <div className={`p-4 rounded-lg border transition-all ${milestone.status === 'completed' ? 'bg-emerald-500/10 border-emerald-500/30' : isOverdue ? 'bg-red-500/10 border-red-500/30' : 'bg-white/5 border-white/10 hover:border-cyan-500/30'}`}>
                                                                <div className="flex items-center justify-between mb-1">
                                                                    <div className="flex items-center gap-2">
                                                                        <span>{typeIcon(milestone.milestone_type)}</span>
                                                                        <span className="font-medium">{milestone.milestone_name}</span>
                                                                    </div>
                                                                    <select value={milestone.status} onChange={(e) => handleStatusChange(milestone.id, e.target.value)}
                                                                        className="bg-transparent border border-white/20 rounded px-2 py-1 text-xs">
                                                                        <option value="pending">Pending</option>
                                                                        <option value="in_progress">In Progress</option>
                                                                        <option value="completed">Completed</option>
                                                                    </select>
                                                                </div>
                                                                <div className="flex items-center justify-between text-sm">
                                                                    <span className="text-gray-500">{milestone.owner}</span>
                                                                    <span className={isOverdue ? 'text-red-400' : daysUntil <= 3 ? 'text-amber-400' : 'text-gray-400'}>
                                                                        {formatDate(milestone.due_date)} {isOverdue ? `(${Math.abs(daysUntil)}d overdue)` : daysUntil === 0 ? '(Today!)' : `(${daysUntil}d)`}
                                                                    </span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="glass-card rounded-xl p-6">
                                        <h3 className="font-semibold mb-4">All Milestones</h3>
                                        <table className="w-full">
                                            <thead>
                                                <tr className="text-left text-sm text-gray-500">
                                                    <th className="pb-3">Milestone</th>
                                                    <th className="pb-3">Due Date</th>
                                                    <th className="pb-3">Owner</th>
                                                    <th className="pb-3">Status</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {calendar.milestones.map(m => (
                                                    <tr key={m.id} className="border-t border-white/10">
                                                        <td className="py-3">
                                                            <div className="flex items-center gap-2">
                                                                <span>{typeIcon(m.milestone_type)}</span>
                                                                <span>{m.milestone_name}</span>
                                                            </div>
                                                        </td>
                                                        <td className="py-3 text-sm text-gray-400">{formatDate(m.due_date)}</td>
                                                        <td className="py-3 text-sm text-gray-400">{m.owner}</td>
                                                        <td className="py-3">
                                                            <span className={`px-2 py-1 rounded text-xs ${m.status === 'completed' ? 'bg-emerald-500/20 text-emerald-400' : m.status === 'in_progress' ? 'bg-cyan-500/20 text-cyan-400' : 'bg-gray-500/20 text-gray-400'}`}>
                                                                {m.status}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>

                            {/* Sidebar */}
                            <div className="space-y-6">
                                {/* Upcoming */}
                                <div className="glass-card rounded-xl p-4">
                                    <h3 className="font-semibold mb-4">⏰ Upcoming</h3>
                                    <div className="space-y-3">
                                        {upcomingMilestones.map(m => {
                                            const days = getDaysUntil(m.due_date);
                                            return (
                                                <div key={m.id} className="flex items-center justify-between p-2 rounded-lg bg-white/5">
                                                    <div className="flex items-center gap-2">
                                                        <div className="w-2 h-2 rounded-full" style={{ backgroundColor: m.color }}></div>
                                                        <span className="text-sm truncate max-w-[150px]">{m.milestone_name}</span>
                                                    </div>
                                                    <span className={`text-xs ${days <= 3 ? 'text-amber-400' : 'text-gray-500'}`}>
                                                        {days}d
                                                    </span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Quick Stats */}
                                <div className="glass-card rounded-xl p-4">
                                    <h3 className="font-semibold mb-4">📊 Stats</h3>
                                    <div className="space-y-3">
                                        <div className="flex justify-between">
                                            <span className="text-gray-400">Completed</span>
                                            <span className="text-emerald-400">{calendar.milestones.filter(m => m.status === 'completed').length}</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span className="text-gray-400">In Progress</span>
                                            <span className="text-cyan-400">{calendar.milestones.filter(m => m.status === 'in_progress').length}</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span className="text-gray-400">Pending</span>
                                            <span className="text-gray-400">{calendar.milestones.filter(m => m.status === 'pending').length}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Add Milestone Modal */}
                    {showModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                            <div className="glass-card rounded-2xl p-6 w-full max-w-md">
                                <h2 className="text-xl font-bold mb-6">Add Milestone</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-1">Milestone Name *</label>
                                        <input type="text" value={newMilestone.milestone_name} onChange={(e) => setNewMilestone({...newMilestone, milestone_name: e.target.value})}
                                            className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm text-gray-400 mb-1">Type</label>
                                            <select value={newMilestone.milestone_type} onChange={(e) => setNewMilestone({...newMilestone, milestone_type: e.target.value})}
                                                className="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2">
                                                {MILESTONE_TYPES.map(t => <option key={t} value={t}>{t.charAt(0).toUpperCase() + t.slice(1)}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm text-gray-400 mb-1">Due Date *</label>
                                            <input type="date" value={newMilestone.due_date} onChange={(e) => setNewMilestone({...newMilestone, due_date: e.target.value})}
                                                className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm text-gray-400 mb-1">Owner</label>
                                            <input type="text" value={newMilestone.owner} onChange={(e) => setNewMilestone({...newMilestone, owner: e.target.value})}
                                                className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                        </div>
                                        <div>
                                            <label className="block text-sm text-gray-400 mb-1">Color</label>
                                            <input type="color" value={newMilestone.color} onChange={(e) => setNewMilestone({...newMilestone, color: e.target.value})}
                                                className="w-full h-10 bg-white/5 border border-white/10 rounded-lg cursor-pointer" />
                                        </div>
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 mt-6">
                                    <button onClick={() => setShowModal(false)} className="px-4 py-2 border border-white/20 rounded-lg hover:bg-white/5">Cancel</button>
                                    <button onClick={handleAddMilestone} disabled={!newMilestone.milestone_name || !newMilestone.due_date}
                                        className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium disabled:opacity-50">Add</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<ProposalCalendar />, document.getElementById('root'));
    </script>
</body>
</html>
