const formatCurrency = (value) => {
  if (!value) return '$0';
  if (value >= 1e9) return `$${(value / 1e9).toFixed(1)}B`;
  if (value >= 1e6) return `$${(value / 1e6).toFixed(0)}M`;
  if (value >= 1e3) return `$${(value / 1e3).toFixed(0)}K`;
  return `$${value.toLocaleString()}`;
};

const getPhaseColor = (phase) => {
  const colors = {
    'Qualify': '#64748b', 'Capture': '#f59e0b', 'Blue Team': '#3b82f6',
    'Pink Team': '#ec4899', 'Red Team': '#ef4444', 'Gold Team': '#eab308',
    'White Glove': '#8b5cf6', 'Submit': '#10b981'
  };
  return colors[phase] || '#64748b';
};

const getStatusColor = (status) => {
  const colors = { 
    'compliant': '#10b981', 'partial': '#f59e0b', 'risk': '#ef4444',
    'pending': '#f59e0b', 'approved': '#10b981', 'rejected': '#ef4444',
    'in_progress': '#3b82f6', 'review': '#8b5cf6', 'complete': '#10b981'
  };
  return colors[status] || '#64748b';
};

const hasAccess = (roleId, moduleId) => {
  const role = ROLES.find(r => r.id === roleId);
  if (!role) return false;
  return role.access.includes(moduleId);
};

const checkAuth = () => {
  const session = localStorage.getItem('MP_SESSION');
  const user = localStorage.getItem('MP_USER');
  if (!session || !user) {
    window.location.href = 'login.html';
    return null;
  }
  try {
    return JSON.parse(user);
  } catch {
    return { email: 'demo@mmt.com', name: 'Demo User', role: 'PM' };
  }
};

const handleLogout = () => {
  localStorage.removeItem('MP_SESSION');
  localStorage.removeItem('MP_USER');
  window.location.href = 'login.html';
};

// ═══════════════════════════════════════════════════════════════════════════════
// MAIN APPLICATION
// ═══════════════════════════════════════════════════════════════════════════════
const App = () => {
  const [activeModule, setActiveModule] = useState('dashboard');
  const [currentRole, setCurrentRole] = useState('CEO');
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [connStatus, setConnStatus] = useState(connectionStatus);
  const [data, setData] = useState(DEMO_DATA);
  
  // Check auth on mount
  useEffect(() => {
    const user = checkAuth();
    if (user?.role) {
      setCurrentRole(user.role);
    }
  }, []);
  
  // Fetch live data if connected
  useEffect(() => {
    const fetchData = async () => {
      if (supabase && connStatus === 'connected') {
        try {
          const { data: opps, error } = await supabase.from('opportunities').select('*').order('created_at', { ascending: false });
          if (opps && !error) {
            setData(prev => ({ ...prev, opportunities: opps.length > 0 ? opps : prev.opportunities }));
          }
        } catch (err) {
          console.warn('Using demo data:', err);
          setConnStatus('demo');
        }
      }
    };
    
    fetchData();
  }, [connStatus]);
  
  // Render module content
  const renderModule = () => {
    switch (activeModule) {
      case 'dashboard': return <DashboardModule data={data} />;
      case 'pipeline': return <PipelineModule data={data} />;
      case 'hitl': return <HITLModule data={data} />;
      case 'pricing': return <PricingModule data={data} />;
      case 'blackhat': return <BlackHatModule data={data} currentRole={currentRole} />;
      case 'audit': return <AuditModule data={data} currentRole={currentRole} />;
      case 'agents': return <AgentsModule data={data} />;
      case 'health': return <HealthModule />;
      default: return <GenericModule moduleId={activeModule} />;
    }
  };
  
  return (
    <div className="min-h-screen">
      <Sidebar 
        activeModule={activeModule}
        setActiveModule={setActiveModule}
        currentRole={currentRole}
        collapsed={sidebarCollapsed}
        setCollapsed={setSidebarCollapsed}
      />
      
      <div className={`transition-all duration-300 ${sidebarCollapsed ? 'ml-16' : 'ml-64'}`}>
        <Header currentRole={currentRole} setCurrentRole={setCurrentRole} connStatus={connStatus} />
        
        <main className="p-6">
          {renderModule()}
        </main>
        
        {/* Global Footer */}
        <footer className="p-4 text-center text-xs text-slate-600 border-t border-slate-800">
          <p>MissionPulse v{CONFIG.VERSION} • Mission Meets Tech • Mission. Technology. Transformation.</p>
          <p className="mt-1">AI GENERATED CONTENT - REQUIRES HUMAN REVIEW</p>
        </footer>
      </div>
    </div>
  );
};

ReactDOM.render(<App />, document.getElementById('root'));
</script>
