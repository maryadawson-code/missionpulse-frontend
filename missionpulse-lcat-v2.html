<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MissionPulse | LCAT Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
        .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.1); }
        .glass-hover:hover { background: rgba(0, 229, 250, 0.08); border-color: rgba(0, 229, 250, 0.3); }
        .cyan-glow { box-shadow: 0 0 30px rgba(0, 229, 250, 0.15); }
        .text-cyan { color: #00E5FA; }
        .bg-cyan { background-color: #00E5FA; }
        .cui-banner { background: linear-gradient(90deg, #dc2626 0%, #b91c1c 100%); }
        .cui-badge { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body class="text-gray-100">
    <div id="root"></div>
    <script src="missionpulse-crud.js"></script>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function LCATManager() {
            const [rates, setRates] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isDemo, setIsDemo] = useState(false);
            const [showModal, setShowModal] = useState(false);
            const [editingRate, setEditingRate] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterClearance, setFilterClearance] = useState('all');
            const [filterSite, setFilterSite] = useState('all');

            useEffect(() => { loadData(); }, []);

            const loadData = async () => {
                setLoading(true);
                const { data, isDemo: demo } = await MissionPulse.lcatRates.getAll();
                setRates(data || []);
                setIsDemo(demo);
                setLoading(false);
            };

            const handleSave = async (formData) => {
                if (editingRate?.id) {
                    await MissionPulse.lcatRates.update(editingRate.id, formData);
                } else {
                    await MissionPulse.lcatRates.create(formData);
                }
                setShowModal(false);
                setEditingRate(null);
                loadData();
            };

            const handleDelete = async (id) => {
                if (confirm('Delete this LCAT rate?')) {
                    await MissionPulse.lcatRates.delete(id);
                    loadData();
                }
            };

            const clearances = [...new Set(rates.map(r => r.clearance).filter(Boolean))];
            const sites = [...new Set(rates.map(r => r.site).filter(Boolean))];

            const filtered = rates.filter(r => {
                const matchSearch = !searchTerm || 
                    (r.title || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (r.laborCategory || '').toLowerCase().includes(searchTerm.toLowerCase());
                const matchClearance = filterClearance === 'all' || r.clearance === filterClearance;
                const matchSite = filterSite === 'all' || r.site === filterSite;
                return matchSearch && matchClearance && matchSite;
            });

            const avgHourly = filtered.length > 0 ? Math.round(filtered.reduce((sum, r) => sum + (r.hourlyRate || 0), 0) / filtered.length) : 0;

            if (loading) return <div className="flex items-center justify-center min-h-screen"><div className="w-12 h-12 border-4 border-cyan border-t-transparent rounded-full animate-spin"></div></div>;

            return (
                <div className="min-h-screen">
                    {/* CUI Banner */}
                    <div className="cui-banner text-white text-center py-2 text-sm font-medium">
                        ⚠️ CUI // SP-PRICING // NOFORN — Controlled Unclassified Information
                    </div>

                    <div className="p-6">
                        {/* Header */}
                        <header className="glass rounded-xl p-6 mb-6 cyan-glow">
                            <div className="flex justify-between items-center">
                                <div className="flex items-center gap-4">
                                    <a href="missionpulse-nav-hub.html" className="text-gray-400 hover:text-cyan">← Hub</a>
                                    <div>
                                        <div className="flex items-center gap-2">
                                            <h1 className="text-2xl font-bold text-white">LCAT Manager</h1>
                                            <span className="cui-badge text-xs px-2 py-0.5 rounded">CUI</span>
                                        </div>
                                        <p className="text-gray-400 text-sm">Labor Category Rates & Pricing</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-3">
                                    {isDemo && <span className="text-xs text-yellow-400 bg-yellow-400/10 px-2 py-1 rounded">Demo Mode</span>}
                                    <button onClick={() => { setEditingRate(null); setShowModal(true); }} className="bg-cyan text-black px-4 py-2 rounded-lg font-medium hover:bg-cyan/80">
                                        + Add LCAT
                                    </button>
                                </div>
                            </div>
                        </header>

                        {/* Stats */}
                        <div className="grid grid-cols-4 gap-4 mb-6">
                            <div className="glass rounded-lg p-4 text-center">
                                <p className="text-2xl font-bold text-cyan">{filtered.length}</p>
                                <p className="text-gray-400 text-sm">Labor Categories</p>
                            </div>
                            <div className="glass rounded-lg p-4 text-center">
                                <p className="text-2xl font-bold text-white">${avgHourly}/hr</p>
                                <p className="text-gray-400 text-sm">Avg Hourly Rate</p>
                            </div>
                            <div className="glass rounded-lg p-4 text-center">
                                <p className="text-2xl font-bold text-purple-400">{filtered.filter(r => r.clearance === 'Secret').length}</p>
                                <p className="text-gray-400 text-sm">Secret Cleared</p>
                            </div>
                            <div className="glass rounded-lg p-4 text-center">
                                <p className="text-2xl font-bold text-green-400">{filtered.filter(r => r.site === 'Remote').length}</p>
                                <p className="text-gray-400 text-sm">Remote Eligible</p>
                            </div>
                        </div>

                        {/* Filters */}
                        <div className="glass rounded-xl p-4 mb-6">
                            <div className="flex flex-wrap gap-4">
                                <input type="text" placeholder="Search LCATs..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
                                    className="flex-1 min-w-[200px] bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan" />
                                <select value={filterClearance} onChange={e => setFilterClearance(e.target.value)}
                                    className="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white">
                                    <option value="all">All Clearances</option>
                                    {clearances.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                                <select value={filterSite} onChange={e => setFilterSite(e.target.value)}
                                    className="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white">
                                    <option value="all">All Sites</option>
                                    {sites.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                            </div>
                        </div>

                        {/* Table */}
                        <div className="glass rounded-xl overflow-hidden">
                            <table className="w-full">
                                <thead className="bg-white/5">
                                    <tr>
                                        <th className="text-left p-4 text-gray-400 font-medium">Title</th>
                                        <th className="text-left p-4 text-gray-400 font-medium">Category</th>
                                        <th className="text-left p-4 text-gray-400 font-medium">Hourly Rate</th>
                                        <th className="text-left p-4 text-gray-400 font-medium">Annual Rate</th>
                                        <th className="text-left p-4 text-gray-400 font-medium">Site</th>
                                        <th className="text-left p-4 text-gray-400 font-medium">Clearance</th>
                                        <th className="p-4"></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filtered.map(rate => (
                                        <tr key={rate.id} className="border-t border-white/5 hover:bg-white/5">
                                            <td className="p-4">
                                                <div className="flex items-center gap-2">
                                                    <span className="font-medium text-white">{rate.title}</span>
                                                    {rate.cuiMarked && <span className="cui-badge text-xs px-1.5 py-0.5 rounded">CUI</span>}
                                                </div>
                                            </td>
                                            <td className="p-4 text-gray-400 font-mono text-sm">{rate.laborCategory}</td>
                                            <td className="p-4 text-cyan font-medium">${(rate.hourlyRate || 0).toFixed(2)}</td>
                                            <td className="p-4 text-white">${(rate.annualRate || 0).toLocaleString()}</td>
                                            <td className="p-4">
                                                <span className={`px-2 py-1 rounded text-xs ${
                                                    rate.site === 'Remote' ? 'bg-green-500/20 text-green-400' :
                                                    rate.site === 'Hybrid' ? 'bg-yellow-500/20 text-yellow-400' :
                                                    'bg-blue-500/20 text-blue-400'
                                                }`}>{rate.site}</span>
                                            </td>
                                            <td className="p-4">
                                                <span className={`px-2 py-1 rounded text-xs ${
                                                    rate.clearance === 'Secret' ? 'bg-purple-500/20 text-purple-400' :
                                                    rate.clearance === 'Top Secret' ? 'bg-red-500/20 text-red-400' :
                                                    'bg-gray-500/20 text-gray-400'
                                                }`}>{rate.clearance}</span>
                                            </td>
                                            <td className="p-4">
                                                <div className="flex gap-2">
                                                    <button onClick={() => { setEditingRate(rate); setShowModal(true); }} className="text-cyan hover:text-white">Edit</button>
                                                    <button onClick={() => handleDelete(rate.id)} className="text-red-400 hover:text-red-300">Delete</button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            {filtered.length === 0 && <div className="p-8 text-center text-gray-500">No LCAT rates found.</div>}
                        </div>

                        {/* Modal */}
                        {showModal && (
                            <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                                <div className="glass rounded-xl p-6 w-full max-w-lg">
                                    <h2 className="text-xl font-bold mb-4">{editingRate ? 'Edit LCAT' : 'New LCAT'}</h2>
                                    <LCATForm initial={editingRate} onSave={handleSave} onCancel={() => { setShowModal(false); setEditingRate(null); }} />
                                </div>
                            </div>
                        )}
                    </div>

                    {/* CUI Footer */}
                    <div className="cui-banner text-white text-center py-2 text-sm">
                        CUI // SP-PRICING // Dissemination limited to authorized personnel
                    </div>
                </div>
            );
        }

        function LCATForm({ initial, onSave, onCancel }) {
            const [form, setForm] = useState({
                title: initial?.title || '',
                laborCategory: initial?.laborCategory || '',
                hourlyRate: initial?.hourlyRate || '',
                annualRate: initial?.annualRate || '',
                site: initial?.site || 'On-site',
                clearance: initial?.clearance || 'Public Trust',
                cuiMarked: initial?.cuiMarked ?? true
            });

            const handleHourlyChange = (val) => {
                const hourly = parseFloat(val) || 0;
                setForm({ ...form, hourlyRate: hourly, annualRate: Math.round(hourly * 2080) });
            };

            const handleSubmit = (e) => { e.preventDefault(); onSave(form); };

            return (
                <form onSubmit={handleSubmit} className="space-y-4">
                    <div>
                        <label className="block text-sm text-gray-400 mb-1">Title *</label>
                        <input type="text" required value={form.title} onChange={e => setForm({...form, title: e.target.value})}
                            className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white" placeholder="e.g., Senior Software Engineer" />
                    </div>
                    <div>
                        <label className="block text-sm text-gray-400 mb-1">Labor Category Code</label>
                        <input type="text" value={form.laborCategory} onChange={e => setForm({...form, laborCategory: e.target.value})}
                            className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white font-mono" placeholder="e.g., SWE-III" />
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <div>
                            <label className="block text-sm text-gray-400 mb-1">Hourly Rate ($)</label>
                            <input type="number" step="0.01" value={form.hourlyRate} onChange={e => handleHourlyChange(e.target.value)}
                                className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white" />
                        </div>
                        <div>
                            <label className="block text-sm text-gray-400 mb-1">Annual Rate ($)</label>
                            <input type="number" value={form.annualRate} readOnly
                                className="w-full bg-white/10 border border-white/10 rounded-lg px-4 py-2 text-gray-400" />
                        </div>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <div>
                            <label className="block text-sm text-gray-400 mb-1">Site</label>
                            <select value={form.site} onChange={e => setForm({...form, site: e.target.value})}
                                className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white">
                                <option value="On-site">On-site</option>
                                <option value="Remote">Remote</option>
                                <option value="Hybrid">Hybrid</option>
                            </select>
                        </div>
                        <div>
                            <label className="block text-sm text-gray-400 mb-1">Clearance</label>
                            <select value={form.clearance} onChange={e => setForm({...form, clearance: e.target.value})}
                                className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white">
                                <option value="None">None</option>
                                <option value="Public Trust">Public Trust</option>
                                <option value="Secret">Secret</option>
                                <option value="Top Secret">Top Secret</option>
                                <option value="TS/SCI">TS/SCI</option>
                            </select>
                        </div>
                    </div>
                    <div className="flex items-center gap-2">
                        <input type="checkbox" id="cui" checked={form.cuiMarked} onChange={e => setForm({...form, cuiMarked: e.target.checked})}
                            className="w-4 h-4 rounded" />
                        <label htmlFor="cui" className="text-sm text-gray-400">Mark as CUI (Controlled Unclassified Information)</label>
                    </div>
                    <div className="flex gap-3 pt-4">
                        <button type="submit" className="flex-1 bg-cyan text-black py-2 rounded-lg font-medium hover:bg-cyan/80">Save</button>
                        <button type="button" onClick={onCancel} className="flex-1 bg-white/10 py-2 rounded-lg hover:bg-white/20">Cancel</button>
                    </div>
                </form>
            );
        }

        ReactDOM.render(<LCATManager />, document.getElementById('root'));
    </script>
</body>
</html>
