<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integrations | MissionPulse</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.1); }
    .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    // Integration categories and items
    const INTEGRATIONS = [
      {
        category: 'CRM & Sales',
        items: [
          { 
            id: 'hubspot', 
            name: 'HubSpot', 
            description: 'Sync opportunities and contacts from HubSpot CRM',
            icon: '🟠',
            status: 'connected',
            lastSync: '2025-02-02T14:30:00Z',
            features: ['Contact sync', 'Deal pipeline', 'Activity tracking']
          },
          { 
            id: 'salesforce', 
            name: 'Salesforce', 
            description: 'Enterprise CRM integration for opportunity management',
            icon: '☁️',
            status: 'available',
            features: ['Lead management', 'Opportunity tracking', 'Reports']
          },
          { 
            id: 'govwin', 
            name: 'GovWin IQ', 
            description: 'Federal market intelligence and opportunity alerts',
            icon: '🏛️',
            status: 'available',
            features: ['Opportunity alerts', 'Market research', 'Competitor intel']
          },
        ]
      },
      {
        category: 'Document Management',
        items: [
          { 
            id: 'sharepoint', 
            name: 'SharePoint', 
            description: 'Microsoft SharePoint document library integration',
            icon: '📁',
            status: 'connected',
            lastSync: '2025-02-02T13:15:00Z',
            features: ['Document sync', 'Version control', 'Collaboration']
          },
          { 
            id: 'google-drive', 
            name: 'Google Drive', 
            description: 'Cloud storage and document collaboration',
            icon: '📄',
            status: 'available',
            features: ['File storage', 'Real-time editing', 'Sharing']
          },
          { 
            id: 'box', 
            name: 'Box', 
            description: 'Secure cloud content management',
            icon: '📦',
            status: 'available',
            features: ['Secure storage', 'Compliance', 'Workflow']
          },
        ]
      },
      {
        category: 'Communication',
        items: [
          { 
            id: 'slack', 
            name: 'Slack', 
            description: 'Team messaging and notifications',
            icon: '💬',
            status: 'error',
            lastSync: '2025-02-01T09:00:00Z',
            error: 'Token expired - reauthorization needed',
            features: ['Channel notifications', 'Bot commands', 'Alerts']
          },
          { 
            id: 'teams', 
            name: 'Microsoft Teams', 
            description: 'Microsoft 365 collaboration hub',
            icon: '👥',
            status: 'available',
            features: ['Chat integration', 'Meeting sync', 'File sharing']
          },
          { 
            id: 'email', 
            name: 'Email (SMTP)', 
            description: 'Custom email notifications and alerts',
            icon: '📧',
            status: 'connected',
            lastSync: '2025-02-02T14:00:00Z',
            features: ['Notifications', 'Reports', 'Digest emails']
          },
        ]
      },
      {
        category: 'Federal Sources',
        items: [
          { 
            id: 'sam-gov', 
            name: 'SAM.gov', 
            description: 'Federal opportunity and entity registration',
            icon: '🇺🇸',
            status: 'connected',
            lastSync: '2025-02-02T06:00:00Z',
            features: ['Opportunity feed', 'Entity verification', 'Award data']
          },
          { 
            id: 'fpds', 
            name: 'FPDS', 
            description: 'Federal Procurement Data System',
            icon: '📊',
            status: 'available',
            features: ['Contract history', 'Award analysis', 'Spending data']
          },
          { 
            id: 'usaspending', 
            name: 'USASpending.gov', 
            description: 'Federal spending transparency data',
            icon: '💵',
            status: 'available',
            features: ['Agency budgets', 'Contract awards', 'Trends']
          },
        ]
      },
      {
        category: 'AI & Automation',
        items: [
          { 
            id: 'asksage', 
            name: 'AskSage', 
            description: 'FedRAMP authorized AI assistant',
            icon: '🤖',
            status: 'connected',
            lastSync: '2025-02-02T14:45:00Z',
            features: ['Document analysis', 'Q&A', 'Drafting assistance']
          },
          { 
            id: 'zapier', 
            name: 'Zapier', 
            description: 'Workflow automation and app connections',
            icon: '⚡',
            status: 'available',
            features: ['Automated workflows', 'App connectors', 'Triggers']
          },
        ]
      },
      {
        category: 'Signatures & Contracts',
        items: [
          { 
            id: 'docusign', 
            name: 'DocuSign', 
            description: 'Electronic signature and agreement management',
            icon: '✍️',
            status: 'available',
            features: ['E-signatures', 'Agreement workflows', 'Templates']
          },
          { 
            id: 'adobesign', 
            name: 'Adobe Sign', 
            description: 'PDF document signing and workflows',
            icon: '📝',
            status: 'available',
            features: ['PDF signing', 'Approval workflows', 'Audit trails']
          },
        ]
      },
    ];

    const STATUS_CONFIG = {
      connected: { label: 'Connected', bg: 'bg-emerald-500/20', text: 'text-emerald-400', border: 'border-emerald-500/30', dot: 'bg-emerald-500' },
      available: { label: 'Available', bg: 'bg-slate-500/20', text: 'text-slate-400', border: 'border-slate-500/30', dot: 'bg-slate-500' },
      error: { label: 'Error', bg: 'bg-red-500/20', text: 'text-red-400', border: 'border-red-500/30', dot: 'bg-red-500' },
      pending: { label: 'Pending', bg: 'bg-amber-500/20', text: 'text-amber-400', border: 'border-amber-500/30', dot: 'bg-amber-500' },
    };

    // Integration Card Component
    const IntegrationCard = ({ integration, onConnect, onDisconnect, onConfigure }) => {
      const status = STATUS_CONFIG[integration.status];
      
      const formatLastSync = (timestamp) => {
        if (!timestamp) return null;
        const date = new Date(timestamp);
        const now = new Date();
        const diffHours = Math.floor((now - date) / (1000 * 60 * 60));
        if (diffHours < 1) return 'Just now';
        if (diffHours < 24) return `${diffHours}h ago`;
        return date.toLocaleDateString();
      };

      return (
        <div className="glass-card rounded-xl p-5 hover:border-cyan-500/30 transition-all">
          <div className="flex items-start justify-between mb-4">
            <div className="flex items-center gap-3">
              <span className="text-3xl">{integration.icon}</span>
              <div>
                <h3 className="font-semibold text-white">{integration.name}</h3>
                <div className="flex items-center gap-2 mt-1">
                  <div className={`w-2 h-2 rounded-full ${status.dot}`}></div>
                  <span className={`text-xs ${status.text}`}>{status.label}</span>
                  {integration.lastSync && (
                    <span className="text-xs text-slate-500">• Last sync: {formatLastSync(integration.lastSync)}</span>
                  )}
                </div>
              </div>
            </div>
          </div>
          
          <p className="text-sm text-slate-400 mb-4">{integration.description}</p>
          
          {integration.error && (
            <div className="mb-4 px-3 py-2 bg-red-500/10 border border-red-500/30 rounded-lg">
              <p className="text-xs text-red-400">⚠️ {integration.error}</p>
            </div>
          )}

          <div className="flex flex-wrap gap-2 mb-4">
            {integration.features.map((feature, idx) => (
              <span key={idx} className="px-2 py-1 text-xs bg-slate-800/50 text-slate-400 rounded">
                {feature}
              </span>
            ))}
          </div>

          <div className="flex items-center gap-2">
            {integration.status === 'connected' ? (
              <>
                <button 
                  onClick={() => onConfigure(integration)}
                  className="flex-1 py-2 bg-slate-800/50 border border-slate-700 rounded-lg text-sm text-slate-300 hover:border-cyan-500/50 transition-all"
                >
                  Configure
                </button>
                <button 
                  onClick={() => onDisconnect(integration)}
                  className="px-4 py-2 bg-red-500/10 border border-red-500/30 rounded-lg text-sm text-red-400 hover:bg-red-500/20 transition-all"
                >
                  Disconnect
                </button>
              </>
            ) : integration.status === 'error' ? (
              <button 
                onClick={() => onConnect(integration)}
                className="flex-1 py-2 bg-amber-500/20 border border-amber-500/30 rounded-lg text-sm text-amber-400 hover:bg-amber-500/30 transition-all"
              >
                Reconnect
              </button>
            ) : (
              <button 
                onClick={() => onConnect(integration)}
                className="flex-1 py-2 bg-cyan-500/20 border border-cyan-500/30 rounded-lg text-sm text-cyan-400 hover:bg-cyan-500/30 transition-all"
              >
                Connect
              </button>
            )}
          </div>
        </div>
      );
    };

    function IntegrationHub() {
      const [integrations, setIntegrations] = useState(INTEGRATIONS);
      const [searchQuery, setSearchQuery] = useState('');
      const [statusFilter, setStatusFilter] = useState('all');
      const [selectedIntegration, setSelectedIntegration] = useState(null);

      const stats = {
        total: integrations.flatMap(c => c.items).length,
        connected: integrations.flatMap(c => c.items).filter(i => i.status === 'connected').length,
        errors: integrations.flatMap(c => c.items).filter(i => i.status === 'error').length,
      };

      const filteredCategories = integrations.map(category => ({
        ...category,
        items: category.items.filter(item => {
          if (statusFilter !== 'all' && item.status !== statusFilter) return false;
          if (searchQuery) {
            const query = searchQuery.toLowerCase();
            return item.name.toLowerCase().includes(query) || 
                   item.description.toLowerCase().includes(query);
          }
          return true;
        })
      })).filter(category => category.items.length > 0);

      const handleConnect = (integration) => {
        // Simulate connection
        console.log('Connecting:', integration.name);
        alert(`Connecting to ${integration.name}... (Demo mode)`);
      };

      const handleDisconnect = (integration) => {
        if (confirm(`Disconnect ${integration.name}?`)) {
          console.log('Disconnecting:', integration.name);
        }
      };

      const handleConfigure = (integration) => {
        setSelectedIntegration(integration);
      };

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
            <div className="max-w-[1800px] mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="missionpulse-nav-hub.html" className="text-slate-400 hover:text-white transition-colors">
                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
                    </svg>
                  </a>
                  <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center">
                    <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                    </svg>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold text-white">Integration Hub</h1>
                    <p className="text-xs text-violet-400">Connect Your Tools & Data Sources</p>
                  </div>
                </div>
              </div>
            </div>
          </header>

          <div className="max-w-[1800px] mx-auto px-6 py-8">
            {/* Stats */}
            <div className="grid grid-cols-4 gap-4 mb-6">
              <div className="glass-card rounded-xl p-4">
                <p className="text-sm text-slate-400 mb-1">Total Integrations</p>
                <p className="text-2xl font-bold text-white">{stats.total}</p>
              </div>
              <div className="glass-card rounded-xl p-4">
                <p className="text-sm text-slate-400 mb-1">Connected</p>
                <p className="text-2xl font-bold text-emerald-400">{stats.connected}</p>
              </div>
              <div className="glass-card rounded-xl p-4">
                <p className="text-sm text-slate-400 mb-1">Needs Attention</p>
                <p className="text-2xl font-bold text-red-400">{stats.errors}</p>
              </div>
              <div className="glass-card rounded-xl p-4">
                <p className="text-sm text-slate-400 mb-1">Available</p>
                <p className="text-2xl font-bold text-cyan-400">{stats.total - stats.connected - stats.errors}</p>
              </div>
            </div>

            {/* Filters */}
            <div className="flex items-center gap-4 mb-8">
              <div className="relative flex-1 max-w-md">
                <svg className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input
                  type="text"
                  placeholder="Search integrations..."
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="w-full pl-12 pr-4 py-2.5 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500/50"
                />
              </div>
              <div className="flex items-center gap-2">
                {['all', 'connected', 'available', 'error'].map(status => (
                  <button
                    key={status}
                    onClick={() => setStatusFilter(status)}
                    className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                      statusFilter === status 
                        ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' 
                        : 'bg-slate-800/50 text-slate-400 border border-slate-700'
                    }`}
                  >
                    {status.charAt(0).toUpperCase() + status.slice(1)}
                  </button>
                ))}
              </div>
            </div>

            {/* Integration Categories */}
            {filteredCategories.map(category => (
              <div key={category.category} className="mb-8">
                <h2 className="text-lg font-semibold text-white mb-4 flex items-center gap-2">
                  {category.category}
                  <span className="text-sm font-normal text-slate-500">({category.items.length})</span>
                </h2>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                  {category.items.map(integration => (
                    <IntegrationCard
                      key={integration.id}
                      integration={integration}
                      onConnect={handleConnect}
                      onDisconnect={handleDisconnect}
                      onConfigure={handleConfigure}
                    />
                  ))}
                </div>
              </div>
            ))}

            {filteredCategories.length === 0 && (
              <div className="text-center py-16">
                <p className="text-slate-400 text-lg">No integrations found matching "{searchQuery}"</p>
                <button 
                  onClick={() => { setSearchQuery(''); setStatusFilter('all'); }}
                  className="mt-4 text-cyan-400 hover:text-cyan-300 transition-colors"
                >
                  Clear filters
                </button>
              </div>
            )}
          </div>

          {/* Configuration Modal */}
          {selectedIntegration && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50" onClick={() => setSelectedIntegration(null)}>
              <div className="glass-card rounded-2xl p-6 max-w-lg w-full mx-4" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-6">
                  <div className="flex items-center gap-3">
                    <span className="text-3xl">{selectedIntegration.icon}</span>
                    <h3 className="text-lg font-bold text-white">{selectedIntegration.name} Settings</h3>
                  </div>
                  <button onClick={() => setSelectedIntegration(null)} className="text-slate-400 hover:text-white">
                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                    </svg>
                  </button>
                </div>
                <div className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-slate-300 mb-2">Sync Frequency</label>
                    <select className="w-full px-4 py-2.5 bg-slate-800/50 border border-slate-700 rounded-xl text-white focus:outline-none">
                      <option>Every 15 minutes</option>
                      <option>Every hour</option>
                      <option>Every 6 hours</option>
                      <option>Daily</option>
                      <option>Manual only</option>
                    </select>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-300 mb-2">Data to Sync</label>
                    <div className="space-y-2">
                      {selectedIntegration.features.map((feature, idx) => (
                        <label key={idx} className="flex items-center gap-3 cursor-pointer">
                          <input type="checkbox" defaultChecked className="w-4 h-4 rounded border-slate-600 bg-slate-800 text-cyan-500" />
                          <span className="text-slate-300">{feature}</span>
                        </label>
                      ))}
                    </div>
                  </div>
                  <div className="flex items-center gap-3 pt-4">
                    <button
                      onClick={() => setSelectedIntegration(null)}
                      className="flex-1 py-2.5 bg-slate-800/50 border border-slate-700 rounded-xl text-slate-300 hover:border-slate-600 transition-all"
                    >
                      Cancel
                    </button>
                    <button
                      onClick={() => { alert('Settings saved!'); setSelectedIntegration(null); }}
                      className="flex-1 py-2.5 bg-gradient-to-r from-cyan-500 to-teal-500 text-white font-medium rounded-xl hover:from-cyan-400 hover:to-teal-400 transition-all"
                    >
                      Save Settings
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<IntegrationHub />);
  </script>
</body>
</html>
