<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integration Hub | MissionPulse</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass { background: rgba(0,229,250,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
    .glass-card { background: rgba(15,23,42,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(51,65,85,0.5); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const INTEGRATIONS = [
      { id: '1', name: 'HubSpot CRM', provider: 'hubspot', icon: '🔶', status: 'connected', description: 'Sync contacts, companies, and deals', lastSync: '2 mins ago', records: 1247 },
      { id: '2', name: 'SharePoint', provider: 'sharepoint', icon: '📁', status: 'connected', description: 'Document storage and collaboration', lastSync: '15 mins ago', records: 892 },
      { id: '3', name: 'Microsoft 365', provider: 'microsoft365', icon: '📧', status: 'connected', description: 'Email, calendar, and Teams integration', lastSync: '5 mins ago', records: 3420 },
      { id: '4', name: 'SAM.gov', provider: 'samgov', icon: '🏛️', status: 'connected', description: 'Federal opportunity intelligence', lastSync: '1 hour ago', records: 156 },
      { id: '5', name: 'Slack', provider: 'slack', icon: '💬', status: 'disconnected', description: 'Team notifications and alerts', lastSync: null, records: 0 },
      { id: '6', name: 'DocuSign', provider: 'docusign', icon: '✍️', status: 'disconnected', description: 'Electronic signatures for proposals', lastSync: null, records: 0 },
      { id: '7', name: 'Jira', provider: 'jira', icon: '📋', status: 'pending', description: 'Project management sync', lastSync: null, records: 0 },
      { id: '8', name: 'Google Workspace', provider: 'google', icon: '🔵', status: 'disconnected', description: 'Drive, Docs, and Calendar', lastSync: null, records: 0 }
    ];

    const Icons = {
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
      refresh: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
      x: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>,
      clock: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6l4 2" /></svg>,
      link: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>,
      shield: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
      settings: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    const Badge = ({ children, variant = 'default' }) => {
      const variants = {
        default: 'bg-slate-700 text-slate-300',
        success: 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30',
        warning: 'bg-amber-500/20 text-amber-400 border border-amber-500/30',
        danger: 'bg-red-500/20 text-red-400 border border-red-500/30',
        primary: 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30'
      };
      return <span className={`px-2 py-1 rounded-full text-xs font-medium ${variants[variant]}`}>{children}</span>;
    };

    function IntegrationHub() {
      const [integrations, setIntegrations] = useState(INTEGRATIONS);
      const [syncing, setSyncing] = useState(null);
      const [selectedInt, setSelectedInt] = useState(null);

      const handleSync = (id) => {
        setSyncing(id);
        setTimeout(() => {
          setIntegrations(prev => prev.map(i => i.id === id ? { ...i, lastSync: 'Just now' } : i));
          setSyncing(null);
        }, 2000);
      };

      const handleConnect = (id) => {
        setIntegrations(prev => prev.map(i => i.id === id ? { ...i, status: 'connected', lastSync: 'Just now' } : i));
      };

      const handleDisconnect = (id) => {
        setIntegrations(prev => prev.map(i => i.id === id ? { ...i, status: 'disconnected', lastSync: null, records: 0 } : i));
      };

      const stats = {
        connected: integrations.filter(i => i.status === 'connected').length,
        total: integrations.length,
        records: integrations.reduce((sum, i) => sum + i.records, 0)
      };

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="p-2 rounded-lg bg-slate-800/50 hover:bg-slate-700/50 transition-colors">
                    <Icon name="home" className="w-5 h-5 text-slate-400" />
                  </a>
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center">
                      <Icon name="link" className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white">Integration Hub</h1>
                      <p className="text-sm text-slate-400">Connect your tools & services</p>
                    </div>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <Badge variant="success">{stats.connected}/{stats.total} Connected</Badge>
                  <span className="text-sm text-slate-400">{stats.records.toLocaleString()} records synced</span>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8">
            {/* Stats */}
            <div className="grid grid-cols-4 gap-4 mb-8">
              {[
                { label: 'Connected', value: stats.connected, icon: 'check', color: 'emerald' },
                { label: 'Available', value: stats.total - stats.connected, icon: 'link', color: 'slate' },
                { label: 'Records Synced', value: stats.records.toLocaleString(), icon: 'refresh', color: 'cyan' },
                { label: 'Last Activity', value: '2 min ago', icon: 'clock', color: 'purple' }
              ].map((stat, i) => (
                <div key={i} className="glass-card rounded-xl p-4">
                  <div className="flex items-center gap-3">
                    <div className={`w-10 h-10 rounded-lg bg-${stat.color}-500/20 flex items-center justify-center`}>
                      <Icon name={stat.icon} className={`w-5 h-5 text-${stat.color}-400`} />
                    </div>
                    <div>
                      <div className="text-2xl font-bold text-white">{stat.value}</div>
                      <div className="text-xs text-slate-400">{stat.label}</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* Integrations Grid */}
            <div className="grid grid-cols-2 gap-4">
              {integrations.map(int => (
                <div key={int.id} className="glass-card rounded-xl p-5 hover:border-cyan-500/30 transition-all">
                  <div className="flex items-start justify-between mb-4">
                    <div className="flex items-center gap-3">
                      <div className="w-12 h-12 rounded-xl bg-slate-800 flex items-center justify-center text-2xl">
                        {int.icon}
                      </div>
                      <div>
                        <h3 className="font-semibold text-white">{int.name}</h3>
                        <p className="text-sm text-slate-400">{int.description}</p>
                      </div>
                    </div>
                    <Badge variant={int.status === 'connected' ? 'success' : int.status === 'pending' ? 'warning' : 'default'}>
                      {int.status}
                    </Badge>
                  </div>

                  {int.status === 'connected' && (
                    <div className="flex items-center gap-4 mb-4 text-sm">
                      <span className="text-slate-400">
                        <Icon name="clock" className="w-4 h-4 inline mr-1" />
                        Last sync: {int.lastSync}
                      </span>
                      <span className="text-slate-400">{int.records.toLocaleString()} records</span>
                    </div>
                  )}

                  <div className="flex gap-2">
                    {int.status === 'connected' ? (
                      <>
                        <button 
                          onClick={() => handleSync(int.id)}
                          disabled={syncing === int.id}
                          className="flex-1 px-4 py-2 bg-cyan-500/20 border border-cyan-500/30 rounded-lg text-cyan-400 hover:bg-cyan-500/30 transition flex items-center justify-center gap-2"
                        >
                          <Icon name="refresh" className={`w-4 h-4 ${syncing === int.id ? 'animate-spin' : ''}`} />
                          {syncing === int.id ? 'Syncing...' : 'Sync Now'}
                        </button>
                        <button 
                          onClick={() => setSelectedInt(int)}
                          className="px-4 py-2 bg-slate-700/50 rounded-lg text-slate-400 hover:text-white transition"
                        >
                          <Icon name="settings" className="w-4 h-4" />
                        </button>
                        <button 
                          onClick={() => handleDisconnect(int.id)}
                          className="px-4 py-2 bg-red-500/10 rounded-lg text-red-400 hover:bg-red-500/20 transition"
                        >
                          <Icon name="x" className="w-4 h-4" />
                        </button>
                      </>
                    ) : (
                      <button 
                        onClick={() => handleConnect(int.id)}
                        className="flex-1 px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white font-medium rounded-lg hover:from-cyan-400 hover:to-teal-400 transition"
                      >
                        Connect
                      </button>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </main>

          {/* Footer */}
          <footer className="glass border-t border-slate-700/50 mt-12">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-2 text-slate-400 text-sm">
                <Icon name="shield" className="w-4 h-4" />
                <span>Mission Meets Tech • MissionPulse v12</span>
              </div>
              <div className="text-xs text-slate-500">All integrations use OAuth 2.0 secure authentication</div>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<IntegrationHub />);
  </script>
</body>
</html>
