<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse M15 - Lessons Learned & Playbook</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; color: #fff; }
    
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(0,229,250,0.3); } 50% { box-shadow: 0 0 40px rgba(0,229,250,0.5); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-spin { animation: spin 1s linear infinite; }
    .animate-slideIn { animation: slideIn 0.3s ease-out; }
    .animate-fadeIn { animation: fadeIn 0.4s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .animate-glow { animation: glow 2s ease-in-out infinite; }
    
    .glass-card {
      background: rgba(17, 28, 46, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .trophy-shimmer {
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.3), transparent);
      background-size: 200% 100%;
      animation: shimmer 2s infinite;
    }
    
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #111C2E; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #243656; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #00E5FA; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, createContext, useContext, useCallback } = React;

    // ============================================================================
    // PRODUCTION CONFIG
    // ============================================================================
    const CONFIG = {
      API_BASE: 'https://missionpulse-api.onrender.com',
      DASHBOARD_URL: 'https://missionpulse-frontend.netlify.app/',
      MODULE_ID: 'M15',
      MODULE_NAME: 'Lessons Learned & Playbook',
      VERSION: '12.0.1',
      FEATURES: {
        API_ENABLED: true,
        DEMO_MODE: true
      }
    };

    // ============================================================================
    // TOAST CONTEXT & PROVIDER
    // ============================================================================
    const ToastContext = createContext(null);

    const ToastProvider = ({ children }) => {
      const [toasts, setToasts] = useState([]);
      
      const addToast = useCallback((message, type = 'info', duration = 4000) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), duration);
      }, []);

      return (
        <ToastContext.Provider value={{ addToast }}>
          {children}
          <div className="fixed top-4 right-4 z-50 space-y-2">
            {toasts.map(toast => (
              <div 
                key={toast.id}
                className={`px-4 py-3 rounded-lg shadow-lg animate-slideIn flex items-center gap-2 ${
                  toast.type === 'success' ? 'bg-emerald-500/90 text-white' :
                  toast.type === 'error' ? 'bg-red-500/90 text-white' :
                  toast.type === 'warning' ? 'bg-amber-500/90 text-white' :
                  'bg-slate-700/90 text-white'
                }`}
              >
                <span className="text-sm font-medium">{toast.message}</span>
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    };

    const useToast = () => {
      const context = useContext(ToastContext);
      if (!context) throw new Error('useToast must be used within ToastProvider');
      return context;
    };

    // ============================================================================
    // ERROR BOUNDARY
    // ============================================================================
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true };
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen bg-[#00050F] flex items-center justify-center p-6">
              <div className="bg-slate-800/50 border border-red-500/30 rounded-xl p-8 max-w-md text-center">
                <h2 className="text-xl font-bold text-white mb-2">Something went wrong</h2>
                <button onClick={() => window.location.reload()} className="px-4 py-2 bg-cyan-500 text-white rounded-lg">
                  Refresh
                </button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // ============================================================================
    // LOADING & CONNECTION
    // ============================================================================
    const LoadingSpinner = ({ size = 'md', message }) => {
      const sizes = { sm: 'w-4 h-4', md: 'w-8 h-8', lg: 'w-12 h-12' };
      return (
        <div className="flex flex-col items-center justify-center gap-3">
          <div className={`${sizes[size]} border-2 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin`} />
          {message && <span className="text-slate-400 text-sm">{message}</span>}
        </div>
      );
    };

    const ConnectionStatus = ({ isConnected }) => (
      <div className="flex items-center gap-2">
        <div className={`w-2 h-2 rounded-full ${isConnected ? 'bg-emerald-400' : 'bg-red-400'} animate-pulse`} />
        <span className="text-xs text-slate-500">{isConnected ? 'Connected' : 'Offline'}</span>
      </div>
    );

    // ============================================================================
    // ICONS
    // ============================================================================
    const Icons = {
      search: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" strokeWidth={2}/><path strokeLinecap="round" strokeWidth={2} d="M21 21l-4.35-4.35"/></svg>,
      star: () => <svg className="w-full h-full" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>,
      starOutline: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>,
      trophy: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>,
      book: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>,
      plus: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>,
      x: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>,
      trending: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>,
      tag: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>,
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
      shield: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>,
    };

    const Icon = ({ name, className = "w-5 h-5" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    // ============================================================================
    // HOME BUTTON
    // ============================================================================
    const HomeButton = () => (
      <button
        onClick={() => window.location.href = CONFIG.DASHBOARD_URL}
        className="flex items-center gap-2 px-3 py-1.5 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg transition-colors group"
      >
        <Icon name="home" className="w-4 h-4 text-slate-400 group-hover:text-cyan-400" />
        <span className="text-sm text-slate-400 group-hover:text-white">Dashboard</span>
      </button>
    );

    // ============================================================================
    // DATA
    // ============================================================================
    const PLAYBOOK_ENTRIES = [
      {
        id: 1,
        title: 'Healthcare IT Past Performance Narrative',
        category: 'Win Theme',
        tags: ['DHA', 'Healthcare', 'Past Performance'],
        usage: 12,
        rating: 5,
        preview: 'Mission Meets Tech brings 15 years of healthcare IT experience, having successfully...',
        content: 'Mission Meets Tech brings 15 years of healthcare IT experience, having successfully transitioned 2M+ patient records during the MHS GENESIS implementation with zero data loss.',
        source: 'DHA Contract Win - 2023',
      },
      {
        id: 2,
        title: 'Agile Transition Risk Mitigation',
        category: 'Technical',
        tags: ['Agile', 'Risk', 'Methodology'],
        usage: 8,
        rating: 4,
        preview: 'Our phased transition approach minimizes operational disruption through...',
        content: 'Our phased transition approach minimizes operational disruption through parallel operations, knowledge transfer workshops, and incremental capability deployment.',
        source: 'VA EHR Proposal - 2024',
      },
      {
        id: 3,
        title: 'CMMC Level 2 Compliance Statement',
        category: 'Compliance',
        tags: ['CMMC', 'Security', 'Compliance'],
        usage: 15,
        rating: 5,
        preview: 'Mission Meets Tech maintains CMMC Level 2 certification with current SPRS score of...',
        content: 'Mission Meets Tech maintains CMMC Level 2 certification with current SPRS score of 110, demonstrating full implementation of NIST 800-171 controls.',
        source: 'Compliance Library',
      },
      {
        id: 4,
        title: 'Small Business Subcontracting Commitment',
        category: 'Socioeconomic',
        tags: ['Small Business', 'Subcontracting', 'SDVOSB'],
        usage: 6,
        rating: 4,
        preview: 'We commit to exceeding small business goals through our established network of...',
        content: 'We commit to exceeding small business goals through our established network of 15+ vetted SDVOSB and 8(a) partners in the healthcare IT domain.',
        source: 'Template Library',
      },
    ];

    const CATEGORIES = ['All', 'Win Theme', 'Technical', 'Compliance', 'Socioeconomic', 'Pricing'];

    // ============================================================================
    // GLOBAL FOOTER
    // ============================================================================
    const GlobalFooter = () => (
      <footer className="fixed bottom-0 left-0 right-0 bg-slate-900/95 border-t border-slate-700/50 px-6 py-2 backdrop-blur-sm z-40">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-4">
            <span className="text-xs text-slate-500">
              MissionPulse {CONFIG.MODULE_ID} • {CONFIG.MODULE_NAME} v{CONFIG.VERSION}
            </span>
            <ConnectionStatus isConnected={true} />
          </div>
          <span className="text-xs text-amber-400 font-medium px-2 py-1 bg-amber-500/10 rounded border border-amber-500/20">
            ⚠️ AI GENERATED - REQUIRES HUMAN REVIEW
          </span>
        </div>
      </footer>
    );

    // ============================================================================
    // PLAYBOOK CARD
    // ============================================================================
    const PlaybookCard = ({ entry, onSelect, onToggleFavorite }) => (
      <div 
        className="glass-card rounded-xl p-4 cursor-pointer hover:border-cyan-500/50 transition-all animate-fadeIn"
        onClick={() => onSelect(entry)}
      >
        <div className="flex items-start justify-between mb-3">
          <div className="flex items-center gap-2">
            <span className={`px-2 py-1 text-xs rounded-full font-medium ${
              entry.category === 'Win Theme' ? 'bg-cyan-500/20 text-cyan-400' :
              entry.category === 'Technical' ? 'bg-purple-500/20 text-purple-400' :
              entry.category === 'Compliance' ? 'bg-emerald-500/20 text-emerald-400' :
              'bg-amber-500/20 text-amber-400'
            }`}>
              {entry.category}
            </span>
          </div>
          <button 
            onClick={(e) => { e.stopPropagation(); onToggleFavorite(entry.id); }}
            className="p-1 hover:bg-slate-700/50 rounded"
          >
            <Icon 
              name={entry.rating >= 5 ? 'star' : 'starOutline'} 
              className={`w-5 h-5 ${entry.rating >= 5 ? 'text-amber-400' : 'text-slate-500'}`} 
            />
          </button>
        </div>
        <h3 className="text-white font-semibold mb-2">{entry.title}</h3>
        <p className="text-slate-400 text-sm mb-3 line-clamp-2">{entry.preview}</p>
        <div className="flex items-center justify-between">
          <div className="flex gap-1">
            {entry.tags.slice(0, 2).map(tag => (
              <span key={tag} className="text-xs text-slate-500 bg-slate-800 px-2 py-0.5 rounded">
                {tag}
              </span>
            ))}
          </div>
          <span className="text-xs text-slate-500 flex items-center gap-1">
            <Icon name="trending" className="w-3 h-3" />
            {entry.usage} uses
          </span>
        </div>
      </div>
    );

    // ============================================================================
    // MAIN COMPONENT
    // ============================================================================
    const LessonsPlaybook = () => {
      const [entries, setEntries] = useState(PLAYBOOK_ENTRIES);
      const [selectedEntry, setSelectedEntry] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedCategory, setSelectedCategory] = useState('All');
      const [isLoading, setIsLoading] = useState(true);
      const { addToast } = useToast();

      useEffect(() => {
        const timer = setTimeout(() => {
          setIsLoading(false);
        }, 600);
        return () => clearTimeout(timer);
      }, []);

      const toggleFavorite = (id) => {
        setEntries(prev => prev.map(e => 
          e.id === id ? { ...e, rating: e.rating >= 5 ? 4 : 5 } : e
        ));
        addToast('Rating updated', 'success');
      };

      const filteredEntries = entries.filter(entry => {
        const matchesSearch = entry.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                             entry.tags.some(t => t.toLowerCase().includes(searchQuery.toLowerCase()));
        const matchesCategory = selectedCategory === 'All' || entry.category === selectedCategory;
        return matchesSearch && matchesCategory;
      });

      if (isLoading) {
        return (
          <div className="min-h-screen bg-[#00050F] flex items-center justify-center">
            <LoadingSpinner size="lg" message="Loading playbook..." />
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#00050F] pb-16">
          {/* Header */}
          <header className="bg-slate-900/80 border-b border-slate-700/50 px-6 py-4">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-4">
                <HomeButton />
                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-500 to-orange-500 flex items-center justify-center trophy-shimmer">
                  <Icon name="trophy" className="w-6 h-6 text-white" />
                </div>
                <div>
                  <h1 className="text-xl font-bold text-white">Lessons Learned & Playbook</h1>
                  <p className="text-sm text-slate-400">Golden examples & reusable content library</p>
                </div>
              </div>
              <div className="text-right">
                <div className="text-xs text-slate-500">Playbook Entries</div>
                <div className="text-2xl font-bold text-cyan-400">{entries.length}</div>
              </div>
            </div>
          </header>

          <div className="max-w-7xl mx-auto px-6 py-6">
            {/* Search and Filters */}
            <div className="flex flex-col md:flex-row gap-4 mb-6">
              <div className="flex-1 relative">
                <Icon name="search" className="w-5 h-5 text-slate-500 absolute left-3 top-1/2 -translate-y-1/2" />
                <input
                  type="text"
                  placeholder="Search playbook entries..."
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="w-full pl-10 pr-4 py-2.5 bg-slate-800/50 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none transition-colors"
                />
              </div>
              <div className="flex gap-2 overflow-x-auto">
                {CATEGORIES.map(cat => (
                  <button
                    key={cat}
                    onClick={() => setSelectedCategory(cat)}
                    className={`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all ${
                      selectedCategory === cat
                        ? 'bg-cyan-500 text-white'
                        : 'bg-slate-800 text-slate-400 hover:bg-slate-700'
                    }`}
                  >
                    {cat}
                  </button>
                ))}
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              {/* Entries Grid */}
              <div className="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4">
                {filteredEntries.map((entry, index) => (
                  <div key={entry.id} style={{ animationDelay: `${index * 50}ms` }}>
                    <PlaybookCard 
                      entry={entry}
                      onSelect={setSelectedEntry}
                      onToggleFavorite={toggleFavorite}
                    />
                  </div>
                ))}
                {filteredEntries.length === 0 && (
                  <div className="col-span-2 glass-card rounded-xl p-12 text-center">
                    <Icon name="search" className="w-12 h-12 text-slate-600 mx-auto mb-4" />
                    <h3 className="text-white font-semibold mb-2">No entries found</h3>
                    <p className="text-slate-400 text-sm">Try adjusting your search or filters</p>
                  </div>
                )}
              </div>

              {/* Detail Panel */}
              <div className="glass-card rounded-xl p-6 h-fit sticky top-6">
                {selectedEntry ? (
                  <div className="animate-fadeIn">
                    <div className="flex items-center justify-between mb-4">
                      <span className={`px-3 py-1 text-sm rounded-full font-medium ${
                        selectedEntry.category === 'Win Theme' ? 'bg-cyan-500/20 text-cyan-400' :
                        selectedEntry.category === 'Technical' ? 'bg-purple-500/20 text-purple-400' :
                        selectedEntry.category === 'Compliance' ? 'bg-emerald-500/20 text-emerald-400' :
                        'bg-amber-500/20 text-amber-400'
                      }`}>
                        {selectedEntry.category}
                      </span>
                      <button onClick={() => setSelectedEntry(null)} className="p-1 hover:bg-slate-700 rounded">
                        <Icon name="x" className="w-5 h-5 text-slate-400" />
                      </button>
                    </div>
                    <h2 className="text-xl font-bold text-white mb-4">{selectedEntry.title}</h2>
                    <div className="bg-slate-800/50 rounded-lg p-4 mb-4">
                      <p className="text-slate-300 leading-relaxed">{selectedEntry.content}</p>
                    </div>
                    <div className="flex flex-wrap gap-2 mb-4">
                      {selectedEntry.tags.map(tag => (
                        <span key={tag} className="text-xs bg-slate-700 text-slate-300 px-2 py-1 rounded flex items-center gap-1">
                          <Icon name="tag" className="w-3 h-3" />
                          {tag}
                        </span>
                      ))}
                    </div>
                    <div className="text-xs text-slate-500 mb-4">Source: {selectedEntry.source}</div>
                    <button 
                      onClick={() => {
                        navigator.clipboard.writeText(selectedEntry.content);
                        addToast('Copied to clipboard!', 'success');
                      }}
                      className="w-full py-2 bg-gradient-to-r from-cyan-500 to-teal-500 rounded-lg text-white font-semibold hover:from-cyan-400 hover:to-teal-400 transition-all"
                    >
                      Copy to Clipboard
                    </button>
                  </div>
                ) : (
                  <div className="text-center py-12">
                    <Icon name="book" className="w-16 h-16 text-slate-600 mx-auto mb-4" />
                    <h3 className="text-white font-semibold mb-2">Select an Entry</h3>
                    <p className="text-slate-400 text-sm">Click on a playbook entry to view details and copy content</p>
                  </div>
                )}
              </div>
            </div>
          </div>

          <GlobalFooter />
        </div>
      );
    };

    // ============================================================================
    // APP WITH PROVIDERS
    // ============================================================================
    const App = () => (
      <ErrorBoundary>
        <ToastProvider>
          <LessonsPlaybook />
        </ToastProvider>
      </ErrorBoundary>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
