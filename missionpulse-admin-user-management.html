    // ========================================================================
    // USERS TAB
    // ========================================================================
    function UsersTab({ users, setUsers, customRoles, searchTerm, setSearchTerm, selectedUser, setSelectedUser, showCreateUserModal, setShowCreateUserModal, canCreateUsers, showNotification }) {
      const filteredUsers = users.filter(u => 
        u.email.toLowerCase().includes(searchTerm.toLowerCase()) ||
        u.first_name.toLowerCase().includes(searchTerm.toLowerCase()) ||
        u.last_name.toLowerCase().includes(searchTerm.toLowerCase())
      );

      const handleCreateUser = (userData) => {
        const newUser = {
          id: Date.now().toString(),
          ...userData,
          status: 'pending_invite',
          mfa_enabled: false
        };
        setUsers([...users, newUser]);
        setShowCreateUserModal(false);
        showNotification(`Invitation sent to ${userData.email}`);
      };

      const handleUpdateUserRole = (userId, newRole) => {
        setUsers(users.map(u => u.id === userId ? { ...u, role: newRole } : u));
        showNotification('User role updated successfully');
      };

      const handleDeactivateUser = (userId) => {
        setUsers(users.map(u => u.id === userId ? { ...u, status: 'inactive' } : u));
        showNotification('User deactivated');
      };

      return (
        <div className="space-y-6">
          {/* Header Actions */}
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-4">
              <div className="relative">

                  placeholder="Search users..."
                  value={searchTerm}

                <span className="absolute left-3 top-2.5 text-slate-500">🔍</span>
              </div>
              <span className="text-sm text-slate-400">{filteredUsers.length} users</span>
            </div>

            {canCreateUsers && (
              <button
                onClick={() => setShowCreateUserModal(true)}
                className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-purple-500 text-white rounded-lg font-medium hover:opacity-90 transition-opacity flex items-center gap-2"
              >
                <span>➕</span> Create User
              </button>
            )}
          </div>

          {/* Users Table */}
          <div className="bg-slate-900/50 rounded-xl border border-slate-700/50 overflow-hidden">
            <table className="w-full">
              <thead>
                <tr className="border-b border-slate-700/50">
                  <th className="text-left px-4 py-3 text-sm font-medium text-slate-400">User</th>
                  <th className="text-left px-4 py-3 text-sm font-medium text-slate-400">Role</th>
                  <th className="text-left px-4 py-3 text-sm font-medium text-slate-400">Status</th>
                  <th className="text-left px-4 py-3 text-sm font-medium text-slate-400">MFA</th>
                  <th className="text-left px-4 py-3 text-sm font-medium text-slate-400">Type</th>
                  <th className="text-right px-4 py-3 text-sm font-medium text-slate-400">Actions</th>
                </tr>
              </thead>
              <tbody>
                {filteredUsers.map(user => (
                  <tr key={user.id} className="border-b border-slate-700/30 hover:bg-slate-800/30">
                    <td className="px-4 py-3">
                      <div className="flex items-center gap-3">
                        <div className="w-8 h-8 rounded-full bg-gradient-to-br from-cyan-500 to-purple-500 flex items-center justify-center text-xs font-bold">
                          {user.first_name[0]}{user.last_name[0]}
                        </div>
                        <div>
                          <div className="font-medium text-white">{user.first_name} {user.last_name}</div>
                          <div className="text-sm text-slate-400">{user.email}</div>
                        </div>
                      </div>
                    </td>
                    <td className="px-4 py-3">
                      <select 
                        value={user.role}
                        onChange={(e) => handleUpdateUserRole(user.id, e.target.value)}
                        className="bg-slate-800/50 border border-slate-700/50 rounded px-2 py-1 text-sm text-white focus:outline-none focus:border-cyan-500/50"

                          <option value="COO">COO</option>
                          <option value="CAP">Capture Manager</option>
                          <option value="PM">Project Manager</option>
                          <option value="SA">Solution Architect</option>
                          <option value="FIN">Finance</option>
                          <option value="CON">Contracts</option>
                          <option value="DEL">Delivery</option>
                          <option value="QA">Quality Assurance</option>
                          <option value="Partner">Partner</option>
                          <option value="admin">Admin</option>
                        </optgroup>
                        {customRoles.length > 0 && (
                          <optgroup label="Custom Roles">
                            {customRoles.map(role => (
                              <option key={role.id} value={role.role_name}>{role.display_name}</option>
                            ))}
                          </optgroup>
                        )}

                      <span className={`px-2 py-1 rounded-full text-xs font-medium ${
                        user.status === 'active' ? 'bg-emerald-500/20 text-emerald-400' :
                        user.status === 'pending_invite' ? 'bg-amber-500/20 text-amber-400' :
                        'bg-red-500/20 text-red-400'

                    <td className="px-4 py-3">

                        <span className="text-amber-400">⚠ Disabled</span>

                    <td className="px-4 py-3">

                        <span className="px-2 py-1 rounded bg-cyan-500/20 text-cyan-400 text-xs">Internal</span>

                        {canCreateUsers && user.status === 'active' && (
                          <button 
                            onClick={() => handleDeactivateUser(user.id)}
                            className="p-2 hover:bg-red-500/20 rounded text-red-400"
                            title="Deactivate"
                          >
                            🚫
                          </button>
                        )}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>

            <CreateUserModal 
              onClose={() => setShowCreateUserModal(false)}
              onCreate={handleCreateUser}
              customRoles={customRoles}
            />

    // ========================================================================
    // CREATE USER MODAL
    // ========================================================================
    function CreateUserModal({ onClose, onCreate, customRoles }) {
      const [formData, setFormData] = useState({
        email: '',
        first_name: '',
        last_name: '',
        role: 'QA',
        is_external: false,
        send_invitation: true

        e.preventDefault();
        onCreate(formData);
      };

      return (
        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
          <div className="bg-slate-900 rounded-xl border border-slate-700/50 w-full max-w-md">
            <div className="p-4 border-b border-slate-700/50 flex items-center justify-between">

              <button onClick={onClose} className="text-slate-400 hover:text-white">✕</button>
            </div>

            <form onSubmit={handleSubmit} className="p-4 space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-300 mb-1">Email Address *</label>
                <input
                  type="email"
                  required
                  value={formData.email}
                  onChange={(e) => setFormData({...formData, email: e.target.value})}
                  className="w-full px-3 py-2 bg-slate-800/50 border border-slate-700/50 rounded-lg text-white focus:outline-none focus:border-cyan-500/50"
                  placeholder="user@company.com"
                />
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-slate-300 mb-1">First Name *</label>
                  <input
                    type="text"
                    required
                    value={formData.first_name}
                    onChange={(e) => setFormData({...formData, first_name: e.target.value})}
                    className="w-full px-3 py-2 bg-slate-800/50 border border-slate-700/50 rounded-lg text-white focus:outline-none focus:border-cyan-500/50"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-300 mb-1">Last Name *</label>
                  <input
                    type="text"
                    required
                    value={formData.last_name}
                    onChange={(e) => setFormData({...formData, last_name: e.target.value})}
                    className="w-full px-3 py-2 bg-slate-800/50 border border-slate-700/50 rounded-lg text-white focus:outline-none focus:border-cyan-500/50"
                  />
                </div>
              </div>

              <div>
                <label className="block text-sm font-medium text-slate-300 mb-1">Role *</label>
                <select
                  value={formData.role}
                  onChange={(e) => setFormData({...formData, role: e.target.value})}
                  className="w-full px-3 py-2 bg-slate-800/50 border border-slate-700/50 rounded-lg text-white focus:outline-none focus:border-cyan-500/50"
                >
                  <optgroup label="Standard Roles">
                    <option value="CEO">CEO</option>
                    <option value="COO">COO</option>
                    <option value="CAP">Capture Manager</option>
                    <option value="PM">Project Manager</option>
                    <option value="SA">Solution Architect</option>
                    <option value="FIN">Finance</option>
                    <option value="CON">Contracts</option>
                    <option value="DEL">Delivery</option>
                    <option value="QA">Quality Assurance</option>
                    <option value="Partner">Partner</option>
                  </optgroup>
                  {customRoles.length > 0 && (
                    <optgroup label="Custom Roles">
                      {customRoles.map(role => (
                        <option key={role.id} value={role.role_name}>{role.display_name}</option>
                      ))}
                    </optgroup>
                  )}
                </select>
              </div>

              <div className="flex items-center gap-3">
                <input
                  type="checkbox"
                  id="is_external"
                  checked={formData.is_external}
                  onChange={(e) => setFormData({...formData, is_external: e.target.checked})}
                  className="w-4 h-4 rounded border-slate-600 bg-slate-800"
                />
                <label htmlFor="is_external" className="text-sm text-slate-300">
                  External User (Partner/Subcontractor)
                </label>
              </div>

              {formData.is_external && (
                <div className="p-3 bg-amber-500/10 border border-amber-500/30 rounded-lg">
                  <p className="text-sm text-amber-400">
                    ⚠️ External users have restricted access and CUI watermarking enforced.
                  </p>
                </div>
              )}

              <div className="flex items-center gap-3">
                <input
                  type="checkbox"
                  id="send_invitation"
                  checked={formData.send_invitation}
                  onChange={(e) => setFormData({...formData, send_invitation: e.target.checked})}
                  className="w-4 h-4 rounded border-slate-600 bg-slate-800"
                />
                <label htmlFor="send_invitation" className="text-sm text-slate-300">
                  Send email invitation immediately
                </label>
              </div>

              <div className="flex gap-3 pt-4">
                <button
                  type="button"
                  onClick={onClose}
                  className="flex-1 px-4 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-600"
                >
                  Cancel
                </button>
                <button
                  type="submit"
                  className="flex-1 px-4 py-2 bg-gradient-to-r from-cyan-500 to-purple-500 text-white rounded-lg font-medium hover:opacity-90"
                >
                  Create User
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

        const newRole = {
          id: Date.now().toString(),
          ...roleData,
          is_active: true
        };
        setCustomRoles([...customRoles, newRole]);
        setShowCreateRoleModal(false);
        showNotification(`Custom role "${roleData.display_name}" created`);
      };

      const handleDeleteRole = (roleId) => {
        if (confirm('Are you sure you want to delete this custom role?')) {
          setCustomRoles(customRoles.filter(r => r.id !== roleId));
          showNotification('Custom role deleted');
        }
      };

      return (
        <div className="space-y-6">
          {/* Info Banner */}
          <div className="p-4 bg-cyan-500/10 border border-cyan-500/30 rounded-xl">
            <div className="flex items-start gap-3">
              <span className="text-2xl">💡</span>
              <div>
                <h4 className="font-medium text-cyan-400 mb-1">Custom Roles</h4>
                <p className="text-sm text-slate-300">
                  Create custom roles tailored to your organization's unique workflow. Custom roles inherit 
                  permissions from a base role and can be further customized for module access, AI agents, and security settings.
                </p>
              </div>
            </div>
          </div>

          {/* Header Actions */}
          <div className="flex items-center justify-between">
            <h3 className="text-lg font-semibold text-white">Custom Roles ({customRoles.length})</h3>
            {canCreateUsers && (
              <button
                onClick={() => setShowCreateRoleModal(true)}
                className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-purple-500 text-white rounded-lg font-medium hover:opacity-90 transition-opacity flex items-center gap-2"
              >
                <span>➕</span> Create Custom Role
              </button>
            )}
          </div>

          {/* Roles Grid */}
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {customRoles.map(role => (
              <div key={role.id} className="bg-slate-900/50 rounded-xl border border-slate-700/50 p-4 hover:border-cyan-500/30 transition-colors">
                <div className="flex items-start justify-between mb-3">
                  <div>
                    <h4 className="font-semibold text-white">{role.display_name}</h4>
                    <p className="text-sm text-slate-400">Based on: {role.base_role}</p>
                  </div>
                  <span className={`px-2 py-1 rounded text-xs font-medium ${
                    role.is_active ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-500/20 text-slate-400'
                  }`}>
                    {role.is_active ? 'Active' : 'Inactive'}
                  </span>
                </div>

                <div className="space-y-2 mb-4">
                  <div className="flex items-center gap-2 text-sm text-slate-300">
                    <span>📊</span>
                    <span>UI Level: {role.ui_complexity_level}</span>
                  </div>
                </div>

                <div className="flex gap-2">
                  <button 
                    onClick={() => setSelectedRole(role)}
                    className="flex-1 px-3 py-1.5 bg-slate-700/50 text-white rounded text-sm hover:bg-slate-600/50"
                  >
                    Edit
                  </button>
                  {canCreateUsers && (
                    <button 
                      onClick={() => handleDeleteRole(role.id)}
                      className="px-3 py-1.5 bg-red-500/20 text-red-400 rounded text-sm hover:bg-red-500/30"
                    >
                      Delete
                    </button>
                  )}
                </div>
              </div>
            ))}

            {customRoles.length === 0 && (
              <div className="col-span-full text-center py-12 bg-slate-900/30 rounded-xl border border-dashed border-slate-700/50">
                <div className="text-4xl mb-3">🎭</div>
                <h4 className="text-lg font-medium text-white mb-1">No Custom Roles Yet</h4>
                <p className="text-sm text-slate-400 mb-4">Create custom roles to match your organization's workflow</p>
                {canCreateUsers && (
                  <button
                    onClick={() => setShowCreateRoleModal(true)}
                    className="px-4 py-2 bg-cyan-500/20 text-cyan-400 rounded-lg text-sm font-medium hover:bg-cyan-500/30"
                  >
                    Create Your First Role
                  </button>
                )}
              </div>
            )}
          </div>

          {/* Create Role Modal */}
          {showCreateRoleModal && (
            <CreateRoleModal 
              onClose={() => setShowCreateRoleModal(false)}
              onCreate={handleCreateRole}
            />
          )}

          {/* Edit Role Modal */}
          {selectedRole && (
            <EditRoleModal 
              role={selectedRole}
              onClose={() => setSelectedRole(null)}
              onSave={(updated) => {
                setCustomRoles(customRoles.map(r => r.id === updated.id ? updated : r));
                setSelectedRole(null);
                showNotification('Role updated successfully');
              }}
            />
          )}
        </div>
      );
    }

    // ========================================================================
    // CREATE ROLE MODAL
    // ========================================================================
    function CreateRoleModal({ onClose, onCreate }) {
      const [formData, setFormData] = useState({
        role_name: '',
        display_name: '',
        base_role: 'author',
        ui_complexity_level: 'standard',
        is_external: false,
        module_permissions: {},
        allowed_ai_agents: ['writer', 'capture'],
        force_cui_watermark: false,
        session_timeout_seconds: 14400
      });

      const [step, setStep] = useState(1);

      const handleSubmit = (e) => {
        e.preventDefault();
        // Generate role_name from display_name
        const role_name = formData.display_name.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
        onCreate({ ...formData, role_name });
      };

      return (
        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
          <div className="bg-slate-900 rounded-xl border border-slate-700/50 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <div className="p-4 border-b border-slate-700/50 flex items-center justify-between sticky top-0 bg-slate-900">
              <div>
                <h3 className="text-lg font-semibold text-white">Create Custom Role</h3>
                <p className="text-sm text-slate-400">Step {step} of 3</p>
              </div>
              <button onClick={onClose} className="text-slate-400 hover:text-white">✕</button>
            </div>

            <form onSubmit={handleSubmit} className="p-4 space-y-6">
              {/* Step 1: Basic Info */}
              {step === 1 && (
                <div className="space-y-4">
                  <h4 className="font-medium text-white">Basic Information</h4>
                  
                  <div>
                    <label className="block text-sm font-medium text-slate-300 mb-1">Role Display Name *</label>
                    <input
                      type="text"
                      required
                      value={formData.display_name}
                      onChange={(e) => setFormData({...formData, display_name: e.target.value})}
                      className="w-full px-3 py-2 bg-slate-800/50 border border-slate-700/50 rounded-lg text-white focus:outline-none focus:border-cyan-500/50"
                      placeholder="e.g., Senior Proposal Writer"
                    />
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-slate-300 mb-1">Base Role (Inherit From) *</label>
                    <select
                      value={formData.base_role}
                      onChange={(e) => setFormData({...formData, base_role: e.target.value})}
                      className="w-full px-3 py-2 bg-slate-800/50 border border-slate-700/50 rounded-lg text-white focus:outline-none focus:border-cyan-500/50"
                    >
                      {BASE_ROLES.map(role => (
                        <option key={role.id} value={role.id}>{role.name}</option>
                      ))}
                    </select>
                    <p className="text-xs text-slate-500 mt-1">This role's permissions start from the base role</p>
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-slate-300 mb-1">UI Complexity Level</label>
                    <select
                      value={formData.ui_complexity_level}
                      onChange={(e) => setFormData({...formData, ui_complexity_level: e.target.value})}
                      className="w-full px-3 py-2 bg-slate-800/50 border border-slate-700/50 rounded-lg text-white focus:outline-none focus:border-cyan-500/50"
                    >
                      <option value="simplified">Simplified (Minimal interface)</option>
                      <option value="standard">Standard (Full functional interface)</option>
                      <option value="advanced">Advanced (With analytics)</option>
                    </select>
                  </div>

                  <div className="flex items-center gap-3">
                    <input
                      type="checkbox"
                      id="is_external_role"
                      checked={formData.is_external}
                      onChange={(e) => setFormData({...formData, is_external: e.target.checked})}
                      className="w-4 h-4 rounded border-slate-600 bg-slate-800"
                    />
                    <label htmlFor="is_external_role" className="text-sm text-slate-300">
                      This is an external role (Partner/Subcontractor)
                    </label>
                  </div>
                </div>
              )}

              {/* Step 2: Module Permissions */}
              {step === 2 && (
                <div className="space-y-4">
                  <h4 className="font-medium text-white">Module Access</h4>
                  <p className="text-sm text-slate-400">Select which modules this role can access</p>
                  
                  <div className="grid grid-cols-2 gap-3">
                    {MODULES.map(module => (
                      <div 
                        key={module.id}
                        className={`p-3 rounded-lg border cursor-pointer transition-colors ${
                          formData.module_permissions[module.id]?.shouldRender
                            ? 'bg-cyan-500/20 border-cyan-500/50'
                            : 'bg-slate-800/30 border-slate-700/50 hover:border-slate-600'
                        }`}
                        onClick={() => {
                          const current = formData.module_permissions[module.id] || { shouldRender: false, canView: false, canEdit: false };
                          setFormData({
                            ...formData,
                            module_permissions: {
                              ...formData.module_permissions,
                              [module.id]: { ...current, shouldRender: !current.shouldRender, canView: !current.shouldRender }
                            }
                          });
                        }}
                      >
                        <div className="flex items-center gap-2">
                          <span>{module.icon}</span>
                          <span className="text-white font-medium">{module.name}</span>
                          {module.sensitive && <span className="text-xs px-1 bg-red-500/20 text-red-400 rounded">Sensitive</span>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Step 3: AI & Security */}
              {step === 3 && (
                <div className="space-y-4">
                  <h4 className="font-medium text-white">AI Agents & Security</h4>
                  
                  <div>
                    <label className="block text-sm font-medium text-slate-300 mb-2">AI Agent Access</label>
                    <div className="grid grid-cols-2 gap-2">
                      {AI_AGENTS.map(agent => (
                        <label 
                          key={agent.id}
                          className="flex items-center gap-2 p-2 bg-slate-800/30 rounded cursor-pointer hover:bg-slate-700/30"
                        >
                          <input
                            type="checkbox"
                            checked={formData.allowed_ai_agents.includes(agent.id)}
                            onChange={(e) => {
                              if (e.target.checked) {
                                setFormData({...formData, allowed_ai_agents: [...formData.allowed_ai_agents, agent.id]});
                              } else {
                                setFormData({...formData, allowed_ai_agents: formData.allowed_ai_agents.filter(a => a !== agent.id)});
                              }
                            }}
                            className="w-4 h-4 rounded border-slate-600 bg-slate-800"
                          />
                          <span className="text-sm text-slate-300">{agent.name}</span>
                          {agent.sensitive && <span className="text-xs px-1 bg-amber-500/20 text-amber-400 rounded">⚠️</span>}
                        </label>
                      ))}
                    </div>
                  </div>

                  <div className="flex items-center gap-3 p-3 bg-slate-800/30 rounded-lg">
                    <input
                      type="checkbox"
                      id="force_cui"
                      checked={formData.force_cui_watermark}
                      onChange={(e) => setFormData({...formData, force_cui_watermark: e.target.checked})}
                      className="w-4 h-4 rounded border-slate-600 bg-slate-800"
                    />
                    <label htmlFor="force_cui" className="text-sm text-slate-300">
                      Force CUI watermark on all exports
                    </label>
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-slate-300 mb-1">Session Timeout</label>
                    <select
                      value={formData.session_timeout_seconds}
                      onChange={(e) => setFormData({...formData, session_timeout_seconds: parseInt(e.target.value)})}
                      className="w-full px-3 py-2 bg-slate-800/50 border border-slate-700/50 rounded-lg text-white focus:outline-none focus:border-cyan-500/50"
                    >
                      <option value={3600}>1 hour</option>
                      <option value={7200}>2 hours</option>
                      <option value={14400}>4 hours</option>
                      <option value={28800}>8 hours</option>
                    </select>
                  </div>
                </div>
              )}

              {/* Navigation */}
              <div className="flex gap-3 pt-4 border-t border-slate-700/50">
                {step > 1 && (
                  <button
                    type="button"
                    onClick={() => setStep(step - 1)}
                    className="px-4 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-600"
                  >
                    Back
                  </button>
                )}
                <button
                  type="button"
                  onClick={onClose}
                  className="px-4 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-600"
                >
                  Cancel
                </button>
                <div className="flex-1"></div>
                {step < 3 ? (
                  <button
                    type="button"
                    onClick={() => setStep(step + 1)}
                    className="px-4 py-2 bg-cyan-500 text-white rounded-lg font-medium hover:bg-cyan-400"
                    disabled={step === 1 && !formData.display_name}
                  >
                    Next
                  </button>
                ) : (
                  <button
                    type="submit"
                    className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-purple-500 text-white rounded-lg font-medium hover:opacity-90"
                  >
                    Create Role
                  </button>
                )}
              </div>
            </form>
          </div>
        </div>
      );
    }

    // ========================================================================
    // EDIT ROLE MODAL (Simplified)
    // ========================================================================
    function EditRoleModal({ role, onClose, onSave }) {
      const [formData, setFormData] = useState({ ...role });

      return (
        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
          <div className="bg-slate-900 rounded-xl border border-slate-700/50 w-full max-w-md">
            <div className="p-4 border-b border-slate-700/50 flex items-center justify-between">
              <h3 className="text-lg font-semibold text-white">Edit Role: {role.display_name}</h3>
              <button onClick={onClose} className="text-slate-400 hover:text-white">✕</button>
            </div>
            <div className="p-4 space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-300 mb-1">Display Name</label>
                <input
                  type="text"
                  value={formData.display_name}
                  onChange={(e) => setFormData({...formData, display_name: e.target.value})}
                  className="w-full px-3 py-2 bg-slate-800/50 border border-slate-700/50 rounded-lg text-white"
                />
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-300 mb-1">UI Complexity</label>
                <select
                  value={formData.ui_complexity_level}
                  onChange={(e) => setFormData({...formData, ui_complexity_level: e.target.value})}
                  className="w-full px-3 py-2 bg-slate-800/50 border border-slate-700/50 rounded-lg text-white"
                >
                  <option value="simplified">Simplified</option>
                  <option value="standard">Standard</option>
                  <option value="advanced">Advanced</option>
                </select>
              </div>
              <div className="flex gap-3 pt-4">
                <button onClick={onClose} className="flex-1 px-4 py-2 bg-slate-700 text-white rounded-lg">Cancel</button>
                <button onClick={() => onSave(formData)} className="flex-1 px-4 py-2 bg-cyan-500 text-white rounded-lg">Save</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ========================================================================
    // INVITATIONS TAB
    // ========================================================================
    function InvitationsTab({ showNotification }) {
      const [bulkEmails, setBulkEmails] = useState('');

      const handleBulkInvite = () => {
        const emails = bulkEmails.split(/[,\n]/).map(e => e.trim()).filter(e => e);
        if (emails.length > 0) {
          showNotification(`Sent ${emails.length} invitations`);
          setBulkEmails('');
        }
      };

      return (
        <div className="space-y-6">
          <div className="bg-slate-900/50 rounded-xl border border-slate-700/50 p-6">
            <h3 className="text-lg font-semibold text-white mb-4">📨 Bulk Invite Users</h3>
            <p className="text-sm text-slate-400 mb-4">Enter email addresses separated by commas or new lines</p>
            
            <textarea
              value={bulkEmails}
              onChange={(e) => setBulkEmails(e.target.value)}
              placeholder="user1@company.com, user2@company.com..."
              className="w-full h-32 px-3 py-2 bg-slate-800/50 border border-slate-700/50 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500/50"
            />
            
            <button
              onClick={handleBulkInvite}
              disabled={!bulkEmails.trim()}
              className="mt-4 px-4 py-2 bg-cyan-500 text-white rounded-lg font-medium hover:bg-cyan-400 disabled:opacity-50 disabled:cursor-not-allowed"
            >
              Send Invitations
            </button>
          </div>
        </div>
      );
    }

    // ========================================================================
    // AUDIT LOG TAB
    // ========================================================================
    function AuditLogTab() {
      const auditLogs = [
        { id: 1, event: 'USER_CREATED', user: 'mary@missionmeetstech.com', target: 'partner@external.com', timestamp: '2026-01-28 14:32:00' },
        { id: 2, event: 'ROLE_CHANGED', user: 'mary@missionmeetstech.com', target: 'capture@missionmeetstech.com', details: 'PM → CAP', timestamp: '2026-01-28 14:30:00' },
        { id: 3, event: 'CUSTOM_ROLE_CREATED', user: 'mary@missionmeetstech.com', target: 'Junior Analyst', timestamp: '2026-01-28 14:25:00' }
      ];

      return (
        <div className="bg-slate-900/50 rounded-xl border border-slate-700/50 overflow-hidden">
          <table className="w-full">
            <thead>
              <tr className="border-b border-slate-700/50">
                <th className="text-left px-4 py-3 text-sm font-medium text-slate-400">Timestamp</th>
                <th className="text-left px-4 py-3 text-sm font-medium text-slate-400">Event</th>
                <th className="text-left px-4 py-3 text-sm font-medium text-slate-400">Performed By</th>
                <th className="text-left px-4 py-3 text-sm font-medium text-slate-400">Target</th>
                <th className="text-left px-4 py-3 text-sm font-medium text-slate-400">Details</th>
              </tr>
            </thead>
            <tbody>
              {auditLogs.map(log => (
                <tr key={log.id} className="border-b border-slate-700/30">
                  <td className="px-4 py-3 text-sm text-slate-400">{log.timestamp}</td>
                  <td className="px-4 py-3">
                    <span className="px-2 py-1 bg-purple-500/20 text-purple-400 rounded text-xs font-medium">
                      {log.event}
                    </span>
                  </td>
                  <td className="px-4 py-3 text-sm text-white">{log.user}</td>
                  <td className="px-4 py-3 text-sm text-slate-300">{log.target}</td>
                  <td className="px-4 py-3 text-sm text-slate-400">{log.details || '-'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    // Render
    ReactDOM.createRoot(document.getElementById('root')).render(<AdminUserManagement />);
  </script>
</body>
</html>
