<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Settings</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --mmt-cyan: #00E5FA; --mmt-navy: #00050F; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--mmt-navy); color: #e2e8f0; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

const CONFIG = {
  SUPABASE_URL: 'https://qdrtpnpnhkxvfmvfziop.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8',
  LOGIN_PAGE: 'login.html'
};

function checkAuth() {
  const session = localStorage.getItem('MP_SESSION');
  if (!session) { window.location.href = CONFIG.LOGIN_PAGE; return null; }
  try { return JSON.parse(localStorage.getItem('MP_USER')); }
  catch { return { email: 'demo@mmt.com', role: 'CEO', name: 'Demo User' }; }
}

function Toggle({ enabled, onChange, label, description }) {
  return (
    <div className="flex items-center justify-between py-3">
      <div>
        <p className="text-white font-medium">{label}</p>
        <p className="text-sm text-slate-400">{description}</p>
      </div>
      <button onClick={() => onChange(!enabled)} className={`w-12 h-6 rounded-full transition-colors ${enabled ? 'bg-cyan-500' : 'bg-slate-600'}`}>
        <div className={`w-5 h-5 bg-white rounded-full transition-transform ${enabled ? 'translate-x-6' : 'translate-x-0.5'}`} />
      </button>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [settings, setSettings] = useState({
    emailNotifications: true,
    slackAlerts: false,
    darkMode: true,
    compactView: false,
    autoSave: true,
    showCUI: true
  });

  useEffect(() => {
    const authUser = checkAuth();
    if (authUser) setUser(authUser);
  }, []);

  const updateSetting = (key, value) => setSettings({ ...settings, [key]: value });

  const handleLogout = () => {
    localStorage.removeItem('MP_SESSION');
    localStorage.removeItem('MP_USER');
    window.location.href = CONFIG.LOGIN_PAGE;
  };

  if (!user) return <div className="min-h-screen flex items-center justify-center text-cyan-400">Loading...</div>;

  return (
    <div className="min-h-screen bg-slate-950">
      <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
        <div className="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            </a>
            <h1 className="text-xl font-bold text-white">⚙️ Settings</h1>
          </div>
        </div>
      </header>

      <main className="max-w-3xl mx-auto px-4 py-6 space-y-6">
        {/* Profile */}
        <div className="glass rounded-xl p-6">
          <h2 className="text-lg font-semibold text-white mb-4">Profile</h2>
          <div className="flex items-center gap-4 mb-4">
            <div className="w-16 h-16 rounded-full bg-gradient-to-br from-cyan-500 to-teal-500 flex items-center justify-center text-2xl font-bold text-white">
              {user.name?.split(' ').map(n => n[0]).join('') || 'U'}
            </div>
            <div>
              <p className="text-xl font-semibold text-white">{user.name}</p>
              <p className="text-slate-400">{user.email}</p>
              <span className="text-xs px-2 py-1 bg-cyan-500/20 text-cyan-400 rounded mt-1 inline-block">{user.role}</span>
            </div>
          </div>
        </div>

        {/* Notifications */}
        <div className="glass rounded-xl p-6">
          <h2 className="text-lg font-semibold text-white mb-4">Notifications</h2>
          <div className="divide-y divide-slate-700/50">
            <Toggle enabled={settings.emailNotifications} onChange={(v) => updateSetting('emailNotifications', v)} label="Email Notifications" description="Receive proposal updates and deadline reminders" />
            <Toggle enabled={settings.slackAlerts} onChange={(v) => updateSetting('slackAlerts', v)} label="Slack Alerts" description="Send critical alerts to Slack channel" />
          </div>
        </div>

        {/* Display */}
        <div className="glass rounded-xl p-6">
          <h2 className="text-lg font-semibold text-white mb-4">Display</h2>
          <div className="divide-y divide-slate-700/50">
            <Toggle enabled={settings.darkMode} onChange={(v) => updateSetting('darkMode', v)} label="Dark Mode" description="Use dark theme throughout the application" />
            <Toggle enabled={settings.compactView} onChange={(v) => updateSetting('compactView', v)} label="Compact View" description="Reduce spacing for more content density" />
            <Toggle enabled={settings.showCUI} onChange={(v) => updateSetting('showCUI', v)} label="Show CUI Banners" description="Display CUI classification banners on sensitive modules" />
          </div>
        </div>

        {/* Data */}
        <div className="glass rounded-xl p-6">
          <h2 className="text-lg font-semibold text-white mb-4">Data & Privacy</h2>
          <div className="divide-y divide-slate-700/50">
            <Toggle enabled={settings.autoSave} onChange={(v) => updateSetting('autoSave', v)} label="Auto-Save" description="Automatically save changes as you work" />
          </div>
        </div>

        {/* Logout */}
        <div className="glass rounded-xl p-6">
          <h2 className="text-lg font-semibold text-white mb-4">Session</h2>
          <button onClick={handleLogout} className="px-4 py-2 bg-red-600 hover:bg-red-500 rounded-lg text-white font-medium">
            Sign Out
          </button>
        </div>

        {/* Version Info */}
        <div className="text-center text-sm text-slate-500">
          <p>MissionPulse v3.0.0</p>
          <p>Mission Meets Tech © 2026</p>
        </div>
      </main>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
