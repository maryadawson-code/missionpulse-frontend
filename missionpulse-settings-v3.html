<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    // ============================================
    // CONFIGURATION
    // ============================================
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // ============================================
    // COMPONENTS
    // ============================================

    // Toggle Switch
    const Toggle = ({ enabled, onChange, label, description }) => (
      <div className="flex items-center justify-between py-3">
        <div>
          <p className="text-white font-medium">{label}</p>
          {description && <p className="text-xs text-slate-500">{description}</p>}
        </div>
        <button
          onClick={() => onChange(!enabled)}
          className={`relative w-12 h-6 rounded-full transition-colors ${enabled ? 'bg-cyan-500' : 'bg-slate-600'}`}
        >
          <div className={`absolute top-1 w-4 h-4 rounded-full bg-white transition-transform ${enabled ? 'left-7' : 'left-1'}`} />
        </button>
      </div>
    );

    // Input Field
    const InputField = ({ label, value, onChange, type = 'text', placeholder, disabled, secret }) => (
      <div className="space-y-1">
        <label className="text-sm text-slate-400">{label}</label>
        <input
          type={secret ? 'password' : type}
          value={value}
          onChange={(e) => onChange(e.target.value)}
          placeholder={placeholder}
          disabled={disabled}
          className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 disabled:opacity-50"
        />
      </div>
    );

    // Select Field
    const SelectField = ({ label, value, onChange, options }) => (
      <div className="space-y-1">
        <label className="text-sm text-slate-400">{label}</label>
        <select
          value={value}
          onChange={(e) => onChange(e.target.value)}
          className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
        >
          {options.map(opt => (
            <option key={opt.value} value={opt.value}>{opt.label}</option>
          ))}
        </select>
      </div>
    );

    // Settings Section
    const SettingsSection = ({ title, icon, children }) => (
      <div className="glass rounded-xl border border-slate-700/50 overflow-hidden">
        <div className="bg-slate-800/50 px-6 py-4 border-b border-slate-700">
          <h3 className="font-semibold text-white flex items-center gap-2">
            <span>{icon}</span> {title}
          </h3>
        </div>
        <div className="p-6 space-y-4">
          {children}
        </div>
      </div>
    );

    // AI Provider Card
    const AIProviderCard = ({ provider, isActive, onConfigure }) => {
      const providers = {
        anthropic: { name: 'Anthropic Claude', icon: '🤖', status: 'connected', model: 'claude-3-opus' },
        asksage: { name: 'AskSage', icon: '🔒', status: 'pending', model: 'FedRAMP High' },
        openai: { name: 'OpenAI', icon: '💡', status: 'disabled', model: 'GPT-4' }
      };
      const p = providers[provider];

      return (
        <div className={`rounded-lg border p-4 ${isActive ? 'border-cyan-500 bg-cyan-500/10' : 'border-slate-700 bg-slate-800/50'}`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-2">
              <span className="text-xl">{p.icon}</span>
              <span className="font-medium text-white">{p.name}</span>
            </div>
            <span className={`px-2 py-0.5 rounded text-xs ${
              p.status === 'connected' ? 'bg-emerald-500/20 text-emerald-400' :
              p.status === 'pending' ? 'bg-amber-500/20 text-amber-400' :
              'bg-slate-500/20 text-slate-400'
            }`}>
              {p.status}
            </span>
          </div>
          <p className="text-xs text-slate-500 mb-3">Model: {p.model}</p>
          <button
            onClick={() => onConfigure(provider)}
            className="w-full px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded text-sm transition-colors"
          >
            Configure
          </button>
        </div>
      );
    };

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [settings, setSettings] = React.useState({
        // General
        companyName: 'Mission Meets Tech',
        timezone: 'America/New_York',
        dateFormat: 'MM/DD/YYYY',
        
        // AI Providers
        primaryAI: 'anthropic',
        anthropicKey: '••••••••••••••••',
        askSageEndpoint: '',
        askSageToken: '',
        cuiAutoRoute: true,
        
        // Notifications
        emailNotifications: true,
        slackNotifications: false,
        deadlineReminders: true,
        reminderDays: '7',
        dailyDigest: true,
        
        // Security
        sessionTimeout: '60',
        mfaRequired: true,
        ipWhitelist: false,
        auditRetention: '365',
        
        // Display
        darkMode: true,
        compactView: false,
        showConfidenceScores: true,
        autoExpandCards: false
      });

      const [activeTab, setActiveTab] = React.useState('general');
      const [saved, setSaved] = React.useState(false);

      const handleSave = () => {
        setSaved(true);
        setTimeout(() => setSaved(false), 3000);
        // In production: save to Supabase
      };

      const updateSetting = (key, value) => {
        setSettings(prev => ({ ...prev, [key]: value }));
      };

      const tabs = [
        { id: 'general', label: 'General', icon: '⚙️' },
        { id: 'ai', label: 'AI Providers', icon: '🤖' },
        { id: 'notifications', label: 'Notifications', icon: '🔔' },
        { id: 'security', label: 'Security', icon: '🔒' },
        { id: 'display', label: 'Display', icon: '🎨' }
      ];

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-700/50 rounded-lg">← Back</a>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-slate-500 to-slate-600 flex items-center justify-center">⚙️</div>
                  <div>
                    <h1 className="text-xl font-bold text-white">Settings</h1>
                    <p className="text-xs text-slate-400">System Configuration</p>
                  </div>
                </div>
              </div>
              <button
                onClick={handleSave}
                className={`px-6 py-2 rounded-lg font-medium transition-all ${
                  saved ? 'bg-emerald-600 text-white' : 'bg-cyan-600 hover:bg-cyan-500 text-white'
                }`}
              >
                {saved ? '✓ Saved' : 'Save Changes'}
              </button>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8">
            <div className="flex flex-col md:flex-row gap-6">
              {/* Sidebar Tabs */}
              <div className="md:w-48 space-y-1">
                {tabs.map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`w-full text-left px-4 py-3 rounded-lg transition-colors flex items-center gap-2 ${
                      activeTab === tab.id 
                        ? 'bg-cyan-600 text-white' 
                        : 'text-slate-400 hover:bg-slate-800'
                    }`}
                  >
                    <span>{tab.icon}</span> {tab.label}
                  </button>
                ))}
              </div>

              {/* Content */}
              <div className="flex-1 space-y-6">
                {activeTab === 'general' && (
                  <SettingsSection title="General Settings" icon="⚙️">
                    <InputField 
                      label="Company Name" 
                      value={settings.companyName} 
                      onChange={(v) => updateSetting('companyName', v)} 
                    />
                    <SelectField 
                      label="Timezone" 
                      value={settings.timezone}
                      onChange={(v) => updateSetting('timezone', v)}
                      options={[
                        { value: 'America/New_York', label: 'Eastern Time (ET)' },
                        { value: 'America/Chicago', label: 'Central Time (CT)' },
                        { value: 'America/Denver', label: 'Mountain Time (MT)' },
                        { value: 'America/Los_Angeles', label: 'Pacific Time (PT)' },
                        { value: 'UTC', label: 'UTC' }
                      ]}
                    />
                    <SelectField 
                      label="Date Format" 
                      value={settings.dateFormat}
                      onChange={(v) => updateSetting('dateFormat', v)}
                      options={[
                        { value: 'MM/DD/YYYY', label: 'MM/DD/YYYY' },
                        { value: 'DD/MM/YYYY', label: 'DD/MM/YYYY' },
                        { value: 'YYYY-MM-DD', label: 'YYYY-MM-DD (ISO)' }
                      ]}
                    />
                  </SettingsSection>
                )}

                {activeTab === 'ai' && (
                  <>
                    <SettingsSection title="AI Provider Configuration" icon="🤖">
                      <div className="grid md:grid-cols-3 gap-4 mb-6">
                        <AIProviderCard provider="anthropic" isActive={settings.primaryAI === 'anthropic'} onConfigure={() => {}} />
                        <AIProviderCard provider="asksage" isActive={settings.primaryAI === 'asksage'} onConfigure={() => {}} />
                        <AIProviderCard provider="openai" isActive={settings.primaryAI === 'openai'} onConfigure={() => {}} />
                      </div>
                      <SelectField 
                        label="Primary AI Provider" 
                        value={settings.primaryAI}
                        onChange={(v) => updateSetting('primaryAI', v)}
                        options={[
                          { value: 'anthropic', label: 'Anthropic Claude' },
                          { value: 'asksage', label: 'AskSage (FedRAMP)' }
                        ]}
                      />
                      <Toggle
                        label="Auto-Route CUI to AskSage"
                        description="Automatically route sensitive content through FedRAMP-certified AI"
                        enabled={settings.cuiAutoRoute}
                        onChange={(v) => updateSetting('cuiAutoRoute', v)}
                      />
                    </SettingsSection>

                    <SettingsSection title="AskSage Configuration" icon="🔒">
                      <div className="bg-amber-500/10 border border-amber-500/30 rounded-lg p-4 mb-4">
                        <p className="text-sm text-amber-400">⚠️ AskSage provides FedRAMP High / IL5 compliance for CUI handling</p>
                      </div>
                      <InputField 
                        label="AskSage Endpoint" 
                        value={settings.askSageEndpoint} 
                        onChange={(v) => updateSetting('askSageEndpoint', v)}
                        placeholder="https://api.asksage.com/v1"
                      />
                      <InputField 
                        label="API Token" 
                        value={settings.askSageToken} 
                        onChange={(v) => updateSetting('askSageToken', v)}
                        placeholder="Enter AskSage API token"
                        secret
                      />
                    </SettingsSection>
                  </>
                )}

                {activeTab === 'notifications' && (
                  <SettingsSection title="Notification Preferences" icon="🔔">
                    <Toggle
                      label="Email Notifications"
                      description="Receive important updates via email"
                      enabled={settings.emailNotifications}
                      onChange={(v) => updateSetting('emailNotifications', v)}
                    />
                    <Toggle
                      label="Slack Notifications"
                      description="Send alerts to connected Slack workspace"
                      enabled={settings.slackNotifications}
                      onChange={(v) => updateSetting('slackNotifications', v)}
                    />
                    <Toggle
                      label="Deadline Reminders"
                      description="Get notified before proposal deadlines"
                      enabled={settings.deadlineReminders}
                      onChange={(v) => updateSetting('deadlineReminders', v)}
                    />
                    {settings.deadlineReminders && (
                      <SelectField 
                        label="Reminder Days Before Deadline" 
                        value={settings.reminderDays}
                        onChange={(v) => updateSetting('reminderDays', v)}
                        options={[
                          { value: '1', label: '1 day' },
                          { value: '3', label: '3 days' },
                          { value: '7', label: '7 days' },
                          { value: '14', label: '14 days' }
                        ]}
                      />
                    )}
                    <Toggle
                      label="Daily Digest"
                      description="Receive daily summary of pipeline activity"
                      enabled={settings.dailyDigest}
                      onChange={(v) => updateSetting('dailyDigest', v)}
                    />
                  </SettingsSection>
                )}

                {activeTab === 'security' && (
                  <SettingsSection title="Security Settings" icon="🔒">
                    <SelectField 
                      label="Session Timeout (minutes)" 
                      value={settings.sessionTimeout}
                      onChange={(v) => updateSetting('sessionTimeout', v)}
                      options={[
                        { value: '15', label: '15 minutes' },
                        { value: '30', label: '30 minutes' },
                        { value: '60', label: '1 hour' },
                        { value: '120', label: '2 hours' },
                        { value: '480', label: '8 hours' }
                      ]}
                    />
                    <Toggle
                      label="Require MFA"
                      description="Enforce multi-factor authentication for all users"
                      enabled={settings.mfaRequired}
                      onChange={(v) => updateSetting('mfaRequired', v)}
                    />
                    <Toggle
                      label="IP Whitelist"
                      description="Restrict access to approved IP addresses only"
                      enabled={settings.ipWhitelist}
                      onChange={(v) => updateSetting('ipWhitelist', v)}
                    />
                    <SelectField 
                      label="Audit Log Retention" 
                      value={settings.auditRetention}
                      onChange={(v) => updateSetting('auditRetention', v)}
                      options={[
                        { value: '90', label: '90 days' },
                        { value: '180', label: '6 months' },
                        { value: '365', label: '1 year' },
                        { value: '730', label: '2 years' },
                        { value: '2555', label: '7 years (compliance)' }
                      ]}
                    />
                  </SettingsSection>
                )}

                {activeTab === 'display' && (
                  <SettingsSection title="Display Preferences" icon="🎨">
                    <Toggle
                      label="Dark Mode"
                      description="Use dark color scheme (recommended)"
                      enabled={settings.darkMode}
                      onChange={(v) => updateSetting('darkMode', v)}
                    />
                    <Toggle
                      label="Compact View"
                      description="Show more items with less spacing"
                      enabled={settings.compactView}
                      onChange={(v) => updateSetting('compactView', v)}
                    />
                    <Toggle
                      label="Show AI Confidence Scores"
                      description="Display confidence percentages on AI-generated content"
                      enabled={settings.showConfidenceScores}
                      onChange={(v) => updateSetting('showConfidenceScores', v)}
                    />
                    <Toggle
                      label="Auto-Expand Cards"
                      description="Automatically expand detail cards on click"
                      enabled={settings.autoExpandCards}
                      onChange={(v) => updateSetting('autoExpandCards', v)}
                    />
                  </SettingsSection>
                )}
              </div>
            </div>
          </main>

          {/* Footer */}
          <footer className="border-t border-slate-800 py-6">
            <div className="max-w-7xl mx-auto px-6 flex justify-between">
              <p className="text-xs text-slate-500">© 2026 Mission Meets Tech</p>
              <p className="text-xs text-slate-600">AI GENERATED - REQUIRES HUMAN REVIEW</p>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
