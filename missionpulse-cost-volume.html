<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cost Volume Builder | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
        .glass-card:hover { border-color: rgba(0,229,250,0.3); }
        .cyan-glow { box-shadow: 0 0 30px rgba(0,229,250,0.15); }
        .cui-banner { background: linear-gradient(90deg, #7C3AED20, #7C3AED10); border-left: 4px solid #7C3AED; }
    </style>
</head>
<body class="text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const supabaseUrl = 'https://djuviwarqdvlbgcfuupa.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0NDQ0NjUsImV4cCI6MjA4NTAyMDQ2NX0.3s8ufDDN2aWfkW0RBsAyJyacb2tjB7M550WSFIohHcA';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const DEMO_COST_VOLUMES = [
            { id: '1', opportunity_title: 'DHA EHR Modernization', volume_name: 'Cost Volume v3', version: 3, status: 'in_review', contract_type: 'cpff', period_of_performance_months: 60, base_period_months: 12, option_periods: 4, total_ceiling: 75000000, total_proposed: 68500000, direct_labor_total: 42000000, indirect_costs_total: 18500000, odc_total: 3200000, subcontract_total: 4800000, fee_percent: 8, wrap_rate: 2.45, fringe_rate: 32, overhead_rate: 45, ga_rate: 12 },
            { id: '2', opportunity_title: 'VA Claims Processing', volume_name: 'Cost Volume v2', version: 2, status: 'approved', contract_type: 'ffp', period_of_performance_months: 36, base_period_months: 12, option_periods: 2, total_ceiling: 22000000, total_proposed: 21500000, direct_labor_total: 14200000, indirect_costs_total: 5800000, odc_total: 850000, subcontract_total: 650000, fee_percent: 10, wrap_rate: 2.35, fringe_rate: 30, overhead_rate: 42, ga_rate: 11 },
            { id: '3', opportunity_title: 'CMS Data Analytics', volume_name: 'Cost Volume v1', version: 1, status: 'draft', contract_type: 't_and_m', period_of_performance_months: 24, base_period_months: 12, option_periods: 1, total_ceiling: 15000000, total_proposed: 12800000, direct_labor_total: 8500000, indirect_costs_total: 3200000, odc_total: 600000, subcontract_total: 500000, fee_percent: 7, wrap_rate: 2.28, fringe_rate: 28, overhead_rate: 40, ga_rate: 10 }
        ];

        const DEMO_LABOR_CATEGORIES = [
            { id: '1', cost_volume_id: '1', labor_category: 'Program Manager', level: 'III', hourly_rate: 185, loaded_rate: 453, base_period_hours: 1880, total_hours: 9400, total_cost: 4258600, headcount: 1 },
            { id: '2', cost_volume_id: '1', labor_category: 'Technical Lead', level: 'Senior', hourly_rate: 195, loaded_rate: 478, base_period_hours: 1880, total_hours: 9400, total_cost: 4493200, headcount: 1 },
            { id: '3', cost_volume_id: '1', labor_category: 'Systems Engineer', level: 'III', hourly_rate: 165, loaded_rate: 404, base_period_hours: 3760, total_hours: 18800, total_cost: 7595200, headcount: 2 },
            { id: '4', cost_volume_id: '1', labor_category: 'Software Developer', level: 'II', hourly_rate: 135, loaded_rate: 331, base_period_hours: 7520, total_hours: 37600, total_cost: 12445600, headcount: 4 },
            { id: '5', cost_volume_id: '1', labor_category: 'Security Engineer', level: 'III', hourly_rate: 175, loaded_rate: 429, base_period_hours: 1880, total_hours: 9400, total_cost: 4032600, headcount: 1 },
            { id: '6', cost_volume_id: '1', labor_category: 'Business Analyst', level: 'II', hourly_rate: 125, loaded_rate: 306, base_period_hours: 3760, total_hours: 18800, total_cost: 5752800, headcount: 2 },
            { id: '7', cost_volume_id: '1', labor_category: 'QA Engineer', level: 'II', hourly_rate: 115, loaded_rate: 282, base_period_hours: 1880, total_hours: 9400, total_cost: 2650800, headcount: 1 }
        ];

        const DEMO_ODCS = [
            { id: '1', cost_volume_id: '1', category: 'Travel', description: 'Site visits and meetings', quantity: 24, unit_cost: 2500, total_cost: 60000, period: 'Annual', recurring: true },
            { id: '2', cost_volume_id: '1', category: 'Software Licenses', description: 'Development tools and cloud services', quantity: 1, unit_cost: 450000, total_cost: 450000, period: 'Annual', recurring: true },
            { id: '3', cost_volume_id: '1', category: 'Training', description: 'Staff certifications and training', quantity: 12, unit_cost: 5000, total_cost: 60000, period: 'Annual', recurring: true },
            { id: '4', cost_volume_id: '1', category: 'Equipment', description: 'Workstations and monitors', quantity: 15, unit_cost: 3500, total_cost: 52500, period: 'One-time', recurring: false },
            { id: '5', cost_volume_id: '1', category: 'Cloud Infrastructure', description: 'AWS GovCloud hosting', quantity: 12, unit_cost: 85000, total_cost: 1020000, period: 'Monthly', recurring: true }
        ];

        function CostVolumeApp() {
            const [volumes, setVolumes] = useState([]);
            const [laborCategories, setLaborCategories] = useState([]);
            const [odcs, setOdcs] = useState([]);
            const [selectedVolume, setSelectedVolume] = useState(null);
            const [activeTab, setActiveTab] = useState('summary');
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                loadData();
            }, []);

            async function loadData() {
                try {
                    const { data: vData } = await supabase.from('cost_volumes').select('*').order('created_at', { ascending: false });
                    const { data: lData } = await supabase.from('cost_labor_categories').select('*').order('sort_order');
                    const { data: oData } = await supabase.from('cost_odcs').select('*');
                    setVolumes(vData?.length ? vData : DEMO_COST_VOLUMES);
                    setLaborCategories(lData?.length ? lData : DEMO_LABOR_CATEGORIES);
                    setOdcs(oData?.length ? oData : DEMO_ODCS);
                    if (!vData?.length) setSelectedVolume(DEMO_COST_VOLUMES[0]);
                } catch (err) {
                    setVolumes(DEMO_COST_VOLUMES);
                    setLaborCategories(DEMO_LABOR_CATEGORIES);
                    setOdcs(DEMO_ODCS);
                    setSelectedVolume(DEMO_COST_VOLUMES[0]);
                }
                setLoading(false);
            }

            const getStatusColor = (status) => {
                const colors = {
                    draft: 'bg-gray-500/20 text-gray-400',
                    in_review: 'bg-yellow-500/20 text-yellow-400',
                    approved: 'bg-emerald-500/20 text-emerald-400',
                    submitted: 'bg-cyan-500/20 text-cyan-400',
                    revised: 'bg-purple-500/20 text-purple-400'
                };
                return colors[status] || colors.draft;
            };

            const getContractTypeLabel = (type) => {
                const labels = { ffp: 'Firm Fixed Price', cpff: 'Cost Plus Fixed Fee', cpaf: 'Cost Plus Award Fee', cpif: 'Cost Plus Incentive Fee', t_and_m: 'Time & Materials', idiq: 'IDIQ', bpa: 'BPA' };
                return labels[type] || type?.toUpperCase();
            };

            const formatCurrency = (value) => {
                if (!value) return '$0';
                if (value >= 1000000) return `$${(value / 1000000).toFixed(2)}M`;
                if (value >= 1000) return `$${(value / 1000).toFixed(0)}K`;
                return `$${value.toLocaleString()}`;
            };

            const volumeLabor = selectedVolume ? laborCategories.filter(l => l.cost_volume_id === selectedVolume.id) : [];
            const volumeOdcs = selectedVolume ? odcs.filter(o => o.cost_volume_id === selectedVolume.id) : [];

            const totalLaborCost = volumeLabor.reduce((sum, l) => sum + (l.total_cost || 0), 0);
            const totalOdcCost = volumeOdcs.reduce((sum, o) => sum + (o.total_cost || 0), 0);
            const totalHeadcount = volumeLabor.reduce((sum, l) => sum + (l.headcount || 0), 0);

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <div className="w-16 h-16 border-4 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="text-gray-400">Loading Cost Volumes...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-6">
                    {/* CUI Banner */}
                    <div className="cui-banner rounded-lg p-3 mb-6 flex items-center gap-3">
                        <svg className="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                        <span className="text-purple-300 text-sm font-medium">CUI // CONTROLLED - PRICING DATA</span>
                    </div>

                    {/* Header */}
                    <div className="flex items-center justify-between mb-8">
                        <div>
                            <div className="flex items-center gap-3 mb-2">
                                <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-emerald-500 to-cyan-600 flex items-center justify-center">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                    </svg>
                                </div>
                                <h1 className="text-2xl font-bold">Cost Volume Builder</h1>
                            </div>
                            <p className="text-gray-400">Build and manage proposal pricing volumes</p>
                        </div>
                        <button className="flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-cyan-500 to-emerald-600 rounded-lg font-medium hover:opacity-90 transition">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
                            </svg>
                            New Cost Volume
                        </button>
                    </div>

                    {/* Volume Selector */}
                    <div className="flex gap-3 mb-8 overflow-x-auto pb-2">
                        {volumes.map(vol => (
                            <button key={vol.id} onClick={() => setSelectedVolume(vol)} className={`flex-shrink-0 glass-card rounded-xl p-4 min-w-64 text-left transition ${selectedVolume?.id === vol.id ? 'border-cyan-500/50 cyan-glow' : ''}`}>
                                <div className="flex items-center justify-between mb-2">
                                    <span className={`px-2 py-0.5 rounded text-xs ${getStatusColor(vol.status)}`}>
                                        {vol.status?.replace('_', ' ')}
                                    </span>
                                    <span className="text-gray-500 text-xs">v{vol.version}</span>
                                </div>
                                <h3 className="font-medium mb-1">{vol.opportunity_title}</h3>
                                <p className="text-2xl font-bold text-emerald-400">{formatCurrency(vol.total_proposed)}</p>
                                <p className="text-xs text-gray-500">{getContractTypeLabel(vol.contract_type)}</p>
                            </button>
                        ))}
                    </div>

                    {selectedVolume && (
                        <>
                            {/* Stats Row */}
                            <div className="grid grid-cols-6 gap-4 mb-8">
                                <div className="glass-card rounded-xl p-4 cyan-glow">
                                    <p className="text-gray-400 text-xs mb-1">Total Proposed</p>
                                    <p className="text-2xl font-bold text-cyan-400">{formatCurrency(selectedVolume.total_proposed)}</p>
                                </div>
                                <div className="glass-card rounded-xl p-4">
                                    <p className="text-gray-400 text-xs mb-1">Ceiling</p>
                                    <p className="text-2xl font-bold text-gray-300">{formatCurrency(selectedVolume.total_ceiling)}</p>
                                </div>
                                <div className="glass-card rounded-xl p-4">
                                    <p className="text-gray-400 text-xs mb-1">Direct Labor</p>
                                    <p className="text-2xl font-bold text-emerald-400">{formatCurrency(selectedVolume.direct_labor_total)}</p>
                                </div>
                                <div className="glass-card rounded-xl p-4">
                                    <p className="text-gray-400 text-xs mb-1">Indirect Costs</p>
                                    <p className="text-2xl font-bold text-purple-400">{formatCurrency(selectedVolume.indirect_costs_total)}</p>
                                </div>
                                <div className="glass-card rounded-xl p-4">
                                    <p className="text-gray-400 text-xs mb-1">ODCs</p>
                                    <p className="text-2xl font-bold text-yellow-400">{formatCurrency(selectedVolume.odc_total)}</p>
                                </div>
                                <div className="glass-card rounded-xl p-4">
                                    <p className="text-gray-400 text-xs mb-1">Wrap Rate</p>
                                    <p className="text-2xl font-bold text-blue-400">{selectedVolume.wrap_rate}x</p>
                                </div>
                            </div>

                            {/* Tabs */}
                            <div className="flex gap-1 mb-6 bg-white/5 p-1 rounded-lg w-fit">
                                {['summary', 'labor', 'odcs', 'rates'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 rounded-lg text-sm font-medium transition ${activeTab === tab ? 'bg-cyan-500 text-white' : 'text-gray-400 hover:text-white'}`}>
                                        {tab === 'odcs' ? 'ODCs' : tab.charAt(0).toUpperCase() + tab.slice(1)}
                                    </button>
                                ))}
                            </div>

                            {activeTab === 'summary' && (
                                <div className="grid grid-cols-3 gap-6">
                                    {/* Cost Breakdown */}
                                    <div className="glass-card rounded-xl p-6 col-span-2">
                                        <h3 className="text-lg font-semibold mb-4">Cost Breakdown</h3>
                                        <div className="space-y-4">
                                            {[
                                                { label: 'Direct Labor', value: selectedVolume.direct_labor_total, color: 'bg-emerald-500' },
                                                { label: 'Indirect Costs', value: selectedVolume.indirect_costs_total, color: 'bg-purple-500' },
                                                { label: 'ODCs', value: selectedVolume.odc_total, color: 'bg-yellow-500' },
                                                { label: 'Subcontracts', value: selectedVolume.subcontract_total, color: 'bg-blue-500' }
                                            ].map(item => {
                                                const pct = (item.value / selectedVolume.total_proposed * 100).toFixed(1);
                                                return (
                                                    <div key={item.label}>
                                                        <div className="flex justify-between text-sm mb-1">
                                                            <span>{item.label}</span>
                                                            <span>{formatCurrency(item.value)} ({pct}%)</span>
                                                        </div>
                                                        <div className="h-3 bg-white/10 rounded-full overflow-hidden">
                                                            <div className={`h-full ${item.color}`} style={{width: `${pct}%`}}></div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                        
                                        <div className="mt-6 pt-4 border-t border-white/10">
                                            <div className="flex justify-between items-center">
                                                <span className="font-medium">Fee ({selectedVolume.fee_percent}%)</span>
                                                <span className="text-cyan-400 font-bold">{formatCurrency(selectedVolume.total_proposed * selectedVolume.fee_percent / 100)}</span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Period of Performance */}
                                    <div className="glass-card rounded-xl p-6">
                                        <h3 className="text-lg font-semibold mb-4">Period of Performance</h3>
                                        <div className="space-y-4">
                                            <div className="bg-white/5 rounded-lg p-3">
                                                <p className="text-gray-400 text-xs mb-1">Contract Type</p>
                                                <p className="font-medium">{getContractTypeLabel(selectedVolume.contract_type)}</p>
                                            </div>
                                            <div className="bg-white/5 rounded-lg p-3">
                                                <p className="text-gray-400 text-xs mb-1">Total Duration</p>
                                                <p className="font-medium">{selectedVolume.period_of_performance_months} months</p>
                                            </div>
                                            <div className="bg-white/5 rounded-lg p-3">
                                                <p className="text-gray-400 text-xs mb-1">Base Period</p>
                                                <p className="font-medium">{selectedVolume.base_period_months} months</p>
                                            </div>
                                            <div className="bg-white/5 rounded-lg p-3">
                                                <p className="text-gray-400 text-xs mb-1">Option Periods</p>
                                                <p className="font-medium">{selectedVolume.option_periods} options</p>
                                            </div>
                                            <div className="bg-white/5 rounded-lg p-3">
                                                <p className="text-gray-400 text-xs mb-1">Team Size</p>
                                                <p className="font-medium">{totalHeadcount} FTEs</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'labor' && (
                                <div className="glass-card rounded-xl p-6">
                                    <div className="flex items-center justify-between mb-4">
                                        <h3 className="text-lg font-semibold">Labor Categories</h3>
                                        <button className="text-cyan-400 text-sm hover:text-cyan-300">+ Add Labor Category</button>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full">
                                            <thead>
                                                <tr className="text-left text-gray-400 text-sm border-b border-white/10">
                                                    <th className="pb-3 font-medium">Labor Category</th>
                                                    <th className="pb-3 font-medium">Level</th>
                                                    <th className="pb-3 font-medium text-right">Hourly Rate</th>
                                                    <th className="pb-3 font-medium text-right">Loaded Rate</th>
                                                    <th className="pb-3 font-medium text-right">Base Hours</th>
                                                    <th className="pb-3 font-medium text-right">Total Hours</th>
                                                    <th className="pb-3 font-medium text-right">Headcount</th>
                                                    <th className="pb-3 font-medium text-right">Total Cost</th>
                                                </tr>
                                            </thead>
                                            <tbody className="text-sm">
                                                {volumeLabor.map(labor => (
                                                    <tr key={labor.id} className="border-b border-white/5 hover:bg-white/5">
                                                        <td className="py-3 font-medium">{labor.labor_category}</td>
                                                        <td className="py-3 text-gray-400">{labor.level}</td>
                                                        <td className="py-3 text-right">${labor.hourly_rate}</td>
                                                        <td className="py-3 text-right text-cyan-400">${labor.loaded_rate}</td>
                                                        <td className="py-3 text-right text-gray-400">{labor.base_period_hours?.toLocaleString()}</td>
                                                        <td className="py-3 text-right">{labor.total_hours?.toLocaleString()}</td>
                                                        <td className="py-3 text-right text-purple-400">{labor.headcount}</td>
                                                        <td className="py-3 text-right text-emerald-400 font-medium">{formatCurrency(labor.total_cost)}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                            <tfoot>
                                                <tr className="border-t border-white/20">
                                                    <td colSpan="6" className="py-3 font-semibold">Total Direct Labor</td>
                                                    <td className="py-3 text-right font-semibold text-purple-400">{totalHeadcount}</td>
                                                    <td className="py-3 text-right font-semibold text-emerald-400">{formatCurrency(totalLaborCost)}</td>
                                                </tr>
                                            </tfoot>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'odcs' && (
                                <div className="glass-card rounded-xl p-6">
                                    <div className="flex items-center justify-between mb-4">
                                        <h3 className="text-lg font-semibold">Other Direct Costs (ODCs)</h3>
                                        <button className="text-cyan-400 text-sm hover:text-cyan-300">+ Add ODC</button>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full">
                                            <thead>
                                                <tr className="text-left text-gray-400 text-sm border-b border-white/10">
                                                    <th className="pb-3 font-medium">Category</th>
                                                    <th className="pb-3 font-medium">Description</th>
                                                    <th className="pb-3 font-medium text-right">Quantity</th>
                                                    <th className="pb-3 font-medium text-right">Unit Cost</th>
                                                    <th className="pb-3 font-medium">Period</th>
                                                    <th className="pb-3 font-medium text-center">Recurring</th>
                                                    <th className="pb-3 font-medium text-right">Total Cost</th>
                                                </tr>
                                            </thead>
                                            <tbody className="text-sm">
                                                {volumeOdcs.map(odc => (
                                                    <tr key={odc.id} className="border-b border-white/5 hover:bg-white/5">
                                                        <td className="py-3 font-medium">{odc.category}</td>
                                                        <td className="py-3 text-gray-400">{odc.description}</td>
                                                        <td className="py-3 text-right">{odc.quantity}</td>
                                                        <td className="py-3 text-right">{formatCurrency(odc.unit_cost)}</td>
                                                        <td className="py-3 text-gray-400">{odc.period}</td>
                                                        <td className="py-3 text-center">
                                                            {odc.recurring ? (
                                                                <span className="text-emerald-400">✓</span>
                                                            ) : (
                                                                <span className="text-gray-500">-</span>
                                                            )}
                                                        </td>
                                                        <td className="py-3 text-right text-yellow-400 font-medium">{formatCurrency(odc.total_cost)}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                            <tfoot>
                                                <tr className="border-t border-white/20">
                                                    <td colSpan="6" className="py-3 font-semibold">Total ODCs</td>
                                                    <td className="py-3 text-right font-semibold text-yellow-400">{formatCurrency(totalOdcCost)}</td>
                                                </tr>
                                            </tfoot>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'rates' && (
                                <div className="grid grid-cols-2 gap-6">
                                    {/* Indirect Rates */}
                                    <div className="glass-card rounded-xl p-6">
                                        <h3 className="text-lg font-semibold mb-4">Indirect Rates</h3>
                                        <div className="space-y-4">
                                            {[
                                                { label: 'Fringe Benefits', value: selectedVolume.fringe_rate, color: 'cyan' },
                                                { label: 'Overhead', value: selectedVolume.overhead_rate, color: 'purple' },
                                                { label: 'G&A', value: selectedVolume.ga_rate, color: 'emerald' }
                                            ].map(rate => (
                                                <div key={rate.label} className="bg-white/5 rounded-lg p-4">
                                                    <div className="flex justify-between items-center mb-2">
                                                        <span>{rate.label}</span>
                                                        <span className={`text-2xl font-bold text-${rate.color}-400`}>{rate.value}%</span>
                                                    </div>
                                                    <div className="h-2 bg-white/10 rounded-full overflow-hidden">
                                                        <div className={`h-full bg-${rate.color}-500`} style={{width: `${Math.min(rate.value, 100)}%`}}></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Rate Calculations */}
                                    <div className="glass-card rounded-xl p-6">
                                        <h3 className="text-lg font-semibold mb-4">Rate Calculations</h3>
                                        <div className="space-y-4">
                                            <div className="bg-cyan-500/10 border border-cyan-500/30 rounded-lg p-4">
                                                <p className="text-gray-400 text-sm mb-1">Wrap Rate (Multiplier)</p>
                                                <p className="text-3xl font-bold text-cyan-400">{selectedVolume.wrap_rate}x</p>
                                                <p className="text-xs text-gray-500 mt-1">Loaded ÷ Direct Rate</p>
                                            </div>
                                            <div className="bg-white/5 rounded-lg p-4">
                                                <p className="text-gray-400 text-sm mb-1">Fee Rate</p>
                                                <p className="text-2xl font-bold">{selectedVolume.fee_percent}%</p>
                                            </div>
                                            <div className="bg-white/5 rounded-lg p-4">
                                                <p className="text-gray-400 text-sm mb-1">Composite Rate Formula</p>
                                                <p className="text-sm font-mono text-cyan-400">
                                                    Direct × (1 + {selectedVolume.fringe_rate/100}) × (1 + {selectedVolume.overhead_rate/100}) × (1 + {selectedVolume.ga_rate/100})
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </>
                    )}

                    {/* Footer */}
                    <footer className="mt-12 text-center text-gray-500 text-sm">
                        © 2026 Mission Meets Tech • MissionPulse v2.0 • Sprint 72 • CUI PRICING DATA
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<CostVolumeApp />, document.getElementById('root'));
    </script>
</body>
</html>
