<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | HITL Review Queue</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --mmt-cyan: #00E5FA; --mmt-navy: #00050F; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--mmt-navy); color: #e2e8f0; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
// ============================================================
// MISSIONPULSE HITL V3 - Human-in-the-Loop Review
// Mission Meets Tech © 2026
// ============================================================

const { useState, useEffect } = React;

const CONFIG = {
  SUPABASE_URL: 'https://qdrtpnpnhkxvfmvfziop.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8',
  LOGIN_PAGE: 'login.html'
};

const supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

const DEMO_REVIEWS = [
  { id: 1, type: 'AI Draft', section: 'Technical Approach 2.1', status: 'pending', priority: 'high', assignee: 'Sarah Chen', aiConfidence: 87, created: '2026-01-30T10:00:00Z' },
  { id: 2, type: 'Compliance Check', section: 'FAR 52.212-4', status: 'pending', priority: 'critical', assignee: 'Robert Williams', aiConfidence: 92, created: '2026-01-30T09:30:00Z' },
  { id: 3, type: 'Price Validation', section: 'CLIN 0001', status: 'in_review', priority: 'high', assignee: 'Jennifer Park', aiConfidence: 78, created: '2026-01-29T14:00:00Z' },
  { id: 4, type: 'Past Performance', section: 'Contract Reference 1', status: 'approved', priority: 'medium', assignee: 'Lisa Martinez', aiConfidence: 95, created: '2026-01-28T11:00:00Z' },
  { id: 5, type: 'AI Draft', section: 'Management Approach 3.2', status: 'rejected', priority: 'medium', assignee: 'Michael Torres', aiConfidence: 65, created: '2026-01-28T08:00:00Z' }
];

function checkAuth() {
  const session = localStorage.getItem('MP_SESSION');
  if (!session) { window.location.href = CONFIG.LOGIN_PAGE; return null; }
  try { return JSON.parse(localStorage.getItem('MP_USER')); }
  catch { return { email: 'demo@mmt.com', role: 'QA', name: 'Demo User' }; }
}

const Icons = {
  back: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>,
  check: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
  x: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>,
  clock: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
};

function ReviewCard({ review, onApprove, onReject }) {
  const statusColors = { pending: 'bg-amber-500/20 text-amber-400', in_review: 'bg-blue-500/20 text-blue-400', approved: 'bg-green-500/20 text-green-400', rejected: 'bg-red-500/20 text-red-400' };
  const priorityColors = { critical: 'border-red-500', high: 'border-amber-500', medium: 'border-blue-500', low: 'border-slate-500' };
  
  return (
    <div className={`glass rounded-xl p-4 border-l-4 ${priorityColors[review.priority]}`}>
      <div className="flex justify-between items-start mb-3">
        <div>
          <span className="text-xs px-2 py-1 bg-slate-700/50 rounded">{review.type}</span>
          <h3 className="font-semibold text-white mt-2">{review.section}</h3>
        </div>
        <span className={`px-2 py-1 rounded text-xs font-medium ${statusColors[review.status]}`}>
          {review.status.replace('_', ' ')}
        </span>
      </div>
      
      <div className="flex items-center gap-4 text-sm text-slate-400 mb-3">
        <span>Assigned: {review.assignee}</span>
        <span className="flex items-center gap-1"><Icons.clock /> {new Date(review.created).toLocaleDateString()}</span>
      </div>
      
      <div className="flex items-center justify-between">
        <div className="flex items-center gap-2">
          <span className="text-xs text-slate-500">AI Confidence:</span>
          <div className="w-24 h-2 bg-slate-700 rounded-full overflow-hidden">
            <div className="h-full rounded-full" style={{ width: `${review.aiConfidence}%`, backgroundColor: review.aiConfidence >= 85 ? '#4ade80' : review.aiConfidence >= 70 ? '#fbbf24' : '#f87171' }} />
          </div>
          <span className={`text-xs font-medium ${review.aiConfidence >= 85 ? 'text-green-400' : review.aiConfidence >= 70 ? 'text-amber-400' : 'text-red-400'}`}>{review.aiConfidence}%</span>
        </div>
        
        {review.status === 'pending' && (
          <div className="flex gap-2">
            <button onClick={() => onApprove(review.id)} className="p-2 bg-green-600 hover:bg-green-500 rounded-lg text-white"><Icons.check /></button>
            <button onClick={() => onReject(review.id)} className="p-2 bg-red-600 hover:bg-red-500 rounded-lg text-white"><Icons.x /></button>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [reviews, setReviews] = useState(DEMO_REVIEWS);
  const [filter, setFilter] = useState('all');

  useEffect(() => {
    const authUser = checkAuth();
    if (authUser) setUser(authUser);
  }, []);

  const handleApprove = (id) => {
    setReviews(reviews.map(r => r.id === id ? { ...r, status: 'approved' } : r));
  };

  const handleReject = (id) => {
    setReviews(reviews.map(r => r.id === id ? { ...r, status: 'rejected' } : r));
  };

  const filteredReviews = filter === 'all' ? reviews : reviews.filter(r => r.status === filter);
  const stats = {
    pending: reviews.filter(r => r.status === 'pending').length,
    inReview: reviews.filter(r => r.status === 'in_review').length,
    approved: reviews.filter(r => r.status === 'approved').length,
    rejected: reviews.filter(r => r.status === 'rejected').length
  };

  if (!user) return <div className="min-h-screen flex items-center justify-center text-cyan-400">Loading...</div>;

  return (
    <div className="min-h-screen bg-slate-950">
      <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white"><Icons.back /></a>
            <div>
              <h1 className="text-xl font-bold text-white">👁️ HITL Review Queue</h1>
              <p className="text-sm text-slate-400">Human-in-the-Loop Verification</p>
            </div>
          </div>
          <span className="text-sm text-slate-400">{user.name} ({user.role})</span>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-6 space-y-6">
        {/* Stats */}
        <div className="grid grid-cols-4 gap-4">
          <div className="glass rounded-xl p-4 text-center cursor-pointer hover:border-amber-500/50" onClick={() => setFilter('pending')}>
            <p className="text-3xl font-bold text-amber-400">{stats.pending}</p>
            <p className="text-sm text-slate-400">Pending Review</p>
          </div>
          <div className="glass rounded-xl p-4 text-center cursor-pointer hover:border-blue-500/50" onClick={() => setFilter('in_review')}>
            <p className="text-3xl font-bold text-blue-400">{stats.inReview}</p>
            <p className="text-sm text-slate-400">In Review</p>
          </div>
          <div className="glass rounded-xl p-4 text-center cursor-pointer hover:border-green-500/50" onClick={() => setFilter('approved')}>
            <p className="text-3xl font-bold text-green-400">{stats.approved}</p>
            <p className="text-sm text-slate-400">Approved</p>
          </div>
          <div className="glass rounded-xl p-4 text-center cursor-pointer hover:border-red-500/50" onClick={() => setFilter('rejected')}>
            <p className="text-3xl font-bold text-red-400">{stats.rejected}</p>
            <p className="text-sm text-slate-400">Rejected</p>
          </div>
        </div>

        {/* Filter Bar */}
        <div className="flex gap-2">
          {['all', 'pending', 'in_review', 'approved', 'rejected'].map(f => (
            <button key={f} onClick={() => setFilter(f)} className={`px-3 py-1.5 rounded-lg text-sm ${filter === f ? 'bg-cyan-600 text-white' : 'bg-slate-800 text-slate-400 hover:text-white'}`}>
              {f === 'all' ? 'All' : f.replace('_', ' ')}
            </button>
          ))}
        </div>

        {/* Review Cards */}
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          {filteredReviews.map(review => (
            <ReviewCard key={review.id} review={review} onApprove={handleApprove} onReject={handleReject} />
          ))}
        </div>
      </main>

      <footer className="border-t border-slate-800 mt-12">
        <div className="max-w-7xl mx-auto px-4 py-4 text-center text-xs text-slate-500">
          Mission Meets Tech © 2026 | MissionPulse v3.0 | HITL Module
        </div>
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
