<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - HITL Review Queue</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
    @keyframes pulse-green { 0%, 100% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); } 50% { box-shadow: 0 0 25px rgba(16, 185, 129, 0.5); } }
    .approval-glow { animation: pulse-green 2s infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    // ============================================
    // CONFIGURATION
    // ============================================
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const API_URL = 'https://missionpulse-api.onrender.com';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // ============================================
    // DEMO DATA
    // ============================================
    const DEMO_APPROVALS = [
      { 
        id: 1, 
        type: 'proposal_section',
        title: 'Executive Summary Draft',
        description: 'AI-generated executive summary for VA EHR Modernization proposal',
        agent: 'Writer',
        opportunity: 'VA EHR Modernization',
        status: 'pending',
        priority: 'high',
        created_at: '2026-01-30T10:30:00Z',
        content_preview: 'Mission Meets Tech brings 15 years of healthcare IT expertise to the VA EHR Modernization initiative. Our team of certified professionals has successfully delivered...',
        confidence: 0.87,
        tokens_used: 2450
      },
      { 
        id: 2, 
        type: 'compliance_check',
        title: 'Section L Requirements Analysis',
        description: 'Compliance matrix extraction from RFP Section L',
        agent: 'Compliance',
        opportunity: 'DHA MHS GENESIS',
        status: 'pending',
        priority: 'critical',
        created_at: '2026-01-30T09:15:00Z',
        content_preview: 'Identified 47 requirements across 12 evaluation factors. Key compliance gaps detected in: Past Performance (missing 2 references), Staffing (LCAT mapping incomplete)...',
        confidence: 0.92,
        tokens_used: 1830
      },
      { 
        id: 3, 
        type: 'pricing_recommendation',
        title: 'Price-to-Win Analysis',
        description: 'Competitive pricing recommendation based on market analysis',
        agent: 'Pricing',
        opportunity: 'CMS Data Analytics',
        status: 'pending',
        priority: 'high',
        created_at: '2026-01-30T08:45:00Z',
        content_preview: 'Recommended bid range: $42.5M - $44.8M. Incumbent (Maximus) likely to bid $43.2M based on historical patterns. Suggested strategy: Position at $43.8M with...',
        confidence: 0.78,
        tokens_used: 3200
      },
      { 
        id: 4, 
        type: 'win_theme',
        title: 'Discriminator Theme Generation',
        description: 'AI-generated win themes based on competitive analysis',
        agent: 'Strategy',
        opportunity: 'IHS Telehealth',
        status: 'approved',
        priority: 'medium',
        created_at: '2026-01-29T16:20:00Z',
        approved_at: '2026-01-29T17:45:00Z',
        approved_by: 'Sarah Chen',
        content_preview: 'Theme 1: "Tribal-First Healthcare Innovation" - Leverage our IHS experience and Native American healthcare partnerships...',
        confidence: 0.85,
        tokens_used: 1650
      },
      { 
        id: 5, 
        type: 'orals_content',
        title: 'Management Approach Slide Deck',
        description: 'Presentation slides for orals defense',
        agent: 'Orals',
        opportunity: 'FDA IT Infrastructure',
        status: 'rejected',
        priority: 'medium',
        created_at: '2026-01-29T14:00:00Z',
        rejected_at: '2026-01-29T15:30:00Z',
        rejected_by: 'Mike Torres',
        rejection_reason: 'Missing FDA-specific compliance messaging. Please regenerate with emphasis on 21 CFR Part 11.',
        content_preview: 'Slide 1: Team Introduction and Qualifications...',
        confidence: 0.72,
        tokens_used: 2100
      }
    ];

    const AGENT_COLORS = {
      'Writer': { bg: 'bg-blue-500/20', text: 'text-blue-400', icon: '✍️' },
      'Compliance': { bg: 'bg-emerald-500/20', text: 'text-emerald-400', icon: '✓' },
      'Pricing': { bg: 'bg-amber-500/20', text: 'text-amber-400', icon: '💰' },
      'Strategy': { bg: 'bg-purple-500/20', text: 'text-purple-400', icon: '🎯' },
      'Orals': { bg: 'bg-pink-500/20', text: 'text-pink-400', icon: '🎤' },
      'Capture': { bg: 'bg-cyan-500/20', text: 'text-cyan-400', icon: '📊' },
      'Contracts': { bg: 'bg-red-500/20', text: 'text-red-400', icon: '⚖️' },
      'BlackHat': { bg: 'bg-slate-500/20', text: 'text-slate-400', icon: '🎭' }
    };

    // ============================================
    // UTILITY FUNCTIONS
    // ============================================
    const formatTimeAgo = (timestamp) => {
      const diff = Date.now() - new Date(timestamp).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      return `${Math.floor(hrs / 24)}d ago`;
    };

    const getConfidenceColor = (conf) => {
      if (conf >= 0.9) return 'text-emerald-400';
      if (conf >= 0.8) return 'text-cyan-400';
      if (conf >= 0.7) return 'text-amber-400';
      return 'text-red-400';
    };

    // ============================================
    // COMPONENTS
    // ============================================

    // Stats Bar
    const StatsBar = ({ approvals }) => {
      const pending = approvals.filter(a => a.status === 'pending').length;
      const approved = approvals.filter(a => a.status === 'approved').length;
      const rejected = approvals.filter(a => a.status === 'rejected').length;
      const critical = approvals.filter(a => a.priority === 'critical' && a.status === 'pending').length;
      const totalTokens = approvals.reduce((sum, a) => sum + (a.tokens_used || 0), 0);

      return (
        <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
          {[
            { label: 'Pending Review', value: pending, color: 'amber', icon: '⏳' },
            { label: 'Approved', value: approved, color: 'emerald', icon: '✅' },
            { label: 'Rejected', value: rejected, color: 'red', icon: '❌' },
            { label: 'Critical', value: critical, color: critical > 0 ? 'red' : 'slate', icon: '🔴' },
            { label: 'Tokens Used', value: `${(totalTokens / 1000).toFixed(1)}K`, color: 'cyan', icon: '🔢' }
          ].map(({ label, value, color, icon }) => (
            <div key={label} className="glass rounded-lg p-4 border border-slate-700/50">
              <div className="flex items-center gap-2 mb-1">
                <span>{icon}</span>
                <p className="text-xs text-slate-400">{label}</p>
              </div>
              <p className={`text-2xl font-bold text-${color}-400`}>{value}</p>
            </div>
          ))}
        </div>
      );
    };

    // Approval Card
    const ApprovalCard = ({ approval, onApprove, onReject, onExpand, expanded }) => {
      const agent = AGENT_COLORS[approval.agent] || AGENT_COLORS['Capture'];
      const [rejectReason, setRejectReason] = React.useState('');
      const [showRejectForm, setShowRejectForm] = React.useState(false);

      const priorityColors = {
        critical: 'bg-red-500/20 text-red-400 border-red-500/30',
        high: 'bg-amber-500/20 text-amber-400 border-amber-500/30',
        medium: 'bg-blue-500/20 text-blue-400 border-blue-500/30',
        low: 'bg-slate-500/20 text-slate-400 border-slate-500/30'
      };

      const statusBadge = {
        pending: { bg: 'bg-amber-500/20', text: 'text-amber-400', label: 'PENDING' },
        approved: { bg: 'bg-emerald-500/20', text: 'text-emerald-400', label: 'APPROVED' },
        rejected: { bg: 'bg-red-500/20', text: 'text-red-400', label: 'REJECTED' }
      }[approval.status];

      return (
        <div className={`glass rounded-xl border ${approval.status === 'pending' && approval.priority === 'critical' ? 'border-red-500/50' : 'border-slate-700/50'} overflow-hidden`}>
          {/* Header */}
          <div 
            className="p-4 cursor-pointer hover:bg-slate-800/30 transition-colors"
            onClick={() => onExpand(approval.id)}
          >
            <div className="flex items-start justify-between">
              <div className="flex items-start gap-3">
                <div className={`w-10 h-10 rounded-lg ${agent.bg} flex items-center justify-center`}>
                  <span className="text-xl">{agent.icon}</span>
                </div>
                <div>
                  <div className="flex items-center gap-2 mb-1">
                    <h3 className="font-semibold text-white">{approval.title}</h3>
                    <span className={`px-2 py-0.5 rounded text-xs ${statusBadge.bg} ${statusBadge.text}`}>
                      {statusBadge.label}
                    </span>
                  </div>
                  <p className="text-sm text-slate-400">{approval.description}</p>
                  <div className="flex items-center gap-3 mt-2 text-xs text-slate-500">
                    <span className={`${agent.text}`}>{approval.agent} Agent</span>
                    <span>•</span>
                    <span>{approval.opportunity}</span>
                    <span>•</span>
                    <span>{formatTimeAgo(approval.created_at)}</span>
                  </div>
                </div>
              </div>
              <div className="flex items-center gap-3">
                <span className={`px-2 py-0.5 rounded text-xs border ${priorityColors[approval.priority]}`}>
                  {approval.priority.toUpperCase()}
                </span>
                <div className="text-right">
                  <p className="text-xs text-slate-400">Confidence</p>
                  <p className={`font-mono font-bold ${getConfidenceColor(approval.confidence)}`}>
                    {Math.round(approval.confidence * 100)}%
                  </p>
                </div>
              </div>
            </div>
          </div>

          {/* Expanded Content */}
          {expanded && (
            <div className="border-t border-slate-700 p-4 space-y-4 bg-slate-900/30">
              {/* Content Preview */}
              <div>
                <h4 className="text-sm font-medium text-slate-400 mb-2">AI Generated Content</h4>
                <div className="bg-slate-800/50 rounded-lg p-4 text-sm text-slate-300 whitespace-pre-wrap">
                  {approval.content_preview}
                </div>
              </div>

              {/* Metadata */}
              <div className="flex items-center gap-6 text-xs text-slate-500">
                <span>🔢 {approval.tokens_used.toLocaleString()} tokens</span>
                <span>📅 Created: {new Date(approval.created_at).toLocaleString()}</span>
                {approval.approved_by && <span>✅ Approved by: {approval.approved_by}</span>}
                {approval.rejected_by && <span>❌ Rejected by: {approval.rejected_by}</span>}
              </div>

              {/* Rejection Reason (if rejected) */}
              {approval.status === 'rejected' && approval.rejection_reason && (
                <div className="bg-red-500/10 border border-red-500/30 rounded-lg p-3">
                  <p className="text-sm text-red-400"><strong>Rejection Reason:</strong> {approval.rejection_reason}</p>
                </div>
              )}

              {/* Actions (if pending) */}
              {approval.status === 'pending' && (
                <div className="space-y-3">
                  {showRejectForm ? (
                    <div className="space-y-3">
                      <textarea
                        value={rejectReason}
                        onChange={(e) => setRejectReason(e.target.value)}
                        placeholder="Provide feedback for regeneration..."
                        className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-red-500"
                        rows={3}
                      />
                      <div className="flex gap-3">
                        <button
                          onClick={() => { onReject(approval.id, rejectReason); setShowRejectForm(false); }}
                          disabled={!rejectReason.trim()}
                          className="px-4 py-2 bg-red-600 hover:bg-red-500 disabled:bg-slate-700 rounded-lg text-sm transition-colors"
                        >
                          Confirm Rejection
                        </button>
                        <button
                          onClick={() => setShowRejectForm(false)}
                          className="px-4 py-2 text-slate-400 hover:text-white"
                        >
                          Cancel
                        </button>
                      </div>
                    </div>
                  ) : (
                    <div className="flex gap-3">
                      <button
                        onClick={() => onApprove(approval.id)}
                        className="flex-1 px-4 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-lg font-medium transition-colors flex items-center justify-center gap-2 approval-glow"
                      >
                        ✅ Approve for Use
                      </button>
                      <button
                        onClick={() => setShowRejectForm(true)}
                        className="flex-1 px-4 py-3 bg-red-600/20 hover:bg-red-600/40 border border-red-500/50 text-red-400 rounded-lg font-medium transition-colors flex items-center justify-center gap-2"
                      >
                        ❌ Reject & Regenerate
                      </button>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}
        </div>
      );
    };

    // Filter Tabs
    const FilterTabs = ({ active, onChange, counts }) => (
      <div className="flex gap-2 flex-wrap">
        {[
          { key: 'all', label: 'All', count: counts.all },
          { key: 'pending', label: 'Pending', count: counts.pending },
          { key: 'approved', label: 'Approved', count: counts.approved },
          { key: 'rejected', label: 'Rejected', count: counts.rejected }
        ].map(({ key, label, count }) => (
          <button
            key={key}
            onClick={() => onChange(key)}
            className={`px-4 py-2 rounded-lg text-sm transition-colors ${
              active === key 
                ? 'bg-cyan-600 text-white' 
                : 'bg-slate-800 text-slate-400 hover:bg-slate-700'
            }`}
          >
            {label} ({count})
          </button>
        ))}
      </div>
    );

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [approvals, setApprovals] = React.useState(DEMO_APPROVALS);
      const [filter, setFilter] = React.useState('pending');
      const [expandedId, setExpandedId] = React.useState(null);
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);

      React.useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        try {
          const { data, error } = await supabase
            .from('ai_approvals')
            .select('*')
            .order('created_at', { ascending: false });

          if (!error && data && data.length > 0) {
            setApprovals(data);
            setConnected(true);
          }
        } catch (e) {
          console.log('Using demo data');
        } finally {
          setLoading(false);
        }
      };

      const handleApprove = async (id) => {
        const updated = approvals.map(a => 
          a.id === id 
            ? { ...a, status: 'approved', approved_at: new Date().toISOString(), approved_by: 'Mary Womack' }
            : a
        );
        setApprovals(updated);
        
        if (connected) {
          await supabase
            .from('ai_approvals')
            .update({ status: 'approved', approved_at: new Date().toISOString(), approved_by: 'Mary Womack' })
            .eq('id', id);
        }
        
        setExpandedId(null);
      };

      const handleReject = async (id, reason) => {
        const updated = approvals.map(a => 
          a.id === id 
            ? { ...a, status: 'rejected', rejected_at: new Date().toISOString(), rejected_by: 'Mary Womack', rejection_reason: reason }
            : a
        );
        setApprovals(updated);
        
        if (connected) {
          await supabase
            .from('ai_approvals')
            .update({ status: 'rejected', rejected_at: new Date().toISOString(), rejected_by: 'Mary Womack', rejection_reason: reason })
            .eq('id', id);
        }
        
        setExpandedId(null);
      };

      const filteredApprovals = filter === 'all' 
        ? approvals 
        : approvals.filter(a => a.status === filter);

      const counts = {
        all: approvals.length,
        pending: approvals.filter(a => a.status === 'pending').length,
        approved: approvals.filter(a => a.status === 'approved').length,
        rejected: approvals.filter(a => a.status === 'rejected').length
      };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-slate-400">Loading Review Queue...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-700/50 rounded-lg">← Back</a>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center">👍</div>
                  <div>
                    <h1 className="text-xl font-bold text-white">HITL Review Queue</h1>
                    <p className="text-xs text-slate-400">Human-in-the-Loop AI Approvals</p>
                  </div>
                </div>
              </div>
              <div className={`px-3 py-1 rounded-full text-xs ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                {connected ? '● Connected' : '○ Demo'}
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8 space-y-6">
            {/* Stats */}
            <StatsBar approvals={approvals} />

            {/* Filters */}
            <FilterTabs active={filter} onChange={setFilter} counts={counts} />

            {/* Approval Cards */}
            <div className="space-y-4">
              {filteredApprovals.map(approval => (
                <ApprovalCard
                  key={approval.id}
                  approval={approval}
                  expanded={expandedId === approval.id}
                  onExpand={(id) => setExpandedId(expandedId === id ? null : id)}
                  onApprove={handleApprove}
                  onReject={handleReject}
                />
              ))}
              {filteredApprovals.length === 0 && (
                <div className="text-center py-12 text-slate-500">
                  No {filter === 'all' ? '' : filter} approvals found
                </div>
              )}
            </div>
          </main>

          {/* Footer */}
          <footer className="border-t border-slate-800 py-6">
            <div className="max-w-7xl mx-auto px-6 flex justify-between">
              <p className="text-xs text-slate-500">© 2026 Mission Meets Tech</p>
              <p className="text-xs text-slate-600">AI GENERATED - REQUIRES HUMAN REVIEW</p>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
