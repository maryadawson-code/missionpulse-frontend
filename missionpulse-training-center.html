<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Center | MissionPulse</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(0, 5, 15, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.2); }
        .glow { box-shadow: 0 0 30px rgba(0, 229, 250, 0.3); }
        .cyber-grid { background-image: linear-gradient(rgba(0, 229, 250, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 250, 0.03) 1px, transparent 1px); background-size: 50px 50px; }
        .progress-bar { background: linear-gradient(90deg, #00E5FA, #8B5CF6); }
    </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen cyber-grid">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc4MjMwMjgsImV4cCI6MjA1MzM5OTAyOH0.S0LKvPzVIfBsLv-2qjXRdMGhnYyRLvOFlo9ihaQuqHE';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const DEMO_MODULES = [
            { id: 1, title: 'MissionPulse Platform Overview', category: 'Onboarding', description: 'Introduction to MissionPulse features and navigation', duration_minutes: 30, content_type: 'video', is_required: true, order_num: 1 },
            { id: 2, title: 'Capture Management Fundamentals', category: 'Capture', description: 'Learn the Shipley methodology and capture planning', duration_minutes: 45, content_type: 'interactive', is_required: true, order_num: 2 },
            { id: 3, title: 'Using AI Agents Effectively', category: 'AI Tools', description: 'Maximize productivity with MissionPulse AI agents', duration_minutes: 25, content_type: 'video', is_required: true, order_num: 3 },
            { id: 4, title: 'Proposal Development Process', category: 'Proposals', description: 'Step-by-step guide to creating winning proposals', duration_minutes: 60, content_type: 'interactive', is_required: true, order_num: 4 },
            { id: 5, title: 'FAR/DFARS Compliance Basics', category: 'Compliance', description: 'Understanding federal acquisition regulations', duration_minutes: 40, content_type: 'document', is_required: true, order_num: 5 },
            { id: 6, title: 'Pricing & BOE Development', category: 'Pricing', description: 'Building compliant and competitive pricing', duration_minutes: 50, content_type: 'interactive', is_required: false, order_num: 6 },
            { id: 7, title: 'Orals Preparation Workshop', category: 'Orals', description: 'Techniques for successful oral presentations', duration_minutes: 35, content_type: 'video', is_required: false, order_num: 7 },
            { id: 8, title: 'CMMC 2.0 Compliance Training', category: 'Compliance', description: 'Cybersecurity maturity model certification requirements', duration_minutes: 90, content_type: 'document', is_required: true, order_num: 8 },
            { id: 9, title: 'Partner Portal Walkthrough', category: 'Onboarding', description: 'Guide for teaming partners using MissionPulse', duration_minutes: 20, content_type: 'video', is_required: false, order_num: 9 },
            { id: 10, title: 'Advanced Black Hat Analysis', category: 'Strategy', description: 'Competitive intelligence and win strategy techniques', duration_minutes: 55, content_type: 'interactive', is_required: false, order_num: 10 },
        ];

        const DEMO_PROGRESS = [
            { id: 1, user_id: 1, module_id: 1, status: 'completed', score: 100, completed_at: '2025-01-15T10:00:00Z' },
            { id: 2, user_id: 1, module_id: 2, status: 'completed', score: 95, completed_at: '2025-01-16T14:30:00Z' },
            { id: 3, user_id: 1, module_id: 3, status: 'completed', score: 88, completed_at: '2025-01-17T09:15:00Z' },
            { id: 4, user_id: 1, module_id: 4, status: 'in_progress', score: null, completed_at: null },
            { id: 5, user_id: 1, module_id: 5, status: 'not_started', score: null, completed_at: null },
            { id: 6, user_id: 1, module_id: 8, status: 'in_progress', score: null, completed_at: null },
        ];

        const DEMO_CERTIFICATIONS = [
            { id: 1, name: 'MissionPulse Certified User', description: 'Complete all required onboarding modules', requirements: [1, 2, 3, 4, 5], badge_color: '#00E5FA' },
            { id: 2, name: 'Capture Professional', description: 'Master capture management techniques', requirements: [2, 10], badge_color: '#8B5CF6' },
            { id: 3, name: 'Compliance Specialist', description: 'FAR/DFARS and CMMC expertise', requirements: [5, 8], badge_color: '#10B981' },
            { id: 4, name: 'AI Power User', description: 'Expert use of MissionPulse AI tools', requirements: [3], badge_color: '#F59E0B' },
        ];

        function TrainingCenter() {
            const [modules, setModules] = useState([]);
            const [progress, setProgress] = useState([]);
            const [certifications, setCertifications] = useState([]);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('modules');
            const [selectedCategory, setSelectedCategory] = useState('all');
            const [showModuleModal, setShowModuleModal] = useState(false);
            const [selectedModule, setSelectedModule] = useState(null);
            const [moduleForm, setModuleForm] = useState({ title: '', category: 'Onboarding', description: '', duration_minutes: 30, content_type: 'video', is_required: false });

            useEffect(() => {
                fetchData();
            }, []);

            async function fetchData() {
                try {
                    const [modRes, progRes] = await Promise.all([
                        supabase.from('training_modules').select('*').order('order_num'),
                        supabase.from('training_progress').select('*')
                    ]);
                    setModules(modRes.data?.length ? modRes.data : DEMO_MODULES);
                    setProgress(progRes.data?.length ? progRes.data : DEMO_PROGRESS);
                    setCertifications(DEMO_CERTIFICATIONS);
                } catch (err) {
                    console.log('Using demo data');
                    setModules(DEMO_MODULES);
                    setProgress(DEMO_PROGRESS);
                    setCertifications(DEMO_CERTIFICATIONS);
                } finally {
                    setLoading(false);
                }
            }

            async function saveModule() {
                try {
                    if (selectedModule) {
                        await supabase.from('training_modules').update(moduleForm).eq('id', selectedModule.id);
                    } else {
                        await supabase.from('training_modules').insert([{ ...moduleForm, order_num: modules.length + 1 }]);
                    }
                    fetchData();
                } catch (err) {
                    if (selectedModule) {
                        setModules(modules.map(m => m.id === selectedModule.id ? { ...m, ...moduleForm } : m));
                    } else {
                        setModules([...modules, { ...moduleForm, id: Date.now(), order_num: modules.length + 1 }]);
                    }
                }
                setShowModuleModal(false);
                setSelectedModule(null);
            }

            async function deleteModule(id) {
                if (!confirm('Delete this training module?')) return;
                try {
                    await supabase.from('training_modules').delete().eq('id', id);
                    fetchData();
                } catch (err) {
                    setModules(modules.filter(m => m.id !== id));
                }
            }

            async function updateProgress(moduleId, status) {
                const existingProgress = progress.find(p => p.module_id === moduleId);
                const newProgress = {
                    user_id: 1,
                    module_id: moduleId,
                    status: status,
                    score: status === 'completed' ? Math.floor(Math.random() * 20) + 80 : null,
                    completed_at: status === 'completed' ? new Date().toISOString() : null
                };

                try {
                    if (existingProgress) {
                        await supabase.from('training_progress').update(newProgress).eq('id', existingProgress.id);
                    } else {
                        await supabase.from('training_progress').insert([newProgress]);
                    }
                    fetchData();
                } catch (err) {
                    if (existingProgress) {
                        setProgress(progress.map(p => p.id === existingProgress.id ? { ...p, ...newProgress } : p));
                    } else {
                        setProgress([...progress, { ...newProgress, id: Date.now() }]);
                    }
                }
            }

            function openModuleModal(mod = null) {
                setSelectedModule(mod);
                setModuleForm(mod || { title: '', category: 'Onboarding', description: '', duration_minutes: 30, content_type: 'video', is_required: false });
                setShowModuleModal(true);
            }

            const getModuleProgress = (moduleId) => progress.find(p => p.module_id === moduleId);
            
            const getStatusBadge = (status) => {
                const styles = {
                    completed: { bg: 'bg-green-500/20', text: 'text-green-400', label: 'Completed' },
                    in_progress: { bg: 'bg-yellow-500/20', text: 'text-yellow-400', label: 'In Progress' },
                    not_started: { bg: 'bg-gray-500/20', text: 'text-gray-400', label: 'Not Started' }
                };
                return styles[status] || styles.not_started;
            };

            const getContentIcon = (type) => {
                const icons = { video: '🎬', interactive: '🎮', document: '📄', quiz: '❓' };
                return icons[type] || '📚';
            };

            const categories = ['all', ...new Set(modules.map(m => m.category))];
            const filteredModules = selectedCategory === 'all' ? modules : modules.filter(m => m.category === selectedCategory);

            const stats = {
                total: modules.length,
                completed: progress.filter(p => p.status === 'completed').length,
                inProgress: progress.filter(p => p.status === 'in_progress').length,
                required: modules.filter(m => m.is_required).length,
                requiredCompleted: modules.filter(m => m.is_required && getModuleProgress(m.id)?.status === 'completed').length
            };

            const checkCertification = (cert) => {
                return cert.requirements.every(modId => getModuleProgress(modId)?.status === 'completed');
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-[#00E5FA] text-xl">Loading Training Center...</div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-6">
                    {/* Header */}
                    <div className="flex items-center justify-between mb-8">
                        <div>
                            <h1 className="text-3xl font-bold text-white flex items-center gap-3">
                                <span className="text-4xl">🎓</span> Training Center
                            </h1>
                            <p className="text-gray-400 mt-1">Onboarding, Courses & Certifications</p>
                        </div>
                        <button onClick={() => openModuleModal()} className="px-6 py-3 bg-[#00E5FA] text-[#00050F] font-semibold rounded-lg hover:bg-[#00E5FA]/80 transition">
                            + Add Module
                        </button>
                    </div>

                    {/* Progress Overview */}
                    <div className="grid grid-cols-4 gap-4 mb-8">
                        <div className="glass rounded-xl p-4">
                            <div className="text-gray-400 text-sm">Overall Progress</div>
                            <div className="text-3xl font-bold text-white">{Math.round((stats.completed / stats.total) * 100)}%</div>
                            <div className="w-full bg-gray-700 rounded-full h-2 mt-2">
                                <div className="progress-bar h-2 rounded-full" style={{ width: `${(stats.completed / stats.total) * 100}%` }}></div>
                            </div>
                        </div>
                        <div className="glass rounded-xl p-4 border-l-4 border-green-500">
                            <div className="text-gray-400 text-sm">Completed</div>
                            <div className="text-3xl font-bold text-green-400">{stats.completed}</div>
                        </div>
                        <div className="glass rounded-xl p-4 border-l-4 border-yellow-500">
                            <div className="text-gray-400 text-sm">In Progress</div>
                            <div className="text-3xl font-bold text-yellow-400">{stats.inProgress}</div>
                        </div>
                        <div className="glass rounded-xl p-4 border-l-4 border-[#00E5FA]">
                            <div className="text-gray-400 text-sm">Required Complete</div>
                            <div className="text-3xl font-bold text-[#00E5FA]">{stats.requiredCompleted}/{stats.required}</div>
                        </div>
                    </div>

                    {/* Tabs */}
                    <div className="flex gap-2 mb-6">
                        {['modules', 'certifications'].map((tab) => (
                            <button key={tab} onClick={() => setActiveTab(tab)}
                                className={`px-6 py-2 rounded-lg font-medium transition ${
                                    activeTab === tab ? 'bg-[#00E5FA] text-[#00050F]' : 'bg-[#00E5FA]/10 text-[#00E5FA] hover:bg-[#00E5FA]/20'
                                }`}>
                                {tab.charAt(0).toUpperCase() + tab.slice(1)}
                            </button>
                        ))}
                    </div>

                    {/* Modules Tab */}
                    {activeTab === 'modules' && (
                        <div>
                            {/* Category Filter */}
                            <div className="flex gap-2 mb-6 overflow-x-auto pb-2">
                                {categories.map((cat) => (
                                    <button key={cat} onClick={() => setSelectedCategory(cat)}
                                        className={`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition ${
                                            selectedCategory === cat ? 'bg-[#00E5FA]/30 text-[#00E5FA]' : 'bg-[#00E5FA]/10 text-gray-400 hover:text-white'
                                        }`}>
                                        {cat === 'all' ? 'All Modules' : cat}
                                    </button>
                                ))}
                            </div>

                            {/* Modules Grid */}
                            <div className="grid grid-cols-2 gap-4">
                                {filteredModules.map((mod) => {
                                    const prog = getModuleProgress(mod.id);
                                    const status = prog?.status || 'not_started';
                                    const badge = getStatusBadge(status);
                                    return (
                                        <div key={mod.id} className="glass rounded-xl p-5 hover:glow transition-all">
                                            <div className="flex items-start justify-between mb-3">
                                                <div className="flex items-center gap-3">
                                                    <span className="text-3xl">{getContentIcon(mod.content_type)}</span>
                                                    <div>
                                                        <h3 className="font-semibold text-white flex items-center gap-2">
                                                            {mod.title}
                                                            {mod.is_required && <span className="text-xs bg-red-500/20 text-red-400 px-2 py-0.5 rounded">REQUIRED</span>}
                                                        </h3>
                                                        <span className="text-xs text-gray-500">{mod.category} • {mod.duration_minutes} min</span>
                                                    </div>
                                                </div>
                                                <span className={`px-3 py-1 rounded-full text-xs font-semibold ${badge.bg} ${badge.text}`}>
                                                    {badge.label}
                                                </span>
                                            </div>
                                            <p className="text-gray-400 text-sm mb-4">{mod.description}</p>
                                            {prog?.score && (
                                                <div className="text-sm text-[#00E5FA] mb-3">Score: {prog.score}%</div>
                                            )}
                                            <div className="flex gap-2">
                                                {status === 'not_started' && (
                                                    <button onClick={() => updateProgress(mod.id, 'in_progress')}
                                                        className="flex-1 px-4 py-2 bg-[#00E5FA] text-[#00050F] font-semibold rounded-lg hover:bg-[#00E5FA]/80">
                                                        Start Module
                                                    </button>
                                                )}
                                                {status === 'in_progress' && (
                                                    <>
                                                        <button className="flex-1 px-4 py-2 bg-yellow-500/20 text-yellow-400 rounded-lg hover:bg-yellow-500/30">
                                                            Continue
                                                        </button>
                                                        <button onClick={() => updateProgress(mod.id, 'completed')}
                                                            className="px-4 py-2 bg-green-500/20 text-green-400 rounded-lg hover:bg-green-500/30">
                                                            Mark Complete
                                                        </button>
                                                    </>
                                                )}
                                                {status === 'completed' && (
                                                    <button className="flex-1 px-4 py-2 bg-gray-600/30 text-gray-300 rounded-lg hover:bg-gray-600/40">
                                                        Review
                                                    </button>
                                                )}
                                                <button onClick={() => openModuleModal(mod)}
                                                    className="px-3 py-2 border border-[#00E5FA]/30 text-gray-400 rounded-lg hover:bg-[#00E5FA]/10">
                                                    ✏️
                                                </button>
                                                <button onClick={() => deleteModule(mod.id)}
                                                    className="px-3 py-2 border border-red-500/30 text-red-400 rounded-lg hover:bg-red-500/10">
                                                    🗑️
                                                </button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {/* Certifications Tab */}
                    {activeTab === 'certifications' && (
                        <div className="grid grid-cols-2 gap-6">
                            {certifications.map((cert) => {
                                const earned = checkCertification(cert);
                                const completedReqs = cert.requirements.filter(r => getModuleProgress(r)?.status === 'completed').length;
                                return (
                                    <div key={cert.id} className={`glass rounded-xl p-6 ${earned ? 'glow' : ''}`}>
                                        <div className="flex items-center gap-4 mb-4">
                                            <div className={`w-16 h-16 rounded-full flex items-center justify-center text-3xl ${
                                                earned ? '' : 'grayscale opacity-50'
                                            }`} style={{ backgroundColor: `${cert.badge_color}30`, border: `2px solid ${cert.badge_color}` }}>
                                                🏆
                                            </div>
                                            <div>
                                                <h3 className="text-xl font-bold text-white">{cert.name}</h3>
                                                <p className="text-gray-400 text-sm">{cert.description}</p>
                                            </div>
                                        </div>
                                        <div className="mb-4">
                                            <div className="flex justify-between text-sm mb-2">
                                                <span className="text-gray-400">Progress</span>
                                                <span className="text-white">{completedReqs}/{cert.requirements.length} modules</span>
                                            </div>
                                            <div className="w-full bg-gray-700 rounded-full h-2">
                                                <div className="h-2 rounded-full transition-all" style={{ 
                                                    width: `${(completedReqs / cert.requirements.length) * 100}%`,
                                                    backgroundColor: cert.badge_color
                                                }}></div>
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <span className="text-gray-400 text-sm">Required Modules:</span>
                                            {cert.requirements.map((reqId) => {
                                                const mod = modules.find(m => m.id === reqId);
                                                const completed = getModuleProgress(reqId)?.status === 'completed';
                                                return (
                                                    <div key={reqId} className="flex items-center gap-2 text-sm">
                                                        <span className={completed ? 'text-green-400' : 'text-gray-500'}>{completed ? '✓' : '○'}</span>
                                                        <span className={completed ? 'text-gray-300' : 'text-gray-500'}>{mod?.title}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                        {earned && (
                                            <div className="mt-4 p-3 bg-green-500/10 border border-green-500/30 rounded-lg text-green-400 text-center font-semibold">
                                                🎉 Certification Earned!
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {/* Module Modal */}
                    {showModuleModal && (
                        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
                            <div className="glass rounded-xl p-6 w-full max-w-lg glow">
                                <h2 className="text-xl font-bold text-white mb-4">{selectedModule ? 'Edit Module' : 'Add Module'}</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-gray-400 text-sm">Title</label>
                                        <input type="text" value={moduleForm.title} onChange={(e) => setModuleForm({...moduleForm, title: e.target.value})}
                                            className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-gray-400 text-sm">Category</label>
                                            <select value={moduleForm.category} onChange={(e) => setModuleForm({...moduleForm, category: e.target.value})}
                                                className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1">
                                                <option>Onboarding</option>
                                                <option>Capture</option>
                                                <option>Proposals</option>
                                                <option>Compliance</option>
                                                <option>Pricing</option>
                                                <option>Orals</option>
                                                <option>AI Tools</option>
                                                <option>Strategy</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-gray-400 text-sm">Content Type</label>
                                            <select value={moduleForm.content_type} onChange={(e) => setModuleForm({...moduleForm, content_type: e.target.value})}
                                                className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1">
                                                <option value="video">Video</option>
                                                <option value="interactive">Interactive</option>
                                                <option value="document">Document</option>
                                                <option value="quiz">Quiz</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-gray-400 text-sm">Description</label>
                                        <textarea value={moduleForm.description} onChange={(e) => setModuleForm({...moduleForm, description: e.target.value})}
                                            className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1 h-20" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-gray-400 text-sm">Duration (minutes)</label>
                                            <input type="number" value={moduleForm.duration_minutes} onChange={(e) => setModuleForm({...moduleForm, duration_minutes: parseInt(e.target.value)})}
                                                className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1" />
                                        </div>
                                        <div className="flex items-center gap-3 mt-6">
                                            <input type="checkbox" id="is_required" checked={moduleForm.is_required} onChange={(e) => setModuleForm({...moduleForm, is_required: e.target.checked})}
                                                className="w-4 h-4 accent-[#00E5FA]" />
                                            <label htmlFor="is_required" className="text-gray-300">Required for onboarding</label>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 mt-6">
                                    <button onClick={() => setShowModuleModal(false)} className="px-4 py-2 border border-gray-600 text-gray-300 rounded-lg hover:bg-gray-800">Cancel</button>
                                    <button onClick={saveModule} className="px-6 py-2 bg-[#00E5FA] text-[#00050F] font-semibold rounded-lg hover:bg-[#00E5FA]/80">Save</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<TrainingCenter />);
    </script>
</body>
</html>
