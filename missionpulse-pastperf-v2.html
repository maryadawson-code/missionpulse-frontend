<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Past Performance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.15); }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const DEFAULT_COMPANY_ID = '11111111-1111-1111-1111-111111111111';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const DEMO_PAST_PERF = [
      { id: '1', contract_number: 'HT0011-20-C-0001', contract_title: 'DHA Healthcare IT Modernization', agency: 'DHA', contract_value: 45000000, period_of_performance: '2020-2025', relevance_areas: ['EHR Implementation', 'Cloud Migration', 'HIPAA Compliance', 'Help Desk Support'], cpars_rating: 'Exceptional', description: 'Led enterprise-wide migration of legacy health IT systems to MHS GENESIS platform. Achieved 99.98% uptime. Trained 5,000+ users.', key_personnel: ['Mary Womack - PM', 'John Tech - Lead Architect'], lessons: 'Early stakeholder engagement critical for user adoption.' },
      { id: '2', contract_number: 'VA118-19-D-0042', contract_title: 'VA EHR Integration Support', agency: 'VA', contract_value: 28000000, period_of_performance: '2019-2024', relevance_areas: ['VistA Integration', 'HL7 FHIR', 'Data Migration', 'Training'], cpars_rating: 'Very Good', description: 'Provided integration services between VistA and commercial EHR systems. Migrated 2M+ patient records with zero data loss.', key_personnel: ['Mary Womack - Contract Lead', 'Sarah Ops - Integration Lead'], lessons: 'Phased rollout reduced risk and improved outcomes.' },
      { id: '3', contract_number: 'CMS-18-0087', contract_title: 'CMS Data Analytics Platform', agency: 'CMS', contract_value: 32000000, period_of_performance: '2018-2023', relevance_areas: ['Big Data Analytics', 'Fraud Detection', 'Cloud Infrastructure', 'Security'], cpars_rating: 'Exceptional', description: 'Developed and deployed cloud-based analytics platform processing 1B+ claims annually. Identified $500M+ in fraud savings.', key_personnel: ['Mary Womack - Program Manager'], lessons: 'Machine learning models require continuous refinement.' },
      { id: '4', contract_number: 'IHS-21-C-0015', contract_title: 'IHS Telehealth Expansion', agency: 'IHS', contract_value: 15000000, period_of_performance: '2021-2024', relevance_areas: ['Telehealth', 'Remote Monitoring', 'Mobile Health', 'Tribal Consultation'], cpars_rating: 'Very Good', description: 'Implemented telehealth solutions across 50+ tribal health facilities. Increased rural access by 300%.', key_personnel: ['Sarah Ops - PM'], lessons: 'Cultural sensitivity essential for tribal health IT.' },
      { id: '5', contract_number: 'DOD-17-F-0223', contract_title: 'DOD Health Interoperability', agency: 'DOD', contract_value: 52000000, period_of_performance: '2017-2022', relevance_areas: ['Interoperability', 'FHIR', 'Joint Health Information Exchange', 'Cybersecurity'], cpars_rating: 'Satisfactory', description: 'Established health information exchange between DOD and VA systems. Connected 150+ MTFs.', key_personnel: ['Mary Womack - Technical Lead'], lessons: 'Cross-agency coordination requires dedicated governance.' },
    ];

    const CPARS_RATINGS = ['Exceptional', 'Very Good', 'Satisfactory', 'Marginal', 'Unsatisfactory', 'Pending'];

    function App() {
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [items, setItems] = React.useState(DEMO_PAST_PERF);
      const [searchTerm, setSearchTerm] = React.useState('');
      const [filterAgency, setFilterAgency] = React.useState('all');
      const [filterRating, setFilterRating] = React.useState('all');
      const [showModal, setShowModal] = React.useState(false);
      const [editingItem, setEditingItem] = React.useState(null);
      const [expandedItems, setExpandedItems] = React.useState(new Set());
      const [form, setForm] = React.useState({ 
        contract_number: '',
        contract_title: '',
        agency: '',
        contract_value: 0,
        period_of_performance: '',
        relevance_areas: '',
        cpars_rating: 'Pending',
        description: '',
        key_personnel: '',
        lessons: ''
      });

      React.useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        try {
          const { data, error } = await supabase
            .from('past_performance')
            .select('*')
            .order('contract_value', { ascending: false });
          
          if (!error && data?.length > 0) {
            setItems(data);
            setConnected(true);
          }
        } catch (e) {
          console.log('Using demo data');
        }
        setLoading(false);
      };

      const saveItem = async () => {
        const itemData = {
          ...form,
          relevance_areas: typeof form.relevance_areas === 'string' ? form.relevance_areas.split(',').map(s => s.trim()).filter(Boolean) : form.relevance_areas,
          key_personnel: typeof form.key_personnel === 'string' ? form.key_personnel.split(',').map(s => s.trim()).filter(Boolean) : form.key_personnel,
          company_id: DEFAULT_COMPANY_ID,
        };

        if (connected) {
          try {
            if (editingItem) {
              await supabase.from('past_performance').update(itemData).eq('id', editingItem.id);
              setItems(items.map(i => i.id === editingItem.id ? { ...i, ...itemData } : i));
            } else {
              const { data } = await supabase.from('past_performance').insert([itemData]).select();
              if (data) setItems([...items, data[0]]);
            }
          } catch (e) {
            console.error('Save error:', e);
          }
        } else {
          if (editingItem) {
            setItems(items.map(i => i.id === editingItem.id ? { ...i, ...itemData } : i));
          } else {
            setItems([...items, { ...itemData, id: Date.now().toString() }]);
          }
        }
        
        closeModal();
      };

      const deleteItem = async (id) => {
        if (!confirm('Delete this past performance record?')) return;
        if (connected) {
          await supabase.from('past_performance').delete().eq('id', id);
        }
        setItems(items.filter(i => i.id !== id));
      };

      const closeModal = () => {
        setShowModal(false);
        setEditingItem(null);
        setForm({ contract_number: '', contract_title: '', agency: '', contract_value: 0, period_of_performance: '', relevance_areas: '', cpars_rating: 'Pending', description: '', key_personnel: '', lessons: '' });
      };

      const openEditModal = (item) => {
        setEditingItem(item);
        setForm({
          contract_number: item.contract_number || '',
          contract_title: item.contract_title,
          agency: item.agency || '',
          contract_value: item.contract_value || 0,
          period_of_performance: item.period_of_performance || '',
          relevance_areas: Array.isArray(item.relevance_areas) ? item.relevance_areas.join(', ') : '',
          cpars_rating: item.cpars_rating || 'Pending',
          description: item.description || '',
          key_personnel: Array.isArray(item.key_personnel) ? item.key_personnel.join(', ') : '',
          lessons: item.lessons || ''
        });
        setShowModal(true);
      };

      const toggleExpand = (id) => {
        const newExpanded = new Set(expandedItems);
        if (newExpanded.has(id)) {
          newExpanded.delete(id);
        } else {
          newExpanded.add(id);
        }
        setExpandedItems(newExpanded);
      };

      // Get unique agencies
      const agencies = [...new Set(items.map(i => i.agency).filter(Boolean))];

      // Filter items
      const filteredItems = items.filter(i => {
        const searchMatch = !searchTerm || 
          i.contract_title.toLowerCase().includes(searchTerm.toLowerCase()) ||
          (i.contract_number && i.contract_number.toLowerCase().includes(searchTerm.toLowerCase())) ||
          (i.relevance_areas && i.relevance_areas.some(r => r.toLowerCase().includes(searchTerm.toLowerCase())));
        const agencyMatch = filterAgency === 'all' || i.agency === filterAgency;
        const ratingMatch = filterRating === 'all' || i.cpars_rating === filterRating;
        return searchMatch && agencyMatch && ratingMatch;
      });

      // Stats
      const totalValue = items.reduce((sum, i) => sum + (i.contract_value || 0), 0);
      const avgRating = items.filter(i => i.cpars_rating && i.cpars_rating !== 'Pending').length;
      const exceptionalCount = items.filter(i => i.cpars_rating === 'Exceptional').length;

      const formatCurrency = (value) => {
        if (value >= 1000000) return `$${(value / 1000000).toFixed(1)}M`;
        if (value >= 1000) return `$${(value / 1000).toFixed(0)}K`;
        return `$${value}`;
      };

      const getRatingColor = (rating) => {
        switch (rating) {
          case 'Exceptional': return 'bg-emerald-500/20 text-emerald-400';
          case 'Very Good': return 'bg-cyan-500/20 text-cyan-400';
          case 'Satisfactory': return 'bg-blue-500/20 text-blue-400';
          case 'Marginal': return 'bg-amber-500/20 text-amber-400';
          case 'Unsatisfactory': return 'bg-red-500/20 text-red-400';
          default: return 'bg-slate-500/20 text-slate-400';
        }
      };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
          </div>
        );
      }

      return (
        <div className="min-h-screen p-6">
          {/* Header */}
          <div className="flex items-center justify-between mb-6">
            <div className="flex items-center gap-4">
              <a href="index.html" className="text-slate-400 hover:text-white">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
              </a>
              <div>
                <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                  <span className="text-amber-400">⭐</span> Past Performance
                </h1>
                <p className="text-slate-400 text-sm">Contract reference library with CPARS ratings</p>
              </div>
            </div>
            <div className="flex items-center gap-4">
              <div className={`px-3 py-1 rounded-full text-xs ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                {connected ? '● Live' : '○ Demo'}
              </div>
              <button
                onClick={() => { setEditingItem(null); setShowModal(true); }}
                className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 text-white rounded-lg font-medium transition-colors"
              >
                + Add Contract
              </button>
            </div>
          </div>

          {/* Stats */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div className="glass rounded-xl p-4 text-center">
              <p className="text-2xl font-bold text-white">{items.length}</p>
              <p className="text-xs text-slate-400">Total Contracts</p>
            </div>
            <div className="glass rounded-xl p-4 text-center">
              <p className="text-2xl font-bold text-cyan-400">{formatCurrency(totalValue)}</p>
              <p className="text-xs text-slate-400">Total Value</p>
            </div>
            <div className="glass rounded-xl p-4 text-center">
              <p className="text-2xl font-bold text-emerald-400">{exceptionalCount}</p>
              <p className="text-xs text-slate-400">Exceptional Ratings</p>
            </div>
            <div className="glass rounded-xl p-4 text-center">
              <p className="text-2xl font-bold text-white">{agencies.length}</p>
              <p className="text-xs text-slate-400">Agencies Served</p>
            </div>
          </div>

          {/* Filters */}
          <div className="flex flex-wrap items-center gap-4 mb-6">
            <input
              type="text"
              placeholder="Search contracts..."
              value={searchTerm}
              onChange={(e) => setSearchTerm(e.target.value)}
              className="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white w-64 focus:outline-none focus:border-cyan-500"
            />
            <select
              value={filterAgency}
              onChange={(e) => setFilterAgency(e.target.value)}
              className="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
            >
              <option value="all">All Agencies</option>
              {agencies.map(a => (
                <option key={a} value={a}>{a}</option>
              ))}
            </select>
            <select
              value={filterRating}
              onChange={(e) => setFilterRating(e.target.value)}
              className="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
            >
              <option value="all">All Ratings</option>
              {CPARS_RATINGS.map(r => (
                <option key={r} value={r}>{r}</option>
              ))}
            </select>
          </div>

          {/* Past Performance Cards */}
          <div className="space-y-4">
            {filteredItems.map(item => (
              <div key={item.id} className="glass rounded-xl overflow-hidden">
                <div 
                  className="p-5 cursor-pointer hover:bg-white/5 transition-colors"
                  onClick={() => toggleExpand(item.id)}
                >
                  <div className="flex items-start justify-between">
                    <div className="flex-1">
                      <div className="flex items-center gap-3 mb-2">
                        <h3 className="text-lg font-semibold text-white">{item.contract_title}</h3>
                        <span className={`px-2 py-0.5 rounded text-xs ${getRatingColor(item.cpars_rating)}`}>
                          {item.cpars_rating}
                        </span>
                      </div>
                      <div className="flex flex-wrap items-center gap-4 text-sm text-slate-400">
                        {item.contract_number && <span className="font-mono">{item.contract_number}</span>}
                        {item.agency && <span className="px-2 py-0.5 rounded bg-slate-700">{item.agency}</span>}
                        {item.period_of_performance && <span>📅 {item.period_of_performance}</span>}
                        {item.contract_value > 0 && <span className="text-cyan-400 font-medium">{formatCurrency(item.contract_value)}</span>}
                      </div>
                    </div>
                    <div className="flex items-center gap-2">
                      <button 
                        onClick={(e) => { e.stopPropagation(); openEditModal(item); }} 
                        className="text-slate-400 hover:text-cyan-400 transition-colors p-1"
                      >
                        ✏️
                      </button>
                      <button 
                        onClick={(e) => { e.stopPropagation(); deleteItem(item.id); }} 
                        className="text-slate-400 hover:text-red-400 transition-colors p-1"
                      >
                        🗑️
                      </button>
                      <span className="text-slate-500 ml-2">{expandedItems.has(item.id) ? '▲' : '▼'}</span>
                    </div>
                  </div>
                  
                  {/* Relevance Areas */}
                  {item.relevance_areas?.length > 0 && (
                    <div className="flex flex-wrap gap-1 mt-3">
                      {item.relevance_areas.map((area, i) => (
                        <span key={i} className="px-2 py-0.5 rounded-full text-xs bg-cyan-500/10 text-cyan-400 border border-cyan-500/20">{area}</span>
                      ))}
                    </div>
                  )}
                </div>
                
                {/* Expanded Content */}
                {expandedItems.has(item.id) && (
                  <div className="px-5 pb-5 pt-0 border-t border-slate-700/50">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
                      {item.description && (
                        <div>
                          <p className="text-xs text-cyan-400 uppercase tracking-wider mb-2">Description</p>
                          <p className="text-slate-300 text-sm">{item.description}</p>
                        </div>
                      )}
                      
                      {item.key_personnel?.length > 0 && (
                        <div>
                          <p className="text-xs text-cyan-400 uppercase tracking-wider mb-2">Key Personnel</p>
                          <div className="space-y-1">
                            {item.key_personnel.map((person, i) => (
                              <p key={i} className="text-slate-300 text-sm">{person}</p>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                    
                    {item.lessons && (
                      <div className="mt-4 p-3 rounded-lg bg-amber-500/10 border border-amber-500/20">
                        <p className="text-xs text-amber-400 uppercase tracking-wider mb-1">💡 Lessons Learned</p>
                        <p className="text-sm text-amber-200">{item.lessons}</p>
                      </div>
                    )}
                  </div>
                )}
              </div>
            ))}
          </div>

          {filteredItems.length === 0 && (
            <div className="text-center py-12">
              <p className="text-slate-500">No past performance records found. Add contracts to build your library.</p>
            </div>
          )}

          {/* Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
              <div className="glass rounded-xl p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                <h2 className="text-xl font-bold text-white mb-4">
                  {editingItem ? 'Edit Past Performance' : 'Add Past Performance'}
                </h2>
                
                <div className="space-y-4">
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Contract Title *</label>
                      <input
                        type="text"
                        value={form.contract_title}
                        onChange={(e) => setForm({ ...form, contract_title: e.target.value })}
                        placeholder="Contract name"
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                      />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Contract Number</label>
                      <input
                        type="text"
                        value={form.contract_number}
                        onChange={(e) => setForm({ ...form, contract_number: e.target.value })}
                        placeholder="e.g., HT0011-20-C-0001"
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                      />
                    </div>
                  </div>

                  <div className="grid grid-cols-3 gap-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Agency</label>
                      <input
                        type="text"
                        value={form.agency}
                        onChange={(e) => setForm({ ...form, agency: e.target.value })}
                        placeholder="e.g., DHA"
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                      />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Contract Value</label>
                      <input
                        type="number"
                        value={form.contract_value}
                        onChange={(e) => setForm({ ...form, contract_value: parseFloat(e.target.value) || 0 })}
                        placeholder="0"
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                      />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">CPARS Rating</label>
                      <select
                        value={form.cpars_rating}
                        onChange={(e) => setForm({ ...form, cpars_rating: e.target.value })}
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                      >
                        {CPARS_RATINGS.map(r => (
                          <option key={r} value={r}>{r}</option>
                        ))}
                      </select>
                    </div>
                  </div>

                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Period of Performance</label>
                    <input
                      type="text"
                      value={form.period_of_performance}
                      onChange={(e) => setForm({ ...form, period_of_performance: e.target.value })}
                      placeholder="e.g., 2020-2025"
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                    />
                  </div>

                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Relevance Areas (comma-separated)</label>
                    <input
                      type="text"
                      value={form.relevance_areas}
                      onChange={(e) => setForm({ ...form, relevance_areas: e.target.value })}
                      placeholder="EHR Implementation, Cloud Migration, ..."
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                    />
                  </div>

                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Description</label>
                    <textarea
                      value={form.description}
                      onChange={(e) => setForm({ ...form, description: e.target.value })}
                      placeholder="Contract scope and accomplishments..."
                      rows={3}
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                    />
                  </div>

                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Key Personnel (comma-separated)</label>
                    <input
                      type="text"
                      value={form.key_personnel}
                      onChange={(e) => setForm({ ...form, key_personnel: e.target.value })}
                      placeholder="Name - Role, Name - Role, ..."
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                    />
                  </div>

                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Lessons Learned</label>
                    <textarea
                      value={form.lessons}
                      onChange={(e) => setForm({ ...form, lessons: e.target.value })}
                      placeholder="Key takeaways from this contract..."
                      rows={2}
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                    />
                  </div>
                </div>
                
                <div className="flex justify-end gap-3 mt-6">
                  <button onClick={closeModal} className="px-4 py-2 text-slate-400 hover:text-white transition-colors">
                    Cancel
                  </button>
                  <button
                    onClick={saveItem}
                    disabled={!form.contract_title}
                    className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 disabled:bg-slate-600 text-white rounded-lg font-medium transition-colors"
                  >
                    {editingItem ? 'Update' : 'Create'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <div className="mt-8 text-center text-slate-500 text-sm">
            MissionPulse v3.1 • Mission Meets Tech • AI GENERATED CONTENT REQUIRES HUMAN REVIEW
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
