<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Past Performance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-purple { 0%, 100% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(168, 85, 247, 0); } }
    .pulse-purple { animation: pulse-purple 2s infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const DEMO_REFERENCES = [
      { id: 1, contractName: 'VA Health Information Exchange', contractNumber: 'VA118-19-C-0045', agency: 'Department of Veterans Affairs', poc: 'Dr. Michael Chen', pocEmail: 'michael.chen@va.gov', pocPhone: '(202) 555-0147', value: 45000000, period: '2019-2024', status: 'Complete', rating: 'Exceptional', relevance: 95, scope: ['EHR Integration', 'Data Migration', 'FHIR Implementation', 'Security Compliance'] },
      { id: 2, contractName: 'DHA Claims Processing Modernization', contractNumber: 'HT0011-20-C-0089', agency: 'Defense Health Agency', poc: 'Sarah Mitchell', pocEmail: 'sarah.mitchell@dha.mil', pocPhone: '(703) 555-0234', value: 32000000, period: '2020-2024', status: 'Complete', rating: 'Very Good', relevance: 88, scope: ['Claims Automation', 'API Development', 'Legacy Migration', 'DevSecOps'] },
      { id: 3, contractName: 'CMS Quality Reporting Analytics', contractNumber: 'CMS-18-C-0156', agency: 'Centers for Medicare & Medicaid', poc: 'James Rodriguez', pocEmail: 'james.rodriguez@cms.hhs.gov', pocPhone: '(410) 555-0312', value: 28000000, period: '2018-2023', status: 'Complete', rating: 'Exceptional', relevance: 82, scope: ['Healthcare Analytics', 'Dashboard Development', 'Data Warehousing', 'Reporting'] },
      { id: 4, contractName: 'IHS Telehealth Implementation', contractNumber: 'IHS-21-C-0078', agency: 'Indian Health Service', poc: 'Lisa Whitehorse', pocEmail: 'lisa.whitehorse@ihs.gov', pocPhone: '(505) 555-0456', value: 18000000, period: '2021-2025', status: 'Active', rating: 'Satisfactory', relevance: 75, scope: ['Telehealth Platform', 'Mobile Development', 'Training', 'Support'] }
    ];

    const RATING_COLORS = { 'Exceptional': 'bg-emerald-500/20 text-emerald-400', 'Very Good': 'bg-cyan-500/20 text-cyan-400', 'Satisfactory': 'bg-amber-500/20 text-amber-400', 'Marginal': 'bg-red-500/20 text-red-400' };
    const STATUS_COLORS = { 'Complete': 'bg-slate-500/20 text-slate-400', 'Active': 'bg-emerald-500/20 text-emerald-400' };

    function Sidebar() {
      const navItems = [
        { icon: '🏠', label: 'Dashboard', path: 'index.html' },
        { icon: '📊', label: 'Pipeline', path: 'missionpulse-pipeline-v2.html' },
        { icon: '🎯', label: 'War Room', path: 'missionpulse-warroom-v2.html' },
        { icon: '🏆', label: 'Past Perf', path: 'missionpulse-pastperf-v2.html', active: true },
        { icon: '📚', label: 'Lessons', path: 'missionpulse-lessons-v2.html' },
        { icon: '🤖', label: 'Agent Hub', path: 'missionpulse-agenthub-v2.html' }
      ];
      return (
        <div className="w-64 bg-slate-900/50 border-r border-slate-700 min-h-screen p-4 hidden lg:block">
          <div className="flex items-center gap-3 mb-8">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-purple-500 to-pink-600 flex items-center justify-center pulse-purple"><span className="text-xl">🏆</span></div>
            <div><div className="font-bold text-purple-400">Past Performance</div><div className="text-xs text-slate-400">References</div></div>
          </div>
          <nav className="space-y-1">{navItems.map((item, i) => (<a key={i} href={item.path} className={`flex items-center gap-3 px-3 py-2 rounded-lg transition-all ${item.active ? 'bg-purple-500/20 text-purple-400 border border-purple-500/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}><span>{item.icon}</span><span className="text-sm">{item.label}</span></a>))}</nav>
        </div>
      );
    }

    function ReferenceCard({ ref, onClick }) {
      return (
        <div onClick={() => onClick(ref)} className="bg-slate-800/50 border border-slate-700 rounded-xl p-4 hover:border-purple-500/50 cursor-pointer transition-all">
          <div className="flex items-start justify-between mb-3">
            <div>
              <h3 className="font-medium">{ref.contractName}</h3>
              <div className="text-xs text-slate-400 font-mono">{ref.contractNumber}</div>
            </div>
            <span className={`px-2 py-0.5 rounded text-xs ${RATING_COLORS[ref.rating]}`}>{ref.rating}</span>
          </div>
          <div className="text-sm text-slate-400 mb-3">{ref.agency}</div>
          <div className="flex items-center gap-4 text-xs text-slate-400 mb-3">
            <span>${(ref.value / 1000000).toFixed(0)}M</span>
            <span>{ref.period}</span>
            <span className={`px-2 py-0.5 rounded ${STATUS_COLORS[ref.status]}`}>{ref.status}</span>
          </div>
          <div className="flex items-center justify-between">
            <div className="flex flex-wrap gap-1">
              {ref.scope.slice(0, 2).map(s => (<span key={s} className="px-2 py-0.5 bg-slate-700 rounded text-xs">{s}</span>))}
              {ref.scope.length > 2 && <span className="text-xs text-slate-500">+{ref.scope.length - 2}</span>}
            </div>
            <div className="flex items-center gap-2">
              <span className="text-xs text-slate-400">Relevance</span>
              <div className="w-16 h-2 bg-slate-700 rounded-full overflow-hidden">
                <div className={`h-full rounded-full ${ref.relevance >= 85 ? 'bg-emerald-500' : ref.relevance >= 70 ? 'bg-cyan-500' : 'bg-amber-500'}`} style={{ width: `${ref.relevance}%` }} />
              </div>
              <span className="text-xs font-medium">{ref.relevance}%</span>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [references] = React.useState(DEMO_REFERENCES);
      const [selectedRef, setSelectedRef] = React.useState(null);
      const totalValue = references.reduce((sum, r) => sum + r.value, 0);
      const avgRelevance = Math.round(references.reduce((sum, r) => sum + r.relevance, 0) / references.length);

      return (
        <div className="flex min-h-screen">
          <Sidebar />
          <div className="flex-1 p-4 lg:p-6">
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
              <div><h1 className="text-2xl font-bold">Past Performance</h1><p className="text-slate-400 text-sm">Manage contract references for proposals</p></div>
              <button className="px-4 py-2 bg-purple-500 hover:bg-purple-400 text-white rounded-lg text-sm font-medium">+ Add Reference</button>
            </div>
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4"><div className="text-2xl font-bold">{references.length}</div><div className="text-sm text-slate-400">References</div></div>
              <div className="bg-slate-800/50 border border-purple-500/30 rounded-xl p-4"><div className="text-2xl font-bold text-purple-400">${(totalValue / 1000000).toFixed(0)}M</div><div className="text-sm text-slate-400">Total Value</div></div>
              <div className="bg-slate-800/50 border border-emerald-500/30 rounded-xl p-4"><div className="text-2xl font-bold text-emerald-400">{references.filter(r => r.rating === 'Exceptional').length}</div><div className="text-sm text-slate-400">Exceptional</div></div>
              <div className="bg-slate-800/50 border border-cyan-500/30 rounded-xl p-4"><div className="text-2xl font-bold text-cyan-400">{avgRelevance}%</div><div className="text-sm text-slate-400">Avg Relevance</div></div>
            </div>
            <div className="grid lg:grid-cols-2 gap-4">
              {references.map(ref => <ReferenceCard key={ref.id} ref={ref} onClick={setSelectedRef} />)}
            </div>
            {selectedRef && (
              <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
                <div className="bg-slate-800 border border-slate-700 rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                  <div className="p-4 border-b border-slate-700 flex items-center justify-between">
                    <div><h2 className="font-semibold">{selectedRef.contractName}</h2><div className="text-sm text-slate-400 font-mono">{selectedRef.contractNumber}</div></div>
                    <button onClick={() => setSelectedRef(null)} className="text-slate-400 hover:text-white text-xl">×</button>
                  </div>
                  <div className="p-4 space-y-4">
                    <div className="grid grid-cols-2 gap-4">
                      <div><label className="text-xs text-slate-400">Agency</label><div className="text-sm">{selectedRef.agency}</div></div>
                      <div><label className="text-xs text-slate-400">Contract Value</label><div className="text-sm">${selectedRef.value.toLocaleString()}</div></div>
                      <div><label className="text-xs text-slate-400">Period</label><div className="text-sm">{selectedRef.period}</div></div>
                      <div><label className="text-xs text-slate-400">CPARS Rating</label><div><span className={`px-2 py-0.5 rounded text-xs ${RATING_COLORS[selectedRef.rating]}`}>{selectedRef.rating}</span></div></div>
                    </div>
                    <div className="p-4 bg-slate-900/50 rounded-lg">
                      <div className="text-xs text-slate-400 mb-2">Point of Contact</div>
                      <div className="font-medium">{selectedRef.poc}</div>
                      <div className="text-sm text-cyan-400">{selectedRef.pocEmail}</div>
                      <div className="text-sm text-slate-400">{selectedRef.pocPhone}</div>
                    </div>
                    <div><label className="text-xs text-slate-400">Scope of Work</label><div className="flex flex-wrap gap-2 mt-1">{selectedRef.scope.map(s => <span key={s} className="px-2 py-1 bg-slate-700 rounded text-sm">{s}</span>)}</div></div>
                    <div><label className="text-xs text-slate-400">Relevance to Current Opportunity</label><div className="flex items-center gap-3 mt-1"><div className="flex-1 h-3 bg-slate-700 rounded-full overflow-hidden"><div className={`h-full rounded-full ${selectedRef.relevance >= 85 ? 'bg-emerald-500' : 'bg-cyan-500'}`} style={{ width: `${selectedRef.relevance}%` }} /></div><span className="font-bold">{selectedRef.relevance}%</span></div></div>
                  </div>
                  <div className="p-4 border-t border-slate-700 flex justify-end gap-3">
                    <button className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">Edit</button>
                    <button onClick={() => setSelectedRef(null)} className="px-4 py-2 bg-purple-500 hover:bg-purple-400 text-white rounded-lg text-sm font-medium">Close</button>
                  </div>
                </div>
              </div>
            )}
            <div className="mt-8 text-center text-xs text-slate-500"><div>Mission Meets Tech | MissionPulse Past Performance</div><div className="mt-1">AI GENERATED - REQUIRES HUMAN REVIEW</div></div>
          </div>
        </div>
      );
    }
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
