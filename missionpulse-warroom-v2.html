<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | War Room</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-cyan { 0%, 100% { box-shadow: 0 0 0 0 rgba(0, 229, 250, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(0, 229, 250, 0); } }
    .pulse-icon { animation: pulse-cyan 2s infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const DEMO_OPP = {
      id: 'demo-1',
      nickname: 'EHR-Mod',
      title: 'DHA Electronic Health Record Modernization',
      agency: 'Defense Health Agency',
      sub_agency: 'Health IT',
      ceiling: 125000000,
      phase: 'Gate 3',
      pwin: 72,
      priority: 'Critical',
      due_date: '2026-03-15',
      set_aside: 'SDVOSB',
      contract_vehicle: 'T4NG2',
      description: 'Modernization of military health system EHR to improve interoperability across DoD and VA systems.',
      incumbent: 'Leidos',
      solicitation_number: 'HT0011-26-R-0042'
    };

    const DEMO_WIN_THEMES = [
      { id: 1, title: 'Zero-Disruption Transition', description: 'Proven methodology for seamless EHR migrations', proof_points: ['12 similar transitions', 'Zero downtime', '99.99% data integrity'], discriminator: true },
      { id: 2, title: 'Interoperability Excellence', description: 'Deep expertise in HL7 FHIR and healthcare data standards', proof_points: ['FHIR-certified team', 'Joint HIE experience'], discriminator: true },
      { id: 3, title: 'MHS Genesis Expertise', description: 'Direct experience with DoD health systems', proof_points: ['3 MHS Genesis implementations', 'Cerner partnership'], discriminator: false }
    ];

    const DEMO_COMPETITORS = [
      { id: 1, name: 'Leidos Health', threat_level: 'High', incumbent: false, pwin_estimate: 25, strengths: ['Large team capacity', 'DHA incumbent'], weaknesses: ['Expensive rates', 'Recent delivery issues'] },
      { id: 2, name: 'Booz Allen Hamilton', threat_level: 'Medium', incumbent: false, pwin_estimate: 20, strengths: ['DHA relationships', 'Technical depth'], weaknesses: ['Not SDVOSB', 'Price premium'] },
      { id: 3, name: 'GDIT', threat_level: 'Medium', incumbent: false, pwin_estimate: 15, strengths: ['Scale', 'Cleared staff'], weaknesses: ['Slow to mobilize', 'Generic approach'] }
    ];

    const DEMO_TASKS = [
      { id: 1, task_name: 'Complete Compliance Matrix', phase: 'Gate 3', status: 'In Progress', due_date: '2026-02-01' },
      { id: 2, task_name: 'Finalize Win Themes', phase: 'Gate 3', status: 'Complete', due_date: '2026-01-28' },
      { id: 3, task_name: 'Draft Technical Approach', phase: 'Gate 3', status: 'Not Started', due_date: '2026-02-10' },
      { id: 4, task_name: 'Price-to-Win Analysis', phase: 'Gate 3', status: 'In Progress', due_date: '2026-02-05' },
      { id: 5, task_name: 'Teaming Agreement - SubCo', phase: 'Gate 3', status: 'Complete', due_date: '2026-01-25' }
    ];

    // Sidebar
    function Sidebar() {
      const navItems = [
        { icon: '🏠', label: 'Dashboard', path: 'index.html' },
        { icon: '📊', label: 'Pipeline', path: 'missionpulse-pipeline-v2.html' },
        { icon: '🎯', label: 'War Room', path: 'missionpulse-warroom-v2.html', active: true },
        { icon: '📋', label: 'Swimlane', path: 'missionpulse-swimlane-v2.html' },
        { icon: '🔍', label: 'RFP Shredder', path: 'missionpulse-rfpshredder-v2.html' },
        { icon: '🎭', label: 'Black Hat', path: 'missionpulse-blackhat-v2.html' },
        { icon: '💰', label: 'Pricing', path: 'missionpulse-pricing-v2.html' },
        { icon: '🤖', label: 'Agent Hub', path: 'missionpulse-agenthub-v2.html' }
      ];

      return (
        <div className="w-64 bg-slate-900/50 border-r border-slate-700 min-h-screen p-4 hidden lg:block">
          <div className="flex items-center gap-3 mb-8">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center pulse-icon">
              <span className="text-xl">🛡️</span>
            </div>
            <div>
              <div className="font-bold text-cyan-400">MissionPulse</div>
              <div className="text-xs text-slate-400">War Room</div>
            </div>
          </div>
          
          <nav className="space-y-1">
            {navItems.map((item, i) => (
              <a 
                key={i}
                href={item.path}
                className={`flex items-center gap-3 px-3 py-2 rounded-lg transition-all ${
                  item.active 
                    ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' 
                    : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                }`}
              >
                <span>{item.icon}</span>
                <span className="text-sm">{item.label}</span>
              </a>
            ))}
          </nav>
        </div>
      );
    }

    // Status Badge
    function StatusBadge({ status }) {
      const colors = {
        'Complete': 'bg-emerald-500/20 text-emerald-400',
        'In Progress': 'bg-cyan-500/20 text-cyan-400',
        'Not Started': 'bg-slate-500/20 text-slate-400',
        'Blocked': 'bg-red-500/20 text-red-400'
      };
      return (
        <span className={`px-2 py-0.5 rounded text-xs ${colors[status] || colors['Not Started']}`}>
          {status}
        </span>
      );
    }

    // Threat Badge
    function ThreatBadge({ level }) {
      const colors = {
        'Critical': 'bg-red-500/20 text-red-400 border-red-500/30',
        'High': 'bg-amber-500/20 text-amber-400 border-amber-500/30',
        'Medium': 'bg-blue-500/20 text-blue-400 border-blue-500/30',
        'Low': 'bg-slate-500/20 text-slate-400 border-slate-500/30'
      };
      return (
        <span className={`px-2 py-0.5 rounded text-xs border ${colors[level] || colors['Medium']}`}>
          {level}
        </span>
      );
    }

    function App() {
      const [opp, setOpp] = React.useState(DEMO_OPP);
      const [winThemes, setWinThemes] = React.useState(DEMO_WIN_THEMES);
      const [competitors, setCompetitors] = React.useState(DEMO_COMPETITORS);
      const [tasks, setTasks] = React.useState(DEMO_TASKS);
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [activeTab, setActiveTab] = React.useState('overview');

      React.useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const oppId = params.get('id');
        if (oppId) {
          loadOpportunity(oppId);
        } else {
          setLoading(false);
        }
      }, []);

      const loadOpportunity = async (id) => {
        try {
          // Load opportunity
          const { data: oppData, error: oppError } = await supabase
            .from('opportunities')
            .select('*')
            .eq('id', id)
            .single();
          
          if (!oppError && oppData) {
            setOpp(oppData);
            setConnected(true);

            // Load win themes
            const { data: themes } = await supabase
              .from('win_themes')
              .select('*')
              .eq('opportunity_id', id);
            if (themes?.length) setWinThemes(themes);

            // Load competitors
            const { data: comps } = await supabase
              .from('competitors')
              .select('*')
              .eq('opportunity_id', id);
            if (comps?.length) setCompetitors(comps);

            // Load tasks
            const { data: taskData } = await supabase
              .from('playbook_tasks')
              .select('*')
              .eq('opportunity_id', id)
              .order('due_date', { ascending: true });
            if (taskData?.length) setTasks(taskData);
          }
        } catch (e) {
          console.log('Using demo data');
        }
        setLoading(false);
      };

      const daysUntilDue = opp.due_date ? Math.ceil((new Date(opp.due_date) - new Date()) / (1000 * 60 * 60 * 24)) : null;
      const completedTasks = tasks.filter(t => t.status === 'Complete').length;
      const taskProgress = tasks.length ? Math.round((completedTasks / tasks.length) * 100) : 0;

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center mx-auto mb-4 pulse-icon">
                <span className="text-2xl">🎯</span>
              </div>
              <p className="text-slate-400">Loading War Room...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="flex min-h-screen">
          <Sidebar />
          
          <div className="flex-1 p-4 lg:p-6">
            {/* Header */}
            <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-4 mb-6">
              <div>
                <div className="flex items-center gap-3 mb-1">
                  <a href="missionpulse-pipeline-v2.html" className="text-slate-400 hover:text-white text-sm">← Pipeline</a>
                  <span className="text-slate-600">/</span>
                  <span className="text-cyan-400">{opp.nickname || 'War Room'}</span>
                </div>
                <h1 className="text-2xl font-bold">{opp.title}</h1>
                <p className="text-slate-400 text-sm">{opp.agency} • {opp.contract_vehicle}</p>
              </div>
              
              <div className="flex items-center gap-3">
                <div className={`px-3 py-1.5 rounded-lg text-sm ${
                  connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'
                }`}>
                  {connected ? '● Live' : '○ Demo'}
                </div>
                <a
                  href={`missionpulse-blackhat-v2.html?id=${opp.id}`}
                  className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm"
                >
                  🎭 Black Hat
                </a>
                <a
                  href={`missionpulse-pricing-v2.html?id=${opp.id}`}
                  className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg text-sm font-medium"
                >
                  💰 Pricing
                </a>
              </div>
            </div>

            {/* Key Metrics */}
            <div className="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <div className="text-3xl font-bold text-cyan-400">{opp.pwin}%</div>
                <div className="text-sm text-slate-400">Win Probability</div>
              </div>
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <div className="text-3xl font-bold">${(opp.ceiling / 1000000).toFixed(0)}M</div>
                <div className="text-sm text-slate-400">Contract Value</div>
              </div>
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <div className={`text-3xl font-bold ${daysUntilDue <= 14 ? 'text-red-400' : daysUntilDue <= 30 ? 'text-amber-400' : 'text-emerald-400'}`}>
                  {daysUntilDue}d
                </div>
                <div className="text-sm text-slate-400">Until Due</div>
              </div>
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <div className="text-3xl font-bold">{opp.phase}</div>
                <div className="text-sm text-slate-400">Current Phase</div>
              </div>
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <div className="text-3xl font-bold">{taskProgress}%</div>
                <div className="text-sm text-slate-400">Tasks Complete</div>
                <div className="mt-2 h-1.5 bg-slate-700 rounded-full overflow-hidden">
                  <div className="h-full bg-cyan-500 rounded-full" style={{ width: `${taskProgress}%` }} />
                </div>
              </div>
            </div>

            {/* Tabs */}
            <div className="flex gap-1 mb-6 border-b border-slate-700">
              {['overview', 'themes', 'competitors', 'tasks'].map(tab => (
                <button
                  key={tab}
                  onClick={() => setActiveTab(tab)}
                  className={`px-4 py-2 text-sm font-medium transition-colors ${
                    activeTab === tab 
                      ? 'text-cyan-400 border-b-2 border-cyan-400' 
                      : 'text-slate-400 hover:text-white'
                  }`}
                >
                  {tab.charAt(0).toUpperCase() + tab.slice(1)}
                </button>
              ))}
            </div>

            {/* Tab Content */}
            {activeTab === 'overview' && (
              <div className="grid lg:grid-cols-2 gap-6">
                {/* Details */}
                <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
                  <h3 className="font-semibold mb-4">Opportunity Details</h3>
                  <div className="space-y-3 text-sm">
                    <div className="flex justify-between">
                      <span className="text-slate-400">Set-Aside</span>
                      <span>{opp.set_aside || '—'}</span>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-slate-400">Contract Vehicle</span>
                      <span>{opp.contract_vehicle || '—'}</span>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-slate-400">Incumbent</span>
                      <span>{opp.incumbent || 'Unknown'}</span>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-slate-400">Solicitation #</span>
                      <span className="font-mono text-xs">{opp.solicitation_number || '—'}</span>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-slate-400">Due Date</span>
                      <span>{opp.due_date ? new Date(opp.due_date).toLocaleDateString() : '—'}</span>
                    </div>
                  </div>
                  {opp.description && (
                    <div className="mt-4 pt-4 border-t border-slate-700">
                      <div className="text-slate-400 text-sm mb-2">Description</div>
                      <p className="text-sm">{opp.description}</p>
                    </div>
                  )}
                </div>

                {/* Quick Stats */}
                <div className="space-y-4">
                  <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
                    <h3 className="font-semibold mb-4">Win Theme Summary</h3>
                    <div className="flex items-center gap-4">
                      <div className="text-3xl font-bold text-emerald-400">{winThemes.length}</div>
                      <div>
                        <div className="text-sm">Win Themes</div>
                        <div className="text-xs text-slate-400">{winThemes.filter(t => t.discriminator).length} discriminators</div>
                      </div>
                    </div>
                  </div>
                  <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
                    <h3 className="font-semibold mb-4">Competitive Landscape</h3>
                    <div className="flex items-center gap-4">
                      <div className="text-3xl font-bold text-red-400">{competitors.length}</div>
                      <div>
                        <div className="text-sm">Known Competitors</div>
                        <div className="text-xs text-slate-400">{competitors.filter(c => c.threat_level === 'High' || c.threat_level === 'Critical').length} high threat</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'themes' && (
              <div className="space-y-4">
                {winThemes.map(theme => (
                  <div key={theme.id} className="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
                    <div className="flex items-start justify-between gap-4">
                      <div className="flex-1">
                        <div className="flex items-center gap-2 mb-2">
                          <h3 className="font-semibold">{theme.title}</h3>
                          {theme.discriminator && (
                            <span className="px-2 py-0.5 bg-emerald-500/20 text-emerald-400 text-xs rounded">Discriminator</span>
                          )}
                        </div>
                        <p className="text-sm text-slate-400 mb-3">{theme.description}</p>
                        <div className="flex flex-wrap gap-2">
                          {(theme.proof_points || []).map((pp, i) => (
                            <span key={i} className="px-2 py-1 bg-slate-700 text-xs rounded">
                              ✓ {pp}
                            </span>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
                <button className="w-full p-4 border-2 border-dashed border-slate-700 rounded-xl text-slate-400 hover:border-cyan-500 hover:text-cyan-400 transition-colors">
                  + Add Win Theme
                </button>
              </div>
            )}

            {activeTab === 'competitors' && (
              <div className="space-y-4">
                {competitors.map(comp => (
                  <div key={comp.id} className="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
                    <div className="flex items-start justify-between gap-4 mb-4">
                      <div>
                        <div className="flex items-center gap-2">
                          <h3 className="font-semibold">{comp.name}</h3>
                          {comp.incumbent && (
                            <span className="px-2 py-0.5 bg-amber-500/20 text-amber-400 text-xs rounded">Incumbent</span>
                          )}
                        </div>
                        <div className="text-sm text-slate-400">Estimated pWin: {comp.pwin_estimate}%</div>
                      </div>
                      <ThreatBadge level={comp.threat_level} />
                    </div>
                    <div className="grid sm:grid-cols-2 gap-4">
                      <div>
                        <div className="text-xs text-slate-500 mb-2">Strengths</div>
                        <div className="space-y-1">
                          {(comp.strengths || []).map((s, i) => (
                            <div key={i} className="text-sm text-emerald-400">+ {s}</div>
                          ))}
                        </div>
                      </div>
                      <div>
                        <div className="text-xs text-slate-500 mb-2">Weaknesses</div>
                        <div className="space-y-1">
                          {(comp.weaknesses || []).map((w, i) => (
                            <div key={i} className="text-sm text-red-400">- {w}</div>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
                <button className="w-full p-4 border-2 border-dashed border-slate-700 rounded-xl text-slate-400 hover:border-cyan-500 hover:text-cyan-400 transition-colors">
                  + Add Competitor
                </button>
              </div>
            )}

            {activeTab === 'tasks' && (
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl overflow-hidden">
                <table className="w-full">
                  <thead>
                    <tr className="border-b border-slate-700">
                      <th className="text-left p-4 text-sm text-slate-400 font-medium">Task</th>
                      <th className="text-left p-4 text-sm text-slate-400 font-medium">Phase</th>
                      <th className="text-left p-4 text-sm text-slate-400 font-medium">Due</th>
                      <th className="text-left p-4 text-sm text-slate-400 font-medium">Status</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-700/50">
                    {tasks.map(task => (
                      <tr key={task.id} className="hover:bg-slate-800/30">
                        <td className="p-4 font-medium">{task.task_name}</td>
                        <td className="p-4 text-sm text-slate-400">{task.phase}</td>
                        <td className="p-4 text-sm">{task.due_date ? new Date(task.due_date).toLocaleDateString() : '—'}</td>
                        <td className="p-4"><StatusBadge status={task.status} /></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}

            {/* Footer */}
            <div className="mt-8 text-center text-xs text-slate-500">
              <div>Mission Meets Tech | MissionPulse War Room</div>
              <div className="mt-1">AI GENERATED - REQUIRES HUMAN REVIEW</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
