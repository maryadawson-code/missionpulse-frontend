<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Audit Log</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --mmt-cyan: #00E5FA; --mmt-navy: #00050F; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--mmt-navy); color: #e2e8f0; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

const CONFIG = {
  SUPABASE_URL: 'https://qdrtpnpnhkxvfmvfziop.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8',
  LOGIN_PAGE: 'login.html',
  ALLOWED_ROLES: ['CEO', 'COO', 'Admin']
};

const DEMO_LOGS = [
  { id: 1, timestamp: '2026-01-30T14:32:15Z', user: 'Mary Womack', role: 'CEO', action: 'LOGIN', module: 'Auth', details: 'Successful login from 192.168.1.100', severity: 'info' },
  { id: 2, timestamp: '2026-01-30T14:35:22Z', user: 'Jennifer Park', role: 'FIN', action: 'VIEW', module: 'Pricing', details: 'Accessed BOE for VA EHR Modernization', severity: 'info' },
  { id: 3, timestamp: '2026-01-30T14:38:45Z', user: 'Michael Torres', role: 'CAP', action: 'EDIT', module: 'Black Hat', details: 'Updated competitor analysis for Leidos', severity: 'warning' },
  { id: 4, timestamp: '2026-01-30T14:42:18Z', user: 'External Partner', role: 'Partner', action: 'ACCESS_DENIED', module: 'Pricing', details: 'Attempted access to restricted module', severity: 'error' },
  { id: 5, timestamp: '2026-01-30T14:45:00Z', user: 'Lisa Martinez', role: 'PM', action: 'EXPORT', module: 'Compliance', details: 'Exported compliance matrix to PDF', severity: 'info' },
  { id: 6, timestamp: '2026-01-30T14:48:33Z', user: 'System', role: 'Admin', action: 'AUTO_REVOKE', module: 'Frenemy', details: 'Partner access revoked post-submission', severity: 'warning' }
];

function checkAuth() {
  const session = localStorage.getItem('MP_SESSION');
  if (!session) { window.location.href = CONFIG.LOGIN_PAGE; return null; }
  try { 
    const user = JSON.parse(localStorage.getItem('MP_USER'));
    if (!CONFIG.ALLOWED_ROLES.includes(user.role)) {
      window.location.href = 'missionpulse-dashboard-v3.html';
      return null;
    }
    return user;
  }
  catch { return { email: 'demo@mmt.com', role: 'Admin', name: 'Demo User' }; }
}

function LogRow({ log }) {
  const severityColors = { info: 'text-blue-400', warning: 'text-amber-400', error: 'text-red-400' };
  const actionColors = { LOGIN: 'bg-green-500/20 text-green-400', VIEW: 'bg-blue-500/20 text-blue-400', EDIT: 'bg-amber-500/20 text-amber-400', EXPORT: 'bg-purple-500/20 text-purple-400', ACCESS_DENIED: 'bg-red-500/20 text-red-400', AUTO_REVOKE: 'bg-orange-500/20 text-orange-400' };
  
  return (
    <tr className="border-b border-slate-700/50 hover:bg-slate-800/30">
      <td className="py-3 px-4 font-mono text-xs text-slate-400">{new Date(log.timestamp).toLocaleString()}</td>
      <td className="py-3 px-4"><span className="text-white">{log.user}</span><span className="text-xs text-slate-500 ml-2">({log.role})</span></td>
      <td className="py-3 px-4"><span className={`px-2 py-1 rounded text-xs ${actionColors[log.action] || 'bg-slate-600 text-slate-300'}`}>{log.action}</span></td>
      <td className="py-3 px-4 text-slate-400">{log.module}</td>
      <td className="py-3 px-4 text-sm text-slate-300">{log.details}</td>
      <td className="py-3 px-4"><span className={`text-sm ${severityColors[log.severity]}`}>●</span></td>
    </tr>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [logs, setLogs] = useState(DEMO_LOGS);
  const [filter, setFilter] = useState('all');

  useEffect(() => {
    const authUser = checkAuth();
    if (authUser) setUser(authUser);
  }, []);

  const filtered = filter === 'all' ? logs : logs.filter(l => l.severity === filter);
  const stats = { total: logs.length, info: logs.filter(l => l.severity === 'info').length, warning: logs.filter(l => l.severity === 'warning').length, error: logs.filter(l => l.severity === 'error').length };

  if (!user) return <div className="min-h-screen flex items-center justify-center text-cyan-400">Verifying admin access...</div>;

  return (
    <div className="min-h-screen bg-slate-950">
      <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            </a>
            <div>
              <h1 className="text-xl font-bold text-white flex items-center gap-2">📋 Audit Log <span className="px-2 py-0.5 bg-slate-600 text-xs rounded">ADMIN</span></h1>
              <p className="text-sm text-slate-400">CMMC 2.0 Compliance Audit Trail</p>
            </div>
          </div>
          <button className="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm">Export CSV</button>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-6 space-y-6">
        <div className="grid grid-cols-4 gap-4">
          <div className="glass rounded-xl p-4 text-center"><p className="text-3xl font-bold text-white">{stats.total}</p><p className="text-sm text-slate-400">Total Events</p></div>
          <div className="glass rounded-xl p-4 text-center cursor-pointer hover:border-blue-500/50" onClick={() => setFilter('info')}><p className="text-3xl font-bold text-blue-400">{stats.info}</p><p className="text-sm text-slate-400">Info</p></div>
          <div className="glass rounded-xl p-4 text-center cursor-pointer hover:border-amber-500/50" onClick={() => setFilter('warning')}><p className="text-3xl font-bold text-amber-400">{stats.warning}</p><p className="text-sm text-slate-400">Warnings</p></div>
          <div className="glass rounded-xl p-4 text-center cursor-pointer hover:border-red-500/50" onClick={() => setFilter('error')}><p className="text-3xl font-bold text-red-400">{stats.error}</p><p className="text-sm text-slate-400">Errors</p></div>
        </div>

        <div className="flex gap-2">
          {['all', 'info', 'warning', 'error'].map(f => (
            <button key={f} onClick={() => setFilter(f)} className={`px-3 py-1.5 rounded-lg text-sm ${filter === f ? 'bg-cyan-600 text-white' : 'bg-slate-800 text-slate-400'}`}>{f === 'all' ? 'All' : f.charAt(0).toUpperCase() + f.slice(1)}</button>
          ))}
        </div>

        <div className="glass rounded-xl overflow-hidden">
          <table className="w-full">
            <thead className="bg-slate-800/50">
              <tr>
                <th className="py-3 px-4 text-left text-sm font-medium text-slate-400">Timestamp</th>
                <th className="py-3 px-4 text-left text-sm font-medium text-slate-400">User</th>
                <th className="py-3 px-4 text-left text-sm font-medium text-slate-400">Action</th>
                <th className="py-3 px-4 text-left text-sm font-medium text-slate-400">Module</th>
                <th className="py-3 px-4 text-left text-sm font-medium text-slate-400">Details</th>
                <th className="py-3 px-4 text-left text-sm font-medium text-slate-400">Sev</th>
              </tr>
            </thead>
            <tbody>{filtered.map(log => <LogRow key={log.id} log={log} />)}</tbody>
          </table>
        </div>
      </main>

      <footer className="border-t border-slate-800 mt-12">
        <div className="max-w-7xl mx-auto px-4 py-4 text-center text-xs text-slate-500">Mission Meets Tech © 2026 | MissionPulse v3.0 | Audit Module</div>
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
