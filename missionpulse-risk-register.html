<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risk Register | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
    .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
    .cyan-glow { box-shadow: 0 0 30px rgba(0,229,250,0.15); }
    .risk-critical { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.5); }
    .risk-high { background: rgba(249,115,22,0.2); border-color: rgba(249,115,22,0.5); }
    .risk-medium { background: rgba(234,179,8,0.2); border-color: rgba(234,179,8,0.5); }
    .risk-low { background: rgba(34,197,94,0.2); border-color: rgba(34,197,94,0.5); }
  </style>
</head>
<body class="text-white">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    
    const supabaseUrl = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc4NTU0NjIsImV4cCI6MjA1MzQzMTQ2Mn0.Xj4_wfgnHdegN2jBcMh1cTBfvZhQxuF8FPxcE-krcHY';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const PROBABILITY_VALUES = { 'Very Low': 1, 'Low': 2, 'Medium': 3, 'High': 4, 'Very High': 5 };
    const IMPACT_VALUES = { 'Very Low': 1, 'Low': 2, 'Medium': 3, 'High': 4, 'Very High': 5 };

    const DEMO_RISKS = [
      { id: '1', risk_number: 'R-001', risk_title: 'Key Personnel Availability', risk_description: 'Proposed Program Manager may not be available for contract start date due to current contract extension', risk_category: 'Programmatic', probability: 'Medium', impact: 'High', risk_score: 12, status: 'Mitigating', mitigation_strategy: 'Identify backup PM candidate with similar qualifications; negotiate early release date', contingency_plan: 'Propose interim PM for first 30 days if needed', owner: 'Sarah Chen', identified_date: '2026-01-15', target_resolution_date: '2026-02-10' },
      { id: '2', risk_number: 'R-002', risk_title: 'Subcontractor Past Performance', risk_description: 'Primary subcontractor has limited direct federal healthcare IT experience', risk_category: 'Technical', probability: 'Low', impact: 'High', risk_score: 8, status: 'Open', mitigation_strategy: 'Emphasize prime contractor oversight and mentoring plan in proposal', contingency_plan: 'Identify alternative subcontractor with stronger past performance', owner: 'Mike Torres', identified_date: '2026-01-18', target_resolution_date: '2026-02-05' },
      { id: '3', risk_number: 'R-003', risk_title: 'Price Competitiveness', risk_description: 'Fully burdened labor rates may exceed competitor pricing in LPTA evaluation', risk_category: 'Cost', probability: 'High', impact: 'Very High', risk_score: 20, status: 'Mitigating', mitigation_strategy: 'Review wrap rates with finance; consider lower-cost labor mix; negotiate subcontractor rates', contingency_plan: 'Reduce proposed profit margin if needed to meet price targets', owner: 'Finance Team', identified_date: '2026-01-20', target_resolution_date: '2026-02-08' },
      { id: '4', risk_number: 'R-004', risk_title: 'Technical Solution Complexity', risk_description: 'Proposed AI/ML integration may exceed page limits to adequately describe', risk_category: 'Technical', probability: 'Medium', impact: 'Medium', risk_score: 9, status: 'Open', mitigation_strategy: 'Use graphics and diagrams to convey complex concepts; leverage appendices if allowed', contingency_plan: 'Simplify solution description; provide detailed implementation plan post-award', owner: 'Sarah Chen', identified_date: '2026-01-22', target_resolution_date: '2026-02-12' },
      { id: '5', risk_number: 'R-005', risk_title: 'OCI Determination', risk_description: 'Prior advisory work on similar program may trigger OCI concerns', risk_category: 'Programmatic', probability: 'Low', impact: 'Very High', risk_score: 10, status: 'Closed', mitigation_strategy: 'Proactively disclose prior work; propose mitigation plan in proposal', contingency_plan: 'Seek CO determination before proposal submission', owner: 'Compliance Team', identified_date: '2026-01-10', target_resolution_date: '2026-01-25', actual_resolution_date: '2026-01-24' },
      { id: '6', risk_number: 'R-006', risk_title: 'Proposal Schedule Compression', risk_description: 'Amendment 3 shortened proposal due date by 5 days', risk_category: 'Schedule', probability: 'High', impact: 'Medium', risk_score: 12, status: 'Accepted', mitigation_strategy: 'Increase writer bandwidth; prioritize critical sections; daily status reviews', contingency_plan: 'Request extension if critical issues arise', owner: 'Lisa Park', identified_date: '2026-01-28', target_resolution_date: '2026-02-15' },
    ];

    function RiskRegister() {
      const [risks, setRisks] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filter, setFilter] = useState('All');
      const [categoryFilter, setCategoryFilter] = useState('All');
      const [showModal, setShowModal] = useState(false);
      const [selectedRisk, setSelectedRisk] = useState(null);
      const [viewMode, setViewMode] = useState('table'); // table or matrix

      useEffect(() => {
        loadRisks();
      }, []);

      async function loadRisks() {
        try {
          const { data, error } = await supabase.from('risk_register').select('*').order('risk_score', { ascending: false });
          if (error) throw error;
          setRisks(data?.length ? data : DEMO_RISKS);
        } catch (err) {
          console.log('Using demo data:', err.message);
          setRisks(DEMO_RISKS);
        } finally {
          setLoading(false);
        }
      }

      const filteredRisks = risks.filter(r => {
        const matchesStatus = filter === 'All' || r.status === filter;
        const matchesCategory = categoryFilter === 'All' || r.risk_category === categoryFilter;
        return matchesStatus && matchesCategory;
      });

      const stats = {
        total: risks.length,
        critical: risks.filter(r => r.risk_score >= 15).length,
        open: risks.filter(r => r.status === 'Open').length,
        mitigating: risks.filter(r => r.status === 'Mitigating').length,
        closed: risks.filter(r => r.status === 'Closed').length,
      };

      const getRiskLevel = (score) => {
        if (score >= 15) return { level: 'Critical', class: 'risk-critical', color: 'text-red-400' };
        if (score >= 10) return { level: 'High', class: 'risk-high', color: 'text-orange-400' };
        if (score >= 5) return { level: 'Medium', class: 'risk-medium', color: 'text-yellow-400' };
        return { level: 'Low', class: 'risk-low', color: 'text-green-400' };
      };

      const getStatusColor = (status) => {
        const colors = { 'Open': 'bg-red-500/20 text-red-400', 'Mitigating': 'bg-yellow-500/20 text-yellow-400', 'Accepted': 'bg-blue-500/20 text-blue-400', 'Closed': 'bg-green-500/20 text-green-400' };
        return colors[status] || 'bg-gray-500/20 text-gray-400';
      };

      const getCategoryIcon = (category) => {
        const icons = { 'Technical': '⚙️', 'Schedule': '📅', 'Cost': '💰', 'Programmatic': '📋', 'External': '🌐' };
        return icons[category] || '⚠️';
      };

      // Risk Matrix Component
      const RiskMatrix = () => {
        const matrix = [];
        const probLevels = ['Very High', 'High', 'Medium', 'Low', 'Very Low'];
        const impactLevels = ['Very Low', 'Low', 'Medium', 'High', 'Very High'];
        
        return (
          <div className="glass-card rounded-2xl p-6 cyan-glow">
            <h3 className="text-lg font-semibold mb-4">Risk Heat Map</h3>
            <div className="flex">
              <div className="flex flex-col justify-around pr-2 text-xs text-gray-400" style={{ writingMode: 'vertical-rl', transform: 'rotate(180deg)' }}>
                <span>Probability</span>
              </div>
              <div className="flex-1">
                <div className="grid grid-cols-6 gap-1">
                  <div></div>
                  {impactLevels.map(imp => (
                    <div key={imp} className="text-xs text-gray-400 text-center py-1">{imp}</div>
                  ))}
                  {probLevels.map((prob, pi) => (
                    <>
                      <div key={`prob-${prob}`} className="text-xs text-gray-400 text-right pr-2 flex items-center justify-end">{prob}</div>
                      {impactLevels.map((imp, ii) => {
                        const score = (5 - pi) * (ii + 1);
                        const riskLevel = getRiskLevel(score);
                        const risksInCell = risks.filter(r => r.probability === prob && r.impact === imp && r.status !== 'Closed');
                        return (
                          <div 
                            key={`${prob}-${imp}`} 
                            className={`aspect-square rounded flex items-center justify-center text-xs font-bold ${riskLevel.class} border`}
                          >
                            {risksInCell.length > 0 && (
                              <span className="text-white">{risksInCell.length}</span>
                            )}
                          </div>
                        );
                      })}
                    </>
                  ))}
                </div>
                <div className="text-xs text-gray-400 text-center mt-2">Impact</div>
              </div>
            </div>
            <div className="flex justify-center gap-4 mt-4 text-xs">
              <span className="flex items-center"><span className="w-3 h-3 rounded bg-green-500/50 mr-1"></span>Low (1-4)</span>
              <span className="flex items-center"><span className="w-3 h-3 rounded bg-yellow-500/50 mr-1"></span>Medium (5-9)</span>
              <span className="flex items-center"><span className="w-3 h-3 rounded bg-orange-500/50 mr-1"></span>High (10-14)</span>
              <span className="flex items-center"><span className="w-3 h-3 rounded bg-red-500/50 mr-1"></span>Critical (15+)</span>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen p-6">
          {/* Header */}
          <div className="flex items-center justify-between mb-8">
            <div className="flex items-center space-x-4">
              <a href="index.html" className="text-gray-400 hover:text-cyan-400 transition">← Back</a>
              <div>
                <h1 className="text-3xl font-bold text-white">Risk Register</h1>
                <p className="text-gray-400">Identify, assess, and mitigate proposal risks</p>
              </div>
            </div>
            <div className="flex items-center space-x-3">
              <div className="flex bg-gray-800/50 rounded-lg p-1">
                <button 
                  onClick={() => setViewMode('table')}
                  className={`px-4 py-2 rounded-lg text-sm font-medium transition ${viewMode === 'table' ? 'bg-cyan-500/20 text-cyan-400' : 'text-gray-400'}`}
                >
                  Table
                </button>
                <button 
                  onClick={() => setViewMode('matrix')}
                  className={`px-4 py-2 rounded-lg text-sm font-medium transition ${viewMode === 'matrix' ? 'bg-cyan-500/20 text-cyan-400' : 'text-gray-400'}`}
                >
                  Matrix
                </button>
              </div>
              <button onClick={() => { setSelectedRisk(null); setShowModal(true); }} className="px-6 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-xl font-semibold hover:opacity-90 transition">
                + Add Risk
              </button>
            </div>
          </div>

          {/* Stats */}
          <div className="grid grid-cols-5 gap-4 mb-8">
            {[
              { label: 'Total Risks', value: stats.total, color: 'cyan' },
              { label: 'Critical', value: stats.critical, color: 'red' },
              { label: 'Open', value: stats.open, color: 'orange' },
              { label: 'Mitigating', value: stats.mitigating, color: 'yellow' },
              { label: 'Closed', value: stats.closed, color: 'green' },
            ].map((stat, i) => (
              <div key={i} className="glass-card rounded-xl p-4 text-center">
                <div className={`text-3xl font-bold text-${stat.color}-400`}>{stat.value}</div>
                <div className="text-gray-400 text-sm">{stat.label}</div>
              </div>
            ))}
          </div>

          {viewMode === 'matrix' && <div className="mb-8"><RiskMatrix /></div>}

          {/* Filters */}
          <div className="flex space-x-4 mb-6">
            <div className="flex space-x-2">
              {['All', 'Open', 'Mitigating', 'Accepted', 'Closed'].map((f) => (
                <button key={f} onClick={() => setFilter(f)} className={`px-4 py-2 rounded-lg font-medium transition ${filter === f ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/50' : 'bg-gray-800/50 text-gray-400 hover:bg-gray-700/50'}`}>
                  {f}
                </button>
              ))}
            </div>
            <select 
              value={categoryFilter} 
              onChange={(e) => setCategoryFilter(e.target.value)}
              className="px-4 py-2 bg-gray-800/50 border border-gray-700 rounded-lg text-white"
            >
              <option value="All">All Categories</option>
              <option value="Technical">Technical</option>
              <option value="Schedule">Schedule</option>
              <option value="Cost">Cost</option>
              <option value="Programmatic">Programmatic</option>
              <option value="External">External</option>
            </select>
          </div>

          {/* Risks Table */}
          <div className="glass-card rounded-2xl overflow-hidden">
            <table className="w-full">
              <thead className="bg-gray-900/50">
                <tr className="text-left text-gray-400 text-sm">
                  <th className="p-4">Risk #</th>
                  <th className="p-4">Risk</th>
                  <th className="p-4">Category</th>
                  <th className="p-4">P × I</th>
                  <th className="p-4">Score</th>
                  <th className="p-4">Owner</th>
                  <th className="p-4">Status</th>
                  <th className="p-4">Actions</th>
                </tr>
              </thead>
              <tbody>
                {loading ? (
                  <tr><td colSpan="8" className="p-8 text-center text-gray-400">Loading...</td></tr>
                ) : filteredRisks.map((risk) => {
                  const riskLevel = getRiskLevel(risk.risk_score);
                  return (
                    <tr key={risk.id} className="border-t border-gray-800/50 hover:bg-gray-800/30 transition">
                      <td className="p-4 font-mono text-cyan-400">{risk.risk_number}</td>
                      <td className="p-4">
                        <div className="font-medium text-white">{risk.risk_title}</div>
                        <div className="text-sm text-gray-400 truncate max-w-md">{risk.risk_description}</div>
                      </td>
                      <td className="p-4">
                        <span className="flex items-center space-x-2">
                          <span>{getCategoryIcon(risk.risk_category)}</span>
                          <span className="text-gray-300">{risk.risk_category}</span>
                        </span>
                      </td>
                      <td className="p-4 text-sm text-gray-400">
                        {risk.probability} × {risk.impact}
                      </td>
                      <td className="p-4">
                        <span className={`px-3 py-1 rounded-full text-sm font-bold ${riskLevel.class} border`}>
                          {risk.risk_score}
                        </span>
                      </td>
                      <td className="p-4 text-gray-300">{risk.owner}</td>
                      <td className="p-4">
                        <span className={`px-3 py-1 rounded-full text-sm font-medium ${getStatusColor(risk.status)}`}>
                          {risk.status}
                        </span>
                      </td>
                      <td className="p-4">
                        <button onClick={() => { setSelectedRisk(risk); setShowModal(true); }} className="text-cyan-400 hover:text-cyan-300 transition">
                          View
                        </button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
              <div className="glass-card rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                <div className="p-6 border-b border-gray-800">
                  <div className="flex items-center justify-between">
                    <h2 className="text-xl font-bold">{selectedRisk ? `${selectedRisk.risk_number}: ${selectedRisk.risk_title}` : 'Add New Risk'}</h2>
                    <button onClick={() => setShowModal(false)} className="text-gray-400 hover:text-white text-2xl">&times;</button>
                  </div>
                </div>
                <div className="p-6 space-y-4">
                  {selectedRisk ? (
                    <>
                      <div className="flex items-center space-x-3 mb-4">
                        <span className={`px-3 py-1 rounded-full text-sm font-bold ${getRiskLevel(selectedRisk.risk_score).class} border`}>
                          Score: {selectedRisk.risk_score}
                        </span>
                        <span className={`px-3 py-1 rounded-full text-sm ${getStatusColor(selectedRisk.status)}`}>
                          {selectedRisk.status}
                        </span>
                      </div>
                      <div>
                        <label className="text-gray-400 text-sm">Description</label>
                        <p className="text-white mt-1">{selectedRisk.risk_description}</p>
                      </div>
                      <div className="grid grid-cols-3 gap-4">
                        <div>
                          <label className="text-gray-400 text-sm">Category</label>
                          <p className="text-white">{getCategoryIcon(selectedRisk.risk_category)} {selectedRisk.risk_category}</p>
                        </div>
                        <div>
                          <label className="text-gray-400 text-sm">Probability</label>
                          <p className="text-white">{selectedRisk.probability}</p>
                        </div>
                        <div>
                          <label className="text-gray-400 text-sm">Impact</label>
                          <p className="text-white">{selectedRisk.impact}</p>
                        </div>
                      </div>
                      <div>
                        <label className="text-gray-400 text-sm">Mitigation Strategy</label>
                        <p className="text-white mt-1">{selectedRisk.mitigation_strategy}</p>
                      </div>
                      <div>
                        <label className="text-gray-400 text-sm">Contingency Plan</label>
                        <p className="text-white mt-1">{selectedRisk.contingency_plan}</p>
                      </div>
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="text-gray-400 text-sm">Owner</label>
                          <p className="text-white">{selectedRisk.owner}</p>
                        </div>
                        <div>
                          <label className="text-gray-400 text-sm">Target Resolution</label>
                          <p className="text-white">{new Date(selectedRisk.target_resolution_date).toLocaleDateString()}</p>
                        </div>
                      </div>
                      <div className="flex space-x-3 pt-4">
                        <button className="flex-1 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-xl font-semibold hover:opacity-90 transition">Edit Risk</button>
                        <button className="px-6 py-3 bg-green-600/20 text-green-400 border border-green-500/50 rounded-xl font-semibold hover:bg-green-600/30 transition">Close Risk</button>
                      </div>
                    </>
                  ) : (
                    <div className="space-y-4">
                      <input type="text" placeholder="Risk Title" className="w-full p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white" />
                      <textarea placeholder="Risk Description" className="w-full p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white" rows="2"></textarea>
                      <div className="grid grid-cols-3 gap-4">
                        <select className="p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white">
                          <option>Category</option>
                          <option>Technical</option>
                          <option>Schedule</option>
                          <option>Cost</option>
                          <option>Programmatic</option>
                          <option>External</option>
                        </select>
                        <select className="p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white">
                          <option>Probability</option>
                          <option>Very Low</option>
                          <option>Low</option>
                          <option>Medium</option>
                          <option>High</option>
                          <option>Very High</option>
                        </select>
                        <select className="p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white">
                          <option>Impact</option>
                          <option>Very Low</option>
                          <option>Low</option>
                          <option>Medium</option>
                          <option>High</option>
                          <option>Very High</option>
                        </select>
                      </div>
                      <textarea placeholder="Mitigation Strategy" className="w-full p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white" rows="2"></textarea>
                      <textarea placeholder="Contingency Plan" className="w-full p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white" rows="2"></textarea>
                      <div className="grid grid-cols-2 gap-4">
                        <select className="p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white">
                          <option>Risk Owner</option>
                          <option>Sarah Chen</option>
                          <option>Mike Torres</option>
                          <option>Lisa Park</option>
                          <option>Finance Team</option>
                          <option>Compliance Team</option>
                        </select>
                        <input type="date" placeholder="Target Resolution" className="p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white" />
                      </div>
                      <button className="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-xl font-semibold hover:opacity-90 transition">Add Risk</button>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<RiskRegister />, document.getElementById('root'));
  </script>
</body>
</html>
