<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Base | MissionPulse</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass { background: rgba(0,229,250,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
    .glass-card { background: rgba(15,23,42,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(51,65,85,0.5); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const DEMO_ARTICLES = [
      { id: '1', title: 'Winning with AI-First Messaging in Healthcare', category: 'strategy', tags: ['AI', 'Healthcare', 'Messaging'], author: 'Mary Womack', date: '2025-01-20', views: 156, likes: 24, excerpt: 'How positioning AI capabilities as mission-critical rather than nice-to-have transformed our win rate in DHA opportunities.', source: 'debrief', sourceId: 'DoD Health Data Platform' },
      { id: '2', title: 'CMMC Level 2: Lessons from Our Certification Journey', category: 'compliance', tags: ['CMMC', 'Compliance', 'Security'], author: 'Amanda Foster', date: '2025-01-15', views: 243, likes: 41, excerpt: 'Step-by-step guide based on our experience achieving CMMC Level 2 certification, including common pitfalls to avoid.' },
      { id: '3', title: 'Effective Price-to-Win Strategies for LPTA Contracts', category: 'pricing', tags: ['Pricing', 'LPTA', 'Strategy'], author: 'Jennifer Taylor', date: '2025-01-10', views: 189, likes: 33, excerpt: 'Balancing competitive pricing with sustainable margins in lowest-price technically acceptable procurements.' },
      { id: '4', title: 'Building Strong Teaming Arrangements', category: 'partners', tags: ['Teaming', 'Partners', 'SDVOSB'], author: 'Michael Johnson', date: '2025-01-08', views: 98, likes: 18, excerpt: 'Best practices for structuring teaming agreements that maximize small business participation and past performance benefits.' },
      { id: '5', title: 'Technical Volume Best Practices: Cloud-Native Solutions', category: 'technical', tags: ['Technical', 'Cloud', 'Architecture'], author: 'Dr. Sarah Chen', date: '2025-01-05', views: 312, likes: 52, excerpt: 'Framework for presenting cloud-native architectures that resonate with government evaluators.' },
      { id: '6', title: 'Capture Intelligence: Gathering and Using CI Effectively', category: 'strategy', tags: ['Capture', 'Intelligence', 'Competition'], author: 'Michael Johnson', date: '2024-12-28', views: 178, likes: 29, excerpt: 'Ethical approaches to competitive intelligence gathering that inform winning strategies.' },
      { id: '7', title: 'Past Performance Narratives That Win', category: 'writing', tags: ['Past Performance', 'Writing', 'Narratives'], author: 'Lisa Rodriguez', date: '2024-12-20', views: 267, likes: 44, excerpt: 'Crafting past performance stories that demonstrate relevance, recency, and results.' },
      { id: '8', title: 'FedRAMP Authorization: What We Learned', category: 'compliance', tags: ['FedRAMP', 'Cloud', 'Compliance'], author: 'David Kim', date: '2024-12-15', views: 203, likes: 37, excerpt: 'Insights from achieving FedRAMP Moderate authorization for our AI platform.' }
    ];

    const CATEGORIES = [
      { id: 'strategy', name: 'Strategy', icon: '🎯', color: 'amber' },
      { id: 'compliance', name: 'Compliance', icon: '🛡️', color: 'purple' },
      { id: 'pricing', name: 'Pricing', icon: '💰', color: 'emerald' },
      { id: 'partners', name: 'Partners', icon: '🤝', color: 'pink' },
      { id: 'technical', name: 'Technical', icon: '⚙️', color: 'cyan' },
      { id: 'writing', name: 'Writing', icon: '✍️', color: 'blue' }
    ];

    const Icons = {
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
      book: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>,
      plus: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>,
      shield: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
      x: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>,
      search: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
      eye: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>,
      heart: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    const Badge = ({ children, variant = 'default' }) => {
      const variants = {
        default: 'bg-slate-700 text-slate-300',
        amber: 'bg-amber-500/20 text-amber-400',
        purple: 'bg-purple-500/20 text-purple-400',
        emerald: 'bg-emerald-500/20 text-emerald-400',
        pink: 'bg-pink-500/20 text-pink-400',
        cyan: 'bg-cyan-500/20 text-cyan-400',
        blue: 'bg-blue-500/20 text-blue-400'
      };
      return <span className={`px-2 py-1 rounded-full text-xs font-medium ${variants[variant]}`}>{children}</span>;
    };

    function KnowledgeBase() {
      const [articles, setArticles] = useState(DEMO_ARTICLES);
      const [search, setSearch] = useState('');
      const [filterCategory, setFilterCategory] = useState('all');
      const [selectedArticle, setSelectedArticle] = useState(null);

      const filteredArticles = useMemo(() => {
        return articles.filter(a => {
          const matchSearch = a.title.toLowerCase().includes(search.toLowerCase()) ||
                             a.excerpt.toLowerCase().includes(search.toLowerCase()) ||
                             a.tags.some(t => t.toLowerCase().includes(search.toLowerCase()));
          const matchCategory = filterCategory === 'all' || a.category === filterCategory;
          return matchSearch && matchCategory;
        });
      }, [articles, search, filterCategory]);

      const stats = {
        total: articles.length,
        totalViews: articles.reduce((sum, a) => sum + a.views, 0),
        totalLikes: articles.reduce((sum, a) => sum + a.likes, 0)
      };

      const getCategoryConfig = (categoryId) => CATEGORIES.find(c => c.id === categoryId) || CATEGORIES[0];

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="p-2 rounded-lg bg-slate-800/50 hover:bg-slate-700/50 transition-colors">
                    <Icon name="home" className="w-5 h-5 text-slate-400" />
                  </a>
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-teal-500 to-emerald-500 flex items-center justify-center">
                      <Icon name="book" className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white">Knowledge Base</h1>
                      <p className="text-sm text-slate-400">Lessons learned & best practices</p>
                    </div>
                  </div>
                </div>
                <button className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-xl flex items-center gap-2 font-semibold hover:from-cyan-400 hover:to-teal-400 transition-all">
                  <Icon name="plus" className="w-4 h-4" /> New Article
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8">
            {/* Search & Stats */}
            <div className="grid grid-cols-4 gap-4 mb-8">
              <div className="col-span-2 glass-card rounded-xl p-4">
                <div className="relative">
                  <Icon name="search" className="w-5 h-5 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" />
                  <input
                    type="text"
                    placeholder="Search articles, tags, or topics..."
                    value={search}
                    onChange={(e) => setSearch(e.target.value)}
                    className="w-full bg-slate-800/50 border border-slate-700/50 rounded-lg pl-10 pr-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500/50"
                  />
                </div>
              </div>
              {[
                { label: 'Articles', value: stats.total, icon: 'book', color: 'emerald' },
                { label: 'Total Views', value: stats.totalViews.toLocaleString(), icon: 'eye', color: 'cyan' }
              ].map((stat, i) => (
                <div key={i} className="glass-card rounded-xl p-4">
                  <div className="flex items-center gap-3">
                    <div className={`w-10 h-10 rounded-lg bg-${stat.color}-500/20 flex items-center justify-center`}>
                      <Icon name={stat.icon} className={`w-5 h-5 text-${stat.color}-400`} />
                    </div>
                    <div>
                      <div className="text-2xl font-bold text-white">{stat.value}</div>
                      <div className="text-xs text-slate-400">{stat.label}</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            <div className="grid grid-cols-4 gap-6">
              {/* Categories Sidebar */}
              <div className="col-span-1">
                <div className="glass-card rounded-xl p-4 sticky top-24">
                  <h3 className="text-sm font-semibold text-slate-400 mb-3">CATEGORIES</h3>
                  <div className="space-y-1">
                    <button
                      onClick={() => setFilterCategory('all')}
                      className={`w-full px-3 py-2 rounded-lg text-left text-sm transition flex items-center justify-between ${filterCategory === 'all' ? 'bg-cyan-500/20 text-cyan-400' : 'text-slate-400 hover:bg-slate-700/50'}`}
                    >
                      <span>📚 All Articles</span>
                      <span className="text-xs">{articles.length}</span>
                    </button>
                    {CATEGORIES.map(cat => (
                      <button
                        key={cat.id}
                        onClick={() => setFilterCategory(cat.id)}
                        className={`w-full px-3 py-2 rounded-lg text-left text-sm transition flex items-center justify-between ${filterCategory === cat.id ? 'bg-cyan-500/20 text-cyan-400' : 'text-slate-400 hover:bg-slate-700/50'}`}
                      >
                        <span>{cat.icon} {cat.name}</span>
                        <span className="text-xs">{articles.filter(a => a.category === cat.id).length}</span>
                      </button>
                    ))}
                  </div>

                  <div className="mt-6 pt-4 border-t border-slate-700/50">
                    <h3 className="text-sm font-semibold text-slate-400 mb-3">POPULAR TAGS</h3>
                    <div className="flex flex-wrap gap-1">
                      {['AI', 'Healthcare', 'CMMC', 'Pricing', 'Cloud'].map(tag => (
                        <span 
                          key={tag}
                          onClick={() => setSearch(tag)}
                          className="px-2 py-1 bg-slate-800/50 text-slate-400 text-xs rounded cursor-pointer hover:bg-cyan-500/20 hover:text-cyan-400 transition"
                        >
                          #{tag}
                        </span>
                      ))}
                    </div>
                  </div>
                </div>
              </div>

              {/* Articles List */}
              <div className="col-span-3 space-y-4">
                {filteredArticles.map(article => {
                  const catConfig = getCategoryConfig(article.category);
                  return (
                    <div 
                      key={article.id}
                      onClick={() => setSelectedArticle(article)}
                      className="glass-card rounded-xl p-5 hover:border-cyan-500/30 transition-all cursor-pointer"
                    >
                      <div className="flex items-start gap-4">
                        <div className={`w-12 h-12 rounded-xl bg-${catConfig.color}-500/20 flex items-center justify-center text-2xl flex-shrink-0`}>
                          {catConfig.icon}
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2 mb-2">
                            <Badge variant={catConfig.color}>{catConfig.name}</Badge>
                            {article.source && (
                              <Badge variant="default">From Debrief</Badge>
                            )}
                          </div>
                          <h3 className="text-lg font-semibold text-white mb-1">{article.title}</h3>
                          <p className="text-sm text-slate-400 mb-3 line-clamp-2">{article.excerpt}</p>
                          <div className="flex items-center gap-4 text-xs text-slate-500">
                            <span>{article.author}</span>
                            <span>•</span>
                            <span>{article.date}</span>
                            <span>•</span>
                            <span className="flex items-center gap-1">
                              <Icon name="eye" className="w-3 h-3" /> {article.views}
                            </span>
                            <span className="flex items-center gap-1">
                              <Icon name="heart" className="w-3 h-3" /> {article.likes}
                            </span>
                          </div>
                        </div>
                      </div>
                      <div className="flex flex-wrap gap-1 mt-3 pt-3 border-t border-slate-700/50">
                        {article.tags.map((tag, i) => (
                          <span key={i} className="px-2 py-0.5 bg-slate-800/50 text-slate-500 text-xs rounded">
                            #{tag}
                          </span>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </main>

          {/* Article Detail Modal */}
          {selectedArticle && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-6" onClick={() => setSelectedArticle(null)}>
              <div className="glass-card rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                <div className="p-6 border-b border-slate-700/50">
                  <div className="flex items-start justify-between">
                    <div>
                      <div className="flex items-center gap-2 mb-2">
                        <Badge variant={getCategoryConfig(selectedArticle.category).color}>
                          {getCategoryConfig(selectedArticle.category).name}
                        </Badge>
                      </div>
                      <h2 className="text-2xl font-bold text-white">{selectedArticle.title}</h2>
                      <div className="flex items-center gap-3 mt-2 text-sm text-slate-400">
                        <span>By {selectedArticle.author}</span>
                        <span>•</span>
                        <span>{selectedArticle.date}</span>
                      </div>
                    </div>
                    <button onClick={() => setSelectedArticle(null)} className="p-2 rounded-lg bg-slate-800/50 text-slate-400 hover:text-white">
                      <Icon name="x" className="w-5 h-5" />
                    </button>
                  </div>
                </div>

                <div className="p-6">
                  <p className="text-slate-300 leading-relaxed mb-6">{selectedArticle.excerpt}</p>
                  
                  <div className="prose prose-invert max-w-none">
                    <p className="text-slate-400">
                      [Full article content would be loaded here. This is a preview of the knowledge base article that contains detailed best practices, templates, and actionable insights based on real proposal experiences.]
                    </p>
                  </div>

                  <div className="flex flex-wrap gap-2 mt-6 pt-4 border-t border-slate-700/50">
                    {selectedArticle.tags.map((tag, i) => (
                      <Badge key={i} variant="default">#{tag}</Badge>
                    ))}
                  </div>

                  <div className="flex items-center justify-between mt-6 pt-4 border-t border-slate-700/50 text-sm text-slate-400">
                    <div className="flex items-center gap-4">
                      <span className="flex items-center gap-1">
                        <Icon name="eye" className="w-4 h-4" /> {selectedArticle.views} views
                      </span>
                      <span className="flex items-center gap-1">
                        <Icon name="heart" className="w-4 h-4" /> {selectedArticle.likes} likes
                      </span>
                    </div>
                    <button className="flex items-center gap-1 text-cyan-400 hover:text-cyan-300">
                      <Icon name="heart" className="w-4 h-4" /> Like this article
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <footer className="glass border-t border-slate-700/50 mt-12">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-2 text-slate-400 text-sm">
                <Icon name="shield" className="w-4 h-4" />
                <span>Mission Meets Tech • MissionPulse v12</span>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<KnowledgeBase />);
  </script>
</body>
</html>
