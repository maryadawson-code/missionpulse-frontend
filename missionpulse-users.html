<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management | MissionPulse</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.1); }
    .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Demo users data
    const DEMO_USERS = [
      { id: 1, name: 'Mary Womack', email: 'mary@missionmeetstech.com', role: 'CEO', status: 'active', lastActive: '2025-02-02T14:30:00Z', avatar: 'MW', permissions: ['all'] },
      { id: 2, name: 'John Smith', email: 'john@missionmeetstech.com', role: 'CAP', status: 'active', lastActive: '2025-02-02T13:45:00Z', avatar: 'JS', permissions: ['pipeline', 'warroom', 'strategy'] },
      { id: 3, name: 'Sarah Chen', email: 'sarah@missionmeetstech.com', role: 'FIN', status: 'active', lastActive: '2025-02-02T12:20:00Z', avatar: 'SC', permissions: ['pricing', 'lcat', 'compliance'] },
      { id: 4, name: 'Mike Johnson', email: 'mike@missionmeetstech.com', role: 'CON', status: 'active', lastActive: '2025-02-02T11:15:00Z', avatar: 'MJ', permissions: ['compliance', 'contracts', 'audit'] },
      { id: 5, name: 'Emily Davis', email: 'emily@missionmeetstech.com', role: 'PM', status: 'active', lastActive: '2025-02-01T16:30:00Z', avatar: 'ED', permissions: ['swimlane', 'launch', 'warroom'] },
      { id: 6, name: 'Tom Wilson', email: 'tom@missionmeetstech.com', role: 'SA', status: 'active', lastActive: '2025-02-01T14:00:00Z', avatar: 'TW', permissions: ['rfp', 'technical', 'orals'] },
      { id: 7, name: 'Lisa Brown', email: 'lisa@missionmeetstech.com', role: 'QA', status: 'inactive', lastActive: '2025-01-28T09:00:00Z', avatar: 'LB', permissions: ['hitl', 'review'] },
      { id: 8, name: 'Partner: Acme Corp', email: 'contact@acmecorp.com', role: 'Partner', status: 'active', lastActive: '2025-02-02T10:00:00Z', avatar: 'AC', permissions: ['frenemy_limited'] },
    ];

    const ROLES = [
      { id: 'CEO', name: 'Chief Executive Officer', color: '#00E5FA', description: 'Full system access, Go/No-Go authority' },
      { id: 'COO', name: 'Chief Operating Officer', color: '#8B5CF6', description: 'Capture oversight, team management' },
      { id: 'CAP', name: 'Capture Manager', color: '#10B981', description: 'Win strategy, opportunity pursuit' },
      { id: 'PM', name: 'Project Manager', color: '#F59E0B', description: 'Schedule, tasks, team coordination' },
      { id: 'SA', name: 'Solution Architect', color: '#EC4899', description: 'Technical approach, architecture' },
      { id: 'FIN', name: 'Financial Analyst', color: '#06B6D4', description: 'Pricing, BOE, cost analysis' },
      { id: 'CON', name: 'Contracts Specialist', color: '#EF4444', description: 'FAR/DFARS, compliance' },
      { id: 'DEL', name: 'Delivery Lead', color: '#A855F7', description: 'Staffing, resource allocation' },
      { id: 'QA', name: 'Quality Assurance', color: '#64748B', description: 'Review, HITL approval' },
      { id: 'Partner', name: 'External Partner', color: '#78716C', description: 'Limited teaming access' },
      { id: 'Viewer', name: 'View Only', color: '#475569', description: 'Read-only dashboard access' },
    ];

    const STATUS_STYLES = {
      active: { bg: 'bg-emerald-500/20', text: 'text-emerald-400', dot: 'bg-emerald-500' },
      inactive: { bg: 'bg-slate-500/20', text: 'text-slate-400', dot: 'bg-slate-500' },
      pending: { bg: 'bg-amber-500/20', text: 'text-amber-400', dot: 'bg-amber-500' },
    };

    function UserManagement() {
      const [users, setUsers] = useState(DEMO_USERS);
      const [searchQuery, setSearchQuery] = useState('');
      const [roleFilter, setRoleFilter] = useState('all');
      const [selectedUser, setSelectedUser] = useState(null);
      const [showInviteModal, setShowInviteModal] = useState(false);
      const [inviteEmail, setInviteEmail] = useState('');
      const [inviteRole, setInviteRole] = useState('Viewer');

      const filteredUsers = users.filter(user => {
        if (roleFilter !== 'all' && user.role !== roleFilter) return false;
        if (searchQuery) {
          const query = searchQuery.toLowerCase();
          return user.name.toLowerCase().includes(query) || 
                 user.email.toLowerCase().includes(query);
        }
        return true;
      });

      const stats = {
        total: users.length,
        active: users.filter(u => u.status === 'active').length,
        partners: users.filter(u => u.role === 'Partner').length,
      };

      const formatLastActive = (timestamp) => {
        const date = new Date(timestamp);
        const now = new Date();
        const diffHours = Math.floor((now - date) / (1000 * 60 * 60));
        if (diffHours < 1) return 'Just now';
        if (diffHours < 24) return `${diffHours}h ago`;
        const diffDays = Math.floor(diffHours / 24);
        if (diffDays < 7) return `${diffDays}d ago`;
        return date.toLocaleDateString();
      };

      const getRoleColor = (roleId) => {
        const role = ROLES.find(r => r.id === roleId);
        return role?.color || '#64748B';
      };

      const handleInvite = () => {
        if (!inviteEmail) return;
        const newUser = {
          id: users.length + 1,
          name: inviteEmail.split('@')[0],
          email: inviteEmail,
          role: inviteRole,
          status: 'pending',
          lastActive: null,
          avatar: inviteEmail.substring(0, 2).toUpperCase(),
          permissions: [],
        };
        setUsers([...users, newUser]);
        setShowInviteModal(false);
        setInviteEmail('');
        setInviteRole('Viewer');
      };

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
            <div className="max-w-[1800px] mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="missionpulse-nav-hub.html" className="text-slate-400 hover:text-white transition-colors">
                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
                    </svg>
                  </a>
                  <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                    <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold text-white">User Management</h1>
                    <p className="text-xs text-indigo-400">Team & Permissions Administration</p>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <span className="px-3 py-1 bg-red-500/20 text-red-400 text-xs rounded-full border border-red-500/30">
                    🔐 Admin Only
                  </span>
                  <button 
                    onClick={() => setShowInviteModal(true)}
                    className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white text-sm font-medium rounded-lg hover:from-cyan-400 hover:to-teal-400 transition-all"
                  >
                    + Invite User
                  </button>
                </div>
              </div>
            </div>
          </header>

          <div className="max-w-[1800px] mx-auto px-6 py-8">
            {/* Stats */}
            <div className="grid grid-cols-4 gap-4 mb-6">
              <div className="glass-card rounded-xl p-4">
                <p className="text-sm text-slate-400 mb-1">Total Users</p>
                <p className="text-2xl font-bold text-white">{stats.total}</p>
              </div>
              <div className="glass-card rounded-xl p-4">
                <p className="text-sm text-slate-400 mb-1">Active</p>
                <p className="text-2xl font-bold text-emerald-400">{stats.active}</p>
              </div>
              <div className="glass-card rounded-xl p-4">
                <p className="text-sm text-slate-400 mb-1">Partners</p>
                <p className="text-2xl font-bold text-amber-400">{stats.partners}</p>
              </div>
              <div className="glass-card rounded-xl p-4">
                <p className="text-sm text-slate-400 mb-1">Roles Defined</p>
                <p className="text-2xl font-bold text-cyan-400">{ROLES.length}</p>
              </div>
            </div>

            {/* Filters */}
            <div className="flex items-center gap-4 mb-6">
              <div className="relative flex-1 max-w-md">
                <svg className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input
                  type="text"
                  placeholder="Search users..."
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="w-full pl-12 pr-4 py-2.5 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500/50"
                />
              </div>
              <select
                value={roleFilter}
                onChange={(e) => setRoleFilter(e.target.value)}
                className="px-4 py-2.5 bg-slate-800/50 border border-slate-700 rounded-xl text-white focus:outline-none"
              >
                <option value="all">All Roles</option>
                {ROLES.map(role => (
                  <option key={role.id} value={role.id}>{role.id} - {role.name}</option>
                ))}
              </select>
            </div>

            {/* Users Table */}
            <div className="glass-card rounded-xl overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead className="bg-slate-800/50">
                    <tr>
                      <th className="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase">User</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase">Role</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase">Status</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase">Last Active</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase">Permissions</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase">Actions</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-700/50">
                    {filteredUsers.map(user => (
                      <tr key={user.id} className="hover:bg-slate-800/30 transition-colors">
                        <td className="px-4 py-3">
                          <div className="flex items-center gap-3">
                            <div 
                              className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm"
                              style={{ backgroundColor: getRoleColor(user.role) }}
                            >
                              {user.avatar}
                            </div>
                            <div>
                              <p className="font-medium text-white">{user.name}</p>
                              <p className="text-xs text-slate-400">{user.email}</p>
                            </div>
                          </div>
                        </td>
                        <td className="px-4 py-3">
                          <span 
                            className="px-2 py-1 text-xs font-medium rounded-full"
                            style={{ 
                              backgroundColor: `${getRoleColor(user.role)}20`,
                              color: getRoleColor(user.role),
                              border: `1px solid ${getRoleColor(user.role)}40`
                            }}
                          >
                            {user.role}
                          </span>
                        </td>
                        <td className="px-4 py-3">
                          <div className="flex items-center gap-2">
                            <div className={`w-2 h-2 rounded-full ${STATUS_STYLES[user.status].dot}`}></div>
                            <span className={`text-sm ${STATUS_STYLES[user.status].text}`}>
                              {user.status.charAt(0).toUpperCase() + user.status.slice(1)}
                            </span>
                          </div>
                        </td>
                        <td className="px-4 py-3 text-sm text-slate-400">
                          {user.lastActive ? formatLastActive(user.lastActive) : 'Never'}
                        </td>
                        <td className="px-4 py-3">
                          <div className="flex flex-wrap gap-1">
                            {user.permissions.slice(0, 3).map((perm, idx) => (
                              <span key={idx} className="px-1.5 py-0.5 text-[10px] bg-slate-700/50 text-slate-300 rounded">
                                {perm}
                              </span>
                            ))}
                            {user.permissions.length > 3 && (
                              <span className="px-1.5 py-0.5 text-[10px] bg-slate-700/50 text-slate-400 rounded">
                                +{user.permissions.length - 3}
                              </span>
                            )}
                          </div>
                        </td>
                        <td className="px-4 py-3">
                          <div className="flex items-center gap-2">
                            <button 
                              onClick={() => setSelectedUser(user)}
                              className="p-1.5 rounded-lg hover:bg-slate-700/50 text-slate-400 hover:text-white transition-colors"
                            >
                              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                              </svg>
                            </button>
                            <button className="p-1.5 rounded-lg hover:bg-slate-700/50 text-slate-400 hover:text-red-400 transition-colors">
                              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                              </svg>
                            </button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Role Reference */}
            <div className="mt-8">
              <h3 className="text-lg font-semibold text-white mb-4">Role Reference</h3>
              <div className="grid grid-cols-4 gap-3">
                {ROLES.map(role => (
                  <div key={role.id} className="glass-card rounded-lg p-3">
                    <div className="flex items-center gap-2 mb-1">
                      <div className="w-3 h-3 rounded-full" style={{ backgroundColor: role.color }}></div>
                      <span className="font-medium text-white text-sm">{role.id}</span>
                    </div>
                    <p className="text-xs text-slate-400">{role.description}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Invite Modal */}
          {showInviteModal && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50" onClick={() => setShowInviteModal(false)}>
              <div className="glass-card rounded-2xl p-6 max-w-md w-full mx-4" onClick={e => e.stopPropagation()}>
                <h3 className="text-lg font-bold text-white mb-4">Invite New User</h3>
                <div className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                    <input
                      type="email"
                      value={inviteEmail}
                      onChange={(e) => setInviteEmail(e.target.value)}
                      placeholder="user@company.com"
                      className="w-full px-4 py-2.5 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500/50"
                    />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-300 mb-2">Role</label>
                    <select
                      value={inviteRole}
                      onChange={(e) => setInviteRole(e.target.value)}
                      className="w-full px-4 py-2.5 bg-slate-800/50 border border-slate-700 rounded-xl text-white focus:outline-none"
                    >
                      {ROLES.map(role => (
                        <option key={role.id} value={role.id}>{role.id} - {role.name}</option>
                      ))}
                    </select>
                  </div>
                  <div className="flex items-center gap-3 pt-4">
                    <button
                      onClick={() => setShowInviteModal(false)}
                      className="flex-1 py-2.5 bg-slate-800/50 border border-slate-700 rounded-xl text-slate-300 hover:border-slate-600 transition-all"
                    >
                      Cancel
                    </button>
                    <button
                      onClick={handleInvite}
                      className="flex-1 py-2.5 bg-gradient-to-r from-cyan-500 to-teal-500 text-white font-medium rounded-xl hover:from-cyan-400 hover:to-teal-400 transition-all"
                    >
                      Send Invite
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<UserManagement />);
  </script>
</body>
</html>
