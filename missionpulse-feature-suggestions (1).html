<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MissionPulse - Feature Suggestions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .vote-btn:hover { transform: scale(1.1); }
        .vote-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // =========================================================================
        // CONFIGURATION
        // =========================================================================
        const CATEGORIES = [
            { id: 'all', name: 'All', icon: '📋' },
            { id: 'ai', name: 'AI Features', icon: '🤖' },
            { id: 'integration', name: 'Integrations', icon: '🔗' },
            { id: 'workflow', name: 'Workflow', icon: '⚡' },
            { id: 'analytics', name: 'Analytics', icon: '📊' },
            { id: 'mobile', name: 'Mobile', icon: '📱' },
            { id: 'export', name: 'Export', icon: '📤' },
            { id: 'ui', name: 'UI/UX', icon: '🎨' }
        ];

        const STATUSES = {
            submitted: { label: 'Submitted', color: 'slate', icon: '📝' },
            under_review: { label: 'Under Review', color: 'amber', icon: '👀' },
            planned: { label: 'Planned', color: 'blue', icon: '📅' },
            in_progress: { label: 'In Progress', color: 'cyan', icon: '🚧' },
            completed: { label: 'Completed', color: 'emerald', icon: '✅' },
            declined: { label: 'Declined', color: 'red', icon: '❌' }
        };

        // =========================================================================
        // DEMO DATA
        // =========================================================================
        const DEMO_SUGGESTIONS = [
            { id: 'f1', title: 'SAM.gov Auto-Import', description: 'Automatically import opportunities from SAM.gov based on saved searches and NAICS codes', category: 'integration', upvotes: 47, downvotes: 2, status: 'planned', submitted_by: 'Sarah Chen', created_at: '2026-01-16' },
            { id: 'f2', title: 'Mobile App for Orals Practice', description: 'iOS/Android app to practice orals Q&A on the go with voice recording', category: 'mobile', upvotes: 38, downvotes: 5, status: 'under_review', submitted_by: 'Mike Johnson', created_at: '2026-01-20' },
            { id: 'f3', title: 'Slack Integration for Notifications', description: 'Send proposal deadlines and task assignments to Slack channels', category: 'integration', upvotes: 31, downvotes: 3, status: 'submitted', submitted_by: 'Tom Wilson', created_at: '2026-01-23' },
            { id: 'f4', title: 'AI Writing Style Customization', description: 'Train the AI to match our company writing style and tone', category: 'ai', upvotes: 28, downvotes: 1, status: 'in_progress', submitted_by: 'Lisa Park', created_at: '2026-01-25' },
            { id: 'f5', title: 'Bulk Resume Upload', description: 'Upload multiple resumes at once and auto-extract key personnel info', category: 'workflow', upvotes: 24, downvotes: 4, status: 'submitted', submitted_by: 'Ana Garcia', created_at: '2026-01-27' },
            { id: 'f6', title: 'Competitor Win Rate Tracking', description: 'Track win/loss rates against specific competitors over time', category: 'analytics', upvotes: 21, downvotes: 2, status: 'submitted', submitted_by: 'Mary Womack', created_at: '2026-01-28' },
            { id: 'f7', title: 'Dark Mode Toggle', description: 'Option to switch between dark and light themes', category: 'ui', upvotes: 18, downvotes: 8, status: 'declined', submitted_by: 'John Smith', created_at: '2026-01-29' },
            { id: 'f8', title: 'Export to MS Word', description: 'Export proposal sections directly to formatted Word documents', category: 'export', upvotes: 15, downvotes: 1, status: 'submitted', submitted_by: 'Sarah Chen', created_at: '2026-01-30' }
        ];

        // =========================================================================
        // COMPONENTS
        // =========================================================================

        // Suggestion Card
        function SuggestionCard({ suggestion, onVote, userVotes }) {
            const status = STATUSES[suggestion.status];
            const category = CATEGORIES.find(c => c.id === suggestion.category);
            const netVotes = suggestion.upvotes - suggestion.downvotes;
            const userVote = userVotes[suggestion.id];

            return (
                <div className="glass rounded-xl p-5 hover:border-slate-600 transition-all">
                    <div className="flex gap-4">
                        {/* Vote Section */}
                        <div className="flex flex-col items-center gap-1">
                            <button
                                onClick={() => onVote(suggestion.id, 'up')}
                                className={`vote-btn w-10 h-10 rounded-lg flex items-center justify-center transition-all ${
                                    userVote === 'up'
                                        ? 'bg-emerald-500/30 text-emerald-400'
                                        : 'bg-slate-800 text-slate-400 hover:bg-emerald-500/20 hover:text-emerald-400'
                                }`}
                            >
                                ▲
                            </button>
                            <span className={`text-lg font-bold ${
                                netVotes > 0 ? 'text-emerald-400' :
                                netVotes < 0 ? 'text-red-400' : 'text-slate-400'
                            }`}>
                                {netVotes}
                            </span>
                            <button
                                onClick={() => onVote(suggestion.id, 'down')}
                                className={`vote-btn w-10 h-10 rounded-lg flex items-center justify-center transition-all ${
                                    userVote === 'down'
                                        ? 'bg-red-500/30 text-red-400'
                                        : 'bg-slate-800 text-slate-400 hover:bg-red-500/20 hover:text-red-400'
                                }`}
                            >
                                ▼
                            </button>
                        </div>

                        {/* Content */}
                        <div className="flex-1 min-w-0">
                            <div className="flex items-start justify-between gap-3 mb-2">
                                <h3 className="font-semibold text-white">{suggestion.title}</h3>
                                <span className={`px-2 py-1 rounded text-xs whitespace-nowrap bg-${status.color}-500/20 text-${status.color}-400`}
                                      style={{
                                          backgroundColor: status.color === 'slate' ? 'rgba(100,116,139,0.2)' :
                                                          status.color === 'amber' ? 'rgba(245,158,11,0.2)' :
                                                          status.color === 'blue' ? 'rgba(59,130,246,0.2)' :
                                                          status.color === 'cyan' ? 'rgba(6,182,212,0.2)' :
                                                          status.color === 'emerald' ? 'rgba(16,185,129,0.2)' :
                                                          'rgba(239,68,68,0.2)',
                                          color: status.color === 'slate' ? 'rgb(148,163,184)' :
                                                 status.color === 'amber' ? 'rgb(251,191,36)' :
                                                 status.color === 'blue' ? 'rgb(96,165,250)' :
                                                 status.color === 'cyan' ? 'rgb(34,211,238)' :
                                                 status.color === 'emerald' ? 'rgb(52,211,153)' :
                                                 'rgb(248,113,113)'
                                      }}>
                                    {status.icon} {status.label}
                                </span>
                            </div>
                            <p className="text-sm text-slate-400 mb-3">{suggestion.description}</p>
                            <div className="flex items-center gap-4 text-xs text-slate-500">
                                <span className="flex items-center gap-1">
                                    <span>{category?.icon}</span>
                                    {category?.name}
                                </span>
                                <span>•</span>
                                <span>by {suggestion.submitted_by}</span>
                                <span>•</span>
                                <span>{suggestion.created_at}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Submit Modal
        function SubmitModal({ isOpen, onClose, onSubmit }) {
            const [title, setTitle] = useState('');
            const [description, setDescription] = useState('');
            const [category, setCategory] = useState('workflow');

            const handleSubmit = () => {
                if (!title.trim()) return;
                onSubmit({ title, description, category });
                setTitle('');
                setDescription('');
                setCategory('workflow');
                onClose();
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="glass rounded-2xl p-6 w-full max-w-lg">
                        <div className="flex items-center justify-between mb-6">
                            <h2 className="text-xl font-bold text-white">💡 Submit Feature Idea</h2>
                            <button onClick={onClose} className="text-slate-400 hover:text-white text-2xl">×</button>
                        </div>

                        <div className="space-y-4">
                            <div>
                                <label className="text-sm text-slate-400 block mb-2">Title *</label>
                                <input
                                    type="text"
                                    value={title}
                                    onChange={(e) => setTitle(e.target.value)}
                                    placeholder="Brief description of your idea"
                                    className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none"
                                />
                            </div>

                            <div>
                                <label className="text-sm text-slate-400 block mb-2">Category</label>
                                <select
                                    value={category}
                                    onChange={(e) => setCategory(e.target.value)}
                                    className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-cyan-500 focus:outline-none"
                                >
                                    {CATEGORIES.filter(c => c.id !== 'all').map(c => (
                                        <option key={c.id} value={c.id}>{c.icon} {c.name}</option>
                                    ))}
                                </select>
                            </div>

                            <div>
                                <label className="text-sm text-slate-400 block mb-2">Details</label>
                                <textarea
                                    value={description}
                                    onChange={(e) => setDescription(e.target.value)}
                                    placeholder="Explain your idea in more detail..."
                                    className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 resize-none h-32 focus:border-cyan-500 focus:outline-none"
                                />
                            </div>

                            <div className="flex gap-3 pt-2">
                                <button
                                    onClick={onClose}
                                    className="flex-1 px-4 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-lg font-medium transition-colors"
                                >
                                    Cancel
                                </button>
                                <button
                                    onClick={handleSubmit}
                                    disabled={!title.trim()}
                                    className="flex-1 px-4 py-3 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                                >
                                    Submit Idea
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // =========================================================================
        // MAIN APP
        // =========================================================================
        function App() {
            const [suggestions, setSuggestions] = useState(DEMO_SUGGESTIONS);
            const [selectedCategory, setSelectedCategory] = useState('all');
            const [selectedStatus, setSelectedStatus] = useState('all');
            const [sortBy, setSortBy] = useState('votes');
            const [userVotes, setUserVotes] = useState({});
            const [showSubmitModal, setShowSubmitModal] = useState(false);
            const [isOnline, setIsOnline] = useState(true);

            // Handle voting
            const handleVote = (id, type) => {
                const currentVote = userVotes[id];
                
                setSuggestions(prev => prev.map(s => {
                    if (s.id !== id) return s;
                    
                    let newUpvotes = s.upvotes;
                    let newDownvotes = s.downvotes;
                    
                    // Remove previous vote
                    if (currentVote === 'up') newUpvotes--;
                    if (currentVote === 'down') newDownvotes--;
                    
                    // Add new vote if different from current
                    if (currentVote !== type) {
                        if (type === 'up') newUpvotes++;
                        if (type === 'down') newDownvotes++;
                    }
                    
                    return { ...s, upvotes: newUpvotes, downvotes: newDownvotes };
                }));

                setUserVotes(prev => ({
                    ...prev,
                    [id]: prev[id] === type ? null : type
                }));
            };

            // Handle submit
            const handleSubmit = (newSuggestion) => {
                const suggestion = {
                    id: `f${Date.now()}`,
                    ...newSuggestion,
                    upvotes: 1,
                    downvotes: 0,
                    status: 'submitted',
                    submitted_by: 'You',
                    created_at: new Date().toISOString().split('T')[0]
                };
                setSuggestions(prev => [suggestion, ...prev]);
                setUserVotes(prev => ({ ...prev, [suggestion.id]: 'up' }));
            };

            // Filter and sort
            const filteredSuggestions = suggestions
                .filter(s => selectedCategory === 'all' || s.category === selectedCategory)
                .filter(s => selectedStatus === 'all' || s.status === selectedStatus)
                .sort((a, b) => {
                    if (sortBy === 'votes') return (b.upvotes - b.downvotes) - (a.upvotes - a.downvotes);
                    if (sortBy === 'newest') return new Date(b.created_at) - new Date(a.created_at);
                    return 0;
                });

            // Stats
            const totalVotes = suggestions.reduce((sum, s) => sum + s.upvotes + s.downvotes, 0);
            const plannedCount = suggestions.filter(s => s.status === 'planned' || s.status === 'in_progress').length;

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="glass border-b border-slate-700 px-6 py-4 sticky top-0 z-20">
                        <div className="max-w-5xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <a href="missionpulse-dashboard-hub.html" className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-500 to-orange-500 flex items-center justify-center">
                                        <span className="text-xl">💡</span>
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-bold text-white">Feature Suggestions</h1>
                                        <p className="text-xs text-slate-500">Vote and shape the product roadmap</p>
                                    </div>
                                </a>
                            </div>
                            <div className="flex items-center gap-4">
                                <button
                                    onClick={() => setShowSubmitModal(true)}
                                    className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg font-medium transition-colors"
                                >
                                    ✨ Submit Idea
                                </button>
                                <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-xs ${
                                    isOnline ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'
                                }`}>
                                    <div className={`w-2 h-2 rounded-full ${isOnline ? 'bg-emerald-400' : 'bg-amber-400'}`} />
                                    {isOnline ? 'Online' : 'Demo Mode'}
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-5xl mx-auto px-6 py-8">
                        {/* Stats */}
                        <div className="grid grid-cols-4 gap-4 mb-8">
                            <div className="glass p-4 rounded-xl text-center">
                                <div className="text-3xl font-bold text-cyan-400">{suggestions.length}</div>
                                <div className="text-sm text-slate-400">Ideas</div>
                            </div>
                            <div className="glass p-4 rounded-xl text-center">
                                <div className="text-3xl font-bold text-emerald-400">{totalVotes}</div>
                                <div className="text-sm text-slate-400">Votes</div>
                            </div>
                            <div className="glass p-4 rounded-xl text-center">
                                <div className="text-3xl font-bold text-amber-400">{plannedCount}</div>
                                <div className="text-sm text-slate-400">Planned</div>
                            </div>
                            <div className="glass p-4 rounded-xl text-center">
                                <div className="text-3xl font-bold text-purple-400">
                                    {suggestions.filter(s => s.status === 'completed').length}
                                </div>
                                <div className="text-sm text-slate-400">Completed</div>
                            </div>
                        </div>

                        {/* Filters */}
                        <div className="glass rounded-xl p-4 mb-6">
                            <div className="flex flex-wrap items-center gap-4">
                                {/* Category Filter */}
                                <div className="flex items-center gap-2">
                                    <span className="text-sm text-slate-400">Category:</span>
                                    <div className="flex gap-1 flex-wrap">
                                        {CATEGORIES.map(cat => (
                                            <button
                                                key={cat.id}
                                                onClick={() => setSelectedCategory(cat.id)}
                                                className={`px-3 py-1.5 rounded-lg text-sm transition-colors ${
                                                    selectedCategory === cat.id
                                                        ? 'bg-cyan-500/20 text-cyan-400'
                                                        : 'bg-slate-800 text-slate-400 hover:text-white'
                                                }`}
                                            >
                                                {cat.icon} {cat.name}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="h-8 w-px bg-slate-700" />

                                {/* Status Filter */}
                                <div className="flex items-center gap-2">
                                    <span className="text-sm text-slate-400">Status:</span>
                                    <select
                                        value={selectedStatus}
                                        onChange={(e) => setSelectedStatus(e.target.value)}
                                        className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-white focus:outline-none"
                                    >
                                        <option value="all">All</option>
                                        {Object.entries(STATUSES).map(([id, status]) => (
                                            <option key={id} value={id}>{status.label}</option>
                                        ))}
                                    </select>
                                </div>

                                <div className="h-8 w-px bg-slate-700" />

                                {/* Sort */}
                                <div className="flex items-center gap-2">
                                    <span className="text-sm text-slate-400">Sort:</span>
                                    <select
                                        value={sortBy}
                                        onChange={(e) => setSortBy(e.target.value)}
                                        className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-white focus:outline-none"
                                    >
                                        <option value="votes">Most Votes</option>
                                        <option value="newest">Newest</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        {/* Suggestions List */}
                        <div className="space-y-4">
                            {filteredSuggestions.length === 0 ? (
                                <div className="glass rounded-xl p-8 text-center">
                                    <div className="text-4xl mb-4">🔍</div>
                                    <p className="text-slate-400">No suggestions match your filters.</p>
                                </div>
                            ) : (
                                filteredSuggestions.map(suggestion => (
                                    <SuggestionCard
                                        key={suggestion.id}
                                        suggestion={suggestion}
                                        onVote={handleVote}
                                        userVotes={userVotes}
                                    />
                                ))
                            )}
                        </div>
                    </main>

                    {/* Submit Modal */}
                    <SubmitModal
                        isOpen={showSubmitModal}
                        onClose={() => setShowSubmitModal(false)}
                        onSubmit={handleSubmit}
                    />

                    {/* Footer */}
                    <footer className="border-t border-slate-800 mt-8">
                        <div className="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
                            <span className="text-slate-500 text-sm">© 2026 Mission Meets Tech</span>
                            <span className="text-slate-600 text-xs">AI GENERATED - REQUIRES HUMAN REVIEW</span>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
