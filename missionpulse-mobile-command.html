<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mobile Command | MissionPulse</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; overflow-x: hidden; }
    .glass { background: rgba(0,229,250,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
    .glass-card { background: rgba(15,23,42,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(51,65,85,0.5); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-slideUp { animation: slideUp 0.3s ease-out; }
    .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom, 20px); }
    .touch-action-pan { touch-action: pan-y; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // Supabase
    const supabaseUrl = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzgzNjY0MDcsImV4cCI6MjA1Mzk0MjQwN30.lyr1BUD7vMuuWT_HjqWnhVP_JSrgVx1f7i_yc2VFE44';
    const supabase = window.supabase?.createClient(supabaseUrl, supabaseKey);

    // Demo data
    const DEMO_PIPELINE = [
      { id: '1', nickname: 'DHA EHR', title: 'DHA Electronic Health Records', stage: 'Proposal', pwin: 72, ceiling: 125000000, days_until_due: 5, status: 'urgent' },
      { id: '2', nickname: 'VA Claims', title: 'VA Claims Processing AI', stage: 'Negotiation', pwin: 85, ceiling: 85000000, days_until_due: 14, status: 'on_track' },
      { id: '3', nickname: 'CMS Fraud', title: 'CMS Medicare Fraud Detection', stage: 'Qualification', pwin: 45, ceiling: 200000000, days_until_due: 21, status: 'at_risk' },
      { id: '4', nickname: 'IHS Telehealth', title: 'IHS Telehealth Infrastructure', stage: 'Capture', pwin: 38, ceiling: 45000000, days_until_due: 60, status: 'on_track' }
    ];

    const DEMO_NOTIFICATIONS = [
      { id: '1', title: 'Deadline Alert', body: 'DHA EHR proposal due in 5 days', type: 'deadline', time: '10m ago', unread: true },
      { id: '2', title: 'Approval Required', body: 'Technical Volume needs your review', type: 'approval', time: '1h ago', unread: true },
      { id: '3', title: 'New Comment', body: 'Mike mentioned you in a comment', type: 'mention', time: '2h ago', unread: false },
      { id: '4', title: '🎉 Win Alert', body: 'Congratulations! VA Claims proposal won', type: 'win', time: '1d ago', unread: false }
    ];

    const DEMO_TASKS = [
      { id: '1', title: 'Review Technical Volume', priority: 'high', due: 'Today', opp: 'DHA EHR' },
      { id: '2', title: 'Update pricing model', priority: 'medium', due: 'Tomorrow', opp: 'VA Claims' },
      { id: '3', title: 'Submit compliance docs', priority: 'high', due: 'Wed', opp: 'DHA EHR' },
      { id: '4', title: 'Partner call prep', priority: 'low', due: 'Thu', opp: 'CMS Fraud' }
    ];

    // Icons
    const Icons = {
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
      pipeline: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
      tasks: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>,
      bell: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>,
      mic: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>,
      plus: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>,
      clock: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6l4 2" /></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
      alert: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
      dollar: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      target: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><circle cx="12" cy="12" r="6" strokeWidth={2}/><circle cx="12" cy="12" r="2" strokeWidth={2}/></svg>,
      chevronRight: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>,
      shield: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
      user: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>,
    };

    const Icon = ({ name, className = "w-5 h-5" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    // Badge Component
    const Badge = ({ children, variant = 'default' }) => {
      const variants = {
        default: 'bg-slate-700 text-slate-300',
        success: 'bg-emerald-500/20 text-emerald-400',
        warning: 'bg-amber-500/20 text-amber-400',
        danger: 'bg-red-500/20 text-red-400',
        primary: 'bg-cyan-500/20 text-cyan-400'
      };
      return <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${variants[variant]}`}>{children}</span>;
    };

    // Pipeline Card
    const PipelineCard = ({ opp }) => {
      const statusColors = {
        urgent: { bg: 'bg-red-500/10', border: 'border-red-500/30', text: 'text-red-400' },
        at_risk: { bg: 'bg-amber-500/10', border: 'border-amber-500/30', text: 'text-amber-400' },
        on_track: { bg: 'bg-emerald-500/10', border: 'border-emerald-500/30', text: 'text-emerald-400' }
      };
      const colors = statusColors[opp.status] || statusColors.on_track;

      return (
        <div className={`${colors.bg} ${colors.border} border rounded-xl p-4 active:scale-[0.98] transition-transform`}>
          <div className="flex items-start justify-between mb-2">
            <div>
              <h3 className="font-semibold text-white">{opp.nickname}</h3>
              <p className="text-xs text-slate-400 truncate max-w-[180px]">{opp.title}</p>
            </div>
            <div className={`w-10 h-10 rounded-lg flex items-center justify-center ${colors.bg}`}>
              <span className={`text-lg font-bold ${colors.text}`}>{opp.pwin}</span>
            </div>
          </div>
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2">
              <Badge variant={opp.status === 'urgent' ? 'danger' : opp.status === 'at_risk' ? 'warning' : 'success'}>
                {opp.days_until_due}d
              </Badge>
              <Badge>{opp.stage}</Badge>
            </div>
            <span className="text-sm text-slate-400">${(opp.ceiling/1000000).toFixed(0)}M</span>
          </div>
        </div>
      );
    };

    // Task Item
    const TaskItem = ({ task, onComplete }) => {
      const [completed, setCompleted] = useState(false);
      const priorityColors = {
        high: 'border-l-red-500',
        medium: 'border-l-amber-500',
        low: 'border-l-slate-500'
      };

      return (
        <div 
          className={`bg-slate-800/50 rounded-lg p-3 border-l-4 ${priorityColors[task.priority]} ${completed ? 'opacity-50' : ''}`}
          onClick={() => setCompleted(!completed)}
        >
          <div className="flex items-center gap-3">
            <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center transition-all ${completed ? 'bg-emerald-500 border-emerald-500' : 'border-slate-500'}`}>
              {completed && <Icon name="check" className="w-3 h-3 text-white" />}
            </div>
            <div className="flex-1 min-w-0">
              <p className={`text-sm ${completed ? 'line-through text-slate-500' : 'text-white'}`}>{task.title}</p>
              <div className="flex items-center gap-2 mt-0.5">
                <span className="text-xs text-slate-500">{task.due}</span>
                <span className="text-xs text-cyan-500">{task.opp}</span>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // Notification Item
    const NotificationItem = ({ notification }) => {
      const typeIcons = {
        deadline: 'clock',
        approval: 'check',
        mention: 'user',
        win: 'target'
      };

      return (
        <div className={`flex items-start gap-3 p-3 rounded-lg ${notification.unread ? 'bg-cyan-500/5' : 'bg-slate-800/30'}`}>
          <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${notification.unread ? 'bg-cyan-500/20' : 'bg-slate-700/50'}`}>
            <Icon name={typeIcons[notification.type] || 'bell'} className={`w-4 h-4 ${notification.unread ? 'text-cyan-400' : 'text-slate-400'}`} />
          </div>
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2">
              <span className={`text-sm font-medium ${notification.unread ? 'text-white' : 'text-slate-300'}`}>{notification.title}</span>
              {notification.unread && <span className="w-2 h-2 bg-cyan-500 rounded-full" />}
            </div>
            <p className="text-xs text-slate-400 truncate">{notification.body}</p>
            <span className="text-xs text-slate-500">{notification.time}</span>
          </div>
        </div>
      );
    };

    // Main App
    function MobileCommand() {
      const [activeTab, setActiveTab] = useState('home');
      const [pipeline, setPipeline] = useState(DEMO_PIPELINE);
      const [notifications, setNotifications] = useState(DEMO_NOTIFICATIONS);
      const [tasks, setTasks] = useState(DEMO_TASKS);

      // Stats
      const stats = useMemo(() => ({
        pipelineValue: pipeline.reduce((sum, o) => sum + o.ceiling, 0),
        avgPwin: Math.round(pipeline.reduce((sum, o) => sum + o.pwin, 0) / pipeline.length),
        urgentCount: pipeline.filter(o => o.status === 'urgent').length,
        unreadCount: notifications.filter(n => n.unread).length
      }), [pipeline, notifications]);

      // Home Tab
      const HomeTab = () => (
        <div className="p-4 pb-24 space-y-4 animate-slideUp">
          {/* Welcome */}
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-xl font-bold text-white">Good morning</h1>
              <p className="text-sm text-slate-400">Here's your command summary</p>
            </div>
            <div className="w-10 h-10 rounded-full bg-gradient-to-br from-cyan-500 to-teal-500 flex items-center justify-center">
              <span className="text-white font-semibold">MW</span>
            </div>
          </div>

          {/* Quick Stats */}
          <div className="grid grid-cols-2 gap-3">
            <div className="glass-card rounded-xl p-4">
              <div className="flex items-center gap-2 mb-2">
                <Icon name="dollar" className="w-4 h-4 text-cyan-400" />
                <span className="text-xs text-slate-400">Pipeline</span>
              </div>
              <div className="text-2xl font-bold text-white">${(stats.pipelineValue/1000000000).toFixed(2)}B</div>
            </div>
            <div className="glass-card rounded-xl p-4">
              <div className="flex items-center gap-2 mb-2">
                <Icon name="target" className="w-4 h-4 text-emerald-400" />
                <span className="text-xs text-slate-400">Avg pWin</span>
              </div>
              <div className="text-2xl font-bold text-white">{stats.avgPwin}%</div>
            </div>
          </div>

          {/* Urgent Alert */}
          {stats.urgentCount > 0 && (
            <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-4 flex items-center gap-3">
              <div className="w-10 h-10 rounded-lg bg-red-500/20 flex items-center justify-center">
                <Icon name="alert" className="w-5 h-5 text-red-400" />
              </div>
              <div>
                <p className="text-sm font-medium text-red-400">{stats.urgentCount} Urgent Deadline{stats.urgentCount > 1 ? 's' : ''}</p>
                <p className="text-xs text-slate-400">Requires immediate attention</p>
              </div>
            </div>
          )}

          {/* Top Opportunities */}
          <div>
            <div className="flex items-center justify-between mb-3">
              <h2 className="font-semibold text-white">Active Pipeline</h2>
              <button className="text-xs text-cyan-400">View All</button>
            </div>
            <div className="space-y-3">
              {pipeline.slice(0, 3).map(opp => (
                <PipelineCard key={opp.id} opp={opp} />
              ))}
            </div>
          </div>

          {/* Today's Tasks */}
          <div>
            <div className="flex items-center justify-between mb-3">
              <h2 className="font-semibold text-white">Today's Tasks</h2>
              <button className="text-xs text-cyan-400">View All</button>
            </div>
            <div className="space-y-2">
              {tasks.slice(0, 3).map(task => (
                <TaskItem key={task.id} task={task} />
              ))}
            </div>
          </div>
        </div>
      );

      // Pipeline Tab
      const PipelineTab = () => (
        <div className="p-4 pb-24 animate-slideUp">
          <h1 className="text-xl font-bold text-white mb-4">Pipeline</h1>
          <div className="space-y-3">
            {pipeline.map(opp => (
              <PipelineCard key={opp.id} opp={opp} />
            ))}
          </div>
        </div>
      );

      // Tasks Tab
      const TasksTab = () => (
        <div className="p-4 pb-24 animate-slideUp">
          <h1 className="text-xl font-bold text-white mb-4">Tasks</h1>
          <div className="space-y-2">
            {tasks.map(task => (
              <TaskItem key={task.id} task={task} />
            ))}
          </div>
        </div>
      );

      // Notifications Tab
      const NotificationsTab = () => (
        <div className="p-4 pb-24 animate-slideUp">
          <h1 className="text-xl font-bold text-white mb-4">Notifications</h1>
          <div className="space-y-2">
            {notifications.map(n => (
              <NotificationItem key={n.id} notification={n} />
            ))}
          </div>
        </div>
      );

      const tabs = {
        home: <HomeTab />,
        pipeline: <PipelineTab />,
        tasks: <TasksTab />,
        notifications: <NotificationsTab />
      };

      return (
        <div className="min-h-screen bg-[#00050F] touch-action-pan">
          {/* Status Bar Safe Area */}
          <div className="h-12 glass sticky top-0 z-50 flex items-center justify-center">
            <div className="flex items-center gap-2">
              <Icon name="shield" className="w-4 h-4 text-cyan-400" />
              <span className="text-sm font-semibold text-white">MissionPulse</span>
            </div>
          </div>

          {/* Content */}
          <main className="min-h-[calc(100vh-160px)]">
            {tabs[activeTab]}
          </main>

          {/* FAB - Voice Capture */}
          <button className="fixed right-4 bottom-24 w-14 h-14 rounded-full bg-gradient-to-br from-cyan-500 to-teal-500 flex items-center justify-center shadow-lg shadow-cyan-500/30 active:scale-95 transition-transform z-40">
            <Icon name="mic" className="w-6 h-6 text-white" />
          </button>

          {/* Bottom Navigation */}
          <nav className="fixed bottom-0 left-0 right-0 glass border-t border-slate-700/50 safe-area-bottom z-50">
            <div className="flex items-center justify-around py-2">
              {[
                { id: 'home', icon: 'home', label: 'Home' },
                { id: 'pipeline', icon: 'pipeline', label: 'Pipeline' },
                { id: 'tasks', icon: 'tasks', label: 'Tasks' },
                { id: 'notifications', icon: 'bell', label: 'Alerts', badge: stats.unreadCount }
              ].map(tab => (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  className={`flex flex-col items-center py-2 px-4 rounded-xl transition-all ${activeTab === tab.id ? 'bg-cyan-500/10' : ''}`}
                >
                  <div className="relative">
                    <Icon 
                      name={tab.icon} 
                      className={`w-6 h-6 ${activeTab === tab.id ? 'text-cyan-400' : 'text-slate-400'}`} 
                    />
                    {tab.badge > 0 && (
                      <span className="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-[10px] text-white flex items-center justify-center">
                        {tab.badge}
                      </span>
                    )}
                  </div>
                  <span className={`text-xs mt-1 ${activeTab === tab.id ? 'text-cyan-400' : 'text-slate-500'}`}>
                    {tab.label}
                  </span>
                </button>
              ))}
            </div>
          </nav>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<MobileCommand />);
  </script>
</body>
</html>
