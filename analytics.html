<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse v1.1 - Analytics Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --primary-cyan: #00E5FA; --deep-navy: #00050F; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--deep-navy); min-height: 100vh; color: #fff; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes countUp { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
    .animate-count { animation: countUp 0.5s ease-out forwards; }
    .glass-nav { background: rgba(0, 5, 15, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0, 229, 250, 0.1); }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0A1628; }
    ::-webkit-scrollbar-thumb { background: rgba(0, 229, 250, 0.3); border-radius: 4px; }
    .chart-bar { transition: height 0.5s ease-out, background-color 0.3s; }
    .chart-line { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: drawLine 2s ease-out forwards; }
    @keyframes drawLine { to { stroke-dashoffset: 0; } }
  </style>
</head>
<body>
  <div id="root"></div>

    // Shared Config

      { id: 'agents', name: 'AI Agents', icon: 'cpu', href: 'agent-hub.html', roles: ['all'] },
      { id: 'pipeline', name: 'Pipeline', icon: 'kanban', href: '#pipeline', roles: ['internal'] },

      { id: 'playbook', name: 'Playbook', icon: 'book', href: 'playbook-manager.html', roles: ['admin', 'capture_manager', 'proposal_manager'] },

        { name: 'Compliance Guardian', uses: 198, tokens: 234000, cost: 11.70 },
        { name: 'Pricing Intel', uses: 156, tokens: 178000, cost: 8.90 },
        { name: 'Black Hat Intel', uses: 89, tokens: 145000, cost: 7.25 },

        { name: 'Orals Coach', uses: 78, tokens: 156000, cost: 7.80 },

        { time: '4 hours ago', action: 'Win notification', detail: 'VA EHRM Phase 2', user: 'System' },

      searchIcon: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
      shield: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
      dollar: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      trendUp: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>,
      trendDown: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6" /></svg>,
      target: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><circle cx="12" cy="12" r="6" strokeWidth={2}/><circle cx="12" cy="12" r="2" strokeWidth={2}/></svg>,
      clock: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6l4 2" /></svg>,
      zap: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
      crown: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3l3.5 7L12 6l3.5 4L19 3m-14 8v8h14v-8M5 15h14" /></svg>,
      building: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>,
      activity: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M22 12h-4l-3 9L9 3l-3 9H2" /></svg>,
      pieChart: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" /></svg>,
      barChart: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
      download: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>,
      calendar: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
    };

    const Icon = ({ name, className = "w-5 h-5" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-flex items-center justify-center ${className}`}><IconComponent /></span> : null;
    };

    // Auth Context
    const AuthContext = createContext(null);
    const useAuth = () => useContext(AuthContext);

    const AuthProvider = ({ children }) => {
      const [currentRole, setCurrentRole] = useState('executive');
      const [user] = useState({ name: 'Mary Womack', email: 'mary@missionpulse.io' });
      const hasAccess = useCallback((allowedRoles) => {
        if (allowedRoles.includes('all')) return true;
        if (allowedRoles.includes('admin') && ROLES[currentRole]?.canAccessAdmin) return true;
        if (allowedRoles.includes('internal')) return true;
        return allowedRoles.includes(currentRole);
      }, [currentRole]);
      return (
        <AuthContext.Provider value={{ currentRole, setCurrentRole, user, hasAccess, roleInfo: ROLES[currentRole] }}>
          {children}
        </AuthContext.Provider>
      );
    };

    // UI Components
    const Badge = ({ children, variant = 'default', size = 'sm', icon }) => {
      const variants = {
        default: 'bg-slate-700/50 text-slate-300 border-slate-600/50',
        primary: 'bg-cyan-500/20 text-cyan-400 border-cyan-500/30',
        success: 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30',
        warning: 'bg-amber-500/20 text-amber-400 border-amber-500/30',
        danger: 'bg-red-500/20 text-red-400 border-red-500/30',
      };
      const sizes = { xs: 'px-1.5 py-0.5 text-xs', sm: 'px-2 py-1 text-xs', md: 'px-3 py-1.5 text-sm' };
      return (
        <span className={`inline-flex items-center gap-1.5 rounded-full font-medium border ${variants[variant]} ${sizes[size]}`}>
          {icon && <Icon name={icon} className="w-3 h-3" />}
          {children}
        </span>
      );
    };

    const Button = ({ children, variant = 'primary', size = 'md', icon, disabled, className = '', ...props }) => {

        primary: 'bg-gradient-to-r from-cyan-500 to-teal-500 text-white hover:from-cyan-400 hover:to-teal-400 shadow-lg shadow-cyan-500/25',
        secondary: 'bg-slate-700/50 text-white hover:bg-slate-600/50 border border-slate-600/50',
        ghost: 'text-slate-400 hover:text-white hover:bg-slate-700/50',
      };
      const sizes = { xs: 'px-2 py-1 text-xs', sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2 text-sm', lg: 'px-6 py-3 text-base' };
      return (
        <button className={`inline-flex items-center justify-center gap-2 font-semibold rounded-xl transition-all duration-200 ${variants[variant]} ${sizes[size]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`} disabled={disabled} {...props}>
          {icon && <Icon name={icon} className="w-4 h-4" />}
          {children}
        </button>
      );
    };

    const Card = ({ children, className = '', glow = false, onClick }) => (

      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [profileOpen, setProfileOpen] = useState(false);
      const accessibleNavItems = NAV_ITEMS.filter(item => hasAccess(item.roles));

      return (
        <>

                <a href="index.html" className="flex items-center gap-3">

                  </div>
                  <div className="hidden sm:block">
                    <div className="text-lg font-bold text-white">MissionPulse</div>
                    <div className="text-xs text-cyan-400 -mt-0.5">v1.1 Production</div>
                  </div>
                </a>

                <div className="hidden lg:flex items-center gap-1">
                  {accessibleNavItems.map(item => (
                    <a key={item.id} href={item.href} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition-all ${currentPage === item.id ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' : 'text-slate-400 hover:text-white hover:bg-slate-700/50'}`}>
                      <Icon name={item.icon} className="w-4 h-4" />
                      {item.name}
                    </a>
                  ))}
                </div>

                <div className="flex items-center gap-2">
                  <button className="p-2 rounded-xl text-slate-400 hover:text-white hover:bg-slate-700/50">
                    <Icon name="searchIcon" className="w-5 h-5" />
                  </button>
                  <button className="relative p-2 rounded-xl text-slate-400 hover:text-white hover:bg-slate-700/50">
                    <Icon name="bell" className="w-5 h-5" />

                    <Icon name="dollar" className="w-4 h-4 text-emerald-400" />
                    <span className="text-xs font-mono text-slate-300">$142.38</span>
                  </div>
                  <div className="relative">
                    <button onClick={() => setProfileOpen(!profileOpen)} className="flex items-center gap-2 p-1.5 rounded-xl hover:bg-slate-700/50">
                      <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center text-white text-sm font-bold">
                        {user.name.charAt(0)}

                    </button>
                    {profileOpen && (
                      <div className="absolute right-0 top-full mt-2 w-72 py-3 bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl animate-fade-in z-50">
                        <div className="px-4 pb-3 border-b border-slate-700">
                          <div className="font-semibold text-white">{user.name}</div>
                          <div className="text-sm text-slate-400">{user.email}</div>
                        </div>
                        <div className="px-4 py-3">
                          <select value={currentRole} onChange={(e) => setCurrentRole(e.target.value)} className="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm text-white">
                            {Object.entries(ROLES).map(([id, role]) => (
                              <option key={id} value={id}>{role.name}</option>
                            ))}
                          </select>
                        </div>
                      </div>
                    )}
                  </div>
                  <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="lg:hidden p-2 rounded-xl text-slate-400 hover:text-white hover:bg-slate-700/50">
                    <Icon name={mobileMenuOpen ? 'x' : 'menu'} className="w-6 h-6" />

                </div>
              </div>
            </div>
          </nav>

          {mobileMenuOpen && (
            <div className="lg:hidden fixed inset-0 z-40 pt-16">
              <div className="absolute inset-0 bg-black/60" onClick={() => setMobileMenuOpen(false)} />
              <div className="relative bg-slate-900 border-t border-slate-800 p-4 space-y-1 animate-fade-in">

        </>
      );
    };

    const LiabilityFooter = () => (
      <div className="fixed bottom-0 left-0 right-0 py-2 px-4 bg-slate-900/95 backdrop-blur-sm border-t border-slate-800 z-30">
        <div className="max-w-7xl mx-auto flex items-center justify-between text-xs">
          <span className="text-amber-400 font-medium">AI GENERATED - REQUIRES HUMAN REVIEW</span>
          <span className="text-cyan-500 hidden sm:block">Mission. Technology. Transformation.</span>
        </div>
      </div>
    );

    // Chart Components
    const BarChart = ({ data, maxHeight = 160 }) => {
      const maxValue = Math.max(...data.map(d => d.submitted));
      return (
        <div className="flex items-end justify-between gap-3 h-48">
          {data.map((item, i) => (
            <div key={i} className="flex-1 flex flex-col items-center gap-2">
              <div className="relative w-full flex items-end justify-center gap-1" style={{ height: maxHeight }}>
                <div 
                  className="w-5 bg-slate-600 rounded-t chart-bar"
                  style={{ height: `${(item.submitted / maxValue) * maxHeight}px`, animationDelay: `${i * 100}ms` }}
                />
                <div 
                  className="w-5 bg-cyan-500 rounded-t chart-bar"
                  style={{ height: `${(item.won / maxValue) * maxHeight}px`, animationDelay: `${i * 100 + 50}ms` }}
                />
              </div>
              <span className="text-xs text-slate-400">{item.month}</span>
            </div>
          ))}
        </div>
      );
    };

    const HorizontalBarChart = ({ data }) => {
      const maxValue = Math.max(...data.map(d => d.uses));
      return (
        <div className="space-y-3">
          {data.map((item, i) => (
            <div key={i} className="animate-fade-in" style={{ animationDelay: `${i * 50}ms` }}>
              <div className="flex items-center justify-between text-sm mb-1">
                <span className="text-slate-300">{item.name}</span>
                <span className="text-slate-400 font-mono">{item.uses}</span>
              </div>
              <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
                <div 
                  className="h-full bg-gradient-to-r from-cyan-500 to-teal-500 rounded-full transition-all duration-500"
                  style={{ width: `${(item.uses / maxValue) * 100}%` }}
                />
              </div>
            </div>
          ))}
        </div>
      );
    };

    const DonutChart = ({ data }) => {
      const total = Object.values(data).reduce((a, b) => a + b, 0);
      const colors = ['#00E5FA', '#00BDAE', '#8B5CF6', '#10B981', '#F59E0B', '#EC4899', '#6366F1', '#EF4444', '#64748B'];
      let cumulativePercent = 0;
      
      const segments = Object.entries(data).map(([key, value], i) => {
        const percent = (value / total) * 100;
        const startAngle = cumulativePercent * 3.6;
        cumulativePercent += percent;
        return { key, value, percent, startAngle, color: colors[i % colors.length] };
      });

      return (
        <div className="flex items-center gap-6">
          <div className="relative w-32 h-32">
            <svg viewBox="0 0 100 100" className="w-full h-full -rotate-90">
              {segments.map((seg, i) => {
                const radius = 40;
                const circumference = 2 * Math.PI * radius;
                const strokeDasharray = `${(seg.percent / 100) * circumference} ${circumference}`;
                const strokeDashoffset = -segments.slice(0, i).reduce((sum, s) => sum + (s.percent / 100) * circumference, 0);
                return (
                  <circle
                    key={i}
                    cx="50" cy="50" r={radius}
                    fill="none"
                    stroke={seg.color}
                    strokeWidth="12"
                    strokeDasharray={strokeDasharray}
                    strokeDashoffset={strokeDashoffset}
                    className="transition-all duration-500"
                  />
                );
              })}
            </svg>
            <div className="absolute inset-0 flex items-center justify-center">
              <div className="text-center">
                <div className="text-xl font-bold text-white">${total.toFixed(0)}</div>
                <div className="text-xs text-slate-400">Total</div>
              </div>
            </div>
          </div>
          <div className="flex-1 space-y-1">
            {segments.slice(0, 5).map((seg, i) => (
              <div key={i} className="flex items-center gap-2 text-xs">
                <div className="w-3 h-3 rounded" style={{ backgroundColor: seg.color }} />
                <span className="text-slate-400 capitalize">{seg.key}</span>
                <span className="text-slate-300 ml-auto font-mono">${seg.value.toFixed(2)}</span>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // Stat Card Component
    const StatCard = ({ label, value, icon, trend, trendValue, color = 'cyan', prefix = '', suffix = '' }) => (
      <Card className="p-5">
        <div className="flex items-start justify-between mb-3">
          <div className={`p-2.5 rounded-xl bg-${color}-500/20`}>
            <Icon name={icon} className={`w-5 h-5 text-${color}-400`} />
          </div>
          {trend && (
            <div className={`flex items-center gap-1 text-xs font-medium ${trend === 'up' ? 'text-emerald-400' : 'text-red-400'}`}>
              <Icon name={trend === 'up' ? 'trendUp' : 'trendDown'} className="w-3 h-3" />
              {trendValue}
            </div>
          )}
        </div>
        <div className="text-2xl font-bold text-white animate-count">
          {prefix}{typeof value === 'number' ? value.toLocaleString() : value}{suffix}
        </div>
        <div className="text-sm text-slate-400 mt-1">{label}</div>
      </Card>
    );

    // Analytics Dashboard Content
    const AnalyticsDashboard = () => {
      const [timeRange, setTimeRange] = useState('6m');
      const { summary, proposalsByMonth, agentUsage, winsByAgency, recentActivity, costBreakdown } = ANALYTICS_DATA;

      return (
        <div className="space-y-6">
          {/* Header */}
          <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
              <h1 className="text-2xl font-bold text-white mb-1">Analytics Dashboard</h1>
              <p className="text-slate-400">Performance metrics and AI usage insights</p>
            </div>
            <div className="flex items-center gap-3">
              <select 
                value={timeRange} 
                onChange={(e) => setTimeRange(e.target.value)}
                className="px-4 py-2 bg-slate-700 border border-slate-600 rounded-xl text-sm text-white"
              >
                <option value="1m">Last Month</option>
                <option value="3m">Last 3 Months</option>
                <option value="6m">Last 6 Months</option>
                <option value="1y">Last Year</option>
              </select>
              <Button variant="secondary" icon="download">Export</Button>
            </div>
          </div>

          {/* Summary Stats */}
          <div className="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4">
            <StatCard label="Total Proposals" value={summary.totalProposals} icon="clipboard" trend="up" trendValue="+12%" color="cyan" />
            <StatCard label="Win Rate" value={summary.winRate} suffix="%" icon="target" trend="up" trendValue="+5%" color="emerald" />
            <StatCard label="Pipeline Value" value={summary.pipelineValue} prefix="$" suffix="M" icon="dollar" trend="up" trendValue="+18%" color="purple" />
            <StatCard label="Avg Cycle Time" value={summary.avgCycleTime} suffix=" days" icon="clock" trend="down" trendValue="-3 days" color="amber" />
            <StatCard label="AI Tokens Used" value={(summary.aiTokensUsed / 1000000).toFixed(1)} suffix="M" icon="zap" color="pink" />
            <StatCard label="Total AI Cost" value={summary.totalCost} prefix="$" icon="pieChart" color="teal" />
          </div>

          {/* Charts Row */}
          <div className="grid lg:grid-cols-2 gap-6">
            {/* Proposal Trends */}
            <Card className="p-6">
              <div className="flex items-center justify-between mb-6">
                <div>
                  <h3 className="font-semibold text-white">Proposal Performance</h3>
                  <p className="text-sm text-slate-400">Submitted vs Won by month</p>
                </div>
                <div className="flex items-center gap-4 text-xs">
                  <div className="flex items-center gap-2">
                    <div className="w-3 h-3 rounded bg-slate-600" />
                    <span className="text-slate-400">Submitted</span>
                  </div>
                  <div className="flex items-center gap-2">
                    <div className="w-3 h-3 rounded bg-cyan-500" />
                    <span className="text-slate-400">Won</span>
                  </div>
                </div>
              </div>
              <BarChart data={proposalsByMonth} />
            </Card>

            {/* Agent Usage */}
            <Card className="p-6">
              <div className="flex items-center justify-between mb-6">
                <div>
                  <h3 className="font-semibold text-white">AI Agent Usage</h3>
                  <p className="text-sm text-slate-400">Interactions by agent</p>
                </div>
                <Badge variant="primary" size="sm">Last 6 months</Badge>
              </div>
              <HorizontalBarChart data={agentUsage} />
            </Card>
          </div>

          {/* Second Row */}
          <div className="grid lg:grid-cols-3 gap-6">
            {/* Wins by Agency */}
            <Card className="p-6">
              <div className="mb-6">
                <h3 className="font-semibold text-white">Performance by Agency</h3>
                <p className="text-sm text-slate-400">Win/Loss ratio</p>
              </div>
              <div className="space-y-4">
                {winsByAgency.map((item, i) => {
                  const total = item.wins + item.losses;
                  const winRate = (item.wins / total) * 100;
                  return (
                    <div key={i} className="animate-fade-in" style={{ animationDelay: `${i * 50}ms` }}>
                      <div className="flex items-center justify-between text-sm mb-1">
                        <span className="text-slate-300">{item.agency}</span>
                        <span className="text-slate-400">{item.wins}W / {item.losses}L</span>
                      </div>
                      <div className="h-2 bg-slate-700 rounded-full overflow-hidden flex">
                        <div className="h-full bg-emerald-500" style={{ width: `${winRate}%` }} />
                        <div className="h-full bg-red-500/50" style={{ width: `${100 - winRate}%` }} />
                      </div>
                    </div>
                  );
                })}
              </div>
            </Card>

            {/* Cost Breakdown */}
            <Card className="p-6">
              <div className="mb-6">
                <h3 className="font-semibold text-white">AI Cost Breakdown</h3>
                <p className="text-sm text-slate-400">Spend by category</p>
              </div>
              <DonutChart data={costBreakdown} />
            </Card>

            {/* Recent Activity */}
            <Card className="p-6">
              <div className="mb-6">
                <h3 className="font-semibold text-white">Recent Activity</h3>
                <p className="text-sm text-slate-400">Latest events</p>
              </div>
              <div className="space-y-4">
                {recentActivity.map((item, i) => (
                  <div key={i} className="flex items-start gap-3 animate-fade-in" style={{ animationDelay: `${i * 50}ms` }}>
                    <div className="w-2 h-2 mt-2 rounded-full bg-cyan-500" />
                    <div className="flex-1 min-w-0">
                      <div className="text-sm text-white">{item.action}</div>
                      <div className="text-xs text-slate-400 truncate">{item.detail}</div>
                      <div className="text-xs text-slate-500 mt-1">{item.time} • {item.user}</div>
                    </div>
                  </div>
                ))}
              </div>
            </Card>
          </div>

          {/* Agent Cost Table */}
          <Card className="p-6">
            <div className="flex items-center justify-between mb-6">
              <div>
                <h3 className="font-semibold text-white">Detailed Agent Costs</h3>
                <p className="text-sm text-slate-400">Token usage and costs by AI agent</p>
              </div>
              <Button variant="secondary" size="sm" icon="download">Export CSV</Button>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full">
                <thead>
                  <tr className="text-left text-xs text-slate-400 border-b border-slate-700">
                    <th className="pb-3 font-medium">Agent</th>
                    <th className="pb-3 font-medium text-right">Interactions</th>
                    <th className="pb-3 font-medium text-right">Tokens</th>
                    <th className="pb-3 font-medium text-right">Cost</th>
                    <th className="pb-3 font-medium text-right">Avg/Use</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-700/50">
                  {agentUsage.map((agent, i) => (
                    <tr key={i} className="text-sm animate-fade-in" style={{ animationDelay: `${i * 30}ms` }}>
                      <td className="py-3 text-white">{agent.name}</td>
                      <td className="py-3 text-right text-slate-300 font-mono">{agent.uses.toLocaleString()}</td>
                      <td className="py-3 text-right text-slate-300 font-mono">{(agent.tokens / 1000).toFixed(0)}k</td>
                      <td className="py-3 text-right text-emerald-400 font-mono">${agent.cost.toFixed(2)}</td>
                      <td className="py-3 text-right text-slate-400 font-mono">${(agent.cost / agent.uses).toFixed(3)}</td>
                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr className="text-sm font-semibold border-t border-slate-600">
                    <td className="pt-3 text-white">Total</td>
                    <td className="pt-3 text-right text-white font-mono">{agentUsage.reduce((s, a) => s + a.uses, 0).toLocaleString()}</td>
                    <td className="pt-3 text-right text-white font-mono">{(agentUsage.reduce((s, a) => s + a.tokens, 0) / 1000).toFixed(0)}k</td>
                    <td className="pt-3 text-right text-cyan-400 font-mono">${agentUsage.reduce((s, a) => s + a.cost, 0).toFixed(2)}</td>
                    <td className="pt-3 text-right text-slate-400">-</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </Card>
        </div>
      );
    };

    // Main App
    const App = () => (
      <AuthProvider>
        <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-900 to-slate-800">
          <NavigationHeader currentPage="analytics" />
          <main className="pt-20 pb-16 px-4 lg:px-6">
            <div className="max-w-7xl mx-auto">
              <AnalyticsDashboard />
            </div>
          </main>
          <LiabilityFooter />
        </div>
      </AuthProvider>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
