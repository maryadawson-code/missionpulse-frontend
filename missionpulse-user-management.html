        // Add User Modal
        function AddUserModal({ isOpen, onClose, onAdd }) {
            const [email, setEmail] = useState('');
            const [name, setName] = useState('');
            const [role, setRole] = useState('pm');

            const handleSubmit = () => {
                if (!email || !name) return;
                onAdd({ email, name, role, status: 'pending', last_login: null });
                setEmail('');
                setName('');
                setRole('pm');
                onClose();
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="glass rounded-2xl p-6 w-full max-w-md">

                        <div className="space-y-4">

                                <input

                                    className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none"

        // CSV Upload Modal
        function CSVUploadModal({ isOpen, onClose, onUpload }) {
            const [csvData, setCsvData] = useState([]);
            const [preview, setPreview] = useState([]);
            const [errors, setErrors] = useState([]);
            const fileInputRef = useRef(null);

            const parseCSV = (text) => {
                const lines = text.trim().split('\n');
                const headers = lines[0].toLowerCase().split(',').map(h => h.trim());
                
                const parsed = [];
                const errs = [];

                for (let i = 1; i < lines.length; i++) {
                    const values = lines[i].split(',').map(v => v.trim());
                    const row = {};
                    
                    headers.forEach((h, idx) => {
                        row[h] = values[idx] || '';
                    });

                    // Validate
                    if (!row.email || !row.email.includes('@')) {
                        errs.push(`Row ${i}: Invalid email`);
                    } else if (!row.name) {
                        errs.push(`Row ${i}: Missing name`);
                    } else {
                        // Normalize role
                        const roleMatch = ROLES.find(r => 
                            r.id === (row.role || '').toLowerCase() || 
                            r.name.toLowerCase() === (row.role || '').toLowerCase()
                        );
                        row.role = roleMatch?.id || 'pm';
                        row.status = 'pending';
                        parsed.push(row);
                    }
                }

                setCsvData(parsed);
                setPreview(parsed.slice(0, 5));
                setErrors(errs);
            };

            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => parseCSV(e.target.result);
                    reader.readAsText(file);
                }
            };

            const handleUpload = () => {
                onUpload(csvData);
                setCsvData([]);
                setPreview([]);
                setErrors([]);
                onClose();
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="glass rounded-2xl p-6 w-full max-w-2xl max-h-[80vh] overflow-auto">
                        <div className="flex items-center justify-between mb-6">
                            <h2 className="text-xl font-bold text-white">📤 Bulk Import Users</h2>
                            <button onClick={onClose} className="text-slate-400 hover:text-white text-2xl">×</button>
                        </div>

                        {/* Upload Zone */}
                        <div 
                            onClick={() => fileInputRef.current?.click()}
                            className="border-2 border-dashed border-slate-600 rounded-xl p-8 text-center cursor-pointer hover:border-cyan-500/50 transition-colors mb-6"
                        >
                            <div className="text-4xl mb-3">📄</div>
                            <p className="text-white font-medium">Click to upload CSV</p>
                            <p className="text-sm text-slate-400 mt-1">or drag and drop</p>
                            <input
                                ref={fileInputRef}
                                type="file"
                                accept=".csv"
                                className="hidden"
                                onChange={handleFileSelect}
                            />
                        </div>

                        {/* CSV Format Help */}
                        <div className="glass rounded-lg p-4 mb-6">
                            <h4 className="font-medium text-white mb-2">CSV Format</h4>
                            <code className="text-xs text-cyan-400 block bg-slate-900 p-2 rounded">
                                email,name,role<br/>
                                john@company.com,John Smith,PM<br/>
                                sarah@company.com,Sarah Chen,Capture Manager
                            </code>
                        </div>

                        {/* Errors */}
                        {errors.length > 0 && (
                            <div className="bg-red-500/20 border border-red-500/50 rounded-lg p-4 mb-6">
                                <h4 className="font-medium text-red-400 mb-2">⚠️ Validation Errors</h4>
                                <ul className="text-sm text-red-300 space-y-1">
                                    {errors.slice(0, 5).map((err, i) => (
                                        <li key={i}>• {err}</li>
                                    ))}
                                    {errors.length > 5 && <li>...and {errors.length - 5} more</li>}
                                </ul>
                            </div>
                        )}

                        {/* Preview */}
                        {preview.length > 0 && (
                            <div className="mb-6">
                                <h4 className="font-medium text-white mb-3">Preview ({csvData.length} users)</h4>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm">
                                        <thead>
                                            <tr className="border-b border-slate-700">
                                                <th className="text-left py-2 text-slate-400">Email</th>
                                                <th className="text-left py-2 text-slate-400">Name</th>
                                                <th className="text-left py-2 text-slate-400">Role</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {preview.map((row, i) => (
                                                <tr key={i} className="border-b border-slate-800">
                                                    <td className="py-2 text-white">{row.email}</td>
                                                    <td className="py-2 text-white">{row.name}</td>
                                                    <td className="py-2 text-cyan-400">{row.role}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                    {csvData.length > 5 && (
                                        <p className="text-sm text-slate-400 mt-2">...and {csvData.length - 5} more</p>
                                    )}
                                </div>
                            </div>
                        )}

                        <div className="flex gap-3">
                            <button
                                onClick={onClose}
                                className="flex-1 px-4 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-lg font-medium transition-colors"
                            >
                                Cancel
                            </button>
                            <button
                                onClick={handleUpload}
                                disabled={csvData.length === 0}
                                className="flex-1 px-4 py-3 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                            >
                                Import {csvData.length} Users
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // =========================================================================
        // MAIN APP
        // =========================================================================
        function App() {
            const [users, setUsers] = useState(DEMO_USERS);
            const [searchQuery, setSearchQuery] = useState('');
            const [filterRole, setFilterRole] = useState('all');
            const [showAddModal, setShowAddModal] = useState(false);
            const [showCSVModal, setShowCSVModal] = useState(false);
            const [isOnline, setIsOnline] = useState(true);

            // Filter users
            const filteredUsers = users.filter(u => {
                const matchesSearch = u.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                     u.email.toLowerCase().includes(searchQuery.toLowerCase());
                const matchesRole = filterRole === 'all' || u.role === filterRole;
                return matchesSearch && matchesRole;
            });

            // Add single user
            const handleAddUser = (newUser) => {
                setUsers(prev => [...prev, { ...newUser, id: `u${Date.now()}` }]);
            };

            // Bulk add from CSV
            const handleCSVUpload = (csvUsers) => {
                const newUsers = csvUsers.map((u, i) => ({ ...u, id: `csv${Date.now()}-${i}` }));
                setUsers(prev => [...prev, ...newUsers]);
            };

            // Delete user
            const handleDelete = (user) => {
                if (confirm(`Remove ${user.name} from the team?`)) {
                    setUsers(prev => prev.filter(u => u.id !== user.id));
                }
            };

            // Stats
            const activeCount = users.filter(u => u.status === 'active').length;
            const pendingCount = users.filter(u => u.status === 'pending').length;

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="glass border-b border-slate-700 px-6 py-4 sticky top-0 z-20">

                            <div className="flex items-center gap-4">
                                <a href="missionpulse-dashboard-hub.html" className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-500 to-emerald-500 flex items-center justify-center">
                                        <span className="text-xl">👥</span>
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-bold text-white">User Management</h1>
                                        <p className="text-xs text-slate-500">Manage team members and roles</p>
                                    </div>
                                </a>
                            </div>
                            <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-xs ${
                                isOnline ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'
                            }`}>
                                <div className={`w-2 h-2 rounded-full ${isOnline ? 'bg-emerald-400' : 'bg-amber-400'}`} />
                                {isOnline ? 'Online' : 'Demo Mode'}
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-6 py-8">
                        {/* Stats */}
                        <div className="grid grid-cols-4 gap-4 mb-8">
                            <div className="glass p-4 rounded-xl text-center">
                                <div className="text-3xl font-bold text-cyan-400">{users.length}</div>
                                <div className="text-sm text-slate-400">Total Users</div>
                            </div>
                            <div className="glass p-4 rounded-xl text-center">
                                <div className="text-3xl font-bold text-emerald-400">{activeCount}</div>
                                <div className="text-sm text-slate-400">Active</div>
                            </div>
                            <div className="glass p-4 rounded-xl text-center">
                                <div className="text-3xl font-bold text-amber-400">{pendingCount}</div>
                                <div className="text-sm text-slate-400">Pending</div>
                            </div>
                            <div className="glass p-4 rounded-xl text-center">
                                <div className="text-3xl font-bold text-purple-400">{ROLES.length}</div>
                                <div className="text-sm text-slate-400">Roles</div>
                            </div>
                        </div>

                        {/* Actions Bar */}
                        <div className="glass rounded-xl p-4 mb-6">
                            <div className="flex flex-wrap items-center gap-4">
                                {/* Search */}
                                <div className="flex-1 min-w-[200px]">
                                    <input
                                        type="text"
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        placeholder="Search by name or email..."
                                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none"
                                    />
                                </div>

                                {/* Role Filter */}
                                <select
                                    value={filterRole}
                                    onChange={(e) => setFilterRole(e.target.value)}
                                    className="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none"
                                >
                                    <option value="all">All Roles</option>
                                    {ROLES.map(r => (
                                        <option key={r.id} value={r.id}>{r.name}</option>
                                    ))}
                                </select>

                                {/* Actions */}
                                <button
                                    onClick={() => setShowCSVModal(true)}
                                    className="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg font-medium transition-colors flex items-center gap-2"
                                >
                                    📤 Import CSV
                                </button>
                                <button
                                    onClick={() => setShowAddModal(true)}
                                    className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg font-medium transition-colors flex items-center gap-2"
                                >
                                    ➕ Add User
                                </button>
                            </div>
                        </div>

                        {/* Users Table */}
                        <div className="glass rounded-xl overflow-hidden">
                            <table className="w-full">
                                <thead className="bg-slate-800/50">
                                    <tr>
                                        <th className="px-4 py-3 text-left text-sm font-medium text-slate-400">User</th>
                                        <th className="px-4 py-3 text-left text-sm font-medium text-slate-400">Role</th>
                                        <th className="px-4 py-3 text-left text-sm font-medium text-slate-400">Status</th>
                                        <th className="px-4 py-3 text-left text-sm font-medium text-slate-400">Last Login</th>
                                        <th className="px-4 py-3 text-left text-sm font-medium text-slate-400">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredUsers.map(user => (
                                        <UserRow
                                            key={user.id}
                                            user={user}
                                            onEdit={() => {}}
                                            onDelete={handleDelete}
                                            onResendInvite={() => alert(`Invite resent to ${user.email}`)}
                                        />
                                    ))}
                                </tbody>
                            </table>
                            {filteredUsers.length === 0 && (
                                <div className="p-8 text-center text-slate-400">
                                    No users found matching your criteria.
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Modals */}
                    <AddUserModal
                        isOpen={showAddModal}
                        onClose={() => setShowAddModal(false)}
                        onAdd={handleAddUser}
                    />
                    <CSVUploadModal
                        isOpen={showCSVModal}
                        onClose={() => setShowCSVModal(false)}
                        onUpload={handleCSVUpload}
