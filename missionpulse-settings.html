<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | MissionPulse</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.1); }
    .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    // Toggle Switch Component
    const Toggle = ({ enabled, onChange, label, description }) => (
      <div className="flex items-center justify-between py-3">
        <div>
          <p className="font-medium text-white">{label}</p>
          {description && <p className="text-sm text-slate-400">{description}</p>}
        </div>
        <button
          onClick={() => onChange(!enabled)}
          className={`relative w-12 h-6 rounded-full transition-colors ${enabled ? 'bg-cyan-500' : 'bg-slate-700'}`}
        >
          <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-transform ${enabled ? 'left-7' : 'left-1'}`}></div>
        </button>
      </div>
    );

    function Settings() {
      const [activeTab, setActiveTab] = useState('company');
      
      // Company Settings
      const [companyName, setCompanyName] = useState('Mission Meets Tech');
      const [companyEmail, setCompanyEmail] = useState('contact@missionmeetstech.com');
      const [companyPhone, setCompanyPhone] = useState('(555) 123-4567');
      const [companyAddress, setCompanyAddress] = useState('123 Innovation Drive, Tech City, TC 12345');
      const [dunsNumber, setDunsNumber] = useState('123456789');
      const [cageCode, setCageCode] = useState('1ABC2');
      const [uei, setUei] = useState('ABCD1234EFGH');

      // Notification Settings
      const [emailNotifications, setEmailNotifications] = useState(true);
      const [slackNotifications, setSlackNotifications] = useState(false);
      const [deadlineReminders, setDeadlineReminders] = useState(true);
      const [teamUpdates, setTeamUpdates] = useState(true);
      const [aiAlerts, setAiAlerts] = useState(true);

      // Security Settings
      const [mfaEnabled, setMfaEnabled] = useState(true);
      const [sessionTimeout, setSessionTimeout] = useState('30');
      const [ipWhitelist, setIpWhitelist] = useState(false);
      const [auditLogging, setAuditLogging] = useState(true);
      const [cuiProtection, setCuiProtection] = useState(true);

      // Feature Flags
      const [aiAgents, setAiAgents] = useState(true);
      const [blackHatModule, setBlackHatModule] = useState(true);
      const [partnerAccess, setPartnerAccess] = useState(true);
      const [betaFeatures, setBetaFeatures] = useState(false);

      const tabs = [
        { id: 'company', label: 'Company Profile', icon: '🏢' },
        { id: 'notifications', label: 'Notifications', icon: '🔔' },
        { id: 'security', label: 'Security', icon: '🔐' },
        { id: 'features', label: 'Features', icon: '⚡' },
        { id: 'billing', label: 'Billing', icon: '💳' },
      ];

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
            <div className="max-w-[1400px] mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="missionpulse-nav-hub.html" className="text-slate-400 hover:text-white transition-colors">
                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
                    </svg>
                  </a>
                  <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-slate-500 to-slate-700 flex items-center justify-center">
                    <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold text-white">Settings</h1>
                    <p className="text-xs text-slate-400">Organization Configuration</p>
                  </div>
                </div>
                <button className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white text-sm font-medium rounded-lg hover:from-cyan-400 hover:to-teal-400 transition-all">
                  Save Changes
                </button>
              </div>
            </div>
          </header>

          <div className="max-w-[1400px] mx-auto px-6 py-8">
            <div className="flex gap-8">
              {/* Sidebar */}
              <div className="w-64 flex-shrink-0">
                <nav className="space-y-1">
                  {tabs.map(tab => (
                    <button
                      key={tab.id}
                      onClick={() => setActiveTab(tab.id)}
                      className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition-all ${
                        activeTab === tab.id 
                          ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' 
                          : 'text-slate-400 hover:bg-slate-800/50'
                      }`}
                    >
                      <span className="text-lg">{tab.icon}</span>
                      <span className="font-medium">{tab.label}</span>
                    </button>
                  ))}
                </nav>
              </div>

              {/* Content */}
              <div className="flex-1">
                {activeTab === 'company' && (
                  <div className="space-y-6">
                    <div className="glass-card rounded-xl p-6">
                      <h2 className="text-lg font-semibold text-white mb-6">Company Information</h2>
                      <div className="grid grid-cols-2 gap-6">
                        <div>
                          <label className="block text-sm font-medium text-slate-300 mb-2">Company Name</label>
                          <input
                            type="text"
                            value={companyName}
                            onChange={(e) => setCompanyName(e.target.value)}
                            className="w-full px-4 py-2.5 bg-slate-800/50 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-cyan-500/50"
                          />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-slate-300 mb-2">Email</label>
                          <input
                            type="email"
                            value={companyEmail}
                            onChange={(e) => setCompanyEmail(e.target.value)}
                            className="w-full px-4 py-2.5 bg-slate-800/50 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-cyan-500/50"
                          />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-slate-300 mb-2">Phone</label>
                          <input
                            type="tel"
                            value={companyPhone}
                            onChange={(e) => setCompanyPhone(e.target.value)}
                            className="w-full px-4 py-2.5 bg-slate-800/50 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-cyan-500/50"
                          />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-slate-300 mb-2">Address</label>
                          <input
                            type="text"
                            value={companyAddress}
                            onChange={(e) => setCompanyAddress(e.target.value)}
                            className="w-full px-4 py-2.5 bg-slate-800/50 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-cyan-500/50"
                          />
                        </div>
                      </div>
                    </div>

                    <div className="glass-card rounded-xl p-6">
                      <h2 className="text-lg font-semibold text-white mb-6">Federal Registration</h2>
                      <div className="grid grid-cols-3 gap-6">
                        <div>
                          <label className="block text-sm font-medium text-slate-300 mb-2">DUNS Number</label>
                          <input
                            type="text"
                            value={dunsNumber}
                            onChange={(e) => setDunsNumber(e.target.value)}
                            className="w-full px-4 py-2.5 bg-slate-800/50 border border-slate-700 rounded-xl text-white font-mono focus:outline-none focus:border-cyan-500/50"
                          />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-slate-300 mb-2">CAGE Code</label>
                          <input
                            type="text"
                            value={cageCode}
                            onChange={(e) => setCageCode(e.target.value)}
                            className="w-full px-4 py-2.5 bg-slate-800/50 border border-slate-700 rounded-xl text-white font-mono focus:outline-none focus:border-cyan-500/50"
                          />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-slate-300 mb-2">UEI</label>
                          <input
                            type="text"
                            value={uei}
                            onChange={(e) => setUei(e.target.value)}
                            className="w-full px-4 py-2.5 bg-slate-800/50 border border-slate-700 rounded-xl text-white font-mono focus:outline-none focus:border-cyan-500/50"
                          />
                        </div>
                      </div>
                    </div>

                    <div className="glass-card rounded-xl p-6">
                      <h2 className="text-lg font-semibold text-white mb-6">Branding</h2>
                      <div className="flex items-center gap-6">
                        <div className="w-24 h-24 rounded-xl bg-gradient-to-br from-cyan-500 to-teal-600 flex items-center justify-center">
                          <span className="text-3xl font-bold text-white">MMT</span>
                        </div>
                        <div>
                          <button className="px-4 py-2 bg-slate-800/50 border border-slate-700 rounded-lg text-sm text-slate-300 hover:border-cyan-500/50 transition-all">
                            Upload Logo
                          </button>
                          <p className="text-xs text-slate-500 mt-2">PNG, JPG up to 2MB. Recommended 200x200px</p>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'notifications' && (
                  <div className="glass-card rounded-xl p-6">
                    <h2 className="text-lg font-semibold text-white mb-6">Notification Preferences</h2>
                    <div className="divide-y divide-slate-700/50">
                      <Toggle 
                        enabled={emailNotifications} 
                        onChange={setEmailNotifications}
                        label="Email Notifications"
                        description="Receive important updates via email"
                      />
                      <Toggle 
                        enabled={slackNotifications} 
                        onChange={setSlackNotifications}
                        label="Slack Integration"
                        description="Send notifications to your Slack workspace"
                      />
                      <Toggle 
                        enabled={deadlineReminders} 
                        onChange={setDeadlineReminders}
                        label="Deadline Reminders"
                        description="Get reminded about upcoming submission deadlines"
                      />
                      <Toggle 
                        enabled={teamUpdates} 
                        onChange={setTeamUpdates}
                        label="Team Activity Updates"
                        description="Notify when team members complete tasks"
                      />
                      <Toggle 
                        enabled={aiAlerts} 
                        onChange={setAiAlerts}
                        label="AI Agent Alerts"
                        description="Notifications when AI agents complete analysis"
                      />
                    </div>
                  </div>
                )}

                {activeTab === 'security' && (
                  <div className="space-y-6">
                    <div className="glass-card rounded-xl p-6">
                      <h2 className="text-lg font-semibold text-white mb-6">Authentication</h2>
                      <div className="divide-y divide-slate-700/50">
                        <Toggle 
                          enabled={mfaEnabled} 
                          onChange={setMfaEnabled}
                          label="Two-Factor Authentication"
                          description="Require MFA for all users"
                        />
                        <div className="py-3">
                          <div className="flex items-center justify-between">
                            <div>
                              <p className="font-medium text-white">Session Timeout</p>
                              <p className="text-sm text-slate-400">Auto-logout after inactivity</p>
                            </div>
                            <select
                              value={sessionTimeout}
                              onChange={(e) => setSessionTimeout(e.target.value)}
                              className="px-4 py-2 bg-slate-800/50 border border-slate-700 rounded-lg text-white focus:outline-none"
                            >
                              <option value="15">15 minutes</option>
                              <option value="30">30 minutes</option>
                              <option value="60">1 hour</option>
                              <option value="120">2 hours</option>
                            </select>
                          </div>
                        </div>
                        <Toggle 
                          enabled={ipWhitelist} 
                          onChange={setIpWhitelist}
                          label="IP Whitelist"
                          description="Restrict access to approved IP addresses"
                        />
                      </div>
                    </div>

                    <div className="glass-card rounded-xl p-6">
                      <h2 className="text-lg font-semibold text-white mb-6">Compliance</h2>
                      <div className="divide-y divide-slate-700/50">
                        <Toggle 
                          enabled={auditLogging} 
                          onChange={setAuditLogging}
                          label="Audit Logging"
                          description="Log all user actions for CMMC 2.0 compliance"
                        />
                        <Toggle 
                          enabled={cuiProtection} 
                          onChange={setCuiProtection}
                          label="CUI Protection"
                          description="Mark and protect Controlled Unclassified Information"
                        />
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'features' && (
                  <div className="glass-card rounded-xl p-6">
                    <h2 className="text-lg font-semibold text-white mb-6">Feature Toggles</h2>
                    <div className="divide-y divide-slate-700/50">
                      <Toggle 
                        enabled={aiAgents} 
                        onChange={setAiAgents}
                        label="AI Agents"
                        description="Enable AI-powered analysis and recommendations"
                      />
                      <Toggle 
                        enabled={blackHatModule} 
                        onChange={setBlackHatModule}
                        label="Black Hat Analysis"
                        description="Competitive intelligence module (RBAC restricted)"
                      />
                      <Toggle 
                        enabled={partnerAccess} 
                        onChange={setPartnerAccess}
                        label="Partner Portal"
                        description="Allow external partners limited access"
                      />
                      <Toggle 
                        enabled={betaFeatures} 
                        onChange={setBetaFeatures}
                        label="Beta Features"
                        description="Early access to new features (may be unstable)"
                      />
                    </div>
                  </div>
                )}

                {activeTab === 'billing' && (
                  <div className="space-y-6">
                    <div className="glass-card rounded-xl p-6">
                      <div className="flex items-center justify-between mb-6">
                        <h2 className="text-lg font-semibold text-white">Current Plan</h2>
                        <span className="px-3 py-1 bg-cyan-500/20 text-cyan-400 text-sm rounded-full border border-cyan-500/30">
                          Enterprise
                        </span>
                      </div>
                      <div className="grid grid-cols-3 gap-6 mb-6">
                        <div>
                          <p className="text-sm text-slate-400">Monthly Cost</p>
                          <p className="text-2xl font-bold text-white">$2,499</p>
                        </div>
                        <div>
                          <p className="text-sm text-slate-400">Users Included</p>
                          <p className="text-2xl font-bold text-white">25</p>
                        </div>
                        <div>
                          <p className="text-sm text-slate-400">Next Billing</p>
                          <p className="text-2xl font-bold text-white">Mar 1</p>
                        </div>
                      </div>
                      <button className="px-4 py-2 bg-slate-800/50 border border-slate-700 rounded-lg text-sm text-slate-300 hover:border-cyan-500/50 transition-all">
                        Manage Subscription
                      </button>
                    </div>

                    <div className="glass-card rounded-xl p-6">
                      <h2 className="text-lg font-semibold text-white mb-4">Usage This Month</h2>
                      <div className="space-y-4">
                        <div>
                          <div className="flex justify-between text-sm mb-1">
                            <span className="text-slate-400">AI Agent Calls</span>
                            <span className="text-white">847 / 2,000</span>
                          </div>
                          <div className="w-full bg-slate-700 rounded-full h-2">
                            <div className="bg-cyan-500 h-2 rounded-full" style={{ width: '42%' }}></div>
                          </div>
                        </div>
                        <div>
                          <div className="flex justify-between text-sm mb-1">
                            <span className="text-slate-400">Document Storage</span>
                            <span className="text-white">12.4 GB / 50 GB</span>
                          </div>
                          <div className="w-full bg-slate-700 rounded-full h-2">
                            <div className="bg-emerald-500 h-2 rounded-full" style={{ width: '25%' }}></div>
                          </div>
                        </div>
                        <div>
                          <div className="flex justify-between text-sm mb-1">
                            <span className="text-slate-400">Active Opportunities</span>
                            <span className="text-white">12 / Unlimited</span>
                          </div>
                          <div className="w-full bg-slate-700 rounded-full h-2">
                            <div className="bg-purple-500 h-2 rounded-full" style={{ width: '100%' }}></div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Settings />);
  </script>
</body>
</html>
