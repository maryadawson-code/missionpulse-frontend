<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Version History - MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyan: { 400: '#00E5FA', 500: '#00C4D4', 600: '#00A3B4' },
                        navy: { 900: '#00050F', 800: '#000A1A', 700: '#001025' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: linear-gradient(135deg, #00050F 0%, #001025 50%, #00050F 100%); }
        .glass { background: rgba(0, 229, 250, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.1); }
    </style>
</head>
<body class="min-h-screen text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc4MzQ0NjIsImV4cCI6MjA1MzQxMDQ2Mn0.zKdMYwjn6Gj9p1fY-4kWxLsYwBvmFg6I9-OxFJJx-V4';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const DEMO_DOCUMENTS = [
            { id: '1', name: 'Technical Volume - DHA EHRM', type: 'tech_volume', opportunity: 'DHA EHRM Support', versions: 8, last_updated: '2025-01-31T16:30:00Z' },
            { id: '2', name: 'Management Volume', type: 'mgmt_volume', opportunity: 'DHA EHRM Support', versions: 6, last_updated: '2025-01-30T14:15:00Z' },
            { id: '3', name: 'Cost Volume', type: 'pricing', opportunity: 'DHA EHRM Support', versions: 12, last_updated: '2025-02-01T09:45:00Z' },
            { id: '4', name: 'Executive Summary', type: 'exec_summary', opportunity: 'VA Telehealth', versions: 4, last_updated: '2025-01-28T11:00:00Z' },
            { id: '5', name: 'Past Performance Volume', type: 'past_perf', opportunity: 'VA Telehealth', versions: 3, last_updated: '2025-01-27T16:00:00Z' }
        ];

        const DEMO_VERSIONS = {
            '1': [
                { id: 'v8', version_number: 8, version_label: 'Final Submission', created_by: 'Mary Womack', created_at: '2025-01-31T16:30:00Z', file_size: 2450000, is_milestone: true, changes_summary: 'Final review comments addressed, compliance matrix verified' },
                { id: 'v7', version_number: 7, version_label: 'Gold Team', created_by: 'Sarah Chen', created_at: '2025-01-30T14:00:00Z', file_size: 2420000, is_milestone: true, changes_summary: 'Gold team review complete, executive summary refined' },
                { id: 'v6', version_number: 6, version_label: 'Red Team Rev 2', created_by: 'John Smith', created_at: '2025-01-28T10:30:00Z', file_size: 2380000, is_milestone: false, changes_summary: 'Addressed red team action items 15-28' },
                { id: 'v5', version_number: 5, version_label: 'Red Team', created_by: 'Mary Womack', created_at: '2025-01-25T16:45:00Z', file_size: 2350000, is_milestone: true, changes_summary: 'Red team review submission' },
                { id: 'v4', version_number: 4, version_label: 'Pink Team Rev 2', created_by: 'John Smith', created_at: '2025-01-22T09:15:00Z', file_size: 2100000, is_milestone: false, changes_summary: 'Incorporated pink team feedback' },
                { id: 'v3', version_number: 3, version_label: 'Pink Team', created_by: 'Sarah Chen', created_at: '2025-01-18T14:30:00Z', file_size: 1850000, is_milestone: true, changes_summary: 'Pink team review submission' },
                { id: 'v2', version_number: 2, version_label: 'Draft 2', created_by: 'Mary Womack', created_at: '2025-01-15T11:00:00Z', file_size: 1500000, is_milestone: false, changes_summary: 'Initial content complete' },
                { id: 'v1', version_number: 1, version_label: 'Draft 1', created_by: 'Mary Womack', created_at: '2025-01-10T09:00:00Z', file_size: 850000, is_milestone: false, changes_summary: 'Initial draft created from template' }
            ],
            '3': [
                { id: 'v12', version_number: 12, version_label: 'Final Submission', created_by: 'Mike Johnson', created_at: '2025-02-01T09:45:00Z', file_size: 1850000, is_milestone: true, changes_summary: 'Final pricing adjustments per CEO approval' },
                { id: 'v11', version_number: 11, version_label: 'CEO Review', created_by: 'Mary Womack', created_at: '2025-01-31T15:00:00Z', file_size: 1820000, is_milestone: true, changes_summary: 'CEO pricing review complete' },
                { id: 'v10', version_number: 10, version_label: 'Competitive Adj', created_by: 'Mike Johnson', created_at: '2025-01-30T10:00:00Z', file_size: 1800000, is_milestone: false, changes_summary: 'Competitive pricing adjustments' }
            ]
        };

        function VersionHistory() {
            const [documents, setDocuments] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedDoc, setSelectedDoc] = useState(null);
            const [versions, setVersions] = useState([]);
            const [filterType, setFilterType] = useState('all');
            const [compareMode, setCompareMode] = useState(false);
            const [compareVersions, setCompareVersions] = useState([]);

            useEffect(() => {
                loadDocuments();
            }, []);

            async function loadDocuments() {
                try {
                    const { data, error } = await supabase.from('document_versions').select('*').order('created_at', { ascending: false });
                    if (error) throw error;
                    if (data?.length) {
                        const grouped = data.reduce((acc, v) => {
                            if (!acc[v.document_id]) acc[v.document_id] = { id: v.document_id, name: v.document_type, type: v.document_type, versions: 0, last_updated: v.created_at };
                            acc[v.document_id].versions++;
                            return acc;
                        }, {});
                        setDocuments(Object.values(grouped));
                    } else {
                        setDocuments(DEMO_DOCUMENTS);
                    }
                } catch (err) {
                    console.log('Using demo data:', err.message);
                    setDocuments(DEMO_DOCUMENTS);
                }
                setLoading(false);
            }

            function selectDocument(doc) {
                setSelectedDoc(doc);
                setVersions(DEMO_VERSIONS[doc.id] || []);
                setCompareMode(false);
                setCompareVersions([]);
            }

            function toggleCompareVersion(versionId) {
                if (compareVersions.includes(versionId)) {
                    setCompareVersions(prev => prev.filter(v => v !== versionId));
                } else if (compareVersions.length < 2) {
                    setCompareVersions(prev => [...prev, versionId]);
                }
            }

            function formatFileSize(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            }

            function formatDate(dateStr) {
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            }

            function getTypeIcon(type) {
                const icons = { tech_volume: 'fa-microchip', mgmt_volume: 'fa-sitemap', pricing: 'fa-dollar-sign', past_perf: 'fa-history', exec_summary: 'fa-file-contract', proposal: 'fa-file-alt' };
                return icons[type] || 'fa-file';
            }

            const filteredDocs = documents.filter(d => filterType === 'all' || d.type === filterType);

            return (
                <div className="min-h-screen p-6">
                    <div className="max-w-7xl mx-auto">
                        {/* Header */}
                        <div className="flex items-center justify-between mb-6">
                            <div className="flex items-center gap-4">
                                <a href="index.html" className="text-cyan-400 hover:text-cyan-300"><i className="fas fa-arrow-left"></i></a>
                                <div><h1 className="text-3xl font-bold">Version History</h1><p className="text-gray-400">Track changes and compare document versions</p></div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            {/* Document List */}
                            <div className="lg:col-span-1">
                                <div className="glass rounded-xl p-4 mb-4">
                                    <select value={filterType} onChange={e => setFilterType(e.target.value)} className="w-full bg-navy-800 border border-cyan-500/30 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-400">
                                        <option value="all">All Document Types</option>
                                        <option value="tech_volume">Technical Volume</option>
                                        <option value="mgmt_volume">Management Volume</option>
                                        <option value="pricing">Pricing</option>
                                        <option value="past_perf">Past Performance</option>
                                        <option value="exec_summary">Executive Summary</option>
                                    </select>
                                </div>

                                <div className="glass rounded-xl p-4">
                                    <h2 className="font-semibold mb-4">Documents ({filteredDocs.length})</h2>
                                    {loading ? (
                                        <div className="text-center py-8"><i className="fas fa-spinner fa-spin text-cyan-400"></i></div>
                                    ) : (
                                        <div className="space-y-2">
                                            {filteredDocs.map(doc => (
                                                <button key={doc.id} onClick={() => selectDocument(doc)} className={`w-full text-left p-3 rounded-lg transition-all ${selectedDoc?.id === doc.id ? 'bg-cyan-500/20 border border-cyan-500/50' : 'bg-navy-800/50 hover:bg-cyan-500/10'}`}>
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-10 h-10 flex items-center justify-center bg-cyan-500/20 text-cyan-400 rounded-lg">
                                                            <i className={`fas ${getTypeIcon(doc.type)}`}></i>
                                                        </div>
                                                        <div className="flex-1 min-w-0">
                                                            <div className="font-medium truncate">{doc.name}</div>
                                                            <div className="text-xs text-gray-400">{doc.opportunity}</div>
                                                        </div>
                                                        <div className="text-right">
                                                            <div className="text-sm text-cyan-400">{doc.versions} versions</div>
                                                        </div>
                                                    </div>
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Version Timeline */}
                            <div className="lg:col-span-2">
                                {selectedDoc ? (
                                    <>
                                        <div className="glass rounded-xl p-4 mb-4">
                                            <div className="flex items-center justify-between">
                                                <div>
                                                    <h2 className="text-xl font-semibold">{selectedDoc.name}</h2>
                                                    <p className="text-sm text-gray-400">{selectedDoc.opportunity} • {versions.length} versions</p>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <button onClick={() => setCompareMode(!compareMode)} className={`px-4 py-2 rounded-lg transition-all ${compareMode ? 'bg-cyan-500 text-white' : 'glass hover:bg-cyan-500/20'}`}>
                                                        <i className="fas fa-code-compare mr-2"></i>Compare
                                                    </button>
                                                    {compareMode && compareVersions.length === 2 && (
                                                        <button className="px-4 py-2 bg-green-500 hover:bg-green-600 rounded-lg">
                                                            <i className="fas fa-eye mr-2"></i>View Diff
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                            {compareMode && (
                                                <div className="mt-3 p-3 bg-cyan-500/10 rounded-lg text-sm">
                                                    <i className="fas fa-info-circle mr-2 text-cyan-400"></i>
                                                    Select 2 versions to compare ({compareVersions.length}/2 selected)
                                                </div>
                                            )}
                                        </div>

                                        <div className="glass rounded-xl p-4">
                                            <div className="relative">
                                                {/* Timeline line */}
                                                <div className="absolute left-6 top-0 bottom-0 w-0.5 bg-cyan-500/20"></div>

                                                <div className="space-y-4">
                                                    {versions.map((version, index) => (
                                                        <div key={version.id} className={`relative pl-14 ${compareMode ? 'cursor-pointer' : ''}`} onClick={() => compareMode && toggleCompareVersion(version.id)}>
                                                            {/* Timeline dot */}
                                                            <div className={`absolute left-4 w-5 h-5 rounded-full border-2 ${version.is_milestone ? 'bg-cyan-500 border-cyan-400' : 'bg-navy-800 border-cyan-500/50'} ${compareVersions.includes(version.id) ? 'ring-2 ring-green-400' : ''}`}></div>

                                                            <div className={`p-4 rounded-lg transition-all ${compareVersions.includes(version.id) ? 'bg-green-500/20 border border-green-500/50' : version.is_milestone ? 'bg-cyan-500/10 border border-cyan-500/30' : 'bg-navy-800/50 hover:bg-cyan-500/5'}`}>
                                                                <div className="flex items-start justify-between mb-2">
                                                                    <div>
                                                                        <div className="flex items-center gap-2">
                                                                            <span className="font-semibold">v{version.version_number}</span>
                                                                            {version.version_label && (<span className="px-2 py-0.5 bg-cyan-500/20 text-cyan-400 text-xs rounded">{version.version_label}</span>)}
                                                                            {version.is_milestone && (<span className="px-2 py-0.5 bg-yellow-500/20 text-yellow-400 text-xs rounded"><i className="fas fa-flag mr-1"></i>Milestone</span>)}
                                                                        </div>
                                                                        <p className="text-sm text-gray-400 mt-1">{version.changes_summary}</p>
                                                                    </div>
                                                                    {!compareMode && (
                                                                        <div className="flex items-center gap-2">
                                                                            <button className="p-2 text-gray-400 hover:text-cyan-400 rounded" title="Download"><i className="fas fa-download"></i></button>
                                                                            <button className="p-2 text-gray-400 hover:text-cyan-400 rounded" title="Restore"><i className="fas fa-undo"></i></button>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                                <div className="flex items-center gap-4 text-xs text-gray-500">
                                                                    <span><i className="fas fa-user mr-1"></i>{version.created_by}</span>
                                                                    <span><i className="fas fa-clock mr-1"></i>{formatDate(version.created_at)}</span>
                                                                    <span><i className="fas fa-file mr-1"></i>{formatFileSize(version.file_size)}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </>
                                ) : (
                                    <div className="glass rounded-xl p-12 text-center">
                                        <i className="fas fa-history text-5xl text-gray-500 mb-4"></i>
                                        <h3 className="text-xl font-semibold mb-2">Select a Document</h3>
                                        <p className="text-gray-400">Choose a document from the list to view its version history</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<VersionHistory />, document.getElementById('root'));
    </script>
</body>
</html>
