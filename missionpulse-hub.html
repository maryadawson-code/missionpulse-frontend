<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Module Hub</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.1); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ═══════════════════════════════════════════════════════════════════
    // MODULE CONFIGURATION
    // ═══════════════════════════════════════════════════════════════════
    const MODULE_CATEGORIES = {
      capture: {
        name: 'Capture & Strategy',
        icon: '🎯',
        color: '#00E5FA',
        modules: [
          { id: 'dashboard', name: 'Dashboard', desc: 'Pipeline overview & metrics', href: 'missionpulse-dashboard-v2.html', status: 'live' },
          { id: 'pipeline', name: 'Pipeline', desc: 'Opportunity tracking', href: 'missionpulse-pipeline-v2.html', status: 'live' },
          { id: 'warroom', name: 'War Room', desc: 'Proposal command center', href: 'missionpulse-warroom-v2.html', status: 'live' },
          { id: 'swimlane', name: 'Swimlane', desc: 'Task management board', href: 'missionpulse-swimlane-v2.html', status: 'live' },
        ]
      },
      intelligence: {
        name: 'Intelligence & Analysis',
        icon: '🔍',
        color: '#8B5CF6',
        modules: [
          { id: 'rfp', name: 'RFP Shredder', desc: 'Requirements extraction', href: 'missionpulse-rfp-v2.html', status: 'live' },
          { id: 'blackhat', name: 'Black Hat', desc: 'Competitive analysis', href: 'missionpulse-blackhat-v2.html', status: 'live', rbac: ['CEO', 'COO', 'CAP'] },
          { id: 'frenemy', name: 'Frenemy Protocol', desc: 'Teaming & competitors', href: 'missionpulse-frenemy-v2.html', status: 'live' },
          { id: 'contracts', name: 'Contract Scanner', desc: 'FAR/DFARS analysis', href: 'missionpulse-contracts-v2.html', status: 'live' },
        ]
      },
      production: {
        name: 'Proposal Production',
        icon: '✍️',
        color: '#22C55E',
        modules: [
          { id: 'irondome', name: 'Iron Dome', desc: 'Section writer & CUI', href: 'missionpulse-irondome-v2.html', status: 'live' },
          { id: 'compliance', name: 'Compliance Matrix', desc: 'Requirements tracking', href: 'missionpulse-compliance-v2.html', status: 'live' },
          { id: 'winthemes', name: 'Win Themes', desc: 'Theme development', href: 'missionpulse-winthemes-v2.html', status: 'live' },
          { id: 'pricing', name: 'Pricing Engine', desc: 'BOE & cost modeling', href: 'missionpulse-pricing-v2.html', status: 'live', cui: true },
        ]
      },
      review: {
        name: 'Review & Quality',
        icon: '✅',
        color: '#F59E0B',
        modules: [
          { id: 'hitl', name: 'HITL Queue', desc: 'Human review workflow', href: 'missionpulse-hitl-v2.html', status: 'live' },
          { id: 'orals', name: 'Orals Studio', desc: 'Presentation builder', href: 'missionpulse-orals-v2.html', status: 'live' },
          { id: 'lessons', name: 'Lessons Learned', desc: 'Knowledge capture', href: 'missionpulse-lessons-v2.html', status: 'live' },
        ]
      },
      operations: {
        name: 'Operations & Admin',
        icon: '⚙️',
        color: '#EC4899',
        modules: [
          { id: 'audit', name: 'Audit Log', desc: 'Activity tracking', href: 'missionpulse-audit-v2.html', status: 'live' },
          { id: 'postaward', name: 'Post-Award', desc: 'Transition management', href: 'missionpulse-postaward-v2.html', status: 'live' },
          { id: 'settings', name: 'Settings', desc: 'System configuration', href: 'missionpulse-settings-v2.html', status: 'live' },
          { id: 'integrations', name: 'AI Integrations', desc: 'AskSage & Anthropic', href: 'missionpulse-integrations-v2.html', status: 'live', new: true },
        ]
      },
      legacy: {
        name: 'Demo & Legacy',
        icon: '📦',
        color: '#6B7280',
        modules: [
          { id: 'demo', name: 'Partner Demo', desc: 'Interactive showcase', href: 'index.html', status: 'live' },
          { id: 'production', name: 'Full Production', desc: 'All-in-one module', href: 'missionpulse-v12-PRODUCTION.html', status: 'live' },
          { id: 'agenthub', name: 'Agent Hub', desc: 'AI agent interface', href: 'missionpulse-agent-hub.html', status: 'live' },
        ]
      }
    };

    // ═══════════════════════════════════════════════════════════════════
    // ICONS
    // ═══════════════════════════════════════════════════════════════════
    const Icons = {
      shield: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
      lock: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>,
      external: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
      star: () => <svg className="w-full h-full" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>,
      zap: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    // ═══════════════════════════════════════════════════════════════════
    // MAIN COMPONENT
    // ═══════════════════════════════════════════════════════════════════
    function ModuleHub() {
      const [searchQuery, setSearchQuery] = useState('');
      const [userRole, setUserRole] = useState('CEO');

      // Filter modules by search
      const filterModules = (modules) => {
        if (!searchQuery) return modules;
        return modules.filter(m => 
          m.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
          m.desc.toLowerCase().includes(searchQuery.toLowerCase())
        );
      };

      // Check RBAC
      const hasAccess = (module) => {
        if (!module.rbac) return true;
        return module.rbac.includes(userRole);
      };

      // Count stats
      const totalModules = Object.values(MODULE_CATEGORIES).reduce((sum, cat) => sum + cat.modules.length, 0);
      const liveModules = Object.values(MODULE_CATEGORIES).reduce((sum, cat) => 
        sum + cat.modules.filter(m => m.status === 'live').length, 0);

      return (
        <div className="min-h-screen bg-[#00050F] text-white">
          {/* Header */}
          <header className="glass border-b border-cyan-500/20">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-500 to-teal-500 flex items-center justify-center">
                    <Icon name="shield" className="w-7 h-7 text-white" />
                  </div>
                  <div>
                    <h1 className="text-2xl font-bold">MissionPulse</h1>
                    <p className="text-sm text-slate-400">Module Hub • v3.1</p>
                  </div>
                </div>

                <div className="flex items-center gap-4">
                  {/* Search */}
                  <input
                    type="text"
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    placeholder="Search modules..."
                    className="bg-slate-800/50 border border-cyan-500/30 rounded-lg px-4 py-2 text-sm w-64"
                  />
                  
                  {/* Role Selector (for demo) */}
                  <select
                    value={userRole}
                    onChange={(e) => setUserRole(e.target.value)}
                    className="bg-slate-800/50 border border-cyan-500/30 rounded-lg px-3 py-2 text-sm"
                  >
                    <option value="CEO">CEO</option>
                    <option value="COO">COO</option>
                    <option value="CAP">Capture Manager</option>
                    <option value="PM">Project Manager</option>
                    <option value="SA">Solution Architect</option>
                    <option value="FIN">Finance</option>
                  </select>

                  {/* Stats */}
                  <div className="flex items-center gap-2 px-3 py-2 bg-green-500/10 rounded-lg">
                    <Icon name="check" className="w-4 h-4 text-green-400" />
                    <span className="text-sm text-green-400 font-medium">{liveModules}/{totalModules} Live</span>
                  </div>
                </div>
              </div>
            </div>
          </header>

          {/* Hero Stats */}
          <div className="max-w-7xl mx-auto px-6 py-8">
            <div className="glass rounded-2xl p-6 mb-8">
              <div className="flex items-center justify-between">
                <div>
                  <h2 className="text-xl font-bold mb-2">Federal Proposal Management Platform</h2>
                  <p className="text-slate-400">Shipley methodology • CMMC compliant • AI-powered</p>
                </div>
                <div className="flex items-center gap-6">
                  <div className="text-center">
                    <div className="text-3xl font-bold text-cyan-400">{totalModules}</div>
                    <div className="text-xs text-slate-400">Modules</div>
                  </div>
                  <div className="text-center">
                    <div className="text-3xl font-bold text-green-400">{liveModules}</div>
                    <div className="text-xs text-slate-400">Live</div>
                  </div>
                  <div className="text-center">
                    <div className="text-3xl font-bold text-purple-400">8</div>
                    <div className="text-xs text-slate-400">AI Agents</div>
                  </div>
                </div>
              </div>
            </div>

            {/* Module Categories */}
            <div className="space-y-8">
              {Object.entries(MODULE_CATEGORIES).map(([catId, category]) => {
                const filteredModules = filterModules(category.modules);
                if (filteredModules.length === 0 && searchQuery) return null;

                return (
                  <div key={catId}>
                    <div className="flex items-center gap-3 mb-4">
                      <span className="text-2xl">{category.icon}</span>
                      <h3 className="text-lg font-bold" style={{ color: category.color }}>{category.name}</h3>
                      <div className="flex-1 h-px bg-gradient-to-r from-slate-700 to-transparent"></div>
                    </div>

                    <div className="grid grid-cols-4 gap-4">
                      {filteredModules.map(module => {
                        const accessible = hasAccess(module);
                        
                        return (
                          <a
                            key={module.id}
                            href={accessible ? module.href : '#'}
                            onClick={(e) => !accessible && e.preventDefault()}
                            className={`glass rounded-xl p-4 transition-all group ${
                              accessible 
                                ? 'hover:border-cyan-500/50 hover:bg-cyan-500/5 cursor-pointer' 
                                : 'opacity-50 cursor-not-allowed'
                            }`}
                          >
                            <div className="flex items-start justify-between mb-2">
                              <h4 className="font-semibold group-hover:text-cyan-400 transition-colors">
                                {module.name}
                              </h4>
                              <div className="flex items-center gap-1">
                                {module.new && (
                                  <span className="px-1.5 py-0.5 bg-green-500/20 text-green-400 rounded text-xs">NEW</span>
                                )}
                                {module.cui && (
                                  <span className="px-1.5 py-0.5 bg-red-500/20 text-red-400 rounded text-xs">CUI</span>
                                )}
                                {module.rbac && !accessible && (
                                  <Icon name="lock" className="w-4 h-4 text-slate-500" />
                                )}
                                {accessible && (
                                  <Icon name="external" className="w-4 h-4 text-slate-500 group-hover:text-cyan-400 transition-colors" />
                                )}
                              </div>
                            </div>
                            <p className="text-sm text-slate-400">{module.desc}</p>
                            
                            {module.rbac && (
                              <div className="mt-2 pt-2 border-t border-slate-700/50">
                                <span className="text-xs text-slate-500">
                                  Access: {module.rbac.join(', ')}
                                </span>
                              </div>
                            )}
                          </a>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Quick Actions */}
            <div className="glass rounded-2xl p-6 mt-8">
              <h3 className="text-lg font-bold mb-4">Quick Actions</h3>
              <div className="grid grid-cols-4 gap-4">
                <a href="missionpulse-pipeline-v2.html" className="flex items-center gap-3 p-3 bg-slate-800/50 rounded-lg hover:bg-cyan-500/10 transition-colors">
                  <span className="text-2xl">📊</span>
                  <div>
                    <div className="font-medium">View Pipeline</div>
                    <div className="text-xs text-slate-400">$847M tracked</div>
                  </div>
                </a>
                <a href="missionpulse-warroom-v2.html" className="flex items-center gap-3 p-3 bg-slate-800/50 rounded-lg hover:bg-cyan-500/10 transition-colors">
                  <span className="text-2xl">🎯</span>
                  <div>
                    <div className="font-medium">Enter War Room</div>
                    <div className="text-xs text-slate-400">3 active proposals</div>
                  </div>
                </a>
                <a href="missionpulse-hitl-v2.html" className="flex items-center gap-3 p-3 bg-slate-800/50 rounded-lg hover:bg-cyan-500/10 transition-colors">
                  <span className="text-2xl">✅</span>
                  <div>
                    <div className="font-medium">Review Queue</div>
                    <div className="text-xs text-slate-400">7 items pending</div>
                  </div>
                </a>
                <a href="missionpulse-agent-hub.html" className="flex items-center gap-3 p-3 bg-slate-800/50 rounded-lg hover:bg-cyan-500/10 transition-colors">
                  <span className="text-2xl">🤖</span>
                  <div>
                    <div className="font-medium">AI Agent Hub</div>
                    <div className="text-xs text-slate-400">8 agents ready</div>
                  </div>
                </a>
              </div>
            </div>
          </div>

          {/* Footer */}
          <footer className="border-t border-cyan-500/10 mt-8 py-4 text-center text-xs text-slate-500">
            <p>MissionPulse v3.1 • Mission Meets Tech • AI GENERATED CONTENT REQUIRES HUMAN REVIEW</p>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<ModuleHub />, document.getElementById('root'));
  </script>
</body>
</html>
