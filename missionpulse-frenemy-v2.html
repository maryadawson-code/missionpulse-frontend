<!DOCTYPE html>
<html lang="en">
<!--
  FILE: missionpulse-frenemy-v2.html
  ROLE: CEO | COO | CAP (RESTRICTED)
  SECURITY: env vars verified, data masking enforced
  VERSION: 2.0.0
  
  Frenemy View - Partner Data Masking for Sensitive Sharing
  © 2026 Mission Meets Tech
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frenemy View | MissionPulse</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .redacted { background: repeating-linear-gradient(90deg, #1e293b 0px, #1e293b 8px, #334155 8px, #334155 16px); color: transparent; user-select: none; border-radius: 4px; }
    .blur-sensitive { filter: blur(6px); transition: filter 0.3s; }
    .blur-sensitive:hover { filter: blur(0); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const MASKING_PRESETS = [
      { id: 'teaming_call', name: 'Teaming Call', icon: '📞', description: 'Hide pricing, competitor details, internal notes', fields: ['pricing', 'competitors', 'internal_notes', 'strategy'] },
      { id: 'partner_review', name: 'Partner Review', icon: '🤝', description: 'Hide other partners, pricing details, win themes', fields: ['other_partners', 'pricing', 'win_themes', 'strategy'] },
      { id: 'client_demo', name: 'Client Demo', icon: '🎯', description: 'Hide all sensitive business data', fields: ['pricing', 'competitors', 'partners', 'internal_notes', 'strategy', 'financials'] },
      { id: 'executive_brief', name: 'Executive Brief', icon: '👔', description: 'Show high-level only, hide details', fields: ['internal_notes', 'task_details', 'technical_details'] },
      { id: 'custom', name: 'Custom Masking', icon: '⚙️', description: 'Choose specific fields to mask', fields: [] },
    ];

    const MASKABLE_FIELDS = [
      { id: 'pricing', name: 'Pricing & Rates', icon: '💰', category: 'Financial' },
      { id: 'competitors', name: 'Competitor Intel', icon: '🎯', category: 'Strategy' },
      { id: 'partners', name: 'Partner Details', icon: '🤝', category: 'Teaming' },
      { id: 'other_partners', name: 'Other Partners', icon: '👥', category: 'Teaming' },
      { id: 'win_themes', name: 'Win Themes', icon: '🏆', category: 'Strategy' },
      { id: 'strategy', name: 'Capture Strategy', icon: '📋', category: 'Strategy' },
      { id: 'internal_notes', name: 'Internal Notes', icon: '📝', category: 'Internal' },
      { id: 'financials', name: 'Financial Details', icon: '📊', category: 'Financial' },
      { id: 'contacts', name: 'Contact Info', icon: '📱', category: 'Personal' },
      { id: 'technical_details', name: 'Technical Details', icon: '⚙️', category: 'Technical' },
      { id: 'task_details', name: 'Task Assignments', icon: '✅', category: 'Internal' },
    ];

    const DEMO_OPPORTUNITY = {
      id: 1,
      name: 'DHA Healthcare Data Platform Modernization',
      agency: 'Defense Health Agency',
      contract_value: 47000000,
      due_date: '2026-03-15',
      shipley_phase: 'Phase 3 - Proposal',
      win_probability: 72,
      pricing: {
        total: 47000000,
        labor: 38000000,
        materials: 5000000,
        travel: 2000000,
        other: 2000000,
        rates: [
          { role: 'Program Manager', rate: 185 },
          { role: 'Solution Architect', rate: 165 },
          { role: 'Senior Developer', rate: 145 },
        ]
      },
      competitors: [
        { name: 'Leidos', threat: 'High', strengths: 'Incumbent, cleared staff', weaknesses: 'Higher rates, slow delivery' },
        { name: 'GDIT', threat: 'Medium', strengths: 'DHA relationships', weaknesses: 'Recent contract issues' },
        { name: 'Booz Allen', threat: 'Medium', strengths: 'Technical depth', weaknesses: 'Premium pricing' },
      ],
      partners: [
        { name: 'CloudFirst Technologies', role: 'Cloud Infrastructure', share: 30 },
        { name: 'SecureNet Solutions', role: 'Cybersecurity', share: 25 },
      ],
      win_themes: [
        { theme: 'Proven Healthcare Platform', strength: 95 },
        { theme: 'Cleared Healthcare IT Experts', strength: 88 },
        { theme: 'VA Modernization Track Record', strength: 92 },
      ],
      strategy: 'Ghost Leidos on delivery speed and innovation. Emphasize our AI capabilities and modern tech stack. Leverage VA relationship for DHA credibility.',
      internal_notes: 'Sarah needs to finalize Section L.4 by Friday. Pricing review scheduled for Monday. CEO approved aggressive pricing strategy.',
      contacts: {
        contracting: 'Jane Smith, jane.smith@dha.mil, 703-555-0100',
        technical: 'Dr. Robert Chen, robert.chen@dha.mil, 703-555-0101',
      }
    };

    function FrenemyView() {
      const [connected, setConnected] = useState(false);
      const [loading, setLoading] = useState(true);
      const [opportunity, setOpportunity] = useState(null);
      const [selectedPreset, setSelectedPreset] = useState(null);
      const [maskedFields, setMaskedFields] = useState([]);
      const [viewerName, setViewerName] = useState('');
      const [showPreview, setShowPreview] = useState(false);
      const [shareLink, setShareLink] = useState('');

      useEffect(() => { loadData(); }, []);

      const loadData = async () => {
        try {
          const { data } = await supabase.from('opportunities').select('*').limit(1).single();
          setOpportunity(data || DEMO_OPPORTUNITY);
          setConnected(!!data);
        } catch (err) {
          console.error('Load error:', err);
          setOpportunity(DEMO_OPPORTUNITY);
        } finally {
          setLoading(false);
        }
      };

      const applyPreset = (preset) => {
        setSelectedPreset(preset);
        setMaskedFields(preset.fields);
      };

      const toggleField = (fieldId) => {
        setSelectedPreset(MASKING_PRESETS.find(p => p.id === 'custom'));
        setMaskedFields(prev => 
          prev.includes(fieldId) 
            ? prev.filter(f => f !== fieldId)
            : [...prev, fieldId]
        );
      };

      const generateShareLink = () => {
        const params = new URLSearchParams({
          opp: opportunity.id,
          mask: maskedFields.join(','),
          viewer: viewerName,
          expires: new Date(Date.now() + 24*60*60*1000).toISOString()
        });
        const link = `https://missionpulse.io/shared?${params.toString()}`;
        setShareLink(link);
        navigator.clipboard.writeText(link);
        alert('Share link copied to clipboard! Link expires in 24 hours.');
      };

      const isMasked = (fieldId) => maskedFields.includes(fieldId);

      const renderMasked = (content, fieldId) => {
        if (isMasked(fieldId)) {
          return <span className="redacted px-2 py-1">{content}</span>;
        }
        return content;
      };

      const formatCurrency = (val) => `$${(val/1000000).toFixed(1)}M`;

      if (loading) {
        return (
          <div className="min-h-screen bg-[#00050F] flex items-center justify-center">
            <div className="w-12 h-12 border-4 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin" />
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#00050F] text-white p-6">
          {/* Header */}
          <div className="flex items-center justify-between mb-6">
            <div>
              <div className="flex items-center gap-3">
                <span className="text-3xl">👁️</span>
                <h1 className="text-2xl font-bold">Frenemy View</h1>
                <span className={`px-2 py-1 text-xs rounded-full ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                  {connected ? '● Live' : '○ Demo'}
                </span>
                <span className="px-2 py-1 text-xs rounded-full bg-red-500/20 text-red-400 border border-red-500/30">
                  🔒 RESTRICTED ACCESS
                </span>
              </div>
              <p className="text-slate-400 mt-1">Create masked views for secure partner sharing</p>
            </div>
            
            <div className="flex items-center gap-3">
              <button 
                onClick={() => setShowPreview(!showPreview)}
                className={`px-4 py-2 rounded-lg font-medium ${showPreview ? 'bg-purple-500' : 'bg-slate-700 hover:bg-slate-600'}`}
              >
                {showPreview ? '✓ Preview Mode' : '👁️ Preview'}
              </button>
              <button 
                onClick={generateShareLink}
                disabled={!viewerName || maskedFields.length === 0}
                className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 disabled:bg-slate-700 disabled:text-slate-500 rounded-lg font-medium"
              >
                🔗 Generate Share Link
              </button>
            </div>
          </div>

          {/* Warning Banner */}
          <div className="mb-6 p-4 bg-amber-500/10 border border-amber-500/30 rounded-xl">
            <div className="flex items-center gap-3">
              <span className="text-2xl">⚠️</span>
              <div>
                <div className="font-semibold text-amber-400">Sensitive Data Masking</div>
                <div className="text-sm text-slate-400">Fields you select will be hidden when sharing. Always verify masked view before sending.</div>
              </div>
            </div>
          </div>

          <div className="grid grid-cols-12 gap-6">
            {/* Left Panel - Masking Controls */}
            <div className="col-span-4 space-y-4">
              {/* Viewer Info */}
              <div className="bg-slate-800/50 rounded-xl border border-slate-700/50 p-4">
                <h3 className="font-semibold mb-3">Sharing With</h3>
                <input 
                  type="text"
                  value={viewerName}
                  onChange={e => setViewerName(e.target.value)}
                  placeholder="Partner name or email..."
                  className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2"
                />
              </div>

              {/* Presets */}
              <div className="bg-slate-800/50 rounded-xl border border-slate-700/50 p-4">
                <h3 className="font-semibold mb-3">Masking Presets</h3>
                <div className="space-y-2">
                  {MASKING_PRESETS.map(preset => (
                    <button
                      key={preset.id}
                      onClick={() => applyPreset(preset)}
                      className={`w-full p-3 rounded-lg border text-left transition-colors ${
                        selectedPreset?.id === preset.id 
                          ? 'bg-cyan-500/20 border-cyan-500/50' 
                          : 'bg-slate-900/50 border-slate-700 hover:border-slate-600'
                      }`}
                    >
                      <div className="flex items-center gap-2">
                        <span className="text-xl">{preset.icon}</span>
                        <div>
                          <div className="font-medium">{preset.name}</div>
                          <div className="text-xs text-slate-500">{preset.description}</div>
                        </div>
                      </div>
                    </button>
                  ))}
                </div>
              </div>

              {/* Individual Fields */}
              <div className="bg-slate-800/50 rounded-xl border border-slate-700/50 p-4">
                <h3 className="font-semibold mb-3">Mask Individual Fields</h3>
                <div className="space-y-2 max-h-64 overflow-y-auto">
                  {MASKABLE_FIELDS.map(field => (
                    <label 
                      key={field.id}
                      className="flex items-center gap-3 p-2 rounded hover:bg-slate-800/50 cursor-pointer"
                    >
                      <input 
                        type="checkbox"
                        checked={maskedFields.includes(field.id)}
                        onChange={() => toggleField(field.id)}
                        className="w-4 h-4 rounded border-slate-600 bg-slate-800 text-cyan-500 focus:ring-cyan-500"
                      />
                      <span className="text-lg">{field.icon}</span>
                      <span className="text-sm">{field.name}</span>
                    </label>
                  ))}
                </div>
              </div>

              {/* Masking Summary */}
              <div className="bg-slate-800/30 rounded-xl border border-slate-700/50 p-4">
                <div className="flex items-center justify-between mb-2">
                  <span className="text-sm text-slate-400">Fields Masked</span>
                  <span className="font-bold text-cyan-400">{maskedFields.length}</span>
                </div>
                <div className="flex flex-wrap gap-1">
                  {maskedFields.map(f => {
                    const field = MASKABLE_FIELDS.find(mf => mf.id === f);
                    return field ? (
                      <span key={f} className="px-2 py-1 text-xs bg-red-500/20 text-red-400 rounded">
                        {field.icon} {field.name}
                      </span>
                    ) : null;
                  })}
                </div>
              </div>
            </div>

            {/* Right Panel - Preview */}
            <div className="col-span-8">
              <div className={`bg-slate-800/50 rounded-xl border ${showPreview ? 'border-purple-500/50' : 'border-slate-700/50'} p-6`}>
                {showPreview && (
                  <div className="mb-4 p-3 bg-purple-500/20 border border-purple-500/30 rounded-lg flex items-center gap-2">
                    <span>👁️</span>
                    <span className="text-sm text-purple-300">Preview Mode - This is how {viewerName || 'the recipient'} will see this data</span>
                  </div>
                )}

                {/* Opportunity Header */}
                <div className="mb-6">
                  <h2 className="text-2xl font-bold">{opportunity.name}</h2>
                  <div className="flex items-center gap-4 mt-2 text-sm text-slate-400">
                    <span>🏛️ {opportunity.agency}</span>
                    <span>📅 Due: {opportunity.due_date}</span>
                    <span>📊 {opportunity.shipley_phase}</span>
                  </div>
                </div>

                {/* Key Metrics */}
                <div className="grid grid-cols-3 gap-4 mb-6">
                  <div className="p-4 bg-slate-900/50 rounded-lg">
                    <div className="text-sm text-slate-500">Contract Value</div>
                    <div className="text-2xl font-bold text-emerald-400">
                      {showPreview ? renderMasked(formatCurrency(opportunity.contract_value), 'financials') : formatCurrency(opportunity.contract_value)}
                    </div>
                  </div>
                  <div className="p-4 bg-slate-900/50 rounded-lg">
                    <div className="text-sm text-slate-500">Win Probability</div>
                    <div className="text-2xl font-bold text-cyan-400">{opportunity.win_probability}%</div>
                  </div>
                  <div className="p-4 bg-slate-900/50 rounded-lg">
                    <div className="text-sm text-slate-500">Phase</div>
                    <div className="text-lg font-bold text-purple-400">{opportunity.shipley_phase}</div>
                  </div>
                </div>

                {/* Pricing Section */}
                <div className="mb-6">
                  <h3 className="font-semibold mb-3 flex items-center gap-2">
                    💰 Pricing Details
                    {isMasked('pricing') && showPreview && <span className="px-2 py-0.5 text-xs bg-red-500/20 text-red-400 rounded">MASKED</span>}
                  </h3>
                  {showPreview && isMasked('pricing') ? (
                    <div className="p-4 bg-slate-900/30 rounded-lg text-center">
                      <span className="redacted px-4 py-2">Pricing information hidden</span>
                    </div>
                  ) : (
                    <div className="grid grid-cols-4 gap-3">
                      {Object.entries(opportunity.pricing).filter(([k]) => k !== 'rates').map(([key, val]) => (
                        <div key={key} className="p-3 bg-slate-900/50 rounded-lg">
                          <div className="text-xs text-slate-500 capitalize">{key}</div>
                          <div className="font-bold">{formatCurrency(val)}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* Competitors Section */}
                <div className="mb-6">
                  <h3 className="font-semibold mb-3 flex items-center gap-2">
                    🎯 Competitor Intelligence
                    {isMasked('competitors') && showPreview && <span className="px-2 py-0.5 text-xs bg-red-500/20 text-red-400 rounded">MASKED</span>}
                  </h3>
                  {showPreview && isMasked('competitors') ? (
                    <div className="p-4 bg-slate-900/30 rounded-lg text-center">
                      <span className="redacted px-4 py-2">Competitor information hidden</span>
                    </div>
                  ) : (
                    <div className="space-y-2">
                      {opportunity.competitors.map((comp, i) => (
                        <div key={i} className="p-3 bg-slate-900/50 rounded-lg flex items-center justify-between">
                          <div>
                            <div className="font-medium">{comp.name}</div>
                            <div className="text-xs text-slate-500">Strengths: {comp.strengths}</div>
                          </div>
                          <span className={`px-2 py-1 text-xs rounded ${
                            comp.threat === 'High' ? 'bg-red-500/20 text-red-400' :
                            comp.threat === 'Medium' ? 'bg-amber-500/20 text-amber-400' :
                            'bg-slate-500/20 text-slate-400'
                          }`}>
                            {comp.threat} Threat
                          </span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* Partners Section */}
                <div className="mb-6">
                  <h3 className="font-semibold mb-3 flex items-center gap-2">
                    🤝 Teaming Partners
                    {(isMasked('partners') || isMasked('other_partners')) && showPreview && <span className="px-2 py-0.5 text-xs bg-red-500/20 text-red-400 rounded">MASKED</span>}
                  </h3>
                  {showPreview && (isMasked('partners') || isMasked('other_partners')) ? (
                    <div className="p-4 bg-slate-900/30 rounded-lg text-center">
                      <span className="redacted px-4 py-2">Partner information hidden</span>
                    </div>
                  ) : (
                    <div className="space-y-2">
                      {opportunity.partners.map((partner, i) => (
                        <div key={i} className="p-3 bg-slate-900/50 rounded-lg flex items-center justify-between">
                          <div>
                            <div className="font-medium">{partner.name}</div>
                            <div className="text-xs text-slate-500">{partner.role}</div>
                          </div>
                          <span className="px-2 py-1 text-xs bg-purple-500/20 text-purple-400 rounded">
                            {partner.share}% Share
                          </span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* Strategy Section */}
                <div className="mb-6">
                  <h3 className="font-semibold mb-3 flex items-center gap-2">
                    📋 Capture Strategy
                    {isMasked('strategy') && showPreview && <span className="px-2 py-0.5 text-xs bg-red-500/20 text-red-400 rounded">MASKED</span>}
                  </h3>
                  {showPreview && isMasked('strategy') ? (
                    <div className="p-4 bg-slate-900/30 rounded-lg">
                      <span className="redacted px-4 py-2">Strategy information hidden</span>
                    </div>
                  ) : (
                    <div className="p-4 bg-slate-900/50 rounded-lg text-slate-300">
                      {opportunity.strategy}
                    </div>
                  )}
                </div>

                {/* Internal Notes */}
                <div>
                  <h3 className="font-semibold mb-3 flex items-center gap-2">
                    📝 Internal Notes
                    {isMasked('internal_notes') && showPreview && <span className="px-2 py-0.5 text-xs bg-red-500/20 text-red-400 rounded">MASKED</span>}
                  </h3>
                  {showPreview && isMasked('internal_notes') ? (
                    <div className="p-4 bg-slate-900/30 rounded-lg">
                      <span className="redacted px-4 py-2">Internal notes hidden</span>
                    </div>
                  ) : (
                    <div className="p-4 bg-slate-900/50 rounded-lg text-slate-300">
                      {opportunity.internal_notes}
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>

          {/* Footer */}
          <div className="mt-8 pt-4 border-t border-slate-800 text-center text-xs text-slate-600">
            AI GENERATED - REQUIRES HUMAN REVIEW • Partner access auto-revokes upon proposal submission
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<FrenemyView />);
  </script>
</body>
</html>
