<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Frenemy Protocol (Teaming Partners)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
    .glow { box-shadow: 0 0 20px rgba(0, 229, 250, 0.15); }
    .frenemy-card { background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.95) 100%); }
    .trust-high { border-left: 4px solid #10b981; }
    .trust-medium { border-left: 4px solid #f59e0b; }
    .trust-low { border-left: 4px solid #ef4444; }
    .private-badge { background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;
    
    // Supabase Configuration
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    
    // Demo Data
    const DEMO_OPPORTUNITIES = [
      { id: 'opp-1', title: 'DHA MHS GENESIS Support', agency: 'DHA', phase: 'Gate 3', set_aside: 'SDVOSB' },
      { id: 'opp-2', title: 'VA EHR Modernization', agency: 'VA', phase: 'Gate 2', set_aside: 'Full & Open' }
    ];
    
    const SOCIOECONOMIC_TYPES = ['SDVOSB', 'VOSB', '8(a)', 'HUBZone', 'WOSB', 'Small Business', 'Large Business'];
    const CAPABILITY_AREAS = ['Cloud Infrastructure', 'Cybersecurity', 'Healthcare IT', 'Data Analytics', 'AI/ML', 'System Integration', 'Training', 'PMO', 'Help Desk', 'Development'];
    const PARTNER_TYPES = ['Prime', 'Subcontractor', 'Teaming Partner', 'Mentor', 'Protégé', 'JV Partner'];
    
    const DEMO_PARTNERS = [
      {
        id: 'p1',
        opportunity_id: 'opp-1',
        company_name: 'HealthTech Solutions Inc.',
        contact_name: 'Sarah Johnson',
        contact_email: 'sjohnson@healthtech.com',
        contact_phone: '(703) 555-0142',
        partner_type: 'Subcontractor',
        socioeconomic: 'SDVOSB',
        capabilities: ['Healthcare IT', 'System Integration', 'Training'],
        work_share: 25,
        past_performance: true,
        trust_level: 'high',
        nda_signed: true,
        nda_expiry: '2027-01-15',
        teaming_agreement: true,
        notes: 'Excellent DHA track record. 3 successful joint proposals.',
        status: 'Active',
        added_date: '2025-12-01'
      },
      {
        id: 'p2',
        opportunity_id: 'opp-1',
        company_name: 'CyberShield Federal',
        contact_name: 'Marcus Chen',
        contact_email: 'mchen@cybershield.com',
        contact_phone: '(571) 555-0198',
        partner_type: 'Subcontractor',
        socioeconomic: 'Small Business',
        capabilities: ['Cybersecurity', 'Cloud Infrastructure'],
        work_share: 15,
        past_performance: true,
        trust_level: 'high',
        nda_signed: true,
        nda_expiry: '2026-08-20',
        teaming_agreement: true,
        notes: 'CMMC L3 certified. Strong clearance pipeline.',
        status: 'Active',
        added_date: '2025-11-15'
      },
      {
        id: 'p3',
        opportunity_id: 'opp-1',
        company_name: 'DataDriven Analytics',
        contact_name: 'Lisa Park',
        contact_email: 'lpark@datadriven.io',
        contact_phone: '(202) 555-0167',
        partner_type: 'Teaming Partner',
        socioeconomic: 'WOSB',
        capabilities: ['Data Analytics', 'AI/ML'],
        work_share: 10,
        past_performance: false,
        trust_level: 'medium',
        nda_signed: true,
        nda_expiry: '2026-06-01',
        teaming_agreement: false,
        notes: 'New partner - evaluating for TA agreement. Strong technical capabilities but no federal past performance.',
        status: 'Negotiating',
        added_date: '2026-01-10'
      },
      {
        id: 'p4',
        opportunity_id: 'opp-1',
        company_name: 'GlobalTech Partners',
        contact_name: 'Robert Kim',
        contact_email: 'rkim@globaltech.com',
        contact_phone: '(703) 555-0234',
        partner_type: 'Subcontractor',
        socioeconomic: 'Large Business',
        capabilities: ['PMO', 'System Integration', 'Help Desk'],
        work_share: 0,
        past_performance: true,
        trust_level: 'low',
        nda_signed: false,
        nda_expiry: null,
        teaming_agreement: false,
        notes: 'COMPETITOR RISK: Teaming with Booz on separate DHA effort. Do NOT share sensitive capture strategy.',
        status: 'Evaluating',
        added_date: '2026-01-20'
      },
      {
        id: 'p5',
        opportunity_id: 'opp-2',
        company_name: 'VA Systems Corp',
        contact_name: 'Amanda Foster',
        contact_email: 'afoster@vasystems.com',
        contact_phone: '(804) 555-0189',
        partner_type: 'Subcontractor',
        socioeconomic: 'VOSB',
        capabilities: ['Healthcare IT', 'Development', 'Training'],
        work_share: 30,
        past_performance: true,
        trust_level: 'high',
        nda_signed: true,
        nda_expiry: '2026-12-31',
        teaming_agreement: true,
        notes: 'Incumbent subcontractor. Deep VA relationships.',
        status: 'Active',
        added_date: '2025-10-01'
      }
    ];
    
    function App() {
      const [opportunities, setOpportunities] = useState(DEMO_OPPORTUNITIES);
      const [partners, setPartners] = useState(DEMO_PARTNERS);
      const [selectedOpp, setSelectedOpp] = useState(null);
      const [connected, setConnected] = useState(false);
      const [loading, setLoading] = useState(true);
      const [showModal, setShowModal] = useState(false);
      const [editingPartner, setEditingPartner] = useState(null);
      const [filterTrust, setFilterTrust] = useState('all');
      const [filterStatus, setFilterStatus] = useState('all');
      const [selectedCapabilities, setSelectedCapabilities] = useState([]);
      
      const [formData, setFormData] = useState({
        company_name: '', contact_name: '', contact_email: '', contact_phone: '',
        partner_type: 'Subcontractor', socioeconomic: 'Small Business',
        capabilities: [], work_share: 0, past_performance: false,
        trust_level: 'medium', nda_signed: false, nda_expiry: '',
        teaming_agreement: false, notes: '', status: 'Evaluating'
      });
      
      useEffect(() => { loadData(); }, []);
      
      const loadData = async () => {
        try {
          const { data: opps } = await supabase.from('opportunities').select('id, title, agency, phase, set_aside');
          if (opps?.length > 0) { setOpportunities(opps); setConnected(true); }
          
          const { data: partnerData } = await supabase.from('teaming_partners').select('*').order('company_name');
          if (partnerData?.length > 0) setPartners(partnerData);
        } catch (e) { console.log('Demo mode'); }
        setLoading(false);
      };
      
      const handleSave = async () => {
        const payload = { ...formData, opportunity_id: selectedOpp.id, added_date: editingPartner?.added_date || new Date().toISOString().split('T')[0] };
        
        try {
          if (editingPartner) {
            await supabase.from('teaming_partners').update(payload).eq('id', editingPartner.id);
            setPartners(partners.map(p => p.id === editingPartner.id ? { ...p, ...payload } : p));
          } else {
            const newPartner = { ...payload, id: `p-${Date.now()}` };
            const { data } = await supabase.from('teaming_partners').insert(payload).select().single();
            setPartners([...partners, data || newPartner]);
          }
        } catch (e) {
          const newPartner = { ...payload, id: `p-${Date.now()}` };
          editingPartner ? setPartners(partners.map(p => p.id === editingPartner.id ? { ...p, ...payload } : p)) : setPartners([...partners, newPartner]);
        }
        closeModal();
      };
      
      const handleDelete = async (partner) => {
        if (!confirm(`Remove ${partner.company_name} from this opportunity?`)) return;
        try { await supabase.from('teaming_partners').delete().eq('id', partner.id); } catch {}
        setPartners(partners.filter(p => p.id !== partner.id));
      };
      
      const openModal = (partner = null) => {
        if (partner) {
          setEditingPartner(partner);
          setFormData({
            company_name: partner.company_name,
            contact_name: partner.contact_name || '',
            contact_email: partner.contact_email || '',
            contact_phone: partner.contact_phone || '',
            partner_type: partner.partner_type || 'Subcontractor',
            socioeconomic: partner.socioeconomic || 'Small Business',
            capabilities: partner.capabilities || [],
            work_share: partner.work_share || 0,
            past_performance: partner.past_performance || false,
            trust_level: partner.trust_level || 'medium',
            nda_signed: partner.nda_signed || false,
            nda_expiry: partner.nda_expiry || '',
            teaming_agreement: partner.teaming_agreement || false,
            notes: partner.notes || '',
            status: partner.status || 'Evaluating'
          });
        } else {
          setEditingPartner(null);
          setFormData({
            company_name: '', contact_name: '', contact_email: '', contact_phone: '',
            partner_type: 'Subcontractor', socioeconomic: 'Small Business',
            capabilities: [], work_share: 0, past_performance: false,
            trust_level: 'medium', nda_signed: false, nda_expiry: '',
            teaming_agreement: false, notes: '', status: 'Evaluating'
          });
        }
        setShowModal(true);
      };
      
      const closeModal = () => { setShowModal(false); setEditingPartner(null); };
      
      const toggleCapability = (cap) => {
        setFormData(prev => ({
          ...prev,
          capabilities: prev.capabilities.includes(cap) 
            ? prev.capabilities.filter(c => c !== cap)
            : [...prev.capabilities, cap]
        }));
      };
      
      // Filtered partners
      const oppPartners = selectedOpp ? partners.filter(p => p.opportunity_id === selectedOpp.id) : [];
      let filteredPartners = oppPartners;
      if (filterTrust !== 'all') filteredPartners = filteredPartners.filter(p => p.trust_level === filterTrust);
      if (filterStatus !== 'all') filteredPartners = filteredPartners.filter(p => p.status === filterStatus);
      
      // Stats
      const totalWorkShare = oppPartners.reduce((sum, p) => sum + (p.work_share || 0), 0);
      const activePartners = oppPartners.filter(p => p.status === 'Active').length;
      const ndaRequired = oppPartners.filter(p => !p.nda_signed).length;
      const taRequired = oppPartners.filter(p => !p.teaming_agreement && p.status === 'Active').length;
      
      const getTrustStyle = (level) => {
        const styles = {
          'high': { border: 'trust-high', bg: 'bg-emerald-500/10', text: 'text-emerald-400', label: '🟢 Trusted' },
          'medium': { border: 'trust-medium', bg: 'bg-amber-500/10', text: 'text-amber-400', label: '🟡 Verified' },
          'low': { border: 'trust-low', bg: 'bg-red-500/10', text: 'text-red-400', label: '🔴 Caution' }
        };
        return styles[level] || styles.medium;
      };
      
      const getStatusBadge = (status) => {
        const badges = {
          'Active': 'bg-emerald-500/20 text-emerald-400',
          'Negotiating': 'bg-amber-500/20 text-amber-400',
          'Evaluating': 'bg-cyan-500/20 text-cyan-400',
          'Declined': 'bg-red-500/20 text-red-400',
          'Inactive': 'bg-slate-500/20 text-slate-400'
        };
        return badges[status] || badges.Evaluating;
      };
      
      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-cyan-400 flex items-center gap-3">
              <div className="w-6 h-6 border-2 border-cyan-400 border-t-transparent rounded-full animate-spin"></div>
              Loading Teaming Partners...
            </div>
          </div>
        );
      }
      
      return (
        <div className="min-h-screen">
          {/* Connection Status */}
          <div className={`fixed top-4 right-4 px-3 py-1.5 rounded-full text-xs font-medium z-50 ${connected ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-amber-500/20 text-amber-400 border border-amber-500/30'}`}>
            {connected ? '● Live' : '○ Demo Mode'}
          </div>
          
          {/* Header */}
          <header className="glass border-b border-cyan-500/20 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="text-slate-400 hover:text-cyan-400">← Back</a>
                  <div>
                    <h1 className="text-2xl font-bold text-white">🤝 Frenemy Protocol</h1>
                    <p className="text-slate-400 text-sm">Teaming partner management & competitive intelligence</p>
                  </div>
                </div>
                <span className="private-badge px-2 py-1 rounded text-white text-xs">🔒 PRIVATE</span>
              </div>
            </div>
          </header>
          
          <main className="max-w-7xl mx-auto px-6 py-8">
            {!selectedOpp ? (
              /* Opportunity Selection */
              <div className="glass rounded-xl p-8 glow">
                <h2 className="text-xl font-semibold text-white mb-6">Select Opportunity</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {opportunities.map(opp => {
                    const oppPartnerCount = partners.filter(p => p.opportunity_id === opp.id).length;
                    const oppWorkShare = partners.filter(p => p.opportunity_id === opp.id).reduce((s, p) => s + (p.work_share || 0), 0);
                    
                    return (
                      <button
                        key={opp.id}
                        onClick={() => setSelectedOpp(opp)}
                        className="frenemy-card rounded-xl p-6 text-left border border-slate-700 hover:border-cyan-500/50 transition-all"
                      >
                        <h3 className="font-semibold text-white text-lg mb-1">{opp.title}</h3>
                        <p className="text-slate-400 text-sm mb-3">{opp.agency} • {opp.phase}</p>
                        <div className="flex items-center gap-4 text-sm">
                          <span className="bg-slate-700 px-2 py-0.5 rounded text-cyan-400">{opp.set_aside}</span>
                          <span className="text-slate-400">{oppPartnerCount} partners</span>
                          <span className="text-emerald-400">{100 - oppWorkShare}% Prime</span>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>
            ) : (
              /* Partner Dashboard */
              <div>
                <div className="flex items-center justify-between mb-6">
                  <div>
                    <button onClick={() => setSelectedOpp(null)} className="text-slate-400 hover:text-cyan-400 text-sm mb-2">← Back to Opportunities</button>
                    <h2 className="text-xl font-semibold text-white">{selectedOpp.title}</h2>
                    <p className="text-slate-400 text-sm">{selectedOpp.agency} • {selectedOpp.set_aside}</p>
                  </div>
                  <button onClick={() => openModal()} className="bg-cyan-500 hover:bg-cyan-600 text-slate-900 px-4 py-2 rounded-lg font-medium">
                    + Add Partner
                  </button>
                </div>
                
                {/* Stats Row */}
                <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
                  <div className="glass rounded-xl p-4 text-center">
                    <div className="text-3xl font-bold text-cyan-400">{100 - totalWorkShare}%</div>
                    <div className="text-slate-400 text-xs">Prime Share</div>
                  </div>
                  <div className="glass rounded-xl p-4 text-center">
                    <div className="text-3xl font-bold text-white">{totalWorkShare}%</div>
                    <div className="text-slate-400 text-xs">Sub Share</div>
                  </div>
                  <div className="glass rounded-xl p-4 text-center">
                    <div className="text-3xl font-bold text-emerald-400">{activePartners}</div>
                    <div className="text-slate-400 text-xs">Active Partners</div>
                  </div>
                  <div className="glass rounded-xl p-4 text-center">
                    <div className={`text-3xl font-bold ${ndaRequired > 0 ? 'text-amber-400' : 'text-emerald-400'}`}>{ndaRequired}</div>
                    <div className="text-slate-400 text-xs">NDAs Pending</div>
                  </div>
                  <div className="glass rounded-xl p-4 text-center">
                    <div className={`text-3xl font-bold ${taRequired > 0 ? 'text-amber-400' : 'text-emerald-400'}`}>{taRequired}</div>
                    <div className="text-slate-400 text-xs">TAs Pending</div>
                  </div>
                </div>
                
                {/* Filters */}
                <div className="flex flex-wrap gap-4 mb-6">
                  <div>
                    <label className="text-xs text-slate-500 block mb-1">Trust Level</label>
                    <select value={filterTrust} onChange={(e) => setFilterTrust(e.target.value)} className="bg-slate-800 border border-slate-700 rounded px-3 py-2 text-white text-sm">
                      <option value="all">All Levels</option>
                      <option value="high">🟢 Trusted</option>
                      <option value="medium">🟡 Verified</option>
                      <option value="low">🔴 Caution</option>
                    </select>
                  </div>
                  <div>
                    <label className="text-xs text-slate-500 block mb-1">Status</label>
                    <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)} className="bg-slate-800 border border-slate-700 rounded px-3 py-2 text-white text-sm">
                      <option value="all">All Statuses</option>
                      <option value="Active">Active</option>
                      <option value="Negotiating">Negotiating</option>
                      <option value="Evaluating">Evaluating</option>
                      <option value="Declined">Declined</option>
                    </select>
                  </div>
                </div>
                
                {/* Partner Cards */}
                <div className="grid gap-4">
                  {filteredPartners.map(partner => {
                    const trustStyle = getTrustStyle(partner.trust_level);
                    
                    return (
                      <div key={partner.id} className={`frenemy-card rounded-xl p-6 ${trustStyle.border}`}>
                        <div className="flex justify-between items-start mb-4">
                          <div className="flex-1">
                            <div className="flex items-center gap-3 mb-1">
                              <h3 className="font-semibold text-white text-lg">{partner.company_name}</h3>
                              <span className={`px-2 py-0.5 rounded text-xs ${getStatusBadge(partner.status)}`}>{partner.status}</span>
                              <span className={`px-2 py-0.5 rounded text-xs ${trustStyle.bg} ${trustStyle.text}`}>{trustStyle.label}</span>
                            </div>
                            <div className="flex items-center gap-4 text-sm text-slate-400">
                              <span>{partner.partner_type}</span>
                              <span className="bg-slate-700 px-2 py-0.5 rounded text-xs">{partner.socioeconomic}</span>
                              {partner.work_share > 0 && <span className="text-cyan-400">{partner.work_share}% work share</span>}
                            </div>
                          </div>
                          <div className="flex gap-2">
                            <button onClick={() => openModal(partner)} className="text-slate-400 hover:text-cyan-400 p-2">✏️</button>
                            <button onClick={() => handleDelete(partner)} className="text-slate-400 hover:text-red-400 p-2">🗑️</button>
                          </div>
                        </div>
                        
                        <div className="grid md:grid-cols-2 gap-4">
                          <div>
                            <div className="text-xs text-slate-500 mb-2">CONTACT</div>
                            <p className="text-white">{partner.contact_name}</p>
                            <p className="text-slate-400 text-sm">{partner.contact_email}</p>
                            <p className="text-slate-400 text-sm">{partner.contact_phone}</p>
                          </div>
                          
                          <div>
                            <div className="text-xs text-slate-500 mb-2">CAPABILITIES</div>
                            <div className="flex flex-wrap gap-1">
                              {(partner.capabilities || []).map((cap, i) => (
                                <span key={i} className="bg-slate-700 px-2 py-0.5 rounded text-xs text-slate-300">{cap}</span>
                              ))}
                            </div>
                          </div>
                        </div>
                        
                        <div className="flex items-center gap-6 mt-4 pt-4 border-t border-slate-700">
                          <div className="flex items-center gap-2">
                            <span className={partner.nda_signed ? 'text-emerald-400' : 'text-red-400'}>{partner.nda_signed ? '✓' : '✗'}</span>
                            <span className="text-sm text-slate-400">NDA {partner.nda_signed ? `(exp: ${partner.nda_expiry})` : 'Pending'}</span>
                          </div>
                          <div className="flex items-center gap-2">
                            <span className={partner.teaming_agreement ? 'text-emerald-400' : 'text-red-400'}>{partner.teaming_agreement ? '✓' : '✗'}</span>
                            <span className="text-sm text-slate-400">Teaming Agreement</span>
                          </div>
                          <div className="flex items-center gap-2">
                            <span className={partner.past_performance ? 'text-emerald-400' : 'text-amber-400'}>{partner.past_performance ? '✓' : '○'}</span>
                            <span className="text-sm text-slate-400">Past Performance</span>
                          </div>
                        </div>
                        
                        {partner.notes && (
                          <div className={`mt-4 p-3 rounded ${partner.trust_level === 'low' ? 'bg-red-500/10 border border-red-500/30' : 'bg-slate-800/50'}`}>
                            <p className={`text-sm ${partner.trust_level === 'low' ? 'text-red-300' : 'text-slate-300'}`}>{partner.notes}</p>
                          </div>
                        )}
                      </div>
                    );
                  })}
                  
                  {filteredPartners.length === 0 && (
                    <div className="text-center py-12 text-slate-500 glass rounded-xl">
                      <div className="text-4xl mb-3">🤝</div>
                      <p>No teaming partners {filterTrust !== 'all' || filterStatus !== 'all' ? 'matching filters' : 'yet'}</p>
                    </div>
                  )}
                </div>
              </div>
            )}
          </main>
          
          {/* Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50 p-4">
              <div className="glass rounded-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                <div className="p-6">
                  <h2 className="text-xl font-semibold text-white mb-6">
                    {editingPartner ? 'Edit Partner' : 'Add Teaming Partner'}
                  </h2>
                  
                  <div className="space-y-4">
                    <div className="grid md:grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Company Name *</label>
                        <input type="text" value={formData.company_name} onChange={(e) => setFormData({ ...formData, company_name: e.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white" />
                      </div>
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Partner Type</label>
                        <select value={formData.partner_type} onChange={(e) => setFormData({ ...formData, partner_type: e.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white">
                          {PARTNER_TYPES.map(t => <option key={t}>{t}</option>)}
                        </select>
                      </div>
                    </div>
                    
                    <div className="grid md:grid-cols-3 gap-4">
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Contact Name</label>
                        <input type="text" value={formData.contact_name} onChange={(e) => setFormData({ ...formData, contact_name: e.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white" />
                      </div>
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Email</label>
                        <input type="email" value={formData.contact_email} onChange={(e) => setFormData({ ...formData, contact_email: e.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white" />
                      </div>
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Phone</label>
                        <input type="text" value={formData.contact_phone} onChange={(e) => setFormData({ ...formData, contact_phone: e.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white" />
                      </div>
                    </div>
                    
                    <div className="grid md:grid-cols-3 gap-4">
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Socioeconomic</label>
                        <select value={formData.socioeconomic} onChange={(e) => setFormData({ ...formData, socioeconomic: e.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white">
                          {SOCIOECONOMIC_TYPES.map(t => <option key={t}>{t}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Work Share %</label>
                        <input type="number" min="0" max="100" value={formData.work_share} onChange={(e) => setFormData({ ...formData, work_share: parseInt(e.target.value) || 0 })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white" />
                      </div>
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Trust Level</label>
                        <select value={formData.trust_level} onChange={(e) => setFormData({ ...formData, trust_level: e.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white">
                          <option value="high">🟢 Trusted</option>
                          <option value="medium">🟡 Verified</option>
                          <option value="low">🔴 Caution</option>
                        </select>
                      </div>
                    </div>
                    
                    <div>
                      <label className="block text-sm text-slate-400 mb-2">Capabilities</label>
                      <div className="flex flex-wrap gap-2">
                        {CAPABILITY_AREAS.map(cap => (
                          <button
                            key={cap}
                            onClick={() => toggleCapability(cap)}
                            className={`px-3 py-1 rounded text-sm ${formData.capabilities.includes(cap) ? 'bg-cyan-500 text-slate-900' : 'bg-slate-700 text-white'}`}
                          >
                            {cap}
                          </button>
                        ))}
                      </div>
                    </div>
                    
                    <div className="grid md:grid-cols-3 gap-4">
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Status</label>
                        <select value={formData.status} onChange={(e) => setFormData({ ...formData, status: e.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white">
                          <option>Evaluating</option>
                          <option>Negotiating</option>
                          <option>Active</option>
                          <option>Declined</option>
                          <option>Inactive</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">NDA Expiry</label>
                        <input type="date" value={formData.nda_expiry} onChange={(e) => setFormData({ ...formData, nda_expiry: e.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white" />
                      </div>
                      <div className="flex items-end gap-4 pb-3">
                        <label className="flex items-center gap-2 text-sm text-slate-300">
                          <input type="checkbox" checked={formData.nda_signed} onChange={(e) => setFormData({ ...formData, nda_signed: e.target.checked })} className="rounded" />
                          NDA Signed
                        </label>
                        <label className="flex items-center gap-2 text-sm text-slate-300">
                          <input type="checkbox" checked={formData.teaming_agreement} onChange={(e) => setFormData({ ...formData, teaming_agreement: e.target.checked })} className="rounded" />
                          TA Signed
                        </label>
                      </div>
                    </div>
                    
                    <div className="flex items-center gap-4">
                      <label className="flex items-center gap-2 text-sm text-slate-300">
                        <input type="checkbox" checked={formData.past_performance} onChange={(e) => setFormData({ ...formData, past_performance: e.target.checked })} className="rounded" />
                        Has Relevant Past Performance
                      </label>
                    </div>
                    
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Notes (Internal Only)</label>
                      <textarea value={formData.notes} onChange={(e) => setFormData({ ...formData, notes: e.target.value })} rows={3} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white" placeholder="Competitive intelligence, relationship history, concerns..." />
                    </div>
                  </div>
                  
                  <div className="flex justify-end gap-3 mt-6">
                    <button onClick={closeModal} className="px-4 py-2 text-slate-400 hover:text-white">Cancel</button>
                    <button onClick={handleSave} disabled={!formData.company_name} className="bg-cyan-500 hover:bg-cyan-600 disabled:opacity-50 text-slate-900 px-6 py-2 rounded-lg font-medium">
                      {editingPartner ? 'Save Changes' : 'Add Partner'}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
          
          {/* Footer */}
          <footer className="mt-12 py-6 text-center text-xs text-slate-500 border-t border-slate-800">
            <p>Mission Meets Tech • Shield & Pulse UX v8.0</p>
            <p className="mt-1">AI GENERATED - REQUIRES HUMAN REVIEW</p>
          </footer>
        </div>
      );
    }
    
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
