<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frenemy Protocol | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:#00050F;color:#e2e8f0;min-height:100vh}.glass{background:rgba(15,23,42,0.85);backdrop-filter:blur(16px);border:1px solid rgba(0,229,250,0.1);border-radius:12px}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const SUPABASE_URL='https://qdrtpnpnhkxvfmvfziop.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
const supabase=window.supabase?.createClient(SUPABASE_URL,SUPABASE_ANON);

const DEMO_ACCESS=[
  {id:1,partner_name:'TechForward Solutions',partner_email:'partner@techforward.com',access_level:'limited',modules:['writer','compliance'],nda_signed:true,auto_revoke_on_submit:true},
  {id:2,partner_name:'DataSecure Inc',partner_email:'team@datasecure.com',access_level:'standard',modules:['writer','compliance','pricing'],nda_signed:true,auto_revoke_on_submit:true},
  {id:3,partner_name:'HealthIT Pros',partner_email:'info@healthitpros.com',access_level:'limited',modules:['writer'],nda_signed:false,auto_revoke_on_submit:true}
];

function FrenemyProtocol(){
  const[connected,setConnected]=useState(false);
  const[access,setAccess]=useState(DEMO_ACCESS);
  const[preview,setPreview]=useState(false);
  const[selected,setSelected]=useState(null);

  useEffect(()=>{
    const load=async()=>{
      try{
        const{data,error}=await supabase.from('partner_access').select('*');
        if(!error&&data?.length)setAccess(data);
        setConnected(!error);
      }catch{setConnected(false)}
    };
    load();
  },[]);

  const maskData=(text)=>preview?'████████████':'[MASKED FOR PARTNER VIEW]';
  const toggleAccess=(id,field)=>setAccess(access.map(a=>a.id===id?{...a,[field]:!a[field]}:a));
  const revokeAccess=(id)=>setAccess(access.filter(a=>a.id!==id));

  return(
    <div className="min-h-screen p-6">
      <div className="flex justify-between items-start mb-6">
        <div>
          <h1 className="text-2xl font-bold text-white flex items-center gap-3">🛡️ Frenemy Protocol<span className={`text-xs px-2 py-1 rounded ${connected?'bg-emerald-500/20 text-emerald-400':'bg-red-500/20 text-red-400'}`}>{connected?'● Live':'○ Demo'}</span></h1>
          <p className="text-slate-400 text-sm mt-1">Partner data access control and masking</p>
        </div>
        <button onClick={()=>setPreview(!preview)} className={`px-4 py-2 rounded-lg font-medium ${preview?'bg-amber-500 text-black':'bg-slate-700 text-white'}`}>
          {preview?'👁️ Partner View ON':'👤 Normal View'}
        </button>
      </div>

      {preview&&(
        <div className="glass p-4 mb-6 bg-amber-500/10 border-amber-500/30">
          <div className="flex items-center gap-3">
            <span className="text-2xl">⚠️</span>
            <div>
              <div className="font-semibold text-amber-400">Partner Preview Mode Active</div>
              <div className="text-sm text-slate-400">Viewing data as a teaming partner would see it. Sensitive data is masked.</div>
            </div>
          </div>
        </div>
      )}

      <div className="grid grid-cols-3 gap-4 mb-6">
        <div className="glass p-4"><div className="text-slate-400 text-xs">Active Partners</div><div className="text-2xl font-bold text-cyan-400">{access.length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">NDA Signed</div><div className="text-2xl font-bold text-emerald-400">{access.filter(a=>a.nda_signed).length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Auto-Revoke Enabled</div><div className="text-2xl font-bold text-amber-400">{access.filter(a=>a.auto_revoke_on_submit).length}</div></div>
      </div>

      <div className="glass overflow-hidden">
        <div className="p-4 border-b border-slate-700/50 flex justify-between items-center">
          <h3 className="font-semibold text-white">Partner Access Control</h3>
          <button className="px-3 py-1.5 bg-cyan-500 text-white rounded-lg text-sm">+ Grant Access</button>
        </div>
        <table className="w-full">
          <thead className="bg-slate-800/50">
            <tr>{['Partner','Email','Access Level','Modules','NDA','Auto-Revoke','Actions'].map(h=><th key={h} className="text-left p-3 text-xs font-semibold text-slate-400 uppercase">{h}</th>)}</tr>
          </thead>
          <tbody className="divide-y divide-slate-700/30">
            {access.map(a=>(
              <tr key={a.id} className="hover:bg-slate-800/30">
                <td className="p-3 text-white font-medium">{preview?maskData(a.partner_name):a.partner_name}</td>
                <td className="p-3 text-slate-400">{preview?maskData(a.partner_email):a.partner_email}</td>
                <td className="p-3"><span className={`px-2 py-0.5 rounded text-xs ${a.access_level==='full'?'bg-emerald-500/20 text-emerald-400':a.access_level==='standard'?'bg-cyan-500/20 text-cyan-400':'bg-slate-500/20 text-slate-400'}`}>{a.access_level}</span></td>
                <td className="p-3"><div className="flex gap-1 flex-wrap">{(a.modules||[]).map(m=><span key={m} className="px-1.5 py-0.5 rounded bg-slate-700 text-xs text-slate-300">{m}</span>)}</div></td>
                <td className="p-3"><button onClick={()=>toggleAccess(a.id,'nda_signed')} className={`px-2 py-1 rounded text-xs ${a.nda_signed?'bg-emerald-500/20 text-emerald-400':'bg-red-500/20 text-red-400'}`}>{a.nda_signed?'✓ Signed':'✗ Pending'}</button></td>
                <td className="p-3"><button onClick={()=>toggleAccess(a.id,'auto_revoke_on_submit')} className={`px-2 py-1 rounded text-xs ${a.auto_revoke_on_submit?'bg-amber-500/20 text-amber-400':'bg-slate-500/20 text-slate-400'}`}>{a.auto_revoke_on_submit?'Enabled':'Disabled'}</button></td>
                <td className="p-3"><button onClick={()=>revokeAccess(a.id)} className="text-red-400 hover:text-red-300 text-sm">Revoke</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="glass p-4 mt-6">
        <h3 className="font-semibold text-white mb-3">Data Masking Preview</h3>
        <div className="grid grid-cols-2 gap-4">
          <div className="bg-slate-800/50 p-3 rounded-lg">
            <div className="text-xs text-slate-500 mb-1">Pricing Data (Masked for Partners)</div>
            <div className="text-slate-300">{preview?'$███,███,███':'$98,450,210'}</div>
          </div>
          <div className="bg-slate-800/50 p-3 rounded-lg">
            <div className="text-xs text-slate-500 mb-1">Competitor Intel (Hidden)</div>
            <div className="text-slate-300">{preview?'[ACCESS DENIED]':'Leidos is incumbent...'}</div>
          </div>
        </div>
      </div>

      <div className="text-center text-xs text-slate-500 mt-8">AI GENERATED - REQUIRES HUMAN REVIEW | © 2026 Mission Meets Tech</div>
    </div>
  );
}
ReactDOM.render(<FrenemyProtocol/>,document.getElementById('root'));
</script>
</body>
</html>
