      const [connected, setConnected] = useState(false);
      const [loading, setLoading] = useState(true);
      const [opportunities, setOpportunities] = useState([]);
      const [partners, setPartners] = useState([]);
      const [selectedOpp, setSelectedOpp] = useState(null);
      const [selectedPartner, setSelectedPartner] = useState(null);
      const [viewMode, setViewMode] = useState('grid'); // grid | list

      const [searchQuery, setSearchQuery] = useState('');
      const [showAddModal, setShowAddModal] = useState(false);

      useEffect(() => {
        loadData();
      }, []);

      async function loadData() {
        setLoading(true);
        try {
          if (supabase) {
            const { data: opps } = await supabase
              .from('opportunities')
              .select('id, nickname, title')
              .order('created_at', { ascending: false });

            if (opps?.length > 0) {
              setOpportunities(opps);
              setSelectedOpp(opps[0]);
              setConnected(true);
              
              const { data: parts } = await supabase
                .from('teaming_partners')
                .select('*')
                .eq('opportunity_id', opps[0].id);
              
              if (parts) setPartners(parts);
            } else {
              throw new Error('No data');
            }
          } else {
            throw new Error('No Supabase');
          }

          setOpportunities(DEMO_OPPORTUNITIES);
          setSelectedOpp(DEMO_OPPORTUNITIES[0]);
          setPartners(DEMO_PARTNERS);
          setConnected(false);
        }
        setLoading(false);
      }

      async function loadPartners(oppId) {
        try {
          if (supabase && connected) {
            const { data } = await supabase
              .from('teaming_partners')
              .select('*')
              .eq('opportunity_id', oppId);
            if (data) setPartners(data);
          } else {
            setPartners(DEMO_PARTNERS.filter(p => p.opportunity_id === oppId));
          }
        } catch (e) {
          setPartners(DEMO_PARTNERS.filter(p => p.opportunity_id === oppId));
        }
      }

      function handleOppChange(opp) {
        setSelectedOpp(opp);
        setSelectedPartner(null);
        loadPartners(opp.id);
      }

      // Filter and search
      const filteredPartners = useMemo(() => {
        return partners.filter(p => {
          const matchesType = filterType === 'all' || p.relationship_type === filterType;
          const matchesSearch = searchQuery === '' || 
            p.company_name?.toLowerCase().includes(searchQuery.toLowerCase()) ||
            p.capabilities?.some(c => c.toLowerCase().includes(searchQuery.toLowerCase()));
          return matchesType && matchesSearch;
        });
      }, [partners, filterType, searchQuery]);

      const stats = useMemo(() => ({
        total: partners.length,
        partners: partners.filter(p => ['subcontractor', 'teaming', 'prime', 'mentor_protege'].includes(p.relationship_type)).length,
        competitors: partners.filter(p => p.relationship_type === 'competitor' || p.relationship_type === 'incumbent').length,
        committed: partners.filter(p => ['committed', 'active'].includes(p.status)).length,
        totalValue: partners.filter(p => p.estimated_value).reduce((sum, p) => sum + (p.estimated_value || 0), 0)
      }), [partners]);

      if (loading) {
        return (

            <div className="text-center">
              <div className="w-16 h-16 border-4 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin mx-auto mb-4"></div>

        );

      return (

                  <div className="flex items-center gap-2">
                    <Icon name="target" className="w-6 h-6 text-cyan-400" />
                    <h1 className="text-xl font-bold">Frenemy Protocol</h1>
                  </div>
                  <span className="px-2 py-1 bg-purple-500/20 text-purple-400 rounded text-xs font-medium">
                    Teaming & Competitive Intel
                  </span>
                </div>
                
                <div className="flex items-center gap-4">
                  <select
                    value={selectedOpp?.id || ''}
                    onChange={(e) => {
                      const opp = opportunities.find(o => o.id === e.target.value);

                    className="bg-slate-800/50 border border-cyan-500/30 rounded-lg px-3 py-2 text-sm"
                  >
                    {opportunities.map(opp => (
                      <option key={opp.id} value={opp.id}>{opp.nickname} - {opp.title}</option>
                    ))}
                  </select>
                  
                  <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-xs ${connected ? 'bg-green-500/20 text-green-400' : 'bg-yellow-500/20 text-yellow-400'}`}>
                    <div className={`w-2 h-2 rounded-full ${connected ? 'bg-green-400' : 'bg-yellow-400'} animate-pulse`}></div>
                    {connected ? 'Connected' : 'Demo Mode'}
                  </div>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 py-6">

            <div className="grid grid-cols-5 gap-4 mb-6">

              </div>
              <div className="glass rounded-xl p-4">

              <div className="glass rounded-xl p-4">

              <div className="glass rounded-xl p-4">
                <div className="text-2xl font-bold text-amber-400">${(stats.totalValue / 1000000).toFixed(1)}M</div>
                <div className="text-xs text-slate-400">Partner Value</div>
              </div>
            </div>

            {/* Toolbar */}
            <div className="glass rounded-xl p-4 mb-6">
              <div className="flex items-center gap-4 flex-wrap">
                {/* Search */}
                <div className="flex-1 min-w-[200px] relative">
                  <Icon name="search" className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />

                    type="text"
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    placeholder="Search companies or capabilities..."

                    filteredPartners.map(partner => (
                      <div
                        key={partner.id}
                        onClick={() => setSelectedPartner(partner)}
                        className={`glass rounded-xl p-4 cursor-pointer transition-all hover:border-cyan-500/50 ${
                          selectedPartner?.id === partner.id ? 'border-cyan-500/50 bg-cyan-500/5' : ''

                      >
                        <div className="flex items-start justify-between mb-3">
                          <div>
                            <h3 className="font-semibold">{partner.company_name}</h3>
                            {partner.cage_code && (
                              <span className="text-xs text-slate-500">CAGE: {partner.cage_code}</span>
                            )}
                          </div>
                          <div 
                            className="p-2 rounded-lg"
                            style={{ backgroundColor: RELATIONSHIP_TYPES[partner.relationship_type]?.color + '20' }}
                          >
                            <Icon 
                              name={RELATIONSHIP_TYPES[partner.relationship_type]?.icon} 
                              className="w-4 h-4"
                              style={{ color: RELATIONSHIP_TYPES[partner.relationship_type]?.color }}
                            />
                          </div>
                        </div>

                        <div className="flex items-center gap-2 mb-3">
                          <span 
                            className="px-2 py-0.5 rounded text-xs"
                            style={{ 
                              backgroundColor: RELATIONSHIP_TYPES[partner.relationship_type]?.color + '20',
                              color: RELATIONSHIP_TYPES[partner.relationship_type]?.color
                            }}
                          >
                            {RELATIONSHIP_TYPES[partner.relationship_type]?.label}
                          </span>
                          <span 
                            className="px-2 py-0.5 rounded text-xs"
                            style={{ 
                              backgroundColor: STATUS_CONFIG[partner.status]?.color + '20',
                              color: STATUS_CONFIG[partner.status]?.color
                            }}
                          >
                            {STATUS_CONFIG[partner.status]?.label}
                          </span>
                          {partner.threat_level && (
                            <span 
                              className="px-2 py-0.5 rounded text-xs"
                              style={{ 
                                backgroundColor: THREAT_LEVELS[partner.threat_level]?.color + '20',
                                color: THREAT_LEVELS[partner.threat_level]?.color
                              }}
                            >
                              ⚠️ {THREAT_LEVELS[partner.threat_level]?.label}
                            </span>
                          )}
                        </div>

                        {partner.capabilities && partner.capabilities.length > 0 && (
                          <div className="flex flex-wrap gap-1 mb-3">
                            {partner.capabilities.slice(0, 3).map((cap, i) => (
                              <span key={i} className="px-2 py-0.5 bg-slate-700/50 rounded text-xs text-slate-300">
                                {cap}
                              </span>
                            ))}
                            {partner.capabilities.length > 3 && (
                              <span className="px-2 py-0.5 bg-slate-700/50 rounded text-xs text-slate-400">
                                +{partner.capabilities.length - 3}
                              </span>
                            )}
                          </div>
                        )}

                        {partner.estimated_value && (
                          <div className="text-sm text-slate-400">
                            Est. Value: <span className="text-green-400 font-medium">${(partner.estimated_value / 1000000).toFixed(1)}M</span>
                            {partner.work_share_percent && (
                              <span className="ml-2">({partner.work_share_percent}% share)</span>
                            )}
                          </div>
                        )}
                      </div>
                    ))
                  )}
                </div>
              </div>

              {/* Detail Panel */}
              <div className="col-span-1">
                {selectedPartner ? (
                  <div className="glass rounded-xl p-4 sticky top-24">
                    <div className="flex items-center justify-between mb-4">
                      <h3 className="font-bold text-lg">{selectedPartner.company_name}</h3>
                      <button className="p-1.5 hover:bg-cyan-500/20 rounded text-cyan-400">
                        <Icon name="edit" className="w-4 h-4" />
                      </button>
                    </div>

                    {/* Type & Status */}
                    <div className="flex flex-wrap gap-2 mb-4">
                      <span 
                        className="px-2 py-1 rounded text-sm font-medium"
                        style={{ 
                          backgroundColor: RELATIONSHIP_TYPES[selectedPartner.relationship_type]?.color + '20',
                          color: RELATIONSHIP_TYPES[selectedPartner.relationship_type]?.color
                        }}
                      >
                        {RELATIONSHIP_TYPES[selectedPartner.relationship_type]?.label}
                      </span>
                      {selectedPartner.threat_level && (
                        <span 
                          className="px-2 py-1 rounded text-sm font-medium"
                          style={{ 
                            backgroundColor: THREAT_LEVELS[selectedPartner.threat_level]?.color + '20',
                            color: THREAT_LEVELS[selectedPartner.threat_level]?.color
                          }}
                        >
                          Threat: {THREAT_LEVELS[selectedPartner.threat_level]?.label}
                        </span>
                      )}
                    </div>

                    {/* Contact Info */}
                    {selectedPartner.primary_contact_name && (
                      <div className="bg-slate-800/50 rounded-lg p-3 mb-4">
                        <h4 className="text-xs text-slate-400 mb-2">Primary Contact</h4>
                        <p className="font-medium">{selectedPartner.primary_contact_name}</p>
                        {selectedPartner.primary_contact_email && (
                          <a href={`mailto:${selectedPartner.primary_contact_email}`} className="flex items-center gap-2 text-sm text-cyan-400 hover:underline mt-1">
                            <Icon name="mail" className="w-3 h-3" />
                            {selectedPartner.primary_contact_email}
                          </a>
                        )}
                      </div>
                    )}

                    {/* Agreements */}
                    <div className="grid grid-cols-2 gap-2 mb-4">
                      <div className="bg-slate-800/50 rounded-lg p-2 text-center">
                        <div className="text-xs text-slate-400">NDA</div>
                        <div 
                          className="font-medium text-sm"
                          style={{ color: AGREEMENT_STATUS[selectedPartner.nda_status]?.color }}
                        >
                          {AGREEMENT_STATUS[selectedPartner.nda_status]?.label}
                        </div>
                      </div>
                      <div className="bg-slate-800/50 rounded-lg p-2 text-center">
                        <div className="text-xs text-slate-400">TA</div>
                        <div 
                          className="font-medium text-sm"
                          style={{ color: AGREEMENT_STATUS[selectedPartner.ta_status]?.color }}
                        >
                          {AGREEMENT_STATUS[selectedPartner.ta_status]?.label}
                        </div>
                      </div>
                    </div>

                    {/* Strengths & Weaknesses */}
                    {(selectedPartner.strengths || selectedPartner.weaknesses) && (
                      <div className="space-y-3 mb-4">
                        {selectedPartner.strengths && (
                          <div>
                            <h4 className="text-xs text-green-400 mb-1 font-medium">💪 Strengths</h4>
                            <p className="text-sm text-slate-300">{selectedPartner.strengths}</p>
                          </div>
                        )}
                        {selectedPartner.weaknesses && (
                          <div>
                            <h4 className="text-xs text-red-400 mb-1 font-medium">⚠️ Weaknesses</h4>
                            <p className="text-sm text-slate-300">{selectedPartner.weaknesses}</p>
                          </div>
                        )}
                      </div>
                    )}

                    {/* Capabilities */}
                    {selectedPartner.capabilities && selectedPartner.capabilities.length > 0 && (
                      <div className="mb-4">
                        <h4 className="text-xs text-slate-400 mb-2">Capabilities</h4>
                        <div className="flex flex-wrap gap-1">
                          {selectedPartner.capabilities.map((cap, i) => (
                            <span key={i} className="px-2 py-1 bg-cyan-500/10 text-cyan-400 rounded text-xs">
                              {cap}
                            </span>
                          ))}
                        </div>
                      </div>
                    )}

                    {/* Set-Asides */}
                    {selectedPartner.set_asides && selectedPartner.set_asides.length > 0 && (
                      <div>
                        <h4 className="text-xs text-slate-400 mb-2">Set-Asides</h4>
                        <div className="flex flex-wrap gap-1">
                          {selectedPartner.set_asides.map((sa, i) => (
                            <span key={i} className="px-2 py-1 bg-purple-500/10 text-purple-400 rounded text-xs">
                              {sa}
                            </span>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="glass rounded-xl p-8 text-center">
                    <Icon name="eye" className="w-12 h-12 mx-auto mb-2 text-slate-600" />
                    <p className="text-slate-500">Select an entity to view details</p>
                  </div>
                )}
              </div>
            </div>
          </main>

          {/* Footer */}
          <footer className="border-t border-cyan-500/10 mt-8 py-4 text-center text-xs text-slate-500">
            <p>MissionPulse v3.1 • Mission Meets Tech • AI GENERATED CONTENT REQUIRES HUMAN REVIEW</p>
          </footer>

          {/* Add Modal would go here */}
        </div>
      );
    }

    ReactDOM.render(<FrenemyApp />, document.getElementById('root'));
  </script>
</body>
</html>
