<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Directory | MissionPulse</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass { background: rgba(0,229,250,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
    .glass-card { background: rgba(15,23,42,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(51,65,85,0.5); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const DEMO_TEAM = [
      { id: '1', name: 'Mary Womack', title: 'CEO', department: 'Executive', email: 'mary@missionmeetstech.com', phone: '(555) 123-4567', clearance: 'Top Secret', skills: ['Strategy', 'GovCon', 'Leadership'], avatar: 'MW', status: 'active', location: 'Charlotte, NC' },
      { id: '2', name: 'Dr. Sarah Chen', title: 'Chief Technology Officer', department: 'Technology', email: 'sarah.chen@missionmeetstech.com', phone: '(555) 234-5678', clearance: 'Secret', skills: ['Cloud Architecture', 'FHIR', 'Healthcare IT'], avatar: 'SC', status: 'active', location: 'Remote' },
      { id: '3', name: 'Michael Johnson', title: 'VP of Capture', department: 'Business Development', email: 'michael.j@missionmeetstech.com', phone: '(555) 345-6789', clearance: 'Secret', skills: ['Capture Management', 'Federal Sales', 'Pricing'], avatar: 'MJ', status: 'active', location: 'Washington, DC' },
      { id: '4', name: 'Lisa Rodriguez', title: 'Senior Proposal Manager', department: 'Proposal Operations', email: 'lisa.r@missionmeetstech.com', phone: '(555) 456-7890', clearance: 'Secret', skills: ['Shipley', 'Technical Writing', 'Compliance'], avatar: 'LR', status: 'active', location: 'Remote' },
      { id: '5', name: 'David Kim', title: 'Solutions Architect', department: 'Technology', email: 'david.k@missionmeetstech.com', phone: '(555) 567-8901', clearance: 'Top Secret/SCI', skills: ['DevSecOps', 'AWS GovCloud', 'Zero Trust'], avatar: 'DK', status: 'busy', location: 'Reston, VA' },
      { id: '6', name: 'Amanda Foster', title: 'Compliance Manager', department: 'Compliance', email: 'amanda.f@missionmeetstech.com', phone: '(555) 678-9012', clearance: 'Secret', skills: ['CMMC', 'FedRAMP', 'NIST 800-171'], avatar: 'AF', status: 'active', location: 'Charlotte, NC' },
      { id: '7', name: 'James Wilson', title: 'Program Manager', department: 'Delivery', email: 'james.w@missionmeetstech.com', phone: '(555) 789-0123', clearance: 'Secret', skills: ['PMP', 'Agile', 'Federal Delivery'], avatar: 'JW', status: 'away', location: 'San Antonio, TX' },
      { id: '8', name: 'Emily Davis', title: 'Business Analyst', department: 'Business Development', email: 'emily.d@missionmeetstech.com', phone: '(555) 890-1234', clearance: 'Public Trust', skills: ['Requirements', 'Process Improvement', 'Data Analysis'], avatar: 'ED', status: 'active', location: 'Remote' },
      { id: '9', name: 'Robert Martinez', title: 'Cybersecurity Lead', department: 'Technology', email: 'robert.m@missionmeetstech.com', phone: '(555) 901-2345', clearance: 'Top Secret', skills: ['CISSP', 'Penetration Testing', 'Incident Response'], avatar: 'RM', status: 'active', location: 'Columbia, MD' },
      { id: '10', name: 'Jennifer Taylor', title: 'Finance Director', department: 'Finance', email: 'jennifer.t@missionmeetstech.com', phone: '(555) 012-3456', clearance: 'Public Trust', skills: ['FAR/DFARS', 'Cost Accounting', 'Pricing Strategy'], avatar: 'JT', status: 'active', location: 'Charlotte, NC' }
    ];

    const Icons = {
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
      users: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
      mail: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>,
      phone: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>,
      location: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
      shield: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
      search: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
      plus: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>,
      x: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    const Badge = ({ children, variant = 'default' }) => {
      const variants = {
        default: 'bg-slate-700 text-slate-300',
        success: 'bg-emerald-500/20 text-emerald-400',
        warning: 'bg-amber-500/20 text-amber-400',
        danger: 'bg-red-500/20 text-red-400',
        cyan: 'bg-cyan-500/20 text-cyan-400',
        purple: 'bg-purple-500/20 text-purple-400'
      };
      return <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${variants[variant]}`}>{children}</span>;
    };

    const StatusDot = ({ status }) => {
      const colors = { active: 'bg-emerald-500', busy: 'bg-red-500', away: 'bg-amber-500' };
      return <span className={`w-3 h-3 rounded-full ${colors[status] || colors.active} ring-2 ring-slate-900`}></span>;
    };

    function TeamDirectory() {
      const [team, setTeam] = useState(DEMO_TEAM);
      const [search, setSearch] = useState('');
      const [filterDept, setFilterDept] = useState('all');
      const [selectedMember, setSelectedMember] = useState(null);
      const [viewMode, setViewMode] = useState('grid');

      const departments = [...new Set(team.map(m => m.department))];

      const filteredTeam = useMemo(() => {
        return team.filter(m => {
          const matchSearch = m.name.toLowerCase().includes(search.toLowerCase()) ||
                             m.title.toLowerCase().includes(search.toLowerCase()) ||
                             m.skills.some(s => s.toLowerCase().includes(search.toLowerCase()));
          const matchDept = filterDept === 'all' || m.department === filterDept;
          return matchSearch && matchDept;
        });
      }, [team, search, filterDept]);

      const stats = {
        total: team.length,
        active: team.filter(m => m.status === 'active').length,
        departments: departments.length
      };

      const avatarColors = ['from-cyan-500 to-blue-500', 'from-purple-500 to-pink-500', 'from-amber-500 to-orange-500', 'from-emerald-500 to-teal-500', 'from-red-500 to-rose-500'];

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="p-2 rounded-lg bg-slate-800/50 hover:bg-slate-700/50 transition-colors">
                    <Icon name="home" className="w-5 h-5 text-slate-400" />
                  </a>
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-500 flex items-center justify-center">
                      <Icon name="users" className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white">Team Directory</h1>
                      <p className="text-sm text-slate-400">{stats.total} team members</p>
                    </div>
                  </div>
                </div>
                <button className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-xl flex items-center gap-2 font-semibold hover:from-cyan-400 hover:to-teal-400 transition-all">
                  <Icon name="plus" className="w-4 h-4" /> Add Member
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8">
            {/* Stats */}
            <div className="grid grid-cols-4 gap-4 mb-8">
              {[
                { label: 'Total Members', value: stats.total, icon: 'users', color: 'blue' },
                { label: 'Active Now', value: stats.active, icon: 'users', color: 'emerald' },
                { label: 'Departments', value: stats.departments, icon: 'users', color: 'purple' },
                { label: 'Cleared Personnel', value: team.filter(m => m.clearance.includes('Secret')).length, icon: 'shield', color: 'amber' }
              ].map((stat, i) => (
                <div key={i} className="glass-card rounded-xl p-4">
                  <div className="flex items-center gap-3">
                    <div className={`w-10 h-10 rounded-lg bg-${stat.color}-500/20 flex items-center justify-center`}>
                      <Icon name={stat.icon} className={`w-5 h-5 text-${stat.color}-400`} />
                    </div>
                    <div>
                      <div className="text-2xl font-bold text-white">{stat.value}</div>
                      <div className="text-xs text-slate-400">{stat.label}</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* Search & Filters */}
            <div className="glass-card rounded-xl p-4 mb-6">
              <div className="flex items-center gap-4">
                <div className="relative flex-1">
                  <Icon name="search" className="w-5 h-5 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" />
                  <input
                    type="text"
                    placeholder="Search by name, title, or skills..."
                    value={search}
                    onChange={(e) => setSearch(e.target.value)}
                    className="w-full bg-slate-800/50 border border-slate-700/50 rounded-lg pl-10 pr-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500/50"
                  />
                </div>
                <select
                  value={filterDept}
                  onChange={(e) => setFilterDept(e.target.value)}
                  className="bg-slate-800/50 border border-slate-700/50 rounded-lg px-4 py-2.5 text-white focus:outline-none"
                >
                  <option value="all">All Departments</option>
                  {departments.map(dept => (
                    <option key={dept} value={dept}>{dept}</option>
                  ))}
                </select>
              </div>
            </div>

            {/* Team Grid */}
            <div className="grid grid-cols-3 gap-4">
              {filteredTeam.map((member, idx) => (
                <div 
                  key={member.id}
                  onClick={() => setSelectedMember(member)}
                  className="glass-card rounded-xl p-5 hover:border-cyan-500/30 transition-all cursor-pointer"
                >
                  <div className="flex items-start gap-4">
                    <div className="relative">
                      <div className={`w-14 h-14 rounded-xl bg-gradient-to-br ${avatarColors[idx % avatarColors.length]} flex items-center justify-center text-white font-bold text-lg`}>
                        {member.avatar}
                      </div>
                      <div className="absolute -bottom-1 -right-1">
                        <StatusDot status={member.status} />
                      </div>
                    </div>
                    <div className="flex-1 min-w-0">
                      <h3 className="font-semibold text-white truncate">{member.name}</h3>
                      <p className="text-sm text-slate-400 truncate">{member.title}</p>
                      <p className="text-xs text-slate-500 mt-1">{member.department}</p>
                    </div>
                  </div>

                  <div className="mt-4 flex flex-wrap gap-1">
                    {member.skills.slice(0, 3).map((skill, i) => (
                      <Badge key={i} variant="default">{skill}</Badge>
                    ))}
                  </div>

                  <div className="mt-3 pt-3 border-t border-slate-700/50 flex items-center justify-between">
                    <Badge variant={member.clearance.includes('Top Secret') ? 'danger' : member.clearance.includes('Secret') ? 'warning' : 'default'}>
                      {member.clearance}
                    </Badge>
                    <span className="text-xs text-slate-500">{member.location}</span>
                  </div>
                </div>
              ))}
            </div>
          </main>

          {/* Member Detail Modal */}
          {selectedMember && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-6" onClick={() => setSelectedMember(null)}>
              <div className="glass-card rounded-2xl max-w-lg w-full" onClick={e => e.stopPropagation()}>
                <div className="p-6 border-b border-slate-700/50">
                  <div className="flex items-start justify-between">
                    <div className="flex items-center gap-4">
                      <div className="relative">
                        <div className="w-16 h-16 rounded-xl bg-gradient-to-br from-cyan-500 to-blue-500 flex items-center justify-center text-white font-bold text-xl">
                          {selectedMember.avatar}
                        </div>
                        <div className="absolute -bottom-1 -right-1">
                          <StatusDot status={selectedMember.status} />
                        </div>
                      </div>
                      <div>
                        <h2 className="text-xl font-bold text-white">{selectedMember.name}</h2>
                        <p className="text-slate-400">{selectedMember.title}</p>
                        <Badge variant="cyan">{selectedMember.department}</Badge>
                      </div>
                    </div>
                    <button onClick={() => setSelectedMember(null)} className="p-2 rounded-lg bg-slate-800/50 text-slate-400 hover:text-white">
                      <Icon name="x" className="w-5 h-5" />
                    </button>
                  </div>
                </div>

                <div className="p-6 space-y-4">
                  <div className="grid grid-cols-2 gap-4">
                    <div className="glass rounded-lg p-3">
                      <div className="text-xs text-slate-400 mb-1 flex items-center gap-1">
                        <Icon name="mail" className="w-3 h-3" /> Email
                      </div>
                      <a href={`mailto:${selectedMember.email}`} className="text-cyan-400 text-sm hover:underline">{selectedMember.email}</a>
                    </div>
                    <div className="glass rounded-lg p-3">
                      <div className="text-xs text-slate-400 mb-1 flex items-center gap-1">
                        <Icon name="phone" className="w-3 h-3" /> Phone
                      </div>
                      <div className="text-white text-sm">{selectedMember.phone}</div>
                    </div>
                    <div className="glass rounded-lg p-3">
                      <div className="text-xs text-slate-400 mb-1 flex items-center gap-1">
                        <Icon name="location" className="w-3 h-3" /> Location
                      </div>
                      <div className="text-white text-sm">{selectedMember.location}</div>
                    </div>
                    <div className="glass rounded-lg p-3">
                      <div className="text-xs text-slate-400 mb-1 flex items-center gap-1">
                        <Icon name="shield" className="w-3 h-3" /> Clearance
                      </div>
                      <div className="text-white text-sm">{selectedMember.clearance}</div>
                    </div>
                  </div>

                  <div>
                    <div className="text-sm text-slate-400 mb-2">Skills & Expertise</div>
                    <div className="flex flex-wrap gap-2">
                      {selectedMember.skills.map((skill, i) => (
                        <Badge key={i} variant="cyan">{skill}</Badge>
                      ))}
                    </div>
                  </div>
                </div>

                <div className="p-6 border-t border-slate-700/50 flex justify-end gap-3">
                  <button className="px-4 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-600 transition-colors">
                    <Icon name="mail" className="w-4 h-4 inline mr-2" />Send Email
                  </button>
                  <button className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-lg font-semibold">
                    View Full Profile
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <footer className="glass border-t border-slate-700/50 mt-12">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-2 text-slate-400 text-sm">
                <Icon name="shield" className="w-4 h-4" />
                <span>Mission Meets Tech • MissionPulse v12</span>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<TeamDirectory />);
  </script>
</body>
</html>
