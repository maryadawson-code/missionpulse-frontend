<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q&A Manager | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
    .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
    .cyan-glow { box-shadow: 0 0 30px rgba(0,229,250,0.15); }
    .status-open { background: rgba(239,68,68,0.2); color: #f87171; }
    .status-progress { background: rgba(251,191,36,0.2); color: #fbbf24; }
    .status-submitted { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .status-answered { background: rgba(34,197,94,0.2); color: #4ade80; }
  </style>
</head>
<body class="text-white">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    
    const supabaseUrl = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc4NTU0NjIsImV4cCI6MjA1MzQzMTQ2Mn0.Xj4_wfgnHdegN2jBcMh1cTBfvZhQxuF8FPxcE-krcHY';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const DEMO_QUESTIONS = [
      { id: '1', question_number: 'Q-001', question_text: 'Please describe your approach to ensuring HIPAA compliance across all system components.', source: 'Government', category: 'Technical', due_date: '2026-02-10', status: 'In Progress', assigned_to: 'Sarah Chen', response_text: '' },
      { id: '2', question_number: 'Q-002', question_text: 'Provide details on your proposed key personnel qualifications and availability.', source: 'Government', category: 'Management', due_date: '2026-02-08', status: 'Open', assigned_to: null, response_text: '' },
      { id: '3', question_number: 'Q-003', question_text: 'Clarify the pricing assumptions for Option Year 3 labor categories.', source: 'Government', category: 'Pricing', due_date: '2026-02-12', status: 'Submitted', assigned_to: 'Mike Torres', response_text: 'Option Year 3 pricing assumes a 3% annual escalation...' },
      { id: '4', question_number: 'Q-004', question_text: 'What is your disaster recovery RTO/RPO for the proposed system?', source: 'Industry Day', category: 'Technical', due_date: '2026-02-05', status: 'Answered', assigned_to: 'Sarah Chen', response_text: 'RTO: 4 hours, RPO: 1 hour with continuous replication...' },
      { id: '5', question_number: 'Q-005', question_text: 'Describe your experience with VA VistA system integration.', source: 'Government', category: 'Past Performance', due_date: '2026-02-15', status: 'Open', assigned_to: null, response_text: '' },
    ];

    function QAManager() {
      const [questions, setQuestions] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filter, setFilter] = useState('All');
      const [selectedQuestion, setSelectedQuestion] = useState(null);
      const [showModal, setShowModal] = useState(false);

      useEffect(() => {
        loadQuestions();
      }, []);

      async function loadQuestions() {
        try {
          const { data, error } = await supabase.from('qa_questions').select('*').order('due_date', { ascending: true });
          if (error) throw error;
          setQuestions(data?.length ? data : DEMO_QUESTIONS);
        } catch (err) {
          console.log('Using demo data:', err.message);
          setQuestions(DEMO_QUESTIONS);
        } finally {
          setLoading(false);
        }
      }

      const filteredQuestions = filter === 'All' ? questions : questions.filter(q => q.status === filter);
      
      const stats = {
        total: questions.length,
        open: questions.filter(q => q.status === 'Open').length,
        inProgress: questions.filter(q => q.status === 'In Progress').length,
        submitted: questions.filter(q => q.status === 'Submitted').length,
        answered: questions.filter(q => q.status === 'Answered').length,
      };

      const getStatusClass = (status) => {
        const classes = { 'Open': 'status-open', 'In Progress': 'status-progress', 'Submitted': 'status-submitted', 'Answered': 'status-answered' };
        return classes[status] || 'status-open';
      };

      const getDaysUntilDue = (dueDate) => {
        const days = Math.ceil((new Date(dueDate) - new Date()) / (1000 * 60 * 60 * 24));
        if (days < 0) return <span className="text-red-400 font-semibold">Overdue</span>;
        if (days === 0) return <span className="text-yellow-400 font-semibold">Due Today</span>;
        if (days <= 3) return <span className="text-orange-400">{days}d left</span>;
        return <span className="text-gray-400">{days}d left</span>;
      };

      return (
        <div className="min-h-screen p-6">
          {/* Header */}
          <div className="flex items-center justify-between mb-8">
            <div className="flex items-center space-x-4">
              <a href="index.html" className="text-gray-400 hover:text-cyan-400 transition">← Back</a>
              <div>
                <h1 className="text-3xl font-bold text-white">Q&A Manager</h1>
                <p className="text-gray-400">Track Government questions and responses</p>
              </div>
            </div>
            <button onClick={() => { setSelectedQuestion(null); setShowModal(true); }} className="px-6 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-xl font-semibold hover:opacity-90 transition flex items-center space-x-2">
              <span>+ New Question</span>
            </button>
          </div>

          {/* Stats Row */}
          <div className="grid grid-cols-5 gap-4 mb-8">
            {[
              { label: 'Total', value: stats.total, color: 'cyan' },
              { label: 'Open', value: stats.open, color: 'red' },
              { label: 'In Progress', value: stats.inProgress, color: 'yellow' },
              { label: 'Submitted', value: stats.submitted, color: 'blue' },
              { label: 'Answered', value: stats.answered, color: 'green' },
            ].map((stat, i) => (
              <div key={i} className="glass-card rounded-xl p-4 text-center">
                <div className={`text-3xl font-bold text-${stat.color}-400`}>{stat.value}</div>
                <div className="text-gray-400 text-sm">{stat.label}</div>
              </div>
            ))}
          </div>

          {/* Filters */}
          <div className="flex space-x-2 mb-6">
            {['All', 'Open', 'In Progress', 'Submitted', 'Answered'].map((f) => (
              <button key={f} onClick={() => setFilter(f)} className={`px-4 py-2 rounded-lg font-medium transition ${filter === f ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/50' : 'bg-gray-800/50 text-gray-400 hover:bg-gray-700/50'}`}>
                {f}
              </button>
            ))}
          </div>

          {/* Questions Table */}
          <div className="glass-card rounded-2xl cyan-glow overflow-hidden">
            <table className="w-full">
              <thead className="bg-gray-900/50">
                <tr className="text-left text-gray-400 text-sm">
                  <th className="p-4">Q#</th>
                  <th className="p-4">Question</th>
                  <th className="p-4">Category</th>
                  <th className="p-4">Source</th>
                  <th className="p-4">Due Date</th>
                  <th className="p-4">Assigned</th>
                  <th className="p-4">Status</th>
                  <th className="p-4">Actions</th>
                </tr>
              </thead>
              <tbody>
                {loading ? (
                  <tr><td colSpan="8" className="p-8 text-center text-gray-400">Loading...</td></tr>
                ) : filteredQuestions.map((q) => (
                  <tr key={q.id} className="border-t border-gray-800/50 hover:bg-gray-800/30 transition">
                    <td className="p-4 font-mono text-cyan-400">{q.question_number}</td>
                    <td className="p-4 max-w-md">
                      <div className="truncate">{q.question_text}</div>
                    </td>
                    <td className="p-4">
                      <span className="px-2 py-1 rounded bg-gray-700/50 text-sm">{q.category}</span>
                    </td>
                    <td className="p-4 text-gray-400">{q.source}</td>
                    <td className="p-4">
                      <div className="text-sm">{new Date(q.due_date).toLocaleDateString()}</div>
                      <div className="text-xs">{getDaysUntilDue(q.due_date)}</div>
                    </td>
                    <td className="p-4 text-gray-300">{q.assigned_to || <span className="text-gray-600">Unassigned</span>}</td>
                    <td className="p-4">
                      <span className={`px-3 py-1 rounded-full text-sm font-medium ${getStatusClass(q.status)}`}>{q.status}</span>
                    </td>
                    <td className="p-4">
                      <button onClick={() => { setSelectedQuestion(q); setShowModal(true); }} className="text-cyan-400 hover:text-cyan-300 transition">View</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
              <div className="glass-card rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                <div className="p-6 border-b border-gray-800">
                  <div className="flex items-center justify-between">
                    <h2 className="text-xl font-bold">{selectedQuestion ? `Question ${selectedQuestion.question_number}` : 'New Question'}</h2>
                    <button onClick={() => setShowModal(false)} className="text-gray-400 hover:text-white text-2xl">&times;</button>
                  </div>
                </div>
                <div className="p-6 space-y-4">
                  {selectedQuestion ? (
                    <>
                      <div>
                        <label className="text-gray-400 text-sm">Question</label>
                        <p className="text-white mt-1">{selectedQuestion.question_text}</p>
                      </div>
                      <div className="grid grid-cols-3 gap-4">
                        <div>
                          <label className="text-gray-400 text-sm">Category</label>
                          <p className="text-white">{selectedQuestion.category}</p>
                        </div>
                        <div>
                          <label className="text-gray-400 text-sm">Source</label>
                          <p className="text-white">{selectedQuestion.source}</p>
                        </div>
                        <div>
                          <label className="text-gray-400 text-sm">Due Date</label>
                          <p className="text-white">{new Date(selectedQuestion.due_date).toLocaleDateString()}</p>
                        </div>
                      </div>
                      <div>
                        <label className="text-gray-400 text-sm">Response</label>
                        <textarea className="w-full mt-1 p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white" rows="4" defaultValue={selectedQuestion.response_text} placeholder="Enter response..."></textarea>
                      </div>
                      <div className="flex space-x-3">
                        <button className="flex-1 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-xl font-semibold hover:opacity-90 transition">Save Response</button>
                        <button className="px-6 py-3 bg-green-600/20 text-green-400 border border-green-500/50 rounded-xl font-semibold hover:bg-green-600/30 transition">Submit to Government</button>
                      </div>
                    </>
                  ) : (
                    <div className="space-y-4">
                      <input type="text" placeholder="Question Number (e.g., Q-006)" className="w-full p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white" />
                      <textarea placeholder="Question Text" className="w-full p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white" rows="3"></textarea>
                      <div className="grid grid-cols-2 gap-4">
                        <select className="p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white">
                          <option>Technical</option>
                          <option>Management</option>
                          <option>Past Performance</option>
                          <option>Pricing</option>
                        </select>
                        <input type="date" className="p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white" />
                      </div>
                      <button className="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-xl font-semibold hover:opacity-90 transition">Add Question</button>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<QAManager />, document.getElementById('root'));
  </script>
</body>
</html>
