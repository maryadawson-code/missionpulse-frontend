<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launch ROI | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:#00050F;color:#e2e8f0;min-height:100vh}.glass{background:rgba(15,23,42,0.85);backdrop-filter:blur(16px);border:1px solid rgba(0,229,250,0.1);border-radius:12px}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const SUPABASE_URL='https://qdrtpnpnhkxvfmvfziop.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
const supabase=window.supabase?.createClient(SUPABASE_URL,SUPABASE_ANON);

const CHECKLIST_ITEMS=[
  {category:'Compliance',items:['All L requirements addressed','All M requirements addressed','Page limits verified','Format requirements met']},
  {category:'Pricing',items:['BOE complete and validated','Rates verified against GSA schedule','Wrap rates calculated','Price-to-win analysis complete']},
  {category:'Technical',items:['Executive summary complete','Technical approach finalized','Management plan complete','Past performance narratives']},
  {category:'Administrative',items:['Cover letter signed','Representations & Certifications','Required forms attached','Submission portal tested']}
];

function LaunchROI(){
  const[connected,setConnected]=useState(false);
  const[opps,setOpps]=useState([]);
  const[selected,setSelected]=useState(null);
  const[checklist,setChecklist]=useState({});
  const[goNoGo,setGoNoGo]=useState(null);

  useEffect(()=>{
    const load=async()=>{
      try{
        const{data,error}=await supabase.from('opportunities').select('*').order('days_to_due');
        if(!error){setOpps(data||[]);setConnected(true);if(data?.length)setSelected(data[0])}
      }catch{setConnected(false)}
    };
    load();
  },[]);

  const toggleItem=(cat,item)=>{
    const key=`${cat}-${item}`;
    setChecklist({...checklist,[key]:!checklist[key]});
  };

  const totalItems=CHECKLIST_ITEMS.reduce((s,c)=>s+c.items.length,0);
  const completedItems=Object.values(checklist).filter(Boolean).length;
  const progress=totalItems?Math.round((completedItems/totalItems)*100):0;
  const readyToSubmit=progress>=100;

  const fmt=v=>v>=1e6?`$${(v/1e6).toFixed(1)}M`:`$${(v||0).toLocaleString()}`;

  return(
    <div className="min-h-screen p-6">
      <div className="flex justify-between items-start mb-6">
        <div>
          <h1 className="text-2xl font-bold text-white flex items-center gap-3">🚀 Launch ROI<span className={`text-xs px-2 py-1 rounded ${connected?'bg-emerald-500/20 text-emerald-400':'bg-red-500/20 text-red-400'}`}>{connected?'● Live':'○ Demo'}</span></h1>
          <p className="text-slate-400 text-sm mt-1">Final submission checklist and Go/No-Go decision</p>
        </div>
      </div>

      <div className="grid grid-cols-12 gap-6">
        <div className="col-span-3">
          <div className="glass p-4">
            <h3 className="text-sm font-semibold text-white mb-3">Select Opportunity</h3>
            <div className="space-y-2 max-h-80 overflow-y-auto">
              {opps.map(o=>(
                <div key={o.id} onClick={()=>{setSelected(o);setChecklist({});setGoNoGo(null)}} className={`p-3 rounded-lg cursor-pointer ${selected?.id===o.id?'bg-cyan-500/20 border border-cyan-500/50':'bg-slate-800/50 hover:bg-slate-700/50'}`}>
                  <div className="font-medium text-white text-sm">{o.nickname}</div>
                  <div className="flex justify-between text-xs text-slate-500 mt-1">
                    <span>{fmt(o.ceiling)}</span>
                    <span className={o.days_to_due<=7?'text-red-400':o.days_to_due<=14?'text-amber-400':''}>{o.days_to_due}d</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>

        <div className="col-span-9">
          {selected?(
            <div className="space-y-6">
              <div className="glass p-6 bg-gradient-to-r from-cyan-500/10 to-emerald-500/10">
                <div className="flex justify-between items-center">
                  <div>
                    <h2 className="text-xl font-bold text-white">{selected.nickname}</h2>
                    <p className="text-slate-400">{selected.title}</p>
                  </div>
                  <div className="text-right">
                    <div className="text-3xl font-bold text-emerald-400">{fmt(selected.ceiling)}</div>
                    <div className="text-sm text-slate-400">{selected.days_to_due} days to due</div>
                  </div>
                </div>
              </div>

              <div className="glass p-4">
                <div className="flex justify-between items-center mb-3">
                  <h3 className="font-semibold text-white">Submission Readiness</h3>
                  <span className={`text-lg font-bold ${progress>=100?'text-emerald-400':progress>=75?'text-amber-400':'text-red-400'}`}>{progress}%</span>
                </div>
                <div className="h-3 bg-slate-800 rounded-full overflow-hidden">
                  <div className={`h-full transition-all ${progress>=100?'bg-emerald-500':progress>=75?'bg-amber-500':'bg-red-500'}`} style={{width:`${progress}%`}}/>
                </div>
              </div>

              <div className="grid grid-cols-2 gap-4">
                {CHECKLIST_ITEMS.map(cat=>(
                  <div key={cat.category} className="glass p-4">
                    <h4 className="font-semibold text-white mb-3">{cat.category}</h4>
                    <div className="space-y-2">
                      {cat.items.map(item=>{
                        const key=`${cat.category}-${item}`;
                        const checked=checklist[key];
                        return(
                          <label key={item} className="flex items-center gap-2 cursor-pointer group">
                            <input type="checkbox" checked={!!checked} onChange={()=>toggleItem(cat.category,item)} className="w-4 h-4 rounded border-slate-600 bg-slate-800 text-cyan-500 focus:ring-cyan-500"/>
                            <span className={`text-sm ${checked?'text-slate-500 line-through':'text-slate-300'}`}>{item}</span>
                          </label>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>

              <div className="glass p-6">
                <h3 className="font-semibold text-white mb-4 text-center">Go / No-Go Decision</h3>
                {goNoGo===null?(
                  <div className="flex gap-4 justify-center">
                    <button onClick={()=>setGoNoGo('go')} disabled={!readyToSubmit} className="px-8 py-3 bg-emerald-500 text-white rounded-lg font-bold text-lg disabled:opacity-50 disabled:cursor-not-allowed">
                      ✓ GO - Submit Proposal
                    </button>
                    <button onClick={()=>setGoNoGo('nogo')} className="px-8 py-3 bg-red-500 text-white rounded-lg font-bold text-lg">
                      ✗ NO-GO - Stand Down
                    </button>
                  </div>
                ):(
                  <div className={`text-center p-6 rounded-lg ${goNoGo==='go'?'bg-emerald-500/20':'bg-red-500/20'}`}>
                    <div className="text-4xl mb-2">{goNoGo==='go'?'🚀':'🛑'}</div>
                    <div className={`text-xl font-bold ${goNoGo==='go'?'text-emerald-400':'text-red-400'}`}>
                      {goNoGo==='go'?'DECISION: GO':'DECISION: NO-GO'}
                    </div>
                    <button onClick={()=>setGoNoGo(null)} className="mt-4 text-sm text-slate-400 hover:text-white">Reset Decision</button>
                  </div>
                )}
                {!readyToSubmit&&goNoGo===null&&<p className="text-center text-amber-400 text-sm mt-3">Complete all checklist items to enable GO decision</p>}
              </div>
            </div>
          ):(
            <div className="glass p-12 text-center">
              <span className="text-6xl">🚀</span>
              <p className="text-slate-400 mt-4">Select an opportunity to review</p>
            </div>
          )}
        </div>
      </div>
      <div className="text-center text-xs text-slate-500 mt-8">AI GENERATED - REQUIRES HUMAN REVIEW | © 2026 Mission Meets Tech</div>
    </div>
  );
}
ReactDOM.render(<LaunchROI/>,document.getElementById('root'));
</script>
</body>
</html>
