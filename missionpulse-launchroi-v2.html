<!DOCTYPE html>
<html lang="en">
<!--

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launch ROI | MissionPulse</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const CHECKLIST_ITEMS = [
      { id: 'compliance', name: 'Compliance Matrix 100%', category: 'Documents', critical: true },
      { id: 'pricing_final', name: 'Pricing Final Review', category: 'Documents', critical: true },
      { id: 'technical_final', name: 'Technical Volume Final', category: 'Documents', critical: true },
      { id: 'past_perf', name: 'Past Performance Complete', category: 'Documents', critical: true },
      { id: 'exec_summary', name: 'Executive Summary Approved', category: 'Documents', critical: false },
      { id: 'certs', name: 'Certifications Attached', category: 'Admin', critical: true },
      { id: 'reps_certs', name: 'Reps & Certs Updated', category: 'Admin', critical: true },
      { id: 'sam_current', name: 'SAM.gov Registration Current', category: 'Admin', critical: true },
      { id: 'signatures', name: 'All Signatures Obtained', category: 'Admin', critical: true },
      { id: 'format_check', name: 'Format Requirements Met', category: 'Quality', critical: false },
      { id: 'page_count', name: 'Page Count Verified', category: 'Quality', critical: true },
      { id: 'spell_check', name: 'Spell Check Complete', category: 'Quality', critical: false },
      { id: 'pdf_generated', name: 'Final PDFs Generated', category: 'Submission', critical: true },
      { id: 'upload_ready', name: 'Upload Package Ready', category: 'Submission', critical: true },
      { id: 'backup_copy', name: 'Backup Copy Saved', category: 'Submission', critical: false },
    ];

    const DEMO_OPPORTUNITY = {
      id: 1,
      name: 'DHA Healthcare Platform',
      agency: 'DHA',
      contract_value: 47000000,
      due_date: '2026-03-15T17:00:00',
      win_probability: 72,
      bp_costs: {
        labor_hours: 320,
        labor_rate: 125,
        materials: 2500,
        travel: 1200,
        tools: 800,
        ai_tokens: 45,
      }
    };

    function LaunchROI() {
      const [connected, setConnected] = useState(false);
      const [loading, setLoading] = useState(true);
      const [opportunity, setOpportunity] = useState(null);
      const [checklist, setChecklist] = useState({});
      const [submissionStatus, setSubmissionStatus] = useState('preparing');
      const [countdown, setCountdown] = useState({ days: 0, hours: 0, minutes: 0 });

      useEffect(() => { loadData(); }, []);

      useEffect(() => {
        if (!opportunity?.due_date) return;
        
        const updateCountdown = () => {
          const now = new Date();
          const due = new Date(opportunity.due_date);
          const diff = due - now;
          
          if (diff <= 0) {
            setCountdown({ days: 0, hours: 0, minutes: 0 });
            return;
          }
          
          setCountdown({
            days: Math.floor(diff / (1000 * 60 * 60 * 24)),
            hours: Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
            minutes: Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)),
          });
        };
        
        updateCountdown();
        const interval = setInterval(updateCountdown, 60000);
        return () => clearInterval(interval);
      }, [opportunity]);

      const loadData = async () => {
        try {
          const { data } = await supabase.from('opportunities').select('*').eq('shipley_phase', 'Phase 3').limit(1).single();
          setOpportunity(data || DEMO_OPPORTUNITY);
          setConnected(!!data);
        } catch (err) {
          setOpportunity(DEMO_OPPORTUNITY);
        } finally {
          setLoading(false);
        }
      };

      const toggleCheckItem = (id) => {
        setChecklist(prev => ({ ...prev, [id]: !prev[id] }));
      };

      const checklistProgress = useMemo(() => {
        const total = CHECKLIST_ITEMS.length;
        const completed = Object.values(checklist).filter(Boolean).length;
        const criticalTotal = CHECKLIST_ITEMS.filter(i => i.critical).length;
        const criticalCompleted = CHECKLIST_ITEMS.filter(i => i.critical && checklist[i.id]).length;
        return { total, completed, criticalTotal, criticalCompleted, pct: Math.round((completed / total) * 100) };
      }, [checklist]);

      const roi = useMemo(() => {
        if (!opportunity?.bp_costs) return null;
        const costs = opportunity.bp_costs;
        const totalBP = (costs.labor_hours * costs.labor_rate) + costs.materials + costs.travel + costs.tools + costs.ai_tokens;
        const expectedValue = opportunity.contract_value * (opportunity.win_probability / 100);
        const roiRatio = expectedValue / totalBP;
        const timeSaved = Math.round(costs.labor_hours * 0.35); // 35% AI efficiency
        const costSaved = timeSaved * costs.labor_rate;
        
        return {
          totalBP,
          expectedValue,
          roiRatio,
          timeSaved,
          costSaved,
          breakeven: totalBP / (opportunity.contract_value * 0.05), // 5% margin assumption
        };
      }, [opportunity]);

      const handleSubmit = () => {
        if (checklistProgress.criticalCompleted < checklistProgress.criticalTotal) {
          alert('Cannot submit: Complete all critical checklist items first!');
          return;
        }
        setSubmissionStatus('submitted');
        alert('🚀 Proposal submitted successfully!');
      };

      if (loading) {
        return (
          <div className="min-h-screen bg-[#00050F] flex items-center justify-center">
            <div className="w-12 h-12 border-4 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin" />
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#00050F] text-white p-6">
          {/* Header */}
          <div className="flex items-center justify-between mb-6">
            <div>
              <div className="flex items-center gap-3">
                <span className="text-3xl">🚀</span>
                <h1 className="text-2xl font-bold">Launch ROI</h1>
                <span className={`px-2 py-1 text-xs rounded-full ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                  {connected ? '● Live' : '○ Demo'}
                </span>
              </div>
              <p className="text-slate-400 mt-1">Final submission checklist and ROI tracking</p>
            </div>
            
            <button 
              onClick={handleSubmit}
              disabled={submissionStatus === 'submitted' || checklistProgress.criticalCompleted < checklistProgress.criticalTotal}
              className={`px-6 py-3 rounded-xl font-bold text-lg transition-all ${
                submissionStatus === 'submitted' 
                  ? 'bg-emerald-500 cursor-default' 
                  : checklistProgress.criticalCompleted === checklistProgress.criticalTotal
                    ? 'bg-gradient-to-r from-amber-500 to-orange-500 hover:scale-105 animate-pulse'
                    : 'bg-slate-700 text-slate-400 cursor-not-allowed'
              }`}
            >
              {submissionStatus === 'submitted' ? '✓ Submitted' : '🚀 LAUNCH'}
            </button>
          </div>

          {/* Countdown Banner */}
          <div className={`mb-6 p-6 rounded-2xl border ${
            countdown.days < 3 ? 'bg-red-500/10 border-red-500/30' :
            countdown.days < 7 ? 'bg-amber-500/10 border-amber-500/30' :
            'bg-slate-800/50 border-slate-700/50'
          }`}>
            <div className="flex items-center justify-between">
              <div>
                <h2 className="text-xl font-bold">{opportunity.name}</h2>
                <div className="text-slate-400">{opportunity.agency} • ${(opportunity.contract_value / 1000000).toFixed(1)}M</div>
              </div>
              <div className="flex items-center gap-6">
                <div className="text-center">
                  <div className={`text-4xl font-bold ${countdown.days < 3 ? 'text-red-400' : countdown.days < 7 ? 'text-amber-400' : 'text-cyan-400'}`}>
                    {countdown.days}
                  </div>
                  <div className="text-xs text-slate-500">DAYS</div>
                </div>
                <div className="text-center">
                  <div className="text-4xl font-bold text-white">{countdown.hours}</div>
                  <div className="text-xs text-slate-500">HOURS</div>
                </div>
                <div className="text-center">
                  <div className="text-4xl font-bold text-white">{countdown.minutes}</div>
                  <div className="text-xs text-slate-500">MIN</div>
                </div>
              </div>
            </div>
          </div>

          <div className="grid grid-cols-12 gap-6">
            {/* Checklist */}
            <div className="col-span-7">
              <div className="bg-slate-800/50 rounded-xl border border-slate-700/50 p-6">
                <div className="flex items-center justify-between mb-4">
                  <h3 className="font-bold text-lg">Submission Checklist</h3>
                  <div className="flex items-center gap-2">
                    <span className={`text-2xl font-bold ${checklistProgress.pct === 100 ? 'text-emerald-400' : 'text-cyan-400'}`}>
                      {checklistProgress.pct}%
                    </span>
                    <span className="text-slate-500">({checklistProgress.completed}/{checklistProgress.total})</span>
                  </div>
                </div>

                {/* Progress Bar */}
                <div className="h-3 bg-slate-700 rounded-full overflow-hidden mb-6">
                  <div 
                    className={`h-full transition-all duration-500 ${checklistProgress.pct === 100 ? 'bg-emerald-500' : 'bg-cyan-500'}`}
                    style={{ width: `${checklistProgress.pct}%` }}
                  />
                </div>

                {/* Critical Items Warning */}
                {checklistProgress.criticalCompleted < checklistProgress.criticalTotal && (
                  <div className="mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-lg flex items-center gap-2">
                    <span>⚠️</span>
                    <span className="text-sm text-red-400">
                      {checklistProgress.criticalTotal - checklistProgress.criticalCompleted} critical items remaining
                    </span>
                  </div>
                )}

                {/* Checklist Items by Category */}
                {['Documents', 'Admin', 'Quality', 'Submission'].map(category => (
                  <div key={category} className="mb-4">
                    <h4 className="text-sm font-semibold text-slate-400 mb-2">{category}</h4>
                    <div className="space-y-2">
                      {CHECKLIST_ITEMS.filter(i => i.category === category).map(item => (
                        <label 
                          key={item.id}
                          className={`flex items-center gap-3 p-3 rounded-lg cursor-pointer transition-colors ${
                            checklist[item.id] ? 'bg-emerald-500/10 border border-emerald-500/30' : 'bg-slate-900/50 border border-slate-700/50 hover:border-slate-600'
                          }`}
                        >
                          <input 
                            type="checkbox"
                            checked={checklist[item.id] || false}
                            onChange={() => toggleCheckItem(item.id)}
                            className="w-5 h-5 rounded border-slate-600 bg-slate-800 text-emerald-500 focus:ring-emerald-500"
                          />
                          <span className={checklist[item.id] ? 'text-emerald-400 line-through' : 'text-white'}>
                            {item.name}
                          </span>
                          {item.critical && !checklist[item.id] && (
                            <span className="px-2 py-0.5 text-xs bg-red-500/20 text-red-400 rounded">CRITICAL</span>
                          )}
                        </label>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* ROI Dashboard */}
            <div className="col-span-5 space-y-4">
              {/* ROI Summary */}
              <div className="bg-gradient-to-br from-cyan-500/20 to-purple-500/20 rounded-xl border border-cyan-500/30 p-6">
                <h3 className="font-bold text-lg mb-4 flex items-center gap-2">
                  📊 ROI Analysis
                </h3>
                
                {roi && (
                  <div className="space-y-4">
                    <div className="grid grid-cols-2 gap-4">
                      <div className="p-4 bg-slate-900/50 rounded-lg">
                        <div className="text-sm text-slate-500">B&P Investment</div>
                        <div className="text-2xl font-bold text-white">${(roi.totalBP / 1000).toFixed(0)}K</div>
                      </div>
                      <div className="p-4 bg-slate-900/50 rounded-lg">
                        <div className="text-sm text-slate-500">Expected Value</div>
                        <div className="text-2xl font-bold text-emerald-400">${(roi.expectedValue / 1000000).toFixed(1)}M</div>
                      </div>
                    </div>

                    <div className="p-4 bg-slate-900/50 rounded-lg text-center">
                      <div className="text-sm text-slate-500">ROI Ratio</div>
                      <div className="text-4xl font-bold text-amber-400">{roi.roiRatio.toFixed(0)}x</div>
                      <div className="text-xs text-slate-500 mt-1">Return on B&P Investment</div>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                      <div className="p-4 bg-emerald-500/10 rounded-lg border border-emerald-500/30">
                        <div className="text-sm text-emerald-400">AI Time Saved</div>
                        <div className="text-xl font-bold text-white">{roi.timeSaved} hrs</div>
                      </div>
                      <div className="p-4 bg-emerald-500/10 rounded-lg border border-emerald-500/30">
                        <div className="text-sm text-emerald-400">AI Cost Saved</div>
                        <div className="text-xl font-bold text-white">${(roi.costSaved / 1000).toFixed(1)}K</div>
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {/* Win Probability */}
              <div className="bg-slate-800/50 rounded-xl border border-slate-700/50 p-6">
                <h3 className="font-bold mb-4">Win Probability</h3>
                <div className="flex items-center gap-4">
                  <div className="relative w-24 h-24">
                    <svg className="w-24 h-24 transform -rotate-90">
                      <circle cx="48" cy="48" r="40" stroke="#1e293b" strokeWidth="8" fill="none" />
                      <circle 
                        cx="48" cy="48" r="40" 
                        stroke={opportunity.win_probability >= 70 ? '#10b981' : opportunity.win_probability >= 50 ? '#f59e0b' : '#ef4444'}
                        strokeWidth="8" 
                        fill="none"
                        strokeLinecap="round"
                        strokeDasharray={`${opportunity.win_probability * 2.51} 251`}
                      />
                    </svg>
                    <div className="absolute inset-0 flex items-center justify-center">
                      <span className="text-2xl font-bold">{opportunity.win_probability}%</span>
                    </div>
                  </div>
                  <div>
                    <div className={`text-lg font-semibold ${
                      opportunity.win_probability >= 70 ? 'text-emerald-400' : 
                      opportunity.win_probability >= 50 ? 'text-amber-400' : 'text-red-400'
                    }`}>
                      {opportunity.win_probability >= 70 ? 'Strong Position' : 
                       opportunity.win_probability >= 50 ? 'Competitive' : 'Needs Work'}
                    </div>
                    <div className="text-sm text-slate-500">Based on capture intelligence</div>
                  </div>
                </div>
              </div>

              {/* Quick Actions */}
              <div className="bg-slate-800/50 rounded-xl border border-slate-700/50 p-6">
                <h3 className="font-bold mb-4">Quick Actions</h3>
                <div className="grid grid-cols-2 gap-2">
                  <button className="p-3 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
                    📄 Export Package
                  </button>
                  <button className="p-3 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
                    📧 Notify Team
                  </button>
                  <button className="p-3 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
                    📋 Final Review
                  </button>
                  <button className="p-3 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
                    💾 Save Snapshot
                  </button>
                </div>
              </div>
            </div>
          </div>

          {/* Footer */}
          <div className="mt-8 pt-4 border-t border-slate-800 text-center text-xs text-slate-600">
            AI GENERATED - REQUIRES HUMAN REVIEW
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<LaunchROI />);
  </script>
</body>
</html>
