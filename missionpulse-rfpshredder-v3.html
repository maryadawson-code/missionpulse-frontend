<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | RFP Shredder</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --mmt-cyan: #00E5FA; --mmt-navy: #00050F; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--mmt-navy); color: #e2e8f0; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

const CONFIG = {
  SUPABASE_URL: 'https://qdrtpnpnhkxvfmvfziop.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8',
  LOGIN_PAGE: 'login.html'
};

const DEMO_REQUIREMENTS = [
  { id: 1, section: 'L.1.1', text: 'The contractor shall provide experienced Program Manager with PMP certification', type: 'mandatory', status: 'compliant', volume: 'L' },
  { id: 2, section: 'L.1.2', text: 'Offeror must demonstrate 3+ years experience with VA healthcare IT systems', type: 'mandatory', status: 'partial', volume: 'L' },
  { id: 3, section: 'L.2.1', text: 'Technical approach shall address interoperability with existing EHR systems', type: 'evaluation', status: 'pending', volume: 'L' },
  { id: 4, section: 'M.1.1', text: 'Provide 3 past performance references of similar scope and complexity', type: 'mandatory', status: 'compliant', volume: 'M' },
  { id: 5, section: 'K.1.1', text: 'Pricing shall be submitted using SF 1449 format', type: 'mandatory', status: 'compliant', volume: 'K' },
  { id: 6, section: 'L.3.1', text: 'Describe approach to CMMC Level 2 compliance', type: 'evaluation', status: 'pending', volume: 'L' }
];

function checkAuth() {
  const session = localStorage.getItem('MP_SESSION');
  if (!session) { window.location.href = CONFIG.LOGIN_PAGE; return null; }
  try { return JSON.parse(localStorage.getItem('MP_USER')); }
  catch { return { email: 'demo@mmt.com', role: 'PM', name: 'Demo User' }; }
}

function RequirementRow({ req, onStatusChange }) {
  const statusColors = { compliant: 'bg-green-500/20 text-green-400', partial: 'bg-amber-500/20 text-amber-400', pending: 'bg-slate-500/20 text-slate-400', noncompliant: 'bg-red-500/20 text-red-400' };
  const typeColors = { mandatory: 'bg-red-500/20 text-red-400', evaluation: 'bg-blue-500/20 text-blue-400' };
  
  return (
    <tr className="border-b border-slate-700/50 hover:bg-slate-800/30">
      <td className="py-3 px-4"><span className="font-mono text-cyan-400">{req.section}</span></td>
      <td className="py-3 px-4 text-sm text-slate-300">{req.text}</td>
      <td className="py-3 px-4"><span className={`px-2 py-1 rounded text-xs ${typeColors[req.type]}`}>{req.type}</span></td>
      <td className="py-3 px-4"><span className="text-xs px-2 py-1 bg-slate-700 rounded">Vol {req.volume}</span></td>
      <td className="py-3 px-4">
        <select value={req.status} onChange={(e) => onStatusChange(req.id, e.target.value)} className={`px-2 py-1 rounded text-xs ${statusColors[req.status]} bg-transparent border border-current cursor-pointer`}>
          <option value="pending">Pending</option>
          <option value="compliant">Compliant</option>
          <option value="partial">Partial</option>
          <option value="noncompliant">Non-Compliant</option>
        </select>
      </td>
    </tr>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [requirements, setRequirements] = useState(DEMO_REQUIREMENTS);
  const [filterVolume, setFilterVolume] = useState('all');

  useEffect(() => {
    const authUser = checkAuth();
    if (authUser) setUser(authUser);
  }, []);

  const handleStatusChange = (id, status) => {
    setRequirements(requirements.map(r => r.id === id ? { ...r, status } : r));
  };

  const filtered = filterVolume === 'all' ? requirements : requirements.filter(r => r.volume === filterVolume);
  const stats = {
    total: requirements.length,
    compliant: requirements.filter(r => r.status === 'compliant').length,
    partial: requirements.filter(r => r.status === 'partial').length,
    pending: requirements.filter(r => r.status === 'pending').length
  };

  if (!user) return <div className="min-h-screen flex items-center justify-center text-cyan-400">Loading...</div>;

  return (
    <div className="min-h-screen bg-slate-950">
      <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            </a>
            <div>
              <h1 className="text-xl font-bold text-white">📄 RFP Shredder</h1>
              <p className="text-sm text-slate-400">Requirements Extraction & Compliance Matrix</p>
            </div>
          </div>
          <span className="text-sm text-slate-400">{user.name} ({user.role})</span>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-6 space-y-6">
        {/* Stats */}
        <div className="grid grid-cols-4 gap-4">
          <div className="glass rounded-xl p-4 text-center">
            <p className="text-3xl font-bold text-white">{stats.total}</p>
            <p className="text-sm text-slate-400">Total Requirements</p>
          </div>
          <div className="glass rounded-xl p-4 text-center">
            <p className="text-3xl font-bold text-green-400">{stats.compliant}</p>
            <p className="text-sm text-slate-400">Compliant</p>
          </div>
          <div className="glass rounded-xl p-4 text-center">
            <p className="text-3xl font-bold text-amber-400">{stats.partial}</p>
            <p className="text-sm text-slate-400">Partial</p>
          </div>
          <div className="glass rounded-xl p-4 text-center">
            <p className="text-3xl font-bold text-slate-400">{stats.pending}</p>
            <p className="text-sm text-slate-400">Pending Review</p>
          </div>
        </div>

        {/* Filter */}
        <div className="flex gap-2">
          {['all', 'L', 'M', 'K'].map(v => (
            <button key={v} onClick={() => setFilterVolume(v)} className={`px-3 py-1.5 rounded-lg text-sm ${filterVolume === v ? 'bg-cyan-600 text-white' : 'bg-slate-800 text-slate-400 hover:text-white'}`}>
              {v === 'all' ? 'All Volumes' : `Volume ${v}`}
            </button>
          ))}
        </div>

        {/* Requirements Table */}
        <div className="glass rounded-xl overflow-hidden">
          <table className="w-full">
            <thead className="bg-slate-800/50">
              <tr>
                <th className="py-3 px-4 text-left text-sm font-medium text-slate-400">Section</th>
                <th className="py-3 px-4 text-left text-sm font-medium text-slate-400">Requirement</th>
                <th className="py-3 px-4 text-left text-sm font-medium text-slate-400">Type</th>
                <th className="py-3 px-4 text-left text-sm font-medium text-slate-400">Volume</th>
                <th className="py-3 px-4 text-left text-sm font-medium text-slate-400">Status</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(req => <RequirementRow key={req.id} req={req} onStatusChange={handleStatusChange} />)}
            </tbody>
          </table>
        </div>

        {/* Compliance Score */}
        <div className="glass rounded-xl p-6">
          <div className="flex items-center justify-between mb-4">
            <h3 className="text-lg font-semibold text-white">Overall Compliance Score</h3>
            <span className="text-3xl font-bold text-cyan-400">{Math.round((stats.compliant / stats.total) * 100)}%</span>
          </div>
          <div className="w-full h-4 bg-slate-700 rounded-full overflow-hidden">
            <div className="h-full bg-gradient-to-r from-cyan-500 to-green-500 rounded-full transition-all" style={{ width: `${(stats.compliant / stats.total) * 100}%` }} />
          </div>
        </div>
      </main>

      <footer className="border-t border-slate-800 mt-12">
        <div className="max-w-7xl mx-auto px-4 py-4 text-center text-xs text-slate-500">
          Mission Meets Tech © 2026 | MissionPulse v3.0 | RFP Shredder Module
        </div>
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
