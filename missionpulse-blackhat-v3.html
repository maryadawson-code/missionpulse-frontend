<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Black Hat Intelligence</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --mmt-cyan: #00E5FA; --mmt-navy: #00050F; --mmt-surface: #0f172a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--mmt-navy); color: #e2e8f0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
    .restricted-banner { background: linear-gradient(90deg, #f59e0b 0%, #d97706 100%); }
  </style>
</head>
<body>
  <!-- RESTRICTED ACCESS BANNER -->
  <div class="restricted-banner text-black text-center py-1 text-xs font-bold tracking-wider">
    🔒 PRIVATE // COMPETITIVE INTELLIGENCE - CEO/COO/CAPTURE ONLY
  </div>
  
  <div id="root"></div>
  <script type="text/babel">

// MISSIONPULSE BLACK HAT V3
// Mission Meets Tech © 2026
// CLASSIFICATION: PRIVATE - RBAC RESTRICTED
// ============================================================

const { useState, useEffect } = React;

// CONFIG
const CONFIG = {
  SUPABASE_URL: 'https://djuviwarqdvlbgcfuupa.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8',
  API_URL: 'https://missionpulse-api.onrender.com',
  LOGIN_PAGE: 'login.html',
  ALLOWED_ROLES: ['CEO', 'COO', 'CAP', 'Admin'] // STRICT RBAC
};

const supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

// DEMO COMPETITOR DATA
const DEMO_COMPETITORS = [
  { 
    id: 1, 
    name: 'Leidos', 
    tier: 'Prime', 
    threat: 'high',
    strengths: ['Incumbent advantage', 'Deep VA relationships', 'Large workforce'],
    weaknesses: ['Higher rates', 'Slow to innovate', 'Bureaucratic'],
    recentWins: ['VA EHRM Support ($2.3B)', 'DHA Cloud ($890M)'],
    estimatedBid: 235000000
  },
  { 
    id: 2, 
    name: 'GDIT', 
    tier: 'Prime', 
    threat: 'high',
    strengths: ['Strong technical capability', 'GSA Schedule rates', 'Past performance'],
    weaknesses: ['Personnel turnover', 'Pricing pressure', 'Less agile'],
    recentWins: ['CMS Data Hub ($560M)', 'FDA IT Support ($340M)'],
    estimatedBid: 228000000
  },
  { 
    id: 3, 
    name: 'Accenture Federal', 
    tier: 'Prime', 
    threat: 'medium',
    strengths: ['Consulting expertise', 'Change management', 'Global resources'],
    weaknesses: ['Higher rates', 'Less cleared personnel', 'Non-traditional'],
    recentWins: ['IRS Modernization ($1.1B)', 'HHS Analytics ($290M)'],
    estimatedBid: 265000000
  },
  { 
    id: 4, 
    name: 'Booz Allen', 
    tier: 'Prime', 
    threat: 'medium',
    strengths: ['Analytics/AI expertise', 'Cleared workforce', 'Strategic consulting'],
    weaknesses: ['Premium pricing', 'Consulting focus vs delivery', 'Overhead'],
    recentWins: ['DoD AI/ML ($780M)', 'IC Analytics ($450M)'],
    estimatedBid: 255000000
  }
];

// Ghost Team Strategy
const GHOST_STRATEGIES = [
  { strategy: 'Price to Win', description: 'Position 10-15% below incumbent while maintaining margin' },
  { strategy: 'Technical Differentiator', description: 'Lead with AI/automation capabilities they lack' },
  { strategy: 'Small Business Advantage', description: 'Leverage SDVOSB preference for evaluation boost' },
  { strategy: 'Teaming Counter', description: 'Recruit their likely subs to our team' }
];

// Auth & RBAC Check
function checkAuth() {
  const session = localStorage.getItem('MP_SESSION');
  if (!session) { window.location.href = CONFIG.LOGIN_PAGE; return null; }
  try { 
    const user = JSON.parse(localStorage.getItem('MP_USER'));
    if (!CONFIG.ALLOWED_ROLES.includes(user.role)) {
      window.location.href = 'missionpulse-dashboard-v3.html';
      return null;
    }
    return user;
  }
  catch { return { email: 'demo@mmt.com', role: 'CAP', name: 'Demo User' }; }
}

// Icons
const Icons = {
  back: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>,
  eye: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>,
  shield: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
  target: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
};

// Competitor Card
function CompetitorCard({ competitor, onSelect }) {
  const threatColors = { high: 'border-red-500 bg-red-500/10', medium: 'border-amber-500 bg-amber-500/10', low: 'border-green-500 bg-green-500/10' };
  
  return (
    <div onClick={() => onSelect(competitor)} className={`glass rounded-xl p-4 cursor-pointer hover:border-cyan-500/50 transition-all border-l-4 ${threatColors[competitor.threat]}`}>
      <div className="flex justify-between items-start mb-3">
        <div>
          <h3 className="font-bold text-white text-lg">{competitor.name}</h3>
          <span className="text-xs text-slate-400">{competitor.tier}</span>
        </div>
        <span className={`px-2 py-1 rounded text-xs font-bold uppercase ${
          competitor.threat === 'high' ? 'bg-red-500/20 text-red-400' : 
          competitor.threat === 'medium' ? 'bg-amber-500/20 text-amber-400' : 
          'bg-green-500/20 text-green-400'
        }`}>
          {competitor.threat} threat
        </span>
      </div>
      <div className="text-sm text-slate-400 mb-2">
        Est. Bid: <span className="text-cyan-400 font-medium">${(competitor.estimatedBid / 1000000).toFixed(0)}M</span>
      </div>
      <div className="flex gap-2 flex-wrap">
        {competitor.strengths.slice(0, 2).map((s, i) => (
          <span key={i} className="text-xs px-2 py-1 bg-slate-700/50 rounded text-slate-300">{s}</span>
        ))}
      </div>
    </div>
  );
}

// Competitor Detail
function CompetitorDetail({ competitor, onBack }) {
  return (
    <div className="space-y-6">
      <div className="flex items-center gap-4">
        <button onClick={onBack} className="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white">
          <Icons.back />
        </button>
        <div>
          <h2 className="text-2xl font-bold text-white">{competitor.name}</h2>
          <p className="text-slate-400">{competitor.tier} Competitor Analysis</p>
        </div>
      </div>

      <div className="grid grid-cols-2 gap-6">
        {/* Strengths */}
        <div className="glass rounded-xl p-4">
          <h3 className="text-lg font-semibold text-green-400 mb-4">✓ Strengths</h3>
          <ul className="space-y-2">
            {competitor.strengths.map((s, i) => (
              <li key={i} className="flex items-start gap-2 text-sm text-slate-300">
                <span className="text-green-400 mt-1">•</span> {s}
              </li>
            ))}
          </ul>
        </div>

        {/* Weaknesses */}
        <div className="glass rounded-xl p-4">
          <h3 className="text-lg font-semibold text-red-400 mb-4">✗ Weaknesses</h3>
          <ul className="space-y-2">
            {competitor.weaknesses.map((w, i) => (
              <li key={i} className="flex items-start gap-2 text-sm text-slate-300">
                <span className="text-red-400 mt-1">•</span> {w}
              </li>
            ))}
          </ul>
        </div>
      </div>

      {/* Recent Wins */}
      <div className="glass rounded-xl p-4">
        <h3 className="text-lg font-semibold text-amber-400 mb-4">Recent Contract Wins</h3>
        <div className="grid grid-cols-2 gap-4">
          {competitor.recentWins.map((win, i) => (
            <div key={i} className="bg-slate-800/50 rounded-lg p-3">
              <p className="text-sm text-white">{win}</p>
            </div>
          ))}
        </div>
      </div>

      {/* Ghost Team Counter-Strategy */}
      <div className="glass rounded-xl p-4 border border-amber-500/30">
        <h3 className="text-lg font-semibold text-amber-400 mb-4 flex items-center gap-2">
          🎭 Ghost Team Counter-Strategy
        </h3>
        <div className="grid grid-cols-2 gap-4">
          {GHOST_STRATEGIES.map((gs, i) => (
            <div key={i} className="bg-slate-800/50 rounded-lg p-3">
              <h4 className="font-medium text-white mb-1">{gs.strategy}</h4>
              <p className="text-xs text-slate-400">{gs.description}</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// Main App
function App() {
  const [user, setUser] = useState(null);
  const [competitors, setCompetitors] = useState(DEMO_COMPETITORS);
  const [selectedCompetitor, setSelectedCompetitor] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const authUser = checkAuth();
    if (authUser) {
      setUser(authUser);
      loadCompetitors();
    }
  }, []);

  async function loadCompetitors() {
    setLoading(true);
    try {
      const { data, error } = await supabase.from('competitors').select('*');
      if (data && data.length > 0) {
        setCompetitors(data);
      }
    } catch (err) {
      console.log('[MissionPulse] Using demo competitor data');
    }
    setLoading(false);
  }

  if (!user) return <div className="min-h-screen flex items-center justify-center"><div className="animate-pulse text-amber-400">Verifying RBAC access...</div></div>;

  return (
    <div className="min-h-screen bg-slate-950">
      {/* Header */}
      <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white">
              <Icons.back />
            </a>
            <div>
              <h1 className="text-xl font-bold text-white flex items-center gap-2">
                🎭 Black Hat Intel
                <span className="px-2 py-0.5 bg-amber-600 text-black text-xs rounded font-bold">PRIVATE</span>
              </h1>
              <p className="text-sm text-slate-400">Competitive Intelligence Analysis</p>
            </div>
          </div>
          <div className="flex items-center gap-4">
            <span className="text-xs px-2 py-1 bg-amber-500/20 text-amber-400 rounded">
              Access: {user.role}
            </span>
            <span className="text-sm text-slate-400">{user.name}</span>
          </div>
        </div>
      </header>

      {/* Main Content */}
      <main className="max-w-7xl mx-auto px-4 py-6">
        {selectedCompetitor ? (
          <CompetitorDetail competitor={selectedCompetitor} onBack={() => setSelectedCompetitor(null)} />
        ) : (
          <div className="space-y-6">
            {/* Stats Bar */}
            <div className="grid grid-cols-4 gap-4">
              <div className="glass rounded-xl p-4 text-center">
                <p className="text-3xl font-bold text-white">{competitors.length}</p>
                <p className="text-sm text-slate-400">Known Competitors</p>
              </div>
              <div className="glass rounded-xl p-4 text-center">
                <p className="text-3xl font-bold text-red-400">{competitors.filter(c => c.threat === 'high').length}</p>
                <p className="text-sm text-slate-400">High Threat</p>
              </div>
              <div className="glass rounded-xl p-4 text-center">
                <p className="text-3xl font-bold text-cyan-400">${(competitors.reduce((sum, c) => sum + c.estimatedBid, 0) / 1000000 / competitors.length).toFixed(0)}M</p>
                <p className="text-sm text-slate-400">Avg Est. Bid</p>
              </div>
              <div className="glass rounded-xl p-4 text-center">
                <p className="text-3xl font-bold text-green-400">4</p>
                <p className="text-sm text-slate-400">Counter Strategies</p>
              </div>
            </div>

            {/* Competitor Grid */}
            <div>
              <h2 className="text-lg font-semibold text-white mb-4">Competitor Profiles</h2>
              {loading ? (
                <div className="text-center py-12 text-slate-400">Loading intelligence...</div>
              ) : (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {competitors.map(c => (
                    <CompetitorCard key={c.id} competitor={c} onSelect={setSelectedCompetitor} />
                  ))}
                </div>
              )}
            </div>
          </div>
        )}
      </main>

      {/* Footer */}
      <footer className="restricted-banner text-black text-center py-2 text-xs mt-12">
        🔒 PRIVATE // Competitive Intelligence - Authorized Personnel Only | Mission Meets Tech © 2026
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
