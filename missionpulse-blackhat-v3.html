<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Black Hat Review | RESTRICTED</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
    @keyframes pulse-red { 0%, 100% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); } 50% { box-shadow: 0 0 40px rgba(239, 68, 68, 0.5); } }
    .restricted-glow { animation: pulse-red 3s infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    // ============================================
    // CONFIGURATION
    // ============================================
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const API_URL = 'https://missionpulse-api.onrender.com';
    const MODULE_ID = 'blackhat';
    const CUI_MARKING = 'CUI//SP-FEDCON';
    
    // RBAC - Only these roles can access Black Hat
    const AUTHORIZED_ROLES = ['CEO', 'COO', 'CAP', 'Admin'];
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // ============================================
    // DEMO DATA
    // ============================================
    const DEMO_COMPETITORS = [
      { 
        id: 1, 
        name: 'Booz Allen Hamilton', 
        threat_level: 'high',
        incumbent: true,
        strengths: ['Deep agency relationships', 'Large bench of cleared staff', 'Strong past performance'],
        weaknesses: ['Higher rates', 'Less agile', 'Recent turnover in health IT'],
        likely_price: 118000000,
        likely_teaming: ['SAIC', 'Deloitte'],
        win_themes: ['Continuity of service', 'Proven methodology'],
        counter_strategy: 'Emphasize innovation, lower rates, faster delivery'
      },
      { 
        id: 2, 
        name: 'Leidos', 
        threat_level: 'high',
        incumbent: false,
        strengths: ['Technical depth', 'Recent health IT wins', 'Strong CMMI ratings'],
        weaknesses: ['Integration challenges post-merger', 'Key personnel departed'],
        likely_price: 122000000,
        likely_teaming: ['Accenture Federal'],
        win_themes: ['Technical excellence', 'Scale'],
        counter_strategy: 'Highlight agility and specialized health expertise'
      },
      { 
        id: 3, 
        name: 'General Dynamics IT', 
        threat_level: 'medium',
        incumbent: false,
        strengths: ['Infrastructure expertise', 'Cleared facilities', 'DoD relationships'],
        weaknesses: ['Less health IT focus', 'Higher overhead'],
        likely_price: 130000000,
        likely_teaming: ['Perspecta'],
        win_themes: ['Security focus', 'Reliability'],
        counter_strategy: 'Demonstrate health domain expertise superiority'
      },
      { 
        id: 4, 
        name: 'Maximus', 
        threat_level: 'medium',
        incumbent: false,
        strengths: ['CMS relationships', 'Citizen services expertise', 'Cost competitive'],
        weaknesses: ['Less technical depth', 'Limited cloud experience'],
        likely_price: 95000000,
        likely_teaming: ['AWS', 'Cognosante'],
        win_themes: ['Value', 'Mission focus'],
        counter_strategy: 'Emphasize technical sophistication and innovation'
      }
    ];

    const DEMO_OPPORTUNITIES = [
      { id: 1, title: 'VA EHR Modernization', agency: 'VA' },
      { id: 2, title: 'DHA MHS GENESIS Support', agency: 'DHA' },
      { id: 3, title: 'CMS Data Analytics', agency: 'CMS' }
    ];

    // ============================================
    // AI INTEGRATION (Secure Channel)
    // ============================================
    const sendToAI = async (message, context = {}) => {
      console.log('[BlackHatAI] Routing through secure channel');
      try {
        const response = await fetch(`${API_URL}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message,
            agent: 'blackhat',
            context: { module: MODULE_ID, cuiMarking: CUI_MARKING, sensitivity: 'high', ...context }
          })
        });
        if (!response.ok) throw new Error('API error');
        const data = await response.json();
        return { content: data.response, provider: 'secure', cui: CUI_MARKING };
      } catch (e) {
        return { content: 'Secure AI channel temporarily unavailable.', error: true, cui: CUI_MARKING };
      }
    };

    // ============================================
    // UTILITY FUNCTIONS
    // ============================================
    const formatCurrency = (value) => {
      if (!value) return '$0';
      if (value >= 1000000) return `$${(value / 1000000).toFixed(0)}M`;
      return `$${(value / 1000).toFixed(0)}K`;
    };

    const getThreatColor = (level) => ({
      high: { bg: 'bg-red-500/20', text: 'text-red-400', border: 'border-red-500/50' },
      medium: { bg: 'bg-amber-500/20', text: 'text-amber-400', border: 'border-amber-500/50' },
      low: { bg: 'bg-emerald-500/20', text: 'text-emerald-400', border: 'border-emerald-500/50' }
    }[level] || { bg: 'bg-slate-500/20', text: 'text-slate-400', border: 'border-slate-500/50' });

    // ============================================
    // COMPONENTS
    // ============================================

    // Access Denied Screen
    const AccessDenied = () => (
      <div className="min-h-screen flex items-center justify-center">
        <div className="text-center max-w-md">
          <div className="w-20 h-20 mx-auto mb-6 rounded-full bg-red-500/20 flex items-center justify-center restricted-glow">
            <span className="text-4xl">🔒</span>
          </div>
          <h1 className="text-2xl font-bold text-red-400 mb-2">Access Restricted</h1>
          <p className="text-slate-400 mb-6">
            Black Hat Review contains sensitive competitive intelligence and is restricted to authorized personnel only.
          </p>
          <p className="text-sm text-slate-500 mb-6">
            Required roles: CEO, COO, Capture Manager, Admin
          </p>
          <a 
            href="missionpulse-dashboard-v3.html"
            className="inline-block px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg transition-colors"
          >
            ← Return to Dashboard
          </a>
        </div>
      </div>
    );

    // Restricted Banner
    const RestrictedBanner = () => (
      <div className="bg-red-500/20 border border-red-500/50 rounded-lg px-4 py-2 flex items-center gap-3 restricted-glow">
        <span className="text-red-400 text-lg">🔒</span>
        <div>
          <span className="font-mono text-red-400 font-bold">RESTRICTED ACCESS</span>
          <span className="text-red-300/70 text-sm ml-3">{CUI_MARKING} • Competitive Intelligence</span>
        </div>
      </div>
    );

    // Competitor Card
    const CompetitorCard = ({ competitor, onEdit, expanded, onToggle }) => {
      const threat = getThreatColor(competitor.threat_level);
      
      return (
        <div className={`glass rounded-xl border ${threat.border} overflow-hidden`}>
          <div 
            className="p-4 cursor-pointer hover:bg-slate-800/30 transition-colors"
            onClick={onToggle}
          >
            <div className="flex items-start justify-between">
              <div className="flex items-center gap-3">
                <div className={`w-12 h-12 rounded-lg ${threat.bg} flex items-center justify-center`}>
                  <span className="text-2xl">🎭</span>
                </div>
                <div>
                  <h3 className="font-semibold text-white">{competitor.name}</h3>
                  <div className="flex items-center gap-2 mt-1">
                    <span className={`px-2 py-0.5 rounded text-xs ${threat.bg} ${threat.text}`}>
                      {competitor.threat_level.toUpperCase()} THREAT
                    </span>
                    {competitor.incumbent && (
                      <span className="px-2 py-0.5 rounded text-xs bg-purple-500/20 text-purple-400">
                        INCUMBENT
                      </span>
                    )}
                  </div>
                </div>
              </div>
              <div className="text-right">
                <p className="text-xs text-slate-400">Likely Bid</p>
                <p className="font-mono text-lg text-cyan-400">{formatCurrency(competitor.likely_price)}</p>
              </div>
            </div>
          </div>
          
          {expanded && (
            <div className="border-t border-slate-700 p-4 space-y-4 bg-slate-900/30">
              <div className="grid md:grid-cols-2 gap-4">
                <div>
                  <h4 className="text-sm font-medium text-emerald-400 mb-2">💪 Strengths</h4>
                  <ul className="space-y-1">
                    {competitor.strengths.map((s, i) => (
                      <li key={i} className="text-sm text-slate-300 flex items-start gap-2">
                        <span className="text-emerald-400 mt-1">•</span> {s}
                      </li>
                    ))}
                  </ul>
                </div>
                <div>
                  <h4 className="text-sm font-medium text-red-400 mb-2">🎯 Weaknesses</h4>
                  <ul className="space-y-1">
                    {competitor.weaknesses.map((w, i) => (
                      <li key={i} className="text-sm text-slate-300 flex items-start gap-2">
                        <span className="text-red-400 mt-1">•</span> {w}
                      </li>
                    ))}
                  </ul>
                </div>
              </div>
              
              <div className="grid md:grid-cols-2 gap-4">
                <div>
                  <h4 className="text-sm font-medium text-purple-400 mb-2">🤝 Likely Teaming</h4>
                  <div className="flex flex-wrap gap-2">
                    {competitor.likely_teaming.map((t, i) => (
                      <span key={i} className="px-2 py-1 bg-purple-500/20 text-purple-300 rounded text-xs">
                        {t}
                      </span>
                    ))}
                  </div>
                </div>
                <div>
                  <h4 className="text-sm font-medium text-amber-400 mb-2">🏆 Their Win Themes</h4>
                  <div className="flex flex-wrap gap-2">
                    {competitor.win_themes.map((t, i) => (
                      <span key={i} className="px-2 py-1 bg-amber-500/20 text-amber-300 rounded text-xs">
                        {t}
                      </span>
                    ))}
                  </div>
                </div>
              </div>
              
              <div className="p-3 bg-cyan-500/10 border border-cyan-500/30 rounded-lg">
                <h4 className="text-sm font-medium text-cyan-400 mb-1">⚔️ Counter Strategy</h4>
                <p className="text-sm text-slate-300">{competitor.counter_strategy}</p>
              </div>
              
              <div className="flex justify-end">
                <button
                  onClick={(e) => { e.stopPropagation(); onEdit(competitor); }}
                  className="px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded text-sm transition-colors"
                >
                  ✏️ Edit Intel
                </button>
              </div>
            </div>
          )}
        </div>
      );
    };

    // Threat Matrix
    const ThreatMatrix = ({ competitors }) => {
      const highThreats = competitors.filter(c => c.threat_level === 'high');
      const mediumThreats = competitors.filter(c => c.threat_level === 'medium');
      const lowThreats = competitors.filter(c => c.threat_level === 'low');
      const incumbents = competitors.filter(c => c.incumbent);
      const avgPrice = competitors.reduce((s, c) => s + (c.likely_price || 0), 0) / competitors.length;

      return (
        <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
          {[
            { label: 'Competitors', value: competitors.length, color: 'slate', icon: '🎭' },
            { label: 'High Threat', value: highThreats.length, color: 'red', icon: '🔴' },
            { label: 'Medium Threat', value: mediumThreats.length, color: 'amber', icon: '🟡' },
            { label: 'Incumbents', value: incumbents.length, color: 'purple', icon: '👑' },
            { label: 'Avg Likely Bid', value: formatCurrency(avgPrice), color: 'cyan', icon: '💰' }
          ].map(({ label, value, color, icon }) => (
            <div key={label} className="glass rounded-lg p-4 border border-slate-700/50">
              <div className="flex items-center gap-2 mb-1">
                <span>{icon}</span>
                <p className="text-xs text-slate-400">{label}</p>
              </div>
              <p className={`text-2xl font-bold text-${color}-400`}>{value}</p>
            </div>
          ))}
        </div>
      );
    };

    // AI Chat Widget
    const AIChatWidget = ({ competitors, selectedOpp }) => {
      const [isOpen, setIsOpen] = React.useState(false);
      const [messages, setMessages] = React.useState([]);
      const [input, setInput] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const messagesEndRef = React.useRef(null);

      React.useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      const handleSend = async () => {
        if (!input.trim() || loading) return;
        const userMsg = input.trim();
        setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
        setInput('');
        setLoading(true);
        const result = await sendToAI(userMsg, { competitorCount: competitors.length, selectedOpp });
        setMessages(prev => [...prev, { role: 'assistant', ...result }]);
        setLoading(false);
      };

      const prompts = [
        'Predict competitor pricing strategies',
        'Identify gaps in our counter-strategies',
        'What questions will evaluators ask about us?',
        'Ghost our main competitor\'s proposal'
      ];

      if (!isOpen) {
        return (
          <button
            onClick={() => setIsOpen(true)}
            className="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-r from-red-600 to-rose-600 rounded-full shadow-lg hover:shadow-red-500/25 transition-all flex items-center justify-center z-50"
          >
            <span className="text-2xl">🎭</span>
          </button>
        );
      }

      return (
        <div className="fixed bottom-6 right-6 w-96 h-[500px] glass border border-red-500/30 rounded-xl shadow-2xl flex flex-col z-50">
          <div className="flex items-center justify-between p-4 border-b border-slate-700">
            <div>
              <h3 className="font-semibold text-white">Black Hat Intel</h3>
              <div className="flex items-center gap-2">
                <span className="text-xs text-red-400">🔒 Secure</span>
                <span className="text-xs font-mono text-red-400/70">{CUI_MARKING}</span>
              </div>
            </div>
            <button onClick={() => setIsOpen(false)} className="text-slate-400 hover:text-white">✕</button>
          </div>
          
          <div className="flex-1 overflow-y-auto p-4 space-y-4">
            {messages.length === 0 && (
              <div className="space-y-2">
                <p className="text-xs text-slate-500 mb-3">Competitive analysis:</p>
                {prompts.map((p, i) => (
                  <button key={i} onClick={() => setInput(p)} className="block w-full text-left px-3 py-2 rounded bg-slate-800 hover:bg-slate-700 text-slate-300 text-sm">
                    {p}
                  </button>
                ))}
              </div>
            )}
            {messages.map((msg, i) => (
              <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-[80%] px-4 py-2 rounded-lg ${
                  msg.role === 'user' ? 'bg-red-600 text-white' : 
                  msg.error ? 'bg-red-900/50 text-red-300' : 'bg-slate-800 text-slate-200'
                }`}>
                  {msg.content}
                  {msg.cui && <span className="block text-xs text-red-400 mt-1 font-mono">{msg.cui}</span>}
                </div>
              </div>
            ))}
            {loading && <div className="flex justify-start"><div className="bg-slate-800 px-4 py-2 rounded-lg text-slate-400 animate-pulse">Analyzing...</div></div>}
            <div ref={messagesEndRef} />
          </div>
          
          <div className="p-4 border-t border-slate-700">
            <div className="flex gap-2">
              <input
                type="text"
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                placeholder="Ask about competitors..."
                className="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:outline-none focus:border-red-500"
              />
              <button onClick={handleSend} disabled={loading || !input.trim()} className="px-4 py-2 bg-red-600 hover:bg-red-500 disabled:bg-slate-700 rounded-lg transition-colors">→</button>
            </div>
          </div>
        </div>
      );
    };

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [authorized, setAuthorized] = React.useState(null);
      const [userRole, setUserRole] = React.useState('CEO');
      const [competitors, setCompetitors] = React.useState(DEMO_COMPETITORS);
      const [opportunities, setOpportunities] = React.useState(DEMO_OPPORTUNITIES);
      const [selectedOpp, setSelectedOpp] = React.useState(null);
      const [expandedId, setExpandedId] = React.useState(null);
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);

      React.useEffect(() => {
        checkAccess();
        loadData();
      }, []);

      const checkAccess = () => {
        // In production, this would check actual user session
        const storedRole = localStorage.getItem('missionpulse_role') || 'CEO';
        setUserRole(storedRole);
        setAuthorized(AUTHORIZED_ROLES.includes(storedRole));
      };

      const loadData = async () => {
        try {
          const { data: comps, error: compsError } = await supabase
            .from('competitors')
            .select('*')
            .order('threat_level', { ascending: false });

          if (!compsError && comps && comps.length > 0) {
            const formatted = comps.map(c => ({
              id: c.id,
              name: c.name,
              threat_level: c.threat_level || 'medium',
              incumbent: c.is_incumbent || false,
              strengths: c.strengths || [],
              weaknesses: c.weaknesses || [],
              likely_price: c.likely_price || 0,
              likely_teaming: c.likely_teaming || [],
              win_themes: c.win_themes || [],
              counter_strategy: c.counter_strategy || ''
            }));
            setCompetitors(formatted);
            setConnected(true);
          }

          const { data: opps } = await supabase
            .from('opportunities')
            .select('id, title, agency')
            .order('title');
          if (opps) setOpportunities(opps);
        } catch (e) {
          console.log('Using demo data');
        } finally {
          setLoading(false);
        }
      };

      // Show access denied if not authorized
      if (authorized === false) {
        return <AccessDenied />;
      }

      if (loading || authorized === null) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-16 h-16 border-4 border-red-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-slate-400">Verifying access...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="glass border-b border-red-500/30 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-700/50 rounded-lg">← Back</a>
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-red-600 to-rose-600 flex items-center justify-center">🎭</div>
                    <div>
                      <h1 className="text-xl font-bold text-white">Black Hat Review</h1>
                      <p className="text-xs text-slate-400">Competitive Intelligence Analysis</p>
                    </div>
                  </div>
                </div>
                <div className="flex items-center gap-4">
                  <RestrictedBanner />
                  <div className="text-right">
                    <p className="text-sm text-white">{userRole}</p>
                    <p className={`text-xs ${connected ? 'text-emerald-400' : 'text-amber-400'}`}>
                      {connected ? '● Secure' : '○ Demo'}
                    </p>
                  </div>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8 space-y-6">
            {/* Opportunity Selector */}
            <div className="glass rounded-xl border border-slate-700/50 p-4">
              <div className="flex items-center gap-4">
                <label className="text-sm text-slate-400">Analyzing:</label>
                <select
                  value={selectedOpp || ''}
                  onChange={(e) => setSelectedOpp(e.target.value)}
                  className="flex-1 max-w-md bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-red-500"
                >
                  <option value="">All Opportunities</option>
                  {opportunities.map(opp => (
                    <option key={opp.id} value={opp.id}>{opp.title} ({opp.agency})</option>
                  ))}
                </select>
                <button className="px-4 py-2 bg-red-600 hover:bg-red-500 rounded-lg text-sm font-medium transition-colors">
                  + Add Competitor
                </button>
              </div>
            </div>

            {/* Threat Matrix */}
            <ThreatMatrix competitors={competitors} />

            {/* Competitors Grid */}
            <div className="space-y-4">
              <h2 className="text-lg font-semibold text-white">Competitor Analysis</h2>
              {competitors.map(comp => (
                <CompetitorCard
                  key={comp.id}
                  competitor={comp}
                  expanded={expandedId === comp.id}
                  onToggle={() => setExpandedId(expandedId === comp.id ? null : comp.id)}
                  onEdit={(c) => console.log('Edit:', c)}
                />
              ))}
            </div>
          </main>

          {/* Footer */}
          <footer className="border-t border-slate-800 py-6">
            <div className="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-4">
                <p className="text-xs text-slate-500">© 2026 Mission Meets Tech</p>
                <span className="text-xs font-mono text-red-400">{CUI_MARKING}</span>
              </div>
              <p className="text-xs text-slate-600">AI GENERATED - REQUIRES HUMAN REVIEW</p>
            </div>
          </footer>

          {/* AI Chat */}
          <AIChatWidget competitors={competitors} selectedOpp={selectedOpp} />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
