<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Pricing Engine</title>
  <link rel="icon" type="image/png" href="MMT_icon_32px.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --mmt-cyan: #00E5FA; --mmt-navy: #00050F; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--mmt-navy); color: #e2e8f0; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse { animation: pulse 2s infinite; }
    .cui-border { border: 2px solid #dc2626; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
// ============================================================
// MISSIONPULSE PRICING ENGINE - CUI PROTECTED
// Mission Meets Tech © 2026 | CONTROLLED UNCLASSIFIED INFORMATION
// Allowed Roles: CEO, COO, FIN, Admin
// ============================================================

const { useState, useEffect } = React;

// ============================================================
// CONFIGURATION
// ============================================================
const CONFIG = {
  SUPABASE_URL: 'https://qdrtpnpnhkxvfmvfziop.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc3NjQ4NjcsImV4cCI6MjA1MzM0MDg2N30.iqAJTDGEQsxMBSfnOCdnPFLgupmYvn4eUMW1Rwhv8Dg',
  LOGIN_PAGE: 'login.html',
  DASHBOARD_PAGE: 'missionpulse-dashboard-hub.html',
  SESSION_KEY: 'MP_SESSION',
  USER_KEY: 'MP_USER'
};

// CUI Configuration
const CUI = {
  MARKING: 'CUI//SP-PROP',
  FULL_TEXT: 'CONTROLLED UNCLASSIFIED INFORMATION - PROPRIETARY',
  WARNING: 'This page contains contractor proprietary pricing data protected under FAR 52.215-1(e)',
  ALLOWED_ROLES: ['CEO', 'COO', 'FIN', 'Admin'],
  EXPORT_WARNING: 'CUI data export requires authorization. All exports are logged for compliance.'
};

let supabase = null;
try { supabase = window.supabase?.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY); } catch (e) {}

// ============================================================
// AUTH & CUI ACCESS CHECK
// ============================================================
const checkAuth = () => {
  const session = localStorage.getItem(CONFIG.SESSION_KEY);
  const userStr = localStorage.getItem(CONFIG.USER_KEY);
  if (!session || !userStr) {
    window.location.href = CONFIG.LOGIN_PAGE;
    return null;
  }
  try { return JSON.parse(userStr); }
  catch { window.location.href = CONFIG.LOGIN_PAGE; return null; }
};

const checkCUIAccess = (userRole) => {
  if (!CUI.ALLOWED_ROLES.includes(userRole)) {
    window.location.href = CONFIG.DASHBOARD_PAGE;
    return false;
  }
  // Audit log for CUI access
  const auditEntry = {
    timestamp: new Date().toISOString(),
    module: 'pricing',
    action: 'cui_access',
    role: userRole,
    classification: CUI.MARKING
  };
  const auditLog = JSON.parse(localStorage.getItem('MP_AUDIT_LOG') || '[]');
  auditLog.push(auditEntry);
  localStorage.setItem('MP_AUDIT_LOG', JSON.stringify(auditLog.slice(-100)));
  return true;
};

// ============================================================
// DEMO DATA
// ============================================================
const DEMO_LCATS = [
  { id: 1, title: 'Program Manager', level: 'Senior', rate: 185.50, hours: 2080, fte: 1.0 },
  { id: 2, title: 'Technical Lead', level: 'Senior', rate: 172.00, hours: 2080, fte: 1.0 },
  { id: 3, title: 'Software Engineer', level: 'Mid', rate: 145.00, hours: 2080, fte: 3.0 },
  { id: 4, title: 'Systems Analyst', level: 'Mid', rate: 138.00, hours: 2080, fte: 2.0 },
  { id: 5, title: 'QA Engineer', level: 'Mid', rate: 125.00, hours: 2080, fte: 1.5 },
  { id: 6, title: 'DevOps Engineer', level: 'Senior', rate: 165.00, hours: 2080, fte: 1.0 },
  { id: 7, title: 'Business Analyst', level: 'Mid', rate: 132.00, hours: 2080, fte: 1.0 },
  { id: 8, title: 'Technical Writer', level: 'Junior', rate: 95.00, hours: 1040, fte: 0.5 }
];

const DEMO_ODCs = [
  { id: 1, category: 'Travel', description: 'On-site support travel', amount: 45000 },
  { id: 2, category: 'Software', description: 'Development tools & licenses', amount: 28000 },
  { id: 3, category: 'Training', description: 'Staff certifications', amount: 15000 },
  { id: 4, category: 'Equipment', description: 'Development hardware', amount: 22000 }
];

// ============================================================
// ICONS
// ============================================================
const Icons = {
  back: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>,
  dollar: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
  download: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>,
  calculator: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>,
  alert: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
};

// ============================================================
// FORMAT CURRENCY
// ============================================================
const formatCurrency = (value) => {
  return new Intl.NumberFormat('en-US', {
    style: 'currency',
    currency: 'USD',
    minimumFractionDigits: 0,
    maximumFractionDigits: 0
  }).format(value);
};

// ============================================================
// CUI BANNER
// ============================================================
function CUIBanner() {
  return (
    <div className="fixed top-0 left-0 right-0 z-50">
      <div className="bg-red-900/90 border-b-2 border-red-500 px-4 py-2">
        <div className="flex items-center justify-center gap-4">
          <span className="text-red-400 font-bold">⛔</span>
          <span className="text-red-200 font-mono font-bold tracking-wider">
            {CUI.MARKING}
          </span>
          <span className="text-red-300 text-sm">|</span>
          <span className="text-red-300 text-sm font-medium">
            {CUI.FULL_TEXT}
          </span>
          <span className="text-red-400 font-bold">⛔</span>
        </div>
      </div>
      <div className="bg-red-950/70 border-b border-red-800/50 px-4 py-1">
        <p className="text-center text-red-400/80 text-xs">
          {CUI.WARNING}
        </p>
      </div>
    </div>
  );
}

// ============================================================
// CUI FOOTER
// ============================================================
function CUIFooter() {
  return (
    <div className="fixed bottom-0 left-0 right-0 z-50 bg-red-900/70 border-t-2 border-red-500 px-4 py-2">
      <div className="flex items-center justify-between text-xs max-w-7xl mx-auto">
        <span className="text-red-400 font-mono font-bold">{CUI.MARKING}</span>
        <span className="text-red-400/70">{CUI.EXPORT_WARNING}</span>
        <span className="text-red-400 font-mono font-bold">{CUI.MARKING}</span>
      </div>
    </div>
  );
}

// ============================================================
// PRICING TABLE
// ============================================================
function PricingTable({ lcats, onUpdate }) {
  const totalLabor = lcats.reduce((sum, lcat) => sum + (lcat.rate * lcat.hours * lcat.fte), 0);
  
  return (
    <div className="glass cui-border rounded-xl overflow-hidden">
      <div className="bg-red-900/30 px-4 py-2 border-b border-red-500/30">
        <div className="flex items-center justify-between">
          <span className="text-sm font-semibold text-red-400 font-mono">{CUI.MARKING} - LABOR CATEGORIES</span>
          <span className="text-xs text-red-400/70">Protected Data</span>
        </div>
      </div>
      
      <div className="overflow-x-auto">
        <table className="w-full">
          <thead className="bg-slate-800/50">
            <tr>
              <th className="text-left px-4 py-3 text-xs font-semibold text-slate-400">Position</th>
              <th className="text-left px-4 py-3 text-xs font-semibold text-slate-400">Level</th>
              <th className="text-right px-4 py-3 text-xs font-semibold text-slate-400">Hourly Rate</th>
              <th className="text-right px-4 py-3 text-xs font-semibold text-slate-400">Hours</th>
              <th className="text-right px-4 py-3 text-xs font-semibold text-slate-400">FTE</th>
              <th className="text-right px-4 py-3 text-xs font-semibold text-slate-400">Total</th>
            </tr>
          </thead>
          <tbody>
            {lcats.map((lcat, i) => (
              <tr key={lcat.id} className={`border-t border-slate-700/50 ${i % 2 === 0 ? 'bg-slate-800/20' : ''}`}>
                <td className="px-4 py-3 text-sm text-white">{lcat.title}</td>
                <td className="px-4 py-3 text-sm text-slate-400">{lcat.level}</td>
                <td className="px-4 py-3 text-sm text-emerald-400 text-right font-mono">${lcat.rate.toFixed(2)}</td>
                <td className="px-4 py-3 text-sm text-slate-300 text-right">{lcat.hours.toLocaleString()}</td>
                <td className="px-4 py-3 text-sm text-slate-300 text-right">{lcat.fte}</td>
                <td className="px-4 py-3 text-sm text-white text-right font-mono font-semibold">
                  {formatCurrency(lcat.rate * lcat.hours * lcat.fte)}
                </td>
              </tr>
            ))}
          </tbody>
          <tfoot className="bg-slate-800/50 border-t-2 border-red-500/30">
            <tr>
              <td colSpan="5" className="px-4 py-3 text-sm font-semibold text-white">Total Labor</td>
              <td className="px-4 py-3 text-lg font-bold text-emerald-400 text-right font-mono">
                {formatCurrency(totalLabor)}
              </td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  );
}

// ============================================================
// ODC TABLE
// ============================================================
function ODCTable({ odcs }) {
  const total = odcs.reduce((sum, odc) => sum + odc.amount, 0);
  
  return (
    <div className="glass cui-border rounded-xl overflow-hidden">
      <div className="bg-red-900/30 px-4 py-2 border-b border-red-500/30">
        <span className="text-sm font-semibold text-red-400 font-mono">{CUI.MARKING} - OTHER DIRECT COSTS</span>
      </div>
      
      <div className="overflow-x-auto">
        <table className="w-full">
          <thead className="bg-slate-800/50">
            <tr>
              <th className="text-left px-4 py-3 text-xs font-semibold text-slate-400">Category</th>
              <th className="text-left px-4 py-3 text-xs font-semibold text-slate-400">Description</th>
              <th className="text-right px-4 py-3 text-xs font-semibold text-slate-400">Amount</th>
            </tr>
          </thead>
          <tbody>
            {odcs.map((odc, i) => (
              <tr key={odc.id} className={`border-t border-slate-700/50 ${i % 2 === 0 ? 'bg-slate-800/20' : ''}`}>
                <td className="px-4 py-3 text-sm text-white">{odc.category}</td>
                <td className="px-4 py-3 text-sm text-slate-400">{odc.description}</td>
                <td className="px-4 py-3 text-sm text-white text-right font-mono">{formatCurrency(odc.amount)}</td>
              </tr>
            ))}
          </tbody>
          <tfoot className="bg-slate-800/50 border-t-2 border-red-500/30">
            <tr>
              <td colSpan="2" className="px-4 py-3 text-sm font-semibold text-white">Total ODCs</td>
              <td className="px-4 py-3 text-lg font-bold text-emerald-400 text-right font-mono">
                {formatCurrency(total)}
              </td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  );
}

// ============================================================
// EXPORT HANDLER WITH CUI WARNING
// ============================================================
function handleCUIExport(exportType) {
  // Audit the export attempt
  const auditEntry = {
    timestamp: new Date().toISOString(),
    module: 'pricing',
    action: 'cui_export_attempt',
    exportType: exportType,
    classification: CUI.MARKING
  };
  const auditLog = JSON.parse(localStorage.getItem('MP_AUDIT_LOG') || '[]');
  auditLog.push(auditEntry);
  localStorage.setItem('MP_AUDIT_LOG', JSON.stringify(auditLog));

  const confirmed = window.confirm(
    `⛔ CUI EXPORT WARNING ⛔\n\n` +
    `You are about to export ${CUI.MARKING} data.\n\n` +
    `• This data is protected under FAR 52.215-1(e)\n` +
    `• Unauthorized disclosure is prohibited\n` +
    `• This export will be logged for compliance\n\n` +
    `Continue with export?`
  );

  if (confirmed) {
    auditLog.push({
      timestamp: new Date().toISOString(),
      module: 'pricing',
      action: 'cui_export_confirmed',
      exportType: exportType
    });
    localStorage.setItem('MP_AUDIT_LOG', JSON.stringify(auditLog));
    alert('Export initiated. File will download shortly.\n\nRemember: Handle CUI data according to your organization\'s policies.');
  }

  return confirmed;
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [user, setUser] = useState(null);
  const [authorized, setAuthorized] = useState(false);
  const [lcats, setLcats] = useState(DEMO_LCATS);
  const [odcs, setOdcs] = useState(DEMO_ODCs);

  // Auth & CUI access check
  useEffect(() => {
    const userData = checkAuth();
    if (!userData) return;
    
    if (!checkCUIAccess(userData.role)) return;
    
    setUser(userData);
    setAuthorized(true);
  }, []);

  if (!authorized) {
    return (
      <div className="min-h-screen bg-[#00050F] flex items-center justify-center">
        <div className="w-8 h-8 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
      </div>
    );
  }

  const totalLabor = lcats.reduce((sum, lcat) => sum + (lcat.rate * lcat.hours * lcat.fte), 0);
  const totalODC = odcs.reduce((sum, odc) => sum + odc.amount, 0);
  const grandTotal = totalLabor + totalODC;

  return (
    <div className="min-h-screen bg-[#00050F]">
      <CUIBanner />

      {/* Header */}
      <header className="pt-24 glass border-b border-slate-700/50">
        <div className="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <a href={CONFIG.DASHBOARD_PAGE} className="p-2 rounded-lg hover:bg-slate-700 text-slate-400 hover:text-white transition">
              <Icons.back />
            </a>
            <div className="flex items-center gap-3">
              <span className="text-2xl">💵</span>
              <div>
                <div className="font-bold text-white">Pricing Engine</div>
                <div className="text-xs text-red-400 font-mono">{CUI.MARKING}</div>
              </div>
            </div>
          </div>
          
          <div className="flex items-center gap-3">
            <button 
              onClick={() => handleCUIExport('Excel')}
              className="flex items-center gap-2 px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-sm text-slate-300 hover:border-cyan-500/50 transition"
            >
              <Icons.download />
              Export
            </button>
            <div className="text-right">
              <div className="text-sm font-medium text-white">{user?.name}</div>
              <div className="text-xs text-red-400">{user?.role}</div>
            </div>
          </div>
        </div>
      </header>

      {/* Main Content */}
      <main className="max-w-7xl mx-auto px-6 py-8 pb-24">
        {/* Summary Cards */}
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
          <div className="glass cui-border rounded-xl p-4">
            <div className="text-xs text-red-400 font-mono mb-1">{CUI.MARKING}</div>
            <div className="text-sm text-slate-400 mb-1">Total Labor</div>
            <div className="text-2xl font-bold text-emerald-400 font-mono">{formatCurrency(totalLabor)}</div>
          </div>
          <div className="glass cui-border rounded-xl p-4">
            <div className="text-xs text-red-400 font-mono mb-1">{CUI.MARKING}</div>
            <div className="text-sm text-slate-400 mb-1">Total ODCs</div>
            <div className="text-2xl font-bold text-cyan-400 font-mono">{formatCurrency(totalODC)}</div>
          </div>
          <div className="glass cui-border rounded-xl p-4">
            <div className="text-xs text-red-400 font-mono mb-1">{CUI.MARKING}</div>
            <div className="text-sm text-slate-400 mb-1">Grand Total</div>
            <div className="text-2xl font-bold text-white font-mono">{formatCurrency(grandTotal)}</div>
          </div>
        </div>

        {/* Warning */}
        <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-4 mb-8 flex items-start gap-3">
          <Icons.alert />
          <div>
            <div className="font-semibold text-red-400">CUI Data Handling Requirements</div>
            <div className="text-sm text-red-300/80 mt-1">
              This pricing data is marked {CUI.MARKING}. Do not share outside authorized personnel. 
              All access and exports are logged for compliance auditing.
            </div>
          </div>
        </div>

        {/* Tables */}
        <div className="space-y-8">
          <PricingTable lcats={lcats} />
          <ODCTable odcs={odcs} />
        </div>
      </main>

      <CUIFooter />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
