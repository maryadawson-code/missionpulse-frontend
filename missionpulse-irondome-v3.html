<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Iron Dome Writing Suite</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --mmt-cyan: #00E5FA; --mmt-navy: #00050F; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--mmt-navy); color: #e2e8f0; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

const CONFIG = {
  SUPABASE_URL: 'https://djuviwarqdvlbgcfuupa.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8',
  API_URL: 'https://missionpulse-api.onrender.com',
  LOGIN_PAGE: 'login.html'
};

const WRITING_TEMPLATES = [
  { id: 1, name: 'Technical Approach', icon: '🔧', description: 'Generate technical solution narrative' },
  { id: 2, name: 'Management Approach', icon: '📊', description: 'Draft management methodology sections' },
  { id: 3, name: 'Past Performance', icon: '🏆', description: 'Structure past performance narratives' },
  { id: 4, name: 'Executive Summary', icon: '📝', description: 'Create compelling executive summaries' },
  { id: 5, name: 'Risk Mitigation', icon: '🛡️', description: 'Develop risk management strategies' },
  { id: 6, name: 'Staffing Plan', icon: '👥', description: 'Generate staffing approach content' }
];

function checkAuth() {
  const session = localStorage.getItem('MP_SESSION');
  if (!session) { window.location.href = CONFIG.LOGIN_PAGE; return null; }
  try { return JSON.parse(localStorage.getItem('MP_USER')); }
  catch { return { email: 'demo@mmt.com', role: 'PM', name: 'Demo User' }; }
}

function App() {
  const [user, setUser] = useState(null);
  const [selectedTemplate, setSelectedTemplate] = useState(null);
  const [prompt, setPrompt] = useState('');
  const [output, setOutput] = useState('');
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    const authUser = checkAuth();
    if (authUser) setUser(authUser);
  }, []);

  const handleGenerate = async () => {
    if (!prompt.trim()) return;
    setLoading(true);
    setOutput('');
    
    // Simulated AI response for demo
    setTimeout(() => {
      setOutput(`# ${selectedTemplate?.name || 'AI Generated Content'}\n\n## Overview\n${prompt}\n\n## Key Points\n- Our proven methodology ensures successful delivery\n- Experienced team with relevant past performance\n- Risk mitigation strategies embedded throughout\n\n## Technical Approach\nOur solution leverages industry best practices combined with innovative technologies to deliver measurable outcomes for the government customer.\n\n*Generated by MissionPulse AI Writing Suite*`);
      setLoading(false);
    }, 2000);
  };

  if (!user) return <div className="min-h-screen flex items-center justify-center text-cyan-400">Loading...</div>;

  return (
    <div className="min-h-screen bg-slate-950">
      <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            </a>
            <div>
              <h1 className="text-xl font-bold text-white">✍️ Iron Dome Writing Suite</h1>
              <p className="text-sm text-slate-400">AI-Powered Proposal Content Generation</p>
            </div>
          </div>
          <span className="text-sm text-slate-400">{user.name} ({user.role})</span>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-6">
        <div className="grid grid-cols-3 gap-6">
          {/* Templates */}
          <div className="space-y-4">
            <h2 className="text-lg font-semibold text-white">Writing Templates</h2>
            <div className="space-y-2">
              {WRITING_TEMPLATES.map(t => (
                <button key={t.id} onClick={() => setSelectedTemplate(t)} className={`w-full glass rounded-lg p-4 text-left transition-all ${selectedTemplate?.id === t.id ? 'border-cyan-500 bg-cyan-500/10' : 'hover:border-slate-600'}`}>
                  <div className="flex items-center gap-3">
                    <span className="text-2xl">{t.icon}</span>
                    <div>
                      <h3 className="font-medium text-white">{t.name}</h3>
                      <p className="text-xs text-slate-400">{t.description}</p>
                    </div>
                  </div>
                </button>
              ))}
            </div>
          </div>

          {/* Input/Output */}
          <div className="col-span-2 space-y-4">
            <div className="glass rounded-xl p-4">
              <h2 className="text-lg font-semibold text-white mb-4">
                {selectedTemplate ? `Generate: ${selectedTemplate.name}` : 'Select a Template'}
              </h2>
              <textarea
                value={prompt}
                onChange={(e) => setPrompt(e.target.value)}
                placeholder="Enter your requirements, key points, or specific instructions..."
                className="w-full h-32 bg-slate-800 border border-slate-600 rounded-lg p-4 text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none resize-none"
              />
              <div className="flex justify-end mt-4">
                <button onClick={handleGenerate} disabled={!selectedTemplate || loading} className="px-6 py-2 bg-gradient-to-r from-cyan-600 to-teal-600 hover:from-cyan-500 hover:to-teal-500 rounded-lg font-medium disabled:opacity-50 disabled:cursor-not-allowed">
                  {loading ? 'Generating...' : '🚀 Generate Content'}
                </button>
              </div>
            </div>

            {output && (
              <div className="glass rounded-xl p-4">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-lg font-semibold text-white">Generated Content</h2>
                  <button onClick={() => navigator.clipboard.writeText(output)} className="px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">📋 Copy</button>
                </div>
                <div className="bg-slate-800/50 rounded-lg p-4 prose prose-invert max-w-none">
                  <pre className="whitespace-pre-wrap text-sm text-slate-300">{output}</pre>
                </div>
              </div>
            )}
          </div>
        </div>
      </main>

      <footer className="border-t border-slate-800 mt-12">
        <div className="max-w-7xl mx-auto px-4 py-4 text-center text-xs text-slate-500">
          Mission Meets Tech © 2026 | MissionPulse v3.0 | Iron Dome Module
        </div>
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
