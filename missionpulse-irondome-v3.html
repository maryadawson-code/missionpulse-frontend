<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Iron Dome</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
    @keyframes shield-pulse { 0%, 100% { box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); } 50% { box-shadow: 0 0 40px rgba(16, 185, 129, 0.6); } }
    @keyframes threat-pulse { 0%, 100% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); } 50% { box-shadow: 0 0 40px rgba(239, 68, 68, 0.6); } }
    .shield-active { animation: shield-pulse 2s infinite; }
    .threat-active { animation: threat-pulse 1.5s infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    // ============================================
    // CONFIGURATION
    // ============================================
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const API_URL = 'https://missionpulse-api.onrender.com';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // ============================================
    // DEMO DATA
    // ============================================
    const DEMO_SHIELDS = [
      { id: 1, name: 'Section L Compliance', status: 'active', coverage: 92, threats_blocked: 12, last_scan: '2026-01-30T10:00:00Z', category: 'Requirements' },
      { id: 2, name: 'Section M Evaluation', status: 'active', coverage: 88, threats_blocked: 8, last_scan: '2026-01-30T09:30:00Z', category: 'Evaluation' },
      { id: 3, name: 'FAR Clause Validation', status: 'warning', coverage: 76, threats_blocked: 5, last_scan: '2026-01-30T08:45:00Z', category: 'Regulatory' },
      { id: 4, name: 'DFARS Requirements', status: 'active', coverage: 95, threats_blocked: 3, last_scan: '2026-01-30T10:15:00Z', category: 'Regulatory' },
      { id: 5, name: 'Past Performance Refs', status: 'active', coverage: 100, threats_blocked: 0, last_scan: '2026-01-30T07:00:00Z', category: 'Past Performance' },
      { id: 6, name: 'Small Business Goals', status: 'critical', coverage: 67, threats_blocked: 2, last_scan: '2026-01-30T10:30:00Z', category: 'Socioeconomic' }
    ];

    const DEMO_THREATS = [
      { id: 1, type: 'Missing Requirement', severity: 'critical', description: 'L.5.2.3 - ISO 27001 certification not addressed in technical volume', section: 'Volume I', detected: '2026-01-30T10:25:00Z', status: 'active', auto_fix: true },
      { id: 2, type: 'Format Violation', severity: 'high', description: 'Page limit exceeded in Management Approach (32/30 pages)', section: 'Volume II', detected: '2026-01-30T10:20:00Z', status: 'active', auto_fix: false },
      { id: 3, type: 'Compliance Gap', severity: 'high', description: 'Small business subcontracting at 27% (required 30%)', section: 'Volume IV', detected: '2026-01-30T10:15:00Z', status: 'active', auto_fix: false },
      { id: 4, type: 'Reference Error', severity: 'medium', description: 'Cross-reference to Section 3.2.1 points to non-existent section', section: 'Volume I', detected: '2026-01-30T09:45:00Z', status: 'remediated', auto_fix: true },
      { id: 5, type: 'Keyword Missing', severity: 'medium', description: 'Evaluation factor "innovation" not mentioned in technical approach', section: 'Volume I', detected: '2026-01-30T09:30:00Z', status: 'active', auto_fix: true },
      { id: 6, type: 'Data Inconsistency', severity: 'low', description: 'FTE count differs between staffing plan (45) and org chart (47)', section: 'Volume II', detected: '2026-01-30T08:00:00Z', status: 'remediated', auto_fix: true }
    ];

    // ============================================
    // UTILITY FUNCTIONS
    // ============================================
    const formatTimeAgo = (timestamp) => {
      const diff = Date.now() - new Date(timestamp).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      return `${Math.floor(hrs / 24)}d ago`;
    };

    const getSeverityColor = (severity) => ({
      critical: { bg: 'bg-red-500/20', text: 'text-red-400', border: 'border-red-500/50', icon: '🔴' },
      high: { bg: 'bg-amber-500/20', text: 'text-amber-400', border: 'border-amber-500/50', icon: '🟠' },
      medium: { bg: 'bg-yellow-500/20', text: 'text-yellow-400', border: 'border-yellow-500/50', icon: '🟡' },
      low: { bg: 'bg-blue-500/20', text: 'text-blue-400', border: 'border-blue-500/50', icon: '🔵' }
    }[severity] || { bg: 'bg-slate-500/20', text: 'text-slate-400', border: 'border-slate-500/50', icon: '⚪' });

    const getShieldStatusColor = (status) => ({
      active: { bg: 'bg-emerald-500', text: 'text-emerald-400', glow: 'shield-active' },
      warning: { bg: 'bg-amber-500', text: 'text-amber-400', glow: '' },
      critical: { bg: 'bg-red-500', text: 'text-red-400', glow: 'threat-active' },
      inactive: { bg: 'bg-slate-500', text: 'text-slate-400', glow: '' }
    }[status] || { bg: 'bg-slate-500', text: 'text-slate-400', glow: '' });

    // ============================================
    // COMPONENTS
    // ============================================

    // Defense Status Overview
    const DefenseStatus = ({ shields, threats }) => {
      const activeShields = shields.filter(s => s.status === 'active').length;
      const avgCoverage = Math.round(shields.reduce((s, sh) => s + sh.coverage, 0) / shields.length);
      const activeThreats = threats.filter(t => t.status === 'active').length;
      const criticalThreats = threats.filter(t => t.severity === 'critical' && t.status === 'active').length;
      const totalBlocked = shields.reduce((s, sh) => s + sh.threats_blocked, 0);

      const overallStatus = criticalThreats > 0 ? 'critical' : activeThreats > 2 ? 'warning' : 'secure';
      const statusConfig = {
        secure: { color: 'emerald', icon: '🛡️', label: 'SECURE' },
        warning: { color: 'amber', icon: '⚠️', label: 'WARNING' },
        critical: { color: 'red', icon: '🚨', label: 'CRITICAL' }
      }[overallStatus];

      return (
        <div className={`glass rounded-xl border border-${statusConfig.color}-500/50 p-6 ${overallStatus === 'secure' ? 'shield-active' : overallStatus === 'critical' ? 'threat-active' : ''}`}>
          <div className="flex items-center justify-between mb-6">
            <div className="flex items-center gap-4">
              <span className="text-5xl">{statusConfig.icon}</span>
              <div>
                <h2 className={`text-2xl font-bold text-${statusConfig.color}-400`}>IRON DOME {statusConfig.label}</h2>
                <p className="text-slate-400">Proposal Defense System Active</p>
              </div>
            </div>
            <div className={`px-4 py-2 rounded-full bg-${statusConfig.color}-500/20 text-${statusConfig.color}-400 font-bold`}>
              {avgCoverage}% Coverage
            </div>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
            {[
              { label: 'Active Shields', value: `${activeShields}/${shields.length}`, color: 'emerald', icon: '🛡️' },
              { label: 'Threats Blocked', value: totalBlocked, color: 'cyan', icon: '🚫' },
              { label: 'Active Threats', value: activeThreats, color: activeThreats > 0 ? 'amber' : 'slate', icon: '⚠️' },
              { label: 'Critical Issues', value: criticalThreats, color: criticalThreats > 0 ? 'red' : 'slate', icon: '🔴' },
              { label: 'Auto-Remediated', value: threats.filter(t => t.status === 'remediated').length, color: 'purple', icon: '🔧' }
            ].map(({ label, value, color, icon }) => (
              <div key={label} className="bg-slate-800/50 rounded-lg p-4 text-center">
                <span className="text-2xl">{icon}</span>
                <p className={`text-2xl font-bold text-${color}-400 mt-1`}>{value}</p>
                <p className="text-xs text-slate-500">{label}</p>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // Shield Card
    const ShieldCard = ({ shield }) => {
      const status = getShieldStatusColor(shield.status);
      
      return (
        <div className={`glass rounded-xl border border-slate-700/50 p-4 ${status.glow}`}>
          <div className="flex items-start justify-between mb-3">
            <div className="flex items-center gap-3">
              <div className={`w-3 h-3 rounded-full ${status.bg}`}></div>
              <div>
                <h3 className="font-semibold text-white">{shield.name}</h3>
                <p className="text-xs text-slate-500">{shield.category}</p>
              </div>
            </div>
            <span className={`text-sm font-mono ${status.text}`}>{shield.coverage}%</span>
          </div>
          
          <div className="w-full h-2 bg-slate-700 rounded-full overflow-hidden mb-3">
            <div 
              className={`h-full ${shield.coverage >= 90 ? 'bg-emerald-500' : shield.coverage >= 70 ? 'bg-amber-500' : 'bg-red-500'}`}
              style={{ width: `${shield.coverage}%` }}
            />
          </div>
          
          <div className="flex items-center justify-between text-xs text-slate-500">
            <span>🚫 {shield.threats_blocked} blocked</span>
            <span>Last scan: {formatTimeAgo(shield.last_scan)}</span>
          </div>
        </div>
      );
    };

    // Threat Card
    const ThreatCard = ({ threat, onRemediate, onDismiss }) => {
      const severity = getSeverityColor(threat.severity);
      
      return (
        <div className={`glass rounded-xl border ${severity.border} overflow-hidden ${threat.status === 'active' && threat.severity === 'critical' ? 'threat-active' : ''}`}>
          <div className="p-4">
            <div className="flex items-start justify-between mb-2">
              <div className="flex items-center gap-2">
                <span>{severity.icon}</span>
                <span className={`px-2 py-0.5 rounded text-xs ${severity.bg} ${severity.text}`}>
                  {threat.severity.toUpperCase()}
                </span>
                <span className="px-2 py-0.5 bg-slate-700 rounded text-xs text-slate-300">{threat.type}</span>
              </div>
              <span className={`px-2 py-0.5 rounded text-xs ${
                threat.status === 'active' ? 'bg-red-500/20 text-red-400' : 'bg-emerald-500/20 text-emerald-400'
              }`}>
                {threat.status === 'active' ? 'ACTIVE' : 'REMEDIATED'}
              </span>
            </div>
            
            <p className="text-white mb-2">{threat.description}</p>
            
            <div className="flex items-center gap-4 text-xs text-slate-500 mb-3">
              <span>📄 {threat.section}</span>
              <span>🕐 {formatTimeAgo(threat.detected)}</span>
              {threat.auto_fix && <span className="text-purple-400">🤖 Auto-fix available</span>}
            </div>
            
            {threat.status === 'active' && (
              <div className="flex gap-2">
                {threat.auto_fix && (
                  <button
                    onClick={() => onRemediate(threat.id)}
                    className="flex-1 px-3 py-2 bg-purple-600 hover:bg-purple-500 rounded-lg text-sm transition-colors"
                  >
                    🔧 Auto-Remediate
                  </button>
                )}
                <button
                  onClick={() => onDismiss(threat.id)}
                  className="px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm transition-colors"
                >
                  Dismiss
                </button>
              </div>
            )}
          </div>
        </div>
      );
    };

    // Scan Button
    const ScanButton = ({ onScan, isScanning }) => (
      <button
        onClick={onScan}
        disabled={isScanning}
        className={`px-6 py-3 rounded-xl font-medium transition-all flex items-center gap-2 ${
          isScanning 
            ? 'bg-slate-700 text-slate-400 cursor-not-allowed' 
            : 'bg-gradient-to-r from-emerald-600 to-cyan-600 hover:from-emerald-500 hover:to-cyan-500 text-white'
        }`}
      >
        {isScanning ? (
          <>
            <span className="animate-spin">⟳</span>
            Scanning...
          </>
        ) : (
          <>
            🛡️ Run Full Scan
          </>
        )}
      </button>
    );

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [shields, setShields] = React.useState(DEMO_SHIELDS);
      const [threats, setThreats] = React.useState(DEMO_THREATS);
      const [isScanning, setIsScanning] = React.useState(false);
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [filter, setFilter] = React.useState('all');

      React.useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        try {
          const { data: shieldsData } = await supabase.from('compliance_shields').select('*');
          if (shieldsData?.length > 0) {
            setShields(shieldsData);
            setConnected(true);
          }
          const { data: threatsData } = await supabase.from('compliance_threats').select('*').order('detected', { ascending: false });
          if (threatsData?.length > 0) setThreats(threatsData);
        } catch (e) {
          console.log('Using demo data');
        } finally {
          setLoading(false);
        }
      };

      const handleScan = async () => {
        setIsScanning(true);
        await new Promise(r => setTimeout(r, 3000));
        setShields(prev => prev.map(s => ({ ...s, last_scan: new Date().toISOString() })));
        setIsScanning(false);
      };

      const handleRemediate = (id) => {
        setThreats(prev => prev.map(t => t.id === id ? { ...t, status: 'remediated' } : t));
      };

      const handleDismiss = (id) => {
        setThreats(prev => prev.filter(t => t.id !== id));
      };

      const filteredThreats = filter === 'all' ? threats : threats.filter(t => t.status === filter);

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-slate-400">Initializing Iron Dome...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          <header className="glass border-b border-slate-700/50 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-700/50 rounded-lg">← Back</a>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-emerald-500 to-cyan-600 flex items-center justify-center">🛡️</div>
                  <div>
                    <h1 className="text-xl font-bold text-white">Iron Dome</h1>
                    <p className="text-xs text-slate-400">Proposal Defense System</p>
                  </div>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <ScanButton onScan={handleScan} isScanning={isScanning} />
                <div className={`px-3 py-1 rounded-full text-xs ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                  {connected ? '● Protected' : '○ Demo'}
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8 space-y-6">
            <DefenseStatus shields={shields} threats={threats} />

            <div className="grid lg:grid-cols-3 gap-6">
              <div className="lg:col-span-1 space-y-4">
                <h3 className="font-semibold text-white flex items-center gap-2">🛡️ Active Shields</h3>
                {shields.map(shield => <ShieldCard key={shield.id} shield={shield} />)}
              </div>

              <div className="lg:col-span-2 space-y-4">
                <div className="flex items-center justify-between">
                  <h3 className="font-semibold text-white flex items-center gap-2">⚠️ Threat Detection</h3>
                  <div className="flex gap-2">
                    {['all', 'active', 'remediated'].map(f => (
                      <button
                        key={f}
                        onClick={() => setFilter(f)}
                        className={`px-3 py-1 rounded text-sm ${filter === f ? 'bg-cyan-600 text-white' : 'bg-slate-800 text-slate-400'}`}
                      >
                        {f.charAt(0).toUpperCase() + f.slice(1)}
                      </button>
                    ))}
                  </div>
                </div>
                <div className="space-y-4">
                  {filteredThreats.map(threat => (
                    <ThreatCard key={threat.id} threat={threat} onRemediate={handleRemediate} onDismiss={handleDismiss} />
                  ))}
                  {filteredThreats.length === 0 && (
                    <div className="text-center py-8 text-slate-500">No threats in this category</div>
                  )}
                </div>
              </div>
            </div>
          </main>

          <footer className="border-t border-slate-800 py-6">
            <div className="max-w-7xl mx-auto px-6 flex justify-between">
              <p className="text-xs text-slate-500">© 2026 Mission Meets Tech</p>
              <p className="text-xs text-slate-600">AI GENERATED - REQUIRES HUMAN REVIEW</p>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
