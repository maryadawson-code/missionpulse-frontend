<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MissionPulse | Pipeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
        .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.1); }
        .glass-hover:hover { background: rgba(0, 229, 250, 0.08); border-color: rgba(0, 229, 250, 0.3); }
        .cyan-glow { box-shadow: 0 0 30px rgba(0, 229, 250, 0.15); }
        .text-cyan { color: #00E5FA; }
        .bg-cyan { background-color: #00E5FA; }
        .modal-overlay { background: rgba(0,0,0,0.8); }
    </style>
</head>
<body class="text-gray-100">
    <div id="root"></div>
    <script src="missionpulse-crud.js"></script>
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        function Pipeline() {
            const [opportunities, setOpportunities] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isDemo, setIsDemo] = useState(false);
            const [showModal, setShowModal] = useState(false);
            const [editingOpp, setEditingOpp] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterAgency, setFilterAgency] = useState('all');
            const [filterPhase, setFilterPhase] = useState('all');
            const [sortField, setSortField] = useState('dueDate');
            const [sortAsc, setSortAsc] = useState(true);

            useEffect(() => { loadData(); }, []);

            const loadData = async () => {
                setLoading(true);
                const { data, isDemo: demo } = await MissionPulse.opportunities.getAll({ orderBy: 'due_date' });
                setOpportunities(data || []);
                setIsDemo(demo);
                setLoading(false);
            };

            const handleSave = async (formData) => {
                if (editingOpp?.id) {
                    await MissionPulse.opportunities.update(editingOpp.id, formData);
                } else {
                    await MissionPulse.opportunities.create(formData);
                }
                setShowModal(false);
                setEditingOpp(null);
                loadData();
            };

            const handleDelete = async (id) => {
                if (confirm('Delete this opportunity?')) {
                    await MissionPulse.opportunities.delete(id);
                    loadData();
                }
            };

            const agencies = [...new Set(opportunities.map(o => o.agency).filter(Boolean))];
            const phases = ['gate_1', 'blue_team', 'pink_team', 'red_team', 'gold_team', 'submitted', 'awarded', 'lost'];

            const filtered = opportunities
                .filter(o => {
                    const matchSearch = !searchTerm || 
                        (o.title || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                        (o.solicitationNumber || '').toLowerCase().includes(searchTerm.toLowerCase());
                    const matchAgency = filterAgency === 'all' || o.agency === filterAgency;
                    const matchPhase = filterPhase === 'all' || (o.phase || o.shipleyPhase) === filterPhase;
                    return matchSearch && matchAgency && matchPhase;
                })
                .sort((a, b) => {
                    let aVal = a[sortField], bVal = b[sortField];
                    if (sortField === 'dueDate') { aVal = new Date(aVal || 0); bVal = new Date(bVal || 0); }
                    if (sortField === 'estimatedValue' || sortField === 'pwin') { aVal = aVal || 0; bVal = bVal || 0; }
                    return sortAsc ? (aVal > bVal ? 1 : -1) : (aVal < bVal ? 1 : -1);
                });

            const totalValue = filtered.reduce((sum, o) => sum + (o.estimatedValue || o.contractValue || 0), 0);

            if (loading) return <div className="flex items-center justify-center min-h-screen"><div className="w-12 h-12 border-4 border-cyan border-t-transparent rounded-full animate-spin"></div></div>;

            return (
                <div className="min-h-screen p-6">
                    {/* Header */}
                    <header className="glass rounded-xl p-6 mb-6 cyan-glow">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <a href="missionpulse-nav-hub.html" className="text-gray-400 hover:text-cyan">← Hub</a>
                                <div>
                                    <h1 className="text-2xl font-bold text-white">Pipeline Management</h1>
                                    <p className="text-gray-400 text-sm">Track and manage all opportunities</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                {isDemo && <span className="text-xs text-yellow-400 bg-yellow-400/10 px-2 py-1 rounded">Demo Mode</span>}
                                <button onClick={() => { setEditingOpp(null); setShowModal(true); }} className="bg-cyan text-black px-4 py-2 rounded-lg font-medium hover:bg-cyan/80">
                                    + New Opportunity
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Stats */}
                    <div className="grid grid-cols-4 gap-4 mb-6">
                        <div className="glass rounded-lg p-4 text-center">
                            <p className="text-2xl font-bold text-cyan">{filtered.length}</p>
                            <p className="text-gray-400 text-sm">Opportunities</p>
                        </div>
                        <div className="glass rounded-lg p-4 text-center">
                            <p className="text-2xl font-bold text-white">{MissionPulse.formatCurrency(totalValue)}</p>
                            <p className="text-gray-400 text-sm">Total Value</p>
                        </div>
                        <div className="glass rounded-lg p-4 text-center">
                            <p className="text-2xl font-bold text-green-400">{filtered.filter(o => o.status === 'active').length}</p>
                            <p className="text-gray-400 text-sm">Active</p>
                        </div>
                        <div className="glass rounded-lg p-4 text-center">
                            <p className="text-2xl font-bold text-orange-400">{filtered.filter(o => { const d = new Date(o.dueDate) - new Date(); return d > 0 && d < 30*24*60*60*1000; }).length}</p>
                            <p className="text-gray-400 text-sm">Due Soon</p>
                        </div>
                    </div>

                    {/* Filters */}
                    <div className="glass rounded-xl p-4 mb-6">
                        <div className="flex flex-wrap gap-4">
                            <input type="text" placeholder="Search opportunities..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
                                className="flex-1 min-w-[200px] bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan" />
                            <select value={filterAgency} onChange={e => setFilterAgency(e.target.value)}
                                className="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white focus:outline-none">
                                <option value="all">All Agencies</option>
                                {agencies.map(a => <option key={a} value={a}>{a}</option>)}
                            </select>
                            <select value={filterPhase} onChange={e => setFilterPhase(e.target.value)}
                                className="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white focus:outline-none">
                                <option value="all">All Phases</option>
                                {phases.map(p => <option key={p} value={p}>{MissionPulse.formatPhaseName(p)}</option>)}
                            </select>
                        </div>
                    </div>

                    {/* Table */}
                    <div className="glass rounded-xl overflow-hidden">
                        <table className="w-full">
                            <thead className="bg-white/5">
                                <tr>
                                    {[['title','Opportunity'],['agency','Agency'],['estimatedValue','Value'],['phase','Phase'],['pwin','pWin'],['dueDate','Due Date'],['priority','Priority']].map(([field, label]) => (
                                        <th key={field} onClick={() => { setSortField(field); setSortAsc(sortField === field ? !sortAsc : true); }}
                                            className="text-left p-4 text-gray-400 font-medium cursor-pointer hover:text-cyan">
                                            {label} {sortField === field && (sortAsc ? '↑' : '↓')}
                                        </th>
                                    ))}
                                    <th className="p-4"></th>
                                </tr>
                            </thead>
                            <tbody>
                                {filtered.map(opp => (
                                    <tr key={opp.id} className="border-t border-white/5 hover:bg-white/5">
                                        <td className="p-4">
                                            <p className="font-medium text-white">{opp.title || opp.name}</p>
                                            <p className="text-xs text-gray-500">{opp.solicitationNumber}</p>
                                        </td>
                                        <td className="p-4 text-gray-300">{opp.agency}</td>
                                        <td className="p-4 text-cyan font-medium">{MissionPulse.formatCurrency(opp.estimatedValue || opp.contractValue)}</td>
                                        <td className="p-4">
                                            <span className="px-2 py-1 rounded text-xs" style={{ backgroundColor: `${MissionPulse.getPhaseColor(opp.phase || opp.shipleyPhase)}20`, color: MissionPulse.getPhaseColor(opp.phase || opp.shipleyPhase) }}>
                                                {MissionPulse.formatPhaseName(opp.phase || opp.shipleyPhase)}
                                            </span>
                                        </td>
                                        <td className="p-4 text-gray-300">{opp.pwin || opp.winProbability || 0}%</td>
                                        <td className="p-4 text-gray-300">{opp.dueDate ? new Date(opp.dueDate).toLocaleDateString() : '-'}</td>
                                        <td className="p-4">
                                            <span className={`font-medium ${opp.priority === 'critical' ? 'text-red-400' : opp.priority === 'high' ? 'text-orange-400' : 'text-gray-400'}`}>
                                                {opp.priority || 'Medium'}
                                            </span>
                                        </td>
                                        <td className="p-4">
                                            <div className="flex gap-2">
                                                <button onClick={() => { setEditingOpp(opp); setShowModal(true); }} className="text-cyan hover:text-white">Edit</button>
                                                <button onClick={() => handleDelete(opp.id)} className="text-red-400 hover:text-red-300">Delete</button>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {filtered.length === 0 && <div className="p-8 text-center text-gray-500">No opportunities found.</div>}
                    </div>

                    {/* Modal */}
                    {showModal && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4">
                            <div className="glass rounded-xl p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                                <h2 className="text-xl font-bold mb-4">{editingOpp ? 'Edit Opportunity' : 'New Opportunity'}</h2>
                                <OpportunityForm initial={editingOpp} onSave={handleSave} onCancel={() => { setShowModal(false); setEditingOpp(null); }} />
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function OpportunityForm({ initial, onSave, onCancel }) {
            const [form, setForm] = useState({
                title: initial?.title || initial?.name || '',
                agency: initial?.agency || '',
                solicitationNumber: initial?.solicitationNumber || '',
                estimatedValue: initial?.estimatedValue || initial?.contractValue || '',
                pwin: initial?.pwin || initial?.winProbability || 50,
                phase: initial?.phase || initial?.shipleyPhase || 'gate_1',
                status: initial?.status || 'active',
                dueDate: initial?.dueDate ? initial.dueDate.split('T')[0] : '',
                priority: initial?.priority || 'medium',
                setAside: initial?.setAside || '',
                contractType: initial?.contractType || '',
                naicsCode: initial?.naicsCode || ''
            });

            const handleSubmit = (e) => { e.preventDefault(); onSave(form); };

            return (
                <form onSubmit={handleSubmit} className="space-y-4">
                    <div className="grid grid-cols-2 gap-4">
                        <div>
                            <label className="block text-sm text-gray-400 mb-1">Title *</label>
                            <input type="text" required value={form.title} onChange={e => setForm({...form, title: e.target.value})}
                                className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white" />
                        </div>
                        <div>
                            <label className="block text-sm text-gray-400 mb-1">Agency *</label>
                            <input type="text" required value={form.agency} onChange={e => setForm({...form, agency: e.target.value})}
                                className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white" />
                        </div>
                        <div>
                            <label className="block text-sm text-gray-400 mb-1">Solicitation #</label>
                            <input type="text" value={form.solicitationNumber} onChange={e => setForm({...form, solicitationNumber: e.target.value})}
                                className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white" />
                        </div>
                        <div>
                            <label className="block text-sm text-gray-400 mb-1">Estimated Value ($)</label>
                            <input type="number" value={form.estimatedValue} onChange={e => setForm({...form, estimatedValue: parseInt(e.target.value) || 0})}
                                className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white" />
                        </div>
                        <div>
                            <label className="block text-sm text-gray-400 mb-1">Phase</label>
                            <select value={form.phase} onChange={e => setForm({...form, phase: e.target.value})}
                                className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white">
                                {['gate_1','blue_team','pink_team','red_team','gold_team','submitted','awarded','lost'].map(p => (
                                    <option key={p} value={p}>{MissionPulse.formatPhaseName(p)}</option>
                                ))}
                            </select>
                        </div>
                        <div>
                            <label className="block text-sm text-gray-400 mb-1">Win Probability (%)</label>
                            <input type="number" min="0" max="100" value={form.pwin} onChange={e => setForm({...form, pwin: parseInt(e.target.value) || 0})}
                                className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white" />
                        </div>
                        <div>
                            <label className="block text-sm text-gray-400 mb-1">Due Date</label>
                            <input type="date" value={form.dueDate} onChange={e => setForm({...form, dueDate: e.target.value})}
                                className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white" />
                        </div>
                        <div>
                            <label className="block text-sm text-gray-400 mb-1">Priority</label>
                            <select value={form.priority} onChange={e => setForm({...form, priority: e.target.value})}
                                className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white">
                                <option value="critical">Critical</option>
                                <option value="high">High</option>
                                <option value="medium">Medium</option>
                                <option value="low">Low</option>
                            </select>
                        </div>
                        <div>
                            <label className="block text-sm text-gray-400 mb-1">Set-Aside</label>
                            <select value={form.setAside} onChange={e => setForm({...form, setAside: e.target.value})}
                                className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white">
                                <option value="">None</option>
                                <option value="SDVOSB">SDVOSB</option>
                                <option value="8(a)">8(a)</option>
                                <option value="HUBZone">HUBZone</option>
                                <option value="WOSB">WOSB</option>
                                <option value="Full & Open">Full & Open</option>
                            </select>
                        </div>
                        <div>
                            <label className="block text-sm text-gray-400 mb-1">Contract Type</label>
                            <select value={form.contractType} onChange={e => setForm({...form, contractType: e.target.value})}
                                className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white">
                                <option value="">Select...</option>
                                <option value="FFP">FFP</option>
                                <option value="T&M">T&M</option>
                                <option value="CPFF">CPFF</option>
                                <option value="IDIQ">IDIQ</option>
                                <option value="BPA">BPA</option>
                            </select>
                        </div>
                    </div>
                    <div className="flex gap-3 pt-4">
                        <button type="submit" className="flex-1 bg-cyan text-black py-2 rounded-lg font-medium hover:bg-cyan/80">Save</button>
                        <button type="button" onClick={onCancel} className="flex-1 bg-white/10 py-2 rounded-lg hover:bg-white/20">Cancel</button>
                    </div>
                </form>
            );
        }

        ReactDOM.render(<Pipeline />, document.getElementById('root'));
    </script>
</body>
</html>
