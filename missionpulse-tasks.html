<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Board | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.15); }
        .kanban-column { min-height: 400px; }
    </style>
</head>
<body class="min-h-screen text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const supabaseUrl = 'https://djuviwarqdvlbgcfuupa.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc0OTc5MzMsImV4cCI6MjA1MzA3MzkzM30.pBPpVaJmVkzhCcUvJPN2KnMGnstuc55sNv8CVsERRPg';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const DEMO_TASKS = [
            { id: '1', task_title: 'Draft Technical Approach Section 3.1', task_type: 'writing', priority: 'high', status: 'in_progress', assigned_to_name: 'Sarah M.', due_date: '2026-02-05', estimated_hours: 8 },
            { id: '2', task_title: 'Review competitor analysis', task_type: 'review', priority: 'medium', status: 'todo', assigned_to_name: 'John D.', due_date: '2026-02-06', estimated_hours: 4 },
            { id: '3', task_title: 'Update org chart graphic', task_type: 'graphics', priority: 'low', status: 'todo', assigned_to_name: 'Mike R.', due_date: '2026-02-07', estimated_hours: 2 },
            { id: '4', task_title: 'Finalize staffing matrix', task_type: 'writing', priority: 'high', status: 'in_progress', assigned_to_name: 'Lisa T.', due_date: '2026-02-04', estimated_hours: 6 },
            { id: '5', task_title: 'Compliance matrix review', task_type: 'compliance', priority: 'critical', status: 'review', assigned_to_name: 'Sarah M.', due_date: '2026-02-03', estimated_hours: 4 },
            { id: '6', task_title: 'Past performance narratives', task_type: 'writing', priority: 'high', status: 'review', assigned_to_name: 'John D.', due_date: '2026-02-04', estimated_hours: 10 },
            { id: '7', task_title: 'Cost volume build', task_type: 'pricing', priority: 'critical', status: 'in_progress', assigned_to_name: 'Finance Team', due_date: '2026-02-08', estimated_hours: 20 },
            { id: '8', task_title: 'Executive summary draft', task_type: 'writing', priority: 'high', status: 'done', assigned_to_name: 'Sarah M.', due_date: '2026-02-01', estimated_hours: 4, completed_at: '2026-02-01T15:30:00Z' },
            { id: '9', task_title: 'Key personnel resumes', task_type: 'staffing', priority: 'medium', status: 'done', assigned_to_name: 'HR Team', due_date: '2026-01-30', estimated_hours: 8, completed_at: '2026-01-30T12:00:00Z' }
        ];

        const COLUMNS = [
            { id: 'todo', label: 'To Do', color: 'gray' },
            { id: 'in_progress', label: 'In Progress', color: 'cyan' },
            { id: 'review', label: 'In Review', color: 'amber' },
            { id: 'done', label: 'Done', color: 'emerald' }
        ];

        const TASK_TYPES = ['writing', 'review', 'graphics', 'compliance', 'pricing', 'staffing', 'coordination', 'other'];
        const PRIORITIES = ['low', 'medium', 'high', 'critical'];
        const TEAM_MEMBERS = ['Sarah M.', 'John D.', 'Mike R.', 'Lisa T.', 'Finance Team', 'HR Team', 'Graphics Team'];

        function TaskBoard() {
            const [tasks, setTasks] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showModal, setShowModal] = useState(false);
            const [selectedTask, setSelectedTask] = useState(null);
            const [filterAssignee, setFilterAssignee] = useState('');
            const [filterPriority, setFilterPriority] = useState('');
            const [newTask, setNewTask] = useState({ task_title: '', task_type: 'writing', priority: 'medium', status: 'todo', assigned_to_name: '', due_date: '', estimated_hours: '' });

            useEffect(() => { fetchTasks(); }, []);

            async function fetchTasks() {
                try {
                    const { data, error } = await supabase.from('tasks').select('*').order('due_date', { ascending: true });
                    if (error) throw error;
                    setTasks(data?.length > 0 ? data : DEMO_TASKS);
                } catch (err) {
                    console.log('Using demo data:', err.message);
                    setTasks(DEMO_TASKS);
                }
                setLoading(false);
            }

            function handleCreateTask() {
                const task = {
                    id: Date.now().toString(),
                    ...newTask,
                    estimated_hours: parseFloat(newTask.estimated_hours) || 0,
                    created_at: new Date().toISOString()
                };
                setTasks([...tasks, task]);
                setShowModal(false);
                setNewTask({ task_title: '', task_type: 'writing', priority: 'medium', status: 'todo', assigned_to_name: '', due_date: '', estimated_hours: '' });
            }

            function handleStatusChange(taskId, newStatus) {
                setTasks(tasks.map(t => {
                    if (t.id === taskId) {
                        return { 
                            ...t, 
                            status: newStatus,
                            completed_at: newStatus === 'done' ? new Date().toISOString() : null
                        };
                    }
                    return t;
                }));
            }

            function getDaysUntil(date) {
                const today = new Date();
                const target = new Date(date);
                return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
            }

            const priorityColor = (priority) => ({
                'low': 'bg-blue-500/20 text-blue-400 border-blue-500/30',
                'medium': 'bg-cyan-500/20 text-cyan-400 border-cyan-500/30',
                'high': 'bg-amber-500/20 text-amber-400 border-amber-500/30',
                'critical': 'bg-red-500/20 text-red-400 border-red-500/30'
            }[priority] || 'bg-gray-500/20 text-gray-400');

            const typeIcon = (type) => ({
                'writing': '✏️',
                'review': '👁️',
                'graphics': '🎨',
                'compliance': '✅',
                'pricing': '💰',
                'staffing': '👥',
                'coordination': '📋',
                'other': '📌'
            }[type] || '📌');

            // Filter tasks
            const filteredTasks = tasks.filter(t => {
                if (filterAssignee && t.assigned_to_name !== filterAssignee) return false;
                if (filterPriority && t.priority !== filterPriority) return false;
                return true;
            });

            const stats = {
                total: tasks.length,
                todo: tasks.filter(t => t.status === 'todo').length,
                inProgress: tasks.filter(t => t.status === 'in_progress').length,
                done: tasks.filter(t => t.status === 'done').length,
                overdue: tasks.filter(t => t.status !== 'done' && getDaysUntil(t.due_date) < 0).length
            };

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="border-b border-cyan-500/20 bg-black/40 backdrop-blur-xl sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <a href="index.html" className="text-cyan-400 hover:text-cyan-300">← Back</a>
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-violet-400 to-purple-600 flex items-center justify-center text-xl">📋</div>
                                    <div>
                                        <h1 className="text-xl font-bold">Task Board</h1>
                                        <p className="text-xs text-gray-400">Assign • Track • Complete</p>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <select value={filterAssignee} onChange={(e) => setFilterAssignee(e.target.value)}
                                    className="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm">
                                    <option value="">All Assignees</option>
                                    {TEAM_MEMBERS.map(m => <option key={m} value={m}>{m}</option>)}
                                </select>
                                <select value={filterPriority} onChange={(e) => setFilterPriority(e.target.value)}
                                    className="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm">
                                    <option value="">All Priorities</option>
                                    {PRIORITIES.map(p => <option key={p} value={p}>{p.charAt(0).toUpperCase() + p.slice(1)}</option>)}
                                </select>
                                <button onClick={() => setShowModal(true)} className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium transition-all">
                                    + New Task
                                </button>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto px-6 py-8">
                        {/* Stats */}
                        <div className="grid grid-cols-5 gap-4 mb-6">
                            <div className="glass-card rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-cyan-400">{stats.total}</div>
                                <div className="text-sm text-gray-400">Total Tasks</div>
                            </div>
                            <div className="glass-card rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-gray-400">{stats.todo}</div>
                                <div className="text-sm text-gray-400">To Do</div>
                            </div>
                            <div className="glass-card rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-cyan-400">{stats.inProgress}</div>
                                <div className="text-sm text-gray-400">In Progress</div>
                            </div>
                            <div className="glass-card rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-emerald-400">{stats.done}</div>
                                <div className="text-sm text-gray-400">Completed</div>
                            </div>
                            <div className="glass-card rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-red-400">{stats.overdue}</div>
                                <div className="text-sm text-gray-400">Overdue</div>
                            </div>
                        </div>

                        {/* Kanban Board */}
                        <div className="grid grid-cols-4 gap-4">
                            {COLUMNS.map(column => {
                                const columnTasks = filteredTasks.filter(t => t.status === column.id);
                                return (
                                    <div key={column.id} className="kanban-column">
                                        <div className={`flex items-center justify-between mb-4 pb-2 border-b border-${column.color}-500/30`}>
                                            <h3 className={`font-semibold text-${column.color}-400`}>{column.label}</h3>
                                            <span className={`px-2 py-0.5 rounded bg-${column.color}-500/20 text-${column.color}-400 text-xs`}>
                                                {columnTasks.length}
                                            </span>
                                        </div>
                                        <div className="space-y-3">
                                            {columnTasks.map(task => {
                                                const daysUntil = getDaysUntil(task.due_date);
                                                const isOverdue = daysUntil < 0 && task.status !== 'done';
                                                return (
                                                    <div key={task.id} 
                                                        className={`glass-card rounded-xl p-4 cursor-pointer transition-all hover:border-cyan-500/40 ${isOverdue ? 'border-red-500/50' : ''}`}
                                                        onClick={() => setSelectedTask(task)}>
                                                        <div className="flex items-start justify-between mb-2">
                                                            <span className="text-lg">{typeIcon(task.task_type)}</span>
                                                            <span className={`px-2 py-0.5 rounded text-xs border ${priorityColor(task.priority)}`}>
                                                                {task.priority}
                                                            </span>
                                                        </div>
                                                        <h4 className="font-medium text-sm mb-2">{task.task_title}</h4>
                                                        <div className="flex items-center justify-between text-xs">
                                                            <span className="text-gray-500">{task.assigned_to_name}</span>
                                                            {task.status !== 'done' && (
                                                                <span className={isOverdue ? 'text-red-400' : daysUntil <= 2 ? 'text-amber-400' : 'text-gray-500'}>
                                                                    {isOverdue ? `${Math.abs(daysUntil)}d overdue` : `${daysUntil}d left`}
                                                                </span>
                                                            )}
                                                        </div>
                                                        {task.estimated_hours && (
                                                            <div className="text-xs text-gray-500 mt-2">⏱️ {task.estimated_hours}h estimated</div>
                                                        )}
                                                        {/* Quick status change */}
                                                        <div className="flex gap-1 mt-3">
                                                            {COLUMNS.filter(c => c.id !== task.status).map(c => (
                                                                <button key={c.id}
                                                                    onClick={(e) => { e.stopPropagation(); handleStatusChange(task.id, c.id); }}
                                                                    className={`flex-1 px-2 py-1 rounded text-xs bg-${c.color}-500/10 text-${c.color}-400 hover:bg-${c.color}-500/20`}>
                                                                    → {c.label.split(' ')[0]}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                            {columnTasks.length === 0 && (
                                                <div className="text-center py-8 text-gray-600 text-sm">No tasks</div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* New Task Modal */}
                    {showModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                            <div className="glass-card rounded-2xl p-6 w-full max-w-md">
                                <h2 className="text-xl font-bold mb-6">Create Task</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-1">Task Title *</label>
                                        <input type="text" value={newTask.task_title} onChange={(e) => setNewTask({...newTask, task_title: e.target.value})}
                                            placeholder="e.g., Draft Section 3.2 Technical Approach"
                                            className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm text-gray-400 mb-1">Type</label>
                                            <select value={newTask.task_type} onChange={(e) => setNewTask({...newTask, task_type: e.target.value})}
                                                className="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2">
                                                {TASK_TYPES.map(t => <option key={t} value={t}>{t.charAt(0).toUpperCase() + t.slice(1)}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm text-gray-400 mb-1">Priority</label>
                                            <select value={newTask.priority} onChange={(e) => setNewTask({...newTask, priority: e.target.value})}
                                                className="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2">
                                                {PRIORITIES.map(p => <option key={p} value={p}>{p.charAt(0).toUpperCase() + p.slice(1)}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm text-gray-400 mb-1">Assignee</label>
                                            <select value={newTask.assigned_to_name} onChange={(e) => setNewTask({...newTask, assigned_to_name: e.target.value})}
                                                className="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2">
                                                <option value="">Unassigned</option>
                                                {TEAM_MEMBERS.map(m => <option key={m} value={m}>{m}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm text-gray-400 mb-1">Due Date</label>
                                            <input type="date" value={newTask.due_date} onChange={(e) => setNewTask({...newTask, due_date: e.target.value})}
                                                className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-1">Estimated Hours</label>
                                        <input type="number" value={newTask.estimated_hours} onChange={(e) => setNewTask({...newTask, estimated_hours: e.target.value})}
                                            placeholder="e.g., 4"
                                            className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 mt-6">
                                    <button onClick={() => setShowModal(false)} className="px-4 py-2 border border-white/20 rounded-lg hover:bg-white/5">Cancel</button>
                                    <button onClick={handleCreateTask} disabled={!newTask.task_title}
                                        className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium disabled:opacity-50">Create Task</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Task Detail Modal */}
                    {selectedTask && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4" onClick={() => setSelectedTask(null)}>
                            <div className="glass-card rounded-2xl p-6 w-full max-w-lg" onClick={(e) => e.stopPropagation()}>
                                <div className="flex items-start justify-between mb-4">
                                    <div className="flex items-center gap-3">
                                        <span className="text-3xl">{typeIcon(selectedTask.task_type)}</span>
                                        <div>
                                            <h2 className="text-xl font-bold">{selectedTask.task_title}</h2>
                                            <span className={`px-2 py-0.5 rounded text-xs border ${priorityColor(selectedTask.priority)}`}>
                                                {selectedTask.priority}
                                            </span>
                                        </div>
                                    </div>
                                    <button onClick={() => setSelectedTask(null)} className="text-gray-400 hover:text-white">✕</button>
                                </div>
                                <div className="space-y-3 text-sm">
                                    <div className="flex justify-between py-2 border-b border-white/10">
                                        <span className="text-gray-500">Status</span>
                                        <select value={selectedTask.status} onChange={(e) => { handleStatusChange(selectedTask.id, e.target.value); setSelectedTask({...selectedTask, status: e.target.value}); }}
                                            className="bg-white/5 border border-white/10 rounded px-2 py-1">
                                            {COLUMNS.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                                        </select>
                                    </div>
                                    <div className="flex justify-between py-2 border-b border-white/10">
                                        <span className="text-gray-500">Assignee</span>
                                        <span>{selectedTask.assigned_to_name || 'Unassigned'}</span>
                                    </div>
                                    <div className="flex justify-between py-2 border-b border-white/10">
                                        <span className="text-gray-500">Due Date</span>
                                        <span>{selectedTask.due_date || 'Not set'}</span>
                                    </div>
                                    <div className="flex justify-between py-2 border-b border-white/10">
                                        <span className="text-gray-500">Estimated Hours</span>
                                        <span>{selectedTask.estimated_hours || '—'}h</span>
                                    </div>
                                    <div className="flex justify-between py-2 border-b border-white/10">
                                        <span className="text-gray-500">Type</span>
                                        <span>{selectedTask.task_type}</span>
                                    </div>
                                </div>
                                <div className="mt-6 flex gap-2">
                                    <button className="flex-1 px-4 py-2 bg-cyan-500/20 text-cyan-400 rounded-lg text-sm hover:bg-cyan-500/30">
                                        ✏️ Edit
                                    </button>
                                    <button className="flex-1 px-4 py-2 bg-white/10 rounded-lg text-sm hover:bg-white/20">
                                        💬 Comment
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<TaskBoard />, document.getElementById('root'));
    </script>
</body>
</html>
