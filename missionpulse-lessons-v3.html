<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Lessons Learned</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    // ============================================
    // CONFIGURATION
    // ============================================
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const API_URL = 'https://missionpulse-api.onrender.com';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // ============================================
    // DEMO DATA
    // ============================================
    const DEMO_LESSONS = [
      {
        id: 1,
        title: 'Start compliance matrix during capture phase',
        outcome: 'win',
        opportunity: 'DHA MHS GENESIS Phase II',
        agency: 'DHA',
        category: 'Process',
        tags: ['compliance', 'capture', 'early-start'],
        insight: 'Starting the compliance matrix 3 weeks earlier gave us time to identify 8 gaps that would have been showstoppers. The extra preparation time allowed us to get proper authorizations and certifications in place.',
        impact: 'high',
        created_by: 'Sarah Chen',
        created_at: '2025-11-15',
        votes: 12,
        applied_count: 3
      },
      {
        id: 2,
        title: 'Incumbent pricing intelligence is critical',
        outcome: 'loss',
        opportunity: 'VA Cloud Migration',
        agency: 'VA',
        category: 'Pricing',
        tags: ['pricing', 'competitive-intel', 'incumbent'],
        insight: 'We lost primarily on price despite strong technical scores. Post-debrief revealed incumbent was 15% lower due to existing infrastructure investments we didnt account for. Need better incumbent cost modeling.',
        impact: 'critical',
        created_by: 'Mike Torres',
        created_at: '2025-10-28',
        votes: 18,
        applied_count: 5
      },
      {
        id: 3,
        title: 'Use customer language in technical approach',
        outcome: 'win',
        opportunity: 'CMS Data Analytics Platform',
        agency: 'CMS',
        category: 'Writing',
        tags: ['technical', 'customer-focus', 'rfp-language'],
        insight: 'Mirroring exact terminology from the RFP and agency strategic plans in our technical approach led to evaluator comments praising our "clear understanding of mission." This wasnt coincidence - deliberate language alignment works.',
        impact: 'high',
        created_by: 'Lisa Park',
        created_at: '2025-12-03',
        votes: 15,
        applied_count: 7
      },
      {
        id: 4,
        title: 'Key personnel interviews change outcomes',
        outcome: 'win',
        opportunity: 'IHS Telehealth Expansion',
        agency: 'IHS',
        category: 'Orals',
        tags: ['orals', 'key-personnel', 'interviews'],
        insight: 'Evaluators specifically mentioned our PM interview performance as a discriminator. Invested 20 hours in mock interviews with hostile questions. Key personnel prep should be mandatory for any orals.',
        impact: 'critical',
        created_by: 'David Kim',
        created_at: '2025-09-20',
        votes: 22,
        applied_count: 4
      },
      {
        id: 5,
        title: 'Past performance recency matters more than relevance',
        outcome: 'loss',
        opportunity: 'FDA IT Infrastructure',
        agency: 'FDA',
        category: 'Past Performance',
        tags: ['past-performance', 'recency', 'references'],
        insight: 'Debrief revealed our highly relevant but 4-year-old references scored lower than competitors less relevant but recent work. Lesson: balance relevance with recency, prioritize contracts completed within 2 years.',
        impact: 'high',
        created_by: 'James Wilson',
        created_at: '2025-08-14',
        votes: 9,
        applied_count: 2
      },
      {
        id: 6,
        title: 'Small business goals can be a trap',
        outcome: 'loss',
        opportunity: 'HHS Enterprise Services',
        agency: 'HHS',
        category: 'Teaming',
        tags: ['small-business', 'subcontracting', 'compliance'],
        insight: 'Committed to aggressive 35% SB goal to appear competitive, but couldnt actually staff it. Evaluators noted "unrealistic subcontracting plan." Better to be realistic than aggressive on SB commitments.',
        impact: 'medium',
        created_by: 'Sarah Chen',
        created_at: '2025-07-22',
        votes: 11,
        applied_count: 6
      }
    ];

    const CATEGORIES = ['All', 'Process', 'Pricing', 'Writing', 'Orals', 'Past Performance', 'Teaming', 'Technical', 'Management'];
    const IMPACTS = ['critical', 'high', 'medium', 'low'];

    // ============================================
    // COMPONENTS
    // ============================================

    // Stats Summary
    const StatsSummary = ({ lessons }) => {
      const wins = lessons.filter(l => l.outcome === 'win').length;
      const losses = lessons.filter(l => l.outcome === 'loss').length;
      const totalVotes = lessons.reduce((sum, l) => sum + l.votes, 0);
      const totalApplied = lessons.reduce((sum, l) => sum + l.applied_count, 0);

      return (
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          {[
            { label: 'Total Insights', value: lessons.length, color: 'cyan', icon: '💡' },
            { label: 'From Wins', value: wins, color: 'emerald', icon: '🏆' },
            { label: 'From Losses', value: losses, color: 'amber', icon: '📚' },
            { label: 'Times Applied', value: totalApplied, color: 'purple', icon: '✅' }
          ].map(({ label, value, color, icon }) => (
            <div key={label} className="glass rounded-lg p-4 border border-slate-700/50">
              <div className="flex items-center gap-2 mb-1">
                <span>{icon}</span>
                <p className="text-xs text-slate-400">{label}</p>
              </div>
              <p className={`text-2xl font-bold text-${color}-400`}>{value}</p>
            </div>
          ))}
        </div>
      );
    };

    // Lesson Card
    const LessonCard = ({ lesson, onVote, onApply }) => {
      const [expanded, setExpanded] = React.useState(false);
      
      const impactColors = {
        critical: { bg: 'bg-red-500/20', text: 'text-red-400' },
        high: { bg: 'bg-amber-500/20', text: 'text-amber-400' },
        medium: { bg: 'bg-blue-500/20', text: 'text-blue-400' },
        low: { bg: 'bg-slate-500/20', text: 'text-slate-400' }
      };
      const impact = impactColors[lesson.impact];

      return (
        <div className={`glass rounded-xl border border-slate-700/50 overflow-hidden ${
          lesson.outcome === 'win' ? 'border-l-4 border-l-emerald-500' : 'border-l-4 border-l-amber-500'
        }`}>
          <div className="p-4">
            <div className="flex items-start justify-between gap-4 mb-3">
              <div className="flex items-center gap-2">
                <span className={lesson.outcome === 'win' ? 'text-emerald-400' : 'text-amber-400'}>
                  {lesson.outcome === 'win' ? '🏆' : '📚'}
                </span>
                <span className={`px-2 py-0.5 rounded text-xs ${impact.bg} ${impact.text}`}>
                  {lesson.impact.toUpperCase()} IMPACT
                </span>
                <span className="px-2 py-0.5 bg-slate-700 rounded text-xs text-slate-300">
                  {lesson.category}
                </span>
              </div>
              <div className="flex items-center gap-2 text-sm text-slate-400">
                <button 
                  onClick={() => onVote(lesson.id)}
                  className="flex items-center gap-1 hover:text-cyan-400 transition-colors"
                >
                  👍 {lesson.votes}
                </button>
              </div>
            </div>

            <h3 className="font-semibold text-white text-lg mb-2">{lesson.title}</h3>
            
            <div className="flex items-center gap-4 text-xs text-slate-500 mb-3">
              <span>{lesson.agency} - {lesson.opportunity}</span>
              <span>•</span>
              <span>By {lesson.created_by}</span>
              <span>•</span>
              <span>{new Date(lesson.created_at).toLocaleDateString()}</span>
            </div>

            <p className={`text-slate-300 ${expanded ? '' : 'line-clamp-2'}`}>{lesson.insight}</p>
            
            {lesson.insight.length > 150 && (
              <button 
                onClick={() => setExpanded(!expanded)}
                className="text-cyan-400 text-sm mt-2 hover:underline"
              >
                {expanded ? 'Show less' : 'Read more'}
              </button>
            )}

            {/* Tags */}
            <div className="flex flex-wrap gap-2 mt-3">
              {lesson.tags.map((tag, i) => (
                <span key={i} className="px-2 py-0.5 bg-slate-800 rounded text-xs text-slate-400">
                  #{tag}
                </span>
              ))}
            </div>

            {/* Actions */}
            <div className="flex items-center justify-between mt-4 pt-4 border-t border-slate-700">
              <span className="text-xs text-slate-500">
                Applied {lesson.applied_count} time{lesson.applied_count !== 1 ? 's' : ''}
              </span>
              <button
                onClick={() => onApply(lesson.id)}
                className="px-4 py-2 bg-purple-600 hover:bg-purple-500 rounded-lg text-sm transition-colors"
              >
                ✅ Mark as Applied
              </button>
            </div>
          </div>
        </div>
      );
    };

    // Add Lesson Modal
    const AddLessonModal = ({ isOpen, onClose, onSave }) => {
      const [form, setForm] = React.useState({
        title: '',
        outcome: 'win',
        opportunity: '',
        agency: '',
        category: 'Process',
        tags: '',
        insight: '',
        impact: 'medium'
      });

      if (!isOpen) return null;

      const handleSubmit = (e) => {
        e.preventDefault();
        onSave({
          ...form,
          id: Date.now(),
          tags: form.tags.split(',').map(t => t.trim().toLowerCase()),
          created_by: 'Mary Womack',
          created_at: new Date().toISOString().split('T')[0],
          votes: 0,
          applied_count: 0
        });
        setForm({ title: '', outcome: 'win', opportunity: '', agency: '', category: 'Process', tags: '', insight: '', impact: 'medium' });
        onClose();
      };

      return (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
          <div className="glass rounded-xl border border-slate-700 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <div className="p-6 border-b border-slate-700 flex items-center justify-between">
              <h2 className="text-xl font-bold text-white">Capture New Insight</h2>
              <button onClick={onClose} className="text-slate-400 hover:text-white text-2xl">×</button>
            </div>
            
            <form onSubmit={handleSubmit} className="p-6 space-y-4">
              <div>
                <label className="block text-sm text-slate-400 mb-1">Title *</label>
                <input
                  value={form.title}
                  onChange={(e) => setForm({ ...form, title: e.target.value })}
                  required
                  placeholder="What's the key takeaway?"
                  className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500"
                />
              </div>

              <div className="grid md:grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Outcome</label>
                  <select
                    value={form.outcome}
                    onChange={(e) => setForm({ ...form, outcome: e.target.value })}
                    className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                  >
                    <option value="win">🏆 Win</option>
                    <option value="loss">📚 Loss</option>
                  </select>
                </div>
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Impact Level</label>
                  <select
                    value={form.impact}
                    onChange={(e) => setForm({ ...form, impact: e.target.value })}
                    className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                  >
                    {IMPACTS.map(i => <option key={i} value={i}>{i.charAt(0).toUpperCase() + i.slice(1)}</option>)}
                  </select>
                </div>
              </div>

              <div className="grid md:grid-cols-3 gap-4">
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Opportunity</label>
                  <input
                    value={form.opportunity}
                    onChange={(e) => setForm({ ...form, opportunity: e.target.value })}
                    placeholder="Contract name"
                    className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white placeholder-slate-500"
                  />
                </div>
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Agency</label>
                  <input
                    value={form.agency}
                    onChange={(e) => setForm({ ...form, agency: e.target.value })}
                    placeholder="VA, DHA, CMS..."
                    className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white placeholder-slate-500"
                  />
                </div>
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Category</label>
                  <select
                    value={form.category}
                    onChange={(e) => setForm({ ...form, category: e.target.value })}
                    className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                  >
                    {CATEGORIES.slice(1).map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
              </div>

              <div>
                <label className="block text-sm text-slate-400 mb-1">Tags (comma separated)</label>
                <input
                  value={form.tags}
                  onChange={(e) => setForm({ ...form, tags: e.target.value })}
                  placeholder="pricing, competitive-intel, compliance"
                  className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white placeholder-slate-500"
                />
              </div>

              <div>
                <label className="block text-sm text-slate-400 mb-1">Insight Details *</label>
                <textarea
                  value={form.insight}
                  onChange={(e) => setForm({ ...form, insight: e.target.value })}
                  required
                  rows={4}
                  placeholder="Describe what happened and what we learned..."
                  className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 resize-none"
                />
              </div>

              <div className="flex justify-end gap-3 pt-4">
                <button type="button" onClick={onClose} className="px-4 py-2 text-slate-400 hover:text-white">
                  Cancel
                </button>
                <button type="submit" className="px-6 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg font-medium">
                  Save Insight
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    };

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [lessons, setLessons] = React.useState(DEMO_LESSONS);
      const [category, setCategory] = React.useState('All');
      const [outcome, setOutcome] = React.useState('all');
      const [search, setSearch] = React.useState('');
      const [showModal, setShowModal] = React.useState(false);
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);

      React.useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        try {
          const { data } = await supabase.from('lessons_learned').select('*').order('created_at', { ascending: false });
          if (data?.length > 0) {
            setLessons(data);
            setConnected(true);
          }
        } catch (e) {
          console.log('Using demo data');
        } finally {
          setLoading(false);
        }
      };

      const handleVote = (id) => {
        setLessons(prev => prev.map(l => l.id === id ? { ...l, votes: l.votes + 1 } : l));
      };

      const handleApply = (id) => {
        setLessons(prev => prev.map(l => l.id === id ? { ...l, applied_count: l.applied_count + 1 } : l));
      };

      const handleSave = (newLesson) => {
        setLessons(prev => [newLesson, ...prev]);
      };

      const filteredLessons = lessons.filter(l => {
        if (category !== 'All' && l.category !== category) return false;
        if (outcome !== 'all' && l.outcome !== outcome) return false;
        if (search) {
          const searchLower = search.toLowerCase();
          return l.title.toLowerCase().includes(searchLower) ||
                 l.insight.toLowerCase().includes(searchLower) ||
                 l.tags.some(t => t.includes(searchLower));
        }
        return true;
      });

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-slate-400">Loading Knowledge Base...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-700/50 rounded-lg">← Back</a>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center">📚</div>
                  <div>
                    <h1 className="text-xl font-bold text-white">Lessons Learned</h1>
                    <p className="text-xs text-slate-400">Organizational Knowledge Base</p>
                  </div>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <button 
                  onClick={() => setShowModal(true)}
                  className="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg text-sm font-medium"
                >
                  + Add Insight
                </button>
                <div className={`px-3 py-1 rounded-full text-xs ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                  {connected ? '● Connected' : '○ Demo'}
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8 space-y-6">
            {/* Stats */}
            <StatsSummary lessons={lessons} />

            {/* Filters */}
            <div className="flex flex-col md:flex-row gap-4">
              <div className="flex gap-2">
                {['all', 'win', 'loss'].map(o => (
                  <button
                    key={o}
                    onClick={() => setOutcome(o)}
                    className={`px-4 py-2 rounded-lg text-sm transition-colors ${
                      outcome === o ? 'bg-cyan-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'
                    }`}
                  >
                    {o === 'all' ? 'All' : o === 'win' ? '🏆 Wins' : '📚 Losses'}
                  </button>
                ))}
              </div>
              <select
                value={category}
                onChange={(e) => setCategory(e.target.value)}
                className="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
              >
                {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
              <input
                type="text"
                value={search}
                onChange={(e) => setSearch(e.target.value)}
                placeholder="Search insights or tags..."
                className="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500"
              />
            </div>

            {/* Lessons Grid */}
            <div className="grid md:grid-cols-2 gap-6">
              {filteredLessons.map(lesson => (
                <LessonCard key={lesson.id} lesson={lesson} onVote={handleVote} onApply={handleApply} />
              ))}
              {filteredLessons.length === 0 && (
                <div className="col-span-2 text-center py-12 text-slate-500">
                  No lessons match your filters
                </div>
              )}
            </div>
          </main>

          {/* Footer */}
          <footer className="border-t border-slate-800 py-6">
            <div className="max-w-7xl mx-auto px-6 flex justify-between">
              <p className="text-xs text-slate-500">© 2026 Mission Meets Tech</p>
              <p className="text-xs text-slate-600">AI GENERATED - REQUIRES HUMAN REVIEW</p>
            </div>
          </footer>

          <AddLessonModal isOpen={showModal} onClose={() => setShowModal(false)} onSave={handleSave} />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
