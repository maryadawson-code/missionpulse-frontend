<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Lessons Learned</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --mmt-cyan: #00E5FA; --mmt-navy: #00050F; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--mmt-navy); color: #e2e8f0; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

const CONFIG = {
  SUPABASE_URL: 'https://djuviwarqdvlbgcfuupa.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8',
  LOGIN_PAGE: 'login.html'
};

const DEMO_LESSONS = [
  { id: 1, title: 'Start compliance matrix early', category: 'Process', outcome: 'win', opportunity: 'VA EHRM 2024', impact: 'high', description: 'Beginning compliance work in Gate 2 vs Gate 4 reduced final review time by 40%' },
  { id: 2, title: 'Include pricing SME in kickoff', category: 'Team', outcome: 'win', opportunity: 'DHA Cloud', impact: 'high', description: 'Early pricing involvement prevented BOE rework and improved competitiveness' },
  { id: 3, title: 'Verify past performance relevance', category: 'Content', outcome: 'loss', opportunity: 'CMS Analytics', impact: 'critical', description: 'References deemed not relevant by evaluators - need stronger alignment to SOW' },
  { id: 4, title: 'Automate Red Team scheduling', category: 'Process', outcome: 'win', opportunity: 'IHS Portal', impact: 'medium', description: 'Calendar automation ensured all reviewers attended, improved feedback quality' },
  { id: 5, title: 'Ghost team competitor research', category: 'Strategy', outcome: 'win', opportunity: 'VA EHRM 2024', impact: 'high', description: 'Black Hat analysis identified pricing gap that we exploited in final bid' }
];

function checkAuth() {
  const session = localStorage.getItem('MP_SESSION');
  if (!session) { window.location.href = CONFIG.LOGIN_PAGE; return null; }
  try { return JSON.parse(localStorage.getItem('MP_USER')); }
  catch { return { email: 'demo@mmt.com', role: 'PM', name: 'Demo User' }; }
}

function LessonCard({ lesson }) {
  const outcomeColors = { win: 'border-green-500 bg-green-500/10', loss: 'border-red-500 bg-red-500/10' };
  const impactColors = { critical: 'bg-red-500/20 text-red-400', high: 'bg-amber-500/20 text-amber-400', medium: 'bg-blue-500/20 text-blue-400', low: 'bg-slate-500/20 text-slate-400' };
  
  return (
    <div className={`glass rounded-xl p-4 border-l-4 ${outcomeColors[lesson.outcome]}`}>
      <div className="flex justify-between items-start mb-2">
        <span className="text-xs px-2 py-1 bg-slate-700 rounded">{lesson.category}</span>
        <div className="flex gap-2">
          <span className={`text-xs px-2 py-1 rounded ${impactColors[lesson.impact]}`}>{lesson.impact} impact</span>
          <span className={`text-xs px-2 py-1 rounded ${lesson.outcome === 'win' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}`}>{lesson.outcome}</span>
        </div>
      </div>
      <h3 className="font-semibold text-white mb-2">{lesson.title}</h3>
      <p className="text-sm text-slate-400 mb-2">{lesson.description}</p>
      <p className="text-xs text-cyan-400">From: {lesson.opportunity}</p>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [lessons, setLessons] = useState(DEMO_LESSONS);
  const [filter, setFilter] = useState('all');

  useEffect(() => {
    const authUser = checkAuth();
    if (authUser) setUser(authUser);
  }, []);

  const filtered = filter === 'all' ? lessons : lessons.filter(l => l.outcome === filter);
  const stats = { total: lessons.length, wins: lessons.filter(l => l.outcome === 'win').length, losses: lessons.filter(l => l.outcome === 'loss').length };

  if (!user) return <div className="min-h-screen flex items-center justify-center text-cyan-400">Loading...</div>;

  return (
    <div className="min-h-screen bg-slate-950">
      <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            </a>
            <div>
              <h1 className="text-xl font-bold text-white">📚 Lessons Learned</h1>
              <p className="text-sm text-slate-400">Institutional Knowledge & Best Practices</p>
            </div>
          </div>
          <button className="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg text-sm font-medium">+ Add Lesson</button>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-6 space-y-6">
        <div className="grid grid-cols-3 gap-4">
          <div className="glass rounded-xl p-4 text-center"><p className="text-3xl font-bold text-white">{stats.total}</p><p className="text-sm text-slate-400">Total Lessons</p></div>
          <div className="glass rounded-xl p-4 text-center cursor-pointer hover:border-green-500/50" onClick={() => setFilter('win')}><p className="text-3xl font-bold text-green-400">{stats.wins}</p><p className="text-sm text-slate-400">From Wins</p></div>
          <div className="glass rounded-xl p-4 text-center cursor-pointer hover:border-red-500/50" onClick={() => setFilter('loss')}><p className="text-3xl font-bold text-red-400">{stats.losses}</p><p className="text-sm text-slate-400">From Losses</p></div>
        </div>

        <div className="flex gap-2">
          {['all', 'win', 'loss'].map(f => (
            <button key={f} onClick={() => setFilter(f)} className={`px-3 py-1.5 rounded-lg text-sm ${filter === f ? 'bg-cyan-600 text-white' : 'bg-slate-800 text-slate-400'}`}>
              {f === 'all' ? 'All' : f === 'win' ? 'Wins' : 'Losses'}
            </button>
          ))}
        </div>

        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          {filtered.map(l => <LessonCard key={l.id} lesson={l} />)}
        </div>
      </main>

      <footer className="border-t border-slate-800 mt-12">
        <div className="max-w-7xl mx-auto px-4 py-4 text-center text-xs text-slate-500">Mission Meets Tech © 2026 | MissionPulse v3.0 | Lessons Learned Module</div>
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
