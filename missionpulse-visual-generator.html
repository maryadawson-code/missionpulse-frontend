    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
    .glass-strong { background: rgba(0,229,250,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.2); }
    .glow-text { text-shadow: 0 0 30px rgba(0,229,250,0.5); }
    .glow-box { box-shadow: 0 0 40px rgba(0,229,250,0.15); }
    .visual-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,229,250,0.2); }
    .mermaid { background: white; border-radius: 8px; padding: 20px; }
    .template-btn:hover { transform: scale(1.02); }
    .template-btn.selected { border-color: #00E5FA; background: rgba(0,229,250,0.1); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
    ::-webkit-scrollbar-thumb { background: #00E5FA; border-radius: 3px; }
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(0,229,250,0.3); } 50% { box-shadow: 0 0 40px rgba(0,229,250,0.6); } }
    .generating { animation: pulse-glow 1.5s ease-in-out infinite; }
  </style>
</head>

    title Development Sprint Schedule
    dateFormat  YYYY-MM-DD
    section Sprint 1

      selectedTemplate: null,

      currentVisual: null,
      error: null,

    // Initialize
    async function init() {
      mermaid.initialize({ 
        startOnLoad: false, 
        theme: 'base',
        themeVariables: {
          primaryColor: '#00E5FA',
          primaryTextColor: '#000',
          primaryBorderColor: '#00E5FA',
          lineColor: '#64748b',
          secondaryColor: '#10B981',
          tertiaryColor: '#8B5CF6'
        }
      });

      const { data: { session } } = await supabase.auth.getSession();
      if (session?.user) {
        state.user = session.user;
        state.isOnline = true;
        await loadUserProfile();
        await loadGallery();
      }
      
      render();
    }

    async function loadUserProfile() {
      try {
        const { data } = await supabase
          .from('profiles')
          .select('role')
          .eq('id', state.user.id)
          .single();
        if (data) state.userRole = data.role;
      } catch (e) {
        console.log('Profile load error');
      }
    }

    async function loadGallery() {
      try {
        const { data } = await supabase
          .from('generated_visuals')
          .select('*')
          .order('created_at', { ascending: false })
          .limit(20);
        if (data && data.length > 0) state.gallery = data;
      } catch (e) {
        console.log('Using demo gallery');
      }
    }

    function selectType(typeId) {
      state.selectedType = typeId;
      state.selectedTemplate = null;
      state.generatedMermaid = '';
      
      // Auto-load template if available
      if (TEMPLATES[typeId]) {
        state.selectedTemplate = TEMPLATES[typeId];
        state.prompt = TEMPLATES[typeId].prompt;
      }
      render();
    }

    function selectTemplate(typeId) {
      if (TEMPLATES[typeId]) {
        state.selectedTemplate = TEMPLATES[typeId];
        state.prompt = TEMPLATES[typeId].prompt;
        state.generatedMermaid = TEMPLATES[typeId].mermaid;
        render();
        renderMermaid();
      }
    }

    function updatePrompt(value) {
      state.prompt = value;
    }

    async function generateVisual() {
      if (!state.prompt.trim()) return;
      
      state.isGenerating = true;
      state.error = null;
      render();

      // Simulate AI generation (in production, this would call Claude/GPT API)
      await new Promise(resolve => setTimeout(resolve, 2000));

      // For demo, use template or generate based on type
      if (state.selectedTemplate?.mermaid) {
        state.generatedMermaid = state.selectedTemplate.mermaid;
      } else {
        // Generate a basic diagram based on type
        state.generatedMermaid = generateBasicDiagram(state.selectedType, state.prompt);
      }

      state.isGenerating = false;
      render();
      
      // Render the mermaid diagram
      setTimeout(() => renderMermaid(), 100);
    }

    function generateBasicDiagram(type, prompt) {
      // Simple diagram generation based on type
      const diagrams = {
        org_chart: `graph TD
    A[Leadership] --> B[Team Lead 1]
    A --> C[Team Lead 2]
    B --> D[Member 1]
    B --> E[Member 2]
    C --> F[Member 3]
    C --> G[Member 4]

    UI[User Interface] --> API[API Layer]
    API --> SVC[Services]
    SVC --> DB[(Database)]
    style UI fill:#00E5FA,stroke:#fff,color:#000
    style DB fill:#10B981,stroke:#fff,color:#fff`,
        process_flow: `graph LR
    A[Start] --> B[Step 1]
    B --> C{Decision}
    C -->|Yes| D[Action A]
    C -->|No| E[Action B]
    D --> F[End]
    E --> F
    style A fill:#00E5FA,stroke:#fff,color:#000
    style F fill:#10B981,stroke:#fff,color:#fff`,
        custom: `graph TD
    A[Your Idea] --> B[Concept]
    B --> C[Design]
    C --> D[Implementation]
    style A fill:#00E5FA,stroke:#fff,color:#000`
      };
      return diagrams[type] || diagrams.custom;
    }

    async function renderMermaid() {
      const container = document.getElementById('mermaid-output');
      if (!container || !state.generatedMermaid) return;

      try {
        container.innerHTML = '';
        const { svg } = await mermaid.render('mermaid-diagram', state.generatedMermaid);
        container.innerHTML = svg;
      } catch (e) {
        container.innerHTML = `<div class="text-red-400 p-4">Error rendering diagram: ${e.message}</div>`;
      }
    }

    async function saveVisual() {
      if (!state.generatedMermaid) return;

      const visual = {
        title: state.prompt.substring(0, 50) + '...',
        visual_type: state.selectedType || 'custom',
        prompt: state.prompt,
        mermaid_code: state.generatedMermaid,
        status: 'complete',
        created_at: new Date().toISOString()

      if (state.isOnline) {
        try {
          await supabase.from('generated_visuals').insert(visual);
        } catch (e) {
          console.log('Save error:', e);
        }
      }

      state.gallery.unshift({ id: 'new-' + Date.now(), ...visual });
      state.view = 'gallery';
      render();
    }

    function downloadSVG() {
      const svg = document.querySelector('#mermaid-output svg');
      if (!svg) return;

      const svgData = new XMLSerializer().serializeToString(svg);
      const blob = new Blob([svgData], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      
      const a = document.createElement('a');
      a.href = url;
      a.download = `missionpulse-diagram-${Date.now()}.svg`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function downloadPNG() {
      const svg = document.querySelector('#mermaid-output svg');
      if (!svg) return;

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const svgData = new XMLSerializer().serializeToString(svg);
      const img = new Image();
      
      img.onload = () => {
        canvas.width = img.width * 2;
        canvas.height = img.height * 2;
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        
        const a = document.createElement('a');
        a.href = canvas.toDataURL('image/png');
        a.download = `missionpulse-diagram-${Date.now()}.png`;
        a.click();
      };
      
      img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
    }

                    : 'bg-gradient-to-r from-cyan-500 to-emerald-500 text-white hover:opacity-90'
                }" ${state.isGenerating ? 'disabled' : ''}>
                ${state.isGenerating ? '⚙️ Generating...' : '✨ Generate Visual'}
              </button>
            </div>
            
            ${state.generatedMermaid ? `
              <div class="glass rounded-2xl p-4">
                <div class="flex items-center justify-between mb-3">
                  <h3 class="text-sm font-semibold text-slate-300">Mermaid Code</h3>
                  <button onclick="copyMermaidCode()" class="text-xs text-cyan-400 hover:text-cyan-300">
                    📋 Copy
                  </button>
                </div>
                <pre class="bg-slate-900 rounded-lg p-3 text-xs text-slate-300 overflow-x-auto max-h-40">${state.generatedMermaid}</pre>
              </div>
            ` : ''}
          </div>
          
          <!-- Right: Preview -->
          <div class="space-y-4">
            <div class="glass rounded-2xl p-4">
              <div class="flex items-center justify-between mb-3">
                <h3 class="text-sm font-semibold text-slate-300">3. Preview</h3>
                ${state.generatedMermaid ? `
                  <div class="flex gap-2">
                    <button onclick="downloadSVG()" class="px-3 py-1 text-xs bg-slate-700 text-slate-300 rounded hover:bg-slate-600">
                      SVG
                    </button>
                    <button onclick="downloadPNG()" class="px-3 py-1 text-xs bg-slate-700 text-slate-300 rounded hover:bg-slate-600">
                      PNG
                    </button>
                  </div>
                ` : ''}
              </div>
              
              <div id="mermaid-output" class="bg-white rounded-xl p-4 min-h-[300px] flex items-center justify-center">
                ${state.generatedMermaid ? '' : `
                  <div class="text-center text-slate-400">
                    <div class="text-4xl mb-2">🎨</div>
                    <p class="text-sm">Your diagram will appear here</p>
                  </div>
                `}
              </div>
              
              ${state.generatedMermaid ? `
                <button onclick="saveVisual()" 
                  class="w-full mt-4 py-2.5 bg-emerald-500/20 text-emerald-400 rounded-lg font-medium hover:bg-emerald-500/30 transition">
                  💾 Save to Gallery
                </button>
              ` : ''}
            </div>
          </div>
        </div>
      `;
    }

    function renderGalleryView() {
      return `
        <div class="space-y-6">
          <div class="flex items-center justify-between">
            <h2 class="text-xl font-bold text-white">🖼️ My Visual Gallery</h2>
            <button onclick="setView('create')" class="px-4 py-2 bg-cyan-500/20 text-cyan-400 rounded-lg text-sm hover:bg-cyan-500/30 transition">
              + Create New
            </button>
          </div>
          
          <div class="grid grid-cols-4 gap-4">
            ${state.gallery.map(item => {
              const type = VISUAL_TYPES.find(t => t.id === item.visual_type || t.id === item.type);
              return `
                <div onclick="viewGalleryItem(${JSON.stringify(item).replace(/"/g, '&quot;')})" 
                  class="visual-card glass rounded-xl p-4 cursor-pointer transition">
                  <div class="flex items-center gap-2 mb-3">
                    <span class="text-xl">${type?.icon || '📊'}</span>
                    <span class="text-xs px-2 py-0.5 rounded-full" style="background: ${type?.color}20; color: ${type?.color}">
                      ${type?.name || 'Diagram'}
                    </span>
                  </div>
                  <h4 class="text-white font-medium text-sm truncate">${item.title}</h4>
                  <p class="text-xs text-slate-400 mt-1">${new Date(item.created_at).toLocaleDateString()}</p>
                  <div class="mt-3 h-24 bg-slate-800/50 rounded-lg flex items-center justify-center">
                    <span class="text-3xl opacity-50">${type?.icon || '📊'}</span>
                  </div>
                </div>
              `;
            }).join('')}
            
            ${state.gallery.length === 0 ? `
              <div class="col-span-4 text-center py-12">
                <div class="text-4xl mb-3">🎨</div>
                <p class="text-white">No visuals yet</p>
                <p class="text-sm text-slate-400 mt-1">Create your first diagram to get started</p>
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }

    function renderEditView() {
      const type = VISUAL_TYPES.find(t => t.id === state.selectedType);
      
      return `
        <div class="space-y-6">
          <div class="flex items-center gap-4">
            <button onclick="setView('gallery')" class="p-2 text-slate-400 hover:text-white">
              ← Back
            </button>
            <div>
              <h2 class="text-xl font-bold text-white flex items-center gap-2">
                ${type?.icon || '📊'} ${state.currentVisual?.title || 'Visual'}
              </h2>
              <p class="text-sm text-slate-400">${type?.name || 'Diagram'}</p>
            </div>
          </div>
          
          <div class="grid grid-cols-2 gap-6">
            <!-- Code Editor -->
            <div class="glass rounded-2xl p-4">
              <div class="flex items-center justify-between mb-3">
                <h3 class="font-semibold text-white">Mermaid Code</h3>
                <div class="flex gap-2">
                  <button onclick="copyMermaidCode()" class="px-3 py-1 text-xs bg-slate-700 text-slate-300 rounded hover:bg-slate-600">
                    📋 Copy
                  </button>
                  <button onclick="renderMermaid()" class="px-3 py-1 text-xs bg-cyan-500/20 text-cyan-400 rounded hover:bg-cyan-500/30">
                    🔄 Refresh
                  </button>
                </div>
              </div>
              <textarea id="mermaid-editor" 
                class="w-full h-[400px] bg-slate-900 border border-slate-700 rounded-lg p-4 text-sm text-slate-300 font-mono resize-none focus:border-cyan-500 outline-none"
              >${state.generatedMermaid}</textarea>
            </div>
            
            <!-- Preview -->
            <div class="glass rounded-2xl p-4">
              <div class="flex items-center justify-between mb-3">
                <h3 class="font-semibold text-white">Preview</h3>
                <div class="flex gap-2">
                  <button onclick="downloadSVG()" class="px-3 py-1 text-xs bg-slate-700 text-slate-300 rounded hover:bg-slate-600">
                    ⬇️ SVG
                  </button>
                  <button onclick="downloadPNG()" class="px-3 py-1 text-xs bg-slate-700 text-slate-300 rounded hover:bg-slate-600">
                    ⬇️ PNG
                  </button>
                </div>
              </div>
              <div id="mermaid-output" class="bg-white rounded-xl p-4 min-h-[400px] overflow-auto">
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderFooter() {
      return `
        <footer class="fixed bottom-0 left-0 right-0 glass-strong border-t border-cyan-500/20 py-3">
          <div class="max-w-7xl mx-auto px-4 flex items-center justify-between text-xs">
            <span class="text-slate-400">
              <span class="text-amber-400">⚠️ AI GENERATED</span> - REQUIRES HUMAN REVIEW
            </span>
            <span class="text-slate-500">
              MissionPulse v2.0 • Sprint 31 • © 2026 Mission Meets Tech
            </span>
          </div>
        </footer>
      `;
    }

    function attachEventListeners() {
      const promptInput = document.getElementById('prompt-input');
      if (promptInput) {
        promptInput.addEventListener('input', (e) => updatePrompt(e.target.value));
      }

      const mermaidEditor = document.getElementById('mermaid-editor');
      if (mermaidEditor) {
        mermaidEditor.addEventListener('input', (e) => {
          state.generatedMermaid = e.target.value;
        });
      }
    }

    // Global functions
    window.setView = (view) => { 
      state.view = view; 
      if (view === 'create') {
        state.selectedType = null;
        state.selectedTemplate = null;
        state.prompt = '';
        state.generatedMermaid = '';
      }
      render(); 
    };
    window.selectType = selectType;
    window.selectTemplate = selectTemplate;
    window.generateVisual = generateVisual;
    window.saveVisual = saveVisual;
    window.downloadSVG = downloadSVG;
    window.downloadPNG = downloadPNG;
    window.copyMermaidCode = copyMermaidCode;
    window.viewGalleryItem = viewGalleryItem;
    window.renderMermaid = () => {
      const editor = document.getElementById('mermaid-editor');
      if (editor) state.generatedMermaid = editor.value;
      renderMermaid();
    };

    // Initialize
    init();
  </script>
</body>
</html>
