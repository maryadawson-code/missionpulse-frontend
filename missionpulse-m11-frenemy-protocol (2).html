<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse M11 - Frenemy Protocol | Partner Access Control</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(0,229,250,0.3); } 50% { box-shadow: 0 0 40px rgba(0,229,250,0.5); } }
    @keyframes warningPulse { 0%, 100% { box-shadow: 0 0 20px rgba(239,68,68,0.3); } 50% { box-shadow: 0 0 40px rgba(239,68,68,0.6); } }
    
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-spin { animation: spin 1s linear infinite; }
    .animate-slideIn { animation: slideIn 0.4s ease-out; }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
    .animate-glow { animation: glow 2s ease-in-out infinite; }
    .animate-warningPulse { animation: warningPulse 2s ease-in-out infinite; }
    
    .glass-card {
      background: linear-gradient(135deg, rgba(0,20,40,0.9) 0%, rgba(0,10,30,0.95) 100%);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0,229,250,0.15);
    }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(0,20,40,0.5); }
    ::-webkit-scrollbar-thumb { background: rgba(0,229,250,0.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,229,250,0.5); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, createContext, useContext, useCallback } = React;

    // ============================================================================
    // PRODUCTION CONFIG
    // ============================================================================
    const CONFIG = {
      API_BASE: 'https://missionpulse-api.onrender.com',
      DASHBOARD_URL: 'https://missionpulse-frontend.netlify.app/',
      MODULE_ID: 'M11',
      MODULE_NAME: 'Frenemy Protocol',
      VERSION: '12.0.1',
      ACCESS_LEVEL: 'PRIVATE',
      FEATURES: {
        API_ENABLED: true,
        DEMO_MODE: true
      }
    };

    // ============================================================================
    // TOAST CONTEXT & PROVIDER
    // ============================================================================
    const ToastContext = createContext(null);

    const ToastProvider = ({ children }) => {
      const [toasts, setToasts] = useState([]);
      
      const addToast = useCallback((message, type = 'info', duration = 4000) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), duration);
      }, []);

      return (
        <ToastContext.Provider value={{ addToast }}>
          {children}
          <div className="fixed top-4 right-4 z-50 space-y-2">
            {toasts.map(toast => (
              <div 
                key={toast.id}
                className={`px-4 py-3 rounded-lg shadow-lg animate-slideIn flex items-center gap-2 ${
                  toast.type === 'success' ? 'bg-emerald-500/90 text-white' :
                  toast.type === 'error' ? 'bg-red-500/90 text-white' :
                  toast.type === 'warning' ? 'bg-amber-500/90 text-white' :
                  'bg-slate-700/90 text-white'
                }`}
              >
                <span className="text-sm font-medium">{toast.message}</span>
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    };

    const useToast = () => {
      const context = useContext(ToastContext);
      if (!context) throw new Error('useToast must be used within ToastProvider');
      return context;
    };

    // ============================================================================
    // ERROR BOUNDARY
    // ============================================================================
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }

      componentDidCatch(error, errorInfo) {
        console.error('ErrorBoundary caught:', error, errorInfo);
      }

      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen bg-[#00050F] flex items-center justify-center p-6">
              <div className="bg-slate-800/50 border border-red-500/30 rounded-xl p-8 max-w-md text-center">
                <div className="w-16 h-16 bg-red-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                  <Icon name="alert" className="w-8 h-8 text-red-400" />
                </div>
                <h2 className="text-xl font-bold text-white mb-2">Something went wrong</h2>
                <p className="text-slate-400 mb-4 text-sm">
                  {CONFIG.MODULE_NAME} encountered an error. Please try refreshing the page.
                </p>
                <button
                  onClick={() => window.location.reload()}
                  className="px-4 py-2 bg-cyan-500 text-white rounded-lg hover:bg-cyan-400 transition-colors"
                >
                  Refresh Page
                </button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // ============================================================================
    // LOADING SPINNER
    // ============================================================================
    const LoadingSpinner = ({ size = 'md', message = 'Loading...' }) => {
      const sizes = { sm: 'w-4 h-4', md: 'w-8 h-8', lg: 'w-12 h-12' };
      return (
        <div className="flex flex-col items-center justify-center gap-3">
          <div className={`${sizes[size]} border-2 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin`} />
          {message && <span className="text-slate-400 text-sm">{message}</span>}
        </div>
      );
    };

    // ============================================================================
    // CONNECTION STATUS
    // ============================================================================
    const ConnectionStatus = ({ isConnected }) => (
      <div className="flex items-center gap-2">
        <div className={`w-2 h-2 rounded-full ${isConnected ? 'bg-emerald-400' : 'bg-red-400'} animate-pulse`} />
        <span className="text-xs text-slate-500">{isConnected ? 'Connected' : 'Offline'}</span>
      </div>
    );

    // ============================================================================
    // PRIVATE BADGE (Red Lock for competitor intelligence)
    // ============================================================================
    const PrivateBadge = () => (
      <div className="flex items-center gap-2 px-3 py-1.5 bg-red-500/20 border border-red-500/40 rounded-lg animate-warningPulse">
        <Icon name="lock" className="w-4 h-4 text-red-400" />
        <span className="text-red-400 text-xs font-bold uppercase tracking-wide">Private</span>
      </div>
    );

    // ============================================================================
    // ICONS
    // ============================================================================
    const Icons = {
      shield: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
      lock: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>,
      users: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
      alert: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
      x: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>,
      eye: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>,
      eyeOff: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>,
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
      handshake: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
      target: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><circle cx="12" cy="12" r="6" strokeWidth={2}/><circle cx="12" cy="12" r="2" strokeWidth={2}/></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    // ============================================================================
    // HOME BUTTON
    // ============================================================================
    const HomeButton = () => (
      <button
        onClick={() => window.location.href = CONFIG.DASHBOARD_URL}
        className="flex items-center gap-2 px-3 py-1.5 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg transition-colors group"
        title="Return to Dashboard"
      >
        <Icon name="home" className="w-4 h-4 text-slate-400 group-hover:text-cyan-400" />
        <span className="text-sm text-slate-400 group-hover:text-white">Dashboard</span>
      </button>
    );

    // ============================================================================
    // UI COMPONENTS
    // ============================================================================
    const Card = ({ children, className = '', glow = false }) => (
      <div className={`glass-card rounded-xl ${glow ? 'animate-glow' : ''} ${className}`}>
        {children}
      </div>
    );

    const Button = ({ children, variant = 'primary', size = 'md', icon, className = '', ...props }) => {
      const variants = {
        primary: 'bg-gradient-to-r from-cyan-500 to-teal-500 text-white hover:from-cyan-400 hover:to-teal-400',
        danger: 'bg-red-500 text-white hover:bg-red-400',
        success: 'bg-emerald-500 text-white hover:bg-emerald-400',
        ghost: 'bg-transparent text-slate-400 hover:text-white hover:bg-slate-700/50',
      };
      const sizes = { sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2 text-sm', lg: 'px-6 py-3 text-base' };
      return (
        <button className={`${variants[variant]} ${sizes[size]} rounded-lg font-semibold transition-all flex items-center justify-center gap-2 ${className}`} {...props}>
          {icon && <Icon name={icon} className="w-4 h-4" />}
          {children}
        </button>
      );
    };

    const Badge = ({ children, variant = 'default' }) => {
      const variants = {
        default: 'bg-slate-700 text-slate-300',
        success: 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30',
        warning: 'bg-amber-500/20 text-amber-400 border border-amber-500/30',
        danger: 'bg-red-500/20 text-red-400 border border-red-500/30',
      };
      return <span className={`${variants[variant]} px-2 py-1 text-xs rounded-full font-medium`}>{children}</span>;
    };

    // ============================================================================
    // PARTNER DATA
    // ============================================================================
    const PARTNERS = [
      { id: 1, name: 'TechCore Solutions', type: 'Teaming', status: 'active', accessLevel: 'full', competitorRisk: 'low' },
      { id: 2, name: 'DataSync Federal', type: 'Subcontractor', status: 'active', accessLevel: 'limited', competitorRisk: 'medium' },
      { id: 3, name: 'CloudFirst Gov', type: 'Teaming', status: 'pending', accessLevel: 'none', competitorRisk: 'high' },
      { id: 4, name: 'SecureNet Inc', type: 'Subcontractor', status: 'active', accessLevel: 'full', competitorRisk: 'low' },
      { id: 5, name: 'InfoBridge Systems', type: 'Consultant', status: 'inactive', accessLevel: 'none', competitorRisk: 'medium' },
    ];

    // ============================================================================
    // GLOBAL FOOTER
    // ============================================================================
    const GlobalFooter = () => (
      <footer className="fixed bottom-0 left-0 right-0 bg-slate-900/95 border-t border-slate-700/50 px-6 py-2 backdrop-blur-sm z-40">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-4">
            <span className="text-xs text-slate-500">
              MissionPulse {CONFIG.MODULE_ID} • {CONFIG.MODULE_NAME} v{CONFIG.VERSION}
            </span>
            <ConnectionStatus isConnected={true} />
          </div>
          <span className="text-xs text-amber-400 font-medium px-2 py-1 bg-amber-500/10 rounded border border-amber-500/20">
            ⚠️ AI GENERATED - REQUIRES HUMAN REVIEW
          </span>
        </div>
      </footer>
    );

    // ============================================================================
    // MAIN COMPONENT
    // ============================================================================
    const FrenemyProtocol = () => {
      const [partners, setPartners] = useState(PARTNERS);
      const [selectedPartner, setSelectedPartner] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const { addToast } = useToast();

      useEffect(() => {
        const timer = setTimeout(() => {
          setIsLoading(false);
          addToast('Partner access data loaded', 'success');
        }, 600);
        return () => clearTimeout(timer);
      }, []);

      const handleAccessToggle = (partnerId, newAccess) => {
        setPartners(prev => prev.map(p => 
          p.id === partnerId ? { ...p, accessLevel: newAccess } : p
        ));
        addToast(`Access level updated`, 'success');
      };

      const getRiskColor = (risk) => {
        return risk === 'high' ? 'text-red-400' : risk === 'medium' ? 'text-amber-400' : 'text-emerald-400';
      };

      const getAccessIcon = (level) => {
        return level === 'full' ? 'eye' : level === 'limited' ? 'eyeOff' : 'lock';
      };

      if (isLoading) {
        return (
          <div className="min-h-screen bg-[#00050F] flex items-center justify-center">
            <LoadingSpinner size="lg" message="Loading partner access data..." />
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#00050F] pb-16">
          {/* Header */}
          <header className="bg-slate-900/80 border-b border-slate-700/50 px-6 py-4">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-4">
                <HomeButton />
                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-red-500 to-orange-500 flex items-center justify-center">
                  <Icon name="handshake" className="w-6 h-6 text-white" />
                </div>
                <div>
                  <div className="flex items-center gap-3">
                    <h1 className="text-xl font-bold text-white">Frenemy Protocol</h1>
                    <PrivateBadge />
                  </div>
                  <p className="text-sm text-slate-400">Partner access control & competitor risk management</p>
                </div>
              </div>

              <div className="flex items-center gap-3">
                <div className="text-right">
                  <div className="text-xs text-slate-500">Active Partners</div>
                  <div className="text-lg font-bold text-white">{partners.filter(p => p.status === 'active').length}</div>
                </div>
              </div>
            </div>
          </header>

          {/* Security Warning */}
          <div className="bg-red-500/10 border-b border-red-500/20 px-6 py-3">
            <div className="flex items-center gap-3">
              <Icon name="alert" className="w-5 h-5 text-red-400" />
              <span className="text-red-400 text-sm">
                <strong>PRIVATE DATA:</strong> This module contains competitor intelligence and teaming partner assessments. 
                Access restricted to Capture Manager and above roles only.
              </span>
            </div>
          </div>

          <div className="max-w-6xl mx-auto px-6 py-6">
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              {/* Partner List */}
              <div className="lg:col-span-2 space-y-4">
                <h2 className="text-lg font-semibold text-white flex items-center gap-2">
                  <Icon name="users" className="w-5 h-5 text-cyan-400" />
                  Partner Access Matrix
                </h2>

                {partners.map((partner, index) => (
                  <Card 
                    key={partner.id}
                    className={`p-4 cursor-pointer transition-all hover:border-cyan-500/50 animate-fadeIn ${
                      selectedPartner?.id === partner.id ? 'border-cyan-500/50' : ''
                    }`}
                    style={{ animationDelay: `${index * 50}ms` }}
                    onClick={() => setSelectedPartner(partner)}
                  >
                    <div className="flex items-center justify-between">
                      <div className="flex items-center gap-4">
                        <div className={`w-12 h-12 rounded-lg flex items-center justify-center ${
                          partner.status === 'active' ? 'bg-emerald-500/20' : 
                          partner.status === 'pending' ? 'bg-amber-500/20' : 'bg-slate-700'
                        }`}>
                          <Icon name="handshake" className={`w-6 h-6 ${
                            partner.status === 'active' ? 'text-emerald-400' : 
                            partner.status === 'pending' ? 'text-amber-400' : 'text-slate-500'
                          }`} />
                        </div>
                        <div>
                          <h3 className="text-white font-semibold">{partner.name}</h3>
                          <div className="flex items-center gap-2 mt-1">
                            <Badge variant={partner.status === 'active' ? 'success' : partner.status === 'pending' ? 'warning' : 'default'}>
                              {partner.status}
                            </Badge>
                            <span className="text-xs text-slate-500">{partner.type}</span>
                          </div>
                        </div>
                      </div>

                      <div className="text-right">
                        <div className="flex items-center gap-2 mb-1">
                          <Icon name={getAccessIcon(partner.accessLevel)} className="w-4 h-4 text-slate-400" />
                          <span className="text-sm text-slate-300 capitalize">{partner.accessLevel} Access</span>
                        </div>
                        <div className={`text-xs ${getRiskColor(partner.competitorRisk)}`}>
                          Competitor Risk: {partner.competitorRisk}
                        </div>
                      </div>
                    </div>
                  </Card>
                ))}
              </div>

              {/* Sidebar */}
              <div className="space-y-4">
                {/* Access Controls */}
                <Card className="p-4">
                  <h3 className="font-semibold text-white mb-4 flex items-center gap-2">
                    <Icon name="lock" className="w-5 h-5 text-cyan-400" />
                    Access Controls
                  </h3>
                  {selectedPartner ? (
                    <div className="space-y-3">
                      <div className="p-3 bg-slate-800/50 rounded-lg">
                        <div className="text-sm text-slate-400 mb-1">Selected Partner</div>
                        <div className="text-white font-semibold">{selectedPartner.name}</div>
                      </div>
                      <div className="space-y-2">
                        {['full', 'limited', 'none'].map(level => (
                          <button
                            key={level}
                            onClick={() => handleAccessToggle(selectedPartner.id, level)}
                            className={`w-full p-2 rounded-lg text-sm font-medium transition-all ${
                              selectedPartner.accessLevel === level
                                ? 'bg-cyan-500 text-white'
                                : 'bg-slate-800 text-slate-400 hover:bg-slate-700'
                            }`}
                          >
                            {level === 'full' ? '👁️ Full Access' : level === 'limited' ? '🔒 Limited Access' : '🚫 No Access'}
                          </button>
                        ))}
                      </div>
                    </div>
                  ) : (
                    <p className="text-slate-500 text-sm">Select a partner to manage access</p>
                  )}
                </Card>

                {/* Risk Summary */}
                <Card className="p-4">
                  <h3 className="font-semibold text-white mb-4 flex items-center gap-2">
                    <Icon name="target" className="w-5 h-5 text-red-400" />
                    Competitor Risk Summary
                  </h3>
                  <div className="space-y-2">
                    <div className="flex justify-between items-center p-2 bg-red-500/10 rounded-lg">
                      <span className="text-red-400 text-sm">High Risk</span>
                      <span className="text-red-400 font-bold">{partners.filter(p => p.competitorRisk === 'high').length}</span>
                    </div>
                    <div className="flex justify-between items-center p-2 bg-amber-500/10 rounded-lg">
                      <span className="text-amber-400 text-sm">Medium Risk</span>
                      <span className="text-amber-400 font-bold">{partners.filter(p => p.competitorRisk === 'medium').length}</span>
                    </div>
                    <div className="flex justify-between items-center p-2 bg-emerald-500/10 rounded-lg">
                      <span className="text-emerald-400 text-sm">Low Risk</span>
                      <span className="text-emerald-400 font-bold">{partners.filter(p => p.competitorRisk === 'low').length}</span>
                    </div>
                  </div>
                </Card>
              </div>
            </div>
          </div>

          <GlobalFooter />
        </div>
      );
    };

    // ============================================================================
    // APP WITH PROVIDERS
    // ============================================================================
    const App = () => (
      <ErrorBoundary>
        <ToastProvider>
          <FrenemyProtocol />
        </ToastProvider>
      </ErrorBoundary>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
