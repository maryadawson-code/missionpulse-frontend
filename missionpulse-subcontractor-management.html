<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subcontractor Management | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
        .glass-card:hover { border-color: rgba(0,229,250,0.3); }
        .gradient-border { background: linear-gradient(135deg, rgba(0,229,250,0.2), rgba(16,185,129,0.2)); padding: 1px; border-radius: 12px; }
        .gradient-border-inner { background: rgba(0,5,15,0.9); border-radius: 11px; }
        .cyan-glow { box-shadow: 0 0 30px rgba(0,229,250,0.15); }
        .sub-card { transition: all 0.3s ease; }
        .sub-card:hover { transform: translateY(-4px); box-shadow: 0 10px 40px rgba(0,229,250,0.1); }
    </style>
</head>
<body class="text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const supabaseUrl = 'https://djuviwarqdvlbgcfuupa.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0NDQ0NjUsImV4cCI6MjA4NTAyMDQ2NX0.3s8ufDDN2aWfkW0RBsAyJyacb2tjB7M550WSFIohHcA';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const DEMO_SUBCONTRACTORS = [
            { id: '1', name: 'TechVantage Solutions', cage_code: '7ABC1', uei_number: 'ABC123DEF456', city: 'Reston', state: 'VA', primary_contact: 'Jennifer Walsh', contact_email: 'jwalsh@techvantage.com', contact_phone: '703-555-0142', naics_codes: ['541512', '541519'], set_aside_status: ['SDVOSB', '8(a)'], capabilities: 'Cloud migration, DevSecOps, Agile development', past_performance_rating: 'exceptional', relationship_status: 'preferred', nda_signed: true, teaming_agreement: true, ta_expiration: '2027-06-30' },
            { id: '2', name: 'HealthIT Partners', cage_code: '8XYZ2', uei_number: 'XYZ789GHI012', city: 'Baltimore', state: 'MD', primary_contact: 'Marcus Johnson', contact_email: 'mjohnson@healthitpartners.com', contact_phone: '410-555-0198', naics_codes: ['541511', '518210'], set_aside_status: ['HUBZone'], capabilities: 'EHR implementation, HIPAA compliance, healthcare analytics', past_performance_rating: 'very_good', relationship_status: 'active', nda_signed: true, teaming_agreement: false, ta_expiration: null },
            { id: '3', name: 'Federal Systems Inc', cage_code: '5DEF3', uei_number: 'DEF456JKL789', city: 'Arlington', state: 'VA', primary_contact: 'Sarah Chen', contact_email: 'schen@federalsystems.com', contact_phone: '571-555-0234', naics_codes: ['541512', '541330'], set_aside_status: ['WOSB'], capabilities: 'Systems integration, cybersecurity, program management', past_performance_rating: 'exceptional', relationship_status: 'preferred', nda_signed: true, teaming_agreement: true, ta_expiration: '2026-12-31' },
            { id: '4', name: 'DataBridge Analytics', cage_code: '9GHI4', uei_number: 'GHI012MNO345', city: 'Herndon', state: 'VA', primary_contact: 'David Kim', contact_email: 'dkim@databridge.com', contact_phone: '703-555-0321', naics_codes: ['518210', '541519'], set_aside_status: [], capabilities: 'Data analytics, AI/ML, business intelligence', past_performance_rating: 'very_good', relationship_status: 'active', nda_signed: true, teaming_agreement: false, ta_expiration: null },
            { id: '5', name: 'SecureGov Solutions', cage_code: '2JKL5', uei_number: 'JKL345PQR678', city: 'McLean', state: 'VA', primary_contact: 'Michael Torres', contact_email: 'mtorres@securegov.com', contact_phone: '703-555-0456', naics_codes: ['541512', '561621'], set_aside_status: ['SDVOSB'], capabilities: 'Zero trust architecture, FedRAMP, CMMC compliance', past_performance_rating: 'exceptional', relationship_status: 'preferred', nda_signed: true, teaming_agreement: true, ta_expiration: '2027-03-15' }
        ];

        const DEMO_ASSIGNMENTS = [
            { id: '1', subcontractor_id: '1', subcontractor_name: 'TechVantage Solutions', opportunity_title: 'DHA EHR Modernization', role: 'Cloud Infrastructure Lead', work_share_percent: 25, estimated_value: 12500000, labor_categories: ['Cloud Architect', 'DevOps Engineer'], status: 'committed' },
            { id: '2', subcontractor_id: '3', subcontractor_name: 'Federal Systems Inc', opportunity_title: 'DHA EHR Modernization', role: 'Cybersecurity Support', work_share_percent: 15, estimated_value: 7500000, labor_categories: ['Security Engineer', 'ISSO'], status: 'committed' },
            { id: '3', subcontractor_id: '2', subcontractor_name: 'HealthIT Partners', opportunity_title: 'VA Claims Processing', role: 'EHR Integration', work_share_percent: 20, estimated_value: 4000000, labor_categories: ['EHR Analyst', 'Integration Developer'], status: 'negotiating' },
            { id: '4', subcontractor_id: '4', subcontractor_name: 'DataBridge Analytics', opportunity_title: 'CMS Data Analytics', role: 'Analytics Platform Development', work_share_percent: 30, estimated_value: 9000000, labor_categories: ['Data Scientist', 'ML Engineer'], status: 'proposed' },
            { id: '5', subcontractor_id: '5', subcontractor_name: 'SecureGov Solutions', opportunity_title: 'IHS Telehealth Platform', role: 'Security & Compliance', work_share_percent: 10, estimated_value: 2000000, labor_categories: ['Security Analyst', 'Compliance Specialist'], status: 'committed' }
        ];

        function SubcontractorApp() {
            const [subcontractors, setSubcontractors] = useState([]);
            const [assignments, setAssignments] = useState([]);
            const [selectedSub, setSelectedSub] = useState(null);
            const [activeTab, setActiveTab] = useState('directory');
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterStatus, setFilterStatus] = useState('all');

            useEffect(() => {
                loadData();
            }, []);

            async function loadData() {
                try {
                    const { data: subData } = await supabase.from('subcontractors').select('*').order('name');
                    const { data: assignData } = await supabase.from('subcontractor_assignments').select('*').order('created_at', { ascending: false });
                    setSubcontractors(subData?.length ? subData : DEMO_SUBCONTRACTORS);
                    setAssignments(assignData?.length ? assignData : DEMO_ASSIGNMENTS);
                } catch (err) {
                    setSubcontractors(DEMO_SUBCONTRACTORS);
                    setAssignments(DEMO_ASSIGNMENTS);
                }
                setLoading(false);
            }

            const getStatusColor = (status) => {
                const colors = { 
                    preferred: 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30',
                    active: 'bg-cyan-500/20 text-cyan-400 border-cyan-500/30',
                    prospect: 'bg-yellow-500/20 text-yellow-400 border-yellow-500/30',
                    inactive: 'bg-gray-500/20 text-gray-400 border-gray-500/30',
                    blacklisted: 'bg-red-500/20 text-red-400 border-red-500/30'
                };
                return colors[status] || colors.prospect;
            };

            const getAssignmentStatusColor = (status) => {
                const colors = {
                    committed: 'bg-emerald-500/20 text-emerald-400',
                    negotiating: 'bg-yellow-500/20 text-yellow-400',
                    proposed: 'bg-cyan-500/20 text-cyan-400',
                    declined: 'bg-red-500/20 text-red-400',
                    withdrawn: 'bg-gray-500/20 text-gray-400'
                };
                return colors[status] || 'bg-gray-500/20 text-gray-400';
            };

            const getRatingColor = (rating) => {
                const colors = {
                    exceptional: 'text-emerald-400',
                    very_good: 'text-cyan-400',
                    satisfactory: 'text-yellow-400',
                    marginal: 'text-orange-400',
                    unsatisfactory: 'text-red-400',
                    not_rated: 'text-gray-400'
                };
                return colors[rating] || 'text-gray-400';
            };

            const filteredSubs = subcontractors.filter(sub => {
                const matchesSearch = sub.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    sub.capabilities?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    sub.cage_code?.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesStatus = filterStatus === 'all' || sub.relationship_status === filterStatus;
                return matchesSearch && matchesStatus;
            });

            const preferredCount = subcontractors.filter(s => s.relationship_status === 'preferred').length;
            const activeCount = subcontractors.filter(s => s.relationship_status === 'active').length;
            const totalWorkShare = assignments.filter(a => a.status === 'committed').reduce((sum, a) => sum + (a.estimated_value || 0), 0);
            const pendingAssignments = assignments.filter(a => a.status === 'proposed' || a.status === 'negotiating').length;

            const subAssignments = selectedSub ? assignments.filter(a => a.subcontractor_id === selectedSub.id) : [];

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <div className="w-16 h-16 border-4 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="text-gray-400">Loading Subcontractor Data...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-6">
                    {/* Header */}
                    <div className="flex items-center justify-between mb-8">
                        <div>
                            <div className="flex items-center gap-3 mb-2">
                                <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-emerald-500 to-cyan-600 flex items-center justify-center">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                                    </svg>
                                </div>
                                <h1 className="text-2xl font-bold">Subcontractor Management</h1>
                            </div>
                            <p className="text-gray-400">Teaming partners, subcontractors & work share tracking</p>
                        </div>
                        <button className="flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-cyan-500 to-emerald-600 rounded-lg font-medium hover:opacity-90 transition">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
                            </svg>
                            Add Subcontractor
                        </button>
                    </div>

                    {/* Stats Row */}
                    <div className="grid grid-cols-4 gap-4 mb-8">
                        <div className="glass-card rounded-xl p-4 cyan-glow">
                            <p className="text-gray-400 text-sm mb-1">Total Partners</p>
                            <p className="text-3xl font-bold text-cyan-400">{subcontractors.length}</p>
                        </div>
                        <div className="glass-card rounded-xl p-4">
                            <p className="text-gray-400 text-sm mb-1">Preferred Partners</p>
                            <p className="text-3xl font-bold text-emerald-400">{preferredCount}</p>
                        </div>
                        <div className="glass-card rounded-xl p-4">
                            <p className="text-gray-400 text-sm mb-1">Committed Value</p>
                            <p className="text-3xl font-bold text-purple-400">${(totalWorkShare / 1000000).toFixed(1)}M</p>
                        </div>
                        <div className="glass-card rounded-xl p-4">
                            <p className="text-gray-400 text-sm mb-1">Pending Assignments</p>
                            <p className="text-3xl font-bold text-yellow-400">{pendingAssignments}</p>
                        </div>
                    </div>

                    {/* Tabs */}
                    <div className="flex gap-1 mb-6 bg-white/5 p-1 rounded-lg w-fit">
                        {['directory', 'assignments', 'agreements'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 rounded-lg text-sm font-medium transition ${activeTab === tab ? 'bg-cyan-500 text-white' : 'text-gray-400 hover:text-white'}`}>
                                {tab.charAt(0).toUpperCase() + tab.slice(1)}
                            </button>
                        ))}
                    </div>

                    {activeTab === 'directory' && (
                        <>
                            {/* Filters */}
                            <div className="flex gap-4 mb-6">
                                <div className="flex-1">
                                    <input type="text" placeholder="Search by name, CAGE code, or capabilities..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-sm focus:border-cyan-500/50 focus:outline-none" />
                                </div>
                                <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} className="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-sm focus:border-cyan-500/50 focus:outline-none">
                                    <option value="all">All Statuses</option>
                                    <option value="preferred">Preferred</option>
                                    <option value="active">Active</option>
                                    <option value="prospect">Prospect</option>
                                    <option value="inactive">Inactive</option>
                                </select>
                            </div>

                            {/* Subcontractor Grid */}
                            <div className="grid grid-cols-2 gap-4">
                                {filteredSubs.map(sub => (
                                    <div key={sub.id} onClick={() => setSelectedSub(sub)} className="sub-card glass-card rounded-xl p-5 cursor-pointer">
                                        <div className="flex items-start justify-between mb-3">
                                            <div>
                                                <h3 className="font-semibold text-lg">{sub.name}</h3>
                                                <p className="text-sm text-gray-400">{sub.city}, {sub.state}</p>
                                            </div>
                                            <span className={`px-2 py-1 rounded text-xs font-medium border ${getStatusColor(sub.relationship_status)}`}>
                                                {sub.relationship_status?.replace('_', ' ')}
                                            </span>
                                        </div>

                                        <div className="flex gap-2 mb-3">
                                            {sub.set_aside_status?.map(status => (
                                                <span key={status} className="px-2 py-0.5 bg-cyan-500/20 text-cyan-400 rounded text-xs">{status}</span>
                                            ))}
                                        </div>

                                        <p className="text-sm text-gray-300 mb-3 line-clamp-2">{sub.capabilities}</p>

                                        <div className="flex items-center justify-between text-sm">
                                            <div className="flex items-center gap-4">
                                                <span className="text-gray-400">CAGE: <span className="text-white">{sub.cage_code}</span></span>
                                                <span className={getRatingColor(sub.past_performance_rating)}>
                                                    {sub.past_performance_rating?.replace('_', ' ')}
                                                </span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                {sub.nda_signed && (
                                                    <span className="px-2 py-0.5 bg-emerald-500/20 text-emerald-400 rounded text-xs">NDA</span>
                                                )}
                                                {sub.teaming_agreement && (
                                                    <span className="px-2 py-0.5 bg-purple-500/20 text-purple-400 rounded text-xs">TA</span>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </>
                    )}

                    {activeTab === 'assignments' && (
                        <div className="glass-card rounded-xl p-6">
                            <h2 className="text-lg font-semibold mb-4">Opportunity Assignments ({assignments.length})</h2>
                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead>
                                        <tr className="text-left text-gray-400 text-sm border-b border-white/10">
                                            <th className="pb-3 font-medium">Subcontractor</th>
                                            <th className="pb-3 font-medium">Opportunity</th>
                                            <th className="pb-3 font-medium">Role</th>
                                            <th className="pb-3 font-medium">Work Share</th>
                                            <th className="pb-3 font-medium">Est. Value</th>
                                            <th className="pb-3 font-medium">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-sm">
                                        {assignments.map(assign => (
                                            <tr key={assign.id} className="border-b border-white/5 hover:bg-white/5">
                                                <td className="py-3 font-medium">{assign.subcontractor_name}</td>
                                                <td className="py-3 text-gray-300">{assign.opportunity_title}</td>
                                                <td className="py-3 text-gray-400">{assign.role}</td>
                                                <td className="py-3">
                                                    <div className="flex items-center gap-2">
                                                        <div className="w-16 h-2 bg-white/10 rounded-full overflow-hidden">
                                                            <div className="h-full bg-cyan-500" style={{width: `${assign.work_share_percent}%`}}></div>
                                                        </div>
                                                        <span className="text-cyan-400">{assign.work_share_percent}%</span>
                                                    </div>
                                                </td>
                                                <td className="py-3 text-emerald-400">${(assign.estimated_value / 1000000).toFixed(1)}M</td>
                                                <td className="py-3">
                                                    <span className={`px-2 py-1 rounded text-xs ${getAssignmentStatusColor(assign.status)}`}>
                                                        {assign.status}
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {activeTab === 'agreements' && (
                        <div className="grid grid-cols-2 gap-6">
                            {/* Active Teaming Agreements */}
                            <div className="glass-card rounded-xl p-6">
                                <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-emerald-400"></span>
                                    Active Teaming Agreements
                                </h2>
                                <div className="space-y-3">
                                    {subcontractors.filter(s => s.teaming_agreement).map(sub => (
                                        <div key={sub.id} className="bg-white/5 rounded-lg p-4">
                                            <div className="flex items-start justify-between mb-2">
                                                <div>
                                                    <h3 className="font-medium">{sub.name}</h3>
                                                    <p className="text-sm text-gray-400">CAGE: {sub.cage_code}</p>
                                                </div>
                                                <span className="text-emerald-400 text-sm">
                                                    Expires: {sub.ta_expiration ? new Date(sub.ta_expiration).toLocaleDateString() : 'N/A'}
                                                </span>
                                            </div>
                                            <div className="flex gap-2 mt-2">
                                                {sub.set_aside_status?.map(status => (
                                                    <span key={status} className="px-2 py-0.5 bg-cyan-500/20 text-cyan-400 rounded text-xs">{status}</span>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Pending Agreements */}
                            <div className="glass-card rounded-xl p-6">
                                <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-yellow-400"></span>
                                    Pending Agreements
                                </h2>
                                <div className="space-y-3">
                                    {subcontractors.filter(s => s.nda_signed && !s.teaming_agreement).map(sub => (
                                        <div key={sub.id} className="bg-white/5 rounded-lg p-4">
                                            <div className="flex items-start justify-between mb-2">
                                                <div>
                                                    <h3 className="font-medium">{sub.name}</h3>
                                                    <p className="text-sm text-gray-400">NDA Signed - TA Pending</p>
                                                </div>
                                                <button className="text-cyan-400 text-sm hover:text-cyan-300">
                                                    Initiate TA
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                    {subcontractors.filter(s => s.nda_signed && !s.teaming_agreement).length === 0 && (
                                        <p className="text-gray-500 text-center py-4">No pending agreements</p>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Subcontractor Detail Modal */}
                    {selectedSub && (
                        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4" onClick={() => setSelectedSub(null)}>
                            <div className="glass-card rounded-xl p-6 max-w-3xl w-full max-h-[85vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                                <div className="flex items-start justify-between mb-6">
                                    <div>
                                        <div className="flex items-center gap-3 mb-2">
                                            <h2 className="text-xl font-bold">{selectedSub.name}</h2>
                                            <span className={`px-2 py-1 rounded text-xs font-medium border ${getStatusColor(selectedSub.relationship_status)}`}>
                                                {selectedSub.relationship_status?.replace('_', ' ')}
                                            </span>
                                        </div>
                                        <p className="text-gray-400">{selectedSub.city}, {selectedSub.state}</p>
                                    </div>
                                    <button onClick={() => setSelectedSub(null)} className="text-gray-400 hover:text-white">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>
                                </div>

                                {/* Company Details Grid */}
                                <div className="grid grid-cols-3 gap-4 mb-6">
                                    <div className="bg-white/5 rounded-lg p-3">
                                        <p className="text-gray-400 text-xs mb-1">CAGE Code</p>
                                        <p className="font-medium">{selectedSub.cage_code}</p>
                                    </div>
                                    <div className="bg-white/5 rounded-lg p-3">
                                        <p className="text-gray-400 text-xs mb-1">UEI Number</p>
                                        <p className="font-medium">{selectedSub.uei_number}</p>
                                    </div>
                                    <div className="bg-white/5 rounded-lg p-3">
                                        <p className="text-gray-400 text-xs mb-1">Past Performance</p>
                                        <p className={`font-medium ${getRatingColor(selectedSub.past_performance_rating)}`}>
                                            {selectedSub.past_performance_rating?.replace('_', ' ')}
                                        </p>
                                    </div>
                                </div>

                                {/* Contact Info */}
                                <div className="bg-white/5 rounded-lg p-4 mb-6">
                                    <h3 className="font-medium mb-3">Primary Contact</h3>
                                    <div className="grid grid-cols-3 gap-4 text-sm">
                                        <div>
                                            <p className="text-gray-400">Name</p>
                                            <p>{selectedSub.primary_contact}</p>
                                        </div>
                                        <div>
                                            <p className="text-gray-400">Email</p>
                                            <p className="text-cyan-400">{selectedSub.contact_email}</p>
                                        </div>
                                        <div>
                                            <p className="text-gray-400">Phone</p>
                                            <p>{selectedSub.contact_phone}</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Set-Asides & NAICS */}
                                <div className="grid grid-cols-2 gap-4 mb-6">
                                    <div className="bg-white/5 rounded-lg p-4">
                                        <h3 className="font-medium mb-3">Set-Aside Status</h3>
                                        <div className="flex flex-wrap gap-2">
                                            {selectedSub.set_aside_status?.map(status => (
                                                <span key={status} className="px-3 py-1 bg-cyan-500/20 text-cyan-400 rounded-lg text-sm">{status}</span>
                                            ))}
                                            {(!selectedSub.set_aside_status || selectedSub.set_aside_status.length === 0) && (
                                                <span className="text-gray-500">None</span>
                                            )}
                                        </div>
                                    </div>
                                    <div className="bg-white/5 rounded-lg p-4">
                                        <h3 className="font-medium mb-3">NAICS Codes</h3>
                                        <div className="flex flex-wrap gap-2">
                                            {selectedSub.naics_codes?.map(code => (
                                                <span key={code} className="px-3 py-1 bg-purple-500/20 text-purple-400 rounded-lg text-sm">{code}</span>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                {/* Capabilities */}
                                <div className="bg-white/5 rounded-lg p-4 mb-6">
                                    <h3 className="font-medium mb-2">Capabilities</h3>
                                    <p className="text-gray-300">{selectedSub.capabilities}</p>
                                </div>

                                {/* Agreement Status */}
                                <div className="grid grid-cols-2 gap-4 mb-6">
                                    <div className={`rounded-lg p-4 ${selectedSub.nda_signed ? 'bg-emerald-500/10 border border-emerald-500/30' : 'bg-white/5'}`}>
                                        <div className="flex items-center justify-between">
                                            <div>
                                                <p className="text-sm text-gray-400">NDA Status</p>
                                                <p className={`font-medium ${selectedSub.nda_signed ? 'text-emerald-400' : 'text-gray-400'}`}>
                                                    {selectedSub.nda_signed ? 'Signed' : 'Not Signed'}
                                                </p>
                                            </div>
                                            {selectedSub.nda_signed && (
                                                <svg className="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                                </svg>
                                            )}
                                        </div>
                                    </div>
                                    <div className={`rounded-lg p-4 ${selectedSub.teaming_agreement ? 'bg-purple-500/10 border border-purple-500/30' : 'bg-white/5'}`}>
                                        <div className="flex items-center justify-between">
                                            <div>
                                                <p className="text-sm text-gray-400">Teaming Agreement</p>
                                                <p className={`font-medium ${selectedSub.teaming_agreement ? 'text-purple-400' : 'text-gray-400'}`}>
                                                    {selectedSub.teaming_agreement ? `Expires ${new Date(selectedSub.ta_expiration).toLocaleDateString()}` : 'Not Signed'}
                                                </p>
                                            </div>
                                            {selectedSub.teaming_agreement && (
                                                <svg className="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                                </svg>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                {/* Assignments */}
                                {subAssignments.length > 0 && (
                                    <div>
                                        <h3 className="font-medium mb-3">Current Assignments</h3>
                                        <div className="space-y-2">
                                            {subAssignments.map(assign => (
                                                <div key={assign.id} className="bg-white/5 rounded-lg p-3">
                                                    <div className="flex items-center justify-between mb-2">
                                                        <span className="font-medium">{assign.opportunity_title}</span>
                                                        <span className={`px-2 py-0.5 rounded text-xs ${getAssignmentStatusColor(assign.status)}`}>
                                                            {assign.status}
                                                        </span>
                                                    </div>
                                                    <div className="flex items-center justify-between text-sm text-gray-400">
                                                        <span>{assign.role}</span>
                                                        <span className="text-cyan-400">{assign.work_share_percent}% • ${(assign.estimated_value / 1000000).toFixed(1)}M</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="mt-12 text-center text-gray-500 text-sm">
                        © 2026 Mission Meets Tech • MissionPulse v2.0 • Sprint 69
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<SubcontractorApp />, document.getElementById('root'));
    </script>
</body>
</html>
