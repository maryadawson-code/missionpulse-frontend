<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MissionPulse - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); }
        .pulse-glow { animation: pulseGlow 3s ease-in-out infinite; }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(6, 182, 212, 0.3); }
            50% { box-shadow: 0 0 40px rgba(6, 182, 212, 0.6); }
        }
    </style>
</head>
<body class="gradient-bg text-white min-h-screen flex items-center justify-center p-4">
    <div id="app">
        <!-- Login Container -->
        <div class="w-full max-w-md">
            <!-- Logo & Branding -->
            <div class="text-center mb-8">
                <div class="w-20 h-20 mx-auto rounded-2xl bg-gradient-to-br from-cyan-500 to-emerald-500 flex items-center justify-center mb-4 pulse-glow">
                    <span class="text-4xl">🛡️</span>
                </div>
                <h1 class="text-3xl font-bold text-white">MissionPulse</h1>
                <p class="text-slate-400 mt-2">Federal Proposal Management Platform</p>
            </div>

            <!-- Login Form -->
            <div class="glass rounded-2xl p-8" id="login-form">
                <h2 class="text-xl font-semibold text-white mb-6 text-center">Sign In</h2>
                
                <!-- Error Message -->
                <div id="error-message" class="hidden mb-4 p-3 bg-red-500/20 border border-red-500/50 rounded-lg text-red-400 text-sm"></div>
                
                <!-- Success Message -->
                <div id="success-message" class="hidden mb-4 p-3 bg-emerald-500/20 border border-emerald-500/50 rounded-lg text-emerald-400 text-sm"></div>

                <form id="signin-form" class="space-y-4">
                    <div>
                        <label class="text-sm text-slate-400 block mb-2">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            required
                            placeholder="you@company.com"
                            class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none transition-colors"
                        />
                    </div>
                    
                    <div>
                        <label class="text-sm text-slate-400 block mb-2">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            required
                            placeholder="••••••••"
                            class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none transition-colors"
                        />
                    </div>

                    <div class="flex items-center justify-between text-sm">
                        <label class="flex items-center gap-2 text-slate-400 cursor-pointer">
                            <input type="checkbox" id="remember" class="rounded border-slate-600 bg-slate-800 text-cyan-500 focus:ring-cyan-500">
                            Remember me
                        </label>
                        <button type="button" onclick="showForgotPassword()" class="text-cyan-400 hover:text-cyan-300 transition-colors">
                            Forgot password?
                        </button>
                    </div>

                    <button 
                        type="submit" 
                        id="signin-btn"
                        class="w-full py-3 bg-gradient-to-r from-cyan-500 to-emerald-500 text-slate-900 font-semibold rounded-lg hover:opacity-90 transition-opacity mt-6"
                    >
                        Sign In
                    </button>
                </form>

                <!-- Demo Mode -->
                <div class="mt-6 pt-6 border-t border-slate-700">
                    <button 
                        onclick="enterDemoMode()"
                        class="w-full py-3 bg-slate-700 hover:bg-slate-600 text-white font-medium rounded-lg transition-colors flex items-center justify-center gap-2"
                    >
                        <span>🎮</span> Enter Demo Mode
                    </button>
                    <p class="text-xs text-slate-500 text-center mt-2">
                        Explore all features with sample data
                    </p>
                </div>

                <!-- Request Access -->
                <div class="mt-6 text-center">
                    <p class="text-slate-400 text-sm">
                        Don't have an account?
                        <a href="missionpulse-request-access.html" class="text-cyan-400 hover:text-cyan-300 ml-1">
                            Request Access
                        </a>
                    </p>
                </div>
            </div>

            <!-- Forgot Password Form (Hidden) -->
            <div class="glass rounded-2xl p-8 hidden" id="forgot-form">
                <h2 class="text-xl font-semibold text-white mb-2 text-center">Reset Password</h2>
                <p class="text-slate-400 text-sm text-center mb-6">Enter your email to receive a reset link</p>
                
                <div id="forgot-error" class="hidden mb-4 p-3 bg-red-500/20 border border-red-500/50 rounded-lg text-red-400 text-sm"></div>
                <div id="forgot-success" class="hidden mb-4 p-3 bg-emerald-500/20 border border-emerald-500/50 rounded-lg text-emerald-400 text-sm"></div>

                <form id="reset-form" class="space-y-4">
                    <div>
                        <label class="text-sm text-slate-400 block mb-2">Email Address</label>
                        <input 
                            type="email" 
                            id="reset-email" 
                            required
                            placeholder="you@company.com"
                            class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:border-cyan-500 focus:outline-none transition-colors"
                        />
                    </div>

                    <button 
                        type="submit" 
                        class="w-full py-3 bg-gradient-to-r from-cyan-500 to-emerald-500 text-slate-900 font-semibold rounded-lg hover:opacity-90 transition-opacity"
                    >
                        Send Reset Link
                    </button>
                </form>

                <button 
                    onclick="showLogin()"
                    class="w-full py-3 bg-slate-700 hover:bg-slate-600 text-white font-medium rounded-lg transition-colors mt-4"
                >
                    ← Back to Sign In
                </button>
            </div>

            <!-- Footer -->
            <div class="mt-8 text-center">
                <p class="text-slate-500 text-sm">© 2026 Mission Meets Tech</p>
                <p class="text-slate-600 text-xs mt-1">Mission. Technology. Transformation.</p>
            </div>
        </div>
    </div>

    <script>
        // =========================================================================
        // SUPABASE CONFIGURATION
        // =========================================================================
        const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc1NjcyNTAsImV4cCI6MjA1MzE0MzI1MH0.gVLpPz-EdNICBxkSh6l4_dlUHgfmwHcGLgv-OL1gkIA';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // =========================================================================
        // CHECK EXISTING SESSION
        // =========================================================================
        async function checkSession() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    // Already logged in, redirect to dashboard
                    window.location.href = 'missionpulse-dashboard-hub.html';
                }
            } catch (error) {
                console.log('Session check failed, staying on login page');
            }
        }

        // Check on page load
        checkSession();

        // =========================================================================
        // SIGN IN
        // =========================================================================
        document.getElementById('signin-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('signin-btn');
            const errorEl = document.getElementById('error-message');
            const successEl = document.getElementById('success-message');
            
            // Reset messages
            errorEl.classList.add('hidden');
            successEl.classList.add('hidden');
            
            // Show loading state
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-pulse">Signing in...</span>';
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                // Success
                successEl.textContent = 'Sign in successful! Redirecting...';
                successEl.classList.remove('hidden');
                
                // Store session info
                localStorage.setItem('missionpulse_user', JSON.stringify({
                    id: data.user.id,
                    email: data.user.email,
                    role: data.user.user_metadata?.role || 'user',
                    name: data.user.user_metadata?.name || email.split('@')[0]
                }));
                
                // Redirect after short delay
                setTimeout(() => {
                    window.location.href = 'missionpulse-dashboard-hub.html';
                }, 1000);
                
            } catch (error) {
                console.error('Sign in error:', error);
                errorEl.textContent = error.message || 'Invalid email or password. Please try again.';
                errorEl.classList.remove('hidden');
                
                btn.disabled = false;
                btn.innerHTML = 'Sign In';
            }
        });

        // =========================================================================
        // FORGOT PASSWORD
        // =========================================================================
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('reset-email').value;
            const errorEl = document.getElementById('forgot-error');
            const successEl = document.getElementById('forgot-success');
            
            errorEl.classList.add('hidden');
            successEl.classList.add('hidden');
            
            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/missionpulse-reset-password.html'
                });
                
                if (error) throw error;
                
                successEl.textContent = 'Password reset link sent! Check your email.';
                successEl.classList.remove('hidden');
                
            } catch (error) {
                errorEl.textContent = error.message || 'Failed to send reset email. Please try again.';
                errorEl.classList.remove('hidden');
            }
        });

        // =========================================================================
        // DEMO MODE
        // =========================================================================
        function enterDemoMode() {
            // Set demo user in localStorage
            localStorage.setItem('missionpulse_user', JSON.stringify({
                id: 'demo-user-001',
                email: 'demo@missionpulse.io',
                role: 'ceo',
                name: 'Demo User',
                isDemo: true
            }));
            
            localStorage.setItem('missionpulse_demo_mode', 'true');
            
            // Redirect to dashboard
            window.location.href = 'missionpulse-dashboard-hub.html';
        }

        // =========================================================================
        // UI TOGGLES
        // =========================================================================
        function showForgotPassword() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('forgot-form').classList.remove('hidden');
        }

        function showLogin() {
            document.getElementById('forgot-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
        }
    </script>
</body>
</html>
