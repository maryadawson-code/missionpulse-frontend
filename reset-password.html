<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-glow { 
      0%, 100% { box-shadow: 0 0 20px rgba(0, 229, 250, 0.3); } 
      50% { box-shadow: 0 0 40px rgba(0, 229, 250, 0.5); } 
    }
    .glow-pulse { animation: pulse-glow 3s ease-in-out infinite; }
    .bg-grid {
      background-image: 
        linear-gradient(rgba(0, 229, 250, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 250, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen bg-grid">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    function App() {
      const [password, setPassword] = React.useState('');
      const [confirmPassword, setConfirmPassword] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const [error, setError] = React.useState(null);
      const [success, setSuccess] = React.useState(false);
      const [validSession, setValidSession] = React.useState(false);
      const [checking, setChecking] = React.useState(true);

      React.useEffect(() => {
        checkSession();
      }, []);

      const checkSession = async () => {
        try {
          // Check if we have a valid session from the reset link
          const { data: { session }, error } = await sbClient.auth.getSession();
          
          if (session) {
            setValidSession(true);
          } else {
            // Try to get session from URL hash (Supabase redirects with tokens in hash)
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            const accessToken = hashParams.get('access_token');
            const refreshToken = hashParams.get('refresh_token');
            
            if (accessToken && refreshToken) {
              const { data, error } = await sbClient.auth.setSession({
                access_token: accessToken,
                refresh_token: refreshToken
              });
              
              if (!error && data.session) {
                setValidSession(true);
                // Clean up URL
                window.history.replaceState({}, document.title, window.location.pathname);
              }
            }
          }
        } catch (e) {
          console.error('Session check failed:', e);
        }
        setChecking(false);
      };

      const handleReset = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError(null);

        if (password !== confirmPassword) {
          setError('Passwords do not match');
          setLoading(false);
          return;
        }

        if (password.length < 8) {
          setError('Password must be at least 8 characters');
          setLoading(false);
          return;
        }

        try {
          const { error } = await sbClient.auth.updateUser({
            password: password
          });

          if (error) throw error;

          setSuccess(true);
          
          // Redirect to login after 3 seconds
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 3000);
        } catch (err) {
          setError(err.message || 'Failed to reset password. Please try again.');
        }

        setLoading(false);
      };

      if (checking) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-16 h-16 rounded-xl bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center mx-auto mb-4 glow-pulse">
                <span className="text-3xl">🛡️</span>
              </div>
              <p className="text-slate-400">Verifying reset link...</p>
            </div>
          </div>
        );
      }

      if (!validSession && !success) {
        return (
          <div className="min-h-screen flex items-center justify-center p-6">
            <div className="max-w-md w-full text-center">
              <div className="w-16 h-16 rounded-xl bg-gradient-to-br from-red-500 to-rose-600 flex items-center justify-center mx-auto mb-4">
                <span className="text-3xl">⚠️</span>
              </div>
              <h1 className="text-2xl font-bold mb-4">Invalid or Expired Link</h1>
              <p className="text-slate-400 mb-6">
                This password reset link is invalid or has expired. 
                Please request a new one.
              </p>
              <a 
                href="login.html"
                className="inline-block px-6 py-3 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg font-medium transition-colors"
              >
                Back to Login
              </a>
            </div>
          </div>
        );
      }

      if (success) {
        return (
          <div className="min-h-screen flex items-center justify-center p-6">
            <div className="max-w-md w-full text-center">
              <div className="w-16 h-16 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center mx-auto mb-4 glow-pulse">
                <span className="text-3xl">✓</span>
              </div>
              <h1 className="text-2xl font-bold mb-4">Password Reset!</h1>
              <p className="text-slate-400 mb-6">
                Your password has been successfully updated. 
                Redirecting you to login...
              </p>
              <div className="flex items-center justify-center gap-1">
                <div className="w-2 h-2 bg-cyan-400 rounded-full animate-pulse" />
                <div className="w-2 h-2 bg-cyan-400 rounded-full animate-pulse" style={{ animationDelay: '0.2s' }} />
                <div className="w-2 h-2 bg-cyan-400 rounded-full animate-pulse" style={{ animationDelay: '0.4s' }} />
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex items-center justify-center p-6">
          <div className="w-full max-w-md">
            {/* Logo */}
            <div className="flex items-center justify-center gap-3 mb-8">
              <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center glow-pulse">
                <span className="text-2xl">🛡️</span>
              </div>
              <div>
                <h1 className="text-xl font-bold text-cyan-400">MissionPulse</h1>
                <p className="text-xs text-slate-500">by Mission Meets Tech</p>
              </div>
            </div>

            {/* Form Card */}
            <div className="bg-slate-800/50 border border-slate-700 rounded-2xl p-8">
              <h2 className="text-2xl font-bold mb-2">Set New Password</h2>
              <p className="text-slate-400 mb-6">Enter your new password below</p>

              {error && (
                <div className="mb-4 p-3 bg-red-500/20 border border-red-500/30 rounded-lg text-red-300 text-sm">
                  {error}
                </div>
              )}

              <form onSubmit={handleReset} className="space-y-4">
                <div>
                  <label className="block text-sm text-slate-400 mb-1">New Password</label>
                  <input
                    type="password"
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                    required
                    minLength={8}
                    className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-cyan-500 transition-colors"
                    placeholder="Min 8 characters"
                  />
                </div>
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Confirm Password</label>
                  <input
                    type="password"
                    value={confirmPassword}
                    onChange={(e) => setConfirmPassword(e.target.value)}
                    required
                    className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-cyan-500 transition-colors"
                    placeholder="••••••••"
                  />
                </div>

                {/* Password Requirements */}
                <div className="text-xs text-slate-500 space-y-1">
                  <div className={`flex items-center gap-2 ${password.length >= 8 ? 'text-emerald-400' : ''}`}>
                    <span>{password.length >= 8 ? '✓' : '○'}</span>
                    <span>At least 8 characters</span>
                  </div>
                  <div className={`flex items-center gap-2 ${password === confirmPassword && password.length > 0 ? 'text-emerald-400' : ''}`}>
                    <span>{password === confirmPassword && password.length > 0 ? '✓' : '○'}</span>
                    <span>Passwords match</span>
                  </div>
                </div>

                <button
                  type="submit"
                  disabled={loading || password.length < 8 || password !== confirmPassword}
                  className="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 rounded-lg font-medium transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                >
                  {loading ? 'Updating...' : 'Update Password'}
                </button>
              </form>

              <div className="mt-6 text-center">
                <a href="login.html" className="text-sm text-slate-400 hover:text-cyan-400 transition-colors">
                  ← Back to Login
                </a>
              </div>
            </div>

            {/* Footer */}
            <div className="mt-8 text-center text-xs text-slate-500">
              <p>© 2026 Mission Meets Tech. All rights reserved.</p>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
