<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Post-Award Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    // ============================================
    // CONFIGURATION
    // ============================================
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // ============================================
    // DEMO DATA
    // ============================================
    const DEMO_CONTRACTS = [
      {
        id: 1,
        name: 'DHA MHS GENESIS Support Services',
        contract_number: 'W81K04-24-C-0042',
        agency: 'DHA',
        type: 'IDIQ Task Order',
        value: 45000000,
        funded: 12500000,
        burned: 8750000,
        start_date: '2024-10-01',
        end_date: '2029-09-30',
        pop_months: 60,
        current_month: 16,
        status: 'active',
        cpars_rating: 'Exceptional',
        pm: 'Sarah Chen',
        cor: 'James Wilson',
        cor_email: 'james.wilson@dha.mil'
      }
    ];

    const DEMO_DELIVERABLES = [
      { id: 1, name: 'Monthly Status Report - January', due: '2026-02-05', status: 'pending', type: 'CDRL', cdrl: 'A001' },
      { id: 2, name: 'System Security Plan Update', due: '2026-02-15', status: 'pending', type: 'CDRL', cdrl: 'A003' },
      { id: 3, name: 'Sprint 24 Demo', due: '2026-02-01', status: 'submitted', type: 'Technical', cdrl: null },
      { id: 4, name: 'Monthly Status Report - December', due: '2026-01-05', status: 'accepted', type: 'CDRL', cdrl: 'A001' },
      { id: 5, name: 'Quarterly Program Review', due: '2026-01-15', status: 'accepted', type: 'Meeting', cdrl: null },
      { id: 6, name: 'Invoice #16 - January 2026', due: '2026-02-10', status: 'draft', type: 'Invoice', cdrl: null }
    ];

    const DEMO_FINANCIALS = {
      total_value: 45000000,
      funded: 12500000,
      burned: 8750000,
      remaining: 3750000,
      burn_rate: 547000, // monthly
      months_remaining: 6.9,
      invoices: [
        { month: 'Aug 2025', amount: 520000, status: 'paid' },
        { month: 'Sep 2025', amount: 535000, status: 'paid' },
        { month: 'Oct 2025', amount: 548000, status: 'paid' },
        { month: 'Nov 2025', amount: 562000, status: 'paid' },
        { month: 'Dec 2025', amount: 545000, status: 'paid' },
        { month: 'Jan 2026', amount: 540000, status: 'submitted' }
      ]
    };

    const DEMO_TEAM = [
      { name: 'Sarah Chen', role: 'Program Manager', hours: 160, billed: 155 },
      { name: 'Mike Torres', role: 'Technical Lead', hours: 176, billed: 172 },
      { name: 'Lisa Park', role: 'Cloud Architect', hours: 160, billed: 158 },
      { name: 'David Kim', role: 'DevSecOps Engineer', hours: 176, billed: 176 },
      { name: 'James Wilson', role: 'HL7 Specialist', hours: 120, billed: 118 }
    ];

    // ============================================
    // UTILITY FUNCTIONS
    // ============================================
    const formatCurrency = (v) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(v);
    const formatDate = (d) => new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const getDaysUntil = (d) => Math.ceil((new Date(d) - new Date()) / (1000 * 60 * 60 * 24));

    // ============================================
    // COMPONENTS
    // ============================================

    // Contract Header
    const ContractHeader = ({ contract }) => (
      <div className="glass rounded-xl border border-slate-700/50 p-6">
        <div className="flex items-start justify-between gap-6 mb-6">
          <div>
            <div className="flex items-center gap-3 mb-2">
              <h2 className="text-2xl font-bold text-white">{contract.name}</h2>
              <span className="px-3 py-1 bg-emerald-500/20 text-emerald-400 rounded-full text-sm">Active</span>
            </div>
            <div className="flex items-center gap-4 text-sm text-slate-400">
              <span className="font-mono">{contract.contract_number}</span>
              <span>•</span>
              <span>{contract.agency}</span>
              <span>•</span>
              <span>{contract.type}</span>
            </div>
          </div>
          <div className="text-right">
            <p className="text-sm text-slate-400">CPARS Rating</p>
            <p className="text-xl font-bold text-emerald-400">{contract.cpars_rating}</p>
          </div>
        </div>

        {/* Progress Bar */}
        <div className="mb-4">
          <div className="flex items-center justify-between text-sm mb-2">
            <span className="text-slate-400">Period of Performance</span>
            <span className="text-white">Month {contract.current_month} of {contract.pop_months}</span>
          </div>
          <div className="h-3 bg-slate-700 rounded-full overflow-hidden">
            <div 
              className="h-full bg-gradient-to-r from-cyan-500 to-blue-500" 
              style={{ width: `${(contract.current_month / contract.pop_months) * 100}%` }}
            />
          </div>
          <div className="flex items-center justify-between text-xs text-slate-500 mt-1">
            <span>{formatDate(contract.start_date)}</span>
            <span>{formatDate(contract.end_date)}</span>
          </div>
        </div>

        {/* Key Contacts */}
        <div className="flex items-center gap-6 text-sm">
          <div>
            <span className="text-slate-500">PM: </span>
            <span className="text-white">{contract.pm}</span>
          </div>
          <div>
            <span className="text-slate-500">COR: </span>
            <span className="text-white">{contract.cor}</span>
            <a href={`mailto:${contract.cor_email}`} className="text-cyan-400 ml-2 hover:underline">{contract.cor_email}</a>
          </div>
        </div>
      </div>
    );

    // Financial Dashboard
    const FinancialDashboard = ({ financials, contract }) => {
      const fundedPercent = (financials.burned / financials.funded) * 100;
      const burnHealthy = financials.months_remaining >= 3;

      return (
        <div className="glass rounded-xl border border-slate-700/50 p-6">
          <h3 className="font-semibold text-white mb-4">💰 Financial Status</h3>
          
          <div className="grid md:grid-cols-4 gap-4 mb-6">
            {[
              { label: 'Contract Value', value: formatCurrency(financials.total_value), color: 'cyan' },
              { label: 'Currently Funded', value: formatCurrency(financials.funded), color: 'blue' },
              { label: 'Burned', value: formatCurrency(financials.burned), color: 'amber' },
              { label: 'Remaining', value: formatCurrency(financials.remaining), color: burnHealthy ? 'emerald' : 'red' }
            ].map(({ label, value, color }) => (
              <div key={label} className="bg-slate-800/50 rounded-lg p-4">
                <p className="text-xs text-slate-400 mb-1">{label}</p>
                <p className={`text-xl font-bold text-${color}-400`}>{value}</p>
              </div>
            ))}
          </div>

          {/* Burn Rate Indicator */}
          <div className="mb-6">
            <div className="flex items-center justify-between mb-2">
              <span className="text-sm text-slate-400">Funding Burn Rate</span>
              <span className={`text-sm ${burnHealthy ? 'text-emerald-400' : 'text-red-400'}`}>
                {financials.months_remaining.toFixed(1)} months of funding remaining
              </span>
            </div>
            <div className="h-4 bg-slate-700 rounded-full overflow-hidden">
              <div 
                className={`h-full ${fundedPercent > 90 ? 'bg-red-500' : fundedPercent > 75 ? 'bg-amber-500' : 'bg-emerald-500'}`}
                style={{ width: `${Math.min(100, fundedPercent)}%` }}
              />
            </div>
            <p className="text-xs text-slate-500 mt-1">
              {formatCurrency(financials.burn_rate)}/month avg burn • {fundedPercent.toFixed(0)}% of current funding consumed
            </p>
          </div>

          {/* Recent Invoices */}
          <div>
            <h4 className="text-sm font-medium text-slate-400 mb-3">Recent Invoices</h4>
            <div className="space-y-2">
              {financials.invoices.slice(-4).map((inv, i) => (
                <div key={i} className="flex items-center justify-between bg-slate-800/30 rounded-lg px-4 py-2">
                  <span className="text-white">{inv.month}</span>
                  <span className="text-slate-300 font-mono">{formatCurrency(inv.amount)}</span>
                  <span className={`px-2 py-0.5 rounded text-xs ${
                    inv.status === 'paid' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'
                  }`}>
                    {inv.status}
                  </span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // Deliverables List
    const DeliverablesList = ({ deliverables }) => {
      const statusConfig = {
        pending: { bg: 'bg-amber-500/20', text: 'text-amber-400', icon: '⏳' },
        submitted: { bg: 'bg-blue-500/20', text: 'text-blue-400', icon: '📤' },
        accepted: { bg: 'bg-emerald-500/20', text: 'text-emerald-400', icon: '✅' },
        rejected: { bg: 'bg-red-500/20', text: 'text-red-400', icon: '❌' },
        draft: { bg: 'bg-slate-500/20', text: 'text-slate-400', icon: '📝' }
      };

      const upcoming = deliverables.filter(d => ['pending', 'draft'].includes(d.status)).sort((a, b) => new Date(a.due) - new Date(b.due));
      const recent = deliverables.filter(d => ['submitted', 'accepted'].includes(d.status));

      return (
        <div className="glass rounded-xl border border-slate-700/50 p-6">
          <h3 className="font-semibold text-white mb-4">📋 Deliverables</h3>
          
          {/* Upcoming */}
          <div className="mb-6">
            <h4 className="text-sm text-slate-400 mb-3">Upcoming</h4>
            <div className="space-y-2">
              {upcoming.map(del => {
                const days = getDaysUntil(del.due);
                const status = statusConfig[del.status];
                return (
                  <div key={del.id} className={`flex items-center justify-between rounded-lg px-4 py-3 ${days <= 7 ? 'bg-red-500/10 border border-red-500/30' : 'bg-slate-800/30'}`}>
                    <div className="flex items-center gap-3">
                      <span>{status.icon}</span>
                      <div>
                        <p className="text-white">{del.name}</p>
                        <p className="text-xs text-slate-500">
                          {del.cdrl && <span className="text-cyan-400">CDRL {del.cdrl} • </span>}
                          {del.type}
                        </p>
                      </div>
                    </div>
                    <div className="text-right">
                      <p className={`text-sm ${days <= 7 ? 'text-red-400' : 'text-slate-300'}`}>
                        {days <= 0 ? 'Due Today!' : `${days} days`}
                      </p>
                      <p className="text-xs text-slate-500">{formatDate(del.due)}</p>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Recent */}
          <div>
            <h4 className="text-sm text-slate-400 mb-3">Recently Completed</h4>
            <div className="space-y-2">
              {recent.map(del => {
                const status = statusConfig[del.status];
                return (
                  <div key={del.id} className="flex items-center justify-between bg-slate-800/30 rounded-lg px-4 py-2">
                    <div className="flex items-center gap-3">
                      <span>{status.icon}</span>
                      <span className="text-slate-300">{del.name}</span>
                    </div>
                    <span className={`px-2 py-0.5 rounded text-xs ${status.bg} ${status.text}`}>
                      {del.status}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    };

    // Team Utilization
    const TeamUtilization = ({ team }) => (
      <div className="glass rounded-xl border border-slate-700/50 p-6">
        <h3 className="font-semibold text-white mb-4">👥 Team Utilization (This Month)</h3>
        <div className="space-y-4">
          {team.map((member, i) => {
            const util = (member.billed / member.hours) * 100;
            return (
              <div key={i}>
                <div className="flex items-center justify-between text-sm mb-1">
                  <div>
                    <span className="text-white">{member.name}</span>
                    <span className="text-slate-500 ml-2">{member.role}</span>
                  </div>
                  <span className={util >= 95 ? 'text-emerald-400' : util >= 80 ? 'text-amber-400' : 'text-red-400'}>
                    {member.billed}/{member.hours}h ({util.toFixed(0)}%)
                  </span>
                </div>
                <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
                  <div 
                    className={`h-full ${util >= 95 ? 'bg-emerald-500' : util >= 80 ? 'bg-amber-500' : 'bg-red-500'}`}
                    style={{ width: `${util}%` }}
                  />
                </div>
              </div>
            );
          })}
        </div>
        <div className="mt-4 pt-4 border-t border-slate-700 flex items-center justify-between text-sm">
          <span className="text-slate-400">Team Average</span>
          <span className="text-emerald-400 font-semibold">
            {(team.reduce((sum, m) => sum + (m.billed / m.hours), 0) / team.length * 100).toFixed(0)}% Utilization
          </span>
        </div>
      </div>
    );

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [contracts] = React.useState(DEMO_CONTRACTS);
      const [deliverables] = React.useState(DEMO_DELIVERABLES);
      const [financials] = React.useState(DEMO_FINANCIALS);
      const [team] = React.useState(DEMO_TEAM);
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);

      React.useEffect(() => {
        setTimeout(() => setLoading(false), 500);
      }, []);

      const contract = contracts[0];

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-slate-400">Loading Contract Data...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-700/50 rounded-lg">← Back</a>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center">📈</div>
                  <div>
                    <h1 className="text-xl font-bold text-white">Post-Award</h1>
                    <p className="text-xs text-slate-400">Contract Performance Management</p>
                  </div>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <button className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-lg text-sm font-medium">
                  📊 Export Report
                </button>
                <div className={`px-3 py-1 rounded-full text-xs ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                  {connected ? '● Connected' : '○ Demo'}
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8 space-y-6">
            {/* Contract Header */}
            <ContractHeader contract={contract} />

            <div className="grid lg:grid-cols-2 gap-6">
              {/* Financial Dashboard */}
              <FinancialDashboard financials={financials} contract={contract} />
              
              {/* Deliverables */}
              <DeliverablesList deliverables={deliverables} />
            </div>

            {/* Team Utilization */}
            <TeamUtilization team={team} />
          </main>

          {/* Footer */}
          <footer className="border-t border-slate-800 py-6">
            <div className="max-w-7xl mx-auto px-6 flex justify-between">
              <p className="text-xs text-slate-500">© 2026 Mission Meets Tech</p>
              <p className="text-xs text-slate-600">AI GENERATED - REQUIRES HUMAN REVIEW</p>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
