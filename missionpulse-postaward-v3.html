<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Post-Award</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --mmt-cyan: #00E5FA; --mmt-navy: #00050F; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--mmt-navy); color: #e2e8f0; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

const CONFIG = {
  SUPABASE_URL: 'https://djuviwarqdvlbgcfuupa.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8',
  LOGIN_PAGE: 'login.html'
};

const DEMO_AWARDS = [
  { id: 1, name: 'VA EHR Modernization', value: 245000000, status: 'transition', awardDate: '2026-01-15', startDate: '2026-02-01', pmAssigned: 'Lisa Martinez', progress: 45 },
  { id: 2, name: 'DHA Telehealth Platform', value: 89000000, status: 'active', awardDate: '2025-11-01', startDate: '2025-12-01', pmAssigned: 'Michael Torres', progress: 78 },
  { id: 3, name: 'IHS Patient Portal', value: 42000000, status: 'closeout', awardDate: '2024-06-15', startDate: '2024-07-01', pmAssigned: 'Sarah Chen', progress: 95 }
];

const TRANSITION_TASKS = [
  { id: 1, task: 'Kickoff Meeting Scheduled', status: 'complete', due: '2026-01-20' },
  { id: 2, task: 'Key Personnel Onboarded', status: 'in_progress', due: '2026-01-25' },
  { id: 3, task: 'Systems Access Granted', status: 'in_progress', due: '2026-01-28' },
  { id: 4, task: 'Security Clearances Verified', status: 'pending', due: '2026-02-01' },
  { id: 5, task: 'Knowledge Transfer Complete', status: 'pending', due: '2026-02-15' }
];

function checkAuth() {
  const session = localStorage.getItem('MP_SESSION');
  if (!session) { window.location.href = CONFIG.LOGIN_PAGE; return null; }
  try { return JSON.parse(localStorage.getItem('MP_USER')); }
  catch { return { email: 'demo@mmt.com', role: 'PM', name: 'Demo User' }; }
}

function AwardCard({ award }) {
  const statusColors = { transition: 'border-amber-500 bg-amber-500/10', active: 'border-green-500 bg-green-500/10', closeout: 'border-purple-500 bg-purple-500/10' };
  return (
    <div className={`glass rounded-xl p-4 border-l-4 ${statusColors[award.status]}`}>
      <div className="flex justify-between items-start mb-3">
        <h3 className="font-bold text-white">{award.name}</h3>
        <span className={`px-2 py-1 rounded text-xs ${award.status === 'transition' ? 'bg-amber-500/20 text-amber-400' : award.status === 'active' ? 'bg-green-500/20 text-green-400' : 'bg-purple-500/20 text-purple-400'}`}>{award.status}</span>
      </div>
      <p className="text-2xl font-bold text-cyan-400 mb-2">${(award.value / 1000000).toFixed(0)}M</p>
      <div className="text-sm text-slate-400 space-y-1 mb-3">
        <p>PM: {award.pmAssigned}</p>
        <p>Award: {award.awardDate} | Start: {award.startDate}</p>
      </div>
      <div className="w-full h-2 bg-slate-700 rounded-full overflow-hidden">
        <div className="h-full bg-gradient-to-r from-cyan-500 to-green-500 rounded-full" style={{ width: `${award.progress}%` }} />
      </div>
      <p className="text-xs text-slate-500 mt-1">{award.progress}% complete</p>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [awards, setAwards] = useState(DEMO_AWARDS);

  useEffect(() => {
    const authUser = checkAuth();
    if (authUser) setUser(authUser);
  }, []);

  const stats = {
    total: awards.length,
    value: awards.reduce((sum, a) => sum + a.value, 0),
    transition: awards.filter(a => a.status === 'transition').length,
    active: awards.filter(a => a.status === 'active').length
  };

  if (!user) return <div className="min-h-screen flex items-center justify-center text-cyan-400">Loading...</div>;

  return (
    <div className="min-h-screen bg-slate-950">
      <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            </a>
            <div>
              <h1 className="text-xl font-bold text-white">📦 Post-Award Management</h1>
              <p className="text-sm text-slate-400">Contract Transition & Performance Tracking</p>
            </div>
          </div>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-6 space-y-6">
        <div className="grid grid-cols-4 gap-4">
          <div className="glass rounded-xl p-4 text-center"><p className="text-3xl font-bold text-white">{stats.total}</p><p className="text-sm text-slate-400">Active Contracts</p></div>
          <div className="glass rounded-xl p-4 text-center"><p className="text-3xl font-bold text-cyan-400">${(stats.value / 1000000000).toFixed(2)}B</p><p className="text-sm text-slate-400">Portfolio Value</p></div>
          <div className="glass rounded-xl p-4 text-center"><p className="text-3xl font-bold text-amber-400">{stats.transition}</p><p className="text-sm text-slate-400">In Transition</p></div>
          <div className="glass rounded-xl p-4 text-center"><p className="text-3xl font-bold text-green-400">{stats.active}</p><p className="text-sm text-slate-400">Performing</p></div>
        </div>

        <div className="grid grid-cols-2 gap-6">
          <div>
            <h2 className="text-lg font-semibold text-white mb-4">Contract Portfolio</h2>
            <div className="space-y-4">
              {awards.map(a => <AwardCard key={a.id} award={a} />)}
            </div>
          </div>
          <div>
            <h2 className="text-lg font-semibold text-white mb-4">Transition Checklist</h2>
            <div className="glass rounded-xl p-4 space-y-3">
              {TRANSITION_TASKS.map(t => (
                <div key={t.id} className="flex items-center justify-between p-2 bg-slate-800/50 rounded-lg">
                  <div className="flex items-center gap-3">
                    <span className={`w-5 h-5 rounded-full flex items-center justify-center text-xs ${t.status === 'complete' ? 'bg-green-500 text-white' : t.status === 'in_progress' ? 'bg-amber-500 text-black' : 'bg-slate-600 text-slate-400'}`}>
                      {t.status === 'complete' ? '✓' : t.status === 'in_progress' ? '◐' : '○'}
                    </span>
                    <span className={`text-sm ${t.status === 'complete' ? 'text-slate-400 line-through' : 'text-white'}`}>{t.task}</span>
                  </div>
                  <span className="text-xs text-slate-500">{t.due}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </main>

      <footer className="border-t border-slate-800 mt-12">
        <div className="max-w-7xl mx-auto px-4 py-4 text-center text-xs text-slate-500">Mission Meets Tech © 2026 | MissionPulse v3.0 | Post-Award Module</div>
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
