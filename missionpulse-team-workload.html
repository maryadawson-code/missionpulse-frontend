<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Team Workload</title>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; color: #fff; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-slideUp { animation: slideUp 0.5s ease-out forwards; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #111C2E; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #243656; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #00E5FA; }
    .glass-card { background: rgba(17, 28, 46, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc4MzUyMjQsImV4cCI6MjA1MzQxMTIyNH0.pBPL9l2zL7LLd_A5I--hPBzw5YwG3ajPMtbYsqsxIgQ';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const Icons = {
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>,
      users: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>,
      user: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>,
      briefcase: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>,
      clock: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6l4 2"/></svg>,
      alert: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>,
      trending: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>,
      refresh: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    const ROLES = [
      { key: 'PM', name: 'Program Manager', color: '#00E5FA' },
      { key: 'CAP', name: 'Capture Manager', color: '#8B5CF6' },
      { key: 'SA', name: 'Solution Architect', color: '#00D29F' },
      { key: 'TW', name: 'Technical Writer', color: '#F59E0B' },
      { key: 'FIN', name: 'Pricing Analyst', color: '#EC4899' },
      { key: 'CON', name: 'Contracts', color: '#EF4444' },
      { key: 'QA', name: 'Quality Assurance', color: '#06B6D4' },
      { key: 'SME', name: 'Subject Matter Expert', color: '#10B981' },
    ];

    const DEMO_TEAM = [
      { id: 'tm-1', name: 'Mary Womack', role: 'PM', avatar: 'MW', currentHours: 45, maxHours: 40, proposals: 3, tasks: 12, overloaded: true },
      { id: 'tm-2', name: 'Sarah Johnson', role: 'CAP', avatar: 'SJ', currentHours: 38, maxHours: 40, proposals: 4, tasks: 8, overloaded: false },
      { id: 'tm-3', name: 'Mike Chen', role: 'SA', avatar: 'MC', currentHours: 42, maxHours: 40, proposals: 2, tasks: 15, overloaded: true },
      { id: 'tm-4', name: 'Emily Davis', role: 'TW', avatar: 'ED', currentHours: 35, maxHours: 40, proposals: 5, tasks: 20, overloaded: false },
      { id: 'tm-5', name: 'James Wilson', role: 'FIN', avatar: 'JW', currentHours: 40, maxHours: 40, proposals: 3, tasks: 10, overloaded: false },
      { id: 'tm-6', name: 'Lisa Brown', role: 'CON', avatar: 'LB', currentHours: 32, maxHours: 40, proposals: 2, tasks: 6, overloaded: false },
      { id: 'tm-7', name: 'Tom Garcia', role: 'QA', avatar: 'TG', currentHours: 28, maxHours: 40, proposals: 4, tasks: 14, overloaded: false },
      { id: 'tm-8', name: 'Anna Lee', role: 'SME', avatar: 'AL', currentHours: 20, maxHours: 40, proposals: 2, tasks: 4, overloaded: false },
    ];

    const DEMO_PROPOSALS = [
      { id: 'prop-1', name: 'MHS GENESIS Support', phase: 'Pink Team', dueDate: '2025-02-15', team: ['MW', 'MC', 'ED'] },
      { id: 'prop-2', name: 'VA Telehealth Platform', phase: 'Blue Team', dueDate: '2025-02-28', team: ['SJ', 'ED', 'JW'] },
      { id: 'prop-3', name: 'CMS Data Analytics', phase: 'Red Team', dueDate: '2025-02-10', team: ['MW', 'SJ', 'TG'] },
      { id: 'prop-4', name: 'IHS EHR Modernization', phase: 'Gate 1', dueDate: '2025-03-15', team: ['LB', 'AL', 'ED'] },
    ];

    function TeamWorkloadApp() {
      const [team, setTeam] = useState(DEMO_TEAM);
      const [proposals, setProposals] = useState(DEMO_PROPOSALS);
      const [loading, setLoading] = useState(false);
      const [viewMode, setViewMode] = useState('grid');
      const [sortBy, setSortBy] = useState('workload');

      const sortedTeam = [...team].sort((a, b) => {
        if (sortBy === 'workload') return (b.currentHours / b.maxHours) - (a.currentHours / a.maxHours);
        if (sortBy === 'name') return a.name.localeCompare(b.name);
        if (sortBy === 'proposals') return b.proposals - a.proposals;
        return 0;
      });

      const stats = {
        totalMembers: team.length,
        overloaded: team.filter(t => t.overloaded).length,
        avgUtilization: Math.round(team.reduce((acc, t) => acc + (t.currentHours / t.maxHours) * 100, 0) / team.length),
        totalHours: team.reduce((acc, t) => acc + t.currentHours, 0),
      };

      const getUtilizationColor = (current, max) => {
        const pct = (current / max) * 100;
        if (pct >= 100) return '#EF4444';
        if (pct >= 85) return '#F59E0B';
        if (pct >= 60) return '#00D29F';
        return '#3B82F6';
      };

      return (
        <div className="min-h-screen bg-[#00050F]">
          <header className="glass-card border-b border-white/10 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="text-gray-400 hover:text-white transition-colors">
                    <Icon name="home" className="w-5 h-5" />
                  </a>
                  <div className="w-px h-6 bg-white/20" />
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-teal-500 to-cyan-600 flex items-center justify-center">
                      <Icon name="users" className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white">Team Workload</h1>
                      <p className="text-xs text-gray-400">Capacity & resource planning</p>
                    </div>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <select
                    value={sortBy}
                    onChange={(e) => setSortBy(e.target.value)}
                    className="px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none"
                  >
                    <option value="workload">Sort by Workload</option>
                    <option value="name">Sort by Name</option>
                    <option value="proposals">Sort by Proposals</option>
                  </select>
                  <button className="px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-gray-400 hover:text-white transition-colors flex items-center gap-2">
                    <Icon name="refresh" className="w-4 h-4" />
                    Refresh
                  </button>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8">
            {/* Stats */}
            <div className="grid grid-cols-4 gap-4 mb-8">
              {[
                { label: 'Team Members', value: stats.totalMembers, icon: 'users', color: '#00E5FA' },
                { label: 'Overloaded', value: stats.overloaded, icon: 'alert', color: '#EF4444' },
                { label: 'Avg Utilization', value: `${stats.avgUtilization}%`, icon: 'trending', color: stats.avgUtilization > 85 ? '#F59E0B' : '#00D29F' },
                { label: 'Total Hours/Week', value: stats.totalHours, icon: 'clock', color: '#8B5CF6' },
              ].map((stat, idx) => (
                <div key={idx} className="glass-card rounded-xl p-4">
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-gray-400 text-sm">{stat.label}</span>
                    <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ background: `${stat.color}20` }}>
                      <Icon name={stat.icon} className="w-4 h-4" style={{ color: stat.color }} />
                    </div>
                  </div>
                  <div className="text-2xl font-bold" style={{ color: stat.label === 'Overloaded' && stat.value > 0 ? stat.color : '#fff' }}>
                    {stat.value}
                  </div>
                </div>
              ))}
            </div>

            {/* Team Grid */}
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
              {sortedTeam.map((member, idx) => {
                const role = ROLES.find(r => r.key === member.role);
                const utilizationPct = Math.round((member.currentHours / member.maxHours) * 100);
                const utilizationColor = getUtilizationColor(member.currentHours, member.maxHours);

                return (
                  <div
                    key={member.id}
                    className={`glass-card rounded-xl p-5 transition-all animate-slideUp ${
                      member.overloaded ? 'border-red-500/50' : ''
                    }`}
                    style={{ animationDelay: `${idx * 50}ms` }}
                  >
                    <div className="flex items-center gap-3 mb-4">
                      <div 
                        className="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold"
                        style={{ backgroundColor: role?.color }}
                      >
                        {member.avatar}
                      </div>
                      <div>
                        <h3 className="font-semibold text-white">{member.name}</h3>
                        <p className="text-xs text-gray-400">{role?.name}</p>
                      </div>
                    </div>

                    <div className="mb-4">
                      <div className="flex justify-between text-sm mb-1">
                        <span className="text-gray-400">Utilization</span>
                        <span style={{ color: utilizationColor }}>{utilizationPct}%</span>
                      </div>
                      <div className="h-2 bg-white/10 rounded-full overflow-hidden">
                        <div 
                          className="h-full rounded-full transition-all"
                          style={{ width: `${Math.min(utilizationPct, 100)}%`, backgroundColor: utilizationColor }}
                        />
                      </div>
                      <div className="flex justify-between text-xs text-gray-500 mt-1">
                        <span>{member.currentHours}h</span>
                        <span>{member.maxHours}h max</span>
                      </div>
                    </div>

                    <div className="flex items-center justify-between text-sm">
                      <div className="flex items-center gap-1 text-gray-400">
                        <Icon name="briefcase" className="w-4 h-4" />
                        <span>{member.proposals} proposals</span>
                      </div>
                      <div className="flex items-center gap-1 text-gray-400">
                        <Icon name="check" className="w-4 h-4" />
                        <span>{member.tasks} tasks</span>
                      </div>
                    </div>

                    {member.overloaded && (
                      <div className="mt-3 px-3 py-2 bg-red-500/10 border border-red-500/30 rounded-lg flex items-center gap-2">
                        <Icon name="alert" className="w-4 h-4 text-red-400" />
                        <span className="text-xs text-red-400">Over capacity</span>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Active Proposals */}
            <div className="glass-card rounded-xl p-6">
              <h3 className="text-lg font-semibold text-white mb-4">Active Proposals</h3>
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="border-b border-white/10">
                      <th className="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase">Proposal</th>
                      <th className="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase">Phase</th>
                      <th className="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase">Due Date</th>
                      <th className="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase">Team</th>
                    </tr>
                  </thead>
                  <tbody>
                    {proposals.map((prop, idx) => (
                      <tr key={prop.id} className="border-b border-white/5 animate-slideUp" style={{ animationDelay: `${idx * 50}ms` }}>
                        <td className="px-4 py-4 font-medium text-white">{prop.name}</td>
                        <td className="px-4 py-4">
                          <span className={`px-3 py-1 rounded-full text-xs font-medium ${
                            prop.phase === 'Red Team' ? 'bg-red-500/20 text-red-400' :
                            prop.phase === 'Pink Team' ? 'bg-pink-500/20 text-pink-400' :
                            prop.phase === 'Blue Team' ? 'bg-blue-500/20 text-blue-400' :
                            'bg-gray-500/20 text-gray-400'
                          }`}>
                            {prop.phase}
                          </span>
                        </td>
                        <td className="px-4 py-4 text-gray-300">{prop.dueDate}</td>
                        <td className="px-4 py-4">
                          <div className="flex -space-x-2">
                            {prop.team.map((avatar, i) => {
                              const member = team.find(t => t.avatar === avatar);
                              const role = ROLES.find(r => r.key === member?.role);
                              return (
                                <div
                                  key={i}
                                  className="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-medium border-2 border-[#111C2E]"
                                  style={{ backgroundColor: role?.color }}
                                  title={member?.name}
                                >
                                  {avatar}
                                </div>
                              );
                            })}
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </main>

          <footer className="border-t border-white/10 py-4 mt-12">
            <div className="max-w-7xl mx-auto px-6 text-center text-xs text-gray-500">
              © 2026 Mission Meets Tech • MissionPulse v2.0 • Sprint 59
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<TeamWorkloadApp />, document.getElementById('root'));
  </script>
</body>
</html>
