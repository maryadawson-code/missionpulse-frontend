<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feature Suggestions | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass-card { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.1); }
    .suggestion-card { transition: all 0.2s; }
    .suggestion-card:hover { border-color: rgba(0, 229, 250, 0.3); }
    .vote-btn { transition: all 0.2s; }
    .vote-btn:hover { transform: scale(1.1); }
    .vote-btn.voted { color: #00e5fa; }
    .status-under_review { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
    .status-planned { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
    .status-in_progress { background: rgba(168, 85, 247, 0.2); color: #a855f7; }
    .status-completed { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .status-declined { background: rgba(107, 114, 128, 0.2); color: #6b7280; }
    .status-new { background: rgba(0, 229, 250, 0.2); color: #00e5fa; }
    .category-badge { font-size: 10px; padding: 2px 8px; border-radius: 9999px; }
  </style>
</head>
<body class="text-white">
  <div class="min-h-screen p-6">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold text-cyan-400">Feature Suggestions</h1>
        <p class="text-gray-400 text-sm">Help shape the future of MissionPulse</p>
      </div>
      <div class="flex gap-3">
        <button onclick="openSubmitModal()" class="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg text-sm font-medium transition-colors">
          + Submit Idea
        </button>
        <a href="index.html" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm transition-colors">
          ← Dashboard
        </a>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 mb-8">
      <div class="glass-card rounded-xl p-4 text-center">
        <div class="text-3xl font-bold text-cyan-400" id="statTotal">-</div>
        <div class="text-xs text-gray-400 mt-1">Total Ideas</div>
      </div>
      <div class="glass-card rounded-xl p-4 text-center">
        <div class="text-3xl font-bold text-yellow-400" id="statReview">-</div>
        <div class="text-xs text-gray-400 mt-1">Under Review</div>
      </div>
      <div class="glass-card rounded-xl p-4 text-center">
        <div class="text-3xl font-bold text-blue-400" id="statPlanned">-</div>
        <div class="text-xs text-gray-400 mt-1">Planned</div>
      </div>
      <div class="glass-card rounded-xl p-4 text-center">
        <div class="text-3xl font-bold text-purple-400" id="statProgress">-</div>
        <div class="text-xs text-gray-400 mt-1">In Progress</div>
      </div>
      <div class="glass-card rounded-xl p-4 text-center">
        <div class="text-3xl font-bold text-green-400" id="statCompleted">-</div>
        <div class="text-xs text-gray-400 mt-1">Completed</div>
      </div>
      <div class="glass-card rounded-xl p-4 text-center">
        <div class="text-3xl font-bold text-gray-400" id="statVotes">-</div>
        <div class="text-xs text-gray-400 mt-1">Total Votes</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap gap-4 mb-6">
      <select id="filterCategory" class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-sm focus:border-cyan-500 focus:outline-none">
        <option value="">All Categories</option>
        <option value="pipeline">Pipeline & Capture</option>
        <option value="compliance">Compliance & Contracts</option>
        <option value="pricing">Pricing & BOE</option>
        <option value="ai">AI & Automation</option>
        <option value="integrations">Integrations</option>
        <option value="reporting">Reporting & Analytics</option>
        <option value="ux">User Experience</option>
        <option value="other">Other</option>
      </select>
      <select id="filterStatus" class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-sm focus:border-cyan-500 focus:outline-none">
        <option value="">All Statuses</option>
        <option value="new">New</option>
        <option value="under_review">Under Review</option>
        <option value="planned">Planned</option>
        <option value="in_progress">In Progress</option>
        <option value="completed">Completed</option>
        <option value="declined">Declined</option>
      </select>
      <select id="sortBy" class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-sm focus:border-cyan-500 focus:outline-none">
        <option value="votes">Most Voted</option>
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
      </select>
      <input type="text" id="searchInput" placeholder="Search suggestions..."
        class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-sm focus:border-cyan-500 focus:outline-none flex-1 min-w-[200px]">
    </div>

    <!-- Suggestions List -->
    <div class="space-y-4" id="suggestionsList">
      <div class="text-center py-12 text-gray-500">Loading suggestions...</div>
    </div>

    <!-- Submit Modal -->
    <div id="submitModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
      <div class="glass-card rounded-2xl w-full max-w-lg">
        <div class="p-6 border-b border-gray-800 flex items-center justify-between">
          <h3 class="text-lg font-semibold">Submit Feature Idea</h3>
          <button onclick="closeSubmitModal()" class="text-gray-400 hover:text-white">✕</button>
        </div>
        <div class="p-6 space-y-4">
          <div>
            <label class="block text-sm text-gray-400 mb-1">Title *</label>
            <input type="text" id="suggestionTitle" maxlength="100"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:border-cyan-500 focus:outline-none"
              placeholder="Brief summary of your idea">
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1">Category *</label>
            <select id="suggestionCategory" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:border-cyan-500 focus:outline-none">
              <option value="">Select category...</option>
              <option value="pipeline">Pipeline & Capture</option>
              <option value="compliance">Compliance & Contracts</option>
              <option value="pricing">Pricing & BOE</option>
              <option value="ai">AI & Automation</option>
              <option value="integrations">Integrations</option>
              <option value="reporting">Reporting & Analytics</option>
              <option value="ux">User Experience</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1">Description *</label>
            <textarea id="suggestionDescription" rows="4" maxlength="1000"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:border-cyan-500 focus:outline-none resize-none"
              placeholder="Describe your idea in detail. What problem does it solve? How would it work?"></textarea>
            <div class="text-xs text-gray-500 text-right mt-1"><span id="charCount">0</span>/1000</div>
          </div>
          <div id="submitError" class="hidden text-red-400 text-sm"></div>
          <button onclick="submitSuggestion()" class="w-full py-3 bg-cyan-600 hover:bg-cyan-500 rounded-lg font-medium transition-colors">
            Submit Idea
          </button>
        </div>
      </div>
    </div>

    <!-- Detail Modal -->
    <div id="detailModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
      <div class="glass-card rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
        <div class="p-6 border-b border-gray-800 flex items-center justify-between">
          <h3 class="text-lg font-semibold" id="detailTitle">Feature Details</h3>
          <button onclick="closeDetailModal()" class="text-gray-400 hover:text-white">✕</button>
        </div>
        <div class="p-6" id="detailContent"></div>
      </div>
    </div>
  </div>

  <script>
    // Supabase Configuration
    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let suggestions = [];
    let userVotes = new Set();
    let currentUser = null;
    let isAdmin = false;

    const categoryColors = {
      pipeline: 'bg-blue-500/30 text-blue-300',
      compliance: 'bg-red-500/30 text-red-300',
      pricing: 'bg-yellow-500/30 text-yellow-300',
      ai: 'bg-purple-500/30 text-purple-300',
      integrations: 'bg-green-500/30 text-green-300',
      reporting: 'bg-orange-500/30 text-orange-300',
      ux: 'bg-pink-500/30 text-pink-300',
      other: 'bg-gray-500/30 text-gray-300'
    };

    const categoryLabels = {
      pipeline: 'Pipeline & Capture',
      compliance: 'Compliance',
      pricing: 'Pricing & BOE',
      ai: 'AI & Automation',
      integrations: 'Integrations',
      reporting: 'Reporting',
      ux: 'User Experience',
      other: 'Other'
    };

    // Check auth
    async function checkAuth() {
      const { data: { user } } = await supabase.auth.getUser();
      if (user) {
        currentUser = user;
        const { data: profile } = await supabase.from('profiles').select('role').eq('id', user.id).single();
        isAdmin = profile && ['CEO', 'COO', 'Admin'].includes(profile.role);
        await loadUserVotes();
      }
      return !!user;
    }

    // Load user's votes
    async function loadUserVotes() {
      if (!currentUser) return;
      const { data } = await supabase
        .from('feature_votes')
        .select('suggestion_id')
        .eq('user_id', currentUser.id);
      if (data) userVotes = new Set(data.map(v => v.suggestion_id));
    }

    // Load suggestions
    async function loadSuggestions() {
      const { data, error } = await supabase
        .from('feature_suggestions')
        .select('*')
        .order('votes', { ascending: false });
      
      if (error) {
        console.error('Error:', error);
        document.getElementById('suggestionsList').innerHTML = 
          '<div class="text-center py-12 text-red-400">Error loading suggestions. Run SQL migration first.</div>';
        return;
      }
      
      suggestions = data || [];
      updateStats();
      renderSuggestions();
    }

    // Update stats
    function updateStats() {
      const stats = { new: 0, under_review: 0, planned: 0, in_progress: 0, completed: 0, declined: 0 };
      let totalVotes = 0;
      
      suggestions.forEach(s => {
        if (stats[s.status] !== undefined) stats[s.status]++;
        totalVotes += s.votes || 0;
      });
      
      document.getElementById('statTotal').textContent = suggestions.length;
      document.getElementById('statReview').textContent = stats.under_review;
      document.getElementById('statPlanned').textContent = stats.planned;
      document.getElementById('statProgress').textContent = stats.in_progress;
      document.getElementById('statCompleted').textContent = stats.completed;
      document.getElementById('statVotes').textContent = totalVotes;
    }

    // Render suggestions
    function renderSuggestions() {
      const category = document.getElementById('filterCategory').value;
      const status = document.getElementById('filterStatus').value;
      const sortBy = document.getElementById('sortBy').value;
      const search = document.getElementById('searchInput').value.toLowerCase();
      
      let filtered = suggestions.filter(s => {
        const matchCat = !category || s.category === category;
        const matchStatus = !status || s.status === status;
        const matchSearch = !search || s.title.toLowerCase().includes(search) || s.description.toLowerCase().includes(search);
        return matchCat && matchStatus && matchSearch;
      });
      
      // Sort
      if (sortBy === 'votes') filtered.sort((a, b) => (b.votes || 0) - (a.votes || 0));
      else if (sortBy === 'newest') filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      else if (sortBy === 'oldest') filtered.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
      
      const container = document.getElementById('suggestionsList');
      
      if (filtered.length === 0) {
        container.innerHTML = '<div class="text-center py-12 text-gray-500">No suggestions found. Be the first to submit an idea!</div>';
        return;
      }
      
      container.innerHTML = filtered.map(s => {
        const hasVoted = userVotes.has(s.id);
        return `
          <div class="glass-card suggestion-card rounded-xl p-5 flex gap-4">
            <!-- Vote Section -->
            <div class="flex flex-col items-center min-w-[60px]">
              <button onclick="vote('${s.id}')" class="vote-btn text-2xl ${hasVoted ? 'voted' : 'text-gray-500 hover:text-cyan-400'}" ${!currentUser ? 'disabled title="Login to vote"' : ''}>
                ${hasVoted ? '▲' : '△'}
              </button>
              <span class="text-lg font-bold ${hasVoted ? 'text-cyan-400' : 'text-gray-300'}">${s.votes || 0}</span>
              <span class="text-xs text-gray-500">votes</span>
            </div>
            
            <!-- Content -->
            <div class="flex-1 min-w-0">
              <div class="flex items-start justify-between gap-3 mb-2">
                <h3 class="font-semibold cursor-pointer hover:text-cyan-400" onclick="openDetail('${s.id}')">${escapeHtml(s.title)}</h3>
                <span class="status-${s.status} px-2 py-1 rounded text-xs whitespace-nowrap">${formatStatus(s.status)}</span>
              </div>
              <p class="text-sm text-gray-400 mb-3 line-clamp-2">${escapeHtml(s.description)}</p>
              <div class="flex items-center gap-3 text-xs">
                <span class="category-badge ${categoryColors[s.category] || categoryColors.other}">${categoryLabels[s.category] || s.category}</span>
                <span class="text-gray-500">${formatDate(s.created_at)}</span>
                ${isAdmin ? `<button onclick="openAdmin('${s.id}')" class="text-cyan-400 hover:underline ml-auto">Manage</button>` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Vote
    async function vote(id) {
      if (!currentUser) {
        alert('Please login to vote');
        window.location.href = 'login.html';
        return;
      }
      
      const hasVoted = userVotes.has(id);
      
      if (hasVoted) {
        // Remove vote
        await supabase.from('feature_votes').delete().eq('suggestion_id', id).eq('user_id', currentUser.id);
        await supabase.rpc('decrement_votes', { suggestion_id: id });
        userVotes.delete(id);
      } else {
        // Add vote
        await supabase.from('feature_votes').insert({ suggestion_id: id, user_id: currentUser.id });
        await supabase.rpc('increment_votes', { suggestion_id: id });
        userVotes.add(id);
      }
      
      // Update local data
      const suggestion = suggestions.find(s => s.id === id);
      if (suggestion) suggestion.votes = (suggestion.votes || 0) + (hasVoted ? -1 : 1);
      
      updateStats();
      renderSuggestions();
    }

    // Submit suggestion
    function openSubmitModal() {
      if (!currentUser) {
        alert('Please login to submit suggestions');
        window.location.href = 'login.html';
        return;
      }
      document.getElementById('submitModal').classList.remove('hidden');
    }
    
    function closeSubmitModal() {
      document.getElementById('submitModal').classList.add('hidden');
      document.getElementById('suggestionTitle').value = '';
      document.getElementById('suggestionCategory').value = '';
      document.getElementById('suggestionDescription').value = '';
      document.getElementById('submitError').classList.add('hidden');
    }

    async function submitSuggestion() {
      const title = document.getElementById('suggestionTitle').value.trim();
      const category = document.getElementById('suggestionCategory').value;
      const description = document.getElementById('suggestionDescription').value.trim();
      const errorEl = document.getElementById('submitError');
      
      if (!title || !category || !description) {
        errorEl.textContent = 'All fields are required';
        errorEl.classList.remove('hidden');
        return;
      }
      
      const { error } = await supabase.from('feature_suggestions').insert({
        title, category, description, submitted_by: currentUser.id, status: 'new', votes: 0
      });
      
      if (error) {
        errorEl.textContent = error.message;
        errorEl.classList.remove('hidden');
        return;
      }
      
      closeSubmitModal();
      loadSuggestions();
    }

    // Detail view
    function openDetail(id) {
      const s = suggestions.find(x => x.id === id);
      if (!s) return;
      
      document.getElementById('detailTitle').textContent = s.title;
      document.getElementById('detailContent').innerHTML = `
        <div class="space-y-4">
          <div class="flex items-center gap-3">
            <span class="category-badge ${categoryColors[s.category] || categoryColors.other}">${categoryLabels[s.category] || s.category}</span>
            <span class="status-${s.status} px-2 py-1 rounded text-xs">${formatStatus(s.status)}</span>
            <span class="text-gray-500 text-sm ml-auto">${s.votes || 0} votes</span>
          </div>
          <div class="text-gray-300 whitespace-pre-wrap">${escapeHtml(s.description)}</div>
          <div class="text-xs text-gray-500">Submitted ${formatDate(s.created_at)}</div>
          ${s.admin_response ? `
            <div class="mt-4 p-4 bg-cyan-500/10 border border-cyan-500/30 rounded-lg">
              <div class="text-xs text-cyan-400 mb-1">Admin Response:</div>
              <div class="text-sm text-gray-300">${escapeHtml(s.admin_response)}</div>
            </div>
          ` : ''}
        </div>
      `;
      document.getElementById('detailModal').classList.remove('hidden');
    }
    
    function closeDetailModal() { document.getElementById('detailModal').classList.add('hidden'); }

    // Admin functions
    async function openAdmin(id) {
      const s = suggestions.find(x => x.id === id);
      if (!s) return;
      
      const newStatus = prompt(`Update status for: ${s.title}\n\nCurrent: ${s.status}\n\nOptions: new, under_review, planned, in_progress, completed, declined`, s.status);
      if (!newStatus || newStatus === s.status) return;
      
      const validStatuses = ['new', 'under_review', 'planned', 'in_progress', 'completed', 'declined'];
      if (!validStatuses.includes(newStatus)) {
        alert('Invalid status');
        return;
      }
      
      const { error } = await supabase.from('feature_suggestions').update({ status: newStatus }).eq('id', id);
      if (error) { alert('Error: ' + error.message); return; }
      
      loadSuggestions();
    }

    // Helpers
    function escapeHtml(str) { return str ? str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
    function formatDate(d) { return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
    function formatStatus(s) {
      const labels = { new: 'New', under_review: 'Under Review', planned: 'Planned', in_progress: 'In Progress', completed: 'Completed', declined: 'Declined' };
      return labels[s] || s;
    }

    // Character counter
    document.getElementById('suggestionDescription').addEventListener('input', function() {
      document.getElementById('charCount').textContent = this.value.length;
    });

    // Event listeners
    document.getElementById('filterCategory').addEventListener('change', renderSuggestions);
    document.getElementById('filterStatus').addEventListener('change', renderSuggestions);
    document.getElementById('sortBy').addEventListener('change', renderSuggestions);
    document.getElementById('searchInput').addEventListener('input', renderSuggestions);

    // Initialize
    checkAuth().then(() => loadSuggestions());
  </script>
</body>
</html>
