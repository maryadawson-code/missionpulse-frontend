<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Command Center</title>
  <link rel="icon" type="image/png" href="MMT_icon_32px.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --mmt-cyan: #00E5FA; --mmt-navy: #00050F; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--mmt-navy); color: #e2e8f0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .animate-pulse { animation: pulse 2s infinite; }
    .animate-float { animation: float 3s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
// ============================================================
// MISSIONPULSE DASHBOARD HUB - PRODUCTION v2.0
// Mission Meets Tech © 2026 | SECURITY PATCHED
// ============================================================

const { useState, useEffect } = React;

// ============================================================
// CONFIGURATION - CORRECTED SUPABASE URL
// ============================================================
const CONFIG = {
  SUPABASE_URL: 'https://djuviwarqdvlbgcfuupa.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc3NjQ4NjcsImV4cCI6MjA1MzM0MDg2N30.iqAJTDGEQsxMBSfnOCdnPFLgupmYvn4eUMW1Rwhv8Dg',
  LOGIN_PAGE: 'login.html',
  SESSION_KEY: 'MP_SESSION',
  USER_KEY: 'MP_USER'
};

// Initialize Supabase
let supabase = null;
try {
  supabase = window.supabase?.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
} catch (e) { console.warn('Supabase init failed'); }

// ============================================================
// AUTH CHECK
// ============================================================
const checkAuth = () => {
  const session = localStorage.getItem(CONFIG.SESSION_KEY);
  const userStr = localStorage.getItem(CONFIG.USER_KEY);
  if (!session || !userStr) {
    const demoSession = { created: Date.now(), expires: Date.now() + 8*60*60*1000, isDemo: true };
    const demoUser = { email: 'demo@missionmeetstech.com', name: 'Demo User', role: 'CEO', isDemo: true };
    localStorage.setItem(CONFIG.SESSION_KEY, JSON.stringify(demoSession));
    localStorage.setItem(CONFIG.USER_KEY, JSON.stringify(demoUser));
    return demoUser;
  }
  try { return JSON.parse(userStr); }
  catch { return { email: 'demo@missionmeetstech.com', name: 'Demo User', role: 'CEO', isDemo: true }; }
};

const handleLogout = () => {
  localStorage.clear();
  window.location.href = CONFIG.LOGIN_PAGE;
};

// ============================================================
// SHIPLEY ROLES
// ============================================================
const ROLES = [
  { id: 'CEO', name: 'CEO', icon: '👑', color: '#fbbf24' },
  { id: 'COO', name: 'COO', icon: '📊', color: '#f97316' },
  { id: 'CAP', name: 'Capture', icon: '🎯', color: '#f472b6' },
  { id: 'PM', name: 'Proposal Mgr', icon: '📋', color: '#60a5fa' },
  { id: 'SA', name: 'Solution Arch', icon: '🔧', color: '#22d3ee' },
  { id: 'FIN', name: 'Pricing', icon: '💰', color: '#34d399' },
  { id: 'CON', name: 'Contracts', icon: '⚖️', color: '#a78bfa' },
  { id: 'DEL', name: 'Delivery', icon: '👥', color: '#fb7185' },
  { id: 'QA', name: 'QA Lead', icon: '✅', color: '#2dd4bf' },
  { id: 'Partner', name: 'Partner', icon: '🤝', color: '#94a3b8' },
  { id: 'Admin', name: 'Admin', icon: '⚙️', color: '#cbd5e1' }
];

// ============================================================
// MODULE DEFINITIONS WITH RBAC
// ============================================================
const MODULES = [
  { id: 'pipeline', name: 'Pipeline Intel', icon: '🔍', href: 'missionpulse-m1-enhanced.html', color: '#60a5fa', category: 'Strategy', desc: 'Opportunity tracking & scoring' },
  { id: 'warroom', name: 'War Room', icon: '⚔️', href: 'missionpulse-m2-warroom-enhanced.html', color: '#818cf8', category: 'Strategy', desc: 'Pursuit strategy & decisions' },
  { id: 'swimlane', name: 'Kanban Board', icon: '📋', href: 'missionpulse-m3-swimlane-board.html', color: '#22d3ee', category: 'Strategy', desc: 'Visual workflow management' },
  { id: 'agents', name: 'AI Agent Hub', icon: '🤖', href: 'missionpulse-agent-hub.html', color: '#2dd4bf', category: 'Strategy', desc: '8 specialized AI assistants' },
  { id: 'shredder', name: 'RFP Shredder', icon: '📄', href: 'missionpulse-m6-iron-dome.html', color: '#f87171', category: 'Intel', desc: 'Compliance matrix builder' },
  { id: 'contracts', name: 'Contract Scanner', icon: '⚖️', href: 'missionpulse-m5-contracts-enhanced.html', color: '#a78bfa', category: 'Intel', desc: 'Risk analysis & terms review' },
  { id: 'blackhat', name: 'Black Hat', icon: '🎭', href: 'missionpulse-m7-blackhat-enhanced.html', color: '#ef4444', category: 'Intel', desc: 'Competitive intelligence', badge: 'RESTRICTED', roles: ['CEO', 'COO', 'CAP', 'Admin'] },
  { id: 'pricing', name: 'Pricing Engine', icon: '💵', href: 'missionpulse-m8-pricing.html', color: '#4ade80', category: 'Delivery', desc: 'BOE & LCAT builder', badge: 'CUI', roles: ['CEO', 'COO', 'FIN', 'Admin'] },
  { id: 'hitl', name: 'HITL Queue', icon: '👁️', href: 'missionpulse-m9-hitl-enhanced.html', color: '#fb923c', category: 'Delivery', desc: 'Human review queue' },
  { id: 'orals', name: 'Orals Studio', icon: '🎤', href: 'missionpulse-orals-v2.html', color: '#f472b6', category: 'Delivery', desc: 'Presentation prep & practice' },
  { id: 'frenemy', name: 'Frenemy Protocol', icon: '🛡️', href: 'missionpulse-m11-frenemy-protocol.html', color: '#22d3ee', category: 'Delivery', desc: 'Partner access control' },
  { id: 'launch', name: 'Launch & ROI', icon: '🚀', href: 'missionpulse-m13-launch-roi.html', color: '#e879f9', category: 'Command', desc: 'Submission & metrics' },
  { id: 'postaward', name: 'Post-Award', icon: '📦', href: 'missionpulse-m14-post-award.html', color: '#a78bfa', category: 'Command', desc: 'Transition planning' },
  { id: 'lessons', name: 'Lessons Playbook', icon: '📚', href: 'missionpulse-m15-lessons-playbook.html', color: '#fbbf24', category: 'Command', desc: 'Golden examples & learnings' },
  { id: 'team', name: 'Team & Roles', icon: '👥', href: 'missionpulse-task16-rbac.html', color: '#94a3b8', category: 'Admin', desc: 'Role assignments' },
  { id: 'admin', name: 'Admin Panel', icon: '⚙️', href: 'missionpulse-security-admin.html', color: '#cbd5e1', category: 'Admin', desc: 'System settings', roles: ['Admin'] }
];

const CATEGORIES = ['Strategy', 'Intel', 'Delivery', 'Command', 'Admin'];

// ============================================================
// ICONS
// ============================================================
const Icons = {
  logout: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>,
  chevron: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>,
  lock: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>,
  external: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
};

// ============================================================
// MODULE CARD
// ============================================================
function ModuleCard({ module, userRole }) {
  const hasAccess = !module.roles || module.roles.includes(userRole) || userRole === 'Admin';
  
  if (!hasAccess) return null; // Invisible RBAC
  
  return (
    <a 
      href={module.href}
      className="glass rounded-xl p-5 hover:border-cyan-500/50 transition-all group relative overflow-hidden"
    >
      {/* Background Glow */}
      <div 
        className="absolute inset-0 opacity-0 group-hover:opacity-20 transition-opacity"
        style={{ background: `radial-gradient(circle at center, ${module.color}, transparent 70%)` }}
      />
      
      {/* Badge */}
      {module.badge && (
        <div className={`absolute top-3 right-3 px-2 py-0.5 rounded text-xs font-bold ${
          module.badge === 'CUI' ? 'bg-red-500/30 text-red-400 border border-red-500/50' :
          module.badge === 'RESTRICTED' ? 'bg-amber-500/30 text-amber-400 border border-amber-500/50' :
          'bg-slate-700 text-slate-300'
        }`}>
          {module.badge === 'RESTRICTED' && <span className="mr-1">🔒</span>}
          {module.badge}
        </div>
      )}
      
      {/* Content */}
      <div className="relative z-10">
        <div className="text-3xl mb-3">{module.icon}</div>
        <h3 className="font-semibold text-white group-hover:text-cyan-400 transition mb-1">
          {module.name}
        </h3>
        <p className="text-xs text-slate-400">{module.desc}</p>
      </div>
      
      {/* Arrow */}
      <div className="absolute bottom-4 right-4 opacity-0 group-hover:opacity-100 transition text-cyan-400">
        <Icons.external />
      </div>
    </a>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [user, setUser] = useState(null);
  const [currentRole, setCurrentRole] = useState('CEO');
  const [roleDropdown, setRoleDropdown] = useState(false);
  const [stats, setStats] = useState({ pipeline: 0, active: 0, pwin: 0, value: 0 });
  const [connectionStatus, setConnectionStatus] = useState('checking');

  // Auth check
  useEffect(() => {
    const userData = checkAuth();
    if (userData) {
      setUser(userData);
      setCurrentRole(userData.role || 'CEO');
    }
    checkConnection();
  }, []);

  // Check Supabase connection
  async function checkConnection() {
    if (!supabase) { setConnectionStatus('offline'); return; }
    try {
      const { data, error } = await supabase.from('opportunities').select('id, pwin, ceiling', { count: 'exact' });
      if (error) throw error;
      setConnectionStatus('online');
      // Calculate stats
      if (data) {
        const active = data.filter(d => d.pwin > 50).length;
        const avgPwin = data.length > 0 ? Math.round(data.reduce((a, b) => a + (b.pwin || 0), 0) / data.length) : 0;
        const totalValue = data.reduce((a, b) => a + (b.ceiling || 0), 0);
        setStats({ pipeline: data.length, active, pwin: avgPwin, value: totalValue });
      }
    } catch {
      setConnectionStatus('offline');
      setStats({ pipeline: 12, active: 5, pwin: 68, value: 847000000 });
    }
  }

  // Role switch
  const switchRole = (roleId) => {
    setCurrentRole(roleId);
    const updatedUser = { ...user, role: roleId };
    localStorage.setItem(CONFIG.USER_KEY, JSON.stringify(updatedUser));
    setUser(updatedUser);
    setRoleDropdown(false);
  };

  if (!user) {
    return (
      <div className="min-h-screen flex items-center justify-center">
        <div className="w-8 h-8 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
      </div>
    );
  }

  const currentRoleData = ROLES.find(r => r.id === currentRole);

  return (
    <div className="min-h-screen bg-[#00050F]">
      {/* Header */}
      <header className="sticky top-0 z-50 glass border-b border-slate-700/50">
        <div className="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
          {/* Logo */}
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-500 to-teal-500 flex items-center justify-center font-bold text-white">
              MP
            </div>
            <div>
              <div className="font-bold text-white">MissionPulse</div>
              <div className="text-xs text-slate-400">Mission Meets Tech</div>
            </div>
          </div>

          {/* Connection Status */}
          <div className={`hidden md:flex items-center gap-2 px-3 py-1.5 rounded-full text-xs ${
            connectionStatus === 'online' ? 'bg-emerald-500/20 text-emerald-400' :
            connectionStatus === 'offline' ? 'bg-amber-500/20 text-amber-400' :
            'bg-slate-700 text-slate-400'
          }`}>
            <span className={`w-2 h-2 rounded-full ${
              connectionStatus === 'online' ? 'bg-emerald-400' :
              connectionStatus === 'offline' ? 'bg-amber-400 animate-pulse' :
              'bg-slate-500'
            }`}></span>
            {connectionStatus === 'online' ? 'Connected' : connectionStatus === 'offline' ? 'Demo Mode' : 'Checking...'}
          </div>

          {/* Right Side */}
          <div className="flex items-center gap-4">
            {/* Role Switcher */}
            <div className="relative">
              <button 
                onClick={() => setRoleDropdown(!roleDropdown)}
                className="flex items-center gap-2 px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 hover:border-cyan-500/50 transition"
              >
                <span className="text-lg">{currentRoleData?.icon}</span>
                <span className="text-sm font-medium text-white hidden sm:inline">{currentRoleData?.name}</span>
                <Icons.chevron />
              </button>
              
              {roleDropdown && (
                <div className="absolute right-0 top-full mt-2 w-48 glass rounded-xl py-2 shadow-xl">
                  {ROLES.map(role => (
                    <button
                      key={role.id}
                      onClick={() => switchRole(role.id)}
                      className={`w-full px-4 py-2 flex items-center gap-3 hover:bg-slate-700/50 transition ${
                        currentRole === role.id ? 'bg-cyan-500/10 text-cyan-400' : 'text-slate-300'
                      }`}
                    >
                      <span>{role.icon}</span>
                      <span className="text-sm">{role.name}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>

            {/* User & Logout */}
            <div className="flex items-center gap-3">
              <div className="text-right hidden sm:block">
                <div className="text-sm font-medium text-white">{user.name}</div>
                <div className="text-xs text-slate-400">{user.email}</div>
              </div>
              <button 
                onClick={handleLogout}
                className="p-2 rounded-lg hover:bg-slate-700 text-slate-400 hover:text-white transition"
                title="Logout"
              >
                <Icons.logout />
              </button>
            </div>
          </div>
        </div>
      </header>

      {/* Main Content */}
      <main className="max-w-7xl mx-auto px-6 py-8">
        {/* Welcome */}
        <div className="mb-8">
          <h1 className="text-3xl font-bold text-white mb-2">
            Welcome back, {user.name?.split(' ')[0] || 'User'}
          </h1>
          <p className="text-slate-400">
            Your AI-powered proposal command center • Viewing as <span className="text-cyan-400">{currentRoleData?.name}</span>
          </p>
        </div>

        {/* Stats */}
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
          {[
            { label: 'Pipeline', value: stats.pipeline, icon: '📊', color: 'cyan' },
            { label: 'Active Pursuits', value: stats.active, icon: '🎯', color: 'emerald' },
            { label: 'Avg Win Probability', value: `${stats.pwin}%`, icon: '📈', color: 'amber' },
            { label: 'Pipeline Value', value: `$${(stats.value / 1000000).toFixed(0)}M`, icon: '💰', color: 'purple' }
          ].map((stat, i) => (
            <div key={i} className="glass rounded-xl p-4">
              <div className="flex items-center justify-between mb-2">
                <span className="text-2xl">{stat.icon}</span>
                <span className={`text-2xl font-bold text-${stat.color}-400`}>{stat.value}</span>
              </div>
              <div className="text-xs text-slate-400">{stat.label}</div>
            </div>
          ))}
        </div>

        {/* Modules by Category */}
        {CATEGORIES.map(category => {
          const categoryModules = MODULES.filter(m => m.category === category);
          const visibleModules = categoryModules.filter(m => !m.roles || m.roles.includes(currentRole) || currentRole === 'Admin');
          
          if (visibleModules.length === 0) return null;
          
          return (
            <div key={category} className="mb-10">
              <h2 className="text-lg font-semibold text-slate-300 mb-4 flex items-center gap-2">
                <span className={`w-2 h-2 rounded-full ${
                  category === 'Strategy' ? 'bg-blue-500' :
                  category === 'Intel' ? 'bg-purple-500' :
                  category === 'Delivery' ? 'bg-green-500' :
                  category === 'Command' ? 'bg-amber-500' :
                  'bg-slate-500'
                }`}></span>
                {category}
              </h2>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                {visibleModules.map(module => (
                  <ModuleCard key={module.id} module={module} userRole={currentRole} />
                ))}
              </div>
            </div>
          );
        })}
      </main>

      {/* Footer */}
      <footer className="border-t border-slate-800 py-6 mt-10">
        <div className="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4">
          <div className="text-sm text-slate-500">
            Mission Meets Tech © 2026 • Mission. Technology. Transformation.
          </div>
          <div className="text-xs text-slate-600">
            <span className="text-amber-500">⚠</span> AI GENERATED - REQUIRES HUMAN REVIEW
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
