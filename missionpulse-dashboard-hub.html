<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MissionPulse - Dashboard Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .module-card { transition: all 0.3s ease; }
        .module-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .new-badge { animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // =========================================================================
        // MODULE DEFINITIONS - ALL V2 MODULES
        // =========================================================================
        const MODULES = [
            // CORE PROPOSAL LIFECYCLE
            {
                category: 'Proposal Lifecycle',
                items: [
                    { id: 'm1', name: 'Pipeline Dashboard', icon: '📊', href: 'missionpulse-m1-enhanced.html', description: 'Opportunity tracking & metrics', status: 'live' },
                    { id: 'm2', name: 'War Room', icon: '🎯', href: 'missionpulse-m2-warroom-enhanced.html', description: 'Active proposal command center', status: 'live' },
                    { id: 'm3', name: 'Swimlane Board', icon: '📋', href: 'missionpulse-m3-swimlane-board.html', description: 'Kanban workflow management', status: 'live' },
                    { id: 'solo', name: 'Solo Manager', icon: '🎯', href: 'missionpulse-solo-manager.html', description: 'Guided Shipley workflow for small teams', status: 'new', badge: 'NEW' },
                ]
            },
            // AI & INTELLIGENCE
            {
                category: 'AI & Intelligence',
                items: [
                    { id: 'hub', name: 'Agent Hub', icon: '🤖', href: 'missionpulse-agent-hub-v2.html', description: '8 specialized AI agents', status: 'live' },
                    { id: 'm7', name: 'Black Hat', icon: '🎩', href: 'missionpulse-m7-blackhat-enhanced.html', description: 'Competitor intelligence', status: 'live', rbac: 'CEO/COO/CAP' },
                    { id: 'kb', name: 'Knowledge Base', icon: '🧠', href: 'missionpulse-knowledge-base.html', description: 'Train AI with company docs', status: 'new', badge: 'NEW' },
                    { id: 'visual', name: 'Visual Generator', icon: '🎨', href: 'missionpulse-visual-generator.html', description: 'AI-powered diagrams', status: 'new', badge: 'NEW' },
                ]
            },
            // COMPLIANCE & CONTRACTS
            {
                category: 'Compliance & Contracts',
                items: [
                    { id: 'm5', name: 'Contract Scanner', icon: '📜', href: 'missionpulse-m5-contracts-enhanced.html', description: 'FAR/DFARS compliance', status: 'live' },
                    { id: 'm6', name: 'Iron Dome', icon: '🛡️', href: 'missionpulse-m6-iron-dome.html', description: 'Compliance checkpoint tracking', status: 'live' },
                    { id: 'm9', name: 'HITL Queue', icon: '👁️', href: 'missionpulse-m9-hitl-enhanced.html', description: 'Human-in-the-loop AI governance', status: 'live' },
                ]
            },
            // PRICING & FINANCIALS
            {
                category: 'Pricing & Financials',
                items: [
                    { id: 'm8', name: 'Pricing Engine', icon: '💰', href: 'missionpulse-m8-pricing.html', description: 'BOE builder & PTW analysis', status: 'live', cui: true },
                    { id: 'm13', name: 'Launch ROI', icon: '🚀', href: 'missionpulse-m13-launch-roi.html', description: 'Investment & return tracking', status: 'live' },
                ]
            },
            // ORALS & PRESENTATIONS
            {
                category: 'Orals & Presentations',
                items: [
                    { id: 'orals', name: 'Orals Studio', icon: '🎤', href: 'missionpulse-orals-v2.html', description: 'Practice with timer & scoring', status: 'live' },
                    { id: 'm11', name: 'Frenemy Protocol', icon: '🤝', href: 'missionpulse-m11-frenemy-protocol.html', description: 'Teaming partner management', status: 'live' },
                ]
            },
            // POST-AWARD & LEARNING
            {
                category: 'Post-Award & Learning',
                items: [
                    { id: 'm14', name: 'Post-Award', icon: '🏆', href: 'missionpulse-m14-post-award.html', description: 'Transition & kickoff', status: 'live' },
                    { id: 'm15', name: 'Lessons Playbook', icon: '📚', href: 'missionpulse-m15-lessons-playbook.html', description: 'Win/loss analysis library', status: 'live' },
                    { id: 'suggest', name: 'Feature Ideas', icon: '💡', href: 'missionpulse-feature-suggestions.html', description: 'Vote on roadmap features', status: 'new', badge: 'NEW' },
                ]
            },
            // ADMIN & SECURITY
            {
                category: 'Admin & Security',
                items: [
                    { id: 'rbac', name: 'Team & Roles', icon: '👥', href: 'missionpulse-task16-rbac.html', description: 'User management & permissions', status: 'live' },
                    { id: 'security', name: 'Security Admin', icon: '🔒', href: 'missionpulse-security-admin.html', description: 'Multi-tenant isolation audit', status: 'live' },
                    { id: 'leads', name: 'Leads Admin', icon: '📥', href: 'missionpulse-leads-admin.html', description: 'Access request management', status: 'live' },
                    { id: 'request', name: 'Request Access', icon: '🚪', href: 'missionpulse-request-access.html', description: 'Public signup form', status: 'live' },
                ]
            },
        ];

        // =========================================================================
        // COMPONENTS
        // =========================================================================

        function ModuleCard({ module }) {
            return (
                <a 
                    href={module.href}
                    className="module-card glass rounded-xl p-4 block hover:border-cyan-500/50"
                >
                    <div className="flex items-start justify-between mb-3">
                        <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-500/20 to-emerald-500/20 flex items-center justify-center text-2xl">
                            {module.icon}
                        </div>
                        <div className="flex items-center gap-2">
                            {module.badge && (
                                <span className="new-badge px-2 py-0.5 bg-emerald-500 text-white text-xs font-bold rounded">
                                    {module.badge}
                                </span>
                            )}
                            {module.cui && (
                                <span className="px-2 py-0.5 bg-amber-500/20 text-amber-400 text-xs rounded">
                                    CUI
                                </span>
                            )}
                            {module.rbac && (
                                <span className="px-2 py-0.5 bg-purple-500/20 text-purple-400 text-xs rounded">
                                    {module.rbac}
                                </span>
                            )}
                        </div>
                    </div>
                    <h3 className="font-semibold text-white mb-1">{module.name}</h3>
                    <p className="text-sm text-slate-400">{module.description}</p>
                </a>
            );
        }

        function CategorySection({ category, items }) {
            return (
                <div className="mb-8">
                    <h2 className="text-lg font-bold text-white mb-4 flex items-center gap-2">
                        <span className="w-2 h-2 rounded-full bg-cyan-500"></span>
                        {category}
                    </h2>
                    <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-4">
                        {items.map(module => (
                            <ModuleCard key={module.id} module={module} />
                        ))}
                    </div>
                </div>
            );
        }

        // =========================================================================
        // MAIN APP
        // =========================================================================
        function App() {
            const [isOnline, setIsOnline] = useState(true);

            const totalModules = MODULES.reduce((sum, cat) => sum + cat.items.length, 0);
            const newModules = MODULES.reduce((sum, cat) => sum + cat.items.filter(m => m.status === 'new').length, 0);

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="glass border-b border-slate-700 px-6 py-4 sticky top-0 z-20">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-500 to-emerald-500 flex items-center justify-center">
                                    <span className="text-2xl">🛡️</span>
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold text-white">MissionPulse</h1>
                                    <p className="text-sm text-slate-400">Federal Proposal Management Platform</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-right hidden md:block">
                                    <div className="text-sm text-slate-400">{totalModules} Modules</div>
                                    <div className="text-xs text-emerald-400">{newModules} New in V2</div>
                                </div>
                                <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-xs ${
                                    isOnline ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'
                                }`}>
                                    <div className={`w-2 h-2 rounded-full ${isOnline ? 'bg-emerald-400' : 'bg-amber-400'}`} />
                                    {isOnline ? 'Online' : 'Demo Mode'}
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Hero Banner */}
                    <div className="bg-gradient-to-r from-cyan-500/10 via-emerald-500/10 to-cyan-500/10 border-b border-slate-800">
                        <div className="max-w-7xl mx-auto px-6 py-8">
                            <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                                <div>
                                    <h2 className="text-3xl font-bold text-white mb-2">
                                        Mission. Technology. Transformation.
                                    </h2>
                                    <p className="text-slate-400">
                                        AI-powered proposal management for federal contractors
                                    </p>
                                </div>
                                <div className="flex gap-4">
                                    <a 
                                        href="missionpulse-solo-manager.html"
                                        className="px-6 py-3 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg font-semibold transition-colors"
                                    >
                                        🎯 Start Proposal
                                    </a>
                                    <a 
                                        href="missionpulse-agent-hub-v2.html"
                                        className="px-6 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-lg font-semibold transition-colors"
                                    >
                                        🤖 AI Agents
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Quick Stats */}
                    <div className="max-w-7xl mx-auto px-6 py-6">
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                            <div className="glass rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-cyan-400">$847M</div>
                                <div className="text-sm text-slate-400">Pipeline Value</div>
                            </div>
                            <div className="glass rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-emerald-400">12</div>
                                <div className="text-sm text-slate-400">Active Opps</div>
                            </div>
                            <div className="glass rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-amber-400">8</div>
                                <div className="text-sm text-slate-400">AI Agents</div>
                            </div>
                            <div className="glass rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-purple-400">11</div>
                                <div className="text-sm text-slate-400">Team Roles</div>
                            </div>
                        </div>

                        {/* Module Grid by Category */}
                        {MODULES.map(section => (
                            <CategorySection 
                                key={section.category} 
                                category={section.category} 
                                items={section.items} 
                            />
                        ))}
                    </div>

                    {/* Footer */}
                    <footer className="border-t border-slate-800 mt-8">
                        <div className="max-w-7xl mx-auto px-6 py-6">
                            <div className="flex flex-col md:flex-row items-center justify-between gap-4">
                                <div className="flex items-center gap-4">
                                    <span className="text-slate-500 text-sm">© 2026 Mission Meets Tech</span>
                                    <span className="text-slate-700">|</span>
                                    <a href="missionpulse-feature-suggestions.html" className="text-cyan-400 hover:text-cyan-300 text-sm">
                                        💡 Suggest a Feature
                                    </a>
                                </div>
                                <span className="text-slate-600 text-xs">AI GENERATED - REQUIRES HUMAN REVIEW</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
