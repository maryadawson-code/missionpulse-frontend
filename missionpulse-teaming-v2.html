<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Teaming Partners</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-cyan { 0%, 100% { box-shadow: 0 0 0 0 rgba(0, 229, 250, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(0, 229, 250, 0); } }
    .pulse-icon { animation: pulse-cyan 2s infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const DEMO_PARTNERS = [
      { id: 1, name: 'HealthTech Solutions', role: 'Subcontractor', setAside: 'SDVOSB', specialty: 'Clinical Systems Integration', workshare: 25, status: 'Active', contact: 'james@healthtech.com', nda: true, ta: true, cage: '7ABC1' },
      { id: 2, name: 'DataSecure Inc', role: 'Subcontractor', setAside: '8(a)', specialty: 'Cybersecurity & CMMC', workshare: 15, status: 'Active', contact: 'lisa@datasecure.com', nda: true, ta: true, cage: '8DEF2' },
      { id: 3, name: 'CloudFirst Federal', role: 'Teaming Partner', setAside: 'HUBZone', specialty: 'AWS GovCloud Migration', workshare: 20, status: 'Pending', contact: 'raj@cloudfirst.com', nda: true, ta: false, cage: '9GHI3' },
      { id: 4, name: 'Agile PMO Group', role: 'Consultant', setAside: 'WOSB', specialty: 'Program Management', workshare: 5, status: 'Active', contact: 'sarah@agilepmo.com', nda: true, ta: true, cage: '1JKL4' }
    ];
    const ROLE_COLORS = { 'Subcontractor': 'bg-cyan-500/20 text-cyan-400', 'Teaming Partner': 'bg-purple-500/20 text-purple-400', 'Consultant': 'bg-amber-500/20 text-amber-400' };
    const STATUS_COLORS = { 'Active': 'bg-emerald-500/20 text-emerald-400', 'Pending': 'bg-amber-500/20 text-amber-400', 'Inactive': 'bg-slate-500/20 text-slate-400' };

    function Sidebar() {
      const navItems = [
        { icon: '🏠', label: 'Dashboard', path: 'index.html' },
        { icon: '📊', label: 'Pipeline', path: 'missionpulse-pipeline-v2.html' },
        { icon: '🎯', label: 'War Room', path: 'missionpulse-warroom-v2.html' },
        { icon: '🤝', label: 'Teaming', path: 'missionpulse-teaming-v2.html', active: true },
        { icon: '🏆', label: 'Past Perf', path: 'missionpulse-pastperf-v2.html' },
        { icon: '🤖', label: 'Agent Hub', path: 'missionpulse-agenthub-v2.html' }
      ];
      return (
        <div className="w-64 bg-slate-900/50 border-r border-slate-700 min-h-screen p-4 hidden lg:block">
          <div className="flex items-center gap-3 mb-8">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center pulse-icon"><span className="text-xl">🤝</span></div>
            <div><div className="font-bold text-cyan-400">Teaming</div><div className="text-xs text-slate-400">Partner Management</div></div>
          </div>
          <nav className="space-y-1">{navItems.map((item, i) => (<a key={i} href={item.path} className={`flex items-center gap-3 px-3 py-2 rounded-lg transition-all ${item.active ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}><span>{item.icon}</span><span className="text-sm">{item.label}</span></a>))}</nav>
        </div>
      );
    }

    function PartnerCard({ partner, onClick }) {
      return (
        <div onClick={() => onClick(partner)} className="bg-slate-800/50 border border-slate-700 rounded-xl p-4 hover:border-cyan-500/50 cursor-pointer transition-all">
          <div className="flex items-start justify-between mb-3">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-slate-700 rounded-lg flex items-center justify-center font-bold text-lg">{partner.name.charAt(0)}</div>
              <div><h3 className="font-medium">{partner.name}</h3><span className="text-xs text-slate-400">{partner.setAside}</span></div>
            </div>
            <span className={`px-2 py-0.5 rounded text-xs ${STATUS_COLORS[partner.status]}`}>{partner.status}</span>
          </div>
          <div className="mb-3"><span className={`px-2 py-0.5 rounded text-xs ${ROLE_COLORS[partner.role]}`}>{partner.role}</span></div>
          <div className="text-sm text-slate-400 mb-3">{partner.specialty}</div>
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2 text-xs">
              <span className={partner.nda ? 'text-emerald-400' : 'text-slate-500'}>NDA {partner.nda ? '✓' : '○'}</span>
              <span className={partner.ta ? 'text-emerald-400' : 'text-slate-500'}>TA {partner.ta ? '✓' : '○'}</span>
            </div>
            <div className="text-sm font-medium text-cyan-400">{partner.workshare}%</div>
          </div>
        </div>
      );
    }

    function App() {
      const [partners] = React.useState(DEMO_PARTNERS);
      const [selectedPartner, setSelectedPartner] = React.useState(null);
      const totalWorkshare = partners.filter(p => p.status === 'Active').reduce((sum, p) => sum + p.workshare, 0);
      const primeShare = 100 - totalWorkshare;

      return (
        <div className="flex min-h-screen">
          <Sidebar />
          <div className="flex-1 p-4 lg:p-6">
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
              <div><h1 className="text-2xl font-bold">Teaming Partners</h1><p className="text-slate-400 text-sm">Manage subcontractors and teaming arrangements</p></div>
              <button className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg text-sm font-medium">+ Add Partner</button>
            </div>
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4"><div className="text-2xl font-bold">{partners.length}</div><div className="text-sm text-slate-400">Total Partners</div></div>
              <div className="bg-slate-800/50 border border-emerald-500/30 rounded-xl p-4"><div className="text-2xl font-bold text-emerald-400">{partners.filter(p => p.status === 'Active').length}</div><div className="text-sm text-slate-400">Active</div></div>
              <div className="bg-slate-800/50 border border-cyan-500/30 rounded-xl p-4"><div className="text-2xl font-bold text-cyan-400">{primeShare}%</div><div className="text-sm text-slate-400">Prime Share</div></div>
              <div className="bg-slate-800/50 border border-amber-500/30 rounded-xl p-4"><div className="text-2xl font-bold text-amber-400">{partners.filter(p => !p.ta).length}</div><div className="text-sm text-slate-400">Pending TA</div></div>
            </div>
            <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4 mb-6">
              <div className="flex items-center justify-between mb-2"><span className="text-sm font-medium">Workshare Distribution</span><span className="text-xs text-slate-400">Prime: {primeShare}% | Subs: {totalWorkshare}%</span></div>
              <div className="h-4 bg-slate-700 rounded-full overflow-hidden flex">
                <div className="h-full bg-cyan-500" style={{ width: `${primeShare}%` }} />
                {partners.filter(p => p.status === 'Active').map((p, i) => (<div key={p.id} className={`h-full ${['bg-purple-500', 'bg-amber-500', 'bg-emerald-500', 'bg-pink-500'][i % 4]}`} style={{ width: `${p.workshare}%` }} />))}
              </div>
            </div>
            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
              {partners.map(partner => <PartnerCard key={partner.id} partner={partner} onClick={setSelectedPartner} />)}
            </div>
            {selectedPartner && (
              <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
                <div className="bg-slate-800 border border-slate-700 rounded-xl max-w-lg w-full">
                  <div className="p-4 border-b border-slate-700 flex items-center justify-between"><h2 className="font-semibold">{selectedPartner.name}</h2><button onClick={() => setSelectedPartner(null)} className="text-slate-400 hover:text-white text-xl">×</button></div>
                  <div className="p-4 space-y-3">
                    <div className="grid grid-cols-2 gap-4 text-sm">
                      <div><span className="text-slate-400">Role:</span> {selectedPartner.role}</div>
                      <div><span className="text-slate-400">Set-Aside:</span> {selectedPartner.setAside}</div>
                      <div><span className="text-slate-400">CAGE:</span> {selectedPartner.cage}</div>
                      <div><span className="text-slate-400">Workshare:</span> {selectedPartner.workshare}%</div>
                    </div>
                    <div><span className="text-slate-400 text-sm">Specialty:</span><p>{selectedPartner.specialty}</p></div>
                    <div><span className="text-slate-400 text-sm">Contact:</span><p className="text-cyan-400">{selectedPartner.contact}</p></div>
                    <div className="flex gap-4"><span className={selectedPartner.nda ? 'text-emerald-400' : 'text-slate-500'}>NDA {selectedPartner.nda ? '✓' : '○'}</span><span className={selectedPartner.ta ? 'text-emerald-400' : 'text-slate-500'}>TA {selectedPartner.ta ? '✓' : '○'}</span></div>
                  </div>
                  <div className="p-4 border-t border-slate-700 flex justify-end"><button onClick={() => setSelectedPartner(null)} className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg text-sm font-medium">Close</button></div>
                </div>
              </div>
            )}
            <div className="mt-8 text-center text-xs text-slate-500"><div>Mission Meets Tech | MissionPulse Teaming</div><div className="mt-1">AI GENERATED - REQUIRES HUMAN REVIEW</div></div>
          </div>
        </div>
      );
    }
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
