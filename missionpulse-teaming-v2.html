<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Teaming Partners</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.15); }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const DEFAULT_COMPANY_ID = '11111111-1111-1111-1111-111111111111';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const DEMO_PARTNERS = [
      { id: '1', opportunity_id: '1', partner_name: 'TechVets Solutions', partner_type: 'Sub', contact_name: 'John Smith', contact_email: 'jsmith@techvets.com', capabilities: ['Cloud Migration', 'DevSecOps', 'Kubernetes'], certifications: ['SDVOSB', 'ISO 27001'], workshare_percent: 25, status: 'Confirmed', nda_signed: true, ta_signed: true, notes: 'Strong past performance with DHA. Key partner for SDVOSB set-aside.' },
      { id: '2', opportunity_id: '1', partner_name: 'ClearPath Cyber', partner_type: 'Sub', contact_name: 'Sarah Johnson', contact_email: 'sjohnson@clearpath.com', capabilities: ['CMMC Compliance', 'Penetration Testing', 'Security Operations'], certifications: ['C3PAO', 'CMMC-AB'], workshare_percent: 15, status: 'Confirmed', nda_signed: true, ta_signed: true, notes: 'CMMC compliance experts. Critical for cybersecurity requirements.' },
      { id: '3', opportunity_id: '1', partner_name: 'HealthData Analytics', partner_type: 'Sub', contact_name: 'Mike Chen', contact_email: 'mchen@healthdata.com', capabilities: ['Data Analytics', 'BI/Reporting', 'FHIR Integration'], certifications: ['8(a)', 'HUBZone'], workshare_percent: 10, status: 'Proposed', nda_signed: true, ta_signed: false, notes: 'Excellent data analytics capability. Finalizing TA terms.' },
      { id: '4', opportunity_id: '1', partner_name: 'GovCloud Systems', partner_type: 'JV', contact_name: 'Lisa Wong', contact_email: 'lwong@govcloud.com', capabilities: ['FedRAMP', 'AWS GovCloud', 'Azure Gov'], certifications: ['FedRAMP High', 'IL5'], workshare_percent: 0, status: 'Exploring', nda_signed: false, ta_signed: false, notes: 'Potential JV partner for future opportunities.' },
      { id: '5', opportunity_id: '2', partner_name: 'VistaBridge Inc', partner_type: 'Sub', contact_name: 'Robert Davis', contact_email: 'rdavis@vistabridge.com', capabilities: ['VistA Integration', 'HL7', 'CPRS'], certifications: ['VOSB'], workshare_percent: 20, status: 'Confirmed', nda_signed: true, ta_signed: true, notes: 'VistA migration specialists. Essential for VA opportunity.' },
    ];

    const DEMO_OPPORTUNITIES = [
      { id: '1', title: 'DHA MHS GENESIS Support', agency: 'DHA' },
      { id: '2', title: 'VA EHR Modernization', agency: 'VA' },
    ];

    function App() {
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [partners, setPartners] = React.useState(DEMO_PARTNERS);
      const [opportunities, setOpportunities] = React.useState(DEMO_OPPORTUNITIES);
      const [selectedOpp, setSelectedOpp] = React.useState('1');
      const [filterStatus, setFilterStatus] = React.useState('all');
      const [showModal, setShowModal] = React.useState(false);
      const [editingPartner, setEditingPartner] = React.useState(null);
      const [form, setForm] = React.useState({ 
        partner_name: '', 
        partner_type: 'Sub',
        contact_name: '',
        contact_email: '',
        capabilities: '',
        certifications: '',
        workshare_percent: 0,
        status: 'Proposed',
        nda_signed: false,
        ta_signed: false,
        notes: '',
        opportunity_id: '1'
      });

      React.useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        try {
          const [partnersRes, oppsRes] = await Promise.all([
            supabase.from('teaming_partners').select('*').order('partner_name'),
            supabase.from('opportunities').select('id, title, agency')
          ]);
          
          if (!partnersRes.error && partnersRes.data?.length > 0) {
            setPartners(partnersRes.data);
            setConnected(true);
          }
          if (!oppsRes.error && oppsRes.data?.length > 0) {
            setOpportunities(oppsRes.data);
            setSelectedOpp(oppsRes.data[0].id);
          }
        } catch (e) {
          console.log('Using demo data');
        }
        setLoading(false);
      };

      const savePartner = async () => {
        const partnerData = {
          ...form,
          capabilities: typeof form.capabilities === 'string' ? form.capabilities.split(',').map(s => s.trim()).filter(Boolean) : form.capabilities,
          certifications: typeof form.certifications === 'string' ? form.certifications.split(',').map(s => s.trim()).filter(Boolean) : form.certifications,
          company_id: DEFAULT_COMPANY_ID,
          updated_at: new Date().toISOString()
        };

        if (connected) {
          try {
            if (editingPartner) {
              await supabase.from('teaming_partners').update(partnerData).eq('id', editingPartner.id);
              setPartners(partners.map(p => p.id === editingPartner.id ? { ...p, ...partnerData } : p));
            } else {
              const { data } = await supabase.from('teaming_partners').insert([partnerData]).select();
              if (data) setPartners([...partners, data[0]]);
            }
          } catch (e) {
            console.error('Save error:', e);
          }
        } else {
          if (editingPartner) {
            setPartners(partners.map(p => p.id === editingPartner.id ? { ...p, ...partnerData } : p));
          } else {
            setPartners([...partners, { ...partnerData, id: Date.now().toString() }]);
          }
        }
        
        closeModal();
      };

      const deletePartner = async (id) => {
        if (!confirm('Delete this partner?')) return;
        if (connected) {
          await supabase.from('teaming_partners').delete().eq('id', id);
        }
        setPartners(partners.filter(p => p.id !== id));
      };

      const toggleAgreement = async (partner, field) => {
        const updated = { ...partner, [field]: !partner[field] };
        if (connected) {
          await supabase.from('teaming_partners').update({ [field]: updated[field] }).eq('id', partner.id);
        }
        setPartners(partners.map(p => p.id === partner.id ? updated : p));
      };

      const closeModal = () => {
        setShowModal(false);
        setEditingPartner(null);
        setForm({ partner_name: '', partner_type: 'Sub', contact_name: '', contact_email: '', capabilities: '', certifications: '', workshare_percent: 0, status: 'Proposed', nda_signed: false, ta_signed: false, notes: '', opportunity_id: selectedOpp });
      };

      const openEditModal = (partner) => {
        setEditingPartner(partner);
        setForm({
          partner_name: partner.partner_name,
          partner_type: partner.partner_type,
          contact_name: partner.contact_name || '',
          contact_email: partner.contact_email || '',
          capabilities: Array.isArray(partner.capabilities) ? partner.capabilities.join(', ') : '',
          certifications: Array.isArray(partner.certifications) ? partner.certifications.join(', ') : '',
          workshare_percent: partner.workshare_percent || 0,
          status: partner.status,
          nda_signed: partner.nda_signed || false,
          ta_signed: partner.ta_signed || false,
          notes: partner.notes || '',
          opportunity_id: partner.opportunity_id
        });
        setShowModal(true);
      };

      // Filter partners
      const filteredPartners = partners.filter(p => {
        const oppMatch = p.opportunity_id === selectedOpp;
        const statusMatch = filterStatus === 'all' || p.status === filterStatus;
        return oppMatch && statusMatch;
      });

      // Stats
      const oppPartners = partners.filter(p => p.opportunity_id === selectedOpp);
      const totalWorkshare = oppPartners.reduce((sum, p) => sum + (p.workshare_percent || 0), 0);
      const confirmedCount = oppPartners.filter(p => p.status === 'Confirmed').length;
      const pendingNDAs = oppPartners.filter(p => !p.nda_signed).length;
      const pendingTAs = oppPartners.filter(p => !p.ta_signed).length;

      const getStatusColor = (status) => {
        switch (status) {
          case 'Confirmed': return 'bg-emerald-500/20 text-emerald-400';
          case 'Proposed': return 'bg-amber-500/20 text-amber-400';
          case 'Exploring': return 'bg-blue-500/20 text-blue-400';
          case 'Declined': return 'bg-red-500/20 text-red-400';
          default: return 'bg-slate-500/20 text-slate-400';
        }
      };

      const getTypeColor = (type) => {
        switch (type) {
          case 'Prime': return 'bg-purple-500/20 text-purple-400';
          case 'Sub': return 'bg-cyan-500/20 text-cyan-400';
          case 'JV': return 'bg-indigo-500/20 text-indigo-400';
          case 'Mentor': return 'bg-amber-500/20 text-amber-400';
          case 'Protege': return 'bg-emerald-500/20 text-emerald-400';
          default: return 'bg-slate-500/20 text-slate-400';
        }
      };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
          </div>
        );
      }

      return (
        <div className="min-h-screen p-6">
          {/* Header */}
          <div className="flex items-center justify-between mb-6">
            <div className="flex items-center gap-4">
              <a href="index.html" className="text-slate-400 hover:text-white">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
              </a>
              <div>
                <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                  <span className="text-blue-400">🤝</span> Teaming Partners
                </h1>
                <p className="text-slate-400 text-sm">Manage teaming arrangements and workshare</p>
              </div>
            </div>
            <div className="flex items-center gap-4">
              <div className={`px-3 py-1 rounded-full text-xs ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                {connected ? '● Live' : '○ Demo'}
              </div>
              <button
                onClick={() => { setEditingPartner(null); setForm({ ...form, opportunity_id: selectedOpp }); setShowModal(true); }}
                className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 text-white rounded-lg font-medium transition-colors"
              >
                + Add Partner
              </button>
            </div>
          </div>

          {/* Filters */}
          <div className="flex items-center gap-4 mb-6">
            <select
              value={selectedOpp}
              onChange={(e) => setSelectedOpp(e.target.value)}
              className="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
            >
              {opportunities.map(opp => (
                <option key={opp.id} value={opp.id}>{opp.title}</option>
              ))}
            </select>
            <select
              value={filterStatus}
              onChange={(e) => setFilterStatus(e.target.value)}
              className="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
            >
              <option value="all">All Statuses</option>
              <option value="Confirmed">Confirmed</option>
              <option value="Proposed">Proposed</option>
              <option value="Exploring">Exploring</option>
              <option value="Declined">Declined</option>
            </select>
          </div>

          {/* Stats */}
          <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
            <div className="glass rounded-xl p-4 text-center">
              <p className="text-2xl font-bold text-white">{oppPartners.length}</p>
              <p className="text-xs text-slate-400">Total Partners</p>
            </div>
            <div className="glass rounded-xl p-4 text-center">
              <p className="text-2xl font-bold text-emerald-400">{confirmedCount}</p>
              <p className="text-xs text-slate-400">Confirmed</p>
            </div>
            <div className="glass rounded-xl p-4 text-center">
              <p className={`text-2xl font-bold ${totalWorkshare > 100 ? 'text-red-400' : 'text-cyan-400'}`}>
                {totalWorkshare}%
              </p>
              <p className="text-xs text-slate-400">Workshare</p>
            </div>
            <div className="glass rounded-xl p-4 text-center">
              <p className={`text-2xl font-bold ${pendingNDAs > 0 ? 'text-amber-400' : 'text-emerald-400'}`}>
                {pendingNDAs}
              </p>
              <p className="text-xs text-slate-400">Pending NDAs</p>
            </div>
            <div className="glass rounded-xl p-4 text-center">
              <p className={`text-2xl font-bold ${pendingTAs > 0 ? 'text-amber-400' : 'text-emerald-400'}`}>
                {pendingTAs}
              </p>
              <p className="text-xs text-slate-400">Pending TAs</p>
            </div>
          </div>

          {/* Partner Cards */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {filteredPartners.map(partner => (
              <div key={partner.id} className="glass rounded-xl p-5 hover:border-cyan-500/30 transition-colors">
                <div className="flex items-start justify-between mb-3">
                  <div>
                    <h3 className="text-lg font-semibold text-white">{partner.partner_name}</h3>
                    <div className="flex items-center gap-2 mt-1">
                      <span className={`px-2 py-0.5 rounded text-xs ${getTypeColor(partner.partner_type)}`}>
                        {partner.partner_type}
                      </span>
                      <span className={`px-2 py-0.5 rounded text-xs ${getStatusColor(partner.status)}`}>
                        {partner.status}
                      </span>
                    </div>
                  </div>
                  <div className="flex items-center gap-2">
                    <button onClick={() => openEditModal(partner)} className="text-slate-400 hover:text-cyan-400 transition-colors">
                      ✏️
                    </button>
                    <button onClick={() => deletePartner(partner.id)} className="text-slate-400 hover:text-red-400 transition-colors">
                      🗑️
                    </button>
                  </div>
                </div>

                {/* Contact */}
                {(partner.contact_name || partner.contact_email) && (
                  <div className="mb-3 text-sm">
                    <p className="text-slate-300">{partner.contact_name}</p>
                    <p className="text-slate-500">{partner.contact_email}</p>
                  </div>
                )}

                {/* Capabilities & Certs */}
                <div className="mb-3">
                  {partner.capabilities?.length > 0 && (
                    <div className="flex flex-wrap gap-1 mb-2">
                      {partner.capabilities.map((cap, i) => (
                        <span key={i} className="px-2 py-0.5 rounded-full text-xs bg-slate-700 text-slate-300">{cap}</span>
                      ))}
                    </div>
                  )}
                  {partner.certifications?.length > 0 && (
                    <div className="flex flex-wrap gap-1">
                      {partner.certifications.map((cert, i) => (
                        <span key={i} className="px-2 py-0.5 rounded-full text-xs bg-emerald-500/20 text-emerald-400">{cert}</span>
                      ))}
                    </div>
                  )}
                </div>

                {/* Workshare & Agreements */}
                <div className="flex items-center justify-between pt-3 border-t border-slate-700/50">
                  <div className="flex items-center gap-4">
                    <button
                      onClick={() => toggleAgreement(partner, 'nda_signed')}
                      className={`flex items-center gap-1 text-xs px-2 py-1 rounded ${partner.nda_signed ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-700 text-slate-400'}`}
                    >
                      {partner.nda_signed ? '✓' : '○'} NDA
                    </button>
                    <button
                      onClick={() => toggleAgreement(partner, 'ta_signed')}
                      className={`flex items-center gap-1 text-xs px-2 py-1 rounded ${partner.ta_signed ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-700 text-slate-400'}`}
                    >
                      {partner.ta_signed ? '✓' : '○'} TA
                    </button>
                  </div>
                  {partner.workshare_percent > 0 && (
                    <span className="text-cyan-400 font-medium">{partner.workshare_percent}% workshare</span>
                  )}
                </div>

                {/* Notes */}
                {partner.notes && (
                  <p className="mt-3 text-sm text-slate-400 italic">{partner.notes}</p>
                )}
              </div>
            ))}
          </div>

          {filteredPartners.length === 0 && (
            <div className="text-center py-12">
              <p className="text-slate-500">No partners found. Add teaming partners to get started.</p>
            </div>
          )}

          {/* Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
              <div className="glass rounded-xl p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                <h2 className="text-xl font-bold text-white mb-4">
                  {editingPartner ? 'Edit Partner' : 'Add Partner'}
                </h2>
                
                <div className="space-y-4">
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Partner Name *</label>
                      <input
                        type="text"
                        value={form.partner_name}
                        onChange={(e) => setForm({ ...form, partner_name: e.target.value })}
                        placeholder="Company name"
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                      />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Partner Type</label>
                      <select
                        value={form.partner_type}
                        onChange={(e) => setForm({ ...form, partner_type: e.target.value })}
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                      >
                        <option value="Prime">Prime</option>
                        <option value="Sub">Subcontractor</option>
                        <option value="JV">Joint Venture</option>
                        <option value="Mentor">Mentor</option>
                        <option value="Protege">Protégé</option>
                      </select>
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Contact Name</label>
                      <input
                        type="text"
                        value={form.contact_name}
                        onChange={(e) => setForm({ ...form, contact_name: e.target.value })}
                        placeholder="Primary contact"
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                      />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Contact Email</label>
                      <input
                        type="email"
                        value={form.contact_email}
                        onChange={(e) => setForm({ ...form, contact_email: e.target.value })}
                        placeholder="email@company.com"
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                      />
                    </div>
                  </div>

                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Capabilities (comma-separated)</label>
                    <input
                      type="text"
                      value={form.capabilities}
                      onChange={(e) => setForm({ ...form, capabilities: e.target.value })}
                      placeholder="Cloud Migration, DevSecOps, ..."
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                    />
                  </div>

                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Certifications (comma-separated)</label>
                    <input
                      type="text"
                      value={form.certifications}
                      onChange={(e) => setForm({ ...form, certifications: e.target.value })}
                      placeholder="SDVOSB, 8(a), ISO 27001, ..."
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                    />
                  </div>

                  <div className="grid grid-cols-3 gap-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Workshare %</label>
                      <input
                        type="number"
                        value={form.workshare_percent}
                        onChange={(e) => setForm({ ...form, workshare_percent: parseFloat(e.target.value) || 0 })}
                        min="0"
                        max="100"
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                      />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Status</label>
                      <select
                        value={form.status}
                        onChange={(e) => setForm({ ...form, status: e.target.value })}
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                      >
                        <option value="Exploring">Exploring</option>
                        <option value="Proposed">Proposed</option>
                        <option value="Confirmed">Confirmed</option>
                        <option value="Declined">Declined</option>
                      </select>
                    </div>
                    <div className="flex items-end gap-4">
                      <label className="flex items-center gap-2 text-sm text-slate-300">
                        <input
                          type="checkbox"
                          checked={form.nda_signed}
                          onChange={(e) => setForm({ ...form, nda_signed: e.target.checked })}
                          className="rounded bg-slate-700 border-slate-600"
                        />
                        NDA Signed
                      </label>
                      <label className="flex items-center gap-2 text-sm text-slate-300">
                        <input
                          type="checkbox"
                          checked={form.ta_signed}
                          onChange={(e) => setForm({ ...form, ta_signed: e.target.checked })}
                          className="rounded bg-slate-700 border-slate-600"
                        />
                        TA Signed
                      </label>
                    </div>
                  </div>

                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Notes</label>
                    <textarea
                      value={form.notes}
                      onChange={(e) => setForm({ ...form, notes: e.target.value })}
                      placeholder="Additional notes..."
                      rows={3}
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                    />
                  </div>
                </div>
                
                <div className="flex justify-end gap-3 mt-6">
                  <button onClick={closeModal} className="px-4 py-2 text-slate-400 hover:text-white transition-colors">
                    Cancel
                  </button>
                  <button
                    onClick={savePartner}
                    disabled={!form.partner_name}
                    className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 disabled:bg-slate-600 text-white rounded-lg font-medium transition-colors"
                  >
                    {editingPartner ? 'Update' : 'Add Partner'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <div className="mt-8 text-center text-slate-500 text-sm">
