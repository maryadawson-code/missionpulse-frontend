<!DOCTYPE html>
<html lang="en">
<!--

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teaming Partners | MissionPulse</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const DEMO_PARTNERS = [
      { id: 1, name: 'CloudFirst Technologies', type: 'prime', role: 'Cloud Infrastructure', status: 'active', nda_status: 'signed', nda_expires: '2026-12-31', ta_status: 'pending', contact: 'John Smith', email: 'jsmith@cloudfi.com', phone: '703-555-0101', certifications: ['SDVOSB', 'ISO 27001'], workShare: 30 },
      { id: 2, name: 'SecureNet Solutions', type: 'sub', role: 'Cybersecurity', status: 'active', nda_status: 'signed', nda_expires: '2026-06-30', ta_status: 'signed', contact: 'Sarah Chen', email: 'schen@securenet.io', phone: '571-555-0202', certifications: ['FedRAMP High', 'CMMC L3'], workShare: 25 },
      { id: 3, name: 'DataBridge Analytics', type: 'sub', role: 'Data Analytics', status: 'pending', nda_status: 'pending', nda_expires: null, ta_status: 'not_started', contact: 'Mike Johnson', email: 'mjohnson@databridge.ai', phone: '202-555-0303', certifications: ['8(a)', 'HUBZone'], workShare: 15 },
      { id: 4, name: 'HealthTech Integrators', type: 'sub', role: 'Healthcare IT', status: 'active', nda_status: 'signed', nda_expires: '2027-03-15', ta_status: 'signed', contact: 'Lisa Wong', email: 'lwong@healthtech.com', phone: '410-555-0404', certifications: ['WOSB', 'HIPAA'], workShare: 20 },
      { id: 5, name: 'GovCloud Partners', type: 'consultant', role: 'Compliance Advisory', status: 'inactive', nda_status: 'expired', nda_expires: '2025-12-31', ta_status: 'not_started', contact: 'Tom Davis', email: 'tdavis@govcloud.co', phone: '703-555-0505', certifications: ['CMMC RP'], workShare: 5 },
    ];

    const PARTNER_TYPES = {
      prime: { label: 'Prime', color: '#00E5FA', icon: '👑' },
      sub: { label: 'Subcontractor', color: '#8B5CF6', icon: '🤝' },
      consultant: { label: 'Consultant', color: '#F59E0B', icon: '💼' },
      mentor: { label: 'Mentor', color: '#10B981', icon: '🎓' },
    };

    const STATUS_CONFIG = {
      active: { label: 'Active', color: '#10B981', bg: 'bg-emerald-500/20' },
      pending: { label: 'Pending', color: '#F59E0B', bg: 'bg-amber-500/20' },
      inactive: { label: 'Inactive', color: '#64748B', bg: 'bg-slate-500/20' },
    };

    const NDA_STATUS = {
      signed: { label: 'Signed', color: '#10B981', icon: '✓' },
      pending: { label: 'Pending', color: '#F59E0B', icon: '⏳' },
      expired: { label: 'Expired', color: '#EF4444', icon: '⚠' },
      not_started: { label: 'Not Started', color: '#64748B', icon: '○' },
    };

    function TeamingPartners() {
      const [connected, setConnected] = useState(false);
      const [loading, setLoading] = useState(true);
      const [partners, setPartners] = useState([]);
      const [filter, setFilter] = useState('all');
      const [selectedPartner, setSelectedPartner] = useState(null);
      const [showAddModal, setShowAddModal] = useState(false);
      const [editingPartner, setEditingPartner] = useState(null);

      useEffect(() => { loadData(); }, []);

      const loadData = async () => {
        try {
          const { data, error } = await supabase.from('teaming_partners').select('*').order('name');
          if (error) throw error;
          setPartners(data?.length ? data : DEMO_PARTNERS);
          setConnected(true);
        } catch (err) {
          console.error('Load error:', err);
          setPartners(DEMO_PARTNERS);
        } finally {
          setLoading(false);
        }
      };

      const filteredPartners = useMemo(() => {
        if (filter === 'all') return partners;
        return partners.filter(p => p.status === filter || p.type === filter);
      }, [partners, filter]);

      const stats = useMemo(() => ({
        total: partners.length,
        active: partners.filter(p => p.status === 'active').length,
        ndaPending: partners.filter(p => p.nda_status === 'pending').length,
        ndaExpiring: partners.filter(p => {
          if (!p.nda_expires) return false;
          const exp = new Date(p.nda_expires);
          const now = new Date();
          const diff = (exp - now) / (1000 * 60 * 60 * 24);
          return diff <= 90 && diff > 0;
        }).length,
        totalWorkShare: partners.filter(p => p.status === 'active').reduce((sum, p) => sum + (p.workShare || 0), 0),
      }), [partners]);

      const savePartner = async (data) => {
        try {
          if (data.id) {
            await supabase.from('teaming_partners').update(data).eq('id', data.id);
            setPartners(partners.map(p => p.id === data.id ? data : p));
          } else {
            const newPartner = { ...data, id: Date.now() };
            await supabase.from('teaming_partners').insert(newPartner);
            setPartners([...partners, newPartner]);
          }
        } catch (err) {
          console.error('Save error:', err);
          // Demo mode fallback
          if (data.id) {
            setPartners(partners.map(p => p.id === data.id ? data : p));
          } else {
            setPartners([...partners, { ...data, id: Date.now() }]);
          }
        }
        setShowAddModal(false);
        setEditingPartner(null);
      };

      const deletePartner = async (id) => {
        if (!confirm('Remove this partner?')) return;
        try {
          await supabase.from('teaming_partners').delete().eq('id', id);
        } catch (err) { console.error('Delete error:', err); }
        setPartners(partners.filter(p => p.id !== id));
        setSelectedPartner(null);
      };

      if (loading) {
        return (
          <div className="min-h-screen bg-[#00050F] flex items-center justify-center">
            <div className="w-12 h-12 border-4 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin" />
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#00050F] text-white p-6">
          {/* Header */}
          <div className="flex items-center justify-between mb-6">
            <div>
              <div className="flex items-center gap-3">
                <span className="text-3xl">🤝</span>
                <h1 className="text-2xl font-bold">Teaming Partners</h1>
                <span className={`px-2 py-1 text-xs rounded-full ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                  {connected ? '● Live' : '○ Demo'}
                </span>
              </div>
              <p className="text-slate-400 mt-1">Manage teaming agreements, NDAs, and partner relationships</p>
            </div>
            
            <button 
              onClick={() => { setShowAddModal(true); setEditingPartner({ type: 'sub', status: 'pending', nda_status: 'not_started', ta_status: 'not_started', certifications: [], workShare: 10 }); }}
              className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium"
            >
              + Add Partner
            </button>
          </div>

          {/* Stats Cards */}
          <div className="grid grid-cols-5 gap-4 mb-6">
            <div className="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
              <div className="text-3xl font-bold text-cyan-400">{stats.total}</div>
              <div className="text-sm text-slate-400">Total Partners</div>
            </div>
            <div className="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
              <div className="text-3xl font-bold text-emerald-400">{stats.active}</div>
              <div className="text-sm text-slate-400">Active</div>
            </div>
            <div className="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
              <div className="text-3xl font-bold text-amber-400">{stats.ndaPending}</div>
              <div className="text-sm text-slate-400">NDA Pending</div>
            </div>
            <div className="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
              <div className="text-3xl font-bold text-red-400">{stats.ndaExpiring}</div>
              <div className="text-sm text-slate-400">NDAs Expiring (90d)</div>
            </div>
            <div className="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
              <div className="text-3xl font-bold text-purple-400">{stats.totalWorkShare}%</div>
              <div className="text-sm text-slate-400">Work Share Allocated</div>
            </div>
          </div>

          {/* Filter */}
          <div className="flex gap-4 mb-6">
            <select value={filter} onChange={e => setFilter(e.target.value)} className="bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white">
              <option value="all">All Partners</option>
              <option value="active">Active Only</option>
              <option value="pending">Pending</option>
              <option value="prime">Prime</option>
              <option value="sub">Subcontractors</option>
            </select>
            <div className="flex-1" />
            <button className="px-4 py-2 bg-purple-500 hover:bg-purple-600 rounded-lg font-medium">
              📄 Export Partner Matrix
            </button>
          </div>

          <div className="grid grid-cols-12 gap-6">
            {/* Partners List */}
            <div className="col-span-7">
              <div className="space-y-3">
                {filteredPartners.map(partner => {
                  const type = PARTNER_TYPES[partner.type];
                  const status = STATUS_CONFIG[partner.status];
                  const nda = NDA_STATUS[partner.nda_status];
                  
                  return (
                    <div 
                      key={partner.id}
                      onClick={() => setSelectedPartner(partner)}
                      className={`p-4 rounded-xl border cursor-pointer transition-all ${
                        selectedPartner?.id === partner.id 
                          ? 'bg-cyan-500/10 border-cyan-500/50' 
                          : 'bg-slate-800/50 border-slate-700/50 hover:border-slate-600'
                      }`}
                    >
                      <div className="flex items-start justify-between">
                        <div className="flex items-start gap-3">
                          <div className="w-12 h-12 rounded-xl flex items-center justify-center text-2xl" style={{ backgroundColor: `${type.color}20` }}>
                            {type.icon}
                          </div>
                          <div>
                            <div className="flex items-center gap-2">
                              <h3 className="font-bold">{partner.name}</h3>
                              <span className={`px-2 py-0.5 text-xs rounded-full ${status.bg}`} style={{ color: status.color }}>
                                {status.label}
                              </span>
                            </div>
                            <div className="text-sm text-slate-400">{partner.role}</div>
                            <div className="flex gap-2 mt-2">
                              {partner.certifications?.map((cert, i) => (
                                <span key={i} className="px-2 py-0.5 text-xs bg-slate-700/50 text-slate-300 rounded">
                                  {cert}
                                </span>
                              ))}
                            </div>
                          </div>
                        </div>
                        
                        <div className="text-right">
                          <div className="flex items-center gap-1 text-sm" style={{ color: nda.color }}>
                            <span>{nda.icon}</span>
                            <span>NDA: {nda.label}</span>
                          </div>
                          <div className="text-xs text-slate-500 mt-1">
                            Work Share: {partner.workShare}%
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Partner Detail */}
            <div className="col-span-5">
              {selectedPartner ? (
                <div className="bg-slate-800/50 rounded-xl border border-slate-700/50 p-6 sticky top-6">
                  <div className="flex items-center justify-between mb-6">
                    <div className="flex items-center gap-3">
                      <div className="w-14 h-14 rounded-xl flex items-center justify-center text-3xl" style={{ backgroundColor: `${PARTNER_TYPES[selectedPartner.type].color}20` }}>
                        {PARTNER_TYPES[selectedPartner.type].icon}
                      </div>
                      <div>
                        <h2 className="font-bold text-xl">{selectedPartner.name}</h2>
                        <span className="text-sm text-slate-400">{selectedPartner.role}</span>
                      </div>
                    </div>
                    <div className="flex gap-2">
                      <button onClick={() => { setEditingPartner(selectedPartner); setShowAddModal(true); }} className="p-2 hover:bg-slate-700 rounded">✏️</button>
                      <button onClick={() => deletePartner(selectedPartner.id)} className="p-2 hover:bg-red-500/20 rounded text-red-400">🗑️</button>
                    </div>
                  </div>

                  {/* Contact Info */}
                  <div className="space-y-3 mb-6">
                    <h4 className="text-sm font-semibold text-slate-400">Contact Information</h4>
                    <div className="grid grid-cols-2 gap-3">
                      <div className="p-3 bg-slate-900/50 rounded-lg">
                        <div className="text-xs text-slate-500">Contact</div>
                        <div className="font-medium">{selectedPartner.contact || 'N/A'}</div>
                      </div>
                      <div className="p-3 bg-slate-900/50 rounded-lg">
                        <div className="text-xs text-slate-500">Phone</div>
                        <div className="font-medium">{selectedPartner.phone || 'N/A'}</div>
                      </div>
                      <div className="p-3 bg-slate-900/50 rounded-lg col-span-2">
                        <div className="text-xs text-slate-500">Email</div>
                        <div className="font-medium text-cyan-400">{selectedPartner.email || 'N/A'}</div>
                      </div>
                    </div>
                  </div>

                  {/* Agreement Status */}
                  <div className="space-y-3 mb-6">
                    <h4 className="text-sm font-semibold text-slate-400">Agreement Status</h4>
                    <div className="space-y-2">
                      <div className="flex items-center justify-between p-3 bg-slate-900/50 rounded-lg">
                        <span>NDA Status</span>
                        <span className="flex items-center gap-1" style={{ color: NDA_STATUS[selectedPartner.nda_status].color }}>
                          {NDA_STATUS[selectedPartner.nda_status].icon} {NDA_STATUS[selectedPartner.nda_status].label}
                        </span>
                      </div>
                      {selectedPartner.nda_expires && (
                        <div className="flex items-center justify-between p-3 bg-slate-900/50 rounded-lg">
                          <span>NDA Expires</span>
                          <span>{new Date(selectedPartner.nda_expires).toLocaleDateString()}</span>
                        </div>
                      )}
                      <div className="flex items-center justify-between p-3 bg-slate-900/50 rounded-lg">
                        <span>Teaming Agreement</span>
                        <span className="flex items-center gap-1" style={{ color: NDA_STATUS[selectedPartner.ta_status].color }}>
                          {NDA_STATUS[selectedPartner.ta_status].icon} {NDA_STATUS[selectedPartner.ta_status].label}
                        </span>
                      </div>
                      <div className="flex items-center justify-between p-3 bg-slate-900/50 rounded-lg">
                        <span>Work Share</span>
                        <span className="font-bold text-purple-400">{selectedPartner.workShare}%</span>
                      </div>
                    </div>
                  </div>

                  {/* Actions */}
                  <div className="grid grid-cols-2 gap-2">
                    <button className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
                      📄 View NDA
                    </button>
                    <button className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
                      📋 View TA
                    </button>
                    <button className="px-4 py-2 bg-cyan-500/20 text-cyan-400 hover:bg-cyan-500/30 rounded-lg text-sm col-span-2">
                      ✉️ Send Reminder
                    </button>
                  </div>
                </div>
              ) : (
                <div className="bg-slate-800/30 rounded-xl border border-slate-700/50 p-8 text-center">
                  <span className="text-4xl mb-2 block">👈</span>
                  <p className="text-slate-500">Select a partner to view details</p>
                </div>
              )}
            </div>
          </div>

          {/* Add/Edit Modal */}
          {showAddModal && editingPartner && (
            <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
              <div className="bg-slate-900 rounded-2xl border border-slate-700 p-6 w-full max-w-lg max-h-[90vh] overflow-y-auto">
                <h2 className="text-xl font-bold mb-6">{editingPartner.id ? 'Edit Partner' : 'Add Partner'}</h2>
                
                <div className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-2">Company Name</label>
                    <input type="text" value={editingPartner.name || ''} onChange={e => setEditingPartner({...editingPartner, name: e.target.value})} className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2" placeholder="Company name" />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-medium text-slate-400 mb-2">Type</label>
                      <select value={editingPartner.type} onChange={e => setEditingPartner({...editingPartner, type: e.target.value})} className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2">
                        {Object.entries(PARTNER_TYPES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-slate-400 mb-2">Status</label>
                      <select value={editingPartner.status} onChange={e => setEditingPartner({...editingPartner, status: e.target.value})} className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2">
                        {Object.entries(STATUS_CONFIG).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                      </select>
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-2">Role</label>
                    <input type="text" value={editingPartner.role || ''} onChange={e => setEditingPartner({...editingPartner, role: e.target.value})} className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2" placeholder="e.g., Cybersecurity, Cloud Infrastructure" />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-medium text-slate-400 mb-2">Contact Name</label>
                      <input type="text" value={editingPartner.contact || ''} onChange={e => setEditingPartner({...editingPartner, contact: e.target.value})} className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2" />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-slate-400 mb-2">Phone</label>
                      <input type="text" value={editingPartner.phone || ''} onChange={e => setEditingPartner({...editingPartner, phone: e.target.value})} className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2" />
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-2">Email</label>
                    <input type="email" value={editingPartner.email || ''} onChange={e => setEditingPartner({...editingPartner, email: e.target.value})} className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-2">Work Share (%)</label>
                    <input type="number" min="0" max="100" value={editingPartner.workShare || 0} onChange={e => setEditingPartner({...editingPartner, workShare: parseInt(e.target.value)})} className="w-32 bg-slate-800 border border-slate-600 rounded-lg px-4 py-2" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-2">Certifications (comma-separated)</label>
                    <input type="text" value={editingPartner.certifications?.join(', ') || ''} onChange={e => setEditingPartner({...editingPartner, certifications: e.target.value.split(',').map(s => s.trim()).filter(Boolean)})} className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2" placeholder="SDVOSB, ISO 27001, FedRAMP" />
                  </div>
                </div>
                
                <div className="flex gap-3 mt-6">
                  <button onClick={() => { setShowAddModal(false); setEditingPartner(null); }} className="flex-1 px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg">Cancel</button>
                  <button onClick={() => savePartner(editingPartner)} className="flex-1 px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium">Save Partner</button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <div className="mt-8 pt-4 border-t border-slate-800 text-center text-xs text-slate-600">
            AI GENERATED - REQUIRES HUMAN REVIEW
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<TeamingPartners />);
  </script>
</body>
</html>
