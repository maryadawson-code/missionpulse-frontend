<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teaming Partners | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:#00050F;color:#e2e8f0;min-height:100vh}
    .glass{background:rgba(15,23,42,0.85);backdrop-filter:blur(16px);border:1px solid rgba(0,229,250,0.1);border-radius:12px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const SUPABASE_URL='https://qdrtpnpnhkxvfmvfziop.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
const supabase=window.supabase?.createClient(SUPABASE_URL,SUPABASE_ANON);

const TEAMING_TYPES=[
  {value:'prime',label:'Prime',desc:'Lead contractor'},
  {value:'sub',label:'Subcontractor',desc:'Supporting role'},
  {value:'jv',label:'Joint Venture',desc:'Shared lead'},
  {value:'mentor_protege',label:'Mentor-Protégé',desc:'SBA program'}
];

const SET_ASIDES=['None','8(a)','SDVOSB','WOSB','HUBZone','VOSB'];

const DEMO_PARTNERS=[
  {id:1,company_name:'TechForward Solutions',contact_name:'Sarah Johnson',contact_email:'sjohnson@techforward.com',role:'Cloud Infrastructure',set_aside:'8(a)',teaming_type:'sub',nda_status:'signed',ta_status:'signed',workshare_percent:25,notes:'Strong AWS expertise'},
  {id:2,company_name:'DataSecure Inc',contact_name:'Mike Chen',contact_email:'mchen@datasecure.com',role:'Cybersecurity',set_aside:'SDVOSB',teaming_type:'sub',nda_status:'signed',ta_status:'draft',workshare_percent:15,notes:'CMMC Level 3 certified'},
  {id:3,company_name:'HealthIT Pros',contact_name:'Dr. Amanda Lee',contact_email:'alee@healthitpros.com',role:'Clinical SME',set_aside:'WOSB',teaming_type:'sub',nda_status:'sent',ta_status:'pending',workshare_percent:10,notes:'Former DHA clinician'}
];

function TeamingPartners(){
  const[connected,setConnected]=useState(false);
  const[partners,setPartners]=useState(DEMO_PARTNERS);
  const[selectedPartner,setSelectedPartner]=useState(null);
  const[showAdd,setShowAdd]=useState(false);
  const[newPartner,setNewPartner]=useState({company_name:'',contact_name:'',contact_email:'',role:'',set_aside:'None',teaming_type:'sub',nda_status:'pending',ta_status:'pending',workshare_percent:10,notes:''});

  useEffect(()=>{
    const load=async()=>{
      try{
        const{data,error}=await supabase.from('teaming_partners').select('*').order('company_name');
        if(!error&&data?.length)setPartners(data);
        setConnected(!error);
      }catch{setConnected(false)}
    };
    load();
  },[]);

  const addPartner=()=>{
    if(!newPartner.company_name)return;
    setPartners([...partners,{...newPartner,id:Date.now()}]);
    setNewPartner({company_name:'',contact_name:'',contact_email:'',role:'',set_aside:'None',teaming_type:'sub',nda_status:'pending',ta_status:'pending',workshare_percent:10,notes:''});
    setShowAdd(false);
  };

  const updatePartner=(id,field,value)=>{
    setPartners(partners.map(p=>p.id===id?{...p,[field]:value}:p));
    if(selectedPartner?.id===id)setSelectedPartner({...selectedPartner,[field]:value});
  };

  const deletePartner=(id)=>{
    setPartners(partners.filter(p=>p.id!==id));
    if(selectedPartner?.id===id)setSelectedPartner(null);
  };

  const totalWorkshare=partners.reduce((s,p)=>s+p.workshare_percent,0);

  const getStatusBadge=(status)=>{
    const styles={
      pending:'bg-slate-500/20 text-slate-400 border-slate-500/30',
      sent:'bg-amber-500/20 text-amber-400 border-amber-500/30',
      draft:'bg-blue-500/20 text-blue-400 border-blue-500/30',
      signed:'bg-emerald-500/20 text-emerald-400 border-emerald-500/30',
      expired:'bg-red-500/20 text-red-400 border-red-500/30'
    };
    return styles[status]||styles.pending;
  };

  return(
    <div className="min-h-screen p-6">
      {/* Header */}
      <div className="flex justify-between items-start mb-6">
        <div>
          <h1 className="text-2xl font-bold text-white flex items-center gap-3">
            🤝 Teaming Partners
            <span className={`text-xs px-2 py-1 rounded ${connected?'bg-emerald-500/20 text-emerald-400':'bg-red-500/20 text-red-400'}`}>
              {connected?'● Live':'○ Demo'}
            </span>
          </h1>
          <p className="text-slate-400 text-sm mt-1">Partner management, NDAs, and teaming agreements</p>
        </div>
        <button onClick={()=>setShowAdd(true)} className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-lg font-medium">
          + Add Partner
        </button>
      </div>

      {/* Stats */}
      <div className="grid grid-cols-5 gap-4 mb-6">
        <div className="glass p-4">
          <div className="text-slate-400 text-xs">Total Partners</div>
          <div className="text-2xl font-bold text-white">{partners.length}</div>
        </div>
        <div className="glass p-4">
          <div className="text-slate-400 text-xs">Total Workshare</div>
          <div className={`text-2xl font-bold ${totalWorkshare>100?'text-red-400':'text-cyan-400'}`}>{totalWorkshare}%</div>
        </div>
        <div className="glass p-4">
          <div className="text-slate-400 text-xs">NDAs Signed</div>
          <div className="text-2xl font-bold text-emerald-400">{partners.filter(p=>p.nda_status==='signed').length}</div>
        </div>
        <div className="glass p-4">
          <div className="text-slate-400 text-xs">TAs Signed</div>
          <div className="text-2xl font-bold text-emerald-400">{partners.filter(p=>p.ta_status==='signed').length}</div>
        </div>
        <div className="glass p-4">
          <div className="text-slate-400 text-xs">Small Business %</div>
          <div className="text-2xl font-bold text-purple-400">{partners.filter(p=>p.set_aside!=='None').reduce((s,p)=>s+p.workshare_percent,0)}%</div>
        </div>
      </div>

      <div className="grid grid-cols-12 gap-6">
        {/* Partner List */}
        <div className="col-span-7">
          <div className="glass overflow-hidden">
            <div className="p-4 border-b border-slate-700/50">
              <h3 className="font-semibold text-white">Team Composition</h3>
            </div>
            <div className="divide-y divide-slate-700/30">
              {partners.map(partner=>(
                <div key={partner.id} onClick={()=>setSelectedPartner(partner)} className={`p-4 cursor-pointer transition-all hover:bg-slate-800/30 ${selectedPartner?.id===partner.id?'bg-cyan-500/10 border-l-2 border-cyan-500':''}`}>
                  <div className="flex items-start justify-between">
                    <div>
                      <div className="flex items-center gap-2">
                        <span className="font-semibold text-white">{partner.company_name}</span>
                        {partner.set_aside!=='None'&&<span className="text-xs px-1.5 py-0.5 rounded bg-purple-500/20 text-purple-400">{partner.set_aside}</span>}
                      </div>
                      <div className="text-sm text-slate-400 mt-1">{partner.role}</div>
                      <div className="text-xs text-slate-500 mt-1">{partner.contact_name} • {partner.contact_email}</div>
                    </div>
                    <div className="text-right">
                      <div className="text-xl font-bold text-cyan-400">{partner.workshare_percent}%</div>
                      <div className="text-xs text-slate-500">workshare</div>
                    </div>
                  </div>
                  <div className="flex items-center gap-4 mt-3">
                    <div className="flex items-center gap-2">
                      <span className="text-xs text-slate-500">NDA:</span>
                      <span className={`text-xs px-1.5 py-0.5 rounded border ${getStatusBadge(partner.nda_status)}`}>{partner.nda_status}</span>
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="text-xs text-slate-500">TA:</span>
                      <span className={`text-xs px-1.5 py-0.5 rounded border ${getStatusBadge(partner.ta_status)}`}>{partner.ta_status}</span>
                    </div>
                    <span className="text-xs px-1.5 py-0.5 rounded bg-slate-700 text-slate-300">{TEAMING_TYPES.find(t=>t.value===partner.teaming_type)?.label}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Detail Panel */}
        <div className="col-span-5">
          {selectedPartner?(
            <div className="glass p-6 sticky top-6">
              <div className="flex justify-between items-start mb-4">
                <h3 className="text-lg font-bold text-white">Partner Details</h3>
                <button onClick={()=>deletePartner(selectedPartner.id)} className="text-red-400 hover:text-red-300 text-sm">🗑️ Remove</button>
              </div>
              
              <div className="space-y-4">
                <div>
                  <label className="text-xs text-slate-500 block mb-1">Company Name</label>
                  <input value={selectedPartner.company_name} onChange={e=>updatePartner(selectedPartner.id,'company_name',e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
                </div>
                
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="text-xs text-slate-500 block mb-1">Contact Name</label>
                    <input value={selectedPartner.contact_name} onChange={e=>updatePartner(selectedPartner.id,'contact_name',e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
                  </div>
                  <div>
                    <label className="text-xs text-slate-500 block mb-1">Email</label>
                    <input value={selectedPartner.contact_email} onChange={e=>updatePartner(selectedPartner.id,'contact_email',e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
                  </div>
                </div>
                
                <div>
                  <label className="text-xs text-slate-500 block mb-1">Role/Scope</label>
                  <input value={selectedPartner.role} onChange={e=>updatePartner(selectedPartner.id,'role',e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
                </div>
                
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="text-xs text-slate-500 block mb-1">Set-Aside</label>
                    <select value={selectedPartner.set_aside} onChange={e=>updatePartner(selectedPartner.id,'set_aside',e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white">
                      {SET_ASIDES.map(s=><option key={s} value={s}>{s}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="text-xs text-slate-500 block mb-1">Teaming Type</label>
                    <select value={selectedPartner.teaming_type} onChange={e=>updatePartner(selectedPartner.id,'teaming_type',e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white">
                      {TEAMING_TYPES.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
                    </select>
                  </div>
                </div>
                
                <div>
                  <label className="text-xs text-slate-500 block mb-1">Workshare: {selectedPartner.workshare_percent}%</label>
                  <input type="range" min="0" max="50" value={selectedPartner.workshare_percent} onChange={e=>updatePartner(selectedPartner.id,'workshare_percent',parseInt(e.target.value))} className="w-full"/>
                </div>
                
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="text-xs text-slate-500 block mb-1">NDA Status</label>
                    <select value={selectedPartner.nda_status} onChange={e=>updatePartner(selectedPartner.id,'nda_status',e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white">
                      <option value="pending">Pending</option>
                      <option value="sent">Sent</option>
                      <option value="signed">Signed</option>
                      <option value="expired">Expired</option>
                    </select>
                  </div>
                  <div>
                    <label className="text-xs text-slate-500 block mb-1">TA Status</label>
                    <select value={selectedPartner.ta_status} onChange={e=>updatePartner(selectedPartner.id,'ta_status',e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white">
                      <option value="pending">Pending</option>
                      <option value="draft">Draft</option>
                      <option value="signed">Signed</option>
                      <option value="expired">Expired</option>
                    </select>
                  </div>
                </div>
                
                <div>
                  <label className="text-xs text-slate-500 block mb-1">Notes</label>
                  <textarea value={selectedPartner.notes||''} onChange={e=>updatePartner(selectedPartner.id,'notes',e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white h-20 resize-none" placeholder="Partner notes..."/>
                </div>
                
                <div className="flex gap-2">
                  <button className="flex-1 px-3 py-2 bg-slate-700 rounded-lg text-sm hover:bg-slate-600">📄 Generate NDA</button>
                  <button className="flex-1 px-3 py-2 bg-slate-700 rounded-lg text-sm hover:bg-slate-600">📋 Generate TA</button>
                </div>
              </div>
            </div>
          ):(
            <div className="glass p-12 text-center">
              <span className="text-6xl">🤝</span>
              <p className="text-slate-400 mt-4">Select a partner to view details</p>
            </div>
          )}
        </div>
      </div>

      {/* Workshare Visualization */}
      <div className="glass p-4 mt-6">
        <h3 className="font-semibold text-white mb-3">Workshare Distribution</h3>
        <div className="flex h-8 rounded-lg overflow-hidden">
          <div className="bg-cyan-500 flex items-center justify-center text-xs font-medium" style={{width:`${100-totalWorkshare}%`}}>
            Prime ({100-totalWorkshare}%)
          </div>
          {partners.map((p,i)=>(
            <div key={p.id} className="flex items-center justify-center text-xs font-medium" style={{width:`${p.workshare_percent}%`,background:`hsl(${(i*60)+120},70%,40%)`}}>
              {p.workshare_percent>=10?`${p.company_name.split(' ')[0]} (${p.workshare_percent}%)`:''}
            </div>
          ))}
        </div>
      </div>

      {/* Add Partner Modal */}
      {showAdd&&(
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
          <div className="glass p-6 w-full max-w-md">
            <h3 className="text-lg font-bold text-white mb-4">Add Teaming Partner</h3>
            <div className="space-y-3">
              <input value={newPartner.company_name} onChange={e=>setNewPartner({...newPartner,company_name:e.target.value})} placeholder="Company Name" className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
              <div className="grid grid-cols-2 gap-3">
                <input value={newPartner.contact_name} onChange={e=>setNewPartner({...newPartner,contact_name:e.target.value})} placeholder="Contact Name" className="bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
                <input value={newPartner.contact_email} onChange={e=>setNewPartner({...newPartner,contact_email:e.target.value})} placeholder="Email" className="bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
              </div>
              <input value={newPartner.role} onChange={e=>setNewPartner({...newPartner,role:e.target.value})} placeholder="Role/Scope" className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
              <div className="grid grid-cols-2 gap-3">
                <select value={newPartner.set_aside} onChange={e=>setNewPartner({...newPartner,set_aside:e.target.value})} className="bg-slate-800 border border-slate-700 rounded-lg p-2 text-white">
                  {SET_ASIDES.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
                <select value={newPartner.teaming_type} onChange={e=>setNewPartner({...newPartner,teaming_type:e.target.value})} className="bg-slate-800 border border-slate-700 rounded-lg p-2 text-white">
                  {TEAMING_TYPES.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
                </select>
              </div>
              <div className="flex gap-3">
                <button onClick={()=>setShowAdd(false)} className="flex-1 px-4 py-2 bg-slate-700 rounded-lg">Cancel</button>
                <button onClick={addPartner} className="flex-1 px-4 py-2 bg-cyan-500 rounded-lg text-white">Add Partner</button>
              </div>
            </div>
          </div>
        </div>
      )}

      <div className="text-center text-xs text-slate-500 mt-8">
        AI GENERATED - REQUIRES HUMAN REVIEW | © 2026 Mission Meets Tech
      </div>
    </div>
  );
}

ReactDOM.render(<TeamingPartners/>,document.getElementById('root'));
</script>
</body>
</html>
