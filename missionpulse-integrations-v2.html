<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - AI Integrations</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.1); }
    .input-field { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(0, 229, 250, 0.2); }
    .input-field:focus { border-color: #00E5FA; outline: none; box-shadow: 0 0 0 2px rgba(0, 229, 250, 0.1); }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <!-- Load AskSage Client and AI Router -->
  <script src="asksage-client.js"></script>
  <script src="ai-router.js"></script>
  
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ═══════════════════════════════════════════════════════════════════
    // SUPABASE CONFIGURATION
    // ═══════════════════════════════════════════════════════════════════
    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    
    let supabase = null;
    try {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) {
      console.warn('Supabase init failed');
    }

    // ═══════════════════════════════════════════════════════════════════
    // ICONS
    // ═══════════════════════════════════════════════════════════════════
    const Icons = {
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
      shield: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
      x: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>,
      refresh: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>,
      key: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>,
      eye: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>,
      eyeOff: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>,
      zap: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
      server: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01" /></svg>,
      link: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>,
      info: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    // ═══════════════════════════════════════════════════════════════════
    // ASKSAGE ENDPOINTS
    // ═══════════════════════════════════════════════════════════════════
    const SECURITY_LEVELS = [
      { value: 'commercial', label: 'FedRAMP High (Commercial)', cuiAuthorized: false, description: 'Standard commercial endpoint' },
      { value: 'il5_civilian', label: 'IL5 Civilian (CUI Authorized)', cuiAuthorized: true, description: 'For civilian CUI workloads' },
      { value: 'il5_dod', label: 'IL5 DoD (NIPR Required)', cuiAuthorized: true, description: 'Requires NIPR connection' },
    ];

    // ═══════════════════════════════════════════════════════════════════
    // MAIN COMPONENT
    // ═══════════════════════════════════════════════════════════════════
    function IntegrationsApp() {
      const [loading, setLoading] = useState(false);
      
      // AskSage config
      const [asksageEmail, setAsksageEmail] = useState('');
      const [asksageApiKey, setAsksageApiKey] = useState('');
      const [asksageSecurityLevel, setAsksageSecurityLevel] = useState('commercial');
      const [asksageStatus, setAsksageStatus] = useState(null);
      const [showAsksageKey, setShowAsksageKey] = useState(false);
      const [testingAsksage, setTestingAsksage] = useState(false);

      // Anthropic config (via Render backend)
      const [renderEndpoint, setRenderEndpoint] = useState('https://missionpulse-api.onrender.com');
      const [anthropicStatus, setAnthropicStatus] = useState(null);
      const [testingAnthropic, setTestingAnthropic] = useState(false);

      // Routing preferences
      const [preferAsksage, setPreferAsksage] = useState(false);
      const [fallbackEnabled, setFallbackEnabled] = useState(true);

      // Load saved config on mount
      useEffect(() => {
        loadSavedConfig();
      }, []);

      async function loadSavedConfig() {
        // Try to load from localStorage for demo
        const saved = localStorage.getItem('missionpulse_integrations');
        if (saved) {
          try {
            const config = JSON.parse(saved);
            setAsksageEmail(config.asksageEmail || '');
            setAsksageSecurityLevel(config.asksageSecurityLevel || 'commercial');
            setRenderEndpoint(config.renderEndpoint || 'https://missionpulse-api.onrender.com');
            setPreferAsksage(config.preferAsksage || false);
            setFallbackEnabled(config.fallbackEnabled !== false);
            // Don't load API key from localStorage for security
          } catch (e) {
            console.error('Failed to load config:', e);
          }
        }
      }

      async function saveConfig() {
        // Save non-sensitive config to localStorage
        const config = {
          asksageEmail,
          asksageSecurityLevel,
          renderEndpoint,
          preferAsksage,
          fallbackEnabled
        };
        localStorage.setItem('missionpulse_integrations', JSON.stringify(config));

        // Configure the global AI router
        if (window.aiRouter) {
          if (asksageEmail && asksageApiKey) {
            window.aiRouter.configureAskSage({
              email: asksageEmail,
              apiKey: asksageApiKey,
              securityLevel: asksageSecurityLevel
            });
          }
          window.aiRouter.configureRenderBackend(renderEndpoint);
          window.aiRouter.setPreferAskSage(preferAsksage);
          window.aiRouter.fallbackEnabled = fallbackEnabled;
        }

        alert('Configuration saved!');
      }

      async function testAsksageConnection() {
        if (!asksageEmail || !asksageApiKey) {
          setAsksageStatus({ success: false, message: 'Email and API key required' });
          return;
        }

        setTestingAsksage(true);
        setAsksageStatus(null);

        try {
          const client = new window.AskSageClient({
            email: asksageEmail,
            apiKey: asksageApiKey,
            securityLevel: asksageSecurityLevel
          });

          const result = await client.testConnection();
          setAsksageStatus(result);
        } catch (error) {
          setAsksageStatus({ success: false, message: error.message });
        }

        setTestingAsksage(false);
      }

      async function testAnthropicConnection() {
        setTestingAnthropic(true);
        setAnthropicStatus(null);

        try {
          const response = await fetch(`${renderEndpoint}/health`);
          if (response.ok) {
            setAnthropicStatus({ success: true, message: 'Render backend connected' });
          } else {
            setAnthropicStatus({ success: false, message: `Backend returned ${response.status}` });
          }
        } catch (error) {
          // Try the agent endpoint as fallback
          try {
            const response = await fetch(`${renderEndpoint}/api/agent/general`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ message: 'test', context: {} })
            });
            if (response.ok) {
              setAnthropicStatus({ success: true, message: 'Render backend connected (via agent)' });
            } else {
              setAnthropicStatus({ success: false, message: error.message });
            }
          } catch (e) {
            setAnthropicStatus({ success: false, message: error.message });
          }
        }

        setTestingAnthropic(false);
      }

      const selectedSecurityLevel = SECURITY_LEVELS.find(s => s.value === asksageSecurityLevel);

      return (
        <div className="min-h-screen bg-[#00050F] text-white">
          {/* Header */}
          <header className="glass border-b border-cyan-500/20 sticky top-0 z-50">
            <div className="max-w-4xl mx-auto px-4 py-3">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="p-2 rounded-lg hover:bg-cyan-500/10 transition-colors">
                    <Icon name="home" className="w-5 h-5 text-cyan-400" />
                  </a>
                  <div className="flex items-center gap-2">
                    <Icon name="link" className="w-6 h-6 text-cyan-400" />
                    <h1 className="text-xl font-bold">AI Integrations</h1>
                  </div>
                </div>
                
                <button
                  onClick={saveConfig}
                  className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 rounded-lg text-black font-medium"
                >
                  Save Configuration
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-4 py-8 space-y-8">
            {/* Routing Overview */}
            <div className="glass rounded-xl p-6">
              <div className="flex items-center gap-3 mb-4">
                <Icon name="zap" className="w-6 h-6 text-cyan-400" />
                <h2 className="text-lg font-semibold">Smart AI Routing</h2>
              </div>
              <p className="text-slate-400 mb-4">
                MissionPulse automatically routes AI requests based on data classification:
              </p>
              <div className="grid grid-cols-2 gap-4">
                <div className="bg-green-500/10 border border-green-500/30 rounded-lg p-4">
                  <h3 className="font-semibold text-green-400 mb-2">CUI Content → AskSage</h3>
                  <ul className="text-sm text-slate-300 space-y-1">
                    <li>• CUI//PROPIN, CUI//FEDCON markings</li>
                    <li>• Pricing & BOE modules</li>
                    <li>• Black Hat competitive analysis</li>
                    <li>• FedRAMP High / IL5 compliant</li>
                  </ul>
                </div>
                <div className="bg-blue-500/10 border border-blue-500/30 rounded-lg p-4">
                  <h3 className="font-semibold text-blue-400 mb-2">General Queries → Anthropic</h3>
                  <ul className="text-sm text-slate-300 space-y-1">
                    <li>• UNCLASSIFIED content</li>
                    <li>• General proposal writing</li>
                    <li>• Research & brainstorming</li>
                    <li>• Faster response times</li>
                  </ul>
                </div>
              </div>
            </div>

            {/* AskSage Configuration */}
            <div className="glass rounded-xl p-6">
              <div className="flex items-center justify-between mb-6">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center">
                    <Icon name="shield" className="w-6 h-6 text-white" />
                  </div>
                  <div>
                    <h2 className="text-lg font-semibold">AskSage</h2>
                    <p className="text-sm text-slate-400">FedRAMP High / IL5 AI Platform</p>
                  </div>
                </div>
                {asksageStatus && (
                  <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-sm ${asksageStatus.success ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}`}>
                    <Icon name={asksageStatus.success ? 'check' : 'x'} className="w-4 h-4" />
                    {asksageStatus.success ? 'Connected' : 'Failed'}
                  </div>
                )}
              </div>

              <div className="space-y-4">
                {/* Security Level */}
                <div>
                  <label className="block text-sm text-slate-400 mb-2">Security Level</label>
                  <select
                    value={asksageSecurityLevel}
                    onChange={(e) => setAsksageSecurityLevel(e.target.value)}
                    className="w-full input-field rounded-lg px-4 py-3"
                  >
                    {SECURITY_LEVELS.map(level => (
                      <option key={level.value} value={level.value}>{level.label}</option>
                    ))}
                  </select>
                  <p className="text-xs text-slate-500 mt-1">
                    {selectedSecurityLevel?.description}
                    {selectedSecurityLevel?.cuiAuthorized && (
                      <span className="text-green-400 ml-2">✓ CUI Authorized</span>
                    )}
                  </p>
                </div>

                {/* Email */}
                <div>
                  <label className="block text-sm text-slate-400 mb-2">Email Address</label>
                  <input
                    type="email"
                    value={asksageEmail}
                    onChange={(e) => setAsksageEmail(e.target.value)}
                    placeholder="your-email@company.com"
                    className="w-full input-field rounded-lg px-4 py-3"
                  />
                </div>

                {/* API Key */}
                <div>
                  <label className="block text-sm text-slate-400 mb-2">API Key</label>
                  <div className="relative">
                    <input
                      type={showAsksageKey ? 'text' : 'password'}
                      value={asksageApiKey}
                      onChange={(e) => setAsksageApiKey(e.target.value)}
                      placeholder="Enter your AskSage API key"
                      className="w-full input-field rounded-lg px-4 py-3 pr-12"
                    />
                    <button
                      type="button"
                      onClick={() => setShowAsksageKey(!showAsksageKey)}
                      className="absolute right-3 top-1/2 -translate-y-1/2 p-1.5 hover:bg-cyan-500/20 rounded"
                    >
                      <Icon name={showAsksageKey ? 'eyeOff' : 'eye'} className="w-5 h-5 text-slate-400" />
                    </button>
                  </div>
                  <p className="text-xs text-slate-500 mt-1">
                    Get your API key from <a href="https://chat.asksage.ai" target="_blank" className="text-cyan-400 hover:underline">chat.asksage.ai</a> → Settings → Account → Manage API Keys
                  </p>
                </div>

                {/* Test Connection */}
                <button
                  onClick={testAsksageConnection}
                  disabled={testingAsksage || !asksageEmail || !asksageApiKey}
                  className="flex items-center gap-2 px-4 py-2 bg-purple-500/20 hover:bg-purple-500/30 rounded-lg text-purple-400 disabled:opacity-50"
                >
                  <Icon name="refresh" className={`w-4 h-4 ${testingAsksage ? 'animate-spin' : ''}`} />
                  {testingAsksage ? 'Testing...' : 'Test Connection'}
                </button>

                {asksageStatus && (
                  <div className={`p-3 rounded-lg text-sm ${asksageStatus.success ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'}`}>
                    {asksageStatus.message}
                    {asksageStatus.modelsAvailable && (
                      <span className="block text-xs mt-1">Models available: {asksageStatus.modelsAvailable}</span>
                    )}
                  </div>
                )}
              </div>
            </div>

            {/* Anthropic / Render Configuration */}
            <div className="glass rounded-xl p-6">
              <div className="flex items-center justify-between mb-6">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-orange-500 to-yellow-500 flex items-center justify-center">
                    <Icon name="server" className="w-6 h-6 text-white" />
                  </div>
                  <div>
                    <h2 className="text-lg font-semibold">Anthropic (Claude)</h2>
                    <p className="text-sm text-slate-400">Via MissionPulse Backend</p>
                  </div>
                </div>
                {anthropicStatus && (
                  <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-sm ${anthropicStatus.success ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}`}>
                    <Icon name={anthropicStatus.success ? 'check' : 'x'} className="w-4 h-4" />
                    {anthropicStatus.success ? 'Connected' : 'Failed'}
                  </div>
                )}
              </div>

              <div className="space-y-4">
                <div>
                  <label className="block text-sm text-slate-400 mb-2">Backend Endpoint</label>
                  <input
                    type="url"
                    value={renderEndpoint}
                    onChange={(e) => setRenderEndpoint(e.target.value)}
                    placeholder="https://missionpulse-api.onrender.com"
                    className="w-full input-field rounded-lg px-4 py-3"
                  />
                  <p className="text-xs text-slate-500 mt-1">
                    The MissionPulse backend handles Anthropic API calls securely
                  </p>
                </div>

                <button
                  onClick={testAnthropicConnection}
                  disabled={testingAnthropic}
                  className="flex items-center gap-2 px-4 py-2 bg-orange-500/20 hover:bg-orange-500/30 rounded-lg text-orange-400 disabled:opacity-50"
                >
                  <Icon name="refresh" className={`w-4 h-4 ${testingAnthropic ? 'animate-spin' : ''}`} />
                  {testingAnthropic ? 'Testing...' : 'Test Connection'}
                </button>

                {anthropicStatus && (
                  <div className={`p-3 rounded-lg text-sm ${anthropicStatus.success ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'}`}>
                    {anthropicStatus.message}
                  </div>
                )}
              </div>
            </div>

            {/* Routing Preferences */}
            <div className="glass rounded-xl p-6">
              <div className="flex items-center gap-3 mb-6">
                <Icon name="zap" className="w-6 h-6 text-cyan-400" />
                <h2 className="text-lg font-semibold">Routing Preferences</h2>
              </div>

              <div className="space-y-4">
                <label className="flex items-center gap-3 p-4 bg-slate-800/50 rounded-lg cursor-pointer hover:bg-slate-800">
                  <input
                    type="checkbox"
                    checked={preferAsksage}
                    onChange={(e) => setPreferAsksage(e.target.checked)}
                    className="w-5 h-5 rounded border-cyan-500/30 bg-slate-700 text-cyan-500 focus:ring-cyan-500"
                  />
                  <div>
                    <span className="font-medium">Always use AskSage when available</span>
                    <p className="text-sm text-slate-400">Route all queries through FedRAMP High endpoint (more secure, may be slower)</p>
                  </div>
                </label>

                <label className="flex items-center gap-3 p-4 bg-slate-800/50 rounded-lg cursor-pointer hover:bg-slate-800">
                  <input
                    type="checkbox"
                    checked={fallbackEnabled}
                    onChange={(e) => setFallbackEnabled(e.target.checked)}
                    className="w-5 h-5 rounded border-cyan-500/30 bg-slate-700 text-cyan-500 focus:ring-cyan-500"
                  />
                  <div>
                    <span className="font-medium">Enable provider fallback</span>
                    <p className="text-sm text-slate-400">If primary provider fails, try secondary (CUI content will never fallback to non-compliant provider)</p>
                  </div>
                </label>
              </div>
            </div>

            {/* Info Box */}
            <div className="bg-blue-500/10 border border-blue-500/30 rounded-xl p-4">
              <div className="flex items-start gap-3">
                <Icon name="info" className="w-5 h-5 text-blue-400 mt-0.5" />
                <div className="text-sm text-blue-200">
                  <p className="font-semibold mb-2">CMMC Compliance Note</p>
                  <p>
                    All CUI-marked content (CUI//PROPIN, CUI//FEDCON, etc.) is automatically routed to AskSage 
                    when configured. This ensures your sensitive proposal data stays within FedRAMP High / IL5 
                    compliant infrastructure. API keys are stored locally and never transmitted to third parties.
                  </p>
                </div>
              </div>
            </div>
          </main>

          {/* Footer */}
          <footer className="border-t border-cyan-500/10 mt-8 py-4 text-center text-xs text-slate-500">
            <p>MissionPulse v3.1 • Mission Meets Tech • AI GENERATED CONTENT REQUIRES HUMAN REVIEW</p>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<IntegrationsApp />, document.getElementById('root'));
  </script>
</body>
</html>
