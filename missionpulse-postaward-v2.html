<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Post-Award</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-green { 0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); } }
    .pulse-green { animation: pulse-green 2s infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const DEMO_CONTRACT = {
      id: 'demo-1',
      title: 'DHA Electronic Health Record Modernization',
      nickname: 'EHR-Mod',
      contract_number: 'HT0011-26-C-0042',
      award_date: '2026-02-15',
      start_date: '2026-03-01',
      end_date: '2031-02-28',
      ceiling: 125000000,
      funded: 15000000,
      cor_name: 'Dr. Sarah Mitchell',
      cor_email: 'sarah.mitchell@dha.mil',
      status: 'Transition'
    };

    const DEMO_MILESTONES = [
      { id: 1, phase: 'Transition', title: 'Contract Kickoff Meeting', due: '2026-03-05', owner: 'PM', status: 'Complete' },
      { id: 2, phase: 'Transition', title: 'Onboard Key Personnel', due: '2026-03-10', owner: 'HR', status: 'Complete' },
      { id: 3, phase: 'Transition', title: 'IT Security Accreditation', due: '2026-03-15', owner: 'SA', status: 'In Progress' },
      { id: 4, phase: 'Transition', title: 'Knowledge Transfer from Incumbent', due: '2026-03-20', owner: 'PM', status: 'In Progress' },
      { id: 5, phase: 'Transition', title: 'Systems Access Provisioning', due: '2026-03-25', owner: 'SA', status: 'Not Started' },
      { id: 6, phase: 'Transition', title: 'Transition Complete - Full Operations', due: '2026-04-01', owner: 'PM', status: 'Not Started' },
      { id: 7, phase: 'Base Year', title: 'Monthly Status Report #1', due: '2026-04-15', owner: 'PM', status: 'Not Started' },
      { id: 8, phase: 'Base Year', title: 'Phase 1 Milestone Delivery', due: '2026-06-01', owner: 'SA', status: 'Not Started' }
    ];

    const DEMO_ACTIONS = [
      { id: 1, type: 'Document', title: 'Submit DD254', due: '2026-03-01', priority: 'Critical', status: 'Complete' },
      { id: 2, type: 'Meeting', title: 'Kickoff Preparation', due: '2026-03-03', priority: 'High', status: 'Complete' },
      { id: 3, type: 'Staffing', title: 'Clear PM (Secret)', due: '2026-03-08', priority: 'Critical', status: 'In Progress' },
      { id: 4, type: 'Document', title: 'Quality Control Plan', due: '2026-03-12', priority: 'High', status: 'Not Started' },
      { id: 5, type: 'System', title: 'Request CAC cards', due: '2026-03-10', priority: 'High', status: 'In Progress' },
      { id: 6, type: 'Document', title: 'Safety Plan Submission', due: '2026-03-15', priority: 'Medium', status: 'Not Started' }
    ];

    function Sidebar() {
      const navItems = [
        { icon: '🏠', label: 'Dashboard', path: 'index.html' },
        { icon: '📊', label: 'Pipeline', path: 'missionpulse-pipeline-v2.html' },
        { icon: '🎯', label: 'War Room', path: 'missionpulse-warroom-v2.html' },
        { icon: '📚', label: 'Lessons', path: 'missionpulse-lessons-v2.html' },
        { icon: '🏆', label: 'Post-Award', path: 'missionpulse-postaward-v2.html', active: true },
        { icon: '🤖', label: 'Agent Hub', path: 'missionpulse-agenthub-v2.html' }
      ];
      return (
        <div className="w-64 bg-slate-900/50 border-r border-slate-700 min-h-screen p-4 hidden lg:block">
          <div className="flex items-center gap-3 mb-8">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center pulse-green">
              <span className="text-xl">🏆</span>
            </div>
            <div>
              <div className="font-bold text-emerald-400">Post-Award</div>
              <div className="text-xs text-slate-400">Contract Transition</div>
            </div>
          </div>
          <nav className="space-y-1">
            {navItems.map((item, i) => (
              <a key={i} href={item.path} className={`flex items-center gap-3 px-3 py-2 rounded-lg transition-all ${item.active ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                <span>{item.icon}</span><span className="text-sm">{item.label}</span>
              </a>
            ))}
          </nav>
        </div>
      );
    }

    function MilestoneRow({ milestone }) {
      const statusColors = { 'Complete': 'bg-emerald-500/20 text-emerald-400', 'In Progress': 'bg-cyan-500/20 text-cyan-400', 'Not Started': 'bg-slate-500/20 text-slate-400' };
      const daysUntil = Math.ceil((new Date(milestone.due) - new Date()) / (1000 * 60 * 60 * 24));
      const isOverdue = daysUntil < 0 && milestone.status !== 'Complete';

      return (
        <tr className="border-b border-slate-700/50 hover:bg-slate-800/30">
          <td className="p-3"><span className="px-2 py-0.5 bg-slate-700 rounded text-xs">{milestone.phase}</span></td>
          <td className="p-3 text-sm">{milestone.title}</td>
          <td className="p-3 text-sm">{milestone.owner}</td>
          <td className="p-3 text-sm">
            <span className={isOverdue ? 'text-red-400' : ''}>{milestone.due}</span>
            {isOverdue && milestone.status !== 'Complete' && <span className="text-red-400 text-xs ml-2">({Math.abs(daysUntil)}d late)</span>}
          </td>
          <td className="p-3"><span className={`px-2 py-0.5 rounded text-xs ${statusColors[milestone.status]}`}>{milestone.status}</span></td>
        </tr>
      );
    }

    function ActionCard({ action }) {
      const priorityColors = { 'Critical': 'border-red-500/50 bg-red-500/10', 'High': 'border-amber-500/50 bg-amber-500/10', 'Medium': 'border-slate-500/50', 'Low': 'border-slate-700' };
      const statusColors = { 'Complete': 'bg-emerald-500/20 text-emerald-400', 'In Progress': 'bg-cyan-500/20 text-cyan-400', 'Not Started': 'bg-slate-500/20 text-slate-400' };
      const typeIcons = { 'Document': '📄', 'Meeting': '📅', 'Staffing': '👤', 'System': '💻' };

      return (
        <div className={`border rounded-xl p-4 ${priorityColors[action.priority]}`}>
          <div className="flex items-start justify-between mb-2">
            <div className="flex items-center gap-2">
              <span>{typeIcons[action.type]}</span>
              <span className="text-xs text-slate-400">{action.type}</span>
            </div>
            <span className={`px-2 py-0.5 rounded text-xs ${statusColors[action.status]}`}>{action.status}</span>
          </div>
          <h4 className="font-medium text-sm mb-2">{action.title}</h4>
          <div className="flex items-center justify-between text-xs">
            <span className="text-slate-400">Due: {action.due}</span>
            <span className={`${action.priority === 'Critical' ? 'text-red-400' : action.priority === 'High' ? 'text-amber-400' : 'text-slate-400'}`}>{action.priority}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [contract] = React.useState(DEMO_CONTRACT);
      const [milestones] = React.useState(DEMO_MILESTONES);
      const [actions] = React.useState(DEMO_ACTIONS);
      const [activeTab, setActiveTab] = React.useState('overview');

      const completedMilestones = milestones.filter(m => m.status === 'Complete').length;
      const completedActions = actions.filter(a => a.status === 'Complete').length;
      const criticalActions = actions.filter(a => a.priority === 'Critical' && a.status !== 'Complete').length;
      const transitionProgress = Math.round((completedMilestones / milestones.filter(m => m.phase === 'Transition').length) * 100);

      return (
        <div className="flex min-h-screen">
          <Sidebar />
          <div className="flex-1 p-4 lg:p-6">
            {/* Success Banner */}
            <div className="mb-4 p-4 bg-gradient-to-r from-emerald-500/20 to-teal-500/20 border border-emerald-500/30 rounded-xl flex items-center gap-4">
              <div className="w-12 h-12 bg-emerald-500 rounded-xl flex items-center justify-center text-2xl">🏆</div>
              <div>
                <div className="font-bold text-emerald-400">Contract Awarded!</div>
                <div className="text-sm text-slate-300">{contract.title}</div>
              </div>
              <div className="ml-auto text-right">
                <div className="text-xl font-bold text-emerald-400">${(contract.ceiling / 1000000).toFixed(0)}M</div>
                <div className="text-xs text-slate-400">Ceiling</div>
              </div>
            </div>

            {/* Header */}
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
              <div>
                <h1 className="text-2xl font-bold">{contract.nickname} • Post-Award</h1>
                <p className="text-slate-400 text-sm">Contract: {contract.contract_number}</p>
              </div>
              <button className="px-4 py-2 bg-emerald-500 hover:bg-emerald-400 text-slate-900 rounded-lg text-sm font-medium">
                + Add Action Item
              </button>
            </div>

            {/* Stats */}
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <div className="text-2xl font-bold">{transitionProgress}%</div>
                <div className="text-sm text-slate-400">Transition Progress</div>
                <div className="h-1 bg-slate-700 rounded-full mt-2 overflow-hidden">
                  <div className="h-full bg-emerald-500 rounded-full" style={{ width: `${transitionProgress}%` }} />
                </div>
              </div>
              <div className="bg-slate-800/50 border border-emerald-500/30 rounded-xl p-4">
                <div className="text-2xl font-bold text-emerald-400">{completedMilestones}/{milestones.length}</div>
                <div className="text-sm text-slate-400">Milestones</div>
              </div>
              <div className="bg-slate-800/50 border border-cyan-500/30 rounded-xl p-4">
                <div className="text-2xl font-bold text-cyan-400">{completedActions}/{actions.length}</div>
                <div className="text-sm text-slate-400">Actions Complete</div>
              </div>
              <div className="bg-slate-800/50 border border-red-500/30 rounded-xl p-4">
                <div className="text-2xl font-bold text-red-400">{criticalActions}</div>
                <div className="text-sm text-slate-400">Critical Open</div>
              </div>
            </div>

            {/* Tabs */}
            <div className="flex gap-2 mb-6">
              {['overview', 'milestones', 'actions', 'contacts'].map(tab => (
                <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 rounded-lg text-sm transition-colors ${activeTab === tab ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-slate-800/50 hover:bg-slate-700'}`}>
                  {tab === 'overview' && '📋 Overview'}
                  {tab === 'milestones' && '🎯 Milestones'}
                  {tab === 'actions' && '✅ Actions'}
                  {tab === 'contacts' && '👥 Contacts'}
                </button>
              ))}
            </div>

            {/* Tab Content */}
            {activeTab === 'overview' && (
              <div className="grid lg:grid-cols-2 gap-6">
                <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
                  <h3 className="font-semibold mb-4">Contract Details</h3>
                  <div className="space-y-3 text-sm">
                    <div className="flex justify-between"><span className="text-slate-400">Contract Number</span><span className="font-mono">{contract.contract_number}</span></div>
                    <div className="flex justify-between"><span className="text-slate-400">Award Date</span><span>{contract.award_date}</span></div>
                    <div className="flex justify-between"><span className="text-slate-400">Period of Performance</span><span>{contract.start_date} - {contract.end_date}</span></div>
                    <div className="flex justify-between"><span className="text-slate-400">Ceiling</span><span className="text-emerald-400">${(contract.ceiling / 1000000).toFixed(0)}M</span></div>
                    <div className="flex justify-between"><span className="text-slate-400">Funded To Date</span><span>${(contract.funded / 1000000).toFixed(1)}M</span></div>
                    <div className="flex justify-between"><span className="text-slate-400">Status</span><span className="px-2 py-0.5 bg-cyan-500/20 text-cyan-400 rounded">{contract.status}</span></div>
                  </div>
                </div>
                <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
                  <h3 className="font-semibold mb-4">Upcoming Deadlines</h3>
                  <div className="space-y-3">
                    {milestones.filter(m => m.status !== 'Complete').slice(0, 5).map(m => (
                      <div key={m.id} className="flex items-center justify-between p-2 bg-slate-900/50 rounded-lg">
                        <span className="text-sm">{m.title}</span>
                        <span className="text-xs text-slate-400">{m.due}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'milestones' && (
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl overflow-hidden">
                <table className="w-full">
                  <thead>
                    <tr className="border-b border-slate-700 bg-slate-800/50">
                      <th className="text-left p-3 text-xs text-slate-400 font-medium">Phase</th>
                      <th className="text-left p-3 text-xs text-slate-400 font-medium">Milestone</th>
                      <th className="text-left p-3 text-xs text-slate-400 font-medium">Owner</th>
                      <th className="text-left p-3 text-xs text-slate-400 font-medium">Due Date</th>
                      <th className="text-left p-3 text-xs text-slate-400 font-medium">Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    {milestones.map(m => <MilestoneRow key={m.id} milestone={m} />)}
                  </tbody>
                </table>
              </div>
            )}

            {activeTab === 'actions' && (
              <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                {actions.map(a => <ActionCard key={a.id} action={a} />)}
                <div className="border-2 border-dashed border-slate-700 rounded-xl p-8 flex items-center justify-center text-slate-500 hover:border-emerald-500/50 hover:text-emerald-400 cursor-pointer transition-colors">
                  + Add Action
                </div>
              </div>
            )}

            {activeTab === 'contacts' && (
              <div className="grid lg:grid-cols-2 gap-6">
                <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
                  <h3 className="font-semibold mb-4">Government Contacts</h3>
                  <div className="space-y-4">
                    <div className="p-4 bg-slate-900/50 rounded-lg">
                      <div className="font-medium">Contracting Officer Representative (COR)</div>
                      <div className="text-sm text-slate-400">{contract.cor_name}</div>
                      <div className="text-sm text-cyan-400">{contract.cor_email}</div>
                    </div>
                    <div className="p-4 bg-slate-900/50 rounded-lg">
                      <div className="font-medium">Contracting Officer (CO)</div>
                      <div className="text-sm text-slate-400">TBD</div>
                    </div>
                  </div>
                </div>
                <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
                  <h3 className="font-semibold mb-4">Our Team</h3>
                  <div className="space-y-4">
                    <div className="p-4 bg-slate-900/50 rounded-lg flex items-center gap-3">
                      <div className="w-10 h-10 bg-purple-500 rounded-full flex items-center justify-center font-bold">PM</div>
                      <div><div className="font-medium">Program Manager</div><div className="text-sm text-slate-400">John Smith</div></div>
                    </div>
                    <div className="p-4 bg-slate-900/50 rounded-lg flex items-center gap-3">
                      <div className="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center font-bold">SA</div>
                      <div><div className="font-medium">Solution Architect</div><div className="text-sm text-slate-400">Emily Chen</div></div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            <div className="mt-8 text-center text-xs text-slate-500">
              <div>Mission Meets Tech | MissionPulse Post-Award</div>
              <div className="mt-1">AI GENERATED - REQUIRES HUMAN REVIEW</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
