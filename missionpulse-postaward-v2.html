<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post-Award | MissionPulse</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const DEMO_WIN = {
      id: 1,
      name: 'DHA Healthcare Platform',
      agency: 'DHA',
      contract_value: 47000000,
      contract_number: 'W81XWH-26-C-0001',
      award_date: '2026-01-15',
      pop_start: '2026-02-01',
      pop_end: '2031-01-31',
      contract_type: '5-Year IDIQ',
      status: 'transition',
    };

    const TRANSITION_PHASES = [
      { id: 'kickoff', name: 'Contract Kickoff', duration: '1 week', tasks: ['Kickoff meeting', 'Badge requests', 'Workspace setup'] },
      { id: 'onboarding', name: 'Team Onboarding', duration: '2 weeks', tasks: ['Hire key personnel', 'Security clearances', 'System access'] },
      { id: 'knowledge', name: 'Knowledge Transfer', duration: '2 weeks', tasks: ['Incumbent briefings', 'Documentation review', 'Process mapping'] },
      { id: 'parallel', name: 'Parallel Operations', duration: '2 weeks', tasks: ['Shadow operations', 'Quality validation', 'Issue resolution'] },
      { id: 'steady', name: 'Steady State', duration: 'Ongoing', tasks: ['Full operations', 'Performance monitoring', 'Continuous improvement'] },
    ];

    const DEMO_STAFF = [
      { id: 1, role: 'Program Manager', name: 'Sarah Chen', status: 'confirmed', clearance: 'TS/SCI', start_date: '2026-02-01', salary: 185000 },
      { id: 2, role: 'Technical Lead', name: 'John Smith', status: 'confirmed', clearance: 'Secret', start_date: '2026-02-01', salary: 165000 },
      { id: 3, role: 'Solution Architect', name: 'Mike Johnson', status: 'pending', clearance: 'TS/SCI', start_date: '2026-02-15', salary: 155000 },
      { id: 4, role: 'Senior Developer', name: 'Lisa Wong', status: 'confirmed', clearance: 'Secret', start_date: '2026-02-01', salary: 145000 },
      { id: 5, role: 'Data Architect', name: '', status: 'open', clearance: 'Secret', start_date: null, salary: 150000 },
      { id: 6, role: 'Security Engineer', name: '', status: 'interviewing', clearance: 'TS/SCI', start_date: null, salary: 155000 },
    ];

    const DEMO_TASKS = [
      { id: 1, task: 'Schedule kickoff meeting with COR', phase: 'kickoff', status: 'complete', due: '2026-01-20', assignee: 'Sarah Chen' },
      { id: 2, task: 'Submit DD254 security requirements', phase: 'kickoff', status: 'in_progress', due: '2026-01-25', assignee: 'John Smith' },
      { id: 3, task: 'Request CAC cards for team', phase: 'onboarding', status: 'pending', due: '2026-02-01', assignee: 'HR' },
      { id: 4, task: 'Complete incumbent knowledge transfer sessions', phase: 'knowledge', status: 'pending', due: '2026-02-15', assignee: 'Sarah Chen' },
      { id: 5, task: 'Set up project management tools', phase: 'kickoff', status: 'complete', due: '2026-01-22', assignee: 'Mike Johnson' },
    ];

    const STATUS_CONFIG = {
      confirmed: { label: 'Confirmed', color: '#10B981', icon: '✓' },
      pending: { label: 'Pending', color: '#F59E0B', icon: '⏳' },
      open: { label: 'Open Position', color: '#EF4444', icon: '○' },
      interviewing: { label: 'Interviewing', color: '#8B5CF6', icon: '👤' },
    };

    const TASK_STATUS = {
      complete: { label: 'Complete', color: '#10B981' },
      in_progress: { label: 'In Progress', color: '#3B82F6' },
      pending: { label: 'Pending', color: '#64748B' },
      blocked: { label: 'Blocked', color: '#EF4444' },
    };

    function PostAward() {
      const [connected, setConnected] = useState(false);
      const [loading, setLoading] = useState(true);
      const [win, setWin] = useState(null);
      const [staff, setStaff] = useState([]);
      const [tasks, setTasks] = useState([]);
      const [activePhase, setActivePhase] = useState('kickoff');
      const [showAddStaff, setShowAddStaff] = useState(false);

      useEffect(() => { loadData(); }, []);

      const loadData = async () => {
        try {
          // In production, load from post_award_projects table
          setWin(DEMO_WIN);
          setStaff(DEMO_STAFF);
          setTasks(DEMO_TASKS);
          setConnected(false); // Demo mode
        } catch (err) {
          console.error('Load error:', err);
        } finally {
          setLoading(false);
        }
      };

      const stats = useMemo(() => ({
        totalPositions: staff.length,
        filled: staff.filter(s => s.status === 'confirmed').length,
        pending: staff.filter(s => s.status === 'pending' || s.status === 'interviewing').length,
        open: staff.filter(s => s.status === 'open').length,
        tasksComplete: tasks.filter(t => t.status === 'complete').length,
        tasksTotal: tasks.length,
      }), [staff, tasks]);

      const updateTaskStatus = (taskId, newStatus) => {
        setTasks(tasks.map(t => t.id === taskId ? { ...t, status: newStatus } : t));
      };

      const daysUntilStart = useMemo(() => {
        if (!win?.pop_start) return 0;
        const start = new Date(win.pop_start);
        const now = new Date();
        return Math.ceil((start - now) / (1000 * 60 * 60 * 24));
      }, [win]);

      if (loading) {
        return (
          <div className="min-h-screen bg-[#00050F] flex items-center justify-center">
            <div className="w-12 h-12 border-4 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin" />
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#00050F] text-white p-6">
          {/* Header */}
          <div className="flex items-center justify-between mb-6">
            <div>
              <div className="flex items-center gap-3">
                <span className="text-3xl">🎖️</span>
                <h1 className="text-2xl font-bold">Post-Award</h1>
                <span className={`px-2 py-1 text-xs rounded-full ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                  {connected ? '● Live' : '○ Demo'}
                </span>
              </div>
              <p className="text-slate-400 mt-1">Transition planning and staffing tracker</p>
            </div>
            
            <div className="flex items-center gap-3">
              <button className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg font-medium">
                📄 Export Transition Plan
              </button>
              <button className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium">
                ➕ Add Task
              </button>
            </div>
          </div>

          {/* Win Banner */}
          {win && (
            <div className="mb-6 p-6 bg-gradient-to-r from-emerald-500/20 to-teal-500/20 rounded-2xl border border-emerald-500/30">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-amber-400 to-yellow-500 flex items-center justify-center text-3xl">
                    🏆
                  </div>
                  <div>
                    <div className="text-2xl font-bold text-white">WE WON!</div>
                    <div className="text-emerald-400">{win.name}</div>
                    <div className="text-sm text-slate-400">{win.contract_number} • ${(win.contract_value / 1000000).toFixed(1)}M • {win.contract_type}</div>
                  </div>
                </div>
                <div className="text-right">
                  <div className="text-sm text-slate-400">POP Start</div>
                  <div className="text-xl font-bold">{win.pop_start}</div>
                  <div className={`text-sm ${daysUntilStart <= 7 ? 'text-red-400' : daysUntilStart <= 14 ? 'text-amber-400' : 'text-emerald-400'}`}>
                    {daysUntilStart > 0 ? `${daysUntilStart} days until start` : 'Started'}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Stats */}
          <div className="grid grid-cols-6 gap-4 mb-6">
            <div className="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
              <div className="text-3xl font-bold text-emerald-400">{stats.filled}</div>
              <div className="text-sm text-slate-400">Positions Filled</div>
            </div>
            <div className="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
              <div className="text-3xl font-bold text-amber-400">{stats.pending}</div>
              <div className="text-sm text-slate-400">In Progress</div>
            </div>
            <div className="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
              <div className="text-3xl font-bold text-red-400">{stats.open}</div>
              <div className="text-sm text-slate-400">Open Positions</div>
            </div>
            <div className="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
              <div className="text-3xl font-bold text-cyan-400">{stats.totalPositions}</div>
              <div className="text-sm text-slate-400">Total Positions</div>
            </div>
            <div className="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
              <div className="text-3xl font-bold text-purple-400">{stats.tasksComplete}</div>
              <div className="text-sm text-slate-400">Tasks Complete</div>
            </div>
            <div className="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
              <div className="text-3xl font-bold text-white">{Math.round((stats.tasksComplete / stats.tasksTotal) * 100)}%</div>
              <div className="text-sm text-slate-400">Transition Progress</div>
            </div>
          </div>

          <div className="grid grid-cols-12 gap-6">
            {/* Transition Timeline */}
            <div className="col-span-8">
              <div className="bg-slate-800/50 rounded-xl border border-slate-700/50 p-6">
                <h3 className="font-bold text-lg mb-4">Transition Timeline</h3>
                
                {/* Phase Tabs */}
                <div className="flex gap-2 mb-6 overflow-x-auto pb-2">
                  {TRANSITION_PHASES.map((phase, i) => (
                    <button
                      key={phase.id}
                      onClick={() => setActivePhase(phase.id)}
                      className={`flex-shrink-0 px-4 py-2 rounded-lg transition-colors ${
                        activePhase === phase.id 
                          ? 'bg-cyan-500 text-white' 
                          : 'bg-slate-700/50 text-slate-400 hover:text-white'
                      }`}
                    >
                      <span className="text-sm font-medium">{i + 1}. {phase.name}</span>
                    </button>
                  ))}
                </div>

                {/* Phase Tasks */}
                <div className="space-y-3">
                  {tasks.filter(t => t.phase === activePhase).map(task => {
                    const status = TASK_STATUS[task.status];
                    return (
                      <div key={task.id} className="p-4 bg-slate-900/50 rounded-lg border border-slate-700/50">
                        <div className="flex items-center justify-between">
                          <div className="flex items-center gap-3">
                            <input 
                              type="checkbox"
                              checked={task.status === 'complete'}
                              onChange={() => updateTaskStatus(task.id, task.status === 'complete' ? 'pending' : 'complete')}
                              className="w-5 h-5 rounded border-slate-600 bg-slate-800 text-emerald-500"
                            />
                            <div>
                              <div className={task.status === 'complete' ? 'line-through text-slate-500' : 'text-white'}>
                                {task.task}
                              </div>
                              <div className="text-xs text-slate-500">
                                Due: {task.due} • Assignee: {task.assignee}
                              </div>
                            </div>
                          </div>
                          <select 
                            value={task.status}
                            onChange={(e) => updateTaskStatus(task.id, e.target.value)}
                            className="bg-slate-800 border border-slate-600 rounded px-2 py-1 text-sm"
                            style={{ color: status.color }}
                          >
                            {Object.entries(TASK_STATUS).map(([k, v]) => (
                              <option key={k} value={k}>{v.label}</option>
                            ))}
                          </select>
                        </div>
                      </div>
                    );
                  })}

                  {tasks.filter(t => t.phase === activePhase).length === 0 && (
                    <div className="p-8 text-center text-slate-500">
                      No tasks in this phase yet
                    </div>
                  )}
                </div>
              </div>
            </div>

            {/* Staffing Panel */}
            <div className="col-span-4">
              <div className="bg-slate-800/50 rounded-xl border border-slate-700/50 p-6">
                <div className="flex items-center justify-between mb-4">
                  <h3 className="font-bold text-lg">Staffing</h3>
                  <button 
                    onClick={() => setShowAddStaff(true)}
                    className="px-3 py-1 bg-cyan-500/20 text-cyan-400 rounded-lg text-sm hover:bg-cyan-500/30"
                  >
                    + Add
                  </button>
                </div>

                <div className="space-y-3">
                  {staff.map(person => {
                    const status = STATUS_CONFIG[person.status];
                    return (
                      <div key={person.id} className="p-3 bg-slate-900/50 rounded-lg border border-slate-700/50">
                        <div className="flex items-center justify-between mb-1">
                          <span className="font-medium">{person.role}</span>
                          <span className="flex items-center gap-1 text-xs px-2 py-0.5 rounded" style={{ backgroundColor: `${status.color}20`, color: status.color }}>
                            {status.icon} {status.label}
                          </span>
                        </div>
                        <div className="text-sm text-slate-400">
                          {person.name || <span className="text-red-400 italic">Unfilled</span>}
                        </div>
                        <div className="flex items-center gap-3 mt-2 text-xs text-slate-500">
                          <span>🔐 {person.clearance}</span>
                          {person.start_date && <span>📅 {person.start_date}</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* HR Actions */}
                <div className="mt-4 pt-4 border-t border-slate-700/50 space-y-2">
                  <button className="w-full p-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
                    📋 Generate HR Packet
                  </button>
                  <button className="w-full p-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
                    📄 Export Org Chart
                  </button>
                  <button className="w-full p-2 bg-purple-500/20 text-purple-400 hover:bg-purple-500/30 rounded-lg text-sm">
                    📊 Push to Jira
                  </button>
                </div>
              </div>
            </div>
          </div>

          {/* Footer */}
          <div className="mt-8 pt-4 border-t border-slate-800 text-center text-xs text-slate-600">
            AI GENERATED - REQUIRES HUMAN REVIEW
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<PostAward />);
  </script>
</body>
</html>
