<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MissionPulse Demo v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'mmt-cyan': '#00E5FA',
                        'mmt-navy': '#00050F',
                        'mmt-navy-light': '#0A0F1A',
                        'mmt-surface': '#111827',
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glow-cyan { box-shadow: 0 0 20px rgba(0, 229, 250, 0.3); }
        .glow-violet { box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 229, 250, 0.3); }
            50% { box-shadow: 0 0 40px rgba(0, 229, 250, 0.6); }
        }
        .pulse-glow { animation: pulse-glow 2s infinite; }
        
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .slide-in { animation: slideIn 0.4s ease-out forwards; }
        
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        .typing-line {
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid #00E5FA;
            animation: typing 1.5s steps(40, end), blink 0.5s step-end infinite alternate;
        }
        
        .doc-progress {
            transition: width 0.5s ease-out;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0A0F1A; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        
        .screen { display: none; }
        .screen.active { display: block; }
        
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body class="bg-mmt-navy min-h-screen text-white overflow-hidden">

    <!-- ==================== START SCREEN ==================== -->
    <div id="startScreen" class="screen active fixed inset-0 flex items-center justify-center">
        <div class="text-center max-w-4xl mx-auto px-6">
            <div class="mb-8">
                <div class="text-5xl font-bold text-mmt-cyan mb-3">MissionPulse</div>
                <div class="text-xl text-gray-400">AI-Powered Proposal Management</div>
            </div>
            
            <div class="flex items-center justify-center gap-6 mb-10 opacity-60">
                <div class="flex items-center gap-2 text-sm text-gray-400">
                    <div class="w-8 h-8 rounded bg-orange-500 flex items-center justify-center font-bold text-white text-xs">HS</div>
                    <span>HubSpot</span>
                </div>
                <div class="flex items-center gap-2 text-sm text-gray-400">
                    <div class="w-8 h-8 rounded bg-blue-600 flex items-center justify-center font-bold text-white text-xs">360</div>
                    <span>SAM.gov</span>
                </div>
                <div class="flex items-center gap-2 text-sm text-gray-400">
                    <div class="w-8 h-8 rounded bg-purple-600 flex items-center justify-center font-bold text-white text-xs">V</div>
                    <span>Vector</span>
                </div>
            </div>
            
            <div class="text-gray-400 mb-6">Select demo mode:</div>
            
            <div class="flex gap-6 justify-center mb-8">
                <button onclick="startDemo('solo')" class="w-72 p-8 bg-mmt-navy-light border-2 border-mmt-cyan rounded-xl hover:bg-mmt-cyan/10 transition-all pulse-glow">
                    <div class="text-5xl mb-4">👤</div>
                    <div class="text-2xl font-bold text-mmt-cyan mb-2">Solo Mode</div>
                    <div class="text-gray-400 mb-4">One-person operation with AI team</div>
                    <div class="text-sm text-gray-500">6 Phases • 8 Documents • ~4 min</div>
                </button>
                
                <button onclick="startDemo('team')" class="w-72 p-8 bg-mmt-navy-light border-2 border-violet-500 rounded-xl hover:bg-violet-500/10 transition-all glow-violet">
                    <div class="text-5xl mb-4">👥</div>
                    <div class="text-2xl font-bold text-violet-400 mb-2">Team Mode</div>
                    <div class="text-gray-400 mb-4">Full Shipley workflow with partners</div>
                    <div class="text-sm text-gray-500">11 Roles • 4 Color Teams • ~5 min</div>
                </button>
            </div>
            
            <div class="text-gray-600 text-sm">Press ESC to restart</div>
        </div>
    </div>

    <!-- ==================== DEMO CONTAINER ==================== -->
    <div id="demoContainer" class="screen">
        
        <!-- Nav Bar -->
        <nav class="fixed top-0 left-0 right-0 h-14 bg-mmt-navy-light border-b border-gray-800 flex items-center justify-between px-4 z-40">
            <div class="flex items-center gap-3">
                <div class="text-xl font-bold text-mmt-cyan">MissionPulse</div>

            </div>
            
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-1 px-2 py-1 bg-gray-800 rounded text-xs">
                    <div class="w-4 h-4 rounded bg-orange-500 flex items-center justify-center text-white text-[8px] font-bold">HS</div>
                    <span id="hubspotStatus" class="w-2 h-2 rounded-full bg-gray-600"></span>
                </div>
                <div class="flex items-center gap-1 px-2 py-1 bg-gray-800 rounded text-xs">
                    <div class="w-4 h-4 rounded bg-blue-600 flex items-center justify-center text-white text-[8px] font-bold">360</div>
                    <span id="sam360Status" class="w-2 h-2 rounded-full bg-gray-600"></span>
                </div>
                <div class="flex items-center gap-1 px-2 py-1 bg-gray-800 rounded text-xs">
                    <div class="w-4 h-4 rounded bg-purple-600 flex items-center justify-center text-white text-[8px] font-bold">V</div>
                    <span id="vectorStatus" class="w-2 h-2 rounded-full bg-gray-600"></span>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-full bg-mmt-cyan flex items-center justify-center text-mmt-navy font-bold text-sm">M</div>
                <span class="text-gray-300 text-sm">Mary Womack</span>
                <span class="text-xs px-2 py-0.5 bg-mmt-cyan/20 text-mmt-cyan rounded">CEO</span>
            </div>
        </nav>

        <!-- Main Content Area -->
        <div id="mainContent" class="pt-14 h-screen"></div>
    </div>

    <script>
        // ==================== STATE ====================
        let demoMode = null;
        let demoRunning = false;
        let currentStep = 0;
        let animationTimer = null;
        
        const documents = [
            { id: 'exec', name: 'Executive Summary', icon: '📄', owner: 'David Park', initials: 'DP', agent: 'Writer Agent', volume: 'Vol 1', progress: 0, content: ['Opening statement drafted', 'Win themes integrated', 'Value proposition added', 'Final review complete'] },
            { id: 'tech', name: 'Technical Approach', icon: '🏗️', owner: 'Lisa Wong', initials: 'LW', agent: 'Strategy Agent', volume: 'Vol 1', progress: 0, content: ['Architecture overview', 'Solution design complete', 'Implementation timeline', 'Risk mitigation added'] },
            { id: 'mgmt', name: 'Management Plan', icon: '📋', owner: 'Robert Taylor', initials: 'RT', agent: 'Writer Agent', volume: 'Vol 1', progress: 0, content: ['Org structure defined', 'Governance framework', 'Communication plan', 'QA procedures added'] },
            { id: 'past', name: 'Past Performance', icon: '⭐', owner: 'Sarah Miller', initials: 'SM', agent: 'Capture Agent', volume: 'Vol 2', progress: 0, content: ['Relevant contracts identified', 'Performance narratives', 'References confirmed', 'CPARS data integrated'] },
            { id: 'staff', name: 'Staffing Plan', icon: '👥', owner: 'Robert Taylor', initials: 'RT', agent: 'Writer Agent', volume: 'Vol 2', progress: 0, content: ['Key personnel identified', 'Org chart created', 'Labor categories mapped', 'Transition plan added'] },
            { id: 'price', name: 'Price Volume', icon: '💰', owner: 'Michael Brown', initials: 'MB', agent: 'Pricing Agent', volume: 'Vol 3', progress: 0, cui: true, content: ['Labor rates loaded', 'BOE calculations', 'Subcontractor pricing', 'Final validation'] },
            { id: 'comp', name: 'Compliance Matrix', icon: '✓', owner: 'Jennifer Lee', initials: 'JL', agent: 'Compliance Agent', volume: 'Attach', progress: 0, content: ['Requirements parsed', 'Section mapping', 'Gap analysis complete', 'Full compliance verified'] },
            { id: 'resumes', name: 'Key Personnel', icon: '📇', owner: 'Chris Martinez', initials: 'CM', agent: 'Writer Agent', volume: 'Attach', progress: 0, content: ['Resumes collected', 'Format standardized', 'Relevance highlighted', 'Final review done'] }
        ];
        
        const partners = [
            { id: 'p1', name: 'TechPartner Inc', role: 'Technical SME', icon: '🔬', user: 'Emily Davis', initials: 'ED', doc: 'tech' },
            { id: 'p2', name: 'SecureCloud LLC', role: 'Cloud Infrastructure', icon: '☁️', user: 'Alex Johnson', initials: 'AJ', doc: 'tech' },
            { id: 'p3', name: 'DataViz Corp', role: 'Analytics Platform', icon: '📊', user: 'Jordan Kim', initials: 'JK', doc: 'past' }
        ];
        
        const teamMembers = [
            { name: 'Mary Womack', role: 'Exec Sponsor', icon: '👔', initials: 'MW' },
            { name: 'Sarah Miller', role: 'Capture Mgr', icon: '🎯', initials: 'SM' },
            { name: 'David Park', role: 'Proposal Mgr', icon: '📋', initials: 'DP' },
            { name: 'Lisa Wong', role: 'Solution Arch', icon: '🏗️', initials: 'LW' },
            { name: 'Michael Brown', role: 'Pricing', icon: '💰', initials: 'MB' },
            { name: 'Jennifer Lee', role: 'Contracts', icon: '📝', initials: 'JL' },
            { name: 'Robert Taylor', role: 'Volume Lead', icon: '📚', initials: 'RT' },
            { name: 'Chris Martinez', role: 'QA Lead', icon: '✓', initials: 'CM' }
        ];
        
        const colorTeams = [
            { name: 'Blue Team', color: 'blue', pct: 0, desc: 'Strategy Review', threshold: 25 },
            { name: 'Pink Team', color: 'pink', pct: 30, desc: 'Storyboard Review', threshold: 50 },
            { name: 'Red Team', color: 'red', pct: 70, desc: 'Draft Review', threshold: 80 },
            { name: 'Gold Team', color: 'yellow', pct: 95, desc: 'Final Review', threshold: 100 }
        ];

        // ==================== DEMO CONTROL ====================
        function startDemo(mode) {
            demoMode = mode;
            demoRunning = true;
            currentStep = 0;
            
            // Reset document progress
            documents.forEach(d => d.progress = 0);
            
            document.getElementById('startScreen').classList.remove('active');
            document.getElementById('demoContainer').classList.add('active');
            
            // Set mode indicator
            const indicator = document.getElementById('modeIndicator');
            indicator.textContent = mode === 'solo' ? 'SOLO' : 'TEAM';
            indicator.className = `px-2 py-1 rounded text-xs font-medium ${mode === 'solo' ? 'bg-mmt-cyan/20 text-mmt-cyan' : 'bg-violet-500/20 text-violet-400'}`;
            
            // Start with integration sync
            showIntegrationSync();
        }
        
        function endDemo() {
            demoRunning = false;
            if (animationTimer) {
                clearTimeout(animationTimer);
                animationTimer = null;
            }
            document.getElementById('demoContainer').classList.remove('active');
            document.getElementById('startScreen').classList.add('active');
            
            // Reset integration status
            ['hubspotStatus', 'sam360Status', 'vectorStatus'].forEach(id => {
                document.getElementById(id).className = 'w-2 h-2 rounded-full bg-gray-600';
            });
        }

        // ==================== INTEGRATION SYNC ====================
        function showIntegrationSync() {
            const content = document.getElementById('mainContent');
            content.innerHTML = `

                    <h1 class="text-2xl font-bold mb-2">Import Opportunity</h1>
                    <p class="text-gray-400 mb-8">Syncing data from connected systems...</p>
                    
                    <div class="grid grid-cols-3 gap-6 mb-8">
                        <div id="hubspotCard" class="bg-mmt-navy-light rounded-xl p-6 border border-gray-800 transition-all">
                            <div class="w-12 h-12 rounded-lg bg-orange-500 flex items-center justify-center mb-4 text-white font-bold">HS</div>
                            <h3 class="font-semibold mb-1">HubSpot CRM</h3>
                            <p class="text-gray-500 text-sm mb-3">Deal pipeline data</p>
                            <div id="hubspotCardStatus" class="text-sm text-gray-400">Connecting...</div>
                        </div>
                        
                        <div id="sam360Card" class="bg-mmt-navy-light rounded-xl p-6 border border-gray-800 transition-all">
                            <div class="w-12 h-12 rounded-lg bg-blue-600 flex items-center justify-center mb-4 text-white font-bold">360</div>
                            <h3 class="font-semibold mb-1">SAM.gov 360</h3>
                            <p class="text-gray-500 text-sm mb-3">Federal opportunity data</p>
                            <div id="sam360CardStatus" class="text-sm text-gray-400">Waiting...</div>
                        </div>
                        
                        <div id="vectorCard" class="bg-mmt-navy-light rounded-xl p-6 border border-gray-800 transition-all">
                            <div class="w-12 h-12 rounded-lg bg-purple-600 flex items-center justify-center mb-4 text-white font-bold">V</div>
                            <h3 class="font-semibold mb-1">Vector</h3>
                            <p class="text-gray-500 text-sm mb-3">Competitive intelligence</p>
                            <div id="vectorCardStatus" class="text-sm text-gray-400">Waiting...</div>
                        </div>
                    </div>
                    
                    <div id="importedData" class="hidden bg-mmt-navy-light rounded-xl p-6 border border-gray-800 slide-in">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-semibold">Imported Opportunity</h3>
                            <div class="flex items-center gap-2 text-green-400 text-sm">
                                <span class="w-2 h-2 rounded-full bg-green-400"></span>
                                All systems synced
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div>
                                <div class="text-xs text-gray-500">OPPORTUNITY</div>
                                <div class="font-semibold">VA Healthcare Data Analytics IDIQ</div>
                            </div>
                            <div>
                                <div class="text-xs text-gray-500">VALUE</div>
                                <div class="font-semibold text-green-400">$45,000,000</div>
                            </div>
                            <div>
                                <div class="text-xs text-gray-500">AGENCY</div>
                                <div>Department of Veterans Affairs</div>
                            </div>
                            <div>
                                <div class="text-xs text-gray-500">SET-ASIDE</div>
                                <div class="text-mmt-cyan">SDVOSB</div>
                            </div>
                        </div>
                        
                        <div class="bg-purple-900/20 border border-purple-500/30 rounded-lg p-4 mb-4">
                            <div class="flex items-center gap-2 mb-2">
                                <div class="w-5 h-5 rounded bg-purple-600 flex items-center justify-center text-white text-[8px] font-bold">V</div>
                                <span class="text-purple-400 font-medium text-sm">Vector Intel</span>
                            </div>
                            <div class="grid grid-cols-3 gap-4 text-sm">
                                <div><span class="text-gray-500">Incumbent:</span> Booz Allen Hamilton</div>
                                <div><span class="text-gray-500">Competitors:</span> 4 identified</div>
                                <div><span class="text-gray-500">Win Prob:</span> <span class="text-green-400">68%</span></div>
                            </div>
                        </div>
                        
                        <button id="startProposalBtn" class="w-full py-3 bg-mmt-cyan text-mmt-navy font-bold rounded-lg">
                            ${demoMode === 'solo' ? 'Start Solo Proposal →' : 'Assign Team & Partners →'}
                        </button>
                    </div>
                </div>
            `;
            
            // Animate syncs
            animationTimer = setTimeout(() => {
                document.getElementById('hubspotCard').classList.add('border-orange-500');
                document.getElementById('hubspotCardStatus').innerHTML = '<span class="animate-pulse text-orange-400">Syncing...</span>';
            }, 500);
            
            animationTimer = setTimeout(() => {
                document.getElementById('hubspotStatus').className = 'w-2 h-2 rounded-full bg-green-400';
                document.getElementById('hubspotCardStatus').innerHTML = '<span class="text-green-400">✓ Deal imported</span>';
            }, 1500);
            
            animationTimer = setTimeout(() => {
                document.getElementById('sam360Card').classList.add('border-blue-500');
                document.getElementById('sam360CardStatus').innerHTML = '<span class="animate-pulse text-blue-400">Searching...</span>';
            }, 1000);
            
            animationTimer = setTimeout(() => {
                document.getElementById('sam360Status').className = 'w-2 h-2 rounded-full bg-green-400';
                document.getElementById('sam360CardStatus').innerHTML = '<span class="text-green-400">✓ Opportunity found</span>';
            }, 2500);
            
            animationTimer = setTimeout(() => {
                document.getElementById('vectorCard').classList.add('border-purple-500');
                document.getElementById('vectorCardStatus').innerHTML = '<span class="animate-pulse text-purple-400">Analyzing...</span>';
            }, 2000);
            
            animationTimer = setTimeout(() => {
                document.getElementById('vectorStatus').className = 'w-2 h-2 rounded-full bg-green-400';
                document.getElementById('vectorCardStatus').innerHTML = '<span class="text-green-400">✓ Intel loaded</span>';
            }, 3500);
            
            animationTimer = setTimeout(() => {
                document.getElementById('importedData').classList.remove('hidden');
            }, 4000);
            
            animationTimer = setTimeout(() => {
                if (demoMode === 'solo') {
                    showSoloWorkspace();
                } else {
                    showTeamSetup();
                }
            }, 6000);
        }

        // ==================== TEAM SETUP ====================
        function showTeamSetup() {
            const content = document.getElementById('mainContent');
            content.innerHTML = `
                <div class="max-w-5xl mx-auto pt-8 px-6">
                    <div class="mb-6">
                        <div class="text-sm text-violet-400 font-medium">TEAM MODE</div>
                        <h1 class="text-2xl font-bold">Assign Team & Partners</h1>
                    </div>
                    
                    <div class="mb-6">
                        <h3 class="text-sm font-semibold text-gray-400 mb-3">INTERNAL TEAM</h3>
                        <div class="grid grid-cols-4 gap-3" id="teamGrid"></div>
                    </div>
                    
                    <div class="mb-6">
                        <h3 class="text-sm font-semibold text-gray-400 mb-3">TEAMING PARTNERS <span class="text-xs text-gray-600">• Time-limited access</span></h3>
                        <div class="grid grid-cols-3 gap-4" id="partnerGrid"></div>
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <div class="text-sm text-gray-500">
                            <span id="assignedCount">0</span>/11 assigned
                        </div>
                        <div class="w-48 h-2 bg-gray-700 rounded-full overflow-hidden">
                            <div id="assignProgress" class="h-full bg-violet-500 transition-all" style="width:0%"></div>
                        </div>
                    </div>
                </div>
            `;
            
            // Render team grid
            document.getElementById('teamGrid').innerHTML = teamMembers.map(m => `
                <div class="team-card bg-mmt-surface border border-gray-700 rounded-lg p-3 flex items-center gap-2" data-member="${m.initials}">
                    <div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center text-sm">${m.icon}</div>
                    <div class="flex-1 min-w-0">
                        <div class="text-sm font-medium truncate">${m.role}</div>
                        <div class="text-xs text-gray-500 member-name">Unassigned</div>
                    </div>
                    <div class="w-5 h-5 rounded-full border border-gray-600 check-mark"></div>
                </div>
            `).join('');
            
            // Render partner grid
            document.getElementById('partnerGrid').innerHTML = partners.map(p => `
                <div class="partner-card bg-mmt-surface border border-gray-700 rounded-lg p-4" data-partner="${p.id}">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-10 h-10 rounded-lg bg-violet-600/20 flex items-center justify-center text-xl">${p.icon}</div>
                        <div>
                            <div class="font-medium text-sm">${p.name}</div>
                            <div class="text-xs text-violet-400">${p.role}</div>
                        </div>
                    </div>
                    <div class="text-xs text-gray-500 partner-status">Not invited</div>
                </div>
            `).join('');
            
            // Animate team assignments
            let count = 0;
            teamMembers.forEach((m, i) => {
                animationTimer = setTimeout(() => {
                    const card = document.querySelector(`[data-member="${m.initials}"]`);
                    card.classList.add('border-green-500/50');
                    card.querySelector('.member-name').textContent = m.name;
                    card.querySelector('.member-name').className = 'text-xs text-green-400 member-name';
                    card.querySelector('.check-mark').innerHTML = '✓';
                    card.querySelector('.check-mark').className = 'w-5 h-5 rounded-full bg-green-500 text-white text-xs flex items-center justify-center check-mark';
                    
                    count++;
                    document.getElementById('assignedCount').textContent = count;
                    document.getElementById('assignProgress').style.width = `${(count/11)*100}%`;
                }, 300 * (i + 1));
            });
            
            // Animate partner invites
            partners.forEach((p, i) => {
                animationTimer = setTimeout(() => {
                    const card = document.querySelector(`[data-partner="${p.id}"]`);
                    card.classList.add('border-violet-500/50');
                    card.querySelector('.partner-status').textContent = `✓ ${p.user} invited`;
                    card.querySelector('.partner-status').className = 'text-xs text-violet-400 partner-status';
                    
                    count++;
                    document.getElementById('assignedCount').textContent = count;
                    document.getElementById('assignProgress').style.width = `${(count/11)*100}%`;
                }, 300 * teamMembers.length + 400 * (i + 1));
            });
            
            // Proceed to workspace
            animationTimer = setTimeout(() => {
                showTeamWorkspace();
            }, 300 * teamMembers.length + 400 * partners.length + 2000);
        }

        // ==================== TEAM WORKSPACE ====================
        let teamDocIndex = 0;
        let teamColorIndex = 0;
        let overallProgress = 0;
        
        function showTeamWorkspace() {
            teamDocIndex = 0;
            teamColorIndex = 0;
            overallProgress = 0;
            
            const content = document.getElementById('mainContent');
            content.innerHTML = `
                <div class="flex h-full">
                    <!-- Left: Document Development -->
                    <div class="flex-1 flex flex-col border-r border-gray-800">
                        <!-- Header -->
                        <div class="p-4 border-b border-gray-800 bg-mmt-navy-light">
                            <div class="flex items-center justify-between">
                                <div>
                                    <div class="text-xs text-violet-400 font-medium">TEAM MODE • DOCUMENT DEVELOPMENT</div>
                                    <h1 class="text-lg font-bold">VA Healthcare Data Analytics IDIQ</h1>
                                </div>
                                <div class="text-right">
                                    <div class="text-xs text-gray-500">Overall Progress</div>
                                    <div class="text-2xl font-bold text-violet-400" id="teamOverallProgress">0%</div>
                                </div>
                            </div>
                            
                            <!-- Progress Bar -->
                            <div class="mt-3 h-2 bg-gray-700 rounded-full overflow-hidden">
                                <div id="teamProgressBar" class="h-full bg-violet-500 transition-all duration-500" style="width:0%"></div>
                            </div>
                            
                            <!-- Color Team Markers -->
                            <div class="flex mt-1 text-[10px] text-gray-500">
                                <div class="w-1/4 text-left">Blue 25%</div>
                                <div class="w-1/4 text-center">Pink 50%</div>
                                <div class="w-1/4 text-center">Red 80%</div>
                                <div class="w-1/4 text-right">Gold 100%</div>
                            </div>
                        </div>
                        
                        <!-- Document Editor Area -->
                        <div id="docEditorArea" class="flex-1 p-4 overflow-y-auto">
                            <div class="text-center text-gray-500 py-12">
                                Starting document development...
                            </div>
                        </div>
                    </div>
                    
                    <!-- Right: Document List & Activity -->
                    <div class="w-80 flex flex-col bg-mmt-navy-light">
                        <!-- Document List -->
                        <div class="flex-1 p-4 overflow-y-auto">
                            <h3 class="text-sm font-semibold text-gray-400 mb-3">DOCUMENTS</h3>
                            <div id="teamDocList" class="space-y-2"></div>
                        </div>
                        
                        <!-- Gate Status -->
                        <div class="p-4 border-t border-gray-800">
                            <h3 class="text-sm font-semibold text-gray-400 mb-3">SHIPLEY GATES</h3>
                            <div id="teamGateStatus" class="space-y-2"></div>
                        </div>
                    </div>
                </div>
            `;
            
            renderTeamDocList();
            renderTeamGates();
            
            // Start document development
            animationTimer = setTimeout(() => {
                developNextDocument();
            }, 1000);
        }
        
        function renderTeamDocList() {
            document.getElementById('teamDocList').innerHTML = documents.map(d => `
                <div class="doc-item bg-mmt-surface rounded-lg p-3 border border-gray-700" data-doc="${d.id}">
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center gap-2">
                            <span>${d.icon}</span>
                            <span class="text-sm font-medium">${d.name}</span>
                            ${d.cui ? '<span class="text-[8px] px-1 py-0.5 bg-red-600 rounded">CUI</span>' : ''}
                        </div>
                        <span class="text-xs text-gray-500">${d.volume}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="flex-1 h-1.5 bg-gray-700 rounded-full overflow-hidden">
                            <div class="doc-progress h-full bg-violet-500 transition-all duration-500" style="width:0%"></div>
                        </div>
                        <span class="text-xs text-gray-500 doc-pct">0%</span>
                    </div>
                </div>
            `).join('');
        }
        
        function renderTeamGates() {
            document.getElementById('teamGateStatus').innerHTML = colorTeams.map((g, i) => `
                <div class="gate-item flex items-center gap-2" data-gate="${i}">
                    <div class="w-3 h-3 rounded-full bg-gray-600 gate-dot"></div>
                    <span class="text-xs text-gray-500 gate-name">${g.name}</span>
                    <span class="text-[10px] text-gray-600 ml-auto gate-status">PENDING</span>
                </div>
            `).join('');
        }
        
        function developNextDocument() {
            if (!demoRunning) return;
            
            if (teamDocIndex >= documents.length) {
                // All documents complete - show final package
                animationTimer = setTimeout(() => {
                    showFinalPackage();
                }, 1500);
                return;
            }
            
            const doc = documents[teamDocIndex];
            const isPartnerDoc = partners.some(p => p.doc === doc.id);
            const partner = partners.find(p => p.doc === doc.id);
            
            // Show document being worked on
            const editorArea = document.getElementById('docEditorArea');
            editorArea.innerHTML = `
                <div class="bg-mmt-surface rounded-xl border border-gray-700 overflow-hidden slide-in">
                    <!-- Document Header -->
                    <div class="p-4 border-b border-gray-700 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl">${doc.icon}</span>
                            <div>
                                <div class="font-semibold">${doc.name}</div>
                                <div class="text-xs text-gray-500">${doc.volume} ${doc.cui ? '• CUI' : ''}</div>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="w-7 h-7 rounded-full ${isPartnerDoc ? 'bg-violet-600' : 'bg-blue-600'} flex items-center justify-center text-xs text-white font-bold">${isPartnerDoc ? partner.initials : doc.initials}</div>
                            <div class="text-sm">
                                <div class="${isPartnerDoc ? 'text-violet-400' : ''}">${isPartnerDoc ? partner.user : doc.owner}</div>
                                <div class="text-xs text-gray-500">${isPartnerDoc ? partner.name : 'Internal'}</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Document Content Being Written -->
                    <div class="p-4 min-h-[200px]">
                        <div id="docContent" class="space-y-3"></div>
                    </div>
                    
                    <!-- AI Agent Panel -->
                    <div class="border-t border-gray-700 p-4 bg-mmt-navy-light/50">
                        <div class="flex items-center gap-2 mb-3">
                            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center text-sm">🤖</div>
                            <div>
                                <div class="text-sm font-medium">${doc.agent}</div>
                                <div class="text-xs text-green-400">Assisting</div>
                            </div>
                        </div>
                        <div id="agentMessage" class="text-sm text-gray-400 bg-mmt-surface rounded-lg p-3"></div>
                    </div>
                </div>
            `;
            
            // Highlight current doc in list
            document.querySelectorAll('.doc-item').forEach(el => el.classList.remove('border-violet-500'));
            document.querySelector(`[data-doc="${doc.id}"]`)?.classList.add('border-violet-500');
            
            // Animate content being written
            const contentEl = document.getElementById('docContent');
            const agentEl = document.getElementById('agentMessage');
            const docEl = document.querySelector(`[data-doc="${doc.id}"]`);
            
            const agentMessages = [
                `Analyzing requirements for ${doc.name}...`,
                `Generating section outline based on PWS...`,
                `Integrating win themes and discriminators...`,
                `Finalizing content and checking compliance...`
            ];
            
            doc.content.forEach((text, i) => {
                animationTimer = setTimeout(() => {
                    if (!demoRunning) return;
                    
                    // Add content line
                    contentEl.innerHTML += `
                        <div class="flex items-start gap-2 slide-in">
                            <span class="text-green-400 mt-1">✓</span>
                            <span class="text-gray-300">${text}</span>
                        </div>
                    `;
                    
                    // Update agent message
                    agentEl.textContent = agentMessages[i] || 'Reviewing...';
                    
                    // Update progress
                    const progress = ((i + 1) / doc.content.length) * 100;
                    doc.progress = progress;
                    
                    if (docEl) {
                        docEl.querySelector('.doc-progress').style.width = `${progress}%`;
                        docEl.querySelector('.doc-pct').textContent = `${Math.round(progress)}%`;
                        
                        if (progress === 100) {
                            docEl.classList.remove('border-violet-500');
                            docEl.classList.add('border-green-500/50');
                        }
                    }
                    
                    // Update overall progress
                    updateOverallProgress();
                    
                }, i * 1000);
            });
            
            // Move to next document
            animationTimer = setTimeout(() => {
                teamDocIndex++;
                developNextDocument();
            }, doc.content.length * 1000 + 500);
        }
        
        function updateOverallProgress() {
            const total = documents.reduce((sum, d) => sum + d.progress, 0);
            overallProgress = Math.round(total / documents.length);
            
            document.getElementById('teamOverallProgress').textContent = `${overallProgress}%`;
            document.getElementById('teamProgressBar').style.width = `${overallProgress}%`;
            
            // Check for color team gates
            colorTeams.forEach((gate, i) => {
                if (overallProgress >= gate.threshold && teamColorIndex <= i) {
                    teamColorIndex = i + 1;
                    showColorTeamGate(i);
                }
            });
        }
        
        function showColorTeamGate(index) {
            const gate = colorTeams[index];
            const gateEl = document.querySelector(`[data-gate="${index}"]`);
            
            if (gateEl) {
                gateEl.querySelector('.gate-dot').className = `w-3 h-3 rounded-full bg-${gate.color}-500 gate-dot`;
                gateEl.querySelector('.gate-name').className = `text-xs text-${gate.color}-400 font-medium gate-name`;
                gateEl.querySelector('.gate-status').textContent = 'PASSED';
                gateEl.querySelector('.gate-status').className = `text-[10px] text-green-400 ml-auto gate-status`;
            }
        }

        // ==================== SOLO WORKSPACE ====================
        let soloPhase = 0;
        const soloPhases = ['Discovery', 'Capture', 'RFP Analysis', 'Planning', 'Production', 'Final Review'];
        
        function showSoloWorkspace() {
            soloPhase = 0;
            documents.forEach(d => d.progress = 0);
            
            const content = document.getElementById('mainContent');
            content.innerHTML = `
                <div class="flex h-full">
                    <!-- Left: Phase Work -->
                    <div class="flex-1 flex flex-col border-r border-gray-800">
                        <!-- Header -->
                        <div class="p-4 border-b border-gray-800 bg-mmt-navy-light">
                            <div class="flex items-center justify-between mb-3">
                                <div>
                                    <div class="text-xs text-mmt-cyan font-medium">SOLO MODE • <span id="soloPhaseLabel">DISCOVERY</span></div>
                                    <h1 class="text-lg font-bold">VA Healthcare Data Analytics IDIQ</h1>
                                </div>
                                <div class="text-right">
                                    <div class="text-xs text-gray-500">Win Probability</div>
                                    <div class="text-2xl font-bold text-green-400" id="soloWinProb">68%</div>
                                </div>
                            </div>
                            
                            <!-- Phase Progress -->
                            <div class="flex gap-1" id="soloPhaseBar">
                                ${soloPhases.map((p, i) => `
                                    <div class="flex-1">
                                        <div class="h-1.5 bg-gray-700 rounded-full overflow-hidden">
                                            <div class="phase-fill h-full bg-mmt-cyan transition-all duration-500" data-phase="${i}" style="width:0%"></div>
                                        </div>
                                        <div class="text-[10px] text-gray-500 mt-1">${p}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <!-- Work Area -->
                        <div id="soloWorkArea" class="flex-1 p-4 overflow-y-auto"></div>
                    </div>
                    
                    <!-- Right: Documents -->
                    <div class="w-80 flex flex-col bg-mmt-navy-light">
                        <div class="p-4">
                            <h3 class="text-sm font-semibold text-gray-400 mb-3">DOCUMENTS</h3>
                            <div id="soloDocList" class="space-y-2"></div>
                        </div>
                    </div>
                </div>
            `;
            
            renderSoloDocList();
            runSoloPhase();
        }
        
        function renderSoloDocList() {
            document.getElementById('soloDocList').innerHTML = documents.map(d => `
                <div class="doc-item bg-mmt-surface rounded-lg p-3 border border-gray-700" data-doc="${d.id}">
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center gap-2">
                            <span>${d.icon}</span>
                            <span class="text-sm">${d.name}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="flex-1 h-1.5 bg-gray-700 rounded-full overflow-hidden">
                            <div class="doc-progress h-full bg-mmt-cyan transition-all" style="width:${d.progress}%"></div>
                        </div>
                        <span class="text-xs text-gray-500 doc-pct">${d.progress}%</span>
                    </div>
                </div>
            `).join('');
        }
        
        function runSoloPhase() {
            if (!demoRunning) return;
            
            if (soloPhase >= soloPhases.length) {
                showFinalPackage();
                return;
            }
            
            const phaseName = soloPhases[soloPhase];
            document.getElementById('soloPhaseLabel').textContent = phaseName.toUpperCase();
            
            const agents = ['Capture Agent', 'Strategy Agent', 'Compliance Agent', 'Writer Agent', 'Writer Agent', 'Compliance Agent'];
            const tasks = [
                ['Research customer mission', 'Analyze incumbent performance', 'Map stakeholder network', 'Assess capability fit'],
                ['Define win themes', 'Build competitive matrix', 'Calculate B&P budget', 'Identify teaming partners'],
                ['Parse PWS requirements', 'Generate compliance matrix', 'Map evaluation criteria', 'Draft clarification questions'],
                ['Create proposal outline', 'Assign section structure', 'Build master schedule', 'Draft annotated outline'],
                ['Write technical approach', 'Complete management plan', 'Finalize staffing', 'Compile past performance'],
                ['Run compliance check', 'Executive review', 'Final QA pass', 'Package for submission']
            ];
            const aiMessages = [
                "I've pulled data from HubSpot and SAM.gov 360. Incumbent is Booz Allen with mixed CPARS ratings. Your SDVOSB status is a key discriminator.",
                "Three win themes identified: 1) VA healthcare IT experience, 2) FedRAMP-ready platform, 3) Agile delivery methodology. pWin increased to 70%.",
                "Compliance matrix generated. 47 requirements identified. All can be addressed with current capabilities. No teaming required.",
                "Proposal outline complete. I've structured to emphasize technical approach first per evaluation criteria. Annotated outline ready.",
                "All volumes drafted. Technical approach highlights ML/AI capabilities. Price volume marked CUI and secured. pWin now 72%.",
                "Final compliance check complete. 47/47 requirements addressed. All CUI properly marked. Ready for submission."
            ];
            
            const workArea = document.getElementById('soloWorkArea');
            workArea.innerHTML = `
                <div class="bg-mmt-surface rounded-xl border border-gray-700 overflow-hidden slide-in">
                    <div class="p-4 border-b border-gray-700">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-mmt-cyan to-blue-600 flex items-center justify-center text-xl">🎯</div>
                            <div>
                                <div class="font-semibold">${agents[soloPhase]}</div>
                                <div class="text-xs text-green-400">Online • Assisting with ${phaseName}</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-4">
                        <div class="text-sm font-medium text-gray-400 mb-3">PHASE TASKS</div>
                        <div id="soloTasks" class="space-y-2 mb-4"></div>
                        
                        <div class="bg-mmt-navy-light rounded-lg p-4">
                            <div class="text-xs text-mmt-cyan mb-2">AI INSIGHT</div>
                            <div id="soloAiMsg" class="text-sm text-gray-300"></div>
                        </div>
                    </div>
                </div>
            `;
            
            // Animate tasks
            const tasksEl = document.getElementById('soloTasks');
            const aiMsgEl = document.getElementById('soloAiMsg');
            
            tasks[soloPhase].forEach((task, i) => {
                animationTimer = setTimeout(() => {
                    if (!demoRunning) return;
                    
                    tasksEl.innerHTML += `
                        <div class="flex items-center gap-3 p-2 bg-mmt-navy-light rounded-lg slide-in">
                            <span class="text-green-400">✓</span>
                            <span class="text-sm">${task}</span>
                        </div>
                    `;
                    
                    // Update phase progress
                    const progress = ((i + 1) / tasks[soloPhase].length) * 100;
                    document.querySelector(`[data-phase="${soloPhase}"]`).style.width = `${progress}%`;
                    
                }, i * 800);
            });
            
            // Show AI message
            animationTimer = setTimeout(() => {
                if (!demoRunning) return;
                aiMsgEl.textContent = aiMessages[soloPhase];
            }, tasks[soloPhase].length * 800 + 300);
            
            // Update documents based on phase
            const phaseDocMap = [
                ['exec'],
                ['exec'],
                ['comp'],
                ['tech', 'mgmt'],
                ['tech', 'mgmt', 'past', 'staff', 'price', 'resumes'],
                ['exec', 'tech', 'mgmt', 'past', 'staff', 'price', 'comp', 'resumes']
            ];
            
            animationTimer = setTimeout(() => {
                if (!demoRunning) return;
                
                phaseDocMap[soloPhase].forEach(docId => {
                    const doc = documents.find(d => d.id === docId);
                    if (doc) {
                        doc.progress = Math.min(100, doc.progress + (100 / (6 - soloPhase)));
                        const docEl = document.querySelector(`[data-doc="${docId}"]`);
                        if (docEl) {
                            docEl.querySelector('.doc-progress').style.width = `${doc.progress}%`;
                            docEl.querySelector('.doc-pct').textContent = `${Math.round(doc.progress)}%`;
                            if (doc.progress >= 100) {
                                docEl.classList.add('border-green-500/50');
                            }
                        }
                    }
                });
                
                // Update win prob
                const winProbs = [68, 70, 70, 71, 72, 72];
                document.getElementById('soloWinProb').textContent = `${winProbs[soloPhase]}%`;
                
            }, tasks[soloPhase].length * 800 + 500);
            
            // Next phase
            animationTimer = setTimeout(() => {
                soloPhase++;
                runSoloPhase();
            }, tasks[soloPhase].length * 800 + 2000);
        }

        // ==================== FINAL PACKAGE ====================
        function showFinalPackage() {
            if (!demoRunning) return;
            
            // Ensure all docs at 100%
            documents.forEach(d => d.progress = 100);
            
            const content = document.getElementById('mainContent');
            content.innerHTML = `
                <div class="max-w-4xl mx-auto pt-12 px-6">
                    <div class="text-center mb-8">
                        <div class="text-${demoMode === 'solo' ? 'mmt-cyan' : 'violet-400'} text-sm font-medium mb-2">FINAL REVIEW</div>
                        <h1 class="text-3xl font-bold mb-2">Proposal Package Complete</h1>
                        <p class="text-gray-400">All documents ready for submission</p>
                    </div>
                    
                    <div class="bg-mmt-navy-light rounded-xl p-6 border border-gray-800 mb-6 slide-in">
                        <div class="flex items-center justify-between mb-6">
                            <div>
                                <div class="font-semibold text-lg">VA Healthcare Data Analytics IDIQ</div>
                                <div class="text-gray-400">$45,000,000 • SDVOSB</div>
                            </div>
                            <div class="text-right">
                                <div class="text-3xl font-bold text-green-400">${demoMode === 'solo' ? '72' : '78'}%</div>
                                <div class="text-gray-500 text-sm">Win Probability</div>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-4 gap-3 mb-6">
                            ${documents.map(d => `
                                <div class="bg-mmt-surface rounded-lg p-3 border border-green-500/50">
                                    <div class="flex items-center gap-2 mb-1">
                                        <span>${d.icon}</span>
                                        <span class="text-sm font-medium">${d.name}</span>
                                    </div>
                                    <div class="flex items-center gap-2 text-xs">
                                        <span class="text-green-400">✓ 100%</span>
                                        ${d.cui ? '<span class="px-1 py-0.5 bg-red-600 rounded text-[8px]">CUI</span>' : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="bg-green-900/20 border border-green-600/30 rounded-lg p-4 mb-6">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="text-green-400 font-semibold">✓ All Compliance Checks Passed</span>
                            </div>
                            <div class="grid grid-cols-3 gap-4 text-sm text-gray-400">
                                <div>47/47 requirements addressed</div>
                                <div>CUI markings validated</div>
                                <div>Page limits verified</div>
                            </div>
                        </div>
                        
                        <button id="submitBtn" class="w-full py-4 bg-${demoMode === 'solo' ? 'mmt-cyan' : 'violet-500'} text-${demoMode === 'solo' ? 'mmt-navy' : 'white'} font-bold rounded-lg text-lg pulse-glow">
                            Submit Proposal →
                        </button>
                    </div>
                </div>
            `;
            
            // Auto submit
            animationTimer = setTimeout(() => {
                showComplete();
            }, 3000);
        }

        // ==================== COMPLETE ====================
        function showComplete() {
            if (!demoRunning) return;
            
            const content = document.getElementById('mainContent');
            content.innerHTML = `
                <div class="flex items-center justify-center h-full">
                    <div class="text-center slide-in">
                        <div class="w-28 h-28 mx-auto mb-6 rounded-full bg-gradient-to-br ${demoMode === 'solo' ? 'from-mmt-cyan to-blue-600' : 'from-violet-500 to-purple-600'} flex items-center justify-center text-5xl">
                            🎉
                        </div>
                        <h1 class="text-4xl font-bold mb-3">Proposal Submitted!</h1>
                        <p class="text-xl text-gray-400 mb-2">VA Healthcare Data Analytics IDIQ</p>
                        <p class="text-${demoMode === 'solo' ? 'mmt-cyan' : 'violet-400'} mb-8">Completed in ${demoMode === 'solo' ? 'Solo' : 'Team'} Mode</p>
                        
                        <div class="bg-mmt-navy-light rounded-xl p-6 inline-block border border-gray-800 mb-8">
                            <div class="flex gap-8">
                                ${demoMode === 'solo' ? `
                                    <div class="text-center">
                                        <div class="text-3xl font-bold text-mmt-cyan">6</div>
                                        <div class="text-gray-400 text-sm">Phases</div>
                                    </div>
                                    <div class="text-center">
                                        <div class="text-3xl font-bold text-green-400">8</div>
                                        <div class="text-gray-400 text-sm">Documents</div>
                                    </div>
                                    <div class="text-center">
                                        <div class="text-3xl font-bold">72%</div>
                                        <div class="text-gray-400 text-sm">Win Prob</div>
                                    </div>
                                ` : `
                                    <div class="text-center">
                                        <div class="text-3xl font-bold text-violet-400">11</div>
                                        <div class="text-gray-400 text-sm">Team + Partners</div>
                                    </div>
                                    <div class="text-center">
                                        <div class="text-3xl font-bold text-green-400">4/4</div>
                                        <div class="text-gray-400 text-sm">Color Teams</div>
                                    </div>
                                    <div class="text-center">
                                        <div class="text-3xl font-bold">78%</div>
                                        <div class="text-gray-400 text-sm">Win Prob</div>
                                    </div>
                                `}
                            </div>
                        </div>
                        
                        <div class="flex justify-center gap-4 mb-8">
                            <div class="flex items-center gap-2 text-sm">
                                <div class="w-5 h-5 rounded bg-orange-500 flex items-center justify-center text-white text-[8px] font-bold">HS</div>
                                <span class="text-green-400">Synced to HubSpot</span>
                            </div>
                            <div class="flex items-center gap-2 text-sm">
                                <div class="w-5 h-5 rounded bg-purple-600 flex items-center justify-center text-white text-[8px] font-bold">V</div>
                                <span class="text-green-400">Logged to Vector</span>
                            </div>
                        </div>
                        
                        <div class="text-gray-500 text-sm mb-4">Demo complete!</div>
                        
                        <button onclick="endDemo()" class="px-8 py-3 bg-gray-700 text-white rounded-lg hover:bg-gray-600 transition-colors">
                            ← Back to Start
                        </button>
                    </div>
                </div>
            `;
            
            // Auto return to start after delay
            animationTimer = setTimeout(() => {
                endDemo();
            }, 8000);
        }

        // ==================== GLOBAL ====================
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                endDemo();
            }
        });
    </script>
</body>
</html>
