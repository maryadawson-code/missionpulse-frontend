<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse M9 - HITL Gauntlet</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-spin { animation: spin 1s linear infinite; }
    .animate-slideIn { animation: slideIn 0.3s ease-out; }
    .animate-fadeIn { animation: fadeIn 0.4s ease-out; }
    .shimmer { background: linear-gradient(90deg, transparent, rgba(0,229,250,0.1), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, createContext, useContext, useCallback } = React;

    // ============================================================================
    // PRODUCTION CONFIG
    // ============================================================================
    const CONFIG = {
      API_BASE: 'https://missionpulse-api.onrender.com',
      DASHBOARD_URL: 'https://missionpulse-frontend.netlify.app/',
      MODULE_ID: 'M9',
      MODULE_NAME: 'HITL Gauntlet',
      VERSION: '12.0.1',
      FEATURES: {
        API_ENABLED: true,
        DEMO_MODE: true
      }
    };

    // ============================================================================
    // TOAST CONTEXT & PROVIDER
    // ============================================================================
    const ToastContext = createContext(null);

    const ToastProvider = ({ children }) => {
      const [toasts, setToasts] = useState([]);
      
      const addToast = useCallback((message, type = 'info', duration = 4000) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), duration);
      }, []);

      return (
        <ToastContext.Provider value={{ addToast }}>
          {children}
          <div className="fixed top-4 right-4 z-50 space-y-2">
            {toasts.map(toast => (
              <div 
                key={toast.id}
                className={`px-4 py-3 rounded-lg shadow-lg animate-slideIn flex items-center gap-2 ${
                  toast.type === 'success' ? 'bg-emerald-500/90 text-white' :
                  toast.type === 'error' ? 'bg-red-500/90 text-white' :
                  toast.type === 'warning' ? 'bg-amber-500/90 text-white' :
                  'bg-slate-700/90 text-white'
                }`}
              >
                <span className="text-sm font-medium">{toast.message}</span>
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    };

    const useToast = () => {
      const context = useContext(ToastContext);
      if (!context) throw new Error('useToast must be used within ToastProvider');
      return context;
    };

    // ============================================================================
    // ERROR BOUNDARY
    // ============================================================================
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }

      componentDidCatch(error, errorInfo) {
        console.error('ErrorBoundary caught:', error, errorInfo);
      }

      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen bg-[#00050F] flex items-center justify-center p-6">
              <div className="bg-slate-800/50 border border-red-500/30 rounded-xl p-8 max-w-md text-center">
                <div className="w-16 h-16 bg-red-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                  <Icon name="alertTriangle" className="w-8 h-8 text-red-400" />
                </div>
                <h2 className="text-xl font-bold text-white mb-2">Something went wrong</h2>
                <p className="text-slate-400 mb-4 text-sm">
                  {CONFIG.MODULE_NAME} encountered an error. Please try refreshing the page.
                </p>
                <button
                  onClick={() => window.location.reload()}
                  className="px-4 py-2 bg-cyan-500 text-white rounded-lg hover:bg-cyan-400 transition-colors"
                >
                  Refresh Page
                </button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // ============================================================================
    // LOADING SPINNER
    // ============================================================================
    const LoadingSpinner = ({ size = 'md', message = 'Loading...' }) => {
      const sizes = { sm: 'w-4 h-4', md: 'w-8 h-8', lg: 'w-12 h-12' };
      return (
        <div className="flex flex-col items-center justify-center gap-3">
          <div className={`${sizes[size]} border-2 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin`} />
          {message && <span className="text-slate-400 text-sm">{message}</span>}
        </div>
      );
    };

    // ============================================================================
    // CONNECTION STATUS
    // ============================================================================
    const ConnectionStatus = ({ isConnected }) => (
      <div className="flex items-center gap-2">
        <div className={`w-2 h-2 rounded-full ${isConnected ? 'bg-emerald-400' : 'bg-red-400'} animate-pulse`} />
        <span className="text-xs text-slate-500">{isConnected ? 'Connected' : 'Offline'}</span>
      </div>
    );

    // ============================================================================
    // ICONS
    // ============================================================================
    const Icons = {
      shield: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
      x: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>,
      pencil: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>,
      eye: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>,
      clock: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6l4 2" /></svg>,
      user: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>,
      filter: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>,
      clipboard: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>,
      cpu: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" /></svg>,
      activity: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M22 12h-4l-3 9L9 3l-3 9H2" /></svg>,
      zap: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
      checkCircle: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      alertTriangle: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
      fileText: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>,
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    // ============================================================================
    // HOME BUTTON
    // ============================================================================
    const HomeButton = () => (
      <button
        onClick={() => window.location.href = CONFIG.DASHBOARD_URL}
        className="flex items-center gap-2 px-3 py-1.5 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg transition-colors group"
        title="Return to Dashboard"
      >
        <Icon name="home" className="w-4 h-4 text-slate-400 group-hover:text-cyan-400" />
        <span className="text-sm text-slate-400 group-hover:text-white">Dashboard</span>
      </button>
    );

    // ============================================================================
    // UI COMPONENTS
    // ============================================================================
    const Card = ({ children, className = '', glow = false, onClick }) => (
      <div 
        onClick={onClick} 
        className={`
          bg-slate-800/50 backdrop-blur-sm border border-slate-700/50 rounded-xl 
          transition-all duration-300 
          ${onClick ? 'cursor-pointer hover:border-cyan-500/50 hover:bg-slate-800/70' : ''} 
          ${glow ? 'shadow-lg shadow-cyan-500/20 border-cyan-500/30' : ''} 
          ${className}
        `}
      >
        {children}
      </div>
    );

    const Button = ({ children, variant = 'primary', size = 'md', icon, className = '', disabled = false, pulse = false, ...props }) => {
      const variants = { 
        primary: 'bg-gradient-to-r from-cyan-500 to-teal-500 text-white hover:from-cyan-400 hover:to-teal-400 shadow-lg shadow-cyan-500/25', 
        secondary: 'bg-slate-700 text-white hover:bg-slate-600 border border-slate-600', 
        success: 'bg-emerald-500 text-white hover:bg-emerald-400 shadow-lg shadow-emerald-500/25', 
        danger: 'bg-red-500 text-white hover:bg-red-400 shadow-lg shadow-red-500/25',
        warning: 'bg-amber-500 text-white hover:bg-amber-400 shadow-lg shadow-amber-500/25',
        ghost: 'bg-transparent text-slate-400 hover:text-white hover:bg-slate-700/50', 
      };
      const sizes = { xs: 'px-2 py-1 text-xs', sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2 text-sm', lg: 'px-6 py-3 text-base' };
      return (
        <button 
          className={`
            ${variants[variant]} ${sizes[size]} 
            rounded-lg font-semibold transition-all duration-200 
            disabled:opacity-50 disabled:cursor-not-allowed
            flex items-center justify-center gap-2
            ${pulse ? 'animate-pulse' : ''}
            ${className}
          `}
          disabled={disabled}
          {...props}
        >
          {icon && <Icon name={icon} className="w-4 h-4" />}
          {children}
        </button>
      );
    };

    const Badge = ({ children, variant = 'default', size = 'sm' }) => {
      const variants = {
        default: 'bg-slate-700 text-slate-300',
        success: 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30',
        warning: 'bg-amber-500/20 text-amber-400 border border-amber-500/30',
        danger: 'bg-red-500/20 text-red-400 border border-red-500/30',
        cyan: 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30',
      };
      const sizes = { xs: 'px-1.5 py-0.5 text-xs', sm: 'px-2 py-1 text-xs' };
      return <span className={`${variants[variant]} ${sizes[size]} rounded-full font-medium`}>{children}</span>;
    };

    // ============================================================================
    // DEMO DATA - HITL QUEUE
    // ============================================================================
    const INITIAL_QUEUE = [
      {
        id: 'HITL-001',
        type: 'win_theme',
        title: 'Win Theme: Healthcare Innovation',
        content: 'Mission Meets Tech delivers 15 years of DHA healthcare IT experience, having successfully transitioned 2M+ patient records during the MHS GENESIS implementation.',
        agent: 'Strategy Advisor',
        priority: 'HIGH',
        section: 'Volume I - Executive Summary',
        timestamp: new Date(Date.now() - 15 * 60 * 1000),
        confidence: 92,
        evidenceCoverage: 87,
        status: 'pending',
      },
      {
        id: 'HITL-002',
        type: 'compliance',
        title: 'Section L Compliance Check',
        content: 'All 23 mandatory requirements from Section L have been addressed. 2 items require additional narrative clarification.',
        agent: 'Compliance Guardian',
        priority: 'HIGH',
        section: 'Compliance Matrix',
        timestamp: new Date(Date.now() - 25 * 60 * 1000),
        confidence: 98,
        evidenceCoverage: 95,
        status: 'pending',
      },
      {
        id: 'HITL-003',
        type: 'pricing',
        title: 'Labor Rate Validation',
        content: 'Proposed rates are within 3% of GSA schedule ceiling. Senior Engineer rate flagged for review - slightly above market median.',
        agent: 'Pricing Intelligence',
        priority: 'MEDIUM',
        section: 'Volume III - Pricing',
        timestamp: new Date(Date.now() - 45 * 60 * 1000),
        confidence: 85,
        evidenceCoverage: 78,
        status: 'pending',
      },
      {
        id: 'HITL-004',
        type: 'draft',
        title: 'Technical Approach Paragraph',
        content: 'Our cloud-native architecture leverages AWS GovCloud for FedRAMP High compliance, ensuring zero-trust security posture aligned with DoD CIO mandates.',
        agent: 'Proposal Writer',
        priority: 'MEDIUM',
        section: 'Volume II - Technical',
        timestamp: new Date(Date.now() - 60 * 60 * 1000),
        confidence: 88,
        evidenceCoverage: 82,
        status: 'pending',
      },
      {
        id: 'HITL-005',
        type: 'risk',
        title: 'Competitor Intelligence Alert',
        content: 'SAIC recently won similar contract at VA. Recommended counter-positioning: Emphasize small business agility and healthcare-specific expertise.',
        agent: 'Black Hat Intel',
        priority: 'LOW',
        section: 'Strategy Notes',
        timestamp: new Date(Date.now() - 90 * 60 * 1000),
        confidence: 76,
        evidenceCoverage: 65,
        status: 'pending',
      },
    ];

    // ============================================================================
    // UTILITY FUNCTIONS
    // ============================================================================
    const formatTime = (date) => {
      const now = new Date();
      const diff = Math.floor((now - date) / (1000 * 60));
      if (diff < 60) return `${diff}m ago`;
      if (diff < 1440) return `${Math.floor(diff / 60)}h ago`;
      return date.toLocaleDateString();
    };

    const getTypeIcon = (type) => {
      const icons = {
        win_theme: 'zap',
        compliance: 'clipboard',
        pricing: 'fileText',
        draft: 'fileText',
        risk: 'alertTriangle',
      };
      return icons[type] || 'fileText';
    };

    const getTypeColor = (type) => {
      const colors = {
        win_theme: 'text-cyan-400',
        compliance: 'text-emerald-400',
        pricing: 'text-amber-400',
        draft: 'text-blue-400',
        risk: 'text-red-400',
      };
      return colors[type] || 'text-slate-400';
    };

    // ============================================================================
    // GLOBAL FOOTER
    // ============================================================================
    const GlobalFooter = () => (
      <footer className="fixed bottom-0 left-0 right-0 bg-slate-900/95 border-t border-slate-700/50 px-6 py-2 backdrop-blur-sm z-40">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-4">
            <span className="text-xs text-slate-500">
              MissionPulse {CONFIG.MODULE_ID} • {CONFIG.MODULE_NAME} v{CONFIG.VERSION}
            </span>
            <ConnectionStatus isConnected={true} />
          </div>
          <span className="text-xs text-amber-400 font-medium px-2 py-1 bg-amber-500/10 rounded border border-amber-500/20">
            ⚠️ AI GENERATED - REQUIRES HUMAN REVIEW
          </span>
        </div>
      </footer>
    );

    // ============================================================================
    // MAIN COMPONENT
    // ============================================================================
    const HITLGauntlet = () => {
      const [queue, setQueue] = useState(INITIAL_QUEUE);
      const [expandedItem, setExpandedItem] = useState(null);
      const [filter, setFilter] = useState('all');
      const [auditTrail, setAuditTrail] = useState([]);
      const [showAuditPanel, setShowAuditPanel] = useState(false);
      const [isLoading, setIsLoading] = useState(true);
      const { addToast } = useToast();

      useEffect(() => {
        const timer = setTimeout(() => {
          setIsLoading(false);
          addToast('HITL queue loaded successfully', 'success');
        }, 600);
        return () => clearTimeout(timer);
      }, []);

      const handleAction = (itemId, action, note = '') => {
        const item = queue.find(q => q.id === itemId);
        if (!item) return;

        // Add to audit trail
        setAuditTrail(prev => [{
          id: Date.now(),
          itemId,
          action,
          reviewer: 'Mary Womack',
          timestamp: new Date(),
          note,
        }, ...prev]);

        // Update queue
        setQueue(prev => prev.map(q => 
          q.id === itemId ? { ...q, status: action } : q
        ));

        // Show toast
        const messages = {
          approved: `${item.title} approved`,
          revised: `${item.title} sent for revision`,
          rejected: `${item.title} rejected`,
        };
        addToast(messages[action], action === 'approved' ? 'success' : action === 'rejected' ? 'error' : 'warning');
      };

      const pendingQueue = queue.filter(q => q.status === 'pending');
      const filteredQueue = filter === 'all' 
        ? pendingQueue 
        : pendingQueue.filter(q => q.priority === filter);

      const stats = {
        pending: pendingQueue.length,
        approved: queue.filter(q => q.status === 'approved').length,
        revised: queue.filter(q => q.status === 'revised').length,
        rejected: queue.filter(q => q.status === 'rejected').length,
        highPriority: pendingQueue.filter(q => q.priority === 'HIGH').length,
      };

      if (isLoading) {
        return (
          <div className="min-h-screen bg-[#00050F] flex items-center justify-center">
            <LoadingSpinner size="lg" message="Loading HITL queue..." />
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#00050F] pb-16">
          {/* Header */}
          <header className="bg-slate-900/80 border-b border-slate-700/50 px-6 py-4">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-4">
                <HomeButton />
                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center">
                  <Icon name="shield" className="w-6 h-6 text-white" />
                </div>
                <div>
                  <h1 className="text-xl font-bold text-white">Human-in-the-Loop Gauntlet</h1>
                  <p className="text-sm text-slate-400">AI content approval queue • Federal compliance checkpoint</p>
                </div>
              </div>

              <div className="flex items-center gap-3">
                {stats.highPriority > 0 && (
                  <div className="flex items-center gap-2 px-3 py-1.5 bg-red-500/20 border border-red-500/30 rounded-lg">
                    <Icon name="alertTriangle" className="w-4 h-4 text-red-400" />
                    <span className="text-red-400 text-sm font-semibold">{stats.highPriority} high priority</span>
                  </div>
                )}
                <Button 
                  variant="secondary" 
                  size="sm" 
                  icon="activity"
                  onClick={() => setShowAuditPanel(!showAuditPanel)}
                >
                  Audit Trail ({auditTrail.length})
                </Button>
              </div>
            </div>
          </header>

          {/* Stats Bar */}
          <div className="bg-slate-800/30 border-b border-slate-700/30 px-6 py-3">
            <div className="flex items-center gap-6">
              <div className="flex items-center gap-2">
                <div className="w-3 h-3 rounded-full bg-amber-400 animate-pulse" />
                <span className="text-sm text-white font-semibold">{stats.pending} Pending</span>
              </div>
              <div className="flex items-center gap-2">
                <div className="w-3 h-3 rounded-full bg-emerald-400" />
                <span className="text-sm text-slate-400">{stats.approved} Approved</span>
              </div>
              <div className="flex items-center gap-2">
                <div className="w-3 h-3 rounded-full bg-blue-400" />
                <span className="text-sm text-slate-400">{stats.revised} Revised</span>
              </div>
              <div className="flex items-center gap-2">
                <div className="w-3 h-3 rounded-full bg-red-400" />
                <span className="text-sm text-slate-400">{stats.rejected} Rejected</span>
              </div>
              <div className="flex-1" />
              <div className="flex items-center gap-2">
                <Icon name="filter" className="w-4 h-4 text-slate-500" />
                {['all', 'HIGH', 'MEDIUM', 'LOW'].map(f => (
                  <button
                    key={f}
                    onClick={() => setFilter(f)}
                    className={`px-3 py-1 rounded-lg text-xs font-semibold transition-all ${
                      filter === f
                        ? 'bg-cyan-500 text-white'
                        : 'bg-slate-800 text-slate-400 hover:bg-slate-700'
                    }`}
                  >
                    {f === 'all' ? 'All' : f}
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div className="flex">
            {/* Main Content */}
            <main className={`flex-1 p-6 transition-all ${showAuditPanel ? 'mr-80' : ''}`}>
              <div className="space-y-4">
                {filteredQueue.map((item, index) => (
                  <Card 
                    key={item.id}
                    className={`p-4 animate-fadeIn ${expandedItem === item.id ? 'ring-2 ring-cyan-500/50' : ''}`}
                    style={{ animationDelay: `${index * 50}ms` }}
                  >
                    <div className="flex items-start gap-4">
                      {/* Icon */}
                      <div className={`w-10 h-10 rounded-lg bg-slate-700/50 flex items-center justify-center flex-shrink-0 ${getTypeColor(item.type)}`}>
                        <Icon name={getTypeIcon(item.type)} className="w-5 h-5" />
                      </div>

                      {/* Content */}
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 mb-1">
                          <span className="font-mono text-xs text-slate-500">{item.id}</span>
                          <Badge variant={item.priority === 'HIGH' ? 'danger' : item.priority === 'MEDIUM' ? 'warning' : 'default'} size="xs">
                            {item.priority}
                          </Badge>
                          <span className="text-xs text-slate-500">• {item.agent}</span>
                        </div>
                        <h3 className="text-white font-semibold mb-2">{item.title}</h3>
                        <p className="text-slate-400 text-sm">{item.content}</p>

                        <div className="flex items-center gap-4 mt-3 text-xs text-slate-500">
                          <span className="flex items-center gap-1">
                            <Icon name="fileText" className="w-3 h-3" />
                            {item.section}
                          </span>
                          <span className="flex items-center gap-1">
                            <Icon name="clock" className="w-3 h-3" />
                            {formatTime(item.timestamp)}
                          </span>
                          <span className="flex items-center gap-1">
                            <Icon name="cpu" className="w-3 h-3" />
                            {item.confidence}% confidence
                          </span>
                        </div>
                      </div>

                      {/* Actions */}
                      <div className="flex flex-col gap-2">
                        <Button 
                          variant="success" 
                          size="sm" 
                          icon="check"
                          onClick={() => handleAction(item.id, 'approved')}
                        >
                          Approve
                        </Button>
                        <Button 
                          variant="warning" 
                          size="sm" 
                          icon="pencil"
                          onClick={() => handleAction(item.id, 'revised')}
                        >
                          Revise
                        </Button>
                        <Button 
                          variant="danger" 
                          size="sm" 
                          icon="x"
                          onClick={() => handleAction(item.id, 'rejected')}
                        >
                          Reject
                        </Button>
                      </div>
                    </div>
                  </Card>
                ))}

                {filteredQueue.length === 0 && (
                  <Card className="p-12 text-center">
                    <Icon name="checkCircle" className="w-16 h-16 text-emerald-500 mx-auto mb-4" />
                    <h3 className="text-xl font-semibold text-white mb-2">Queue Clear!</h3>
                    <p className="text-slate-400">
                      {stats.pending === 0 
                        ? 'All items have been reviewed. Great work!'
                        : 'No items match your current filter.'}
                    </p>
                  </Card>
                )}
              </div>
            </main>

            {/* Audit Trail Sidebar */}
            {showAuditPanel && (
              <aside className="fixed right-0 top-0 bottom-0 w-80 bg-slate-900 border-l border-slate-700 overflow-hidden flex flex-col animate-slideIn">
                <div className="p-4 border-b border-slate-700">
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-2">
                      <Icon name="activity" className="w-5 h-5 text-cyan-400" />
                      <h3 className="font-semibold text-white">Audit Trail</h3>
                    </div>
                    <button 
                      onClick={() => setShowAuditPanel(false)}
                      className="p-1 hover:bg-slate-800 rounded"
                    >
                      <Icon name="x" className="w-4 h-4 text-slate-400" />
                    </button>
                  </div>
                </div>

                <div className="flex-1 overflow-y-auto p-4 space-y-3">
                  {auditTrail.length === 0 ? (
                    <div className="text-center py-8">
                      <Icon name="clipboard" className="w-12 h-12 text-slate-600 mx-auto mb-3" />
                      <p className="text-slate-500 text-sm">No actions recorded yet</p>
                    </div>
                  ) : (
                    auditTrail.map((entry, index) => (
                      <div 
                        key={entry.id}
                        className="p-3 bg-slate-800/50 rounded-lg animate-fadeIn"
                        style={{ animationDelay: `${index * 50}ms` }}
                      >
                        <div className="flex items-center justify-between mb-2">
                          <Badge 
                            variant={entry.action === 'approved' ? 'success' : entry.action === 'revised' ? 'warning' : 'danger'} 
                            size="xs"
                          >
                            {entry.action.charAt(0).toUpperCase() + entry.action.slice(1)}
                          </Badge>
                          <span className="text-xs text-slate-500 font-mono">{entry.itemId}</span>
                        </div>
                        <div className="flex items-center gap-2 text-xs text-slate-400">
                          <Icon name="user" className="w-3 h-3" />
                          <span>{entry.reviewer}</span>
                          <span className="text-slate-600">•</span>
                          <Icon name="clock" className="w-3 h-3" />
                          <span>{formatTime(entry.timestamp)}</span>
                        </div>
                      </div>
                    ))
                  )}
                </div>

                <div className="p-4 border-t border-slate-700 bg-slate-800/50">
                  <div className="text-xs text-slate-400 space-y-1">
                    <div className="flex justify-between">
                      <span>Total Actions</span>
                      <span className="text-white font-medium">{auditTrail.length}</span>
                    </div>
                  </div>
                </div>
              </aside>
            )}
          </div>

          <GlobalFooter />
        </div>
      );
    };

    // ============================================================================
    // APP WITH PROVIDERS
    // ============================================================================
    const App = () => (
      <ErrorBoundary>
        <ToastProvider>
          <HITLGauntlet />
        </ToastProvider>
      </ErrorBoundary>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
