<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Module Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .float { animation: float 3s ease-in-out infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    // ============================================
    // MODULE REGISTRY - V3 MODULES
    // ============================================
    const MODULES = {
      command: {
        title: 'Command Center',
        icon: '⚡',
        color: 'cyan',
        modules: [
          { id: 'dashboard', name: 'Mission Control', icon: '⚡', href: 'missionpulse-dashboard-v3.html', desc: 'Executive dashboard with live stats', status: 'live' },
          { id: 'warroom', name: 'War Room', icon: '🎯', href: 'missionpulse-warroom-v3.html', desc: 'Real-time ops center with countdown', status: 'live' },
          { id: 'launch', name: 'Launch Control', icon: '🚀', href: 'missionpulse-launchroi-v2.html', desc: 'Final submission checklist & ROI', status: 'live' }
        ]
      },
      strategy: {
        title: 'Strategy & Pipeline',
        icon: '📊',
        color: 'purple',
        modules: [
          { id: 'pipeline', name: 'Pipeline Intel', icon: '📊', href: 'missionpulse-pipeline-v3.html', desc: 'Full CRUD opportunity management', status: 'live', badge: 'NEW' },
          { id: 'swimlane', name: 'Swimlane Board', icon: '📋', href: 'missionpulse-swimlane-v2.html', desc: 'Kanban-style phase tracking', status: 'live' },
          { id: 'frenemy', name: 'Frenemy Protocol', icon: '🤝', href: 'missionpulse-frenemy-v2.html', desc: 'Teaming partners & relationships', status: 'live' }
        ]
      },
      intel: {
        title: 'Intelligence & Analysis',
        icon: '🔍',
        color: 'blue',
        modules: [
          { id: 'rfpshredder', name: 'RFP Shredder', icon: '📄', href: 'missionpulse-rfpshredder-v2.html', desc: 'AI-powered requirement extraction', status: 'live' },
          { id: 'contracts', name: 'Contract Scanner', icon: '⚖️', href: 'missionpulse-contracts-v2.html', desc: 'FAR/DFARS clause analysis', status: 'live', badge: 'CUI' },
          { id: 'irondome', name: 'Iron Dome', icon: '🛡️', href: 'missionpulse-irondome-v2.html', desc: 'Compliance protection system', status: 'live' },
          { id: 'blackhat', name: 'Black Hat', icon: '🎭', href: 'missionpulse-blackhat-v3.html', desc: 'Competitive intelligence', status: 'live', badge: 'RBAC', restricted: true }
        ]
      },
      delivery: {
        title: 'Proposal Delivery',
        icon: '📝',
        color: 'emerald',
        modules: [
          { id: 'pricing', name: 'Pricing Engine', icon: '💵', href: 'missionpulse-pricing-v3.html', desc: 'BOE calculator with wrap rates', status: 'live', badge: 'CUI' },
          { id: 'hitl', name: 'HITL Queue', icon: '👍', href: 'missionpulse-hitl-v2.html', desc: 'Human-in-the-loop approvals', status: 'live' },
          { id: 'orals', name: 'Orals Studio', icon: '🎤', href: 'missionpulse-orals-v2.html', desc: 'Presentation prep & Q&A', status: 'live' }
        ]
      },
      knowledge: {
        title: 'Knowledge & Learning',
        icon: '📚',
        color: 'amber',
        modules: [
          { id: 'lessons', name: 'Lessons Learned', icon: '📚', href: 'missionpulse-lessons-v2.html', desc: 'Capture & apply insights', status: 'live' },
          { id: 'playbook', name: 'Playbook', icon: '📖', href: 'missionpulse-playbook-v2.html', desc: 'Best practices library', status: 'planned' }
        ]
      },
      admin: {
        title: 'Administration',
        icon: '⚙️',
        color: 'slate',
        modules: [
          { id: 'audit', name: 'Audit Log', icon: '📜', href: 'missionpulse-audit-v2.html', desc: 'Activity tracking & compliance', status: 'live' },
          { id: 'settings', name: 'Settings', icon: '⚙️', href: 'missionpulse-settings-v2.html', desc: 'System configuration', status: 'live' },
          { id: 'integrations', name: 'Integrations', icon: '🔌', href: 'missionpulse-integrations-v2.html', desc: 'AI providers & connections', status: 'live', badge: 'NEW' },
          { id: 'users', name: 'User Management', icon: '👥', href: 'admin-users.html', desc: 'Team access control', status: 'live', badge: 'ADMIN' }
        ]
      },
      ai: {
        title: 'AI Agents',
        icon: '🤖',
        color: 'rose',
        modules: [
          { id: 'agenthub', name: 'Agent Hub', icon: '🤖', href: 'missionpulse-agent-hub.html', desc: 'All 8 specialized AI agents', status: 'live' }
        ]
      }
    };

    // ============================================
    // COMPONENTS
    // ============================================

    // Module Card
    const ModuleCard = ({ module, color }) => {
      const statusColors = {
        live: 'bg-emerald-500',
        beta: 'bg-amber-500',
        planned: 'bg-slate-500'
      };
      const badgeColors = {
        NEW: 'bg-cyan-500/20 text-cyan-400',
        CUI: 'bg-amber-500/20 text-amber-400',
        RBAC: 'bg-red-500/20 text-red-400',
        ADMIN: 'bg-purple-500/20 text-purple-400'
      };

      return (
        <a
          href={module.href}
          className={`glass rounded-xl border border-slate-700/50 p-5 hover:border-${color}-500/50 hover:bg-slate-800/50 transition-all group block`}
        >
          <div className="flex items-start gap-4">
            <div className={`w-12 h-12 rounded-lg bg-${color}-500/20 flex items-center justify-center group-hover:scale-110 transition-transform`}>
              <span className="text-2xl">{module.icon}</span>
            </div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 mb-1">
                <h3 className={`font-semibold text-white group-hover:text-${color}-400 transition-colors`}>
                  {module.name}
                </h3>
                <span className={`w-2 h-2 rounded-full ${statusColors[module.status]}`}></span>
                {module.badge && (
                  <span className={`px-2 py-0.5 rounded text-xs ${badgeColors[module.badge]}`}>
                    {module.badge}
                  </span>
                )}
              </div>
              <p className="text-sm text-slate-400 line-clamp-2">{module.desc}</p>
            </div>
            <span className="text-slate-600 group-hover:text-slate-400 transition-colors">→</span>
          </div>
        </a>
      );
    };

    // Category Section
    const CategorySection = ({ category, data }) => (
      <div className="space-y-4">
        <div className="flex items-center gap-3">
          <span className={`text-2xl`}>{data.icon}</span>
          <h2 className={`text-xl font-bold text-${data.color}-400`}>{data.title}</h2>
          <span className="text-sm text-slate-500">({data.modules.length})</span>
        </div>
        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
          {data.modules.map(module => (
            <ModuleCard key={module.id} module={module} color={data.color} />
          ))}
        </div>
      </div>
    );

    // Stats Summary
    const StatsSummary = () => {
      const totalModules = Object.values(MODULES).reduce((sum, cat) => sum + cat.modules.length, 0);
      const liveModules = Object.values(MODULES).reduce(
        (sum, cat) => sum + cat.modules.filter(m => m.status === 'live').length, 0
      );
      const cuiModules = Object.values(MODULES).reduce(
        (sum, cat) => sum + cat.modules.filter(m => m.badge === 'CUI').length, 0
      );
      const rbacModules = Object.values(MODULES).reduce(
        (sum, cat) => sum + cat.modules.filter(m => m.badge === 'RBAC').length, 0
      );

      return (
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          {[
            { label: 'Total Modules', value: totalModules, color: 'cyan', icon: '📦' },
            { label: 'Live', value: liveModules, color: 'emerald', icon: '✅' },
            { label: 'CUI Protected', value: cuiModules, color: 'amber', icon: '🔒' },
            { label: 'RBAC Restricted', value: rbacModules, color: 'red', icon: '🛡️' }
          ].map(({ label, value, color, icon }) => (
            <div key={label} className="glass rounded-lg p-4 border border-slate-700/50">
              <div className="flex items-center gap-2 mb-1">
                <span>{icon}</span>
                <p className="text-xs text-slate-400">{label}</p>
              </div>
              <p className={`text-2xl font-bold text-${color}-400`}>{value}</p>
            </div>
          ))}
        </div>
      );
    };

    // Quick Search
    const QuickSearch = ({ onSearch }) => {
      const [query, setQuery] = React.useState('');
      
      return (
        <div className="relative">
          <input
            type="text"
            value={query}
            onChange={(e) => { setQuery(e.target.value); onSearch(e.target.value); }}
            placeholder="Search modules..."
            className="w-full bg-slate-800 border border-slate-700 rounded-xl px-5 py-3 pl-12 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500"
          />
          <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">🔍</span>
        </div>
      );
    };

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [searchQuery, setSearchQuery] = React.useState('');
      const [userRole] = React.useState(localStorage.getItem('missionpulse_role') || 'CEO');

      const filteredModules = React.useMemo(() => {
        if (!searchQuery) return MODULES;
        
        const query = searchQuery.toLowerCase();
        const filtered = {};
        
        Object.entries(MODULES).forEach(([key, category]) => {
          const matchingModules = category.modules.filter(
            m => m.name.toLowerCase().includes(query) || 
                 m.desc.toLowerCase().includes(query) ||
                 m.id.toLowerCase().includes(query)
          );
          if (matchingModules.length > 0) {
            filtered[key] = { ...category, modules: matchingModules };
          }
        });
        
        return filtered;
      }, [searchQuery]);

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-700/50 rounded-lg">← Back</a>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center float">
                    <span className="text-xl">🏠</span>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold text-white">Module Hub</h1>
                    <p className="text-xs text-slate-400">All MissionPulse Modules</p>
                  </div>
                </div>
              </div>
              <div className="text-right">
                <p className="text-sm text-white">{userRole}</p>
                <p className="text-xs text-emerald-400">● Online</p>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8 space-y-8">
            {/* Search */}
            <QuickSearch onSearch={setSearchQuery} />

            {/* Stats */}
            <StatsSummary />

            {/* Module Categories */}
            {Object.entries(filteredModules).map(([key, data]) => (
              <CategorySection key={key} category={key} data={data} />
            ))}

            {Object.keys(filteredModules).length === 0 && (
              <div className="text-center py-12">
                <p className="text-slate-400">No modules match "{searchQuery}"</p>
              </div>
            )}
          </main>

          {/* Footer */}
          <footer className="border-t border-slate-800 py-6">
            <div className="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4">
              <p className="text-xs text-slate-500">
                © 2026 Mission Meets Tech • Mission. Technology. Transformation.
              </p>
              <p className="text-xs text-slate-600">
                AI GENERATED - REQUIRES HUMAN REVIEW
              </p>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
