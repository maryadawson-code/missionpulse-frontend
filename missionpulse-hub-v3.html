<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Module Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .module-card:hover { animation: float 0.5s ease-in-out; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    // ============================================
    // MODULE REGISTRY - ALL V3 MODULES
    // ============================================
    const MODULES = [
      // COMMAND CENTER
      { id: 'dashboard', name: 'Dashboard', icon: '📊', description: 'Pipeline overview with live stats and activity feed', href: 'missionpulse-dashboard-v3.html', category: 'Command Center', status: 'live', version: 'V3', badges: [] },
      { id: 'pipeline', name: 'Pipeline', icon: '🎯', description: 'Full CRUD opportunity management with filters', href: 'missionpulse-pipeline-v3.html', category: 'Command Center', status: 'live', version: 'V3', badges: [] },
      { id: 'swimlane', name: 'Swimlane', icon: '🏊', description: 'Drag-drop Kanban across 8 Shipley phases', href: 'missionpulse-swimlane-v3.html', category: 'Command Center', status: 'live', version: 'V3', badges: [] },

      // STRATEGY & CAPTURE
      { id: 'warroom', name: 'War Room', icon: '⚔️', description: 'Live countdown, tasks, timeline milestones', href: 'missionpulse-warroom-v3.html', category: 'Strategy & Capture', status: 'live', version: 'V3', badges: [] },
      { id: 'blackhat', name: 'Black Hat', icon: '🎭', description: 'Competitive intelligence and threat analysis', href: 'missionpulse-blackhat-v3.html', category: 'Strategy & Capture', status: 'live', version: 'V3', badges: ['CUI', 'RBAC'] },
      { id: 'frenemy', name: 'Frenemy Protocol', icon: '🤝', description: 'Teaming partner management with NDA tracking', href: 'missionpulse-frenemy-v3.html', category: 'Strategy & Capture', status: 'live', version: 'V3', badges: ['NEW'] },

      // INTELLIGENCE & ANALYSIS
      { id: 'rfpshredder', name: 'RFP Shredder', icon: '📄', description: 'PDF upload with requirement extraction', href: 'missionpulse-rfpshredder-v3.html', category: 'Intelligence & Analysis', status: 'live', version: 'V3', badges: [] },
      { id: 'contracts', name: 'Contracts Scanner', icon: '⚖️', description: 'FAR/DFARS clause analysis with plain language', href: 'missionpulse-contracts-v3.html', category: 'Intelligence & Analysis', status: 'live', version: 'V3', badges: ['CUI', 'NEW'] },
      { id: 'irondome', name: 'Iron Dome', icon: '🛡️', description: 'Compliance shields, gap analysis, checklist', href: 'missionpulse-irondome-v3.html', category: 'Intelligence & Analysis', status: 'live', version: 'V3', badges: ['NEW'] },
      { id: 'lessons', name: 'Lessons Learned', icon: '📚', description: 'Win/loss knowledge base with voting', href: 'missionpulse-lessons-v3.html', category: 'Intelligence & Analysis', status: 'live', version: 'V3', badges: ['NEW'] },

      // PROPOSAL DELIVERY
      { id: 'pricing', name: 'Pricing Studio', icon: '💰', description: 'BOE calculator with wrap rates and CUI marking', href: 'missionpulse-pricing-v3.html', category: 'Proposal Delivery', status: 'live', version: 'V3', badges: ['CUI'] },
      { id: 'hitl', name: 'HITL Queue', icon: '🤖', description: 'AI approval workflow with confidence scores', href: 'missionpulse-hitl-v3.html', category: 'Proposal Delivery', status: 'live', version: 'V3', badges: [] },
      { id: 'orals', name: 'Orals Studio', icon: '🎤', description: 'Slide deck, Q&A practice, presentation timer', href: 'missionpulse-orals-v3.html', category: 'Proposal Delivery', status: 'live', version: 'V3', badges: [] },
      { id: 'launch', name: 'Launch Control', icon: '🚀', description: 'Final submission checklist with countdown', href: 'missionpulse-launch-v3.html', category: 'Proposal Delivery', status: 'live', version: 'V3', badges: ['NEW'] },

      // POST-AWARD
      { id: 'postaward', name: 'Post-Award', icon: '📈', description: 'Contract management, financials, deliverables', href: 'missionpulse-postaward-v3.html', category: 'Post-Award', status: 'live', version: 'V3', badges: ['NEW'] },

      // AI & AGENTS
      { id: 'agenthub', name: 'Agent Hub', icon: '🧠', description: '8 specialized AI agents for proposal support', href: 'missionpulse-agent-hub.html', category: 'AI & Agents', status: 'live', version: 'V2', badges: [] },

      // ADMINISTRATION
      { id: 'audit', name: 'Audit Log', icon: '📋', description: 'Activity tracking with filters and export', href: 'missionpulse-audit-v3.html', category: 'Administration', status: 'live', version: 'V3', badges: ['NEW'] },
      { id: 'settings', name: 'Settings', icon: '⚙️', description: 'AI providers, notifications, security config', href: 'missionpulse-settings-v3.html', category: 'Administration', status: 'live', version: 'V3', badges: ['ADMIN', 'NEW'] },
      { id: 'users', name: 'User Management', icon: '👥', description: 'Team roles and permissions', href: 'admin-users.html', category: 'Administration', status: 'live', version: 'V2', badges: ['ADMIN'] },
      { id: 'hub', name: 'Module Hub', icon: '🏠', description: 'This page - all modules in one place', href: 'missionpulse-hub-v3.html', category: 'Administration', status: 'live', version: 'V3', badges: [] }
    ];

    const CATEGORIES = ['All', 'Command Center', 'Strategy & Capture', 'Intelligence & Analysis', 'Proposal Delivery', 'Post-Award', 'AI & Agents', 'Administration'];

    const BADGE_CONFIG = {
      NEW: { bg: 'bg-emerald-500/20', text: 'text-emerald-400' },
      CUI: { bg: 'bg-amber-500/20', text: 'text-amber-400' },
      RBAC: { bg: 'bg-purple-500/20', text: 'text-purple-400' },
      ADMIN: { bg: 'bg-red-500/20', text: 'text-red-400' }
    };

    // ============================================
    // COMPONENTS
    // ============================================
    const StatsSummary = ({ modules }) => {
      const live = modules.filter(m => m.status === 'live').length;
      const v3 = modules.filter(m => m.version === 'V3').length;
      const cui = modules.filter(m => m.badges.includes('CUI')).length;
      const newMods = modules.filter(m => m.badges.includes('NEW')).length;

      return (
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          {[
            { label: 'Total Modules', value: modules.length, color: 'cyan', icon: '📦' },
            { label: 'V3 Ready', value: v3, color: 'emerald', icon: '✨' },
            { label: 'CUI Protected', value: cui, color: 'amber', icon: '🔒' },
            { label: 'New This Sprint', value: newMods, color: 'purple', icon: '🆕' }
          ].map(({ label, value, color, icon }) => (
            <div key={label} className="glass rounded-lg p-4 border border-slate-700/50">
              <div className="flex items-center gap-2 mb-1">
                <span>{icon}</span>
                <p className="text-xs text-slate-400">{label}</p>
              </div>
              <p className={`text-2xl font-bold text-${color}-400`}>{value}</p>
            </div>
          ))}
        </div>
      );
    };

    const ModuleCard = ({ module }) => (
      <a href={module.href} className="module-card glass rounded-xl border border-slate-700/50 p-6 hover:border-cyan-500/50 transition-all block">
        <div className="flex items-start justify-between mb-3">
          <div className="w-12 h-12 rounded-lg bg-gradient-to-br from-cyan-500/20 to-blue-500/20 flex items-center justify-center text-2xl">{module.icon}</div>
          <div className="flex items-center gap-2">
            {module.badges.map(badge => {
              const config = BADGE_CONFIG[badge];
              return <span key={badge} className={`px-2 py-0.5 rounded text-xs ${config.bg} ${config.text}`}>{badge}</span>;
            })}
            <span className={`px-2 py-0.5 rounded text-xs ${module.status === 'live' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-500/20 text-slate-400'}`}>{module.version}</span>
          </div>
        </div>
        <h3 className="font-semibold text-white mb-1">{module.name}</h3>
        <p className="text-sm text-slate-400 mb-3">{module.description}</p>
        <div className="flex items-center justify-between">
          <span className="text-xs text-slate-500">{module.category}</span>
          <span className="text-cyan-400 text-sm">Open →</span>
        </div>
      </a>
    );

    const CategorySection = ({ category, modules }) => (
      <div className="space-y-4">
        <h3 className="text-lg font-semibold text-white flex items-center gap-2">
          <span className="w-2 h-2 rounded-full bg-cyan-500"></span>
          {category}
          <span className="text-sm font-normal text-slate-500">({modules.length})</span>
        </h3>
        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
          {modules.map(module => <ModuleCard key={module.id} module={module} />)}
        </div>
      </div>
    );

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [search, setSearch] = React.useState('');
      const [category, setCategory] = React.useState('All');

      const filteredModules = MODULES.filter(m => {
        if (category !== 'All' && m.category !== category) return false;
        if (search) {
          const s = search.toLowerCase();
          return m.name.toLowerCase().includes(s) || m.description.toLowerCase().includes(s);
        }
        return true;
      });

      const groupedModules = category === 'All'
        ? CATEGORIES.slice(1).map(cat => ({ category: cat, modules: filteredModules.filter(m => m.category === cat) })).filter(g => g.modules.length > 0)
        : [{ category, modules: filteredModules }];

      return (
        <div className="min-h-screen">
          <header className="glass border-b border-slate-700/50 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-700/50 rounded-lg">← Back</a>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center">🏠</div>
                  <div>
                    <h1 className="text-xl font-bold text-white">Module Hub</h1>
                    <p className="text-xs text-slate-400">All {MODULES.length} MissionPulse Modules</p>
                  </div>
                </div>
              </div>
              <span className="px-3 py-1 bg-emerald-500/20 text-emerald-400 rounded-full text-xs">V3 Complete</span>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8 space-y-8">
            <StatsSummary modules={MODULES} />

            <div className="flex flex-col md:flex-row gap-4">
              <input type="text" value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search modules..." className="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500" />
              <div className="flex gap-2 flex-wrap">
                {CATEGORIES.map(cat => (
                  <button key={cat} onClick={() => setCategory(cat)} className={`px-4 py-2 rounded-lg text-sm transition-colors whitespace-nowrap ${category === cat ? 'bg-cyan-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>{cat}</button>
                ))}
              </div>
            </div>

            <div className="space-y-8">
              {groupedModules.map(group => <CategorySection key={group.category} category={group.category} modules={group.modules} />)}
              {filteredModules.length === 0 && <div className="text-center py-12 text-slate-500">No modules match your search</div>}
            </div>

            <div className="glass rounded-xl border border-slate-700/50 p-6">
              <h3 className="font-semibold text-white mb-4">🚀 Quick Actions</h3>
              <div className="flex flex-wrap gap-3">
                <a href="missionpulse-pipeline-v3.html" className="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg text-sm">➕ New Opportunity</a>
                <a href="missionpulse-warroom-v3.html" className="px-4 py-2 bg-purple-600 hover:bg-purple-500 rounded-lg text-sm">⚔️ War Room</a>
                <a href="missionpulse-hitl-v3.html" className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-lg text-sm">🤖 Review AI Content</a>
                <a href="missionpulse-launch-v3.html" className="px-4 py-2 bg-red-600 hover:bg-red-500 rounded-lg text-sm">🚀 Launch Control</a>
              </div>
            </div>
          </main>

          <footer className="border-t border-slate-800 py-6">
            <div className="max-w-7xl mx-auto px-6 flex justify-between">
              <p className="text-xs text-slate-500">© 2026 Mission Meets Tech • {MODULES.length} Modules • Sprint 57 Complete</p>
              <p className="text-xs text-slate-600">AI GENERATED - REQUIRES HUMAN REVIEW</p>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
