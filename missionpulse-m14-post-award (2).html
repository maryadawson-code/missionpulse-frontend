<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse M14 - Post-Award Handoff</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(0,229,250,0.3); } 50% { box-shadow: 0 0 40px rgba(0,229,250,0.5); } }
    
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-spin { animation: spin 1s linear infinite; }
    .animate-slideIn { animation: slideIn 0.3s ease-out; }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
    .animate-glow { animation: glow 2s ease-in-out infinite; }
    
    .glass-card {
      background: linear-gradient(145deg, rgba(17, 24, 39, 0.95), rgba(10, 15, 30, 0.98));
      border: 1px solid rgba(0, 229, 250, 0.2);
    }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0F172A; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, createContext, useContext, useCallback } = React;

    // ============================================================================
    // PRODUCTION CONFIG
    // ============================================================================
    const CONFIG = {
      API_BASE: 'https://missionpulse-api.onrender.com',
      DASHBOARD_URL: 'https://missionpulse-frontend.netlify.app/',
      MODULE_ID: 'M14',
      MODULE_NAME: 'Post-Award Handoff',
      VERSION: '12.0.1',
      FEATURES: {
        API_ENABLED: true,
        DEMO_MODE: true
      }
    };

    // ============================================================================
    // TOAST CONTEXT & PROVIDER
    // ============================================================================
    const ToastContext = createContext(null);

    const ToastProvider = ({ children }) => {
      const [toasts, setToasts] = useState([]);
      
      const addToast = useCallback((message, type = 'info', duration = 4000) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), duration);
      }, []);

      return (
        <ToastContext.Provider value={{ addToast }}>
          {children}
          <div className="fixed top-4 right-4 z-50 space-y-2">
            {toasts.map(toast => (
              <div 
                key={toast.id}
                className={`px-4 py-3 rounded-lg shadow-lg animate-slideIn flex items-center gap-2 ${
                  toast.type === 'success' ? 'bg-emerald-500/90 text-white' :
                  toast.type === 'error' ? 'bg-red-500/90 text-white' :
                  toast.type === 'warning' ? 'bg-amber-500/90 text-white' :
                  'bg-slate-700/90 text-white'
                }`}
              >
                <span className="text-sm font-medium">{toast.message}</span>
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    };

    const useToast = () => {
      const context = useContext(ToastContext);
      if (!context) throw new Error('useToast must be used within ToastProvider');
      return context;
    };

    // ============================================================================
    // ERROR BOUNDARY
    // ============================================================================
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true };
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen bg-[#00050F] flex items-center justify-center p-6">
              <div className="bg-slate-800/50 border border-red-500/30 rounded-xl p-8 max-w-md text-center">
                <h2 className="text-xl font-bold text-white mb-2">Something went wrong</h2>
                <button onClick={() => window.location.reload()} className="px-4 py-2 bg-cyan-500 text-white rounded-lg">
                  Refresh
                </button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // ============================================================================
    // LOADING & CONNECTION
    // ============================================================================
    const LoadingSpinner = ({ size = 'md', message }) => {
      const sizes = { sm: 'w-4 h-4', md: 'w-8 h-8', lg: 'w-12 h-12' };
      return (
        <div className="flex flex-col items-center justify-center gap-3">
          <div className={`${sizes[size]} border-2 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin`} />
          {message && <span className="text-slate-400 text-sm">{message}</span>}
        </div>
      );
    };

    const ConnectionStatus = ({ isConnected }) => (
      <div className="flex items-center gap-2">
        <div className={`w-2 h-2 rounded-full ${isConnected ? 'bg-emerald-400' : 'bg-red-400'} animate-pulse`} />
        <span className="text-xs text-slate-500">{isConnected ? 'Connected' : 'Offline'}</span>
      </div>
    );

    // ============================================================================
    // ICONS
    // ============================================================================
    const Icons = {
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
      clipboard: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>,
      users: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
      calendar: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
      alert: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
      document: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>,
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
      arrowRight: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>,
      flag: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9" /></svg>,
    };

    const Icon = ({ name, className = "w-5 h-5" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    // ============================================================================
    // HOME BUTTON
    // ============================================================================
    const HomeButton = () => (
      <button
        onClick={() => window.location.href = CONFIG.DASHBOARD_URL}
        className="flex items-center gap-2 px-3 py-1.5 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg transition-colors group"
      >
        <Icon name="home" className="w-4 h-4 text-slate-400 group-hover:text-cyan-400" />
        <span className="text-sm text-slate-400 group-hover:text-white">Dashboard</span>
      </button>
    );

    // ============================================================================
    // DATA
    // ============================================================================
    const HANDOFF_CHECKLIST = [
      { id: 1, category: 'Personnel', label: 'Key personnel identified and cleared', status: 'complete' },
      { id: 2, category: 'Personnel', label: 'Subcontractor agreements finalized', status: 'complete' },
      { id: 3, category: 'Documentation', label: 'Contract mods processed', status: 'pending' },
      { id: 4, category: 'Documentation', label: 'SOW/PWS requirements mapped', status: 'complete' },
      { id: 5, category: 'Transition', label: 'Kick-off meeting scheduled', status: 'pending' },
      { id: 6, category: 'Transition', label: 'Knowledge transfer plan approved', status: 'in-progress' },
      { id: 7, category: 'Compliance', label: 'Security clearances verified', status: 'complete' },
      { id: 8, category: 'Compliance', label: 'CUI handling procedures documented', status: 'complete' },
    ];

    const MILESTONES = [
      { id: 1, name: 'Award Notice', date: '2024-01-15', status: 'complete' },
      { id: 2, name: 'Kick-off Meeting', date: '2024-02-01', status: 'complete' },
      { id: 3, name: 'Transition Complete', date: '2024-02-28', status: 'in-progress' },
      { id: 4, name: 'Full Operations', date: '2024-03-15', status: 'upcoming' },
    ];

    const PERSONNEL = [
      { name: 'Sarah Chen', role: 'Program Manager', status: 'assigned', clearance: 'Secret' },
      { name: 'Marcus Williams', role: 'Technical Lead', status: 'assigned', clearance: 'Top Secret' },
      { name: 'Jennifer Park', role: 'Quality Manager', status: 'pending', clearance: 'Secret' },
    ];

    // ============================================================================
    // GLOBAL FOOTER
    // ============================================================================
    const GlobalFooter = () => (
      <footer className="fixed bottom-0 left-0 right-0 bg-slate-900/95 border-t border-slate-700/50 px-6 py-2 backdrop-blur-sm z-40">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-4">
            <span className="text-xs text-slate-500">
              MissionPulse {CONFIG.MODULE_ID} • {CONFIG.MODULE_NAME} v{CONFIG.VERSION}
            </span>
            <ConnectionStatus isConnected={true} />
          </div>
          <span className="text-xs text-amber-400 font-medium px-2 py-1 bg-amber-500/10 rounded border border-amber-500/20">
            ⚠️ AI GENERATED - REQUIRES HUMAN REVIEW
          </span>
        </div>
      </footer>
    );

    // ============================================================================
    // MAIN COMPONENT
    // ============================================================================
    const PostAwardHandoff = () => {
      const [checklist, setChecklist] = useState(HANDOFF_CHECKLIST);
      const [selectedTab, setSelectedTab] = useState('checklist');
      const [isLoading, setIsLoading] = useState(true);
      const { addToast } = useToast();

      useEffect(() => {
        const timer = setTimeout(() => {
          setIsLoading(false);
        }, 600);
        return () => clearTimeout(timer);
      }, []);

      const toggleChecklistItem = (id) => {
        setChecklist(prev => prev.map(item => {
          if (item.id === id) {
            const newStatus = item.status === 'complete' ? 'pending' : 'complete';
            addToast(`Item marked as ${newStatus}`, 'success');
            return { ...item, status: newStatus };
          }
          return item;
        }));
      };

      const completedCount = checklist.filter(i => i.status === 'complete').length;
      const progress = (completedCount / checklist.length) * 100;

      if (isLoading) {
        return (
          <div className="min-h-screen bg-[#00050F] flex items-center justify-center">
            <LoadingSpinner size="lg" message="Loading post-award data..." />
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#00050F] pb-16">
          {/* Header */}
          <header className="bg-slate-900/80 border-b border-slate-700/50 px-6 py-4">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-4">
                <HomeButton />
                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-500 flex items-center justify-center">
                  <Icon name="flag" className="w-6 h-6 text-white" />
                </div>
                <div>
                  <h1 className="text-xl font-bold text-white">Post-Award Handoff</h1>
                  <p className="text-sm text-slate-400">Contract transition & performance management</p>
                </div>
              </div>
              <div className="text-right">
                <div className="text-xs text-slate-500">Handoff Progress</div>
                <div className="text-2xl font-bold text-cyan-400">{Math.round(progress)}%</div>
              </div>
            </div>
          </header>

          {/* Tab Navigation */}
          <div className="bg-slate-800/30 border-b border-slate-700/30 px-6">
            <div className="flex gap-4">
              {['checklist', 'milestones', 'personnel'].map(tab => (
                <button
                  key={tab}
                  onClick={() => setSelectedTab(tab)}
                  className={`py-3 px-4 text-sm font-medium transition-all border-b-2 ${
                    selectedTab === tab
                      ? 'border-cyan-500 text-cyan-400'
                      : 'border-transparent text-slate-400 hover:text-white'
                  }`}
                >
                  {tab.charAt(0).toUpperCase() + tab.slice(1)}
                </button>
              ))}
            </div>
          </div>

          <div className="max-w-6xl mx-auto px-6 py-6">
            {/* Checklist Tab */}
            {selectedTab === 'checklist' && (
              <div className="glass-card rounded-xl p-6">
                <div className="flex items-center justify-between mb-6">
                  <h2 className="text-lg font-semibold text-white flex items-center gap-2">
                    <Icon name="clipboard" className="w-5 h-5 text-cyan-400" />
                    Handoff Checklist
                  </h2>
                  <span className="text-sm text-slate-400">{completedCount}/{checklist.length} complete</span>
                </div>

                <div className="space-y-3">
                  {checklist.map((item, index) => (
                    <div
                      key={item.id}
                      onClick={() => toggleChecklistItem(item.id)}
                      className={`flex items-center gap-4 p-4 rounded-lg cursor-pointer transition-all animate-fadeIn ${
                        item.status === 'complete' 
                          ? 'bg-emerald-500/10 border border-emerald-500/30' 
                          : 'bg-slate-800/50 hover:bg-slate-800 border border-transparent'
                      }`}
                      style={{ animationDelay: `${index * 50}ms` }}
                    >
                      <div className={`w-6 h-6 rounded-full flex items-center justify-center ${
                        item.status === 'complete' ? 'bg-emerald-500' : 'border-2 border-slate-600'
                      }`}>
                        {item.status === 'complete' && <Icon name="check" className="w-4 h-4 text-white" />}
                      </div>
                      <div className="flex-1">
                        <div className={item.status === 'complete' ? 'text-emerald-400' : 'text-white'}>{item.label}</div>
                        <div className="text-xs text-slate-500">{item.category}</div>
                      </div>
                      <span className={`text-xs px-2 py-1 rounded-full ${
                        item.status === 'complete' ? 'bg-emerald-500/20 text-emerald-400' :
                        item.status === 'in-progress' ? 'bg-amber-500/20 text-amber-400' :
                        'bg-slate-700 text-slate-400'
                      }`}>
                        {item.status}
                      </span>
                    </div>
                  ))}
                </div>

                {/* Progress Bar */}
                <div className="mt-6">
                  <div className="h-2 bg-slate-800 rounded-full overflow-hidden">
                    <div 
                      className="h-full bg-gradient-to-r from-cyan-500 to-emerald-500 transition-all duration-500"
                      style={{ width: `${progress}%` }}
                    />
                  </div>
                </div>
              </div>
            )}

            {/* Milestones Tab */}
            {selectedTab === 'milestones' && (
              <div className="glass-card rounded-xl p-6">
                <h2 className="text-lg font-semibold text-white mb-6 flex items-center gap-2">
                  <Icon name="calendar" className="w-5 h-5 text-cyan-400" />
                  Contract Milestones
                </h2>
                <div className="relative">
                  <div className="absolute left-4 top-0 bottom-0 w-0.5 bg-gradient-to-b from-emerald-500 via-cyan-500 to-slate-700" />
                  <div className="space-y-6">
                    {MILESTONES.map((milestone, index) => (
                      <div key={milestone.id} className="flex gap-4 animate-fadeIn" style={{ animationDelay: `${index * 100}ms` }}>
                        <div className={`w-8 h-8 rounded-full flex items-center justify-center z-10 ${
                          milestone.status === 'complete' ? 'bg-emerald-500' :
                          milestone.status === 'in-progress' ? 'bg-cyan-500 animate-pulse' :
                          'bg-slate-700'
                        }`}>
                          {milestone.status === 'complete' ? (
                            <Icon name="check" className="w-4 h-4 text-white" />
                          ) : (
                            <div className="w-2 h-2 bg-white rounded-full" />
                          )}
                        </div>
                        <div className="flex-1 pb-6">
                          <div className="text-white font-medium">{milestone.name}</div>
                          <div className="text-sm text-slate-400">{milestone.date}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* Personnel Tab */}
            {selectedTab === 'personnel' && (
              <div className="glass-card rounded-xl p-6">
                <h2 className="text-lg font-semibold text-white mb-6 flex items-center gap-2">
                  <Icon name="users" className="w-5 h-5 text-cyan-400" />
                  Key Personnel
                </h2>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                  {PERSONNEL.map((person, index) => (
                    <div 
                      key={person.name} 
                      className="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50 hover:border-cyan-500/50 transition-all animate-fadeIn"
                      style={{ animationDelay: `${index * 100}ms` }}
                    >
                      <div className="flex items-center gap-3 mb-3">
                        <div className="w-12 h-12 rounded-full bg-gradient-to-br from-cyan-500 to-teal-500 flex items-center justify-center text-white font-bold">
                          {person.name.split(' ').map(n => n[0]).join('')}
                        </div>
                        <div>
                          <div className="text-white font-medium">{person.name}</div>
                          <div className="text-sm text-slate-400">{person.role}</div>
                        </div>
                      </div>
                      <div className="flex justify-between text-xs">
                        <span className={`px-2 py-1 rounded-full ${
                          person.status === 'assigned' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'
                        }`}>
                          {person.status}
                        </span>
                        <span className="text-slate-500">{person.clearance}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          <GlobalFooter />
        </div>
      );
    };

    // ============================================================================
    // APP WITH PROVIDERS
    // ============================================================================
    const App = () => (
      <ErrorBoundary>
        <ToastProvider>
          <PostAwardHandoff />
        </ToastProvider>
      </ErrorBoundary>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
