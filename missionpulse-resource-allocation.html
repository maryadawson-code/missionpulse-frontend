<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #00050F 0%, #001029 50%, #000510 100%); min-height: 100vh; }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); border-radius: 16px; }
        .glass-card:hover { border-color: rgba(0,229,250,0.3); box-shadow: 0 8px 32px rgba(0,229,250,0.1); }
        .cyan-glow { box-shadow: 0 0 30px rgba(0,229,250,0.3); }
        .btn-primary { background: linear-gradient(135deg, #00E5FA 0%, #00B8D4 100%); color: #00050F; font-weight: 600; }
        .btn-primary:hover { box-shadow: 0 4px 20px rgba(0,229,250,0.4); transform: translateY(-1px); }
        .progress-bar { background: linear-gradient(90deg, #00E5FA 0%, #00B8D4 100%); }
        .overallocated { background: linear-gradient(90deg, #EF4444 0%, #DC2626 100%); }
        .underallocated { background: linear-gradient(90deg, #10B981 0%, #059669 100%); }
        .allocation-cell { transition: all 0.2s ease; }
        .allocation-cell:hover { transform: scale(1.05); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(0,229,250,0.3); border-radius: 3px; }
    </style>
</head>

        const supabaseUrl = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY4MTI0NjIsImV4cCI6MjA1MjM4ODQ2Mn0.w0CTO2S6OLVenus6qHdf4GJjCqg6HVDYT-fxEE0TBiw';

            { memberId: '1', oppId: '2', percentage: 15, role: 'Executive Sponsor' },

        // Navigation Component
        const Navigation = ({ currentUser }) => (
            <nav className="glass-card mb-6 p-4">
                <div className="flex items-center justify-between">
                    <div className="flex items-center space-x-4">
                        <a href="index.html" className="flex items-center space-x-3">

                                <i className="fas fa-rocket text-white"></i>

                            <span className="text-xl font-bold text-white">Mission<span className="text-cyan-400">Pulse</span></span>
                        </a>

                    </div>
                    <div className="flex items-center space-x-4">
                        <a href="missionpulse-dashboard-v12.html" className="text-gray-400 hover:text-cyan-400 transition">
                            <i className="fas fa-arrow-left mr-2"></i>Back to Dashboard
                        </a>
                        <div className="flex items-center space-x-2 px-3 py-1.5 rounded-lg bg-white/5">
                            <div className="w-8 h-8 rounded-full bg-gradient-to-br from-cyan-400 to-blue-500 flex items-center justify-center text-xs font-bold">
                                {currentUser?.avatar || 'MW'}
                            </div>
                            <span className="text-sm text-gray-300">{currentUser?.name || 'Mary Womack'}</span>
                        </div>
                    </div>
                </div>
            </nav>
        );

        // Stats Card Component
        const StatsCard = ({ icon, label, value, subtext, color = 'cyan' }) => (
            <div className="glass-card p-4">
                <div className="flex items-center justify-between mb-2">
                    <div className={`w-10 h-10 rounded-lg bg-${color}-500/20 flex items-center justify-center`}>
                        <i className={`fas fa-${icon} text-${color}-400`}></i>
                    </div>
                    <span className={`text-2xl font-bold text-${color}-400`}>{value}</span>
                </div>
                <p className="text-sm text-gray-400">{label}</p>
                {subtext && <p className="text-xs text-gray-500 mt-1">{subtext}</p>}
            </div>
        );

        // Allocation Matrix Component
        const AllocationMatrix = ({ members, opportunities, allocations, onCellClick }) => {
            const getAllocation = (memberId, oppId) => {
                return allocations.find(a => a.memberId === memberId && a.oppId === oppId);
            };

            const getTotalAllocation = (memberId) => {
                return allocations
                    .filter(a => a.memberId === memberId)
                    .reduce((sum, a) => sum + a.percentage, 0);
            };

            const getOpportunityTotal = (oppId) => {
                return allocations
                    .filter(a => a.oppId === oppId)
                    .reduce((sum, a) => sum + a.percentage, 0);
            };

            return (
                <div className="glass-card p-6 overflow-x-auto">
                    <div className="flex items-center justify-between mb-4">
                        <h3 className="text-lg font-semibold text-white">
                            <i className="fas fa-th mr-2 text-cyan-400"></i>Allocation Matrix
                        </h3>
                        <div className="flex items-center space-x-4 text-xs">
                            <span className="flex items-center"><span className="w-3 h-3 rounded bg-green-500 mr-1"></span>Under 100%</span>
                            <span className="flex items-center"><span className="w-3 h-3 rounded bg-cyan-500 mr-1"></span>At 100%</span>
                            <span className="flex items-center"><span className="w-3 h-3 rounded bg-red-500 mr-1"></span>Over 100%</span>
                        </div>
                    </div>
                    
                    <table className="w-full min-w-[800px]">
                        <thead>
                            <tr>
                                <th className="text-left p-3 text-gray-400 font-medium text-sm">Team Member</th>
                                {opportunities.map(opp => (
                                    <th key={opp.id} className="p-2 text-center">
                                        <div className="flex flex-col items-center">
                                            <span className="w-3 h-3 rounded-full mb-1" style={{ background: opp.color }}></span>
                                            <span className="text-xs text-gray-300 font-medium">{opp.nickname}</span>
                                            <span className="text-[10px] text-gray-500">{opp.status}</span>
                                        </div>
                                    </th>
                                ))}
                                <th className="p-3 text-center text-gray-400 font-medium text-sm">Total</th>
                                <th className="p-3 text-center text-gray-400 font-medium text-sm">Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            {members.map(member => {
                                const total = getTotalAllocation(member.id);
                                const status = total > 100 ? 'over' : total === 100 ? 'full' : 'under';
                                
                                return (
                                    <tr key={member.id} className="border-t border-white/5 hover:bg-white/5">
                                        <td className="p-3">
                                            <div className="flex items-center space-x-3">
                                                <div className="w-8 h-8 rounded-full bg-gradient-to-br from-cyan-400 to-blue-500 flex items-center justify-center text-xs font-bold">
                                                    {member.avatar}
                                                </div>
                                                <div>
                                                    <p className="text-sm font-medium text-white">{member.name}</p>
                                                    <p className="text-xs text-gray-500">{member.role}</p>
                                                </div>
                                            </div>
                                        </td>
                                        {opportunities.map(opp => {
                                            const allocation = getAllocation(member.id, opp.id);
                                            return (
                                                <td key={opp.id} className="p-2 text-center">
                                                    <div 
                                                        className="allocation-cell cursor-pointer mx-auto w-14 h-10 rounded-lg flex items-center justify-center text-sm font-medium"
                                                        style={{ 
                                                            background: allocation ? `${opp.color}30` : 'rgba(255,255,255,0.03)',
                                                            border: allocation ? `1px solid ${opp.color}50` : '1px solid transparent'
                                                        }}
                                                        onClick={() => onCellClick(member, opp, allocation)}
                                                        title={allocation?.role || 'Click to assign'}
                                                    >
                                                        {allocation ? (
                                                            <span style={{ color: opp.color }}>{allocation.percentage}%</span>
                                                        ) : (
                                                            <span className="text-gray-600">-</span>
                                                        )}
                                                    </div>
                                                </td>
                                            );
                                        })}
                                        <td className="p-3 text-center">
                                            <span className={`text-lg font-bold ${
                                                status === 'over' ? 'text-red-400' : 
                                                status === 'full' ? 'text-cyan-400' : 'text-green-400'
                                            }`}>
                                                {total}%
                                            </span>
                                        </td>
                                        <td className="p-3 text-center">
                                            <span className={`px-2 py-1 rounded-full text-xs font-medium ${
                                                status === 'over' ? 'bg-red-500/20 text-red-400' : 
                                                status === 'full' ? 'bg-cyan-500/20 text-cyan-400' : 'bg-green-500/20 text-green-400'
                                            }`}>
                                                {status === 'over' ? 'Overallocated' : status === 'full' ? 'At Capacity' : 'Available'}
                                            </span>
                                        </td>
                                    </tr>
                                );
                            })}
                        </tbody>
                        <tfoot>
                            <tr className="border-t border-cyan-500/30 bg-cyan-500/5">
                                <td className="p-3 font-medium text-cyan-400">Opportunity FTEs</td>
                                {opportunities.map(opp => {
                                    const total = getOpportunityTotal(opp.id);
                                    const fte = (total / 100).toFixed(1);
                                    return (
                                        <td key={opp.id} className="p-2 text-center">
                                            <span className="text-sm font-medium text-cyan-400">{fte}</span>
                                            <span className="text-xs text-gray-500 ml-1">FTE</span>
                                        </td>
                                    );
                                })}
                                <td colSpan="2"></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            );
        };

        // Capacity Chart Component
        const CapacityChart = ({ members, allocations }) => {
            const getTotalAllocation = (memberId) => {
                return allocations
                    .filter(a => a.memberId === memberId)
                    .reduce((sum, a) => sum + a.percentage, 0);
            };

            return (
                <div className="glass-card p-6">
                    <h3 className="text-lg font-semibold text-white mb-4">
                        <i className="fas fa-chart-bar mr-2 text-cyan-400"></i>Team Capacity Overview
                    </h3>
                    <div className="space-y-4">
                        {members.map(member => {
                            const total = getTotalAllocation(member.id);
                            const percentage = Math.min(total, 150);
                            const isOver = total > 100;
                            
                            return (
                                <div key={member.id}>
                                    <div className="flex items-center justify-between mb-1">
                                        <div className="flex items-center space-x-2">
                                            <div className="w-6 h-6 rounded-full bg-gradient-to-br from-cyan-400 to-blue-500 flex items-center justify-center text-[10px] font-bold">
                                                {member.avatar}
                                            </div>
                                            <span className="text-sm text-gray-300">{member.name}</span>
                                        </div>
                                        <span className={`text-sm font-medium ${isOver ? 'text-red-400' : 'text-cyan-400'}`}>
                                            {total}%
                                        </span>
                                    </div>
                                    <div className="h-2 bg-white/10 rounded-full overflow-hidden">
                                        <div 
                                            className={`h-full rounded-full transition-all duration-500 ${isOver ? 'overallocated' : 'progress-bar'}`}
                                            style={{ width: `${Math.min(percentage, 100)}%` }}
                                        ></div>
                                        {isOver && (
                                            <div 
                                                className="h-full -mt-2 rounded-full overallocated opacity-50"
                                                style={{ width: `${percentage - 100}%`, marginLeft: '100%', transform: 'translateX(-100%)' }}
                                            ></div>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // Allocation Modal Component
        const AllocationModal = ({ isOpen, onClose, member, opportunity, allocation, onSave, onDelete }) => {
            const [percentage, setPercentage] = useState(allocation?.percentage || 25);
            const [role, setRole] = useState(allocation?.role || '');

            useEffect(() => {
                setPercentage(allocation?.percentage || 25);
                setRole(allocation?.role || '');
            }, [allocation]);

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50">
                    <div className="glass-card p-6 w-full max-w-md cyan-glow">
                        <div className="flex items-center justify-between mb-6">
                            <h3 className="text-lg font-semibold text-white">
                                {allocation ? 'Edit Allocation' : 'Add Allocation'}
                            </h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-white">
                                <i className="fas fa-times"></i>
                            </button>
                        </div>

                        <div className="space-y-4">
                            <div className="flex items-center space-x-4 p-3 rounded-lg bg-white/5">
                                <div className="w-10 h-10 rounded-full bg-gradient-to-br from-cyan-400 to-blue-500 flex items-center justify-center font-bold">
                                    {member?.avatar}
                                </div>
                                <div>
                                    <p className="font-medium text-white">{member?.name}</p>
                                    <p className="text-sm text-gray-400">{member?.role}</p>
                                </div>
                            </div>

                            <div className="flex items-center space-x-4 p-3 rounded-lg bg-white/5">
                                <div className="w-10 h-10 rounded-lg flex items-center justify-center" style={{ background: `${opportunity?.color}30` }}>
                                    <i className="fas fa-briefcase" style={{ color: opportunity?.color }}></i>
                                </div>
                                <div>
                                    <p className="font-medium text-white">{opportunity?.title}</p>
                                    <p className="text-sm text-gray-400">{opportunity?.status}</p>
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm text-gray-400 mb-2">Role on Opportunity</label>
                                <input
                                    type="text"
                                    value={role}
                                    onChange={(e) => setRole(e.target.value)}
                                    placeholder="e.g., Capture Lead, Technical SME"
                                    className="w-full px-4 py-2 rounded-lg bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:border-cyan-500 focus:outline-none"
                                />
                            </div>

                            <div>
                                <label className="block text-sm text-gray-400 mb-2">Allocation: {percentage}%</label>
                                <input
                                    type="range"
                                    min="5"
                                    max="100"
                                    step="5"
                                    value={percentage}
                                    onChange={(e) => setPercentage(parseInt(e.target.value))}
                                    className="w-full accent-cyan-400"
                                />
                                <div className="flex justify-between text-xs text-gray-500 mt-1">
                                    <span>5%</span>
                                    <span>50%</span>
                                    <span>100%</span>
                                </div>
                            </div>

                            <div className="flex items-center justify-between pt-4">
                                {allocation && (
                                    <button
                                        onClick={() => onDelete(allocation)}
                                        className="px-4 py-2 rounded-lg bg-red-500/20 text-red-400 hover:bg-red-500/30 transition"
                                    >
                                        <i className="fas fa-trash mr-2"></i>Remove
                                    </button>
                                )}
                                <div className={`flex space-x-3 ${!allocation ? 'ml-auto' : ''}`}>
                                    <button
                                        onClick={onClose}
                                        className="px-4 py-2 rounded-lg bg-white/5 text-gray-300 hover:bg-white/10 transition"
                                    >
                                        Cancel
                                    </button>
                                    <button
                                        onClick={() => onSave({ memberId: member.id, oppId: opportunity.id, percentage, role })}
                                        className="btn-primary px-4 py-2 rounded-lg transition"
                                    >
                                        <i className="fas fa-check mr-2"></i>Save
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Conflicts Alert Component
        const ConflictsAlert = ({ members, allocations }) => {
            const overallocated = members.filter(m => {
                const total = allocations.filter(a => a.memberId === m.id).reduce((sum, a) => sum + a.percentage, 0);
                return total > 100;
            });

            if (overallocated.length === 0) return null;

            return (
                <div className="glass-card p-4 border-red-500/30 bg-red-500/5 mb-6">
                    <div className="flex items-start space-x-3">
                        <div className="w-10 h-10 rounded-lg bg-red-500/20 flex items-center justify-center flex-shrink-0">
                            <i className="fas fa-exclamation-triangle text-red-400"></i>
                        </div>
                        <div>
                            <h4 className="font-medium text-red-400">Resource Conflicts Detected</h4>
                            <p className="text-sm text-gray-400 mt-1">
                                {overallocated.length} team member{overallocated.length > 1 ? 's are' : ' is'} overallocated:
                                {' '}{overallocated.map(m => m.name).join(', ')}
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        // Main App Component
        const ResourceAllocationApp = () => {
            const [members] = useState(demoTeamMembers);
            const [opportunities] = useState(demoOpportunities);
            const [allocations, setAllocations] = useState(demoAllocations);
            const [modalOpen, setModalOpen] = useState(false);
            const [selectedMember, setSelectedMember] = useState(null);
            const [selectedOpp, setSelectedOpp] = useState(null);
            const [selectedAllocation, setSelectedAllocation] = useState(null);
            const [view, setView] = useState('matrix'); // matrix, timeline

            // Stats calculations
            const stats = useMemo(() => {
                const totalAllocated = allocations.reduce((sum, a) => sum + a.percentage, 0);
                const totalCapacity = members.reduce((sum, m) => sum + 100, 0); // 100% per member
                const utilization = Math.round((totalAllocated / totalCapacity) * 100);
                const overallocated = members.filter(m => {
                    const total = allocations.filter(a => a.memberId === m.id).reduce((sum, a) => sum + a.percentage, 0);
                    return total > 100;
                }).length;
                const available = members.filter(m => {
                    const total = allocations.filter(a => a.memberId === m.id).reduce((sum, a) => sum + a.percentage, 0);
                    return total < 100;
                }).length;

                return { utilization, overallocated, available, totalFTE: (totalAllocated / 100).toFixed(1) };
            }, [allocations, members]);

            const handleCellClick = (member, opportunity, allocation) => {
                setSelectedMember(member);
                setSelectedOpp(opportunity);
                setSelectedAllocation(allocation);
                setModalOpen(true);
            };

            const handleSave = (newAllocation) => {
                setAllocations(prev => {
                    const existing = prev.findIndex(a => a.memberId === newAllocation.memberId && a.oppId === newAllocation.oppId);
                    if (existing >= 0) {
                        const updated = [...prev];
                        updated[existing] = newAllocation;
                        return updated;
                    }
                    return [...prev, newAllocation];
                });
                setModalOpen(false);
            };

            const handleDelete = (allocation) => {
                setAllocations(prev => prev.filter(a => !(a.memberId === allocation.memberId && a.oppId === allocation.oppId)));
                setModalOpen(false);
            };

            return (
                <div className="min-h-screen p-6">
                    <Navigation currentUser={members[0]} />

                    {/* Header */}
                    <div className="flex items-center justify-between mb-6">
                        <div>
                            <h1 className="text-2xl font-bold text-white">Resource Allocation</h1>
                            <p className="text-gray-400">Manage team capacity across opportunities</p>
                        </div>
                        <div className="flex items-center space-x-3">
                            <div className="flex rounded-lg overflow-hidden border border-white/10">
                                <button
                                    onClick={() => setView('matrix')}
                                    className={`px-4 py-2 text-sm ${view === 'matrix' ? 'bg-cyan-500/20 text-cyan-400' : 'text-gray-400 hover:text-white'}`}
                                >
                                    <i className="fas fa-th mr-2"></i>Matrix
                                </button>
                                <button
                                    onClick={() => setView('timeline')}
                                    className={`px-4 py-2 text-sm ${view === 'timeline' ? 'bg-cyan-500/20 text-cyan-400' : 'text-gray-400 hover:text-white'}`}
                                >
                                    <i className="fas fa-calendar-alt mr-2"></i>Timeline
                                </button>
                            </div>
                            <button className="btn-primary px-4 py-2 rounded-lg transition">
                                <i className="fas fa-file-export mr-2"></i>Export
                            </button>
                        </div>
                    </div>

                    {/* Conflicts Alert */}
                    <ConflictsAlert members={members} allocations={allocations} />

                    {/* Stats */}
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                        <StatsCard icon="percentage" label="Team Utilization" value={`${stats.utilization}%`} subtext="Current workload" color="cyan" />
                        <StatsCard icon="users" label="Total FTEs Allocated" value={stats.totalFTE} subtext="Across all opportunities" color="blue" />
                        <StatsCard icon="user-check" label="Available Capacity" value={stats.available} subtext="Team members under 100%" color="green" />
                        <StatsCard icon="user-clock" label="Overallocated" value={stats.overallocated} subtext="Need rebalancing" color="red" />
                    </div>

                    {/* Main Content */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2">
                            <AllocationMatrix 
                                members={members}
                                opportunities={opportunities}
                                allocations={allocations}
                                onCellClick={handleCellClick}
                            />
                        </div>
                        <div>
                            <CapacityChart members={members} allocations={allocations} />
                        </div>
                    </div>

                    {/* Allocation Modal */}
                    <AllocationModal
                        isOpen={modalOpen}
                        onClose={() => setModalOpen(false)}
                        member={selectedMember}
                        opportunity={selectedOpp}
                        allocation={selectedAllocation}
                        onSave={handleSave}
                        onDelete={handleDelete}
                    />

                    {/* Footer */}
                    <footer className="mt-8 text-center text-gray-500 text-sm">
                        <p>MissionPulse v12 • Sprint 52 • Resource Allocation Dashboard</p>
                        <p className="mt-1">© 2025 Mission Meets Tech. All rights reserved.</p>
                    </footer>
                </div>
            );
        };

        ReactDOM.render(<ResourceAllocationApp />, document.getElementById('root'));
    </script>
</body>
</html>
