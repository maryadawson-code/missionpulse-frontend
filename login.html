<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Sign In</title>
  <meta name="description" content="Sign in to MissionPulse - AI-powered federal proposal management">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-glow { 
      0%, 100% { box-shadow: 0 0 20px rgba(0, 229, 250, 0.3); } 
      50% { box-shadow: 0 0 40px rgba(0, 229, 250, 0.5); } 
    }
    .glow-pulse { animation: pulse-glow 3s ease-in-out infinite; }
    @keyframes float { 
      0%, 100% { transform: translateY(0); } 
      50% { transform: translateY(-10px); } 
    }
    .float { animation: float 6s ease-in-out infinite; }
    .bg-grid {
      background-image: 
        linear-gradient(rgba(0, 229, 250, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 250, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen bg-grid">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    
    // Initialize Supabase client
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    function App() {
      const [mode, setMode] = React.useState('signin'); // signin, signup, forgot, verify
      const [email, setEmail] = React.useState('');
      const [password, setPassword] = React.useState('');
      const [confirmPassword, setConfirmPassword] = React.useState('');
      const [fullName, setFullName] = React.useState('');
      const [company, setCompany] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const [error, setError] = React.useState(null);
      const [message, setMessage] = React.useState(null);
      const [connectionStatus, setConnectionStatus] = React.useState('checking');

      // Check Supabase connection on load
      React.useEffect(() => {
        checkConnection();
        checkExistingSession();
      }, []);

      const checkConnection = async () => {
        try {
          const { data, error } = await sbClient.from('profiles').select('count').limit(1);
          if (error && error.code === '42P01') {
            // Table doesn't exist yet, but connection works
            setConnectionStatus('connected');
          } else if (error) {
            setConnectionStatus('error');
          } else {
            setConnectionStatus('connected');
          }
        } catch (e) {
          setConnectionStatus('offline');
        }
      };

      const checkExistingSession = async () => {
        try {
          const { data: { session } } = await sbClient.auth.getSession();
          if (session) {
            window.location.href = 'index.html';
          }
        } catch (e) {
          console.log('No existing session');
        }
      };

      const handleSignIn = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError(null);

        try {
          const { data, error } = await sbClient.auth.signInWithPassword({
            email,
            password
          });

          if (error) throw error;

          // Log audit event
          try {
            await sbClient.from('audit_logs').insert({
              user_id: data.user?.id,
              action: 'LOGIN',
              entity_type: 'auth',
              new_values: { email }
            });
          } catch (auditError) {
            console.log('Audit log skipped:', auditError);
          }

          window.location.href = 'index.html';
        } catch (err) {
          setError(err.message || 'Sign in failed. Please check your credentials.');
        }

        setLoading(false);
      };

      const handleSignUp = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError(null);

        if (password !== confirmPassword) {
          setError('Passwords do not match');
          setLoading(false);
          return;
        }

        if (password.length < 8) {
          setError('Password must be at least 8 characters');
          setLoading(false);
          return;
        }

        try {
          const { data, error } = await sbClient.auth.signUp({
            email,
            password,
            options: {
              data: {
                full_name: fullName,
                company: company
              }
            }
          });

          if (error) throw error;

          // Create profile
          if (data.user) {
            try {
              await sbClient.from('profiles').insert({
                id: data.user.id,
                email,
                full_name: fullName,
                company,
                role: 'Partner' // Default role
              });
            } catch (profileError) {
              console.log('Profile creation skipped:', profileError);
            }
          }

          setMode('verify');
          setMessage('Check your email for a verification link!');
        } catch (err) {
          setError(err.message || 'Sign up failed. Please try again.');
        }

        setLoading(false);
      };

      const handleForgotPassword = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError(null);

        try {
          const { error } = await sbClient.auth.resetPasswordForEmail(email, {
            redirectTo: `${window.location.origin}/reset-password.html`
          });

          if (error) throw error;

          setMessage('Password reset link sent to your email!');
        } catch (err) {
          setError(err.message || 'Failed to send reset email.');
        }

        setLoading(false);
      };

      const handleDemoAccess = () => {
        // Set demo session in localStorage
        localStorage.setItem('missionpulse_demo', JSON.stringify({
          user: {
            email: 'demo@missionpulse.io',
            role: 'CEO',
            name: 'Demo User'
          },
          expires: Date.now() + (24 * 60 * 60 * 1000) // 24 hours
        }));
        window.location.href = 'index.html';
      };

      return (
        <div className="min-h-screen flex">
          {/* Left Panel - Branding */}
          <div className="hidden lg:flex lg:w-1/2 flex-col justify-between p-12 relative overflow-hidden">
            {/* Decorative elements */}
            <div className="absolute top-20 left-20 w-64 h-64 bg-cyan-500/10 rounded-full blur-3xl float" />
            <div className="absolute bottom-20 right-20 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl" style={{ animationDelay: '2s' }} />
            
            {/* Logo */}
            <div className="relative z-10">
              <div className="flex items-center gap-4">
                <div className="w-14 h-14 rounded-xl bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center glow-pulse">
                  <span className="text-3xl">🛡️</span>
                </div>
                <div>
                  <h1 className="text-2xl font-bold text-cyan-400">MissionPulse</h1>
                  <p className="text-sm text-slate-400">by Mission Meets Tech</p>
                </div>
              </div>
            </div>

            {/* Hero Content */}
            <div className="relative z-10 max-w-md">
              <h2 className="text-4xl font-bold mb-6 leading-tight">
                Win More Federal <span className="text-cyan-400">Contracts</span>
              </h2>
              <p className="text-lg text-slate-400 mb-8">
                AI-powered proposal management that helps small businesses compete 
                against large primes with the Shipley methodology.
              </p>
              
              <div className="space-y-4">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-cyan-500/20 flex items-center justify-center">
                    <span>📊</span>
                  </div>
                  <div>
                    <div className="font-medium">Pipeline Management</div>
                    <div className="text-sm text-slate-400">Track opportunities through every gate</div>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-emerald-500/20 flex items-center justify-center">
                    <span>🤖</span>
                  </div>
                  <div>
                    <div className="font-medium">8 AI Agents</div>
                    <div className="text-sm text-slate-400">Strategy, pricing, compliance & more</div>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-purple-500/20 flex items-center justify-center">
                    <span>🔐</span>
                  </div>
                  <div>
                    <div className="font-medium">FedRAMP Ready</div>
                    <div className="text-sm text-slate-400">IL5 architecture, CUI compliant</div>
                  </div>
                </div>
              </div>
            </div>

            {/* Footer */}
            <div className="relative z-10 text-sm text-slate-500">
              <p>Mission. Technology. Transformation.</p>
            </div>
          </div>

          {/* Right Panel - Auth Form */}
          <div className="w-full lg:w-1/2 flex items-center justify-center p-8">
            <div className="w-full max-w-md">
              {/* Mobile Logo */}
              <div className="lg:hidden flex items-center gap-3 mb-8 justify-center">
                <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center">
                  <span className="text-2xl">🛡️</span>
                </div>
                <div>
                  <h1 className="text-xl font-bold text-cyan-400">MissionPulse</h1>
                </div>
              </div>

              {/* Connection Status */}
              <div className={`mb-6 px-3 py-2 rounded-lg text-sm flex items-center gap-2 ${
                connectionStatus === 'connected' 
                  ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20'
                  : connectionStatus === 'checking'
                    ? 'bg-amber-500/10 text-amber-400 border border-amber-500/20'
                    : 'bg-red-500/10 text-red-400 border border-red-500/20'
              }`}>
                <span className={`w-2 h-2 rounded-full ${
                  connectionStatus === 'connected' ? 'bg-emerald-400' :
                  connectionStatus === 'checking' ? 'bg-amber-400 animate-pulse' : 'bg-red-400'
                }`} />
                {connectionStatus === 'connected' && 'Connected to MissionPulse'}
                {connectionStatus === 'checking' && 'Connecting...'}
                {connectionStatus === 'offline' && 'Connection unavailable - Demo mode available'}
                {connectionStatus === 'error' && 'Database initializing - Demo mode available'}
              </div>

              {/* Form Card */}
              <div className="bg-slate-800/50 border border-slate-700 rounded-2xl p-8">
                <h2 className="text-2xl font-bold mb-2">
                  {mode === 'signin' && 'Welcome back'}
                  {mode === 'signup' && 'Create account'}
                  {mode === 'forgot' && 'Reset password'}
                  {mode === 'verify' && 'Check your email'}
                </h2>
                <p className="text-slate-400 mb-6">
                  {mode === 'signin' && 'Sign in to access your proposals'}
                  {mode === 'signup' && 'Start winning more contracts'}
                  {mode === 'forgot' && 'We\'ll send you a reset link'}
                  {mode === 'verify' && 'Click the link to verify your account'}
                </p>

                {/* Error/Message Display */}
                {error && (
                  <div className="mb-4 p-3 bg-red-500/20 border border-red-500/30 rounded-lg text-red-300 text-sm">
                    {error}
                  </div>
                )}
                {message && (
                  <div className="mb-4 p-3 bg-emerald-500/20 border border-emerald-500/30 rounded-lg text-emerald-300 text-sm">
                    {message}
                  </div>
                )}

                {/* Sign In Form */}
                {mode === 'signin' && (
                  <form onSubmit={handleSignIn} className="space-y-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Email</label>
                      <input
                        type="email"
                        value={email}
                        onChange={(e) => setEmail(e.target.value)}
                        required
                        className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-cyan-500 transition-colors"
                        placeholder="you@company.com"
                      />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Password</label>
                      <input
                        type="password"
                        value={password}
                        onChange={(e) => setPassword(e.target.value)}
                        required
                        className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-cyan-500 transition-colors"
                        placeholder="••••••••"
                      />
                    </div>
                    <div className="flex items-center justify-between text-sm">
                      <label className="flex items-center gap-2 text-slate-400">
                        <input type="checkbox" className="rounded border-slate-600 bg-slate-900" />
                        Remember me
                      </label>
                      <button
                        type="button"
                        onClick={() => { setMode('forgot'); setError(null); setMessage(null); }}
                        className="text-cyan-400 hover:underline"
                      >
                        Forgot password?
                      </button>
                    </div>
                    <button
                      type="submit"
                      disabled={loading}
                      className="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 rounded-lg font-medium transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                      {loading ? 'Signing in...' : 'Sign In'}
                    </button>
                  </form>
                )}

                {/* Sign Up Form */}
                {mode === 'signup' && (
                  <form onSubmit={handleSignUp} className="space-y-4">
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Full Name</label>
                        <input
                          type="text"
                          value={fullName}
                          onChange={(e) => setFullName(e.target.value)}
                          required
                          className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-cyan-500"
                          placeholder="Jane Doe"
                        />
                      </div>
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Company</label>
                        <input
                          type="text"
                          value={company}
                          onChange={(e) => setCompany(e.target.value)}
                          className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-cyan-500"
                          placeholder="Your Company"
                        />
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Work Email</label>
                      <input
                        type="email"
                        value={email}
                        onChange={(e) => setEmail(e.target.value)}
                        required
                        className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-cyan-500"
                        placeholder="you@company.com"
                      />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Password</label>
                      <input
                        type="password"
                        value={password}
                        onChange={(e) => setPassword(e.target.value)}
                        required
                        minLength={8}
                        className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-cyan-500"
                        placeholder="Min 8 characters"
                      />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Confirm Password</label>
                      <input
                        type="password"
                        value={confirmPassword}
                        onChange={(e) => setConfirmPassword(e.target.value)}
                        required
                        className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-cyan-500"
                        placeholder="••••••••"
                      />
                    </div>
                    <button
                      type="submit"
                      disabled={loading}
                      className="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 rounded-lg font-medium transition-all disabled:opacity-50"
                    >
                      {loading ? 'Creating account...' : 'Create Account'}
                    </button>
                  </form>
                )}

                {/* Forgot Password Form */}
                {mode === 'forgot' && (
                  <form onSubmit={handleForgotPassword} className="space-y-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Email</label>
                      <input
                        type="email"
                        value={email}
                        onChange={(e) => setEmail(e.target.value)}
                        required
                        className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-cyan-500"
                        placeholder="you@company.com"
                      />
                    </div>
                    <button
                      type="submit"
                      disabled={loading}
                      className="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 rounded-lg font-medium transition-all disabled:opacity-50"
                    >
                      {loading ? 'Sending...' : 'Send Reset Link'}
                    </button>
                  </form>
                )}

                {/* Verify Email Message */}
                {mode === 'verify' && (
                  <div className="text-center py-8">
                    <div className="text-6xl mb-4">📧</div>
                    <p className="text-slate-400">
                      We've sent a verification link to <strong className="text-white">{email}</strong>
                    </p>
                  </div>
                )}

                {/* Mode Switch Links */}
                <div className="mt-6 text-center text-sm">
                  {mode === 'signin' && (
                    <>
                      Don't have an account?{' '}
                      <button
                        onClick={() => { setMode('signup'); setError(null); setMessage(null); }}
                        className="text-cyan-400 hover:underline"
                      >
                        Sign up
                      </button>
                    </>
                  )}
                  {(mode === 'signup' || mode === 'forgot' || mode === 'verify') && (
                    <>
                      Already have an account?{' '}
                      <button
                        onClick={() => { setMode('signin'); setError(null); setMessage(null); }}
                        className="text-cyan-400 hover:underline"
                      >
                        Sign in
                      </button>
                    </>
                  )}
                </div>

                {/* Divider */}
                <div className="my-6 flex items-center gap-4">
                  <div className="flex-1 h-px bg-slate-700" />
                  <span className="text-sm text-slate-500">or</span>
                  <div className="flex-1 h-px bg-slate-700" />
                </div>

                {/* Demo Access */}
                <button
                  onClick={handleDemoAccess}
                  className="w-full py-3 bg-slate-700 hover:bg-slate-600 rounded-lg font-medium transition-colors text-sm"
                >
                  🎮 Try Demo Mode
                </button>

                {/* Request Access */}
                <a
                  href="missionpulse-request-access.html"
                  className="block text-center mt-4 text-sm text-slate-400 hover:text-cyan-400 transition-colors"
                >
                  Don't have access? Request an invitation →
                </a>
              </div>

              {/* Footer */}
              <div className="mt-8 text-center text-xs text-slate-500">
                <p>By signing in, you agree to our Terms of Service and Privacy Policy</p>
                <p className="mt-2">© 2026 Mission Meets Tech. All rights reserved.</p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
