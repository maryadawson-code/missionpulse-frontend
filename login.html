<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:linear-gradient(135deg,#00050F 0%,#001428 50%,#00050F 100%);color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .glass{background:rgba(15,23,42,0.85);backdrop-filter:blur(16px);border:1px solid rgba(0,229,250,0.1);border-radius:16px}
  </style>
</head>
<body>
  <div class="w-full max-w-md p-8">
    <div class="text-center mb-8">
      <div class="text-5xl mb-4">🎯</div>
      <h1 class="text-3xl font-bold text-white">MissionPulse</h1>
      <p class="text-slate-400 mt-2">Federal Proposal Management Platform</p>
    </div>
    
    <div class="glass p-8">
      <div id="login-form">
        <h2 class="text-xl font-semibold text-white mb-6">Sign In</h2>
        <div class="space-y-4">
          <div>
            <label class="block text-sm text-slate-400 mb-1">Email</label>
            <input type="email" id="email" placeholder="you@company.com" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:border-cyan-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-sm text-slate-400 mb-1">Password</label>
            <input type="password" id="password" placeholder="••••••••" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:border-cyan-500 focus:outline-none">
          </div>
          <div id="error" class="hidden text-red-400 text-sm p-3 bg-red-500/10 border border-red-500/30 rounded-lg"></div>
          <button onclick="signIn()" id="submit-btn" class="w-full py-3 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-lg font-semibold hover:opacity-90 transition-opacity">
            Sign In
          </button>
        </div>
        <div class="mt-6 text-center">
          <button onclick="showDemo()" class="text-cyan-400 hover:text-cyan-300 text-sm">
            Continue as Demo User →
          </button>
        </div>
      </div>
      
      <div id="loading" class="hidden text-center py-8">
        <div class="animate-spin w-8 h-8 border-2 border-cyan-500 border-t-transparent rounded-full mx-auto mb-4"></div>
        <p class="text-slate-400">Authenticating...</p>
      </div>
    </div>
    
    <div class="mt-6 text-center text-xs text-slate-500">
      <p>© 2026 Mission Meets Tech</p>
      <p class="mt-1">CMMC Level 2 Compliant</p>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // Check existing session
    supabase.auth.getSession().then(({data:{session}}) => {
      if (session) window.location.href = 'index.html';
    });

    async function signIn() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      const btn = document.getElementById('submit-btn');
      
      if (!email || !password) {
        errorEl.textContent = 'Please enter email and password';
        errorEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errorEl.classList.add('hidden');

      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        
        if (error) {
          errorEl.textContent = error.message;
          errorEl.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'Sign In';
          return;
        }

        // Success - redirect
        localStorage.setItem('mp_user', JSON.stringify({ email: data.user.email, role: 'CEO' }));
        window.location.href = 'index.html';
      } catch (e) {
        errorEl.textContent = 'Connection error. Try demo mode.';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    function showDemo() {
      localStorage.setItem('mp_user', JSON.stringify({ email: 'demo@mmt.com', role: 'CEO', demo: true }));
      window.location.href = 'index.html';
    }

    // Enter key support
    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') signIn();
    });
  </script>
</body>
</html>
