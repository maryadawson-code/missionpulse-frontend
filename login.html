<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Login</title>
  <link rel="icon" type="image/png" href="MMT_icon_32px.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .animate-pulse { animation: pulse 2s infinite; }
    .animate-float { animation: float 3s ease-in-out infinite; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.1); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
// ============================================================
// MISSIONPULSE LOGIN - SECURITY PATCHED
// Mission Meets Tech © 2026
// ============================================================

const { useState, useEffect } = React;

// ============================================================
// CONFIGURATION - CORRECTED SUPABASE URL
// ============================================================
const CONFIG = {
  SUPABASE_URL: 'https://qdrtpnpnhkxvfmvfziop.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc3NjQ4NjcsImV4cCI6MjA1MzM0MDg2N30.iqAJTDGEQsxMBSfnOCdnPFLgupmYvn4eUMW1Rwhv8Dg',
  DASHBOARD_URL: 'missionpulse-dashboard-hub.html',
  SESSION_KEY: 'MP_SESSION',
  USER_KEY: 'MP_USER',
  SESSION_TIMEOUT: 8 * 60 * 60 * 1000 // 8 hours
};

// Initialize Supabase
let supabase = null;
try {
  supabase = window.supabase?.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
} catch (e) {
  console.warn('Supabase init failed, demo mode only');
}

// ============================================================
// DEMO USERS (for offline/development)
// ============================================================
const DEMO_USERS = {
  'demo@missionmeetstech.com': { password: 'demo123', name: 'Demo User', role: 'CEO' },
  'ceo@missionmeetstech.com': { password: 'ceo123', name: 'Mary Womack', role: 'CEO' },
  'coo@missionmeetstech.com': { password: 'coo123', name: 'David Chen', role: 'COO' },
  'capture@missionmeetstech.com': { password: 'cap123', name: 'Michael Torres', role: 'CAP' },
  'pm@missionmeetstech.com': { password: 'pm123', name: 'Lisa Martinez', role: 'PM' },
  'admin@missionmeetstech.com': { password: 'admin123', name: 'System Admin', role: 'Admin' },
  'partner@external.com': { password: 'partner123', name: 'External Partner', role: 'Partner' }
};

// ============================================================
// ICONS
// ============================================================
const Icons = {
  shield: () => (
    <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} 
        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
    </svg>
  ),
  user: () => (
    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} 
        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
    </svg>
  ),
  lock: () => (
    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} 
        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
    </svg>
  ),
  eye: () => (
    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} 
        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} 
        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
    </svg>
  ),
  eyeOff: () => (
    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} 
        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
    </svg>
  ),
  spinner: () => (
    <svg className="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
      <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
      <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
  ),
  alert: () => (
    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} 
        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
    </svg>
  ),
  check: () => (
    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
    </svg>
  )
};

// ============================================================
// LOGIN FORM COMPONENT
// ============================================================
function LoginForm() {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [showPassword, setShowPassword] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [success, setSuccess] = useState('');
  const [connectionStatus, setConnectionStatus] = useState('checking');

  // Check Supabase connection on mount
  useEffect(() => {
    checkConnection();
  }, []);

  async function checkConnection() {
    if (!supabase) {
      setConnectionStatus('offline');
      return;
    }
    try {
      const { error } = await supabase.from('users').select('count').limit(1);
      setConnectionStatus(error ? 'offline' : 'online');
    } catch {
      setConnectionStatus('offline');
    }
  }

  // Handle login
  async function handleLogin(e) {
    e.preventDefault();
    setError('');
    setSuccess('');
    setLoading(true);

    try {
      // Check demo users first
      const demoUser = DEMO_USERS[email.toLowerCase()];
      if (demoUser && demoUser.password === password) {
        await setSession({
          email: email.toLowerCase(),
          name: demoUser.name,
          role: demoUser.role,
          isDemo: true
        });
        setSuccess('Login successful! Redirecting...');
        setTimeout(() => {
          window.location.href = CONFIG.DASHBOARD_URL;
        }, 1000);
        return;
      }

      // Try Supabase auth if available
      if (supabase && connectionStatus === 'online') {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password
        });

        if (error) throw error;

        // Get user profile
        const { data: profile } = await supabase
          .from('users')
          .select('*')
          .eq('email', email)
          .single();

        await setSession({
          email: data.user.email,
          name: profile?.name || data.user.email.split('@')[0],
          role: profile?.role || 'PM',
          isDemo: false
        });

        setSuccess('Login successful! Redirecting...');
        setTimeout(() => {
          window.location.href = CONFIG.DASHBOARD_URL;
        }, 1000);
      } else {
        throw new Error('Invalid credentials or server unavailable');
      }
    } catch (err) {
      setError(err.message || 'Login failed. Please check your credentials.');
    } finally {
      setLoading(false);
    }
  }

  // Set session in localStorage
  async function setSession(user) {
    const sessionData = {
      created: Date.now(),
      expires: Date.now() + CONFIG.SESSION_TIMEOUT,
      isDemo: user.isDemo
    };
    localStorage.setItem(CONFIG.SESSION_KEY, JSON.stringify(sessionData));
    localStorage.setItem(CONFIG.USER_KEY, JSON.stringify(user));
  }

  // Demo login shortcut
  function handleDemoLogin() {
    setEmail('demo@missionmeetstech.com');
    setPassword('demo123');
  }

  return (
    <div className="min-h-screen flex items-center justify-center p-4">
      {/* Background Effects */}
      <div className="fixed inset-0 overflow-hidden pointer-events-none">
        <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl animate-pulse"></div>
        <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-teal-500/10 rounded-full blur-3xl animate-pulse" style={{animationDelay: '1s'}}></div>
      </div>

      {/* Login Card */}
      <div className="glass rounded-2xl p-8 w-full max-w-md relative z-10">
        {/* Logo & Header */}
        <div className="text-center mb-8">
          <div className="w-16 h-16 mx-auto mb-4 rounded-xl bg-gradient-to-br from-cyan-500 to-teal-500 flex items-center justify-center animate-float">
            <Icons.shield />
          </div>
          <h1 className="text-2xl font-bold text-white mb-2">MissionPulse</h1>
          <p className="text-slate-400 text-sm">AI-Powered Proposal Management</p>
          
          {/* Connection Status */}
          <div className={`mt-3 inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs ${
            connectionStatus === 'online' ? 'bg-emerald-500/20 text-emerald-400' :
            connectionStatus === 'offline' ? 'bg-amber-500/20 text-amber-400' :
            'bg-slate-500/20 text-slate-400'
          }`}>
            <span className={`w-2 h-2 rounded-full ${
              connectionStatus === 'online' ? 'bg-emerald-400' :
              connectionStatus === 'offline' ? 'bg-amber-400' :
              'bg-slate-400 animate-pulse'
            }`}></span>
            {connectionStatus === 'online' ? 'Connected' : 
             connectionStatus === 'offline' ? 'Demo Mode' : 'Checking...'}
          </div>
        </div>

        {/* Login Form */}
        <form onSubmit={handleLogin} className="space-y-5">
          {/* Email Field */}
          <div>
            <label className="block text-sm font-medium text-slate-300 mb-2">Email</label>
            <div className="relative">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                <Icons.user />
              </span>
              <input
                type="email"
                value={email}
                onChange={(e) => setEmail(e.target.value)}
                className="w-full pl-10 pr-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition"
                placeholder="you@company.com"
                required
              />
            </div>
          </div>

          {/* Password Field */}
          <div>
            <label className="block text-sm font-medium text-slate-300 mb-2">Password</label>
            <div className="relative">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                <Icons.lock />
              </span>
              <input
                type={showPassword ? 'text' : 'password'}
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                className="w-full pl-10 pr-12 py-3 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition"
                placeholder="••••••••"
                required
              />
              <button
                type="button"
                onClick={() => setShowPassword(!showPassword)}
                className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition"
              >
                {showPassword ? <Icons.eyeOff /> : <Icons.eye />}
              </button>
            </div>
          </div>

          {/* Error Message */}
          {error && (
            <div className="flex items-center gap-2 p-3 bg-red-500/20 border border-red-500/30 rounded-lg text-red-400 text-sm">
              <Icons.alert />
              <span>{error}</span>
            </div>
          )}

          {/* Success Message */}
          {success && (
            <div className="flex items-center gap-2 p-3 bg-emerald-500/20 border border-emerald-500/30 rounded-lg text-emerald-400 text-sm">
              <Icons.check />
              <span>{success}</span>
            </div>
          )}

          {/* Login Button */}
          <button
            type="submit"
            disabled={loading}
            className="w-full py-3 bg-gradient-to-r from-cyan-500 to-teal-500 text-white font-semibold rounded-xl hover:opacity-90 transition disabled:opacity-50 flex items-center justify-center gap-2"
          >
            {loading ? (
              <>
                <Icons.spinner />
                <span>Signing In...</span>
              </>
            ) : (
              <span>Sign In</span>
            )}
          </button>

          {/* Demo Mode */}
          <div className="text-center">
            <button
              type="button"
              onClick={handleDemoLogin}
              className="text-cyan-400 text-sm hover:underline"
            >
              Use Demo Account
            </button>
          </div>
        </form>

        {/* Footer */}
        <div className="mt-8 pt-6 border-t border-slate-700/50 text-center">
          <p className="text-xs text-slate-500">
            Mission Meets Tech © 2026
          </p>
          <p className="text-xs text-slate-600 mt-1">
            Mission. Technology. Transformation.
          </p>
        </div>
      </div>

      {/* Security Notice */}
      <div className="fixed bottom-4 left-1/2 -translate-x-1/2 text-xs text-slate-600">
        <span className="text-amber-500">⚠</span> AI GENERATED - REQUIRES HUMAN REVIEW
      </div>
    </div>
  );
}

// Render
ReactDOM.createRoot(document.getElementById('root')).render(<LoginForm />);
  </script>
</body>
</html>
