<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | MissionPulse</title>
  <link rel="icon" type="image/png" href="MMT_icon_32px.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .animate-float { animation: float 6s ease-in-out infinite; }
    .animate-pulse-slow { animation: pulse 3s ease-in-out infinite; }
    .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(0, 229, 250, 0.1); }
    .glow { box-shadow: 0 0 40px rgba(0, 229, 250, 0.15); }
    .input-glow:focus { box-shadow: 0 0 0 2px rgba(0, 229, 250, 0.3); }
    .btn-primary { background: linear-gradient(135deg, #00E5FA 0%, #00B8D4 100%); }
    .btn-primary:hover { background: linear-gradient(135deg, #00D4E8 0%, #00A7C3 100%); }
    .grid-bg {
      background-image: 
        linear-gradient(rgba(0, 229, 250, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 250, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }
  </style>
</head>
<body class="grid-bg">
  <div id="app" class="min-h-screen flex items-center justify-center p-4">
    <!-- Loading State -->
    <div id="loading" class="text-center">
      <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-cyan-500 to-teal-500 flex items-center justify-center animate-pulse-slow glow">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
        </svg>
      </div>
      <p class="text-slate-400">Initializing secure session...</p>
    </div>
    
    <!-- Login Form (hidden initially) -->
    <div id="login-card" class="hidden w-full max-w-md">
      <div class="text-center mb-8">
        <div class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-cyan-500 to-teal-500 flex items-center justify-center glow animate-float">
          <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
          </svg>
        </div>
        <h1 class="text-3xl font-bold text-white mb-2">MissionPulse</h1>
        <p class="text-slate-400">Mission. Technology. Transformation.</p>
      </div>
      
      <div class="glass rounded-2xl p-8 glow">
        <h2 class="text-xl font-semibold text-white mb-6">Sign in to continue</h2>
        
        <!-- Error Message -->
        <div id="error-msg" class="hidden mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm"></div>
        
        <!-- Success Message -->
        <div id="success-msg" class="hidden mb-4 p-3 rounded-lg bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-sm"></div>
        
        <form id="login-form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-400 mb-2">Email Address</label>
            <input 
              type="email" 
              id="email" 
              required
              placeholder="you@company.com"
              class="w-full px-4 py-3 rounded-xl bg-slate-800/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 input-glow transition-all"
            >
          </div>
          
          <div>
            <label class="block text-sm font-medium text-slate-400 mb-2">Password</label>
            <input 
              type="password" 
              id="password" 
              required
              placeholder="••••••••"
              class="w-full px-4 py-3 rounded-xl bg-slate-800/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 input-glow transition-all"
            >
          </div>
          
          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2 text-slate-400 cursor-pointer">
              <input type="checkbox" id="remember" class="w-4 h-4 rounded border-slate-700 bg-slate-800 text-cyan-500 focus:ring-cyan-500">
              <span>Remember me</span>
            </label>
            <a href="#" id="forgot-link" class="text-cyan-400 hover:text-cyan-300 transition-colors">Forgot password?</a>
          </div>
          
          <button 
            type="submit" 
            id="login-btn"
            class="w-full py-3 px-4 rounded-xl btn-primary text-slate-900 font-semibold hover:shadow-lg hover:shadow-cyan-500/25 transition-all flex items-center justify-center gap-2"
          >
            <span>Sign In</span>
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
            </svg>
          </button>
        </form>
        
        <!-- Divider -->
        <div class="flex items-center gap-4 my-6">
          <div class="flex-1 h-px bg-slate-700"></div>
          <span class="text-xs text-slate-500 uppercase">or</span>
          <div class="flex-1 h-px bg-slate-700"></div>
        </div>
        
        <!-- Demo Access -->
        <button 
          id="demo-btn"
          class="w-full py-3 px-4 rounded-xl bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white font-medium transition-all flex items-center justify-center gap-2"
        >
          <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span>Continue as Demo User</span>
        </button>
        
        <!-- Magic Link Section -->
        <div id="magic-link-section" class="hidden mt-6 pt-6 border-t border-slate-700">
          <p class="text-sm text-slate-400 mb-3">Check your email for a magic link to sign in.</p>
          <button id="resend-link" class="text-sm text-cyan-400 hover:text-cyan-300 transition-colors">
            Resend magic link
          </button>
        </div>
      </div>
      
      <!-- Footer -->
      <div class="mt-8 text-center">
        <p class="text-xs text-slate-600">
          © 2026 Mission Meets Tech. All rights reserved.
        </p>
        <div class="flex items-center justify-center gap-4 mt-2 text-xs text-slate-600">
          <span class="flex items-center gap-1">
            <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
            CMMC 2.0 Compliant
          </span>
          <span>•</span>
          <span>FedRAMP Ready</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // SUPABASE CONFIGURATION
    // Using var to avoid conflicts with supabase-client.js
    // ============================================================
    var SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc4MjMwMjgsImV4cCI6MjA1MzM5OTAyOH0.S0LKvPzVIfBsLv-2qjXRdMGhnYyRLvOFlo9ihaQuqHE';
    
    var sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============================================================
    // DOM ELEMENTS
    // ============================================================
    const loadingEl = document.getElementById('loading');
    const loginCard = document.getElementById('login-card');
    const loginForm = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const demoBtn = document.getElementById('demo-btn');
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    const forgotLink = document.getElementById('forgot-link');
    const magicLinkSection = document.getElementById('magic-link-section');

    // ============================================================
    // INITIALIZATION
    // ============================================================
    async function init() {
      try {
        // Check for existing session
        const { data: { session }, error } = await sbClient.auth.getSession();
        
        if (session?.user) {
          // Already logged in - redirect to home
          window.location.href = 'missionpulse-production-home.html';
          return;
        }
      } catch (err) {
        console.log('Session check:', err.message);
      }
      
      // Show login form
      loadingEl.classList.add('hidden');
      loginCard.classList.remove('hidden');
    }

    // ============================================================
    // AUTH FUNCTIONS
    // ============================================================
    async function handleLogin(e) {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      
      if (!email || !password) {
        showError('Please enter both email and password.');
        return;
      }
      
      // Show loading state
      loginBtn.disabled = true;
      loginBtn.innerHTML = `
        <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>Signing in...</span>
      `;
      
      hideMessages();
      
      try {
        const { data, error } = await sbClient.auth.signInWithPassword({
          email,
          password
        });
        
        if (error) throw error;
        
        if (data.session) {
          showSuccess('Success! Redirecting...');
          setTimeout(() => {
            window.location.href = 'missionpulse-production-home.html';
          }, 500);
        }
      } catch (err) {
        console.error('Login error:', err);
        showError(err.message || 'Invalid email or password. Please try again.');
        resetButton();
      }
    }

    async function handleMagicLink() {
      const email = emailInput.value.trim();
      
      if (!email) {
        showError('Please enter your email address.');
        return;
      }
      
      hideMessages();
      
      try {
        const { error } = await sbClient.auth.signInWithOtp({
          email,
          options: {
            emailRedirectTo: window.location.origin + '/missionpulse-production-home.html'
          }
        });
        
        if (error) throw error;
        
        showSuccess('Magic link sent! Check your email.');
        magicLinkSection.classList.remove('hidden');
      } catch (err) {
        showError(err.message || 'Failed to send magic link.');
      }
    }

    function handleDemoAccess() {
      // Set demo flag in localStorage and redirect
      localStorage.setItem('missionpulse_demo', 'true');
      window.location.href = 'missionpulse-production-home.html';
    }

    // ============================================================
    // UI HELPERS
    // ============================================================
    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.remove('hidden');
      successMsg.classList.add('hidden');
    }

    function showSuccess(msg) {
      successMsg.textContent = msg;
      successMsg.classList.remove('hidden');
      errorMsg.classList.add('hidden');
    }

    function hideMessages() {
      errorMsg.classList.add('hidden');
      successMsg.classList.add('hidden');
    }

    function resetButton() {
      loginBtn.disabled = false;
      loginBtn.innerHTML = `
        <span>Sign In</span>
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
        </svg>
      `;
    }

    // ============================================================
    // EVENT LISTENERS
    // ============================================================
    loginForm.addEventListener('submit', handleLogin);
    demoBtn.addEventListener('click', handleDemoAccess);
    forgotLink.addEventListener('click', (e) => {
      e.preventDefault();
      handleMagicLink();
    });

    // Initialize on load
    init();
  </script>
</body>
</html>
