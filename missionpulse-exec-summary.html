<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Summary Generator | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.15); }
        .section-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); }
        .section-card:focus-within { border-color: rgba(0,229,250,0.5); }
    </style>
</head>
<body class="min-h-screen text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const supabaseUrl = 'https://djuviwarqdvlbgcfuupa.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc0OTc5MzMsImV4cCI6MjA1MzA3MzkzM30.pBPpVaJmVkzhCcUvJPN2KnMGnstuc55sNv8CVsERRPg';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const DEMO_SUMMARIES = [
            {
                id: '1',
                title: 'DHA MHS Genesis AI Integration',
                version: 3,
                status: 'approved',
                target_word_count: 500,
                opening_hook: 'The Military Health System serves 9.6 million beneficiaries who deserve world-class healthcare powered by cutting-edge technology.',
                understanding_statement: 'DHA requires an AI integration partner who understands the unique challenges of military healthcare: strict security requirements, complex data ecosystems, and the critical nature of patient care decisions.',
                solution_overview: 'Mission Meets Tech delivers MissionPulse, a FedRAMP Moderate certified AI orchestration platform that seamlessly connects AskSage capabilities with your existing MHS Genesis infrastructure.',
                key_differentiators: 'Unlike generic AI implementations, our solution was purpose-built for federal healthcare. We bring pre-configured HIPAA-compliant workflows, battle-tested DHA integrations, and a team with 50+ years of combined military health IT experience.',
                proof_points: 'Our track record speaks for itself: 3 successful DHA deployments, zero security incidents, and a 60% reduction in clinician administrative burden at our pilot sites.',
                value_proposition: 'By selecting MMT, DHA gains not just a vendor but a mission-aligned partner committed to improving healthcare outcomes for those who serve our nation.',
                closing_statement: 'We are ready to deploy within 30 days of award and deliver measurable value within 90 days. Mission Meets Tech: Where Mission Meets Technology Meets Transformation.',
                win_themes_used: ['Mission-Ready AI', 'Healthcare Domain Mastery', 'Agile Delivery'],
                compliance_score: 95,
                readability_score: 72
            }
        ];

        const SECTIONS = [
            { key: 'opening_hook', label: 'Opening Hook', description: 'Compelling opening that grabs attention', icon: '🎯', placeholder: 'Start with a powerful statement about the mission or challenge...' },
            { key: 'understanding_statement', label: 'Understanding of Need', description: 'Demonstrate you understand their challenge', icon: '🧠', placeholder: 'Show deep understanding of the customer\'s requirements and pain points...' },
            { key: 'solution_overview', label: 'Solution Overview', description: 'High-level description of your approach', icon: '💡', placeholder: 'Briefly describe your solution and how it addresses their needs...' },
            { key: 'key_differentiators', label: 'Key Differentiators', description: 'What makes you uniquely qualified', icon: '⭐', placeholder: 'Highlight what sets you apart from competitors...' },
            { key: 'proof_points', label: 'Proof Points', description: 'Evidence of past success', icon: '✅', placeholder: 'Provide concrete evidence: metrics, past performance, certifications...' },
            { key: 'value_proposition', label: 'Value Proposition', description: 'The benefit to the customer', icon: '💎', placeholder: 'Articulate the value and benefits the customer will receive...' },
            { key: 'closing_statement', label: 'Closing Statement', description: 'Strong call to action', icon: '🚀', placeholder: 'End with a memorable, action-oriented statement...' }
        ];

        function ExecSummaryGenerator() {
            const [summaries, setSummaries] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedSummary, setSelectedSummary] = useState(null);
            const [editMode, setEditMode] = useState(false);
            const [showNewModal, setShowNewModal] = useState(false);
            const [newSummary, setNewSummary] = useState({ title: '', target_word_count: 500 });

            useEffect(() => { fetchSummaries(); }, []);

            async function fetchSummaries() {
                try {
                    const { data, error } = await supabase.from('executive_summaries').select('*').order('updated_at', { ascending: false });
                    if (error) throw error;
                    setSummaries(data?.length > 0 ? data : DEMO_SUMMARIES);
                    if (!data?.length) setSelectedSummary(DEMO_SUMMARIES[0]);
                } catch (err) {
                    console.log('Using demo data:', err.message);
                    setSummaries(DEMO_SUMMARIES);
                    setSelectedSummary(DEMO_SUMMARIES[0]);
                }
                setLoading(false);
            }

            function handleCreate() {
                const summary = {
                    id: Date.now().toString(),
                    ...newSummary,
                    version: 1,
                    status: 'draft',
                    opening_hook: '',
                    understanding_statement: '',
                    solution_overview: '',
                    key_differentiators: '',
                    proof_points: '',
                    value_proposition: '',
                    closing_statement: '',
                    win_themes_used: [],
                    compliance_score: 0,
                    readability_score: 0
                };
                setSummaries([summary, ...summaries]);
                setSelectedSummary(summary);
                setEditMode(true);
                setShowNewModal(false);
                setNewSummary({ title: '', target_word_count: 500 });
            }

            function handleSectionChange(key, value) {
                if (!selectedSummary) return;
                const updated = { ...selectedSummary, [key]: value };
                setSelectedSummary(updated);
                setSummaries(summaries.map(s => s.id === updated.id ? updated : s));
            }

            function calculateWordCount() {
                if (!selectedSummary) return 0;
                const text = SECTIONS.map(s => selectedSummary[s.key] || '').join(' ');
                return text.trim().split(/\s+/).filter(Boolean).length;
            }

            function handleStatusChange(status) {
                if (!selectedSummary) return;
                const updated = { ...selectedSummary, status, version: status === 'approved' ? selectedSummary.version + 1 : selectedSummary.version };
                setSelectedSummary(updated);
                setSummaries(summaries.map(s => s.id === updated.id ? updated : s));
            }

            function generatePreview() {
                if (!selectedSummary) return '';
                return SECTIONS.map(s => selectedSummary[s.key]).filter(Boolean).join('\n\n');
            }

            const wordCount = calculateWordCount();
            const wordCountPercent = Math.min(100, (wordCount / (selectedSummary?.target_word_count || 500)) * 100);

            const statusColor = (status) => ({
                'draft': 'bg-gray-500/20 text-gray-400',
                'review': 'bg-amber-500/20 text-amber-400',
                'approved': 'bg-emerald-500/20 text-emerald-400'
            }[status] || 'bg-gray-500/20 text-gray-400');

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="border-b border-cyan-500/20 bg-black/40 backdrop-blur-xl sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <a href="index.html" className="text-cyan-400 hover:text-cyan-300">← Back</a>
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-rose-400 to-pink-600 flex items-center justify-center text-xl">📝</div>
                                    <div>
                                        <h1 className="text-xl font-bold">Executive Summary Generator</h1>
                                        <p className="text-xs text-gray-400">Craft Compelling Summaries • Win More Proposals</p>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                {selectedSummary && (
                                    <button onClick={() => setEditMode(!editMode)} className={`px-4 py-2 rounded-lg font-medium transition-all ${editMode ? 'bg-amber-500/20 text-amber-400' : 'bg-white/10 text-gray-300'}`}>
                                        {editMode ? '👁️ Preview' : '✏️ Edit'}
                                    </button>
                                )}
                                <button onClick={() => setShowNewModal(true)} className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium transition-all">
                                    + New Summary
                                </button>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto px-6 py-8">
                        <div className="grid lg:grid-cols-4 gap-6">
                            {/* Summaries List */}
                            <div className="lg:col-span-1">
                                <h2 className="text-lg font-semibold mb-4">Summaries</h2>
                                <div className="space-y-3">
                                    {summaries.map(summary => (
                                        <div key={summary.id}
                                            onClick={() => { setSelectedSummary(summary); setEditMode(false); }}
                                            className={`glass-card rounded-xl p-4 cursor-pointer transition-all ${selectedSummary?.id === summary.id ? 'border-cyan-500/50 bg-cyan-500/10' : 'hover:border-cyan-500/30'}`}>
                                            <h3 className="font-medium truncate">{summary.title}</h3>
                                            <div className="flex items-center justify-between mt-2">
                                                <span className={`px-2 py-0.5 rounded text-xs ${statusColor(summary.status)}`}>
                                                    {summary.status} v{summary.version}
                                                </span>
                                                <span className="text-xs text-gray-500">{summary.target_word_count} words</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Editor/Preview */}
                            <div className="lg:col-span-3">
                                {selectedSummary ? (
                                    <div className="glass-card rounded-xl p-6">
                                        <div className="flex items-start justify-between mb-6">
                                            <div>
                                                <h2 className="text-xl font-bold">{selectedSummary.title}</h2>
                                                <div className="flex items-center gap-3 mt-1">
                                                    <span className={`px-2 py-0.5 rounded text-xs ${statusColor(selectedSummary.status)}`}>
                                                        {selectedSummary.status}
                                                    </span>
                                                    <span className="text-sm text-gray-400">Version {selectedSummary.version}</span>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                {selectedSummary.status === 'draft' && (
                                                    <button onClick={() => handleStatusChange('review')} className="px-3 py-1 bg-amber-500/20 text-amber-400 rounded text-sm">
                                                        Submit for Review
                                                    </button>
                                                )}
                                                {selectedSummary.status === 'review' && (
                                                    <button onClick={() => handleStatusChange('approved')} className="px-3 py-1 bg-emerald-500/20 text-emerald-400 rounded text-sm">
                                                        ✓ Approve
                                                    </button>
                                                )}
                                            </div>
                                        </div>

                                        {/* Word Count Progress */}
                                        <div className="mb-6 p-4 bg-white/5 rounded-lg">
                                            <div className="flex items-center justify-between mb-2">
                                                <span className="text-sm text-gray-400">Word Count Progress</span>
                                                <span className={`text-sm font-medium ${wordCount > selectedSummary.target_word_count ? 'text-red-400' : 'text-cyan-400'}`}>
                                                    {wordCount} / {selectedSummary.target_word_count} words
                                                </span>
                                            </div>
                                            <div className="h-2 bg-white/10 rounded-full overflow-hidden">
                                                <div className={`h-full transition-all ${wordCount > selectedSummary.target_word_count ? 'bg-red-500' : 'bg-cyan-500'}`}
                                                    style={{ width: `${wordCountPercent}%` }}></div>
                                            </div>
                                        </div>

                                        {editMode ? (
                                            /* Edit Mode */
                                            <div className="space-y-4">
                                                {SECTIONS.map(section => (
                                                    <div key={section.key} className="section-card rounded-lg p-4">
                                                        <div className="flex items-center gap-2 mb-2">
                                                            <span className="text-xl">{section.icon}</span>
                                                            <div>
                                                                <h3 className="font-medium">{section.label}</h3>
                                                                <p className="text-xs text-gray-500">{section.description}</p>
                                                            </div>
                                                        </div>
                                                        <textarea
                                                            value={selectedSummary[section.key] || ''}
                                                            onChange={(e) => handleSectionChange(section.key, e.target.value)}
                                                            placeholder={section.placeholder}
                                                            rows={3}
                                                            className="w-full bg-transparent border-0 resize-none focus:outline-none text-sm leading-relaxed"
                                                        />
                                                        <div className="text-right text-xs text-gray-500 mt-1">
                                                            {(selectedSummary[section.key] || '').trim().split(/\s+/).filter(Boolean).length} words
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        ) : (
                                            /* Preview Mode */
                                            <div className="prose prose-invert max-w-none">
                                                <div className="bg-white/5 rounded-lg p-6 space-y-4">
                                                    {SECTIONS.map(section => (
                                                        selectedSummary[section.key] && (
                                                            <p key={section.key} className="text-gray-200 leading-relaxed">
                                                                {selectedSummary[section.key]}
                                                            </p>
                                                        )
                                                    ))}
                                                </div>

                                                {/* Win Themes Used */}
                                                {selectedSummary.win_themes_used?.length > 0 && (
                                                    <div className="mt-6 pt-4 border-t border-white/10">
                                                        <h4 className="text-sm font-semibold mb-2">Win Themes Incorporated</h4>
                                                        <div className="flex flex-wrap gap-2">
                                                            {selectedSummary.win_themes_used.map((theme, i) => (
                                                                <span key={i} className="px-3 py-1 bg-cyan-500/20 text-cyan-400 rounded-full text-xs">
                                                                    {theme}
                                                                </span>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}

                                                {/* Scores */}
                                                <div className="mt-6 grid grid-cols-2 gap-4">
                                                    <div className="bg-white/5 rounded-lg p-4 text-center">
                                                        <div className="text-2xl font-bold text-emerald-400">{selectedSummary.compliance_score || 0}%</div>
                                                        <div className="text-xs text-gray-500">Compliance Score</div>
                                                    </div>
                                                    <div className="bg-white/5 rounded-lg p-4 text-center">
                                                        <div className="text-2xl font-bold text-cyan-400">{selectedSummary.readability_score || 0}</div>
                                                        <div className="text-xs text-gray-500">Readability (Flesch)</div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {/* Quick Actions */}
                                        <div className="flex gap-3 mt-6 pt-4 border-t border-white/10">
                                            <button className="px-4 py-2 bg-white/5 hover:bg-white/10 rounded-lg text-sm">
                                                🤖 AI Enhance
                                            </button>
                                            <button className="px-4 py-2 bg-white/5 hover:bg-white/10 rounded-lg text-sm">
                                                📋 Copy to Clipboard
                                            </button>
                                            <button className="px-4 py-2 bg-white/5 hover:bg-white/10 rounded-lg text-sm">
                                                📤 Export to Word
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="glass-card rounded-xl p-12 text-center">
                                        <div className="text-6xl mb-4">📝</div>
                                        <h3 className="text-xl font-semibold mb-2">Create Your First Executive Summary</h3>
                                        <p className="text-gray-400 mb-4">Craft compelling summaries that win proposals</p>
                                        <button onClick={() => setShowNewModal(true)} className="px-6 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium">
                                            + New Summary
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* New Summary Modal */}
                    {showNewModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                            <div className="glass-card rounded-2xl p-6 w-full max-w-md">
                                <h2 className="text-xl font-bold mb-6">New Executive Summary</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-1">Title *</label>
                                        <input type="text" value={newSummary.title} onChange={(e) => setNewSummary({...newSummary, title: e.target.value})}
                                            placeholder="e.g., DHA MHS Genesis AI Integration"
                                            className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                    </div>
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-1">Target Word Count</label>
                                        <input type="number" value={newSummary.target_word_count} onChange={(e) => setNewSummary({...newSummary, target_word_count: parseInt(e.target.value) || 500})}
                                            className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 mt-6">
                                    <button onClick={() => setShowNewModal(false)} className="px-4 py-2 border border-white/20 rounded-lg hover:bg-white/5">Cancel</button>
                                    <button onClick={handleCreate} disabled={!newSummary.title}
                                        className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium disabled:opacity-50">Create</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<ExecSummaryGenerator />, document.getElementById('root'));
    </script>
</body>
</html>
