    // ========================================================================
    // DOCUMENT PARSERS
    // ========================================================================
    const DocumentParsers = {
      // PDF Parser using PDF.js
      async parsePDF(file) {
        try {
          const arrayBuffer = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
          let fullText = '';
          
          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            const pageText = textContent.items.map(item => item.str).join(' ');
            fullText += `\n--- Page ${i} ---\n${pageText}`;
          }
          
          return {
            success: true,
            text: fullText.trim(),
            pages: pdf.numPages,
            parser: 'pdf.js'
          };
        } catch (error) {
          console.error('PDF parsing error:', error);
          return { success: false, error: error.message, parser: 'pdf.js' };
        }
      },

      // DOCX Parser using mammoth.js
      async parseDOCX(file) {
        try {
          const arrayBuffer = await file.arrayBuffer();
          const result = await mammoth.extractRawText({ arrayBuffer });
          
          return {
            success: true,
            text: result.value,
            warnings: result.messages,
            parser: 'mammoth.js'
          };
        } catch (error) {
          console.error('DOCX parsing error:', error);
          return { success: false, error: error.message, parser: 'mammoth.js' };
        }
      },

      // XLSX/XLS Parser using SheetJS
      async parseXLSX(file) {
        try {
          const arrayBuffer = await file.arrayBuffer();
          const workbook = XLSX.read(arrayBuffer, { type: 'array' });
          let fullText = '';
          
          workbook.SheetNames.forEach(sheetName => {
            const worksheet = workbook.Sheets[sheetName];
            const csv = XLSX.utils.sheet_to_csv(worksheet);
            fullText += `\n--- Sheet: ${sheetName} ---\n${csv}`;
          });
          
          return {
            success: true,
            text: fullText.trim(),
            sheets: workbook.SheetNames.length,
            sheetNames: workbook.SheetNames,
            parser: 'SheetJS'
          };
        } catch (error) {
          console.error('XLSX parsing error:', error);
          return { success: false, error: error.message, parser: 'SheetJS' };
        }
      },

      // Plain Text Parser
      async parseTXT(file) {
        try {
          const text = await file.text();
          return {
            success: true,
            text: text,
            parser: 'native'
          };
        } catch (error) {
          console.error('TXT parsing error:', error);
          return { success: false, error: error.message, parser: 'native' };
        }
      },

      // CSV Parser using PapaParse
      async parseCSV(file) {
        try {
          const text = await file.text();
          const result = Papa.parse(text, { header: true });
          
          // Convert to readable format
          let formattedText = '';
          if (result.meta.fields) {
            formattedText += 'Columns: ' + result.meta.fields.join(', ') + '\n\n';
          }
          
          result.data.forEach((row, idx) => {
            formattedText += `Row ${idx + 1}: ${JSON.stringify(row)}\n`;
          });
          
          return {
            success: true,
            text: formattedText,
            rows: result.data.length,
            columns: result.meta.fields,
            parser: 'PapaParse'
          };
        } catch (error) {
          console.error('CSV parsing error:', error);
          return { success: false, error: error.message, parser: 'PapaParse' };
        }
      },

      // MSG Parser (Outlook) - Basic extraction
      async parseMSG(file) {
        try {
          // For MSG files, we'll extract what we can from the binary
          const arrayBuffer = await file.arrayBuffer();
          const bytes = new Uint8Array(arrayBuffer);
          
          // Try to extract readable text
          let text = '';
          let inText = false;
          let textBuffer = [];
          
          for (let i = 0; i < bytes.length; i++) {
            const byte = bytes[i];
            if (byte >= 32 && byte < 127) {
              textBuffer.push(String.fromCharCode(byte));
              inText = true;
            } else if (inText && textBuffer.length > 10) {
              text += textBuffer.join('') + '\n';
              textBuffer = [];
              inText = false;
            } else {
              textBuffer = [];
              inText = false;
            }
          }
          
          return {
            success: true,
            text: text || '[MSG file - binary content, use Outlook for full extraction]',
            parser: 'basic-binary',
            note: 'For full MSG parsing, server-side processing recommended'
          };
        } catch (error) {
          console.error('MSG parsing error:', error);
          return { success: false, error: error.message, parser: 'basic-binary' };
        }
      },

      // EML Parser - Text-based email
      async parseEML(file) {
        try {
          const text = await file.text();
          
          // Extract key email parts
          const headerEnd = text.indexOf('\r\n\r\n') || text.indexOf('\n\n');
          const headers = text.substring(0, headerEnd);
          const body = text.substring(headerEnd).trim();
          
          // Parse headers
          const subjectMatch = headers.match(/Subject:\s*(.+)/i);
          const fromMatch = headers.match(/From:\s*(.+)/i);
          const dateMatch = headers.match(/Date:\s*(.+)/i);
          
          let formattedText = '--- Email Header ---\n';
          if (fromMatch) formattedText += `From: ${fromMatch[1]}\n`;
          if (subjectMatch) formattedText += `Subject: ${subjectMatch[1]}\n`;
          if (dateMatch) formattedText += `Date: ${dateMatch[1]}\n`;
          formattedText += '\n--- Email Body ---\n' + body;
          
          return {
            success: true,
            text: formattedText,
            subject: subjectMatch ? subjectMatch[1] : null,
            from: fromMatch ? fromMatch[1] : null,
            parser: 'native-eml'
          };
        } catch (error) {
          console.error('EML parsing error:', error);
          return { success: false, error: error.message, parser: 'native-eml' };
        }
      },

      // ZIP Parser using JSZip
      async parseZIP(file) {
        try {
          const zip = await JSZip.loadAsync(file);
          let results = [];
          let combinedText = '';
          
          const fileEntries = Object.entries(zip.files);
          
          for (const [filename, zipEntry] of fileEntries) {
            if (zipEntry.dir) continue;
            
            const ext = filename.split('.').pop().toLowerCase();
            const supportedExt = ['pdf', 'docx', 'doc', 'xlsx', 'xls', 'txt', 'csv', 'eml'];
            
            if (supportedExt.includes(ext)) {
              const content = await zipEntry.async('blob');
              const nestedFile = new File([content], filename);
              
              // Determine parser based on extension
              let parseResult;
              switch (ext) {
                case 'pdf':
                  parseResult = await this.parsePDF(nestedFile);
                  break;
                case 'docx':
                case 'doc':
                  parseResult = await this.parseDOCX(nestedFile);
                  break;
                case 'xlsx':
                case 'xls':
                  parseResult = await this.parseXLSX(nestedFile);
                  break;
                case 'csv':
                  parseResult = await this.parseCSV(nestedFile);
                  break;
                case 'txt':
                  parseResult = await this.parseTXT(nestedFile);
                  break;
                case 'eml':
                  parseResult = await this.parseEML(nestedFile);
                  break;
                default:
                  parseResult = { success: false, error: 'Unsupported nested file type' };
              }
              
              if (parseResult.success) {
                combinedText += `\n\n=== FILE: ${filename} ===\n${parseResult.text}`;
                results.push({ filename, success: true });
              } else {
                results.push({ filename, success: false, error: parseResult.error });
              }
            }
          }
          
          return {
            success: true,
            text: combinedText.trim(),
            nestedFiles: results,
            totalFiles: fileEntries.length,
            parser: 'JSZip'
          };
        } catch (error) {
          console.error('ZIP parsing error:', error);
          return { success: false, error: error.message, parser: 'JSZip' };
        }
      }
    };

    // ========================================================================
    // REQUIREMENT EXTRACTION
    // ========================================================================
    const RequirementExtractor = {
      // Extract SHALL/SHOULD/MUST requirements
      extractRequirements(text) {
        const requirements = [];
        const lines = text.split(/[.\n]/);
        
        let reqId = 1;
        
        lines.forEach(line => {
          const trimmed = line.trim();
          if (!trimmed || trimmed.length < 20) return;
          
          // SHALL requirements (mandatory)
          if (/\bshall\b/i.test(trimmed)) {
            requirements.push({
              id: `REQ-${String(reqId++).padStart(3, '0')}`,
              text: trimmed,
              type: 'SHALL',
              priority: 'CRITICAL',
              section: this.guessSection(trimmed)
            });
          }
          // MUST requirements (mandatory)
          else if (/\bmust\b/i.test(trimmed) && !/\bmust not\b/i.test(trimmed)) {
            requirements.push({
              id: `REQ-${String(reqId++).padStart(3, '0')}`,
              text: trimmed,
              type: 'SHALL',
              priority: 'CRITICAL',
              section: this.guessSection(trimmed)
            });
          }
          // SHOULD requirements (recommended)
          else if (/\bshould\b/i.test(trimmed)) {
            requirements.push({
              id: `REQ-${String(reqId++).padStart(3, '0')}`,
              text: trimmed,
              type: 'SHOULD',
              priority: 'HIGH',
              section: this.guessSection(trimmed)
            });
          }
          // Evaluation factors
          else if (/\bevaluat/i.test(trimmed) || /\bfactor/i.test(trimmed) || /\bcriteria/i.test(trimmed)) {
            requirements.push({
              id: `EVAL-${String(reqId++).padStart(3, '0')}`,
              text: trimmed,
              type: 'EVAL',
              priority: 'HIGH',
              section: this.guessSection(trimmed)
            });
          }
        });
        
        return requirements;
      },

      // Guess the RFP section
      guessSection(text) {
        const lowerText = text.toLowerCase();
        
        if (/technical|approach|solution|methodology/i.test(lowerText)) return 'Technical';
        if (/management|staffing|organization|personnel/i.test(lowerText)) return 'Management';
        if (/past performance|experience|reference/i.test(lowerText)) return 'Past Performance';
        if (/price|cost|pricing|rate/i.test(lowerText)) return 'Pricing';
        if (/security|clearance|classification/i.test(lowerText)) return 'Security';
        if (/compliance|far|dfar|regulation/i.test(lowerText)) return 'Compliance';
        if (/deliverable|schedule|milestone|timeline/i.test(lowerText)) return 'Schedule';
        
        return 'General';
      },

      // Extract RFP metadata
      extractMetadata(text) {
        const metadata = {};
        
        // Solicitation number patterns
        const solMatch = text.match(/(?:solicitation|contract|rfp|rfi|rfq)\s*(?:number|no\.?|#)?\s*[:]\s*([A-Z0-9-]+)/i) ||
                        text.match(/([A-Z]{2,4}\d{2}[A-Z0-9-]+)/);
        if (solMatch) metadata.solicitationNumber = solMatch[1];
        
        // NAICS code
        const naicsMatch = text.match(/NAICS\s*(?:code)?[:]\s*(\d{6})/i) ||
                          text.match(/(\d{6})\s*[-–]\s*[A-Za-z]/);
        if (naicsMatch) metadata.naicsCode = naicsMatch[1];
        
        // Set-aside
        const setAsidePatterns = [
          /8\(a\)/i, /SDVOSB/i, /WOSB/i, /HUBZone/i, /Small Business/i,
          /Full and Open/i, /Unrestricted/i
        ];
        for (const pattern of setAsidePatterns) {
          if (pattern.test(text)) {
            metadata.setAside = pattern.source.replace(/\\[()]/g, '');
            break;
          }
        }
        
        // Due date patterns
        const dateMatch = text.match(/(?:due|deadline|submit|submission)[\s\S]{0,50}?(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4})/i) ||
                         text.match(/(\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s+\d{4})/i);
        if (dateMatch) metadata.dueDate = dateMatch[1];
        
        // Contract type
        const typePatterns = ['FFP', 'T&M', 'CPFF', 'CPAF', 'IDIQ', 'BPA'];
        for (const type of typePatterns) {
          if (text.includes(type)) {
            metadata.contractType = type;
            break;
          }
        }
        
        return metadata;
      }
    };

    // ========================================================================
    // MAIN COMPONENT
    // ========================================================================
    function RFPShredder() {
      const [files, setFiles] = useState([]);
      const [processing, setProcessing] = useState(false);
      const [results, setResults] = useState([]);
      const [requirements, setRequirements] = useState([]);
      const [metadata, setMetadata] = useState({});
      const [selectedOpportunity, setSelectedOpportunity] = useState(null);
      const [filterType, setFilterType] = useState('all');
      const [view, setView] = useState('upload'); // upload, processing, results
      const [dragActive, setDragActive] = useState(false);
      
      const fileInputRef = useRef(null);

      // Handle file selection
      const handleFileSelect = (e) => {
        const selectedFiles = Array.from(e.target.files);
        addFiles(selectedFiles);
      };

      // Add files to queue
      const addFiles = (selectedFiles) => {
        const newFiles = selectedFiles.map(file => {
          const ext = file.name.split('.').pop().toLowerCase();
          const typeInfo = SUPPORTED_TYPES[file.type] || 
                          Object.values(SUPPORTED_TYPES).find(t => t.label.toLowerCase() === ext) ||
                          { parser: 'unknown', icon: '📁', label: ext.toUpperCase(), color: 'text-slate-400', bgColor: 'bg-slate-500/20' };
          
          return {
            id: crypto.randomUUID(),
            file,
            name: file.name,
            size: file.size,
            type: file.type,
            status: 'pending',
            progress: 0,
            ...typeInfo
          };
        });
        
        setFiles(prev => [...prev, ...newFiles]);
      };

      // Drag and drop handlers
      const handleDrag = (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (e.type === 'dragenter' || e.type === 'dragover') {
          setDragActive(true);
        } else if (e.type === 'dragleave') {
          setDragActive(false);
        }
      };

      const handleDrop = (e) => {
        e.preventDefault();
        e.stopPropagation();
        setDragActive(false);
        
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
          addFiles(Array.from(e.dataTransfer.files));
        }
      };

      // Remove file from queue
      const removeFile = (id) => {
        setFiles(files.filter(f => f.id !== id));
      };

      // Process all files
      const processFiles = async () => {
        setProcessing(true);
        setView('processing');
        
        const allResults = [];
        const allRequirements = [];
        let combinedMetadata = {};
        
        for (const fileItem of files) {
          // Update status to processing
          setFiles(prev => prev.map(f => 
            f.id === fileItem.id ? { ...f, status: 'processing', progress: 10 } : f
          ));
          
          try {
            // Parse based on file type
            let parseResult;
            switch (fileItem.parser) {
              case 'pdf':
                parseResult = await DocumentParsers.parsePDF(fileItem.file);
                break;
              case 'docx':
              case 'doc':
                parseResult = await DocumentParsers.parseDOCX(fileItem.file);
                break;
              case 'xlsx':
              case 'xls':
                parseResult = await DocumentParsers.parseXLSX(fileItem.file);
                break;
              case 'csv':
                parseResult = await DocumentParsers.parseCSV(fileItem.file);
                break;
              case 'text':
                parseResult = await DocumentParsers.parseTXT(fileItem.file);
                break;
              case 'msg':
                parseResult = await DocumentParsers.parseMSG(fileItem.file);
                break;
              case 'eml':
                parseResult = await DocumentParsers.parseEML(fileItem.file);
                break;
              case 'zip':
                parseResult = await DocumentParsers.parseZIP(fileItem.file);
                break;
              default:
                parseResult = { success: false, error: 'Unsupported file type' };
            }
            
            // Update progress
            setFiles(prev => prev.map(f => 
              f.id === fileItem.id ? { ...f, progress: 50 } : f
            ));
            
            if (parseResult.success) {
              // Extract requirements
              const reqs = RequirementExtractor.extractRequirements(parseResult.text);
              const meta = RequirementExtractor.extractMetadata(parseResult.text);
              
              allResults.push({
                fileName: fileItem.name,
                success: true,
                text: parseResult.text,
                charCount: parseResult.text.length,
                requirements: reqs.length,
                ...parseResult
              });
              
              allRequirements.push(...reqs.map(r => ({ ...r, sourceFile: fileItem.name })));
              combinedMetadata = { ...combinedMetadata, ...meta };
              
              // Update file status
              setFiles(prev => prev.map(f => 
                f.id === fileItem.id ? { 
                  ...f, 
                  status: 'complete', 
                  progress: 100,
                  extractedReqs: reqs.length
                } : f
              ));
            } else {
              allResults.push({
                fileName: fileItem.name,
                success: false,
                error: parseResult.error
              });
              
              setFiles(prev => prev.map(f => 
                f.id === fileItem.id ? { ...f, status: 'error', progress: 100, error: parseResult.error } : f
              ));
            }
          } catch (error) {
            console.error(`Error processing ${fileItem.name}:`, error);
            setFiles(prev => prev.map(f => 
              f.id === fileItem.id ? { ...f, status: 'error', progress: 100, error: error.message } : f
            ));
          }
        }
        
        setResults(allResults);
        setRequirements(allRequirements);
        setMetadata(combinedMetadata);
        setProcessing(false);
        setView('results');
      };

      // Format file size
      const formatSize = (bytes) => {
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
        return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
      };

      // Filter requirements
      const filteredRequirements = filterType === 'all' 
        ? requirements 
        : requirements.filter(r => r.type === filterType);

      // Stats
      const stats = {
        total: requirements.length,
        shall: requirements.filter(r => r.type === 'SHALL').length,
        should: requirements.filter(r => r.type === 'SHOULD').length,
        eval: requirements.filter(r => r.type === 'EVAL').length,
        critical: requirements.filter(r => r.priority === 'CRITICAL').length
      };

      return (
        <div className="min-h-screen bg-[#00050F] text-white">
          {/* Header */}
          <header className="bg-slate-900/50 border-b border-slate-700/50 px-6 py-4">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-4">
                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-500 to-purple-500 flex items-center justify-center">
                  <span className="text-xl">🔪</span>
                </div>
                <div>
                  <h1 className="text-xl font-bold">RFP Shredder</h1>
                  <p className="text-sm text-slate-400">AI-Powered Multi-Document Requirement Extraction</p>
                </div>
              </div>
              
              <div className="flex items-center gap-4">
                {/* Opportunity Selector */}
                <select
                  value={selectedOpportunity?.id || ''}
                  onChange={(e) => setSelectedOpportunity(DEMO_OPPORTUNITIES.find(o => o.id === e.target.value))}
                  className="bg-slate-800/50 border border-slate-700/50 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-cyan-500/50"
                >
                  <option value="">Select Opportunity</option>
                  {DEMO_OPPORTUNITIES.map(opp => (
                    <option key={opp.id} value={opp.id}>{opp.nickname} ({opp.agency})</option>
                  ))}
                </select>
                
                <span className="px-3 py-1 rounded-full bg-emerald-500/20 text-emerald-400 text-xs font-semibold border border-emerald-500/30">
                  v2.0 Enhanced
                </span>
              </div>
            </div>
          </header>

          <main className="p-6">
            {/* Upload View */}
            {view === 'upload' && (
              <div className="max-w-4xl mx-auto space-y-6">
                {/* Supported Types Banner */}
                <div className="p-4 bg-slate-900/50 rounded-xl border border-slate-700/50">
                  <h3 className="text-sm font-semibold text-white mb-3">📎 Supported File Types</h3>
                  <div className="flex flex-wrap gap-2">
                    {Object.values(SUPPORTED_TYPES).filter((v, i, a) => a.findIndex(t => t.label === v.label) === i).map(type => (
                      <span key={type.label} className={`px-2 py-1 rounded ${type.bgColor} ${type.color} text-xs font-medium`}>
                        {type.icon} {type.label}
                      </span>
                    ))}
                  </div>
                </div>

                {/* Drop Zone */}
                <div
                  className={`border-2 border-dashed rounded-xl p-12 text-center transition-all cursor-pointer ${
                    dragActive 
                      ? 'drop-zone-active border-cyan-500 bg-cyan-500/10' 
                      : 'border-slate-700/50 hover:border-slate-600 hover:bg-slate-900/30'
                  }`}
                  onDragEnter={handleDrag}
                  onDragLeave={handleDrag}
                  onDragOver={handleDrag}
                  onDrop={handleDrop}
                  onClick={() => fileInputRef.current?.click()}
                >
                  <input
                    ref={fileInputRef}
                    type="file"
                    multiple
                    accept={ACCEPTED_EXTENSIONS}
                    onChange={handleFileSelect}
                    className="hidden"
                  />
                  
                  <div className="text-5xl mb-4">
                    {dragActive ? '📥' : '📂'}
                  </div>
                  <h3 className="text-lg font-semibold text-white mb-2">
                    {dragActive ? 'Drop files here...' : 'Drag & Drop RFP Files'}
                  </h3>
                  <p className="text-slate-400 mb-4">
                    or click to browse your computer
                  </p>
                  <p className="text-xs text-slate-500">
                    Supports: PDF, DOCX, XLSX, TXT, CSV, MSG, EML, ZIP
                  </p>
                </div>

                {/* File Queue */}
                {files.length > 0 && (
                  <div className="space-y-4">
                    <div className="flex items-center justify-between">
                      <h3 className="text-lg font-semibold text-white">📋 Upload Queue ({files.length} files)</h3>
                      <button
                        onClick={() => setFiles([])}
                        className="text-sm text-slate-400 hover:text-red-400"
                      >
                        Clear All
                      </button>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                      {files.map(file => (
                        <div 
                          key={file.id}
                          className="file-card bg-slate-900/50 rounded-lg border border-slate-700/50 p-3 flex items-center gap-3"
                        >
                          <div className={`w-10 h-10 rounded-lg ${file.bgColor} flex items-center justify-center text-lg`}>
                            {file.icon}
                          </div>
                          <div className="flex-1 min-w-0">
                            <div className="font-medium text-white truncate">{file.name}</div>
                            <div className="text-xs text-slate-400">
                              {formatSize(file.size)} • {file.label}
                            </div>
                          </div>
                          <button
                            onClick={() => removeFile(file.id)}
                            className="p-1 hover:bg-red-500/20 rounded text-slate-400 hover:text-red-400"
                          >
                            ✕
                          </button>
                        </div>
                      ))}
                    </div>
                    
                    <button
                      onClick={processFiles}
                      className="w-full py-3 bg-gradient-to-r from-cyan-500 to-purple-500 text-white rounded-lg font-semibold hover:opacity-90 transition-opacity flex items-center justify-center gap-2"
                    >
                      <span>🔪</span> Shred {files.length} Document{files.length > 1 ? 's' : ''}
                    </button>
                  </div>
                )}
              </div>
            )}

            {/* Processing View */}
            {view === 'processing' && (
              <div className="max-w-4xl mx-auto space-y-4">
                <h3 className="text-lg font-semibold text-white mb-4">⏳ Processing Documents...</h3>
                
                {files.map(file => (
                  <div 
                    key={file.id}
                    className="bg-slate-900/50 rounded-lg border border-slate-700/50 p-4"
                  >
                    <div className="flex items-center gap-3 mb-2">
                      <div className={`w-8 h-8 rounded ${file.bgColor} flex items-center justify-center`}>
                        {file.icon}
                      </div>
                      <div className="flex-1">
                        <div className="font-medium text-white">{file.name}</div>
                        <div className="text-xs text-slate-400">
                          {file.status === 'processing' && '🔄 Extracting text...'}
                          {file.status === 'complete' && `✅ ${file.extractedReqs || 0} requirements found`}
                          {file.status === 'error' && `❌ ${file.error}`}
                          {file.status === 'pending' && '⏳ Waiting...'}
                        </div>
                      </div>
                      <span className={`px-2 py-1 rounded text-xs font-medium ${
                        file.status === 'complete' ? 'bg-emerald-500/20 text-emerald-400' :
                        file.status === 'error' ? 'bg-red-500/20 text-red-400' :
                        file.status === 'processing' ? 'bg-cyan-500/20 text-cyan-400' :
                        'bg-slate-500/20 text-slate-400'
                      }`}>
                        {file.status}
                      </span>
                    </div>
                    
                    <div className="h-2 bg-slate-700/50 rounded-full overflow-hidden">
                      <div 
                        className={`h-full progress-bar ${
                          file.status === 'error' ? 'bg-red-500' :
                          file.status === 'complete' ? 'bg-emerald-500' :
                          'bg-gradient-to-r from-cyan-500 to-purple-500'
                        }`}
                        style={{ width: `${file.progress}%` }}
                      />
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Results View */}
            {view === 'results' && (
              <div className="space-y-6">
                {/* Stats Row */}
                <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                  {[
                    { label: 'Total Requirements', value: stats.total, icon: '📋', color: 'cyan' },
                    { label: 'SHALL (Mandatory)', value: stats.shall, icon: '⚠️', color: 'red' },
                    { label: 'SHOULD (Recommended)', value: stats.should, icon: '💡', color: 'amber' },
                    { label: 'Evaluation Factors', value: stats.eval, icon: '⚖️', color: 'purple' },
                    { label: 'Critical Priority', value: stats.critical, icon: '🚨', color: 'rose' }
                  ].map(stat => (
                    <div key={stat.label} className="bg-slate-900/50 rounded-xl border border-slate-700/50 p-4">
                      <div className="text-2xl mb-1">{stat.icon}</div>
                      <div className={`text-2xl font-bold text-${stat.color}-400`}>{stat.value}</div>
                      <div className="text-xs text-slate-400">{stat.label}</div>
                    </div>
                  ))}
                </div>

                {/* Metadata Card */}
                {Object.keys(metadata).length > 0 && (
                  <div className="bg-slate-900/50 rounded-xl border border-slate-700/50 p-4">
                    <h3 className="text-lg font-semibold text-white mb-3">📋 Extracted RFP Metadata</h3>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                      {metadata.solicitationNumber && (
                        <div>
                          <div className="text-xs text-slate-400">Solicitation #</div>
                          <div className="font-medium text-white">{metadata.solicitationNumber}</div>
                        </div>
                      )}
                      {metadata.naicsCode && (
                        <div>
                          <div className="text-xs text-slate-400">NAICS Code</div>
                          <div className="font-medium text-white">{metadata.naicsCode}</div>
                        </div>
                      )}
                      {metadata.setAside && (
                        <div>
                          <div className="text-xs text-slate-400">Set-Aside</div>
                          <div className="font-medium text-white">{metadata.setAside}</div>
                        </div>
                      )}
                      {metadata.dueDate && (
                        <div>
                          <div className="text-xs text-slate-400">Due Date</div>
                          <div className="font-medium text-white">{metadata.dueDate}</div>
                        </div>
                      )}
                      {metadata.contractType && (
                        <div>
                          <div className="text-xs text-slate-400">Contract Type</div>
                          <div className="font-medium text-white">{metadata.contractType}</div>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* Filter Tabs */}
                <div className="flex items-center gap-2">
                  {[
                    { id: 'all', label: 'All', count: stats.total },
                    { id: 'SHALL', label: 'SHALL', count: stats.shall },
                    { id: 'SHOULD', label: 'SHOULD', count: stats.should },
                    { id: 'EVAL', label: 'Evaluation', count: stats.eval }
                  ].map(filter => (
                    <button
                      key={filter.id}
                      onClick={() => setFilterType(filter.id)}
                      className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors ${
                        filterType === filter.id 
                          ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/50' 
                          : 'bg-slate-800/50 text-slate-400 border border-slate-700/50 hover:border-slate-600'
                      }`}
                    >
                      {filter.label} ({filter.count})
                    </button>
                  ))}
                  
                  <div className="flex-1" />
                  
                  <button
                    onClick={() => { setFiles([]); setView('upload'); setRequirements([]); setResults([]); }}
                    className="px-4 py-2 bg-slate-700 text-white rounded-lg text-sm hover:bg-slate-600"
                  >
                    🔄 New Upload
                  </button>
                </div>

                {/* Requirements Table */}
                <div className="bg-slate-900/50 rounded-xl border border-slate-700/50 overflow-hidden">
                  <table className="w-full">
                    <thead>
                      <tr className="border-b border-slate-700/50">
                        <th className="text-left px-4 py-3 text-sm font-medium text-slate-400">ID</th>
                        <th className="text-left px-4 py-3 text-sm font-medium text-slate-400">Requirement</th>
                        <th className="text-left px-4 py-3 text-sm font-medium text-slate-400">Type</th>
                        <th className="text-left px-4 py-3 text-sm font-medium text-slate-400">Section</th>
                        <th className="text-left px-4 py-3 text-sm font-medium text-slate-400">Source</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filteredRequirements.slice(0, 50).map((req, idx) => (
                        <tr key={idx} className="border-b border-slate-700/30 hover:bg-slate-800/30">
                          <td className="px-4 py-3 text-sm font-mono text-cyan-400">{req.id}</td>
                          <td className="px-4 py-3 text-sm text-white max-w-lg">
                            <div className="line-clamp-2">{req.text}</div>
                          </td>
                          <td className="px-4 py-3">
                            <span className={`px-2 py-1 rounded text-xs font-medium ${
                              req.type === 'SHALL' ? 'bg-red-500/20 text-red-400' :
                              req.type === 'SHOULD' ? 'bg-amber-500/20 text-amber-400' :
                              'bg-purple-500/20 text-purple-400'
                            }`}>
                              {req.type}
                            </span>
                          </td>
                          <td className="px-4 py-3 text-sm text-slate-300">{req.section}</td>
                          <td className="px-4 py-3 text-xs text-slate-400 truncate max-w-[150px]">{req.sourceFile}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                  
                  {filteredRequirements.length > 50 && (
                    <div className="p-4 text-center text-sm text-slate-400 border-t border-slate-700/50">
                      Showing 50 of {filteredRequirements.length} requirements
                    </div>
                  )}
                </div>

                {/* File Processing Summary */}
                <div className="bg-slate-900/50 rounded-xl border border-slate-700/50 p-4">
                  <h3 className="text-lg font-semibold text-white mb-3">📁 Processed Files Summary</h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                    {results.map((result, idx) => (
                      <div 
                        key={idx}
                        className={`p-3 rounded-lg border ${
                          result.success 
                            ? 'bg-emerald-500/10 border-emerald-500/30' 
                            : 'bg-red-500/10 border-red-500/30'
                        }`}
                      >
                        <div className="font-medium text-white truncate">{result.fileName}</div>
                        <div className="text-xs text-slate-400 mt-1">
                          {result.success ? (
                            <>
                              ✅ {result.charCount?.toLocaleString()} chars • {result.requirements} requirements
                              {result.pages && ` • ${result.pages} pages`}
                              {result.sheets && ` • ${result.sheets} sheets`}
                            </>
                          ) : (
                            <>❌ {result.error}</>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </main>

          {/* Footer Disclaimer */}
          <div className="fixed bottom-4 left-4 text-xs text-slate-500 bg-slate-900/80 px-3 py-2 rounded-lg border border-slate-700/50">
            ⚠️ AI GENERATED - REQUIRES HUMAN REVIEW
          </div>
        </div>
      );
    }

    // Render
    ReactDOM.createRoot(document.getElementById('root')).render(<RFPShredder />);
  </script>
</body>
</html>
