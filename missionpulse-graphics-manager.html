<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphics Manager | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
        .glass-card:hover { border-color: rgba(0,229,250,0.3); box-shadow: 0 0 30px rgba(0,229,250,0.1); }
        .cyan-glow { text-shadow: 0 0 20px rgba(0,229,250,0.5); }
        .graphic-preview { aspect-ratio: 16/9; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        .status-concept { background: rgba(107,114,128,0.2); color: #9ca3af; }
        .status-draft { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .status-in_review { background: rgba(245,158,11,0.2); color: #fbbf24; }
        .status-approved { background: rgba(16,185,129,0.2); color: #34d399; }
        .status-final { background: rgba(139,92,246,0.2); color: #a78bfa; }
        .type-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="text-white font-sans">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const supabaseUrl = 'https://djuviwarqdvlbgcfuupa.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0NDQ0NjUsImV4cCI6MjA4NTAyMDQ2NX0.3s8ufDDN2aWfkW0RBsAyJyacb2tjB7M550WSFIohHcA';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const demoGraphics = [
            { id: '1', opportunity_id: '1', opportunity_title: 'DHA MHS GENESIS Support', figure_number: 'Figure 1', title: 'Technical Architecture Overview', description: 'High-level system architecture showing integration points with MHS GENESIS', graphic_type: 'diagram', section_reference: 'Section 3.1', volume: 'technical', status: 'approved', assigned_to: 'Design Team', designer: 'Alex Rivera', version: 3, file_format: 'PNG', dimensions: '1920x1080', approval_date: '2026-01-28', approved_by: 'Tech Lead', tags: ['architecture', 'system', 'integration'] },
            { id: '2', opportunity_id: '1', opportunity_title: 'DHA MHS GENESIS Support', figure_number: 'Figure 2', title: 'Organization Chart', description: 'Project management organization structure with key personnel', graphic_type: 'org_chart', section_reference: 'Section 4.2', volume: 'management', status: 'final', assigned_to: 'HR Lead', designer: 'Maria Santos', version: 2, file_format: 'PNG', dimensions: '1600x1200', approval_date: '2026-01-30', approved_by: 'PM', tags: ['org', 'personnel', 'management'] },
            { id: '3', opportunity_id: '1', opportunity_title: 'DHA MHS GENESIS Support', figure_number: 'Figure 3', title: 'Implementation Timeline', description: 'Phase-gated timeline showing major milestones and deliverables', graphic_type: 'timeline', section_reference: 'Section 4.3', volume: 'management', status: 'in_review', assigned_to: 'PM', designer: 'Alex Rivera', version: 2, file_format: 'PNG', dimensions: '2400x800', review_comments: [{user: 'CEO', text: 'Add contingency buffers', date: '2026-02-01'}], tags: ['timeline', 'schedule', 'milestones'] },
            { id: '4', opportunity_id: '1', opportunity_title: 'DHA MHS GENESIS Support', figure_number: 'Figure 4', title: 'Data Flow Diagram', description: 'Shows data movement between system components and external interfaces', graphic_type: 'process_flow', section_reference: 'Section 3.3', volume: 'technical', status: 'draft', assigned_to: 'Tech Lead', designer: 'Alex Rivera', version: 1, file_format: 'SVG', dimensions: '1800x1200', tags: ['data', 'flow', 'integration'] },
            { id: '5', opportunity_id: '2', opportunity_title: 'VA Claims Processing', figure_number: 'Figure 1', title: 'AI/ML Processing Pipeline', description: 'Machine learning pipeline for claims analysis and processing', graphic_type: 'diagram', section_reference: 'Section 3.2', volume: 'technical', status: 'concept', assigned_to: 'AI Team', designer: '', version: 1, file_format: '', dimensions: '', tags: ['ai', 'ml', 'pipeline'] },
            { id: '6', opportunity_id: '1', opportunity_title: 'DHA MHS GENESIS Support', figure_number: 'Table 1', title: 'Requirements Traceability Matrix', description: 'Maps PWS requirements to technical solution components', graphic_type: 'table', section_reference: 'Section 3.1.1', volume: 'technical', status: 'approved', assigned_to: 'SA', designer: 'Maria Santos', version: 4, file_format: 'PNG', dimensions: '1400x2000', approval_date: '2026-01-29', approved_by: 'QA Lead', tags: ['requirements', 'traceability', 'matrix'] },
        ];

        const demoOpportunities = [
            { id: '1', title: 'DHA MHS GENESIS Support', nickname: 'GENESIS' },
            { id: '2', title: 'VA Claims Processing Modernization', nickname: 'VA Claims' },
        ];

        const typeConfig = {
            diagram: { label: 'Diagram', icon: 'fa-project-diagram', color: 'bg-blue-500/20 text-blue-400' },
            chart: { label: 'Chart', icon: 'fa-chart-bar', color: 'bg-emerald-500/20 text-emerald-400' },
            table: { label: 'Table', icon: 'fa-table', color: 'bg-purple-500/20 text-purple-400' },
            org_chart: { label: 'Org Chart', icon: 'fa-sitemap', color: 'bg-amber-500/20 text-amber-400' },
            timeline: { label: 'Timeline', icon: 'fa-stream', color: 'bg-cyan-500/20 text-cyan-400' },
            process_flow: { label: 'Process Flow', icon: 'fa-random', color: 'bg-pink-500/20 text-pink-400' },
            infographic: { label: 'Infographic', icon: 'fa-info-circle', color: 'bg-indigo-500/20 text-indigo-400' },
            photo: { label: 'Photo', icon: 'fa-camera', color: 'bg-red-500/20 text-red-400' },
            screenshot: { label: 'Screenshot', icon: 'fa-desktop', color: 'bg-gray-500/20 text-gray-400' },
            map: { label: 'Map', icon: 'fa-map-marked-alt', color: 'bg-teal-500/20 text-teal-400' },
        };

        const statusConfig = {
            concept: { label: 'Concept', icon: 'fa-lightbulb', progress: 10 },
            draft: { label: 'Draft', icon: 'fa-pencil-alt', progress: 30 },
            in_review: { label: 'In Review', icon: 'fa-search', progress: 60 },
            approved: { label: 'Approved', icon: 'fa-check-circle', progress: 90 },
            final: { label: 'Final', icon: 'fa-trophy', progress: 100 },
        };

        function App() {
            const [graphics, setGraphics] = useState([]);
            const [opportunities, setOpportunities] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedGraphic, setSelectedGraphic] = useState(null);
            const [showModal, setShowModal] = useState(false);
            const [viewMode, setViewMode] = useState('grid');
            const [filterOpp, setFilterOpp] = useState('all');
            const [filterStatus, setFilterStatus] = useState('all');
            const [filterType, setFilterType] = useState('all');
            const [searchTerm, setSearchTerm] = useState('');

            useEffect(() => { loadData(); }, []);

            async function loadData() {
                try {
                    const [graphicsRes, oppsRes] = await Promise.all([
                        supabase.from('proposal_graphics').select('*, opportunities(title, nickname)').order('figure_number'),
                        supabase.from('opportunities').select('id, title, nickname')
                    ]);
                    if (graphicsRes.data?.length > 0) {
                        setGraphics(graphicsRes.data.map(g => ({...g, opportunity_title: g.opportunities?.title || g.opportunities?.nickname})));
                    } else { setGraphics(demoGraphics); }
                    setOpportunities(oppsRes.data?.length > 0 ? oppsRes.data : demoOpportunities);
                } catch (err) {
                    setGraphics(demoGraphics);
                    setOpportunities(demoOpportunities);
                }
                setLoading(false);
            }

            const filteredGraphics = graphics.filter(g => {
                if (filterOpp !== 'all' && g.opportunity_id !== filterOpp) return false;
                if (filterStatus !== 'all' && g.status !== filterStatus) return false;
                if (filterType !== 'all' && g.graphic_type !== filterType) return false;
                if (searchTerm && !g.title.toLowerCase().includes(searchTerm.toLowerCase()) && !g.figure_number.toLowerCase().includes(searchTerm.toLowerCase())) return false;
                return true;
            });

            const stats = { total: graphics.length, final: graphics.filter(g => g.status === 'final').length, inProgress: graphics.filter(g => ['draft', 'in_review'].includes(g.status)).length, needsWork: graphics.filter(g => g.status === 'concept').length };

            function formatDate(dateStr) { return dateStr ? new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : 'N/A'; }

            function GraphicCard({ graphic }) {
                const typeCfg = typeConfig[graphic.graphic_type] || typeConfig.diagram;
                const statusCfg = statusConfig[graphic.status] || statusConfig.draft;
                return (
                    <div className="glass-card rounded-xl overflow-hidden cursor-pointer hover:scale-[1.02] transition-all" onClick={() => { setSelectedGraphic(graphic); setShowModal(true); }}>
                        <div className="graphic-preview relative flex items-center justify-center">
                            <div className={`type-icon ${typeCfg.color}`}><i className={`fas ${typeCfg.icon} text-2xl`}></i></div>
                            <div className="absolute top-2 left-2"><span className="bg-black/50 text-cyan-400 px-2 py-1 rounded text-xs font-mono">{graphic.figure_number}</span></div>
                            <div className="absolute top-2 right-2"><span className={`status-${graphic.status} px-2 py-1 rounded text-xs font-medium`}>{statusCfg.label}</span></div>
                            {graphic.version > 1 && <div className="absolute bottom-2 right-2"><span className="bg-black/50 text-gray-400 px-2 py-1 rounded text-xs">v{graphic.version}</span></div>}
                        </div>
                        <div className="p-4">
                            <h3 className="text-white font-semibold mb-1 truncate">{graphic.title}</h3>
                            <p className="text-cyan-400 text-sm mb-2">{graphic.opportunity_title}</p>
                            <p className="text-gray-400 text-sm line-clamp-2 mb-3">{graphic.description}</p>
                            <div className="flex items-center justify-between text-xs text-gray-500">
                                <span><i className="fas fa-bookmark mr-1"></i>{graphic.section_reference}</span>
                                <span><i className="fas fa-folder mr-1"></i>{graphic.volume}</span>
                            </div>
                            {graphic.designer && (
                                <div className="mt-3 pt-3 border-t border-gray-700/50 flex items-center justify-between">
                                    <div className="flex items-center gap-2">
                                        <div className="w-6 h-6 rounded-full bg-gradient-to-br from-cyan-500 to-blue-500 flex items-center justify-center text-xs">{graphic.designer.split(' ').map(n => n[0]).join('')}</div>
                                        <span className="text-gray-400 text-xs">{graphic.designer}</span>
                                    </div>
                                    {graphic.file_format && <span className="bg-gray-700/50 px-2 py-0.5 rounded text-xs text-gray-400">{graphic.file_format}</span>}
                                </div>
                            )}
                            {graphic.tags?.length > 0 && (
                                <div className="mt-3 flex flex-wrap gap-1">
                                    {graphic.tags.slice(0, 3).map((tag, i) => <span key={i} className="bg-cyan-500/10 text-cyan-400 px-2 py-0.5 rounded text-xs">#{tag}</span>)}
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            function GraphicListItem({ graphic }) {
                const typeCfg = typeConfig[graphic.graphic_type] || typeConfig.diagram;
                const statusCfg = statusConfig[graphic.status] || statusConfig.draft;
                return (
                    <div className="glass-card rounded-xl p-4 cursor-pointer hover:bg-white/5 transition-all flex items-center gap-4" onClick={() => { setSelectedGraphic(graphic); setShowModal(true); }}>
                        <div className={`type-icon ${typeCfg.color} flex-shrink-0`}><i className={`fas ${typeCfg.icon}`}></i></div>
                        <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-2 mb-1">
                                <span className="text-cyan-400 font-mono text-sm">{graphic.figure_number}</span>
                                <h3 className="text-white font-medium truncate">{graphic.title}</h3>
                            </div>
                            <p className="text-gray-400 text-sm truncate">{graphic.description}</p>
                        </div>
                        <div className="flex items-center gap-4 flex-shrink-0">
                            <span className="text-gray-500 text-sm">{graphic.section_reference}</span>
                            <span className={`status-${graphic.status} px-3 py-1 rounded-full text-xs font-medium`}>{statusCfg.label}</span>
                            <span className="text-gray-500 text-sm">v{graphic.version}</span>
                        </div>
                    </div>
                );
            }

            function GraphicModal() {
                if (!selectedGraphic) return null;
                const typeCfg = typeConfig[selectedGraphic.graphic_type] || typeConfig.diagram;
                const statusCfg = statusConfig[selectedGraphic.status] || statusConfig.draft;
                return (
                    <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4" onClick={() => setShowModal(false)}>
                        <div className="glass-card rounded-2xl p-6 max-w-3xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                            <div className="flex items-start justify-between mb-6">
                                <div>
                                    <div className="flex items-center gap-3 mb-2">
                                        <span className="bg-cyan-500/20 text-cyan-400 px-3 py-1 rounded-lg font-mono">{selectedGraphic.figure_number}</span>
                                        <span className={`status-${selectedGraphic.status} px-3 py-1 rounded-lg text-sm font-medium`}>{statusCfg.label}</span>
                                        <span className="text-gray-500 text-sm">v{selectedGraphic.version}</span>
                                    </div>
                                    <h2 className="text-xl font-bold text-white">{selectedGraphic.title}</h2>
                                    <p className="text-cyan-400">{selectedGraphic.opportunity_title}</p>
                                </div>
                                <button onClick={() => setShowModal(false)} className="text-gray-400 hover:text-white"><i className="fas fa-times text-xl"></i></button>
                            </div>
                            <div className="graphic-preview rounded-xl mb-6 flex items-center justify-center">
                                <div className="text-center">
                                    <div className={`type-icon ${typeCfg.color} mx-auto mb-3`} style={{width: '60px', height: '60px'}}><i className={`fas ${typeCfg.icon} text-3xl`}></i></div>
                                    <p className="text-gray-400 text-sm">Preview not available</p>
                                </div>
                            </div>
                            <div className="glass-card rounded-lg p-4 mb-6">
                                <h3 className="text-gray-400 text-sm mb-2">Description</h3>
                                <p className="text-white">{selectedGraphic.description}</p>
                            </div>
                            <div className="grid grid-cols-3 gap-4 mb-6">
                                <div className="glass-card rounded-lg p-4"><div className="text-gray-400 text-sm mb-1">Type</div><div className={`${typeCfg.color} inline-flex items-center gap-2 px-3 py-1 rounded`}><i className={`fas ${typeCfg.icon}`}></i>{typeCfg.label}</div></div>
                                <div className="glass-card rounded-lg p-4"><div className="text-gray-400 text-sm mb-1">Section</div><div className="text-white font-medium">{selectedGraphic.section_reference}</div></div>
                                <div className="glass-card rounded-lg p-4"><div className="text-gray-400 text-sm mb-1">Volume</div><div className="text-white font-medium capitalize">{selectedGraphic.volume}</div></div>
                                {selectedGraphic.dimensions && <div className="glass-card rounded-lg p-4"><div className="text-gray-400 text-sm mb-1">Dimensions</div><div className="text-white font-medium">{selectedGraphic.dimensions}</div></div>}
                                {selectedGraphic.file_format && <div className="glass-card rounded-lg p-4"><div className="text-gray-400 text-sm mb-1">Format</div><div className="text-white font-medium">{selectedGraphic.file_format}</div></div>}
                                <div className="glass-card rounded-lg p-4"><div className="text-gray-400 text-sm mb-1">Designer</div><div className="text-white font-medium">{selectedGraphic.designer || 'Unassigned'}</div></div>
                            </div>
                            {selectedGraphic.approval_date && (
                                <div className="glass-card rounded-lg p-4 mb-6 border-l-4 border-emerald-500">
                                    <div className="flex items-center justify-between">
                                        <div><h3 className="text-emerald-400 font-medium">Approved</h3><p className="text-gray-400 text-sm">By {selectedGraphic.approved_by} on {formatDate(selectedGraphic.approval_date)}</p></div>
                                        <i className="fas fa-check-circle text-emerald-400 text-2xl"></i>
                                    </div>
                                </div>
                            )}
                            {selectedGraphic.review_comments?.length > 0 && (
                                <div className="mb-6">
                                    <h3 className="text-white font-semibold mb-3">Review Comments</h3>
                                    <div className="space-y-2">{selectedGraphic.review_comments.map((c, i) => <div key={i} className="glass-card rounded-lg p-3"><div className="flex items-center justify-between mb-1"><span className="text-cyan-400 font-medium text-sm">{c.user}</span><span className="text-gray-500 text-xs">{c.date}</span></div><p className="text-gray-300 text-sm">{c.text}</p></div>)}</div>
                                </div>
                            )}
                            {selectedGraphic.tags?.length > 0 && <div className="mb-6"><h3 className="text-white font-semibold mb-2">Tags</h3><div className="flex flex-wrap gap-2">{selectedGraphic.tags.map((tag, i) => <span key={i} className="bg-cyan-500/10 text-cyan-400 px-3 py-1 rounded-lg text-sm">#{tag}</span>)}</div></div>}
                            <div className="flex gap-3">
                                <button className="flex-1 bg-cyan-500 hover:bg-cyan-600 text-white py-3 rounded-lg font-medium transition-colors"><i className="fas fa-edit mr-2"></i>Edit Graphic</button>
                                <button className="flex-1 glass-card hover:bg-white/10 text-white py-3 rounded-lg font-medium transition-colors"><i className="fas fa-upload mr-2"></i>Upload New Version</button>
                                <button className="glass-card hover:bg-white/10 text-white px-4 py-3 rounded-lg font-medium transition-colors"><i className="fas fa-download"></i></button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (loading) return <div className="min-h-screen flex items-center justify-center"><div className="text-center"><i className="fas fa-spinner fa-spin text-4xl text-cyan-400 mb-4"></i><p className="text-gray-400">Loading Graphics...</p></div></div>;

            return (
                <div className="min-h-screen p-6">
                    <div className="flex items-center justify-between mb-8">
                        <div className="flex items-center gap-4">
                            <a href="index.html" className="text-gray-400 hover:text-cyan-400 transition-colors"><i className="fas fa-arrow-left text-xl"></i></a>
                            <div><h1 className="text-3xl font-bold text-white cyan-glow">Graphics Manager</h1><p className="text-gray-400">Manage proposal figures, diagrams, and visuals</p></div>
                        </div>
                        <button className="bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-600 hover:to-blue-600 text-white px-6 py-3 rounded-lg font-medium transition-all flex items-center gap-2"><i className="fas fa-plus"></i>Add Graphic</button>
                    </div>
                    <div className="grid grid-cols-4 gap-4 mb-8">
                        <div className="glass-card rounded-xl p-5"><div className="flex items-center justify-between mb-2"><span className="text-gray-400 text-sm">Total Graphics</span><i className="fas fa-images text-cyan-400"></i></div><div className="text-3xl font-bold text-white">{stats.total}</div></div>
                        <div className="glass-card rounded-xl p-5"><div className="flex items-center justify-between mb-2"><span className="text-gray-400 text-sm">Final</span><i className="fas fa-trophy text-purple-400"></i></div><div className="text-3xl font-bold text-white">{stats.final}</div></div>
                        <div className="glass-card rounded-xl p-5"><div className="flex items-center justify-between mb-2"><span className="text-gray-400 text-sm">In Progress</span><i className="fas fa-spinner text-blue-400"></i></div><div className="text-3xl font-bold text-white">{stats.inProgress}</div></div>
                        <div className="glass-card rounded-xl p-5"><div className="flex items-center justify-between mb-2"><span className="text-gray-400 text-sm">Needs Work</span><i className="fas fa-lightbulb text-amber-400"></i></div><div className="text-3xl font-bold text-white">{stats.needsWork}</div></div>
                    </div>
                    <div className="flex flex-wrap items-center gap-4 mb-6">
                        <div className="flex-1 min-w-[200px]">
                            <div className="relative"><i className="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i><input type="text" placeholder="Search by title or figure number..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full bg-gray-800/50 border border-gray-700 rounded-lg pl-10 pr-4 py-2 text-white placeholder-gray-500 focus:border-cyan-400 focus:outline-none" /></div>
                        </div>
                        <select value={filterOpp} onChange={e => setFilterOpp(e.target.value)} className="bg-gray-800/50 border border-gray-700 rounded-lg px-4 py-2 text-white focus:border-cyan-400 focus:outline-none"><option value="all">All Opportunities</option>{opportunities.map(o => <option key={o.id} value={o.id}>{o.nickname || o.title}</option>)}</select>
                        <select value={filterType} onChange={e => setFilterType(e.target.value)} className="bg-gray-800/50 border border-gray-700 rounded-lg px-4 py-2 text-white focus:border-cyan-400 focus:outline-none"><option value="all">All Types</option>{Object.entries(typeConfig).map(([key, cfg]) => <option key={key} value={key}>{cfg.label}</option>)}</select>
                        <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} className="bg-gray-800/50 border border-gray-700 rounded-lg px-4 py-2 text-white focus:border-cyan-400 focus:outline-none"><option value="all">All Statuses</option>{Object.entries(statusConfig).map(([key, cfg]) => <option key={key} value={key}>{cfg.label}</option>)}</select>
                        <div className="flex gap-1 bg-gray-800/50 rounded-lg p-1">
                            <button onClick={() => setViewMode('grid')} className={`px-3 py-1 rounded ${viewMode === 'grid' ? 'bg-cyan-500 text-white' : 'text-gray-400 hover:text-white'}`}><i className="fas fa-th-large"></i></button>
                            <button onClick={() => setViewMode('list')} className={`px-3 py-1 rounded ${viewMode === 'list' ? 'bg-cyan-500 text-white' : 'text-gray-400 hover:text-white'}`}><i className="fas fa-list"></i></button>
                        </div>
                    </div>
                    {viewMode === 'grid' ? (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">{filteredGraphics.map(graphic => <GraphicCard key={graphic.id} graphic={graphic} />)}</div>
                    ) : (
                        <div className="space-y-2">{filteredGraphics.map(graphic => <GraphicListItem key={graphic.id} graphic={graphic} />)}</div>
                    )}
                    {filteredGraphics.length === 0 && <div className="text-center py-16 glass-card rounded-xl"><i className="fas fa-images text-4xl text-gray-600 mb-4"></i><p className="text-gray-400">No graphics found</p></div>}
                    {showModal && <GraphicModal />}
                    <footer className="mt-12 pt-6 border-t border-gray-800 text-center text-gray-500 text-sm">© 2026 Mission Meets Tech • MissionPulse v2.0 • Sprint 68</footer>
                </div>
            );
        }
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
