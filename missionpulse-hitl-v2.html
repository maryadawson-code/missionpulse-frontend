<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MissionPulse | HITL Review Queue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
        .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.15); }
        .glass-dark { background: rgba(0, 5, 15, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.2); }
        .glow { box-shadow: 0 0 30px rgba(0, 229, 250, 0.15); }
        .glow-text { text-shadow: 0 0 20px rgba(0, 229, 250, 0.5); }
        .queue-item { transition: all 0.3s ease; }
        .queue-item:hover { transform: translateX(4px); }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 5px rgba(0, 229, 250, 0.3); } 50% { box-shadow: 0 0 20px rgba(0, 229, 250, 0.6); } }
        .live-indicator { animation: pulse-glow 2s infinite; }
        @keyframes pulse-urgent { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .urgent-badge { animation: pulse-urgent 1s infinite; }
        .ai-output { background: linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(6, 182, 212, 0.1) 100%); }
    </style>
</head>
<body class="text-white p-6">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const supabaseUrl = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzgwMTk1MjMsImV4cCI6MjA1MzU5NTUyM30.GFHJh-yID3FwkcKtiQMX3DEdJfe7IilFRpvILpvIASM';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        const CONTENT_TYPES = [
            { id: 'executive_summary', name: 'Executive Summary', icon: '📄', agent: 'Writer Agent' },
            { id: 'win_theme', name: 'Win Theme', icon: '🎯', agent: 'Strategy Agent' },
            { id: 'technical_approach', name: 'Technical Approach', icon: '⚙️', agent: 'Writer Agent' },
            { id: 'past_performance', name: 'Past Performance', icon: '📊', agent: 'Writer Agent' },
            { id: 'pricing_narrative', name: 'Pricing Narrative', icon: '💰', agent: 'Pricing Agent' },
            { id: 'compliance_matrix', name: 'Compliance Response', icon: '✅', agent: 'Compliance Agent' },
            { id: 'oral_script', name: 'Oral Presentation Script', icon: '🎤', agent: 'Orals Agent' },
            { id: 'ghost_theme', name: 'Competitor Ghost Theme', icon: '👻', agent: 'Black Hat Agent' }
        ];
        
        const QUEUE_STATUS = ['Pending', 'In Review', 'Approved', 'Rejected', 'Revision Needed'];
        const PRIORITY_LEVELS = ['Critical', 'High', 'Medium', 'Low'];
        
        const DEMO_OPPORTUNITIES = [
            { id: 'demo-1', title: 'DHA EHRM Support Services', nickname: 'DHA-EHRM' },
            { id: 'demo-2', title: 'VA Digital Transformation', nickname: 'VA-DT' }
        ];
        
        const DEMO_QUEUE = [
            { id: 'hitl-1', opportunity_id: 'demo-1', content_type: 'executive_summary', ai_output: "Mission Meets Tech brings over 15 years of healthcare IT transformation expertise to the DHA EHRM mission. Our proven track record includes successful MHS GENESIS implementations at 12 Military Treatment Facilities, achieving 99.8% system availability and 40% reduction in clinician administrative burden.\n\nOur differentiated approach combines:\n• Deep understanding of DHA's EHR modernization roadmap\n• Certified CMMC Level 2 security practices for CUI handling\n• Agile delivery methodology with 2-week sprint cycles\n• 24/7 Tier 1-3 support with <15 minute P1 response times", status: 'Pending', priority: 'Critical', created_at: '2026-02-02T10:30:00Z', assigned_to: 'CAP' },
            { id: 'hitl-2', opportunity_id: 'demo-1', content_type: 'win_theme', ai_output: "**Win Theme: Operational Excellence Through Innovation**\n\nMission Meets Tech's innovative AI-powered operations center reduces incident resolution time by 60% compared to traditional approaches. Our proprietary AIOps platform provides predictive analytics that identify and remediate issues before they impact end users, demonstrated across 8 federal healthcare environments.", status: 'In Review', priority: 'High', created_at: '2026-02-02T09:15:00Z', assigned_to: 'CAP', reviewer_id: 'Sarah W.' },
            { id: 'hitl-3', opportunity_id: 'demo-1', content_type: 'ghost_theme', ai_output: "**Ghost Theme Against Competitor X:**\n\nWhile Competitor X may highlight their legacy healthcare IT experience, evaluators should consider:\n• Their recent CPARS showing 'Marginal' ratings on similar DHA contracts\n• Limited experience with MHS GENESIS specific workflows\n• History of cost overruns on T&M healthcare contracts (avg. 23% over ceiling)\n\n**Counter-positioning:** MMT's fixed-price commitment with performance guarantees eliminates cost risk.", status: 'Pending', priority: 'High', created_at: '2026-02-02T11:00:00Z', assigned_to: 'CAP' },
            { id: 'hitl-4', opportunity_id: 'demo-1', content_type: 'pricing_narrative', ai_output: "Our pricing strategy reflects a commitment to delivering exceptional value while maintaining competitive positioning. The proposed labor mix optimizes senior expertise with cost-effective junior resources, achieving a blended rate 15% below GSA Schedule equivalents.\n\nKey pricing elements:\n• Program Manager: GS-14 equivalent, fully loaded\n• Technical Leads: Market competitive with retention bonuses\n• Help Desk Staff: Optimized offshore/onshore mix for 24/7 coverage", status: 'Approved', priority: 'Medium', created_at: '2026-02-01T14:00:00Z', assigned_to: 'FIN', reviewer_id: 'Jane D.', feedback: 'Approved with minor edits. Updated offshore ratio to 70/30 per compliance requirements.' },
            { id: 'hitl-5', opportunity_id: 'demo-2', content_type: 'technical_approach', ai_output: "Our technical approach leverages a modern microservices architecture deployed on VA Enterprise Cloud (VAEC). Key components include:\n\n1. **Data Ingestion Layer**: Apache Kafka-based streaming platform processing 10M+ events/day\n2. **Analytics Engine**: Databricks lakehouse with ML pipelines for predictive analytics\n3. **Visualization**: Power BI dashboards with role-based access controls\n4. **Security**: Zero-trust architecture with continuous ATO compliance monitoring", status: 'Revision Needed', priority: 'High', created_at: '2026-02-01T16:30:00Z', assigned_to: 'SA', reviewer_id: 'Mike J.', feedback: 'Good structure but needs more specificity on VAEC compliance requirements. Add FedRAMP High inheritance details.' }
        ];
        
        function HITLQueueApp() {
            const [opportunities, setOpportunities] = useState([]);
            const [queue, setQueue] = useState([]);
            const [isDemo, setIsDemo] = useState(true);
            const [loading, setLoading] = useState(true);
            const [selectedItem, setSelectedItem] = useState(null);
            const [filterStatus, setFilterStatus] = useState('all');
            const [filterPriority, setFilterPriority] = useState('all');
            const [filterType, setFilterType] = useState('all');
            const [showApproved, setShowApproved] = useState(false);
            
            useEffect(() => { loadData(); }, []);
            
            const loadData = async () => {
                try {
                    const { data: oppData } = await supabase.from('opportunities').select('id, title, nickname');
                    const { data: queueData } = await supabase.from('ai_approvals').select('*').order('created_at', { ascending: false });
                    
                    if (oppData?.length > 0) {
                        setOpportunities(oppData);
                        setQueue(queueData || []);
                        setIsDemo(false);
                    } else {
                        setOpportunities(DEMO_OPPORTUNITIES);
                        setQueue(DEMO_QUEUE);
                        setIsDemo(true);
                    }
                } catch {
                    setOpportunities(DEMO_OPPORTUNITIES);
                    setQueue(DEMO_QUEUE);
                    setIsDemo(true);
                }
                setLoading(false);
            };
            
            const updateItemStatus = async (itemId, newStatus, feedback = '') => {
                const updateData = { 
                    status: newStatus, 
                    feedback: feedback || undefined,
                    reviewed_at: new Date().toISOString()
                };
                
                if (isDemo) {
                    setQueue(prev => prev.map(q => q.id === itemId ? { ...q, ...updateData } : q));
                    setSelectedItem(null);
                    return;
                }
                
                try {
                    await supabase.from('ai_approvals').update(updateData).eq('id', itemId);
                    loadData();
                    setSelectedItem(null);
                } catch (err) { console.error(err); }
            };
            
            const getOppName = (oppId) => {
                const opp = opportunities.find(o => o.id === oppId);
                return opp ? (opp.nickname || opp.title) : 'Unknown';
            };
            
            const getContentTypeInfo = (typeId) => CONTENT_TYPES.find(t => t.id === typeId) || { name: typeId, icon: '📄', agent: 'AI Agent' };
            
            const getStatusColor = (status) => {
                const colors = {
                    'Pending': 'text-amber-400 bg-amber-400/20',
                    'In Review': 'text-cyan-400 bg-cyan-400/20',
                    'Approved': 'text-green-400 bg-green-400/20',
                    'Rejected': 'text-red-400 bg-red-400/20',
                    'Revision Needed': 'text-purple-400 bg-purple-400/20'
                };
                return colors[status] || 'text-gray-400 bg-gray-400/20';
            };
            
            const getPriorityColor = (priority) => {
                const colors = {
                    'Critical': 'text-red-400 bg-red-400/20 urgent-badge',
                    'High': 'text-orange-400 bg-orange-400/20',
                    'Medium': 'text-amber-400 bg-amber-400/20',
                    'Low': 'text-green-400 bg-green-400/20'
                };
                return colors[priority] || 'text-gray-400 bg-gray-400/20';
            };
            
            const getTimeAgo = (dateStr) => {
                const diff = Date.now() - new Date(dateStr).getTime();
                const hours = Math.floor(diff / (1000 * 60 * 60));
                if (hours < 1) return 'Just now';
                if (hours < 24) return `${hours}h ago`;
                return `${Math.floor(hours / 24)}d ago`;
            };
            
            const filteredQueue = queue.filter(item => {
                if (!showApproved && (item.status === 'Approved' || item.status === 'Rejected')) return false;
                if (filterStatus !== 'all' && item.status !== filterStatus) return false;
                if (filterPriority !== 'all' && item.priority !== filterPriority) return false;
                if (filterType !== 'all' && item.content_type !== filterType) return false;
                return true;
            });
            
            const pendingCount = queue.filter(q => q.status === 'Pending' || q.status === 'Revision Needed').length;
            const criticalCount = queue.filter(q => q.priority === 'Critical' && q.status === 'Pending').length;
            
            if (loading) return <div className="flex items-center justify-center h-screen"><div className="text-cyan-400 text-xl">Loading HITL Queue...</div></div>;
            
            return (
                <div className="max-w-7xl mx-auto">
                    <div className="flex items-center justify-between mb-6">
                        <div className="flex items-center gap-4">
                            <a href="missionpulse-nav-hub.html" className="text-cyan-400 hover:text-cyan-300">← Hub</a>
                            <h1 className="text-3xl font-bold text-white glow-text">🤖 HITL Review Queue</h1>
                            <span className={`px-3 py-1 rounded-full text-xs ${isDemo ? 'bg-amber-500/20 text-amber-400' : 'bg-green-500/20 text-green-400 live-indicator'}`}>
                                {isDemo ? '○ Demo Mode' : '● Live'}
                            </span>
                        </div>
                        <div className="flex items-center gap-4">
                            {criticalCount > 0 && (
                                <span className="px-3 py-1 bg-red-500/20 text-red-400 rounded-full text-sm urgent-badge">
                                    🚨 {criticalCount} Critical
                                </span>
                            )}
                            <span className="px-3 py-1 bg-amber-500/20 text-amber-400 rounded-full text-sm">
                                {pendingCount} Pending Review
                            </span>
                        </div>
                    </div>
                    
                    {/* Stats */}
                    <div className="grid grid-cols-5 gap-4 mb-6">
                        <div className="glass-dark p-4 rounded-lg text-center">
                            <div className="text-2xl font-bold text-white">{queue.length}</div>
                            <div className="text-xs text-gray-400">Total Items</div>
                        </div>
                        <div className="glass-dark p-4 rounded-lg text-center">
                            <div className="text-2xl font-bold text-amber-400">{queue.filter(q => q.status === 'Pending').length}</div>
                            <div className="text-xs text-gray-400">Pending</div>
                        </div>
                        <div className="glass-dark p-4 rounded-lg text-center">
                            <div className="text-2xl font-bold text-cyan-400">{queue.filter(q => q.status === 'In Review').length}</div>
                            <div className="text-xs text-gray-400">In Review</div>
                        </div>
                        <div className="glass-dark p-4 rounded-lg text-center">
                            <div className="text-2xl font-bold text-green-400">{queue.filter(q => q.status === 'Approved').length}</div>
                            <div className="text-xs text-gray-400">Approved</div>
                        </div>
                        <div className="glass-dark p-4 rounded-lg text-center">
                            <div className="text-2xl font-bold text-purple-400">{queue.filter(q => q.status === 'Revision Needed').length}</div>
                            <div className="text-xs text-gray-400">Needs Revision</div>
                        </div>
                    </div>
                    
                    {/* Filters */}
                    <div className="flex gap-4 mb-6 flex-wrap">
                        <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)} className="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm">
                            <option value="all">All Statuses</option>
                            {QUEUE_STATUS.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                        <select value={filterPriority} onChange={(e) => setFilterPriority(e.target.value)} className="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm">
                            <option value="all">All Priorities</option>
                            {PRIORITY_LEVELS.map(p => <option key={p} value={p}>{p}</option>)}
                        </select>
                        <select value={filterType} onChange={(e) => setFilterType(e.target.value)} className="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm">
                            <option value="all">All Content Types</option>
                            {CONTENT_TYPES.map(t => <option key={t.id} value={t.id}>{t.icon} {t.name}</option>)}
                        </select>
                        <label className="flex items-center gap-2 text-sm text-gray-400 cursor-pointer">
                            <input type="checkbox" checked={showApproved} onChange={(e) => setShowApproved(e.target.checked)} className="rounded" />
                            Show Completed
                        </label>
                    </div>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* Queue List */}
                        <div className="glass rounded-xl p-4 glow">
                            <h2 className="text-lg font-semibold text-cyan-400 mb-4">Review Queue</h2>
                            <div className="space-y-3 max-h-[600px] overflow-y-auto">
                                {filteredQueue.length === 0 ? (
                                    <div className="text-center py-8 text-gray-400">
                                        <div className="text-4xl mb-2">✅</div>
                                        <div>No items pending review!</div>
                                    </div>
                                ) : filteredQueue.map(item => {
                                    const typeInfo = getContentTypeInfo(item.content_type);
                                    const isSelected = selectedItem?.id === item.id;
                                    return (
                                        <div 
                                            key={item.id}
                                            onClick={() => setSelectedItem(item)}
                                            className={`glass-dark p-4 rounded-lg cursor-pointer queue-item ${isSelected ? 'border-cyan-400' : ''}`}
                                        >
                                            <div className="flex items-start justify-between mb-2">
                                                <div className="flex items-center gap-2">
                                                    <span className="text-xl">{typeInfo.icon}</span>
                                                    <div>
                                                        <div className="font-medium text-white">{typeInfo.name}</div>
                                                        <div className="text-xs text-gray-400">{typeInfo.agent}</div>
                                                    </div>
                                                </div>
                                                <div className="flex flex-col items-end gap-1">
                                                    <span className={`px-2 py-1 rounded text-xs ${getPriorityColor(item.priority)}`}>{item.priority}</span>
                                                    <span className={`px-2 py-1 rounded text-xs ${getStatusColor(item.status)}`}>{item.status}</span>
                                                </div>
                                            </div>
                                            <div className="flex items-center justify-between text-xs text-gray-500">
                                                <span>{getOppName(item.opportunity_id)}</span>
                                                <span>{getTimeAgo(item.created_at)}</span>
                                            </div>
                                            {item.feedback && (
                                                <div className="mt-2 p-2 bg-gray-800/50 rounded text-xs text-gray-400 line-clamp-2">
                                                    💬 {item.feedback}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                        
                        {/* Detail Panel */}
                        <div className="glass rounded-xl p-4 glow">
                            {selectedItem ? (
                                <>
                                    <div className="flex items-start justify-between mb-4">
                                        <div>
                                            <h2 className="text-lg font-semibold text-cyan-400">{getContentTypeInfo(selectedItem.content_type).name}</h2>
                                            <div className="text-sm text-gray-400">{getOppName(selectedItem.opportunity_id)} • {getContentTypeInfo(selectedItem.content_type).agent}</div>
                                        </div>
                                        <div className="flex gap-2">
                                            <span className={`px-2 py-1 rounded text-xs ${getPriorityColor(selectedItem.priority)}`}>{selectedItem.priority}</span>
                                            <span className={`px-2 py-1 rounded text-xs ${getStatusColor(selectedItem.status)}`}>{selectedItem.status}</span>
                                        </div>
                                    </div>
                                    
                                    {/* AI Output */}
                                    <div className="mb-4">
                                        <div className="text-xs text-gray-400 mb-2 flex items-center gap-2">
                                            <span>🤖 AI-Generated Content</span>
                                            <span className="px-2 py-0.5 bg-purple-500/20 text-purple-400 rounded text-[10px]">REQUIRES HUMAN REVIEW</span>
                                        </div>
                                        <div className="ai-output p-4 rounded-lg border border-purple-500/30 max-h-[300px] overflow-y-auto">
                                            <pre className="text-sm text-gray-200 whitespace-pre-wrap font-sans">{selectedItem.ai_output}</pre>
                                        </div>
                                    </div>
                                    
                                    {/* Previous Feedback */}
                                    {selectedItem.feedback && (
                                        <div className="mb-4 p-3 bg-gray-800/50 rounded-lg">
                                            <div className="text-xs text-gray-400 mb-1">Previous Feedback ({selectedItem.reviewer_id || 'Reviewer'})</div>
                                            <div className="text-sm text-gray-300">{selectedItem.feedback}</div>
                                        </div>
                                    )}
                                    
                                    {/* Actions */}
                                    {(selectedItem.status === 'Pending' || selectedItem.status === 'In Review' || selectedItem.status === 'Revision Needed') && (
                                        <ReviewActions item={selectedItem} onAction={updateItemStatus} />
                                    )}
                                </>
                            ) : (
                                <div className="flex flex-col items-center justify-center h-[400px] text-gray-400">
                                    <div className="text-6xl mb-4">👈</div>
                                    <div>Select an item from the queue to review</div>
                                </div>
                            )}
                        </div>
                    </div>
                    
                    {/* AI Disclaimer */}
                    <div className="mt-6 p-4 glass-dark rounded-lg border border-amber-500/30">
                        <div className="flex items-start gap-3">
                            <span className="text-2xl">⚠️</span>
                            <div>
                                <div className="font-semibold text-amber-400">Human-In-The-Loop Review Required</div>
                                <div className="text-sm text-gray-400 mt-1">
                                    All AI-generated content must be reviewed and approved by a qualified human reviewer before use in proposals. 
                                    AI outputs may contain errors, hallucinations, or non-compliant content. Reviewers are responsible for accuracy and compliance.
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div className="text-center text-xs text-gray-500 mt-8 pt-4 border-t border-gray-800">MissionPulse v12 • HITL Review Queue • AI outputs require human review</div>
                </div>
            );
        }
        
        function ReviewActions({ item, onAction }) {
            const [feedback, setFeedback] = useState('');
            const [showFeedback, setShowFeedback] = useState(false);
            
            const handleAction = (status) => {
                if (status === 'Rejected' || status === 'Revision Needed') {
                    setShowFeedback(true);
                    return;
                }
                onAction(item.id, status, feedback);
            };
            
            const submitWithFeedback = (status) => {
                if (!feedback.trim()) {
                    alert('Please provide feedback for rejected or revision requests');
                    return;
                }
                onAction(item.id, status, feedback);
            };
            
            if (showFeedback) {
                return (
                    <div className="space-y-3">
                        <div>
                            <label className="block text-sm text-gray-400 mb-1">Feedback / Instructions *</label>
                            <textarea 
                                value={feedback} 
                                onChange={(e) => setFeedback(e.target.value)}
                                className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white h-24"
                                placeholder="Provide specific feedback for the AI to improve the output..."
                            />
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => submitWithFeedback('Revision Needed')} className="flex-1 px-4 py-2 bg-purple-500 hover:bg-purple-400 text-white font-semibold rounded-lg">
                                🔄 Request Revision
                            </button>
                            <button onClick={() => submitWithFeedback('Rejected')} className="flex-1 px-4 py-2 bg-red-500 hover:bg-red-400 text-white font-semibold rounded-lg">
                                ❌ Reject
                            </button>
                            <button onClick={() => setShowFeedback(false)} className="px-4 py-2 border border-gray-600 text-gray-300 rounded-lg hover:bg-gray-800">
                                Cancel
                            </button>
                        </div>
                    </div>
                );
            }
            
            return (
                <div className="space-y-3">
                    <div>
                        <label className="block text-sm text-gray-400 mb-1">Feedback (Optional)</label>
                        <textarea 
                            value={feedback} 
                            onChange={(e) => setFeedback(e.target.value)}
                            className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white h-16"
                            placeholder="Add notes about edits made or approval conditions..."
                        />
                    </div>
                    <div className="flex gap-2">
                        <button onClick={() => handleAction('Approved')} className="flex-1 px-4 py-2 bg-green-500 hover:bg-green-400 text-black font-semibold rounded-lg">
                            ✅ Approve
                        </button>
                        <button onClick={() => handleAction('Revision Needed')} className="flex-1 px-4 py-2 bg-purple-500 hover:bg-purple-400 text-white font-semibold rounded-lg">
                            🔄 Revise
                        </button>
                        <button onClick={() => handleAction('Rejected')} className="px-4 py-2 bg-red-500 hover:bg-red-400 text-white font-semibold rounded-lg">
                            ❌ Reject
                        </button>
                    </div>
                    {item.status === 'Pending' && (
                        <button onClick={() => onAction(item.id, 'In Review')} className="w-full px-4 py-2 border border-cyan-500 text-cyan-400 rounded-lg hover:bg-cyan-500/10">
                            📋 Mark as In Review
                        </button>
                    )}
                </div>
            );
        }
        
        ReactDOM.render(<HITLQueueApp />, document.getElementById('root'));
    </script>
</body>
</html>
