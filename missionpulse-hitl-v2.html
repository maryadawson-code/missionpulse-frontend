<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HITL Queue | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:#00050F;color:#e2e8f0;min-height:100vh}.glass{background:rgba(15,23,42,0.85);backdrop-filter:blur(16px);border:1px solid rgba(0,229,250,0.1);border-radius:12px}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const SUPABASE_URL='https://qdrtpnpnhkxvfmvfziop.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
const supabase=window.supabase?.createClient(SUPABASE_URL,SUPABASE_ANON);

const AGENTS=['Capture','Strategy','Writer','Compliance','Pricing','Contracts','Orals','BlackHat'];

function HITLQueue(){
  const[connected,setConnected]=useState(false);
  const[queue,setQueue]=useState([]);
  const[selected,setSelected]=useState(null);
  const[filter,setFilter]=useState('pending');

  useEffect(()=>{
    const load=async()=>{
      try{
        const{data,error}=await supabase.from('ai_approvals').select('*').order('created_at',{ascending:false});
        if(!error)setQueue(data||[]);
        setConnected(!error);
      }catch{setConnected(false)}
    };
    load();
  },[]);

  const updateStatus=async(id,status)=>{
    try{
      await supabase.from('ai_approvals').update({status,reviewed_at:new Date().toISOString()}).eq('id',id);
      setQueue(queue.map(q=>q.id===id?{...q,status}:q));
      setSelected(null);
    }catch(e){alert('Error: '+e.message)}
  };

  const filtered=filter==='all'?queue:queue.filter(q=>q.status===filter);
  const agentColor={Capture:'bg-blue-500/20 text-blue-400',Strategy:'bg-purple-500/20 text-purple-400',Writer:'bg-cyan-500/20 text-cyan-400',Compliance:'bg-emerald-500/20 text-emerald-400',Pricing:'bg-amber-500/20 text-amber-400',Contracts:'bg-orange-500/20 text-orange-400',Orals:'bg-pink-500/20 text-pink-400',BlackHat:'bg-red-500/20 text-red-400'};

  return(
    <div className="min-h-screen p-6">
      <div className="flex justify-between items-start mb-6">
        <div>
          <h1 className="text-2xl font-bold text-white flex items-center gap-3">🤖 Human-in-the-Loop Queue<span className={`text-xs px-2 py-1 rounded ${connected?'bg-emerald-500/20 text-emerald-400':'bg-red-500/20 text-red-400'}`}>{connected?'● Live':'○ Demo'}</span></h1>
          <p className="text-slate-400 text-sm mt-1">Review and approve AI-generated content</p>
        </div>
      </div>

      <div className="grid grid-cols-5 gap-4 mb-6">
        <div className="glass p-4"><div className="text-slate-400 text-xs">Pending</div><div className="text-2xl font-bold text-amber-400">{queue.filter(q=>q.status==='pending').length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">In Review</div><div className="text-2xl font-bold text-cyan-400">{queue.filter(q=>q.status==='review').length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Approved</div><div className="text-2xl font-bold text-emerald-400">{queue.filter(q=>q.status==='approved').length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Rejected</div><div className="text-2xl font-bold text-red-400">{queue.filter(q=>q.status==='rejected').length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Avg Confidence</div><div className="text-2xl font-bold text-purple-400">{queue.length?Math.round(queue.reduce((s,q)=>s+(q.confidence||0),0)/queue.length):0}%</div></div>
      </div>

      <div className="flex gap-2 mb-4">
        {['pending','review','approved','rejected','all'].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} className={`px-3 py-1.5 rounded-lg text-sm capitalize ${filter===f?'bg-cyan-500 text-white':'bg-slate-800 text-slate-400'}`}>{f}</button>
        ))}
      </div>

      <div className="grid grid-cols-12 gap-6">
        <div className="col-span-5">
          <div className="glass p-4">
            <h3 className="font-semibold text-white mb-3">Queue Items</h3>
            <div className="space-y-2 max-h-[500px] overflow-y-auto">
              {filtered.map(item=>(
                <div key={item.id} onClick={()=>setSelected(item)} className={`p-3 rounded-lg cursor-pointer transition-all ${selected?.id===item.id?'bg-cyan-500/20 border border-cyan-500/50':'bg-slate-800/50 hover:bg-slate-700/50'}`}>
                  <div className="flex justify-between items-start">
                    <div>
                      <span className={`text-xs px-1.5 py-0.5 rounded ${agentColor[item.agent]||'bg-slate-500/20 text-slate-400'}`}>{item.agent}</span>
                      <div className="font-medium text-white text-sm mt-1">{item.title}</div>
                      <div className="text-xs text-slate-500">{item.type}</div>
                    </div>
                    <div className="text-right">
                      <div className={`text-xs ${item.confidence>=80?'text-emerald-400':item.confidence>=60?'text-amber-400':'text-red-400'}`}>{item.confidence}%</div>
                    </div>
                  </div>
                </div>
              ))}
              {filtered.length===0&&<p className="text-slate-500 text-sm text-center py-4">No items in queue</p>}
            </div>
          </div>
        </div>

        <div className="col-span-7">
          {selected?(
            <div className="glass p-6">
              <div className="flex justify-between items-start mb-4">
                <div>
                  <span className={`text-xs px-2 py-0.5 rounded ${agentColor[selected.agent]}`}>{selected.agent} Agent</span>
                  <h3 className="text-lg font-bold text-white mt-2">{selected.title}</h3>
                  <p className="text-sm text-slate-400">{selected.type}</p>
                </div>
                <div className="text-right">
                  <div className="text-2xl font-bold" style={{color:selected.confidence>=80?'#34d399':selected.confidence>=60?'#fbbf24':'#f87171'}}>{selected.confidence}%</div>
                  <div className="text-xs text-slate-500">Confidence</div>
                </div>
              </div>

              <div className="bg-slate-800/50 rounded-lg p-4 mb-4 max-h-64 overflow-y-auto">
                <div className="text-sm text-slate-300 whitespace-pre-wrap">{selected.content||'AI-generated content will appear here for review. This output was produced by the '+selected.agent+' Agent and requires human validation before use in the proposal.'}</div>
              </div>

              <div className="bg-amber-500/10 border border-amber-500/30 rounded-lg p-3 mb-4">
                <div className="flex items-center gap-2 text-amber-400 text-sm">
                  <span>⚠️</span>
                  <span>AI GENERATED - REQUIRES HUMAN REVIEW</span>
                </div>
              </div>

              <div className="flex gap-3">
                <button onClick={()=>updateStatus(selected.id,'approved')} className="flex-1 px-4 py-2 bg-emerald-500 text-white rounded-lg">✓ Approve</button>
                <button onClick={()=>updateStatus(selected.id,'review')} className="flex-1 px-4 py-2 bg-amber-500 text-white rounded-lg">📝 Request Changes</button>
                <button onClick={()=>updateStatus(selected.id,'rejected')} className="flex-1 px-4 py-2 bg-red-500 text-white rounded-lg">✗ Reject</button>
              </div>
            </div>
          ):(
            <div className="glass p-12 text-center">
              <span className="text-6xl">🤖</span>
              <p className="text-slate-400 mt-4">Select an item to review</p>
            </div>
          )}
        </div>
      </div>
      <div className="text-center text-xs text-slate-500 mt-8">AI GENERATED - REQUIRES HUMAN REVIEW | © 2026 Mission Meets Tech</div>
    </div>
  );
}
ReactDOM.render(<HITLQueue/>,document.getElementById('root'));
</script>
</body>
</html>
