<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | HITL Queue</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-cyan { 0%, 100% { box-shadow: 0 0 0 0 rgba(0, 229, 250, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(0, 229, 250, 0); } }
    .pulse-icon { animation: pulse-cyan 2s infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const DEMO_QUEUE = [
      {
        id: '1',
        agent_type: 'Strategy',
        content_type: 'Win Theme',
        opportunity: 'EHR-Mod',
        ai_output: 'Win Theme: Zero-Disruption Transition\n\nOur proven methodology ensures seamless EHR migrations without service interruption. We have completed 12 similar transitions with zero downtime and 99.99% data integrity.\n\nProof Points:\n• Migrated 1.8M patient records at VA in 2024\n• Achieved 100% data validation on MHS Genesis pilot\n• Developed proprietary cutover toolkit reducing risk by 60%\n\nThis discriminator directly addresses DHA\'s primary concern about continuity of care during transition.',
        confidence_score: 87,
        status: 'Pending',
        created_at: '2026-01-30T10:30:00Z'
      },
      {
        id: '2',
        agent_type: 'Pricing',
        content_type: 'Labor Rate Analysis',
        opportunity: 'EHR-Mod',
        ai_output: 'Recommended blended rate: $142.50/hr\n\nBasis of Estimate:\n• GSA Schedule rate: $155/hr\n• Competitive benchmark: $138-148/hr\n• DHA historical awards: $140-145/hr\n\nRecommendation: Position at $142.50 (3.2% below GSA) to demonstrate value while maintaining profitability. This rate is competitive against Leidos ($148) and GDIT ($146).\n\nRisk: Pricing below $140 may trigger price realism concerns.',
        confidence_score: 92,
        status: 'Pending',
        created_at: '2026-01-30T09:15:00Z'
      },
      {
        id: '3',
        agent_type: 'Compliance',
        content_type: 'FAR Clause Analysis',
        opportunity: 'VA-CPA',
        ai_output: 'FAR 52.204-21 Analysis:\n\nThis clause requires basic safeguarding of covered contractor information systems. Current compliance status: COMPLIANT\n\nRequired actions:\n✓ Limit access to authorized users\n✓ Authenticate users before access\n✓ Sanitize media before disposal\n✓ Monitor communications at boundaries\n\nNote: This is baseline requirement. DFARS 252.204-7012 (CMMC) may also apply given DoD nature of work.',
        confidence_score: 95,
        status: 'Approved',
        created_at: '2026-01-29T16:45:00Z',
        reviewed_at: '2026-01-29T17:30:00Z'
      },
      {
        id: '4',
        agent_type: 'Writer',
        content_type: 'Technical Approach Draft',
        opportunity: 'CMS-Fraud',
        ai_output: 'Section 3.1: Technical Approach Overview\n\nMission Meets Tech proposes a hybrid AI/ML platform leveraging ensemble learning models specifically trained on Medicare claims data patterns. Our approach combines:\n\n1. Real-time anomaly detection using gradient boosted decision trees\n2. Network analysis to identify provider collusion patterns\n3. Natural language processing for medical record verification\n\nThis architecture has demonstrated 94% detection accuracy in pilot testing with 0.3% false positive rate, significantly exceeding the industry benchmark of 85%.',
        confidence_score: 78,
        status: 'Pending',
        created_at: '2026-01-30T08:00:00Z'
      },
      {
        id: '5',
        agent_type: 'Black Hat',
        content_type: 'Competitor Ghost',
        opportunity: 'EHR-Mod',
        ai_output: 'Ghost Theme against Leidos:\n\n"While some competitors may offer scale, their size often leads to bureaucratic delays and cookie-cutter solutions. Our agile team structure enables rapid response to DHA needs without the overhead that inflates costs and slows decision-making."\n\nTargets:\n• Leidos overhead rates (typically 15-20% higher)\n• Recent delivery issues on similar contracts\n• Staff turnover in health IT division',
        confidence_score: 82,
        status: 'Rejected',
        created_at: '2026-01-29T14:20:00Z',
        reviewed_at: '2026-01-29T15:00:00Z',
        feedback: 'Ghost theme too aggressive. Soften language to focus on our strengths rather than direct competitor criticism.'
      }
    ];

    const AGENT_COLORS = {
      Strategy: 'bg-purple-500/20 text-purple-400 border-purple-500/30',
      Pricing: 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30',
      Compliance: 'bg-blue-500/20 text-blue-400 border-blue-500/30',
      Writer: 'bg-cyan-500/20 text-cyan-400 border-cyan-500/30',
      'Black Hat': 'bg-red-500/20 text-red-400 border-red-500/30',
      Capture: 'bg-amber-500/20 text-amber-400 border-amber-500/30',
      Contracts: 'bg-indigo-500/20 text-indigo-400 border-indigo-500/30',
      Orals: 'bg-pink-500/20 text-pink-400 border-pink-500/30'
    };

    // Sidebar
    function Sidebar() {
      const navItems = [
        { icon: '🏠', label: 'Dashboard', path: 'index.html' },
        { icon: '📊', label: 'Pipeline', path: 'missionpulse-pipeline-v2.html' },
        { icon: '🎯', label: 'War Room', path: 'missionpulse-warroom-v2.html' },
        { icon: '🔍', label: 'RFP Shredder', path: 'missionpulse-rfpshredder-v2.html' },
        { icon: '🤖', label: 'HITL Queue', path: 'missionpulse-hitl-v2.html', active: true },
        { icon: '🤖', label: 'Agent Hub', path: 'missionpulse-agenthub-v2.html' },
        { icon: '⚙️', label: 'Settings', path: 'missionpulse-settings-v2.html' }
      ];

      return (
        <div className="w-64 bg-slate-900/50 border-r border-slate-700 min-h-screen p-4 hidden lg:block">
          <div className="flex items-center gap-3 mb-8">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center pulse-icon">
              <span className="text-xl">🛡️</span>
            </div>
            <div>
              <div className="font-bold text-cyan-400">MissionPulse</div>
              <div className="text-xs text-slate-400">HITL Queue</div>
            </div>
          </div>
          
          <nav className="space-y-1">
            {navItems.map((item, i) => (
              <a 
                key={i}
                href={item.path}
                className={`flex items-center gap-3 px-3 py-2 rounded-lg transition-all ${
                  item.active 
                    ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' 
                    : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                }`}
              >
                <span>{item.icon}</span>
                <span className="text-sm">{item.label}</span>
              </a>
            ))}
          </nav>
        </div>
      );
    }

    // Review Modal
    function ReviewModal({ item, onClose, onAction }) {
      const [editedOutput, setEditedOutput] = React.useState(item.ai_output);
      const [feedback, setFeedback] = React.useState('');

      return (
        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
          <div className="bg-slate-800 border border-slate-700 rounded-xl max-w-3xl w-full max-h-[90vh] overflow-y-auto">
            <div className="p-6 border-b border-slate-700">
              <div className="flex items-center justify-between">
                <div>
                  <div className="flex items-center gap-2 mb-1">
                    <span className={`px-2 py-0.5 rounded text-xs border ${AGENT_COLORS[item.agent_type]}`}>
                      {item.agent_type} Agent
                    </span>
                    <span className="text-slate-400 text-sm">•</span>
                    <span className="text-sm text-slate-400">{item.content_type}</span>
                  </div>
                  <h2 className="text-xl font-bold">{item.opportunity}</h2>
                </div>
                <button onClick={onClose} className="text-slate-400 hover:text-white text-xl">×</button>
              </div>
            </div>
            
            <div className="p-6 space-y-4">
              {/* Confidence Score */}
              <div className="flex items-center gap-4">
                <div className="text-sm text-slate-400">AI Confidence:</div>
                <div className="flex-1 h-2 bg-slate-700 rounded-full overflow-hidden">
                  <div 
                    className={`h-full rounded-full ${
                      item.confidence_score >= 90 ? 'bg-emerald-500' :
                      item.confidence_score >= 75 ? 'bg-cyan-500' :
                      item.confidence_score >= 60 ? 'bg-amber-500' : 'bg-red-500'
                    }`}
                    style={{ width: `${item.confidence_score}%` }}
                  />
                </div>
                <div className="font-bold">{item.confidence_score}%</div>
              </div>

              {/* AI Output */}
              <div>
                <label className="block text-sm text-slate-400 mb-2">AI Output (editable)</label>
                <textarea
                  value={editedOutput}
                  onChange={(e) => setEditedOutput(e.target.value)}
                  rows={12}
                  className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-sm font-mono focus:outline-none focus:border-cyan-500 resize-none"
                />
              </div>

              {/* Feedback */}
              <div>
                <label className="block text-sm text-slate-400 mb-2">Feedback (optional)</label>
                <textarea
                  value={feedback}
                  onChange={(e) => setFeedback(e.target.value)}
                  rows={3}
                  placeholder="Provide feedback for the AI agent..."
                  className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-cyan-500 resize-none"
                />
              </div>
            </div>

            <div className="p-6 border-t border-slate-700 flex justify-between">
              <button
                onClick={() => onAction(item.id, 'Rejected', editedOutput, feedback)}
                className="px-4 py-2 bg-red-500/20 hover:bg-red-500/30 border border-red-500/30 text-red-400 rounded-lg text-sm"
              >
                ✗ Reject
              </button>
              <div className="flex gap-3">
                <button
                  onClick={onClose}
                  className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm"
                >
                  Cancel
                </button>
                <button
                  onClick={() => onAction(item.id, 'Approved', editedOutput, feedback)}
                  className="px-6 py-2 bg-emerald-500 hover:bg-emerald-400 text-slate-900 rounded-lg text-sm font-medium"
                >
                  ✓ Approve
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [queue, setQueue] = React.useState(DEMO_QUEUE);
      const [filter, setFilter] = React.useState('all');
      const [selectedItem, setSelectedItem] = React.useState(null);
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);

      React.useEffect(() => {
        loadQueue();
      }, []);

      const loadQueue = async () => {
        try {
          const { data, error } = await supabase
            .from('ai_approvals')
            .select('*')
            .order('created_at', { ascending: false });
          
          if (!error && data && data.length > 0) {
            setQueue(data);
            setConnected(true);
          }
        } catch (e) {
          console.log('Using demo queue');
        }
        setLoading(false);
      };

      const handleAction = async (id, status, editedOutput, feedback) => {
        try {
          if (connected) {
            const { error } = await supabase
              .from('ai_approvals')
              .update({
                status,
                human_edited: editedOutput,
                feedback,
                reviewed_at: new Date().toISOString()
              })
              .eq('id', id);
            
            if (error) throw error;
          }

          setQueue(prev => prev.map(item => 
            item.id === id 
              ? { ...item, status, human_edited: editedOutput, feedback, reviewed_at: new Date().toISOString() }
              : item
          ));
          setSelectedItem(null);
        } catch (e) {
          console.error('Update failed:', e);
        }
      };

      const filteredQueue = filter === 'all' 
        ? queue 
        : queue.filter(q => q.status === filter);

      const pendingCount = queue.filter(q => q.status === 'Pending').length;
      const approvedCount = queue.filter(q => q.status === 'Approved').length;
      const rejectedCount = queue.filter(q => q.status === 'Rejected').length;

      const statusColors = {
        Pending: 'bg-amber-500/20 text-amber-400',
        Approved: 'bg-emerald-500/20 text-emerald-400',
        Rejected: 'bg-red-500/20 text-red-400'
      };

      return (
        <div className="flex min-h-screen">
          <Sidebar />
          
          <div className="flex-1 p-4 lg:p-6">
            {/* Header */}
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
              <div>
                <h1 className="text-2xl font-bold">HITL Queue</h1>
                <p className="text-slate-400 text-sm">Human-in-the-loop review of AI outputs</p>
              </div>
              
              <div className={`px-3 py-1.5 rounded-lg text-sm ${
                connected 
                  ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' 
                  : 'bg-amber-500/20 text-amber-400 border border-amber-500/30'
              }`}>
                {connected ? '● Connected' : '○ Demo Mode'}
              </div>
            </div>

            {/* Stats */}
            <div className="grid grid-cols-3 gap-4 mb-6">
              <div 
                onClick={() => setFilter(filter === 'Pending' ? 'all' : 'Pending')}
                className={`bg-slate-800/50 border rounded-xl p-4 cursor-pointer transition-all ${
                  filter === 'Pending' ? 'border-amber-500/50' : 'border-slate-700 hover:border-slate-600'
                }`}
              >
                <div className="text-3xl font-bold text-amber-400">{pendingCount}</div>
                <div className="text-sm text-slate-400">Pending Review</div>
              </div>
              <div 
                onClick={() => setFilter(filter === 'Approved' ? 'all' : 'Approved')}
                className={`bg-slate-800/50 border rounded-xl p-4 cursor-pointer transition-all ${
                  filter === 'Approved' ? 'border-emerald-500/50' : 'border-slate-700 hover:border-slate-600'
                }`}
              >
                <div className="text-3xl font-bold text-emerald-400">{approvedCount}</div>
                <div className="text-sm text-slate-400">Approved</div>
              </div>
              <div 
                onClick={() => setFilter(filter === 'Rejected' ? 'all' : 'Rejected')}
                className={`bg-slate-800/50 border rounded-xl p-4 cursor-pointer transition-all ${
                  filter === 'Rejected' ? 'border-red-500/50' : 'border-slate-700 hover:border-slate-600'
                }`}
              >
                <div className="text-3xl font-bold text-red-400">{rejectedCount}</div>
                <div className="text-sm text-slate-400">Rejected</div>
              </div>
            </div>

            {/* Queue List */}
            <div className="space-y-3">
              {loading ? (
                <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-8 text-center text-slate-500">
                  Loading queue...
                </div>
              ) : filteredQueue.length === 0 ? (
                <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-8 text-center text-slate-500">
                  No items in queue
                </div>
              ) : (
                filteredQueue.map(item => (
                  <div 
                    key={item.id}
                    className="bg-slate-800/50 border border-slate-700 rounded-xl p-4 hover:border-slate-600 transition-colors"
                  >
                    <div className="flex items-start justify-between gap-4">
                      <div className="flex-1">
                        <div className="flex items-center gap-2 mb-2">
                          <span className={`px-2 py-0.5 rounded text-xs border ${AGENT_COLORS[item.agent_type]}`}>
                            {item.agent_type}
                          </span>
                          <span className="text-sm text-slate-400">{item.content_type}</span>
                          <span className="text-slate-600">•</span>
                          <span className="text-sm text-cyan-400">{item.opportunity}</span>
                        </div>
                        <p className="text-sm text-slate-300 line-clamp-2">{item.ai_output}</p>
                        <div className="flex items-center gap-4 mt-2 text-xs text-slate-500">
                          <span>Confidence: {item.confidence_score}%</span>
                          <span>{new Date(item.created_at).toLocaleString()}</span>
                        </div>
                      </div>
                      <div className="flex items-center gap-3">
                        <span className={`px-2 py-1 rounded text-xs ${statusColors[item.status]}`}>
                          {item.status}
                        </span>
                        {item.status === 'Pending' ? (
                          <button
                            onClick={() => setSelectedItem(item)}
                            className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg text-sm font-medium"
                          >
                            Review
                          </button>
                        ) : (
                          <button
                            onClick={() => setSelectedItem(item)}
                            className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm"
                          >
                            View
                          </button>
                        )}
                      </div>
                    </div>
                    {item.feedback && (
                      <div className="mt-3 pt-3 border-t border-slate-700">
                        <div className="text-xs text-slate-500 mb-1">Feedback:</div>
                        <p className="text-sm text-slate-400">{item.feedback}</p>
                      </div>
                    )}
                  </div>
                ))
              )}
            </div>

            {/* Footer */}
            <div className="mt-8 text-center text-xs text-slate-500">
              <div>Mission Meets Tech | MissionPulse HITL Queue</div>
              <div className="mt-1">AI GENERATED - REQUIRES HUMAN REVIEW</div>
            </div>
          </div>

          {/* Modal */}
          {selectedItem && (
            <ReviewModal
              item={selectedItem}
              onClose={() => setSelectedItem(null)}
              onAction={handleAction}
            />
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
