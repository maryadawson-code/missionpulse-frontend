<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - RFI Tracker</title>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; color: #fff; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-slideUp { animation: slideUp 0.5s ease-out forwards; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #111C2E; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #243656; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #00E5FA; }
    .glass-card { background: rgba(17, 28, 46, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0NDQ0NjUsImV4cCI6MjA4NTAyMDQ2NX0.3s8ufDDN2aWfkW0RBsAyJyacb2tjB7M550WSFIohHcA';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const Icons = {
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>,
      question: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>,
      plus: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>,
      send: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>,
      inbox: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>,
      clock: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6l4 2"/></svg>,
      alert: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>,
      search: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" strokeWidth={2}/><path strokeLinecap="round" strokeWidth={2} d="M21 21l-4.35-4.35"/></svg>,
      download: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>,
      x: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    const STATUS_CONFIG = {
      draft: { label: 'Draft', color: '#6B7280', icon: 'clock' },
      submitted: { label: 'Submitted', color: '#3B82F6', icon: 'send' },
      answered: { label: 'Answered', color: '#00D29F', icon: 'check' },
      clarification: { label: 'Needs Clarification', color: '#F59E0B', icon: 'alert' },
      incorporated: { label: 'Incorporated', color: '#8B5CF6', icon: 'check' },
    };

    const CATEGORIES = [
      { key: 'technical', name: 'Technical', color: '#3B82F6' },
      { key: 'pricing', name: 'Pricing', color: '#00D29F' },
      { key: 'contractual', name: 'Contractual', color: '#F59E0B' },
      { key: 'compliance', name: 'Compliance', color: '#EC4899' },
      { key: 'administrative', name: 'Administrative', color: '#8B5CF6' },
    ];

    const DEMO_QUESTIONS = [
      {
        id: 'rfi-1',
        number: 'Q-001',
        rfp_reference: 'Section L.5.1',
        category: 'technical',
        question: 'Please clarify the maximum page count for the Technical Approach volume. Does the 50-page limit include tables and charts?',
        status: 'answered',
        submitted_date: '2025-01-20',
        answer_date: '2025-01-25',
        answer: 'Tables, charts, and figures are excluded from the 50-page limit. Only narrative text counts toward the page limit.',
        impact: 'high',
        assigned_to: 'Mike Chen',
      },
      {
        id: 'rfi-2',
        number: 'Q-002',
        rfp_reference: 'Section C.3.1',
        category: 'compliance',
        question: 'Is FedRAMP Moderate authorization required at proposal submission or can it be in-process with full authorization within 90 days of award?',
        status: 'submitted',
        submitted_date: '2025-01-28',
        answer_date: null,
        answer: null,
        impact: 'critical',
        assigned_to: 'Lisa Brown',
      },
      {
        id: 'rfi-3',
        number: 'Q-003',
        rfp_reference: 'Section M.2.2',
        category: 'pricing',
        question: 'Can the pricing volume include optional CLINs not specified in the RFP if they provide additional value?',
        status: 'draft',
        submitted_date: null,
        answer_date: null,
        answer: null,
        impact: 'medium',
        assigned_to: 'James Wilson',
      },
      {
        id: 'rfi-4',
        number: 'Q-004',
        rfp_reference: 'Section L.6.1',
        category: 'administrative',
        question: 'The RFP requests 3 past performance references. Can we submit 4 references if one is particularly relevant to the MHS GENESIS requirement?',
        status: 'answered',
        submitted_date: '2025-01-22',
        answer_date: '2025-01-27',
        answer: 'Offerors may submit up to 4 references if additional references demonstrate relevant experience. The Government will evaluate all submitted references.',
        impact: 'low',
        assigned_to: 'Sarah Johnson',
      },
      {
        id: 'rfi-5',
        number: 'Q-005',
        rfp_reference: 'Amendment 002',
        category: 'contractual',
        question: 'Amendment 002 changes the contract type from FFP to T&M. Please confirm the labor categories and ceiling rates for T&M pricing.',
        status: 'clarification',
        submitted_date: '2025-01-29',
        answer_date: null,
        answer: null,
        impact: 'critical',
        assigned_to: 'Lisa Brown',
      },
    ];

    function RFITrackerApp() {
      const [questions, setQuestions] = useState(DEMO_QUESTIONS);
      const [loading, setLoading] = useState(false);
      const [searchTerm, setSearchTerm] = useState('');
      const [statusFilter, setStatusFilter] = useState('all');
      const [categoryFilter, setCategoryFilter] = useState('all');
      const [selectedQuestion, setSelectedQuestion] = useState(null);
      const [showAddModal, setShowAddModal] = useState(false);

      const filteredQuestions = questions.filter(q => {
        if (searchTerm && !q.question.toLowerCase().includes(searchTerm.toLowerCase()) &&
            !q.number.toLowerCase().includes(searchTerm.toLowerCase())) {
          return false;
        }
        if (statusFilter !== 'all' && q.status !== statusFilter) return false;
        if (categoryFilter !== 'all' && q.category !== categoryFilter) return false;
        return true;
      });

      const stats = {
        total: questions.length,
        draft: questions.filter(q => q.status === 'draft').length,
        submitted: questions.filter(q => q.status === 'submitted').length,
        answered: questions.filter(q => q.status === 'answered' || q.status === 'incorporated').length,
        pending: questions.filter(q => q.status === 'submitted' || q.status === 'clarification').length,
      };

      const updateStatus = (id, newStatus) => {
        setQuestions(prev => prev.map(q => 
          q.id === id ? { ...q, status: newStatus } : q
        ));
      };

      const exportQuestions = () => {
        const csv = [
          ['Number', 'RFP Reference', 'Category', 'Question', 'Status', 'Submitted', 'Answered', 'Answer', 'Impact'],
          ...questions.map(q => [
            q.number, q.rfp_reference, q.category, `"${q.question}"`, q.status, 
            q.submitted_date || '', q.answer_date || '', q.answer ? `"${q.answer}"` : '', q.impact
          ])
        ].map(row => row.join(',')).join('\n');

        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `rfi-questions-${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
      };

      return (
        <div className="min-h-screen bg-[#00050F]">
          <header className="glass-card border-b border-white/10 sticky top-0 z-50">
            <div className="max-w-6xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="text-gray-400 hover:text-white transition-colors">
                    <Icon name="home" className="w-5 h-5" />
                  </a>
                  <div className="w-px h-6 bg-white/20" />
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center">
                      <Icon name="question" className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white">RFI Tracker</h1>
                      <p className="text-xs text-gray-400">Questions to Government</p>
                    </div>
                  </div>
                </div>

                <div className="flex items-center gap-3">
                  <button
                    onClick={exportQuestions}
                    className="px-4 py-2 bg-[#0A1628] border border-white/10 text-gray-300 rounded-lg hover:text-white transition-colors flex items-center gap-2"
                  >
                    <Icon name="download" className="w-4 h-4" />
                    Export
                  </button>
                  <button
                    onClick={() => setShowAddModal(true)}
                    className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-blue-600 text-white rounded-lg font-medium hover:opacity-90 transition-opacity flex items-center gap-2"
                  >
                    <Icon name="plus" className="w-4 h-4" />
                    Add Question
                  </button>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-6 py-8">
            {/* Stats */}
            <div className="grid grid-cols-5 gap-4 mb-8">
              {[
                { label: 'Total', value: stats.total, color: '#00E5FA', filter: 'all' },
                { label: 'Draft', value: stats.draft, color: '#6B7280', filter: 'draft' },
                { label: 'Submitted', value: stats.submitted, color: '#3B82F6', filter: 'submitted' },
                { label: 'Answered', value: stats.answered, color: '#00D29F', filter: 'answered' },
                { label: 'Pending', value: stats.pending, color: '#F59E0B', filter: null },
              ].map((stat, idx) => (
                <button
                  key={idx}
                  onClick={() => stat.filter && setStatusFilter(stat.filter)}
                  className={`glass-card rounded-xl p-4 text-left transition-all ${
                    stat.filter === statusFilter ? 'ring-2 ring-cyan-500' : ''
                  }`}
                >
                  <div className="text-2xl font-bold" style={{ color: stat.color }}>{stat.value}</div>
                  <div className="text-xs text-gray-400">{stat.label}</div>
                </button>
              ))}
            </div>

            {/* Filters */}
            <div className="glass-card rounded-xl p-4 mb-6">
              <div className="flex items-center gap-4 flex-wrap">
                <div className="flex-1 min-w-[300px] relative">
                  <Icon name="search" className="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                  <input
                    type="text"
                    placeholder="Search questions..."
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                    className="w-full pl-10 pr-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-cyan-500"
                  />
                </div>
                <select
                  value={statusFilter}
                  onChange={(e) => setStatusFilter(e.target.value)}
                  className="px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none"
                >
                  <option value="all">All Status</option>
                  {Object.entries(STATUS_CONFIG).map(([key, val]) => (
                    <option key={key} value={key}>{val.label}</option>
                  ))}
                </select>
                <select
                  value={categoryFilter}
                  onChange={(e) => setCategoryFilter(e.target.value)}
                  className="px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none"
                >
                  <option value="all">All Categories</option>
                  {CATEGORIES.map(cat => (
                    <option key={cat.key} value={cat.key}>{cat.name}</option>
                  ))}
                </select>
              </div>
            </div>

            {/* Questions List */}
            <div className="space-y-3">
              {filteredQuestions.map((question, idx) => {
                const status = STATUS_CONFIG[question.status];
                const category = CATEGORIES.find(c => c.key === question.category);

                return (
                  <div 
                    key={question.id}
                    className="glass-card rounded-xl p-5 hover:border-white/20 transition-all cursor-pointer animate-slideUp"
                    style={{ animationDelay: `${idx * 50}ms` }}
                    onClick={() => setSelectedQuestion(question)}
                  >
                    <div className="flex items-start gap-4">
                      <div className="flex flex-col items-center gap-2">
                        <span className="text-lg font-mono font-bold text-cyan-400">{question.number}</span>
                        <span 
                          className={`px-2 py-0.5 rounded text-xs ${
                            question.impact === 'critical' ? 'bg-red-500/20 text-red-400' :
                            question.impact === 'high' ? 'bg-amber-500/20 text-amber-400' :
                            question.impact === 'medium' ? 'bg-blue-500/20 text-blue-400' :
                            'bg-gray-500/20 text-gray-400'
                          }`}
                        >
                          {question.impact}
                        </span>
                      </div>

                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 mb-2">
                          <span className="text-xs text-gray-500 font-mono">{question.rfp_reference}</span>
                          <span 
                            className="text-xs px-2 py-0.5 rounded-full"
                            style={{ backgroundColor: `${category?.color}20`, color: category?.color }}
                          >
                            {category?.name}
                          </span>
                          <span 
                            className="text-xs px-2 py-0.5 rounded-full flex items-center gap-1"
                            style={{ backgroundColor: `${status?.color}20`, color: status?.color }}
                          >
                            <Icon name={status?.icon} className="w-3 h-3" />
                            {status?.label}
                          </span>
                        </div>

                        <p className="text-white mb-2">{question.question}</p>

                        {question.answer && (
                          <div className="bg-[#0A1628] rounded-lg p-3 mt-2">
                            <span className="text-xs text-emerald-400 font-medium">Answer:</span>
                            <p className="text-sm text-gray-300 mt-1">{question.answer}</p>
                          </div>
                        )}

                        <div className="flex items-center gap-4 mt-3 text-xs text-gray-500">
                          {question.submitted_date && (
                            <span>Submitted: {question.submitted_date}</span>
                          )}
                          {question.answer_date && (
                            <span>Answered: {question.answer_date}</span>
                          )}
                          {question.assigned_to && (
                            <span className="px-2 py-0.5 bg-white/5 rounded">
                              {question.assigned_to}
                            </span>
                          )}
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            {filteredQuestions.length === 0 && (
              <div className="text-center py-16 glass-card rounded-xl">
                <Icon name="inbox" className="w-16 h-16 text-gray-600 mx-auto mb-4" />
                <h3 className="text-xl font-semibold text-gray-400 mb-2">No questions found</h3>
                <p className="text-gray-500">Try a different filter or add a new question</p>
              </div>
            )}
          </main>

          {/* Question Detail Modal */}
          {selectedQuestion && (
            <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setSelectedQuestion(null)}>
              <div className="glass-card rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                <div className="p-6 border-b border-white/10">
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-3">
                      <span className="text-2xl font-mono font-bold text-cyan-400">{selectedQuestion.number}</span>
                      <span className="text-sm text-gray-500">{selectedQuestion.rfp_reference}</span>
                    </div>
                    <button onClick={() => setSelectedQuestion(null)} className="p-2 text-gray-400 hover:text-white">
                      <Icon name="x" className="w-5 h-5" />
                    </button>
                  </div>
                </div>

                <div className="p-6 space-y-6">
                  <div>
                    <h4 className="text-sm font-medium text-gray-400 mb-2">Question</h4>
                    <p className="text-white">{selectedQuestion.question}</p>
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div className="bg-[#0A1628] rounded-lg p-3">
                      <span className="text-xs text-gray-500">Category</span>
                      <p className="text-white">{CATEGORIES.find(c => c.key === selectedQuestion.category)?.name}</p>
                    </div>
                    <div className="bg-[#0A1628] rounded-lg p-3">
                      <span className="text-xs text-gray-500">Impact</span>
                      <p className="text-white capitalize">{selectedQuestion.impact}</p>
                    </div>
                    <div className="bg-[#0A1628] rounded-lg p-3">
                      <span className="text-xs text-gray-500">Assigned To</span>
                      <p className="text-white">{selectedQuestion.assigned_to || 'Unassigned'}</p>
                    </div>
                    <div className="bg-[#0A1628] rounded-lg p-3">
                      <span className="text-xs text-gray-500">Status</span>
                      <select
                        value={selectedQuestion.status}
                        onChange={(e) => {
                          updateStatus(selectedQuestion.id, e.target.value);
                          setSelectedQuestion({ ...selectedQuestion, status: e.target.value });
                        }}
                        className="w-full bg-transparent text-white focus:outline-none"
                      >
                        {Object.entries(STATUS_CONFIG).map(([key, val]) => (
                          <option key={key} value={key}>{val.label}</option>
                        ))}
                      </select>
                    </div>
                  </div>

                  {selectedQuestion.answer && (
                    <div>
                      <h4 className="text-sm font-medium text-gray-400 mb-2">Government Answer</h4>
                      <div className="bg-emerald-500/10 border border-emerald-500/30 rounded-lg p-4">
                        <p className="text-emerald-300">{selectedQuestion.answer}</p>
                        {selectedQuestion.answer_date && (
                          <p className="text-xs text-emerald-500 mt-2">Received: {selectedQuestion.answer_date}</p>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          <footer className="border-t border-white/10 py-4 mt-12">
            <div className="max-w-6xl mx-auto px-6 text-center text-xs text-gray-500">
              © 2026 Mission Meets Tech • MissionPulse v2.0 • Sprint 65
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<RFITrackerApp />, document.getElementById('root'));
  </script>
</body>
</html>
