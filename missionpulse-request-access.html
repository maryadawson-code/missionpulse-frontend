<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MissionPulse - Request Early Access</title>
    <meta name="description" content="Request early access to MissionPulse, the AI-powered federal proposal management platform that helps contractors win more government contracts.">
    <meta name="keywords" content="federal contracting, proposal management, AI, government contracts, Shipley, capture management">
    <meta property="og:title" content="MissionPulse - Request Early Access">
    <meta property="og:description" content="AI-powered federal proposal management. Reduce proposal time by 35%. Increase win rates by 18%.">
    <meta property="og:type" content="website">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(0, 229, 250, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.2); }
        .glow { box-shadow: 0 0 30px rgba(0, 229, 250, 0.4); }
        .glow-hover:hover { box-shadow: 0 0 40px rgba(0, 229, 250, 0.6); }
        .gradient-text { background: linear-gradient(135deg, #00E5FA 0%, #10B981 50%, #00E5FA 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% 200%; animation: gradient 3s ease infinite; }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .pulse-ring { animation: pulse-ring 2s ease-out infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
        .float { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #00E5FA; box-shadow: 0 0 0 3px rgba(0, 229, 250, 0.2); }
        .success-check { animation: checkmark 0.5s ease-out forwards; }
        @keyframes checkmark { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // =========================================================================
        // CONFIGURATION
        // =========================================================================
        const HUBSPOT_PORTAL_ID = ''; // Add your HubSpot portal ID
        const HUBSPOT_FORM_ID = '';   // Add your HubSpot form ID
        const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';

        // Company size options
        const COMPANY_SIZES = [
            { value: '1-10', label: '1-10 employees' },
            { value: '11-50', label: '11-50 employees' },
            { value: '51-200', label: '51-200 employees' },
            { value: '201-500', label: '201-500 employees' },
            { value: '500+', label: '500+ employees' }
        ];

        // Contract types
        const CONTRACT_TYPES = [
            { value: 'prime', label: 'Prime Contractor' },
            { value: 'sub', label: 'Subcontractor' },
            { value: 'both', label: 'Both Prime & Sub' },
            { value: 'seeking', label: 'Seeking First Contract' }
        ];

        // Certifications
        const CERTIFICATIONS = [
            { value: 'sdvosb', label: 'SDVOSB' },
            { value: '8a', label: '8(a)' },
            { value: 'hubzone', label: 'HUBZone' },
            { value: 'wosb', label: 'WOSB/EDWOSB' },
            { value: 'none', label: 'None' },
            { value: 'other', label: 'Other' }
        ];

        // How they heard about us
        const REFERRAL_SOURCES = [
            { value: 'google', label: 'Google Search' },
            { value: 'linkedin', label: 'LinkedIn' },
            { value: 'referral', label: 'Referral' },
            { value: 'conference', label: 'Conference/Event' },
            { value: 'webinar', label: 'Webinar' },
            { value: 'other', label: 'Other' }
        ];

        // =========================================================================
        // STATS COMPONENT
        // =========================================================================
        function StatCard({ value, label, icon }) {
            return (
                <div className="glass p-6 rounded-xl text-center">
                    <div className="text-3xl mb-2">{icon}</div>
                    <div className="text-3xl font-bold gradient-text">{value}</div>
                    <div className="text-slate-400 text-sm mt-1">{label}</div>
                </div>
            );
        }

        // =========================================================================
        // FEATURE CARD
        // =========================================================================
        function FeatureCard({ icon, title, description }) {
            return (
                <div className="glass p-6 rounded-xl hover:border-cyan-400/50 transition-all duration-300">
                    <div className="text-3xl mb-3">{icon}</div>
                    <h3 className="text-lg font-semibold text-white mb-2">{title}</h3>
                    <p className="text-slate-400 text-sm">{description}</p>
                </div>
            );
        }

        // =========================================================================
        // FORM COMPONENT
        // =========================================================================
        function RequestAccessForm({ onSuccess }) {
            const [formData, setFormData] = useState({
                firstName: '',
                lastName: '',
                email: '',
                company: '',
                title: '',
                phone: '',
                companySize: '',
                contractType: '',
                certifications: [],
                annualRevenue: '',
                proposalsPerYear: '',
                biggestChallenge: '',
                referralSource: '',
                agreeToTerms: false
            });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [errors, setErrors] = useState({});

            const validateForm = () => {
                const newErrors = {};
                if (!formData.firstName.trim()) newErrors.firstName = 'Required';
                if (!formData.lastName.trim()) newErrors.lastName = 'Required';
                if (!formData.email.trim()) newErrors.email = 'Required';
                else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) {
                    newErrors.email = 'Invalid email format';
                }
                if (!formData.company.trim()) newErrors.company = 'Required';
                if (!formData.companySize) newErrors.companySize = 'Required';
                if (!formData.agreeToTerms) newErrors.agreeToTerms = 'You must agree to continue';
                
                setErrors(newErrors);
                return Object.keys(newErrors).length === 0;
            };

            const handleChange = (e) => {
                const { name, value, type, checked } = e.target;
                if (type === 'checkbox' && name === 'certifications') {
                    setFormData(prev => ({
                        ...prev,
                        certifications: checked 
                            ? [...prev.certifications, value]
                            : prev.certifications.filter(c => c !== value)
                    }));
                } else {
                    setFormData(prev => ({
                        ...prev,
                        [name]: type === 'checkbox' ? checked : value
                    }));
                }
                // Clear error on change
                if (errors[name]) {
                    setErrors(prev => ({ ...prev, [name]: null }));
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!validateForm()) return;
                
                setIsSubmitting(true);

                try {
                    // Submit to Supabase (primary storage)
                    const supabaseResponse = await submitToSupabase(formData);
                    
                    // Also submit to HubSpot if configured
                    if (HUBSPOT_PORTAL_ID && HUBSPOT_FORM_ID) {
                        await submitToHubSpot(formData);
                    }

                    onSuccess(formData);
                } catch (error) {
                    console.error('Submission error:', error);
                    setErrors({ submit: 'Something went wrong. Please try again.' });
                } finally {
                    setIsSubmitting(false);
                }
            };

            const submitToSupabase = async (data) => {
                // For now, store in a simple leads table
                const payload = {
                    first_name: data.firstName,
                    last_name: data.lastName,
                    email: data.email,
                    company: data.company,
                    title: data.title,
                    phone: data.phone,
                    company_size: data.companySize,
                    contract_type: data.contractType,
                    certifications: data.certifications,
                    annual_revenue: data.annualRevenue,
                    proposals_per_year: data.proposalsPerYear,
                    biggest_challenge: data.biggestChallenge,
                    referral_source: data.referralSource,
                    created_at: new Date().toISOString(),
                    status: 'new'
                };

                const response = await fetch(`${SUPABASE_URL}/rest/v1/access_requests`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON,
                        'Authorization': `Bearer ${SUPABASE_ANON}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok && response.status !== 201) {
                    // If table doesn't exist, log to console (demo mode)
                    console.log('Access request (demo mode):', payload);
                }
                
                return true;
            };

            const submitToHubSpot = async (data) => {
                const hubspotData = {
                    fields: [
                        { name: 'firstname', value: data.firstName },
                        { name: 'lastname', value: data.lastName },
                        { name: 'email', value: data.email },
                        { name: 'company', value: data.company },
                        { name: 'jobtitle', value: data.title },
                        { name: 'phone', value: data.phone },
                        { name: 'company_size', value: data.companySize },
                        { name: 'contract_type', value: data.contractType },
                        { name: 'certifications', value: data.certifications.join(', ') },
                        { name: 'annual_revenue', value: data.annualRevenue },
                        { name: 'proposals_per_year', value: data.proposalsPerYear },
                        { name: 'biggest_challenge', value: data.biggestChallenge },
                        { name: 'referral_source', value: data.referralSource }
                    ]
                };

                await fetch(
                    `https://api.hsforms.com/submissions/v3/integration/submit/${HUBSPOT_PORTAL_ID}/${HUBSPOT_FORM_ID}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(hubspotData)
                    }
                );
            };

            const inputClass = (field) => `w-full px-4 py-3 bg-slate-900/50 border ${
                errors[field] ? 'border-red-500' : 'border-slate-700'
            } rounded-lg text-white placeholder-slate-500 transition-all duration-300`;

            return (
                <form onSubmit={handleSubmit} className="space-y-6">
                    {/* Name Row */}
                    <div className="grid md:grid-cols-2 gap-4">
                        <div>
                            <label className="block text-sm font-medium text-slate-300 mb-2">
                                First Name <span className="text-red-400">*</span>
                            </label>
                            <input
                                type="text"
                                name="firstName"
                                value={formData.firstName}
                                onChange={handleChange}
                                className={inputClass('firstName')}
                                placeholder="Mary"
                            />
                            {errors.firstName && <p className="text-red-400 text-xs mt-1">{errors.firstName}</p>}
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-slate-300 mb-2">
                                Last Name <span className="text-red-400">*</span>
                            </label>
                            <input
                                type="text"
                                name="lastName"
                                value={formData.lastName}
                                onChange={handleChange}
                                className={inputClass('lastName')}
                                placeholder="Womack"
                            />
                            {errors.lastName && <p className="text-red-400 text-xs mt-1">{errors.lastName}</p>}
                        </div>
                    </div>

                    {/* Email */}
                    <div>
                        <label className="block text-sm font-medium text-slate-300 mb-2">
                            Work Email <span className="text-red-400">*</span>
                        </label>
                        <input
                            type="email"
                            name="email"
                            value={formData.email}
                            onChange={handleChange}
                            className={inputClass('email')}
                            placeholder="mary@missionmeetstech.com"
                        />
                        {errors.email && <p className="text-red-400 text-xs mt-1">{errors.email}</p>}
                    </div>

                    {/* Company & Title */}
                    <div className="grid md:grid-cols-2 gap-4">
                        <div>
                            <label className="block text-sm font-medium text-slate-300 mb-2">
                                Company <span className="text-red-400">*</span>
                            </label>
                            <input
                                type="text"
                                name="company"
                                value={formData.company}
                                onChange={handleChange}
                                className={inputClass('company')}
                                placeholder="Mission Meets Tech"
                            />
                            {errors.company && <p className="text-red-400 text-xs mt-1">{errors.company}</p>}
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-slate-300 mb-2">
                                Job Title
                            </label>
                            <input
                                type="text"
                                name="title"
                                value={formData.title}
                                onChange={handleChange}
                                className={inputClass('title')}
                                placeholder="CEO, Capture Manager, etc."
                            />
                        </div>
                    </div>

                    {/* Company Size & Contract Type */}
                    <div className="grid md:grid-cols-2 gap-4">
                        <div>
                            <label className="block text-sm font-medium text-slate-300 mb-2">
                                Company Size <span className="text-red-400">*</span>
                            </label>
                            <select
                                name="companySize"
                                value={formData.companySize}
                                onChange={handleChange}
                                className={inputClass('companySize')}
                            >
                                <option value="">Select...</option>
                                {COMPANY_SIZES.map(size => (
                                    <option key={size.value} value={size.value}>{size.label}</option>
                                ))}
                            </select>
                            {errors.companySize && <p className="text-red-400 text-xs mt-1">{errors.companySize}</p>}
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-slate-300 mb-2">
                                Contract Type
                            </label>
                            <select
                                name="contractType"
                                value={formData.contractType}
                                onChange={handleChange}
                                className={inputClass('contractType')}
                            >
                                <option value="">Select...</option>
                                {CONTRACT_TYPES.map(type => (
                                    <option key={type.value} value={type.value}>{type.label}</option>
                                ))}
                            </select>
                        </div>
                    </div>

                    {/* Certifications */}
                    <div>
                        <label className="block text-sm font-medium text-slate-300 mb-3">
                            Small Business Certifications
                        </label>
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                            {CERTIFICATIONS.map(cert => (
                                <label key={cert.value} className="flex items-center gap-2 cursor-pointer">
                                    <input
                                        type="checkbox"
                                        name="certifications"
                                        value={cert.value}
                                        checked={formData.certifications.includes(cert.value)}
                                        onChange={handleChange}
                                        className="w-4 h-4 rounded border-slate-600 bg-slate-900 text-cyan-500 focus:ring-cyan-500"
                                    />
                                    <span className="text-sm text-slate-300">{cert.label}</span>
                                </label>
                            ))}
                        </div>
                    </div>

                    {/* Proposals per year */}
                    <div>
                        <label className="block text-sm font-medium text-slate-300 mb-2">
                            How many proposals do you submit per year?
                        </label>
                        <select
                            name="proposalsPerYear"
                            value={formData.proposalsPerYear}
                            onChange={handleChange}
                            className={inputClass('proposalsPerYear')}
                        >
                            <option value="">Select...</option>
                            <option value="1-5">1-5</option>
                            <option value="6-10">6-10</option>
                            <option value="11-25">11-25</option>
                            <option value="26-50">26-50</option>
                            <option value="50+">50+</option>
                        </select>
                    </div>

                    {/* Biggest Challenge */}
                    <div>
                        <label className="block text-sm font-medium text-slate-300 mb-2">
                            What's your biggest challenge with proposals?
                        </label>
                        <textarea
                            name="biggestChallenge"
                            value={formData.biggestChallenge}
                            onChange={handleChange}
                            className={`${inputClass('biggestChallenge')} resize-none`}
                            rows={3}
                            placeholder="Tell us about your pain points..."
                        />
                    </div>

                    {/* Referral Source */}
                    <div>
                        <label className="block text-sm font-medium text-slate-300 mb-2">
                            How did you hear about MissionPulse?
                        </label>
                        <select
                            name="referralSource"
                            value={formData.referralSource}
                            onChange={handleChange}
                            className={inputClass('referralSource')}
                        >
                            <option value="">Select...</option>
                            {REFERRAL_SOURCES.map(source => (
                                <option key={source.value} value={source.value}>{source.label}</option>
                            ))}
                        </select>
                    </div>

                    {/* Terms Agreement */}
                    <div className="flex items-start gap-3">
                        <input
                            type="checkbox"
                            name="agreeToTerms"
                            checked={formData.agreeToTerms}
                            onChange={handleChange}
                            className="w-5 h-5 mt-0.5 rounded border-slate-600 bg-slate-900 text-cyan-500 focus:ring-cyan-500"
                        />
                        <label className="text-sm text-slate-400">
                            I agree to receive communications from Mission Meets Tech about MissionPulse.
                            I understand I can unsubscribe at any time.
                            <span className="text-red-400">*</span>
                        </label>
                    </div>
                    {errors.agreeToTerms && <p className="text-red-400 text-xs">{errors.agreeToTerms}</p>}

                    {/* Submit Error */}
                    {errors.submit && (
                        <div className="bg-red-500/20 border border-red-500/40 rounded-lg p-4 text-red-300 text-sm">
                            {errors.submit}
                        </div>
                    )}

                    {/* Submit Button */}
                    <button
                        type="submit"
                        disabled={isSubmitting}
                        className={`w-full py-4 rounded-lg font-semibold text-lg transition-all duration-300 ${
                            isSubmitting
                                ? 'bg-slate-700 text-slate-400 cursor-not-allowed'
                                : 'bg-cyan-500 hover:bg-cyan-400 text-slate-900 glow glow-hover'
                        }`}
                    >
                        {isSubmitting ? (
                            <span className="flex items-center justify-center gap-2">
                                <svg className="animate-spin w-5 h-5" viewBox="0 0 24 24">
                                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none" />
                                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
                                </svg>
                                Processing...
                            </span>
                        ) : (
                            'Request Early Access'
                        )}
                    </button>

                    <p className="text-xs text-slate-500 text-center">
                        🔒 Your information is secure and will never be shared with third parties.
                    </p>
                </form>
            );
        }

        // =========================================================================
        // SUCCESS SCREEN
        // =========================================================================
        function SuccessScreen({ data }) {
            return (
                <div className="text-center py-12 fade-in">
                    <div className="relative inline-block mb-6">
                        <div className="w-24 h-24 bg-emerald-500/20 rounded-full flex items-center justify-center">
                            <svg className="w-12 h-12 text-emerald-400 success-check" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                        <div className="absolute inset-0 rounded-full border-2 border-emerald-400/50 pulse-ring"></div>
                    </div>
                    
                    <h2 className="text-3xl font-bold text-white mb-4">
                        You're on the list! 🎉
                    </h2>
                    
                    <p className="text-slate-400 text-lg mb-8 max-w-md mx-auto">
                        Thanks, {data.firstName}! We'll be in touch soon with your early access invitation.
                    </p>

                    <div className="glass p-6 rounded-xl max-w-md mx-auto mb-8">
                        <h3 className="text-lg font-semibold text-cyan-400 mb-4">What happens next?</h3>
                        <div className="space-y-3 text-left">
                            <div className="flex items-start gap-3">
                                <span className="text-cyan-400 text-lg">1</span>
                                <p className="text-slate-300 text-sm">Our team reviews your request within 24-48 hours</p>
                            </div>
                            <div className="flex items-start gap-3">
                                <span className="text-cyan-400 text-lg">2</span>
                                <p className="text-slate-300 text-sm">You'll receive an email with login credentials</p>
                            </div>
                            <div className="flex items-start gap-3">
                                <span className="text-cyan-400 text-lg">3</span>
                                <p className="text-slate-300 text-sm">Schedule a 30-minute onboarding call (optional)</p>
                            </div>
                        </div>
                    </div>

                    <div className="flex flex-col sm:flex-row gap-4 justify-center">
                        <a
                            href="https://missionmeetstech.com"
                            className="px-6 py-3 glass rounded-lg text-cyan-400 hover:text-white hover:bg-cyan-500/20 transition-all duration-300"
                        >
                            Visit Our Website
                        </a>
                        <a
                            href="https://www.linkedin.com/company/mission-meets-tech"
                            target="_blank"
                            rel="noopener noreferrer"
                            className="px-6 py-3 glass rounded-lg text-cyan-400 hover:text-white hover:bg-cyan-500/20 transition-all duration-300"
                        >
                            Follow on LinkedIn
                        </a>
                    </div>
                </div>
            );
        }

        // =========================================================================
        // MAIN APP
        // =========================================================================
        function App() {
            const [submitted, setSubmitted] = useState(false);
            const [submittedData, setSubmittedData] = useState(null);

            const handleSuccess = (data) => {
                setSubmittedData(data);
                setSubmitted(true);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen">
                    {/* Hero Section */}
                    <header className="relative overflow-hidden">
                        {/* Background Effects */}
                        <div className="absolute inset-0 bg-gradient-to-b from-cyan-500/10 via-transparent to-transparent"></div>
                        <div className="absolute top-20 left-1/4 w-96 h-96 bg-cyan-500/20 rounded-full blur-3xl"></div>
                        <div className="absolute top-40 right-1/4 w-64 h-64 bg-emerald-500/10 rounded-full blur-3xl"></div>
                        
                        <div className="relative max-w-6xl mx-auto px-6 py-12">
                            {/* Nav */}
                            <nav className="flex items-center justify-between mb-16">
                                <div className="flex items-center gap-3">
                                    <div className="text-2xl font-bold">
                                        <span className="text-cyan-400">Mission</span>
                                        <span className="text-white">Pulse</span>
                                    </div>
                                    <span className="text-xs bg-cyan-500/20 text-cyan-400 px-2 py-1 rounded-full">
                                        Early Access
                                    </span>
                                </div>
                                <a href="https://missionmeetstech.com" className="text-slate-400 hover:text-cyan-400 transition-colors">
                                    Mission Meets Tech →
                                </a>
                            </nav>

                            {/* Hero Content */}
                            <div className="text-center mb-16">
                                <h1 className="text-4xl md:text-6xl font-bold mb-6">
                                    <span className="text-white">Win More </span>
                                    <span className="gradient-text">Government Contracts</span>
                                </h1>
