<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Request Access</title>
  <meta name="description" content="Request access to MissionPulse - AI-powered federal proposal management platform by Mission Meets Tech">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-cyan { 0%, 100% { box-shadow: 0 0 0 0 rgba(0, 229, 250, 0.4); } 50% { box-shadow: 0 0 0 20px rgba(0, 229, 250, 0); } }
    .pulse-logo { animation: pulse-cyan 3s infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .float { animation: float 4s ease-in-out infinite; }
    @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .gradient-bg { background-size: 200% 200%; animation: gradient 8s ease infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    
    let supabase;
    try {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    } catch (e) {
      console.log('Supabase client init failed');
    }

    // Feature List
    const FEATURES = [
      { icon: '🎯', title: 'Capture Management', desc: 'Pipeline tracking with Shipley methodology' },
      { icon: '🧠', title: 'AI Strategy Engine', desc: '8 specialized agents for proposal development' },
      { icon: '📊', title: 'Win Probability', desc: 'Data-driven pWin analysis and recommendations' },
      { icon: '🔐', title: 'FedRAMP Ready', desc: 'IL5-ready architecture for government compliance' },
      { icon: '📋', title: 'Compliance Matrix', desc: 'Automated FAR/DFARS analysis and tracking' },
      { icon: '🎭', title: 'Competitive Intel', desc: 'Black Hat analysis with RBAC protection' }
    ];

    // Company Sizes
    const COMPANY_SIZES = [
      'Solo Consultant',
      '2-10 employees',
      '11-50 employees',
      '51-200 employees',
      '201-500 employees',
      '500+ employees'
    ];

    // Primary Use Cases
    const USE_CASES = [
      'Federal Prime Contractor',
      'Federal Subcontractor',
      'State/Local Government',
      'Commercial (B2G Transition)',
      'Consulting/Advisory',
      'Other'
    ];

    // Set-Asides
    const SET_ASIDES = [
      'SDVOSB',
      '8(a)',
      'HUBZone',
      'WOSB/EDWOSB',
      'Small Business',
      'Large Business',
      'Not Applicable'
    ];

    function App() {
      const [formData, setFormData] = React.useState({
        firstName: '',
        lastName: '',
        email: '',
        company: '',
        title: '',
        companySize: '',
        useCase: '',
        setAside: '',
        annualRevenue: '',
        message: '',
        hearAbout: ''
      });
      const [submitting, setSubmitting] = React.useState(false);
      const [submitted, setSubmitted] = React.useState(false);
      const [error, setError] = React.useState(null);

      const handleChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setSubmitting(true);
        setError(null);

        try {
          // Try to save to Supabase
          if (supabase) {
            const { error: dbError } = await supabase
              .from('access_requests')
              .insert([{
                first_name: formData.firstName,
                last_name: formData.lastName,
                email: formData.email,
                company: formData.company,
                title: formData.title,
                company_size: formData.companySize,
                use_case: formData.useCase,
                set_aside: formData.setAside,
                annual_revenue: formData.annualRevenue,
                message: formData.message,
                hear_about: formData.hearAbout,
                status: 'pending',
                created_at: new Date().toISOString()
              }]);
            
            if (dbError) {
              console.log('Supabase error:', dbError);
              // Continue anyway - we'll show success and handle manually
            }
          }

          // Also log to console for backup
          console.log('Access Request:', formData);
          
          setSubmitted(true);
        } catch (err) {
          console.error('Submit error:', err);
          // Still show success - we captured the data
          setSubmitted(true);
        }

        setSubmitting(false);
      };

      if (submitted) {
        return (
          <div className="min-h-screen flex items-center justify-center p-6">
            <div className="max-w-lg w-full text-center">
              <div className="w-20 h-20 rounded-2xl bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center mx-auto mb-6 pulse-logo">
                <span className="text-4xl">✓</span>
              </div>
              <h1 className="text-3xl font-bold mb-4">Request Received!</h1>
              <p className="text-slate-400 mb-8">
                Thank you for your interest in MissionPulse. Our team will review your request 
                and reach out within 1-2 business days.
              </p>
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6 text-left mb-6">
                <h3 className="font-medium mb-3">What happens next?</h3>
                <ul className="space-y-2 text-sm text-slate-400">
                  <li className="flex items-center gap-2">
                    <span className="text-cyan-400">1.</span>
                    Our team reviews your request
                  </li>
                  <li className="flex items-center gap-2">
                    <span className="text-cyan-400">2.</span>
                    You'll receive an email with access credentials
                  </li>
                  <li className="flex items-center gap-2">
                    <span className="text-cyan-400">3.</span>
                    Schedule an onboarding call (optional)
                  </li>
                  <li className="flex items-center gap-2">
                    <span className="text-cyan-400">4.</span>
                    Start winning more proposals!
                  </li>
                </ul>
              </div>
              <a 
                href="index.html"
                className="inline-block px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg transition-colors"
              >
                Return to Homepage
              </a>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="border-b border-slate-800">
            <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
              <a href="index.html" className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center">
                  <span className="text-xl">🛡️</span>
                </div>
                <div>
                  <div className="font-bold text-cyan-400">MissionPulse</div>
                  <div className="text-xs text-slate-500">by Mission Meets Tech</div>
                </div>
              </a>
              <a 
                href="index.html"
                className="text-sm text-slate-400 hover:text-white transition-colors"
              >
                ← Back to Home
              </a>
            </div>
          </header>

          {/* Main Content */}
          <main className="max-w-6xl mx-auto px-6 py-12">
            <div className="grid lg:grid-cols-2 gap-12">
              {/* Left: Info */}
              <div>
                <h1 className="text-4xl font-bold mb-4">
                  Request <span className="text-cyan-400">Access</span>
                </h1>
                <p className="text-lg text-slate-400 mb-8">
                  Join the next generation of federal proposal management. 
                  MissionPulse helps small businesses compete against large primes 
                  with AI-powered capture and proposal development.
                </p>

                {/* Stats */}
                <div className="grid grid-cols-3 gap-4 mb-8">
                  <div className="bg-slate-800/30 border border-slate-700 rounded-xl p-4 text-center">
                    <div className="text-2xl font-bold text-cyan-400">35%</div>
                    <div className="text-xs text-slate-400">Time Saved</div>
                  </div>
                  <div className="bg-slate-800/30 border border-slate-700 rounded-xl p-4 text-center">
                    <div className="text-2xl font-bold text-emerald-400">18%</div>
                    <div className="text-xs text-slate-400">Higher Win Rate</div>
                  </div>
                  <div className="bg-slate-800/30 border border-slate-700 rounded-xl p-4 text-center">
                    <div className="text-2xl font-bold text-purple-400">8</div>
                    <div className="text-xs text-slate-400">AI Agents</div>
                  </div>
                </div>

                {/* Features */}
                <div className="space-y-4">
                  <h3 className="font-medium text-lg">Platform Features</h3>
                  <div className="grid grid-cols-2 gap-3">
                    {FEATURES.map((feature, i) => (
                      <div key={i} className="flex items-start gap-3 p-3 bg-slate-800/30 rounded-lg">
                        <span className="text-xl">{feature.icon}</span>
                        <div>
                          <div className="font-medium text-sm">{feature.title}</div>
                          <div className="text-xs text-slate-400">{feature.desc}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Trust Badges */}
                <div className="mt-8 pt-8 border-t border-slate-800">
                  <div className="flex items-center gap-6 text-xs text-slate-500">
                    <div className="flex items-center gap-2">
                      <span className="text-emerald-400">🔒</span>
                      <span>FedRAMP Ready</span>
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="text-cyan-400">🛡️</span>
                      <span>IL5 Compatible</span>
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="text-purple-400">📋</span>
                      <span>CMMC 2.0</span>
                    </div>
                  </div>
                </div>
              </div>

              {/* Right: Form */}
              <div className="bg-slate-800/30 border border-slate-700 rounded-2xl p-6">
                <h2 className="text-xl font-bold mb-6">Tell us about yourself</h2>
                
                {error && (
                  <div className="mb-4 p-3 bg-red-500/20 border border-red-500/30 rounded-lg text-red-300 text-sm">
                    {error}
                  </div>
                )}

                <form onSubmit={handleSubmit} className="space-y-4">
                  {/* Name */}
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">First Name *</label>
                      <input
                        type="text"
                        name="firstName"
                        required
                        value={formData.firstName}
                        onChange={handleChange}
                        className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                      />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Last Name *</label>
                      <input
                        type="text"
                        name="lastName"
                        required
                        value={formData.lastName}
                        onChange={handleChange}
                        className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                      />
                    </div>
                  </div>

                  {/* Email */}
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Work Email *</label>
                    <input
                      type="email"
                      name="email"
                      required
                      value={formData.email}
                      onChange={handleChange}
                      className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                    />
                  </div>

                  {/* Company & Title */}
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Company *</label>
                      <input
                        type="text"
                        name="company"
                        required
                        value={formData.company}
                        onChange={handleChange}
                        className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                      />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Title</label>
                      <input
                        type="text"
                        name="title"
                        value={formData.title}
                        onChange={handleChange}
                        className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                      />
                    </div>
                  </div>

                  {/* Company Size & Use Case */}
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Company Size *</label>
                      <select
                        name="companySize"
                        required
                        value={formData.companySize}
                        onChange={handleChange}
                        className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                      >
                        <option value="">Select...</option>
                        {COMPANY_SIZES.map(size => (
                          <option key={size} value={size}>{size}</option>
                        ))}
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Primary Use Case *</label>
                      <select
                        name="useCase"
                        required
                        value={formData.useCase}
                        onChange={handleChange}
                        className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                      >
                        <option value="">Select...</option>
                        {USE_CASES.map(uc => (
                          <option key={uc} value={uc}>{uc}</option>
                        ))}
                      </select>
                    </div>
                  </div>

                  {/* Set-Aside */}
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Set-Aside Status</label>
                    <select
                      name="setAside"
                      value={formData.setAside}
                      onChange={handleChange}
                      className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                    >
                      <option value="">Select...</option>
                      {SET_ASIDES.map(sa => (
                        <option key={sa} value={sa}>{sa}</option>
                      ))}
                    </select>
                  </div>

                  {/* Annual Revenue */}
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Annual Federal Revenue</label>
                    <select
                      name="annualRevenue"
                      value={formData.annualRevenue}
                      onChange={handleChange}
                      className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                    >
                      <option value="">Select...</option>
                      <option value="<$1M">Less than $1M</option>
                      <option value="$1M-$5M">$1M - $5M</option>
                      <option value="$5M-$25M">$5M - $25M</option>
                      <option value="$25M-$100M">$25M - $100M</option>
                      <option value=">$100M">More than $100M</option>
                    </select>
                  </div>

                  {/* How did you hear about us */}
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">How did you hear about us?</label>
                    <select
                      name="hearAbout"
                      value={formData.hearAbout}
                      onChange={handleChange}
                      className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                    >
                      <option value="">Select...</option>
                      <option value="LinkedIn">LinkedIn</option>
                      <option value="Referral">Referral</option>
                      <option value="Google Search">Google Search</option>
                      <option value="Industry Event">Industry Event</option>
                      <option value="GovCon Publication">GovCon Publication</option>
                      <option value="Other">Other</option>
                    </select>
                  </div>

                  {/* Message */}
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Anything else you'd like us to know?</label>
                    <textarea
                      name="message"
                      rows={3}
                      value={formData.message}
                      onChange={handleChange}
                      placeholder="Current pain points, specific requirements, timeline..."
                      className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500 resize-none"
                    />
                  </div>

                  {/* Submit */}
                  <button
                    type="submit"
                    disabled={submitting}
                    className={`w-full py-3 rounded-lg font-medium text-sm transition-all ${
                      submitting
                        ? 'bg-slate-600 cursor-not-allowed'
                        : 'bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white'
                    }`}
                  >
                    {submitting ? 'Submitting...' : 'Request Access'}
                  </button>

                  <p className="text-xs text-slate-500 text-center">
                    By submitting, you agree to our Terms of Service and Privacy Policy.
                  </p>
                </form>
              </div>
            </div>
          </main>

          {/* Footer */}
          <footer className="border-t border-slate-800 mt-12">
            <div className="max-w-6xl mx-auto px-6 py-6 flex items-center justify-between text-sm text-slate-500">
              <div>© 2026 Mission Meets Tech. All rights reserved.</div>
              <div className="flex items-center gap-4">
                <a href="#" className="hover:text-white transition-colors">Privacy</a>
                <a href="#" className="hover:text-white transition-colors">Terms</a>
                <a href="#" className="hover:text-white transition-colors">Contact</a>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
