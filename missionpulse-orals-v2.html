<!DOCTYPE html>
<html lang="en">
<!--
  FILE: missionpulse-orals-v2.html
  ROLE: CEO | COO | CAP | PM | SA
  SECURITY: env vars verified - Supabase anon key (public safe)
  VERSION: 2.0.0
  
  Orals Prep Studio - AI-Powered Presentation Builder
  © 2026 Mission Meets Tech
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orals Prep Studio | MissionPulse</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-spin { animation: spin 1s linear infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Supabase Configuration
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Demo Data
    const DEMO_OPPORTUNITIES = [
      { id: 1, name: 'DHA Healthcare Platform', agency: 'DHA', contract_value: 47000000, shipley_phase: 'Phase 3' },
      { id: 2, name: 'VA Claims Modernization', agency: 'VA', contract_value: 23000000, shipley_phase: 'Phase 2' },
      { id: 3, name: 'CMS Data Analytics', agency: 'CMS', contract_value: 15000000, shipley_phase: 'Phase 3' },
    ];

    const SLIDE_TEMPLATES = [
      { id: 'title', name: 'Title Slide', icon: '🎯', duration: 60 },
      { id: 'team', name: 'Team Introduction', icon: '👥', duration: 120 },
      { id: 'understanding', name: 'Understanding of Need', icon: '🔍', duration: 180 },
      { id: 'approach', name: 'Technical Approach', icon: '⚙️', duration: 300 },
      { id: 'experience', name: 'Relevant Experience', icon: '📊', duration: 240 },
      { id: 'management', name: 'Management Plan', icon: '📋', duration: 180 },
      { id: 'staffing', name: 'Staffing Plan', icon: '👤', duration: 120 },
      { id: 'questions', name: 'Q&A Prep', icon: '❓', duration: 300 },
      { id: 'closing', name: 'Closing Statement', icon: '🏆', duration: 60 },
    ];

    function OralsStudio() {
      const [connected, setConnected] = useState(false);
      const [loading, setLoading] = useState(true);
      const [opportunities, setOpportunities] = useState([]);
      const [selectedOpp, setSelectedOpp] = useState(null);
      const [deck, setDeck] = useState([]);
      const [activeSlide, setActiveSlide] = useState(null);
      const [practicing, setPracticing] = useState(false);
      const [timer, setTimer] = useState(0);
      const [totalTime, setTotalTime] = useState(0);

      useEffect(() => {
        loadData();
      }, []);

      useEffect(() => {
        setTotalTime(deck.reduce((sum, s) => sum + (s.duration || 0), 0));
      }, [deck]);

      useEffect(() => {
        let interval;
        if (practicing) {
          interval = setInterval(() => setTimer(t => t + 1), 1000);
        }
        return () => clearInterval(interval);
      }, [practicing]);

      const loadData = async () => {
        try {
          const { data, error } = await supabase
            .from('opportunities')
            .select('*')
            .in('shipley_phase', ['Phase 3', 'Phase 2'])
            .order('contract_value', { ascending: false });
          
          if (error) throw error;
          setOpportunities(data?.length ? data : DEMO_OPPORTUNITIES);
          setConnected(true);
        } catch (err) {
          console.error('Load failed:', err);
          setOpportunities(DEMO_OPPORTUNITIES);
          setConnected(false);
        } finally {
          setLoading(false);
        }
      };

      const addSlide = (template) => {
        const newSlide = {
          ...template,
          slideId: Date.now(),
          content: '',
          notes: '',
          talking_points: []
        };
        setDeck([...deck, newSlide]);
        setActiveSlide(newSlide);
      };

      const updateSlide = (slideId, updates) => {
        setDeck(deck.map(s => s.slideId === slideId ? { ...s, ...updates } : s));
        if (activeSlide?.slideId === slideId) {
          setActiveSlide({ ...activeSlide, ...updates });
        }
      };

      const removeSlide = (slideId) => {
        setDeck(deck.filter(s => s.slideId !== slideId));
        if (activeSlide?.slideId === slideId) setActiveSlide(null);
      };

      const moveSlide = (index, direction) => {
        const newDeck = [...deck];
        const newIndex = index + direction;
        if (newIndex < 0 || newIndex >= deck.length) return;
        [newDeck[index], newDeck[newIndex]] = [newDeck[newIndex], newDeck[index]];
        setDeck(newDeck);
      };

      const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m}:${s.toString().padStart(2, '0')}`;
      };

      const saveDeck = async () => {
        if (!selectedOpp) return alert('Select an opportunity first');
        
        try {
          const deckData = {
            opportunity_id: selectedOpp.id,
            slides: deck,
            total_duration: totalTime,
            created_at: new Date().toISOString()
          };
          
          const { error } = await supabase.from('orals_decks').insert(deckData);
          if (error) throw error;
          alert('Deck saved successfully!');
        } catch (err) {
          console.error('Save failed:', err);
          alert('Saved locally (demo mode)');
        }
      };

      if (loading) {
        return (
          <div className="min-h-screen bg-[#00050F] flex items-center justify-center">
            <div className="text-center">
              <div className="w-12 h-12 border-4 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin mx-auto mb-4" />
              <p className="text-slate-400">Loading Orals Studio...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#00050F] text-white p-6">
          {/* Header */}
          <div className="flex items-center justify-between mb-6">
            <div>
              <div className="flex items-center gap-3">
                <span className="text-3xl">🎤</span>
                <h1 className="text-2xl font-bold">Orals Prep Studio</h1>
                <span className={`px-2 py-1 text-xs rounded-full ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                  {connected ? '● Live' : '○ Demo'}
                </span>
              </div>
              <p className="text-slate-400 mt-1">Build and practice your oral presentation deck</p>
            </div>
            
            <div className="flex items-center gap-3">
              {practicing && (
                <div className="px-4 py-2 bg-red-500/20 border border-red-500/30 rounded-lg">
                  <span className="text-red-400 font-mono text-lg">{formatTime(timer)}</span>
                </div>
              )}
              <button 
                onClick={() => { setPracticing(!practicing); if (!practicing) setTimer(0); }}
                className={`px-4 py-2 rounded-lg font-medium transition-colors ${
                  practicing ? 'bg-red-500 hover:bg-red-600' : 'bg-purple-500 hover:bg-purple-600'
                }`}
              >
                {practicing ? '⏹ Stop Practice' : '▶ Start Practice'}
              </button>
              <button onClick={saveDeck} className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium">
                💾 Save Deck
              </button>
            </div>
          </div>

          {/* Opportunity Selector */}
          <div className="mb-6 p-4 bg-slate-800/50 rounded-xl border border-slate-700/50">
            <label className="block text-sm font-medium text-slate-400 mb-2">Select Opportunity</label>
            <select 
              value={selectedOpp?.id || ''} 
              onChange={(e) => setSelectedOpp(opportunities.find(o => o.id == e.target.value))}
              className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white"
            >
              <option value="">-- Select Opportunity --</option>
              {opportunities.map(opp => (
                <option key={opp.id} value={opp.id}>
                  {opp.name} ({opp.agency}) - ${(opp.contract_value / 1000000).toFixed(1)}M
                </option>
              ))}
            </select>
          </div>

          <div className="grid grid-cols-12 gap-6">
            {/* Slide Templates */}
            <div className="col-span-3 space-y-4">
              <h3 className="font-semibold text-slate-300 mb-2">Slide Templates</h3>
              <div className="space-y-2">
                {SLIDE_TEMPLATES.map(template => (
                  <button 
                    key={template.id}
                    onClick={() => addSlide(template)}
                    className="w-full p-3 bg-slate-800/50 hover:bg-slate-700/50 rounded-lg border border-slate-700/50 text-left transition-colors group"
                  >
                    <div className="flex items-center justify-between">
                      <div className="flex items-center gap-2">
                        <span className="text-xl">{template.icon}</span>
                        <span className="text-sm font-medium">{template.name}</span>
                      </div>
                      <span className="text-xs text-slate-500">{formatTime(template.duration)}</span>
                    </div>
                  </button>
                ))}
              </div>
              
              {deck.length > 0 && (
                <div className="mt-6 p-4 bg-slate-800/30 rounded-lg border border-slate-700/50">
                  <div className="text-sm text-slate-400">Total Duration</div>
                  <div className="text-2xl font-bold text-cyan-400">{formatTime(totalTime)}</div>
                  <div className="text-xs text-slate-500 mt-1">{deck.length} slides</div>
                </div>
              )}
            </div>

            {/* Deck Builder */}
            <div className="col-span-4 space-y-4">
              <h3 className="font-semibold text-slate-300">Your Deck ({deck.length} slides)</h3>
              {deck.length === 0 ? (
                <div className="p-8 border-2 border-dashed border-slate-700 rounded-xl text-center">
                  <span className="text-4xl mb-2 block">📑</span>
                  <p className="text-slate-500">Add slides from templates</p>
                </div>
              ) : (
                <div className="space-y-2 max-h-[600px] overflow-y-auto">
                  {deck.map((slide, index) => (
                    <div 
                      key={slide.slideId}
                      onClick={() => setActiveSlide(slide)}
                      className={`p-3 rounded-lg border cursor-pointer transition-all ${
                        activeSlide?.slideId === slide.slideId 
                          ? 'bg-cyan-500/20 border-cyan-500/50' 
                          : 'bg-slate-800/50 border-slate-700/50 hover:border-slate-600'
                      }`}
                    >
                      <div className="flex items-center justify-between">
                        <div className="flex items-center gap-2">
                          <span className="text-slate-500 text-sm w-6">{index + 1}.</span>
                          <span>{slide.icon}</span>
                          <span className="text-sm font-medium">{slide.name}</span>
                        </div>
                        <div className="flex items-center gap-1">
                          <button onClick={(e) => { e.stopPropagation(); moveSlide(index, -1); }} className="p-1 hover:bg-slate-700 rounded text-slate-500">↑</button>
                          <button onClick={(e) => { e.stopPropagation(); moveSlide(index, 1); }} className="p-1 hover:bg-slate-700 rounded text-slate-500">↓</button>
                          <button onClick={(e) => { e.stopPropagation(); removeSlide(slide.slideId); }} className="p-1 hover:bg-red-500/20 rounded text-red-400">×</button>
                        </div>
                      </div>
                      <div className="text-xs text-slate-500 mt-1 pl-8">{formatTime(slide.duration)}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Slide Editor */}
            <div className="col-span-5">
              {activeSlide ? (
                <div className="bg-slate-800/50 rounded-xl border border-slate-700/50 p-6">
                  <div className="flex items-center gap-3 mb-6">
                    <span className="text-3xl">{activeSlide.icon}</span>
                    <div>
                      <h3 className="font-bold text-lg">{activeSlide.name}</h3>
                      <p className="text-sm text-slate-400">Target: {formatTime(activeSlide.duration)}</p>
                    </div>
                  </div>

                  <div className="space-y-4">
                    <div>
                      <label className="block text-sm font-medium text-slate-400 mb-2">Slide Content</label>
                      <textarea
                        value={activeSlide.content}
                        onChange={(e) => updateSlide(activeSlide.slideId, { content: e.target.value })}
                        placeholder="Key points for this slide..."
                        className="w-full h-32 bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-500"
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-medium text-slate-400 mb-2">Speaker Notes</label>
                      <textarea
                        value={activeSlide.notes}
                        onChange={(e) => updateSlide(activeSlide.slideId, { notes: e.target.value })}
                        placeholder="What you'll say during this slide..."
                        className="w-full h-24 bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-500"
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-medium text-slate-400 mb-2">Duration (seconds)</label>
                      <input
                        type="number"
                        value={activeSlide.duration}
                        onChange={(e) => updateSlide(activeSlide.slideId, { duration: parseInt(e.target.value) || 0 })}
                        className="w-32 bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-white"
                      />
                    </div>

                    <button className="w-full mt-4 px-4 py-3 bg-gradient-to-r from-purple-500 to-pink-500 rounded-lg font-medium hover:opacity-90 transition-opacity">
                      🤖 Generate AI Talking Points
                    </button>
                  </div>
                </div>
              ) : (
                <div className="h-full flex items-center justify-center bg-slate-800/30 rounded-xl border border-slate-700/50">
                  <div className="text-center">
                    <span className="text-4xl mb-2 block">👈</span>
                    <p className="text-slate-500">Select a slide to edit</p>
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* Footer */}
          <div className="mt-8 pt-4 border-t border-slate-800 text-center text-xs text-slate-600">
            AI GENERATED - REQUIRES HUMAN REVIEW
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<OralsStudio />);
  </script>
</body>
</html>
