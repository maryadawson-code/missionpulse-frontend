<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Orals Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
    .glow { box-shadow: 0 0 20px rgba(0, 229, 250, 0.15); }
    .cui-badge { background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%); }
    @keyframes countdown { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 283; } }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    
    // Supabase Configuration
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    
    // Demo Data
    const DEMO_OPPORTUNITIES = [
      { id: 'opp-1', title: 'DHA MHS GENESIS Support', agency: 'DHA', due_date: '2026-03-15' },
      { id: 'opp-2', title: 'VA EHR Modernization', agency: 'VA', due_date: '2026-04-01' }
    ];
    
    const DEMO_DECKS = [
      { 
        id: 'deck-1', 
        opportunity_id: 'opp-1', 
        title: 'Technical Approach Presentation',
        presenter: 'Dr. Sarah Chen',
        time_limit: 15,
        status: 'In Progress',
        slides: [
          { id: 's1', title: 'Executive Summary', notes: 'Open with mission alignment. 60 seconds max.', talking_points: ['Mission-first approach', 'Proven DHA track record', 'Zero-disruption transition'] },
          { id: 's2', title: 'Technical Solution', notes: 'Architecture deep dive. Use whiteboard.', talking_points: ['MHS GENESIS integration', 'FHIR R4 compliance', 'Real-time analytics'] },
          { id: 's3', title: 'Implementation Timeline', notes: 'Emphasize parallel migration strategy.', talking_points: ['90-day quick win', 'Phased rollout', 'Risk mitigation gates'] }
        ]
      },
      { 
        id: 'deck-2', 
        opportunity_id: 'opp-1', 
        title: 'Past Performance Review',
        presenter: 'James Mitchell',
        time_limit: 10,
        status: 'Draft',
        slides: [
          { id: 's4', title: 'Relevant Experience', notes: 'Focus on scale and complexity.', talking_points: ['15+ federal healthcare projects', '$2.1B total contract value', '99.2% on-time delivery'] },
          { id: 's5', title: 'Case Study: VA', notes: 'Detailed success metrics.', talking_points: ['23% cost reduction', 'Zero security incidents', 'Early delivery bonus'] }
        ]
      },
      { 
        id: 'deck-3', 
        opportunity_id: 'opp-2', 
        title: 'Management Approach',
        presenter: 'Maria Santos',
        time_limit: 12,
        status: 'Ready',
        slides: [
          { id: 's6', title: 'Team Structure', notes: 'Org chart on screen.', talking_points: ['PM background', 'Key personnel resumes', 'Succession planning'] }
        ]
      }
    ];
    
    const DEMO_QUESTIONS = [
      { id: 'q1', deck_id: 'deck-1', question: 'How will you handle legacy system migration without disruption?', answer_framework: 'STAR: Describe Madigan parallel migration. Quantify: zero patient-facing downtime.', difficulty: 'Hard', category: 'Technical' },
      { id: 'q2', deck_id: 'deck-1', question: 'What is your approach to CMMC 2.0 compliance?', answer_framework: 'Reference current L2 certification. Discuss continuous monitoring.', difficulty: 'Medium', category: 'Compliance' },
      { id: 'q3', deck_id: 'deck-2', question: 'Describe a project that faced significant challenges.', answer_framework: 'Use STAR method. End on positive outcome and lessons learned.', difficulty: 'Medium', category: 'Experience' }
    ];
    
    function App() {
      const [opportunities, setOpportunities] = useState(DEMO_OPPORTUNITIES);
      const [decks, setDecks] = useState(DEMO_DECKS);
      const [questions, setQuestions] = useState(DEMO_QUESTIONS);
      const [selectedOpp, setSelectedOpp] = useState(null);
      const [selectedDeck, setSelectedDeck] = useState(null);
      const [connected, setConnected] = useState(false);
      const [loading, setLoading] = useState(true);
      const [view, setView] = useState('decks'); // decks, slides, practice, questions
      const [showModal, setShowModal] = useState(false);
      const [modalType, setModalType] = useState('deck'); // deck, slide, question
      const [editingItem, setEditingItem] = useState(null);
      const [practiceMode, setPracticeMode] = useState(false);
      const [timer, setTimer] = useState(0);
      const [timerRunning, setTimerRunning] = useState(false);
      const timerRef = useRef(null);
      
      // Form states
      const [deckForm, setDeckForm] = useState({ title: '', presenter: '', time_limit: 15, status: 'Draft' });
      const [slideForm, setSlideForm] = useState({ title: '', notes: '', talking_points: [] });
      const [questionForm, setQuestionForm] = useState({ question: '', answer_framework: '', difficulty: 'Medium', category: 'Technical' });
      const [newTalkingPoint, setNewTalkingPoint] = useState('');
      
      useEffect(() => {
        loadData();
      }, []);
      
      useEffect(() => {
        if (timerRunning) {
          timerRef.current = setInterval(() => {
            setTimer(t => t + 1);
          }, 1000);
        }
        return () => clearInterval(timerRef.current);
      }, [timerRunning]);
      
      const loadData = async () => {
        try {
          const { data: opps } = await supabase.from('opportunities').select('id, title, agency, due_date').order('due_date');
          if (opps?.length > 0) {
            setOpportunities(opps);
            setConnected(true);
          }
          
          const { data: deckData } = await supabase.from('orals_decks').select('*').order('created_at');
          if (deckData?.length > 0) setDecks(deckData);
          
          const { data: qData } = await supabase.from('orals_questions').select('*');
          if (qData?.length > 0) setQuestions(qData);
        } catch (e) {
          console.log('Using demo data');
        }
        setLoading(false);
      };
      
      const formatTime = (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      };
      
      const handleSaveDeck = async () => {
        const payload = { ...deckForm, opportunity_id: selectedOpp.id };
        
        try {
          if (editingItem) {
            await supabase.from('orals_decks').update(payload).eq('id', editingItem.id);
            setDecks(decks.map(d => d.id === editingItem.id ? { ...d, ...payload } : d));
          } else {
            const newDeck = { ...payload, id: `deck-${Date.now()}`, slides: [] };
            const { data } = await supabase.from('orals_decks').insert(payload).select().single();
            setDecks([...decks, data || newDeck]);
          }
        } catch (e) {
          const newDeck = { ...payload, id: `deck-${Date.now()}`, slides: [] };
          if (editingItem) {
            setDecks(decks.map(d => d.id === editingItem.id ? { ...d, ...payload } : d));
          } else {
            setDecks([...decks, newDeck]);
          }
        }
        closeModal();
      };
      
      const handleSaveSlide = async () => {
        const slides = selectedDeck.slides || [];
        const newSlide = { ...slideForm, id: `s-${Date.now()}` };
        
        let updatedSlides;
        if (editingItem) {
          updatedSlides = slides.map(s => s.id === editingItem.id ? { ...s, ...slideForm } : s);
        } else {
          updatedSlides = [...slides, newSlide];
        }
        
        try {
          await supabase.from('orals_decks').update({ slides: updatedSlides }).eq('id', selectedDeck.id);
        } catch (e) {
          console.log('Demo mode');
        }
        
        setDecks(decks.map(d => d.id === selectedDeck.id ? { ...d, slides: updatedSlides } : d));
        setSelectedDeck({ ...selectedDeck, slides: updatedSlides });
        closeModal();
      };
      
      const handleSaveQuestion = async () => {
        const payload = { ...questionForm, deck_id: selectedDeck.id };
        
        try {
          if (editingItem) {
            await supabase.from('orals_questions').update(payload).eq('id', editingItem.id);
            setQuestions(questions.map(q => q.id === editingItem.id ? { ...q, ...payload } : q));
          } else {
            const newQ = { ...payload, id: `q-${Date.now()}` };
            const { data } = await supabase.from('orals_questions').insert(payload).select().single();
            setQuestions([...questions, data || newQ]);
          }
        } catch (e) {
          const newQ = { ...payload, id: `q-${Date.now()}` };
          if (editingItem) {
            setQuestions(questions.map(q => q.id === editingItem.id ? { ...q, ...payload } : q));
          } else {
            setQuestions([...questions, newQ]);
          }
        }
        closeModal();
      };
      
      const handleDelete = async (type, item) => {
        if (!confirm(`Delete this ${type}?`)) return;
        
        if (type === 'deck') {
          try { await supabase.from('orals_decks').delete().eq('id', item.id); } catch {}
          setDecks(decks.filter(d => d.id !== item.id));
          setSelectedDeck(null);
        } else if (type === 'slide') {
          const updatedSlides = (selectedDeck.slides || []).filter(s => s.id !== item.id);
          try { await supabase.from('orals_decks').update({ slides: updatedSlides }).eq('id', selectedDeck.id); } catch {}
          setDecks(decks.map(d => d.id === selectedDeck.id ? { ...d, slides: updatedSlides } : d));
          setSelectedDeck({ ...selectedDeck, slides: updatedSlides });
        } else if (type === 'question') {
          try { await supabase.from('orals_questions').delete().eq('id', item.id); } catch {}
          setQuestions(questions.filter(q => q.id !== item.id));
        }
      };
      
      const openModal = (type, item = null) => {
        setModalType(type);
        setEditingItem(item);
        if (type === 'deck') {
          setDeckForm(item ? { title: item.title, presenter: item.presenter, time_limit: item.time_limit, status: item.status } : { title: '', presenter: '', time_limit: 15, status: 'Draft' });
        } else if (type === 'slide') {
          setSlideForm(item ? { title: item.title, notes: item.notes, talking_points: item.talking_points || [] } : { title: '', notes: '', talking_points: [] });
        } else if (type === 'question') {
          setQuestionForm(item ? { question: item.question, answer_framework: item.answer_framework, difficulty: item.difficulty, category: item.category } : { question: '', answer_framework: '', difficulty: 'Medium', category: 'Technical' });
        }
        setShowModal(true);
      };
      
      const closeModal = () => {
        setShowModal(false);
        setEditingItem(null);
        setNewTalkingPoint('');
      };
      
      const addTalkingPoint = () => {
        if (newTalkingPoint.trim()) {
          setSlideForm({ ...slideForm, talking_points: [...slideForm.talking_points, newTalkingPoint.trim()] });
          setNewTalkingPoint('');
        }
      };
      
      const removeTalkingPoint = (idx) => {
        setSlideForm({ ...slideForm, talking_points: slideForm.talking_points.filter((_, i) => i !== idx) });
      };
      
      const oppDecks = selectedOpp ? decks.filter(d => d.opportunity_id === selectedOpp.id) : [];
      const deckQuestions = selectedDeck ? questions.filter(q => q.deck_id === selectedDeck.id) : [];
      
      const getStatusColor = (status) => {
        const colors = { 'Draft': 'bg-slate-500', 'In Progress': 'bg-amber-500', 'Ready': 'bg-emerald-500' };
        return colors[status] || 'bg-slate-500';
      };
      
      const getDifficultyColor = (diff) => {
        const colors = { 'Easy': 'text-emerald-400', 'Medium': 'text-amber-400', 'Hard': 'text-red-400' };
        return colors[diff] || 'text-slate-400';
      };
      
      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-cyan-400 flex items-center gap-3">
              <div className="w-6 h-6 border-2 border-cyan-400 border-t-transparent rounded-full animate-spin"></div>
              Loading Orals Studio...
            </div>
          </div>
        );
      }
      
      return (
        <div className="min-h-screen">
          {/* Connection Status */}
          <div className={`fixed top-4 right-4 px-3 py-1.5 rounded-full text-xs font-medium z-50 ${connected ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-amber-500/20 text-amber-400 border border-amber-500/30'}`}>
            {connected ? '● Live' : '○ Demo Mode'}
          </div>
          
          {/* Header */}
          <header className="glass border-b border-cyan-500/20 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="text-slate-400 hover:text-cyan-400">← Back</a>
                  <div>
                    <h1 className="text-2xl font-bold text-white">🎤 Orals Studio</h1>
                    <p className="text-slate-400 text-sm">Prepare presentations and practice Q&A responses</p>
                  </div>
                </div>
                <div className="cui-badge px-2 py-1 rounded text-white text-xs">CUI // SP-PROPIN</div>
              </div>
            </div>
          </header>
          
          <main className="max-w-7xl mx-auto px-6 py-8">
            {/* Opportunity Selector */}
            {!selectedOpp ? (
              <div className="glass rounded-xl p-8 glow">
                <h2 className="text-xl font-semibold text-white mb-6">Select Opportunity</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                  {opportunities.map(opp => (
                    <button
                      key={opp.id}
                      onClick={() => setSelectedOpp(opp)}
                      className="p-6 rounded-lg bg-slate-800/50 border border-slate-700 hover:border-cyan-500/50 text-left transition-all"
                    >
                      <h3 className="font-semibold text-white mb-2">{opp.title}</h3>
                      <p className="text-slate-400 text-sm">{opp.agency}</p>
                      <p className="text-cyan-400 text-sm mt-2">{decks.filter(d => d.opportunity_id === opp.id).length} decks</p>
                    </button>
                  ))}
                </div>
              </div>
            ) : !selectedDeck ? (
              /* Deck List View */
              <div>
                <div className="flex items-center justify-between mb-6">
                  <div>
                    <button onClick={() => setSelectedOpp(null)} className="text-slate-400 hover:text-cyan-400 text-sm mb-2">← Change Opportunity</button>
                    <h2 className="text-xl font-semibold text-white">{selectedOpp.title}</h2>
                    <p className="text-slate-400 text-sm">{oppDecks.length} presentation deck{oppDecks.length !== 1 ? 's' : ''}</p>
                  </div>
                  <button onClick={() => openModal('deck')} className="bg-cyan-500 hover:bg-cyan-600 text-slate-900 px-4 py-2 rounded-lg font-medium">
                    + New Deck
                  </button>
                </div>
                
                <div className="grid gap-4">
                  {oppDecks.map(deck => (
                    <div key={deck.id} className="glass rounded-xl p-6 glow hover:border-cyan-500/30 transition-all">
                      <div className="flex justify-between items-start">
                        <div className="flex-1">
                          <div className="flex items-center gap-3 mb-2">
                            <h3 className="font-semibold text-white text-lg">{deck.title}</h3>
                            <span className={`px-2 py-0.5 rounded text-xs text-white ${getStatusColor(deck.status)}`}>{deck.status}</span>
                          </div>
                          <p className="text-slate-400">Presenter: {deck.presenter}</p>
                          <div className="flex items-center gap-4 mt-3 text-sm text-slate-500">
                            <span>⏱️ {deck.time_limit} min</span>
                            <span>📑 {(deck.slides || []).length} slides</span>
                            <span>❓ {questions.filter(q => q.deck_id === deck.id).length} Q&As</span>
                          </div>
                        </div>
                        <div className="flex gap-2">
                          <button onClick={() => setSelectedDeck(deck)} className="bg-cyan-500/20 hover:bg-cyan-500/30 text-cyan-400 px-4 py-2 rounded-lg text-sm">
                            Open
                          </button>
                          <button onClick={() => openModal('deck', deck)} className="text-slate-400 hover:text-cyan-400 p-2">✏️</button>
                          <button onClick={() => handleDelete('deck', deck)} className="text-slate-400 hover:text-red-400 p-2">🗑️</button>
                        </div>
                      </div>
                    </div>
                  ))}
                  
                  {oppDecks.length === 0 && (
                    <div className="text-center py-12 text-slate-500">
                      <div className="text-4xl mb-3">🎤</div>
                      <p>No presentation decks yet</p>
                      <p className="text-sm">Create your first deck to start preparing</p>
                    </div>
                  )}
                </div>
              </div>
            ) : (
              /* Deck Detail View */
              <div>
                <div className="flex items-center justify-between mb-6">
                  <div>
                    <button onClick={() => setSelectedDeck(null)} className="text-slate-400 hover:text-cyan-400 text-sm mb-2">← Back to Decks</button>
                    <h2 className="text-xl font-semibold text-white">{selectedDeck.title}</h2>
                    <p className="text-slate-400 text-sm">Presenter: {selectedDeck.presenter} • {selectedDeck.time_limit} minutes</p>
                  </div>
                  <div className="flex gap-2">
                    <button 
                      onClick={() => { setView('slides'); setPracticeMode(false); }}
                      className={`px-4 py-2 rounded-lg text-sm ${view === 'slides' ? 'bg-cyan-500 text-slate-900' : 'bg-slate-700 text-white'}`}
                    >
                      📑 Slides
                    </button>
                    <button 
                      onClick={() => { setView('questions'); setPracticeMode(false); }}
                      className={`px-4 py-2 rounded-lg text-sm ${view === 'questions' ? 'bg-cyan-500 text-slate-900' : 'bg-slate-700 text-white'}`}
                    >
                      ❓ Q&A
                    </button>
                    <button 
                      onClick={() => { setView('practice'); setPracticeMode(true); setTimer(0); }}
                      className={`px-4 py-2 rounded-lg text-sm ${view === 'practice' ? 'bg-emerald-500 text-slate-900' : 'bg-slate-700 text-white'}`}
                    >
                      🎯 Practice
                    </button>
                  </div>
                </div>
                
                {view === 'slides' && (
                  <div className="glass rounded-xl p-6 glow">
                    <div className="flex justify-between items-center mb-6">
                      <h3 className="text-lg font-semibold text-white">Slides ({(selectedDeck.slides || []).length})</h3>
                      <button onClick={() => openModal('slide')} className="bg-cyan-500 hover:bg-cyan-600 text-slate-900 px-4 py-2 rounded-lg text-sm font-medium">
                        + Add Slide
                      </button>
                    </div>
                    
                    <div className="space-y-4">
                      {(selectedDeck.slides || []).map((slide, idx) => (
                        <div key={slide.id} className="bg-slate-800/50 rounded-lg p-5 border border-slate-700">
                          <div className="flex justify-between items-start">
                            <div className="flex gap-4">
                              <div className="w-10 h-10 bg-cyan-500/20 rounded-lg flex items-center justify-center text-cyan-400 font-bold">
                                {idx + 1}
                              </div>
                              <div className="flex-1">
                                <h4 className="font-semibold text-white mb-2">{slide.title}</h4>
                                <p className="text-slate-400 text-sm mb-3">{slide.notes}</p>
                                {slide.talking_points?.length > 0 && (
                                  <div className="flex flex-wrap gap-2">
                                    {slide.talking_points.map((tp, i) => (
                                      <span key={i} className="bg-slate-700 px-2 py-1 rounded text-xs text-slate-300">• {tp}</span>
                                    ))}
                                  </div>
                                )}
                              </div>
                            </div>
                            <div className="flex gap-2">
                              <button onClick={() => openModal('slide', slide)} className="text-slate-400 hover:text-cyan-400">✏️</button>
                              <button onClick={() => handleDelete('slide', slide)} className="text-slate-400 hover:text-red-400">🗑️</button>
                            </div>
                          </div>
                        </div>
                      ))}
                      
                      {(selectedDeck.slides || []).length === 0 && (
                        <div className="text-center py-8 text-slate-500">No slides yet</div>
                      )}
                    </div>
                  </div>
                )}
                
                {view === 'questions' && (
                  <div className="glass rounded-xl p-6 glow">
                    <div className="flex justify-between items-center mb-6">
                      <h3 className="text-lg font-semibold text-white">Anticipated Questions ({deckQuestions.length})</h3>
                      <button onClick={() => openModal('question')} className="bg-cyan-500 hover:bg-cyan-600 text-slate-900 px-4 py-2 rounded-lg text-sm font-medium">
                        + Add Question
                      </button>
                    </div>
                    
                    <div className="space-y-4">
                      {deckQuestions.map((q, idx) => (
                        <div key={q.id} className="bg-slate-800/50 rounded-lg p-5 border border-slate-700">
                          <div className="flex justify-between items-start mb-3">
                            <div className="flex items-center gap-2">
                              <span className={`font-medium ${getDifficultyColor(q.difficulty)}`}>{q.difficulty}</span>
                              <span className="bg-slate-700 px-2 py-0.5 rounded text-xs text-slate-400">{q.category}</span>
                            </div>
                            <div className="flex gap-2">
                              <button onClick={() => openModal('question', q)} className="text-slate-400 hover:text-cyan-400">✏️</button>
                              <button onClick={() => handleDelete('question', q)} className="text-slate-400 hover:text-red-400">🗑️</button>
                            </div>
                          </div>
                          <p className="text-white font-medium mb-2">{q.question}</p>
                          <div className="bg-slate-900/50 p-3 rounded">
                            <p className="text-xs text-cyan-400 mb-1">ANSWER FRAMEWORK</p>
                            <p className="text-slate-300 text-sm">{q.answer_framework}</p>
                          </div>
                        </div>
                      ))}
                      
                      {deckQuestions.length === 0 && (
                        <div className="text-center py-8 text-slate-500">No Q&A items yet</div>
                      )}
                    </div>
                  </div>
                )}
                
                {view === 'practice' && (
                  <div className="glass rounded-xl p-8 glow">
                    <div className="text-center mb-8">
                      <div className="text-6xl font-bold text-cyan-400 mb-2">{formatTime(timer)}</div>
                      <p className="text-slate-400">Time Limit: {selectedDeck.time_limit}:00</p>
                      <div className={`mt-2 ${timer > selectedDeck.time_limit * 60 ? 'text-red-400' : 'text-emerald-400'}`}>
                        {timer > selectedDeck.time_limit * 60 ? '⚠️ Over Time!' : timer > selectedDeck.time_limit * 45 ? '⏰ 75% Complete' : '✓ On Track'}
                      </div>
                      <div className="flex justify-center gap-4 mt-4">
                        <button 
                          onClick={() => setTimerRunning(!timerRunning)}
                          className={`px-6 py-3 rounded-lg font-medium ${timerRunning ? 'bg-amber-500 text-slate-900' : 'bg-emerald-500 text-slate-900'}`}
                        >
                          {timerRunning ? '⏸️ Pause' : '▶️ Start'}
                        </button>
                        <button 
                          onClick={() => { setTimer(0); setTimerRunning(false); }}
                          className="bg-slate-700 text-white px-6 py-3 rounded-lg font-medium"
                        >
                          🔄 Reset
                        </button>
                      </div>
                    </div>
                    
                    <div className="grid gap-4">
                      {(selectedDeck.slides || []).map((slide, idx) => (
                        <div key={slide.id} className="bg-slate-800/50 p-4 rounded-lg border border-slate-700">
                          <div className="flex items-center gap-3">
                            <span className="w-8 h-8 bg-cyan-500/20 rounded flex items-center justify-center text-cyan-400 font-bold">{idx + 1}</span>
                            <span className="text-white font-medium">{slide.title}</span>
                          </div>
                          {slide.talking_points?.length > 0 && (
                            <ul className="ml-11 mt-2 text-sm text-slate-400 list-disc list-inside">
                              {slide.talking_points.map((tp, i) => <li key={i}>{tp}</li>)}
                            </ul>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}
          </main>
          
          {/* Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50 p-4">
              <div className="glass rounded-xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
                <div className="p-6">
                  <h2 className="text-xl font-semibold text-white mb-6">
                    {editingItem ? 'Edit' : 'Add'} {modalType === 'deck' ? 'Presentation Deck' : modalType === 'slide' ? 'Slide' : 'Question'}
                  </h2>
                  
                  {modalType === 'deck' && (
                    <div className="space-y-4">
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Title *</label>
                        <input type="text" value={deckForm.title} onChange={(e) => setDeckForm({ ...deckForm, title: e.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white" placeholder="e.g., Technical Approach Presentation" />
                      </div>
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Presenter *</label>
                        <input type="text" value={deckForm.presenter} onChange={(e) => setDeckForm({ ...deckForm, presenter: e.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white" placeholder="Name of presenter" />
                      </div>
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-sm text-slate-400 mb-1">Time Limit (min)</label>
                          <input type="number" value={deckForm.time_limit} onChange={(e) => setDeckForm({ ...deckForm, time_limit: parseInt(e.target.value) || 15 })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white" />
                        </div>
                        <div>
                          <label className="block text-sm text-slate-400 mb-1">Status</label>
                          <select value={deckForm.status} onChange={(e) => setDeckForm({ ...deckForm, status: e.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white">
                            <option>Draft</option>
                            <option>In Progress</option>
                            <option>Ready</option>
                          </select>
                        </div>
                      </div>
                    </div>
                  )}
                  
                  {modalType === 'slide' && (
                    <div className="space-y-4">
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Slide Title *</label>
                        <input type="text" value={slideForm.title} onChange={(e) => setSlideForm({ ...slideForm, title: e.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white" />
                      </div>
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Speaker Notes</label>
                        <textarea value={slideForm.notes} onChange={(e) => setSlideForm({ ...slideForm, notes: e.target.value })} rows={3} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white" />
                      </div>
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Talking Points</label>
                        <div className="flex gap-2 mb-2">
                          <input type="text" value={newTalkingPoint} onChange={(e) => setNewTalkingPoint(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && addTalkingPoint()} className="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white" placeholder="Add point..." />
                          <button onClick={addTalkingPoint} className="bg-cyan-500 text-slate-900 px-4 rounded-lg">+</button>
                        </div>
                        <div className="flex flex-wrap gap-2">
                          {slideForm.talking_points.map((tp, i) => (
                            <span key={i} className="bg-slate-700 px-2 py-1 rounded text-sm text-white flex items-center gap-2">
                              {tp}
                              <button onClick={() => removeTalkingPoint(i)} className="text-slate-400 hover:text-red-400">×</button>
                            </span>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}
                  
                  {modalType === 'question' && (
                    <div className="space-y-4">
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Question *</label>
                        <textarea value={questionForm.question} onChange={(e) => setQuestionForm({ ...questionForm, question: e.target.value })} rows={2} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white" />
                      </div>
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-sm text-slate-400 mb-1">Difficulty</label>
                          <select value={questionForm.difficulty} onChange={(e) => setQuestionForm({ ...questionForm, difficulty: e.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white">
                            <option>Easy</option>
                            <option>Medium</option>
                            <option>Hard</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-sm text-slate-400 mb-1">Category</label>
                          <select value={questionForm.category} onChange={(e) => setQuestionForm({ ...questionForm, category: e.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white">
                            <option>Technical</option>
                            <option>Management</option>
                            <option>Experience</option>
                            <option>Cost</option>
                            <option>Compliance</option>
                          </select>
                        </div>
                      </div>
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Answer Framework</label>
                        <textarea value={questionForm.answer_framework} onChange={(e) => setQuestionForm({ ...questionForm, answer_framework: e.target.value })} rows={3} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white" placeholder="Key points, STAR method, data to cite..." />
                      </div>
                    </div>
                  )}
                  
                  <div className="flex justify-end gap-3 mt-6">
                    <button onClick={closeModal} className="px-4 py-2 text-slate-400 hover:text-white">Cancel</button>
                    <button onClick={modalType === 'deck' ? handleSaveDeck : modalType === 'slide' ? handleSaveSlide : handleSaveQuestion} className="bg-cyan-500 hover:bg-cyan-600 text-slate-900 px-6 py-2 rounded-lg font-medium">
                      {editingItem ? 'Save Changes' : 'Create'}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
          
          {/* Footer */}
          <footer className="mt-12 py-6 text-center text-xs text-slate-500 border-t border-slate-800">
            <p>Mission Meets Tech • Shield & Pulse UX v8.0</p>
            <p className="mt-1">AI GENERATED - REQUIRES HUMAN REVIEW</p>
          </footer>
        </div>
      );
    }
    
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
