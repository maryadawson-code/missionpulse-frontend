<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Orals Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; }
    .glass { background: rgba(0, 229, 250, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.2); }
    .glow { box-shadow: 0 0 20px rgba(0, 229, 250, 0.3); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ============================================
    // CONFIGURATION
    // ============================================
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // ============================================
    // DEMO DATA (Offline Fallback)
    // ============================================
    const DEMO_DECKS = [
      {

        opportunity_id: 'aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa',
        title: 'VA EHR Modernization - Technical Approach',
        deck_type: 'technical',
        status: 'draft',
        slides: [
          { id: 1, title: 'Executive Summary', content: 'Mission Meets Tech brings 15+ years of VA healthcare IT experience...', speaker_notes: 'Open with VA-specific credentials', duration: 3 },
          { id: 2, title: 'Technical Architecture', content: 'Cloud-native, FHIR-compliant solution architecture...', speaker_notes: 'Emphasize zero-downtime migration', duration: 5 },
          { id: 3, title: 'Implementation Timeline', content: 'Phased rollout across 170 VA facilities...', speaker_notes: 'Highlight lessons learned from previous VA work', duration: 4 }
        ],
        total_duration: 12,
        practice_sessions: 3,

      },
      {
        id: 'demo-2',
        opportunity_id: 'aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa',
        title: 'VA EHR Modernization - Management Approach',
        deck_type: 'management',
        status: 'approved',
        slides: [
          { id: 1, title: 'Program Management Office', content: 'Dedicated PMO with VA clearances...', speaker_notes: 'Introduce key personnel', duration: 4 },
          { id: 2, title: 'Risk Mitigation Strategy', content: 'Proactive risk identification and response...', speaker_notes: 'Reference past performance', duration: 3 },
          { id: 3, title: 'Quality Assurance', content: 'CMMI Level 3 certified processes...', speaker_notes: 'Emphasize continuous improvement', duration: 3 }
        ],
        total_duration: 10,
        practice_sessions: 5,
        last_practice: '2026-01-27T16:00:00Z',
        qa_scenarios: ['How will you manage subcontractors?', 'What is your approach to knowledge transfer?'],

      },
      {
        id: 'demo-3',
        opportunity_id: 'bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb',
        title: 'DHA MHS GENESIS - Past Performance',
        deck_type: 'past_performance',
        status: 'in_review',
        slides: [
          { id: 1, title: 'Relevant Experience', content: 'Successful delivery of 12 DoD health IT contracts...', speaker_notes: 'Focus on DHA relationships', duration: 5 },
          { id: 2, title: 'Case Study: Navy MEDCOI', content: 'Modernized clinical operations for 23 MTFs...', speaker_notes: 'Use specific metrics', duration: 4 }
        ],
        total_duration: 9,
        practice_sessions: 2,
        last_practice: '2026-01-26T11:00:00Z',
        qa_scenarios: ['Describe a challenging project and how you overcame obstacles', 'What differentiates your approach from competitors?'],
        created_at: '2026-01-22T15:30:00Z'
      }
    ];

    const DEMO_OPPORTUNITIES = [
      { id: 'aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa', title: 'VA EHR Modernization', agency: 'VA', value: 125000000 },
      { id: 'bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb', title: 'DHA MHS GENESIS', agency: 'DHA', value: 340000000 },
      { id: 'cccccccc-cccc-cccc-cccc-cccccccccccc', title: 'CMS Quality Payment', agency: 'CMS', value: 85000000 }
    ];

    // ============================================
    // ICONS
    // ============================================
    const Icons = {
      presentation: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" /></svg>,
      play: () => <svg className="w-full h-full" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>,
      pause: () => <svg className="w-full h-full" fill="currentColor" viewBox="0 0 24 24"><path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/></svg>,
      mic: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>,
      clock: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6l4 2" /></svg>,
      plus: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
      x: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>,
      edit: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>,
      trash: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
      arrowLeft: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>,
      sparkles: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" /></svg>,
      question: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      users: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
      chevronLeft: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>,
      chevronRight: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>,
      refresh: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>,
      target: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><circle cx="12" cy="12" r="6" strokeWidth={2}/><circle cx="12" cy="12" r="2" strokeWidth={2}/></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    // ============================================
    // CONFIG
    // ============================================
    const DECK_TYPES = {
      technical: { label: 'Technical Approach', color: 'cyan' },
      management: { label: 'Management Approach', color: 'purple' },
      past_performance: { label: 'Past Performance', color: 'amber' },
      cost: { label: 'Cost/Price', color: 'emerald' },
      overview: { label: 'Executive Overview', color: 'blue' }
    };

    const STATUSES = {
      draft: { label: 'Draft', color: 'slate' },
      in_review: { label: 'In Review', color: 'amber' },
      approved: { label: 'Approved', color: 'emerald' },
      presented: { label: 'Presented', color: 'blue' }
    };

    // ============================================
    // COMPONENTS
    // ============================================
    const Badge = ({ children, variant = 'default', size = 'sm' }) => {
      const variants = {
        default: 'bg-slate-700 text-slate-300',
        cyan: 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30',
        emerald: 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30',
        amber: 'bg-amber-500/20 text-amber-400 border border-amber-500/30',
        purple: 'bg-purple-500/20 text-purple-400 border border-purple-500/30',
        blue: 'bg-blue-500/20 text-blue-400 border border-blue-500/30',
        slate: 'bg-slate-500/20 text-slate-400 border border-slate-500/30'
      };
      const sizes = { xs: 'px-1.5 py-0.5 text-xs', sm: 'px-2 py-1 text-xs', md: 'px-3 py-1.5 text-sm' };
      return <span className={`inline-flex items-center gap-1 rounded-full font-medium ${variants[variant]} ${sizes[size]}`}>{children}</span>;
    };

    const Button = ({ children, variant = 'primary', size = 'md', icon, className = '', disabled = false, ...props }) => {
      const variants = {
        primary: 'bg-gradient-to-r from-cyan-500 to-teal-500 text-white hover:from-cyan-400 hover:to-teal-400',
        secondary: 'bg-slate-700 text-white hover:bg-slate-600 border border-slate-600',
        ghost: 'bg-transparent text-slate-400 hover:text-white hover:bg-slate-700/50',
        danger: 'bg-red-500/20 text-red-400 hover:bg-red-500/30 border border-red-500/30',
        success: 'bg-emerald-500 text-white hover:bg-emerald-400'
      };
      const sizes = { xs: 'px-2 py-1 text-xs', sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2 text-sm', lg: 'px-6 py-3 text-base' };
      return (
        <button className={`inline-flex items-center justify-center gap-2 font-semibold rounded-xl transition-all duration-200 ${variants[variant]} ${sizes[size]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`} disabled={disabled} {...props}>
          {icon && <Icon name={icon} className="w-4 h-4" />}{children}
        </button>
      );
    };

    const Card = ({ children, className = '', glow = false, onClick }) => (
      <div onClick={onClick} className={`glass rounded-2xl ${glow ? 'glow' : ''} ${onClick ? 'cursor-pointer hover:border-cyan-500/40' : ''} ${className}`}>{children}</div>
    );

    // ============================================
    // DECK CARD
    // ============================================
    const DeckCard = ({ deck, opportunities, onEdit, onDelete, onPractice, onViewSlides }) => {
      const deckType = DECK_TYPES[deck.deck_type] || DECK_TYPES.overview;
      const status = STATUSES[deck.status] || STATUSES.draft;
      const opportunity = opportunities.find(o => o.id === deck.opportunity_id);
      const slides = deck.slides || [];
      const qaScenarios = deck.qa_scenarios || [];

      return (
        <Card className="p-5 hover:border-cyan-500/40 transition-all">
          <div className="flex items-start justify-between mb-4">
            <div className="flex items-center gap-3">
              <div className={`w-12 h-12 rounded-xl bg-${deckType.color}-500/20 flex items-center justify-center`}>
                <Icon name="presentation" className={`w-6 h-6 text-${deckType.color}-400`} />
              </div>
              <div>
                <h3 className="font-semibold text-white">{deck.title}</h3>
                <p className="text-xs text-slate-400">{opportunity?.title || 'Unknown Opportunity'}</p>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <Badge variant={deckType.color}>{deckType.label}</Badge>
              <Badge variant={status.color}>{status.label}</Badge>
            </div>
          </div>

          {/* Stats Row */}
          <div className="grid grid-cols-4 gap-3 mb-4">
            <div className="text-center p-2 rounded-lg bg-slate-800/50">
              <p className="text-lg font-bold text-white">{slides.length}</p>
              <p className="text-xs text-slate-400">Slides</p>
            </div>
            <div className="text-center p-2 rounded-lg bg-slate-800/50">
              <p className="text-lg font-bold text-cyan-400">{deck.total_duration || 0}m</p>
              <p className="text-xs text-slate-400">Duration</p>
            </div>
            <div className="text-center p-2 rounded-lg bg-slate-800/50">
              <p className="text-lg font-bold text-emerald-400">{deck.practice_sessions || 0}</p>
              <p className="text-xs text-slate-400">Practices</p>
            </div>
            <div className="text-center p-2 rounded-lg bg-slate-800/50">
              <p className="text-lg font-bold text-amber-400">{qaScenarios.length}</p>
              <p className="text-xs text-slate-400">Q&A Prep</p>
            </div>
          </div>

          {/* Slides Preview */}
          {slides.length > 0 && (
            <div className="mb-4">
              <p className="text-xs text-slate-500 uppercase tracking-wider mb-2">Slides</p>
              <div className="flex gap-2 overflow-x-auto pb-2">
                {slides.slice(0, 5).map((slide, i) => (
                  <div key={i} className="flex-shrink-0 w-32 h-20 rounded-lg bg-slate-800 border border-slate-700 p-2 flex flex-col justify-between">
                    <p className="text-xs font-medium text-white truncate">{slide.title}</p>
                    <p className="text-xs text-slate-500">{slide.duration}m</p>
                  </div>
                ))}
                {slides.length > 5 && (
                  <div className="flex-shrink-0 w-32 h-20 rounded-lg bg-slate-800/50 border border-slate-700 flex items-center justify-center">
                    <p className="text-xs text-slate-400">+{slides.length - 5} more</p>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Q&A Preview */}
          {qaScenarios.length > 0 && (
            <div className="mb-4">
              <p className="text-xs text-slate-500 uppercase tracking-wider mb-2">Q&A Scenarios</p>
              <div className="space-y-1">
                {qaScenarios.slice(0, 2).map((q, i) => (
                  <div key={i} className="flex items-start gap-2 text-xs text-slate-400">
                    <Icon name="question" className="w-3 h-3 text-amber-400 mt-0.5 flex-shrink-0" />
                    <span className="truncate">{q}</span>
                  </div>
                ))}
                {qaScenarios.length > 2 && (
                  <p className="text-xs text-slate-500 pl-5">+{qaScenarios.length - 2} more questions</p>
                )}
              </div>
            </div>
          )}

          {/* Actions */}
          <div className="flex items-center justify-between pt-3 border-t border-slate-700/50">
            <span className="text-xs text-slate-500">
              {deck.last_practice ? `Last practiced: ${new Date(deck.last_practice).toLocaleDateString()}` : 'Not practiced yet'}
            </span>
            <div className="flex items-center gap-1">
              <Button variant="ghost" size="xs" icon="play" onClick={() => onPractice(deck)} title="Practice Mode" />
              <Button variant="ghost" size="xs" icon="presentation" onClick={() => onViewSlides(deck)} title="View Slides" />
              <Button variant="ghost" size="xs" icon="edit" onClick={() => onEdit(deck)} title="Edit" />
              <Button variant="ghost" size="xs" icon="trash" onClick={() => onDelete(deck)} title="Delete" />
            </div>
          </div>
        </Card>
      );
    };

    // ============================================
    // PRACTICE MODE
    // ============================================
    const PracticeMode = ({ deck, onClose, onComplete }) => {
      const [currentSlide, setCurrentSlide] = useState(0);
      const [showNotes, setShowNotes] = useState(true);
      const [timer, setTimer] = useState(0);
      const [isRunning, setIsRunning] = useState(false);
      const slides = deck.slides || [];

      useEffect(() => {
        let interval;
        if (isRunning) {
          interval = setInterval(() => setTimer(t => t + 1), 1000);
        }
        return () => clearInterval(interval);
      }, [isRunning]);

      const formatTime = (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins}:${secs.toString().padStart(2, '0')}`;
      };

      const currentSlideData = slides[currentSlide] || {};
      const slideTime = (currentSlideData.duration || 3) * 60;
      const isOverTime = timer > slideTime;

      return (
        <div className="fixed inset-0 bg-slate-950 z-50 flex flex-col">
          {/* Header */}
          <div className="flex items-center justify-between p-4 border-b border-slate-800">
            <div className="flex items-center gap-4">
              <Button variant="ghost" size="sm" icon="x" onClick={onClose}>Exit</Button>
              <div>
                <h2 className="font-semibold text-white">{deck.title}</h2>
                <p className="text-xs text-slate-400">Slide {currentSlide + 1} of {slides.length}</p>
              </div>
            </div>
            <div className="flex items-center gap-4">
              <div className={`text-2xl font-mono font-bold ${isOverTime ? 'text-red-400' : 'text-cyan-400'}`}>
                {formatTime(timer)}
              </div>
              <Button
                variant={isRunning ? 'secondary' : 'primary'}
                icon={isRunning ? 'pause' : 'play'}
                onClick={() => setIsRunning(!isRunning)}
              >
                {isRunning ? 'Pause' : 'Start'}
              </Button>
            </div>
          </div>

          {/* Content */}
          <div className="flex-1 flex">
            {/* Slide Display */}
            <div className="flex-1 p-8 flex flex-col">
              <Card className="flex-1 p-8 flex flex-col items-center justify-center text-center" glow>
                <h1 className="text-4xl font-bold text-white mb-6">{currentSlideData.title}</h1>
                <p className="text-xl text-slate-300 max-w-2xl leading-relaxed">{currentSlideData.content}</p>
              </Card>

              {/* Progress */}
              <div className="mt-4 flex gap-1">
                {slides.map((_, i) => (
                  <div
                    key={i}
                    className={`h-1 flex-1 rounded-full transition-colors cursor-pointer ${i === currentSlide ? 'bg-cyan-400' : i < currentSlide ? 'bg-emerald-500' : 'bg-slate-700'}`}
                    onClick={() => { setCurrentSlide(i); setTimer(0); }}
                  />
                ))}
              </div>
            </div>

            {/* Speaker Notes */}
            {showNotes && (
              <div className="w-80 border-l border-slate-800 p-4 flex flex-col">
                <div className="flex items-center justify-between mb-4">
                  <h3 className="font-semibold text-white">Speaker Notes</h3>
                  <span className="text-xs text-slate-400">Target: {currentSlideData.duration}m</span>
                </div>
                <div className="flex-1 bg-slate-800/50 rounded-lg p-4">
                  <p className="text-sm text-slate-300">{currentSlideData.speaker_notes || 'No notes for this slide'}</p>
                </div>
                <div className="mt-4 pt-4 border-t border-slate-700">
                  <p className="text-xs text-slate-500 uppercase tracking-wider mb-2">Timing Guide</p>
                  <div className="space-y-1">
                    <div className="flex justify-between text-xs">
                      <span className="text-slate-400">This slide</span>
                      <span className={isOverTime ? 'text-red-400' : 'text-emerald-400'}>
                        {formatTime(timer)} / {currentSlideData.duration}:00
                      </span>
                    </div>
                    <div className="flex justify-between text-xs">
                      <span className="text-slate-400">Total deck</span>
                      <span className="text-cyan-400">{deck.total_duration} min</span>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* Navigation */}
          <div className="flex items-center justify-between p-4 border-t border-slate-800">
            <Button
              variant="secondary"
              icon="chevronLeft"
              onClick={() => { setCurrentSlide(Math.max(0, currentSlide - 1)); setTimer(0); }}
              disabled={currentSlide === 0}
            >
              Previous
            </Button>
            <Button variant="ghost" size="sm" onClick={() => setShowNotes(!showNotes)}>
              {showNotes ? 'Hide Notes' : 'Show Notes'}
            </Button>
            {currentSlide < slides.length - 1 ? (
              <Button
                variant="primary"
                icon="chevronRight"
                onClick={() => { setCurrentSlide(currentSlide + 1); setTimer(0); }}
              >
                Next
              </Button>
            ) : (
              <Button variant="success" icon="check" onClick={onComplete}>
                Complete Practice
              </Button>
            )}
          </div>
        </div>
      );
    };

    // ============================================
    // DECK FORM MODAL
    // ============================================
    const DeckFormModal = ({ deck, opportunities, onSave, onClose }) => {
      const [formData, setFormData] = useState({
        opportunity_id: deck?.opportunity_id || opportunities[0]?.id || '',
        title: deck?.title || '',
        deck_type: deck?.deck_type || 'technical',
        status: deck?.status || 'draft',
        slides: deck?.slides || [{ id: 1, title: '', content: '', speaker_notes: '', duration: 3 }],
        qa_scenarios: deck?.qa_scenarios?.join('\n') || ''
      });

      const addSlide = () => {
        setFormData({
          ...formData,
          slides: [...formData.slides, { id: formData.slides.length + 1, title: '', content: '', speaker_notes: '', duration: 3 }]
        });
      };

      const updateSlide = (index, field, value) => {
        const newSlides = [...formData.slides];
        newSlides[index] = { ...newSlides[index], [field]: value };
        setFormData({ ...formData, slides: newSlides });
      };

      const removeSlide = (index) => {
        setFormData({ ...formData, slides: formData.slides.filter((_, i) => i !== index) });
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        const totalDuration = formData.slides.reduce((sum, s) => sum + (parseInt(s.duration) || 0), 0);
        const qaArray = formData.qa_scenarios.split('\n').filter(q => q.trim());
        onSave({
          ...deck,
          ...formData,
          total_duration: totalDuration,
          qa_scenarios: qaArray
        });
      };

      return (
        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
          <Card className="w-full max-w-4xl max-h-[90vh] overflow-y-auto">
            <div className="p-6">
              <div className="flex items-center justify-between mb-6">
                <h2 className="text-xl font-bold text-white">
                  {deck ? 'Edit Presentation' : 'Create Presentation'}
                </h2>
                <Button variant="ghost" size="sm" icon="x" onClick={onClose} />
              </div>

              <form onSubmit={handleSubmit} className="space-y-6">
                {/* Basic Info */}
                <div className="grid grid-cols-2 gap-4">
                  <div className="col-span-2">
                    <label className="block text-sm text-slate-400 mb-1">Title</label>
                    <input
                      type="text"
                      value={formData.title}
                      onChange={(e) => setFormData({...formData, title: e.target.value})}
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none"
                      placeholder="e.g., VA EHR Modernization - Technical Approach"
                      required
                    />
                  </div>
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Opportunity</label>
                    <select
                      value={formData.opportunity_id}
                      onChange={(e) => setFormData({...formData, opportunity_id: e.target.value})}
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none"
                    >
                      {opportunities.map(opp => (
                        <option key={opp.id} value={opp.id}>{opp.title}</option>
                      ))}
                    </select>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Type</label>
                      <select
                        value={formData.deck_type}
                        onChange={(e) => setFormData({...formData, deck_type: e.target.value})}
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none"
                      >
                        {Object.entries(DECK_TYPES).map(([key, type]) => (
                          <option key={key} value={key}>{type.label}</option>
                        ))}
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Status</label>
                      <select
                        value={formData.status}
                        onChange={(e) => setFormData({...formData, status: e.target.value})}
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none"
                      >
                        {Object.entries(STATUSES).map(([key, s]) => (
                          <option key={key} value={key}>{s.label}</option>
                        ))}
                      </select>
                    </div>
                  </div>
                </div>

                {/* Slides */}
                <div>
                  <div className="flex items-center justify-between mb-3">
                    <label className="text-sm text-slate-400">Slides</label>
                    <Button type="button" variant="ghost" size="xs" icon="plus" onClick={addSlide}>Add Slide</Button>
                  </div>
                  <div className="space-y-3 max-h-60 overflow-y-auto">
                    {formData.slides.map((slide, i) => (
                      <div key={i} className="p-3 bg-slate-800/50 rounded-lg border border-slate-700">
                        <div className="flex items-start gap-3">
                          <span className="text-xs text-slate-500 pt-2">{i + 1}</span>
                          <div className="flex-1 space-y-2">
                            <input
                              type="text"
                              value={slide.title}
                              onChange={(e) => updateSlide(i, 'title', e.target.value)}
                              className="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1 text-sm text-white focus:border-cyan-500 focus:outline-none"
                              placeholder="Slide title"
                            />
                            <textarea
                              value={slide.content}
                              onChange={(e) => updateSlide(i, 'content', e.target.value)}
                              className="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1 text-sm text-white focus:border-cyan-500 focus:outline-none h-16 resize-none"
                              placeholder="Slide content..."
                            />
                            <div className="flex gap-2">
                              <input
                                type="text"
                                value={slide.speaker_notes}
                                onChange={(e) => updateSlide(i, 'speaker_notes', e.target.value)}
                                className="flex-1 bg-slate-700 border border-slate-600 rounded px-2 py-1 text-sm text-white focus:border-cyan-500 focus:outline-none"
                                placeholder="Speaker notes"
                              />
                              <input
                                type="number"
                                min="1"
                                max="30"
                                value={slide.duration}
                                onChange={(e) => updateSlide(i, 'duration', parseInt(e.target.value) || 3)}
                                className="w-16 bg-slate-700 border border-slate-600 rounded px-2 py-1 text-sm text-white focus:border-cyan-500 focus:outline-none text-center"
                              />
                              <span className="text-xs text-slate-500 self-center">min</span>
                            </div>
                          </div>
                          <Button type="button" variant="ghost" size="xs" icon="trash" onClick={() => removeSlide(i)} />
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Q&A Scenarios */}
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Q&A Scenarios (one per line)</label>
                  <textarea
                    value={formData.qa_scenarios}
                    onChange={(e) => setFormData({...formData, qa_scenarios: e.target.value})}
                    className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none h-24 resize-none"
                    placeholder="What is your approach to risk mitigation?&#10;How do you handle scope changes?&#10;Describe your QA process..."
                  />
                </div>

                <div className="flex justify-end gap-3 pt-4 border-t border-slate-700">
                  <Button type="button" variant="secondary" onClick={onClose}>Cancel</Button>
                  <Button type="submit" variant="primary" icon="check">
                    {deck ? 'Update Deck' : 'Create Deck'}
                  </Button>
                </div>
              </form>
            </div>
          </Card>
        </div>
      );
    };

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [decks, setDecks] = useState(DEMO_DECKS);
      const [opportunities, setOpportunities] = useState(DEMO_OPPORTUNITIES);
      const [connected, setConnected] = useState(false);
      const [loading, setLoading] = useState(true);
      const [showModal, setShowModal] = useState(false);
      const [editingDeck, setEditingDeck] = useState(null);
      const [practiceDeck, setPracticeDeck] = useState(null);
      const [notification, setNotification] = useState(null);

      useEffect(() => {
        loadData();
      }, []);

      const showNotification = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 3000);
      };

      const loadData = async () => {
        try {
          // Load opportunities
          const { data: opps, error: oppError } = await supabase
            .from('opportunities')
            .select('id, title, agency, value')
            .order('title');
          
          if (!oppError && opps?.length > 0) {
            setOpportunities(opps);
          }

          // Load decks
          const { data: rows, error } = await supabase
            .from('orals_decks')
            .select('*')
            .order('created_at', { ascending: false });

          if (!error && rows) {
            setDecks(rows.length > 0 ? rows : DEMO_DECKS);
            setConnected(true);
          }
        } catch (e) {
          console.log('Using demo data:', e);
        }
        setLoading(false);
      };

      const handleSave = async (deckData) => {
        try {
          const slidesJson = JSON.stringify(deckData.slides || []);
          const qaJson = JSON.stringify(deckData.qa_scenarios || []);
          
          if (deckData.id && !deckData.id.startsWith('demo-')) {
            const { error } = await supabase
              .from('orals_decks')
              .update({
                ...deckData,
                slides: slidesJson,
                qa_scenarios: qaJson,
                updated_at: new Date().toISOString()
              })
              .eq('id', deckData.id);

            if (error) throw error;
            showNotification('Deck updated successfully');
          } else {
            const { id, ...insertData } = deckData;
            const { error } = await supabase
              .from('orals_decks')
              .insert({
                ...insertData,
                slides: slidesJson,
                qa_scenarios: qaJson,
                practice_sessions: 0
              });

            if (error) throw error;
            showNotification('Deck created successfully');
          }
          
          await loadData();
        } catch (e) {
          console.error('Save error:', e);
          if (deckData.id) {
            setDecks(decks.map(d => d.id === deckData.id ? deckData : d));
          } else {
            setDecks([{ ...deckData, id: `demo-${Date.now()}`, created_at: new Date().toISOString() }, ...decks]);
          }
          showNotification('Saved locally (demo mode)', 'warning');
        }
        setShowModal(false);
        setEditingDeck(null);
      };

      const handleDelete = async (deck) => {
        if (!confirm('Delete this presentation deck?')) return;
        
        try {
          if (!deck.id.startsWith('demo-')) {
            const { error } = await supabase.from('orals_decks').delete().eq('id', deck.id);
            if (error) throw error;
          }
          setDecks(decks.filter(d => d.id !== deck.id));
          showNotification('Deck deleted');
        } catch (e) {
          setDecks(decks.filter(d => d.id !== deck.id));
          showNotification('Deleted locally', 'warning');
        }
      };

      const handlePracticeComplete = async (deck) => {
        try {
          if (!deck.id.startsWith('demo-')) {
            const { error } = await supabase
              .from('orals_decks')
              .update({ 
                practice_sessions: (deck.practice_sessions || 0) + 1,
                last_practice: new Date().toISOString()
              })
              .eq('id', deck.id);
            if (error) throw error;
          }
          setDecks(decks.map(d => d.id === deck.id ? {
            ...d,
            practice_sessions: (d.practice_sessions || 0) + 1,
            last_practice: new Date().toISOString()
          } : d));
          showNotification('Practice session recorded!');
        } catch (e) {
          console.error('Practice update error:', e);
        }
        setPracticeDeck(null);
      };

      // Stats
      const totalDecks = decks.length;
      const totalPractices = decks.reduce((sum, d) => sum + (d.practice_sessions || 0), 0);
      const approvedDecks = decks.filter(d => d.status === 'approved').length;

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <Icon name="sparkles" className="w-12 h-12 text-cyan-400 mx-auto mb-4 animate-pulse" />
              <p className="text-slate-400">Loading orals decks...</p>
            </div>
          </div>
        );
      }

      if (practiceDeck) {
        return (
          <PracticeMode
            deck={practiceDeck}
            onClose={() => setPracticeDeck(null)}
            onComplete={() => handlePracticeComplete(practiceDeck)}
          />
        );
      }

      return (
        <div className="min-h-screen p-6">
          {/* Connection Status */}
          <div className={`fixed top-4 right-4 px-3 py-1.5 rounded-full text-xs font-medium flex items-center gap-2 z-50 ${connected ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-amber-500/20 text-amber-400 border border-amber-500/30'}`}>
            <span className={`w-2 h-2 rounded-full ${connected ? 'bg-emerald-400' : 'bg-amber-400 animate-pulse'}`}></span>
            {connected ? 'Connected' : 'Demo Mode'}
          </div>

          {/* Notification */}
          {notification && (
            <div className={`fixed top-16 right-4 px-4 py-2 rounded-lg text-sm z-50 ${notification.type === 'success' ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-amber-500/20 text-amber-400 border border-amber-500/30'}`}>
              {notification.message}
            </div>
          )}

          {/* Header */}
          <div className="max-w-7xl mx-auto mb-8">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-4">
                <a href="index.html" className="text-slate-400 hover:text-white transition-colors">
                  <Icon name="arrowLeft" className="w-5 h-5" />
                </a>
                <div>
                  <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                    <Icon name="presentation" className="w-6 h-6 text-cyan-400" />
                    Orals Studio
                  </h1>
                  <p className="text-slate-400 text-sm">Prepare, practice, and perfect your oral presentations</p>
                </div>
              </div>
              <Button variant="primary" icon="plus" onClick={() => { setEditingDeck(null); setShowModal(true); }}>
                New Deck
              </Button>
            </div>
          </div>

          {/* Stats Bar */}
          <div className="max-w-7xl mx-auto mb-6">
            <div className="grid grid-cols-4 gap-4">
              <Card className="p-4 text-center">
                <p className="text-2xl font-bold text-white">{totalDecks}</p>
                <p className="text-xs text-slate-400">Total Decks</p>
              </Card>
              <Card className="p-4 text-center">
                <p className="text-2xl font-bold text-emerald-400">{approvedDecks}</p>
                <p className="text-xs text-slate-400">Approved</p>
              </Card>
              <Card className="p-4 text-center">
                <p className="text-2xl font-bold text-cyan-400">{totalPractices}</p>
                <p className="text-xs text-slate-400">Practice Sessions</p>
              </Card>
              <Card className="p-4 text-center">
                <p className="text-2xl font-bold text-amber-400">{decks.reduce((sum, d) => sum + (d.slides?.length || 0), 0)}</p>
                <p className="text-xs text-slate-400">Total Slides</p>
              </Card>
            </div>
          </div>

          {/* Decks Grid */}
          <div className="max-w-7xl mx-auto">
            {decks.length === 0 ? (
              <Card className="p-12 text-center">
                <Icon name="presentation" className="w-12 h-12 text-slate-600 mx-auto mb-4" />
                <h3 className="text-lg font-semibold text-slate-400 mb-2">No presentation decks yet</h3>
                <p className="text-slate-500 mb-4">Create your first orals presentation deck</p>
                <Button variant="primary" icon="plus" onClick={() => { setEditingDeck(null); setShowModal(true); }}>
                  Create Deck
                </Button>
              </Card>
            ) : (
              <div className="grid md:grid-cols-2 gap-4">
                {decks.map(deck => (
                  <DeckCard
                    key={deck.id}
                    deck={deck}
                    opportunities={opportunities}
                    onEdit={(d) => { setEditingDeck(d); setShowModal(true); }}
                    onDelete={handleDelete}
                    onPractice={setPracticeDeck}
                    onViewSlides={(d) => setPracticeDeck(d)}
                  />
                ))}
              </div>
            )}
          </div>

          {/* Footer */}
          <div className="max-w-7xl mx-auto mt-12 text-center">
            <p className="text-xs text-slate-500">
              MissionPulse v3.1 • Mission Meets Tech • AI GENERATED CONTENT REQUIRES HUMAN REVIEW
            </p>
          </div>

          {/* Modal */}
          {showModal && (
            <DeckFormModal
              deck={editingDeck}
              opportunities={opportunities}
              onSave={handleSave}
              onClose={() => { setShowModal(false); setEditingDeck(null); }}
            />
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
