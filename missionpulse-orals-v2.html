        .glass { background: rgba(0, 229, 250, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.2); }

        @keyframes timer-flash { 0%, 100% { color: #EF4444; } 50% { color: #FCA5A5; } }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: rgba(0, 229, 250, 0.1); }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(0, 229, 250, 0.3); border-radius: 3px; }
    </style>

        const DEMO_SESSIONS = [

        // =========================================================================
        // UTILITY FUNCTIONS
        // =========================================================================
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function formatCurrency(value) {
            if (value >= 1000000000) return `$${(value / 1000000000).toFixed(1)}B`;
            if (value >= 1000000) return `$${(value / 1000000).toFixed(0)}M`;
            if (value >= 1000) return `$${(value / 1000).toFixed(0)}K`;
            return `$${value}`;
        }

        // =========================================================================
        // COMPONENTS
        // =========================================================================
        function DifficultyBadge({ difficulty }) {
            const config = {
                easy: { label: 'Easy', color: 'bg-emerald-500/20 text-emerald-400' },
                medium: { label: 'Medium', color: 'bg-amber-500/20 text-amber-400' },
                hard: { label: 'Hard', color: 'bg-red-500/20 text-red-400' }
            };
            const c = config[difficulty] || config.medium;
            return <span className={`px-2 py-1 rounded-full text-xs ${c.color}`}>{c.label}</span>;
        }

        function CategoryBadge({ category }) {
            const cat = QUESTION_CATEGORIES.find(c => c.id === category);
            if (!cat) return null;
            return (
                <span className={`px-2 py-1 rounded-full text-xs bg-${cat.color}-500/20 text-${cat.color}-400`}>
                    {cat.icon} {cat.label}
                </span>
            );
        }

        function ScoreDisplay({ score, size = 'md' }) {
            const sizeClasses = size === 'lg' ? 'text-4xl' : 'text-xl';
            const color = score >= 4 ? 'text-emerald-400' : score >= 3 ? 'text-amber-400' : 'text-red-400';
            return (
                <div className="flex items-center gap-1">
                    <span className={`font-bold ${sizeClasses} ${color}`}>{score?.toFixed(1) || '-'}</span>
                    <span className="text-slate-500 text-sm">/5</span>
                </div>
            );
        }

        function Timer({ seconds, isRunning, isCritical }) {
            return (
                <div className={`text-center ${isCritical ? 'timer-critical' : ''}`}>
                    <div className={`text-5xl font-mono font-bold ${
                        isCritical ? 'text-red-400' : 'text-cyan-400'
                    }`}>
                        {formatTime(seconds)}
                    </div>
                    <div className="text-sm text-slate-500 mt-1">
                        {isRunning ? 'Time Remaining' : 'Ready'}
                    </div>
                </div>
            );
        }

        function QuestionCard({ question, onStart, onEdit }) {
            return (
                <div className="glass p-4 rounded-xl hover:border-cyan-400/50 transition-all duration-300">
                    <div className="flex items-start justify-between mb-3">
                        <div className="flex items-center gap-2 flex-wrap">
                            <CategoryBadge category={question.category} />
                            <DifficultyBadge difficulty={question.difficulty} />
                        </div>
                        <span className="text-slate-500 text-sm">{formatTime(question.time_limit)}</span>
                    </div>
                    
                    <p className="text-white mb-3 line-clamp-2">{question.question}</p>
                    
                    <div className="flex items-center justify-between">
                        <div className="flex items-center gap-4 text-sm text-slate-500">
                            <span>Asked {question.times_asked || 0}x</span>
                            {question.avg_score && <ScoreDisplay score={question.avg_score} size="sm" />}
                        </div>
                        <div className="flex gap-2">
                            <button
                                onClick={() => onEdit(question)}
                                className="px-3 py-1 text-slate-400 hover:text-white transition-colors"
                            >
                                Edit
                            </button>
                            <button
                                onClick={() => onStart(question)}
                                className="px-4 py-1 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg font-medium transition-colors"
                            >
                                Practice
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function PracticeMode({ question, onComplete, onCancel }) {
            const [timeLeft, setTimeLeft] = useState(question.time_limit);
            const [isRunning, setIsRunning] = useState(false);
            const [showAnswer, setShowAnswer] = useState(false);
            const [score, setScore] = useState(null);
            const [notes, setNotes] = useState('');
            const timerRef = useRef(null);

            useEffect(() => {
                if (isRunning && timeLeft > 0) {
                    timerRef.current = setTimeout(() => setTimeLeft(t => t - 1), 1000);
                } else if (timeLeft === 0) {
                    setIsRunning(false);
                }
                return () => clearTimeout(timerRef.current);
            }, [isRunning, timeLeft]);

            const handleStart = () => setIsRunning(true);
            const handlePause = () => setIsRunning(false);
            const handleReset = () => {
                setIsRunning(false);
                setTimeLeft(question.time_limit);
            };

            const handleSubmit = () => {
                onComplete({
                    question_id: question.id,
                    score,
                    time_used: question.time_limit - timeLeft,
                    notes
                });
            };

            const isCritical = timeLeft <= 30 && timeLeft > 0;

            return (
                <div className="fixed inset-0 bg-slate-950 z-50 overflow-y-auto">
                    <div className="min-h-screen p-6">
                        <div className="max-w-4xl mx-auto">
                            {/* Header */}
                            <div className="flex items-center justify-between mb-8">
                                <div className="flex items-center gap-3">
                                    <CategoryBadge category={question.category} />
                                    <DifficultyBadge difficulty={question.difficulty} />
                                </div>
                                <button 
                                    onClick={onCancel}
                                    className="text-slate-400 hover:text-white text-2xl"
                                >
                                    ×
                                </button>
                            </div>

                            {/* Timer */}
                            <div className="glass p-8 rounded-2xl mb-8 text-center relative">
                                {isCritical && (
                                    <div className="absolute inset-0 border-2 border-red-500/50 rounded-2xl pulse-ring" />
                                )}
                                <Timer seconds={timeLeft} isRunning={isRunning} isCritical={isCritical} />
                                <div className="flex justify-center gap-4 mt-6">
                                    {!isRunning ? (
                                        <button
                                            onClick={handleStart}
                                            className="px-8 py-3 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-xl font-semibold text-lg transition-colors glow"
                                        >
                                            ▶ Start Timer
                                        </button>
                                    ) : (
                                        <button
                                            onClick={handlePause}
                                            className="px-8 py-3 bg-amber-500 hover:bg-amber-400 text-slate-900 rounded-xl font-semibold text-lg transition-colors"
                                        >
                                            ⏸ Pause
                                        </button>
                                    )}
                                    <button
                                        onClick={handleReset}
                                        className="px-6 py-3 glass rounded-xl text-slate-400 hover:text-white transition-colors"
                                    >
                                        ↺ Reset
                                    </button>
                                </div>
                            </div>

                            {/* Question */}
                            <div className="glass p-6 rounded-xl mb-6">
                                <h2 className="text-sm text-cyan-400 uppercase tracking-wide mb-3">Question</h2>
                                <p className="text-xl text-white leading-relaxed">{question.question}</p>
                                {question.tags && (
                                    <div className="flex flex-wrap gap-2 mt-4">
                                        {question.tags.map(tag => (
                                            <span key={tag} className="px-2 py-1 bg-slate-800 text-slate-400 rounded text-xs">
                                                #{tag}
                                            </span>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* Suggested Answer (toggle) */}
                            <div className="glass p-6 rounded-xl mb-6">
                                <div className="flex items-center justify-between mb-4">
                                    <h2 className="text-sm text-emerald-400 uppercase tracking-wide">Suggested Answer</h2>
                                    <button
                                        onClick={() => setShowAnswer(!showAnswer)}
                                        className="text-sm text-slate-400 hover:text-white transition-colors"
                                    >
                                        {showAnswer ? 'Hide' : 'Show'} Answer
                                    </button>
                                </div>
                                {showAnswer ? (
                                    <p className="text-slate-300 leading-relaxed">{question.suggested_answer}</p>
                                ) : (
                                    <p className="text-slate-500 italic">Click "Show Answer" after attempting your response</p>
                                )}
                            </div>

                            {/* Scoring */}
                            <div className="glass p-6 rounded-xl mb-6">
                                <h2 className="text-sm text-purple-400 uppercase tracking-wide mb-4">Rate Your Response</h2>
                                <div className="flex justify-center gap-3 mb-4">
                                    {[1, 2, 3, 4, 5].map(s => (
                                        <button
                                            key={s}
                                            onClick={() => setScore(s)}
                                            className={`w-14 h-14 rounded-xl font-bold text-xl transition-all duration-300 ${
                                                score === s 
                                                    ? 'bg-cyan-500 text-slate-900 glow' 
                                                    : 'glass text-slate-400 hover:text-white'
                                            }`}
                                        >
                                            {s}
                                        </button>
                                    ))}
                                </div>
                                <div className="flex justify-center text-sm text-slate-500">
                                    <span>1 = Poor</span>
                                    <span className="mx-4">|</span>
                                    <span>3 = Acceptable</span>
                                    <span className="mx-4">|</span>
                                    <span>5 = Excellent</span>
                                </div>
                            </div>

                            {/* Notes */}
                            <div className="glass p-6 rounded-xl mb-8">
                                <h2 className="text-sm text-amber-400 uppercase tracking-wide mb-3">Practice Notes</h2>
                                <textarea
                                    value={notes}
                                    onChange={(e) => setNotes(e.target.value)}
                                    className="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-lg text-white placeholder-slate-500 resize-none"
                                    rows={3}
                                    placeholder="Notes for improvement, areas to focus on..."
                                />
                            </div>

                            {/* Actions */}
                            <div className="flex justify-between">
                                <button
                                    onClick={onCancel}
                                    className="px-6 py-3 text-slate-400 hover:text-white transition-colors"
                                >
                                    ← Back to Questions
                                </button>
                                <button
                                    onClick={handleSubmit}
                                    disabled={!score}
                                    className={`px-8 py-3 rounded-xl font-semibold transition-all duration-300 ${
                                        score 
                                            ? 'bg-emerald-500 hover:bg-emerald-400 text-slate-900 glow'
                                            : 'bg-slate-700 text-slate-500 cursor-not-allowed'
                                    }`}
                                >
                                    Complete & Save →
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function AddQuestionModal({ opportunity, onClose, onSave }) {
            const [formData, setFormData] = useState({
                category: 'technical',
                question: '',
                suggested_answer: '',
                difficulty: 'medium',
                time_limit: 120,
                tags: ''
            });
            const [isGenerating, setIsGenerating] = useState(false);

            const generateWithAI = async () => {
                setIsGenerating(true);
                try {
                    const response = await fetch(`${API_BASE}/api/agents/orals/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            message: `Generate a challenging ${formData.category} question for a federal proposal oral presentation. 
                            The opportunity is: ${opportunity.title} for ${opportunity.agency}.
                            Include a suggested answer. Format as JSON with "question" and "suggested_answer" fields.`,
                            stream: false
                        })
                    });
                    const data = await response.json();
                    // Try to parse AI response
                    try {
                        const parsed = JSON.parse(data.response);
                        setFormData(prev => ({
                            ...prev,
                            question: parsed.question || prev.question,
                            suggested_answer: parsed.suggested_answer || prev.suggested_answer
                        }));
                    } catch {
                        // If not JSON, use as question
                        setFormData(prev => ({ ...prev, question: data.response }));
                    }
                } catch (error) {
                    console.error('AI generation failed:', error);
                }
                setIsGenerating(false);
            };

            const handleSave = () => {
                onSave({
                    ...formData,
                    opportunity_id: opportunity.id,
                    tags: formData.tags.split(',').map(t => t.trim()).filter(Boolean),
                    times_asked: 0,
                    avg_score: null
                });
            };

            return (
                <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
                    <div className="glass rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto scrollbar-thin">
                        <div className="p-6 border-b border-cyan-500/20">
                            <h2 className="text-xl font-bold text-white">Add Practice Question</h2>
                            <p className="text-slate-400 text-sm mt-1">For: {opportunity.title}</p>
                        </div>

                        <div className="p-6 space-y-4">
                            <div className="grid md:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm text-slate-400 mb-2">Category</label>
                                    <select
                                        value={formData.category}
                                        onChange={(e) => setFormData({ ...formData, category: e.target.value })}
                                        className="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white"
                                    >
                                        {QUESTION_CATEGORIES.map(cat => (
                                            <option key={cat.id} value={cat.id}>{cat.icon} {cat.label}</option>
                                        ))}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm text-slate-400 mb-2">Difficulty</label>
                                    <select
                                        value={formData.difficulty}
                                        onChange={(e) => setFormData({ ...formData, difficulty: e.target.value })}
                                        className="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white"
                                    >
                                        <option value="easy">Easy</option>
                                        <option value="medium">Medium</option>
                                        <option value="hard">Hard</option>
                                    </select>
                                </div>
                            </div>

                            <div>
                                <div className="flex items-center justify-between mb-2">
                                    <label className="text-sm text-slate-400">Question</label>
                                    <button
                                        onClick={generateWithAI}
                                        disabled={isGenerating}
                                        className="text-xs text-cyan-400 hover:text-cyan-300 disabled:opacity-50"
                                    >
                                        {isGenerating ? '⏳ Generating...' : '🤖 Generate with AI'}
                                    </button>
                                </div>
                                <textarea
                                    value={formData.question}
                                    onChange={(e) => setFormData({ ...formData, question: e.target.value })}
                                    className="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white resize-none"
                                    rows={3}
                                    placeholder="Enter the evaluator question..."
                                />
                            </div>

                            <div>
                                <label className="block text-sm text-slate-400 mb-2">Suggested Answer</label>
                                <textarea
                                    value={formData.suggested_answer}
                                    onChange={(e) => setFormData({ ...formData, suggested_answer: e.target.value })}
                                    className="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white resize-none"
                                    rows={5}
                                    placeholder="Enter the ideal response..."
                                />
                            </div>

                            <div className="grid md:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm text-slate-400 mb-2">Time Limit (seconds)</label>
                                    <input
                                        type="number"
                                        value={formData.time_limit}
                                        onChange={(e) => setFormData({ ...formData, time_limit: parseInt(e.target.value) })}
                                        className="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white"
                                        min={30}
                                        max={600}
                                        step={30}
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm text-slate-400 mb-2">Tags (comma-separated)</label>
                                    <input
                                        type="text"
                                        value={formData.tags}
                                        onChange={(e) => setFormData({ ...formData, tags: e.target.value })}
                                        className="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white"
                                        placeholder="migration, HIPAA, technical"
                                    />
                                </div>
                            </div>
                        </div>

                        <div className="p-6 border-t border-cyan-500/20 flex justify-end gap-3">
                            <button
                                onClick={onClose}
                                className="px-4 py-2 text-slate-400 hover:text-white transition-colors"
                            >
                                Cancel
                            </button>
                            <button
                                onClick={handleSave}
                                disabled={!formData.question}
                                className="px-6 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg font-medium transition-colors disabled:opacity-50"
                            >
                                Save Question
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // =========================================================================
        // MAIN APP
        // =========================================================================
        function App() {
            const [connected, setConnected] = useState(false);
            const [loading, setLoading] = useState(true);
            const [opportunities, setOpportunities] = useState(DEMO_OPPORTUNITIES);
            const [selectedOpp, setSelectedOpp] = useState(null);
            const [questions, setQuestions] = useState(DEMO_QA_BANK);
            const [sessions, setSessions] = useState(DEMO_SESSIONS);
            const [practiceQuestion, setPracticeQuestion] = useState(null);
            const [showAddQuestion, setShowAddQuestion] = useState(false);
            const [categoryFilter, setCategoryFilter] = useState('all');

            useEffect(() => {
                loadData();
            }, []);

            const loadData = async () => {
                try {
                    // Load opportunities
                    const { data: opps, error: oppError } = await supabase
                        .from('opportunities')
                        .select('id, title, agency, value')
                        .order('created_at', { ascending: false });
                    
                    if (!oppError && opps && opps.length > 0) {
                        setOpportunities(opps);
                        setConnected(true);
                    }

                    // Load Q&A bank
                    const { data: qa, error: qaError } = await supabase
                        .from('orals_questions')
                        .select('*');
                    
                    if (!qaError && qa && qa.length > 0) {
                        setQuestions(qa);
                    }

                    // Load sessions
                    const { data: sess, error: sessError } = await supabase
                        .from('orals_sessions')
                        .select('*')
                        .order('session_date', { ascending: false });
                    
                    if (!sessError && sess && sess.length > 0) {
                        setSessions(sess);
                    }
                } catch (e) {
                    console.log('Using demo data');
                }
                setLoading(false);
            };

            const handlePracticeComplete = async (result) => {
                // Update question stats
                const question = questions.find(q => q.id === result.question_id);
                if (question) {
                    const newTimesAsked = (question.times_asked || 0) + 1;
                    const newAvgScore = question.avg_score 
                        ? ((question.avg_score * question.times_asked) + result.score) / newTimesAsked
                        : result.score;
                    
                    setQuestions(prev => prev.map(q => 
                        q.id === result.question_id 
                            ? { ...q, times_asked: newTimesAsked, avg_score: newAvgScore }
                            : q
                    ));

                    // Try to persist
                    if (connected) {
                        await supabase
                            .from('orals_questions')
                            .update({ times_asked: newTimesAsked, avg_score: newAvgScore })
                            .eq('id', result.question_id);
                    }
                }
                setPracticeQuestion(null);
            };

            const handleAddQuestion = async (newQuestion) => {
                const questionWithId = { ...newQuestion, id: Date.now().toString() };
                setQuestions(prev => [...prev, questionWithId]);
                
                if (connected) {
                    await supabase.from('orals_questions').insert(questionWithId);
                }
                setShowAddQuestion(false);
            };

            const filteredQuestions = useMemo(() => {
                if (!selectedOpp) return [];
                let result = questions.filter(q => q.opportunity_id === selectedOpp.id);
                if (categoryFilter !== 'all') {
                    result = result.filter(q => q.category === categoryFilter);
                }
                return result;
            }, [questions, selectedOpp, categoryFilter]);

            const oppSessions = useMemo(() => {
                if (!selectedOpp) return [];
                return sessions.filter(s => s.opportunity_id === selectedOpp.id);
            }, [sessions, selectedOpp]);

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-cyan-400 text-xl">Loading Orals Studio...</div>
                    </div>
                );
            }

            // Practice mode
            if (practiceQuestion) {
                return (
                    <PracticeMode
                        question={practiceQuestion}
                        onComplete={handlePracticeComplete}
                        onCancel={() => setPracticeQuestion(null)}
                    />
                );
            }

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="glass border-b border-cyan-500/20 px-6 py-4 sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <a href="index.html" className="text-2xl font-bold">
                                    <span className="text-cyan-400">Mission</span>
                                    <span className="text-white">Pulse</span>
                                </a>
                                <span className="text-slate-500">|</span>
                                <span className="text-slate-400">🎤 Orals Studio</span>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className={`flex items-center gap-2 px-3 py-1 rounded-full text-xs ${
                                    connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'
                                }`}>
                                    <div className={`w-2 h-2 rounded-full ${connected ? 'bg-emerald-400' : 'bg-amber-400'}`} />
                                    {connected ? 'Connected' : 'Demo Mode'}
                                </div>
                                <a href="index.html" className="text-slate-400 hover:text-cyan-400">← Dashboard</a>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-6 py-8">
                        {!selectedOpp ? (
                            // Opportunity Selection
                            <div>
                                <h1 className="text-2xl font-bold text-white mb-6">Select Opportunity for Orals Prep</h1>
                                <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {opportunities.map(opp => (
                                        <button
                                            key={opp.id}
                                            onClick={() => setSelectedOpp(opp)}
                                            className="glass p-6 rounded-xl text-left hover:border-cyan-400/50 transition-all duration-300"
                                        >
                                            <div className="text-sm text-cyan-400 mb-1">{opp.agency}</div>
                                            <h3 className="text-lg font-semibold text-white mb-2">{opp.title}</h3>
                                            <div className="text-2xl font-bold text-emerald-400">
                                                {formatCurrency(opp.value)}
                                            </div>
                                            <div className="mt-3 text-sm text-slate-500">
                                                {questions.filter(q => q.opportunity_id === opp.id).length} questions prepared
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            // Q&A Bank for selected opportunity
                            <div>
                                {/* Opportunity Header */}
                                <div className="flex items-center justify-between mb-6">
                                    <div>
                                        <button
                                            onClick={() => setSelectedOpp(null)}
                                            className="text-slate-400 hover:text-cyan-400 text-sm mb-2 inline-block"
                                        >
                                            ← Back to Opportunities
                                        </button>
                                        <h1 className="text-2xl font-bold text-white">{selectedOpp.title}</h1>
                                        <p className="text-slate-400">{selectedOpp.agency} • {formatCurrency(selectedOpp.value)}</p>
                                    </div>
                                    <button
                                        onClick={() => setShowAddQuestion(true)}
                                        className="px-6 py-3 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-xl font-medium transition-colors glow"
                                    >
                                        + Add Question
                                    </button>
                                </div>

                                {/* Stats */}
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                                    <div className="glass p-4 rounded-xl text-center">
                                        <div className="text-3xl font-bold text-cyan-400">{filteredQuestions.length}</div>
                                        <div className="text-sm text-slate-400">Questions</div>
                                    </div>
                                    <div className="glass p-4 rounded-xl text-center">
                                        <div className="text-3xl font-bold text-emerald-400">{oppSessions.length}</div>
                                        <div className="text-sm text-slate-400">Practice Sessions</div>
                                    </div>
                                    <div className="glass p-4 rounded-xl text-center">
                                        <ScoreDisplay 
                                            score={filteredQuestions.filter(q => q.avg_score).reduce((sum, q) => sum + q.avg_score, 0) / 
                                                   (filteredQuestions.filter(q => q.avg_score).length || 1)} 
                                            size="lg" 
                                        />
                                        <div className="text-sm text-slate-400">Avg Score</div>
                                    </div>
                                    <div className="glass p-4 rounded-xl text-center">
                                        <div className="text-3xl font-bold text-purple-400">
                                            {filteredQuestions.reduce((sum, q) => sum + (q.times_asked || 0), 0)}
                                        </div>
                                        <div className="text-sm text-slate-400">Total Attempts</div>
                                    </div>
                                </div>

                                {/* Category Filter */}
                                <div className="flex flex-wrap gap-2 mb-6">
                                    <button
                                        onClick={() => setCategoryFilter('all')}
                                        className={`px-4 py-2 rounded-lg transition-colors ${
                                            categoryFilter === 'all' ? 'bg-cyan-500 text-slate-900' : 'glass text-slate-400 hover:text-white'
                                        }`}
                                    >
                                        All
                                    </button>
                                    {QUESTION_CATEGORIES.map(cat => {
                                        const count = questions.filter(q => q.opportunity_id === selectedOpp.id && q.category === cat.id).length;
                                        if (count === 0) return null;
                                        return (
                                            <button
                                                key={cat.id}
                                                onClick={() => setCategoryFilter(cat.id)}
                                                className={`px-4 py-2 rounded-lg transition-colors ${
                                                    categoryFilter === cat.id ? 'bg-cyan-500 text-slate-900' : 'glass text-slate-400 hover:text-white'
                                                }`}
                                            >
                                                {cat.icon} {cat.label} ({count})
                                            </button>
                                        );
                                    })}
                                </div>

                                {/* Questions Grid */}
                                <div className="grid md:grid-cols-2 gap-4">
                                    {filteredQuestions.map(question => (
                                        <QuestionCard
                                            key={question.id}
                                            question={question}
                                            onStart={setPracticeQuestion}
                                            onEdit={() => {}}
                                        />
                                    ))}
                                </div>

                                {filteredQuestions.length === 0 && (
                                    <div className="text-center py-16 text-slate-500">
                                        <span className="text-6xl mb-4 block">🎤</span>
                                        <p className="text-xl mb-4">No questions yet</p>
                                        <button
                                            onClick={() => setShowAddQuestion(true)}
                                            className="text-cyan-400 hover:text-cyan-300"
                                        >
                                            Add your first practice question →
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Add Question Modal */}
                    {showAddQuestion && selectedOpp && (
                        <AddQuestionModal
                            opportunity={selectedOpp}
                            onClose={() => setShowAddQuestion(false)}
                            onSave={handleAddQuestion}
                        />
                    )}

                    {/* Footer */}
                    <footer className="border-t border-slate-800 mt-8">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between text-sm text-slate-500">
                            <span>MissionPulse v3.1 • Mission Meets Tech</span>
                            <span>AI GENERATED - REQUIRES HUMAN REVIEW</span>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
