<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orals Studio | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:#00050F;color:#e2e8f0;min-height:100vh}
    .glass{background:rgba(15,23,42,0.85);backdrop-filter:blur(16px);border:1px solid rgba(0,229,250,0.1);border-radius:12px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const SUPABASE_URL='https://qdrtpnpnhkxvfmvfziop.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
const supabase=window.supabase?.createClient(SUPABASE_URL,SUPABASE_ANON);

const SLIDE_TEMPLATES=[
  {type:'title',name:'Title Slide',icon:'🎯',duration:60},
  {type:'executive',name:'Executive Summary',icon:'📋',duration:180},
  {type:'technical',name:'Technical Approach',icon:'💻',duration:300},
  {type:'management',name:'Management Plan',icon:'👥',duration:240},
  {type:'past_perf',name:'Past Performance',icon:'⭐',duration:180},
  {type:'personnel',name:'Key Personnel',icon:'👤',duration:180},
  {type:'risk',name:'Risk Mitigation',icon:'🛡️',duration:120},
  {type:'timeline',name:'Timeline',icon:'📅',duration:120},
  {type:'value',name:'Value Proposition',icon:'💎',duration:180},
  {type:'qa',name:'Q&A',icon:'❓',duration:300}
];

const DEMO_SLIDES=[
  {id:1,slide_number:1,slide_type:'title',title:'DHA MHS GENESIS Cloud Migration',content:'Mission Meets Tech Oral Presentation',speaker_notes:'Welcome evaluators. Introduce team.',duration_seconds:60,presenter:'Mary W.'},
  {id:2,slide_number:2,slide_type:'executive',title:'Executive Summary',content:'• 15+ years healthcare IT experience\n• $500M+ DHA contracts delivered\n• 98% on-time delivery rate',speaker_notes:'Emphasize our healthcare focus',duration_seconds:180,presenter:'Mary W.'},
  {id:3,slide_number:3,slide_type:'technical',title:'Technical Approach',content:'• Cloud-native architecture\n• Zero-trust security model\n• AI-powered automation',speaker_notes:'Demo the architecture diagram',duration_seconds:300,presenter:'Sarah C.'}
];

function OralsStudio(){
  const[connected,setConnected]=useState(false);
  const[slides,setSlides]=useState(DEMO_SLIDES);
  const[selectedSlide,setSelectedSlide]=useState(null);
  const[editing,setEditing]=useState(false);
  const[presenting,setPresenting]=useState(false);
  const[currentSlideIdx,setCurrentSlideIdx]=useState(0);

  useEffect(()=>{
    const load=async()=>{
      try{
        const{data,error}=await supabase.from('orals_decks').select('*').order('slide_number');
        if(!error&&data?.length)setSlides(data);
        setConnected(!error);
      }catch{setConnected(false)}
    };
    load();
  },[]);

  const totalDuration=slides.reduce((s,sl)=>s+(sl.duration_seconds||0),0);
  const formatTime=s=>`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

  const addSlide=(template)=>{
    const newSlide={
      id:Date.now(),
      slide_number:slides.length+1,
      slide_type:template.type,
      title:template.name,
      content:'',
      speaker_notes:'',
      duration_seconds:template.duration,
      presenter:''
    };
    setSlides([...slides,newSlide]);
  };

  const updateSlide=(id,field,value)=>{
    setSlides(slides.map(s=>s.id===id?{...s,[field]:value}:s));
  };

  const deleteSlide=(id)=>{
    setSlides(slides.filter(s=>s.id!==id).map((s,i)=>({...s,slide_number:i+1})));
  };

  const saveToDb=async()=>{
    if(!connected)return alert('Not connected to database');
    // Would save to Supabase here
    alert('Slides saved!');
  };

  if(presenting){
    const slide=slides[currentSlideIdx];
    return(
      <div className="fixed inset-0 bg-slate-900 flex flex-col">
        <div className="flex-1 flex items-center justify-center p-8">
          <div className="max-w-4xl w-full">
            <div className="text-center mb-8">
              <span className="text-6xl">{SLIDE_TEMPLATES.find(t=>t.type===slide.slide_type)?.icon||'📄'}</span>
            </div>
            <h1 className="text-4xl font-bold text-white text-center mb-8">{slide.title}</h1>
            <div className="text-xl text-slate-300 whitespace-pre-line text-center">{slide.content}</div>
          </div>
        </div>
        <div className="glass m-4 p-4">
          <div className="flex items-center justify-between">
            <div className="text-sm text-slate-400">
              <strong className="text-cyan-400">Speaker Notes:</strong> {slide.speaker_notes}
            </div>
            <div className="flex items-center gap-4">
              <button onClick={()=>setCurrentSlideIdx(Math.max(0,currentSlideIdx-1))} disabled={currentSlideIdx===0} className="px-4 py-2 bg-slate-700 rounded-lg disabled:opacity-50">← Prev</button>
              <span className="text-slate-400">{currentSlideIdx+1}/{slides.length}</span>
              <button onClick={()=>setCurrentSlideIdx(Math.min(slides.length-1,currentSlideIdx+1))} disabled={currentSlideIdx===slides.length-1} className="px-4 py-2 bg-slate-700 rounded-lg disabled:opacity-50">Next →</button>
              <button onClick={()=>setPresenting(false)} className="px-4 py-2 bg-red-500 rounded-lg">Exit</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div className="min-h-screen p-6">
      {/* Header */}
      <div className="flex justify-between items-start mb-6">
        <div>
          <h1 className="text-2xl font-bold text-white flex items-center gap-3">
            🎤 Orals Studio
            <span className={`text-xs px-2 py-1 rounded ${connected?'bg-emerald-500/20 text-emerald-400':'bg-red-500/20 text-red-400'}`}>
              {connected?'● Live':'○ Demo'}
            </span>
          </h1>
          <p className="text-slate-400 text-sm mt-1">Presentation preparation and rehearsal</p>
        </div>
        <div className="flex items-center gap-3">
          <div className="text-right mr-4">
            <div className="text-xs text-slate-500">Total Duration</div>
            <div className="text-xl font-bold text-cyan-400">{formatTime(totalDuration)}</div>
          </div>
          <button onClick={()=>setPresenting(true)} className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-lg font-medium">
            ▶ Present
          </button>
          <button onClick={saveToDb} className="px-4 py-2 bg-slate-700 text-white rounded-lg">
            💾 Save
          </button>
        </div>
      </div>

      <div className="grid grid-cols-12 gap-6">
        {/* Slide List */}
        <div className="col-span-3 space-y-3">
          <div className="glass p-3">
            <h3 className="text-sm font-semibold text-white mb-3">Slides ({slides.length})</h3>
            <div className="space-y-2 max-h-96 overflow-y-auto">
              {slides.map((slide,idx)=>(
                <div key={slide.id} onClick={()=>setSelectedSlide(slide)} className={`p-3 rounded-lg cursor-pointer transition-all ${selectedSlide?.id===slide.id?'bg-cyan-500/20 border border-cyan-500/50':'bg-slate-800/50 hover:bg-slate-700/50'}`}>
                  <div className="flex items-center gap-2">
                    <span className="text-lg">{SLIDE_TEMPLATES.find(t=>t.type===slide.slide_type)?.icon||'📄'}</span>
                    <div className="flex-1 min-w-0">
                      <div className="text-sm font-medium text-white truncate">{slide.title}</div>
                      <div className="text-xs text-slate-500">{formatTime(slide.duration_seconds)}</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          
          {/* Add Slide */}
          <div className="glass p-3">
            <h3 className="text-sm font-semibold text-white mb-3">Add Slide</h3>
            <div className="grid grid-cols-2 gap-2">
              {SLIDE_TEMPLATES.slice(0,6).map(t=>(
                <button key={t.type} onClick={()=>addSlide(t)} className="p-2 bg-slate-800/50 rounded-lg hover:bg-slate-700/50 text-xs">
                  <span className="text-lg">{t.icon}</span>
                  <div className="text-slate-400 mt-1 truncate">{t.name}</div>
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* Editor */}
        <div className="col-span-9">
          {selectedSlide?(
            <div className="glass p-6">
              <div className="flex justify-between items-start mb-6">
                <input value={selectedSlide.title} onChange={e=>updateSlide(selectedSlide.id,'title',e.target.value)} className="text-xl font-bold text-white bg-transparent border-b border-slate-700 focus:border-cyan-500 outline-none pb-2 w-full max-w-md"/>
                <button onClick={()=>deleteSlide(selectedSlide.id)} className="text-red-400 hover:text-red-300 text-sm">🗑️ Delete</button>
              </div>
              
              <div className="grid grid-cols-2 gap-6">
                <div>
                  <label className="text-sm text-slate-400 mb-2 block">Slide Content</label>
                  <textarea value={selectedSlide.content} onChange={e=>updateSlide(selectedSlide.id,'content',e.target.value)} className="w-full h-48 bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:border-cyan-500 outline-none resize-none" placeholder="Enter slide content..."/>
                </div>
                <div>
                  <label className="text-sm text-slate-400 mb-2 block">Speaker Notes</label>
                  <textarea value={selectedSlide.speaker_notes} onChange={e=>updateSlide(selectedSlide.id,'speaker_notes',e.target.value)} className="w-full h-48 bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:border-cyan-500 outline-none resize-none" placeholder="Notes for the presenter..."/>
                </div>
              </div>
              
              <div className="grid grid-cols-3 gap-4 mt-4">
                <div>
                  <label className="text-sm text-slate-400 mb-2 block">Presenter</label>
                  <input value={selectedSlide.presenter||''} onChange={e=>updateSlide(selectedSlide.id,'presenter',e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
                </div>
                <div>
                  <label className="text-sm text-slate-400 mb-2 block">Duration (seconds)</label>
                  <input type="number" value={selectedSlide.duration_seconds} onChange={e=>updateSlide(selectedSlide.id,'duration_seconds',parseInt(e.target.value)||0)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
                </div>
                <div>
                  <label className="text-sm text-slate-400 mb-2 block">Slide Type</label>
                  <select value={selectedSlide.slide_type} onChange={e=>updateSlide(selectedSlide.id,'slide_type',e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white">
                    {SLIDE_TEMPLATES.map(t=><option key={t.type} value={t.type}>{t.icon} {t.name}</option>)}
                  </select>
                </div>
              </div>
              
              {/* AI Assist */}
              <div className="mt-6 p-4 bg-gradient-to-r from-purple-500/10 to-cyan-500/10 rounded-lg border border-purple-500/20">
                <div className="flex items-center gap-3 mb-3">
                  <span className="text-xl">🤖</span>
                  <span className="font-medium text-white">AI Content Assistant</span>
                </div>
                <div className="flex gap-2">
                  <button className="px-3 py-1.5 bg-slate-700 rounded text-sm hover:bg-slate-600">Generate Content</button>
                  <button className="px-3 py-1.5 bg-slate-700 rounded text-sm hover:bg-slate-600">Write Speaker Notes</button>
                  <button className="px-3 py-1.5 bg-slate-700 rounded text-sm hover:bg-slate-600">Suggest Q&A</button>
                </div>
              </div>
            </div>
          ):(
            <div className="glass p-12 text-center">
              <span className="text-6xl">🎤</span>
              <p className="text-slate-400 mt-4">Select a slide to edit or add a new one</p>
            </div>
          )}
        </div>
      </div>

      <div className="text-center text-xs text-slate-500 mt-8">
        AI GENERATED - REQUIRES HUMAN REVIEW | © 2026 Mission Meets Tech
      </div>
    </div>
  );
}

ReactDOM.render(<OralsStudio/>,document.getElementById('root'));
</script>
</body>
</html>
