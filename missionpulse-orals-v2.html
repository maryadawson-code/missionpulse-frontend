<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Orals Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.15); }
    .timer-pulse { animation: timer-pulse 1s ease-in-out infinite; }
    @keyframes timer-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const DEFAULT_COMPANY_ID = '11111111-1111-1111-1111-111111111111';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const DEMO_DECKS = [
      { 
        id: '1', 
        opportunity_id: '1', 
        title: 'DHA MHS GENESIS - Final Orals', 
        status: 'In Preparation',
        presentation_date: '2026-02-15',
        agenda: [
          { time: '0:00', topic: 'Introduction & Agenda', speaker: 'Mary Womack', duration: 5 },
          { time: '0:05', topic: 'Executive Summary', speaker: 'Mary Womack', duration: 10 },
          { time: '0:15', topic: 'Technical Approach', speaker: 'John Tech', duration: 20 },
          { time: '0:35', topic: 'Management Approach', speaker: 'Sarah Ops', duration: 15 },
          { time: '0:50', topic: 'Past Performance', speaker: 'Mike Past', duration: 10 },
          { time: '1:00', topic: 'Q&A Session', speaker: 'All', duration: 30 },
        ],
        q_and_a: [
          { id: 'q1', question: 'How will you handle surge capacity requirements?', category: 'Technical', answer: 'We maintain a bench of 50+ cleared personnel ready for rapid deployment...', status: 'Approved' },
          { id: 'q2', question: 'Describe your approach to CMMC compliance', category: 'Compliance', answer: 'Our entire team is CMMC Level 2 certified with POA&M complete...', status: 'Draft' },
          { id: 'q3', question: 'What differentiates you from competitors?', category: 'Strategy', answer: 'Three key discriminators: proven MHS GENESIS experience, zero-downtime methodology...', status: 'In Review' },
          { id: 'q4', question: 'How do you ensure knowledge transfer?', category: 'Management', answer: 'Our 90-day transition plan includes shadowing, documentation, and hands-on training...', status: 'Approved' },
        ]
      },
      { 
        id: '2', 
        opportunity_id: '2', 
        title: 'VA EHR - Technical Discussion', 
        status: 'Draft',
        presentation_date: '2026-02-20',
        agenda: [
          { time: '0:00', topic: 'Opening Remarks', speaker: 'Mary Womack', duration: 5 },
          { time: '0:05', topic: 'VistA Integration Demo', speaker: 'Tech Lead', duration: 30 },
        ],
        q_and_a: []
      },
    ];

    const DEMO_OPPORTUNITIES = [
      { id: '1', title: 'DHA MHS GENESIS Support', agency: 'DHA' },
      { id: '2', title: 'VA EHR Modernization', agency: 'VA' },
    ];

    function App() {
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [decks, setDecks] = React.useState(DEMO_DECKS);
      const [opportunities, setOpportunities] = React.useState(DEMO_OPPORTUNITIES);
      const [selectedDeck, setSelectedDeck] = React.useState(null);
      const [activeTab, setActiveTab] = React.useState('agenda');
      const [showModal, setShowModal] = React.useState(false);
      const [showQAModal, setShowQAModal] = React.useState(false);
      const [editingDeck, setEditingDeck] = React.useState(null);
      const [editingQA, setEditingQA] = React.useState(null);
      const [timerActive, setTimerActive] = React.useState(false);
      const [timerSeconds, setTimerSeconds] = React.useState(0);
      const [currentAgendaItem, setCurrentAgendaItem] = React.useState(0);

      const [form, setForm] = React.useState({ 
        title: '', 
        opportunity_id: '',
        status: 'Draft',
        presentation_date: ''
      });

      const [qaForm, setQAForm] = React.useState({
        question: '',
        category: 'Technical',
        answer: '',
        status: 'Draft'
      });

      React.useEffect(() => {
        loadData();
      }, []);

      React.useEffect(() => {
        let interval;
        if (timerActive) {
          interval = setInterval(() => {
            setTimerSeconds(s => s + 1);
          }, 1000);
        }
        return () => clearInterval(interval);
      }, [timerActive]);

      const loadData = async () => {
        try {
          const [decksRes, oppsRes] = await Promise.all([
            supabase.from('orals_decks').select('*').order('created_at', { ascending: false }),
            supabase.from('opportunities').select('id, title, agency')
          ]);
          
          if (!decksRes.error && decksRes.data?.length > 0) {
            setDecks(decksRes.data);
            setConnected(true);
          }
          if (!oppsRes.error && oppsRes.data?.length > 0) {
            setOpportunities(oppsRes.data);
          }
        } catch (e) {
          console.log('Using demo data');
        }
        setLoading(false);
      };

      const saveDeck = async () => {
        const deckData = {
          ...form,
          company_id: DEFAULT_COMPANY_ID,
          agenda: editingDeck?.agenda || [],
          q_and_a: editingDeck?.q_and_a || [],
          updated_at: new Date().toISOString()
        };

        if (connected) {
          try {
            if (editingDeck) {
              const { error } = await supabase.from('orals_decks').update(deckData).eq('id', editingDeck.id);
              if (!error) {
                setDecks(decks.map(d => d.id === editingDeck.id ? { ...d, ...deckData } : d));
              }
            } else {
              const { data, error } = await supabase.from('orals_decks').insert([deckData]).select();
              if (!error && data) {
                setDecks([...decks, data[0]]);
              }
            }
          } catch (e) {
            console.error('Save error:', e);
          }
        } else {
          if (editingDeck) {
            setDecks(decks.map(d => d.id === editingDeck.id ? { ...d, ...deckData } : d));
          } else {
            setDecks([...decks, { ...deckData, id: Date.now().toString() }]);
          }
        }
        
        setShowModal(false);
        setEditingDeck(null);
        setForm({ title: '', opportunity_id: '', status: 'Draft', presentation_date: '' });
      };

      const saveQA = () => {
        if (!selectedDeck) return;
        
        const updatedQA = editingQA 
          ? selectedDeck.q_and_a.map(q => q.id === editingQA.id ? { ...q, ...qaForm } : q)
          : [...(selectedDeck.q_and_a || []), { ...qaForm, id: Date.now().toString() }];
        
        const updatedDeck = { ...selectedDeck, q_and_a: updatedQA };
        setDecks(decks.map(d => d.id === selectedDeck.id ? updatedDeck : d));
        setSelectedDeck(updatedDeck);
        
        if (connected) {
          supabase.from('orals_decks').update({ q_and_a: updatedQA }).eq('id', selectedDeck.id);
        }
        
        setShowQAModal(false);
        setEditingQA(null);
        setQAForm({ question: '', category: 'Technical', answer: '', status: 'Draft' });
      };

      const deleteQA = (qaId) => {
        if (!selectedDeck || !confirm('Delete this Q&A?')) return;
        
        const updatedQA = selectedDeck.q_and_a.filter(q => q.id !== qaId);
        const updatedDeck = { ...selectedDeck, q_and_a: updatedQA };
        setDecks(decks.map(d => d.id === selectedDeck.id ? updatedDeck : d));
        setSelectedDeck(updatedDeck);
        
        if (connected) {
          supabase.from('orals_decks').update({ q_and_a: updatedQA }).eq('id', selectedDeck.id);
        }
      };

      const formatTime = (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      };

      const getTotalDuration = (agenda) => {
        return agenda?.reduce((sum, item) => sum + (item.duration || 0), 0) || 0;
      };

      const getStatusColor = (status) => {
        switch (status) {
          case 'Approved': case 'Ready': return 'bg-emerald-500/20 text-emerald-400';
          case 'In Review': case 'In Preparation': return 'bg-blue-500/20 text-blue-400';
          case 'Draft': return 'bg-amber-500/20 text-amber-400';
          default: return 'bg-slate-500/20 text-slate-400';
        }
      };

      const getCategoryColor = (category) => {
        switch (category) {
          case 'Technical': return 'bg-cyan-500/20 text-cyan-400';
          case 'Management': return 'bg-purple-500/20 text-purple-400';
          case 'Compliance': return 'bg-amber-500/20 text-amber-400';
          case 'Strategy': return 'bg-emerald-500/20 text-emerald-400';
          default: return 'bg-slate-500/20 text-slate-400';
        }
      };

      const getOppName = (id) => {
        const opp = opportunities.find(o => o.id === id);
        return opp ? opp.title : 'Unassigned';
      };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
          </div>
        );
      }

      return (
        <div className="min-h-screen p-6">
          {/* Header */}
          <div className="flex items-center justify-between mb-6">
            <div className="flex items-center gap-4">
              <a href="index.html" className="text-slate-400 hover:text-white">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
              </a>
              <div>
                <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                  <span className="text-purple-400">🎤</span> Orals Studio
                </h1>
                <p className="text-slate-400 text-sm">Presentation prep, timing, and Q&A bank</p>
              </div>
            </div>
            <div className="flex items-center gap-4">
              <div className={`px-3 py-1 rounded-full text-xs ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                {connected ? '● Live' : '○ Demo'}
              </div>
              <button
                onClick={() => { 
                  setEditingDeck(null); 
                  setForm({ title: '', opportunity_id: '', status: 'Draft', presentation_date: '' }); 
                  setShowModal(true); 
                }}
                className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 text-white rounded-lg font-medium transition-colors"
              >
                + New Deck
              </button>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            {/* Deck List */}
            <div className="space-y-3">
              <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Presentation Decks</h3>
              {decks.map(deck => (
                <div 
                  key={deck.id}
                  onClick={() => setSelectedDeck(deck)}
                  className={`glass rounded-xl p-4 cursor-pointer transition-all ${
                    selectedDeck?.id === deck.id ? 'border-cyan-500/50 glow' : 'hover:border-cyan-500/30'
                  }`}
                >
                  <div className="flex items-start justify-between mb-2">
                    <h4 className="text-white font-medium">{deck.title}</h4>
                    <span className={`px-2 py-0.5 rounded text-xs ${getStatusColor(deck.status)}`}>
                      {deck.status}
                    </span>
                  </div>
                  <p className="text-xs text-slate-500 mb-2">{getOppName(deck.opportunity_id)}</p>
                  <div className="flex items-center gap-4 text-xs text-slate-400">
                    <span>📅 {deck.presentation_date || 'TBD'}</span>
                    <span>⏱️ {getTotalDuration(deck.agenda)} min</span>
                    <span>❓ {deck.q_and_a?.length || 0} Q&A</span>
                  </div>
                </div>
              ))}
              {decks.length === 0 && (
                <p className="text-slate-500 text-sm text-center py-8">No decks created yet</p>
              )}
            </div>

            {/* Deck Detail */}
            <div className="lg:col-span-2">
              {selectedDeck ? (
                <div className="glass rounded-xl p-6">
                  <div className="flex items-center justify-between mb-6">
                    <div>
                      <h2 className="text-xl font-bold text-white">{selectedDeck.title}</h2>
                      <p className="text-slate-400 text-sm">{getOppName(selectedDeck.opportunity_id)}</p>
                    </div>
                    
                    {/* Practice Timer */}
                    <div className="flex items-center gap-4">
                      <div className={`text-3xl font-mono font-bold ${timerActive ? 'text-cyan-400 timer-pulse' : 'text-slate-400'}`}>
                        {formatTime(timerSeconds)}
                      </div>
                      <div className="flex items-center gap-2">
                        <button
                          onClick={() => setTimerActive(!timerActive)}
                          className={`px-4 py-2 rounded-lg font-medium transition-colors ${
                            timerActive ? 'bg-red-500 hover:bg-red-600' : 'bg-emerald-500 hover:bg-emerald-600'
                          }`}
                        >
                          {timerActive ? '⏹️ Stop' : '▶️ Start'}
                        </button>
                        <button
                          onClick={() => { setTimerSeconds(0); setTimerActive(false); setCurrentAgendaItem(0); }}
                          className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg font-medium transition-colors"
                        >
                          ↻ Reset
                        </button>
                      </div>
                    </div>
                  </div>

                  {/* Tabs */}
                  <div className="flex border-b border-slate-700 mb-4">
                    <button
                      onClick={() => setActiveTab('agenda')}
                      className={`px-4 py-2 text-sm font-medium transition-colors ${
                        activeTab === 'agenda' ? 'text-cyan-400 border-b-2 border-cyan-400' : 'text-slate-400 hover:text-white'
                      }`}
                    >
                      Agenda ({selectedDeck.agenda?.length || 0})
                    </button>
                    <button
                      onClick={() => setActiveTab('qa')}
                      className={`px-4 py-2 text-sm font-medium transition-colors ${
                        activeTab === 'qa' ? 'text-cyan-400 border-b-2 border-cyan-400' : 'text-slate-400 hover:text-white'
                      }`}
                    >
                      Q&A Bank ({selectedDeck.q_and_a?.length || 0})
                    </button>
                  </div>

                  {/* Agenda Tab */}
                  {activeTab === 'agenda' && (
                    <div className="space-y-2">
                      {selectedDeck.agenda?.map((item, idx) => (
                        <div 
                          key={idx}
                          className={`flex items-center gap-4 p-3 rounded-lg ${
                            idx === currentAgendaItem && timerActive 
                              ? 'bg-cyan-500/20 border border-cyan-500/50' 
                              : 'bg-slate-800/50'
                          }`}
                        >
                          <div className="w-16 text-center">
                            <span className="text-cyan-400 font-mono text-sm">{item.time}</span>
                          </div>
                          <div className="flex-1">
                            <p className="text-white font-medium">{item.topic}</p>
                            <p className="text-slate-400 text-sm">{item.speaker}</p>
                          </div>
                          <div className="text-right">
                            <span className="text-slate-400">{item.duration} min</span>
                          </div>
                        </div>
                      ))}
                      {(!selectedDeck.agenda || selectedDeck.agenda.length === 0) && (
                        <p className="text-slate-500 text-center py-8">No agenda items. Edit deck to add agenda.</p>
                      )}
                    </div>
                  )}

                  {/* Q&A Tab */}
                  {activeTab === 'qa' && (
                    <div>
                      <div className="flex justify-end mb-4">
                        <button
                          onClick={() => { 
                            setEditingQA(null);
                            setQAForm({ question: '', category: 'Technical', answer: '', status: 'Draft' });
                            setShowQAModal(true);
                          }}
                          className="px-3 py-1.5 bg-purple-500 hover:bg-purple-600 text-white text-sm rounded-lg transition-colors"
                        >
                          + Add Q&A
                        </button>
                      </div>
                      <div className="space-y-3">
                        {selectedDeck.q_and_a?.map(qa => (
                          <div key={qa.id} className="glass rounded-lg p-4">
                            <div className="flex items-start justify-between mb-2">
                              <div className="flex items-center gap-2">
                                <span className={`px-2 py-0.5 rounded text-xs ${getCategoryColor(qa.category)}`}>
                                  {qa.category}
                                </span>
                                <span className={`px-2 py-0.5 rounded text-xs ${getStatusColor(qa.status)}`}>
                                  {qa.status}
                                </span>
                              </div>
                              <div className="flex items-center gap-2">
                                <button 
                                  onClick={() => {
                                    setEditingQA(qa);
                                    setQAForm({ question: qa.question, category: qa.category, answer: qa.answer, status: qa.status });
                                    setShowQAModal(true);
                                  }}
                                  className="text-slate-400 hover:text-cyan-400"
                                >
                                  ✏️
                                </button>
                                <button onClick={() => deleteQA(qa.id)} className="text-slate-400 hover:text-red-400">
                                  🗑️
                                </button>
                              </div>
                            </div>
                            <p className="text-white font-medium mb-2">Q: {qa.question}</p>
                            <p className="text-slate-400 text-sm">A: {qa.answer}</p>
                          </div>
                        ))}
                        {(!selectedDeck.q_and_a || selectedDeck.q_and_a.length === 0) && (
                          <p className="text-slate-500 text-center py-8">No Q&A prepared. Click "Add Q&A" to start.</p>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              ) : (
                <div className="glass rounded-xl p-12 text-center">
                  <p className="text-slate-500 text-lg">Select a deck to view details</p>
                </div>
              )}
            </div>
          </div>

          {/* New Deck Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
              <div className="glass rounded-xl p-6 w-full max-w-lg">
                <h2 className="text-xl font-bold text-white mb-4">
                  {editingDeck ? 'Edit Deck' : 'New Presentation Deck'}
                </h2>
                
                <div className="space-y-4">
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Title *</label>
                    <input
                      type="text"
                      value={form.title}
                      onChange={(e) => setForm({ ...form, title: e.target.value })}
                      placeholder="e.g., DHA Orals - Final Presentation"
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                    />
                  </div>
                  
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Opportunity</label>
                    <select
                      value={form.opportunity_id}
                      onChange={(e) => setForm({ ...form, opportunity_id: e.target.value })}
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                    >
                      <option value="">Select...</option>
                      {opportunities.map(opp => (
                        <option key={opp.id} value={opp.id}>{opp.title}</option>
                      ))}
                    </select>
                  </div>
                  
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Status</label>
                      <select
                        value={form.status}
                        onChange={(e) => setForm({ ...form, status: e.target.value })}
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                      >
                        <option value="Draft">Draft</option>
                        <option value="In Preparation">In Preparation</option>
                        <option value="Ready">Ready</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Presentation Date</label>
                      <input
                        type="date"
                        value={form.presentation_date}
                        onChange={(e) => setForm({ ...form, presentation_date: e.target.value })}
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                      />
                    </div>
                  </div>
                </div>
                
                <div className="flex justify-end gap-3 mt-6">
                  <button
                    onClick={() => { setShowModal(false); setEditingDeck(null); }}
                    className="px-4 py-2 text-slate-400 hover:text-white transition-colors"
                  >
                    Cancel
                  </button>
                  <button
                    onClick={saveDeck}
                    disabled={!form.title}
                    className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 disabled:bg-slate-600 text-white rounded-lg font-medium transition-colors"
                  >
                    {editingDeck ? 'Update' : 'Create'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Q&A Modal */}
          {showQAModal && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
              <div className="glass rounded-xl p-6 w-full max-w-lg">
                <h2 className="text-xl font-bold text-white mb-4">
                  {editingQA ? 'Edit Q&A' : 'Add Q&A'}
                </h2>
                
                <div className="space-y-4">
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Question *</label>
                    <textarea
                      value={qaForm.question}
                      onChange={(e) => setQAForm({ ...qaForm, question: e.target.value })}
                      placeholder="Enter the anticipated question..."
                      rows={2}
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                    />
                  </div>
                  
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Category</label>
                      <select
                        value={qaForm.category}
                        onChange={(e) => setQAForm({ ...qaForm, category: e.target.value })}
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                      >
                        <option value="Technical">Technical</option>
                        <option value="Management">Management</option>
                        <option value="Compliance">Compliance</option>
                        <option value="Strategy">Strategy</option>
                        <option value="Pricing">Pricing</option>
                        <option value="Past Performance">Past Performance</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Status</label>
                      <select
                        value={qaForm.status}
                        onChange={(e) => setQAForm({ ...qaForm, status: e.target.value })}
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                      >
                        <option value="Draft">Draft</option>
                        <option value="In Review">In Review</option>
                        <option value="Approved">Approved</option>
                      </select>
                    </div>
                  </div>
                  
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Answer *</label>
                    <textarea
                      value={qaForm.answer}
                      onChange={(e) => setQAForm({ ...qaForm, answer: e.target.value })}
                      placeholder="Enter the prepared answer..."
                      rows={4}
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                    />
                  </div>
                </div>
                
                <div className="flex justify-end gap-3 mt-6">
                  <button
                    onClick={() => { setShowQAModal(false); setEditingQA(null); }}
                    className="px-4 py-2 text-slate-400 hover:text-white transition-colors"
                  >
                    Cancel
                  </button>
                  <button
                    onClick={saveQA}
                    disabled={!qaForm.question || !qaForm.answer}
                    className="px-4 py-2 bg-purple-500 hover:bg-purple-600 disabled:bg-slate-600 text-white rounded-lg font-medium transition-colors"
                  >
                    {editingQA ? 'Update' : 'Add'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <div className="mt-8 text-center text-slate-500 text-sm">
            MissionPulse v3.1 • Mission Meets Tech • AI GENERATED CONTENT REQUIRES HUMAN REVIEW
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
