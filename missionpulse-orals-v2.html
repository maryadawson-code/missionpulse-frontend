<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Orals Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-pink { 0%, 100% { box-shadow: 0 0 0 0 rgba(236, 72, 153, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(236, 72, 153, 0); } }
    .pulse-pink { animation: pulse-pink 2s infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const DEMO_SLIDES = [
      { id: 1, number: 1, title: 'Executive Summary', duration: 5, speaker: 'CEO', status: 'Complete', notes: 'Lead with mission alignment and SDVOSB value proposition' },
      { id: 2, number: 2, title: 'Understanding of Requirements', duration: 8, speaker: 'SA', status: 'Complete', notes: 'Reference specific RFP sections L.1.1, L.1.2' },
      { id: 3, number: 3, title: 'Technical Approach', duration: 12, speaker: 'SA', status: 'In Progress', notes: 'Architecture diagram, FHIR compliance, zero-downtime migration' },
      { id: 4, number: 4, title: 'Transition Plan', duration: 8, speaker: 'PM', status: 'In Progress', notes: 'Zero-disruption methodology, 90-day timeline' },
      { id: 5, number: 5, title: 'Management Approach', duration: 7, speaker: 'PM', status: 'Not Started', notes: 'Org chart, key personnel, communication plan' },
      { id: 6, number: 6, title: 'Past Performance', duration: 5, speaker: 'CEO', status: 'Not Started', notes: '3 relevant contracts with metrics' },
      { id: 7, number: 7, title: 'Q&A Session', duration: 15, speaker: 'All', status: 'Not Started', notes: 'Reserve time for evaluator questions' }
    ];

    const DEMO_QA = [
      { id: 1, category: 'Technical', question: 'How will you handle data migration for 2.3M patient records without disruption?', answer: 'Our zero-disruption methodology uses parallel systems with real-time sync. We migrate in phases with rollback capability. Achieved 99.99% integrity on VA 1.8M record migration.', difficulty: 'Hard', likelihood: 'High' },
      { id: 2, category: 'Technical', question: 'Describe your FHIR interoperability approach.', answer: 'Team includes 3 HL7 FHIR certified architects. We implement FHIR R4 with US Core profiles. Middleware handles legacy HL7v2 translation for MHS compatibility.', difficulty: 'Medium', likelihood: 'High' },
      { id: 3, category: 'Management', question: 'How will you staff given cleared personnel requirements?', answer: 'We maintain 15 Secret-cleared health IT bench. MOUs with 2 SDVOSB partners for 20+ surge staff. Key personnel committed with letters of intent.', difficulty: 'Medium', likelihood: 'High' },
      { id: 4, category: 'Risk', question: 'What is your biggest risk and mitigation strategy?', answer: 'Timeline compression is primary risk. Mitigated through parallel workstreams, surge agreements, weekly executive reviews, and 15% schedule buffer.', difficulty: 'Medium', likelihood: 'High' },
      { id: 5, category: 'Past Performance', question: 'Describe a project with challenges you overcame.', answer: 'VA Claims Modernization had legacy data quality issues. Pivoted to automated cleansing, added 2 data analysts, delivered on schedule. Now standard Phase 1 practice.', difficulty: 'Medium', likelihood: 'High' },
      { id: 6, category: 'Pricing', question: 'How do you ensure cost realism below GSA rates?', answer: 'SDVOSB efficiency: remote-first (40% facility savings), automated DevOps, 92% staff retention. Can provide detailed buildup on request.', difficulty: 'Hard', likelihood: 'Medium' }
    ];

    function Sidebar() {
      const navItems = [
        { icon: '🏠', label: 'Dashboard', path: 'index.html' },
        { icon: '📊', label: 'Pipeline', path: 'missionpulse-pipeline-v2.html' },
        { icon: '🎯', label: 'War Room', path: 'missionpulse-warroom-v2.html' },
        { icon: '🎤', label: 'Orals Studio', path: 'missionpulse-orals-v2.html', active: true },
        { icon: '📚', label: 'Lessons', path: 'missionpulse-lessons-v2.html' },
        { icon: '🤖', label: 'Agent Hub', path: 'missionpulse-agenthub-v2.html' }
      ];
      return (
        <div className="w-64 bg-slate-900/50 border-r border-slate-700 min-h-screen p-4 hidden lg:block">
          <div className="flex items-center gap-3 mb-8">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-pink-500 to-rose-600 flex items-center justify-center pulse-pink">
              <span className="text-xl">🎤</span>
            </div>
            <div>
              <div className="font-bold text-pink-400">Orals Studio</div>
              <div className="text-xs text-slate-400">Presentation Prep</div>
            </div>
          </div>
          <nav className="space-y-1">
            {navItems.map((item, i) => (
              <a key={i} href={item.path} className={`flex items-center gap-3 px-3 py-2 rounded-lg transition-all ${item.active ? 'bg-pink-500/20 text-pink-400 border border-pink-500/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                <span>{item.icon}</span><span className="text-sm">{item.label}</span>
              </a>
            ))}
          </nav>
        </div>
      );
    }

    function SlideCard({ slide, onClick }) {
      const colors = { 'Complete': 'bg-emerald-500/20 text-emerald-400', 'In Progress': 'bg-cyan-500/20 text-cyan-400', 'Not Started': 'bg-slate-500/20 text-slate-400' };
      return (
        <div onClick={() => onClick(slide)} className="bg-slate-800/50 border border-slate-700 rounded-xl p-4 hover:border-pink-500/50 cursor-pointer transition-all">
          <div className="flex items-start justify-between mb-3">
            <div className="w-10 h-10 bg-slate-700 rounded-lg flex items-center justify-center font-bold text-pink-400">{slide.number}</div>
            <span className={`px-2 py-0.5 rounded text-xs ${colors[slide.status]}`}>{slide.status}</span>
          </div>
          <h3 className="font-medium mb-1">{slide.title}</h3>
          <div className="flex items-center gap-3 text-xs text-slate-400">
            <span>⏱️ {slide.duration} min</span>
            <span>👤 {slide.speaker}</span>
          </div>
        </div>
      );
    }

    function QACard({ qa, expanded, onToggle }) {
      const diff = { 'Easy': 'text-emerald-400', 'Medium': 'text-amber-400', 'Hard': 'text-red-400' };
      const like = { 'High': 'bg-red-500/20 text-red-400', 'Medium': 'bg-amber-500/20 text-amber-400', 'Low': 'bg-slate-500/20 text-slate-400' };
      return (
        <div className="bg-slate-800/50 border border-slate-700 rounded-xl overflow-hidden">
          <div onClick={onToggle} className="p-4 cursor-pointer hover:bg-slate-800/70 transition-colors">
            <div className="flex items-start justify-between gap-4">
              <div className="flex-1">
                <div className="flex items-center gap-2 mb-2">
                  <span className="px-2 py-0.5 bg-slate-700 rounded text-xs">{qa.category}</span>
                  <span className={`text-xs ${diff[qa.difficulty]}`}>● {qa.difficulty}</span>
                  <span className={`px-2 py-0.5 rounded text-xs ${like[qa.likelihood]}`}>{qa.likelihood}</span>
                </div>
                <p className="text-sm font-medium">{qa.question}</p>
              </div>
              <span className="text-slate-400">{expanded ? '▼' : '▶'}</span>
            </div>
          </div>
          {expanded && (
            <div className="p-4 pt-0 border-t border-slate-700 bg-slate-900/30">
              <div className="text-xs text-slate-500 mb-2">Suggested Answer:</div>
              <p className="text-sm text-slate-300">{qa.answer}</p>
              <div className="mt-3 flex gap-2">
                <button className="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-xs">✏️ Edit</button>
                <button className="px-3 py-1 bg-pink-500/20 hover:bg-pink-500/30 text-pink-400 rounded text-xs">🎤 Practice</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [slides] = React.useState(DEMO_SLIDES);
      const [qaBank] = React.useState(DEMO_QA);
      const [activeTab, setActiveTab] = React.useState('deck');
      const [expandedQA, setExpandedQA] = React.useState(null);
      const [selectedSlide, setSelectedSlide] = React.useState(null);

      const totalDuration = slides.reduce((sum, s) => sum + s.duration, 0);
      const completedSlides = slides.filter(s => s.status === 'Complete').length;
      const progress = Math.round((completedSlides / slides.length) * 100);

      const qaByCategory = qaBank.reduce((acc, qa) => { acc[qa.category] = acc[qa.category] || []; acc[qa.category].push(qa); return acc; }, {});

      return (
        <div className="flex min-h-screen">
          <Sidebar />
          <div className="flex-1 p-4 lg:p-6">
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
              <div>
                <h1 className="text-2xl font-bold">Orals Studio</h1>
                <p className="text-slate-400 text-sm">EHR-Mod • Oral Presentation Preparation</p>
              </div>
              <div className="flex items-center gap-4">
                <div className="text-right">
                  <div className="text-2xl font-bold text-pink-400">{totalDuration} min</div>
                  <div className="text-xs text-slate-400">Total Duration</div>
                </div>
                <button className="px-4 py-2 bg-pink-500 hover:bg-pink-400 text-white rounded-lg text-sm font-medium">▶️ Practice</button>
              </div>
            </div>

            <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4 mb-6">
              <div className="flex items-center justify-between mb-2">
                <span className="text-sm">Deck Progress</span>
                <span className="text-sm font-medium">{completedSlides}/{slides.length} slides • {progress}%</span>
              </div>
              <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
                <div className="h-full bg-gradient-to-r from-pink-500 to-rose-500 rounded-full transition-all" style={{ width: `${progress}%` }} />
              </div>
            </div>

            <div className="flex gap-2 mb-6">
              {['deck', 'qa', 'timer'].map(tab => (
                <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 rounded-lg text-sm transition-colors ${activeTab === tab ? 'bg-pink-500/20 text-pink-400 border border-pink-500/30' : 'bg-slate-800/50 hover:bg-slate-700'}`}>
                  {tab === 'deck' && '📊 Slides'}{tab === 'qa' && '❓ Q&A Bank'}{tab === 'timer' && '⏱️ Timer'}
                </button>
              ))}
            </div>

            {activeTab === 'deck' && (
              <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                {slides.map(slide => <SlideCard key={slide.id} slide={slide} onClick={setSelectedSlide} />)}
                <div className="border-2 border-dashed border-slate-700 rounded-xl p-8 flex items-center justify-center text-slate-500 hover:border-pink-500/50 hover:text-pink-400 cursor-pointer transition-colors">+ Add Slide</div>
              </div>
            )}

            {activeTab === 'qa' && (
              <div className="space-y-6">
                {Object.entries(qaByCategory).map(([cat, qs]) => (
                  <div key={cat}>
                    <h3 className="font-semibold mb-3">{cat} <span className="px-2 py-0.5 bg-slate-700 rounded-full text-xs ml-2">{qs.length}</span></h3>
                    <div className="space-y-3">
                      {qs.map(qa => <QACard key={qa.id} qa={qa} expanded={expandedQA === qa.id} onToggle={() => setExpandedQA(expandedQA === qa.id ? null : qa.id)} />)}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {activeTab === 'timer' && (
              <div className="max-w-md mx-auto text-center">
                <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-8">
                  <div className="text-6xl font-mono font-bold text-pink-400 mb-4">{totalDuration}:00</div>
                  <div className="text-slate-400 mb-6">Presentation Timer</div>
                  <div className="flex gap-3 justify-center">
                    <button className="px-6 py-3 bg-pink-500 hover:bg-pink-400 text-white rounded-lg font-medium">▶️ Start</button>
                    <button className="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg">⏹️ Reset</button>
                  </div>
                </div>
                <div className="mt-6 space-y-2">
                  {slides.map(s => (
                    <div key={s.id} className="flex items-center justify-between p-3 bg-slate-800/30 rounded-lg">
                      <span className="text-sm">{s.number}. {s.title}</span>
                      <span className="text-sm text-slate-400">{s.duration} min</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {selectedSlide && (
              <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
                <div className="bg-slate-800 border border-slate-700 rounded-xl max-w-lg w-full">
                  <div className="p-4 border-b border-slate-700 flex items-center justify-between">
                    <h2 className="font-semibold">Slide {selectedSlide.number}: {selectedSlide.title}</h2>
                    <button onClick={() => setSelectedSlide(null)} className="text-slate-400 hover:text-white text-xl">×</button>
                  </div>
                  <div className="p-4 space-y-4">
                    <div><label className="text-sm text-slate-400">Speaker</label><div>{selectedSlide.speaker}</div></div>
                    <div><label className="text-sm text-slate-400">Duration</label><div>{selectedSlide.duration} minutes</div></div>
                    <div><label className="text-sm text-slate-400">Notes</label><p className="bg-slate-900 p-3 rounded-lg text-sm">{selectedSlide.notes}</p></div>
                  </div>
                  <div className="p-4 border-t border-slate-700 flex justify-end gap-3">
                    <button onClick={() => setSelectedSlide(null)} className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">Close</button>
                    <button className="px-4 py-2 bg-pink-500 hover:bg-pink-400 text-white rounded-lg text-sm font-medium">Edit</button>
                  </div>
                </div>
              </div>
            )}

            <div className="mt-8 text-center text-xs text-slate-500">
              <div>Mission Meets Tech | MissionPulse Orals Studio</div>
              <div className="mt-1">AI GENERATED - REQUIRES HUMAN REVIEW</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
