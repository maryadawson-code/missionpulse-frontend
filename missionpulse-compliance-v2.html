<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compliance Matrix | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:#00050F;color:#e2e8f0;min-height:100vh}
    .glass{background:rgba(15,23,42,0.85);backdrop-filter:blur(16px);border:1px solid rgba(0,229,250,0.1);border-radius:12px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const SUPABASE_URL='https://qdrtpnpnhkxvfmvfziop.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
const supabase=window.supabase?.createClient(SUPABASE_URL,SUPABASE_ANON);

const DEMO_ITEMS=[
  {id:1,req_id:'L.1.1',description:'Technical Approach Overview',section:'Volume I',type:'L',status:'complete',owner:'Sarah C.',notes:'Submitted for Pink Team'},
  {id:2,req_id:'L.1.2',description:'Staffing Plan with LCAT breakdown',section:'Volume I',type:'L',status:'in_progress',owner:'Amanda F.',notes:''},
  {id:3,req_id:'L.2.1',description:'Quality Control Plan',section:'Volume I',type:'L',status:'pending',owner:'James T.',notes:''},
  {id:4,req_id:'L.2.2',description:'Risk Mitigation Strategy',section:'Volume I',type:'L',status:'in_progress',owner:'Michael T.',notes:''},
  {id:5,req_id:'M.1.1',description:'Past Performance Citations (3 required)',section:'Volume II',type:'M',status:'complete',owner:'Lisa M.',notes:'All 3 submitted'},
  {id:6,req_id:'M.1.2',description:'Key Personnel Resumes',section:'Volume II',type:'M',status:'in_progress',owner:'David C.',notes:'2 of 5 complete'},
  {id:7,req_id:'M.2.1',description:'Organizational Chart',section:'Volume II',type:'M',status:'pending',owner:'Amanda F.',notes:''},
  {id:8,req_id:'M.2.2',description:'Teaming Agreements',section:'Volume II',type:'M',status:'blocked',owner:'Robert W.',notes:'Awaiting partner signature'}
];

function ComplianceMatrix(){
  const[connected,setConnected]=useState(false);
  const[items,setItems]=useState(DEMO_ITEMS);
  const[filter,setFilter]=useState('all');
  const[typeFilter,setTypeFilter]=useState('all');
  const[showAdd,setShowAdd]=useState(false);
  const[newItem,setNewItem]=useState({req_id:'',description:'',section:'Volume I',type:'L',status:'pending',owner:'',notes:''});

  useEffect(()=>{
    const load=async()=>{
      try{
        const{data,error}=await supabase.from('compliance_items').select('*').order('req_id');
        if(!error&&data?.length)setItems(data);
        setConnected(!error);
      }catch{setConnected(false)}
    };
    load();
  },[]);

  const addItem=()=>{
    if(!newItem.req_id||!newItem.description)return;
    setItems([...items,{...newItem,id:Date.now()}]);
    setNewItem({req_id:'',description:'',section:'Volume I',type:'L',status:'pending',owner:'',notes:''});
    setShowAdd(false);
  };

  const updateStatus=(id,status)=>setItems(items.map(i=>i.id===id?{...i,status}:i));

  const filteredItems=items.filter(i=>{
    if(filter!=='all'&&i.status!==filter)return false;
    if(typeFilter!=='all'&&i.type!==typeFilter)return false;
    return true;
  });

  const stats={
    total:items.length,
    complete:items.filter(i=>i.status==='complete').length,
    inProgress:items.filter(i=>i.status==='in_progress').length,
    pending:items.filter(i=>i.status==='pending').length,
    blocked:items.filter(i=>i.status==='blocked').length,
    lItems:items.filter(i=>i.type==='L').length,
    mItems:items.filter(i=>i.type==='M').length
  };
  
  const completion=Math.round((stats.complete/stats.total)*100);

  const statusColors={
    complete:'bg-emerald-500/20 text-emerald-400 border-emerald-500/30',
    in_progress:'bg-amber-500/20 text-amber-400 border-amber-500/30',
    pending:'bg-slate-500/20 text-slate-400 border-slate-500/30',
    blocked:'bg-red-500/20 text-red-400 border-red-500/30'
  };

  return(
    <div className="min-h-screen p-6">
      {/* Header */}
      <div className="flex justify-between items-start mb-6">
        <div>
          <h1 className="text-2xl font-bold text-white flex items-center gap-3">
            ✓ Compliance Matrix
            <span className={`text-xs px-2 py-1 rounded ${connected?'bg-emerald-500/20 text-emerald-400':'bg-red-500/20 text-red-400'}`}>
              {connected?'● Live':'○ Demo'}
            </span>
          </h1>
          <p className="text-slate-400 text-sm mt-1">L/M requirement tracking and compliance</p>
        </div>
        <button onClick={()=>setShowAdd(true)} className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-lg font-medium">
          + Add Requirement
        </button>
      </div>

      {/* Progress & Stats */}
      <div className="grid grid-cols-6 gap-4 mb-6">
        <div className="col-span-2 glass p-4">
          <div className="flex items-center justify-between mb-2">
            <span className="text-slate-400 text-sm">Overall Progress</span>
            <span className="text-2xl font-bold text-cyan-400">{completion}%</span>
          </div>
          <div className="h-3 bg-slate-800 rounded-full overflow-hidden">
            <div className="h-full bg-gradient-to-r from-cyan-500 to-emerald-500 transition-all" style={{width:`${completion}%`}}/>
          </div>
          <div className="flex justify-between mt-2 text-xs text-slate-500">
            <span>{stats.complete} complete</span>
            <span>{stats.total - stats.complete} remaining</span>
          </div>
        </div>
        {[
          {label:'Total',value:stats.total,color:'text-white'},
          {label:'Complete',value:stats.complete,color:'text-emerald-400'},
          {label:'In Progress',value:stats.inProgress,color:'text-amber-400'},
          {label:'Blocked',value:stats.blocked,color:'text-red-400'}
        ].map((s,i)=>(
          <div key={i} className="glass p-4 text-center">
            <div className="text-slate-400 text-xs">{s.label}</div>
            <div className={`text-2xl font-bold ${s.color}`}>{s.value}</div>
          </div>
        ))}
      </div>

      {/* Filters */}
      <div className="flex gap-3 mb-4">
        <select value={filter} onChange={e=>setFilter(e.target.value)} className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white">
          <option value="all">All Status</option>
          <option value="complete">Complete</option>
          <option value="in_progress">In Progress</option>
          <option value="pending">Pending</option>
          <option value="blocked">Blocked</option>
        </select>
        <select value={typeFilter} onChange={e=>setTypeFilter(e.target.value)} className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white">
          <option value="all">All Types</option>
          <option value="L">L - Instructions ({stats.lItems})</option>
          <option value="M">M - Evaluation ({stats.mItems})</option>
        </select>
      </div>

      {/* Table */}
      <div className="glass overflow-hidden">
        <table className="w-full">
          <thead className="bg-slate-800/50">
            <tr>
              {['Req ID','Type','Description','Section','Owner','Status','Actions'].map(h=>(
                <th key={h} className="text-left p-3 text-xs font-semibold text-slate-400 uppercase">{h}</th>
              ))}
            </tr>
          </thead>
          <tbody className="divide-y divide-slate-700/30">
            {filteredItems.map(item=>(
              <tr key={item.id} className="hover:bg-slate-800/30">
                <td className="p-3 font-mono text-cyan-400 text-sm">{item.req_id}</td>
                <td className="p-3">
                  <span className={`px-2 py-0.5 rounded text-xs font-medium ${item.type==='L'?'bg-blue-500/20 text-blue-400':'bg-purple-500/20 text-purple-400'}`}>
                    {item.type}
                  </span>
                </td>
                <td className="p-3 text-sm text-white max-w-md">
                  <div>{item.description}</div>
                  {item.notes&&<div className="text-xs text-slate-500 mt-1">📝 {item.notes}</div>}
                </td>
                <td className="p-3 text-sm text-slate-400">{item.section}</td>
                <td className="p-3 text-sm text-slate-300">{item.owner}</td>
                <td className="p-3">
                  <span className={`px-2 py-1 rounded text-xs border ${statusColors[item.status]}`}>
                    {item.status.replace('_',' ')}
                  </span>
                </td>
                <td className="p-3">
                  <select value={item.status} onChange={e=>updateStatus(item.id,e.target.value)} className="bg-slate-800 border border-slate-700 rounded px-2 py-1 text-xs text-white">
                    <option value="pending">Pending</option>
                    <option value="in_progress">In Progress</option>
                    <option value="complete">Complete</option>
                    <option value="blocked">Blocked</option>
                  </select>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* L vs M Summary */}
      <div className="grid grid-cols-2 gap-4 mt-6">
        <div className="glass p-4">
          <h3 className="font-semibold text-white mb-3">📘 Section L - Instructions</h3>
          <div className="flex items-center gap-4">
            <div className="text-3xl font-bold text-blue-400">{items.filter(i=>i.type==='L'&&i.status==='complete').length}/{stats.lItems}</div>
            <div className="flex-1 h-2 bg-slate-800 rounded-full overflow-hidden">
              <div className="h-full bg-blue-500" style={{width:`${(items.filter(i=>i.type==='L'&&i.status==='complete').length/stats.lItems)*100}%`}}/>
            </div>
          </div>
        </div>
        <div className="glass p-4">
          <h3 className="font-semibold text-white mb-3">📙 Section M - Evaluation</h3>
          <div className="flex items-center gap-4">
            <div className="text-3xl font-bold text-purple-400">{items.filter(i=>i.type==='M'&&i.status==='complete').length}/{stats.mItems}</div>
            <div className="flex-1 h-2 bg-slate-800 rounded-full overflow-hidden">
              <div className="h-full bg-purple-500" style={{width:`${(items.filter(i=>i.type==='M'&&i.status==='complete').length/stats.mItems)*100}%`}}/>
            </div>
          </div>
        </div>
      </div>

      {/* Add Modal */}
      {showAdd&&(
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
          <div className="glass p-6 w-full max-w-md">
            <h3 className="text-lg font-bold text-white mb-4">Add Requirement</h3>
            <div className="space-y-3">
              <div className="grid grid-cols-2 gap-3">
                <input value={newItem.req_id} onChange={e=>setNewItem({...newItem,req_id:e.target.value})} placeholder="Req ID (e.g. L.1.1)" className="bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
                <select value={newItem.type} onChange={e=>setNewItem({...newItem,type:e.target.value})} className="bg-slate-800 border border-slate-700 rounded-lg p-2 text-white">
                  <option value="L">L - Instructions</option>
                  <option value="M">M - Evaluation</option>
                </select>
              </div>
              <input value={newItem.description} onChange={e=>setNewItem({...newItem,description:e.target.value})} placeholder="Description" className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
              <div className="grid grid-cols-2 gap-3">
                <input value={newItem.section} onChange={e=>setNewItem({...newItem,section:e.target.value})} placeholder="Section" className="bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
                <input value={newItem.owner} onChange={e=>setNewItem({...newItem,owner:e.target.value})} placeholder="Owner" className="bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
              </div>
              <div className="flex gap-3">
                <button onClick={()=>setShowAdd(false)} className="flex-1 px-4 py-2 bg-slate-700 rounded-lg">Cancel</button>
                <button onClick={addItem} className="flex-1 px-4 py-2 bg-cyan-500 rounded-lg text-white">Add</button>
              </div>
            </div>
          </div>
        </div>
      )}

      <div className="text-center text-xs text-slate-500 mt-8">
        AI GENERATED - REQUIRES HUMAN REVIEW | © 2026 Mission Meets Tech
      </div>
    </div>
  );
}

ReactDOM.render(<ComplianceMatrix/>,document.getElementById('root'));
</script>
</body>
</html>
