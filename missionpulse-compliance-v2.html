<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Compliance Matrix</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.15); }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const DEFAULT_COMPANY_ID = '11111111-1111-1111-1111-111111111111';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const DEMO_COMPLIANCE = [
      { id: '1', opportunity_id: '1', requirement: 'The contractor shall provide 24/7 help desk support', section_ref: 'PWS 3.1', compliance_status: 'Compliant', response: 'MMT provides 24/7/365 Tier 1-3 support via our Virginia Beach NOC with 15-minute response SLA.', due_date: '2026-02-15' },
      { id: '2', opportunity_id: '1', requirement: 'All personnel shall possess active Secret clearance minimum', section_ref: 'PWS 4.2.1', compliance_status: 'Compliant', response: 'All proposed staff maintain active Secret clearances. 4 staff have TS/SCI.', due_date: '2026-02-15' },
      { id: '3', opportunity_id: '1', requirement: 'Contractor shall achieve CMMC Level 2 certification', section_ref: 'PWS 5.1', compliance_status: 'Partial', response: 'POA&M complete, C3PAO assessment scheduled for March 2026.', due_date: '2026-02-20' },
      { id: '4', opportunity_id: '1', requirement: 'System shall maintain 99.9% availability', section_ref: 'PWS 3.5', compliance_status: 'Compliant', response: 'Our zero-downtime deployment methodology has achieved 99.995% uptime across 12 similar contracts.', due_date: '2026-02-15' },
      { id: '5', opportunity_id: '1', requirement: 'Provide transition plan within 30 days of award', section_ref: 'PWS 6.1', compliance_status: 'In Progress', response: 'Draft transition plan developed. Awaiting final staffing confirmation.', due_date: '2026-02-10' },
      { id: '6', opportunity_id: '1', requirement: 'Monthly status reports per CDRL A001', section_ref: 'CDRL A001', compliance_status: 'Not Started', response: '', due_date: '2026-02-25' },
      { id: '7', opportunity_id: '1', requirement: 'Comply with Section 508 accessibility standards', section_ref: 'PWS 7.3', compliance_status: 'Compliant', response: 'All deliverables will meet WCAG 2.1 AA and Section 508 standards. Dedicated 508 coordinator on staff.', due_date: '2026-02-15' },
      { id: '8', opportunity_id: '1', requirement: 'Subcontracting plan per FAR 52.219-9', section_ref: 'Section L.5', compliance_status: 'In Progress', response: 'Small business subcontracting plan at 35% goal, identifying additional partners.', due_date: '2026-02-18' },
    ];

    const DEMO_OPPORTUNITIES = [
      { id: '1', title: 'DHA MHS GENESIS Support', agency: 'DHA' },
      { id: '2', title: 'VA EHR Modernization', agency: 'VA' },
    ];

    function App() {
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [items, setItems] = React.useState(DEMO_COMPLIANCE);
      const [opportunities, setOpportunities] = React.useState(DEMO_OPPORTUNITIES);
      const [selectedOpp, setSelectedOpp] = React.useState('1');
      const [filterStatus, setFilterStatus] = React.useState('all');
      const [searchTerm, setSearchTerm] = React.useState('');
      const [showModal, setShowModal] = React.useState(false);
      const [editingItem, setEditingItem] = React.useState(null);
      const [form, setForm] = React.useState({ 
        requirement: '', 
        section_ref: '', 
        compliance_status: 'Not Started',
        response: '',
        due_date: '',
        opportunity_id: '1'
      });

      React.useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        try {
          const [itemsRes, oppsRes] = await Promise.all([
            supabase.from('compliance_items').select('*').order('section_ref'),
            supabase.from('opportunities').select('id, title, agency')
          ]);
          
          if (!itemsRes.error && itemsRes.data?.length > 0) {
            setItems(itemsRes.data);
            setConnected(true);
          }
          if (!oppsRes.error && oppsRes.data?.length > 0) {
            setOpportunities(oppsRes.data);
            setSelectedOpp(oppsRes.data[0].id);
          }
        } catch (e) {
          console.log('Using demo data');
        }
        setLoading(false);
      };

      const saveItem = async () => {
        const itemData = {
          ...form,
          company_id: DEFAULT_COMPANY_ID,
          updated_at: new Date().toISOString()
        };

        if (connected) {
          try {
            if (editingItem) {
              await supabase.from('compliance_items').update(itemData).eq('id', editingItem.id);
              setItems(items.map(i => i.id === editingItem.id ? { ...i, ...itemData } : i));
            } else {
              const { data } = await supabase.from('compliance_items').insert([itemData]).select();
              if (data) setItems([...items, data[0]]);
            }
          } catch (e) {
            console.error('Save error:', e);
          }
        } else {
          if (editingItem) {
            setItems(items.map(i => i.id === editingItem.id ? { ...i, ...itemData } : i));
          } else {
            setItems([...items, { ...itemData, id: Date.now().toString() }]);
          }
        }
        
        closeModal();
      };

      const deleteItem = async (id) => {
        if (!confirm('Delete this compliance item?')) return;
        if (connected) {
          await supabase.from('compliance_items').delete().eq('id', id);
        }
        setItems(items.filter(i => i.id !== id));
      };

      const updateStatus = async (item, newStatus) => {
        const updated = { ...item, compliance_status: newStatus };
        if (connected) {
          await supabase.from('compliance_items').update({ compliance_status: newStatus }).eq('id', item.id);
        }
        setItems(items.map(i => i.id === item.id ? updated : i));
      };

      const closeModal = () => {
        setShowModal(false);
        setEditingItem(null);
        setForm({ requirement: '', section_ref: '', compliance_status: 'Not Started', response: '', due_date: '', opportunity_id: selectedOpp });
      };

      const openEditModal = (item) => {
        setEditingItem(item);
        setForm({
          requirement: item.requirement,
          section_ref: item.section_ref || '',
          compliance_status: item.compliance_status,
          response: item.response || '',
          due_date: item.due_date || '',
          opportunity_id: item.opportunity_id
        });
        setShowModal(true);
      };

      // Filter items
      const filteredItems = items.filter(i => {
        const oppMatch = i.opportunity_id === selectedOpp;
        const statusMatch = filterStatus === 'all' || i.compliance_status === filterStatus;
        const searchMatch = !searchTerm || 
          i.requirement.toLowerCase().includes(searchTerm.toLowerCase()) ||
          (i.section_ref && i.section_ref.toLowerCase().includes(searchTerm.toLowerCase()));
        return oppMatch && statusMatch && searchMatch;
      });

      // Stats
      const oppItems = items.filter(i => i.opportunity_id === selectedOpp);
      const stats = {
        total: oppItems.length,
        compliant: oppItems.filter(i => i.compliance_status === 'Compliant').length,
        partial: oppItems.filter(i => i.compliance_status === 'Partial').length,
        inProgress: oppItems.filter(i => i.compliance_status === 'In Progress').length,
        notStarted: oppItems.filter(i => i.compliance_status === 'Not Started').length,
        nonCompliant: oppItems.filter(i => i.compliance_status === 'Non-Compliant').length,
      };
      stats.score = stats.total > 0 
        ? Math.round(((stats.compliant + stats.partial * 0.5) / stats.total) * 100) 
        : 0;

      const getStatusColor = (status) => {
        switch (status) {
          case 'Compliant': return 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30';
          case 'Partial': return 'bg-amber-500/20 text-amber-400 border-amber-500/30';
          case 'In Progress': return 'bg-blue-500/20 text-blue-400 border-blue-500/30';
          case 'Not Started': return 'bg-slate-500/20 text-slate-400 border-slate-500/30';
          case 'Non-Compliant': return 'bg-red-500/20 text-red-400 border-red-500/30';
          default: return 'bg-slate-500/20 text-slate-400 border-slate-500/30';
        }
      };

      const getStatusIcon = (status) => {
        switch (status) {
          case 'Compliant': return '✓';
          case 'Partial': return '◐';
          case 'In Progress': return '↻';
          case 'Not Started': return '○';
          case 'Non-Compliant': return '✗';
          default: return '○';
        }
      };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
          </div>
        );
      }

      return (
        <div className="min-h-screen p-6">
          {/* Header */}
          <div className="flex items-center justify-between mb-6">
            <div className="flex items-center gap-4">
              <a href="index.html" className="text-slate-400 hover:text-white">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
              </a>
              <div>
                <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                  <span className="text-emerald-400">✓</span> Compliance Matrix
                </h1>
                <p className="text-slate-400 text-sm">Track RFP requirements and compliance status</p>
              </div>
            </div>
            <div className="flex items-center gap-4">
              <div className={`px-3 py-1 rounded-full text-xs ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                {connected ? '● Live' : '○ Demo'}
              </div>
              <button
                onClick={() => { setEditingItem(null); setForm({ ...form, opportunity_id: selectedOpp }); setShowModal(true); }}
                className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 text-white rounded-lg font-medium transition-colors"
              >
                + Add Requirement
              </button>
            </div>
          </div>

          {/* Filters */}
          <div className="flex flex-wrap items-center gap-4 mb-6">
            <select
              value={selectedOpp}
              onChange={(e) => setSelectedOpp(e.target.value)}
              className="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
            >
              {opportunities.map(opp => (
                <option key={opp.id} value={opp.id}>{opp.title}</option>
              ))}
            </select>
            <select
              value={filterStatus}
              onChange={(e) => setFilterStatus(e.target.value)}
              className="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
            >
              <option value="all">All Statuses</option>
              <option value="Compliant">Compliant</option>
              <option value="Partial">Partial</option>
              <option value="In Progress">In Progress</option>
              <option value="Not Started">Not Started</option>
              <option value="Non-Compliant">Non-Compliant</option>
            </select>
            <input
              type="text"
              placeholder="Search requirements..."
              value={searchTerm}
              onChange={(e) => setSearchTerm(e.target.value)}
              className="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white w-64 focus:outline-none focus:border-cyan-500"
            />
          </div>

          {/* Stats */}
          <div className="grid grid-cols-2 md:grid-cols-7 gap-3 mb-6">
            <div className="glass rounded-xl p-4 text-center">
              <p className="text-3xl font-bold text-white">{stats.score}%</p>
              <p className="text-xs text-slate-400">Compliance Score</p>
            </div>
            <div className="glass rounded-xl p-4 text-center">
              <p className="text-2xl font-bold text-white">{stats.total}</p>
              <p className="text-xs text-slate-400">Total</p>
            </div>
            <div className="glass rounded-xl p-4 text-center">
              <p className="text-2xl font-bold text-emerald-400">{stats.compliant}</p>
              <p className="text-xs text-slate-400">Compliant</p>
            </div>
            <div className="glass rounded-xl p-4 text-center">
              <p className="text-2xl font-bold text-amber-400">{stats.partial}</p>
              <p className="text-xs text-slate-400">Partial</p>
            </div>
            <div className="glass rounded-xl p-4 text-center">
              <p className="text-2xl font-bold text-blue-400">{stats.inProgress}</p>
              <p className="text-xs text-slate-400">In Progress</p>
            </div>
            <div className="glass rounded-xl p-4 text-center">
              <p className="text-2xl font-bold text-slate-400">{stats.notStarted}</p>
              <p className="text-xs text-slate-400">Not Started</p>
            </div>
            <div className="glass rounded-xl p-4 text-center">
              <p className="text-2xl font-bold text-red-400">{stats.nonCompliant}</p>
              <p className="text-xs text-slate-400">Non-Compliant</p>
            </div>
          </div>

          {/* Compliance Items */}
          <div className="space-y-3">
            {filteredItems.map(item => (
              <div key={item.id} className="glass rounded-xl p-4 hover:border-cyan-500/30 transition-colors">
                <div className="flex items-start gap-4">
                  {/* Status Badge */}
                  <div className="flex-shrink-0">
                    <select
                      value={item.compliance_status}
                      onChange={(e) => updateStatus(item, e.target.value)}
                      className={`rounded-lg px-3 py-1.5 text-sm font-medium border ${getStatusColor(item.compliance_status)} bg-transparent cursor-pointer`}
                    >
                      <option value="Compliant">✓ Compliant</option>
                      <option value="Partial">◐ Partial</option>
                      <option value="In Progress">↻ In Progress</option>
                      <option value="Not Started">○ Not Started</option>
                      <option value="Non-Compliant">✗ Non-Compliant</option>
                    </select>
                  </div>
                  
                  {/* Content */}
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-1">
                      {item.section_ref && (
                        <span className="text-cyan-400 text-xs font-mono">{item.section_ref}</span>
                      )}
                      {item.due_date && (
                        <span className="text-slate-500 text-xs">Due: {item.due_date}</span>
                      )}
                    </div>
                    <p className="text-white font-medium mb-2">{item.requirement}</p>
                    {item.response && (
                      <p className="text-slate-400 text-sm">{item.response}</p>
                    )}
                  </div>
                  
                  {/* Actions */}
                  <div className="flex items-center gap-2 flex-shrink-0">
                    <button onClick={() => openEditModal(item)} className="text-slate-400 hover:text-cyan-400 transition-colors p-1">
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                      </svg>
                    </button>
                    <button onClick={() => deleteItem(item.id)} className="text-slate-400 hover:text-red-400 transition-colors p-1">
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                      </svg>
                    </button>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {filteredItems.length === 0 && (
            <div className="text-center py-12">
              <p className="text-slate-500">No compliance items found. Add requirements to track compliance.</p>
            </div>
          )}

          {/* Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
              <div className="glass rounded-xl p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                <h2 className="text-xl font-bold text-white mb-4">
                  {editingItem ? 'Edit Compliance Item' : 'Add Compliance Item'}
                </h2>
                
                <div className="space-y-4">
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Requirement *</label>
                    <textarea
                      value={form.requirement}
                      onChange={(e) => setForm({ ...form, requirement: e.target.value })}
                      placeholder="Enter the RFP requirement text..."
                      rows={3}
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                    />
                  </div>
                  
                  <div className="grid grid-cols-3 gap-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Section Reference</label>
                      <input
                        type="text"
                        value={form.section_ref}
                        onChange={(e) => setForm({ ...form, section_ref: e.target.value })}
                        placeholder="e.g., PWS 3.1"
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                      />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Status</label>
                      <select
                        value={form.compliance_status}
                        onChange={(e) => setForm({ ...form, compliance_status: e.target.value })}
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                      >
                        <option value="Not Started">Not Started</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Partial">Partial</option>
                        <option value="Compliant">Compliant</option>
                        <option value="Non-Compliant">Non-Compliant</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Due Date</label>
                      <input
                        type="date"
                        value={form.due_date}
                        onChange={(e) => setForm({ ...form, due_date: e.target.value })}
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                      />
                    </div>
                  </div>
                  
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Response / Compliance Narrative</label>
                    <textarea
                      value={form.response}
                      onChange={(e) => setForm({ ...form, response: e.target.value })}
                      placeholder="Describe how you will meet this requirement..."
                      rows={4}
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                    />
                  </div>
                </div>
                
                <div className="flex justify-end gap-3 mt-6">
                  <button onClick={closeModal} className="px-4 py-2 text-slate-400 hover:text-white transition-colors">
                    Cancel
                  </button>
                  <button
                    onClick={saveItem}
                    disabled={!form.requirement}
                    className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 disabled:bg-slate-600 text-white rounded-lg font-medium transition-colors"
                  >
                    {editingItem ? 'Update' : 'Create'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <div className="mt-8 text-center text-slate-500 text-sm">
            MissionPulse v3.1 • Mission Meets Tech • AI GENERATED CONTENT REQUIRES HUMAN REVIEW
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
