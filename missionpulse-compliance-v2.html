<!DOCTYPE html>
<html lang="en">
<!--
  FILE: missionpulse-compliance-v2.html
  ROLE: CEO | COO | CAP | PM | CON | QA
  SECURITY: env vars verified

  © 2026 Mission Meets Tech

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compliance Matrix | MissionPulse</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const DEMO_REQUIREMENTS = [
      { id: 1, section: 'L.4.1', requirement: 'Technical Approach (50 pages max)', type: 'L', status: 'complete', assignee: 'Sarah Chen', volume: 'Technical', page_limit: 50, notes: 'Final draft approved' },
      { id: 2, section: 'L.4.2', requirement: 'Management Plan (30 pages max)', type: 'L', status: 'in_progress', assignee: 'John Smith', volume: 'Management', page_limit: 30, notes: 'Section 3 needs revision' },
      { id: 3, section: 'L.4.3', requirement: 'Past Performance (5 references)', type: 'L', status: 'pending', assignee: 'Mike Johnson', volume: 'Past Perf', page_limit: 25, notes: '' },
      { id: 4, section: 'L.4.4', requirement: 'Staffing Plan with Key Personnel', type: 'L', status: 'complete', assignee: 'Lisa Wong', volume: 'Management', page_limit: 20, notes: 'All resumes attached' },
      { id: 5, section: 'M.3.1', requirement: 'Technical Approach - 40%', type: 'M', status: 'in_progress', assignee: 'Sarah Chen', volume: 'Technical', weight: 40, notes: 'Discriminators highlighted' },
      { id: 6, section: 'M.3.2', requirement: 'Past Performance - 30%', type: 'M', status: 'pending', assignee: 'Mike Johnson', volume: 'Past Perf', weight: 30, notes: 'Need 2 more references' },
      { id: 7, section: 'M.3.3', requirement: 'Price - 30%', type: 'M', status: 'at_risk', assignee: 'Finance Team', volume: 'Cost', weight: 30, notes: 'Labor rates under review' },
      { id: 8, section: 'L.5.1', requirement: 'CMMI Level 3 Certification', type: 'L', status: 'complete', assignee: 'QA Team', volume: 'Admin', page_limit: 0, notes: 'Certificate attached' },
      { id: 9, section: 'L.5.2', requirement: 'FedRAMP Moderate Authorization', type: 'L', status: 'at_risk', assignee: 'Security Team', volume: 'Admin', page_limit: 0, notes: 'ATO pending - Due 02/15' },
    ];

    const STATUS_CONFIG = {
      complete: { label: 'Complete', color: '#10B981', bg: 'bg-emerald-500/20', border: 'border-emerald-500/30', icon: '✓' },
      in_progress: { label: 'In Progress', color: '#3B82F6', bg: 'bg-blue-500/20', border: 'border-blue-500/30', icon: '⏳' },
      pending: { label: 'Pending', color: '#64748B', bg: 'bg-slate-500/20', border: 'border-slate-500/30', icon: '○' },
      at_risk: { label: 'At Risk', color: '#EF4444', bg: 'bg-red-500/20', border: 'border-red-500/30', icon: '⚠' },
    };

    function ComplianceMatrix() {
      const [connected, setConnected] = useState(false);
      const [loading, setLoading] = useState(true);
      const [requirements, setRequirements] = useState([]);
      const [filter, setFilter] = useState('all');
      const [typeFilter, setTypeFilter] = useState('all');
      const [expandedId, setExpandedId] = useState(null);

      useEffect(() => { loadData(); }, []);

      const loadData = async () => {
        try {
          const { data, error } = await supabase.from('compliance_items').select('*').order('section');
          if (error) throw error;
          setRequirements(data?.length ? data : DEMO_REQUIREMENTS);
          setConnected(true);
        } catch (err) {
          console.error('Load error:', err);
          setRequirements(DEMO_REQUIREMENTS);
        } finally {
          setLoading(false);
        }
      };

      const updateStatus = async (id, newStatus) => {
        try {
          await supabase.from('compliance_items').update({ status: newStatus }).eq('id', id);
        } catch (err) { console.error('Update error:', err); }
        setRequirements(requirements.map(r => r.id === id ? { ...r, status: newStatus } : r));
      };

      const filteredReqs = useMemo(() => {
        return requirements.filter(r => {
          if (filter !== 'all' && r.status !== filter) return false;
          if (typeFilter !== 'all' && r.type !== typeFilter) return false;
          return true;
        });
      }, [requirements, filter, typeFilter]);

      const stats = useMemo(() => {
        const total = requirements.length;
        const complete = requirements.filter(r => r.status === 'complete').length;
        const atRisk = requirements.filter(r => r.status === 'at_risk').length;
        const lItems = requirements.filter(r => r.type === 'L').length;
        const mItems = requirements.filter(r => r.type === 'M').length;
        return { total, complete, atRisk, lItems, mItems, compliance: total ? Math.round((complete / total) * 100) : 0 };
      }, [requirements]);

      if (loading) {
        return (
          <div className="min-h-screen bg-[#00050F] flex items-center justify-center">
            <div className="w-12 h-12 border-4 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin" />
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#00050F] text-white p-6">
          {/* Header */}
          <div className="flex items-center justify-between mb-6">
            <div>
              <div className="flex items-center gap-3">
                <span className="text-3xl">✅</span>
                <h1 className="text-2xl font-bold">Compliance Matrix</h1>
                <span className={`px-2 py-1 text-xs rounded-full ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                  {connected ? '● Live' : '○ Demo'}
                </span>
              </div>
              <p className="text-slate-400 mt-1">Track Section L/M requirements and compliance status</p>
            </div>
          </div>

          {/* Stats Cards */}
          <div className="grid grid-cols-5 gap-4 mb-6">
            <div className="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
              <div className="text-3xl font-bold text-cyan-400">{stats.compliance}%</div>
              <div className="text-sm text-slate-400">Compliance Score</div>
            </div>
            <div className="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
              <div className="text-3xl font-bold text-emerald-400">{stats.complete}</div>
              <div className="text-sm text-slate-400">Complete</div>
            </div>
            <div className="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
              <div className="text-3xl font-bold text-red-400">{stats.atRisk}</div>
              <div className="text-sm text-slate-400">At Risk</div>
            </div>
            <div className="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
              <div className="text-3xl font-bold text-blue-400">{stats.lItems}</div>
              <div className="text-sm text-slate-400">Section L Items</div>
            </div>
            <div className="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
              <div className="text-3xl font-bold text-purple-400">{stats.mItems}</div>
              <div className="text-sm text-slate-400">Section M Items</div>
            </div>
          </div>

          {/* Progress Bar */}
          <div className="mb-6 bg-slate-800/30 rounded-lg p-4 border border-slate-700/50">
            <div className="flex justify-between text-sm mb-2">
              <span className="text-slate-400">Overall Compliance</span>
              <span className="font-bold">{stats.complete}/{stats.total} Requirements</span>
            </div>
            <div className="h-4 bg-slate-700 rounded-full overflow-hidden flex">
              {Object.entries(STATUS_CONFIG).map(([key, config]) => {
                const count = requirements.filter(r => r.status === key).length;
                const pct = stats.total ? (count / stats.total) * 100 : 0;
                return pct > 0 ? (
                  <div 
                    key={key}
                    className="h-full transition-all duration-500"
                    style={{ width: `${pct}%`, backgroundColor: config.color }}
                    title={`${config.label}: ${count}`}
                  />
                ) : null;
              })}
            </div>
            <div className="flex gap-4 mt-2">
              {Object.entries(STATUS_CONFIG).map(([key, config]) => (
                <div key={key} className="flex items-center gap-1 text-xs">
                  <span className="w-3 h-3 rounded" style={{ backgroundColor: config.color }} />
                  <span className="text-slate-400">{config.label}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Filters */}
          <div className="flex gap-4 mb-6">
            <select value={filter} onChange={e => setFilter(e.target.value)} className="bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white">
              <option value="all">All Status</option>
              {Object.entries(STATUS_CONFIG).map(([key, config]) => (
                <option key={key} value={key}>{config.label}</option>
              ))}
            </select>
            <select value={typeFilter} onChange={e => setTypeFilter(e.target.value)} className="bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white">
              <option value="all">All Sections</option>
              <option value="L">Section L (Instructions)</option>
              <option value="M">Section M (Evaluation)</option>
            </select>
            <div className="flex-1" />
            <button className="px-4 py-2 bg-purple-500 hover:bg-purple-600 rounded-lg font-medium">
              📄 Export Matrix
            </button>
          </div>

          {/* Requirements Table */}
          <div className="bg-slate-800/30 rounded-xl border border-slate-700/50 overflow-hidden">
            <table className="w-full">
              <thead className="bg-slate-800/50">
                <tr>
                  <th className="text-left px-4 py-3 text-sm font-medium text-slate-400">Section</th>
                  <th className="text-left px-4 py-3 text-sm font-medium text-slate-400">Requirement</th>
                  <th className="text-left px-4 py-3 text-sm font-medium text-slate-400">Volume</th>
                  <th className="text-left px-4 py-3 text-sm font-medium text-slate-400">Assignee</th>
                  <th className="text-left px-4 py-3 text-sm font-medium text-slate-400">Status</th>
                  <th className="text-left px-4 py-3 text-sm font-medium text-slate-400">Actions</th>
                </tr>
              </thead>
              <tbody>
                {filteredReqs.map(req => {
                  const status = STATUS_CONFIG[req.status];
                  return (
                    <React.Fragment key={req.id}>
                      <tr className="border-t border-slate-700/50 hover:bg-slate-800/30 transition-colors">
                        <td className="px-4 py-3">
                          <span className={`px-2 py-1 text-xs font-bold rounded ${req.type === 'L' ? 'bg-blue-500/20 text-blue-400' : 'bg-purple-500/20 text-purple-400'}`}>
                            {req.section}
                          </span>
                        </td>
                        <td className="px-4 py-3">
                          <button onClick={() => setExpandedId(expandedId === req.id ? null : req.id)} className="text-left hover:text-cyan-400 transition-colors">
                            {req.requirement}
                          </button>
                        </td>
                        <td className="px-4 py-3 text-sm text-slate-400">{req.volume}</td>
                        <td className="px-4 py-3 text-sm">{req.assignee}</td>
                        <td className="px-4 py-3">
                          <span className={`inline-flex items-center gap-1 px-2 py-1 text-xs rounded-full ${status.bg} ${status.border} border`} style={{ color: status.color }}>
                            {status.icon} {status.label}
                          </span>
                        </td>
                        <td className="px-4 py-3">
                          <select 
                            value={req.status}
                            onChange={e => updateStatus(req.id, e.target.value)}
                            className="bg-slate-700 border border-slate-600 rounded px-2 py-1 text-sm"
                          >
                            {Object.entries(STATUS_CONFIG).map(([key, config]) => (
                              <option key={key} value={key}>{config.label}</option>
                            ))}
                          </select>
                        </td>
                      </tr>
                      {expandedId === req.id && (
                        <tr className="bg-slate-800/20">
                          <td colSpan="6" className="px-4 py-4">
                            <div className="grid grid-cols-3 gap-4">
                              <div>
                                <div className="text-xs text-slate-500 mb-1">Page Limit / Weight</div>
                                <div className="font-medium">
                                  {req.type === 'L' ? `${req.page_limit || 'N/A'} pages` : `${req.weight || 0}%`}
                                </div>
                              </div>
                              <div>
                                <div className="text-xs text-slate-500 mb-1">Notes</div>
                                <div className="text-sm text-slate-300">{req.notes || 'No notes'}</div>
                              </div>
                              <div className="flex items-end justify-end gap-2">
                                <button className="px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded text-sm">Edit</button>
                                <button className="px-3 py-1.5 bg-cyan-500/20 text-cyan-400 hover:bg-cyan-500/30 rounded text-sm">View Details</button>
                              </div>
                            </div>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* Footer */}
          <div className="mt-8 pt-4 border-t border-slate-800 text-center text-xs text-slate-600">
            AI GENERATED - REQUIRES HUMAN REVIEW
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ComplianceMatrix />);
  </script>
</body>
</html>
