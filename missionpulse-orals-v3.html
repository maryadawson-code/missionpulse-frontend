<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Orals Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
    @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
    .recording { animation: pulse-ring 1.5s ease-out infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    // ============================================
    // CONFIGURATION
    // ============================================
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const API_URL = 'https://missionpulse-api.onrender.com';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // ============================================
    // DEMO DATA
    // ============================================
    const DEMO_SLIDES = [
      { id: 1, title: 'Introduction & Team', content: 'Mission Meets Tech Overview\n• 15 years healthcare IT experience\n• 98% CPARS rating\n• Key personnel introduction', duration: 3, notes: 'Start strong, make eye contact' },
      { id: 2, title: 'Understanding the Mission', content: 'VA EHR Modernization Objectives\n• Seamless care coordination\n• Interoperability with DoD\n• Veteran-centric experience', duration: 4, notes: 'Reference specific VA priorities' },
      { id: 3, title: 'Technical Approach', content: 'Our Solution Architecture\n• HL7 FHIR integration\n• Cloud-native on Azure GovCloud\n• Zero-trust security model', duration: 5, notes: 'Use the architecture diagram' },
      { id: 4, title: 'Management Approach', content: 'Program Execution Strategy\n• Agile/SAFe methodology\n• Risk management framework\n• Quality assurance plan', duration: 4, notes: 'Emphasize PM credentials' },
      { id: 5, title: 'Past Performance', content: 'Proven Track Record\n• DHA MHS GENESIS - $45M\n• CMS Data Platform - $32M\n• IHS Telehealth - $28M', duration: 3, notes: 'Have specific metrics ready' },
      { id: 6, title: 'Staffing & Transition', content: 'Team & Transition Plan\n• 95% staff identified\n• 30-day transition timeline\n• Knowledge transfer approach', duration: 3, notes: 'Show org chart' },
      { id: 7, title: 'Summary & Questions', content: 'Why Mission Meets Tech?\n• Mission-focused partner\n• Proven healthcare expertise\n• Ready to execute Day 1', duration: 3, notes: 'Strong close, confident tone' }
    ];

    const DEMO_QA = [
      { id: 1, question: 'How will you handle the transition from the incumbent contractor?', category: 'Management', difficulty: 'high', answer: 'Our 30-day transition plan includes parallel operations, knowledge transfer sessions, and full documentation review. We have successfully transitioned 12 similar contracts.' },
      { id: 2, question: 'Describe your approach to HL7 FHIR interoperability.', category: 'Technical', difficulty: 'medium', answer: 'We implement FHIR R4 APIs with full compliance to the US Core profiles. Our team includes 3 HL7 certified specialists who have implemented 50+ FHIR integrations.' },
      { id: 3, question: 'What is your risk mitigation strategy for key personnel turnover?', category: 'Staffing', difficulty: 'high', answer: 'We maintain a bench of qualified personnel at 120% capacity. Each key role has an identified backup with documented cross-training. Our retention rate is 94%.' },
      { id: 4, question: 'How do you ensure Section 508 compliance?', category: 'Technical', difficulty: 'medium', answer: 'We integrate accessibility testing into our CI/CD pipeline using automated tools like axe-core, supplemented by manual VPAT validation for all deliverables.' },
      { id: 5, question: 'Explain your approach to protecting CUI and PHI data.', category: 'Security', difficulty: 'high', answer: 'We implement NIST 800-171 controls and maintain CMMC Level 2 certification. All PHI is encrypted at rest (AES-256) and in transit (TLS 1.3).' }
    ];

    // ============================================
    // COMPONENTS
    // ============================================

    // Presentation Timer
    const PresentationTimer = ({ totalMinutes, isRunning, onToggle, onReset }) => {
      const [elapsed, setElapsed] = React.useState(0);
      
      React.useEffect(() => {
        let interval;
        if (isRunning) {
          interval = setInterval(() => setElapsed(e => e + 1), 1000);
        }
        return () => clearInterval(interval);
      }, [isRunning]);

      React.useEffect(() => {
        if (!isRunning && elapsed === 0) return;
      }, [isRunning]);

      const handleReset = () => {
        setElapsed(0);
        onReset();
      };

      const totalSeconds = totalMinutes * 60;
      const remaining = Math.max(0, totalSeconds - elapsed);
      const minutes = Math.floor(remaining / 60);
      const seconds = remaining % 60;
      const progress = (elapsed / totalSeconds) * 100;
      const isOvertime = elapsed > totalSeconds;

      return (
        <div className={`glass rounded-xl border ${isOvertime ? 'border-red-500/50' : 'border-slate-700/50'} p-6`}>
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-semibold text-white">Presentation Timer</h3>
            <span className="text-sm text-slate-400">{totalMinutes} min allocated</span>
          </div>
          
          <div className="text-center mb-4">
            <p className={`text-5xl font-mono font-bold ${isOvertime ? 'text-red-400' : 'text-cyan-400'}`}>
              {String(minutes).padStart(2, '0')}:{String(seconds).padStart(2, '0')}
            </p>
            {isOvertime && <p className="text-red-400 text-sm mt-1">OVERTIME</p>}
          </div>

          <div className="w-full h-3 bg-slate-700 rounded-full overflow-hidden mb-4">
            <div 
              className={`h-full transition-all duration-1000 ${isOvertime ? 'bg-red-500' : progress > 80 ? 'bg-amber-500' : 'bg-cyan-500'}`}
              style={{ width: `${Math.min(100, progress)}%` }}
            />
          </div>

          <div className="flex gap-2">
            <button
              onClick={onToggle}
              className={`flex-1 py-3 rounded-lg font-medium transition-colors ${
                isRunning 
                  ? 'bg-amber-600 hover:bg-amber-500' 
                  : 'bg-emerald-600 hover:bg-emerald-500'
              }`}
            >
              {isRunning ? '⏸ Pause' : '▶ Start'}
            </button>
            <button
              onClick={handleReset}
              className="px-4 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg transition-colors"
            >
              ↻
            </button>
          </div>
        </div>
      );
    };

    // Slide Card
    const SlideCard = ({ slide, isActive, onClick, slideNumber }) => (
      <div
        onClick={onClick}
        className={`p-4 rounded-lg cursor-pointer transition-all ${
          isActive 
            ? 'bg-cyan-500/20 border-2 border-cyan-500' 
            : 'bg-slate-800/50 border border-slate-700 hover:border-slate-600'
        }`}
      >
        <div className="flex items-start gap-3">
          <span className={`w-8 h-8 rounded-lg flex items-center justify-center text-sm font-bold ${
            isActive ? 'bg-cyan-500 text-white' : 'bg-slate-700 text-slate-300'
          }`}>
            {slideNumber}
          </span>
          <div className="flex-1 min-w-0">
            <h4 className="font-medium text-white truncate">{slide.title}</h4>
            <p className="text-xs text-slate-400">{slide.duration} min</p>
          </div>
        </div>
      </div>
    );

    // Slide Preview
    const SlidePreview = ({ slide, slideNumber, totalSlides }) => (
      <div className="glass rounded-xl border border-slate-700/50 overflow-hidden">
        <div className="bg-slate-800 px-4 py-2 flex items-center justify-between">
          <span className="text-sm text-slate-400">Slide {slideNumber} of {totalSlides}</span>
          <span className="text-sm text-cyan-400">{slide.duration} min</span>
        </div>
        <div className="aspect-video bg-gradient-to-br from-slate-900 to-slate-800 p-8 flex flex-col justify-center">
          <h2 className="text-3xl font-bold text-white mb-6">{slide.title}</h2>
          <div className="text-lg text-slate-300 whitespace-pre-line">{slide.content}</div>
        </div>
        {slide.notes && (
          <div className="bg-amber-500/10 border-t border-amber-500/30 px-4 py-3">
            <p className="text-sm text-amber-400">📝 {slide.notes}</p>
          </div>
        )}
      </div>
    );

    // Q&A Practice Card
    const QACard = ({ qa, showAnswer, onToggle }) => {
      const difficultyColors = {
        high: 'bg-red-500/20 text-red-400',
        medium: 'bg-amber-500/20 text-amber-400',
        low: 'bg-emerald-500/20 text-emerald-400'
      };

      return (
        <div className="glass rounded-xl border border-slate-700/50 overflow-hidden">
          <div className="p-4">
            <div className="flex items-start justify-between gap-4 mb-3">
              <span className="px-2 py-0.5 bg-slate-700 rounded text-xs text-slate-300">{qa.category}</span>
              <span className={`px-2 py-0.5 rounded text-xs ${difficultyColors[qa.difficulty]}`}>
                {qa.difficulty}
              </span>
            </div>
            <h4 className="font-medium text-white mb-4">{qa.question}</h4>
            
            {showAnswer ? (
              <div className="bg-emerald-500/10 border border-emerald-500/30 rounded-lg p-4">
                <p className="text-sm text-emerald-300">{qa.answer}</p>
              </div>
            ) : (
              <button
                onClick={onToggle}
                className="w-full py-3 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm text-slate-400 transition-colors"
              >
                Click to reveal suggested answer
              </button>
            )}
          </div>
        </div>
      );
    };

    // Tab Button
    const TabButton = ({ active, onClick, children, icon }) => (
      <button
        onClick={onClick}
        className={`flex items-center gap-2 px-6 py-3 rounded-lg font-medium transition-colors ${
          active
            ? 'bg-cyan-600 text-white'
            : 'bg-slate-800 text-slate-400 hover:bg-slate-700'
        }`}
      >
        <span>{icon}</span>
        {children}
      </button>
    );

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [slides, setSlides] = React.useState(DEMO_SLIDES);
      const [qaBank, setQaBank] = React.useState(DEMO_QA);
      const [activeSlide, setActiveSlide] = React.useState(0);
      const [activeTab, setActiveTab] = React.useState('slides');
      const [timerRunning, setTimerRunning] = React.useState(false);
      const [shownAnswers, setShownAnswers] = React.useState(new Set());
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);

      React.useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        try {
          const { data: slidesData } = await supabase
            .from('orals_slides')
            .select('*')
            .order('slide_order', { ascending: true });

          if (slidesData && slidesData.length > 0) {
            setSlides(slidesData);
            setConnected(true);
          }

          const { data: qaData } = await supabase
            .from('orals_qa')
            .select('*')
            .order('category', { ascending: true });

          if (qaData && qaData.length > 0) {
            setQaBank(qaData);
          }
        } catch (e) {
          console.log('Using demo data');
        } finally {
          setLoading(false);
        }
      };

      const totalDuration = slides.reduce((sum, s) => sum + s.duration, 0);

      const handlePrevSlide = () => setActiveSlide(Math.max(0, activeSlide - 1));
      const handleNextSlide = () => setActiveSlide(Math.min(slides.length - 1, activeSlide + 1));

      const toggleAnswer = (id) => {
        setShownAnswers(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id);
          else next.add(id);
          return next;
        });
      };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-16 h-16 border-4 border-pink-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-slate-400">Loading Orals Studio...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-700/50 rounded-lg">← Back</a>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-pink-500 to-rose-600 flex items-center justify-center">🎤</div>
                  <div>
                    <h1 className="text-xl font-bold text-white">Orals Studio</h1>
                    <p className="text-xs text-slate-400">Presentation Prep & Q&A Practice</p>
                  </div>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <span className="text-sm text-slate-400">{slides.length} slides • {totalDuration} min</span>
                <div className={`px-3 py-1 rounded-full text-xs ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                  {connected ? '● Live' : '○ Demo'}
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8 space-y-6">
            {/* Tabs */}
            <div className="flex gap-2">
              <TabButton active={activeTab === 'slides'} onClick={() => setActiveTab('slides')} icon="📊">
                Slides
              </TabButton>
              <TabButton active={activeTab === 'qa'} onClick={() => setActiveTab('qa')} icon="❓">
                Q&A Practice
              </TabButton>
              <TabButton active={activeTab === 'timer'} onClick={() => setActiveTab('timer')} icon="⏱️">
                Timer
              </TabButton>
            </div>

            {activeTab === 'slides' && (
              <div className="grid lg:grid-cols-4 gap-6">
                {/* Slide List */}
                <div className="space-y-2">
                  {slides.map((slide, i) => (
                    <SlideCard
                      key={slide.id}
                      slide={slide}
                      slideNumber={i + 1}
                      isActive={activeSlide === i}
                      onClick={() => setActiveSlide(i)}
                    />
                  ))}
                </div>

                {/* Slide Preview */}
                <div className="lg:col-span-3 space-y-4">
                  <SlidePreview
                    slide={slides[activeSlide]}
                    slideNumber={activeSlide + 1}
                    totalSlides={slides.length}
                  />
                  
                  {/* Navigation */}
                  <div className="flex items-center justify-between">
                    <button
                      onClick={handlePrevSlide}
                      disabled={activeSlide === 0}
                      className="px-4 py-2 bg-slate-700 hover:bg-slate-600 disabled:opacity-50 disabled:cursor-not-allowed rounded-lg transition-colors"
                    >
                      ← Previous
                    </button>
                    <div className="flex items-center gap-2">
                      {slides.map((_, i) => (
                        <button
                          key={i}
                          onClick={() => setActiveSlide(i)}
                          className={`w-3 h-3 rounded-full transition-colors ${
                            activeSlide === i ? 'bg-cyan-500' : 'bg-slate-600 hover:bg-slate-500'
                          }`}
                        />
                      ))}
                    </div>
                    <button
                      onClick={handleNextSlide}
                      disabled={activeSlide === slides.length - 1}
                      className="px-4 py-2 bg-slate-700 hover:bg-slate-600 disabled:opacity-50 disabled:cursor-not-allowed rounded-lg transition-colors"
                    >
                      Next →
                    </button>
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'qa' && (
              <div className="grid md:grid-cols-2 gap-4">
                {qaBank.map(qa => (
                  <QACard
                    key={qa.id}
                    qa={qa}
                    showAnswer={shownAnswers.has(qa.id)}
                    onToggle={() => toggleAnswer(qa.id)}
                  />
                ))}
              </div>
            )}

            {activeTab === 'timer' && (
              <div className="max-w-md mx-auto">
                <PresentationTimer
                  totalMinutes={totalDuration}
                  isRunning={timerRunning}
                  onToggle={() => setTimerRunning(!timerRunning)}
                  onReset={() => setTimerRunning(false)}
                />
                
                <div className="mt-6 glass rounded-xl border border-slate-700/50 p-4">
                  <h3 className="font-semibold text-white mb-3">Time Breakdown</h3>
                  <div className="space-y-2">
                    {slides.map((slide, i) => (
                      <div key={slide.id} className="flex items-center justify-between text-sm">
                        <span className="text-slate-400">{i + 1}. {slide.title}</span>
                        <span className="text-cyan-400 font-mono">{slide.duration}:00</span>
                      </div>
                    ))}
                    <div className="border-t border-slate-700 pt-2 flex items-center justify-between font-semibold">
                      <span className="text-white">Total</span>
                      <span className="text-cyan-400 font-mono">{totalDuration}:00</span>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </main>

          {/* Footer */}
          <footer className="border-t border-slate-800 py-6">
            <div className="max-w-7xl mx-auto px-6 flex justify-between">
              <p className="text-xs text-slate-500">© 2026 Mission Meets Tech</p>
              <p className="text-xs text-slate-600">AI GENERATED - REQUIRES HUMAN REVIEW</p>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
