<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Orals Studio</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --mmt-cyan: #00E5FA; --mmt-navy: #00050F; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--mmt-navy); color: #e2e8f0; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

const CONFIG = {
  SUPABASE_URL: 'https://djuviwarqdvlbgcfuupa.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8',
  LOGIN_PAGE: 'login.html'
};

const DEMO_QUESTIONS = [
  { id: 1, category: 'Technical', question: 'Describe your approach to EHR system interoperability.', difficulty: 'hard', timeLimit: 5 },
  { id: 2, category: 'Management', question: 'How will you ensure on-time delivery given the aggressive timeline?', difficulty: 'medium', timeLimit: 3 },
  { id: 3, category: 'Past Performance', question: 'Describe a similar project where you overcame significant challenges.', difficulty: 'medium', timeLimit: 4 },
  { id: 4, category: 'Staffing', question: 'Walk us through your key personnel qualifications.', difficulty: 'easy', timeLimit: 3 },
  { id: 5, category: 'Risk', question: 'What are your top 3 risks and mitigation strategies?', difficulty: 'hard', timeLimit: 5 }
];

const PRESENTERS = [
  { name: 'Mary Womack', role: 'CEO', topic: 'Opening & Commitment' },
  { name: 'Michael Torres', role: 'Capture Manager', topic: 'Understanding & Win Themes' },
  { name: 'Sarah Chen', role: 'Technical Lead', topic: 'Technical Approach' },
  { name: 'Lisa Martinez', role: 'Proposal Manager', topic: 'Management Approach' }
];

function checkAuth() {
  const session = localStorage.getItem('MP_SESSION');
  if (!session) { window.location.href = CONFIG.LOGIN_PAGE; return null; }
  try { return JSON.parse(localStorage.getItem('MP_USER')); }
  catch { return { email: 'demo@mmt.com', role: 'PM', name: 'Demo User' }; }
}

function QuestionCard({ q, onPractice }) {
  const diffColors = { easy: 'bg-green-500/20 text-green-400', medium: 'bg-amber-500/20 text-amber-400', hard: 'bg-red-500/20 text-red-400' };
  return (
    <div className="glass rounded-xl p-4">
      <div className="flex justify-between items-start mb-3">
        <span className="text-xs px-2 py-1 bg-slate-700 rounded">{q.category}</span>
        <span className={`text-xs px-2 py-1 rounded ${diffColors[q.difficulty]}`}>{q.difficulty}</span>
      </div>
      <p className="text-white mb-3">{q.question}</p>
      <div className="flex justify-between items-center">
        <span className="text-xs text-slate-400">⏱️ {q.timeLimit} min suggested</span>
        <button onClick={() => onPractice(q)} className="px-3 py-1.5 bg-cyan-600 hover:bg-cyan-500 rounded-lg text-sm">Practice</button>
      </div>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [activeQuestion, setActiveQuestion] = useState(null);
  const [timer, setTimer] = useState(0);
  const [isRunning, setIsRunning] = useState(false);

  useEffect(() => {
    const authUser = checkAuth();
    if (authUser) setUser(authUser);
  }, []);

  useEffect(() => {
    let interval;
    if (isRunning) interval = setInterval(() => setTimer(t => t + 1), 1000);
    return () => clearInterval(interval);
  }, [isRunning]);

  const startPractice = (q) => {
    setActiveQuestion(q);
    setTimer(0);
    setIsRunning(true);
  };

  const formatTime = (s) => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;

  if (!user) return <div className="min-h-screen flex items-center justify-center text-cyan-400">Loading...</div>;

  return (
    <div className="min-h-screen bg-slate-950">
      <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            </a>
            <div>
              <h1 className="text-xl font-bold text-white">🎤 Orals Studio</h1>
              <p className="text-sm text-slate-400">Presentation Preparation & Practice</p>
            </div>
          </div>
          <span className="text-sm text-slate-400">{user.name} ({user.role})</span>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-6 space-y-6">
        {/* Presentation Team */}
        <div className="glass rounded-xl p-4">
          <h2 className="text-lg font-semibold text-white mb-4">Presentation Team</h2>
          <div className="grid grid-cols-4 gap-4">
            {PRESENTERS.map((p, i) => (
              <div key={i} className="bg-slate-800/50 rounded-lg p-3 text-center">
                <div className="w-12 h-12 mx-auto rounded-full bg-gradient-to-br from-cyan-500 to-teal-500 flex items-center justify-center text-white font-bold mb-2">
                  {p.name.split(' ').map(n => n[0]).join('')}
                </div>
                <h4 className="font-medium text-white">{p.name}</h4>
                <p className="text-xs text-slate-400">{p.role}</p>
                <p className="text-xs text-cyan-400 mt-1">{p.topic}</p>
              </div>
            ))}
          </div>
        </div>

        {/* Active Practice */}
        {activeQuestion && (
          <div className="glass rounded-xl p-6 border border-cyan-500/30">
            <div className="flex justify-between items-start mb-4">
              <div>
                <span className="text-xs px-2 py-1 bg-cyan-500/20 text-cyan-400 rounded">{activeQuestion.category}</span>
                <h2 className="text-xl font-bold text-white mt-2">{activeQuestion.question}</h2>
              </div>
              <div className="text-right">
                <div className="text-4xl font-mono font-bold text-cyan-400">{formatTime(timer)}</div>
                <p className="text-xs text-slate-400">Target: {activeQuestion.timeLimit}:00</p>
              </div>
            </div>
            <div className="flex gap-4">
              <button onClick={() => setIsRunning(!isRunning)} className={`px-4 py-2 rounded-lg font-medium ${isRunning ? 'bg-amber-600' : 'bg-green-600'}`}>
                {isRunning ? '⏸️ Pause' : '▶️ Resume'}
              </button>
              <button onClick={() => { setActiveQuestion(null); setIsRunning(false); }} className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg">
                End Practice
              </button>
            </div>
          </div>
        )}

        {/* Question Bank */}
        <div>
          <h2 className="text-lg font-semibold text-white mb-4">Question Bank</h2>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {DEMO_QUESTIONS.map(q => <QuestionCard key={q.id} q={q} onPractice={startPractice} />)}
          </div>
        </div>
      </main>

      <footer className="border-t border-slate-800 mt-12">
        <div className="max-w-7xl mx-auto px-4 py-4 text-center text-xs text-slate-500">
          Mission Meets Tech © 2026 | MissionPulse v3.0 | Orals Studio Module
        </div>
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
