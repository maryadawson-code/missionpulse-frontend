<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | RFP Shredder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-cyan { 0%, 100% { box-shadow: 0 0 0 0 rgba(0, 229, 250, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(0, 229, 250, 0); } }
    .pulse-icon { animation: pulse-cyan 2s infinite; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .shimmer { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const API_URL = 'https://missionpulse-api.onrender.com';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // Demo analysis results
    const DEMO_ANALYSIS = {
      summary: {
        title: 'DHA Electronic Health Record Modernization',
        agency: 'Defense Health Agency',
        solicitation: 'HT0011-26-R-0042',
        due_date: '2026-03-15',
        ceiling: '$125,000,000',
        period: '5 Year Base + 5 Option Years',
        set_aside: 'SDVOSB',
        naics: '541512'
      },
      requirements: [
        { id: 1, section: 'L.1', type: 'Mandatory', text: 'Offeror shall demonstrate experience with HL7 FHIR interoperability standards', status: 'Compliant' },
        { id: 2, section: 'L.2', type: 'Mandatory', text: 'Minimum 3 past performance references of similar scope within 5 years', status: 'Review' },
        { id: 3, section: 'L.3', type: 'Mandatory', text: 'Key personnel must hold active Secret clearance minimum', status: 'Compliant' },
        { id: 4, section: 'M.1', type: 'Evaluation', text: 'Technical approach will be evaluated for innovation and risk mitigation', status: 'Pending' },
        { id: 5, section: 'M.2', type: 'Evaluation', text: 'Past performance will be evaluated for relevance and quality', status: 'Pending' },
        { id: 6, section: 'C.3', type: 'SOW', text: 'Contractor shall migrate 2.3M patient records with zero data loss', status: 'Review' },
        { id: 7, section: 'C.5', type: 'SOW', text: 'System shall achieve 99.99% uptime SLA', status: 'Compliant' },
        { id: 8, section: 'H.1', type: 'Clause', text: 'FAR 52.204-21 Basic Safeguarding of Covered Contractor Information', status: 'Compliant' }
      ],
      risks: [
        { level: 'High', title: 'Aggressive Timeline', description: 'Migration of 2.3M records in 18 months is aggressive given data complexity' },
        { level: 'Medium', title: 'Clearance Requirements', description: 'Secret clearance for all key personnel may limit staffing options' },
        { level: 'Low', title: 'Technology Stack', description: 'HL7 FHIR is well-established, low technical risk' }
      ],
      recommendations: [
        'Emphasize MHS Genesis experience in technical approach',
        'Highlight zero-downtime migration methodology',
        'Address staffing timeline in management approach',
        'Consider teaming for surge capacity',
        'Prepare detailed transition-in plan'
      ],
      evaluation_factors: [
        { factor: 'Technical Approach', weight: '40%', notes: 'Innovation and feasibility emphasized' },
        { factor: 'Past Performance', weight: '30%', notes: 'Relevance and recency critical' },
        { factor: 'Price', weight: '20%', notes: 'Best value tradeoff' },
        { factor: 'Small Business', weight: '10%', notes: 'SDVOSB participation plan' }
      ]
    };

    // Sidebar
    function Sidebar() {
      const navItems = [
        { icon: '🏠', label: 'Dashboard', path: 'index.html' },
        { icon: '📊', label: 'Pipeline', path: 'missionpulse-pipeline-v2.html' },
        { icon: '🎯', label: 'War Room', path: 'missionpulse-warroom-v2.html' },
        { icon: '🔍', label: 'RFP Shredder', path: 'missionpulse-rfpshredder-v2.html', active: true },
        { icon: '🎭', label: 'Black Hat', path: 'missionpulse-blackhat-v2.html' },
        { icon: '💰', label: 'Pricing', path: 'missionpulse-pricing-v2.html' },
        { icon: '🤖', label: 'HITL Queue', path: 'missionpulse-hitl-v2.html' },
        { icon: '🤖', label: 'Agent Hub', path: 'missionpulse-agenthub-v2.html' }
      ];

      return (
        <div className="w-64 bg-slate-900/50 border-r border-slate-700 min-h-screen p-4 hidden lg:block">
          <div className="flex items-center gap-3 mb-8">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center pulse-icon">
              <span className="text-xl">🛡️</span>
            </div>
            <div>
              <div className="font-bold text-cyan-400">MissionPulse</div>
              <div className="text-xs text-slate-400">RFP Shredder</div>
            </div>
          </div>
          
          <nav className="space-y-1">
            {navItems.map((item, i) => (
              <a 
                key={i}
                href={item.path}
                className={`flex items-center gap-3 px-3 py-2 rounded-lg transition-all ${
                  item.active 
                    ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' 
                    : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                }`}
              >
                <span>{item.icon}</span>
                <span className="text-sm">{item.label}</span>
              </a>
            ))}
          </nav>
        </div>
      );
    }

    // File Upload Zone
    function UploadZone({ onUpload, processing }) {
      const [dragActive, setDragActive] = React.useState(false);
      const inputRef = React.useRef(null);

      const handleDrop = (e) => {
        e.preventDefault();
        setDragActive(false);
        const files = e.dataTransfer?.files;
        if (files?.length) onUpload(files[0]);
      };

      const handleChange = (e) => {
        const files = e.target.files;
        if (files?.length) onUpload(files[0]);
      };

      return (
        <div
          onDragOver={(e) => { e.preventDefault(); setDragActive(true); }}
          onDragLeave={() => setDragActive(false)}
          onDrop={handleDrop}
          onClick={() => inputRef.current?.click()}
          className={`border-2 border-dashed rounded-xl p-12 text-center cursor-pointer transition-all ${
            dragActive 
              ? 'border-cyan-500 bg-cyan-500/10' 
              : 'border-slate-600 hover:border-slate-500 hover:bg-slate-800/30'
          } ${processing ? 'pointer-events-none opacity-50' : ''}`}
        >
          <input
            ref={inputRef}
            type="file"
            accept=".pdf,.doc,.docx,.txt"
            onChange={handleChange}
            className="hidden"
          />
          {processing ? (
            <>
              <div className="w-16 h-16 mx-auto mb-4 rounded-full border-4 border-cyan-500 border-t-transparent animate-spin" />
              <div className="text-lg font-medium mb-2">Analyzing RFP...</div>
              <div className="text-sm text-slate-400">AI is extracting requirements and evaluating compliance</div>
            </>
          ) : (
            <>
              <div className="text-5xl mb-4">📄</div>
              <div className="text-lg font-medium mb-2">Drop your RFP here</div>
              <div className="text-sm text-slate-400 mb-4">or click to browse</div>
              <div className="text-xs text-slate-500">Supports PDF, DOC, DOCX, TXT</div>
            </>
          )}
        </div>
      );
    }

    // Requirement Row
    function RequirementRow({ req }) {
      const statusColors = {
        Compliant: 'bg-emerald-500/20 text-emerald-400',
        Review: 'bg-amber-500/20 text-amber-400',
        Pending: 'bg-slate-500/20 text-slate-400',
        'Non-Compliant': 'bg-red-500/20 text-red-400'
      };
      const typeColors = {
        Mandatory: 'text-red-400',
        Evaluation: 'text-cyan-400',
        SOW: 'text-purple-400',
        Clause: 'text-slate-400'
      };

      return (
        <div className="flex items-start gap-4 p-4 hover:bg-slate-800/30 rounded-lg transition-colors">
          <div className="w-16 text-center">
            <div className="font-mono text-sm text-slate-400">{req.section}</div>
            <div className={`text-xs ${typeColors[req.type]}`}>{req.type}</div>
          </div>
          <div className="flex-1">
            <p className="text-sm">{req.text}</p>
          </div>
          <div>
            <span className={`px-2 py-1 rounded text-xs ${statusColors[req.status]}`}>
              {req.status}
            </span>
          </div>
        </div>
      );
    }

    // Risk Card
    function RiskCard({ risk }) {
      const colors = {
        High: 'border-red-500/30 bg-red-500/10',
        Medium: 'border-amber-500/30 bg-amber-500/10',
        Low: 'border-emerald-500/30 bg-emerald-500/10'
      };
      const icons = { High: '🔴', Medium: '🟡', Low: '🟢' };

      return (
        <div className={`border rounded-xl p-4 ${colors[risk.level]}`}>
          <div className="flex items-center gap-2 mb-2">
            <span>{icons[risk.level]}</span>
            <span className="font-medium">{risk.title}</span>
          </div>
          <p className="text-sm text-slate-400">{risk.description}</p>
        </div>
      );
    }

    function App() {
      const [file, setFile] = React.useState(null);
      const [processing, setProcessing] = React.useState(false);
      const [analysis, setAnalysis] = React.useState(null);
      const [activeTab, setActiveTab] = React.useState('summary');
      const [connected, setConnected] = React.useState(false);

      const handleUpload = async (uploadedFile) => {
        setFile(uploadedFile);
        setProcessing(true);
        setAnalysis(null);

        // Try API first
        try {
          const formData = new FormData();
          formData.append('file', uploadedFile);

          const response = await fetch(`${API_URL}/api/rfp/analyze`, {
            method: 'POST',
            body: formData
          });

          if (response.ok) {
            const data = await response.json();
            setAnalysis(data);
            setConnected(true);
            setProcessing(false);
            return;
          }
        } catch (e) {
          console.log('API unavailable, using demo');
        }

        // Fall back to demo after delay
        setTimeout(() => {
          setAnalysis(DEMO_ANALYSIS);
          setProcessing(false);
        }, 3000);
      };

      const resetAnalysis = () => {
        setFile(null);
        setAnalysis(null);
        setActiveTab('summary');
      };

      return (
        <div className="flex min-h-screen">
          <Sidebar />
          
          <div className="flex-1 p-4 lg:p-6">
            {/* Header */}
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
              <div>
                <h1 className="text-2xl font-bold">RFP Shredder</h1>
                <p className="text-slate-400 text-sm">AI-powered RFP analysis and requirement extraction</p>
              </div>
              
              <div className="flex items-center gap-3">
                <div className={`px-3 py-1.5 rounded-lg text-sm ${
                  connected 
                    ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' 
                    : 'bg-amber-500/20 text-amber-400 border border-amber-500/30'
                }`}>
                  {connected ? '● AI Connected' : '○ Demo Mode'}
                </div>
                {analysis && (
                  <button
                    onClick={resetAnalysis}
                    className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm"
                  >
                    New Analysis
                  </button>
                )}
              </div>
            </div>

            {/* Main Content */}
            {!analysis ? (
              <div className="max-w-2xl mx-auto mt-12">
                <UploadZone onUpload={handleUpload} processing={processing} />
                
                {/* Features */}
                <div className="grid sm:grid-cols-3 gap-4 mt-8">
                  <div className="bg-slate-800/30 border border-slate-700 rounded-xl p-4 text-center">
                    <div className="text-2xl mb-2">📋</div>
                    <div className="font-medium text-sm">Extract Requirements</div>
                    <div className="text-xs text-slate-400">Sections L, M, C, H</div>
                  </div>
                  <div className="bg-slate-800/30 border border-slate-700 rounded-xl p-4 text-center">
                    <div className="text-2xl mb-2">⚠️</div>
                    <div className="font-medium text-sm">Risk Analysis</div>
                    <div className="text-xs text-slate-400">Identify red flags</div>
                  </div>
                  <div className="bg-slate-800/30 border border-slate-700 rounded-xl p-4 text-center">
                    <div className="text-2xl mb-2">✅</div>
                    <div className="font-medium text-sm">Compliance Check</div>
                    <div className="text-xs text-slate-400">Go/No-Go factors</div>
                  </div>
                </div>
              </div>
            ) : (
              <>
                {/* File Info */}
                <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4 mb-6 flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 bg-slate-700 rounded-lg flex items-center justify-center">📄</div>
                    <div>
                      <div className="font-medium">{file?.name || 'RFP Document'}</div>
                      <div className="text-sm text-slate-400">{analysis.summary.title}</div>
                    </div>
                  </div>
                  <div className="flex items-center gap-2">
                    <span className="px-3 py-1 bg-emerald-500/20 text-emerald-400 rounded-lg text-sm">
                      ✓ Analyzed
                    </span>
                  </div>
                </div>

                {/* Tabs */}
                <div className="flex gap-1 mb-6 border-b border-slate-700 overflow-x-auto">
                  {['summary', 'requirements', 'risks', 'recommendations'].map(tab => (
                    <button
                      key={tab}
                      onClick={() => setActiveTab(tab)}
                      className={`px-4 py-2 text-sm font-medium whitespace-nowrap transition-colors ${
                        activeTab === tab 
                          ? 'text-cyan-400 border-b-2 border-cyan-400' 
                          : 'text-slate-400 hover:text-white'
                      }`}
                    >
                      {tab.charAt(0).toUpperCase() + tab.slice(1)}
                    </button>
                  ))}
                </div>

                {/* Tab Content */}
                {activeTab === 'summary' && (
                  <div className="grid lg:grid-cols-2 gap-6">
                    <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
                      <h3 className="font-semibold mb-4">Opportunity Summary</h3>
                      <div className="space-y-3 text-sm">
                        {Object.entries(analysis.summary).map(([key, value]) => (
                          <div key={key} className="flex justify-between">
                            <span className="text-slate-400 capitalize">{key.replace('_', ' ')}</span>
                            <span className="font-medium">{value}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                    <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
                      <h3 className="font-semibold mb-4">Evaluation Factors</h3>
                      <div className="space-y-4">
                        {analysis.evaluation_factors.map((ef, i) => (
                          <div key={i}>
                            <div className="flex justify-between mb-1">
                              <span className="font-medium">{ef.factor}</span>
                              <span className="text-cyan-400">{ef.weight}</span>
                            </div>
                            <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
                              <div 
                                className="h-full bg-cyan-500 rounded-full"
                                style={{ width: ef.weight }}
                              />
                            </div>
                            <div className="text-xs text-slate-500 mt-1">{ef.notes}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'requirements' && (
                  <div className="bg-slate-800/50 border border-slate-700 rounded-xl">
                    <div className="p-4 border-b border-slate-700 flex items-center justify-between">
                      <h3 className="font-semibold">{analysis.requirements.length} Requirements Extracted</h3>
                      <div className="flex gap-2 text-xs">
                        <span className="px-2 py-1 bg-emerald-500/20 text-emerald-400 rounded">
                          {analysis.requirements.filter(r => r.status === 'Compliant').length} Compliant
                        </span>
                        <span className="px-2 py-1 bg-amber-500/20 text-amber-400 rounded">
                          {analysis.requirements.filter(r => r.status === 'Review').length} Review
                        </span>
                      </div>
                    </div>
                    <div className="divide-y divide-slate-700/50">
                      {analysis.requirements.map(req => (
                        <RequirementRow key={req.id} req={req} />
                      ))}
                    </div>
                  </div>
                )}

                {activeTab === 'risks' && (
                  <div className="space-y-4">
                    {analysis.risks.map((risk, i) => (
                      <RiskCard key={i} risk={risk} />
                    ))}
                  </div>
                )}

                {activeTab === 'recommendations' && (
                  <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
                    <h3 className="font-semibold mb-4">AI Recommendations</h3>
                    <div className="space-y-3">
                      {analysis.recommendations.map((rec, i) => (
                        <div key={i} className="flex items-start gap-3 p-3 bg-slate-800/50 rounded-lg">
                          <span className="text-cyan-400">💡</span>
                          <span className="text-sm">{rec}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Actions */}
                <div className="mt-6 flex flex-wrap gap-3">
                  <button className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg text-sm font-medium">
                    Create Opportunity
                  </button>
                  <button className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
                    Export to Compliance Matrix
                  </button>
                  <button className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
                    Send to HITL Queue
                  </button>
                </div>
              </>
            )}

            {/* Footer */}
            <div className="mt-8 text-center text-xs text-slate-500">
              <div>Mission Meets Tech | MissionPulse RFP Shredder</div>
              <div className="mt-1">AI GENERATED - REQUIRES HUMAN REVIEW</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
