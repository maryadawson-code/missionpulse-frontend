<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-cyan: #00E5FA;
      --primary-cyan-rgb: 0, 229, 250;
      --deep-navy: #00050F;
      --navy-800: #0A1628;
      --navy-700: #111C2E;
      --success-teal: #00BDAE;
      --warning-amber: #F59E0B;
      --risk-coral: #EF4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
      background: var(--deep-navy); 
      min-height: 100vh;
      color: #fff;
    }
    
    /* Animations */
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(0, 229, 250, 0.3); } 50% { box-shadow: 0 0 40px rgba(0, 229, 250, 0.5); } }
    @keyframes borderGlow { 
      0%, 100% { border-color: rgba(0, 229, 250, 0.3); }
      50% { border-color: rgba(0, 229, 250, 0.6); }
    }
    @keyframes countUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-ping { animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite; }
    .animate-spin { animation: spin 1s linear infinite; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
    .animate-glow { animation: glow 2s ease-in-out infinite; }
    .animate-border-glow { animation: borderGlow 2s ease-in-out infinite; }
    
    /* Glass Effects */
    .glass { 
      background: rgba(10, 22, 40, 0.8); 
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .glass-nav {
      background: rgba(0, 5, 15, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0, 229, 250, 0.1);
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--navy-800); }
    ::-webkit-scrollbar-thumb { background: rgba(0, 229, 250, 0.3); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0, 229, 250, 0.5); }
    
    /* Custom Focus States */
    button:focus-visible, a:focus-visible {
      outline: 2px solid var(--primary-cyan);
      outline-offset: 2px;
    }
    
    /* Tooltip */
    .tooltip { position: relative; }
    .tooltip::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 12px;
      background: var(--navy-700);
      border: 1px solid rgba(0, 229, 250, 0.2);
      border-radius: 6px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .tooltip:hover::after {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }
  </style>
</head>

    const Icon = ({ name, className = "w-5 h-5" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-flex items-center justify-center ${className}`}><IconComponent /></span> : null;
    };

    // ============================================
    // CONTEXT: RBAC & AUTH
    // ============================================
    const AuthContext = createContext(null);

    const useAuth = () => {
      const context = useContext(AuthContext);
      if (!context) throw new Error('useAuth must be used within AuthProvider');
      return context;
    };

    const AuthProvider = ({ children }) => {
      const [currentRole, setCurrentRole] = useState('executive');
      const [user, setUser] = useState({ name: 'Mary Womack', email: 'mary@missionpulse.io' });

      const hasAccess = useCallback((allowedRoles) => {
        if (allowedRoles.includes('all')) return true;
        if (allowedRoles.includes('admin') && ROLES[currentRole]?.canAccessAdmin) return true;
        if (allowedRoles.includes('internal') && !['teaming_partner', 'subcontractor'].includes(currentRole)) return true;
        return allowedRoles.includes(currentRole);
      }, [currentRole]);

      const value = { currentRole, setCurrentRole, user, hasAccess, roleInfo: ROLES[currentRole] };
      return <AuthContext.Provider value={value}>{children}</AuthContext.Provider>;
    };

    // ============================================
    // REUSABLE UI COMPONENTS
    // ============================================
    const Badge = ({ children, variant = 'default', size = 'sm', icon, pulse = false }) => {

        danger: 'bg-red-500/20 text-red-400 border-red-500/30',
        purple: 'bg-purple-500/20 text-purple-400 border-purple-500/30',
      };
      const sizes = { xs: 'px-1.5 py-0.5 text-xs', sm: 'px-2 py-1 text-xs', md: 'px-3 py-1.5 text-sm' };
      return (
        <span className={`inline-flex items-center gap-1.5 rounded-full font-medium border ${variants[variant]} ${sizes[size]} ${pulse ? 'animate-pulse' : ''}`}>

        success: 'bg-emerald-500/20 text-emerald-400 hover:bg-emerald-500/30 border border-emerald-500/30',

      const sizes = { xs: 'px-2 py-1 text-xs', sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2 text-sm', lg: 'px-6 py-3 text-base' };
      return (
        <button
          className={`inline-flex items-center justify-center gap-2 font-semibold rounded-xl transition-all duration-200
