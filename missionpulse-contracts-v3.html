<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Contract Scanner</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --mmt-cyan: #00E5FA; --mmt-navy: #00050F; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--mmt-navy); color: #e2e8f0; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

const CONFIG = {
  SUPABASE_URL: 'https://qdrtpnpnhkxvfmvfziop.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8',
  LOGIN_PAGE: 'login.html'
};

const DEMO_CLAUSES = [
  { id: 1, far: 'FAR 52.204-21', title: 'Basic Safeguarding of CUI', risk: 'medium', status: 'review', category: 'Security' },
  { id: 2, far: 'FAR 52.212-4', title: 'Contract Terms and Conditions', risk: 'low', status: 'compliant', category: 'Commercial' },
  { id: 3, far: 'FAR 52.222-50', title: 'Combating Trafficking in Persons', risk: 'low', status: 'compliant', category: 'Labor' },
  { id: 4, far: 'DFARS 252.204-7012', title: 'Safeguarding Covered Defense Info', risk: 'high', status: 'action', category: 'Cyber' },
  { id: 5, far: 'FAR 52.219-14', title: 'Limitations on Subcontracting', risk: 'high', status: 'action', category: 'Small Business' },
  { id: 6, far: 'FAR 52.232-40', title: 'Electronic Invoice Submission', risk: 'low', status: 'compliant', category: 'Payment' }
];

function checkAuth() {
  const session = localStorage.getItem('MP_SESSION');
  if (!session) { window.location.href = CONFIG.LOGIN_PAGE; return null; }
  try { return JSON.parse(localStorage.getItem('MP_USER')); }
  catch { return { email: 'demo@mmt.com', role: 'CON', name: 'Demo User' }; }
}

function ClauseCard({ clause }) {
  const riskColors = { high: 'border-red-500 bg-red-500/10', medium: 'border-amber-500 bg-amber-500/10', low: 'border-green-500 bg-green-500/10' };
  const statusColors = { compliant: 'bg-green-500/20 text-green-400', review: 'bg-amber-500/20 text-amber-400', action: 'bg-red-500/20 text-red-400' };
  
  return (
    <div className={`glass rounded-xl p-4 border-l-4 ${riskColors[clause.risk]}`}>
      <div className="flex justify-between items-start mb-2">
        <span className="font-mono text-cyan-400 font-medium">{clause.far}</span>
        <span className={`px-2 py-1 rounded text-xs ${statusColors[clause.status]}`}>
          {clause.status === 'action' ? '⚠️ Action Needed' : clause.status}
        </span>
      </div>
      <h3 className="font-medium text-white mb-2">{clause.title}</h3>
      <div className="flex justify-between items-center">
        <span className="text-xs px-2 py-1 bg-slate-700 rounded">{clause.category}</span>
        <span className={`text-xs ${clause.risk === 'high' ? 'text-red-400' : clause.risk === 'medium' ? 'text-amber-400' : 'text-green-400'}`}>
          {clause.risk} risk
        </span>
      </div>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [clauses, setClauses] = useState(DEMO_CLAUSES);
  const [filter, setFilter] = useState('all');

  useEffect(() => {
    const authUser = checkAuth();
    if (authUser) setUser(authUser);
  }, []);

  const filtered = filter === 'all' ? clauses : clauses.filter(c => c.status === filter);
  const stats = {
    total: clauses.length,
    compliant: clauses.filter(c => c.status === 'compliant').length,
    review: clauses.filter(c => c.status === 'review').length,
    action: clauses.filter(c => c.status === 'action').length
  };

  if (!user) return <div className="min-h-screen flex items-center justify-center text-cyan-400">Loading...</div>;

  return (
    <div className="min-h-screen bg-slate-950">
      <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            </a>
            <div>
              <h1 className="text-xl font-bold text-white">⚖️ Contract Scanner</h1>
              <p className="text-sm text-slate-400">FAR/DFARS Clause Analysis & Risk Assessment</p>
            </div>
          </div>
          <span className="text-sm text-slate-400">{user.name} ({user.role})</span>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-6 space-y-6">
        {/* Stats */}
        <div className="grid grid-cols-4 gap-4">
          <div className="glass rounded-xl p-4 text-center"><p className="text-3xl font-bold text-white">{stats.total}</p><p className="text-sm text-slate-400">Total Clauses</p></div>
          <div className="glass rounded-xl p-4 text-center cursor-pointer hover:border-green-500/50" onClick={() => setFilter('compliant')}><p className="text-3xl font-bold text-green-400">{stats.compliant}</p><p className="text-sm text-slate-400">Compliant</p></div>
          <div className="glass rounded-xl p-4 text-center cursor-pointer hover:border-amber-500/50" onClick={() => setFilter('review')}><p className="text-3xl font-bold text-amber-400">{stats.review}</p><p className="text-sm text-slate-400">Under Review</p></div>
          <div className="glass rounded-xl p-4 text-center cursor-pointer hover:border-red-500/50" onClick={() => setFilter('action')}><p className="text-3xl font-bold text-red-400">{stats.action}</p><p className="text-sm text-slate-400">Action Required</p></div>
        </div>

        {/* Filter */}
        <div className="flex gap-2">
          {['all', 'compliant', 'review', 'action'].map(f => (
            <button key={f} onClick={() => setFilter(f)} className={`px-3 py-1.5 rounded-lg text-sm ${filter === f ? 'bg-cyan-600 text-white' : 'bg-slate-800 text-slate-400 hover:text-white'}`}>
              {f === 'all' ? 'All Clauses' : f.charAt(0).toUpperCase() + f.slice(1)}
            </button>
          ))}
        </div>

        {/* Clause Cards */}
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          {filtered.map(c => <ClauseCard key={c.id} clause={c} />)}
        </div>
      </main>

      <footer className="border-t border-slate-800 mt-12">
        <div className="max-w-7xl mx-auto px-4 py-4 text-center text-xs text-slate-500">
          Mission Meets Tech © 2026 | MissionPulse v3.0 | Contract Scanner Module
        </div>
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
