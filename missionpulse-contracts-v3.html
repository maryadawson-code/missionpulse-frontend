<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Contracts Scanner | CUI//SP-FEDCON</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
    @keyframes cui-pulse { 0%, 100% { box-shadow: 0 0 15px rgba(234, 179, 8, 0.2); } 50% { box-shadow: 0 0 25px rgba(234, 179, 8, 0.4); } }
    .cui-glow { animation: cui-pulse 3s infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    // ============================================
    // CONFIGURATION
    // ============================================
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const API_URL = 'https://missionpulse-api.onrender.com';
    const CUI_MARKING = 'CUI//SP-FEDCON';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // ============================================
    // DEMO DATA - FAR/DFARS CLAUSES
    // ============================================
    const DEMO_CLAUSES = [
      { 
        id: 1, 
        clause_number: 'FAR 52.204-21', 
        title: 'Basic Safeguarding of Covered Contractor Information Systems',
        category: 'Cybersecurity',
        risk_level: 'high',
        plain_language: 'You must protect federal data on your systems using 15 basic security controls from NIST 800-171.',
        key_requirements: ['Access control', 'Media protection', 'Physical protection', 'System integrity'],
        compliance_status: 'compliant',
        notes: 'Our CMMC L2 certification covers all requirements'
      },
      { 
        id: 2, 
        clause_number: 'DFARS 252.204-7012', 
        title: 'Safeguarding Covered Defense Information',
        category: 'Cybersecurity',
        risk_level: 'critical',
        plain_language: 'You must implement all 110 NIST 800-171 controls and report cyber incidents to DoD within 72 hours.',
        key_requirements: ['NIST 800-171 compliance', '72-hour incident reporting', 'Cloud requirements', 'Subcontractor flowdown'],
        compliance_status: 'compliant',
        notes: 'Incident response plan documented and tested'
      },
      { 
        id: 3, 
        clause_number: 'FAR 52.219-14', 
        title: 'Limitations on Subcontracting',
        category: 'Small Business',
        risk_level: 'high',
        plain_language: 'As a small business, you must perform at least 50% of the work yourself (services) or 15% (supplies).',
        key_requirements: ['50% labor cost rule', 'Compliance monitoring', 'Documentation'],
        compliance_status: 'partial',
        notes: 'Current projection: 52% - need to monitor closely'
      },
      { 
        id: 4, 
        clause_number: 'FAR 52.222-50', 
        title: 'Combating Trafficking in Persons',
        category: 'Labor',
        risk_level: 'medium',
        plain_language: 'You and your subcontractors cannot engage in human trafficking or use forced labor.',
        key_requirements: ['Policy statement', 'Employee awareness', 'Compliance plan if >$550K'],
        compliance_status: 'compliant',
        notes: 'Corporate policy in place'
      },
      { 
        id: 5, 
        clause_number: 'DFARS 252.225-7001', 
        title: 'Buy American and Balance of Payments',
        category: 'Trade',
        risk_level: 'medium',
        plain_language: 'Products must be manufactured in the US or qualifying countries. Waivers available for certain items.',
        key_requirements: ['Country of origin tracking', 'Qualifying country list', 'Waiver process'],
        compliance_status: 'compliant',
        notes: 'All proposed products qualify'
      },
      { 
        id: 6, 
        clause_number: 'FAR 52.227-14', 
        title: 'Rights in Data - General',
        category: 'IP Rights',
        risk_level: 'high',
        plain_language: 'The government gets unlimited rights to data you create under the contract. Protect your pre-existing IP with proper assertions.',
        key_requirements: ['Data rights assertions', 'Limited rights marking', 'Pre-existing IP protection'],
        compliance_status: 'pending',
        notes: 'Need to review assertion schedule before proposal'
      },
      { 
        id: 7, 
        clause_number: 'FAR 52.232-39', 
        title: 'Unenforceability of Unauthorized Obligations',
        category: 'Payment',
        risk_level: 'low',
        plain_language: 'Click-wrap and shrink-wrap licenses do not bind the government to terms beyond the contract.',
        key_requirements: ['License review', 'Government-only terms'],
        compliance_status: 'compliant',
        notes: 'Standard clause, no special action needed'
      },
      { 
        id: 8, 
        clause_number: 'DFARS 252.239-7010', 
        title: 'Cloud Computing Services',
        category: 'Cybersecurity',
        risk_level: 'critical',
        plain_language: 'Cloud services must meet FedRAMP Moderate (or DoD equivalents). Data must stay in US and you must allow government access.',
        key_requirements: ['FedRAMP authorization', 'Data residency', 'Government access', 'Incident reporting'],
        compliance_status: 'compliant',
        notes: 'Using Azure Government (FedRAMP High)'
      }
    ];

    const CATEGORIES = ['All', 'Cybersecurity', 'Small Business', 'Labor', 'Trade', 'IP Rights', 'Payment'];

    // ============================================
    // UTILITY FUNCTIONS
    // ============================================
    const getRiskColor = (level) => ({
      critical: { bg: 'bg-red-500/20', text: 'text-red-400', border: 'border-red-500/50' },
      high: { bg: 'bg-amber-500/20', text: 'text-amber-400', border: 'border-amber-500/50' },
      medium: { bg: 'bg-yellow-500/20', text: 'text-yellow-400', border: 'border-yellow-500/50' },
      low: { bg: 'bg-emerald-500/20', text: 'text-emerald-400', border: 'border-emerald-500/50' }
    }[level] || { bg: 'bg-slate-500/20', text: 'text-slate-400', border: 'border-slate-500/50' });

    const getComplianceColor = (status) => ({
      compliant: { bg: 'bg-emerald-500/20', text: 'text-emerald-400', icon: '✅' },
      partial: { bg: 'bg-amber-500/20', text: 'text-amber-400', icon: '⚠️' },
      'non-compliant': { bg: 'bg-red-500/20', text: 'text-red-400', icon: '❌' },
      pending: { bg: 'bg-blue-500/20', text: 'text-blue-400', icon: '⏳' }
    }[status] || { bg: 'bg-slate-500/20', text: 'text-slate-400', icon: '❓' });

    // ============================================
    // COMPONENTS
    // ============================================

    // CUI Banner
    const CUIBanner = () => (
      <div className="bg-amber-500/20 border border-amber-500/50 rounded-lg px-4 py-2 flex items-center gap-3 cui-glow">
        <span className="text-amber-400">🔒</span>
        <span className="font-mono text-amber-400 font-bold">{CUI_MARKING}</span>
        <span className="text-amber-300/70 text-sm">Federal Contract Information</span>
      </div>
    );

    // Stats Summary
    const StatsSummary = ({ clauses }) => {
      const total = clauses.length;
      const compliant = clauses.filter(c => c.compliance_status === 'compliant').length;
      const critical = clauses.filter(c => c.risk_level === 'critical').length;
      const pending = clauses.filter(c => c.compliance_status === 'pending').length;

      return (
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          {[
            { label: 'Total Clauses', value: total, color: 'cyan', icon: '📜' },
            { label: 'Compliant', value: compliant, color: 'emerald', icon: '✅' },
            { label: 'Critical Risk', value: critical, color: 'red', icon: '🔴' },
            { label: 'Pending Review', value: pending, color: 'blue', icon: '⏳' }
          ].map(({ label, value, color, icon }) => (
            <div key={label} className="glass rounded-lg p-4 border border-slate-700/50">
              <div className="flex items-center gap-2 mb-1">
                <span>{icon}</span>
                <p className="text-xs text-slate-400">{label}</p>
              </div>
              <p className={`text-2xl font-bold text-${color}-400`}>{value}</p>
            </div>
          ))}
        </div>
      );
    };

    // Clause Card
    const ClauseCard = ({ clause, expanded, onToggle }) => {
      const risk = getRiskColor(clause.risk_level);
      const compliance = getComplianceColor(clause.compliance_status);

      return (
        <div className={`glass rounded-xl border ${risk.border} overflow-hidden`}>
          <div 
            className="p-4 cursor-pointer hover:bg-slate-800/30 transition-colors"
            onClick={onToggle}
          >
            <div className="flex items-start justify-between gap-4">
              <div className="flex-1">
                <div className="flex items-center gap-2 mb-1">
                  <span className="font-mono text-cyan-400 font-semibold">{clause.clause_number}</span>
                  <span className={`px-2 py-0.5 rounded text-xs ${risk.bg} ${risk.text}`}>
                    {clause.risk_level.toUpperCase()}
                  </span>
                  <span className={`px-2 py-0.5 rounded text-xs ${compliance.bg} ${compliance.text}`}>
                    {compliance.icon} {clause.compliance_status}
                  </span>
                </div>
                <h3 className="font-medium text-white">{clause.title}</h3>
                <span className="text-xs text-slate-500">{clause.category}</span>
              </div>
              <span className="text-slate-500">{expanded ? '▼' : '▶'}</span>
            </div>
          </div>

          {expanded && (
            <div className="border-t border-slate-700 p-4 bg-slate-900/30 space-y-4">
              <div>
                <h4 className="text-sm font-medium text-slate-400 mb-2">📝 Plain Language Summary</h4>
                <p className="text-white bg-slate-800 rounded-lg p-3">{clause.plain_language}</p>
              </div>

              <div>
                <h4 className="text-sm font-medium text-slate-400 mb-2">📋 Key Requirements</h4>
                <div className="flex flex-wrap gap-2">
                  {clause.key_requirements.map((req, i) => (
                    <span key={i} className="px-3 py-1 bg-slate-800 rounded-full text-sm text-slate-300">
                      {req}
                    </span>
                  ))}
                </div>
              </div>

              {clause.notes && (
                <div className="bg-cyan-500/10 border border-cyan-500/30 rounded-lg p-3">
                  <h4 className="text-sm font-medium text-cyan-400 mb-1">💡 Notes</h4>
                  <p className="text-sm text-slate-300">{clause.notes}</p>
                </div>
              )}
            </div>
          )}
        </div>
      );
    };

    // Category Filter
    const CategoryFilter = ({ active, onChange }) => (
      <div className="flex gap-2 flex-wrap">
        {CATEGORIES.map(cat => (
          <button
            key={cat}
            onClick={() => onChange(cat)}
            className={`px-4 py-2 rounded-lg text-sm transition-colors ${
              active === cat
                ? 'bg-cyan-600 text-white'
                : 'bg-slate-800 text-slate-400 hover:bg-slate-700'
            }`}
          >
            {cat}
          </button>
        ))}
      </div>
    );

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [clauses, setClauses] = React.useState(DEMO_CLAUSES);
      const [category, setCategory] = React.useState('All');
      const [expandedId, setExpandedId] = React.useState(null);
      const [search, setSearch] = React.useState('');
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);

      React.useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        try {
          const { data } = await supabase.from('contract_clauses').select('*').order('clause_number');
          if (data?.length > 0) {
            setClauses(data);
            setConnected(true);
          }
        } catch (e) {
          console.log('Using demo data');
        } finally {
          setLoading(false);
        }
      };

      const filteredClauses = clauses.filter(c => {
        if (category !== 'All' && c.category !== category) return false;
        if (search && !c.clause_number.toLowerCase().includes(search.toLowerCase()) && 
            !c.title.toLowerCase().includes(search.toLowerCase())) return false;
        return true;
      });

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-slate-400">Loading Contract Scanner...</p>
              <p className="text-xs text-amber-400 mt-2 font-mono">{CUI_MARKING}</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          <header className="glass border-b border-slate-700/50 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-700/50 rounded-lg">← Back</a>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center">⚖️</div>
                  <div>
                    <h1 className="text-xl font-bold text-white">Contracts Scanner</h1>
                    <p className="text-xs text-slate-400">FAR/DFARS Clause Analysis</p>
                  </div>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <CUIBanner />
                <div className={`px-3 py-1 rounded-full text-xs ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                  {connected ? '● Connected' : '○ Demo'}
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8 space-y-6">
            <StatsSummary clauses={clauses} />

            <div className="flex flex-col md:flex-row gap-4">
              <CategoryFilter active={category} onChange={setCategory} />
              <input
                type="text"
                value={search}
                onChange={(e) => setSearch(e.target.value)}
                placeholder="Search clauses..."
                className="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500"
              />
            </div>

            <div className="space-y-4">
              {filteredClauses.map(clause => (
                <ClauseCard
                  key={clause.id}
                  clause={clause}
                  expanded={expandedId === clause.id}
                  onToggle={() => setExpandedId(expandedId === clause.id ? null : clause.id)}
                />
              ))}
              {filteredClauses.length === 0 && (
                <div className="text-center py-12 text-slate-500">No clauses match your search</div>
              )}
            </div>
          </main>

          <footer className="border-t border-slate-800 py-6">
            <div className="max-w-7xl mx-auto px-6 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <p className="text-xs text-slate-500">© 2026 Mission Meets Tech</p>
                <span className="text-xs font-mono text-amber-400">{CUI_MARKING}</span>
              </div>
              <p className="text-xs text-slate-600">AI GENERATED - REQUIRES HUMAN REVIEW</p>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
