<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Dashboard | MissionPulse</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass { background: rgba(0,229,250,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
    .glass-card { background: rgba(15,23,42,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(51,65,85,0.5); }
    @keyframes countUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-countUp { animation: countUp 0.5s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // Supabase
    const supabaseUrl = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzgzNjY0MDcsImV4cCI6MjA1Mzk0MjQwN30.lyr1BUD7vMuuWT_HjqWnhVP_JSrgVx1f7i_yc2VFE44';
    const supabase = window.supabase?.createClient(supabaseUrl, supabaseKey);

    // Demo data
    const generateDemoData = () => {
      const days = 30;
      return Array.from({ length: days }, (_, i) => {
        const date = new Date();
        date.setDate(date.getDate() - (days - 1 - i));
        return {
          date: date.toISOString().split('T')[0],
          pipeline_value: 750000000 + Math.random() * 100000000,
          active_opportunities: 10 + Math.floor(Math.random() * 5),
          proposals_in_progress: 3 + Math.floor(Math.random() * 4),
          win_count: Math.floor(Math.random() * 3),
          loss_count: Math.floor(Math.random() * 2),
          avg_pwin: 62 + Math.random() * 15,
          avg_deal_size: 45000000 + Math.random() * 30000000,
          team_utilization: 75 + Math.random() * 20,
          compliance_score: 88 + Math.random() * 10
        };
      });
    };

    // Icons
    const Icons = {
      trendUp: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>,
      trendDown: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6" /></svg>,
      chart: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
      pie: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" /></svg>,
      dollar: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      target: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><circle cx="12" cy="12" r="6" strokeWidth={2}/><circle cx="12" cy="12" r="2" strokeWidth={2}/></svg>,
      users: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
      shield: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
      trophy: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" /></svg>,
      calendar: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
      download: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>,
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    // Sparkline Chart
    const Sparkline = ({ data, color = '#00E5FA', height = 40 }) => {
      const max = Math.max(...data);
      const min = Math.min(...data);
      const range = max - min || 1;
      const width = 100;
      const points = data.map((v, i) => `${(i / (data.length - 1)) * width},${height - ((v - min) / range) * (height - 4)}`).join(' ');
      
      return (
        <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none">
          <defs>
            <linearGradient id={`grad-${color.replace('#', '')}`} x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stopColor={color} stopOpacity="0.3" />
              <stop offset="100%" stopColor={color} stopOpacity="0" />
            </linearGradient>
          </defs>
          <polygon 
            points={`0,${height} ${points} ${width},${height}`}
            fill={`url(#grad-${color.replace('#', '')})`}
          />
          <polyline 
            points={points}
            fill="none"
            stroke={color}
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          />
        </svg>
      );
    };

    // Metric Card
    const MetricCard = ({ title, value, change, trend, icon, color, sparkData }) => (
      <div className="glass-card rounded-xl p-5 animate-countUp">
        <div className="flex items-start justify-between mb-3">
          <div className={`w-10 h-10 rounded-lg bg-${color}-500/20 flex items-center justify-center`}>
            <Icon name={icon} className={`w-5 h-5 text-${color}-400`} />
          </div>
          <div className={`flex items-center gap-1 text-sm ${trend === 'up' ? 'text-emerald-400' : 'text-red-400'}`}>
            <Icon name={trend === 'up' ? 'trendUp' : 'trendDown'} className="w-4 h-4" />
            <span>{change}%</span>
          </div>
        </div>
        <div className="text-2xl font-bold text-white mb-1">{value}</div>
        <div className="text-sm text-slate-400 mb-3">{title}</div>
        {sparkData && (
          <div className="mt-2">
            <Sparkline data={sparkData} color={trend === 'up' ? '#10B981' : '#EF4444'} />
          </div>
        )}
      </div>
    );

    // Bar Chart
    const BarChart = ({ data, title }) => {
      const max = Math.max(...data.map(d => d.value));
      return (
        <div className="glass-card rounded-xl p-5">
          <h3 className="text-lg font-semibold text-white mb-4">{title}</h3>
          <div className="space-y-3">
            {data.map((item, i) => (
              <div key={i}>
                <div className="flex justify-between text-sm mb-1">
                  <span className="text-slate-400">{item.label}</span>
                  <span className="text-white font-medium">{item.value}%</span>
                </div>
                <div className="h-2 bg-slate-700/50 rounded-full overflow-hidden">
                  <div 
                    className="h-full rounded-full transition-all duration-500"
                    style={{ 
                      width: `${(item.value / max) * 100}%`,
                      background: `linear-gradient(90deg, ${item.color}, ${item.color}80)`
                    }}
                  />
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // Donut Chart
    const DonutChart = ({ data, title, centerValue, centerLabel }) => {
      const total = data.reduce((sum, d) => sum + d.value, 0);
      let cumulative = 0;
      
      return (
        <div className="glass-card rounded-xl p-5">
          <h3 className="text-lg font-semibold text-white mb-4">{title}</h3>
          <div className="flex items-center justify-center">
            <div className="relative w-40 h-40">
              <svg viewBox="0 0 100 100" className="w-full h-full -rotate-90">
                {data.map((item, i) => {
                  const start = cumulative;
                  cumulative += (item.value / total) * 100;
                  const dashArray = `${(item.value / total) * 251.2} 251.2`;
                  const dashOffset = -start * 2.512;
                  return (
                    <circle
                      key={i}
                      cx="50"
                      cy="50"
                      r="40"
                      fill="none"
                      stroke={item.color}
                      strokeWidth="12"
                      strokeDasharray={dashArray}
                      strokeDashoffset={dashOffset}
                      className="transition-all duration-500"
                    />
                  );
                })}
              </svg>
              <div className="absolute inset-0 flex flex-col items-center justify-center">
                <span className="text-2xl font-bold text-white">{centerValue}</span>
                <span className="text-xs text-slate-400">{centerLabel}</span>
              </div>
            </div>
          </div>
          <div className="flex flex-wrap justify-center gap-3 mt-4">
            {data.map((item, i) => (
              <div key={i} className="flex items-center gap-2">
                <div className="w-3 h-3 rounded-full" style={{ backgroundColor: item.color }} />
                <span className="text-sm text-slate-400">{item.label}</span>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // Main App
    function AnalyticsDashboard() {
      const [timeRange, setTimeRange] = useState('30d');
      const [data, setData] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const loadData = async () => {
          try {
            if (supabase) {
              const { data: snapshots, error } = await supabase
                .from('analytics_snapshots')
                .select('*')
                .order('snapshot_date', { ascending: true })
                .limit(30);
              if (!error && snapshots?.length > 0) {
                setData(snapshots);
                setLoading(false);
                return;
              }
            }
          } catch (e) {
            console.log('Using demo data');
          }
          setData(generateDemoData());
          setLoading(false);
        };
        loadData();
      }, []);

      const metrics = useMemo(() => {
        if (data.length < 2) return null;
        const latest = data[data.length - 1];
        const previous = data[data.length - 8] || data[0];
        
        const calcChange = (curr, prev) => ((curr - prev) / prev * 100).toFixed(1);
        
        return {
          pipeline: {
            value: `$${(latest.pipeline_value / 1000000000).toFixed(2)}B`,
            change: calcChange(latest.pipeline_value, previous.pipeline_value),
            trend: latest.pipeline_value >= previous.pipeline_value ? 'up' : 'down',
            sparkData: data.slice(-14).map(d => d.pipeline_value)
          },
          pwin: {
            value: `${latest.avg_pwin.toFixed(1)}%`,
            change: calcChange(latest.avg_pwin, previous.avg_pwin),
            trend: latest.avg_pwin >= previous.avg_pwin ? 'up' : 'down',
            sparkData: data.slice(-14).map(d => d.avg_pwin)
          },
          utilization: {
            value: `${latest.team_utilization.toFixed(0)}%`,
            change: calcChange(latest.team_utilization, previous.team_utilization),
            trend: latest.team_utilization >= previous.team_utilization ? 'up' : 'down',
            sparkData: data.slice(-14).map(d => d.team_utilization)
          },
          compliance: {
            value: `${latest.compliance_score.toFixed(0)}%`,
            change: calcChange(latest.compliance_score, previous.compliance_score),
            trend: latest.compliance_score >= previous.compliance_score ? 'up' : 'down',
            sparkData: data.slice(-14).map(d => d.compliance_score)
          }
        };
      }, [data]);

      const winRateData = [
        { label: 'Healthcare IT', value: 78, color: '#00E5FA' },
        { label: 'Cybersecurity', value: 65, color: '#8B5CF6' },
        { label: 'Data Analytics', value: 72, color: '#10B981' },
        { label: 'Cloud Migration', value: 58, color: '#F59E0B' }
      ];

      const stageData = [
        { label: 'Qualification', value: 35, color: '#00E5FA' },
        { label: 'Proposal', value: 25, color: '#8B5CF6' },
        { label: 'Negotiation', value: 20, color: '#10B981' },
        { label: 'Award', value: 20, color: '#F59E0B' }
      ];

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="p-2 rounded-lg bg-slate-800/50 hover:bg-slate-700/50 transition-colors">
                    <Icon name="home" className="w-5 h-5 text-slate-400" />
                  </a>
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center">
                      <Icon name="chart" className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white">Analytics Dashboard</h1>
                      <p className="text-sm text-slate-400">Pipeline Performance & Metrics</p>
                    </div>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <select
                    value={timeRange}
                    onChange={(e) => setTimeRange(e.target.value)}
                    className="px-4 py-2 bg-slate-800/50 border border-slate-700 rounded-xl text-white text-sm focus:outline-none focus:border-cyan-500/50"
                  >
                    <option value="7d">Last 7 Days</option>
                    <option value="30d">Last 30 Days</option>
                    <option value="90d">Last 90 Days</option>
                    <option value="ytd">Year to Date</option>
                  </select>
                  <button className="px-4 py-2 bg-slate-700 text-white rounded-xl flex items-center gap-2 hover:bg-slate-600 transition-colors">
                    <Icon name="download" className="w-4 h-4" /> Export
                  </button>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8">
            {loading ? (
              <div className="flex items-center justify-center py-20">
                <div className="w-8 h-8 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
              </div>
            ) : metrics && (
              <>
                {/* KPI Cards */}
                <div className="grid grid-cols-4 gap-4 mb-8">
                  <MetricCard
                    title="Pipeline Value"
                    value={metrics.pipeline.value}
                    change={metrics.pipeline.change}
                    trend={metrics.pipeline.trend}
                    icon="dollar"
                    color="cyan"
                    sparkData={metrics.pipeline.sparkData}
                  />
                  <MetricCard
                    title="Avg Win Probability"
                    value={metrics.pwin.value}
                    change={metrics.pwin.change}
                    trend={metrics.pwin.trend}
                    icon="target"
                    color="emerald"
                    sparkData={metrics.pwin.sparkData}
                  />
                  <MetricCard
                    title="Team Utilization"
                    value={metrics.utilization.value}
                    change={metrics.utilization.change}
                    trend={metrics.utilization.trend}
                    icon="users"
                    color="purple"
                    sparkData={metrics.utilization.sparkData}
                  />
                  <MetricCard
                    title="Compliance Score"
                    value={metrics.compliance.value}
                    change={metrics.compliance.change}
                    trend={metrics.compliance.trend}
                    icon="shield"
                    color="amber"
                    sparkData={metrics.compliance.sparkData}
                  />
                </div>

                {/* Charts Row */}
                <div className="grid grid-cols-2 gap-6 mb-8">
                  <BarChart data={winRateData} title="Win Rate by Domain" />
                  <DonutChart 
                    data={stageData} 
                    title="Pipeline by Stage" 
                    centerValue="12" 
                    centerLabel="Active Opps"
                  />
                </div>

                {/* Pipeline Trend */}
                <div className="glass-card rounded-xl p-6 mb-8">
                  <div className="flex items-center justify-between mb-6">
                    <h3 className="text-lg font-semibold text-white">Pipeline Trend</h3>
                    <div className="flex gap-4">
                      <div className="flex items-center gap-2">
                        <div className="w-3 h-3 rounded-full bg-cyan-500" />
                        <span className="text-sm text-slate-400">Pipeline Value</span>
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="w-3 h-3 rounded-full bg-emerald-500" />
                        <span className="text-sm text-slate-400">Win Probability</span>
                      </div>
                    </div>
                  </div>
                  <div className="h-48">
                    <Sparkline 
                      data={data.map(d => d.pipeline_value)} 
                      color="#00E5FA" 
                      height={180}
                    />
                  </div>
                  <div className="flex justify-between text-xs text-slate-500 mt-2">
                    {data.filter((_, i) => i % 7 === 0).map((d, i) => (
                      <span key={i}>{new Date(d.date || d.snapshot_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</span>
                    ))}
                  </div>
                </div>

                {/* Quick Stats */}
                <div className="grid grid-cols-3 gap-6">
                  <div className="glass-card rounded-xl p-5">
                    <div className="flex items-center gap-3 mb-4">
                      <div className="w-10 h-10 rounded-lg bg-emerald-500/20 flex items-center justify-center">
                        <Icon name="trophy" className="w-5 h-5 text-emerald-400" />
                      </div>
                      <div>
                        <div className="text-lg font-bold text-white">8</div>
                        <div className="text-sm text-slate-400">Wins This Quarter</div>
                      </div>
                    </div>
                    <div className="text-2xl font-bold text-emerald-400">$127.5M</div>
                    <div className="text-xs text-slate-500">Total Contract Value</div>
                  </div>
                  
                  <div className="glass-card rounded-xl p-5">
                    <div className="flex items-center gap-3 mb-4">
                      <div className="w-10 h-10 rounded-lg bg-purple-500/20 flex items-center justify-center">
                        <Icon name="calendar" className="w-5 h-5 text-purple-400" />
                      </div>
                      <div>
                        <div className="text-lg font-bold text-white">5</div>
                        <div className="text-sm text-slate-400">Proposals Due</div>
                      </div>
                    </div>
                    <div className="text-2xl font-bold text-purple-400">Next 30 Days</div>
                    <div className="text-xs text-slate-500">$340M Pipeline at Risk</div>
                  </div>
                  
                  <div className="glass-card rounded-xl p-5">
                    <div className="flex items-center gap-3 mb-4">
                      <div className="w-10 h-10 rounded-lg bg-cyan-500/20 flex items-center justify-center">
                        <Icon name="users" className="w-5 h-5 text-cyan-400" />
                      </div>
                      <div>
                        <div className="text-lg font-bold text-white">24</div>
                        <div className="text-sm text-slate-400">Active Team Members</div>
                      </div>
                    </div>
                    <div className="text-2xl font-bold text-cyan-400">4.2 Avg</div>
                    <div className="text-xs text-slate-500">Proposals Per Person</div>
                  </div>
                </div>
              </>
            )}
          </main>

          {/* Footer */}
          <footer className="glass border-t border-slate-700/50 mt-12">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-2 text-slate-400 text-sm">
                <Icon name="shield" className="w-4 h-4" />
                <span>Mission Meets Tech • MissionPulse v12</span>
              </div>
              <div className="text-xs text-slate-500">Data refreshed: {new Date().toLocaleString()}</div>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<AnalyticsDashboard />);
  </script>
</body>
</html>
