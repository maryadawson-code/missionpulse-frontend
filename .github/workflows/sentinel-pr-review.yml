name: Sentinel PR Review
on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-sonnet-4-20250514"
          timeout_minutes: 8
          allowed_tools: "Read,Grep,Glob,Bash(npm run build),Bash(npx tsc --noEmit),Bash(npm run lint)"
          direct_prompt: |
            Review this PR for:
            1. TypeScript strict compliance (no `as any`, no `@ts-ignore` without comment)
            2. Supabase RLS compliance (no service role in client code, no NEXT_PUBLIC_ secrets)
            3. RBAC compliance with roles_permissions_config.json
            4. Schema compliance with database.types.ts
            5. Security (no secrets in code, no console.log in production)
            6. Build passes (run npm run build)

            Be concise. Flag only actual issues, not style preferences.
