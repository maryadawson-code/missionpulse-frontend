name: Sentinel Post-Deploy Verification
on:
  deployment_status:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to verify'
        default: 'https://missionpulse.ai'

permissions:
  contents: read
  issues: write
  deployments: read

jobs:
  verify:
    if: github.event_name == 'workflow_dispatch' || github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Wait for deploy propagation
        run: sleep 30

      - name: Verify deployment
        env:
          SITE_URL: ${{ github.event.inputs.target_url || 'https://missionpulse.ai' }}
          SUPABASE_URL: https://djuviwarqdvlbgcfuupa.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          chmod +x scripts/sentinel-health-check.sh
          bash scripts/sentinel-health-check.sh --json

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `Sentinel: Post-deploy verification failed — ${new Date().toISOString().split('T')[0]}`,
              labels: ['sentinel-alert', 'deploy-failure'],
              body: [
                'Deploy verification failed after deployment.',
                '',
                `**Commit:** ${context.sha.slice(0, 7)}`,
                `**Ref:** ${context.ref}`,
                '',
                `Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`
              ].join('\n')
            });
