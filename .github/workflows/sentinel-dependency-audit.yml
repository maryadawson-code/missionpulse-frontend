name: Sentinel Dependency Audit
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci

      - name: Run npm audit
        id: audit
        run: |
          set +e
          AUDIT=$(npm audit --json 2>&1)
          set -e
          echo "audit<<EOF" >> $GITHUB_OUTPUT
          echo "$AUDIT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          VULNS=$(echo "$AUDIT" | jq '.metadata.vulnerabilities // {}')
          HIGH=$(echo "$VULNS" | jq '.high // 0')
          CRITICAL=$(echo "$VULNS" | jq '.critical // 0')
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT

      - name: Check for outdated packages
        id: outdated
        run: |
          set +e
          OUTDATED=$(npm outdated --json 2>&1)
          set -e
          COUNT=$(echo "$OUTDATED" | jq 'length // 0' 2>/dev/null || echo "0")
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Create issue for critical vulnerabilities
        if: steps.audit.outputs.critical > 0 || steps.audit.outputs.high > 0
        uses: actions/github-script@v7
        with:
          script: |
            const high = parseInt('${{ steps.audit.outputs.high }}') || 0;
            const critical = parseInt('${{ steps.audit.outputs.critical }}') || 0;
            const title = `Dependency Audit: ${critical} critical, ${high} high vulnerabilities`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'sentinel-alert', state: 'open'
            });
            if (!existing.data.find(i => i.title === title)) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, labels: ['sentinel-alert', 'dependencies', 'security'],
                body: [
                  `## Weekly Dependency Audit — ${new Date().toISOString().split('T')[0]}`,
                  '',
                  `**Critical:** ${critical}`,
                  `**High:** ${high}`,
                  `**Outdated packages:** ${{ steps.outdated.outputs.count }}`,
                  '',
                  'Run `npm audit` locally for full details.',
                ].join('\n')
              });
            }
