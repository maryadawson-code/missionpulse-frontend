<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Feed - MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(0, 5, 15, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 255, 0.1); }
        .cyan-glow { box-shadow: 0 0 30px rgba(0, 229, 255, 0.3); }
        .activity-line::before { content: ''; position: absolute; left: 20px; top: 40px; bottom: 0; width: 2px; background: linear-gradient(to bottom, rgba(0, 229, 255, 0.3), transparent); }
    </style>
</head>
<body class="min-h-screen bg-[#00050F] text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg1NTk4MjQsImV4cCI6MjA2NDEzNTgyNH0.kC-W7yt8aGj1U8WaoJJQCy_41iU1mR_YyOgc5Y8iWWE';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const demoActivities = [
            { id: '1', user_name: 'Mary Womack', action_type: 'status_change', entity_type: 'opportunity', entity_name: 'DHA EHR Modernization', description: 'Changed status from "Proposal" to "Submitted"', created_at: new Date(Date.now() - 1800000).toISOString(), metadata: { old_status: 'Proposal', new_status: 'Submitted' } },
            { id: '2', user_name: 'John Chen', action_type: 'upload', entity_type: 'document', entity_name: 'Technical Volume Draft v3.docx', description: 'Uploaded new document to DHA EHR Modernization', created_at: new Date(Date.now() - 3600000).toISOString(), metadata: { file_size: '2.4 MB' } },
            { id: '3', user_name: 'Sarah Martinez', action_type: 'approval', entity_type: 'pricing', entity_name: 'Cost Volume', description: 'Approved pricing for VA Claims Processing', created_at: new Date(Date.now() - 7200000).toISOString(), metadata: { total: '$4.2M' } },
            { id: '4', user_name: 'Mike Thompson', action_type: 'comment', entity_type: 'compliance', entity_name: 'Section L Checklist', description: 'Added comment: "Need to verify CMMC certification date"', created_at: new Date(Date.now() - 14400000).toISOString(), metadata: {} },
            { id: '5', user_name: 'Emily Davis', action_type: 'create', entity_type: 'opportunity', entity_name: 'CMS Data Analytics Platform', description: 'Created new opportunity worth $15M', created_at: new Date(Date.now() - 28800000).toISOString(), metadata: { ceiling: '$15M' } },
            { id: '6', user_name: 'Mary Womack', action_type: 'update', entity_type: 'team', entity_name: 'Project Manager Assignment', description: 'Assigned John Chen as PM for IHS Telehealth', created_at: new Date(Date.now() - 43200000).toISOString(), metadata: {} },
            { id: '7', user_name: 'System', action_type: 'deadline', entity_type: 'opportunity', entity_name: 'VA Claims Processing', description: 'Deadline reminder: Proposal due in 3 days', created_at: new Date(Date.now() - 57600000).toISOString(), metadata: { due_date: '2026-02-05' } },
            { id: '8', user_name: 'Sarah Martinez', action_type: 'delete', entity_type: 'document', entity_name: 'Old Draft v1.docx', description: 'Deleted outdated document', created_at: new Date(Date.now() - 72000000).toISOString(), metadata: {} },
            { id: '9', user_name: 'John Chen', action_type: 'approval', entity_type: 'compliance', entity_name: 'Iron Dome Check', description: 'Passed all compliance validations', created_at: new Date(Date.now() - 86400000).toISOString(), metadata: { score: '98%' } },
            { id: '10', user_name: 'Emily Davis', action_type: 'comment', entity_type: 'opportunity', entity_name: 'DHA EHR Modernization', description: 'Added note: "Client requested follow-up meeting"', created_at: new Date(Date.now() - 100800000).toISOString(), metadata: {} }
        ];

        const actionIcons = {
            create: { icon: '➕', color: 'text-green-400', bg: 'bg-green-500/20' },
            update: { icon: '✏️', color: 'text-blue-400', bg: 'bg-blue-500/20' },
            delete: { icon: '🗑️', color: 'text-red-400', bg: 'bg-red-500/20' },
            comment: { icon: '💬', color: 'text-purple-400', bg: 'bg-purple-500/20' },
            upload: { icon: '📤', color: 'text-cyan-400', bg: 'bg-cyan-500/20' },
            approval: { icon: '✅', color: 'text-emerald-400', bg: 'bg-emerald-500/20' },
            status_change: { icon: '🔄', color: 'text-yellow-400', bg: 'bg-yellow-500/20' },
            deadline: { icon: '⏰', color: 'text-orange-400', bg: 'bg-orange-500/20' }
        };

        function ActivityFeed() {
            const [activities, setActivities] = useState([]);
            const [loading, setLoading] = useState(true);
            const [filter, setFilter] = useState('all');
            const [entityFilter, setEntityFilter] = useState('all');
            const [searchTerm, setSearchTerm] = useState('');
            const [dateRange, setDateRange] = useState('week');

            useEffect(() => {
                loadActivities();
            }, []);

            async function loadActivities() {
                try {
                    const { data, error } = await supabase
                        .from('activity_feed')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .limit(100);
                    
                    if (error) throw error;
                    setActivities(data?.length ? data : demoActivities);
                } catch (err) {
                    console.log('Using demo data:', err.message);
                    setActivities(demoActivities);
                } finally {
                    setLoading(false);
                }
            }

            const filteredActivities = useMemo(() => {
                let result = activities;
                
                if (filter !== 'all') {
                    result = result.filter(a => a.action_type === filter);
                }
                if (entityFilter !== 'all') {
                    result = result.filter(a => a.entity_type === entityFilter);
                }
                if (searchTerm) {
                    const term = searchTerm.toLowerCase();
                    result = result.filter(a => 
                        a.description.toLowerCase().includes(term) ||
                        a.entity_name?.toLowerCase().includes(term) ||
                        a.user_name?.toLowerCase().includes(term)
                    );
                }
                if (dateRange !== 'all') {
                    const now = new Date();
                    const ranges = {
                        day: 24 * 60 * 60 * 1000,
                        week: 7 * 24 * 60 * 60 * 1000,
                        month: 30 * 24 * 60 * 60 * 1000
                    };
                    result = result.filter(a => 
                        new Date(a.created_at) > new Date(now - ranges[dateRange])
                    );
                }
                
                return result;
            }, [activities, filter, entityFilter, searchTerm, dateRange]);

            const stats = useMemo(() => ({
                total: activities.length,
                today: activities.filter(a => new Date(a.created_at) > new Date(Date.now() - 86400000)).length,
                byType: Object.entries(
                    activities.reduce((acc, a) => {
                        acc[a.action_type] = (acc[a.action_type] || 0) + 1;
                        return acc;
                    }, {})
                ).sort((a, b) => b[1] - a[1])
            }), [activities]);

            function formatTime(dateStr) {
                const date = new Date(dateStr);
                const now = new Date();
                const diff = now - date;
                
                if (diff < 60000) return 'Just now';
                if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
                if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
                if (diff < 604800000) return `${Math.floor(diff / 86400000)}d ago`;
                return date.toLocaleDateString();
            }

            function groupByDate(items) {
                const groups = {};
                items.forEach(item => {
                    const date = new Date(item.created_at);
                    const today = new Date();
                    const yesterday = new Date(today - 86400000);
                    
                    let key;
                    if (date.toDateString() === today.toDateString()) {
                        key = 'Today';
                    } else if (date.toDateString() === yesterday.toDateString()) {
                        key = 'Yesterday';
                    } else {
                        key = date.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
                    }
                    
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(item);
                });
                return groups;
            }

            const groupedActivities = groupByDate(filteredActivities);

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <div className="w-16 h-16 border-4 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="text-gray-400">Loading activity feed...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-6">
                    {/* Header */}
                    <div className="max-w-6xl mx-auto mb-8">
                        <div className="flex items-center justify-between mb-6">
                            <div>
                                <a href="index.html" className="text-cyan-400 hover:text-cyan-300 text-sm mb-2 inline-block">← Back to Command Center</a>
                                <h1 className="text-3xl font-bold">
                                    <span className="bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">Activity Feed</span>
                                </h1>
                                <p className="text-gray-400 mt-1">Real-time team activity and audit trail</p>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="glass rounded-xl px-4 py-2 text-center">
                                    <p className="text-2xl font-bold text-cyan-400">{stats.total}</p>
                                    <p className="text-xs text-gray-400">Total Activities</p>
                                </div>
                                <div className="glass rounded-xl px-4 py-2 text-center">
                                    <p className="text-2xl font-bold text-green-400">{stats.today}</p>
                                    <p className="text-xs text-gray-400">Today</p>
                                </div>
                            </div>
                        </div>

                        {/* Filters */}
                        <div className="glass rounded-xl p-4 mb-6">
                            <div className="flex flex-wrap gap-4">
                                <div className="flex-1 min-w-[200px]">
                                    <input
                                        type="text"
                                        placeholder="Search activities..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white placeholder-gray-500 focus:border-cyan-500/50 focus:outline-none"
                                    />
                                </div>
                                <select
                                    value={filter}
                                    onChange={(e) => setFilter(e.target.value)}
                                    className="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white focus:border-cyan-500/50 focus:outline-none"
                                >
                                    <option value="all">All Actions</option>
                                    <option value="create">Created</option>
                                    <option value="update">Updated</option>
                                    <option value="delete">Deleted</option>
                                    <option value="comment">Comments</option>
                                    <option value="upload">Uploads</option>
                                    <option value="approval">Approvals</option>
                                    <option value="status_change">Status Changes</option>
                                </select>
                                <select
                                    value={entityFilter}
                                    onChange={(e) => setEntityFilter(e.target.value)}
                                    className="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white focus:border-cyan-500/50 focus:outline-none"
                                >
                                    <option value="all">All Types</option>
                                    <option value="opportunity">Opportunities</option>
                                    <option value="document">Documents</option>
                                    <option value="team">Team</option>
                                    <option value="compliance">Compliance</option>
                                    <option value="pricing">Pricing</option>
                                </select>
                                <select
                                    value={dateRange}
                                    onChange={(e) => setDateRange(e.target.value)}
                                    className="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white focus:border-cyan-500/50 focus:outline-none"
                                >
                                    <option value="day">Last 24 Hours</option>
                                    <option value="week">Last 7 Days</option>
                                    <option value="month">Last 30 Days</option>
                                    <option value="all">All Time</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    {/* Activity Timeline */}
                    <div className="max-w-6xl mx-auto">
                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                            {/* Main Feed */}
                            <div className="lg:col-span-3">
                                {Object.entries(groupedActivities).map(([date, items]) => (
                                    <div key={date} className="mb-8">
                                        <h3 className="text-lg font-semibold text-gray-300 mb-4 sticky top-0 bg-[#00050F] py-2 z-10">{date}</h3>
                                        <div className="space-y-4">
                                            {items.map((activity, idx) => {
                                                const actionStyle = actionIcons[activity.action_type] || actionIcons.update;
                                                return (
                                                    <div key={activity.id} className="glass rounded-xl p-4 hover:border-cyan-500/30 transition-all relative activity-line">
                                                        <div className="flex items-start gap-4">
                                                            <div className={`w-10 h-10 rounded-full ${actionStyle.bg} flex items-center justify-center text-lg flex-shrink-0`}>
                                                                {actionStyle.icon}
                                                            </div>
                                                            <div className="flex-1 min-w-0">
                                                                <div className="flex items-center gap-2 mb-1">
                                                                    <span className="font-semibold text-white">{activity.user_name}</span>
                                                                    <span className={`text-xs px-2 py-0.5 rounded-full ${actionStyle.bg} ${actionStyle.color}`}>
                                                                        {activity.action_type.replace('_', ' ')}
                                                                    </span>
                                                                    <span className="text-xs text-gray-500">{activity.entity_type}</span>
                                                                </div>
                                                                <p className="text-gray-300">{activity.description}</p>
                                                                {activity.entity_name && (
                                                                    <p className="text-sm text-cyan-400 mt-1">📎 {activity.entity_name}</p>
                                                                )}
                                                                {activity.metadata && Object.keys(activity.metadata).length > 0 && (
                                                                    <div className="flex flex-wrap gap-2 mt-2">
                                                                        {Object.entries(activity.metadata).map(([key, value]) => (
                                                                            <span key={key} className="text-xs bg-white/5 px-2 py-1 rounded text-gray-400">
                                                                                {key}: {value}
                                                                            </span>
                                                                        ))}
                                                                    </div>
                                                                )}
                                                            </div>
                                                            <span className="text-xs text-gray-500 whitespace-nowrap">{formatTime(activity.created_at)}</span>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}

                                {filteredActivities.length === 0 && (
                                    <div className="glass rounded-xl p-12 text-center">
                                        <p className="text-4xl mb-4">📭</p>
                                        <p className="text-gray-400">No activities match your filters</p>
                                    </div>
                                )}
                            </div>

                            {/* Sidebar Stats */}
                            <div className="lg:col-span-1">
                                <div className="glass rounded-xl p-4 sticky top-6">
                                    <h3 className="font-semibold text-white mb-4">Activity Breakdown</h3>
                                    <div className="space-y-3">
                                        {stats.byType.map(([type, count]) => {
                                            const style = actionIcons[type] || actionIcons.update;
                                            const percentage = Math.round((count / stats.total) * 100);
                                            return (
                                                <div key={type}>
                                                    <div className="flex items-center justify-between text-sm mb-1">
                                                        <span className="flex items-center gap-2">
                                                            <span className={style.color}>{style.icon}</span>
                                                            <span className="text-gray-300 capitalize">{type.replace('_', ' ')}</span>
                                                        </span>
                                                        <span className="text-gray-400">{count}</span>
                                                    </div>
                                                    <div className="h-2 bg-white/5 rounded-full overflow-hidden">
                                                        <div 
                                                            className={`h-full ${style.bg.replace('/20', '/50')} rounded-full`}
                                                            style={{ width: `${percentage}%` }}
                                                        ></div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>

                                    <hr className="border-white/10 my-4" />

                                    <h4 className="font-semibold text-white mb-3">Quick Filters</h4>
                                    <div className="space-y-2">
                                        <button 
                                            onClick={() => { setFilter('all'); setEntityFilter('opportunity'); }}
                                            className="w-full text-left px-3 py-2 rounded-lg bg-white/5 hover:bg-white/10 text-sm text-gray-300 transition-colors"
                                        >
                                            🎯 Opportunity Updates
                                        </button>
                                        <button 
                                            onClick={() => { setFilter('approval'); setEntityFilter('all'); }}
                                            className="w-full text-left px-3 py-2 rounded-lg bg-white/5 hover:bg-white/10 text-sm text-gray-300 transition-colors"
                                        >
                                            ✅ Recent Approvals
                                        </button>
                                        <button 
                                            onClick={() => { setFilter('upload'); setEntityFilter('all'); }}
                                            className="w-full text-left px-3 py-2 rounded-lg bg-white/5 hover:bg-white/10 text-sm text-gray-300 transition-colors"
                                        >
                                            📤 File Uploads
                                        </button>
                                        <button 
                                            onClick={() => { setFilter('all'); setEntityFilter('all'); setSearchTerm(''); setDateRange('week'); }}
                                            className="w-full text-left px-3 py-2 rounded-lg bg-cyan-500/20 hover:bg-cyan-500/30 text-sm text-cyan-400 transition-colors"
                                        >
                                            🔄 Reset Filters
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<ActivityFeed />);
    </script>
</body>
</html>
