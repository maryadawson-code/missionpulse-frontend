<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Activity Feed</title>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; color: #fff; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-slideUp { animation: slideUp 0.5s ease-out forwards; }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #111C2E; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #243656; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #00E5FA; }
    .glass-card { background: rgba(17, 28, 46, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc4MzUyMjQsImV4cCI6MjA1MzQxMTIyNH0.pBPL9l2zL7LLd_A5I--hPBzw5YwG3ajPMtbYsqsxIgQ';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const Icons = {
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>,
      activity: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>,
      bell: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>,
      chat: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>,
      document: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>,
      user: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>,
      upload: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>,
      edit: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>,
      flag: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9"/></svg>,
      star: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>,
      alert: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>,
      send: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>,
      filter: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    const ACTIVITY_TYPES = {
      comment: { icon: 'chat', color: '#00E5FA', label: 'Comment' },
      upload: { icon: 'upload', color: '#8B5CF6', label: 'Upload' },
      status_change: { icon: 'flag', color: '#F59E0B', label: 'Status Change' },
      assignment: { icon: 'user', color: '#00D29F', label: 'Assignment' },
      approval: { icon: 'check', color: '#10B981', label: 'Approval' },
      edit: { icon: 'edit', color: '#EC4899', label: 'Edit' },
      milestone: { icon: 'star', color: '#F59E0B', label: 'Milestone' },
      alert: { icon: 'alert', color: '#EF4444', label: 'Alert' },
    };

    const DEMO_ACTIVITIES = [
      { id: 'act-1', type: 'comment', user: 'Mary Womack', avatar: 'MW', proposal: 'MHS GENESIS Support', message: 'Pink Team review scheduled for Thursday. Please have all sections ready by EOD Wednesday.', timestamp: '2025-02-02T14:30:00Z', read: false },
      { id: 'act-2', type: 'upload', user: 'Mike Chen', avatar: 'MC', proposal: 'MHS GENESIS Support', message: 'Uploaded Technical Approach v2.3 - incorporated customer feedback from industry day.', timestamp: '2025-02-02T13:15:00Z', read: false },
      { id: 'act-3', type: 'status_change', user: 'Sarah Johnson', avatar: 'SJ', proposal: 'VA Telehealth Platform', message: 'Moved from Gate 1 to Blue Team', timestamp: '2025-02-02T11:00:00Z', read: true },
      { id: 'act-4', type: 'approval', user: 'James Wilson', avatar: 'JW', proposal: 'MHS GENESIS Support', message: 'Pricing volume approved - ready for Red Team', timestamp: '2025-02-02T10:30:00Z', read: true },
      { id: 'act-5', type: 'assignment', user: 'Mary Womack', avatar: 'MW', proposal: 'CMS Data Analytics', message: 'Assigned Emily Davis to Technical Writing lead', timestamp: '2025-02-02T09:45:00Z', read: true },
      { id: 'act-6', type: 'alert', user: 'System', avatar: '⚠️', proposal: 'IHS EHR Modernization', message: 'Deadline approaching: Teaming Agreement due in 3 days', timestamp: '2025-02-02T09:00:00Z', read: false },
      { id: 'act-7', type: 'milestone', user: 'Sarah Johnson', avatar: 'SJ', proposal: 'VA Telehealth Platform', message: 'Completed Gate 1 review with 95% compliance score', timestamp: '2025-02-01T16:30:00Z', read: true },
      { id: 'act-8', type: 'comment', user: 'Tom Garcia', avatar: 'TG', proposal: 'MHS GENESIS Support', message: 'QA review complete. Found 3 minor formatting issues in Section 3. Details in the shared drive.', timestamp: '2025-02-01T15:00:00Z', read: true },
      { id: 'act-9', type: 'edit', user: 'Emily Davis', avatar: 'ED', proposal: 'CMS Data Analytics', message: 'Updated Executive Summary with new pWin statistics', timestamp: '2025-02-01T14:15:00Z', read: true },
      { id: 'act-10', type: 'upload', user: 'Lisa Brown', avatar: 'LB', proposal: 'IHS EHR Modernization', message: 'Uploaded draft Teaming Agreement for review', timestamp: '2025-02-01T11:30:00Z', read: true },
    ];

    function ActivityFeedApp() {
      const [activities, setActivities] = useState(DEMO_ACTIVITIES);
      const [loading, setLoading] = useState(false);
      const [typeFilter, setTypeFilter] = useState('all');
      const [proposalFilter, setProposalFilter] = useState('all');
      const [showUnreadOnly, setShowUnreadOnly] = useState(false);
      const [newComment, setNewComment] = useState('');
      const feedRef = useRef(null);

      const proposals = [...new Set(activities.map(a => a.proposal))];

      const filteredActivities = activities.filter(a => {
        if (typeFilter !== 'all' && a.type !== typeFilter) return false;
        if (proposalFilter !== 'all' && a.proposal !== proposalFilter) return false;
        if (showUnreadOnly && a.read) return false;
        return true;
      });

      const unreadCount = activities.filter(a => !a.read).length;

      const markAsRead = (id) => {
        setActivities(prev => prev.map(a => 
          a.id === id ? { ...a, read: true } : a
        ));
      };

      const markAllAsRead = () => {
        setActivities(prev => prev.map(a => ({ ...a, read: true })));
      };

      const formatTime = (timestamp) => {
        const date = new Date(timestamp);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);

        if (diffMins < 1) return 'Just now';
        if (diffMins < 60) return `${diffMins}m ago`;
        if (diffHours < 24) return `${diffHours}h ago`;
        if (diffDays === 1) return 'Yesterday';
        return date.toLocaleDateString();
      };

      const postComment = () => {
        if (!newComment.trim()) return;
        
        const newActivity = {
          id: `act-${Date.now()}`,
          type: 'comment',
          user: 'Mary Womack',
          avatar: 'MW',
          proposal: proposalFilter !== 'all' ? proposalFilter : 'General',
          message: newComment,
          timestamp: new Date().toISOString(),
          read: true,
        };

        setActivities(prev => [newActivity, ...prev]);
        setNewComment('');
      };

      return (
        <div className="min-h-screen bg-[#00050F]">
          <header className="glass-card border-b border-white/10 sticky top-0 z-50">
            <div className="max-w-4xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="text-gray-400 hover:text-white transition-colors">
                    <Icon name="home" className="w-5 h-5" />
                  </a>
                  <div className="w-px h-6 bg-white/20" />
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-orange-500 to-red-600 flex items-center justify-center relative">
                      <Icon name="activity" className="w-6 h-6 text-white" />
                      {unreadCount > 0 && (
                        <span className="absolute -top-1 -right-1 w-5 h-5 bg-red-500 rounded-full text-xs flex items-center justify-center text-white font-bold">
                          {unreadCount}
                        </span>
                      )}
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white">Activity Feed</h1>
                      <p className="text-xs text-gray-400">Team updates & notifications</p>
                    </div>
                  </div>
                </div>
                {unreadCount > 0 && (
                  <button
                    onClick={markAllAsRead}
                    className="px-4 py-2 bg-[#0A1628] border border-white/10 text-gray-300 rounded-lg hover:text-white transition-colors text-sm"
                  >
                    Mark all as read
                  </button>
                )}
              </div>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-6 py-8">
            {/* Filters */}
            <div className="glass-card rounded-xl p-4 mb-6">
              <div className="flex items-center gap-4 flex-wrap">
                <select
                  value={typeFilter}
                  onChange={(e) => setTypeFilter(e.target.value)}
                  className="px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none text-sm"
                >
                  <option value="all">All Types</option>
                  {Object.entries(ACTIVITY_TYPES).map(([key, val]) => (
                    <option key={key} value={key}>{val.label}</option>
                  ))}
                </select>

                <select
                  value={proposalFilter}
                  onChange={(e) => setProposalFilter(e.target.value)}
                  className="px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none text-sm"
                >
                  <option value="all">All Proposals</option>
                  {proposals.map(p => (
                    <option key={p} value={p}>{p}</option>
                  ))}
                </select>

                <button
                  onClick={() => setShowUnreadOnly(!showUnreadOnly)}
                  className={`px-4 py-2 rounded-lg border text-sm transition-all flex items-center gap-2 ${
                    showUnreadOnly 
                      ? 'bg-orange-500/20 border-orange-500 text-orange-400' 
                      : 'bg-[#0A1628] border-white/10 text-gray-400 hover:text-white'
                  }`}
                >
                  <Icon name="bell" className="w-4 h-4" />
                  Unread Only
                </button>
              </div>
            </div>

            {/* Post Comment */}
            <div className="glass-card rounded-xl p-4 mb-6">
              <div className="flex items-start gap-3">
                <div className="w-10 h-10 rounded-full bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center text-white font-bold">
                  MW
                </div>
                <div className="flex-1">
                  <textarea
                    value={newComment}
                    onChange={(e) => setNewComment(e.target.value)}
                    placeholder="Post an update to your team..."
                    rows={2}
                    className="w-full px-4 py-3 bg-[#0A1628] border border-white/10 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-cyan-500 resize-none"
                  />
                  <div className="flex justify-end mt-2">
                    <button
                      onClick={postComment}
                      disabled={!newComment.trim()}
                      className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-blue-600 text-white rounded-lg font-medium hover:opacity-90 transition-opacity flex items-center gap-2 disabled:opacity-50"
                    >
                      <Icon name="send" className="w-4 h-4" />
                      Post
                    </button>
                  </div>
                </div>
              </div>
            </div>

            {/* Activity Feed */}
            <div ref={feedRef} className="space-y-4">
              {filteredActivities.map((activity, idx) => {
                const type = ACTIVITY_TYPES[activity.type] || ACTIVITY_TYPES.comment;

                return (
                  <div
                    key={activity.id}
                    className={`glass-card rounded-xl p-4 transition-all animate-slideUp ${
                      !activity.read ? 'border-l-4 border-l-cyan-500' : ''
                    }`}
                    style={{ animationDelay: `${idx * 50}ms` }}
                    onClick={() => markAsRead(activity.id)}
                  >
                    <div className="flex items-start gap-4">
                      <div className="flex flex-col items-center gap-2">
                        {activity.avatar.length <= 2 ? (
                          <div 
                            className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold"
                            style={{ backgroundColor: type.color }}
                          >
                            {activity.avatar}
                          </div>
                        ) : (
                          <div className="w-10 h-10 rounded-full bg-amber-500/20 flex items-center justify-center text-2xl">
                            {activity.avatar}
                          </div>
                        )}
                        <div 
                          className="w-6 h-6 rounded-full flex items-center justify-center"
                          style={{ backgroundColor: `${type.color}20` }}
                        >
                          <Icon name={type.icon} className="w-3 h-3" style={{ color: type.color }} />
                        </div>
                      </div>

                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 mb-1">
                          <span className="font-semibold text-white">{activity.user}</span>
                          <span className="text-xs text-gray-500">•</span>
                          <span 
                            className="text-xs px-2 py-0.5 rounded-full"
                            style={{ backgroundColor: `${type.color}20`, color: type.color }}
                          >
                            {type.label}
                          </span>
                          {!activity.read && (
                            <span className="w-2 h-2 bg-cyan-500 rounded-full animate-pulse" />
                          )}
                        </div>

                        <p className="text-gray-300 mb-2">{activity.message}</p>

                        <div className="flex items-center gap-4 text-xs text-gray-500">
                          <span className="px-2 py-1 bg-white/5 rounded">{activity.proposal}</span>
                          <span>{formatTime(activity.timestamp)}</span>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}

              {filteredActivities.length === 0 && (
                <div className="text-center py-16">
                  <Icon name="activity" className="w-16 h-16 text-gray-600 mx-auto mb-4" />
                  <h3 className="text-xl font-semibold text-gray-400 mb-2">No activities</h3>
                  <p className="text-gray-500">Try adjusting your filters</p>
                </div>
              )}
            </div>
          </main>

          <footer className="border-t border-white/10 py-4 mt-12">
            <div className="max-w-4xl mx-auto px-6 text-center text-xs text-gray-500">
              © 2026 Mission Meets Tech • MissionPulse v2.0 • Sprint 61
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<ActivityFeedApp />, document.getElementById('root'));
  </script>
</body>
</html>
