<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent Hub | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="icon" href="MMT_icon_transparent.png" type="image/png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #00050F 0%, #001525 50%, #00050F 100%); min-height: 100vh; }
    .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.1); }
    .glow { box-shadow: 0 0 30px rgba(0, 229, 250, 0.15); }
    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
    .fedramp-badge { background: linear-gradient(135deg, #059669 0%, #10b981 100%); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #00E5FA; border-radius: 3px; }
  </style>
</head>
<body class="text-white">
  <div id="root"></div>

  <script type="text/babel">
    const API_BASE = 'https://missionpulse-api.onrender.com';

    // 9 AI Agents including AskSage
    const AI_AGENTS = [
      { 
        id: 'capture', 
        name: 'Capture Intelligence', 
        icon: '🎯', 
        description: 'Opportunity qualification & win probability analysis',
        endpoint: '/agents/capture/chat',
        color: 'from-cyan-500 to-blue-500',
        tags: ['Qualification', 'Win Analysis', 'Strategy']
      },
      { 
        id: 'strategy', 
        name: 'Strategy Advisor', 
        icon: '♟️', 
        description: 'Win themes, discriminators & competitive positioning',
        endpoint: '/agents/strategy/chat',
        color: 'from-purple-500 to-indigo-500',
        tags: ['Win Themes', 'Positioning', 'Differentiators']
      },
      { 
        id: 'blackhat', 
        name: 'Black Hat Intel', 
        icon: '🎭', 
        description: 'Competitor analysis & counter-strategy development',
        endpoint: '/agents/blackhat/chat',
        restricted: true,
        roles: ['ceo', 'coo', 'cap'],
        color: 'from-red-500 to-orange-500',
        tags: ['Competitors', 'Intel', 'Counter-Strategy']
      },
      { 
        id: 'pricing', 
        name: 'Pricing Intelligence', 
        icon: '💰', 
        description: 'BOE development, rate analysis & cost modeling',
        endpoint: '/agents/pricing/chat',
        color: 'from-emerald-500 to-teal-500',
        tags: ['BOE', 'Labor Rates', 'Cost Analysis']
      },
      { 
        id: 'compliance', 
        name: 'Compliance Guardian', 
        icon: '📋', 
        description: 'FAR/DFARS compliance & regulatory guidance',
        endpoint: '/agents/compliance/chat',
        color: 'from-amber-500 to-yellow-500',
        tags: ['FAR', 'DFARS', 'Regulations']
      },
      { 
        id: 'writer', 
        name: 'Proposal Writer', 
        icon: '✍️', 
        description: 'Section drafting, boilerplate & response generation',
        endpoint: '/agents/writer/chat',
        color: 'from-pink-500 to-rose-500',
        tags: ['Drafting', 'Sections', 'Content']
      },
      { 
        id: 'contracts', 
        name: 'Contracts Analyst', 
        icon: '📑', 
        description: 'Contract vehicle analysis & terms review',
        endpoint: '/agents/contracts/chat',
        color: 'from-blue-500 to-cyan-500',
        tags: ['IDIQs', 'Vehicles', 'Terms']
      },
      { 
        id: 'orals', 
        name: 'Orals Coach', 
        icon: '🎤', 
        description: 'Presentation prep & Q&A simulation',
        endpoint: '/agents/orals/chat',
        color: 'from-violet-500 to-purple-500',
        tags: ['Presentations', 'Q&A', 'Coaching']
      },
      { 
        id: 'asksage', 
        name: 'AskSage', 
        icon: '🛡️', 
        description: 'FedRAMP High compliance AI for CMMC, NIST & security',
        endpoint: '/agents/asksage/chat',
        fedramp: true,
        color: 'from-green-500 to-emerald-600',
        tags: ['CMMC 2.0', 'NIST 800-171', 'FedRAMP'],
        badge: 'FedRAMP High | IL5'
      }
    ];

    // Get current user role from localStorage or default
    function getUserRole() {
      try {
        const user = JSON.parse(localStorage.getItem('mp_user') || '{}');
        return user.role || 'pm';
      } catch { return 'pm'; }
    }

    // Check if user can access restricted agent
    function canAccessAgent(agent) {
      if (!agent.restricted) return true;
      const role = getUserRole();
      return agent.roles?.includes(role);
    }

    // Icons
    const Icons = {
      menu: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/></svg>,
      x: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>,
      send: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>,
      back: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>,
      shield: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>,
      lock: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>,
      check: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>
    };

    // Agent Card Component
    function AgentCard({ agent, onClick }) {
      const accessible = canAccessAgent(agent);
      
      return (
        <div 
          onClick={() => accessible && onClick(agent)}
          className={`glass rounded-xl p-6 transition-all duration-300 ${
            accessible 
              ? 'hover:border-cyan-400/50 hover:glow cursor-pointer' 
              : 'opacity-60 cursor-not-allowed'
          }`}
        >
          <div className="flex items-start justify-between mb-4">
            <div className={`w-14 h-14 rounded-xl bg-gradient-to-br ${agent.color} flex items-center justify-center text-2xl shadow-lg`}>
              {agent.icon}
            </div>
            <div className="flex flex-col items-end gap-1">
              {agent.fedramp && (
                <span className="fedramp-badge px-2 py-1 text-xs font-semibold rounded-full text-white flex items-center gap-1">
                  <Icons.shield /> FedRAMP
                </span>
              )}
              {agent.restricted && (
                <span className="px-2 py-1 bg-amber-500/20 text-amber-400 text-xs rounded-full border border-amber-500/30 flex items-center gap-1">
                  <Icons.lock /> RESTRICTED
                </span>
              )}
              {!agent.restricted && !agent.fedramp && (
                <span className="px-2 py-1 bg-cyan-500/20 text-cyan-400 text-xs rounded-full">READY</span>
              )}
            </div>
          </div>
          
          <h3 className="text-lg font-semibold text-white mb-1">{agent.name}</h3>
          {agent.badge && <p className="text-xs text-green-400 font-medium mb-2">{agent.badge}</p>}
          <p className="text-sm text-slate-400 mb-4">{agent.description}</p>
          
          <div className="flex flex-wrap gap-2 mb-4">
            {agent.tags.map(tag => (
              <span key={tag} className="px-2 py-1 bg-slate-700/50 text-slate-300 text-xs rounded">{tag}</span>
            ))}
          </div>
          
          {accessible ? (
            <button className={`w-full py-2.5 bg-gradient-to-r ${agent.color} text-white rounded-lg font-medium hover:opacity-90 transition`}>
              Launch Chat
            </button>
          ) : (
            <div className="w-full py-2.5 bg-slate-700/50 text-slate-500 rounded-lg text-center text-sm">
              CEO/COO/CAP Access Only
            </div>
          )}
        </div>
      );
    }

    // Chat Interface Component
    function ChatInterface({ agent, onBack }) {
      const [messages, setMessages] = React.useState([
        { role: 'assistant', content: `Hello! I'm ${agent.name}. ${agent.description}. How can I help you today?` }
      ]);
      const [input, setInput] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const messagesEndRef = React.useRef(null);

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      };

      React.useEffect(scrollToBottom, [messages]);

      const sendMessage = async () => {
        if (!input.trim() || loading) return;
        
        const userMsg = input.trim();
        setInput('');
        setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
        setLoading(true);

        try {
          const response = await fetch(`${API_BASE}${agent.endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              message: userMsg,
              user_role: getUserRole(),
              opportunity_id: null
            })
          });

          if (!response.ok) throw new Error('API error');
          
          const data = await response.json();
          setMessages(prev => [...prev, { 
            role: 'assistant', 
            content: data.response || data.message || 'Response received.',
            confidence: data.confidence
          }]);
        } catch (err) {
          console.error('Chat error:', err);
          setMessages(prev => [...prev, { 
            role: 'assistant', 
            content: `As ${agent.name}, I'll help you with that. [Demo Mode - API connecting...]\n\nIn production, I provide real-time intelligence on ${agent.tags.join(', ')}.`
          }]);
        }
        
        setLoading(false);
      };

      return (
        <div className="h-screen flex flex-col animate-fadeIn">
          {/* Header */}
          <div className="glass border-b border-slate-700/50 px-6 py-4 flex items-center gap-4">
            <button onClick={onBack} className="p-2 hover:bg-slate-700/50 rounded-lg transition">
              <Icons.back />
            </button>
            <div className={`w-12 h-12 rounded-xl bg-gradient-to-br ${agent.color} flex items-center justify-center text-xl`}>
              {agent.icon}
            </div>
            <div className="flex-1">
              <h2 className="font-semibold text-white">{agent.name}</h2>
              <div className="flex items-center gap-2">
                <span className="w-2 h-2 bg-green-500 rounded-full pulse-dot"></span>
                <span className="text-xs text-slate-400">Online</span>
                {agent.fedramp && (
                  <span className="fedramp-badge px-2 py-0.5 text-xs font-medium rounded text-white ml-2">
                    FedRAMP High
                  </span>
                )}
              </div>
            </div>
          </div>

          {/* Messages */}
          <div className="flex-1 overflow-y-auto p-6 space-y-4">
            {messages.map((msg, i) => (
              <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-[80%] p-4 rounded-2xl ${
                  msg.role === 'user' 
                    ? 'bg-cyan-500 text-white rounded-br-md' 
                    : 'glass text-slate-200 rounded-bl-md'
                }`}>
                  <p className="whitespace-pre-wrap">{msg.content}</p>
                  {msg.confidence && (
                    <div className="mt-2 pt-2 border-t border-slate-600/50 text-xs text-slate-400">
                      Confidence: {Math.round(msg.confidence * 100)}%
                    </div>
                  )}
                </div>
              </div>
            ))}
            {loading && (
              <div className="flex justify-start">
                <div className="glass p-4 rounded-2xl rounded-bl-md">
                  <div className="flex gap-1">
                    <span className="w-2 h-2 bg-cyan-500 rounded-full animate-bounce" style={{animationDelay: '0ms'}}></span>
                    <span className="w-2 h-2 bg-cyan-500 rounded-full animate-bounce" style={{animationDelay: '150ms'}}></span>
                    <span className="w-2 h-2 bg-cyan-500 rounded-full animate-bounce" style={{animationDelay: '300ms'}}></span>
                  </div>
                </div>
              </div>
            )}
            <div ref={messagesEndRef} />
          </div>

          {/* Input */}
          <div className="glass border-t border-slate-700/50 p-4">
            <div className="flex gap-3">
              <input
                type="text"
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
                placeholder={`Ask ${agent.name}...`}
                className="flex-1 px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500"
              />
              <button 
                onClick={sendMessage}
                disabled={loading || !input.trim()}
                className={`px-6 py-3 bg-gradient-to-r ${agent.color} text-white rounded-xl font-medium transition ${
                  loading || !input.trim() ? 'opacity-50 cursor-not-allowed' : 'hover:opacity-90'
                }`}
              >
                <Icons.send />
              </button>
            </div>
            <p className="text-xs text-slate-500 mt-2 text-center">
              AI GENERATED - REQUIRES HUMAN REVIEW
            </p>
          </div>
        </div>
      );
    }

    // Main App
    function App() {
      const [activeAgent, setActiveAgent] = React.useState(null);
      const [filter, setFilter] = React.useState('all');

      const filteredAgents = filter === 'all' 
        ? AI_AGENTS 
        : filter === 'fedramp'
          ? AI_AGENTS.filter(a => a.fedramp)
          : AI_AGENTS.filter(a => !a.restricted && !a.fedramp);

      if (activeAgent) {
        return <ChatInterface agent={activeAgent} onBack={() => setActiveAgent(null)} />;
      }

      return (
        <div className="min-h-screen p-6">
          {/* Header */}
          <div className="max-w-7xl mx-auto mb-8">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-4">
                <a href="index.html" className="flex items-center gap-3">
                  <img src="MMT_icon_transparent.png" alt="MMT" className="w-10 h-10" />
                  <div>
                    <h1 className="text-2xl font-bold text-white">AI Agent Hub</h1>
                    <p className="text-slate-400 text-sm">Mission Meets Tech</p>
                  </div>
                </a>
              </div>
              <a href="missionpulse-v12-task17-complete.html" className="px-4 py-2 glass rounded-lg text-sm text-slate-300 hover:text-white transition">
                ← Back to Dashboard
              </a>
            </div>
          </div>

          {/* Stats Bar */}
          <div className="max-w-7xl mx-auto mb-8">
            <div className="glass rounded-xl p-4 flex items-center justify-between">
              <div className="flex items-center gap-6">
                <div className="flex items-center gap-2">
                  <span className="w-3 h-3 bg-green-500 rounded-full pulse-dot"></span>
                  <span className="text-sm text-slate-400">All Systems Operational</span>
                </div>
                <div className="text-sm text-slate-400">
                  <span className="text-white font-medium">{AI_AGENTS.length}</span> Agents Available
                </div>
                <div className="text-sm text-slate-400">
                  <span className="text-green-400 font-medium">1</span> FedRAMP High Agent
                </div>
              </div>
              <div className="flex gap-2">
                <button 
                  onClick={() => setFilter('all')}
                  className={`px-3 py-1.5 rounded-lg text-sm transition ${filter === 'all' ? 'bg-cyan-500 text-white' : 'text-slate-400 hover:bg-slate-700'}`}
                >
                  All Agents
                </button>
                <button 
                  onClick={() => setFilter('fedramp')}
                  className={`px-3 py-1.5 rounded-lg text-sm transition flex items-center gap-1 ${filter === 'fedramp' ? 'bg-green-500 text-white' : 'text-slate-400 hover:bg-slate-700'}`}
                >
                  <Icons.shield /> FedRAMP
                </button>
                <button 
                  onClick={() => setFilter('standard')}
                  className={`px-3 py-1.5 rounded-lg text-sm transition ${filter === 'standard' ? 'bg-cyan-500 text-white' : 'text-slate-400 hover:bg-slate-700'}`}
                >
                  Standard
                </button>
              </div>
            </div>
          </div>

          {/* FedRAMP Highlight (when showing all or fedramp) */}
          {(filter === 'all' || filter === 'fedramp') && (
            <div className="max-w-7xl mx-auto mb-8">
              <div className="glass rounded-xl p-6 border-green-500/30 bg-gradient-to-r from-green-900/20 to-emerald-900/20">
                <div className="flex items-center gap-4 mb-4">
                  <div className="w-12 h-12 fedramp-badge rounded-xl flex items-center justify-center">
                    <Icons.shield />
                  </div>
                  <div>
                    <h3 className="text-lg font-semibold text-white">FedRAMP High Security Available</h3>
                    <p className="text-sm text-slate-400">AskSage provides IL5/FedRAMP High compliant AI for federal security requirements</p>
                  </div>
                </div>
                <div className="flex flex-wrap gap-3">
                  <span className="px-3 py-1.5 bg-green-500/20 text-green-400 rounded-lg text-sm flex items-center gap-1">
                    <Icons.check /> CMMC 2.0 Ready
                  </span>
                  <span className="px-3 py-1.5 bg-green-500/20 text-green-400 rounded-lg text-sm flex items-center gap-1">
                    <Icons.check /> NIST 800-171 Aligned
                  </span>
                  <span className="px-3 py-1.5 bg-green-500/20 text-green-400 rounded-lg text-sm flex items-center gap-1">
                    <Icons.check /> CUI Authorized
                  </span>
                  <span className="px-3 py-1.5 bg-green-500/20 text-green-400 rounded-lg text-sm flex items-center gap-1">
                    <Icons.check /> IL5 Environment
                  </span>
                </div>
              </div>
            </div>
          )}

          {/* Agent Grid */}
          <div className="max-w-7xl mx-auto">
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              {filteredAgents.map(agent => (
                <AgentCard key={agent.id} agent={agent} onClick={setActiveAgent} />
              ))}
            </div>
          </div>

          {/* Footer */}
          <div className="max-w-7xl mx-auto mt-12 text-center">
            <p className="text-xs text-slate-500">
              AI GENERATED CONTENT - REQUIRES HUMAN REVIEW | Mission Meets Tech © 2026
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
