<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Hub | MissionPulse</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(0, 5, 15, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.2); }
        .glow { box-shadow: 0 0 30px rgba(0, 229, 250, 0.3); }
        .cyber-grid { background-image: linear-gradient(rgba(0, 229, 250, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 250, 0.03) 1px, transparent 1px); background-size: 50px 50px; }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .agent-glow { box-shadow: 0 0 40px rgba(0, 229, 250, 0.4), inset 0 0 20px rgba(0, 229, 250, 0.1); }
    </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen cyber-grid">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc4MjMwMjgsImV4cCI6MjA1MzM5OTAyOH0.S0LKvPzVIfBsLv-2qjXRdMGhnYyRLvOFlo9ihaQuqHE';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const DEMO_AGENTS = [
            { id: 1, name: 'Capture Agent', icon: '🎯', description: 'Opportunity qualification, pWin scoring, capture planning assistance', status: 'active', model: 'claude-3-opus', temperature: 0.3, max_tokens: 4096, total_requests: 1247, avg_latency_ms: 890, success_rate: 98.5, tokens_used: 2456000, last_active: '2025-02-02T11:30:00Z' },
            { id: 2, name: 'Strategy Agent', icon: '♟️', description: 'Win themes, discriminators, ghost/highlight matrix generation', status: 'active', model: 'claude-3-opus', temperature: 0.4, max_tokens: 4096, total_requests: 892, avg_latency_ms: 1240, success_rate: 97.8, tokens_used: 1890000, last_active: '2025-02-02T11:28:00Z' },
            { id: 3, name: 'Black Hat Agent', icon: '🎩', description: 'Competitive intelligence, competitor analysis, counter-strategy', status: 'active', model: 'claude-3-opus', temperature: 0.5, max_tokens: 4096, total_requests: 456, avg_latency_ms: 1450, success_rate: 96.2, tokens_used: 980000, last_active: '2025-02-02T10:45:00Z' },
            { id: 4, name: 'Pricing Agent', icon: '💰', description: 'BOE development, rate analysis, price-to-win calculations', status: 'active', model: 'claude-3-sonnet', temperature: 0.2, max_tokens: 2048, total_requests: 678, avg_latency_ms: 650, success_rate: 99.1, tokens_used: 1234000, last_active: '2025-02-02T11:15:00Z' },
            { id: 5, name: 'Compliance Agent', icon: '📋', description: 'FAR/DFARS analysis, compliance matrix, clause risk assessment', status: 'active', model: 'claude-3-opus', temperature: 0.1, max_tokens: 4096, total_requests: 1023, avg_latency_ms: 980, success_rate: 99.4, tokens_used: 2100000, last_active: '2025-02-02T11:32:00Z' },
            { id: 6, name: 'Writer Agent', icon: '✍️', description: 'Proposal section drafting, executive summary, past performance', status: 'active', model: 'claude-3-opus', temperature: 0.6, max_tokens: 8192, total_requests: 2341, avg_latency_ms: 2100, success_rate: 95.8, tokens_used: 5600000, last_active: '2025-02-02T11:29:00Z' },
            { id: 7, name: 'Contracts Agent', icon: '📜', description: 'Contract clause analysis, terms negotiation, modification support', status: 'maintenance', model: 'claude-3-sonnet', temperature: 0.2, max_tokens: 4096, total_requests: 234, avg_latency_ms: 780, success_rate: 98.7, tokens_used: 456000, last_active: '2025-02-01T16:00:00Z' },
            { id: 8, name: 'Orals Agent', icon: '🎤', description: 'Presentation coaching, Q&A prep, slide content generation', status: 'active', model: 'claude-3-opus', temperature: 0.5, max_tokens: 4096, total_requests: 189, avg_latency_ms: 1100, success_rate: 97.3, tokens_used: 380000, last_active: '2025-02-02T09:30:00Z' },
        ];

        const DEMO_LOGS = [
            { id: 1, agent_id: 1, timestamp: '2025-02-02T11:30:00Z', action: 'pwin_score', input_tokens: 1200, output_tokens: 450, latency_ms: 890, status: 'success', opportunity: 'DHA MHS GENESIS' },
            { id: 2, agent_id: 6, timestamp: '2025-02-02T11:29:00Z', action: 'draft_section', input_tokens: 2400, output_tokens: 3200, latency_ms: 2100, status: 'success', opportunity: 'VA EHRM Support' },
            { id: 3, agent_id: 5, timestamp: '2025-02-02T11:28:00Z', action: 'compliance_check', input_tokens: 1800, output_tokens: 600, latency_ms: 980, status: 'success', opportunity: 'CMS Data Analytics' },
            { id: 4, agent_id: 2, timestamp: '2025-02-02T11:27:00Z', action: 'win_themes', input_tokens: 1500, output_tokens: 890, latency_ms: 1240, status: 'success', opportunity: 'DHA Cybersecurity' },
            { id: 5, agent_id: 3, timestamp: '2025-02-02T11:25:00Z', action: 'competitor_analysis', input_tokens: 2100, output_tokens: 1600, latency_ms: 1450, status: 'success', opportunity: 'IHS Telehealth' },
            { id: 6, agent_id: 4, timestamp: '2025-02-02T11:20:00Z', action: 'boe_calculation', input_tokens: 800, output_tokens: 1200, latency_ms: 650, status: 'success', opportunity: 'DHA MHS GENESIS' },
            { id: 7, agent_id: 7, timestamp: '2025-02-01T16:00:00Z', action: 'clause_analysis', input_tokens: 1400, output_tokens: 500, latency_ms: 780, status: 'error', opportunity: 'VA EHRM Support', error: 'Rate limit exceeded' },
        ];

        function AgentHub() {
            const [agents, setAgents] = useState([]);
            const [logs, setLogs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedAgent, setSelectedAgent] = useState(null);
            const [showConfigModal, setShowConfigModal] = useState(false);
            const [configForm, setConfigForm] = useState({ model: '', temperature: 0.5, max_tokens: 4096 });

            useEffect(() => {
                fetchData();
            }, []);

            async function fetchData() {
                try {
                    const [agentsRes, logsRes] = await Promise.all([
                        supabase.from('ai_agents').select('*').order('name'),
                        supabase.from('agent_logs').select('*').order('timestamp', { ascending: false }).limit(50)
                    ]);
                    setAgents(agentsRes.data?.length ? agentsRes.data : DEMO_AGENTS);
                    setLogs(logsRes.data?.length ? logsRes.data : DEMO_LOGS);
                } catch (err) {
                    console.log('Using demo data');
                    setAgents(DEMO_AGENTS);
                    setLogs(DEMO_LOGS);
                } finally {
                    setLoading(false);
                }
            }

            async function toggleAgentStatus(agent) {
                const newStatus = agent.status === 'active' ? 'paused' : 'active';
                try {
                    await supabase.from('ai_agents').update({ status: newStatus }).eq('id', agent.id);
                    fetchData();
                } catch (err) {
                    setAgents(agents.map(a => a.id === agent.id ? { ...a, status: newStatus } : a));
                }
            }

            async function saveConfig() {
                try {
                    await supabase.from('ai_agents').update(configForm).eq('id', selectedAgent.id);
                    fetchData();
                } catch (err) {
                    setAgents(agents.map(a => a.id === selectedAgent.id ? { ...a, ...configForm } : a));
                }
                setShowConfigModal(false);
            }

            function openConfig(agent) {
                setSelectedAgent(agent);
                setConfigForm({ model: agent.model, temperature: agent.temperature, max_tokens: agent.max_tokens });
                setShowConfigModal(true);
            }

            const getStatusBadge = (status) => {
                const styles = {
                    active: { bg: 'bg-green-500/20', text: 'text-green-400', dot: 'bg-green-400' },
                    paused: { bg: 'bg-yellow-500/20', text: 'text-yellow-400', dot: 'bg-yellow-400' },
                    maintenance: { bg: 'bg-orange-500/20', text: 'text-orange-400', dot: 'bg-orange-400 pulse' },
                    error: { bg: 'bg-red-500/20', text: 'text-red-400', dot: 'bg-red-400' }
                };
                return styles[status] || styles.paused;
            };

            const formatNumber = (num) => {
                if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
                if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
                return num.toString();
            };

            const stats = {
                totalAgents: agents.length,
                activeAgents: agents.filter(a => a.status === 'active').length,
                totalRequests: agents.reduce((sum, a) => sum + a.total_requests, 0),
                totalTokens: agents.reduce((sum, a) => sum + a.tokens_used, 0),
                avgSuccessRate: agents.length ? (agents.reduce((sum, a) => sum + a.success_rate, 0) / agents.length).toFixed(1) : 0
            };

            const getAgentById = (id) => agents.find(a => a.id === id);

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-[#00E5FA] text-xl">Loading Agent Hub...</div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-6">
                    {/* Header */}
                    <div className="flex items-center justify-between mb-8">
                        <div>
                            <h1 className="text-3xl font-bold text-white flex items-center gap-3">
                                <span className="text-4xl">🤖</span> Agent Hub
                            </h1>
                            <p className="text-gray-400 mt-1">AI Agent Management & Analytics</p>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="glass rounded-lg px-4 py-2 flex items-center gap-2">
                                <span className="w-2 h-2 rounded-full bg-green-400 pulse"></span>
                                <span className="text-gray-300">{stats.activeAgents}/{stats.totalAgents} Active</span>
                            </div>
                        </div>
                    </div>

                    {/* Stats Overview */}
                    <div className="grid grid-cols-5 gap-4 mb-8">
                        <div className="glass rounded-xl p-4">
                            <div className="text-gray-400 text-sm">Total Agents</div>
                            <div className="text-3xl font-bold text-white">{stats.totalAgents}</div>
                        </div>
                        <div className="glass rounded-xl p-4 border-l-4 border-green-500">
                            <div className="text-gray-400 text-sm">Active</div>
                            <div className="text-3xl font-bold text-green-400">{stats.activeAgents}</div>
                        </div>
                        <div className="glass rounded-xl p-4 border-l-4 border-[#00E5FA]">
                            <div className="text-gray-400 text-sm">Total Requests</div>
                            <div className="text-3xl font-bold text-[#00E5FA]">{formatNumber(stats.totalRequests)}</div>
                        </div>
                        <div className="glass rounded-xl p-4 border-l-4 border-purple-500">
                            <div className="text-gray-400 text-sm">Tokens Used</div>
                            <div className="text-3xl font-bold text-purple-400">{formatNumber(stats.totalTokens)}</div>
                        </div>
                        <div className="glass rounded-xl p-4 border-l-4 border-yellow-500">
                            <div className="text-gray-400 text-sm">Avg Success Rate</div>
                            <div className="text-3xl font-bold text-yellow-400">{stats.avgSuccessRate}%</div>
                        </div>
                    </div>

                    <div className="grid grid-cols-3 gap-6">
                        {/* Agents Grid */}
                        <div className="col-span-2">
                            <h2 className="text-xl font-semibold text-white mb-4">AI Agents</h2>
                            <div className="grid grid-cols-2 gap-4">
                                {agents.map((agent) => {
                                    const badge = getStatusBadge(agent.status);
                                    return (
                                        <div key={agent.id} className={`glass rounded-xl p-5 transition-all hover:glow ${agent.status === 'active' ? 'agent-glow' : ''}`}>
                                            <div className="flex items-start justify-between mb-4">
                                                <div className="flex items-center gap-3">
                                                    <span className="text-4xl">{agent.icon}</span>
                                                    <div>
                                                        <h3 className="font-semibold text-white">{agent.name}</h3>
                                                        <div className={`flex items-center gap-2 ${badge.bg} px-2 py-0.5 rounded-full inline-flex mt-1`}>
                                                            <span className={`w-2 h-2 rounded-full ${badge.dot}`}></span>
                                                            <span className={`text-xs font-medium ${badge.text}`}>{agent.status}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <p className="text-gray-400 text-sm mb-4">{agent.description}</p>

                                            <div className="grid grid-cols-2 gap-3 text-sm mb-4">
                                                <div>
                                                    <span className="text-gray-500">Model</span>
                                                    <div className="text-white">{agent.model}</div>
                                                </div>
                                                <div>
                                                    <span className="text-gray-500">Requests</span>
                                                    <div className="text-[#00E5FA]">{formatNumber(agent.total_requests)}</div>
                                                </div>
                                                <div>
                                                    <span className="text-gray-500">Avg Latency</span>
                                                    <div className="text-white">{agent.avg_latency_ms}ms</div>
                                                </div>
                                                <div>
                                                    <span className="text-gray-500">Success Rate</span>
                                                    <div className={agent.success_rate >= 98 ? 'text-green-400' : agent.success_rate >= 95 ? 'text-yellow-400' : 'text-red-400'}>
                                                        {agent.success_rate}%
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="mb-4">
                                                <div className="flex justify-between text-xs mb-1">
                                                    <span className="text-gray-500">Token Usage</span>
                                                    <span className="text-gray-400">{formatNumber(agent.tokens_used)}</span>
                                                </div>
                                                <div className="w-full bg-gray-700 rounded-full h-1.5">
                                                    <div className="bg-[#00E5FA] h-1.5 rounded-full" style={{ width: `${Math.min((agent.tokens_used / 6000000) * 100, 100)}%` }}></div>
                                                </div>
                                            </div>

                                            <div className="flex gap-2">
                                                <button onClick={() => toggleAgentStatus(agent)}
                                                    className={`flex-1 px-3 py-2 rounded-lg text-sm font-medium transition ${
                                                        agent.status === 'active' 
                                                            ? 'bg-yellow-500/20 text-yellow-400 hover:bg-yellow-500/30' 
                                                            : 'bg-green-500/20 text-green-400 hover:bg-green-500/30'
                                                    }`}>
                                                    {agent.status === 'active' ? 'Pause' : 'Activate'}
                                                </button>
                                                <button onClick={() => openConfig(agent)}
                                                    className="flex-1 px-3 py-2 bg-[#00E5FA]/20 text-[#00E5FA] rounded-lg text-sm font-medium hover:bg-[#00E5FA]/30">
                                                    Configure
                                                </button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Activity Log */}
                        <div>
                            <h2 className="text-xl font-semibold text-white mb-4">Recent Activity</h2>
                            <div className="glass rounded-xl p-4 max-h-[700px] overflow-y-auto">
                                {logs.map((log) => {
                                    const agent = getAgentById(log.agent_id);
                                    return (
                                        <div key={log.id} className="border-b border-[#00E5FA]/10 py-3 last:border-0">
                                            <div className="flex items-center justify-between mb-1">
                                                <div className="flex items-center gap-2">
                                                    <span className="text-lg">{agent?.icon}</span>
                                                    <span className="text-white font-medium text-sm">{agent?.name}</span>
                                                </div>
                                                <span className={`text-xs font-semibold ${log.status === 'success' ? 'text-green-400' : 'text-red-400'}`}>
                                                    {log.status === 'success' ? '✓' : '✗'}
                                                </span>
                                            </div>
                                            <div className="text-gray-400 text-sm">{log.action.replace('_', ' ')}</div>
                                            <div className="text-[#00E5FA] text-xs">{log.opportunity}</div>
                                            <div className="flex gap-4 mt-2 text-xs text-gray-500">
                                                <span>In: {log.input_tokens}</span>
                                                <span>Out: {log.output_tokens}</span>
                                                <span>{log.latency_ms}ms</span>
                                            </div>
                                            {log.error && (
                                                <div className="mt-2 text-xs text-red-400 bg-red-500/10 px-2 py-1 rounded">
                                                    {log.error}
                                                </div>
                                            )}
                                            <div className="text-xs text-gray-600 mt-1">
                                                {new Date(log.timestamp).toLocaleTimeString()}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    {/* Config Modal */}
                    {showConfigModal && selectedAgent && (
                        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
                            <div className="glass rounded-xl p-6 w-full max-w-md glow">
                                <h2 className="text-xl font-bold text-white mb-4 flex items-center gap-2">
                                    <span>{selectedAgent.icon}</span> Configure {selectedAgent.name}
                                </h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-gray-400 text-sm">Model</label>
                                        <select value={configForm.model} onChange={(e) => setConfigForm({...configForm, model: e.target.value})}
                                            className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1">
                                            <option value="claude-3-opus">Claude 3 Opus</option>
                                            <option value="claude-3-sonnet">Claude 3 Sonnet</option>
                                            <option value="claude-3-haiku">Claude 3 Haiku</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-gray-400 text-sm">Temperature ({configForm.temperature})</label>
                                        <input type="range" min="0" max="1" step="0.1" value={configForm.temperature} 
                                            onChange={(e) => setConfigForm({...configForm, temperature: parseFloat(e.target.value)})}
                                            className="w-full mt-2 accent-[#00E5FA]" />
                                        <div className="flex justify-between text-xs text-gray-500 mt-1">
                                            <span>Precise</span>
                                            <span>Creative</span>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-gray-400 text-sm">Max Tokens</label>
                                        <select value={configForm.max_tokens} onChange={(e) => setConfigForm({...configForm, max_tokens: parseInt(e.target.value)})}
                                            className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1">
                                            <option value="1024">1,024</option>
                                            <option value="2048">2,048</option>
                                            <option value="4096">4,096</option>
                                            <option value="8192">8,192</option>
                                        </select>
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 mt-6">
                                    <button onClick={() => setShowConfigModal(false)} className="px-4 py-2 border border-gray-600 text-gray-300 rounded-lg hover:bg-gray-800">Cancel</button>
                                    <button onClick={saveConfig} className="px-6 py-2 bg-[#00E5FA] text-[#00050F] font-semibold rounded-lg hover:bg-[#00E5FA]/80">Save Configuration</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<AgentHub />);
    </script>
</body>
</html>
