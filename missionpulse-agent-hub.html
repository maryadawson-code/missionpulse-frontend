<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent Hub | MissionPulse</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.1); }
    .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
    .typing-dot { animation: typing 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(0, 229, 250, 0.3); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // AI Agents Configuration
    const AGENTS = [
      {
        id: 'capture',
        name: 'Capture Agent',
        role: 'Opportunity Intelligence',
        icon: '🎯',
        color: '#00E5FA',
        description: 'Analyzes SAM.gov opportunities, tracks incumbents, and identifies teaming partners.',
        capabilities: ['SAM.gov Analysis', 'Incumbent Research', 'Teaming Recommendations', 'Market Intelligence'],
        systemPrompt: 'You are a federal capture intelligence specialist. Help identify opportunities, analyze competition, and develop pursuit strategies.',
      },
      {
        id: 'strategy',
        name: 'Strategy Agent',
        role: 'Win Theme Development',
        icon: '♟️',
        color: '#8B5CF6',
        description: 'Develops win themes, differentiators, and ghost strategies using Shipley methodology.',
        capabilities: ['Win Theme Generation', 'Differentiator Analysis', 'Ghost Writing', 'Shipley Compliance'],
        systemPrompt: 'You are a proposal strategy expert using Shipley methodology. Help develop winning themes and competitive positioning.',
      },
      {
        id: 'blackhat',
        name: 'Black Hat Agent',
        role: 'Competitive Analysis',
        icon: '🎭',
        color: '#EF4444',
        description: 'Evaluates proposals from competitor perspective. RBAC restricted.',
        capabilities: ['Competitor Scoring', 'Weakness Identification', 'Counter-Strategy', 'Risk Assessment'],
        systemPrompt: 'You are a competitive intelligence analyst. Evaluate proposals as if you were a competitor to identify weaknesses.',
        restricted: true,
      },
      {
        id: 'pricing',
        name: 'Pricing Agent',
        role: 'Cost & BOE Analysis',
        icon: '💰',
        color: '#10B981',
        description: 'Assists with labor category mapping, BOE development, and price-to-win analysis.',
        capabilities: ['LCAT Mapping', 'BOE Templates', 'Price-to-Win', 'Rate Validation'],
        systemPrompt: 'You are a federal pricing specialist. Help develop competitive pricing strategies and basis of estimates.',
        cuiMarked: true,
      },
      {
        id: 'compliance',
        name: 'Compliance Agent',
        role: 'FAR/DFARS Guidance',
        icon: '🛡️',
        color: '#F59E0B',
        description: 'Provides FAR/DFARS interpretation and compliance requirement mapping.',
        capabilities: ['FAR/DFARS Lookup', 'Clause Interpretation', 'Compliance Matrix', 'Risk Flagging'],
        systemPrompt: 'You are a federal acquisition compliance expert. Help interpret FAR/DFARS requirements and ensure proposal compliance.',
      },
      {
        id: 'writer',
        name: 'Writer Agent',
        role: 'Proposal Drafting',
        icon: '✍️',
        color: '#A855F7',
        description: 'Generates proposal sections, executive summaries, and technical approaches.',
        capabilities: ['Section Drafting', 'Executive Summaries', 'Technical Writing', 'Style Matching'],
        systemPrompt: 'You are a professional proposal writer. Help draft compelling proposal sections that address evaluation criteria.',
      },
      {
        id: 'contracts',
        name: 'Contracts Agent',
        role: 'Contract Analysis',
        icon: '📋',
        color: '#06B6D4',
        description: 'Reviews contract terms, identifies risks, and suggests negotiation points.',
        capabilities: ['Term Analysis', 'Risk Identification', 'Negotiation Points', 'Clause Comparison'],
        systemPrompt: 'You are a federal contracts specialist. Help analyze contract terms and identify potential risks or negotiation opportunities.',
      },
      {
        id: 'orals',
        name: 'Orals Agent',
        role: 'Presentation Coach',
        icon: '🎤',
        color: '#EC4899',
        description: 'Prepares oral presentation content, Q&A prep, and delivery coaching.',
        capabilities: ['Slide Generation', 'Q&A Preparation', 'Delivery Tips', 'Mock Questions'],
        systemPrompt: 'You are an oral presentation coach for federal proposals. Help prepare compelling presentations and anticipate evaluator questions.',
      },
    ];

    // Demo conversations
    const DEMO_MESSAGES = {
      capture: [
        { role: 'user', content: 'What healthcare IT opportunities are available at DHA?' },
        { role: 'assistant', content: 'Based on my analysis of SAM.gov, I found 3 active healthcare IT opportunities at DHA:\n\n1. **MHS GENESIS Support Services** - $450M ceiling, IDIQ\n   - Focus: EHR implementation support\n   - Due: March 15, 2025\n   - Incumbent: Leidos\n\n2. **Clinical Decision Support Platform** - $125M\n   - Focus: AI/ML for clinical workflows\n   - Due: April 2, 2025\n   - New requirement\n\n3. **Health Data Analytics** - $85M\n   - Focus: Population health analytics\n   - Due: March 28, 2025\n   - Incumbent: Booz Allen\n\nWould you like me to analyze the competitive landscape for any of these?' },
      ],
      strategy: [
        { role: 'user', content: 'Help me develop win themes for a DHA modernization contract' },
        { role: 'assistant', content: 'Here are 4 recommended win themes for DHA modernization, aligned with Shipley methodology:\n\n**Theme 1: Mission Continuity**\n"Our proven transition approach ensures zero disruption to warfighter healthcare during modernization."\n- Ghost: Highlight competitor transitions that caused downtime\n- Proof: 99.99% uptime across 3 similar DHA contracts\n\n**Theme 2: Integrated Care Innovation**\n"We deliver AI-powered clinical decision support that improves patient outcomes while reducing provider burden."\n- Differentiator: Proprietary ML models trained on MHS data\n- Proof: 23% reduction in diagnostic errors at WRNMMC\n\n**Theme 3: Security-First Architecture**\n"Our FedRAMP High authorized platform exceeds IL5 requirements with continuous monitoring."\n- Ghost: Competitors with only FedRAMP Moderate\n- Proof: Zero security incidents across 5 years\n\n**Theme 4: Workforce Excellence**\n"Our team brings 150+ years combined DHA experience with 95% retention rate."\n- Proof: Key personnel from current contract\n\nShall I develop any of these themes further?' },
      ],
    };

    // Message Component
    const Message = ({ message, agentColor }) => {
      const isUser = message.role === 'user';
      return (
        <div className={`flex gap-3 ${isUser ? 'flex-row-reverse' : ''}`}>
          <div 
            className={`w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 ${
              isUser ? 'bg-slate-700' : ''
            }`}
            style={!isUser ? { backgroundColor: `${agentColor}20` } : {}}
          >
            {isUser ? (
              <svg className="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            ) : (
              <svg className="w-4 h-4" style={{ color: agentColor }} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
            )}
          </div>
          <div className={`flex-1 ${isUser ? 'text-right' : ''}`}>
            <div 
              className={`inline-block max-w-[80%] px-4 py-3 rounded-2xl ${
                isUser 
                  ? 'bg-cyan-500/20 text-white rounded-tr-none' 
                  : 'bg-slate-800/50 text-slate-200 rounded-tl-none'
              }`}
            >
              <p className="text-sm whitespace-pre-wrap">{message.content}</p>
            </div>
          </div>
        </div>
      );
    };

    // Typing Indicator
    const TypingIndicator = ({ agentColor }) => (
      <div className="flex gap-3">
        <div 
          className="w-8 h-8 rounded-lg flex items-center justify-center"
          style={{ backgroundColor: `${agentColor}20` }}
        >
          <svg className="w-4 h-4" style={{ color: agentColor }} fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
        </div>
        <div className="bg-slate-800/50 px-4 py-3 rounded-2xl rounded-tl-none">
          <div className="flex gap-1">
            <div className="w-2 h-2 rounded-full bg-slate-400 typing-dot"></div>
            <div className="w-2 h-2 rounded-full bg-slate-400 typing-dot"></div>
            <div className="w-2 h-2 rounded-full bg-slate-400 typing-dot"></div>
          </div>
        </div>
      </div>
    );

    function AgentHub() {
      const [selectedAgent, setSelectedAgent] = useState(null);
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const messagesEndRef = useRef(null);
      const inputRef = useRef(null);

      useEffect(() => {
        // Check URL hash for direct agent access
        const hash = window.location.hash.slice(1);
        if (hash) {
          const agent = AGENTS.find(a => a.id === hash);
          if (agent) setSelectedAgent(agent);
        }
      }, []);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      useEffect(() => {
        if (selectedAgent) {
          // Load demo messages if available
          const demoMsgs = DEMO_MESSAGES[selectedAgent.id];
          if (demoMsgs) {
            setMessages(demoMsgs);
          } else {
            setMessages([]);
          }
          inputRef.current?.focus();
        }
      }, [selectedAgent]);

      const handleSend = async () => {
        if (!input.trim() || !selectedAgent) return;
        
        const userMessage = { role: 'user', content: input };
        setMessages(prev => [...prev, userMessage]);
        setInput('');
        setIsTyping(true);

        // Simulate AI response delay
        await new Promise(resolve => setTimeout(resolve, 1500 + Math.random() * 1000));

        // Demo response
        const responses = {
          capture: "I'll analyze SAM.gov and GovWin for relevant opportunities. Based on your query, I'm finding several matches. Let me compile the competitive landscape analysis...",
          strategy: "Great question! Using Shipley methodology, I recommend structuring your approach around 3-4 key discriminators. Let me develop specific win themes...",
          blackhat: "From a competitor's perspective, I'd evaluate your proposal against these key criteria. Here are the potential vulnerabilities I've identified...",
          pricing: "I'll help you develop a competitive price strategy. Let me analyze the labor categories and develop a realistic BOE...",
          compliance: "Let me check the relevant FAR/DFARS clauses for your situation. Based on my analysis, here are the key compliance requirements...",
          writer: "I'll draft that section for you. Based on the evaluation criteria, here's my recommended approach...",
          contracts: "I've reviewed the contract terms. Here are the key risks I've identified and my recommended negotiation points...",
          orals: "Let me prepare your oral presentation strategy. Based on typical evaluator questions, here's what to anticipate...",
        };

        setIsTyping(false);
        setMessages(prev => [...prev, { 
          role: 'assistant', 
          content: responses[selectedAgent.id] || "I understand your request. Let me analyze this and provide recommendations..."
        }]);
      };

      return (
        <div className="min-h-screen bg-[#00050F] flex">
          {/* Sidebar - Agent Selection */}
          <aside className="w-80 glass border-r border-slate-700/50 flex flex-col">
            <div className="p-4 border-b border-slate-700/50">
              <div className="flex items-center gap-3">
                <a href="missionpulse-nav-hub.html" className="text-slate-400 hover:text-white transition-colors">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
                  </svg>
                </a>
                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center">
                  <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                  </svg>
                </div>
                <div>
                  <h1 className="font-bold text-white">AI Agent Hub</h1>
                  <p className="text-xs text-cyan-400">8 Specialized Agents</p>
                </div>
              </div>
            </div>

            <div className="flex-1 overflow-y-auto scrollbar-thin p-4 space-y-2">
              {AGENTS.map(agent => (
                <button
                  key={agent.id}
                  onClick={() => setSelectedAgent(agent)}
                  className={`w-full p-3 rounded-xl text-left transition-all ${
                    selectedAgent?.id === agent.id
                      ? 'bg-slate-800/80 border border-cyan-500/30'
                      : 'hover:bg-slate-800/50 border border-transparent'
                  }`}
                >
                  <div className="flex items-start gap-3">
                    <span className="text-2xl">{agent.icon}</span>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2">
                        <span className="font-medium text-white truncate">{agent.name}</span>
                        {agent.restricted && (
                          <span className="px-1.5 py-0.5 text-[10px] bg-red-500/20 text-red-400 rounded">RBAC</span>
                        )}
                        {agent.cuiMarked && (
                          <span className="px-1.5 py-0.5 text-[10px] bg-amber-500/20 text-amber-400 rounded">CUI</span>
                        )}
                      </div>
                      <p className="text-xs text-slate-400 truncate">{agent.role}</p>
                    </div>
                    <div 
                      className="w-2 h-2 rounded-full mt-2"
                      style={{ backgroundColor: agent.color }}
                    ></div>
                  </div>
                </button>
              ))}
            </div>

            <div className="p-4 border-t border-slate-700/50">
              <p className="text-xs text-slate-500 text-center">
                Powered by Claude API • MissionPulse v12
              </p>
            </div>
          </aside>

          {/* Main Chat Area */}
          <main className="flex-1 flex flex-col">
            {selectedAgent ? (
              <>
                {/* Agent Header */}
                <header className="glass border-b border-slate-700/50 p-4">
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-4">
                      <div 
                        className="w-12 h-12 rounded-xl flex items-center justify-center text-2xl"
                        style={{ backgroundColor: `${selectedAgent.color}20` }}
                      >
                        {selectedAgent.icon}
                      </div>
                      <div>
                        <h2 className="text-lg font-bold text-white">{selectedAgent.name}</h2>
                        <p className="text-sm text-slate-400">{selectedAgent.description}</p>
                      </div>
                    </div>
                    <div className="flex items-center gap-2">
                      {selectedAgent.capabilities.map((cap, idx) => (
                        <span 
                          key={idx}
                          className="px-2 py-1 text-xs rounded-full bg-slate-800/50 text-slate-400 border border-slate-700"
                        >
                          {cap}
                        </span>
                      ))}
                    </div>
                  </div>
                </header>

                {/* Messages */}
                <div className="flex-1 overflow-y-auto scrollbar-thin p-6 space-y-4">
                  {messages.length === 0 && (
                    <div className="text-center py-16">
                      <span className="text-6xl mb-4 block">{selectedAgent.icon}</span>
                      <h3 className="text-xl font-bold text-white mb-2">Start a conversation</h3>
                      <p className="text-slate-400 max-w-md mx-auto">{selectedAgent.description}</p>
                      <div className="mt-6 flex flex-wrap justify-center gap-2">
                        {['How can you help?', 'Show me an example', 'What data do you have access to?'].map((q, i) => (
                          <button
                            key={i}
                            onClick={() => setInput(q)}
                            className="px-4 py-2 rounded-full bg-slate-800/50 text-slate-300 text-sm hover:bg-slate-700/50 transition-colors"
                          >
                            {q}
                          </button>
                        ))}
                      </div>
                    </div>
                  )}
                  {messages.map((msg, idx) => (
                    <Message key={idx} message={msg} agentColor={selectedAgent.color} />
                  ))}
                  {isTyping && <TypingIndicator agentColor={selectedAgent.color} />}
                  <div ref={messagesEndRef} />
                </div>

                {/* Input */}
                <div className="p-4 border-t border-slate-700/50">
                  <div className="flex items-center gap-3">
                    <input
                      ref={inputRef}
                      type="text"
                      value={input}
                      onChange={(e) => setInput(e.target.value)}
                      onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                      placeholder={`Ask ${selectedAgent.name}...`}
                      className="flex-1 px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500/50"
                    />
                    <button
                      onClick={handleSend}
                      disabled={!input.trim()}
                      className="px-6 py-3 bg-gradient-to-r from-cyan-500 to-teal-500 text-white font-medium rounded-xl hover:from-cyan-400 hover:to-teal-400 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                      Send
                    </button>
                  </div>
                </div>
              </>
            ) : (
              /* No Agent Selected */
              <div className="flex-1 flex items-center justify-center">
                <div className="text-center">
                  <div className="w-24 h-24 mx-auto rounded-2xl bg-gradient-to-br from-cyan-500/20 to-purple-500/20 flex items-center justify-center mb-6">
                    <svg className="w-12 h-12 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                  </div>
                  <h2 className="text-2xl font-bold text-white mb-2">Select an AI Agent</h2>
                  <p className="text-slate-400 mb-8 max-w-md">
                    Choose from 8 specialized agents to help with capture, strategy, pricing, compliance, and more.
                  </p>
                  <div className="grid grid-cols-4 gap-4 max-w-2xl">
                    {AGENTS.slice(0, 4).map(agent => (
                      <button
                        key={agent.id}
                        onClick={() => setSelectedAgent(agent)}
                        className="p-4 rounded-xl bg-slate-800/30 hover:bg-slate-800/50 border border-slate-700 hover:border-cyan-500/30 transition-all"
                      >
                        <span className="text-3xl block mb-2">{agent.icon}</span>
                        <span className="text-sm text-white">{agent.name.split(' ')[0]}</span>
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<AgentHub />);
  </script>
</body>
</html>
