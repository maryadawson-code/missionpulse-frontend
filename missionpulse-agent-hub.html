<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | AI Agent Hub</title>
  <link rel="icon" type="image/png" href="MMT_icon_32px.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; color: #e2e8f0; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .animate-pulse { animation: pulse 2s infinite; }
    .animate-float { animation: float 3s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useRef } = React;

const CONFIG = {
  SUPABASE_URL: 'https://qdrtpnpnhkxvfmvfziop.supabase.co',
  API_URL: 'https://missionpulse-api.onrender.com',
  LOGIN_PAGE: 'login.html',
  DASHBOARD_PAGE: 'missionpulse-dashboard-hub.html'
};

const checkAuth = () => {
  const session = localStorage.getItem('MP_SESSION');
  const userStr = localStorage.getItem('MP_USER');
  if (!session || !userStr) {
    const demoUser = { email: 'demo@missionmeetstech.com', name: 'Demo User', role: 'CEO', isDemo: true };
    localStorage.setItem('MP_SESSION', JSON.stringify({ created: Date.now(), isDemo: true }));
    localStorage.setItem('MP_USER', JSON.stringify(demoUser));
    return demoUser;
  }
  try { return JSON.parse(userStr); } catch { return null; }
};

const AGENTS = [
  { 
    id: 'capture', 
    name: 'Capture Agent', 
    icon: '🎯', 
    color: '#f472b6',
    description: 'Opportunity qualification and capture strategy',
    capabilities: ['Analyze RFP requirements', 'Score opportunity fit', 'Recommend go/no-go decisions', 'Identify key discriminators'],
    prompt: 'You are a capture management expert helping with federal proposal opportunities.'
  },
  { 
    id: 'strategy', 
    name: 'Strategy Agent', 
    icon: '♟️', 
    color: '#818cf8',
    description: 'Win themes and competitive positioning',
    capabilities: ['Develop win themes', 'Create value propositions', 'Position against competitors', 'Identify proof points'],
    prompt: 'You are a strategic proposal consultant specializing in federal contracting.'
  },
  { 
    id: 'blackhat', 
    name: 'Black Hat Agent', 
    icon: '🎭', 
    color: '#ef4444',
    description: 'Competitive intelligence analysis',
    capabilities: ['Analyze competitor strengths', 'Identify vulnerabilities', 'Ghost team recommendations', 'Price-to-win analysis'],
    prompt: 'You are a competitive intelligence analyst for federal proposals.',
    restricted: ['CEO', 'COO', 'CAP', 'Admin']
  },
  { 
    id: 'pricing', 
    name: 'Pricing Agent', 
    icon: '💰', 
    color: '#4ade80',
    description: 'Cost estimation and BOE development',
    capabilities: ['Build labor categories', 'Calculate indirect rates', 'Develop BOE narratives', 'Validate GSA pricing'],
    prompt: 'You are a federal pricing specialist with expertise in BOE development.',
    restricted: ['CEO', 'COO', 'FIN', 'Admin']
  },
  { 
    id: 'compliance', 
    name: 'Compliance Agent', 
    icon: '✅', 
    color: '#2dd4bf',
    description: 'FAR/DFARS compliance checking',
    capabilities: ['Parse RFP requirements', 'Build compliance matrices', 'Flag missing sections', 'Validate FAR citations'],
    prompt: 'You are a federal compliance expert specializing in FAR/DFARS requirements.'
  },
  { 
    id: 'writer', 
    name: 'Writer Agent', 
    icon: '✍️', 
    color: '#c084fc',
    description: 'Proposal content development',
    capabilities: ['Draft section content', 'Edit for compliance', 'Strengthen proof points', 'Apply win themes'],
    prompt: 'You are an expert federal proposal writer with Shipley methodology experience.'
  },
  { 
    id: 'contracts', 
    name: 'Contracts Agent', 
    icon: '⚖️', 
    color: '#a78bfa',
    description: 'Contract terms and risk analysis',
    capabilities: ['Review contract clauses', 'Identify risk areas', 'Suggest modifications', 'Explain legal terms'],
    prompt: 'You are a federal contracts specialist with expertise in government contract law.'
  },
  { 
    id: 'orals', 
    name: 'Orals Agent', 
    icon: '🎤', 
    color: '#f472b6',
    description: 'Presentation preparation',
    capabilities: ['Develop talking points', 'Anticipate Q&A', 'Coach presenters', 'Review slide content'],
    prompt: 'You are an orals presentation coach for federal proposal teams.'
  }
];

const Icons = {
  back: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>,
  send: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>,
  refresh: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
};

function AgentCard({ agent, isSelected, onClick, userRole }) {
  // RBAC - hide restricted agents
  if (agent.restricted && !agent.restricted.includes(userRole) && userRole !== 'Admin') {
    return null;
  }
  
  return (
    <button
      onClick={onClick}
      className={`text-left p-4 rounded-xl transition-all ${
        isSelected 
          ? 'bg-cyan-500/20 border-2 border-cyan-500 shadow-lg shadow-cyan-500/20' 
          : 'glass hover:border-slate-600'
      }`}
    >
      <div className="flex items-center gap-3 mb-2">
        <div 
          className="w-10 h-10 rounded-lg flex items-center justify-center text-xl"
          style={{ background: `${agent.color}20`, border: `1px solid ${agent.color}50` }}
        >
          {agent.icon}
        </div>
        <div>
          <div className="font-semibold text-white">{agent.name}</div>
          <div className="text-xs text-slate-400">{agent.description}</div>
        </div>
      </div>
      {agent.restricted && (
        <div className="mt-2 px-2 py-0.5 bg-amber-500/20 border border-amber-500/30 rounded text-xs text-amber-400 inline-block">
          🔒 Restricted
        </div>
      )}
    </button>
  );
}

function ChatMessage({ message, agent }) {
  const isUser = message.role === 'user';
  
  return (
    <div className={`flex gap-3 ${isUser ? 'justify-end' : ''}`}>
      {!isUser && (
        <div 
          className="w-8 h-8 rounded-lg flex items-center justify-center text-sm flex-shrink-0"
          style={{ background: `${agent.color}20` }}
        >
          {agent.icon}
        </div>
      )}
      <div className={`max-w-[80%] rounded-xl px-4 py-3 ${
        isUser 
          ? 'bg-cyan-500/20 border border-cyan-500/30' 
          : 'glass'
      }`}>
        <div className="text-sm text-slate-200 whitespace-pre-wrap">{message.content}</div>
        <div className="text-xs text-slate-500 mt-1">
          {new Date(message.timestamp).toLocaleTimeString()}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [selectedAgent, setSelectedAgent] = useState(AGENTS[0]);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const chatRef = useRef(null);

  useEffect(() => {
    const userData = checkAuth();
    if (userData) setUser(userData);
  }, []);

  useEffect(() => {
    if (chatRef.current) {
      chatRef.current.scrollTop = chatRef.current.scrollHeight;
    }
  }, [messages]);

  const handleSend = async () => {
    if (!input.trim() || loading) return;
    
    const userMessage = {
      role: 'user',
      content: input,
      timestamp: Date.now()
    };
    
    setMessages(prev => [...prev, userMessage]);
    setInput('');
    setLoading(true);

    try {
      // Simulated response for demo
      await new Promise(resolve => setTimeout(resolve, 1500));
      
      const assistantMessage = {
        role: 'assistant',
        content: `As your ${selectedAgent.name}, I can help with: ${selectedAgent.capabilities.join(', ')}.\n\nRegarding your question about "${input.substring(0, 50)}${input.length > 50 ? '...' : ''}":\n\nThis is a demo response. In production, I would connect to the MissionPulse API to provide specific guidance based on your opportunity context and Shipley methodology best practices.`,
        timestamp: Date.now()
      };
      
      setMessages(prev => [...prev, assistantMessage]);
    } catch (error) {
      setMessages(prev => [...prev, {
        role: 'assistant',
        content: 'I apologize, but I encountered an error. Please try again.',
        timestamp: Date.now()
      }]);
    }
    
    setLoading(false);
  };

  const clearChat = () => {
    setMessages([]);
  };

  if (!user) {
    return (
      <div className="min-h-screen flex items-center justify-center">
        <div className="w-8 h-8 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-[#00050F] flex flex-col">
      {/* Header */}
      <header className="glass border-b border-slate-700/50">
        <div className="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <a href={CONFIG.DASHBOARD_PAGE} className="p-2 rounded-lg hover:bg-slate-700 text-slate-400 hover:text-white">
              <Icons.back />
            </a>
            <div className="flex items-center gap-3">
              <span className="text-2xl">🤖</span>
              <div>
                <div className="font-bold text-white">AI Agent Hub</div>
                <div className="text-xs text-slate-400">8 Specialized Proposal Assistants</div>
              </div>
            </div>
          </div>
          <div className="text-sm text-slate-400">
            Logged in as <span className="text-cyan-400">{user.name}</span> ({user.role})
          </div>
        </div>
      </header>

      {/* Main Content */}
      <div className="flex-1 flex max-w-7xl mx-auto w-full">
        {/* Agent Selector */}
        <aside className="w-80 border-r border-slate-700/50 p-4 overflow-y-auto">
          <h2 className="text-sm font-semibold text-slate-400 mb-4">SELECT AGENT</h2>
          <div className="space-y-2">
            {AGENTS.map(agent => (
              <AgentCard
                key={agent.id}
                agent={agent}
                isSelected={selectedAgent.id === agent.id}
                onClick={() => { setSelectedAgent(agent); clearChat(); }}
                userRole={user.role}
              />
            ))}
          </div>
        </aside>

        {/* Chat Area */}
        <main className="flex-1 flex flex-col">
          {/* Agent Header */}
          <div className="glass border-b border-slate-700/50 p-4">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div 
                  className="w-12 h-12 rounded-xl flex items-center justify-center text-2xl animate-float"
                  style={{ background: `${selectedAgent.color}20`, border: `1px solid ${selectedAgent.color}50` }}
                >
                  {selectedAgent.icon}
                </div>
                <div>
                  <div className="font-bold text-white">{selectedAgent.name}</div>
                  <div className="text-xs text-slate-400">{selectedAgent.description}</div>
                </div>
              </div>
              <button 
                onClick={clearChat}
                className="p-2 rounded-lg hover:bg-slate-700 text-slate-400 hover:text-white"
                title="Clear chat"
              >
                <Icons.refresh />
              </button>
            </div>
            <div className="flex flex-wrap gap-2 mt-3">
              {selectedAgent.capabilities.map((cap, i) => (
                <span key={i} className="px-2 py-1 bg-slate-800 rounded text-xs text-slate-400">
                  {cap}
                </span>
              ))}
            </div>
          </div>

          {/* Messages */}
          <div ref={chatRef} className="flex-1 overflow-y-auto p-4 space-y-4">
            {messages.length === 0 && (
              <div className="text-center py-12">
                <div className="text-4xl mb-4">{selectedAgent.icon}</div>
                <div className="text-lg font-semibold text-white mb-2">
                  Start a conversation with {selectedAgent.name}
                </div>
                <div className="text-sm text-slate-400 max-w-md mx-auto">
                  Ask me about {selectedAgent.capabilities.slice(0, 2).join(', ').toLowerCase()}, or any other {selectedAgent.description.toLowerCase()}.
                </div>
              </div>
            )}
            {messages.map((msg, i) => (
              <ChatMessage key={i} message={msg} agent={selectedAgent} />
            ))}
            {loading && (
              <div className="flex gap-3">
                <div 
                  className="w-8 h-8 rounded-lg flex items-center justify-center text-sm"
                  style={{ background: `${selectedAgent.color}20` }}
                >
                  {selectedAgent.icon}
                </div>
                <div className="glass rounded-xl px-4 py-3">
                  <div className="flex gap-1">
                    <span className="w-2 h-2 bg-cyan-400 rounded-full animate-pulse"></span>
                    <span className="w-2 h-2 bg-cyan-400 rounded-full animate-pulse" style={{animationDelay: '0.2s'}}></span>
                    <span className="w-2 h-2 bg-cyan-400 rounded-full animate-pulse" style={{animationDelay: '0.4s'}}></span>
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* Input */}
          <div className="border-t border-slate-700/50 p-4">
            <div className="flex gap-3">
              <input
                type="text"
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyPress={(e) => e.key === 'Enter' && handleSend()}
                placeholder={`Ask ${selectedAgent.name}...`}
                className="flex-1 px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500"
              />
              <button
                onClick={handleSend}
                disabled={loading || !input.trim()}
                className="px-6 py-3 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-xl font-medium hover:opacity-90 disabled:opacity-50 transition"
              >
                <Icons.send />
              </button>
            </div>
          </div>
        </main>
      </div>

      {/* Footer */}
      <footer className="border-t border-slate-800 py-3">
        <div className="max-w-7xl mx-auto px-6 text-center text-xs text-slate-600">
          <span className="text-amber-500">⚠</span> AI GENERATED - REQUIRES HUMAN REVIEW • Mission Meets Tech © 2026
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
