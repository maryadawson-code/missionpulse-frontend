<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Repository | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.15); }
    </style>
</head>
<body class="min-h-screen text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const supabaseUrl = 'https://djuviwarqdvlbgcfuupa.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc0OTc5MzMsImV4cCI6MjA1MzA3MzkzM30.pBPpVaJmVkzhCcUvJPN2KnMGnstuc55sNv8CVsERRPg';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const DEMO_DOCUMENTS = [
            { id: '1', folder_path: '/Technical Volume', document_name: 'Technical Approach v2.1.docx', document_type: 'Word', file_size: 2450000, status: 'final', current_version: 3, tags: ['technical', 'section-l'], updated_at: '2026-02-01T10:30:00Z', is_locked: false },
            { id: '2', folder_path: '/Technical Volume', document_name: 'System Architecture.pdf', document_type: 'PDF', file_size: 5200000, status: 'review', current_version: 2, tags: ['technical', 'diagrams'], updated_at: '2026-02-01T09:15:00Z', is_locked: true, locked_by: 'Sarah M.' },
            { id: '3', folder_path: '/Management Volume', document_name: 'Staffing Plan.docx', document_type: 'Word', file_size: 1800000, status: 'draft', current_version: 1, tags: ['management', 'staffing'], updated_at: '2026-01-31T16:45:00Z', is_locked: false },
            { id: '4', folder_path: '/Cost Volume', document_name: 'BOE Spreadsheet.xlsx', document_type: 'Excel', file_size: 890000, status: 'draft', current_version: 4, tags: ['cost', 'pricing', 'CUI'], updated_at: '2026-01-30T14:20:00Z', is_locked: false },
            { id: '5', folder_path: '/Past Performance', document_name: 'CPARS Summary.pdf', document_type: 'PDF', file_size: 3100000, status: 'final', current_version: 1, tags: ['past-performance'], updated_at: '2026-01-28T11:00:00Z', is_locked: false },
            { id: '6', folder_path: '/Graphics', document_name: 'Org Chart.pptx', document_type: 'PowerPoint', file_size: 4500000, status: 'review', current_version: 2, tags: ['graphics', 'org-chart'], updated_at: '2026-01-29T13:30:00Z', is_locked: false },
            { id: '7', folder_path: '/RFP', document_name: 'Solicitation.pdf', document_type: 'PDF', file_size: 8900000, status: 'reference', current_version: 1, tags: ['rfp', 'government'], updated_at: '2026-01-15T08:00:00Z', is_locked: true }
        ];

        const FOLDERS = ['/Technical Volume', '/Management Volume', '/Cost Volume', '/Past Performance', '/Graphics', '/RFP', '/Templates'];
        const DOC_TYPES = ['Word', 'PDF', 'Excel', 'PowerPoint', 'Image', 'Other'];
        const STATUSES = ['draft', 'review', 'final', 'reference', 'archived'];

        function DocumentRepository() {
            const [documents, setDocuments] = useState([]);
            const [loading, setLoading] = useState(true);
            const [currentFolder, setCurrentFolder] = useState('/');
            const [selectedDoc, setSelectedDoc] = useState(null);
            const [viewMode, setViewMode] = useState('grid');
            const [searchTerm, setSearchTerm] = useState('');
            const [showUploadModal, setShowUploadModal] = useState(false);
            const [newDoc, setNewDoc] = useState({ document_name: '', document_type: 'Word', folder_path: '/', description: '', tags: '' });

            useEffect(() => { fetchDocuments(); }, []);

            async function fetchDocuments() {
                try {
                    const { data, error } = await supabase.from('documents').select('*').order('updated_at', { ascending: false });
                    if (error) throw error;
                    setDocuments(data?.length > 0 ? data : DEMO_DOCUMENTS);
                } catch (err) {
                    console.log('Using demo data:', err.message);
                    setDocuments(DEMO_DOCUMENTS);
                }
                setLoading(false);
            }

            function handleUpload() {
                const doc = {
                    id: Date.now().toString(),
                    ...newDoc,
                    tags: newDoc.tags.split(',').map(t => t.trim()).filter(Boolean),
                    file_size: Math.floor(Math.random() * 5000000) + 500000,
                    status: 'draft',
                    current_version: 1,
                    is_locked: false,
                    updated_at: new Date().toISOString()
                };
                setDocuments([doc, ...documents]);
                setShowUploadModal(false);
                setNewDoc({ document_name: '', document_type: 'Word', folder_path: '/', description: '', tags: '' });
            }

            function formatFileSize(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            }

            function formatDate(dateStr) {
                return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
            }

            const typeIcon = (type) => ({
                'Word': '📄',
                'PDF': '📕',
                'Excel': '📊',
                'PowerPoint': '📽️',
                'Image': '🖼️',
                'Other': '📎'
            }[type] || '📄');

            const statusColor = (status) => ({
                'draft': 'bg-gray-500/20 text-gray-400',
                'review': 'bg-amber-500/20 text-amber-400',
                'final': 'bg-emerald-500/20 text-emerald-400',
                'reference': 'bg-blue-500/20 text-blue-400',
                'archived': 'bg-gray-500/20 text-gray-500'
            }[status] || 'bg-gray-500/20 text-gray-400');

            // Get unique folders from documents
            const allFolders = [...new Set(documents.map(d => d.folder_path))].sort();
            
            // Filter documents
            const filteredDocs = documents.filter(d => {
                if (currentFolder !== '/' && d.folder_path !== currentFolder) return false;
                if (searchTerm && !d.document_name.toLowerCase().includes(searchTerm.toLowerCase()) &&
                    !d.tags?.some(t => t.toLowerCase().includes(searchTerm.toLowerCase()))) return false;
                return true;
            });

            const stats = {
                total: documents.length,
                draft: documents.filter(d => d.status === 'draft').length,
                review: documents.filter(d => d.status === 'review').length,
                final: documents.filter(d => d.status === 'final').length
            };

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="border-b border-cyan-500/20 bg-black/40 backdrop-blur-xl sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <a href="index.html" className="text-cyan-400 hover:text-cyan-300">← Back</a>
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-400 to-indigo-600 flex items-center justify-center text-xl">📁</div>
                                    <div>
                                        <h1 className="text-xl font-bold">Document Repository</h1>
                                        <p className="text-xs text-gray-400">Organize • Version • Collaborate</p>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="flex bg-white/10 rounded-lg p-1">
                                    <button onClick={() => setViewMode('grid')} className={`px-3 py-1 rounded text-sm ${viewMode === 'grid' ? 'bg-cyan-500 text-white' : 'text-gray-400'}`}>Grid</button>
                                    <button onClick={() => setViewMode('list')} className={`px-3 py-1 rounded text-sm ${viewMode === 'list' ? 'bg-cyan-500 text-white' : 'text-gray-400'}`}>List</button>
                                </div>
                                <button onClick={() => setShowUploadModal(true)} className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium transition-all">
                                    + Upload
                                </button>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto px-6 py-8">
                        {/* Stats */}
                        <div className="grid grid-cols-4 gap-4 mb-6">
                            <div className="glass-card rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-cyan-400">{stats.total}</div>
                                <div className="text-sm text-gray-400">Total Files</div>
                            </div>
                            <div className="glass-card rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-gray-400">{stats.draft}</div>
                                <div className="text-sm text-gray-400">Drafts</div>
                            </div>
                            <div className="glass-card rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-amber-400">{stats.review}</div>
                                <div className="text-sm text-gray-400">In Review</div>
                            </div>
                            <div className="glass-card rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-emerald-400">{stats.final}</div>
                                <div className="text-sm text-gray-400">Final</div>
                            </div>
                        </div>

                        <div className="grid lg:grid-cols-4 gap-6">
                            {/* Sidebar - Folders */}
                            <div className="lg:col-span-1">
                                <div className="glass-card rounded-xl p-4">
                                    <h3 className="font-semibold mb-4">Folders</h3>
                                    <div className="space-y-1">
                                        <button onClick={() => setCurrentFolder('/')}
                                            className={`w-full text-left px-3 py-2 rounded-lg text-sm flex items-center gap-2 ${currentFolder === '/' ? 'bg-cyan-500/20 text-cyan-400' : 'hover:bg-white/5'}`}>
                                            📂 All Documents
                                        </button>
                                        {FOLDERS.map(folder => (
                                            <button key={folder} onClick={() => setCurrentFolder(folder)}
                                                className={`w-full text-left px-3 py-2 rounded-lg text-sm flex items-center gap-2 ${currentFolder === folder ? 'bg-cyan-500/20 text-cyan-400' : 'hover:bg-white/5'}`}>
                                                📁 {folder.replace('/', '')}
                                                <span className="ml-auto text-xs text-gray-500">
                                                    {documents.filter(d => d.folder_path === folder).length}
                                                </span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* Main Content */}
                            <div className="lg:col-span-3">
                                {/* Search */}
                                <div className="mb-4">
                                    <input
                                        type="text"
                                        placeholder="Search documents..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500"
                                    />
                                </div>

                                {/* Document Grid/List */}
                                {viewMode === 'grid' ? (
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                        {filteredDocs.map(doc => (
                                            <div key={doc.id} onClick={() => setSelectedDoc(doc)}
                                                className={`glass-card rounded-xl p-4 cursor-pointer transition-all hover:border-cyan-500/40 ${selectedDoc?.id === doc.id ? 'border-cyan-500/50 bg-cyan-500/10' : ''}`}>
                                                <div className="flex items-start justify-between mb-3">
                                                    <span className="text-3xl">{typeIcon(doc.document_type)}</span>
                                                    {doc.is_locked && <span className="text-amber-400" title={`Locked by ${doc.locked_by}`}>🔒</span>}
                                                </div>
                                                <h4 className="font-medium text-sm truncate mb-1">{doc.document_name}</h4>
                                                <div className="flex items-center justify-between text-xs">
                                                    <span className={`px-2 py-0.5 rounded ${statusColor(doc.status)}`}>{doc.status}</span>
                                                    <span className="text-gray-500">v{doc.current_version}</span>
                                                </div>
                                                <div className="text-xs text-gray-500 mt-2">{formatFileSize(doc.file_size)}</div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="glass-card rounded-xl overflow-hidden">
                                        <table className="w-full">
                                            <thead>
                                                <tr className="border-b border-white/10 text-left text-sm text-gray-500">
                                                    <th className="p-3">Name</th>
                                                    <th className="p-3">Type</th>
                                                    <th className="p-3">Status</th>
                                                    <th className="p-3">Size</th>
                                                    <th className="p-3">Version</th>
                                                    <th className="p-3">Modified</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {filteredDocs.map(doc => (
                                                    <tr key={doc.id} onClick={() => setSelectedDoc(doc)}
                                                        className={`border-b border-white/5 hover:bg-white/5 cursor-pointer ${selectedDoc?.id === doc.id ? 'bg-cyan-500/10' : ''}`}>
                                                        <td className="p-3">
                                                            <div className="flex items-center gap-2">
                                                                <span>{typeIcon(doc.document_type)}</span>
                                                                <span className="truncate max-w-[200px]">{doc.document_name}</span>
                                                                {doc.is_locked && <span className="text-amber-400">🔒</span>}
                                                            </div>
                                                        </td>
                                                        <td className="p-3 text-sm text-gray-400">{doc.document_type}</td>
                                                        <td className="p-3"><span className={`px-2 py-0.5 rounded text-xs ${statusColor(doc.status)}`}>{doc.status}</span></td>
                                                        <td className="p-3 text-sm text-gray-400">{formatFileSize(doc.file_size)}</td>
                                                        <td className="p-3 text-sm text-gray-400">v{doc.current_version}</td>
                                                        <td className="p-3 text-sm text-gray-400">{formatDate(doc.updated_at)}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {filteredDocs.length === 0 && (
                                    <div className="text-center py-12 text-gray-500">No documents found in this folder.</div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Upload Modal */}
                    {showUploadModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                            <div className="glass-card rounded-2xl p-6 w-full max-w-md">
                                <h2 className="text-xl font-bold mb-6">Upload Document</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-1">Document Name *</label>
                                        <input type="text" value={newDoc.document_name} onChange={(e) => setNewDoc({...newDoc, document_name: e.target.value})}
                                            placeholder="e.g., Technical Approach v1.docx"
                                            className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm text-gray-400 mb-1">Type</label>
                                            <select value={newDoc.document_type} onChange={(e) => setNewDoc({...newDoc, document_type: e.target.value})}
                                                className="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2">
                                                {DOC_TYPES.map(t => <option key={t}>{t}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm text-gray-400 mb-1">Folder</label>
                                            <select value={newDoc.folder_path} onChange={(e) => setNewDoc({...newDoc, folder_path: e.target.value})}
                                                className="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2">
                                                {FOLDERS.map(f => <option key={f} value={f}>{f.replace('/', '')}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-1">Description</label>
                                        <textarea value={newDoc.description} onChange={(e) => setNewDoc({...newDoc, description: e.target.value})}
                                            rows={2} className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                    </div>
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-1">Tags (comma-separated)</label>
                                        <input type="text" value={newDoc.tags} onChange={(e) => setNewDoc({...newDoc, tags: e.target.value})}
                                            placeholder="e.g., technical, section-l"
                                            className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                    </div>
                                    <div className="border-2 border-dashed border-white/20 rounded-lg p-8 text-center">
                                        <div className="text-4xl mb-2">📤</div>
                                        <p className="text-sm text-gray-400">Drop files here or click to browse</p>
                                        <p className="text-xs text-gray-500 mt-1">(Demo mode - file upload simulated)</p>
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 mt-6">
                                    <button onClick={() => setShowUploadModal(false)} className="px-4 py-2 border border-white/20 rounded-lg hover:bg-white/5">Cancel</button>
                                    <button onClick={handleUpload} disabled={!newDoc.document_name}
                                        className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium disabled:opacity-50">Upload</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Document Detail Panel */}
                    {selectedDoc && (
                        <div className="fixed inset-y-0 right-0 w-96 bg-[#001020] border-l border-cyan-500/20 p-6 z-40 overflow-y-auto">
                            <div className="flex items-center justify-between mb-6">
                                <h3 className="font-semibold">Document Details</h3>
                                <button onClick={() => setSelectedDoc(null)} className="text-gray-400 hover:text-white">✕</button>
                            </div>
                            <div className="text-center mb-6">
                                <span className="text-6xl">{typeIcon(selectedDoc.document_type)}</span>
                            </div>
                            <h4 className="font-medium mb-2">{selectedDoc.document_name}</h4>
                            <div className="space-y-3 text-sm">
                                <div className="flex justify-between">
                                    <span className="text-gray-500">Status</span>
                                    <span className={`px-2 py-0.5 rounded ${statusColor(selectedDoc.status)}`}>{selectedDoc.status}</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-gray-500">Version</span>
                                    <span>v{selectedDoc.current_version}</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-gray-500">Size</span>
                                    <span>{formatFileSize(selectedDoc.file_size)}</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-gray-500">Modified</span>
                                    <span>{formatDate(selectedDoc.updated_at)}</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-gray-500">Folder</span>
                                    <span>{selectedDoc.folder_path}</span>
                                </div>
                                {selectedDoc.is_locked && (
                                    <div className="flex justify-between">
                                        <span className="text-gray-500">Locked By</span>
                                        <span className="text-amber-400">{selectedDoc.locked_by}</span>
                                    </div>
                                )}
                            </div>
                            {selectedDoc.tags?.length > 0 && (
                                <div className="mt-4">
                                    <div className="text-sm text-gray-500 mb-2">Tags</div>
                                    <div className="flex flex-wrap gap-2">
                                        {selectedDoc.tags.map((tag, i) => (
                                            <span key={i} className="px-2 py-1 bg-white/10 rounded text-xs">{tag}</span>
                                        ))}
                                    </div>
                                </div>
                            )}
                            <div className="mt-6 space-y-2">
                                <button className="w-full px-4 py-2 bg-cyan-500/20 text-cyan-400 rounded-lg text-sm hover:bg-cyan-500/30">
                                    📥 Download
                                </button>
                                <button className="w-full px-4 py-2 bg-white/10 rounded-lg text-sm hover:bg-white/20">
                                    📤 Upload New Version
                                </button>
                                <button className="w-full px-4 py-2 bg-white/10 rounded-lg text-sm hover:bg-white/20">
                                    🔒 {selectedDoc.is_locked ? 'Unlock' : 'Lock'} Document
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<DocumentRepository />, document.getElementById('root'));
    </script>
</body>
</html>
