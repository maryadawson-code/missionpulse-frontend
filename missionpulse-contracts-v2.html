<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contract Scanner | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:#00050F;color:#e2e8f0;min-height:100vh}.glass{background:rgba(15,23,42,0.85);backdrop-filter:blur(16px);border:1px solid rgba(0,229,250,0.1);border-radius:12px}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const SUPABASE_URL='https://qdrtpnpnhkxvfmvfziop.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
const supabase=window.supabase?.createClient(SUPABASE_URL,SUPABASE_ANON);

const DEMO_CLAUSES=[
  {id:1,clause_number:'FAR 52.212-4',title:'Contract Terms and Conditions',category:'FAR',risk_level:'LOW',compliance_status:'complete'},
  {id:2,clause_number:'FAR 52.219-14',title:'Limitations on Subcontracting',category:'FAR',risk_level:'HIGH',compliance_status:'in_progress'},
  {id:3,clause_number:'DFARS 252.204-7012',title:'Safeguarding Covered Defense Information',category:'DFARS',risk_level:'CRITICAL',compliance_status:'pending'},
  {id:4,clause_number:'FAR 52.222-50',title:'Combating Trafficking in Persons',category:'FAR',risk_level:'MEDIUM',compliance_status:'complete'},
  {id:5,clause_number:'DFARS 252.239-7010',title:'Cloud Computing Services',category:'DFARS',risk_level:'HIGH',compliance_status:'in_progress'}
];

function ContractScanner(){
  const[connected,setConnected]=useState(false);
  const[clauses,setClauses]=useState(DEMO_CLAUSES);
  const[filter,setFilter]=useState('all');
  const[analyzing,setAnalyzing]=useState(false);

  useEffect(()=>{
    const load=async()=>{
      try{
        const{data,error}=await supabase.from('contract_clauses').select('*');
        if(!error&&data?.length)setClauses(data);
        setConnected(!error);
      }catch{setConnected(false)}
    };
    load();
  },[]);

  const riskColor={LOW:'bg-emerald-500/20 text-emerald-400',MEDIUM:'bg-amber-500/20 text-amber-400',HIGH:'bg-orange-500/20 text-orange-400',CRITICAL:'bg-red-500/20 text-red-400'};
  const statusColor={complete:'bg-emerald-500/20 text-emerald-400',in_progress:'bg-cyan-500/20 text-cyan-400',pending:'bg-slate-500/20 text-slate-400'};
  const filtered=filter==='all'?clauses:clauses.filter(c=>c.risk_level===filter);

  const runAnalysis=()=>{
    setAnalyzing(true);
    setTimeout(()=>setAnalyzing(false),2000);
  };

  return(
    <div className="min-h-screen p-6">
      <div className="flex justify-between items-start mb-6">
        <div>
          <h1 className="text-2xl font-bold text-white flex items-center gap-3">📜 Contract Scanner<span className={`text-xs px-2 py-1 rounded ${connected?'bg-emerald-500/20 text-emerald-400':'bg-red-500/20 text-red-400'}`}>{connected?'● Live':'○ Demo'}</span></h1>
          <p className="text-slate-400 text-sm mt-1">FAR/DFARS clause analysis and risk assessment</p>
        </div>
        <button onClick={runAnalysis} disabled={analyzing} className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-lg disabled:opacity-50">
          {analyzing?'🔄 Analyzing...':'🤖 AI Analyze Clauses'}
        </button>
      </div>

      <div className="grid grid-cols-4 gap-4 mb-6">
        <div className="glass p-4"><div className="text-slate-400 text-xs">Total Clauses</div><div className="text-2xl font-bold text-white">{clauses.length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Critical Risk</div><div className="text-2xl font-bold text-red-400">{clauses.filter(c=>c.risk_level==='CRITICAL').length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">High Risk</div><div className="text-2xl font-bold text-orange-400">{clauses.filter(c=>c.risk_level==='HIGH').length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Compliant</div><div className="text-2xl font-bold text-emerald-400">{clauses.filter(c=>c.compliance_status==='complete').length}</div></div>
      </div>

      <div className="flex gap-2 mb-4">
        {['all','CRITICAL','HIGH','MEDIUM','LOW'].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} className={`px-3 py-1.5 rounded-lg text-sm ${filter===f?'bg-cyan-500 text-white':'bg-slate-800 text-slate-400'}`}>
            {f==='all'?'All':f}
          </button>
        ))}
      </div>

      <div className="glass overflow-hidden">
        <table className="w-full">
          <thead className="bg-slate-800/50">
            <tr>{['Clause','Title','Category','Risk','Status','Actions'].map(h=><th key={h} className="text-left p-3 text-xs font-semibold text-slate-400 uppercase">{h}</th>)}</tr>
          </thead>
          <tbody className="divide-y divide-slate-700/30">
            {filtered.map(c=>(
              <tr key={c.id} className="hover:bg-slate-800/30">
                <td className="p-3 font-mono text-cyan-400">{c.clause_number}</td>
                <td className="p-3 text-white">{c.title}</td>
                <td className="p-3"><span className="px-2 py-0.5 rounded bg-slate-700 text-slate-300 text-xs">{c.category}</span></td>
                <td className="p-3"><span className={`px-2 py-0.5 rounded text-xs ${riskColor[c.risk_level]}`}>{c.risk_level}</span></td>
                <td className="p-3"><span className={`px-2 py-0.5 rounded text-xs ${statusColor[c.compliance_status]}`}>{c.compliance_status}</span></td>
                <td className="p-3"><button className="text-cyan-400 hover:text-cyan-300 text-sm">Analyze</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="text-center text-xs text-slate-500 mt-8">AI GENERATED - REQUIRES HUMAN REVIEW | © 2026 Mission Meets Tech</div>
    </div>
  );
}
ReactDOM.render(<ContractScanner/>,document.getElementById('root'));
</script>
</body>
</html>
