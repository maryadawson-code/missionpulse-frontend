<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Launch & ROI</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --mmt-cyan: #00E5FA; --mmt-navy: #00050F; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--mmt-navy); color: #e2e8f0; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .animate-pulse { animation: pulse 2s infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

const CONFIG = {
  SUPABASE_URL: 'https://qdrtpnpnhkxvfmvfziop.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8',
  LOGIN_PAGE: 'login.html'
};

const SUBMISSION_CHECKLIST = [
  { id: 1, item: 'All volumes compiled and formatted', status: 'complete' },
  { id: 2, item: 'Page count within limits', status: 'complete' },
  { id: 3, item: 'Compliance matrix 100%', status: 'complete' },
  { id: 4, item: 'CEO/COO final approval', status: 'pending' },
  { id: 5, item: 'Partner access revoked', status: 'pending' },
  { id: 6, item: 'Upload to submission portal', status: 'not_started' },
  { id: 7, item: 'Confirmation receipt saved', status: 'not_started' }
];

const ROI_METRICS = {
  proposalHours: 340,
  traditionalHours: 520,
  hoursSaved: 180,
  costPerHour: 150,
  costSavings: 27000,
  winRateImpact: 18
};

function checkAuth() {
  const session = localStorage.getItem('MP_SESSION');
  if (!session) { window.location.href = CONFIG.LOGIN_PAGE; return null; }
  try { return JSON.parse(localStorage.getItem('MP_USER')); }
  catch { return { email: 'demo@mmt.com', role: 'CEO', name: 'Demo User' }; }
}

function ChecklistItem({ item }) {
  const statusIcons = { complete: '✅', pending: '🔄', not_started: '⬜' };
  const statusColors = { complete: 'text-green-400', pending: 'text-amber-400', not_started: 'text-slate-500' };
  return (
    <div className="flex items-center gap-3 py-2">
      <span className="text-lg">{statusIcons[item.status]}</span>
      <span className={`${statusColors[item.status]} ${item.status === 'complete' ? '' : ''}`}>{item.item}</span>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [checklist, setChecklist] = useState(SUBMISSION_CHECKLIST);
  const [countdown, setCountdown] = useState({ days: 2, hours: 14, minutes: 32 });
  const [submitted, setSubmitted] = useState(false);

  useEffect(() => {
    const authUser = checkAuth();
    if (authUser) setUser(authUser);
  }, []);

  const completedCount = checklist.filter(c => c.status === 'complete').length;
  const readyToSubmit = completedCount === checklist.length;

  const handleSubmit = () => {
    if (confirm('🚀 Confirm proposal submission? This action cannot be undone.')) {
      setSubmitted(true);
    }
  };

  if (!user) return <div className="min-h-screen flex items-center justify-center text-cyan-400">Loading...</div>;

  return (
    <div className="min-h-screen bg-slate-950">
      <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            </a>
            <div>
              <h1 className="text-xl font-bold text-white">🚀 Launch & ROI</h1>
              <p className="text-sm text-slate-400">Final Submission & Value Metrics</p>
            </div>
          </div>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-6 space-y-6">
        {submitted ? (
          /* Success State */
          <div className="glass rounded-xl p-12 text-center border border-green-500/30">
            <div className="text-6xl mb-4">🎉</div>
            <h2 className="text-3xl font-bold text-green-400 mb-2">Proposal Submitted!</h2>
            <p className="text-slate-400 mb-6">VA EHR Modernization - Submitted Jan 30, 2026 at 2:45 PM EST</p>
            <p className="text-sm text-slate-500">Confirmation #: VA-EHRM-2026-001-MMT</p>
            <div className="flex justify-center gap-4 mt-8">
              <button className="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg">Download Receipt</button>
              <button onClick={() => window.location.href = 'missionpulse-postaward-v3.html'} className="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg">Start Post-Award</button>
            </div>
          </div>
        ) : (
          <>
            {/* Countdown */}
            <div className="glass rounded-xl p-6 text-center">
              <h2 className="text-lg text-slate-400 mb-2">Time to Submission Deadline</h2>
              <div className="flex justify-center gap-8">
                <div><span className="text-5xl font-bold text-red-400">{countdown.days}</span><p className="text-sm text-slate-500">Days</p></div>
                <div><span className="text-5xl font-bold text-amber-400">{countdown.hours}</span><p className="text-sm text-slate-500">Hours</p></div>
                <div><span className="text-5xl font-bold text-cyan-400">{countdown.minutes}</span><p className="text-sm text-slate-500">Minutes</p></div>
              </div>
              <p className="text-sm text-slate-500 mt-4">Due: February 2, 2026 at 5:00 PM EST</p>
            </div>

            <div className="grid grid-cols-2 gap-6">
              {/* Checklist */}
              <div className="glass rounded-xl p-6">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-lg font-semibold text-white">Submission Checklist</h2>
                  <span className="text-sm text-cyan-400">{completedCount}/{checklist.length}</span>
                </div>
                <div className="space-y-1">
                  {checklist.map(item => <ChecklistItem key={item.id} item={item} />)}
                </div>
                <div className="mt-6 pt-4 border-t border-slate-700/50">
                  <div className="w-full h-3 bg-slate-700 rounded-full overflow-hidden">
                    <div className="h-full bg-gradient-to-r from-cyan-500 to-green-500 rounded-full transition-all" style={{ width: `${(completedCount / checklist.length) * 100}%` }} />
                  </div>
                  <p className="text-xs text-slate-500 mt-2">{Math.round((completedCount / checklist.length) * 100)}% ready</p>
                </div>
              </div>

              {/* ROI Metrics */}
              <div className="glass rounded-xl p-6">
                <h2 className="text-lg font-semibold text-white mb-4">MissionPulse ROI</h2>
                <div className="space-y-4">
                  <div className="flex justify-between items-center p-3 bg-slate-800/50 rounded-lg">
                    <span className="text-slate-400">Hours with MissionPulse</span>
                    <span className="text-2xl font-bold text-cyan-400">{ROI_METRICS.proposalHours}</span>
                  </div>
                  <div className="flex justify-between items-center p-3 bg-slate-800/50 rounded-lg">
                    <span className="text-slate-400">Traditional Hours</span>
                    <span className="text-2xl font-bold text-slate-500 line-through">{ROI_METRICS.traditionalHours}</span>
                  </div>
                  <div className="flex justify-between items-center p-3 bg-green-500/10 rounded-lg border border-green-500/30">
                    <span className="text-green-400">Hours Saved</span>
                    <span className="text-2xl font-bold text-green-400">{ROI_METRICS.hoursSaved} hrs</span>
                  </div>
                  <div className="flex justify-between items-center p-3 bg-green-500/10 rounded-lg border border-green-500/30">
                    <span className="text-green-400">Cost Savings</span>
                    <span className="text-2xl font-bold text-green-400">${ROI_METRICS.costSavings.toLocaleString()}</span>
                  </div>
                  <div className="flex justify-between items-center p-3 bg-purple-500/10 rounded-lg border border-purple-500/30">
                    <span className="text-purple-400">Win Rate Impact</span>
                    <span className="text-2xl font-bold text-purple-400">+{ROI_METRICS.winRateImpact}%</span>
                  </div>
                </div>
              </div>
            </div>

            {/* Submit Button */}
            <div className="glass rounded-xl p-6 text-center">
              <button onClick={handleSubmit} disabled={!readyToSubmit} className={`px-8 py-4 rounded-xl font-bold text-lg transition-all ${readyToSubmit ? 'bg-gradient-to-r from-green-600 to-cyan-600 hover:from-green-500 hover:to-cyan-500 animate-pulse' : 'bg-slate-700 text-slate-500 cursor-not-allowed'}`}>
                🚀 {readyToSubmit ? 'LAUNCH PROPOSAL' : 'Complete Checklist First'}
              </button>
              {!readyToSubmit && <p className="text-sm text-slate-500 mt-2">Complete all checklist items to enable submission</p>}
            </div>
          </>
        )}
      </main>

      <footer className="border-t border-slate-800 mt-12">
        <div className="max-w-7xl mx-auto px-4 py-4 text-center text-xs text-slate-500">Mission Meets Tech © 2026 | MissionPulse v3.0 | Launch Module</div>
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
