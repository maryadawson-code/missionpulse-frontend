<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Access Requests Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-cyan { 0%, 100% { box-shadow: 0 0 0 0 rgba(0, 229, 250, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(0, 229, 250, 0); } }
    .pulse-icon { animation: pulse-cyan 2s infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    
    let supabase;
    try {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    } catch (e) {
      console.log('Supabase client init failed');
    }

    // Demo data for offline mode
    const DEMO_REQUESTS = [
      { id: '1', first_name: 'John', last_name: 'Smith', email: 'john.smith@acmegov.com', company: 'ACME Government Solutions', title: 'VP of Capture', company_size: '51-200 employees', use_case: 'Federal Prime Contractor', set_aside: 'SDVOSB', status: 'pending', created_at: '2026-01-29T14:30:00Z' },
      { id: '2', first_name: 'Sarah', last_name: 'Johnson', email: 'sarah.j@federaltech.io', company: 'Federal Tech Partners', title: 'Director of BD', company_size: '11-50 employees', use_case: 'Federal Subcontractor', set_aside: '8(a)', status: 'pending', created_at: '2026-01-29T10:15:00Z' },
      { id: '3', first_name: 'Michael', last_name: 'Chen', email: 'mchen@govwin.net', company: 'GovWin Consulting', title: 'CEO', company_size: '2-10 employees', use_case: 'Consulting/Advisory', set_aside: 'Small Business', status: 'approved', created_at: '2026-01-28T16:45:00Z' },
      { id: '4', first_name: 'Emily', last_name: 'Rodriguez', email: 'emily@defenselogix.com', company: 'DefenseLogix', title: 'Proposal Manager', company_size: '201-500 employees', use_case: 'Federal Prime Contractor', set_aside: 'WOSB/EDWOSB', status: 'pending', created_at: '2026-01-28T09:00:00Z' },
      { id: '5', first_name: 'David', last_name: 'Williams', email: 'dwilliams@cyberdefense.gov', company: 'CyberDefense Inc', title: 'COO', company_size: '51-200 employees', use_case: 'Federal Prime Contractor', set_aside: 'HUBZone', status: 'rejected', created_at: '2026-01-27T11:30:00Z' }
    ];

    // Sidebar Component
    function Sidebar() {
      const navItems = [
        { icon: '🏠', label: 'Dashboard', path: 'index.html' },
        { icon: '📊', label: 'Pipeline', path: 'missionpulse-pipeline-v2.html' },
        { icon: '🎯', label: 'War Room', path: 'missionpulse-warroom-v2.html' },
        { icon: '📋', label: 'Swimlane', path: 'missionpulse-swimlane-v2.html' },
        { icon: '🔍', label: 'RFP Shredder', path: 'missionpulse-rfpshredder-v2.html' },
        { icon: '🎭', label: 'Black Hat', path: 'missionpulse-blackhat-v2.html' },
        { icon: '💰', label: 'Pricing', path: 'missionpulse-pricing-v2.html' },
        { icon: '🤖', label: 'HITL Queue', path: 'missionpulse-hitl-v2.html' },
        { icon: '📚', label: 'Lessons', path: 'missionpulse-lessons-v2.html' },
        { icon: '📜', label: 'Contracts', path: 'missionpulse-contracts-v2.html' },
        { icon: '📝', label: 'Audit', path: 'missionpulse-audit-v2.html' },
        { icon: '⚙️', label: 'Settings', path: 'missionpulse-settings-v2.html' },
        { icon: '👥', label: 'Access Requests', path: 'missionpulse-admin-requests.html', active: true },
        { icon: '🤖', label: 'Agent Hub', path: 'missionpulse-agenthub-v2.html' }
      ];

      return (
        <div className="w-64 bg-slate-900/50 border-r border-slate-700 min-h-screen p-4">
          <div className="flex items-center gap-3 mb-8">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center pulse-icon">
              <span className="text-xl">🛡️</span>
            </div>
            <div>
              <div className="font-bold text-cyan-400">MissionPulse</div>
              <div className="text-xs text-slate-400">Admin Panel</div>
            </div>
          </div>
          
          <nav className="space-y-1">
            {navItems.map((item, i) => (
              <a 
                key={i}
                href={item.path}
                className={`flex items-center gap-3 px-3 py-2 rounded-lg transition-all ${
                  item.active 
                    ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' 
                    : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                }`}
              >
                <span>{item.icon}</span>
                <span className="text-sm">{item.label}</span>
              </a>
            ))}
          </nav>
          
          <div className="absolute bottom-4 left-4 right-4">
            <div className="text-xs text-slate-500 text-center">
              Mission Meets Tech
            </div>
          </div>
        </div>
      );
    }

    // Status Badge
    function StatusBadge({ status }) {
      const styles = {
        pending: 'bg-amber-500/20 text-amber-400 border-amber-500/30',
        approved: 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30',
        rejected: 'bg-red-500/20 text-red-400 border-red-500/30',
        contacted: 'bg-blue-500/20 text-blue-400 border-blue-500/30'
      };
      return (
        <span className={`px-2 py-0.5 rounded-full text-xs border ${styles[status] || styles.pending}`}>
          {status.charAt(0).toUpperCase() + status.slice(1)}
        </span>
      );
    }

    // Request Detail Modal
    function RequestModal({ request, onClose, onUpdate }) {
      const [status, setStatus] = React.useState(request.status);
      const [notes, setNotes] = React.useState(request.notes || '');
      const [saving, setSaving] = React.useState(false);

      const handleSave = async () => {
        setSaving(true);
        await onUpdate(request.id, { status, notes });
        setSaving(false);
        onClose();
      };

      return (
        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
          <div className="bg-slate-800 border border-slate-700 rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div className="p-6 border-b border-slate-700 flex items-center justify-between">
              <h2 className="text-xl font-bold">Access Request Details</h2>
              <button onClick={onClose} className="text-slate-400 hover:text-white">✕</button>
            </div>
            
            <div className="p-6 space-y-6">
              {/* Contact Info */}
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="text-sm text-slate-400">Name</label>
                  <div className="font-medium">{request.first_name} {request.last_name}</div>
                </div>
                <div>
                  <label className="text-sm text-slate-400">Email</label>
                  <div className="font-medium">
                    <a href={`mailto:${request.email}`} className="text-cyan-400 hover:underline">
                      {request.email}
                    </a>
                  </div>
                </div>
                <div>
                  <label className="text-sm text-slate-400">Company</label>
                  <div className="font-medium">{request.company}</div>
                </div>
                <div>
                  <label className="text-sm text-slate-400">Title</label>
                  <div className="font-medium">{request.title || '—'}</div>
                </div>
              </div>

              {/* Company Details */}
              <div className="grid grid-cols-3 gap-4">
                <div>
                  <label className="text-sm text-slate-400">Company Size</label>
                  <div>{request.company_size || '—'}</div>
                </div>
                <div>
                  <label className="text-sm text-slate-400">Use Case</label>
                  <div>{request.use_case || '—'}</div>
                </div>
                <div>
                  <label className="text-sm text-slate-400">Set-Aside</label>
                  <div>{request.set_aside || '—'}</div>
                </div>
              </div>

              {/* Additional Info */}
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="text-sm text-slate-400">Annual Revenue</label>
                  <div>{request.annual_revenue || '—'}</div>
                </div>
                <div>
                  <label className="text-sm text-slate-400">How They Heard</label>
                  <div>{request.hear_about || '—'}</div>
                </div>
              </div>

              {/* Message */}
              {request.message && (
                <div>
                  <label className="text-sm text-slate-400">Message</label>
                  <div className="mt-1 p-3 bg-slate-900 rounded-lg text-sm">{request.message}</div>
                </div>
              )}

              {/* Status Update */}
              <div>
                <label className="text-sm text-slate-400 block mb-2">Status</label>
                <div className="flex gap-2">
                  {['pending', 'contacted', 'approved', 'rejected'].map(s => (
                    <button
                      key={s}
                      onClick={() => setStatus(s)}
                      className={`px-4 py-2 rounded-lg text-sm transition-all ${
                        status === s 
                          ? 'bg-cyan-500 text-slate-900' 
                          : 'bg-slate-700 hover:bg-slate-600'
                      }`}
                    >
                      {s.charAt(0).toUpperCase() + s.slice(1)}
                    </button>
                  ))}
                </div>
              </div>

              {/* Notes */}
              <div>
                <label className="text-sm text-slate-400 block mb-2">Internal Notes</label>
                <textarea
                  value={notes}
                  onChange={(e) => setNotes(e.target.value)}
                  rows={3}
                  placeholder="Add notes about this request..."
                  className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500 resize-none"
                />
              </div>

              {/* Submitted */}
              <div className="text-sm text-slate-500">
                Submitted: {new Date(request.created_at).toLocaleString()}
              </div>
            </div>

            <div className="p-6 border-t border-slate-700 flex justify-end gap-3">
              <button
                onClick={onClose}
                className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm"
              >
                Cancel
              </button>
              <button
                onClick={handleSave}
                disabled={saving}
                className="px-6 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg text-sm font-medium disabled:opacity-50"
              >
                {saving ? 'Saving...' : 'Save Changes'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // Main App
    function App() {
      const [requests, setRequests] = React.useState(DEMO_REQUESTS);
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [filter, setFilter] = React.useState('all');
      const [selectedRequest, setSelectedRequest] = React.useState(null);

      React.useEffect(() => {
        loadRequests();
      }, []);

      const loadRequests = async () => {
        try {
          const { data, error } = await supabase
            .from('access_requests')
            .select('*')
            .order('created_at', { ascending: false });
          
          if (!error && data) {
            setRequests(data);
            setConnected(true);
          }
        } catch (e) {
          console.log('Using demo data');
        }
        setLoading(false);
      };

      const updateRequest = async (id, updates) => {
        try {
          if (connected) {
            const { error } = await supabase
              .from('access_requests')
              .update({ ...updates, updated_at: new Date().toISOString() })
              .eq('id', id);
            
            if (error) throw error;
          }
          
          setRequests(prev => prev.map(r => 
            r.id === id ? { ...r, ...updates } : r
          ));
        } catch (e) {
          console.error('Update failed:', e);
        }
      };

      const filteredRequests = filter === 'all' 
        ? requests 
        : requests.filter(r => r.status === filter);

      const stats = {
        total: requests.length,
        pending: requests.filter(r => r.status === 'pending').length,
        approved: requests.filter(r => r.status === 'approved').length,
        rejected: requests.filter(r => r.status === 'rejected').length
      };

      return (
        <div className="flex">
          <Sidebar />
          
          <div className="flex-1 p-6">
            {/* Header */}
            <div className="flex items-center justify-between mb-6">
              <div>
                <h1 className="text-2xl font-bold">Access Requests</h1>
                <p className="text-slate-400 text-sm">Manage incoming demo and access requests</p>
              </div>
              
              <div className={`px-3 py-1.5 rounded-lg text-sm ${
                connected 
                  ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' 
                  : 'bg-amber-500/20 text-amber-400 border border-amber-500/30'
              }`}>
                {connected ? '● Connected' : '○ Demo Mode'}
              </div>
            </div>

            {/* Stats */}
            <div className="grid grid-cols-4 gap-4 mb-6">
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <div className="text-3xl font-bold">{stats.total}</div>
                <div className="text-sm text-slate-400">Total Requests</div>
              </div>
              <div className="bg-slate-800/50 border border-amber-500/30 rounded-xl p-4">
                <div className="text-3xl font-bold text-amber-400">{stats.pending}</div>
                <div className="text-sm text-slate-400">Pending Review</div>
              </div>
              <div className="bg-slate-800/50 border border-emerald-500/30 rounded-xl p-4">
                <div className="text-3xl font-bold text-emerald-400">{stats.approved}</div>
                <div className="text-sm text-slate-400">Approved</div>
              </div>
              <div className="bg-slate-800/50 border border-red-500/30 rounded-xl p-4">
                <div className="text-3xl font-bold text-red-400">{stats.rejected}</div>
                <div className="text-sm text-slate-400">Rejected</div>
              </div>
            </div>

            {/* Filter Tabs */}
            <div className="flex gap-2 mb-4">
              {['all', 'pending', 'contacted', 'approved', 'rejected'].map(f => (
                <button
                  key={f}
                  onClick={() => setFilter(f)}
                  className={`px-4 py-2 rounded-lg text-sm transition-all ${
                    filter === f
                      ? 'bg-cyan-500 text-slate-900 font-medium'
                      : 'bg-slate-800 hover:bg-slate-700 text-slate-300'
                  }`}
                >
                  {f.charAt(0).toUpperCase() + f.slice(1)}
                  {f !== 'all' && (
                    <span className="ml-2 text-xs opacity-70">
                      ({requests.filter(r => r.status === f).length})
                    </span>
                  )}
                </button>
              ))}
            </div>

            {/* Requests Table */}
            <div className="bg-slate-800/50 border border-slate-700 rounded-xl overflow-hidden">
              <table className="w-full">
                <thead>
                  <tr className="border-b border-slate-700">
                    <th className="text-left p-4 text-sm text-slate-400 font-medium">Contact</th>
                    <th className="text-left p-4 text-sm text-slate-400 font-medium">Company</th>
                    <th className="text-left p-4 text-sm text-slate-400 font-medium">Use Case</th>
                    <th className="text-left p-4 text-sm text-slate-400 font-medium">Set-Aside</th>
                    <th className="text-left p-4 text-sm text-slate-400 font-medium">Status</th>
                    <th className="text-left p-4 text-sm text-slate-400 font-medium">Submitted</th>
                    <th className="text-left p-4 text-sm text-slate-400 font-medium">Actions</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-700/50">
                  {loading ? (
                    <tr>
                      <td colSpan={7} className="p-8 text-center text-slate-500">
                        Loading requests...
                      </td>
                    </tr>
                  ) : filteredRequests.length === 0 ? (
                    <tr>
                      <td colSpan={7} className="p-8 text-center text-slate-500">
                        No requests found
                      </td>
                    </tr>
                  ) : (
                    filteredRequests.map(request => (
                      <tr 
                        key={request.id}
                        className="hover:bg-slate-800/30 transition-colors"
                      >
                        <td className="p-4">
                          <div className="font-medium">{request.first_name} {request.last_name}</div>
                          <div className="text-sm text-slate-400">{request.email}</div>
                        </td>
                        <td className="p-4">
                          <div>{request.company}</div>
                          <div className="text-sm text-slate-400">{request.title}</div>
                        </td>
                        <td className="p-4 text-sm">{request.use_case || '—'}</td>
                        <td className="p-4">
                          {request.set_aside && (
                            <span className="px-2 py-0.5 bg-slate-700 text-slate-300 rounded text-xs">
                              {request.set_aside}
                            </span>
                          )}
                        </td>
                        <td className="p-4">
                          <StatusBadge status={request.status} />
                        </td>
                        <td className="p-4 text-sm text-slate-400">
                          {new Date(request.created_at).toLocaleDateString()}
                        </td>
                        <td className="p-4">
                          <button
                            onClick={() => setSelectedRequest(request)}
                            className="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-sm transition-colors"
                          >
                            View
                          </button>
                        </td>
                      </tr>
                    ))
                  )}
                </tbody>
              </table>
            </div>

            {/* Quick Actions */}
            <div className="mt-6 flex gap-4">
              <button
                onClick={() => {
                  const pendingEmails = requests
                    .filter(r => r.status === 'pending')
                    .map(r => r.email)
                    .join(', ');
                  navigator.clipboard.writeText(pendingEmails);
                  alert('Pending emails copied to clipboard!');
                }}
                className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm transition-colors"
              >
                📋 Copy Pending Emails
              </button>
              <button
                onClick={() => {
                  const csv = [
                    'First Name,Last Name,Email,Company,Title,Company Size,Use Case,Set-Aside,Status,Submitted',
                    ...requests.map(r => 
                      `${r.first_name},${r.last_name},${r.email},${r.company},${r.title || ''},${r.company_size || ''},${r.use_case || ''},${r.set_aside || ''},${r.status},${r.created_at}`
                    )
                  ].join('\n');
                  
                  const blob = new Blob([csv], { type: 'text/csv' });
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement('a');
                  a.href = url;
                  a.download = `access-requests-${new Date().toISOString().split('T')[0]}.csv`;
                  a.click();
                }}
                className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm transition-colors"
              >
                📥 Export CSV
              </button>
            </div>

            {/* Footer */}
            <div className="mt-8 text-center text-xs text-slate-500">
              <div>Mission Meets Tech | MissionPulse Admin</div>
              <div className="mt-1">AI GENERATED - REQUIRES HUMAN REVIEW</div>
            </div>
          </div>

          {/* Modal */}
          {selectedRequest && (
            <RequestModal
              request={selectedRequest}
              onClose={() => setSelectedRequest(null)}
              onUpdate={updateRequest}
            />
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
