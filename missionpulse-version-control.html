<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Version Control | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 100%); min-height: 100vh; }
        .glass-card { background: rgba(0, 229, 250, 0.03); border: 1px solid rgba(0, 229, 250, 0.15); backdrop-filter: blur(10px); }
        .version-line { position: relative; }
        .version-line::before { content: ''; position: absolute; left: 19px; top: 40px; bottom: -20px; width: 2px; background: rgba(0, 229, 250, 0.2); }
        .version-line:last-child::before { display: none; }
        .version-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #00E5FA; background: #00050F; }
        .version-dot.current { background: #00E5FA; }
        .diff-added { background: rgba(16, 185, 129, 0.2); border-left: 3px solid #10B981; }
        .diff-removed { background: rgba(239, 68, 68, 0.2); border-left: 3px solid #EF4444; text-decoration: line-through; }
        .doc-card { transition: all 0.3s ease; }
        .doc-card:hover { transform: translateY(-2px); border-color: rgba(0, 229, 250, 0.4); }
    </style>
</head>
<body class="text-white font-sans">
    <!-- Navigation -->
    <nav class="bg-[#00050F]/90 border-b border-cyan-500/20 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <a href="missionpulse-mission-control.html" class="text-cyan-400 hover:text-cyan-300">
                    <i class="fas fa-arrow-left mr-2"></i>Mission Control
                </a>
                <span class="text-gray-600">|</span>
                <h1 class="text-xl font-bold text-white">
                    <i class="fas fa-code-branch text-cyan-400 mr-2"></i>Document Version Control
                </h1>
            </div>
            <div class="flex items-center space-x-3">
                <select id="opportunitySelect" class="bg-gray-800/50 border border-gray-700 rounded-lg px-3 py-2 text-white text-sm" onchange="loadDocuments()">
                    <option value="va-ehr">VA EHR Modernization - $45M</option>
                    <option value="dha-analytics">DHA Analytics Platform - $28M</option>
                </select>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="glass-card rounded-xl p-5">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-gray-400 text-sm">Total Documents</span>
                    <i class="fas fa-file-alt text-cyan-400"></i>
                </div>
                <div class="text-3xl font-bold text-white" id="totalDocs">12</div>
            </div>
            <div class="glass-card rounded-xl p-5">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-gray-400 text-sm">Total Versions</span>
                    <i class="fas fa-code-branch text-cyan-400"></i>
                </div>
                <div class="text-3xl font-bold text-white" id="totalVersions">47</div>
            </div>
            <div class="glass-card rounded-xl p-5">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-gray-400 text-sm">Changes Today</span>
                    <i class="fas fa-edit text-cyan-400"></i>
                </div>
                <div class="text-3xl font-bold text-green-400" id="changesToday">8</div>
            </div>
            <div class="glass-card rounded-xl p-5">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-gray-400 text-sm">Contributors</span>
                    <i class="fas fa-users text-cyan-400"></i>
                </div>
                <div class="text-3xl font-bold text-white" id="contributors">5</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Document List -->
            <div class="lg:col-span-1">
                <div class="glass-card rounded-xl p-4">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-white font-bold">Documents</h3>
                        <button onclick="uploadDocument()" class="text-cyan-400 hover:text-cyan-300 text-sm">
                            <i class="fas fa-plus mr-1"></i>Upload
                        </button>
                    </div>
                    <div class="space-y-3" id="documentList">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Version History -->
            <div class="lg:col-span-2">
                <div class="glass-card rounded-xl p-6">
                    <div class="flex items-center justify-between mb-6">
                        <div>
                            <h3 id="selectedDocName" class="text-white font-bold text-lg">Technical Volume</h3>
                            <p id="selectedDocMeta" class="text-gray-400 text-sm">v1.4 • Last updated 2 hours ago</p>
                        </div>
                        <div class="flex items-center space-x-2">
                            <button onclick="compareVersions()" class="px-3 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-white text-sm">
                                <i class="fas fa-columns mr-1"></i>Compare
                            </button>
                            <button onclick="downloadCurrent()" class="px-3 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg text-white text-sm">
                                <i class="fas fa-download mr-1"></i>Download
                            </button>
                        </div>
                    </div>

                    <div class="space-y-1" id="versionHistory">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Diff View -->
                <div id="diffView" class="glass-card rounded-xl p-6 mt-6 hidden">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-white font-bold">Version Comparison</h3>
                        <button onclick="closeDiff()" class="text-gray-400 hover:text-white">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="flex items-center space-x-4 mb-4">
                        <select id="diffFrom" class="bg-gray-800/50 border border-gray-700 rounded px-3 py-2 text-white text-sm">
                            <option>v1.3</option>
                            <option>v1.2</option>
                            <option>v1.1</option>
                            <option>v1.0</option>
                        </select>
                        <i class="fas fa-arrow-right text-gray-500"></i>
                        <select id="diffTo" class="bg-gray-800/50 border border-gray-700 rounded px-3 py-2 text-white text-sm">
                            <option>v1.4 (current)</option>
                            <option>v1.3</option>
                            <option>v1.2</option>
                        </select>
                        <button onclick="runDiff()" class="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 rounded text-white text-sm">
                            Compare
                        </button>
                    </div>
                    <div id="diffContent" class="bg-gray-900/50 rounded-lg p-4 font-mono text-sm space-y-2 max-h-64 overflow-y-auto">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent Activity -->
        <div class="glass-card rounded-xl p-6 mt-8">
            <h3 class="text-white font-bold mb-4">
                <i class="fas fa-history text-cyan-400 mr-2"></i>Recent Activity
            </h3>
            <div class="space-y-3" id="recentActivity">
                <!-- Populated by JS -->
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 bg-gray-900 border border-cyan-500/30 rounded-lg p-4 shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <div class="flex items-center space-x-3">
            <i id="toastIcon" class="fas fa-check-circle text-green-400"></i>
            <span id="toastMessage" class="text-white">Action completed</span>
        </div>
    </div>

    <script>
        // Sample documents
        const documents = [
            {
                id: 1,
                name: 'Technical Volume',
                type: 'docx',
                currentVersion: '1.4',
                lastUpdated: '2 hours ago',
                size: '2.4 MB',
                versions: [
                    { version: '1.4', date: '2026-02-01 14:30', author: 'Mary Womack', changes: 'Updated executive summary, added risk mitigation section', size: '2.4 MB' },
                    { version: '1.3', date: '2026-01-31 16:45', author: 'John Smith', changes: 'Incorporated Pink Team feedback', size: '2.3 MB' },
                    { version: '1.2', date: '2026-01-30 11:20', author: 'Sarah Jones', changes: 'Added staffing plan details', size: '2.1 MB' },
                    { version: '1.1', date: '2026-01-28 09:15', author: 'Mary Womack', changes: 'Initial technical approach draft', size: '1.8 MB' },
                    { version: '1.0', date: '2026-01-25 10:00', author: 'John Smith', changes: 'Created document from template', size: '0.5 MB' }
                ]
            },
            {
                id: 2,
                name: 'Management Volume',
                type: 'docx',
                currentVersion: '1.2',
                lastUpdated: '5 hours ago',
                size: '1.8 MB',
                versions: [
                    { version: '1.2', date: '2026-02-01 11:00', author: 'Sarah Jones', changes: 'Updated org chart and key personnel', size: '1.8 MB' },
                    { version: '1.1', date: '2026-01-30 14:30', author: 'Mary Womack', changes: 'Added QA procedures', size: '1.5 MB' },
                    { version: '1.0', date: '2026-01-27 09:00', author: 'John Smith', changes: 'Initial draft', size: '1.2 MB' }
                ]
            },
            {
                id: 3,
                name: 'Past Performance',
                type: 'docx',
                currentVersion: '1.3',
                lastUpdated: '1 day ago',
                size: '1.2 MB',
                versions: [
                    { version: '1.3', date: '2026-01-31 10:00', author: 'Sarah Jones', changes: 'Added third contract reference', size: '1.2 MB' },
                    { version: '1.2', date: '2026-01-29 15:30', author: 'Mary Womack', changes: 'Updated CPARs ratings', size: '1.0 MB' },
                    { version: '1.1', date: '2026-01-28 11:00', author: 'John Smith', changes: 'Added relevancy narratives', size: '0.8 MB' },
                    { version: '1.0', date: '2026-01-26 09:30', author: 'Sarah Jones', changes: 'Initial template', size: '0.3 MB' }
                ]
            },
            {
                id: 4,
                name: 'Pricing Volume',
                type: 'xlsx',
                currentVersion: '2.1',
                lastUpdated: '3 hours ago',
                size: '856 KB',
                locked: true,
                versions: [
                    { version: '2.1', date: '2026-02-01 13:15', author: 'Mary Womack', changes: 'Final pricing adjustments - CUI', size: '856 KB' },
                    { version: '2.0', date: '2026-01-31 17:00', author: 'Mary Womack', changes: 'Incorporated subcontractor pricing', size: '820 KB' },
                    { version: '1.5', date: '2026-01-30 14:00', author: 'Mary Womack', changes: 'Updated labor rates', size: '780 KB' }
                ]
            },
            {
                id: 5,
                name: 'Executive Summary',
                type: 'docx',
                currentVersion: '1.1',
                lastUpdated: '6 hours ago',
                size: '425 KB',
                versions: [
                    { version: '1.1', date: '2026-02-01 10:30', author: 'Mary Womack', changes: 'CEO review edits', size: '425 KB' },
                    { version: '1.0', date: '2026-01-30 16:00', author: 'John Smith', changes: 'Initial draft', size: '380 KB' }
                ]
            }
        ];

        let selectedDoc = documents[0];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderDocumentList();
            renderVersionHistory();
            renderRecentActivity();
        });

        function renderDocumentList() {
            const container = document.getElementById('documentList');
            
            const iconMap = {
                'docx': 'fa-file-word text-blue-400',
                'xlsx': 'fa-file-excel text-green-400',
                'pdf': 'fa-file-pdf text-red-400',
                'pptx': 'fa-file-powerpoint text-orange-400'
            };
            
            container.innerHTML = documents.map(doc => `
                <div class="doc-card p-3 bg-gray-800/30 rounded-lg cursor-pointer ${selectedDoc.id === doc.id ? 'border border-cyan-500/50' : ''}" 
                    onclick="selectDocument(${doc.id})">
                    <div class="flex items-center space-x-3">
                        <i class="fas ${iconMap[doc.type] || 'fa-file text-gray-400'} text-xl"></i>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center space-x-2">
                                <span class="text-white font-medium truncate">${doc.name}</span>
                                ${doc.locked ? '<i class="fas fa-lock text-yellow-400 text-xs" title="CUI - Restricted"></i>' : ''}
                            </div>
                            <div class="text-gray-500 text-xs">v${doc.currentVersion} • ${doc.lastUpdated}</div>
                        </div>
                        <span class="text-gray-400 text-xs">${doc.size}</span>
                    </div>
                </div>
            `).join('');
        }

        function selectDocument(id) {
            selectedDoc = documents.find(d => d.id === id);
            document.getElementById('selectedDocName').textContent = selectedDoc.name;
            document.getElementById('selectedDocMeta').textContent = `v${selectedDoc.currentVersion} • Last updated ${selectedDoc.lastUpdated}`;
            renderDocumentList();
            renderVersionHistory();
        }

        function renderVersionHistory() {
            const container = document.getElementById('versionHistory');
            
            container.innerHTML = selectedDoc.versions.map((v, i) => `
                <div class="version-line flex items-start space-x-4 pb-6">
                    <div class="flex flex-col items-center">
                        <div class="version-dot ${i === 0 ? 'current' : ''}"></div>
                    </div>
                    <div class="flex-1 pt-0">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-3">
                                <span class="text-cyan-400 font-mono font-medium">v${v.version}</span>
                                ${i === 0 ? '<span class="text-xs px-2 py-0.5 bg-green-500/20 text-green-400 rounded">Current</span>' : ''}
                            </div>
                            <div class="flex items-center space-x-2">
                                <button onclick="downloadVersion('${v.version}')" class="p-1 text-gray-400 hover:text-cyan-400" title="Download">
                                    <i class="fas fa-download text-sm"></i>
                                </button>
                                ${i > 0 ? `<button onclick="restoreVersion('${v.version}')" class="p-1 text-gray-400 hover:text-green-400" title="Restore">
                                    <i class="fas fa-undo text-sm"></i>
                                </button>` : ''}
                            </div>
                        </div>
                        <div class="text-gray-400 text-sm mt-1">${v.changes}</div>
                        <div class="flex items-center space-x-4 mt-2 text-xs text-gray-500">
                            <span><i class="fas fa-user mr-1"></i>${v.author}</span>
                            <span><i class="fas fa-clock mr-1"></i>${v.date}</span>
                            <span><i class="fas fa-weight mr-1"></i>${v.size}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderRecentActivity() {
            const container = document.getElementById('recentActivity');
            
            const activities = [
                { action: 'uploaded', doc: 'Technical Volume v1.4', user: 'Mary Womack', time: '2 hours ago', icon: 'fa-upload', color: 'text-green-400' },
                { action: 'downloaded', doc: 'Pricing Volume v2.1', user: 'Sarah Jones', time: '3 hours ago', icon: 'fa-download', color: 'text-blue-400' },
                { action: 'uploaded', doc: 'Management Volume v1.2', user: 'Sarah Jones', time: '5 hours ago', icon: 'fa-upload', color: 'text-green-400' },
                { action: 'restored', doc: 'Executive Summary to v1.0', user: 'John Smith', time: '6 hours ago', icon: 'fa-undo', color: 'text-yellow-400' },
                { action: 'uploaded', doc: 'Executive Summary v1.1', user: 'Mary Womack', time: '6 hours ago', icon: 'fa-upload', color: 'text-green-400' },
                { action: 'compared', doc: 'Technical Volume v1.2 vs v1.3', user: 'John Smith', time: '8 hours ago', icon: 'fa-columns', color: 'text-purple-400' }
            ];
            
            container.innerHTML = activities.map(a => `
                <div class="flex items-center space-x-4 p-3 bg-gray-800/30 rounded-lg">
                    <div class="w-8 h-8 bg-gray-700 rounded-full flex items-center justify-center">
                        <i class="fas ${a.icon} ${a.color} text-sm"></i>
                    </div>
                    <div class="flex-1">
                        <span class="text-white">${a.user}</span>
                        <span class="text-gray-400"> ${a.action} </span>
                        <span class="text-cyan-400">${a.doc}</span>
                    </div>
                    <span class="text-gray-500 text-sm">${a.time}</span>
                </div>
            `).join('');
        }

        function compareVersions() {
            document.getElementById('diffView').classList.remove('hidden');
        }

        function closeDiff() {
            document.getElementById('diffView').classList.add('hidden');
        }

        function runDiff() {
            const content = document.getElementById('diffContent');
            content.innerHTML = `
                <div class="diff-removed p-2">- The system shall provide real-time analytics capabilities.</div>
                <div class="diff-added p-2">+ The system shall provide real-time analytics capabilities with sub-second response times.</div>
                <div class="p-2 text-gray-400">  Our approach leverages industry best practices...</div>
                <div class="diff-removed p-2">- Team consists of 15 FTEs.</div>
                <div class="diff-added p-2">+ Team consists of 18 FTEs, including 3 additional senior engineers.</div>
                <div class="p-2 text-gray-400">  Risk mitigation strategies include...</div>
                <div class="diff-added p-2">+ Added comprehensive disaster recovery procedures per FAR requirements.</div>
            `;
            showToast('Comparison generated', 'success');
        }

        function downloadVersion(version) {
            showToast(`Downloading ${selectedDoc.name} v${version}`, 'info');
        }

        function downloadCurrent() {
            showToast(`Downloading ${selectedDoc.name} v${selectedDoc.currentVersion}`, 'info');
        }

        function restoreVersion(version) {
            if (!confirm(`Restore ${selectedDoc.name} to version ${version}? This will create a new version.`)) return;
            showToast(`Restored to v${version}`, 'success');
        }

        function uploadDocument() {
            showToast('Upload functionality - connect to document storage', 'info');
        }

        function loadDocuments() {
            showToast('Loading documents for selected opportunity', 'info');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMessage');
            
            const iconMap = {
                'success': 'fa-check-circle text-green-400',
                'warning': 'fa-exclamation-triangle text-yellow-400',
                'error': 'fa-times-circle text-red-400',
                'info': 'fa-info-circle text-blue-400'
            };
            
            icon.className = `fas ${iconMap[type] || iconMap.success}`;
            msg.textContent = message;
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
    </script>
</body>
</html>
