<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse M10 - Orals Studio</title>
  <link rel="icon" type="image/png" href="MMT_icon_32px.png">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary-cyan: #00E5FA; --deep-navy: #00050F; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--deep-navy); min-height: 100vh; color: #E2E8F0; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes recording { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-spin { animation: spin 1s linear infinite; }
    .animate-slideIn { animation: slideIn 0.3s ease-out; }
    .animate-recording { animation: recording 1s ease-in-out infinite; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0A1628; }
    ::-webkit-scrollbar-thumb { background: var(--primary-cyan); border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================================================
    // CONFIGURATION
    // ==========================================================================
    const CONFIG = {
      API_BASE: 'https://missionpulse-api.onrender.com',
    };

    // ==========================================================================
    // DEMO DATA
    // ==========================================================================
    const DEMO_SESSIONS = [
      { id: 1, title: 'DHA EHR Modernization - Technical Approach', date: '2026-01-24', duration: '45:30', score: 87, status: 'completed' },
      { id: 2, title: 'VA Claims Processing - Management Approach', date: '2026-01-22', duration: '38:15', score: 92, status: 'completed' },
      { id: 3, title: 'CMS Data Analytics - Past Performance', date: '2026-01-20', duration: '25:00', score: 78, status: 'completed' },
    ];

    const DEMO_SLIDES = [
      { id: 1, title: 'Executive Summary', type: 'intro', content: 'Mission Meets Tech brings innovative AI-powered solutions to federal healthcare IT challenges.' },
      { id: 2, title: 'Technical Approach', type: 'technical', content: 'Our approach leverages cloud-native architecture with FedRAMP High compliance.' },
      { id: 3, title: 'Team Qualifications', type: 'team', content: 'Key personnel with 15+ years average federal healthcare experience.' },
      { id: 4, title: 'Past Performance', type: 'past_perf', content: 'Exceptional CPARS ratings on DHA and VA contracts totaling $73M.' },
      { id: 5, title: 'Risk Mitigation', type: 'risk', content: 'Proactive risk management with proven contingency protocols.' },
    ];

    const DEMO_QUESTIONS = [
      { id: 1, question: 'How will you ensure FedRAMP compliance?', category: 'Technical', difficulty: 'Hard' },
      { id: 2, question: 'Describe your approach to knowledge transfer.', category: 'Management', difficulty: 'Medium' },
      { id: 3, question: 'What is your staffing contingency plan?', category: 'Staffing', difficulty: 'Medium' },
      { id: 4, question: 'How do you handle scope changes?', category: 'Management', difficulty: 'Easy' },
      { id: 5, question: 'Explain your AI/ML validation methodology.', category: 'Technical', difficulty: 'Hard' },
    ];

    // ==========================================================================
    // ICONS
    // ==========================================================================
    const Icons = {
      presentation: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" /></svg>,
      mic: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>,
      play: () => <svg className="w-full h-full" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>,
      pause: () => <svg className="w-full h-full" fill="currentColor" viewBox="0 0 24 24"><path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/></svg>,
      stop: () => <svg className="w-full h-full" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>,
      clock: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6l4 2" /></svg>,
      star: () => <svg className="w-full h-full" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>,
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
      x: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
      loader: () => <svg className="w-full h-full animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>,
      chevronLeft: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>,
      chevronRight: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>,
      lightbulb: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" /></svg>,
      messageCircle: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg>,
      zap: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
      target: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><circle cx="12" cy="12" r="6" strokeWidth={2}/><circle cx="12" cy="12" r="2" strokeWidth={2}/></svg>,
      volume: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    // ==========================================================================
    // UI COMPONENTS
    // ==========================================================================
    const Badge = ({ variant = 'primary', size = 'sm', children }) => {
      const variants = {
        primary: 'bg-cyan-500/20 text-cyan-400 border-cyan-500/30',
        success: 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30',
        warning: 'bg-amber-500/20 text-amber-400 border-amber-500/30',
        danger: 'bg-red-500/20 text-red-400 border-red-500/30',
        purple: 'bg-purple-500/20 text-purple-400 border-purple-500/30',
      };
      const sizes = { xs: 'px-1.5 py-0.5 text-[10px]', sm: 'px-2 py-0.5 text-xs', md: 'px-3 py-1 text-sm' };
      return <span className={`inline-flex items-center rounded-full border font-medium ${variants[variant]} ${sizes[size]}`}>{children}</span>;
    };

    const Card = ({ children, className = '', onClick }) => (
      <div onClick={onClick} className={`rounded-2xl border border-slate-700/50 bg-slate-800/50 backdrop-blur ${onClick ? 'cursor-pointer hover:border-cyan-500/50 transition-all' : ''} ${className}`}>
        {children}
      </div>
    );

    const Button = ({ variant = 'primary', size = 'md', icon, children, onClick, disabled, loading, className = '' }) => {
      const variants = {
        primary: 'bg-gradient-to-r from-cyan-500 to-teal-500 text-white hover:from-cyan-400 hover:to-teal-400',
        secondary: 'bg-slate-700 text-white hover:bg-slate-600 border border-slate-600',
        ghost: 'text-slate-400 hover:text-white hover:bg-slate-800',
        danger: 'bg-red-500/20 text-red-400 hover:bg-red-500/30 border border-red-500/30',
        recording: 'bg-red-500 text-white hover:bg-red-600 animate-recording',
      };
      const sizes = { xs: 'px-2 py-1 text-xs', sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2 text-sm', lg: 'px-6 py-3 text-base' };
      return (
        <button onClick={onClick} disabled={disabled || loading}
          className={`inline-flex items-center justify-center gap-2 rounded-xl font-semibold transition-all disabled:opacity-50 ${variants[variant]} ${sizes[size]} ${className}`}>
          {loading ? <Icon name="loader" className="w-4 h-4" /> : icon && <Icon name={icon} className="w-4 h-4" />}
          {children}
        </button>
      );
    };

    // ==========================================================================
    // SLIDE PREVIEW
    // ==========================================================================
    const SlidePreview = ({ slide, isActive, onClick }) => (
      <div 
        onClick={onClick}
        className={`p-3 rounded-xl border transition-all cursor-pointer ${
          isActive 
            ? 'border-cyan-500 bg-cyan-500/10' 
            : 'border-slate-700 hover:border-slate-600 bg-slate-800/50'
        }`}
      >
        <div className="aspect-video bg-slate-900 rounded-lg mb-2 flex items-center justify-center">
          <Icon name="presentation" className={`w-8 h-8 ${isActive ? 'text-cyan-400' : 'text-slate-600'}`} />
        </div>
        <p className={`text-xs font-medium truncate ${isActive ? 'text-cyan-400' : 'text-slate-400'}`}>
          {slide.title}
        </p>
      </div>
    );

    // ==========================================================================
    // TIMER
    // ==========================================================================
    const Timer = ({ isRunning, initialTime = 0, maxTime = 3600 }) => {
      const [time, setTime] = useState(initialTime);

      useEffect(() => {
        let interval;
        if (isRunning) {
          interval = setInterval(() => {
            setTime(t => t + 1);
          }, 1000);
        }
        return () => clearInterval(interval);
      }, [isRunning]);

      const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      };

      const progress = (time / maxTime) * 100;
      const isWarning = time > maxTime * 0.8;
      const isOvertime = time > maxTime;

      return (
        <div className="text-center">
          <div className={`text-4xl font-mono font-bold ${isOvertime ? 'text-red-400' : isWarning ? 'text-amber-400' : 'text-white'}`}>
            {formatTime(time)}
          </div>
          <div className="w-full h-2 bg-slate-700 rounded-full mt-2 overflow-hidden">
            <div 
              className={`h-full rounded-full transition-all ${isOvertime ? 'bg-red-500' : isWarning ? 'bg-amber-500' : 'bg-cyan-500'}`}
              style={{ width: `${Math.min(progress, 100)}%` }}
            />
          </div>
          <p className="text-xs text-slate-500 mt-1">Target: {formatTime(maxTime)}</p>
        </div>
      );
    };

    // ==========================================================================
    // Q&A PANEL
    // ==========================================================================
    const QAPanel = ({ questions }) => {
      const [currentQ, setCurrentQ] = useState(0);
      const [showAnswer, setShowAnswer] = useState(false);

      const question = questions[currentQ];

      return (
        <Card className="p-4">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-semibold text-white flex items-center gap-2">
              <Icon name="messageCircle" className="w-4 h-4 text-purple-400" />
              Practice Q&A
            </h3>
            <Badge variant="purple" size="xs">
              {currentQ + 1}/{questions.length}
            </Badge>
          </div>

          <div className="bg-slate-900 rounded-xl p-4 mb-4">
            <div className="flex items-start gap-3 mb-3">
              <div className="flex gap-1.5">
                <Badge variant={question.difficulty === 'Hard' ? 'danger' : question.difficulty === 'Medium' ? 'warning' : 'success'} size="xs">
                  {question.difficulty}
                </Badge>
                <Badge variant="primary" size="xs">{question.category}</Badge>
              </div>
            </div>
            <p className="text-white font-medium">{question.question}</p>
          </div>

          {showAnswer && (
            <div className="bg-emerald-500/10 border border-emerald-500/30 rounded-xl p-4 mb-4 animate-slideIn">
              <div className="flex items-center gap-2 mb-2">
                <Icon name="lightbulb" className="w-4 h-4 text-emerald-400" />
                <span className="text-xs font-semibold text-emerald-400 uppercase">Suggested Response Points</span>
              </div>
              <ul className="text-sm text-slate-300 space-y-1">
                <li>• Reference specific contract experience</li>
                <li>• Cite relevant certifications/compliance</li>
                <li>• Mention team qualifications</li>
              </ul>
            </div>
          )}

          <div className="flex gap-2">
            <Button 
              variant="ghost" 
              size="sm" 
              icon="chevronLeft"
              onClick={() => { setCurrentQ(Math.max(0, currentQ - 1)); setShowAnswer(false); }}
              disabled={currentQ === 0}
            >
              Prev
            </Button>
            <Button 
              variant="secondary" 
              size="sm"
              icon="lightbulb"
              onClick={() => setShowAnswer(!showAnswer)}
            >
              {showAnswer ? 'Hide Tips' : 'Show Tips'}
            </Button>
            <Button 
              variant="ghost" 
              size="sm" 
              icon="chevronRight"
              onClick={() => { setCurrentQ(Math.min(questions.length - 1, currentQ + 1)); setShowAnswer(false); }}
              disabled={currentQ === questions.length - 1}
              className="ml-auto"
            >
              Next
            </Button>
          </div>
        </Card>
      );
    };

    // ==========================================================================
    // MAIN APP
    // ==========================================================================
    const OralsStudio = () => {
      const [mode, setMode] = useState('overview'); // overview, practice, review
      const [isRecording, setIsRecording] = useState(false);
      const [isPaused, setIsPaused] = useState(false);
      const [currentSlide, setCurrentSlide] = useState(0);

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* Header */}
          <header className="bg-slate-900/80 border-b border-slate-700/50 sticky top-0 z-40 backdrop-blur-xl">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="missionpulse-production-dashboard.html" className="flex items-center gap-3 text-slate-400 hover:text-white transition-colors">
                    <Icon name="home" className="w-5 h-5" />
                  </a>
                  <div className="w-px h-6 bg-slate-700" />
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center">
                      <Icon name="presentation" className="w-5 h-5 text-white" />
                    </div>
                    <div>
                      <h1 className="text-lg font-bold text-white">Orals Studio</h1>
                      <p className="text-xs text-slate-400">M10 • Presentation Practice</p>
                    </div>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <Badge variant="purple">AI Coach Active</Badge>
                </div>
              </div>
            </div>
          </header>

          {/* Main */}
          <main className="max-w-7xl mx-auto px-6 py-6">
            {mode === 'overview' && (
              <div className="space-y-6">
                {/* Quick Actions */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <Card className="p-6 text-center" onClick={() => setMode('practice')}>
                    <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-cyan-500/20 to-teal-500/20 flex items-center justify-center mx-auto mb-4">
                      <Icon name="mic" className="w-7 h-7 text-cyan-400" />
                    </div>
                    <h3 className="font-bold text-white mb-1">Start Practice</h3>
                    <p className="text-sm text-slate-400">Record a new presentation session</p>
                  </Card>

                  <Card className="p-6 text-center">
                    <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-purple-500/20 to-pink-500/20 flex items-center justify-center mx-auto mb-4">
                      <Icon name="messageCircle" className="w-7 h-7 text-purple-400" />
                    </div>
                    <h3 className="font-bold text-white mb-1">Q&A Drill</h3>
                    <p className="text-sm text-slate-400">Practice answering evaluator questions</p>
                  </Card>

                  <Card className="p-6 text-center">
                    <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-amber-500/20 to-orange-500/20 flex items-center justify-center mx-auto mb-4">
                      <Icon name="star" className="w-7 h-7 text-amber-400" />
                    </div>
                    <h3 className="font-bold text-white mb-1">Review Sessions</h3>
                    <p className="text-sm text-slate-400">Analyze past practice recordings</p>
                  </Card>
                </div>

                {/* Past Sessions */}
                <Card className="p-6">
                  <h3 className="font-bold text-white mb-4 flex items-center gap-2">
                    <Icon name="clock" className="w-5 h-5 text-slate-400" />
                    Recent Practice Sessions
                  </h3>
                  <div className="space-y-3">
                    {DEMO_SESSIONS.map(session => (
                      <div key={session.id} className="flex items-center justify-between p-4 bg-slate-900/50 rounded-xl hover:bg-slate-900 transition-colors">
                        <div className="flex items-center gap-4">
                          <div className="w-10 h-10 rounded-lg bg-purple-500/20 flex items-center justify-center">
                            <Icon name="presentation" className="w-5 h-5 text-purple-400" />
                          </div>
                          <div>
                            <p className="font-medium text-white">{session.title}</p>
                            <p className="text-xs text-slate-500">{session.date} • {session.duration}</p>
                          </div>
                        </div>
                        <div className="flex items-center gap-4">
                          <div className="text-right">
                            <p className={`text-lg font-bold ${session.score >= 90 ? 'text-emerald-400' : session.score >= 80 ? 'text-amber-400' : 'text-red-400'}`}>
                              {session.score}%
                            </p>
                            <p className="text-xs text-slate-500">AI Score</p>
                          </div>
                          <Button size="sm" variant="ghost" icon="play">Play</Button>
                        </div>
                      </div>
                    ))}
                  </div>
                </Card>

                {/* Tips */}
                <Card className="p-6 bg-gradient-to-br from-purple-500/5 to-pink-500/5 border-purple-500/20">
                  <div className="flex items-start gap-4">
                    <div className="w-10 h-10 rounded-xl bg-purple-500/20 flex items-center justify-center shrink-0">
                      <Icon name="lightbulb" className="w-5 h-5 text-purple-400" />
                    </div>
                    <div>
                      <h4 className="font-semibold text-white mb-2">Orals Presentation Tips</h4>
                      <ul className="text-sm text-slate-400 space-y-1">
                        <li>• Practice your opening statement until it's natural</li>
                        <li>• Use the STAR method for past performance examples</li>
                        <li>• Maintain eye contact with all evaluators</li>
                        <li>• Pause before answering questions to gather thoughts</li>
                      </ul>
                    </div>
                  </div>
                </Card>
              </div>
            )}

            {mode === 'practice' && (
              <div className="grid grid-cols-12 gap-6">
                {/* Slide Panel */}
                <div className="col-span-3 space-y-3">
                  <h3 className="font-semibold text-white text-sm mb-2">Slides</h3>
                  {DEMO_SLIDES.map((slide, idx) => (
                    <SlidePreview 
                      key={slide.id}
                      slide={slide}
                      isActive={currentSlide === idx}
                      onClick={() => setCurrentSlide(idx)}
                    />
                  ))}
                </div>

                {/* Main Presentation Area */}
                <div className="col-span-6 space-y-4">
                  {/* Current Slide */}
                  <Card className="aspect-video bg-slate-900 flex items-center justify-center p-8">
                    <div className="text-center">
                      <Badge variant="primary" size="xs" className="mb-4">Slide {currentSlide + 1}</Badge>
                      <h2 className="text-2xl font-bold text-white mb-4">{DEMO_SLIDES[currentSlide].title}</h2>
                      <p className="text-slate-400">{DEMO_SLIDES[currentSlide].content}</p>
                    </div>
                  </Card>

                  {/* Controls */}
                  <Card className="p-4">
                    <div className="flex items-center justify-between">
                      <div className="flex gap-2">
                        <Button 
                          size="sm" 
                          variant="ghost" 
                          icon="chevronLeft"
                          onClick={() => setCurrentSlide(Math.max(0, currentSlide - 1))}
                          disabled={currentSlide === 0}
                        />
                        <Button 
                          size="sm" 
                          variant="ghost" 
                          icon="chevronRight"
                          onClick={() => setCurrentSlide(Math.min(DEMO_SLIDES.length - 1, currentSlide + 1))}
                          disabled={currentSlide === DEMO_SLIDES.length - 1}
                        />
                      </div>

                      <div className="flex gap-2">
                        {!isRecording ? (
                          <Button 
                            variant="primary" 
                            icon="mic"
                            onClick={() => setIsRecording(true)}
                          >
                            Start Recording
                          </Button>
                        ) : (
                          <>
                            <Button 
                              variant={isPaused ? 'primary' : 'secondary'} 
                              icon={isPaused ? 'play' : 'pause'}
                              onClick={() => setIsPaused(!isPaused)}
                            >
                              {isPaused ? 'Resume' : 'Pause'}
                            </Button>
                            <Button 
                              variant="danger" 
                              icon="stop"
                              onClick={() => { setIsRecording(false); setIsPaused(false); }}
                            >
                              Stop
                            </Button>
                          </>
                        )}
                      </div>

                      <Button size="sm" variant="ghost" onClick={() => setMode('overview')}>
                        Exit
                      </Button>
                    </div>
                  </Card>

                  {/* Recording Indicator */}
                  {isRecording && (
                    <Card className={`p-4 ${isPaused ? 'bg-amber-500/10 border-amber-500/30' : 'bg-red-500/10 border-red-500/30'}`}>
                      <div className="flex items-center gap-3">
                        <div className={`w-3 h-3 rounded-full ${isPaused ? 'bg-amber-500' : 'bg-red-500 animate-pulse'}`} />
                        <span className={`font-medium ${isPaused ? 'text-amber-400' : 'text-red-400'}`}>
                          {isPaused ? 'Recording Paused' : 'Recording in Progress'}
                        </span>
                        <div className="flex-1" />
                        <Icon name="volume" className={`w-5 h-5 ${isPaused ? 'text-amber-400' : 'text-red-400'}`} />
                      </div>
                    </Card>
                  )}
                </div>

                {/* Right Panel */}
                <div className="col-span-3 space-y-4">
                  {/* Timer */}
                  <Card className="p-4">
                    <Timer isRunning={isRecording && !isPaused} maxTime={2700} />
                  </Card>

                  {/* Q&A Panel */}
                  <QAPanel questions={DEMO_QUESTIONS} />

                  {/* Speaker Notes */}
                  <Card className="p-4">
                    <h4 className="font-semibold text-white text-sm mb-3 flex items-center gap-2">
                      <Icon name="zap" className="w-4 h-4 text-amber-400" />
                      Speaker Notes
                    </h4>
                    <p className="text-sm text-slate-400">
                      Key points: Cloud-native, FedRAMP High, 99.9% uptime SLA, Zero Trust architecture.
                    </p>
                  </Card>
                </div>
              </div>
            )}
          </main>

          {/* Footer */}
          <footer className="max-w-7xl mx-auto px-6 py-6 border-t border-slate-800 mt-8">
            <div className="flex items-center justify-between text-xs text-slate-500">
              <span>Mission Meets Tech • MissionPulse v12.0</span>
              <span className="text-amber-500/70">AI GENERATED - REQUIRES HUMAN REVIEW</span>
            </div>
          </footer>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<OralsStudio />);
  </script>
</body>
</html>
