<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Pipeline Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
    @keyframes slide-in { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-slide-in { animation: slide-in 0.2s ease-out; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    // ============================================
    // CONFIGURATION
    // ============================================
    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const API_URL = 'https://missionpulse-api.onrender.com';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // ============================================
    // DEMO DATA
    // ============================================
    const DEMO_OPPORTUNITIES = [
      { id: 1, title: 'VA EHR Modernization', agency: 'VA', phase: 'Blue Team', ceiling_value: 125000000, pwin: 72, due_date: '2026-02-15', priority: 'critical', naics: '541512', set_aside: 'SDVOSB', contract_type: 'FFP', status: 'active' },
      { id: 2, title: 'DHA MHS GENESIS Support', agency: 'DHA', phase: 'Red Team', ceiling_value: 89000000, pwin: 65, due_date: '2026-02-20', priority: 'high', naics: '541519', set_aside: 'Full & Open', contract_type: 'T&M', status: 'active' },
      { id: 3, title: 'CMS Data Analytics Platform', agency: 'CMS', phase: 'Capture', ceiling_value: 45000000, pwin: 55, due_date: '2026-03-01', priority: 'medium', naics: '541512', set_aside: '8(a)', contract_type: 'CPFF', status: 'active' },
      { id: 4, title: 'IHS Telehealth Expansion', agency: 'IHS', phase: 'Pink Team', ceiling_value: 67000000, pwin: 48, due_date: '2026-02-28', priority: 'high', naics: '541511', set_aside: 'SDVOSB', contract_type: 'FFP', status: 'active' },
      { id: 5, title: 'FDA IT Infrastructure', agency: 'FDA', phase: 'Gold Team', ceiling_value: 156000000, pwin: 78, due_date: '2026-02-10', priority: 'critical', naics: '541513', set_aside: 'Full & Open', contract_type: 'IDIQ', status: 'active' },
      { id: 6, title: 'NIH Cloud Migration', agency: 'NIH', phase: 'Qualify', ceiling_value: 34000000, pwin: 35, due_date: '2026-04-15', priority: 'low', naics: '541519', set_aside: 'Small Business', contract_type: 'FFP', status: 'active' }
    ];

    const PHASES = ['Qualify', 'Capture', 'Blue Team', 'Pink Team', 'Red Team', 'Gold Team', 'White Glove', 'Submitted'];
    const PRIORITIES = ['critical', 'high', 'medium', 'low'];
    const SET_ASIDES = ['Full & Open', 'SDVOSB', '8(a)', 'HUBZone', 'WOSB', 'Small Business'];
    const CONTRACT_TYPES = ['FFP', 'T&M', 'CPFF', 'CPAF', 'IDIQ', 'BPA'];
    const AGENCIES = ['VA', 'DHA', 'CMS', 'IHS', 'FDA', 'NIH', 'CDC', 'HHS', 'DoD', 'GSA'];

    const PHASE_COLORS = {
      'Qualify': { bg: 'bg-slate-600', text: 'text-slate-300', border: 'border-slate-500' },
      'Capture': { bg: 'bg-purple-600', text: 'text-purple-300', border: 'border-purple-500' },
      'Blue Team': { bg: 'bg-blue-600', text: 'text-blue-300', border: 'border-blue-500' },
      'Pink Team': { bg: 'bg-pink-600', text: 'text-pink-300', border: 'border-pink-500' },
      'Red Team': { bg: 'bg-red-600', text: 'text-red-300', border: 'border-red-500' },
      'Gold Team': { bg: 'bg-amber-600', text: 'text-amber-300', border: 'border-amber-500' },
      'White Glove': { bg: 'bg-emerald-600', text: 'text-emerald-300', border: 'border-emerald-500' },
      'Submitted': { bg: 'bg-cyan-600', text: 'text-cyan-300', border: 'border-cyan-500' }
    };

    // ============================================
    // AI INTEGRATION
    // ============================================
    const sendToAI = async (message, context = {}) => {
      try {
        const response = await fetch(`${API_URL}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message,
            agent: 'capture',
            context: { module: 'pipeline', ...context }
          })
        });
        if (!response.ok) throw new Error('API error');
        const data = await response.json();
        return { content: data.response, provider: 'anthropic' };
      } catch (e) {
        return { content: 'AI service temporarily unavailable.', error: true };
      }
    };

    // ============================================
    // UTILITY FUNCTIONS
    // ============================================
    const formatCurrency = (value) => {
      if (!value) return '$0';
      if (value >= 1000000000) return `$${(value / 1000000000).toFixed(1)}B`;
      if (value >= 1000000) return `$${(value / 1000000).toFixed(0)}M`;
      if (value >= 1000) return `$${(value / 1000).toFixed(0)}K`;
      return `$${value}`;
    };

    const formatDate = (dateStr) => {
      if (!dateStr) return 'TBD';
      return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    };

    const getDaysLeft = (dateStr) => {
      if (!dateStr) return null;
      const diff = new Date(dateStr) - new Date();
      return Math.ceil(diff / (1000 * 60 * 60 * 24));
    };

    // ============================================
    // COMPONENTS
    // ============================================

    // Modal
    const Modal = ({ isOpen, onClose, title, children }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center">
          <div className="absolute inset-0 bg-black/70" onClick={onClose}></div>
          <div className="relative glass border border-slate-700 rounded-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto animate-slide-in m-4">
            <div className="flex items-center justify-between p-4 border-b border-slate-700">
              <h2 className="text-lg font-semibold text-white">{title}</h2>
              <button onClick={onClose} className="text-slate-400 hover:text-white p-1">✕</button>
            </div>
            <div className="p-6">{children}</div>
          </div>
        </div>
      );
    };

    // Opportunity Form
    const OpportunityForm = ({ opportunity, onSave, onCancel }) => {
      const [form, setForm] = React.useState(opportunity || {
        title: '',
        agency: 'VA',
        phase: 'Qualify',
        ceiling_value: 0,
        pwin: 50,
        due_date: '',
        priority: 'medium',
        naics: '',
        set_aside: 'Full & Open',
        contract_type: 'FFP',
        status: 'active'
      });

      const handleSubmit = (e) => {
        e.preventDefault();
        onSave(form);
      };

      return (
        <form onSubmit={handleSubmit} className="space-y-4">
          <div className="grid grid-cols-2 gap-4">
            <div className="col-span-2">
              <label className="block text-sm text-slate-400 mb-1">Opportunity Title *</label>
              <input
                type="text"
                value={form.title}
                onChange={(e) => setForm({ ...form, title: e.target.value })}
                required
                className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                placeholder="e.g., VA EHR Modernization"
              />
            </div>

            <div>
              <label className="block text-sm text-slate-400 mb-1">Agency</label>
              <select
                value={form.agency}
                onChange={(e) => setForm({ ...form, agency: e.target.value })}
                className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
              >
                {AGENCIES.map(a => <option key={a} value={a}>{a}</option>)}
              </select>
            </div>

            <div>
              <label className="block text-sm text-slate-400 mb-1">Phase</label>
              <select
                value={form.phase}
                onChange={(e) => setForm({ ...form, phase: e.target.value })}
                className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
              >
                {PHASES.map(p => <option key={p} value={p}>{p}</option>)}
              </select>
            </div>

            <div>
              <label className="block text-sm text-slate-400 mb-1">Ceiling Value ($)</label>
              <input
                type="number"
                value={form.ceiling_value}
                onChange={(e) => setForm({ ...form, ceiling_value: parseInt(e.target.value) || 0 })}
                className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
              />
            </div>

            <div>
              <label className="block text-sm text-slate-400 mb-1">Win Probability (%)</label>
              <input
                type="number"
                value={form.pwin}
                onChange={(e) => setForm({ ...form, pwin: parseInt(e.target.value) || 0 })}
                min="0"
                max="100"
                className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
              />
            </div>

            <div>
              <label className="block text-sm text-slate-400 mb-1">Due Date</label>
              <input
                type="date"
                value={form.due_date}
                onChange={(e) => setForm({ ...form, due_date: e.target.value })}
                className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
              />
            </div>

            <div>
              <label className="block text-sm text-slate-400 mb-1">Priority</label>
              <select
                value={form.priority}
                onChange={(e) => setForm({ ...form, priority: e.target.value })}
                className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
              >
                {PRIORITIES.map(p => <option key={p} value={p}>{p.charAt(0).toUpperCase() + p.slice(1)}</option>)}
              </select>
            </div>

            <div>
              <label className="block text-sm text-slate-400 mb-1">NAICS Code</label>
              <input
                type="text"
                value={form.naics}
                onChange={(e) => setForm({ ...form, naics: e.target.value })}
                className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                placeholder="e.g., 541512"
              />
            </div>

            <div>
              <label className="block text-sm text-slate-400 mb-1">Set-Aside</label>
              <select
                value={form.set_aside}
                onChange={(e) => setForm({ ...form, set_aside: e.target.value })}
                className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
              >
                {SET_ASIDES.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            </div>

            <div>
              <label className="block text-sm text-slate-400 mb-1">Contract Type</label>
              <select
                value={form.contract_type}
                onChange={(e) => setForm({ ...form, contract_type: e.target.value })}
                className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
              >
                {CONTRACT_TYPES.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
          </div>

          <div className="flex justify-end gap-3 pt-4 border-t border-slate-700">
            <button
              type="button"
              onClick={onCancel}
              className="px-4 py-2 text-slate-400 hover:text-white transition-colors"
            >
              Cancel
            </button>
            <button
              type="submit"
              className="px-6 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg font-medium transition-colors"
            >
              {opportunity ? 'Update' : 'Create'} Opportunity
            </button>
          </div>
        </form>
      );
    };

    // Opportunity Row
    const OpportunityRow = ({ opp, onEdit, onDelete }) => {
      const phase = PHASE_COLORS[opp.phase] || PHASE_COLORS['Qualify'];
      const daysLeft = getDaysLeft(opp.due_date);
      const priorityColors = {
        critical: 'bg-red-500/20 text-red-400',
        high: 'bg-amber-500/20 text-amber-400',
        medium: 'bg-blue-500/20 text-blue-400',
        low: 'bg-slate-500/20 text-slate-400'
      };

      return (
        <tr className="border-b border-slate-800 hover:bg-slate-800/50 transition-colors group">
          <td className="py-4 px-4">
            <div className="font-medium text-white">{opp.title}</div>
            <div className="text-sm text-slate-400 flex items-center gap-2">
              <span>{opp.agency}</span>
              {opp.naics && <span className="text-xs font-mono text-slate-500">• {opp.naics}</span>}
            </div>
          </td>
          <td className="py-4 px-4">
            <span className={`px-3 py-1 rounded-full text-xs ${phase.bg} ${phase.text}`}>
              {opp.phase}
            </span>
          </td>
          <td className="py-4 px-4 text-right font-mono text-cyan-400">
            {formatCurrency(opp.ceiling_value)}
          </td>
          <td className="py-4 px-4">
            <div className="flex items-center gap-2">
              <div className="w-16 h-2 bg-slate-700 rounded-full overflow-hidden">
                <div 
                  className={`h-full rounded-full ${opp.pwin >= 70 ? 'bg-emerald-500' : opp.pwin >= 50 ? 'bg-amber-500' : 'bg-red-500'}`}
                  style={{ width: `${opp.pwin}%` }}
                />
              </div>
              <span className="text-sm text-slate-400 font-mono">{opp.pwin}%</span>
            </div>
          </td>
          <td className="py-4 px-4">
            <div className="text-sm">{formatDate(opp.due_date)}</div>
            {daysLeft !== null && (
              <div className={`text-xs ${daysLeft <= 7 ? 'text-red-400' : daysLeft <= 14 ? 'text-amber-400' : 'text-slate-500'}`}>
                {daysLeft > 0 ? `${daysLeft}d left` : daysLeft === 0 ? 'Today!' : `${Math.abs(daysLeft)}d overdue`}
              </div>
            )}
          </td>
          <td className="py-4 px-4">
            <span className={`px-2 py-0.5 rounded text-xs ${priorityColors[opp.priority]}`}>
              {opp.priority?.toUpperCase()}
            </span>
          </td>
          <td className="py-4 px-4">
            <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
              <button
                onClick={() => onEdit(opp)}
                className="p-1.5 hover:bg-slate-700 rounded text-slate-400 hover:text-cyan-400"
                title="Edit"
              >
                ✏️
              </button>
              <button
                onClick={() => onDelete(opp.id)}
                className="p-1.5 hover:bg-slate-700 rounded text-slate-400 hover:text-red-400"
                title="Delete"
              >
                🗑️
              </button>
            </div>
          </td>
        </tr>
      );
    };

    // Stats Bar
    const StatsBar = ({ opportunities }) => {
      const totalValue = opportunities.reduce((sum, o) => sum + (o.ceiling_value || 0), 0);
      const avgPwin = opportunities.length > 0 
        ? Math.round(opportunities.reduce((sum, o) => sum + (o.pwin || 0), 0) / opportunities.length)
        : 0;
      const criticalCount = opportunities.filter(o => o.priority === 'critical').length;

      return (
        <div className="grid grid-cols-4 gap-4">
          {[
            { label: 'Total Pipeline', value: formatCurrency(totalValue), color: 'cyan' },
            { label: 'Opportunities', value: opportunities.length, color: 'blue' },
            { label: 'Avg pWin', value: `${avgPwin}%`, color: 'emerald' },
            { label: 'Critical', value: criticalCount, color: criticalCount > 0 ? 'red' : 'slate' }
          ].map(({ label, value, color }) => (
            <div key={label} className="glass rounded-lg p-4 border border-slate-700/50">
              <p className="text-xs text-slate-400">{label}</p>
              <p className={`text-2xl font-bold text-${color}-400`}>{value}</p>
            </div>
          ))}
        </div>
      );
    };

    // AI Chat Widget
    const AIChatWidget = ({ opportunities }) => {
      const [isOpen, setIsOpen] = React.useState(false);
      const [messages, setMessages] = React.useState([]);
      const [input, setInput] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const messagesEndRef = React.useRef(null);

      React.useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      const handleSend = async () => {
        if (!input.trim() || loading) return;
        const userMsg = input.trim();
        setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
        setInput('');
        setLoading(true);

        const result = await sendToAI(userMsg, { 
          opportunityCount: opportunities.length,
          totalValue: opportunities.reduce((s, o) => s + (o.ceiling_value || 0), 0)
        });
        setMessages(prev => [...prev, { role: 'assistant', ...result }]);
        setLoading(false);
      };

      if (!isOpen) {
        return (
          <button
            onClick={() => setIsOpen(true)}
            className="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-full shadow-lg hover:shadow-cyan-500/25 transition-all flex items-center justify-center z-50"
          >
            <span className="text-2xl">💬</span>
          </button>
        );
      }

      return (
        <div className="fixed bottom-6 right-6 w-96 h-[500px] glass border border-slate-700 rounded-xl shadow-2xl flex flex-col z-50">
          <div className="flex items-center justify-between p-4 border-b border-slate-700">
            <div>
              <h3 className="font-semibold text-white">Capture Intelligence</h3>
              <span className="text-xs text-emerald-400">● Online</span>
            </div>
            <button onClick={() => setIsOpen(false)} className="text-slate-400 hover:text-white">✕</button>
          </div>
          
          <div className="flex-1 overflow-y-auto p-4 space-y-4">
            {messages.length === 0 && (
              <div className="space-y-2">
                <p className="text-xs text-slate-500 mb-3">Ask about your pipeline:</p>
                {['Which opportunities need attention?', 'Analyze pipeline health', 'Recommend capture priorities'].map((p, i) => (
                  <button key={i} onClick={() => setInput(p)} className="block w-full text-left px-3 py-2 rounded bg-slate-800 hover:bg-slate-700 text-slate-300 text-sm">
                    {p}
                  </button>
                ))}
              </div>
            )}
            {messages.map((msg, i) => (
              <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-[80%] px-4 py-2 rounded-lg ${
                  msg.role === 'user' ? 'bg-cyan-600 text-white' : 
                  msg.error ? 'bg-red-900/50 text-red-300' : 'bg-slate-800 text-slate-200'
                }`}>
                  {msg.content}
                </div>
              </div>
            ))}
            {loading && <div className="flex justify-start"><div className="bg-slate-800 px-4 py-2 rounded-lg text-slate-400">...</div></div>}
            <div ref={messagesEndRef} />
          </div>
          
          <div className="p-4 border-t border-slate-700">
            <div className="flex gap-2">
              <input
                type="text"
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                placeholder="Ask about pipeline..."
                className="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500"
              />
              <button onClick={handleSend} disabled={loading || !input.trim()} className="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 disabled:bg-slate-700 rounded-lg transition-colors">→</button>
            </div>
          </div>
        </div>
      );
    };

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [opportunities, setOpportunities] = React.useState(DEMO_OPPORTUNITIES);
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [modalOpen, setModalOpen] = React.useState(false);
      const [editingOpp, setEditingOpp] = React.useState(null);
      const [filter, setFilter] = React.useState({ phase: '', priority: '', search: '' });

      React.useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        try {
          const { data, error } = await supabase
            .from('opportunities')
            .select('*')
            .order('due_date', { ascending: true });

          if (!error && data && data.length > 0) {
            setOpportunities(data);
            setConnected(true);
          }
        } catch (e) {
          console.log('Using demo data:', e);
        } finally {
          setLoading(false);
        }
      };

      const handleSave = async (formData) => {
        if (editingOpp) {
          // Update
          if (connected) {
            const { error } = await supabase
              .from('opportunities')
              .update(formData)
              .eq('id', editingOpp.id);
            if (!error) {
              setOpportunities(prev => prev.map(o => o.id === editingOpp.id ? { ...o, ...formData } : o));
            }
          } else {
            setOpportunities(prev => prev.map(o => o.id === editingOpp.id ? { ...o, ...formData } : o));
          }
        } else {
          // Create
          if (connected) {
            const { data, error } = await supabase
              .from('opportunities')
              .insert([formData])
              .select()
              .single();
            if (!error && data) {
              setOpportunities(prev => [...prev, data]);
            }
          } else {
            const newId = Math.max(...opportunities.map(o => o.id), 0) + 1;
            setOpportunities(prev => [...prev, { ...formData, id: newId }]);
          }
        }
        setModalOpen(false);
        setEditingOpp(null);
      };

      const handleEdit = (opp) => {
        setEditingOpp(opp);
        setModalOpen(true);
      };

      const handleDelete = async (id) => {
        if (!confirm('Delete this opportunity?')) return;
        if (connected) {
          await supabase.from('opportunities').delete().eq('id', id);
        }
        setOpportunities(prev => prev.filter(o => o.id !== id));
      };

      const filteredOpps = opportunities.filter(opp => {
        if (filter.phase && opp.phase !== filter.phase) return false;
        if (filter.priority && opp.priority !== filter.priority) return false;
        if (filter.search && !opp.title.toLowerCase().includes(filter.search.toLowerCase())) return false;
        return true;
      });

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-slate-400">Loading Pipeline...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-700/50 rounded-lg">← Back</a>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center">📊</div>
                  <div>
                    <h1 className="text-xl font-bold text-white">Pipeline Intelligence</h1>
                    <p className="text-xs text-slate-400">Opportunity Tracking & Analysis</p>
                  </div>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <button
                  onClick={() => { setEditingOpp(null); setModalOpen(true); }}
                  className="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg font-medium transition-colors"
                >
                  + New Opportunity
                </button>
                <div className={`px-3 py-1 rounded-full text-xs ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                  {connected ? '● Connected' : '○ Demo'}
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8 space-y-6">
            {/* Stats */}
            <StatsBar opportunities={opportunities} />

            {/* Filters */}
            <div className="flex items-center gap-4 flex-wrap">
              <input
                type="text"
                placeholder="Search opportunities..."
                value={filter.search}
                onChange={(e) => setFilter({ ...filter, search: e.target.value })}
                className="flex-1 min-w-64 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
              />
              <select
                value={filter.phase}
                onChange={(e) => setFilter({ ...filter, phase: e.target.value })}
                className="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
              >
                <option value="">All Phases</option>
                {PHASES.map(p => <option key={p} value={p}>{p}</option>)}
              </select>
              <select
                value={filter.priority}
                onChange={(e) => setFilter({ ...filter, priority: e.target.value })}
                className="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
              >
                <option value="">All Priorities</option>
                {PRIORITIES.map(p => <option key={p} value={p}>{p.charAt(0).toUpperCase() + p.slice(1)}</option>)}
              </select>
            </div>

            {/* Table */}
            <div className="glass rounded-xl border border-slate-700/50 overflow-hidden">
              <table className="w-full">
                <thead className="bg-slate-800/50">
                  <tr className="text-left text-xs text-slate-400 uppercase tracking-wider">
                    <th className="py-3 px-4">Opportunity</th>
                    <th className="py-3 px-4">Phase</th>
                    <th className="py-3 px-4 text-right">Value</th>
                    <th className="py-3 px-4">pWin</th>
                    <th className="py-3 px-4">Due Date</th>
                    <th className="py-3 px-4">Priority</th>
                    <th className="py-3 px-4"></th>
                  </tr>
                </thead>
                <tbody>
                  {filteredOpps.map(opp => (
                    <OpportunityRow key={opp.id} opp={opp} onEdit={handleEdit} onDelete={handleDelete} />
                  ))}
                  {filteredOpps.length === 0 && (
                    <tr>
                      <td colSpan="7" className="py-12 text-center text-slate-500">
                        No opportunities match your filters
                      </td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          </main>

          {/* Footer */}
          <footer className="border-t border-slate-800 py-6">
            <div className="max-w-7xl mx-auto px-6 flex justify-between">
              <p className="text-xs text-slate-500">© 2026 Mission Meets Tech</p>
              <p className="text-xs text-slate-600">AI GENERATED - REQUIRES HUMAN REVIEW</p>
            </div>
          </footer>

          {/* Modal */}
          <Modal
            isOpen={modalOpen}
            onClose={() => { setModalOpen(false); setEditingOpp(null); }}
            title={editingOpp ? 'Edit Opportunity' : 'New Opportunity'}
          >
            <OpportunityForm
              opportunity={editingOpp}
              onSave={handleSave}
              onCancel={() => { setModalOpen(false); setEditingOpp(null); }}
            />
          </Modal>

          {/* AI Chat */}
          <AIChatWidget opportunities={opportunities} />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
