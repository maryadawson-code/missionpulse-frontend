        // =========================================================================

        function timeAgo(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);
            
            if (seconds < 60) return 'Just now';
            if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
            if (seconds < 604800) return `${Math.floor(seconds / 86400)}d ago`;
            return date.toLocaleDateString();
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            return new Date(dateString).toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // =========================================================================
        // MAIN APP
        // =========================================================================
        function App() {
            const [leads, setLeads] = useState(DEMO_LEADS);
            const [connected, setConnected] = useState(false);
            const [loading, setLoading] = useState(true);
            const [selectedLead, setSelectedLead] = useState(null);
            const [filter, setFilter] = useState('all');
            const [searchTerm, setSearchTerm] = useState('');
            const [sortBy, setSortBy] = useState('created_at');
            const [sortOrder, setSortOrder] = useState('desc');

            useEffect(() => {
                loadLeads();
            }, []);

            const loadLeads = async () => {
                try {
                    const { data, error } = await supabase
                        .from('access_requests')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    if (!error && data && data.length > 0) {
                        setLeads(data);
                        setConnected(true);
                    }
                } catch (e) {
                    console.log('Using demo data');
                }
                setLoading(false);
            };

            const updateLead = async (updatedLead) => {
                // Update local state immediately
                setLeads(prev => prev.map(l => l.id === updatedLead.id ? updatedLead : l));
                
                // Try to update in Supabase
                if (connected) {
                    try {
                        await supabase
                            .from('access_requests')
                            .update(updatedLead)
                            .eq('id', updatedLead.id);
                    } catch (e) {
                        console.error('Failed to update lead:', e);
                    }
                }
            };

            // Filter and sort leads
            const filteredLeads = useMemo(() => {
                let result = [...leads];
                
                // Status filter
                if (filter !== 'all') {
                    result = result.filter(l => l.status === filter);
                }
                
                // Search filter
                if (searchTerm) {
                    const term = searchTerm.toLowerCase();
                    result = result.filter(l => 
                        l.first_name.toLowerCase().includes(term) ||
                        l.last_name.toLowerCase().includes(term) ||
                        l.email.toLowerCase().includes(term) ||
                        l.company.toLowerCase().includes(term)
                    );
                }
                
                // Sort
                result.sort((a, b) => {
                    let aVal = a[sortBy];
                    let bVal = b[sortBy];
                    
                    if (sortBy === 'created_at') {
                        aVal = new Date(aVal);
                        bVal = new Date(bVal);
                    }
                    
                    if (sortOrder === 'asc') {
                        return aVal > bVal ? 1 : -1;
                    }
                    return aVal < bVal ? 1 : -1;
                });
                
                return result;
            }, [leads, filter, searchTerm, sortBy, sortOrder]);

            // Calculate stats
            const stats = useMemo(() => {
                const now = new Date();
                const weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);
                
                return {
                    total: leads.length,
                    new: leads.filter(l => l.status === 'new').length,
                    thisWeek: leads.filter(l => new Date(l.created_at) > weekAgo).length,
                    qualified: leads.filter(l => l.status === 'qualified').length,
                    converted: leads.filter(l => l.status === 'converted').length,
                    demosScheduled: leads.filter(l => l.demo_scheduled).length
                };
            }, [leads]);

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-cyan-400 text-xl">Loading leads...</div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="glass border-b border-cyan-500/20 px-6 py-4 sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <a href="index.html" className="text-2xl font-bold">
                                    <span className="text-cyan-400">Mission</span>
                                    <span className="text-white">Pulse</span>
                                </a>
                                <span className="text-slate-500">|</span>
                                <span className="text-slate-400">Leads Management</span>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className={`flex items-center gap-2 px-3 py-1 rounded-full text-xs ${
                                    connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'
                                }`}>
                                    <div className={`w-2 h-2 rounded-full ${connected ? 'bg-emerald-400' : 'bg-amber-400'}`} />
                                    {connected ? 'Connected' : 'Demo Mode'}
                                </div>
                                <a href="index.html" className="text-slate-400 hover:text-cyan-400">
                                    ← Dashboard
                                </a>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-6 py-8">
                        {/* Stats */}
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8">
                            <StatCard label="Total Leads" value={stats.total} icon="📊" />
                            <StatCard label="New" value={stats.new} icon="🆕" trend={stats.thisWeek > 0 ? Math.round((stats.thisWeek / stats.total) * 100) : 0} />
                            <StatCard label="This Week" value={stats.thisWeek} icon="📅" />
                            <StatCard label="Qualified" value={stats.qualified} icon="✅" />
                            <StatCard label="Demos Booked" value={stats.demosScheduled} icon="📞" />
                            <StatCard label="Converted" value={stats.converted} icon="🎉" />
                        </div>

                        {/* Filters */}
                        <div className="glass p-4 rounded-xl mb-6">
                            <div className="flex flex-col md:flex-row gap-4 items-center justify-between">
                                <div className="flex flex-wrap gap-2">
                                    <button
                                        onClick={() => setFilter('all')}
                                        className={`px-4 py-2 rounded-lg transition-colors ${
                                            filter === 'all' ? 'bg-cyan-500 text-slate-900' : 'text-slate-400 hover:text-white'
                                        }`}
                                    >
                                        All ({leads.length})
                                    </button>
                                    {Object.entries(STATUS_CONFIG).map(([key, config]) => {
                                        const count = leads.filter(l => l.status === key).length;
                                        if (count === 0) return null;
                                        return (
                                            <button
                                                key={key}
                                                onClick={() => setFilter(key)}
                                                className={`px-4 py-2 rounded-lg transition-colors ${
                                                    filter === key ? 'bg-cyan-500 text-slate-900' : 'text-slate-400 hover:text-white'
                                                }`}
                                            >
                                                {config.label} ({count})
                                            </button>
                                        );
                                    })}
                                </div>
                                <div className="flex gap-4">
                                    <input
                                        type="text"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        placeholder="Search leads..."
                                        className="px-4 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 w-64"
                                    />
                                    <a
                                        href="missionpulse-request-access.html"
                                        target="_blank"
                                        className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg font-medium transition-colors"
                                    >
                                        View Form →
                                    </a>
                                </div>
                            </div>
                        </div>

                        {/* Leads Table */}
                        <div className="glass rounded-xl overflow-hidden">
                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead>
                                        <tr className="border-b border-slate-700/50 text-left">
                                            <th className="px-4 py-3 text-slate-400 font-medium text-sm">Contact</th>
                                            <th className="px-4 py-3 text-slate-400 font-medium text-sm">Company</th>
                                            <th className="px-4 py-3 text-slate-400 font-medium text-sm">Certifications</th>
                                            <th className="px-4 py-3 text-slate-400 font-medium text-sm">Status</th>
                                            <th className="px-4 py-3 text-slate-400 font-medium text-sm">Priority</th>
                                            <th className="px-4 py-3 text-slate-400 font-medium text-sm">Submitted</th>
                                            <th className="px-4 py-3 text-slate-400 font-medium text-sm">Demo</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredLeads.map(lead => (
                                            <LeadRow 
                                                key={lead.id} 
                                                lead={lead} 
                                                onClick={setSelectedLead}
                                            />
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                            
                            {filteredLeads.length === 0 && (
                                <div className="p-12 text-center text-slate-500">
                                    No leads found matching your criteria.
                                </div>
                            )}
                        </div>

                        {/* Urgent Leads Alert */}
                        {stats.new > 0 && (
                            <div className="mt-6 bg-amber-500/10 border border-amber-500/30 rounded-xl p-4 flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <span className="text-2xl">⚡</span>
                                    <div>
                                        <p className="text-amber-300 font-medium">
                                            {stats.new} new lead{stats.new !== 1 ? 's' : ''} awaiting response
                                        </p>
                                        <p className="text-amber-300/70 text-sm">
                                            Respond within 24 hours for best conversion rates
                                        </p>
                                    </div>
                                </div>
                                <button
                                    onClick={() => setFilter('new')}
                                    className="px-4 py-2 bg-amber-500 hover:bg-amber-400 text-slate-900 rounded-lg font-medium transition-colors"
                                >
                                    View New Leads
                                </button>
                            </div>
                        )}
                    </main>

                    {/* Lead Detail Modal */}
                    {selectedLead && (
                        <LeadDetailModal
                            lead={selectedLead}
                            onClose={() => setSelectedLead(null)}
                            onUpdate={updateLead}
                        />
                    )}

                    {/* Footer */}
                    <footer className="border-t border-slate-800 mt-8">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between text-sm text-slate-500">
                            <span>MissionPulse v3.1 • Mission Meets Tech</span>
                            <span>AI GENERATED - REQUIRES HUMAN REVIEW</span>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
