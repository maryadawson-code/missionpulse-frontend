<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Integration Tests</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-cyan { 0%, 100% { box-shadow: 0 0 0 0 rgba(0, 229, 250, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(0, 229, 250, 0); } }
    .pulse-icon { animation: pulse-cyan 2s infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const RENDER_API = 'https://missionpulse-api.onrender.com';
    
    let supabase;
    try {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    } catch (e) {
      console.log('Supabase client init failed');
    }

    // Module registry for testing
    const MODULES = [
      { name: 'Dashboard', file: 'index.html', table: null, critical: true },
      { name: 'Pipeline', file: 'missionpulse-pipeline-v2.html', table: 'opportunities', critical: true },
      { name: 'War Room', file: 'missionpulse-warroom-v2.html', table: 'opportunities', critical: true },
      { name: 'Swimlane', file: 'missionpulse-swimlane-v2.html', table: 'opportunities', critical: true },
      { name: 'RFP Shredder', file: 'missionpulse-rfpshredder-v2.html', table: 'rfp_requirements', critical: true },
      { name: 'Black Hat', file: 'missionpulse-blackhat-v2.html', table: 'competitors', critical: true, rbac: ['CEO', 'COO', 'CAP'] },
      { name: 'Pricing Engine', file: 'missionpulse-pricing-v2.html', table: 'pricing_items', critical: true, rbac: ['CEO', 'COO', 'FIN', 'PM'], cui: true },
      { name: 'HITL Queue', file: 'missionpulse-hitl-v2.html', table: 'ai_approvals', critical: true },
      { name: 'Lessons Learned', file: 'missionpulse-lessons-v2.html', table: 'lessons_learned', critical: false },
      { name: 'Contracts Scanner', file: 'missionpulse-contracts-v2.html', table: 'contract_clauses', critical: true },
      { name: 'Audit Log', file: 'missionpulse-audit-v2.html', table: 'audit_logs', critical: true, rbac: ['CEO', 'COO', 'Admin'] },
      { name: 'Post-Award', file: 'missionpulse-postaward-v2.html', table: 'post_award_actions', critical: false },
      { name: 'Settings', file: 'missionpulse-settings-v2.html', table: 'profiles', critical: true },
      { name: 'Health Check', file: 'missionpulse-health-check.html', table: null, critical: true },
      { name: 'Reports', file: 'missionpulse-reports-v2.html', table: null, critical: false },
      { name: 'Launch ROI', file: 'missionpulse-launchroi-v2.html', table: 'launch_checklists', critical: false },
      { name: 'Win Themes', file: 'missionpulse-winthemes-v2.html', table: 'win_themes', critical: true },
      { name: 'Iron Dome', file: 'missionpulse-irondome-v2.html', table: 'proposal_sections', critical: true },
      { name: 'Orals Studio', file: 'missionpulse-orals-v2.html', table: 'orals_decks', critical: true },
      { name: 'Compliance Matrix', file: 'missionpulse-compliance-v2.html', table: 'compliance_items', critical: true },
      { name: 'Teaming Partners', file: 'missionpulse-teaming-v2.html', table: 'teaming_partners', critical: true },
      { name: 'Playbook', file: 'missionpulse-playbook-v2.html', table: 'playbook_tasks', critical: true },
      { name: 'Past Performance', file: 'missionpulse-pastperf-v2.html', table: 'past_performance', critical: false }
    ];

    // Sidebar Component
    function Sidebar({ onNavigate }) {
      const navItems = [
        { icon: '🏠', label: 'Dashboard', path: 'index.html' },
        { icon: '📊', label: 'Pipeline', path: 'missionpulse-pipeline-v2.html' },
        { icon: '🎯', label: 'War Room', path: 'missionpulse-warroom-v2.html' },
        { icon: '📋', label: 'Swimlane', path: 'missionpulse-swimlane-v2.html' },
        { icon: '🔍', label: 'RFP Shredder', path: 'missionpulse-rfpshredder-v2.html' },
        { icon: '🎭', label: 'Black Hat', path: 'missionpulse-blackhat-v2.html' },
        { icon: '💰', label: 'Pricing', path: 'missionpulse-pricing-v2.html' },
        { icon: '🤖', label: 'HITL Queue', path: 'missionpulse-hitl-v2.html' },
        { icon: '📚', label: 'Lessons', path: 'missionpulse-lessons-v2.html' },
        { icon: '📜', label: 'Contracts', path: 'missionpulse-contracts-v2.html' },
        { icon: '📝', label: 'Audit', path: 'missionpulse-audit-v2.html' },
        { icon: '🏆', label: 'Post-Award', path: 'missionpulse-postaward-v2.html' },
        { icon: '⚙️', label: 'Settings', path: 'missionpulse-settings-v2.html' },
        { icon: '🧪', label: 'Integration Tests', path: 'missionpulse-integration-tests.html', active: true },
        { icon: '🤖', label: 'Agent Hub', path: 'missionpulse-agenthub-v2.html' }
      ];

      return (
        <div className="w-64 bg-slate-900/50 border-r border-slate-700 min-h-screen p-4">
          <div className="flex items-center gap-3 mb-8">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center pulse-icon">
              <span className="text-xl">🛡️</span>
            </div>
            <div>
              <div className="font-bold text-cyan-400">MissionPulse</div>
              <div className="text-xs text-slate-400">Integration Tests</div>
            </div>
          </div>
          
          <nav className="space-y-1">
            {navItems.map((item, i) => (
              <a 
                key={i}
                href={item.path}
                className={`flex items-center gap-3 px-3 py-2 rounded-lg transition-all ${
                  item.active 
                    ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' 
                    : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                }`}
              >
                <span>{item.icon}</span>
                <span className="text-sm">{item.label}</span>
              </a>
            ))}
          </nav>
          
          <div className="absolute bottom-4 left-4 right-4">
            <div className="text-xs text-slate-500 text-center">
              Mission Meets Tech
            </div>
          </div>
        </div>
      );
    }

    // Test Result Icon
    function TestIcon({ status }) {
      const icons = {
        pending: <span className="text-slate-400">○</span>,
        running: <span className="animate-spin text-cyan-400">◐</span>,
        pass: <span className="text-emerald-400">✓</span>,
        fail: <span className="text-red-400">✗</span>,
        skip: <span className="text-amber-400">⊘</span>
      };
      return icons[status] || icons.pending;
    }

    // Main App
    function App() {
      const [tests, setTests] = React.useState(
        MODULES.map(m => ({ ...m, status: 'pending', details: null, time: null }))
      );
      const [running, setRunning] = React.useState(false);
      const [summary, setSummary] = React.useState(null);
      const [supabaseStatus, setSupabaseStatus] = React.useState('checking');
      const [apiStatus, setApiStatus] = React.useState('checking');

      React.useEffect(() => {
        checkInfrastructure();
      }, []);

      const checkInfrastructure = async () => {
        // Check Supabase
        try {
          const start = Date.now();
          const { data, error } = await supabase.from('opportunities').select('id').limit(1);
          if (error) throw error;
          setSupabaseStatus('connected');
        } catch (e) {
          setSupabaseStatus('offline');
        }

        // Check Render API
        try {
          const response = await fetch(`${RENDER_API}/health`, { 
            method: 'GET',
            mode: 'cors'
          });
          if (response.ok) {
            setApiStatus('connected');
          } else {
            setApiStatus('offline');
          }
        } catch (e) {
          setApiStatus('offline');
        }
      };

      const runAllTests = async () => {
        setRunning(true);
        setSummary(null);
        
        const results = [...tests];
        let passed = 0, failed = 0, skipped = 0;

        for (let i = 0; i < results.length; i++) {
          results[i].status = 'running';
          setTests([...results]);
          
          const start = Date.now();
          
          try {
            // Test 1: Module file exists (HTTP HEAD request)
            const fileResponse = await fetch(results[i].file, { method: 'HEAD' });
            if (!fileResponse.ok) throw new Error('Module file not found');

            // Test 2: If table specified, check Supabase connectivity
            if (results[i].table && supabaseStatus === 'connected') {
              const { data, error } = await supabase
                .from(results[i].table)
                .select('*')
                .limit(1);
              if (error) throw new Error(`Table error: ${error.message}`);
            }

            results[i].status = 'pass';
            results[i].details = 'All checks passed';
            passed++;
          } catch (e) {
            if (supabaseStatus === 'offline' && results[i].table) {
              results[i].status = 'skip';
              results[i].details = 'Skipped: Supabase offline';
              skipped++;
            } else {
              results[i].status = 'fail';
              results[i].details = e.message;
              failed++;
            }
          }
          
          results[i].time = Date.now() - start;
          setTests([...results]);
          
          // Small delay for visual effect
          await new Promise(r => setTimeout(r, 100));
        }

        setSummary({ passed, failed, skipped, total: results.length });
        setRunning(false);
      };

      const runSingleTest = async (index) => {
        const results = [...tests];
        results[index].status = 'running';
        setTests([...results]);

        const start = Date.now();
        
        try {
          const fileResponse = await fetch(results[index].file, { method: 'HEAD' });
          if (!fileResponse.ok) throw new Error('Module file not found');

          if (results[index].table && supabaseStatus === 'connected') {
            const { data, error } = await supabase
              .from(results[index].table)
              .select('*')
              .limit(1);
            if (error) throw new Error(`Table error: ${error.message}`);
          }

          results[index].status = 'pass';
          results[index].details = 'All checks passed';
        } catch (e) {
          results[index].status = 'fail';
          results[index].details = e.message;
        }
        
        results[index].time = Date.now() - start;
        setTests([...results]);
      };

      const resetTests = () => {
        setTests(MODULES.map(m => ({ ...m, status: 'pending', details: null, time: null })));
        setSummary(null);
      };

      const criticalTests = tests.filter(t => t.critical);
      const criticalPassed = criticalTests.filter(t => t.status === 'pass').length;

      return (
        <div className="flex">
          <Sidebar />
          
          <div className="flex-1 p-6">
            {/* Header */}
            <div className="flex items-center justify-between mb-6">
              <div>
                <h1 className="text-2xl font-bold">Integration Test Suite</h1>
                <p className="text-slate-400 text-sm">Automated testing for all 23 MissionPulse modules</p>
              </div>
              
              <div className="flex items-center gap-3">
                <button
                  onClick={resetTests}
                  className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm transition-colors"
                >
                  Reset
                </button>
                <button
                  onClick={runAllTests}
                  disabled={running}
                  className={`px-6 py-2 rounded-lg text-sm font-medium transition-all ${
                    running
                      ? 'bg-slate-600 cursor-not-allowed'
                      : 'bg-cyan-500 hover:bg-cyan-400 text-slate-900'
                  }`}
                >
                  {running ? 'Running...' : 'Run All Tests'}
                </button>
              </div>
            </div>

            {/* Infrastructure Status */}
            <div className="grid grid-cols-3 gap-4 mb-6">
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <div className="flex items-center justify-between mb-2">
                  <span className="text-slate-400 text-sm">Supabase Database</span>
                  <span className={`w-2 h-2 rounded-full ${
                    supabaseStatus === 'connected' ? 'bg-emerald-400' : 
                    supabaseStatus === 'checking' ? 'bg-amber-400 animate-pulse' : 'bg-red-400'
                  }`} />
                </div>
                <div className="text-lg font-medium capitalize">{supabaseStatus}</div>
                <div className="text-xs text-slate-500 mt-1 truncate">{SUPABASE_URL}</div>
              </div>
              
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <div className="flex items-center justify-between mb-2">
                  <span className="text-slate-400 text-sm">Render API</span>
                  <span className={`w-2 h-2 rounded-full ${
                    apiStatus === 'connected' ? 'bg-emerald-400' : 
                    apiStatus === 'checking' ? 'bg-amber-400 animate-pulse' : 'bg-red-400'
                  }`} />
                </div>
                <div className="text-lg font-medium capitalize">{apiStatus}</div>
                <div className="text-xs text-slate-500 mt-1 truncate">{RENDER_API}</div>
              </div>
              
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <div className="flex items-center justify-between mb-2">
                  <span className="text-slate-400 text-sm">Critical Modules</span>
                  <span className={`w-2 h-2 rounded-full ${
                    criticalPassed === criticalTests.length ? 'bg-emerald-400' : 'bg-amber-400'
                  }`} />
                </div>
                <div className="text-lg font-medium">
                  {criticalPassed} / {criticalTests.length} Passing
                </div>
                <div className="text-xs text-slate-500 mt-1">Production readiness</div>
              </div>
            </div>

            {/* Summary (after tests run) */}
            {summary && (
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4 mb-6">
                <h3 className="font-medium mb-3">Test Results Summary</h3>
                <div className="flex items-center gap-6">
                  <div className="flex items-center gap-2">
                    <span className="text-emerald-400 text-xl">✓</span>
                    <span className="text-emerald-400 font-medium">{summary.passed} Passed</span>
                  </div>
                  <div className="flex items-center gap-2">
                    <span className="text-red-400 text-xl">✗</span>
                    <span className="text-red-400 font-medium">{summary.failed} Failed</span>
                  </div>
                  <div className="flex items-center gap-2">
                    <span className="text-amber-400 text-xl">⊘</span>
                    <span className="text-amber-400 font-medium">{summary.skipped} Skipped</span>
                  </div>
                  <div className="ml-auto text-slate-400 text-sm">
                    Total: {summary.total} tests
                  </div>
                </div>
                
                <div className="mt-3 h-2 bg-slate-700 rounded-full overflow-hidden">
                  <div className="h-full flex">
                    <div 
                      className="bg-emerald-500 transition-all duration-500"
                      style={{ width: `${(summary.passed / summary.total) * 100}%` }}
                    />
                    <div 
                      className="bg-red-500 transition-all duration-500"
                      style={{ width: `${(summary.failed / summary.total) * 100}%` }}
                    />
                    <div 
                      className="bg-amber-500 transition-all duration-500"
                      style={{ width: `${(summary.skipped / summary.total) * 100}%` }}
                    />
                  </div>
                </div>
              </div>
            )}

            {/* Test List */}
            <div className="bg-slate-800/50 border border-slate-700 rounded-xl overflow-hidden">
              <div className="grid grid-cols-12 gap-4 p-4 border-b border-slate-700 text-sm text-slate-400 font-medium">
                <div className="col-span-1">Status</div>
                <div className="col-span-3">Module</div>
                <div className="col-span-2">File</div>
                <div className="col-span-2">Table</div>
                <div className="col-span-2">Details</div>
                <div className="col-span-1">Time</div>
                <div className="col-span-1">Action</div>
              </div>
              
              <div className="divide-y divide-slate-700/50">
                {tests.map((test, i) => (
                  <div 
                    key={i}
                    className={`grid grid-cols-12 gap-4 p-4 items-center text-sm ${
                      test.critical ? 'bg-slate-800/30' : ''
                    }`}
                  >
                    <div className="col-span-1">
                      <TestIcon status={test.status} />
                    </div>
                    <div className="col-span-3 flex items-center gap-2">
                      <span className="font-medium">{test.name}</span>
                      {test.critical && (
                        <span className="px-1.5 py-0.5 bg-red-500/20 text-red-400 text-xs rounded">
                          Critical
                        </span>
                      )}
                      {test.rbac && (
                        <span className="px-1.5 py-0.5 bg-amber-500/20 text-amber-400 text-xs rounded">
                          RBAC
                        </span>
                      )}
                      {test.cui && (
                        <span className="px-1.5 py-0.5 bg-purple-500/20 text-purple-400 text-xs rounded">
                          CUI
                        </span>
                      )}
                    </div>
                    <div className="col-span-2 text-slate-400 text-xs font-mono truncate">
                      {test.file}
                    </div>
                    <div className="col-span-2 text-slate-400 text-xs font-mono">
                      {test.table || '—'}
                    </div>
                    <div className="col-span-2 text-xs truncate" title={test.details}>
                      <span className={
                        test.status === 'pass' ? 'text-emerald-400' :
                        test.status === 'fail' ? 'text-red-400' :
                        test.status === 'skip' ? 'text-amber-400' :
                        'text-slate-500'
                      }>
                        {test.details || 'Not run'}
                      </span>
                    </div>
                    <div className="col-span-1 text-slate-500 text-xs">
                      {test.time ? `${test.time}ms` : '—'}
                    </div>
                    <div className="col-span-1">
                      <button
                        onClick={() => runSingleTest(i)}
                        disabled={running}
                        className="px-2 py-1 text-xs bg-slate-700 hover:bg-slate-600 rounded transition-colors disabled:opacity-50"
                      >
                        Run
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Quick Actions */}
            <div className="mt-6 grid grid-cols-2 gap-4">
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <h3 className="font-medium mb-3">Quick Actions</h3>
                <div className="space-y-2">
                  <button 
                    onClick={() => window.open('https://supabase.com/dashboard/project/qdrtpnpnhkxvfmvfziop', '_blank')}
                    className="w-full text-left px-3 py-2 bg-slate-700/50 hover:bg-slate-700 rounded-lg text-sm transition-colors"
                  >
                    Open Supabase Dashboard →
                  </button>
                  <button 
                    onClick={() => window.open('https://dashboard.render.com', '_blank')}
                    className="w-full text-left px-3 py-2 bg-slate-700/50 hover:bg-slate-700 rounded-lg text-sm transition-colors"
                  >
                    Open Render Dashboard →
                  </button>
                  <button 
                    onClick={() => window.open('https://app.netlify.com', '_blank')}
                    className="w-full text-left px-3 py-2 bg-slate-700/50 hover:bg-slate-700 rounded-lg text-sm transition-colors"
                  >
                    Open Netlify Dashboard →
                  </button>
                </div>
              </div>
              
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <h3 className="font-medium mb-3">Test Coverage</h3>
                <div className="space-y-2 text-sm">
                  <div className="flex justify-between">
                    <span className="text-slate-400">Total Modules</span>
                    <span>{MODULES.length}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-400">Critical Modules</span>
                    <span>{criticalTests.length}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-400">With Supabase</span>
                    <span>{MODULES.filter(m => m.table).length}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-400">RBAC Protected</span>
                    <span>{MODULES.filter(m => m.rbac).length}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-400">CUI Marked</span>
                    <span>{MODULES.filter(m => m.cui).length}</span>
                  </div>
                </div>
              </div>
            </div>

            {/* Footer */}
            <div className="mt-8 text-center text-xs text-slate-500">
              <div>Mission Meets Tech | MissionPulse Integration Test Suite</div>
              <div className="mt-1">AI GENERATED - REQUIRES HUMAN REVIEW</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
