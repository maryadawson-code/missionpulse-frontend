<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Base & Training | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
    .glass-strong { background: rgba(0,229,250,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.2); }
    .glow-text { text-shadow: 0 0 30px rgba(0,229,250,0.5); }
    .glow-box { box-shadow: 0 0 40px rgba(0,229,250,0.15); }
    .pulse-ring { animation: pulse-ring 2s ease-out infinite; }
    @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }
    .upload-zone { border: 2px dashed rgba(0,229,250,0.3); transition: all 0.3s; }
    .upload-zone:hover, .upload-zone.dragover { border-color: #00E5FA; background: rgba(0,229,250,0.1); }
    .step-connector { position: absolute; top: 20px; left: 50%; width: 100%; height: 2px; background: rgba(255,255,255,0.1); }
    .step-connector.completed { background: linear-gradient(90deg, #00E5FA, #10B981); }
    .category-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,229,250,0.2); }
    .progress-bar { background: linear-gradient(90deg, #00E5FA, #10B981); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
    ::-webkit-scrollbar-thumb { background: #00E5FA; border-radius: 3px; }
  </style>
</head>
<body class="text-white">
  <div id="root"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc0MDY0NTIsImV4cCI6MjA1Mjk4MjQ1Mn0.kPykOLcNowFpHLMOCkLfPC17qb2g9jvVbyUjdUSvfyg';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Document Categories Configuration
    const CATEGORIES = [
      { id: 'past_proposals', name: 'Past Proposals', icon: '📑', color: '#00E5FA', description: 'Winning technical volumes, exec summaries, past submissions' },
      { id: 'past_performance', name: 'Past Performance', icon: '⭐', color: '#10B981', description: 'CPARs, citations, case studies, performance reports' },
      { id: 'resumes', name: 'Resumes & Bios', icon: '👤', color: '#8B5CF6', description: 'Key personnel, SME profiles, org charts' },
      { id: 'capabilities', name: 'Capabilities', icon: '🎯', color: '#F59E0B', description: 'Capability statements, qualifications, differentiators' },
      { id: 'templates', name: 'Templates', icon: '📋', color: '#EC4899', description: 'Section templates, outlines, standard formats' },
      { id: 'contracts', name: 'Contracts', icon: '📝', color: '#6366F1', description: 'Awarded contracts, mods, historical pricing' },
      { id: 'competitor_intel', name: 'Competitor Intel', icon: '🔍', color: '#EF4444', description: 'Research, debrief notes, competitive analysis' },
      { id: 'win_loss', name: 'Win/Loss Analysis', icon: '📊', color: '#14B8A6', description: 'Debrief reports, lessons learned, playbook notes' },
      { id: 'company_info', name: 'Company Info', icon: '🏢', color: '#F97316', description: 'Certifications, org charts, boilerplate' },
      { id: 'pricing', name: 'Pricing Models', icon: '💰', color: '#84CC16', description: 'Rate cards, BOEs, pricing templates (CUI)' },
    ];

    // Onboarding Steps Configuration
    const ONBOARDING_STEPS = [
      { id: 1, title: 'Company Profile', icon: '🏢', description: 'Basic company information' },
      { id: 2, title: 'Certifications', icon: '🏅', description: 'Set-asides and certifications' },
      { id: 3, title: 'Past Performance', icon: '⭐', description: 'Upload CPARs and citations' },
      { id: 4, title: 'Key Personnel', icon: '👥', description: 'Team resumes and bios' },
      { id: 5, title: 'Capabilities', icon: '🎯', description: 'Capability statements' },
      { id: 6, title: 'Train AI', icon: '🤖', description: 'Build your company memory' },
    ];

    // Demo Data
    const DEMO_DOCUMENTS = [
      { id: 'd1', file_name: 'DHA_EHR_Proposal_Vol1.pdf', category: 'past_proposals', file_size: 2458000, chunk_count: 47, status: 'ready', uploaded_at: '2025-12-15' },
      { id: 'd2', file_name: 'VA_CPARS_2024_Excellent.pdf', category: 'past_performance', file_size: 156000, chunk_count: 8, status: 'ready', uploaded_at: '2025-12-10' },
      { id: 'd3', file_name: 'CEO_Mary_Womack_Bio.docx', category: 'resumes', file_size: 45000, chunk_count: 3, status: 'ready', uploaded_at: '2025-12-08' },
      { id: 'd4', file_name: 'MMT_Capability_Statement_2025.pdf', category: 'capabilities', file_size: 890000, chunk_count: 12, status: 'ready', uploaded_at: '2025-12-05' },
      { id: 'd5', file_name: 'Technical_Approach_Template.docx', category: 'templates', file_size: 78000, chunk_count: 6, status: 'ready', uploaded_at: '2025-12-01' },
      { id: 'd6', file_name: 'Competitor_Analysis_Leidos.xlsx', category: 'competitor_intel', file_size: 234000, chunk_count: 15, status: 'ready', uploaded_at: '2025-11-28' },
    ];

    const DEMO_ONBOARDING = {
      current_step: 3,
      completed_steps: [1, 2],
      company_profile: {
        name: 'Mission Meets Tech',
        cage_code: 'XXXXX',
        uei: 'XXXXXXXXX',
        naics: ['541512', '541519', '541611'],
        description: 'Federal IT modernization and AI solutions provider specializing in healthcare and defense.',
      },
      documents_uploaded: 6,
      training_status: 'in_progress',
    };

    // State
    let state = {
      user: null,
      userRole: null,
      companyId: null,
      isOnline: false,
      view: 'wizard', // 'wizard' | 'library' | 'settings'
      currentStep: 1,
      completedSteps: [],
      companyProfile: {},
      documents: [],
      onboarding: null,
      isTraining: false,
      trainingProgress: 0,
      uploadQueue: [],
      selectedCategory: 'all',
      searchQuery: '',
    };

    // Initialize
    async function init() {
      const { data: { session } } = await supabase.auth.getSession();
      
      if (session?.user) {
        state.user = session.user;
        state.isOnline = true;
        await loadUserProfile();
        await loadOnboardingProgress();
        await loadDocuments();
      } else {
        // Demo mode
        state.documents = DEMO_DOCUMENTS;
        state.onboarding = DEMO_ONBOARDING;
        state.currentStep = DEMO_ONBOARDING.current_step;
        state.completedSteps = DEMO_ONBOARDING.completed_steps;
        state.companyProfile = DEMO_ONBOARDING.company_profile;
      }
      
      render();
    }

    async function loadUserProfile() {
      try {
        const { data } = await supabase
          .from('profiles')
          .select('role, company_id')
          .eq('id', state.user.id)
          .single();
        
        if (data) {
          state.userRole = data.role;
          state.companyId = data.company_id;
        }
      } catch (e) {
        console.log('Profile load error, using demo');
      }
    }

    async function loadOnboardingProgress() {
      if (!state.companyId) return;
      
      try {
        const { data } = await supabase
          .from('company_onboarding')
          .select('*')
          .eq('company_id', state.companyId)
          .single();
        
        if (data) {
          state.onboarding = data;
          state.currentStep = data.current_step;
          state.completedSteps = data.completed_steps || [];
          state.companyProfile = data.company_profile || {};
        }
      } catch (e) {
        // Initialize onboarding record
        await supabase.from('company_onboarding').insert({
          company_id: state.companyId,
          current_step: 1,
          completed_steps: [],
        });
      }
    }

    async function loadDocuments() {
      if (!state.companyId) return;
      
      try {
        const { data } = await supabase
          .from('company_documents')
          .select('*')
          .eq('company_id', state.companyId)
          .order('uploaded_at', { ascending: false });
        
        if (data) state.documents = data;
      } catch (e) {
        state.documents = DEMO_DOCUMENTS;
      }
    }

    async function saveOnboardingProgress() {
      if (!state.companyId || !state.isOnline) return;
      
      await supabase.from('company_onboarding').upsert({
        company_id: state.companyId,
        current_step: state.currentStep,
        completed_steps: state.completedSteps,
        company_profile: state.companyProfile,
        documents_uploaded: state.documents.length,
        updated_at: new Date().toISOString(),
      });
    }

    function completeStep(stepId) {
      if (!state.completedSteps.includes(stepId)) {
        state.completedSteps.push(stepId);
      }
      if (stepId < 6) {
        state.currentStep = stepId + 1;
      }
      saveOnboardingProgress();
      render();
    }

    function goToStep(stepId) {
      state.currentStep = stepId;
      render();
    }

    async function handleFileUpload(files, category) {
      for (const file of files) {
        const newDoc = {
          id: 'temp-' + Date.now(),
          file_name: file.name,
          file_type: file.type,
          file_size: file.size,
          category: category,
          status: 'processing',
          chunk_count: 0,
          uploaded_at: new Date().toISOString(),
        };
        
        state.documents.unshift(newDoc);
        state.uploadQueue.push({ file, docId: newDoc.id, category });
        render();
        
        // Simulate processing
        setTimeout(() => {
          const idx = state.documents.findIndex(d => d.id === newDoc.id);
          if (idx >= 0) {
            state.documents[idx].status = 'ready';
            state.documents[idx].chunk_count = Math.floor(file.size / 50000) + 1;
          }
          render();
        }, 2000);
      }
    }

    async function deleteDocument(docId) {
      state.documents = state.documents.filter(d => d.id !== docId);
      
      if (state.isOnline && !docId.startsWith('temp-')) {
        await supabase.from('company_documents').delete().eq('id', docId);
      }
      render();
    }

    async function startTraining() {
      state.isTraining = true;
      state.trainingProgress = 0;
      render();
      
      // Simulate training progress
      const interval = setInterval(() => {
        state.trainingProgress += Math.random() * 15;
        if (state.trainingProgress >= 100) {
          state.trainingProgress = 100;
          state.isTraining = false;
          completeStep(6);
          clearInterval(interval);
        }
        render();
      }, 800);
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function getFilteredDocuments() {
      return state.documents.filter(doc => {
        const matchesCategory = state.selectedCategory === 'all' || doc.category === state.selectedCategory;
        const matchesSearch = !state.searchQuery || 
          doc.file_name.toLowerCase().includes(state.searchQuery.toLowerCase());
        return matchesCategory && matchesSearch;
      });
    }

    function getCategoryStats() {
      const stats = {};
      CATEGORIES.forEach(cat => {
        stats[cat.id] = {
          count: state.documents.filter(d => d.category === cat.id).length,
          size: state.documents.filter(d => d.category === cat.id).reduce((sum, d) => sum + (d.file_size || 0), 0),
        };
      });
      return stats;
    }

    // Render Functions
    function render() {
      const root = document.getElementById('root');
      root.innerHTML = `
        <div class="min-h-screen">
          ${renderHeader()}
          <div class="max-w-7xl mx-auto px-4 py-6">
            ${renderNavTabs()}
            ${state.view === 'wizard' ? renderOnboardingWizard() : ''}
            ${state.view === 'library' ? renderDocumentLibrary() : ''}
            ${state.view === 'settings' ? renderSettings() : ''}
          </div>
          ${renderFooter()}
        </div>
      `;
      attachEventListeners();
    }

    function renderHeader() {
      return `
        <header class="glass-strong border-b border-cyan-500/20">
          <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
              <a href="missionpulse-dashboard-v12.html" class="flex items-center gap-3 hover:opacity-80 transition">
                <div class="relative">
                  <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-400 to-cyan-600 flex items-center justify-center">
                    <span class="text-white font-bold text-lg">M</span>
                  </div>
                  <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-emerald-500 rounded-full flex items-center justify-center">
                    <span class="text-[8px]">✓</span>
                  </div>
                </div>
                <div>
                  <h1 class="text-lg font-bold text-white">MissionPulse</h1>
                  <p class="text-xs text-cyan-400">Knowledge Base</p>
                </div>
              </a>
            </div>
            
            <div class="flex items-center gap-4">
              <div class="flex items-center gap-2 px-3 py-1.5 rounded-full ${state.isOnline ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}">
                <div class="w-2 h-2 rounded-full ${state.isOnline ? 'bg-emerald-400' : 'bg-amber-400'}"></div>
                <span class="text-xs font-medium">${state.isOnline ? 'Connected' : 'Demo Mode'}</span>
              </div>
              
              <div class="text-right">
                <p class="text-sm text-white">${state.user?.email || 'Demo User'}</p>
                <p class="text-xs text-cyan-400">${state.userRole || 'CEO'}</p>
              </div>
            </div>
          </div>
        </header>
      `;
    }

    function renderNavTabs() {
      const tabs = [
        { id: 'wizard', label: 'Onboarding Wizard', icon: '🎓' },
        { id: 'library', label: 'Document Library', icon: '📚' },
        { id: 'settings', label: 'AI Settings', icon: '⚙️' },
      ];
      
      return `
        <div class="flex gap-2 mb-6 border-b border-slate-700/50 pb-4">
          ${tabs.map(tab => `
            <button onclick="setView('${tab.id}')" class="px-4 py-2 rounded-lg text-sm font-medium transition ${
              state.view === tab.id 
                ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' 
                : 'text-slate-400 hover:text-white hover:bg-slate-800/50'
            }">
              ${tab.icon} ${tab.label}
            </button>
          `).join('')}
          
          <div class="ml-auto flex items-center gap-3">
            <div class="text-sm text-slate-400">
              <span class="text-cyan-400 font-semibold">${state.documents.length}</span> documents
            </div>
            <div class="text-sm text-slate-400">
              <span class="text-emerald-400 font-semibold">${state.documents.reduce((sum, d) => sum + (d.chunk_count || 0), 0)}</span> knowledge chunks
            </div>
          </div>
        </div>
      `;
    }

    function renderOnboardingWizard() {
      const progress = (state.completedSteps.length / ONBOARDING_STEPS.length) * 100;
      
      return `
        <div class="space-y-6">
          <!-- Progress Header -->
          <div class="glass rounded-2xl p-6 glow-box">
            <div class="flex items-center justify-between mb-4">
              <div>
                <h2 class="text-xl font-bold text-white">🎓 Train Your AI Agents</h2>
                <p class="text-slate-400 text-sm mt-1">Complete the onboarding to personalize AI for your company</p>
              </div>
              <div class="text-right">
                <div class="text-3xl font-bold text-cyan-400">${Math.round(progress)}%</div>
                <div class="text-xs text-slate-400">Complete</div>
              </div>
            </div>
            
            <div class="w-full h-2 bg-slate-700 rounded-full overflow-hidden">
              <div class="h-full progress-bar rounded-full transition-all duration-500" style="width: ${progress}%"></div>
            </div>
          </div>
          
          <!-- Step Indicators -->
          <div class="glass rounded-2xl p-6">
            <div class="flex justify-between relative">
              ${ONBOARDING_STEPS.map((step, idx) => {
                const isCompleted = state.completedSteps.includes(step.id);
                const isCurrent = state.currentStep === step.id;
                
                return `
                  <div class="flex flex-col items-center relative z-10 cursor-pointer" onclick="goToStep(${step.id})">
                    <div class="w-12 h-12 rounded-full flex items-center justify-center text-xl transition-all ${
                      isCompleted 
                        ? 'bg-emerald-500 text-white' 
                        : isCurrent 
                          ? 'bg-cyan-500 text-white ring-4 ring-cyan-500/30' 
                          : 'bg-slate-700 text-slate-400'
                    }">
                      ${isCompleted ? '✓' : step.icon}
                    </div>
                    <span class="mt-2 text-xs font-medium ${isCurrent ? 'text-cyan-400' : 'text-slate-400'}">${step.title}</span>
                  </div>
                  ${idx < ONBOARDING_STEPS.length - 1 ? `
                    <div class="absolute top-6 left-0 w-full h-0.5 bg-slate-700" style="left: ${(100 / ONBOARDING_STEPS.length) * (idx + 0.5)}%; width: ${100 / ONBOARDING_STEPS.length}%">
                      <div class="h-full bg-emerald-500 transition-all" style="width: ${isCompleted ? '100%' : '0%'}"></div>
                    </div>
                  ` : ''}
                `;
              }).join('')}
            </div>
          </div>
          
          <!-- Current Step Content -->
          <div class="glass rounded-2xl p-6">
            ${renderStepContent()}
          </div>
        </div>
      `;
    }

    function renderStepContent() {
      switch(state.currentStep) {
        case 1: return renderStep1();
        case 2: return renderStep2();
        case 3: return renderStep3();
        case 4: return renderStep4();
        case 5: return renderStep5();
        case 6: return renderStep6();
        default: return renderStep1();
      }
    }

    function renderStep1() {
      return `
        <div class="space-y-6">
          <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-xl bg-cyan-500/20 flex items-center justify-center text-2xl">🏢</div>
            <div>
              <h3 class="text-lg font-bold text-white">Company Profile</h3>
              <p class="text-sm text-slate-400">Basic information about your organization</p>
            </div>
          </div>
          
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="text-sm text-slate-400 block mb-1">Company Name *</label>
              <input type="text" id="company_name" value="${state.companyProfile.name || ''}" 
                class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none"
                placeholder="Enter company name">
            </div>
            <div>
              <label class="text-sm text-slate-400 block mb-1">CAGE Code</label>
              <input type="text" id="cage_code" value="${state.companyProfile.cage_code || ''}"
                class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-cyan-500 outline-none"
                placeholder="XXXXX">
            </div>
            <div>
              <label class="text-sm text-slate-400 block mb-1">UEI (Unique Entity ID)</label>
              <input type="text" id="uei" value="${state.companyProfile.uei || ''}"
                class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-cyan-500 outline-none"
                placeholder="12 character UEI">
            </div>
            <div>
              <label class="text-sm text-slate-400 block mb-1">Primary NAICS Code</label>
              <input type="text" id="naics" value="${(state.companyProfile.naics || [])[0] || ''}"
                class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-cyan-500 outline-none"
                placeholder="541512">
            </div>
          </div>
          
          <div>
            <label class="text-sm text-slate-400 block mb-1">Company Description</label>
            <textarea id="company_description" rows="4"
              class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-cyan-500 outline-none resize-none"
              placeholder="Brief description of your company's mission and core competencies...">${state.companyProfile.description || ''}</textarea>
            <p class="text-xs text-slate-500 mt-1">This will be used to generate tailored proposal content.</p>
          </div>
          
          <div class="flex justify-end gap-3 pt-4 border-t border-slate-700/50">
            <button onclick="completeStep(1)" class="px-6 py-2.5 bg-cyan-500 text-white rounded-lg font-medium hover:bg-cyan-400 transition">
              Continue → Certifications
            </button>
          </div>
        </div>
      `;
    }

    function renderStep2() {
      const certs = [
        { id: 'sdvosb', name: 'SDVOSB', desc: 'Service-Disabled Veteran-Owned Small Business' },
        { id: 'wosb', name: 'WOSB', desc: 'Woman-Owned Small Business' },
        { id: 'hubzone', name: 'HUBZone', desc: 'Historically Underutilized Business Zone' },
        { id: '8a', name: '8(a)', desc: 'SBA 8(a) Business Development Program' },
        { id: 'small', name: 'Small Business', desc: 'SBA Size Standard Qualified' },
        { id: 'iso9001', name: 'ISO 9001', desc: 'Quality Management System' },
        { id: 'iso27001', name: 'ISO 27001', desc: 'Information Security Management' },
        { id: 'cmmc2', name: 'CMMC Level 2', desc: 'Cybersecurity Maturity Model Certification' },
      ];
      const selectedCerts = state.companyProfile.certifications || [];
      
      return `
        <div class="space-y-6">
          <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-xl bg-amber-500/20 flex items-center justify-center text-2xl">🏅</div>
            <div>
              <h3 class="text-lg font-bold text-white">Certifications & Set-Asides</h3>
              <p class="text-sm text-slate-400">Select all certifications your company holds</p>
            </div>
          </div>
          
          <div class="grid grid-cols-2 gap-3">
            ${certs.map(cert => `
              <label class="glass rounded-xl p-4 cursor-pointer hover:bg-cyan-500/10 transition ${selectedCerts.includes(cert.id) ? 'border-cyan-500 bg-cyan-500/10' : ''}">
                <div class="flex items-start gap-3">
                  <input type="checkbox" id="cert_${cert.id}" ${selectedCerts.includes(cert.id) ? 'checked' : ''}
                    class="mt-1 w-4 h-4 rounded border-slate-600 text-cyan-500 focus:ring-cyan-500 bg-slate-700">
                  <div>
                    <span class="font-medium text-white">${cert.name}</span>
                    <p class="text-xs text-slate-400 mt-0.5">${cert.desc}</p>
                  </div>
                </div>
              </label>
            `).join('')}

        searchInput.addEventListener('input', (e) => {
          state.searchQuery = e.target.value;
          render();
        });
      }
      
      // Category filter
      const filterSelect = document.getElementById('filter_category');
      if (filterSelect) {
        filterSelect.addEventListener('change', (e) => {
          state.selectedCategory = e.target.value;
          render();
        });
      }
    }

    // Global functions
    window.setView = (view) => { state.view = view; render(); };
    window.goToStep = goToStep;
    window.completeStep = completeStep;
    window.startTraining = startTraining;
    window.deleteDocument = deleteDocument;
    window.filterByCategory = (cat) => { state.selectedCategory = state.selectedCategory === cat ? 'all' : cat; render(); };
    window.recategorizeDoc = async (docId, newCategory) => {
      const idx = state.documents.findIndex(d => d.id === docId);
      if (idx >= 0) {
        state.documents[idx].category = newCategory;
        if (state.isOnline) {
          await supabase.from('company_documents').update({ category: newCategory }).eq('id', docId);
        }
        render();
      }
    };
    
    window.handleDragOver = (e) => { e.preventDefault(); e.currentTarget.classList.add('dragover'); };
    window.handleDragLeave = (e) => { e.currentTarget.classList.remove('dragover'); };
    window.handleDrop = (e, category) => {
      e.preventDefault();
      e.currentTarget.classList.remove('dragover');
      handleFileUpload(Array.from(e.dataTransfer.files), category);
    };

    // Initialize
    init();
  </script>
</body>
</html>
