<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Agent Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-cyan { 0%, 100% { box-shadow: 0 0 0 0 rgba(0, 229, 250, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(0, 229, 250, 0); } }
    .pulse-icon { animation: pulse-cyan 2s infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .float-icon { animation: float 3s ease-in-out infinite; }
    @keyframes typing { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    .typing-dot { animation: typing 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const RENDER_API = 'https://missionpulse-api.onrender.com';
    
    let supabase;
    try {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    } catch (e) {
      console.log('Supabase client init failed');
    }

    // 8 Specialized AI Agents
    const AGENTS = [
      {
        id: 'capture',
        name: 'Capture Agent',
        icon: '🎯',
        color: 'from-cyan-500 to-blue-600',
        description: 'Opportunity qualification, pWin analysis, gate recommendations',
        capabilities: ['Go/No-Go Analysis', 'pWin Calculation', 'Competitor Assessment', 'Capture Strategy'],
        endpoint: '/api/agents/capture',
        module: 'Pipeline',
        status: 'active'
      },
      {
        id: 'strategy',
        name: 'Strategy Agent',
        icon: '🧠',
        color: 'from-purple-500 to-indigo-600',
        description: 'Win themes, discriminators, ghost themes development',
        capabilities: ['Win Theme Generation', 'Discriminator Analysis', 'Value Proposition', 'Competitive Positioning'],
        endpoint: '/api/agents/strategy',
        module: 'Win Themes',
        status: 'active'
      },
      {
        id: 'blackhat',
        name: 'Black Hat Agent',
        icon: '🎭',
        color: 'from-red-500 to-rose-600',
        description: 'Competitive intelligence and threat assessment',
        capabilities: ['Competitor Profiling', 'Weakness Analysis', 'Counter-Strategy', 'Risk Assessment'],
        endpoint: '/api/agents/blackhat',
        module: 'Black Hat',
        status: 'active',
        rbac: ['CEO', 'COO', 'CAP']
      },
      {
        id: 'pricing',
        name: 'Pricing Agent',
        icon: '💰',
        color: 'from-emerald-500 to-teal-600',
        description: 'BOE generation, rate validation, price-to-win analysis',
        capabilities: ['BOE Generation', 'Rate Validation', 'Price-to-Win', 'Cost Analysis'],
        endpoint: '/api/agents/pricing',
        module: 'Pricing',
        status: 'active',
        rbac: ['CEO', 'COO', 'FIN', 'PM'],
        cui: true
      },
      {
        id: 'compliance',
        name: 'Compliance Agent',
        icon: '📋',
        color: 'from-amber-500 to-orange-600',
        description: 'FAR/DFARS analysis, compliance matrix generation',
        capabilities: ['FAR/DFARS Analysis', 'Clause Identification', 'Compliance Matrix', 'Risk Flagging'],
        endpoint: '/api/agents/compliance',
        module: 'Contracts',
        status: 'active'
      },
      {
        id: 'writer',
        name: 'Writer Agent',
        icon: '✍️',
        color: 'from-blue-500 to-cyan-600',
        description: 'Section drafting, executive summaries, response generation',
        capabilities: ['Section Drafting', 'Executive Summary', 'Technical Writing', 'Past Performance'],
        endpoint: '/api/agents/writer',
        module: 'Iron Dome',
        status: 'active'
      },
      {
        id: 'contracts',
        name: 'Contracts Agent',
        icon: '📜',
        color: 'from-slate-500 to-gray-600',
        description: 'Contract clause analysis, risk identification, negotiation support',
        capabilities: ['Clause Analysis', 'Risk Identification', 'Terms Review', 'Negotiation Points'],
        endpoint: '/api/agents/contracts',
        module: 'Contracts',
        status: 'active'
      },
      {
        id: 'orals',
        name: 'Orals Agent',
        icon: '🎤',
        color: 'from-pink-500 to-rose-600',
        description: 'Presentation coaching, Q&A prep, evaluator simulation',
        capabilities: ['Presentation Review', 'Q&A Generation', 'Evaluator Simulation', 'Timing Analysis'],
        endpoint: '/api/agents/orals',
        module: 'Orals Studio',
        status: 'active'
      }
    ];

    // Sidebar Component
    function Sidebar() {
      const navItems = [
        { icon: '🏠', label: 'Dashboard', path: 'index.html' },
        { icon: '📊', label: 'Pipeline', path: 'missionpulse-pipeline-v2.html' },
        { icon: '🎯', label: 'War Room', path: 'missionpulse-warroom-v2.html' },
        { icon: '📋', label: 'Swimlane', path: 'missionpulse-swimlane-v2.html' },
        { icon: '🔍', label: 'RFP Shredder', path: 'missionpulse-rfpshredder-v2.html' },
        { icon: '🎭', label: 'Black Hat', path: 'missionpulse-blackhat-v2.html' },
        { icon: '💰', label: 'Pricing', path: 'missionpulse-pricing-v2.html' },
        { icon: '🤖', label: 'HITL Queue', path: 'missionpulse-hitl-v2.html' },
        { icon: '📚', label: 'Lessons', path: 'missionpulse-lessons-v2.html' },
        { icon: '📜', label: 'Contracts', path: 'missionpulse-contracts-v2.html' },
        { icon: '📝', label: 'Audit', path: 'missionpulse-audit-v2.html' },
        { icon: '🏆', label: 'Post-Award', path: 'missionpulse-postaward-v2.html' },
        { icon: '⚙️', label: 'Settings', path: 'missionpulse-settings-v2.html' },
        { icon: '🧪', label: 'Integration Tests', path: 'missionpulse-integration-tests.html' },
        { icon: '🤖', label: 'Agent Hub', path: 'missionpulse-agenthub-v2.html', active: true }
      ];

      return (
        <div className="w-64 bg-slate-900/50 border-r border-slate-700 min-h-screen p-4">
          <div className="flex items-center gap-3 mb-8">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center pulse-icon">
              <span className="text-xl">🛡️</span>
            </div>
            <div>
              <div className="font-bold text-cyan-400">MissionPulse</div>
              <div className="text-xs text-slate-400">Agent Hub</div>
            </div>
          </div>
          
          <nav className="space-y-1">
            {navItems.map((item, i) => (
              <a 
                key={i}
                href={item.path}
                className={`flex items-center gap-3 px-3 py-2 rounded-lg transition-all ${
                  item.active 
                    ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' 
                    : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                }`}
              >
                <span>{item.icon}</span>
                <span className="text-sm">{item.label}</span>
              </a>
            ))}
          </nav>
          
          <div className="absolute bottom-4 left-4 right-4">
            <div className="text-xs text-slate-500 text-center">
              Mission Meets Tech
            </div>
          </div>
        </div>
      );
    }

    // Agent Card Component
    function AgentCard({ agent, onSelect, isSelected }) {
      return (
        <div 
          onClick={() => onSelect(agent)}
          className={`bg-slate-800/50 border rounded-xl p-4 cursor-pointer transition-all hover:scale-[1.02] ${
            isSelected 
              ? 'border-cyan-500 ring-2 ring-cyan-500/20' 
              : 'border-slate-700 hover:border-slate-600'
          }`}
        >
          <div className="flex items-start justify-between mb-3">
            <div className={`w-12 h-12 rounded-xl bg-gradient-to-br ${agent.color} flex items-center justify-center float-icon`}>
              <span className="text-2xl">{agent.icon}</span>
            </div>
            <div className="flex items-center gap-2">
              {agent.rbac && (
                <span className="px-2 py-0.5 bg-amber-500/20 text-amber-400 text-xs rounded-full">
                  RBAC
                </span>
              )}
              {agent.cui && (
                <span className="px-2 py-0.5 bg-purple-500/20 text-purple-400 text-xs rounded-full">
                  CUI
                </span>
              )}
              <span className={`w-2 h-2 rounded-full ${
                agent.status === 'active' ? 'bg-emerald-400' : 'bg-amber-400'
              }`} />
            </div>
          </div>
          
          <h3 className="font-semibold mb-1">{agent.name}</h3>
          <p className="text-sm text-slate-400 mb-3">{agent.description}</p>
          
          <div className="flex flex-wrap gap-1">
            {agent.capabilities.slice(0, 2).map((cap, i) => (
              <span key={i} className="px-2 py-0.5 bg-slate-700/50 text-slate-300 text-xs rounded">
                {cap}
              </span>
            ))}
            {agent.capabilities.length > 2 && (
              <span className="px-2 py-0.5 bg-slate-700/50 text-slate-400 text-xs rounded">
                +{agent.capabilities.length - 2} more
              </span>
            )}
          </div>
          
          <div className="mt-3 pt-3 border-t border-slate-700/50 flex items-center justify-between text-xs">
            <span className="text-slate-500">Module: {agent.module}</span>
            <span className="text-cyan-400 font-mono">{agent.endpoint}</span>
          </div>
        </div>
      );
    }

    // Chat Interface Component
    function ChatInterface({ agent, apiStatus, onClose }) {
      const [messages, setMessages] = React.useState([
        { role: 'assistant', content: `Hello! I'm the ${agent.name}. ${agent.description}. How can I help you today?` }
      ]);
      const [input, setInput] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const messagesEndRef = React.useRef(null);

      React.useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      const sendMessage = async () => {
        if (!input.trim() || loading) return;
        
        const userMessage = input.trim();
        setInput('');
        setMessages(prev => [...prev, { role: 'user', content: userMessage }]);
        setLoading(true);

        try {
          if (apiStatus !== 'connected') {
            // Demo response when API offline
            await new Promise(r => setTimeout(r, 1500));
            const demoResponses = {
              capture: "Based on the opportunity profile, I recommend a GO decision. The pWin estimate is 68% given your incumbent advantage and strong past performance. Key risks include the aggressive timeline and potential for increased competition.",
              strategy: "I've identified three primary win themes: 1) Mission-focused innovation with proven DHA experience, 2) Cost-effective scalability through agile delivery, 3) Zero-disruption transition leveraging current staff. Each theme should be supported by specific proof points from past contracts.",
              blackhat: "Competitor analysis indicates Company X is likely to emphasize their recent CMMI Level 3 certification. Counter-strategy: Highlight your operational flexibility and faster time-to-capability. They may undercut on price by 5-8%.",
              pricing: "The BOE analysis suggests a total ceiling of $12.4M over the 5-year period. Labor rates are competitive with GSA schedule benchmarks. Consider reducing the contingency factor from 8% to 5% to improve price competitiveness while maintaining margin.",
              compliance: "The RFP contains 47 FAR clauses and 12 DFARS clauses requiring compliance response. Three high-risk clauses identified: 52.204-21 (CUI), 252.204-7012 (CMMC), and 52.222-50 (Human Trafficking). Recommend immediate review of CUI handling procedures.",
              writer: "I've drafted the executive summary emphasizing your three win themes. The technical approach section should lead with the innovative solution architecture before detailing the implementation timeline. Shall I generate the full section text?",
              contracts: "Contract analysis reveals favorable terms in the base period but potential risk in Option Years 3-5 due to the open-ended performance requirements. Recommend negotiating specific deliverable milestones for options.",
              orals: "Based on typical evaluation criteria, prepare for questions on: 1) Key personnel qualifications, 2) Risk mitigation approach, 3) Transition timeline specifics. I've generated 15 practice questions ranked by likelihood."
            };
            setMessages(prev => [...prev, { 
              role: 'assistant', 
              content: demoResponses[agent.id] || "I'm currently in demo mode. When the API is connected, I'll provide real-time analysis and recommendations.",
              demo: true
            }]);
          } else {
            // Real API call
            const response = await fetch(`${RENDER_API}${agent.endpoint}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ 
                message: userMessage,
                context: { agent: agent.id }
              })
            });
            
            if (!response.ok) throw new Error('API request failed');
            
            const data = await response.json();
            setMessages(prev => [...prev, { 
              role: 'assistant', 
              content: data.response || data.message || "Response received but empty."
            }]);
          }
        } catch (e) {
          setMessages(prev => [...prev, { 
            role: 'assistant', 
            content: "I apologize, but I encountered an error processing your request. Please try again.",
            error: true
          }]);
        }
        
        setLoading(false);
      };

      return (
        <div className="bg-slate-800/50 border border-slate-700 rounded-xl flex flex-col h-[600px]">
          {/* Header */}
          <div className="flex items-center justify-between p-4 border-b border-slate-700">
            <div className="flex items-center gap-3">
              <div className={`w-10 h-10 rounded-lg bg-gradient-to-br ${agent.color} flex items-center justify-center`}>
                <span className="text-xl">{agent.icon}</span>
              </div>
              <div>
                <h3 className="font-semibold">{agent.name}</h3>
                <div className="text-xs text-slate-400 flex items-center gap-2">
                  <span className={`w-1.5 h-1.5 rounded-full ${apiStatus === 'connected' ? 'bg-emerald-400' : 'bg-amber-400'}`} />
                  {apiStatus === 'connected' ? 'Connected' : 'Demo Mode'}
                </div>
              </div>
            </div>
            <button 
              onClick={onClose}
              className="p-2 hover:bg-slate-700 rounded-lg transition-colors"
            >
              ✕
            </button>
          </div>
          
          {/* Messages */}
          <div className="flex-1 overflow-y-auto p-4 space-y-4">
            {messages.map((msg, i) => (
              <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-[80%] rounded-xl px-4 py-2 ${
                  msg.role === 'user' 
                    ? 'bg-cyan-500 text-slate-900' 
                    : msg.error 
                      ? 'bg-red-500/20 border border-red-500/30 text-red-200'
                      : msg.demo
                        ? 'bg-slate-700/50 border border-amber-500/30'
                        : 'bg-slate-700'
                }`}>
                  {msg.demo && (
                    <div className="text-xs text-amber-400 mb-1">Demo Response</div>
                  )}
                  <p className="text-sm whitespace-pre-wrap">{msg.content}</p>
                </div>
              </div>
            ))}
            
            {loading && (
              <div className="flex justify-start">
                <div className="bg-slate-700 rounded-xl px-4 py-3">
                  <div className="flex gap-1">
                    <span className="w-2 h-2 bg-slate-400 rounded-full typing-dot"></span>
                    <span className="w-2 h-2 bg-slate-400 rounded-full typing-dot"></span>
                    <span className="w-2 h-2 bg-slate-400 rounded-full typing-dot"></span>
                  </div>
                </div>
              </div>
            )}
            
            <div ref={messagesEndRef} />
          </div>
          
          {/* Input */}
          <div className="p-4 border-t border-slate-700">
            <div className="flex gap-2">
              <input
                type="text"
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
                placeholder={`Ask the ${agent.name}...`}
                className="flex-1 bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
              />
              <button
                onClick={sendMessage}
                disabled={loading || !input.trim()}
                className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg font-medium text-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
              >
                Send
              </button>
            </div>
          </div>
        </div>
      );
    }

    // Main App
    function App() {
      const [selectedAgent, setSelectedAgent] = React.useState(null);
      const [apiStatus, setApiStatus] = React.useState('checking');
      const [supabaseStatus, setSupabaseStatus] = React.useState('checking');

      React.useEffect(() => {
        checkInfrastructure();
      }, []);

      const checkInfrastructure = async () => {
        // Check Supabase
        try {
          const { data, error } = await supabase.from('opportunities').select('id').limit(1);
          if (error) throw error;
          setSupabaseStatus('connected');
        } catch (e) {
          setSupabaseStatus('offline');
        }

        // Check Render API
        try {
          const response = await fetch(`${RENDER_API}/health`, { 
            method: 'GET',
            mode: 'cors'
          });
          if (response.ok) {
            setApiStatus('connected');
          } else {
            setApiStatus('offline');
          }
        } catch (e) {
          setApiStatus('offline');
        }
      };

      const activeAgents = AGENTS.filter(a => a.status === 'active').length;

      return (
        <div className="flex">
          <Sidebar />
          
          <div className="flex-1 p-6">
            {/* Header */}
            <div className="flex items-center justify-between mb-6">
              <div>
                <h1 className="text-2xl font-bold">Agent Hub</h1>
                <p className="text-slate-400 text-sm">8 specialized AI agents powering MissionPulse intelligence</p>
              </div>
              
              <div className="flex items-center gap-4">
                <div className="flex items-center gap-2 px-3 py-1.5 bg-slate-800 rounded-lg">
                  <span className={`w-2 h-2 rounded-full ${supabaseStatus === 'connected' ? 'bg-emerald-400' : 'bg-amber-400'}`} />
                  <span className="text-sm text-slate-400">Supabase</span>
                </div>
                <div className="flex items-center gap-2 px-3 py-1.5 bg-slate-800 rounded-lg">
                  <span className={`w-2 h-2 rounded-full ${apiStatus === 'connected' ? 'bg-emerald-400' : 'bg-amber-400'}`} />
                  <span className="text-sm text-slate-400">Render API</span>
                </div>
              </div>
            </div>

            {/* Stats */}
            <div className="grid grid-cols-4 gap-4 mb-6">
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <div className="text-3xl font-bold text-cyan-400">{AGENTS.length}</div>
                <div className="text-sm text-slate-400">Total Agents</div>
              </div>
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <div className="text-3xl font-bold text-emerald-400">{activeAgents}</div>
                <div className="text-sm text-slate-400">Active</div>
              </div>
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <div className="text-3xl font-bold text-amber-400">{AGENTS.filter(a => a.rbac).length}</div>
                <div className="text-sm text-slate-400">RBAC Protected</div>
              </div>
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <div className="text-3xl font-bold text-purple-400">{AGENTS.filter(a => a.cui).length}</div>
                <div className="text-sm text-slate-400">CUI Marked</div>
              </div>
            </div>

            {/* Main Content */}
            <div className="grid grid-cols-2 gap-6">
              {/* Agent Grid */}
              <div className="space-y-4">
                <h2 className="font-semibold text-lg">Available Agents</h2>
                <div className="grid grid-cols-2 gap-4">
                  {AGENTS.map(agent => (
                    <AgentCard 
                      key={agent.id}
                      agent={agent}
                      onSelect={setSelectedAgent}
                      isSelected={selectedAgent?.id === agent.id}
                    />
                  ))}
                </div>
              </div>

              {/* Chat Panel */}
              <div>
                <h2 className="font-semibold text-lg mb-4">Agent Chat</h2>
                {selectedAgent ? (
                  <ChatInterface 
                    agent={selectedAgent}
                    apiStatus={apiStatus}
                    onClose={() => setSelectedAgent(null)}
                  />
                ) : (
                  <div className="bg-slate-800/30 border border-slate-700 border-dashed rounded-xl h-[600px] flex flex-col items-center justify-center text-slate-500">
                    <div className="text-4xl mb-4">🤖</div>
                    <div className="text-lg font-medium mb-2">Select an Agent</div>
                    <div className="text-sm">Click on any agent card to start a conversation</div>
                  </div>
                )}
              </div>
            </div>

            {/* API Endpoints Reference */}
            <div className="mt-6 bg-slate-800/50 border border-slate-700 rounded-xl p-4">
              <h3 className="font-medium mb-3">API Endpoints Reference</h3>
              <div className="grid grid-cols-4 gap-4 text-sm">
                {AGENTS.map(agent => (
                  <div key={agent.id} className="flex items-center gap-2">
                    <span>{agent.icon}</span>
                    <code className="text-cyan-400 font-mono text-xs">{agent.endpoint}</code>
                  </div>
                ))}
              </div>
              <div className="mt-3 pt-3 border-t border-slate-700 text-xs text-slate-500">
                Base URL: <code className="text-cyan-400">{RENDER_API}</code>
              </div>
            </div>

            {/* Footer */}
            <div className="mt-8 text-center text-xs text-slate-500">
              <div>Mission Meets Tech | MissionPulse Agent Hub v2</div>
              <div className="mt-1">AI GENERATED - REQUIRES HUMAN REVIEW</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
