const useSupabase=()=>{
  const[connected,setConnected]=useState(false);
  const[loading,setLoading]=useState(true);
  
  useEffect(()=>{
    const check=async()=>{
      try{
        const{data,error}=await supabase.from('opportunities').select('id').limit(1);
        setConnected(!error);
      }catch{setConnected(false)}
      setLoading(false);
    };
    check();
  },[]);
  
  return{connected,loading,supabase};
};

const Badge=({children,variant='default',size='sm'})=>{

    amber:'bg-amber-500/20 text-amber-400 border border-amber-500/30',
    red:'bg-red-500/20 text-red-400 border border-red-500/30',
    emerald:'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30',
    purple:'bg-purple-500/20 text-purple-400 border border-purple-500/30'
  };
  const sizes={xs:'px-1.5 py-0.5 text-[10px]',sm:'px-2 py-0.5 text-xs',md:'px-2.5 py-1 text-sm'};
  return<span className={`inline-flex items-center rounded font-medium ${variants[variant]} ${sizes[size]}`}>{children}</span>;
};

const checkAccess=(moduleRbac,userRole)=>{
  if(moduleRbac.includes('ALL'))return true;
  return moduleRbac.includes(userRole);
};

// ============================================================
// SIDEBAR NAVIGATION
// ============================================================
const Sidebar=({collapsed,currentModule,onModuleSelect,currentRole,onRoleChange})=>{
  const[expandedGroups,setExpandedGroups]=useState(['command','capture','compliance','pricing','execution','intelligence','lifecycle','admin']);
  
  const toggleGroup=(group)=>{
    setExpandedGroups(prev=>prev.includes(group)?prev.filter(g=>g!==group):[...prev,group]);
  };
  
  const groupedModules=MODULE_REGISTRY.reduce((acc,mod)=>{
    if(!checkAccess(mod.rbac,currentRole))return acc;
    if(!acc[mod.group])acc[mod.group]=[];
    acc[mod.group].push(mod);
    return acc;
  },{});
  
  return(
    <aside className={`h-full glass-dark flex flex-col transition-all duration-300 ${collapsed?'w-16':'w-64'}`}>
      {/* Logo */}
      <div className="p-4 border-b border-slate-700/50">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-500 to-teal-500 flex items-center justify-center text-xl">🛡️</div>
          {!collapsed&&<div><div className="font-bold text-white text-sm">MissionPulse</div><div className="text-[10px] text-cyan-400">Mission. Technology. Transformation.</div></div>}
        </div>
      </div>
      
      {/* Role Selector */}
      {!collapsed&&(
        <div className="p-3 border-b border-slate-700/50">
          <select value={currentRole} onChange={e=>onRoleChange(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-cyan-500">
            {ROLES.map(r=><option key={r.id} value={r.id}>{r.icon} {r.name}</option>)}
          </select>
        </div>
      )}
      
      {/* Navigation */}
      <nav className="flex-1 overflow-y-auto py-2">
        {Object.entries(MODULE_GROUPS).map(([groupId,groupInfo])=>{
          const modules=groupedModules[groupId];
          if(!modules||modules.length===0)return null;
          
          return(
            <div key={groupId} className="mb-1">
              {!collapsed&&(
                <button onClick={()=>toggleGroup(groupId)} className="w-full group-header flex items-center justify-between hover:text-slate-400">
                  <span>{groupInfo.name}</span>
                  <Icon name={expandedGroups.includes(groupId)?'chevronDown':'chevronRight'} className="w-3 h-3"/>
                </button>
              )}
              
              {(collapsed||expandedGroups.includes(groupId))&&(
                <div className="space-y-0.5 px-2">
                  {modules.map(mod=>(
                    <button key={mod.id} onClick={()=>onModuleSelect(mod.id)} className={`w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-all ${currentModule===mod.id?'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30':'text-slate-400 hover:text-white hover:bg-slate-700/50'}`} title={collapsed?mod.name:mod.description}>
                      <span className="text-base">{mod.icon}</span>
                      {!collapsed&&(
                        <>
                          <span className="flex-1 text-left truncate">{mod.name}</span>
                          {mod.badge&&<Badge variant={mod.badge==='CUI'?'amber':mod.badge==='PRIVATE'?'red':'purple'} size="xs">{mod.badge}</Badge>}
                        </>
                      )}
                    </button>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </nav>
      
      {/* Footer */}
      <div className="p-3 border-t border-slate-700/50 text-[10px] text-slate-500 text-center">
        {!collapsed&&<>v{CONFIG.VERSION} • {CONFIG.BUILD_DATE}</>}
      </div>
    </aside>
  );
};

const DashboardModule=({data,connected})=>{
  const opps=data.opportunities||DEMO_DATA.opportunities;
  const total=opps.reduce((s,o)=>s+(o.ceiling||0),0);
  const avgPwin=Math.round(opps.reduce((s,o)=>s+(o.pwin||0),0)/opps.length);
  const dueThisWeek=opps.filter(o=>o.days_to_due<=30).length;
  
  const fmt=v=>v>=1e9?`$${(v/1e9).toFixed(1)}B`:v>=1e6?`$${(v/1e6).toFixed(0)}M`:`$${(v||0).toLocaleString()}`;
  
  return(
    <div className="space-y-6 animate-fadeIn">
      {/* Hero */}
      <div className="glass rounded-2xl p-6 bg-gradient-to-r from-cyan-500/10 via-teal-500/5 to-transparent">
        <div className="flex justify-between items-start">
          <div>
            <h1 className="text-2xl font-bold text-white mb-1">Mission Control</h1>
            <p className="text-slate-400">AI-Powered Proposal Command Center</p>
            <p className="text-cyan-400 text-sm mt-2 font-medium">Mission. Technology. Transformation.</p>
          </div>
          <div className="text-6xl">🎯</div>
        </div>
      </div>
      
      {/* Stats Grid */}
      <div className="grid grid-cols-4 gap-4">
        {[
          {label:'Pipeline Value',value:fmt(total),color:'text-emerald-400',bg:'from-emerald-500/10'},
          {label:'Active Pursuits',value:opps.length,color:'text-cyan-400',bg:'from-cyan-500/10'},
          {label:'Avg Win Probability',value:`${avgPwin}%`,color:'text-amber-400',bg:'from-amber-500/10'},
          {label:'Due in 30 Days',value:dueThisWeek,color:'text-purple-400',bg:'from-purple-500/10'}
        ].map((stat,i)=>(
          <div key={i} className={`glass rounded-xl p-4 hover-lift bg-gradient-to-br ${stat.bg} to-transparent`}>
            <p className="text-slate-400 text-xs mb-1">{stat.label}</p>
            <p className={`text-2xl font-bold ${stat.color}`}>{stat.value}</p>
          </div>
        ))}
      </div>
      
      {/* Pipeline Table */}
      <div className="glass rounded-xl overflow-hidden">
        <div className="p-4 border-b border-slate-700/50 flex justify-between items-center">
          <h3 className="font-semibold text-white">Active Pipeline</h3>
          <Badge variant={connected?'emerald':'red'}>{connected?'Live Data':'Demo Mode'}</Badge>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full">
            <thead className="bg-slate-800/50">
              <tr>
                {['Opportunity','Agency','Value','Phase','pWin','Days'].map(h=>(
                  <th key={h} className="text-left p-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">{h}</th>
                ))}
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-700/30">
              {opps.map(opp=>(
                <tr key={opp.id} className="hover:bg-slate-800/30 transition-colors">
                  <td className="p-3">
                    <div className="font-medium text-white">{opp.nickname}</div>
                    <div className="text-xs text-slate-500 truncate max-w-xs">{opp.title}</div>
                  </td>
                  <td className="p-3"><Badge variant="default">{opp.agency}</Badge></td>
                  <td className="p-3 text-emerald-400 font-medium">{fmt(opp.ceiling)}</td>
                  <td className="p-3"><Badge variant="cyan">{opp.phase}</Badge></td>
                  <td className="p-3">
                    <div className="flex items-center gap-2">
                      <div className="w-16 h-1.5 bg-slate-700 rounded-full overflow-hidden">
                        <div className="h-full bg-gradient-to-r from-cyan-500 to-emerald-500 rounded-full" style={{width:`${opp.pwin}%`}}/>
                      </div>
                      <span className="text-xs text-slate-300">{opp.pwin}%</span>
                    </div>
                  </td>
                  <td className="p-3">
                    <span className={`text-sm ${opp.days_to_due<=30?'text-red-400':opp.days_to_due<=60?'text-amber-400':'text-slate-400'}`}>
                      {opp.days_to_due}d
                    </span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      
      {/* AI Generated Footer */}
      <div className="text-center text-xs text-slate-500 py-2">
        AI GENERATED - REQUIRES HUMAN REVIEW | © 2026 Mission Meets Tech
      </div>
    </div>
  );
};

// ============================================================
// MODULE IFRAME LOADER
// ============================================================
const ModuleLoader=({moduleId,file})=>{
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState(null);
  
  if(file==='embedded')return null;
  
  return(
    <div className="h-full relative">
      {loading&&(
        <div className="absolute inset-0 flex items-center justify-center bg-slate-900/50 z-10">
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin"/>
            <span className="text-slate-400">Loading module...</span>
          </div>
        </div>
      )}
      {error?(
        <div className="h-full flex items-center justify-center">
          <div className="text-center">
            <div className="text-4xl mb-4">⚠️</div>
            <p className="text-red-400 mb-2">Module not found</p>
            <p className="text-slate-500 text-sm">{file}</p>
            <button onClick={()=>window.location.reload()} className="mt-4 px-4 py-2 bg-cyan-500 text-white rounded-lg text-sm hover:bg-cyan-400">
              Refresh Page
            </button>
          </div>
        </div>
      ):(
        <iframe 
          src={file} 
          className="w-full h-full border-0" 
          onLoad={()=>setLoading(false)}
          onError={()=>{setError(true);setLoading(false)}}
        />
      )}
    </div>
  );
};

// ============================================================
// CUI BANNER
// ============================================================
const CUIBanner=()=>(
  <div className="cui-banner text-center py-1 text-xs font-bold text-amber-400 tracking-wider">
    ⚠️ CONTROLLED UNCLASSIFIED INFORMATION (CUI) - AUTHORIZED USE ONLY ⚠️
  </div>
);

// ============================================================
// MAIN APP
// ============================================================
function App(){
  const[user,setUser]=useState(null);
  const[currentRole,setCurrentRole]=useState('CEO');
  const[currentModule,setCurrentModule]=useState('dashboard');
  const[sidebarCollapsed,setSidebarCollapsed]=useState(false);
  const[data,setData]=useState({});
  const{connected,loading}=useSupabase();
  
  useEffect(()=>{
    const session=localStorage.getItem('MP_SESSION');
    const userData=localStorage.getItem('MP_USER');
    if(!session){
      window.location.href='login.html';
      return;
    }
    try{setUser(JSON.parse(userData))}catch{setUser({email:'demo@mmt.com'})}
  },[]);
  
  useEffect(()=>{
    const loadData=async()=>{
      if(!connected)return;
      try{
        const[oppsRes,compRes]=await Promise.all([
          supabase.from('opportunities').select('*').order('days_to_due'),
          supabase.from('compliance_items').select('*')
        ]);
        setData({
          opportunities:oppsRes.data||DEMO_DATA.opportunities,
          compliance:compRes.data||DEMO_DATA.compliance
        });
      }catch{
        setData({opportunities:DEMO_DATA.opportunities,compliance:DEMO_DATA.compliance});
      }
    };
    loadData();
  },[connected]);
  
  const handleLogout=()=>{
    localStorage.clear();
    window.location.href='login.html';
  };
  
  const currentModuleConfig=MODULE_REGISTRY.find(m=>m.id===currentModule);
  const showCUI=currentModuleConfig?.badge==='CUI';
  
  if(!user)return(
    <div className="h-screen flex items-center justify-center">
      <div className="flex items-center gap-3">
        <div className="w-8 h-8 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin"/>
        <span className="text-slate-400">Loading...</span>
      </div>
    </div>
  );
  
  return(
    <div className="h-screen flex flex-col overflow-hidden">
      {showCUI&&<CUIBanner/>}
      
      <div className="flex-1 flex overflow-hidden">
        <Sidebar 
          collapsed={sidebarCollapsed}
          currentModule={currentModule}
          onModuleSelect={setCurrentModule}
          currentRole={currentRole}
          onRoleChange={setCurrentRole}
        />
        
        <div className="flex-1 flex flex-col overflow-hidden">
          <Header 
            user={user}
            currentRole={currentRole}
            connected={connected}
            loading={loading}
            onToggleSidebar={()=>setSidebarCollapsed(!sidebarCollapsed)}
            onLogout={handleLogout}
          />
          
          <main className="flex-1 overflow-auto p-6 bg-gradient-to-b from-slate-900/50 to-transparent">
            {currentModule==='dashboard'?(
              <DashboardModule data={data} connected={connected}/>
            ):(
              <ModuleLoader moduleId={currentModule} file={currentModuleConfig?.file}/>
            )}
          </main>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
