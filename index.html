<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Mission Meets Tech</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
    ::-webkit-scrollbar-thumb { background: rgba(0,229,250,0.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,229,250,0.5); }
    .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.15); }
    .glass-hover:hover { background: rgba(0, 229, 250, 0.08); border-color: rgba(0, 229, 250, 0.3); }
    .glow { box-shadow: 0 0 20px rgba(0, 229, 250, 0.2); }
    .glow-sm { box-shadow: 0 0 10px rgba(0, 229, 250, 0.15); }
    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .sidebar-item { transition: all 0.2s ease; }
    .sidebar-item:hover { transform: translateX(4px); }
    .stat-card { transition: all 0.3s ease; }
    .stat-card:hover { transform: translateY(-2px); }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    // ============================================

    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // ============================================

      // Strategy
      winthemes: { name: 'Win Themes', icon: 'Target', path: 'missionpulse-winthemes-v2.html', category: 'Strategy' },
      blackhat: { name: 'Black Hat', icon: 'Eye', path: 'missionpulse-blackhat-v2.html', category: 'Strategy', rbac: ['CEO', 'COO', 'CAP', 'Admin'] },
      teaming: { name: 'Teaming', icon: 'Users', path: 'missionpulse-teaming-v2.html', category: 'Strategy' },
      
      // Intelligence
      rfpshredder: { name: 'RFP Shredder', icon: 'FileSearch', path: 'missionpulse-rfpshredder-v2.html', category: 'Intelligence' },
      contracts: { name: 'Contract Scanner', icon: 'FileText', path: 'missionpulse-contracts-v2.html', category: 'Intelligence' },

      // Production
      irondome: { name: 'Iron Dome', icon: 'Shield', path: 'missionpulse-irondome-v2.html', category: 'Production' },
      pricing: { name: 'Pricing Engine', icon: 'DollarSign', path: 'missionpulse-pricing-v2.html', category: 'Production', rbac: ['CEO', 'COO', 'FIN', 'PM'], cui: true },
      hitl: { name: 'HITL Queue', icon: 'CheckCircle', path: 'missionpulse-hitl-v2.html', category: 'Production' },
      orals: { name: 'Orals Studio', icon: 'Presentation', path: 'missionpulse-orals-v2.html', category: 'Production' },
      
      // Delivery
      launch: { name: 'Launch ROI', icon: 'Rocket', path: 'missionpulse-launchroi-v2.html', category: 'Delivery' },
      postaward: { name: 'Post-Award', icon: 'Award', path: 'missionpulse-postaward-v2.html', category: 'Delivery' },
      
      // Knowledge
      lessons: { name: 'Lessons Learned', icon: 'BookOpen', path: 'missionpulse-lessons-v2.html', category: 'Knowledge' },
      playbook: { name: 'Playbook', icon: 'Book', path: 'missionpulse-playbook-v2.html', category: 'Knowledge' },
      pastperf: { name: 'Past Performance', icon: 'History', path: 'missionpulse-pastperf-v2.html', category: 'Knowledge' },
      
      // AI & Tools
      agenthub: { name: 'Agent Hub', icon: 'Bot', path: 'missionpulse-agent-hub.html', category: 'AI' },
      reports: { name: 'Reports', icon: 'BarChart2', path: 'missionpulse-reports-v2.html', category: 'AI' },
      
      // Admin
      settings: { name: 'Settings', icon: 'Settings', path: 'missionpulse-settings-v2.html', category: 'Admin' },
      audit: { name: 'Audit Log', icon: 'FileSearch', path: 'missionpulse-audit-v2.html', category: 'Admin', rbac: ['CEO', 'COO', 'Admin'] },
      health: { name: 'Health Check', icon: 'Activity', path: 'missionpulse-health-check.html', category: 'Admin', rbac: ['Admin'] },
    };

    const CATEGORIES = ['Core', 'Strategy', 'Intelligence', 'Production', 'Delivery', 'Knowledge', 'AI', 'Admin'];

    // ============================================
    // DEMO DATA
    // ============================================
    const DEMO_OPPORTUNITIES = [
      { id: '1', title: 'DHA MHS GENESIS Support', agency: 'DHA', phase: 'Gate 3', priority: 'Critical', pwin: 72, estimated_value: 125000000, due_date: '2026-03-15' },
      { id: '2', title: 'VA EHR Modernization', agency: 'VA', phase: 'Red Team', priority: 'High', pwin: 65, estimated_value: 89000000, due_date: '2026-02-28' },
      { id: '3', title: 'CMS Data Analytics Platform', agency: 'CMS', phase: 'Gate 2', priority: 'High', pwin: 55, estimated_value: 45000000, due_date: '2026-04-30' },
      { id: '4', title: 'IHS Telehealth Expansion', agency: 'IHS', phase: 'Gate 1', priority: 'Medium', pwin: 40, estimated_value: 32000000, due_date: '2026-06-15' },
      { id: '5', title: 'DOD Health Interoperability', agency: 'DOD', phase: 'Blue Team', priority: 'Critical', pwin: 68, estimated_value: 156000000, due_date: '2026-02-20' },
      { id: '6', title: 'SAMHSA Mental Health IT', agency: 'SAMHSA', phase: 'Gate 4', priority: 'High', pwin: 62, estimated_value: 28000000, due_date: '2026-03-01' },
      { id: '7', title: 'CDC Surveillance Modernization', agency: 'CDC', phase: 'Gate 2', priority: 'Medium', pwin: 48, estimated_value: 67000000, due_date: '2026-05-15' },
      { id: '8', title: 'NIH Research Data Platform', agency: 'NIH', phase: 'Gold Team', priority: 'High', pwin: 75, estimated_value: 78000000, due_date: '2026-02-10' },
      { id: '9', title: 'AHRQ Quality Metrics System', agency: 'AHRQ', phase: 'Submitted', priority: 'Medium', pwin: 58, estimated_value: 19000000, due_date: '2026-01-31' },
      { id: '10', title: 'ONC Health IT Standards', agency: 'ONC', phase: 'Gate 3', priority: 'High', pwin: 60, estimated_value: 42000000, due_date: '2026-04-15' },
      { id: '11', title: 'HRSA Workforce Management', agency: 'HRSA', phase: 'Gate 1', priority: 'Low', pwin: 35, estimated_value: 35000000, due_date: '2026-07-01' },
      { id: '12', title: 'ACF Child Welfare System', agency: 'ACF', phase: 'Gate 2', priority: 'Medium', pwin: 45, estimated_value: 51000000, due_date: '2026-05-30' },
    ];

    const DEMO_USER = {
      id: '22222222-2222-2222-2222-222222222222',
      email: 'maryadawson@gmail.com',
      full_name: 'Mary Womack',
      role: 'CEO',
      company_id: DEFAULT_COMPANY_ID
    };

    // ============================================
    // ICON COMPONENT
    // ============================================
    function Icon({ name, size = 20, className = '' }) {
      const iconRef = React.useRef(null);
      
      React.useEffect(() => {
        if (iconRef.current && window.lucide) {
          window.lucide.createIcons({
            icons: { [name]: window.lucide.icons[name] },
            attrs: { class: className, width: size, height: size }
          });
        }
      }, [name, size, className]);
      
      return <i ref={iconRef} data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
    }

    // ============================================
    // MAIN APPLICATION
    // ============================================
    function App() {
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [opportunities, setOpportunities] = React.useState(DEMO_OPPORTUNITIES);
      const [user, setUser] = React.useState(DEMO_USER);
      const [sidebarOpen, setSidebarOpen] = React.useState(true);
      const [activeCategory, setActiveCategory] = React.useState('Core');

      // Load data from Supabase
      React.useEffect(() => {
        loadData();
        initIcons();
      }, []);

      const initIcons = () => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      };

      const loadData = async () => {
        try {
          const { data: opps, error } = await supabase
            .from('opportunities')
            .select('*')
            .order('due_date', { ascending: true });
          
          if (!error && opps && opps.length > 0) {
            setOpportunities(opps);
            setConnected(true);
          }
        } catch (e) {
          console.log('Using demo data:', e.message);
        }
        setLoading(false);
      };

      // Calculate metrics
      const totalPipeline = opportunities.reduce((sum, o) => sum + (o.estimated_value || 0), 0);
      const avgPwin = Math.round(opportunities.reduce((sum, o) => sum + (o.pwin || 0), 0) / opportunities.length);
      const criticalCount = opportunities.filter(o => o.priority === 'Critical').length;
      const activeCount = opportunities.filter(o => !['Won', 'Lost', 'Submitted'].includes(o.phase)).length;
      
      // Phase distribution
      const phaseGroups = opportunities.reduce((acc, o) => {
        acc[o.phase] = (acc[o.phase] || 0) + 1;
        return acc;
      }, {});

      // Upcoming deadlines
      const upcomingDeadlines = opportunities
        .filter(o => o.due_date)
        .sort((a, b) => new Date(a.due_date) - new Date(b.due_date))
        .slice(0, 5);

      // Check RBAC
      const hasAccess = (module) => {
        if (!module.rbac) return true;
        return module.rbac.includes(user.role);
      };

      // Format currency
      const formatCurrency = (value) => {
        if (value >= 1000000000) return `$${(value / 1000000000).toFixed(1)}B`;
        if (value >= 1000000) return `$${(value / 1000000).toFixed(0)}M`;
        if (value >= 1000) return `$${(value / 1000).toFixed(0)}K`;
        return `$${value}`;
      };

      // Priority colors
      const getPriorityColor = (priority) => {
        switch (priority) {
          case 'Critical': return 'text-red-400 bg-red-500/10';
          case 'High': return 'text-amber-400 bg-amber-500/10';
          case 'Medium': return 'text-cyan-400 bg-cyan-500/10';
          case 'Low': return 'text-slate-400 bg-slate-500/10';
          default: return 'text-slate-400 bg-slate-500/10';
        }
      };

      // Phase colors
      const getPhaseColor = (phase) => {
        const colors = {
          'Gate 1': 'bg-slate-500',
          'Gate 2': 'bg-blue-500',
          'Gate 3': 'bg-indigo-500',
          'Gate 4': 'bg-purple-500',
          'Blue Team': 'bg-blue-600',
          'Red Team': 'bg-red-500',
          'Gold Team': 'bg-amber-500',
          'Submitted': 'bg-cyan-500',
          'Won': 'bg-emerald-500',
          'Lost': 'bg-slate-600',
        };
        return colors[phase] || 'bg-slate-500';
      };

      // Days until deadline
      const getDaysUntil = (dateStr) => {
        const days = Math.ceil((new Date(dateStr) - new Date()) / (1000 * 60 * 60 * 24));
        return days;
      };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-slate-400">Loading MissionPulse...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex">
          {/* Sidebar */}
          <aside className={`${sidebarOpen ? 'w-64' : 'w-20'} glass border-r border-cyan-500/20 transition-all duration-300 flex flex-col`}>
            {/* Logo */}
            <div className="p-4 border-b border-cyan-500/20">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center glow-sm">
                  <span className="text-white font-bold text-lg">M</span>
                </div>
                {sidebarOpen && (
                  <div>
                    <h1 className="text-lg font-bold text-white">MissionPulse</h1>
                    <p className="text-xs text-cyan-400">Mission Meets Tech</p>
                  </div>
                )}
              </div>
            </div>

            {/* Navigation */}
            <nav className="flex-1 overflow-y-auto p-3">
              {CATEGORIES.map(category => {
                const categoryModules = Object.entries(MODULES).filter(([_, m]) => m.category === category && hasAccess(m));
                if (categoryModules.length === 0) return null;
                
                return (
                  <div key={category} className="mb-4">
                    {sidebarOpen && (
                      <h3 className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 px-3">{category}</h3>
                    )}
                    {categoryModules.map(([key, module]) => (
                      <a
                        key={key}
                        href={module.path}
                        className={`sidebar-item flex items-center gap-3 px-3 py-2 rounded-lg mb-1 ${
                          key === 'dashboard' 
                            ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' 
                            : 'text-slate-400 hover:text-white hover:bg-white/5'
                        }`}
                      >
                        <i data-lucide={module.icon} className="w-5 h-5"></i>
                        {sidebarOpen && (
                          <span className="text-sm">{module.name}</span>
                        )}
                        {module.cui && sidebarOpen && (
                          <span className="ml-auto text-xs px-1.5 py-0.5 rounded bg-amber-500/20 text-amber-400">CUI</span>
                        )}
                      </a>
                    ))}
                  </div>
                );
              })}
            </nav>

            {/* User */}
            <div className="p-3 border-t border-cyan-500/20">
              <div className={`flex items-center gap-3 px-3 py-2 rounded-lg bg-white/5 ${!sidebarOpen && 'justify-center'}`}>
                <div className="w-8 h-8 rounded-full bg-gradient-to-br from-cyan-500 to-purple-500 flex items-center justify-center text-white text-sm font-medium">
                  {user.full_name?.charAt(0) || 'U'}
                </div>
                {sidebarOpen && (
                  <div className="flex-1 min-w-0">
                    <p className="text-sm font-medium text-white truncate">{user.full_name}</p>
                    <p className="text-xs text-cyan-400">{user.role}</p>
                  </div>
                )}
              </div>
            </div>

            {/* Toggle */}
            <button
              onClick={() => setSidebarOpen(!sidebarOpen)}
              className="p-3 border-t border-cyan-500/20 text-slate-400 hover:text-white transition-colors"
            >
              <i data-lucide={sidebarOpen ? 'ChevronLeft' : 'ChevronRight'} className="w-5 h-5 mx-auto"></i>
            </button>
          </aside>

          {/* Main Content */}
          <main className="flex-1 overflow-y-auto">
            {/* Header */}
            <header className="glass border-b border-cyan-500/20 px-6 py-4">
              <div className="flex items-center justify-between">
                <div>
                  <h1 className="text-2xl font-bold text-white">Mission Command Center</h1>
                  <p className="text-slate-400 text-sm">Federal proposal pipeline at a glance</p>
                </div>
                <div className="flex items-center gap-4">
                  {/* Connection Status */}
                  <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-xs ${
                    connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'
                  }`}>
                    <span className={`w-2 h-2 rounded-full ${connected ? 'bg-emerald-400 pulse-dot' : 'bg-amber-400'}`}></span>
                    {connected ? 'Live Data' : 'Demo Mode'}
                  </div>
                  <div className="text-right">
                    <p className="text-xs text-slate-500">{new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                  </div>
                </div>
              </div>
            </header>

            {/* Dashboard Content */}
            <div className="p-6">
              {/* Stats Grid */}
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                <div className="stat-card glass rounded-xl p-5 glow-sm">
                  <div className="flex items-center justify-between mb-3">
                    <span className="text-slate-400 text-sm">Pipeline Value</span>
                    <div className="w-10 h-10 rounded-lg bg-cyan-500/20 flex items-center justify-center">
                      <i data-lucide="TrendingUp" className="w-5 h-5 text-cyan-400"></i>
                    </div>
                  </div>
                  <p className="text-3xl font-bold text-white">{formatCurrency(totalPipeline)}</p>
                  <p className="text-xs text-emerald-400 mt-1">+{formatCurrency(totalPipeline * 0.12)} this quarter</p>
                </div>

                <div className="stat-card glass rounded-xl p-5 glow-sm">
                  <div className="flex items-center justify-between mb-3">
                    <span className="text-slate-400 text-sm">Avg Win Probability</span>
                    <div className="w-10 h-10 rounded-lg bg-emerald-500/20 flex items-center justify-center">
                      <i data-lucide="Target" className="w-5 h-5 text-emerald-400"></i>
                    </div>
                  </div>
                  <p className="text-3xl font-bold text-white">{avgPwin}%</p>
                  <p className="text-xs text-emerald-400 mt-1">+3% from last month</p>
                </div>

                <div className="stat-card glass rounded-xl p-5 glow-sm">
                  <div className="flex items-center justify-between mb-3">
                    <span className="text-slate-400 text-sm">Critical Pursuits</span>
                    <div className="w-10 h-10 rounded-lg bg-red-500/20 flex items-center justify-center">
                      <i data-lucide="AlertTriangle" className="w-5 h-5 text-red-400"></i>
                    </div>
                  </div>
                  <p className="text-3xl font-bold text-white">{criticalCount}</p>
                  <p className="text-xs text-amber-400 mt-1">Require immediate attention</p>
                </div>

                <div className="stat-card glass rounded-xl p-5 glow-sm">
                  <div className="flex items-center justify-between mb-3">
                    <span className="text-slate-400 text-sm">Active Opportunities</span>
                    <div className="w-10 h-10 rounded-lg bg-purple-500/20 flex items-center justify-center">
                      <i data-lucide="Briefcase" className="w-5 h-5 text-purple-400"></i>
                    </div>
                  </div>
                  <p className="text-3xl font-bold text-white">{activeCount}</p>
                  <p className="text-xs text-cyan-400 mt-1">Across {Object.keys(phaseGroups).length} phases</p>
                </div>
              </div>

              {/* Two Column Layout */}
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                {/* Upcoming Deadlines */}
                <div className="lg:col-span-2 glass rounded-xl p-5">
                  <div className="flex items-center justify-between mb-4">
                    <h2 className="text-lg font-semibold text-white">Upcoming Deadlines</h2>
                    <a href="missionpulse-pipeline-v2.html" className="text-sm text-cyan-400 hover:text-cyan-300">View All →</a>
                  </div>
                  <div className="space-y-3">
                    {upcomingDeadlines.map(opp => {
                      const daysUntil = getDaysUntil(opp.due_date);
                      return (
                        <div key={opp.id} className="flex items-center gap-4 p-3 rounded-lg bg-white/5 hover:bg-white/10 transition-colors">
                          <div className={`w-2 h-12 rounded-full ${getPhaseColor(opp.phase)}`}></div>
                          <div className="flex-1 min-w-0">
                            <p className="text-white font-medium truncate">{opp.title}</p>
                            <div className="flex items-center gap-3 mt-1">
                              <span className="text-xs text-slate-400">{opp.agency}</span>
                              <span className="text-xs px-2 py-0.5 rounded-full bg-slate-700 text-slate-300">{opp.phase}</span>
                              <span className={`text-xs px-2 py-0.5 rounded-full ${getPriorityColor(opp.priority)}`}>{opp.priority}</span>
                            </div>
                          </div>
                          <div className="text-right">
                            <p className="text-lg font-bold text-white">{formatCurrency(opp.estimated_value)}</p>
                            <p className={`text-xs ${daysUntil <= 7 ? 'text-red-400' : daysUntil <= 14 ? 'text-amber-400' : 'text-slate-400'}`}>
                              {daysUntil <= 0 ? 'Past Due' : `${daysUntil} days left`}
                            </p>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Phase Distribution */}
                <div className="glass rounded-xl p-5">
                  <h2 className="text-lg font-semibold text-white mb-4">Phase Distribution</h2>
                  <div className="space-y-3">
                    {Object.entries(phaseGroups).map(([phase, count]) => (
                      <div key={phase} className="flex items-center gap-3">
                        <div className={`w-3 h-3 rounded-full ${getPhaseColor(phase)}`}></div>
                        <span className="text-sm text-slate-300 flex-1">{phase}</span>
                        <span className="text-sm font-semibold text-white">{count}</span>
                      </div>
                    ))}
                  </div>
                  
                  {/* Quick Actions */}
                  <div className="mt-6 pt-4 border-t border-cyan-500/20">
                    <h3 className="text-sm font-semibold text-white mb-3">Quick Actions</h3>
                    <div className="space-y-2">
                      <a href="missionpulse-warroom-v2.html" className="flex items-center gap-2 px-3 py-2 rounded-lg bg-cyan-500/20 text-cyan-400 hover:bg-cyan-500/30 transition-colors text-sm">
                        <i data-lucide="Shield" className="w-4 h-4"></i>
                        <span>Enter War Room</span>
                      </a>
                      <a href="missionpulse-agent-hub.html" className="flex items-center gap-2 px-3 py-2 rounded-lg bg-purple-500/20 text-purple-400 hover:bg-purple-500/30 transition-colors text-sm">
                        <i data-lucide="Bot" className="w-4 h-4"></i>
                        <span>Launch AI Agents</span>
                      </a>
                      <a href="missionpulse-hitl-v2.html" className="flex items-center gap-2 px-3 py-2 rounded-lg bg-amber-500/20 text-amber-400 hover:bg-amber-500/30 transition-colors text-sm">
                        <i data-lucide="CheckCircle" className="w-4 h-4"></i>
                        <span>Review AI Queue</span>
                      </a>
                    </div>
                  </div>
                </div>
              </div>

              {/* All Opportunities Table */}
              <div className="mt-6 glass rounded-xl p-5">
                <div className="flex items-center justify-between mb-4">
                  <h2 className="text-lg font-semibold text-white">All Opportunities</h2>
                  <div className="flex items-center gap-2">
                    <span className="text-sm text-slate-400">{opportunities.length} total</span>
                  </div>
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full">
                    <thead>
                      <tr className="border-b border-cyan-500/20">
                        <th className="text-left py-3 px-4 text-xs font-semibold text-slate-400 uppercase">Opportunity</th>
                        <th className="text-left py-3 px-4 text-xs font-semibold text-slate-400 uppercase">Agency</th>
                        <th className="text-left py-3 px-4 text-xs font-semibold text-slate-400 uppercase">Phase</th>
                        <th className="text-left py-3 px-4 text-xs font-semibold text-slate-400 uppercase">Priority</th>
                        <th className="text-right py-3 px-4 text-xs font-semibold text-slate-400 uppercase">Value</th>
                        <th className="text-right py-3 px-4 text-xs font-semibold text-slate-400 uppercase">pWin</th>
                        <th className="text-right py-3 px-4 text-xs font-semibold text-slate-400 uppercase">Due Date</th>
                      </tr>
                    </thead>
                    <tbody>
                      {opportunities.map(opp => (
                        <tr key={opp.id} className="border-b border-white/5 hover:bg-white/5 transition-colors">
                          <td className="py-3 px-4">
                            <p className="text-white font-medium">{opp.title}</p>
                          </td>
                          <td className="py-3 px-4 text-slate-400">{opp.agency}</td>
                          <td className="py-3 px-4">
                            <span className={`inline-flex items-center gap-1.5 px-2 py-1 rounded-full text-xs ${getPhaseColor(opp.phase)} bg-opacity-20`}>
                              <span className={`w-1.5 h-1.5 rounded-full ${getPhaseColor(opp.phase)}`}></span>
                              {opp.phase}
                            </span>
                          </td>
                          <td className="py-3 px-4">
                            <span className={`px-2 py-1 rounded-full text-xs ${getPriorityColor(opp.priority)}`}>{opp.priority}</span>
                          </td>
                          <td className="py-3 px-4 text-right text-white font-medium">{formatCurrency(opp.estimated_value)}</td>
                          <td className="py-3 px-4 text-right">
                            <span className={`font-medium ${opp.pwin >= 70 ? 'text-emerald-400' : opp.pwin >= 50 ? 'text-cyan-400' : 'text-amber-400'}`}>
                              {opp.pwin}%
                            </span>
                          </td>
                          <td className="py-3 px-4 text-right text-slate-400 text-sm">
                            {new Date(opp.due_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

            {/* Footer */}
            <footer className="p-6 text-center border-t border-cyan-500/10">
              <p className="text-slate-500 text-sm">
                MissionPulse v3.1 • Mission Meets Tech • "Mission. Technology. Transformation."
              </p>
              <p className="text-slate-600 text-xs mt-1">
                AI GENERATED CONTENT REQUIRES HUMAN REVIEW
              </p>
            </footer>
          </main>
        </div>
      );
    }

    // Initialize icons after render
    setTimeout(() => {
      if (window.lucide) {
        window.lucide.createIcons();
      }
    }, 100);

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
