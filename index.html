const useSupabaseTable=(table,defaultData=[],orderBy='created_at')=>{
  const[data,setData]=useState(defaultData);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState(null);

  const load=useCallback(async()=>{
    if(!supabase){setLoading(false);return}
    try{
      const{data:rows,error:e}=await supabase.from(table).select('*').order(orderBy,{ascending:false});
      if(e)throw e;
      if(rows?.length)setData(rows);
    }catch(e){console.warn(`Load ${table} failed:`,e);setError(e)}
    setLoading(false);
  },[table,orderBy]);

  const insert=async(row)=>{
    const newRow={...row,id:row.id||crypto.randomUUID()};
    setData(d=>[newRow,...d]);
    if(supabase){try{await supabase.from(table).insert(newRow)}catch(e){console.warn(e)}}
    return newRow;
  };

  const update=async(id,changes)=>{
    setData(d=>d.map(r=>r.id===id?{...r,...changes}:r));
    if(supabase){try{await supabase.from(table).update(changes).eq('id',id)}catch(e){console.warn(e)}}
  };

  const remove=async(id)=>{
    setData(d=>d.filter(r=>r.id!==id));
    if(supabase){try{await supabase.from(table).delete().eq('id',id)}catch(e){console.warn(e)}}
  };

  useEffect(()=>{load()},[load]);
  return{data,setData,loading,error,load,insert,update,remove};
};

function ModulePricing(){
  const{data:items,insert,update,remove}=useSupabaseTable('pricing_items',DEMO_PRICING);
  const[wrapRate,setWrapRate]=useState(1.85);
  const totalDirect=items.reduce((s,l)=>s+(l.rate*l.hours),0);
  const totalWrapped=totalDirect*wrapRate;

  const exportBOE=()=>{const csv='LCAT,Rate,Hours,Extended,Wrapped\n'+items.map(l=>`${l.lcat},${l.rate},${l.hours},${l.rate*l.hours},${l.rate*l.hours*wrapRate}`).join('\n');const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='boe_pricing.csv';a.click();logAudit('EXPORT_PRICING')};

  return(
    <div className="space-y-4 animate-fadeIn">
      <div className="flex items-center gap-2"><h2 className="text-xl font-bold text-white">Pricing Engine</h2><span className="px-2 py-1 bg-red-500/20 text-red-400 rounded text-xs font-bold">CUI</span></div>
      <div className="grid grid-cols-4 gap-4">
        <div className="glass p-4"><p className="text-slate-400 text-xs">Direct Labor</p><p className="text-2xl font-bold text-white">{fmt(totalDirect)}</p></div>
        <div className="glass p-4"><p className="text-slate-400 text-xs">Wrap Rate</p><input type="number" step="0.01" value={wrapRate} onChange={e=>setWrapRate(parseFloat(e.target.value)||1)} className="text-2xl font-bold text-white bg-transparent w-full"/></div>
        <div className="glass p-4"><p className="text-slate-400 text-xs">Total Proposed</p><p className="text-2xl font-bold text-emerald-400">{fmt(totalWrapped)}</p></div>
        <div className="glass p-4 flex items-center justify-center gap-2"><button onClick={()=>insert({lcat:'New LCAT',rate:100,hours:2080,wrap_rate:wrapRate})} className="px-3 py-2 bg-cyan-500 text-white rounded-lg text-sm flex items-center gap-1"><Icon name="plus" className="w-4 h-4"/>Add</button><button onClick={exportBOE} className="px-3 py-2 bg-slate-700 text-white rounded-lg text-sm flex items-center gap-1"><Icon name="download" className="w-4 h-4"/>Export</button></div>
      </div>
      <div className="glass overflow-hidden">
        <table className="w-full"><thead className="bg-slate-800/50"><tr>{['LCAT','Rate/Hr','Hours','Extended','Wrapped',''].map(h=><th key={h} className="text-left p-3 text-xs font-semibold text-slate-400 uppercase">{h}</th>)}</tr></thead>
        <tbody className="divide-y divide-slate-700/50">{items.map(l=>(
          <tr key={l.id} className="hover:bg-slate-800/30">
            <td className="p-3"><input type="text" value={l.lcat||''} onChange={e=>update(l.id,{lcat:e.target.value})} className="bg-transparent text-white text-sm w-full border-b border-transparent focus:border-cyan-500"/></td>
            <td className="p-3"><input type="number" value={l.rate||0} onChange={e=>update(l.id,{rate:parseFloat(e.target.value)||0})} className="bg-slate-800 text-white text-sm w-20 px-2 py-1 rounded"/></td>
            <td className="p-3"><input type="number" value={l.hours||0} onChange={e=>update(l.id,{hours:parseInt(e.target.value)||0})} className="bg-slate-800 text-white text-sm w-24 px-2 py-1 rounded"/></td>
            <td className="p-3 text-sm text-slate-300">{fmt(l.rate*l.hours)}</td>
            <td className="p-3 text-sm text-emerald-400 font-medium">{fmt(l.rate*l.hours*wrapRate)}</td>
            <td className="p-3"><button onClick={()=>remove(l.id)} className="p-1 text-slate-500 hover:text-red-400"><Icon name="trash" className="w-4 h-4"/></button></td>
          </tr>
        ))}</tbody>
        <tfoot className="bg-slate-800/50"><tr><td className="p-3 font-bold text-white" colSpan="3">TOTAL</td><td className="p-3 font-bold text-white">{fmt(totalDirect)}</td><td className="p-3 font-bold text-emerald-400">{fmt(totalWrapped)}</td><td></td></tr></tfoot></table>
      </div>
      <div className="text-center text-xs text-red-400 py-2">⚠️ CUI - Handle per NIST 800-171</div>
    </div>
  );
}

          <div><label className="text-xs text-slate-400">Role</label><select value={form.role} onChange={e=>setForm({...form,role:e.target.value})} className="w-full mt-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm"><option>Subcontractor</option><option>Teaming Partner</option><option>Consultant</option></select></div>
          <div><label className="text-xs text-slate-400">Share %</label><input type="number" min="1" max="100" value={form.percentage} onChange={e=>setForm({...form,percentage:parseInt(e.target.value)})} className="w-full mt-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm"/></div>
          <div><label className="text-xs text-slate-400">Expires</label><input type="date" value={form.access_expires} onChange={e=>setForm({...form,access_expires:e.target.value})} className="w-full mt-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm"/></div>

// MODULE: HITL (Supabase-backed)
// ============================================================
function ModuleHITL(){
  const{data:items,update}=useSupabaseTable('ai_approvals',DEMO_HITL);
  const pending=items.filter(i=>i.status==='pending');
  const reviewed=items.filter(i=>i.status!=='pending');

  const handleAction=(id,status)=>{update(id,{status,reviewed_at:new Date().toISOString()});logAudit(status==='approved'?'APPROVE_AI':'REJECT_AI',{id})};

  return(
    <div className="space-y-4 animate-fadeIn">
      <div className="flex justify-between items-center"><div><h2 className="text-xl font-bold text-white">HITL Review Queue</h2><p className="text-slate-400 text-sm">Human-in-the-Loop approval</p></div>
        <div className="flex gap-2"><span className="px-3 py-1.5 bg-amber-500/20 text-amber-400 rounded-lg text-sm font-medium">{pending.length} Pending</span><span className="px-3 py-1.5 bg-emerald-500/20 text-emerald-400 rounded-lg text-sm font-medium">{items.filter(i=>i.status==='approved').length} Approved</span></div>
      </div>
      <div className="grid grid-cols-2 gap-4">
        <div><h3 className="font-semibold text-white mb-3">Pending</h3>
          <div className="space-y-3">{pending.map(item=>(
            <div key={item.id} className="glass p-4 hover-lift">
              <div className="flex justify-between items-start mb-2"><span className="px-2 py-0.5 bg-slate-700 rounded text-xs text-slate-300">{item.type}</span></div>
              <h4 className="font-medium text-white mb-1">{item.title}</h4>
              <p className="text-xs text-slate-400 mb-3">Agent: {item.agent}</p>
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2"><div className="w-20 h-1.5 bg-slate-700 rounded-full"><div className={`h-full rounded-full ${item.confidence>=85?'bg-emerald-500':item.confidence>=70?'bg-amber-500':'bg-red-500'}`} style={{width:`${item.confidence}%`}}/></div><span className={`text-xs ${item.confidence>=85?'text-emerald-400':item.confidence>=70?'text-amber-400':'text-red-400'}`}>{item.confidence}%</span></div>
                <div className="flex gap-1">
                  <button onClick={()=>handleAction(item.id,'approved')} className="p-1.5 bg-emerald-500/20 rounded hover:bg-emerald-500/30"><Icon name="check" className="w-4 h-4 text-emerald-400"/></button>
                  <button onClick={()=>handleAction(item.id,'rejected')} className="p-1.5 bg-red-500/20 rounded hover:bg-red-500/30"><Icon name="x" className="w-4 h-4 text-red-400"/></button>
                </div>
              </div>
            </div>
          ))}{pending.length===0&&<div className="glass p-8 text-center text-slate-500">No pending items</div>}</div>
        </div>
        <div><h3 className="font-semibold text-white mb-3">Reviewed</h3>
          <div className="space-y-3 max-h-96 overflow-y-auto">{reviewed.map(item=>(
            <div key={item.id} className={`glass p-4 opacity-70 border-l-2 ${item.status==='approved'?'border-emerald-500':'border-red-500'}`}>
              <div className="flex justify-between items-start"><div><h4 className="font-medium text-white text-sm">{item.title}</h4><p className="text-xs text-slate-400">{item.agent}</p></div><span className={`px-2 py-0.5 rounded text-xs font-medium ${item.status==='approved'?'bg-emerald-500/20 text-emerald-400':'bg-red-500/20 text-red-400'}`}>{item.status}</span></div>
            </div>
          ))}</div>
        </div>
      </div>
    </div>
  );
}

// MODULE: AUDIT LOG (Supabase-backed)
// ============================================================
function ModuleAudit(){
  const{data:logs}=useSupabaseTable('audit_logs',DEMO_AUDIT);
  const[filter,setFilter]=useState('ALL');
  const actions=['ALL','LOGIN','VIEW_BLACKHAT','EXPORT_PRICING','APPROVE_AI','CREATE_OPP','DELETE_OPP'];
  const filtered=filter==='ALL'?logs:logs.filter(a=>a.action===filter);
  const actionColors={LOGIN:'bg-emerald-500',VIEW_BLACKHAT:'bg-amber-500',EXPORT_PRICING:'bg-red-500',APPROVE_AI:'bg-cyan-500',CREATE_OPP:'bg-purple-500',DELETE_OPP:'bg-red-500'};
  return(
    <div className="space-y-4 animate-fadeIn">
      <div className="flex items-center gap-2"><h2 className="text-xl font-bold text-white">Audit Log</h2><span className="px-2 py-1 bg-purple-500/20 text-purple-400 rounded text-xs font-bold">ADMIN</span></div>
      <div className="flex gap-2 flex-wrap">{actions.map(a=><button key={a} onClick={()=>setFilter(a)} className={`px-3 py-1.5 rounded-lg text-sm font-medium transition ${filter===a?'bg-cyan-500 text-white':'bg-slate-800 text-slate-400 hover:text-white'}`}>{a==='ALL'?'All':a.replace(/_/g,' ')}</button>)}</div>
      <div className="glass overflow-hidden">
        <table className="w-full"><thead className="bg-slate-800/50"><tr>{['Action','User','Role','IP','Time'].map(h=><th key={h} className="text-left p-3 text-xs font-semibold text-slate-400 uppercase">{h}</th>)}</tr></thead>
        <tbody className="divide-y divide-slate-700/50">{filtered.slice(0,50).map((log,i)=><tr key={log.id||i} className="hover:bg-slate-800/30"><td className="p-3"><span className={`px-2 py-1 rounded text-xs text-white ${actionColors[log.action]||'bg-slate-600'}`}>{log.action}</span></td><td className="p-3 text-sm text-white">{log.user_name}</td><td className="p-3 text-sm text-slate-300">{log.role}</td><td className="p-3 text-sm font-mono text-slate-400">{log.ip_address}</td><td className="p-3 text-sm text-slate-400">{log.created_at?.slice(0,19).replace('T',' ')}</td></tr>)}</tbody></table>
      </div>
    </div>
  );
}

function ModuleGeneric({mod}){

// ============================================================
// SIDEBAR
// ============================================================
function Sidebar({role,setRole,active,setActive,user}){
  const[collapsed,setCollapsed]=useState(false);
  const[showRoles,setShowRoles]=useState(false);
  const accessible=MODULES.filter(m=>role.access.includes(m.id));

  return(
    <aside className={`h-screen bg-slate-900/95 border-r border-slate-800 flex flex-col transition-all ${collapsed?'w-16':'w-64'}`}>
      <div className="p-4 border-b border-slate-800 flex items-center justify-between">
        {!collapsed&&<div className="flex items-center gap-2"><div className="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-500 to-teal-400 flex items-center justify-center text-white font-bold">MP</div><div><div className="text-sm font-bold text-white">MissionPulse</div><div className="text-[10px] text-slate-500">v12 Production</div></div></div>}
        <button onClick={()=>setCollapsed(!collapsed)} className="p-1 text-slate-400 hover:text-white"><Icon name={collapsed?'chevronRight':'chevronLeft'} className="w-4 h-4"/></button>
      </div>
      <div className="p-3 border-b border-slate-800">
        <button onClick={()=>setShowRoles(!showRoles)} className="w-full flex items-center gap-2 p-2 rounded-lg hover:bg-slate-800"><span className="text-xl">{role.icon}</span>{!collapsed&&<><div className="flex-1 text-left"><div className="text-sm font-medium text-white">{role.fullName}</div><div className="text-xs text-slate-400">{role.name}</div></div><Icon name="chevronDown" className={`w-4 h-4 text-slate-400 transition ${showRoles?'rotate-180':''}`}/></>}</button>
        {showRoles&&!collapsed&&<div className="mt-2 p-2 bg-slate-800/50 rounded-lg max-h-48 overflow-y-auto">{ROLES.map(r=><button key={r.id} onClick={()=>{setRole(r);setShowRoles(false)}} className={`w-full flex items-center gap-2 p-2 rounded hover:bg-slate-700 ${role.id===r.id?'bg-cyan-500/20':''}`}><span>{r.icon}</span><span className="text-sm text-white">{r.name}</span></button>)}</div>}
      </div>
      <nav className="flex-1 overflow-y-auto p-2">
        {['Command','Strategy','Intel','Delivery','Admin'].map(cat=>{
          const mods=accessible.filter(m=>m.cat===cat);
          if(!mods.length)return null;
          return(<div key={cat} className="mb-3">{!collapsed&&<div className="text-[10px] uppercase text-slate-500 font-semibold px-2 mb-1">{cat}</div>}{mods.map(m=><button key={m.id} onClick={()=>setActive(m)} className={`w-full flex items-center gap-2 p-2 rounded-lg mb-0.5 transition ${active?.id===m.id?'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30':'text-slate-400 hover:bg-slate-800 hover:text-white'}`} title={collapsed?m.name:''}><span>{m.icon}</span>{!collapsed&&<><span className="flex-1 text-left text-sm">{m.name}</span>{m.badge&&<span className={`px-1 py-0.5 text-[9px] font-bold rounded ${m.badge==='PRIVATE'?'bg-amber-500/20 text-amber-400':m.badge==='CUI'?'bg-red-500/20 text-red-400':'bg-purple-500/20 text-purple-400'}`}>{m.badge}</span>}</>}</button>)}</div>);
        })}
      </nav>
      {!collapsed&&user&&<div className="p-3 border-t border-slate-800"><div className="flex items-center justify-between"><div className="flex items-center gap-2"><div className="w-8 h-8 rounded-full bg-gradient-to-br from-cyan-500 to-teal-400 flex items-center justify-center text-white text-xs font-bold">{user.name?.[0]||'U'}</div><div className="text-xs text-white truncate max-w-[120px]">{user.name||user.email}</div></div><button onClick={handleLogout} className="p-1.5 rounded hover:bg-red-500/20 text-slate-400 hover:text-red-400"><Icon name="logout" className="w-4 h-4"/></button></div></div>}
    </aside>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App(){
  const[user,setUser]=useState(null);
  const[role,setRole]=useState(ROLES[0]);
  const[active,setActive]=useState(null);
  const[dbStatus,setDbStatus]=useState('checking');

  // Global opportunities state with Supabase sync
  const oppsHook=useSupabaseTable('opportunities',DEMO_OPPS);

  useEffect(()=>{
    const u=checkAuth();
    if(u){
      setUser(u);
      // Check DB connection
      if(supabase){
        supabase.from('opportunities').select('count',{count:'exact',head:true})
          .then(({error})=>setDbStatus(error?'offline':'connected'))
          .catch(()=>setDbStatus('offline'));
      }else{setDbStatus('offline')}
    }
  },[]);

  const renderModule=()=>{
    if(!active)return<div className="flex-1 flex items-center justify-center"><div className="text-center"><div className="text-6xl mb-4">🛡️</div><h2 className="text-xl font-bold text-white mb-2">Welcome to MissionPulse</h2><p className="text-slate-400">Select a module to begin</p></div></div>;
    switch(active.id){
      case 'dashboard':return<ModuleDashboard opps={oppsHook.data} dbStatus={dbStatus}/>;
      case 'pipeline':return<ModulePipeline opps={oppsHook.data} insert={oppsHook.insert} update={oppsHook.update} remove={oppsHook.remove} load={oppsHook.load}/>;
      case 'winthemes':return<ModuleWinThemes opps={oppsHook.data}/>;
      case 'blackhat':return<ModuleBlackHat/>;
      case 'pricing':return<ModulePricing/>;
      case 'frenemy':return<ModuleFrenemy/>;
      case 'hitl':return<ModuleHITL/>;
      case 'lessons':return<ModuleLessons/>;
      case 'playbook':return<ModulePlaybook/>;
      case 'audit':return<ModuleAudit/>;
      default:return<ModuleGeneric mod={active}/>;
    }
  };

  if(!user)return<div className="h-screen flex items-center justify-center bg-[#00050F]"><div className="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"/></div>;

  return(
    <div className="h-screen flex bg-[#00050F] overflow-hidden">
      <Sidebar role={role} setRole={setRole} active={active} setActive={setActive} user={user}/>
      <div className="flex-1 flex flex-col overflow-hidden">
        {active&&<header className="bg-slate-900/90 border-b border-slate-800 px-6 py-3"><div className="flex items-center gap-3"><span className="text-xl">{active.icon}</span><h1 className="font-semibold text-white">{active.name}</h1>{active.badge&&<span className={`px-2 py-0.5 rounded text-xs font-bold ${active.badge==='PRIVATE'?'bg-amber-500/20 text-amber-400':active.badge==='CUI'?'bg-red-500/20 text-red-400':'bg-purple-500/20 text-purple-400'}`}>{active.badge}</span>}<span className={`ml-auto text-xs px-2 py-1 rounded ${dbStatus==='connected'?'bg-emerald-500/20 text-emerald-400':'bg-amber-500/20 text-amber-400'}`}>{dbStatus==='connected'?'● Live':'○ Demo'}</span></div></header>}
        <main className="flex-1 overflow-y-auto p-6">{renderModule()}</main>
      </div>
      <div className="fixed bottom-0 left-0 right-0 h-6 bg-slate-900/95 border-t border-slate-800 flex items-center justify-center z-40"><span className="text-[10px] text-slate-500">AI GENERATED - REQUIRES HUMAN REVIEW • MissionPulse v12 • © 2026 Mission Meets Tech</span></div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
