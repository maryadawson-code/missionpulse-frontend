<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Federal Proposal Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:#00050F;color:#e2e8f0;min-height:100vh}
    .glass{background:rgba(15,23,42,0.85);backdrop-filter:blur(16px);border:1px solid rgba(0,229,250,0.1);border-radius:12px}
    .cyber-glow{box-shadow:0 0 20px rgba(0,229,250,0.15)}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0f172a}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;

const SUPABASE_URL='https://qdrtpnpnhkxvfmvfziop.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON);

const DEMO=[
  {id:'d1',title:'DHA EHR Modernization',agency:'DHA',value:45000000,status:'Capture',pwin:72,due_date:'2026-03-15'},
  {id:'d2',title:'VA Claims Processing AI',agency:'VA',value:28000000,status:'Proposal',pwin:65,due_date:'2026-02-28'},
  {id:'d3',title:'CMS Data Analytics',agency:'CMS',value:67000000,status:'Review',pwin:58,due_date:'2026-04-10'},
  {id:'d4',title:'IHS Telehealth',agency:'IHS',value:19500000,status:'Submitted',pwin:81,due_date:'2026-01-20'},
  {id:'d5',title:'NIH Research Portal',agency:'NIH',value:34000000,status:'Won',pwin:100,due_date:'2025-12-15'},
  {id:'d6',title:'CDC Surveillance',agency:'CDC',value:52000000,status:'Capture',pwin:45,due_date:'2026-05-01'}
];

const MODS=[
  {id:'dashboard',name:'Mission Control',icon:'🎯',cat:'Command'},
  {id:'pipeline',name:'Pipeline',icon:'📊',cat:'Command'},
  {id:'warroom',name:'War Room',icon:'⚔️',cat:'Command'},
  {id:'swimlane',name:'Kanban',icon:'📋',cat:'Command'},
  {id:'rfp',name:'RFP Shredder',icon:'📄',cat:'Capture'},
  {id:'themes',name:'Win Themes',icon:'🏆',cat:'Capture'},
  {id:'blackhat',name:'Black Hat',icon:'🎭',cat:'Capture',badge:'PRIVATE'},
  {id:'frenemy',name:'Frenemy',icon:'🤝',cat:'Capture'},
  {id:'compliance',name:'Compliance',icon:'✓',cat:'Compliance'},
  {id:'contracts',name:'Contracts',icon:'📜',cat:'Compliance'},
  {id:'irondome',name:'Iron Dome',icon:'🛡️',cat:'Compliance'},
  {id:'pricing',name:'Pricing',icon:'💰',cat:'Pricing',badge:'CUI'},
  {id:'teaming',name:'Teaming',icon:'👥',cat:'Execution'},
  {id:'hitl',name:'HITL',icon:'🤖',cat:'Execution'},
  {id:'orals',name:'Orals',icon:'🎤',cat:'Execution'},
  {id:'lessons',name:'Lessons',icon:'📚',cat:'Intel'},
  {id:'reports',name:'Reports',icon:'📈',cat:'Intel'},
  {id:'launch',name:'Launch',icon:'🚀',cat:'Lifecycle'},
  {id:'postaward',name:'Post-Award',icon:'🎖️',cat:'Lifecycle'},
  {id:'settings',name:'Settings',icon:'⚙️',cat:'Admin'},
  {id:'audit',name:'Audit',icon:'📝',cat:'Admin',badge:'CMMC'},
  {id:'health',name:'Health',icon:'💚',cat:'Admin'}
];

const ROLES=['CEO','COO','CAP','PM','SA','FIN','CON','DEL','QA','Admin'];
const CATS=['Command','Capture','Compliance','Pricing','Execution','Intel','Lifecycle','Admin'];

function App(){
  const[mod,setMod]=useState('dashboard');
  const[role,setRole]=useState('CEO');
  const[opps,setOpps]=useState([]);
  const[loading,setLoading]=useState(true);
  const[db,setDb]=useState('connecting');

  useEffect(()=>{load()},[]);

  const load=async()=>{
    setLoading(true);
    try{
      const{data,error}=await supabase.from('opportunities').select('*').limit(50);
      if(!error&&data?.length){setOpps(data);setDb('live');}
      else{setOpps(DEMO);setDb('demo');}
    }catch(e){setOpps(DEMO);setDb('offline');}
    setLoading(false);
  };

  const cur=MODS.find(m=>m.id===mod)||MODS[0];

  return(
    <div className="min-h-screen flex">
      <div className="w-56 bg-slate-900/50 border-r border-slate-800 flex flex-col">
        <div className="p-4 border-b border-slate-800 flex items-center gap-2">
          <span className="text-xl">🎯</span><span className="font-bold text-white">MissionPulse</span>
        </div>
        <div className="p-2 border-b border-slate-800">
          <select value={role} onChange={e=>setRole(e.target.value)} className="w-full bg-slate-800 border-0 rounded px-2 py-1 text-sm text-white">
            {ROLES.map(r=><option key={r}>{r}</option>)}
          </select>
        </div>
        <div className="flex-1 overflow-y-auto p-2">
          {CATS.map(cat=>(
            <div key={cat} className="mb-3">
              <div className="text-[10px] text-slate-500 uppercase px-2 mb-1">{cat}</div>
              {MODS.filter(m=>m.cat===cat).map(m=>(
                <button key={m.id} onClick={()=>setMod(m.id)} className={`w-full flex items-center gap-2 px-2 py-1.5 rounded text-left text-sm ${mod===m.id?'bg-cyan-500/20 text-cyan-400':'text-slate-400 hover:bg-slate-800'}`}>
                  <span>{m.icon}</span><span className="flex-1">{m.name}</span>
                  {m.badge&&<span className={`text-[9px] px-1 rounded ${m.badge==='CUI'?'bg-amber-500/20 text-amber-400':'bg-purple-500/20 text-purple-400'}`}>{m.badge}</span>}
                </button>
              ))}
            </div>
          ))}
        </div>
        <div className="p-2 border-t border-slate-800">
          <a href="agent-hub.html" className="flex items-center gap-2 px-2 py-1.5 rounded text-slate-400 hover:bg-slate-800 text-sm">🤖 Agent Hub</a>
        </div>
      </div>

      <div className="flex-1 flex flex-col">
        <div className="h-12 border-b border-slate-800 flex items-center justify-between px-4">
          <div className="flex items-center gap-2">
            <span className="text-lg">{cur.icon}</span>
            <h1 className="font-medium text-white">{cur.name}</h1>
          </div>
          <div className="flex items-center gap-3">
            <span className={`text-xs px-2 py-0.5 rounded ${db==='live'?'bg-emerald-500/20 text-emerald-400':db==='demo'?'bg-amber-500/20 text-amber-400':'bg-red-500/20 text-red-400'}`}>
              {db==='live'?'● Live':db==='demo'?'◐ Demo':'○ Offline'}
            </span>
            <span className="text-xs text-slate-400">{role}</span>
          </div>
        </div>
        <div className="flex-1 overflow-auto p-4">
          {loading?<div className="flex justify-center py-20"><div className="animate-spin w-6 h-6 border-2 border-cyan-500 border-t-transparent rounded-full"/></div>:
          <Content mod={mod} opps={opps} setOpps={setOpps} db={db} load={load}/>}
        </div>
      </div>
    </div>
  );
}

function Content({mod,opps,setOpps,db,load}){
  const total=opps.reduce((s,o)=>s+(o.value||0),0);
  const avg=opps.length?Math.round(opps.reduce((s,o)=>s+(o.pwin||0),0)/opps.length):0;
  const byStatus=opps.reduce((a,o)=>{a[o.status]=(a[o.status]||0)+1;return a},{});

  // DASHBOARD
  if(mod==='dashboard')return(
    <div className="space-y-4">
      <div className="grid grid-cols-4 gap-3">
        {[{l:'Pipeline',v:`$${(total/1e6).toFixed(0)}M`,c:'cyan'},{l:'Opportunities',v:opps.length,c:'emerald'},{l:'Avg pWin',v:`${avg}%`,c:'amber'},{l:'In Review',v:byStatus.Review||0,c:'purple'}].map((s,i)=>(
          <div key={i} className="glass p-3"><div className="text-xs text-slate-400">{s.l}</div><div className={`text-xl font-bold text-${s.c}-400`}>{s.v}</div></div>
        ))}
      </div>
      <div className="grid grid-cols-2 gap-4">
        <div className="glass p-3">
          <h3 className="text-sm font-medium text-white mb-3">By Status</h3>
          {Object.entries(byStatus).map(([s,c])=>(
            <div key={s} className="flex items-center gap-2 mb-2">
              <span className="w-20 text-xs text-slate-400">{s}</span>
              <div className="flex-1 bg-slate-800 rounded h-2"><div className="bg-cyan-500 h-2 rounded" style={{width:`${(c/opps.length)*100}%`}}/></div>
              <span className="text-xs text-white w-4">{c}</span>
            </div>
          ))}
        </div>
        <div className="glass p-3">
          <h3 className="text-sm font-medium text-white mb-3">Deadlines</h3>
          {opps.filter(o=>o.due_date).sort((a,b)=>new Date(a.due_date)-new Date(b.due_date)).slice(0,5).map(o=>(
            <div key={o.id} className="flex justify-between py-1 text-xs"><span className="text-slate-300">{o.title}</span><span className="text-slate-500">{new Date(o.due_date).toLocaleDateString()}</span></div>
          ))}
        </div>
      </div>
    </div>
  );

  // PIPELINE - FULL CRUD
  if(mod==='pipeline'){
    const[show,setShow]=useState(false);
    const[edit,setEdit]=useState(null);
    const[f,setF]=useState({title:'',agency:'',value:'',status:'Capture',pwin:50,due_date:''});
    const save=async()=>{
      if(!f.title)return;
      const d={...f,value:+f.value||0,pwin:+f.pwin||50};
      if(db==='live'){
        if(edit)await supabase.from('opportunities').update(d).eq('id',edit.id);
        else await supabase.from('opportunities').insert([d]);
        load();
      }else{
        if(edit)setOpps(opps.map(o=>o.id===edit.id?{...o,...d}:o));
        else setOpps([...opps,{id:`d${Date.now()}`,...d}]);
      }
      setShow(false);setEdit(null);setF({title:'',agency:'',value:'',status:'Capture',pwin:50,due_date:''});
    };
    const del=async(id)=>{if(!confirm('Delete?'))return;if(db==='live'){await supabase.from('opportunities').delete().eq('id',id);load();}else setOpps(opps.filter(o=>o.id!==id));};
    const ed=(o)=>{setEdit(o);setF({title:o.title||'',agency:o.agency||'',value:o.value||'',status:o.status||'Capture',pwin:o.pwin||50,due_date:o.due_date||''});setShow(true);};
    return(
      <div className="space-y-3">
        <div className="flex justify-between"><h2 className="text-lg font-medium text-white">Pipeline ({opps.length})</h2>
          <button onClick={()=>{setEdit(null);setF({title:'',agency:'',value:'',status:'Capture',pwin:50,due_date:''});setShow(true)}} className="px-3 py-1 bg-cyan-500 text-white rounded text-sm">+ Add</button>
        </div>
        {show&&(
          <div className="glass p-3">
            <div className="grid grid-cols-3 gap-2">
              <input value={f.title} onChange={e=>setF({...f,title:e.target.value})} placeholder="Title *" className="bg-slate-800 border-slate-700 border rounded px-2 py-1 text-sm text-white"/>
              <input value={f.agency} onChange={e=>setF({...f,agency:e.target.value})} placeholder="Agency" className="bg-slate-800 border-slate-700 border rounded px-2 py-1 text-sm text-white"/>
              <input value={f.value} onChange={e=>setF({...f,value:e.target.value})} placeholder="Value $" type="number" className="bg-slate-800 border-slate-700 border rounded px-2 py-1 text-sm text-white"/>
              <select value={f.status} onChange={e=>setF({...f,status:e.target.value})} className="bg-slate-800 border-slate-700 border rounded px-2 py-1 text-sm text-white">
                {['Capture','Proposal','Review','Submitted','Won','Lost'].map(s=><option key={s}>{s}</option>)}
              </select>
              <input value={f.pwin} onChange={e=>setF({...f,pwin:e.target.value})} placeholder="pWin %" type="number" className="bg-slate-800 border-slate-700 border rounded px-2 py-1 text-sm text-white"/>
              <input value={f.due_date} onChange={e=>setF({...f,due_date:e.target.value})} type="date" className="bg-slate-800 border-slate-700 border rounded px-2 py-1 text-sm text-white"/>
            </div>
            <div className="flex gap-2 mt-2">
              <button onClick={save} className="px-3 py-1 bg-emerald-500 text-white rounded text-sm">Save</button>
              <button onClick={()=>setShow(false)} className="px-3 py-1 bg-slate-700 text-white rounded text-sm">Cancel</button>
            </div>
          </div>
        )}
        <div className="glass overflow-hidden">
          <table className="w-full text-sm">
            <thead className="bg-slate-800/50"><tr>
              <th className="text-left p-2 text-slate-400">Title</th>
              <th className="text-left p-2 text-slate-400">Agency</th>
              <th className="text-left p-2 text-slate-400">Value</th>
              <th className="text-left p-2 text-slate-400">Status</th>
              <th className="text-left p-2 text-slate-400">pWin</th>
              <th className="text-left p-2 text-slate-400">Due</th>
              <th className="p-2"></th>
            </tr></thead>
            <tbody>{opps.map(o=>(
              <tr key={o.id} className="border-t border-slate-800 hover:bg-slate-800/30">
                <td className="p-2 text-white">{o.title}</td>
                <td className="p-2 text-slate-400">{o.agency}</td>
                <td className="p-2 text-cyan-400">${((o.value||0)/1e6).toFixed(1)}M</td>
                <td className="p-2"><span className={`text-xs px-1.5 py-0.5 rounded ${o.status==='Won'?'bg-emerald-500/20 text-emerald-400':o.status==='Lost'?'bg-red-500/20 text-red-400':'bg-slate-700 text-slate-300'}`}>{o.status}</span></td>
                <td className="p-2 text-emerald-400">{o.pwin||0}%</td>
                <td className="p-2 text-slate-400">{o.due_date?new Date(o.due_date).toLocaleDateString():'-'}</td>
                <td className="p-2 text-right">
                  <button onClick={()=>ed(o)} className="text-cyan-400 text-xs mr-2">Edit</button>
                  <button onClick={()=>del(o.id)} className="text-red-400 text-xs">Del</button>
                </td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    );
  }

  // WAR ROOM
  if(mod==='warroom'){
    const active=opps.filter(o=>['Capture','Proposal','Review'].includes(o.status));
    const[sel,setSel]=useState(active[0]||null);
    return(
      <div className="grid grid-cols-3 gap-4">
        <div className="glass p-3">
          <h3 className="text-sm font-medium text-white mb-2">Active ({active.length})</h3>
          {active.map(o=>(
            <div key={o.id} onClick={()=>setSel(o)} className={`p-2 rounded mb-1 cursor-pointer ${sel?.id===o.id?'bg-cyan-500/20':'bg-slate-800/50 hover:bg-slate-800'}`}>
              <div className="text-sm text-white">{o.title}</div>
              <div className="flex justify-between text-xs"><span className="text-slate-400">{o.agency}</span><span className="text-cyan-400">${((o.value||0)/1e6).toFixed(1)}M</span></div>
            </div>
          ))}
        </div>
        <div className="col-span-2 glass p-4">
          {sel?(<>
            <h3 className="text-lg font-medium text-white mb-3">{sel.title}</h3>
            <div className="grid grid-cols-4 gap-3">
              <div className="bg-slate-800/50 p-2 rounded"><div className="text-xs text-slate-400">Value</div><div className="text-lg font-bold text-cyan-400">${((sel.value||0)/1e6).toFixed(1)}M</div></div>
              <div className="bg-slate-800/50 p-2 rounded"><div className="text-xs text-slate-400">pWin</div><div className="text-lg font-bold text-emerald-400">{sel.pwin||0}%</div></div>
              <div className="bg-slate-800/50 p-2 rounded"><div className="text-xs text-slate-400">Status</div><div className="text-lg font-bold text-white">{sel.status}</div></div>
              <div className="bg-slate-800/50 p-2 rounded"><div className="text-xs text-slate-400">Due</div><div className="text-lg font-bold text-amber-400">{sel.due_date?new Date(sel.due_date).toLocaleDateString():'TBD'}</div></div>
            </div>
          </>):(<div className="text-center text-slate-400 py-10">Select an opportunity</div>)}
        </div>
      </div>
    );
  }

  // SWIMLANE
  if(mod==='swimlane'){
    const sts=['Capture','Proposal','Review','Submitted','Won','Lost'];
    return(
      <div className="flex gap-3 overflow-x-auto pb-2">
        {sts.map(s=>(
          <div key={s} className="w-56 flex-shrink-0">
            <div className="glass p-2 mb-2 flex justify-between"><span className="text-sm text-white">{s}</span><span className="text-xs bg-slate-700 text-slate-300 px-1.5 rounded">{opps.filter(o=>o.status===s).length}</span></div>
            {opps.filter(o=>o.status===s).map(o=>(
              <div key={o.id} className="glass p-2 mb-2">
                <div className="text-sm text-white">{o.title}</div>
                <div className="flex justify-between text-xs mt-1"><span className="text-slate-400">{o.agency}</span><span className="text-cyan-400">${((o.value||0)/1e6).toFixed(1)}M</span></div>
              </div>
            ))}
          </div>
        ))}
      </div>
    );
  }

  // COMPLIANCE
  if(mod==='compliance'){
    const[items,setItems]=useState([
      {id:1,req:'L.1.1 Technical Approach',status:'Complete'},
      {id:2,req:'L.1.2 Management Plan',status:'Complete'},
      {id:3,req:'L.1.3 Staffing Plan',status:'Pending'},
      {id:4,req:'M.1.1 Technical Evaluation',status:'Complete'},
      {id:5,req:'M.2.1 Past Performance',status:'Pending'}
    ]);
    const done=items.filter(i=>i.status==='Complete').length;
    const pct=Math.round(done/items.length*100);
    return(
      <div className="space-y-4">
        <div className="glass p-3">
          <div className="flex justify-between mb-2"><span className="text-white">Progress</span><span className="text-cyan-400 font-bold">{pct}%</span></div>
          <div className="w-full bg-slate-800 rounded h-2"><div className="bg-cyan-500 h-2 rounded" style={{width:`${pct}%`}}/></div>
        </div>
        <div className="glass overflow-hidden">
          <table className="w-full text-sm">
            <thead className="bg-slate-800/50"><tr><th className="text-left p-2 text-slate-400">Requirement</th><th className="text-left p-2 text-slate-400">Status</th></tr></thead>
            <tbody>{items.map(i=>(
              <tr key={i.id} className="border-t border-slate-800">
                <td className="p-2 text-white">{i.req}</td>
                <td className="p-2"><button onClick={()=>setItems(items.map(x=>x.id===i.id?{...x,status:x.status==='Complete'?'Pending':'Complete'}:x))} className={`text-xs px-2 py-0.5 rounded ${i.status==='Complete'?'bg-emerald-500/20 text-emerald-400':'bg-amber-500/20 text-amber-400'}`}>{i.status}</button></td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    );
  }

  // BLACK HAT
  if(mod==='blackhat')return(
    <div className="space-y-4">
      <div className="glass p-3 border-red-500/30"><span className="text-red-400">⚠️ COMPETITION SENSITIVE</span></div>
      <div className="grid grid-cols-3 gap-3">
        {[{n:'Leidos',t:'High',s:'Incumbent',w:'Higher rates'},{n:'Booz Allen',t:'Medium',s:'Analytics',w:'Less HC focus'},{n:'SAIC',t:'Medium',s:'Scale',w:'Less agile'}].map(c=>(
          <div key={c.n} className="glass p-3">
            <div className="flex justify-between mb-2"><span className="text-white font-medium">{c.n}</span><span className={`text-xs px-1.5 rounded ${c.t==='High'?'bg-red-500/20 text-red-400':'bg-amber-500/20 text-amber-400'}`}>{c.t}</span></div>
            <div className="text-xs"><span className="text-slate-400">+</span> <span className="text-emerald-400">{c.s}</span></div>
            <div className="text-xs"><span className="text-slate-400">-</span> <span className="text-red-400">{c.w}</span></div>
          </div>
        ))}
      </div>
    </div>
  );

  // PRICING
  if(mod==='pricing')return(
    <div className="space-y-4">
      <div className="glass p-3 border-amber-500/30"><span className="text-amber-400">🔒 CUI - Controlled Unclassified Information</span></div>
      <div className="grid grid-cols-3 gap-3">
        <div className="glass p-3"><div className="text-xs text-slate-400">Proposed</div><div className="text-xl font-bold text-cyan-400">$98.4M</div></div>
        <div className="glass p-3"><div className="text-xs text-slate-400">Price-to-Win</div><div className="text-xl font-bold text-emerald-400">$94.2M</div></div>
        <div className="glass p-3"><div className="text-xs text-slate-400">Delta</div><div className="text-xl font-bold text-amber-400">+4.5%</div></div>
      </div>
      <div className="glass overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-slate-800/50"><tr><th className="text-left p-2 text-slate-400">LCAT</th><th className="text-right p-2 text-slate-400">Proposed</th><th className="text-right p-2 text-slate-400">GSA</th></tr></thead>
          <tbody>
            {[['PM',185,178],['Sr Eng',165,162],['Analyst',145,148]].map(([l,p,g])=>(
              <tr key={l} className="border-t border-slate-800"><td className="p-2 text-white">{l}</td><td className="p-2 text-right text-cyan-400">${p}</td><td className="p-2 text-right text-slate-400">${g}</td></tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );

  // HEALTH
  if(mod==='health')return(
    <div className="space-y-3">
      <h2 className="text-lg font-medium text-white">System Health</h2>
      {[['Supabase',db==='live'?'healthy':db],['Frontend','healthy'],['Storage','healthy']].map(([n,s])=>(
        <div key={n} className="glass p-3 flex justify-between">
          <span className="text-white">{n}</span>
          <span className={`text-xs px-2 py-0.5 rounded ${s==='healthy'?'bg-emerald-500/20 text-emerald-400':s==='demo'?'bg-amber-500/20 text-amber-400':'bg-red-500/20 text-red-400'}`}>{s}</span>
        </div>
      ))}
    </div>
  );

  // GENERIC
  const m=MODS.find(x=>x.id===mod);
  return(
    <div className="glass p-8 text-center">
      <span className="text-5xl">{m?.icon||'📁'}</span>
      <h3 className="text-xl font-medium text-white mt-4">{m?.name||mod}</h3>
      <p className="text-slate-400 mt-2">Module ready for use</p>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
