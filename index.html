<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Mission Meets Tech</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:#00050F;color:#e2e8f0;min-height:100vh;overflow:hidden}
    .glass{background:rgba(15,23,42,0.85);backdrop-filter:blur(16px);border:1px solid rgba(0,229,250,0.1);border-radius:12px}
    .sidebar{width:240px;height:100vh;position:fixed;left:0;top:0;background:linear-gradient(180deg,rgba(0,5,15,0.98),rgba(0,20,40,0.95));border-right:1px solid rgba(0,229,250,0.1);overflow-y:auto;z-index:50}
    .main{margin-left:240px;height:100vh;overflow-y:auto;padding:24px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;margin:2px 8px;border-radius:8px;cursor:pointer;transition:all 0.2s;font-size:14px}
    .nav-item:hover{background:rgba(0,229,250,0.1)}
    .nav-item.active{background:rgba(0,229,250,0.15);color:#00E5FA;border-left:3px solid #00E5FA}
    .nav-group{padding:8px 16px;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;margin-top:16px}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback}=React;

// CONFIG
const SUPABASE_URL='https://qdrtpnpnhkxvfmvfziop.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
const supabase=window.supabase?.createClient(SUPABASE_URL,SUPABASE_ANON);

const MODULES=[
  {group:'Command Center',items:[
    {id:'dashboard',name:'Mission Control',icon:'🎯',roles:['ALL']},
    {id:'pipeline',name:'Pipeline Intel',icon:'📊',roles:['ALL']},
    {id:'warroom',name:'War Room',icon:'⚔️',roles:['CEO','COO','CAP','PM','Admin']},
    {id:'swimlane',name:'Kanban Board',icon:'📋',roles:['ALL']}
  ]},
  {group:'Capture',items:[
    {id:'rfpshredder',name:'RFP Shredder',icon:'📄',roles:['CEO','COO','CAP','PM','SA','Admin']},
    {id:'winthemes',name:'Win Themes',icon:'🏆',roles:['CEO','COO','CAP','SA','PM','Admin']},
    {id:'blackhat',name:'Black Hat',icon:'🎭',roles:['CEO','COO','CAP','Admin'],badge:'PRIVATE'},
    {id:'frenemy',name:'Frenemy Protocol',icon:'🛡️',roles:['CEO','COO','CAP','Admin']}
  ]},
  {group:'Compliance',items:[
    {id:'compliance',name:'Compliance Matrix',icon:'✓',roles:['CEO','COO','CAP','PM','CON','QA','Admin']},
    {id:'contracts',name:'Contract Scanner',icon:'📜',roles:['CEO','COO','CON','FIN','Admin']},
    {id:'irondome',name:'Iron Dome',icon:'✍️',roles:['CEO','COO','CAP','SA','QA','Admin']}
  ]},
  {group:'Pricing',items:[
    {id:'pricing',name:'Pricing Engine',icon:'💰',roles:['CEO','COO','FIN','PM','Admin'],badge:'CUI'}
  ]},
  {group:'Execution',items:[
    {id:'teaming',name:'Teaming Partners',icon:'🤝',roles:['CEO','COO','CAP','PM','DEL','Admin']},
    {id:'hitl',name:'HITL Queue',icon:'🤖',roles:['CEO','COO','CAP','PM','QA','Admin']},
    {id:'orals',name:'Orals Studio',icon:'🎤',roles:['CEO','COO','CAP','PM','SA','Admin']}
  ]},
  {group:'Intelligence',items:[
    {id:'lessons',name:'Lessons Learned',icon:'📚',roles:['ALL']},
    {id:'reports',name:'Reports',icon:'📈',roles:['CEO','COO','CAP','FIN','Admin']}
  ]},
  {group:'Lifecycle',items:[
    {id:'launch',name:'Launch ROI',icon:'🚀',roles:['CEO','COO','CAP','PM','Admin']},
    {id:'postaward',name:'Post-Award',icon:'🏅',roles:['CEO','COO','PM','DEL','Admin']}
  ]},
  {group:'Admin',items:[
    {id:'settings',name:'Settings',icon:'⚙️',roles:['ALL']},
    {id:'audit',name:'Audit Log',icon:'📋',roles:['CEO','COO','Admin','QA'],badge:'CMMC'},
    {id:'health',name:'Health Check',icon:'🏥',roles:['Admin']}
  ]}
];

const ROLES=['CEO','COO','CAP','PM','SA','FIN','CON','DEL','QA','Partner','Admin'];
const PHASES=['Qualify','Capture','Blue Team','Pink Team','Red Team','Gold Team','White Glove','Submit'];
const AGENCIES=['DHA','VA','CMS','IHS','HHS','DOD','GSA'];

// UTILITY
const fmt=v=>v>=1e9?`$${(v/1e9).toFixed(1)}B`:v>=1e6?`$${(v/1e6).toFixed(1)}M`:`$${(v||0).toLocaleString()}`;
const hasAccess=(roles,userRole)=>roles.includes('ALL')||roles.includes(userRole);

// ============ MODULE COMPONENTS ============

function Dashboard({data}){
  const{opps,compliance}=data;
  const total=opps.reduce((s,o)=>s+(o.ceiling||0),0);
  const avgPwin=opps.length?Math.round(opps.reduce((s,o)=>s+(o.pwin||0),0)/opps.length):0;
  const urgent=opps.filter(o=>o.days_to_due<=30).length;
  return(
    <div className="space-y-6">
      <div className="grid grid-cols-4 gap-4">
        <div className="glass p-6"><div className="text-slate-400 text-xs mb-1">Total Pipeline</div><div className="text-3xl font-bold text-emerald-400">{fmt(total)}</div></div>
        <div className="glass p-6"><div className="text-slate-400 text-xs mb-1">Opportunities</div><div className="text-3xl font-bold text-cyan-400">{opps.length}</div></div>
        <div className="glass p-6"><div className="text-slate-400 text-xs mb-1">Avg Win Probability</div><div className="text-3xl font-bold text-amber-400">{avgPwin}%</div></div>
        <div className="glass p-6"><div className="text-slate-400 text-xs mb-1">Due in 30 Days</div><div className="text-3xl font-bold text-red-400">{urgent}</div></div>
      </div>
      <div className="grid grid-cols-2 gap-6">
        <div className="glass p-4">
          <h3 className="font-semibold text-white mb-3">Active Pursuits</h3>
          <div className="space-y-2">
            {opps.slice(0,5).map(o=>(
              <div key={o.id} className="flex justify-between items-center p-2 bg-slate-800/50 rounded">
                <div><div className="text-white text-sm">{o.nickname}</div><div className="text-xs text-slate-500">{o.agency}</div></div>
                <div className="text-right"><div className="text-emerald-400 text-sm">{fmt(o.ceiling)}</div><div className="text-xs text-slate-500">{o.days_to_due}d</div></div>
              </div>
            ))}
          </div>
        </div>
        <div className="glass p-4">
          <h3 className="font-semibold text-white mb-3">Phase Distribution</h3>
          <div className="space-y-2">
            {PHASES.map(p=>{const count=opps.filter(o=>o.phase===p).length;return(
              <div key={p} className="flex items-center gap-3">
                <div className="w-24 text-xs text-slate-400">{p}</div>
                <div className="flex-1 h-2 bg-slate-800 rounded-full"><div className="h-full bg-gradient-to-r from-cyan-500 to-emerald-500 rounded-full" style={{width:`${opps.length?(count/opps.length)*100:0}%`}}/></div>
                <div className="w-6 text-xs text-slate-500">{count}</div>
              </div>
            )})}
          </div>
        </div>
      </div>
    </div>
  );
}

function Pipeline({data,refresh}){
  const{opps}=data;
  const[filter,setFilter]=useState({phase:'all',agency:'all'});
  const[showAdd,setShowAdd]=useState(false);
  const[newOpp,setNewOpp]=useState({nickname:'',title:'',agency:'DHA',ceiling:0,phase:'Qualify',pwin:50,days_to_due:90,priority:'P-1'});
  const filtered=opps.filter(o=>(filter.phase==='all'||o.phase===filter.phase)&&(filter.agency==='all'||o.agency===filter.agency));
  const saveOpp=async()=>{
    if(!newOpp.nickname)return;
    await supabase.from('opportunities').insert([newOpp]);
    refresh();setShowAdd(false);setNewOpp({nickname:'',title:'',agency:'DHA',ceiling:0,phase:'Qualify',pwin:50,days_to_due:90,priority:'P-1'});
  };
  const deleteOpp=async(id)=>{if(confirm('Delete?')){await supabase.from('opportunities').delete().eq('id',id);refresh()}};
  return(
    <div className="space-y-4">
      <div className="flex justify-between"><div className="flex gap-2">
        <select value={filter.phase} onChange={e=>setFilter({...filter,phase:e.target.value})} className="bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-white"><option value="all">All Phases</option>{PHASES.map(p=><option key={p}>{p}</option>)}</select>
        <select value={filter.agency} onChange={e=>setFilter({...filter,agency:e.target.value})} className="bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-white"><option value="all">All Agencies</option>{AGENCIES.map(a=><option key={a}>{a}</option>)}</select>
      </div><button onClick={()=>setShowAdd(true)} className="px-4 py-2 bg-cyan-500 text-white rounded-lg text-sm">+ Add Opportunity</button></div>
      <div className="glass overflow-hidden"><table className="w-full"><thead className="bg-slate-800/50"><tr>{['Opportunity','Agency','Value','Phase','pWin','Days',''].map(h=><th key={h} className="text-left p-3 text-xs font-semibold text-slate-400 uppercase">{h}</th>)}</tr></thead>
        <tbody className="divide-y divide-slate-700/30">{filtered.map(o=>(
          <tr key={o.id} className="hover:bg-slate-800/30">
            <td className="p-3"><div className="text-white">{o.nickname}</div><div className="text-xs text-slate-500">{o.title?.substring(0,40)}</div></td>
            <td className="p-3"><span className="px-2 py-0.5 rounded bg-slate-700 text-xs">{o.agency}</span></td>
            <td className="p-3 text-emerald-400">{fmt(o.ceiling)}</td>
            <td className="p-3"><span className="px-2 py-0.5 rounded bg-cyan-500/20 text-cyan-400 text-xs">{o.phase}</span></td>
            <td className="p-3 text-slate-300">{o.pwin}%</td>
            <td className="p-3"><span className={o.days_to_due<=30?'text-red-400':'text-slate-400'}>{o.days_to_due}d</span></td>
            <td className="p-3"><button onClick={()=>deleteOpp(o.id)} className="text-red-400 text-sm">🗑️</button></td>
          </tr>
        ))}</tbody></table></div>
      {showAdd&&<div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50"><div className="glass p-6 w-full max-w-md">
        <h3 className="text-lg font-bold text-white mb-4">Add Opportunity</h3>
        <div className="space-y-3">
          <input value={newOpp.nickname} onChange={e=>setNewOpp({...newOpp,nickname:e.target.value})} placeholder="Nickname" className="w-full bg-slate-800 border border-slate-700 rounded p-2 text-white"/>
          <input value={newOpp.title} onChange={e=>setNewOpp({...newOpp,title:e.target.value})} placeholder="Full Title" className="w-full bg-slate-800 border border-slate-700 rounded p-2 text-white"/>
          <div className="grid grid-cols-2 gap-2">
            <select value={newOpp.agency} onChange={e=>setNewOpp({...newOpp,agency:e.target.value})} className="bg-slate-800 border border-slate-700 rounded p-2 text-white">{AGENCIES.map(a=><option key={a}>{a}</option>)}</select>
            <input type="number" value={newOpp.ceiling} onChange={e=>setNewOpp({...newOpp,ceiling:+e.target.value})} placeholder="Ceiling $" className="bg-slate-800 border border-slate-700 rounded p-2 text-white"/>
          </div>
          <div className="grid grid-cols-3 gap-2">
            <select value={newOpp.phase} onChange={e=>setNewOpp({...newOpp,phase:e.target.value})} className="bg-slate-800 border border-slate-700 rounded p-2 text-white">{PHASES.map(p=><option key={p}>{p}</option>)}</select>
            <input type="number" value={newOpp.pwin} onChange={e=>setNewOpp({...newOpp,pwin:+e.target.value})} placeholder="pWin %" className="bg-slate-800 border border-slate-700 rounded p-2 text-white"/>
            <input type="number" value={newOpp.days_to_due} onChange={e=>setNewOpp({...newOpp,days_to_due:+e.target.value})} placeholder="Days" className="bg-slate-800 border border-slate-700 rounded p-2 text-white"/>
          </div>
          <div className="flex gap-2"><button onClick={()=>setShowAdd(false)} className="flex-1 px-4 py-2 bg-slate-700 rounded">Cancel</button><button onClick={saveOpp} className="flex-1 px-4 py-2 bg-cyan-500 text-white rounded">Save</button></div>
        </div>
      </div></div>}
    </div>
  );
}

function WarRoom({data}){
  const{opps,compliance}=data;
  const[sel,setSel]=useState(opps[0]||null);
  useEffect(()=>{if(opps.length&&!sel)setSel(opps[0])},[opps]);
  const oppCompliance=compliance.filter(c=>c.opportunity_id===sel?.id);
  const progress=oppCompliance.length?Math.round((oppCompliance.filter(c=>c.status==='complete').length/oppCompliance.length)*100):0;
  return(
    <div className="grid grid-cols-12 gap-6">
      <div className="col-span-3"><div className="glass p-4"><h3 className="text-sm font-semibold text-white mb-3">Active Pursuits</h3>
        <div className="space-y-2">{opps.map(o=>(
          <div key={o.id} onClick={()=>setSel(o)} className={`p-3 rounded cursor-pointer ${sel?.id===o.id?'bg-cyan-500/20 border border-cyan-500/50':'bg-slate-800/50 hover:bg-slate-700/50'}`}>
            <div className="text-white text-sm">{o.nickname}</div>
            <div className="flex justify-between text-xs text-slate-500"><span>{o.agency}</span><span className={o.days_to_due<=30?'text-red-400':''}>{o.days_to_due}d</span></div>
          </div>
        ))}</div>
      </div></div>
      <div className="col-span-9">{sel?(
        <div className="space-y-4">
          <div className="glass p-6 bg-gradient-to-r from-orange-500/10 to-red-500/10">
            <div className="flex justify-between"><div><span className="text-xs px-2 py-0.5 rounded bg-cyan-500/20 text-cyan-400">{sel.phase}</span><h2 className="text-xl font-bold text-white mt-2">{sel.nickname}</h2><p className="text-slate-400 text-sm">{sel.title}</p></div>
            <div className="text-right"><div className="text-2xl font-bold text-emerald-400">{fmt(sel.ceiling)}</div><div className="text-sm text-slate-400">{sel.pwin}% pWin</div></div></div>
          </div>
          <div className="grid grid-cols-3 gap-4">
            <div className="glass p-4 text-center"><div className="text-3xl font-bold text-red-400">{sel.days_to_due}</div><div className="text-xs text-slate-500">Days to Due</div></div>
            <div className="glass p-4 text-center"><div className="text-3xl font-bold text-cyan-400">{progress}%</div><div className="text-xs text-slate-500">Compliance</div></div>
            <div className="glass p-4 text-center"><div className="text-3xl font-bold text-purple-400">{sel.pwin}%</div><div className="text-xs text-slate-500">Win Probability</div></div>
          </div>
          <div className="glass p-4"><h3 className="font-semibold text-white mb-2">Compliance Progress</h3>
            <div className="h-3 bg-slate-800 rounded-full"><div className="h-full bg-gradient-to-r from-cyan-500 to-emerald-500 rounded-full" style={{width:`${progress}%`}}/></div>
          </div>
        </div>
      ):<div className="glass p-12 text-center"><span className="text-6xl">⚔️</span><p className="text-slate-400 mt-4">Select an opportunity</p></div>}</div>
    </div>
  );
}

function Swimlane({data,refresh}){
  const{opps}=data;
  const movePhase=async(id,phase)=>{await supabase.from('opportunities').update({phase}).eq('id',id);refresh()};
  return(
    <div className="flex gap-4 overflow-x-auto pb-4">
      {PHASES.map(phase=>(
        <div key={phase} className="min-w-[200px] flex-shrink-0">
          <div className="text-sm font-semibold text-slate-400 mb-2 flex justify-between"><span>{phase}</span><span className="text-cyan-400">{opps.filter(o=>o.phase===phase).length}</span></div>
          <div className="space-y-2">
            {opps.filter(o=>o.phase===phase).map(o=>(
              <div key={o.id} className="glass p-3">
                <div className="text-white text-sm font-medium">{o.nickname}</div>
                <div className="text-xs text-slate-500">{o.agency} • {fmt(o.ceiling)}</div>
                <div className="flex gap-1 mt-2">
                  {PHASES.indexOf(phase)>0&&<button onClick={()=>movePhase(o.id,PHASES[PHASES.indexOf(phase)-1])} className="text-xs px-2 py-1 bg-slate-700 rounded">←</button>}
                  {PHASES.indexOf(phase)<PHASES.length-1&&<button onClick={()=>movePhase(o.id,PHASES[PHASES.indexOf(phase)+1])} className="text-xs px-2 py-1 bg-cyan-500/20 text-cyan-400 rounded">→</button>}
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

function Compliance({data}){
  const{compliance}=data;
  const complete=compliance.filter(c=>c.status==='complete').length;
  const progress=compliance.length?Math.round((complete/compliance.length)*100):0;
  return(
    <div className="space-y-4">
      <div className="grid grid-cols-4 gap-4">
        <div className="glass p-4"><div className="text-slate-400 text-xs">Total</div><div className="text-2xl font-bold text-white">{compliance.length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Complete</div><div className="text-2xl font-bold text-emerald-400">{complete}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">In Progress</div><div className="text-2xl font-bold text-amber-400">{compliance.filter(c=>c.status==='in_progress').length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Progress</div><div className="text-2xl font-bold text-cyan-400">{progress}%</div></div>
      </div>
      <div className="glass overflow-hidden"><table className="w-full"><thead className="bg-slate-800/50"><tr>{['Req ID','Type','Description','Section','Owner','Status'].map(h=><th key={h} className="text-left p-3 text-xs font-semibold text-slate-400 uppercase">{h}</th>)}</tr></thead>
        <tbody className="divide-y divide-slate-700/30">{compliance.map(c=>(
          <tr key={c.id} className="hover:bg-slate-800/30">
            <td className="p-3 text-cyan-400 font-mono">{c.req_id}</td>
            <td className="p-3"><span className={`px-2 py-0.5 rounded text-xs ${c.type==='L'?'bg-blue-500/20 text-blue-400':'bg-purple-500/20 text-purple-400'}`}>{c.type}</span></td>
            <td className="p-3 text-white text-sm">{c.description}</td>
            <td className="p-3 text-slate-400">{c.section}</td>
            <td className="p-3 text-slate-300">{c.owner}</td>
            <td className="p-3"><span className={`px-2 py-0.5 rounded text-xs ${c.status==='complete'?'bg-emerald-500/20 text-emerald-400':c.status==='in_progress'?'bg-amber-500/20 text-amber-400':'bg-slate-500/20 text-slate-400'}`}>{c.status}</span></td>
          </tr>
        ))}</tbody></table></div>
    </div>
  );
}

function Pricing({data}){
  const{pricing}=data;
  const total=pricing.reduce((s,p)=>s+(p.total||p.rate*p.hours*p.wrap||0),0);
  return(
    <div className="space-y-4">
      <div className="bg-amber-500/10 border border-amber-500/30 rounded-lg p-3 flex items-center gap-3"><span className="text-xl">⚠️</span><div><div className="font-semibold text-amber-400">CUI - CONTROLLED UNCLASSIFIED INFORMATION</div><div className="text-xs text-slate-400">Handle according to NIST 800-171 requirements</div></div></div>
      <div className="grid grid-cols-4 gap-4">
        <div className="glass p-4"><div className="text-slate-400 text-xs">Total Cost</div><div className="text-2xl font-bold text-emerald-400">{fmt(total)}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">LCATs</div><div className="text-2xl font-bold text-cyan-400">{pricing.length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Total Hours</div><div className="text-2xl font-bold text-amber-400">{pricing.reduce((s,p)=>s+(p.hours||0),0).toLocaleString()}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Avg Rate</div><div className="text-2xl font-bold text-purple-400">${pricing.length?Math.round(pricing.reduce((s,p)=>s+(p.rate||0),0)/pricing.length):0}</div></div>
      </div>
      <div className="glass overflow-hidden"><table className="w-full"><thead className="bg-slate-800/50"><tr>{['LCAT','Rate','Hours','Wrap','Total'].map(h=><th key={h} className="text-left p-3 text-xs font-semibold text-slate-400 uppercase">{h}</th>)}</tr></thead>
        <tbody className="divide-y divide-slate-700/30">{pricing.map(p=>(
          <tr key={p.id} className="hover:bg-slate-800/30">
            <td className="p-3 text-white">{p.lcat}</td>
            <td className="p-3 text-slate-300">${p.rate?.toFixed(2)}</td>
            <td className="p-3 text-slate-300">{p.hours?.toLocaleString()}</td>
            <td className="p-3 text-slate-400">{p.wrap}x</td>
            <td className="p-3 text-emerald-400 font-medium">{fmt(p.total||p.rate*p.hours*p.wrap)}</td>
          </tr>
        ))}</tbody></table></div>
    </div>
  );
}

function Competitors({data}){
  const{competitors}=data;
  const threatColor={LOW:'bg-emerald-500/20 text-emerald-400',MEDIUM:'bg-amber-500/20 text-amber-400',HIGH:'bg-orange-500/20 text-orange-400',CRITICAL:'bg-red-500/20 text-red-400'};
  return(
    <div className="space-y-4">
      <div className="bg-red-500/10 border border-red-500/30 rounded-lg p-3 flex items-center gap-3"><span className="text-xl">🎭</span><div><div className="font-semibold text-red-400">PRIVATE - COMPETITIVE INTELLIGENCE</div><div className="text-xs text-slate-400">Restricted to executive team only</div></div></div>
      <div className="grid grid-cols-3 gap-4">
        <div className="glass p-4"><div className="text-slate-400 text-xs">Competitors</div><div className="text-2xl font-bold text-white">{competitors.length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">High Threat</div><div className="text-2xl font-bold text-red-400">{competitors.filter(c=>c.threat==='HIGH'||c.threat==='CRITICAL').length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Incumbents</div><div className="text-2xl font-bold text-amber-400">{competitors.filter(c=>c.incumbent).length}</div></div>
      </div>
      <div className="space-y-4">{competitors.map(c=>(
        <div key={c.id} className="glass p-4">
          <div className="flex justify-between items-start mb-2"><div className="flex items-center gap-2"><span className="font-semibold text-white">{c.name}</span>{c.incumbent&&<span className="px-2 py-0.5 rounded bg-amber-500/20 text-amber-400 text-xs">INCUMBENT</span>}</div><span className={`px-2 py-0.5 rounded text-xs ${threatColor[c.threat]}`}>{c.threat}</span></div>
          <div className="grid grid-cols-2 gap-4 mt-3">
            <div><div className="text-xs text-slate-500 mb-1">Strengths</div><div className="text-sm text-emerald-400">{c.strengths}</div></div>
            <div><div className="text-xs text-slate-500 mb-1">Weaknesses</div><div className="text-sm text-red-400">{c.weaknesses}</div></div>
          </div>
        </div>
      ))}</div>
    </div>
  );
}

function HITL({data,refresh}){
  const{approvals}=data;
  const[sel,setSel]=useState(null);
  const update=async(id,status)=>{await supabase.from('ai_approvals').update({status,reviewed_at:new Date().toISOString()}).eq('id',id);refresh();setSel(null)};
  const agentColor={Capture:'bg-blue-500/20 text-blue-400',Strategy:'bg-purple-500/20 text-purple-400',Writer:'bg-cyan-500/20 text-cyan-400',Compliance:'bg-emerald-500/20 text-emerald-400',Pricing:'bg-amber-500/20 text-amber-400'};
  return(
    <div className="grid grid-cols-12 gap-6">
      <div className="col-span-5"><div className="glass p-4"><h3 className="font-semibold text-white mb-3">Queue ({approvals.filter(a=>a.status==='pending').length} pending)</h3>
        <div className="space-y-2">{approvals.map(a=>(
          <div key={a.id} onClick={()=>setSel(a)} className={`p-3 rounded cursor-pointer ${sel?.id===a.id?'bg-cyan-500/20 border border-cyan-500/50':'bg-slate-800/50 hover:bg-slate-700/50'}`}>
            <div className="flex justify-between"><span className={`text-xs px-1.5 py-0.5 rounded ${agentColor[a.agent]||'bg-slate-500/20'}`}>{a.agent}</span><span className={`text-xs ${a.confidence>=80?'text-emerald-400':a.confidence>=60?'text-amber-400':'text-red-400'}`}>{a.confidence}%</span></div>
            <div className="text-white text-sm mt-1">{a.title}</div>
          </div>
        ))}</div>
      </div></div>
      <div className="col-span-7">{sel?(
        <div className="glass p-6">
          <div className="flex justify-between mb-4"><div><span className={`text-xs px-2 py-0.5 rounded ${agentColor[sel.agent]}`}>{sel.agent} Agent</span><h3 className="text-lg font-bold text-white mt-2">{sel.title}</h3></div><div className="text-2xl font-bold" style={{color:sel.confidence>=80?'#34d399':'#fbbf24'}}>{sel.confidence}%</div></div>
          <div className="bg-slate-800/50 rounded p-4 mb-4 text-sm text-slate-300">{sel.content||'AI-generated content requires human review before use.'}</div>
          <div className="bg-amber-500/10 border border-amber-500/30 rounded p-3 mb-4 text-amber-400 text-sm">⚠️ AI GENERATED - REQUIRES HUMAN REVIEW</div>
          <div className="flex gap-3"><button onClick={()=>update(sel.id,'approved')} className="flex-1 px-4 py-2 bg-emerald-500 text-white rounded">✓ Approve</button><button onClick={()=>update(sel.id,'rejected')} className="flex-1 px-4 py-2 bg-red-500 text-white rounded">✗ Reject</button></div>
        </div>
      ):<div className="glass p-12 text-center"><span className="text-6xl">🤖</span><p className="text-slate-400 mt-4">Select item to review</p></div>}</div>
    </div>
  );
}

function WinThemes({data}){
  const{themes}=data;
  const catColor={Technical:'bg-blue-500/20 text-blue-400',Experience:'bg-purple-500/20 text-purple-400',Value:'bg-emerald-500/20 text-emerald-400',Innovation:'bg-cyan-500/20 text-cyan-400'};
  return(
    <div className="space-y-4">
      <div className="grid grid-cols-4 gap-4">
        <div className="glass p-4"><div className="text-slate-400 text-xs">Total Themes</div><div className="text-2xl font-bold text-white">{themes.length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Avg Strength</div><div className="text-2xl font-bold text-cyan-400">{themes.length?Math.round(themes.reduce((s,t)=>s+(t.strength||0),0)/themes.length):0}%</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Strong (80%+)</div><div className="text-2xl font-bold text-emerald-400">{themes.filter(t=>t.strength>=80).length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Needs Work</div><div className="text-2xl font-bold text-amber-400">{themes.filter(t=>t.strength<60).length}</div></div>
      </div>
      <div className="space-y-3">{themes.map(t=>(
        <div key={t.id} className="glass p-4">
          <div className="flex justify-between items-start mb-2"><div className="flex items-center gap-2"><span className={`px-2 py-0.5 rounded text-xs ${catColor[t.category]||'bg-slate-500/20'}`}>{t.category}</span><span className="font-semibold text-white">{t.theme}</span></div><span className={`font-bold ${t.strength>=80?'text-emerald-400':t.strength>=60?'text-amber-400':'text-red-400'}`}>{t.strength}%</span></div>
          <p className="text-slate-300 text-sm">{t.description}</p>
          <div className="mt-2 h-2 bg-slate-800 rounded-full"><div className={`h-full rounded-full ${t.strength>=80?'bg-emerald-500':t.strength>=60?'bg-amber-500':'bg-red-500'}`} style={{width:`${t.strength}%`}}/></div>
        </div>
      ))}</div>
    </div>
  );
}

function Lessons({data}){
  const{lessons}=data;
  const impactColor={LOW:'bg-slate-500/20 text-slate-400',MEDIUM:'bg-amber-500/20 text-amber-400',HIGH:'bg-orange-500/20 text-orange-400',CRITICAL:'bg-red-500/20 text-red-400'};
  return(
    <div className="space-y-4">
      <div className="grid grid-cols-3 gap-4">
        <div className="glass p-4"><div className="text-slate-400 text-xs">Total</div><div className="text-2xl font-bold text-white">{lessons.length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">High Impact</div><div className="text-2xl font-bold text-orange-400">{lessons.filter(l=>l.impact==='HIGH'||l.impact==='CRITICAL').length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Categories</div><div className="text-2xl font-bold text-cyan-400">{new Set(lessons.map(l=>l.category)).size}</div></div>
      </div>
      {lessons.map(l=>(
        <div key={l.id} className="glass p-4">
          <div className="flex items-center gap-2 mb-2"><span className="px-2 py-0.5 rounded bg-slate-700 text-xs">{l.category}</span><span className={`px-2 py-0.5 rounded text-xs ${impactColor[l.impact]}`}>{l.impact}</span></div>
          <h3 className="font-semibold text-white">{l.title}</h3>
          <p className="text-slate-300 text-sm mt-1">{l.lesson}</p>
          {l.recommendation&&<div className="mt-2 bg-cyan-500/10 border border-cyan-500/30 rounded p-2"><span className="text-cyan-400 text-xs">💡 </span><span className="text-sm text-slate-300">{l.recommendation}</span></div>}
        </div>
      ))}
    </div>
  );
}

function Reports({data}){
  const{opps,compliance,pricing}=data;
  const total=opps.reduce((s,o)=>s+(o.ceiling||0),0);
  const exp=()=>{const csv=['Nickname,Agency,Value,Phase,pWin,Days'].concat(opps.map(o=>`${o.nickname},${o.agency},${o.ceiling},${o.phase},${o.pwin},${o.days_to_due}`)).join('\n');const b=new Blob([csv],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='pipeline.csv';a.click()};
  return(
    <div className="space-y-4">
      <div className="flex justify-end"><button onClick={exp} className="px-4 py-2 bg-cyan-500 text-white rounded-lg text-sm">📥 Export CSV</button></div>
      <div className="grid grid-cols-4 gap-4">
        <div className="glass p-4"><div className="text-slate-400 text-xs">Pipeline</div><div className="text-2xl font-bold text-emerald-400">{fmt(total)}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Opportunities</div><div className="text-2xl font-bold text-cyan-400">{opps.length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Compliance Items</div><div className="text-2xl font-bold text-amber-400">{compliance.length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Pricing LCATs</div><div className="text-2xl font-bold text-purple-400">{pricing.length}</div></div>
      </div>
      <div className="glass p-4"><h3 className="font-semibold text-white mb-3">Pipeline by Agency</h3>
        {AGENCIES.map(a=>{const v=opps.filter(o=>o.agency===a).reduce((s,o)=>s+(o.ceiling||0),0);return v>0&&(
          <div key={a} className="flex items-center gap-3 mb-2"><div className="w-16 text-sm text-slate-400">{a}</div><div className="flex-1 h-3 bg-slate-800 rounded-full"><div className="h-full bg-gradient-to-r from-cyan-500 to-emerald-500 rounded-full" style={{width:`${(v/total)*100}%`}}/></div><div className="w-20 text-right text-sm text-emerald-400">{fmt(v)}</div></div>
        )})}
      </div>
    </div>
  );
}

function Settings({role,setRole}){
  return(
    <div className="space-y-4">
      <div className="glass p-6"><h3 className="font-semibold text-white mb-4">User Settings</h3>
        <div className="space-y-4">
          <div><label className="block text-sm text-slate-400 mb-1">Current Role</label>
            <select value={role} onChange={e=>setRole(e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded p-3 text-white">{ROLES.map(r=><option key={r}>{r}</option>)}</select>
          </div>
          <div><label className="block text-sm text-slate-400 mb-1">Email</label><input defaultValue="mary@mmt.com" className="w-full bg-slate-800 border border-slate-700 rounded p-3 text-white"/></div>
        </div>
      </div>
      <div className="glass p-6"><h3 className="font-semibold text-white mb-4">System Info</h3>
        <div className="space-y-2 text-sm">{[['Version','3.0.0'],['Database','Supabase'],['Build','January 30, 2026']].map(([k,v])=>(
          <div key={k} className="flex justify-between p-2 bg-slate-800/50 rounded"><span className="text-slate-400">{k}</span><span className="text-cyan-400 font-mono">{v}</span></div>
        ))}</div>
      </div>
    </div>
  );
}

function Health({connected}){
  return(
    <div className="space-y-4">
      <div className="grid grid-cols-3 gap-4">
        <div className="glass p-4 text-center"><div className="text-4xl mb-2">{connected?'✅':'❌'}</div><div className="text-sm text-slate-400">Database</div><div className={connected?'text-emerald-400':'text-red-400'}>{connected?'HEALTHY':'ERROR'}</div></div>
        <div className="glass p-4 text-center"><div className="text-4xl mb-2">✅</div><div className="text-sm text-slate-400">Frontend</div><div className="text-emerald-400">HEALTHY</div></div>
        <div className="glass p-4 text-center"><div className="text-4xl mb-2">⚠️</div><div className="text-sm text-slate-400">API</div><div className="text-amber-400">COLD START</div></div>
      </div>
      <div className="glass p-4"><h3 className="font-semibold text-white mb-3">Environment</h3>
        <div className="space-y-2 text-sm">{[['Platform','Netlify'],['Database','Supabase PostgreSQL'],['Region','US East']].map(([k,v])=>(
          <div key={k} className="flex justify-between p-2 bg-slate-800/50 rounded"><span className="text-slate-400">{k}</span><span className="text-white">{v}</span></div>
        ))}</div>
      </div>
    </div>
  );
}

function Placeholder({name,icon}){
  return(<div className="glass p-12 text-center"><span className="text-6xl">{icon}</span><h3 className="text-xl font-bold text-white mt-4">{name}</h3><p className="text-slate-400 mt-2">Module functionality available</p></div>);
}

// ============ MAIN APP ============

function App(){
  const[role,setRole]=useState('CEO');
  const[active,setActive]=useState('dashboard');
  const[connected,setConnected]=useState(false);
  const[data,setData]=useState({opps:[],compliance:[],competitors:[],pricing:[],approvals:[],themes:[],lessons:[]});

  const loadData=useCallback(async()=>{
    try{
      const[opps,comp,compet,price,appr,themes,less]=await Promise.all([
        supabase.from('opportunities').select('*').order('days_to_due'),
        supabase.from('compliance_items').select('*'),
        supabase.from('competitors').select('*'),
        supabase.from('pricing_items').select('*'),
        supabase.from('ai_approvals').select('*').order('created_at',{ascending:false}),
        supabase.from('win_themes').select('*'),
        supabase.from('lessons_learned').select('*')
      ]);
      setData({opps:opps.data||[],compliance:comp.data||[],competitors:compet.data||[],pricing:price.data||[],approvals:appr.data||[],themes:themes.data||[],lessons:less.data||[]});
      setConnected(!opps.error);
    }catch{setConnected(false)}
  },[]);

  useEffect(()=>{loadData()},[loadData]);

  const renderModule=()=>{
    switch(active){
      case 'dashboard':return <Dashboard data={data}/>;
      case 'pipeline':return <Pipeline data={data} refresh={loadData}/>;
      case 'warroom':return <WarRoom data={data}/>;
      case 'swimlane':return <Swimlane data={data} refresh={loadData}/>;
      case 'compliance':return <Compliance data={data}/>;
      case 'pricing':return <Pricing data={data}/>;
      case 'blackhat':return <Competitors data={data}/>;
      case 'hitl':return <HITL data={data} refresh={loadData}/>;
      case 'winthemes':return <WinThemes data={data}/>;
      case 'lessons':return <Lessons data={data}/>;
      case 'reports':return <Reports data={data}/>;
      case 'settings':return <Settings role={role} setRole={setRole}/>;
      case 'health':return <Health connected={connected}/>;
      default:
        const mod=MODULES.flatMap(g=>g.items).find(m=>m.id===active);
        return <Placeholder name={mod?.name||active} icon={mod?.icon||'📦'}/>;
    }
  };

  return(
    <div>
      {/* Sidebar */}
      <div className="sidebar">
        <div className="p-4 border-b border-slate-800">
          <div className="flex items-center gap-2"><span className="text-2xl">🎯</span><span className="font-bold text-white">MissionPulse</span></div>
          <div className="text-xs text-slate-500 mt-1">Mission Meets Tech</div>
        </div>
        <div className="p-2">
          <select value={role} onChange={e=>setRole(e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-white">
            {ROLES.map(r=><option key={r}>{r}</option>)}
          </select>
        </div>
        {MODULES.map(group=>(
          <div key={group.group}>
            <div className="nav-group">{group.group}</div>
            {group.items.filter(m=>hasAccess(m.roles,role)).map(m=>(
              <div key={m.id} onClick={()=>setActive(m.id)} className={`nav-item ${active===m.id?'active':''}`}>
                <span>{m.icon}</span><span>{m.name}</span>
                {m.badge&&<span className={`ml-auto text-xs px-1.5 py-0.5 rounded ${m.badge==='CUI'?'bg-amber-500/20 text-amber-400':m.badge==='PRIVATE'?'bg-red-500/20 text-red-400':'bg-cyan-500/20 text-cyan-400'}`}>{m.badge}</span>}
              </div>
            ))}
          </div>
        ))}
        <div className="p-4 border-t border-slate-800 mt-auto">
          <div className={`flex items-center gap-2 text-xs ${connected?'text-emerald-400':'text-red-400'}`}>
            <span className={`w-2 h-2 rounded-full ${connected?'bg-emerald-400':'bg-red-400'}`}></span>
            {connected?'Connected':'Offline Mode'}
          </div>
        </div>
      </div>

      {/* Main */}
      <div className="main">
        <div className="flex justify-between items-center mb-6">
          <h1 className="text-xl font-bold text-white">{MODULES.flatMap(g=>g.items).find(m=>m.id===active)?.name||'Dashboard'}</h1>
          <button onClick={loadData} className="px-3 py-1.5 bg-slate-800 rounded text-sm text-slate-400 hover:text-white">🔄 Refresh</button>
        </div>
        {renderModule()}
        <div className="text-center text-xs text-slate-500 mt-8 pb-4">AI GENERATED - REQUIRES HUMAN REVIEW | © 2026 Mission Meets Tech</div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
