<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Dashboard</title>
  <meta name="description" content="MissionPulse - AI-powered federal proposal management by Mission Meets Tech">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-cyan { 0%, 100% { box-shadow: 0 0 0 0 rgba(0, 229, 250, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(0, 229, 250, 0); } }
    .pulse-icon { animation: pulse-cyan 2s infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .float { animation: float 3s ease-in-out infinite; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // Module Registry - All 29+ modules
    const MODULES = {
      capture: [
        { id: 'pipeline', name: 'Pipeline', icon: '📊', path: 'missionpulse-pipeline-v2.html', desc: 'Track opportunities through gates' },
        { id: 'warroom', name: 'War Room', icon: '🎯', path: 'missionpulse-warroom-v2.html', desc: 'Active pursuit command center' },
        { id: 'swimlane', name: 'Swimlane', icon: '📋', path: 'missionpulse-swimlane-v2.html', desc: 'Visual workflow board' },
        { id: 'winthemes', name: 'Win Themes', icon: '🏆', path: 'missionpulse-winthemes-v2.html', desc: 'Discriminators & proof points' },
        { id: 'playbook', name: 'Playbook', icon: '📖', path: 'missionpulse-playbook-v2.html', desc: 'Shipley methodology tasks' }
      ],
      intelligence: [
        { id: 'rfpshredder', name: 'RFP Shredder', icon: '🔍', path: 'missionpulse-rfpshredder-v2.html', desc: 'AI-powered RFP analysis' },
        { id: 'blackhat', name: 'Black Hat', icon: '🎭', path: 'missionpulse-blackhat-v2.html', desc: 'Competitive intelligence', rbac: ['CEO', 'COO', 'CAP'] },
        { id: 'contracts', name: 'Contracts Scanner', icon: '📜', path: 'missionpulse-contracts-v2.html', desc: 'FAR/DFARS analysis' },
        { id: 'compliance', name: 'Compliance Matrix', icon: '✅', path: 'missionpulse-compliance-v2.html', desc: 'Requirement tracking' },
        { id: 'teaming', name: 'Teaming Partners', icon: '🤝', path: 'missionpulse-teaming-v2.html', desc: 'Partner management' }
      ],
      proposal: [
        { id: 'irondome', name: 'Iron Dome', icon: '🛡️', path: 'missionpulse-irondome-v2.html', desc: 'Page budget tracking' },
        { id: 'pricing', name: 'Pricing Engine', icon: '💰', path: 'missionpulse-pricing-v2.html', desc: 'BOE & rate analysis', rbac: ['CEO', 'COO', 'FIN', 'PM'], cui: true },
        { id: 'orals', name: 'Orals Studio', icon: '🎤', path: 'missionpulse-orals-v2.html', desc: 'Presentation prep' },
        { id: 'pastperf', name: 'Past Performance', icon: '📈', path: 'missionpulse-pastperf-v2.html', desc: 'Contract history' },
        { id: 'hitl', name: 'HITL Queue', icon: '🤖', path: 'missionpulse-hitl-v2.html', desc: 'AI approval workflow' }
      ],
      operations: [
        { id: 'launchroi', name: 'Launch ROI', icon: '🚀', path: 'missionpulse-launchroi-v2.html', desc: 'Go-live checklist' },
        { id: 'postaward', name: 'Post-Award', icon: '🏅', path: 'missionpulse-postaward-v2.html', desc: 'Transition management' },
        { id: 'lessons', name: 'Lessons Learned', icon: '📚', path: 'missionpulse-lessons-v2.html', desc: 'Knowledge capture' },
        { id: 'reports', name: 'Reports', icon: '📉', path: 'missionpulse-reports-v2.html', desc: 'Analytics & metrics' }
      ],
      admin: [
        { id: 'agenthub', name: 'Agent Hub', icon: '🤖', path: 'missionpulse-agenthub-v2.html', desc: '8 AI agents' },
        { id: 'settings', name: 'Settings', icon: '⚙️', path: 'missionpulse-settings-v2.html', desc: 'User preferences' },
        { id: 'audit', name: 'Audit Log', icon: '📝', path: 'missionpulse-audit-v2.html', desc: 'Activity tracking', rbac: ['CEO', 'COO', 'Admin'] },
        { id: 'health', name: 'Health Check', icon: '💚', path: 'missionpulse-health-check.html', desc: 'System status' },
        { id: 'tests', name: 'Integration Tests', icon: '🧪', path: 'missionpulse-integration-tests.html', desc: 'Module testing' },
        { id: 'requests', name: 'Access Requests', icon: '👥', path: 'missionpulse-admin-requests.html', desc: 'Lead management', rbac: ['CEO', 'COO', 'Admin'] }
      ]
    };

    // Demo pipeline data
    const DEMO_PIPELINE = [
      { id: 1, nickname: 'EHR-Mod', title: 'DHA Electronic Health Record Modernization', agency: 'Defense Health Agency', ceiling: 125000000, phase: 'Gate 3', pwin: 72, priority: 'Critical', due_date: '2026-03-15' },
      { id: 2, nickname: 'VA-CPA', title: 'VA Claims Processing Automation', agency: 'Veterans Affairs', ceiling: 45000000, phase: 'Gate 2', pwin: 65, priority: 'High', due_date: '2026-04-01' },
      { id: 3, nickname: 'CMS-Fraud', title: 'CMS Medicare Fraud Detection', agency: 'CMS', ceiling: 78000000, phase: 'Gate 4', pwin: 58, priority: 'Critical', due_date: '2026-02-28' },
      { id: 4, nickname: 'IHS-Tele', title: 'IHS Telehealth Expansion', agency: 'Indian Health Service', ceiling: 32000000, phase: 'Gate 1', pwin: 45, priority: 'Medium', due_date: '2026-05-15' },
      { id: 5, nickname: 'NIH-RDP', title: 'NIH Research Data Platform', agency: 'NIH', ceiling: 95000000, phase: 'Gate 2', pwin: 55, priority: 'High', due_date: '2026-03-30' }
    ];

    // Sidebar Component
    function Sidebar({ user, mobileOpen, setMobileOpen }) {
      const categories = [
        { name: 'Capture', modules: MODULES.capture },
        { name: 'Intelligence', modules: MODULES.intelligence },
        { name: 'Proposal', modules: MODULES.proposal },
        { name: 'Operations', modules: MODULES.operations },
        { name: 'Admin', modules: MODULES.admin }
      ];

      return (
        <>
          {/* Mobile overlay */}
          {mobileOpen && (
            <div 
              className="fixed inset-0 bg-black/50 z-40 lg:hidden"
              onClick={() => setMobileOpen(false)}
            />
          )}
          
          <div className={`fixed lg:static inset-y-0 left-0 z-50 w-64 bg-slate-900/95 border-r border-slate-700 transform transition-transform duration-200 lg:transform-none ${mobileOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
            <div className="flex flex-col h-full">
              {/* Logo */}
              <div className="p-4 border-b border-slate-700">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center pulse-icon">
                    <span className="text-xl">🛡️</span>
                  </div>
                  <div>
                    <div className="font-bold text-cyan-400">MissionPulse</div>
                    <div className="text-xs text-slate-500">Mission Meets Tech</div>
                  </div>
                </div>
              </div>
              
              {/* Navigation */}
              <nav className="flex-1 overflow-y-auto scrollbar-hide p-2">
                {/* Dashboard Link */}
                <a href="index.html" className="flex items-center gap-3 px-3 py-2 mb-2 rounded-lg bg-cyan-500/20 text-cyan-400 border border-cyan-500/30">
                  <span>🏠</span>
                  <span className="text-sm font-medium">Dashboard</span>
                </a>
                
                {categories.map((cat, i) => (
                  <div key={i} className="mb-4">
                    <div className="px-3 py-1 text-xs font-semibold text-slate-500 uppercase tracking-wider">
                      {cat.name}
                    </div>
                    <div className="space-y-0.5">
                      {cat.modules.map((mod, j) => (
                        <a
                          key={j}
                          href={mod.path}
                          className="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors group"
                        >
                          <span>{mod.icon}</span>
                          <span className="text-sm flex-1">{mod.name}</span>
                          {mod.rbac && (
                            <span className="px-1.5 py-0.5 bg-amber-500/20 text-amber-400 text-[10px] rounded opacity-0 group-hover:opacity-100 transition-opacity">
                              RBAC
                            </span>
                          )}
                          {mod.cui && (
                            <span className="px-1.5 py-0.5 bg-purple-500/20 text-purple-400 text-[10px] rounded opacity-0 group-hover:opacity-100 transition-opacity">
                              CUI
                            </span>
                          )}
                        </a>
                      ))}
                    </div>
                  </div>
                ))}
              </nav>
              
              {/* User */}
              <div className="p-4 border-t border-slate-700">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-sm">
                    {user?.email?.[0]?.toUpperCase() || '?'}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-medium truncate">{user?.email || 'Demo User'}</div>
                    <div className="text-xs text-slate-500">{user?.role || 'CEO'}</div>
                  </div>
                  <button 
                    onClick={async () => {
                      await supabase.auth.signOut();
                      localStorage.removeItem('missionpulse_demo');
                      window.location.href = 'login.html';
                    }}
                    className="p-1.5 hover:bg-slate-700 rounded text-slate-400 hover:text-white"
                    title="Sign out"
                  >
                    🚪
                  </button>
                </div>
              </div>
            </div>
          </div>
        </>
      );
    }

    // Stat Card
    function StatCard({ icon, label, value, subvalue, color }) {
      return (
        <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4 hover:border-slate-600 transition-colors">
          <div className="flex items-center justify-between mb-2">
            <span className="text-2xl">{icon}</span>
            <span className={`text-xs px-2 py-0.5 rounded-full ${color}`}>{subvalue}</span>
          </div>
          <div className="text-2xl font-bold">{value}</div>
          <div className="text-sm text-slate-400">{label}</div>
        </div>
      );
    }

    // Pipeline Row
    function PipelineRow({ opp }) {
      const priorityColors = {
        Critical: 'bg-red-500/20 text-red-400',
        High: 'bg-amber-500/20 text-amber-400',
        Medium: 'bg-blue-500/20 text-blue-400',
        Low: 'bg-slate-500/20 text-slate-400'
      };

      const daysUntilDue = Math.ceil((new Date(opp.due_date) - new Date()) / (1000 * 60 * 60 * 24));

      return (
        <div className="flex items-center gap-4 p-3 hover:bg-slate-800/30 rounded-lg transition-colors">
          <div className="w-12 h-12 rounded-lg bg-slate-700 flex items-center justify-center font-bold text-cyan-400">
            {opp.pwin}%
          </div>
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2">
              <span className="font-medium">{opp.nickname}</span>
              <span className={`px-2 py-0.5 rounded text-xs ${priorityColors[opp.priority]}`}>
                {opp.priority}
              </span>
            </div>
            <div className="text-sm text-slate-400 truncate">{opp.title}</div>
          </div>
          <div className="text-right hidden sm:block">
            <div className="text-sm font-medium">${(opp.ceiling / 1000000).toFixed(0)}M</div>
            <div className="text-xs text-slate-500">{opp.agency}</div>
          </div>
          <div className="text-right">
            <div className="text-sm">{opp.phase}</div>
            <div className={`text-xs ${daysUntilDue <= 14 ? 'text-red-400' : daysUntilDue <= 30 ? 'text-amber-400' : 'text-slate-500'}`}>
              {daysUntilDue}d left
            </div>
          </div>
        </div>
      );
    }

    // Quick Action Card
    function QuickAction({ icon, title, desc, path, color }) {
      return (
        <a 
          href={path}
          className={`block p-4 rounded-xl border transition-all hover:scale-[1.02] ${color}`}
        >
          <div className="text-2xl mb-2 float">{icon}</div>
          <div className="font-medium">{title}</div>
          <div className="text-sm opacity-70">{desc}</div>
        </a>
      );
    }

    // Main App
    function App() {
      const [user, setUser] = React.useState(null);
      const [pipeline, setPipeline] = React.useState(DEMO_PIPELINE);
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [mobileOpen, setMobileOpen] = React.useState(false);

      React.useEffect(() => {
        checkAuth();
        loadPipeline();
      }, []);

      const checkAuth = async () => {
        // Check for demo session
        const demoSession = localStorage.getItem('missionpulse_demo');
        if (demoSession) {
          const demo = JSON.parse(demoSession);
          if (demo.expires > Date.now()) {
            setUser(demo.user);
            return;
          }
        }

        // Check Supabase session
        try {
          const { data: { session } } = await supabase.auth.getSession();
          if (session) {
            const { data: profile } = await supabase
              .from('profiles')
              .select('*')
              .eq('id', session.user.id)
              .single();
            
            setUser({
              email: session.user.email,
              role: profile?.role || 'Partner',
              ...profile
            });
          }
        } catch (e) {
          console.log('Auth check failed');
        }
      };

      const loadPipeline = async () => {
        try {
          const { data, error } = await supabase
            .from('opportunities')
            .select('*')
            .eq('status', 'Active')
            .order('due_date', { ascending: true })
            .limit(10);
          
          if (!error && data && data.length > 0) {
            setPipeline(data);
            setConnected(true);
          }
        } catch (e) {
          console.log('Using demo pipeline');
        }
        setLoading(false);
      };

      const totalPipelineValue = pipeline.reduce((sum, o) => sum + (o.ceiling || 0), 0);
      const avgPwin = Math.round(pipeline.reduce((sum, o) => sum + (o.pwin || 0), 0) / pipeline.length);
      const criticalCount = pipeline.filter(o => o.priority === 'Critical').length;
      const dueThisMonth = pipeline.filter(o => {
        const due = new Date(o.due_date);
        const now = new Date();
        return due.getMonth() === now.getMonth() && due.getFullYear() === now.getFullYear();
      }).length;

      return (
        <div className="flex min-h-screen">
          <Sidebar user={user} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} />
          
          <div className="flex-1 lg:ml-0">
            {/* Mobile Header */}
            <div className="lg:hidden flex items-center justify-between p-4 border-b border-slate-800">
              <button 
                onClick={() => setMobileOpen(true)}
                className="p-2 hover:bg-slate-800 rounded-lg"
              >
                ☰
              </button>
              <div className="font-bold text-cyan-400">MissionPulse</div>
              <div className={`w-2 h-2 rounded-full ${connected ? 'bg-emerald-400' : 'bg-amber-400'}`} />
            </div>

            <div className="p-4 lg:p-6">
              {/* Header */}
              <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                <div>
                  <h1 className="text-2xl font-bold">Dashboard</h1>
                  <p className="text-slate-400 text-sm">Welcome back, {user?.email?.split('@')[0] || 'User'}</p>
                </div>
                
                <div className="flex items-center gap-3">
                  <div className={`px-3 py-1.5 rounded-lg text-sm flex items-center gap-2 ${
                    connected 
                      ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' 
                      : 'bg-amber-500/20 text-amber-400 border border-amber-500/30'
                  }`}>
                    <span className={`w-2 h-2 rounded-full ${connected ? 'bg-emerald-400' : 'bg-amber-400'}`} />
                    {connected ? 'Connected' : 'Demo Mode'}
                  </div>
                  <a 
                    href="missionpulse-pipeline-v2.html"
                    className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg text-sm font-medium transition-colors"
                  >
                    + New Opportunity
                  </a>
                </div>
              </div>

              {/* Stats */}
              <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                <StatCard 
                  icon="💰" 
                  label="Pipeline Value" 
                  value={`$${(totalPipelineValue / 1000000).toFixed(0)}M`}
                  subvalue={`${pipeline.length} opps`}
                  color="bg-cyan-500/20 text-cyan-400"
                />
                <StatCard 
                  icon="📊" 
                  label="Avg Win Probability" 
                  value={`${avgPwin}%`}
                  subvalue="weighted"
                  color="bg-emerald-500/20 text-emerald-400"
                />
                <StatCard 
                  icon="🔥" 
                  label="Critical Priority" 
                  value={criticalCount}
                  subvalue="need attention"
                  color="bg-red-500/20 text-red-400"
                />
                <StatCard 
                  icon="📅" 
                  label="Due This Month" 
                  value={dueThisMonth}
                  subvalue="submissions"
                  color="bg-amber-500/20 text-amber-400"
                />
              </div>

              {/* Main Grid */}
              <div className="grid lg:grid-cols-3 gap-6">
                {/* Pipeline */}
                <div className="lg:col-span-2 bg-slate-800/50 border border-slate-700 rounded-xl">
                  <div className="flex items-center justify-between p-4 border-b border-slate-700">
                    <h2 className="font-semibold">Active Pipeline</h2>
                    <a href="missionpulse-pipeline-v2.html" className="text-sm text-cyan-400 hover:underline">
                      View All →
                    </a>
                  </div>
                  <div className="p-2">
                    {loading ? (
                      <div className="p-8 text-center text-slate-500">Loading...</div>
                    ) : (
                      pipeline.slice(0, 5).map(opp => (
                        <PipelineRow key={opp.id} opp={opp} />
                      ))
                    )}
                  </div>
                </div>

                {/* Quick Actions */}
                <div className="space-y-4">
                  <h2 className="font-semibold">Quick Actions</h2>
                  <div className="grid gap-3">
                    <QuickAction 
                      icon="🔍"
                      title="Shred an RFP"
                      desc="AI-powered analysis"
                      path="missionpulse-rfpshredder-v2.html"
                      color="bg-slate-800/50 border-slate-700 hover:border-cyan-500/50"
                    />
                    <QuickAction 
                      icon="🎭"
                      title="Black Hat Review"
                      desc="Competitive intel"
                      path="missionpulse-blackhat-v2.html"
                      color="bg-slate-800/50 border-slate-700 hover:border-red-500/50"
                    />
                    <QuickAction 
                      icon="🤖"
                      title="Agent Hub"
                      desc="8 AI assistants"
                      path="missionpulse-agenthub-v2.html"
                      color="bg-slate-800/50 border-slate-700 hover:border-purple-500/50"
                    />
                    <QuickAction 
                      icon="📋"
                      title="HITL Queue"
                      desc="Review AI outputs"
                      path="missionpulse-hitl-v2.html"
                      color="bg-slate-800/50 border-slate-700 hover:border-emerald-500/50"
                    />
                  </div>
                </div>
              </div>

              {/* Module Grid */}
              <div className="mt-6">
                <h2 className="font-semibold mb-4">All Modules</h2>
                <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3">
                  {[...MODULES.capture, ...MODULES.intelligence, ...MODULES.proposal, ...MODULES.operations].map((mod, i) => (
                    <a 
                      key={i}
                      href={mod.path}
                      className="p-3 bg-slate-800/30 border border-slate-700 rounded-lg hover:bg-slate-800/50 hover:border-slate-600 transition-all group"
                    >
                      <div className="flex items-center gap-2 mb-1">
                        <span>{mod.icon}</span>
                        <span className="text-sm font-medium">{mod.name}</span>
                      </div>
                      <div className="text-xs text-slate-500 group-hover:text-slate-400">{mod.desc}</div>
                    </a>
                  ))}
                </div>
              </div>

              {/* Footer */}
              <div className="mt-8 pt-6 border-t border-slate-800 flex flex-col sm:flex-row items-center justify-between gap-4 text-xs text-slate-500">
                <div className="flex items-center gap-4">
                  <span>© 2026 Mission Meets Tech</span>
                  <span>•</span>
                  <span>MissionPulse v2.0</span>
                </div>
                <div className="flex items-center gap-4">
                  <a href="missionpulse-request-access.html" className="hover:text-cyan-400">Request Access</a>
                  <span>•</span>
                  <span>AI GENERATED - REQUIRES HUMAN REVIEW</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
