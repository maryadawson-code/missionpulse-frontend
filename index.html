            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ModuleAgents(){

      <div><h2 className="text-xl font-bold text-white">AI Agent Hub</h2><p className="text-slate-400 text-sm">Specialized AI assistants for proposal development</p></div>
      <div className="grid grid-cols-4 gap-4">
        {AI_AGENTS.map(agent=>(
          <div key={agent.id} className="glass p-4 hover-lift cursor-pointer">
            <div className="text-3xl mb-2">{agent.icon}</div>
            <h3 className="font-semibold text-white">{agent.name}</h3>
            <p className="text-xs text-slate-400 mt-1">{agent.desc}</p>

function ModuleReports(){

    <div className="space-y-4 animate-fadeIn">

        <div className="glass p-4"><h3 className="text-sm text-slate-400 mb-2">Win Rate</h3><p className="text-3xl font-bold text-emerald-400">42%</p><p className="text-xs text-slate-500 mt-1">↑ 8% vs last quarter</p></div>
        <div className="glass p-4"><h3 className="text-sm text-slate-400 mb-2">Avg Proposal Time</h3><p className="text-3xl font-bold text-cyan-400">18 days</p><p className="text-xs text-slate-500 mt-1">↓ 5 days with AI</p></div>
        <div className="glass p-4"><h3 className="text-sm text-slate-400 mb-2">Pipeline Velocity</h3><p className="text-3xl font-bold text-amber-400">$12.4M</p><p className="text-xs text-slate-500 mt-1">Monthly throughput</p></div>
      </div>
    </div>

function ModuleAdmin(){
  const{currentRole}=useContext(AppContext);

    <div className="glass p-12 text-center animate-fadeIn">
      <div className="text-6xl mb-4">🔒</div>
      <h2 className="text-xl font-bold text-white mb-2">Admin Access Required</h2>
    </div>
  );
  return(
    <div className="space-y-4 animate-fadeIn">
      <div><h2 className="text-xl font-bold text-white">Admin Panel</h2><p className="text-slate-400 text-sm">User and system management</p></div>
      <div className="glass overflow-hidden">
        <table className="w-full">
          <thead className="bg-slate-800/50"><tr>{['User','Role','Status','Actions'].map(h=><th key={h} className="text-left p-3 text-xs font-semibold text-slate-400 uppercase">{h}</th>)}</tr></thead>
          <tbody className="divide-y divide-slate-700/50">

              <tr key={role.id} className="hover:bg-slate-800/30">

                <td className="p-3 text-sm text-slate-300">{role.name}</td>
                <td className="p-3"><span className="px-2 py-1 bg-emerald-500/20 text-emerald-400 rounded text-xs">Active</span></td>
                <td className="p-3"><button className="text-cyan-400 text-sm hover:text-cyan-300">Edit</button></td>
              </tr>

function ModuleAudit(){

      <div className="text-6xl mb-4">🔒</div>

    <div className="space-y-4 animate-fadeIn">

    {name:'Supabase Connection',status:connected?'OK':'Demo Mode',ok:connected},

    {name:'Authentication',status:'OK',ok:true},
    {name:'RBAC Engine',status:'Active',ok:true},
    {name:'AI Agents',status:'8/8 Online',ok:true}
  ];
  return(
    <div className="space-y-4 animate-fadeIn">
      <div><h2 className="text-xl font-bold text-white">System Health</h2><p className="text-slate-400 text-sm">Infrastructure status</p></div>
      <div className="glass p-4">
        <div className="space-y-3">
          {checks.map((check,i)=>(
            <div key={i} className="flex items-center justify-between p-3 bg-slate-800 rounded-lg">
              <span className="text-sm text-white">{check.name}</span>

      </div>
      <div className="glass p-4">
        <h3 className="font-semibold text-white mb-3">Configuration</h3>
        <div className="space-y-2 text-sm">
          <div className="flex justify-between"><span className="text-slate-400">Supabase URL:</span><span className="text-cyan-400 font-mono text-xs">{CONFIG.SUPABASE_URL.replace('https://','')}</span></div>
          <div className="flex justify-between"><span className="text-slate-400">API Backend:</span><span className="text-cyan-400 font-mono text-xs">{CONFIG.API_URL.replace('https://','')}</span></div>

// ============================================================
// SHARED COMPONENTS
// ============================================================
function StatCard({label,value,color}){
  return(
    <div className="glass p-4 hover-lift">
      <p className="text-slate-400 text-xs mb-1">{label}</p>
      <p className={`text-2xl font-bold text-${color}-400`}>{value}</p>
    </div>
  );
}

function FilterBtn({children,active,onClick}){
  return<button onClick={onClick} className={`px-4 py-2 rounded-lg text-sm font-medium transition ${active?'bg-cyan-500 text-white':'bg-slate-800 text-slate-400 hover:text-white'}`}>{children}</button>;
}

function OppCard({opp}){
  return(
    <div className="glass p-4 hover-lift cursor-pointer">
      <div className="flex justify-between items-start mb-3">
        <span className={`px-2 py-1 rounded text-xs font-medium ${opp.priority==='P-0'?'bg-red-500/20 text-red-400':opp.priority==='P-1'?'bg-amber-500/20 text-amber-400':'bg-slate-600 text-slate-300'}`}>{opp.priority}</span>
        <span className="text-emerald-400 font-semibold">{fmt(opp.ceiling)}</span>
      </div>
      <h4 className="font-semibold text-white mb-1">{opp.nickname}</h4>
      <p className="text-xs text-slate-400 mb-3 line-clamp-2">{opp.title}</p>
      <div className="flex justify-between items-center text-xs">
        <span className="text-slate-500">{opp.agency}</span>
        <span className="px-2 py-1 rounded bg-slate-700 text-slate-300">{opp.phase}</span>
      </div>
      <div className="mt-3"><ProgressBar value={opp.pWin}/></div>
    </div>
  );
}

function ProgressBar({value}){
  return(
    <div className="flex items-center gap-2">
      <div className="flex-1 h-1.5 bg-slate-700 rounded-full overflow-hidden">
        <div className="h-full bg-gradient-to-r from-cyan-500 to-emerald-500" style={{width:`${value}%`}}/>
      </div>
      <span className="text-xs text-slate-400">{value}%</span>
    </div>
  );
}

function StatusBadge({status}){
  const colors={'COMPLIANT':'bg-emerald-500/20 text-emerald-400','PARTIAL':'bg-amber-500/20 text-amber-400','HIGH RISK':'bg-red-500/20 text-red-400'};
  return<span className={`px-2 py-1 rounded text-xs ${colors[status]||'bg-slate-700 text-slate-300'}`}>{status}</span>;
}

function AIChatPanel({agent,onClose,setAgent}){
  const[messages,setMessages]=useState([]);
  const[input,setInput]=useState('');
  const send=()=>{
    if(!input.trim())return;
    setMessages([...messages,{role:'user',content:input},{role:'assistant',content:`[${agent.name}]: I'm analyzing your request about "${input.substring(0,50)}...". This is a demo response. In production, this connects to the AI backend.`}]);
    setInput('');
  };
  return(
    <div className="w-96 bg-slate-900 border-l border-slate-800 flex flex-col">
      <div className="p-4 border-b border-slate-800 flex justify-between items-center">
        <div className="flex items-center gap-2">
          <span className="text-2xl">{agent.icon}</span>
          <span className="font-semibold text-white">{agent.name}</span>
        </div>
        <button onClick={onClose} className="text-slate-400 hover:text-white">✕</button>
      </div>
      <div className="p-2 border-b border-slate-800 flex gap-1 overflow-x-auto">
        {AI_AGENTS.filter(a=>!a.restricted).map(a=>(
          <button key={a.id} onClick={()=>setAgent(a)} className={`px-2 py-1 rounded text-xs whitespace-nowrap ${agent.id===a.id?'bg-cyan-500/20 text-cyan-400':'bg-slate-800 text-slate-400'}`}>{a.icon}</button>
        ))}
      </div>
      <div className="flex-1 overflow-y-auto p-4 space-y-3">
        {messages.map((m,i)=>(
          <div key={i} className={`p-3 rounded-lg text-sm ${m.role==='user'?'bg-cyan-500/20 text-cyan-100 ml-8':'bg-slate-800 text-slate-300 mr-8'}`}>{m.content}</div>
        ))}
        {messages.length===0&&<p className="text-slate-500 text-sm text-center mt-8">Ask {agent.name} anything about proposal development...</p>}
      </div>
      <div className="p-4 border-t border-slate-800">
        <div className="flex gap-2">
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="Type your message..." className="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm"/>
          <button onClick={send} className="px-4 py-2 bg-cyan-500 text-white rounded-lg text-sm font-medium hover:bg-cyan-600">Send</button>
        </div>
      </div>
    </div>
  );
}

// RENDER

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
