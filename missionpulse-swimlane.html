<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MissionPulse | Swimlane Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
        .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.1); }
        .glass-hover:hover { background: rgba(0, 229, 250, 0.08); border-color: rgba(0, 229, 250, 0.3); }
        .cyan-glow { box-shadow: 0 0 30px rgba(0, 229, 250, 0.15); }
        .text-cyan { color: #00E5FA; }
        .bg-cyan { background-color: #00E5FA; }
        .lane { min-width: 280px; max-width: 320px; }
        .card-drag { opacity: 0.5; }
        .lane-drop-active { border-color: #00E5FA !important; background: rgba(0, 229, 250, 0.1) !important; }
    </style>
</head>
<body class="text-gray-100">
    <div id="root"></div>
    <script src="missionpulse-crud.js"></script>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const PHASES = [
            { key: 'gate_1', name: 'Gate 1', color: '#94a3b8' },
            { key: 'blue_team', name: 'Blue Team', color: '#60a5fa' },
            { key: 'pink_team', name: 'Pink Team', color: '#f472b6' },
            { key: 'red_team', name: 'Red Team', color: '#ef4444' },
            { key: 'gold_team', name: 'Gold Team', color: '#fbbf24' },
            { key: 'submitted', name: 'Submitted', color: '#22c55e' }
        ];

        function SwimLane() {
            const [grouped, setGrouped] = useState({});
            const [loading, setLoading] = useState(true);
            const [isDemo, setIsDemo] = useState(false);
            const [draggedItem, setDraggedItem] = useState(null);
            const [stats, setStats] = useState(null);

            useEffect(() => { loadData(); }, []);

            const loadData = async () => {
                setLoading(true);
                const [groupedResult, statsResult] = await Promise.all([
                    MissionPulse.getOpportunitiesByPhase(),
                    MissionPulse.getPipelineStats()
                ]);
                setGrouped(groupedResult.data || {});
                setStats(statsResult.data);
                setIsDemo(groupedResult.isDemo);
                setLoading(false);
            };

            const handleDragStart = (e, opp) => {
                setDraggedItem(opp);
                e.dataTransfer.effectAllowed = 'move';
                e.target.classList.add('card-drag');
            };

            const handleDragEnd = (e) => {
                e.target.classList.remove('card-drag');
                setDraggedItem(null);
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            };

            const handleDragEnter = (e) => {
                e.currentTarget.classList.add('lane-drop-active');
            };

            const handleDragLeave = (e) => {
                e.currentTarget.classList.remove('lane-drop-active');
            };

            const handleDrop = async (e, targetPhase) => {
                e.preventDefault();
                e.currentTarget.classList.remove('lane-drop-active');
                
                if (!draggedItem || (draggedItem.phase || draggedItem.shipleyPhase) === targetPhase) return;

                // Optimistic update
                const oldPhase = draggedItem.phase || draggedItem.shipleyPhase || 'gate_1';
                setGrouped(prev => {
                    const updated = { ...prev };
                    updated[oldPhase] = { ...updated[oldPhase], items: updated[oldPhase].items.filter(i => i.id !== draggedItem.id) };
                    updated[targetPhase] = { ...updated[targetPhase], items: [...updated[targetPhase].items, { ...draggedItem, phase: targetPhase }] };
                    return updated;
                });

                // Persist to database
                await MissionPulse.opportunities.update(draggedItem.id, { phase: targetPhase });
                setDraggedItem(null);
            };

            const getDaysRemaining = (dueDate) => {
                if (!dueDate) return null;
                return Math.ceil((new Date(dueDate) - new Date()) / (1000 * 60 * 60 * 24));
            };

            if (loading) return <div className="flex items-center justify-center min-h-screen"><div className="w-12 h-12 border-4 border-cyan border-t-transparent rounded-full animate-spin"></div></div>;

            return (
                <div className="min-h-screen p-6">
                    {/* Header */}
                    <header className="glass rounded-xl p-6 mb-6 cyan-glow">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <a href="missionpulse-nav-hub.html" className="text-gray-400 hover:text-cyan">← Hub</a>
                                <div>
                                    <h1 className="text-2xl font-bold text-white">Swimlane Board</h1>
                                    <p className="text-gray-400 text-sm">Drag opportunities between Shipley phases</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                {isDemo && <span className="text-xs text-yellow-400 bg-yellow-400/10 px-2 py-1 rounded">Demo Mode</span>}
                                <button onClick={loadData} className="text-cyan hover:text-white">↻ Refresh</button>
                            </div>
                        </div>
                    </header>

                    {/* Stats Row */}
                    {stats && (
                        <div className="glass rounded-xl p-4 mb-6">
                            <div className="flex justify-between items-center">
                                <div className="flex gap-8">
                                    <div>
                                        <span className="text-gray-400 text-sm">Total Pipeline:</span>
                                        <span className="text-cyan font-bold ml-2">{MissionPulse.formatCurrency(stats.totalValue)}</span>
                                    </div>
                                    <div>
                                        <span className="text-gray-400 text-sm">Opportunities:</span>
                                        <span className="text-white font-bold ml-2">{stats.totalCount}</span>
                                    </div>
                                    <div>
                                        <span className="text-gray-400 text-sm">Avg pWin:</span>
                                        <span className="text-green-400 font-bold ml-2">{stats.avgPwin}%</span>
                                    </div>
                                </div>
                                <a href="missionpulse-pipeline.html" className="text-cyan text-sm hover:underline">View List →</a>
                            </div>
                        </div>
                    )}

                    {/* Swimlane Board */}
                    <div className="flex gap-4 overflow-x-auto pb-4">
                        {PHASES.map(phase => {
                            const items = grouped[phase.key]?.items || [];
                            const laneValue = items.reduce((sum, o) => sum + (o.estimatedValue || o.contractValue || 0), 0);
                            
                            return (
                                <div 
                                    key={phase.key}
                                    className="lane glass rounded-xl p-4 flex-shrink-0"
                                    onDragOver={handleDragOver}
                                    onDragEnter={handleDragEnter}
                                    onDragLeave={handleDragLeave}
                                    onDrop={(e) => handleDrop(e, phase.key)}
                                >
                                    {/* Lane Header */}
                                    <div className="flex items-center justify-between mb-4">
                                        <div className="flex items-center gap-2">
                                            <span className="w-3 h-3 rounded-full" style={{ backgroundColor: phase.color }}></span>
                                            <h3 className="font-semibold text-white">{phase.name}</h3>
                                            <span className="text-xs bg-white/10 px-2 py-0.5 rounded-full text-gray-400">{items.length}</span>
                                        </div>
                                    </div>
                                    <p className="text-xs text-gray-500 mb-3">{MissionPulse.formatCurrency(laneValue)}</p>

                                    {/* Cards */}
                                    <div className="space-y-3 min-h-[200px]">
                                        {items.map(opp => {
                                            const daysLeft = getDaysRemaining(opp.dueDate);
                                            return (
                                                <div
                                                    key={opp.id}
                                                    draggable
                                                    onDragStart={(e) => handleDragStart(e, opp)}
                                                    onDragEnd={handleDragEnd}
                                                    className="glass glass-hover rounded-lg p-3 cursor-grab active:cursor-grabbing"
                                                >
                                                    <p className="font-medium text-white text-sm mb-1 line-clamp-2">{opp.title || opp.name}</p>
                                                    <p className="text-xs text-gray-500 mb-2">{opp.agency}</p>
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-cyan text-xs font-medium">{MissionPulse.formatCurrency(opp.estimatedValue || opp.contractValue)}</span>
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-xs text-gray-400">{opp.pwin || opp.winProbability || 0}%</span>
                                                            {daysLeft !== null && (
                                                                <span className={`text-xs ${daysLeft <= 7 ? 'text-red-400' : daysLeft <= 30 ? 'text-yellow-400' : 'text-gray-400'}`}>
                                                                    {daysLeft <= 0 ? 'Due!' : `${daysLeft}d`}
                                                                </span>
                                                            )}
                                                        </div>
                                                    </div>
                                                    {opp.priority === 'critical' && (
                                                        <span className="inline-block mt-2 text-xs bg-red-500/20 text-red-400 px-2 py-0.5 rounded">CRITICAL</span>
                                                    )}
                                                </div>
                                            );
                                        })}
                                        {items.length === 0 && (
                                            <div className="text-center text-gray-600 text-sm py-8">
                                                Drop opportunities here
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* Footer */}
                    <footer className="mt-8 text-center text-gray-500 text-sm">
                        <p>Drag cards to move between phases • Changes save automatically</p>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<SwimLane />, document.getElementById('root'));
    </script>
</body>
</html>
