<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Log | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:#00050F;color:#e2e8f0;min-height:100vh}.glass{background:rgba(15,23,42,0.85);backdrop-filter:blur(16px);border:1px solid rgba(0,229,250,0.1);border-radius:12px}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const SUPABASE_URL='https://qdrtpnpnhkxvfmvfziop.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
const supabase=window.supabase?.createClient(SUPABASE_URL,SUPABASE_ANON);

const DEMO_LOGS=[
  {id:1,action:'LOGIN',module:'Auth',user_email:'admin@mmt.com',user_role:'Admin',ip_address:'192.168.1.100',created_at:'2025-01-30T14:30:00Z'},
  {id:2,action:'VIEW_PRICING',module:'Pricing',user_email:'finance@mmt.com',user_role:'FIN',ip_address:'192.168.1.101',created_at:'2025-01-30T14:25:00Z'},
  {id:3,action:'EXPORT_DATA',module:'Reports',user_email:'manager@mmt.com',user_role:'CAP',ip_address:'192.168.1.102',created_at:'2025-01-30T14:20:00Z'},
  {id:4,action:'EDIT_OPPORTUNITY',module:'Pipeline',user_email:'pm@mmt.com',user_role:'PM',ip_address:'192.168.1.103',created_at:'2025-01-30T14:15:00Z'},
  {id:5,action:'AI_APPROVAL',module:'HITL',user_email:'qa@mmt.com',user_role:'QA',ip_address:'192.168.1.104',created_at:'2025-01-30T14:10:00Z'},
  {id:6,action:'ACCESS_BLACKHAT',module:'BlackHat',user_email:'ceo@mmt.com',user_role:'CEO',ip_address:'192.168.1.105',created_at:'2025-01-30T14:05:00Z'},
  {id:7,action:'PARTNER_ACCESS_GRANT',module:'Frenemy',user_email:'admin@mmt.com',user_role:'Admin',ip_address:'192.168.1.100',created_at:'2025-01-30T14:00:00Z'}
];

function AuditLog(){
  const[connected,setConnected]=useState(false);
  const[logs,setLogs]=useState(DEMO_LOGS);
  const[filter,setFilter]=useState({module:'all',action:'all'});
  const[search,setSearch]=useState('');

  useEffect(()=>{
    const load=async()=>{
      try{
        const{data,error}=await supabase.from('audit_logs').select('*').order('created_at',{ascending:false}).limit(100);
        if(!error&&data?.length)setLogs(data);
        setConnected(!error);
      }catch{setConnected(false)}
    };
    load();
  },[]);

  const modules=[...new Set(logs.map(l=>l.module))];
  const actions=[...new Set(logs.map(l=>l.action))];
  const filtered=logs.filter(l=>{
    if(filter.module!=='all'&&l.module!==filter.module)return false;
    if(filter.action!=='all'&&l.action!==filter.action)return false;
    if(search&&!l.user_email.toLowerCase().includes(search.toLowerCase())&&!l.action.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });

  const actionColor={LOGIN:'bg-emerald-500/20 text-emerald-400',LOGOUT:'bg-slate-500/20 text-slate-400',VIEW_PRICING:'bg-amber-500/20 text-amber-400',EXPORT_DATA:'bg-purple-500/20 text-purple-400',EDIT_OPPORTUNITY:'bg-cyan-500/20 text-cyan-400',AI_APPROVAL:'bg-blue-500/20 text-blue-400',ACCESS_BLACKHAT:'bg-red-500/20 text-red-400',PARTNER_ACCESS_GRANT:'bg-orange-500/20 text-orange-400'};

  const formatTime=(ts)=>{
    const d=new Date(ts);
    return d.toLocaleString();
  };

  const exportLogs=()=>{
    const csv=['Timestamp,Action,Module,User,Role,IP'].concat(
      filtered.map(l=>`${l.created_at},${l.action},${l.module},${l.user_email},${l.user_role},${l.ip_address}`)
    ).join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='audit-log.csv';a.click();
  };

  return(
    <div className="min-h-screen p-6">
      <div className="bg-amber-500/10 border border-amber-500/30 rounded-lg p-3 mb-6 flex items-center gap-3">
        <span className="text-xl">🛡️</span>
        <div>
          <div className="font-semibold text-amber-400">CMMC Compliance Audit Trail</div>
          <div className="text-xs text-slate-400">All system actions are logged for security compliance (NIST 800-171)</div>
        </div>
      </div>

      <div className="flex justify-between items-start mb-6">
        <div>
          <h1 className="text-2xl font-bold text-white flex items-center gap-3">📋 Audit Log<span className={`text-xs px-2 py-1 rounded ${connected?'bg-emerald-500/20 text-emerald-400':'bg-red-500/20 text-red-400'}`}>{connected?'● Live':'○ Demo'}</span></h1>
          <p className="text-slate-400 text-sm mt-1">System activity and access tracking</p>
        </div>
        <button onClick={exportLogs} className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-lg">📥 Export CSV</button>
      </div>

      <div className="grid grid-cols-4 gap-4 mb-6">
        <div className="glass p-4"><div className="text-slate-400 text-xs">Total Events</div><div className="text-2xl font-bold text-white">{logs.length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Today</div><div className="text-2xl font-bold text-cyan-400">{logs.filter(l=>new Date(l.created_at).toDateString()===new Date().toDateString()).length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Unique Users</div><div className="text-2xl font-bold text-emerald-400">{new Set(logs.map(l=>l.user_email)).size}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Sensitive Access</div><div className="text-2xl font-bold text-red-400">{logs.filter(l=>l.action.includes('BLACKHAT')||l.action.includes('PRICING')).length}</div></div>
      </div>

      <div className="flex gap-3 mb-4">
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search user or action..." className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white w-64"/>
        <select value={filter.module} onChange={e=>setFilter({...filter,module:e.target.value})} className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white">
          <option value="all">All Modules</option>
          {modules.map(m=><option key={m} value={m}>{m}</option>)}
        </select>
        <select value={filter.action} onChange={e=>setFilter({...filter,action:e.target.value})} className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white">
          <option value="all">All Actions</option>
          {actions.map(a=><option key={a} value={a}>{a}</option>)}
        </select>
      </div>

      <div className="glass overflow-hidden">
        <table className="w-full">
          <thead className="bg-slate-800/50">
            <tr>{['Timestamp','Action','Module','User','Role','IP Address'].map(h=><th key={h} className="text-left p-3 text-xs font-semibold text-slate-400 uppercase">{h}</th>)}</tr>
          </thead>
          <tbody className="divide-y divide-slate-700/30">
            {filtered.map(log=>(
              <tr key={log.id} className="hover:bg-slate-800/30">
                <td className="p-3 text-slate-400 text-sm font-mono">{formatTime(log.created_at)}</td>
                <td className="p-3"><span className={`px-2 py-0.5 rounded text-xs ${actionColor[log.action]||'bg-slate-500/20 text-slate-400'}`}>{log.action}</span></td>
                <td className="p-3 text-slate-300">{log.module}</td>
                <td className="p-3 text-white">{log.user_email}</td>
                <td className="p-3"><span className="px-2 py-0.5 rounded bg-slate-700 text-slate-300 text-xs">{log.user_role}</span></td>
                <td className="p-3 text-slate-500 font-mono text-sm">{log.ip_address}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="text-center text-xs text-slate-500 mt-8">AI GENERATED - REQUIRES HUMAN REVIEW | © 2026 Mission Meets Tech</div>
    </div>
  );
}
ReactDOM.render(<AuditLog/>,document.getElementById('root'));
</script>
</body>
</html>
