<!DOCTYPE html>

  <meta charset="UTF-8">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>

    .pulse-icon { animation: pulse-cyan 2s infinite; }

</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const ALLOWED_ROLES = ['CEO', 'COO', 'Admin'];

    const DEMO_LOGS = [
      { id: 1, timestamp: '2026-01-30T14:32:00Z', user_email: 'mary@missionmeetstech.com', user_role: 'CEO', action: 'LOGIN', module: 'Auth', details: 'Successful login from 192.168.1.100', severity: 'info' },
      { id: 2, timestamp: '2026-01-30T14:35:00Z', user_email: 'mary@missionmeetstech.com', user_role: 'CEO', action: 'VIEW', module: 'Black Hat', details: 'Accessed competitor intelligence for EHR-Mod', severity: 'audit' },
      { id: 3, timestamp: '2026-01-30T14:38:00Z', user_email: 'mary@missionmeetstech.com', user_role: 'CEO', action: 'EXPORT', module: 'Pricing', details: 'Exported BOE spreadsheet (CUI)', severity: 'warning' },
      { id: 4, timestamp: '2026-01-30T13:22:00Z', user_email: 'john@missionmeetstech.com', user_role: 'PM', action: 'UPDATE', module: 'Pipeline', details: 'Updated EHR-Mod phase to Gate 3', severity: 'info' },
      { id: 5, timestamp: '2026-01-30T12:45:00Z', user_email: 'sarah@missionmeetstech.com', user_role: 'FIN', action: 'VIEW', module: 'Pricing', details: 'Viewed labor rates for EHR-Mod', severity: 'audit' },
      { id: 6, timestamp: '2026-01-30T11:30:00Z', user_email: 'mike@missionmeetstech.com', user_role: 'SA', action: 'CREATE', module: 'RFP Shredder', details: 'Uploaded and analyzed RFP document', severity: 'info' },
      { id: 7, timestamp: '2026-01-30T10:15:00Z', user_email: 'mary@missionmeetstech.com', user_role: 'CEO', action: 'APPROVE', module: 'HITL', details: 'Approved AI-generated win theme', severity: 'info' },
      { id: 8, timestamp: '2026-01-30T09:45:00Z', user_email: 'admin@missionmeetstech.com', user_role: 'Admin', action: 'SETTINGS', module: 'Admin', details: 'Modified RBAC permissions for Partner role', severity: 'warning' },
      { id: 9, timestamp: '2026-01-29T16:20:00Z', user_email: 'mary@missionmeetstech.com', user_role: 'CEO', action: 'DELETE', module: 'Pipeline', details: 'Archived opportunity: Legacy-Cleanup', severity: 'warning' },
      { id: 10, timestamp: '2026-01-29T15:00:00Z', user_email: 'unknown', user_role: 'Unknown', action: 'LOGIN_FAILED', module: 'Auth', details: 'Failed login attempt from 203.0.113.50', severity: 'error' },
      { id: 11, timestamp: '2026-01-29T14:30:00Z', user_email: 'john@missionmeetstech.com', user_role: 'PM', action: 'VIEW', module: 'War Room', details: 'Accessed EHR-Mod war room', severity: 'info' },
      { id: 12, timestamp: '2026-01-29T13:15:00Z', user_email: 'sarah@missionmeetstech.com', user_role: 'FIN', action: 'UPDATE', module: 'Pricing', details: 'Modified wrap rates: G&A 12% → 13%', severity: 'audit' }
    ];

    const ACTION_ICONS = {
      LOGIN: '🔐', LOGIN_FAILED: '🚫', LOGOUT: '👋',
      VIEW: '👁️', CREATE: '➕', UPDATE: '✏️', DELETE: '🗑️',
      EXPORT: '📥', IMPORT: '📤', APPROVE: '✅', REJECT: '❌',
      SETTINGS: '⚙️'
    };

    const SEVERITY_COLORS = {
      info: 'bg-slate-500/20 text-slate-400 border-slate-500/30',
      audit: 'bg-blue-500/20 text-blue-400 border-blue-500/30',
      warning: 'bg-amber-500/20 text-amber-400 border-amber-500/30',
      error: 'bg-red-500/20 text-red-400 border-red-500/30'
    };

    // Sidebar
    function Sidebar() {
      const navItems = [
        { icon: '🏠', label: 'Dashboard', path: 'index.html' },
        { icon: '📊', label: 'Pipeline', path: 'missionpulse-pipeline-v2.html' },
        { icon: '🎯', label: 'War Room', path: 'missionpulse-warroom-v2.html' },
        { icon: '⚙️', label: 'Settings', path: 'missionpulse-settings-v2.html' },
        { icon: '👤', label: 'Profile', path: 'missionpulse-profile.html' },
        { icon: '📝', label: 'Audit Log', path: 'missionpulse-audit-v2.html', active: true }
      ];

      return (
        <div className="w-64 bg-slate-900/50 border-r border-slate-700 min-h-screen p-4 hidden lg:block">
          <div className="flex items-center gap-3 mb-8">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center pulse-icon">
              <span className="text-xl">🛡️</span>
            </div>
            <div>
              <div className="font-bold text-cyan-400">MissionPulse</div>
              <div className="text-xs text-slate-400">Audit Log</div>
            </div>
          </div>
          
          <nav className="space-y-1">
            {navItems.map((item, i) => (
              <a 
                key={i}
                href={item.path}
                className={`flex items-center gap-3 px-3 py-2 rounded-lg transition-all ${
                  item.active 
                    ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' 
                    : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                }`}
              >
                <span>{item.icon}</span>
                <span className="text-sm">{item.label}</span>
              </a>
            ))}
          </nav>
        </div>
      );
    }

    // Access Denied
    function AccessDenied() {
      return (
        <div className="min-h-screen flex items-center justify-center p-6">
          <div className="text-center max-w-md">
            <div className="w-20 h-20 rounded-2xl bg-amber-500/20 border border-amber-500/30 flex items-center justify-center mx-auto mb-6">
              <span className="text-4xl">🔒</span>
            </div>
            <h1 className="text-2xl font-bold mb-2">Access Restricted</h1>
            <p className="text-slate-400 mb-6">
              Audit logs are restricted to CEO, COO, and Admin roles for compliance and security purposes.
            </p>
            <a 
              href="index.html"
              className="inline-block px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg font-medium transition-colors"
            >
              ← Return to Dashboard
            </a>
          </div>
        </div>
      );
    }

    // Log Row
    function LogRow({ log }) {
      const severity = SEVERITY_COLORS[log.severity] || SEVERITY_COLORS.info;
      const icon = ACTION_ICONS[log.action] || '📋';
      const time = new Date(log.timestamp);
      
      return (
        <tr className="border-b border-slate-700/50 hover:bg-slate-800/30">
          <td className="p-3">
            <div className="text-sm">{time.toLocaleDateString()}</div>
            <div className="text-xs text-slate-500">{time.toLocaleTimeString()}</div>
          </td>
          <td className="p-3">
            <div className="flex items-center gap-2">
              <span>{icon}</span>
              <span className={`px-2 py-0.5 rounded text-xs border ${severity}`}>
                {log.action}
              </span>
            </div>
          </td>
          <td className="p-3">
            <div className="text-sm">{log.user_email}</div>
            <div className="text-xs text-slate-500">{log.user_role}</div>
          </td>
          <td className="p-3">
            <span className="px-2 py-0.5 bg-slate-700 rounded text-xs">{log.module}</span>
          </td>
          <td className="p-3 text-sm text-slate-400 max-w-xs truncate">{log.details}</td>
          <td className="p-3">
            <span className={`px-2 py-0.5 rounded text-xs border ${severity}`}>
              {log.severity}
            </span>
          </td>
        </tr>
      );
    }

    function App() {
      const [user, setUser] = React.useState(null);
      const [hasAccess, setHasAccess] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [logs, setLogs] = React.useState(DEMO_LOGS);
      const [filterAction, setFilterAction] = React.useState('all');
      const [filterSeverity, setFilterSeverity] = React.useState('all');
      const [filterModule, setFilterModule] = React.useState('all');
      const [searchTerm, setSearchTerm] = React.useState('');
      const [connected, setConnected] = React.useState(false);

      React.useEffect(() => {
        checkAccess();
      }, []);

      const checkAccess = async () => {
        const demoSession = localStorage.getItem('missionpulse_demo');
        if (demoSession) {
          const demo = JSON.parse(demoSession);
          if (demo.expires > Date.now()) {
            setUser(demo.user);
            setHasAccess(ALLOWED_ROLES.includes(demo.user.role));
            setLoading(false);
            return;
          }
        }

        try {
          const { data: { session } } = await supabase.auth.getSession();
          if (session) {
            const { data: profile } = await supabase
              .from('profiles')
              .select('role')
              .eq('id', session.user.id)
              .single();
            
            const role = profile?.role || 'Partner';
            setUser({ email: session.user.email, role });
            setHasAccess(ALLOWED_ROLES.includes(role));
          } else {
            setUser({ email: 'demo@missionpulse.io', role: 'CEO' });
            setHasAccess(true);
          }
        } catch (e) {
          setUser({ email: 'demo@missionpulse.io', role: 'CEO' });
          setHasAccess(true);
        }
        setLoading(false);
      };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-12 h-12 rounded-xl bg-cyan-500/20 flex items-center justify-center mx-auto mb-4 pulse-icon">
                <span className="text-2xl">📝</span>
              </div>
              <p className="text-slate-400">Loading audit logs...</p>
            </div>
          </div>
        );
      }

      if (!hasAccess) {
        return <AccessDenied />;
      }

      // Filter logs
      let filtered = logs;
      if (filterAction !== 'all') filtered = filtered.filter(l => l.action === filterAction);
      if (filterSeverity !== 'all') filtered = filtered.filter(l => l.severity === filterSeverity);
      if (filterModule !== 'all') filtered = filtered.filter(l => l.module === filterModule);
      if (searchTerm) {
        const term = searchTerm.toLowerCase();
        filtered = filtered.filter(l => 
          l.user_email?.toLowerCase().includes(term) ||
          l.details?.toLowerCase().includes(term) ||
          l.module?.toLowerCase().includes(term)
        );
      }

      const actions = [...new Set(logs.map(l => l.action))];
      const modules = [...new Set(logs.map(l => l.module))];
      const severities = ['info', 'audit', 'warning', 'error'];

      const stats = {
        total: logs.length,
        today: logs.filter(l => new Date(l.timestamp).toDateString() === new Date().toDateString()).length,
        errors: logs.filter(l => l.severity === 'error').length,
        warnings: logs.filter(l => l.severity === 'warning').length
      };

      return (
        <div className="flex min-h-screen">
          <Sidebar />
          
          <div className="flex-1 p-4 lg:p-6">
            {/* RBAC Banner */}
            <div className="mb-4 p-3 bg-cyan-500/10 border border-cyan-500/30 rounded-lg flex items-center gap-3">
              <span className="text-cyan-400">🔒</span>
              <span className="text-sm">
                <span className="font-medium text-cyan-400">COMPLIANCE:</span>
                <span className="text-slate-300"> Audit logs for CEO, COO, and Admin only • NIST 800-53 AU-3 Compliant</span>
              </span>
            </div>

            {/* Header */}
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
              <div>
                <h1 className="text-2xl font-bold">Audit Log</h1>
                <p className="text-slate-400 text-sm">System activity and compliance tracking</p>
              </div>
              
              <div className="flex gap-3">
                <button className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
                  📥 Export CSV
                </button>
                <button className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg text-sm font-medium">
                  🔄 Refresh
                </button>
              </div>
            </div>

            {/* Stats */}
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <div className="text-2xl font-bold">{stats.total}</div>
                <div className="text-sm text-slate-400">Total Events</div>
              </div>
              <div className="bg-slate-800/50 border border-cyan-500/30 rounded-xl p-4">
                <div className="text-2xl font-bold text-cyan-400">{stats.today}</div>
                <div className="text-sm text-slate-400">Today</div>
              </div>
              <div className="bg-slate-800/50 border border-amber-500/30 rounded-xl p-4">
                <div className="text-2xl font-bold text-amber-400">{stats.warnings}</div>
                <div className="text-sm text-slate-400">Warnings</div>
              </div>
              <div className="bg-slate-800/50 border border-red-500/30 rounded-xl p-4">
                <div className="text-2xl font-bold text-red-400">{stats.errors}</div>
                <div className="text-sm text-slate-400">Errors</div>
              </div>
            </div>

            {/* Filters */}
            <div className="flex flex-wrap gap-3 mb-4">
              <input
                type="text"
                value={searchTerm}
                onChange={(e) => setSearchTerm(e.target.value)}
                placeholder="Search logs..."
                className="flex-1 min-w-[200px] bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
              />
              <select
                value={filterAction}
                onChange={(e) => setFilterAction(e.target.value)}
                className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-500"
              >
                <option value="all">All Actions</option>
                {actions.map(a => <option key={a} value={a}>{a}</option>)}
              </select>
              <select
                value={filterModule}
                onChange={(e) => setFilterModule(e.target.value)}
                className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-500"
              >
                <option value="all">All Modules</option>
                {modules.map(m => <option key={m} value={m}>{m}</option>)}
              </select>
              <select
                value={filterSeverity}
                onChange={(e) => setFilterSeverity(e.target.value)}
                className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-500"
              >
                <option value="all">All Severities</option>
                {severities.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            </div>

            {/* Log Table */}
            <div className="bg-slate-800/50 border border-slate-700 rounded-xl overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="border-b border-slate-700 bg-slate-800/50">
                      <th className="text-left p-3 text-xs text-slate-400 font-medium">Timestamp</th>
                      <th className="text-left p-3 text-xs text-slate-400 font-medium">Action</th>
                      <th className="text-left p-3 text-xs text-slate-400 font-medium">User</th>
                      <th className="text-left p-3 text-xs text-slate-400 font-medium">Module</th>
                      <th className="text-left p-3 text-xs text-slate-400 font-medium">Details</th>
                      <th className="text-left p-3 text-xs text-slate-400 font-medium">Severity</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.length === 0 ? (
                      <tr>
                        <td colSpan={6} className="p-8 text-center text-slate-500">No logs found</td>
                      </tr>
                    ) : (
                      filtered.map(log => <LogRow key={log.id} log={log} />)
                    )}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Footer */}
            <div className="mt-8 text-center text-xs text-slate-500">
              <div>Mission Meets Tech | MissionPulse Audit Log</div>
              <div className="mt-1">NIST 800-53 AU-3 Compliant • AI GENERATED - REQUIRES HUMAN REVIEW</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
