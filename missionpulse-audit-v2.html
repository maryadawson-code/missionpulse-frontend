<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MissionPulse | Audit Trail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
        .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.1); }
        .text-cyan { color: #00E5FA; }
        .bg-cyan { background-color: #00E5FA; }
        .cyan-glow { box-shadow: 0 0 30px rgba(0, 229, 250, 0.15); }
        .cmmc-badge { background: linear-gradient(135deg, #059669 0%, #047857 100%); }
    </style>
</head>
<body class="text-gray-100">
    <div id="root"></div>
    <script src="missionpulse-crud.js"></script>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function AuditTrail() {
            const [logs, setLogs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isDemo, setIsDemo] = useState(false);
            const [filterAction, setFilterAction] = useState('all');
            const [filterTable, setFilterTable] = useState('all');
            const [filterUser, setFilterUser] = useState('all');
            const [dateRange, setDateRange] = useState('7d');
            const [searchTerm, setSearchTerm] = useState('');

            useEffect(() => { loadData(); }, []);

            const loadData = async () => {
                setLoading(true);
                const { data, isDemo: demo } = await MissionPulse.auditLogs.getAll({ orderBy: 'created_at', ascending: false });
                setLogs(data || []);
                setIsDemo(demo);
                setLoading(false);
            };

            const actions = [...new Set(logs.map(l => l.action).filter(Boolean))];
            const tables = [...new Set(logs.map(l => l.tableName).filter(Boolean))];
            const users = [...new Set(logs.map(l => l.userId).filter(Boolean))];

            const getDateCutoff = () => {
                const now = new Date();
                switch(dateRange) {
                    case '24h': return new Date(now - 24*60*60*1000);
                    case '7d': return new Date(now - 7*24*60*60*1000);
                    case '30d': return new Date(now - 30*24*60*60*1000);
                    case '90d': return new Date(now - 90*24*60*60*1000);
                    default: return new Date(0);
                }
            };

            const filtered = logs.filter(log => {
                const matchAction = filterAction === 'all' || log.action === filterAction;
                const matchTable = filterTable === 'all' || log.tableName === filterTable;
                const matchUser = filterUser === 'all' || log.userId === filterUser;
                const matchDate = new Date(log.createdAt) >= getDateCutoff();
                const matchSearch = !searchTerm || 
                    JSON.stringify(log).toLowerCase().includes(searchTerm.toLowerCase());
                return matchAction && matchTable && matchUser && matchDate && matchSearch;
            });

            const getActionIcon = (action) => {
                switch(action) {
                    case 'INSERT': return '➕';
                    case 'UPDATE': return '✏️';
                    case 'DELETE': return '🗑️';
                    case 'LOGIN': return '🔐';
                    case 'LOGOUT': return '🚪';
                    default: return '📝';
                }
            };

            const getActionColor = (action) => {
                switch(action) {
                    case 'INSERT': return 'text-green-400 bg-green-400/10';
                    case 'UPDATE': return 'text-yellow-400 bg-yellow-400/10';
                    case 'DELETE': return 'text-red-400 bg-red-400/10';
                    case 'LOGIN': return 'text-cyan bg-cyan/10';
                    case 'LOGOUT': return 'text-gray-400 bg-gray-400/10';
                    default: return 'text-gray-400 bg-gray-400/10';
                }
            };

            const formatTimestamp = (ts) => {
                if (!ts) return '-';
                const date = new Date(ts);
                return date.toLocaleString();
            };

            const exportLogs = () => {
                const csv = [
                    ['Timestamp', 'User', 'Action', 'Table', 'Record ID', 'IP Address', 'Changes'].join(','),
                    ...filtered.map(log => [
                        log.createdAt,
                        log.userId,
                        log.action,
                        log.tableName,
                        log.recordId,
                        log.ipAddress,
                        JSON.stringify(log.newValues || {}).replace(/,/g, ';')
                    ].join(','))
                ].join('\n');
                
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `missionpulse-audit-${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
            };

            if (loading) return <div className="flex items-center justify-center min-h-screen"><div className="w-12 h-12 border-4 border-cyan border-t-transparent rounded-full animate-spin"></div></div>;

            return (
                <div className="min-h-screen p-6">
                    {/* Header */}
                    <header className="glass rounded-xl p-6 mb-6 cyan-glow">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <a href="missionpulse-nav-hub.html" className="text-gray-400 hover:text-cyan">← Hub</a>
                                <div>
                                    <div className="flex items-center gap-3">
                                        <h1 className="text-2xl font-bold text-white">Audit Trail</h1>
                                        <span className="cmmc-badge text-white text-xs px-2 py-1 rounded font-medium">CMMC 2.0</span>
                                    </div>
                                    <p className="text-gray-400 text-sm">Activity logging for compliance (AU-3, AU-6)</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                {isDemo && <span className="text-xs text-yellow-400 bg-yellow-400/10 px-2 py-1 rounded">Demo Mode</span>}
                                <button onClick={exportLogs} className="bg-white/10 px-4 py-2 rounded-lg hover:bg-white/20">
                                    📥 Export CSV
                                </button>
                                <button onClick={loadData} className="text-cyan hover:text-white">↻ Refresh</button>
                            </div>
                        </div>
                    </header>

                    {/* CMMC Compliance Banner */}
                    <div className="glass rounded-xl p-4 mb-6 border-l-4 border-green-500">
                        <div className="flex items-start gap-3">
                            <span className="text-2xl">🛡️</span>
                            <div>
                                <p className="font-medium text-white">NIST 800-171 Audit Controls Active</p>
                                <p className="text-sm text-gray-400 mt-1">
                                    AU-3: Content of Audit Records • AU-6: Audit Review, Analysis, and Reporting • AU-12: Audit Generation
                                </p>
                            </div>
                        </div>
                    </div>

                    {/* Stats */}
                    <div className="grid grid-cols-5 gap-4 mb-6">
                        <div className="glass rounded-lg p-4 text-center">
                            <p className="text-2xl font-bold text-cyan">{filtered.length}</p>
                            <p className="text-gray-400 text-sm">Total Events</p>
                        </div>
                        <div className="glass rounded-lg p-4 text-center">
                            <p className="text-2xl font-bold text-green-400">{filtered.filter(l => l.action === 'INSERT').length}</p>
                            <p className="text-gray-400 text-sm">Creates</p>
                        </div>
                        <div className="glass rounded-lg p-4 text-center">
                            <p className="text-2xl font-bold text-yellow-400">{filtered.filter(l => l.action === 'UPDATE').length}</p>
                            <p className="text-gray-400 text-sm">Updates</p>
                        </div>
                        <div className="glass rounded-lg p-4 text-center">
                            <p className="text-2xl font-bold text-red-400">{filtered.filter(l => l.action === 'DELETE').length}</p>
                            <p className="text-gray-400 text-sm">Deletes</p>
                        </div>
                        <div className="glass rounded-lg p-4 text-center">
                            <p className="text-2xl font-bold text-purple-400">{new Set(filtered.map(l => l.userId)).size}</p>
                            <p className="text-gray-400 text-sm">Active Users</p>
                        </div>
                    </div>

                    {/* Filters */}
                    <div className="glass rounded-xl p-4 mb-6">
                        <div className="flex flex-wrap gap-4">
                            <input type="text" placeholder="Search logs..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
                                className="flex-1 min-w-[200px] bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan" />
                            <select value={dateRange} onChange={e => setDateRange(e.target.value)}
                                className="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white">
                                <option value="24h">Last 24 Hours</option>
                                <option value="7d">Last 7 Days</option>
                                <option value="30d">Last 30 Days</option>
                                <option value="90d">Last 90 Days</option>
                                <option value="all">All Time</option>
                            </select>
                            <select value={filterAction} onChange={e => setFilterAction(e.target.value)}
                                className="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white">
                                <option value="all">All Actions</option>
                                {actions.map(a => <option key={a} value={a}>{a}</option>)}
                            </select>
                            <select value={filterTable} onChange={e => setFilterTable(e.target.value)}
                                className="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white">
                                <option value="all">All Tables</option>
                                {tables.map(t => <option key={t} value={t}>{t}</option>)}
                            </select>
                        </div>
                    </div>

                    {/* Audit Log Table */}
                    <div className="glass rounded-xl overflow-hidden">
                        <table className="w-full">
                            <thead className="bg-white/5">
                                <tr>
                                    <th className="text-left p-4 text-gray-400 font-medium">Timestamp</th>
                                    <th className="text-left p-4 text-gray-400 font-medium">User</th>
                                    <th className="text-left p-4 text-gray-400 font-medium">Action</th>
                                    <th className="text-left p-4 text-gray-400 font-medium">Table</th>
                                    <th className="text-left p-4 text-gray-400 font-medium">Record</th>
                                    <th className="text-left p-4 text-gray-400 font-medium">IP Address</th>
                                    <th className="text-left p-4 text-gray-400 font-medium">Changes</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filtered.slice(0, 100).map((log, idx) => (
                                    <tr key={log.id || idx} className="border-t border-white/5 hover:bg-white/5">
                                        <td className="p-4 text-gray-300 text-sm font-mono">{formatTimestamp(log.createdAt)}</td>
                                        <td className="p-4 text-white text-sm">{log.userId?.slice(0, 8) || '-'}</td>
                                        <td className="p-4">
                                            <span className={`px-2 py-1 rounded text-xs font-medium ${getActionColor(log.action)}`}>
                                                {getActionIcon(log.action)} {log.action}
                                            </span>
                                        </td>
                                        <td className="p-4 text-cyan text-sm font-mono">{log.tableName}</td>
                                        <td className="p-4 text-gray-400 text-sm font-mono">{log.recordId?.slice(0, 12) || '-'}</td>
                                        <td className="p-4 text-gray-500 text-sm font-mono">{log.ipAddress || '-'}</td>
                                        <td className="p-4">
                                            {log.newValues && (
                                                <details className="cursor-pointer">
                                                    <summary className="text-cyan text-sm">View Changes</summary>
                                                    <pre className="mt-2 text-xs text-gray-400 bg-black/30 p-2 rounded overflow-x-auto max-w-xs">
                                                        {JSON.stringify(log.newValues, null, 2)}
                                                    </pre>
                                                </details>
                                            )}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {filtered.length === 0 && <div className="p-8 text-center text-gray-500">No audit logs found.</div>}
                        {filtered.length > 100 && (
                            <div className="p-4 text-center text-gray-500 text-sm border-t border-white/5">
                                Showing 100 of {filtered.length} records. Export CSV for full data.
                            </div>
                        )}
                    </div>

                    {/* Footer */}
                    <footer className="mt-8 text-center text-gray-500 text-sm">
                        <p>Audit logs retained for 7 years per NIST 800-171 AU-11</p>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<AuditTrail />, document.getElementById('root'));
    </script>
</body>
</html>
