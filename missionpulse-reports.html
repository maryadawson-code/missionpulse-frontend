<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports Generator - MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(0, 5, 15, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 255, 0.1); }
        .cyan-glow { box-shadow: 0 0 30px rgba(0, 229, 255, 0.3); }
    </style>
</head>
<body class="min-h-screen bg-[#00050F] text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg1NTk4MjQsImV4cCI6MjA2NDEzNTgyNH0.kC-W7yt8aGj1U8WaoJJQCy_41iU1mR_YyOgc5Y8iWWE';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const reportTemplates = [
            { id: 'pipeline', name: 'Pipeline Overview', icon: '📊', description: 'Current opportunities by stage, value, and probability', category: 'executive' },
            { id: 'win_loss', name: 'Win/Loss Analysis', icon: '🎯', description: 'Historical performance with reasons and trends', category: 'executive' },
            { id: 'team_performance', name: 'Team Performance', icon: '👥', description: 'Workload, assignments, and productivity metrics', category: 'operations' },
            { id: 'compliance', name: 'Compliance Status', icon: '✅', description: 'Iron Dome scores and compliance tracking', category: 'compliance' },
            { id: 'financial', name: 'Financial Summary', icon: '💰', description: 'Pipeline value, margins, and forecasts', category: 'finance' },
            { id: 'deadline', name: 'Deadline Tracker', icon: '📅', description: 'Upcoming deadlines and milestone status', category: 'operations' },
            { id: 'capture', name: 'Capture Progress', icon: '🏆', description: 'Capture activities and milestone completion', category: 'capture' },
            { id: 'custom', name: 'Custom Report', icon: '⚡', description: 'Build your own report with custom filters', category: 'custom' }
        ];

        const savedReports = [
            { id: '1', name: 'Monthly Executive Summary', type: 'pipeline', schedule: 'monthly', last_run: '2026-01-31', recipients: ['executive-team@missionmeets.tech'] },
            { id: '2', name: 'Weekly Deadline Alert', type: 'deadline', schedule: 'weekly', last_run: '2026-01-27', recipients: ['proposal-team@missionmeets.tech'] },
            { id: '3', name: 'Q1 Win/Loss Review', type: 'win_loss', schedule: 'none', last_run: '2026-01-15', recipients: [] }
        ];

        const demoReportData = {
            pipeline: {
                stages: [
                    { name: 'Identify', count: 3, value: 234000000 },
                    { name: 'Qualify', count: 4, value: 312000000 },
                    { name: 'Capture', count: 2, value: 178000000 },
                    { name: 'Proposal', count: 2, value: 214000000 },
                    { name: 'Submitted', count: 1, value: 89000000 }
                ],
                total_value: 847000000,
                weighted_value: 423500000,
                avg_probability: 52
            },
            win_loss: {
                total_won: 12,
                total_lost: 17,
                win_rate: 41.4,
                won_value: 156000000,
                lost_value: 234000000,
                reasons: [
                    { reason: 'Price', count: 7 },
                    { reason: 'Technical', count: 4 },
                    { reason: 'Past Performance', count: 3 },
                    { reason: 'Incumbent', count: 3 }
                ]
            },
            compliance: {
                overall_score: 92,
                by_category: [
                    { name: 'Section L/M', score: 94 },
                    { name: 'FAR/DFARS', score: 91 },
                    { name: 'CMMC', score: 88 },
                    { name: 'CUI Marking', score: 96 }
                ],
                issues: 4,
                resolved: 48
            }
        };

        function ReportsGenerator() {
            const [activeView, setActiveView] = useState('templates');
            const [selectedTemplate, setSelectedTemplate] = useState(null);
            const [reports, setReports] = useState(savedReports);
            const [generating, setGenerating] = useState(false);
            const [previewData, setPreviewData] = useState(null);
            const [filterCategory, setFilterCategory] = useState('all');

            // Report Builder State
            const [reportConfig, setReportConfig] = useState({
                name: '',
                type: '',
                dateRange: 'month',
                opportunities: 'all',
                includeCharts: true,
                format: 'pdf',
                schedule: 'none',
                recipients: ''
            });

            function selectTemplate(template) {
                setSelectedTemplate(template);
                setReportConfig(prev => ({
                    ...prev,
                    type: template.id,
                    name: `${template.name} - ${new Date().toLocaleDateString()}`
                }));
                setPreviewData(demoReportData[template.id] || null);
            }

            async function generateReport() {
                setGenerating(true);
                
                // Simulate report generation
                await new Promise(resolve => setTimeout(resolve, 2000));

                const newReport = {
                    id: Date.now().toString(),
                    name: reportConfig.name || selectedTemplate.name,
                    type: reportConfig.type,
                    schedule: reportConfig.schedule,
                    last_run: new Date().toISOString().split('T')[0],
                    recipients: reportConfig.recipients ? reportConfig.recipients.split(',').map(e => e.trim()) : []
                };

                if (reportConfig.schedule !== 'none') {
                    setReports(prev => [...prev, newReport]);
                }

                setGenerating(false);
                alert('Report generated successfully! In production, this would download as ' + reportConfig.format.toUpperCase());
            }

            async function runReport(reportId) {
                setGenerating(true);
                await new Promise(resolve => setTimeout(resolve, 1500));
                setReports(prev => prev.map(r => 
                    r.id === reportId ? { ...r, last_run: new Date().toISOString().split('T')[0] } : r
                ));
                setGenerating(false);
                alert('Report generated and sent to recipients!');
            }

            function deleteReport(reportId) {
                if (confirm('Delete this saved report?')) {
                    setReports(prev => prev.filter(r => r.id !== reportId));
                }
            }

            const filteredTemplates = filterCategory === 'all' 
                ? reportTemplates 
                : reportTemplates.filter(t => t.category === filterCategory);

            return (
                <div className="min-h-screen p-6">
                    <div className="max-w-7xl mx-auto">
                        {/* Header */}
                        <div className="flex items-center justify-between mb-8">
                            <div>
                                <a href="index.html" className="text-cyan-400 hover:text-cyan-300 text-sm mb-2 inline-block">← Back to Command Center</a>
                                <h1 className="text-3xl font-bold">
                                    <span className="bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">Reports Generator</span>
                                </h1>
                                <p className="text-gray-400 mt-1">Create, schedule, and manage reports</p>
                            </div>
                            <div className="flex items-center gap-2">
                                <button
                                    onClick={() => setActiveView('templates')}
                                    className={`px-4 py-2 rounded-lg transition-colors ${
                                        activeView === 'templates' ? 'bg-cyan-500/20 text-cyan-400' : 'bg-white/5 text-gray-400 hover:bg-white/10'
                                    }`}
                                >
                                    📊 Templates
                                </button>
                                <button
                                    onClick={() => setActiveView('saved')}
                                    className={`px-4 py-2 rounded-lg transition-colors ${
                                        activeView === 'saved' ? 'bg-cyan-500/20 text-cyan-400' : 'bg-white/5 text-gray-400 hover:bg-white/10'
                                    }`}
                                >
                                    💾 Saved Reports ({reports.length})
                                </button>
                            </div>
                        </div>

                        {/* Templates View */}
                        {activeView === 'templates' && !selectedTemplate && (
                            <div>
                                {/* Category Filters */}
                                <div className="flex items-center gap-2 mb-6">
                                    {[
                                        { id: 'all', label: 'All' },
                                        { id: 'executive', label: 'Executive' },
                                        { id: 'operations', label: 'Operations' },
                                        { id: 'compliance', label: 'Compliance' },
                                        { id: 'finance', label: 'Finance' },
                                        { id: 'capture', label: 'Capture' }
                                    ].map(cat => (
                                        <button
                                            key={cat.id}
                                            onClick={() => setFilterCategory(cat.id)}
                                            className={`px-4 py-2 rounded-lg text-sm transition-colors ${
                                                filterCategory === cat.id
                                                    ? 'bg-cyan-500/20 text-cyan-400'
                                                    : 'bg-white/5 text-gray-400 hover:bg-white/10'
                                            }`}
                                        >
                                            {cat.label}
                                        </button>
                                    ))}
                                </div>

                                {/* Template Grid */}
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                    {filteredTemplates.map(template => (
                                        <div
                                            key={template.id}
                                            onClick={() => selectTemplate(template)}
                                            className="glass rounded-xl p-5 cursor-pointer hover:border-cyan-500/30 transition-all group"
                                        >
                                            <div className="text-4xl mb-3">{template.icon}</div>
                                            <h3 className="font-semibold text-white group-hover:text-cyan-400 transition-colors">{template.name}</h3>
                                            <p className="text-sm text-gray-400 mt-1">{template.description}</p>
                                            <span className="inline-block mt-3 text-xs px-2 py-1 bg-white/5 rounded text-gray-500 capitalize">{template.category}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Report Builder */}
                        {activeView === 'templates' && selectedTemplate && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                {/* Configuration Panel */}
                                <div className="lg:col-span-1">
                                    <div className="glass rounded-xl p-6 sticky top-6">
                                        <div className="flex items-center justify-between mb-6">
                                            <h2 className="text-lg font-semibold text-white flex items-center gap-2">
                                                <span>{selectedTemplate.icon}</span>
                                                Report Builder
                                            </h2>
                                            <button 
                                                onClick={() => setSelectedTemplate(null)}
                                                className="text-gray-400 hover:text-white"
                                            >
                                                ✕
                                            </button>
                                        </div>

                                        <div className="space-y-4">
                                            <div>
                                                <label className="block text-sm text-gray-400 mb-2">Report Name</label>
                                                <input
                                                    type="text"
                                                    value={reportConfig.name}
                                                    onChange={(e) => setReportConfig(prev => ({ ...prev, name: e.target.value }))}
                                                    className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white focus:border-cyan-500/50 focus:outline-none"
                                                />
                                            </div>

                                            <div>
                                                <label className="block text-sm text-gray-400 mb-2">Date Range</label>
                                                <select
                                                    value={reportConfig.dateRange}
                                                    onChange={(e) => setReportConfig(prev => ({ ...prev, dateRange: e.target.value }))}
                                                    className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white focus:outline-none"
                                                >
                                                    <option value="week">Last 7 Days</option>
                                                    <option value="month">Last 30 Days</option>
                                                    <option value="quarter">Last Quarter</option>
                                                    <option value="year">Last Year</option>
                                                    <option value="all">All Time</option>
                                                </select>
                                            </div>

                                            <div>
                                                <label className="block text-sm text-gray-400 mb-2">Opportunities</label>
                                                <select
                                                    value={reportConfig.opportunities}
                                                    onChange={(e) => setReportConfig(prev => ({ ...prev, opportunities: e.target.value }))}
                                                    className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white focus:outline-none"
                                                >
                                                    <option value="all">All Opportunities</option>
                                                    <option value="active">Active Only</option>
                                                    <option value="won">Won Only</option>
                                                    <option value="lost">Lost Only</option>
                                                </select>
                                            </div>

                                            <div>
                                                <label className="block text-sm text-gray-400 mb-2">Format</label>
                                                <div className="flex gap-2">
                                                    {['pdf', 'xlsx', 'csv'].map(fmt => (
                                                        <button
                                                            key={fmt}
                                                            onClick={() => setReportConfig(prev => ({ ...prev, format: fmt }))}
                                                            className={`flex-1 py-2 rounded-lg text-sm uppercase transition-colors ${
                                                                reportConfig.format === fmt
                                                                    ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30'
                                                                    : 'bg-white/5 text-gray-400 hover:bg-white/10'
                                                            }`}
                                                        >
                                                            {fmt}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className="flex items-center justify-between">
                                                <span className="text-sm text-gray-400">Include Charts</span>
                                                <button
                                                    onClick={() => setReportConfig(prev => ({ ...prev, includeCharts: !prev.includeCharts }))}
                                                    className={`w-12 h-6 rounded-full transition-colors ${
                                                        reportConfig.includeCharts ? 'bg-cyan-500/30' : 'bg-white/10'
                                                    }`}
                                                >
                                                    <div className={`w-5 h-5 bg-white rounded-full transition-all ${
                                                        reportConfig.includeCharts ? 'ml-6' : 'ml-0.5'
                                                    }`} />
                                                </button>
                                            </div>

                                            <hr className="border-white/10" />

                                            <div>
                                                <label className="block text-sm text-gray-400 mb-2">Schedule (optional)</label>
                                                <select
                                                    value={reportConfig.schedule}
                                                    onChange={(e) => setReportConfig(prev => ({ ...prev, schedule: e.target.value }))}
                                                    className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white focus:outline-none"
                                                >
                                                    <option value="none">One-time only</option>
                                                    <option value="daily">Daily</option>
                                                    <option value="weekly">Weekly</option>
                                                    <option value="monthly">Monthly</option>
                                                </select>
                                            </div>

                                            {reportConfig.schedule !== 'none' && (
                                                <div>
                                                    <label className="block text-sm text-gray-400 mb-2">Email Recipients</label>
                                                    <input
                                                        type="text"
                                                        value={reportConfig.recipients}
                                                        onChange={(e) => setReportConfig(prev => ({ ...prev, recipients: e.target.value }))}
                                                        placeholder="email1@example.com, email2@example.com"
                                                        className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white placeholder-gray-500 focus:border-cyan-500/50 focus:outline-none text-sm"
                                                    />
                                                </div>
                                            )}

                                            <button
                                                onClick={generateReport}
                                                disabled={generating}
                                                className="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-500 rounded-lg text-white font-semibold hover:shadow-lg hover:shadow-cyan-500/25 transition-all disabled:opacity-50 flex items-center justify-center gap-2"
                                            >
                                                {generating ? (
                                                    <>
                                                        <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                                                        Generating...
                                                    </>
                                                ) : (
                                                    <>📥 Generate Report</>
                                                )}
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {/* Preview Panel */}
                                <div className="lg:col-span-2">
                                    <div className="glass rounded-xl p-6">
                                        <h2 className="text-lg font-semibold text-white mb-6">Report Preview</h2>
                                        
                                        {previewData && selectedTemplate.id === 'pipeline' && (
                                            <div>
                                                <div className="grid grid-cols-3 gap-4 mb-6">
                                                    <div className="bg-white/5 rounded-lg p-4 text-center">
                                                        <p className="text-2xl font-bold text-cyan-400">${(previewData.total_value / 1000000).toFixed(0)}M</p>
                                                        <p className="text-xs text-gray-400">Total Pipeline</p>
                                                    </div>
                                                    <div className="bg-white/5 rounded-lg p-4 text-center">
                                                        <p className="text-2xl font-bold text-green-400">${(previewData.weighted_value / 1000000).toFixed(0)}M</p>
                                                        <p className="text-xs text-gray-400">Weighted Value</p>
                                                    </div>
                                                    <div className="bg-white/5 rounded-lg p-4 text-center">
                                                        <p className="text-2xl font-bold text-purple-400">{previewData.avg_probability}%</p>
                                                        <p className="text-xs text-gray-400">Avg Probability</p>
                                                    </div>
                                                </div>
                                                <h3 className="font-semibold text-white mb-4">Pipeline by Stage</h3>
                                                <div className="space-y-3">
                                                    {previewData.stages.map(stage => (
                                                        <div key={stage.name}>
                                                            <div className="flex items-center justify-between text-sm mb-1">
                                                                <span className="text-gray-300">{stage.name}</span>
                                                                <span className="text-cyan-400">{stage.count} opps • ${(stage.value / 1000000).toFixed(0)}M</span>
                                                            </div>
                                                            <div className="h-3 bg-white/10 rounded-full overflow-hidden">
                                                                <div 
                                                                    className="h-full bg-gradient-to-r from-cyan-500 to-blue-500 rounded-full"
                                                                    style={{ width: `${(stage.value / previewData.total_value) * 100}%` }}
                                                                />
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {previewData && selectedTemplate.id === 'win_loss' && (
                                            <div>
                                                <div className="grid grid-cols-4 gap-4 mb-6">
                                                    <div className="bg-white/5 rounded-lg p-4 text-center">
                                                        <p className="text-2xl font-bold text-green-400">{previewData.total_won}</p>
                                                        <p className="text-xs text-gray-400">Won</p>
                                                    </div>
                                                    <div className="bg-white/5 rounded-lg p-4 text-center">
                                                        <p className="text-2xl font-bold text-red-400">{previewData.total_lost}</p>
                                                        <p className="text-xs text-gray-400">Lost</p>
                                                    </div>
                                                    <div className="bg-white/5 rounded-lg p-4 text-center">
                                                        <p className="text-2xl font-bold text-cyan-400">{previewData.win_rate}%</p>
                                                        <p className="text-xs text-gray-400">Win Rate</p>
                                                    </div>
                                                    <div className="bg-white/5 rounded-lg p-4 text-center">
                                                        <p className="text-2xl font-bold text-purple-400">${(previewData.won_value / 1000000).toFixed(0)}M</p>
                                                        <p className="text-xs text-gray-400">Won Value</p>
                                                    </div>
                                                </div>
                                                <h3 className="font-semibold text-white mb-4">Loss Reasons</h3>
                                                <div className="space-y-3">
                                                    {previewData.reasons.map(r => (
                                                        <div key={r.reason} className="flex items-center justify-between">
                                                            <span className="text-gray-300">{r.reason}</span>
                                                            <span className="text-red-400">{r.count} losses</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {previewData && selectedTemplate.id === 'compliance' && (
                                            <div>
                                                <div className="flex items-center justify-center mb-6">
                                                    <div className="relative w-32 h-32">
                                                        <svg className="w-32 h-32 transform -rotate-90">
                                                            <circle cx="64" cy="64" r="56" stroke="rgba(255,255,255,0.1)" strokeWidth="12" fill="none" />
                                                            <circle cx="64" cy="64" r="56" stroke="#00E5FA" strokeWidth="12" fill="none" 
                                                                strokeDasharray={`${previewData.overall_score * 3.52} 352`} />
                                                        </svg>
                                                        <span className="absolute inset-0 flex items-center justify-center text-3xl font-bold text-cyan-400">
                                                            {previewData.overall_score}%
                                                        </span>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    {previewData.by_category.map(cat => (
                                                        <div key={cat.name} className="bg-white/5 rounded-lg p-4">
                                                            <div className="flex items-center justify-between mb-2">
                                                                <span className="text-gray-300">{cat.name}</span>
                                                                <span className="text-cyan-400">{cat.score}%</span>
                                                            </div>
                                                            <div className="h-2 bg-white/10 rounded-full overflow-hidden">
                                                                <div 
                                                                    className="h-full bg-cyan-500 rounded-full"
                                                                    style={{ width: `${cat.score}%` }}
                                                                />
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {!previewData && (
                                            <div className="text-center py-12">
                                                <p className="text-4xl mb-4">📊</p>
                                                <p className="text-gray-400">Preview will appear here based on your configuration</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Saved Reports View */}
                        {activeView === 'saved' && (
                            <div>
                                {reports.length === 0 ? (
                                    <div className="glass rounded-xl p-12 text-center">
                                        <p className="text-4xl mb-4">📭</p>
                                        <p className="text-gray-400 mb-4">No saved reports yet</p>
                                        <button
                                            onClick={() => setActiveView('templates')}
                                            className="px-6 py-3 bg-gradient-to-r from-cyan-500 to-blue-500 rounded-lg text-white font-semibold"
                                        >
                                            Create Your First Report
                                        </button>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {reports.map(report => {
                                            const template = reportTemplates.find(t => t.id === report.type);
                                            return (
                                                <div key={report.id} className="glass rounded-xl p-5 flex items-center justify-between">
                                                    <div className="flex items-center gap-4">
                                                        <span className="text-3xl">{template?.icon || '📊'}</span>
                                                        <div>
                                                            <h3 className="font-semibold text-white">{report.name}</h3>
                                                            <div className="flex items-center gap-4 text-sm text-gray-400 mt-1">
                                                                <span>Type: {template?.name || report.type}</span>
                                                                <span>Schedule: {report.schedule === 'none' ? 'One-time' : report.schedule}</span>
                                                                <span>Last run: {report.last_run}</span>
                                                            </div>
                                                            {report.recipients.length > 0 && (
                                                                <p className="text-xs text-gray-500 mt-1">
                                                                    Recipients: {report.recipients.join(', ')}
                                                                </p>
                                                            )}
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <button
                                                            onClick={() => runReport(report.id)}
                                                            disabled={generating}
                                                            className="px-4 py-2 bg-cyan-500/20 hover:bg-cyan-500/30 text-cyan-400 rounded-lg text-sm transition-colors"
                                                        >
                                                            ▶ Run Now
                                                        </button>
                                                        <button
                                                            onClick={() => deleteReport(report.id)}
                                                            className="px-4 py-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 rounded-lg text-sm transition-colors"
                                                        >
                                                            🗑️
                                                        </button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<ReportsGenerator />);
