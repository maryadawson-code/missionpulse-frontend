<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports & Analytics | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
        .glass { background: rgba(0, 229, 250, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.2); }
        .glow { box-shadow: 0 0 20px rgba(0, 229, 250, 0.3); }
        .stat-card { transition: all 0.3s; }
        .stat-card:hover { transform: translateY(-4px); }
        .progress-bar { transition: width 1s ease-out; }
    </style>
</head>
<body class="text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // FILE: missionpulse-reports.html
        // ROLE: All authenticated users (read-only)
        // SECURITY: env vars verified - Supabase anon key (public RLS model)
        
        const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc3NTY2NDcsImV4cCI6MjA1MzMzMjY0N30.Wfq14O6y2EpB2R0cJQPmWMFybMQc0PxLlHYXVLp2rws';
        const DEFAULT_COMPANY_ID = '11111111-1111-1111-1111-111111111111';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        function App() {
            const [currentRole, setCurrentRole] = useState('PM');
            const [loading, setLoading] = useState(true);
            const [stats, setStats] = useState({
                opportunities: [],
                tasks: [],
                compliance: [],
                competitors: [],
                partners: [],
                pricing: [],
                playbook: []
            });
            
            useEffect(() => { loadData(); }, []);
            
            const loadData = async () => {
                try {
                    const [opps, tasks, compliance, competitors, partners, pricing, playbook] = await Promise.all([
                        supabase.from('opportunities').select('*').eq('company_id', DEFAULT_COMPANY_ID),
                        supabase.from('tasks').select('*'),
                        supabase.from('compliance_items').select('*'),
                        supabase.from('competitors').select('*'),
                        supabase.from('teaming_partners').select('*'),
                        supabase.from('pricing_items').select('*'),
                        supabase.from('playbook_items').select('*').eq('company_id', DEFAULT_COMPANY_ID)
                    ]);
                    
                    setStats({
                        opportunities: opps.data || [],
                        tasks: tasks.data || [],
                        compliance: compliance.data || [],
                        competitors: competitors.data || [],
                        partners: partners.data || [],
                        pricing: pricing.data || [],
                        playbook: playbook.data || []
                    });
                } catch (err) {
                    console.error('Load error:', err);
                    // Demo data for visualization
                    setStats({
                        opportunities: [
                            { id: 1, nickname: 'VA-EHR-2025', phase: 'capture', pwin: 65, ceiling_value: 25000000 },
                            { id: 2, nickname: 'DHA-Cloud', phase: 'proposal', pwin: 45, ceiling_value: 15000000 },
                            { id: 3, nickname: 'CMS-Data', phase: 'review', pwin: 70, ceiling_value: 8000000 },
                            { id: 4, nickname: 'IHS-Telehealth', phase: 'submitted', pwin: 55, ceiling_value: 12000000 }
                        ],
                        tasks: [
                            { status: 'pending' }, { status: 'pending' }, { status: 'in_progress' },
                            { status: 'in_progress' }, { status: 'in_progress' }, { status: 'complete' },
                            { status: 'complete' }, { status: 'complete' }, { status: 'complete' }, { status: 'blocked' }
                        ],
                        compliance: [
                            { status: 'compliant' }, { status: 'compliant' }, { status: 'compliant' },
                            { status: 'partial' }, { status: 'partial' }, { status: 'non_compliant' }
                        ],
                        competitors: [
                            { threat_level: 'high' }, { threat_level: 'high' },
                            { threat_level: 'medium' }, { threat_level: 'medium' }, { threat_level: 'low' }
                        ],
                        partners: [
                            { status: 'Active', nda_signed: true }, { status: 'Active', nda_signed: true },
                            { status: 'NDA Signed', nda_signed: true }, { status: 'Prospecting', nda_signed: false }
                        ],
                        pricing: [],
                        playbook: [
                            { use_count: 15 }, { use_count: 12 }, { use_count: 8 }, { use_count: 6 }, { use_count: 4 }
                        ]
                    });
                } finally {
                    setLoading(false);
                }
            };
            
            // Calculate metrics
            const totalPipeline = stats.opportunities.reduce((sum, o) => sum + (o.ceiling_value || 0), 0);
            const avgPwin = stats.opportunities.length > 0 
                ? Math.round(stats.opportunities.reduce((sum, o) => sum + (o.pwin || 0), 0) / stats.opportunities.length)
                : 0;
            const weightedPipeline = stats.opportunities.reduce((sum, o) => sum + ((o.ceiling_value || 0) * (o.pwin || 0) / 100), 0);
            
            const phaseCount = stats.opportunities.reduce((acc, o) => {
                acc[o.phase] = (acc[o.phase] || 0) + 1;
                return acc;
            }, {});
            
            const tasksByStatus = stats.tasks.reduce((acc, t) => {
                acc[t.status] = (acc[t.status] || 0) + 1;
                return acc;
            }, {});
            
            const complianceByStatus = stats.compliance.reduce((acc, c) => {
                acc[c.status] = (acc[c.status] || 0) + 1;
                return acc;
            }, {});
            
            const competitorsByThreat = stats.competitors.reduce((acc, c) => {
                acc[c.threat_level] = (acc[c.threat_level] || 0) + 1;
                return acc;
            }, {});
            
            const activePartners = stats.partners.filter(p => p.status === 'Active').length;
            const ndaSigned = stats.partners.filter(p => p.nda_signed).length;
            
            const playbookUses = stats.playbook.reduce((sum, p) => sum + (p.use_count || 0), 0);
            
            const formatCurrency = (val) => {
                if (val >= 1000000) return `$${(val / 1000000).toFixed(1)}M`;
                if (val >= 1000) return `$${(val / 1000).toFixed(0)}K`;
                return `$${val}`;
            };
            
            return (
                <div className="p-6 max-w-7xl mx-auto">
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <a href="index.html" className="text-cyan-400 hover:text-cyan-300 text-sm mb-2 inline-block">← Back to Dashboard</a>
                            <h1 className="text-3xl font-bold text-cyan-400">📊 Reports & Analytics</h1>
                            <p className="text-slate-400 mt-1">Real-time pipeline and performance metrics</p>
                        </div>
                        <div className="flex gap-4 items-center">
                            <button onClick={loadData} className="glass px-4 py-2 rounded-lg text-cyan-400 hover:bg-cyan-500/20 transition">
                                🔄 Refresh
                            </button>
                            <select value={currentRole} onChange={e => setCurrentRole(e.target.value)}
                                className="bg-slate-800 border border-cyan-500/30 rounded px-3 py-2 text-cyan-400">
                                {['CEO','COO','CAP','PM','SA','FIN','CON','DEL','QA','Partner','Admin'].map(r => 
                                    <option key={r} value={r}>{r}</option>
                                )}
                            </select>
                        </div>
                    </div>
                    
                    {loading ? (
                        <div className="text-center py-20 text-cyan-400">Loading analytics...</div>
                    ) : (
                        <>
                            {/* Executive Summary Cards */}
                            <div className="grid grid-cols-4 gap-4 mb-6">
                                <div className="stat-card glass rounded-xl p-5 glow">
                                    <p className="text-slate-400 text-sm mb-1">Total Pipeline</p>
                                    <p className="text-3xl font-bold text-cyan-400">{formatCurrency(totalPipeline)}</p>
                                    <p className="text-slate-500 text-xs mt-1">{stats.opportunities.length} opportunities</p>
                                </div>
                                <div className="stat-card glass rounded-xl p-5">
                                    <p className="text-slate-400 text-sm mb-1">Weighted Pipeline</p>
                                    <p className="text-3xl font-bold text-green-400">{formatCurrency(weightedPipeline)}</p>
                                    <p className="text-slate-500 text-xs mt-1">Risk-adjusted value</p>
                                </div>
                                <div className="stat-card glass rounded-xl p-5">
                                    <p className="text-slate-400 text-sm mb-1">Avg Win Probability</p>
                                    <p className="text-3xl font-bold text-yellow-400">{avgPwin}%</p>
                                    <p className="text-slate-500 text-xs mt-1">Across all opps</p>
                                </div>
                                <div className="stat-card glass rounded-xl p-5">
                                    <p className="text-slate-400 text-sm mb-1">Active Partners</p>
                                    <p className="text-3xl font-bold text-purple-400">{activePartners}</p>
                                    <p className="text-slate-500 text-xs mt-1">{ndaSigned} NDAs signed</p>
                                </div>
                            </div>
                            
                            {/* Charts Row */}
                            <div className="grid grid-cols-3 gap-6 mb-6">
                                {/* Pipeline by Phase */}
                                <div className="glass rounded-xl p-5">
                                    <h3 className="text-cyan-400 font-bold mb-4">📈 Pipeline by Phase</h3>
                                    <div className="space-y-3">
                                        {['discovery', 'capture', 'proposal', 'review', 'submitted', 'won', 'lost'].map(phase => {
                                            const count = phaseCount[phase] || 0;
                                            const percent = stats.opportunities.length > 0 ? (count / stats.opportunities.length * 100) : 0;
                                            const colors = {
                                                discovery: 'bg-slate-500', capture: 'bg-cyan-500', proposal: 'bg-blue-500',
                                                review: 'bg-yellow-500', submitted: 'bg-purple-500', won: 'bg-green-500', lost: 'bg-red-500'
                                            };
                                            return (
                                                <div key={phase}>
                                                    <div className="flex justify-between text-sm mb-1">
                                                        <span className="text-slate-300 capitalize">{phase}</span>
                                                        <span className="text-slate-400">{count}</span>
                                                    </div>
                                                    <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
                                                        <div className={`progress-bar h-full ${colors[phase]} rounded-full`} style={{width: `${percent}%`}}></div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                                
                                {/* Task Progress */}
                                <div className="glass rounded-xl p-5">
                                    <h3 className="text-cyan-400 font-bold mb-4">✅ Task Progress</h3>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="text-center">
                                            <div className="text-3xl font-bold text-green-400">{tasksByStatus.complete || 0}</div>
                                            <div className="text-slate-400 text-sm">Complete</div>
                                        </div>
                                        <div className="text-center">
                                            <div className="text-3xl font-bold text-cyan-400">{tasksByStatus.in_progress || 0}</div>
                                            <div className="text-slate-400 text-sm">In Progress</div>
                                        </div>
                                        <div className="text-center">
                                            <div className="text-3xl font-bold text-yellow-400">{tasksByStatus.pending || 0}</div>
                                            <div className="text-slate-400 text-sm">Pending</div>
                                        </div>
                                        <div className="text-center">
                                            <div className="text-3xl font-bold text-red-400">{tasksByStatus.blocked || 0}</div>
                                            <div className="text-slate-400 text-sm">Blocked</div>
                                        </div>
                                    </div>
                                    <div className="mt-4 pt-4 border-t border-cyan-500/20">
                                        <div className="flex justify-between text-sm">
                                            <span className="text-slate-400">Completion Rate</span>
                                            <span className="text-green-400 font-semibold">
                                                {stats.tasks.length > 0 
                                                    ? Math.round((tasksByStatus.complete || 0) / stats.tasks.length * 100)
                                                    : 0}%
                                            </span>
                                        </div>
                                    </div>
                                </div>
                                
                                {/* Compliance Status */}
                                <div className="glass rounded-xl p-5">
                                    <h3 className="text-cyan-400 font-bold mb-4">🛡️ Compliance Status</h3>
                                    <div className="space-y-4">
                                        <div>
                                            <div className="flex justify-between text-sm mb-1">
                                                <span className="text-green-400">✓ Compliant</span>
                                                <span>{complianceByStatus.compliant || 0}</span>
                                            </div>
                                            <div className="h-3 bg-slate-700 rounded-full overflow-hidden">
                                                <div className="h-full bg-green-500 rounded-full" 
                                                    style={{width: `${stats.compliance.length > 0 ? ((complianceByStatus.compliant || 0) / stats.compliance.length * 100) : 0}%`}}></div>
                                            </div>
                                        </div>
                                        <div>
                                            <div className="flex justify-between text-sm mb-1">
                                                <span className="text-yellow-400">⚠ Partial</span>
                                                <span>{complianceByStatus.partial || 0}</span>
                                            </div>
                                            <div className="h-3 bg-slate-700 rounded-full overflow-hidden">
                                                <div className="h-full bg-yellow-500 rounded-full" 
                                                    style={{width: `${stats.compliance.length > 0 ? ((complianceByStatus.partial || 0) / stats.compliance.length * 100) : 0}%`}}></div>
                                            </div>
                                        </div>
                                        <div>
                                            <div className="flex justify-between text-sm mb-1">
                                                <span className="text-red-400">✗ Non-Compliant</span>
                                                <span>{complianceByStatus.non_compliant || 0}</span>
                                            </div>
                                            <div className="h-3 bg-slate-700 rounded-full overflow-hidden">
                                                <div className="h-full bg-red-500 rounded-full" 
                                                    style={{width: `${stats.compliance.length > 0 ? ((complianceByStatus.non_compliant || 0) / stats.compliance.length * 100) : 0}%`}}></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            {/* Bottom Row */}
                            <div className="grid grid-cols-2 gap-6">
                                {/* Competitor Intelligence */}
                                <div className="glass rounded-xl p-5">
                                    <h3 className="text-cyan-400 font-bold mb-4">🎯 Competitive Landscape</h3>
                                    <div className="flex gap-4 items-end h-32">
                                        <div className="flex-1 flex flex-col items-center">
                                            <div className="w-full bg-red-500/30 rounded-t" style={{height: `${(competitorsByThreat.high || 0) * 20}px`}}></div>
                                            <span className="text-red-400 font-bold text-xl mt-2">{competitorsByThreat.high || 0}</span>
                                            <span className="text-slate-400 text-xs">High Threat</span>
                                        </div>
                                        <div className="flex-1 flex flex-col items-center">
                                            <div className="w-full bg-yellow-500/30 rounded-t" style={{height: `${(competitorsByThreat.medium || 0) * 20}px`}}></div>
                                            <span className="text-yellow-400 font-bold text-xl mt-2">{competitorsByThreat.medium || 0}</span>
                                            <span className="text-slate-400 text-xs">Medium</span>
                                        </div>
                                        <div className="flex-1 flex flex-col items-center">
                                            <div className="w-full bg-green-500/30 rounded-t" style={{height: `${(competitorsByThreat.low || 0) * 20}px`}}></div>
                                            <span className="text-green-400 font-bold text-xl mt-2">{competitorsByThreat.low || 0}</span>
                                            <span className="text-slate-400 text-xs">Low Threat</span>
                                        </div>
                                    </div>
                                    <div className="mt-4 pt-4 border-t border-cyan-500/20 text-center">
                                        <span className="text-slate-400 text-sm">{stats.competitors.length} competitors tracked</span>
                                    </div>
                                </div>
                                
                                {/* Playbook Usage */}
                                <div className="glass rounded-xl p-5">
                                    <h3 className="text-cyan-400 font-bold mb-4">📚 Playbook Utilization</h3>
                                    <div className="grid grid-cols-3 gap-4 mb-4">
                                        <div className="text-center">
                                            <div className="text-3xl font-bold text-cyan-400">{stats.playbook.length}</div>
                                            <div className="text-slate-400 text-sm">Golden Examples</div>
                                        </div>
                                        <div className="text-center">
                                            <div className="text-3xl font-bold text-yellow-400">{playbookUses}</div>
                                            <div className="text-slate-400 text-sm">Total Uses</div>
                                        </div>
                                        <div className="text-center">
                                            <div className="text-3xl font-bold text-green-400">
                                                {stats.playbook.length > 0 ? Math.round(playbookUses / stats.playbook.length) : 0}
                                            </div>
                                            <div className="text-slate-400 text-sm">Avg Uses/Item</div>
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <h4 className="text-slate-400 text-sm">Top Performers</h4>
                                        {stats.playbook.slice(0, 3).map((item, i) => (
                                            <div key={i} className="flex justify-between text-sm">
                                                <span className="text-slate-300 truncate flex-1">{item.title || `Item ${i+1}`}</span>
                                                <span className="text-cyan-400 ml-2">{item.use_count} uses</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            
                            {/* Opportunity Table */}
                            <div className="glass rounded-xl p-5 mt-6">
                                <h3 className="text-cyan-400 font-bold mb-4">🎯 Active Opportunities</h3>
                                <div className="overflow-x-auto">
                                    <table className="w-full">
                                        <thead>
                                            <tr className="border-b border-cyan-500/20 text-left">
                                                <th className="pb-3 text-cyan-400">Opportunity</th>
                                                <th className="pb-3 text-cyan-400">Phase</th>
                                                <th className="pb-3 text-cyan-400">Value</th>
                                                <th className="pb-3 text-cyan-400">pWin</th>
                                                <th className="pb-3 text-cyan-400">Weighted</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {stats.opportunities.map(opp => (
                                                <tr key={opp.id} className="border-b border-slate-700/50">
                                                    <td className="py-3 font-semibold">{opp.nickname || opp.title}</td>
                                                    <td className="py-3">
                                                        <span className={`px-2 py-1 rounded text-xs capitalize ${
                                                            opp.phase === 'won' ? 'bg-green-500/20 text-green-400' :
                                                            opp.phase === 'lost' ? 'bg-red-500/20 text-red-400' :
                                                            'bg-cyan-500/20 text-cyan-400'
                                                        }`}>{opp.phase}</span>
                                                    </td>
                                                    <td className="py-3 text-slate-300">{formatCurrency(opp.ceiling_value || 0)}</td>
                                                    <td className="py-3">
                                                        <span className={`font-semibold ${
                                                            opp.pwin >= 60 ? 'text-green-400' :
                                                            opp.pwin >= 40 ? 'text-yellow-400' : 'text-red-400'
                                                        }`}>{opp.pwin}%</span>
                                                    </td>
                                                    <td className="py-3 text-cyan-400">{formatCurrency((opp.ceiling_value || 0) * (opp.pwin || 0) / 100)}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </>
                    )}
                    
                    <div className="mt-8 text-center text-slate-500 text-sm">
                        MissionPulse v3.1 • Mission Meets Tech • AI GENERATED CONTENT REQUIRES HUMAN REVIEW
                    </div>
                </div>
            );
        }
        
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
