<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAM.gov Intelligence | MissionPulse</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass { background: rgba(0,229,250,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
    .glass-card { background: rgba(15,23,42,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(51,65,85,0.5); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-slideIn { animation: slideIn 0.3s ease-out; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: rgba(51,65,85,0.3); border-radius: 3px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(0,229,250,0.3); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // Supabase client
    const supabaseUrl = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzgzNjY0MDcsImV4cCI6MjA1Mzk0MjQwN30.lyr1BUD7vMuuWT_HjqWnhVP_JSrgVx1f7i_yc2VFE44';
    const supabase = window.supabase?.createClient(supabaseUrl, supabaseKey);

    // Demo data fallback
    const DEMO_SAM_OPPORTUNITIES = [
      { id: '1', notice_id: 'SAM-2026-001', title: 'DHA Electronic Health Records Modernization', solicitation_number: 'W81K04-26-R-0001', department: 'Department of Defense', sub_tier: 'Defense Health Agency', posted_date: new Date(Date.now() - 5*24*60*60*1000).toISOString(), response_deadline: new Date(Date.now() + 30*24*60*60*1000).toISOString(), set_aside_code: 'SBA', set_aside_description: 'Small Business Set-Aside', naics_code: '541512', estimated_value: 125000000, match_score: 94.5, match_reasons: ['NAICS Match', 'Past Performance', 'Set-Aside Eligible', 'Geographic Match'], description: 'Modernization of electronic health records systems across military treatment facilities.', is_tracked: true },
      { id: '2', notice_id: 'SAM-2026-002', title: 'VA Claims Processing AI Platform', solicitation_number: 'VA36C-26-R-0045', department: 'Department of Veterans Affairs', sub_tier: 'Veterans Benefits Administration', posted_date: new Date(Date.now() - 3*24*60*60*1000).toISOString(), response_deadline: new Date(Date.now() + 45*24*60*60*1000).toISOString(), set_aside_code: 'SDVOSBC', set_aside_description: 'SDVOSB Set-Aside', naics_code: '541511', estimated_value: 85000000, match_score: 91.2, match_reasons: ['NAICS Match', 'AI/ML Capability', 'SDVOSB Eligible'], description: 'AI-powered claims processing automation platform.', is_tracked: false },
      { id: '3', notice_id: 'SAM-2026-003', title: 'CMS Medicare Fraud Detection System', solicitation_number: 'CMS-RFP-2026-0089', department: 'Department of Health and Human Services', sub_tier: 'Centers for Medicare & Medicaid', posted_date: new Date(Date.now() - 7*24*60*60*1000).toISOString(), response_deadline: new Date(Date.now() + 21*24*60*60*1000).toISOString(), set_aside_code: 'NONE', set_aside_description: 'Full and Open', naics_code: '541519', estimated_value: 200000000, match_score: 87.8, match_reasons: ['Healthcare IT', 'Data Analytics', 'Fraud Detection'], description: 'Advanced analytics system for Medicare fraud prevention.', is_tracked: false },
      { id: '4', notice_id: 'SAM-2026-004', title: 'IHS Telehealth Infrastructure', solicitation_number: 'IHS-SOL-2026-012', department: 'Department of Health and Human Services', sub_tier: 'Indian Health Service', posted_date: new Date(Date.now() - 10*24*60*60*1000).toISOString(), response_deadline: new Date(Date.now() + 60*24*60*60*1000).toISOString(), set_aside_code: '8AN', set_aside_description: '8(a) Set-Aside', naics_code: '541512', estimated_value: 45000000, match_score: 82.3, match_reasons: ['Telehealth', 'Rural Healthcare', 'Infrastructure'], description: 'Telehealth platform deployment for rural tribal communities.', is_tracked: true },
      { id: '5', notice_id: 'SAM-2026-005', title: 'DoD Cybersecurity Operations Center', solicitation_number: 'W91CRB-26-R-0023', department: 'Department of Defense', sub_tier: 'DISA', posted_date: new Date(Date.now() - 2*24*60*60*1000).toISOString(), response_deadline: new Date(Date.now() + 35*24*60*60*1000).toISOString(), set_aside_code: 'SBA', set_aside_description: 'Small Business Set-Aside', naics_code: '541519', estimated_value: 175000000, match_score: 78.9, match_reasons: ['Cybersecurity', 'CMMC Required', '24/7 Operations'], description: 'Managed security operations center services.', is_tracked: false }
    ];

    // Icons
    const Icons = {
      search: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
      globe: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      star: () => <svg className="w-full h-full" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>,
      starOutline: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" /></svg>,
      filter: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>,
      clock: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6l4 2" /></svg>,
      dollar: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      building: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>,
      target: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><circle cx="12" cy="12" r="6" strokeWidth={2}/><circle cx="12" cy="12" r="2" strokeWidth={2}/></svg>,
      arrowRight: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>,
      refresh: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
      x: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>,
      link: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>,
      shield: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
      zap: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    // Components
    const Badge = ({ children, variant = 'default', size = 'sm', icon }) => {
      const variants = {
        default: 'bg-slate-700 text-slate-300',
        primary: 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30',
        success: 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30',
        warning: 'bg-amber-500/20 text-amber-400 border border-amber-500/30',
        danger: 'bg-red-500/20 text-red-400 border border-red-500/30',
        purple: 'bg-purple-500/20 text-purple-400 border border-purple-500/30'
      };
      const sizes = { xs: 'px-1.5 py-0.5 text-xs', sm: 'px-2 py-1 text-xs', md: 'px-3 py-1.5 text-sm' };
      return <span className={`inline-flex items-center gap-1 rounded-full font-medium ${variants[variant]} ${sizes[size]}`}>{icon && <Icon name={icon} className="w-3 h-3" />}{children}</span>;
    };

    const Button = ({ children, variant = 'primary', size = 'md', icon, className = '', ...props }) => {
      const variants = {
        primary: 'bg-gradient-to-r from-cyan-500 to-teal-500 text-white hover:from-cyan-400 hover:to-teal-400 shadow-lg shadow-cyan-500/25',
        secondary: 'bg-slate-700 text-white hover:bg-slate-600 border border-slate-600',
        ghost: 'bg-transparent text-slate-400 hover:text-white hover:bg-slate-700/50',
        success: 'bg-emerald-500 text-white hover:bg-emerald-400'
      };
      const sizes = { xs: 'px-2 py-1 text-xs', sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2 text-sm', lg: 'px-6 py-3 text-base' };
      return (
        <button className={`inline-flex items-center justify-center gap-2 font-semibold rounded-xl transition-all duration-200 ${variants[variant]} ${sizes[size]} ${className}`} {...props}>
          {icon && <Icon name={icon} className="w-4 h-4" />}{children}
        </button>
      );
    };

    // Match Score Component
    const MatchScore = ({ score }) => {
      const getColor = (s) => {
        if (s >= 90) return { bg: 'bg-emerald-500', text: 'text-emerald-400', glow: 'shadow-emerald-500/30' };
        if (s >= 80) return { bg: 'bg-cyan-500', text: 'text-cyan-400', glow: 'shadow-cyan-500/30' };
        if (s >= 70) return { bg: 'bg-amber-500', text: 'text-amber-400', glow: 'shadow-amber-500/30' };
        return { bg: 'bg-slate-500', text: 'text-slate-400', glow: '' };
      };
      const colors = getColor(score);
      return (
        <div className={`relative w-14 h-14 rounded-xl ${colors.bg}/20 flex items-center justify-center shadow-lg ${colors.glow}`}>
          <span className={`text-lg font-bold ${colors.text}`}>{score}</span>
          <div className={`absolute -top-1 -right-1 w-3 h-3 rounded-full ${colors.bg}`}></div>
        </div>
      );
    };

    // Opportunity Card
    const OpportunityCard = ({ opp, onTrack, onView }) => {
      const daysUntil = Math.ceil((new Date(opp.response_deadline) - new Date()) / (1000 * 60 * 60 * 24));
      const urgency = daysUntil <= 14 ? 'danger' : daysUntil <= 30 ? 'warning' : 'success';
      
      return (
        <div className="glass-card rounded-2xl p-5 hover:border-cyan-500/30 transition-all animate-slideIn">
          <div className="flex gap-4">
            <MatchScore score={opp.match_score} />
            <div className="flex-1 min-w-0">
              <div className="flex items-start justify-between gap-3 mb-2">
                <div>
                  <h3 className="font-semibold text-white text-lg leading-tight">{opp.title}</h3>
                  <p className="text-slate-400 text-sm mt-1">{opp.sub_tier || opp.department}</p>
                </div>
                <button 
                  onClick={() => onTrack(opp.id)}
                  className={`p-2 rounded-lg transition-all ${opp.is_tracked ? 'bg-amber-500/20 text-amber-400' : 'bg-slate-700/50 text-slate-400 hover:text-amber-400'}`}
                >
                  <Icon name={opp.is_tracked ? 'star' : 'starOutline'} className="w-5 h-5" />
                </button>
              </div>
              
              <div className="flex flex-wrap gap-2 mb-3">
                <Badge variant={urgency} icon="clock">{daysUntil}d left</Badge>
                <Badge variant="primary">{opp.set_aside_description || 'Full & Open'}</Badge>
                <Badge variant="default">{opp.naics_code}</Badge>
                <Badge variant="purple" icon="dollar">${(opp.estimated_value/1000000).toFixed(0)}M</Badge>
              </div>
              
              <p className="text-slate-400 text-sm line-clamp-2 mb-3">{opp.description}</p>
              
              <div className="flex flex-wrap gap-1.5 mb-3">
                {(opp.match_reasons || []).map((reason, i) => (
                  <span key={i} className="px-2 py-0.5 rounded bg-cyan-500/10 text-cyan-400 text-xs">{reason}</span>
                ))}
              </div>
              
              <div className="flex items-center justify-between pt-3 border-t border-slate-700/50">
                <div className="text-xs text-slate-500">
                  {opp.solicitation_number} • Posted {new Date(opp.posted_date).toLocaleDateString()}
                </div>
                <div className="flex gap-2">
                  <Button variant="ghost" size="xs" icon="link">SAM.gov</Button>
                  <Button variant="primary" size="xs" icon="arrowRight" onClick={() => onView(opp)}>Add to Pipeline</Button>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // Main App
    function SAMIntelligence() {
      const [opportunities, setOpportunities] = useState([]);
      const [loading, setLoading] = useState(true);
      const [searchTerm, setSearchTerm] = useState('');
      const [filters, setFilters] = useState({ setAside: 'all', minMatch: 0, tracked: false });
      const [selectedOpp, setSelectedOpp] = useState(null);
      const [syncing, setSyncing] = useState(false);

      // Load data
      useEffect(() => {
        const loadData = async () => {
          try {
            if (supabase) {
              const { data, error } = await supabase
                .from('sam_opportunities')
                .select('*')
                .order('match_score', { ascending: false });
              if (!error && data?.length > 0) {
                setOpportunities(data);
                setLoading(false);
                return;
              }
            }
          } catch (e) {
            console.log('Using demo data');
          }
          setOpportunities(DEMO_SAM_OPPORTUNITIES);
          setLoading(false);
        };
        loadData();
      }, []);

      // Filter opportunities
      const filteredOpps = useMemo(() => {
        return opportunities.filter(opp => {
          if (searchTerm && !opp.title.toLowerCase().includes(searchTerm.toLowerCase()) && 
              !opp.department?.toLowerCase().includes(searchTerm.toLowerCase())) return false;
          if (filters.setAside !== 'all' && opp.set_aside_code !== filters.setAside) return false;
          if (opp.match_score < filters.minMatch) return false;
          if (filters.tracked && !opp.is_tracked) return false;
          return true;
        });
      }, [opportunities, searchTerm, filters]);

      // Toggle track
      const handleTrack = (id) => {
        setOpportunities(prev => prev.map(o => o.id === id ? { ...o, is_tracked: !o.is_tracked } : o));
      };

      // Sync simulation
      const handleSync = () => {
        setSyncing(true);
        setTimeout(() => setSyncing(false), 2000);
      };

      // Stats
      const stats = useMemo(() => ({
        total: opportunities.length,
        tracked: opportunities.filter(o => o.is_tracked).length,
        highMatch: opportunities.filter(o => o.match_score >= 85).length,
        totalValue: opportunities.reduce((sum, o) => sum + (o.estimated_value || 0), 0)
      }), [opportunities]);

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="p-2 rounded-lg bg-slate-800/50 hover:bg-slate-700/50 transition-colors">
                    <Icon name="home" className="w-5 h-5 text-slate-400" />
                  </a>
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-500 to-teal-500 flex items-center justify-center">
                      <Icon name="globe" className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white">SAM.gov Intelligence</h1>
                      <p className="text-sm text-slate-400">Federal Opportunity Scanner</p>
                    </div>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <Badge variant="success" icon="check">Connected</Badge>
                  <Button variant="secondary" size="sm" icon="refresh" onClick={handleSync} disabled={syncing}>
                    {syncing ? 'Syncing...' : 'Sync Now'}
                  </Button>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8">
            {/* Stats */}
            <div className="grid grid-cols-4 gap-4 mb-8">
              {[
                { label: 'Total Opportunities', value: stats.total, icon: 'globe', color: 'cyan' },
                { label: 'Tracked', value: stats.tracked, icon: 'star', color: 'amber' },
                { label: 'High Match (85+)', value: stats.highMatch, icon: 'target', color: 'emerald' },
                { label: 'Pipeline Value', value: `$${(stats.totalValue/1000000000).toFixed(2)}B`, icon: 'dollar', color: 'purple' }
              ].map((stat, i) => (
                <div key={i} className="glass-card rounded-xl p-4">
                  <div className="flex items-center gap-3">
                    <div className={`w-10 h-10 rounded-lg bg-${stat.color}-500/20 flex items-center justify-center`}>
                      <Icon name={stat.icon} className={`w-5 h-5 text-${stat.color}-400`} />
                    </div>
                    <div>
                      <div className="text-2xl font-bold text-white">{stat.value}</div>
                      <div className="text-xs text-slate-400">{stat.label}</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* Search & Filters */}
            <div className="glass-card rounded-xl p-4 mb-6">
              <div className="flex flex-wrap gap-4">
                <div className="flex-1 min-w-[300px] relative">
                  <Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" />
                  <input
                    type="text"
                    placeholder="Search opportunities, agencies, NAICS..."
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                    className="w-full pl-10 pr-4 py-2.5 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500/50"
                  />
                </div>
                <select
                  value={filters.setAside}
                  onChange={(e) => setFilters(prev => ({ ...prev, setAside: e.target.value }))}
                  className="px-4 py-2.5 bg-slate-800/50 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-cyan-500/50"
                >
                  <option value="all">All Set-Asides</option>
                  <option value="SBA">Small Business</option>
                  <option value="SDVOSBC">SDVOSB</option>
                  <option value="8AN">8(a)</option>
                  <option value="NONE">Full & Open</option>
                </select>
                <select
                  value={filters.minMatch}
                  onChange={(e) => setFilters(prev => ({ ...prev, minMatch: Number(e.target.value) }))}
                  className="px-4 py-2.5 bg-slate-800/50 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-cyan-500/50"
                >
                  <option value={0}>All Match Scores</option>
                  <option value={90}>90+ Excellent</option>
                  <option value={80}>80+ Strong</option>
                  <option value={70}>70+ Good</option>
                </select>
                <button
                  onClick={() => setFilters(prev => ({ ...prev, tracked: !prev.tracked }))}
                  className={`px-4 py-2.5 rounded-xl flex items-center gap-2 transition-all ${filters.tracked ? 'bg-amber-500/20 text-amber-400 border border-amber-500/30' : 'bg-slate-800/50 text-slate-400 border border-slate-700'}`}
                >
                  <Icon name="star" className="w-4 h-4" /> Tracked Only
                </button>
              </div>
            </div>

            {/* Results */}
            <div className="flex items-center justify-between mb-4">
              <h2 className="text-lg font-semibold text-white">{filteredOpps.length} Opportunities</h2>
              <div className="text-sm text-slate-400">Sorted by Match Score</div>
            </div>

            {loading ? (
              <div className="flex items-center justify-center py-20">
                <div className="w-8 h-8 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
              </div>
            ) : (
              <div className="space-y-4">
                {filteredOpps.map(opp => (
                  <OpportunityCard 
                    key={opp.id} 
                    opp={opp} 
                    onTrack={handleTrack}
                    onView={setSelectedOpp}
                  />
                ))}
                {filteredOpps.length === 0 && (
                  <div className="text-center py-20 text-slate-400">
                    No opportunities match your filters
                  </div>
                )}
              </div>
            )}
          </main>

          {/* Detail Modal */}
          {selectedOpp && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-6" onClick={() => setSelectedOpp(null)}>
              <div className="glass-card rounded-2xl p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                <div className="flex justify-between items-start mb-4">
                  <h2 className="text-xl font-bold text-white">{selectedOpp.title}</h2>
                  <button onClick={() => setSelectedOpp(null)} className="p-2 rounded-lg bg-slate-700/50 text-slate-400 hover:text-white">
                    <Icon name="x" className="w-5 h-5" />
                  </button>
                </div>
                <div className="space-y-4">
                  <div className="grid grid-cols-2 gap-4">
                    <div className="glass rounded-lg p-3">
                      <div className="text-xs text-slate-400 mb-1">Solicitation</div>
                      <div className="text-white font-medium">{selectedOpp.solicitation_number}</div>
                    </div>
                    <div className="glass rounded-lg p-3">
                      <div className="text-xs text-slate-400 mb-1">Estimated Value</div>
                      <div className="text-white font-medium">${(selectedOpp.estimated_value/1000000).toFixed(1)}M</div>
                    </div>
                    <div className="glass rounded-lg p-3">
                      <div className="text-xs text-slate-400 mb-1">Response Deadline</div>
                      <div className="text-white font-medium">{new Date(selectedOpp.response_deadline).toLocaleDateString()}</div>
                    </div>
                    <div className="glass rounded-lg p-3">
                      <div className="text-xs text-slate-400 mb-1">NAICS Code</div>
                      <div className="text-white font-medium">{selectedOpp.naics_code}</div>
                    </div>
                  </div>
                  <div className="glass rounded-lg p-3">
                    <div className="text-xs text-slate-400 mb-1">Description</div>
                    <div className="text-slate-300">{selectedOpp.description}</div>
                  </div>
                  <div className="flex gap-3">
                    <Button variant="secondary" className="flex-1" icon="link">View on SAM.gov</Button>
                    <Button variant="primary" className="flex-1" icon="arrowRight">Add to Pipeline</Button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <footer className="glass border-t border-slate-700/50 mt-12">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-2 text-slate-400 text-sm">
                <Icon name="shield" className="w-4 h-4" />
                <span>Mission Meets Tech • MissionPulse v12</span>
              </div>
              <div className="text-xs text-slate-500">Last sync: {new Date().toLocaleString()}</div>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<SAMIntelligence />);
  </script>
</body>
</html>
