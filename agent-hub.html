<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-cyan: #00E5FA;
      --deep-navy: #00050F;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--deep-navy); min-height: 100vh; color: #fff; }
    
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes typing { from { width: 0; } to { width: 100%; } }
    @keyframes blink { 50% { border-color: transparent; } }
    
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
    
    .glass-nav {
      background: rgba(0, 5, 15, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0, 229, 250, 0.1);
    }
    
    .typing-indicator::after {
      content: '|';
      animation: blink 1s step-end infinite;
    }
    
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0A1628; }
    ::-webkit-scrollbar-thumb { background: rgba(0, 229, 250, 0.3); border-radius: 4px; }
  </style>
</head>

    const Icon = ({ name, className = "w-5 h-5" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-flex items-center justify-center ${className}`}><IconComponent /></span> : null;
    };

    // Auth Context
    const AuthContext = createContext(null);
    const useAuth = () => useContext(AuthContext);

    const AuthProvider = ({ children }) => {
      const [currentRole, setCurrentRole] = useState('executive');
      const [user] = useState({ name: 'Mary Womack', email: 'mary@missionpulse.io' });

      const hasAccess = useCallback((allowedRoles) => {
        if (allowedRoles.includes('all')) return true;
        if (allowedRoles.includes('admin') && ROLES[currentRole]?.canAccessAdmin) return true;
        if (allowedRoles.includes('internal') && !['teaming_partner', 'subcontractor'].includes(currentRole)) return true;
        return allowedRoles.includes(currentRole);
      }, [currentRole]);

      return (
        <AuthContext.Provider value={{ currentRole, setCurrentRole, user, hasAccess, roleInfo: ROLES[currentRole] }}>
          {children}
        </AuthContext.Provider>
      );
    };

    // Badge Component
    const Badge = ({ children, variant = 'default', size = 'sm', icon, pulse = false }) => {
      const variants = {
        default: 'bg-slate-700/50 text-slate-300 border-slate-600/50',
        primary: 'bg-cyan-500/20 text-cyan-400 border-cyan-500/30',
        success: 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30',
        warning: 'bg-amber-500/20 text-amber-400 border-amber-500/30',
        danger: 'bg-red-500/20 text-red-400 border-red-500/30',
      };
      const sizes = { xs: 'px-1.5 py-0.5 text-xs', sm: 'px-2 py-1 text-xs', md: 'px-3 py-1.5 text-sm' };
      return (
        <span className={`inline-flex items-center gap-1.5 rounded-full font-medium border ${variants[variant]} ${sizes[size]} ${pulse ? 'animate-pulse' : ''}`}>
          {icon && <Icon name={icon} className="w-3 h-3" />}
          {children}
        </span>
      );
    };

    // Button Component
    const Button = ({ children, variant = 'primary', size = 'md', icon, disabled, loading, className = '', ...props }) => {
      const variants = {
        primary: 'bg-gradient-to-r from-cyan-500 to-teal-500 text-white hover:from-cyan-400 hover:to-teal-400 shadow-lg shadow-cyan-500/25',
        secondary: 'bg-slate-700/50 text-white hover:bg-slate-600/50 border border-slate-600/50',
        ghost: 'text-slate-400 hover:text-white hover:bg-slate-700/50',
      };
      const sizes = { xs: 'px-2 py-1 text-xs', sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2 text-sm', lg: 'px-6 py-3 text-base' };
      return (
        <button className={`inline-flex items-center justify-center gap-2 font-semibold rounded-xl transition-all duration-200 ${variants[variant]} ${sizes[size]} ${disabled || loading ? 'opacity-50 cursor-not-allowed' : ''} ${className}`} disabled={disabled || loading} {...props}>
          {icon && <Icon name={icon} className="w-4 h-4" />}
          {children}
        </button>
      );
    };

    // Card Component
    const Card = ({ children, className = '', glow = false, onClick }) => (
      <div onClick={onClick} className={`bg-slate-800/50 backdrop-blur-sm border border-slate-700/50 rounded-2xl transition-all duration-300 ${onClick ? 'cursor-pointer hover:border-cyan-500/50' : ''} ${glow ? 'shadow-lg shadow-cyan-500/20 border-cyan-500/30' : ''} ${className}`}>
        {children}
      </div>
    );

    // Navigation Header
    const NavigationHeader = ({ currentPage = 'agents' }) => {
      const { currentRole, setCurrentRole, user, hasAccess, roleInfo } = useAuth();
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [profileOpen, setProfileOpen] = useState(false);

      const accessibleNavItems = NAV_ITEMS.filter(item => hasAccess(item.roles));

      return (
        <>
          <nav className="glass-nav fixed top-0 left-0 right-0 z-50 px-4 lg:px-6">
            <div className="max-w-7xl mx-auto">
              <div className="flex items-center justify-between h-16">
                <a href="index.html" className="flex items-center gap-3 group">
                  <div className="relative">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-500 to-teal-500 flex items-center justify-center shadow-lg shadow-cyan-500/30">
                      <Icon name="shield" className="w-6 h-6 text-white" />
                    </div>
                    <div className="absolute -top-1 -right-1 w-3 h-3 bg-emerald-500 rounded-full border-2 border-slate-900"></div>
                  </div>
                  <div className="hidden sm:block">
                    <div className="text-lg font-bold text-white">MissionPulse</div>
                    <div className="text-xs text-cyan-400 -mt-0.5">v1.1 Production</div>
                  </div>
                </a>

                <div className="hidden lg:flex items-center gap-1">
                  {accessibleNavItems.slice(0, 6).map(item => (
                    <a key={item.id} href={item.href} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition-all duration-200 ${currentPage === item.id ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' : 'text-slate-400 hover:text-white hover:bg-slate-700/50'}`}>
                      <Icon name={item.icon} className="w-4 h-4" />
                      {item.name}
                    </a>
                  ))}
                </div>

                <div className="flex items-center gap-2">
                  <button className="p-2 rounded-xl text-slate-400 hover:text-white hover:bg-slate-700/50">
                    <Icon name="search" className="w-5 h-5" />
                  </button>
                  <button className="relative p-2 rounded-xl text-slate-400 hover:text-white hover:bg-slate-700/50">
                    <Icon name="bell" className="w-5 h-5" />
                    <span className="absolute top-1 right-1 w-2 h-2 bg-cyan-500 rounded-full"></span>
                  </button>
                  <div className="hidden md:flex items-center gap-2 px-3 py-1.5 rounded-xl bg-slate-700/50 border border-slate-600/50">
                    <Icon name="dollar" className="w-4 h-4 text-emerald-400" />
                    <span className="text-xs font-mono text-slate-300">$0.0234</span>
                  </div>
                  <div className="relative">
                    <button onClick={() => setProfileOpen(!profileOpen)} className="flex items-center gap-2 p-1.5 rounded-xl hover:bg-slate-700/50">
                      <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center text-white text-sm font-bold">
                        {user.name.charAt(0)}
                      </div>
                    </button>
                    {profileOpen && (
                      <div className="absolute right-0 top-full mt-2 w-72 py-3 bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl animate-fade-in z-50">
                        <div className="px-4 pb-3 border-b border-slate-700">
                          <div className="font-semibold text-white">{user.name}</div>
                          <div className="text-sm text-slate-400">{user.email}</div>
                        </div>
                        <div className="px-4 py-3">
                          <div className="text-xs text-slate-500 uppercase mb-2">Switch Role</div>
                          <select value={currentRole} onChange={(e) => setCurrentRole(e.target.value)} className="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm text-white">
                            {Object.entries(ROLES).map(([id, role]) => (
                              <option key={id} value={id}>{role.name}</option>
                            ))}
                          </select>
                        </div>
                      </div>
                    )}
                  </div>
                  <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="lg:hidden p-2 rounded-xl text-slate-400 hover:text-white hover:bg-slate-700/50">
                    <Icon name={mobileMenuOpen ? 'x' : 'menu'} className="w-6 h-6" />
                  </button>
                </div>
              </div>
            </div>
          </nav>

          {mobileMenuOpen && (
            <div className="lg:hidden fixed inset-0 z-40 pt-16">
              <div className="absolute inset-0 bg-black/60" onClick={() => setMobileMenuOpen(false)} />
              <div className="relative bg-slate-900 border-t border-slate-800 p-4 space-y-1 animate-fade-in">
                {accessibleNavItems.map(item => (
                  <a key={item.id} href={item.href} className={`flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium ${currentPage === item.id ? 'bg-cyan-500/20 text-cyan-400' : 'text-slate-400 hover:text-white hover:bg-slate-700/50'}`}>
                    <Icon name={item.icon} className="w-5 h-5" />
                    {item.name}
                  </a>
                ))}
              </div>
            </div>
          )}
          {profileOpen && <div className="fixed inset-0 z-40" onClick={() => setProfileOpen(false)} />}
        </>
      );
    };

    // Liability Footer
    const LiabilityFooter = () => (
      <div className="fixed bottom-0 left-0 right-0 py-2 px-4 bg-slate-900/95 backdrop-blur-sm border-t border-slate-800 z-30">
        <div className="max-w-7xl mx-auto flex items-center justify-between text-xs">
          <span className="text-amber-400 font-medium">AI GENERATED - REQUIRES HUMAN REVIEW</span>
          <span className="text-cyan-500 hidden sm:block">Mission. Technology. Transformation.</span>
        </div>
      </div>
    );

    // ============================================
    // AGENT HUB SPECIFIC COMPONENTS
    // ============================================
    const AgentCard = ({ agent, isSelected, onClick }) => {
      const { roleInfo } = useAuth();
      const isRestricted = agent.restricted && !roleInfo?.canAccessAdmin;

      return (
        <Card
          onClick={() => !isRestricted && onClick(agent)}
          className={`p-4 transition-all duration-300 ${isSelected ? 'ring-2 ring-cyan-500 bg-cyan-500/10' : ''} ${isRestricted ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer hover:border-cyan-500/50'}`}
        >
          <div className="flex items-start justify-between mb-3">
            <div className="p-3 rounded-xl" style={{ backgroundColor: `${agent.color}20` }}>
              <Icon name={agent.icon} className="w-6 h-6" style={{ color: agent.color }} />
            </div>
            <div className="flex items-center gap-2">
              {isRestricted && <Icon name="lock" className="w-4 h-4 text-slate-500" />}
              <Badge variant={agent.status === 'online' ? 'success' : 'warning'} size="xs">
                {agent.status}
              </Badge>
            </div>
          </div>
          <h3 className="text-lg font-semibold text-white mb-1">{agent.name}</h3>
          <p className="text-sm text-slate-400 mb-3 line-clamp-2">{agent.description}</p>
          <div className="flex flex-wrap gap-1">
            {agent.capabilities.slice(0, 2).map((cap, i) => (
              <Badge key={i} variant="default" size="xs">{cap}</Badge>
            ))}
            {agent.capabilities.length > 2 && (
              <Badge variant="default" size="xs">+{agent.capabilities.length - 2}</Badge>
            )}
          </div>
        </Card>
      );
    };

    const ChatInterface = ({ agent, onClose }) => {
      const [messages, setMessages] = useState([
        { role: 'assistant', content: `Hello! I'm ${agent.name}. ${agent.description} How can I assist you today?` }
      ]);
      const [input, setInput] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const messagesEndRef = useRef(null);

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
      };

      useEffect(() => {
        scrollToBottom();
      }, [messages]);

      const handleSend = async () => {
        if (!input.trim()) return;

        const userMessage = { role: 'user', content: input };
        setMessages(prev => [...prev, userMessage]);
        setInput('');
        setIsTyping(true);

        // Simulate API response
        setTimeout(() => {
          const responses = {
            capture: "Based on my analysis of the opportunity, I've identified key discriminators and win themes. The incumbent has a strong relationship but shows signs of performance gaps in recent CPARS ratings...",
            strategy: "I recommend focusing on three core win themes: 1) Technical Excellence through our proven MHS GENESIS experience, 2) Risk Mitigation via our CMMI Level 3 processes, and 3) Mission Alignment with DHA's modernization goals...",
            blackhat: "⚠️ COMPETITIVE INTELLIGENCE: The primary competitor likely to bid is TechHealth Partners. Their weakness is recent staff turnover in the PMO. Counter-position by emphasizing your team stability and past performance...",
            writer: "Here's a draft executive summary:\n\n**Mission Meets Tech** brings unparalleled expertise to this critical healthcare IT modernization effort. Our approach centers on three pillars: proven DHA partnership, technical innovation, and mission alignment...",
            compliance: "✅ COMPLIANCE CHECK COMPLETE\n\nSection L Requirements: 28/30 addressed\nSection M Criteria: All evaluation factors covered\n\n⚠️ GAP IDENTIFIED: Section 3.2 Training Plan needs additional detail on CBT methodology...",
            pricing: "Based on market analysis and your labor rates, I recommend a blended rate of $142/hr for the Technical Lead position. This positions you 8% below the expected government estimate while maintaining healthy margins...",
            contracts: "RISK ALERT: Clause H.12 includes a non-standard limitation of liability provision. Recommend negotiating to cap at contract value rather than the proposed $5M...",
            orals: "For your oral presentation, I suggest leading with the 'Day 1 Ready' theme. Practice these key talking points:\n1. Our team has supported DHA since 2015\n2. Zero security incidents in 8 years\n3. 98% customer satisfaction rating..."
          };
          
          setMessages(prev => [...prev, {
            role: 'assistant',
            content: responses[agent.id] || "I'm analyzing your request. Let me provide a comprehensive response based on my specialized knowledge..."
          }]);
          setIsTyping(false);
        }, 1500);
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" onClick={onClose} />
          <div className="relative w-full max-w-3xl h-[80vh] bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl flex flex-col animate-fade-in">
            {/* Header */}
            <div className="flex items-center justify-between p-4 border-b border-slate-700">
              <div className="flex items-center gap-3">
                <div className="p-2 rounded-xl" style={{ backgroundColor: `${agent.color}20` }}>
                  <Icon name={agent.icon} className="w-6 h-6" style={{ color: agent.color }} />
                </div>
                <div>
                  <h2 className="text-lg font-semibold text-white">{agent.name}</h2>
                  <div className="flex items-center gap-2">
                    <span className="w-2 h-2 bg-emerald-500 rounded-full"></span>
                    <span className="text-xs text-slate-400">Online • Context Loaded</span>
                  </div>
                </div>
              </div>
              <button onClick={onClose} className="p-2 rounded-xl text-slate-400 hover:text-white hover:bg-slate-700/50">
                <Icon name="x" className="w-5 h-5" />
              </button>
            </div>

            {/* Messages */}
            <div className="flex-1 overflow-y-auto p-4 space-y-4">
              {messages.map((msg, i) => (
                <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                  <div className={`max-w-[80%] p-4 rounded-2xl ${msg.role === 'user' ? 'bg-cyan-500/20 text-white' : 'bg-slate-800 text-slate-200'}`}>
                    <p className="whitespace-pre-wrap text-sm">{msg.content}</p>
                  </div>
                </div>
              ))}
              {isTyping && (
                <div className="flex justify-start">
                  <div className="bg-slate-800 p-4 rounded-2xl">
                    <span className="typing-indicator text-slate-400 text-sm">Thinking</span>
                  </div>
                </div>
              )}
              <div ref={messagesEndRef} />
            </div>

            {/* Input */}
            <div className="p-4 border-t border-slate-700">
              <div className="flex items-center gap-3">
                <input
                  type="text"
                  value={input}
                  onChange={(e) => setInput(e.target.value)}
                  onKeyPress={(e) => e.key === 'Enter' && handleSend()}
                  placeholder={`Ask ${agent.name}...`}
                  className="flex-1 px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500"
                />
                <Button onClick={handleSend} icon="send" disabled={!input.trim() || isTyping}>
                  Send
                </Button>
              </div>
              <p className="mt-2 text-xs text-amber-400 text-center">AI GENERATED - REQUIRES HUMAN REVIEW</p>
            </div>
          </div>
        </div>
      );
    };

    // ============================================
    // MAIN AGENT HUB CONTENT
    // ============================================
    const AgentHubContent = () => {
      const [selectedAgent, setSelectedAgent] = useState(null);
      const [chatAgent, setChatAgent] = useState(null);
      const [filter, setFilter] = useState('all');

      const categories = [
        { id: 'all', name: 'All Agents', count: AI_AGENTS.length },
        { id: 'strategy', name: 'Strategy', count: AI_AGENTS.filter(a => a.category === 'strategy').length },
        { id: 'intelligence', name: 'Intelligence', count: AI_AGENTS.filter(a => a.category === 'intelligence').length },
        { id: 'production', name: 'Production', count: AI_AGENTS.filter(a => a.category === 'production').length },
        { id: 'compliance', name: 'Compliance', count: AI_AGENTS.filter(a => a.category === 'compliance').length },
        { id: 'pricing', name: 'Pricing', count: AI_AGENTS.filter(a => a.category === 'pricing').length },
      ];

      const filteredAgents = filter === 'all' ? AI_AGENTS : AI_AGENTS.filter(a => a.category === filter);

      return (
        <div className="space-y-6">
          {/* Header */}
          <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
              <h1 className="text-2xl font-bold text-white mb-1">AI Agent Hub</h1>
              <p className="text-slate-400">8 specialized agents with company context injection</p>
            </div>
            <div className="flex items-center gap-3">
              <Badge variant="success" size="md" icon="zap">All Systems Online</Badge>
            </div>
          </div>

          {/* Category Filter */}
          <div className="flex flex-wrap gap-2">
            {categories.map(cat => (
              <button
                key={cat.id}
                onClick={() => setFilter(cat.id)}
                className={`px-4 py-2 rounded-xl text-sm font-medium transition-all ${filter === cat.id ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' : 'text-slate-400 hover:text-white hover:bg-slate-700/50 border border-transparent'}`}
              >
                {cat.name} ({cat.count})
              </button>
            ))}
          </div>

          {/* Agent Grid */}
          <div className="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            {filteredAgents.map(agent => (
              <AgentCard
                key={agent.id}
                agent={agent}
                isSelected={selectedAgent?.id === agent.id}
                onClick={(a) => {
                  setSelectedAgent(a);
                  setChatAgent(a);
                }}
              />
            ))}
          </div>

          {/* Agent Details Panel */}
          {selectedAgent && !chatAgent && (
            <Card className="p-6">
              <div className="flex items-start justify-between mb-4">
                <div className="flex items-center gap-4">
                  <div className="p-4 rounded-xl" style={{ backgroundColor: `${selectedAgent.color}20` }}>
                    <Icon name={selectedAgent.icon} className="w-8 h-8" style={{ color: selectedAgent.color }} />
                  </div>
                  <div>
                    <h2 className="text-xl font-bold text-white">{selectedAgent.name}</h2>
                    <p className="text-slate-400">{selectedAgent.description}</p>
                  </div>
                </div>
                <Button onClick={() => setChatAgent(selectedAgent)} icon="send">
                  Start Chat
                </Button>
              </div>
              
              <div className="grid md:grid-cols-2 gap-6">
                <div>
                  <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Capabilities</h3>
                  <div className="space-y-2">
                    {selectedAgent.capabilities.map((cap, i) => (
                      <div key={i} className="flex items-center gap-3 p-2 rounded-lg bg-slate-700/30">
                        <Icon name="zap" className="w-4 h-4 text-cyan-400" />
                        <span className="text-sm text-white">{cap}</span>
                      </div>
                    ))}
                  </div>
                </div>
                <div>
                  <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Context Injection</h3>
                  <div className="space-y-2">
                    {['Company Profile', 'Win Themes', 'Labor Rates', 'Past Performance'].map((item, i) => (
                      <div key={i} className="flex items-center gap-3 p-2 rounded-lg bg-emerald-500/10 border border-emerald-500/20">
                        <Icon name="shield" className="w-4 h-4 text-emerald-400" />
                        <span className="text-sm text-emerald-300">{item}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </Card>
          )}

          {/* Chat Interface */}
          {chatAgent && (
            <ChatInterface agent={chatAgent} onClose={() => setChatAgent(null)} />
          )}
        </div>
      );
    };

    // ============================================
    // MAIN APP
    // ============================================
    const App = () => (
      <AuthProvider>
        <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-900 to-slate-800">
          <NavigationHeader currentPage="agents" />
          <main className="pt-20 pb-16 px-4 lg:px-6">
            <div className="max-w-7xl mx-auto">
              <AgentHubContent />
            </div>
          </main>
          <LiabilityFooter />
        </div>
      </AuthProvider>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
