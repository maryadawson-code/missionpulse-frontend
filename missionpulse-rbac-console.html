<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBAC Console | MissionPulse</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(0, 5, 15, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.2); }
        .glow { box-shadow: 0 0 30px rgba(0, 229, 250, 0.3); }
        .cyber-grid { background-image: linear-gradient(rgba(0, 229, 250, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 250, 0.03) 1px, transparent 1px); background-size: 50px 50px; }
    </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen cyber-grid">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc4MjMwMjgsImV4cCI6MjA1MzM5OTAyOH0.S0LKvPzVIfBsLv-2qjXRdMGhnYyRLvOFlo9ihaQuqHE';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const MODULES = [
            'Dashboard', 'Pipeline', 'War Room', 'Swimlane', 'RFP Shredder', 
            'Contract Scanner', 'Iron Dome', 'Black Hat', 'Pricing', 'HITL',
            'Orals', 'Playbook', 'Frenemy', 'Launch', 'Post-Award', 'Agent Hub'
        ];

        const PERMISSIONS = ['view', 'create', 'edit', 'delete', 'admin'];

        const DEMO_ROLES = [
            { id: 1, name: 'CEO', description: 'Full system access, final Go/No-Go authority', color: '#00E5FA', is_system: true },
            { id: 2, name: 'COO', description: 'Capture oversight, resource allocation', color: '#8B5CF6', is_system: true },
            { id: 3, name: 'Capture Manager', description: 'Win strategy, competitive intelligence', color: '#F59E0B', is_system: false },
            { id: 4, name: 'Proposal Manager', description: 'Schedule management, team coordination', color: '#10B981', is_system: false },
            { id: 5, name: 'Solutions Architect', description: 'Technical approach, compliance mapping', color: '#3B82F6', is_system: false },
            { id: 6, name: 'Finance Lead', description: 'Pricing, BOE development', color: '#EF4444', is_system: false },
            { id: 7, name: 'Contracts Specialist', description: 'FAR/DFARS compliance, terms negotiation', color: '#EC4899', is_system: false },
            { id: 8, name: 'Partner', description: 'Limited access to shared opportunities', color: '#6B7280', is_system: false },
        ];

        const DEMO_PERMISSIONS = {
            1: MODULES.reduce((acc, m) => ({ ...acc, [m]: ['view', 'create', 'edit', 'delete', 'admin'] }), {}),
            2: MODULES.reduce((acc, m) => ({ ...acc, [m]: m === 'Black Hat' ? ['view', 'create', 'edit', 'delete'] : ['view', 'create', 'edit', 'delete', 'admin'] }), {}),
            3: { 'Dashboard': ['view'], 'Pipeline': ['view', 'create', 'edit'], 'War Room': ['view', 'edit'], 'Swimlane': ['view'], 'RFP Shredder': ['view', 'edit'], 'Contract Scanner': ['view'], 'Iron Dome': ['view', 'edit'], 'Black Hat': ['view', 'create', 'edit'], 'Pricing': [], 'HITL': ['view'], 'Orals': ['view', 'edit'], 'Playbook': ['view', 'edit'], 'Frenemy': ['view', 'create', 'edit'], 'Launch': ['view'], 'Post-Award': ['view'], 'Agent Hub': ['view'] },
            4: { 'Dashboard': ['view'], 'Pipeline': ['view', 'edit'], 'War Room': ['view', 'create', 'edit'], 'Swimlane': ['view', 'create', 'edit', 'delete'], 'RFP Shredder': ['view', 'edit'], 'Contract Scanner': ['view'], 'Iron Dome': ['view'], 'Black Hat': [], 'Pricing': [], 'HITL': ['view', 'edit'], 'Orals': ['view', 'edit'], 'Playbook': ['view', 'edit'], 'Frenemy': ['view'], 'Launch': ['view', 'edit'], 'Post-Award': ['view'], 'Agent Hub': ['view'] },
            8: { 'Dashboard': ['view'], 'Pipeline': ['view'], 'War Room': [], 'Swimlane': ['view'], 'RFP Shredder': [], 'Contract Scanner': [], 'Iron Dome': [], 'Black Hat': [], 'Pricing': [], 'HITL': [], 'Orals': [], 'Playbook': [], 'Frenemy': [], 'Launch': [], 'Post-Award': [], 'Agent Hub': [] },
        };

        const DEMO_USERS = [
            { id: 1, email: 'mary@missionmeetstech.com', name: 'Mary Womack', role_id: 1, last_active: '2025-02-02T11:30:00Z' },
            { id: 2, email: 'sarah@missionmeetstech.com', name: 'Sarah Chen', role_id: 2, last_active: '2025-02-02T10:15:00Z' },
            { id: 3, email: 'james@missionmeetstech.com', name: 'James Rodriguez', role_id: 3, last_active: '2025-02-01T16:45:00Z' },
            { id: 4, email: 'emily@missionmeetstech.com', name: 'Emily Watson', role_id: 4, last_active: '2025-02-02T09:00:00Z' },
            { id: 5, email: 'partner@acme.gov', name: 'Acme Gov Services', role_id: 8, last_active: '2025-01-30T14:00:00Z' },
        ];

        function RBACConsole() {
            const [roles, setRoles] = useState([]);
            const [users, setUsers] = useState([]);
            const [permissions, setPermissions] = useState({});
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('roles');
            const [selectedRole, setSelectedRole] = useState(null);
            const [showRoleModal, setShowRoleModal] = useState(false);
            const [showUserModal, setShowUserModal] = useState(false);
            const [roleForm, setRoleForm] = useState({ name: '', description: '', color: '#00E5FA' });
            const [userForm, setUserForm] = useState({ email: '', name: '', role_id: 1 });

            useEffect(() => {
                fetchData();
            }, []);

            async function fetchData() {
                try {
                    const [rolesRes, usersRes] = await Promise.all([
                        supabase.from('custom_roles').select('*').order('name'),
                        supabase.from('users').select('*, custom_roles(name)').order('name')
                    ]);
                    setRoles(rolesRes.data?.length ? rolesRes.data : DEMO_ROLES);
                    setUsers(usersRes.data?.length ? usersRes.data : DEMO_USERS);
                    setPermissions(DEMO_PERMISSIONS);
                } catch (err) {
                    console.log('Using demo data');
                    setRoles(DEMO_ROLES);
                    setUsers(DEMO_USERS);
                    setPermissions(DEMO_PERMISSIONS);
                } finally {
                    setLoading(false);
                }
            }

            async function saveRole() {
                try {
                    if (selectedRole) {
                        await supabase.from('custom_roles').update(roleForm).eq('id', selectedRole.id);
                    } else {
                        await supabase.from('custom_roles').insert([{ ...roleForm, is_system: false }]);
                    }
                    fetchData();
                } catch (err) {
                    if (selectedRole) {
                        setRoles(roles.map(r => r.id === selectedRole.id ? { ...r, ...roleForm } : r));
                    } else {
                        setRoles([...roles, { ...roleForm, id: Date.now(), is_system: false }]);
                    }
                }
                setShowRoleModal(false);
                setSelectedRole(null);
            }

            async function deleteRole(id) {
                const role = roles.find(r => r.id === id);
                if (role?.is_system) return alert('Cannot delete system roles');
                if (!confirm('Delete this role?')) return;
                try {
                    await supabase.from('custom_roles').delete().eq('id', id);
                    fetchData();
                } catch (err) {
                    setRoles(roles.filter(r => r.id !== id));
                }
            }

            async function togglePermission(roleId, module, permission) {
                const current = permissions[roleId]?.[module] || [];
                const updated = current.includes(permission) 
                    ? current.filter(p => p !== permission)
                    : [...current, permission];
                
                setPermissions({
                    ...permissions,
                    [roleId]: { ...permissions[roleId], [module]: updated }
                });

                try {
                    await supabase.from('role_permissions').upsert({
                        role_id: roleId,
                        module: module,
                        permissions: updated
                    });
                } catch (err) {
                    console.log('Demo mode - permission saved locally');
                }
            }

            async function saveUser() {
                try {
                    await supabase.from('users').insert([userForm]);
                    fetchData();
                } catch (err) {
                    setUsers([...users, { ...userForm, id: Date.now(), last_active: new Date().toISOString() }]);
                }
                setShowUserModal(false);
                setUserForm({ email: '', name: '', role_id: 1 });
            }

            async function updateUserRole(userId, newRoleId) {
                try {
                    await supabase.from('users').update({ role_id: newRoleId }).eq('id', userId);
                    fetchData();
                } catch (err) {
                    setUsers(users.map(u => u.id === userId ? { ...u, role_id: newRoleId } : u));
                }
            }

            function openRoleModal(role = null) {
                setSelectedRole(role);
                setRoleForm(role || { name: '', description: '', color: '#00E5FA' });
                setShowRoleModal(true);
            }

            const getRoleById = (id) => roles.find(r => r.id === id);

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-[#00E5FA] text-xl">Loading RBAC Console...</div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-6">
                    {/* Header */}
                    <div className="flex items-center justify-between mb-8">
                        <div>
                            <h1 className="text-3xl font-bold text-white flex items-center gap-3">
                                <span className="text-4xl">🔐</span> RBAC Console
                            </h1>
                            <p className="text-gray-400 mt-1">Role-Based Access Control Management</p>
                        </div>
                    </div>

                    {/* Tabs */}
                    <div className="flex gap-2 mb-6">
                        {['roles', 'permissions', 'users'].map((tab) => (
                            <button key={tab} onClick={() => setActiveTab(tab)}
                                className={`px-6 py-2 rounded-lg font-medium transition ${
                                    activeTab === tab 
                                        ? 'bg-[#00E5FA] text-[#00050F]' 
                                        : 'bg-[#00E5FA]/10 text-[#00E5FA] hover:bg-[#00E5FA]/20'
                                }`}>
                                {tab.charAt(0).toUpperCase() + tab.slice(1)}
                            </button>
                        ))}
                    </div>

                    {/* Roles Tab */}
                    {activeTab === 'roles' && (
                        <div>
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-xl font-semibold text-white">System Roles</h2>
                                <button onClick={() => openRoleModal()} className="px-4 py-2 bg-[#00E5FA] text-[#00050F] font-semibold rounded-lg hover:bg-[#00E5FA]/80">
                                    + Create Role
                                </button>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                {roles.map((role) => (
                                    <div key={role.id} className="glass rounded-xl p-5 hover:glow transition-all">
                                        <div className="flex items-start justify-between">
                                            <div className="flex items-center gap-3">
                                                <div className="w-4 h-4 rounded-full" style={{ backgroundColor: role.color }}></div>
                                                <div>
                                                    <h3 className="font-semibold text-white flex items-center gap-2">
                                                        {role.name}
                                                        {role.is_system && <span className="text-xs bg-[#00E5FA]/20 text-[#00E5FA] px-2 py-0.5 rounded">SYSTEM</span>}
                                                    </h3>
                                                    <p className="text-gray-400 text-sm mt-1">{role.description}</p>
                                                </div>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => openRoleModal(role)} className="text-[#00E5FA] hover:text-white text-sm">Edit</button>
                                                {!role.is_system && (
                                                    <button onClick={() => deleteRole(role.id)} className="text-red-400 hover:text-red-300 text-sm">Delete</button>
                                                )}
                                            </div>
                                        </div>
                                        <div className="mt-4 flex gap-2">
                                            <span className="text-xs text-gray-500">{users.filter(u => u.role_id === role.id).length} users assigned</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Permissions Tab */}
                    {activeTab === 'permissions' && (
                        <div>
                            <h2 className="text-xl font-semibold text-white mb-4">Permission Matrix</h2>
                            <div className="glass rounded-xl overflow-hidden">
                                <div className="overflow-x-auto">
                                    <table className="w-full">
                                        <thead>
                                            <tr className="bg-[#00E5FA]/10">
                                                <th className="text-left p-4 text-[#00E5FA] font-semibold sticky left-0 bg-[#00050F]/90">Module</th>
                                                {roles.slice(0, 5).map((role) => (
                                                    <th key={role.id} className="text-center p-4 min-w-[140px]">
                                                        <div className="flex items-center justify-center gap-2">
                                                            <div className="w-3 h-3 rounded-full" style={{ backgroundColor: role.color }}></div>
                                                            <span className="text-white font-medium">{role.name}</span>
                                                        </div>
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {MODULES.map((module) => (
                                                <tr key={module} className="border-t border-[#00E5FA]/10 hover:bg-[#00E5FA]/5">
                                                    <td className="p-4 text-white font-medium sticky left-0 bg-[#00050F]/90">{module}</td>
                                                    {roles.slice(0, 5).map((role) => {
                                                        const perms = permissions[role.id]?.[module] || [];
                                                        return (
                                                            <td key={role.id} className="p-3 text-center">
                                                                <div className="flex flex-wrap gap-1 justify-center">
                                                                    {PERMISSIONS.map((perm) => (
                                                                        <button key={perm} onClick={() => togglePermission(role.id, module, perm)}
                                                                            className={`px-2 py-1 rounded text-xs font-medium transition ${
                                                                                perms.includes(perm)
                                                                                    ? 'bg-[#00E5FA]/30 text-[#00E5FA]'
                                                                                    : 'bg-gray-700/30 text-gray-500 hover:bg-gray-600/30'
                                                                            }`}>
                                                                            {perm.charAt(0).toUpperCase()}
                                                                        </button>
                                                                    ))}
                                                                </div>
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            <div className="mt-4 flex gap-6 text-sm text-gray-400">
                                <span><strong className="text-[#00E5FA]">V</strong>=View</span>
                                <span><strong className="text-[#00E5FA]">C</strong>=Create</span>
                                <span><strong className="text-[#00E5FA]">E</strong>=Edit</span>
                                <span><strong className="text-[#00E5FA]">D</strong>=Delete</span>
                                <span><strong className="text-[#00E5FA]">A</strong>=Admin</span>
                            </div>
                        </div>
                    )}

                    {/* Users Tab */}
                    {activeTab === 'users' && (
                        <div>
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-xl font-semibold text-white">User Assignments</h2>
                                <button onClick={() => setShowUserModal(true)} className="px-4 py-2 bg-[#00E5FA] text-[#00050F] font-semibold rounded-lg hover:bg-[#00E5FA]/80">
                                    + Add User
                                </button>
                            </div>
                            <div className="glass rounded-xl overflow-hidden">
                                <table className="w-full">
                                    <thead className="bg-[#00E5FA]/10">
                                        <tr>
                                            <th className="text-left p-4 text-[#00E5FA] font-semibold">User</th>
                                            <th className="text-left p-4 text-[#00E5FA] font-semibold">Email</th>
                                            <th className="text-left p-4 text-[#00E5FA] font-semibold">Role</th>
                                            <th className="text-left p-4 text-[#00E5FA] font-semibold">Last Active</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {users.map((user) => {
                                            const role = getRoleById(user.role_id);
                                            return (
                                                <tr key={user.id} className="border-t border-[#00E5FA]/10 hover:bg-[#00E5FA]/5">
                                                    <td className="p-4 text-white font-medium">{user.name}</td>
                                                    <td className="p-4 text-gray-400">{user.email}</td>
                                                    <td className="p-4">
                                                        <select value={user.role_id} onChange={(e) => updateUserRole(user.id, parseInt(e.target.value))}
                                                            className="bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-3 py-1 text-white">
                                                            {roles.map((r) => (
                                                                <option key={r.id} value={r.id}>{r.name}</option>
                                                            ))}
                                                        </select>
                                                    </td>
                                                    <td className="p-4 text-gray-400 text-sm">{new Date(user.last_active).toLocaleDateString()}</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* Role Modal */}
                    {showRoleModal && (
                        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
                            <div className="glass rounded-xl p-6 w-full max-w-md glow">
                                <h2 className="text-xl font-bold text-white mb-4">{selectedRole ? 'Edit Role' : 'Create Role'}</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-gray-400 text-sm">Role Name</label>
                                        <input type="text" value={roleForm.name} onChange={(e) => setRoleForm({...roleForm, name: e.target.value})}
                                            className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1" />
                                    </div>
                                    <div>
                                        <label className="text-gray-400 text-sm">Description</label>
                                        <textarea value={roleForm.description} onChange={(e) => setRoleForm({...roleForm, description: e.target.value})}
                                            className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1 h-20" />
                                    </div>
                                    <div>
                                        <label className="text-gray-400 text-sm">Color</label>
                                        <input type="color" value={roleForm.color} onChange={(e) => setRoleForm({...roleForm, color: e.target.value})}
                                            className="w-full h-10 bg-[#00050F] border border-[#00E5FA]/30 rounded-lg mt-1 cursor-pointer" />
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 mt-6">
                                    <button onClick={() => setShowRoleModal(false)} className="px-4 py-2 border border-gray-600 text-gray-300 rounded-lg hover:bg-gray-800">Cancel</button>
                                    <button onClick={saveRole} className="px-6 py-2 bg-[#00E5FA] text-[#00050F] font-semibold rounded-lg hover:bg-[#00E5FA]/80">Save</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* User Modal */}
                    {showUserModal && (
                        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
                            <div className="glass rounded-xl p-6 w-full max-w-md glow">
                                <h2 className="text-xl font-bold text-white mb-4">Add User</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-gray-400 text-sm">Name</label>
                                        <input type="text" value={userForm.name} onChange={(e) => setUserForm({...userForm, name: e.target.value})}
                                            className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1" />
                                    </div>
                                    <div>
                                        <label className="text-gray-400 text-sm">Email</label>
                                        <input type="email" value={userForm.email} onChange={(e) => setUserForm({...userForm, email: e.target.value})}
                                            className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1" />
                                    </div>
                                    <div>
                                        <label className="text-gray-400 text-sm">Role</label>
                                        <select value={userForm.role_id} onChange={(e) => setUserForm({...userForm, role_id: parseInt(e.target.value)})}
                                            className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1">
                                            {roles.map((r) => (
                                                <option key={r.id} value={r.id}>{r.name}</option>
                                            ))}
                                        </select>
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 mt-6">
                                    <button onClick={() => setShowUserModal(false)} className="px-4 py-2 border border-gray-600 text-gray-300 rounded-lg hover:bg-gray-800">Cancel</button>
                                    <button onClick={saveUser} className="px-6 py-2 bg-[#00E5FA] text-[#00050F] font-semibold rounded-lg hover:bg-[#00E5FA]/80">Add User</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<RBACConsole />);
    </script>
</body>
</html>
