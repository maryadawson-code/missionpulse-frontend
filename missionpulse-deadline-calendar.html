<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadline Calendar | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 100%); min-height: 100vh; }
        .glass-card { background: rgba(0, 229, 250, 0.03); border: 1px solid rgba(0, 229, 250, 0.15); backdrop-filter: blur(10px); }
        .glow-text { text-shadow: 0 0 20px rgba(0, 229, 250, 0.5); }
        .calendar-day { transition: all 0.2s ease; min-height: 100px; }
        .calendar-day:hover { background: rgba(0, 229, 250, 0.05); }
        .calendar-day.today { border: 2px solid #00E5FA; }
        .calendar-day.other-month { opacity: 0.4; }
        .event-dot { width: 8px; height: 8px; border-radius: 50%; }
        .event-item { transition: all 0.2s ease; cursor: pointer; }
        .event-item:hover { transform: translateX(4px); }
        .deadline-urgent { border-left: 4px solid #EF4444; }
        .deadline-warning { border-left: 4px solid #F59E0B; }
        .deadline-normal { border-left: 4px solid #10B981; }
        .view-btn.active { background: rgba(0, 229, 250, 0.2); border-color: #00E5FA; }
    </style>
</head>
<body class="text-white font-sans">
    <!-- Navigation -->
    <nav class="bg-[#00050F]/90 border-b border-cyan-500/20 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <a href="missionpulse-mission-control.html" class="text-cyan-400 hover:text-cyan-300">
                    <i class="fas fa-arrow-left mr-2"></i>Mission Control
                </a>
                <span class="text-gray-600">|</span>
                <h1 class="text-xl font-bold text-white">
                    <i class="fas fa-calendar-alt text-cyan-400 mr-2"></i>Deadline Calendar
                </h1>
            </div>
            <div class="flex items-center space-x-3">
                <div class="flex border border-gray-700 rounded-lg overflow-hidden">
                    <button onclick="setView('month')" id="view-month" class="view-btn px-4 py-2 text-sm text-gray-300 hover:text-white active">Month</button>
                    <button onclick="setView('week')" id="view-week" class="view-btn px-4 py-2 text-sm text-gray-300 hover:text-white border-l border-gray-700">Week</button>
                    <button onclick="setView('list')" id="view-list" class="view-btn px-4 py-2 text-sm text-gray-300 hover:text-white border-l border-gray-700">List</button>
                </div>
                <button onclick="openAddEvent()" class="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg text-white transition-all">
                    <i class="fas fa-plus mr-2"></i>Add Deadline
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Upcoming Deadlines Alert -->
        <div id="urgentAlert" class="glass-card rounded-xl p-4 mb-6 border-l-4 border-red-500 hidden">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-exclamation-triangle text-red-400 text-xl"></i>
                    <div>
                        <span class="text-white font-semibold">Urgent Deadlines!</span>
                        <span id="urgentCount" class="text-red-400 ml-2">2 deadlines within 7 days</span>
                    </div>
                </div>
                <button onclick="scrollToUrgent()" class="text-cyan-400 hover:text-cyan-300 text-sm">View Details →</button>
            </div>
        </div>

        <!-- Calendar Header -->
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center space-x-4">
                <button onclick="prevPeriod()" class="p-2 hover:bg-gray-800 rounded-lg text-gray-400 hover:text-white">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <h2 id="currentPeriod" class="text-2xl font-bold text-white">February 2026</h2>
                <button onclick="nextPeriod()" class="p-2 hover:bg-gray-800 rounded-lg text-gray-400 hover:text-white">
                    <i class="fas fa-chevron-right"></i>
                </button>
                <button onclick="goToToday()" class="px-3 py-1 bg-gray-800 hover:bg-gray-700 rounded text-gray-300 text-sm">Today</button>
            </div>
            <div class="flex items-center space-x-4">
                <!-- Legend -->
                <div class="flex items-center space-x-4 text-sm">
                    <div class="flex items-center space-x-2">
                        <div class="event-dot bg-red-500"></div>
                        <span class="text-gray-400">Proposal Due</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <div class="event-dot bg-yellow-500"></div>
                        <span class="text-gray-400">Review Gate</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <div class="event-dot bg-blue-500"></div>
                        <span class="text-gray-400">Q&A Period</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <div class="event-dot bg-green-500"></div>
                        <span class="text-gray-400">Milestone</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Month View -->
        <div id="monthView" class="glass-card rounded-xl overflow-hidden">
            <!-- Day Headers -->
            <div class="grid grid-cols-7 bg-gray-800/50">
                <div class="p-3 text-center text-gray-400 text-sm font-medium">Sun</div>
                <div class="p-3 text-center text-gray-400 text-sm font-medium">Mon</div>
                <div class="p-3 text-center text-gray-400 text-sm font-medium">Tue</div>
                <div class="p-3 text-center text-gray-400 text-sm font-medium">Wed</div>
                <div class="p-3 text-center text-gray-400 text-sm font-medium">Thu</div>
                <div class="p-3 text-center text-gray-400 text-sm font-medium">Fri</div>
                <div class="p-3 text-center text-gray-400 text-sm font-medium">Sat</div>
            </div>
            <!-- Calendar Grid -->
            <div id="calendarGrid" class="grid grid-cols-7 border-t border-gray-800">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Week View -->
        <div id="weekView" class="glass-card rounded-xl overflow-hidden hidden">
            <div id="weekGrid" class="divide-y divide-gray-800">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- List View -->
        <div id="listView" class="hidden">
            <div id="listContainer" class="space-y-4">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Upcoming Sidebar -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-8">
            <div class="lg:col-span-2 glass-card rounded-xl p-6">
                <h3 class="text-lg font-bold text-white mb-4">
                    <i class="fas fa-clock text-cyan-400 mr-2"></i>Next 30 Days
                </h3>
                <div id="upcomingList" class="space-y-3 max-h-96 overflow-y-auto">
                    <!-- Populated by JS -->
                </div>
            </div>
            <div class="glass-card rounded-xl p-6">
                <h3 class="text-lg font-bold text-white mb-4">
                    <i class="fas fa-chart-pie text-cyan-400 mr-2"></i>Deadline Summary
                </h3>
                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <span class="text-gray-400">This Week</span>
                        <span id="thisWeekCount" class="text-white font-bold">0</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-gray-400">This Month</span>
                        <span id="thisMonthCount" class="text-white font-bold">0</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-gray-400">Next 90 Days</span>
                        <span id="next90Count" class="text-white font-bold">0</span>
                    </div>
                    <div class="border-t border-gray-700 pt-4 mt-4">
                        <div class="flex items-center justify-between text-red-400">
                            <span>Overdue</span>
                            <span id="overdueCount" class="font-bold">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Add Event Modal -->
    <div id="addEventModal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden">
        <div class="glass-card rounded-xl p-6 max-w-md w-full mx-4">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-white">
                    <i class="fas fa-plus-circle text-cyan-400 mr-2"></i>Add Deadline
                </h3>
                <button onclick="closeAddEvent()" class="text-gray-400 hover:text-white">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-gray-400 text-sm mb-2 block">Title</label>
                    <input type="text" id="eventTitle" placeholder="Deadline name..." 
                        class="w-full bg-gray-800/50 border border-gray-700 rounded-lg px-4 py-3 text-white">
                </div>
                <div>
                    <label class="text-gray-400 text-sm mb-2 block">Date & Time</label>
                    <input type="datetime-local" id="eventDate" 
                        class="w-full bg-gray-800/50 border border-gray-700 rounded-lg px-4 py-3 text-white">
                </div>
                <div>
                    <label class="text-gray-400 text-sm mb-2 block">Type</label>
                    <select id="eventType" class="w-full bg-gray-800/50 border border-gray-700 rounded-lg px-4 py-3 text-white">
                        <option value="proposal">Proposal Due</option>
                        <option value="review">Review Gate</option>
                        <option value="qa">Q&A Period</option>
                        <option value="milestone">Milestone</option>
                    </select>
                </div>
                <div>
                    <label class="text-gray-400 text-sm mb-2 block">Opportunity</label>
                    <select id="eventOpportunity" class="w-full bg-gray-800/50 border border-gray-700 rounded-lg px-4 py-3 text-white">
                        <option value="">-- Select Opportunity --</option>
                        <option value="va-ehr">VA EHR Modernization</option>
                        <option value="dha-analytics">DHA Analytics Platform</option>
                        <option value="cms-data">CMS Data Integration</option>
                    </select>
                </div>
            </div>
            <div class="flex space-x-3 mt-6">
                <button onclick="closeAddEvent()" class="flex-1 px-4 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg text-white">Cancel</button>
                <button onclick="saveEvent()" class="flex-1 px-4 py-3 bg-cyan-600 hover:bg-cyan-500 rounded-lg text-white">
                    <i class="fas fa-check mr-2"></i>Save
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 bg-gray-900 border border-cyan-500/30 rounded-lg p-4 shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <div class="flex items-center space-x-3">
            <i id="toastIcon" class="fas fa-check-circle text-green-400"></i>
            <span id="toastMessage" class="text-white">Action completed</span>
        </div>
    </div>

    <script>
        // Sample deadlines
        let deadlines = [
            { id: 1, title: 'VA EHR - Final Proposal Due', date: new Date('2026-03-15T17:00:00'), type: 'proposal', opportunity: 'va-ehr' },
            { id: 2, title: 'VA EHR - Gold Team Review', date: new Date('2026-03-10T14:00:00'), type: 'review', opportunity: 'va-ehr' },
            { id: 3, title: 'VA EHR - Red Team Review', date: new Date('2026-03-05T14:00:00'), type: 'review', opportunity: 'va-ehr' },
            { id: 4, title: 'DHA Analytics - Q&A Deadline', date: new Date('2026-02-15T12:00:00'), type: 'qa', opportunity: 'dha-analytics' },
            { id: 5, title: 'DHA Analytics - Proposal Due', date: new Date('2026-04-01T17:00:00'), type: 'proposal', opportunity: 'dha-analytics' },
            { id: 6, title: 'CMS Data - Draft Submission', date: new Date('2026-02-20T17:00:00'), type: 'milestone', opportunity: 'cms-data' },
            { id: 7, title: 'CMS Data - Final Due', date: new Date('2026-02-28T17:00:00'), type: 'proposal', opportunity: 'cms-data' },
            { id: 8, title: 'VA EHR - Pink Team Review', date: new Date('2026-02-25T10:00:00'), type: 'review', opportunity: 'va-ehr' },
            { id: 9, title: 'DHA Analytics - Kick-off', date: new Date('2026-02-10T09:00:00'), type: 'milestone', opportunity: 'dha-analytics' }
        ];

        let currentDate = new Date();
        let currentView = 'month';

        const typeColors = {
            'proposal': 'bg-red-500',
            'review': 'bg-yellow-500',
            'qa': 'bg-blue-500',
            'milestone': 'bg-green-500'
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderCalendar();
            renderUpcoming();
            updateSummary();
            checkUrgent();
        });

        function setView(view) {
            currentView = view;
            
            // Update buttons
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');
            
            // Show/hide views
            document.getElementById('monthView').classList.toggle('hidden', view !== 'month');
            document.getElementById('weekView').classList.toggle('hidden', view !== 'week');
            document.getElementById('listView').classList.toggle('hidden', view !== 'list');
            
            if (view === 'month') renderCalendar();
            else if (view === 'week') renderWeekView();
            else if (view === 'list') renderListView();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('currentPeriod').textContent = 
                currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDay = firstDay.getDay();
            const totalDays = lastDay.getDate();
            
            const today = new Date();
            let html = '';
            
            // Previous month days
            const prevMonthLastDay = new Date(year, month, 0).getDate();
            for (let i = startDay - 1; i >= 0; i--) {
                const day = prevMonthLastDay - i;
                html += `<div class="calendar-day p-2 border-b border-r border-gray-800 other-month">
                    <div class="text-gray-500 text-sm">${day}</div>
                </div>`;
            }
            
            // Current month days
            for (let day = 1; day <= totalDays; day++) {
                const date = new Date(year, month, day);
                const isToday = date.toDateString() === today.toDateString();
                const dayDeadlines = deadlines.filter(d => d.date.toDateString() === date.toDateString());
                
                html += `<div class="calendar-day p-2 border-b border-r border-gray-800 ${isToday ? 'today' : ''}">
                    <div class="text-white text-sm font-medium ${isToday ? 'text-cyan-400' : ''}">${day}</div>
                    <div class="mt-1 space-y-1">
                        ${dayDeadlines.slice(0, 3).map(d => `
                            <div class="event-item text-xs p-1 rounded ${typeColors[d.type]} bg-opacity-20 text-white truncate" 
                                onclick="viewDeadline(${d.id})" title="${d.title}">
                                ${d.title}
                            </div>
                        `).join('')}
                        ${dayDeadlines.length > 3 ? `<div class="text-xs text-gray-400">+${dayDeadlines.length - 3} more</div>` : ''}
                    </div>
                </div>`;
            }
            
            // Next month days
            const remainingCells = 42 - (startDay + totalDays);
            for (let day = 1; day <= remainingCells; day++) {
                html += `<div class="calendar-day p-2 border-b border-r border-gray-800 other-month">
                    <div class="text-gray-500 text-sm">${day}</div>
                </div>`;
            }
            
            grid.innerHTML = html;
        }

        function renderWeekView() {
            const grid = document.getElementById('weekGrid');
            const startOfWeek = new Date(currentDate);
            startOfWeek.setDate(currentDate.getDate() - currentDate.getDay());
            
            document.getElementById('currentPeriod').textContent = 
                `Week of ${startOfWeek.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
            
            let html = '';
            const today = new Date();
            
            for (let i = 0; i < 7; i++) {
                const date = new Date(startOfWeek);
                date.setDate(startOfWeek.getDate() + i);
                const isToday = date.toDateString() === today.toDateString();
                const dayDeadlines = deadlines.filter(d => d.date.toDateString() === date.toDateString());
                
                html += `
                    <div class="p-4 ${isToday ? 'bg-cyan-500/10' : ''}">
                        <div class="flex items-center space-x-4 mb-3">
                            <div class="w-16 text-center">
                                <div class="text-gray-400 text-xs">${date.toLocaleDateString('en-US', { weekday: 'short' })}</div>
                                <div class="text-2xl font-bold ${isToday ? 'text-cyan-400' : 'text-white'}">${date.getDate()}</div>
                            </div>
                            <div class="flex-1 space-y-2">
                                ${dayDeadlines.length > 0 ? dayDeadlines.map(d => `
                                    <div class="event-item p-3 rounded-lg bg-gray-800/50 flex items-center space-x-3" onclick="viewDeadline(${d.id})">
                                        <div class="event-dot ${typeColors[d.type]}"></div>
                                        <div class="flex-1">
                                            <div class="text-white font-medium">${d.title}</div>
                                            <div class="text-gray-400 text-sm">${d.date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}</div>
                                        </div>
                                    </div>
                                `).join('') : '<div class="text-gray-500 text-sm">No deadlines</div>'}
                            </div>
                        </div>
                    </div>
                `;
            }
            
            grid.innerHTML = html;
        }

        function renderListView() {
            const container = document.getElementById('listContainer');
            const sorted = [...deadlines].sort((a, b) => a.date - b.date);
            const today = new Date();
            
            document.getElementById('currentPeriod').textContent = 'All Deadlines';
            
            container.innerHTML = sorted.map(d => {
                const daysUntil = Math.ceil((d.date - today) / (1000 * 60 * 60 * 24));
                let urgencyClass = 'deadline-normal';
                if (daysUntil < 0) urgencyClass = 'deadline-urgent';
                else if (daysUntil <= 7) urgencyClass = 'deadline-urgent';
                else if (daysUntil <= 14) urgencyClass = 'deadline-warning';
                
                return `
                    <div class="glass-card rounded-xl p-4 ${urgencyClass} event-item" onclick="viewDeadline(${d.id})">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-4">
                                <div class="w-12 h-12 rounded-lg ${typeColors[d.type]} bg-opacity-20 flex items-center justify-center">
                                    <div class="event-dot ${typeColors[d.type]}"></div>
                                </div>
                                <div>
                                    <div class="text-white font-medium">${d.title}</div>
                                    <div class="text-gray-400 text-sm">
                                        ${d.date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })} at 
                                        ${d.date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}
                                    </div>
                                </div>
                            </div>
                            <div class="text-right">
                                ${daysUntil < 0 ? 
                                    `<span class="text-red-400 font-bold">${Math.abs(daysUntil)} days overdue</span>` :
                                    daysUntil === 0 ?
                                    `<span class="text-red-400 font-bold">TODAY</span>` :
                                    `<span class="${daysUntil <= 7 ? 'text-yellow-400' : 'text-gray-400'}">${daysUntil} days</span>`
                                }
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderUpcoming() {
            const container = document.getElementById('upcomingList');
            const today = new Date();
            const next30 = new Date(today);
            next30.setDate(today.getDate() + 30);
            
            const upcoming = deadlines
                .filter(d => d.date >= today && d.date <= next30)
                .sort((a, b) => a.date - b.date);
            
            if (upcoming.length === 0) {
                container.innerHTML = '<div class="text-gray-500 text-center py-4">No deadlines in the next 30 days</div>';
                return;
            }
            
            container.innerHTML = upcoming.map(d => {
                const daysUntil = Math.ceil((d.date - today) / (1000 * 60 * 60 * 24));
                return `
                    <div class="event-item flex items-center space-x-3 p-3 bg-gray-800/30 rounded-lg" onclick="viewDeadline(${d.id})">
                        <div class="event-dot ${typeColors[d.type]}"></div>
                        <div class="flex-1">
                            <div class="text-white text-sm">${d.title}</div>
                            <div class="text-gray-500 text-xs">${d.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</div>
                        </div>
                        <span class="${daysUntil <= 7 ? 'text-red-400' : 'text-gray-400'} text-sm">${daysUntil}d</span>
                    </div>
                `;
            }).join('');
        }

        function updateSummary() {
            const today = new Date();
            const endOfWeek = new Date(today);
            endOfWeek.setDate(today.getDate() + (7 - today.getDay()));
            
            const endOfMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0);
            const next90 = new Date(today);
            next90.setDate(today.getDate() + 90);
            
            document.getElementById('thisWeekCount').textContent = 
                deadlines.filter(d => d.date >= today && d.date <= endOfWeek).length;
            document.getElementById('thisMonthCount').textContent = 
                deadlines.filter(d => d.date >= today && d.date <= endOfMonth).length;
            document.getElementById('next90Count').textContent = 
                deadlines.filter(d => d.date >= today && d.date <= next90).length;
            document.getElementById('overdueCount').textContent = 
                deadlines.filter(d => d.date < today).length;
        }

        function checkUrgent() {
            const today = new Date();
            const nextWeek = new Date(today);
            nextWeek.setDate(today.getDate() + 7);
            
            const urgent = deadlines.filter(d => d.date >= today && d.date <= nextWeek);
            
            if (urgent.length > 0) {
                document.getElementById('urgentAlert').classList.remove('hidden');
                document.getElementById('urgentCount').textContent = `${urgent.length} deadline${urgent.length > 1 ? 's' : ''} within 7 days`;
            }
        }

        function prevPeriod() {
            if (currentView === 'month') {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar();
            } else if (currentView === 'week') {
                currentDate.setDate(currentDate.getDate() - 7);
                renderWeekView();
            }
        }

        function nextPeriod() {
            if (currentView === 'month') {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar();
            } else if (currentView === 'week') {
                currentDate.setDate(currentDate.getDate() + 7);
                renderWeekView();
            }
        }

        function goToToday() {
            currentDate = new Date();
            if (currentView === 'month') renderCalendar();
            else if (currentView === 'week') renderWeekView();
            else renderListView();
        }

        function openAddEvent() {
            document.getElementById('addEventModal').classList.remove('hidden');
        }

        function closeAddEvent() {
            document.getElementById('addEventModal').classList.add('hidden');
        }

        function saveEvent() {
            const title = document.getElementById('eventTitle').value.trim();
            const date = document.getElementById('eventDate').value;
            const type = document.getElementById('eventType').value;
            const opportunity = document.getElementById('eventOpportunity').value;
            
            if (!title || !date) {
                showToast('Please fill in all required fields', 'warning');
                return;
            }
            
            deadlines.push({
                id: Date.now(),
                title,
                date: new Date(date),
                type,
                opportunity
            });
            
            closeAddEvent();
            document.getElementById('eventTitle').value = '';
            document.getElementById('eventDate').value = '';
            
            renderCalendar();
            renderUpcoming();
            updateSummary();
            checkUrgent();
            
            showToast('Deadline added successfully', 'success');
        }

        function viewDeadline(id) {
            const deadline = deadlines.find(d => d.id === id);
            if (deadline) {
                alert(`${deadline.title}\n\nDate: ${deadline.date.toLocaleString()}\nType: ${deadline.type}`);
            }
        }

        function scrollToUrgent() {
            setView('list');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMessage');
            
            const iconMap = {
                'success': 'fa-check-circle text-green-400',
                'warning': 'fa-exclamation-triangle text-yellow-400',
                'error': 'fa-times-circle text-red-400',
                'info': 'fa-info-circle text-blue-400'
            };
            
            icon.className = `fas ${iconMap[type] || iconMap.success}`;
            msg.textContent = message;
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>
