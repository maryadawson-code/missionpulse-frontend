<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Pricing Engine [CUI]</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --mmt-cyan: #00E5FA; --mmt-navy: #00050F; --mmt-surface: #0f172a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--mmt-navy); color: #e2e8f0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
    .cui-banner { background: linear-gradient(90deg, #dc2626 0%, #b91c1c 100%); }
  </style>
</head>
<body>
  <!-- CUI BANNER - REQUIRED FOR CONTROLLED UNCLASSIFIED INFORMATION -->
  <div class="cui-banner text-white text-center py-1 text-xs font-bold tracking-wider">
    ⚠️ CUI // SP-PROCURE // CONTROLLED UNCLASSIFIED INFORMATION - AUTHORIZED USE ONLY
  </div>
  
  <div id="root"></div>
  <script type="text/babel">
// ============================================================
// MISSIONPULSE PRICING ENGINE V3
// Mission Meets Tech © 2026
// CLASSIFICATION: CUI // SP-PROCURE
// ============================================================

const { useState, useEffect, useMemo } = React;

// CONFIG
const CONFIG = {
  SUPABASE_URL: 'https://djuviwarqdvlbgcfuupa.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8',
  API_URL: 'https://missionpulse-api.onrender.com',
  LOGIN_PAGE: 'login.html',
  ALLOWED_ROLES: ['CEO', 'COO', 'FIN', 'Admin'] // RBAC for pricing module
};

const supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

// GSA LABOR CATEGORIES
const GSA_LCATS = [
  { id: 1, title: 'Program Manager III', gsa_rate: 185.50, loaded_rate: 245.00, sin: '541611' },
  { id: 2, title: 'Senior Systems Engineer', gsa_rate: 172.00, loaded_rate: 228.00, sin: '541512' },
  { id: 3, title: 'Software Developer III', gsa_rate: 158.00, loaded_rate: 210.00, sin: '541512' },
  { id: 4, title: 'Data Scientist II', gsa_rate: 165.00, loaded_rate: 218.00, sin: '541512' },
  { id: 5, title: 'Cybersecurity Analyst II', gsa_rate: 145.00, loaded_rate: 192.00, sin: '541519' },
  { id: 6, title: 'Technical Writer II', gsa_rate: 95.00, loaded_rate: 126.00, sin: '541611' },
  { id: 7, title: 'Quality Assurance Lead', gsa_rate: 138.00, loaded_rate: 183.00, sin: '541512' },
  { id: 8, title: 'Business Analyst III', gsa_rate: 142.00, loaded_rate: 188.00, sin: '541611' }
];

// INDIRECT RATES
const INDIRECT_RATES = {
  fringe: 0.32,
  overhead: 0.45,
  ga: 0.12,
  fee: 0.08
};

// Auth & RBAC Check
function checkAuth() {
  const session = localStorage.getItem('MP_SESSION');
  if (!session) { window.location.href = CONFIG.LOGIN_PAGE; return null; }
  try { 
    const user = JSON.parse(localStorage.getItem('MP_USER'));
    if (!CONFIG.ALLOWED_ROLES.includes(user.role)) {
      alert('Access Denied: Pricing module requires CEO, COO, FIN, or Admin role');
      window.location.href = 'missionpulse-dashboard-v3.html';
      return null;
    }
    return user;
  }
  catch { return { email: 'demo@mmt.com', role: 'FIN', name: 'Demo User' }; }
}

// Icons
const Icons = {
  back: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>,
  dollar: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
  calculator: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>,
  download: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>,
  lock: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>,
};

// BOE Line Item Component
function BOELineItem({ lcat, hours, onHoursChange }) {
  const directCost = hours * lcat.loaded_rate;
  const fullyLoaded = directCost * (1 + INDIRECT_RATES.fringe + INDIRECT_RATES.overhead + INDIRECT_RATES.ga + INDIRECT_RATES.fee);
  
  return (
    <tr className="border-b border-slate-700/50 hover:bg-slate-800/30">
      <td className="py-3 px-4">
        <div className="font-medium text-white">{lcat.title}</div>
        <div className="text-xs text-slate-500">SIN {lcat.sin}</div>
      </td>
      <td className="py-3 px-4 text-right text-slate-400">${lcat.gsa_rate.toFixed(2)}</td>
      <td className="py-3 px-4 text-right text-slate-400">${lcat.loaded_rate.toFixed(2)}</td>
      <td className="py-3 px-4">
        <input 
          type="number"
          value={hours}
          onChange={(e) => onHoursChange(lcat.id, parseInt(e.target.value) || 0)}
          className="w-20 bg-slate-800 border border-slate-600 rounded px-2 py-1 text-right text-white focus:border-cyan-500 focus:outline-none"
        />
      </td>
      <td className="py-3 px-4 text-right text-cyan-400 font-medium">${directCost.toLocaleString()}</td>
      <td className="py-3 px-4 text-right text-green-400 font-medium">${fullyLoaded.toLocaleString()}</td>
    </tr>
  );
}

// Rate Card Component
function RateCard({ title, rate, description }) {
  return (
    <div className="glass rounded-lg p-4">
      <div className="text-sm text-slate-400 mb-1">{title}</div>
      <div className="text-2xl font-bold text-cyan-400">{(rate * 100).toFixed(1)}%</div>
      <div className="text-xs text-slate-500 mt-1">{description}</div>
    </div>
  );
}

// Main App
function App() {
  const [user, setUser] = useState(null);
  const [hours, setHours] = useState({});
  const [opportunityName, setOpportunityName] = useState('VA EHR Modernization');
  const [periodOfPerformance, setPeriodOfPerformance] = useState(36);

  useEffect(() => {
    const authUser = checkAuth();
    if (authUser) {
      setUser(authUser);
      // Initialize hours
      const initialHours = {};
      GSA_LCATS.forEach(lcat => { initialHours[lcat.id] = 0; });
      setHours(initialHours);
    }
  }, []);

  const handleHoursChange = (lcatId, newHours) => {
    setHours(prev => ({ ...prev, [lcatId]: newHours }));
  };

  // Calculate totals
  const calculations = useMemo(() => {
    let totalDirect = 0;
    let totalLoaded = 0;
    let totalHours = 0;
    
    GSA_LCATS.forEach(lcat => {
      const h = hours[lcat.id] || 0;
      const direct = h * lcat.loaded_rate;
      const loaded = direct * (1 + INDIRECT_RATES.fringe + INDIRECT_RATES.overhead + INDIRECT_RATES.ga + INDIRECT_RATES.fee);
      totalDirect += direct;
      totalLoaded += loaded;
      totalHours += h;
    });
    
    const fte = totalHours / (periodOfPerformance * 173); // 173 hours/month average
    const monthlyBurn = totalLoaded / periodOfPerformance;
    
    return { totalDirect, totalLoaded, totalHours, fte, monthlyBurn };
  }, [hours, periodOfPerformance]);

  if (!user) return <div className="min-h-screen flex items-center justify-center"><div className="animate-pulse text-cyan-400">Verifying access...</div></div>;

  return (
    <div className="min-h-screen bg-slate-950">
      {/* Header */}
      <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white">
              <Icons.back />
            </a>
            <div>
              <h1 className="text-xl font-bold text-white flex items-center gap-2">
                💵 Pricing Engine
                <span className="px-2 py-0.5 bg-red-600 text-white text-xs rounded flex items-center gap-1">
                  <Icons.lock /> CUI
                </span>
              </h1>
              <p className="text-sm text-slate-400">BOE Builder & Cost Analysis</p>
            </div>
          </div>
          <div className="flex items-center gap-4">
            <button className="px-3 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm flex items-center gap-2">
              <Icons.download /> Export BOE
            </button>
            <span className="text-sm text-slate-400">{user.name} ({user.role})</span>
          </div>
        </div>
      </header>

      {/* Main Content */}
      <main className="max-w-7xl mx-auto px-4 py-6 space-y-6">
        {/* Opportunity Header */}
        <div className="glass rounded-xl p-4">
          <div className="grid grid-cols-3 gap-4">
            <div>
              <label className="text-sm text-slate-400 block mb-1">Opportunity</label>
              <input 
                type="text" 
                value={opportunityName}
                onChange={(e) => setOpportunityName(e.target.value)}
                className="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none"
              />
            </div>
            <div>
              <label className="text-sm text-slate-400 block mb-1">Period of Performance (months)</label>
              <input 
                type="number" 
                value={periodOfPerformance}
                onChange={(e) => setPeriodOfPerformance(parseInt(e.target.value) || 12)}
                className="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none"
              />
            </div>
            <div>
              <label className="text-sm text-slate-400 block mb-1">Contract Type</label>
              <select className="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none">
                <option>T&M</option>
                <option>FFP</option>
                <option>Cost-Plus</option>
                <option>IDIQ Task Order</option>
              </select>
            </div>
          </div>
        </div>

        {/* Indirect Rates */}
        <div className="grid grid-cols-4 gap-4">
          <RateCard title="Fringe Benefits" rate={INDIRECT_RATES.fringe} description="Health, retirement, PTO" />
          <RateCard title="Overhead" rate={INDIRECT_RATES.overhead} description="Facilities, IT, admin" />
          <RateCard title="G&A" rate={INDIRECT_RATES.ga} description="General & Administrative" />
          <RateCard title="Fee/Profit" rate={INDIRECT_RATES.fee} description="Contract fee margin" />
        </div>

        {/* BOE Table */}
        <div className="glass rounded-xl overflow-hidden">
          <div className="px-4 py-3 border-b border-slate-700/50 flex items-center justify-between">
            <h2 className="text-lg font-semibold text-white flex items-center gap-2">
              <Icons.calculator /> Labor Categories (LCAT)
            </h2>
            <span className="text-sm text-slate-400">{GSA_LCATS.length} categories • GSA Schedule pricing</span>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full">
              <thead className="bg-slate-800/50">
                <tr>
                  <th className="py-3 px-4 text-left text-sm font-medium text-slate-400">Labor Category</th>
                  <th className="py-3 px-4 text-right text-sm font-medium text-slate-400">GSA Rate</th>
                  <th className="py-3 px-4 text-right text-sm font-medium text-slate-400">Loaded Rate</th>
                  <th className="py-3 px-4 text-center text-sm font-medium text-slate-400">Hours</th>
                  <th className="py-3 px-4 text-right text-sm font-medium text-slate-400">Direct Cost</th>
                  <th className="py-3 px-4 text-right text-sm font-medium text-slate-400">Fully Loaded</th>
                </tr>
              </thead>
              <tbody>
                {GSA_LCATS.map(lcat => (
                  <BOELineItem key={lcat.id} lcat={lcat} hours={hours[lcat.id] || 0} onHoursChange={handleHoursChange} />
                ))}
              </tbody>
              <tfoot className="bg-slate-800/80">
                <tr className="border-t-2 border-cyan-500/30">
                  <td className="py-4 px-4 font-bold text-white">TOTAL</td>
                  <td className="py-4 px-4"></td>
                  <td className="py-4 px-4"></td>
                  <td className="py-4 px-4 text-center text-white font-bold">{calculations.totalHours.toLocaleString()}</td>
                  <td className="py-4 px-4 text-right text-cyan-400 font-bold">${calculations.totalDirect.toLocaleString()}</td>
                  <td className="py-4 px-4 text-right text-green-400 font-bold text-lg">${calculations.totalLoaded.toLocaleString()}</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>

        {/* Summary Cards */}
        <div className="grid grid-cols-4 gap-4">
          <div className="glass rounded-xl p-4 text-center">
            <p className="text-3xl font-bold text-cyan-400">${(calculations.totalLoaded / 1000000).toFixed(2)}M</p>
            <p className="text-sm text-slate-400">Total Contract Value</p>
          </div>
          <div className="glass rounded-xl p-4 text-center">
            <p className="text-3xl font-bold text-green-400">{calculations.fte.toFixed(1)}</p>
            <p className="text-sm text-slate-400">FTE Equivalent</p>
          </div>
          <div className="glass rounded-xl p-4 text-center">
            <p className="text-3xl font-bold text-amber-400">${(calculations.monthlyBurn / 1000).toFixed(0)}K</p>
            <p className="text-sm text-slate-400">Monthly Burn Rate</p>
          </div>
          <div className="glass rounded-xl p-4 text-center">
            <p className="text-3xl font-bold text-purple-400">{((INDIRECT_RATES.fringe + INDIRECT_RATES.overhead + INDIRECT_RATES.ga + INDIRECT_RATES.fee) * 100).toFixed(0)}%</p>
            <p className="text-sm text-slate-400">Total Wrap Rate</p>
          </div>
        </div>
      </main>

      {/* CUI Footer */}
      <footer className="cui-banner text-white text-center py-2 text-xs">
        CUI // SP-PROCURE // Authorized Distribution Only | Mission Meets Tech © 2026
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
