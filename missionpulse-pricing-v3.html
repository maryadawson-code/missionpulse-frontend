<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Pricing Engine | CUI//SP-PROPIN</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(245, 158, 11, 0.3); } 50% { box-shadow: 0 0 40px rgba(245, 158, 11, 0.5); } }
    .cui-glow { animation: pulse-glow 3s infinite; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    // ============================================
    // CONFIGURATION
    // ============================================
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const API_URL = 'https://missionpulse-api.onrender.com';
    const MODULE_ID = 'pricing';
    const CUI_MARKING = 'CUI//SP-PROPIN';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // ============================================
    // DEMO DATA
    // ============================================
    const DEMO_LCATS = [
      { id: 1, title: 'Program Manager', laborCategory: 'PM-III', baseRate: 185.00, fringe: 0.32, overhead: 0.45, ga: 0.08, profit: 0.10, hours: 2080, quantity: 1 },
      { id: 2, title: 'Senior Systems Engineer', laborCategory: 'SE-IV', baseRate: 165.00, fringe: 0.32, overhead: 0.45, ga: 0.08, profit: 0.10, hours: 2080, quantity: 2 },
      { id: 3, title: 'Cloud Architect', laborCategory: 'CA-III', baseRate: 175.00, fringe: 0.32, overhead: 0.45, ga: 0.08, profit: 0.10, hours: 2080, quantity: 1 },
      { id: 4, title: 'Cybersecurity Analyst', laborCategory: 'CS-II', baseRate: 145.00, fringe: 0.32, overhead: 0.45, ga: 0.08, profit: 0.10, hours: 2080, quantity: 2 },
      { id: 5, title: 'Business Analyst', laborCategory: 'BA-II', baseRate: 125.00, fringe: 0.32, overhead: 0.45, ga: 0.08, profit: 0.10, hours: 1040, quantity: 1 },
      { id: 6, title: 'Technical Writer', laborCategory: 'TW-II', baseRate: 95.00, fringe: 0.32, overhead: 0.45, ga: 0.08, profit: 0.10, hours: 520, quantity: 1 }
    ];

    const DEMO_OPPORTUNITIES = [
      { id: 1, title: 'VA EHR Modernization', agency: 'VA', ceiling_value: 125000000 },
      { id: 2, title: 'DHA MHS GENESIS Support', agency: 'DHA', ceiling_value: 89000000 },
      { id: 3, title: 'CMS Data Analytics', agency: 'CMS', ceiling_value: 45000000 }
    ];

    const WRAP_RATE_PRESETS = {
      'GSA': { fringe: 0.34, overhead: 0.42, ga: 0.06, profit: 0.10 },
      'OASIS': { fringe: 0.32, overhead: 0.45, ga: 0.08, profit: 0.10 },
      'SEWP': { fringe: 0.30, overhead: 0.40, ga: 0.07, profit: 0.12 },
      'Custom': { fringe: 0.32, overhead: 0.45, ga: 0.08, profit: 0.10 }
    };

    // ============================================
    // AI ROUTER (CUI-Aware)
    // ============================================
    const sendToAI = async (message, context = {}) => {
      // All pricing queries go through secure channel
      console.log('[PricingAI] Routing through secure channel (CUI content)');
      
      try {
        const response = await fetch(`${API_URL}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message,
            agent: 'pricing',
            context: {
              module: MODULE_ID,
              cuiMarking: CUI_MARKING,
              sensitivity: 'high',
              ...context
            }
          })
        });
        
        if (!response.ok) throw new Error('API error');
        const data = await response.json();
        return { 
          content: data.response, 
          provider: 'secure', // Will be 'asksage' when configured
          cui: CUI_MARKING 
        };
      } catch (e) {
        return { 
          content: 'Secure AI channel temporarily unavailable. Please try again.', 
          error: true,
          cui: CUI_MARKING
        };
      }
    };

    // ============================================
    // UTILITY FUNCTIONS
    // ============================================
    const formatCurrency = (value) => {
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      }).format(value);
    };

    const formatRate = (value) => {
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }).format(value);
    };

    const formatPercent = (value) => {
      return `${(value * 100).toFixed(1)}%`;
    };

    const calculateLoadedRate = (baseRate, fringe, overhead, ga, profit) => {
      const fringeAmount = baseRate * fringe;
      const laborWithFringe = baseRate + fringeAmount;
      const overheadAmount = laborWithFringe * overhead;
      const subtotal = laborWithFringe + overheadAmount;
      const gaAmount = subtotal * ga;
      const costBase = subtotal + gaAmount;
      const profitAmount = costBase * profit;
      return costBase + profitAmount;
    };

    // ============================================
    // COMPONENTS
    // ============================================
    
    // CUI Banner
    const CUIBanner = () => (
      <div className="bg-amber-500/20 border border-amber-500/50 rounded-lg px-4 py-2 flex items-center gap-3 cui-glow">
        <span className="text-amber-400 text-lg">🔒</span>
        <div>
          <span className="font-mono text-amber-400 font-bold">{CUI_MARKING}</span>
          <span className="text-amber-300/70 text-sm ml-3">Controlled Unclassified Information - Proprietary</span>
        </div>
      </div>
    );

    // Header
    const Header = ({ connected, onBack }) => (
      <header className="glass border-b border-slate-700/50 sticky top-0 z-40">
        <div className="max-w-7xl mx-auto px-6 py-4">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-4">
              <button 
                onClick={onBack}
                className="p-2 hover:bg-slate-700/50 rounded-lg transition-colors"
              >
                ← Back
              </button>
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center">
                  <span className="text-xl">💵</span>
                </div>
                <div>
                  <h1 className="text-xl font-bold text-white">Pricing Engine</h1>
                  <p className="text-xs text-slate-400">BOE Calculator & Rate Analysis</p>
                </div>
              </div>
            </div>
            
            <div className="flex items-center gap-4">
              <CUIBanner />
              <div className={`px-3 py-1 rounded-full text-xs flex items-center gap-2 ${
                connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'
              }`}>
                <span className={`w-2 h-2 rounded-full ${connected ? 'bg-emerald-400' : 'bg-amber-400'}`}></span>
                {connected ? 'Secure' : 'Demo'}
              </div>
            </div>
          </div>
        </div>
      </header>
    );

    // Wrap Rate Card
    const WrapRateCard = ({ rates, preset, onPresetChange, onRateChange }) => (
      <div className="glass rounded-xl border border-slate-700/50 p-6">
        <div className="flex items-center justify-between mb-4">
          <h3 className="font-semibold text-white">Wrap Rate Configuration</h3>
          <select
            value={preset}
            onChange={(e) => onPresetChange(e.target.value)}
            className="bg-slate-800 border border-slate-600 rounded-lg px-3 py-1.5 text-sm text-white focus:outline-none focus:border-cyan-500"
          >
            {Object.keys(WRAP_RATE_PRESETS).map(p => (
              <option key={p} value={p}>{p}</option>
            ))}
          </select>
        </div>
        
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          {[
            { key: 'fringe', label: 'Fringe', color: 'cyan' },
            { key: 'overhead', label: 'Overhead', color: 'purple' },
            { key: 'ga', label: 'G&A', color: 'amber' },
            { key: 'profit', label: 'Profit', color: 'emerald' }
          ].map(({ key, label, color }) => (
            <div key={key} className="bg-slate-800/50 rounded-lg p-4">
              <label className="block text-xs text-slate-400 mb-2">{label}</label>
              <div className="flex items-center gap-2">
                <input
                  type="number"
                  value={(rates[key] * 100).toFixed(1)}
                  onChange={(e) => onRateChange(key, parseFloat(e.target.value) / 100)}
                  step="0.1"
                  className={`w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-${color}-400 font-mono focus:outline-none focus:border-${color}-500`}
                />
                <span className="text-slate-400">%</span>
              </div>
            </div>
          ))}
        </div>
        
        <div className="mt-4 p-3 bg-slate-900/50 rounded-lg">
          <div className="flex items-center justify-between">
            <span className="text-sm text-slate-400">Total Burden Rate:</span>
            <span className="font-mono text-lg text-cyan-400">
              {formatPercent(rates.fringe + rates.overhead + rates.ga + rates.profit)}
            </span>
          </div>
        </div>
      </div>
    );

    // LCAT Row
    const LCATRow = ({ lcat, rates, onUpdate, onDelete }) => {
      const loadedRate = calculateLoadedRate(
        lcat.baseRate, 
        rates.fringe, 
        rates.overhead, 
        rates.ga, 
        rates.profit
      );
      const annualCost = loadedRate * lcat.hours * lcat.quantity;

      return (
        <tr className="border-b border-slate-800 hover:bg-slate-800/30 transition-colors">
          <td className="py-4 px-4">
            <input
              type="text"
              value={lcat.title}
              onChange={(e) => onUpdate({ ...lcat, title: e.target.value })}
              className="bg-transparent border-b border-transparent hover:border-slate-600 focus:border-cyan-500 outline-none text-white w-full"
            />
          </td>
          <td className="py-4 px-4">
            <input
              type="text"
              value={lcat.laborCategory}
              onChange={(e) => onUpdate({ ...lcat, laborCategory: e.target.value })}
              className="bg-transparent border-b border-transparent hover:border-slate-600 focus:border-cyan-500 outline-none text-slate-400 font-mono text-sm w-24"
            />
          </td>
          <td className="py-4 px-4">
            <input
              type="number"
              value={lcat.baseRate}
              onChange={(e) => onUpdate({ ...lcat, baseRate: parseFloat(e.target.value) || 0 })}
              className="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-amber-400 font-mono text-right w-24 focus:outline-none focus:border-amber-500"
            />
          </td>
          <td className="py-4 px-4 text-right font-mono text-cyan-400">
            {formatRate(loadedRate)}
          </td>
          <td className="py-4 px-4">
            <input
              type="number"
              value={lcat.hours}
              onChange={(e) => onUpdate({ ...lcat, hours: parseInt(e.target.value) || 0 })}
              className="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-white font-mono text-right w-20 focus:outline-none focus:border-cyan-500"
            />
          </td>
          <td className="py-4 px-4">
            <input
              type="number"
              value={lcat.quantity}
              onChange={(e) => onUpdate({ ...lcat, quantity: parseInt(e.target.value) || 1 })}
              min="1"
              className="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-white font-mono text-center w-16 focus:outline-none focus:border-cyan-500"
            />
          </td>
          <td className="py-4 px-4 text-right font-mono text-emerald-400 font-semibold">
            {formatCurrency(annualCost)}
          </td>
          <td className="py-4 px-4">
            <button
              onClick={() => onDelete(lcat.id)}
              className="text-red-400 hover:text-red-300 hover:bg-red-500/10 p-1 rounded"
            >
              ✕
            </button>
          </td>
        </tr>
      );
    };

    // Summary Card
    const SummaryCard = ({ lcats, rates }) => {
      const totalAnnual = lcats.reduce((sum, lcat) => {
        const loaded = calculateLoadedRate(lcat.baseRate, rates.fringe, rates.overhead, rates.ga, rates.profit);
        return sum + (loaded * lcat.hours * lcat.quantity);
      }, 0);
      
      const totalFTE = lcats.reduce((sum, lcat) => sum + (lcat.hours * lcat.quantity / 2080), 0);
      const avgLoadedRate = totalAnnual / lcats.reduce((sum, lcat) => sum + (lcat.hours * lcat.quantity), 0) || 0;

      return (
        <div className="glass rounded-xl border border-amber-500/30 p-6 cui-glow">
          <div className="flex items-center gap-2 mb-4">
            <span className="text-amber-400">🔒</span>
            <h3 className="font-semibold text-white">Pricing Summary</h3>
            <span className="text-xs font-mono text-amber-400">{CUI_MARKING}</span>
          </div>
          
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div className="bg-slate-900/50 rounded-lg p-4 text-center">
              <p className="text-xs text-slate-400 mb-1">Total Annual</p>
              <p className="text-2xl font-bold text-emerald-400">{formatCurrency(totalAnnual)}</p>
            </div>
            <div className="bg-slate-900/50 rounded-lg p-4 text-center">
              <p className="text-xs text-slate-400 mb-1">Total FTEs</p>
              <p className="text-2xl font-bold text-cyan-400">{totalFTE.toFixed(1)}</p>
            </div>
            <div className="bg-slate-900/50 rounded-lg p-4 text-center">
              <p className="text-xs text-slate-400 mb-1">Avg Loaded Rate</p>
              <p className="text-2xl font-bold text-purple-400">{formatRate(avgLoadedRate)}</p>
            </div>
            <div className="bg-slate-900/50 rounded-lg p-4 text-center">
              <p className="text-xs text-slate-400 mb-1">Labor Categories</p>
              <p className="text-2xl font-bold text-amber-400">{lcats.length}</p>
            </div>
          </div>
        </div>
      );
    };

    // AI Chat Widget
    const AIChatWidget = ({ context }) => {
      const [isOpen, setIsOpen] = React.useState(false);
      const [messages, setMessages] = React.useState([]);
      const [input, setInput] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const messagesEndRef = React.useRef(null);

      React.useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      const handleSend = async () => {
        if (!input.trim() || loading) return;
        
        const userMsg = input.trim();
        setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
        setInput('');
        setLoading(true);

        const result = await sendToAI(userMsg, context);
        setMessages(prev => [...prev, { role: 'assistant', ...result }]);
        setLoading(false);
      };

      const suggestedPrompts = [
        'Analyze our wrap rates vs GSA schedule',
        'Suggest labor mix optimization',
        'Calculate price-to-win range',
        'Review compliance with FAR 15.404'
      ];

      if (!isOpen) {
        return (
          <button
            onClick={() => setIsOpen(true)}
            className="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-r from-amber-500 to-orange-600 rounded-full shadow-lg hover:shadow-amber-500/25 transition-all flex items-center justify-center z-50"
          >
            <span className="text-2xl">💬</span>
          </button>
        );
      }

      return (
        <div className="fixed bottom-6 right-6 w-96 h-[500px] glass border border-amber-500/30 rounded-xl shadow-2xl flex flex-col z-50">
          <div className="flex items-center justify-between p-4 border-b border-slate-700">
            <div>
              <h3 className="font-semibold text-white">Pricing Analyst</h3>
              <div className="flex items-center gap-2">
                <span className="text-xs text-amber-400">🔒 Secure Channel</span>
                <span className="text-xs font-mono text-amber-400/70">{CUI_MARKING}</span>
              </div>
            </div>
            <button onClick={() => setIsOpen(false)} className="text-slate-400 hover:text-white">✕</button>
          </div>
          
          <div className="flex-1 overflow-y-auto p-4 space-y-4">
            {messages.length === 0 && (
              <div className="space-y-2">
                <p className="text-xs text-slate-500 mb-3">Suggested queries:</p>
                {suggestedPrompts.map((prompt, i) => (
                  <button
                    key={i}
                    onClick={() => setInput(prompt)}
                    className="block w-full text-left px-3 py-2 rounded bg-slate-800 hover:bg-slate-700 text-slate-300 text-sm"
                  >
                    {prompt}
                  </button>
                ))}
              </div>
            )}
            {messages.map((msg, i) => (
              <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-[80%] px-4 py-2 rounded-lg ${
                  msg.role === 'user' ? 'bg-amber-600 text-white' : 
                  msg.error ? 'bg-red-900/50 text-red-300' : 'bg-slate-800 text-slate-200'
                }`}>
                  {msg.content}
                  {msg.cui && (
                    <span className="block text-xs text-amber-400 mt-1 font-mono">{msg.cui}</span>
                  )}
                </div>
              </div>
            ))}
            {loading && (
              <div className="flex justify-start">
                <div className="bg-slate-800 px-4 py-2 rounded-lg text-slate-400">
                  <span className="animate-pulse">Analyzing...</span>
                </div>
              </div>
            )}
            <div ref={messagesEndRef} />
          </div>
          
          <div className="p-4 border-t border-slate-700">
            <div className="flex gap-2">
              <input
                type="text"
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                placeholder="Ask about pricing..."
                className="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:outline-none focus:border-amber-500"
              />
              <button
                onClick={handleSend}
                disabled={loading || !input.trim()}
                className="px-4 py-2 bg-amber-600 hover:bg-amber-500 disabled:bg-slate-700 rounded-lg transition-colors"
              >
                →
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [lcats, setLcats] = React.useState(DEMO_LCATS);
      const [opportunities, setOpportunities] = React.useState(DEMO_OPPORTUNITIES);
      const [selectedOpp, setSelectedOpp] = React.useState(null);
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [preset, setPreset] = React.useState('OASIS');
      const [rates, setRates] = React.useState(WRAP_RATE_PRESETS['OASIS']);

      React.useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        try {
          // Load pricing items
          const { data: items, error: itemsError } = await supabase
            .from('pricing_items')
            .select('*')
            .order('created_at', { ascending: true });

          if (!itemsError && items && items.length > 0) {
            const formattedItems = items.map(item => ({
              id: item.id,
              title: item.labor_category || item.title,
              laborCategory: item.lcat_code || 'LCAT',
              baseRate: item.base_rate || 100,
              fringe: item.fringe_rate || 0.32,
              overhead: item.overhead_rate || 0.45,
              ga: item.ga_rate || 0.08,
              profit: item.profit_rate || 0.10,
              hours: item.hours || 2080,
              quantity: item.quantity || 1
            }));
            setLcats(formattedItems);
            setConnected(true);
          }

          // Load opportunities
          const { data: opps, error: oppsError } = await supabase
            .from('opportunities')
            .select('id, title, agency, ceiling_value')
            .order('title', { ascending: true });

          if (!oppsError && opps && opps.length > 0) {
            setOpportunities(opps);
          }
        } catch (e) {
          console.log('Using demo data:', e);
        } finally {
          setLoading(false);
        }
      };

      const handlePresetChange = (newPreset) => {
        setPreset(newPreset);
        setRates(WRAP_RATE_PRESETS[newPreset]);
      };

      const handleRateChange = (key, value) => {
        setRates(prev => ({ ...prev, [key]: value }));
        setPreset('Custom');
      };

      const handleUpdateLcat = (updated) => {
        setLcats(prev => prev.map(l => l.id === updated.id ? updated : l));
      };

      const handleDeleteLcat = (id) => {
        setLcats(prev => prev.filter(l => l.id !== id));
      };

      const handleAddLcat = () => {
        const newId = Math.max(...lcats.map(l => l.id), 0) + 1;
        setLcats(prev => [...prev, {
          id: newId,
          title: 'New Position',
          laborCategory: 'LCAT-XX',
          baseRate: 100.00,
          hours: 2080,
          quantity: 1
        }]);
      };

      const handleExport = () => {
        const exportData = {
          cuiMarking: CUI_MARKING,
          exportDate: new Date().toISOString(),
          wrapRates: rates,
          lcats: lcats.map(lcat => ({
            ...lcat,
            loadedRate: calculateLoadedRate(lcat.baseRate, rates.fringe, rates.overhead, rates.ga, rates.profit),
            annualCost: calculateLoadedRate(lcat.baseRate, rates.fringe, rates.overhead, rates.ga, rates.profit) * lcat.hours * lcat.quantity
          })),
          totals: {
            annual: lcats.reduce((sum, lcat) => {
              const loaded = calculateLoadedRate(lcat.baseRate, rates.fringe, rates.overhead, rates.ga, rates.profit);
              return sum + (loaded * lcat.hours * lcat.quantity);
            }, 0),
            fte: lcats.reduce((sum, lcat) => sum + (lcat.hours * lcat.quantity / 2080), 0)
          }
        };
        
        const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `pricing-boe-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
      };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-16 h-16 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-slate-400">Loading Pricing Engine...</p>
              <p className="text-xs text-amber-400 mt-2 font-mono">{CUI_MARKING}</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          <Header connected={connected} onBack={() => window.location.href = 'missionpulse-dashboard-v3.html'} />

          <main className="max-w-7xl mx-auto px-6 py-8 space-y-6">
            {/* Opportunity Selector */}
            <div className="glass rounded-xl border border-slate-700/50 p-4">
              <div className="flex items-center gap-4">
                <label className="text-sm text-slate-400">Opportunity:</label>
                <select
                  value={selectedOpp || ''}
                  onChange={(e) => setSelectedOpp(e.target.value)}
                  className="flex-1 max-w-md bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                >
                  <option value="">Select Opportunity...</option>
                  {opportunities.map(opp => (
                    <option key={opp.id} value={opp.id}>
                      {opp.title} ({opp.agency}) - {formatCurrency(opp.ceiling_value)}
                    </option>
                  ))}
                </select>
                <button
                  onClick={handleExport}
                  className="px-4 py-2 bg-amber-600 hover:bg-amber-500 rounded-lg text-sm font-medium transition-colors flex items-center gap-2"
                >
                  📥 Export BOE
                </button>
              </div>
            </div>

            {/* Wrap Rates */}
            <WrapRateCard 
              rates={rates}
              preset={preset}
              onPresetChange={handlePresetChange}
              onRateChange={handleRateChange}
            />

            {/* LCAT Table */}
            <div className="glass rounded-xl border border-slate-700/50 overflow-hidden">
              <div className="p-4 border-b border-slate-700 flex items-center justify-between">
                <h3 className="font-semibold text-white">Labor Categories (LCATs)</h3>
                <button
                  onClick={handleAddLcat}
                  className="px-3 py-1.5 bg-cyan-600 hover:bg-cyan-500 rounded-lg text-sm transition-colors"
                >
                  + Add LCAT
                </button>
              </div>
              
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead className="bg-slate-800/50">
                    <tr className="text-left text-xs text-slate-400 uppercase tracking-wider">
                      <th className="py-3 px-4">Position Title</th>
                      <th className="py-3 px-4">LCAT Code</th>
                      <th className="py-3 px-4">Base Rate</th>
                      <th className="py-3 px-4 text-right">Loaded Rate</th>
                      <th className="py-3 px-4">Hours</th>
                      <th className="py-3 px-4">Qty</th>
                      <th className="py-3 px-4 text-right">Annual Cost</th>
                      <th className="py-3 px-4"></th>
                    </tr>
                  </thead>
                  <tbody>
                    {lcats.map(lcat => (
                      <LCATRow
                        key={lcat.id}
                        lcat={lcat}
                        rates={rates}
                        onUpdate={handleUpdateLcat}
                        onDelete={handleDeleteLcat}
                      />
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Summary */}
            <SummaryCard lcats={lcats} rates={rates} />
          </main>

          {/* Footer */}
          <footer className="border-t border-slate-800 py-6">
            <div className="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-4">
                <p className="text-xs text-slate-500">
                  © 2026 Mission Meets Tech
                </p>
                <span className="text-xs font-mono text-amber-400">{CUI_MARKING}</span>
              </div>
              <p className="text-xs text-slate-600">
                AI GENERATED - REQUIRES HUMAN REVIEW
              </p>
            </div>
          </footer>

          {/* AI Chat */}
          <AIChatWidget context={{ lcats, rates, selectedOpp }} />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
