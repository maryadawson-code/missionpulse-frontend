<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-cyan { 0%, 100% { box-shadow: 0 0 0 0 rgba(0, 229, 250, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(0, 229, 250, 0); } }
    .pulse-icon { animation: pulse-cyan 2s infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const DEMO_LESSONS = [
      { 
        id: 1, 
        opportunity: 'VA-HIE-2024', 
        outcome: 'Won',
        phase: 'Technical Approach',
        category: 'Discriminator',
        title: 'Zero-Downtime Migration Methodology',
        description: 'Our emphasis on parallel-run migration with automatic failover was cited by evaluators as a key discriminator.',
        impact: 'High',
        recommendation: 'Always lead technical sections with risk mitigation strategies for data migration.',
        contributor: 'SA',
        date: '2025-11-15',
        tags: ['migration', 'technical', 'winner']
      },
      { 
        id: 2, 
        opportunity: 'DHA-Claims-2024', 
        outcome: 'Lost',
        phase: 'Pricing',
        category: 'Process',
        title: 'Insufficient Price-to-Win Analysis',
        description: 'We priced 15% above the winner. Post-debrief revealed we underestimated incumbent efficiency savings.',
        impact: 'Critical',
        recommendation: 'Conduct competitive price analysis earlier in capture. Include incumbent efficiency factors.',
        contributor: 'FIN',
        date: '2025-09-20',
        tags: ['pricing', 'competitive', 'improvement']
      },
      { 
        id: 3, 
        opportunity: 'CMS-Analytics-2024', 
        outcome: 'Won',
        phase: 'Orals',
        category: 'Presentation',
        title: 'Demo-Driven Technical Presentation',
        description: 'Live demo of our analytics dashboard during orals created strong impression. Evaluators referenced it positively.',
        impact: 'High',
        recommendation: 'When possible, include live demos in oral presentations. Prepare backup screenshots.',
        contributor: 'CAP',
        date: '2025-08-10',
        tags: ['orals', 'demo', 'winner']
      },
      { 
        id: 4, 
        opportunity: 'VA-CPA-2025', 
        outcome: 'Pending',
        phase: 'Past Performance',
        category: 'Content',
        title: 'Reference Relevance Scoring',
        description: 'Created scoring matrix to select most relevant past performance references based on NAICS, scope, and dollar value.',
        impact: 'Medium',
        recommendation: 'Maintain updated reference matrix. Score each reference against upcoming opportunity criteria.',
        contributor: 'PM',
        date: '2026-01-05',
        tags: ['past-performance', 'process']
      },
      { 
        id: 5, 
        opportunity: 'IHS-Tele-2024', 
        outcome: 'Lost',
        phase: 'Compliance',
        category: 'Process',
        title: 'Late Requirement Discovery',
        description: 'Discovered HIPAA BAA requirement in Section H.15 during Pink Team. Scrambled to address compliance.',
        impact: 'High',
        recommendation: 'Complete full RFP shred within 48 hours of release. Create compliance checklist from Day 1.',
        contributor: 'CON',
        date: '2025-06-22',
        tags: ['compliance', 'process', 'improvement']
      },
      { 
        id: 6, 
        opportunity: 'DOD-EHR-2024', 
        outcome: 'Won',
        phase: 'Teaming',
        category: 'Partnership',
        title: 'Early Teaming Agreement Execution',
        description: 'Signed teaming agreement 60 days before RFP release enabled joint solution development and stronger proposal.',
        impact: 'High',
        recommendation: 'Identify teaming partners during pre-RFP capture. Execute agreements before RFP drops.',
        contributor: 'CEO',
        date: '2025-04-18',
        tags: ['teaming', 'capture', 'winner']
      }
    ];

    const CATEGORIES = ['All', 'Discriminator', 'Process', 'Presentation', 'Content', 'Partnership'];
    const OUTCOMES = ['All', 'Won', 'Lost', 'Pending'];

    function Sidebar() {
      const navItems = [
        { icon: '🏠', label: 'Dashboard', path: 'index.html' },
        { icon: '📊', label: 'Pipeline', path: 'missionpulse-pipeline-v2.html' },
        { icon: '🎯', label: 'War Room', path: 'missionpulse-warroom-v2.html' },
        { icon: '📚', label: 'Lessons', path: 'missionpulse-lessons-v2.html', active: true },
        { icon: '🏆', label: 'Post-Award', path: 'missionpulse-postaward-v2.html' },
        { icon: '🤖', label: 'Agent Hub', path: 'missionpulse-agenthub-v2.html' }
      ];
      return (
        <div className="w-64 bg-slate-900/50 border-r border-slate-700 min-h-screen p-4 hidden lg:block">
          <div className="flex items-center gap-3 mb-8">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center pulse-icon">
              <span className="text-xl">📚</span>
            </div>
            <div>
              <div className="font-bold text-cyan-400">Lessons Learned</div>
              <div className="text-xs text-slate-400">Knowledge Base</div>
            </div>
          </div>
          <nav className="space-y-1">
            {navItems.map((item, i) => (
              <a key={i} href={item.path} className={`flex items-center gap-3 px-3 py-2 rounded-lg transition-all ${item.active ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                <span>{item.icon}</span><span className="text-sm">{item.label}</span>
              </a>
            ))}
          </nav>
        </div>
      );
    }

    function LessonCard({ lesson, onClick }) {
      const outcomeColors = { 'Won': 'bg-emerald-500/20 text-emerald-400', 'Lost': 'bg-red-500/20 text-red-400', 'Pending': 'bg-amber-500/20 text-amber-400' };
      const impactColors = { 'Critical': 'text-red-400', 'High': 'text-amber-400', 'Medium': 'text-cyan-400', 'Low': 'text-slate-400' };

      return (
        <div onClick={() => onClick(lesson)} className="bg-slate-800/50 border border-slate-700 rounded-xl p-4 hover:border-cyan-500/50 cursor-pointer transition-all">
          <div className="flex items-start justify-between gap-2 mb-3">
            <span className={`px-2 py-0.5 rounded text-xs ${outcomeColors[lesson.outcome]}`}>{lesson.outcome}</span>
            <span className={`text-xs ${impactColors[lesson.impact]}`}>● {lesson.impact} Impact</span>
          </div>
          <h3 className="font-medium mb-2">{lesson.title}</h3>
          <p className="text-sm text-slate-400 line-clamp-2 mb-3">{lesson.description}</p>
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2">
              <span className="px-2 py-0.5 bg-slate-700 rounded text-xs">{lesson.phase}</span>
              <span className="px-2 py-0.5 bg-slate-700 rounded text-xs">{lesson.category}</span>
            </div>
            <span className="text-xs text-slate-500">{lesson.opportunity}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [lessons, setLessons] = React.useState(DEMO_LESSONS);
      const [selectedLesson, setSelectedLesson] = React.useState(null);
      const [filterCategory, setFilterCategory] = React.useState('All');
      const [filterOutcome, setFilterOutcome] = React.useState('All');
      const [searchTerm, setSearchTerm] = React.useState('');
      const [showModal, setShowModal] = React.useState(false);

      const filtered = lessons.filter(l => {
        if (filterCategory !== 'All' && l.category !== filterCategory) return false;
        if (filterOutcome !== 'All' && l.outcome !== filterOutcome) return false;
        if (searchTerm) {
          const term = searchTerm.toLowerCase();
          if (!l.title.toLowerCase().includes(term) && !l.description.toLowerCase().includes(term) && !l.tags.some(t => t.includes(term))) return false;
        }
        return true;
      });

      const stats = {
        total: lessons.length,
        won: lessons.filter(l => l.outcome === 'Won').length,
        lost: lessons.filter(l => l.outcome === 'Lost').length,
        critical: lessons.filter(l => l.impact === 'Critical' || l.impact === 'High').length
      };

      return (
        <div className="flex min-h-screen">
          <Sidebar />
          <div className="flex-1 p-4 lg:p-6">
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
              <div>
                <h1 className="text-2xl font-bold">Lessons Learned</h1>
                <p className="text-slate-400 text-sm">Capture knowledge from proposals to improve win rates</p>
              </div>
              <button onClick={() => setShowModal(true)} className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg text-sm font-medium">
                + Add Lesson
              </button>
            </div>

            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <div className="text-2xl font-bold">{stats.total}</div>
                <div className="text-sm text-slate-400">Total Lessons</div>
              </div>
              <div className="bg-slate-800/50 border border-emerald-500/30 rounded-xl p-4">
                <div className="text-2xl font-bold text-emerald-400">{stats.won}</div>
                <div className="text-sm text-slate-400">From Wins</div>
              </div>
              <div className="bg-slate-800/50 border border-red-500/30 rounded-xl p-4">
                <div className="text-2xl font-bold text-red-400">{stats.lost}</div>
                <div className="text-sm text-slate-400">From Losses</div>
              </div>
              <div className="bg-slate-800/50 border border-amber-500/30 rounded-xl p-4">
                <div className="text-2xl font-bold text-amber-400">{stats.critical}</div>
                <div className="text-sm text-slate-400">High Impact</div>
              </div>
            </div>

            <div className="flex flex-col sm:flex-row gap-3 mb-6">
              <input
                type="text"
                value={searchTerm}
                onChange={(e) => setSearchTerm(e.target.value)}
                placeholder="Search lessons..."
                className="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
              />
              <select value={filterCategory} onChange={(e) => setFilterCategory(e.target.value)} className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-500">
                {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
              <select value={filterOutcome} onChange={(e) => setFilterOutcome(e.target.value)} className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-500">
                {OUTCOMES.map(o => <option key={o} value={o}>{o}</option>)}
              </select>
            </div>

            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
              {filtered.length === 0 ? (
                <div className="col-span-full text-center py-12 text-slate-500">No lessons found matching filters</div>
              ) : (
                filtered.map(lesson => <LessonCard key={lesson.id} lesson={lesson} onClick={setSelectedLesson} />)
              )}
            </div>

            {selectedLesson && (
              <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
                <div className="bg-slate-800 border border-slate-700 rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                  <div className="p-4 border-b border-slate-700 flex items-center justify-between">
                    <div className="flex items-center gap-2">
                      <span className={`px-2 py-0.5 rounded text-xs ${selectedLesson.outcome === 'Won' ? 'bg-emerald-500/20 text-emerald-400' : selectedLesson.outcome === 'Lost' ? 'bg-red-500/20 text-red-400' : 'bg-amber-500/20 text-amber-400'}`}>{selectedLesson.outcome}</span>
                      <span className="text-sm text-slate-400">{selectedLesson.opportunity}</span>
                    </div>
                    <button onClick={() => setSelectedLesson(null)} className="text-slate-400 hover:text-white text-xl">×</button>
                  </div>
                  <div className="p-6 space-y-4">
                    <h2 className="text-xl font-bold">{selectedLesson.title}</h2>
                    <div className="flex flex-wrap gap-2">
                      <span className="px-2 py-0.5 bg-slate-700 rounded text-xs">{selectedLesson.phase}</span>
                      <span className="px-2 py-0.5 bg-slate-700 rounded text-xs">{selectedLesson.category}</span>
                      {selectedLesson.tags.map(t => <span key={t} className="px-2 py-0.5 bg-cyan-500/20 text-cyan-400 rounded text-xs">#{t}</span>)}
                    </div>
                    <div>
                      <div className="text-sm text-slate-400 mb-1">Description</div>
                      <p className="text-sm">{selectedLesson.description}</p>
                    </div>
                    <div className="p-4 bg-cyan-500/10 border border-cyan-500/30 rounded-lg">
                      <div className="text-sm text-cyan-400 mb-1">💡 Recommendation</div>
                      <p className="text-sm">{selectedLesson.recommendation}</p>
                    </div>
                    <div className="flex items-center justify-between text-xs text-slate-500">
                      <span>Contributed by: {selectedLesson.contributor}</span>
                      <span>{selectedLesson.date}</span>
                    </div>
                  </div>
                  <div className="p-4 border-t border-slate-700 flex justify-end gap-3">
                    <button className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">✏️ Edit</button>
                    <button onClick={() => setSelectedLesson(null)} className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg text-sm font-medium">Close</button>
                  </div>
                </div>
              </div>
            )}

            {showModal && (
              <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
                <div className="bg-slate-800 border border-slate-700 rounded-xl max-w-lg w-full">
                  <div className="p-4 border-b border-slate-700 flex items-center justify-between">
                    <h2 className="font-semibold">Add New Lesson</h2>
                    <button onClick={() => setShowModal(false)} className="text-slate-400 hover:text-white">×</button>
                  </div>
                  <div className="p-4 space-y-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Title</label>
                      <input type="text" className="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-500" />
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Opportunity</label>
                        <input type="text" className="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-500" />
                      </div>
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Outcome</label>
                        <select className="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-500">
                          <option>Won</option><option>Lost</option><option>Pending</option>
                        </select>
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Description</label>
                      <textarea rows={3} className="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-500 resize-none" />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Recommendation</label>
                      <textarea rows={2} className="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-500 resize-none" />
                    </div>
                  </div>
                  <div className="p-4 border-t border-slate-700 flex justify-end gap-3">
                    <button onClick={() => setShowModal(false)} className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">Cancel</button>
                    <button onClick={() => setShowModal(false)} className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg text-sm font-medium">Save Lesson</button>
                  </div>
                </div>
              </div>
            )}

            <div className="mt-8 text-center text-xs text-slate-500">
              <div>Mission Meets Tech | MissionPulse Lessons Learned</div>
              <div className="mt-1">AI GENERATED - REQUIRES HUMAN REVIEW</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
