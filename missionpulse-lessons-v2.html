<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MissionPulse | Lessons Learned</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
        .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.15); }
        .glass-dark { background: rgba(0, 5, 15, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.2); }
        .glow { box-shadow: 0 0 30px rgba(0, 229, 250, 0.15); }
        .glow-text { text-shadow: 0 0 20px rgba(0, 229, 250, 0.5); }
        .lesson-card { transition: all 0.3s ease; }
        .lesson-card:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(0, 229, 250, 0.2); }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 5px rgba(0, 229, 250, 0.3); } 50% { box-shadow: 0 0 20px rgba(0, 229, 250, 0.6); } }
        .live-indicator { animation: pulse-glow 2s infinite; }
    </style>
</head>
<body class="text-white p-6">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const supabaseUrl = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzgwMTk1MjMsImV4cCI6MjA1MzU5NTUyM30.GFHJh-yID3FwkcKtiQMX3DEdJfe7IilFRpvILpvIASM';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        const CATEGORIES = [
            { id: 'capture', name: 'Capture Strategy', icon: '🎯', color: '#8b5cf6' },
            { id: 'proposal', name: 'Proposal Development', icon: '📝', color: '#06b6d4' },
            { id: 'pricing', name: 'Pricing & Cost', icon: '💰', color: '#22c55e' },
            { id: 'compliance', name: 'Compliance', icon: '✅', color: '#f59e0b' },
            { id: 'teaming', name: 'Teaming/Partners', icon: '🤝', color: '#ec4899' },
            { id: 'orals', name: 'Orals/Presentations', icon: '🎤', color: '#f43f5e' },
            { id: 'technical', name: 'Technical Approach', icon: '⚙️', color: '#3b82f6' },
            { id: 'process', name: 'Process/Tools', icon: '🔧', color: '#6366f1' }
        ];
        
        const IMPACT_LEVELS = ['High', 'Medium', 'Low'];
        const OUTCOME_TYPES = ['Win', 'Loss', 'No-Bid', 'In Progress'];
        
        const DEMO_OPPORTUNITIES = [
            { id: 'demo-1', title: 'DHA EHRM Support Services', nickname: 'DHA-EHRM', status: 'Active' },
            { id: 'demo-2', title: 'VA Digital Transformation', nickname: 'VA-DT', status: 'Won' },
            { id: 'demo-3', title: 'CMS Data Analytics Platform', nickname: 'CMS-DAP', status: 'Lost' }
        ];
        
        const DEMO_LESSONS = [
            { id: 'lesson-1', opportunity_id: 'demo-2', category: 'capture', title: 'Early Customer Engagement Drives Success', description: 'Started customer engagement 18 months before RFP release. Built relationships with key stakeholders through industry days and capability briefings.', recommendation: 'For similar opportunities, begin customer engagement at least 12-18 months pre-RFP. Document all touchpoints in CRM.', impact: 'High', outcome: 'Win', submitted_by: 'John Smith', created_at: '2026-01-15' },
            { id: 'lesson-2', opportunity_id: 'demo-2', category: 'pricing', title: 'Competitive Pricing Analysis Validated', description: 'Our PTW analysis was within 5% of winning price. Used multiple data sources including FPDS, GovWin, and industry contacts.', recommendation: 'Continue using multi-source PTW methodology. Consider adding salary survey data for more accurate labor rate estimates.', impact: 'High', outcome: 'Win', submitted_by: 'Jane Doe', created_at: '2026-01-16' },
            { id: 'lesson-3', opportunity_id: 'demo-3', category: 'technical', title: 'Innovation Section Scored Low', description: 'Debrief indicated our innovation section lacked specificity. Evaluators wanted concrete examples with measurable outcomes.', recommendation: 'Always include at least 3 specific innovation examples with metrics. Use past performance data to support innovation claims.', impact: 'High', outcome: 'Loss', submitted_by: 'Mike Johnson', created_at: '2026-01-20' },
            { id: 'lesson-4', opportunity_id: 'demo-3', category: 'teaming', title: 'Late Teaming Partner Integration', description: 'Added key subcontractor 2 weeks before submission. Integration was rushed and some past performance was not properly vetted.', recommendation: 'Finalize teaming arrangements at least 30 days before submission. Conduct thorough PP verification for all subs.', impact: 'Medium', outcome: 'Loss', submitted_by: 'Sarah Williams', created_at: '2026-01-21' },
            { id: 'lesson-5', opportunity_id: 'demo-2', category: 'orals', title: 'Mock Orals Rehearsals Paid Off', description: 'Conducted 5 full mock oral presentations with external evaluators. Identified and fixed presentation gaps before actual orals.', recommendation: 'Schedule minimum 3 mock orals. Use evaluators from outside the proposal team for unbiased feedback.', impact: 'High', outcome: 'Win', submitted_by: 'John Smith', created_at: '2026-01-17' },
            { id: 'lesson-6', opportunity_id: 'demo-1', category: 'compliance', title: 'Section L/M Matrix Improved Compliance', description: 'Created detailed L/M compliance matrix that mapped every requirement to proposal sections. Zero compliance findings in initial draft.', recommendation: 'Generate L/M matrix within 48 hours of RFP release. Use as primary coordination tool throughout proposal development.', impact: 'Medium', outcome: 'In Progress', submitted_by: 'Emily Chen', created_at: '2026-01-25' }
        ];
        
        function LessonsLearnedApp() {
            const [opportunities, setOpportunities] = useState([]);
            const [lessons, setLessons] = useState([]);
            const [isDemo, setIsDemo] = useState(true);
            const [loading, setLoading] = useState(true);
            const [showModal, setShowModal] = useState(false);
            const [editingLesson, setEditingLesson] = useState(null);
            const [filterCategory, setFilterCategory] = useState('all');
            const [filterOutcome, setFilterOutcome] = useState('all');
            const [filterImpact, setFilterImpact] = useState('all');
            const [searchTerm, setSearchTerm] = useState('');
            const [viewMode, setViewMode] = useState('grid');
            
            useEffect(() => { loadData(); }, []);
            
            const loadData = async () => {
                try {
                    const { data: oppData, error: oppError } = await supabase.from('opportunities').select('id, title, nickname, status').order('created_at', { ascending: false });
                    if (oppError) throw oppError;
                    
                    const { data: lessonData, error: lessonError } = await supabase.from('lessons_learned').select('*').order('created_at', { ascending: false });
                    if (lessonError) throw lessonError;
                    
                    if (oppData?.length > 0) {
                        setOpportunities(oppData);
                        setLessons(lessonData || []);
                        setIsDemo(false);
                    } else {
                        setOpportunities(DEMO_OPPORTUNITIES);
                        setLessons(DEMO_LESSONS);
                        setIsDemo(true);
                    }
                } catch {
                    setOpportunities(DEMO_OPPORTUNITIES);
                    setLessons(DEMO_LESSONS);
                    setIsDemo(true);
                }
                setLoading(false);
            };
            
            const saveLesson = async (data) => {
                if (isDemo) {
                    if (editingLesson) setLessons(prev => prev.map(l => l.id === editingLesson.id ? { ...l, ...data } : l));
                    else setLessons(prev => [{ ...data, id: `lesson-${Date.now()}`, created_at: new Date().toISOString() }, ...prev]);
                } else {
                    try {
                        if (editingLesson) await supabase.from('lessons_learned').update(data).eq('id', editingLesson.id);
                        else await supabase.from('lessons_learned').insert([data]);
                        loadData();
                    } catch (err) { console.error(err); }
                }
                setShowModal(false);
                setEditingLesson(null);
            };
            
            const deleteLesson = async (id) => {
                if (!confirm('Delete this lesson?')) return;
                if (isDemo) { setLessons(prev => prev.filter(l => l.id !== id)); return; }
                try { await supabase.from('lessons_learned').delete().eq('id', id); loadData(); } catch (err) { console.error(err); }
            };
            
            const filteredLessons = lessons.filter(l => {
                if (filterCategory !== 'all' && l.category !== filterCategory) return false;
                if (filterOutcome !== 'all' && l.outcome !== filterOutcome) return false;
                if (filterImpact !== 'all' && l.impact !== filterImpact) return false;
                if (searchTerm && !l.title.toLowerCase().includes(searchTerm.toLowerCase()) && !l.description.toLowerCase().includes(searchTerm.toLowerCase())) return false;
                return true;
            });
            
            const getCategoryInfo = (catId) => CATEGORIES.find(c => c.id === catId) || { name: catId, icon: '📋', color: '#6b7280' };
            
            const getImpactColor = (impact) => {
                const colors = { 'High': 'text-red-400 bg-red-400/20', 'Medium': 'text-amber-400 bg-amber-400/20', 'Low': 'text-green-400 bg-green-400/20' };
                return colors[impact] || 'text-gray-400 bg-gray-400/20';
            };
            
            const getOutcomeColor = (outcome) => {
                const colors = { 'Win': 'text-green-400 bg-green-400/20', 'Loss': 'text-red-400 bg-red-400/20', 'No-Bid': 'text-gray-400 bg-gray-400/20', 'In Progress': 'text-cyan-400 bg-cyan-400/20' };
                return colors[outcome] || 'text-gray-400 bg-gray-400/20';
            };
            
            const getOppName = (oppId) => {
                const opp = opportunities.find(o => o.id === oppId);
                return opp ? (opp.nickname || opp.title) : 'Unknown';
            };
            
            const categoryStats = CATEGORIES.map(cat => ({
                ...cat,
                count: lessons.filter(l => l.category === cat.id).length
            }));
            
            if (loading) return <div className="flex items-center justify-center h-screen"><div className="text-cyan-400 text-xl">Loading Lessons Learned...</div></div>;
            
            return (
                <div className="max-w-7xl mx-auto">
                    <div className="flex items-center justify-between mb-6">
                        <div className="flex items-center gap-4">
                            <a href="missionpulse-nav-hub.html" className="text-cyan-400 hover:text-cyan-300">← Hub</a>
                            <h1 className="text-3xl font-bold text-white glow-text">📚 Lessons Learned</h1>
                            <span className={`px-3 py-1 rounded-full text-xs ${isDemo ? 'bg-amber-500/20 text-amber-400' : 'bg-green-500/20 text-green-400 live-indicator'}`}>
                                {isDemo ? '○ Demo Mode' : '● Live'}
                            </span>
                        </div>
                        <button onClick={() => { setEditingLesson(null); setShowModal(true); }} className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 text-black font-semibold rounded-lg">+ Add Lesson</button>
                    </div>
                    
                    {/* Category Stats */}
                    <div className="grid grid-cols-4 md:grid-cols-8 gap-2 mb-6">
                        {categoryStats.map(cat => (
                            <div 
                                key={cat.id}
                                onClick={() => setFilterCategory(filterCategory === cat.id ? 'all' : cat.id)}
                                className={`glass-dark p-3 rounded-lg text-center cursor-pointer transition-all ${filterCategory === cat.id ? 'border-cyan-400' : ''}`}
                            >
                                <div className="text-2xl mb-1">{cat.icon}</div>
                                <div className="text-xs text-gray-400 truncate">{cat.name}</div>
                                <div className="text-lg font-bold" style={{ color: cat.color }}>{cat.count}</div>
                            </div>
                        ))}
                    </div>
                    
                    {/* Stats Row */}
                    <div className="grid grid-cols-4 gap-4 mb-6">
                        <div className="glass-dark p-4 rounded-lg text-center">
                            <div className="text-2xl font-bold text-white">{lessons.length}</div>
                            <div className="text-xs text-gray-400">Total Lessons</div>
                        </div>
                        <div className="glass-dark p-4 rounded-lg text-center">
                            <div className="text-2xl font-bold text-green-400">{lessons.filter(l => l.outcome === 'Win').length}</div>
                            <div className="text-xs text-gray-400">From Wins</div>
                        </div>
                        <div className="glass-dark p-4 rounded-lg text-center">
                            <div className="text-2xl font-bold text-red-400">{lessons.filter(l => l.outcome === 'Loss').length}</div>
                            <div className="text-xs text-gray-400">From Losses</div>
                        </div>
                        <div className="glass-dark p-4 rounded-lg text-center">
                            <div className="text-2xl font-bold text-amber-400">{lessons.filter(l => l.impact === 'High').length}</div>
                            <div className="text-xs text-gray-400">High Impact</div>
                        </div>
                    </div>
                    
                    {/* Filters */}
                    <div className="flex gap-4 mb-6 flex-wrap">
                        <input type="text" placeholder="Search lessons..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm flex-1 min-w-[200px]" />
                        <select value={filterOutcome} onChange={(e) => setFilterOutcome(e.target.value)} className="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm">
                            <option value="all">All Outcomes</option>
                            {OUTCOME_TYPES.map(o => <option key={o} value={o}>{o}</option>)}
                        </select>
                        <select value={filterImpact} onChange={(e) => setFilterImpact(e.target.value)} className="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm">
                            <option value="all">All Impact Levels</option>
                            {IMPACT_LEVELS.map(i => <option key={i} value={i}>{i}</option>)}
                        </select>
                        <div className="flex gap-1">
                            <button onClick={() => setViewMode('grid')} className={`px-3 py-2 rounded-lg ${viewMode === 'grid' ? 'bg-cyan-500 text-black' : 'bg-gray-800 text-gray-300'}`}>Grid</button>
                            <button onClick={() => setViewMode('list')} className={`px-3 py-2 rounded-lg ${viewMode === 'list' ? 'bg-cyan-500 text-black' : 'bg-gray-800 text-gray-300'}`}>List</button>
                        </div>
                        {(filterCategory !== 'all' || filterOutcome !== 'all' || filterImpact !== 'all') && (
                            <button onClick={() => { setFilterCategory('all'); setFilterOutcome('all'); setFilterImpact('all'); }} className="text-cyan-400 text-sm hover:underline">Clear filters</button>
                        )}
                    </div>
                    
                    {/* Lessons */}
                    {filteredLessons.length === 0 ? (
                        <div className="glass rounded-xl p-12 text-center">
                            <div className="text-4xl mb-4">📝</div>
                            <div className="text-gray-400">No lessons found. Start capturing lessons from your proposals!</div>
                        </div>
                    ) : viewMode === 'grid' ? (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {filteredLessons.map(lesson => {
                                const cat = getCategoryInfo(lesson.category);
                                return (
                                    <div key={lesson.id} className="glass rounded-xl p-4 lesson-card glow">
                                        <div className="flex items-start justify-between mb-3">
                                            <div className="flex items-center gap-2">
                                                <span className="text-xl">{cat.icon}</span>
                                                <span className="text-xs px-2 py-1 rounded" style={{ backgroundColor: `${cat.color}20`, color: cat.color }}>{cat.name}</span>
                                            </div>
                                            <div className="flex gap-1">
                                                <span className={`px-2 py-1 rounded text-xs ${getOutcomeColor(lesson.outcome)}`}>{lesson.outcome}</span>
                                                <span className={`px-2 py-1 rounded text-xs ${getImpactColor(lesson.impact)}`}>{lesson.impact}</span>
                                            </div>
                                        </div>
                                        <h3 className="text-lg font-semibold text-white mb-2">{lesson.title}</h3>
                                        <p className="text-sm text-gray-400 mb-3 line-clamp-3">{lesson.description}</p>
                                        <div className="p-3 bg-gray-800/50 rounded-lg mb-3">
                                            <div className="text-xs text-cyan-400 font-medium mb-1">💡 Recommendation</div>
                                            <p className="text-xs text-gray-300 line-clamp-2">{lesson.recommendation}</p>
                                        </div>
                                        <div className="flex items-center justify-between text-xs text-gray-500">
                                            <span>{getOppName(lesson.opportunity_id)}</span>
                                            <span>{new Date(lesson.created_at).toLocaleDateString()}</span>
                                        </div>
                                        <div className="flex gap-2 mt-3 pt-3 border-t border-gray-700">
                                            <button onClick={() => { setEditingLesson(lesson); setShowModal(true); }} className="text-cyan-400 hover:text-cyan-300 text-sm">Edit</button>
                                            <button onClick={() => deleteLesson(lesson.id)} className="text-red-400 hover:text-red-300 text-sm">Delete</button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    ) : (
                        <div className="glass rounded-xl overflow-hidden glow">
                            <table className="w-full">
                                <thead className="bg-gray-800/50">
                                    <tr className="text-left text-xs text-gray-400 uppercase">
                                        <th className="p-3">Category</th>
                                        <th className="p-3">Title</th>
                                        <th className="p-3">Opportunity</th>
                                        <th className="p-3">Outcome</th>
                                        <th className="p-3">Impact</th>
                                        <th className="p-3">Date</th>
                                        <th className="p-3">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredLessons.map(lesson => {
                                        const cat = getCategoryInfo(lesson.category);
                                        return (
                                            <tr key={lesson.id} className="border-t border-gray-700/50 hover:bg-gray-800/30">
                                                <td className="p-3">
                                                    <span className="flex items-center gap-2">
                                                        <span>{cat.icon}</span>
                                                        <span className="text-xs" style={{ color: cat.color }}>{cat.name}</span>
                                                    </span>
                                                </td>
                                                <td className="p-3">
                                                    <div className="font-medium text-white">{lesson.title}</div>
                                                    <div className="text-xs text-gray-400 line-clamp-1 max-w-xs">{lesson.description}</div>
                                                </td>
                                                <td className="p-3 text-sm text-gray-300">{getOppName(lesson.opportunity_id)}</td>
                                                <td className="p-3"><span className={`px-2 py-1 rounded text-xs ${getOutcomeColor(lesson.outcome)}`}>{lesson.outcome}</span></td>
                                                <td className="p-3"><span className={`px-2 py-1 rounded text-xs ${getImpactColor(lesson.impact)}`}>{lesson.impact}</span></td>
                                                <td className="p-3 text-sm text-gray-400">{new Date(lesson.created_at).toLocaleDateString()}</td>
                                                <td className="p-3">
                                                    <button onClick={() => { setEditingLesson(lesson); setShowModal(true); }} className="text-cyan-400 hover:text-cyan-300 text-sm mr-2">Edit</button>
                                                    <button onClick={() => deleteLesson(lesson.id)} className="text-red-400 hover:text-red-300 text-sm">Delete</button>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    )}
                    
                    {showModal && <LessonModal lesson={editingLesson} opportunities={opportunities} onSave={saveLesson} onClose={() => { setShowModal(false); setEditingLesson(null); }} />}
                    
                    <div className="text-center text-xs text-gray-500 mt-8 pt-4 border-t border-gray-800">MissionPulse v12 • Lessons Learned • AI outputs require human review</div>
                </div>
            );
        }
        
        function LessonModal({ lesson, opportunities, onSave, onClose }) {
            const [formData, setFormData] = useState(lesson || {
                opportunity_id: opportunities[0]?.id || '',
                category: 'capture',
                title: '',
                description: '',
                recommendation: '',
                impact: 'Medium',
                outcome: 'In Progress',
                submitted_by: ''
            });
            
            return (
                <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
                    <div className="glass-dark rounded-xl p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                        <h3 className="text-xl font-bold text-cyan-400 mb-4">{lesson ? 'Edit Lesson' : 'Add Lesson Learned'}</h3>
                        <form onSubmit={(e) => { e.preventDefault(); onSave(formData); }} className="space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Opportunity *</label>
                                    <select value={formData.opportunity_id} onChange={(e) => setFormData({ ...formData, opportunity_id: e.target.value })} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white">
                                        {opportunities.map(o => <option key={o.id} value={o.id}>{o.nickname || o.title}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Category *</label>
                                    <select value={formData.category} onChange={(e) => setFormData({ ...formData, category: e.target.value })} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white">
                                        {CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm text-gray-400 mb-1">Title *</label>
                                <input type="text" required value={formData.title} onChange={(e) => setFormData({ ...formData, title: e.target.value })} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white" placeholder="Brief, descriptive title" />
                            </div>
                            <div>
                                <label className="block text-sm text-gray-400 mb-1">Description *</label>
                                <textarea required value={formData.description} onChange={(e) => setFormData({ ...formData, description: e.target.value })} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white h-24" placeholder="What happened? What was the context?" />
                            </div>
                            <div>
                                <label className="block text-sm text-gray-400 mb-1">Recommendation *</label>
                                <textarea required value={formData.recommendation} onChange={(e) => setFormData({ ...formData, recommendation: e.target.value })} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white h-20" placeholder="What should we do differently next time?" />
                            </div>
                            <div className="grid grid-cols-3 gap-4">
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Outcome</label>
                                    <select value={formData.outcome} onChange={(e) => setFormData({ ...formData, outcome: e.target.value })} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white">
                                        {OUTCOME_TYPES.map(o => <option key={o} value={o}>{o}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Impact Level</label>
                                    <select value={formData.impact} onChange={(e) => setFormData({ ...formData, impact: e.target.value })} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white">
                                        {IMPACT_LEVELS.map(i => <option key={i} value={i}>{i}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Submitted By</label>
                                    <input type="text" value={formData.submitted_by} onChange={(e) => setFormData({ ...formData, submitted_by: e.target.value })} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white" placeholder="Your name" />
                                </div>
                            </div>
                            <div className="flex gap-3 pt-4">
                                <button type="submit" className="flex-1 bg-cyan-500 hover:bg-cyan-400 text-black font-semibold py-2 rounded-lg">{lesson ? 'Update Lesson' : 'Save Lesson'}</button>
                                <button type="button" onClick={onClose} className="px-4 py-2 border border-gray-600 text-gray-300 rounded-lg hover:bg-gray-800">Cancel</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }
        
        ReactDOM.render(<LessonsLearnedApp />, document.getElementById('root'));
    </script>
</body>
</html>
