<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lessons Learned | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:#00050F;color:#e2e8f0;min-height:100vh}.glass{background:rgba(15,23,42,0.85);backdrop-filter:blur(16px);border:1px solid rgba(0,229,250,0.1);border-radius:12px}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const SUPABASE_URL='https://qdrtpnpnhkxvfmvfziop.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
const supabase=window.supabase?.createClient(SUPABASE_URL,SUPABASE_ANON);

const CATEGORIES=['Process','Technical','Pricing','Teaming','Compliance','Strategy'];
const DEMO_LESSONS=[
  {id:1,title:'Early Color Team Reviews',category:'Process',lesson:'Starting Pink Team 2 weeks earlier reduced last-minute scrambles significantly.',impact:'HIGH',recommendation:'Build extra buffer into color team schedule'},
  {id:2,title:'Incumbent Intelligence',category:'Strategy',lesson:'We underestimated incumbent relationship depth with agency leadership.',impact:'CRITICAL',recommendation:'Conduct deeper stakeholder analysis earlier in capture'},
  {id:3,title:'Pricing Assumptions',category:'Pricing',lesson:'GSA rates were outdated by 8% which impacted competitiveness.',impact:'MEDIUM',recommendation:'Verify rate cards quarterly and before every proposal'}
];

function LessonsLearned(){
  const[connected,setConnected]=useState(false);
  const[lessons,setLessons]=useState(DEMO_LESSONS);
  const[filter,setFilter]=useState('all');
  const[showAdd,setShowAdd]=useState(false);
  const[newLesson,setNewLesson]=useState({title:'',category:'Process',lesson:'',impact:'MEDIUM',recommendation:''});

  useEffect(()=>{
    const load=async()=>{
      try{
        const{data,error}=await supabase.from('lessons_learned').select('*').order('created_at',{ascending:false});
        if(!error&&data?.length)setLessons(data);
        setConnected(!error);
      }catch{setConnected(false)}
    };
    load();
  },[]);

  const saveLesson=async()=>{
    if(!newLesson.title||!newLesson.lesson)return alert('Title and lesson required');
    try{
      const{data}=await supabase.from('lessons_learned').insert([newLesson]).select();
      if(data)setLessons([data[0],...lessons]);
      setShowAdd(false);
      setNewLesson({title:'',category:'Process',lesson:'',impact:'MEDIUM',recommendation:''});
    }catch(e){alert('Error: '+e.message)}
  };

  const filtered=filter==='all'?lessons:lessons.filter(l=>l.category===filter);
  const impactColor={LOW:'bg-slate-500/20 text-slate-400',MEDIUM:'bg-amber-500/20 text-amber-400',HIGH:'bg-orange-500/20 text-orange-400',CRITICAL:'bg-red-500/20 text-red-400'};

  return(
    <div className="min-h-screen p-6">
      <div className="flex justify-between items-start mb-6">
        <div>
          <h1 className="text-2xl font-bold text-white flex items-center gap-3">📚 Lessons Learned<span className={`text-xs px-2 py-1 rounded ${connected?'bg-emerald-500/20 text-emerald-400':'bg-red-500/20 text-red-400'}`}>{connected?'● Live':'○ Demo'}</span></h1>
          <p className="text-slate-400 text-sm mt-1">Capture and share institutional knowledge</p>
        </div>
        <button onClick={()=>setShowAdd(true)} className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-lg">+ Add Lesson</button>
      </div>

      <div className="grid grid-cols-4 gap-4 mb-6">
        <div className="glass p-4"><div className="text-slate-400 text-xs">Total Lessons</div><div className="text-2xl font-bold text-white">{lessons.length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Critical</div><div className="text-2xl font-bold text-red-400">{lessons.filter(l=>l.impact==='CRITICAL').length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">High Impact</div><div className="text-2xl font-bold text-orange-400">{lessons.filter(l=>l.impact==='HIGH').length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Categories</div><div className="text-2xl font-bold text-cyan-400">{new Set(lessons.map(l=>l.category)).size}</div></div>
      </div>

      <div className="flex gap-2 mb-4">
        <button onClick={()=>setFilter('all')} className={`px-3 py-1.5 rounded-lg text-sm ${filter==='all'?'bg-cyan-500 text-white':'bg-slate-800 text-slate-400'}`}>All</button>
        {CATEGORIES.map(c=>(
          <button key={c} onClick={()=>setFilter(c)} className={`px-3 py-1.5 rounded-lg text-sm ${filter===c?'bg-cyan-500 text-white':'bg-slate-800 text-slate-400'}`}>{c}</button>
        ))}
      </div>

      <div className="space-y-4">
        {filtered.map(l=>(
          <div key={l.id} className="glass p-4">
            <div className="flex justify-between items-start mb-2">
              <div className="flex items-center gap-2">
                <span className="px-2 py-0.5 rounded bg-slate-700 text-slate-300 text-xs">{l.category}</span>
                <span className={`px-2 py-0.5 rounded text-xs ${impactColor[l.impact]}`}>{l.impact}</span>
              </div>
            </div>
            <h3 className="font-semibold text-white mb-2">{l.title}</h3>
            <p className="text-slate-300 text-sm mb-3">{l.lesson}</p>
            {l.recommendation&&(
              <div className="bg-cyan-500/10 border border-cyan-500/30 rounded p-2">
                <span className="text-cyan-400 text-xs font-medium">💡 Recommendation: </span>
                <span className="text-slate-300 text-sm">{l.recommendation}</span>
              </div>
            )}
          </div>
        ))}
      </div>

      {showAdd&&(
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
          <div className="glass p-6 w-full max-w-lg">
            <h3 className="text-lg font-bold text-white mb-4">Add Lesson Learned</h3>
            <div className="space-y-3">
              <input value={newLesson.title} onChange={e=>setNewLesson({...newLesson,title:e.target.value})} placeholder="Title" className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
              <div className="grid grid-cols-2 gap-3">
                <select value={newLesson.category} onChange={e=>setNewLesson({...newLesson,category:e.target.value})} className="bg-slate-800 border border-slate-700 rounded-lg p-2 text-white">
                  {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
                <select value={newLesson.impact} onChange={e=>setNewLesson({...newLesson,impact:e.target.value})} className="bg-slate-800 border border-slate-700 rounded-lg p-2 text-white">
                  <option value="LOW">Low Impact</option>
                  <option value="MEDIUM">Medium Impact</option>
                  <option value="HIGH">High Impact</option>
                  <option value="CRITICAL">Critical</option>
                </select>
              </div>
              <textarea value={newLesson.lesson} onChange={e=>setNewLesson({...newLesson,lesson:e.target.value})} placeholder="What did we learn?" rows={3} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
              <textarea value={newLesson.recommendation} onChange={e=>setNewLesson({...newLesson,recommendation:e.target.value})} placeholder="Recommendation (optional)" rows={2} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
              <div className="flex gap-3">
                <button onClick={()=>setShowAdd(false)} className="flex-1 px-4 py-2 bg-slate-700 rounded-lg">Cancel</button>
                <button onClick={saveLesson} className="flex-1 px-4 py-2 bg-cyan-500 text-white rounded-lg">Save</button>
              </div>
            </div>
          </div>
        </div>
      )}
      <div className="text-center text-xs text-slate-500 mt-8">AI GENERATED - REQUIRES HUMAN REVIEW | © 2026 Mission Meets Tech</div>
    </div>
  );
}
ReactDOM.render(<LessonsLearned/>,document.getElementById('root'));
</script>
</body>
</html>
