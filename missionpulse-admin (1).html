<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
        .glass { background: rgba(0, 229, 250, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.2); }
        .glow { box-shadow: 0 0 20px rgba(0, 229, 250, 0.3); }
        .admin-card { transition: all 0.2s; }
        .admin-card:hover { transform: translateY(-2px); }
        .access-denied { background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(127, 29, 29, 0.1)); border-color: rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body class="text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // FILE: missionpulse-admin.html
        // ROLE: CEO, Admin ONLY (RBAC RESTRICTED)
        // SECURITY: env vars verified - Supabase anon key (public RLS model)
        
        const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc3NTY2NDcsImV4cCI6MjA1MzMzMjY0N30.Wfq14O6y2EpB2R0cJQPmWMFybMQc0PxLlHYXVLp2rws';
        const DEFAULT_COMPANY_ID = '11111111-1111-1111-1111-111111111111';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // RBAC: Only CEO and Admin can access this module
        const ALLOWED_ROLES = ['CEO', 'Admin'];
        const ALL_ROLES = ['CEO', 'COO', 'CAP', 'PM', 'SA', 'FIN', 'CON', 'DEL', 'QA', 'Partner', 'Admin'];
        
        const ROLE_PERMISSIONS = {
            CEO: ['all'],
            Admin: ['all'],
            COO: ['pipeline', 'warroom', 'swimlane', 'teaming', 'reports', 'blackhat'],
            CAP: ['pipeline', 'warroom', 'winthemes', 'compliance', 'blackhat', 'teaming'],
            PM: ['pipeline', 'warroom', 'swimlane', 'teaming', 'compliance', 'orals'],
            SA: ['pipeline', 'compliance', 'orals', 'playbook'],
            FIN: ['pipeline', 'pricing', 'reports'],
            CON: ['compliance', 'teaming'],
            DEL: ['teaming', 'swimlane'],
            QA: ['compliance', 'reports', 'playbook'],
            Partner: ['teaming', 'compliance']
        };
        
        const DEMO_USERS = [
            { id: '1', email: 'mary@missionmeetstech.com', full_name: 'Mary Womack', role: 'CEO', status: 'active', last_login: '2025-01-30' },
            { id: '2', email: 'john@missionmeetstech.com', full_name: 'John Davis', role: 'PM', status: 'active', last_login: '2025-01-29' },
            { id: '3', email: 'sarah@missionmeetstech.com', full_name: 'Sarah Chen', role: 'SA', status: 'active', last_login: '2025-01-28' },
            { id: '4', email: 'mike@partner.com', full_name: 'Mike Wilson', role: 'Partner', status: 'active', last_login: '2025-01-25' },
        ];
        
        const DEMO_AUDIT = [
            { id: '1', user: 'Mary Womack', action: 'Updated opportunity', target: 'VA-EHR-2025', timestamp: '2025-01-30 14:32:00' },
            { id: '2', user: 'John Davis', action: 'Added task', target: 'Draft Executive Summary', timestamp: '2025-01-30 13:15:00' },
            { id: '3', user: 'Sarah Chen', action: 'Modified compliance item', target: 'Section L.3', timestamp: '2025-01-30 11:45:00' },
            { id: '4', user: 'Mary Womack', action: 'Approved AI output', target: 'Win theme generation', timestamp: '2025-01-30 10:20:00' },
            { id: '5', user: 'System', action: 'Backup completed', target: 'Database', timestamp: '2025-01-30 03:00:00' },
        ];
        
        function App() {
            const [currentRole, setCurrentRole] = useState('CEO');
            const [activeTab, setActiveTab] = useState('users');
            const [users, setUsers] = useState([]);
            const [auditLog, setAuditLog] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showModal, setShowModal] = useState(false);
            const [editUser, setEditUser] = useState(null);
            const [systemSettings, setSystemSettings] = useState({
                aiEnabled: true,
                hitlRequired: true,
                auditRetention: 90,
                sessionTimeout: 30,
                mfaRequired: false,
                cuiMarking: true
            });
            
            // RBAC CHECK
            const hasAccess = ALLOWED_ROLES.includes(currentRole);
            
            useEffect(() => { 
                if (hasAccess) loadData(); 
                else setLoading(false);
            }, [hasAccess]);
            
            const loadData = async () => {
                try {
                    const [usersRes, auditRes] = await Promise.all([
                        supabase.from('profiles').select('*').eq('company_id', DEFAULT_COMPANY_ID),
                        supabase.from('audit_logs').select('*').order('created_at', { ascending: false }).limit(50)
                    ]);
                    
                    setUsers(usersRes.data?.length > 0 ? usersRes.data : DEMO_USERS);
                    setAuditLog(auditRes.data?.length > 0 ? auditRes.data : DEMO_AUDIT);
                } catch (err) {
                    console.error('Load error:', err);
                    setUsers(DEMO_USERS);
                    setAuditLog(DEMO_AUDIT);
                } finally {
                    setLoading(false);
                }
            };
            
            const saveUser = async (userData) => {
                try {
                    if (editUser?.id && !editUser.id.startsWith('temp-')) {
                        await supabase.from('profiles').update(userData).eq('id', editUser.id);
                    } else {
                        await supabase.from('profiles').insert({ ...userData, company_id: DEFAULT_COMPANY_ID });
                    }
                    loadData();
                } catch (err) {
                    console.error('Save error:', err);
                    const tempId = 'temp-' + Date.now();
                    setUsers([...users.filter(u => u.id !== editUser?.id), { ...userData, id: tempId }]);
                }
                setShowModal(false);
                setEditUser(null);
            };
            
            const deleteUser = async (userId) => {
                if (!confirm('Deactivate this user?')) return;
                setUsers(users.map(u => u.id === userId ? { ...u, status: 'inactive' } : u));
                try { 
                    await supabase.from('profiles').update({ status: 'inactive' }).eq('id', userId);
                } catch (err) { console.error(err); }
            };
            
            // RBAC GATE: Show access denied if not CEO/Admin
            if (!hasAccess) {
                return (
                    <div className="p-6 max-w-7xl mx-auto">
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <a href="index.html" className="text-cyan-400 hover:text-cyan-300 text-sm mb-2 inline-block">← Back to Dashboard</a>
                                <h1 className="text-3xl font-bold text-cyan-400">⚙️ Admin Panel</h1>
                            </div>
                            <select value={currentRole} onChange={e => setCurrentRole(e.target.value)}
                                className="bg-slate-800 border border-cyan-500/30 rounded px-3 py-2 text-cyan-400">
                                {ALL_ROLES.map(r => <option key={r} value={r}>{r}</option>)}
                            </select>
                        </div>
                        
                        <div className="access-denied glass rounded-xl p-12 text-center">
                            <div className="text-6xl mb-4">🔒</div>
                            <h2 className="text-2xl font-bold text-red-400 mb-2">Access Restricted</h2>
                            <p className="text-slate-400 mb-6">
                                This module requires <span className="text-cyan-400 font-semibold">CEO</span> or <span className="text-cyan-400 font-semibold">Admin</span> role.
                            </p>
                            <p className="text-slate-500 text-sm">
                                Current role: <span className="text-yellow-400">{currentRole}</span>
                            </p>
                            <a href="index.html" 
                                className="inline-block mt-6 bg-cyan-500 hover:bg-cyan-400 text-black font-bold px-6 py-2 rounded-lg transition">
                                Return to Dashboard
                            </a>
                        </div>
                        
                        <div className="mt-8 text-center text-slate-500 text-sm">
                            MissionPulse v3.1 • Mission Meets Tech • RBAC Enforced
                        </div>
                    </div>
                );
            }
            
            return (
                <div className="p-6 max-w-7xl mx-auto">
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <a href="index.html" className="text-cyan-400 hover:text-cyan-300 text-sm mb-2 inline-block">← Back to Dashboard</a>
                            <h1 className="text-3xl font-bold text-cyan-400">⚙️ Admin Panel</h1>
                            <p className="text-slate-400 mt-1">System configuration and user management</p>
                        </div>
                        <div className="flex gap-4 items-center">
                            <span className="bg-green-500/20 text-green-400 px-3 py-1 rounded text-sm">
                                ✓ {currentRole} Access
                            </span>
                            <select value={currentRole} onChange={e => setCurrentRole(e.target.value)}
                                className="bg-slate-800 border border-cyan-500/30 rounded px-3 py-2 text-cyan-400">
                                {ALL_ROLES.map(r => <option key={r} value={r}>{r}</option>)}
                            </select>
                        </div>
                    </div>
                    
                    {/* Tabs */}
                    <div className="flex gap-4 mb-6">
                        {['users', 'roles', 'settings', 'audit'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)}
                                className={`px-4 py-2 rounded-lg font-semibold capitalize transition ${
                                    activeTab === tab ? 'bg-cyan-500 text-black' : 'glass text-cyan-400 hover:bg-cyan-500/20'
                                }`}>
                                {tab === 'users' && '👥'} {tab === 'roles' && '🔐'} {tab === 'settings' && '⚙️'} {tab === 'audit' && '📋'}
                                {' '}{tab}
                            </button>
                        ))}
                    </div>
                    
                    {loading ? (
                        <div className="text-center py-20 text-cyan-400">Loading...</div>
                    ) : activeTab === 'users' ? (
                        <div className="glass rounded-xl p-6">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-xl font-bold text-cyan-400">User Management</h2>
                                <button onClick={() => { setEditUser({}); setShowModal(true); }}
                                    className="bg-cyan-500 hover:bg-cyan-400 text-black font-bold px-4 py-2 rounded-lg transition">
                                    + Add User
                                </button>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead>
                                        <tr className="border-b border-cyan-500/20 text-left">
                                            <th className="pb-3 text-cyan-400">Name</th>
                                            <th className="pb-3 text-cyan-400">Email</th>
                                            <th className="pb-3 text-cyan-400">Role</th>
                                            <th className="pb-3 text-cyan-400">Status</th>
                                            <th className="pb-3 text-cyan-400">Last Login</th>
                                            <th className="pb-3 text-cyan-400">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {users.map(user => (
                                            <tr key={user.id} className="border-b border-slate-700/50 hover:bg-cyan-500/5">
                                                <td className="py-3 font-semibold">{user.full_name}</td>
                                                <td className="py-3 text-slate-300">{user.email}</td>
                                                <td className="py-3">
                                                    <span className={`px-2 py-1 rounded text-xs ${
                                                        ['CEO', 'Admin'].includes(user.role) ? 'bg-purple-500/20 text-purple-400' :
                                                        user.role === 'Partner' ? 'bg-yellow-500/20 text-yellow-400' :
                                                        'bg-cyan-500/20 text-cyan-400'
                                                    }`}>{user.role}</span>
                                                </td>
                                                <td className="py-3">
                                                    <span className={`px-2 py-1 rounded text-xs ${
                                                        user.status === 'active' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'
                                                    }`}>{user.status}</span>
                                                </td>
                                                <td className="py-3 text-slate-400 text-sm">{user.last_login}</td>
                                                <td className="py-3">
                                                    <button onClick={() => { setEditUser(user); setShowModal(true); }}
                                                        className="text-cyan-400 hover:text-cyan-300 mr-2">✏️</button>
                                                    <button onClick={() => deleteUser(user.id)}
                                                        className="text-red-400 hover:text-red-300">🚫</button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    ) : activeTab === 'roles' ? (
                        <div className="glass rounded-xl p-6">
                            <h2 className="text-xl font-bold text-cyan-400 mb-4">Role Permissions Matrix</h2>
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead>
                                        <tr className="border-b border-cyan-500/20">
                                            <th className="pb-3 text-left text-cyan-400">Role</th>
                                            <th className="pb-3 text-center">Pipeline</th>
                                            <th className="pb-3 text-center">War Room</th>
                                            <th className="pb-3 text-center">Swimlane</th>
                                            <th className="pb-3 text-center">Compliance</th>
                                            <th className="pb-3 text-center">Black Hat</th>
                                            <th className="pb-3 text-center">Pricing</th>
                                            <th className="pb-3 text-center">Admin</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {Object.entries(ROLE_PERMISSIONS).map(([role, perms]) => (
                                            <tr key={role} className="border-b border-slate-700/50">
                                                <td className="py-3 font-semibold">{role}</td>
                                                {['pipeline', 'warroom', 'swimlane', 'compliance', 'blackhat', 'pricing', 'admin'].map(perm => (
                                                    <td key={perm} className="py-3 text-center">
                                                        {perms.includes('all') || perms.includes(perm) ? (
                                                            <span className="text-green-400">✓</span>
                                                        ) : (
                                                            <span className="text-slate-600">-</span>
                                                        )}
                                                    </td>
                                                ))}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                            <div className="mt-6 p-4 bg-slate-800/50 rounded-lg">
                                <h3 className="text-cyan-400 font-semibold mb-2">RBAC Implementation Notes</h3>
                                <ul className="text-slate-400 text-sm space-y-1">
                                    <li>• <strong className="text-cyan-400">Invisible RBAC:</strong> Restricted features don't render (no "Access Denied" for most modules)</li>
                                    <li>• <strong className="text-cyan-400">Partner Access:</strong> Auto-revokes upon proposal submission</li>
                                    <li>• <strong className="text-cyan-400">Admin Panel:</strong> CEO and Admin only (this module)</li>
                                    <li>• <strong className="text-cyan-400">Black Hat:</strong> CEO, COO, CAP, Admin only</li>
                                </ul>
                            </div>
                        </div>
                    ) : activeTab === 'settings' ? (
                        <div className="glass rounded-xl p-6">
                            <h2 className="text-xl font-bold text-cyan-400 mb-4">System Settings</h2>
                            <div className="space-y-6">
                                <div className="grid grid-cols-2 gap-6">
                                    <div className="space-y-4">
                                        <h3 className="text-slate-300 font-semibold border-b border-cyan-500/20 pb-2">AI Configuration</h3>
                                        <label className="flex items-center justify-between">
                                            <span className="text-slate-400">AI Features Enabled</span>
                                            <input type="checkbox" checked={systemSettings.aiEnabled} 
                                                onChange={e => setSystemSettings({...systemSettings, aiEnabled: e.target.checked})}
                                                className="w-5 h-5 accent-cyan-500" />
                                        </label>
                                        <label className="flex items-center justify-between">
                                            <span className="text-slate-400">Human-in-the-Loop Required</span>
                                            <input type="checkbox" checked={systemSettings.hitlRequired} 
                                                onChange={e => setSystemSettings({...systemSettings, hitlRequired: e.target.checked})}
                                                className="w-5 h-5 accent-cyan-500" />
                                        </label>
                                        <label className="flex items-center justify-between">
                                            <span className="text-slate-400">CUI Marking Enabled</span>
                                            <input type="checkbox" checked={systemSettings.cuiMarking} 
                                                onChange={e => setSystemSettings({...systemSettings, cuiMarking: e.target.checked})}
                                                className="w-5 h-5 accent-cyan-500" />
                                        </label>
                                    </div>
                                    <div className="space-y-4">
                                        <h3 className="text-slate-300 font-semibold border-b border-cyan-500/20 pb-2">Security Settings</h3>
                                        <label className="flex items-center justify-between">
                                            <span className="text-slate-400">MFA Required</span>
                                            <input type="checkbox" checked={systemSettings.mfaRequired} 
                                                onChange={e => setSystemSettings({...systemSettings, mfaRequired: e.target.checked})}
                                                className="w-5 h-5 accent-cyan-500" />
                                        </label>
                                        <label className="flex items-center justify-between">
                                            <span className="text-slate-400">Session Timeout (min)</span>
                                            <input type="number" value={systemSettings.sessionTimeout} 
                                                onChange={e => setSystemSettings({...systemSettings, sessionTimeout: parseInt(e.target.value)})}
                                                className="w-20 bg-slate-800 border border-cyan-500/30 rounded px-2 py-1 text-white text-right" />
                                        </label>
                                        <label className="flex items-center justify-between">
                                            <span className="text-slate-400">Audit Log Retention (days)</span>
                                            <input type="number" value={systemSettings.auditRetention} 
                                                onChange={e => setSystemSettings({...systemSettings, auditRetention: parseInt(e.target.value)})}
                                                className="w-20 bg-slate-800 border border-cyan-500/30 rounded px-2 py-1 text-white text-right" />
                                        </label>
                                    </div>
                                </div>
                                <div className="flex justify-end pt-4 border-t border-cyan-500/20">
                                    <button className="bg-cyan-500 hover:bg-cyan-400 text-black font-bold px-6 py-2 rounded-lg transition">
                                        Save Settings
                                    </button>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="glass rounded-xl p-6">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-xl font-bold text-cyan-400">Audit Log</h2>
                                <button onClick={loadData} className="text-cyan-400 hover:text-cyan-300 text-sm">🔄 Refresh</button>
                            </div>
                            <div className="space-y-2">
                                {auditLog.map(entry => (
                                    <div key={entry.id} className="flex items-center gap-4 p-3 bg-slate-800/30 rounded-lg">
                                        <div className="w-10 h-10 bg-cyan-500/20 rounded-full flex items-center justify-center text-cyan-400">
                                            {entry.user?.charAt(0) || '?'}
                                        </div>
                                        <div className="flex-1">
                                            <p className="text-white">
                                                <span className="font-semibold">{entry.user}</span>
                                                <span className="text-slate-400"> {entry.action}: </span>
                                                <span className="text-cyan-400">{entry.target}</span>
                                            </p>
                                            <p className="text-slate-500 text-xs">{entry.timestamp}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                    
                    {showModal && (
                        <UserModal user={editUser} onSave={saveUser} onClose={() => { setShowModal(false); setEditUser(null); }} />
                    )}
                    
                    <div className="mt-8 text-center text-slate-500 text-sm">
                        MissionPulse v3.1 • Mission Meets Tech • AI GENERATED CONTENT REQUIRES HUMAN REVIEW
                    </div>
                </div>
            );
        }
        
        function UserModal({ user, onSave, onClose }) {
            const [form, setForm] = useState({
                full_name: user?.full_name || '',
                email: user?.email || '',
                role: user?.role || 'PM',
                status: user?.status || 'active'
            });
            
            return (
                <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50" onClick={onClose}>
                    <div className="glass rounded-xl p-6 w-full max-w-lg" onClick={e => e.stopPropagation()}>
                        <h2 className="text-xl font-bold text-cyan-400 mb-4">{user?.id ? 'Edit User' : 'Add User'}</h2>
                        <form onSubmit={e => { e.preventDefault(); onSave(form); }} className="space-y-4">
                            <div>
                                <label className="block text-sm text-slate-400 mb-1">Full Name</label>
                                <input type="text" value={form.full_name} onChange={e => setForm({...form, full_name: e.target.value})}
                                    className="w-full bg-slate-800 border border-cyan-500/30 rounded px-3 py-2 text-white" required />
                            </div>
                            <div>
                                <label className="block text-sm text-slate-400 mb-1">Email</label>
                                <input type="email" value={form.email} onChange={e => setForm({...form, email: e.target.value})}
                                    className="w-full bg-slate-800 border border-cyan-500/30 rounded px-3 py-2 text-white" required />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm text-slate-400 mb-1">Role</label>
                                    <select value={form.role} onChange={e => setForm({...form, role: e.target.value})}
                                        className="w-full bg-slate-800 border border-cyan-500/30 rounded px-3 py-2 text-white">
                                        {ALL_ROLES.map(r => <option key={r} value={r}>{r}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm text-slate-400 mb-1">Status</label>
                                    <select value={form.status} onChange={e => setForm({...form, status: e.target.value})}
                                        className="w-full bg-slate-800 border border-cyan-500/30 rounded px-3 py-2 text-white">
                                        <option value="active">Active</option>
                                        <option value="inactive">Inactive</option>
                                        <option value="pending">Pending</option>
                                    </select>
                                </div>
                            </div>
                            <div className="flex gap-3 justify-end mt-6">
                                <button type="button" onClick={onClose}
                                    className="px-4 py-2 border border-slate-600 rounded-lg hover:bg-slate-700 transition">Cancel</button>
                                <button type="submit"
                                    className="px-4 py-2 bg-cyan-500 text-black font-bold rounded-lg hover:bg-cyan-400 transition">Save User</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }
        
        const ALL_ROLES = ['CEO', 'COO', 'CAP', 'PM', 'SA', 'FIN', 'CON', 'DEL', 'QA', 'Partner', 'Admin'];
        
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
