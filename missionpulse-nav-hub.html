<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Mission Meets Tech</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.1); }
    .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
    .glow-cyan { box-shadow: 0 0 20px rgba(0, 229, 250, 0.15); }
    .hover-glow:hover { box-shadow: 0 0 30px rgba(0, 229, 250, 0.25); border-color: rgba(0, 229, 250, 0.4); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(0, 229, 250, 0.3); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Module Categories and Links
    const MODULE_CATEGORIES = [
      {
        id: 'core',
        name: 'Core Operations',
        icon: '🎯',
        color: '#00E5FA',
        modules: [
          { name: 'Executive Dashboard', href: 'missionpulse-dashboard-v12.html', status: 'live', description: 'Pipeline overview & KPIs' },
          { name: 'Pipeline Management', href: 'missionpulse-m1-enhanced.html', status: 'live', description: 'Opportunity tracking & Go/No-Go' },
          { name: 'War Room', href: 'missionpulse-m2-warroom-enhanced.html', status: 'live', description: 'Team collaboration hub' },
          { name: 'Swimlane Board', href: 'missionpulse-m3-swimlane-board.html', status: 'live', description: 'Kanban workflow management' },
        ]
      },
      {
        id: 'intelligence',
        name: 'Intelligence & Analysis',
        icon: '🔍',
        color: '#8B5CF6',
        modules: [
          { name: 'RFP Shredder', href: 'missionpulse-rfp-shredder.html', status: 'live', description: 'AI document analysis' },
          { name: 'Contract Scanner', href: 'missionpulse-m5-contracts-enhanced.html', status: 'live', description: 'FAR/DFARS compliance check' },
          { name: 'Black Hat Analysis', href: 'missionpulse-m7-blackhat-enhanced.html', status: 'restricted', description: 'Competitive intelligence', badge: 'RBAC' },
          { name: 'Frenemy Protocol', href: 'missionpulse-m11-frenemy-protocol.html', status: 'live', description: 'Partner/competitor tracking' },
        ]
      },
      {
        id: 'compliance',
        name: 'Compliance & Security',
        icon: '🛡️',
        color: '#EF4444',
        modules: [
          { name: 'Iron Dome', href: 'missionpulse-m6-iron-dome.html', status: 'live', description: 'Compliance matrix & CUI handling' },
          { name: 'RBAC Manager', href: 'missionpulse-task16-rbac.html', status: 'live', description: 'Role-based access control', badge: 'Admin' },
          { name: 'Audit Trail', href: 'missionpulse-audit.html', status: 'live', description: 'Activity logging & compliance' },
        ]
      },
      {
        id: 'pricing',
        name: 'Pricing & Financials',
        icon: '💰',
        color: '#10B981',
        modules: [
          { name: 'Pricing Studio', href: 'missionpulse-m8-pricing.html', status: 'live', description: 'BOE & cost modeling', badge: 'CUI' },
          { name: 'LCAT Manager', href: 'missionpulse-lcat.html', status: 'live', description: 'Labor category rates' },
          { name: 'ROI Calculator', href: 'missionpulse-m13-launch-roi.html', status: 'live', description: 'Win probability & ROI' },
        ]
      },
      {
        id: 'delivery',
        name: 'Proposal Delivery',
        icon: '📄',
        color: '#F59E0B',
        modules: [
          { name: 'HITL Review', href: 'missionpulse-m9-hitl-enhanced.html', status: 'live', description: 'Human-in-the-loop QA' },
          { name: 'Orals Studio', href: 'missionpulse-orals.html', status: 'live', description: 'Presentation builder' },
          { name: 'Launch Checklist', href: 'missionpulse-launch.html', status: 'live', description: 'Submission readiness' },
        ]
      },
      {
        id: 'post',
        name: 'Post-Award',
        icon: '🏆',
        color: '#A855F7',
        modules: [
          { name: 'Post-Award Tracker', href: 'missionpulse-m14-post-award.html', status: 'live', description: 'Contract performance' },
          { name: 'Lessons Learned', href: 'missionpulse-m15-lessons-playbook.html', status: 'live', description: 'Knowledge capture' },
          { name: 'Playbook Engine', href: 'missionpulse-playbook.html', status: 'live', description: 'Best practices library' },
        ]
      },
      {
        id: 'ai',
        name: 'AI Agent Hub',
        icon: '🤖',
        color: '#06B6D4',
        modules: [
          { name: 'Agent Hub', href: 'missionpulse-agent-hub.html', status: 'live', description: '8 specialized AI agents' },
          { name: 'Capture Agent', href: 'missionpulse-agent-hub.html#capture', status: 'live', description: 'Opportunity intel' },
          { name: 'Strategy Agent', href: 'missionpulse-agent-hub.html#strategy', status: 'live', description: 'Win theme development' },
          { name: 'Compliance Agent', href: 'missionpulse-agent-hub.html#compliance', status: 'live', description: 'FAR/DFARS guidance' },
          { name: 'Writer Agent', href: 'missionpulse-agent-hub.html#writer', status: 'live', description: 'Proposal drafting' },
        ]
      },
      {
        id: 'admin',
        name: 'Administration',
        icon: '⚙️',
        color: '#64748B',
        modules: [
          { name: 'User Management', href: 'missionpulse-users.html', status: 'live', description: 'Team & permissions', badge: 'Admin' },
          { name: 'Company Settings', href: 'missionpulse-settings.html', status: 'live', description: 'Organization config' },
          { name: 'Integration Hub', href: 'missionpulse-integrations.html', status: 'demo', description: 'HubSpot, SharePoint, etc.' },
        ]
      },
    ];

    // Quick Stats
    const QUICK_STATS = [
      { label: 'Active Opps', value: '12', trend: '+3', color: '#00E5FA' },
      { label: 'Pipeline Value', value: '$847M', trend: '+$125M', color: '#10B981' },
      { label: 'Win Rate', value: '68%', trend: '+8%', color: '#8B5CF6' },
      { label: 'Days to Submit', value: '14', trend: '-', color: '#F59E0B' },
    ];

    // Status Badge Component
    const StatusBadge = ({ status, badge }) => {
      const statusStyles = {
        live: 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30',
        demo: 'bg-amber-500/20 text-amber-400 border-amber-500/30',
        restricted: 'bg-red-500/20 text-red-400 border-red-500/30',
      };
      
      return (
        <div className="flex items-center gap-1.5">
          <span className={`px-2 py-0.5 text-[10px] font-medium rounded-full border ${statusStyles[status]}`}>
            {status === 'live' ? '● LIVE' : status === 'demo' ? '◐ DEMO' : '🔒 RBAC'}
          </span>
          {badge && (
            <span className="px-2 py-0.5 text-[10px] font-medium rounded-full bg-slate-700/50 text-slate-300 border border-slate-600">
              {badge}
            </span>
          )}
        </div>
      );
    };

    // Module Card Component
    const ModuleCard = ({ module, categoryColor }) => (
      <a 
        href={module.href}
        className="group glass-card rounded-xl p-4 hover-glow transition-all duration-300 block"
      >
        <div className="flex items-start justify-between mb-2">
          <h4 className="font-semibold text-white group-hover:text-cyan-400 transition-colors">
            {module.name}
          </h4>
          <StatusBadge status={module.status} badge={module.badge} />
        </div>
        <p className="text-sm text-slate-400 mb-3">{module.description}</p>
        <div className="flex items-center text-xs text-slate-500 group-hover:text-cyan-400 transition-colors">
          <span>Open Module</span>
          <svg className="w-4 h-4 ml-1 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
          </svg>
        </div>
      </a>
    );

    // Category Section Component
    const CategorySection = ({ category }) => (
      <div className="mb-8 animate-fadeIn">
        <div className="flex items-center gap-3 mb-4">
          <span className="text-2xl">{category.icon}</span>
          <h3 className="text-lg font-bold text-white">{category.name}</h3>
          <div className="flex-1 h-px bg-gradient-to-r from-slate-700 to-transparent"></div>
          <span className="text-xs text-slate-500">{category.modules.length} modules</span>
        </div>
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
          {category.modules.map((module, idx) => (
            <ModuleCard key={idx} module={module} categoryColor={category.color} />
          ))}
        </div>
      </div>
    );

    // Main App Component
    function MissionPulseHub() {
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedCategory, setSelectedCategory] = useState('all');
      const [user, setUser] = useState({ name: 'Mary Womack', role: 'CEO', company: 'Mission Meets Tech' });

      // Filter modules based on search and category
      const filteredCategories = MODULE_CATEGORIES.filter(cat => {
        if (selectedCategory !== 'all' && cat.id !== selectedCategory) return false;
        if (!searchQuery) return true;
        return cat.modules.some(m => 
          m.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
          m.description.toLowerCase().includes(searchQuery.toLowerCase())
        );
      }).map(cat => ({
        ...cat,
        modules: searchQuery 
          ? cat.modules.filter(m => 
              m.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
              m.description.toLowerCase().includes(searchQuery.toLowerCase())
            )
          : cat.modules
      })).filter(cat => cat.modules.length > 0);

      const totalModules = MODULE_CATEGORIES.reduce((sum, cat) => sum + cat.modules.length, 0);

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
            <div className="max-w-[1800px] mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                {/* Logo & Brand */}
                <div className="flex items-center gap-4">
                  <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-500 to-teal-600 flex items-center justify-center glow-cyan">
                    <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold text-white">MissionPulse</h1>
                    <p className="text-xs text-cyan-400">Mission. Technology. Transformation.</p>
                  </div>
                </div>

                {/* Search */}
                <div className="flex-1 max-w-xl mx-8">
                  <div className="relative">
                    <svg className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <input
                      type="text"
                      placeholder="Search modules..."
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      className="w-full pl-12 pr-4 py-2.5 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20 transition-all"
                    />
                  </div>
                </div>

                {/* User Menu */}
                <div className="flex items-center gap-4">
                  <a href="login.html" className="text-sm text-slate-400 hover:text-white transition-colors">Logout</a>
                  <div className="flex items-center gap-3 pl-4 border-l border-slate-700">
                    <div className="text-right">
                      <p className="text-sm font-medium text-white">{user.name}</p>
                      <p className="text-xs text-slate-400">{user.role} • {user.company}</p>
                    </div>
                    <div className="w-10 h-10 rounded-full bg-gradient-to-br from-cyan-500 to-purple-600 flex items-center justify-center text-white font-bold">
                      {user.name.split(' ').map(n => n[0]).join('')}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </header>

          <div className="max-w-[1800px] mx-auto px-6 py-8">
            {/* Quick Stats */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
              {QUICK_STATS.map((stat, idx) => (
                <div key={idx} className="glass-card rounded-xl p-4">
                  <p className="text-sm text-slate-400 mb-1">{stat.label}</p>
                  <div className="flex items-baseline gap-2">
                    <span className="text-2xl font-bold" style={{ color: stat.color }}>{stat.value}</span>
                    {stat.trend !== '-' && (
                      <span className="text-xs text-emerald-400">{stat.trend}</span>
                    )}
                  </div>
                </div>
              ))}
            </div>

            {/* Category Filter */}
            <div className="flex items-center gap-2 mb-8 overflow-x-auto pb-2 scrollbar-thin">
              <button
                onClick={() => setSelectedCategory('all')}
                className={`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all ${
                  selectedCategory === 'all'
                    ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30'
                    : 'bg-slate-800/50 text-slate-400 border border-slate-700 hover:border-slate-600'
                }`}
              >
                All Modules ({totalModules})
              </button>
              {MODULE_CATEGORIES.map(cat => (
                <button
                  key={cat.id}
                  onClick={() => setSelectedCategory(cat.id)}
                  className={`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all flex items-center gap-2 ${
                    selectedCategory === cat.id
                      ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30'
                      : 'bg-slate-800/50 text-slate-400 border border-slate-700 hover:border-slate-600'
                  }`}
                >
                  <span>{cat.icon}</span>
                  <span>{cat.name}</span>
                </button>
              ))}
            </div>

            {/* Module Grid */}
            <div className="space-y-8">
              {filteredCategories.map(category => (
                <CategorySection key={category.id} category={category} />
              ))}
              
              {filteredCategories.length === 0 && (
                <div className="text-center py-16">
                  <p className="text-slate-400 text-lg">No modules found matching "{searchQuery}"</p>
                  <button 
                    onClick={() => setSearchQuery('')}
                    className="mt-4 text-cyan-400 hover:text-cyan-300 transition-colors"
                  >
                    Clear search
                  </button>
                </div>
              )}
            </div>

            {/* Quick Links Footer */}
            <div className="mt-12 pt-8 border-t border-slate-800">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-6">
                  <a href="index.html" className="text-sm text-slate-400 hover:text-cyan-400 transition-colors">Demo Mode</a>
                  <a href="missionpulse-agent-hub.html" className="text-sm text-slate-400 hover:text-cyan-400 transition-colors">AI Agents</a>
                  <a href="https://docs.missionpulse.io" className="text-sm text-slate-400 hover:text-cyan-400 transition-colors">Documentation</a>
                </div>
                <div className="text-xs text-slate-600">
                  <span>Mission Meets Tech © 2025</span>
                  <span className="mx-2">•</span>
                  <span>MissionPulse v12.0</span>
                  <span className="mx-2">•</span>
                  <span className="text-cyan-500/50">Shield & Pulse UX v8.0</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<MissionPulseHub />);
  </script>
</body>
</html>
