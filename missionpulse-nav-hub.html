<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MissionPulse | Navigation Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
        .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.1); }
        .glass-hover:hover { background: rgba(0, 229, 250, 0.08); border-color: rgba(0, 229, 250, 0.3); transform: translateY(-2px); }
        .cyan-glow { box-shadow: 0 0 30px rgba(0, 229, 250, 0.15); }
        .text-cyan { color: #00E5FA; }
        .bg-cyan { background-color: #00E5FA; }
        .border-cyan { border-color: #00E5FA; }
        .module-card { transition: all 0.2s ease; }
        .category-header { border-left: 3px solid #00E5FA; }
        .search-input:focus { box-shadow: 0 0 0 2px rgba(0, 229, 250, 0.3); }
        .badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; }
        .badge-new { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .badge-cui { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .badge-rbac { background: rgba(168, 85, 247, 0.2); color: #a855f7; }
        .badge-ai { background: rgba(0, 229, 250, 0.2); color: #00E5FA; }
    </style>
</head>
<body class="text-gray-100">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Module Configuration - All 70+ modules organized by category
        const moduleCategories = [
            {
                name: "Core Operations",
                icon: "🎯",
                description: "Primary capture and proposal management",
                modules: [
                    { name: "Dashboard", href: "index.html", desc: "Pipeline overview & KPIs", badges: [] },
                    { name: "Pipeline", href: "missionpulse-m1-enhanced.html", desc: "Opportunity tracking", badges: [] },
                    { name: "War Room", href: "missionpulse-m2-warroom-enhanced.html", desc: "Active capture command center", badges: [] },
                    { name: "Swimlane Board", href: "missionpulse-m3-swimlane-board.html", desc: "Visual workflow management", badges: [] },
                    { name: "Launch Tracker", href: "missionpulse-launch.html", desc: "Submission readiness", badges: ["new"] },
                    { name: "Post-Award", href: "missionpulse-m14-post-award.html", desc: "Transition & kickoff", badges: [] }
                ]
            },
            {
                name: "Intelligence & Strategy",
                icon: "🔍",
                description: "Competitive analysis and win strategy",
                modules: [
                    { name: "Black Hat Review", href: "missionpulse-m7-blackhat-enhanced.html", desc: "Competitor weakness analysis", badges: ["rbac"] },
                    { name: "Frenemy Protocol", href: "missionpulse-m11-frenemy-protocol.html", desc: "Partner/competitor mapping", badges: [] },
                    { name: "Iron Dome", href: "missionpulse-m6-iron-dome.html", desc: "Incumbent defense strategy", badges: [] },
                    { name: "RFP Shredder", href: "missionpulse-rfp-shredder.html", desc: "AI document analysis", badges: ["ai", "new"] },
                    { name: "Contract Scanner", href: "missionpulse-m5-contracts-enhanced.html", desc: "FAR/DFARS compliance check", badges: [] }
                ]
            },
            {
                name: "Pricing & Compliance",
                icon: "💰",
                description: "Cost modeling and regulatory adherence",
                modules: [
                    { name: "Pricing Studio", href: "missionpulse-m8-pricing.html", desc: "BOE and cost modeling", badges: ["cui"] },
                    { name: "LCAT Manager", href: "missionpulse-lcat.html", desc: "Labor category rates", badges: ["cui", "new"] },
                    { name: "Compliance Hub", href: "missionpulse-m6-iron-dome.html", desc: "FAR/DFARS tracking", badges: [] },
                    { name: "Audit Trail", href: "missionpulse-audit.html", desc: "CMMC 2.0 activity logs", badges: ["new"] }
                ]
            },
            {
                name: "AI & Automation",
                icon: "🤖",
                description: "AI-powered proposal assistance",
                modules: [
                    { name: "Agent Hub", href: "missionpulse-agent-hub.html", desc: "8 specialized AI agents", badges: ["ai", "new"] },
                    { name: "HITL Review", href: "missionpulse-m9-hitl-enhanced.html", desc: "Human-in-the-loop AI approval", badges: ["ai"] },
                    { name: "Orals Coach", href: "missionpulse-orals.html", desc: "Presentation builder & timer", badges: ["ai", "new"] },
                    { name: "Playbook Library", href: "missionpulse-playbook.html", desc: "Shipley methodology templates", badges: ["new"] }
                ]
            },
            {
                name: "Knowledge & Learning",
                icon: "📚",
                description: "Lessons learned and methodology",
                modules: [
                    { name: "Lessons Learned", href: "missionpulse-m15-lessons-playbook.html", desc: "Win/loss analysis repository", badges: [] },
                    { name: "Methodology Hub", href: "missionpulse-playbook.html", desc: "Shipley process guides", badges: ["new"] },
                    { name: "Training Center", href: "#", desc: "Team certification tracking", badges: [] }
                ]
            },
            {
                name: "Administration",
                icon: "⚙️",
                description: "System configuration and team management",
                modules: [
                    { name: "User Management", href: "missionpulse-users.html", desc: "Team roles & permissions", badges: ["rbac", "new"] },
                    { name: "Settings", href: "missionpulse-settings.html", desc: "Company config & billing", badges: ["new"] },
                    { name: "Integrations", href: "missionpulse-integrations.html", desc: "HubSpot, SAM.gov, Slack", badges: ["new"] },
                    { name: "RBAC Console", href: "missionpulse-task16-rbac.html", desc: "Role-based access control", badges: ["rbac"] }
                ]
            }
        ];

        // Quick Actions
        const quickActions = [
            { name: "New Opportunity", href: "missionpulse-m1-enhanced.html?action=new", icon: "➕" },
            { name: "Today's Tasks", href: "missionpulse-m3-swimlane-board.html", icon: "📋" },
            { name: "AI Assistant", href: "missionpulse-agent-hub.html", icon: "🤖" },
            { name: "Submit Proposal", href: "missionpulse-launch.html", icon: "🚀" }
        ];

        function NavHub() {
            const [searchTerm, setSearchTerm] = useState('');
            const [user, setUser] = useState({ name: 'Mary Womack', role: 'CEO', company: 'Mission Meets Tech' });

            // Filter modules based on search
            const filteredCategories = moduleCategories.map(cat => ({
                ...cat,
                modules: cat.modules.filter(mod => 
                    mod.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    mod.desc.toLowerCase().includes(searchTerm.toLowerCase())
                )
            })).filter(cat => cat.modules.length > 0);

            const totalModules = moduleCategories.reduce((sum, cat) => sum + cat.modules.length, 0);
            const newModules = moduleCategories.reduce((sum, cat) => 
                sum + cat.modules.filter(m => m.badges.includes('new')).length, 0);

            return (
                <div className="min-h-screen p-6">
                    {/* Header */}
                    <header className="glass rounded-xl p-6 mb-6 cyan-glow">
                        <div className="flex justify-between items-center">
                            <div>
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="w-10 h-10 bg-cyan rounded-lg flex items-center justify-center text-black font-bold text-lg">
                                        MP
                                    </div>
                                    <div>
                                        <h1 className="text-2xl font-bold text-white">MissionPulse</h1>
                                        <p className="text-cyan text-sm">Navigation Hub</p>
                                    </div>
                                </div>
                                <p className="text-gray-400 text-sm mt-2">
                                    Mission. Technology. Transformation.
                                </p>
                            </div>
                            <div className="text-right">
                                <p className="text-white font-medium">{user.name}</p>
                                <p className="text-cyan text-sm">{user.role} • {user.company}</p>
                                <a href="login.html" className="text-gray-400 text-xs hover:text-cyan mt-1 inline-block">
                                    Switch Account →
                                </a>
                            </div>
                        </div>
                    </header>

                    {/* Stats Bar */}
                    <div className="grid grid-cols-4 gap-4 mb-6">
                        <div className="glass rounded-lg p-4 text-center">
                            <p className="text-2xl font-bold text-cyan">{totalModules}</p>
                            <p className="text-gray-400 text-sm">Total Modules</p>
                        </div>
                        <div className="glass rounded-lg p-4 text-center">
                            <p className="text-2xl font-bold text-green-400">{newModules}</p>
                            <p className="text-gray-400 text-sm">New This Sprint</p>
                        </div>
                        <div className="glass rounded-lg p-4 text-center">
                            <p className="text-2xl font-bold text-purple-400">11</p>
                            <p className="text-gray-400 text-sm">RBAC Protected</p>
                        </div>
                        <div className="glass rounded-lg p-4 text-center">
                            <p className="text-2xl font-bold text-red-400">3</p>
                            <p className="text-gray-400 text-sm">CUI Modules</p>
                        </div>
                    </div>

                    {/* Quick Actions */}
                    <div className="glass rounded-xl p-4 mb-6">
                        <h2 className="text-sm font-semibold text-gray-400 mb-3">QUICK ACTIONS</h2>
                        <div className="flex gap-3">
                            {quickActions.map((action, i) => (
                                <a key={i} href={action.href} 
                                   className="flex-1 glass glass-hover rounded-lg p-4 text-center module-card">
                                    <span className="text-2xl mb-2 block">{action.icon}</span>
                                    <span className="text-sm font-medium text-white">{action.name}</span>
                                </a>
                            ))}
                        </div>
                    </div>

                    {/* Search */}
                    <div className="mb-6">
                        <input 
                            type="text"
                            placeholder="Search modules... (e.g., 'pricing', 'compliance', 'AI')"
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            className="w-full glass rounded-lg px-4 py-3 text-white placeholder-gray-500 search-input focus:outline-none"
                        />
                    </div>

                    {/* Module Categories */}
                    <div className="space-y-6">
                        {filteredCategories.map((category, catIndex) => (
                            <div key={catIndex} className="glass rounded-xl p-5">
                                <div className="category-header pl-4 mb-4">
                                    <h2 className="text-lg font-semibold text-white flex items-center gap-2">
                                        <span>{category.icon}</span>
                                        {category.name}
                                    </h2>
                                    <p className="text-gray-400 text-sm">{category.description}</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                                    {category.modules.map((module, modIndex) => (
                                        <a key={modIndex} href={module.href}
                                           className="glass glass-hover rounded-lg p-4 module-card block">
                                            <div className="flex justify-between items-start mb-2">
                                                <h3 className="font-medium text-white">{module.name}</h3>
                                                <div className="flex gap-1">
                                                    {module.badges.includes('new') && (
                                                        <span className="badge badge-new">NEW</span>
                                                    )}
                                                    {module.badges.includes('cui') && (
                                                        <span className="badge badge-cui">CUI</span>
                                                    )}
                                                    {module.badges.includes('rbac') && (
                                                        <span className="badge badge-rbac">RBAC</span>
                                                    )}
                                                    {module.badges.includes('ai') && (
                                                        <span className="badge badge-ai">AI</span>
                                                    )}
                                                </div>
                                            </div>
                                            <p className="text-gray-400 text-sm">{module.desc}</p>
                                        </a>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Footer */}
                    <footer className="mt-8 text-center text-gray-500 text-sm">
                        <p>MissionPulse v12.0 • Shield & Pulse UX v8.0</p>
                        <p className="mt-1">© 2025 Mission Meets Tech. All rights reserved.</p>
                        <div className="flex justify-center gap-4 mt-3">
                            <a href="missionpulse-audit.html" className="hover:text-cyan">Audit Log</a>
                            <span>•</span>
                            <a href="missionpulse-settings.html" className="hover:text-cyan">Settings</a>
                            <span>•</span>
                            <a href="#" className="hover:text-cyan">Help</a>
                            <span>•</span>
                            <a href="login.html" className="hover:text-cyan">Logout</a>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<NavHub />, document.getElementById('root'));
    </script>
</body>
</html>
