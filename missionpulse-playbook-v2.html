<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Capture Playbook</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.15); }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const DEFAULT_COMPANY_ID = '11111111-1111-1111-1111-111111111111';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const SHIPLEY_PHASES = ['Gate 1', 'Gate 2', 'Gate 3', 'Gate 4', 'Blue Team', 'Red Team', 'Gold Team', 'Submission'];

    const DEMO_PLAYBOOK = [
      // Gate 1 - Opportunity Assessment
      { id: '1', phase: 'Gate 1', task: 'Opportunity Identification', description: 'Identify and qualify opportunity based on strategic fit and win probability', owner_role: 'CAP', typical_duration: '2-4 weeks', deliverables: ['Opportunity Brief', 'Initial pWin Assessment'], tips: 'Focus on strategic alignment and resource availability', sort_order: 1 },
      { id: '2', phase: 'Gate 1', task: 'Customer Engagement', description: 'Establish initial contact with customer POC and gather intelligence', owner_role: 'CAP', typical_duration: '1-2 weeks', deliverables: ['Meeting Notes', 'Customer Requirements Summary'], tips: 'Build rapport early - this is critical for competitive intelligence', sort_order: 2 },
      { id: '3', phase: 'Gate 1', task: 'Competitive Landscape Analysis', description: 'Identify likely competitors and their positioning', owner_role: 'CAP', typical_duration: '1-2 weeks', deliverables: ['Competitor Matrix', 'Ghost Themes'], tips: 'Use SAM.gov, USASpending, and LinkedIn for research', sort_order: 3 },
      { id: '4', phase: 'Gate 1', task: 'Go/No-Go Decision', description: 'Executive decision to pursue based on Gate 1 analysis', owner_role: 'CEO', typical_duration: '1 day', deliverables: ['Go/No-Go Memo'], tips: 'Use standardized scoring criteria', sort_order: 4 },
      
      // Gate 2 - Capture Planning
      { id: '5', phase: 'Gate 2', task: 'Capture Plan Development', description: 'Create comprehensive capture strategy document', owner_role: 'CAP', typical_duration: '2-3 weeks', deliverables: ['Capture Plan', 'Win Strategy'], tips: 'Focus on discriminators and customer hot buttons', sort_order: 5 },
      { id: '6', phase: 'Gate 2', task: 'Solution Architecture', description: 'Develop preliminary technical approach and solution', owner_role: 'SA', typical_duration: '2-4 weeks', deliverables: ['Solution Brief', 'Technical Approach Outline'], tips: 'Align solution with customer pain points', sort_order: 6 },
      { id: '7', phase: 'Gate 2', task: 'Teaming Strategy', description: 'Identify and engage potential teaming partners', owner_role: 'CAP', typical_duration: '2-4 weeks', deliverables: ['Teaming Matrix', 'NDAs/TAs'], tips: 'Focus on complementary capabilities and past performance', sort_order: 7 },
      { id: '8', phase: 'Gate 2', task: 'Price-to-Win Analysis', description: 'Develop competitive pricing strategy based on market intelligence', owner_role: 'FIN', typical_duration: '1-2 weeks', deliverables: ['PTW Analysis', 'Pricing Strategy'], tips: 'Consider competitor pricing history and customer budget', sort_order: 8 },
      
      // Gate 3 - Proposal Preparation
      { id: '9', phase: 'Gate 3', task: 'Proposal Planning', description: 'Create detailed proposal schedule, outline, and assignments', owner_role: 'PM', typical_duration: '1 week', deliverables: ['Proposal Schedule', 'Writer Assignments', 'Outline'], tips: 'Build in buffer time for reviews and rewrites', sort_order: 9 },
      { id: '10', phase: 'Gate 3', task: 'Win Theme Finalization', description: 'Finalize discriminators, proof points, and ghost themes', owner_role: 'CAP', typical_duration: '1-2 weeks', deliverables: ['Win Themes Document', 'Proof Points Matrix'], tips: 'Every claim needs evidence', sort_order: 10 },
      { id: '11', phase: 'Gate 3', task: 'Compliance Matrix', description: 'Map all RFP requirements to proposal sections', owner_role: 'CON', typical_duration: '1 week', deliverables: ['Compliance Matrix', 'Shred Results'], tips: 'Use automated shredding tools for accuracy', sort_order: 11 },
      { id: '12', phase: 'Gate 3', task: 'Past Performance Selection', description: 'Select and document relevant past performance', owner_role: 'PM', typical_duration: '1 week', deliverables: ['Past Performance Volume Draft'], tips: 'Match past work to RFP evaluation criteria', sort_order: 12 },
      
      // Gate 4 - Proposal Development
      { id: '13', phase: 'Gate 4', task: 'Technical Volume Writing', description: 'Develop complete technical approach volume', owner_role: 'SA', typical_duration: '2-4 weeks', deliverables: ['Technical Volume Draft'], tips: 'Lead with benefits, follow with features', sort_order: 13 },
      { id: '14', phase: 'Gate 4', task: 'Management Volume Writing', description: 'Develop management approach and staffing plan', owner_role: 'PM', typical_duration: '2-3 weeks', deliverables: ['Management Volume Draft', 'Org Chart', 'Staffing Matrix'], tips: 'Emphasize relevant experience of key personnel', sort_order: 14 },
      { id: '15', phase: 'Gate 4', task: 'Pricing Volume Development', description: 'Develop detailed cost/price proposal', owner_role: 'FIN', typical_duration: '2-3 weeks', deliverables: ['Pricing Volume', 'BOE', 'Rate Tables'], tips: 'Ensure consistency with technical approach', sort_order: 15 },
      { id: '16', phase: 'Gate 4', task: 'Executive Summary', description: 'Craft compelling executive summary with win themes', owner_role: 'CAP', typical_duration: '1 week', deliverables: ['Executive Summary'], tips: 'This is often the only section everyone reads', sort_order: 16 },
      
      // Reviews
      { id: '17', phase: 'Blue Team', task: 'Blue Team Review', description: 'Internal review of draft proposal for compliance and messaging', owner_role: 'QA', typical_duration: '2-3 days', deliverables: ['Blue Team Comments', 'Compliance Checklist'], tips: 'Focus on RFP compliance and win theme consistency', sort_order: 17 },
      { id: '18', phase: 'Red Team', task: 'Red Team Review', description: 'Critical review evaluating proposal as customer would', owner_role: 'QA', typical_duration: '2-3 days', deliverables: ['Red Team Score', 'Detailed Feedback'], tips: 'Use actual evaluation criteria for scoring', sort_order: 18 },
      { id: '19', phase: 'Gold Team', task: 'Gold Team Review', description: 'Executive review for final quality and pricing approval', owner_role: 'CEO', typical_duration: '1-2 days', deliverables: ['Gold Team Approval', 'Final Changes'], tips: 'Focus on strategic positioning and pricing competitiveness', sort_order: 19 },
      
      // Submission
      { id: '20', phase: 'Submission', task: 'Final Production', description: 'Final formatting, printing, and packaging', owner_role: 'PM', typical_duration: '1-2 days', deliverables: ['Final Proposal Package'], tips: 'Allow time for technical issues', sort_order: 20 },
      { id: '21', phase: 'Submission', task: 'Submission Verification', description: 'Verify submission receipt and completeness', owner_role: 'PM', typical_duration: '1 day', deliverables: ['Submission Confirmation'], tips: 'Save all confirmation records', sort_order: 21 },
    ];

    function App() {
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [items, setItems] = React.useState(DEMO_PLAYBOOK);
      const [selectedPhase, setSelectedPhase] = React.useState('all');
      const [expandedItems, setExpandedItems] = React.useState(new Set());
      const [showModal, setShowModal] = React.useState(false);
      const [editingItem, setEditingItem] = React.useState(null);
      const [form, setForm] = React.useState({ 
        phase: 'Gate 1', 
        task: '', 
        description: '', 
        owner_role: 'CAP',
        typical_duration: '',
        deliverables: '',
        tips: '',
        sort_order: 0
      });

      React.useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        try {
          const { data, error } = await supabase
            .from('playbook_items')
            .select('*')
            .order('phase')
            .order('sort_order');
          
          if (!error && data?.length > 0) {
            setItems(data);
            setConnected(true);
          }
        } catch (e) {
          console.log('Using demo data');
        }
        setLoading(false);
      };

      const saveItem = async () => {
        const itemData = {
          ...form,
          deliverables: typeof form.deliverables === 'string' ? form.deliverables.split(',').map(s => s.trim()).filter(Boolean) : form.deliverables,
          company_id: DEFAULT_COMPANY_ID,
        };

        if (connected) {
          try {
            if (editingItem) {
              await supabase.from('playbook_items').update(itemData).eq('id', editingItem.id);
              setItems(items.map(i => i.id === editingItem.id ? { ...i, ...itemData } : i));
            } else {
              const { data } = await supabase.from('playbook_items').insert([itemData]).select();
              if (data) setItems([...items, data[0]]);
            }
          } catch (e) {
            console.error('Save error:', e);
          }
        } else {
          if (editingItem) {
            setItems(items.map(i => i.id === editingItem.id ? { ...i, ...itemData } : i));
          } else {
            setItems([...items, { ...itemData, id: Date.now().toString() }]);
          }
        }
        
        closeModal();
      };

      const deleteItem = async (id) => {
        if (!confirm('Delete this playbook item?')) return;
        if (connected) {
          await supabase.from('playbook_items').delete().eq('id', id);
        }
        setItems(items.filter(i => i.id !== id));
      };

      const closeModal = () => {
        setShowModal(false);
        setEditingItem(null);
        setForm({ phase: 'Gate 1', task: '', description: '', owner_role: 'CAP', typical_duration: '', deliverables: '', tips: '', sort_order: 0 });
      };

      const openEditModal = (item) => {
        setEditingItem(item);
        setForm({
          phase: item.phase,
          task: item.task,
          description: item.description || '',
          owner_role: item.owner_role || 'CAP',
          typical_duration: item.typical_duration || '',
          deliverables: Array.isArray(item.deliverables) ? item.deliverables.join(', ') : '',
          tips: item.tips || '',
          sort_order: item.sort_order || 0
        });
        setShowModal(true);
      };

      const toggleExpand = (id) => {
        const newExpanded = new Set(expandedItems);
        if (newExpanded.has(id)) {
          newExpanded.delete(id);
        } else {
          newExpanded.add(id);
        }
        setExpandedItems(newExpanded);
      };

      // Filter items
      const filteredItems = selectedPhase === 'all' 
        ? items 
        : items.filter(i => i.phase === selectedPhase);

      // Group by phase
      const groupedItems = filteredItems.reduce((acc, item) => {
        if (!acc[item.phase]) acc[item.phase] = [];
        acc[item.phase].push(item);
        return acc;
      }, {});

      const getPhaseColor = (phase) => {
        const colors = {
          'Gate 1': 'border-slate-500 bg-slate-500/10',
          'Gate 2': 'border-blue-500 bg-blue-500/10',
          'Gate 3': 'border-indigo-500 bg-indigo-500/10',
          'Gate 4': 'border-purple-500 bg-purple-500/10',
          'Blue Team': 'border-blue-400 bg-blue-400/10',
          'Red Team': 'border-red-500 bg-red-500/10',
          'Gold Team': 'border-amber-500 bg-amber-500/10',
          'Submission': 'border-emerald-500 bg-emerald-500/10',
        };
        return colors[phase] || 'border-slate-500 bg-slate-500/10';
      };

      const getRoleColor = (role) => {
        const colors = {
          'CEO': 'bg-purple-500/20 text-purple-400',
          'COO': 'bg-indigo-500/20 text-indigo-400',
          'CAP': 'bg-cyan-500/20 text-cyan-400',
          'PM': 'bg-blue-500/20 text-blue-400',
          'SA': 'bg-emerald-500/20 text-emerald-400',
          'FIN': 'bg-amber-500/20 text-amber-400',
          'CON': 'bg-orange-500/20 text-orange-400',
          'QA': 'bg-pink-500/20 text-pink-400',
        };
        return colors[role] || 'bg-slate-500/20 text-slate-400';
      };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
          </div>
        );
      }

      return (
        <div className="min-h-screen p-6">
          {/* Header */}
          <div className="flex items-center justify-between mb-6">
            <div className="flex items-center gap-4">
              <a href="index.html" className="text-slate-400 hover:text-white">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
              </a>
              <div>
                <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                  <span className="text-indigo-400">📖</span> Capture Playbook
                </h1>
                <p className="text-slate-400 text-sm">Shipley methodology tasks and best practices</p>
              </div>
            </div>
            <div className="flex items-center gap-4">
              <div className={`px-3 py-1 rounded-full text-xs ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                {connected ? '● Live' : '○ Demo'}
              </div>
              <button
                onClick={() => { setEditingItem(null); setShowModal(true); }}
                className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 text-white rounded-lg font-medium transition-colors"
              >
                + Add Task
              </button>
            </div>
          </div>

          {/* Phase Filter */}
          <div className="flex flex-wrap gap-2 mb-6">
            <button
              onClick={() => setSelectedPhase('all')}
              className={`px-4 py-2 rounded-lg text-sm transition-colors ${
                selectedPhase === 'all' ? 'bg-cyan-500 text-white' : 'bg-slate-800 text-slate-400 hover:text-white'
              }`}
            >
              All Phases
            </button>
            {SHIPLEY_PHASES.map(phase => (
              <button
                key={phase}
                onClick={() => setSelectedPhase(phase)}
                className={`px-4 py-2 rounded-lg text-sm transition-colors ${
                  selectedPhase === phase ? 'bg-cyan-500 text-white' : 'bg-slate-800 text-slate-400 hover:text-white'
                }`}
              >
                {phase}
              </button>
            ))}
          </div>

          {/* Playbook Items by Phase */}
          <div className="space-y-6">
            {SHIPLEY_PHASES.filter(phase => selectedPhase === 'all' || selectedPhase === phase).map(phase => {
              const phaseItems = groupedItems[phase] || [];
              if (phaseItems.length === 0) return null;
              
              return (
                <div key={phase} className={`glass rounded-xl overflow-hidden border-l-4 ${getPhaseColor(phase)}`}>
                  <div className="p-4 border-b border-slate-700/50">
                    <h2 className="text-lg font-semibold text-white">{phase}</h2>
                    <p className="text-sm text-slate-400">{phaseItems.length} tasks</p>
                  </div>
                  
                  <div className="divide-y divide-slate-700/30">
                    {phaseItems.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0)).map(item => (
                      <div key={item.id} className="p-4 hover:bg-white/5 transition-colors">
                        <div 
                          className="flex items-center justify-between cursor-pointer"
                          onClick={() => toggleExpand(item.id)}
                        >
                          <div className="flex items-center gap-3">
                            <span className="text-slate-500 text-sm">{expandedItems.has(item.id) ? '▼' : '▶'}</span>
                            <div>
                              <h3 className="text-white font-medium">{item.task}</h3>
                              <div className="flex items-center gap-2 mt-1">
                                <span className={`px-2 py-0.5 rounded text-xs ${getRoleColor(item.owner_role)}`}>
                                  {item.owner_role}
                                </span>
                                {item.typical_duration && (
                                  <span className="text-xs text-slate-500">⏱️ {item.typical_duration}</span>
                                )}
                              </div>
                            </div>
                          </div>
                          <div className="flex items-center gap-2">
                            <button 
                              onClick={(e) => { e.stopPropagation(); openEditModal(item); }} 
                              className="text-slate-400 hover:text-cyan-400 transition-colors p-1"
                            >
                              ✏️
                            </button>
                            <button 
                              onClick={(e) => { e.stopPropagation(); deleteItem(item.id); }} 
                              className="text-slate-400 hover:text-red-400 transition-colors p-1"
                            >
                              🗑️
                            </button>
                          </div>
                        </div>
                        
                        {expandedItems.has(item.id) && (
                          <div className="mt-4 pl-8 space-y-3">
                            {item.description && (
                              <p className="text-slate-400 text-sm">{item.description}</p>
                            )}
                            
                            {item.deliverables?.length > 0 && (
                              <div>
                                <p className="text-xs text-cyan-400 uppercase tracking-wider mb-1">Deliverables</p>
                                <div className="flex flex-wrap gap-1">
                                  {item.deliverables.map((d, i) => (
                                    <span key={i} className="px-2 py-0.5 rounded bg-slate-700 text-slate-300 text-xs">{d}</span>
                                  ))}
                                </div>
                              </div>
                            )}
                            
                            {item.tips && (
                              <div className="p-3 rounded-lg bg-amber-500/10 border border-amber-500/20">
                                <p className="text-xs text-amber-400 uppercase tracking-wider mb-1">💡 Pro Tip</p>
                                <p className="text-sm text-amber-200">{item.tips}</p>
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>

          {Object.keys(groupedItems).length === 0 && (
            <div className="text-center py-12">
              <p className="text-slate-500">No playbook items found. Add tasks to build your capture playbook.</p>
            </div>
          )}

          {/* Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
              <div className="glass rounded-xl p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                <h2 className="text-xl font-bold text-white mb-4">
                  {editingItem ? 'Edit Playbook Task' : 'Add Playbook Task'}
                </h2>
                
                <div className="space-y-4">
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Phase *</label>
                      <select
                        value={form.phase}
                        onChange={(e) => setForm({ ...form, phase: e.target.value })}
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                      >
                        {SHIPLEY_PHASES.map(p => (
                          <option key={p} value={p}>{p}</option>
                        ))}
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Owner Role</label>
                      <select
                        value={form.owner_role}
                        onChange={(e) => setForm({ ...form, owner_role: e.target.value })}
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                      >
                        {['CEO', 'COO', 'CAP', 'PM', 'SA', 'FIN', 'CON', 'DEL', 'QA'].map(r => (
                          <option key={r} value={r}>{r}</option>
                        ))}
                      </select>
                    </div>
                  </div>

                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Task Name *</label>
                    <input
                      type="text"
                      value={form.task}
                      onChange={(e) => setForm({ ...form, task: e.target.value })}
                      placeholder="e.g., Competitive Analysis"
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                    />
                  </div>

                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Description</label>
                    <textarea
                      value={form.description}
                      onChange={(e) => setForm({ ...form, description: e.target.value })}
                      placeholder="What needs to be done..."
                      rows={2}
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                    />
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Typical Duration</label>
                      <input
                        type="text"
                        value={form.typical_duration}
                        onChange={(e) => setForm({ ...form, typical_duration: e.target.value })}
                        placeholder="e.g., 2-3 weeks"
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                      />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Sort Order</label>
                      <input
                        type="number"
                        value={form.sort_order}
                        onChange={(e) => setForm({ ...form, sort_order: parseInt(e.target.value) || 0 })}
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                      />
                    </div>
                  </div>

                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Deliverables (comma-separated)</label>
                    <input
                      type="text"
                      value={form.deliverables}
                      onChange={(e) => setForm({ ...form, deliverables: e.target.value })}
                      placeholder="Capture Plan, Win Themes, ..."
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                    />
                  </div>

                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Tips / Best Practices</label>
                    <textarea
                      value={form.tips}
                      onChange={(e) => setForm({ ...form, tips: e.target.value })}
                      placeholder="Pro tips for this task..."
                      rows={2}
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                    />
                  </div>
                </div>
                
                <div className="flex justify-end gap-3 mt-6">
                  <button onClick={closeModal} className="px-4 py-2 text-slate-400 hover:text-white transition-colors">
                    Cancel
                  </button>
                  <button
                    onClick={saveItem}
                    disabled={!form.task || !form.phase}
                    className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 disabled:bg-slate-600 text-white rounded-lg font-medium transition-colors"
                  >
                    {editingItem ? 'Update' : 'Create'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <div className="mt-8 text-center text-slate-500 text-sm">
            MissionPulse v3.1 • Mission Meets Tech • AI GENERATED CONTENT REQUIRES HUMAN REVIEW
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
