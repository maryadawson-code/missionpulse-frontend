<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MissionPulse | Shipley Playbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
        .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.15); }
        .glass-dark { background: rgba(0, 5, 15, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.2); }
        .glow { box-shadow: 0 0 30px rgba(0, 229, 250, 0.15); }
        .glow-text { text-shadow: 0 0 20px rgba(0, 229, 250, 0.5); }
        .phase-badge { transition: all 0.3s ease; }
        .phase-badge:hover { transform: scale(1.05); }
        .task-row { transition: all 0.2s ease; }
        .task-row:hover { background: rgba(0, 229, 250, 0.08); }
        .progress-bar { transition: width 0.5s ease; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 5px rgba(0, 229, 250, 0.3); } 50% { box-shadow: 0 0 20px rgba(0, 229, 250, 0.6); } }
        .live-indicator { animation: pulse-glow 2s infinite; }
    </style>
</head>
<body class="text-white p-6">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const supabaseUrl = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzgwMTk1MjMsImV4cCI6MjA1MzU5NTUyM30.GFHJh-yID3FwkcKtiQMX3DEdJfe7IilFRpvILpvIASM';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        const SHIPLEY_PHASES = [
            { id: 'gate-0', name: 'Gate 0: Market Assessment', color: '#6366f1', icon: '🎯' },
            { id: 'gate-1', name: 'Gate 1: Bid Decision', color: '#8b5cf6', icon: '✅' },
            { id: 'gate-2', name: 'Gate 2: Capture Planning', color: '#a855f7', icon: '📋' },
            { id: 'gate-3', name: 'Gate 3: Proposal Planning', color: '#d946ef', icon: '📝' },
            { id: 'gate-4', name: 'Gate 4: Proposal Development', color: '#ec4899', icon: '⚙️' },
            { id: 'gate-5', name: 'Gate 5: Submission', color: '#f43f5e', icon: '🚀' }
        ];
        
        const TASK_STATUS = ['Not Started', 'In Progress', 'Blocked', 'Complete'];
        const SHIPLEY_ROLES = ['CEO', 'COO', 'CAP', 'PM', 'SA', 'FIN', 'CON', 'DEL', 'QA', 'Partner', 'Admin'];
        
        const DEMO_OPPORTUNITIES = [
            { id: 'demo-1', title: 'DHA EHRM Support Services', nickname: 'DHA-EHRM', phase: 'Gate 3: Proposal Planning' },
            { id: 'demo-2', title: 'VA Digital Transformation', nickname: 'VA-DT', phase: 'Gate 2: Capture Planning' },
            { id: 'demo-3', title: 'CMS Data Analytics Platform', nickname: 'CMS-DAP', phase: 'Gate 4: Proposal Development' }
        ];
        
        const DEMO_TASKS = [
            { id: 'task-1', opportunity_id: 'demo-1', phase: 'Gate 3: Proposal Planning', task_name: 'Develop Win Themes', description: 'Draft 5-7 compelling win themes with supporting evidence', status: 'Complete', assignee_role: 'CAP', due_date: '2026-02-05', priority: 'High' },
            { id: 'task-2', opportunity_id: 'demo-1', phase: 'Gate 3: Proposal Planning', task_name: 'Outline Proposal Sections', description: 'Create L1/L2/L3 outline per RFP structure', status: 'In Progress', assignee_role: 'PM', due_date: '2026-02-07', priority: 'High' },
            { id: 'task-3', opportunity_id: 'demo-1', phase: 'Gate 3: Proposal Planning', task_name: 'Assign Volume Leads', description: 'Designate volume leads and section authors', status: 'In Progress', assignee_role: 'PM', due_date: '2026-02-06', priority: 'Medium' },
            { id: 'task-4', opportunity_id: 'demo-1', phase: 'Gate 3: Proposal Planning', task_name: 'Schedule Pink Team', description: 'Coordinate Pink Team review date and reviewers', status: 'Not Started', assignee_role: 'QA', due_date: '2026-02-10', priority: 'Medium' },
            { id: 'task-5', opportunity_id: 'demo-1', phase: 'Gate 4: Proposal Development', task_name: 'Draft Technical Volume', description: 'Complete first draft of Technical Volume', status: 'Not Started', assignee_role: 'SA', due_date: '2026-02-14', priority: 'High' },
            { id: 'task-6', opportunity_id: 'demo-1', phase: 'Gate 4: Proposal Development', task_name: 'Develop BOE', description: 'Create Basis of Estimate for all labor categories', status: 'Not Started', assignee_role: 'FIN', due_date: '2026-02-12', priority: 'High' },
            { id: 'task-7', opportunity_id: 'demo-2', phase: 'Gate 2: Capture Planning', task_name: 'Competitive Analysis', description: 'Complete Black Hat analysis of top 3 competitors', status: 'In Progress', assignee_role: 'CAP', due_date: '2026-02-08', priority: 'High' },
            { id: 'task-8', opportunity_id: 'demo-2', phase: 'Gate 2: Capture Planning', task_name: 'Customer Engagement Plan', description: 'Develop customer call-down schedule', status: 'Complete', assignee_role: 'CAP', due_date: '2026-02-04', priority: 'Medium' }
        ];
        
        function PlaybookApp() {
            const [opportunities, setOpportunities] = useState([]);
            const [tasks, setTasks] = useState([]);
            const [selectedOpp, setSelectedOpp] = useState(null);
            const [isDemo, setIsDemo] = useState(true);
            const [loading, setLoading] = useState(true);
            const [showModal, setShowModal] = useState(false);
            const [editingTask, setEditingTask] = useState(null);
            const [filterPhase, setFilterPhase] = useState('all');
            const [filterStatus, setFilterStatus] = useState('all');
            
            useEffect(() => { loadOpportunities(); }, []);
            useEffect(() => { if (selectedOpp) loadTasks(selectedOpp.id); }, [selectedOpp]);
            
            const loadOpportunities = async () => {
                try {
                    const { data, error } = await supabase.from('opportunities').select('id, title, nickname, phase').order('due_date');
                    if (error) throw error;
                    if (data?.length > 0) { setOpportunities(data); setIsDemo(false); }
                    else { setOpportunities(DEMO_OPPORTUNITIES); setIsDemo(true); }
                } catch { setOpportunities(DEMO_OPPORTUNITIES); setIsDemo(true); }
                setLoading(false);
            };
            
            const loadTasks = async (oppId) => {
                if (isDemo) { setTasks(DEMO_TASKS.filter(t => t.opportunity_id === oppId)); return; }
                try {
                    const { data, error } = await supabase.from('playbook_tasks').select('*').eq('opportunity_id', oppId).order('due_date');
                    if (error) throw error;
                    setTasks(data || []);
                } catch { setTasks(DEMO_TASKS.filter(t => t.opportunity_id === oppId)); }
            };
            
            const saveTask = async (taskData) => {
                if (isDemo) {
                    if (editingTask) setTasks(prev => prev.map(t => t.id === editingTask.id ? { ...t, ...taskData } : t));
                    else setTasks(prev => [...prev, { ...taskData, id: `task-${Date.now()}`, opportunity_id: selectedOpp.id }]);
                } else {
                    try {
                        if (editingTask) await supabase.from('playbook_tasks').update(taskData).eq('id', editingTask.id);
                        else await supabase.from('playbook_tasks').insert([{ ...taskData, opportunity_id: selectedOpp.id }]);
                        loadTasks(selectedOpp.id);
                    } catch (err) { console.error(err); }
                }
                setShowModal(false); setEditingTask(null);
            };
            
            const deleteTask = async (taskId) => {
                if (!confirm('Delete this task?')) return;
                if (isDemo) { setTasks(prev => prev.filter(t => t.id !== taskId)); return; }
                try { await supabase.from('playbook_tasks').delete().eq('id', taskId); loadTasks(selectedOpp.id); } catch (err) { console.error(err); }
            };
            
            const updateStatus = async (taskId, newStatus) => {
                if (isDemo) { setTasks(prev => prev.map(t => t.id === taskId ? { ...t, status: newStatus } : t)); return; }
                try { await supabase.from('playbook_tasks').update({ status: newStatus }).eq('id', taskId); loadTasks(selectedOpp.id); } catch (err) { console.error(err); }
            };
            
            const filteredTasks = tasks.filter(t => {
                if (filterPhase !== 'all' && t.phase !== filterPhase) return false;
                if (filterStatus !== 'all' && t.status !== filterStatus) return false;
                return true;
            });
            
            const getPhaseProgress = (phaseName) => {
                const phaseTasks = tasks.filter(t => t.phase === phaseName);
                if (phaseTasks.length === 0) return { complete: 0, total: 0, percent: 0 };
                const complete = phaseTasks.filter(t => t.status === 'Complete').length;
                return { complete, total: phaseTasks.length, percent: Math.round((complete / phaseTasks.length) * 100) };
            };
            
            const overallProgress = tasks.length > 0 ? Math.round((tasks.filter(t => t.status === 'Complete').length / tasks.length) * 100) : 0;
            
            const getStatusColor = (status) => {
                const colors = { 'Complete': 'text-green-400 bg-green-400/20', 'In Progress': 'text-cyan-400 bg-cyan-400/20', 'Blocked': 'text-red-400 bg-red-400/20' };
                return colors[status] || 'text-gray-400 bg-gray-400/20';
            };
            
            const getDaysUntilDue = (dueDate) => Math.ceil((new Date(dueDate) - new Date()) / (1000 * 60 * 60 * 24));
            
            if (loading) return <div className="flex items-center justify-center h-screen"><div className="text-cyan-400 text-xl">Loading Playbook...</div></div>;
            
            return (
                <div className="max-w-7xl mx-auto">
                    <div className="flex items-center justify-between mb-6">
                        <div className="flex items-center gap-4">
                            <a href="missionpulse-nav-hub.html" className="text-cyan-400 hover:text-cyan-300">← Hub</a>
                            <h1 className="text-3xl font-bold text-white glow-text">📋 Shipley Playbook</h1>
                            <span className={`px-3 py-1 rounded-full text-xs ${isDemo ? 'bg-amber-500/20 text-amber-400' : 'bg-green-500/20 text-green-400 live-indicator'}`}>
                                {isDemo ? '○ Demo Mode' : '● Live'}
                            </span>
                        </div>
                    </div>
                    
                    {!selectedOpp ? (
                        <div className="glass rounded-xl p-6 glow">
                            <h2 className="text-xl font-semibold text-cyan-400 mb-4">Select Opportunity</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                {opportunities.map(opp => (
                                    <div key={opp.id} onClick={() => setSelectedOpp(opp)} className="glass-dark p-4 rounded-lg cursor-pointer hover:border-cyan-400 transition-all">
                                        <div className="font-semibold text-white">{opp.nickname || opp.title}</div>
                                        <div className="text-sm text-gray-400 mt-1">{opp.title}</div>
                                        <div className="text-xs text-cyan-400 mt-2">{opp.phase}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <>
                            <div className="glass rounded-xl p-4 mb-6 glow">
                                <div className="flex items-center justify-between">
                                    <div className="flex items-center gap-4">
                                        <button onClick={() => setSelectedOpp(null)} className="text-cyan-400 hover:text-cyan-300">← Back</button>
                                        <div>
                                            <h2 className="text-xl font-bold text-white">{selectedOpp.nickname || selectedOpp.title}</h2>
                                            <div className="text-sm text-gray-400">{selectedOpp.phase}</div>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <div className="text-right">
                                            <div className="text-2xl font-bold text-cyan-400">{overallProgress}%</div>
                                            <div className="text-xs text-gray-400">Overall Progress</div>
                                        </div>
                                        <button onClick={() => { setEditingTask(null); setShowModal(true); }} className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 text-black font-semibold rounded-lg">+ Add Task</button>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-6">
                                {SHIPLEY_PHASES.map(phase => {
                                    const progress = getPhaseProgress(phase.name);
                                    return (
                                        <div key={phase.id} onClick={() => setFilterPhase(filterPhase === phase.name ? 'all' : phase.name)} className={`glass-dark p-3 rounded-lg cursor-pointer phase-badge ${filterPhase === phase.name ? 'border-cyan-400' : ''}`}>
                                            <div className="text-lg mb-1">{phase.icon}</div>
                                            <div className="text-xs text-gray-400 mb-2">{phase.name.split(': ')[1]}</div>
                                            <div className="w-full bg-gray-700 rounded-full h-1.5 mb-1">
                                                <div className="h-1.5 rounded-full progress-bar" style={{ width: `${progress.percent}%`, backgroundColor: phase.color }} />
                                            </div>
                                            <div className="text-xs text-gray-400">{progress.complete}/{progress.total}</div>
                                        </div>
                                    );
                                })}
                            </div>
                            
                            <div className="flex gap-4 mb-4">
                                <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)} className="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm">
                                    <option value="all">All Statuses</option>
                                    {TASK_STATUS.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                                {filterPhase !== 'all' && <button onClick={() => setFilterPhase('all')} className="text-cyan-400 text-sm hover:underline">Clear phase filter</button>}
                            </div>
                            
                            <div className="glass rounded-xl overflow-hidden glow">
                                <table className="w-full">
                                    <thead className="bg-gray-800/50">
                                        <tr className="text-left text-xs text-gray-400 uppercase">
                                            <th className="p-3">Pri</th>
                                            <th className="p-3">Task</th>
                                            <th className="p-3">Phase</th>
                                            <th className="p-3">Owner</th>
                                            <th className="p-3">Due</th>
                                            <th className="p-3">Status</th>
                                            <th className="p-3">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredTasks.length === 0 ? (
                                            <tr><td colSpan="7" className="p-8 text-center text-gray-400">No tasks found. Add your first playbook task.</td></tr>
                                        ) : filteredTasks.map(task => {
                                            const daysUntil = getDaysUntilDue(task.due_date);
                                            const isOverdue = daysUntil < 0 && task.status !== 'Complete';
                                            return (
                                                <tr key={task.id} className="border-t border-gray-700/50 task-row">
                                                    <td className="p-3">{task.priority === 'High' ? '🔴' : task.priority === 'Medium' ? '🟡' : '🟢'}</td>
                                                    <td className="p-3">
                                                        <div className="font-medium text-white">{task.task_name}</div>
                                                        <div className="text-xs text-gray-400 mt-1">{task.description}</div>
                                                    </td>
                                                    <td className="p-3"><span className="text-xs text-purple-400">{task.phase?.split(': ')[1]}</span></td>
                                                    <td className="p-3"><span className="px-2 py-1 bg-gray-700 rounded text-xs">{task.assignee_role}</span></td>
                                                    <td className="p-3">
                                                        <div className={`text-sm ${isOverdue ? 'text-red-400' : daysUntil <= 3 ? 'text-amber-400' : 'text-gray-300'}`}>{new Date(task.due_date).toLocaleDateString()}</div>
                                                        <div className={`text-xs ${isOverdue ? 'text-red-400' : 'text-gray-500'}`}>{isOverdue ? `${Math.abs(daysUntil)}d overdue` : `${daysUntil}d left`}</div>
                                                    </td>
                                                    <td className="p-3">
                                                        <select value={task.status} onChange={(e) => updateStatus(task.id, e.target.value)} className={`px-2 py-1 rounded text-xs font-medium border-0 ${getStatusColor(task.status)}`}>
                                                            {TASK_STATUS.map(s => <option key={s} value={s}>{s}</option>)}
                                                        </select>
                                                    </td>
                                                    <td className="p-3">
                                                        <button onClick={() => { setEditingTask(task); setShowModal(true); }} className="text-cyan-400 hover:text-cyan-300 text-sm mr-2">Edit</button>
                                                        <button onClick={() => deleteTask(task.id)} className="text-red-400 hover:text-red-300 text-sm">Delete</button>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                            
                            <div className="grid grid-cols-4 gap-4 mt-6">
                                <div className="glass-dark p-4 rounded-lg text-center">
                                    <div className="text-2xl font-bold text-white">{tasks.length}</div>
                                    <div className="text-xs text-gray-400">Total Tasks</div>
                                </div>
                                <div className="glass-dark p-4 rounded-lg text-center">
                                    <div className="text-2xl font-bold text-green-400">{tasks.filter(t => t.status === 'Complete').length}</div>
                                    <div className="text-xs text-gray-400">Complete</div>
                                </div>
                                <div className="glass-dark p-4 rounded-lg text-center">
                                    <div className="text-2xl font-bold text-cyan-400">{tasks.filter(t => t.status === 'In Progress').length}</div>
                                    <div className="text-xs text-gray-400">In Progress</div>
                                </div>
                                <div className="glass-dark p-4 rounded-lg text-center">
                                    <div className="text-2xl font-bold text-red-400">{tasks.filter(t => getDaysUntilDue(t.due_date) < 0 && t.status !== 'Complete').length}</div>
                                    <div className="text-xs text-gray-400">Overdue</div>
                                </div>
                            </div>
                        </>
                    )}
                    
                    {showModal && <TaskModal task={editingTask} onSave={saveTask} onClose={() => { setShowModal(false); setEditingTask(null); }} currentPhase={selectedOpp?.phase} />}
                    
                    <div className="text-center text-xs text-gray-500 mt-8 pt-4 border-t border-gray-800">MissionPulse v12 • Shipley Playbook • AI outputs require human review</div>
                </div>
            );
        }
        
        function TaskModal({ task, onSave, onClose, currentPhase }) {
            const [formData, setFormData] = useState(task || { task_name: '', description: '', phase: currentPhase || 'Gate 3: Proposal Planning', assignee_role: 'PM', due_date: new Date().toISOString().split('T')[0], status: 'Not Started', priority: 'Medium' });
            
            return (
                <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
                    <div className="glass-dark rounded-xl p-6 w-full max-w-lg">
                        <h3 className="text-xl font-bold text-cyan-400 mb-4">{task ? 'Edit Task' : 'Add New Task'}</h3>
                        <form onSubmit={(e) => { e.preventDefault(); onSave(formData); }} className="space-y-4">
                            <div>
                                <label className="block text-sm text-gray-400 mb-1">Task Name *</label>
                                <input type="text" required value={formData.task_name} onChange={(e) => setFormData({ ...formData, task_name: e.target.value })} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white" placeholder="e.g., Develop Win Themes" />
                            </div>
                            <div>
                                <label className="block text-sm text-gray-400 mb-1">Description</label>
                                <textarea value={formData.description} onChange={(e) => setFormData({ ...formData, description: e.target.value })} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white h-20" placeholder="Task details..." />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Phase</label>
                                    <select value={formData.phase} onChange={(e) => setFormData({ ...formData, phase: e.target.value })} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white">
                                        {SHIPLEY_PHASES.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Assigned Role</label>
                                    <select value={formData.assignee_role} onChange={(e) => setFormData({ ...formData, assignee_role: e.target.value })} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white">
                                        {SHIPLEY_ROLES.map(r => <option key={r} value={r}>{r}</option>)}
                                    </select>
                                </div>
                            </div>
                            <div className="grid grid-cols-3 gap-4">
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Due Date</label>
                                    <input type="date" value={formData.due_date} onChange={(e) => setFormData({ ...formData, due_date: e.target.value })} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white" />
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Priority</label>
                                    <select value={formData.priority} onChange={(e) => setFormData({ ...formData, priority: e.target.value })} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white">
                                        <option value="High">🔴 High</option>
                                        <option value="Medium">🟡 Medium</option>
                                        <option value="Low">🟢 Low</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Status</label>
                                    <select value={formData.status} onChange={(e) => setFormData({ ...formData, status: e.target.value })} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white">
                                        {TASK_STATUS.map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                </div>
                            </div>
                            <div className="flex gap-3 pt-4">
                                <button type="submit" className="flex-1 bg-cyan-500 hover:bg-cyan-400 text-black font-semibold py-2 rounded-lg">{task ? 'Update Task' : 'Create Task'}</button>
                                <button type="button" onClick={onClose} className="px-4 py-2 border border-gray-600 text-gray-300 rounded-lg hover:bg-gray-800">Cancel</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }
        
        ReactDOM.render(<PlaybookApp />, document.getElementById('root'));
    </script>
</body>
</html>
