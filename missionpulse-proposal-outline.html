<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Proposal Outline Builder</title>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; color: #fff; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-slideUp { animation: slideUp 0.5s ease-out forwards; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #111C2E; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #243656; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #00E5FA; }
    .glass-card { background: rgba(17, 28, 46, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0NDQ0NjUsImV4cCI6MjA4NTAyMDQ2NX0.3s8ufDDN2aWfkW0RBsAyJyacb2tjB7M550WSFIohHcA';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const Icons = {
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>,
      list: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>,
      plus: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>,
      chevronRight: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>,
      chevronDown: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>,
      trash: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>,
      edit: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>,
      copy: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>,
      download: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>,
      drag: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 8h16M4 16h16"/></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>,
      x: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    const VOLUME_TEMPLATES = [
      { key: 'technical', name: 'Technical Volume', color: '#3B82F6' },
      { key: 'management', name: 'Management Volume', color: '#10B981' },
      { key: 'past_performance', name: 'Past Performance', color: '#8B5CF6' },
      { key: 'pricing', name: 'Price Volume', color: '#F59E0B' },
    ];

    const DEMO_OUTLINE = [
      {
        id: 'vol-1',
        type: 'volume',
        title: 'Volume I - Technical Approach',
        color: '#3B82F6',
        expanded: true,
        sections: [
          {
            id: 'sec-1',
            title: '1.0 Executive Summary',
            pageLimit: 2,
            status: 'complete',
            assignee: 'Mary Womack',
            expanded: true,
            subsections: [
              { id: 'sub-1', title: '1.1 Mission Understanding', pageLimit: 0.5, status: 'complete' },
              { id: 'sub-2', title: '1.2 Solution Overview', pageLimit: 1, status: 'in_progress' },
              { id: 'sub-3', title: '1.3 Key Differentiators', pageLimit: 0.5, status: 'not_started' },
            ]
          },
          {
            id: 'sec-2',
            title: '2.0 Technical Approach',
            pageLimit: 25,
            status: 'in_progress',
            assignee: 'Mike Chen',
            expanded: false,
            subsections: [
              { id: 'sub-4', title: '2.1 Architecture Design', pageLimit: 8, status: 'in_progress' },
              { id: 'sub-5', title: '2.2 Integration Strategy', pageLimit: 6, status: 'not_started' },
              { id: 'sub-6', title: '2.3 Security Framework', pageLimit: 6, status: 'not_started' },
              { id: 'sub-7', title: '2.4 Testing Approach', pageLimit: 5, status: 'not_started' },
            ]
          },
          {
            id: 'sec-3',
            title: '3.0 Transition Plan',
            pageLimit: 10,
            status: 'not_started',
            assignee: 'Sarah Johnson',
            expanded: false,
            subsections: []
          },
        ]
      },
      {
        id: 'vol-2',
        type: 'volume',
        title: 'Volume II - Management Approach',
        color: '#10B981',
        expanded: false,
        sections: [
          {
            id: 'sec-4',
            title: '1.0 Program Management',
            pageLimit: 15,
            status: 'not_started',
            assignee: 'Mary Womack',
            expanded: false,
            subsections: []
          },
        ]
      },
    ];

    const STATUS_CONFIG = {
      complete: { label: 'Complete', color: '#00D29F', bg: '#00D29F20' },
      in_progress: { label: 'In Progress', color: '#F59E0B', bg: '#F59E0B20' },
      not_started: { label: 'Not Started', color: '#6B7280', bg: '#6B728020' },
      blocked: { label: 'Blocked', color: '#EF4444', bg: '#EF444420' },
    };

    function ProposalOutlineApp() {
      const [outline, setOutline] = useState(DEMO_OUTLINE);
      const [selectedItem, setSelectedItem] = useState(null);

      const toggleExpand = (volumeId, sectionId = null) => {
        setOutline(prev => prev.map(vol => {
          if (vol.id === volumeId) {
            if (sectionId) {
              return {
                ...vol,
                sections: vol.sections.map(sec => 
                  sec.id === sectionId ? { ...sec, expanded: !sec.expanded } : sec
                )
              };
            }
            return { ...vol, expanded: !vol.expanded };
          }
          return vol;
        }));
      };

      const addSection = (volumeId) => {
        const newSection = {
          id: `sec-${Date.now()}`,
          title: 'New Section',
          pageLimit: 5,
          status: 'not_started',
          assignee: '',
          expanded: true,
          subsections: []
        };
        
        setOutline(prev => prev.map(vol => 
          vol.id === volumeId 
            ? { ...vol, sections: [...vol.sections, newSection] }
            : vol
        ));
      };

      const addSubsection = (volumeId, sectionId) => {
        const newSubsection = {
          id: `sub-${Date.now()}`,
          title: 'New Subsection',
          pageLimit: 1,
          status: 'not_started'
        };
        
        setOutline(prev => prev.map(vol => {
          if (vol.id !== volumeId) return vol;
          return {
            ...vol,
            sections: vol.sections.map(sec => 
              sec.id === sectionId 
                ? { ...sec, subsections: [...sec.subsections, newSubsection] }
                : sec
            )
          };
        }));
      };

      const updateStatus = (volumeId, sectionId, subsectionId, newStatus) => {
        setOutline(prev => prev.map(vol => {
          if (vol.id !== volumeId) return vol;
          return {
            ...vol,
            sections: vol.sections.map(sec => {
              if (sec.id !== sectionId) return sec;
              if (subsectionId) {
                return {
                  ...sec,
                  subsections: sec.subsections.map(sub =>
                    sub.id === subsectionId ? { ...sub, status: newStatus } : sub
                  )
                };
              }
              return { ...sec, status: newStatus };
            })
          };
        }));
      };

      const calculateProgress = () => {
        let total = 0;
        let complete = 0;
        
        outline.forEach(vol => {
          vol.sections.forEach(sec => {
            total++;
            if (sec.status === 'complete') complete++;
            sec.subsections.forEach(sub => {
              total++;
              if (sub.status === 'complete') complete++;
            });
          });
        });
        
        return total > 0 ? Math.round((complete / total) * 100) : 0;
      };

      const totalPages = outline.reduce((acc, vol) => 
        acc + vol.sections.reduce((secAcc, sec) => 
          secAcc + sec.pageLimit + sec.subsections.reduce((subAcc, sub) => subAcc + sub.pageLimit, 0), 0), 0);

      const progress = calculateProgress();

      return (
        <div className="min-h-screen bg-[#00050F]">
          <header className="glass-card border-b border-white/10 sticky top-0 z-50">
            <div className="max-w-6xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="text-gray-400 hover:text-white transition-colors">
                    <Icon name="home" className="w-5 h-5" />
                  </a>
                  <div className="w-px h-6 bg-white/20" />
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center">
                      <Icon name="list" className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white">Proposal Outline Builder</h1>
                      <p className="text-xs text-gray-400">Structure & assign proposal sections</p>
                    </div>
                  </div>
                </div>

                <div className="flex items-center gap-4">
                  <div className="text-right mr-4">
                    <div className="text-sm text-gray-400">Progress</div>
                    <div className="text-lg font-bold text-white">{progress}%</div>
                  </div>
                  <div className="w-32 h-2 bg-white/10 rounded-full overflow-hidden">
                    <div 
                      className="h-full bg-gradient-to-r from-cyan-500 to-blue-500 rounded-full transition-all"
                      style={{ width: `${progress}%` }}
                    />
                  </div>
                  <button className="px-4 py-2 bg-gradient-to-r from-blue-500 to-indigo-600 text-white rounded-lg font-medium hover:opacity-90 transition-opacity flex items-center gap-2">
                    <Icon name="download" className="w-4 h-4" />
                    Export
                  </button>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-6 py-8">
            {/* Stats */}
            <div className="grid grid-cols-4 gap-4 mb-8">
              {[
                { label: 'Volumes', value: outline.length, color: '#00E5FA' },
                { label: 'Sections', value: outline.reduce((acc, v) => acc + v.sections.length, 0), color: '#8B5CF6' },
                { label: 'Page Limit', value: totalPages, color: '#F59E0B' },
                { label: 'Completion', value: `${progress}%`, color: progress >= 75 ? '#00D29F' : progress >= 50 ? '#F59E0B' : '#6B7280' },
              ].map((stat, idx) => (
                <div key={idx} className="glass-card rounded-xl p-4">
                  <div className="text-sm text-gray-400 mb-1">{stat.label}</div>
                  <div className="text-2xl font-bold" style={{ color: stat.color }}>{stat.value}</div>
                </div>
              ))}
            </div>

            {/* Outline Tree */}
            <div className="space-y-4">
              {outline.map((volume, volIdx) => (
                <div key={volume.id} className="glass-card rounded-xl overflow-hidden animate-slideUp" style={{ animationDelay: `${volIdx * 100}ms` }}>
                  {/* Volume Header */}
                  <div 
                    className="flex items-center gap-3 p-4 cursor-pointer hover:bg-white/5 transition-colors"
                    onClick={() => toggleExpand(volume.id)}
                  >
                    <button className="p-1 text-gray-400">
                      <Icon name={volume.expanded ? 'chevronDown' : 'chevronRight'} className="w-4 h-4" />
                    </button>
                    <div className="w-3 h-8 rounded" style={{ backgroundColor: volume.color }} />
                    <h2 className="text-lg font-semibold text-white flex-1">{volume.title}</h2>
                    <span className="text-sm text-gray-400">{volume.sections.length} sections</span>
                    <button 
                      onClick={(e) => { e.stopPropagation(); addSection(volume.id); }}
                      className="p-2 text-gray-400 hover:text-white transition-colors"
                    >
                      <Icon name="plus" className="w-4 h-4" />
                    </button>
                  </div>

                  {/* Sections */}
                  {volume.expanded && (
                    <div className="border-t border-white/10">
                      {volume.sections.map((section, secIdx) => (
                        <div key={section.id} className="border-b border-white/5 last:border-b-0">
                          {/* Section Header */}
                          <div 
                            className="flex items-center gap-3 px-4 py-3 pl-12 cursor-pointer hover:bg-white/5 transition-colors"
                            onClick={() => toggleExpand(volume.id, section.id)}
                          >
                            <button className="p-1 text-gray-400">
                              <Icon name={section.expanded ? 'chevronDown' : 'chevronRight'} className="w-4 h-4" />
                            </button>
                            <span className="font-medium text-white flex-1">{section.title}</span>
                            <span className="text-xs text-gray-500">{section.pageLimit} pages</span>
                            {section.assignee && (
                              <span className="text-xs px-2 py-1 bg-white/5 rounded text-gray-400">
                                {section.assignee}
                              </span>
                            )}
                            <select
                              value={section.status}
                              onClick={(e) => e.stopPropagation()}
                              onChange={(e) => updateStatus(volume.id, section.id, null, e.target.value)}
                              className="text-xs px-2 py-1 rounded border-0 focus:outline-none"
                              style={{ 
                                backgroundColor: STATUS_CONFIG[section.status]?.bg,
                                color: STATUS_CONFIG[section.status]?.color
                              }}
                            >
                              {Object.entries(STATUS_CONFIG).map(([key, val]) => (
                                <option key={key} value={key}>{val.label}</option>
                              ))}
                            </select>
                            <button 
                              onClick={(e) => { e.stopPropagation(); addSubsection(volume.id, section.id); }}
                              className="p-1 text-gray-400 hover:text-white transition-colors"
                            >
                              <Icon name="plus" className="w-3 h-3" />
                            </button>
                          </div>

                          {/* Subsections */}
                          {section.expanded && section.subsections.length > 0 && (
                            <div className="bg-[#0A1628]/50">
                              {section.subsections.map((sub, subIdx) => (
                                <div 
                                  key={sub.id}
                                  className="flex items-center gap-3 px-4 py-2 pl-20 hover:bg-white/5 transition-colors"
                                >
                                  <span className="text-sm text-gray-300 flex-1">{sub.title}</span>
                                  <span className="text-xs text-gray-500">{sub.pageLimit} pages</span>
                                  <select
                                    value={sub.status}
                                    onChange={(e) => updateStatus(volume.id, section.id, sub.id, e.target.value)}
                                    className="text-xs px-2 py-1 rounded border-0 focus:outline-none"
                                    style={{ 
                                      backgroundColor: STATUS_CONFIG[sub.status]?.bg,
                                      color: STATUS_CONFIG[sub.status]?.color
                                    }}
                                  >
                                    {Object.entries(STATUS_CONFIG).map(([key, val]) => (
                                      <option key={key} value={key}>{val.label}</option>
                                    ))}
                                  </select>
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      ))}

                      {volume.sections.length === 0 && (
                        <div className="p-8 text-center text-gray-500">
                          No sections yet. Click + to add one.
                        </div>
                      )}
                    </div>
                  )}
                </div>
              ))}
            </div>

            {/* Add Volume Button */}
            <button 
              onClick={() => setOutline(prev => [...prev, {
                id: `vol-${Date.now()}`,
                type: 'volume',
                title: 'New Volume',
                color: VOLUME_TEMPLATES[outline.length % VOLUME_TEMPLATES.length].color,
                expanded: true,
                sections: []
              }])}
              className="w-full mt-4 p-4 border-2 border-dashed border-white/20 rounded-xl text-gray-400 hover:text-white hover:border-white/40 transition-colors flex items-center justify-center gap-2"
            >
              <Icon name="plus" className="w-5 h-5" />
              Add Volume
            </button>
          </main>

          <footer className="border-t border-white/10 py-4 mt-12">
            <div className="max-w-6xl mx-auto px-6 text-center text-xs text-gray-500">
              © 2026 Mission Meets Tech • MissionPulse v2.0 • Sprint 63
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<ProposalOutlineApp />, document.getElementById('root'));
  </script>
</body>
</html>
