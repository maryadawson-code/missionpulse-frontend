  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --primary-cyan: #00E5FA; --deep-navy: #00050F; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--deep-navy); min-height: 100vh; color: #fff; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .glass-nav { background: rgba(0, 5, 15, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0, 229, 250, 0.1); }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0A1628; }
    ::-webkit-scrollbar-thumb { background: rgba(0, 229, 250, 0.3); border-radius: 4px; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>

      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-flex items-center justify-center ${className}`}><IconComponent /></span> : null;
    };

    // Auth Context
    const AuthContext = createContext(null);
    const useAuth = () => useContext(AuthContext);

    const AuthProvider = ({ children }) => {
      const [currentRole, setCurrentRole] = useState('executive');
      const [user] = useState({ name: 'Mary Womack', email: 'mary@missionpulse.io' });
      const hasAccess = useCallback((allowedRoles) => {
        if (allowedRoles.includes('all')) return true;
        if (allowedRoles.includes('admin') && ROLES[currentRole]?.canAccessAdmin) return true;
        if (allowedRoles.includes('internal')) return true;
        return allowedRoles.includes(currentRole);
      }, [currentRole]);
      return (
        <AuthContext.Provider value={{ currentRole, setCurrentRole, user, hasAccess, roleInfo: ROLES[currentRole] }}>
          {children}
        </AuthContext.Provider>
      );
    };

    const Badge = ({ children, variant = 'default', size = 'sm', icon }) => {
      const variants = {

        success: 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30',
        warning: 'bg-amber-500/20 text-amber-400 border-amber-500/30',
        danger: 'bg-red-500/20 text-red-400 border-red-500/30',
        purple: 'bg-purple-500/20 text-purple-400 border-purple-500/30',
      };
      const sizes = { xs: 'px-1.5 py-0.5 text-xs', sm: 'px-2 py-1 text-xs', md: 'px-3 py-1.5 text-sm' };
      return (
        <span className={`inline-flex items-center gap-1.5 rounded-full font-medium border ${variants[variant]} ${sizes[size]}`}>

      );
    };

        primary: 'bg-gradient-to-r from-cyan-500 to-teal-500 text-white hover:from-cyan-400 hover:to-teal-400 shadow-lg shadow-cyan-500/25',

        ghost: 'text-slate-400 hover:text-white hover:bg-slate-700/50',
        danger: 'bg-red-500/20 text-red-400 hover:bg-red-500/30 border border-red-500/30',
        success: 'bg-emerald-500/20 text-emerald-400 hover:bg-emerald-500/30 border border-emerald-500/30',
      };
      const sizes = { xs: 'px-2 py-1 text-xs', sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2 text-sm', lg: 'px-6 py-3 text-base' };
      return (
        <button className={`inline-flex items-center justify-center gap-2 font-semibold rounded-xl transition-all duration-200 ${variants[variant]} ${sizes[size]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`} disabled={disabled} {...props}>

      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

                    <div className="absolute -top-1 -right-1 w-3 h-3 bg-emerald-500 rounded-full border-2 border-slate-900"></div>

                    <span className="text-xs font-mono text-slate-300">$0.0234</span>
                  </div>
                  <div className="relative">
                    <button onClick={() => setProfileOpen(!profileOpen)} className="flex items-center gap-2 p-1.5 rounded-xl hover:bg-slate-700/50">

                    </button>
                    {profileOpen && (
                      <div className="absolute right-0 top-full mt-2 w-72 py-3 bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl animate-fade-in z-50">
                        <div className="px-4 pb-3 border-b border-slate-700">
                          <div className="font-semibold text-white">{user.name}</div>
                          <div className="text-sm text-slate-400">{user.email}</div>
                        </div>
                        <div className="px-4 py-3">
                          <select value={currentRole} onChange={(e) => setCurrentRole(e.target.value)} className="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm text-white">
                            {Object.entries(ROLES).map(([id, role]) => (
                              <option key={id} value={id}>{role.name}</option>
                            ))}
                          </select>
                        </div>
                      </div>
                    )}
                  </div>
                  <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="lg:hidden p-2 rounded-xl text-slate-400 hover:text-white hover:bg-slate-700/50">
                    <Icon name={mobileMenuOpen ? 'x' : 'menu'} className="w-6 h-6" />
                  </button>
                </div>
              </div>
            </div>
          </nav>

          {mobileMenuOpen && (
            <div className="lg:hidden fixed inset-0 z-40 pt-16">
              <div className="absolute inset-0 bg-black/60" onClick={() => setMobileMenuOpen(false)} />
              <div className="relative bg-slate-900 border-t border-slate-800 p-4 space-y-1 animate-fade-in">
                {accessibleNavItems.map(item => (
                  <a key={item.id} href={item.href} className={`flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium ${currentPage === item.id ? 'bg-cyan-500/20 text-cyan-400' : 'text-slate-400'}`}>
                    <Icon name={item.icon} className="w-5 h-5" />
                    {item.name}
                  </a>
                ))}
              </div>
            </div>
          )}
          {profileOpen && <div className="fixed inset-0 z-40" onClick={() => setProfileOpen(false)} />}
        </>
      );
    };

    const LiabilityFooter = () => (
      <div className="fixed bottom-0 left-0 right-0 py-2 px-4 bg-slate-900/95 backdrop-blur-sm border-t border-slate-800 z-30">
        <div className="max-w-7xl mx-auto flex items-center justify-between text-xs">
          <span className="text-amber-400 font-medium">AI GENERATED - REQUIRES HUMAN REVIEW</span>
          <span className="text-cyan-500 hidden sm:block">Mission. Technology. Transformation.</span>
        </div>
      </div>
    );

    // Quality Score Indicator
    const QualityScore = ({ score }) => {
      const color = score >= 85 ? 'emerald' : score >= 70 ? 'amber' : 'red';
      return (
        <div className="flex items-center gap-2">
          <div className={`w-10 h-10 rounded-xl bg-${color}-500/20 flex items-center justify-center`}>
            <span className={`text-lg font-bold text-${color}-400`}>{score}</span>
          </div>
          <div className="w-16 h-2 bg-slate-700 rounded-full overflow-hidden">
            <div className={`h-full bg-${color}-500 rounded-full transition-all`} style={{ width: `${score}%` }} />
          </div>
        </div>
      );
    };

    // Playbook Entry Card
    const PlaybookCard = ({ entry, onView, onApprove, onArchive, onDelete }) => {
      const category = PLAYBOOK_CATEGORIES.find(c => c.id === entry.category);
      
      return (
        <Card className="p-4 hover:border-cyan-500/30 transition-colors">
          <div className="flex items-start justify-between gap-4 mb-3">
            <div className="flex items-center gap-3">
              <div className="p-2 rounded-lg" style={{ backgroundColor: `${category?.color}20` }}>
                <Icon name={category?.icon} className="w-5 h-5" style={{ color: category?.color }} />
              </div>
              <div>
                <h3 className="font-semibold text-white line-clamp-1">{entry.title}</h3>
                <p className="text-xs text-slate-400">{category?.name} • {entry.lifecycle_phase}</p>
              </div>
            </div>
            <Badge variant={entry.status === 'approved' ? 'success' : 'warning'} size="xs">
              {entry.status}
            </Badge>
          </div>
          
          <p className="text-sm text-slate-400 line-clamp-2 mb-3">{entry.user_prompt}</p>
          
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-4 text-xs text-slate-500">
              <span className="flex items-center gap-1">
                <Icon name="star" className="w-3 h-3 text-amber-400" />
                {entry.quality_score}
              </span>
              <span className="flex items-center gap-1">
                <Icon name="eye" className="w-3 h-3" />
                {entry.use_count} uses
              </span>
              <span>{entry.customer_agency}</span>
            </div>
            
            <div className="flex items-center gap-1">
              <Button variant="ghost" size="xs" icon="eye" onClick={() => onView(entry)}>View</Button>
              {entry.status === 'pending' && (
                <Button variant="success" size="xs" icon="check" onClick={() => onApprove(entry.id)}>Approve</Button>
              )}
              <Button variant="ghost" size="xs" icon="archive" onClick={() => onArchive(entry.id)} />
              <Button variant="ghost" size="xs" icon="trash" className="text-red-400" onClick={() => onDelete(entry.id)} />
            </div>
          </div>
        </Card>
      );
    };

    // Playbook Manager Content
    const PlaybookManagerContent = () => {
      const [entries, setEntries] = useState(SAMPLE_PLAYBOOK);
      const [filter, setFilter] = useState('all');
      const [statusFilter, setStatusFilter] = useState('all');
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedEntry, setSelectedEntry] = useState(null);

      const filteredEntries = entries.filter(entry => {
        if (filter !== 'all' && entry.category !== filter) return false;
        if (statusFilter !== 'all' && entry.status !== statusFilter) return false;
        if (searchQuery && !entry.title.toLowerCase().includes(searchQuery.toLowerCase())) return false;
        return true;
      });

      const handleApprove = (id) => {
        setEntries(entries.map(e => e.id === id ? { ...e, status: 'approved' } : e));
      };

      const handleArchive = (id) => {
        setEntries(entries.map(e => e.id === id ? { ...e, status: 'archived' } : e));
      };

      const handleDelete = (id) => {
        if (confirm('Are you sure you want to delete this playbook entry?')) {
          setEntries(entries.filter(e => e.id !== id));
        }
      };

      const stats = {
        total: entries.length,
        approved: entries.filter(e => e.status === 'approved').length,
        pending: entries.filter(e => e.status === 'pending').length,
        avgScore: Math.round(entries.reduce((sum, e) => sum + e.quality_score, 0) / entries.length),
      };

      return (
        <div className="space-y-6">
          {/* Header */}
          <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
              <h1 className="text-2xl font-bold text-white mb-1">Playbook Manager</h1>
              <p className="text-slate-400">Curate golden examples for AI context injection</p>
            </div>
            <div className="flex items-center gap-3">
              <Badge variant="success" size="md">{stats.approved} Approved</Badge>
              <Badge variant="warning" size="md">{stats.pending} Pending Review</Badge>
            </div>
          </div>

          {/* Stats Cards */}
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            {[
              { label: 'Total Examples', value: stats.total, icon: 'book', color: 'cyan' },
              { label: 'Approved', value: stats.approved, icon: 'check', color: 'emerald' },
              { label: 'Pending Review', value: stats.pending, icon: 'clock', color: 'amber' },
              { label: 'Avg Quality', value: stats.avgScore, icon: 'star', color: 'purple' },
            ].map((stat, i) => (
              <Card key={i} className="p-4">
                <div className="flex items-center gap-3">
                  <div className={`p-2 rounded-lg bg-${stat.color}-500/20`}>
                    <Icon name={stat.icon} className={`w-5 h-5 text-${stat.color}-400`} />
                  </div>
                  <div>
                    <div className="text-2xl font-bold text-white">{stat.value}</div>
                    <div className="text-xs text-slate-400">{stat.label}</div>
                  </div>
                </div>
              </Card>
            ))}
          </div>

          {/* Filters */}
          <Card className="p-4">
            <div className="flex flex-wrap items-center gap-4">
              <div className="flex-1 min-w-64">
                <div className="relative">
                  <Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500" />
                  <input
                    type="text"
                    placeholder="Search playbook entries..."
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    className="w-full pl-10 pr-4 py-2 bg-slate-700 border border-slate-600 rounded-xl text-sm text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500"
                  />
                </div>
              </div>
              
              <select
                value={filter}
                onChange={(e) => setFilter(e.target.value)}
                className="px-4 py-2 bg-slate-700 border border-slate-600 rounded-xl text-sm text-white"
              >
                <option value="all">All Categories</option>
                {PLAYBOOK_CATEGORIES.map(cat => (
                  <option key={cat.id} value={cat.id}>{cat.name}</option>
                ))}
              </select>

              <select
                value={statusFilter}
                onChange={(e) => setStatusFilter(e.target.value)}
                className="px-4 py-2 bg-slate-700 border border-slate-600 rounded-xl text-sm text-white"
              >
                <option value="all">All Status</option>
                <option value="approved">Approved</option>
                <option value="pending">Pending</option>
                <option value="archived">Archived</option>
              </select>
            </div>
          </Card>

          {/* Entries Grid */}
          <div className="grid md:grid-cols-2 gap-4">
            {filteredEntries.map((entry, index) => (
              <div key={entry.id} className="animate-fade-in" style={{ animationDelay: `${index * 50}ms` }}>
                <PlaybookCard
                  entry={entry}
                  onView={setSelectedEntry}
                  onApprove={handleApprove}
                  onArchive={handleArchive}
                  onDelete={handleDelete}
                />
              </div>
            ))}
          </div>

          {filteredEntries.length === 0 && (
            <Card className="p-12 text-center">
              <Icon name="book" className="w-12 h-12 text-slate-600 mx-auto mb-3" />
              <p className="text-slate-400">No playbook entries match your filters</p>
            </Card>
          )}

          {/* View Modal */}
          {selectedEntry && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
              <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" onClick={() => setSelectedEntry(null)} />
              <div className="relative w-full max-w-3xl max-h-[80vh] overflow-y-auto bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl animate-fade-in">
                <div className="sticky top-0 p-4 border-b border-slate-700 bg-slate-900 flex items-center justify-between">
                  <h2 className="text-lg font-semibold text-white">{selectedEntry.title}</h2>
                  <button onClick={() => setSelectedEntry(null)} className="p-2 rounded-xl text-slate-400 hover:text-white hover:bg-slate-700/50">
                    <Icon name="x" className="w-5 h-5" />
                  </button>
                </div>
                <div className="p-6 space-y-6">
                  <div className="flex flex-wrap gap-2">
                    <Badge variant="primary">{PLAYBOOK_CATEGORIES.find(c => c.id === selectedEntry.category)?.name}</Badge>
                    <Badge variant="default">{selectedEntry.lifecycle_phase}</Badge>
                    <Badge variant="default">{selectedEntry.customer_agency}</Badge>
                    <Badge variant={selectedEntry.status === 'approved' ? 'success' : 'warning'}>{selectedEntry.status}</Badge>
                  </div>
                  
                  <div>
                    <h3 className="text-sm font-semibold text-cyan-400 mb-2">User Prompt</h3>
                    <div className="p-4 bg-slate-800 rounded-xl text-sm text-slate-300">{selectedEntry.user_prompt}</div>
                  </div>
                  
                  <div>
                    <h3 className="text-sm font-semibold text-cyan-400 mb-2">AI Response</h3>
                    <div className="p-4 bg-slate-800 rounded-xl text-sm text-slate-300 whitespace-pre-wrap">{selectedEntry.assistant_response}</div>
                  </div>

                  <div className="flex items-center justify-between pt-4 border-t border-slate-700">
                    <QualityScore score={selectedEntry.quality_score} />
                    <div className="flex items-center gap-2">
                      {selectedEntry.status === 'pending' && (
                        <Button variant="success" icon="check" onClick={() => { handleApprove(selectedEntry.id); setSelectedEntry(null); }}>
                          Approve
                        </Button>
                      )}
                      <Button variant="secondary" onClick={() => setSelectedEntry(null)}>Close</Button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // Main App
    const App = () => (
      <AuthProvider>
        <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-900 to-slate-800">
          <NavigationHeader currentPage="playbook" />
          <main className="pt-20 pb-16 px-4 lg:px-6">
            <div className="max-w-7xl mx-auto">
              <PlaybookManagerContent />
            </div>
          </main>
          <LiabilityFooter />
        </div>
      </AuthProvider>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
