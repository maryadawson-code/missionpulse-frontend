<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:#00050F;color:#e2e8f0;min-height:100vh}
    .glass{background:rgba(15,23,42,0.85);backdrop-filter:blur(16px);border:1px solid rgba(0,229,250,0.1);border-radius:12px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const SUPABASE_URL='https://djuviwarqdvlbgcfuupa.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
const supabase=window.supabase?.createClient(SUPABASE_URL,SUPABASE_ANON);

const REPORT_TYPES=[
  {id:'pipeline',name:'Pipeline Summary',icon:'📊',desc:'Active opportunities and metrics'},
  {id:'compliance',name:'Compliance Status',icon:'✓',desc:'L/M requirement completion'},
  {id:'pricing',name:'Pricing Summary',icon:'💵',desc:'BOE and cost analysis'},
  {id:'team',name:'Team Utilization',icon:'👥',desc:'Assignment and workload'},
  {id:'timeline',name:'Timeline Report',icon:'📅',desc:'Milestones and deadlines'},
  {id:'executive',name:'Executive Brief',icon:'📋',desc:'High-level summary for leadership'}
];

function Reports(){
  const[connected,setConnected]=useState(false);
  const[selectedReport,setSelectedReport]=useState('pipeline');
  const[dateRange,setDateRange]=useState('30d');
  const[exporting,setExporting]=useState(false);
  const[data,setData]=useState({opps:[],compliance:[],pricing:[]});

  useEffect(()=>{
    const load=async()=>{
      try{
        const[oppsRes,compRes,priceRes]=await Promise.all([
          supabase.from('opportunities').select('*'),
          supabase.from('compliance_items').select('*'),
          supabase.from('pricing_items').select('*')
        ]);
        setData({
          opps:oppsRes.data||[],
          compliance:compRes.data||[],
          pricing:priceRes.data||[]
        });
        setConnected(!oppsRes.error);
      }catch{setConnected(false)}
    };
    load();
  },[]);

  const fmt=v=>v>=1e9?`$${(v/1e9).toFixed(1)}B`:v>=1e6?`$${(v/1e6).toFixed(1)}M`:`$${(v||0).toLocaleString()}`;

  const exportReport=(format)=>{
    setExporting(true);
    setTimeout(()=>{
      const reportData=selectedReport==='pipeline'?data.opps:selectedReport==='compliance'?data.compliance:data.pricing;
      if(format==='csv'){
        const headers=Object.keys(reportData[0]||{}).join(',');
        const rows=reportData.map(r=>Object.values(r).join(',')).join('\n');
        const blob=new Blob([headers+'\n'+rows],{type:'text/csv'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url;a.download=`${selectedReport}-report.csv`;a.click();
      }else{
        const blob=new Blob([JSON.stringify(reportData,null,2)],{type:'application/json'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url;a.download=`${selectedReport}-report.json`;a.click();
      }
      setExporting(false);
    },1000);
  };

  const pipelineTotal=data.opps.reduce((s,o)=>s+(o.ceiling||0),0);
  const avgPwin=data.opps.length?Math.round(data.opps.reduce((s,o)=>s+(o.pwin||0),0)/data.opps.length):0;
  const complianceComplete=data.compliance.filter(c=>c.status==='complete').length;
  const pricingTotal=data.pricing.reduce((s,p)=>s+(p.total||p.rate*p.hours*p.wrap||0),0);

  const renderReport=()=>{
    switch(selectedReport){
      case 'pipeline':
        return(
          <div className="space-y-6">
            <div className="grid grid-cols-4 gap-4">
              <div className="glass p-4"><div className="text-slate-400 text-xs">Total Pipeline</div><div className="text-2xl font-bold text-emerald-400">{fmt(pipelineTotal)}</div></div>
              <div className="glass p-4"><div className="text-slate-400 text-xs">Opportunities</div><div className="text-2xl font-bold text-cyan-400">{data.opps.length}</div></div>
              <div className="glass p-4"><div className="text-slate-400 text-xs">Avg pWin</div><div className="text-2xl font-bold text-amber-400">{avgPwin}%</div></div>
              <div className="glass p-4"><div className="text-slate-400 text-xs">Due &lt;30d</div><div className="text-2xl font-bold text-red-400">{data.opps.filter(o=>o.days_to_due<=30).length}</div></div>
            </div>
            <div className="glass overflow-hidden">
              <table className="w-full">
                <thead className="bg-slate-800/50">
                  <tr>{['Opportunity','Agency','Value','Phase','pWin','Days'].map(h=><th key={h} className="text-left p-3 text-xs font-semibold text-slate-400 uppercase">{h}</th>)}</tr>
                </thead>
                <tbody className="divide-y divide-slate-700/30">
                  {data.opps.map(o=>(
                    <tr key={o.id} className="hover:bg-slate-800/30">
                      <td className="p-3 text-white">{o.nickname||o.title}</td>
                      <td className="p-3 text-slate-400">{o.agency}</td>
                      <td className="p-3 text-emerald-400">{fmt(o.ceiling)}</td>
                      <td className="p-3"><span className="px-2 py-0.5 rounded bg-cyan-500/20 text-cyan-400 text-xs">{o.phase}</span></td>
                      <td className="p-3 text-slate-300">{o.pwin}%</td>
                      <td className="p-3 text-slate-400">{o.days_to_due}d</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      case 'compliance':
        return(
          <div className="space-y-6">
            <div className="grid grid-cols-4 gap-4">
              <div className="glass p-4"><div className="text-slate-400 text-xs">Total Items</div><div className="text-2xl font-bold text-white">{data.compliance.length}</div></div>
              <div className="glass p-4"><div className="text-slate-400 text-xs">Complete</div><div className="text-2xl font-bold text-emerald-400">{complianceComplete}</div></div>
              <div className="glass p-4"><div className="text-slate-400 text-xs">In Progress</div><div className="text-2xl font-bold text-amber-400">{data.compliance.filter(c=>c.status==='in_progress').length}</div></div>
              <div className="glass p-4"><div className="text-slate-400 text-xs">Completion</div><div className="text-2xl font-bold text-cyan-400">{data.compliance.length?Math.round((complianceComplete/data.compliance.length)*100):0}%</div></div>
            </div>
            <div className="glass overflow-hidden">
              <table className="w-full">
                <thead className="bg-slate-800/50">
                  <tr>{['Req ID','Type','Description','Section','Owner','Status'].map(h=><th key={h} className="text-left p-3 text-xs font-semibold text-slate-400 uppercase">{h}</th>)}</tr>
                </thead>
                <tbody className="divide-y divide-slate-700/30">
                  {data.compliance.map(c=>(
                    <tr key={c.id} className="hover:bg-slate-800/30">
                      <td className="p-3 text-cyan-400 font-mono">{c.req_id}</td>
                      <td className="p-3"><span className={`px-2 py-0.5 rounded text-xs ${c.type==='L'?'bg-blue-500/20 text-blue-400':'bg-purple-500/20 text-purple-400'}`}>{c.type}</span></td>
                      <td className="p-3 text-white text-sm">{c.description}</td>
                      <td className="p-3 text-slate-400">{c.section}</td>
                      <td className="p-3 text-slate-300">{c.owner}</td>
                      <td className="p-3"><span className={`px-2 py-0.5 rounded text-xs ${c.status==='complete'?'bg-emerald-500/20 text-emerald-400':c.status==='in_progress'?'bg-amber-500/20 text-amber-400':'bg-slate-500/20 text-slate-400'}`}>{c.status}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      case 'pricing':
        return(
          <div className="space-y-6">
            <div className="grid grid-cols-4 gap-4">
              <div className="glass p-4"><div className="text-slate-400 text-xs">Total Cost</div><div className="text-2xl font-bold text-emerald-400">{fmt(pricingTotal)}</div></div>
              <div className="glass p-4"><div className="text-slate-400 text-xs">LCATs</div><div className="text-2xl font-bold text-cyan-400">{data.pricing.length}</div></div>
              <div className="glass p-4"><div className="text-slate-400 text-xs">Total Hours</div><div className="text-2xl font-bold text-amber-400">{data.pricing.reduce((s,p)=>s+(p.hours||0),0).toLocaleString()}</div></div>
              <div className="glass p-4"><div className="text-slate-400 text-xs">Avg Rate</div><div className="text-2xl font-bold text-purple-400">${data.pricing.length?Math.round(data.pricing.reduce((s,p)=>s+(p.rate||0),0)/data.pricing.length):0}</div></div>
            </div>
            <div className="glass overflow-hidden">
              <table className="w-full">
                <thead className="bg-slate-800/50">
                  <tr>{['LCAT','Rate','Hours','Wrap','Total'].map(h=><th key={h} className="text-left p-3 text-xs font-semibold text-slate-400 uppercase">{h}</th>)}</tr>
                </thead>
                <tbody className="divide-y divide-slate-700/30">
                  {data.pricing.map(p=>(
                    <tr key={p.id} className="hover:bg-slate-800/30">
                      <td className="p-3 text-white">{p.lcat}</td>
                      <td className="p-3 text-slate-300">${p.rate?.toFixed(2)}</td>
                      <td className="p-3 text-slate-300">{p.hours?.toLocaleString()}</td>
                      <td className="p-3 text-slate-400">{p.wrap}x</td>
                      <td className="p-3 text-emerald-400 font-medium">{fmt(p.total||p.rate*p.hours*p.wrap)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      default:
        return(
          <div className="glass p-12 text-center">
            <span className="text-6xl">{REPORT_TYPES.find(r=>r.id===selectedReport)?.icon}</span>
            <h3 className="text-xl font-bold text-white mt-4">{REPORT_TYPES.find(r=>r.id===selectedReport)?.name}</h3>
            <p className="text-slate-400 mt-2">Report data will be displayed here</p>
          </div>
        );
    }
  };

  return(
    <div className="min-h-screen p-6">
      {/* Header */}
      <div className="flex justify-between items-start mb-6">
        <div>
          <h1 className="text-2xl font-bold text-white flex items-center gap-3">
            📈 Reports & Analytics
            <span className={`text-xs px-2 py-1 rounded ${connected?'bg-emerald-500/20 text-emerald-400':'bg-red-500/20 text-red-400'}`}>
              {connected?'● Live':'○ Demo'}
            </span>
          </h1>
          <p className="text-slate-400 text-sm mt-1">Generate and export proposal analytics</p>
        </div>
        <div className="flex items-center gap-3">
          <select value={dateRange} onChange={e=>setDateRange(e.target.value)} className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white">
            <option value="7d">Last 7 days</option>
            <option value="30d">Last 30 days</option>
            <option value="90d">Last 90 days</option>
            <option value="all">All time</option>
          </select>
          <button onClick={()=>exportReport('csv')} disabled={exporting} className="px-4 py-2 bg-slate-700 text-white rounded-lg text-sm hover:bg-slate-600 disabled:opacity-50">
            {exporting?'...':'📥 CSV'}
          </button>
          <button onClick={()=>exportReport('json')} disabled={exporting} className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-lg text-sm disabled:opacity-50">
            {exporting?'...':'📥 JSON'}
          </button>
        </div>
      </div>

      {/* Report Selector */}
      <div className="grid grid-cols-6 gap-3 mb-6">
        {REPORT_TYPES.map(report=>(
          <button key={report.id} onClick={()=>setSelectedReport(report.id)} className={`glass p-4 text-left transition-all ${selectedReport===report.id?'border-cyan-500/50 bg-cyan-500/10':''}`}>
            <span className="text-2xl">{report.icon}</span>
            <div className="font-medium text-white mt-2 text-sm">{report.name}</div>
            <div className="text-xs text-slate-500 mt-1">{report.desc}</div>
          </button>
        ))}
      </div>

      {/* Report Content */}
      {renderReport()}

      <div className="text-center text-xs text-slate-500 mt-8">
        AI GENERATED - REQUIRES HUMAN REVIEW | © 2026 Mission Meets Tech
      </div>
    </div>
  );
}

ReactDOM.render(<Reports/>,document.getElementById('root'));
</script>
</body>
</html>
