function ModuleDashboard({opps,tokenUsage,dbStatus}){
  const total=opps.reduce((s,o)=>s+(o.ceiling||0),0);
  const avgPwin=opps.length?Math.round(opps.reduce((s,o)=>s+(o.pwin||0),0)/opps.length):0;
  return(
    <div className="space-y-4 animate-fadeIn">
      <div className="glass p-6 bg-gradient-to-r from-cyan-500/10 to-teal-500/10">
        <div className="flex justify-between items-center">
          <div>
            <h2 className="text-2xl font-bold text-white">Mission Control</h2>
            <p className="text-slate-400">AI-Powered Proposal Command Center</p>
            <p className="text-cyan-400 text-sm mt-1">Mission. Technology. Transformation.</p>
          </div>
          <div className="text-right">
            <div className="text-6xl">🎯</div>
            <span className={`text-xs px-2 py-1 rounded ${dbStatus==='connected'?'bg-emerald-500/20 text-emerald-400':'bg-amber-500/20 text-amber-400'}`}>
              {dbStatus==='connected'?'● Live':'○ Demo Mode'}
            </span>
          </div>
        </div>
      </div>
      <div className="grid grid-cols-4 gap-4">
        {[
          {l:'Pipeline Value',v:fmt(total),c:'text-emerald-400'},
          {l:'Active Pursuits',v:opps.length,c:'text-cyan-400'},
          {l:'Avg Win Prob',v:`${avgPwin}%`,c:'text-amber-400'},
          {l:'Tokens Used',v:tokenUsage.toLocaleString(),c:'text-purple-400'}
        ].map((s,i)=><div key={i} className="glass p-4 hover-lift"><p className="text-slate-400 text-xs">{s.l}</p><p className={`text-2xl font-bold ${s.c}`}>{s.v}</p></div>)}
      </div>
      <div className="glass overflow-hidden">
        <div className="p-4 border-b border-slate-700/50 flex justify-between items-center">
          <h3 className="font-semibold text-white">Active Pipeline</h3>
          <a href="agent-hub.html" target="_blank" className="px-3 py-1.5 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-lg text-sm font-medium hover:opacity-90">🤖 Agent Hub</a>
        </div>
        <table className="w-full">
          <thead className="bg-slate-800/50">
            <tr>{['Opportunity','Agency','Value','Phase','pWin','Days'].map(h=><th key={h} className="text-left p-3 text-xs font-semibold text-slate-400 uppercase">{h}</th>)}</tr>
          </thead>
          <tbody className="divide-y divide-slate-700/50">
            {opps.map(o=>(
              <tr key={o.id} className="hover:bg-slate-800/30">
                <td className="p-3"><div className="font-medium text-white text-sm">{o.nickname}</div><div className="text-xs text-slate-500">{o.title}</div></td>

function ModulePipeline({opps,setOpps,refreshOpps}){
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);
  const[form,setForm]=useState({nickname:'',title:'',agency:'',ceiling:'',phase:'Qualify',pwin:50,days_to_submit:90,naics:'541512',set_aside:'',contract_type:'FFP',priority:'P-1'});
  const[search,setSearch]=useState('');
  const[loading,setLoading]=useState(false);

  const filtered=opps.filter(o=>o.nickname?.toLowerCase().includes(search.toLowerCase())||o.title?.toLowerCase().includes(search.toLowerCase())||o.agency?.toLowerCase().includes(search.toLowerCase()));

  const handleSave=async()=>{
    setLoading(true);
    const data={...form,ceiling:parseFloat(form.ceiling)||0,pwin:parseInt(form.pwin)||50,days_to_submit:parseInt(form.days_to_submit)||90};
    try{
      if(supabase){
        if(editing){
          await supabase.from('opportunities').update(data).eq('id',editing.id);
        }else{
          await supabase.from('opportunities').insert(data);
        }
        await refreshOpps();
      }else{
        if(editing){setOpps(opps.map(o=>o.id===editing.id?{...o,...data}:o))}
        else{setOpps([...opps,{id:Date.now(),...data}])}
      }
      logAudit(editing?'UPDATE_OPP':'CREATE_OPP',{nickname:data.nickname});
      setShowForm(false);setEditing(null);setForm({nickname:'',title:'',agency:'',ceiling:'',phase:'Qualify',pwin:50,days_to_submit:90,naics:'541512',set_aside:'',contract_type:'FFP',priority:'P-1'});
    }catch(e){console.error(e);alert('Error saving opportunity')}

    if(!confirm('Delete this opportunity?'))return;
    try{
      if(supabase){await supabase.from('opportunities').delete().eq('id',id);await refreshOpps()}

      </div>

      <div className="glass overflow-hidden">
        <table className="w-full">

// MODULE: SWIMLANE KANBAN
// ============================================================
function ModuleSwimlane(){
  const[tasks,setTasks]=useState(DEMO_TASKS);
  const[draggedTask,setDraggedTask]=useState(null);
  const phases=['Draft','In Progress','Review','Complete'];
  const statusToPhase={'Draft':'Draft','In Progress':'In Progress','Review':'Review','Complete':'Complete','Not Started':'Draft'};

  const onDragStart=(e,task)=>{setDraggedTask(task);e.dataTransfer.effectAllowed='move'};
  const onDragOver=e=>{e.preventDefault();e.dataTransfer.dropEffect='move'};
  const onDrop=(e,phase)=>{e.preventDefault();if(draggedTask){setTasks(tasks.map(t=>t.id===draggedTask.id?{...t,status:phase}:t));setDraggedTask(null)}};

  return(
    <div className="space-y-4 animate-fadeIn">
      <div><h2 className="text-xl font-bold text-white">Swimlane Board</h2><p className="text-slate-400 text-sm">Drag & drop task management</p></div>
      <div className="grid grid-cols-4 gap-4">
        {phases.map(phase=>(
          <div key={phase} className="glass p-4" onDragOver={onDragOver} onDrop={e=>onDrop(e,phase)}>
            <div className="flex justify-between items-center mb-3"><span className="font-semibold text-white">{phase}</span><span className="text-xs text-slate-400 bg-slate-700 px-2 py-1 rounded">{tasks.filter(t=>(statusToPhase[t.status]||t.status)===phase).length}</span></div>
            <div className="space-y-2 min-h-[200px]">
              {tasks.filter(t=>(statusToPhase[t.status]||t.status)===phase).map(task=>(
                <div key={task.id} draggable onDragStart={e=>onDragStart(e,task)} className="p-3 bg-slate-800/80 rounded-lg border border-slate-700 cursor-move hover:border-cyan-500/50 transition-colors">
                  <div className="font-medium text-white text-sm mb-1">{task.title}</div>
                  <div className="flex justify-between items-center text-xs"><span className="text-slate-400">{task.owner}</span><span className="text-cyan-400">{task.section}</span></div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ModuleCompliance(){
  const[items,setItems]=useState(DEMO_COMPLIANCE);
  const[uploading,setUploading]=useState(false);

  const handleUpload=async(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    setUploading(true);
    setTimeout(()=>{
      setItems([...items,{id:Date.now(),ref:'NEW',title:`Parsed: ${file.name}`,section:'L',status:'pending',owner:'AI Parser',confidence:0}]);
      setUploading(false);
    },2000);
  };

  const toggleStatus=(id)=>{
    const order=['risk','partial','compliant'];
    setItems(items.map(i=>{if(i.id!==id)return i;const idx=order.indexOf(i.status);return{...i,status:order[(idx+1)%3]}}));
  };

  const statusColors={compliant:'bg-emerald-500',partial:'bg-amber-500',risk:'bg-red-500',pending:'bg-slate-500'};
  const statusText={compliant:'Compliant',partial:'Partial',risk:'At Risk',pending:'Pending'};

  return(
    <div className="space-y-4 animate-fadeIn">
      <div className="flex justify-between items-center"><div><h2 className="text-xl font-bold text-white">RFP Shredder</h2><p className="text-slate-400 text-sm">AI-powered compliance matrix</p></div>
        <label className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-lg text-sm font-medium cursor-pointer flex items-center gap-2"><Icon name="upload" className="w-4 h-4"/>{uploading?'Processing...':'Upload RFP'}<input type="file" onChange={handleUpload} className="hidden" accept=".pdf,.docx"/></label>

function ModulePricing(){
  const[lcats,setLcats]=useState(DEMO_LCATS);

  const totalDirect=lcats.reduce((s,l)=>s+(l.rate*l.hours),0);
  const totalWrapped=totalDirect*wrapRate;
  const updateLcat=(id,field,value)=>{setLcats(lcats.map(l=>l.id===id?{...l,[field]:parseFloat(value)||0}:l))};
  const addLcat=()=>{setLcats([...lcats,{id:Date.now(),title:'New LCAT',rate:100,hours:2080,wrap:wrapRate}])};
  const removeLcat=(id)=>{setLcats(lcats.filter(l=>l.id!==id))};
  const exportBOE=()=>{const csv='LCAT,Rate,Hours,Extended,Wrapped\n'+lcats.map(l=>`${l.title},${l.rate},${l.hours},${l.rate*l.hours},${l.rate*l.hours*wrapRate}`).join('\n');const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='boe_pricing.csv';a.click();logAudit('EXPORT_PRICING')};

  return(
    <div className="space-y-4 animate-fadeIn">

        <div className="glass p-4"><p className="text-slate-400 text-xs">Wrap Rate</p><input type="number" step="0.01" value={wrapRate} onChange={e=>setWrapRate(parseFloat(e.target.value)||1)} className="text-2xl font-bold text-white bg-transparent w-full focus:outline-none"/></div>
        <div className="glass p-4"><p className="text-slate-400 text-xs">Total Proposed</p><p className="text-2xl font-bold text-emerald-400">{fmt(totalWrapped)}</p></div>
        <div className="glass p-4 flex items-center justify-center gap-2"><button onClick={addLcat} className="px-3 py-2 bg-cyan-500 text-white rounded-lg text-sm flex items-center gap-1"><Icon name="plus" className="w-4 h-4"/>Add</button><button onClick={exportBOE} className="px-3 py-2 bg-slate-700 text-white rounded-lg text-sm flex items-center gap-1"><Icon name="download" className="w-4 h-4"/>Export</button></div>
      </div>

        <tbody className="divide-y divide-slate-700/50">{lcats.map(l=>(
          <tr key={l.id} className="hover:bg-slate-800/30">
            <td className="p-3"><input type="text" value={l.title} onChange={e=>updateLcat(l.id,'title',e.target.value)} className="bg-transparent text-white text-sm w-full focus:outline-none border-b border-transparent focus:border-cyan-500"/></td>
            <td className="p-3"><input type="number" value={l.rate} onChange={e=>updateLcat(l.id,'rate',e.target.value)} className="bg-slate-800 text-white text-sm w-20 px-2 py-1 rounded focus:outline-none"/></td>
            <td className="p-3"><input type="number" value={l.hours} onChange={e=>updateLcat(l.id,'hours',e.target.value)} className="bg-slate-800 text-white text-sm w-24 px-2 py-1 rounded focus:outline-none"/></td>
            <td className="p-3 text-sm text-slate-300">{fmt(l.rate*l.hours)}</td>

            <td className="p-3"><button onClick={()=>removeLcat(l.id)} className="p-1 text-slate-500 hover:text-red-400"><Icon name="trash" className="w-4 h-4"/></button></td>
          </tr>

        <tfoot className="bg-slate-800/50"><tr><td className="p-3 font-bold text-white" colSpan="3">TOTAL</td><td className="p-3 font-bold text-white">{fmt(totalDirect)}</td><td className="p-3 font-bold text-emerald-400">{fmt(totalWrapped)}</td><td></td></tr></tfoot></table>
      </div>
      <div className="text-center text-xs text-red-400 py-2">⚠️ CONTROLLED UNCLASSIFIED INFORMATION (CUI) - Handle per NIST 800-171</div>
    </div>
  );
}

function ModuleOrals(){
  const[generating,setGenerating]=useState(false);
  const[slides,setSlides]=useState([]);
  const[current,setCurrent]=useState(0);
  const[timer,setTimer]=useState(0);
  const[practicing,setPracticing]=useState(false);

  const generateDeck=()=>{
    setGenerating(true);setSlides([]);let i=0;
    const interval=setInterval(()=>{
      if(i<ORALS_SLIDES.length){setSlides(prev=>[...prev,{id:i+1,title:ORALS_SLIDES[i],bullets:['Key point 1','Key point 2','Key point 3'],talkingPoints:['Emphasize value','Reference past performance','Address concerns']}]);i++}
      else{clearInterval(interval);setGenerating(false)}
    },400);
  };

  useEffect(()=>{let interval;if(practicing){interval=setInterval(()=>setTimer(t=>t+1),1000)}return()=>clearInterval(interval)},[practicing]);
  const formatTime=(s)=>`${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;

  return(
    <div className="space-y-4 animate-fadeIn">
      <div className="flex justify-between items-center"><div><h2 className="text-xl font-bold text-white">Orals Studio</h2><p className="text-slate-400 text-sm">AI-powered presentation generator</p></div>
        {slides.length===0&&!generating&&<button onClick={generateDeck} className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-lg font-medium">🎤 Generate 10-Slide Deck</button>}
        {slides.length>0&&<div className="flex gap-2"><button onClick={()=>{setPracticing(!practicing);if(practicing)setTimer(0)}} className={`px-4 py-2 rounded-lg font-medium ${practicing?'bg-red-500 text-white':'bg-emerald-500 text-white'}`}>{practicing?'⏹ Stop':'▶️ Practice'}</button></div>}
      </div>
      {generating&&<div className="glass p-8 text-center"><div className="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"/><p className="text-white">Generating slides... {slides.length}/{ORALS_SLIDES.length}</p></div>}

            <div className="grid grid-cols-2 gap-4"><div className="p-3 bg-slate-800/50 rounded-lg"><p className="text-xs text-slate-400">This Month</p><p className="text-lg font-bold text-white">{tokenUsage.toLocaleString()}</p></div><div className="p-3 bg-slate-800/50 rounded-lg"><p className="text-xs text-slate-400">Est. Cost</p><p className="text-lg font-bold text-emerald-400">${((tokenUsage/1000)*0.003).toFixed(2)}</p></div></div>
          </div>
        </div>
        <div className="glass p-6">
          <h3 className="font-semibold text-white mb-4">⚙️ System Settings</h3>
          <div className="space-y-3">{[{l:'RBAC Enforcement',v:true},{l:'CUI Watermarking',v:true},{l:'Partner Auto-Revoke',v:true},{l:'Audit Logging',v:true}].map((s,i)=><div key={i} className="flex items-center justify-between p-2 bg-slate-800/50 rounded-lg"><span className="text-sm text-white">{s.l}</span><div className={`w-10 h-6 rounded-full p-1 cursor-pointer ${s.v?'bg-emerald-500':'bg-slate-600'}`}><div className={`w-4 h-4 bg-white rounded-full transition-transform ${s.v?'translate-x-4':''}`}/></div></div>)}</div>
        </div>
      </div>
      <div className="glass p-6">
        <h3 className="font-semibold text-white mb-4">👥 User Management</h3>
        <div className="grid grid-cols-3 gap-3">{ROLES.slice(0,6).map(r=><div key={r.id} className="p-3 bg-slate-800/50 rounded-lg flex items-center gap-3"><span className="text-xl">{r.icon}</span><div><p className="text-sm text-white">{r.fullName}</p><p className="text-xs text-slate-400">{r.name}</p></div></div>)}</div>
      </div>
    </div>
  );
}

    {id:3,title:'CMMC Compliance Basics',progress:30,duration:'3h'},

  ];
  return(
    <div className="space-y-4 animate-fadeIn">
      <div><h2 className="text-xl font-bold text-white">Training Hub</h2><p className="text-slate-400 text-sm">Team onboarding & skill development</p></div>
      <div className="grid grid-cols-2 gap-4">
        {courses.map(c=>(
          <div key={c.id} className="glass p-4 hover-lift">
            <div className="flex justify-between items-start mb-3"><h3 className="font-semibold text-white">{c.title}</h3><span className="text-xs text-slate-400">{c.duration}</span></div>
            <div className="flex items-center gap-2"><div className="flex-1 h-2 bg-slate-700 rounded-full"><div className={`h-full rounded-full ${c.progress===100?'bg-emerald-500':'bg-cyan-500'}`} style={{width:`${c.progress}%`}}/></div><span className="text-xs text-slate-300">{c.progress}%</span></div>

// ============================================================
// AI CHAT WIDGET
// ============================================================
function AIChatWidget(){
  const[open,setOpen]=useState(false);
  const[messages,setMessages]=useState([{role:'assistant',content:'Hello! I\'m your MissionPulse AI assistant. How can I help?'}]);
  const[input,setInput]=useState('');
  const[loading,setLoading]=useState(false);

  const send=()=>{
    if(!input.trim()||loading)return;
    setMessages(m=>[...m,{role:'user',content:input}]);setInput('');setLoading(true);
    setTimeout(()=>{setMessages(m=>[...m,{role:'assistant',content:`Great question about "${input}". Based on Shipley methodology, I recommend focusing on compliance first, then win themes. Would you like me to elaborate?`}]);setLoading(false)},1000);
  };

  if(!open)return<button onClick={()=>setOpen(true)} className="fixed bottom-10 right-4 w-14 h-14 bg-gradient-to-r from-cyan-500 to-teal-500 rounded-full shadow-lg flex items-center justify-center text-2xl hover:scale-105 transition z-50">🤖</button>;

  return(
    <div className="fixed bottom-10 right-4 w-96 h-[500px] glass shadow-2xl flex flex-col z-50 animate-fadeIn">
      <div className="p-3 border-b border-slate-700/50 flex justify-between items-center"><span className="font-semibold text-white flex items-center gap-2">🤖 AI Assistant</span><button onClick={()=>setOpen(false)} className="p-1 text-slate-400 hover:text-white"><Icon name="x" className="w-5 h-5"/></button></div>
      <div className="flex-1 overflow-y-auto p-3 space-y-3">{messages.map((m,i)=><div key={i} className={`flex ${m.role==='user'?'justify-end':'justify-start'}`}><div className={`max-w-[85%] p-3 rounded-xl text-sm ${m.role==='user'?'bg-cyan-500 text-white':'bg-slate-700 text-slate-200'}`}>{m.content}</div></div>)}{loading&&<div className="flex justify-start"><div className="bg-slate-700 p-3 rounded-xl"><div className="flex gap-1">{[0,1,2].map(i=><div key={i} className="w-2 h-2 bg-slate-400 rounded-full animate-pulse" style={{animationDelay:`${i*0.2}s`}}/>)}</div></div></div>}</div>
      <div className="p-3 border-t border-slate-700/50 flex gap-2"><input value={input} onChange={e=>setInput(e.target.value)} onKeyPress={e=>e.key==='Enter'&&send()} placeholder="Ask anything..." className="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-cyan-500"/><button onClick={send} disabled={!input.trim()||loading} className="p-2 bg-cyan-500 rounded-lg text-white disabled:opacity-50"><Icon name="send" className="w-5 h-5"/></button></div>
    </div>
  );
}

// ============================================================
// SIDEBAR
// ============================================================
function Sidebar({role,setRole,active,setActive,user}){
  const[collapsed,setCollapsed]=useState(false);
  const[showRoles,setShowRoles]=useState(false);
  const accessible=MODULES.filter(m=>role.access.includes(m.id));

  return(
    <aside className={`h-screen bg-slate-900/95 border-r border-slate-800 flex flex-col transition-all ${collapsed?'w-16':'w-64'}`}>
      <div className="p-4 border-b border-slate-800 flex items-center justify-between">
        {!collapsed&&<div className="flex items-center gap-2"><div className="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-500 to-teal-400 flex items-center justify-center text-white font-bold">MP</div><div><div className="text-sm font-bold text-white">MissionPulse</div><div className="text-[10px] text-slate-500">v12 Production</div></div></div>}
        <button onClick={()=>setCollapsed(!collapsed)} className="p-1 text-slate-400 hover:text-white"><Icon name={collapsed?'chevronRight':'chevronLeft'} className="w-4 h-4"/></button>
      </div>

      <div className="p-3 border-b border-slate-800">
        <button onClick={()=>setShowRoles(!showRoles)} className="w-full flex items-center gap-2 p-2 rounded-lg hover:bg-slate-800"><span className="text-xl">{role.icon}</span>{!collapsed&&<><div className="flex-1 text-left"><div className="text-sm font-medium text-white">{role.fullName}</div><div className="text-xs text-slate-400">{role.name}</div></div><Icon name="chevronDown" className={`w-4 h-4 text-slate-400 transition ${showRoles?'rotate-180':''}`}/></>}</button>
        {showRoles&&!collapsed&&<div className="mt-2 p-2 bg-slate-800/50 rounded-lg max-h-48 overflow-y-auto">{ROLES.map(r=><button key={r.id} onClick={()=>{setRole(r);setShowRoles(false)}} className={`w-full flex items-center gap-2 p-2 rounded hover:bg-slate-700 ${role.id===r.id?'bg-cyan-500/20':''}`}><span>{r.icon}</span><span className="text-sm text-white">{r.name}</span></button>)}</div>}
      </div>

      <nav className="flex-1 overflow-y-auto p-2">
        {['Command','Strategy','Intel','Delivery','Admin'].map(cat=>{
          const mods=accessible.filter(m=>m.cat===cat);
          if(!mods.length)return null;
          return(<div key={cat} className="mb-3">{!collapsed&&<div className="text-[10px] uppercase text-slate-500 font-semibold px-2 mb-1">{cat}</div>}{mods.map(m=><button key={m.id} onClick={()=>setActive(m)} className={`w-full flex items-center gap-2 p-2 rounded-lg mb-0.5 transition ${active?.id===m.id?'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30':'text-slate-400 hover:bg-slate-800 hover:text-white'}`} title={collapsed?m.name:''}><span>{m.icon}</span>{!collapsed&&<><span className="flex-1 text-left text-sm">{m.name}</span>{m.badge&&<span className={`px-1 py-0.5 text-[9px] font-bold rounded ${m.badge==='PRIVATE'?'bg-amber-500/20 text-amber-400':m.badge==='CUI'?'bg-red-500/20 text-red-400':'bg-purple-500/20 text-purple-400'}`}>{m.badge}</span>}</>}</button>)}</div>);
        })}
      </nav>

      {!collapsed&&user&&<div className="p-3 border-t border-slate-800"><div className="flex items-center justify-between"><div className="flex items-center gap-2"><div className="w-8 h-8 rounded-full bg-gradient-to-br from-cyan-500 to-teal-400 flex items-center justify-center text-white text-xs font-bold">{user.name?.[0]||'U'}</div><div className="text-xs text-white truncate max-w-[120px]">{user.name||user.email}</div></div><button onClick={handleLogout} className="p-1.5 rounded hover:bg-red-500/20 text-slate-400 hover:text-red-400"><Icon name="logout" className="w-4 h-4"/></button></div></div>}
    </aside>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App(){
  const[user,setUser]=useState(null);
  const[role,setRole]=useState(ROLES[0]);
  const[active,setActive]=useState(null);
  const[opps,setOpps]=useState(DEMO_OPPS);
  const[tokenUsage,setTokenUsage]=useState(45230);
  const[dbStatus,setDbStatus]=useState('checking');

  // Load opportunities from Supabase
  const loadOpps=async()=>{
    if(!supabase){setDbStatus('offline');return}
    try{
      const{data,error}=await supabase.from('opportunities').select('*').order('created_at',{ascending:false});
      if(error)throw error;
      if(data&&data.length>0){setOpps(data);setDbStatus('connected')}
      else{setDbStatus('connected')}
    }catch(e){console.warn('Supabase fetch failed, using demo data:',e);setDbStatus('offline')}
  };

  useEffect(()=>{
    const u=checkAuth();
    if(u){setUser(u);loadOpps()}
  },[]);

  const renderModule=()=>{
    if(!active)return<div className="flex-1 flex items-center justify-center"><div className="text-center"><div className="text-6xl mb-4">🛡️</div><h2 className="text-xl font-bold text-white mb-2">Welcome to MissionPulse</h2><p className="text-slate-400">Select a module from the sidebar to begin</p></div></div>;
    switch(active.id){
      case 'dashboard':return<ModuleDashboard opps={opps} tokenUsage={tokenUsage} dbStatus={dbStatus}/>;
      case 'pipeline':return<ModulePipeline opps={opps} setOpps={setOpps} refreshOpps={loadOpps}/>;
      case 'warroom':return<ModuleWarRoom opps={opps}/>;
      case 'swimlane':return<ModuleSwimlane/>;
      case 'winthemes':return<ModuleWinThemes opps={opps}/>;
      case 'compliance':return<ModuleCompliance/>;
      case 'contracts':return<ModuleContracts/>;
      case 'writer':return<ModuleIronDome/>;
      case 'blackhat':return<ModuleBlackHat/>;
      case 'pricing':return<ModulePricing/>;
      case 'hitl':return<ModuleHITL/>;
      case 'orals':return<ModuleOrals/>;
      case 'frenemy':return<ModuleFrenemy/>;
      case 'teaming':return<ModuleTeaming/>;
      case 'launch':return<ModuleLaunch opps={opps}/>;
      case 'post_award':return<ModulePostAward/>;
      case 'lessons':return<ModuleLessons/>;
      case 'playbook':return<ModulePlaybook/>;
      case 'reports':return<ModuleReports opps={opps}/>;
      case 'admin':return<ModuleAdmin tokenUsage={tokenUsage} setTokenUsage={setTokenUsage}/>;
      case 'training':return<ModuleTraining/>;
      case 'audit':return<ModuleAudit/>;
      case 'settings':return<ModuleSettings/>;
      default:return<div className="glass p-12 text-center animate-fadeIn"><div className="text-6xl mb-4">{active.icon}</div><h2 className="text-xl font-bold text-white mb-2">{active.name}</h2><p className="text-slate-400">{active.cat} module</p></div>;
    }
  };

  if(!user)return<div className="h-screen flex items-center justify-center bg-[#00050F]"><div className="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"/></div>;

  return(
    <div className="h-screen flex bg-[#00050F] overflow-hidden">
      <Sidebar role={role} setRole={setRole} active={active} setActive={setActive} user={user}/>
      <div className="flex-1 flex flex-col overflow-hidden">
        {active&&<header className="bg-slate-900/90 border-b border-slate-800 px-6 py-3"><div className="flex items-center gap-3"><span className="text-xl">{active.icon}</span><div><h1 className="font-semibold text-white">{active.name}</h1></div>{active.badge&&<span className={`px-2 py-0.5 rounded text-xs font-bold ${active.badge==='PRIVATE'?'bg-amber-500/20 text-amber-400':active.badge==='CUI'?'bg-red-500/20 text-red-400':'bg-purple-500/20 text-purple-400'}`}>{active.badge}</span>}<span className={`ml-auto text-xs px-2 py-1 rounded ${dbStatus==='connected'?'bg-emerald-500/20 text-emerald-400':'bg-amber-500/20 text-amber-400'}`}>{dbStatus==='connected'?'● Live':'○ Demo'}</span></div></header>}
        <main className="flex-1 overflow-y-auto p-6">{renderModule()}</main>
      </div>
      <div className="fixed bottom-0 left-0 right-0 h-6 bg-slate-900/95 border-t border-slate-800 flex items-center justify-center z-40"><span className="text-[10px] text-slate-500">AI GENERATED - REQUIRES HUMAN REVIEW • MissionPulse v12 Production • © 2026 Mission Meets Tech</span></div>
      <AIChatWidget/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
