<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Templates Library | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
    .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
    .cyan-glow { box-shadow: 0 0 30px rgba(0,229,250,0.15); }
  </style>
</head>
<body class="text-white">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    
    const supabaseUrl = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc4NTU0NjIsImV4cCI6MjA1MzQzMTQ2Mn0.Xj4_wfgnHdegN2jBcMh1cTBfvZhQxuF8FPxcE-krcHY';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const DEMO_TEMPLATES = [
      { id: '1', template_name: 'Key Personnel Resume', template_type: 'Resume', category: 'Proposal', description: 'Standard resume format for key personnel submissions', version: '2.1', is_active: true, tags: ['resume', 'personnel', 'staffing'], updated_at: '2026-01-28' },
      { id: '2', template_name: 'Past Performance Narrative', template_type: 'Past Performance', category: 'Proposal', description: 'Template for describing relevant contract experience', version: '1.5', is_active: true, tags: ['past performance', 'experience'], updated_at: '2026-01-25' },
      { id: '3', template_name: 'Technical Approach Section', template_type: 'Technical Section', category: 'Proposal', description: 'Boilerplate technical approach with placeholders', version: '3.0', is_active: true, tags: ['technical', 'approach', 'solution'], updated_at: '2026-01-30' },
      { id: '4', template_name: 'Management Plan', template_type: 'Management', category: 'Proposal', description: 'Standard management approach and org chart template', version: '2.0', is_active: true, tags: ['management', 'organization'], updated_at: '2026-01-22' },
      { id: '5', template_name: 'Transition Plan', template_type: 'Transition', category: 'Proposal', description: 'Phase-in/phase-out transition planning template', version: '1.2', is_active: true, tags: ['transition', 'phase-in'], updated_at: '2026-01-20' },
      { id: '6', template_name: 'Quality Control Plan', template_type: 'QCP', category: 'Proposal', description: 'Quality assurance and control procedures', version: '1.8', is_active: true, tags: ['quality', 'QA', 'QC'], updated_at: '2026-01-18' },
      { id: '7', template_name: 'Staffing Plan Matrix', template_type: 'Staffing', category: 'Proposal', description: 'Labor category and FTE allocation template', version: '2.2', is_active: true, tags: ['staffing', 'labor', 'FTE'], updated_at: '2026-01-15' },
      { id: '8', template_name: 'Organizational Conflict of Interest', template_type: 'OCI', category: 'Compliance', description: 'OCI disclosure and mitigation statement', version: '1.0', is_active: true, tags: ['OCI', 'compliance', 'conflict'], updated_at: '2026-01-10' },
      { id: '9', template_name: 'Small Business Subcontracting Plan', template_type: 'SBSP', category: 'Compliance', description: 'Template for small business participation goals', version: '1.3', is_active: true, tags: ['small business', 'subcontracting'], updated_at: '2026-01-08' },
      { id: '10', template_name: 'Cybersecurity Plan', template_type: 'Security', category: 'Compliance', description: 'CMMC/NIST 800-171 compliance documentation', version: '2.0', is_active: false, tags: ['cybersecurity', 'CMMC', 'NIST'], updated_at: '2025-12-15' },
    ];

    const CATEGORIES = ['All', 'Proposal', 'Compliance', 'Corporate', 'HR'];
    const TYPES = ['All', 'Resume', 'Past Performance', 'Technical Section', 'Management', 'Transition', 'QCP', 'Staffing', 'OCI', 'SBSP', 'Security'];

    function TemplatesLibrary() {
      const [templates, setTemplates] = useState([]);
      const [loading, setLoading] = useState(true);
      const [searchTerm, setSearchTerm] = useState('');
      const [categoryFilter, setCategoryFilter] = useState('All');
      const [typeFilter, setTypeFilter] = useState('All');
      const [showModal, setShowModal] = useState(false);
      const [selectedTemplate, setSelectedTemplate] = useState(null);

      useEffect(() => {
        loadTemplates();
      }, []);

      async function loadTemplates() {
        try {
          const { data, error } = await supabase.from('document_templates').select('*').order('updated_at', { ascending: false });
          if (error) throw error;
          setTemplates(data?.length ? data : DEMO_TEMPLATES);
        } catch (err) {
          console.log('Using demo data:', err.message);
          setTemplates(DEMO_TEMPLATES);
        } finally {
          setLoading(false);
        }
      }

      const filteredTemplates = templates.filter(t => {
        const matchesSearch = t.template_name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                              t.description?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                              t.tags?.some(tag => tag.toLowerCase().includes(searchTerm.toLowerCase()));
        const matchesCategory = categoryFilter === 'All' || t.category === categoryFilter;
        const matchesType = typeFilter === 'All' || t.template_type === typeFilter;
        return matchesSearch && matchesCategory && matchesType;
      });

      const stats = {
        total: templates.length,
        active: templates.filter(t => t.is_active).length,
        proposal: templates.filter(t => t.category === 'Proposal').length,
        compliance: templates.filter(t => t.category === 'Compliance').length,
      };

      const getTypeColor = (type) => {
        const colors = {
          'Resume': 'bg-blue-500/20 text-blue-400',
          'Past Performance': 'bg-green-500/20 text-green-400',
          'Technical Section': 'bg-purple-500/20 text-purple-400',
          'Management': 'bg-yellow-500/20 text-yellow-400',
          'Transition': 'bg-orange-500/20 text-orange-400',
          'QCP': 'bg-pink-500/20 text-pink-400',
          'Staffing': 'bg-cyan-500/20 text-cyan-400',
          'OCI': 'bg-red-500/20 text-red-400',
          'SBSP': 'bg-emerald-500/20 text-emerald-400',
          'Security': 'bg-rose-500/20 text-rose-400',
        };
        return colors[type] || 'bg-gray-500/20 text-gray-400';
      };

      return (
        <div className="min-h-screen p-6">
          {/* Header */}
          <div className="flex items-center justify-between mb-8">
            <div className="flex items-center space-x-4">
              <a href="index.html" className="text-gray-400 hover:text-cyan-400 transition">← Back</a>
              <div>
                <h1 className="text-3xl font-bold text-white">Document Templates Library</h1>
                <p className="text-gray-400">Reusable templates for proposals and compliance</p>
              </div>
            </div>
            <button onClick={() => { setSelectedTemplate(null); setShowModal(true); }} className="px-6 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-xl font-semibold hover:opacity-90 transition">
              + New Template
            </button>
          </div>

          {/* Stats */}
          <div className="grid grid-cols-4 gap-4 mb-8">
            {[
              { label: 'Total Templates', value: stats.total, icon: '📄', color: 'cyan' },
              { label: 'Active', value: stats.active, icon: '✅', color: 'green' },
              { label: 'Proposal', value: stats.proposal, icon: '📋', color: 'blue' },
              { label: 'Compliance', value: stats.compliance, icon: '🛡️', color: 'purple' },
            ].map((stat, i) => (
              <div key={i} className="glass-card rounded-xl p-5">
                <div className="flex items-center justify-between">
                  <div>
                    <div className={`text-3xl font-bold text-${stat.color}-400`}>{stat.value}</div>
                    <div className="text-gray-400 text-sm mt-1">{stat.label}</div>
                  </div>
                  <div className="text-3xl">{stat.icon}</div>
                </div>
              </div>
            ))}
          </div>

          {/* Search and Filters */}
          <div className="glass-card rounded-xl p-4 mb-6">
            <div className="flex flex-wrap gap-4">
              <div className="flex-1 min-w-64">
                <input 
                  type="text" 
                  placeholder="Search templates..." 
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                  className="w-full p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white placeholder-gray-500"
                />
              </div>
              <select 
                value={categoryFilter} 
                onChange={(e) => setCategoryFilter(e.target.value)}
                className="p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white"
              >
                {CATEGORIES.map(c => <option key={c} value={c}>{c === 'All' ? 'All Categories' : c}</option>)}
              </select>
              <select 
                value={typeFilter} 
                onChange={(e) => setTypeFilter(e.target.value)}
                className="p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white"
              >
                {TYPES.map(t => <option key={t} value={t}>{t === 'All' ? 'All Types' : t}</option>)}
              </select>
            </div>
          </div>

          {/* Templates Grid */}
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {loading ? (
              <div className="col-span-3 text-center py-12 text-gray-400">Loading...</div>
            ) : filteredTemplates.length === 0 ? (
              <div className="col-span-3 text-center py-12 text-gray-400">No templates found</div>
            ) : filteredTemplates.map((template) => (
              <div 
                key={template.id} 
                className={`glass-card rounded-xl p-5 hover:border-cyan-500/30 transition cursor-pointer ${!template.is_active ? 'opacity-60' : ''}`}
                onClick={() => { setSelectedTemplate(template); setShowModal(true); }}
              >
                <div className="flex items-start justify-between mb-3">
                  <span className={`px-3 py-1 rounded-full text-xs font-medium ${getTypeColor(template.template_type)}`}>
                    {template.template_type}
                  </span>
                  <span className="text-gray-500 text-sm">v{template.version}</span>
                </div>
                
                <h3 className="font-semibold text-lg text-white mb-2">{template.template_name}</h3>
                <p className="text-gray-400 text-sm mb-4 line-clamp-2">{template.description}</p>
                
                <div className="flex flex-wrap gap-1 mb-4">
                  {template.tags?.slice(0, 3).map((tag, i) => (
                    <span key={i} className="px-2 py-0.5 bg-gray-800/50 rounded text-xs text-gray-400">
                      {tag}
                    </span>
                  ))}
                </div>

                <div className="flex items-center justify-between pt-3 border-t border-gray-800">
                  <span className="text-xs text-gray-500">Updated {new Date(template.updated_at).toLocaleDateString()}</span>
                  <div className="flex space-x-2">
                    <button className="text-cyan-400 hover:text-cyan-300 text-sm">Use</button>
                    <button className="text-gray-400 hover:text-gray-300 text-sm">Edit</button>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {/* Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
              <div className="glass-card rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                <div className="p-6 border-b border-gray-800">
                  <div className="flex items-center justify-between">
                    <h2 className="text-xl font-bold">{selectedTemplate ? selectedTemplate.template_name : 'New Template'}</h2>
                    <button onClick={() => setShowModal(false)} className="text-gray-400 hover:text-white text-2xl">&times;</button>
                  </div>
                </div>
                <div className="p-6 space-y-4">
                  {selectedTemplate ? (
                    <>
                      <div className="flex items-center space-x-3 mb-4">
                        <span className={`px-3 py-1 rounded-full text-sm font-medium ${getTypeColor(selectedTemplate.template_type)}`}>
                          {selectedTemplate.template_type}
                        </span>
                        <span className="text-gray-400">v{selectedTemplate.version}</span>
                        {selectedTemplate.is_active ? (
                          <span className="px-2 py-1 bg-green-500/20 text-green-400 rounded text-xs">Active</span>
                        ) : (
                          <span className="px-2 py-1 bg-gray-500/20 text-gray-400 rounded text-xs">Inactive</span>
                        )}
                      </div>
                      <div>
                        <label className="text-gray-400 text-sm">Description</label>
                        <p className="text-white mt-1">{selectedTemplate.description}</p>
                      </div>
                      <div>
                        <label className="text-gray-400 text-sm">Tags</label>
                        <div className="flex flex-wrap gap-2 mt-2">
                          {selectedTemplate.tags?.map((tag, i) => (
                            <span key={i} className="px-3 py-1 bg-gray-800/50 rounded-lg text-sm text-gray-300">{tag}</span>
                          ))}
                        </div>
                      </div>
                      <div className="flex space-x-3 pt-4">
                        <button className="flex-1 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-xl font-semibold hover:opacity-90 transition">
                          Use Template
                        </button>
                        <button className="px-6 py-3 bg-gray-700/50 text-gray-300 rounded-xl font-semibold hover:bg-gray-600/50 transition">
                          Download
                        </button>
                        <button className="px-6 py-3 bg-gray-700/50 text-gray-300 rounded-xl font-semibold hover:bg-gray-600/50 transition">
                          Edit
                        </button>
                      </div>
                    </>
                  ) : (
                    <div className="space-y-4">
                      <input type="text" placeholder="Template Name" className="w-full p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white" />
                      <div className="grid grid-cols-2 gap-4">
                        <select className="p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white">
                          <option>Select Type</option>
                          {TYPES.filter(t => t !== 'All').map(t => <option key={t}>{t}</option>)}
                        </select>
                        <select className="p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white">
                          <option>Select Category</option>
                          {CATEGORIES.filter(c => c !== 'All').map(c => <option key={c}>{c}</option>)}
                        </select>
                      </div>
                      <textarea placeholder="Description" className="w-full p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white" rows="3"></textarea>
                      <input type="text" placeholder="Tags (comma separated)" className="w-full p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white" />
                      <div className="border-2 border-dashed border-gray-700 rounded-xl p-8 text-center">
                        <p className="text-gray-400">Drag & drop template file or click to upload</p>
                        <p className="text-gray-500 text-sm mt-1">.docx, .pdf, .xlsx accepted</p>
                      </div>
                      <button className="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-xl font-semibold hover:opacity-90 transition">
                        Create Template
                      </button>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<TemplatesLibrary />, document.getElementById('root'));
  </script>
</body>
</html>
