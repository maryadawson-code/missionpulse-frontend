<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Contract Deliverables Tracker</title>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; color: #fff; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-slideUp { animation: slideUp 0.5s ease-out forwards; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #111C2E; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #243656; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #00E5FA; }
    .glass-card {
      background: rgba(17, 28, 46, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Supabase Config
    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc4MzUyMjQsImV4cCI6MjA1MzQxMTIyNH0.pBPL9l2zL7LLd_A5I--hPBzw5YwG3ajPMtbYsqsxIgQ';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Icons
    const Icons = {
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>,
      document: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>,
      plus: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>,
      calendar: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>,
      clock: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6l4 2"/></svg>,
      alert: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>,
      search: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" strokeWidth={2}/><path strokeLinecap="round" strokeWidth={2} d="M21 21l-4.35-4.35"/></svg>,
      filter: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>,
      x: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>,
      upload: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>,
      user: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>,
      refresh: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    // Status configurations
    const STATUS_CONFIG = {
      not_started: { label: 'Not Started', color: '#6B7280', bg: '#6B728020' },
      in_progress: { label: 'In Progress', color: '#3B82F6', bg: '#3B82F620' },
      in_review: { label: 'In Review', color: '#8B5CF6', bg: '#8B5CF620' },
      submitted: { label: 'Submitted', color: '#F59E0B', bg: '#F59E0B20' },
      accepted: { label: 'Accepted', color: '#00D29F', bg: '#00D29F20' },
      rejected: { label: 'Rejected', color: '#EF4444', bg: '#EF444420' },
      overdue: { label: 'Overdue', color: '#DC2626', bg: '#DC262620' },
    };

    const PRIORITY_CONFIG = {
      critical: { label: 'Critical', color: '#EF4444' },
      high: { label: 'High', color: '#F59E0B' },
      medium: { label: 'Medium', color: '#3B82F6' },
      low: { label: 'Low', color: '#6B7280' },
    };

    const DELIVERABLE_TYPES = [
      { key: 'cdrl', name: 'CDRL' },
      { key: 'clin', name: 'CLIN' },
      { key: 'data_item', name: 'Data Item' },
      { key: 'report', name: 'Report' },
      { key: 'software', name: 'Software' },
      { key: 'hardware', name: 'Hardware' },
      { key: 'documentation', name: 'Documentation' },
      { key: 'other', name: 'Other' },
    ];

    const FREQUENCIES = [
      { key: 'one_time', name: 'One Time' },
      { key: 'daily', name: 'Daily' },
      { key: 'weekly', name: 'Weekly' },
      { key: 'bi_weekly', name: 'Bi-Weekly' },
      { key: 'monthly', name: 'Monthly' },
      { key: 'quarterly', name: 'Quarterly' },
      { key: 'annually', name: 'Annually' },
      { key: 'as_required', name: 'As Required' },
      { key: 'event_driven', name: 'Event Driven' },
    ];

    // Demo Data
    const DEMO_DELIVERABLES = [
      {
        id: 'demo-1',
        cdrl_number: 'A001',
        title: 'Monthly Status Report',
        description: 'Comprehensive monthly status report including progress, issues, and metrics.',
        deliverable_type: 'report',
        frequency: 'monthly',
        due_date: '2025-02-15',
        status: 'in_progress',
        priority: 'high',
        government_poc: 'John Smith',
        data_item_number: 'DI-MGMT-80368',
      },
      {
        id: 'demo-2',
        cdrl_number: 'A002',
        title: 'System Security Plan (SSP)',
        description: 'Complete SSP documentation per NIST 800-53 Rev 5 requirements.',
        deliverable_type: 'documentation',
        frequency: 'one_time',
        due_date: '2025-01-30',
        status: 'overdue',
        priority: 'critical',
        government_poc: 'Jane Doe',
        data_item_number: 'DI-MGMT-81466',
      },
      {
        id: 'demo-3',
        cdrl_number: 'A003',
        title: 'Software Release Package',
        description: 'Production release including binaries, documentation, and release notes.',
        deliverable_type: 'software',
        frequency: 'quarterly',
        due_date: '2025-03-31',
        status: 'not_started',
        priority: 'high',
        government_poc: 'Bob Wilson',
        data_item_number: 'DI-IPSC-81439',
      },
      {
        id: 'demo-4',
        cdrl_number: 'A004',
        title: 'Training Materials',
        description: 'End-user training documentation and video tutorials.',
        deliverable_type: 'documentation',
        frequency: 'one_time',
        due_date: '2025-02-28',
        status: 'in_review',
        priority: 'medium',
        government_poc: 'Sarah Johnson',
        data_item_number: 'DI-SESS-81522',
      },
      {
        id: 'demo-5',
        cdrl_number: 'A005',
        title: 'Test Results Report',
        description: 'Comprehensive test results from UAT and security testing.',
        deliverable_type: 'report',
        frequency: 'event_driven',
        due_date: '2025-02-10',
        status: 'submitted',
        priority: 'high',
        government_poc: 'Mike Brown',
        data_item_number: 'DI-NDTI-80566',
      },
      {
        id: 'demo-6',
        cdrl_number: 'A006',
        title: 'Configuration Management Plan',
        description: 'CM plan including baseline management and change control procedures.',
        deliverable_type: 'documentation',
        frequency: 'one_time',
        due_date: '2025-01-25',
        status: 'accepted',
        priority: 'medium',
        government_poc: 'John Smith',
        data_item_number: 'DI-CMAN-80858',
        accepted_date: '2025-01-23',
      },
    ];

    // Main App
    function DeliverablesApp() {
      const [deliverables, setDeliverables] = useState(DEMO_DELIVERABLES);
      const [loading, setLoading] = useState(true);
      const [searchTerm, setSearchTerm] = useState('');
      const [statusFilter, setStatusFilter] = useState('all');
      const [typeFilter, setTypeFilter] = useState('all');
      const [selectedDeliverable, setSelectedDeliverable] = useState(null);
      const [showAddModal, setShowAddModal] = useState(false);
      const [viewMode, setViewMode] = useState('table');

      useEffect(() => {
        loadDeliverables();
      }, []);

      const loadDeliverables = async () => {
        setLoading(true);
        try {
          const { data, error } = await sbClient
            .from('contract_deliverables')
            .select('*')
            .order('due_date', { ascending: true });

          if (error) throw error;
          if (data && data.length > 0) {
            setDeliverables(data);
          }
        } catch (err) {
          console.log('Using demo data:', err.message);
        } finally {
          setLoading(false);
        }
      };

      const filteredDeliverables = deliverables.filter(d => {
        if (searchTerm && !d.title.toLowerCase().includes(searchTerm.toLowerCase()) &&
            !d.cdrl_number?.toLowerCase().includes(searchTerm.toLowerCase())) {
          return false;
        }
        if (statusFilter !== 'all' && d.status !== statusFilter) return false;
        if (typeFilter !== 'all' && d.deliverable_type !== typeFilter) return false;
        return true;
      });

      const getDaysUntilDue = (dueDate) => {
        if (!dueDate) return null;
        const due = new Date(dueDate);
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const diffTime = due - today;
        return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      };

      const stats = {
        total: deliverables.length,
        overdue: deliverables.filter(d => d.status === 'overdue').length,
        dueSoon: deliverables.filter(d => {
          const days = getDaysUntilDue(d.due_date);
          return days !== null && days >= 0 && days <= 7 && d.status !== 'accepted' && d.status !== 'submitted';
        }).length,
        submitted: deliverables.filter(d => d.status === 'submitted').length,
        accepted: deliverables.filter(d => d.status === 'accepted').length,
      };

      const updateStatus = async (id, newStatus) => {
        setDeliverables(prev => prev.map(d => 
          d.id === id ? { ...d, status: newStatus } : d
        ));

        try {
          await sbClient
            .from('contract_deliverables')
            .update({ status: newStatus })
            .eq('id', id);
        } catch (err) {
          console.log('Status update failed:', err.message);
        }
      };

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* Header */}
          <header className="glass-card border-b border-white/10 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="flex items-center gap-2 text-gray-400 hover:text-white transition-colors">
                    <Icon name="home" className="w-5 h-5" />
                  </a>
                  <div className="w-px h-6 bg-white/20" />
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center">
                      <Icon name="document" className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white">Contract Deliverables</h1>
                      <p className="text-xs text-gray-400">CDRL & Data Item Tracking</p>
                    </div>
                  </div>
                </div>

                <div className="flex items-center gap-3">
                  <button
                    onClick={() => setShowAddModal(true)}
                    className="px-4 py-2 bg-gradient-to-r from-emerald-500 to-teal-600 text-white rounded-lg font-medium hover:opacity-90 transition-opacity flex items-center gap-2"
                  >
                    <Icon name="plus" className="w-4 h-4" />
                    Add Deliverable
                  </button>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8">
            {/* Stats Cards */}
            <div className="grid grid-cols-5 gap-4 mb-8">
              {[
                { label: 'Total CDRLs', value: stats.total, icon: 'document', color: '#00E5FA' },
                { label: 'Overdue', value: stats.overdue, icon: 'alert', color: '#EF4444' },
                { label: 'Due This Week', value: stats.dueSoon, icon: 'clock', color: '#F59E0B' },
                { label: 'Submitted', value: stats.submitted, icon: 'upload', color: '#3B82F6' },
                { label: 'Accepted', value: stats.accepted, icon: 'check', color: '#00D29F' },
              ].map((stat, idx) => (
                <div key={idx} className="glass-card rounded-xl p-4">
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-gray-400 text-sm">{stat.label}</span>
                    <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ background: `${stat.color}20` }}>
                      <Icon name={stat.icon} className="w-4 h-4" style={{ color: stat.color }} />
                    </div>
                  </div>
                  <div className="text-2xl font-bold" style={{ color: stat.value > 0 && (stat.label === 'Overdue') ? stat.color : '#fff' }}>
                    {stat.value}
                  </div>
                </div>
              ))}
            </div>

            {/* Filters */}
            <div className="glass-card rounded-xl p-4 mb-6">
              <div className="flex items-center gap-4 flex-wrap">
                <div className="flex-1 min-w-[300px] relative">
                  <Icon name="search" className="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                  <input
                    type="text"
                    placeholder="Search deliverables..."
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                    className="w-full pl-10 pr-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500"
                  />
                </div>

                <select
                  value={statusFilter}
                  onChange={(e) => setStatusFilter(e.target.value)}
                  className="px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-emerald-500"
                >
                  <option value="all">All Statuses</option>
                  {Object.entries(STATUS_CONFIG).map(([key, config]) => (
                    <option key={key} value={key}>{config.label}</option>
                  ))}
                </select>

                <select
                  value={typeFilter}
                  onChange={(e) => setTypeFilter(e.target.value)}
                  className="px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-emerald-500"
                >
                  <option value="all">All Types</option>
                  {DELIVERABLE_TYPES.map(type => (
                    <option key={type.key} value={type.key}>{type.name}</option>
                  ))}
                </select>

                <button
                  onClick={loadDeliverables}
                  className="px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-gray-400 hover:text-white transition-colors flex items-center gap-2"
                >
                  <Icon name="refresh" className="w-4 h-4" />
                  Refresh
                </button>
              </div>
            </div>

            {/* Deliverables Table */}
            {loading ? (
              <div className="flex items-center justify-center py-20">
                <div className="w-8 h-8 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin" />
              </div>
            ) : (
              <div className="glass-card rounded-xl overflow-hidden">
                <table className="w-full">
                  <thead>
                    <tr className="border-b border-white/10">
                      <th className="text-left px-6 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">CDRL</th>
                      <th className="text-left px-6 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Title</th>
                      <th className="text-left px-6 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Type</th>
                      <th className="text-left px-6 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Due Date</th>
                      <th className="text-left px-6 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Status</th>
                      <th className="text-left px-6 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Priority</th>
                      <th className="text-left px-6 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Gov POC</th>
                      <th className="text-right px-6 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filteredDeliverables.map((deliverable, idx) => {
                      const daysUntil = getDaysUntilDue(deliverable.due_date);
                      const statusConfig = STATUS_CONFIG[deliverable.status] || STATUS_CONFIG.not_started;
                      const priorityConfig = PRIORITY_CONFIG[deliverable.priority] || PRIORITY_CONFIG.medium;
                      const type = DELIVERABLE_TYPES.find(t => t.key === deliverable.deliverable_type);

                      return (
                        <tr 
                          key={deliverable.id}
                          className="border-b border-white/5 hover:bg-white/5 cursor-pointer transition-colors animate-slideUp"
                          style={{ animationDelay: `${idx * 30}ms` }}
                          onClick={() => setSelectedDeliverable(deliverable)}
                        >
                          <td className="px-6 py-4">
                            <span className="font-mono text-cyan-400 font-medium">{deliverable.cdrl_number}</span>
                          </td>
                          <td className="px-6 py-4">
                            <div className="font-medium text-white">{deliverable.title}</div>
                            {deliverable.data_item_number && (
                              <div className="text-xs text-gray-500">{deliverable.data_item_number}</div>
                            )}
                          </td>
                          <td className="px-6 py-4 text-gray-400">{type?.name || deliverable.deliverable_type}</td>
                          <td className="px-6 py-4">
                            <div className="flex items-center gap-2">
                              <span className="text-white">{deliverable.due_date}</span>
                              {daysUntil !== null && daysUntil <= 7 && daysUntil >= 0 && deliverable.status !== 'accepted' && (
                                <span className={`text-xs px-2 py-0.5 rounded-full ${daysUntil <= 3 ? 'bg-red-500/20 text-red-400' : 'bg-amber-500/20 text-amber-400'}`}>
                                  {daysUntil === 0 ? 'Today' : `${daysUntil}d`}
                                </span>
                              )}
                            </div>
                          </td>
                          <td className="px-6 py-4">
                            <span 
                              className="px-3 py-1 rounded-full text-xs font-medium"
                              style={{ background: statusConfig.bg, color: statusConfig.color }}
                            >
                              {statusConfig.label}
                            </span>
                          </td>
                          <td className="px-6 py-4">
                            <span className="flex items-center gap-2">
                              <span className="w-2 h-2 rounded-full" style={{ background: priorityConfig.color }} />
                              <span style={{ color: priorityConfig.color }}>{priorityConfig.label}</span>
                            </span>
                          </td>
                          <td className="px-6 py-4 text-gray-400">{deliverable.government_poc || '-'}</td>
                          <td className="px-6 py-4 text-right">
                            <div className="flex items-center justify-end gap-2" onClick={e => e.stopPropagation()}>
                              {deliverable.status !== 'accepted' && deliverable.status !== 'submitted' && (
                                <button
                                  onClick={() => updateStatus(deliverable.id, 'submitted')}
                                  className="px-3 py-1.5 bg-blue-500/20 text-blue-400 rounded-lg text-xs hover:bg-blue-500/30 transition-colors"
                                >
                                  Submit
                                </button>
                              )}
                              {deliverable.status === 'submitted' && (
                                <button
                                  onClick={() => updateStatus(deliverable.id, 'accepted')}
                                  className="px-3 py-1.5 bg-emerald-500/20 text-emerald-400 rounded-lg text-xs hover:bg-emerald-500/30 transition-colors"
                                >
                                  Accept
                                </button>
                              )}
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>

                {filteredDeliverables.length === 0 && (
                  <div className="text-center py-16">
                    <Icon name="document" className="w-12 h-12 text-gray-600 mx-auto mb-3" />
                    <p className="text-gray-400">No deliverables found</p>
                  </div>
                )}
              </div>
            )}
          </main>

          {/* Detail Modal */}
          {selectedDeliverable && (
            <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setSelectedDeliverable(null)}>
              <div className="glass-card rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                <div className="p-6 border-b border-white/10">
                  <div className="flex items-start justify-between">
                    <div>
                      <span className="text-sm text-cyan-400 font-mono">{selectedDeliverable.cdrl_number}</span>
                      <h2 className="text-xl font-bold text-white mt-1">{selectedDeliverable.title}</h2>
                    </div>
                    <button onClick={() => setSelectedDeliverable(null)} className="p-2 text-gray-400 hover:text-white">
                      <Icon name="x" className="w-5 h-5" />
                    </button>
                  </div>
                </div>

                <div className="p-6 space-y-6">
                  <div>
                    <h4 className="text-sm font-medium text-gray-400 mb-2">Description</h4>
                    <p className="text-white">{selectedDeliverable.description || 'No description provided.'}</p>
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div className="bg-[#0A1628] rounded-lg p-4">
                      <span className="text-xs text-gray-500">Data Item Number</span>
                      <p className="text-white font-medium">{selectedDeliverable.data_item_number || 'N/A'}</p>
                    </div>
                    <div className="bg-[#0A1628] rounded-lg p-4">
                      <span className="text-xs text-gray-500">Type</span>
                      <p className="text-white font-medium">
                        {DELIVERABLE_TYPES.find(t => t.key === selectedDeliverable.deliverable_type)?.name}
                      </p>
                    </div>
                    <div className="bg-[#0A1628] rounded-lg p-4">
                      <span className="text-xs text-gray-500">Frequency</span>
                      <p className="text-white font-medium">
                        {FREQUENCIES.find(f => f.key === selectedDeliverable.frequency)?.name}
                      </p>
                    </div>
                    <div className="bg-[#0A1628] rounded-lg p-4">
                      <span className="text-xs text-gray-500">Government POC</span>
                      <p className="text-white font-medium">{selectedDeliverable.government_poc || 'N/A'}</p>
                    </div>
                  </div>

                  <div>
                    <h4 className="text-sm font-medium text-gray-400 mb-2">Status Workflow</h4>
                    <div className="flex items-center gap-2 flex-wrap">
                      {Object.entries(STATUS_CONFIG).map(([key, config]) => (
                        <button
                          key={key}
                          onClick={() => updateStatus(selectedDeliverable.id, key)}
                          className={`px-3 py-1.5 rounded-lg text-sm transition-all ${
                            selectedDeliverable.status === key 
                              ? 'ring-2 ring-offset-2 ring-offset-[#111C2E]' 
                              : 'opacity-60 hover:opacity-100'
                          }`}
                          style={{ 
                            background: config.bg, 
                            color: config.color,
                            ringColor: config.color 
                          }}
                        >
                          {config.label}
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Add Modal */}
          {showAddModal && (
            <AddDeliverableModal
              onClose={() => setShowAddModal(false)}
              onSave={(newDeliverable) => {
                setDeliverables(prev => [newDeliverable, ...prev]);
                setShowAddModal(false);
              }}
            />
          )}

          {/* Footer */}
          <footer className="border-t border-white/10 py-4 mt-12">
            <div className="max-w-7xl mx-auto px-6 text-center text-xs text-gray-500">
              © 2026 Mission Meets Tech • MissionPulse v2.0 • Sprint 55
            </div>
          </footer>
        </div>
      );
    }

    // Add Deliverable Modal
    function AddDeliverableModal({ onClose, onSave }) {
      const [formData, setFormData] = useState({
        cdrl_number: '',
        title: '',
        description: '',
        deliverable_type: 'report',
        frequency: 'monthly',
        due_date: '',
        priority: 'medium',
        government_poc: '',
        data_item_number: '',
      });

      const handleSubmit = async (e) => {
        e.preventDefault();
        
        const newDeliverable = {
          ...formData,
          id: `temp-${Date.now()}`,
          status: 'not_started',
          created_at: new Date().toISOString(),
        };

        try {
          const { data, error } = await sbClient
            .from('contract_deliverables')
            .insert([formData])
            .select()
            .single();

          if (error) throw error;
          onSave(data || newDeliverable);
        } catch (err) {
          console.log('Using local save:', err.message);
          onSave(newDeliverable);
        }
      };

      return (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="glass-card rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="p-6 border-b border-white/10">
              <div className="flex items-center justify-between">
                <h2 className="text-xl font-bold text-white">Add New Deliverable</h2>
                <button onClick={onClose} className="p-2 text-gray-400 hover:text-white">
                  <Icon name="x" className="w-5 h-5" />
                </button>
              </div>
            </div>

            <form onSubmit={handleSubmit} className="p-6 space-y-4">
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-gray-400 mb-1">CDRL Number *</label>
                  <input
                    type="text"
                    required
                    value={formData.cdrl_number}
                    onChange={(e) => setFormData(prev => ({ ...prev, cdrl_number: e.target.value }))}
                    className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-emerald-500"
                    placeholder="e.g., A001"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-400 mb-1">Data Item Number</label>
                  <input
                    type="text"
                    value={formData.data_item_number}
                    onChange={(e) => setFormData(prev => ({ ...prev, data_item_number: e.target.value }))}
                    className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-emerald-500"
                    placeholder="e.g., DI-MGMT-80368"
                  />
                </div>
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-400 mb-1">Title *</label>
                <input
                  type="text"
                  required
                  value={formData.title}
                  onChange={(e) => setFormData(prev => ({ ...prev, title: e.target.value }))}
                  className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-emerald-500"
                  placeholder="e.g., Monthly Status Report"
                />
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-400 mb-1">Description</label>
                <textarea
                  rows={3}
                  value={formData.description}
                  onChange={(e) => setFormData(prev => ({ ...prev, description: e.target.value }))}
                  className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-emerald-500"
                  placeholder="Describe the deliverable requirements..."
                />
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-gray-400 mb-1">Type</label>
                  <select
                    value={formData.deliverable_type}
                    onChange={(e) => setFormData(prev => ({ ...prev, deliverable_type: e.target.value }))}
                    className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-emerald-500"
                  >
                    {DELIVERABLE_TYPES.map(type => (
                      <option key={type.key} value={type.key}>{type.name}</option>
                    ))}
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-400 mb-1">Frequency</label>
                  <select
                    value={formData.frequency}
                    onChange={(e) => setFormData(prev => ({ ...prev, frequency: e.target.value }))}
                    className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-emerald-500"
                  >
                    {FREQUENCIES.map(freq => (
                      <option key={freq.key} value={freq.key}>{freq.name}</option>
                    ))}
                  </select>
                </div>
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-gray-400 mb-1">Due Date *</label>
                  <input
                    type="date"
                    required
                    value={formData.due_date}
                    onChange={(e) => setFormData(prev => ({ ...prev, due_date: e.target.value }))}
                    className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-emerald-500"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-400 mb-1">Priority</label>
                  <select
                    value={formData.priority}
                    onChange={(e) => setFormData(prev => ({ ...prev, priority: e.target.value }))}
                    className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-emerald-500"
                  >
                    {Object.entries(PRIORITY_CONFIG).map(([key, config]) => (
                      <option key={key} value={key}>{config.label}</option>
                    ))}
                  </select>
                </div>
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-400 mb-1">Government POC</label>
                <input
                  type="text"
                  value={formData.government_poc}
                  onChange={(e) => setFormData(prev => ({ ...prev, government_poc: e.target.value }))}
                  className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-emerald-500"
                  placeholder="e.g., John Smith"
                />
              </div>

              <div className="flex justify-end gap-3 pt-4">
                <button
                  type="button"
                  onClick={onClose}
                  className="px-4 py-2 bg-[#0A1628] text-gray-300 rounded-lg hover:text-white transition-colors"
                >
                  Cancel
                </button>
                <button
                  type="submit"
                  className="px-4 py-2 bg-gradient-to-r from-emerald-500 to-teal-600 text-white rounded-lg font-medium hover:opacity-90 transition-opacity"
                >
                  Save Deliverable
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    ReactDOM.render(<DeliverablesApp />, document.getElementById('root'));
  </script>
</body>
</html>
