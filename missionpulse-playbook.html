<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playbook Library | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
        .glass { background: rgba(0, 229, 250, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.2); }
        .glow { box-shadow: 0 0 20px rgba(0, 229, 250, 0.3); }
        .golden { background: linear-gradient(135deg, rgba(251, 191, 36, 0.1), rgba(245, 158, 11, 0.05)); border-color: rgba(251, 191, 36, 0.3); }
    </style>
</head>
<body class="text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // FILE: missionpulse-playbook.html
        // ROLE: All authenticated users
        // SECURITY: env vars verified - Supabase anon key (public RLS model)
        
        const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc3NTY2NDcsImV4cCI6MjA1MzMzMjY0N30.Wfq14O6y2EpB2R0cJQPmWMFybMQc0PxLlHYXVLp2rws';
        const DEFAULT_COMPANY_ID = '11111111-1111-1111-1111-111111111111';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const CATEGORIES = [
            { id: 'exec_summary', name: 'Executive Summary', icon: '📋', color: 'cyan' },
            { id: 'tech_approach', name: 'Technical Approach', icon: '⚙️', color: 'blue' },
            { id: 'mgmt_approach', name: 'Management Approach', icon: '📊', color: 'purple' },
            { id: 'past_perf', name: 'Past Performance', icon: '🏆', color: 'yellow' },
            { id: 'win_theme', name: 'Win Theme', icon: '🎯', color: 'green' },
            { id: 'discriminator', name: 'Discriminator', icon: '💎', color: 'pink' },
            { id: 'orals', name: 'Orals/Presentation', icon: '🎤', color: 'orange' },
            { id: 'pricing', name: 'Pricing Narrative', icon: '💰', color: 'emerald' },
            { id: 'compliance', name: 'Compliance Language', icon: '✅', color: 'teal' },
            { id: 'boilerplate', name: 'Boilerplate', icon: '📝', color: 'slate' }
        ];
        
        const DEMO_ITEMS = [
            { 
                id: '1', 
                title: 'VA Healthcare IT Executive Summary', 
                category: 'exec_summary', 
                content: 'Mission Meets Tech brings 15+ years of specialized federal healthcare IT experience, delivering transformative solutions that improve Veteran outcomes while reducing administrative burden.\n\nOur proven approach combines:\n• Deep VA domain expertise across VistA, Cerner, and interoperability standards\n• Agile delivery methodology with 98% on-time delivery rate\n• CMMI Level 3 processes ensuring quality and compliance\n\nWe understand that this isn\'t just about technology—it\'s about honoring our commitment to those who served.',
                tags: ['VA', 'Healthcare', 'Executive Summary', 'Winning'],
                use_count: 12
            },
            { 
                id: '2', 
                title: 'Agile Delivery Management Approach', 
                category: 'mgmt_approach', 
                content: 'Our management approach leverages proven Agile/SAFe methodologies tailored for federal environments:\n\n1. Sprint Planning: Bi-weekly sprints with government PO involvement\n2. Daily Standups: 15-minute focused team syncs\n3. Sprint Reviews: Demo-driven acceptance with stakeholders\n4. Retrospectives: Continuous improvement embedded in culture\n\nKey differentiator: Our Federal Agile Hybrid model maintains compliance rigor while enabling rapid delivery.',
                tags: ['Agile', 'SAFe', 'Management', 'Federal'],
                use_count: 8
            },
            { 
                id: '3', 
                title: 'DHA Cloud Migration Past Performance', 
                category: 'past_perf', 
                content: 'Project: Defense Health Agency Cloud Modernization\nContract: W81XWH-20-C-0XXX | Value: $15.2M | Period: 2020-2024\n\nChallenge: Migrate 47 legacy applications to AWS GovCloud while maintaining HIPAA compliance and zero downtime.\n\nSolution: Implemented containerized microservices architecture with blue-green deployment strategy.\n\nResults:\n• 100% applications migrated on schedule\n• 40% reduction in infrastructure costs\n• Zero security incidents during transition\n• ADPACS rating: Exceptional',
                tags: ['DHA', 'Cloud', 'AWS', 'Migration', 'Past Performance'],
                use_count: 15
            },
            { 
                id: '4', 
                title: 'Cost Reduction Discriminator', 
                category: 'discriminator', 
                content: 'What Sets Us Apart: Proven Cost Efficiency Without Compromise\n\nUnlike competitors who promise savings but deliver scope cuts, our approach delivers genuine efficiency:\n\n• Automation-First: 60% of routine tasks automated, reducing labor hours\n• Reusable Assets: Proprietary accelerators cut development time by 30%\n• Right-Shore Model: Strategic use of cleared domestic resources\n\nProof Point: On [Contract X], we delivered $2.3M in documented savings while exceeding all KPIs.',
                tags: ['Cost', 'Efficiency', 'Discriminator', 'Value'],
                use_count: 6
            }
        ];
        
        function App() {
            const [currentRole, setCurrentRole] = useState('PM');
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showModal, setShowModal] = useState(false);
            const [editItem, setEditItem] = useState(null);
            const [selectedCategory, setSelectedCategory] = useState('all');
            const [searchTerm, setSearchTerm] = useState('');
            const [viewItem, setViewItem] = useState(null);
            
            useEffect(() => { loadData(); }, []);
            
            const loadData = async () => {
                try {
                    const { data, error } = await supabase
                        .from('playbook_items')
                        .select('*')
                        .eq('company_id', DEFAULT_COMPANY_ID)
                        .order('use_count', { ascending: false });
                    
                    if (error) throw error;
                    setItems(data?.length > 0 ? data : DEMO_ITEMS);
                } catch (err) {
                    console.error('Load error:', err);
                    setItems(DEMO_ITEMS);
                } finally {
                    setLoading(false);
                }
            };
            
            const saveItem = async (itemData) => {
                try {
                    if (editItem?.id && !editItem.id.startsWith('temp-')) {
                        await supabase.from('playbook_items').update(itemData).eq('id', editItem.id);
                    } else {
                        await supabase.from('playbook_items').insert({ 
                            ...itemData, 
                            company_id: DEFAULT_COMPANY_ID,
                            use_count: 0
                        });
                    }
                    loadData();
                } catch (err) {
                    console.error('Save error:', err);
                    const tempId = 'temp-' + Date.now();
                    setItems([...items.filter(i => i.id !== editItem?.id), { ...itemData, id: tempId, use_count: 0 }]);
                }
                setShowModal(false);
                setEditItem(null);
            };
            
            const deleteItem = async (itemId) => {
                if (!confirm('Delete this playbook item?')) return;
                setItems(items.filter(i => i.id !== itemId));
                try { await supabase.from('playbook_items').delete().eq('id', itemId); } catch (err) { console.error(err); }
            };
            
            const incrementUseCount = async (item) => {
                const updated = { ...item, use_count: (item.use_count || 0) + 1 };
                setItems(items.map(i => i.id === item.id ? updated : i));
                try {
                    await supabase.from('playbook_items').update({ use_count: updated.use_count }).eq('id', item.id);
                } catch (err) { console.error(err); }
            };
            
            const copyToClipboard = async (item) => {
                await navigator.clipboard.writeText(item.content);
                incrementUseCount(item);
                alert('Copied to clipboard!');
            };
            
            const filteredItems = items.filter(item => {
                const matchesCategory = selectedCategory === 'all' || item.category === selectedCategory;
                const matchesSearch = !searchTerm || 
                    item.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    item.content.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (item.tags || []).some(t => t.toLowerCase().includes(searchTerm.toLowerCase()));
                return matchesCategory && matchesSearch;
            });
            
            const categoryCounts = CATEGORIES.map(cat => ({
                ...cat,
                count: items.filter(i => i.category === cat.id).length
            }));
            
            return (
                <div className="p-6 max-w-7xl mx-auto">
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <a href="index.html" className="text-cyan-400 hover:text-cyan-300 text-sm mb-2 inline-block">← Back to Dashboard</a>
                            <h1 className="text-3xl font-bold text-cyan-400">📚 Playbook Library</h1>
                            <p className="text-slate-400 mt-1">Golden examples and reusable proposal content</p>
                        </div>
                        <div className="flex gap-4 items-center">
                            <select value={currentRole} onChange={e => setCurrentRole(e.target.value)}
                                className="bg-slate-800 border border-cyan-500/30 rounded px-3 py-2 text-cyan-400">
                                {['CEO','COO','CAP','PM','SA','FIN','CON','DEL','QA','Partner','Admin'].map(r => 
                                    <option key={r} value={r}>{r}</option>
                                )}
                            </select>
                            <button onClick={() => { setEditItem({}); setShowModal(true); }}
                                className="bg-cyan-500 hover:bg-cyan-400 text-black font-bold px-4 py-2 rounded-lg transition">
                                + Add to Playbook
                            </button>
                        </div>
                    </div>
                    
                    {/* Search and Filter Bar */}
                    <div className="glass rounded-xl p-4 mb-6">
                        <div className="flex gap-4 items-center">
                            <div className="flex-1">
                                <input type="text" placeholder="Search playbook..." value={searchTerm}
                                    onChange={e => setSearchTerm(e.target.value)}
                                    className="w-full bg-slate-800 border border-cyan-500/30 rounded-lg px-4 py-2 text-white" />
                            </div>
                            <select value={selectedCategory} onChange={e => setSelectedCategory(e.target.value)}
                                className="bg-slate-800 border border-cyan-500/30 rounded-lg px-4 py-2 text-cyan-400">
                                <option value="all">All Categories ({items.length})</option>
                                {categoryCounts.map(cat => (
                                    <option key={cat.id} value={cat.id}>{cat.icon} {cat.name} ({cat.count})</option>
                                ))}
                            </select>
                        </div>
                    </div>
                    
                    {/* Category Quick Filters */}
                    <div className="flex gap-2 mb-6 flex-wrap">
                        <button onClick={() => setSelectedCategory('all')}
                            className={`px-3 py-1 rounded-full text-sm transition ${selectedCategory === 'all' ? 'bg-cyan-500 text-black' : 'glass text-cyan-400 hover:bg-cyan-500/20'}`}>
                            All
                        </button>
                        {categoryCounts.filter(c => c.count > 0).map(cat => (
                            <button key={cat.id} onClick={() => setSelectedCategory(cat.id)}
                                className={`px-3 py-1 rounded-full text-sm transition ${selectedCategory === cat.id ? 'bg-cyan-500 text-black' : 'glass text-cyan-400 hover:bg-cyan-500/20'}`}>
                                {cat.icon} {cat.name}
                            </button>
                        ))}
                    </div>
                    
                    {loading ? (
                        <div className="text-center py-20 text-cyan-400">Loading playbook...</div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {filteredItems.map(item => {
                                const category = CATEGORIES.find(c => c.id === item.category) || CATEGORIES[0];
                                return (
                                    <div key={item.id} className="golden glass rounded-xl p-5 hover:glow transition cursor-pointer"
                                        onClick={() => setViewItem(item)}>
                                        <div className="flex justify-between items-start mb-3">
                                            <div className="flex items-center gap-2">
                                                <span className="text-2xl">{category.icon}</span>
                                                <span className={`text-xs px-2 py-1 rounded bg-${category.color}-500/20 text-${category.color}-400`}>
                                                    {category.name}
                                                </span>
                                            </div>
                                            <div className="flex items-center gap-1 text-amber-400 text-sm">
                                                ⭐ {item.use_count || 0} uses
                                            </div>
                                        </div>
                                        <h3 className="font-bold text-white text-lg mb-2">{item.title}</h3>
                                        <p className="text-slate-400 text-sm line-clamp-3 mb-3">{item.content}</p>
                                        {item.tags && item.tags.length > 0 && (
                                            <div className="flex gap-1 flex-wrap mb-3">
                                                {item.tags.slice(0, 5).map((tag, i) => (
                                                    <span key={i} className="text-xs px-2 py-0.5 rounded-full bg-slate-700 text-slate-300">
                                                        {tag}
                                                    </span>
                                                ))}
                                            </div>
                                        )}
                                        <div className="flex gap-2 mt-3" onClick={e => e.stopPropagation()}>
                                            <button onClick={() => copyToClipboard(item)}
                                                className="flex-1 bg-cyan-500/20 hover:bg-cyan-500/30 text-cyan-400 px-3 py-1.5 rounded text-sm transition">
                                                📋 Copy
                                            </button>
                                            <button onClick={() => { setEditItem(item); setShowModal(true); }}
                                                className="bg-slate-700/50 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded text-sm transition">
                                                ✏️
                                            </button>
                                            <button onClick={() => deleteItem(item.id)}
                                                className="bg-red-500/20 hover:bg-red-500/30 text-red-400 px-3 py-1.5 rounded text-sm transition">
                                                🗑️
                                            </button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                    
                    {filteredItems.length === 0 && !loading && (
                        <div className="text-center py-16 text-slate-500">
                            <p className="text-4xl mb-4">📚</p>
                            <p>No playbook items found</p>
                            <button onClick={() => { setEditItem({}); setShowModal(true); }}
                                className="mt-4 text-cyan-400 hover:text-cyan-300">+ Add your first golden example</button>
                        </div>
                    )}
                    
                    {/* View Modal */}
                    {viewItem && (
                        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4" onClick={() => setViewItem(null)}>
                            <div className="glass rounded-xl p-6 w-full max-w-3xl max-h-[80vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-start mb-4">
                                    <div>
                                        <span className="text-3xl">{CATEGORIES.find(c => c.id === viewItem.category)?.icon}</span>
                                        <h2 className="text-xl font-bold text-cyan-400 mt-2">{viewItem.title}</h2>
                                    </div>
                                    <button onClick={() => setViewItem(null)} className="text-slate-400 hover:text-white text-2xl">×</button>
                                </div>
                                <div className="bg-slate-800/50 rounded-lg p-4 mb-4">
                                    <pre className="text-slate-300 whitespace-pre-wrap font-sans">{viewItem.content}</pre>
                                </div>
                                {viewItem.tags && (
                                    <div className="flex gap-2 flex-wrap mb-4">
                                        {viewItem.tags.map((tag, i) => (
                                            <span key={i} className="text-xs px-2 py-1 rounded-full bg-cyan-500/20 text-cyan-400">{tag}</span>
                                        ))}
                                    </div>
                                )}
                                <div className="flex gap-3">
                                    <button onClick={() => { copyToClipboard(viewItem); setViewItem(null); }}
                                        className="flex-1 bg-cyan-500 hover:bg-cyan-400 text-black font-bold px-4 py-2 rounded-lg transition">
                                        📋 Copy to Clipboard
                                    </button>
                                    <button onClick={() => { setEditItem(viewItem); setShowModal(true); setViewItem(null); }}
                                        className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg transition">
                                        ✏️ Edit
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {showModal && (
                        <PlaybookModal item={editItem} onSave={saveItem} onClose={() => { setShowModal(false); setEditItem(null); }} />
                    )}
                    
                    <div className="mt-8 text-center text-slate-500 text-sm">
                        MissionPulse v3.1 • Mission Meets Tech • AI GENERATED CONTENT REQUIRES HUMAN REVIEW
                    </div>
                </div>
            );
        }
        
        function PlaybookModal({ item, onSave, onClose }) {
            const [form, setForm] = useState({
                title: item?.title || '',
                category: item?.category || 'exec_summary',
                content: item?.content || '',
                tags: (item?.tags || []).join(', ')
            });
            
            const handleSubmit = (e) => {
                e.preventDefault();
                onSave({
                    ...form,
                    tags: form.tags.split(',').map(t => t.trim()).filter(t => t)
                });
            };
            
            return (
                <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50" onClick={onClose}>
                    <div className="glass rounded-xl p-6 w-full max-w-2xl" onClick={e => e.stopPropagation()}>
                        <h2 className="text-xl font-bold text-cyan-400 mb-4">{item?.id ? 'Edit Playbook Item' : 'Add to Playbook'}</h2>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm text-slate-400 mb-1">Title</label>
                                <input type="text" value={form.title} onChange={e => setForm({...form, title: e.target.value})}
                                    className="w-full bg-slate-800 border border-cyan-500/30 rounded px-3 py-2 text-white" required />
                            </div>
                            <div>
                                <label className="block text-sm text-slate-400 mb-1">Category</label>
                                <select value={form.category} onChange={e => setForm({...form, category: e.target.value})}
                                    className="w-full bg-slate-800 border border-cyan-500/30 rounded px-3 py-2 text-white">
                                    {CATEGORIES.map(cat => <option key={cat.id} value={cat.id}>{cat.icon} {cat.name}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm text-slate-400 mb-1">Content (Golden Example)</label>
                                <textarea value={form.content} onChange={e => setForm({...form, content: e.target.value})}
                                    className="w-full bg-slate-800 border border-cyan-500/30 rounded px-3 py-2 text-white h-48 font-mono text-sm"
                                    placeholder="Paste your winning proposal content here..." required />
                            </div>
                            <div>
                                <label className="block text-sm text-slate-400 mb-1">Tags (comma-separated)</label>
                                <input type="text" value={form.tags} onChange={e => setForm({...form, tags: e.target.value})}
                                    className="w-full bg-slate-800 border border-cyan-500/30 rounded px-3 py-2 text-white"
                                    placeholder="VA, Healthcare, Executive Summary, Winning" />
                            </div>
                            <div className="flex gap-3 justify-end mt-6">
                                <button type="button" onClick={onClose}
                                    className="px-4 py-2 border border-slate-600 rounded-lg hover:bg-slate-700 transition">Cancel</button>
                                <button type="submit"
                                    className="px-4 py-2 bg-cyan-500 text-black font-bold rounded-lg hover:bg-cyan-400 transition">⭐ Save to Playbook</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }
        
        const CATEGORIES = [
            { id: 'exec_summary', name: 'Executive Summary', icon: '📋', color: 'cyan' },
            { id: 'tech_approach', name: 'Technical Approach', icon: '⚙️', color: 'blue' },
            { id: 'mgmt_approach', name: 'Management Approach', icon: '📊', color: 'purple' },
            { id: 'past_perf', name: 'Past Performance', icon: '🏆', color: 'yellow' },
            { id: 'win_theme', name: 'Win Theme', icon: '🎯', color: 'green' },
            { id: 'discriminator', name: 'Discriminator', icon: '💎', color: 'pink' },
            { id: 'orals', name: 'Orals/Presentation', icon: '🎤', color: 'orange' },
            { id: 'pricing', name: 'Pricing Narrative', icon: '💰', color: 'emerald' },
            { id: 'compliance', name: 'Compliance Language', icon: '✅', color: 'teal' },
            { id: 'boilerplate', name: 'Boilerplate', icon: '📝', color: 'slate' }
        ];
        
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
