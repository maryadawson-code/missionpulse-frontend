<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playbook Engine | MissionPulse</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.1); }
    .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(0, 229, 250, 0.3); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    // Playbook Categories
    const PLAYBOOK_DATA = [
      {
        id: 'shipley',
        category: 'Shipley Methodology',
        icon: '📘',
        color: '#3B82F6',
        items: [
          { id: 1, title: 'Capture Planning Template', type: 'template', uses: 45, rating: 4.8, description: 'Comprehensive capture plan following Shipley phases' },
          { id: 2, title: 'Blue Team Review Checklist', type: 'checklist', uses: 78, rating: 4.9, description: 'Solution development review criteria' },
          { id: 3, title: 'Pink Team Evaluation Guide', type: 'guide', uses: 62, rating: 4.7, description: 'Compliance and responsiveness check' },
          { id: 4, title: 'Red Team Scoring Matrix', type: 'template', uses: 89, rating: 5.0, description: 'Final evaluation simulation rubric' },
          { id: 5, title: 'Gold Team Checklist', type: 'checklist', uses: 56, rating: 4.8, description: 'Executive review and approval criteria' },
        ]
      },
      {
        id: 'proposals',
        category: 'Proposal Templates',
        icon: '📝',
        color: '#10B981',
        items: [
          { id: 6, title: 'Executive Summary Framework', type: 'template', uses: 134, rating: 4.9, description: 'Winning exec summary structure with examples' },
          { id: 7, title: 'Technical Approach Outline', type: 'template', uses: 98, rating: 4.7, description: 'Section L-compliant technical narrative' },
          { id: 8, title: 'Management Approach Template', type: 'template', uses: 87, rating: 4.6, description: 'Org chart, staffing, and transition planning' },
          { id: 9, title: 'Past Performance Narrative', type: 'template', uses: 112, rating: 4.8, description: 'CPARS-aligned performance write-ups' },
          { id: 10, title: 'Risk Mitigation Matrix', type: 'template', uses: 76, rating: 4.5, description: 'Risk identification and response planning' },
        ]
      },
      {
        id: 'win-themes',
        category: 'Win Themes Library',
        icon: '🏆',
        color: '#F59E0B',
        items: [
          { id: 11, title: 'Healthcare IT Differentiators', type: 'content', uses: 34, rating: 4.7, description: 'Proven themes for DHA, VA, CMS opportunities' },
          { id: 12, title: 'Cybersecurity Value Props', type: 'content', uses: 45, rating: 4.8, description: 'CMMC, FedRAMP, Zero Trust messaging' },
          { id: 13, title: 'Cloud Migration Themes', type: 'content', uses: 67, rating: 4.9, description: 'AWS GovCloud, Azure Government positioning' },
          { id: 14, title: 'AI/ML Innovation Messaging', type: 'content', uses: 28, rating: 4.6, description: 'Responsible AI, DoD AI ethics alignment' },
          { id: 15, title: 'Cost Savings Narratives', type: 'content', uses: 89, rating: 4.8, description: 'Quantified value and ROI statements' },
        ]
      },
      {
        id: 'compliance',
        category: 'Compliance Resources',
        icon: '🛡️',
        color: '#EF4444',
        items: [
          { id: 16, title: 'FAR Clause Quick Reference', type: 'reference', uses: 156, rating: 5.0, description: 'Common FAR clauses and interpretations' },
          { id: 17, title: 'DFARS Requirements Matrix', type: 'reference', uses: 123, rating: 4.9, description: 'DoD-specific acquisition requirements' },
          { id: 18, title: 'Section 508 Compliance Guide', type: 'guide', uses: 67, rating: 4.6, description: 'Accessibility requirements checklist' },
          { id: 19, title: 'CUI Handling Procedures', type: 'guide', uses: 89, rating: 4.8, description: 'NIST 800-171 aligned CUI protection' },
          { id: 20, title: 'Small Business Teaming Guide', type: 'guide', uses: 45, rating: 4.7, description: 'SBA requirements for JVs and mentors' },
        ]
      },
      {
        id: 'pricing',
        category: 'Pricing Playbooks',
        icon: '💰',
        color: '#8B5CF6',
        items: [
          { id: 21, title: 'T&M Pricing Strategy', type: 'guide', uses: 78, rating: 4.7, description: 'Time and materials rate development' },
          { id: 22, title: 'FFP Cost Build-up', type: 'template', uses: 92, rating: 4.8, description: 'Firm fixed price estimation methodology' },
          { id: 23, title: 'IDIQ Ceiling Strategies', type: 'guide', uses: 56, rating: 4.6, description: 'Indefinite delivery contract pricing' },
          { id: 24, title: 'Price-to-Win Analysis', type: 'template', uses: 67, rating: 4.9, description: 'Competitive pricing assessment framework' },
          { id: 25, title: 'Wrap Rate Calculator', type: 'tool', uses: 134, rating: 5.0, description: 'Fringe, overhead, G&A calculation tool' },
        ]
      },
    ];

    const TYPE_STYLES = {
      template: { bg: 'bg-blue-500/20', text: 'text-blue-400', label: 'Template' },
      checklist: { bg: 'bg-emerald-500/20', text: 'text-emerald-400', label: 'Checklist' },
      guide: { bg: 'bg-purple-500/20', text: 'text-purple-400', label: 'Guide' },
      reference: { bg: 'bg-amber-500/20', text: 'text-amber-400', label: 'Reference' },
      content: { bg: 'bg-pink-500/20', text: 'text-pink-400', label: 'Content' },
      tool: { bg: 'bg-cyan-500/20', text: 'text-cyan-400', label: 'Tool' },
    };

    // Playbook Item Card
    const PlaybookCard = ({ item, onSelect }) => {
      const typeStyle = TYPE_STYLES[item.type];
      
      return (
        <div 
          onClick={() => onSelect(item)}
          className="glass-card rounded-xl p-4 cursor-pointer hover:border-cyan-500/30 transition-all group"
        >
          <div className="flex items-start justify-between mb-3">
            <span className={`px-2 py-1 text-xs rounded-full ${typeStyle.bg} ${typeStyle.text}`}>
              {typeStyle.label}
            </span>
            <div className="flex items-center gap-1">
              <span className="text-amber-400">★</span>
              <span className="text-sm text-slate-300">{item.rating}</span>
            </div>
          </div>
          <h3 className="font-semibold text-white mb-2 group-hover:text-cyan-400 transition-colors">
            {item.title}
          </h3>
          <p className="text-sm text-slate-400 mb-3">{item.description}</p>
          <div className="flex items-center justify-between text-xs text-slate-500">
            <span>Used {item.uses} times</span>
            <span className="text-cyan-400 opacity-0 group-hover:opacity-100 transition-opacity">
              View →
            </span>
          </div>
        </div>
      );
    };

    function PlaybookEngine() {
      const [playbooks] = useState(PLAYBOOK_DATA);
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedCategory, setSelectedCategory] = useState('all');
      const [selectedItem, setSelectedItem] = useState(null);
      const [showCreateModal, setShowCreateModal] = useState(false);

      const filteredPlaybooks = playbooks.map(category => ({
        ...category,
        items: category.items.filter(item => {
          if (selectedCategory !== 'all' && category.id !== selectedCategory) return false;
          if (searchQuery) {
            const query = searchQuery.toLowerCase();
            return item.title.toLowerCase().includes(query) || 
                   item.description.toLowerCase().includes(query);
          }
          return true;
        })
      })).filter(category => selectedCategory === 'all' || category.id === selectedCategory)
        .filter(category => category.items.length > 0);

      const stats = {
        total: playbooks.flatMap(c => c.items).length,
        templates: playbooks.flatMap(c => c.items).filter(i => i.type === 'template').length,
        totalUses: playbooks.flatMap(c => c.items).reduce((sum, i) => sum + i.uses, 0),
      };

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
            <div className="max-w-[1800px] mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="missionpulse-nav-hub.html" className="text-slate-400 hover:text-white transition-colors">
                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
                    </svg>
                  </a>
                  <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center">
                    <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold text-white">Playbook Engine</h1>
                    <p className="text-xs text-amber-400">Best Practices & Reusable Content</p>
                  </div>
                </div>
                <button 
                  onClick={() => setShowCreateModal(true)}
                  className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white text-sm font-medium rounded-lg hover:from-cyan-400 hover:to-teal-400 transition-all"
                >
                  + Create Playbook
                </button>
              </div>
            </div>
          </header>

          <div className="max-w-[1800px] mx-auto px-6 py-8">
            {/* Stats */}
            <div className="grid grid-cols-4 gap-4 mb-6">
              <div className="glass-card rounded-xl p-4">
                <p className="text-sm text-slate-400 mb-1">Total Playbooks</p>
                <p className="text-2xl font-bold text-white">{stats.total}</p>
              </div>
              <div className="glass-card rounded-xl p-4">
                <p className="text-sm text-slate-400 mb-1">Templates</p>
                <p className="text-2xl font-bold text-blue-400">{stats.templates}</p>
              </div>
              <div className="glass-card rounded-xl p-4">
                <p className="text-sm text-slate-400 mb-1">Categories</p>
                <p className="text-2xl font-bold text-purple-400">{playbooks.length}</p>
              </div>
              <div className="glass-card rounded-xl p-4">
                <p className="text-sm text-slate-400 mb-1">Total Uses</p>
                <p className="text-2xl font-bold text-cyan-400">{stats.totalUses.toLocaleString()}</p>
              </div>
            </div>

            {/* Search and Filters */}
            <div className="flex items-center gap-4 mb-8">
              <div className="relative flex-1 max-w-md">
                <svg className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input
                  type="text"
                  placeholder="Search playbooks..."
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="w-full pl-12 pr-4 py-2.5 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500/50"
                />
              </div>
              <div className="flex items-center gap-2 overflow-x-auto">
                <button
                  onClick={() => setSelectedCategory('all')}
                  className={`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all ${
                    selectedCategory === 'all'
                      ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30'
                      : 'bg-slate-800/50 text-slate-400 border border-slate-700'
                  }`}
                >
                  All Categories
                </button>
                {playbooks.map(cat => (
                  <button
                    key={cat.id}
                    onClick={() => setSelectedCategory(cat.id)}
                    className={`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all flex items-center gap-2 ${
                      selectedCategory === cat.id
                        ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30'
                        : 'bg-slate-800/50 text-slate-400 border border-slate-700'
                    }`}
                  >
                    <span>{cat.icon}</span>
                    <span>{cat.category}</span>
                  </button>
                ))}
              </div>
            </div>

            {/* Playbook Grid */}
            {filteredPlaybooks.map(category => (
              <div key={category.id} className="mb-8">
                <div className="flex items-center gap-3 mb-4">
                  <span className="text-2xl">{category.icon}</span>
                  <h2 className="text-lg font-semibold text-white">{category.category}</h2>
                  <span className="text-sm text-slate-500">({category.items.length})</span>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                  {category.items.map(item => (
                    <PlaybookCard key={item.id} item={item} onSelect={setSelectedItem} />
                  ))}
                </div>
              </div>
            ))}

            {filteredPlaybooks.length === 0 && (
              <div className="text-center py-16">
                <p className="text-slate-400 text-lg">No playbooks found matching "{searchQuery}"</p>
                <button 
                  onClick={() => { setSearchQuery(''); setSelectedCategory('all'); }}
                  className="mt-4 text-cyan-400 hover:text-cyan-300 transition-colors"
                >
                  Clear filters
                </button>
              </div>
            )}
          </div>

          {/* Item Detail Modal */}
          {selectedItem && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50" onClick={() => setSelectedItem(null)}>
              <div className="glass-card rounded-2xl p-6 max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto scrollbar-thin" onClick={e => e.stopPropagation()}>
                <div className="flex items-start justify-between mb-6">
                  <div>
                    <span className={`px-2 py-1 text-xs rounded-full ${TYPE_STYLES[selectedItem.type].bg} ${TYPE_STYLES[selectedItem.type].text}`}>
                      {TYPE_STYLES[selectedItem.type].label}
                    </span>
                    <h3 className="text-xl font-bold text-white mt-2">{selectedItem.title}</h3>
                    <p className="text-slate-400 mt-1">{selectedItem.description}</p>
                  </div>
                  <button onClick={() => setSelectedItem(null)} className="text-slate-400 hover:text-white">
                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                    </svg>
                  </button>
                </div>

                <div className="flex items-center gap-6 mb-6 text-sm">
                  <div className="flex items-center gap-1">
                    <span className="text-amber-400">★</span>
                    <span className="text-white">{selectedItem.rating}</span>
                    <span className="text-slate-500">rating</span>
                  </div>
                  <div>
                    <span className="text-white">{selectedItem.uses}</span>
                    <span className="text-slate-500 ml-1">uses</span>
                  </div>
                </div>

                <div className="bg-slate-800/50 rounded-xl p-4 mb-6">
                  <h4 className="font-medium text-white mb-3">Preview</h4>
                  <div className="text-sm text-slate-300 space-y-2">
                    <p>This {TYPE_STYLES[selectedItem.type].label.toLowerCase()} includes:</p>
                    <ul className="list-disc list-inside space-y-1 text-slate-400">
                      <li>Comprehensive structure and guidance</li>
                      <li>Best practice recommendations</li>
                      <li>Customizable sections</li>
                      <li>Integration with MissionPulse workflow</li>
                    </ul>
                  </div>
                </div>

                <div className="flex items-center gap-3">
                  <button
                    onClick={() => { alert('Playbook applied!'); setSelectedItem(null); }}
                    className="flex-1 py-3 bg-gradient-to-r from-cyan-500 to-teal-500 text-white font-medium rounded-xl hover:from-cyan-400 hover:to-teal-400 transition-all"
                  >
                    Use This Playbook
                  </button>
                  <button className="px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl text-slate-300 hover:border-cyan-500/50 transition-all">
                    Preview
                  </button>
                  <button className="px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl text-slate-300 hover:border-cyan-500/50 transition-all">
                    Duplicate
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<PlaybookEngine />);
  </script>
</body>
</html>
