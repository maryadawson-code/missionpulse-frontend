<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MissionPulse - Launch Readiness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .confetti { animation: confetti 1s ease-out forwards; }
        @keyframes confetti { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(-100px) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // =========================================================================
        // LAUNCH CHECKLIST
        // =========================================================================
        const CHECKLIST = [
            {
                category: 'Infrastructure',
                icon: '🏗️',
                items: [
                    { id: 'i1', task: 'Production domain configured', detail: 'missionpulse.netlify.app active', done: true },
                    { id: 'i2', task: 'SSL certificate valid', detail: 'HTTPS enforced on all routes', done: true },
                    { id: 'i3', task: 'CDN caching enabled', detail: 'Netlify Edge network', done: true },
                    { id: 'i4', task: 'Database backups configured', detail: 'Supabase daily backups', done: true },
                    { id: 'i5', task: 'API health monitoring', detail: 'Render health checks', done: true },
                    { id: 'i6', task: 'Error tracking setup', detail: 'Console logging enabled', done: true }
                ]
            },
            {
                category: 'Security',
                icon: '🔐',
                items: [
                    { id: 's1', task: 'Authentication system tested', detail: 'Supabase Auth flow verified', done: true },
                    { id: 's2', task: 'RBAC policies enforced', detail: 'All 11 roles configured', done: true },
                    { id: 's3', task: 'RLS enabled on all tables', detail: 'Multi-tenant isolation active', done: true },
                    { id: 's4', task: 'API keys secured', detail: 'No exposed credentials', done: true },
                    { id: 's5', task: 'CUI marking implemented', detail: 'Pricing module marked', done: true },
                    { id: 's6', task: 'Audit logging active', detail: 'All actions tracked', done: true }
                ]
            },
            {
                category: 'Features',
                icon: '⚡',
                items: [
                    { id: 'f1', task: 'All 22 modules deployed', detail: 'Dashboard hub updated', done: true },
                    { id: 'f2', task: 'AI Agent Hub functional', detail: '8 agents connected', done: true },
                    { id: 'f3', task: 'Demo mode working', detail: 'Offline fallback tested', done: true },
                    { id: 'f4', task: 'Solo Proposal Manager live', detail: '9 Shipley phases', done: true },
                    { id: 'f5', task: 'Knowledge Base active', detail: 'RAG upload working', done: true },
                    { id: 'f6', task: 'Visual Generator functional', detail: 'Mermaid rendering', done: true }
                ]
            },
            {
                category: 'Quality',
                icon: '✅',
                items: [
                    { id: 'q1', task: 'QA Gauntlet passed', detail: '95%+ tests passing', done: true },
                    { id: 'q2', task: 'Mobile responsive verified', detail: 'Tested on 375px+', done: true },
                    { id: 'q3', task: 'Load time < 3 seconds', detail: 'Lighthouse score > 80', done: true },
                    { id: 'q4', task: 'Error states handled', detail: 'User-friendly messages', done: true },
                    { id: 'q5', task: 'Connection status shown', detail: 'Online/offline indicator', done: true },
                    { id: 'q6', task: 'AI disclaimer footer', detail: 'On all pages', done: true }
                ]
            },
            {
                category: 'Documentation',
                icon: '📚',
                items: [
                    { id: 'd1', task: 'User guide drafted', detail: 'Basic flow documented', done: true },
                    { id: 'd2', task: 'Admin guide created', detail: 'RBAC configuration', done: true },
                    { id: 'd3', task: 'API documentation', detail: 'Endpoint reference', done: false },
                    { id: 'd4', task: 'Release notes prepared', detail: 'V2 changelog', done: true },
                    { id: 'd5', task: 'Training materials', detail: 'Demo script ready', done: true },
                    { id: 'd6', task: 'Support contact info', detail: 'Help channels defined', done: true }
                ]
            },
            {
                category: 'Business',
                icon: '💼',
                items: [
                    { id: 'b1', task: 'Pricing model finalized', detail: 'Subscription tiers', done: false },
                    { id: 'b2', task: 'Terms of service', detail: 'Legal review pending', done: false },
                    { id: 'b3', task: 'Privacy policy', detail: 'GDPR/CCPA compliant', done: false },
                    { id: 'b4', task: 'Go-to-market plan', detail: 'Launch strategy', done: true },
                    { id: 'b5', task: 'Customer success plan', detail: 'Onboarding flow', done: true },
                    { id: 'b6', task: 'Feedback mechanism', detail: 'Feature suggestions portal', done: true }
                ]
            }
        ];

        // =========================================================================
        // COMPONENTS
        // =========================================================================

        function ChecklistItem({ item, onToggle }) {
            return (
                <div 
                    onClick={() => onToggle(item.id)}
                    className={`flex items-center gap-4 p-3 rounded-lg cursor-pointer transition-all ${
                        item.done ? 'bg-emerald-500/10' : 'bg-slate-800/50 hover:bg-slate-800'
                    }`}
                >
                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${
                        item.done 
                            ? 'bg-emerald-500 border-emerald-500 text-white' 
                            : 'border-slate-600'
                    }`}>
                        {item.done && '✓'}
                    </div>
                    <div className="flex-1">
                        <div className={`font-medium ${item.done ? 'text-emerald-400' : 'text-white'}`}>
                            {item.task}
                        </div>
                        <div className="text-sm text-slate-500">{item.detail}</div>
                    </div>
                </div>
            );
        }

        function CategoryCard({ category, items, onToggle }) {
            const doneCount = items.filter(i => i.done).length;
            const total = items.length;
            const percent = Math.round((doneCount / total) * 100);

            return (
                <div className="glass rounded-xl overflow-hidden">
                    <div className="p-4 border-b border-slate-700/50">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <span className="text-2xl">{category.icon}</span>
                                <h3 className="font-semibold text-white">{category.category}</h3>
                            </div>
                            <div className="flex items-center gap-3">
                                <span className={`text-sm font-medium ${
                                    percent === 100 ? 'text-emerald-400' : 'text-slate-400'
                                }`}>
                                    {doneCount}/{total}
                                </span>
                                <div className="w-16 h-2 bg-slate-700 rounded-full overflow-hidden">
                                    <div 
                                        className={`h-full transition-all ${percent === 100 ? 'bg-emerald-500' : 'bg-cyan-500'}`}
                                        style={{ width: `${percent}%` }}
                                    />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div className="p-4 space-y-2">
                        {items.map(item => (
                            <ChecklistItem key={item.id} item={item} onToggle={onToggle} />
                        ))}
                    </div>
                </div>
            );
        }

        // =========================================================================
        // MAIN APP
        // =========================================================================
        function App() {
            const [checklist, setChecklist] = useState(CHECKLIST);
            const [showConfetti, setShowConfetti] = useState(false);

            const toggleItem = (itemId) => {
                setChecklist(prev => prev.map(cat => ({
                    ...cat,
                    items: cat.items.map(item => 
                        item.id === itemId ? { ...item, done: !item.done } : item
                    )
                })));
            };

            // Calculate totals
            const allItems = checklist.flatMap(c => c.items);
            const totalDone = allItems.filter(i => i.done).length;
            const totalItems = allItems.length;
            const overallPercent = Math.round((totalDone / totalItems) * 100);
            const isReady = overallPercent >= 90;

            const handleLaunch = () => {
                if (isReady) {
                    setShowConfetti(true);
                    setTimeout(() => setShowConfetti(false), 3000);
                }
            };

            return (
                <div className="min-h-screen">
                    {/* Confetti */}
                    {showConfetti && (
                        <div className="fixed inset-0 pointer-events-none z-50 flex items-center justify-center">
                            <div className="text-6xl confetti">🎉</div>
                        </div>
                    )}

                    {/* Header */}
                    <header className="glass border-b border-slate-700 px-6 py-4 sticky top-0 z-20">
                        <div className="max-w-6xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <a href="missionpulse-dashboard-hub.html" className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-500 to-cyan-500 flex items-center justify-center">
                                        <span className="text-xl">🚀</span>
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-bold text-white">Launch Readiness</h1>
                                        <p className="text-xs text-slate-500">Production checklist</p>
                                    </div>
                                </a>
                            </div>
                            <button
                                onClick={handleLaunch}
                                disabled={!isReady}
                                className={`px-6 py-2 rounded-lg font-semibold transition-all ${
                                    isReady
                                        ? 'bg-gradient-to-r from-emerald-500 to-cyan-500 text-slate-900 hover:opacity-90'
                                        : 'bg-slate-700 text-slate-500 cursor-not-allowed'
                                }`}
                            >
                                {isReady ? '🚀 Launch!' : `${overallPercent}% Ready`}
                            </button>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-6xl mx-auto px-6 py-8">
                        {/* Overall Progress */}
                        <div className="glass rounded-2xl p-8 mb-8">
                            <div className="flex items-center justify-between mb-6">
                                <div>
                                    <h2 className="text-2xl font-bold text-white">MissionPulse V2</h2>
                                    <p className="text-slate-400">Production Launch Checklist</p>
                                </div>
                                <div className="text-right">
                                    <div className={`text-5xl font-bold ${
                                        overallPercent === 100 ? 'text-emerald-400' :
                                        overallPercent >= 90 ? 'text-cyan-400' :
                                        overallPercent >= 70 ? 'text-amber-400' :
                                        'text-red-400'
                                    }`}>
                                        {overallPercent}%
                                    </div>
                                    <div className="text-slate-400">{totalDone} of {totalItems} complete</div>
                                </div>
                            </div>

                            {/* Progress Bar */}
                            <div className="h-4 bg-slate-700 rounded-full overflow-hidden">
                                <div 
                                    className={`h-full transition-all duration-500 ${
                                        overallPercent === 100 ? 'bg-emerald-500' :
                                        overallPercent >= 90 ? 'bg-cyan-500' :
                                        'bg-amber-500'
                                    }`}
                                    style={{ width: `${overallPercent}%` }}
                                />
                            </div>

                            {/* Status Message */}
                            <div className={`mt-4 p-4 rounded-lg ${
                                overallPercent === 100 
                                    ? 'bg-emerald-500/20 border border-emerald-500/30' 
                                    : overallPercent >= 90
                                    ? 'bg-cyan-500/20 border border-cyan-500/30'
                                    : 'bg-amber-500/20 border border-amber-500/30'
                            }`}>
                                <div className={`font-medium ${
                                    overallPercent === 100 ? 'text-emerald-400' :
                                    overallPercent >= 90 ? 'text-cyan-400' :
                                    'text-amber-400'
                                }`}>
                                    {overallPercent === 100 
                                        ? '🎉 All systems go! Ready for production launch.'
                                        : overallPercent >= 90
                                        ? '✨ Almost there! A few items remaining.'
                                        : `⏳ ${totalItems - totalDone} items need attention before launch.`
                                    }
                                </div>
                            </div>
                        </div>

                        {/* Checklist Grid */}
                        <div className="grid md:grid-cols-2 gap-6">
                            {checklist.map(cat => (
                                <CategoryCard
                                    key={cat.category}
                                    category={cat}
                                    items={cat.items}
                                    onToggle={toggleItem}
                                />
                            ))}
                        </div>

                        {/* Quick Links */}
                        <div className="glass rounded-xl p-6 mt-8">
                            <h3 className="font-semibold text-white mb-4">Quick Links</h3>
                            <div className="grid grid-cols-4 gap-4">
                                <a href="missionpulse-qa-gauntlet.html" className="p-3 bg-slate-800 hover:bg-slate-700 rounded-lg text-center transition-colors">
                                    <div className="text-2xl mb-1">🛡️</div>
                                    <div className="text-sm text-slate-300">QA Gauntlet</div>
                                </a>
                                <a href="missionpulse-security-admin.html" className="p-3 bg-slate-800 hover:bg-slate-700 rounded-lg text-center transition-colors">
                                    <div className="text-2xl mb-1">🔒</div>
                                    <div className="text-sm text-slate-300">Security</div>
                                </a>
                                <a href="missionpulse-user-management.html" className="p-3 bg-slate-800 hover:bg-slate-700 rounded-lg text-center transition-colors">
                                    <div className="text-2xl mb-1">👥</div>
                                    <div className="text-sm text-slate-300">Users</div>
                                </a>
                                <a href="missionpulse-feature-suggestions.html" className="p-3 bg-slate-800 hover:bg-slate-700 rounded-lg text-center transition-colors">
                                    <div className="text-2xl mb-1">💡</div>
                                    <div className="text-sm text-slate-300">Feedback</div>
                                </a>
                            </div>
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="border-t border-slate-800 mt-8">
                        <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
                            <span className="text-slate-500 text-sm">© 2026 Mission Meets Tech</span>
                            <span className="text-slate-600 text-xs">AI GENERATED - REQUIRES HUMAN REVIEW</span>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
