    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; color: #fff; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(0,229,250,0.3); } 50% { box-shadow: 0 0 40px rgba(0,229,250,0.5); } }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-slideUp { animation: slideUp 0.5s ease-out forwards; }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    .animate-glow { animation: glow 2s ease-in-out infinite; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #111C2E; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #243656; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #00E5FA; }
    .glass-card {

      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .gradient-border {
      position: relative;
      background: linear-gradient(135deg, #111C2E 0%, #0A1628 100%);
    }
    .gradient-border::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, #00E5FA 0%, #00BDAE 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }
  </style>
</head>

      const IconComponent = Icons[name];

    // Categories

      { key: 'technical', name: 'Technical', icon: 'shield', color: '#00E5FA' },
      { key: 'pricing', name: 'Pricing & BOE', icon: 'trending', color: '#00D29F' },
      { key: 'strategy', name: 'Win Strategy', icon: 'trophy', color: '#F59E0B' },
      { key: 'compliance', name: 'Compliance', icon: 'check', color: '#8B5CF6' },
      { key: 'drafting', name: 'Drafting', icon: 'book', color: '#EC4899' },
      { key: 'orals', name: 'Orals Prep', icon: 'users', color: '#06B6D4' },
      { key: 'capture', name: 'Capture', icon: 'eye', color: '#EF4444' },
      { key: 'management', name: 'Management', icon: 'users', color: '#10B981' },
      { key: 'teaming', name: 'Teaming', icon: 'users', color: '#6366F1' },

    const OUTCOMES = [
      { key: 'all', name: 'All Outcomes' },
      { key: 'win', name: 'Win', color: '#00D29F' },
      { key: 'loss', name: 'Loss', color: '#EF4444' },
      { key: 'no_bid', name: 'No Bid', color: '#6B7280' },

      'Gate 1', 'Blue Team', 'Kickoff', 'Pink Team', 'Red Team', 'Gold Team', 'White Glove', 'Final Submission', 'Orals', 'Post-Award'
    ];

    // Demo Data
    const DEMO_LESSONS = [

        outcome: 'win',
        impact_level: 'critical',

        customer_agency: 'DHA',
        root_cause: 'Previous summaries focused on technical capabilities rather than patient outcomes',
        recommendation: 'Lead with quantified patient outcomes, not technical architecture',
        quality_score: 95,
        use_count: 47,
        contracts_won: 8,
        contracts_applied: 12,
        is_starred: true,
        is_playbook: true,
        tags: ['dha', 'executive-summary', 'pink-team'],
        created_at: '2025-01-15T10:00:00Z',
      },
      {
        id: 'demo-2',
        lesson_code: 'LL-202501-0002',
        title: 'LCAT Rate Justification Formula',
        description: 'Step-by-step approach for justifying LCAT rates against GSA schedules with variance analysis.',
        category: 'pricing',
        outcome: 'win',
        impact_level: 'high',
        lifecycle_phase: 'Red Team',
        customer_agency: 'VA',
        root_cause: 'Pricing reviewers questioned rate basis without GSA benchmark comparison',
        recommendation: 'Include GSA schedule comparison table with delta justification',
        quality_score: 88,
        use_count: 34,
        contracts_won: 5,
        contracts_applied: 7,
        is_starred: true,
        is_playbook: false,
        tags: ['pricing', 'lcat', 'gsa', 'rates'],
        created_at: '2025-01-10T14:00:00Z',
      },
      {
        id: 'demo-3',
        lesson_code: 'LL-202501-0003',
        title: 'MHS GENESIS Migration Compliance',
        description: 'Required compliance artifacts for MHS GENESIS migration proposals including HIPAA and FedRAMP documentation.',
        category: 'compliance',
        outcome: 'win',
        impact_level: 'critical',
        lifecycle_phase: 'Gold Team',
        customer_agency: 'DHA',
        root_cause: 'Missing FedRAMP inheritance documentation caused rejection',
        recommendation: 'Create compliance matrix mapping all HIPAA/FedRAMP controls to solution components',
        quality_score: 92,
        use_count: 28,
        contracts_won: 4,
        contracts_applied: 5,
        is_starred: false,
        is_playbook: true,
        tags: ['compliance', 'mhs-genesis', 'hipaa', 'fedramp'],
        created_at: '2025-01-08T09:00:00Z',
      },
      {
        id: 'demo-4',
        lesson_code: 'LL-202501-0004',
        title: 'Black Hat Intel Collection Timing',
        description: 'Conduct competitor intel gathering minimum 30 days before RFP release for strategic positioning.',
        category: 'strategy',
        outcome: 'loss',
        impact_level: 'high',
        lifecycle_phase: 'Gate 1',
        customer_agency: 'CMS',
        root_cause: 'Late competitor analysis left insufficient time to differentiate solution',
        recommendation: 'Initiate Black Hat process at opportunity identification, not RFP release',
        quality_score: 78,

        recommendation: 'Create adversarial Q&A bank with 200+ questions from evaluator perspective',
        quality_score: 94,
        use_count: 22,

        contracts_applied: 7,

        is_playbook: true,
        tags: ['orals', 'rehearsal', 'q&a', 'presentation'],

    // Main App
    function LessonsLearnedApp() {
      const [lessons, setLessons] = useState(DEMO_LESSONS);
      const [loading, setLoading] = useState(true);
      const [user, setUser] = useState(null);
      const [searchTerm, setSearchTerm] = useState('');
      const [categoryFilter, setCategoryFilter] = useState('all');
      const [outcomeFilter, setOutcomeFilter] = useState('all');
      const [showStarredOnly, setShowStarredOnly] = useState(false);
      const [showPlaybookOnly, setShowPlaybookOnly] = useState(false);
      const [selectedLesson, setSelectedLesson] = useState(null);
      const [showAddModal, setShowAddModal] = useState(false);

      useEffect(() => {
        checkAuth();
        loadLessons();
      }, []);

      const checkAuth = async () => {
        const { data: { session } } = await sbClient.auth.getSession();
        if (session?.user) {
          setUser(session.user);
        }
      };

      const loadLessons = async () => {
        setLoading(true);
        try {
          const { data, error } = await sbClient
            .from('lessons_learned')
            .select('*')
            .order('created_at', { ascending: false });

          if (error) throw error;
          if (data && data.length > 0) {
            setLessons(data);
          }
        } catch (err) {
          console.log('Using demo data:', err.message);
        } finally {
          setLoading(false);
        }
      };

      const toggleStar = async (lessonId) => {
        const lesson = lessons.find(l => l.id === lessonId);
        const newStarred = !lesson.is_starred;
        
        setLessons(prev => prev.map(l => 
          l.id === lessonId ? { ...l, is_starred: newStarred } : l
        ));

        try {
          await sbClient
            .from('lessons_learned')
            .update({ is_starred: newStarred })
            .eq('id', lessonId);
        } catch (err) {
          console.log('Star update failed:', err.message);
        }
      };

      const filteredLessons = lessons.filter(lesson => {
        if (searchTerm && !lesson.title.toLowerCase().includes(searchTerm.toLowerCase()) &&
            !lesson.description?.toLowerCase().includes(searchTerm.toLowerCase())) {
          return false;
        }
        if (categoryFilter !== 'all' && lesson.category !== categoryFilter) return false;
        if (outcomeFilter !== 'all' && lesson.outcome !== outcomeFilter) return false;
        if (showStarredOnly && !lesson.is_starred) return false;
        if (showPlaybookOnly && !lesson.is_playbook) return false;
        return true;
      });

      const stats = {
        total: lessons.length,
        starred: lessons.filter(l => l.is_starred).length,
        playbook: lessons.filter(l => l.is_playbook).length,
        wins: lessons.filter(l => l.outcome === 'win').length,
        avgQuality: Math.round(lessons.reduce((acc, l) => acc + (l.quality_score || 0), 0) / lessons.length),
      };

                  <div className="w-px h-6 bg-white/20" />
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center">
                      <Icon name="lightbulb" className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white">Lessons Learned Repository</h1>
                      <p className="text-xs text-gray-400">Capture & reuse winning strategies</p>
                    </div>
                  </div>
                </div>

                <div className="flex items-center gap-3">

                    onClick={() => setShowAddModal(true)}
                    className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-blue-600 text-white rounded-lg font-medium hover:opacity-90 transition-opacity flex items-center gap-2"
                  >
                    <Icon name="plus" className="w-4 h-4" />
                    Add Lesson
                  </button>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8">
            {/* Stats Cards */}
            <div className="grid grid-cols-5 gap-4 mb-8">
              {[
                { label: 'Total Lessons', value: stats.total, icon: 'book', color: '#00E5FA' },
                { label: 'Starred', value: stats.starred, icon: 'star', color: '#F59E0B' },
                { label: 'In Playbook', value: stats.playbook, icon: 'trophy', color: '#8B5CF6' },
                { label: 'From Wins', value: stats.wins, icon: 'check', color: '#00D29F' },
                { label: 'Avg Quality', value: `${stats.avgQuality}%`, icon: 'trending', color: '#EC4899' },
              ].map((stat, idx) => (
                <div key={idx} className="glass-card rounded-xl p-4">
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-gray-400 text-sm">{stat.label}</span>
                    <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ background: `${stat.color}20` }}>
                      <Icon name={stat.icon} className="w-4 h-4" style={{ color: stat.color }} />
                    </div>
                  </div>
                  <div className="text-2xl font-bold text-white">{stat.value}</div>
                </div>
              ))}
            </div>

            {/* Filters */}
            <div className="glass-card rounded-xl p-4 mb-6">
              <div className="flex items-center gap-4 flex-wrap">
                <div className="flex-1 min-w-[300px] relative">
                  <Icon name="search" className="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                  <input
                    type="text"
                    placeholder="Search lessons..."
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                    className="w-full pl-10 pr-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-cyan-500"
                  />
                </div>

                <select
                  value={categoryFilter}
                  onChange={(e) => setCategoryFilter(e.target.value)}
                  className="px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-cyan-500"
                >
                  {CATEGORIES.map(cat => (
                    <option key={cat.key} value={cat.key}>{cat.name}</option>
                  ))}
                </select>

                <select
                  value={outcomeFilter}
                  onChange={(e) => setOutcomeFilter(e.target.value)}
                  className="px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-cyan-500"
                >
                  {OUTCOMES.map(out => (
                    <option key={out.key} value={out.key}>{out.name}</option>
                  ))}
                </select>

                <button
                  onClick={() => setShowStarredOnly(!showStarredOnly)}
                  className={`px-4 py-2 rounded-lg border transition-all flex items-center gap-2 ${
                    showStarredOnly 
                      ? 'bg-amber-500/20 border-amber-500 text-amber-400' 
                      : 'bg-[#0A1628] border-white/10 text-gray-400 hover:text-white'

                  <Icon name={showStarredOnly ? 'star' : 'starOutline'} className="w-4 h-4" />

                </button>

                <button
                  onClick={() => setShowPlaybookOnly(!showPlaybookOnly)}
                  className={`px-4 py-2 rounded-lg border transition-all flex items-center gap-2 ${
                    showPlaybookOnly 
                      ? 'bg-purple-500/20 border-purple-500 text-purple-400' 
                      : 'bg-[#0A1628] border-white/10 text-gray-400 hover:text-white'
                  }`}
                >
                  <Icon name="trophy" className="w-4 h-4" />
                  Playbook
                </button>
              </div>
            </div>

            {loading ? (
              <div className="flex items-center justify-center py-20">
                <div className="w-8 h-8 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin" />
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {filteredLessons.map((lesson, idx) => {
                  const category = CATEGORIES.find(c => c.key === lesson.category) || CATEGORIES[0];
                  const outcome = OUTCOMES.find(o => o.key === lesson.outcome);
                  
                  return (
                    <div
                      key={lesson.id}
                      className="glass-card rounded-xl p-5 hover:border-cyan-500/30 transition-all cursor-pointer animate-slideUp"
                      style={{ animationDelay: `${idx * 50}ms` }}
                      onClick={() => setSelectedLesson(lesson)}
                    >
                      <div className="flex items-start justify-between mb-3">
                        <span className="text-xs text-gray-500 font-mono">{lesson.lesson_code}</span>
                        <div className="flex items-center gap-2">
                          {lesson.is_playbook && (
                            <span className="px-2 py-0.5 bg-purple-500/20 text-purple-400 text-xs rounded-full">
                              Playbook
                            </span>
                          )}
                          <button
                            onClick={(e) => { e.stopPropagation(); toggleStar(lesson.id); }}
                            className={`p-1 rounded transition-colors ${lesson.is_starred ? 'text-amber-400' : 'text-gray-500 hover:text-amber-400'}`}
                          >
                            <Icon name={lesson.is_starred ? 'star' : 'starOutline'} className="w-4 h-4" />
                          </button>
                        </div>
                      </div>

                      <h3 className="font-semibold text-white mb-2 line-clamp-2">{lesson.title}</h3>
                      <p className="text-sm text-gray-400 mb-4 line-clamp-2">{lesson.description}</p>

                      <div className="flex items-center gap-2 flex-wrap mb-4">
                        <span 
                          className="px-2 py-1 rounded-full text-xs font-medium"
                          style={{ background: `${category.color}20`, color: category.color }}
                        >
                          {category.name}
                        </span>
                        {outcome && (
                          <span 
                            className="px-2 py-1 rounded-full text-xs font-medium"
                            style={{ background: `${outcome.color}20`, color: outcome.color }}
                          >
                            {outcome.name}
                          </span>
                        )}
                        {lesson.customer_agency && (
                          <span className="px-2 py-1 bg-white/5 text-gray-400 rounded-full text-xs">
                            {lesson.customer_agency}
                          </span>
                        )}
                      </div>

                      <div className="flex items-center justify-between text-xs text-gray-500">
                        <div className="flex items-center gap-3">
                          <span className="flex items-center gap-1">
                            <Icon name="eye" className="w-3 h-3" />
                            {lesson.use_count} uses
                          </span>
                          <span className="flex items-center gap-1">
                            <Icon name="trophy" className="w-3 h-3" />
                            {lesson.contracts_won}/{lesson.contracts_applied} wins
                          </span>
                        </div>
                        <div className="flex items-center gap-1">
                          <div className="w-12 h-1.5 bg-white/10 rounded-full overflow-hidden">
                            <div 
                              className="h-full rounded-full" 
                              style={{ 
                                width: `${lesson.quality_score}%`,
                                background: lesson.quality_score >= 90 ? '#00D29F' : lesson.quality_score >= 70 ? '#F59E0B' : '#EF4444'
                              }} 
                            />
                          </div>
                          <span>{lesson.quality_score}%</span>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {filteredLessons.length === 0 && !loading && (
              <div className="text-center py-20">
                <Icon name="book" className="w-16 h-16 text-gray-600 mx-auto mb-4" />
                <h3 className="text-xl font-semibold text-gray-400 mb-2">No lessons found</h3>
                <p className="text-gray-500">Try adjusting your filters or add a new lesson</p>
              </div>
            )}
          </main>

          {/* Lesson Detail Modal */}
          {selectedLesson && (
            <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setSelectedLesson(null)}>
              <div className="glass-card rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                <div className="p-6 border-b border-white/10">
                  <div className="flex items-start justify-between">
                    <div>
                      <span className="text-xs text-gray-500 font-mono">{selectedLesson.lesson_code}</span>
                      <h2 className="text-xl font-bold text-white mt-1">{selectedLesson.title}</h2>
                    </div>
                    <button onClick={() => setSelectedLesson(null)} className="p-2 text-gray-400 hover:text-white">
                      <Icon name="x" className="w-5 h-5" />
                    </button>
                  </div>
                </div>

                <div className="p-6 space-y-6">
                  <div>
                    <h4 className="text-sm font-medium text-gray-400 mb-2">Description</h4>
                    <p className="text-white">{selectedLesson.description}</p>
                  </div>

                  {selectedLesson.root_cause && (
                    <div>
                      <h4 className="text-sm font-medium text-gray-400 mb-2">Root Cause</h4>
                      <p className="text-white">{selectedLesson.root_cause}</p>
                    </div>
                  )}

                  {selectedLesson.recommendation && (
                    <div>
                      <h4 className="text-sm font-medium text-gray-400 mb-2">Recommendation</h4>
                      <p className="text-cyan-400">{selectedLesson.recommendation}</p>
                    </div>
                  )}

                  <div className="grid grid-cols-2 gap-4">
                    <div className="bg-[#0A1628] rounded-lg p-4">
                      <span className="text-xs text-gray-500">Category</span>
                      <p className="text-white font-medium">{CATEGORIES.find(c => c.key === selectedLesson.category)?.name}</p>
                    </div>
                    <div className="bg-[#0A1628] rounded-lg p-4">
                      <span className="text-xs text-gray-500">Lifecycle Phase</span>
                      <p className="text-white font-medium">{selectedLesson.lifecycle_phase}</p>
                    </div>
                    <div className="bg-[#0A1628] rounded-lg p-4">
                      <span className="text-xs text-gray-500">Customer Agency</span>
                      <p className="text-white font-medium">{selectedLesson.customer_agency || 'N/A'}</p>
                    </div>
                    <div className="bg-[#0A1628] rounded-lg p-4">
                      <span className="text-xs text-gray-500">Quality Score</span>
                      <p className="text-white font-medium">{selectedLesson.quality_score}%</p>
                    </div>
                  </div>

                  {selectedLesson.tags && selectedLesson.tags.length > 0 && (
                    <div>
                      <h4 className="text-sm font-medium text-gray-400 mb-2">Tags</h4>
                      <div className="flex flex-wrap gap-2">
                        {selectedLesson.tags.map((tag, i) => (
                          <span key={i} className="px-3 py-1 bg-white/5 text-gray-300 rounded-full text-sm">
                            #{tag}
                          </span>
                        ))}
                      </div>
                    </div>
                  )}
                </div>

                <div className="p-6 border-t border-white/10 flex justify-end gap-3">
                  <button className="px-4 py-2 bg-[#0A1628] text-gray-300 rounded-lg hover:text-white transition-colors flex items-center gap-2">
                    <Icon name="export" className="w-4 h-4" />
                    Export
                  </button>
                  <button 
                    onClick={() => toggleStar(selectedLesson.id)}
                    className={`px-4 py-2 rounded-lg transition-colors flex items-center gap-2 ${
                      selectedLesson.is_starred 
                        ? 'bg-amber-500/20 text-amber-400' 
                        : 'bg-[#0A1628] text-gray-300 hover:text-amber-400'
                    }`}
                  >
                    <Icon name={selectedLesson.is_starred ? 'star' : 'starOutline'} className="w-4 h-4" />
                    {selectedLesson.is_starred ? 'Starred' : 'Star'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Add Lesson Modal */}
          {showAddModal && (
            <AddLessonModal 
              onClose={() => setShowAddModal(false)}
              onSave={(newLesson) => {
                setLessons(prev => [newLesson, ...prev]);
                setShowAddModal(false);
              }}
            />
          )}

          {/* Footer */}
          <footer className="border-t border-white/10 py-4 mt-12">
            <div className="max-w-7xl mx-auto px-6 text-center text-xs text-gray-500">
              © 2026 Mission Meets Tech • MissionPulse v2.0 • Sprint 54
            </div>
          </footer>
        </div>
      );
    }

    // Add Lesson Modal Component
    function AddLessonModal({ onClose, onSave }) {
      const [formData, setFormData] = useState({
        title: '',
        description: '',
        category: 'technical',
        outcome: 'pending',
        impact_level: 'medium',
        lifecycle_phase: 'Kickoff',
        customer_agency: '',
        root_cause: '',
        recommendation: '',
        tags: '',
      });

      const handleSubmit = async (e) => {
        e.preventDefault();
        
        const newLesson = {
          ...formData,
          id: `temp-${Date.now()}`,
          lesson_code: `LL-${new Date().toISOString().slice(0,7).replace('-','')}-${Math.floor(Math.random()*9000)+1000}`,
          tags: formData.tags.split(',').map(t => t.trim()).filter(Boolean),
          quality_score: 75,
          use_count: 0,
          contracts_won: 0,
          contracts_applied: 0,
          is_starred: false,
          is_playbook: false,
          created_at: new Date().toISOString(),
        };

        try {
          const { data, error } = await sbClient
            .from('lessons_learned')
            .insert([{
              ...formData,
              tags: newLesson.tags,
            }])
            .select()
            .single();

          if (error) throw error;
          onSave(data || newLesson);
        } catch (err) {
          console.log('Using local save:', err.message);
          onSave(newLesson);
        }
      };

      return (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="glass-card rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="p-6 border-b border-white/10">
              <div className="flex items-center justify-between">
                <h2 className="text-xl font-bold text-white">Add New Lesson</h2>
                <button onClick={onClose} className="p-2 text-gray-400 hover:text-white">
                  <Icon name="x" className="w-5 h-5" />
                </button>
              </div>
            </div>

            <form onSubmit={handleSubmit} className="p-6 space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-400 mb-1">Title *</label>
                <input
                  type="text"
                  required
                  value={formData.title}
                  onChange={(e) => setFormData(prev => ({ ...prev, title: e.target.value }))}
                  className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-cyan-500"
                  placeholder="e.g., DHA Executive Summary Best Practice"
                />
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-400 mb-1">Description *</label>
                <textarea
                  required
                  rows={3}
                  value={formData.description}
                  onChange={(e) => setFormData(prev => ({ ...prev, description: e.target.value }))}
                  className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-cyan-500"
                  placeholder="Describe the lesson learned..."
                />
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-gray-400 mb-1">Category</label>
                  <select
                    value={formData.category}
                    onChange={(e) => setFormData(prev => ({ ...prev, category: e.target.value }))}
                    className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-cyan-500"
                  >
                    {CATEGORIES.filter(c => c.key !== 'all').map(cat => (
                      <option key={cat.key} value={cat.key}>{cat.name}</option>
                    ))}
                  </select>
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-400 mb-1">Outcome</label>
                  <select
                    value={formData.outcome}
                    onChange={(e) => setFormData(prev => ({ ...prev, outcome: e.target.value }))}
                    className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-cyan-500"
                  >
                    {OUTCOMES.filter(o => o.key !== 'all').map(out => (
                      <option key={out.key} value={out.key}>{out.name}</option>
                    ))}
                  </select>
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-400 mb-1">Impact Level</label>
                  <select
                    value={formData.impact_level}
                    onChange={(e) => setFormData(prev => ({ ...prev, impact_level: e.target.value }))}
                    className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-cyan-500"
                  >
                    <option value="critical">Critical</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                  </select>
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-400 mb-1">Lifecycle Phase</label>
                  <select
                    value={formData.lifecycle_phase}
                    onChange={(e) => setFormData(prev => ({ ...prev, lifecycle_phase: e.target.value }))}
                    className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-cyan-500"
                  >
                    {LIFECYCLE_PHASES.map(phase => (
                      <option key={phase} value={phase}>{phase}</option>
                    ))}
                  </select>
                </div>
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-400 mb-1">Customer Agency</label>
                <input
                  type="text"
                  value={formData.customer_agency}
                  onChange={(e) => setFormData(prev => ({ ...prev, customer_agency: e.target.value }))}
                  className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-cyan-500"
                  placeholder="e.g., DHA, VA, CMS"
                />
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-400 mb-1">Root Cause</label>
                <textarea
                  rows={2}
                  value={formData.root_cause}
                  onChange={(e) => setFormData(prev => ({ ...prev, root_cause: e.target.value }))}
                  className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-cyan-500"
                  placeholder="What caused the issue or success?"
                />
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-400 mb-1">Recommendation</label>
                <textarea
                  rows={2}
                  value={formData.recommendation}
                  onChange={(e) => setFormData(prev => ({ ...prev, recommendation: e.target.value }))}
                  className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-cyan-500"
                  placeholder="What should future teams do?"
                />
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-400 mb-1">Tags (comma separated)</label>
                <input
                  type="text"
                  value={formData.tags}
                  onChange={(e) => setFormData(prev => ({ ...prev, tags: e.target.value }))}
                  className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-cyan-500"
                  placeholder="e.g., dha, pricing, compliance"
                />
              </div>

              <div className="flex justify-end gap-3 pt-4">
                <button
                  type="button"
                  onClick={onClose}
                  className="px-4 py-2 bg-[#0A1628] text-gray-300 rounded-lg hover:text-white transition-colors"
                >
                  Cancel
                </button>
                <button
                  type="submit"
                  className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-blue-600 text-white rounded-lg font-medium hover:opacity-90 transition-opacity"
                >
                  Save Lesson
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    ReactDOM.render(<LessonsLearnedApp />, document.getElementById('root'));
  </script>
</body>
</html>
