<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lessons Learned | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.15); }
        .glass-card:hover { border-color: rgba(0,229,250,0.3); }
        .cyan-glow { box-shadow: 0 0 30px rgba(0,229,250,0.3); }
    </style>
</head>
<body class="min-h-screen text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const supabaseUrl = 'https://djuviwarqdvlbgcfuupa.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc0OTc5MzMsImV4cCI6MjA1MzA3MzkzM30.pBPpVaJmVkzhCcUvJPN2KnMGnstuc55sNv8CVsERRPg';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const DEMO_LESSONS = [
            { id: '1', title: 'Early Teaming Identification', category: 'teaming', outcome: 'win', lesson_type: 'success', description: 'Identified SDVOSB partner 6 weeks before RFP release, allowing time to develop joint solution.', recommendation: 'Start teaming partner search during pre-RFP phase.', impact_area: ['teaming', 'timeline'], tags: ['SDVOSB', 'DHA', 'early-engagement'], source_phase: 'Pre-RFP' },
            { id: '2', title: 'Pricing Compliance Gap', category: 'pricing', outcome: 'loss', lesson_type: 'improvement', description: 'Lost points due to missing SF1408 certification. Discovered during final review.', root_cause: 'No compliance checklist for pricing volume.', recommendation: 'Add SF1408 check to standard pricing checklist.', impact_area: ['pricing', 'compliance'], tags: ['SF1408', 'cost-realism'], source_phase: 'Final Review' },
            { id: '3', title: 'Oral Presentation Rehearsal', category: 'orals', outcome: 'win', lesson_type: 'success', description: 'Conducted 5 rehearsals including mock Q&A with external evaluators. Team scored Outstanding.', recommendation: 'Minimum 4 rehearsals for any oral presentation.', impact_area: ['orals', 'preparation'], tags: ['rehearsal', 'Outstanding'], source_phase: 'Orals Prep' },
            { id: '4', title: 'Late Amendment Integration', category: 'compliance', outcome: 'loss', lesson_type: 'avoid', description: 'Amendment 3 changed page limits. Discovered 24 hours before submission.', root_cause: 'No systematic amendment tracking process.', recommendation: 'Check SAM.gov daily during final week. Use amendment tracker.', impact_area: ['compliance', 'process'], tags: ['amendment', 'page-limits'], source_phase: 'Final Submission' },
            { id: '5', title: 'Win Theme Consistency', category: 'technical', outcome: 'win', lesson_type: 'success', description: 'Used "Mission-Ready AI" theme consistently across all volumes. Evaluators noted cohesive story.', recommendation: 'Establish 3 max win themes and enforce across all sections.', impact_area: ['technical', 'strategy'], tags: ['win-theme', 'consistency'], source_phase: 'Writing' }
        ];

        const CATEGORIES = ['technical', 'management', 'pricing', 'compliance', 'teaming', 'orals', 'process', 'other'];
        const OUTCOMES = ['win', 'loss', 'no-bid', 'protest'];
        const LESSON_TYPES = ['success', 'improvement', 'avoid'];

        function LessonsLearned() {
            const [lessons, setLessons] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showModal, setShowModal] = useState(false);
            const [selectedLesson, setSelectedLesson] = useState(null);
            const [filterCategory, setFilterCategory] = useState('all');
            const [filterOutcome, setFilterOutcome] = useState('all');
            const [filterType, setFilterType] = useState('all');
            const [searchTerm, setSearchTerm] = useState('');
            const [newLesson, setNewLesson] = useState({
                title: '', category: 'technical', outcome: 'win', lesson_type: 'success',
                description: '', root_cause: '', recommendation: '', source_phase: '', tags: ''
            });

            useEffect(() => {
                fetchLessons();
            }, []);

            async function fetchLessons() {
                try {
                    const { data, error } = await supabase.from('lessons_learned').select('*').order('created_at', { ascending: false });
                    if (error) throw error;
                    setLessons(data?.length > 0 ? data : DEMO_LESSONS);
                } catch (err) {
                    console.log('Using demo data:', err.message);
                    setLessons(DEMO_LESSONS);
                }
                setLoading(false);
            }

            async function handleSave() {
                const lessonData = {
                    ...newLesson,
                    tags: newLesson.tags.split(',').map(t => t.trim()).filter(Boolean),
                    impact_area: [newLesson.category]
                };
                try {
                    const { error } = await supabase.from('lessons_learned').insert([lessonData]);
                    if (error) throw error;
                    fetchLessons();
                } catch (err) {
                    setLessons([{ id: Date.now().toString(), ...lessonData, created_at: new Date().toISOString() }, ...lessons]);
                }
                setShowModal(false);
                setNewLesson({ title: '', category: 'technical', outcome: 'win', lesson_type: 'success', description: '', root_cause: '', recommendation: '', source_phase: '', tags: '' });
            }

            const filteredLessons = lessons.filter(l => {
                if (filterCategory !== 'all' && l.category !== filterCategory) return false;
                if (filterOutcome !== 'all' && l.outcome !== filterOutcome) return false;
                if (filterType !== 'all' && l.lesson_type !== filterType) return false;
                if (searchTerm && !l.title.toLowerCase().includes(searchTerm.toLowerCase()) && 
                    !l.description?.toLowerCase().includes(searchTerm.toLowerCase())) return false;
                return true;
            });

            const stats = {
                total: lessons.length,
                wins: lessons.filter(l => l.outcome === 'win').length,
                losses: lessons.filter(l => l.outcome === 'loss').length,
                successes: lessons.filter(l => l.lesson_type === 'success').length
            };

            const outcomeColor = (outcome) => ({
                'win': 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30',
                'loss': 'bg-red-500/20 text-red-400 border-red-500/30',
                'no-bid': 'bg-gray-500/20 text-gray-400 border-gray-500/30',
                'protest': 'bg-amber-500/20 text-amber-400 border-amber-500/30'
            }[outcome] || 'bg-gray-500/20 text-gray-400');

            const typeIcon = (type) => ({
                'success': '✅',
                'improvement': '📈',
                'avoid': '⚠️'
            }[type] || '📝');

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="border-b border-cyan-500/20 bg-black/40 backdrop-blur-xl sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <a href="index.html" className="text-cyan-400 hover:text-cyan-300">← Back</a>
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-amber-400 to-orange-600 flex items-center justify-center text-xl">🎓</div>
                                    <div>
                                        <h1 className="text-xl font-bold">Lessons Learned</h1>
                                        <p className="text-xs text-gray-400">Capture Knowledge • Improve Win Rates</p>
                                    </div>
                                </div>
                            </div>
                            <button onClick={() => setShowModal(true)} className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium transition-all">
                                + Add Lesson
                            </button>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto px-6 py-8">
                        {/* Stats */}
                        <div className="grid grid-cols-4 gap-4 mb-8">
                            <div className="glass-card rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-cyan-400">{stats.total}</div>
                                <div className="text-sm text-gray-400">Total Lessons</div>
                            </div>
                            <div className="glass-card rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-emerald-400">{stats.wins}</div>
                                <div className="text-sm text-gray-400">From Wins</div>
                            </div>
                            <div className="glass-card rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-red-400">{stats.losses}</div>
                                <div className="text-sm text-gray-400">From Losses</div>
                            </div>
                            <div className="glass-card rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-amber-400">{stats.successes}</div>
                                <div className="text-sm text-gray-400">Best Practices</div>
                            </div>
                        </div>

                        {/* Filters */}
                        <div className="glass-card rounded-xl p-4 mb-6">
                            <div className="flex flex-wrap gap-4 items-center">
                                <input
                                    type="text"
                                    placeholder="Search lessons..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    className="flex-1 min-w-[200px] bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                                />
                                <select value={filterCategory} onChange={(e) => setFilterCategory(e.target.value)} className="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm">
                                    <option value="all">All Categories</option>
                                    {CATEGORIES.map(c => <option key={c} value={c}>{c.charAt(0).toUpperCase() + c.slice(1)}</option>)}
                                </select>
                                <select value={filterOutcome} onChange={(e) => setFilterOutcome(e.target.value)} className="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm">
                                    <option value="all">All Outcomes</option>
                                    {OUTCOMES.map(o => <option key={o} value={o}>{o.charAt(0).toUpperCase() + o.slice(1)}</option>)}
                                </select>
                                <select value={filterType} onChange={(e) => setFilterType(e.target.value)} className="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm">
                                    <option value="all">All Types</option>
                                    {LESSON_TYPES.map(t => <option key={t} value={t}>{t.charAt(0).toUpperCase() + t.slice(1)}</option>)}
                                </select>
                            </div>
                        </div>

                        {/* Lessons Grid */}
                        {loading ? (
                            <div className="text-center py-20 text-gray-400">Loading lessons...</div>
                        ) : (
                            <div className="grid gap-4">
                                {filteredLessons.map(lesson => (
                                    <div key={lesson.id} className="glass-card rounded-xl p-6 hover:border-cyan-500/40 transition-all cursor-pointer" onClick={() => setSelectedLesson(lesson)}>
                                        <div className="flex items-start justify-between mb-3">
                                            <div className="flex items-center gap-3">
                                                <span className="text-2xl">{typeIcon(lesson.lesson_type)}</span>
                                                <div>
                                                    <h3 className="font-semibold text-lg">{lesson.title}</h3>
                                                    <div className="flex items-center gap-2 mt-1">
                                                        <span className={`px-2 py-0.5 rounded text-xs border ${outcomeColor(lesson.outcome)}`}>
                                                            {lesson.outcome?.toUpperCase()}
                                                        </span>
                                                        <span className="px-2 py-0.5 rounded text-xs bg-cyan-500/20 text-cyan-400 border border-cyan-500/30">
                                                            {lesson.category}
                                                        </span>
                                                        {lesson.source_phase && (
                                                            <span className="text-xs text-gray-500">• {lesson.source_phase}</span>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <p className="text-gray-300 text-sm mb-3">{lesson.description}</p>
                                        {lesson.recommendation && (
                                            <div className="bg-cyan-500/10 border border-cyan-500/20 rounded-lg p-3">
                                                <div className="text-xs text-cyan-400 mb-1">💡 Recommendation</div>
                                                <div className="text-sm">{lesson.recommendation}</div>
                                            </div>
                                        )}
                                        {lesson.tags?.length > 0 && (
                                            <div className="flex gap-2 mt-3 flex-wrap">
                                                {lesson.tags.map((tag, i) => (
                                                    <span key={i} className="px-2 py-0.5 bg-white/5 rounded text-xs text-gray-400">#{tag}</span>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                ))}
                                {filteredLessons.length === 0 && (
                                    <div className="text-center py-12 text-gray-500">No lessons found matching your filters.</div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* Add Modal */}
                    {showModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                            <div className="glass-card rounded-2xl p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                                <h2 className="text-xl font-bold mb-6">Add Lesson Learned</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-1">Title *</label>
                                        <input type="text" value={newLesson.title} onChange={(e) => setNewLesson({...newLesson, title: e.target.value})}
                                            className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                    </div>
                                    <div className="grid grid-cols-3 gap-4">
                                        <div>
                                            <label className="block text-sm text-gray-400 mb-1">Category</label>
                                            <select value={newLesson.category} onChange={(e) => setNewLesson({...newLesson, category: e.target.value})}
                                                className="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2">
                                                {CATEGORIES.map(c => <option key={c} value={c}>{c.charAt(0).toUpperCase() + c.slice(1)}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm text-gray-400 mb-1">Outcome</label>
                                            <select value={newLesson.outcome} onChange={(e) => setNewLesson({...newLesson, outcome: e.target.value})}
                                                className="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2">
                                                {OUTCOMES.map(o => <option key={o} value={o}>{o.charAt(0).toUpperCase() + o.slice(1)}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm text-gray-400 mb-1">Lesson Type</label>
                                            <select value={newLesson.lesson_type} onChange={(e) => setNewLesson({...newLesson, lesson_type: e.target.value})}
                                                className="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2">
                                                {LESSON_TYPES.map(t => <option key={t} value={t}>{t.charAt(0).toUpperCase() + t.slice(1)}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-1">Description *</label>
                                        <textarea value={newLesson.description} onChange={(e) => setNewLesson({...newLesson, description: e.target.value})}
                                            rows={3} className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                    </div>
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-1">Root Cause (for losses)</label>
                                        <textarea value={newLesson.root_cause} onChange={(e) => setNewLesson({...newLesson, root_cause: e.target.value})}
                                            rows={2} className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                    </div>
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-1">Recommendation</label>
                                        <textarea value={newLesson.recommendation} onChange={(e) => setNewLesson({...newLesson, recommendation: e.target.value})}
                                            rows={2} className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm text-gray-400 mb-1">Source Phase</label>
                                            <input type="text" value={newLesson.source_phase} onChange={(e) => setNewLesson({...newLesson, source_phase: e.target.value})}
                                                placeholder="e.g., Final Review, Orals Prep"
                                                className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                        </div>
                                        <div>
                                            <label className="block text-sm text-gray-400 mb-1">Tags (comma-separated)</label>
                                            <input type="text" value={newLesson.tags} onChange={(e) => setNewLesson({...newLesson, tags: e.target.value})}
                                                placeholder="e.g., DHA, pricing, SDVOSB"
                                                className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                        </div>
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 mt-6">
                                    <button onClick={() => setShowModal(false)} className="px-4 py-2 border border-white/20 rounded-lg hover:bg-white/5">Cancel</button>
                                    <button onClick={handleSave} disabled={!newLesson.title || !newLesson.description}
                                        className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium disabled:opacity-50">Save Lesson</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Detail Modal */}
                    {selectedLesson && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4" onClick={() => setSelectedLesson(null)}>
                            <div className="glass-card rounded-2xl p-6 w-full max-w-2xl" onClick={e => e.stopPropagation()}>
                                <div className="flex items-start justify-between mb-4">
                                    <div className="flex items-center gap-3">
                                        <span className="text-3xl">{typeIcon(selectedLesson.lesson_type)}</span>
                                        <div>
                                            <h2 className="text-xl font-bold">{selectedLesson.title}</h2>
                                            <div className="flex items-center gap-2 mt-1">
                                                <span className={`px-2 py-0.5 rounded text-xs border ${outcomeColor(selectedLesson.outcome)}`}>
                                                    {selectedLesson.outcome?.toUpperCase()}
                                                </span>
                                                <span className="px-2 py-0.5 rounded text-xs bg-cyan-500/20 text-cyan-400">
                                                    {selectedLesson.category}
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={() => setSelectedLesson(null)} className="text-gray-400 hover:text-white">✕</button>
                                </div>
                                <div className="space-y-4">
                                    <div>
                                        <div className="text-sm text-gray-400 mb-1">Description</div>
                                        <p>{selectedLesson.description}</p>
                                    </div>
                                    {selectedLesson.root_cause && (
                                        <div className="bg-red-500/10 border border-red-500/20 rounded-lg p-3">
                                            <div className="text-sm text-red-400 mb-1">Root Cause</div>
                                            <p>{selectedLesson.root_cause}</p>
                                        </div>
                                    )}
                                    {selectedLesson.recommendation && (
                                        <div className="bg-emerald-500/10 border border-emerald-500/20 rounded-lg p-3">
                                            <div className="text-sm text-emerald-400 mb-1">💡 Recommendation</div>
                                            <p>{selectedLesson.recommendation}</p>
                                        </div>
                                    )}
                                    {selectedLesson.source_phase && (
                                        <div className="text-sm text-gray-400">
                                            <span className="font-medium">Source Phase:</span> {selectedLesson.source_phase}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<LessonsLearned />, document.getElementById('root'));
    </script>
</body>
</html>
