<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MissionPulse - Integration Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .integration-card { transition: all 0.3s ease; }
        .integration-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // =========================================================================
        // INTEGRATIONS
        // =========================================================================
        const INTEGRATIONS = [
            {
                id: 'microsoft365',
                name: 'Microsoft 365',
                icon: '📧',
                logo: '🔷',
                description: 'Sync calendar, email, and documents with Microsoft 365',
                features: ['Calendar sync', 'Email notifications', 'SharePoint docs', 'Teams chat'],
                status: 'available',
                category: 'productivity',
                docsUrl: 'https://docs.microsoft.com/en-us/graph/',
                authType: 'oauth',
                popularity: 95
            },
            {
                id: 'asksage',
                name: 'AskSage',
                icon: '🧠',
                logo: '🦉',
                description: 'FedRAMP High AI platform for DoD IL5 compliance',
                features: ['IL5 compliant', 'Secure AI chat', 'Document analysis', 'Proposal drafting'],
                status: 'available',
                category: 'ai',
                docsUrl: 'https://asksage.ai/docs',
                authType: 'api_key',
                popularity: 78,
                badge: 'FedRAMP'
            },
            {
                id: 'samgov',
                name: 'SAM.gov',
                icon: '🏛️',
                logo: '🇺🇸',
                description: 'Auto-import opportunities from SAM.gov',
                features: ['Opportunity sync', 'Entity validation', 'Award tracking', 'NAICS filtering'],
                status: 'available',
                category: 'govcon',
                docsUrl: 'https://api.sam.gov/docs/',
                authType: 'api_key',
                popularity: 92
            },
            {
                id: 'govwin',
                name: 'GovWin',
                icon: '🎯',
                logo: '🔵',
                description: 'Import intelligence from Deltek GovWin',
                features: ['Market intel', 'Competitor tracking', 'Contract history', 'Agency profiles'],
                status: 'available',
                category: 'govcon',
                docsUrl: 'https://govwin.com/api',
                authType: 'api_key',
                popularity: 85
            },
            {
                id: 'hubspot',
                name: 'HubSpot CRM',
                icon: '🔶',
                logo: '🧡',
                description: 'Sync deals and contacts with HubSpot',
                features: ['Deal sync', 'Contact import', 'Pipeline tracking', 'Activity log'],
                status: 'available',
                category: 'crm',
                docsUrl: 'https://developers.hubspot.com/',
                authType: 'oauth',
                popularity: 88
            },
            {
                id: 'salesforce',
                name: 'Salesforce',
                icon: '☁️',
                logo: '💙',
                description: 'Connect with Salesforce CRM',
                features: ['Opportunity sync', 'Account linking', 'Custom fields', 'Reports'],
                status: 'coming_soon',
                category: 'crm',
                docsUrl: 'https://developer.salesforce.com/',
                authType: 'oauth',
                popularity: 90
            },
            {
                id: 'slack',
                name: 'Slack',
                icon: '💬',
                logo: '🟣',
                description: 'Notifications and updates in Slack',
                features: ['Alerts', 'Status updates', 'Team mentions', 'Deadline reminders'],
                status: 'available',
                category: 'productivity',
                docsUrl: 'https://api.slack.com/',
                authType: 'oauth',
                popularity: 82
            },
            {
                id: 'sharepoint',
                name: 'SharePoint',
                icon: '📁',
                logo: '🟢',
                description: 'Document management with SharePoint',
                features: ['File sync', 'Version control', 'Permissions', 'Search'],
                status: 'available',
                category: 'productivity',
                docsUrl: 'https://docs.microsoft.com/en-us/sharepoint/',
                authType: 'oauth',
                popularity: 75
            },
            {
                id: 'docusign',
                name: 'DocuSign',
                icon: '✍️',
                logo: '💛',
                description: 'Electronic signatures for NDAs and TAs',
                features: ['e-Signatures', 'Document tracking', 'Templates', 'Audit trail'],
                status: 'coming_soon',
                category: 'productivity',
                docsUrl: 'https://developers.docusign.com/',
                authType: 'oauth',
                popularity: 70
            },
            {
                id: 'zapier',
                name: 'Zapier',
                icon: '⚡',
                logo: '🟠',
                description: 'Connect with 5000+ apps via Zapier',
                features: ['Custom workflows', 'Triggers', 'Actions', 'Multi-step zaps'],
                status: 'available',
                category: 'automation',
                docsUrl: 'https://zapier.com/developer/',
                authType: 'api_key',
                popularity: 80
            }
        ];

        const CATEGORIES = [
            { id: 'all', name: 'All Integrations', icon: '🔌' },
            { id: 'govcon', name: 'GovCon', icon: '🏛️' },
            { id: 'productivity', name: 'Productivity', icon: '📧' },
            { id: 'crm', name: 'CRM', icon: '💼' },
            { id: 'ai', name: 'AI', icon: '🧠' },
            { id: 'automation', name: 'Automation', icon: '⚡' }
        ];

        // =========================================================================
        // COMPONENTS
        // =========================================================================

        function IntegrationCard({ integration, onConnect, connectedIds }) {
            const isConnected = connectedIds.includes(integration.id);
            const isComingSoon = integration.status === 'coming_soon';

            return (
                <div className={`integration-card glass rounded-xl overflow-hidden ${isComingSoon ? 'opacity-60' : ''}`}>
                    <div className="p-5">
                        <div className="flex items-start justify-between mb-4">
                            <div className="flex items-center gap-3">
                                <div className="w-12 h-12 rounded-xl bg-slate-700 flex items-center justify-center text-2xl">
                                    {integration.logo}
                                </div>
                                <div>
                                    <h3 className="font-semibold text-white">{integration.name}</h3>
                                    <div className="flex items-center gap-2">
                                        {integration.badge && (
                                            <span className="px-2 py-0.5 bg-emerald-500/20 text-emerald-400 text-xs rounded">
                                                {integration.badge}
                                            </span>
                                        )}
                                        {isConnected && (
                                            <span className="px-2 py-0.5 bg-cyan-500/20 text-cyan-400 text-xs rounded">
                                                Connected
                                            </span>
                                        )}
                                        {isComingSoon && (
                                            <span className="px-2 py-0.5 bg-amber-500/20 text-amber-400 text-xs rounded">
                                                Coming Soon
                                            </span>
                                        )}
                                    </div>
                                </div>
                            </div>
                            <div className="text-right">
                                <div className="text-xs text-slate-500">Popularity</div>
                                <div className="flex items-center gap-1">
                                    <div className="w-16 h-1.5 bg-slate-700 rounded-full overflow-hidden">
                                        <div 
                                            className="h-full bg-cyan-500"
                                            style={{ width: `${integration.popularity}%` }}
                                        />
                                    </div>
                                    <span className="text-xs text-slate-400">{integration.popularity}%</span>
                                </div>
                            </div>
                        </div>

                        <p className="text-sm text-slate-400 mb-4">{integration.description}</p>

                        <div className="flex flex-wrap gap-1 mb-4">
                            {integration.features.map((feature, idx) => (
                                <span key={idx} className="px-2 py-0.5 bg-slate-800 text-slate-400 text-xs rounded">
                                    {feature}
                                </span>
                            ))}
                        </div>

                        <div className="flex gap-2 pt-3 border-t border-slate-700">
                            {isConnected ? (
                                <>
                                    <button className="flex-1 px-3 py-2 bg-slate-700 hover:bg-slate-600 text-white text-sm rounded-lg transition-colors">
                                        ⚙️ Configure
                                    </button>
                                    <button 
                                        onClick={() => onConnect(integration.id, false)}
                                        className="px-3 py-2 bg-red-500/20 hover:bg-red-500/30 text-red-400 text-sm rounded-lg transition-colors"
                                    >
                                        Disconnect
                                    </button>
                                </>
                            ) : (
                                <button
                                    onClick={() => !isComingSoon && onConnect(integration.id, true)}
                                    disabled={isComingSoon}
                                    className={`flex-1 px-3 py-2 rounded-lg text-sm font-medium transition-colors ${
                                        isComingSoon
                                            ? 'bg-slate-700 text-slate-500 cursor-not-allowed'
                                            : 'bg-cyan-500 hover:bg-cyan-400 text-slate-900'
                                    }`}
                                >
                                    {isComingSoon ? '🔔 Notify Me' : `🔌 Connect ${integration.authType === 'oauth' ? 'with OAuth' : ''}`}
                                </button>
                            )}
                            <a 
                                href={integration.docsUrl} 
                                target="_blank"
                                className="px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-400 text-sm rounded-lg transition-colors"
                            >
                                📖
                            </a>
                        </div>
                    </div>
                </div>
            );
        }

        // OAuth Modal
        function OAuthModal({ integration, isOpen, onClose, onSuccess }) {
            if (!isOpen || !integration) return null;

            const handleConnect = () => {
                // Simulate OAuth flow
                setTimeout(() => {
                    onSuccess(integration.id);
                    onClose();
                }, 1500);
            };

            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="glass rounded-2xl p-6 w-full max-w-md">
                        <div className="text-center mb-6">
                            <div className="w-16 h-16 mx-auto rounded-2xl bg-slate-700 flex items-center justify-center text-4xl mb-4">
                                {integration.logo}
                            </div>
                            <h2 className="text-xl font-bold text-white">Connect to {integration.name}</h2>
                            <p className="text-slate-400 text-sm mt-2">{integration.description}</p>
                        </div>

                        <div className="space-y-3 mb-6">
                            <div className="flex items-center gap-3 p-3 bg-slate-800 rounded-lg">
                                <span className="text-emerald-400">✓</span>
                                <span className="text-sm text-slate-300">Read access to your data</span>
                            </div>
                            <div className="flex items-center gap-3 p-3 bg-slate-800 rounded-lg">
                                <span className="text-emerald-400">✓</span>
                                <span className="text-sm text-slate-300">Sync opportunities automatically</span>
                            </div>
                            <div className="flex items-center gap-3 p-3 bg-slate-800 rounded-lg">
                                <span className="text-emerald-400">✓</span>
                                <span className="text-sm text-slate-300">Secure OAuth 2.0 authentication</span>
                            </div>
                        </div>

                        {integration.authType === 'api_key' && (
                            <div className="mb-6">
                                <label className="text-sm text-slate-400 block mb-2">API Key</label>
                                <input
                                    type="password"
                                    placeholder="Enter your API key"
                                    className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-cyan-500 focus:outline-none"
                                />
                            </div>
                        )}

                        <div className="flex gap-3">
                            <button
                                onClick={onClose}
                                className="flex-1 px-4 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-lg font-medium transition-colors"
                            >
                                Cancel
                            </button>
                            <button
                                onClick={handleConnect}
                                className="flex-1 px-4 py-3 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg font-medium transition-colors"
                            >
                                {integration.authType === 'oauth' ? 'Authorize' : 'Connect'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // =========================================================================
        // MAIN APP
        // =========================================================================
        function App() {
            const [selectedCategory, setSelectedCategory] = useState('all');
            const [connectedIds, setConnectedIds] = useState(['microsoft365', 'samgov']);
            const [selectedIntegration, setSelectedIntegration] = useState(null);
            const [showModal, setShowModal] = useState(false);

            // Filter integrations
            const filteredIntegrations = INTEGRATIONS.filter(i => 
                selectedCategory === 'all' || i.category === selectedCategory
            );

            // Handle connect/disconnect
            const handleConnect = (id, connect) => {
                if (connect) {
                    const integration = INTEGRATIONS.find(i => i.id === id);
                    setSelectedIntegration(integration);
                    setShowModal(true);
                } else {
                    setConnectedIds(prev => prev.filter(cid => cid !== id));
                }
            };

            // Handle successful connection
            const handleConnectSuccess = (id) => {
                setConnectedIds(prev => [...prev, id]);
            };

            // Stats
            const connectedCount = connectedIds.length;
            const availableCount = INTEGRATIONS.filter(i => i.status === 'available').length;

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="glass border-b border-slate-700 px-6 py-4 sticky top-0 z-20">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <a href="missionpulse-dashboard-hub.html" className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-orange-500 to-pink-500 flex items-center justify-center">
                                        <span className="text-xl">🔌</span>
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-bold text-white">Integration Hub</h1>
                                        <p className="text-xs text-slate-500">Connect your tools</p>
                                    </div>
                                </a>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-right hidden md:block">
                                    <div className="text-sm text-slate-400">{connectedCount} Connected</div>
                                    <div className="text-xs text-slate-500">{availableCount} Available</div>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-6 py-8">
                        {/* Category Filter */}
                        <div className="flex gap-2 overflow-x-auto pb-4 mb-6">
                            {CATEGORIES.map(cat => (
                                <button
                                    key={cat.id}
                                    onClick={() => setSelectedCategory(cat.id)}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-lg whitespace-nowrap transition-all ${
                                        selectedCategory === cat.id
                                            ? 'bg-cyan-500 text-slate-900'
                                            : 'bg-slate-800 text-slate-400 hover:bg-slate-700'
                                    }`}
                                >
                                    <span>{cat.icon}</span>
                                    <span>{cat.name}</span>
                                </button>
                            ))}
                        </div>

                        {/* Connected Integrations Summary */}
                        {connectedIds.length > 0 && (
                            <div className="glass rounded-xl p-4 mb-6">
                                <h3 className="font-medium text-white mb-3">Connected Integrations</h3>
                                <div className="flex flex-wrap gap-2">
                                    {connectedIds.map(id => {
                                        const int = INTEGRATIONS.find(i => i.id === id);
                                        return int ? (
                                            <span key={id} className="flex items-center gap-2 px-3 py-1.5 bg-emerald-500/20 text-emerald-400 rounded-lg text-sm">
                                                <span>{int.logo}</span>
                                                <span>{int.name}</span>
                                                <span className="text-emerald-300">●</span>
                                            </span>
                                        ) : null;
                                    })}
                                </div>
                            </div>
                        )}

                        {/* Integration Grid */}
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {filteredIntegrations.map(integration => (
                                <IntegrationCard
                                    key={integration.id}
                                    integration={integration}
                                    onConnect={handleConnect}
                                    connectedIds={connectedIds}
                                />
                            ))}
                        </div>

                        {/* API Documentation Link */}
                        <div className="glass rounded-xl p-6 mt-8 text-center">
                            <h3 className="font-semibold text-white mb-2">Need a custom integration?</h3>
                            <p className="text-slate-400 text-sm mb-4">
                                Use our REST API to build custom integrations with your existing tools.
                            </p>
                            <a 
                                href="https://missionpulse-api.onrender.com/docs"
                                target="_blank"
                                className="inline-flex items-center gap-2 px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg transition-colors"
                            >
                                📖 API Documentation
                            </a>
                        </div>
                    </main>

                    {/* OAuth Modal */}
                    <OAuthModal
                        integration={selectedIntegration}
                        isOpen={showModal}
                        onClose={() => setShowModal(false)}
                        onSuccess={handleConnectSuccess}
                    />

                    {/* Footer */}
                    <footer className="border-t border-slate-800 mt-8">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                            <span className="text-slate-500 text-sm">© 2026 Mission Meets Tech</span>
                            <span className="text-slate-600 text-xs">AI GENERATED - REQUIRES HUMAN REVIEW</span>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
