  <style>
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(0, 229, 250, 0.3); } 50% { box-shadow: 0 0 40px rgba(0, 229, 250, 0.6); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .pulse-glow { animation: pulse-glow 2s infinite; }
    .float { animation: float 3s ease-in-out infinite; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    // ============================================
    // CONFIGURATION
    // ============================================
    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const API_URL = 'https://missionpulse-api.onrender.com';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // ============================================
    // DEMO DATA (Offline Fallback)
    // ============================================
    const DEMO_STATS = {
      totalOpportunities: 12,
      pipelineValue: 847000000,
      activeProposals: 8,
      winRate: 42,
      dueThisWeek: 3,
      avgPwin: 58,
      pendingApprovals: 5,
      complianceScore: 94
    };

    const DEMO_OPPORTUNITIES = [
      { id: 1, title: 'VA EHR Modernization', agency: 'VA', phase: 'Blue Team', ceiling_value: 125000000, pwin: 72, due_date: '2026-02-15', priority: 'critical' },
      { id: 2, title: 'DHA MHS GENESIS Support', agency: 'DHA', phase: 'Red Team', ceiling_value: 89000000, pwin: 65, due_date: '2026-02-20', priority: 'high' },
      { id: 3, title: 'CMS Data Analytics', agency: 'CMS', phase: 'Capture', ceiling_value: 45000000, pwin: 55, due_date: '2026-03-01', priority: 'medium' },
      { id: 4, title: 'IHS Telehealth Platform', agency: 'IHS', phase: 'Pink Team', ceiling_value: 67000000, pwin: 48, due_date: '2026-02-28', priority: 'high' },
      { id: 5, title: 'FDA IT Infrastructure', agency: 'FDA', phase: 'Gold Team', ceiling_value: 156000000, pwin: 78, due_date: '2026-02-10', priority: 'critical' }
    ];

    const DEMO_ACTIVITIES = [
      { id: 1, action: 'Compliance check completed', module: 'Iron Dome', user: 'Sarah Chen', time: '10 min ago', icon: '✓' },
      { id: 2, action: 'Price volume updated', module: 'Pricing', user: 'Mike Torres', time: '25 min ago', icon: '💰' },
      { id: 3, action: 'Black Hat review scheduled', module: 'Black Hat', user: 'Lisa Park', time: '1 hr ago', icon: '🎭' },
      { id: 4, action: 'Win theme approved', module: 'Strategy', user: 'James Wilson', time: '2 hrs ago', icon: '🎯' },
      { id: 5, action: 'RFP shredding complete', module: 'RFP Shredder', user: 'AI Agent', time: '3 hrs ago', icon: '📄' }
    ];

    // ============================================
    // MODULE NAVIGATION
    // ============================================
    const MODULES = [
      { id: 'pipeline', name: 'Pipeline Intel', icon: '📊', href: 'missionpulse-pipeline-v2.html', category: 'Strategy' },
      { id: 'warroom', name: 'War Room', icon: '🎯', href: 'missionpulse-warroom-v2.html', category: 'Strategy' },
      { id: 'swimlane', name: 'Swimlane', icon: '📋', href: 'missionpulse-swimlane-v2.html', category: 'Strategy' },
      { id: 'rfpshredder', name: 'RFP Shredder', icon: '📄', href: 'missionpulse-rfpshredder-v2.html', category: 'Intel' },
      { id: 'contracts', name: 'Contract Scanner', icon: '⚖️', href: 'missionpulse-contracts-v2.html', category: 'Intel', badge: 'CUI' },
      { id: 'irondome', name: 'Iron Dome', icon: '🛡️', href: 'missionpulse-irondome-v2.html', category: 'Intel' },
      { id: 'blackhat', name: 'Black Hat', icon: '🎭', href: 'missionpulse-blackhat-v2.html', category: 'Intel', badge: 'RBAC', restricted: true },
      { id: 'frenemy', name: 'Frenemy Protocol', icon: '🤝', href: 'missionpulse-frenemy-v2.html', category: 'Partners' },
      { id: 'pricing', name: 'Pricing Engine', icon: '💵', href: 'missionpulse-pricing-v2.html', category: 'Delivery', badge: 'CUI' },
      { id: 'hitl', name: 'HITL Queue', icon: '👍', href: 'missionpulse-hitl-v2.html', category: 'Delivery' },
      { id: 'orals', name: 'Orals Studio', icon: '🎤', href: 'missionpulse-orals-v2.html', category: 'Delivery' },
      { id: 'launch', name: 'Launch Control', icon: '🚀', href: 'missionpulse-launchroi-v2.html', category: 'Command' },
      { id: 'lessons', name: 'Lessons Learned', icon: '📚', href: 'missionpulse-lessons-v2.html', category: 'Knowledge' },
      { id: 'audit', name: 'Audit Log', icon: '📜', href: 'missionpulse-audit-v2.html', category: 'Admin' },
      { id: 'settings', name: 'Settings', icon: '⚙️', href: 'missionpulse-settings-v2.html', category: 'Admin' },
      { id: 'hub', name: 'Module Hub', icon: '🏠', href: 'missionpulse-hub.html', category: 'Navigation' },
      { id: 'integrations', name: 'Integrations', icon: '🔌', href: 'missionpulse-integrations-v2.html', category: 'Admin' }
    ];

    // ============================================
    // PHASE COLORS
    // ============================================
    const PHASE_COLORS = {
      'Qualify': { bg: 'bg-slate-600', text: 'text-slate-300' },
      'Capture': { bg: 'bg-purple-600', text: 'text-purple-300' },
      'Blue Team': { bg: 'bg-blue-600', text: 'text-blue-300' },
      'Pink Team': { bg: 'bg-pink-600', text: 'text-pink-300' },
      'Red Team': { bg: 'bg-red-600', text: 'text-red-300' },
      'Gold Team': { bg: 'bg-amber-600', text: 'text-amber-300' },
      'White Glove': { bg: 'bg-emerald-600', text: 'text-emerald-300' },
      'Submitted': { bg: 'bg-cyan-600', text: 'text-cyan-300' }
    };

    // ============================================
    // AI ROUTER (Inline for Dashboard)
    // ============================================
    const CUI_PATTERNS = [/CUI/i, /pricing/i, /rates?/i, /competitor/i, /proprietary/i];
    
    const detectCUI = (text) => CUI_PATTERNS.some(p => p.test(text));
    
    const sendToAI = async (message, context = {}) => {
      try {
        const response = await fetch(`${API_URL}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message,
            agent: 'capture',
            context: { module: 'dashboard', ...context }
          })
        });
        if (!response.ok) throw new Error('API error');
        const data = await response.json();
        return { content: data.response, provider: detectCUI(message) ? 'asksage-pending' : 'anthropic' };
      } catch (e) {
        return { content: 'AI service temporarily unavailable. Please try again.', error: true };
      }
    };

    // ============================================
    // COMPONENTS
    // ============================================
    
    // Stat Card
    const StatCard = ({ label, value, icon, trend, color = 'cyan' }) => (
      <div className="glass rounded-xl p-6 border border-slate-700/50 hover:border-cyan-500/30 transition-all">
        <div className="flex items-start justify-between">
          <div>
            <p className="text-slate-400 text-sm mb-1">{label}</p>
            <p className={`text-3xl font-bold text-${color}-400`}>{value}</p>
            {trend && (
              <p className={`text-xs mt-2 ${trend > 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                {trend > 0 ? '↑' : '↓'} {Math.abs(trend)}% vs last month
              </p>
            )}
          </div>
          <span className="text-3xl opacity-50">{icon}</span>
        </div>
      </div>
    );

    // Priority Badge
    const PriorityBadge = ({ priority }) => {
      const colors = {
        critical: 'bg-red-500/20 text-red-400 border-red-500/30',
        high: 'bg-amber-500/20 text-amber-400 border-amber-500/30',
        medium: 'bg-blue-500/20 text-blue-400 border-blue-500/30',
        low: 'bg-slate-500/20 text-slate-400 border-slate-500/30'
      };
      return (
        <span className={`px-2 py-0.5 rounded text-xs border ${colors[priority] || colors.medium}`}>
          {priority?.toUpperCase()}
        </span>
      );
    };

    // Opportunity Row
    const OpportunityRow = ({ opp }) => {
      const phase = PHASE_COLORS[opp.phase] || PHASE_COLORS['Capture'];
      const dueDate = new Date(opp.due_date);
      const daysLeft = Math.ceil((dueDate - new Date()) / (1000 * 60 * 60 * 24));
      
      return (
        <tr className="border-b border-slate-800 hover:bg-slate-800/50 transition-colors">
          <td className="py-4 px-4">
            <div className="font-medium text-white">{opp.title}</div>
            <div className="text-sm text-slate-400">{opp.agency}</div>
          </td>
          <td className="py-4 px-4">
            <span className={`px-3 py-1 rounded-full text-xs ${phase.bg} ${phase.text}`}>
              {opp.phase}
            </span>
          </td>
          <td className="py-4 px-4 text-right font-mono text-cyan-400">
            ${(opp.ceiling_value / 1000000).toFixed(1)}M
          </td>
          <td className="py-4 px-4">
            <div className="flex items-center gap-2">
              <div className="w-16 h-2 bg-slate-700 rounded-full overflow-hidden">
                <div 
                  className={`h-full rounded-full ${opp.pwin >= 70 ? 'bg-emerald-500' : opp.pwin >= 50 ? 'bg-amber-500' : 'bg-red-500'}`}
                  style={{ width: `${opp.pwin}%` }}
                />
              </div>
              <span className="text-sm text-slate-400">{opp.pwin}%</span>
            </div>
          </td>
          <td className="py-4 px-4">
            <span className={`text-sm ${daysLeft <= 7 ? 'text-red-400' : daysLeft <= 14 ? 'text-amber-400' : 'text-slate-400'}`}>
              {daysLeft}d left
            </span>
          </td>
          <td className="py-4 px-4">
            <PriorityBadge priority={opp.priority} />
          </td>
        </tr>
      );
    };

    // Activity Item
    const ActivityItem = ({ activity }) => (
      <div className="flex items-start gap-3 py-3 border-b border-slate-800 last:border-0">
        <span className="text-lg">{activity.icon}</span>
        <div className="flex-1 min-w-0">
          <p className="text-sm text-white">{activity.action}</p>
          <p className="text-xs text-slate-500">{activity.module} • {activity.user}</p>
        </div>
        <span className="text-xs text-slate-500 whitespace-nowrap">{activity.time}</span>
      </div>
    );

    // Module Card
    const ModuleCard = ({ module }) => (
      <a 
        href={module.href}
        className="glass rounded-lg p-4 border border-slate-700/50 hover:border-cyan-500/50 hover:bg-slate-800/50 transition-all group"
      >
        <div className="flex items-center gap-3">
          <span className="text-2xl group-hover:scale-110 transition-transform">{module.icon}</span>
          <div className="flex-1">
            <p className="font-medium text-white group-hover:text-cyan-400 transition-colors">{module.name}</p>
            <p className="text-xs text-slate-500">{module.category}</p>
          </div>
          {module.badge && (
            <span className={`text-xs px-2 py-0.5 rounded ${
              module.badge === 'CUI' ? 'bg-amber-500/20 text-amber-400' :
              module.badge === 'RBAC' ? 'bg-red-500/20 text-red-400' :
              'bg-slate-500/20 text-slate-400'
            }`}>
              {module.badge}
            </span>
          )}
        </div>
      </a>
    );

    // AI Chat Widget
    const AIChatWidget = () => {
      const [isOpen, setIsOpen] = React.useState(false);
      const [messages, setMessages] = React.useState([]);
      const [input, setInput] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const messagesEndRef = React.useRef(null);

      React.useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      const handleSend = async () => {
        if (!input.trim() || loading) return;
        
        const userMsg = input.trim();
        setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
        setInput('');
        setLoading(true);

        const result = await sendToAI(userMsg);
        setMessages(prev => [...prev, { role: 'assistant', ...result }]);
        setLoading(false);
      };

      if (!isOpen) {
        return (
          <button
            onClick={() => setIsOpen(true)}
            className="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-full shadow-lg hover:shadow-cyan-500/25 transition-all flex items-center justify-center z-50 pulse-glow"
          >
            <span className="text-2xl">💬</span>
          </button>
        );
      }

      return (
        <div className="fixed bottom-6 right-6 w-96 h-[500px] glass border border-slate-700 rounded-xl shadow-2xl flex flex-col z-50">
          <div className="flex items-center justify-between p-4 border-b border-slate-700">
            <div>
              <h3 className="font-semibold text-white">Capture Intelligence</h3>
              <span className="text-xs text-emerald-400">● Online</span>
            </div>
            <button onClick={() => setIsOpen(false)} className="text-slate-400 hover:text-white">✕</button>
          </div>
          
          <div className="flex-1 overflow-y-auto p-4 space-y-4">
            {messages.length === 0 && (
              <div className="text-center text-slate-500 text-sm py-8">
                <p className="mb-4">Ask me about your pipeline, opportunities, or proposal strategy.</p>
                <div className="space-y-2">
                  {['Summarize active proposals', 'Which deals need attention?', 'What\'s due this week?'].map((prompt, i) => (
                    <button
                      key={i}
                      onClick={() => setInput(prompt)}
                      className="block w-full text-left px-3 py-2 rounded bg-slate-800 hover:bg-slate-700 text-slate-300 text-sm"
                    >
                      {prompt}
                    </button>
                  ))}
                </div>
              </div>
            )}
            {messages.map((msg, i) => (
              <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-[80%] px-4 py-2 rounded-lg ${
                  msg.role === 'user' ? 'bg-cyan-600 text-white' : 
                  msg.error ? 'bg-red-900/50 text-red-300' : 'bg-slate-800 text-slate-200'
                }`}>
                  {msg.content}
                  {msg.provider === 'asksage-pending' && (
                    <span className="block text-xs text-amber-400 mt-1">⚠️ CUI detected - AskSage pending</span>
                  )}
                </div>
              </div>
            ))}
            {loading && (
              <div className="flex justify-start">
                <div className="bg-slate-800 px-4 py-2 rounded-lg text-slate-400">...</div>
              </div>
            )}
            <div ref={messagesEndRef} />
          </div>
          
          <div className="p-4 border-t border-slate-700">
            <div className="flex gap-2">
              <input
                type="text"
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                placeholder="Ask about your pipeline..."
                className="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500"
              />
              <button
                onClick={handleSend}
                disabled={loading || !input.trim()}
                className="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 disabled:bg-slate-700 rounded-lg transition-colors"
              >
                →
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [stats, setStats] = React.useState(DEMO_STATS);
      const [opportunities, setOpportunities] = React.useState(DEMO_OPPORTUNITIES);
      const [activities, setActivities] = React.useState(DEMO_ACTIVITIES);
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [user, setUser] = React.useState({ name: 'Mary Womack', role: 'CEO' });

      React.useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        try {
          // Load opportunities
          const { data: opps, error: oppsError } = await supabase
            .from('opportunities')
            .select('*')
            .order('due_date', { ascending: true })
            .limit(10);

          if (!oppsError && opps && opps.length > 0) {
            setOpportunities(opps);
            
            // Calculate live stats
            const activePhases = ['Capture', 'Blue Team', 'Pink Team', 'Red Team', 'Gold Team', 'White Glove'];
            const activeOpps = opps.filter(o => activePhases.includes(o.phase));
            const totalValue = opps.reduce((sum, o) => sum + (o.ceiling_value || 0), 0);
            const avgPwin = opps.length > 0 
              ? Math.round(opps.reduce((sum, o) => sum + (o.pwin || 0), 0) / opps.length)
              : 0;
            
            const now = new Date();
            const weekFromNow = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);
            const dueThisWeek = opps.filter(o => {
              const due = new Date(o.due_date);
              return due >= now && due <= weekFromNow;
            }).length;

            setStats({
              totalOpportunities: opps.length,
              pipelineValue: totalValue,
              activeProposals: activeOpps.length,
              winRate: 42, // Would come from historical data
              dueThisWeek,
              avgPwin,
              pendingApprovals: 5,
              complianceScore: 94
            });
            
            setConnected(true);
          }

          // Load recent audit logs for activity
          const { data: logs, error: logsError } = await supabase
            .from('audit_logs')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(5);

          if (!logsError && logs && logs.length > 0) {
            const formattedLogs = logs.map(log => ({
              id: log.id,
              action: log.action,
              module: log.entity_type,
              user: log.user_email || 'System',
              time: formatTimeAgo(log.created_at),
              icon: getActionIcon(log.action)
            }));
            setActivities(formattedLogs);
          }
        } catch (e) {
          console.log('Using demo data:', e);
        } finally {
          setLoading(false);
        }
      };

      const formatTimeAgo = (timestamp) => {
        const diff = Date.now() - new Date(timestamp).getTime();
        const mins = Math.floor(diff / 60000);
        if (mins < 60) return `${mins} min ago`;
        const hrs = Math.floor(mins / 60);
        if (hrs < 24) return `${hrs} hr ago`;
        return `${Math.floor(hrs / 24)}d ago`;
      };

      const getActionIcon = (action) => {
        if (action?.includes('create')) return '➕';
        if (action?.includes('update')) return '✏️';
        if (action?.includes('delete')) return '🗑️';
        if (action?.includes('approve')) return '✓';
        return '📝';
      };

      const formatCurrency = (value) => {
        if (value >= 1000000000) return `$${(value / 1000000000).toFixed(1)}B`;
        if (value >= 1000000) return `$${(value / 1000000).toFixed(0)}M`;
        if (value >= 1000) return `$${(value / 1000).toFixed(0)}K`;
        return `$${value}`;
      };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-slate-400">Loading Mission Control...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <div className="flex items-center gap-2">
                  <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center">
                    <span className="text-xl">⚡</span>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold text-white">MissionPulse</h1>
                    <p className="text-xs text-slate-400">Mission Control</p>
                  </div>
                </div>
              </div>
              
              <div className="flex items-center gap-4">
                <div className={`px-3 py-1 rounded-full text-xs flex items-center gap-2 ${
                  connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'
                }`}>
                  <span className={`w-2 h-2 rounded-full ${connected ? 'bg-emerald-400' : 'bg-amber-400'}`}></span>
                  {connected ? 'Connected' : 'Demo Mode'}
                </div>
                <div className="text-right">
                  <p className="text-sm font-medium text-white">{user.name}</p>
                  <p className="text-xs text-slate-400">{user.role}</p>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8">
            {/* Stats Grid */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
              <StatCard label="Pipeline Value" value={formatCurrency(stats.pipelineValue)} icon="💰" trend={12} color="cyan" />
              <StatCard label="Active Proposals" value={stats.activeProposals} icon="📝" trend={8} color="blue" />
              <StatCard label="Avg Win Probability" value={`${stats.avgPwin}%`} icon="🎯" trend={5} color="emerald" />
              <StatCard label="Due This Week" value={stats.dueThisWeek} icon="⏰" color={stats.dueThisWeek > 2 ? 'amber' : 'slate'} />
            </div>

            {/* Main Content Grid */}
            <div className="grid lg:grid-cols-3 gap-6 mb-8">
              {/* Opportunities Table */}
              <div className="lg:col-span-2 glass rounded-xl border border-slate-700/50 overflow-hidden">
                <div className="p-4 border-b border-slate-700 flex items-center justify-between">
                  <h2 className="font-semibold text-white">Active Opportunities</h2>
                  <a href="missionpulse-pipeline-v2.html" className="text-sm text-cyan-400 hover:text-cyan-300">
                    View All →
                  </a>
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full">
                    <thead className="bg-slate-800/50">
                      <tr className="text-left text-xs text-slate-400 uppercase tracking-wider">
                        <th className="py-3 px-4">Opportunity</th>
                        <th className="py-3 px-4">Phase</th>
                        <th className="py-3 px-4 text-right">Value</th>
                        <th className="py-3 px-4">pWin</th>
                        <th className="py-3 px-4">Due</th>
                        <th className="py-3 px-4">Priority</th>
                      </tr>
                    </thead>
                    <tbody>
                      {opportunities.slice(0, 5).map(opp => (
                        <OpportunityRow key={opp.id} opp={opp} />
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Activity Feed */}
              <div className="glass rounded-xl border border-slate-700/50 p-4">
                <h2 className="font-semibold text-white mb-4">Recent Activity</h2>
                <div className="space-y-1">
                  {activities.map(activity => (
                    <ActivityItem key={activity.id} activity={activity} />
                  ))}
                </div>
              </div>
            </div>

            {/* Quick Launch Modules */}
            <div className="glass rounded-xl border border-slate-700/50 p-6">
              <h2 className="font-semibold text-white mb-4">Quick Launch</h2>
              <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
                {MODULES.slice(0, 12).map(module => (
                  <ModuleCard key={module.id} module={module} />
                ))}
              </div>
            </div>
          </main>

          {/* Footer */}
          <footer className="border-t border-slate-800 py-6">
            <div className="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4">
              <p className="text-xs text-slate-500">
                © 2026 Mission Meets Tech • Mission. Technology. Transformation.
              </p>
              <p className="text-xs text-slate-600">
                AI GENERATED - REQUIRES HUMAN REVIEW
              </p>
            </div>
          </footer>

          {/* AI Chat Widget */}
          <AIChatWidget />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
