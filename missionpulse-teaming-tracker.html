<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teaming Agreement Tracker | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
    .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
    .cyan-glow { box-shadow: 0 0 30px rgba(0,229,250,0.15); }
    .status-draft { background: rgba(156,163,175,0.2); color: #9ca3af; }
    .status-sent { background: rgba(251,191,36,0.2); color: #fbbf24; }
    .status-review { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .status-executed { background: rgba(34,197,94,0.2); color: #4ade80; }
    .status-expired { background: rgba(239,68,68,0.2); color: #f87171; }
  </style>
</head>
<body class="text-white">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    
    const supabaseUrl = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc4NTU0NjIsImV4cCI6MjA1MzQzMTQ2Mn0.Xj4_wfgnHdegN2jBcMh1cTBfvZhQxuF8FPxcE-krcHY';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const DEMO_AGREEMENTS = [
      { id: '1', partner_name: 'TechVets Solutions', partner_type: 'Subcontractor', agreement_type: 'Teaming Agreement', status: 'Executed', sent_date: '2026-01-15', executed_date: '2026-01-22', expiration_date: '2027-01-22', primary_contact_name: 'James Rodriguez', primary_contact_email: 'jrodriguez@techvets.com', notes: 'SDVOSB partner for VA requirements' },
      { id: '2', partner_name: 'CloudFirst Federal', partner_type: 'Subcontractor', agreement_type: 'NDA', status: 'Executed', sent_date: '2026-01-10', executed_date: '2026-01-12', expiration_date: '2028-01-12', primary_contact_name: 'Amanda Chen', primary_contact_email: 'achen@cloudfirst.com', notes: 'Cloud infrastructure support' },
      { id: '3', partner_name: 'HealthData Analytics', partner_type: 'JV Partner', agreement_type: 'Teaming Agreement', status: 'Under Review', sent_date: '2026-01-28', executed_date: null, expiration_date: null, primary_contact_name: 'Dr. Sarah Kim', primary_contact_email: 'skim@healthdata.com', notes: 'AI/ML healthcare analytics' },
      { id: '4', partner_name: 'SecureNet Cyber', partner_type: 'Subcontractor', agreement_type: 'Teaming Agreement', status: 'Sent', sent_date: '2026-01-30', executed_date: null, expiration_date: null, primary_contact_name: 'Mike Thompson', primary_contact_email: 'mthompson@securenet.com', notes: 'Cybersecurity and CMMC compliance' },
      { id: '5', partner_name: 'Legacy Systems Inc', partner_type: 'Subcontractor', agreement_type: 'NDA', status: 'Draft', sent_date: null, executed_date: null, expiration_date: null, primary_contact_name: 'Robert Wilson', primary_contact_email: 'rwilson@legacysys.com', notes: 'VistA migration expertise' },
    ];

    function TeamingTracker() {
      const [agreements, setAgreements] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filter, setFilter] = useState('All');
      const [showModal, setShowModal] = useState(false);
      const [selectedAgreement, setSelectedAgreement] = useState(null);

      useEffect(() => {
        loadAgreements();
      }, []);

      async function loadAgreements() {
        try {
          const { data, error } = await supabase.from('teaming_agreements').select('*').order('created_at', { ascending: false });
          if (error) throw error;
          setAgreements(data?.length ? data : DEMO_AGREEMENTS);
        } catch (err) {
          console.log('Using demo data:', err.message);
          setAgreements(DEMO_AGREEMENTS);
        } finally {
          setLoading(false);
        }
      }

      const filteredAgreements = filter === 'All' ? agreements : agreements.filter(a => a.status === filter);
      
      const stats = {
        total: agreements.length,
        executed: agreements.filter(a => a.status === 'Executed').length,
        pending: agreements.filter(a => ['Draft', 'Sent', 'Under Review'].includes(a.status)).length,
        expiringSoon: agreements.filter(a => {
          if (!a.expiration_date) return false;
          const days = Math.ceil((new Date(a.expiration_date) - new Date()) / (1000 * 60 * 60 * 24));
          return days > 0 && days <= 90;
        }).length,
      };

      const getStatusClass = (status) => {
        const classes = { 'Draft': 'status-draft', 'Sent': 'status-sent', 'Under Review': 'status-review', 'Executed': 'status-executed', 'Expired': 'status-expired' };
        return classes[status] || 'status-draft';
      };

      const getPartnerTypeColor = (type) => {
        const colors = { 'Prime': 'text-purple-400', 'Subcontractor': 'text-blue-400', 'JV Partner': 'text-green-400', 'Mentor-Protégé': 'text-yellow-400' };
        return colors[type] || 'text-gray-400';
      };

      return (
        <div className="min-h-screen p-6">
          {/* Header */}
          <div className="flex items-center justify-between mb-8">
            <div className="flex items-center space-x-4">
              <a href="index.html" className="text-gray-400 hover:text-cyan-400 transition">← Back</a>
              <div>
                <h1 className="text-3xl font-bold text-white">Teaming Agreement Tracker</h1>
                <p className="text-gray-400">Manage TAs, NDAs, and partner relationships</p>
              </div>
            </div>
            <button onClick={() => { setSelectedAgreement(null); setShowModal(true); }} className="px-6 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-xl font-semibold hover:opacity-90 transition flex items-center space-x-2">
              <span>+ New Agreement</span>
            </button>
          </div>

          {/* Stats */}
          <div className="grid grid-cols-4 gap-4 mb-8">
            {[
              { label: 'Total Partners', value: stats.total, icon: '🤝', color: 'cyan' },
              { label: 'Executed', value: stats.executed, icon: '✅', color: 'green' },
              { label: 'Pending', value: stats.pending, icon: '⏳', color: 'yellow' },
              { label: 'Expiring (90d)', value: stats.expiringSoon, icon: '⚠️', color: 'orange' },
            ].map((stat, i) => (
              <div key={i} className="glass-card rounded-xl p-5">
                <div className="flex items-center justify-between">
                  <div>
                    <div className={`text-3xl font-bold text-${stat.color}-400`}>{stat.value}</div>
                    <div className="text-gray-400 text-sm mt-1">{stat.label}</div>
                  </div>
                  <div className="text-3xl">{stat.icon}</div>
                </div>
              </div>
            ))}
          </div>

          {/* Filters */}
          <div className="flex space-x-2 mb-6">
            {['All', 'Draft', 'Sent', 'Under Review', 'Executed', 'Expired'].map((f) => (
              <button key={f} onClick={() => setFilter(f)} className={`px-4 py-2 rounded-lg font-medium transition ${filter === f ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/50' : 'bg-gray-800/50 text-gray-400 hover:bg-gray-700/50'}`}>
                {f}
              </button>
            ))}
          </div>

          {/* Agreements Grid */}
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {loading ? (
              <div className="col-span-3 text-center py-12 text-gray-400">Loading...</div>
            ) : filteredAgreements.map((agreement) => (
              <div key={agreement.id} className="glass-card rounded-xl p-5 hover:border-cyan-500/30 transition cursor-pointer" onClick={() => { setSelectedAgreement(agreement); setShowModal(true); }}>
                <div className="flex items-start justify-between mb-3">
                  <div>
                    <h3 className="font-semibold text-lg text-white">{agreement.partner_name}</h3>
                    <span className={`text-sm ${getPartnerTypeColor(agreement.partner_type)}`}>{agreement.partner_type}</span>
                  </div>
                  <span className={`px-3 py-1 rounded-full text-xs font-medium ${getStatusClass(agreement.status)}`}>{agreement.status}</span>
                </div>
                
                <div className="space-y-2 text-sm">
                  <div className="flex justify-between">
                    <span className="text-gray-400">Agreement Type</span>
                    <span className="text-white">{agreement.agreement_type}</span>
                  </div>
                  {agreement.executed_date && (
                    <div className="flex justify-between">
                      <span className="text-gray-400">Executed</span>
                      <span className="text-green-400">{new Date(agreement.executed_date).toLocaleDateString()}</span>
                    </div>
                  )}
                  {agreement.expiration_date && (
                    <div className="flex justify-between">
                      <span className="text-gray-400">Expires</span>
                      <span className="text-white">{new Date(agreement.expiration_date).toLocaleDateString()}</span>
                    </div>
                  )}
                </div>

                <div className="mt-4 pt-3 border-t border-gray-800">
                  <div className="text-xs text-gray-400">{agreement.primary_contact_name}</div>
                  <div className="text-xs text-cyan-400">{agreement.primary_contact_email}</div>
                </div>
              </div>
            ))}
          </div>

          {/* Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
              <div className="glass-card rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                <div className="p-6 border-b border-gray-800">
                  <div className="flex items-center justify-between">
                    <h2 className="text-xl font-bold">{selectedAgreement ? selectedAgreement.partner_name : 'New Agreement'}</h2>
                    <button onClick={() => setShowModal(false)} className="text-gray-400 hover:text-white text-2xl">&times;</button>
                  </div>
                </div>
                <div className="p-6 space-y-4">
                  {selectedAgreement ? (
                    <>
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="text-gray-400 text-sm">Partner Type</label>
                          <p className={`font-medium ${getPartnerTypeColor(selectedAgreement.partner_type)}`}>{selectedAgreement.partner_type}</p>
                        </div>
                        <div>
                          <label className="text-gray-400 text-sm">Agreement Type</label>
                          <p className="text-white">{selectedAgreement.agreement_type}</p>
                        </div>
                        <div>
                          <label className="text-gray-400 text-sm">Status</label>
                          <p><span className={`px-3 py-1 rounded-full text-sm ${getStatusClass(selectedAgreement.status)}`}>{selectedAgreement.status}</span></p>
                        </div>
                        <div>
                          <label className="text-gray-400 text-sm">Sent Date</label>
                          <p className="text-white">{selectedAgreement.sent_date ? new Date(selectedAgreement.sent_date).toLocaleDateString() : 'Not sent'}</p>
                        </div>
                      </div>
                      <div>
                        <label className="text-gray-400 text-sm">Notes</label>
                        <p className="text-white mt-1">{selectedAgreement.notes || 'No notes'}</p>
                      </div>
                      <div className="flex space-x-3 pt-4">
                        <button className="flex-1 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-xl font-semibold hover:opacity-90 transition">Edit Agreement</button>
                        <button className="px-6 py-3 bg-gray-700/50 text-gray-300 rounded-xl font-semibold hover:bg-gray-600/50 transition">Download</button>
                      </div>
                    </>
                  ) : (
                    <div className="space-y-4">
                      <input type="text" placeholder="Partner Name" className="w-full p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white" />
                      <div className="grid grid-cols-2 gap-4">
                        <select className="p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white">
                          <option>Subcontractor</option>
                          <option>Prime</option>
                          <option>JV Partner</option>
                          <option>Mentor-Protégé</option>
                        </select>
                        <select className="p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white">
                          <option>Teaming Agreement</option>
                          <option>NDA</option>
                          <option>LOI</option>
                          <option>JV Agreement</option>
                        </select>
                      </div>
                      <input type="text" placeholder="Primary Contact Name" className="w-full p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white" />
                      <input type="email" placeholder="Primary Contact Email" className="w-full p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white" />
                      <textarea placeholder="Notes" className="w-full p-3 bg-gray-900/50 border border-gray-700 rounded-lg text-white" rows="3"></textarea>
                      <button className="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-xl font-semibold hover:opacity-90 transition">Create Agreement</button>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<TeamingTracker />, document.getElementById('root'));
  </script>
</body>
</html>
