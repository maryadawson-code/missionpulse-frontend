<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposal Metrics | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
        .glass-card:hover { border-color: rgba(0,229,250,0.3); }
        .cyan-glow { box-shadow: 0 0 30px rgba(0,229,250,0.15); }
        .metric-ring { background: conic-gradient(from 0deg, #00E5FA var(--progress), rgba(255,255,255,0.1) var(--progress)); }
    </style>
</head>
<body class="text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const supabaseUrl = 'https://djuviwarqdvlbgcfuupa.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0NDQ0NjUsImV4cCI6MjA4NTAyMDQ2NX0.3s8ufDDN2aWfkW0RBsAyJyacb2tjB7M550WSFIohHcA';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const DEMO_WIN_LOSS = [
            { id: '1', opportunity_title: 'VA Claims Processing', fiscal_year: 2025, quarter: 4, result: 'win', contract_value: 45000000, competed_value: 45000000, win_themes: ['Technical Innovation', 'Past Performance'], competitor_winner: null },
            { id: '2', opportunity_title: 'CMS Analytics Platform', fiscal_year: 2025, quarter: 3, result: 'win', contract_value: 28000000, competed_value: 35000000, win_themes: ['Price Competitiveness', 'Key Personnel'], competitor_winner: null },
            { id: '3', opportunity_title: 'DoD Health Portal', fiscal_year: 2025, quarter: 3, result: 'loss', contract_value: 0, competed_value: 62000000, loss_reasons: ['Price Too High', 'Incumbent Advantage'], competitor_winner: 'Leidos' },
            { id: '4', opportunity_title: 'SSA Modernization', fiscal_year: 2025, quarter: 2, result: 'win', contract_value: 15000000, competed_value: 15000000, win_themes: ['Agile Methodology', 'Small Business'], competitor_winner: null },
            { id: '5', opportunity_title: 'NIH Research Platform', fiscal_year: 2025, quarter: 2, result: 'loss', contract_value: 0, competed_value: 22000000, loss_reasons: ['Missing Certification'], competitor_winner: 'Booz Allen' },
            { id: '6', opportunity_title: 'FDA Compliance System', fiscal_year: 2025, quarter: 1, result: 'no_bid', contract_value: 0, competed_value: 18000000, loss_reasons: ['Resource Constraints'], competitor_winner: null },
            { id: '7', opportunity_title: 'DHA Telehealth', fiscal_year: 2026, quarter: 1, result: 'pending', contract_value: 0, competed_value: 75000000, win_themes: [], competitor_winner: null },
            { id: '8', opportunity_title: 'IHS EHR Support', fiscal_year: 2026, quarter: 1, result: 'pending', contract_value: 0, competed_value: 32000000, win_themes: [], competitor_winner: null }
        ];

        const DEMO_METRICS = [
            { id: '1', opportunity_title: 'DHA EHR Modernization', proposal_hours_planned: 520, proposal_hours_actual: 485, days_to_submission: 45, pages_written: 156, pages_target: 150, compliance_score: 98.5, quality_score: 92.3, team_size: 12, review_cycles: 3, findings_total: 47, findings_resolved: 44, graphics_count: 24 },
            { id: '2', opportunity_title: 'VA Claims Processing', proposal_hours_planned: 380, proposal_hours_actual: 410, days_to_submission: 30, pages_written: 98, pages_target: 100, compliance_score: 100, quality_score: 95.1, team_size: 8, review_cycles: 2, findings_total: 23, findings_resolved: 23, graphics_count: 15 },
            { id: '3', opportunity_title: 'CMS Data Analytics', proposal_hours_planned: 450, proposal_hours_actual: 420, days_to_submission: 38, pages_written: 125, pages_target: 125, compliance_score: 97.2, quality_score: 88.9, team_size: 10, review_cycles: 3, findings_total: 35, findings_resolved: 32, graphics_count: 18 }
        ];

        function MetricsApp() {
            const [winLoss, setWinLoss] = useState([]);
            const [metrics, setMetrics] = useState([]);
            const [activeTab, setActiveTab] = useState('overview');
            const [selectedYear, setSelectedYear] = useState(2025);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                loadData();
            }, []);

            async function loadData() {
                try {
                    const { data: wlData } = await supabase.from('win_loss_records').select('*').order('fiscal_year', { ascending: false });
                    const { data: metricData } = await supabase.from('proposal_metrics').select('*');
                    setWinLoss(wlData?.length ? wlData : DEMO_WIN_LOSS);
                    setMetrics(metricData?.length ? metricData : DEMO_METRICS);
                } catch (err) {
                    setWinLoss(DEMO_WIN_LOSS);
                    setMetrics(DEMO_METRICS);
                }
                setLoading(false);
            }

            // Calculate metrics
            const yearData = winLoss.filter(w => w.fiscal_year === selectedYear);
            const wins = yearData.filter(w => w.result === 'win');
            const losses = yearData.filter(w => w.result === 'loss');
            const pending = yearData.filter(w => w.result === 'pending');
            const noBids = yearData.filter(w => w.result === 'no_bid');
            
            const totalCompeted = wins.length + losses.length;
            const winRate = totalCompeted > 0 ? ((wins.length / totalCompeted) * 100).toFixed(1) : 0;
            const totalWonValue = wins.reduce((sum, w) => sum + (w.contract_value || 0), 0);
            const totalCompetedValue = yearData.filter(w => w.result !== 'no_bid' && w.result !== 'pending').reduce((sum, w) => sum + (w.competed_value || 0), 0);
            const captureRate = totalCompetedValue > 0 ? ((totalWonValue / totalCompetedValue) * 100).toFixed(1) : 0;

            const avgHoursVariance = metrics.length > 0 ? 
                (metrics.reduce((sum, m) => sum + ((m.proposal_hours_actual - m.proposal_hours_planned) / m.proposal_hours_planned * 100), 0) / metrics.length).toFixed(1) : 0;
            const avgComplianceScore = metrics.length > 0 ?
                (metrics.reduce((sum, m) => sum + m.compliance_score, 0) / metrics.length).toFixed(1) : 0;
            const avgQualityScore = metrics.length > 0 ?
                (metrics.reduce((sum, m) => sum + m.quality_score, 0) / metrics.length).toFixed(1) : 0;

            // Win themes analysis
            const allWinThemes = wins.flatMap(w => w.win_themes || []);
            const themeCount = allWinThemes.reduce((acc, theme) => {
                acc[theme] = (acc[theme] || 0) + 1;
                return acc;
            }, {});
            const topThemes = Object.entries(themeCount).sort((a, b) => b[1] - a[1]).slice(0, 5);

            // Loss reasons analysis
            const allLossReasons = losses.flatMap(l => l.loss_reasons || []);
            const reasonCount = allLossReasons.reduce((acc, reason) => {
                acc[reason] = (acc[reason] || 0) + 1;
                return acc;
            }, {});
            const topReasons = Object.entries(reasonCount).sort((a, b) => b[1] - a[1]).slice(0, 5);

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <div className="w-16 h-16 border-4 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="text-gray-400">Loading Metrics...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-6">
                    {/* Header */}
                    <div className="flex items-center justify-between mb-8">
                        <div>
                            <div className="flex items-center gap-3 mb-2">
                                <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                                    </svg>
                                </div>
                                <h1 className="text-2xl font-bold">Proposal Metrics Dashboard</h1>
                            </div>
                            <p className="text-gray-400">Win rates, performance analytics & business intelligence</p>
                        </div>
                        <select value={selectedYear} onChange={e => setSelectedYear(parseInt(e.target.value))} className="bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:border-cyan-500/50 focus:outline-none">
                            <option value={2026}>FY 2026</option>
                            <option value={2025}>FY 2025</option>
                            <option value={2024}>FY 2024</option>
                        </select>
                    </div>

                    {/* Key Metrics Row */}
                    <div className="grid grid-cols-5 gap-4 mb-8">
                        <div className="glass-card rounded-xl p-5 cyan-glow">
                            <p className="text-gray-400 text-sm mb-2">Win Rate</p>
                            <div className="flex items-end gap-2">
                                <p className="text-4xl font-bold text-cyan-400">{winRate}%</p>
                                <p className="text-sm text-gray-500 mb-1">{wins.length}W / {losses.length}L</p>
                            </div>
                        </div>
                        <div className="glass-card rounded-xl p-5">
                            <p className="text-gray-400 text-sm mb-2">Value Won</p>
                            <p className="text-4xl font-bold text-emerald-400">${(totalWonValue / 1000000).toFixed(1)}M</p>
                        </div>
                        <div className="glass-card rounded-xl p-5">
                            <p className="text-gray-400 text-sm mb-2">Capture Rate</p>
                            <p className="text-4xl font-bold text-purple-400">{captureRate}%</p>
                        </div>
                        <div className="glass-card rounded-xl p-5">
                            <p className="text-gray-400 text-sm mb-2">Pending</p>
                            <p className="text-4xl font-bold text-yellow-400">{pending.length}</p>
                        </div>
                        <div className="glass-card rounded-xl p-5">
                            <p className="text-gray-400 text-sm mb-2">No-Bid Rate</p>
                            <p className="text-4xl font-bold text-gray-400">{yearData.length > 0 ? ((noBids.length / yearData.length) * 100).toFixed(0) : 0}%</p>
                        </div>
                    </div>

                    {/* Tabs */}
                    <div className="flex gap-1 mb-6 bg-white/5 p-1 rounded-lg w-fit">
                        {['overview', 'win_loss', 'proposal_perf', 'trends'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 rounded-lg text-sm font-medium transition ${activeTab === tab ? 'bg-cyan-500 text-white' : 'text-gray-400 hover:text-white'}`}>
                                {tab.replace('_', '/').split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ')}
                            </button>
                        ))}
                    </div>

                    {activeTab === 'overview' && (
                        <div className="grid grid-cols-3 gap-6">
                            {/* Win Themes */}
                            <div className="glass-card rounded-xl p-6">
                                <h3 className="text-lg font-semibold mb-4 flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-emerald-400"></span>
                                    Top Win Themes
                                </h3>
                                <div className="space-y-3">
                                    {topThemes.map(([theme, count], i) => (
                                        <div key={theme}>
                                            <div className="flex justify-between text-sm mb-1">
                                                <span>{theme}</span>
                                                <span className="text-emerald-400">{count}</span>
                                            </div>
                                            <div className="h-2 bg-white/10 rounded-full overflow-hidden">
                                                <div className="h-full bg-emerald-500" style={{width: `${(count / wins.length) * 100}%`}}></div>
                                            </div>
                                        </div>
                                    ))}
                                    {topThemes.length === 0 && <p className="text-gray-500 text-center py-4">No win data</p>}
                                </div>
                            </div>

                            {/* Loss Reasons */}
                            <div className="glass-card rounded-xl p-6">
                                <h3 className="text-lg font-semibold mb-4 flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-red-400"></span>
                                    Top Loss Reasons
                                </h3>
                                <div className="space-y-3">
                                    {topReasons.map(([reason, count], i) => (
                                        <div key={reason}>
                                            <div className="flex justify-between text-sm mb-1">
                                                <span>{reason}</span>
                                                <span className="text-red-400">{count}</span>
                                            </div>
                                            <div className="h-2 bg-white/10 rounded-full overflow-hidden">
                                                <div className="h-full bg-red-500" style={{width: `${(count / Math.max(losses.length, 1)) * 100}%`}}></div>
                                            </div>
                                        </div>
                                    ))}
                                    {topReasons.length === 0 && <p className="text-gray-500 text-center py-4">No loss data</p>}
                                </div>
                            </div>

                            {/* Quality Metrics */}
                            <div className="glass-card rounded-xl p-6">
                                <h3 className="text-lg font-semibold mb-4 flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-cyan-400"></span>
                                    Proposal Quality
                                </h3>
                                <div className="space-y-4">
                                    <div className="text-center p-4 bg-white/5 rounded-lg">
                                        <p className="text-3xl font-bold text-cyan-400">{avgComplianceScore}%</p>
                                        <p className="text-sm text-gray-400">Avg Compliance Score</p>
                                    </div>
                                    <div className="text-center p-4 bg-white/5 rounded-lg">
                                        <p className="text-3xl font-bold text-purple-400">{avgQualityScore}%</p>
                                        <p className="text-sm text-gray-400">Avg Quality Score</p>
                                    </div>
                                    <div className="text-center p-4 bg-white/5 rounded-lg">
                                        <p className={`text-3xl font-bold ${parseFloat(avgHoursVariance) > 0 ? 'text-red-400' : 'text-emerald-400'}`}>{avgHoursVariance}%</p>
                                        <p className="text-sm text-gray-400">Hours Variance</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'win_loss' && (
                        <div className="glass-card rounded-xl p-6">
                            <h2 className="text-lg font-semibold mb-4">Win/Loss Record - FY{selectedYear}</h2>
                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead>
                                        <tr className="text-left text-gray-400 text-sm border-b border-white/10">
                                            <th className="pb-3 font-medium">Opportunity</th>
                                            <th className="pb-3 font-medium">Quarter</th>
                                            <th className="pb-3 font-medium">Result</th>
                                            <th className="pb-3 font-medium">Competed Value</th>
                                            <th className="pb-3 font-medium">Won Value</th>
                                            <th className="pb-3 font-medium">Details</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-sm">
                                        {yearData.map(record => (
                                            <tr key={record.id} className="border-b border-white/5 hover:bg-white/5">
                                                <td className="py-3 font-medium">{record.opportunity_title}</td>
                                                <td className="py-3 text-gray-400">Q{record.quarter}</td>
                                                <td className="py-3">
                                                    <span className={`px-2 py-1 rounded text-xs font-medium ${
                                                        record.result === 'win' ? 'bg-emerald-500/20 text-emerald-400' :
                                                        record.result === 'loss' ? 'bg-red-500/20 text-red-400' :
                                                        record.result === 'pending' ? 'bg-yellow-500/20 text-yellow-400' :
                                                        'bg-gray-500/20 text-gray-400'
                                                    }`}>
                                                        {record.result.toUpperCase()}
                                                    </span>
                                                </td>
                                                <td className="py-3 text-gray-300">${(record.competed_value / 1000000).toFixed(1)}M</td>
                                                <td className="py-3 text-emerald-400">
                                                    {record.contract_value > 0 ? `$${(record.contract_value / 1000000).toFixed(1)}M` : '-'}
                                                </td>
                                                <td className="py-3 text-gray-400">
                                                    {record.win_themes?.length > 0 && (
                                                        <span className="text-emerald-400">{record.win_themes.join(', ')}</span>
                                                    )}
                                                    {record.loss_reasons?.length > 0 && (
                                                        <span className="text-red-400">{record.loss_reasons.join(', ')}</span>
                                                    )}
                                                    {record.competitor_winner && (
                                                        <span className="text-gray-500"> • Lost to {record.competitor_winner}</span>
                                                    )}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {activeTab === 'proposal_perf' && (
                        <div className="space-y-4">
                            {metrics.map(m => (
                                <div key={m.id} className="glass-card rounded-xl p-6">
                                    <div className="flex items-center justify-between mb-4">
                                        <h3 className="text-lg font-semibold">{m.opportunity_title}</h3>
                                        <span className="text-gray-400 text-sm">{m.days_to_submission} days to submission</span>
                                    </div>
                                    <div className="grid grid-cols-6 gap-4">
                                        <div className="text-center p-3 bg-white/5 rounded-lg">
                                            <p className="text-2xl font-bold text-cyan-400">{m.proposal_hours_actual}</p>
                                            <p className="text-xs text-gray-400">Hours (Plan: {m.proposal_hours_planned})</p>
                                        </div>
                                        <div className="text-center p-3 bg-white/5 rounded-lg">
                                            <p className="text-2xl font-bold text-purple-400">{m.pages_written}</p>
                                            <p className="text-xs text-gray-400">Pages (Target: {m.pages_target})</p>
                                        </div>
                                        <div className="text-center p-3 bg-white/5 rounded-lg">
                                            <p className="text-2xl font-bold text-emerald-400">{m.compliance_score}%</p>
                                            <p className="text-xs text-gray-400">Compliance</p>
                                        </div>
                                        <div className="text-center p-3 bg-white/5 rounded-lg">
                                            <p className="text-2xl font-bold text-blue-400">{m.quality_score}%</p>
                                            <p className="text-xs text-gray-400">Quality</p>
                                        </div>
                                        <div className="text-center p-3 bg-white/5 rounded-lg">
                                            <p className="text-2xl font-bold text-yellow-400">{m.findings_resolved}/{m.findings_total}</p>
                                            <p className="text-xs text-gray-400">Findings Resolved</p>
                                        </div>
                                        <div className="text-center p-3 bg-white/5 rounded-lg">
                                            <p className="text-2xl font-bold text-gray-300">{m.team_size}</p>
                                            <p className="text-xs text-gray-400">Team Size</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {activeTab === 'trends' && (
                        <div className="grid grid-cols-2 gap-6">
                            <div className="glass-card rounded-xl p-6">
                                <h3 className="text-lg font-semibold mb-4">Quarterly Performance</h3>
                                <div className="space-y-4">
                                    {[1, 2, 3, 4].map(q => {
                                        const qData = yearData.filter(w => w.quarter === q);
                                        const qWins = qData.filter(w => w.result === 'win').length;
                                        const qTotal = qData.filter(w => w.result === 'win' || w.result === 'loss').length;
                                        const qRate = qTotal > 0 ? ((qWins / qTotal) * 100).toFixed(0) : '-';
                                        return (
                                            <div key={q} className="flex items-center gap-4">
                                                <span className="text-gray-400 w-8">Q{q}</span>
                                                <div className="flex-1 h-4 bg-white/10 rounded-full overflow-hidden">
                                                    {qTotal > 0 && <div className="h-full bg-gradient-to-r from-cyan-500 to-emerald-500" style={{width: `${qRate}%`}}></div>}
                                                </div>
                                                <span className="text-cyan-400 w-16 text-right">{qRate}%</span>
                                                <span className="text-gray-500 w-16 text-right text-sm">{qWins}W/{qTotal - qWins}L</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                            <div className="glass-card rounded-xl p-6">
                                <h3 className="text-lg font-semibold mb-4">Year-over-Year Comparison</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    {[2025, 2026].map(year => {
                                        const yData = winLoss.filter(w => w.fiscal_year === year);
                                        const yWins = yData.filter(w => w.result === 'win');
                                        const yLosses = yData.filter(w => w.result === 'loss');
                                        const yRate = (yWins.length + yLosses.length) > 0 ? ((yWins.length / (yWins.length + yLosses.length)) * 100).toFixed(0) : 0;
                                        const yValue = yWins.reduce((sum, w) => sum + (w.contract_value || 0), 0);
                                        return (
                                            <div key={year} className={`p-4 rounded-lg ${year === selectedYear ? 'bg-cyan-500/10 border border-cyan-500/30' : 'bg-white/5'}`}>
                                                <p className="text-gray-400 text-sm mb-2">FY {year}</p>
                                                <p className="text-3xl font-bold text-cyan-400">{yRate}%</p>
                                                <p className="text-sm text-gray-400">{yWins.length} wins • ${(yValue / 1000000).toFixed(1)}M</p>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="mt-12 text-center text-gray-500 text-sm">
                        © 2026 Mission Meets Tech • MissionPulse v2.0 • Sprint 70
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<MetricsApp />, document.getElementById('root'));
    </script>
</body>
</html>
