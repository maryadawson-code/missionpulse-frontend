<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debrief Manager | MissionPulse</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass { background: rgba(0,229,250,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
    .glass-card { background: rgba(15,23,42,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(51,65,85,0.5); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const DEMO_DEBRIEFS = [
      { 
        id: '1', 
        opportunity: 'DoD Health Data Platform', 
        outcome: 'win',
        debrief_date: '2025-01-15',
        debrief_type: 'oral',
        contract_value: 45000000,
        strengths: ['Innovative technical approach', 'Strong past performance citations', 'Competitive pricing', 'Key personnel qualifications'],
        weaknesses: ['Limited experience with specific DISA requirements'],
        evaluator_feedback: ['Technical approach exceeded expectations', 'Management plan was comprehensive', 'Pricing was most competitive'],
        competitor_insights: [{ name: 'Competitor A', ranking: 2, notes: 'Higher price point' }, { name: 'Competitor B', ranking: 3, notes: 'Weaker past performance' }],
        lessons_learned: ['Early engagement with customer paid off', 'AI-first messaging resonated strongly'],
        action_items: ['Document solution for reuse', 'Update past performance database']
      },
      { 
        id: '2', 
        opportunity: 'VA Telehealth Expansion', 
        outcome: 'loss',
        debrief_date: '2025-01-08',
        debrief_type: 'written',
        contract_value: 28000000,
        strengths: ['Technical innovation', 'Team qualifications'],
        weaknesses: ['Insufficient VA-specific experience', 'Price higher than awardee', 'Missing key certification'],
        evaluator_feedback: ['Technical approach was strong but lacked VA context', 'Price was 15% above winning bid'],
        competitor_insights: [{ name: 'Incumbent', ranking: 1, notes: 'Won on price and relationship' }],
        lessons_learned: ['Need VA-specific past performance', 'Price sensitivity higher than expected'],
        action_items: ['Pursue VA subcontracting opportunities', 'Review pricing methodology']
      },
      { 
        id: '3', 
        opportunity: 'CMS Analytics Modernization', 
        outcome: 'win',
        debrief_date: '2024-12-20',
        debrief_type: 'oral',
        contract_value: 67000000,
        strengths: ['Cloud-native architecture', 'Healthcare analytics expertise', 'Agile delivery approach', 'Cost efficiency'],
        weaknesses: ['Initial staffing plan needed clarification'],
        evaluator_feedback: ['Best technical solution presented', 'Strong understanding of CMS mission'],
        competitor_insights: [{ name: 'Big 5 Contractor', ranking: 2, notes: 'Overhead too high' }],
        lessons_learned: ['Detailed staffing matrices critical', 'Cloud-native approach is differentiator'],
        action_items: ['Develop staffing template for reuse', 'Update capability statement']
      }
    ];

    const Icons = {
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
      clipboard: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" /></svg>,
      plus: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>,
      shield: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
      x: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
      trendUp: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>,
      trendDown: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6" /></svg>,
      lightbulb: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" /></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    const Badge = ({ children, variant = 'default' }) => {
      const variants = {
        default: 'bg-slate-700 text-slate-300',
        success: 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30',
        danger: 'bg-red-500/20 text-red-400 border border-red-500/30',
        cyan: 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30'
      };
      return <span className={`px-2 py-1 rounded-full text-xs font-medium ${variants[variant]}`}>{children}</span>;
    };

    const formatCurrency = (value) => {
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', notation: 'compact', maximumFractionDigits: 1 }).format(value);
    };

    function DebriefManager() {
      const [debriefs, setDebriefs] = useState(DEMO_DEBRIEFS);
      const [selectedDebrief, setSelectedDebrief] = useState(null);
      const [filterOutcome, setFilterOutcome] = useState('all');

      const filteredDebriefs = useMemo(() => {
        if (filterOutcome === 'all') return debriefs;
        return debriefs.filter(d => d.outcome === filterOutcome);
      }, [debriefs, filterOutcome]);

      const stats = {
        total: debriefs.length,
        wins: debriefs.filter(d => d.outcome === 'win').length,
        losses: debriefs.filter(d => d.outcome === 'loss').length,
        totalValue: debriefs.filter(d => d.outcome === 'win').reduce((sum, d) => sum + d.contract_value, 0)
      };

      const winRate = stats.total > 0 ? Math.round((stats.wins / stats.total) * 100) : 0;

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="p-2 rounded-lg bg-slate-800/50 hover:bg-slate-700/50 transition-colors">
                    <Icon name="home" className="w-5 h-5 text-slate-400" />
                  </a>
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center">
                      <Icon name="clipboard" className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white">Debrief Manager</h1>
                      <p className="text-sm text-slate-400">Capture & analyze proposal outcomes</p>
                    </div>
                  </div>
                </div>
                <button className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-xl flex items-center gap-2 font-semibold hover:from-cyan-400 hover:to-teal-400 transition-all">
                  <Icon name="plus" className="w-4 h-4" /> New Debrief
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8">
            {/* Stats */}
            <div className="grid grid-cols-4 gap-4 mb-8">
              {[
                { label: 'Total Debriefs', value: stats.total, icon: 'clipboard', color: 'purple' },
                { label: 'Wins', value: stats.wins, icon: 'trendUp', color: 'emerald' },
                { label: 'Win Rate', value: `${winRate}%`, icon: 'check', color: 'cyan' },
                { label: 'Won Value', value: formatCurrency(stats.totalValue), icon: 'trendUp', color: 'amber' }
              ].map((stat, i) => (
                <div key={i} className="glass-card rounded-xl p-4">
                  <div className="flex items-center gap-3">
                    <div className={`w-10 h-10 rounded-lg bg-${stat.color}-500/20 flex items-center justify-center`}>
                      <Icon name={stat.icon} className={`w-5 h-5 text-${stat.color}-400`} />
                    </div>
                    <div>
                      <div className="text-2xl font-bold text-white">{stat.value}</div>
                      <div className="text-xs text-slate-400">{stat.label}</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* Filters */}
            <div className="glass-card rounded-xl p-4 mb-6">
              <div className="flex items-center gap-4">
                <span className="text-sm text-slate-400">Filter:</span>
                {['all', 'win', 'loss'].map(outcome => (
                  <button
                    key={outcome}
                    onClick={() => setFilterOutcome(outcome)}
                    className={`px-4 py-2 rounded-lg text-sm transition ${filterOutcome === outcome ? 'bg-cyan-500/20 text-cyan-400' : 'text-slate-400 hover:bg-slate-700/50'}`}
                  >
                    {outcome === 'all' ? 'All' : outcome === 'win' ? '🏆 Wins' : '📉 Losses'}
                  </button>
                ))}
              </div>
            </div>

            {/* Debriefs List */}
            <div className="space-y-4">
              {filteredDebriefs.map(debrief => (
                <div 
                  key={debrief.id}
                  onClick={() => setSelectedDebrief(debrief)}
                  className="glass-card rounded-xl p-6 hover:border-cyan-500/30 transition-all cursor-pointer"
                >
                  <div className="flex items-start justify-between mb-4">
                    <div>
                      <div className="flex items-center gap-3 mb-2">
                        <span className={`text-2xl ${debrief.outcome === 'win' ? '' : ''}`}>
                          {debrief.outcome === 'win' ? '🏆' : '📉'}
                        </span>
                        <h3 className="text-xl font-bold text-white">{debrief.opportunity}</h3>
                        <Badge variant={debrief.outcome === 'win' ? 'success' : 'danger'}>
                          {debrief.outcome.toUpperCase()}
                        </Badge>
                      </div>
                      <p className="text-slate-400 text-sm">
                        {debrief.debrief_type.charAt(0).toUpperCase() + debrief.debrief_type.slice(1)} Debrief • {debrief.debrief_date}
                      </p>
                    </div>
                    <div className="text-right">
                      <div className="text-2xl font-bold text-white">{formatCurrency(debrief.contract_value)}</div>
                      <div className="text-xs text-slate-500">Contract Value</div>
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <div className="text-xs text-emerald-400 mb-2">STRENGTHS ({debrief.strengths.length})</div>
                      <div className="flex flex-wrap gap-1">
                        {debrief.strengths.slice(0, 3).map((s, i) => (
                          <span key={i} className="px-2 py-1 bg-emerald-500/10 text-emerald-400 text-xs rounded">
                            {s}
                          </span>
                        ))}
                        {debrief.strengths.length > 3 && (
                          <span className="px-2 py-1 text-slate-500 text-xs">+{debrief.strengths.length - 3}</span>
                        )}
                      </div>
                    </div>
                    <div>
                      <div className="text-xs text-red-400 mb-2">WEAKNESSES ({debrief.weaknesses.length})</div>
                      <div className="flex flex-wrap gap-1">
                        {debrief.weaknesses.slice(0, 3).map((w, i) => (
                          <span key={i} className="px-2 py-1 bg-red-500/10 text-red-400 text-xs rounded">
                            {w}
                          </span>
                        ))}
                        {debrief.weaknesses.length > 3 && (
                          <span className="px-2 py-1 text-slate-500 text-xs">+{debrief.weaknesses.length - 3}</span>
                        )}
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </main>

          {/* Debrief Detail Modal */}
          {selectedDebrief && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-6" onClick={() => setSelectedDebrief(null)}>
              <div className="glass-card rounded-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                <div className="p-6 border-b border-slate-700/50">
                  <div className="flex items-start justify-between">
                    <div>
                      <div className="flex items-center gap-3 mb-2">
                        <span className="text-3xl">{selectedDebrief.outcome === 'win' ? '🏆' : '📉'}</span>
                        <Badge variant={selectedDebrief.outcome === 'win' ? 'success' : 'danger'}>
                          {selectedDebrief.outcome.toUpperCase()}
                        </Badge>
                      </div>
                      <h2 className="text-2xl font-bold text-white">{selectedDebrief.opportunity}</h2>
                      <p className="text-slate-400">{formatCurrency(selectedDebrief.contract_value)} • {selectedDebrief.debrief_date}</p>
                    </div>
                    <button onClick={() => setSelectedDebrief(null)} className="p-2 rounded-lg bg-slate-800/50 text-slate-400 hover:text-white">
                      <Icon name="x" className="w-5 h-5" />
                    </button>
                  </div>
                </div>

                <div className="p-6 space-y-6">
                  {/* Strengths */}
                  <div>
                    <div className="text-sm text-emerald-400 mb-3 flex items-center gap-2">
                      <Icon name="trendUp" className="w-4 h-4" /> Strengths
                    </div>
                    <div className="space-y-2">
                      {selectedDebrief.strengths.map((s, i) => (
                        <div key={i} className="p-3 bg-emerald-500/10 border border-emerald-500/20 rounded-lg text-white flex items-center gap-2">
                          <Icon name="check" className="w-4 h-4 text-emerald-400" />
                          {s}
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Weaknesses */}
                  <div>
                    <div className="text-sm text-red-400 mb-3 flex items-center gap-2">
                      <Icon name="trendDown" className="w-4 h-4" /> Weaknesses
                    </div>
                    <div className="space-y-2">
                      {selectedDebrief.weaknesses.map((w, i) => (
                        <div key={i} className="p-3 bg-red-500/10 border border-red-500/20 rounded-lg text-white flex items-center gap-2">
                          <Icon name="x" className="w-4 h-4 text-red-400" />
                          {w}
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Lessons Learned */}
                  <div>
                    <div className="text-sm text-amber-400 mb-3 flex items-center gap-2">
                      <Icon name="lightbulb" className="w-4 h-4" /> Lessons Learned
                    </div>
                    <div className="space-y-2">
                      {selectedDebrief.lessons_learned.map((l, i) => (
                        <div key={i} className="p-3 bg-amber-500/10 border border-amber-500/20 rounded-lg text-white">
                          💡 {l}
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Competitor Insights */}
                  {selectedDebrief.competitor_insights.length > 0 && (
                    <div>
                      <div className="text-sm text-cyan-400 mb-3">Competitor Intelligence</div>
                      <div className="space-y-2">
                        {selectedDebrief.competitor_insights.map((c, i) => (
                          <div key={i} className="p-3 bg-cyan-500/10 border border-cyan-500/20 rounded-lg flex items-center justify-between">
                            <div>
                              <span className="text-white font-medium">{c.name}</span>
                              <span className="text-slate-400 ml-2">• {c.notes}</span>
                            </div>
                            <Badge variant="cyan">Rank #{c.ranking}</Badge>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>

                <div className="p-6 border-t border-slate-700/50 flex justify-end gap-3">
                  <button className="px-4 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-600 transition-colors">
                    Export Report
                  </button>
                  <button className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-lg font-semibold">
                    Edit Debrief
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <footer className="glass border-t border-slate-700/50 mt-12">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-2 text-slate-400 text-sm">
                <Icon name="shield" className="w-4 h-4" />
                <span>Mission Meets Tech • MissionPulse v12</span>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<DebriefManager />);
  </script>
</body>
</html>
