// MODULE: PIPELINE
// ============================================================================
const PipelineModule = ({ opportunities, setOpportunities, connected, refreshData }) => {
  const [showForm, setShowForm] = useState(false);
  const [editingOpp, setEditingOpp] = useState(null);
  const [formData, setFormData] = useState({ nickname: '', title: '', agency: '', ceiling: '', phase: 'Qualify', pwin: 50, priority: 'P-1', days_to_submission: '', solicitation: '' });
  
  const handleSubmit = async (e) => {
    e.preventDefault();
    const newOpp = { ...formData, ceiling: parseFloat(formData.ceiling) || 0, pwin: parseInt(formData.pwin) || 50, days_to_submission: parseInt(formData.days_to_submission) || null };
    
    if (connected && supabase) {
      try {
        if (editingOpp) {
          await supabase.from('opportunities').update(newOpp).eq('id', editingOpp.id);
        } else {
          await supabase.from('opportunities').insert([newOpp]);
        }
        refreshData();
      } catch (err) { console.error(err); }
    } else {
      if (editingOpp) {
        setOpportunities(prev => prev.map(o => o.id === editingOpp.id ? { ...o, ...newOpp } : o));
      } else {
        setOpportunities(prev => [...prev, { ...newOpp, id: Date.now().toString() }]);
      }
    }
    setShowForm(false);
    setEditingOpp(null);
    setFormData({ nickname: '', title: '', agency: '', ceiling: '', phase: 'Qualify', pwin: 50, priority: 'P-1', days_to_submission: '', solicitation: '' });
  };
  
  const handleEdit = (opp) => {
    setEditingOpp(opp);
    setFormData({ ...opp, ceiling: opp.ceiling?.toString() || '', days_to_submission: opp.days_to_submission?.toString() || '' });
    setShowForm(true);
  };
  
  const handleDelete = async (id) => {
    if (!confirm('Delete this opportunity?')) return;
    if (connected && supabase) {
      await supabase.from('opportunities').delete().eq('id', id);
      refreshData();
    } else {
      setOpportunities(prev => prev.filter(o => o.id !== id));
    }
  };
  
  return (
    <div className="space-y-6 animate-fadeIn">
      <div className="flex items-center justify-between">
        <div>
          <h2 className="text-2xl font-bold text-white">Pipeline Intel</h2>
          <p className="text-slate-400">Manage opportunities and track pipeline health</p>
        </div>
        <Button onClick={() => setShowForm(true)} icon="plus">Add Opportunity</Button>
      </div>
      
      {showForm && (
        <Card glow>
          <h3 className="text-lg font-semibold text-white mb-4">{editingOpp ? 'Edit' : 'New'} Opportunity</h3>
          <form onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <input type="text" placeholder="Nickname *" value={formData.nickname} onChange={e => setFormData(f => ({ ...f, nickname: e.target.value }))} required className="bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white placeholder-slate-400" />
            <input type="text" placeholder="Full Title *" value={formData.title} onChange={e => setFormData(f => ({ ...f, title: e.target.value }))} required className="bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white placeholder-slate-400 md:col-span-2" />
            <input type="text" placeholder="Agency *" value={formData.agency} onChange={e => setFormData(f => ({ ...f, agency: e.target.value }))} required className="bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white placeholder-slate-400" />
            <input type="text" placeholder="Solicitation #" value={formData.solicitation} onChange={e => setFormData(f => ({ ...f, solicitation: e.target.value }))} className="bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white placeholder-slate-400" />
            <input type="number" placeholder="Ceiling ($)" value={formData.ceiling} onChange={e => setFormData(f => ({ ...f, ceiling: e.target.value }))} className="bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white placeholder-slate-400" />
            <select value={formData.phase} onChange={e => setFormData(f => ({ ...f, phase: e.target.value }))} className="bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white">
              {SHIPLEY_PHASES.map(p => <option key={p} value={p}>{p}</option>)}
            </select>
            <div className="flex items-center gap-2">
              <input type="range" min="0" max="100" value={formData.pwin} onChange={e => setFormData(f => ({ ...f, pwin: e.target.value }))} className="flex-1" />
              <span className="text-white w-12">{formData.pwin}%</span>
            </div>
            <select value={formData.priority} onChange={e => setFormData(f => ({ ...f, priority: e.target.value }))} className="bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white">
              <option value="P-0">P-0 (Must Win)</option>
              <option value="P-1">P-1 (Priority)</option>
              <option value="P-2">P-2 (Standard)</option>
            </select>
            <input type="number" placeholder="Days to Submission" value={formData.days_to_submission} onChange={e => setFormData(f => ({ ...f, days_to_submission: e.target.value }))} className="bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white placeholder-slate-400" />
            <div className="md:col-span-3 flex gap-3 justify-end">
              <Button type="button" variant="ghost" onClick={() => { setShowForm(false); setEditingOpp(null); }}>Cancel</Button>
              <Button type="submit">{editingOpp ? 'Update' : 'Create'}</Button>
            </div>
          </form>
        </Card>
      )}
      
      <div className="grid gap-4">
        {opportunities.map(opp => (
          <Card key={opp.id} className="hover-lift">
            <div className="flex items-start justify-between">
              <div className="flex-1">
                <div className="flex items-center gap-3 mb-2">
                  <Badge variant={opp.priority === 'P-0' ? 'danger' : opp.priority === 'P-1' ? 'warning' : 'default'}>{opp.priority}</Badge>
                  <h3 className="text-lg font-semibold text-white">{opp.nickname}</h3>
                  <Badge variant="primary">{opp.agency}</Badge>
                </div>
                <p className="text-slate-400 text-sm mb-3">{opp.title}</p>
                <div className="flex flex-wrap gap-4 text-sm">
                  <span className="text-slate-400">Ceiling: <span className="text-white">{formatCurrency(opp.ceiling)}</span></span>
                  <span className="text-slate-400">Phase: <span className="text-white">{opp.phase}</span></span>
                  <span className="text-slate-400">pWin: <span className="text-white">{opp.pwin}%</span></span>
                  <span className="text-slate-400">Days: <span className={opp.days_to_submission < 30 ? 'text-red-400' : 'text-white'}>{opp.days_to_submission || '—'}</span></span>
                </div>
              </div>
              <div className="flex gap-2">
                <Button variant="ghost" size="sm" icon="edit" onClick={() => handleEdit(opp)} />
                <Button variant="ghost" size="sm" icon="trash" onClick={() => handleDelete(opp.id)} />
              </div>
            </div>
          </Card>
        ))}
      </div>
    </div>
  );
};

    setApprovals(prev => prev.map(a => a.id === id ? { ...a, status: 'approved' } : a));

  const handleReject = async (id) => {
    if (connected && supabase) {
      await supabase.from('ai_approvals').update({ status: 'rejected', reviewed_at: new Date().toISOString() }).eq('id', id);
    }
    setApprovals(prev => prev.map(a => a.id === id ? { ...a, status: 'rejected' } : a));
  };
  
  const pending = approvals.filter(a => a.status === 'pending');
  
  return (
    <div className="space-y-6 animate-fadeIn">
      <div>
        <h2 className="text-2xl font-bold text-white">Human-in-the-Loop Queue</h2>
        <p className="text-slate-400">Review and approve AI-generated content before use</p>

        <Card><div className="text-slate-400 text-sm">Pending Review</div><div className="text-3xl font-bold text-amber-400">{pending.length}</div></Card>
        <Card><div className="text-slate-400 text-sm">Approved</div><div className="text-3xl font-bold text-emerald-400">{approvals.filter(a => a.status === 'approved').length}</div></Card>
        <Card><div className="text-slate-400 text-sm">Rejected</div><div className="text-3xl font-bold text-red-400">{approvals.filter(a => a.status === 'rejected').length}</div></Card>
      </div>
      
      <div className="space-y-4">
        {pending.map(item => (
          <Card key={item.id} glow>
            <div className="flex items-start justify-between mb-3">
              <div>
                <Badge variant="primary">{item.agent}</Badge>
                <span className="ml-2 text-sm text-slate-400">{item.content_type}</span>
              </div>
              <div className="flex items-center gap-2">
                <span className="text-sm text-slate-400">Confidence:</span>
                <Badge variant={item.confidence >= 80 ? 'success' : item.confidence >= 60 ? 'warning' : 'danger'}>{item.confidence}%</Badge>
              </div>
            </div>
            <div className="bg-slate-800/50 rounded-lg p-4 mb-4">
              <p className="text-slate-300 text-sm whitespace-pre-wrap">{item.content}</p>
            </div>
            <div className="flex gap-3 justify-end">
              <Button variant="danger" size="sm" onClick={() => handleReject(item.id)}>Reject</Button>
              <Button variant="success" size="sm" onClick={() => handleApprove(item.id)}>Approve</Button>
            </div>
          </Card>
        ))}
        {pending.length === 0 && (
          <Card>
            <div className="text-center py-8 text-slate-400">
              <span className="text-4xl mb-2 block">✅</span>
              No items pending review
            </div>
          </Card>
        )}

    </div>
  );
};

      <div className="text-center py-12">
        <span className="text-6xl mb-4 block">{module.icon}</span>
        <h3 className="text-xl font-semibold text-white mb-2">{module.name} Module</h3>
        <p className="text-slate-400">This module is ready for data integration.</p>
      </div>
    </Card>
  </div>
);

// ============================================================================
// MAIN APP
// ============================================================================
function App() {
  const [connected, setConnected] = useState(false);
  const [loading, setLoading] = useState(true);
  const [activeModule, setActiveModule] = useState('dashboard');
  const [currentRole, setCurrentRole] = useState('CEO');
  const [sidebarOpen, setSidebarOpen] = useState(false);
  
  // Data state
  const [opportunities, setOpportunities] = useState(DEMO_OPPORTUNITIES);
  const [competitors, setCompetitors] = useState(DEMO_COMPETITORS);
  const [compliance, setCompliance] = useState(DEMO_COMPLIANCE);
  const [pricing, setPricing] = useState(DEMO_PRICING);
  const [approvals, setApprovals] = useState(DEMO_APPROVALS);
  
  // Load data from Supabase
  const loadData = useCallback(async () => {
    if (!supabase) { setLoading(false); return; }
    
    try {
      const [oppsRes, compRes, compliRes, priceRes, approvalRes] = await Promise.all([
        supabase.from('opportunities').select('*').order('priority'),
        supabase.from('competitors').select('*'),
        supabase.from('compliance_items').select('*'),
        supabase.from('pricing_items').select('*'),
        supabase.from('ai_approvals').select('*').order('created_at', { ascending: false })
      ]);
      
      if (!oppsRes.error && oppsRes.data?.length) { setOpportunities(oppsRes.data); setConnected(true); }
      if (!compRes.error && compRes.data?.length) setCompetitors(compRes.data);
      if (!compliRes.error && compliRes.data?.length) setCompliance(compliRes.data);
      if (!priceRes.error && priceRes.data?.length) setPricing(priceRes.data);
      if (!approvalRes.error && approvalRes.data?.length) setApprovals(approvalRes.data);
    } catch (err) {
      console.log('Using demo data:', err);
    }
    setLoading(false);
  }, []);
  
  useEffect(() => { loadData(); }, [loadData]);
  
  // Get current module
  const currentModule = MODULES.find(m => m.id === activeModule) || MODULES[0];
  const roleData = ROLES.find(r => r.id === currentRole) || ROLES[0];
  
  // Check access
  if (!roleData.access.includes(activeModule)) {
    return (
      <div className="min-h-screen flex items-center justify-center">
        <Card>
          <div className="text-center py-8">
            <span className="text-4xl mb-4 block">🔒</span>
            <h3 className="text-xl font-semibold text-white mb-2">Access Restricted</h3>
            <p className="text-slate-400">Your role does not have access to this module.</p>
          </div>
        </Card>
      </div>
    );
  }
  
  // Render module content
  const renderModule = () => {
    switch (activeModule) {
      case 'dashboard': return <DashboardModule opportunities={opportunities} connected={connected} />;
      case 'pipeline': return <PipelineModule opportunities={opportunities} setOpportunities={setOpportunities} connected={connected} refreshData={loadData} />;
      case 'warroom': return <WarRoomModule opportunities={opportunities} />;
      case 'swimlane': return <SwimlaneModule opportunities={opportunities} />;
      case 'compliance': return <ComplianceModule compliance={compliance} />;
      case 'blackhat': return <BlackHatModule competitors={competitors} />;
      case 'pricing': return <PricingModule pricing={pricing} />;
      case 'hitl': return <HITLModule approvals={approvals} setApprovals={setApprovals} connected={connected} />;
      default: return <GenericModule module={currentModule} />;
    }
  };
  
  return (
    <div className="flex min-h-screen">
      <ConnectionStatus connected={connected} loading={loading} />
      <Sidebar activeModule={activeModule} setActiveModule={setActiveModule} currentRole={currentRole} sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen} />
      
      <main className="flex-1 lg:ml-0">
        <header className="glass sticky top-0 z-30 px-4 py-3 flex items-center justify-between border-b border-slate-700/50">
          <button onClick={() => setSidebarOpen(true)} className="lg:hidden p-2 text-slate-400 hover:text-white">
            <Icon name="menu" className="w-6 h-6" />
          </button>
          <div className="flex items-center gap-3">
            <span className="text-2xl">{currentModule.icon}</span>
            <h1 className="text-lg font-semibold text-white">{currentModule.name}</h1>
          </div>
          <div className="flex items-center gap-3">
            <select value={currentRole} onChange={e => setCurrentRole(e.target.value)} className="bg-slate-800 border border-slate-600 rounded-lg px-3 py-1.5 text-sm text-white">
              {ROLES.map(r => <option key={r.id} value={r.id}>{r.icon} {r.name}</option>)}
            </select>
            <Button variant="ghost" size="sm" icon="refresh" onClick={loadData} />
          </div>
        </header>
        
        <div className="p-6">
          {renderModule()}
        </div>
        
        <footer className="text-center py-4 text-xs text-slate-500 border-t border-slate-700/50">
          MissionPulse v{CONFIG.VERSION} | Mission. Technology. Transformation. | AI GENERATED - REQUIRES HUMAN REVIEW
        </footer>
      </main>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
