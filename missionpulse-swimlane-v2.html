<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Swimlane</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-cyan { 0%, 100% { box-shadow: 0 0 0 0 rgba(0, 229, 250, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(0, 229, 250, 0); } }
    .pulse-icon { animation: pulse-cyan 2s infinite; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: #1e293b; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const COLUMNS = [
      { id: 'backlog', name: 'Backlog', color: 'slate' },
      { id: 'todo', name: 'To Do', color: 'blue' },
      { id: 'in_progress', name: 'In Progress', color: 'cyan' },
      { id: 'review', name: 'Review', color: 'amber' },
      { id: 'done', name: 'Done', color: 'emerald' }
    ];

    const DEMO_TASKS = [
      { id: 1, title: 'Shred RFP Document', description: 'Extract all L, M, C requirements', status: 'done', priority: 'High', assignee: 'SA', opportunity: 'EHR-Mod', due_date: '2026-01-28' },
      { id: 2, title: 'Complete Compliance Matrix', description: 'Map all requirements to responses', status: 'in_progress', priority: 'Critical', assignee: 'CON', opportunity: 'EHR-Mod', due_date: '2026-02-01' },
      { id: 3, title: 'Draft Technical Approach', description: 'Section 3.0 - System Architecture', status: 'in_progress', priority: 'High', assignee: 'SA', opportunity: 'EHR-Mod', due_date: '2026-02-05' },
      { id: 4, title: 'Finalize Win Themes', description: 'Discriminators and proof points', status: 'done', priority: 'High', assignee: 'CAP', opportunity: 'EHR-Mod', due_date: '2026-01-25' },
      { id: 5, title: 'Price-to-Win Analysis', description: 'Competitive pricing analysis', status: 'review', priority: 'Critical', assignee: 'FIN', opportunity: 'EHR-Mod', due_date: '2026-02-03' },
      { id: 6, title: 'Past Performance Write-up', description: '3 relevant contract references', status: 'todo', priority: 'Medium', assignee: 'PM', opportunity: 'EHR-Mod', due_date: '2026-02-08' },
      { id: 7, title: 'Teaming Agreement Review', description: 'SubCo partnership terms', status: 'done', priority: 'Medium', assignee: 'CON', opportunity: 'EHR-Mod', due_date: '2026-01-20' },
      { id: 8, title: 'Management Approach Draft', description: 'PM methodology and org chart', status: 'backlog', priority: 'Medium', assignee: 'PM', opportunity: 'EHR-Mod', due_date: '2026-02-12' },
      { id: 9, title: 'Security Plan', description: 'CMMC 2.0 compliance documentation', status: 'todo', priority: 'High', assignee: 'SA', opportunity: 'EHR-Mod', due_date: '2026-02-10' },
      { id: 10, title: 'Executive Summary', description: 'One-page capture of solution', status: 'backlog', priority: 'Low', assignee: 'CAP', opportunity: 'EHR-Mod', due_date: '2026-02-15' },
      { id: 11, title: 'Orals Deck Draft', description: 'Initial presentation slides', status: 'backlog', priority: 'Low', assignee: 'CAP', opportunity: 'EHR-Mod', due_date: '2026-02-20' },
      { id: 12, title: 'Red Team Review', description: 'Internal compliance review', status: 'todo', priority: 'Critical', assignee: 'QA', opportunity: 'EHR-Mod', due_date: '2026-02-18' }
    ];

    const PRIORITY_COLORS = {
      Critical: { bg: 'bg-red-500/20', text: 'text-red-400', border: 'border-red-500/30' },
      High: { bg: 'bg-amber-500/20', text: 'text-amber-400', border: 'border-amber-500/30' },
      Medium: { bg: 'bg-blue-500/20', text: 'text-blue-400', border: 'border-blue-500/30' },
      Low: { bg: 'bg-slate-500/20', text: 'text-slate-400', border: 'border-slate-500/30' }
    };

    const ROLE_COLORS = {
      CEO: 'bg-purple-500', COO: 'bg-indigo-500', CAP: 'bg-cyan-500', PM: 'bg-blue-500',
      SA: 'bg-emerald-500', FIN: 'bg-green-500', CON: 'bg-amber-500', DEL: 'bg-orange-500',
      QA: 'bg-pink-500', Partner: 'bg-slate-500', Admin: 'bg-red-500'
    };

    // Sidebar
    function Sidebar() {
      const navItems = [
        { icon: '🏠', label: 'Dashboard', path: 'index.html' },
        { icon: '📊', label: 'Pipeline', path: 'missionpulse-pipeline-v2.html' },
        { icon: '🎯', label: 'War Room', path: 'missionpulse-warroom-v2.html' },
        { icon: '📋', label: 'Swimlane', path: 'missionpulse-swimlane-v2.html', active: true },
        { icon: '🔍', label: 'RFP Shredder', path: 'missionpulse-rfpshredder-v2.html' },
        { icon: '💰', label: 'Pricing', path: 'missionpulse-pricing-v2.html' },
        { icon: '🤖', label: 'Agent Hub', path: 'missionpulse-agenthub-v2.html' }
      ];

      return (
        <div className="w-64 bg-slate-900/50 border-r border-slate-700 min-h-screen p-4 hidden lg:block flex-shrink-0">
          <div className="flex items-center gap-3 mb-8">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center pulse-icon">
              <span className="text-xl">🛡️</span>
            </div>
            <div>
              <div className="font-bold text-cyan-400">MissionPulse</div>
              <div className="text-xs text-slate-400">Swimlane</div>
            </div>
          </div>
          
          <nav className="space-y-1">
            {navItems.map((item, i) => (
              <a 
                key={i}
                href={item.path}
                className={`flex items-center gap-3 px-3 py-2 rounded-lg transition-all ${
                  item.active 
                    ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' 
                    : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                }`}
              >
                <span>{item.icon}</span>
                <span className="text-sm">{item.label}</span>
              </a>
            ))}
          </nav>
        </div>
      );
    }

    // Task Card
    function TaskCard({ task, onDragStart, onClick }) {
      const priority = PRIORITY_COLORS[task.priority] || PRIORITY_COLORS.Medium;
      const daysUntilDue = task.due_date ? Math.ceil((new Date(task.due_date) - new Date()) / (1000 * 60 * 60 * 24)) : null;
      const isOverdue = daysUntilDue !== null && daysUntilDue < 0;
      const isDueSoon = daysUntilDue !== null && daysUntilDue >= 0 && daysUntilDue <= 3;

      return (
        <div
          draggable
          onDragStart={(e) => onDragStart(e, task)}
          onClick={() => onClick(task)}
          className={`bg-slate-800 border ${priority.border} rounded-lg p-3 cursor-pointer hover:bg-slate-700/50 transition-all group`}
        >
          <div className="flex items-start justify-between gap-2 mb-2">
            <h4 className="text-sm font-medium line-clamp-2">{task.title}</h4>
            <span className={`px-1.5 py-0.5 rounded text-[10px] ${priority.bg} ${priority.text} flex-shrink-0`}>
              {task.priority}
            </span>
          </div>
          
          {task.description && (
            <p className="text-xs text-slate-400 line-clamp-2 mb-2">{task.description}</p>
          )}
          
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2">
              <div className={`w-6 h-6 rounded-full ${ROLE_COLORS[task.assignee] || 'bg-slate-500'} flex items-center justify-center text-[10px] font-bold`}>
                {task.assignee?.slice(0, 2)}
              </div>
              {daysUntilDue !== null && (
                <span className={`text-xs ${isOverdue ? 'text-red-400' : isDueSoon ? 'text-amber-400' : 'text-slate-500'}`}>
                  {isOverdue ? `${Math.abs(daysUntilDue)}d overdue` : `${daysUntilDue}d`}
                </span>
              )}
            </div>
            <span className="text-xs text-slate-500 opacity-0 group-hover:opacity-100 transition-opacity">
              drag to move
            </span>
          </div>
        </div>
      );
    }

    // Column
    function Column({ column, tasks, onDrop, onDragOver, onDragStart, onTaskClick }) {
      const colorClasses = {
        slate: 'border-slate-600',
        blue: 'border-blue-500/50',
        cyan: 'border-cyan-500/50',
        amber: 'border-amber-500/50',
        emerald: 'border-emerald-500/50'
      };

      return (
        <div
          onDragOver={onDragOver}
          onDrop={(e) => onDrop(e, column.id)}
          className="flex-shrink-0 w-72 bg-slate-900/30 rounded-xl border border-slate-700 flex flex-col max-h-[calc(100vh-220px)]"
        >
          <div className={`p-3 border-b-2 ${colorClasses[column.color]} flex items-center justify-between`}>
            <div className="flex items-center gap-2">
              <h3 className="font-semibold text-sm">{column.name}</h3>
              <span className="px-2 py-0.5 bg-slate-700 rounded-full text-xs">{tasks.length}</span>
            </div>
          </div>
          
          <div className="flex-1 p-2 space-y-2 overflow-y-auto scrollbar-thin">
            {tasks.map(task => (
              <TaskCard 
                key={task.id} 
                task={task} 
                onDragStart={onDragStart}
                onClick={onTaskClick}
              />
            ))}
            {tasks.length === 0 && (
              <div className="text-center py-8 text-slate-500 text-sm">
                Drop tasks here
              </div>
            )}
          </div>
        </div>
      );
    }

    // Task Modal
    function TaskModal({ task, onClose, onSave }) {
      const [form, setForm] = React.useState(task || {
        title: '', description: '', status: 'backlog', priority: 'Medium', assignee: '', due_date: ''
      });

      return (
        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
          <div className="bg-slate-800 border border-slate-700 rounded-xl max-w-lg w-full">
            <div className="p-4 border-b border-slate-700 flex items-center justify-between">
              <h2 className="font-semibold">{task ? 'Edit Task' : 'New Task'}</h2>
              <button onClick={onClose} className="text-slate-400 hover:text-white">×</button>
            </div>
            
            <div className="p-4 space-y-4">
              <div>
                <label className="block text-sm text-slate-400 mb-1">Title</label>
                <input
                  type="text"
                  value={form.title}
                  onChange={(e) => setForm({ ...form, title: e.target.value })}
                  className="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-500"
                />
              </div>
              <div>
                <label className="block text-sm text-slate-400 mb-1">Description</label>
                <textarea
                  value={form.description}
                  onChange={(e) => setForm({ ...form, description: e.target.value })}
                  rows={3}
                  className="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-500 resize-none"
                />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Priority</label>
                  <select
                    value={form.priority}
                    onChange={(e) => setForm({ ...form, priority: e.target.value })}
                    className="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-500"
                  >
                    <option>Critical</option>
                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>
                  </select>
                </div>
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Assignee</label>
                  <select
                    value={form.assignee}
                    onChange={(e) => setForm({ ...form, assignee: e.target.value })}
                    className="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-500"
                  >
                    <option value="">Unassigned</option>
                    {Object.keys(ROLE_COLORS).map(role => (
                      <option key={role} value={role}>{role}</option>
                    ))}
                  </select>
                </div>
              </div>
              <div>
                <label className="block text-sm text-slate-400 mb-1">Due Date</label>
                <input
                  type="date"
                  value={form.due_date?.split('T')[0] || ''}
                  onChange={(e) => setForm({ ...form, due_date: e.target.value })}
                  className="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-500"
                />
              </div>
            </div>
            
            <div className="p-4 border-t border-slate-700 flex justify-end gap-3">
              <button onClick={onClose} className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
                Cancel
              </button>
              <button
                onClick={() => { onSave(form); onClose(); }}
                className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg text-sm font-medium"
              >
                Save
              </button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [tasks, setTasks] = React.useState(DEMO_TASKS);
      const [draggedTask, setDraggedTask] = React.useState(null);
      const [selectedTask, setSelectedTask] = React.useState(null);
      const [showModal, setShowModal] = React.useState(false);
      const [filter, setFilter] = React.useState('all');

      const handleDragStart = (e, task) => {
        setDraggedTask(task);
        e.dataTransfer.effectAllowed = 'move';
      };

      const handleDragOver = (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
      };

      const handleDrop = (e, columnId) => {
        e.preventDefault();
        if (draggedTask) {
          setTasks(prev => prev.map(t => 
            t.id === draggedTask.id ? { ...t, status: columnId } : t
          ));
          setDraggedTask(null);
        }
      };

      const handleSaveTask = (taskData) => {
        if (taskData.id) {
          setTasks(prev => prev.map(t => t.id === taskData.id ? taskData : t));
        } else {
          setTasks(prev => [...prev, { ...taskData, id: Date.now() }]);
        }
      };

      const filteredTasks = filter === 'all' 
        ? tasks 
        : tasks.filter(t => t.assignee === filter);

      const stats = {
        total: tasks.length,
        done: tasks.filter(t => t.status === 'done').length,
        overdue: tasks.filter(t => {
          const days = t.due_date ? Math.ceil((new Date(t.due_date) - new Date()) / (1000 * 60 * 60 * 24)) : null;
          return days !== null && days < 0 && t.status !== 'done';
        }).length
      };

      const progress = stats.total ? Math.round((stats.done / stats.total) * 100) : 0;

      return (
        <div className="flex min-h-screen">
          <Sidebar />
          
          <div className="flex-1 flex flex-col min-w-0">
            {/* Header */}
            <div className="p-4 lg:p-6 border-b border-slate-800">
              <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-4">
                <div>
                  <h1 className="text-2xl font-bold">Swimlane Board</h1>
                  <p className="text-slate-400 text-sm">EHR-Mod • {stats.total} tasks • {progress}% complete</p>
                </div>
                
                <div className="flex items-center gap-3">
                  <select
                    value={filter}
                    onChange={(e) => setFilter(e.target.value)}
                    className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-cyan-500"
                  >
                    <option value="all">All Assignees</option>
                    {Object.keys(ROLE_COLORS).map(role => (
                      <option key={role} value={role}>{role}</option>
                    ))}
                  </select>
                  <button
                    onClick={() => { setSelectedTask(null); setShowModal(true); }}
                    className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg text-sm font-medium"
                  >
                    + Add Task
                  </button>
                </div>
              </div>

              {/* Progress Bar */}
              <div className="mt-4 flex items-center gap-4">
                <div className="flex-1 h-2 bg-slate-700 rounded-full overflow-hidden">
                  <div 
                    className="h-full bg-gradient-to-r from-cyan-500 to-emerald-500 rounded-full transition-all"
                    style={{ width: `${progress}%` }}
                  />
                </div>
                <div className="flex items-center gap-4 text-sm">
                  <span className="text-emerald-400">{stats.done} done</span>
                  {stats.overdue > 0 && (
                    <span className="text-red-400">{stats.overdue} overdue</span>
                  )}
                </div>
              </div>
            </div>

            {/* Board */}
            <div className="flex-1 p-4 lg:p-6 overflow-x-auto">
              <div className="flex gap-4 min-w-max">
                {COLUMNS.map(column => (
                  <Column
                    key={column.id}
                    column={column}
                    tasks={filteredTasks.filter(t => t.status === column.id)}
                    onDrop={handleDrop}
                    onDragOver={handleDragOver}
                    onDragStart={handleDragStart}
                    onTaskClick={(task) => { setSelectedTask(task); setShowModal(true); }}
                  />
                ))}
              </div>
            </div>

            {/* Footer */}
            <div className="p-4 text-center text-xs text-slate-500 border-t border-slate-800">
              <div>Mission Meets Tech | MissionPulse Swimlane</div>
              <div className="mt-1">AI GENERATED - REQUIRES HUMAN REVIEW</div>
            </div>
          </div>

          {/* Modal */}
          {showModal && (
            <TaskModal
              task={selectedTask}
              onClose={() => { setShowModal(false); setSelectedTask(null); }}
              onSave={handleSaveTask}
            />
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
