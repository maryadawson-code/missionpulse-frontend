    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

    .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    .animate-shimmer { background: linear-gradient(90deg, transparent, rgba(0,229,250,0.1), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }

    .glass-hover:hover { background: rgba(0, 229, 250, 0.08); border-color: rgba(0, 229, 250, 0.3); }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: #1e293b; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    .editor-content { min-height: 300px; white-space: pre-wrap; }
    .cui-banner { font-family: monospace; letter-spacing: 0.1em; }

    // ═══════════════════════════════════════════════════════════════════
    // MAIN COMPONENT
    // ═══════════════════════════════════════════════════════════════════
    function IronDomeApp() {
      const [connected, setConnected] = useState(false);
      const [loading, setLoading] = useState(true);
      const [opportunities, setOpportunities] = useState([]);
      const [sections, setSections] = useState([]);
      const [selectedOpp, setSelectedOpp] = useState(null);
      const [selectedSection, setSelectedSection] = useState(null);
      const [activeVolume, setActiveVolume] = useState('technical');
      const [editMode, setEditMode] = useState(false);
      const [editContent, setEditContent] = useState('');
      const [saving, setSaving] = useState(false);
      const [showAddModal, setShowAddModal] = useState(false);
      const [aiGenerating, setAiGenerating] = useState(false);

      // Load data
      useEffect(() => {
        loadData();
      }, []);

      async function loadData() {
        setLoading(true);
        try {
          if (supabase) {
            // Try to load from Supabase
            const { data: opps, error: oppError } = await supabase
              .from('opportunities')
              .select('id, nickname, title, agency')
              .order('created_at', { ascending: false });

            if (!oppError && opps?.length > 0) {
              setOpportunities(opps);
              setSelectedOpp(opps[0]);
              setConnected(true);
              
              // Load sections for first opportunity
              const { data: secs } = await supabase
                .from('proposal_sections')
                .select('*')
                .eq('opportunity_id', opps[0].id)
                .order('section_number');
              
              if (secs) setSections(secs);
            } else {
              throw new Error('No data');
            }
          } else {
            throw new Error('No Supabase');
          }
        } catch (e) {
          console.log('Using demo data:', e.message);
          setOpportunities(DEMO_OPPORTUNITIES);
          setSelectedOpp(DEMO_OPPORTUNITIES[0]);
          setSections(DEMO_SECTIONS);
          setConnected(false);
        }
        setLoading(false);
      }

      async function loadSections(oppId) {
        if (!oppId) return;
        try {
          if (supabase && connected) {
            const { data } = await supabase
              .from('proposal_sections')
              .select('*')
              .eq('opportunity_id', oppId)
              .order('section_number');
            if (data) setSections(data);
          } else {
            setSections(DEMO_SECTIONS.filter(s => s.opportunity_id === oppId));
          }
        } catch (e) {
          setSections(DEMO_SECTIONS.filter(s => s.opportunity_id === oppId));
        }
      }

      function handleOppChange(opp) {
        setSelectedOpp(opp);
        setSelectedSection(null);
        loadSections(opp.id);
      }

      async function saveSection() {
        if (!selectedSection) return;
        setSaving(true);
        
        const wordCount = editContent.split(/\s+/).filter(w => w).length;
        const currentPages = (wordCount / 250).toFixed(1);
        
        const updates = {
          content: editContent,
          word_count: wordCount,
          current_pages: parseFloat(currentPages),
          updated_at: new Date().toISOString()
        };

        try {
          if (supabase && connected) {
            await supabase
              .from('proposal_sections')
              .update(updates)
              .eq('id', selectedSection.id);
          }
          
          setSections(prev => prev.map(s => 
            s.id === selectedSection.id ? { ...s, ...updates } : s
          ));
          setSelectedSection(prev => ({ ...prev, ...updates }));
          setEditMode(false);
        } catch (e) {
          console.error('Save failed:', e);
        }
        setSaving(false);
      }

      async function updateSectionStatus(sectionId, newStatus) {
        try {
          if (supabase && connected) {
            await supabase
              .from('proposal_sections')
              .update({ status: newStatus, updated_at: new Date().toISOString() })
              .eq('id', sectionId);
          }
          
          setSections(prev => prev.map(s => 
            s.id === sectionId ? { ...s, status: newStatus } : s
          ));
          if (selectedSection?.id === sectionId) {
            setSelectedSection(prev => ({ ...prev, status: newStatus }));
          }
        } catch (e) {
          console.error('Status update failed:', e);
        }
      }

      async function simulateAIGeneration() {
        if (!selectedSection) return;
        setAiGenerating(true);
        
        // Simulate AI generation delay
        await new Promise(r => setTimeout(r, 2000));
        
        const aiContent = `${editContent || selectedSection.content || ''}\n\n[AI GENERATED CONTENT]\nBased on the RFP requirements and our proven methodologies, the following approach ensures compliance with Section L evaluation criteria while demonstrating our competitive advantages:\n\n• Leveraging 15+ years of federal healthcare IT experience\n• FedRAMP High authorized infrastructure\n• CMMI Level 3 certified processes\n• 98.7% on-time delivery rate across similar engagements\n\n[End AI Generated - Requires Human Review]`;
        
        setEditContent(aiContent);
        setAiGenerating(false);
      }

      const filteredSections = sections.filter(s => s.volume === activeVolume);
      const volumeStats = Object.keys(VOLUME_CONFIG).map(vol => ({
        volume: vol,
        count: sections.filter(s => s.volume === vol).length,
        approved: sections.filter(s => s.volume === vol && s.status === 'approved').length,
        totalWords: sections.filter(s => s.volume === vol).reduce((sum, s) => sum + (s.word_count || 0), 0)
      }));

      const overallProgress = sections.length > 0 
        ? Math.round((sections.filter(s => s.status === 'approved').length / sections.length) * 100)
        : 0;

      if (loading) {
        return (

          <header className="glass border-b border-cyan-500/20 sticky top-0 z-50">

                <div className="flex items-center gap-4">
                  <a href="index.html" className="p-2 rounded-lg hover:bg-cyan-500/10 transition-colors">
                    <Icon name="home" className="w-5 h-5 text-cyan-400" />
                  </a>
                  <div className="flex items-center gap-2">
                    <Icon name="shield" className="w-6 h-6 text-cyan-400" />
                    <h1 className="text-xl font-bold">Iron Dome Writer</h1>
                  </div>
                </div>
                
                <div className="flex items-center gap-4">
                  {/* Opportunity Selector */}
                  <select
                    value={selectedOpp?.id || ''}
                    onChange={(e) => {
                      const opp = opportunities.find(o => o.id === e.target.value);
                      if (opp) handleOppChange(opp);
                    }}
                    className="bg-slate-800/50 border border-cyan-500/30 rounded-lg px-3 py-2 text-sm focus:border-cyan-400 outline-none"
                  >
                    {opportunities.map(opp => (
                      <option key={opp.id} value={opp.id}>
                        {opp.nickname} - {opp.title}
                      </option>
                    ))}
                  </select>
                  
                  {/* Connection Status */}
                  <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-xs ${connected ? 'bg-green-500/20 text-green-400' : 'bg-yellow-500/20 text-yellow-400'}`}>
                    <div className={`w-2 h-2 rounded-full ${connected ? 'bg-green-400' : 'bg-yellow-400'} animate-pulse`}></div>
                    {connected ? 'Connected' : 'Demo Mode'}
                  </div>
                  
                  <button onClick={loadData} className="p-2 rounded-lg hover:bg-cyan-500/10">
                    <Icon name="refresh" className="w-5 h-5 text-cyan-400" />
                  </button>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 py-6">
            {/* Progress Overview */}
            <div className="glass rounded-xl p-4 mb-6">
              <div className="flex items-center justify-between mb-4">
                <h2 className="text-lg font-semibold">Proposal Progress</h2>
                <span className="text-2xl font-bold text-cyan-400">{overallProgress}%</span>
              </div>
              <div className="h-3 bg-slate-800 rounded-full overflow-hidden mb-4">
                <div 
                  className="h-full bg-gradient-to-r from-cyan-500 to-cyan-400 transition-all duration-500"
                  style={{ width: `${overallProgress}%` }}
                ></div>
              </div>
              <div className="grid grid-cols-5 gap-4">
                {volumeStats.map(vs => (
                  <div 
                    key={vs.volume}
                    onClick={() => setActiveVolume(vs.volume)}
                    className={`p-3 rounded-lg cursor-pointer transition-all ${activeVolume === vs.volume ? 'bg-cyan-500/20 border border-cyan-500/50' : 'bg-slate-800/50 hover:bg-slate-800'}`}
                  >
                    <div className="flex items-center gap-2 mb-2">
                      <Icon name={VOLUME_CONFIG[vs.volume].icon} className="w-4 h-4" style={{ color: VOLUME_CONFIG[vs.volume].color }} />
                      <span className="text-xs font-medium">{VOLUME_CONFIG[vs.volume].label}</span>
                    </div>
                    <div className="text-lg font-bold">{vs.approved}/{vs.count}</div>
                    <div className="text-xs text-slate-400">{vs.totalWords.toLocaleString()} words</div>
                  </div>
                ))}
              </div>
            </div>

            <div className="grid grid-cols-3 gap-6">
              {/* Section List */}
              <div className="col-span-1">
                <div className="glass rounded-xl p-4">
                  <div className="flex items-center justify-between mb-4">
                    <h3 className="font-semibold">{VOLUME_CONFIG[activeVolume].label} Sections</h3>
                    <button 
                      onClick={() => setShowAddModal(true)}
                      className="p-1.5 rounded-lg bg-cyan-500/20 hover:bg-cyan-500/30 text-cyan-400"
                    >
                      <Icon name="plus" className="w-4 h-4" />
                    </button>
                  </div>
                  
                  <div className="space-y-2 max-h-[600px] overflow-y-auto scrollbar-thin">
                    {filteredSections.length === 0 ? (
                      <div className="text-center py-8 text-slate-500">
                        <Icon name="fileText" className="w-12 h-12 mx-auto mb-2 opacity-50" />
                        <p>No sections yet</p>
                      </div>
                    ) : (
                      filteredSections.map(section => (
                        <div
                          key={section.id}
                          onClick={() => {
                            setSelectedSection(section);
                            setEditContent(section.content || '');
                            setEditMode(false);
                          }}
                          className={`p-3 rounded-lg cursor-pointer transition-all ${
                            selectedSection?.id === section.id 
                              ? 'bg-cyan-500/20 border border-cyan-500/50' 
                              : 'bg-slate-800/50 hover:bg-slate-800 border border-transparent'
                          }`}
                        >
                          <div className="flex items-start justify-between">
                            <div className="flex-1">
                              <div className="flex items-center gap-2 mb-1">
                                <span className="text-xs font-mono text-cyan-400">{section.section_number}</span>
                                <span 
                                  className="px-1.5 py-0.5 rounded text-xs"
                                  style={{ 
                                    backgroundColor: STATUS_CONFIG[section.status]?.bg,
                                    color: STATUS_CONFIG[section.status]?.color 
                                  }}
                                >
                                  {STATUS_CONFIG[section.status]?.label}
                                </span>
                              </div>
                              <h4 className="font-medium text-sm truncate">{section.title}</h4>
                              <div className="flex items-center gap-3 mt-1 text-xs text-slate-400">
                                <span>{section.word_count?.toLocaleString()} words</span>
                                <span>{section.current_pages}/{section.page_limit} pg</span>
                              </div>
                            </div>
                            {section.status === 'locked' && (
                              <Icon name="lock" className="w-4 h-4 text-red-400" />
                            )}
                          </div>
                          
                          {/* Page limit warning */}
                          {section.current_pages > section.page_limit && (
                            <div className="mt-2 flex items-center gap-1 text-xs text-red-400">
                              <Icon name="alert" className="w-3 h-3" />
                              Over page limit!
                            </div>
                          )}
                        </div>
                      ))
                    )}
                  </div>
                </div>
              </div>

              {/* Editor Panel */}
              <div className="col-span-2">
                {selectedSection ? (
                  <div className="glass rounded-xl overflow-hidden">
                    {/* CUI Banner */}
                    <div 
                      className="cui-banner px-4 py-2 text-center text-sm font-bold"
                      style={{ 
                        backgroundColor: CUI_MARKINGS.find(c => c.value === selectedSection.cui_marking)?.color + '20',
                        color: CUI_MARKINGS.find(c => c.value === selectedSection.cui_marking)?.color,
                        borderBottom: `2px solid ${CUI_MARKINGS.find(c => c.value === selectedSection.cui_marking)?.color}`
                      }}
                    >
                      {selectedSection.cui_marking}
                    </div>
                    
                    {/* Section Header */}
                    <div className="p-4 border-b border-slate-700/50">
                      <div className="flex items-center justify-between">
                        <div>
                          <h2 className="text-xl font-bold">
                            {selectedSection.section_number} {selectedSection.title}
                          </h2>
                          <div className="flex items-center gap-4 mt-2 text-sm text-slate-400">
                            <span>Assigned: {selectedSection.assigned_to || 'Unassigned'}</span>
                            <span>AI: {selectedSection.ai_generated_percent}%</span>
                            <span>Citations: {selectedSection.citations_count}</span>
                            <span>Compliance: {selectedSection.compliance_score}%</span>
                          </div>
                        </div>
                        
                        <div className="flex items-center gap-2">
                          {/* Status Dropdown */}
                          <select
                            value={selectedSection.status}
                            onChange={(e) => updateSectionStatus(selectedSection.id, e.target.value)}
                            className="bg-slate-800/50 border border-cyan-500/30 rounded-lg px-3 py-2 text-sm"
                            disabled={selectedSection.status === 'locked'}
                          >
                            {Object.entries(STATUS_CONFIG).map(([key, cfg]) => (
                              <option key={key} value={key}>{cfg.label}</option>
                            ))}
                          </select>
                          
                          {!editMode ? (
                            <button
                              onClick={() => setEditMode(true)}
                              disabled={selectedSection.status === 'locked'}
                              className="flex items-center gap-2 px-4 py-2 bg-cyan-500/20 hover:bg-cyan-500/30 rounded-lg text-cyan-400 disabled:opacity-50"
                            >
                              <Icon name="edit" className="w-4 h-4" />
                              Edit
                            </button>
                          ) : (
                            <div className="flex items-center gap-2">
                              <button
                                onClick={() => {
                                  setEditMode(false);
                                  setEditContent(selectedSection.content || '');
                                }}
                                className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg"
                              >
                                Cancel
                              </button>
                              <button
                                onClick={saveSection}
                                disabled={saving}
                                className="flex items-center gap-2 px-4 py-2 bg-cyan-500 hover:bg-cyan-400 rounded-lg text-black font-medium disabled:opacity-50"
                              >
                                <Icon name="save" className="w-4 h-4" />
                                {saving ? 'Saving...' : 'Save'}
                              </button>
                            </div>
                          )}
                        </div>
                      </div>
                      
                      {/* Word/Page Stats */}
                      <div className="mt-4 grid grid-cols-4 gap-4">
                        <div className="bg-slate-800/50 rounded-lg p-3">
                          <div className="text-xs text-slate-400">Words</div>
                          <div className="text-lg font-bold">{(editMode ? editContent.split(/\s+/).filter(w => w).length : selectedSection.word_count)?.toLocaleString()}</div>
                        </div>
                        <div className={`rounded-lg p-3 ${selectedSection.current_pages > selectedSection.page_limit ? 'bg-red-500/20' : 'bg-slate-800/50'}`}>
                          <div className="text-xs text-slate-400">Pages</div>
                          <div className="text-lg font-bold">{editMode ? (editContent.split(/\s+/).filter(w => w).length / 250).toFixed(1) : selectedSection.current_pages} / {selectedSection.page_limit}</div>
                        </div>
                        <div className="bg-slate-800/50 rounded-lg p-3">
                          <div className="text-xs text-slate-400">AI Content</div>
                          <div className="text-lg font-bold">{selectedSection.ai_generated_percent}%</div>
                        </div>
                        <div className={`rounded-lg p-3 ${selectedSection.compliance_score >= 90 ? 'bg-green-500/20' : selectedSection.compliance_score >= 70 ? 'bg-yellow-500/20' : 'bg-red-500/20'}`}>
                          <div className="text-xs text-slate-400">Compliance</div>
                          <div className="text-lg font-bold">{selectedSection.compliance_score}%</div>
                        </div>
                      </div>
                    </div>
                    
                    {/* Content Area */}
                    <div className="p-4">
                      {editMode ? (
                        <div>
                          <div className="flex items-center gap-2 mb-2">
                            <button
                              onClick={simulateAIGeneration}
                              disabled={aiGenerating}
                              className="flex items-center gap-2 px-3 py-1.5 bg-purple-500/20 hover:bg-purple-500/30 rounded-lg text-purple-400 text-sm disabled:opacity-50"
                            >
                              <Icon name="zap" className="w-4 h-4" />
                              {aiGenerating ? 'Generating...' : 'AI Assist'}
                            </button>
                            <span className="text-xs text-slate-500">Generate content based on RFP requirements</span>
                          </div>
                          <textarea
                            value={editContent}
                            onChange={(e) => setEditContent(e.target.value)}
                            className="w-full h-96 bg-slate-900/50 border border-cyan-500/30 rounded-lg p-4 text-sm font-mono resize-none focus:border-cyan-400 outline-none"
                            placeholder="Enter section content..."
                          />
                        </div>
                      ) : (
                        <div className="editor-content bg-slate-900/50 rounded-lg p-4 text-sm min-h-[400px] max-h-[600px] overflow-y-auto scrollbar-thin">
                          {selectedSection.content || <span className="text-slate-500 italic">No content yet. Click Edit to start writing.</span>}
                        </div>
                      )}
                    </div>
                    
                    {/* Footer with CUI reminder */}
                    <div 
                      className="cui-banner px-4 py-2 text-center text-xs"
                      style={{ 
                        backgroundColor: CUI_MARKINGS.find(c => c.value === selectedSection.cui_marking)?.color + '10',
                        color: CUI_MARKINGS.find(c => c.value === selectedSection.cui_marking)?.color
                      }}
                    >
                      Controlled by: Mission Meets Tech | Dissemination controls apply
                    </div>
                  </div>
                ) : (
                  <div className="glass rounded-xl p-12 text-center">
                    <Icon name="fileText" className="w-16 h-16 mx-auto mb-4 text-slate-600" />
                    <h3 className="text-xl font-semibold mb-2">Select a Section</h3>
                    <p className="text-slate-400">Choose a section from the left panel to view and edit content</p>
                  </div>
                )}
              </div>
            </div>
          </main>

          {/* Footer */}
          <footer className="border-t border-cyan-500/10 mt-8 py-4 text-center text-xs text-slate-500">
            <p>MissionPulse v3.1 • Mission Meets Tech • AI GENERATED CONTENT REQUIRES HUMAN REVIEW</p>
          </footer>

          {/* Add Section Modal */}
          {showAddModal && (
            <AddSectionModal
              volume={activeVolume}
              opportunityId={selectedOpp?.id}
              onClose={() => setShowAddModal(false)}
              onSave={async (newSection) => {
                if (supabase && connected) {
                  const { data } = await supabase
                    .from('proposal_sections')
                    .insert([newSection])
                    .select()
                    .single();
                  if (data) setSections(prev => [...prev, data]);
                } else {
                  setSections(prev => [...prev, { ...newSection, id: `demo-${Date.now()}` }]);
                }
                setShowAddModal(false);
              }}
            />
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // ADD SECTION MODAL
    // ═══════════════════════════════════════════════════════════════════
    function AddSectionModal({ volume, opportunityId, onClose, onSave }) {
      const [formData, setFormData] = useState({
        section_number: '',
        title: '',
        page_limit: 10,
        assigned_to: '',
        cui_marking: 'UNCLASSIFIED'
      });

      const handleSubmit = (e) => {
        e.preventDefault();
        onSave({
          ...formData,
          opportunity_id: opportunityId,
          volume,
          content: '',
          word_count: 0,
          current_pages: 0,
          status: 'not_started',
          ai_generated_percent: 0,
          citations_count: 0,
          compliance_score: 0
        });
      };

      return (
        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
          <div className="glass rounded-xl p-6 w-full max-w-md">
            <h3 className="text-xl font-bold mb-4">Add New Section</h3>
            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-sm text-slate-400 mb-1">Section Number</label>
                <input
                  type="text"
                  value={formData.section_number}
                  onChange={(e) => setFormData(prev => ({ ...prev, section_number: e.target.value }))}
                  className="w-full bg-slate-800/50 border border-cyan-500/30 rounded-lg px-3 py-2"
                  placeholder="e.g., 4.0"
                  required
                />
              </div>
              <div>
                <label className="block text-sm text-slate-400 mb-1">Title</label>
                <input
                  type="text"
                  value={formData.title}
                  onChange={(e) => setFormData(prev => ({ ...prev, title: e.target.value }))}
                  className="w-full bg-slate-800/50 border border-cyan-500/30 rounded-lg px-3 py-2"
                  placeholder="Section title"
                  required
                />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Page Limit</label>
                  <input
                    type="number"
                    value={formData.page_limit}
                    onChange={(e) => setFormData(prev => ({ ...prev, page_limit: parseInt(e.target.value) }))}
                    className="w-full bg-slate-800/50 border border-cyan-500/30 rounded-lg px-3 py-2"
                    min="1"
                  />
                </div>
                <div>
                  <label className="block text-sm text-slate-400 mb-1">CUI Marking</label>
                  <select
                    value={formData.cui_marking}
                    onChange={(e) => setFormData(prev => ({ ...prev, cui_marking: e.target.value }))}
                    className="w-full bg-slate-800/50 border border-cyan-500/30 rounded-lg px-3 py-2"
                  >
                    {CUI_MARKINGS.map(cui => (
                      <option key={cui.value} value={cui.value}>{cui.label}</option>
                    ))}
                  </select>
                </div>
              </div>
              <div>
                <label className="block text-sm text-slate-400 mb-1">Assigned To</label>
                <input
                  type="text"
                  value={formData.assigned_to}
                  onChange={(e) => setFormData(prev => ({ ...prev, assigned_to: e.target.value }))}
                  className="w-full bg-slate-800/50 border border-cyan-500/30 rounded-lg px-3 py-2"
                  placeholder="Team member name"
                />
              </div>
              <div className="flex justify-end gap-3 mt-6">
                <button type="button" onClick={onClose} className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg">
                  Cancel
                </button>
                <button type="submit" className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 rounded-lg text-black font-medium">
                  Add Section
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    ReactDOM.render(<IronDomeApp />, document.getElementById('root'));
  </script>
</body>
</html>
