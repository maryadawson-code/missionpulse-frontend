<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Iron Dome</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.15); }
    .progress-bar { transition: width 0.3s ease; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const DEFAULT_COMPANY_ID = '11111111-1111-1111-1111-111111111111';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const DEMO_SECTIONS = [
      { id: '1', opportunity_id: '1', volume: 'Technical', section_number: '1.0', title: 'Executive Summary', page_limit: 5, current_pages: 4, status: 'Complete', compliance_score: 95 },
      { id: '2', opportunity_id: '1', volume: 'Technical', section_number: '2.0', title: 'Technical Approach', page_limit: 30, current_pages: 28, status: 'In Review', compliance_score: 88 },
      { id: '3', opportunity_id: '1', volume: 'Technical', section_number: '3.0', title: 'Management Approach', page_limit: 20, current_pages: 22, status: 'Over Limit', compliance_score: 72 },
      { id: '4', opportunity_id: '1', volume: 'Technical', section_number: '4.0', title: 'Staffing Plan', page_limit: 15, current_pages: 10, status: 'Draft', compliance_score: 65 },
      { id: '5', opportunity_id: '1', volume: 'Technical', section_number: '5.0', title: 'Quality Control', page_limit: 10, current_pages: 0, status: 'Not Started', compliance_score: 0 },
      { id: '6', opportunity_id: '1', volume: 'Management', section_number: '1.0', title: 'Org Chart & Key Personnel', page_limit: 10, current_pages: 8, status: 'In Review', compliance_score: 82 },
      { id: '7', opportunity_id: '1', volume: 'Management', section_number: '2.0', title: 'Risk Management', page_limit: 8, current_pages: 7, status: 'Draft', compliance_score: 70 },
      { id: '8', opportunity_id: '1', volume: 'Past Performance', section_number: '1.0', title: 'Contract References', page_limit: 15, current_pages: 12, status: 'Complete', compliance_score: 100 },
      { id: '9', opportunity_id: '1', volume: 'Past Performance', section_number: '2.0', title: 'Relevance Matrix', page_limit: 5, current_pages: 5, status: 'Complete', compliance_score: 92 },
    ];

    const DEMO_OPPORTUNITIES = [
      { id: '1', title: 'DHA MHS GENESIS Support', agency: 'DHA' },
      { id: '2', title: 'VA EHR Modernization', agency: 'VA' },
    ];

    function App() {
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [sections, setSections] = React.useState(DEMO_SECTIONS);
      const [opportunities, setOpportunities] = React.useState(DEMO_OPPORTUNITIES);
      const [selectedOpp, setSelectedOpp] = React.useState('1');
      const [selectedVolume, setSelectedVolume] = React.useState('all');
      const [showModal, setShowModal] = React.useState(false);
      const [editingSection, setEditingSection] = React.useState(null);
      const [form, setForm] = React.useState({ 
        volume: 'Technical', 
        section_number: '', 
        title: '', 
        page_limit: 10, 
        current_pages: 0, 
        status: 'Not Started',
        compliance_score: 0,
        opportunity_id: '1'
      });

      React.useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        try {
          const [sectionsRes, oppsRes] = await Promise.all([
            supabase.from('proposal_sections').select('*').order('section_number'),
            supabase.from('opportunities').select('id, title, agency')
          ]);
          
          if (!sectionsRes.error && sectionsRes.data?.length > 0) {
            setSections(sectionsRes.data);
            setConnected(true);
          }
          if (!oppsRes.error && oppsRes.data?.length > 0) {
            setOpportunities(oppsRes.data);
            setSelectedOpp(oppsRes.data[0].id);
          }
        } catch (e) {
          console.log('Using demo data');
        }
        setLoading(false);
      };

      const saveSection = async () => {
        const sectionData = {
          ...form,
          company_id: DEFAULT_COMPANY_ID,
          updated_at: new Date().toISOString()
        };

        if (connected) {
          try {
            if (editingSection) {
              const { error } = await supabase.from('proposal_sections').update(sectionData).eq('id', editingSection.id);
              if (!error) {
                setSections(sections.map(s => s.id === editingSection.id ? { ...s, ...sectionData } : s));
              }
            } else {
              const { data, error } = await supabase.from('proposal_sections').insert([sectionData]).select();
              if (!error && data) {
                setSections([...sections, data[0]]);
              }
            }
          } catch (e) {
            console.error('Save error:', e);
          }
        } else {
          if (editingSection) {
            setSections(sections.map(s => s.id === editingSection.id ? { ...s, ...sectionData } : s));
          } else {
            setSections([...sections, { ...sectionData, id: Date.now().toString() }]);
          }
        }
        
        setShowModal(false);
        setEditingSection(null);
        resetForm();
      };

      const resetForm = () => {
        setForm({ 
          volume: 'Technical', 
          section_number: '', 
          title: '', 
          page_limit: 10, 
          current_pages: 0, 
          status: 'Not Started',
          compliance_score: 0,
          opportunity_id: selectedOpp
        });
      };

      const deleteSection = async (id) => {
        if (!confirm('Delete this section?')) return;
        if (connected) {
          await supabase.from('proposal_sections').delete().eq('id', id);
        }
        setSections(sections.filter(s => s.id !== id));
      };

      const updatePages = async (section, newPages) => {
        const newStatus = newPages === 0 ? 'Not Started' : 
                         newPages > section.page_limit ? 'Over Limit' :
                         newPages === section.page_limit ? 'Complete' : 
                         section.status === 'Not Started' ? 'Draft' : section.status;
        
        const updated = { ...section, current_pages: newPages, status: newStatus };
        
        if (connected) {
          await supabase.from('proposal_sections').update({ 
            current_pages: newPages, 
            status: newStatus,
            updated_at: new Date().toISOString()
          }).eq('id', section.id);
        }
        setSections(sections.map(s => s.id === section.id ? updated : s));
      };

      const openEditModal = (section) => {
        setEditingSection(section);
        setForm({
          volume: section.volume,
          section_number: section.section_number || '',
          title: section.title,
          page_limit: section.page_limit || 10,
          current_pages: section.current_pages || 0,
          status: section.status || 'Not Started',
          compliance_score: section.compliance_score || 0,
          opportunity_id: section.opportunity_id
        });
        setShowModal(true);
      };

      // Filter sections
      const filteredSections = sections.filter(s => {
        const oppMatch = s.opportunity_id === selectedOpp;
        const volMatch = selectedVolume === 'all' || s.volume === selectedVolume;
        return oppMatch && volMatch;
      });

      // Get unique volumes
      const volumes = [...new Set(sections.filter(s => s.opportunity_id === selectedOpp).map(s => s.volume))];

      // Calculate stats
      const stats = {
        totalPages: filteredSections.reduce((sum, s) => sum + (s.page_limit || 0), 0),
        usedPages: filteredSections.reduce((sum, s) => sum + (s.current_pages || 0), 0),
        overLimit: filteredSections.filter(s => s.current_pages > s.page_limit).length,
        complete: filteredSections.filter(s => s.status === 'Complete').length,
        avgCompliance: filteredSections.length > 0 
          ? Math.round(filteredSections.reduce((sum, s) => sum + (s.compliance_score || 0), 0) / filteredSections.length)
          : 0
      };

      const getStatusColor = (status) => {
        switch (status) {
          case 'Complete': return 'bg-emerald-500/20 text-emerald-400';
          case 'In Review': return 'bg-blue-500/20 text-blue-400';
          case 'Draft': return 'bg-amber-500/20 text-amber-400';
          case 'Over Limit': return 'bg-red-500/20 text-red-400';
          case 'Not Started': return 'bg-slate-500/20 text-slate-400';
          default: return 'bg-slate-500/20 text-slate-400';
        }
      };

      const getPageBarColor = (current, limit) => {
        const ratio = current / limit;
        if (ratio > 1) return 'bg-red-500';
        if (ratio > 0.9) return 'bg-amber-500';
        if (ratio > 0.7) return 'bg-cyan-500';
        return 'bg-emerald-500';
      };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
          </div>
        );
      }

      return (
        <div className="min-h-screen p-6">
          {/* Header */}
          <div className="flex items-center justify-between mb-6">
            <div className="flex items-center gap-4">
              <a href="index.html" className="text-slate-400 hover:text-white">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
              </a>
              <div>
                <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                  <span className="text-cyan-400">🛡️</span> Iron Dome
                </h1>
                <p className="text-slate-400 text-sm">Proposal section tracking & page management</p>
              </div>
            </div>
            <div className="flex items-center gap-4">
              <div className={`px-3 py-1 rounded-full text-xs ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                {connected ? '● Live' : '○ Demo'}
              </div>
              <button
                onClick={() => { setEditingSection(null); resetForm(); setShowModal(true); }}
                className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 text-white rounded-lg font-medium transition-colors"
              >
                + Add Section
              </button>
            </div>
          </div>

          {/* Filters */}
          <div className="flex items-center gap-4 mb-6">
            <select
              value={selectedOpp}
              onChange={(e) => setSelectedOpp(e.target.value)}
              className="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
            >
              {opportunities.map(opp => (
                <option key={opp.id} value={opp.id}>{opp.title}</option>
              ))}
            </select>
            <select
              value={selectedVolume}
              onChange={(e) => setSelectedVolume(e.target.value)}
              className="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
            >
              <option value="all">All Volumes</option>
              {volumes.map(v => (
                <option key={v} value={v}>{v}</option>
              ))}
            </select>
          </div>

          {/* Stats */}
          <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
            <div className="glass rounded-xl p-4">
              <p className="text-slate-400 text-xs mb-1">Page Budget</p>
              <p className="text-2xl font-bold text-white">{stats.usedPages} / {stats.totalPages}</p>
              <div className="h-1.5 bg-slate-700 rounded-full mt-2 overflow-hidden">
                <div 
                  className={`h-full progress-bar ${getPageBarColor(stats.usedPages, stats.totalPages)}`}
                  style={{ width: `${Math.min((stats.usedPages / stats.totalPages) * 100, 100)}%` }}
                ></div>
              </div>
            </div>
            <div className="glass rounded-xl p-4">
              <p className="text-slate-400 text-xs mb-1">Over Limit</p>
              <p className={`text-2xl font-bold ${stats.overLimit > 0 ? 'text-red-400' : 'text-emerald-400'}`}>
                {stats.overLimit}
              </p>
            </div>
            <div className="glass rounded-xl p-4">
              <p className="text-slate-400 text-xs mb-1">Complete</p>
              <p className="text-2xl font-bold text-emerald-400">{stats.complete} / {filteredSections.length}</p>
            </div>
            <div className="glass rounded-xl p-4">
              <p className="text-slate-400 text-xs mb-1">Avg Compliance</p>
              <p className={`text-2xl font-bold ${stats.avgCompliance >= 80 ? 'text-emerald-400' : stats.avgCompliance >= 60 ? 'text-amber-400' : 'text-red-400'}`}>
                {stats.avgCompliance}%
              </p>
            </div>
            <div className="glass rounded-xl p-4">
              <p className="text-slate-400 text-xs mb-1">Pages Remaining</p>
              <p className="text-2xl font-bold text-cyan-400">{Math.max(0, stats.totalPages - stats.usedPages)}</p>
            </div>
          </div>

          {/* Sections Table */}
          <div className="glass rounded-xl overflow-hidden">
            <table className="w-full">
              <thead>
                <tr className="border-b border-cyan-500/20">
                  <th className="text-left py-3 px-4 text-xs font-semibold text-slate-400 uppercase">Section</th>
                  <th className="text-left py-3 px-4 text-xs font-semibold text-slate-400 uppercase">Volume</th>
                  <th className="text-center py-3 px-4 text-xs font-semibold text-slate-400 uppercase">Pages</th>
                  <th className="text-center py-3 px-4 text-xs font-semibold text-slate-400 uppercase">Status</th>
                  <th className="text-center py-3 px-4 text-xs font-semibold text-slate-400 uppercase">Compliance</th>
                  <th className="text-right py-3 px-4 text-xs font-semibold text-slate-400 uppercase">Actions</th>
                </tr>
              </thead>
              <tbody>
                {filteredSections.map(section => (
                  <tr key={section.id} className="border-b border-white/5 hover:bg-white/5 transition-colors">
                    <td className="py-3 px-4">
                      <p className="text-white font-medium">{section.section_number} {section.title}</p>
                    </td>
                    <td className="py-3 px-4">
                      <span className="text-slate-400">{section.volume}</span>
                    </td>
                    <td className="py-3 px-4">
                      <div className="flex items-center justify-center gap-2">
                        <button 
                          onClick={() => updatePages(section, Math.max(0, section.current_pages - 1))}
                          className="w-6 h-6 rounded bg-slate-700 hover:bg-slate-600 flex items-center justify-center text-slate-400 hover:text-white"
                        >
                          -
                        </button>
                        <div className="w-24">
                          <p className={`text-center font-medium ${section.current_pages > section.page_limit ? 'text-red-400' : 'text-white'}`}>
                            {section.current_pages} / {section.page_limit}
                          </p>
                          <div className="h-1 bg-slate-700 rounded-full mt-1 overflow-hidden">
                            <div 
                              className={`h-full progress-bar ${getPageBarColor(section.current_pages, section.page_limit)}`}
                              style={{ width: `${Math.min((section.current_pages / section.page_limit) * 100, 100)}%` }}
                            ></div>
                          </div>
                        </div>
                        <button 
                          onClick={() => updatePages(section, section.current_pages + 1)}
                          className="w-6 h-6 rounded bg-slate-700 hover:bg-slate-600 flex items-center justify-center text-slate-400 hover:text-white"
                        >
                          +
                        </button>
                      </div>
                    </td>
                    <td className="py-3 px-4 text-center">
                      <span className={`px-2 py-1 rounded-full text-xs ${getStatusColor(section.status)}`}>
                        {section.status}
                      </span>
                    </td>
                    <td className="py-3 px-4 text-center">
                      <span className={`font-medium ${section.compliance_score >= 80 ? 'text-emerald-400' : section.compliance_score >= 60 ? 'text-amber-400' : 'text-red-400'}`}>
                        {section.compliance_score}%
                      </span>
                    </td>
                    <td className="py-3 px-4 text-right">
                      <div className="flex items-center justify-end gap-2">
                        <button onClick={() => openEditModal(section)} className="text-slate-400 hover:text-cyan-400 transition-colors">
                          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                          </svg>
                        </button>
                        <button onClick={() => deleteSection(section.id)} className="text-slate-400 hover:text-red-400 transition-colors">
                          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                          </svg>
                        </button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {filteredSections.length === 0 && (
            <div className="text-center py-12">
              <p className="text-slate-500">No sections found. Add sections to track your proposal.</p>
            </div>
          )}

          {/* Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
              <div className="glass rounded-xl p-6 w-full max-w-lg">
                <h2 className="text-xl font-bold text-white mb-4">
                  {editingSection ? 'Edit Section' : 'Add Section'}
                </h2>
                
                <div className="space-y-4">
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Volume *</label>
                      <select
                        value={form.volume}
                        onChange={(e) => setForm({ ...form, volume: e.target.value })}
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                      >
                        <option value="Technical">Technical</option>
                        <option value="Management">Management</option>
                        <option value="Past Performance">Past Performance</option>
                        <option value="Pricing">Pricing</option>
                        <option value="Other">Other</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Section #</label>
                      <input
                        type="text"
                        value={form.section_number}
                        onChange={(e) => setForm({ ...form, section_number: e.target.value })}
                        placeholder="e.g., 1.0"
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                      />
                    </div>
                  </div>
                  
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Title *</label>
                    <input
                      type="text"
                      value={form.title}
                      onChange={(e) => setForm({ ...form, title: e.target.value })}
                      placeholder="e.g., Technical Approach"
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                    />
                  </div>
                  
                  <div className="grid grid-cols-3 gap-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Page Limit</label>
                      <input
                        type="number"
                        value={form.page_limit}
                        onChange={(e) => setForm({ ...form, page_limit: parseInt(e.target.value) || 0 })}
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                      />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Current Pages</label>
                      <input
                        type="number"
                        value={form.current_pages}
                        onChange={(e) => setForm({ ...form, current_pages: parseInt(e.target.value) || 0 })}
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                      />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Compliance %</label>
                      <input
                        type="number"
                        value={form.compliance_score}
                        onChange={(e) => setForm({ ...form, compliance_score: Math.min(100, Math.max(0, parseInt(e.target.value) || 0)) })}
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                      />
                    </div>
                  </div>
                  
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Status</label>
                    <select
                      value={form.status}
                      onChange={(e) => setForm({ ...form, status: e.target.value })}
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                    >
                      <option value="Not Started">Not Started</option>
                      <option value="Draft">Draft</option>
                      <option value="In Review">In Review</option>
                      <option value="Complete">Complete</option>
                      <option value="Over Limit">Over Limit</option>
                    </select>
                  </div>
                </div>
                
                <div className="flex justify-end gap-3 mt-6">
                  <button
                    onClick={() => { setShowModal(false); setEditingSection(null); }}
                    className="px-4 py-2 text-slate-400 hover:text-white transition-colors"
                  >
                    Cancel
                  </button>
                  <button
                    onClick={saveSection}
                    disabled={!form.title || !form.volume}
                    className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 disabled:bg-slate-600 text-white rounded-lg font-medium transition-colors"
                  >
                    {editingSection ? 'Update' : 'Create'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <div className="mt-8 text-center text-slate-500 text-sm">
            MissionPulse v3.1 • Mission Meets Tech • AI GENERATED CONTENT REQUIRES HUMAN REVIEW
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
