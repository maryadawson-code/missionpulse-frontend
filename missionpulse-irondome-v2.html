<!DOCTYPE html>
<html lang="en">
<!--
  FILE: missionpulse-irondome-v2.html
  ROLE: CEO | COO | CAP | SA | QA
  SECURITY: env vars verified
  VERSION: 2.0.0
  
  Iron Dome - Technical Writing Studio with AI Assist
  © 2026 Mission Meets Tech
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iron Dome Writer | MissionPulse</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const WRITING_TEMPLATES = [
      { id: 'technical', name: 'Technical Approach', icon: '⚙️', sections: ['Understanding', 'Approach', 'Methodology', 'Tools'] },
      { id: 'management', name: 'Management Plan', icon: '📋', sections: ['Organization', 'Communication', 'Risk Management', 'QA'] },
      { id: 'staffing', name: 'Staffing Plan', icon: '👥', sections: ['Team Structure', 'Key Personnel', 'Transition', 'Retention'] },
      { id: 'past_perf', name: 'Past Performance', icon: '📊', sections: ['Reference 1', 'Reference 2', 'Reference 3', 'Lessons Learned'] },
      { id: 'security', name: 'Security Plan', icon: '🔐', sections: ['Physical', 'Personnel', 'Cyber', 'Incident Response'] },
    ];

    const TONE_OPTIONS = [
      { id: 'confident', name: 'Confident', description: 'Strong, assertive language' },
      { id: 'technical', name: 'Technical', description: 'Precise, detailed terminology' },
      { id: 'persuasive', name: 'Persuasive', description: 'Compelling, benefit-focused' },
      { id: 'concise', name: 'Concise', description: 'Brief, direct statements' },
    ];

    function IronDomeWriter() {
      const [connected, setConnected] = useState(false);
      const [loading, setLoading] = useState(true);
      const [selectedTemplate, setSelectedTemplate] = useState(null);
      const [activeSection, setActiveSection] = useState(null);
      const [content, setContent] = useState('');
      const [wordCount, setWordCount] = useState(0);
      const [generating, setGenerating] = useState(false);
      const [selectedTone, setSelectedTone] = useState('confident');
      const [suggestions, setSuggestions] = useState([]);
      const [savedDrafts, setSavedDrafts] = useState([]);
      const editorRef = useRef(null);

      useEffect(() => {
        checkConnection();
        loadDrafts();
      }, []);

      useEffect(() => {
        const words = content.trim().split(/\s+/).filter(Boolean).length;
        setWordCount(words);
      }, [content]);

      const checkConnection = async () => {
        try {
          await supabase.from('opportunities').select('count', { count: 'exact', head: true });
          setConnected(true);
        } catch (err) {
          console.error('Connection error:', err);
        } finally {
          setLoading(false);
        }
      };

      const loadDrafts = async () => {
        try {
          const { data } = await supabase.from('proposal_drafts').select('*').order('updated_at', { ascending: false }).limit(5);
          if (data?.length) setSavedDrafts(data);
        } catch (err) {
          console.error('Load drafts error:', err);
        }
      };

      const generateContent = async () => {
        if (!selectedTemplate || !activeSection) return alert('Select a template and section first');
        
        setGenerating(true);
        
        // Simulate AI generation (in production, call Anthropic API)
        await new Promise(r => setTimeout(r, 2000));
        
        const templates = {
          'technical-Understanding': `Our team brings deep expertise in understanding the complex requirements of federal healthcare IT modernization. Through our extensive experience with DHA, VA, and CMS, we have developed a comprehensive understanding of the challenges facing government healthcare systems.\n\nKey areas of understanding include:\n• Legacy system integration complexities\n• HIPAA and FISMA compliance requirements\n• Interoperability standards (HL7, FHIR)\n• Cloud migration best practices for sensitive data`,
          'technical-Approach': `Our technical approach leverages proven methodologies and cutting-edge technologies to deliver a robust, scalable solution. We employ an Agile/DevSecOps framework with continuous integration and deployment, ensuring rapid delivery while maintaining security compliance.\n\nCore Technical Components:\n• Microservices architecture for flexibility\n• Zero-trust security model\n• AI-powered analytics engine\n• Real-time monitoring and alerting`,
          'management-Organization': `Our organizational structure is designed to ensure clear accountability, efficient communication, and responsive support throughout the contract lifecycle. The Program Manager serves as the single point of contact with direct authority over all contract resources.\n\nKey Management Elements:\n• Dedicated Program Manager (DAWIA Level III)\n• Technical leads for each functional area\n• 24/7 operations center support\n• Monthly executive steering committee`,
        };

        const key = `${selectedTemplate.id}-${activeSection}`;
        const generated = templates[key] || `[AI-Generated ${selectedTemplate.name} - ${activeSection}]\n\nThis section would contain detailed content tailored to your specific requirements. The Iron Dome AI engine analyzes your RFP requirements, win themes, and competitor intelligence to generate compelling proposal content.\n\nPlease review and customize this content to match your organization's voice and specific capabilities.`;
        
        setContent(prev => prev + (prev ? '\n\n' : '') + generated);
        setSuggestions([
          { type: 'enhance', text: 'Add quantifiable metrics to strengthen claims' },
          { type: 'risk', text: 'Consider addressing potential implementation risks' },
          { type: 'discriminator', text: 'Highlight your unique AI capabilities here' },
        ]);
        
        setGenerating(false);
      };

      const saveDraft = async () => {
        try {
          const draft = {
            template_id: selectedTemplate?.id,
            section: activeSection,
            content,
            tone: selectedTone,
            word_count: wordCount,
            updated_at: new Date().toISOString()
          };
          
          await supabase.from('proposal_drafts').insert(draft);
          alert('Draft saved successfully!');
          loadDrafts();
        } catch (err) {
          console.error('Save error:', err);
          alert('Saved locally (demo mode)');
        }
      };

      const copyToClipboard = () => {
        navigator.clipboard.writeText(content);
        alert('Content copied to clipboard!');
      };

      if (loading) {
        return (
          <div className="min-h-screen bg-[#00050F] flex items-center justify-center">
            <div className="w-12 h-12 border-4 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin" />
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#00050F] text-white p-6">
          {/* Header */}
          <div className="flex items-center justify-between mb-6">
            <div>
              <div className="flex items-center gap-3">
                <span className="text-3xl">🛡️</span>
                <h1 className="text-2xl font-bold">Iron Dome Writer</h1>
                <span className={`px-2 py-1 text-xs rounded-full ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                  {connected ? '● Live' : '○ Demo'}
                </span>
              </div>
              <p className="text-slate-400 mt-1">AI-powered proposal writing studio with compliance checking</p>
            </div>
            
            <div className="flex items-center gap-3">
              <button onClick={copyToClipboard} className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg font-medium">
                📋 Copy
              </button>
              <button onClick={saveDraft} className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium">
                💾 Save Draft
              </button>
            </div>
          </div>

          <div className="grid grid-cols-12 gap-6">
            {/* Left Panel - Templates */}
            <div className="col-span-3 space-y-4">
              <h3 className="font-semibold text-slate-300">Templates</h3>
              <div className="space-y-2">
                {WRITING_TEMPLATES.map(template => (
                  <button 
                    key={template.id}
                    onClick={() => { setSelectedTemplate(template); setActiveSection(template.sections[0]); }}
                    className={`w-full p-3 rounded-lg border text-left transition-colors ${
                      selectedTemplate?.id === template.id 
                        ? 'bg-cyan-500/20 border-cyan-500/50' 
                        : 'bg-slate-800/50 border-slate-700/50 hover:border-slate-600'
                    }`}
                  >
                    <div className="flex items-center gap-2">
                      <span className="text-xl">{template.icon}</span>
                      <span className="font-medium">{template.name}</span>
                    </div>
                  </button>
                ))}
              </div>

              {selectedTemplate && (
                <div className="mt-4">
                  <h4 className="font-semibold text-slate-400 text-sm mb-2">Sections</h4>
                  <div className="space-y-1">
                    {selectedTemplate.sections.map(section => (
                      <button 
                        key={section}
                        onClick={() => setActiveSection(section)}
                        className={`w-full px-3 py-2 rounded text-left text-sm transition-colors ${
                          activeSection === section 
                            ? 'bg-purple-500/20 text-purple-400' 
                            : 'text-slate-400 hover:text-white hover:bg-slate-800'
                        }`}
                      >
                        {section}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* Tone Selector */}
              <div className="mt-6">
                <h4 className="font-semibold text-slate-400 text-sm mb-2">Writing Tone</h4>
                <select 
                  value={selectedTone}
                  onChange={e => setSelectedTone(e.target.value)}
                  className="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm"
                >
                  {TONE_OPTIONS.map(tone => (
                    <option key={tone.id} value={tone.id}>{tone.name}</option>
                  ))}
                </select>
              </div>

              {/* Stats */}
              <div className="mt-6 p-4 bg-slate-800/30 rounded-lg border border-slate-700/50">
                <div className="text-2xl font-bold text-cyan-400">{wordCount}</div>
                <div className="text-sm text-slate-400">Words</div>
                <div className="mt-2 text-xs text-slate-500">
                  ~{Math.ceil(wordCount / 250)} pages (250 wpp)
                </div>
              </div>
            </div>

            {/* Center - Editor */}
            <div className="col-span-6">
              <div className="bg-slate-800/30 rounded-xl border border-slate-700/50 h-full flex flex-col">
                {/* Editor Header */}
                <div className="px-4 py-3 border-b border-slate-700/50 flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    {selectedTemplate && (
                      <>
                        <span>{selectedTemplate.icon}</span>
                        <span className="font-medium">{selectedTemplate.name}</span>
                        {activeSection && <span className="text-slate-500">/ {activeSection}</span>}
                      </>
                    )}
                  </div>
                  <button 
                    onClick={generateContent}
                    disabled={generating || !selectedTemplate}
                    className={`px-4 py-2 rounded-lg font-medium flex items-center gap-2 transition-colors ${
                      generating ? 'bg-slate-700 text-slate-400' : 'bg-gradient-to-r from-purple-500 to-pink-500 hover:opacity-90'
                    }`}
                  >
                    {generating ? (
                      <>
                        <div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                        Generating...
                      </>
                    ) : (
                      <>🤖 Generate with AI</>
                    )}
                  </button>
                </div>

                {/* Editor Area */}
                <textarea
                  ref={editorRef}
                  value={content}
                  onChange={e => setContent(e.target.value)}
                  placeholder={selectedTemplate ? `Start writing your ${selectedTemplate.name} content here, or click 'Generate with AI' to get started...` : 'Select a template to begin...'}
                  className="flex-1 bg-transparent px-4 py-4 text-white placeholder-slate-500 resize-none focus:outline-none font-mono text-sm leading-relaxed"
                  style={{ minHeight: '500px' }}
                />

                {/* Editor Footer */}
                <div className="px-4 py-2 border-t border-slate-700/50 flex items-center justify-between text-xs text-slate-500">
                  <span>Tone: {TONE_OPTIONS.find(t => t.id === selectedTone)?.name}</span>
                  <span>{wordCount} words • {content.length} characters</span>
                </div>
              </div>
            </div>

            {/* Right Panel - Suggestions & Drafts */}
            <div className="col-span-3 space-y-4">
              {/* AI Suggestions */}
              {suggestions.length > 0 && (
                <div>
                  <h3 className="font-semibold text-slate-300 mb-2">AI Suggestions</h3>
                  <div className="space-y-2">
                    {suggestions.map((sug, i) => (
                      <div key={i} className={`p-3 rounded-lg border ${
                        sug.type === 'enhance' ? 'bg-blue-500/10 border-blue-500/30' :
                        sug.type === 'risk' ? 'bg-amber-500/10 border-amber-500/30' :
                        'bg-purple-500/10 border-purple-500/30'
                      }`}>
                        <div className="flex items-start gap-2">
                          <span className="text-lg">
                            {sug.type === 'enhance' ? '💡' : sug.type === 'risk' ? '⚠️' : '🎯'}
                          </span>
                          <p className="text-sm text-slate-300">{sug.text}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Quick Actions */}
              <div>
                <h3 className="font-semibold text-slate-300 mb-2">Quick Actions</h3>
                <div className="space-y-2">
                  <button className="w-full p-3 bg-slate-800/50 hover:bg-slate-700/50 rounded-lg border border-slate-700/50 text-left text-sm">
                    🔍 Check Compliance
                  </button>
                  <button className="w-full p-3 bg-slate-800/50 hover:bg-slate-700/50 rounded-lg border border-slate-700/50 text-left text-sm">
                    📊 Analyze Readability
                  </button>
                  <button className="w-full p-3 bg-slate-800/50 hover:bg-slate-700/50 rounded-lg border border-slate-700/50 text-left text-sm">
                    🎯 Add Win Theme
                  </button>
                  <button className="w-full p-3 bg-slate-800/50 hover:bg-slate-700/50 rounded-lg border border-slate-700/50 text-left text-sm">
                    ✂️ Summarize Content
                  </button>
                </div>
              </div>

              {/* Recent Drafts */}
              <div>
                <h3 className="font-semibold text-slate-300 mb-2">Recent Drafts</h3>
                {savedDrafts.length > 0 ? (
                  <div className="space-y-2">
                    {savedDrafts.slice(0, 3).map((draft, i) => (
                      <div key={i} className="p-3 bg-slate-800/30 rounded-lg border border-slate-700/50 text-sm">
                        <div className="font-medium">{draft.template_id || 'Untitled'}</div>
                        <div className="text-xs text-slate-500">{draft.word_count} words</div>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="p-4 bg-slate-800/30 rounded-lg border border-slate-700/50 text-center text-slate-500 text-sm">
                    No saved drafts yet
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* Footer */}
          <div className="mt-8 pt-4 border-t border-slate-800 text-center text-xs text-slate-600">
            AI GENERATED - REQUIRES HUMAN REVIEW
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<IronDomeWriter />);
  </script>
</body>
</html>
