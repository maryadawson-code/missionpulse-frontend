<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Iron Dome Compliance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
    .glow { box-shadow: 0 0 20px rgba(0, 229, 250, 0.15); }
    .iron-dome { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid #334155; }
    .shield-icon { filter: drop-shadow(0 0 8px rgba(0, 229, 250, 0.4)); }
    @keyframes scan { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    .scanning { animation: scan 2s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;
    
    // Supabase Configuration
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    
    // Demo Data
    const DEMO_OPPORTUNITIES = [
      { id: 'opp-1', title: 'DHA MHS GENESIS Support', agency: 'DHA', phase: 'Gate 3' },
      { id: 'opp-2', title: 'VA EHR Modernization', agency: 'VA', phase: 'Gate 2' }
    ];
    
    const COMPLIANCE_CATEGORIES = [
      { id: 'rfp', name: 'RFP Requirements', icon: '📋', description: 'Solicitation compliance checks' },
      { id: 'far', name: 'FAR/DFARS', icon: '⚖️', description: 'Federal Acquisition Regulation' },
      { id: 'security', name: 'Security', icon: '🔒', description: 'Cybersecurity & clearances' },
      { id: 'socio', name: 'Socioeconomic', icon: '🏛️', description: 'Set-aside certifications' },
      { id: 'past', name: 'Past Performance', icon: '📊', description: 'Experience validation' },
      { id: 'technical', name: 'Technical', icon: '⚙️', description: 'Solution requirements' }
    ];
    
    const DEMO_ITEMS = [
      // RFP Requirements
      { id: 'c1', opportunity_id: 'opp-1', category: 'rfp', item: 'Page limit compliance (Volume I: 50 pages)', status: 'compliant', risk_level: 'low', notes: 'Current draft: 47 pages', section: 'L.5.2', responsible: 'QA Lead' },
      { id: 'c2', opportunity_id: 'opp-1', category: 'rfp', item: 'Font/margin requirements (12pt, 1" margins)', status: 'compliant', risk_level: 'low', notes: 'Template enforced', section: 'L.5.1', responsible: 'Doc Manager' },
      { id: 'c3', opportunity_id: 'opp-1', category: 'rfp', item: 'Key personnel resume format', status: 'at_risk', risk_level: 'medium', notes: 'Missing 2 resumes - PM, Security Lead', section: 'L.7', responsible: 'HR' },
      
      // FAR/DFARS
      { id: 'c4', opportunity_id: 'opp-1', category: 'far', item: 'FAR 52.204-21 (Basic Safeguarding)', status: 'compliant', risk_level: 'low', notes: 'Included in proposal', section: 'M.3', responsible: 'Compliance' },
      { id: 'c5', opportunity_id: 'opp-1', category: 'far', item: 'DFARS 252.204-7012 (CDI Protection)', status: 'compliant', risk_level: 'low', notes: 'CMMC L2 certified', section: 'M.4', responsible: 'ISSO' },
      { id: 'c6', opportunity_id: 'opp-1', category: 'far', item: 'FAR 52.219-27 (Small Business Subcontracting)', status: 'at_risk', risk_level: 'high', notes: 'Subcontracting plan incomplete', section: 'H.8', responsible: 'Contracts' },
      
      // Security
      { id: 'c7', opportunity_id: 'opp-1', category: 'security', item: 'CMMC Level 2 Certification', status: 'compliant', risk_level: 'low', notes: 'Certified Jan 2026', section: 'L.9', responsible: 'ISSO' },
      { id: 'c8', opportunity_id: 'opp-1', category: 'security', item: 'FedRAMP Moderate Authorization', status: 'at_risk', risk_level: 'medium', notes: 'In process - 60% complete', section: 'L.9.2', responsible: 'Security' },
      { id: 'c9', opportunity_id: 'opp-1', category: 'security', item: 'Key Personnel Clearances (TS/SCI)', status: 'non_compliant', risk_level: 'high', notes: 'PM clearance pending - est. 45 days', section: 'L.8', responsible: 'FSO' },
      
      // Socioeconomic
      { id: 'c10', opportunity_id: 'opp-1', category: 'socio', item: 'SDVOSB Certification Valid', status: 'compliant', risk_level: 'low', notes: 'CVE verified Dec 2025', section: 'K.1', responsible: 'Admin' },
      { id: 'c11', opportunity_id: 'opp-1', category: 'socio', item: 'SBA Size Standard Compliance', status: 'compliant', risk_level: 'low', notes: 'Under $47.5M threshold', section: 'K.2', responsible: 'Finance' },
      
      // Past Performance
      { id: 'c12', opportunity_id: 'opp-1', category: 'past', item: '3 Similar Contracts Required', status: 'compliant', risk_level: 'low', notes: '5 qualifying contracts identified', section: 'M.5', responsible: 'Capture' },
      { id: 'c13', opportunity_id: 'opp-1', category: 'past', item: 'CPARS Ratings (Satisfactory+)', status: 'at_risk', risk_level: 'medium', notes: '1 contract has Marginal rating - preparing mitigation', section: 'M.5.3', responsible: 'PM' },
      
      // Technical
      { id: 'c14', opportunity_id: 'opp-1', category: 'technical', item: 'FHIR R4 API Compliance', status: 'compliant', risk_level: 'low', notes: 'Certified implementation', section: 'C.3', responsible: 'Tech Lead' },
      { id: 'c15', opportunity_id: 'opp-1', category: 'technical', item: 'HL7 v2.x Integration', status: 'compliant', risk_level: 'low', notes: 'Production tested', section: 'C.4', responsible: 'Tech Lead' },
      
      // VA Opp
      { id: 'c16', opportunity_id: 'opp-2', category: 'rfp', item: 'Oral presentation required', status: 'at_risk', risk_level: 'medium', notes: 'Slides due in 2 weeks', section: 'L.4', responsible: 'Capture' },
      { id: 'c17', opportunity_id: 'opp-2', category: 'security', item: 'VA PIV Card Holders', status: 'non_compliant', risk_level: 'high', notes: 'Need 5 staff enrolled', section: 'H.12', responsible: 'FSO' }
    ];
    
    function App() {
      const [opportunities, setOpportunities] = useState(DEMO_OPPORTUNITIES);
      const [items, setItems] = useState(DEMO_ITEMS);
      const [selectedOpp, setSelectedOpp] = useState(null);
      const [selectedCategory, setSelectedCategory] = useState(null);
      const [connected, setConnected] = useState(false);
      const [loading, setLoading] = useState(true);
      const [showModal, setShowModal] = useState(false);
      const [editingItem, setEditingItem] = useState(null);
      const [formData, setFormData] = useState({ item: '', category: 'rfp', status: 'pending', risk_level: 'medium', notes: '', section: '', responsible: '' });
      const [filterStatus, setFilterStatus] = useState('all');
      
      useEffect(() => {
        loadData();
      }, []);
      
      const loadData = async () => {
        try {
          const { data: opps } = await supabase.from('opportunities').select('id, title, agency, phase');
          if (opps?.length > 0) { setOpportunities(opps); setConnected(true); }
          
          const { data: compData } = await supabase.from('compliance_items').select('*').order('category');
          if (compData?.length > 0) setItems(compData);
        } catch (e) { console.log('Demo mode'); }
        setLoading(false);
      };
      
      const handleSave = async () => {
        const payload = { ...formData, opportunity_id: selectedOpp.id };
        
        try {
          if (editingItem) {
            await supabase.from('compliance_items').update(payload).eq('id', editingItem.id);
            setItems(items.map(i => i.id === editingItem.id ? { ...i, ...payload } : i));
          } else {
            const newItem = { ...payload, id: `c-${Date.now()}` };
            const { data } = await supabase.from('compliance_items').insert(payload).select().single();
            setItems([...items, data || newItem]);
          }
        } catch (e) {
          const newItem = { ...payload, id: `c-${Date.now()}` };
          editingItem ? setItems(items.map(i => i.id === editingItem.id ? { ...i, ...payload } : i)) : setItems([...items, newItem]);
        }
        closeModal();
      };
      
      const handleDelete = async (item) => {
        if (!confirm('Delete this compliance item?')) return;
        try { await supabase.from('compliance_items').delete().eq('id', item.id); } catch {}
        setItems(items.filter(i => i.id !== item.id));
      };
      
      const updateStatus = async (item, newStatus) => {
        try { await supabase.from('compliance_items').update({ status: newStatus }).eq('id', item.id); } catch {}
        setItems(items.map(i => i.id === item.id ? { ...i, status: newStatus } : i));
      };
      
      const openModal = (item = null) => {
        if (item) {
          setEditingItem(item);
          setFormData({ item: item.item, category: item.category, status: item.status, risk_level: item.risk_level, notes: item.notes || '', section: item.section || '', responsible: item.responsible || '' });
        } else {
          setEditingItem(null);
          setFormData({ item: '', category: selectedCategory || 'rfp', status: 'pending', risk_level: 'medium', notes: '', section: '', responsible: '' });
        }
        setShowModal(true);
      };
      
      const closeModal = () => { setShowModal(false); setEditingItem(null); };
      
      const oppItems = selectedOpp ? items.filter(i => i.opportunity_id === selectedOpp.id) : [];
      const filteredItems = filterStatus === 'all' ? oppItems : oppItems.filter(i => i.status === filterStatus);
      const categoryItems = selectedCategory ? filteredItems.filter(i => i.category === selectedCategory) : filteredItems;
      
      // Stats
      const compliantCount = oppItems.filter(i => i.status === 'compliant').length;
      const atRiskCount = oppItems.filter(i => i.status === 'at_risk').length;
      const nonCompliantCount = oppItems.filter(i => i.status === 'non_compliant').length;
      const pendingCount = oppItems.filter(i => i.status === 'pending').length;
      const complianceScore = oppItems.length ? Math.round((compliantCount / oppItems.length) * 100) : 0;
      
      const getStatusStyle = (status) => {
        const styles = {
          'compliant': { bg: 'bg-emerald-500/20', text: 'text-emerald-400', border: 'border-emerald-500/30', icon: '✓' },
          'at_risk': { bg: 'bg-amber-500/20', text: 'text-amber-400', border: 'border-amber-500/30', icon: '⚠' },
          'non_compliant': { bg: 'bg-red-500/20', text: 'text-red-400', border: 'border-red-500/30', icon: '✗' },
          'pending': { bg: 'bg-slate-500/20', text: 'text-slate-400', border: 'border-slate-500/30', icon: '○' }
        };
        return styles[status] || styles.pending;
      };
      
      const getRiskBadge = (level) => {
        const styles = { 'low': 'bg-emerald-500/20 text-emerald-400', 'medium': 'bg-amber-500/20 text-amber-400', 'high': 'bg-red-500/20 text-red-400' };
        return styles[level] || styles.medium;
      };
      
      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-cyan-400 flex items-center gap-3">
              <div className="w-8 h-8 border-2 border-cyan-400 border-t-transparent rounded-full animate-spin scanning"></div>
              Scanning Compliance Status...
            </div>
          </div>
        );
      }
      
      return (
        <div className="min-h-screen">
          {/* Connection Status */}
          <div className={`fixed top-4 right-4 px-3 py-1.5 rounded-full text-xs font-medium z-50 ${connected ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-amber-500/20 text-amber-400 border border-amber-500/30'}`}>
            {connected ? '● Live' : '○ Demo Mode'}
          </div>
          
          {/* Header */}
          <header className="glass border-b border-cyan-500/20 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="text-slate-400 hover:text-cyan-400">← Back</a>
                  <div>
                    <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                      <span className="shield-icon">🛡️</span> Iron Dome Compliance
                    </h1>
                    <p className="text-slate-400 text-sm">Proactive risk detection and compliance tracking</p>
                  </div>
                </div>
              </div>
            </div>
          </header>
          
          <main className="max-w-7xl mx-auto px-6 py-8">
            {!selectedOpp ? (
              /* Opportunity Selection */
              <div className="glass rounded-xl p-8 glow">
                <h2 className="text-xl font-semibold text-white mb-6">Select Opportunity for Compliance Review</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {opportunities.map(opp => {
                    const oppStats = items.filter(i => i.opportunity_id === opp.id);
                    const score = oppStats.length ? Math.round((oppStats.filter(i => i.status === 'compliant').length / oppStats.length) * 100) : 0;
                    const issues = oppStats.filter(i => i.status === 'non_compliant' || i.status === 'at_risk').length;
                    
                    return (
                      <button
                        key={opp.id}
                        onClick={() => setSelectedOpp(opp)}
                        className="iron-dome rounded-xl p-6 text-left hover:border-cyan-500/50 transition-all"
                      >
                        <div className="flex justify-between items-start mb-4">
                          <div>
                            <h3 className="font-semibold text-white text-lg">{opp.title}</h3>
                            <p className="text-slate-400 text-sm">{opp.agency} • {opp.phase}</p>
                          </div>
                          <div className={`text-2xl font-bold ${score >= 80 ? 'text-emerald-400' : score >= 50 ? 'text-amber-400' : 'text-red-400'}`}>
                            {score}%
                          </div>
                        </div>
                        <div className="flex items-center gap-4 text-sm">
                          <span className="text-emerald-400">{oppStats.filter(i => i.status === 'compliant').length} ✓</span>
                          <span className="text-amber-400">{oppStats.filter(i => i.status === 'at_risk').length} ⚠</span>
                          <span className="text-red-400">{oppStats.filter(i => i.status === 'non_compliant').length} ✗</span>
                        </div>
                        {issues > 0 && (
                          <div className="mt-3 text-xs text-red-400 bg-red-500/10 px-2 py-1 rounded">
                            {issues} issue{issues !== 1 ? 's' : ''} requiring attention
                          </div>
                        )}
                      </button>
                    );
                  })}
                </div>
              </div>
            ) : (
              /* Compliance Dashboard */
              <div>
                <div className="flex items-center justify-between mb-6">
                  <div>
                    <button onClick={() => { setSelectedOpp(null); setSelectedCategory(null); }} className="text-slate-400 hover:text-cyan-400 text-sm mb-2">← Back to Opportunities</button>
                    <h2 className="text-xl font-semibold text-white">{selectedOpp.title}</h2>
                    <p className="text-slate-400 text-sm">{selectedOpp.agency} • {oppItems.length} compliance items tracked</p>
                  </div>
                  <button onClick={() => openModal()} className="bg-cyan-500 hover:bg-cyan-600 text-slate-900 px-4 py-2 rounded-lg font-medium">
                    + Add Item
                  </button>
                </div>
                
                {/* Compliance Score Card */}
                <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
                  <div className="iron-dome rounded-xl p-6 col-span-2 md:col-span-1">
                    <div className="text-center">
                      <div className={`text-4xl font-bold mb-1 ${complianceScore >= 80 ? 'text-emerald-400' : complianceScore >= 50 ? 'text-amber-400' : 'text-red-400'}`}>
                        {complianceScore}%
                      </div>
                      <div className="text-slate-400 text-xs">Compliance Score</div>
                      <div className="mt-2 h-2 bg-slate-800 rounded-full overflow-hidden">
                        <div className={`h-full ${complianceScore >= 80 ? 'bg-emerald-500' : complianceScore >= 50 ? 'bg-amber-500' : 'bg-red-500'}`} style={{ width: `${complianceScore}%` }}></div>
                      </div>
                    </div>
                  </div>
                  
                  <button onClick={() => setFilterStatus(filterStatus === 'compliant' ? 'all' : 'compliant')} className={`iron-dome rounded-xl p-4 text-center ${filterStatus === 'compliant' ? 'border-emerald-500' : ''}`}>
                    <div className="text-2xl font-bold text-emerald-400">{compliantCount}</div>
                    <div className="text-slate-400 text-xs">Compliant</div>
                  </button>
                  
                  <button onClick={() => setFilterStatus(filterStatus === 'at_risk' ? 'all' : 'at_risk')} className={`iron-dome rounded-xl p-4 text-center ${filterStatus === 'at_risk' ? 'border-amber-500' : ''}`}>
                    <div className="text-2xl font-bold text-amber-400">{atRiskCount}</div>
                    <div className="text-slate-400 text-xs">At Risk</div>
                  </button>
                  
                  <button onClick={() => setFilterStatus(filterStatus === 'non_compliant' ? 'all' : 'non_compliant')} className={`iron-dome rounded-xl p-4 text-center ${filterStatus === 'non_compliant' ? 'border-red-500' : ''}`}>
                    <div className="text-2xl font-bold text-red-400">{nonCompliantCount}</div>
                    <div className="text-slate-400 text-xs">Non-Compliant</div>
                  </button>
                  
                  <button onClick={() => setFilterStatus(filterStatus === 'pending' ? 'all' : 'pending')} className={`iron-dome rounded-xl p-4 text-center ${filterStatus === 'pending' ? 'border-slate-500' : ''}`}>
                    <div className="text-2xl font-bold text-slate-400">{pendingCount}</div>
                    <div className="text-slate-400 text-xs">Pending</div>
                  </button>
                </div>
                
                {/* Category Selector */}
                <div className="flex flex-wrap gap-2 mb-6">
                  <button 
                    onClick={() => setSelectedCategory(null)}
                    className={`px-4 py-2 rounded-lg text-sm ${!selectedCategory ? 'bg-cyan-500 text-slate-900' : 'bg-slate-800 text-white hover:bg-slate-700'}`}
                  >
                    All Categories
                  </button>
                  {COMPLIANCE_CATEGORIES.map(cat => (
                    <button
                      key={cat.id}
                      onClick={() => setSelectedCategory(cat.id)}
                      className={`px-4 py-2 rounded-lg text-sm flex items-center gap-2 ${selectedCategory === cat.id ? 'bg-cyan-500 text-slate-900' : 'bg-slate-800 text-white hover:bg-slate-700'}`}
                    >
                      <span>{cat.icon}</span>
                      <span>{cat.name}</span>
                      <span className="text-xs opacity-60">({filteredItems.filter(i => i.category === cat.id).length})</span>
                    </button>
                  ))}
                </div>
                
                {/* Compliance Items */}
                <div className="glass rounded-xl glow overflow-hidden">
                  <div className="p-4 border-b border-slate-700">
                    <h3 className="font-semibold text-white">
                      {selectedCategory ? COMPLIANCE_CATEGORIES.find(c => c.id === selectedCategory)?.name : 'All Items'} 
                      <span className="text-slate-400 font-normal ml-2">({categoryItems.length})</span>
                    </h3>
                  </div>
                  
                  <div className="divide-y divide-slate-800">
                    {categoryItems.map(item => {
                      const style = getStatusStyle(item.status);
                      return (
                        <div key={item.id} className={`p-4 ${style.bg} border-l-4 ${style.border} hover:bg-slate-800/30 transition-all`}>
                          <div className="flex justify-between items-start">
                            <div className="flex-1">
                              <div className="flex items-center gap-3 mb-2">
                                <span className={`text-lg ${style.text}`}>{style.icon}</span>
                                <span className="font-medium text-white">{item.item}</span>
                                <span className={`px-2 py-0.5 rounded text-xs ${getRiskBadge(item.risk_level)}`}>
                                  {item.risk_level} risk
                                </span>
                              </div>
                              <div className="flex items-center gap-4 text-xs text-slate-400 ml-7">
                                {item.section && <span>§{item.section}</span>}
                                {item.responsible && <span>Owner: {item.responsible}</span>}
                                <span className="bg-slate-700 px-2 py-0.5 rounded">{COMPLIANCE_CATEGORIES.find(c => c.id === item.category)?.name}</span>
                              </div>
                              {item.notes && (
                                <p className="text-slate-400 text-sm mt-2 ml-7">{item.notes}</p>
                              )}
                            </div>
                            <div className="flex items-center gap-2">
                              <select
                                value={item.status}
                                onChange={(e) => updateStatus(item, e.target.value)}
                                className="bg-slate-800 border border-slate-700 rounded px-2 py-1 text-sm text-white"
                              >
                                <option value="pending">Pending</option>
                                <option value="compliant">Compliant</option>
                                <option value="at_risk">At Risk</option>
                                <option value="non_compliant">Non-Compliant</option>
                              </select>
                              <button onClick={() => openModal(item)} className="text-slate-400 hover:text-cyan-400 p-1">✏️</button>
                              <button onClick={() => handleDelete(item)} className="text-slate-400 hover:text-red-400 p-1">🗑️</button>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                    
                    {categoryItems.length === 0 && (
                      <div className="p-8 text-center text-slate-500">
                        <div className="text-4xl mb-2">🛡️</div>
                        <p>No compliance items {filterStatus !== 'all' ? `with status "${filterStatus}"` : ''}</p>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}
          </main>
          
          {/* Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50 p-4">
              <div className="glass rounded-xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
                <div className="p-6">
                  <h2 className="text-xl font-semibold text-white mb-6">
                    {editingItem ? 'Edit Compliance Item' : 'Add Compliance Item'}
                  </h2>
                  
                  <div className="space-y-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Compliance Item *</label>
                      <input type="text" value={formData.item} onChange={(e) => setFormData({ ...formData, item: e.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white" placeholder="e.g., CMMC Level 2 Certification" />
                    </div>
                    
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Category</label>
                        <select value={formData.category} onChange={(e) => setFormData({ ...formData, category: e.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white">
                          {COMPLIANCE_CATEGORIES.map(cat => (
                            <option key={cat.id} value={cat.id}>{cat.icon} {cat.name}</option>
                          ))}
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Status</label>
                        <select value={formData.status} onChange={(e) => setFormData({ ...formData, status: e.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white">
                          <option value="pending">Pending</option>
                          <option value="compliant">Compliant</option>
                          <option value="at_risk">At Risk</option>
                          <option value="non_compliant">Non-Compliant</option>
                        </select>
                      </div>
                    </div>
                    
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Risk Level</label>
                        <select value={formData.risk_level} onChange={(e) => setFormData({ ...formData, risk_level: e.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white">
                          <option value="low">Low</option>
                          <option value="medium">Medium</option>
                          <option value="high">High</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Section Reference</label>
                        <input type="text" value={formData.section} onChange={(e) => setFormData({ ...formData, section: e.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white" placeholder="e.g., L.5.2" />
                      </div>
                    </div>
                    
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Responsible Party</label>
                      <input type="text" value={formData.responsible} onChange={(e) => setFormData({ ...formData, responsible: e.target.value })} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white" placeholder="e.g., Compliance Lead" />
                    </div>
                    
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Notes</label>
                      <textarea value={formData.notes} onChange={(e) => setFormData({ ...formData, notes: e.target.value })} rows={3} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white" placeholder="Status details, action items..." />
                    </div>
                  </div>
                  
                  <div className="flex justify-end gap-3 mt-6">
                    <button onClick={closeModal} className="px-4 py-2 text-slate-400 hover:text-white">Cancel</button>
                    <button onClick={handleSave} disabled={!formData.item} className="bg-cyan-500 hover:bg-cyan-600 disabled:opacity-50 text-slate-900 px-6 py-2 rounded-lg font-medium">
                      {editingItem ? 'Save Changes' : 'Add Item'}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
          
          {/* Footer */}
          <footer className="mt-12 py-6 text-center text-xs text-slate-500 border-t border-slate-800">
            <p>Mission Meets Tech • Shield & Pulse UX v8.0</p>
            <p className="mt-1">AI GENERATED - REQUIRES HUMAN REVIEW</p>
          </footer>
        </div>
      );
    }
    
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
