<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iron Dome | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:#00050F;color:#e2e8f0;min-height:100vh}
    .glass{background:rgba(15,23,42,0.85);backdrop-filter:blur(16px);border:1px solid rgba(0,229,250,0.1);border-radius:12px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const SUPABASE_URL='https://qdrtpnpnhkxvfmvfziop.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
const supabase=window.supabase?.createClient(SUPABASE_URL,SUPABASE_ANON);

const SECTIONS=['Executive Summary','Technical Approach','Management Plan','Staffing Plan','Past Performance','Quality Assurance','Risk Mitigation','Transition Plan'];

const DEMO_DRAFTS=[
  {id:1,section:'Executive Summary',version:3,title:'DHA MHS GENESIS Executive Summary',content:'Mission Meets Tech (MMT) is pleased to submit our proposal for the DHA MHS GENESIS Cloud Migration program. Our team brings 15+ years of healthcare IT expertise, including direct experience with the MHS GENESIS platform. We understand the critical importance of maintaining system availability while modernizing the infrastructure.\n\nOur approach leverages proven cloud migration methodologies combined with AI-powered automation to reduce migration risk and accelerate delivery. Key differentiators include:\n\n• Zero-downtime migration strategy\n• AI-assisted data validation\n• 24/7 dedicated support team\n• Certified AWS GovCloud architects',word_count:89,compliance_score:92,status:'review',author:'Lisa M.',reviewer:'Mary W.'},
  {id:2,section:'Technical Approach',version:2,title:'Technical Approach - Cloud Architecture',content:'Our technical approach centers on a phased migration strategy that minimizes disruption while maximizing the benefits of cloud-native architecture. We will implement:\n\n1. Assessment Phase: Comprehensive analysis of existing infrastructure\n2. Planning Phase: Detailed migration roadmap with risk mitigation\n3. Execution Phase: Iterative migration with continuous validation\n4. Optimization Phase: Performance tuning and cost optimization',word_count:67,compliance_score:85,status:'draft',author:'Sarah C.',reviewer:''},
  {id:3,section:'Past Performance',version:1,title:'Past Performance Narrative',content:'Under Contract W91WAW-20-D-0001, Mission Meets Tech delivered enterprise cloud migration services to the Defense Health Agency, successfully migrating 47 applications to AWS GovCloud with zero data loss and 99.99% availability maintained throughout the transition period.',word_count:42,compliance_score:78,status:'draft',author:'Lisa M.',reviewer:''}
];

function IronDome(){
  const[connected,setConnected]=useState(false);
  const[drafts,setDrafts]=useState(DEMO_DRAFTS);
  const[selectedDraft,setSelectedDraft]=useState(null);
  const[aiPrompt,setAiPrompt]=useState('');
  const[generating,setGenerating]=useState(false);
  const[showNewDraft,setShowNewDraft]=useState(false);
  const[newSection,setNewSection]=useState('Executive Summary');

  useEffect(()=>{
    const load=async()=>{
      try{
        const{data,error}=await supabase.from('proposal_drafts').select('*').order('section');
        if(!error&&data?.length)setDrafts(data);
        setConnected(!error);
      }catch{setConnected(false)}
    };
    load();
  },[]);

  const updateDraft=(id,field,value)=>{
    setDrafts(drafts.map(d=>d.id===id?{...d,[field]:value}:d));
    if(selectedDraft?.id===id)setSelectedDraft({...selectedDraft,[field]:value});
  };

  const createDraft=()=>{
    const newDraft={
      id:Date.now(),
      section:newSection,
      version:1,
      title:`${newSection} - Draft`,
      content:'',
      word_count:0,
      compliance_score:0,
      status:'draft',
      author:'You',
      reviewer:''
    };
    setDrafts([...drafts,newDraft]);
    setSelectedDraft(newDraft);
    setShowNewDraft(false);
  };

  const generateWithAI=async()=>{
    if(!aiPrompt)return;
    setGenerating(true);
    // Simulated AI generation
    setTimeout(()=>{
      const generated=`Based on your prompt "${aiPrompt}", here is the generated content:\n\nMission Meets Tech proposes a comprehensive approach that addresses all requirements specified in the Statement of Work. Our methodology incorporates industry best practices and lessons learned from similar engagements.\n\nKey elements of our approach include:\n• Proven frameworks for rapid deployment\n• Risk mitigation strategies\n• Quality assurance processes\n• Continuous improvement mechanisms`;
      updateDraft(selectedDraft.id,'content',selectedDraft.content+'\n\n'+generated);
      updateDraft(selectedDraft.id,'word_count',(selectedDraft.word_count||0)+generated.split(' ').length);
      setAiPrompt('');
      setGenerating(false);
    },2000);
  };

  const getStatusColor=(status)=>{
    const colors={draft:'bg-slate-500/20 text-slate-400',review:'bg-amber-500/20 text-amber-400',approved:'bg-emerald-500/20 text-emerald-400',final:'bg-cyan-500/20 text-cyan-400'};
    return colors[status]||colors.draft;
  };

  return(
    <div className="min-h-screen p-6">
      {/* Header */}
      <div className="flex justify-between items-start mb-6">
        <div>
          <h1 className="text-2xl font-bold text-white flex items-center gap-3">
            ✍️ Iron Dome Writer
            <span className={`text-xs px-2 py-1 rounded ${connected?'bg-emerald-500/20 text-emerald-400':'bg-red-500/20 text-red-400'}`}>
              {connected?'● Live':'○ Demo'}
            </span>
          </h1>
          <p className="text-slate-400 text-sm mt-1">AI-assisted proposal content development</p>
        </div>
        <button onClick={()=>setShowNewDraft(true)} className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-lg font-medium">
          + New Section
        </button>
      </div>

      <div className="grid grid-cols-12 gap-6">
        {/* Section List */}
        <div className="col-span-3 space-y-3">
          <div className="glass p-3">
            <h3 className="text-sm font-semibold text-white mb-3">Sections ({drafts.length})</h3>
            <div className="space-y-2 max-h-[calc(100vh-250px)] overflow-y-auto">
              {drafts.map(draft=>(
                <div key={draft.id} onClick={()=>setSelectedDraft(draft)} className={`p-3 rounded-lg cursor-pointer transition-all ${selectedDraft?.id===draft.id?'bg-cyan-500/20 border border-cyan-500/50':'bg-slate-800/50 hover:bg-slate-700/50'}`}>
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-sm font-medium text-white truncate">{draft.section}</span>
                    <span className={`text-xs px-1.5 py-0.5 rounded ${getStatusColor(draft.status)}`}>v{draft.version}</span>
                  </div>
                  <div className="flex items-center justify-between text-xs text-slate-500">
                    <span>{draft.word_count} words</span>
                    <span>{draft.compliance_score}% compliant</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Editor */}
        <div className="col-span-9">
          {selectedDraft?(
            <div className="glass p-6">
              {/* Editor Header */}
              <div className="flex justify-between items-start mb-4 pb-4 border-b border-slate-700/50">
                <div>
                  <input value={selectedDraft.title} onChange={e=>updateDraft(selectedDraft.id,'title',e.target.value)} className="text-xl font-bold text-white bg-transparent border-b border-transparent hover:border-slate-700 focus:border-cyan-500 outline-none w-full"/>
                  <div className="flex items-center gap-4 mt-2 text-sm text-slate-400">
                    <span>Author: {selectedDraft.author}</span>
                    <span>•</span>
                    <span>{selectedDraft.word_count} words</span>
                    <span>•</span>
                    <span className={selectedDraft.compliance_score>=80?'text-emerald-400':selectedDraft.compliance_score>=60?'text-amber-400':'text-red-400'}>
                      {selectedDraft.compliance_score}% compliant
                    </span>
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  <select value={selectedDraft.status} onChange={e=>updateDraft(selectedDraft.id,'status',e.target.value)} className="bg-slate-800 border border-slate-700 rounded px-2 py-1 text-sm text-white">
                    <option value="draft">Draft</option>
                    <option value="review">Review</option>
                    <option value="approved">Approved</option>
                    <option value="final">Final</option>
                  </select>
                </div>
              </div>

              {/* Content Editor */}
              <textarea value={selectedDraft.content} onChange={e=>{updateDraft(selectedDraft.id,'content',e.target.value);updateDraft(selectedDraft.id,'word_count',e.target.value.split(/\s+/).filter(w=>w).length)}} className="w-full h-64 bg-slate-800/50 border border-slate-700 rounded-lg p-4 text-white focus:border-cyan-500 outline-none resize-none" placeholder="Start writing your proposal section..."/>

              {/* AI Assistant */}
              <div className="mt-4 p-4 bg-gradient-to-r from-purple-500/10 to-cyan-500/10 rounded-lg border border-purple-500/20">
                <div className="flex items-center gap-2 mb-3">
                  <span className="text-xl">🤖</span>
                  <span className="font-medium text-white">AI Writer Agent</span>
                  {generating&&<span className="text-xs text-cyan-400 animate-pulse">Generating...</span>}
                </div>
                <div className="flex gap-2">
                  <input value={aiPrompt} onChange={e=>setAiPrompt(e.target.value)} placeholder="Describe what you want to generate..." className="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white" onKeyDown={e=>e.key==='Enter'&&generateWithAI()}/>
                  <button onClick={generateWithAI} disabled={generating||!aiPrompt} className="px-4 py-2 bg-cyan-500 text-white rounded-lg text-sm disabled:opacity-50">
                    {generating?'...':'Generate'}
                  </button>
                </div>
                <div className="flex gap-2 mt-3">
                  <button onClick={()=>setAiPrompt('Write an executive summary highlighting our healthcare IT expertise')} className="px-2 py-1 bg-slate-700 rounded text-xs hover:bg-slate-600">Executive Summary</button>
                  <button onClick={()=>setAiPrompt('Describe our technical approach using cloud-native architecture')} className="px-2 py-1 bg-slate-700 rounded text-xs hover:bg-slate-600">Tech Approach</button>
                  <button onClick={()=>setAiPrompt('Create a past performance narrative for a similar DHA contract')} className="px-2 py-1 bg-slate-700 rounded text-xs hover:bg-slate-600">Past Performance</button>
                  <button onClick={()=>setAiPrompt('Check compliance with RFP requirements')} className="px-2 py-1 bg-slate-700 rounded text-xs hover:bg-slate-600">Check Compliance</button>
                </div>
              </div>

              {/* Actions */}
              <div className="flex justify-between items-center mt-4 pt-4 border-t border-slate-700/50">
                <div className="text-xs text-slate-500">
                  Last saved: Just now
                </div>
                <div className="flex gap-2">
                  <button className="px-3 py-1.5 bg-slate-700 rounded-lg text-sm">Export</button>
                  <button className="px-3 py-1.5 bg-slate-700 rounded-lg text-sm">Submit for Review</button>
                  <button className="px-3 py-1.5 bg-cyan-500 text-white rounded-lg text-sm">Save Draft</button>
                </div>
              </div>
            </div>
          ):(
            <div className="glass p-12 text-center">
              <span className="text-6xl">✍️</span>
              <p className="text-slate-400 mt-4">Select a section to edit or create a new one</p>
            </div>
          )}
        </div>
      </div>

      {/* New Draft Modal */}
      {showNewDraft&&(
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
          <div className="glass p-6 w-full max-w-sm">
            <h3 className="text-lg font-bold text-white mb-4">New Section</h3>
            <select value={newSection} onChange={e=>setNewSection(e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white mb-4">
              {SECTIONS.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
            <div className="flex gap-3">
              <button onClick={()=>setShowNewDraft(false)} className="flex-1 px-4 py-2 bg-slate-700 rounded-lg">Cancel</button>
              <button onClick={createDraft} className="flex-1 px-4 py-2 bg-cyan-500 rounded-lg text-white">Create</button>
            </div>
          </div>
        </div>
      )}

      <div className="text-center text-xs text-slate-500 mt-8">
        AI GENERATED - REQUIRES HUMAN REVIEW | © 2026 Mission Meets Tech
      </div>
    </div>
  );
}

ReactDOM.render(<IronDome/>,document.getElementById('root'));
</script>
</body>
</html>
