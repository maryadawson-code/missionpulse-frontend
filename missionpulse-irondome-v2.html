<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Iron Dome</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-amber { 0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(245, 158, 11, 0); } }
    .pulse-amber { animation: pulse-amber 2s infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const DEMO_VOLUMES = [
      { id: 1, name: 'Volume I - Technical', maxPages: 50, sections: [
        { id: 1, name: '1.0 Executive Summary', allocated: 3, used: 3, owner: 'CEO', status: 'Complete' },
        { id: 2, name: '2.0 Understanding', allocated: 8, used: 7, owner: 'SA', status: 'Complete' },
        { id: 3, name: '3.0 Technical Approach', allocated: 20, used: 18, owner: 'SA', status: 'In Progress' },
        { id: 4, name: '4.0 Transition Plan', allocated: 10, used: 5, owner: 'PM', status: 'In Progress' },
        { id: 5, name: '5.0 Management', allocated: 6, used: 0, owner: 'PM', status: 'Not Started' },
        { id: 6, name: '6.0 Staffing', allocated: 3, used: 0, owner: 'DEL', status: 'Not Started' }
      ]},
      { id: 2, name: 'Volume II - Price', maxPages: 15, sections: [
        { id: 7, name: 'Price Narrative', allocated: 5, used: 4, owner: 'FIN', status: 'In Progress' },
        { id: 8, name: 'Basis of Estimate', allocated: 8, used: 6, owner: 'FIN', status: 'In Progress' },
        { id: 9, name: 'Rate Tables', allocated: 2, used: 0, owner: 'FIN', status: 'Not Started' }
      ]},
      { id: 3, name: 'Volume III - Past Performance', maxPages: 12, sections: [
        { id: 10, name: 'Reference 1', allocated: 3, used: 3, owner: 'PM', status: 'Complete' },
        { id: 11, name: 'Reference 2', allocated: 3, used: 2, owner: 'PM', status: 'In Progress' },
        { id: 12, name: 'Reference 3', allocated: 3, used: 0, owner: 'PM', status: 'Not Started' },
        { id: 13, name: 'Relevance Matrix', allocated: 3, used: 2, owner: 'CAP', status: 'In Progress' }
      ]}
    ];

    function Sidebar() {
      const navItems = [
        { icon: '🏠', label: 'Dashboard', path: 'index.html' },
        { icon: '📊', label: 'Pipeline', path: 'missionpulse-pipeline-v2.html' },
        { icon: '🎯', label: 'War Room', path: 'missionpulse-warroom-v2.html' },
        { icon: '🛡️', label: 'Iron Dome', path: 'missionpulse-irondome-v2.html', active: true },
        { icon: '📋', label: 'Swimlane', path: 'missionpulse-swimlane-v2.html' },
        { icon: '🤖', label: 'Agent Hub', path: 'missionpulse-agenthub-v2.html' }
      ];
      return (
        <div className="w-64 bg-slate-900/50 border-r border-slate-700 min-h-screen p-4 hidden lg:block">
          <div className="flex items-center gap-3 mb-8">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center pulse-amber"><span className="text-xl">🛡️</span></div>
            <div><div className="font-bold text-amber-400">Iron Dome</div><div className="text-xs text-slate-400">Page Budget</div></div>
          </div>
          <nav className="space-y-1">{navItems.map((item, i) => (<a key={i} href={item.path} className={`flex items-center gap-3 px-3 py-2 rounded-lg transition-all ${item.active ? 'bg-amber-500/20 text-amber-400 border border-amber-500/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}><span>{item.icon}</span><span className="text-sm">{item.label}</span></a>))}</nav>
        </div>
      );
    }

    function SectionRow({ section }) {
      const percent = section.allocated > 0 ? Math.round((section.used / section.allocated) * 100) : 0;
      const isOver = section.used > section.allocated;
      const statusColors = { 'Complete': 'bg-emerald-500/20 text-emerald-400', 'In Progress': 'bg-cyan-500/20 text-cyan-400', 'Not Started': 'bg-slate-500/20 text-slate-400' };
      return (
        <tr className="border-b border-slate-700/50 hover:bg-slate-800/30">
          <td className="p-3 text-sm">{section.name}</td>
          <td className="p-3 text-sm text-center">{section.owner}</td>
          <td className="p-3 text-sm text-center">{section.allocated}</td>
          <td className="p-3 text-sm text-center"><span className={isOver ? 'text-red-400 font-bold' : ''}>{section.used}</span></td>
          <td className="p-3"><div className="flex items-center gap-2"><div className="flex-1 h-2 bg-slate-700 rounded-full overflow-hidden"><div className={`h-full rounded-full ${isOver ? 'bg-red-500' : percent >= 80 ? 'bg-amber-500' : 'bg-emerald-500'}`} style={{ width: `${Math.min(percent, 100)}%` }} /></div><span className={`text-xs w-10 ${isOver ? 'text-red-400' : ''}`}>{percent}%</span></div></td>
          <td className="p-3"><span className={`px-2 py-0.5 rounded text-xs ${statusColors[section.status]}`}>{section.status}</span></td>
        </tr>
      );
    }

    function VolumeCard({ volume }) {
      const totalUsed = volume.sections.reduce((sum, s) => sum + s.used, 0);
      const remaining = volume.maxPages - totalUsed;
      const percentUsed = Math.round((totalUsed / volume.maxPages) * 100);
      const isOver = totalUsed > volume.maxPages;
      return (
        <div className="bg-slate-800/50 border border-slate-700 rounded-xl overflow-hidden mb-6">
          <div className="p-4 border-b border-slate-700 flex items-center justify-between">
            <div><h3 className="font-semibold">{volume.name}</h3><div className="text-sm text-slate-400">Max: {volume.maxPages} pages</div></div>
            <div className="text-right"><div className={`text-2xl font-bold ${isOver ? 'text-red-400' : remaining <= 5 ? 'text-amber-400' : 'text-emerald-400'}`}>{remaining >= 0 ? remaining : `+${Math.abs(remaining)}`}</div><div className="text-xs text-slate-400">{remaining >= 0 ? 'remaining' : 'OVER'}</div></div>
          </div>
          <div className="p-4">
            <div className="flex items-center gap-3 mb-4"><div className="flex-1 h-3 bg-slate-700 rounded-full overflow-hidden"><div className={`h-full rounded-full ${isOver ? 'bg-red-500' : percentUsed >= 80 ? 'bg-amber-500' : 'bg-emerald-500'}`} style={{ width: `${Math.min(percentUsed, 100)}%` }} /></div><span className="text-sm font-mono">{totalUsed}/{volume.maxPages}</span></div>
            <table className="w-full"><thead><tr className="text-xs text-slate-400"><th className="text-left p-2">Section</th><th className="text-center p-2">Owner</th><th className="text-center p-2">Budget</th><th className="text-center p-2">Used</th><th className="p-2">Progress</th><th className="p-2">Status</th></tr></thead><tbody>{volume.sections.map(s => <SectionRow key={s.id} section={s} />)}</tbody></table>
          </div>
        </div>
      );
    }

    function App() {
      const [volumes] = React.useState(DEMO_VOLUMES);
      const totalMax = volumes.reduce((sum, v) => sum + v.maxPages, 0);
      const totalUsed = volumes.reduce((sum, v) => sum + v.sections.reduce((s, sec) => s + sec.used, 0), 0);
      const totalRemaining = totalMax - totalUsed;
      const completeSections = volumes.flatMap(v => v.sections).filter(s => s.status === 'Complete').length;
      const totalSections = volumes.flatMap(v => v.sections).length;
      const overBudget = volumes.flatMap(v => v.sections).filter(s => s.used > s.allocated).length;

      return (
        <div className="flex min-h-screen">
          <Sidebar />
          <div className="flex-1 p-4 lg:p-6">
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
              <div><h1 className="text-2xl font-bold">Iron Dome</h1><p className="text-slate-400 text-sm">EHR-Mod • Page Budget & Compliance Tracker</p></div>
              <button className="px-4 py-2 bg-amber-500 hover:bg-amber-400 text-slate-900 rounded-lg text-sm font-medium">📊 Export Report</button>
            </div>
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4"><div className="text-3xl font-bold">{totalMax}</div><div className="text-sm text-slate-400">Total Budget</div></div>
              <div className={`bg-slate-800/50 border rounded-xl p-4 ${totalRemaining < 0 ? 'border-red-500/50' : 'border-emerald-500/30'}`}><div className={`text-3xl font-bold ${totalRemaining < 0 ? 'text-red-400' : 'text-emerald-400'}`}>{totalRemaining}</div><div className="text-sm text-slate-400">Remaining</div></div>
              <div className="bg-slate-800/50 border border-cyan-500/30 rounded-xl p-4"><div className="text-3xl font-bold text-cyan-400">{completeSections}/{totalSections}</div><div className="text-sm text-slate-400">Complete</div></div>
              <div className={`bg-slate-800/50 border rounded-xl p-4 ${overBudget > 0 ? 'border-red-500/50' : 'border-slate-700'}`}><div className={`text-3xl font-bold ${overBudget > 0 ? 'text-red-400' : 'text-slate-400'}`}>{overBudget}</div><div className="text-sm text-slate-400">Over Budget</div></div>
            </div>
            {overBudget > 0 && (<div className="mb-6 p-4 bg-red-500/10 border border-red-500/30 rounded-xl flex items-center gap-3"><span className="text-2xl">⚠️</span><div><div className="font-medium text-red-400">Budget Alert</div><div className="text-sm text-slate-300">{overBudget} section(s) exceed allocated page budget.</div></div></div>)}
            {volumes.map(v => <VolumeCard key={v.id} volume={v} />)}
            <div className="mt-8 text-center text-xs text-slate-500"><div>Mission Meets Tech | MissionPulse Iron Dome</div><div className="mt-1">AI GENERATED - REQUIRES HUMAN REVIEW</div></div>
          </div>
        </div>
      );
    }
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
