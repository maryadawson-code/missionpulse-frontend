<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:#00050F;color:#e2e8f0;min-height:100vh}.glass{background:rgba(15,23,42,0.85);backdrop-filter:blur(16px);border:1px solid rgba(0,229,250,0.1);border-radius:12px}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState}=React;

const ROLES=['CEO','COO','CAP','PM','SA','FIN','CON','DEL','QA','Partner','Admin'];

function Settings(){
  const[activeTab,setActiveTab]=useState('profile');
  const[profile,setProfile]=useState({name:'Mary Womack',email:'mary@mmt.com',role:'CEO',company:'Mission Meets Tech'});
  const[notifications,setNotifications]=useState({email:true,browser:true,slack:false,deadlines:true,aiAlerts:true});
  const[integrations,setIntegrations]=useState({hubspot:false,sharepoint:true,sam:true,gsaAdvantage:false});
  const[saved,setSaved]=useState(false);

  const save=()=>{
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  };

  const tabs=[
    {id:'profile',label:'Profile',icon:'👤'},
    {id:'notifications',label:'Notifications',icon:'🔔'},
    {id:'integrations',label:'Integrations',icon:'🔗'},
    {id:'security',label:'Security',icon:'🔐'},
    {id:'system',label:'System',icon:'⚙️'}
  ];

  return(
    <div className="min-h-screen p-6">
      <div className="flex justify-between items-start mb-6">
        <div>
          <h1 className="text-2xl font-bold text-white">⚙️ Settings</h1>
          <p className="text-slate-400 text-sm mt-1">Manage your account and preferences</p>
        </div>
        <button onClick={save} className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-lg">
          {saved?'✓ Saved':'Save Changes'}
        </button>
      </div>

      <div className="grid grid-cols-12 gap-6">
        <div className="col-span-3">
          <div className="glass p-2">
            {tabs.map(tab=>(
              <button key={tab.id} onClick={()=>setActiveTab(tab.id)} className={`w-full text-left px-4 py-3 rounded-lg mb-1 transition-all ${activeTab===tab.id?'bg-cyan-500/20 text-cyan-400':'text-slate-400 hover:bg-slate-800/50'}`}>
                <span className="mr-2">{tab.icon}</span>{tab.label}
              </button>
            ))}
          </div>
        </div>

        <div className="col-span-9">
          {activeTab==='profile'&&(
            <div className="glass p-6">
              <h3 className="text-lg font-semibold text-white mb-4">Profile Settings</h3>
              <div className="space-y-4">
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Full Name</label>
                  <input value={profile.name} onChange={e=>setProfile({...profile,name:e.target.value})} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white"/>
                </div>
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Email</label>
                  <input value={profile.email} onChange={e=>setProfile({...profile,email:e.target.value})} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white"/>
                </div>
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Role</label>
                  <select value={profile.role} onChange={e=>setProfile({...profile,role:e.target.value})} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white">
                    {ROLES.map(r=><option key={r} value={r}>{r}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Company</label>
                  <input value={profile.company} onChange={e=>setProfile({...profile,company:e.target.value})} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white"/>
                </div>
              </div>
            </div>
          )}

          {activeTab==='notifications'&&(
            <div className="glass p-6">
              <h3 className="text-lg font-semibold text-white mb-4">Notification Preferences</h3>
              <div className="space-y-4">
                {Object.entries({email:'Email Notifications',browser:'Browser Notifications',slack:'Slack Integration',deadlines:'Deadline Alerts',aiAlerts:'AI Approval Alerts'}).map(([key,label])=>(
                  <div key={key} className="flex items-center justify-between p-3 bg-slate-800/50 rounded-lg">
                    <span className="text-white">{label}</span>
                    <button onClick={()=>setNotifications({...notifications,[key]:!notifications[key]})} className={`w-12 h-6 rounded-full transition-all ${notifications[key]?'bg-cyan-500':'bg-slate-600'}`}>
                      <div className={`w-5 h-5 bg-white rounded-full transition-all ${notifications[key]?'ml-6':'ml-0.5'}`}/>
                    </button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {activeTab==='integrations'&&(
            <div className="glass p-6">
              <h3 className="text-lg font-semibold text-white mb-4">Integrations</h3>
              <div className="grid grid-cols-2 gap-4">
                {[
                  {id:'hubspot',name:'HubSpot CRM',desc:'Sync opportunities with HubSpot',icon:'🔷'},
                  {id:'sharepoint',name:'SharePoint',desc:'Document management integration',icon:'📁'},
                  {id:'sam',name:'SAM.gov',desc:'Federal opportunity feed',icon:'🏛️'},
                  {id:'gsaAdvantage',name:'GSA Advantage',desc:'Schedule rate validation',icon:'📋'}
                ].map(int=>(
                  <div key={int.id} className="p-4 bg-slate-800/50 rounded-lg">
                    <div className="flex items-center justify-between mb-2">
                      <div className="flex items-center gap-2">
                        <span className="text-2xl">{int.icon}</span>
                        <span className="font-medium text-white">{int.name}</span>
                      </div>
                      <button onClick={()=>setIntegrations({...integrations,[int.id]:!integrations[int.id]})} className={`px-3 py-1 rounded text-sm ${integrations[int.id]?'bg-emerald-500/20 text-emerald-400':'bg-slate-700 text-slate-400'}`}>
                        {integrations[int.id]?'Connected':'Connect'}
                      </button>
                    </div>
                    <p className="text-xs text-slate-500">{int.desc}</p>
                  </div>
                ))}
              </div>
            </div>
          )}

          {activeTab==='security'&&(
            <div className="glass p-6">
              <h3 className="text-lg font-semibold text-white mb-4">Security Settings</h3>
              <div className="space-y-4">
                <div className="p-4 bg-slate-800/50 rounded-lg">
                  <div className="flex justify-between items-center">
                    <div>
                      <div className="font-medium text-white">Two-Factor Authentication</div>
                      <div className="text-sm text-slate-500">Add an extra layer of security</div>
                    </div>
                    <button className="px-4 py-2 bg-cyan-500 text-white rounded-lg text-sm">Enable 2FA</button>
                  </div>
                </div>
                <div className="p-4 bg-slate-800/50 rounded-lg">
                  <div className="flex justify-between items-center">
                    <div>
                      <div className="font-medium text-white">Change Password</div>
                      <div className="text-sm text-slate-500">Last changed 30 days ago</div>
                    </div>
                    <button className="px-4 py-2 bg-slate-700 text-white rounded-lg text-sm">Update</button>
                  </div>
                </div>
                <div className="p-4 bg-slate-800/50 rounded-lg">
                  <div className="flex justify-between items-center">
                    <div>
                      <div className="font-medium text-white">Active Sessions</div>
                      <div className="text-sm text-slate-500">2 devices currently logged in</div>
                    </div>
                    <button className="px-4 py-2 bg-red-500/20 text-red-400 rounded-lg text-sm">Revoke All</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {activeTab==='system'&&(
            <div className="glass p-6">
              <h3 className="text-lg font-semibold text-white mb-4">System Information</h3>
              <div className="space-y-3">
                {[
                  ['Version','3.0.0'],
                  ['Build Date','January 30, 2026'],
                  ['Database','Supabase (qdrtpnpnhkxvfmvfziop)'],
                  ['API','Render (missionpulse-api.onrender.com)'],
                  ['Hosting','Netlify'],
                  ['CMMC Level','Level 2 Compliant']
                ].map(([label,value])=>(
                  <div key={label} className="flex justify-between p-3 bg-slate-800/50 rounded-lg">
                    <span className="text-slate-400">{label}</span>
                    <span className="text-white font-mono text-sm">{value}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
      <div className="text-center text-xs text-slate-500 mt-8">AI GENERATED - REQUIRES HUMAN REVIEW | © 2026 Mission Meets Tech</div>
    </div>
  );
}
ReactDOM.render(<Settings/>,document.getElementById('root'));
</script>
</body>
</html>
