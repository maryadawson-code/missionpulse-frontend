<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-cyan { 0%, 100% { box-shadow: 0 0 0 0 rgba(0, 229, 250, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(0, 229, 250, 0); } }
    .pulse-icon { animation: pulse-cyan 2s infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // Sidebar
    function Sidebar() {
      const navItems = [
        { icon: '🏠', label: 'Dashboard', path: 'index.html' },
        { icon: '📊', label: 'Pipeline', path: 'missionpulse-pipeline-v2.html' },
        { icon: '🎯', label: 'War Room', path: 'missionpulse-warroom-v2.html' },
        { icon: '🔍', label: 'RFP Shredder', path: 'missionpulse-rfpshredder-v2.html' },
        { icon: '🤖', label: 'HITL Queue', path: 'missionpulse-hitl-v2.html' },
        { icon: '🤖', label: 'Agent Hub', path: 'missionpulse-agenthub-v2.html' },
        { icon: '👤', label: 'Profile', path: 'missionpulse-profile.html' },
        { icon: '⚙️', label: 'Settings', path: 'missionpulse-settings-v2.html', active: true }
      ];

      return (
        <div className="w-64 bg-slate-900/50 border-r border-slate-700 min-h-screen p-4 hidden lg:block">
          <div className="flex items-center gap-3 mb-8">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center pulse-icon">
              <span className="text-xl">🛡️</span>
            </div>
            <div>
              <div className="font-bold text-cyan-400">MissionPulse</div>
              <div className="text-xs text-slate-400">Settings</div>
            </div>
          </div>
          
          <nav className="space-y-1">
            {navItems.map((item, i) => (
              <a 
                key={i}
                href={item.path}
                className={`flex items-center gap-3 px-3 py-2 rounded-lg transition-all ${
                  item.active 
                    ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' 
                    : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                }`}
              >
                <span>{item.icon}</span>
                <span className="text-sm">{item.label}</span>
              </a>
            ))}
          </nav>
        </div>
      );
    }

    // Toggle Switch
    function Toggle({ enabled, onChange, label, description }) {
      return (
        <div className="flex items-center justify-between py-3">
          <div>
            <div className="font-medium text-sm">{label}</div>
            {description && <div className="text-xs text-slate-400">{description}</div>}
          </div>
          <button
            onClick={() => onChange(!enabled)}
            className={`w-12 h-6 rounded-full transition-colors ${enabled ? 'bg-cyan-500' : 'bg-slate-600'}`}
          >
            <div className={`w-5 h-5 bg-white rounded-full transform transition-transform ${enabled ? 'translate-x-6' : 'translate-x-0.5'}`} />
          </button>
        </div>
      );
    }

    // Settings Section
    function Section({ title, children }) {
      return (
        <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6 mb-6">
          <h3 className="font-semibold mb-4">{title}</h3>
          {children}
        </div>
      );
    }

    function App() {
      const [settings, setSettings] = React.useState({
        // Notifications
        emailNotifications: true,
        deadlineAlerts: true,
        hitlNotifications: true,
        weeklyDigest: false,
        
        // AI Preferences
        autoHITL: true,
        confidenceThreshold: 85,
        enableBlackHat: true,
        enablePricingAI: true,
        
        // Display
        compactMode: false,
        showPipeline: true,
        defaultView: 'dashboard',
        timezone: 'America/New_York',
        
        // Security
        twoFactorEnabled: false,
        sessionTimeout: 30,
        auditLogging: true
      });

      const [activeTab, setActiveTab] = React.useState('general');
      const [saving, setSaving] = React.useState(false);
      const [message, setMessage] = React.useState(null);

      const updateSetting = (key, value) => {
        setSettings(prev => ({ ...prev, [key]: value }));
      };

      const saveSettings = async () => {
        setSaving(true);
        // Simulate save
        await new Promise(resolve => setTimeout(resolve, 1000));
        localStorage.setItem('missionpulse_settings', JSON.stringify(settings));
        setMessage({ type: 'success', text: 'Settings saved successfully!' });
        setSaving(false);
        setTimeout(() => setMessage(null), 3000);
      };

      React.useEffect(() => {
        const saved = localStorage.getItem('missionpulse_settings');
        if (saved) {
          try {
            setSettings(prev => ({ ...prev, ...JSON.parse(saved) }));
          } catch (e) {}
        }
      }, []);

      const tabs = [
        { id: 'general', label: 'General', icon: '⚙️' },
        { id: 'notifications', label: 'Notifications', icon: '🔔' },
        { id: 'ai', label: 'AI & Automation', icon: '🤖' },
        { id: 'security', label: 'Security', icon: '🔒' }
      ];

      return (
        <div className="flex min-h-screen">
          <Sidebar />
          
          <div className="flex-1 p-4 lg:p-6">
            {/* Header */}
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
              <div>
                <h1 className="text-2xl font-bold">Settings</h1>
                <p className="text-slate-400 text-sm">Configure your MissionPulse experience</p>
              </div>
              
              <button
                onClick={saveSettings}
                disabled={saving}
                className="px-6 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg text-sm font-medium disabled:opacity-50"
              >
                {saving ? 'Saving...' : 'Save Changes'}
              </button>
            </div>

            {/* Message */}
            {message && (
              <div className={`mb-6 p-4 rounded-lg ${
                message.type === 'success' 
                  ? 'bg-emerald-500/20 border border-emerald-500/30 text-emerald-300'
                  : 'bg-red-500/20 border border-red-500/30 text-red-300'
              }`}>
                {message.text}
              </div>
            )}

            {/* Tabs */}
            <div className="flex gap-2 mb-6 overflow-x-auto pb-2">
              {tabs.map(tab => (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm whitespace-nowrap transition-colors ${
                    activeTab === tab.id 
                      ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' 
                      : 'bg-slate-800/50 hover:bg-slate-700'
                  }`}
                >
                  <span>{tab.icon}</span>
                  <span>{tab.label}</span>
                </button>
              ))}
            </div>

            {/* Tab Content */}
            {activeTab === 'general' && (
              <>
                <Section title="Display Preferences">
                  <Toggle
                    enabled={settings.compactMode}
                    onChange={(v) => updateSetting('compactMode', v)}
                    label="Compact Mode"
                    description="Reduce spacing and show more content"
                  />
                  <Toggle
                    enabled={settings.showPipeline}
                    onChange={(v) => updateSetting('showPipeline', v)}
                    label="Show Pipeline on Dashboard"
                    description="Display opportunity pipeline on main dashboard"
                  />
                  <div className="py-3">
                    <label className="block text-sm font-medium mb-2">Default View</label>
                    <select
                      value={settings.defaultView}
                      onChange={(e) => updateSetting('defaultView', e.target.value)}
                      className="w-full sm:w-auto bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                    >
                      <option value="dashboard">Dashboard</option>
                      <option value="pipeline">Pipeline</option>
                      <option value="warroom">War Room</option>
                    </select>
                  </div>
                  <div className="py-3">
                    <label className="block text-sm font-medium mb-2">Timezone</label>
                    <select
                      value={settings.timezone}
                      onChange={(e) => updateSetting('timezone', e.target.value)}
                      className="w-full sm:w-auto bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                    >
                      <option value="America/New_York">Eastern Time (ET)</option>
                      <option value="America/Chicago">Central Time (CT)</option>
                      <option value="America/Denver">Mountain Time (MT)</option>
                      <option value="America/Los_Angeles">Pacific Time (PT)</option>
                      <option value="UTC">UTC</option>
                    </select>
                  </div>
                </Section>

                <Section title="Organization">
                  <div className="space-y-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Company Name</label>
                      <input
                        type="text"
                        defaultValue="Mission Meets Tech"
                        className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                      />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">DUNS Number</label>
                      <input
                        type="text"
                        placeholder="000000000"
                        className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                      />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">CAGE Code</label>
                      <input
                        type="text"
                        placeholder="XXXXX"
                        className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                      />
                    </div>
                  </div>
                </Section>
              </>
            )}

            {activeTab === 'notifications' && (
              <Section title="Notification Preferences">
                <Toggle
                  enabled={settings.emailNotifications}
                  onChange={(v) => updateSetting('emailNotifications', v)}
                  label="Email Notifications"
                  description="Receive important updates via email"
                />
                <Toggle
                  enabled={settings.deadlineAlerts}
                  onChange={(v) => updateSetting('deadlineAlerts', v)}
                  label="Deadline Alerts"
                  description="Get notified when proposal deadlines approach"
                />
                <Toggle
                  enabled={settings.hitlNotifications}
                  onChange={(v) => updateSetting('hitlNotifications', v)}
                  label="HITL Queue Alerts"
                  description="Notify when AI outputs need review"
                />
                <Toggle
                  enabled={settings.weeklyDigest}
                  onChange={(v) => updateSetting('weeklyDigest', v)}
                  label="Weekly Digest"
                  description="Receive a weekly summary of pipeline activity"
                />
              </Section>
            )}

            {activeTab === 'ai' && (
              <>
                <Section title="AI Agent Settings">
                  <Toggle
                    enabled={settings.autoHITL}
                    onChange={(v) => updateSetting('autoHITL', v)}
                    label="Automatic HITL Routing"
                    description="Route low-confidence AI outputs to review queue"
                  />
                  <div className="py-3">
                    <label className="block text-sm font-medium mb-2">Confidence Threshold ({settings.confidenceThreshold}%)</label>
                    <input
                      type="range"
                      min="50"
                      max="100"
                      value={settings.confidenceThreshold}
                      onChange={(e) => updateSetting('confidenceThreshold', parseInt(e.target.value))}
                      className="w-full h-2 bg-slate-700 rounded-full appearance-none cursor-pointer"
                    />
                    <div className="flex justify-between text-xs text-slate-500 mt-1">
                      <span>50%</span>
                      <span>75%</span>
                      <span>100%</span>
                    </div>
                  </div>
                </Section>

                <Section title="Agent Permissions">
                  <Toggle
                    enabled={settings.enableBlackHat}
                    onChange={(v) => updateSetting('enableBlackHat', v)}
                    label="Black Hat Agent"
                    description="Enable competitive intelligence analysis"
                  />
                  <Toggle
                    enabled={settings.enablePricingAI}
                    onChange={(v) => updateSetting('enablePricingAI', v)}
                    label="Pricing Agent"
                    description="Enable AI-assisted pricing recommendations"
                  />
                  <div className="mt-4 p-3 bg-amber-500/10 border border-amber-500/30 rounded-lg">
                    <div className="flex items-center gap-2 text-amber-400 text-sm">
                      <span>⚠️</span>
                      <span>Some agents handle CUI data. Ensure proper security protocols.</span>
                    </div>
                  </div>
                </Section>
              </>
            )}

            {activeTab === 'security' && (
              <>
                <Section title="Authentication">
                  <Toggle
                    enabled={settings.twoFactorEnabled}
                    onChange={(v) => updateSetting('twoFactorEnabled', v)}
                    label="Two-Factor Authentication"
                    description="Add an extra layer of security to your account"
                  />
                  <div className="py-3">
                    <label className="block text-sm font-medium mb-2">Session Timeout (minutes)</label>
                    <select
                      value={settings.sessionTimeout}
                      onChange={(e) => updateSetting('sessionTimeout', parseInt(e.target.value))}
                      className="w-full sm:w-auto bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                    >
                      <option value={15}>15 minutes</option>
                      <option value={30}>30 minutes</option>
                      <option value={60}>1 hour</option>
                      <option value={120}>2 hours</option>
                    </select>
                  </div>
                </Section>

                <Section title="Audit & Compliance">
                  <Toggle
                    enabled={settings.auditLogging}
                    onChange={(v) => updateSetting('auditLogging', v)}
                    label="Audit Logging"
                    description="Log all user actions for compliance"
                  />
                  <div className="py-3">
                    <a 
                      href="missionpulse-audit-v2.html"
                      className="text-cyan-400 hover:underline text-sm"
                    >
                      View Audit Log →
                    </a>
                  </div>
                </Section>

                <Section title="Data Management">
                  <div className="space-y-4">
                    <button className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
                      📥 Export All Data
                    </button>
                    <button className="px-4 py-2 bg-red-500/20 hover:bg-red-500/30 border border-red-500/30 text-red-400 rounded-lg text-sm ml-3">
                      🗑️ Delete Account
                    </button>
                  </div>
                </Section>
              </>
            )}

            {/* Footer */}
            <div className="mt-8 text-center text-xs text-slate-500">
              <div>Mission Meets Tech | MissionPulse Settings</div>
              <div className="mt-1">Version 2.0 • AI GENERATED - REQUIRES HUMAN REVIEW</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
