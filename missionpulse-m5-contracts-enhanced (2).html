<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse M5 - Contracts Scanner</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; overflow-x: hidden; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scanLine { 0% { top: 0; } 100% { top: 100%; } }
    @keyframes riskPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 50% { box-shadow: 0 0 20px 4px rgba(239, 68, 68, 0.2); } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(0, 229, 250, 0.2); } 50% { box-shadow: 0 0 40px rgba(0, 229, 250, 0.4); } }
    
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-spin { animation: spin 1s linear infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
    .animate-riskPulse { animation: riskPulse 2s ease-in-out infinite; }
    .animate-glow { animation: glow 2s ease-in-out infinite; }
    
    .scan-container { position: relative; overflow: hidden; }
    .scan-line { position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, #00E5FA, transparent); opacity: 0.6; animation: scanLine 2s linear infinite; }
    
    .risk-high { border-left-color: #EF4444; }
    .risk-medium { border-left-color: #F59E0B; }
    .risk-low { border-left-color: #10B981; }
    .risk-info { border-left-color: #3B82F6; }
    
    .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(100, 116, 139, 0.2); }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0F172A; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, createContext, useContext, useCallback } = React;

    // ============================================================================
    // PRODUCTION CONFIG
    // ============================================================================
    const CONFIG = {
      API_BASE: 'https://missionpulse-api.onrender.com',
      DASHBOARD_URL: 'https://missionpulse-frontend.netlify.app/',
      MODULE_ID: 'M5',
      MODULE_NAME: 'Contracts Scanner',
      VERSION: '12.0.1',
      FEATURES: {
        API_ENABLED: true,
        DEMO_MODE: true
      }
    };

    // ============================================================================
    // TOAST CONTEXT & PROVIDER
    // ============================================================================
    const ToastContext = createContext(null);

    const ToastProvider = ({ children }) => {
      const [toasts, setToasts] = useState([]);
      
      const addToast = useCallback((message, type = 'info', duration = 4000) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), duration);
      }, []);

      return (
        <ToastContext.Provider value={{ addToast }}>
          {children}
          <div className="fixed top-4 right-4 z-50 space-y-2">
            {toasts.map(toast => (
              <div 
                key={toast.id}
                className={`px-4 py-3 rounded-lg shadow-lg animate-slideIn flex items-center gap-2 ${
                  toast.type === 'success' ? 'bg-emerald-500/90 text-white' :
                  toast.type === 'error' ? 'bg-red-500/90 text-white' :
                  toast.type === 'warning' ? 'bg-amber-500/90 text-white' :
                  'bg-slate-700/90 text-white'
                }`}
              >
                <span className="text-sm font-medium">{toast.message}</span>
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    };

    const useToast = () => {
      const context = useContext(ToastContext);
      if (!context) throw new Error('useToast must be used within ToastProvider');
      return context;
    };

    // ============================================================================
    // ERROR BOUNDARY
    // ============================================================================
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }

      componentDidCatch(error, errorInfo) {
        console.error('ErrorBoundary caught:', error, errorInfo);
      }

      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen bg-[#00050F] flex items-center justify-center p-6">
              <div className="bg-slate-800/50 border border-red-500/30 rounded-xl p-8 max-w-md text-center">
                <div className="w-16 h-16 bg-red-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                  <Icon name="alert" className="w-8 h-8 text-red-400" />
                </div>
                <h2 className="text-xl font-bold text-white mb-2">Something went wrong</h2>
                <p className="text-slate-400 mb-4 text-sm">
                  {CONFIG.MODULE_NAME} encountered an error. Please try refreshing the page.
                </p>
                <button
                  onClick={() => window.location.reload()}
                  className="px-4 py-2 bg-cyan-500 text-white rounded-lg hover:bg-cyan-400 transition-colors"
                >
                  Refresh Page
                </button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // ============================================================================
    // LOADING SPINNER
    // ============================================================================
    const LoadingSpinner = ({ size = 'md', message = 'Loading...' }) => {
      const sizes = { sm: 'w-4 h-4', md: 'w-8 h-8', lg: 'w-12 h-12' };
      return (
        <div className="flex flex-col items-center justify-center gap-3">
          <div className={`${sizes[size]} border-2 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin`} />
          {message && <span className="text-slate-400 text-sm">{message}</span>}
        </div>
      );
    };

    // ============================================================================
    // CONNECTION STATUS
    // ============================================================================
    const ConnectionStatus = ({ isConnected }) => (
      <div className="flex items-center gap-2">
        <div className={`w-2 h-2 rounded-full ${isConnected ? 'bg-emerald-400' : 'bg-red-400'} animate-pulse`} />
        <span className="text-xs text-slate-500">{isConnected ? 'Connected' : 'Offline'}</span>
      </div>
    );

    // ============================================================================
    // ICONS
    // ============================================================================
    const Icons = {
      shield: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
      alert: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
      x: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>,
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
      document: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>,
      zap: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
      dollar: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      chevronRight: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>,
      filter: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>,
      chat: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg>,
      download: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    // ============================================================================
    // HOME BUTTON
    // ============================================================================
    const HomeButton = () => (
      <button
        onClick={() => window.location.href = CONFIG.DASHBOARD_URL}
        className="flex items-center gap-2 px-3 py-1.5 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg transition-colors group"
        title="Return to Dashboard"
      >
        <Icon name="home" className="w-4 h-4 text-slate-400 group-hover:text-cyan-400" />
        <span className="text-sm text-slate-400 group-hover:text-white">Dashboard</span>
      </button>
    );

    // ============================================================================
    // UI COMPONENTS
    // ============================================================================
    const Card = ({ children, className = '', glow = false, onClick }) => (
      <div 
        onClick={onClick}
        className={`
          bg-slate-800/50 backdrop-blur-sm border border-slate-700/50 rounded-xl 
          transition-all duration-300
          ${onClick ? 'cursor-pointer hover:border-cyan-500/50' : ''}
          ${glow ? 'shadow-lg shadow-cyan-500/20 border-cyan-500/30 animate-glow' : ''}
          ${className}
        `}
      >
        {children}
      </div>
    );

    const Button = ({ children, variant = 'primary', size = 'md', icon, className = '', disabled = false, ...props }) => {
      const variants = {
        primary: 'bg-gradient-to-r from-cyan-500 to-teal-500 text-white hover:from-cyan-400 hover:to-teal-400 shadow-lg shadow-cyan-500/25',
        secondary: 'bg-slate-700 text-white hover:bg-slate-600 border border-slate-600',
        danger: 'bg-red-500 text-white hover:bg-red-400 shadow-lg shadow-red-500/25',
        ghost: 'bg-transparent text-slate-400 hover:text-white hover:bg-slate-700/50',
      };
      const sizes = { xs: 'px-2 py-1 text-xs', sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2 text-sm', lg: 'px-6 py-3 text-base' };

      return (
        <button
          className={`
            ${variants[variant]} ${sizes[size]}
            rounded-lg font-semibold transition-all duration-200
            disabled:opacity-50 disabled:cursor-not-allowed
            flex items-center justify-center gap-2
            ${className}
          `}
          disabled={disabled}
          {...props}
        >
          {icon && <Icon name={icon} className="w-4 h-4" />}
          {children}
        </button>
      );
    };

    const Badge = ({ children, variant = 'default', size = 'sm' }) => {
      const variants = {
        default: 'bg-slate-700 text-slate-300',
        danger: 'bg-red-500/20 text-red-400 border border-red-500/30',
        warning: 'bg-amber-500/20 text-amber-400 border border-amber-500/30',
        success: 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30',
        info: 'bg-blue-500/20 text-blue-400 border border-blue-500/30',
        cyan: 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30',
      };
      const sizes = { xs: 'px-1.5 py-0.5 text-xs', sm: 'px-2 py-1 text-xs', md: 'px-3 py-1 text-sm' };

      return (
        <span className={`${variants[variant]} ${sizes[size]} rounded-full font-medium`}>
          {children}
        </span>
      );
    };

    // ============================================================================
    // FAR/DFARS CLAUSE DATA
    // ============================================================================
    const SECTION_I_CLAUSES = [
      {
        clause: '52.227-14',
        title: 'Rights in Data—General',
        category: 'IP Rights',
        risk: 'HIGH',
        impact: 'IP Transfer',
        cashFlowImpact: -15,
        summary: 'Government receives unlimited rights to all data developed under contract.',
        plainLanguage: 'The government can use, modify, and distribute any work product you create—without paying you extra or asking permission.',
        recommendation: 'Negotiate for Limited Rights or SBIR data rights. Request Alternate II for copyrighted works.',
        isTrap: true,
      },
      {
        clause: 'H.4.2',
        title: 'Payment Terms - Net 60',
        category: 'Cash Flow',
        risk: 'HIGH',
        impact: 'Cash Flow',
        cashFlowImpact: -25,
        summary: 'Payment due 60 days after invoice acceptance. Extended from standard Net-30.',
        plainLanguage: "You won't get paid until 2 months after invoicing. Plan your cash accordingly.",
        recommendation: 'Counter with Net-30 per FAR 32.906. Propose milestone-based payments.',
        isTrap: true,
      },
      {
        clause: '252.204-7012',
        title: 'Safeguarding CDI and Cyber Incident Reporting',
        category: 'Cybersecurity',
        risk: 'HIGH',
        impact: 'Compliance',
        cashFlowImpact: -12,
        summary: 'Requires NIST 800-171 compliance and 72-hour incident reporting.',
        plainLanguage: 'You must have cybersecurity controls in place and report any breaches to DoD within 3 days.',
        recommendation: 'Verify current SPRS score. Budget for ongoing CMMC compliance costs.',
      },
      {
        clause: '52.216-7',
        title: 'Allowable Cost and Payment',
        category: 'Pricing',
        risk: 'MEDIUM',
        impact: 'Cost Recovery',
        cashFlowImpact: -8,
        summary: 'Cost reimbursement contract payment provisions.',
        plainLanguage: 'The government will only reimburse costs that meet specific allowability criteria.',
        recommendation: 'Review FAR 31.205 for unallowable costs. Ensure accounting system compliance.',
      },
      {
        clause: '52.222-50',
        title: 'Combating Trafficking in Persons',
        category: 'Labor',
        risk: 'LOW',
        impact: 'Compliance',
        cashFlowImpact: 0,
        summary: 'Prohibition on trafficking activities by contractor or employees.',
        plainLanguage: 'Standard ethics clause prohibiting human trafficking. Requires compliance plan.',
        recommendation: 'Include standard ethics policy. Flow down to subcontractors.',
      },
      {
        clause: '52.219-8',
        title: 'Utilization of Small Business Concerns',
        category: 'Socioeconomic',
        risk: 'MEDIUM',
        impact: 'Subcontracting',
        cashFlowImpact: -5,
        summary: 'Requirements for small business subcontracting.',
        plainLanguage: 'You must make good faith efforts to subcontract with small businesses.',
        recommendation: 'Develop robust small business subcontracting plan. Track and report.',
      },
      {
        clause: '52.215-2',
        title: 'Audit and Records—Negotiation',
        category: 'Audit',
        risk: 'INFO',
        impact: 'Records',
        cashFlowImpact: 0,
        summary: 'Government audit rights for cost or pricing data.',
        plainLanguage: 'The government can audit your records. Standard provision.',
        recommendation: 'Maintain proper documentation. Ensure DCAA-compliant accounting.',
      },
    ];

    // ============================================================================
    // CLAUSE CARD COMPONENT
    // ============================================================================
    const ClauseCard = ({ clause, onClick, isExpanded }) => {
      const riskColors = {
        HIGH: 'border-l-red-500 bg-red-500/5',
        MEDIUM: 'border-l-amber-500 bg-amber-500/5',
        LOW: 'border-l-emerald-500 bg-emerald-500/5',
        INFO: 'border-l-blue-500 bg-blue-500/5',
      };

      return (
        <Card 
          className={`p-4 border-l-4 ${riskColors[clause.risk]} cursor-pointer hover:bg-slate-800/70 animate-fadeIn`}
          onClick={onClick}
        >
          <div className="flex items-start justify-between">
            <div className="flex-1">
              <div className="flex items-center gap-2 mb-2">
                <span className="font-mono text-sm text-cyan-400">{clause.clause}</span>
                {clause.isTrap && (
                  <Badge variant="danger" size="xs">⚠️ TRAP</Badge>
                )}
              </div>
              <h3 className="text-white font-semibold mb-1">{clause.title}</h3>
              <p className="text-slate-400 text-sm">{clause.summary}</p>
            </div>
            <div className="text-right ml-4">
              <Badge variant={clause.risk === 'HIGH' ? 'danger' : clause.risk === 'MEDIUM' ? 'warning' : clause.risk === 'LOW' ? 'success' : 'info'}>
                {clause.risk}
              </Badge>
              <div className="mt-2 text-xs text-slate-500">{clause.category}</div>
            </div>
          </div>

          {isExpanded && (
            <div className="mt-4 pt-4 border-t border-slate-700/50 space-y-3 animate-fadeIn">
              <div>
                <h4 className="text-xs font-semibold text-slate-500 uppercase mb-1">Plain Language</h4>
                <p className="text-slate-300 text-sm">{clause.plainLanguage}</p>
              </div>
              <div>
                <h4 className="text-xs font-semibold text-slate-500 uppercase mb-1">Recommendation</h4>
                <p className="text-emerald-400 text-sm">{clause.recommendation}</p>
              </div>
              {clause.cashFlowImpact !== 0 && (
                <div className="flex items-center gap-2">
                  <Icon name="dollar" className="w-4 h-4 text-amber-400" />
                  <span className="text-amber-400 text-sm">
                    {clause.cashFlowImpact}% cash flow impact
                  </span>
                </div>
              )}
            </div>
          )}
        </Card>
      );
    };

    // ============================================================================
    // GLOBAL FOOTER
    // ============================================================================
    const GlobalFooter = () => (
      <footer className="fixed bottom-0 left-0 right-0 bg-slate-900/95 border-t border-slate-700/50 px-6 py-2 backdrop-blur-sm z-40">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-4">
            <span className="text-xs text-slate-500">
              MissionPulse {CONFIG.MODULE_ID} • {CONFIG.MODULE_NAME} v{CONFIG.VERSION}
            </span>
            <ConnectionStatus isConnected={true} />
          </div>
          <span className="text-xs text-amber-400 font-medium px-2 py-1 bg-amber-500/10 rounded border border-amber-500/20">
            ⚠️ AI GENERATED - REQUIRES HUMAN REVIEW
          </span>
        </div>
      </footer>
    );

    // ============================================================================
    // MAIN COMPONENT
    // ============================================================================
    const ContractsScanner = () => {
      const [isLoading, setIsLoading] = useState(true);
      const [status, setStatus] = useState('idle');
      const [selectedClause, setSelectedClause] = useState(null);
      const [riskFilter, setRiskFilter] = useState('all');
      const [visibleClauses, setVisibleClauses] = useState([]);
      const { addToast } = useToast();

      useEffect(() => {
        const timer = setTimeout(() => {
          setIsLoading(false);
        }, 600);
        return () => clearTimeout(timer);
      }, []);

      const startScan = () => {
        setStatus('scanning');
        addToast('Analyzing contract clauses...', 'info');
        
        let index = 0;
        const interval = setInterval(() => {
          if (index < SECTION_I_CLAUSES.length) {
            setVisibleClauses(prev => [...prev, SECTION_I_CLAUSES[index]]);
            index++;
          } else {
            clearInterval(interval);
            setStatus('complete');
            addToast('Contract analysis complete!', 'success');
          }
        }, 300);
      };

      const filteredClauses = riskFilter === 'all' 
        ? visibleClauses 
        : visibleClauses.filter(c => c.risk === riskFilter);

      const riskCounts = {
        HIGH: visibleClauses.filter(c => c.risk === 'HIGH').length,
        MEDIUM: visibleClauses.filter(c => c.risk === 'MEDIUM').length,
        LOW: visibleClauses.filter(c => c.risk === 'LOW').length,
        INFO: visibleClauses.filter(c => c.risk === 'INFO').length,
      };

      const trapCount = visibleClauses.filter(c => c.isTrap).length;

      if (isLoading) {
        return (
          <div className="min-h-screen bg-[#00050F] flex items-center justify-center">
            <LoadingSpinner size="lg" message="Loading Contracts Scanner..." />
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#00050F] pb-16">
          {/* Header */}
          <header className="bg-slate-900/80 border-b border-slate-700/50 px-6 py-4">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-4">
                <HomeButton />
                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-pink-500 to-rose-500 flex items-center justify-center">
                  <Icon name="document" className="w-6 h-6 text-white" />
                </div>
                <div>
                  <h1 className="text-xl font-bold text-white">FAR/DFARS Contract Scanner</h1>
                  <p className="text-sm text-slate-400">AI-powered clause analysis & risk detection</p>
                </div>
              </div>

              <div className="flex items-center gap-3">
                {status === 'complete' && trapCount > 0 && (
                  <div className="flex items-center gap-2 px-3 py-1.5 bg-red-500/20 border border-red-500/30 rounded-lg animate-riskPulse">
                    <Icon name="alert" className="w-4 h-4 text-red-400" />
                    <span className="text-red-400 text-sm font-semibold">{trapCount} Traps Detected</span>
                  </div>
                )}
                {status === 'idle' && (
                  <Button variant="primary" icon="zap" onClick={startScan}>
                    Analyze Contract Risks
                  </Button>
                )}
              </div>
            </div>
          </header>

          <div className="max-w-7xl mx-auto px-6 py-6">
            {/* Scanning State */}
            {status === 'scanning' && (
              <Card className="p-8 text-center mb-6 scan-container">
                <div className="scan-line" />
                <LoadingSpinner size="lg" message="Scanning Section I clauses..." />
                <p className="text-slate-400 mt-4">
                  Analyzed {visibleClauses.length} of {SECTION_I_CLAUSES.length} clauses
                </p>
              </Card>
            )}

            {/* Results */}
            {(status === 'complete' || visibleClauses.length > 0) && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                {/* Clauses List */}
                <div className="lg:col-span-2 space-y-4">
                  {/* Filter Bar */}
                  <div className="flex items-center gap-2 mb-4">
                    <Icon name="filter" className="w-4 h-4 text-slate-500" />
                    <span className="text-sm text-slate-500">Filter:</span>
                    {['all', 'HIGH', 'MEDIUM', 'LOW', 'INFO'].map(f => (
                      <button
                        key={f}
                        onClick={() => setRiskFilter(f)}
                        className={`px-3 py-1 rounded-lg text-xs font-semibold transition-all ${
                          riskFilter === f
                            ? 'bg-cyan-500 text-white'
                            : 'bg-slate-800 text-slate-400 hover:bg-slate-700'
                        }`}
                      >
                        {f === 'all' ? 'All' : f}
                      </button>
                    ))}
                  </div>

                  {/* Clause Cards */}
                  {filteredClauses.map(clause => (
                    <ClauseCard
                      key={clause.clause}
                      clause={clause}
                      isExpanded={selectedClause === clause.clause}
                      onClick={() => setSelectedClause(
                        selectedClause === clause.clause ? null : clause.clause
                      )}
                    />
                  ))}
                </div>

                {/* Sidebar */}
                <div className="space-y-4">
                  {/* Risk Summary */}
                  <Card className="p-4">
                    <h3 className="font-semibold text-white mb-4 flex items-center gap-2">
                      <Icon name="shield" className="w-5 h-5 text-cyan-400" />
                      Risk Summary
                    </h3>
                    <div className="grid grid-cols-2 gap-3">
                      <div className="p-3 rounded-xl bg-red-500/10 border border-red-500/20 text-center">
                        <div className="text-2xl font-bold text-red-400">{riskCounts.HIGH}</div>
                        <div className="text-xs text-slate-400">High Risk</div>
                      </div>
                      <div className="p-3 rounded-xl bg-amber-500/10 border border-amber-500/20 text-center">
                        <div className="text-2xl font-bold text-amber-400">{riskCounts.MEDIUM}</div>
                        <div className="text-xs text-slate-400">Medium</div>
                      </div>
                      <div className="p-3 rounded-xl bg-emerald-500/10 border border-emerald-500/20 text-center">
                        <div className="text-2xl font-bold text-emerald-400">{riskCounts.LOW}</div>
                        <div className="text-xs text-slate-400">Low Risk</div>
                      </div>
                      <div className="p-3 rounded-xl bg-blue-500/10 border border-blue-500/20 text-center">
                        <div className="text-2xl font-bold text-blue-400">{riskCounts.INFO}</div>
                        <div className="text-xs text-slate-400">Info Only</div>
                      </div>
                    </div>
                  </Card>

                  {/* Quick Actions */}
                  <Card className="p-4">
                    <h3 className="font-semibold text-white mb-4 flex items-center gap-2">
                      <Icon name="zap" className="w-5 h-5 text-cyan-400" />
                      Quick Actions
                    </h3>
                    <div className="space-y-2">
                      <Button variant="secondary" size="sm" icon="download" className="w-full">
                        Export Risk Report
                      </Button>
                      <Button variant="secondary" size="sm" icon="chat" className="w-full">
                        Open AI Advisor
                      </Button>
                    </div>
                  </Card>
                </div>
              </div>
            )}

            {/* Empty State */}
            {status === 'idle' && (
              <Card className="p-12 text-center">
                <div className="w-20 h-20 mx-auto mb-6 rounded-2xl bg-pink-500/10 flex items-center justify-center">
                  <Icon name="document" className="w-10 h-10 text-pink-400" />
                </div>
                <h3 className="text-xl font-bold text-white mb-2">Ready to Analyze Contract Terms</h3>
                <p className="text-slate-400 max-w-md mx-auto mb-6">
                  Click "Analyze Contract Risks" to scan {SECTION_I_CLAUSES.length} Section I clauses. 
                  The AI will flag unusual terms, explain them in plain language, and recommend negotiation strategies.
                </p>
                <div className="flex flex-wrap justify-center gap-2">
                  <Badge variant="danger" size="sm">FAR/DFARS Analysis</Badge>
                  <Badge variant="warning" size="sm">Trap Detection</Badge>
                  <Badge variant="success" size="sm">Cash Flow Impact</Badge>
                  <Badge variant="cyan" size="sm">AI Recommendations</Badge>
                </div>
              </Card>
            )}
          </div>

          <GlobalFooter />
        </div>
      );
    };

    // ============================================================================
    // APP WITH PROVIDERS
    // ============================================================================
    const App = () => (
      <ErrorBoundary>
        <ToastProvider>
          <ContractsScanner />
        </ToastProvider>
      </ErrorBoundary>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
