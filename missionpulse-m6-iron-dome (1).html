    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Animations */
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    .animate-shimmer { 
      background: linear-gradient(90deg, transparent, rgba(0,229,250,0.1), transparent);
      background-size: 200% 100%;
      animation: shimmer 2s infinite;
    }
    .animate-spin { animation: spin 1s linear infinite; }
    
    /* Scrollbar */
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: #1e293b; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #64748b; }
    
    /* Skeleton Loaders */

        rgba(71, 85, 105, 0.3) 75%

    /**
     * Hook for loading volume content with API integration
     */
    const useVolumeContent = (volumeId) => {
      const [content, setContent] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      const loadContent = useCallback(async () => {
        setLoading(true);
        setError(null);

        try {
          // Try API first
          const result = await MP.get(`/api/volumes/${volumeId}`, {
            retries: 1,
            showErrorToast: false
          });

          if (result.ok) {
            setContent(result.data);
          } else {
            // Fall back to demo data
            console.log('Using demo data for volume:', volumeId);
            // Simulate network delay for realistic UX
            await MP.utils.sleep(500);
            setContent(DEMO_VOLUME_CONTENT[volumeId]);
          }
        } catch (err) {
          console.error('Failed to load volume:', err);
          // Fall back to demo data
          setContent(DEMO_VOLUME_CONTENT[volumeId]);
        } finally {
          setLoading(false);
        }
      }, [volumeId]);

      useEffect(() => {
        loadContent();
      }, [loadContent]);

      return { content, loading, error, reload: loadContent };
    };

    /**
     * Hook for connection state
     */
    const useConnection = () => {
      const [state, setState] = useState(MP.Connection.getState());

      useEffect(() => {
        return MP.Connection.subscribe(setState);
      }, []);

      return state;

    // ═══════════════════════════════════════════════════════════════════════════
    const StatsBar = ({ aiPercent, humanReviewed, citations, wordCount }) => (
      <div className="flex items-center gap-4 text-xs">
        <div className="flex items-center gap-2">
          <div className="w-24 h-2 rounded-full bg-slate-700 overflow-hidden">
            <div 
              className="h-full bg-gradient-to-r from-cyan-500 to-teal-400 rounded-full transition-all duration-500" 
              style={{ width: `${aiPercent}%` }}
            />
          </div>
          <span className="text-cyan-400">{aiPercent}% AI</span>
        </div>
        <div className="flex items-center gap-1.5">
          <div className={`w-2 h-2 rounded-full ${humanReviewed ? 'bg-emerald-400' : 'bg-amber-400'}`} />
          <span className={humanReviewed ? 'text-emerald-400' : 'text-amber-400'}>
            {humanReviewed ? 'Human Reviewed' : 'Pending Review'}
          </span>
        </div>
        <div className="flex items-center gap-1.5">
          <Icon name="link" className="w-3 h-3 text-purple-400" />
          <span className="text-purple-400">{citations} citations</span>
        </div>
        <span className="text-slate-500">{wordCount.toLocaleString()} words</span>
      </div>
    );

    // ═══════════════════════════════════════════════════════════════════════════
    // VOLUME TAB COMPONENT
    // ═══════════════════════════════════════════════════════════════════════════
    const VolumeTab = ({ id, title, icon, isActive, onClick }) => (
      <button
        onClick={() => onClick(id)}
        className={`flex items-center gap-2 px-4 py-3 text-sm font-medium transition-all border-b-2 ${
          isActive 
            ? 'border-cyan-400 text-cyan-400 bg-cyan-400/5' 
            : 'border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-800/30'
        }`}
      >
        <Icon name={icon} className="w-4 h-4" />
        {title}
      </button>
    );

    // ═══════════════════════════════════════════════════════════════════════════
    // TOC SIDEBAR COMPONENT
    // ═══════════════════════════════════════════════════════════════════════════
    const TOCSidebar = ({ sections, activeSection, onSelectSection, isCollapsed, onToggle, loading }) => {
      if (isCollapsed) {
        return (
          <div className="w-12 border-r border-slate-700/50 bg-slate-900/50 flex flex-col items-center py-4">
            <button onClick={onToggle} className="p-2 rounded-lg hover:bg-slate-800 text-slate-400">
              <Icon name="menu" className="w-5 h-5" />
            </button>
          </div>
        );
      }

      return (
        <div className="w-72 border-r border-slate-700/50 bg-slate-900/50 flex flex-col">
          <div className="p-3 border-b border-slate-700/50 flex items-center justify-between">
            <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Table of Contents</span>
            <button onClick={onToggle} className="p-1 rounded hover:bg-slate-800 text-slate-400">
              <Icon name="x" className="w-4 h-4" />
            </button>
          </div>
          
          <div className="flex-1 overflow-y-auto scrollbar-thin p-2">
            {loading ? (
              <TOCSkeleton />
            ) : (
              sections?.map((section) => (
                <button
                  key={section.id}
                  onClick={() => onSelectSection(section.id)}
                  className={`w-full text-left p-3 rounded-lg mb-1 transition-all ${
                    activeSection === section.id 
                      ? 'bg-cyan-500/10 border border-cyan-500/30 text-cyan-400' 
                      : 'hover:bg-slate-800/50 text-slate-300'
                  }`}
                >
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-sm font-medium">{section.title}</span>
                    <Icon name="chevronRight" className={`w-4 h-4 transition-transform ${activeSection === section.id ? 'rotate-90' : ''}`} />
                  </div>
                  <div className="flex items-center gap-2 text-xs text-slate-500">
                    <span>{section.wordCount?.toLocaleString()} words</span>
                    <span>•</span>
                    <span className="text-purple-400">{section.citations} citations</span>
                  </div>
                </button>
              ))
            )}
          </div>
        </div>
      );
    };

    // ═══════════════════════════════════════════════════════════════════════════
    // CUI DROPDOWN COMPONENT
    // ═══════════════════════════════════════════════════════════════════════════
    const CUIDropdown = ({ value, onChange }) => {
      const [isOpen, setIsOpen] = useState(false);
      const selected = CUI_MARKINGS.find(m => m.value === value);

      return (
        <div className="relative">
          <button
            onClick={() => setIsOpen(!isOpen)}
            className="flex items-center gap-2 px-3 py-2 rounded-lg border transition-all"
            style={{ 
              borderColor: selected.color + '60',
              backgroundColor: selected.color + '10'
            }}
          >
            <Icon name="shield" className="w-4 h-4" style={{ color: selected.color }} />
            <span className="text-sm font-medium" style={{ color: selected.color }}>{selected.label}</span>
            <Icon name="chevronDown" className="w-4 h-4 text-slate-400" />
          </button>

          {isOpen && (
            <div className="absolute top-full right-0 mt-2 w-64 bg-slate-800 border border-slate-700 rounded-lg shadow-xl z-50 py-1">
              {CUI_MARKINGS.map((marking) => (
                <button
                  key={marking.value}
                  onClick={() => { onChange(marking.value); setIsOpen(false); }}
                  className={`w-full text-left px-4 py-2 hover:bg-slate-700 transition-colors flex items-center justify-between ${
                    value === marking.value ? 'bg-slate-700/50' : ''
                  }`}
                >
                  <div>
                    <div className="text-sm font-medium" style={{ color: marking.color }}>{marking.label}</div>
                    <div className="text-xs text-slate-400">{marking.desc}</div>
                  </div>
                  {value === marking.value && <Icon name="check" className="w-4 h-4 text-cyan-400" />}
                </button>
              ))}
            </div>
          )}
        </div>
      );
    };

    // ═══════════════════════════════════════════════════════════════════════════
    // EXPORT BUTTONS COMPONENT
    // ═══════════════════════════════════════════════════════════════════════════
    const ExportButtons = ({ onExport, disabled }) => (
      <div className="flex items-center gap-2">
        <button
          onClick={() => onExport('docx')}
          disabled={disabled}
          className="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition-all text-white text-sm font-medium"
        >
          <Icon name="download" className="w-4 h-4" />
          DOCX
        </button>
        <button
          onClick={() => onExport('pdf')}
          disabled={disabled}
          className="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-red-600 hover:bg-red-500 disabled:opacity-50 disabled:cursor-not-allowed transition-all text-white text-sm font-medium"
        >
          <Icon name="download" className="w-4 h-4" />
          PDF
        </button>
      </div>
    );

    // ═══════════════════════════════════════════════════════════════════════════
    // CONTENT EDITOR COMPONENT
    // ═══════════════════════════════════════════════════════════════════════════
    const ContentEditor = ({ section, cuiMarking, loading, onSave }) => {
      const marking = CUI_MARKINGS.find(m => m.value === cuiMarking);
      const [isSaving, setIsSaving] = useState(false);
      
      // Highlight citations in the content
      const renderContent = (text) => {
        if (!text) return null;
        const parts = text.split(/(\[Citation:[^\]]+\])/g);
        return parts.map((part, idx) => {
          if (part.startsWith('[Citation:')) {
            return (
              <span key={idx} className="inline-flex items-center gap-1 px-2 py-0.5 rounded bg-purple-500/20 text-purple-300 text-sm mx-1">
                <Icon name="link" className="w-3 h-3" />
                {part.replace('[Citation:', '').replace(']', '')}
              </span>
            );
          }
          return <span key={idx}>{part}</span>;
        });
      };

      const handleSave = async () => {
        setIsSaving(true);
        try {
          // Attempt API save
          const result = await MP.post(`/api/volumes/sections/${section.id}`, {
            content: section.content,
            cuiMarking
          }, { retries: 1, showErrorToast: false });

          if (result.ok) {
            MP.success('Section saved successfully');
          } else {
            // Simulated save for demo
            await MP.utils.sleep(800);
            MP.success('Section saved (demo mode)');
          }
          
          if (onSave) onSave(section);
        } catch (err) {
          MP.error('Failed to save section');
        } finally {
          setIsSaving(false);
        }
      };

      if (loading) {
        return (
          <div className="flex-1 flex flex-col">
            <div className="py-2 px-4 text-center font-bold text-sm bg-slate-700 text-slate-400">
              Loading...
            </div>
            <ContentSkeleton />
          </div>
        );
      }

      if (!section) {
        return (
          <div className="flex-1 flex items-center justify-center">
            <div className="text-center">
              <Icon name="fileText" className="w-12 h-12 text-slate-600 mx-auto mb-4" />
              <p className="text-slate-400">Select a section to view content</p>
            </div>
          </div>
        );
      }

      return (
        <div className="flex-1 flex flex-col">
          {/* CUI Banner */}
          <div 
            className="py-2 px-4 text-center font-bold text-sm"
            style={{ backgroundColor: marking.color, color: marking.color === '#22C55E' ? '#000' : '#fff' }}
          >
            {cuiMarking} - CONTROLLED UNCLASSIFIED INFORMATION
          </div>
          
          {/* Content Area */}
          <div className="flex-1 p-6 overflow-y-auto scrollbar-thin">
            <div className="max-w-4xl mx-auto">
              {/* Section Header */}
              <div className="mb-6">
                <div className="flex items-center justify-between mb-2">
                  <h2 className="text-2xl font-bold text-white">{section.title}</h2>
                  <button
                    onClick={handleSave}
                    disabled={isSaving}
                    className="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 transition-all text-white text-sm font-medium"
                  >
                    {isSaving ? <Spinner size="sm" /> : <Icon name="save" className="w-4 h-4" />}
                    {isSaving ? 'Saving...' : 'Save'}
                  </button>
                </div>
                <div className="flex items-center gap-4">
                  <StatsBar 
                    aiPercent={section.aiPercent} 
                    humanReviewed={true}
                    citations={section.citations}
                    wordCount={section.wordCount}
                  />
                </div>
              </div>
              
              {/* Subsections */}
              {section.subsections && (
                <div className="mb-6 p-4 rounded-lg bg-slate-800/30 border border-slate-700/50">
                  <h4 className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">In This Section</h4>
                  <div className="flex flex-wrap gap-2">
                    {section.subsections.map((sub, idx) => (
                      <span key={idx} className="px-2 py-1 rounded bg-slate-700/50 text-sm text-slate-300">
                        {sub}
                      </span>
                    ))}
                  </div>
                </div>
              )}
              
              {/* Main Content */}
              <div className="prose prose-invert max-w-none">
                <div className="text-slate-200 leading-relaxed whitespace-pre-line font-serif">
                  {renderContent(section.content)}
                </div>
              </div>
              
              {/* AI Attribution Footer */}
              <div className="mt-8 p-4 rounded-lg bg-slate-800/30 border border-slate-700/50">
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-teal-500 flex items-center justify-center">
                      <Icon name="cpu" className="w-5 h-5 text-white" />
                    </div>
                    <div>
                      <div className="text-sm font-medium text-white">AI-Assisted Content</div>
                      <div className="text-xs text-slate-400">{section.aiPercent}% generated • {100 - section.aiPercent}% human-written</div>
                    </div>
                  </div>
                  <div className="flex items-center gap-2">
                    <button className="p-2 rounded-lg bg-slate-700 hover:bg-slate-600 transition-all">
                      <Icon name="edit" className="w-4 h-4 text-slate-300" />
                    </button>
                    <button className="p-2 rounded-lg bg-slate-700 hover:bg-slate-600 transition-all">
                      <Icon name="eye" className="w-4 h-4 text-slate-300" />
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          
          {/* Footer */}
          <div className="p-3 border-t border-slate-700/50 bg-slate-900/80">
            <div className="flex items-center justify-between">
              <span className="text-xs text-slate-500">
                AI GENERATED - REQUIRES HUMAN REVIEW • Last saved: 2 minutes ago
              </span>
              <div className="flex items-center gap-2 text-xs text-slate-400">
                <span>Times New Roman 12pt</span>
                <span className="text-slate-600">•</span>
                <span>1" margins</span>
                <span className="text-slate-600">•</span>
                <span>Section L Compliant</span>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ═══════════════════════════════════════════════════════════════════════════
    // MAIN COMPONENT
    // ═══════════════════════════════════════════════════════════════════════════
    const IronDomeWriter = () => {
      const [activeVolume, setActiveVolume] = useState('technical');
      const [activeSection, setActiveSection] = useState('tech-1');
      const [cuiMarking, setCuiMarking] = useState('CUI//PROPIN');
      const [tocCollapsed, setTocCollapsed] = useState(false);
      const [showExportModal, setShowExportModal] = useState(false);
      const [isExporting, setIsExporting] = useState(false);

      // Use custom hooks
      const { content: volumeContent, loading: volumeLoading, reload } = useVolumeContent(activeVolume);
      const connection = useConnection();

      // Current section
      const currentSection = volumeContent?.sections?.find(s => s.id === activeSection) || volumeContent?.sections?.[0];

      // Calculate total stats for current volume
      const totalCitations = volumeContent?.sections?.reduce((acc, s) => acc + (s.citations || 0), 0) || 0;
      const avgAiPercent = volumeContent?.sections?.length 
        ? Math.round(volumeContent.sections.reduce((acc, s) => acc + (s.aiPercent || 0), 0) / volumeContent.sections.length)
        : 0;

      const handleExport = async (format) => {
        setIsExporting(true);
        setShowExportModal(true);

        try {
          // Try API export
          const result = await MP.post('/api/export', {
            volumeId: activeVolume,
            format,
            cuiMarking
          }, { retries: 1, showErrorToast: false });

          if (result.ok) {
            MP.success(`${format.toUpperCase()} export ready for download`);
          } else {
            // Simulated export
            await MP.utils.sleep(1500);
            MP.success(`${format.toUpperCase()} export complete (demo mode)`);
          }
        } catch (err) {
          MP.error('Export failed. Please try again.');
        } finally {
          setIsExporting(false);
          setTimeout(() => setShowExportModal(false), 1500);
        }
      };

      const handleVolumeChange = (volumeId) => {
        setActiveVolume(volumeId);
        // Reset to first section when changing volumes
        setActiveSection(DEMO_VOLUME_CONTENT[volumeId]?.sections?.[0]?.id || '');
      };

      return (
        <div className="min-h-screen bg-[#00050F] flex flex-col">
          {/* Header */}
          <header className="bg-slate-900/80 border-b border-slate-700/50 px-4 py-3">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-red-500 to-rose-600 flex items-center justify-center shadow-lg shadow-red-500/30">
                  <Icon name="shieldCheck" className="w-6 h-6 text-white" />
                </div>
                <div>
                  <h1 className="font-bold text-white flex items-center gap-2">
                    Iron Dome Writer
                    <span className="px-2 py-0.5 rounded bg-red-500/20 text-red-400 text-xs font-medium">M6</span>
                    {!connection.isFullyConnected && (
                      <span className="px-2 py-0.5 rounded bg-amber-500/20 text-amber-400 text-xs font-medium flex items-center gap-1">
                        <span className="w-1.5 h-1.5 rounded-full bg-amber-400" />
                        Demo Mode
                      </span>
                    )}
                  </h1>
                  <p className="text-xs text-slate-400">CUI-Protected Proposal Drafting</p>
                </div>
              </div>
              <div className="flex items-center gap-4">
                {/* User Role Badge */}
                <div className="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-slate-800/50 border border-slate-700/50">
                  <Icon name="user" className="w-4 h-4 text-slate-400" />
                  <span className="text-sm text-slate-300">{CURRENT_USER.name}</span>
                  <span 
                    className="px-2 py-0.5 rounded text-xs font-semibold"
                    style={{ 
                      backgroundColor: MP.RBAC.ROLES[CURRENT_USER.role]?.color + '20',
                      color: MP.RBAC.ROLES[CURRENT_USER.role]?.color
                    }}
                  >
                    {CURRENT_USER.role}
                  </span>
                </div>
                <CUIDropdown value={cuiMarking} onChange={setCuiMarking} />
                <ExportButtons onExport={handleExport} disabled={volumeLoading || isExporting} />
              </div>
            </div>
          </header>

          {/* Volume Tabs */}
          <div className="bg-slate-900/50 border-b border-slate-700/50 px-4">
            <div className="flex items-center gap-1">
              <VolumeTab 
                id="technical" 
                title="Technical" 
                icon="fileText" 
                isActive={activeVolume === 'technical'} 
                onClick={handleVolumeChange} 
              />
              <VolumeTab 
                id="management" 
                title="Management" 
                icon="briefcase" 
                isActive={activeVolume === 'management'} 
                onClick={handleVolumeChange} 
              />
              <VolumeTab 
                id="pastperf" 
                title="Past Performance" 
                icon="trophy" 
                isActive={activeVolume === 'pastperf'} 
                onClick={handleVolumeChange} 
              />
              <VolumeTab 
                id="staffing" 
                title="Staffing" 
                icon="users" 
                isActive={activeVolume === 'staffing'} 
                onClick={handleVolumeChange} 
              />
              {/* Reload Button */}
              <button
                onClick={reload}
                disabled={volumeLoading}
                className="ml-auto p-2 rounded-lg hover:bg-slate-800 text-slate-400 hover:text-cyan-400 transition-colors disabled:opacity-50"
                title="Reload content"
              >
                <Icon name="refresh" className={`w-4 h-4 ${volumeLoading ? 'animate-spin' : ''}`} />
              </button>
            </div>
          </div>

          {/* Volume Summary Bar */}
          <div className="bg-slate-800/30 border-b border-slate-700/50 px-4 py-2">
            <div className="flex items-center justify-between">
              <div>
                {volumeLoading ? (
                  <div className="space-y-1">
                    <div className="skeleton h-4 w-48 rounded" />
                    <div className="skeleton h-3 w-32 rounded" />
                  </div>
                ) : (
                  <>
                    <h2 className="text-sm font-semibold text-white">{volumeContent?.title}</h2>
                    <div className="flex items-center gap-3 mt-1">
                      <span className="text-xs text-slate-400">{volumeContent?.pageCount} pages</span>
                      <span className="text-xs text-slate-400">•</span>
                      <span className="text-xs text-slate-400">{volumeContent?.totalWordCount?.toLocaleString()} words</span>
                      <span className="text-xs text-slate-400">•</span>
                      <span className="text-xs text-purple-400">{totalCitations} citations</span>
                    </div>
                  </>
                )}
              </div>
              <div className="flex items-center gap-4">
                {/* Overall Stats */}
                <div className="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-slate-700/50">
                  <div className="flex items-center gap-1">
                    <div className="w-2 h-2 rounded-full bg-cyan-400" />
                    <span className="text-xs text-cyan-400 font-medium">{avgAiPercent}% AI</span>
                  </div>
                  <span className="text-slate-500">/</span>
                  <div className="flex items-center gap-1">
                    <div className="w-2 h-2 rounded-full bg-emerald-400" />
                    <span className="text-xs text-emerald-400 font-medium">100% Human Reviewed</span>
                  </div>
                </div>
                {/* Citation Badge */}
                <div className="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-purple-500/20 border border-purple-500/30">
                  <Icon name="link" className="w-4 h-4 text-purple-400" />
                  <span className="text-sm font-bold text-purple-400">{totalCitations}</span>
                  <span className="text-xs text-purple-300">Citations</span>
                </div>
              </div>
            </div>
          </div>

          {/* Main Content Area */}
          <div className="flex-1 flex overflow-hidden">
            {/* TOC Sidebar */}
            <TOCSidebar 
              sections={volumeContent?.sections}
              activeSection={activeSection}
              onSelectSection={setActiveSection}
              isCollapsed={tocCollapsed}
              onToggle={() => setTocCollapsed(!tocCollapsed)}
              loading={volumeLoading}
            />

            {/* Content Editor */}
            <ContentEditor 
              section={currentSection} 
              cuiMarking={cuiMarking}
              loading={volumeLoading}
            />
          </div>

          {/* Export Modal */}
          {showExportModal && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
              <div className="bg-slate-800 rounded-2xl p-6 shadow-2xl animate-fadeIn">
                <div className="flex items-center gap-3">
                  {isExporting ? (
                    <>
                      <Spinner size="lg" />
                      <div>
                        <h3 className="text-lg font-bold text-white">Preparing Export...</h3>
                        <p className="text-sm text-slate-400">This may take a moment</p>
                      </div>
                    </>
                  ) : (
                    <>
                      <div className="w-12 h-12 rounded-full bg-emerald-500/20 flex items-center justify-center">
                        <Icon name="check" className="w-6 h-6 text-emerald-400" />
                      </div>
                      <div>
                        <h3 className="text-lg font-bold text-white">Export Complete</h3>
                        <p className="text-sm text-slate-400">Your document is ready</p>
                      </div>
                    </>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <footer className="bg-slate-900/80 border-t border-slate-700/50 px-4 py-2">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-2">
                <span className="text-xs text-slate-500">MissionPulse v12.0 • Iron Dome Writer</span>
                {!connection.isFullyConnected && (
                  <span className="text-xs text-amber-400">• Offline Mode</span>
                )}
              </div>
              <span className="text-xs text-slate-600">AI GENERATED - REQUIRES HUMAN REVIEW</span>
            </div>
          </footer>
        </div>
      );
    };

    // ═══════════════════════════════════════════════════════════════════════════
    // APP WRAPPER WITH ERROR BOUNDARY
    // ═══════════════════════════════════════════════════════════════════════════
    const App = () => {
      // RBAC Check: Verify user can access this module
      if (!MP.RBAC.canAccessModule('M6-irondome')) {
        return <AccessDenied />;
      }

      return (
        <ErrorBoundary>
          <IronDomeWriter />
        </ErrorBoundary>
      );
    };

    // Render
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
