    );

    // ============================================================
    // MAIN APP
    // ============================================================
    function MissionPulseHome() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [stats, setStats] = useState([
        { label: 'Active Pursuits', value: '12', color: '#00E5FA' },
        { label: 'Pipeline Value', value: '$847M', color: '#10B981' },
        { label: 'Avg Win Rate', value: '68%', color: '#F59E0B' },
        { label: 'Due This Week', value: '3', color: '#EF4444' },
      ]);

      useEffect(() => {
        checkAuth();
        fetchStats();
      }, []);

      const checkAuth = async () => {
        try {
          const { data: { session } } = await sbClient.auth.getSession();
          if (session?.user) {
            const { data: profile } = await sbClient.from('profiles').select('*').eq('id', session.user.id).single();
            setUser({ ...session.user, ...profile, role: profile?.role || 'PM' });
          } else {
            // Demo mode - allow access without login
            setUser({ email: 'demo@missionpulse.io', role: 'CEO', full_name: 'Demo User' });
          }
        } catch (err) {
          console.log('Auth check:', err.message);
          setUser({ email: 'demo@missionpulse.io', role: 'CEO', full_name: 'Demo User' });
        } finally {
          setLoading(false);
        }
      };

      const fetchStats = async () => {
        try {
          const { data, error } = await sbClient.from('opportunities').select('*');
          if (data && data.length > 0) {
            const active = data.filter(o => o.status === 'Active' || !o.status).length;
            const totalValue = data.reduce((sum, o) => sum + (parseFloat(o.ceiling || o.contract_value || o.estimated_value) || 0), 0);
            const avgPwin = Math.round(data.reduce((sum, o) => sum + (o.pwin || o.win_probability || 50), 0) / data.length);
            const dueThisWeek = data.filter(o => {
              const due = new Date(o.due_date);
              const now = new Date();
              const weekFromNow = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);
              return due >= now && due <= weekFromNow;
            }).length;

            setStats([
              { label: 'Active Pursuits', value: active.toString(), color: '#00E5FA' },
              { label: 'Pipeline Value', value: `$${(totalValue / 1000000).toFixed(0)}M`, color: '#10B981' },
              { label: 'Avg Win Probability', value: `${avgPwin}%`, color: '#F59E0B' },
              { label: 'Due This Week', value: dueThisWeek.toString(), color: '#EF4444' },
            ]);
          }
        } catch (err) {
          console.log('Stats fetch:', err.message);
        }
      };

      const handleLogout = async () => {
        await sbClient.auth.signOut();
        window.location.href = 'login.html';
      };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-500 to-teal-500 flex items-center justify-center mx-auto mb-4 animate-pulse">
                <Icon name="shield" className="w-6 h-6 text-white" />
              </div>
              <p className="text-slate-400">Loading MissionPulse...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-4 py-3">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-500 to-teal-500 flex items-center justify-center glow">
                    <Icon name="shield" className="w-6 h-6 text-white" />
                  </div>
                  <div>
                    <h1 className="font-bold text-white text-lg">MissionPulse</h1>
                    <p className="text-xs text-slate-500">Mission Meets Tech</p>
                  </div>
                </div>
                
                <div className="flex items-center gap-3">
                  <button className="p-2 rounded-lg hover:bg-slate-800 text-slate-400 hover:text-white transition-colors relative">
                    <Icon name="bell" className="w-5 h-5" />
                    <span className="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full" />
                  </button>
                  
                  <div className="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-slate-800/50">
                    <div className="w-7 h-7 rounded-full bg-gradient-to-br from-cyan-500 to-purple-500 flex items-center justify-center">
                      <Icon name="user" className="w-4 h-4 text-white" />
                    </div>
                    <div className="hidden sm:block">
                      <p className="text-sm font-medium text-white">{user?.full_name || 'User'}</p>
                      <p className="text-xs text-slate-500">{user?.role || 'Team Member'}</p>
                    </div>
                  </div>
                  
                  <button 
                    onClick={handleLogout}
                    className="p-2 rounded-lg hover:bg-slate-800 text-slate-400 hover:text-red-400 transition-colors"
                    title="Sign Out"
                  >
                    <Icon name="logout" className="w-5 h-5" />
                  </button>
                </div>
              </div>
            </div>
          </header>

          {/* Main Content */}
          <main className="max-w-7xl mx-auto px-4 py-8">
            {/* Welcome Banner */}
            <div className="glass rounded-2xl p-6 mb-8 relative overflow-hidden">
              <div className="absolute inset-0 bg-gradient-to-r from-cyan-500/10 to-purple-500/10" />
              <div className="relative">
                <h2 className="text-2xl font-bold text-white mb-2">
                  Welcome back, {user?.full_name?.split(' ')[0] || 'Commander'}
                </h2>
                <p className="text-slate-400">
                  Mission. Technology. Transformation. — Your federal proposal command center is ready.
                </p>
              </div>
            </div>

            {/* Quick Stats */}
            <QuickStats stats={stats} />

            {/* Module Sections */}
            {Object.entries(MODULES).map(([key, section]) => (
              <ModuleSection 
                key={key} 
                title={section.title} 
                modules={section.modules} 
                userRole={user?.role}
              />
            ))}

            {/* Footer */}
            <footer className="mt-12 pt-8 border-t border-slate-800">
              <div className="flex flex-col sm:flex-row items-center justify-between gap-4">
                <div className="flex items-center gap-2">
                  <div className="w-6 h-6 rounded bg-gradient-to-br from-cyan-500 to-teal-500 flex items-center justify-center">
                    <Icon name="shield" className="w-3 h-3 text-white" />
                  </div>
                  <span className="text-sm text-slate-500">© 2026 Mission Meets Tech. All rights reserved.</span>
                </div>
                <div className="flex items-center gap-4 text-xs text-slate-600">
                  <span className="flex items-center gap-1">
                    <span className="w-2 h-2 rounded-full bg-emerald-500" />
                    System Operational
                  </span>
                  <span>CMMC 2.0 Compliant</span>
                  <span>FedRAMP Ready</span>
                </div>
              </div>
            </footer>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<MissionPulseHome />);
  </script>
</body>
</html>
