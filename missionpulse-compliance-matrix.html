<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Compliance Matrix</title>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; color: #fff; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-slideUp { animation: slideUp 0.5s ease-out forwards; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #111C2E; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #243656; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #00E5FA; }
    .glass-card { background: rgba(17, 28, 46, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc4MzUyMjQsImV4cCI6MjA1MzQxMTIyNH0.pBPL9l2zL7LLd_A5I--hPBzw5YwG3ajPMtbYsqsxIgQ';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const Icons = {
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>,
      shield: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>,
      x: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>,
      minus: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20 12H4"/></svg>,
      alert: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>,
      search: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" strokeWidth={2}/><path strokeLinecap="round" strokeWidth={2} d="M21 21l-4.35-4.35"/></svg>,
      plus: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>,
      download: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>,
      document: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    const COMPLIANCE_STATUS = {
      compliant: { label: 'Compliant', color: '#00D29F', icon: 'check' },
      partial: { label: 'Partial', color: '#F59E0B', icon: 'minus' },
      non_compliant: { label: 'Non-Compliant', color: '#EF4444', icon: 'x' },
      not_applicable: { label: 'N/A', color: '#6B7280', icon: 'minus' },
      pending: { label: 'Pending Review', color: '#3B82F6', icon: 'alert' },
    };

    const SECTIONS = [
      { key: 'L', name: 'Section L - Instructions' },
      { key: 'M', name: 'Section M - Evaluation Criteria' },
      { key: 'C', name: 'Section C - SOW/PWS' },
      { key: 'J', name: 'Attachments' },
    ];

    const DEMO_REQUIREMENTS = [
      { id: 'req-1', section: 'L', reference: 'L.5.1', requirement: 'Technical Approach shall not exceed 50 pages', status: 'compliant', pageRef: '1-48', notes: 'Within limit', priority: 'high' },
      { id: 'req-2', section: 'L', reference: 'L.5.2', requirement: 'Include organizational chart showing key personnel', status: 'compliant', pageRef: '12', notes: 'Org chart included on page 12', priority: 'high' },
      { id: 'req-3', section: 'L', reference: 'L.5.3', requirement: 'Provide transition plan with 90-day timeline', status: 'partial', pageRef: '45-47', notes: 'Timeline shows 120 days - needs revision', priority: 'critical' },
      { id: 'req-4', section: 'L', reference: 'L.6.1', requirement: 'Past Performance volume limited to 3 references', status: 'compliant', pageRef: 'Vol II', notes: '3 references provided', priority: 'high' },
      { id: 'req-5', section: 'M', reference: 'M.2.1', requirement: 'Technical approach weighted at 40%', status: 'compliant', pageRef: '-', notes: 'Evaluation criteria acknowledged', priority: 'medium' },
      { id: 'req-6', section: 'M', reference: 'M.2.2', requirement: 'Demonstrated experience with MHS GENESIS', status: 'compliant', pageRef: '8-15', notes: 'Multiple project examples cited', priority: 'critical' },
      { id: 'req-7', section: 'M', reference: 'M.3.1', requirement: 'Price realism analysis required', status: 'pending', pageRef: 'Vol III', notes: 'Awaiting pricing finalization', priority: 'high' },
      { id: 'req-8', section: 'C', reference: 'C.3.1', requirement: 'HIPAA compliance certification', status: 'compliant', pageRef: 'Att. A', notes: 'Certificate attached', priority: 'critical' },
      { id: 'req-9', section: 'C', reference: 'C.3.2', requirement: 'FedRAMP Moderate authorization required', status: 'compliant', pageRef: 'Att. B', notes: 'ATO documentation included', priority: 'critical' },
      { id: 'req-10', section: 'C', reference: 'C.4.1', requirement: 'Staffing plan with LCAT mapping', status: 'partial', pageRef: '35-40', notes: 'Missing 2 LCAT descriptions', priority: 'high' },
      { id: 'req-11', section: 'J', reference: 'J.1', requirement: 'SF-330 for key personnel', status: 'non_compliant', pageRef: '-', notes: 'Not yet received from subcontractor', priority: 'critical' },
      { id: 'req-12', section: 'J', reference: 'J.2', requirement: 'Teaming Agreement copies', status: 'compliant', pageRef: 'Att. C', notes: 'All TAs executed and attached', priority: 'medium' },
    ];

    function ComplianceMatrixApp() {
      const [requirements, setRequirements] = useState(DEMO_REQUIREMENTS);
      const [loading, setLoading] = useState(false);
      const [searchTerm, setSearchTerm] = useState('');
      const [sectionFilter, setSectionFilter] = useState('all');
      const [statusFilter, setStatusFilter] = useState('all');
      const [selectedReq, setSelectedReq] = useState(null);

      const filteredReqs = requirements.filter(r => {
        if (searchTerm && !r.requirement.toLowerCase().includes(searchTerm.toLowerCase()) &&
            !r.reference.toLowerCase().includes(searchTerm.toLowerCase())) {
          return false;
        }
        if (sectionFilter !== 'all' && r.section !== sectionFilter) return false;
        if (statusFilter !== 'all' && r.status !== statusFilter) return false;
        return true;
      });

      const stats = {
        total: requirements.length,
        compliant: requirements.filter(r => r.status === 'compliant').length,
        partial: requirements.filter(r => r.status === 'partial').length,
        nonCompliant: requirements.filter(r => r.status === 'non_compliant').length,
        pending: requirements.filter(r => r.status === 'pending').length,
      };

      const complianceScore = Math.round((stats.compliant / stats.total) * 100);

      const updateStatus = (id, newStatus) => {
        setRequirements(prev => prev.map(r => 
          r.id === id ? { ...r, status: newStatus } : r
        ));
      };

      const exportMatrix = () => {
        const csv = [
          ['Reference', 'Section', 'Requirement', 'Status', 'Page Ref', 'Notes', 'Priority'],
          ...requirements.map(r => [
            r.reference, r.section, `"${r.requirement}"`, r.status, r.pageRef, `"${r.notes}"`, r.priority
          ])
        ].map(row => row.join(',')).join('\n');

        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `compliance-matrix-${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
      };

      return (
        <div className="min-h-screen bg-[#00050F]">
          <header className="glass-card border-b border-white/10 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="text-gray-400 hover:text-white transition-colors">
                    <Icon name="home" className="w-5 h-5" />
                  </a>
                  <div className="w-px h-6 bg-white/20" />
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center">
                      <Icon name="shield" className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white">Compliance Matrix</h1>
                      <p className="text-xs text-gray-400">Section L/M Requirements Tracking</p>
                    </div>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <button
                    onClick={exportMatrix}
                    className="px-4 py-2 bg-[#0A1628] border border-white/10 text-gray-300 rounded-lg hover:text-white transition-colors flex items-center gap-2"
                  >
                    <Icon name="download" className="w-4 h-4" />
                    Export CSV
                  </button>
                  <button className="px-4 py-2 bg-gradient-to-r from-green-500 to-emerald-600 text-white rounded-lg font-medium hover:opacity-90 transition-opacity flex items-center gap-2">
                    <Icon name="plus" className="w-4 h-4" />
                    Add Requirement
                  </button>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8">
            {/* Compliance Score */}
            <div className="glass-card rounded-xl p-6 mb-8">
              <div className="flex items-center justify-between">
                <div>
                  <h3 className="text-lg font-semibold text-white mb-1">Overall Compliance Score</h3>
                  <p className="text-sm text-gray-400">{stats.compliant} of {stats.total} requirements met</p>
                </div>
                <div className="flex items-center gap-6">
                  <div className="text-center">
                    <div className="text-3xl font-bold" style={{ color: complianceScore >= 90 ? '#00D29F' : complianceScore >= 70 ? '#F59E0B' : '#EF4444' }}>
                      {complianceScore}%
                    </div>
                    <div className="text-xs text-gray-400">Score</div>
                  </div>
                  <div className="w-48 h-4 bg-white/10 rounded-full overflow-hidden">
                    <div 
                      className="h-full rounded-full transition-all"
                      style={{ 
                        width: `${complianceScore}%`,
                        backgroundColor: complianceScore >= 90 ? '#00D29F' : complianceScore >= 70 ? '#F59E0B' : '#EF4444'
                      }}
                    />
                  </div>
                </div>
              </div>
            </div>

            {/* Stats */}
            <div className="grid grid-cols-5 gap-4 mb-8">
              {[
                { label: 'Total', value: stats.total, color: '#00E5FA' },
                { label: 'Compliant', value: stats.compliant, color: '#00D29F' },
                { label: 'Partial', value: stats.partial, color: '#F59E0B' },
                { label: 'Non-Compliant', value: stats.nonCompliant, color: '#EF4444' },
                { label: 'Pending', value: stats.pending, color: '#3B82F6' },
              ].map((stat, idx) => (
                <button
                  key={idx}
                  onClick={() => setStatusFilter(stat.label.toLowerCase().replace('-', '_'))}
                  className={`glass-card rounded-xl p-4 text-left transition-all ${
                    statusFilter === stat.label.toLowerCase().replace('-', '_') ? 'ring-2 ring-emerald-500' : ''
                  }`}
                >
                  <div className="text-2xl font-bold" style={{ color: stat.color }}>{stat.value}</div>
                  <div className="text-xs text-gray-400">{stat.label}</div>
                </button>
              ))}
            </div>

            {/* Filters */}
            <div className="glass-card rounded-xl p-4 mb-6">
              <div className="flex items-center gap-4 flex-wrap">
                <div className="flex-1 min-w-[300px] relative">
                  <Icon name="search" className="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                  <input
                    type="text"
                    placeholder="Search requirements..."
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                    className="w-full pl-10 pr-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500"
                  />
                </div>
                <select
                  value={sectionFilter}
                  onChange={(e) => setSectionFilter(e.target.value)}
                  className="px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none"
                >
                  <option value="all">All Sections</option>
                  {SECTIONS.map(s => (
                    <option key={s.key} value={s.key}>{s.name}</option>
                  ))}
                </select>
                <button
                  onClick={() => { setStatusFilter('all'); setSectionFilter('all'); setSearchTerm(''); }}
                  className="px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-gray-400 hover:text-white transition-colors"
                >
                  Clear Filters
                </button>
              </div>
            </div>

            {/* Requirements Table */}
            <div className="glass-card rounded-xl overflow-hidden">
              <table className="w-full">
                <thead>
                  <tr className="border-b border-white/10">
                    <th className="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase w-24">Reference</th>
                    <th className="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase">Requirement</th>
                    <th className="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase w-32">Status</th>
                    <th className="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase w-20">Page</th>
                    <th className="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase w-20">Priority</th>
                    <th className="text-left px-4 py-3 text-xs font-semibold text-gray-400 uppercase">Notes</th>
                  </tr>
                </thead>
                <tbody>
                  {filteredReqs.map((req, idx) => {
                    const status = COMPLIANCE_STATUS[req.status];
                    return (
                      <tr 
                        key={req.id} 
                        className="border-b border-white/5 hover:bg-white/5 cursor-pointer animate-slideUp"
                        style={{ animationDelay: `${idx * 30}ms` }}
                        onClick={() => setSelectedReq(req)}
                      >
                        <td className="px-4 py-3">
                          <span className="font-mono text-cyan-400">{req.reference}</span>
                        </td>
                        <td className="px-4 py-3 text-white">{req.requirement}</td>
                        <td className="px-4 py-3">
                          <span 
                            className="px-3 py-1 rounded-full text-xs font-medium flex items-center gap-1.5 w-fit"
                            style={{ background: `${status.color}20`, color: status.color }}
                          >
                            <Icon name={status.icon} className="w-3 h-3" />
                            {status.label}
                          </span>
                        </td>
                        <td className="px-4 py-3 text-gray-400 font-mono text-sm">{req.pageRef}</td>
                        <td className="px-4 py-3">
                          <span className={`px-2 py-0.5 rounded text-xs ${
                            req.priority === 'critical' ? 'bg-red-500/20 text-red-400' :
                            req.priority === 'high' ? 'bg-amber-500/20 text-amber-400' :
                            'bg-gray-500/20 text-gray-400'
                          }`}>
                            {req.priority}
                          </span>
                        </td>
                        <td className="px-4 py-3 text-gray-400 text-sm">{req.notes}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>

              {filteredReqs.length === 0 && (
                <div className="text-center py-12">
                  <Icon name="shield" className="w-12 h-12 text-gray-600 mx-auto mb-3" />
                  <p className="text-gray-400">No requirements match your filters</p>
                </div>
              )}
            </div>
          </main>

          {/* Requirement Detail Modal */}
          {selectedReq && (
            <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setSelectedReq(null)}>
              <div className="glass-card rounded-2xl max-w-lg w-full" onClick={e => e.stopPropagation()}>
                <div className="p-6 border-b border-white/10">
                  <div className="flex items-center justify-between">
                    <span className="font-mono text-cyan-400 text-lg">{selectedReq.reference}</span>
                    <button onClick={() => setSelectedReq(null)} className="p-2 text-gray-400 hover:text-white">
                      <Icon name="x" className="w-5 h-5" />
                    </button>
                  </div>
                </div>
                <div className="p-6 space-y-4">
                  <div>
                    <h4 className="text-sm text-gray-400 mb-1">Requirement</h4>
                    <p className="text-white">{selectedReq.requirement}</p>
                  </div>
                  <div>
                    <h4 className="text-sm text-gray-400 mb-2">Status</h4>
                    <div className="flex gap-2 flex-wrap">
                      {Object.entries(COMPLIANCE_STATUS).map(([key, val]) => (
                        <button
                          key={key}
                          onClick={() => { updateStatus(selectedReq.id, key); setSelectedReq({...selectedReq, status: key}); }}
                          className={`px-3 py-1.5 rounded-lg text-sm flex items-center gap-1.5 transition-all ${
                            selectedReq.status === key 
                              ? 'ring-2 ring-offset-2 ring-offset-[#111C2E]' 
                              : 'opacity-60 hover:opacity-100'
                          }`}
                          style={{ background: `${val.color}20`, color: val.color, ringColor: val.color }}
                        >
                          <Icon name={val.icon} className="w-3 h-3" />
                          {val.label}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div className="bg-[#0A1628] rounded-lg p-3">
                      <span className="text-xs text-gray-500">Page Reference</span>
                      <p className="text-white font-mono">{selectedReq.pageRef}</p>
                    </div>
                    <div className="bg-[#0A1628] rounded-lg p-3">
                      <span className="text-xs text-gray-500">Priority</span>
                      <p className="text-white capitalize">{selectedReq.priority}</p>
                    </div>
                  </div>
                  <div>
                    <h4 className="text-sm text-gray-400 mb-1">Notes</h4>
                    <p className="text-gray-300">{selectedReq.notes}</p>
                  </div>
                </div>
              </div>
            </div>
          )}

          <footer className="border-t border-white/10 py-4 mt-12">
            <div className="max-w-7xl mx-auto px-6 text-center text-xs text-gray-500">
              © 2026 Mission Meets Tech • MissionPulse v2.0 • Sprint 60
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<ComplianceMatrixApp />, document.getElementById('root'));
  </script>
</body>
</html>
