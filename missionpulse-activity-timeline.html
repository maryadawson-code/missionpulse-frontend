<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Timeline | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #00050F 0%, #001529 50%, #00050F 100%); min-height: 100vh; }
        .glass-card {
            background: rgba(0, 229, 250, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 229, 250, 0.15);
            border-radius: 16px;
        }
        .glass-card-dark {
            background: rgba(0, 5, 15, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 229, 250, 0.1);
            border-radius: 12px;
        }
        .text-cyber { color: #00E5FA; }
        .btn-cyber {
            background: linear-gradient(135deg, #00E5FA 0%, #00b8d4 100%);
            color: #00050F;
            font-weight: 600;
        }
        .timeline-line {
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, rgba(0, 229, 250, 0.3) 0%, rgba(0, 229, 250, 0.1) 100%);
        }
        .timeline-dot {
            position: absolute;
            left: 12px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid;
            background: #00050F;
        }
        .dot-create { border-color: #22c55e; }
        .dot-update { border-color: #00E5FA; }
        .dot-delete { border-color: #ef4444; }
        .dot-submit { border-color: #a855f7; }
        .dot-review { border-color: #fbbf24; }
        .dot-login { border-color: #3b82f6; }
        .activity-item:hover {
            background: rgba(0, 229, 250, 0.05);
        }
    </style>
</head>
<body class="text-white">
    <!-- Navigation -->
    <nav class="glass-card-dark border-b border-cyan-500/20 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <a href="index.html" class="flex items-center space-x-3">
                        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-400 to-cyan-600 flex items-center justify-center">
                            <span class="text-xl">📜</span>
                        </div>
                        <div>
                            <span class="text-xl font-bold text-cyber">MissionPulse</span>
                            <span class="text-xs text-gray-400 block">Activity Timeline</span>
                        </div>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="userRole" class="px-3 py-1 rounded-full text-xs font-medium bg-cyan-500/20 text-cyber"></span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-6xl mx-auto px-6 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold text-white mb-2">Activity Timeline</h1>
                <p class="text-gray-400">Complete audit trail of all platform activity</p>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="exportAuditLog()" class="px-4 py-2 rounded-lg border border-cyan-500/30 text-cyber hover:bg-cyan-500/10 text-sm">
                    📥 Export Log
                </button>
                <button onclick="refreshTimeline()" class="btn-cyber px-4 py-2 rounded-lg text-sm">
                    🔄 Refresh
                </button>
            </div>
        </div>

        <!-- Filters -->
        <div class="glass-card p-4 mb-8">
            <div class="flex flex-wrap items-center gap-4">
                <div>
                    <label class="text-gray-400 text-xs block mb-1">Date Range</label>
                    <select id="dateFilter" onchange="applyFilters()" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white">
                        <option value="today">Today</option>
                        <option value="week" selected>This Week</option>
                        <option value="month">This Month</option>
                        <option value="all">All Time</option>
                    </select>
                </div>
                <div>
                    <label class="text-gray-400 text-xs block mb-1">Action Type</label>
                    <select id="actionFilter" onchange="applyFilters()" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white">
                        <option value="all">All Actions</option>
                        <option value="create">Created</option>
                        <option value="update">Updated</option>
                        <option value="delete">Deleted</option>
                        <option value="submit">Submitted</option>
                        <option value="review">Reviewed</option>
                        <option value="login">Login/Logout</option>
                    </select>
                </div>
                <div>
                    <label class="text-gray-400 text-xs block mb-1">User</label>
                    <select id="userFilter" onchange="applyFilters()" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white">
                        <option value="all">All Users</option>
                        <option value="mary">Mary Womack</option>
                        <option value="sarah">Sarah Chen</option>
                        <option value="mike">Mike Rodriguez</option>
                        <option value="system">System</option>
                    </select>
                </div>
                <div>
                    <label class="text-gray-400 text-xs block mb-1">Module</label>
                    <select id="moduleFilter" onchange="applyFilters()" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white">
                        <option value="all">All Modules</option>
                        <option value="opportunities">Opportunities</option>
                        <option value="proposals">Proposals</option>
                        <option value="partners">Partners</option>
                        <option value="users">Users</option>
                        <option value="settings">Settings</option>
                    </select>
                </div>
                <div class="flex-1"></div>
                <div>
                    <label class="text-gray-400 text-xs block mb-1">Search</label>
                    <input type="text" id="searchFilter" onkeyup="applyFilters()" placeholder="Search activities..." 
                        class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white w-64">
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass-card p-4 text-center">
                <p id="totalActivities" class="text-2xl font-bold text-cyber">0</p>
                <p class="text-gray-400 text-sm">Total Activities</p>
            </div>
            <div class="glass-card p-4 text-center">
                <p id="todayActivities" class="text-2xl font-bold text-green-400">0</p>
                <p class="text-gray-400 text-sm">Today</p>
            </div>
            <div class="glass-card p-4 text-center">
                <p id="uniqueUsers" class="text-2xl font-bold text-purple-400">0</p>
                <p class="text-gray-400 text-sm">Active Users</p>
            </div>
            <div class="glass-card p-4 text-center">
                <p id="criticalActions" class="text-2xl font-bold text-red-400">0</p>
                <p class="text-gray-400 text-sm">Critical Actions</p>
            </div>
        </div>

        <!-- Timeline -->
        <div class="glass-card overflow-hidden">
            <div class="p-4 border-b border-gray-700">
                <h3 class="font-semibold text-white">Activity Log</h3>
            </div>
            <div id="timelineContainer" class="relative">
                <div class="timeline-line"></div>
                <div id="timelineList" class="divide-y divide-gray-700/30">
                    <!-- Dynamic content -->
                </div>
            </div>
            <div class="p-4 border-t border-gray-700 text-center">
                <button onclick="loadMore()" id="loadMoreBtn" class="text-cyber hover:underline text-sm">
                    Load more activities...
                </button>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-8 p-4 glass-card-dark text-center">
            <p class="text-xs text-gray-500">
                🔒 NIST 800-53 AU-2 Compliant Audit Logging | MissionPulse v2.0 | 
                <span class="text-cyber">Mission Meets Tech</span>
            </p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc0MDY0NTIsImV4cCI6MjA1Mjk4MjQ1Mn0.kPykOLcNowFpHLMOCkLfPC17qb2g9jvVbyUjdUSvfyg';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Demo Activities
        const DEMO_ACTIVITIES = [
            { id: 1, action: 'login', user: 'Mary Womack', module: 'auth', description: 'Logged in from 192.168.1.100', timestamp: new Date(Date.now() - 15 * 60 * 1000).toISOString(), critical: false },
            { id: 2, action: 'update', user: 'Mary Womack', module: 'opportunities', description: 'Updated pWin for "DHA EHR Modernization" from 60% to 65%', timestamp: new Date(Date.now() - 45 * 60 * 1000).toISOString(), critical: false },
            { id: 3, action: 'create', user: 'Sarah Chen', module: 'proposals', description: 'Created new section "Technical Approach" for VA Claims Processing', timestamp: new Date(Date.now() - 2 * 60 * 60 * 1000).toISOString(), critical: false },
            { id: 4, action: 'review', user: 'Mike Rodriguez', module: 'proposals', description: 'Approved pricing volume for CMS Data Analytics', timestamp: new Date(Date.now() - 3 * 60 * 60 * 1000).toISOString(), critical: false },
            { id: 5, action: 'submit', user: 'System', module: 'proposals', description: 'Proposal "CMS Data Analytics" submitted to SAM.gov', timestamp: new Date(Date.now() - 4 * 60 * 60 * 1000).toISOString(), critical: true },
            { id: 6, action: 'update', user: 'Mary Womack', module: 'partners', description: 'Extended TechPartner Solutions access by 30 days', timestamp: new Date(Date.now() - 6 * 60 * 60 * 1000).toISOString(), critical: false },
            { id: 7, action: 'create', user: 'System', module: 'opportunities', description: 'New opportunity "NASA Mission Control" added via SAM.gov sync', timestamp: new Date(Date.now() - 8 * 60 * 60 * 1000).toISOString(), critical: false },
            { id: 8, action: 'delete', user: 'Mary Womack', module: 'proposals', description: 'Deleted draft section "Legacy Approach" from DoD Cybersecurity', timestamp: new Date(Date.now() - 12 * 60 * 60 * 1000).toISOString(), critical: false },
            { id: 9, action: 'update', user: 'Sarah Chen', module: 'users', description: 'Changed role for David Kim from "Viewer" to "FIN"', timestamp: new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString(), critical: true },
            { id: 10, action: 'login', user: 'Sarah Chen', module: 'auth', description: 'Logged in from 10.0.0.55', timestamp: new Date(Date.now() - 26 * 60 * 60 * 1000).toISOString(), critical: false },
            { id: 11, action: 'review', user: 'Mike Rodriguez', module: 'proposals', description: 'Flagged compliance issue in IHS Telehealth technical volume', timestamp: new Date(Date.now() - 28 * 60 * 60 * 1000).toISOString(), critical: true },
            { id: 12, action: 'create', user: 'Mary Womack', module: 'partners', description: 'Added new partner "DataForge Analytics" with Contributor access', timestamp: new Date(Date.now() - 48 * 60 * 60 * 1000).toISOString(), critical: false },
            { id: 13, action: 'submit', user: 'System', module: 'opportunities', description: 'Go/No-Go decision recorded: "EPA Environmental" - NO GO', timestamp: new Date(Date.now() - 72 * 60 * 60 * 1000).toISOString(), critical: true },
            { id: 14, action: 'update', user: 'System', module: 'settings', description: 'Automatic backup completed successfully', timestamp: new Date(Date.now() - 96 * 60 * 60 * 1000).toISOString(), critical: false },
            { id: 15, action: 'create', user: 'Mary Womack', module: 'opportunities', description: 'Created new opportunity "Treasury Financial Systems" ($67M)', timestamp: new Date(Date.now() - 120 * 60 * 60 * 1000).toISOString(), critical: false }
        ];

        let activities = [...DEMO_ACTIVITIES];
        let displayedCount = 10;

        async function init() {
            await checkAuth();
            renderTimeline();
            updateStats();
        }

        async function checkAuth() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (session?.user) {
                    const { data: profile } = await supabase.from('profiles').select('role').eq('id', session.user.id).single();
                    document.getElementById('userRole').textContent = profile?.role || 'Viewer';
                } else {
                    document.getElementById('userRole').textContent = 'Demo Mode';
                }
            } catch (e) {
                document.getElementById('userRole').textContent = 'Demo Mode';
            }
        }

        function applyFilters() {
            const dateFilter = document.getElementById('dateFilter').value;
            const actionFilter = document.getElementById('actionFilter').value;
            const userFilter = document.getElementById('userFilter').value;
            const moduleFilter = document.getElementById('moduleFilter').value;
            const searchFilter = document.getElementById('searchFilter').value.toLowerCase();

            let filtered = [...DEMO_ACTIVITIES];

            // Date filter
            const now = new Date();
            if (dateFilter === 'today') {
                filtered = filtered.filter(a => new Date(a.timestamp).toDateString() === now.toDateString());
            } else if (dateFilter === 'week') {
                const weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);
                filtered = filtered.filter(a => new Date(a.timestamp) >= weekAgo);
            } else if (dateFilter === 'month') {
                const monthAgo = new Date(now - 30 * 24 * 60 * 60 * 1000);
                filtered = filtered.filter(a => new Date(a.timestamp) >= monthAgo);
            }

            // Action filter
            if (actionFilter !== 'all') {
                filtered = filtered.filter(a => a.action === actionFilter);
            }

            // User filter
            if (userFilter !== 'all') {
                const userMap = { mary: 'Mary Womack', sarah: 'Sarah Chen', mike: 'Mike Rodriguez', system: 'System' };
                filtered = filtered.filter(a => a.user === userMap[userFilter]);
            }

            // Module filter
            if (moduleFilter !== 'all') {
                filtered = filtered.filter(a => a.module === moduleFilter);
            }

            // Search filter
            if (searchFilter) {
                filtered = filtered.filter(a => 
                    a.description.toLowerCase().includes(searchFilter) ||
                    a.user.toLowerCase().includes(searchFilter)
                );
            }

            activities = filtered;
            displayedCount = 10;
            renderTimeline();
            updateStats();
        }

        function renderTimeline() {
            const container = document.getElementById('timelineList');
            const toShow = activities.slice(0, displayedCount);

            if (toShow.length === 0) {
                container.innerHTML = `
                    <div class="p-8 text-center pl-12">
                        <span class="text-4xl">📭</span>
                        <p class="text-gray-400 mt-2">No activities found</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = toShow.map(activity => {
                const dotClass = {
                    create: 'dot-create',
                    update: 'dot-update',
                    delete: 'dot-delete',
                    submit: 'dot-submit',
                    review: 'dot-review',
                    login: 'dot-login'
                }[activity.action] || 'dot-update';

                const actionIcon = {
                    create: '➕',
                    update: '✏️',
                    delete: '🗑️',
                    submit: '📤',
                    review: '👁️',
                    login: '🔐'
                }[activity.action] || '📋';

                const timeAgo = getTimeAgo(new Date(activity.timestamp));
                const fullTime = new Date(activity.timestamp).toLocaleString();

                return `
                    <div class="activity-item relative pl-12 pr-4 py-4 transition">
                        <div class="timeline-dot ${dotClass}" style="top: 20px;"></div>
                        <div class="flex items-start justify-between">
                            <div class="flex-1">
                                <div class="flex items-center space-x-2 mb-1">
                                    <span>${actionIcon}</span>
                                    <span class="text-white font-medium">${activity.user}</span>
                                    <span class="text-gray-500">•</span>
                                    <span class="text-gray-400 text-sm capitalize">${activity.action}</span>
                                    ${activity.critical ? '<span class="px-2 py-0.5 rounded text-xs bg-red-500/20 text-red-400">Critical</span>' : ''}
                                </div>
                                <p class="text-gray-300 text-sm">${activity.description}</p>
                                <p class="text-gray-500 text-xs mt-1" title="${fullTime}">${timeAgo}</p>
                            </div>
                            <span class="text-gray-500 text-xs px-2 py-1 rounded bg-gray-800 capitalize">${activity.module}</span>
                        </div>
                    </div>
                `;
            }).join('');

            // Hide load more if all shown
            document.getElementById('loadMoreBtn').style.display = displayedCount >= activities.length ? 'none' : 'inline';
        }

        function updateStats() {
            const now = new Date();
            const todayActivities = activities.filter(a => new Date(a.timestamp).toDateString() === now.toDateString());
            const uniqueUsers = [...new Set(activities.map(a => a.user))];
            const criticalActions = activities.filter(a => a.critical);

            document.getElementById('totalActivities').textContent = activities.length;
            document.getElementById('todayActivities').textContent = todayActivities.length;
            document.getElementById('uniqueUsers').textContent = uniqueUsers.length;
            document.getElementById('criticalActions').textContent = criticalActions.length;
        }

        function loadMore() {
            displayedCount += 10;
            renderTimeline();
        }

        function refreshTimeline() {
            activities = [...DEMO_ACTIVITIES];
            displayedCount = 10;
            renderTimeline();
            updateStats();
        }

        function exportAuditLog() {
            const data = {
                exportDate: new Date().toISOString(),
                exportedBy: 'MissionPulse User',
                totalRecords: activities.length,
                activities: activities
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `missionpulse-audit-log-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + ' years ago';
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + ' months ago';
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + ' days ago';
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + ' hours ago';
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + ' minutes ago';
            return 'Just now';
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
