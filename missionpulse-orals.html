<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orals Studio | MissionPulse</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.1); }
    .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
    .slide-preview { aspect-ratio: 16/9; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Demo slides
    const DEMO_SLIDES = [
      { id: 1, title: 'Cover Slide', type: 'cover', content: { title: 'Healthcare IT Modernization', subtitle: 'DHA Clinical Decision Support Platform', presenter: 'Mission Meets Tech', date: 'February 2025' } },
      { id: 2, title: 'Executive Summary', type: 'summary', content: { points: ['15+ years DHA experience', '$500M+ managed contracts', '99.99% system uptime', 'FedRAMP High authorized'] } },
      { id: 3, title: 'Technical Approach', type: 'content', content: { heading: 'AI-Powered Clinical Intelligence', points: ['Real-time clinical decision support', 'FHIR-native data integration', 'Automated compliance monitoring', 'Self-healing infrastructure'] } },
      { id: 4, title: 'Team Qualifications', type: 'team', content: { heading: 'Key Personnel', team: [{ name: 'Dr. Sarah Chen', role: 'Project Director', exp: '20 years' }, { name: 'Mike Johnson', role: 'Technical Lead', exp: '15 years' }] } },
      { id: 5, title: 'Past Performance', type: 'content', content: { heading: 'Relevant Experience', points: ['MHS GENESIS Support - $150M', 'VA Clinical Analytics - $85M', 'CMS Data Platform - $120M'] } },
      { id: 6, title: 'Risk Mitigation', type: 'content', content: { heading: 'Proactive Risk Management', points: ['Transition planning from Day 1', 'Redundant staffing model', 'Continuous security monitoring', '24/7 incident response'] } },
    ];

    // Demo Q&A
    const DEMO_QA = [
      { id: 1, question: 'How will you ensure zero disruption during transition?', category: 'Transition', difficulty: 'high', suggestedAnswer: 'Our phased transition approach includes parallel operations for 90 days, with dedicated knowledge transfer sessions and automated system mirroring to ensure continuous service delivery.' },
      { id: 2, question: 'What is your approach to FedRAMP authorization?', category: 'Security', difficulty: 'medium', suggestedAnswer: 'We maintain existing FedRAMP High authorization and will leverage our established ATO process with continuous monitoring through our Security Operations Center.' },
      { id: 3, question: 'How do you handle staff turnover on long-term contracts?', category: 'Staffing', difficulty: 'medium', suggestedAnswer: 'We maintain a bench strength of 15% above requirements, with cross-training programs and competitive retention packages resulting in 95% annual retention.' },
      { id: 4, question: 'Describe your AI/ML governance framework.', category: 'Technical', difficulty: 'high', suggestedAnswer: 'Our AI governance includes human-in-the-loop validation, bias testing, explainability requirements, and quarterly model audits aligned with DoD AI ethics principles.' },
      { id: 5, question: 'What differentiates your solution from competitors?', category: 'Discriminators', difficulty: 'high', suggestedAnswer: 'Our proprietary CUI Airgap architecture provides the only FedRAMP High solution with real-time clinical AI while maintaining complete data sovereignty.' },
    ];

    const SLIDE_COLORS = {
      cover: 'from-cyan-500 to-blue-600',
      summary: 'from-purple-500 to-pink-600',
      content: 'from-emerald-500 to-teal-600',
      team: 'from-amber-500 to-orange-600',
    };

    // Slide Preview Component
    const SlidePreview = ({ slide, isActive, onClick }) => (
      <div 
        onClick={onClick}
        className={`cursor-pointer transition-all ${isActive ? 'ring-2 ring-cyan-500 scale-105' : 'hover:scale-102 opacity-70 hover:opacity-100'}`}
      >
        <div className={`slide-preview rounded-lg bg-gradient-to-br ${SLIDE_COLORS[slide.type]} p-4 flex flex-col justify-between`}>
          <div>
            <span className="text-[10px] text-white/60 uppercase">{slide.type}</span>
            <h4 className="text-sm font-bold text-white truncate">{slide.title}</h4>
          </div>
          <span className="text-[10px] text-white/60">Slide {slide.id}</span>
        </div>
      </div>
    );

    // Full Slide Component
    const FullSlide = ({ slide }) => (
      <div className={`slide-preview rounded-2xl bg-gradient-to-br ${SLIDE_COLORS[slide.type]} p-8 flex flex-col`}>
        {slide.type === 'cover' ? (
          <div className="flex-1 flex flex-col items-center justify-center text-center">
            <h1 className="text-4xl font-bold text-white mb-4">{slide.content.title}</h1>
            <p className="text-xl text-white/80 mb-8">{slide.content.subtitle}</p>
            <div className="mt-auto">
              <p className="text-lg text-white/90">{slide.content.presenter}</p>
              <p className="text-sm text-white/60">{slide.content.date}</p>
            </div>
          </div>
        ) : slide.type === 'team' ? (
          <div className="flex-1">
            <h2 className="text-2xl font-bold text-white mb-6">{slide.content.heading}</h2>
            <div className="grid grid-cols-2 gap-4">
              {slide.content.team.map((member, idx) => (
                <div key={idx} className="bg-white/10 rounded-xl p-4">
                  <p className="font-bold text-white">{member.name}</p>
                  <p className="text-sm text-white/80">{member.role}</p>
                  <p className="text-xs text-white/60">{member.exp} experience</p>
                </div>
              ))}
            </div>
          </div>
        ) : (
          <div className="flex-1">
            <h2 className="text-2xl font-bold text-white mb-6">{slide.content.heading || slide.title}</h2>
            <ul className="space-y-3">
              {slide.content.points.map((point, idx) => (
                <li key={idx} className="flex items-start gap-3">
                  <span className="w-6 h-6 rounded-full bg-white/20 flex items-center justify-center text-sm text-white flex-shrink-0">{idx + 1}</span>
                  <span className="text-lg text-white/90">{point}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
    );

    // Q&A Card Component
    const QACard = ({ qa, onSelect }) => {
      const difficultyColors = {
        high: 'text-red-400 bg-red-500/20',
        medium: 'text-amber-400 bg-amber-500/20',
        low: 'text-emerald-400 bg-emerald-500/20',
      };

      return (
        <div 
          onClick={() => onSelect(qa)}
          className="glass-card rounded-xl p-4 cursor-pointer hover:border-cyan-500/30 transition-all"
        >
          <div className="flex items-start justify-between mb-2">
            <span className="text-xs text-slate-400">{qa.category}</span>
            <span className={`px-2 py-0.5 text-xs rounded-full ${difficultyColors[qa.difficulty]}`}>
              {qa.difficulty}
            </span>
          </div>
          <p className="text-white font-medium">{qa.question}</p>
        </div>
      );
    };

    function OralsStudio() {
      const [activeTab, setActiveTab] = useState('slides');
      const [slides, setSlides] = useState(DEMO_SLIDES);
      const [qaItems, setQaItems] = useState(DEMO_QA);
      const [currentSlide, setCurrentSlide] = useState(0);
      const [selectedQA, setSelectedQA] = useState(null);
      const [isPresenting, setIsPresenting] = useState(false);
      const [timer, setTimer] = useState(0);
      const [isTimerRunning, setIsTimerRunning] = useState(false);

      useEffect(() => {
        let interval;
        if (isTimerRunning) {
          interval = setInterval(() => setTimer(t => t + 1), 1000);
        }
        return () => clearInterval(interval);
      }, [isTimerRunning]);

      const formatTime = (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      };

      const handleKeyDown = (e) => {
        if (e.key === 'ArrowRight' && currentSlide < slides.length - 1) {
          setCurrentSlide(prev => prev + 1);
        } else if (e.key === 'ArrowLeft' && currentSlide > 0) {
          setCurrentSlide(prev => prev - 1);
        } else if (e.key === 'Escape') {
          setIsPresenting(false);
        }
      };

      useEffect(() => {
        if (isPresenting) {
          window.addEventListener('keydown', handleKeyDown);
          return () => window.removeEventListener('keydown', handleKeyDown);
        }
      }, [isPresenting, currentSlide]);

      // Presentation Mode
      if (isPresenting) {
        return (
          <div className="fixed inset-0 bg-slate-900 z-50 flex flex-col" tabIndex={0}>
            <div className="flex-1 p-8 flex items-center justify-center">
              <div className="w-full max-w-5xl">
                <FullSlide slide={slides[currentSlide]} />
              </div>
            </div>
            <div className="bg-slate-800/80 px-6 py-3 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <button onClick={() => setCurrentSlide(Math.max(0, currentSlide - 1))} className="p-2 hover:bg-slate-700 rounded-lg text-white">
                  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
                  </svg>
                </button>
                <span className="text-white font-medium">{currentSlide + 1} / {slides.length}</span>
                <button onClick={() => setCurrentSlide(Math.min(slides.length - 1, currentSlide + 1))} className="p-2 hover:bg-slate-700 rounded-lg text-white">
                  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                  </svg>
                </button>
              </div>
              <div className="flex items-center gap-4">
                <span className="text-2xl font-mono text-cyan-400">{formatTime(timer)}</span>
                <button onClick={() => setIsTimerRunning(!isTimerRunning)} className={`px-4 py-2 rounded-lg ${isTimerRunning ? 'bg-red-500' : 'bg-emerald-500'} text-white`}>
                  {isTimerRunning ? 'Pause' : 'Start'}
                </button>
                <button onClick={() => { setTimer(0); setIsTimerRunning(false); }} className="px-4 py-2 bg-slate-700 rounded-lg text-white">Reset</button>
              </div>
              <button onClick={() => setIsPresenting(false)} className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-white">
                Exit (ESC)
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
            <div className="max-w-[1800px] mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="missionpulse-nav-hub.html" className="text-slate-400 hover:text-white transition-colors">
                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
                    </svg>
                  </a>
                  <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-pink-500 to-rose-600 flex items-center justify-center">
                    <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" />
                    </svg>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold text-white">Orals Studio</h1>
                    <p className="text-xs text-pink-400">Presentation Builder & Q&A Prep</p>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <button 
                    onClick={() => { setIsPresenting(true); setCurrentSlide(0); }}
                    className="px-4 py-2 bg-gradient-to-r from-pink-500 to-rose-500 text-white text-sm font-medium rounded-lg hover:from-pink-400 hover:to-rose-400 transition-all flex items-center gap-2"
                  >
                    <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                      <path d="M8 5v14l11-7z"/>
                    </svg>
                    Present
                  </button>
                </div>
              </div>
            </div>
          </header>

          <div className="max-w-[1800px] mx-auto px-6 py-8">
            {/* Tabs */}
            <div className="flex items-center gap-2 mb-6">
              <button
                onClick={() => setActiveTab('slides')}
                className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                  activeTab === 'slides' ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' : 'bg-slate-800/50 text-slate-400 border border-slate-700'
                }`}
              >
                📊 Slides ({slides.length})
              </button>
              <button
                onClick={() => setActiveTab('qa')}
                className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                  activeTab === 'qa' ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' : 'bg-slate-800/50 text-slate-400 border border-slate-700'
                }`}
              >
                ❓ Q&A Prep ({qaItems.length})
              </button>
              <button
                onClick={() => setActiveTab('coaching')}
                className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                  activeTab === 'coaching' ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' : 'bg-slate-800/50 text-slate-400 border border-slate-700'
                }`}
              >
                🎤 Coaching Tips
              </button>
            </div>

            {activeTab === 'slides' && (
              <div className="grid grid-cols-12 gap-6">
                {/* Slide Thumbnails */}
                <div className="col-span-3 space-y-3">
                  <h3 className="text-sm font-medium text-slate-400 mb-3">Slide Deck</h3>
                  {slides.map((slide, idx) => (
                    <SlidePreview 
                      key={slide.id} 
                      slide={slide} 
                      isActive={idx === currentSlide}
                      onClick={() => setCurrentSlide(idx)}
                    />
                  ))}
                  <button className="w-full py-3 border-2 border-dashed border-slate-700 rounded-lg text-slate-400 hover:border-cyan-500/50 hover:text-cyan-400 transition-all">
                    + Add Slide
                  </button>
                </div>

                {/* Main Slide View */}
                <div className="col-span-9">
                  <div className="glass-card rounded-2xl p-6">
                    <FullSlide slide={slides[currentSlide]} />
                    <div className="mt-4 flex items-center justify-between">
                      <div className="flex items-center gap-2">
                        <button onClick={() => setCurrentSlide(Math.max(0, currentSlide - 1))} disabled={currentSlide === 0} className="p-2 rounded-lg hover:bg-slate-700/50 text-slate-400 disabled:opacity-30">
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
                          </svg>
                        </button>
                        <span className="text-sm text-slate-400">{currentSlide + 1} of {slides.length}</span>
                        <button onClick={() => setCurrentSlide(Math.min(slides.length - 1, currentSlide + 1))} disabled={currentSlide === slides.length - 1} className="p-2 rounded-lg hover:bg-slate-700/50 text-slate-400 disabled:opacity-30">
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                          </svg>
                        </button>
                      </div>
                      <div className="flex items-center gap-2">
                        <button className="px-3 py-1.5 text-sm bg-slate-800/50 border border-slate-700 rounded-lg text-slate-300 hover:border-cyan-500/50">Edit</button>
                        <button className="px-3 py-1.5 text-sm bg-slate-800/50 border border-slate-700 rounded-lg text-slate-300 hover:border-cyan-500/50">Duplicate</button>
                        <button className="px-3 py-1.5 text-sm bg-slate-800/50 border border-slate-700 rounded-lg text-red-400 hover:border-red-500/50">Delete</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'qa' && (
              <div className="grid grid-cols-2 gap-6">
                <div>
                  <h3 className="text-lg font-semibold text-white mb-4">Anticipated Questions</h3>
                  <div className="space-y-3">
                    {qaItems.map(qa => (
                      <QACard key={qa.id} qa={qa} onSelect={setSelectedQA} />
                    ))}
                  </div>
                  <button className="w-full mt-4 py-3 border-2 border-dashed border-slate-700 rounded-lg text-slate-400 hover:border-cyan-500/50 hover:text-cyan-400 transition-all">
                    + Add Question
                  </button>
                </div>
                <div>
                  {selectedQA ? (
                    <div className="glass-card rounded-xl p-6 sticky top-24">
                      <div className="flex items-start justify-between mb-4">
                        <span className="px-2 py-1 text-xs bg-slate-700 text-slate-300 rounded">{selectedQA.category}</span>
                        <button onClick={() => setSelectedQA(null)} className="text-slate-400 hover:text-white">
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                          </svg>
                        </button>
                      </div>
                      <h3 className="text-lg font-semibold text-white mb-4">{selectedQA.question}</h3>
                      <div className="bg-emerald-500/10 border border-emerald-500/30 rounded-xl p-4">
                        <h4 className="text-sm font-medium text-emerald-400 mb-2">Suggested Response</h4>
                        <p className="text-slate-300">{selectedQA.suggestedAnswer}</p>
                      </div>
                      <div className="mt-4 flex items-center gap-2">
                        <button className="px-4 py-2 bg-slate-800/50 border border-slate-700 rounded-lg text-sm text-slate-300">Edit Response</button>
                        <button className="px-4 py-2 bg-slate-800/50 border border-slate-700 rounded-lg text-sm text-slate-300">Practice Mode</button>
                      </div>
                    </div>
                  ) : (
                    <div className="glass-card rounded-xl p-6 text-center">
                      <p className="text-slate-400">Select a question to view suggested response</p>
                    </div>
                  )}
                </div>
              </div>
            )}

            {activeTab === 'coaching' && (
              <div className="grid grid-cols-3 gap-6">
                <div className="glass-card rounded-xl p-6">
                  <span className="text-3xl mb-4 block">🎯</span>
                  <h3 className="text-lg font-semibold text-white mb-2">Opening Impact</h3>
                  <ul className="space-y-2 text-sm text-slate-300">
                    <li>• Start with your strongest discriminator</li>
                    <li>• Establish credibility in first 30 seconds</li>
                    <li>• Make eye contact with each evaluator</li>
                    <li>• Speak slowly and confidently</li>
                  </ul>
                </div>
                <div className="glass-card rounded-xl p-6">
                  <span className="text-3xl mb-4 block">⏱️</span>
                  <h3 className="text-lg font-semibold text-white mb-2">Time Management</h3>
                  <ul className="space-y-2 text-sm text-slate-300">
                    <li>• Allocate 2-3 minutes per major slide</li>
                    <li>• Reserve 25% of time for Q&A</li>
                    <li>• Practice with timer repeatedly</li>
                    <li>• Have backup slides ready</li>
                  </ul>
                </div>
                <div className="glass-card rounded-xl p-6">
                  <span className="text-3xl mb-4 block">💬</span>
                  <h3 className="text-lg font-semibold text-white mb-2">Q&A Strategy</h3>
                  <ul className="space-y-2 text-sm text-slate-300">
                    <li>• Repeat question before answering</li>
                    <li>• Bridge to your win themes</li>
                    <li>• Use STAR method for examples</li>
                    <li>• "Great question" - then pivot</li>
                  </ul>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<OralsStudio />);
  </script>
</body>
</html>
