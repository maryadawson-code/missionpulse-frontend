<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orals Studio | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); min-height: 100vh; }
        .glass { background: rgba(0, 229, 250, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.2); }
        .glow { box-shadow: 0 0 20px rgba(0, 229, 250, 0.3); }
        .slide-preview { aspect-ratio: 16/9; }
        .slide-card { transition: all 0.2s; }
        .slide-card:hover { transform: scale(1.02); }
        .slide-card.active { border-color: #00E5FA; box-shadow: 0 0 20px rgba(0, 229, 250, 0.4); }
    </style>
</head>
<body class="text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // FILE: missionpulse-orals.html
        // ROLE: All authenticated users
        // SECURITY: env vars verified - Supabase anon key (public RLS model)
        
        const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc3NTY2NDcsImV4cCI6MjA1MzMzMjY0N30.Wfq14O6y2EpB2R0cJQPmWMFybMQc0PxLlHYXVLp2rws';
        const DEFAULT_COMPANY_ID = '11111111-1111-1111-1111-111111111111';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const SLIDE_TEMPLATES = [
            { id: 'title', name: 'Title Slide', icon: '🎯' },
            { id: 'agenda', name: 'Agenda', icon: '📋' },
            { id: 'team', name: 'Team Intro', icon: '👥' },
            { id: 'understanding', name: 'Understanding', icon: '🧠' },
            { id: 'approach', name: 'Technical Approach', icon: '⚙️' },
            { id: 'management', name: 'Management Plan', icon: '📊' },
            { id: 'past_perf', name: 'Past Performance', icon: '🏆' },
            { id: 'differentiator', name: 'Differentiator', icon: '💎' },
            { id: 'qa', name: 'Q&A', icon: '❓' },
            { id: 'closing', name: 'Closing', icon: '🎬' }
        ];
        
        const DEMO_SLIDES = [
            { id: '1', opportunity_id: 'opp-1', title: 'VA EHR Modernization', content: 'Mission Meets Tech brings 15+ years of federal healthcare IT experience', slide_order: 1, speaker_notes: 'Open with confidence. Make eye contact with each evaluator.', template: 'title', opp_nickname: 'VA-EHR-2025' },
            { id: '2', opportunity_id: 'opp-1', title: 'Agenda', content: '1. Team Introduction\n2. Technical Understanding\n3. Solution Approach\n4. Management Plan\n5. Past Performance\n6. Q&A', slide_order: 2, speaker_notes: 'Keep agenda brief - 30 seconds max.', template: 'agenda', opp_nickname: 'VA-EHR-2025' },
            { id: '3', opportunity_id: 'opp-1', title: 'Your Dedicated Team', content: 'Mary Womack - CEO & PM\nJohn Davis - Technical Lead\nSarah Chen - Clinical SME', slide_order: 3, speaker_notes: 'Each person introduces themselves in 15 seconds.', template: 'team', opp_nickname: 'VA-EHR-2025' },
            { id: '4', opportunity_id: 'opp-1', title: 'We Understand Your Challenge', content: 'Veterans deserve seamless healthcare experiences across all VA facilities.', slide_order: 4, speaker_notes: 'Pause for effect after "Veterans deserve..." - let it land.', template: 'understanding', opp_nickname: 'VA-EHR-2025' },
        ];
        
        function App() {
            const [currentRole, setCurrentRole] = useState('PM');
            const [slides, setSlides] = useState([]);
            const [opportunities, setOpportunities] = useState([]);
            const [selectedOpp, setSelectedOpp] = useState('all');
            const [loading, setLoading] = useState(true);
            const [activeSlide, setActiveSlide] = useState(null);
            const [showModal, setShowModal] = useState(false);
            const [editSlide, setEditSlide] = useState(null);
            const [presentMode, setPresentMode] = useState(false);
            const [presentIndex, setPresentIndex] = useState(0);
            
            useEffect(() => { loadData(); }, []);
            
            const loadData = async () => {
                try {
                    const [slidesRes, oppsRes] = await Promise.all([
                        supabase.from('orals_decks').select('*, opportunities(nickname)').order('slide_order', { ascending: true }),
                        supabase.from('opportunities').select('id, nickname').eq('company_id', DEFAULT_COMPANY_ID)
                    ]);
                    
                    if (slidesRes.error) throw slidesRes.error;
                    
                    const enrichedSlides = (slidesRes.data || []).map(s => ({
                        ...s,
                        opp_nickname: s.opportunities?.nickname || 'Unassigned'
                    }));
                    
                    setSlides(enrichedSlides.length > 0 ? enrichedSlides : DEMO_SLIDES);
                    setOpportunities(oppsRes.data || []);
                    if (enrichedSlides.length > 0 || DEMO_SLIDES.length > 0) {
                        setActiveSlide((enrichedSlides[0] || DEMO_SLIDES[0]).id);
                    }
                } catch (err) {
                    console.error('Load error:', err);
                    setSlides(DEMO_SLIDES);
                    setActiveSlide(DEMO_SLIDES[0]?.id);
                } finally {
                    setLoading(false);
                }
            };
            
            const saveSlide = async (slideData) => {
                try {
                    if (editSlide?.id && !editSlide.id.startsWith('temp-')) {
                        await supabase.from('orals_decks').update(slideData).eq('id', editSlide.id);
                    } else {
                        const maxOrder = Math.max(0, ...filteredSlides.map(s => s.slide_order || 0));
                        const { data } = await supabase.from('orals_decks').insert({
                            ...slideData,
                            slide_order: maxOrder + 1,
                            company_id: DEFAULT_COMPANY_ID
                        }).select().single();
                        if (data) slideData.id = data.id;
                    }
                    loadData();
                } catch (err) {
                    console.error('Save error:', err);
                    const tempId = 'temp-' + Date.now();
                    const maxOrder = Math.max(0, ...slides.map(s => s.slide_order || 0));
                    setSlides([...slides.filter(s => s.id !== editSlide?.id), { ...slideData, id: tempId, slide_order: maxOrder + 1 }]);
                }
                setShowModal(false);
                setEditSlide(null);
            };
            
            const deleteSlide = async (slideId) => {
                if (!confirm('Delete this slide?')) return;
                setSlides(slides.filter(s => s.id !== slideId));
                try { await supabase.from('orals_decks').delete().eq('id', slideId); } catch (err) { console.error(err); }
            };
            
            const moveSlide = async (slideId, direction) => {
                const currentIndex = filteredSlides.findIndex(s => s.id === slideId);
                const newIndex = direction === 'up' ? currentIndex - 1 : currentIndex + 1;
                if (newIndex < 0 || newIndex >= filteredSlides.length) return;
                
                const newSlides = [...filteredSlides];
                [newSlides[currentIndex], newSlides[newIndex]] = [newSlides[newIndex], newSlides[currentIndex]];
                
                const reordered = newSlides.map((s, i) => ({ ...s, slide_order: i + 1 }));
                setSlides(reordered);
                
                // Update in DB
                for (const slide of reordered) {
                    try {
                        await supabase.from('orals_decks').update({ slide_order: slide.slide_order }).eq('id', slide.id);
                    } catch (err) { console.error(err); }
                }
            };
            
            const filteredSlides = (selectedOpp === 'all' ? slides : slides.filter(s => s.opportunity_id === selectedOpp))
                .sort((a, b) => (a.slide_order || 0) - (b.slide_order || 0));
            
            const currentSlide = filteredSlides.find(s => s.id === activeSlide) || filteredSlides[0];
            
            const handleKeyDown = (e) => {
                if (!presentMode) return;
                if (e.key === 'ArrowRight' || e.key === ' ') {
                    setPresentIndex(i => Math.min(i + 1, filteredSlides.length - 1));
                } else if (e.key === 'ArrowLeft') {
                    setPresentIndex(i => Math.max(i - 1, 0));
                } else if (e.key === 'Escape') {
                    setPresentMode(false);
                }
            };
            
            useEffect(() => {
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [presentMode, filteredSlides.length]);
            
            if (presentMode) {
                const slide = filteredSlides[presentIndex];
                return (
                    <div className="fixed inset-0 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex flex-col items-center justify-center p-8"
                        onClick={() => setPresentIndex(i => Math.min(i + 1, filteredSlides.length - 1))}>
                        <div className="max-w-5xl w-full">
                            <div className="text-cyan-400 text-6xl mb-4">{SLIDE_TEMPLATES.find(t => t.id === slide?.template)?.icon || '📄'}</div>
                            <h1 className="text-5xl font-bold text-white mb-8">{slide?.title}</h1>
                            <div className="text-2xl text-slate-300 whitespace-pre-line leading-relaxed">{slide?.content}</div>
                        </div>
                        <div className="absolute bottom-8 left-0 right-0 flex justify-center items-center gap-4">
                            <span className="text-slate-500">Slide {presentIndex + 1} of {filteredSlides.length}</span>
                            <button onClick={(e) => { e.stopPropagation(); setPresentMode(false); }}
                                className="bg-red-500/20 text-red-400 px-4 py-2 rounded-lg">Exit (ESC)</button>
                        </div>
                        {slide?.speaker_notes && (
                            <div className="absolute bottom-24 left-8 right-8 bg-black/50 rounded-lg p-4 text-slate-400 text-sm">
                                <strong className="text-cyan-400">Speaker Notes:</strong> {slide.speaker_notes}
                            </div>
                        )}
                    </div>
                );
            }
            
            return (
                <div className="p-6 max-w-7xl mx-auto">
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <a href="index.html" className="text-cyan-400 hover:text-cyan-300 text-sm mb-2 inline-block">← Back to Dashboard</a>
                            <h1 className="text-3xl font-bold text-cyan-400">🎤 Orals Studio</h1>
                            <p className="text-slate-400 mt-1">Build and rehearse your presentation deck</p>
                        </div>
                        <div className="flex gap-4 items-center">
                            <select value={selectedOpp} onChange={e => setSelectedOpp(e.target.value)}
                                className="bg-slate-800 border border-cyan-500/30 rounded px-3 py-2 text-cyan-400">
                                <option value="all">All Opportunities</option>
                                {opportunities.map(o => <option key={o.id} value={o.id}>{o.nickname}</option>)}
                            </select>
                            <select value={currentRole} onChange={e => setCurrentRole(e.target.value)}
                                className="bg-slate-800 border border-cyan-500/30 rounded px-3 py-2 text-cyan-400">
                                {['CEO','COO','CAP','PM','SA','FIN','CON','DEL','QA','Partner','Admin'].map(r => 
                                    <option key={r} value={r}>{r}</option>
                                )}
                            </select>
                            <button onClick={() => { setPresentIndex(0); setPresentMode(true); }}
                                className="bg-green-500 hover:bg-green-400 text-black font-bold px-4 py-2 rounded-lg transition">
                                ▶ Present
                            </button>
                            <button onClick={() => { setEditSlide({}); setShowModal(true); }}
                                className="bg-cyan-500 hover:bg-cyan-400 text-black font-bold px-4 py-2 rounded-lg transition">
                                + New Slide
                            </button>
                        </div>
                    </div>
                    
                    {loading ? (
                        <div className="text-center py-20 text-cyan-400">Loading deck...</div>
                    ) : (
                        <div className="grid grid-cols-12 gap-6">
                            {/* Slide List */}
                            <div className="col-span-3 space-y-3 max-h-[70vh] overflow-y-auto pr-2">
                                {filteredSlides.map((slide, index) => (
                                    <div key={slide.id} 
                                        className={`slide-card glass rounded-lg p-3 cursor-pointer border-2 ${activeSlide === slide.id ? 'active border-cyan-500' : 'border-transparent'}`}
                                        onClick={() => setActiveSlide(slide.id)}>
                                        <div className="flex justify-between items-start mb-2">
                                            <span className="text-2xl">{SLIDE_TEMPLATES.find(t => t.id === slide.template)?.icon || '📄'}</span>
                                            <span className="text-slate-500 text-xs">#{index + 1}</span>
                                        </div>
                                        <h3 className="font-semibold text-sm text-white truncate">{slide.title}</h3>
                                        <p className="text-slate-400 text-xs truncate">{slide.content?.split('\n')[0]}</p>
                                    </div>
                                ))}
                                {filteredSlides.length === 0 && (
                                    <div className="text-center py-8 text-slate-500 text-sm">No slides yet</div>
                                )}
                            </div>
                            
                            {/* Main Preview */}
                            <div className="col-span-6">
                                {currentSlide ? (
                                    <div className="glass rounded-xl overflow-hidden">
                                        <div className="slide-preview bg-gradient-to-br from-slate-800 via-slate-900 to-slate-800 flex flex-col items-center justify-center p-8">
                                            <div className="text-cyan-400 text-4xl mb-4">
                                                {SLIDE_TEMPLATES.find(t => t.id === currentSlide.template)?.icon || '📄'}
                                            </div>
                                            <h2 className="text-2xl font-bold text-white text-center mb-4">{currentSlide.title}</h2>
                                            <p className="text-slate-300 text-center whitespace-pre-line">{currentSlide.content}</p>
                                        </div>
                                        <div className="p-4 border-t border-cyan-500/20">
                                            <div className="flex justify-between items-center">
                                                <div className="flex gap-2">
                                                    <button onClick={() => moveSlide(currentSlide.id, 'up')}
                                                        className="glass px-3 py-1 rounded text-cyan-400 hover:bg-cyan-500/20">↑</button>
                                                    <button onClick={() => moveSlide(currentSlide.id, 'down')}
                                                        className="glass px-3 py-1 rounded text-cyan-400 hover:bg-cyan-500/20">↓</button>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => { setEditSlide(currentSlide); setShowModal(true); }}
                                                        className="glass px-3 py-1 rounded text-cyan-400 hover:bg-cyan-500/20">✏️ Edit</button>
                                                    <button onClick={() => deleteSlide(currentSlide.id)}
                                                        className="glass px-3 py-1 rounded text-red-400 hover:bg-red-500/20">🗑️ Delete</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="glass rounded-xl p-8 text-center text-slate-500">
                                        Select or create a slide
                                    </div>
                                )}
                            </div>
                            
                            {/* Speaker Notes */}
                            <div className="col-span-3">
                                <div className="glass rounded-xl p-4 h-full">
                                    <h3 className="text-cyan-400 font-bold mb-3">📝 Speaker Notes</h3>
                                    {currentSlide?.speaker_notes ? (
                                        <p className="text-slate-300 text-sm leading-relaxed">{currentSlide.speaker_notes}</p>
                                    ) : (
                                        <p className="text-slate-500 text-sm">No speaker notes for this slide</p>
                                    )}
                                    
                                    <div className="mt-6 pt-4 border-t border-cyan-500/20">
                                        <h4 className="text-cyan-400 font-semibold text-sm mb-2">Deck Summary</h4>
                                        <div className="space-y-1 text-xs">
                                            <p className="text-slate-400">Total Slides: <span className="text-white">{filteredSlides.length}</span></p>
                                            <p className="text-slate-400">Est. Duration: <span className="text-white">{filteredSlides.length * 2} min</span></p>
                                        </div>
                                    </div>
                                    
                                    <div className="mt-6 pt-4 border-t border-cyan-500/20">
                                        <h4 className="text-cyan-400 font-semibold text-sm mb-2">Quick Templates</h4>
                                        <div className="flex flex-wrap gap-1">
                                            {SLIDE_TEMPLATES.slice(0, 6).map(t => (
                                                <button key={t.id} onClick={() => { setEditSlide({ template: t.id }); setShowModal(true); }}
                                                    className="glass px-2 py-1 rounded text-xs hover:bg-cyan-500/20" title={t.name}>
                                                    {t.icon}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {showModal && (
                        <SlideModal slide={editSlide} opportunities={opportunities} onSave={saveSlide} 
                            onClose={() => { setShowModal(false); setEditSlide(null); }} />
                    )}
                    
                    <div className="mt-8 text-center text-slate-500 text-sm">
                        MissionPulse v3.1 • Mission Meets Tech • AI GENERATED CONTENT REQUIRES HUMAN REVIEW
                    </div>
                </div>
            );
        }
        
        function SlideModal({ slide, opportunities, onSave, onClose }) {
            const [form, setForm] = useState({
                title: slide?.title || '',
                content: slide?.content || '',
                template: slide?.template || 'title',
                speaker_notes: slide?.speaker_notes || '',
                opportunity_id: slide?.opportunity_id || ''
            });
            
            return (
                <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50" onClick={onClose}>
                    <div className="glass rounded-xl p-6 w-full max-w-2xl" onClick={e => e.stopPropagation()}>
                        <h2 className="text-xl font-bold text-cyan-400 mb-4">{slide?.id ? 'Edit Slide' : 'New Slide'}</h2>
                        <form onSubmit={e => { e.preventDefault(); onSave(form); }} className="space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm text-slate-400 mb-1">Slide Type</label>
                                    <select value={form.template} onChange={e => setForm({...form, template: e.target.value})}
                                        className="w-full bg-slate-800 border border-cyan-500/30 rounded px-3 py-2 text-white">
                                        {SLIDE_TEMPLATES.map(t => <option key={t.id} value={t.id}>{t.icon} {t.name}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm text-slate-400 mb-1">Opportunity</label>
                                    <select value={form.opportunity_id} onChange={e => setForm({...form, opportunity_id: e.target.value})}
                                        className="w-full bg-slate-800 border border-cyan-500/30 rounded px-3 py-2 text-white">
                                        <option value="">Select Opportunity</option>
                                        {opportunities.map(o => <option key={o.id} value={o.id}>{o.nickname}</option>)}
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm text-slate-400 mb-1">Title</label>
                                <input type="text" value={form.title} onChange={e => setForm({...form, title: e.target.value})}
                                    className="w-full bg-slate-800 border border-cyan-500/30 rounded px-3 py-2 text-white" required />
                            </div>
                            <div>
                                <label className="block text-sm text-slate-400 mb-1">Content</label>
                                <textarea value={form.content} onChange={e => setForm({...form, content: e.target.value})}
                                    className="w-full bg-slate-800 border border-cyan-500/30 rounded px-3 py-2 text-white h-32" 
                                    placeholder="Main slide content (use line breaks for bullet points)" />
                            </div>
                            <div>
                                <label className="block text-sm text-slate-400 mb-1">Speaker Notes</label>
                                <textarea value={form.speaker_notes} onChange={e => setForm({...form, speaker_notes: e.target.value})}
                                    className="w-full bg-slate-800 border border-cyan-500/30 rounded px-3 py-2 text-white h-24"
                                    placeholder="Private notes for the presenter" />
                            </div>
                            <div className="flex gap-3 justify-end mt-6">
                                <button type="button" onClick={onClose}
                                    className="px-4 py-2 border border-slate-600 rounded-lg hover:bg-slate-700 transition">Cancel</button>
                                <button type="submit"
                                    className="px-4 py-2 bg-cyan-500 text-black font-bold rounded-lg hover:bg-cyan-400 transition">Save Slide</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }
        
        const SLIDE_TEMPLATES = [
            { id: 'title', name: 'Title Slide', icon: '🎯' },
            { id: 'agenda', name: 'Agenda', icon: '📋' },
            { id: 'team', name: 'Team Intro', icon: '👥' },
            { id: 'understanding', name: 'Understanding', icon: '🧠' },
            { id: 'approach', name: 'Technical Approach', icon: '⚙️' },
            { id: 'management', name: 'Management Plan', icon: '📊' },
            { id: 'past_perf', name: 'Past Performance', icon: '🏆' },
            { id: 'differentiator', name: 'Differentiator', icon: '💎' },
            { id: 'qa', name: 'Q&A', icon: '❓' },
            { id: 'closing', name: 'Closing', icon: '🎬' }
        ];
        
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
