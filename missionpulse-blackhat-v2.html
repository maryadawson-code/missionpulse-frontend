</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const ALLOWED_ROLES = ['CEO', 'COO', 'CAP'];

    const DEMO_COMPETITORS = [
      {
        id: 1,
        name: 'Leidos Health',
        logo: '🏢',
        threat_level: 'High',
        incumbent: false,
        pwin_estimate: 25,
        strengths: ['Largest health IT portfolio', 'DHA incumbent on multiple contracts', 'Deep bench of cleared staff'],
        weaknesses: ['High overhead rates', 'Recent delivery issues on DHMSM', 'Staff turnover in health division'],
        ghost_themes: ['Large company bureaucracy slows innovation', 'Cookie-cutter solutions miss unique requirements'],
        contracts: ['MHS Genesis Support', 'VA EHR Integration', 'TRICARE Claims'],
        estimated_rate: '$152/hr'
      },
      {
        id: 2,
        name: 'Booz Allen Hamilton',
        logo: '🏛️',
        threat_level: 'High',
        incumbent: false,
        pwin_estimate: 22,
        strengths: ['Strong DHA relationships', 'Consulting expertise', 'Well-known brand'],
        weaknesses: ['Premium pricing', 'Not a small business', 'Limited direct EHR experience'],
        ghost_themes: ['Consulting approach adds cost without direct delivery', 'Subcontracting model dilutes accountability'],
        contracts: ['DHA Analytics', 'VA Digital Transformation'],
        estimated_rate: '$165/hr'
      },
      {
        id: 3,
        name: 'GDIT',
        logo: '🔷',
        threat_level: 'Medium',
        incumbent: false,
        pwin_estimate: 18,
        strengths: ['Scale and resources', 'Cleared facility network', 'Established GovCon presence'],
        weaknesses: ['Slow to mobilize', 'Generic health IT approach', 'Recent merger integration issues'],
        ghost_themes: ['Size creates coordination challenges', 'Health IT not a core competency'],
        contracts: ['DoD Network Ops', 'Army Medical IT'],
        estimated_rate: '$145/hr'
      }
    ];

    const DEMO_OPP = {
      id: 'demo-1',
      nickname: 'EHR-Mod',
      title: 'DHA Electronic Health Record Modernization',
      ceiling: 125000000,
      incumbent: 'Leidos',
      set_aside: 'SDVOSB'
    };

    // Sidebar
    function Sidebar() {
      const navItems = [
        { icon: '🏠', label: 'Dashboard', path: 'index.html' },
        { icon: '📊', label: 'Pipeline', path: 'missionpulse-pipeline-v2.html' },
        { icon: '🎯', label: 'War Room', path: 'missionpulse-warroom-v2.html' },
        { icon: '🔍', label: 'RFP Shredder', path: 'missionpulse-rfpshredder-v2.html' },
        { icon: '🎭', label: 'Black Hat', path: 'missionpulse-blackhat-v2.html', active: true },
        { icon: '💰', label: 'Pricing', path: 'missionpulse-pricing-v2.html' },
        { icon: '🤖', label: 'Agent Hub', path: 'missionpulse-agenthub-v2.html' }
      ];

      return (
        <div className="w-64 bg-slate-900/50 border-r border-slate-700 min-h-screen p-4 hidden lg:block">
          <div className="flex items-center gap-3 mb-8">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-red-500 to-rose-600 flex items-center justify-center pulse-red">
              <span className="text-xl">🎭</span>
            </div>
            <div>
              <div className="font-bold text-red-400">Black Hat</div>
              <div className="text-xs text-slate-400">Competitive Intel</div>
            </div>
          </div>
          
          <nav className="space-y-1">
            {navItems.map((item, i) => (
              <a 
                key={i}
                href={item.path}
                className={`flex items-center gap-3 px-3 py-2 rounded-lg transition-all ${
                  item.active 
                    ? 'bg-red-500/20 text-red-400 border border-red-500/30' 
                    : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                }`}
              >
                <span>{item.icon}</span>
                <span className="text-sm">{item.label}</span>
              </a>
            ))}
          </nav>
        </div>
      );
    }

    // Access Denied
    function AccessDenied() {
      return (
        <div className="min-h-screen flex items-center justify-center p-6">
          <div className="text-center max-w-md">
            <div className="w-20 h-20 rounded-2xl bg-red-500/20 border border-red-500/30 flex items-center justify-center mx-auto mb-6">
              <span className="text-4xl">🔒</span>
            </div>
            <h1 className="text-2xl font-bold mb-2">Access Restricted</h1>
            <p className="text-slate-400 mb-6">
              Black Hat competitive intelligence is restricted to CEO, COO, and Capture Leads (CAP) only.
            </p>
            <a 
              href="index.html"
              className="inline-block px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg font-medium transition-colors"
            >
              ← Return to Dashboard
            </a>
          </div>
        </div>
      );
    }

    // Threat Badge
    function ThreatBadge({ level }) {
      const colors = {
        'Critical': 'bg-red-500 text-white',
        'High': 'bg-red-500/20 text-red-400 border border-red-500/30',
        'Medium': 'bg-amber-500/20 text-amber-400 border border-amber-500/30',
        'Low': 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30'
      };
      return <span className={`px-2 py-0.5 rounded text-xs ${colors[level]}`}>{level} Threat</span>;
    }

    // Competitor Card
    function CompetitorCard({ competitor, onSelect }) {
      return (
        <div 
          onClick={() => onSelect(competitor)}
          className="bg-slate-800/50 border border-slate-700 rounded-xl p-6 hover:border-red-500/50 transition-all cursor-pointer"
        >
          <div className="flex items-start justify-between mb-4">
            <div className="flex items-center gap-3">
              <div className="w-12 h-12 bg-slate-700 rounded-lg flex items-center justify-center text-2xl">
                {competitor.logo}
              </div>
              <div>
                <h3 className="font-semibold">{competitor.name}</h3>
                <div className="text-sm text-slate-400">Est. pWin: {competitor.pwin_estimate}%</div>
              </div>
            </div>
            <ThreatBadge level={competitor.threat_level} />
          </div>

          <div className="grid grid-cols-2 gap-4 mb-4">
            <div>
              <div className="text-xs text-slate-500 mb-1">Strengths</div>
              <div className="text-sm text-emerald-400">+{competitor.strengths.length}</div>
            </div>
            <div>
              <div className="text-xs text-slate-500 mb-1">Weaknesses</div>
              <div className="text-sm text-red-400">-{competitor.weaknesses.length}</div>
            </div>
          </div>

          <div className="flex items-center justify-between text-sm">
            <span className="text-slate-400">Est. Rate: {competitor.estimated_rate}</span>
            <span className="text-cyan-400">View Details →</span>
          </div>
        </div>
      );
    }

    // Competitor Detail Modal
    function CompetitorModal({ competitor, onClose }) {
      return (
        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
          <div className="bg-slate-800 border border-slate-700 rounded-xl max-w-3xl w-full max-h-[90vh] overflow-y-auto">
            <div className="p-6 border-b border-slate-700 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <div className="w-14 h-14 bg-slate-700 rounded-lg flex items-center justify-center text-3xl">
                  {competitor.logo}
                </div>
                <div>
                  <h2 className="text-xl font-bold">{competitor.name}</h2>
                  <div className="flex items-center gap-3 mt-1">
                    <ThreatBadge level={competitor.threat_level} />
                    <span className="text-sm text-slate-400">Est. pWin: {competitor.pwin_estimate}%</span>
                  </div>
                </div>
              </div>
              <button onClick={onClose} className="text-slate-400 hover:text-white text-xl">×</button>
            </div>
            
            <div className="p-6">
              {/* Strengths & Weaknesses */}
              <div className="grid md:grid-cols-2 gap-6 mb-6">
                <div>
                  <h3 className="font-semibold text-emerald-400 mb-3">💪 Strengths</h3>
                  <div className="space-y-2">
                    {competitor.strengths.map((s, i) => (
                      <div key={i} className="flex items-start gap-2 text-sm">
                        <span className="text-emerald-400">+</span>
                        <span>{s}</span>
                      </div>
                    ))}
                  </div>
                </div>
                <div>
                  <h3 className="font-semibold text-red-400 mb-3">⚠️ Weaknesses</h3>
                  <div className="space-y-2">
                    {competitor.weaknesses.map((w, i) => (
                      <div key={i} className="flex items-start gap-2 text-sm">
                        <span className="text-red-400">-</span>
                        <span>{w}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* Ghost Themes */}
              <div className="mb-6">
                <h3 className="font-semibold text-purple-400 mb-3">👻 Ghost Themes</h3>
                <div className="space-y-2">
                  {competitor.ghost_themes.map((g, i) => (
                    <div key={i} className="p-3 bg-purple-500/10 border border-purple-500/30 rounded-lg text-sm">
                      "{g}"
                    </div>
                  ))}
                </div>
              </div>

              {/* Known Contracts */}
              <div className="mb-6">
                <h3 className="font-semibold mb-3">📋 Known Contracts</h3>
                <div className="flex flex-wrap gap-2">
                  {competitor.contracts.map((c, i) => (
                    <span key={i} className="px-3 py-1 bg-slate-700 rounded-lg text-sm">{c}</span>
                  ))}
                </div>
              </div>

              {/* Pricing Intel */}
              <div className="p-4 bg-slate-900 rounded-lg">
                <div className="flex items-center justify-between">
                  <span className="text-slate-400">Estimated Blended Rate</span>
                  <span className="text-xl font-bold text-cyan-400">{competitor.estimated_rate}</span>
                </div>
              </div>
            </div>

            <div className="p-6 border-t border-slate-700 flex justify-between">
              <button className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
                📝 Edit Intel
              </button>
              <div className="flex gap-3">
                <button className="px-4 py-2 bg-purple-500/20 hover:bg-purple-500/30 border border-purple-500/30 text-purple-400 rounded-lg text-sm">
                  Generate Ghost Themes
                </button>
                <button onClick={onClose} className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg text-sm font-medium">
                  Close
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [user, setUser] = React.useState(null);
      const [hasAccess, setHasAccess] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [competitors, setCompetitors] = React.useState(DEMO_COMPETITORS);
      const [opp, setOpp] = React.useState(DEMO_OPP);
      const [selectedCompetitor, setSelectedCompetitor] = React.useState(null);

      React.useEffect(() => {
        checkAccess();
      }, []);

      const checkAccess = async () => {
        // Check demo session first
        const demoSession = localStorage.getItem('missionpulse_demo');
        if (demoSession) {
          const demo = JSON.parse(demoSession);
          if (demo.expires > Date.now()) {
            setUser(demo.user);
            setHasAccess(ALLOWED_ROLES.includes(demo.user.role));
            setLoading(false);
            return;
          }
        }

        // Check Supabase session
        try {
          const { data: { session } } = await supabase.auth.getSession();
          if (session) {
            const { data: profile } = await supabase
              .from('profiles')
              .select('role')
              .eq('id', session.user.id)
              .single();
            
            const role = profile?.role || 'Partner';
            setUser({ email: session.user.email, role });
            setHasAccess(ALLOWED_ROLES.includes(role));
          } else {
            // For demo, allow CEO access
            setUser({ email: 'demo@missionpulse.io', role: 'CEO' });
            setHasAccess(true);
          }
        } catch (e) {
          // Fallback to demo access
          setUser({ email: 'demo@missionpulse.io', role: 'CEO' });
          setHasAccess(true);
        }
        setLoading(false);
      };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-12 h-12 rounded-xl bg-red-500/20 flex items-center justify-center mx-auto mb-4 pulse-red">
                <span className="text-2xl">🎭</span>
              </div>
              <p className="text-slate-400">Verifying access...</p>
            </div>
          </div>
        );
      }

      if (!hasAccess) {
        return <AccessDenied />;
      }

      const highThreats = competitors.filter(c => c.threat_level === 'High' || c.threat_level === 'Critical').length;
      const totalPwin = competitors.reduce((sum, c) => sum + c.pwin_estimate, 0);
      const ourEstPwin = 100 - totalPwin;

      return (
        <div className="flex min-h-screen">
          <Sidebar />
          
          <div className="flex-1 p-4 lg:p-6">
            {/* RBAC Banner */}
            <div className="mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-lg flex items-center gap-3">
              <span className="text-red-400">🔒</span>
              <span className="text-sm">
                <span className="font-medium text-red-400">RESTRICTED:</span>
                <span className="text-slate-300"> Competitive intelligence for authorized personnel only (CEO, COO, CAP)</span>
              </span>
            </div>

            {/* Header */}
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
              <div>
                <h1 className="text-2xl font-bold">Black Hat Analysis</h1>
                <p className="text-slate-400 text-sm">{opp.title}</p>
              </div>
              
              <button className="px-4 py-2 bg-red-500 hover:bg-red-400 text-white rounded-lg text-sm font-medium">
                + Add Competitor
              </button>
            </div>

            {/* Stats */}
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <div className="text-2xl font-bold">{competitors.length}</div>
                <div className="text-sm text-slate-400">Known Competitors</div>
              </div>
              <div className="bg-slate-800/50 border border-red-500/30 rounded-xl p-4">
                <div className="text-2xl font-bold text-red-400">{highThreats}</div>
                <div className="text-sm text-slate-400">High Threats</div>
              </div>
              <div className="bg-slate-800/50 border border-cyan-500/30 rounded-xl p-4">
                <div className="text-2xl font-bold text-cyan-400">{ourEstPwin}%</div>
                <div className="text-sm text-slate-400">Our Est. pWin</div>
              </div>
              <div className="bg-slate-800/50 border border-amber-500/30 rounded-xl p-4">
                <div className="text-2xl font-bold text-amber-400">{opp.set_aside}</div>
                <div className="text-sm text-slate-400">Set-Aside</div>
              </div>
            </div>

            {/* Competitors Grid */}
            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
              {competitors.map(comp => (
                <CompetitorCard 
                  key={comp.id} 
                  competitor={comp} 
                  onSelect={setSelectedCompetitor}
                />
              ))}
            </div>

            {/* Quick Actions */}
            <div className="mt-6 flex flex-wrap gap-3">
              <button className="px-4 py-2 bg-purple-500/20 hover:bg-purple-500/30 border border-purple-500/30 text-purple-400 rounded-lg text-sm">
                👻 Generate All Ghosts
              </button>
              <button className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
                📊 Export Analysis
              </button>
              <button className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
                🤖 Ask Black Hat Agent
              </button>
            </div>

            {/* Footer */}
            <div className="mt-8 text-center text-xs text-slate-500">
              <div>Mission Meets Tech | MissionPulse Black Hat</div>
              <div className="mt-1">RBAC Protected • AI GENERATED - REQUIRES HUMAN REVIEW</div>
            </div>
          </div>

          {/* Modal */}
          {selectedCompetitor && (
            <CompetitorModal 
              competitor={selectedCompetitor} 
              onClose={() => setSelectedCompetitor(null)} 
            />
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
