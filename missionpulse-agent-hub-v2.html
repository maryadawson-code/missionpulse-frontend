<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MissionPulse - AI Agent Hub v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(0, 229, 250, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.2); }
        .glass-hover:hover { background: rgba(0, 229, 250, 0.1); border-color: rgba(0, 229, 250, 0.4); }
        .glow { box-shadow: 0 0 20px rgba(0, 229, 250, 0.3); }
        .glow-pulse { animation: pulse-glow 2s ease-in-out infinite; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(0, 229, 250, 0.3); } 50% { box-shadow: 0 0 40px rgba(0, 229, 250, 0.5); } }
        .cui-glow { box-shadow: 0 0 20px rgba(245, 158, 11, 0.4); }
        .typing-indicator span { animation: typing 1.4s infinite ease-in-out; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: rgba(0, 229, 250, 0.1); }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(0, 229, 250, 0.3); border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // =========================================================================
        // CONFIGURATION
        // =========================================================================
        const API_BASE = 'https://missionpulse-api.onrender.com';
        const ASKSAGE_API = 'https://api.asksage.ai/v1'; // Configure with actual endpoint

        // =========================================================================
        // MODEL ROUTER (Embedded)
        // =========================================================================
        const ModelRouter = {
            cuiPatterns: {
                explicit: [/\bCUI\b/i, /\bFOUO\b/i, /\bPROPIN\b/i, /controlled\s*unclassified/i, /competition\s*sensitive/i],
                pricing: [/labor\s*rate/i, /indirect\s*rate/i, /overhead/i, /G&A/i, /BOE/i, /cost\s*volume/i, /\$[\d,]+\s*(K|M|B)/i, /\$[\d,]{6,}/, /profit\s*margin/i],
                competitive: [/competitor/i, /black\s*hat/i, /competitive\s*intel/i, /win\s*strategy/i, /discriminator/i, /price\s*to\s*win/i, /PTW/i],
                personnel: [/\b\d{3}-\d{2}-\d{4}\b/, /security\s*clearance/i, /TS\/SCI/i, /top\s*secret/i, /salary/i, /key\s*personnel/i],
                technical: [/proprietary\s*solution/i, /trade\s*secret/i, /technical\s*approach/i]
            },

            detectCUI(content, moduleContext = '') {
                if (!content) return { isCUI: false, confidence: 0, categories: [] };
                
                // Always CUI modules
                const cuiModules = ['pricing', 'blackhat', 'competitive'];
                if (cuiModules.some(m => moduleContext.toLowerCase().includes(m))) {
                    return { isCUI: true, confidence: 0.95, categories: ['module-context'], forced: true };
                }

                let matches = [];
                for (const [category, patterns] of Object.entries(this.cuiPatterns)) {
                    for (const pattern of patterns) {
                        if (pattern.test(content)) {
                            matches.push(category);
                            break;
                        }
                    }
                }

                const confidence = matches.length >= 3 ? 0.95 : matches.length === 2 ? 0.8 : matches.length === 1 ? 0.6 : 0;
                return { isCUI: matches.length > 0, confidence, categories: [...new Set(matches)] };
            },

            selectModel(content, isCUI, taskType = 'general') {
                if (!isCUI) return { backend: 'anthropic', model: 'claude-sonnet', name: 'Anthropic Claude' };
                
                const tokenEstimate = Math.ceil(content.length / 4);
                
                // Task-based selection for AskSage
                if (tokenEstimate > 100000) {
                    return { backend: 'asksage', model: 'gemini-2.5-pro', name: 'Gemini 2.5 Pro', reason: 'Large context needed' };
                }
                if (content.match(/code|script|function|python|sql/i)) {
                    return { backend: 'asksage', model: 'aws-gov-claude-4.5-sonnet', name: 'AWS Gov Claude 4.5', reason: 'Code generation' };
                }
                if (content.match(/image|diagram|visual|draw/i)) {
                    return { backend: 'asksage', model: 'google-imagen-4', name: 'Google Imagen 4', reason: 'Image generation' };
                }
                if (content.match(/what is|define|explain briefly/i)) {
                    return { backend: 'asksage', model: 'nova-lite', name: 'AWS Nova Lite', reason: 'Quick answer (cost-optimized)' };
                }
                
                // Default CUI model
                return { backend: 'asksage', model: 'aws-gov-claude-4.5-sonnet', name: 'AWS Gov Claude 4.5 Sonnet', reason: 'CUI compliance' };
            }
        };

        // =========================================================================
        // AGENT DEFINITIONS
        // =========================================================================
        const AGENTS = [
            {
                id: 'capture',
                name: 'Capture Agent',
                icon: '🎯',
                description: 'Pipeline strategy & opportunity qualification',
                endpoint: '/agents/capture/chat',
                color: 'cyan',
                rbac: ['CEO', 'COO', 'CAP', 'PM', 'SA', 'FIN', 'CON', 'DEL', 'QA', 'Partner', 'Admin'],
                cuiDefault: false
            },
            {
                id: 'strategy',
                name: 'Strategy Agent',
                icon: '♟️',
                description: 'Win themes, discriminators & positioning',
                endpoint: '/agents/strategy/chat',
                color: 'emerald',
                rbac: ['CEO', 'COO', 'CAP', 'PM', 'SA'],
                cuiDefault: false
            },
            {
                id: 'blackhat',
                name: 'Black Hat Agent',
                icon: '🎩',
                description: 'Competitive intelligence & counter-strategies',
                endpoint: '/agents/blackhat/chat',
                color: 'red',
                rbac: ['CEO', 'COO', 'CAP', 'Admin'],
                cuiDefault: true,
                cuiReason: 'Competitive intelligence is always CUI'
            },
            {
                id: 'pricing',
                name: 'Pricing Agent',
                icon: '💰',
                description: 'BOE development, rate analysis & cost strategy',
                endpoint: '/agents/pricing/chat',
                color: 'amber',
                rbac: ['CEO', 'COO', 'FIN', 'PM'],
                cuiDefault: true,
                cuiReason: 'Pricing data is always CUI'
            },
            {
                id: 'compliance',
                name: 'Compliance Agent',
                icon: '✓',
                description: 'FAR/DFARS analysis & compliance matrix',
                endpoint: '/agents/compliance/chat',
                color: 'blue',
                rbac: ['CEO', 'COO', 'CAP', 'PM', 'SA', 'FIN', 'CON', 'DEL', 'QA', 'Partner', 'Admin'],
                cuiDefault: false
            },
            {
                id: 'writer',
                name: 'Writer Agent',
                icon: '✍️',
                description: 'Proposal narrative & section development',
                endpoint: '/agents/writer/chat',
                color: 'purple',
                rbac: ['CEO', 'COO', 'CAP', 'PM', 'SA', 'FIN', 'CON', 'DEL', 'QA', 'Partner', 'Admin'],
                cuiDefault: false
            },
            {
                id: 'contracts',
                name: 'Contracts Agent',
                icon: '📋',
                description: 'Contract clause analysis & risk assessment',
                endpoint: '/agents/contracts/chat',
                color: 'indigo',
                rbac: ['CEO', 'COO', 'CAP', 'PM', 'SA', 'FIN', 'CON', 'DEL', 'QA', 'Partner', 'Admin'],
                cuiDefault: false
            },
            {
                id: 'orals',
                name: 'Orals Agent',
                icon: '🎤',
                description: 'Presentation prep & Q&A simulation',
                endpoint: '/agents/orals/chat',
                color: 'pink',
                rbac: ['CEO', 'COO', 'CAP', 'PM', 'SA'],
                cuiDefault: false
            },
            {
                id: 'asksage',
                name: 'AskSage Agent',
                icon: '🔐',
                description: 'FedRAMP High / IL5 compliant queries',
                endpoint: '/agents/asksage/chat',
                color: 'orange',
                rbac: ['CEO', 'COO', 'CAP', 'PM', 'SA', 'FIN', 'CON', 'Admin'],
                cuiDefault: true,
                cuiReason: 'FedRAMP High environment',
                fedrampHigh: true
            }
        ];

        // =========================================================================
        // ROUTING INDICATOR COMPONENT
        // =========================================================================
        function RoutingIndicator({ routingInfo }) {
            if (!routingInfo) return null;

            const isCUI = routingInfo.cuiDetection?.isCUI;
            const backend = routingInfo.backend;
            const model = routingInfo.modelName;
            const confidence = routingInfo.cuiDetection?.confidence || 0;

            return (
                <div className={`flex items-center gap-2 px-3 py-2 rounded-lg text-xs ${
                    isCUI ? 'bg-amber-500/20 border border-amber-500/40' : 'bg-emerald-500/20 border border-emerald-500/40'
                }`}>
                    <div className={`w-2 h-2 rounded-full ${isCUI ? 'bg-amber-400 animate-pulse' : 'bg-emerald-400'}`} />
                    <div>
                        <span className="font-medium">
                            {isCUI ? '🔐 CUI DETECTED' : '✓ Non-CUI'}
                        </span>
                        {isCUI && confidence > 0 && (
                            <span className="text-amber-300 ml-1">({Math.round(confidence * 100)}%)</span>
                        )}
                    </div>
                    <div className="text-slate-400">→</div>
                    <div className={isCUI ? 'text-amber-300' : 'text-emerald-300'}>
                        {backend === 'asksage' ? `AskSage: ${model}` : `Anthropic: ${model}`}
                    </div>
                </div>
            );
        }

        // =========================================================================
        // CHAT MESSAGE COMPONENT
        // =========================================================================
        function ChatMessage({ message, isUser, routingInfo, timestamp }) {
            return (
                <div className={`flex ${isUser ? 'justify-end' : 'justify-start'} mb-4`}>
                    <div className={`max-w-[80%] ${isUser ? 'order-2' : 'order-1'}`}>
                        {!isUser && routingInfo && (
                            <div className="mb-2">
                                <RoutingIndicator routingInfo={routingInfo} />
                            </div>
                        )}
                        <div className={`px-4 py-3 rounded-2xl ${
                            isUser 
                                ? 'bg-cyan-500/20 border border-cyan-500/40 rounded-br-md' 
                                : 'glass rounded-bl-md'
                        }`}>
                            <p className="whitespace-pre-wrap">{message}</p>
                        </div>
                        <div className={`text-xs text-slate-500 mt-1 ${isUser ? 'text-right' : 'text-left'}`}>
                            {timestamp}
                        </div>
                    </div>
                </div>
            );
        }

        // =========================================================================
        // TYPING INDICATOR COMPONENT
        // =========================================================================
        function TypingIndicator() {
            return (
                <div className="flex justify-start mb-4">
                    <div className="glass px-4 py-3 rounded-2xl rounded-bl-md">
                        <div className="typing-indicator flex gap-1">
                            <span className="w-2 h-2 bg-cyan-400 rounded-full"></span>
                            <span className="w-2 h-2 bg-cyan-400 rounded-full"></span>
                            <span className="w-2 h-2 bg-cyan-400 rounded-full"></span>
                        </div>
                    </div>
                </div>
            );
        }

        // =========================================================================
        // AGENT CARD COMPONENT
        // =========================================================================
        function AgentCard({ agent, isSelected, onClick }) {
            const colorMap = {
                cyan: 'border-cyan-500/40 hover:border-cyan-400',
                emerald: 'border-emerald-500/40 hover:border-emerald-400',
                red: 'border-red-500/40 hover:border-red-400',
                amber: 'border-amber-500/40 hover:border-amber-400',
                blue: 'border-blue-500/40 hover:border-blue-400',
                purple: 'border-purple-500/40 hover:border-purple-400',
                indigo: 'border-indigo-500/40 hover:border-indigo-400',
                pink: 'border-pink-500/40 hover:border-pink-400',
                orange: 'border-orange-500/40 hover:border-orange-400'
            };

            return (
                <button
                    onClick={onClick}
                    className={`glass glass-hover p-4 rounded-xl text-left transition-all duration-300 ${
                        isSelected ? 'glow ring-2 ring-cyan-400' : ''
                    } ${colorMap[agent.color] || ''}`}
                >
                    <div className="flex items-center gap-3 mb-2">
                        <span className="text-2xl">{agent.icon}</span>
                        <div>
                            <h3 className="font-semibold text-white">{agent.name}</h3>
                            {agent.cuiDefault && (
                                <span className="text-xs bg-amber-500/30 text-amber-300 px-2 py-0.5 rounded-full">
                                    CUI Default
                                </span>
                            )}
                            {agent.fedrampHigh && (
                                <span className="text-xs bg-orange-500/30 text-orange-300 px-2 py-0.5 rounded-full ml-1">
                                    FedRAMP High
                                </span>
                            )}
                        </div>
                    </div>
                    <p className="text-sm text-slate-400">{agent.description}</p>
                </button>
            );
        }

        // =========================================================================
        // MAIN APP COMPONENT
        // =========================================================================
        function App() {
            const [selectedAgent, setSelectedAgent] = useState(null);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [apiStatus, setApiStatus] = useState('checking');
            const [currentRouting, setCurrentRouting] = useState(null);
            const messagesEndRef = useRef(null);

            // Check API health on mount
            useEffect(() => {
                checkApiHealth();
            }, []);

            // Auto-scroll to bottom
            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const checkApiHealth = async () => {
                try {
                    const response = await fetch(`${API_BASE}/api/health`);
                    if (response.ok) {
                        setApiStatus('connected');
                    } else {
                        setApiStatus('error');
                    }
                } catch (error) {
                    setApiStatus('offline');
                }
            };

            const handleSendMessage = async () => {
                if (!input.trim() || !selectedAgent || isLoading) return;

                const userMessage = input.trim();
                const timestamp = new Date().toLocaleTimeString();

                // Add user message
                setMessages(prev => [...prev, { 
                    text: userMessage, 
                    isUser: true, 
                    timestamp 
                }]);
                setInput('');
                setIsLoading(true);

                // Detect CUI and route
                const cuiDetection = ModelRouter.detectCUI(userMessage, selectedAgent.id);
                const isCUI = cuiDetection.isCUI || selectedAgent.cuiDefault;
                const modelSelection = ModelRouter.selectModel(userMessage, isCUI);

                const routingInfo = {
                    cuiDetection: { ...cuiDetection, isCUI },
                    backend: modelSelection.backend,
                    model: modelSelection.model,
                    modelName: modelSelection.name,
                    reason: modelSelection.reason || (isCUI ? 'CUI content detected' : 'Standard routing')
                };

                setCurrentRouting(routingInfo);

                try {
                    // Route to appropriate backend
                    let endpoint, payload;
                    
                    if (routingInfo.backend === 'asksage' || selectedAgent.id === 'asksage') {
                        // For now, still route through our API which will forward to AskSage
                        endpoint = `${API_BASE}/api${selectedAgent.endpoint}`;
                        payload = { 
                            message: userMessage,
                            model: routingInfo.model,
                            cui_detected: isCUI
                        };
                    } else {
                        endpoint = `${API_BASE}/api${selectedAgent.endpoint}`;
                        payload = { message: userMessage };
                    }

                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();
                    const responseTimestamp = new Date().toLocaleTimeString();

                    // Format response with CUI marking if applicable
                    let responseText = data.response || data.message || 'No response received.';
                    if (isCUI && !responseText.includes('CUI //')) {
                        responseText = `${responseText}\n\n---\n*CUI // SP-PROPIN*`;
                    }

                    setMessages(prev => [...prev, { 
                        text: responseText, 
                        isUser: false, 
                        timestamp: responseTimestamp,
                        routingInfo
                    }]);

                } catch (error) {
                    console.error('Chat error:', error);
                    setMessages(prev => [...prev, { 
                        text: `Connection error: ${error.message}. API may be starting up - please retry in 30 seconds.`, 
                        isUser: false, 
                        timestamp: new Date().toLocaleTimeString(),
                        routingInfo
                    }]);
                }

                setIsLoading(false);
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSendMessage();
                }
            };

            const clearChat = () => {
                setMessages([]);
                setCurrentRouting(null);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="glass border-b border-cyan-500/20 px-6 py-4">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="text-2xl font-bold">
                                    <span className="text-cyan-400">Mission</span>
                                    <span className="text-white">Pulse</span>
                                </div>
                                <span className="text-slate-500">|</span>
                                <span className="text-slate-400">AI Agent Hub v2.0</span>
                                <span className="text-xs bg-cyan-500/20 text-cyan-400 px-2 py-1 rounded-full">
                                    Intelligent Routing
                                </span>
                            </div>
                            <div className="flex items-center gap-4">
                                {/* API Status */}
                                <div className={`flex items-center gap-2 px-3 py-1 rounded-full text-xs ${
                                    apiStatus === 'connected' ? 'bg-emerald-500/20 text-emerald-400' :
                                    apiStatus === 'checking' ? 'bg-amber-500/20 text-amber-400' :
                                    'bg-red-500/20 text-red-400'
                                }`}>
                                    <div className={`w-2 h-2 rounded-full ${
                                        apiStatus === 'connected' ? 'bg-emerald-400' :
                                        apiStatus === 'checking' ? 'bg-amber-400 animate-pulse' :
                                        'bg-red-400'
                                    }`} />
                                    {apiStatus === 'connected' ? 'API Connected' :
                                     apiStatus === 'checking' ? 'Checking...' :
                                     'API Offline'}
                                </div>
                                <a href="index.html" className="text-slate-400 hover:text-cyan-400 transition-colors">
                                    ← Dashboard
                                </a>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 max-w-7xl w-full mx-auto p-6 flex gap-6">
                        {/* Agent Selection */}
                        <div className="w-80 flex-shrink-0">
                            <h2 className="text-lg font-semibold mb-4 text-cyan-400">Select Agent</h2>
                            <div className="space-y-3">
                                {AGENTS.map(agent => (
                                    <AgentCard
                                        key={agent.id}
                                        agent={agent}
                                        isSelected={selectedAgent?.id === agent.id}
                                        onClick={() => {
                                            setSelectedAgent(agent);
                                            setMessages([]);
                                            setCurrentRouting(null);
                                        }}
                                    />
                                ))}
                            </div>

                            {/* Routing Legend */}
                            <div className="mt-6 glass p-4 rounded-xl">
                                <h3 className="text-sm font-semibold mb-3 text-slate-300">Routing Logic</h3>
                                <div className="space-y-2 text-xs">
                                    <div className="flex items-center gap-2">
                                        <div className="w-3 h-3 rounded-full bg-amber-400" />
                                        <span className="text-slate-400">CUI → AskSage (FedRAMP High)</span>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <div className="w-3 h-3 rounded-full bg-emerald-400" />
                                        <span className="text-slate-400">Non-CUI → Anthropic Claude</span>
                                    </div>
                                </div>
                                <p className="mt-3 text-xs text-slate-500">
                                    Pricing & Black Hat agents always use CUI-compliant routing.
                                </p>
                            </div>
                        </div>

                        {/* Chat Area */}
                        <div className="flex-1 glass rounded-2xl flex flex-col overflow-hidden">
                            {selectedAgent ? (
                                <>
                                    {/* Chat Header */}
                                    <div className="px-6 py-4 border-b border-cyan-500/20 flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                            <span className="text-2xl">{selectedAgent.icon}</span>
                                            <div>
                                                <h2 className="font-semibold">{selectedAgent.name}</h2>
                                                <p className="text-sm text-slate-400">{selectedAgent.description}</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            {selectedAgent.cuiDefault && (
                                                <span className="text-xs bg-amber-500/30 text-amber-300 px-3 py-1 rounded-full">
                                                    🔐 CUI Mode Active
                                                </span>
                                            )}
                                            {messages.length > 0 && (
                                                <button
                                                    onClick={clearChat}
                                                    className="text-sm text-slate-400 hover:text-red-400 transition-colors"
                                                >
                                                    Clear Chat
                                                </button>
                                            )}
                                        </div>
                                    </div>

                                    {/* Messages */}
                                    <div className="flex-1 overflow-y-auto p-6 scrollbar-thin">
                                        {messages.length === 0 ? (
                                            <div className="h-full flex items-center justify-center text-slate-500">
                                                <div className="text-center">
                                                    <span className="text-4xl mb-4 block">{selectedAgent.icon}</span>
                                                    <p>Start a conversation with {selectedAgent.name}</p>
                                                    {selectedAgent.cuiDefault && (
                                                        <p className="text-amber-400 text-sm mt-2">
                                                            ⚠️ All messages routed to FedRAMP High models
                                                        </p>
                                                    )}
                                                </div>
                                            </div>
                                        ) : (
                                            <>
                                                {messages.map((msg, idx) => (
                                                    <ChatMessage 
                                                        key={idx} 
                                                        message={msg.text} 
                                                        isUser={msg.isUser}
                                                        routingInfo={msg.routingInfo}
                                                        timestamp={msg.timestamp}
                                                    />
                                                ))}
                                                {isLoading && <TypingIndicator />}
                                                <div ref={messagesEndRef} />
                                            </>
                                        )}
                                    </div>

                                    {/* Input */}
                                    <div className="p-4 border-t border-cyan-500/20">
                                        <div className="flex gap-3">
                                            <textarea
                                                value={input}
                                                onChange={(e) => setInput(e.target.value)}
                                                onKeyPress={handleKeyPress}
                                                placeholder={`Ask ${selectedAgent.name}...`}
                                                className="flex-1 bg-slate-900/50 border border-cyan-500/30 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-400 resize-none"
                                                rows={2}
                                                disabled={isLoading}
                                            />
                                            <button
                                                onClick={handleSendMessage}
                                                disabled={!input.trim() || isLoading}
                                                className={`px-6 rounded-xl font-medium transition-all duration-300 ${
                                                    input.trim() && !isLoading
                                                        ? 'bg-cyan-500 hover:bg-cyan-400 text-slate-900 glow'
                                                        : 'bg-slate-800 text-slate-500 cursor-not-allowed'
                                                }`}
                                            >
                                                {isLoading ? '...' : 'Send'}
                                            </button>
                                        </div>
                                        <p className="text-xs text-slate-500 mt-2 text-center">
                                            Press Enter to send • Shift+Enter for new line
                                        </p>
                                    </div>
                                </>
                            ) : (
                                <div className="flex-1 flex items-center justify-center text-slate-500">
                                    <div className="text-center">
                                        <span className="text-6xl mb-4 block">🤖</span>
                                        <p className="text-lg">Select an agent to begin</p>
                                        <p className="text-sm mt-2">9 specialized AI agents ready to assist</p>
                                    </div>
                                </div>
                            )}
                        </div>
