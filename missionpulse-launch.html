<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launch Checklist | MissionPulse</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.1); }
    .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    .pulse-animation { animation: pulse 2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Demo checklist data
    const DEMO_CHECKLIST = [
      {
        id: 'vol1',
        category: 'Volume I - Technical',
        items: [
          { id: 1, task: 'Executive Summary complete', status: 'complete', assignee: 'Mary W.', dueDate: '2025-02-01', notes: 'Final review complete' },
          { id: 2, task: 'Technical Approach section reviewed', status: 'complete', assignee: 'John S.', dueDate: '2025-02-01', notes: '' },
          { id: 3, task: 'Management Approach finalized', status: 'in_progress', assignee: 'Sarah C.', dueDate: '2025-02-02', notes: 'Pending PM approval' },
          { id: 4, task: 'Past Performance narratives validated', status: 'complete', assignee: 'Mike J.', dueDate: '2025-02-01', notes: 'All 3 references confirmed' },
          { id: 5, task: 'Page count compliance verified', status: 'pending', assignee: 'Emily D.', dueDate: '2025-02-02', notes: '45/50 pages used' },
        ]
      },
      {
        id: 'vol2',
        category: 'Volume II - Pricing',
        items: [
          { id: 6, task: 'BOE finalized and signed', status: 'complete', assignee: 'Sarah C.', dueDate: '2025-02-01', notes: 'CUI marked' },
          { id: 7, task: 'Labor rates validated against GSA', status: 'complete', assignee: 'Sarah C.', dueDate: '2025-02-01', notes: 'All rates compliant' },
          { id: 8, task: 'Price narrative reviewed', status: 'in_progress', assignee: 'Mary W.', dueDate: '2025-02-02', notes: '' },
          { id: 9, task: 'Subcontractor pricing confirmed', status: 'pending', assignee: 'Mike J.', dueDate: '2025-02-02', notes: 'Waiting on Acme Corp' },
        ]
      },
      {
        id: 'vol3',
        category: 'Volume III - Admin',
        items: [
          { id: 10, task: 'Representations & Certifications complete', status: 'complete', assignee: 'Emily D.', dueDate: '2025-02-01', notes: '' },
          { id: 11, task: 'Teaming Agreement executed', status: 'complete', assignee: 'Mary W.', dueDate: '2025-01-28', notes: 'With Acme Corp' },
          { id: 12, task: 'Key Personnel resumes updated', status: 'complete', assignee: 'John S.', dueDate: '2025-02-01', notes: '5 KP confirmed' },
          { id: 13, task: 'DUNS/CAGE numbers verified', status: 'complete', assignee: 'Emily D.', dueDate: '2025-01-30', notes: '' },
        ]
      },
      {
        id: 'compliance',
        category: 'Compliance & Quality',
        items: [
          { id: 14, task: 'Section L compliance matrix complete', status: 'complete', assignee: 'Mike J.', dueDate: '2025-02-01', notes: '24/24 items addressed' },
          { id: 15, task: 'Section M evaluation criteria mapped', status: 'complete', assignee: 'Mike J.', dueDate: '2025-02-01', notes: '' },
          { id: 16, task: 'Red Team review incorporated', status: 'in_progress', assignee: 'John S.', dueDate: '2025-02-02', notes: '8 items remaining' },
          { id: 17, task: 'Final Gold Team review', status: 'pending', assignee: 'Mary W.', dueDate: '2025-02-03', notes: 'Scheduled 9am' },
        ]
      },
      {
        id: 'submission',
        category: 'Final Submission',
        items: [
          { id: 18, task: 'PDF exports generated', status: 'pending', assignee: 'Emily D.', dueDate: '2025-02-03', notes: '' },
          { id: 19, task: 'File naming convention verified', status: 'pending', assignee: 'Emily D.', dueDate: '2025-02-03', notes: '' },
          { id: 20, task: 'Portal upload tested', status: 'pending', assignee: 'Emily D.', dueDate: '2025-02-03', notes: 'eBuy portal' },
          { id: 21, task: 'Submission confirmation received', status: 'pending', assignee: 'Mary W.', dueDate: '2025-02-03', notes: '' },
        ]
      },
    ];

    const STATUS_CONFIG = {
      complete: { label: 'Complete', bg: 'bg-emerald-500/20', text: 'text-emerald-400', border: 'border-emerald-500/30', icon: '✓' },
      in_progress: { label: 'In Progress', bg: 'bg-amber-500/20', text: 'text-amber-400', border: 'border-amber-500/30', icon: '◐' },
      pending: { label: 'Pending', bg: 'bg-slate-500/20', text: 'text-slate-400', border: 'border-slate-500/30', icon: '○' },
      blocked: { label: 'Blocked', bg: 'bg-red-500/20', text: 'text-red-400', border: 'border-red-500/30', icon: '!' },
    };

    function LaunchChecklist() {
      const [checklist, setChecklist] = useState(DEMO_CHECKLIST);
      const [expandedCategories, setExpandedCategories] = useState(['vol1', 'vol2', 'vol3', 'compliance', 'submission']);
      const [filterStatus, setFilterStatus] = useState('all');

      const toggleCategory = (id) => {
        setExpandedCategories(prev => 
          prev.includes(id) ? prev.filter(c => c !== id) : [...prev, id]
        );
      };

      const toggleItemStatus = (categoryId, itemId) => {
        setChecklist(prev => prev.map(cat => {
          if (cat.id !== categoryId) return cat;
          return {
            ...cat,
            items: cat.items.map(item => {
              if (item.id !== itemId) return item;
              const statusOrder = ['pending', 'in_progress', 'complete'];
              const currentIdx = statusOrder.indexOf(item.status);
              const nextIdx = (currentIdx + 1) % statusOrder.length;
              return { ...item, status: statusOrder[nextIdx] };
            })
          };
        }));
      };

      // Calculate stats
      const allItems = checklist.flatMap(c => c.items);
      const stats = {
        total: allItems.length,
        complete: allItems.filter(i => i.status === 'complete').length,
        inProgress: allItems.filter(i => i.status === 'in_progress').length,
        pending: allItems.filter(i => i.status === 'pending').length,
      };
      const progress = Math.round((stats.complete / stats.total) * 100);

      // Submission countdown
      const submissionDate = new Date('2025-02-03T17:00:00');
      const now = new Date();
      const hoursRemaining = Math.max(0, Math.floor((submissionDate - now) / (1000 * 60 * 60)));

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
            <div className="max-w-[1800px] mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="missionpulse-nav-hub.html" className="text-slate-400 hover:text-white transition-colors">
                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
                    </svg>
                  </a>
                  <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-orange-500 to-red-600 flex items-center justify-center">
                    <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold text-white">Launch Checklist</h1>
                    <p className="text-xs text-orange-400">DHA HCIT Modernization - Submission Readiness</p>
                  </div>
                </div>
                <div className="flex items-center gap-4">
                  <div className={`px-4 py-2 rounded-xl ${hoursRemaining < 24 ? 'bg-red-500/20 border-red-500/30' : 'bg-amber-500/20 border-amber-500/30'} border`}>
                    <span className={`text-sm font-medium ${hoursRemaining < 24 ? 'text-red-400' : 'text-amber-400'}`}>
                      ⏰ {hoursRemaining}h until submission
                    </span>
                  </div>
                </div>
              </div>
            </div>
          </header>

          <div className="max-w-[1800px] mx-auto px-6 py-8">
            {/* Progress Overview */}
            <div className="glass-card rounded-2xl p-6 mb-8">
              <div className="flex items-center justify-between mb-4">
                <h2 className="text-lg font-semibold text-white">Submission Readiness</h2>
                <span className={`text-3xl font-bold ${progress >= 80 ? 'text-emerald-400' : progress >= 50 ? 'text-amber-400' : 'text-red-400'}`}>
                  {progress}%
                </span>
              </div>
              <div className="w-full bg-slate-800 rounded-full h-4 mb-6">
                <div 
                  className={`h-4 rounded-full transition-all duration-500 ${progress >= 80 ? 'bg-gradient-to-r from-emerald-500 to-teal-500' : progress >= 50 ? 'bg-gradient-to-r from-amber-500 to-orange-500' : 'bg-gradient-to-r from-red-500 to-pink-500'}`}
                  style={{ width: `${progress}%` }}
                ></div>
              </div>
              <div className="grid grid-cols-4 gap-4">
                <div className="text-center">
                  <p className="text-2xl font-bold text-emerald-400">{stats.complete}</p>
                  <p className="text-sm text-slate-400">Complete</p>
                </div>
                <div className="text-center">
                  <p className="text-2xl font-bold text-amber-400">{stats.inProgress}</p>
                  <p className="text-sm text-slate-400">In Progress</p>
                </div>
                <div className="text-center">
                  <p className="text-2xl font-bold text-slate-400">{stats.pending}</p>
                  <p className="text-sm text-slate-400">Pending</p>
                </div>
                <div className="text-center">
                  <p className="text-2xl font-bold text-white">{stats.total}</p>
                  <p className="text-sm text-slate-400">Total Items</p>
                </div>
              </div>
            </div>

            {/* Filter */}
            <div className="flex items-center gap-2 mb-6">
              {['all', 'pending', 'in_progress', 'complete'].map(status => (
                <button
                  key={status}
                  onClick={() => setFilterStatus(status)}
                  className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                    filterStatus === status 
                      ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' 
                      : 'bg-slate-800/50 text-slate-400 border border-slate-700'
                  }`}
                >
                  {status === 'all' ? 'All Items' : STATUS_CONFIG[status]?.label}
                </button>
              ))}
            </div>

            {/* Checklist Categories */}
            <div className="space-y-4">
              {checklist.map(category => {
                const filteredItems = filterStatus === 'all' 
                  ? category.items 
                  : category.items.filter(i => i.status === filterStatus);
                
                if (filteredItems.length === 0) return null;

                const categoryComplete = category.items.filter(i => i.status === 'complete').length;
                const categoryTotal = category.items.length;
                const categoryProgress = Math.round((categoryComplete / categoryTotal) * 100);

                return (
                  <div key={category.id} className="glass-card rounded-xl overflow-hidden">
                    <button
                      onClick={() => toggleCategory(category.id)}
                      className="w-full px-6 py-4 flex items-center justify-between hover:bg-slate-800/30 transition-colors"
                    >
                      <div className="flex items-center gap-4">
                        <svg 
                          className={`w-5 h-5 text-slate-400 transition-transform ${expandedCategories.includes(category.id) ? 'rotate-90' : ''}`} 
                          fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        >
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                        </svg>
                        <h3 className="text-lg font-semibold text-white">{category.category}</h3>
                        <span className="text-sm text-slate-400">{categoryComplete}/{categoryTotal}</span>
                      </div>
                      <div className="flex items-center gap-3">
                        <div className="w-32 bg-slate-700 rounded-full h-2">
                          <div 
                            className="bg-emerald-500 h-2 rounded-full"
                            style={{ width: `${categoryProgress}%` }}
                          ></div>
                        </div>
                        <span className="text-sm text-slate-400 w-12">{categoryProgress}%</span>
                      </div>
                    </button>

                    {expandedCategories.includes(category.id) && (
                      <div className="px-6 pb-4">
                        <div className="space-y-2">
                          {filteredItems.map(item => (
                            <div 
                              key={item.id}
                              className="flex items-center gap-4 p-3 rounded-lg hover:bg-slate-800/30 transition-colors group"
                            >
                              <button
                                onClick={() => toggleItemStatus(category.id, item.id)}
                                className={`w-6 h-6 rounded-full flex items-center justify-center border-2 transition-all ${STATUS_CONFIG[item.status].border} ${STATUS_CONFIG[item.status].bg}`}
                              >
                                <span className={`text-sm ${STATUS_CONFIG[item.status].text}`}>
                                  {STATUS_CONFIG[item.status].icon}
                                </span>
                              </button>
                              <div className="flex-1">
                                <p className={`font-medium ${item.status === 'complete' ? 'text-slate-400 line-through' : 'text-white'}`}>
                                  {item.task}
                                </p>
                                {item.notes && (
                                  <p className="text-xs text-slate-500 mt-0.5">{item.notes}</p>
                                )}
                              </div>
                              <div className="flex items-center gap-4 text-sm">
                                <span className="text-slate-400">{item.assignee}</span>
                                <span className={`${new Date(item.dueDate) < now && item.status !== 'complete' ? 'text-red-400' : 'text-slate-500'}`}>
                                  {new Date(item.dueDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}
                                </span>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Launch Button */}
            {progress === 100 && (
              <div className="mt-8 text-center">
                <button className="px-8 py-4 bg-gradient-to-r from-emerald-500 to-teal-500 text-white text-lg font-bold rounded-xl hover:from-emerald-400 hover:to-teal-400 transition-all pulse-animation">
                  🚀 READY FOR SUBMISSION
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<LaunchChecklist />);
  </script>
</body>
</html>
