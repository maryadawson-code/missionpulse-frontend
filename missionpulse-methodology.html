<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Methodology | MissionPulse</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(0, 5, 15, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.2); }
        .glow { box-shadow: 0 0 30px rgba(0, 229, 250, 0.3); }
        .cyber-grid { background-image: linear-gradient(rgba(0, 229, 250, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 250, 0.03) 1px, transparent 1px); background-size: 50px 50px; }
    </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen cyber-grid">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc4MjMwMjgsImV4cCI6MjA1MzM5OTAyOH0.S0LKvPzVIfBsLv-2qjXRdMGhnYyRLvOFlo9ihaQuqHE';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const DEMO_METHODOLOGIES = [
            { id: 1, name: 'Shipley', description: 'Industry-standard capture and proposal methodology', is_default: true, phases: 6 },
            { id: 2, name: 'MMT Accelerated', description: 'Mission Meets Tech optimized 4-phase process', is_default: false, phases: 4 },
            { id: 3, name: 'IDIQ Task Order', description: 'Streamlined process for task order responses', is_default: false, phases: 3 },
        ];

        const DEMO_STEPS = [
            // Shipley Methodology
            { id: 1, methodology_id: 1, phase: 'Phase 0', name: 'Market Segmentation', description: 'Identify target markets and customers', order_num: 1, duration_days: 30, deliverables: 'Market Analysis Report, Customer Profiles', gate_criteria: 'Management approval of target market' },
            { id: 2, methodology_id: 1, phase: 'Phase 1', name: 'Long-Term Positioning', description: 'Build relationships and position for opportunities', order_num: 2, duration_days: 180, deliverables: 'Customer Call Plans, Capability Briefs', gate_criteria: 'Customer relationship established' },
            { id: 3, methodology_id: 1, phase: 'Phase 2', name: 'Opportunity Assessment', description: 'Evaluate and qualify specific opportunities', order_num: 3, duration_days: 14, deliverables: 'Opportunity Assessment, Bid/No-Bid Decision', gate_criteria: 'Go/No-Go decision approved' },
            { id: 4, methodology_id: 1, phase: 'Phase 3', name: 'Capture Planning', description: 'Develop win strategy and capture plan', order_num: 4, duration_days: 60, deliverables: 'Capture Plan, Win Themes, Competitive Analysis', gate_criteria: 'Capture Plan approved, team assigned' },
            { id: 5, methodology_id: 1, phase: 'Phase 4', name: 'Proposal Development', description: 'Write, review, and produce proposal', order_num: 5, duration_days: 30, deliverables: 'Compliant Proposal, Executive Summary, Orals Materials', gate_criteria: 'Gold Team approval, submission ready' },
            { id: 6, methodology_id: 1, phase: 'Phase 5', name: 'Post-Submission', description: 'Q&A support, negotiations, transition', order_num: 6, duration_days: 45, deliverables: 'Q&A Responses, BAFO, Contract Negotiations', gate_criteria: 'Contract award or debrief complete' },
            // MMT Accelerated
            { id: 7, methodology_id: 2, phase: 'Discover', name: 'Opportunity Intelligence', description: 'AI-powered opportunity discovery and qualification', order_num: 1, duration_days: 7, deliverables: 'AI Opportunity Score, Auto-generated Capture Brief', gate_criteria: 'pWin > 40%' },
            { id: 8, methodology_id: 2, phase: 'Strategize', name: 'Win Strategy Workshop', description: 'Rapid strategy development with AI assistance', order_num: 2, duration_days: 5, deliverables: 'Win Themes, Ghost/Highlight Matrix, Solution Outline', gate_criteria: 'Strategy locked' },
            { id: 9, methodology_id: 2, phase: 'Execute', name: 'Proposal Sprint', description: 'Accelerated proposal writing with AI writers', order_num: 3, duration_days: 14, deliverables: 'Draft Proposal, Compliance Matrix', gate_criteria: 'Pink Team complete' },
            { id: 10, methodology_id: 2, phase: 'Deliver', name: 'Final Production', description: 'Quality assurance and submission', order_num: 4, duration_days: 4, deliverables: 'Final Proposal Package', gate_criteria: 'Submitted on time' },
            // IDIQ Task Order
            { id: 11, methodology_id: 3, phase: 'Qualify', name: 'Task Order Assessment', description: 'Quick evaluation against IDIQ scope', order_num: 1, duration_days: 2, deliverables: 'Scope Compliance Check', gate_criteria: 'Within scope' },
            { id: 12, methodology_id: 3, phase: 'Respond', name: 'Response Development', description: 'Leverage existing content for rapid response', order_num: 2, duration_days: 5, deliverables: 'Task Order Response', gate_criteria: 'Compliant response' },
            { id: 13, methodology_id: 3, phase: 'Submit', name: 'Final Check & Submit', description: 'Quality check and submission', order_num: 3, duration_days: 1, deliverables: 'Submitted Response', gate_criteria: 'Submitted' },
        ];

        function Methodology() {
            const [methodologies, setMethodologies] = useState([]);
            const [steps, setSteps] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedMethodology, setSelectedMethodology] = useState(null);
            const [showMethodologyModal, setShowMethodologyModal] = useState(false);
            const [showStepModal, setShowStepModal] = useState(false);
            const [editingStep, setEditingStep] = useState(null);
            const [methodologyForm, setMethodologyForm] = useState({ name: '', description: '', is_default: false });
            const [stepForm, setStepForm] = useState({ phase: '', name: '', description: '', order_num: 1, duration_days: 7, deliverables: '', gate_criteria: '' });

            useEffect(() => {
                fetchData();
            }, []);

            async function fetchData() {
                try {
                    const [methRes, stepsRes] = await Promise.all([
                        supabase.from('methodologies').select('*').order('name'),
                        supabase.from('methodology_steps').select('*').order('methodology_id, order_num')
                    ]);
                    const meths = methRes.data?.length ? methRes.data : DEMO_METHODOLOGIES;
                    setMethodologies(meths);
                    setSteps(stepsRes.data?.length ? stepsRes.data : DEMO_STEPS);
                    setSelectedMethodology(meths[0]);
                } catch (err) {
                    console.log('Using demo data');
                    setMethodologies(DEMO_METHODOLOGIES);
                    setSteps(DEMO_STEPS);
                    setSelectedMethodology(DEMO_METHODOLOGIES[0]);
                } finally {
                    setLoading(false);
                }
            }

            async function saveMethodology() {
                try {
                    if (selectedMethodology?.id && methodologyForm.id) {
                        await supabase.from('methodologies').update(methodologyForm).eq('id', methodologyForm.id);
                    } else {
                        await supabase.from('methodologies').insert([methodologyForm]);
                    }
                    fetchData();
                } catch (err) {
                    if (methodologyForm.id) {
                        setMethodologies(methodologies.map(m => m.id === methodologyForm.id ? { ...m, ...methodologyForm } : m));
                    } else {
                        const newMeth = { ...methodologyForm, id: Date.now(), phases: 0 };
                        setMethodologies([...methodologies, newMeth]);
                    }
                }
                setShowMethodologyModal(false);
            }

            async function deleteMethodology(id) {
                if (!confirm('Delete this methodology and all its steps?')) return;
                try {
                    await supabase.from('methodology_steps').delete().eq('methodology_id', id);
                    await supabase.from('methodologies').delete().eq('id', id);
                    fetchData();
                } catch (err) {
                    setMethodologies(methodologies.filter(m => m.id !== id));
                    setSteps(steps.filter(s => s.methodology_id !== id));
                }
            }

            async function saveStep() {
                const stepData = { ...stepForm, methodology_id: selectedMethodology.id };
                try {
                    if (editingStep) {
                        await supabase.from('methodology_steps').update(stepData).eq('id', editingStep.id);
                    } else {
                        await supabase.from('methodology_steps').insert([stepData]);
                    }
                    fetchData();
                } catch (err) {
                    if (editingStep) {
                        setSteps(steps.map(s => s.id === editingStep.id ? { ...s, ...stepData } : s));
                    } else {
                        setSteps([...steps, { ...stepData, id: Date.now() }]);
                    }
                }
                setShowStepModal(false);
                setEditingStep(null);
            }

            async function deleteStep(id) {
                if (!confirm('Delete this step?')) return;
                try {
                    await supabase.from('methodology_steps').delete().eq('id', id);
                    fetchData();
                } catch (err) {
                    setSteps(steps.filter(s => s.id !== id));
                }
            }

            function openMethodologyModal(meth = null) {
                setMethodologyForm(meth || { name: '', description: '', is_default: false });
                setShowMethodologyModal(true);
            }

            function openStepModal(step = null) {
                setEditingStep(step);
                setStepForm(step || { phase: '', name: '', description: '', order_num: steps.filter(s => s.methodology_id === selectedMethodology?.id).length + 1, duration_days: 7, deliverables: '', gate_criteria: '' });
                setShowStepModal(true);
            }

            const currentSteps = steps.filter(s => s.methodology_id === selectedMethodology?.id);
            const phases = [...new Set(currentSteps.map(s => s.phase))];

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-[#00E5FA] text-xl">Loading Methodology...</div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-6">
                    {/* Header */}
                    <div className="flex items-center justify-between mb-8">
                        <div>
                            <h1 className="text-3xl font-bold text-white flex items-center gap-3">
                                <span className="text-4xl">📐</span> Methodology
                            </h1>
                            <p className="text-gray-400 mt-1">Capture & Proposal Process Library</p>
                        </div>
                        <button onClick={() => openMethodologyModal()} className="px-6 py-3 bg-[#00E5FA] text-[#00050F] font-semibold rounded-lg hover:bg-[#00E5FA]/80 transition">
                            + New Methodology
                        </button>
                    </div>

                    <div className="grid grid-cols-4 gap-6">
                        {/* Methodology List */}
                        <div className="col-span-1">
                            <h2 className="text-lg font-semibold text-white mb-4">Methodologies</h2>
                            <div className="space-y-3">
                                {methodologies.map((meth) => (
                                    <div key={meth.id} onClick={() => setSelectedMethodology(meth)}
                                        className={`glass rounded-xl p-4 cursor-pointer transition-all ${
                                            selectedMethodology?.id === meth.id ? 'glow border-[#00E5FA]' : 'hover:border-[#00E5FA]/50'
                                        }`}>
                                        <div className="flex items-center justify-between mb-2">
                                            <h3 className="font-semibold text-white">{meth.name}</h3>
                                            {meth.is_default && <span className="text-xs bg-[#00E5FA]/20 text-[#00E5FA] px-2 py-0.5 rounded">DEFAULT</span>}
                                        </div>
                                        <p className="text-gray-400 text-sm">{meth.description}</p>
                                        <div className="mt-2 text-xs text-gray-500">{steps.filter(s => s.methodology_id === meth.id).length} steps</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Process Flow */}
                        <div className="col-span-3">
                            {selectedMethodology && (
                                <>
                                    <div className="flex items-center justify-between mb-4">
                                        <div>
                                            <h2 className="text-xl font-semibold text-white">{selectedMethodology.name} Process</h2>
                                            <p className="text-gray-400 text-sm">{selectedMethodology.description}</p>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => openStepModal()} className="px-4 py-2 bg-[#00E5FA]/20 text-[#00E5FA] rounded-lg hover:bg-[#00E5FA]/30">
                                                + Add Step
                                            </button>
                                            <button onClick={() => openMethodologyModal(selectedMethodology)} className="px-4 py-2 border border-[#00E5FA]/30 text-gray-300 rounded-lg hover:bg-[#00E5FA]/10">
                                                Edit
                                            </button>
                                            <button onClick={() => deleteMethodology(selectedMethodology.id)} className="px-4 py-2 border border-red-500/30 text-red-400 rounded-lg hover:bg-red-500/10">
                                                Delete
                                            </button>
                                        </div>
                                    </div>

                                    {/* Phase Timeline */}
                                    <div className="glass rounded-xl p-6 mb-6">
                                        <div className="flex items-center justify-between">
                                            {phases.map((phase, idx) => (
                                                <div key={phase} className="flex items-center">
                                                    <div className="text-center">
                                                        <div className="w-12 h-12 rounded-full bg-[#00E5FA]/20 border-2 border-[#00E5FA] flex items-center justify-center text-[#00E5FA] font-bold">
                                                            {idx + 1}
                                                        </div>
                                                        <div className="mt-2 text-white font-medium">{phase}</div>
                                                        <div className="text-xs text-gray-500">
                                                            {currentSteps.filter(s => s.phase === phase).reduce((sum, s) => sum + s.duration_days, 0)} days
                                                        </div>
                                                    </div>
                                                    {idx < phases.length - 1 && (
                                                        <div className="w-24 h-0.5 bg-[#00E5FA]/30 mx-4"></div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Steps Detail */}
                                    <div className="space-y-4">
                                        {phases.map((phase) => (
                                            <div key={phase}>
                                                <h3 className="text-lg font-semibold text-[#00E5FA] mb-3">{phase}</h3>
                                                <div className="grid grid-cols-2 gap-4">
                                                    {currentSteps.filter(s => s.phase === phase).map((step) => (
                                                        <div key={step.id} className="glass rounded-xl p-5 hover:glow transition-all">
                                                            <div className="flex items-start justify-between mb-2">
                                                                <h4 className="font-semibold text-white">{step.name}</h4>
                                                                <div className="flex gap-2">
                                                                    <button onClick={() => openStepModal(step)} className="text-[#00E5FA] text-sm hover:text-white">Edit</button>
                                                                    <button onClick={() => deleteStep(step.id)} className="text-red-400 text-sm hover:text-red-300">Delete</button>
                                                                </div>
                                                            </div>
                                                            <p className="text-gray-400 text-sm mb-3">{step.description}</p>
                                                            <div className="space-y-2 text-sm">
                                                                <div className="flex items-center gap-2">
                                                                    <span className="text-gray-500">⏱️ Duration:</span>
                                                                    <span className="text-white">{step.duration_days} days</span>
                                                                </div>
                                                                <div className="flex items-start gap-2">
                                                                    <span className="text-gray-500">📦 Deliverables:</span>
                                                                    <span className="text-gray-300">{step.deliverables}</span>
                                                                </div>
                                                                <div className="flex items-start gap-2">
                                                                    <span className="text-gray-500">🚦 Gate:</span>
                                                                    <span className="text-[#00E5FA]">{step.gate_criteria}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </>
                            )}
                        </div>
                    </div>

                    {/* Methodology Modal */}
                    {showMethodologyModal && (
                        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
                            <div className="glass rounded-xl p-6 w-full max-w-md glow">
                                <h2 className="text-xl font-bold text-white mb-4">{methodologyForm.id ? 'Edit Methodology' : 'New Methodology'}</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-gray-400 text-sm">Name</label>
                                        <input type="text" value={methodologyForm.name} onChange={(e) => setMethodologyForm({...methodologyForm, name: e.target.value})}
                                            className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1" />
                                    </div>
                                    <div>
                                        <label className="text-gray-400 text-sm">Description</label>
                                        <textarea value={methodologyForm.description} onChange={(e) => setMethodologyForm({...methodologyForm, description: e.target.value})}
                                            className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1 h-20" />
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <input type="checkbox" id="is_default" checked={methodologyForm.is_default} onChange={(e) => setMethodologyForm({...methodologyForm, is_default: e.target.checked})}
                                            className="w-4 h-4 accent-[#00E5FA]" />
                                        <label htmlFor="is_default" className="text-gray-300">Set as default methodology</label>
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 mt-6">
                                    <button onClick={() => setShowMethodologyModal(false)} className="px-4 py-2 border border-gray-600 text-gray-300 rounded-lg hover:bg-gray-800">Cancel</button>
                                    <button onClick={saveMethodology} className="px-6 py-2 bg-[#00E5FA] text-[#00050F] font-semibold rounded-lg hover:bg-[#00E5FA]/80">Save</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Step Modal */}
                    {showStepModal && (
                        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
                            <div className="glass rounded-xl p-6 w-full max-w-lg glow">
                                <h2 className="text-xl font-bold text-white mb-4">{editingStep ? 'Edit Step' : 'Add Step'}</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="text-gray-400 text-sm">Phase</label>
                                        <input type="text" value={stepForm.phase} onChange={(e) => setStepForm({...stepForm, phase: e.target.value})}
                                            className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1" placeholder="e.g., Phase 1" />
                                    </div>
                                    <div>
                                        <label className="text-gray-400 text-sm">Step Name</label>
                                        <input type="text" value={stepForm.name} onChange={(e) => setStepForm({...stepForm, name: e.target.value})}
                                            className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1" />
                                    </div>
                                    <div className="col-span-2">
                                        <label className="text-gray-400 text-sm">Description</label>
                                        <textarea value={stepForm.description} onChange={(e) => setStepForm({...stepForm, description: e.target.value})}
                                            className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1 h-16" />
                                    </div>
                                    <div>
                                        <label className="text-gray-400 text-sm">Order</label>
                                        <input type="number" value={stepForm.order_num} onChange={(e) => setStepForm({...stepForm, order_num: parseInt(e.target.value)})}
                                            className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1" />
                                    </div>
                                    <div>
                                        <label className="text-gray-400 text-sm">Duration (days)</label>
                                        <input type="number" value={stepForm.duration_days} onChange={(e) => setStepForm({...stepForm, duration_days: parseInt(e.target.value)})}
                                            className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1" />
                                    </div>
                                    <div className="col-span-2">
                                        <label className="text-gray-400 text-sm">Deliverables</label>
                                        <input type="text" value={stepForm.deliverables} onChange={(e) => setStepForm({...stepForm, deliverables: e.target.value})}
                                            className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1" placeholder="Comma-separated" />
                                    </div>
                                    <div className="col-span-2">
                                        <label className="text-gray-400 text-sm">Gate Criteria</label>
                                        <input type="text" value={stepForm.gate_criteria} onChange={(e) => setStepForm({...stepForm, gate_criteria: e.target.value})}
                                            className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1" />
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 mt-6">
                                    <button onClick={() => setShowStepModal(false)} className="px-4 py-2 border border-gray-600 text-gray-300 rounded-lg hover:bg-gray-800">Cancel</button>
                                    <button onClick={saveStep} className="px-6 py-2 bg-[#00E5FA] text-[#00050F] font-semibold rounded-lg hover:bg-[#00E5FA]/80">Save</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<Methodology />);
    </script>
</body>
</html>
