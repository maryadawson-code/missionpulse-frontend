<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Win Themes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.15); }
    .glow { box-shadow: 0 0 20px rgba(0, 229, 250, 0.2); }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const DEFAULT_COMPANY_ID = '11111111-1111-1111-1111-111111111111';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // Demo Data
    const DEMO_THEMES = [
      { id: '1', opportunity_id: '1', theme: 'Proven MHS GENESIS Migration Experience', discriminator: 'Only bidder with 3 successful DHA transitions', evidence: 'Case studies from Brooke Army, Walter Reed', priority: 1, status: 'Validated' },
      { id: '2', opportunity_id: '1', theme: 'Zero-Downtime Deployment Methodology', discriminator: 'Proprietary deployment framework', evidence: '99.99% uptime across 12 migrations', priority: 2, status: 'Draft' },
      { id: '3', opportunity_id: '1', theme: 'CMMC 2.0 Level 2 Certified Team', discriminator: 'All staff pre-certified', evidence: 'POA&M complete, assessment scheduled', priority: 3, status: 'In Review' },
      { id: '4', opportunity_id: '2', theme: 'VA-Specific Interoperability Expertise', discriminator: 'VistA integration specialists on staff', evidence: '5 years VA contract history', priority: 1, status: 'Validated' },
      { id: '5', opportunity_id: '2', theme: 'Agile at Scale (SAFe) Implementation', discriminator: 'Certified SAFe Program Consultant team', evidence: 'PI Planning success at 3 agencies', priority: 2, status: 'Draft' },
    ];

    const DEMO_OPPORTUNITIES = [
      { id: '1', title: 'DHA MHS GENESIS Support', agency: 'DHA' },
      { id: '2', title: 'VA EHR Modernization', agency: 'VA' },
      { id: '3', title: 'CMS Data Analytics Platform', agency: 'CMS' },
    ];

    function App() {
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [themes, setThemes] = React.useState(DEMO_THEMES);
      const [opportunities, setOpportunities] = React.useState(DEMO_OPPORTUNITIES);
      const [selectedOpp, setSelectedOpp] = React.useState('all');
      const [showModal, setShowModal] = React.useState(false);
      const [editingTheme, setEditingTheme] = React.useState(null);
      const [form, setForm] = React.useState({ theme: '', discriminator: '', evidence: '', priority: 1, status: 'Draft', opportunity_id: '' });

      React.useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        try {
          const [themesRes, oppsRes] = await Promise.all([
            supabase.from('win_themes').select('*').order('priority'),
            supabase.from('opportunities').select('id, title, agency')
          ]);
          
          if (!themesRes.error && themesRes.data?.length > 0) {
            setThemes(themesRes.data);
            setConnected(true);
          }
          if (!oppsRes.error && oppsRes.data?.length > 0) {
            setOpportunities(oppsRes.data);
          }
        } catch (e) {
          console.log('Using demo data');
        }
        setLoading(false);
      };

      const saveTheme = async () => {
        const themeData = {
          ...form,
          company_id: DEFAULT_COMPANY_ID,
          updated_at: new Date().toISOString()
        };

        if (connected) {
          try {
            if (editingTheme) {
              const { error } = await supabase.from('win_themes').update(themeData).eq('id', editingTheme.id);
              if (!error) {
                setThemes(themes.map(t => t.id === editingTheme.id ? { ...t, ...themeData } : t));
              }
            } else {
              const { data, error } = await supabase.from('win_themes').insert([themeData]).select();
              if (!error && data) {
                setThemes([...themes, data[0]]);
              }
            }
          } catch (e) {
            console.error('Save error:', e);
          }
        } else {
          // Demo mode
          if (editingTheme) {
            setThemes(themes.map(t => t.id === editingTheme.id ? { ...t, ...themeData } : t));
          } else {
            setThemes([...themes, { ...themeData, id: Date.now().toString() }]);
          }
        }
        
        setShowModal(false);
        setEditingTheme(null);
        setForm({ theme: '', discriminator: '', evidence: '', priority: 1, status: 'Draft', opportunity_id: '' });
      };

      const deleteTheme = async (id) => {
        if (!confirm('Delete this win theme?')) return;
        
        if (connected) {
          await supabase.from('win_themes').delete().eq('id', id);
        }
        setThemes(themes.filter(t => t.id !== id));
      };

      const openEditModal = (theme) => {
        setEditingTheme(theme);
        setForm({
          theme: theme.theme,
          discriminator: theme.discriminator || '',
          evidence: theme.evidence || '',
          priority: theme.priority || 1,
          status: theme.status || 'Draft',
          opportunity_id: theme.opportunity_id || ''
        });
        setShowModal(true);
      };

      const filteredThemes = selectedOpp === 'all' 
        ? themes 
        : themes.filter(t => t.opportunity_id === selectedOpp);

      const getStatusColor = (status) => {
        switch (status) {
          case 'Validated': return 'bg-emerald-500/20 text-emerald-400';
          case 'In Review': return 'bg-amber-500/20 text-amber-400';
          case 'Draft': return 'bg-slate-500/20 text-slate-400';
          default: return 'bg-slate-500/20 text-slate-400';
        }
      };

      const getOppName = (id) => {
        const opp = opportunities.find(o => o.id === id);
        return opp ? opp.title : 'Unassigned';
      };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
          </div>
        );
      }

      return (
        <div className="min-h-screen p-6">
          {/* Header */}
          <div className="flex items-center justify-between mb-6">
            <div className="flex items-center gap-4">
              <a href="index.html" className="text-slate-400 hover:text-white">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
              </a>
              <div>
                <h1 className="text-2xl font-bold text-white">Win Themes</h1>
                <p className="text-slate-400 text-sm">Discriminators and proof points</p>
              </div>
            </div>
            <div className="flex items-center gap-4">
              <div className={`px-3 py-1 rounded-full text-xs ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                {connected ? '● Live' : '○ Demo'}
              </div>
              <button
                onClick={() => { setEditingTheme(null); setForm({ theme: '', discriminator: '', evidence: '', priority: 1, status: 'Draft', opportunity_id: '' }); setShowModal(true); }}
                className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 text-white rounded-lg font-medium transition-colors"
              >
                + Add Theme
              </button>
            </div>
          </div>

          {/* Filter */}
          <div className="mb-6">
            <select
              value={selectedOpp}
              onChange={(e) => setSelectedOpp(e.target.value)}
              className="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
            >
              <option value="all">All Opportunities</option>
              {opportunities.map(opp => (
                <option key={opp.id} value={opp.id}>{opp.title}</option>
              ))}
            </select>
          </div>

          {/* Themes Grid */}
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {filteredThemes.map(theme => (
              <div key={theme.id} className="glass rounded-xl p-5 hover:border-cyan-500/40 transition-colors">
                <div className="flex items-start justify-between mb-3">
                  <span className={`px-2 py-1 rounded text-xs ${getStatusColor(theme.status)}`}>
                    {theme.status}
                  </span>
                  <div className="flex items-center gap-1">
                    <span className="text-cyan-400 text-xs font-medium">P{theme.priority}</span>
                  </div>
                </div>
                
                <h3 className="text-lg font-semibold text-white mb-2">{theme.theme}</h3>
                
                {theme.discriminator && (
                  <div className="mb-3">
                    <p className="text-xs text-cyan-400 uppercase tracking-wider mb-1">Discriminator</p>
                    <p className="text-sm text-slate-300">{theme.discriminator}</p>
                  </div>
                )}
                
                {theme.evidence && (
                  <div className="mb-3">
                    <p className="text-xs text-cyan-400 uppercase tracking-wider mb-1">Evidence</p>
                    <p className="text-sm text-slate-400">{theme.evidence}</p>
                  </div>
                )}
                
                <div className="pt-3 border-t border-slate-700/50 flex items-center justify-between">
                  <span className="text-xs text-slate-500 truncate max-w-[60%]">{getOppName(theme.opportunity_id)}</span>
                  <div className="flex items-center gap-2">
                    <button onClick={() => openEditModal(theme)} className="text-slate-400 hover:text-cyan-400 transition-colors">
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                      </svg>
                    </button>
                    <button onClick={() => deleteTheme(theme.id)} className="text-slate-400 hover:text-red-400 transition-colors">
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                      </svg>
                    </button>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {filteredThemes.length === 0 && (
            <div className="text-center py-12">
              <p className="text-slate-500">No win themes found. Add your first theme to get started.</p>
            </div>
          )}

          {/* Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
              <div className="glass rounded-xl p-6 w-full max-w-lg">
                <h2 className="text-xl font-bold text-white mb-4">
                  {editingTheme ? 'Edit Win Theme' : 'Add Win Theme'}
                </h2>
                
                <div className="space-y-4">
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Theme *</label>
                    <input
                      type="text"
                      value={form.theme}
                      onChange={(e) => setForm({ ...form, theme: e.target.value })}
                      placeholder="e.g., Proven Healthcare IT Experience"
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                    />
                  </div>
                  
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Discriminator</label>
                    <textarea
                      value={form.discriminator}
                      onChange={(e) => setForm({ ...form, discriminator: e.target.value })}
                      placeholder="What makes this unique?"
                      rows={2}
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                    />
                  </div>
                  
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Evidence / Proof Points</label>
                    <textarea
                      value={form.evidence}
                      onChange={(e) => setForm({ ...form, evidence: e.target.value })}
                      placeholder="Past performance, metrics, certifications..."
                      rows={2}
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                    />
                  </div>
                  
                  <div className="grid grid-cols-3 gap-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Priority</label>
                      <select
                        value={form.priority}
                        onChange={(e) => setForm({ ...form, priority: parseInt(e.target.value) })}
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                      >
                        {[1, 2, 3, 4, 5].map(p => (
                          <option key={p} value={p}>P{p}</option>
                        ))}
                      </select>
                    </div>
                    
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Status</label>
                      <select
                        value={form.status}
                        onChange={(e) => setForm({ ...form, status: e.target.value })}
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                      >
                        <option value="Draft">Draft</option>
                        <option value="In Review">In Review</option>
                        <option value="Validated">Validated</option>
                      </select>
                    </div>
                    
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Opportunity</label>
                      <select
                        value={form.opportunity_id}
                        onChange={(e) => setForm({ ...form, opportunity_id: e.target.value })}
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white"
                      >
                        <option value="">Select...</option>
                        {opportunities.map(opp => (
                          <option key={opp.id} value={opp.id}>{opp.title}</option>
                        ))}
                      </select>
                    </div>
                  </div>
                </div>
                
                <div className="flex justify-end gap-3 mt-6">
                  <button
                    onClick={() => { setShowModal(false); setEditingTheme(null); }}
                    className="px-4 py-2 text-slate-400 hover:text-white transition-colors"
                  >
                    Cancel
                  </button>
                  <button
                    onClick={saveTheme}
                    disabled={!form.theme}
                    className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 disabled:bg-slate-600 text-white rounded-lg font-medium transition-colors"
                  >
                    {editingTheme ? 'Update' : 'Create'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <div className="mt-8 text-center text-slate-500 text-sm">
            MissionPulse v3.1 • Mission Meets Tech • AI GENERATED CONTENT REQUIRES HUMAN REVIEW
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
