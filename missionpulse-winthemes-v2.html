<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Win Themes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-emerald { 0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); } }
    .pulse-emerald { animation: pulse-emerald 2s infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const DEMO_THEMES = [
      { id: 1, title: 'Zero-Disruption Migration', type: 'Technical', discriminator: true, description: 'Proven methodology for migrating 2M+ patient records with zero downtime using parallel-run architecture and automatic failover.', proofPoints: ['VA HIE: 1.8M records migrated, 0 downtime', 'DHA Claims: 99.99% data integrity achieved', 'Patented cutover toolkit'], evalCriteria: 'L.1.2 - Migration Approach', strength: 95 },
      { id: 2, title: 'FHIR-Native Architecture', type: 'Technical', discriminator: true, description: 'Team includes 3 HL7 FHIR-certified architects with production experience in US Core profiles and real-time interoperability.', proofPoints: ['3 FHIR-certified architects on staff', 'CMS Analytics: FHIR R4 implementation', 'Middleware for legacy HL7v2 compatibility'], evalCriteria: 'L.1.3 - Interoperability', strength: 90 },
      { id: 3, title: 'SDVOSB Agility Advantage', type: 'Management', discriminator: true, description: 'Small business responsiveness with enterprise capability. Direct executive access and rapid decision-making without large prime bureaucracy.', proofPoints: ['24-hour executive response SLA', '40% faster staffing than large primes', 'CEO engagement on all task orders'], evalCriteria: 'M.2.1 - Management', strength: 85 },
      { id: 4, title: 'Cleared Healthcare IT Bench', type: 'Staffing', discriminator: false, description: 'Maintain 15+ Secret-cleared health IT professionals ready for rapid deployment with MOUs for 20+ surge capacity.', proofPoints: ['15 Secret-cleared staff on bench', '2 SDVOSB partners for surge', '8% turnover vs 15% industry average'], evalCriteria: 'L.3.1 - Key Personnel', strength: 80 },
      { id: 5, title: 'Below-GSA Pricing', type: 'Price', discriminator: true, description: 'SDVOSB efficiency enables 4% below GSA Schedule rates while maintaining quality through automation and remote-first model.', proofPoints: ['4% below GSA Schedule rates', 'DevOps automation reduces labor', 'Remote-first: 40% facility savings'], evalCriteria: 'Price Factor', strength: 88 },
      { id: 6, title: 'MHS Genesis Experience', type: 'Technical', discriminator: false, description: 'Deep experience with DHA systems including MHS Genesis, AHLTA, and TOL with proven integration patterns.', proofPoints: ['DHA Claims integration experience', 'AHLTA data extraction expertise', 'Active Secret clearances'], evalCriteria: 'L.1.1 - Technical Understanding', strength: 75 }
    ];

    const TYPE_COLORS = { 'Technical': 'bg-cyan-500/20 text-cyan-400', 'Management': 'bg-purple-500/20 text-purple-400', 'Staffing': 'bg-amber-500/20 text-amber-400', 'Price': 'bg-emerald-500/20 text-emerald-400' };

    function Sidebar() {
      const navItems = [
        { icon: '🏠', label: 'Dashboard', path: 'index.html' },
        { icon: '📊', label: 'Pipeline', path: 'missionpulse-pipeline-v2.html' },
        { icon: '🎯', label: 'War Room', path: 'missionpulse-warroom-v2.html' },
        { icon: '⭐', label: 'Win Themes', path: 'missionpulse-winthemes-v2.html', active: true },
        { icon: '🎭', label: 'Black Hat', path: 'missionpulse-blackhat-v2.html' },
        { icon: '🤖', label: 'Agent Hub', path: 'missionpulse-agenthub-v2.html' }
      ];
      return (
        <div className="w-64 bg-slate-900/50 border-r border-slate-700 min-h-screen p-4 hidden lg:block">
          <div className="flex items-center gap-3 mb-8">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center pulse-emerald"><span className="text-xl">⭐</span></div>
            <div><div className="font-bold text-emerald-400">Win Themes</div><div className="text-xs text-slate-400">Discriminators</div></div>
          </div>
          <nav className="space-y-1">{navItems.map((item, i) => (<a key={i} href={item.path} className={`flex items-center gap-3 px-3 py-2 rounded-lg transition-all ${item.active ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}><span>{item.icon}</span><span className="text-sm">{item.label}</span></a>))}</nav>
        </div>
      );
    }

    function ThemeCard({ theme, onClick }) {
      return (
        <div onClick={() => onClick(theme)} className="bg-slate-800/50 border border-slate-700 rounded-xl p-4 hover:border-emerald-500/50 cursor-pointer transition-all">
          <div className="flex items-start justify-between mb-3">
            <div className="flex items-center gap-2">
              {theme.discriminator && <span className="text-emerald-400 text-lg">★</span>}
              <span className={`px-2 py-0.5 rounded text-xs ${TYPE_COLORS[theme.type]}`}>{theme.type}</span>
            </div>
            <div className="flex items-center gap-2">
              <div className="w-12 h-2 bg-slate-700 rounded-full overflow-hidden">
                <div className={`h-full rounded-full ${theme.strength >= 85 ? 'bg-emerald-500' : theme.strength >= 70 ? 'bg-cyan-500' : 'bg-amber-500'}`} style={{ width: `${theme.strength}%` }} />
              </div>
              <span className="text-xs font-medium">{theme.strength}%</span>
            </div>
          </div>
          <h3 className="font-semibold mb-2">{theme.title}</h3>
          <p className="text-sm text-slate-400 line-clamp-2 mb-3">{theme.description}</p>
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-1">
              {theme.proofPoints.slice(0, 2).map((p, i) => <span key={i} className="w-2 h-2 bg-emerald-500 rounded-full" title={p} />)}
              {theme.proofPoints.length > 2 && <span className="text-xs text-slate-500">+{theme.proofPoints.length - 2}</span>}
            </div>
            <span className="text-xs text-slate-500">{theme.evalCriteria}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [themes] = React.useState(DEMO_THEMES);
      const [selectedTheme, setSelectedTheme] = React.useState(null);
      const [filterType, setFilterType] = React.useState('All');

      const filtered = filterType === 'All' ? themes : themes.filter(t => t.type === filterType);
      const discriminators = themes.filter(t => t.discriminator).length;
      const avgStrength = Math.round(themes.reduce((sum, t) => sum + t.strength, 0) / themes.length);

      return (
        <div className="flex min-h-screen">
          <Sidebar />
          <div className="flex-1 p-4 lg:p-6">
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
              <div><h1 className="text-2xl font-bold">Win Themes</h1><p className="text-slate-400 text-sm">EHR-Mod • Discriminators & Proof Points</p></div>
              <button className="px-4 py-2 bg-emerald-500 hover:bg-emerald-400 text-slate-900 rounded-lg text-sm font-medium">+ Add Theme</button>
            </div>
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4"><div className="text-2xl font-bold">{themes.length}</div><div className="text-sm text-slate-400">Total Themes</div></div>
              <div className="bg-slate-800/50 border border-emerald-500/30 rounded-xl p-4"><div className="text-2xl font-bold text-emerald-400">{discriminators}</div><div className="text-sm text-slate-400">Discriminators</div></div>
              <div className="bg-slate-800/50 border border-cyan-500/30 rounded-xl p-4"><div className="text-2xl font-bold text-cyan-400">{avgStrength}%</div><div className="text-sm text-slate-400">Avg Strength</div></div>
              <div className="bg-slate-800/50 border border-purple-500/30 rounded-xl p-4"><div className="text-2xl font-bold text-purple-400">{themes.reduce((sum, t) => sum + t.proofPoints.length, 0)}</div><div className="text-sm text-slate-400">Proof Points</div></div>
            </div>
            <div className="flex gap-2 mb-6">
              {['All', 'Technical', 'Management', 'Staffing', 'Price'].map(type => (
                <button key={type} onClick={() => setFilterType(type)} className={`px-3 py-1.5 rounded-lg text-sm transition-colors ${filterType === type ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-slate-800/50 hover:bg-slate-700'}`}>{type}</button>
              ))}
            </div>
            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
              {filtered.map(theme => <ThemeCard key={theme.id} theme={theme} onClick={setSelectedTheme} />)}
            </div>
            {selectedTheme && (
              <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
                <div className="bg-slate-800 border border-slate-700 rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                  <div className="p-4 border-b border-slate-700 flex items-center justify-between">
                    <div className="flex items-center gap-3">
                      {selectedTheme.discriminator && <span className="text-emerald-400 text-xl">★</span>}
                      <h2 className="font-semibold">{selectedTheme.title}</h2>
                    </div>
                    <button onClick={() => setSelectedTheme(null)} className="text-slate-400 hover:text-white text-xl">×</button>
                  </div>
                  <div className="p-4 space-y-4">
                    <div className="flex items-center gap-4">
                      <span className={`px-2 py-0.5 rounded text-xs ${TYPE_COLORS[selectedTheme.type]}`}>{selectedTheme.type}</span>
                      <span className="text-sm text-slate-400">→ {selectedTheme.evalCriteria}</span>
                    </div>
                    <div><label className="text-xs text-slate-400">Theme Statement</label><p className="text-sm mt-1">{selectedTheme.description}</p></div>
                    <div><label className="text-xs text-slate-400">Strength Assessment</label><div className="flex items-center gap-3 mt-1"><div className="flex-1 h-3 bg-slate-700 rounded-full overflow-hidden"><div className={`h-full rounded-full ${selectedTheme.strength >= 85 ? 'bg-emerald-500' : 'bg-cyan-500'}`} style={{ width: `${selectedTheme.strength}%` }} /></div><span className="font-bold">{selectedTheme.strength}%</span></div></div>
                    <div><label className="text-xs text-slate-400">Proof Points</label><div className="space-y-2 mt-1">{selectedTheme.proofPoints.map((p, i) => (<div key={i} className="flex items-start gap-2 p-2 bg-slate-900/50 rounded-lg"><span className="text-emerald-400">✓</span><span className="text-sm">{p}</span></div>))}</div></div>
                  </div>
                  <div className="p-4 border-t border-slate-700 flex justify-end gap-3">
                    <button className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">Edit</button>
                    <button onClick={() => setSelectedTheme(null)} className="px-4 py-2 bg-emerald-500 hover:bg-emerald-400 text-slate-900 rounded-lg text-sm font-medium">Close</button>
                  </div>
                </div>
              </div>
            )}
            <div className="mt-8 text-center text-xs text-slate-500"><div>Mission Meets Tech | MissionPulse Win Themes</div><div className="mt-1">AI GENERATED - REQUIRES HUMAN REVIEW</div></div>
          </div>
        </div>
      );
    }
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
