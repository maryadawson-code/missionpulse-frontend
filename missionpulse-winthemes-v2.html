<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Win Themes | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:#00050F;color:#e2e8f0;min-height:100vh}
    .glass{background:rgba(15,23,42,0.85);backdrop-filter:blur(16px);border:1px solid rgba(0,229,250,0.1);border-radius:12px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const SUPABASE_URL='https://qdrtpnpnhkxvfmvfziop.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
const supabase=window.supabase?.createClient(SUPABASE_URL,SUPABASE_ANON);

const CATEGORIES=['Technical','Experience','Value','Innovation','Risk','Management','Past Performance','Key Personnel'];

const DEMO_THEMES=[
  {id:1,theme:'AI-Powered Innovation',description:'Our proprietary AI automation reduces manual effort by 40%, delivering faster results at lower cost',evidence:'• Deployed AI in 3 similar DHA projects\n• Reduced processing time from 8hrs to 2hrs\n• Patent pending on core algorithms',strength:85,category:'Innovation'},
  {id:2,theme:'Healthcare IT Dominance',description:'15+ years exclusive focus on federal healthcare IT with deep DHA/VA institutional knowledge',evidence:'• 12 active healthcare contracts\n• 450+ credentialed healthcare IT staff\n• TS/SCI cleared team leads',strength:92,category:'Experience'},
  {id:3,theme:'Proven Cost Savings',description:'Track record of delivering 20%+ cost savings through automation and cloud optimization',evidence:'• VA contract: $12M saved over 3 years\n• CMS project: 25% under budget\n• Reusable component library',strength:78,category:'Value'},
  {id:4,theme:'Zero Transition Risk',description:'Incumbent knowledge and existing infrastructure eliminate transition delays',evidence:'• Current contract holder\n• All security clearances in place\n• No ramp-up required',strength:88,category:'Risk'}
];

function WinThemes(){
  const[connected,setConnected]=useState(false);
  const[themes,setThemes]=useState(DEMO_THEMES);
  const[selectedTheme,setSelectedTheme]=useState(null);
  const[showAdd,setShowAdd]=useState(false);
  const[newTheme,setNewTheme]=useState({theme:'',description:'',evidence:'',strength:50,category:'Technical'});

  useEffect(()=>{
    const load=async()=>{
      try{
        const{data,error}=await supabase.from('win_themes').select('*').order('strength',{ascending:false});
        if(!error&&data?.length)setThemes(data);
        setConnected(!error);
      }catch{setConnected(false)}
    };
    load();
  },[]);

  const addTheme=()=>{
    if(!newTheme.theme)return;
    setThemes([...themes,{...newTheme,id:Date.now()}]);
    setNewTheme({theme:'',description:'',evidence:'',strength:50,category:'Technical'});
    setShowAdd(false);
  };

  const updateTheme=(id,field,value)=>{
    setThemes(themes.map(t=>t.id===id?{...t,[field]:value}:t));
    if(selectedTheme?.id===id)setSelectedTheme({...selectedTheme,[field]:value});
  };

  const deleteTheme=(id)=>{
    setThemes(themes.filter(t=>t.id!==id));
    if(selectedTheme?.id===id)setSelectedTheme(null);
  };

  const getStrengthColor=(s)=>s>=80?'text-emerald-400':s>=60?'text-amber-400':'text-red-400';
  const getStrengthBg=(s)=>s>=80?'from-emerald-500':s>=60?'from-amber-500':'from-red-500';

  return(
    <div className="min-h-screen p-6">
      {/* Header */}
      <div className="flex justify-between items-start mb-6">
        <div>
          <h1 className="text-2xl font-bold text-white flex items-center gap-3">
            🏆 Win Themes Builder
            <span className={`text-xs px-2 py-1 rounded ${connected?'bg-emerald-500/20 text-emerald-400':'bg-red-500/20 text-red-400'}`}>
              {connected?'● Live':'○ Demo'}
            </span>
          </h1>
          <p className="text-slate-400 text-sm mt-1">Develop and strengthen your discriminators</p>
        </div>
        <button onClick={()=>setShowAdd(true)} className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-lg font-medium">
          + Add Theme
        </button>
      </div>

      {/* Stats */}
      <div className="grid grid-cols-4 gap-4 mb-6">
        <div className="glass p-4">
          <div className="text-slate-400 text-xs">Total Themes</div>
          <div className="text-2xl font-bold text-white">{themes.length}</div>
        </div>
        <div className="glass p-4">
          <div className="text-slate-400 text-xs">Avg Strength</div>
          <div className="text-2xl font-bold text-cyan-400">{Math.round(themes.reduce((s,t)=>s+t.strength,0)/themes.length)}%</div>
        </div>
        <div className="glass p-4">
          <div className="text-slate-400 text-xs">Strong (80%+)</div>
          <div className="text-2xl font-bold text-emerald-400">{themes.filter(t=>t.strength>=80).length}</div>
        </div>
        <div className="glass p-4">
          <div className="text-slate-400 text-xs">Needs Work (&lt;60%)</div>
          <div className="text-2xl font-bold text-red-400">{themes.filter(t=>t.strength<60).length}</div>
        </div>
      </div>

      <div className="grid grid-cols-12 gap-6">
        {/* Theme Cards */}
        <div className="col-span-7 space-y-4">
          {themes.map(theme=>(
            <div key={theme.id} onClick={()=>setSelectedTheme(theme)} className={`glass p-4 cursor-pointer transition-all hover:border-cyan-500/30 ${selectedTheme?.id===theme.id?'border-cyan-500/50 bg-cyan-500/5':''}`}>
              <div className="flex items-start justify-between mb-3">
                <div>
                  <span className="text-xs px-2 py-0.5 rounded bg-slate-700 text-slate-300">{theme.category}</span>
                  <h3 className="text-lg font-semibold text-white mt-2">{theme.theme}</h3>
                </div>
                <div className="text-right">
                  <div className={`text-2xl font-bold ${getStrengthColor(theme.strength)}`}>{theme.strength}%</div>
                  <div className="text-xs text-slate-500">Strength</div>
                </div>
              </div>
              <p className="text-slate-400 text-sm">{theme.description}</p>
              <div className="mt-3 h-2 bg-slate-800 rounded-full overflow-hidden">
                <div className={`h-full bg-gradient-to-r ${getStrengthBg(theme.strength)} to-transparent`} style={{width:`${theme.strength}%`}}/>
              </div>
            </div>
          ))}
        </div>

        {/* Detail Panel */}
        <div className="col-span-5">
          {selectedTheme?(
            <div className="glass p-6 sticky top-6">
              <div className="flex justify-between items-start mb-4">
                <h3 className="text-lg font-bold text-white">Theme Details</h3>
                <button onClick={()=>deleteTheme(selectedTheme.id)} className="text-red-400 hover:text-red-300 text-sm">🗑️ Delete</button>
              </div>
              
              <div className="space-y-4">
                <div>
                  <label className="text-xs text-slate-500 block mb-1">Theme Name</label>
                  <input value={selectedTheme.theme} onChange={e=>updateTheme(selectedTheme.id,'theme',e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
                </div>
                
                <div>
                  <label className="text-xs text-slate-500 block mb-1">Category</label>
                  <select value={selectedTheme.category} onChange={e=>updateTheme(selectedTheme.id,'category',e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white">
                    {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
                
                <div>
                  <label className="text-xs text-slate-500 block mb-1">Description</label>
                  <textarea value={selectedTheme.description} onChange={e=>updateTheme(selectedTheme.id,'description',e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white h-24 resize-none"/>
                </div>
                
                <div>
                  <label className="text-xs text-slate-500 block mb-1">Supporting Evidence</label>
                  <textarea value={selectedTheme.evidence} onChange={e=>updateTheme(selectedTheme.id,'evidence',e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white h-32 resize-none" placeholder="Bullet points of proof..."/>
                </div>
                
                <div>
                  <label className="text-xs text-slate-500 block mb-1">Strength: {selectedTheme.strength}%</label>
                  <input type="range" min="0" max="100" value={selectedTheme.strength} onChange={e=>updateTheme(selectedTheme.id,'strength',parseInt(e.target.value))} className="w-full"/>
                </div>
                
                {/* AI Suggestions */}
                <div className="p-4 bg-gradient-to-r from-purple-500/10 to-cyan-500/10 rounded-lg border border-purple-500/20">
                  <div className="flex items-center gap-2 mb-2">
                    <span>🤖</span>
                    <span className="text-sm font-medium text-white">AI Strategy Agent</span>
                  </div>
                  <div className="flex gap-2">
                    <button className="px-2 py-1 bg-slate-700 rounded text-xs hover:bg-slate-600">Strengthen Evidence</button>
                    <button className="px-2 py-1 bg-slate-700 rounded text-xs hover:bg-slate-600">Find Gaps</button>
                    <button className="px-2 py-1 bg-slate-700 rounded text-xs hover:bg-slate-600">Compare to Competitor</button>
                  </div>
                </div>
              </div>
            </div>
          ):(
            <div className="glass p-12 text-center">
              <span className="text-6xl">🏆</span>
              <p className="text-slate-400 mt-4">Select a theme to view details</p>
            </div>
          )}
        </div>
      </div>

      {/* Add Theme Modal */}
      {showAdd&&(
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
          <div className="glass p-6 w-full max-w-md">
            <h3 className="text-lg font-bold text-white mb-4">Add Win Theme</h3>
            <div className="space-y-4">
              <input value={newTheme.theme} onChange={e=>setNewTheme({...newTheme,theme:e.target.value})} placeholder="Theme name" className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
              <select value={newTheme.category} onChange={e=>setNewTheme({...newTheme,category:e.target.value})} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white">
                {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
              <textarea value={newTheme.description} onChange={e=>setNewTheme({...newTheme,description:e.target.value})} placeholder="Description" className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white h-24 resize-none"/>
              <div className="flex gap-3">
                <button onClick={()=>setShowAdd(false)} className="flex-1 px-4 py-2 bg-slate-700 rounded-lg">Cancel</button>
                <button onClick={addTheme} className="flex-1 px-4 py-2 bg-cyan-500 rounded-lg text-white">Add Theme</button>
              </div>
            </div>
          </div>
        </div>
      )}

      <div className="text-center text-xs text-slate-500 mt-8">
        AI GENERATED - REQUIRES HUMAN REVIEW | © 2026 Mission Meets Tech
      </div>
    </div>
  );
}

ReactDOM.render(<WinThemes/>,document.getElementById('root'));
</script>
</body>
</html>
