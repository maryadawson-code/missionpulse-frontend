      copy: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>,
      arrowLeft: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>,

      filter: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>,
      chart: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    // ============================================
    // CATEGORY CONFIG
    // ============================================
    const CATEGORIES = {
      discriminator: { label: 'Discriminator', color: 'cyan', icon: 'star', description: 'Why we win' },
      ghost: { label: 'Ghost Theme', color: 'purple', icon: 'ghost', description: 'Counter competitor weaknesses' },
      price: { label: 'Price/Value', color: 'emerald', icon: 'dollar', description: 'Cost advantage messaging' },
      technical: { label: 'Technical', color: 'blue', icon: 'shield', description: 'Technical superiority' },
      past_perf: { label: 'Past Performance', color: 'amber', icon: 'target', description: 'Proven track record' }
    };

    const PRIORITIES = {
      critical: { label: 'Critical', color: 'red' },
      high: { label: 'High', color: 'amber' },
      medium: { label: 'Medium', color: 'blue' },
      low: { label: 'Low', color: 'slate' }
    };

    const STATUSES = {
      draft: { label: 'Draft', color: 'slate' },
      approved: { label: 'Approved', color: 'emerald' },
      rejected: { label: 'Rejected', color: 'red' },
      archived: { label: 'Archived', color: 'gray' }
    };

    // ============================================
    // COMPONENTS
    // ============================================
    const Badge = ({ children, variant = 'default', size = 'sm' }) => {
      const variants = {
        default: 'bg-slate-700 text-slate-300',
        cyan: 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30',
        emerald: 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30',
        amber: 'bg-amber-500/20 text-amber-400 border border-amber-500/30',
        red: 'bg-red-500/20 text-red-400 border border-red-500/30',
        purple: 'bg-purple-500/20 text-purple-400 border border-purple-500/30',
        blue: 'bg-blue-500/20 text-blue-400 border border-blue-500/30',
        slate: 'bg-slate-500/20 text-slate-400 border border-slate-500/30',
        gray: 'bg-gray-500/20 text-gray-400 border border-gray-500/30'
      };
      const sizes = { xs: 'px-1.5 py-0.5 text-xs', sm: 'px-2 py-1 text-xs', md: 'px-3 py-1.5 text-sm' };
      return <span className={`inline-flex items-center gap-1 rounded-full font-medium ${variants[variant]} ${sizes[size]}`}>{children}</span>;
    };

    const Button = ({ children, variant = 'primary', size = 'md', icon, className = '', disabled = false, ...props }) => {
      const variants = {
        primary: 'bg-gradient-to-r from-cyan-500 to-teal-500 text-white hover:from-cyan-400 hover:to-teal-400',
        secondary: 'bg-slate-700 text-white hover:bg-slate-600 border border-slate-600',
        ghost: 'bg-transparent text-slate-400 hover:text-white hover:bg-slate-700/50',
        danger: 'bg-red-500/20 text-red-400 hover:bg-red-500/30 border border-red-500/30',
        success: 'bg-emerald-500 text-white hover:bg-emerald-400'
      };
      const sizes = { xs: 'px-2 py-1 text-xs', sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2 text-sm', lg: 'px-6 py-3 text-base' };
      return (
        <button className={`inline-flex items-center justify-center gap-2 font-semibold rounded-xl transition-all duration-200 ${variants[variant]} ${sizes[size]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`} disabled={disabled} {...props}>
          {icon && <Icon name={icon} className="w-4 h-4" />}{children}
        </button>
      );
    };

    const Card = ({ children, className = '', glow = false }) => (
      <div className={`glass rounded-2xl ${glow ? 'glow' : ''} ${className}`}>{children}</div>
    );

    // ============================================
    // THEME CARD
    // ============================================
    const ThemeCard = ({ theme, opportunities, onEdit, onDelete, onApprove, onCopyStatement }) => {
      const category = CATEGORIES[theme.category] || CATEGORIES.discriminator;
      const priority = PRIORITIES[theme.priority] || PRIORITIES.medium;
      const status = STATUSES[theme.status] || STATUSES.draft;
      const opportunity = opportunities.find(o => o.id === theme.opportunity_id);
      const proofPoints = Array.isArray(theme.proof_points) ? theme.proof_points : 
        (typeof theme.proof_points === 'string' ? JSON.parse(theme.proof_points || '[]') : []);

      return (
        <Card className="p-5 hover:border-cyan-500/40 transition-all">
          <div className="flex items-start justify-between mb-3">
            <div className="flex items-center gap-3">
              <div className={`w-10 h-10 rounded-xl bg-${category.color}-500/20 flex items-center justify-center`}>

              </div>
              <div>
                <h3 className="font-semibold text-white">{theme.theme_title}</h3>
                <p className="text-xs text-slate-400">{opportunity?.title || 'Unknown Opportunity'}</p>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <Badge variant={priority.color}>{priority.label}</Badge>
              <Badge variant={status.color}>{status.label}</Badge>
            </div>
          </div>

          <p className="text-sm text-slate-300 mb-4 leading-relaxed">{theme.theme_statement}</p>

          {proofPoints.length > 0 && (
            <div className="mb-4">
              <p className="text-xs text-slate-500 uppercase tracking-wider mb-2">Proof Points</p>
              <ul className="space-y-1">
                {proofPoints.map((point, i) => (
                  <li key={i} className="flex items-start gap-2 text-xs text-slate-400">
                    <Icon name="check" className="w-3 h-3 text-emerald-400 mt-0.5 flex-shrink-0" />
                    <span>{point}</span>
                  </li>
                ))}
              </ul>
            </div>
          )}

              {theme.ghost_competitor && (
                <span className="text-xs text-slate-500">
                  <Icon name="ghost" className="w-3 h-3 inline mr-1" />
                  Ghosts: {theme.ghost_competitor}
                </span>
              )}
              <span className="text-xs text-cyan-400">
                <Icon name="chart" className="w-3 h-3 inline mr-1" />
                +{theme.win_probability_impact}% pWin
              </span>
            </div>
            <div className="flex items-center gap-1">
              <Button variant="ghost" size="xs" icon="copy" onClick={() => onCopyStatement(theme)} title="Copy Theme Statement" />
              {theme.status === 'draft' && (
                <Button variant="ghost" size="xs" icon="check" onClick={() => onApprove(theme)} title="Approve" />
              )}
              <Button variant="ghost" size="xs" icon="edit" onClick={() => onEdit(theme)} title="Edit" />
              <Button variant="ghost" size="xs" icon="trash" onClick={() => onDelete(theme)} title="Delete" />
            </div>
          </div>
        </Card>
      );

    // ============================================
    // THEME FORM MODAL
    // ============================================
    const ThemeFormModal = ({ theme, opportunities, onSave, onClose }) => {
      const [formData, setFormData] = useState({
        opportunity_id: theme?.opportunity_id || opportunities[0]?.id || '',
        category: theme?.category || 'discriminator',
        theme_title: theme?.theme_title || '',
        theme_statement: theme?.theme_statement || '',
        proof_points: Array.isArray(theme?.proof_points) ? theme.proof_points.join('\n') : 
          (typeof theme?.proof_points === 'string' ? JSON.parse(theme?.proof_points || '[]').join('\n') : ''),
        ghost_competitor: theme?.ghost_competitor || '',
        win_probability_impact: theme?.win_probability_impact || 5,
        priority: theme?.priority || 'high',
        status: theme?.status || 'draft'
      });

      const handleSubmit = (e) => {
        e.preventDefault();
        const proofPointsArray = formData.proof_points.split('\n').filter(p => p.trim());
        onSave({
          ...theme,
          ...formData,
          proof_points: proofPointsArray
        });
      };

      return (
        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">

            <div className="p-6">
              <div className="flex items-center justify-between mb-6">
                <h2 className="text-xl font-bold text-white">
                  {theme ? 'Edit Win Theme' : 'Create Win Theme'}
                </h2>
                <Button variant="ghost" size="sm" icon="x" onClick={onClose} />
              </div>

              <form onSubmit={handleSubmit} className="space-y-4">
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Opportunity</label>
                    <select
                      value={formData.opportunity_id}
                      onChange={(e) => setFormData({...formData, opportunity_id: e.target.value})}
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none"
                      required
                    >
                      {opportunities.map(opp => (
                        <option key={opp.id} value={opp.id}>{opp.title}</option>
                      ))}
                    </select>
                  </div>
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Category</label>
                    <select
                      value={formData.category}
                      onChange={(e) => setFormData({...formData, category: e.target.value})}
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none"
                    >
                      {Object.entries(CATEGORIES).map(([key, cat]) => (
                        <option key={key} value={key}>{cat.label} - {cat.description}</option>
                      ))}
                    </select>
                  </div>
                </div>

                <div>
                  <label className="block text-sm text-slate-400 mb-1">Theme Title</label>
                  <input
                    type="text"
                    value={formData.theme_title}
                    onChange={(e) => setFormData({...formData, theme_title: e.target.value})}
                    className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none"
                    placeholder="e.g., Zero Downtime Migration"
                    required
                  />
                </div>

                <div>
                  <label className="block text-sm text-slate-400 mb-1">Theme Statement</label>
                  <textarea
                    value={formData.theme_statement}
                    onChange={(e) => setFormData({...formData, theme_statement: e.target.value})}
                    className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none h-24 resize-none"
                    placeholder="The compelling statement that differentiates your solution..."
                    required
                  />
                </div>

                <div>
                  <label className="block text-sm text-slate-400 mb-1">Proof Points (one per line)</label>
                  <textarea
                    value={formData.proof_points}
                    onChange={(e) => setFormData({...formData, proof_points: e.target.value})}
                    className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none h-24 resize-none"
                    placeholder="Evidence that supports this theme...&#10;One proof point per line&#10;Include metrics where possible"
                  />
                </div>

                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Ghost Competitor</label>
                    <input
                      type="text"
                      value={formData.ghost_competitor}
                      onChange={(e) => setFormData({...formData, ghost_competitor: e.target.value})}
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none"
                      placeholder="e.g., Leidos, Cerner"
                    />
                  </div>
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Win Probability Impact (%)</label>
                    <input
                      type="number"
                      min="1"
                      max="25"
                      value={formData.win_probability_impact}
                      onChange={(e) => setFormData({...formData, win_probability_impact: parseInt(e.target.value) || 5})}
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none"
                    />
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Priority</label>
                    <select
                      value={formData.priority}
                      onChange={(e) => setFormData({...formData, priority: e.target.value})}
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none"
                    >
                      {Object.entries(PRIORITIES).map(([key, p]) => (
                        <option key={key} value={key}>{p.label}</option>
                      ))}
                    </select>
                  </div>
                  <div>
                    <label className="block text-sm text-slate-400 mb-1">Status</label>
                    <select
                      value={formData.status}
                      onChange={(e) => setFormData({...formData, status: e.target.value})}
                      className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none"
                    >
                      {Object.entries(STATUSES).map(([key, s]) => (
                        <option key={key} value={key}>{s.label}</option>
                      ))}
                    </select>
                  </div>
                </div>

                <div className="flex justify-end gap-3 pt-4 border-t border-slate-700">
                  <Button variant="secondary" onClick={onClose}>Cancel</Button>
                  <Button type="submit" variant="primary" icon="check">
                    {theme ? 'Update Theme' : 'Create Theme'}
                  </Button>
                </div>
              </form>
            </div>
          </Card>
        </div>
      );
    };

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [themes, setThemes] = useState(DEMO_THEMES);
      const [opportunities, setOpportunities] = useState(DEMO_OPPORTUNITIES);
      const [connected, setConnected] = useState(false);
      const [loading, setLoading] = useState(true);
      const [showModal, setShowModal] = useState(false);
      const [editingTheme, setEditingTheme] = useState(null);
      const [filterCategory, setFilterCategory] = useState('all');
      const [filterOpportunity, setFilterOpportunity] = useState('all');
      const [notification, setNotification] = useState(null);

      useEffect(() => {
        loadData();
      }, []);

      const showNotification = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 3000);
      };

      const loadData = async () => {
        try {
          // Load opportunities first
          const { data: opps, error: oppError } = await supabase
            .from('opportunities')
            .select('id, title, agency, value')
            .order('title');
          
          if (!oppError && opps?.length > 0) {
            setOpportunities(opps);
          }

          // Load themes
          const { data: rows, error } = await supabase
            .from('win_themes')
            .select('*')
            .order('created_at', { ascending: false });

          if (!error && rows) {
            setThemes(rows.length > 0 ? rows : DEMO_THEMES);
            setConnected(true);
          }
        } catch (e) {
          console.log('Using demo data:', e);
        }
        setLoading(false);
      };

      const handleSave = async (themeData) => {
        try {
          const proofPointsJson = JSON.stringify(themeData.proof_points || []);
          
          if (themeData.id && !themeData.id.startsWith('demo-')) {
            // Update existing
            const { error } = await supabase
              .from('win_themes')
              .update({
                ...themeData,
                proof_points: proofPointsJson,
                updated_at: new Date().toISOString()
              })
              .eq('id', themeData.id);

            if (error) throw error;
            showNotification('Theme updated successfully');
          } else {
            // Create new
            const { id, ...insertData } = themeData;
            const { error } = await supabase
              .from('win_themes')
              .insert({
                ...insertData,
                proof_points: proofPointsJson
              });

            if (error) throw error;
            showNotification('Theme created successfully');
          }
          
          await loadData();
        } catch (e) {
          console.error('Save error:', e);
          // Fallback to local state for demo
          if (themeData.id) {
            setThemes(themes.map(t => t.id === themeData.id ? themeData : t));
          } else {
            setThemes([{ ...themeData, id: `demo-${Date.now()}`, created_at: new Date().toISOString() }, ...themes]);
          }
          showNotification('Saved locally (demo mode)', 'warning');
        }
        setShowModal(false);
        setEditingTheme(null);
      };

      const handleDelete = async (theme) => {
        if (!confirm('Delete this win theme?')) return;
        
        try {
          if (!theme.id.startsWith('demo-')) {
            const { error } = await supabase
              .from('win_themes')
              .delete()
              .eq('id', theme.id);
            
            if (error) throw error;
          }
          
          setThemes(themes.filter(t => t.id !== theme.id));
          showNotification('Theme deleted');
        } catch (e) {
          console.error('Delete error:', e);
          setThemes(themes.filter(t => t.id !== theme.id));
          showNotification('Deleted locally', 'warning');
        }
      };

      const handleApprove = async (theme) => {
        try {
          if (!theme.id.startsWith('demo-')) {
            const { error } = await supabase
              .from('win_themes')
              .update({ status: 'approved', approved_at: new Date().toISOString() })
              .eq('id', theme.id);
            
            if (error) throw error;
          }
          
          setThemes(themes.map(t => t.id === theme.id ? { ...t, status: 'approved' } : t));
          showNotification('Theme approved');
        } catch (e) {
          console.error('Approve error:', e);
          setThemes(themes.map(t => t.id === theme.id ? { ...t, status: 'approved' } : t));
        }
      };

      const handleCopyStatement = (theme) => {
        navigator.clipboard.writeText(theme.theme_statement);
        showNotification('Theme statement copied to clipboard');
      };

      const filteredThemes = themes.filter(t => {
        if (filterCategory !== 'all' && t.category !== filterCategory) return false;
        if (filterOpportunity !== 'all' && t.opportunity_id !== filterOpportunity) return false;
        return true;
      });

      // Stats
      const totalImpact = filteredThemes.reduce((sum, t) => sum + (t.win_probability_impact || 0), 0);
      const approvedCount = filteredThemes.filter(t => t.status === 'approved').length;

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <Icon name="sparkles" className="w-12 h-12 text-cyan-400 mx-auto mb-4 animate-pulse" />
              <p className="text-slate-400">Loading win themes...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen p-6">
          {/* Connection Status */}
          <div className={`fixed top-4 right-4 px-3 py-1.5 rounded-full text-xs font-medium flex items-center gap-2 z-50 ${connected ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-amber-500/20 text-amber-400 border border-amber-500/30'}`}>
            <span className={`w-2 h-2 rounded-full ${connected ? 'bg-emerald-400' : 'bg-amber-400 animate-pulse'}`}></span>
            {connected ? 'Connected' : 'Demo Mode'}
          </div>

          {/* Notification */}
          {notification && (
            <div className={`fixed top-16 right-4 px-4 py-2 rounded-lg text-sm z-50 ${notification.type === 'success' ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-amber-500/20 text-amber-400 border border-amber-500/30'}`}>
              {notification.message}
            </div>
          )}

          {/* Header */}
          <div className="max-w-7xl mx-auto mb-8">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-4">
                <a href="index.html" className="text-slate-400 hover:text-white transition-colors">
                  <Icon name="arrowLeft" className="w-5 h-5" />
                </a>
                <div>
                  <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                    <Icon name="star" className="w-6 h-6 text-cyan-400" />
                    Win Themes
                  </h1>
                  <p className="text-slate-400 text-sm">Craft compelling discriminators and ghost themes</p>
                </div>
              </div>
              <Button variant="primary" icon="plus" onClick={() => { setEditingTheme(null); setShowModal(true); }}>
                Add Theme
              </Button>
            </div>
          </div>

          {/* Stats Bar */}
          <div className="max-w-7xl mx-auto mb-6">
            <div className="grid grid-cols-4 gap-4">
              <Card className="p-4 text-center">
                <p className="text-2xl font-bold text-white">{filteredThemes.length}</p>
                <p className="text-xs text-slate-400">Total Themes</p>
              </Card>
              <Card className="p-4 text-center">
                <p className="text-2xl font-bold text-emerald-400">{approvedCount}</p>
                <p className="text-xs text-slate-400">Approved</p>
              </Card>
              <Card className="p-4 text-center">
                <p className="text-2xl font-bold text-cyan-400">+{totalImpact}%</p>
                <p className="text-xs text-slate-400">Combined pWin Impact</p>
              </Card>
              <Card className="p-4 text-center">
                <p className="text-2xl font-bold text-amber-400">{filteredThemes.filter(t => t.status === 'draft').length}</p>
                <p className="text-xs text-slate-400">Pending Review</p>
              </Card>
            </div>
          </div>

          {/* Filters */}
          <div className="max-w-7xl mx-auto mb-6">
            <Card className="p-4">
              <div className="flex items-center gap-4">
                <Icon name="filter" className="w-4 h-4 text-slate-400" />
                <select
                  value={filterCategory}
                  onChange={(e) => setFilterCategory(e.target.value)}
                  className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-white focus:border-cyan-500 focus:outline-none"
                >
                  <option value="all">All Categories</option>
                  {Object.entries(CATEGORIES).map(([key, cat]) => (
                    <option key={key} value={key}>{cat.label}</option>
                  ))}
                </select>
                <select
                  value={filterOpportunity}
                  onChange={(e) => setFilterOpportunity(e.target.value)}
                  className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-white focus:border-cyan-500 focus:outline-none"
                >
                  <option value="all">All Opportunities</option>
                  {opportunities.map(opp => (
                    <option key={opp.id} value={opp.id}>{opp.title}</option>
                  ))}
                </select>
                <span className="text-xs text-slate-500 ml-auto">
                  Showing {filteredThemes.length} of {themes.length} themes
                </span>
              </div>
            </Card>
          </div>

          {/* Themes Grid */}
          <div className="max-w-7xl mx-auto">
            {filteredThemes.length === 0 ? (
              <Card className="p-12 text-center">
                <Icon name="star" className="w-12 h-12 text-slate-600 mx-auto mb-4" />
                <h3 className="text-lg font-semibold text-slate-400 mb-2">No win themes yet</h3>
                <p className="text-slate-500 mb-4">Create your first discriminator or ghost theme</p>
                <Button variant="primary" icon="plus" onClick={() => { setEditingTheme(null); setShowModal(true); }}>
                  Create Theme
                </Button>
              </Card>
            ) : (
              <div className="grid md:grid-cols-2 gap-4">
                {filteredThemes.map(theme => (
                  <ThemeCard
                    key={theme.id}
                    theme={theme}
                    opportunities={opportunities}
                    onEdit={(t) => { setEditingTheme(t); setShowModal(true); }}
                    onDelete={handleDelete}
                    onApprove={handleApprove}
                    onCopyStatement={handleCopyStatement}
                  />
                ))}
              </div>
            )}
          </div>

          {/* Footer */}
          <div className="max-w-7xl mx-auto mt-12 text-center">
            <p className="text-xs text-slate-500">
              MissionPulse v3.1 • Mission Meets Tech • AI GENERATED CONTENT REQUIRES HUMAN REVIEW
            </p>
          </div>

          {/* Modal */}
          {showModal && (
            <ThemeFormModal
              theme={editingTheme}
              opportunities={opportunities}
              onSave={handleSave}
              onClose={() => { setShowModal(false); setEditingTheme(null); }}
            />
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
