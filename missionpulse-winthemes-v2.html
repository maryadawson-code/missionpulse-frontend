<!DOCTYPE html>
<html lang="en">
<!--
  FILE: missionpulse-winthemes-v2.html
  ROLE: CEO | COO | CAP | SA | PM
  SECURITY: env vars verified
  VERSION: 2.0.0
  
  Win Themes Builder - Discriminator & Theme Management
  © 2026 Mission Meets Tech
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Win Themes Builder | MissionPulse</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const THEME_CATEGORIES = [
      { id: 'technical', name: 'Technical Excellence', icon: '⚙️', color: '#3B82F6' },
      { id: 'experience', name: 'Relevant Experience', icon: '📊', color: '#8B5CF6' },
      { id: 'team', name: 'Team Strength', icon: '👥', color: '#10B981' },
      { id: 'innovation', name: 'Innovation', icon: '💡', color: '#F59E0B' },
      { id: 'risk', name: 'Risk Mitigation', icon: '🛡️', color: '#EF4444' },
      { id: 'value', name: 'Best Value', icon: '💰', color: '#00E5FA' },
    ];

    const DEMO_THEMES = [
      { id: 1, category: 'technical', title: 'Proven Healthcare Data Platform', description: 'Deployed at 3 DoD MTFs with 99.9% uptime', strength: 95, evidence: ['DHA Phase 1 Success', 'HIPAA Certified'], opportunity_id: 1 },
      { id: 2, category: 'team', title: 'Cleared Healthcare IT Experts', description: '15 TS/SCI cleared staff with avg 12 years experience', strength: 88, evidence: ['Key Personnel Resumes', 'Clearance Verification'], opportunity_id: 1 },
      { id: 3, category: 'experience', title: 'VA Modernization Track Record', description: '3 successful VA contract completions totaling $45M', strength: 92, evidence: ['CPARs Ratings', 'Contract Awards'], opportunity_id: 1 },
      { id: 4, category: 'innovation', title: 'AI-Powered Analytics', description: 'Proprietary ML models reduce processing time by 60%', strength: 85, evidence: ['Patent #12345', 'Benchmark Results'], opportunity_id: 1 },
    ];

    const DEMO_OPPS = [
      { id: 1, name: 'DHA Healthcare Platform', agency: 'DHA' },
      { id: 2, name: 'VA Claims Modernization', agency: 'VA' },
    ];

    function WinThemesBuilder() {
      const [connected, setConnected] = useState(false);
      const [loading, setLoading] = useState(true);
      const [opportunities, setOpportunities] = useState([]);
      const [selectedOpp, setSelectedOpp] = useState(null);
      const [themes, setThemes] = useState([]);
      const [editingTheme, setEditingTheme] = useState(null);
      const [showAddModal, setShowAddModal] = useState(false);

      useEffect(() => { loadData(); }, []);

      const loadData = async () => {
        try {
          const { data: opps } = await supabase.from('opportunities').select('id, name, agency').limit(10);
          const { data: themeData } = await supabase.from('win_themes').select('*');
          
          setOpportunities(opps?.length ? opps : DEMO_OPPS);
          setThemes(themeData?.length ? themeData : DEMO_THEMES);
          setConnected(true);
        } catch (err) {
          console.error('Load error:', err);
          setOpportunities(DEMO_OPPS);
          setThemes(DEMO_THEMES);
        } finally {
          setLoading(false);
        }
      };

      const filteredThemes = selectedOpp 
        ? themes.filter(t => t.opportunity_id === selectedOpp.id)
        : themes;

      const saveTheme = async (themeData) => {
        try {
          if (themeData.id) {
            await supabase.from('win_themes').update(themeData).eq('id', themeData.id);
            setThemes(themes.map(t => t.id === themeData.id ? themeData : t));
          } else {
            const newTheme = { ...themeData, id: Date.now() };
            await supabase.from('win_themes').insert(newTheme);
            setThemes([...themes, newTheme]);
          }
          setEditingTheme(null);
          setShowAddModal(false);
        } catch (err) {
          console.error('Save error:', err);
          // Demo mode - update locally
          if (themeData.id) {
            setThemes(themes.map(t => t.id === themeData.id ? themeData : t));
          } else {
            setThemes([...themes, { ...themeData, id: Date.now() }]);
          }
          setEditingTheme(null);
          setShowAddModal(false);
        }
      };

      const deleteTheme = async (id) => {
        if (!confirm('Delete this win theme?')) return;
        try {
          await supabase.from('win_themes').delete().eq('id', id);
        } catch (err) { console.error('Delete error:', err); }
        setThemes(themes.filter(t => t.id !== id));
      };

      if (loading) {
        return (
          <div className="min-h-screen bg-[#00050F] flex items-center justify-center">
            <div className="w-12 h-12 border-4 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin" />
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#00050F] text-white p-6">
          {/* Header */}
          <div className="flex items-center justify-between mb-6">
            <div>
              <div className="flex items-center gap-3">
                <span className="text-3xl">🏆</span>
                <h1 className="text-2xl font-bold">Win Themes Builder</h1>
                <span className={`px-2 py-1 text-xs rounded-full ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                  {connected ? '● Live' : '○ Demo'}
                </span>
              </div>
              <p className="text-slate-400 mt-1">Define discriminators and build compelling win themes</p>
            </div>
            
            <button 
              onClick={() => { setShowAddModal(true); setEditingTheme({ category: 'technical', title: '', description: '', strength: 70, evidence: [], opportunity_id: selectedOpp?.id || 1 }); }}
              className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium"
            >
              + Add Win Theme
            </button>
          </div>

          {/* Opportunity Filter */}
          <div className="mb-6 flex items-center gap-4">
            <select 
              value={selectedOpp?.id || ''}
              onChange={(e) => setSelectedOpp(opportunities.find(o => o.id == e.target.value) || null)}
              className="bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white"
            >
              <option value="">All Opportunities</option>
              {opportunities.map(opp => (
                <option key={opp.id} value={opp.id}>{opp.name} ({opp.agency})</option>
              ))}
            </select>
            <div className="text-sm text-slate-400">{filteredThemes.length} themes</div>
          </div>

          {/* Category Tabs */}
          <div className="flex gap-2 mb-6 flex-wrap">
            {THEME_CATEGORIES.map(cat => {
              const count = filteredThemes.filter(t => t.category === cat.id).length;
              return (
                <div key={cat.id} className="px-4 py-2 bg-slate-800/50 rounded-lg border border-slate-700/50 flex items-center gap-2">
                  <span>{cat.icon}</span>
                  <span className="font-medium">{cat.name}</span>
                  <span className="px-2 py-0.5 bg-slate-700 rounded text-xs">{count}</span>
                </div>
              );
            })}
          </div>

          {/* Themes Grid */}
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {filteredThemes.map(theme => {
              const category = THEME_CATEGORIES.find(c => c.id === theme.category);
              return (
                <div key={theme.id} className="bg-slate-800/50 rounded-xl border border-slate-700/50 p-5 hover:border-slate-600 transition-colors">
                  <div className="flex items-start justify-between mb-3">
                    <div className="flex items-center gap-2">
                      <span className="text-2xl">{category?.icon}</span>
                      <span className="text-xs px-2 py-1 rounded-full" style={{ backgroundColor: `${category?.color}20`, color: category?.color }}>
                        {category?.name}
                      </span>
                    </div>
                    <div className="flex gap-1">
                      <button onClick={() => { setEditingTheme(theme); setShowAddModal(true); }} className="p-1.5 hover:bg-slate-700 rounded text-slate-400">✏️</button>
                      <button onClick={() => deleteTheme(theme.id)} className="p-1.5 hover:bg-red-500/20 rounded text-red-400">🗑️</button>
                    </div>
                  </div>
                  
                  <h3 className="font-bold text-lg mb-2">{theme.title}</h3>
                  <p className="text-slate-400 text-sm mb-4">{theme.description}</p>
                  
                  {/* Strength Meter */}
                  <div className="mb-4">
                    <div className="flex justify-between text-xs mb-1">
                      <span className="text-slate-500">Theme Strength</span>
                      <span className="font-bold" style={{ color: theme.strength >= 80 ? '#10B981' : theme.strength >= 60 ? '#F59E0B' : '#EF4444' }}>
                        {theme.strength}%
                      </span>
                    </div>
                    <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
                      <div 
                        className="h-full rounded-full transition-all duration-500"
                        style={{ 
                          width: `${theme.strength}%`, 
                          backgroundColor: theme.strength >= 80 ? '#10B981' : theme.strength >= 60 ? '#F59E0B' : '#EF4444' 
                        }}
                      />
                    </div>
                  </div>
                  
                  {/* Evidence */}
                  {theme.evidence?.length > 0 && (
                    <div>
                      <div className="text-xs text-slate-500 mb-2">Supporting Evidence</div>
                      <div className="flex flex-wrap gap-1">
                        {theme.evidence.map((ev, i) => (
                          <span key={i} className="px-2 py-1 bg-slate-700/50 text-slate-300 text-xs rounded">
                            📎 {ev}
                          </span>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Add/Edit Modal */}
          {showAddModal && editingTheme && (
            <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
              <div className="bg-slate-900 rounded-2xl border border-slate-700 p-6 w-full max-w-lg">
                <h2 className="text-xl font-bold mb-6">{editingTheme.id ? 'Edit Win Theme' : 'Add Win Theme'}</h2>
                
                <div className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-2">Category</label>
                    <select 
                      value={editingTheme.category}
                      onChange={(e) => setEditingTheme({ ...editingTheme, category: e.target.value })}
                      className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2"
                    >
                      {THEME_CATEGORIES.map(cat => (
                        <option key={cat.id} value={cat.id}>{cat.icon} {cat.name}</option>
                      ))}
                    </select>
                  </div>
                  
                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-2">Title</label>
                    <input 
                      type="text"
                      value={editingTheme.title}
                      onChange={(e) => setEditingTheme({ ...editingTheme, title: e.target.value })}
                      placeholder="Proven Healthcare Data Platform"
                      className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2"
                    />
                  </div>
                  
                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-2">Description</label>
                    <textarea 
                      value={editingTheme.description}
                      onChange={(e) => setEditingTheme({ ...editingTheme, description: e.target.value })}
                      placeholder="Describe the discriminator and why it matters..."
                      className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 h-24"
                    />
                  </div>
                  
                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-2">Strength Score ({editingTheme.strength}%)</label>
                    <input 
                      type="range"
                      min="0"
                      max="100"
                      value={editingTheme.strength}
                      onChange={(e) => setEditingTheme({ ...editingTheme, strength: parseInt(e.target.value) })}
                      className="w-full"
                    />
                  </div>
                  
                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-2">Evidence (comma-separated)</label>
                    <input 
                      type="text"
                      value={editingTheme.evidence?.join(', ') || ''}
                      onChange={(e) => setEditingTheme({ ...editingTheme, evidence: e.target.value.split(',').map(s => s.trim()).filter(Boolean) })}
                      placeholder="CPARs Rating, Contract Award, Patent..."
                      className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2"
                    />
                  </div>
                </div>
                
                <div className="flex gap-3 mt-6">
                  <button onClick={() => { setShowAddModal(false); setEditingTheme(null); }} className="flex-1 px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg">
                    Cancel
                  </button>
                  <button onClick={() => saveTheme(editingTheme)} className="flex-1 px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium">
                    Save Theme
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <div className="mt-8 pt-4 border-t border-slate-800 text-center text-xs text-slate-600">
            AI GENERATED - REQUIRES HUMAN REVIEW
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<WinThemesBuilder />);
  </script>
</body>
</html>
