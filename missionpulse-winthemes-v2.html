<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Win Themes & Discriminators</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
    .glow { box-shadow: 0 0 20px rgba(0, 229, 250, 0.15); }
    .cui-badge { background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    
    // Supabase Configuration
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    
    // Demo Data
    const DEMO_OPPORTUNITIES = [
      { id: 'opp-1', title: 'DHA MHS GENESIS Support', agency: 'DHA', phase: 'Gate 3', pwin: 75 },
      { id: 'opp-2', title: 'VA EHR Modernization', agency: 'VA', phase: 'Gate 2', pwin: 60 },
      { id: 'opp-3', title: 'CMS Data Analytics Platform', agency: 'CMS', phase: 'Gate 4', pwin: 80 }
    ];
    
    const DEMO_THEMES = [
      { id: 'theme-1', opportunity_id: 'opp-1', theme: 'Proven MHS GENESIS Experience', discriminator: '15+ successful DHA implementations with 99.2% uptime', evidence: 'Past performance on DHA-DHMSM-0001, VA-EHR-2023', priority: 1, category: 'Experience' },
      { id: 'theme-2', opportunity_id: 'opp-1', theme: 'Zero-Disruption Transition', discriminator: 'Proprietary parallel migration methodology eliminates downtime', evidence: 'Case study: Madigan Army Medical Center - zero patient impact', priority: 2, category: 'Technical' },
      { id: 'theme-3', opportunity_id: 'opp-1', theme: 'CMMC 2.0 Certified Team', discriminator: '100% staff with active security clearances and CMMC certification', evidence: 'CMMC Level 2 certified January 2026', priority: 3, category: 'Compliance' },
      { id: 'theme-4', opportunity_id: 'opp-2', theme: 'Interoperability Excellence', discriminator: 'FHIR R4 native architecture with proven VA/DoD data exchange', evidence: 'Joint Health Information Exchange deployment', priority: 1, category: 'Technical' },
      { id: 'theme-5', opportunity_id: 'opp-2', theme: 'Veteran-Centric Design', discriminator: 'Human-centered design validated by 500+ veteran user sessions', evidence: 'VSO partnership testimonials, A/B testing results', priority: 2, category: 'User Focus' },
      { id: 'theme-6', opportunity_id: 'opp-3', theme: 'AI-Powered Analytics', discriminator: 'FedRAMP High authorized AI/ML platform for claims processing', evidence: 'AskSage integration, ATO package available', priority: 1, category: 'Innovation' }
    ];
    
    const CATEGORIES = ['Experience', 'Technical', 'Compliance', 'Cost', 'Innovation', 'User Focus', 'Management', 'Risk'];
    
    function App() {
      const [opportunities, setOpportunities] = useState(DEMO_OPPORTUNITIES);
      const [themes, setThemes] = useState(DEMO_THEMES);
      const [selectedOpp, setSelectedOpp] = useState(null);
      const [connected, setConnected] = useState(false);
      const [loading, setLoading] = useState(true);
      const [showModal, setShowModal] = useState(false);
      const [editingTheme, setEditingTheme] = useState(null);
      const [formData, setFormData] = useState({ theme: '', discriminator: '', evidence: '', priority: 1, category: 'Technical' });
      
      useEffect(() => {
        loadData();
      }, []);
      
      const loadData = async () => {
        try {
          // Load opportunities
          const { data: opps, error: oppError } = await supabase
            .from('opportunities')
            .select('id, title, agency, phase, pwin')
            .order('due_date', { ascending: true });
          
          if (!oppError && opps?.length > 0) {
            setOpportunities(opps);
            setConnected(true);
          }
          
          // Load themes
          const { data: themeData, error: themeError } = await supabase
            .from('win_themes')
            .select('*')
            .order('priority', { ascending: true });
          
          if (!themeError && themeData?.length > 0) {
            setThemes(themeData);
          }
        } catch (e) {
          console.log('Using demo data:', e);
        }
        setLoading(false);
      };
      
      const handleSave = async () => {
        const payload = {
          ...formData,
          opportunity_id: selectedOpp.id
        };
        
        try {
          if (editingTheme) {
            const { error } = await supabase
              .from('win_themes')
              .update(payload)
              .eq('id', editingTheme.id);
            
            if (!error) {
              setThemes(themes.map(t => t.id === editingTheme.id ? { ...t, ...payload } : t));
            } else {
              // Demo fallback
              setThemes(themes.map(t => t.id === editingTheme.id ? { ...t, ...payload } : t));
            }
          } else {
            const newTheme = { ...payload, id: `theme-${Date.now()}` };
            const { data, error } = await supabase
              .from('win_themes')
              .insert(payload)
              .select()
              .single();
            
            if (!error && data) {
              setThemes([...themes, data]);
            } else {
              setThemes([...themes, newTheme]);
            }
          }
        } catch (e) {
          const newTheme = { ...payload, id: `theme-${Date.now()}` };
          if (editingTheme) {
            setThemes(themes.map(t => t.id === editingTheme.id ? { ...t, ...payload } : t));
          } else {
            setThemes([...themes, newTheme]);
          }
        }
        
        closeModal();
      };
      
      const handleDelete = async (theme) => {
        if (!confirm('Delete this win theme?')) return;
        
        try {
          const { error } = await supabase.from('win_themes').delete().eq('id', theme.id);
          if (error) throw error;
        } catch (e) {
          console.log('Demo delete');
        }
        setThemes(themes.filter(t => t.id !== theme.id));
      };
      
      const openModal = (theme = null) => {
        if (theme) {
          setEditingTheme(theme);
          setFormData({
            theme: theme.theme,
            discriminator: theme.discriminator,
            evidence: theme.evidence || '',
            priority: theme.priority || 1,
            category: theme.category || 'Technical'
          });
        } else {
          setEditingTheme(null);
          setFormData({ theme: '', discriminator: '', evidence: '', priority: themes.filter(t => t.opportunity_id === selectedOpp?.id).length + 1, category: 'Technical' });
        }
        setShowModal(true);
      };
      
      const closeModal = () => {
        setShowModal(false);
        setEditingTheme(null);
        setFormData({ theme: '', discriminator: '', evidence: '', priority: 1, category: 'Technical' });
      };
      
      const oppThemes = selectedOpp ? themes.filter(t => t.opportunity_id === selectedOpp.id) : [];
      
      const getPriorityColor = (priority) => {
        if (priority === 1) return 'bg-amber-500';
        if (priority === 2) return 'bg-slate-400';
        if (priority === 3) return 'bg-amber-700';
        return 'bg-slate-600';
      };
      
      const getCategoryIcon = (category) => {
        const icons = {
          'Experience': '🏆', 'Technical': '⚙️', 'Compliance': '🛡️', 'Cost': '💰',
          'Innovation': '💡', 'User Focus': '👥', 'Management': '📋', 'Risk': '⚠️'
        };
        return icons[category] || '📌';
      };
      
      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-cyan-400 flex items-center gap-3">
              <div className="w-6 h-6 border-2 border-cyan-400 border-t-transparent rounded-full animate-spin"></div>
              Loading Win Themes...
            </div>
          </div>
        );
      }
      
      return (
        <div className="min-h-screen">
          {/* Connection Status */}
          <div className={`fixed top-4 right-4 px-3 py-1.5 rounded-full text-xs font-medium z-50 ${connected ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-amber-500/20 text-amber-400 border border-amber-500/30'}`}>
            {connected ? '● Live' : '○ Demo Mode'}
          </div>
          
          {/* Header */}
          <header className="glass border-b border-cyan-500/20 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="text-slate-400 hover:text-cyan-400 transition-colors">
                    ← Back
                  </a>
                  <div>
                    <h1 className="text-2xl font-bold text-white">Win Themes & Discriminators</h1>
                    <p className="text-slate-400 text-sm">Define compelling themes that differentiate your proposal</p>
                  </div>
                </div>
                <div className="flex items-center gap-2 text-xs text-slate-500">
                  <span className="cui-badge px-2 py-1 rounded text-white">CUI // SP-PROPIN</span>
                </div>
              </div>
            </div>
          </header>
          
          <main className="max-w-7xl mx-auto px-6 py-8">
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
              {/* Opportunity Selector */}
              <div className="lg:col-span-1">
                <div className="glass rounded-xl p-6 glow">
                  <h2 className="text-lg font-semibold text-white mb-4">Select Opportunity</h2>
                  <div className="space-y-3">
                    {opportunities.map(opp => (
                      <button
                        key={opp.id}
                        onClick={() => setSelectedOpp(opp)}
                        className={`w-full text-left p-4 rounded-lg transition-all ${selectedOpp?.id === opp.id ? 'bg-cyan-500/20 border border-cyan-500/50' : 'bg-slate-800/50 border border-slate-700/50 hover:border-cyan-500/30'}`}
                      >
                        <div className="flex justify-between items-start mb-2">
                          <span className="font-medium text-white">{opp.title}</span>
                          <span className={`text-xs px-2 py-0.5 rounded ${opp.pwin >= 70 ? 'bg-emerald-500/20 text-emerald-400' : opp.pwin >= 50 ? 'bg-amber-500/20 text-amber-400' : 'bg-red-500/20 text-red-400'}`}>
                            {opp.pwin}% pWin
                          </span>
                        </div>
                        <div className="flex items-center gap-2 text-xs text-slate-400">
                          <span className="bg-slate-700 px-2 py-0.5 rounded">{opp.agency}</span>
                          <span>{opp.phase}</span>
                        </div>
                        <div className="mt-2 text-xs text-cyan-400">
                          {themes.filter(t => t.opportunity_id === opp.id).length} themes defined
                        </div>
                      </button>
                    ))}
                  </div>
                </div>
                
                {/* Theme Categories Legend */}
                <div className="glass rounded-xl p-6 mt-6">
                  <h3 className="text-sm font-semibold text-slate-400 mb-3">Theme Categories</h3>
                  <div className="grid grid-cols-2 gap-2 text-xs">
                    {CATEGORIES.map(cat => (
                      <div key={cat} className="flex items-center gap-2 text-slate-300">
                        <span>{getCategoryIcon(cat)}</span>
                        <span>{cat}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
              
              {/* Themes Panel */}
              <div className="lg:col-span-2">
                {selectedOpp ? (
                  <div className="glass rounded-xl p-6 glow">
                    <div className="flex justify-between items-center mb-6">
                      <div>
                        <h2 className="text-xl font-semibold text-white">{selectedOpp.title}</h2>
                        <p className="text-slate-400 text-sm mt-1">{oppThemes.length} win theme{oppThemes.length !== 1 ? 's' : ''} defined</p>
                      </div>
                      <button
                        onClick={() => openModal()}
                        className="bg-cyan-500 hover:bg-cyan-600 text-slate-900 px-4 py-2 rounded-lg font-medium transition-colors flex items-center gap-2"
                      >
                        <span>+</span> Add Theme
                      </button>
                    </div>
                    
                    {oppThemes.length > 0 ? (
                      <div className="space-y-4">
                        {oppThemes.sort((a, b) => a.priority - b.priority).map((theme, idx) => (
                          <div key={theme.id} className="bg-slate-800/50 rounded-lg p-5 border border-slate-700/50 hover:border-cyan-500/30 transition-all">
                            <div className="flex justify-between items-start mb-3">
                              <div className="flex items-center gap-3">
                                <div className={`w-8 h-8 rounded-full ${getPriorityColor(theme.priority)} flex items-center justify-center text-white font-bold text-sm`}>
                                  {theme.priority}
                                </div>
                                <div>
                                  <div className="flex items-center gap-2">
                                    <span className="text-lg">{getCategoryIcon(theme.category)}</span>
                                    <h3 className="font-semibold text-white">{theme.theme}</h3>
                                  </div>
                                  <span className="text-xs text-slate-500">{theme.category}</span>
                                </div>
                              </div>
                              <div className="flex gap-2">
                                <button onClick={() => openModal(theme)} className="text-slate-400 hover:text-cyan-400 p-1">
                                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                                </button>
                                <button onClick={() => handleDelete(theme)} className="text-slate-400 hover:text-red-400 p-1">
                                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                </button>
                              </div>
                            </div>
                            
                            <div className="ml-11 space-y-3">
                              <div>
                                <div className="text-xs text-cyan-400 font-medium mb-1">DISCRIMINATOR</div>
                                <p className="text-slate-200">{theme.discriminator}</p>
                              </div>
                              
                              {theme.evidence && (
                                <div>
                                  <div className="text-xs text-emerald-400 font-medium mb-1">EVIDENCE</div>
                                  <p className="text-slate-300 text-sm">{theme.evidence}</p>
                                </div>
                              )}
                            </div>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="text-center py-12 text-slate-500">
                        <div className="text-4xl mb-3">🎯</div>
                        <p>No win themes defined yet</p>
                        <p className="text-sm mt-1">Add your first theme to capture your competitive advantages</p>
                      </div>
                    )}
                    
                    {/* Theme Strength Indicator */}
                    {oppThemes.length > 0 && (
                      <div className="mt-8 p-4 bg-slate-800/50 rounded-lg">
                        <div className="flex justify-between items-center mb-2">
                          <span className="text-sm text-slate-400">Theme Coverage Strength</span>
                          <span className="text-cyan-400 font-medium">{Math.min(100, oppThemes.length * 15)}%</span>
                        </div>
                        <div className="w-full h-2 bg-slate-700 rounded-full overflow-hidden">
                          <div className="h-full bg-gradient-to-r from-cyan-500 to-emerald-500 transition-all duration-500" style={{ width: `${Math.min(100, oppThemes.length * 15)}%` }}></div>
                        </div>
                        <p className="text-xs text-slate-500 mt-2">
                          Recommended: 5-7 themes covering Technical, Management, Cost, and Experience
                        </p>
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="glass rounded-xl p-12 text-center">
                    <div className="text-6xl mb-4">🎯</div>
                    <h3 className="text-xl text-white mb-2">Select an Opportunity</h3>
                    <p className="text-slate-400">Choose an opportunity from the left panel to view and manage its win themes</p>
                  </div>
                )}
              </div>
            </div>
          </main>
          
          {/* Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50 p-4">
              <div className="glass rounded-xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
                <div className="p-6">
                  <h2 className="text-xl font-semibold text-white mb-6">
                    {editingTheme ? 'Edit Win Theme' : 'Add Win Theme'}
                  </h2>
                  
                  <div className="space-y-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Theme Statement *</label>
                      <input
                        type="text"
                        value={formData.theme}
                        onChange={(e) => setFormData({ ...formData, theme: e.target.value })}
                        placeholder="e.g., Proven Healthcare IT Excellence"
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-500"
                      />
                    </div>
                    
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Category</label>
                        <select
                          value={formData.category}
                          onChange={(e) => setFormData({ ...formData, category: e.target.value })}
                          className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-500"
                        >
                          {CATEGORIES.map(cat => (
                            <option key={cat} value={cat}>{getCategoryIcon(cat)} {cat}</option>
                          ))}
                        </select>
                      </div>
                      
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Priority</label>
                        <input
                          type="number"
                          min="1"
                          max="10"
                          value={formData.priority}
                          onChange={(e) => setFormData({ ...formData, priority: parseInt(e.target.value) || 1 })}
                          className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-500"
                        />
                      </div>
                    </div>
                    
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Discriminator Statement *</label>
                      <textarea
                        value={formData.discriminator}
                        onChange={(e) => setFormData({ ...formData, discriminator: e.target.value })}
                        rows={3}
                        placeholder="What makes you different/better than competitors?"
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-500"
                      />
                    </div>
                    
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Supporting Evidence</label>
                      <textarea
                        value={formData.evidence}
                        onChange={(e) => setFormData({ ...formData, evidence: e.target.value })}
                        rows={2}
                        placeholder="Past performance, certifications, case studies..."
                        className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan-500"
                      />
                    </div>
                  </div>
                  
                  <div className="flex justify-end gap-3 mt-6">
                    <button onClick={closeModal} className="px-4 py-2 text-slate-400 hover:text-white transition-colors">
                      Cancel
                    </button>
                    <button
                      onClick={handleSave}
                      disabled={!formData.theme || !formData.discriminator}
                      className="bg-cyan-500 hover:bg-cyan-600 disabled:opacity-50 disabled:cursor-not-allowed text-slate-900 px-6 py-2 rounded-lg font-medium transition-colors"
                    >
                      {editingTheme ? 'Save Changes' : 'Add Theme'}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
          
          {/* Footer */}
          <footer className="mt-12 py-6 text-center text-xs text-slate-500 border-t border-slate-800">
            <p>Mission Meets Tech • Shield & Pulse UX v8.0</p>
            <p className="mt-1">AI GENERATED - REQUIRES HUMAN REVIEW</p>
          </footer>
        </div>
      );
    }
    
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
