<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposal Checklist | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 100%); min-height: 100vh; }
        .glass-card { background: rgba(0, 229, 250, 0.03); border: 1px solid rgba(0, 229, 250, 0.15); backdrop-filter: blur(10px); }
        .glow-text { text-shadow: 0 0 20px rgba(0, 229, 250, 0.5); }
        .checklist-item { transition: all 0.2s ease; }
        .checklist-item:hover { background: rgba(0, 229, 250, 0.05); }
        .checklist-item.completed { opacity: 0.7; }
        .checklist-item.completed .item-text { text-decoration: line-through; }
        .progress-ring { transition: stroke-dashoffset 0.5s ease; }
        .category-card { transition: all 0.3s ease; }
        .category-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="text-white font-sans">
    <!-- Navigation -->
    <nav class="bg-[#00050F]/90 border-b border-cyan-500/20 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <a href="missionpulse-mission-control.html" class="text-cyan-400 hover:text-cyan-300">
                    <i class="fas fa-arrow-left mr-2"></i>Mission Control
                </a>
                <span class="text-gray-600">|</span>
                <h1 class="text-xl font-bold text-white">
                    <i class="fas fa-clipboard-check text-cyan-400 mr-2"></i>Proposal Checklist
                </h1>
            </div>
            <div class="flex items-center space-x-3">
                <select id="opportunitySelect" class="bg-gray-800/50 border border-gray-700 rounded-lg px-3 py-2 text-white text-sm" onchange="loadChecklist()">
                    <option value="va-ehr">VA EHR Modernization - $45M</option>
                    <option value="dha-analytics">DHA Analytics Platform - $28M</option>
                    <option value="cms-data">CMS Data Integration - $15M</option>
                </select>
                <button onclick="exportChecklist()" class="px-4 py-2 bg-cyan-500/20 hover:bg-cyan-500/30 border border-cyan-500/50 rounded-lg text-cyan-400 transition-all">
                    <i class="fas fa-download mr-2"></i>Export
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Progress Overview -->
        <div class="glass-card rounded-xl p-6 mb-8">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div>
                    <h2 class="text-2xl font-bold text-white mb-1" id="oppTitle">VA EHR Modernization</h2>
                    <p class="text-gray-400">Due: <span id="dueDate" class="text-yellow-400">March 15, 2026</span> • <span id="daysLeft" class="text-cyan-400">42 days left</span></p>
                </div>
                <div class="flex items-center space-x-6">
                    <!-- Progress Ring -->
                    <div class="relative w-24 h-24">
                        <svg class="w-full h-full transform -rotate-90">
                            <circle cx="48" cy="48" r="40" stroke="#1f2937" stroke-width="8" fill="none"/>
                            <circle id="progressRing" cx="48" cy="48" r="40" stroke="#00E5FA" stroke-width="8" fill="none" 
                                stroke-dasharray="251.2" stroke-dashoffset="251.2" class="progress-ring" stroke-linecap="round"/>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span id="progressPercent" class="text-2xl font-bold text-cyan-400">0%</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-3xl font-bold text-white"><span id="completedCount">0</span>/<span id="totalCount">0</span></div>
                        <div class="text-gray-400 text-sm">Items Complete</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Category Quick Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 mb-8" id="categoryStats">
            <!-- Populated by JS -->
        </div>

        <!-- Checklist Categories -->
        <div class="space-y-6" id="checklistContainer">
            <!-- Populated by JS -->
        </div>

        <!-- Add Custom Item -->
        <div class="glass-card rounded-xl p-6 mt-8">
            <h3 class="text-lg font-bold text-white mb-4">
                <i class="fas fa-plus-circle text-cyan-400 mr-2"></i>Add Custom Checklist Item
            </h3>
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="customItemText" placeholder="Enter checklist item..." 
                    class="flex-1 bg-gray-800/50 border border-gray-700 rounded-lg px-4 py-3 text-white">
                <select id="customItemCategory" class="bg-gray-800/50 border border-gray-700 rounded-lg px-4 py-3 text-white">
                    <option value="compliance">Compliance</option>
                    <option value="technical">Technical</option>
                    <option value="pricing">Pricing</option>
                    <option value="management">Management</option>
                    <option value="past-performance">Past Performance</option>
                    <option value="final-review">Final Review</option>
                </select>
                <button onclick="addCustomItem()" class="px-6 py-3 bg-cyan-600 hover:bg-cyan-500 rounded-lg text-white font-medium transition-all">
                    <i class="fas fa-plus mr-2"></i>Add
                </button>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 bg-gray-900 border border-cyan-500/30 rounded-lg p-4 shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <div class="flex items-center space-x-3">
            <i id="toastIcon" class="fas fa-check-circle text-green-400"></i>
            <span id="toastMessage" class="text-white">Action completed</span>
        </div>
    </div>

    <script>
        // Checklist template
        const checklistTemplate = {
            compliance: {
                name: 'Compliance',
                icon: 'fa-gavel',
                color: 'yellow',
                items: [
                    { id: 'c1', text: 'Solicitation requirements matrix completed', required: true },
                    { id: 'c2', text: 'All RFP sections addressed', required: true },
                    { id: 'c3', text: 'Page limits verified', required: true },
                    { id: 'c4', text: 'Font/margin requirements met', required: true },
                    { id: 'c5', text: 'File naming convention followed', required: true },
                    { id: 'c6', text: 'Required certifications included', required: true },
                    { id: 'c7', text: 'FAR/DFARS clauses acknowledged', required: true },
                    { id: 'c8', text: 'Small business plan completed (if required)', required: false }
                ]
            },
            technical: {
                name: 'Technical Volume',
                icon: 'fa-cogs',
                color: 'blue',
                items: [
                    { id: 't1', text: 'Executive summary compelling and complete', required: true },
                    { id: 't2', text: 'Technical approach clearly articulated', required: true },
                    { id: 't3', text: 'Win themes woven throughout', required: true },
                    { id: 't4', text: 'Graphics support key messages', required: true },
                    { id: 't5', text: 'Discriminators highlighted', required: true },
                    { id: 't6', text: 'Risk mitigation addressed', required: true },
                    { id: 't7', text: 'Innovation/value-adds included', required: false },
                    { id: 't8', text: 'Transition plan detailed', required: true }
                ]
            },
            pricing: {
                name: 'Pricing/Cost',
                icon: 'fa-dollar-sign',
                color: 'green',
                items: [
                    { id: 'p1', text: 'BOE calculations verified', required: true },
                    { id: 'p2', text: 'Labor rates competitive', required: true },
                    { id: 'p3', text: 'ODCs properly estimated', required: true },
                    { id: 'p4', text: 'Subcontractor pricing integrated', required: true },
                    { id: 'p5', text: 'Pricing narrative complete', required: true },
                    { id: 'p6', text: 'Cost realism check performed', required: true },
                    { id: 'p7', text: 'CUI markings applied to pricing', required: true }
                ]
            },
            management: {
                name: 'Management',
                icon: 'fa-users',
                color: 'purple',
                items: [
                    { id: 'm1', text: 'Org chart included', required: true },
                    { id: 'm2', text: 'Key personnel resumes complete', required: true },
                    { id: 'm3', text: 'Letters of commitment obtained', required: true },
                    { id: 'm4', text: 'Staffing plan realistic', required: true },
                    { id: 'm5', text: 'Quality control approach defined', required: true },
                    { id: 'm6', text: 'Communication plan included', required: false }
                ]
            },
            'past-performance': {
                name: 'Past Performance',
                icon: 'fa-history',
                color: 'orange',
                items: [
                    { id: 'pp1', text: 'Relevant contracts identified', required: true },
                    { id: 'pp2', text: 'CPARs verified and current', required: true },
                    { id: 'pp3', text: 'Reference contact info confirmed', required: true },
                    { id: 'pp4', text: 'Relevancy narratives written', required: true },
                    { id: 'pp5', text: 'Partner past performance included', required: false }
                ]
            },
            'final-review': {
                name: 'Final Review',
                icon: 'fa-flag-checkered',
                color: 'cyan',
                items: [
                    { id: 'f1', text: 'Red Team review completed', required: true },
                    { id: 'f2', text: 'Pink Team feedback incorporated', required: true },
                    { id: 'f3', text: 'Gold Team approval obtained', required: true },
                    { id: 'f4', text: 'Executive summary reviewed by CEO', required: true },
                    { id: 'f5', text: 'Final proofread completed', required: true },
                    { id: 'f6', text: 'Cross-references verified', required: true },
                    { id: 'f7', text: 'Table of contents accurate', required: true },
                    { id: 'f8', text: 'All volumes assembled', required: true },
                    { id: 'f9', text: 'Submission method confirmed', required: true },
                    { id: 'f10', text: 'Backup submission plan ready', required: true }
                ]
            }
        };

        let checklist = {};
        let completedItems = new Set();

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadChecklist();
        });

        function loadChecklist() {
            // Deep copy template
            checklist = JSON.parse(JSON.stringify(checklistTemplate));
            
            // Load saved state from localStorage
            const savedState = localStorage.getItem(`checklist-${document.getElementById('opportunitySelect').value}`);
            if (savedState) {
                completedItems = new Set(JSON.parse(savedState));
            } else {
                completedItems = new Set();
            }
            
            renderChecklist();
            updateProgress();
        }

        function renderChecklist() {
            const container = document.getElementById('checklistContainer');
            const statsContainer = document.getElementById('categoryStats');
            
            let statsHTML = '';
            let checklistHTML = '';
            
            const colorMap = {
                yellow: 'bg-yellow-500/20 text-yellow-400 border-yellow-500/30',
                blue: 'bg-blue-500/20 text-blue-400 border-blue-500/30',
                green: 'bg-green-500/20 text-green-400 border-green-500/30',
                purple: 'bg-purple-500/20 text-purple-400 border-purple-500/30',
                orange: 'bg-orange-500/20 text-orange-400 border-orange-500/30',
                cyan: 'bg-cyan-500/20 text-cyan-400 border-cyan-500/30'
            };
            
            Object.entries(checklist).forEach(([catId, category]) => {
                const completedInCat = category.items.filter(item => completedItems.has(item.id)).length;
                const totalInCat = category.items.length;
                const percentComplete = Math.round((completedInCat / totalInCat) * 100);
                
                // Category stat card
                statsHTML += `
                    <div class="category-card glass-card rounded-lg p-4 cursor-pointer" onclick="scrollToCategory('${catId}')">
                        <div class="flex items-center justify-between mb-2">
                            <i class="fas ${category.icon} ${colorMap[category.color].split(' ')[1]}"></i>
                            <span class="text-xs ${completedInCat === totalInCat ? 'text-green-400' : 'text-gray-400'}">${completedInCat}/${totalInCat}</span>
                        </div>
                        <div class="text-white text-sm font-medium truncate">${category.name}</div>
                        <div class="mt-2 bg-gray-700 rounded-full h-1.5">
                            <div class="${completedInCat === totalInCat ? 'bg-green-500' : 'bg-cyan-500'} h-full rounded-full transition-all" style="width: ${percentComplete}%"></div>
                        </div>
                    </div>
                `;
                
                // Category checklist
                checklistHTML += `
                    <div id="category-${catId}" class="glass-card rounded-xl overflow-hidden">
                        <div class="p-4 border-b border-gray-700/50 flex items-center justify-between ${colorMap[category.color]} bg-opacity-10">
                            <div class="flex items-center space-x-3">
                                <div class="w-10 h-10 rounded-lg ${colorMap[category.color].split(' ').slice(0,1).join(' ')} flex items-center justify-center">
                                    <i class="fas ${category.icon} ${colorMap[category.color].split(' ')[1]}"></i>
                                </div>
                                <div>
                                    <h3 class="text-white font-bold">${category.name}</h3>
                                    <p class="text-gray-400 text-sm">${completedInCat} of ${totalInCat} complete</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-2">
                                ${completedInCat === totalInCat ? '<span class="px-3 py-1 bg-green-500/20 text-green-400 rounded-full text-sm"><i class="fas fa-check mr-1"></i>Complete</span>' : ''}
                                <button onclick="toggleCategory('${catId}')" class="p-2 hover:bg-gray-700/50 rounded-lg text-gray-400">
                                    <i class="fas fa-chevron-down" id="chevron-${catId}"></i>
                                </button>
                            </div>
                        </div>
                        <div id="items-${catId}" class="divide-y divide-gray-800/50">
                            ${category.items.map(item => `
                                <div class="checklist-item p-4 flex items-center space-x-4 ${completedItems.has(item.id) ? 'completed' : ''}" id="item-${item.id}">
                                    <button onclick="toggleItem('${item.id}')" class="w-6 h-6 rounded-md border-2 ${completedItems.has(item.id) ? 'bg-green-500 border-green-500' : 'border-gray-600 hover:border-cyan-500'} flex items-center justify-center transition-all">
                                        ${completedItems.has(item.id) ? '<i class="fas fa-check text-white text-xs"></i>' : ''}
                                    </button>
                                    <div class="flex-1">
                                        <span class="item-text text-white">${item.text}</span>
                                        ${item.required ? '<span class="ml-2 text-xs text-red-400">*Required</span>' : '<span class="ml-2 text-xs text-gray-500">Optional</span>'}
                                    </div>
                                    <button onclick="addNote('${item.id}')" class="p-2 hover:bg-gray-700/50 rounded text-gray-400 hover:text-cyan-400" title="Add note">
                                        <i class="fas fa-sticky-note"></i>
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            
            statsContainer.innerHTML = statsHTML;
            container.innerHTML = checklistHTML;
        }

        function toggleItem(itemId) {
            if (completedItems.has(itemId)) {
                completedItems.delete(itemId);
            } else {
                completedItems.add(itemId);
            }
            
            // Save state
            localStorage.setItem(`checklist-${document.getElementById('opportunitySelect').value}`, JSON.stringify([...completedItems]));
            
            // Update UI
            const itemEl = document.getElementById(`item-${itemId}`);
            const checkbox = itemEl.querySelector('button');
            
            if (completedItems.has(itemId)) {
                itemEl.classList.add('completed');
                checkbox.classList.remove('border-gray-600');
                checkbox.classList.add('bg-green-500', 'border-green-500');
                checkbox.innerHTML = '<i class="fas fa-check text-white text-xs"></i>';
            } else {
                itemEl.classList.remove('completed');
                checkbox.classList.add('border-gray-600');
                checkbox.classList.remove('bg-green-500', 'border-green-500');
                checkbox.innerHTML = '';
            }
            
            updateProgress();
            renderChecklist(); // Re-render to update category stats
        }

        function toggleCategory(catId) {
            const items = document.getElementById(`items-${catId}`);
            const chevron = document.getElementById(`chevron-${catId}`);
            
            if (items.classList.contains('hidden')) {
                items.classList.remove('hidden');
                chevron.classList.remove('fa-chevron-right');
                chevron.classList.add('fa-chevron-down');
            } else {
                items.classList.add('hidden');
                chevron.classList.remove('fa-chevron-down');
                chevron.classList.add('fa-chevron-right');
            }
        }

        function scrollToCategory(catId) {
            document.getElementById(`category-${catId}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function updateProgress() {
            let total = 0;
            let completed = 0;
            
            Object.values(checklist).forEach(category => {
                total += category.items.length;
                completed += category.items.filter(item => completedItems.has(item.id)).length;
            });
            
            const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
            
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('progressPercent').textContent = percent + '%';
            
            // Update progress ring
            const ring = document.getElementById('progressRing');
            const circumference = 2 * Math.PI * 40;
            const offset = circumference - (percent / 100) * circumference;
            ring.style.strokeDashoffset = offset;
            
            // Change color based on progress
            if (percent === 100) {
                ring.style.stroke = '#10B981';
                document.getElementById('progressPercent').className = 'text-2xl font-bold text-green-400';
            } else if (percent >= 75) {
                ring.style.stroke = '#00E5FA';
                document.getElementById('progressPercent').className = 'text-2xl font-bold text-cyan-400';
            } else if (percent >= 50) {
                ring.style.stroke = '#F59E0B';
                document.getElementById('progressPercent').className = 'text-2xl font-bold text-yellow-400';
            } else {
                ring.style.stroke = '#EF4444';
                document.getElementById('progressPercent').className = 'text-2xl font-bold text-red-400';
            }
        }

        function addCustomItem() {
            const text = document.getElementById('customItemText').value.trim();
            const category = document.getElementById('customItemCategory').value;
            
            if (!text) {
                showToast('Please enter checklist item text', 'warning');
                return;
            }
            
            const newId = 'custom-' + Date.now();
            checklist[category].items.push({
                id: newId,
                text: text,
                required: false,
                custom: true
            });
            
            document.getElementById('customItemText').value = '';
            renderChecklist();
            updateProgress();
            showToast('Custom item added', 'success');
            scrollToCategory(category);
        }

        function addNote(itemId) {
            const note = prompt('Add a note for this item:');
            if (note) {
                showToast('Note saved', 'success');
            }
        }

        function exportChecklist() {
            const oppName = document.getElementById('oppTitle').textContent;
            let report = `PROPOSAL CHECKLIST REPORT\n`;
            report += `========================\n\n`;
            report += `Opportunity: ${oppName}\n`;
            report += `Generated: ${new Date().toLocaleString()}\n\n`;
            
            let total = 0;
            let completed = 0;
            
            Object.entries(checklist).forEach(([catId, category]) => {
                report += `\n${category.name.toUpperCase()}\n`;
                report += `-`.repeat(category.name.length) + `\n`;
                
                category.items.forEach(item => {
                    const status = completedItems.has(item.id) ? '✓' : '○';
                    report += `${status} ${item.text}${item.required ? ' *' : ''}\n`;
                    total++;
                    if (completedItems.has(item.id)) completed++;
                });
            });
            
            report += `\n\nSUMMARY\n`;
            report += `-------\n`;
            report += `Total Items: ${total}\n`;
            report += `Completed: ${completed}\n`;
            report += `Remaining: ${total - completed}\n`;
            report += `Progress: ${Math.round((completed / total) * 100)}%\n`;
            
            const blob = new Blob([report], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `checklist-${oppName.toLowerCase().replace(/\s+/g, '-')}-${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('Checklist exported', 'success');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMessage');
            
            const iconMap = {
                'success': 'fa-check-circle text-green-400',
                'warning': 'fa-exclamation-triangle text-yellow-400',
                'error': 'fa-times-circle text-red-400',
                'info': 'fa-info-circle text-blue-400'
            };
            
            icon.className = `fas ${iconMap[type] || iconMap.success}`;
            msg.textContent = message;
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>
