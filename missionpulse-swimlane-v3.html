<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Swimlane Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
    .dragging { opacity: 0.5; transform: rotate(3deg); }
    .drag-over { background: rgba(0, 229, 250, 0.1); border-color: rgba(0, 229, 250, 0.5); }
    .swimlane-col { min-height: 400px; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    // ============================================
    // CONFIGURATION
    // ============================================
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const API_URL = 'https://missionpulse-api.onrender.com';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // ============================================
    // SHIPLEY PHASES
    // ============================================
    const PHASES = [
      { id: 'Qualify', name: 'Qualify', color: 'slate', icon: '🔍', gate: 'Gate 1' },
      { id: 'Capture', name: 'Capture', color: 'purple', icon: '🎯', gate: 'Gate 2' },
      { id: 'Blue Team', name: 'Blue Team', color: 'blue', icon: '🔵', gate: 'Gate 3' },
      { id: 'Pink Team', name: 'Pink Team', color: 'pink', icon: '🩷', gate: 'Gate 4' },
      { id: 'Red Team', name: 'Red Team', color: 'red', icon: '🔴', gate: 'Gate 5' },
      { id: 'Gold Team', name: 'Gold Team', color: 'amber', icon: '🟡', gate: 'Gate 6' },
      { id: 'White Glove', name: 'White Glove', color: 'emerald', icon: '🤍', gate: 'Final' },
      { id: 'Submitted', name: 'Submitted', color: 'cyan', icon: '🚀', gate: 'Done' }
    ];

    // ============================================
    // DEMO DATA
    // ============================================
    const DEMO_OPPORTUNITIES = [
      { id: 1, title: 'VA EHR Modernization', agency: 'VA', phase: 'Blue Team', ceiling_value: 125000000, pwin: 72, due_date: '2026-02-15', priority: 'critical' },
      { id: 2, title: 'DHA MHS GENESIS', agency: 'DHA', phase: 'Red Team', ceiling_value: 89000000, pwin: 65, due_date: '2026-02-20', priority: 'high' },
      { id: 3, title: 'CMS Data Analytics', agency: 'CMS', phase: 'Capture', ceiling_value: 45000000, pwin: 55, due_date: '2026-03-01', priority: 'medium' },
      { id: 4, title: 'IHS Telehealth', agency: 'IHS', phase: 'Pink Team', ceiling_value: 67000000, pwin: 48, due_date: '2026-02-28', priority: 'high' },
      { id: 5, title: 'FDA IT Infrastructure', agency: 'FDA', phase: 'Gold Team', ceiling_value: 156000000, pwin: 78, due_date: '2026-02-10', priority: 'critical' },
      { id: 6, title: 'NIH Cloud Migration', agency: 'NIH', phase: 'Qualify', ceiling_value: 34000000, pwin: 35, due_date: '2026-04-15', priority: 'low' },
      { id: 7, title: 'CDC Health Data Platform', agency: 'CDC', phase: 'Capture', ceiling_value: 52000000, pwin: 42, due_date: '2026-03-20', priority: 'medium' },
      { id: 8, title: 'HHS Enterprise Services', agency: 'HHS', phase: 'Submitted', ceiling_value: 78000000, pwin: 60, due_date: '2026-01-20', priority: 'high' }
    ];

    // ============================================
    // UTILITY FUNCTIONS
    // ============================================
    const formatCurrency = (v) => v >= 1e6 ? `$${(v/1e6).toFixed(0)}M` : `$${(v/1e3).toFixed(0)}K`;
    const getDaysLeft = (d) => Math.ceil((new Date(d) - new Date()) / 86400000);

    // ============================================
    // COMPONENTS
    // ============================================

    // Opportunity Card (Draggable)
    const OpportunityCard = ({ opp, onDragStart, onDragEnd }) => {
      const daysLeft = getDaysLeft(opp.due_date);
      const priorityColors = {
        critical: 'border-l-red-500',
        high: 'border-l-amber-500',
        medium: 'border-l-blue-500',
        low: 'border-l-slate-500'
      };

      return (
        <div
          draggable
          onDragStart={(e) => onDragStart(e, opp)}
          onDragEnd={onDragEnd}
          className={`glass rounded-lg p-3 border border-slate-700/50 border-l-4 ${priorityColors[opp.priority]} cursor-grab active:cursor-grabbing hover:bg-slate-800/50 transition-all`}
        >
          <div className="flex items-start justify-between mb-2">
            <h4 className="font-medium text-white text-sm leading-tight">{opp.title}</h4>
            <span className="text-xs text-slate-500 shrink-0 ml-2">{opp.agency}</span>
          </div>
          
          <div className="flex items-center justify-between text-xs">
            <span className="text-cyan-400 font-mono">{formatCurrency(opp.ceiling_value)}</span>
            <div className="flex items-center gap-2">
              <span className={`${opp.pwin >= 70 ? 'text-emerald-400' : opp.pwin >= 50 ? 'text-amber-400' : 'text-red-400'}`}>
                {opp.pwin}%
              </span>
              <span className={`${daysLeft <= 7 ? 'text-red-400' : daysLeft <= 14 ? 'text-amber-400' : 'text-slate-500'}`}>
                {daysLeft > 0 ? `${daysLeft}d` : 'Due!'}
              </span>
            </div>
          </div>
        </div>
      );
    };

    // Phase Column
    const PhaseColumn = ({ phase, opportunities, onDrop, onDragOver, onDragLeave, isDragOver, onDragStart, onDragEnd }) => {
      const phaseOpps = opportunities.filter(o => o.phase === phase.id);
      const totalValue = phaseOpps.reduce((sum, o) => sum + (o.ceiling_value || 0), 0);

      return (
        <div
          onDragOver={onDragOver}
          onDragLeave={onDragLeave}
          onDrop={(e) => onDrop(e, phase.id)}
          className={`flex-1 min-w-[200px] swimlane-col rounded-xl border transition-all ${
            isDragOver 
              ? 'drag-over border-cyan-500/50' 
              : 'border-slate-700/50'
          }`}
        >
          {/* Column Header */}
          <div className={`p-3 border-b border-slate-700/50 bg-${phase.color}-500/10 rounded-t-xl`}>
            <div className="flex items-center justify-between mb-1">
              <div className="flex items-center gap-2">
                <span>{phase.icon}</span>
                <span className={`font-semibold text-${phase.color}-400`}>{phase.name}</span>
              </div>
              <span className="text-xs text-slate-500">{phase.gate}</span>
            </div>
            <div className="flex items-center justify-between text-xs text-slate-500">
              <span>{phaseOpps.length} opportunities</span>
              <span className="font-mono">{formatCurrency(totalValue)}</span>
            </div>
          </div>

          {/* Cards */}
          <div className="p-2 space-y-2 min-h-[300px]">
            {phaseOpps.map(opp => (
              <OpportunityCard
                key={opp.id}
                opp={opp}
                onDragStart={onDragStart}
                onDragEnd={onDragEnd}
              />
            ))}
            {phaseOpps.length === 0 && (
              <div className="text-center py-8 text-slate-600 text-sm">
                Drop opportunities here
              </div>
            )}
          </div>
        </div>
      );
    };

    // Stats Summary
    const StatsSummary = ({ opportunities }) => {
      const totalValue = opportunities.reduce((sum, o) => sum + (o.ceiling_value || 0), 0);
      const avgPwin = opportunities.length > 0 
        ? Math.round(opportunities.reduce((sum, o) => sum + (o.pwin || 0), 0) / opportunities.length)
        : 0;
      const criticalCount = opportunities.filter(o => o.priority === 'critical').length;
      const activePhases = ['Capture', 'Blue Team', 'Pink Team', 'Red Team', 'Gold Team', 'White Glove'];
      const activeCount = opportunities.filter(o => activePhases.includes(o.phase)).length;

      return (
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          {[
            { label: 'Pipeline Value', value: formatCurrency(totalValue), color: 'cyan', icon: '💰' },
            { label: 'Active Proposals', value: activeCount, color: 'blue', icon: '📝' },
            { label: 'Avg pWin', value: `${avgPwin}%`, color: 'emerald', icon: '🎯' },
            { label: 'Critical', value: criticalCount, color: criticalCount > 0 ? 'red' : 'slate', icon: '🔴' }
          ].map(({ label, value, color, icon }) => (
            <div key={label} className="glass rounded-lg p-4 border border-slate-700/50">
              <div className="flex items-center gap-2 mb-1">
                <span>{icon}</span>
                <p className="text-xs text-slate-400">{label}</p>
              </div>
              <p className={`text-2xl font-bold text-${color}-400`}>{value}</p>
            </div>
          ))}
        </div>
      );
    };

    // AI Chat Widget
    const AIChatWidget = ({ opportunities }) => {
      const [isOpen, setIsOpen] = React.useState(false);
      const [messages, setMessages] = React.useState([]);
      const [input, setInput] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const messagesEndRef = React.useRef(null);

      React.useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      const handleSend = async () => {
        if (!input.trim() || loading) return;
        setMessages(prev => [...prev, { role: 'user', content: input.trim() }]);
        setInput('');
        setLoading(true);
        
        try {
          const response = await fetch(`${API_URL}/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: input, agent: 'capture', context: { module: 'swimlane' } })
          });
          const data = await response.json();
          setMessages(prev => [...prev, { role: 'assistant', content: data.response }]);
        } catch {
          setMessages(prev => [...prev, { role: 'assistant', content: 'AI service unavailable.', error: true }]);
        }
        setLoading(false);
      };

      if (!isOpen) {
        return (
          <button onClick={() => setIsOpen(true)} className="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-full shadow-lg hover:shadow-cyan-500/25 transition-all flex items-center justify-center z-50">
            <span className="text-2xl">💬</span>
          </button>
        );
      }

      return (
        <div className="fixed bottom-6 right-6 w-96 h-[500px] glass border border-slate-700 rounded-xl shadow-2xl flex flex-col z-50">
          <div className="flex items-center justify-between p-4 border-b border-slate-700">
            <div>
              <h3 className="font-semibold text-white">Pipeline Assistant</h3>
              <span className="text-xs text-emerald-400">● Online</span>
            </div>
            <button onClick={() => setIsOpen(false)} className="text-slate-400 hover:text-white">✕</button>
          </div>
          <div className="flex-1 overflow-y-auto p-4 space-y-4">
            {messages.length === 0 && (
              <div className="space-y-2">
                <p className="text-xs text-slate-500">Try asking:</p>
                {['Which deals should advance?', 'Summarize pipeline health', 'What\'s at risk?'].map((p, i) => (
                  <button key={i} onClick={() => setInput(p)} className="block w-full text-left px-3 py-2 rounded bg-slate-800 hover:bg-slate-700 text-slate-300 text-sm">{p}</button>
                ))}
              </div>
            )}
            {messages.map((msg, i) => (
              <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-[80%] px-4 py-2 rounded-lg ${msg.role === 'user' ? 'bg-cyan-600 text-white' : msg.error ? 'bg-red-900/50 text-red-300' : 'bg-slate-800 text-slate-200'}`}>{msg.content}</div>
              </div>
            ))}
            {loading && <div className="flex justify-start"><div className="bg-slate-800 px-4 py-2 rounded-lg text-slate-400">...</div></div>}
            <div ref={messagesEndRef} />
          </div>
          <div className="p-4 border-t border-slate-700">
            <div className="flex gap-2">
              <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSend()} placeholder="Ask about pipeline..." className="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500" />
              <button onClick={handleSend} disabled={loading || !input.trim()} className="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 disabled:bg-slate-700 rounded-lg">→</button>
            </div>
          </div>
        </div>
      );
    };

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [opportunities, setOpportunities] = React.useState(DEMO_OPPORTUNITIES);
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [draggedOpp, setDraggedOpp] = React.useState(null);
      const [dragOverPhase, setDragOverPhase] = React.useState(null);

      React.useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        try {
          const { data, error } = await supabase
            .from('opportunities')
            .select('*')
            .order('due_date', { ascending: true });

          if (!error && data && data.length > 0) {
            setOpportunities(data);
            setConnected(true);
          }
        } catch (e) {
          console.log('Using demo data');
        } finally {
          setLoading(false);
        }
      };

      const handleDragStart = (e, opp) => {
        setDraggedOpp(opp);
        e.dataTransfer.effectAllowed = 'move';
        e.target.classList.add('dragging');
      };

      const handleDragEnd = (e) => {
        e.target.classList.remove('dragging');
        setDraggedOpp(null);
        setDragOverPhase(null);
      };

      const handleDragOver = (e, phaseId) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        setDragOverPhase(phaseId);
      };

      const handleDragLeave = () => {
        setDragOverPhase(null);
      };

      const handleDrop = async (e, newPhase) => {
        e.preventDefault();
        setDragOverPhase(null);

        if (draggedOpp && draggedOpp.phase !== newPhase) {
          // Update local state
          const updated = opportunities.map(o => 
            o.id === draggedOpp.id ? { ...o, phase: newPhase } : o
          );
          setOpportunities(updated);

          // Persist to Supabase
          if (connected) {
            await supabase
              .from('opportunities')
              .update({ phase: newPhase })
              .eq('id', draggedOpp.id);
          }
        }
      };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-slate-400">Loading Swimlane...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-40">
            <div className="max-w-full mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-700/50 rounded-lg">← Back</a>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-purple-500 to-pink-600 flex items-center justify-center">📋</div>
                  <div>
                    <h1 className="text-xl font-bold text-white">Swimlane Board</h1>
                    <p className="text-xs text-slate-400">Drag & Drop Phase Management</p>
                  </div>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <a href="missionpulse-pipeline-v3.html" className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">Table View →</a>
                <div className={`px-3 py-1 rounded-full text-xs ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                  {connected ? '● Live Sync' : '○ Demo'}
                </div>
              </div>
            </div>
          </header>

          <main className="px-6 py-8 space-y-6">
            {/* Stats */}
            <StatsSummary opportunities={opportunities} />

            {/* Swimlane Board */}
            <div className="overflow-x-auto pb-4">
              <div className="flex gap-4 min-w-max">
                {PHASES.map(phase => (
                  <PhaseColumn
                    key={phase.id}
                    phase={phase}
                    opportunities={opportunities}
                    isDragOver={dragOverPhase === phase.id}
                    onDragOver={(e) => handleDragOver(e, phase.id)}
                    onDragLeave={handleDragLeave}
                    onDrop={handleDrop}
                    onDragStart={handleDragStart}
                    onDragEnd={handleDragEnd}
                  />
                ))}
              </div>
            </div>

            {/* Legend */}
            <div className="glass rounded-lg p-4 border border-slate-700/50">
              <div className="flex items-center gap-6 text-xs text-slate-400 flex-wrap">
                <span className="font-medium text-slate-300">Priority:</span>
                <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-red-500"></span> Critical</span>
                <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-amber-500"></span> High</span>
                <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-blue-500"></span> Medium</span>
                <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-slate-500"></span> Low</span>
                <span className="ml-auto text-slate-500">Drag cards between columns to update phase</span>
              </div>
            </div>
          </main>

          {/* Footer */}
          <footer className="border-t border-slate-800 py-6">
            <div className="max-w-7xl mx-auto px-6 flex justify-between">
              <p className="text-xs text-slate-500">© 2026 Mission Meets Tech</p>
              <p className="text-xs text-slate-600">AI GENERATED - REQUIRES HUMAN REVIEW</p>
            </div>
          </footer>

          <AIChatWidget opportunities={opportunities} />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
