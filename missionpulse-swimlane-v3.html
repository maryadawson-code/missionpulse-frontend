<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Swimlane Board</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --mmt-cyan: #00E5FA; --mmt-navy: #00050F; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--mmt-navy); color: #e2e8f0; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

const CONFIG = {
  SUPABASE_URL: 'https://qdrtpnpnhkxvfmvfziop.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8',
  LOGIN_PAGE: 'login.html'
};

const SWIMLANES = [
  { id: 'backlog', name: 'Backlog', color: '#94a3b8' },
  { id: 'in_progress', name: 'In Progress', color: '#60a5fa' },
  { id: 'review', name: 'Review', color: '#fbbf24' },
  { id: 'complete', name: 'Complete', color: '#4ade80' }
];

const DEMO_TASKS = [
  { id: 1, title: 'Draft Technical Approach', lane: 'in_progress', assignee: 'Sarah Chen', priority: 'high', section: 'L' },
  { id: 2, title: 'Past Performance Matrix', lane: 'review', assignee: 'Lisa Martinez', priority: 'critical', section: 'M' },
  { id: 3, title: 'Pricing Model Update', lane: 'backlog', assignee: 'Jennifer Park', priority: 'high', section: 'K' },
  { id: 4, title: 'Compliance Matrix', lane: 'complete', assignee: 'Robert Williams', priority: 'medium', section: 'L' },
  { id: 5, title: 'Executive Summary', lane: 'in_progress', assignee: 'Michael Torres', priority: 'critical', section: 'L' },
  { id: 6, title: 'Org Chart Design', lane: 'backlog', assignee: 'Amanda Foster', priority: 'low', section: 'M' }
];

function checkAuth() {
  const session = localStorage.getItem('MP_SESSION');
  if (!session) { window.location.href = CONFIG.LOGIN_PAGE; return null; }
  try { return JSON.parse(localStorage.getItem('MP_USER')); }
  catch { return { email: 'demo@mmt.com', role: 'PM', name: 'Demo User' }; }
}

function TaskCard({ task }) {
  const priorityColors = { critical: 'border-red-500 bg-red-500/10', high: 'border-amber-500 bg-amber-500/10', medium: 'border-blue-500 bg-blue-500/10', low: 'border-slate-500 bg-slate-500/10' };
  return (
    <div className={`bg-slate-800/80 rounded-lg p-3 border-l-4 cursor-grab hover:bg-slate-800 transition-all ${priorityColors[task.priority]}`}>
      <div className="flex justify-between items-start mb-2">
        <span className="text-xs px-1.5 py-0.5 bg-slate-700 rounded">Vol {task.section}</span>
        <span className={`text-xs px-1.5 py-0.5 rounded ${task.priority === 'critical' ? 'bg-red-500/20 text-red-400' : task.priority === 'high' ? 'bg-amber-500/20 text-amber-400' : 'bg-slate-600 text-slate-300'}`}>
          {task.priority}
        </span>
      </div>
      <h4 className="font-medium text-white text-sm mb-2">{task.title}</h4>
      <p className="text-xs text-slate-400">{task.assignee}</p>
    </div>
  );
}

function Swimlane({ lane, tasks }) {
  return (
    <div className="flex-1 min-w-[280px]">
      <div className="flex items-center gap-2 mb-4 px-2">
        <div className="w-3 h-3 rounded-full" style={{ backgroundColor: lane.color }} />
        <h3 className="font-semibold text-white">{lane.name}</h3>
        <span className="text-xs px-2 py-0.5 bg-slate-700 rounded-full text-slate-400">{tasks.length}</span>
      </div>
      <div className="glass rounded-xl p-3 min-h-[400px] space-y-3">
        {tasks.map(task => <TaskCard key={task.id} task={task} />)}
      </div>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [tasks, setTasks] = useState(DEMO_TASKS);

  useEffect(() => {
    const authUser = checkAuth();
    if (authUser) setUser(authUser);
  }, []);

  if (!user) return <div className="min-h-screen flex items-center justify-center text-cyan-400">Loading...</div>;

  return (
    <div className="min-h-screen bg-slate-950">
      <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
        <div className="max-w-full mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            </a>
            <div>
              <h1 className="text-xl font-bold text-white">📋 Swimlane Board</h1>
              <p className="text-sm text-slate-400">Shipley Proposal Workflow</p>
            </div>
          </div>
          <div className="flex items-center gap-4">
            <select className="bg-slate-800 border border-slate-600 rounded-lg px-3 py-1.5 text-sm text-white">
              <option>VA EHR Modernization</option>
              <option>DHA Telehealth</option>
            </select>
            <span className="text-sm text-slate-400">{user.name}</span>
          </div>
        </div>
      </header>

      <main className="p-6">
        <div className="flex gap-6 overflow-x-auto pb-4">
          {SWIMLANES.map(lane => (
            <Swimlane key={lane.id} lane={lane} tasks={tasks.filter(t => t.lane === lane.id)} />
          ))}
        </div>
      </main>

      <footer className="border-t border-slate-800 mt-6">
        <div className="px-4 py-4 text-center text-xs text-slate-500">
          Mission Meets Tech © 2026 | MissionPulse v3.0 | Swimlane Module
        </div>
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
