<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Page Not Found</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(5deg); } }
    .float { animation: float 4s ease-in-out infinite; }
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(0, 229, 250, 0.2); } 50% { box-shadow: 0 0 60px rgba(0, 229, 250, 0.4); } }
    .glow { animation: pulse-glow 3s ease-in-out infinite; }
    .bg-grid {
      background-image: 
        linear-gradient(rgba(0, 229, 250, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 250, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen bg-grid flex items-center justify-center p-6">
  <div class="max-w-lg w-full text-center">
    <!-- Floating Shield -->
    <div class="w-24 h-24 rounded-2xl bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center mx-auto mb-8 float glow">
      <span class="text-5xl">🛡️</span>
    </div>
    
    <!-- Error Code -->
    <div class="text-8xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent mb-4">
      404
    </div>
    
    <!-- Message -->
    <h1 class="text-2xl font-bold mb-4">Mission Not Found</h1>
    <p class="text-slate-400 mb-8 max-w-md mx-auto">
      The page you're looking for doesn't exist or has been moved. 
      Let's get you back on track.
    </p>
    
    <!-- Actions -->
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4 mb-12">
      <a 
        href="index.html"
        class="px-6 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 rounded-lg font-medium transition-all"
      >
        🏠 Back to Dashboard
      </a>
      <a 
        href="missionpulse-pipeline-v2.html"
        class="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg font-medium transition-colors"
      >
        📊 View Pipeline
      </a>
    </div>
    
    <!-- Quick Links -->
    <div class="border-t border-slate-800 pt-8">
      <p class="text-sm text-slate-500 mb-4">Quick Links</p>
      <div class="flex flex-wrap justify-center gap-3">
        <a href="missionpulse-warroom-v2.html" class="px-3 py-1.5 bg-slate-800/50 hover:bg-slate-700 rounded-lg text-sm transition-colors">
          🎯 War Room
        </a>
        <a href="missionpulse-rfpshredder-v2.html" class="px-3 py-1.5 bg-slate-800/50 hover:bg-slate-700 rounded-lg text-sm transition-colors">
          🔍 RFP Shredder
        </a>
        <a href="missionpulse-agenthub-v2.html" class="px-3 py-1.5 bg-slate-800/50 hover:bg-slate-700 rounded-lg text-sm transition-colors">
          🤖 Agent Hub
        </a>
        <a href="login.html" class="px-3 py-1.5 bg-slate-800/50 hover:bg-slate-700 rounded-lg text-sm transition-colors">
          🔐 Login
        </a>
      </div>
    </div>
    
    <!-- Footer -->
    <div class="mt-12 text-xs text-slate-600">
      <p>Mission Meets Tech | MissionPulse</p>
      <p class="mt-1">Mission. Technology. Transformation.</p>
    </div>
  </div>
</body>
</html>
