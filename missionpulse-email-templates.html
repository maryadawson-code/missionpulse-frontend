<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Templates | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 100%); min-height: 100vh; }
        .glass-card { background: rgba(0, 229, 250, 0.03); border: 1px solid rgba(0, 229, 250, 0.15); backdrop-filter: blur(10px); }
        .template-card { transition: all 0.3s ease; cursor: pointer; }
        .template-card:hover { transform: translateY(-2px); border-color: rgba(0, 229, 250, 0.4); }
        .template-card.selected { border-color: #00E5FA; background: rgba(0, 229, 250, 0.1); }
        .variable-tag { background: rgba(0, 229, 250, 0.2); color: #00E5FA; padding: 2px 8px; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body class="text-white font-sans">
    <!-- Navigation -->
    <nav class="bg-[#00050F]/90 border-b border-cyan-500/20 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <a href="missionpulse-mission-control.html" class="text-cyan-400 hover:text-cyan-300">
                    <i class="fas fa-arrow-left mr-2"></i>Mission Control
                </a>
                <span class="text-gray-600">|</span>
                <h1 class="text-xl font-bold text-white">
                    <i class="fas fa-envelope-open-text text-cyan-400 mr-2"></i>Email Templates
                </h1>
            </div>
            <div class="flex items-center space-x-3">
                <button onclick="openNewTemplate()" class="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg text-white transition-all">
                    <i class="fas fa-plus mr-2"></i>New Template
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Category Tabs -->
        <div class="flex space-x-2 mb-6 overflow-x-auto pb-2">
            <button onclick="filterCategory('all')" class="category-tab px-4 py-2 bg-cyan-500/20 border border-cyan-500/50 rounded-lg text-cyan-400 whitespace-nowrap" data-category="all">
                All Templates
            </button>
            <button onclick="filterCategory('teaming')" class="category-tab px-4 py-2 bg-gray-800/50 border border-gray-700 rounded-lg text-gray-400 hover:text-white whitespace-nowrap" data-category="teaming">
                <i class="fas fa-handshake mr-2"></i>Teaming
            </button>
            <button onclick="filterCategory('customer')" class="category-tab px-4 py-2 bg-gray-800/50 border border-gray-700 rounded-lg text-gray-400 hover:text-white whitespace-nowrap" data-category="customer">
                <i class="fas fa-building mr-2"></i>Customer
            </button>
            <button onclick="filterCategory('internal')" class="category-tab px-4 py-2 bg-gray-800/50 border border-gray-700 rounded-lg text-gray-400 hover:text-white whitespace-nowrap" data-category="internal">
                <i class="fas fa-users mr-2"></i>Internal
            </button>
            <button onclick="filterCategory('proposal')" class="category-tab px-4 py-2 bg-gray-800/50 border border-gray-700 rounded-lg text-gray-400 hover:text-white whitespace-nowrap" data-category="proposal">
                <i class="fas fa-file-alt mr-2"></i>Proposal
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Template List -->
            <div class="lg:col-span-1 space-y-4" id="templateList">
                <!-- Populated by JS -->
            </div>

            <!-- Template Editor/Preview -->
            <div class="lg:col-span-2">
                <div class="glass-card rounded-xl overflow-hidden">
                    <!-- Editor Header -->
                    <div class="p-4 border-b border-gray-700 flex items-center justify-between">
                        <div>
                            <input type="text" id="templateName" placeholder="Template Name" 
                                class="bg-transparent text-white text-lg font-bold focus:outline-none" value="Teaming Request">
                            <div class="flex items-center space-x-2 mt-1">
                                <select id="templateCategory" class="bg-gray-800/50 border border-gray-700 rounded px-2 py-1 text-gray-400 text-sm">
                                    <option value="teaming">Teaming</option>
                                    <option value="customer">Customer</option>
                                    <option value="internal">Internal</option>
                                    <option value="proposal">Proposal</option>
                                </select>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <button onclick="previewTemplate()" class="px-3 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-white text-sm">
                                <i class="fas fa-eye mr-1"></i>Preview
                            </button>
                            <button onclick="saveTemplate()" class="px-3 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg text-white text-sm">
                                <i class="fas fa-save mr-1"></i>Save
                            </button>
                        </div>
                    </div>

                    <!-- Subject Line -->
                    <div class="p-4 border-b border-gray-800">
                        <label class="text-gray-400 text-sm mb-1 block">Subject Line</label>
                        <input type="text" id="templateSubject" 
                            class="w-full bg-gray-800/50 border border-gray-700 rounded-lg px-4 py-2 text-white"
                            value="Teaming Opportunity: {{opportunity_name}}">
                    </div>

                    <!-- Email Body -->
                    <div class="p-4">
                        <label class="text-gray-400 text-sm mb-1 block">Email Body</label>
                        <textarea id="templateBody" rows="15" 
                            class="w-full bg-gray-800/50 border border-gray-700 rounded-lg px-4 py-3 text-white font-mono text-sm leading-relaxed">Dear {{contact_name}},

I hope this email finds you well. I am reaching out on behalf of {{company_name}} regarding an exciting teaming opportunity.

We are currently pursuing {{opportunity_name}} (Solicitation: {{solicitation_number}}) with {{agency_name}}, valued at approximately {{contract_value}}.

Based on your company's expertise in {{partner_capability}}, we believe there is strong potential for a mutually beneficial teaming arrangement.

Key Details:
• Proposal Due Date: {{due_date}}
• Contract Type: {{contract_type}}
• Period of Performance: {{period_of_performance}}

Our proposed teaming arrangement would leverage your strengths in {{partner_capability}} while we provide {{our_capability}}.

I would welcome the opportunity to discuss this further at your earliest convenience. Please let me know your availability for a brief call this week.

Best regards,
{{sender_name}}
{{sender_title}}
{{company_name}}
{{sender_email}} | {{sender_phone}}</textarea>
                    </div>

                    <!-- Variable Tags -->
                    <div class="p-4 border-t border-gray-800 bg-gray-900/50">
                        <label class="text-gray-400 text-sm mb-2 block">Available Variables (click to insert)</label>
                        <div class="flex flex-wrap gap-2" id="variableTags">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Preview Modal -->
    <div id="previewModal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-4 border-b flex items-center justify-between">
                <h3 class="text-gray-800 font-bold">Email Preview</h3>
                <button onclick="closePreview()" class="text-gray-500 hover:text-gray-800">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6">
                <div class="mb-4">
                    <span class="text-gray-500 text-sm">To:</span>
                    <span class="text-gray-800 ml-2">john.smith@partnercompany.com</span>
                </div>
                <div class="mb-4">
                    <span class="text-gray-500 text-sm">Subject:</span>
                    <span id="previewSubject" class="text-gray-800 ml-2 font-medium"></span>
                </div>
                <hr class="my-4">
                <div id="previewBody" class="text-gray-700 whitespace-pre-line leading-relaxed"></div>
            </div>
            <div class="p-4 border-t bg-gray-50 flex justify-end space-x-3">
                <button onclick="closePreview()" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg text-gray-700">Close</button>
                <button onclick="copyToClipboard()" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-white">
                    <i class="fas fa-copy mr-2"></i>Copy to Clipboard
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 bg-gray-900 border border-cyan-500/30 rounded-lg p-4 shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <div class="flex items-center space-x-3">
            <i id="toastIcon" class="fas fa-check-circle text-green-400"></i>
            <span id="toastMessage" class="text-white">Action completed</span>
        </div>
    </div>

    <script>
        // Email templates
        let templates = [
            {
                id: 1,
                name: 'Teaming Request',
                category: 'teaming',
                subject: 'Teaming Opportunity: {{opportunity_name}}',
                body: `Dear {{contact_name}},

I hope this email finds you well. I am reaching out on behalf of {{company_name}} regarding an exciting teaming opportunity.

We are currently pursuing {{opportunity_name}} (Solicitation: {{solicitation_number}}) with {{agency_name}}, valued at approximately {{contract_value}}.

Based on your company's expertise in {{partner_capability}}, we believe there is strong potential for a mutually beneficial teaming arrangement.

Key Details:
• Proposal Due Date: {{due_date}}
• Contract Type: {{contract_type}}
• Period of Performance: {{period_of_performance}}

Our proposed teaming arrangement would leverage your strengths in {{partner_capability}} while we provide {{our_capability}}.

I would welcome the opportunity to discuss this further at your earliest convenience. Please let me know your availability for a brief call this week.

Best regards,
{{sender_name}}
{{sender_title}}
{{company_name}}
{{sender_email}} | {{sender_phone}}`
            },
            {
                id: 2,
                name: 'Teaming Agreement Follow-up',
                category: 'teaming',
                subject: 'Follow-up: {{opportunity_name}} Teaming Agreement',
                body: `Dear {{contact_name}},

Thank you for your interest in teaming with {{company_name}} on {{opportunity_name}}.

As discussed, I am attaching the draft Teaming Agreement for your review. Please note the following key dates:

• TA Review Deadline: {{ta_deadline}}
• Proposal Due Date: {{due_date}}

Please let me know if you have any questions or require any modifications to the agreement.

Best regards,
{{sender_name}}`
            },
            {
                id: 3,
                name: 'Customer Q&A Submission',
                category: 'customer',
                subject: 'Questions - {{solicitation_number}} {{opportunity_name}}',
                body: `To Whom It May Concern,

{{company_name}} respectfully submits the following questions regarding {{solicitation_number}} - {{opportunity_name}}:

Question 1:
[Insert question]

Question 2:
[Insert question]

Question 3:
[Insert question]

We appreciate your consideration and look forward to your responses.

Respectfully,
{{sender_name}}
{{sender_title}}
{{company_name}}
{{sender_email}}`
            },
            {
                id: 4,
                name: 'Proposal Submission Confirmation',
                category: 'proposal',
                subject: 'Proposal Submitted: {{opportunity_name}}',
                body: `Team,

I am pleased to confirm that our proposal for {{opportunity_name}} has been successfully submitted.

Submission Details:
• Solicitation: {{solicitation_number}}
• Agency: {{agency_name}}
• Submitted: {{submission_date}} at {{submission_time}}
• Confirmation #: {{confirmation_number}}

Thank you to everyone who contributed to this effort. Your dedication and hard work made this possible.

Next Steps:
• Await evaluation and potential clarification requests
• Orals preparation (if applicable)
• Continue capture activities for follow-on opportunities

Best regards,
{{sender_name}}`
            },
            {
                id: 5,
                name: 'Pink Team Kickoff',
                category: 'internal',
                subject: 'Pink Team Review - {{opportunity_name}}',
                body: `Team,

This is a reminder that the Pink Team review for {{opportunity_name}} is scheduled for:

Date: {{review_date}}
Time: {{review_time}}
Location: {{review_location}}

Please come prepared to review the following sections:
• Technical Approach
• Management Plan
• Past Performance
• Staffing Plan

Review materials have been uploaded to {{document_location}}.

Please submit your comments using the standard review template by {{comment_deadline}}.

Thank you,
{{sender_name}}`
            },
            {
                id: 6,
                name: 'Go/No-Go Decision Request',
                category: 'internal',
                subject: 'Go/No-Go Decision Required: {{opportunity_name}}',
                body: `Leadership Team,

We require a Go/No-Go decision for the following opportunity:

Opportunity: {{opportunity_name}}
Agency: {{agency_name}}
Value: {{contract_value}}
Due Date: {{due_date}}
pWin Assessment: {{pwin}}%

Key Factors:
• {{key_factor_1}}
• {{key_factor_2}}
• {{key_factor_3}}

Recommendation: {{recommendation}}

Please respond with your decision by {{decision_deadline}}.

Regards,
{{sender_name}}`
            },
            {
                id: 7,
                name: 'Win Announcement',
                category: 'internal',
                subject: '🎉 CONTRACT WIN: {{opportunity_name}}',
                body: `Team,

I am thrilled to announce that we have WON {{opportunity_name}}!

Contract Details:
• Agency: {{agency_name}}
• Value: {{contract_value}}
• Period: {{period_of_performance}}
• Contract Type: {{contract_type}}

This success is a direct result of your hard work and dedication. Special thanks to:
{{team_acknowledgments}}

Please join us in celebrating this achievement!

Congratulations to all,
{{sender_name}}`
            }
        ];

        // Available variables
        const variables = [
            'opportunity_name', 'solicitation_number', 'agency_name', 'contract_value',
            'due_date', 'contract_type', 'period_of_performance', 'pwin',
            'contact_name', 'partner_capability', 'our_capability',
            'sender_name', 'sender_title', 'sender_email', 'sender_phone', 'company_name',
            'review_date', 'review_time', 'review_location', 'document_location',
            'submission_date', 'submission_time', 'confirmation_number'
        ];

        // Sample data for preview
        const sampleData = {
            opportunity_name: 'VA EHR Modernization Support',
            solicitation_number: 'VA-123-2026-0001',
            agency_name: 'Department of Veterans Affairs',
            contract_value: '$45,000,000',
            due_date: 'March 15, 2026',
            contract_type: 'IDIQ Task Order',
            period_of_performance: '5 years',
            pwin: '72',
            contact_name: 'John Smith',
            partner_capability: 'EHR implementation and training',
            our_capability: 'project management and technical oversight',
            sender_name: 'Mary Womack',
            sender_title: 'CEO',
            sender_email: 'mary@missionmeetstech.com',
            sender_phone: '(555) 123-4567',
            company_name: 'Mission Meets Tech',
            review_date: 'February 25, 2026',
            review_time: '10:00 AM EST',
            review_location: 'Conference Room A / Zoom',
            document_location: 'SharePoint/Proposals/VA-EHR',
            submission_date: 'March 15, 2026',
            submission_time: '4:45 PM EST',
            confirmation_number: 'SUB-2026-03150001'
        };

        let selectedTemplate = templates[0];
        let currentCategory = 'all';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderTemplateList();
            renderVariableTags();
            loadTemplate(templates[0]);
        });

        function renderTemplateList() {
            const container = document.getElementById('templateList');
            const filtered = currentCategory === 'all' 
                ? templates 
                : templates.filter(t => t.category === currentCategory);
            
            container.innerHTML = filtered.map(t => `
                <div class="template-card glass-card rounded-lg p-4 ${selectedTemplate?.id === t.id ? 'selected' : ''}" 
                    onclick="loadTemplate(${JSON.stringify(t).replace(/"/g, '&quot;')})">
                    <div class="flex items-start justify-between">
                        <div>
                            <h3 class="text-white font-medium">${t.name}</h3>
                            <span class="text-xs px-2 py-1 bg-gray-700 text-gray-400 rounded mt-1 inline-block capitalize">${t.category}</span>
                        </div>
                        <button onclick="event.stopPropagation(); deleteTemplate(${t.id})" class="text-gray-500 hover:text-red-400">
                            <i class="fas fa-trash text-sm"></i>
                        </button>
                    </div>
                    <p class="text-gray-400 text-sm mt-2 line-clamp-2">${t.subject}</p>
                </div>
            `).join('');
        }

        function renderVariableTags() {
            const container = document.getElementById('variableTags');
            container.innerHTML = variables.map(v => `
                <span class="variable-tag cursor-pointer hover:bg-cyan-500/30" onclick="insertVariable('${v}')">{{${v}}}</span>
            `).join('');
        }

        function loadTemplate(template) {
            if (typeof template === 'string') {
                template = JSON.parse(template);
            }
            selectedTemplate = template;
            
            document.getElementById('templateName').value = template.name;
            document.getElementById('templateCategory').value = template.category;
            document.getElementById('templateSubject').value = template.subject;
            document.getElementById('templateBody').value = template.body;
            
            renderTemplateList();
        }

        function insertVariable(variable) {
            const textarea = document.getElementById('templateBody');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            const insertion = `{{${variable}}}`;
            
            textarea.value = text.substring(0, start) + insertion + text.substring(end);
            textarea.selectionStart = textarea.selectionEnd = start + insertion.length;
            textarea.focus();
        }

        function filterCategory(category) {
            currentCategory = category;
            
            document.querySelectorAll('.category-tab').forEach(btn => {
                if (btn.dataset.category === category) {
                    btn.classList.remove('bg-gray-800/50', 'border-gray-700', 'text-gray-400');
                    btn.classList.add('bg-cyan-500/20', 'border-cyan-500/50', 'text-cyan-400');
                } else {
                    btn.classList.add('bg-gray-800/50', 'border-gray-700', 'text-gray-400');
                    btn.classList.remove('bg-cyan-500/20', 'border-cyan-500/50', 'text-cyan-400');
                }
            });
            
            renderTemplateList();
        }

        function previewTemplate() {
            const subject = document.getElementById('templateSubject').value;
            const body = document.getElementById('templateBody').value;
            
            // Replace variables with sample data
            let previewSubject = subject;
            let previewBody = body;
            
            Object.entries(sampleData).forEach(([key, value]) => {
                const regex = new RegExp(`{{${key}}}`, 'g');
                previewSubject = previewSubject.replace(regex, value);
                previewBody = previewBody.replace(regex, value);
            });
            
            document.getElementById('previewSubject').textContent = previewSubject;
            document.getElementById('previewBody').textContent = previewBody;
            document.getElementById('previewModal').classList.remove('hidden');
        }

        function closePreview() {
            document.getElementById('previewModal').classList.add('hidden');
        }

        function copyToClipboard() {
            const subject = document.getElementById('previewSubject').textContent;
            const body = document.getElementById('previewBody').textContent;
            
            navigator.clipboard.writeText(`Subject: ${subject}\n\n${body}`);
            showToast('Copied to clipboard', 'success');
        }

        function saveTemplate() {
            const name = document.getElementById('templateName').value;
            const category = document.getElementById('templateCategory').value;
            const subject = document.getElementById('templateSubject').value;
            const body = document.getElementById('templateBody').value;
            
            if (!name || !subject || !body) {
                showToast('Please fill in all fields', 'warning');
                return;
            }
            
            if (selectedTemplate) {
                // Update existing
                const index = templates.findIndex(t => t.id === selectedTemplate.id);
                if (index !== -1) {
                    templates[index] = { ...templates[index], name, category, subject, body };
                }
            } else {
                // Create new
                templates.push({
                    id: Date.now(),
                    name,
                    category,
                    subject,
                    body
                });
            }
            
            renderTemplateList();
            showToast('Template saved', 'success');
        }

        function openNewTemplate() {
            selectedTemplate = null;
            document.getElementById('templateName').value = 'New Template';
            document.getElementById('templateCategory').value = 'internal';
            document.getElementById('templateSubject').value = '';
            document.getElementById('templateBody').value = '';
            renderTemplateList();
        }

        function deleteTemplate(id) {
            if (!confirm('Delete this template?')) return;
            templates = templates.filter(t => t.id !== id);
            
            if (selectedTemplate?.id === id) {
                selectedTemplate = templates[0] || null;
                if (selectedTemplate) loadTemplate(selectedTemplate);
            }
            
            renderTemplateList();
            showToast('Template deleted', 'success');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMessage');
            
            const iconMap = {
                'success': 'fa-check-circle text-green-400',
                'warning': 'fa-exclamation-triangle text-yellow-400',
                'error': 'fa-times-circle text-red-400',
                'info': 'fa-info-circle text-blue-400'
            };
            
            icon.className = `fas ${iconMap[type] || iconMap.success}`;
            msg.textContent = message;
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
    </script>
</body>
</html>
