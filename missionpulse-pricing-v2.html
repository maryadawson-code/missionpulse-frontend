<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Pricing Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-green { 0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); } }
    .pulse-green { animation: pulse-green 2s infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const ALLOWED_ROLES = ['CEO', 'COO', 'FIN', 'PM'];

    const DEMO_LABOR = [
      { id: 1, category: 'Program Management', role: 'Program Manager', level: 'Senior', hours: 2080, rate: 165.00, gsa_rate: 172.50 },
      { id: 2, category: 'Program Management', role: 'Deputy PM', level: 'Mid', hours: 2080, rate: 142.00, gsa_rate: 148.75 },
      { id: 3, category: 'Technical', role: 'Solution Architect', level: 'Senior', hours: 1040, rate: 185.00, gsa_rate: 195.00 },
      { id: 4, category: 'Technical', role: 'Sr Software Engineer', level: 'Senior', hours: 4160, rate: 155.00, gsa_rate: 162.50 },
      { id: 5, category: 'Technical', role: 'Software Engineer', level: 'Mid', hours: 6240, rate: 125.00, gsa_rate: 131.25 },
      { id: 6, category: 'Technical', role: 'Jr Software Engineer', level: 'Junior', hours: 4160, rate: 95.00, gsa_rate: 99.75 },
      { id: 7, category: 'Technical', role: 'Data Engineer', level: 'Senior', hours: 2080, rate: 165.00, gsa_rate: 173.25 },
      { id: 8, category: 'Support', role: 'Business Analyst', level: 'Mid', hours: 2080, rate: 115.00, gsa_rate: 120.75 },
      { id: 9, category: 'Support', role: 'QA Lead', level: 'Senior', hours: 1040, rate: 135.00, gsa_rate: 141.75 },
      { id: 10, category: 'Support', role: 'QA Analyst', level: 'Mid', hours: 2080, rate: 105.00, gsa_rate: 110.25 }
    ];

    const DEMO_ODC = [
      { id: 1, category: 'Travel', description: 'On-site visits (quarterly)', quantity: 8, unit_cost: 2500, total: 20000 },
      { id: 2, category: 'Software', description: 'Development tools & licenses', quantity: 1, unit_cost: 45000, total: 45000 },
      { id: 3, category: 'Hardware', description: 'Test environment servers', quantity: 4, unit_cost: 8500, total: 34000 },
      { id: 4, category: 'Training', description: 'Security certifications', quantity: 15, unit_cost: 1200, total: 18000 }
    ];

    // Sidebar
    function Sidebar() {
      const navItems = [
        { icon: '🏠', label: 'Dashboard', path: 'index.html' },
        { icon: '📊', label: 'Pipeline', path: 'missionpulse-pipeline-v2.html' },
        { icon: '🎯', label: 'War Room', path: 'missionpulse-warroom-v2.html' },
        { icon: '🔍', label: 'RFP Shredder', path: 'missionpulse-rfpshredder-v2.html' },
        { icon: '🎭', label: 'Black Hat', path: 'missionpulse-blackhat-v2.html' },
        { icon: '💰', label: 'Pricing', path: 'missionpulse-pricing-v2.html', active: true },
        { icon: '🤖', label: 'Agent Hub', path: 'missionpulse-agenthub-v2.html' }
      ];

      return (
        <div className="w-64 bg-slate-900/50 border-r border-slate-700 min-h-screen p-4 hidden lg:block">
          <div className="flex items-center gap-3 mb-8">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center pulse-green">
              <span className="text-xl">💰</span>
            </div>
            <div>
              <div className="font-bold text-emerald-400">Pricing Engine</div>
              <div className="text-xs text-slate-400">CUI Protected</div>
            </div>
          </div>
          
          <nav className="space-y-1">
            {navItems.map((item, i) => (
              <a 
                key={i}
                href={item.path}
                className={`flex items-center gap-3 px-3 py-2 rounded-lg transition-all ${
                  item.active 
                    ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' 
                    : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                }`}
              >
                <span>{item.icon}</span>
                <span className="text-sm">{item.label}</span>
              </a>
            ))}
          </nav>
        </div>
      );
    }

    // CUI Banner
    function CUIBanner() {
      return (
        <div className="bg-purple-500/20 border border-purple-500/50 rounded-lg p-3 mb-4">
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 bg-purple-500 rounded flex items-center justify-center text-white font-bold text-xs">
              CUI
            </div>
            <div>
              <div className="font-medium text-purple-300 text-sm">Controlled Unclassified Information</div>
              <div className="text-xs text-purple-400">Handle according to DoDI 5200.48 • Do not share externally</div>
            </div>
          </div>
        </div>
      );
    }

    // Access Denied
    function AccessDenied() {
      return (
        <div className="min-h-screen flex items-center justify-center p-6">
          <div className="text-center max-w-md">
            <div className="w-20 h-20 rounded-2xl bg-purple-500/20 border border-purple-500/30 flex items-center justify-center mx-auto mb-6">
              <span className="text-4xl">🔒</span>
            </div>
            <h1 className="text-2xl font-bold mb-2">CUI - Access Restricted</h1>
            <p className="text-slate-400 mb-6">
              Pricing data contains Controlled Unclassified Information (CUI). Access is restricted to CEO, COO, Finance, and Program Managers.
            </p>
            <a 
              href="index.html"
              className="inline-block px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg font-medium transition-colors"
            >
              ← Return to Dashboard
            </a>
          </div>
        </div>
      );
    }

    // Labor Row
    function LaborRow({ item, onUpdate }) {
      const total = item.hours * item.rate;
      const gsaTotal = item.hours * item.gsa_rate;
      const savings = gsaTotal - total;
      const savingsPercent = ((savings / gsaTotal) * 100).toFixed(1);

      return (
        <tr className="border-b border-slate-700/50 hover:bg-slate-800/30">
          <td className="p-3 text-sm">{item.role}</td>
          <td className="p-3 text-sm text-slate-400">{item.level}</td>
          <td className="p-3 text-sm text-right font-mono">{item.hours.toLocaleString()}</td>
          <td className="p-3 text-sm text-right font-mono">${item.rate.toFixed(2)}</td>
          <td className="p-3 text-sm text-right font-mono text-slate-400">${item.gsa_rate.toFixed(2)}</td>
          <td className="p-3 text-sm text-right font-mono font-medium">${total.toLocaleString()}</td>
          <td className="p-3 text-sm text-right">
            <span className="text-emerald-400">-{savingsPercent}%</span>
          </td>
        </tr>
      );
    }

    function App() {
      const [user, setUser] = React.useState(null);
      const [hasAccess, setHasAccess] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [labor, setLabor] = React.useState(DEMO_LABOR);
      const [odc, setOdc] = React.useState(DEMO_ODC);
      const [activeTab, setActiveTab] = React.useState('labor');
      const [margins, setMargins] = React.useState({
        fee: 8,
        gna: 12,
        fringe: 32,
        overhead: 45
      });

      React.useEffect(() => {
        checkAccess();
      }, []);

      const checkAccess = async () => {
        const demoSession = localStorage.getItem('missionpulse_demo');
        if (demoSession) {
          const demo = JSON.parse(demoSession);
          if (demo.expires > Date.now()) {
            setUser(demo.user);
            setHasAccess(ALLOWED_ROLES.includes(demo.user.role));
            setLoading(false);
            return;
          }
        }

        try {
          const { data: { session } } = await supabase.auth.getSession();
          if (session) {
            const { data: profile } = await supabase
              .from('profiles')
              .select('role')
              .eq('id', session.user.id)
              .single();
            
            const role = profile?.role || 'Partner';
            setUser({ email: session.user.email, role });
            setHasAccess(ALLOWED_ROLES.includes(role));
          } else {
            setUser({ email: 'demo@missionpulse.io', role: 'CEO' });
            setHasAccess(true);
          }
        } catch (e) {
          setUser({ email: 'demo@missionpulse.io', role: 'CEO' });
          setHasAccess(true);
        }
        setLoading(false);
      };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-12 h-12 rounded-xl bg-emerald-500/20 flex items-center justify-center mx-auto mb-4 pulse-green">
                <span className="text-2xl">💰</span>
              </div>
              <p className="text-slate-400">Verifying CUI access...</p>
            </div>
          </div>
        );
      }

      if (!hasAccess) {
        return <AccessDenied />;
      }

      // Calculations
      const totalLaborHours = labor.reduce((sum, l) => sum + l.hours, 0);
      const directLabor = labor.reduce((sum, l) => sum + (l.hours * l.rate), 0);
      const gsaLabor = labor.reduce((sum, l) => sum + (l.hours * l.gsa_rate), 0);
      const totalODC = odc.reduce((sum, o) => sum + o.total, 0);
      
      const fringe = directLabor * (margins.fringe / 100);
      const overhead = directLabor * (margins.overhead / 100);
      const laborWithBurden = directLabor + fringe + overhead;
      const subtotal = laborWithBurden + totalODC;
      const gna = subtotal * (margins.gna / 100);
      const totalCost = subtotal + gna;
      const fee = totalCost * (margins.fee / 100);
      const totalPrice = totalCost + fee;
      
      const blendedRate = totalPrice / totalLaborHours;
      const laborSavings = gsaLabor - directLabor;
      const savingsPercent = ((laborSavings / gsaLabor) * 100).toFixed(1);

      const categories = [...new Set(labor.map(l => l.category))];

      return (
        <div className="flex min-h-screen">
          <Sidebar />
          
          <div className="flex-1 p-4 lg:p-6">
            {/* CUI Banner */}
            <CUIBanner />

            {/* RBAC Banner */}
            <div className="mb-4 p-3 bg-emerald-500/10 border border-emerald-500/30 rounded-lg flex items-center gap-3">
              <span className="text-emerald-400">🔒</span>
              <span className="text-sm">
                <span className="font-medium text-emerald-400">RESTRICTED:</span>
                <span className="text-slate-300"> Pricing data for CEO, COO, Finance, and PM only</span>
              </span>
            </div>

            {/* Header */}
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
              <div>
                <h1 className="text-2xl font-bold">Pricing Engine</h1>
                <p className="text-slate-400 text-sm">DHA EHR Modernization • BOE Development</p>
              </div>
              
              <div className="flex gap-3">
                <button className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
                  📥 Import Excel
                </button>
                <button className="px-4 py-2 bg-emerald-500 hover:bg-emerald-400 text-slate-900 rounded-lg text-sm font-medium">
                  📊 Export BOE
                </button>
              </div>
            </div>

            {/* Summary Cards */}
            <div className="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <div className="text-xs text-slate-400 mb-1">Total Price</div>
                <div className="text-2xl font-bold text-emerald-400">${(totalPrice / 1000000).toFixed(2)}M</div>
              </div>
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <div className="text-xs text-slate-400 mb-1">Direct Labor</div>
                <div className="text-2xl font-bold">${(directLabor / 1000000).toFixed(2)}M</div>
              </div>
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <div className="text-xs text-slate-400 mb-1">Blended Rate</div>
                <div className="text-2xl font-bold text-cyan-400">${blendedRate.toFixed(2)}/hr</div>
              </div>
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-4">
                <div className="text-xs text-slate-400 mb-1">Total Hours</div>
                <div className="text-2xl font-bold">{totalLaborHours.toLocaleString()}</div>
              </div>
              <div className="bg-slate-800/50 border border-emerald-500/30 rounded-xl p-4">
                <div className="text-xs text-slate-400 mb-1">vs GSA Savings</div>
                <div className="text-2xl font-bold text-emerald-400">-{savingsPercent}%</div>
              </div>
            </div>

            {/* Tabs */}
            <div className="flex gap-2 mb-4">
              {['labor', 'odc', 'rates', 'summary'].map(tab => (
                <button
                  key={tab}
                  onClick={() => setActiveTab(tab)}
                  className={`px-4 py-2 rounded-lg text-sm transition-colors ${
                    activeTab === tab 
                      ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' 
                      : 'bg-slate-800/50 hover:bg-slate-700'
                  }`}
                >
                  {tab === 'labor' && '👥 Labor'}
                  {tab === 'odc' && '📦 ODCs'}
                  {tab === 'rates' && '📈 Rates'}
                  {tab === 'summary' && '📋 Summary'}
                </button>
              ))}
            </div>

            {/* Tab Content */}
            {activeTab === 'labor' && (
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl overflow-hidden">
                <div className="overflow-x-auto">
                  <table className="w-full">
                    <thead>
                      <tr className="border-b border-slate-700 bg-slate-800/50">
                        <th className="text-left p-3 text-xs text-slate-400 font-medium">Role</th>
                        <th className="text-left p-3 text-xs text-slate-400 font-medium">Level</th>
                        <th className="text-right p-3 text-xs text-slate-400 font-medium">Hours</th>
                        <th className="text-right p-3 text-xs text-slate-400 font-medium">Rate</th>
                        <th className="text-right p-3 text-xs text-slate-400 font-medium">GSA</th>
                        <th className="text-right p-3 text-xs text-slate-400 font-medium">Total</th>
                        <th className="text-right p-3 text-xs text-slate-400 font-medium">Savings</th>
                      </tr>
                    </thead>
                    <tbody>
                      {categories.map(cat => (
                        <React.Fragment key={cat}>
                          <tr className="bg-slate-900/50">
                            <td colSpan={7} className="p-2 text-xs font-semibold text-slate-400">{cat}</td>
                          </tr>
                          {labor.filter(l => l.category === cat).map(item => (
                            <LaborRow key={item.id} item={item} />
                          ))}
                        </React.Fragment>
                      ))}
                    </tbody>
                    <tfoot>
                      <tr className="border-t border-slate-600 bg-slate-800/50 font-semibold">
                        <td colSpan={2} className="p-3 text-sm">Total Direct Labor</td>
                        <td className="p-3 text-sm text-right font-mono">{totalLaborHours.toLocaleString()}</td>
                        <td colSpan={2} className="p-3"></td>
                        <td className="p-3 text-sm text-right font-mono text-emerald-400">${directLabor.toLocaleString()}</td>
                        <td className="p-3 text-sm text-right text-emerald-400">-{savingsPercent}%</td>
                      </tr>
                    </tfoot>
                  </table>
                </div>
              </div>
            )}

            {activeTab === 'odc' && (
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl overflow-hidden">
                <table className="w-full">
                  <thead>
                    <tr className="border-b border-slate-700 bg-slate-800/50">
                      <th className="text-left p-3 text-xs text-slate-400 font-medium">Category</th>
                      <th className="text-left p-3 text-xs text-slate-400 font-medium">Description</th>
                      <th className="text-right p-3 text-xs text-slate-400 font-medium">Qty</th>
                      <th className="text-right p-3 text-xs text-slate-400 font-medium">Unit Cost</th>
                      <th className="text-right p-3 text-xs text-slate-400 font-medium">Total</th>
                    </tr>
                  </thead>
                  <tbody>
                    {odc.map(item => (
                      <tr key={item.id} className="border-b border-slate-700/50 hover:bg-slate-800/30">
                        <td className="p-3 text-sm">{item.category}</td>
                        <td className="p-3 text-sm text-slate-400">{item.description}</td>
                        <td className="p-3 text-sm text-right font-mono">{item.quantity}</td>
                        <td className="p-3 text-sm text-right font-mono">${item.unit_cost.toLocaleString()}</td>
                        <td className="p-3 text-sm text-right font-mono font-medium">${item.total.toLocaleString()}</td>
                      </tr>
                    ))}
                  </tbody>
                  <tfoot>
                    <tr className="border-t border-slate-600 bg-slate-800/50 font-semibold">
                      <td colSpan={4} className="p-3 text-sm">Total ODCs</td>
                      <td className="p-3 text-sm text-right font-mono text-emerald-400">${totalODC.toLocaleString()}</td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            )}

            {activeTab === 'rates' && (
              <div className="grid lg:grid-cols-2 gap-6">
                <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
                  <h3 className="font-semibold mb-4">Wrap Rates</h3>
                  <div className="space-y-4">
                    {Object.entries(margins).map(([key, value]) => (
                      <div key={key}>
                        <div className="flex justify-between mb-1">
                          <label className="text-sm capitalize">{key === 'gna' ? 'G&A' : key}</label>
                          <span className="text-sm font-mono">{value}%</span>
                        </div>
                        <input
                          type="range"
                          min="0"
                          max={key === 'overhead' ? 80 : key === 'fringe' ? 50 : 20}
                          value={value}
                          onChange={(e) => setMargins({ ...margins, [key]: parseFloat(e.target.value) })}
                          className="w-full h-2 bg-slate-700 rounded-full appearance-none cursor-pointer"
                        />
                      </div>
                    ))}
                  </div>
                </div>
                <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
                  <h3 className="font-semibold mb-4">Rate Analysis</h3>
                  <div className="space-y-3">
                    <div className="flex justify-between text-sm">
                      <span className="text-slate-400">Avg Direct Rate</span>
                      <span className="font-mono">${(directLabor / totalLaborHours).toFixed(2)}/hr</span>
                    </div>
                    <div className="flex justify-between text-sm">
                      <span className="text-slate-400">Avg GSA Rate</span>
                      <span className="font-mono">${(gsaLabor / totalLaborHours).toFixed(2)}/hr</span>
                    </div>
                    <div className="flex justify-between text-sm">
                      <span className="text-slate-400">Fully Burdened</span>
                      <span className="font-mono">${blendedRate.toFixed(2)}/hr</span>
                    </div>
                    <div className="pt-3 border-t border-slate-700">
                      <div className="flex justify-between text-sm font-semibold">
                        <span>Competitive Position</span>
                        <span className="text-emerald-400">Below GSA ✓</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'summary' && (
              <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
                <h3 className="font-semibold mb-4">Price Summary</h3>
                <div className="space-y-2">
                  <div className="flex justify-between py-2 text-sm">
                    <span>Direct Labor</span>
                    <span className="font-mono">${directLabor.toLocaleString()}</span>
                  </div>
                  <div className="flex justify-between py-2 text-sm text-slate-400">
                    <span className="pl-4">+ Fringe ({margins.fringe}%)</span>
                    <span className="font-mono">${fringe.toLocaleString()}</span>
                  </div>
                  <div className="flex justify-between py-2 text-sm text-slate-400">
                    <span className="pl-4">+ Overhead ({margins.overhead}%)</span>
                    <span className="font-mono">${overhead.toLocaleString()}</span>
                  </div>
                  <div className="flex justify-between py-2 text-sm border-t border-slate-700">
                    <span>Labor with Burden</span>
                    <span className="font-mono">${laborWithBurden.toLocaleString()}</span>
                  </div>
                  <div className="flex justify-between py-2 text-sm">
                    <span>Other Direct Costs</span>
                    <span className="font-mono">${totalODC.toLocaleString()}</span>
                  </div>
                  <div className="flex justify-between py-2 text-sm text-slate-400">
                    <span className="pl-4">+ G&A ({margins.gna}%)</span>
                    <span className="font-mono">${gna.toLocaleString()}</span>
                  </div>
                  <div className="flex justify-between py-2 text-sm border-t border-slate-700">
                    <span>Total Cost</span>
                    <span className="font-mono">${totalCost.toLocaleString()}</span>
                  </div>
                  <div className="flex justify-between py-2 text-sm text-slate-400">
                    <span className="pl-4">+ Fee ({margins.fee}%)</span>
                    <span className="font-mono">${fee.toLocaleString()}</span>
                  </div>
                  <div className="flex justify-between py-3 text-lg font-bold border-t-2 border-emerald-500/50 mt-2">
                    <span>Total Price</span>
                    <span className="text-emerald-400">${totalPrice.toLocaleString()}</span>
                  </div>
                </div>
              </div>
            )}

            {/* Footer */}
            <div className="mt-8 text-center text-xs text-slate-500">
              <div className="flex items-center justify-center gap-2 mb-1">
                <span className="px-2 py-0.5 bg-purple-500/20 text-purple-400 rounded text-xs">CUI</span>
                <span>Controlled Unclassified Information</span>
              </div>
              <div>Mission Meets Tech | MissionPulse Pricing Engine</div>
              <div className="mt-1">AI GENERATED - REQUIRES HUMAN REVIEW</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
