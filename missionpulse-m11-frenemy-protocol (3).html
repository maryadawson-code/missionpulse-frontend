        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #00050F;
            color: #fff;
            min-height: 100vh;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 229, 250, 0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 229, 250, 0.5); }
        
        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(0, 229, 250, 0.3); }
            50% { box-shadow: 0 0 20px rgba(0, 229, 250, 0.6); }
        }
        @keyframes countdownPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        @keyframes warningFlash {
            0%, 100% { background-color: rgba(239, 68, 68, 0.1); }
            50% { background-color: rgba(239, 68, 68, 0.2); }
        }
        .animate-fadeInUp { animation: fadeInUp 0.5s ease-out forwards; }
        .animate-pulse { animation: pulse 2s ease-in-out infinite; }
        .animate-spin { animation: spin 1s linear infinite; }
        .animate-slideIn { animation: slideIn 0.3s ease-out forwards; }
        .animate-glow { animation: glow 2s ease-in-out infinite; }
        .animate-countdownPulse { animation: countdownPulse 2s ease-in-out infinite; }
        .animate-warningFlash { animation: warningFlash 1s ease-in-out infinite; }
        
        /* Glass effect */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        /* Gradient border */
        .gradient-border {
            position: relative;
        }
        .gradient-border::before {
            content: '';
            position: absolute;
            inset: 0;
            padding: 1px;
            background: linear-gradient(135deg, rgba(0, 229, 250, 0.5), rgba(139, 92, 246, 0.3));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            border-radius: inherit;
            pointer-events: none;
        }
        
        /* Partner card */
        .partner-card {
            transition: all 0.3s ease;
        }
        .partner-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        /* Workload bar */
        .workload-bar {
            height: 24px;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
        }
        .workload-segment {
            transition: width 0.5s ease;
        }
        
        /* Risk flag */
        .risk-flag {
            position: relative;
            padding-left: 12px;
        }
        .risk-flag::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 100%;
            border-radius: 2px;
        }
        .risk-flag.high::before { background: #EF4444; }
        .risk-flag.medium::before { background: #F59E0B; }
        .risk-flag.low::before { background: #10B981; }
    </style>

                                        <table className="w-full">
                                            <thead>
                                                <tr className="border-b border-white/10">
                                                    <th className="text-left py-3 px-4 text-xs font-medium text-slate-400 uppercase">Capability</th>
                                                    {partners.map((p) => (
                                                        <th key={p.id} className="text-center py-3 px-4">
                                                            <div className="flex flex-col items-center gap-1">
                                                                <div className={`w-8 h-8 rounded ${p.color} flex items-center justify-center text-white text-xs font-bold`}>
                                                                    {p.logo}
                                                                </div>
                                                                <span className="text-xs text-slate-400">{p.name.split(' ')[0]}</span>
                                                            </div>
                                                        </th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {[
                                                    'Cloud Infrastructure',
                                                    'System Integration',
                                                    'Cybersecurity',
                                                    'DevSecOps',
                                                    'Healthcare IT',
                                                    'EHR Implementation',
                                                    'Data Migration',
                                                    'Training',
                                                    'Network Security',
                                                    'Penetration Testing',
                                                    'SOC Operations',
                                                    'Cloud Migration',
                                                    'AWS GovCloud',
                                                    'Terraform',
                                                ].map((cap, idx) => (
                                                    <tr key={idx} className="border-b border-white/5">
                                                        <td className="py-3 px-4 text-sm text-white">{cap}</td>
                                                        {partners.map((p) => (
                                                            <td key={p.id} className="py-3 px-4 text-center">
                                                                {p.capabilities.includes(cap) ? (
                                                                    <Icons.check className="w-5 h-5 text-emerald-400 mx-auto" />
                                                                ) : (
                                                                    <span className="text-slate-600">—</span>
                                                                )}
                                                            </td>
                                                        ))}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </Card>
                            </div>
                        )}
                        
                        {/* Communication Log Tab */}
                        {activeTab === 'comms' && (
                            <div className="grid grid-cols-12 gap-6 animate-fadeInUp">
                                <div className="col-span-8">
                                    <Card className="p-4">
                                        <div className="flex items-center justify-between mb-4">
                                            <h3 className="font-semibold text-white">Communication Log</h3>
                                            <Button variant="primary" size="sm" onClick={() => setShowMessageModal(true)}>
                                                <Icons.plus className="w-4 h-4" />
                                                New Message
                                            </Button>
                                        </div>
                                        
                                        <div className="space-y-3">
                                            {COMMUNICATION_LOG.map((log) => {
                                                const partner = partners.find(p => p.id === log.partnerId);
                                                return (
                                                    <div key={log.id} className={`p-4 rounded-lg border ${log.type === 'sent' ? 'bg-cyan-500/5 border-cyan-500/20' : 'bg-slate-800/30 border-white/5'}`}>
                                                        <div className="flex items-start justify-between mb-2">
                                                            <div className="flex items-center gap-2">
                                                                <div className={`w-8 h-8 rounded ${partner?.color || 'bg-slate-600'} flex items-center justify-center text-white text-xs font-bold`}>
                                                                    {partner?.logo || '?'}
                                                                </div>
                                                                <div>
                                                                    <p className="text-sm font-medium text-white">{log.from}</p>
                                                                    <p className="text-xs text-slate-400">{partner?.name}</p>
                                                                </div>
                                                            </div>
                                                            <div className="flex items-center gap-2">
                                                                <Badge variant={log.type === 'sent' ? 'primary' : 'default'}>
                                                                    {log.type === 'sent' ? 'Sent' : 'Received'}
                                                                </Badge>
                                                                <span className="text-xs text-slate-400">{log.date}</span>
                                                            </div>
                                                        </div>
                                                        <p className="text-sm text-slate-300">{log.message}</p>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </Card>
                                </div>
                                
                                <div className="col-span-4">
                                    <Card className="p-4">
                                        <h4 className="font-medium text-white mb-4">Quick Contacts</h4>
                                        <div className="space-y-3">
                                            {partners.map((partner) => (
                                                <div key={partner.id} className="flex items-center gap-3 p-2 rounded-lg hover:bg-white/5 cursor-pointer">
                                                    <div className={`w-10 h-10 rounded ${partner.color} flex items-center justify-center text-white font-bold text-sm`}>
                                                        {partner.logo}
                                                    </div>
                                                    <div className="flex-1">
                                                        <p className="text-sm font-medium text-white">{partner.contact.name}</p>
                                                        <p className="text-xs text-slate-400">{partner.name}</p>
                                                    </div>
                                                    <Button variant="ghost" size="sm">
                                                        <Icons.message className="w-4 h-4" />
                                                    </Button>
                                                </div>
                                            ))}
                                        </div>
                                    </Card>
                                </div>
                            </div>
                        )}
                        
                        {/* Small Business Goals Tab */}
                        {activeTab === 'goals' && (
                            <div className="animate-fadeInUp">
                                <Card className="p-6 mb-6">
                                    <h3 className="font-semibold text-white mb-6">Small Business Goal Tracker</h3>
                                    
                                    <div className="grid grid-cols-5 gap-4">
                                        {SMALL_BUSINESS_GOALS.map((goal, idx) => (
                                            <Card key={idx} className={`p-4 ${goal.met ? 'bg-emerald-500/10 border-emerald-500/30' : 'bg-amber-500/10 border-amber-500/30'}`}>
                                                <div className="text-center">
                                                    <div className="relative inline-flex mb-3">
                                                        <ProgressRing 
                                                            progress={Math.min((goal.current / goal.target) * 100, 100)} 
                                                            size={80} 
                                                            strokeWidth={6}
                                                            color={goal.met ? '#10B981' : '#F59E0B'}
                                                        />
                                                        <div className="absolute inset-0 flex items-center justify-center">
                                                            <span className={`text-lg font-bold ${goal.met ? 'text-emerald-400' : 'text-amber-400'}`}>
                                                                {goal.current}%
                                                            </span>
                                                        </div>
                                                    </div>
                                                    <h4 className="font-medium text-white">{goal.category}</h4>
                                                    <p className="text-sm text-slate-400">Target: {goal.target}%</p>
                                                    {goal.met ? (
                                                        <Badge variant="success" className="mt-2">
                                                            <Icons.check className="w-3 h-3" />
                                                            Met
                                                        </Badge>
                                                    ) : (
                                                        <Badge variant="warning" className="mt-2">
                                                            <Icons.alertTriangle className="w-3 h-3" />
                                                            {(goal.target - goal.current).toFixed(1)}% Gap
                                                        </Badge>
                                                    )}
                                                </div>
                                            </Card>
                                        ))}
                                    </div>
                                </Card>
                                
                                <Card className="p-4">
                                    <h3 className="font-semibold text-white mb-4">Partner Small Business Classifications</h3>
                                    <div className="space-y-3">
                                        {partners.filter(p => p.type !== 'Large Business').map((partner) => (
                                            <div key={partner.id} className="flex items-center justify-between p-3 bg-slate-800/30 rounded-lg">
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-10 h-10 rounded ${partner.color} flex items-center justify-center text-white font-bold text-sm`}>
                                                        {partner.logo}
                                                    </div>
                                                    <div>
                                                        <p className="font-medium text-white">{partner.name}</p>
                                                        <p className="text-sm text-slate-400">{partner.role}</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <Badge variant={
                                                        partner.type === 'SDVOSB' ? 'purple' :
                                                        partner.type === '8(a)' ? 'success' :
                                                        partner.type === 'HUBZone' ? 'warning' :
                                                        'default'
                                                    }>
                                                        {partner.type}
                                                    </Badge>
                                                    <span className="text-sm text-slate-400">{partner.workloadPercent}% of work</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </Card>
                            </div>
                        )}
                    </main>
                    
                    {/* Message Modal */}
                    {showMessageModal && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center">
                            <Card className="w-full max-w-lg p-6 m-4">
                                <div className="flex items-center justify-between mb-4">
                                    <h3 className="font-semibold text-white">Send Message</h3>
                                    <button onClick={() => setShowMessageModal(false)} className="text-slate-400 hover:text-white">
                                        <Icons.x className="w-5 h-5" />
                                    </button>
                                </div>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-sm text-slate-400 block mb-1">To</label>
                                        <select className="w-full bg-slate-800 border border-white/10 rounded-lg px-3 py-2 text-white">
                                            {partners.map(p => (
                                                <option key={p.id} value={p.id}>{p.contact.name} ({p.name})</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-sm text-slate-400 block mb-1">Message</label>
                                        <textarea
                                            value={newMessage}
                                            onChange={(e) => setNewMessage(e.target.value)}
                                            placeholder="Type your message..."
                                            className="w-full bg-slate-800 border border-white/10 rounded-lg px-3 py-2 text-white resize-none h-32"
                                        />
                                    </div>
                                    <div className="flex gap-2">
                                        <Button variant="primary" className="flex-1">
                                            <Icons.send className="w-4 h-4" />
                                            Send Message
                                        </Button>
                                        <Button variant="secondary" onClick={() => setShowMessageModal(false)}>
                                            Cancel
                                        </Button>
                                    </div>
                                </div>
                            </Card>
                        </div>
                    )}
                    
                    {/* Footer */}
                    <footer className="border-t border-white/10 py-4 mt-8">
                        <div className="max-w-7xl mx-auto px-6 flex items-center justify-between">
                            <p className="text-xs text-slate-500">
                                MissionPulse v12.0 • Frenemy Protocol • Partner data synced: Just now
                            </p>
                            <Badge variant="warning" className="text-xs">
                                AI GENERATED - REQUIRES HUMAN REVIEW
                            </Badge>
                        </div>
                    </footer>
                    
                    {/* AI Chat Widget Placeholder */}
                    <div className="fixed bottom-6 right-6 z-40">
                        <button className="w-14 h-14 rounded-full bg-gradient-to-r from-purple-500 to-pink-500 flex items-center justify-center shadow-lg shadow-purple-500/25 hover:scale-105 transition-transform">
                            <Icons.chat className="w-6 h-6 text-white" />
                        </button>
                    </div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<FrenemyProtocol />);
    </script>
    
    <!-- AI Chat Widget Integration -->
    <script src="ai-chat-widget.js" data-agent="partners"></script>
</body>
</html>
