<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Executive Dashboard | MissionPulse</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass { background: rgba(0,229,250,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
    .glass-card { background: rgba(15,23,42,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(51,65,85,0.5); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    .animate-value { animation: pulse 2s infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const EXEC_DATA = {
      pipeline: {
        totalValue: 847000000,
        weighted: 423500000,
        opportunities: 12,
        avgPwin: 52
      },
      performance: {
        winRate: 67,
        winsThisQuarter: 4,
        wonValue: 142000000,
        lossesThisQuarter: 2
      },
      proposals: {
        active: 5,
        dueThisWeek: 2,
        dueThisMonth: 4,
        submitted: 3
      },
      team: {
        totalMembers: 24,
        activeNow: 18,
        utilization: 78,
        avgHoursWeek: 42
      },
      topOpportunities: [
        { name: 'DHA EHR Modernization', value: 245000000, pwin: 72, phase: 'Proposal', dueDate: '2025-02-28', status: 'on_track' },
        { name: 'VA Claims Processing AI', value: 180000000, pwin: 58, phase: 'Proposal', dueDate: '2025-03-15', status: 'at_risk' },
        { name: 'CMS Data Analytics', value: 125000000, pwin: 65, phase: 'Negotiation', dueDate: '2025-02-20', status: 'on_track' },
        { name: 'IHS Telehealth Expansion', value: 85000000, pwin: 45, phase: 'Capture', dueDate: '2025-04-01', status: 'on_track' },
        { name: 'DoD Health Interop', value: 212000000, pwin: 38, phase: 'Qualification', dueDate: '2025-05-15', status: 'on_track' }
      ],
      recentActivity: [
        { type: 'win', text: 'DoD Health Data Platform awarded - $45M', time: '2 days ago' },
        { type: 'submission', text: 'CMS Analytics proposal submitted', time: '3 days ago' },
        { type: 'review', text: 'DHA EHR Red Team completed', time: '5 days ago' },
        { type: 'milestone', text: 'VA Claims Questions submitted', time: '1 week ago' },
        { type: 'partner', text: 'CloudSecure TA signed', time: '1 week ago' }
      ],
      upcomingDeadlines: [
        { name: 'DHA EHR Final Submission', date: '2025-02-28', daysLeft: 26 },
        { name: 'CMS Analytics Negotiation', date: '2025-02-20', daysLeft: 18 },
        { name: 'VA Claims Questions Due', date: '2025-02-15', daysLeft: 13 },
        { name: 'IHS Telehealth Draft', date: '2025-03-01', daysLeft: 27 }
      ]
    };

    const Icons = {
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
      chart: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
      shield: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
      trendUp: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>,
      trendDown: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6" /></svg>,
      users: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
      clock: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6l4 2" /></svg>,
      trophy: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" /></svg>,
      dollar: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      calendar: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
      file: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>,
      refresh: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    const formatCurrency = (value, compact = true) => {
      return new Intl.NumberFormat('en-US', { 
        style: 'currency', 
        currency: 'USD', 
        notation: compact ? 'compact' : 'standard',
        maximumFractionDigits: compact ? 1 : 0
      }).format(value);
    };

    const Badge = ({ children, variant = 'default' }) => {
      const variants = {
        default: 'bg-slate-700 text-slate-300',
        success: 'bg-emerald-500/20 text-emerald-400',
        warning: 'bg-amber-500/20 text-amber-400',
        danger: 'bg-red-500/20 text-red-400',
        cyan: 'bg-cyan-500/20 text-cyan-400'
      };
      return <span className={`px-2 py-1 rounded-full text-xs font-medium ${variants[variant]}`}>{children}</span>;
    };

    // Simple donut chart
    const DonutChart = ({ percentage, size = 120, strokeWidth = 12, color = '#00E5FA' }) => {
      const radius = (size - strokeWidth) / 2;
      const circumference = radius * 2 * Math.PI;
      const offset = circumference - (percentage / 100) * circumference;
      
      return (
        <div className="relative" style={{ width: size, height: size }}>
          <svg className="transform -rotate-90" width={size} height={size}>
            <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth={strokeWidth} />
            <circle 
              cx={size/2} cy={size/2} r={radius} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round"
              style={{ strokeDasharray: circumference, strokeDashoffset: offset, transition: 'stroke-dashoffset 0.5s ease' }} 
            />
          </svg>
          <div className="absolute inset-0 flex items-center justify-center flex-col">
            <span className="text-3xl font-bold text-white">{percentage}%</span>
            <span className="text-xs text-slate-400">Win Rate</span>
          </div>
        </div>
      );
    };

    // Mini bar chart
    const MiniBar = ({ value, max, color = 'cyan' }) => {
      const percent = Math.min((value / max) * 100, 100);
      return (
        <div className="h-2 bg-slate-700/50 rounded-full overflow-hidden">
          <div className={`h-full bg-${color}-500 rounded-full transition-all duration-500`} style={{ width: `${percent}%` }}></div>
        </div>
      );
    };

    function ExecutiveDashboard() {
      const [data, setData] = useState(EXEC_DATA);
      const [lastUpdated, setLastUpdated] = useState(new Date());

      const refreshData = () => {
        setLastUpdated(new Date());
      };

      const getStatusColor = (status) => {
        return status === 'on_track' ? 'emerald' : status === 'at_risk' ? 'amber' : 'red';
      };

      const getActivityIcon = (type) => {
        const icons = { win: '🏆', submission: '📤', review: '✅', milestone: '🚩', partner: '🤝' };
        return icons[type] || '📌';
      };

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="p-2 rounded-lg bg-slate-800/50 hover:bg-slate-700/50 transition-colors">
                    <Icon name="home" className="w-5 h-5 text-slate-400" />
                  </a>
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-violet-500 to-purple-500 flex items-center justify-center">
                      <Icon name="chart" className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white">Executive Dashboard</h1>
                      <p className="text-sm text-slate-400">Real-time business intelligence</p>
                    </div>
                  </div>
                </div>
                <div className="flex items-center gap-4">
                  <span className="text-sm text-slate-400">
                    Updated: {lastUpdated.toLocaleTimeString()}
                  </span>
                  <button 
                    onClick={refreshData}
                    className="px-4 py-2 bg-slate-700/50 rounded-lg text-slate-400 hover:text-white transition flex items-center gap-2"
                  >
                    <Icon name="refresh" className="w-4 h-4" /> Refresh
                  </button>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8">
            {/* Top KPI Row */}
            <div className="grid grid-cols-4 gap-4 mb-8">
              {[
                { label: 'Pipeline Value', value: formatCurrency(data.pipeline.totalValue), subtext: `${data.pipeline.opportunities} opportunities`, icon: 'dollar', color: 'emerald', trend: '+12%' },
                { label: 'Weighted Pipeline', value: formatCurrency(data.pipeline.weighted), subtext: `${data.pipeline.avgPwin}% avg pWin`, icon: 'chart', color: 'cyan', trend: '+8%' },
                { label: 'Won This Quarter', value: formatCurrency(data.performance.wonValue), subtext: `${data.performance.winsThisQuarter} awards`, icon: 'trophy', color: 'amber', trend: '+24%' },
                { label: 'Active Proposals', value: data.proposals.active, subtext: `${data.proposals.dueThisWeek} due this week`, icon: 'file', color: 'purple', trend: null }
              ].map((kpi, i) => (
                <div key={i} className="glass-card rounded-xl p-5">
                  <div className="flex items-start justify-between mb-3">
                    <div className={`w-10 h-10 rounded-lg bg-${kpi.color}-500/20 flex items-center justify-center`}>
                      <Icon name={kpi.icon} className={`w-5 h-5 text-${kpi.color}-400`} />
                    </div>
                    {kpi.trend && (
                      <span className="flex items-center gap-1 text-emerald-400 text-sm">
                        <Icon name="trendUp" className="w-4 h-4" />{kpi.trend}
                      </span>
                    )}
                  </div>
                  <div className="text-3xl font-bold text-white mb-1">{kpi.value}</div>
                  <div className="text-sm text-slate-400">{kpi.label}</div>
                  <div className="text-xs text-slate-500 mt-1">{kpi.subtext}</div>
                </div>
              ))}
            </div>

            <div className="grid grid-cols-3 gap-6 mb-8">
              {/* Win Rate Donut */}
              <div className="glass-card rounded-xl p-6">
                <h3 className="text-lg font-semibold text-white mb-4">Performance</h3>
                <div className="flex items-center justify-center mb-4">
                  <DonutChart percentage={data.performance.winRate} />
                </div>
                <div className="grid grid-cols-2 gap-4 text-center">
                  <div>
                    <div className="text-2xl font-bold text-emerald-400">{data.performance.winsThisQuarter}</div>
                    <div className="text-xs text-slate-400">Wins</div>
                  </div>
                  <div>
                    <div className="text-2xl font-bold text-red-400">{data.performance.lossesThisQuarter}</div>
                    <div className="text-xs text-slate-400">Losses</div>
                  </div>
                </div>
              </div>

              {/* Team Status */}
              <div className="glass-card rounded-xl p-6">
                <h3 className="text-lg font-semibold text-white mb-4">Team Status</h3>
                <div className="space-y-4">
                  <div>
                    <div className="flex items-center justify-between mb-2">
                      <span className="text-sm text-slate-400">Team Utilization</span>
                      <span className="text-cyan-400 font-semibold">{data.team.utilization}%</span>
                    </div>
                    <MiniBar value={data.team.utilization} max={100} />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div className="glass rounded-lg p-3 text-center">
                      <div className="text-2xl font-bold text-white">{data.team.activeNow}</div>
                      <div className="text-xs text-slate-400">Active Now</div>
                    </div>
                    <div className="glass rounded-lg p-3 text-center">
                      <div className="text-2xl font-bold text-white">{data.team.totalMembers}</div>
                      <div className="text-xs text-slate-400">Total Team</div>
                    </div>
                  </div>
                  <div className="text-center pt-2">
                    <span className="text-slate-400 text-sm">Avg {data.team.avgHoursWeek} hrs/week</span>
                  </div>
                </div>
              </div>

              {/* Upcoming Deadlines */}
              <div className="glass-card rounded-xl p-6">
                <h3 className="text-lg font-semibold text-white mb-4">Upcoming Deadlines</h3>
                <div className="space-y-3">
                  {data.upcomingDeadlines.map((d, i) => (
                    <div key={i} className="flex items-center justify-between p-2 rounded-lg bg-slate-800/30">
                      <div className="flex-1 min-w-0">
                        <div className="text-sm text-white truncate">{d.name}</div>
                        <div className="text-xs text-slate-500">{d.date}</div>
                      </div>
                      <Badge variant={d.daysLeft <= 14 ? 'danger' : d.daysLeft <= 30 ? 'warning' : 'default'}>
                        {d.daysLeft}d
                      </Badge>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Top Opportunities */}
            <div className="glass-card rounded-xl p-6 mb-8">
              <div className="flex items-center justify-between mb-4">
                <h3 className="text-lg font-semibold text-white">Top Opportunities</h3>
                <a href="missionpulse-pipeline.html" className="text-cyan-400 text-sm hover:underline">View All →</a>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="text-left text-xs text-slate-400 border-b border-slate-700/50">
                      <th className="pb-3 font-medium">Opportunity</th>
                      <th className="pb-3 font-medium">Value</th>
                      <th className="pb-3 font-medium">pWin</th>
                      <th className="pb-3 font-medium">Phase</th>
                      <th className="pb-3 font-medium">Due Date</th>
                      <th className="pb-3 font-medium">Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    {data.topOpportunities.map((opp, i) => (
                      <tr key={i} className="border-b border-slate-700/30 hover:bg-slate-800/30 transition">
                        <td className="py-4">
                          <span className="text-white font-medium">{opp.name}</span>
                        </td>
                        <td className="py-4 text-emerald-400 font-semibold">{formatCurrency(opp.value)}</td>
                        <td className="py-4">
                          <div className="flex items-center gap-2">
                            <MiniBar value={opp.pwin} max={100} color={opp.pwin >= 60 ? 'emerald' : opp.pwin >= 40 ? 'amber' : 'red'} />
                            <span className="text-sm text-slate-300 w-10">{opp.pwin}%</span>
                          </div>
                        </td>
                        <td className="py-4">
                          <Badge variant="cyan">{opp.phase}</Badge>
                        </td>
                        <td className="py-4 text-slate-400 text-sm">{opp.dueDate}</td>
                        <td className="py-4">
                          <span className={`inline-flex items-center gap-1 px-2 py-1 rounded-full text-xs bg-${getStatusColor(opp.status)}-500/20 text-${getStatusColor(opp.status)}-400`}>
                            <span className={`w-1.5 h-1.5 rounded-full bg-${getStatusColor(opp.status)}-400`}></span>
                            {opp.status === 'on_track' ? 'On Track' : opp.status === 'at_risk' ? 'At Risk' : 'Critical'}
                          </span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Recent Activity */}
            <div className="glass-card rounded-xl p-6">
              <h3 className="text-lg font-semibold text-white mb-4">Recent Activity</h3>
              <div className="space-y-3">
                {data.recentActivity.map((activity, i) => (
                  <div key={i} className="flex items-center gap-3 p-3 rounded-lg bg-slate-800/30">
                    <span className="text-xl">{getActivityIcon(activity.type)}</span>
                    <div className="flex-1">
                      <span className="text-white">{activity.text}</span>
                    </div>
                    <span className="text-xs text-slate-500">{activity.time}</span>
                  </div>
                ))}
              </div>
            </div>
          </main>

          {/* Footer */}
          <footer className="glass border-t border-slate-700/50 mt-12">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-2 text-slate-400 text-sm">
                <Icon name="shield" className="w-4 h-4" />
                <span>Mission Meets Tech • MissionPulse v12</span>
              </div>
              <div className="text-xs text-slate-500">Executive View • Data refreshes every 5 minutes</div>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ExecutiveDashboard />);
  </script>
</body>
</html>
