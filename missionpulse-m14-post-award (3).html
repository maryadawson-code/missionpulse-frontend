<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse M14 - Post-Award Transition</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/png" href="MMT_icon_transparent.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Space Grotesk', sans-serif; background: #00050F; min-height: 100vh; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(0, 229, 250, 0.3); } 50% { box-shadow: 0 0 40px rgba(0, 229, 250, 0.6); } }
    @keyframes checkBounce { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    @keyframes progressFill { from { width: 0%; } }
    
    .animate-fade-up { animation: fadeInUp 0.6s ease-out forwards; }
    .animate-slide-in { animation: slideIn 0.5s ease-out forwards; }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-glow { animation: glow 2s ease-in-out infinite; }
    .animate-check { animation: checkBounce 0.4s ease-out forwards; }
    .animate-progress { animation: progressFill 1s ease-out forwards; }
    
    .glass-card {
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(15, 23, 42, 0.7) 100%);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 229, 250, 0.2);
    }
    
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 3px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(0, 229, 250, 0.3); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Icons Library
    const Icons = {

      clipboard: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" /></svg>,
      users: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
      calendar: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
      flag: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9" /></svg>,

      mail: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>,
      star: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" /></svg>,

      building: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>,
      refresh: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>,

    };

    const Icon = ({ name, className = "w-5 h-5" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    // Transition Checklist
    const TRANSITION_CHECKLIST = [
      { id: 't1', category: 'Kickoff', item: 'Award notification received', status: 'complete', dueDate: 'Feb 15' },
      { id: 't2', category: 'Kickoff', item: 'Internal kickoff meeting scheduled', status: 'complete', dueDate: 'Feb 18' },
      { id: 't3', category: 'Kickoff', item: 'Government kickoff meeting scheduled', status: 'pending', dueDate: 'Feb 25' },
      { id: 't4', category: 'Staffing', item: 'Key personnel identified', status: 'complete', dueDate: 'Feb 20' },
      { id: 't5', category: 'Staffing', item: 'Offer letters sent', status: 'in-progress', dueDate: 'Feb 22' },
      { id: 't6', category: 'Staffing', item: 'Background checks initiated', status: 'pending', dueDate: 'Feb 28' },
      { id: 't7', category: 'Clearances', item: 'SF-86 forms submitted', status: 'in-progress', dueDate: 'Mar 1' },
      { id: 't8', category: 'Clearances', item: 'Interim clearances requested', status: 'pending', dueDate: 'Mar 5' },
      { id: 't9', category: 'Facilities', item: 'Workspace identified', status: 'complete', dueDate: 'Feb 20' },
      { id: 't10', category: 'Facilities', item: 'IT equipment ordered', status: 'in-progress', dueDate: 'Feb 25' },
      { id: 't11', category: 'Facilities', item: 'CAC/PIV card requests submitted', status: 'pending', dueDate: 'Mar 1' },
      { id: 't12', category: 'Admin', item: 'Contract file established', status: 'complete', dueDate: 'Feb 16' },
    ];

    // Key Personnel
    const KEY_PERSONNEL = [
      { id: 'kp1', name: 'Dr. Sarah Chen', role: 'Program Manager', clearance: 'Secret', status: 'confirmed', startDate: 'Mar 1, 2026', laborCat: 'PM-III' },
      { id: 'kp2', name: 'Marcus Williams', role: 'Technical Lead', clearance: 'Top Secret', status: 'confirmed', startDate: 'Mar 1, 2026', laborCat: 'SME-IV' },
      { id: 'kp3', name: 'Jennifer Park', role: 'Healthcare IT SME', clearance: 'Secret', status: 'pending', startDate: 'Mar 15, 2026', laborCat: 'SME-III' },
      { id: 'kp4', name: 'David Kim', role: 'Data Architect', clearance: 'Secret', status: 'confirmed', startDate: 'Mar 1, 2026', laborCat: 'Eng-IV' },
      { id: 'kp5', name: 'Michelle Torres', role: 'Security Engineer', clearance: 'Top Secret/SCI', status: 'in-progress', startDate: 'Mar 8, 2026', laborCat: 'Eng-III' },
    ];

    // Contract Milestones
    const MILESTONES = [
      { id: 'm1', name: 'Contract Award', date: 'Feb 15, 2026', status: 'complete', type: 'admin' },
      { id: 'm2', name: 'Period of Performance Start', date: 'Mar 1, 2026', status: 'upcoming', type: 'admin' },
      { id: 'm3', name: 'Government Kickoff Meeting', date: 'Mar 5, 2026', status: 'upcoming', type: 'meeting' },
      { id: 'm4', name: 'Transition Plan Due', date: 'Mar 15, 2026', status: 'upcoming', type: 'deliverable' },
      { id: 'm5', name: 'System Access Granted', date: 'Mar 20, 2026', status: 'upcoming', type: 'technical' },
      { id: 'm6', name: 'Phase 1 Kickoff', date: 'Apr 1, 2026', status: 'upcoming', type: 'meeting' },
      { id: 'm7', name: 'Monthly Status Report #1', date: 'Apr 5, 2026', status: 'upcoming', type: 'deliverable' },
      { id: 'm8', name: 'Phase 1 Complete', date: 'Jun 30, 2026', status: 'upcoming', type: 'milestone' },
    ];

    // Deliverables
    const DELIVERABLES = [
      { id: 'd1', name: 'Transition Plan', dueDate: 'Mar 15, 2026', status: 'in-progress', owner: 'Sarah Chen' },
      { id: 'd2', name: 'Program Management Plan', dueDate: 'Mar 20, 2026', status: 'not-started', owner: 'Sarah Chen' },
      { id: 'd3', name: 'System Security Plan', dueDate: 'Mar 25, 2026', status: 'not-started', owner: 'Michelle Torres' },
      { id: 'd4', name: 'Technical Architecture Doc', dueDate: 'Apr 1, 2026', status: 'not-started', owner: 'David Kim' },
      { id: 'd5', name: 'Monthly Status Report', dueDate: 'Monthly', status: 'recurring', owner: 'Sarah Chen' },
    ];

    // Risk Register
    const RISKS = [
      { id: 'r1', risk: 'Clearance delays for key personnel', likelihood: 'medium', impact: 'high', mitigation: 'Start processing early, identify cleared alternates', status: 'monitoring' },
      { id: 'r2', risk: 'Incumbent knowledge transfer gaps', likelihood: 'medium', impact: 'medium', mitigation: 'Schedule dedicated KT sessions, document all processes', status: 'mitigating' },
      { id: 'r3', risk: 'System access delays', likelihood: 'low', impact: 'high', mitigation: 'Early coordination with govt IT, backup access plan', status: 'monitoring' },
      { id: 'r4', risk: 'Staff availability conflicts', likelihood: 'low', impact: 'medium', mitigation: 'Maintain bench depth, cross-train team members', status: 'accepted' },
    ];

    // Option Years
    const OPTION_YEARS = [
      { year: 'Base Year', start: 'Mar 1, 2026', end: 'Feb 28, 2027', value: 8500000, status: 'active' },
      { year: 'Option 1', start: 'Mar 1, 2027', end: 'Feb 29, 2028', value: 8750000, status: 'planned' },
      { year: 'Option 2', start: 'Mar 1, 2028', end: 'Feb 28, 2029', value: 9000000, status: 'planned' },
      { year: 'Option 3', start: 'Mar 1, 2029', end: 'Feb 28, 2030', value: 9250000, status: 'planned' },
      { year: 'Option 4', start: 'Mar 1, 2030', end: 'Feb 28, 2031', value: 9500000, status: 'planned' },
    ];

    // Government POCs
    const GOV_POCS = [
      { role: 'Contracting Officer (CO)', name: 'Col. James Mitchell', email: 'james.mitchell@dha.mil', phone: '(703) 555-0147' },
      { role: 'Contracting Officer Rep (COR)', name: 'Dr. Patricia Hayes', email: 'patricia.hayes@dha.mil', phone: '(703) 555-0234' },
      { role: 'Technical POC', name: 'Lt. Col. Robert Yang', email: 'robert.yang@dha.mil', phone: '(703) 555-0189' },
    ];

    // Status Badge Component
    const StatusBadge = ({ status }) => {
      const styles = {
        complete: 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30',
        'in-progress': 'bg-cyan-500/20 text-cyan-400 border-cyan-500/30',
        pending: 'bg-amber-500/20 text-amber-400 border-amber-500/30',
        'not-started': 'bg-slate-500/20 text-slate-400 border-slate-500/30',
        confirmed: 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30',
        upcoming: 'bg-purple-500/20 text-purple-400 border-purple-500/30',
        recurring: 'bg-indigo-500/20 text-indigo-400 border-indigo-500/30',
        active: 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30',
        planned: 'bg-slate-500/20 text-slate-400 border-slate-500/30',
        monitoring: 'bg-amber-500/20 text-amber-400 border-amber-500/30',
        mitigating: 'bg-cyan-500/20 text-cyan-400 border-cyan-500/30',

      const labels = {
        complete: '✓ Complete',
        'in-progress': '◐ In Progress',
        pending: '○ Pending',
        'not-started': '○ Not Started',
        confirmed: '✓ Confirmed',
        upcoming: '◇ Upcoming',
        recurring: '↻ Recurring',
        active: '● Active',
        planned: '○ Planned',
        monitoring: '⚠ Monitoring',
        mitigating: '◐ Mitigating',
        accepted: '✓ Accepted',
      };

      return (
        <span className={`text-xs px-2 py-1 rounded-full border ${styles[status] || styles.pending}`}>
          {labels[status] || status}
        </span>
      );
    };

    // Main Component
    const PostAwardTransition = () => {
      const [activeTab, setActiveTab] = useState('overview');

      // Calculate progress
      const checklistComplete = TRANSITION_CHECKLIST.filter(c => c.status === 'complete').length;
      const checklistTotal = TRANSITION_CHECKLIST.length;
      const checklistPercent = Math.round((checklistComplete / checklistTotal) * 100);

      const personnelConfirmed = KEY_PERSONNEL.filter(p => p.status === 'confirmed').length;
      const personnelTotal = KEY_PERSONNEL.length;

      return (
        <div className="min-h-screen bg-[#00050F] text-white p-6">
          {/* Header */}
          <div className="max-w-7xl mx-auto mb-6">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-4">
                <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-purple-400 to-indigo-500 flex items-center justify-center shadow-lg shadow-purple-500/30">
                  <Icon name="arrow" className="w-7 h-7 text-white" />
                </div>
                <div>
                  <h1 className="text-2xl font-bold">M14: Post-Award Transition</h1>
                  <p className="text-slate-400 text-sm">DHA Healthcare Data Platform • FA8052-26-C-0001</p>
                </div>
              </div>
              
              {/* Transition Progress */}
              <div className="flex items-center gap-4">
                <div className="text-right">
                  <div className="text-sm text-slate-400">Transition Progress</div>
                  <div className="text-2xl font-bold font-mono text-cyan-400">{checklistPercent}%</div>
                </div>
                <div className="w-24 h-24 relative">
                  <svg className="w-24 h-24 transform -rotate-90">
                    <circle cx="48" cy="48" r="40" stroke="rgba(100,116,139,0.3)" strokeWidth="8" fill="none" />
                    <circle 
                      cx="48" cy="48" r="40" 
                      stroke="#00E5FA"
                      strokeWidth="8" 
                      fill="none"
                      strokeDasharray={`${(checklistPercent / 100) * 251} 251`}
                      strokeLinecap="round"
                    />
                  </svg>
                </div>
              </div>
            </div>
          </div>

          <div className="max-w-7xl mx-auto">
            {/* Quick Stats */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
              <div className="glass-card rounded-xl p-4 animate-fade-up" style={{ animationDelay: '0ms' }}>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-emerald-500/20 flex items-center justify-center">
                    <Icon name="clipboard" className="w-5 h-5 text-emerald-400" />
                  </div>
                  <div>
                    <div className="text-2xl font-bold font-mono text-emerald-400">{checklistComplete}/{checklistTotal}</div>
                    <div className="text-xs text-slate-500">Checklist Items</div>
                  </div>
                </div>
              </div>
              
              <div className="glass-card rounded-xl p-4 animate-fade-up" style={{ animationDelay: '50ms' }}>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-cyan-500/20 flex items-center justify-center">
                    <Icon name="users" className="w-5 h-5 text-cyan-400" />
                  </div>
                  <div>
                    <div className="text-2xl font-bold font-mono text-cyan-400">{personnelConfirmed}/{personnelTotal}</div>
                    <div className="text-xs text-slate-500">Personnel Confirmed</div>
                  </div>
                </div>
              </div>
              
              <div className="glass-card rounded-xl p-4 animate-fade-up" style={{ animationDelay: '100ms' }}>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-purple-500/20 flex items-center justify-center">
                    <Icon name="calendar" className="w-5 h-5 text-purple-400" />
                  </div>
                  <div>
                    <div className="text-2xl font-bold font-mono text-purple-400">14</div>
                    <div className="text-xs text-slate-500">Days to POP Start</div>
                  </div>
                </div>
              </div>
              
              <div className="glass-card rounded-xl p-4 animate-fade-up" style={{ animationDelay: '150ms' }}>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-amber-500/20 flex items-center justify-center">
                    <Icon name="alert" className="w-5 h-5 text-amber-400" />
                  </div>
                  <div>
                    <div className="text-2xl font-bold font-mono text-amber-400">{RISKS.filter(r => r.status === 'monitoring').length}</div>
                    <div className="text-xs text-slate-500">Active Risks</div>
                  </div>
                </div>
              </div>
            </div>

            {/* Main Content Grid */}
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
              {/* Transition Checklist */}
              <div className="lg:col-span-2 glass-card rounded-2xl p-6">
                <div className="flex items-center gap-3 mb-4">
                  <div className="w-10 h-10 rounded-lg bg-cyan-500/20 flex items-center justify-center">
                    <Icon name="clipboard" className="w-5 h-5 text-cyan-400" />
                  </div>
                  <div>
                    <h2 className="text-lg font-semibold">Transition Checklist</h2>
                    <p className="text-xs text-slate-500">Kickoff → Staffing → Clearances → Facilities</p>

                </div>
                
                {/* Progress Bar */}
                <div className="h-2 bg-slate-800 rounded-full mb-6 overflow-hidden">
                  <div className="h-full bg-gradient-to-r from-cyan-500 to-emerald-500 animate-progress" style={{ width: `${checklistPercent}%` }} />
                </div>
                
                {/* Checklist by Category */}
                <div className="space-y-4 max-h-[400px] overflow-y-auto scrollbar-thin">
                  {['Kickoff', 'Staffing', 'Clearances', 'Facilities', 'Admin'].map(category => {
                    const items = TRANSITION_CHECKLIST.filter(c => c.category === category);
                    if (items.length === 0) return null;
                    
                    return (
                      <div key={category}>
                        <div className="text-xs text-slate-500 uppercase tracking-wider mb-2">{category}</div>
                        <div className="space-y-2">
                          {items.map((item, idx) => (
                            <div 
                              key={item.id}
                              className={`flex items-center justify-between p-3 rounded-lg animate-slide-in ${
                                item.status === 'complete' ? 'bg-emerald-500/5 border border-emerald-500/20' :
                                item.status === 'in-progress' ? 'bg-cyan-500/5 border border-cyan-500/20' :
                                'bg-slate-800/30 border border-slate-700/50'
                              }`}
                              style={{ animationDelay: `${idx * 50}ms` }}
                            >
                              <div className="flex items-center gap-3">
                                <div className={`w-6 h-6 rounded-full flex items-center justify-center ${
                                  item.status === 'complete' ? 'bg-emerald-500' :
                                  item.status === 'in-progress' ? 'bg-cyan-500/30 border-2 border-cyan-500' :
                                  'border-2 border-slate-600'
                                }`}>
                                  {item.status === 'complete' && <Icon name="check" className="w-3 h-3 text-white" />}
                                  {item.status === 'in-progress' && <div className="w-2 h-2 rounded-full bg-cyan-500" />}
                                </div>
                                <span className={`text-sm ${item.status === 'complete' ? 'text-slate-400' : 'text-white'}`}>
                                  {item.item}
                                </span>
                              </div>
                              <div className="flex items-center gap-3">
                                <span className="text-xs text-slate-500 font-mono">{item.dueDate}</span>
                                <StatusBadge status={item.status} />
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Government POCs */}
              <div className="glass-card rounded-2xl p-6">
                <div className="flex items-center gap-3 mb-4">
                  <div className="w-10 h-10 rounded-lg bg-purple-500/20 flex items-center justify-center">
                    <Icon name="building" className="w-5 h-5 text-purple-400" />
                  </div>
                  <div>
                    <h2 className="text-lg font-semibold">Government POCs</h2>
                    <p className="text-xs text-slate-500">Key contacts</p>
                  </div>
                </div>
                
                <div className="space-y-4">
                  {GOV_POCS.map((poc, idx) => (
                    <div key={poc.role} className="p-4 bg-slate-800/30 rounded-xl animate-fade-up" style={{ animationDelay: `${idx * 100}ms` }}>
                      <div className="text-xs text-purple-400 mb-1">{poc.role}</div>
                      <div className="font-semibold text-white mb-2">{poc.name}</div>
                      <div className="space-y-1">
                        <div className="flex items-center gap-2 text-xs text-slate-400">
                          <Icon name="mail" className="w-3 h-3" />
                          <span>{poc.email}</span>
                        </div>
                        <div className="flex items-center gap-2 text-xs text-slate-400">
                          <Icon name="phone" className="w-3 h-3" />
                          <span>{poc.phone}</span>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Key Personnel */}
            <div className="glass-card rounded-2xl p-6 mb-6">
              <div className="flex items-center justify-between mb-4">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-cyan-500/20 flex items-center justify-center">
                    <Icon name="users" className="w-5 h-5 text-cyan-400" />
                  </div>
                  <div>
                    <h2 className="text-lg font-semibold">Key Personnel Tracker</h2>
                    <p className="text-xs text-slate-500">{personnelConfirmed} of {personnelTotal} confirmed</p>
                  </div>
                </div>
              </div>
              
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="text-left text-xs text-slate-500 border-b border-slate-800">
                      <th className="pb-3 font-medium">Name</th>
                      <th className="pb-3 font-medium">Role</th>
                      <th className="pb-3 font-medium">Labor Category</th>
                      <th className="pb-3 font-medium">Clearance</th>
                      <th className="pb-3 font-medium">Start Date</th>
                      <th className="pb-3 font-medium">Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    {KEY_PERSONNEL.map((person, idx) => (
                      <tr 
                        key={person.id} 
                        className="border-b border-slate-800/50 animate-slide-in"
                        style={{ animationDelay: `${idx * 50}ms` }}
                      >
                        <td className="py-3 font-medium text-white">{person.name}</td>
                        <td className="py-3 text-slate-400">{person.role}</td>
                        <td className="py-3 text-xs font-mono text-cyan-400">{person.laborCat}</td>
                        <td className="py-3">
                          <span className={`text-xs px-2 py-1 rounded ${
                            person.clearance.includes('SCI') ? 'bg-purple-500/20 text-purple-400' :
                            person.clearance.includes('Top Secret') ? 'bg-amber-500/20 text-amber-400' :
                            'bg-emerald-500/20 text-emerald-400'
                          }`}>
                            {person.clearance}
                          </span>
                        </td>
                        <td className="py-3 text-sm font-mono text-slate-400">{person.startDate}</td>
                        <td className="py-3"><StatusBadge status={person.status} /></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Timeline & Risks Row */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
              {/* Milestone Timeline */}
              <div className="glass-card rounded-2xl p-6">
                <div className="flex items-center gap-3 mb-4">
                  <div className="w-10 h-10 rounded-lg bg-amber-500/20 flex items-center justify-center">
                    <Icon name="flag" className="w-5 h-5 text-amber-400" />
                  </div>
                  <div>
                    <h2 className="text-lg font-semibold">Contract Milestones</h2>
                    <p className="text-xs text-slate-500">Key dates and deliverables</p>
                  </div>
                </div>
                
                <div className="relative pl-4 border-l-2 border-slate-700 space-y-4">
                  {MILESTONES.map((ms, idx) => (
                    <div 
                      key={ms.id}
                      className="relative animate-fade-up"
                      style={{ animationDelay: `${idx * 50}ms` }}
                    >
                      <div className={`absolute -left-[21px] w-4 h-4 rounded-full border-2 ${
                        ms.status === 'complete' ? 'bg-emerald-500 border-emerald-500' :
                        'bg-slate-900 border-cyan-500'
                      }`} />
                      <div className="ml-4 p-3 bg-slate-800/30 rounded-lg">
                        <div className="flex items-center justify-between mb-1">
                          <span className="font-medium text-white">{ms.name}</span>
                          <span className="text-xs font-mono text-slate-400">{ms.date}</span>
                        </div>
                        <StatusBadge status={ms.status} />
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Risk Register */}
              <div className="glass-card rounded-2xl p-6">
                <div className="flex items-center gap-3 mb-4">
                  <div className="w-10 h-10 rounded-lg bg-rose-500/20 flex items-center justify-center">
                    <Icon name="alert" className="w-5 h-5 text-rose-400" />
                  </div>
                  <div>
                    <h2 className="text-lg font-semibold">Transition Risk Register</h2>
                    <p className="text-xs text-slate-500">{RISKS.length} identified risks</p>
                  </div>
                </div>
                
                <div className="space-y-3 max-h-[300px] overflow-y-auto scrollbar-thin">
                  {RISKS.map((risk, idx) => (
                    <div 
                      key={risk.id}
                      className="p-3 bg-slate-800/30 rounded-lg border border-slate-700/50 animate-slide-in"
                      style={{ animationDelay: `${idx * 50}ms` }}
                    >
                      <div className="flex items-start justify-between mb-2">
                        <span className="font-medium text-white text-sm">{risk.risk}</span>
                        <StatusBadge status={risk.status} />
                      </div>
                      <div className="flex items-center gap-4 text-xs mb-2">
                        <span className={`px-2 py-0.5 rounded ${
                          risk.likelihood === 'high' ? 'bg-rose-500/20 text-rose-400' :
                          risk.likelihood === 'medium' ? 'bg-amber-500/20 text-amber-400' :
                          'bg-emerald-500/20 text-emerald-400'
                        }`}>L: {risk.likelihood}</span>
                        <span className={`px-2 py-0.5 rounded ${
                          risk.impact === 'high' ? 'bg-rose-500/20 text-rose-400' :
                          risk.impact === 'medium' ? 'bg-amber-500/20 text-amber-400' :
                          'bg-emerald-500/20 text-emerald-400'
                        }`}>I: {risk.impact}</span>
                      </div>
                      <div className="text-xs text-slate-500">
                        <span className="text-slate-400">Mitigation:</span> {risk.mitigation}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* CPAR Strategy & Option Years */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
              {/* CPAR Strategy */}
              <div className="glass-card rounded-2xl p-6">
                <div className="flex items-center gap-3 mb-4">
                  <div className="w-10 h-10 rounded-lg bg-emerald-500/20 flex items-center justify-center">
                    <Icon name="star" className="w-5 h-5 text-emerald-400" />
                  </div>
                  <div>
                    <h2 className="text-lg font-semibold">CPAR Strategy</h2>
                    <p className="text-xs text-slate-500">Contractor Performance Assessment</p>
                  </div>
                </div>
                
                <div className="space-y-3">
                  <div className="p-4 bg-emerald-500/5 border border-emerald-500/20 rounded-xl">
                    <div className="flex items-center gap-2 mb-2">
                      <div className="w-2 h-2 rounded-full bg-emerald-500" />
                      <span className="text-sm font-medium text-emerald-400">Target Rating: Exceptional</span>
                    </div>
                    <p className="text-xs text-slate-400">Focus on exceeding all deliverable timelines and quality metrics</p>
                  </div>
                  
                  <div className="grid grid-cols-2 gap-3">
                    <div className="p-3 bg-slate-800/30 rounded-lg">
                      <div className="text-xs text-slate-500 mb-1">Quality</div>
                      <div className="text-sm font-medium text-cyan-400">Zero defect tolerance</div>
                    </div>
                    <div className="p-3 bg-slate-800/30 rounded-lg">
                      <div className="text-xs text-slate-500 mb-1">Schedule</div>
                      <div className="text-sm font-medium text-cyan-400">5-day early delivery</div>
                    </div>
                    <div className="p-3 bg-slate-800/30 rounded-lg">
                      <div className="text-xs text-slate-500 mb-1">Cost Control</div>
                      <div className="text-sm font-medium text-cyan-400">Under budget target</div>
                    </div>
                    <div className="p-3 bg-slate-800/30 rounded-lg">
                      <div className="text-xs text-slate-500 mb-1">Communication</div>
                      <div className="text-sm font-medium text-cyan-400">Weekly status reports</div>
                    </div>
                  </div>
                </div>
              </div>

              {/* Option Year Planning */}
              <div className="glass-card rounded-2xl p-6">
                <div className="flex items-center gap-3 mb-4">
                  <div className="w-10 h-10 rounded-lg bg-indigo-500/20 flex items-center justify-center">
                    <Icon name="calendar" className="w-5 h-5 text-indigo-400" />
                  </div>
                  <div>
                    <h2 className="text-lg font-semibold">Option Year Calendar</h2>
                    <p className="text-xs text-slate-500">5-year contract value: $45M</p>
                  </div>
                </div>
                
                <div className="space-y-2">
                  {OPTION_YEARS.map((year, idx) => (
                    <div 
                      key={year.year}
                      className={`flex items-center justify-between p-3 rounded-lg animate-slide-in ${
                        year.status === 'active' ? 'bg-emerald-500/10 border border-emerald-500/30' : 'bg-slate-800/30'
                      }`}
                      style={{ animationDelay: `${idx * 50}ms` }}
                    >
                      <div>
                        <div className="font-medium text-white">{year.year}</div>
                        <div className="text-xs text-slate-500">{year.start} - {year.end}</div>
                      </div>
                      <div className="text-right">
                        <div className="font-mono text-cyan-400">${(year.value / 1000000).toFixed(2)}M</div>
                        <StatusBadge status={year.status} />
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Handoff Banner */}
            <div className="glass-card rounded-2xl p-6 border-2 border-purple-500/30 animate-glow">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-purple-400 to-indigo-500 flex items-center justify-center">
                    <Icon name="refresh" className="w-6 h-6 text-white" />
                  </div>
                  <div>
                    <h3 className="text-lg font-semibold text-white">Capture → Delivery Handoff</h3>
                    <p className="text-sm text-slate-400">All capture documentation transferred to delivery team</p>
                  </div>
                </div>
                <div className="flex items-center gap-4">
                  <div className="text-right">
                    <div className="text-xs text-slate-500">From</div>
                    <div className="text-sm font-medium text-purple-400">Jennifer Park (CAP)</div>
                  </div>
                  <Icon name="arrow" className="w-6 h-6 text-cyan-400" />
                  <div className="text-left">
                    <div className="text-xs text-slate-500">To</div>
                    <div className="text-sm font-medium text-cyan-400">Dr. Sarah Chen (PM)</div>
                  </div>
                  <button className="ml-4 px-4 py-2 bg-purple-500/20 border border-purple-500/50 text-purple-400 rounded-lg hover:bg-purple-500/30 transition-all text-sm">
                    View Handoff Docs
                  </button>
                </div>
              </div>
            </div>
          </div>

          {/* AI Disclaimer Footer */}
          <div className="max-w-7xl mx-auto mt-8 text-center">
            <p className="text-xs text-slate-600">AI GENERATED - REQUIRES HUMAN REVIEW • MissionPulse v2.0 © 2026 Mission Meets Tech</p>
          </div>
        </div>
      );
    };

    ReactDOM.render(<PostAwardTransition />, document.getElementById('root'));
  </script>
  <script src="render-api-client.js"></script>
  <script src="ai-chat-widget.js"></script>
</body>
</html>
