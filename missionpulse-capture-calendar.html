<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capture Calendar | MissionPulse</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass { background: rgba(0,229,250,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
    .glass-card { background: rgba(15,23,42,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(51,65,85,0.5); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    const DEMO_EVENTS = [
      { id: '1', title: 'DHA EHR - Final Submission', type: 'deadline', date: '2025-02-28', opportunity: 'DHA Electronic Health Records', color: 'red', isMilestone: true },
      { id: '2', title: 'VA Claims - Questions Due', type: 'deadline', date: '2025-02-15', opportunity: 'VA Claims Processing AI', color: 'amber' },
      { id: '3', title: 'CMS Analytics - Pink Team', type: 'review', date: '2025-02-12', opportunity: 'CMS Data Analytics', color: 'pink' },
      { id: '4', title: 'IHS Telehealth - Kickoff Call', type: 'meeting', date: '2025-02-10', opportunity: 'IHS Telehealth Expansion', color: 'cyan' },
      { id: '5', title: 'DHA EHR - Red Team Review', type: 'review', date: '2025-02-20', opportunity: 'DHA Electronic Health Records', color: 'red' },
      { id: '6', title: 'Partner Meeting - CloudSecure', type: 'meeting', date: '2025-02-08', opportunity: 'Multiple', color: 'purple' },
      { id: '7', title: 'VA Claims - Draft Due', type: 'deadline', date: '2025-03-01', opportunity: 'VA Claims Processing AI', color: 'amber' },
      { id: '8', title: 'Compliance Review - All', type: 'review', date: '2025-02-18', opportunity: 'All Active', color: 'emerald' },
      { id: '9', title: 'DHA EHR - Gold Team', type: 'review', date: '2025-02-25', opportunity: 'DHA Electronic Health Records', color: 'yellow' },
      { id: '10', title: 'Weekly Capture Standup', type: 'recurring', date: '2025-02-03', opportunity: 'All Active', color: 'slate', recurring: 'weekly' },
      { id: '11', title: 'Weekly Capture Standup', type: 'recurring', date: '2025-02-10', opportunity: 'All Active', color: 'slate', recurring: 'weekly' },
      { id: '12', title: 'Weekly Capture Standup', type: 'recurring', date: '2025-02-17', opportunity: 'All Active', color: 'slate', recurring: 'weekly' },
      { id: '13', title: 'Weekly Capture Standup', type: 'recurring', date: '2025-02-24', opportunity: 'All Active', color: 'slate', recurring: 'weekly' }
    ];

    const Icons = {
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
      calendar: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
      chevronLeft: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>,
      chevronRight: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>,
      plus: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>,
      shield: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
      x: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>,
      clock: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6l4 2" /></svg>,
      flag: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9" /></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    function CaptureCalendar() {
      const [events, setEvents] = useState(DEMO_EVENTS);
      const [currentDate, setCurrentDate] = useState(new Date(2025, 1, 1)); // Feb 2025
      const [selectedDate, setSelectedDate] = useState(null);
      const [selectedEvent, setSelectedEvent] = useState(null);
      const [viewMode, setViewMode] = useState('month');

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      const firstDayOfMonth = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrevMonth = new Date(year, month, 0).getDate();

      const prevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
      const nextMonth = () => setCurrentDate(new Date(year, month + 1, 1));
      const goToToday = () => setCurrentDate(new Date());

      const getEventsForDate = (day) => {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        return events.filter(e => e.date === dateStr);
      };

      const calendarDays = useMemo(() => {
        const days = [];
        
        // Previous month days
        for (let i = firstDayOfMonth - 1; i >= 0; i--) {
          days.push({ day: daysInPrevMonth - i, isCurrentMonth: false, isPrev: true });
        }
        
        // Current month days
        for (let i = 1; i <= daysInMonth; i++) {
          days.push({ day: i, isCurrentMonth: true });
        }
        
        // Next month days
        const remainingDays = 42 - days.length;
        for (let i = 1; i <= remainingDays; i++) {
          days.push({ day: i, isCurrentMonth: false, isNext: true });
        }
        
        return days;
      }, [year, month, firstDayOfMonth, daysInMonth, daysInPrevMonth]);

      const todayStr = new Date().toISOString().split('T')[0];
      const isToday = (day) => {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        return dateStr === todayStr;
      };

      const upcomingEvents = events
        .filter(e => new Date(e.date) >= new Date())
        .sort((a, b) => new Date(a.date) - new Date(b.date))
        .slice(0, 5);

      const stats = {
        totalEvents: events.length,
        deadlines: events.filter(e => e.type === 'deadline').length,
        reviews: events.filter(e => e.type === 'review').length,
        meetings: events.filter(e => e.type === 'meeting').length
      };

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="p-2 rounded-lg bg-slate-800/50 hover:bg-slate-700/50 transition-colors">
                    <Icon name="home" className="w-5 h-5 text-slate-400" />
                  </a>
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-rose-500 to-pink-500 flex items-center justify-center">
                      <Icon name="calendar" className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white">Capture Calendar</h1>
                      <p className="text-sm text-slate-400">Deadlines, reviews & milestones</p>
                    </div>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <button 
                    onClick={goToToday}
                    className="px-4 py-2 bg-slate-700/50 rounded-lg text-slate-400 hover:text-white transition"
                  >
                    Today
                  </button>
                  <button className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-xl flex items-center gap-2 font-semibold hover:from-cyan-400 hover:to-teal-400 transition-all">
                    <Icon name="plus" className="w-4 h-4" /> Add Event
                  </button>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8">
            <div className="grid grid-cols-4 gap-6">
              {/* Calendar */}
              <div className="col-span-3">
                <div className="glass-card rounded-xl overflow-hidden">
                  {/* Calendar Header */}
                  <div className="p-4 border-b border-slate-700/50 flex items-center justify-between">
                    <div className="flex items-center gap-3">
                      <button onClick={prevMonth} className="p-2 rounded-lg bg-slate-800/50 hover:bg-slate-700/50 transition">
                        <Icon name="chevronLeft" className="w-5 h-5 text-slate-400" />
                      </button>
                      <h2 className="text-xl font-bold text-white min-w-[200px] text-center">
                        {MONTHS[month]} {year}
                      </h2>
                      <button onClick={nextMonth} className="p-2 rounded-lg bg-slate-800/50 hover:bg-slate-700/50 transition">
                        <Icon name="chevronRight" className="w-5 h-5 text-slate-400" />
                      </button>
                    </div>
                    <div className="flex gap-2">
                      {['month', 'week', 'list'].map(mode => (
                        <button
                          key={mode}
                          onClick={() => setViewMode(mode)}
                          className={`px-3 py-1.5 rounded-lg text-sm capitalize transition ${viewMode === mode ? 'bg-cyan-500/20 text-cyan-400' : 'text-slate-400 hover:bg-slate-700/50'}`}
                        >
                          {mode}
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* Day Headers */}
                  <div className="grid grid-cols-7 bg-slate-800/30">
                    {DAYS.map(day => (
                      <div key={day} className="p-3 text-center text-sm font-medium text-slate-400 border-b border-slate-700/50">
                        {day}
                      </div>
                    ))}
                  </div>

                  {/* Calendar Grid */}
                  <div className="grid grid-cols-7">
                    {calendarDays.map((dayObj, idx) => {
                      const dayEvents = dayObj.isCurrentMonth ? getEventsForDate(dayObj.day) : [];
                      const today = isToday(dayObj.day) && dayObj.isCurrentMonth;
                      
                      return (
                        <div 
                          key={idx}
                          onClick={() => dayObj.isCurrentMonth && setSelectedDate(dayObj.day)}
                          className={`min-h-[100px] p-2 border-b border-r border-slate-700/30 transition cursor-pointer ${
                            dayObj.isCurrentMonth ? 'hover:bg-slate-800/30' : 'bg-slate-900/30'
                          } ${selectedDate === dayObj.day && dayObj.isCurrentMonth ? 'bg-cyan-500/10' : ''}`}
                        >
                          <div className={`text-sm mb-1 ${
                            today ? 'w-7 h-7 bg-cyan-500 rounded-full flex items-center justify-center text-white font-bold' :
                            dayObj.isCurrentMonth ? 'text-slate-300' : 'text-slate-600'
                          }`}>
                            {dayObj.day}
                          </div>
                          <div className="space-y-1">
                            {dayEvents.slice(0, 3).map(event => (
                              <div 
                                key={event.id}
                                onClick={(e) => { e.stopPropagation(); setSelectedEvent(event); }}
                                className={`text-xs px-1.5 py-0.5 rounded truncate cursor-pointer transition hover:opacity-80 ${
                                  event.color === 'red' ? 'bg-red-500/30 text-red-300' :
                                  event.color === 'amber' ? 'bg-amber-500/30 text-amber-300' :
                                  event.color === 'cyan' ? 'bg-cyan-500/30 text-cyan-300' :
                                  event.color === 'pink' ? 'bg-pink-500/30 text-pink-300' :
                                  event.color === 'purple' ? 'bg-purple-500/30 text-purple-300' :
                                  event.color === 'emerald' ? 'bg-emerald-500/30 text-emerald-300' :
                                  event.color === 'yellow' ? 'bg-yellow-500/30 text-yellow-300' :
                                  'bg-slate-500/30 text-slate-300'
                                }`}
                              >
                                {event.isMilestone && '🚩 '}{event.title}
                              </div>
                            ))}
                            {dayEvents.length > 3 && (
                              <div className="text-xs text-slate-500 pl-1">+{dayEvents.length - 3} more</div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

              {/* Sidebar */}
              <div className="col-span-1 space-y-6">
                {/* Stats */}
                <div className="glass-card rounded-xl p-4">
                  <h3 className="text-sm font-semibold text-slate-400 mb-3">THIS MONTH</h3>
                  <div className="space-y-3">
                    {[
                      { label: 'Total Events', value: stats.totalEvents, color: 'cyan' },
                      { label: 'Deadlines', value: stats.deadlines, color: 'red' },
                      { label: 'Reviews', value: stats.reviews, color: 'purple' },
                      { label: 'Meetings', value: stats.meetings, color: 'emerald' }
                    ].map((stat, i) => (
                      <div key={i} className="flex items-center justify-between">
                        <span className="text-sm text-slate-400">{stat.label}</span>
                        <span className={`font-semibold text-${stat.color}-400`}>{stat.value}</span>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Upcoming Events */}
                <div className="glass-card rounded-xl p-4">
                  <h3 className="text-sm font-semibold text-slate-400 mb-3">UPCOMING</h3>
                  <div className="space-y-3">
                    {upcomingEvents.map(event => (
                      <div 
                        key={event.id}
                        onClick={() => setSelectedEvent(event)}
                        className="p-2 rounded-lg bg-slate-800/30 cursor-pointer hover:bg-slate-800/50 transition"
                      >
                        <div className="flex items-center gap-2">
                          <div className={`w-2 h-2 rounded-full bg-${event.color}-500`}></div>
                          <span className="text-sm text-white truncate flex-1">{event.title}</span>
                        </div>
                        <div className="text-xs text-slate-500 mt-1 pl-4">
                          {new Date(event.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Legend */}
                <div className="glass-card rounded-xl p-4">
                  <h3 className="text-sm font-semibold text-slate-400 mb-3">LEGEND</h3>
                  <div className="space-y-2">
                    {[
                      { color: 'red', label: 'Deadlines' },
                      { color: 'purple', label: 'Reviews' },
                      { color: 'cyan', label: 'Meetings' },
                      { color: 'emerald', label: 'Compliance' },
                      { color: 'slate', label: 'Recurring' }
                    ].map((item, i) => (
                      <div key={i} className="flex items-center gap-2">
                        <div className={`w-3 h-3 rounded bg-${item.color}-500/50`}></div>
                        <span className="text-sm text-slate-400">{item.label}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </main>

          {/* Event Detail Modal */}
          {selectedEvent && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-6" onClick={() => setSelectedEvent(null)}>
              <div className="glass-card rounded-2xl max-w-md w-full" onClick={e => e.stopPropagation()}>
                <div className="p-6 border-b border-slate-700/50">
                  <div className="flex items-start justify-between">
                    <div className="flex items-center gap-3">
                      <div className={`w-4 h-4 rounded-full bg-${selectedEvent.color}-500`}></div>
                      <div>
                        <h2 className="text-lg font-bold text-white">{selectedEvent.title}</h2>
                        <p className="text-sm text-slate-400 capitalize">{selectedEvent.type}</p>
                      </div>
                    </div>
                    <button onClick={() => setSelectedEvent(null)} className="p-2 rounded-lg bg-slate-800/50 text-slate-400 hover:text-white">
                      <Icon name="x" className="w-5 h-5" />
                    </button>
                  </div>
                </div>
                <div className="p-6 space-y-4">
                  <div className="flex items-center gap-3 text-slate-400">
                    <Icon name="calendar" className="w-5 h-5" />
                    <span>{new Date(selectedEvent.date).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</span>
                  </div>
                  <div className="flex items-center gap-3 text-slate-400">
                    <Icon name="flag" className="w-5 h-5" />
                    <span>{selectedEvent.opportunity}</span>
                  </div>
                  {selectedEvent.isMilestone && (
                    <div className="px-3 py-2 bg-amber-500/20 border border-amber-500/30 rounded-lg text-amber-400 text-sm">
                      🚩 This is a key milestone
                    </div>
                  )}
                </div>
                <div className="p-6 border-t border-slate-700/50 flex justify-end gap-3">
                  <button className="px-4 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-600 transition-colors">
                    Edit
                  </button>
                  <button className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-lg font-semibold">
                    View Opportunity
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <footer className="glass border-t border-slate-700/50 mt-12">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-2 text-slate-400 text-sm">
                <Icon name="shield" className="w-4 h-4" />
                <span>Mission Meets Tech • MissionPulse v12</span>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<CaptureCalendar />);
  </script>
</body>
</html>
