<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse M13 - Launch & ROI Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes checkBounce { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(0, 229, 250, 0.3); } 50% { box-shadow: 0 0 40px rgba(0, 229, 250, 0.6); } }
    @keyframes readyGlow { 0%, 100% { box-shadow: 0 0 30px rgba(16, 185, 129, 0.4); } 50% { box-shadow: 0 0 60px rgba(16, 185, 129, 0.8); } }
    @keyframes barFill { from { width: 0%; } }
    @keyframes confetti { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    @keyframes rocketLaunch { 0% { transform: translateY(0); } 100% { transform: translateY(-150vh) rotate(5deg); } }
    
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-spin { animation: spin 1s linear infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out forwards; }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
    .animate-check { animation: checkBounce 0.4s ease-out forwards; }
    .animate-glow { animation: glow 2s ease-in-out infinite; }
    .animate-readyGlow { animation: readyGlow 1.5s ease-in-out infinite; }
    .animate-barFill { animation: barFill 1s ease-out forwards; }
    
    .confetti-piece { position: fixed; animation: confetti 3s ease-out forwards; pointer-events: none; z-index: 1000; }
    .rocket-launch { animation: rocketLaunch 2s ease-in forwards; }
    
    .glass-card {
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(15, 23, 42, 0.7) 100%);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 229, 250, 0.2);
    }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0F172A; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, createContext, useContext, useCallback } = React;

    // ============================================================================
    // PRODUCTION CONFIG
    // ============================================================================
    const CONFIG = {
      API_BASE: 'https://missionpulse-api.onrender.com',
      DASHBOARD_URL: 'https://missionpulse-frontend.netlify.app/',
      MODULE_ID: 'M13',
      MODULE_NAME: 'Launch & ROI Dashboard',
      VERSION: '12.0.1',
      FEATURES: {
        API_ENABLED: true,
        DEMO_MODE: true
      }
    };

    // ============================================================================
    // TOAST CONTEXT & PROVIDER
    // ============================================================================
    const ToastContext = createContext(null);

    const ToastProvider = ({ children }) => {
      const [toasts, setToasts] = useState([]);
      
      const addToast = useCallback((message, type = 'info', duration = 4000) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), duration);
      }, []);

      return (
        <ToastContext.Provider value={{ addToast }}>
          {children}
          <div className="fixed top-4 right-4 z-50 space-y-2">
            {toasts.map(toast => (
              <div 
                key={toast.id}
                className={`px-4 py-3 rounded-lg shadow-lg animate-slideIn flex items-center gap-2 ${
                  toast.type === 'success' ? 'bg-emerald-500/90 text-white' :
                  toast.type === 'error' ? 'bg-red-500/90 text-white' :
                  toast.type === 'warning' ? 'bg-amber-500/90 text-white' :
                  'bg-slate-700/90 text-white'
                }`}
              >
                <span className="text-sm font-medium">{toast.message}</span>
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    };

    const useToast = () => {
      const context = useContext(ToastContext);
      if (!context) throw new Error('useToast must be used within ToastProvider');
      return context;
    };

    // ============================================================================
    // ERROR BOUNDARY
    // ============================================================================
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true };
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen bg-[#00050F] flex items-center justify-center p-6">
              <div className="bg-slate-800/50 border border-red-500/30 rounded-xl p-8 max-w-md text-center">
                <h2 className="text-xl font-bold text-white mb-2">Something went wrong</h2>
                <p className="text-slate-400 mb-4">Please refresh the page.</p>
                <button onClick={() => window.location.reload()} className="px-4 py-2 bg-cyan-500 text-white rounded-lg">
                  Refresh
                </button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // ============================================================================
    // LOADING SPINNER & CONNECTION STATUS
    // ============================================================================
    const LoadingSpinner = ({ size = 'md', message }) => {
      const sizes = { sm: 'w-4 h-4', md: 'w-8 h-8', lg: 'w-12 h-12' };
      return (
        <div className="flex flex-col items-center justify-center gap-3">
          <div className={`${sizes[size]} border-2 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin`} />
          {message && <span className="text-slate-400 text-sm">{message}</span>}
        </div>
      );
    };

    const ConnectionStatus = ({ isConnected }) => (
      <div className="flex items-center gap-2">
        <div className={`w-2 h-2 rounded-full ${isConnected ? 'bg-emerald-400' : 'bg-red-400'} animate-pulse`} />
        <span className="text-xs text-slate-500">{isConnected ? 'Connected' : 'Offline'}</span>
      </div>
    );

    // ============================================================================
    // ICONS
    // ============================================================================
    const Icons = {
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>,
      rocket: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
      shield: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
      clock: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6l4 2" /></svg>,
      dollar: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      trending: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>,
      chart: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
    };

    const Icon = ({ name, className = "w-5 h-5" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    // ============================================================================
    // HOME BUTTON
    // ============================================================================
    const HomeButton = () => (
      <button
        onClick={() => window.location.href = CONFIG.DASHBOARD_URL}
        className="flex items-center gap-2 px-3 py-1.5 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg transition-colors group"
      >
        <Icon name="home" className="w-4 h-4 text-slate-400 group-hover:text-cyan-400" />
        <span className="text-sm text-slate-400 group-hover:text-white">Dashboard</span>
      </button>
    );

    // ============================================================================
    // DATA
    // ============================================================================
    const CHECKLIST_ITEMS = [
      { id: 1, label: 'Technical Volume Complete', section: 'L.4', reviewer: 'Sarah Chen, SA' },
      { id: 2, label: 'Management Volume Finalized', section: 'L.5', reviewer: 'Marcus Williams, PM' },
      { id: 3, label: 'Past Performance Validated', section: 'L.6', reviewer: 'Jennifer Park, QA' },
      { id: 4, label: 'Cost/Price Volume Locked', section: 'L.7', reviewer: 'David Kim, FIN' },
      { id: 5, label: 'Compliance Matrix 100%', section: 'M.1-M.8', reviewer: 'AI Compliance Agent' },
      { id: 6, label: 'Executive Summary Approved', section: 'L.1', reviewer: 'CEO - Mary Womack' },
      { id: 7, label: 'CUI Marking Verified', section: 'All', reviewer: 'Security Officer' },
      { id: 8, label: 'Final PDF Generated', section: 'Export', reviewer: 'System' },
    ];

    const TIMELINE_DATA = [
      { phase: 'RFP Analysis', traditional: 5, ai: 1 },
      { phase: 'Compliance Matrix', traditional: 7, ai: 2 },
      { phase: 'Technical Writing', traditional: 15, ai: 6 },
      { phase: 'Pricing/BOE', traditional: 8, ai: 3 },
      { phase: 'Review Cycles', traditional: 7, ai: 4 },
      { phase: 'Final Production', traditional: 3, ai: 2 },
    ];

    // ============================================================================
    // GLOBAL FOOTER
    // ============================================================================
    const GlobalFooter = () => (
      <footer className="fixed bottom-0 left-0 right-0 bg-slate-900/95 border-t border-slate-700/50 px-6 py-2 backdrop-blur-sm z-40">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-4">
            <span className="text-xs text-slate-500">
              MissionPulse {CONFIG.MODULE_ID} • {CONFIG.MODULE_NAME} v{CONFIG.VERSION}
            </span>
            <ConnectionStatus isConnected={true} />
          </div>
          <span className="text-xs text-amber-400 font-medium px-2 py-1 bg-amber-500/10 rounded border border-amber-500/20">
            ⚠️ AI GENERATED - REQUIRES HUMAN REVIEW
          </span>
        </div>
      </footer>
    );

    // ============================================================================
    // MAIN COMPONENT
    // ============================================================================
    const LaunchAndROI = () => {
      const [stage, setStage] = useState('checklist');
      const [checkedItems, setCheckedItems] = useState([]);
      const [showROI, setShowROI] = useState(false);
      const [isLoading, setIsLoading] = useState(true);
      const { addToast } = useToast();

      useEffect(() => {
        const timer = setTimeout(() => {
          setIsLoading(false);
        }, 600);
        return () => clearTimeout(timer);
      }, []);

      const toggleItem = (id) => {
        setCheckedItems(prev => 
          prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]
        );
      };

      const allChecked = checkedItems.length === CHECKLIST_ITEMS.length;
      const progress = (checkedItems.length / CHECKLIST_ITEMS.length) * 100;

      const totalTraditional = TIMELINE_DATA.reduce((sum, d) => sum + d.traditional, 0);
      const totalAI = TIMELINE_DATA.reduce((sum, d) => sum + d.ai, 0);
      const daysSaved = totalTraditional - totalAI;

      const handleLaunch = () => {
        setStage('launched');
        setShowROI(true);
        addToast('🚀 Proposal submitted successfully!', 'success');
      };

      if (isLoading) {
        return (
          <div className="min-h-screen bg-[#00050F] flex items-center justify-center">
            <LoadingSpinner size="lg" message="Loading launch dashboard..." />
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#00050F] pb-16">
          {/* Header */}
          <header className="bg-slate-900/80 border-b border-slate-700/50 px-6 py-4">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-4">
                <HomeButton />
                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-500 flex items-center justify-center">
                  <Icon name="rocket" className="w-6 h-6 text-white" />
                </div>
                <div>
                  <h1 className="text-xl font-bold text-white">Launch & ROI Dashboard</h1>
                  <p className="text-sm text-slate-400">Pre-submission checklist & AI savings analysis</p>
                </div>
              </div>
              <div className="text-right">
                <div className="text-xs text-slate-500">Completion</div>
                <div className="text-2xl font-bold text-cyan-400">{Math.round(progress)}%</div>
              </div>
            </div>
          </header>

          <div className="max-w-6xl mx-auto px-6 py-6">
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              {/* Checklist */}
              <div className="glass-card rounded-xl p-6">
                <h2 className="text-lg font-semibold text-white mb-4 flex items-center gap-2">
                  <Icon name="shield" className="w-5 h-5 text-cyan-400" />
                  Pre-Submission Checklist
                </h2>
                <div className="space-y-3">
                  {CHECKLIST_ITEMS.map((item, index) => (
                    <div 
                      key={item.id}
                      onClick={() => toggleItem(item.id)}
                      className={`flex items-center gap-3 p-3 rounded-lg cursor-pointer transition-all animate-fadeIn ${
                        checkedItems.includes(item.id) 
                          ? 'bg-emerald-500/10 border border-emerald-500/30' 
                          : 'bg-slate-800/50 hover:bg-slate-800'
                      }`}
                      style={{ animationDelay: `${index * 50}ms` }}
                    >
                      <div className={`w-6 h-6 rounded-full flex items-center justify-center transition-all ${
                        checkedItems.includes(item.id)
                          ? 'bg-emerald-500'
                          : 'border-2 border-slate-600'
                      }`}>
                        {checkedItems.includes(item.id) && (
                          <Icon name="check" className="w-4 h-4 text-white animate-check" />
                        )}
                      </div>
                      <div className="flex-1">
                        <div className={`font-medium ${checkedItems.includes(item.id) ? 'text-emerald-400' : 'text-white'}`}>
                          {item.label}
                        </div>
                        <div className="text-xs text-slate-500">{item.reviewer} • Section {item.section}</div>
                      </div>
                    </div>
                  ))}
                </div>

                {/* Progress Bar */}
                <div className="mt-6">
                  <div className="h-2 bg-slate-800 rounded-full overflow-hidden">
                    <div 
                      className="h-full bg-gradient-to-r from-cyan-500 to-emerald-500 transition-all duration-500"
                      style={{ width: `${progress}%` }}
                    />
                  </div>
                  <div className="flex justify-between mt-2 text-xs text-slate-500">
                    <span>{checkedItems.length} of {CHECKLIST_ITEMS.length} complete</span>
                    <span>{allChecked ? '✅ Ready!' : 'In Progress'}</span>
                  </div>
                </div>

                {/* Launch Button */}
                {allChecked && stage === 'checklist' && (
                  <button
                    onClick={handleLaunch}
                    className="mt-6 w-full py-4 bg-gradient-to-r from-emerald-500 to-teal-500 rounded-xl text-white font-bold text-lg hover:from-emerald-400 hover:to-teal-400 transition-all animate-readyGlow"
                  >
                    🚀 Launch Proposal
                  </button>
                )}
              </div>

              {/* ROI Analysis */}
              <div className="glass-card rounded-xl p-6">
                <h2 className="text-lg font-semibold text-white mb-4 flex items-center gap-2">
                  <Icon name="chart" className="w-5 h-5 text-cyan-400" />
                  AI ROI Analysis
                </h2>

                {/* Summary Stats */}
                <div className="grid grid-cols-2 gap-4 mb-6">
                  <div className="bg-cyan-500/10 border border-cyan-500/30 rounded-xl p-4 text-center">
                    <div className="text-3xl font-bold text-cyan-400">{daysSaved}</div>
                    <div className="text-xs text-slate-400">Days Saved</div>
                  </div>
                  <div className="bg-emerald-500/10 border border-emerald-500/30 rounded-xl p-4 text-center">
                    <div className="text-3xl font-bold text-emerald-400">${(daysSaved * 2500).toLocaleString()}</div>
                    <div className="text-xs text-slate-400">Cost Savings</div>
                  </div>
                </div>

                {/* Timeline Comparison */}
                <h3 className="text-sm font-semibold text-slate-400 mb-3">Timeline Comparison (Days)</h3>
                <div className="space-y-4">
                  {TIMELINE_DATA.map((item, index) => (
                    <div key={item.phase} className="animate-fadeIn" style={{ animationDelay: `${index * 100}ms` }}>
                      <div className="flex justify-between items-center mb-1">
                        <span className="text-sm text-slate-300">{item.phase}</span>
                        <span className="text-xs text-slate-500 font-mono">{item.ai}d vs {item.traditional}d</span>
                      </div>
                      <div className="relative h-6 bg-slate-800/50 rounded overflow-hidden">
                        <div 
                          className="absolute top-0 left-0 h-full bg-red-500/30 border-r-2 border-red-400"
                          style={{ width: `${(item.traditional / 20) * 100}%` }}
                        />
                        <div 
                          className="absolute top-0 left-0 h-full bg-gradient-to-r from-cyan-500 to-teal-500 animate-barFill"
                          style={{ width: `${(item.ai / 20) * 100}%` }}
                        />
                      </div>
                    </div>
                  ))}
                </div>

                {/* Legend */}
                <div className="flex items-center gap-6 mt-4 text-xs">
                  <div className="flex items-center gap-2">
                    <div className="w-3 h-3 bg-gradient-to-r from-cyan-500 to-teal-500 rounded" />
                    <span className="text-slate-400">AI-Assisted ({totalAI} days)</span>
                  </div>
                  <div className="flex items-center gap-2">
                    <div className="w-3 h-3 bg-red-500/50 rounded" />
                    <span className="text-slate-400">Traditional ({totalTraditional} days)</span>
                  </div>
                </div>

                {showROI && (
                  <div className="mt-6 p-4 bg-emerald-500/10 border border-emerald-500/30 rounded-xl animate-fadeIn">
                    <div className="flex items-center gap-2 text-emerald-400 font-semibold mb-2">
                      <Icon name="trending" className="w-5 h-5" />
                      Proposal Submitted!
                    </div>
                    <p className="text-sm text-slate-300">
                      Total time: {totalAI} days • {Math.round((1 - totalAI/totalTraditional) * 100)}% faster than traditional methods
                    </p>
                  </div>
                )}
              </div>
            </div>
          </div>

          <GlobalFooter />
        </div>
      );
    };

    // ============================================================================
    // APP WITH PROVIDERS
    // ============================================================================
    const App = () => (
      <ErrorBoundary>
        <ToastProvider>
          <LaunchAndROI />
        </ToastProvider>
      </ErrorBoundary>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
