    <style>
        :root { --primary-cyan: #00E5FA; --deep-navy: #00050F; --success: #10B981; --warning: #F59E0B; --danger: #EF4444; }
        * { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        body { background: linear-gradient(135deg, #00050F 0%, #0a1628 50%, #00050F 100%); min-height: 100vh; }
        .glass-nav { background: rgba(0, 5, 15, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0, 229, 250, 0.15); }
        .glass-card { background: rgba(0, 20, 40, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.2); border-radius: 12px; }
        .glass-panel { background: rgba(0, 15, 30, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.15); border-radius: 12px; }
        .glow-text { text-shadow: 0 0 20px rgba(0, 229, 250, 0.5); }
        .pulse-urgent { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } }
        .countdown-critical { animation: flash 1s infinite; }
        @keyframes flash { 0%, 50%, 100% { opacity: 1; } 25%, 75% { opacity: 0.5; } }
        .gate-active { border-left: 4px solid #00E5FA; background: rgba(0, 229, 250, 0.1); }
        .gate-complete { border-left: 4px solid #10B981; }
        .gate-pending { border-left: 4px solid #374151; opacity: 0.6; }
        .priority-p0 { background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%); }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: rgba(0, 229, 250, 0.05); border-radius: 3px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(0, 229, 250, 0.2); border-radius: 3px; }
        .ghost-bar { background: rgba(239, 68, 68, 0.2); }
        .task-card { transition: all 0.2s ease; }
        .task-card:hover { transform: translateX(2px); }
        .task-card.dragging { opacity: 0.5; }
        .swimlane-drop { transition: all 0.2s ease; }
        .swimlane-drop.drag-over { background: rgba(0, 229, 250, 0.1); border: 2px dashed rgba(0, 229, 250, 0.5); }
    </style>
</head>

            { id: 'T003', title: 'BOE Pricing Model', section: 'Vol IV', status: 'draft', priority: 'high', owner: 'FIN', phase: 'pink', progress: 45, assignee: 'Lisa Park' },

        // Countdown Timer
        const CountdownTimer = ({ dueDate }) => {
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });
            useEffect(() => {
                const timer = setInterval(() => {
                    const diff = dueDate - new Date();
                    if (diff > 0) setTimeLeft({ days: Math.floor(diff / (1000 * 60 * 60 * 24)), hours: Math.floor((diff / (1000 * 60 * 60)) % 24), minutes: Math.floor((diff / (1000 * 60)) % 60), seconds: Math.floor((diff / 1000) % 60) });
                }, 1000);
                return () => clearInterval(timer);
            }, [dueDate]);
            const isCritical = timeLeft.days <= 3, isUrgent = timeLeft.days <= 7;
            const colorClass = isCritical ? 'text-red-400' : isUrgent ? 'text-yellow-400' : 'text-cyan-400';
            return (
                <div className={`glass-card p-6 ${isCritical ? 'pulse-urgent border-red-500/50' : isUrgent ? 'border-yellow-500/30' : ''}`}>
                    <div className="text-center">
                        <div className="text-gray-400 text-sm mb-2">⏱️ TIME TO SUBMISSION</div>
                        <div className={`flex justify-center space-x-4 ${isCritical ? 'countdown-critical' : ''}`}>
                            {['days', 'hours', 'minutes', 'seconds'].map((unit, i) => (
                                <React.Fragment key={unit}>
                                    {i > 0 && <div className="text-4xl text-gray-600">:</div>}
                                    <div className="text-center">
                                        <div className={`font-mono text-4xl font-bold ${colorClass}`}>{String(timeLeft[unit]).padStart(2, '0')}</div>
                                        <div className="text-xs text-gray-500">{unit.toUpperCase().slice(0, 3)}</div>
                                    </div>
                                </React.Fragment>
                            ))}
                        </div>
                        <div className="mt-3 text-sm text-gray-400">Due: {dueDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}</div>
                    </div>
                </div>
            );
        };

                                <span className="px-3 py-1 bg-purple-500/20 text-purple-400 rounded text-sm">{proposal.setAside}</span>
                            </div>
                            <h1 className="text-2xl font-bold mb-2">{proposal.title}</h1>
                            <p className="text-gray-400 text-sm mb-3">{proposal.description}</p>
                            <div className="flex items-center space-x-6 text-sm">

                                <div><span className="text-gray-500">NAICS:</span> <span className="font-mono">{proposal.naics}</span></div>
                                <div><span className="text-gray-500">PM:</span> {proposal.pm}</div>
                                <div><span className="text-gray-500">Capture:</span> {proposal.captureManager}</div>
                            </div>
                        </div>

                                </div>
                            </div>

                { id: 'complete', name: 'Complete', color: '#10B981' }
            ];
            const priorityColors = { critical: 'bg-red-500/20 text-red-400 border-red-500/30', high: 'bg-yellow-500/20 text-yellow-400 border-yellow-500/30', medium: 'bg-blue-500/20 text-blue-400 border-blue-500/30' };
            
            const handleDragStart = (e, task) => { setDraggedTask(task); e.dataTransfer.effectAllowed = 'move'; };
            const handleDragEnd = () => { setDraggedTask(null); setDragOverLane(null); };
            const handleDragOver = (e, laneId) => { e.preventDefault(); setDragOverLane(laneId); };
            const handleDragLeave = () => setDragOverLane(null);
            const handleDrop = (e, laneId) => {
                e.preventDefault();
                if (draggedTask) setTasks(prev => prev.map(t => t.id === draggedTask.id ? { ...t, status: laneId } : t));
                setDragOverLane(null);
            };

            return (
                <div className="glass-panel p-4">
                    <h3 className="text-lg font-semibold mb-4 flex items-center"><span className="mr-2">📋</span>Task Board</h3>
                    <div className="flex space-x-3 overflow-x-auto pb-2">
                        {lanes.map(lane => {
                            const laneTasks = tasks.filter(t => t.status === lane.id);
                            return (
                                <div key={lane.id} className={`flex-shrink-0 w-[200px] swimlane-drop ${dragOverLane === lane.id ? 'drag-over' : ''}`}
                                    onDrop={(e) => handleDrop(e, lane.id)} onDragOver={(e) => handleDragOver(e, lane.id)} onDragLeave={handleDragLeave}>
                                    <div className="flex items-center justify-between mb-2 pb-2 border-b border-gray-700/50">
                                        <span className="text-sm font-medium" style={{ color: lane.color }}>{lane.name}</span>
                                        <span className="text-xs bg-white/10 px-2 py-0.5 rounded-full">{laneTasks.length}</span>
                                    </div>
                                    <div className="space-y-2 min-h-[150px]">
                                        {laneTasks.map(task => (
                                            <div key={task.id} draggable onDragStart={(e) => handleDragStart(e, task)} onDragEnd={handleDragEnd}
                                                className={`task-card p-2 bg-white/5 rounded-lg border border-gray-700/50 cursor-grab ${draggedTask?.id === task.id ? 'dragging' : ''}`}>
                                                <div className="flex items-start justify-between mb-1">
                                                    <span className={`px-1.5 py-0.5 rounded text-[10px] font-bold border ${priorityColors[task.priority]}`}>{task.priority.toUpperCase()}</span>
                                                    <span className="text-[10px] text-gray-500">{task.progress}%</span>
                                                </div>
                                                <div className="text-xs font-medium mb-1">{task.title}</div>
                                                <div className="text-[10px] text-gray-500">{task.assignee}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // AI Agents Panel
        const AIAgentsPanel = ({ agents }) => (
            <div className="glass-panel p-4">
                <h3 className="text-lg font-semibold mb-4 flex items-center"><span className="mr-2">🤖</span>Quick Agents</h3>
                <div className="grid grid-cols-2 gap-2">
                    {agents.map(a => (
                        <a key={a.id} href="agent-hub.html" className="p-2 rounded-lg bg-white/5 hover:bg-cyan-500/10 border border-gray-700/50 hover:border-cyan-500/30 transition-all group">
                            <div className="flex items-center space-x-2">
                                <span className="text-lg group-hover:scale-110 transition-transform">{a.icon}</span>
                                <div><div className="text-xs font-medium">{a.name}</div><div className="text-[10px] text-gray-500">{a.description}</div></div>
                            </div>
                        </a>
                    ))}
                </div>
            </div>
        );

        // Main App
        const App = () => {
            const [tasks, setTasks] = useState(initialTasks);
            return (
                <div className="min-h-screen">
                    <NavigationHeader currentPage="warroom" />
                    <main className="p-6">
                        <div className="flex items-center justify-between mb-4">
                            <div>
                                <h1 className="text-3xl font-bold flex items-center"><span className="mr-3">⚔️</span>War Room</h1>
                                <p className="text-gray-400">Active proposal command center</p>
                            </div>
                            <button className="px-4 py-2 bg-purple-500/20 text-purple-400 rounded-lg border border-purple-500/30 text-sm">Switch Proposal ▼</button>
                        </div>

                        <ProposalHeader proposal={activeProposal} />

                        <div className="grid grid-cols-3 gap-6 mb-6">
                            <div className="col-span-2"><CountdownTimer dueDate={activeProposal.dueDate} /></div>
                            <div className="glass-card p-6 text-center">
                                <div className="text-gray-400 text-sm mb-2">🎯 CURRENT GATE</div>
                                <div className="text-3xl font-bold text-cyan-400 glow-text">{activeProposal.currentGate}</div>
                                <div className="text-sm text-gray-400 mt-2">Review: Today 2:00 PM EST</div>
                            </div>
                        </div>

                        <ShipleyGateTracker gates={shipleyGates} />

                        {/* Key Metrics */}
                        <div className="grid grid-cols-4 gap-4 mb-6">
                            <div className="glass-card p-4"><div className="text-gray-400 text-xs mb-1">Sections Complete</div><div className="flex items-end space-x-1"><span className="font-mono text-2xl font-bold text-cyan-400">8</span><span className="text-gray-500">/12</span></div><div className="w-full h-1.5 bg-gray-700 rounded-full mt-2"><div className="h-full bg-cyan-500 rounded-full" style={{ width: '67%' }}></div></div></div>
                            <div className="glass-card p-4"><div className="text-gray-400 text-xs mb-1">Compliance Items</div><div className="flex items-end space-x-1"><span className="font-mono text-2xl font-bold text-green-400">45</span><span className="text-gray-500">/52</span></div><div className="w-full h-1.5 bg-gray-700 rounded-full mt-2"><div className="h-full bg-green-500 rounded-full" style={{ width: '87%' }}></div></div></div>
                            <div className="glass-card p-4"><div className="text-gray-400 text-xs mb-1">Review Comments</div><div className="font-mono text-2xl font-bold text-yellow-400">23</div><div className="text-xs text-gray-500 mt-1">Open items</div></div>
                            <div className="glass-card p-4"><div className="text-gray-400 text-xs mb-1">Page Count</div><div className="flex items-end space-x-1"><span className="font-mono text-2xl font-bold text-purple-400">156</span><span className="text-gray-500">/180 max</span></div><div className="w-full h-1.5 bg-gray-700 rounded-full mt-2"><div className="h-full bg-purple-500 rounded-full" style={{ width: '87%' }}></div></div></div>
                        </div>

                        <div className="grid grid-cols-4 gap-6 mb-6">
                            <WinThemesPanel themes={winThemes} />
                            <GhostTeamPanel competitors={ghostTeam} />
                            <KeyDatesPanel dates={keyDates} />
                            <TeamPanel members={teamRoster} />
                        </div>

                        <div className="grid grid-cols-3 gap-6">
                            <div className="col-span-2"><TaskSwimlanes tasks={tasks} setTasks={setTasks} /></div>
                            <AIAgentsPanel agents={aiAgents} />
                        </div>
                    </main>

                    <footer className="border-t border-gray-800 mt-8 py-4 px-6">
                        <div className="flex items-center justify-between text-xs text-gray-500">
                            <div>© 2025 Mission Meets Tech • MissionPulse v1.1</div>
                            <span className="px-2 py-1 bg-yellow-500/20 text-yellow-400 rounded">⚠️ AI GENERATED - REQUIRES HUMAN REVIEW</span>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
