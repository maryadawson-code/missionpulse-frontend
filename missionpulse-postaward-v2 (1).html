<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post-Award | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:#00050F;color:#e2e8f0;min-height:100vh}.glass{background:rgba(15,23,42,0.85);backdrop-filter:blur(16px);border:1px solid rgba(0,229,250,0.1);border-radius:12px}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const SUPABASE_URL='https://djuviwarqdvlbgcfuupa.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
const supabase=window.supabase?.createClient(SUPABASE_URL,SUPABASE_ANON);

const DEMO_ACTIONS=[
  {id:1,action:'Contract Kickoff Meeting',category:'Kickoff',owner:'PM',status:'complete',due_date:'2025-02-15'},
  {id:2,action:'Finalize Staffing Plan',category:'Staffing',owner:'HR',status:'in_progress',due_date:'2025-02-20'},
  {id:3,action:'Security Clearance Processing',category:'Security',owner:'FSO',status:'pending',due_date:'2025-03-01'},
  {id:4,action:'Subcontractor Agreements',category:'Contracts',owner:'Contracts',status:'pending',due_date:'2025-02-25'},
  {id:5,action:'Transition-In Plan Execution',category:'Transition',owner:'PM',status:'in_progress',due_date:'2025-03-15'}
];

const CATEGORIES=['Kickoff','Staffing','Security','Contracts','Transition','Deliverables'];

function PostAward(){
  const[connected,setConnected]=useState(false);
  const[actions,setActions]=useState(DEMO_ACTIONS);
  const[filter,setFilter]=useState('all');
  const[showAdd,setShowAdd]=useState(false);
  const[newAction,setNewAction]=useState({action:'',category:'Kickoff',owner:'',status:'pending',due_date:''});

  useEffect(()=>{
    const load=async()=>{
      try{
        const{data,error}=await supabase.from('post_award_actions').select('*').order('due_date');
        if(!error&&data?.length)setActions(data);
        setConnected(!error);
      }catch{setConnected(false)}
    };
    load();
  },[]);

  const updateStatus=async(id,status)=>{
    try{
      await supabase.from('post_award_actions').update({status,completed_at:status==='complete'?new Date().toISOString():null}).eq('id',id);
      setActions(actions.map(a=>a.id===id?{...a,status}:a));
    }catch{}
  };

  const saveAction=async()=>{
    if(!newAction.action)return;
    try{
      const{data}=await supabase.from('post_award_actions').insert([newAction]).select();
      if(data)setActions([...actions,data[0]]);
      setShowAdd(false);
      setNewAction({action:'',category:'Kickoff',owner:'',status:'pending',due_date:''});
    }catch(e){alert('Error: '+e.message)}
  };

  const filtered=filter==='all'?actions:actions.filter(a=>a.category===filter);
  const statusColor={pending:'bg-slate-500/20 text-slate-400',in_progress:'bg-cyan-500/20 text-cyan-400',complete:'bg-emerald-500/20 text-emerald-400',blocked:'bg-red-500/20 text-red-400'};
  const progress=actions.length?Math.round((actions.filter(a=>a.status==='complete').length/actions.length)*100):0;

  return(
    <div className="min-h-screen p-6">
      <div className="flex justify-between items-start mb-6">
        <div>
          <h1 className="text-2xl font-bold text-white flex items-center gap-3">🏆 Post-Award Management<span className={`text-xs px-2 py-1 rounded ${connected?'bg-emerald-500/20 text-emerald-400':'bg-red-500/20 text-red-400'}`}>{connected?'● Live':'○ Demo'}</span></h1>
          <p className="text-slate-400 text-sm mt-1">Transition and contract kickoff tracking</p>
        </div>
        <button onClick={()=>setShowAdd(true)} className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-lg">+ Add Action</button>
      </div>

      <div className="grid grid-cols-4 gap-4 mb-6">
        <div className="glass p-4"><div className="text-slate-400 text-xs">Total Actions</div><div className="text-2xl font-bold text-white">{actions.length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">Complete</div><div className="text-2xl font-bold text-emerald-400">{actions.filter(a=>a.status==='complete').length}</div></div>
        <div className="glass p-4"><div className="text-slate-400 text-xs">In Progress</div><div className="text-2xl font-bold text-cyan-400">{actions.filter(a=>a.status==='in_progress').length}</div></div>
        <div className="glass p-4">
          <div className="text-slate-400 text-xs">Progress</div>
          <div className="text-2xl font-bold text-amber-400">{progress}%</div>
          <div className="h-1.5 bg-slate-700 rounded-full mt-1"><div className="h-full bg-emerald-500 rounded-full" style={{width:`${progress}%`}}/></div>
        </div>
      </div>

      <div className="flex gap-2 mb-4">
        <button onClick={()=>setFilter('all')} className={`px-3 py-1.5 rounded-lg text-sm ${filter==='all'?'bg-cyan-500 text-white':'bg-slate-800 text-slate-400'}`}>All</button>
        {CATEGORIES.map(c=>(
          <button key={c} onClick={()=>setFilter(c)} className={`px-3 py-1.5 rounded-lg text-sm ${filter===c?'bg-cyan-500 text-white':'bg-slate-800 text-slate-400'}`}>{c}</button>
        ))}
      </div>

      <div className="glass overflow-hidden">
        <table className="w-full">
          <thead className="bg-slate-800/50">
            <tr>{['Action','Category','Owner','Due Date','Status','Actions'].map(h=><th key={h} className="text-left p-3 text-xs font-semibold text-slate-400 uppercase">{h}</th>)}</tr>
          </thead>
          <tbody className="divide-y divide-slate-700/30">
            {filtered.map(a=>(
              <tr key={a.id} className="hover:bg-slate-800/30">
                <td className="p-3 text-white">{a.action}</td>
                <td className="p-3"><span className="px-2 py-0.5 rounded bg-slate-700 text-slate-300 text-xs">{a.category}</span></td>
                <td className="p-3 text-slate-400">{a.owner}</td>
                <td className="p-3 text-slate-400">{a.due_date}</td>
                <td className="p-3"><span className={`px-2 py-0.5 rounded text-xs ${statusColor[a.status]}`}>{a.status}</span></td>
                <td className="p-3">
                  <select value={a.status} onChange={e=>updateStatus(a.id,e.target.value)} className="bg-slate-800 border border-slate-700 rounded px-2 py-1 text-xs text-white">
                    <option value="pending">Pending</option>
                    <option value="in_progress">In Progress</option>
                    <option value="complete">Complete</option>
                    <option value="blocked">Blocked</option>
                  </select>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {showAdd&&(
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
          <div className="glass p-6 w-full max-w-lg">
            <h3 className="text-lg font-bold text-white mb-4">Add Post-Award Action</h3>
            <div className="space-y-3">
              <input value={newAction.action} onChange={e=>setNewAction({...newAction,action:e.target.value})} placeholder="Action description" className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
              <div className="grid grid-cols-2 gap-3">
                <select value={newAction.category} onChange={e=>setNewAction({...newAction,category:e.target.value})} className="bg-slate-800 border border-slate-700 rounded-lg p-2 text-white">
                  {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
                <input value={newAction.owner} onChange={e=>setNewAction({...newAction,owner:e.target.value})} placeholder="Owner" className="bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
              </div>
              <input type="date" value={newAction.due_date} onChange={e=>setNewAction({...newAction,due_date:e.target.value})} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white"/>
              <div className="flex gap-3">
                <button onClick={()=>setShowAdd(false)} className="flex-1 px-4 py-2 bg-slate-700 rounded-lg">Cancel</button>
                <button onClick={saveAction} className="flex-1 px-4 py-2 bg-cyan-500 text-white rounded-lg">Save</button>
              </div>
            </div>
          </div>
        </div>
      )}
      <div className="text-center text-xs text-slate-500 mt-8">AI GENERATED - REQUIRES HUMAN REVIEW | © 2026 Mission Meets Tech</div>
    </div>
  );
}
ReactDOM.render(<PostAward/>,document.getElementById('root'));
</script>
</body>
</html>
