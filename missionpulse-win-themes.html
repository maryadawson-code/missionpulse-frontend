<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Win Theme Builder | MissionPulse</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass { background: rgba(0,229,250,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
    .glass-card { background: rgba(15,23,42,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(51,65,85,0.5); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const DEMO_THEMES = [
      { id: '1', theme_text: 'AI-First Healthcare Innovation', theme_type: 'discriminator', evaluation_factor: 'Technical Approach', proof_points: ['15+ healthcare AI implementations', 'Proprietary NLP for clinical text', 'FDA 510(k) experience'], ghost_competitor: 'Legacy Vendor', ghost_statement: 'Unlike legacy systems requiring 18-month implementations, our AI-first approach delivers value in 90 days', priority: 1, status: 'approved', opportunity: 'DHA EHR Modernization' },
      { id: '2', theme_text: 'Zero-Trust Security Architecture', theme_type: 'discriminator', evaluation_factor: 'Technical Approach', proof_points: ['CMMC Level 2 certified', 'FedRAMP High authorized solutions', 'Zero breaches in 8 years'], ghost_competitor: 'Generic IT Contractor', ghost_statement: 'Our purpose-built security stack exceeds compliance requirements, unlike retrofit solutions', priority: 2, status: 'approved', opportunity: 'DHA EHR Modernization' },
      { id: '3', theme_text: 'Proven Federal Health Delivery', theme_type: 'strength', evaluation_factor: 'Past Performance', proof_points: ['$500M+ in federal health contracts', 'VA, DHA, CMS experience', '98% customer satisfaction'], ghost_competitor: null, ghost_statement: null, priority: 3, status: 'approved', opportunity: 'DHA EHR Modernization' },
      { id: '4', theme_text: 'Agile Mission Partner', theme_type: 'strength', evaluation_factor: 'Management Approach', proof_points: ['SAFe 5.0 certified team', 'DevSecOps pipeline', 'Continuous ATO approach'], ghost_competitor: null, ghost_statement: null, priority: 4, status: 'draft', opportunity: 'VA Claims Processing' },
      { id: '5', theme_text: 'Cost-Effective Innovation', theme_type: 'discriminator', evaluation_factor: 'Price/Cost', proof_points: ['20% below industry rates', 'Reusable component library', 'Offshore-onshore hybrid'], ghost_competitor: 'Big 5 Contractor', ghost_statement: 'Our lean structure delivers enterprise capability without enterprise overhead', priority: 1, status: 'review', opportunity: 'CMS Data Analytics' }
    ];

    const Icons = {
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
      trophy: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" /></svg>,
      plus: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>,
      shield: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
      x: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
      target: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
      ghost: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>,
      sparkles: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" /></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    const Badge = ({ children, variant = 'default' }) => {
      const variants = {
        default: 'bg-slate-700 text-slate-300',
        success: 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30',
        warning: 'bg-amber-500/20 text-amber-400 border border-amber-500/30',
        danger: 'bg-red-500/20 text-red-400 border border-red-500/30',
        cyan: 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30',
        purple: 'bg-purple-500/20 text-purple-400 border border-purple-500/30'
      };
      return <span className={`px-2 py-1 rounded-full text-xs font-medium ${variants[variant]}`}>{children}</span>;
    };

    function WinThemeBuilder() {
      const [themes, setThemes] = useState(DEMO_THEMES);
      const [selectedTheme, setSelectedTheme] = useState(null);
      const [filterOpp, setFilterOpp] = useState('all');
      const [filterStatus, setFilterStatus] = useState('all');

      const opportunities = [...new Set(themes.map(t => t.opportunity))];

      const filteredThemes = useMemo(() => {
        return themes.filter(t => {
          const matchOpp = filterOpp === 'all' || t.opportunity === filterOpp;
          const matchStatus = filterStatus === 'all' || t.status === filterStatus;
          return matchOpp && matchStatus;
        });
      }, [themes, filterOpp, filterStatus]);

      const stats = {
        total: themes.length,
        approved: themes.filter(t => t.status === 'approved').length,
        discriminators: themes.filter(t => t.theme_type === 'discriminator').length,
        ghosted: themes.filter(t => t.ghost_competitor).length
      };

      const getStatusBadge = (status) => {
        const config = {
          approved: { variant: 'success', label: 'Approved' },
          review: { variant: 'warning', label: 'In Review' },
          draft: { variant: 'default', label: 'Draft' }
        };
        const c = config[status] || config.draft;
        return <Badge variant={c.variant}>{c.label}</Badge>;
      };

      const getTypeBadge = (type) => {
        return type === 'discriminator' 
          ? <Badge variant="purple">Discriminator</Badge>
          : <Badge variant="cyan">Strength</Badge>;
      };

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="p-2 rounded-lg bg-slate-800/50 hover:bg-slate-700/50 transition-colors">
                    <Icon name="home" className="w-5 h-5 text-slate-400" />
                  </a>
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-500 to-yellow-500 flex items-center justify-center">
                      <Icon name="trophy" className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white">Win Theme Builder</h1>
                      <p className="text-sm text-slate-400">Craft compelling discriminators & proof points</p>
                    </div>
                  </div>
                </div>
                <button className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-xl flex items-center gap-2 font-semibold hover:from-cyan-400 hover:to-teal-400 transition-all">
                  <Icon name="plus" className="w-4 h-4" /> New Theme
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8">
            {/* Stats */}
            <div className="grid grid-cols-4 gap-4 mb-8">
              {[
                { label: 'Total Themes', value: stats.total, icon: 'trophy', color: 'amber' },
                { label: 'Approved', value: stats.approved, icon: 'check', color: 'emerald' },
                { label: 'Discriminators', value: stats.discriminators, icon: 'target', color: 'purple' },
                { label: 'Ghost Statements', value: stats.ghosted, icon: 'ghost', color: 'cyan' }
              ].map((stat, i) => (
                <div key={i} className="glass-card rounded-xl p-4">
                  <div className="flex items-center gap-3">
                    <div className={`w-10 h-10 rounded-lg bg-${stat.color}-500/20 flex items-center justify-center`}>
                      <Icon name={stat.icon} className={`w-5 h-5 text-${stat.color}-400`} />
                    </div>
                    <div>
                      <div className="text-2xl font-bold text-white">{stat.value}</div>
                      <div className="text-xs text-slate-400">{stat.label}</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* Filters */}
            <div className="glass-card rounded-xl p-4 mb-6">
              <div className="flex items-center gap-4">
                <select
                  value={filterOpp}
                  onChange={(e) => setFilterOpp(e.target.value)}
                  className="bg-slate-800/50 border border-slate-700/50 rounded-lg px-4 py-2.5 text-white focus:outline-none"
                >
                  <option value="all">All Opportunities</option>
                  {opportunities.map(opp => (
                    <option key={opp} value={opp}>{opp}</option>
                  ))}
                </select>
                <select
                  value={filterStatus}
                  onChange={(e) => setFilterStatus(e.target.value)}
                  className="bg-slate-800/50 border border-slate-700/50 rounded-lg px-4 py-2.5 text-white focus:outline-none"
                >
                  <option value="all">All Status</option>
                  <option value="approved">Approved</option>
                  <option value="review">In Review</option>
                  <option value="draft">Draft</option>
                </select>
              </div>
            </div>

            {/* Themes Grid */}
            <div className="space-y-4">
              {filteredThemes.map(theme => (
                <div 
                  key={theme.id}
                  onClick={() => setSelectedTheme(theme)}
                  className="glass-card rounded-xl p-6 hover:border-cyan-500/30 transition-all cursor-pointer"
                >
                  <div className="flex items-start justify-between mb-4">
                    <div className="flex-1">
                      <div className="flex items-center gap-2 mb-2">
                        <span className="text-amber-400 font-bold">#{theme.priority}</span>
                        {getTypeBadge(theme.theme_type)}
                        {getStatusBadge(theme.status)}
                      </div>
                      <h3 className="text-xl font-bold text-white mb-2">"{theme.theme_text}"</h3>
                      <p className="text-sm text-slate-400">{theme.opportunity} • {theme.evaluation_factor}</p>
                    </div>
                  </div>

                  {/* Proof Points */}
                  <div className="mb-4">
                    <div className="text-xs text-slate-500 mb-2">PROOF POINTS</div>
                    <div className="flex flex-wrap gap-2">
                      {theme.proof_points.map((point, i) => (
                        <span key={i} className="px-3 py-1 bg-emerald-500/10 border border-emerald-500/20 rounded-lg text-emerald-400 text-sm">
                          ✓ {point}
                        </span>
                      ))}
                    </div>
                  </div>

                  {/* Ghost Statement */}
                  {theme.ghost_competitor && (
                    <div className="p-4 bg-slate-800/50 rounded-lg border-l-4 border-purple-500">
                      <div className="flex items-center gap-2 text-purple-400 text-xs mb-1">
                        <Icon name="ghost" className="w-4 h-4" />
                        GHOSTING: {theme.ghost_competitor}
                      </div>
                      <p className="text-slate-300 text-sm italic">"{theme.ghost_statement}"</p>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </main>

          {/* Theme Detail Modal */}
          {selectedTheme && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-6" onClick={() => setSelectedTheme(null)}>
              <div className="glass-card rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                <div className="p-6 border-b border-slate-700/50">
                  <div className="flex items-start justify-between">
                    <div>
                      <div className="flex items-center gap-2 mb-2">
                        {getTypeBadge(selectedTheme.theme_type)}
                        {getStatusBadge(selectedTheme.status)}
                      </div>
                      <h2 className="text-2xl font-bold text-white">"{selectedTheme.theme_text}"</h2>
                    </div>
                    <button onClick={() => setSelectedTheme(null)} className="p-2 rounded-lg bg-slate-800/50 text-slate-400 hover:text-white">
                      <Icon name="x" className="w-5 h-5" />
                    </button>
                  </div>
                </div>

                <div className="p-6 space-y-6">
                  <div className="grid grid-cols-2 gap-4">
                    <div className="glass rounded-lg p-4">
                      <div className="text-xs text-slate-400 mb-1">Opportunity</div>
                      <div className="text-white">{selectedTheme.opportunity}</div>
                    </div>
                    <div className="glass rounded-lg p-4">
                      <div className="text-xs text-slate-400 mb-1">Evaluation Factor</div>
                      <div className="text-white">{selectedTheme.evaluation_factor}</div>
                    </div>
                  </div>

                  <div>
                    <div className="text-sm text-slate-400 mb-3">Proof Points</div>
                    <div className="space-y-2">
                      {selectedTheme.proof_points.map((point, i) => (
                        <div key={i} className="flex items-center gap-3 p-3 bg-emerald-500/10 rounded-lg">
                          <Icon name="check" className="w-5 h-5 text-emerald-400" />
                          <span className="text-white">{point}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  {selectedTheme.ghost_competitor && (
                    <div>
                      <div className="text-sm text-slate-400 mb-3">Ghost Strategy</div>
                      <div className="p-4 bg-purple-500/10 border border-purple-500/20 rounded-lg">
                        <div className="text-purple-400 font-medium mb-2">Target: {selectedTheme.ghost_competitor}</div>
                        <p className="text-white italic">"{selectedTheme.ghost_statement}"</p>
                      </div>
                    </div>
                  )}
                </div>

                <div className="p-6 border-t border-slate-700/50 flex justify-end gap-3">
                  <button className="px-4 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-600 transition-colors">
                    Edit Theme
                  </button>
                  {selectedTheme.status !== 'approved' && (
                    <button className="px-4 py-2 bg-gradient-to-r from-emerald-500 to-green-500 text-white rounded-lg font-semibold">
                      <Icon name="check" className="w-4 h-4 inline mr-2" />Approve
                    </button>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <footer className="glass border-t border-slate-700/50 mt-12">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-2 text-slate-400 text-sm">
                <Icon name="shield" className="w-4 h-4" />
                <span>Mission Meets Tech • MissionPulse v12</span>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<WinThemeBuilder />);
  </script>
</body>
</html>
