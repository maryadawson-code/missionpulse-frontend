<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Themes | MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #00050F 0%, #001a2c 50%, #00050F 100%); }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.15); }
        .strength-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); }
        .strength-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    </style>
</head>
<body class="min-h-screen text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const supabaseUrl = 'https://djuviwarqdvlbgcfuupa.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc0OTc5MzMsImV4cCI6MjA1MzA3MzkzM30.pBPpVaJmVkzhCcUvJPN2KnMGnstuc55sNv8CVsERRPg';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const DEMO_THEMES = [
            { id: '1', theme_name: 'Mission-Ready AI Integration', theme_statement: 'MMT delivers battle-tested AI solutions that are operational from Day 1, reducing ramp-up time by 60% through our pre-configured AskSage integration.', discriminator: 'Pre-built AskSage connectors', proof_points: ['3 successful DHA deployments', 'FedRAMP Moderate certified', 'Zero security incidents'], evaluation_factor: 'Technical Approach', ghost_competitor: 'Competitors require 6+ month custom development', strength_rating: 5, status: 'approved' },
            { id: '2', theme_name: 'Healthcare IT Domain Mastery', theme_statement: 'Our team brings 50+ combined years of military health system experience, ensuring solutions that speak the language of MHS operations.', discriminator: 'Team credentials', proof_points: ['Key personnel with DHA experience', 'HIPAA-compliant track record', 'MHS Genesis familiarity'], evaluation_factor: 'Key Personnel', ghost_competitor: 'Generic IT contractors lack healthcare context', strength_rating: 4, status: 'approved' },
            { id: '3', theme_name: 'Agile Delivery at Government Speed', theme_statement: 'We balance rapid iteration with rigorous compliance, delivering monthly capability releases while maintaining full ATO status.', discriminator: 'DevSecOps maturity', proof_points: ['Monthly release cadence', 'CI/CD pipeline certified', '99.9% uptime SLA'], evaluation_factor: 'Management Approach', ghost_competitor: 'Traditional waterfall delays value delivery', strength_rating: 4, status: 'draft' }
        ];

        const EVAL_FACTORS = ['Technical Approach', 'Management Approach', 'Key Personnel', 'Past Performance', 'Cost/Price', 'Small Business', 'Other'];
        const STATUSES = ['draft', 'approved', 'rejected', 'archived'];

        function WinThemes() {
            const [themes, setThemes] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showModal, setShowModal] = useState(false);
            const [editTheme, setEditTheme] = useState(null);
            const [filterStatus, setFilterStatus] = useState('all');
            const [newTheme, setNewTheme] = useState({
                theme_name: '', theme_statement: '', discriminator: '',
                proof_points: '', evaluation_factor: 'Technical Approach',
                ghost_competitor: '', strength_rating: 3, status: 'draft'
            });

            useEffect(() => { fetchThemes(); }, []);

            async function fetchThemes() {
                try {
                    const { data, error } = await supabase.from('win_themes').select('*').order('sort_order');
                    if (error) throw error;
                    setThemes(data?.length > 0 ? data : DEMO_THEMES);
                } catch (err) {
                    console.log('Using demo data:', err.message);
                    setThemes(DEMO_THEMES);
                }
                setLoading(false);
            }

            async function handleSave() {
                const themeData = {
                    ...newTheme,
                    proof_points: typeof newTheme.proof_points === 'string' 
                        ? newTheme.proof_points.split('\n').filter(Boolean)
                        : newTheme.proof_points
                };
                try {
                    if (editTheme) {
                        const { error } = await supabase.from('win_themes').update(themeData).eq('id', editTheme.id);
                        if (error) throw error;
                    } else {
                        const { error } = await supabase.from('win_themes').insert([themeData]);
                        if (error) throw error;
                    }
                    fetchThemes();
                } catch (err) {
                    if (editTheme) {
                        setThemes(themes.map(t => t.id === editTheme.id ? { ...t, ...themeData } : t));
                    } else {
                        setThemes([{ id: Date.now().toString(), ...themeData }, ...themes]);
                    }
                }
                closeModal();
            }

            async function handleStatusChange(id, status) {
                try {
                    const { error } = await supabase.from('win_themes').update({ status }).eq('id', id);
                    if (error) throw error;
                    fetchThemes();
                } catch (err) {
                    setThemes(themes.map(t => t.id === id ? { ...t, status } : t));
                }
            }

            function openEdit(theme) {
                setEditTheme(theme);
                setNewTheme({
                    ...theme,
                    proof_points: Array.isArray(theme.proof_points) ? theme.proof_points.join('\n') : theme.proof_points || ''
                });
                setShowModal(true);
            }

            function closeModal() {
                setShowModal(false);
                setEditTheme(null);
                setNewTheme({ theme_name: '', theme_statement: '', discriminator: '', proof_points: '', evaluation_factor: 'Technical Approach', ghost_competitor: '', strength_rating: 3, status: 'draft' });
            }

            const filteredThemes = filterStatus === 'all' ? themes : themes.filter(t => t.status === filterStatus);

            const statusColor = (status) => ({
                'draft': 'bg-gray-500/20 text-gray-400 border-gray-500/30',
                'approved': 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30',
                'rejected': 'bg-red-500/20 text-red-400 border-red-500/30',
                'archived': 'bg-amber-500/20 text-amber-400 border-amber-500/30'
            }[status] || 'bg-gray-500/20 text-gray-400');

            const strengthColor = (rating) => {
                if (rating >= 4) return 'bg-emerald-500';
                if (rating >= 3) return 'bg-cyan-500';
                if (rating >= 2) return 'bg-amber-500';
                return 'bg-red-500';
            };

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="border-b border-cyan-500/20 bg-black/40 backdrop-blur-xl sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <a href="index.html" className="text-cyan-400 hover:text-cyan-300">← Back</a>
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-emerald-400 to-cyan-600 flex items-center justify-center text-xl">🏅</div>
                                    <div>
                                        <h1 className="text-xl font-bold">Win Theme Builder</h1>
                                        <p className="text-xs text-gray-400">Craft Discriminators • Ghost Competition</p>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)}
                                    className="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm">
                                    <option value="all">All Themes</option>
                                    {STATUSES.map(s => <option key={s} value={s}>{s.charAt(0).toUpperCase() + s.slice(1)}</option>)}
                                </select>
                                <button onClick={() => setShowModal(true)} className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium transition-all">
                                    + New Theme
                                </button>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto px-6 py-8">
                        {/* Stats Row */}
                        <div className="grid grid-cols-4 gap-4 mb-8">
                            <div className="glass-card rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-cyan-400">{themes.length}</div>
                                <div className="text-sm text-gray-400">Total Themes</div>
                            </div>
                            <div className="glass-card rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-emerald-400">{themes.filter(t => t.status === 'approved').length}</div>
                                <div className="text-sm text-gray-400">Approved</div>
                            </div>
                            <div className="glass-card rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-gray-400">{themes.filter(t => t.status === 'draft').length}</div>
                                <div className="text-sm text-gray-400">In Draft</div>
                            </div>
                            <div className="glass-card rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-amber-400">
                                    {(themes.reduce((a, t) => a + (t.strength_rating || 0), 0) / themes.length || 0).toFixed(1)}
                                </div>
                                <div className="text-sm text-gray-400">Avg Strength</div>
                            </div>
                        </div>

                        {/* Themes Grid */}
                        {loading ? (
                            <div className="text-center py-20 text-gray-400">Loading themes...</div>
                        ) : (
                            <div className="grid gap-6">
                                {filteredThemes.map((theme, idx) => (
                                    <div key={theme.id} className="glass-card rounded-xl p-6 hover:border-cyan-500/40 transition-all">
                                        <div className="flex items-start justify-between mb-4">
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-500/30 to-blue-600/30 flex items-center justify-center text-2xl font-bold text-cyan-400">
                                                    {idx + 1}
                                                </div>
                                                <div>
                                                    <h3 className="text-lg font-bold">{theme.theme_name}</h3>
                                                    <div className="flex items-center gap-2 mt-1">
                                                        <span className={`px-2 py-0.5 rounded text-xs border ${statusColor(theme.status)}`}>
                                                            {theme.status?.toUpperCase()}
                                                        </span>
                                                        <span className="text-xs text-gray-500">{theme.evaluation_factor}</span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <div className="text-right mr-4">
                                                    <div className="text-xs text-gray-400 mb-1">Strength</div>
                                                    <div className="strength-bar w-24">
                                                        <div className={`strength-fill ${strengthColor(theme.strength_rating)}`} style={{ width: `${(theme.strength_rating / 5) * 100}%` }}></div>
                                                    </div>
                                                    <div className="text-xs text-gray-500 mt-1">{theme.strength_rating}/5</div>
                                                </div>
                                                <button onClick={() => openEdit(theme)} className="p-2 hover:bg-white/10 rounded-lg text-gray-400 hover:text-white">✏️</button>
                                            </div>
                                        </div>

                                        {/* Theme Statement */}
                                        <div className="bg-cyan-500/10 border border-cyan-500/20 rounded-lg p-4 mb-4">
                                            <div className="text-xs text-cyan-400 mb-1">Theme Statement</div>
                                            <p className="text-sm leading-relaxed">{theme.theme_statement}</p>
                                        </div>

                                        <div className="grid md:grid-cols-3 gap-4">
                                            {/* Discriminator */}
                                            <div className="bg-white/5 rounded-lg p-3">
                                                <div className="text-xs text-gray-400 mb-1">🎯 Discriminator</div>
                                                <p className="text-sm">{theme.discriminator}</p>
                                            </div>

                                            {/* Proof Points */}
                                            <div className="bg-white/5 rounded-lg p-3">
                                                <div className="text-xs text-gray-400 mb-1">✅ Proof Points</div>
                                                {theme.proof_points?.length > 0 && (
                                                    <ul className="text-sm space-y-1">
                                                        {(Array.isArray(theme.proof_points) ? theme.proof_points : [theme.proof_points]).map((point, i) => (
                                                            <li key={i} className="flex items-start gap-2">
                                                                <span className="text-emerald-400">•</span>
                                                                <span>{point}</span>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                )}
                                            </div>

                                            {/* Ghost */}
                                            <div className="bg-red-500/10 border border-red-500/20 rounded-lg p-3">
                                                <div className="text-xs text-red-400 mb-1">👻 Ghost Statement</div>
                                                <p className="text-sm italic">{theme.ghost_competitor}</p>
                                            </div>
                                        </div>

                                        {/* Quick Actions */}
                                        <div className="flex gap-2 mt-4 pt-4 border-t border-white/10">
                                            {theme.status === 'draft' && (
                                                <button onClick={() => handleStatusChange(theme.id, 'approved')} className="px-3 py-1 bg-emerald-500/20 text-emerald-400 rounded text-sm hover:bg-emerald-500/30">
                                                    ✓ Approve
                                                </button>
                                            )}
                                            {theme.status === 'approved' && (
                                                <button onClick={() => handleStatusChange(theme.id, 'archived')} className="px-3 py-1 bg-amber-500/20 text-amber-400 rounded text-sm hover:bg-amber-500/30">
                                                    📁 Archive
                                                </button>
                                            )}
                                            <button onClick={() => handleStatusChange(theme.id, 'draft')} className="px-3 py-1 bg-white/10 text-gray-400 rounded text-sm hover:bg-white/20">
                                                Reset to Draft
                                            </button>
                                        </div>
                                    </div>
                                ))}
                                {filteredThemes.length === 0 && (
                                    <div className="text-center py-12 text-gray-500">No themes found. Create your first win theme!</div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* Modal */}
                    {showModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                            <div className="glass-card rounded-2xl p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                                <h2 className="text-xl font-bold mb-6">{editTheme ? 'Edit' : 'New'} Win Theme</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-1">Theme Name *</label>
                                        <input type="text" value={newTheme.theme_name} onChange={(e) => setNewTheme({...newTheme, theme_name: e.target.value})}
                                            placeholder="e.g., Mission-Ready AI Integration"
                                            className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                    </div>
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-1">Theme Statement *</label>
                                        <textarea value={newTheme.theme_statement} onChange={(e) => setNewTheme({...newTheme, theme_statement: e.target.value})}
                                            rows={3} placeholder="The core message you want evaluators to remember..."
                                            className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm text-gray-400 mb-1">Evaluation Factor</label>
                                            <select value={newTheme.evaluation_factor} onChange={(e) => setNewTheme({...newTheme, evaluation_factor: e.target.value})}
                                                className="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2">
                                                {EVAL_FACTORS.map(f => <option key={f} value={f}>{f}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm text-gray-400 mb-1">Strength Rating</label>
                                            <div className="flex items-center gap-2">
                                                {[1,2,3,4,5].map(n => (
                                                    <button key={n} onClick={() => setNewTheme({...newTheme, strength_rating: n})}
                                                        className={`w-10 h-10 rounded-lg border ${newTheme.strength_rating >= n ? 'bg-cyan-500/30 border-cyan-500' : 'border-white/10'}`}>
                                                        {n}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-1">Discriminator</label>
                                        <input type="text" value={newTheme.discriminator} onChange={(e) => setNewTheme({...newTheme, discriminator: e.target.value})}
                                            placeholder="What makes this unique?"
                                            className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                    </div>
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-1">Proof Points (one per line)</label>
                                        <textarea value={newTheme.proof_points} onChange={(e) => setNewTheme({...newTheme, proof_points: e.target.value})}
                                            rows={3} placeholder="Evidence supporting this theme..."
                                            className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                    </div>
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-1">Ghost Statement</label>
                                        <textarea value={newTheme.ghost_competitor} onChange={(e) => setNewTheme({...newTheme, ghost_competitor: e.target.value})}
                                            rows={2} placeholder="Why competitors can't match this..."
                                            className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-500" />
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 mt-6">
                                    <button onClick={closeModal} className="px-4 py-2 border border-white/20 rounded-lg hover:bg-white/5">Cancel</button>
                                    <button onClick={handleSave} disabled={!newTheme.theme_name || !newTheme.theme_statement}
                                        className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium disabled:opacity-50">
                                        {editTheme ? 'Update' : 'Create'} Theme
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<WinThemes />, document.getElementById('root'));
    </script>
</body>
</html>
