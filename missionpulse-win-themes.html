<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Win Themes Manager</title>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; color: #fff; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-slideUp { animation: slideUp 0.5s ease-out forwards; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #111C2E; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #243656; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #00E5FA; }
    .glass-card { background: rgba(17, 28, 46, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0NDQ0NjUsImV4cCI6MjA4NTAyMDQ2NX0.3s8ufDDN2aWfkW0RBsAyJyacb2tjB7M550WSFIohHcA';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const Icons = {
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>,
      trophy: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>,
      star: () => <svg className="w-full h-full" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>,
      starOutline: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>,
      plus: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>,
      target: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><circle cx="12" cy="12" r="6" strokeWidth={2}/><circle cx="12" cy="12" r="2" strokeWidth={2}/></svg>,
      lightbulb: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>,
      link: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>,
      edit: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>,
      x: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    const THEME_CATEGORIES = [
      { key: 'technical', name: 'Technical Excellence', color: '#3B82F6' },
      { key: 'experience', name: 'Relevant Experience', color: '#8B5CF6' },
      { key: 'value', name: 'Best Value', color: '#00D29F' },
      { key: 'innovation', name: 'Innovation', color: '#F59E0B' },
      { key: 'risk', name: 'Risk Mitigation', color: '#EC4899' },
      { key: 'team', name: 'Team Strength', color: '#06B6D4' },
    ];

    const DEMO_THEMES = [
      {
        id: 'wt-1',
        title: 'Proven MHS GENESIS Expertise',
        category: 'experience',
        description: 'Our team has successfully delivered 15+ MHS GENESIS implementations across DoD MTFs, reducing deployment time by 30%.',
        proof_points: ['15+ successful implementations', 'Avg 30% faster deployment', '4.8/5 CPARS ratings'],
        linked_sections: ['1.0 Executive Summary', '2.1 Technical Approach'],
        priority: 1,
        is_primary: true,
      },
      {
        id: 'wt-2',
        title: 'Zero-Downtime Migration',
        category: 'technical',
        description: 'Our patented migration framework ensures continuous operations during transition with less than 0.01% data variance.',
        proof_points: ['<0.01% data variance', 'Zero patient care interruption', 'Automated rollback capability'],
        linked_sections: ['3.0 Transition Plan', '2.3 Security Framework'],
        priority: 2,
        is_primary: true,
      },
      {
        id: 'wt-3',
        title: 'FedRAMP High Ready',
        category: 'risk',
        description: 'Our cloud infrastructure maintains FedRAMP High authorization, eliminating ATO timeline risks.',
        proof_points: ['FedRAMP High authorized', 'IL5 compliant', '99.99% uptime SLA'],
        linked_sections: ['2.3 Security Framework'],
        priority: 3,
        is_primary: false,
      },
      {
        id: 'wt-4',
        title: 'AI-Powered Automation',
        category: 'innovation',
        description: 'Leverage our AskSage integration for 40% reduction in manual documentation tasks.',
        proof_points: ['40% efficiency gain', 'Natural language querying', 'Automated compliance checks'],
        linked_sections: ['2.2 Integration Strategy'],
        priority: 4,
        is_primary: false,
      },
    ];

    function WinThemesApp() {
      const [themes, setThemes] = useState(DEMO_THEMES);
      const [loading, setLoading] = useState(false);
      const [selectedTheme, setSelectedTheme] = useState(null);
      const [showAddModal, setShowAddModal] = useState(false);
      const [filterCategory, setFilterCategory] = useState('all');

      const filteredThemes = themes.filter(t => 
        filterCategory === 'all' || t.category === filterCategory
      );

      const primaryThemes = themes.filter(t => t.is_primary);

      const togglePrimary = (id) => {
        setThemes(prev => prev.map(t => 
          t.id === id ? { ...t, is_primary: !t.is_primary } : t
        ));
      };

      const updatePriority = (id, newPriority) => {
        setThemes(prev => prev.map(t => 
          t.id === id ? { ...t, priority: newPriority } : t
        ));
      };

      return (
        <div className="min-h-screen bg-[#00050F]">
          <header className="glass-card border-b border-white/10 sticky top-0 z-50">
            <div className="max-w-6xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="text-gray-400 hover:text-white transition-colors">
                    <Icon name="home" className="w-5 h-5" />
                  </a>
                  <div className="w-px h-6 bg-white/20" />
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-500 to-yellow-600 flex items-center justify-center">
                      <Icon name="trophy" className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white">Win Themes Manager</h1>
                      <p className="text-xs text-gray-400">Compelling discriminators & proof points</p>
                    </div>
                  </div>
                </div>

                <button
                  onClick={() => setShowAddModal(true)}
                  className="px-4 py-2 bg-gradient-to-r from-amber-500 to-yellow-600 text-white rounded-lg font-medium hover:opacity-90 transition-opacity flex items-center gap-2"
                >
                  <Icon name="plus" className="w-4 h-4" />
                  Add Theme
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-6 py-8">
            {/* Primary Themes Showcase */}
            <div className="glass-card rounded-xl p-6 mb-8">
              <div className="flex items-center gap-3 mb-4">
                <Icon name="star" className="w-5 h-5 text-amber-400" />
                <h2 className="text-lg font-semibold text-white">Primary Win Themes</h2>
                <span className="text-sm text-gray-500">({primaryThemes.length} selected)</span>
              </div>
              
              {primaryThemes.length > 0 ? (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {primaryThemes.sort((a, b) => a.priority - b.priority).map((theme, idx) => {
                    const category = THEME_CATEGORIES.find(c => c.key === theme.category);
                    return (
                      <div 
                        key={theme.id}
                        className="bg-[#0A1628] rounded-lg p-4 border-l-4 animate-slideUp"
                        style={{ borderColor: category?.color, animationDelay: `${idx * 100}ms` }}
                      >
                        <div className="flex items-start justify-between mb-2">
                          <div className="flex items-center gap-2">
                            <span className="w-6 h-6 rounded-full bg-amber-500/20 text-amber-400 text-sm font-bold flex items-center justify-center">
                              {theme.priority}
                            </span>
                            <h3 className="font-semibold text-white">{theme.title}</h3>
                          </div>
                        </div>
                        <p className="text-sm text-gray-400 mb-3">{theme.description}</p>
                        <div className="flex flex-wrap gap-2">
                          {theme.proof_points.slice(0, 2).map((point, i) => (
                            <span key={i} className="text-xs px-2 py-1 bg-white/5 rounded text-emerald-400">
                              ✓ {point}
                            </span>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              ) : (
                <div className="text-center py-8 text-gray-500">
                  No primary themes selected. Star themes to feature them here.
                </div>
              )}
            </div>

            {/* Category Filters */}
            <div className="flex items-center gap-2 mb-6 flex-wrap">
              <button
                onClick={() => setFilterCategory('all')}
                className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-all ${
                  filterCategory === 'all' 
                    ? 'bg-amber-500/20 text-amber-400 border border-amber-500' 
                    : 'bg-[#111C2E] text-gray-400 border border-white/10 hover:text-white'
                }`}
              >
                All Themes
              </button>
              {THEME_CATEGORIES.map(cat => (
                <button
                  key={cat.key}
                  onClick={() => setFilterCategory(cat.key)}
                  className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-all ${
                    filterCategory === cat.key 
                      ? 'border' 
                      : 'bg-[#111C2E] text-gray-400 border border-white/10 hover:text-white'
                  }`}
                  style={filterCategory === cat.key ? { 
                    backgroundColor: `${cat.color}20`, 
                    color: cat.color,
                    borderColor: cat.color 
                  } : {}}
                >
                  {cat.name}
                </button>
              ))}
            </div>

            {/* All Themes Grid */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {filteredThemes.map((theme, idx) => {
                const category = THEME_CATEGORIES.find(c => c.key === theme.category);
                return (
                  <div 
                    key={theme.id}
                    className="glass-card rounded-xl p-5 hover:border-white/20 transition-all cursor-pointer animate-slideUp"
                    style={{ animationDelay: `${idx * 50}ms` }}
                    onClick={() => setSelectedTheme(theme)}
                  >
                    <div className="flex items-start justify-between mb-3">
                      <div className="flex-1">
                        <div className="flex items-center gap-2 mb-1">
                          <span 
                            className="text-xs px-2 py-0.5 rounded-full"
                            style={{ backgroundColor: `${category?.color}20`, color: category?.color }}
                          >
                            {category?.name}
                          </span>
                          {theme.is_primary && (
                            <Icon name="star" className="w-4 h-4 text-amber-400" />
                          )}
                        </div>
                        <h3 className="font-semibold text-white">{theme.title}</h3>
                      </div>
                      <button
                        onClick={(e) => { e.stopPropagation(); togglePrimary(theme.id); }}
                        className={`p-2 rounded-lg transition-colors ${
                          theme.is_primary ? 'bg-amber-500/20 text-amber-400' : 'bg-white/5 text-gray-500 hover:text-amber-400'
                        }`}
                      >
                        <Icon name={theme.is_primary ? 'star' : 'starOutline'} className="w-4 h-4" />
                      </button>
                    </div>

                    <p className="text-sm text-gray-400 mb-4 line-clamp-2">{theme.description}</p>

                    <div className="space-y-2">
                      <h4 className="text-xs font-medium text-gray-500 uppercase">Proof Points</h4>
                      <div className="flex flex-wrap gap-2">
                        {theme.proof_points.map((point, i) => (
                          <span key={i} className="text-xs px-2 py-1 bg-white/5 rounded text-gray-300">
                            {point}
                          </span>
                        ))}
                      </div>
                    </div>

                    {theme.linked_sections.length > 0 && (
                      <div className="mt-4 pt-4 border-t border-white/10">
                        <div className="flex items-center gap-2 text-xs text-gray-500">
                          <Icon name="link" className="w-3 h-3" />
                          <span>Linked to: {theme.linked_sections.join(', ')}</span>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {filteredThemes.length === 0 && (
              <div className="text-center py-16 glass-card rounded-xl">
                <Icon name="lightbulb" className="w-16 h-16 text-gray-600 mx-auto mb-4" />
                <h3 className="text-xl font-semibold text-gray-400 mb-2">No themes found</h3>
                <p className="text-gray-500">Try a different category or add a new win theme</p>
              </div>
            )}
          </main>

          {/* Theme Detail Modal */}
          {selectedTheme && (
            <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setSelectedTheme(null)}>
              <div className="glass-card rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                <div className="p-6 border-b border-white/10">
                  <div className="flex items-start justify-between">
                    <div>
                      <span 
                        className="text-xs px-2 py-1 rounded-full mb-2 inline-block"
                        style={{ 
                          backgroundColor: `${THEME_CATEGORIES.find(c => c.key === selectedTheme.category)?.color}20`, 
                          color: THEME_CATEGORIES.find(c => c.key === selectedTheme.category)?.color 
                        }}
                      >
                        {THEME_CATEGORIES.find(c => c.key === selectedTheme.category)?.name}
                      </span>
                      <h2 className="text-xl font-bold text-white">{selectedTheme.title}</h2>
                    </div>
                    <button onClick={() => setSelectedTheme(null)} className="p-2 text-gray-400 hover:text-white">
                      <Icon name="x" className="w-5 h-5" />
                    </button>
                  </div>
                </div>

                <div className="p-6 space-y-6">
                  <div>
                    <h4 className="text-sm font-medium text-gray-400 mb-2">Description</h4>
                    <p className="text-gray-300">{selectedTheme.description}</p>
                  </div>

                  <div>
                    <h4 className="text-sm font-medium text-gray-400 mb-2">Proof Points</h4>
                    <div className="space-y-2">
                      {selectedTheme.proof_points.map((point, i) => (
                        <div key={i} className="flex items-center gap-2 bg-[#0A1628] rounded-lg p-3">
                          <Icon name="check" className="w-4 h-4 text-emerald-400" />
                          <span className="text-white">{point}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div>
                    <h4 className="text-sm font-medium text-gray-400 mb-2">Linked Sections</h4>
                    <div className="flex flex-wrap gap-2">
                      {selectedTheme.linked_sections.map((section, i) => (
                        <span key={i} className="px-3 py-1.5 bg-[#0A1628] rounded-lg text-gray-300 text-sm">
                          {section}
                        </span>
                      ))}
                    </div>
                  </div>

                  <div className="flex items-center justify-between pt-4 border-t border-white/10">
                    <div className="flex items-center gap-2">
                      <span className="text-sm text-gray-400">Priority:</span>
                      <select
                        value={selectedTheme.priority}
                        onChange={(e) => {
                          updatePriority(selectedTheme.id, parseInt(e.target.value));
                          setSelectedTheme({ ...selectedTheme, priority: parseInt(e.target.value) });
                        }}
                        className="px-3 py-1 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none"
                      >
                        {[1, 2, 3, 4, 5].map(p => (
                          <option key={p} value={p}>{p}</option>
                        ))}
                      </select>
                    </div>
                    <button
                      onClick={() => { togglePrimary(selectedTheme.id); setSelectedTheme({ ...selectedTheme, is_primary: !selectedTheme.is_primary }); }}
                      className={`px-4 py-2 rounded-lg font-medium flex items-center gap-2 ${
                        selectedTheme.is_primary 
                          ? 'bg-amber-500/20 text-amber-400' 
                          : 'bg-white/5 text-gray-400 hover:text-amber-400'
                      }`}
                    >
                      <Icon name={selectedTheme.is_primary ? 'star' : 'starOutline'} className="w-4 h-4" />
                      {selectedTheme.is_primary ? 'Primary Theme' : 'Make Primary'}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          <footer className="border-t border-white/10 py-4 mt-12">
            <div className="max-w-6xl mx-auto px-6 text-center text-xs text-gray-500">
              © 2026 Mission Meets Tech • MissionPulse v2.0 • Sprint 64
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<WinThemesApp />, document.getElementById('root'));
  </script>
</body>
</html>
