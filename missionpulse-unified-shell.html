    const useConnectionStatus = () => {
      const [status, setStatus] = useState('checking');
      const [stats, setStats] = useState(null);

      useEffect(() => {
        const checkConnection = async () => {
          try {
            const { data, error } = await supabase.from('opportunities').select('count', { count: 'exact', head: true });
            if (error) throw error;
            
            const { data: opps } = await supabase.from('opportunities').select('contract_value');
            const totalValue = opps?.reduce((sum, o) => sum + (parseFloat(o.contract_value) || 0), 0) || 0;
            
            setStats({ opportunities: opps?.length || 0, pipelineValue: totalValue });
            setStatus('connected');
          } catch (err) {
            console.error('Connection check failed:', err);
            setStatus('offline');
          }
        };
        checkConnection();
        const interval = setInterval(checkConnection, 30000);
        return () => clearInterval(interval);
      }, []);

      return { status, stats };
    };

        'bg-amber-500/20 text-amber-400'
      }`}>
