[build]
  command = "npm run build"
  publish = ".next"

# Environment variables are set in the Netlify dashboard — do not hardcode secrets here.

# Next.js runtime — converts SSR pages + middleware into Netlify functions
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Sentry build plugin — uncomment after setting SENTRY_AUTH_TOKEN in Netlify env vars
# [[plugins]]
#   package = "@sentry/netlify-build-plugin"

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
