<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrations Hub | MissionPulse</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(0, 5, 15, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.2); }
        .glow { box-shadow: 0 0 30px rgba(0, 229, 250, 0.3); }
        .cyber-grid { background-image: linear-gradient(rgba(0, 229, 250, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 250, 0.03) 1px, transparent 1px); background-size: 50px 50px; }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen cyber-grid">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc4MjMwMjgsImV4cCI6MjA1MzM5OTAyOH0.S0LKvPzVIfBsLv-2qjXRdMGhnYyRLvOFlo9ihaQuqHE';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const DEMO_INTEGRATIONS = [
            { id: 1, name: 'HubSpot CRM', type: 'crm', status: 'connected', last_sync: '2025-02-02T10:30:00Z', records_synced: 1247, api_key_set: true, webhook_url: 'https://missionpulse.io/webhooks/hubspot', icon: '🧡' },
            { id: 2, name: 'SharePoint', type: 'document', status: 'connected', last_sync: '2025-02-02T09:15:00Z', records_synced: 892, api_key_set: true, webhook_url: null, icon: '📁' },
            { id: 3, name: 'SAM.gov', type: 'opportunity', status: 'connected', last_sync: '2025-02-02T08:00:00Z', records_synced: 156, api_key_set: true, webhook_url: 'https://missionpulse.io/webhooks/sam', icon: '🏛️' },
            { id: 4, name: 'Microsoft 365', type: 'productivity', status: 'connected', last_sync: '2025-02-02T11:00:00Z', records_synced: 2341, api_key_set: true, webhook_url: null, icon: '📊' },
            { id: 5, name: 'DocuSign', type: 'signature', status: 'disconnected', last_sync: null, records_synced: 0, api_key_set: false, webhook_url: null, icon: '✍️' },
            { id: 6, name: 'Slack', type: 'communication', status: 'pending', last_sync: null, records_synced: 0, api_key_set: true, webhook_url: 'https://missionpulse.io/webhooks/slack', icon: '💬' },
            { id: 7, name: 'GovWin IQ', type: 'opportunity', status: 'error', last_sync: '2025-02-01T14:00:00Z', records_synced: 89, api_key_set: true, webhook_url: null, icon: '🎯', error_message: 'API rate limit exceeded' },
            { id: 8, name: 'FPDS', type: 'opportunity', status: 'connected', last_sync: '2025-02-02T07:30:00Z', records_synced: 423, api_key_set: true, webhook_url: null, icon: '📋' },
        ];

        const DEMO_SYNC_LOGS = [
            { id: 1, integration_id: 1, timestamp: '2025-02-02T10:30:00Z', status: 'success', records_processed: 47, duration_ms: 2340, message: 'Synced 47 contacts from HubSpot' },
            { id: 2, integration_id: 2, timestamp: '2025-02-02T09:15:00Z', status: 'success', records_processed: 12, duration_ms: 8920, message: 'Uploaded 12 documents to SharePoint' },
            { id: 3, integration_id: 3, timestamp: '2025-02-02T08:00:00Z', status: 'success', records_processed: 8, duration_ms: 4560, message: 'Found 8 new opportunities matching filters' },
            { id: 4, integration_id: 7, timestamp: '2025-02-01T14:00:00Z', status: 'error', records_processed: 0, duration_ms: 1200, message: 'API rate limit exceeded. Retry in 1 hour.' },
            { id: 5, integration_id: 4, timestamp: '2025-02-02T11:00:00Z', status: 'success', records_processed: 156, duration_ms: 12400, message: 'Calendar and email sync complete' },
        ];

        function IntegrationsHub() {
            const [integrations, setIntegrations] = useState([]);
            const [syncLogs, setSyncLogs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedIntegration, setSelectedIntegration] = useState(null);
            const [showModal, setShowModal] = useState(false);
            const [showConfigModal, setShowConfigModal] = useState(false);
            const [configData, setConfigData] = useState({ api_key: '', webhook_url: '' });

            useEffect(() => {
                fetchData();
            }, []);

            async function fetchData() {
                try {
                    const [intResult, logResult] = await Promise.all([
                        supabase.from('integrations').select('*').order('name'),
                        supabase.from('sync_logs').select('*').order('timestamp', { ascending: false }).limit(20)
                    ]);
                    setIntegrations(intResult.data?.length ? intResult.data : DEMO_INTEGRATIONS);
                    setSyncLogs(logResult.data?.length ? logResult.data : DEMO_SYNC_LOGS);
                } catch (err) {
                    console.log('Using demo data');
                    setIntegrations(DEMO_INTEGRATIONS);
                    setSyncLogs(DEMO_SYNC_LOGS);
                } finally {
                    setLoading(false);
                }
            }

            async function toggleConnection(integration) {
                const newStatus = integration.status === 'connected' ? 'disconnected' : 'connected';
                try {
                    await supabase.from('integrations').update({ status: newStatus }).eq('id', integration.id);
                    fetchData();
                } catch (err) {
                    setIntegrations(integrations.map(i => i.id === integration.id ? { ...i, status: newStatus } : i));
                }
            }

            async function triggerSync(integration) {
                // Simulate sync
                const newLog = {
                    id: Date.now(),
                    integration_id: integration.id,
                    timestamp: new Date().toISOString(),
                    status: 'success',
                    records_processed: Math.floor(Math.random() * 50) + 1,
                    duration_ms: Math.floor(Math.random() * 5000) + 1000,
                    message: `Manual sync triggered for ${integration.name}`
                };
                setSyncLogs([newLog, ...syncLogs]);
                setIntegrations(integrations.map(i => i.id === integration.id ? { ...i, last_sync: new Date().toISOString() } : i));
            }

            function openConfig(integration) {
                setSelectedIntegration(integration);
                setConfigData({ api_key: '', webhook_url: integration.webhook_url || '' });
                setShowConfigModal(true);
            }

            async function saveConfig() {
                try {
                    await supabase.from('integrations').update({
                        api_key_set: !!configData.api_key,
                        webhook_url: configData.webhook_url
                    }).eq('id', selectedIntegration.id);
                    fetchData();
                } catch (err) {
                    setIntegrations(integrations.map(i => i.id === selectedIntegration.id ? { ...i, webhook_url: configData.webhook_url, api_key_set: !!configData.api_key } : i));
                }
                setShowConfigModal(false);
            }

            const getStatusBadge = (status) => {
                const styles = {
                    connected: { bg: 'bg-green-500/20', text: 'text-green-400', dot: 'bg-green-400' },
                    disconnected: { bg: 'bg-gray-500/20', text: 'text-gray-400', dot: 'bg-gray-400' },
                    pending: { bg: 'bg-yellow-500/20', text: 'text-yellow-400', dot: 'bg-yellow-400 pulse' },
                    error: { bg: 'bg-red-500/20', text: 'text-red-400', dot: 'bg-red-400' }
                };
                return styles[status] || styles.disconnected;
            };

            const formatDate = (dateStr) => {
                if (!dateStr) return 'Never';
                return new Date(dateStr).toLocaleString();
            };

            const stats = {
                total: integrations.length,
                connected: integrations.filter(i => i.status === 'connected').length,
                errors: integrations.filter(i => i.status === 'error').length,
                totalRecords: integrations.reduce((sum, i) => sum + i.records_synced, 0)
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-[#00E5FA] text-xl">Loading Integrations Hub...</div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-6">
                    {/* Header */}
                    <div className="flex items-center justify-between mb-8">
                        <div>
                            <h1 className="text-3xl font-bold text-white flex items-center gap-3">
                                <span className="text-4xl">🔌</span> Integrations Hub
                            </h1>
                            <p className="text-gray-400 mt-1">Connect & Sync External Systems</p>
                        </div>
                        <button onClick={() => setShowModal(true)} className="px-6 py-3 bg-[#00E5FA] text-[#00050F] font-semibold rounded-lg hover:bg-[#00E5FA]/80 transition flex items-center gap-2">
                            <span>+</span> Add Integration
                        </button>
                    </div>

                    {/* Stats */}
                    <div className="grid grid-cols-4 gap-4 mb-8">
                        <div className="glass rounded-xl p-4">
                            <div className="text-gray-400 text-sm">Total Integrations</div>
                            <div className="text-3xl font-bold text-white">{stats.total}</div>
                        </div>
                        <div className="glass rounded-xl p-4 border-l-4 border-green-500">
                            <div className="text-gray-400 text-sm">Connected</div>
                            <div className="text-3xl font-bold text-green-400">{stats.connected}</div>
                        </div>
                        <div className="glass rounded-xl p-4 border-l-4 border-red-500">
                            <div className="text-gray-400 text-sm">Errors</div>
                            <div className="text-3xl font-bold text-red-400">{stats.errors}</div>
                        </div>
                        <div className="glass rounded-xl p-4 border-l-4 border-[#00E5FA]">
                            <div className="text-gray-400 text-sm">Records Synced</div>
                            <div className="text-3xl font-bold text-[#00E5FA]">{stats.totalRecords.toLocaleString()}</div>
                        </div>
                    </div>

                    <div className="grid grid-cols-3 gap-6">
                        {/* Integrations Grid */}
                        <div className="col-span-2">
                            <h2 className="text-xl font-semibold text-white mb-4">Connected Services</h2>
                            <div className="grid grid-cols-2 gap-4">
                                {integrations.map((integration) => {
                                    const badge = getStatusBadge(integration.status);
                                    return (
                                        <div key={integration.id} className="glass rounded-xl p-5 hover:glow transition-all">
                                            <div className="flex items-start justify-between mb-4">
                                                <div className="flex items-center gap-3">
                                                    <span className="text-3xl">{integration.icon}</span>
                                                    <div>
                                                        <h3 className="font-semibold text-white">{integration.name}</h3>
                                                        <span className="text-xs text-gray-500 uppercase">{integration.type}</span>
                                                    </div>
                                                </div>
                                                <div className={`flex items-center gap-2 px-3 py-1 rounded-full ${badge.bg}`}>
                                                    <span className={`w-2 h-2 rounded-full ${badge.dot}`}></span>
                                                    <span className={`text-xs font-medium ${badge.text}`}>{integration.status}</span>
                                                </div>
                                            </div>
                                            
                                            {integration.error_message && (
                                                <div className="bg-red-500/10 border border-red-500/30 rounded-lg p-2 mb-3 text-red-400 text-xs">
                                                    ⚠️ {integration.error_message}
                                                </div>
                                            )}

                                            <div className="space-y-2 text-sm mb-4">
                                                <div className="flex justify-between">
                                                    <span className="text-gray-400">Last Sync</span>
                                                    <span className="text-gray-300">{formatDate(integration.last_sync)}</span>
                                                </div>
                                                <div className="flex justify-between">
                                                    <span className="text-gray-400">Records</span>
                                                    <span className="text-[#00E5FA]">{integration.records_synced.toLocaleString()}</span>
                                                </div>
                                                <div className="flex justify-between">
                                                    <span className="text-gray-400">API Key</span>
                                                    <span className={integration.api_key_set ? 'text-green-400' : 'text-red-400'}>
                                                        {integration.api_key_set ? '✓ Configured' : '✗ Missing'}
                                                    </span>
                                                </div>
                                            </div>

                                            <div className="flex gap-2">
                                                <button onClick={() => toggleConnection(integration)}
                                                    className={`flex-1 px-3 py-2 rounded-lg text-sm font-medium transition ${
                                                        integration.status === 'connected' 
                                                            ? 'bg-red-500/20 text-red-400 hover:bg-red-500/30' 
                                                            : 'bg-green-500/20 text-green-400 hover:bg-green-500/30'
                                                    }`}>
                                                    {integration.status === 'connected' ? 'Disconnect' : 'Connect'}
                                                </button>
                                                <button onClick={() => triggerSync(integration)} disabled={integration.status !== 'connected'}
                                                    className="flex-1 px-3 py-2 bg-[#00E5FA]/20 text-[#00E5FA] rounded-lg text-sm font-medium hover:bg-[#00E5FA]/30 transition disabled:opacity-50 disabled:cursor-not-allowed">
                                                    Sync Now
                                                </button>
                                                <button onClick={() => openConfig(integration)}
                                                    className="px-3 py-2 border border-[#00E5FA]/30 text-gray-300 rounded-lg text-sm hover:bg-[#00E5FA]/10 transition">
                                                    ⚙️
                                                </button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Sync Logs */}
                        <div>
                            <h2 className="text-xl font-semibold text-white mb-4">Sync Activity</h2>
                            <div className="glass rounded-xl p-4 max-h-[600px] overflow-y-auto">
                                {syncLogs.map((log) => (
                                    <div key={log.id} className="border-b border-[#00E5FA]/10 py-3 last:border-0">
                                        <div className="flex items-center justify-between mb-1">
                                            <span className={`text-xs font-semibold ${log.status === 'success' ? 'text-green-400' : 'text-red-400'}`}>
                                                {log.status === 'success' ? '✓' : '✗'} {log.status.toUpperCase()}
                                            </span>
                                            <span className="text-xs text-gray-500">{new Date(log.timestamp).toLocaleTimeString()}</span>
                                        </div>
                                        <p className="text-sm text-gray-300">{log.message}</p>
                                        <div className="flex gap-4 mt-1 text-xs text-gray-500">
                                            <span>{log.records_processed} records</span>
                                            <span>{(log.duration_ms / 1000).toFixed(1)}s</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Config Modal */}
                    {showConfigModal && selectedIntegration && (
                        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
                            <div className="glass rounded-xl p-6 w-full max-w-md glow">
                                <h2 className="text-xl font-bold text-white mb-4 flex items-center gap-2">
                                    <span>{selectedIntegration.icon}</span> Configure {selectedIntegration.name}
                                </h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-gray-400 text-sm">API Key / Token</label>
                                        <input type="password" value={configData.api_key} onChange={(e) => setConfigData({...configData, api_key: e.target.value})}
                                            className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1" placeholder="••••••••••••••••" />
                                    </div>
                                    <div>
                                        <label className="text-gray-400 text-sm">Webhook URL (Optional)</label>
                                        <input type="url" value={configData.webhook_url} onChange={(e) => setConfigData({...configData, webhook_url: e.target.value})}
                                            className="w-full bg-[#00050F] border border-[#00E5FA]/30 rounded-lg px-4 py-2 text-white mt-1" placeholder="https://..." />
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 mt-6">
                                    <button onClick={() => setShowConfigModal(false)} className="px-4 py-2 border border-gray-600 text-gray-300 rounded-lg hover:bg-gray-800">Cancel</button>
                                    <button onClick={saveConfig} className="px-6 py-2 bg-[#00E5FA] text-[#00050F] font-semibold rounded-lg hover:bg-[#00E5FA]/80">Save Configuration</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<IntegrationsHub />);
    </script>
</body>
</html>
