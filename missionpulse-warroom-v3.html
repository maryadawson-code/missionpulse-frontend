<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | War Room</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --mmt-cyan: #00E5FA; --mmt-navy: #00050F; --mmt-surface: #0f172a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--mmt-navy); color: #e2e8f0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .animate-pulse { animation: pulse 2s infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
// ============================================================
// MISSIONPULSE WAR ROOM V3
// Mission Meets Tech © 2026
// ============================================================

const { useState, useEffect } = React;

// CONFIG - CORRECT SUPABASE URL
const CONFIG = {
  SUPABASE_URL: 'https://qdrtpnpnhkxvfmvfziop.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8',
  API_URL: 'https://missionpulse-api.onrender.com',
  LOGIN_PAGE: 'login.html'
};

const supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

// DEMO DATA
const DEMO_OPPORTUNITIES = [
  { id: 1, name: 'VA EHR Modernization', agency: 'Department of Veterans Affairs', value: 245000000, pwin: 72, phase: 'Capture', dueDate: '2026-03-15', priority: 'critical' },
  { id: 2, name: 'DHA Telehealth Platform', agency: 'Defense Health Agency', value: 89000000, pwin: 65, phase: 'Proposal', dueDate: '2026-02-28', priority: 'high' },
  { id: 3, name: 'CMS Data Analytics', agency: 'CMS', value: 156000000, pwin: 58, phase: 'Capture', dueDate: '2026-04-10', priority: 'medium' },
  { id: 4, name: 'IHS Patient Portal', agency: 'Indian Health Service', value: 42000000, pwin: 78, phase: 'Final Review', dueDate: '2026-02-15', priority: 'critical' }
];

const SHIPLEY_GATES = [
  { id: 'gate0', name: 'Gate 0: Pursuit', color: '#94a3b8' },
  { id: 'gate1', name: 'Gate 1: Bid Decision', color: '#60a5fa' },
  { id: 'gate2', name: 'Gate 2: Capture Plan', color: '#818cf8' },
  { id: 'gate3', name: 'Gate 3: Proposal Kickoff', color: '#a78bfa' },
  { id: 'gate4', name: 'Gate 4: Pink Team', color: '#f472b6' },
  { id: 'gate5', name: 'Gate 5: Red Team', color: '#fb7185' },
  { id: 'gate6', name: 'Gate 6: Gold Team', color: '#fbbf24' },
  { id: 'gate7', name: 'Gate 7: Final Submission', color: '#4ade80' }
];

// Auth Check
function checkAuth() {
  const session = localStorage.getItem('MP_SESSION');
  if (!session) { window.location.href = CONFIG.LOGIN_PAGE; return null; }
  try { return JSON.parse(localStorage.getItem('MP_USER')); }
  catch { return { email: 'demo@mmt.com', role: 'CEO', name: 'Demo User' }; }
}

// Icons
const Icons = {
  back: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>,
  target: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
  chart: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
  users: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
  clock: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
  flag: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9" /></svg>,
};

// Opportunity Card
function OpportunityCard({ opp, onClick }) {
  const priorityColors = { critical: 'border-red-500 bg-red-500/10', high: 'border-amber-500 bg-amber-500/10', medium: 'border-blue-500 bg-blue-500/10', low: 'border-slate-500 bg-slate-500/10' };
  const daysLeft = Math.ceil((new Date(opp.dueDate) - new Date()) / (1000 * 60 * 60 * 24));
  
  return (
    <div onClick={onClick} className={`glass rounded-xl p-4 cursor-pointer hover:border-cyan-500/50 transition-all border-l-4 ${priorityColors[opp.priority]}`}>
      <div className="flex justify-between items-start mb-3">
        <h3 className="font-semibold text-white">{opp.name}</h3>
        <span className={`px-2 py-1 rounded text-xs font-medium ${opp.pwin >= 70 ? 'bg-green-500/20 text-green-400' : opp.pwin >= 50 ? 'bg-amber-500/20 text-amber-400' : 'bg-red-500/20 text-red-400'}`}>
          {opp.pwin}% pWin
        </span>
      </div>
      <p className="text-sm text-slate-400 mb-2">{opp.agency}</p>
      <div className="flex justify-between text-sm">
        <span className="text-cyan-400 font-medium">${(opp.value / 1000000).toFixed(0)}M</span>
        <span className={`${daysLeft <= 14 ? 'text-red-400' : daysLeft <= 30 ? 'text-amber-400' : 'text-slate-400'}`}>
          {daysLeft}d left
        </span>
      </div>
      <div className="mt-2 pt-2 border-t border-slate-700/50">
        <span className="text-xs px-2 py-1 bg-slate-700/50 rounded">{opp.phase}</span>
      </div>
    </div>
  );
}

// Gate Progress
function GateProgress({ currentGate = 3 }) {
  return (
    <div className="glass rounded-xl p-4">
      <h3 className="text-lg font-semibold text-white mb-4 flex items-center gap-2">
        <Icons.flag /> Shipley Gate Progress
      </h3>
      <div className="space-y-2">
        {SHIPLEY_GATES.map((gate, idx) => (
          <div key={gate.id} className="flex items-center gap-3">
            <div className={`w-4 h-4 rounded-full flex-shrink-0 ${idx <= currentGate ? 'ring-2 ring-offset-2 ring-offset-slate-900' : ''}`} 
                 style={{ backgroundColor: gate.color, opacity: idx <= currentGate ? 1 : 0.3 }} />
            <span className={`text-sm ${idx === currentGate ? 'text-white font-medium' : idx < currentGate ? 'text-slate-400' : 'text-slate-600'}`}>
              {gate.name}
            </span>
            {idx === currentGate && <span className="ml-auto text-xs bg-cyan-500/20 text-cyan-400 px-2 py-0.5 rounded">Current</span>}
            {idx < currentGate && <span className="ml-auto text-xs text-green-400">✓</span>}
          </div>
        ))}
      </div>
    </div>
  );
}

// Win Strategy Panel
function WinStrategy({ opp }) {
  const strategies = [
    { theme: 'Technical Excellence', strength: 85, description: 'Leverage proven EHR implementation methodology' },
    { theme: 'Past Performance', strength: 92, description: 'VA EHRM and DHA contracts demonstrate capability' },
    { theme: 'Price Competitiveness', strength: 68, description: 'GSA Schedule rates vs competitors' },
    { theme: 'Small Business Advantage', strength: 75, description: 'SDVOSB set-aside preference' }
  ];
  
  return (
    <div className="glass rounded-xl p-4">
      <h3 className="text-lg font-semibold text-white mb-4 flex items-center gap-2">
        <Icons.target /> Win Strategy Themes
      </h3>
      <div className="space-y-4">
        {strategies.map((s, idx) => (
          <div key={idx}>
            <div className="flex justify-between mb-1">
              <span className="text-sm text-slate-300">{s.theme}</span>
              <span className={`text-sm font-medium ${s.strength >= 80 ? 'text-green-400' : s.strength >= 60 ? 'text-amber-400' : 'text-red-400'}`}>{s.strength}%</span>
            </div>
            <div className="w-full h-2 bg-slate-700 rounded-full overflow-hidden">
              <div className="h-full rounded-full transition-all" 
                   style={{ width: `${s.strength}%`, backgroundColor: s.strength >= 80 ? '#4ade80' : s.strength >= 60 ? '#fbbf24' : '#f87171' }} />
            </div>
            <p className="text-xs text-slate-500 mt-1">{s.description}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

// Team Assignment
function TeamAssignment() {
  const team = [
    { role: 'Capture Manager', name: 'Michael Torres', status: 'active' },
    { role: 'Proposal Manager', name: 'Lisa Martinez', status: 'active' },
    { role: 'Technical Lead', name: 'Sarah Chen', status: 'active' },
    { role: 'Pricing Lead', name: 'Jennifer Park', status: 'pending' },
    { role: 'Contracts', name: 'Robert Williams', status: 'active' }
  ];
  
  return (
    <div className="glass rounded-xl p-4">
      <h3 className="text-lg font-semibold text-white mb-4 flex items-center gap-2">
        <Icons.users /> Capture Team
      </h3>
      <div className="space-y-3">
        {team.map((member, idx) => (
          <div key={idx} className="flex items-center justify-between">
            <div>
              <p className="text-sm text-white">{member.name}</p>
              <p className="text-xs text-slate-500">{member.role}</p>
            </div>
            <span className={`w-2 h-2 rounded-full ${member.status === 'active' ? 'bg-green-400' : 'bg-amber-400'}`} />
          </div>
        ))}
      </div>
    </div>
  );
}

// Main App
function App() {
  const [user, setUser] = useState(null);
  const [opportunities, setOpportunities] = useState(DEMO_OPPORTUNITIES);
  const [selectedOpp, setSelectedOpp] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const authUser = checkAuth();
    if (authUser) {
      setUser(authUser);
      loadOpportunities();
    }
  }, []);

  async function loadOpportunities() {
    setLoading(true);
    try {
      const { data, error } = await supabase.from('opportunities').select('*').order('due_date', { ascending: true });
      if (data && data.length > 0) {
        setOpportunities(data.map(o => ({
          id: o.id,
          name: o.title || o.name,
          agency: o.agency,
          value: o.value,
          pwin: o.pwin || 50,
          phase: o.phase || 'Capture',
          dueDate: o.due_date,
          priority: o.priority || 'medium'
        })));
      }
    } catch (err) {
      console.log('[MissionPulse] Using demo data:', err.message);
    }
    setLoading(false);
  }

  if (!user) return <div className="min-h-screen flex items-center justify-center"><div className="animate-pulse text-cyan-400">Loading...</div></div>;

  return (
    <div className="min-h-screen bg-slate-950">
      {/* Header */}
      <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white">
              <Icons.back />
            </a>
            <div>
              <h1 className="text-xl font-bold text-white flex items-center gap-2">
                ⚔️ War Room
              </h1>
              <p className="text-sm text-slate-400">Capture Strategy & Pursuit Management</p>
            </div>
          </div>
          <div className="flex items-center gap-4">
            <span className="text-sm text-slate-400">{user.name} ({user.role})</span>
            <div className="w-8 h-8 rounded-full bg-gradient-to-br from-cyan-500 to-teal-500 flex items-center justify-center text-white font-bold text-sm">
              {user.name?.charAt(0) || 'U'}
            </div>
          </div>
        </div>
      </header>

      {/* Main Content */}
      <main className="max-w-7xl mx-auto px-4 py-6">
        {selectedOpp ? (
          /* Detail View */
          <div className="space-y-6">
            <div className="flex items-center justify-between">
              <button onClick={() => setSelectedOpp(null)} className="flex items-center gap-2 text-slate-400 hover:text-white">
                <Icons.back /> Back to Pipeline
              </button>
              <div className="flex gap-2">
                <button className="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm">Schedule Review</button>
                <button className="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg text-sm font-medium">Update Status</button>
              </div>
            </div>

            <div className="glass rounded-xl p-6">
              <div className="flex justify-between items-start mb-4">
                <div>
                  <h2 className="text-2xl font-bold text-white">{selectedOpp.name}</h2>
                  <p className="text-slate-400">{selectedOpp.agency}</p>
                </div>
                <div className="text-right">
                  <p className="text-3xl font-bold text-cyan-400">${(selectedOpp.value / 1000000).toFixed(0)}M</p>
                  <p className="text-sm text-slate-400">Contract Value</p>
                </div>
              </div>
              <div className="grid grid-cols-4 gap-4 mt-6">
                <div className="bg-slate-800/50 rounded-lg p-4 text-center">
                  <p className="text-2xl font-bold text-green-400">{selectedOpp.pwin}%</p>
                  <p className="text-xs text-slate-400">Win Probability</p>
                </div>
                <div className="bg-slate-800/50 rounded-lg p-4 text-center">
                  <p className="text-2xl font-bold text-amber-400">{Math.ceil((new Date(selectedOpp.dueDate) - new Date()) / (1000 * 60 * 60 * 24))}</p>
                  <p className="text-xs text-slate-400">Days to Submission</p>
                </div>
                <div className="bg-slate-800/50 rounded-lg p-4 text-center">
                  <p className="text-2xl font-bold text-purple-400">Gate 4</p>
                  <p className="text-xs text-slate-400">Current Gate</p>
                </div>
                <div className="bg-slate-800/50 rounded-lg p-4 text-center">
                  <p className="text-2xl font-bold text-cyan-400">85%</p>
                  <p className="text-xs text-slate-400">Compliance Score</p>
                </div>
              </div>
            </div>

            <div className="grid grid-cols-3 gap-6">
              <GateProgress currentGate={4} />
              <WinStrategy opp={selectedOpp} />
              <TeamAssignment />
            </div>
          </div>
        ) : (
          /* List View */
          <div className="space-y-6">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-4">
                <h2 className="text-lg font-semibold text-white">Active Pursuits</h2>
                <span className="px-2 py-1 bg-cyan-500/20 text-cyan-400 rounded text-sm">{opportunities.length} opportunities</span>
              </div>
              <button onClick={loadOpportunities} className="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm flex items-center gap-2">
                <Icons.chart /> Refresh
              </button>
            </div>

            {loading ? (
              <div className="text-center py-12 text-slate-400">Loading opportunities...</div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {opportunities.map(opp => (
                  <OpportunityCard key={opp.id} opp={opp} onClick={() => setSelectedOpp(opp)} />
                ))}
              </div>
            )}

            {/* Quick Stats */}
            <div className="grid grid-cols-4 gap-4">
              <div className="glass rounded-xl p-4 text-center">
                <p className="text-3xl font-bold text-cyan-400">${(opportunities.reduce((sum, o) => sum + o.value, 0) / 1000000000).toFixed(2)}B</p>
                <p className="text-sm text-slate-400">Pipeline Value</p>
              </div>
              <div className="glass rounded-xl p-4 text-center">
                <p className="text-3xl font-bold text-green-400">{Math.round(opportunities.reduce((sum, o) => sum + o.pwin, 0) / opportunities.length)}%</p>
                <p className="text-sm text-slate-400">Avg Win Probability</p>
              </div>
              <div className="glass rounded-xl p-4 text-center">
                <p className="text-3xl font-bold text-amber-400">{opportunities.filter(o => o.priority === 'critical').length}</p>
                <p className="text-sm text-slate-400">Critical Pursuits</p>
              </div>
              <div className="glass rounded-xl p-4 text-center">
                <p className="text-3xl font-bold text-purple-400">{opportunities.filter(o => Math.ceil((new Date(o.dueDate) - new Date()) / (1000 * 60 * 60 * 24)) <= 30).length}</p>
                <p className="text-sm text-slate-400">Due Within 30 Days</p>
              </div>
            </div>
          </div>
        )}
      </main>

      {/* Footer */}
      <footer className="border-t border-slate-800 mt-12">
        <div className="max-w-7xl mx-auto px-4 py-4 text-center text-xs text-slate-500">
          Mission Meets Tech © 2026 | MissionPulse v3.0 | War Room Module
        </div>
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
