<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - War Room</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse-slow { animation: pulse 3s ease-in-out infinite; }
    @keyframes slide-left { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    .ticker { animation: slide-left 30s linear infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    // ============================================
    // CONFIGURATION
    // ============================================
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const API_URL = 'https://missionpulse-api.onrender.com';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // ============================================
    // DEMO DATA
    // ============================================
    const DEMO_OPPORTUNITY = {
      id: 1,
      title: 'VA EHR Modernization',
      agency: 'VA',
      phase: 'Blue Team',
      ceiling_value: 125000000,
      pwin: 72,
      due_date: '2026-02-15',
      priority: 'critical',
      solicitation_number: 'VA-EHR-2026-001',
      naics: '541512',
      set_aside: 'SDVOSB',
      contract_type: 'FFP'
    };

    const DEMO_MILESTONES = [
      { id: 1, name: 'RFP Release', date: '2026-01-10', status: 'completed', icon: '📄' },
      { id: 2, name: 'Q&A Deadline', date: '2026-01-20', status: 'completed', icon: '❓' },
      { id: 3, name: 'Blue Team Review', date: '2026-01-30', status: 'active', icon: '🔵' },
      { id: 4, name: 'Pink Team Review', date: '2026-02-05', status: 'upcoming', icon: '🩷' },
      { id: 5, name: 'Red Team Review', date: '2026-02-10', status: 'upcoming', icon: '🔴' },
      { id: 6, name: 'Gold Team Final', date: '2026-02-13', status: 'upcoming', icon: '🟡' },
      { id: 7, name: 'Submission', date: '2026-02-15', status: 'upcoming', icon: '🚀' }
    ];

    const DEMO_TEAM = [
      { id: 1, name: 'Mary Womack', role: 'CEO', status: 'online', avatar: '👩‍💼', tasks: 2 },
      { id: 2, name: 'Sarah Chen', role: 'Capture Manager', status: 'online', avatar: '👩‍💻', tasks: 5 },
      { id: 3, name: 'Mike Torres', role: 'Pricing Lead', status: 'busy', avatar: '👨‍💼', tasks: 3 },
      { id: 4, name: 'Lisa Park', role: 'Technical Lead', status: 'online', avatar: '👩‍🔬', tasks: 4 },
      { id: 5, name: 'James Wilson', role: 'Contracts', status: 'away', avatar: '👨‍⚖️', tasks: 2 },
      { id: 6, name: 'AI Assistant', role: 'MissionPulse AI', status: 'online', avatar: '🤖', tasks: 12 }
    ];

    const DEMO_ALERTS = [
      { id: 1, type: 'critical', message: 'Blue Team review due TODAY', time: '2 hours', icon: '🔴' },
      { id: 2, type: 'warning', message: 'Section L compliance at 85%', time: '4 hours', icon: '⚠️' },
      { id: 3, type: 'info', message: 'Pricing model updated by Mike', time: '6 hours', icon: 'ℹ️' },
      { id: 4, type: 'success', message: 'Technical volume approved', time: '1 day', icon: '✅' }
    ];

    const DEMO_TASKS = [
      { id: 1, title: 'Complete Section L compliance matrix', assignee: 'Sarah Chen', due: '2026-01-30', status: 'in_progress', priority: 'critical' },
      { id: 2, title: 'Finalize pricing BOE', assignee: 'Mike Torres', due: '2026-01-31', status: 'in_progress', priority: 'high' },
      { id: 3, title: 'Review past performance narratives', assignee: 'Lisa Park', due: '2026-02-01', status: 'pending', priority: 'high' },
      { id: 4, title: 'Update org chart', assignee: 'James Wilson', due: '2026-02-02', status: 'pending', priority: 'medium' },
      { id: 5, title: 'Executive summary draft', assignee: 'Mary Womack', due: '2026-02-03', status: 'pending', priority: 'high' }
    ];

    const PHASE_COLORS = {
      'Qualify': 'slate', 'Capture': 'purple', 'Blue Team': 'blue', 'Pink Team': 'pink',
      'Red Team': 'red', 'Gold Team': 'amber', 'White Glove': 'emerald', 'Submitted': 'cyan'
    };

    // ============================================
    // AI INTEGRATION
    // ============================================
    const sendToAI = async (message, context = {}) => {
      try {
        const response = await fetch(`${API_URL}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, agent: 'capture', context: { module: 'warroom', ...context } })
        });
        if (!response.ok) throw new Error('API error');
        const data = await response.json();
        return { content: data.response, provider: 'anthropic' };
      } catch (e) {
        return { content: 'AI service temporarily unavailable.', error: true };
      }
    };

    // ============================================
    // UTILITY FUNCTIONS
    // ============================================
    const formatCurrency = (v) => v >= 1e6 ? `$${(v/1e6).toFixed(0)}M` : `$${(v/1e3).toFixed(0)}K`;
    const formatDate = (d) => new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const getDaysLeft = (d) => Math.ceil((new Date(d) - new Date()) / 86400000);

    // ============================================
    // COMPONENTS
    // ============================================

    // Countdown Timer
    const CountdownTimer = ({ dueDate }) => {
      const [timeLeft, setTimeLeft] = React.useState({});
      
      React.useEffect(() => {
        const timer = setInterval(() => {
          const diff = new Date(dueDate) - new Date();
          if (diff > 0) {
            setTimeLeft({
              days: Math.floor(diff / 86400000),
              hours: Math.floor((diff % 86400000) / 3600000),
              minutes: Math.floor((diff % 3600000) / 60000),
              seconds: Math.floor((diff % 60000) / 1000)
            });
          }
        }, 1000);
        return () => clearInterval(timer);
      }, [dueDate]);

      const TimeBlock = ({ value, label }) => (
        <div className="text-center">
          <div className="text-4xl md:text-5xl font-bold font-mono text-cyan-400">{String(value).padStart(2, '0')}</div>
          <div className="text-xs text-slate-400 uppercase tracking-wider">{label}</div>
        </div>
      );

      return (
        <div className="glass rounded-xl border border-cyan-500/30 p-6">
          <h3 className="text-sm text-slate-400 text-center mb-4">⏰ TIME TO SUBMISSION</h3>
          <div className="flex justify-center gap-4 md:gap-8">
            <TimeBlock value={timeLeft.days || 0} label="Days" />
            <div className="text-4xl text-slate-600 self-start">:</div>
            <TimeBlock value={timeLeft.hours || 0} label="Hours" />
            <div className="text-4xl text-slate-600 self-start">:</div>
            <TimeBlock value={timeLeft.minutes || 0} label="Min" />
            <div className="text-4xl text-slate-600 self-start">:</div>
            <TimeBlock value={timeLeft.seconds || 0} label="Sec" />
          </div>
        </div>
      );
    };

    // Timeline
    const Timeline = ({ milestones }) => (
      <div className="glass rounded-xl border border-slate-700/50 p-6">
        <h3 className="font-semibold text-white mb-4">📅 Proposal Timeline</h3>
        <div className="relative">
          <div className="absolute left-4 top-0 bottom-0 w-0.5 bg-slate-700"></div>
          <div className="space-y-4">
            {milestones.map((m, i) => (
              <div key={m.id} className="relative flex items-center gap-4 pl-10">
                <div className={`absolute left-2 w-5 h-5 rounded-full flex items-center justify-center text-xs ${
                  m.status === 'completed' ? 'bg-emerald-500' :
                  m.status === 'active' ? 'bg-cyan-500 animate-pulse-slow' :
                  'bg-slate-700'
                }`}>
                  {m.status === 'completed' ? '✓' : m.icon}
                </div>
                <div className="flex-1 flex items-center justify-between">
                  <div>
                    <p className={`font-medium ${m.status === 'active' ? 'text-cyan-400' : 'text-white'}`}>{m.name}</p>
                    <p className="text-xs text-slate-500">{formatDate(m.date)}</p>
                  </div>
                  {m.status === 'active' && (
                    <span className="px-2 py-0.5 bg-cyan-500/20 text-cyan-400 rounded text-xs">IN PROGRESS</span>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );

    // Team Status
    const TeamStatus = ({ team }) => (
      <div className="glass rounded-xl border border-slate-700/50 p-6">
        <h3 className="font-semibold text-white mb-4">👥 Team Status</h3>
        <div className="space-y-3">
          {team.map(member => (
            <div key={member.id} className="flex items-center gap-3">
              <div className="relative">
                <span className="text-2xl">{member.avatar}</span>
                <span className={`absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full border-2 border-slate-900 ${
                  member.status === 'online' ? 'bg-emerald-500' :
                  member.status === 'busy' ? 'bg-red-500' :
                  'bg-amber-500'
                }`}></span>
              </div>
              <div className="flex-1 min-w-0">
                <p className="text-sm font-medium text-white truncate">{member.name}</p>
                <p className="text-xs text-slate-500">{member.role}</p>
              </div>
              <span className="px-2 py-0.5 bg-slate-800 rounded text-xs text-slate-400">
                {member.tasks} tasks
              </span>
            </div>
          ))}
        </div>
      </div>
    );

    // Alerts Panel
    const AlertsPanel = ({ alerts }) => (
      <div className="glass rounded-xl border border-slate-700/50 p-6">
        <h3 className="font-semibold text-white mb-4">🚨 Alerts</h3>
        <div className="space-y-3">
          {alerts.map(alert => (
            <div key={alert.id} className={`p-3 rounded-lg border ${
              alert.type === 'critical' ? 'bg-red-500/10 border-red-500/30' :
              alert.type === 'warning' ? 'bg-amber-500/10 border-amber-500/30' :
              alert.type === 'success' ? 'bg-emerald-500/10 border-emerald-500/30' :
              'bg-slate-800 border-slate-700'
            }`}>
              <div className="flex items-start gap-2">
                <span>{alert.icon}</span>
                <div className="flex-1">
                  <p className="text-sm text-white">{alert.message}</p>
                  <p className="text-xs text-slate-500">{alert.time} ago</p>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    );

    // Tasks Table
    const TasksTable = ({ tasks }) => {
      const priorityColors = {
        critical: 'text-red-400 bg-red-500/20',
        high: 'text-amber-400 bg-amber-500/20',
        medium: 'text-blue-400 bg-blue-500/20',
        low: 'text-slate-400 bg-slate-500/20'
      };
      const statusIcons = { pending: '○', in_progress: '◐', completed: '●' };

      return (
        <div className="glass rounded-xl border border-slate-700/50 overflow-hidden">
          <div className="p-4 border-b border-slate-700 flex items-center justify-between">
            <h3 className="font-semibold text-white">📋 Active Tasks</h3>
            <button className="px-3 py-1.5 bg-cyan-600 hover:bg-cyan-500 rounded text-sm">+ Add Task</button>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full">
              <thead className="bg-slate-800/50">
                <tr className="text-left text-xs text-slate-400 uppercase">
                  <th className="py-3 px-4">Task</th>
                  <th className="py-3 px-4">Assignee</th>
                  <th className="py-3 px-4">Due</th>
                  <th className="py-3 px-4">Priority</th>
                  <th className="py-3 px-4">Status</th>
                </tr>
              </thead>
              <tbody>
                {tasks.map(task => (
                  <tr key={task.id} className="border-b border-slate-800 hover:bg-slate-800/30">
                    <td className="py-3 px-4 text-white">{task.title}</td>
                    <td className="py-3 px-4 text-slate-400">{task.assignee}</td>
                    <td className="py-3 px-4 text-sm">{formatDate(task.due)}</td>
                    <td className="py-3 px-4">
                      <span className={`px-2 py-0.5 rounded text-xs ${priorityColors[task.priority]}`}>
                        {task.priority.toUpperCase()}
                      </span>
                    </td>
                    <td className="py-3 px-4">
                      <span className={`${task.status === 'in_progress' ? 'text-cyan-400' : 'text-slate-400'}`}>
                        {statusIcons[task.status]} {task.status.replace('_', ' ')}
                      </span>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    // Opportunity Header Card
    const OpportunityHeader = ({ opp }) => {
      const color = PHASE_COLORS[opp.phase] || 'slate';
      return (
        <div className={`glass rounded-xl border border-${color}-500/30 p-6`}>
          <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
              <div className="flex items-center gap-3 mb-2">
                <span className={`px-3 py-1 rounded-full text-sm bg-${color}-500/20 text-${color}-400`}>
                  {opp.phase}
                </span>
                <span className="px-2 py-0.5 bg-red-500/20 text-red-400 rounded text-xs">
                  {opp.priority?.toUpperCase()}
                </span>
              </div>
              <h1 className="text-2xl font-bold text-white">{opp.title}</h1>
              <p className="text-slate-400">{opp.agency} • {opp.solicitation_number}</p>
            </div>
            <div className="grid grid-cols-3 gap-6 text-center">
              <div>
                <p className="text-xs text-slate-400">Ceiling</p>
                <p className="text-xl font-bold text-cyan-400">{formatCurrency(opp.ceiling_value)}</p>
              </div>
              <div>
                <p className="text-xs text-slate-400">pWin</p>
                <p className="text-xl font-bold text-emerald-400">{opp.pwin}%</p>
              </div>
              <div>
                <p className="text-xs text-slate-400">Due</p>
                <p className="text-xl font-bold text-amber-400">{getDaysLeft(opp.due_date)}d</p>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // AI Chat Widget
    const AIChatWidget = ({ opportunity }) => {
      const [isOpen, setIsOpen] = React.useState(false);
      const [messages, setMessages] = React.useState([]);
      const [input, setInput] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const messagesEndRef = React.useRef(null);

      React.useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      const handleSend = async () => {
        if (!input.trim() || loading) return;
        setMessages(prev => [...prev, { role: 'user', content: input.trim() }]);
        setInput('');
        setLoading(true);
        const result = await sendToAI(input, { opportunity });
        setMessages(prev => [...prev, { role: 'assistant', ...result }]);
        setLoading(false);
      };

      if (!isOpen) {
        return (
          <button onClick={() => setIsOpen(true)} className="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-full shadow-lg hover:shadow-cyan-500/25 transition-all flex items-center justify-center z-50">
            <span className="text-2xl">💬</span>
          </button>
        );
      }

      return (
        <div className="fixed bottom-6 right-6 w-96 h-[500px] glass border border-slate-700 rounded-xl shadow-2xl flex flex-col z-50">
          <div className="flex items-center justify-between p-4 border-b border-slate-700">
            <div>
              <h3 className="font-semibold text-white">War Room Assistant</h3>
              <span className="text-xs text-emerald-400">● Online</span>
            </div>
            <button onClick={() => setIsOpen(false)} className="text-slate-400 hover:text-white">✕</button>
          </div>
          <div className="flex-1 overflow-y-auto p-4 space-y-4">
            {messages.length === 0 && (
              <div className="space-y-2">
                <p className="text-xs text-slate-500">Quick actions:</p>
                {['What tasks are overdue?', 'Summarize proposal status', 'Who needs help?'].map((p, i) => (
                  <button key={i} onClick={() => setInput(p)} className="block w-full text-left px-3 py-2 rounded bg-slate-800 hover:bg-slate-700 text-slate-300 text-sm">{p}</button>
                ))}
              </div>
            )}
            {messages.map((msg, i) => (
              <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-[80%] px-4 py-2 rounded-lg ${msg.role === 'user' ? 'bg-cyan-600 text-white' : msg.error ? 'bg-red-900/50 text-red-300' : 'bg-slate-800 text-slate-200'}`}>{msg.content}</div>
              </div>
            ))}
            {loading && <div className="flex justify-start"><div className="bg-slate-800 px-4 py-2 rounded-lg text-slate-400">...</div></div>}
            <div ref={messagesEndRef} />
          </div>
          <div className="p-4 border-t border-slate-700">
            <div className="flex gap-2">
              <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSend()} placeholder="Ask about this proposal..." className="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500" />
              <button onClick={handleSend} disabled={loading || !input.trim()} className="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 disabled:bg-slate-700 rounded-lg">→</button>
            </div>
          </div>
        </div>
      );
    };

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [opportunity, setOpportunity] = React.useState(DEMO_OPPORTUNITY);
      const [milestones, setMilestones] = React.useState(DEMO_MILESTONES);
      const [team, setTeam] = React.useState(DEMO_TEAM);
      const [alerts, setAlerts] = React.useState(DEMO_ALERTS);
      const [tasks, setTasks] = React.useState(DEMO_TASKS);
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);

      React.useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        try {
          const { data: opps } = await supabase
            .from('opportunities')
            .select('*')
            .eq('priority', 'critical')
            .order('due_date')
            .limit(1)
            .single();

          if (opps) {
            setOpportunity(opps);
            setConnected(true);
          }
        } catch (e) {
          console.log('Using demo data');
        } finally {
          setLoading(false);
        }
      };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-slate-400">Loading War Room...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-700/50 rounded-lg">← Back</a>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center">🎯</div>
                  <div>
                    <h1 className="text-xl font-bold text-white">War Room</h1>
                    <p className="text-xs text-slate-400">Real-Time Operations Center</p>
                  </div>
                </div>
              </div>
              <div className={`px-3 py-1 rounded-full text-xs ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                {connected ? '● Live' : '○ Demo'}
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8 space-y-6">
            {/* Opportunity Header */}
            <OpportunityHeader opp={opportunity} />

            {/* Countdown */}
            <CountdownTimer dueDate={opportunity.due_date} />

            {/* Main Grid */}
            <div className="grid lg:grid-cols-3 gap-6">
              <div className="lg:col-span-2 space-y-6">
                <TasksTable tasks={tasks} />
              </div>
              <div className="space-y-6">
                <Timeline milestones={milestones} />
                <AlertsPanel alerts={alerts} />
                <TeamStatus team={team} />
              </div>
            </div>
          </main>

          {/* Footer */}
          <footer className="border-t border-slate-800 py-6">
            <div className="max-w-7xl mx-auto px-6 flex justify-between">
              <p className="text-xs text-slate-500">© 2026 Mission Meets Tech</p>
              <p className="text-xs text-slate-600">AI GENERATED - REQUIRES HUMAN REVIEW</p>
            </div>
          </footer>

          <AIChatWidget opportunity={opportunity} />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
