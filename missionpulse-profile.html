<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-cyan { 0%, 100% { box-shadow: 0 0 0 0 rgba(0, 229, 250, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(0, 229, 250, 0); } }
    .pulse-icon { animation: pulse-cyan 2s infinite; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const ROLES = ['CEO', 'COO', 'CAP', 'PM', 'SA', 'FIN', 'CON', 'DEL', 'QA', 'Partner', 'Admin'];

    // Sidebar
    function Sidebar({ user }) {
      const navItems = [
        { icon: '🏠', label: 'Dashboard', path: 'index.html' },
        { icon: '📊', label: 'Pipeline', path: 'missionpulse-pipeline-v2.html' },
        { icon: '🎯', label: 'War Room', path: 'missionpulse-warroom-v2.html' },
        { icon: '🔍', label: 'RFP Shredder', path: 'missionpulse-rfpshredder-v2.html' },
        { icon: '🎭', label: 'Black Hat', path: 'missionpulse-blackhat-v2.html' },
        { icon: '💰', label: 'Pricing', path: 'missionpulse-pricing-v2.html' },
        { icon: '🤖', label: 'Agent Hub', path: 'missionpulse-agenthub-v2.html' },
        { icon: '⚙️', label: 'Settings', path: 'missionpulse-settings-v2.html' },
        { icon: '👤', label: 'Profile', path: 'missionpulse-profile.html', active: true }
      ];

      return (
        <div className="w-64 bg-slate-900/50 border-r border-slate-700 min-h-screen p-4 hidden lg:block">
          <div className="flex items-center gap-3 mb-8">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center pulse-icon">
              <span className="text-xl">🛡️</span>
            </div>
            <div>
              <div className="font-bold text-cyan-400">MissionPulse</div>
              <div className="text-xs text-slate-400">Profile</div>
            </div>
          </div>
          
          <nav className="space-y-1">
            {navItems.map((item, i) => (
              <a 
                key={i}
                href={item.path}
                className={`flex items-center gap-3 px-3 py-2 rounded-lg transition-all ${
                  item.active 
                    ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' 
                    : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                }`}
              >
                <span>{item.icon}</span>
                <span className="text-sm">{item.label}</span>
              </a>
            ))}
          </nav>
        </div>
      );
    }

    function App() {
      const [user, setUser] = React.useState(null);
      const [profile, setProfile] = React.useState({
        full_name: '',
        email: '',
        company: '',
        phone: '',
        role: 'Partner'
      });
      const [loading, setLoading] = React.useState(true);
      const [saving, setSaving] = React.useState(false);
      const [message, setMessage] = React.useState(null);
      const [passwordForm, setPasswordForm] = React.useState({
        current: '',
        new: '',
        confirm: ''
      });
      const [changingPassword, setChangingPassword] = React.useState(false);

      React.useEffect(() => {
        loadProfile();
      }, []);

      const loadProfile = async () => {
        // Check demo session
        const demoSession = localStorage.getItem('missionpulse_demo');
        if (demoSession) {
          const demo = JSON.parse(demoSession);
          if (demo.expires > Date.now()) {
            setUser(demo.user);
            setProfile({
              full_name: 'Demo User',
              email: demo.user.email,
              company: 'Demo Company',
              phone: '',
              role: demo.user.role
            });
            setLoading(false);
            return;
          }
        }

        try {
          const { data: { session } } = await supabase.auth.getSession();
          
          if (!session) {
            window.location.href = 'login.html';
            return;
          }

          setUser(session.user);

          const { data: profileData, error } = await supabase
            .from('profiles')
            .select('*')
            .eq('id', session.user.id)
            .single();

          if (profileData) {
            setProfile({
              full_name: profileData.full_name || '',
              email: profileData.email || session.user.email,
              company: profileData.company || '',
              phone: profileData.phone || '',
              role: profileData.role || 'Partner'
            });
          } else {
            setProfile(prev => ({ ...prev, email: session.user.email }));
          }
        } catch (e) {
          console.error('Load profile failed:', e);
        }
        setLoading(false);
      };

      const saveProfile = async () => {
        setSaving(true);
        setMessage(null);

        try {
          const { data: { session } } = await supabase.auth.getSession();
          
          if (!session) {
            setMessage({ type: 'error', text: 'Not authenticated' });
            setSaving(false);
            return;
          }

          const { error } = await supabase
            .from('profiles')
            .upsert({
              id: session.user.id,
              email: profile.email,
              full_name: profile.full_name,
              company: profile.company,
              phone: profile.phone,
              updated_at: new Date().toISOString()
            });

          if (error) throw error;

          setMessage({ type: 'success', text: 'Profile updated successfully!' });
        } catch (e) {
          setMessage({ type: 'error', text: e.message || 'Failed to save profile' });
        }

        setSaving(false);
      };

      const changePassword = async () => {
        if (passwordForm.new !== passwordForm.confirm) {
          setMessage({ type: 'error', text: 'New passwords do not match' });
          return;
        }

        if (passwordForm.new.length < 8) {
          setMessage({ type: 'error', text: 'Password must be at least 8 characters' });
          return;
        }

        setChangingPassword(true);
        setMessage(null);

        try {
          const { error } = await supabase.auth.updateUser({
            password: passwordForm.new
          });

          if (error) throw error;

          setMessage({ type: 'success', text: 'Password changed successfully!' });
          setPasswordForm({ current: '', new: '', confirm: '' });
        } catch (e) {
          setMessage({ type: 'error', text: e.message || 'Failed to change password' });
        }

        setChangingPassword(false);
      };

      const handleSignOut = async () => {
        await supabase.auth.signOut();
        localStorage.removeItem('missionpulse_demo');
        window.location.href = 'login.html';
      };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center mx-auto mb-4 pulse-icon">
                <span className="text-2xl">🛡️</span>
              </div>
              <p className="text-slate-400">Loading profile...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="flex">
          <Sidebar user={user} />
          
          <div className="flex-1 p-6">
            {/* Mobile Header */}
            <div className="lg:hidden flex items-center gap-3 mb-6">
              <a href="index.html" className="text-slate-400 hover:text-white">← Back</a>
            </div>

            {/* Header */}
            <div className="flex items-center justify-between mb-6">
              <div>
                <h1 className="text-2xl font-bold">Profile</h1>
                <p className="text-slate-400 text-sm">Manage your account settings</p>
              </div>
            </div>

            {/* Message */}
            {message && (
              <div className={`mb-6 p-4 rounded-lg ${
                message.type === 'success' 
                  ? 'bg-emerald-500/20 border border-emerald-500/30 text-emerald-300'
                  : 'bg-red-500/20 border border-red-500/30 text-red-300'
              }`}>
                {message.text}
              </div>
            )}

            <div className="grid lg:grid-cols-3 gap-6">
              {/* Profile Info */}
              <div className="lg:col-span-2 space-y-6">
                {/* Basic Info */}
                <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
                  <h2 className="font-semibold mb-4">Basic Information</h2>
                  
                  <div className="grid sm:grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Full Name</label>
                      <input
                        type="text"
                        value={profile.full_name}
                        onChange={(e) => setProfile({ ...profile, full_name: e.target.value })}
                        className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                        placeholder="Your name"
                      />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Email</label>
                      <input
                        type="email"
                        value={profile.email}
                        disabled
                        className="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2 text-sm text-slate-500 cursor-not-allowed"
                      />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Company</label>
                      <input
                        type="text"
                        value={profile.company}
                        onChange={(e) => setProfile({ ...profile, company: e.target.value })}
                        className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                        placeholder="Your company"
                      />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Phone</label>
                      <input
                        type="tel"
                        value={profile.phone}
                        onChange={(e) => setProfile({ ...profile, phone: e.target.value })}
                        className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                        placeholder="(555) 123-4567"
                      />
                    </div>
                  </div>

                  <div className="mt-4 flex justify-end">
                    <button
                      onClick={saveProfile}
                      disabled={saving}
                      className="px-6 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg text-sm font-medium transition-colors disabled:opacity-50"
                    >
                      {saving ? 'Saving...' : 'Save Changes'}
                    </button>
                  </div>
                </div>

                {/* Change Password */}
                <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
                  <h2 className="font-semibold mb-4">Change Password</h2>
                  
                  <div className="space-y-4 max-w-md">
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">New Password</label>
                      <input
                        type="password"
                        value={passwordForm.new}
                        onChange={(e) => setPasswordForm({ ...passwordForm, new: e.target.value })}
                        className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                        placeholder="Min 8 characters"
                      />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-400 mb-1">Confirm New Password</label>
                      <input
                        type="password"
                        value={passwordForm.confirm}
                        onChange={(e) => setPasswordForm({ ...passwordForm, confirm: e.target.value })}
                        className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                        placeholder="••••••••"
                      />
                    </div>
                  </div>

                  <div className="mt-4">
                    <button
                      onClick={changePassword}
                      disabled={changingPassword || !passwordForm.new || !passwordForm.confirm}
                      className="px-6 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium transition-colors disabled:opacity-50"
                    >
                      {changingPassword ? 'Changing...' : 'Change Password'}
                    </button>
                  </div>
                </div>

                {/* Danger Zone */}
                <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-6">
                  <h2 className="font-semibold text-red-400 mb-4">Danger Zone</h2>
                  <p className="text-sm text-slate-400 mb-4">
                    Once you sign out, you'll need to log in again to access MissionPulse.
                  </p>
                  <button
                    onClick={handleSignOut}
                    className="px-6 py-2 bg-red-500/20 hover:bg-red-500/30 border border-red-500/30 text-red-400 rounded-lg text-sm font-medium transition-colors"
                  >
                    Sign Out
                  </button>
                </div>
              </div>

              {/* Sidebar Info */}
              <div className="space-y-6">
                {/* Avatar Card */}
                <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6 text-center">
                  <div className="w-20 h-20 rounded-full bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center mx-auto mb-4 text-3xl font-bold">
                    {profile.full_name?.[0]?.toUpperCase() || profile.email?.[0]?.toUpperCase() || '?'}
                  </div>
                  <h3 className="font-semibold">{profile.full_name || 'No Name'}</h3>
                  <p className="text-sm text-slate-400">{profile.email}</p>
                  <div className="mt-3">
                    <span className="px-3 py-1 bg-cyan-500/20 text-cyan-400 rounded-full text-sm">
                      {profile.role}
                    </span>
                  </div>
                </div>

                {/* Role Info */}
                <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
                  <h3 className="font-semibold mb-3">Your Role</h3>
                  <div className="space-y-2 text-sm">
                    <div className="flex justify-between">
                      <span className="text-slate-400">Current Role</span>
                      <span className="font-medium">{profile.role}</span>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-slate-400">Access Level</span>
                      <span className="font-medium">
                        {['CEO', 'COO', 'Admin'].includes(profile.role) ? 'Full' : 
                         ['CAP', 'PM', 'FIN'].includes(profile.role) ? 'Standard' : 'Limited'}
                      </span>
                    </div>
                  </div>
                  <p className="mt-4 text-xs text-slate-500">
                    Contact your administrator to change your role.
                  </p>
                </div>

                {/* Quick Links */}
                <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
                  <h3 className="font-semibold mb-3">Quick Links</h3>
                  <div className="space-y-2">
                    <a href="missionpulse-settings-v2.html" className="block px-3 py-2 bg-slate-700/50 hover:bg-slate-700 rounded-lg text-sm transition-colors">
                      ⚙️ App Settings
                    </a>
                    <a href="missionpulse-audit-v2.html" className="block px-3 py-2 bg-slate-700/50 hover:bg-slate-700 rounded-lg text-sm transition-colors">
                      📝 Audit Log
                    </a>
                    <a href="missionpulse-health-check.html" className="block px-3 py-2 bg-slate-700/50 hover:bg-slate-700 rounded-lg text-sm transition-colors">
                      💚 Health Check
                    </a>
                  </div>
                </div>
              </div>
            </div>

            {/* Footer */}
            <div className="mt-8 text-center text-xs text-slate-500">
              <div>Mission Meets Tech | MissionPulse</div>
              <div className="mt-1">AI GENERATED - REQUIRES HUMAN REVIEW</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
