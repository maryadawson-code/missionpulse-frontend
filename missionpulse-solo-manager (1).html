            const [opportunity, setOpportunity] = useState(DEMO_OPPORTUNITY);
            const [currentPhase, setCurrentPhase] = useState(2); // Demo: Phase 2 (RFP Analysis)
            const [taskOutputs, setTaskOutputs] = useState(DEMO_TASK_OUTPUTS);
            const [gateApprovals, setGateApprovals] = useState(DEMO_GATE_APPROVALS);
            const [isOnline, setIsOnline] = useState(true);

            // Execute AI task
            const executeTask = async (task) => {
                setTaskOutputs(prev => ({
                    ...prev,
                    [task.id]: { status: 'processing' }
                }));

                // Simulate AI processing
                await new Promise(resolve => setTimeout(resolve, 2000));

                    'rfp-shred': 'Extracted 47 requirements across 5 sections. Key requirements: Section L (Instructions), Section M (Evaluation Factors), PWS (Performance Work Statement). Critical: Page limit 50 pages for technical volume.',
                    'compliance-matrix': 'Compliance matrix generated with 47 requirements mapped to proposal sections. 12 requirements for Volume I, 8 for Volume II, 15 for Volume III, 12 for Volume IV.',
                    'eval-criteria': 'Evaluation: Best Value Trade-Off. Factors: (1) Technical Approach - Most Important, (2) Past Performance - Important, (3) Price - Less Important. Technical/Past Performance combined more important than Price.',
                    'questions-log': 'Generated 8 clarifying questions for Industry Day:\n1. Is partial FedRAMP ATO acceptable with full ATO within 6 months?\n2. Can incumbent past performance be cited by subcontractors?\n3. What is the expected transition period?'
                };

                setTaskOutputs(prev => ({
                    ...prev,
                    [task.id]: {
                        status: 'complete',
                        content: responses[task.id] || `AI analysis complete for ${task.title}. Review the output and proceed to the next task.`,
                        confidence: Math.floor(Math.random() * 20) + 75
                    }
                }));
            };

            // Handle gate approval
            const handleGateApproval = (taskId, approved, notes) => {
                setGateApprovals(prev => ({
                    ...prev,
                    [taskId]: {
                        approved,
                        notes,
                        decision_at: new Date().toISOString().split('T')[0]
                    }
                }));

                // If approved, advance to next phase
                if (approved) {
                    const phase = SOLO_PHASES[currentPhase];
                    const gateTask = phase.tasks.find(t => t.id === taskId);
                    const isLastGate = phase.tasks.filter(t => t.gate).slice(-1)[0]?.id === taskId;
                    
                    if (isLastGate && currentPhase < SOLO_PHASES.length - 1) {
                        setCurrentPhase(p => p + 1);
                    }
                }
            };

            const phase = SOLO_PHASES[currentPhase];
            const completedTasks = phase.tasks.filter(t => 
                taskOutputs[t.id]?.status === 'complete' || 
                gateApprovals[t.id]?.approved
            ).length;

            // Calculate overall progress
            const totalTasks = SOLO_PHASES.reduce((sum, p) => sum + p.tasks.length, 0);
            const completedTotal = Object.values(taskOutputs).filter(o => o.status === 'complete').length +
                                   Object.values(gateApprovals).filter(g => g.approved).length;
            const progressPercent = Math.round((completedTotal / totalTasks) * 100);

            return (
                <div className="min-h-screen">

                                    <div>
                                        <h1 className="text-xl font-bold text-white">Solo Proposal Manager</h1>
                                        <p className="text-xs text-slate-500">Guided Shipley Workflow</p>
                                    </div>
                                </a>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-right">
                                    <div className="text-sm font-medium text-white">{opportunity.name}</div>
                                    <div className="text-xs text-slate-400">Due: {opportunity.due_date}</div>
                                </div>
                                <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-xs ${
                                    isOnline ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'
                                }`}>
                                    <div className={`w-2 h-2 rounded-full ${isOnline ? 'bg-emerald-400' : 'bg-amber-400'}`} />
                                    {isOnline ? 'Online' : 'Demo Mode'}
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Progress Banner */}
                    <div className="bg-gradient-to-r from-cyan-500/10 to-emerald-500/10 border-b border-slate-800">
                        <div className="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="text-4xl">{phase.icon}</div>
                                <div>
                                    <div className="flex items-center gap-2">
                                        <span className="text-sm text-cyan-400">{phase.shipleyPhase}</span>
                                        <span className="text-slate-500">•</span>
                                        <span className="font-semibold text-white">{phase.name}</span>
                                    </div>
                                    <p className="text-sm text-slate-400">{phase.description}</p>
                                </div>
                            </div>
                            <div className="text-right">
                                <div className="text-2xl font-bold text-white">{progressPercent}%</div>
                                <div className="text-xs text-slate-400">Overall Progress</div>
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <main className="max-w-6xl mx-auto px-6 py-8">
                        <div className="grid lg:grid-cols-3 gap-6">
                            {/* Left: Tasks */}
                            <div className="lg:col-span-2 space-y-4">
                                <PhaseProgress 
                                    phases={SOLO_PHASES} 
                                    currentPhase={currentPhase}
                                    taskOutputs={taskOutputs}
                                    gateApprovals={gateApprovals}
                                />
                                
                                <AITipsPanel 
                                    phase={phase}
                                    completedTasks={completedTasks}
                                    totalTasks={phase.tasks.length}
                                />

                                <div className="space-y-3">
                                    {phase.tasks.map(task => (
                                        <TaskCard
                                            key={task.id}
                                            task={task}
                                            phase={phase}
                                            output={taskOutputs[task.id]}
                                            gateApproval={gateApprovals[task.id]}
                                            onExecute={executeTask}
                                            onApprove={handleGateApproval}
                                        />
                                    ))}
                                </div>
                            </div>

                            {/* Right: Sidebar */}
                            <div className="space-y-4">
                                {/* Opportunity Summary */}
                                <div className="glass rounded-xl p-4">
                                    <h3 className="font-semibold text-white mb-3">Opportunity</h3>
                                    <div className="space-y-2 text-sm">
                                        <div className="flex justify-between">
                                            <span className="text-slate-400">Agency</span>
                                            <span className="text-white">{opportunity.agency}</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span className="text-slate-400">Value</span>
                                            <span className="text-emerald-400">${(opportunity.contract_value / 1000000).toFixed(0)}M</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span className="text-slate-400">Set-Aside</span>
                                            <span className="text-cyan-400">{opportunity.set_aside}</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span className="text-slate-400">NAICS</span>
                                            <span className="text-white">{opportunity.naics}</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Phase Timeline */}
                                <div className="glass rounded-xl p-4">
                                    <h3 className="font-semibold text-white mb-3">Phase Timeline</h3>
                                    <div className="space-y-2">
                                        {SOLO_PHASES.slice(Math.max(0, currentPhase - 1), currentPhase + 3).map((p, idx) => (
                                            <div 
                                                key={p.id}
                                                className={`flex items-center gap-3 p-2 rounded-lg ${
                                                    p.id === currentPhase ? 'bg-cyan-500/10 border border-cyan-500/30' : ''
                                                }`}
                                            >
                                                <span className={`text-lg ${
                                                    p.id < currentPhase ? 'opacity-50' : ''
                                                }`}>{p.icon}</span>
                                                <div className="flex-1">
                                                    <div className={`text-sm ${
                                                        p.id === currentPhase ? 'text-white font-medium' : 'text-slate-400'
                                                    }`}>{p.name}</div>
                                                    <div className="text-xs text-slate-500">{p.duration}</div>
                                                </div>
                                                {p.id < currentPhase && (
                                                    <span className="text-emerald-400">✓</span>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* AI Agent */}
                                <div className="glass rounded-xl p-4">
                                    <h3 className="font-semibold text-white mb-3">Active AI Agent</h3>
                                    <div className="flex items-center gap-3 p-3 bg-slate-800/50 rounded-lg">
                                        <div className="w-10 h-10 rounded-lg bg-cyan-500/20 flex items-center justify-center">
                                            <span className="text-xl">🤖</span>
                                        </div>
                                        <div>
                                            <div className="font-medium text-white">{phase.aiRole}</div>
                                            <div className="text-xs text-slate-400">Ready to assist</div>
                                        </div>
                                    </div>
                                </div>

                                {/* Quick Actions */}
                                <div className="glass rounded-xl p-4">
                                    <h3 className="font-semibold text-white mb-3">Quick Actions</h3>
                                    <div className="space-y-2">
                                        <a 
                                            href="missionpulse-agent-hub-v2.html"
                                            className="flex items-center gap-2 p-2 bg-slate-800/50 rounded-lg hover:bg-slate-700/50 transition-colors text-sm"
                                        >
                                            <span>💬</span>
                                            <span className="text-slate-300">Chat with AI</span>
                                        </a>
                                        <a 
                                            href="missionpulse-m8-pricing.html"
                                            className="flex items-center gap-2 p-2 bg-slate-800/50 rounded-lg hover:bg-slate-700/50 transition-colors text-sm"
                                        >
                                            <span>💰</span>
                                            <span className="text-slate-300">Pricing Engine</span>
                                        </a>
                                        <a 
                                            href="missionpulse-orals-v2.html"
                                            className="flex items-center gap-2 p-2 bg-slate-800/50 rounded-lg hover:bg-slate-700/50 transition-colors text-sm"
                                        >
                                            <span>🎤</span>
                                            <span className="text-slate-300">Orals Practice</span>
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="border-t border-slate-800 mt-8">
                        <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
                            <span className="text-slate-500 text-sm">© 2026 Mission Meets Tech</span>
                            <span className="text-slate-600 text-xs">AI GENERATED - REQUIRES HUMAN REVIEW</span>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
