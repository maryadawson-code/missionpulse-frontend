<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Hub | MissionPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:#00050F;color:#e2e8f0;min-height:100vh}
    .glass{background:rgba(15,23,42,0.85);backdrop-filter:blur(16px);border:1px solid rgba(0,229,250,0.1);border-radius:12px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;

const AGENTS=[
  {id:'capture',name:'Capture Agent',icon:'🎯',color:'#3b82f6',desc:'Opportunity qualification and Go/No-Go analysis',prompts:['Analyze this RFP for win probability','What are the key evaluation criteria?','Recommend capture strategy']},
  {id:'strategy',name:'Strategy Agent',icon:'♟️',color:'#8b5cf6',desc:'Win strategy and competitive positioning',prompts:['Develop win themes for this pursuit','How should we differentiate?','Analyze competitive landscape']},
  {id:'writer',name:'Writer Agent',icon:'✍️',color:'#06b6d4',desc:'Proposal content generation and refinement',prompts:['Write executive summary','Improve this technical approach','Generate past performance narrative']},
  {id:'compliance',name:'Compliance Agent',icon:'✓',color:'#10b981',desc:'RFP compliance checking and L/M matrix',prompts:['Check compliance against Section L','Identify missing requirements','Create compliance matrix']},
  {id:'pricing',name:'Pricing Agent',icon:'💰',color:'#f59e0b',desc:'BOE development and price-to-win analysis',prompts:['Validate labor rates','Calculate price-to-win','Review BOE assumptions']},
  {id:'contracts',name:'Contracts Agent',icon:'📜',color:'#f97316',desc:'FAR/DFARS clause analysis and risk assessment',prompts:['Analyze contract clauses','Identify high-risk terms','Recommend negotiation points']},
  {id:'orals',name:'Orals Agent',icon:'🎤',color:'#ec4899',desc:'Presentation preparation and Q&A coaching',prompts:['Prepare for orals presentation','Generate likely questions','Coach on delivery techniques']},
  {id:'blackhat',name:'Black Hat Agent',icon:'🎭',color:'#ef4444',desc:'Competitive intelligence and counter-strategies',prompts:['Analyze competitor strengths','Identify vulnerabilities','Develop ghost strategies']}
];

const API_URL='https://missionpulse-api.onrender.com';

function AgentHub(){
  const[activeAgent,setActiveAgent]=useState(AGENTS[0]);
  const[messages,setMessages]=useState([]);
  const[input,setInput]=useState('');
  const[loading,setLoading]=useState(false);
  const[apiStatus,setApiStatus]=useState('checking');
  const chatRef=useRef(null);

  useEffect(()=>{
    // Check API status
    fetch(`${API_URL}/health`).then(r=>setApiStatus(r.ok?'online':'offline')).catch(()=>setApiStatus('offline'));
  },[]);

  useEffect(()=>{
    // Scroll to bottom on new messages
    if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;
  },[messages]);

  const sendMessage=async(text)=>{
    if(!text.trim())return;
    const userMsg={role:'user',content:text,timestamp:new Date()};
    setMessages(m=>[...m,userMsg]);
    setInput('');
    setLoading(true);

    try{
      // Simulated response for demo (replace with actual API call)
      await new Promise(r=>setTimeout(r,1500));
      
      const responses={
        capture:`Based on my analysis of federal healthcare IT opportunities:\n\n**Win Probability Assessment:**\n- Technical alignment: 85%\n- Past performance relevance: 78%\n- Price competitiveness: 72%\n\n**Recommendation:** This opportunity aligns well with our capabilities. Recommend proceeding to Blue Team with focus on strengthening past performance citations.\n\n⚠️ AI GENERATED - REQUIRES HUMAN REVIEW`,
        strategy:`**Win Strategy Recommendation:**\n\n1. **Lead with Innovation** - Emphasize AI/ML capabilities that reduce manual effort by 40%\n\n2. **Healthcare IT Expertise** - Highlight 15+ years DHA/VA experience\n\n3. **Cost Efficiency** - Demonstrate proven 20% savings through cloud migration\n\n**Key Discriminators:**\n- CMMC Level 2 certified\n- Agile development methodology\n- 24/7 NOC support capability\n\n⚠️ AI GENERATED - REQUIRES HUMAN REVIEW`,
        writer:`**Executive Summary Draft:**\n\nMission Meets Tech brings unmatched healthcare IT expertise to support [Agency]'s modernization objectives. Our team of certified professionals has delivered mission-critical solutions across DHA, VA, and CMS for over 15 years.\n\nOur approach centers on three pillars:\n1. Technical Excellence through proven methodologies\n2. Risk Mitigation via our Iron Dome quality framework\n3. Cost Optimization leveraging cloud-native architectures\n\n⚠️ AI GENERATED - REQUIRES HUMAN REVIEW`,
        compliance:`**Compliance Check Results:**\n\n✓ L.1.1 Technical Approach - ADDRESSED\n✓ L.1.2 Management Plan - ADDRESSED\n⚠️ L.1.3 Staffing Plan - PARTIAL (missing org chart)\n✗ M.2.1 Past Performance - MISSING\n\n**Action Items:**\n1. Add organizational chart to Section 3.2\n2. Complete past performance questionnaire\n3. Verify page count (currently 48/50)\n\n⚠️ AI GENERATED - REQUIRES HUMAN REVIEW`,
        pricing:`**Pricing Analysis:**\n\n| LCAT | Proposed | GSA Rate | Delta |\n|------|----------|----------|-------|\n| PM | $185 | $178 | +3.9% |\n| Sr Eng | $165 | $162 | +1.9% |\n| Analyst | $125 | $128 | -2.3% |\n\n**Price-to-Win Estimate:** $94.2M\n**Current Proposal:** $98.4M (+4.5%)\n\n**Recommendation:** Consider reducing indirect rates or adjusting labor mix to improve competitiveness.\n\n⚠️ AI GENERATED - REQUIRES HUMAN REVIEW`,
        contracts:`**Clause Risk Analysis:**\n\n🔴 **HIGH RISK:**\n- DFARS 252.204-7012 (CMMC) - Requires Level 2 certification\n- FAR 52.219-14 (Subcontracting) - 35% SB requirement\n\n🟡 **MEDIUM RISK:**\n- FAR 52.222-50 (Trafficking) - Standard compliance needed\n\n🟢 **LOW RISK:**\n- FAR 52.212-4 (Standard terms)\n\n**Action:** Verify CMMC certification status before proposal submission.\n\n⚠️ AI GENERATED - REQUIRES HUMAN REVIEW`,
        orals:`**Orals Preparation Guide:**\n\n**Likely Questions:**\n1. How will you ensure continuity during transition?\n2. Describe your approach to managing scope changes.\n3. What sets your technical solution apart?\n\n**Key Messages:**\n- Lead with past performance proof points\n- Emphasize key personnel qualifications\n- Demonstrate understanding of agency mission\n\n**Delivery Tips:**\n- Maintain eye contact with evaluation panel\n- Use concrete examples, not generalities\n- Practice 2-minute responses\n\n⚠️ AI GENERATED - REQUIRES HUMAN REVIEW`,
        blackhat:`**Competitive Intelligence Brief:**\n\n**Primary Threat: Leidos (Incumbent)**\n- Strengths: Deep agency relationships, established processes\n- Weaknesses: Slow to adopt new technology, higher rates\n- Ghost Strategy: Emphasize innovation velocity and cost savings\n\n**Secondary Threat: Booz Allen**\n- Strengths: Strong analytics capability\n- Weaknesses: Less healthcare-specific experience\n- Ghost Strategy: Highlight domain expertise\n\n⚠️ AI GENERATED - REQUIRES HUMAN REVIEW`
      };
      
      const assistantMsg={
        role:'assistant',
        agent:activeAgent.id,
        content:responses[activeAgent.id]||`I've analyzed your request regarding "${text}". Here's my assessment based on federal proposal best practices...\n\n⚠️ AI GENERATED - REQUIRES HUMAN REVIEW`,
        timestamp:new Date(),
        confidence:Math.floor(75+Math.random()*20)
      };
      setMessages(m=>[...m,assistantMsg]);
    }catch(e){
      setMessages(m=>[...m,{role:'error',content:'Failed to get response. API may be warming up.',timestamp:new Date()}]);
    }
    setLoading(false);
  };

  const clearChat=()=>setMessages([]);

  return(
    <div className="min-h-screen flex">
      {/* Agent Sidebar */}
      <div className="w-72 bg-slate-900/50 border-r border-slate-800 p-4">
        <div className="flex items-center gap-2 mb-6">
          <a href="index.html" className="text-slate-400 hover:text-white">←</a>
          <h1 className="text-xl font-bold text-white">🤖 Agent Hub</h1>
        </div>
        <div className="mb-4">
          <div className={`text-xs px-2 py-1 rounded inline-flex items-center gap-1 ${apiStatus==='online'?'bg-emerald-500/20 text-emerald-400':apiStatus==='offline'?'bg-red-500/20 text-red-400':'bg-amber-500/20 text-amber-400'}`}>
            <span className={`w-2 h-2 rounded-full ${apiStatus==='online'?'bg-emerald-400':apiStatus==='offline'?'bg-red-400':'bg-amber-400'}`}></span>
            API {apiStatus}
          </div>
        </div>
        <div className="space-y-2">
          {AGENTS.map(agent=>(
            <div key={agent.id} onClick={()=>{setActiveAgent(agent);clearChat()}} className={`p-3 rounded-lg cursor-pointer transition-all ${activeAgent.id===agent.id?'bg-slate-800 border border-slate-700':'hover:bg-slate-800/50'}`}>
              <div className="flex items-center gap-2">
                <span className="text-xl">{agent.icon}</span>
                <span className="font-medium text-white text-sm">{agent.name}</span>
              </div>
              <p className="text-xs text-slate-500 mt-1 ml-7">{agent.desc}</p>
            </div>
          ))}
        </div>
      </div>

      {/* Chat Area */}
      <div className="flex-1 flex flex-col">
        {/* Header */}
        <div className="p-4 border-b border-slate-800 flex items-center gap-3">
          <span className="text-2xl">{activeAgent.icon}</span>
          <div>
            <h2 className="font-bold text-white">{activeAgent.name}</h2>
            <p className="text-xs text-slate-400">{activeAgent.desc}</p>
          </div>
        </div>

        {/* Messages */}
        <div ref={chatRef} className="flex-1 overflow-y-auto p-4 space-y-4">
          {messages.length===0&&(
            <div className="text-center py-12">
              <span className="text-6xl">{activeAgent.icon}</span>
              <h3 className="text-lg font-semibold text-white mt-4">Start a conversation</h3>
              <p className="text-slate-400 text-sm mt-1">Ask me about {activeAgent.desc.toLowerCase()}</p>
              <div className="mt-6 flex flex-wrap gap-2 justify-center">
                {activeAgent.prompts.map((p,i)=>(
                  <button key={i} onClick={()=>sendMessage(p)} className="px-3 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm text-slate-300">{p}</button>
                ))}
              </div>
            </div>
          )}
          {messages.map((msg,i)=>(
            <div key={i} className={`flex ${msg.role==='user'?'justify-end':''}`}>
              <div className={`max-w-2xl p-4 rounded-lg ${msg.role==='user'?'bg-cyan-500/20 text-white':'glass'}`}>
                {msg.role==='assistant'&&(
                  <div className="flex items-center gap-2 mb-2">
                    <span>{activeAgent.icon}</span>
                    <span className="text-sm font-medium text-white">{activeAgent.name}</span>
                    {msg.confidence&&<span className="text-xs px-2 py-0.5 rounded bg-slate-700 text-slate-400">{msg.confidence}% confidence</span>}
                  </div>
                )}
                <div className="text-sm whitespace-pre-wrap">{msg.content}</div>
                <div className="text-xs text-slate-500 mt-2">{msg.timestamp.toLocaleTimeString()}</div>
              </div>
            </div>
          ))}
          {loading&&(
            <div className="flex">
              <div className="glass p-4">
                <div className="flex items-center gap-2">
                  <span>{activeAgent.icon}</span>
                  <div className="flex gap-1"><span className="w-2 h-2 bg-cyan-400 rounded-full animate-bounce"></span><span className="w-2 h-2 bg-cyan-400 rounded-full animate-bounce" style={{animationDelay:'0.1s'}}></span><span className="w-2 h-2 bg-cyan-400 rounded-full animate-bounce" style={{animationDelay:'0.2s'}}></span></div>
                </div>
              </div>
            </div>
          )}
        </div>

        {/* Input */}
        <div className="p-4 border-t border-slate-800">
          <div className="flex gap-2">
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyPress={e=>e.key==='Enter'&&sendMessage(input)} placeholder={`Ask ${activeAgent.name}...`} className="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-cyan-500 focus:outline-none"/>
            <button onClick={()=>sendMessage(input)} disabled={loading||!input.trim()} className="px-6 py-3 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-lg font-medium disabled:opacity-50">Send</button>
          </div>
          <p className="text-xs text-slate-500 mt-2 text-center">All AI outputs require human review before use in proposals</p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<AgentHub/>,document.getElementById('root'));
</script>
</body>
</html>
