<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Pipeline</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <style>
    @keyframes pulse-cyan { 0%, 100% { box-shadow: 0 0 0 0 rgba(0, 229, 250, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(0, 229, 250, 0); } }
    .pulse-icon { animation: pulse-cyan 2s infinite; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const PHASES = ['Gate 1', 'Gate 2', 'Gate 3', 'Gate 4', 'Gate 5', 'Submitted', 'Won', 'Lost'];
    const PRIORITIES = ['Critical', 'High', 'Medium', 'Low'];
    const SET_ASIDES = ['SDVOSB', '8(a)', 'HUBZone', 'WOSB/EDWOSB', 'Small Business', 'Full & Open'];

    const DEMO_OPPS = [
      { id: '1', nickname: 'EHR-Mod', title: 'DHA Electronic Health Record Modernization', agency: 'Defense Health Agency', ceiling: 125000000, phase: 'Gate 3', pwin: 72, priority: 'Critical', due_date: '2026-03-15', set_aside: 'SDVOSB', status: 'Active' },
      { id: '2', nickname: 'VA-CPA', title: 'VA Claims Processing Automation', agency: 'Veterans Affairs', ceiling: 45000000, phase: 'Gate 2', pwin: 65, priority: 'High', due_date: '2026-04-01', set_aside: '8(a)', status: 'Active' },
      { id: '3', nickname: 'CMS-Fraud', title: 'CMS Medicare Fraud Detection', agency: 'CMS', ceiling: 78000000, phase: 'Gate 4', pwin: 58, priority: 'Critical', due_date: '2026-02-28', set_aside: 'Small Business', status: 'Active' },
      { id: '4', nickname: 'IHS-Tele', title: 'IHS Telehealth Expansion', agency: 'Indian Health Service', ceiling: 32000000, phase: 'Gate 1', pwin: 45, priority: 'Medium', due_date: '2026-05-15', set_aside: 'SDVOSB', status: 'Active' },
      { id: '5', nickname: 'NIH-RDP', title: 'NIH Research Data Platform', agency: 'NIH', ceiling: 95000000, phase: 'Gate 2', pwin: 55, priority: 'High', due_date: '2026-03-30', set_aside: 'Full & Open', status: 'Active' }
    ];

    // Sidebar
    function Sidebar() {
      const navItems = [
        { icon: '🏠', label: 'Dashboard', path: 'index.html' },
        { icon: '📊', label: 'Pipeline', path: 'missionpulse-pipeline-v2.html', active: true },
        { icon: '🎯', label: 'War Room', path: 'missionpulse-warroom-v2.html' },
        { icon: '📋', label: 'Swimlane', path: 'missionpulse-swimlane-v2.html' },
        { icon: '🔍', label: 'RFP Shredder', path: 'missionpulse-rfpshredder-v2.html' },
        { icon: '🎭', label: 'Black Hat', path: 'missionpulse-blackhat-v2.html' },
        { icon: '💰', label: 'Pricing', path: 'missionpulse-pricing-v2.html' },
        { icon: '🤖', label: 'HITL Queue', path: 'missionpulse-hitl-v2.html' },
        { icon: '🤖', label: 'Agent Hub', path: 'missionpulse-agenthub-v2.html' },
        { icon: '⚙️', label: 'Settings', path: 'missionpulse-settings-v2.html' }
      ];

      return (
        <div className="w-64 bg-slate-900/50 border-r border-slate-700 min-h-screen p-4 hidden lg:block">
          <div className="flex items-center gap-3 mb-8">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center pulse-icon">
              <span className="text-xl">🛡️</span>
            </div>
            <div>
              <div className="font-bold text-cyan-400">MissionPulse</div>
              <div className="text-xs text-slate-400">Pipeline</div>
            </div>
          </div>
          
          <nav className="space-y-1">
            {navItems.map((item, i) => (
              <a 
                key={i}
                href={item.path}
                className={`flex items-center gap-3 px-3 py-2 rounded-lg transition-all ${
                  item.active 
                    ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' 
                    : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                }`}
              >
                <span>{item.icon}</span>
                <span className="text-sm">{item.label}</span>
              </a>
            ))}
          </nav>
        </div>
      );
    }

    // Opportunity Modal
    function OppModal({ opp, onClose, onSave, mode }) {
      const [form, setForm] = React.useState(opp || {
        title: '',
        nickname: '',
        agency: '',
        ceiling: '',
        due_date: '',
        phase: 'Gate 1',
        priority: 'Medium',
        pwin: 50,
        set_aside: '',
        description: '',
        status: 'Active'
      });
      const [saving, setSaving] = React.useState(false);

      const handleSave = async () => {
        setSaving(true);
        await onSave(form);
        setSaving(false);
      };

      return (
        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
          <div className="bg-slate-800 border border-slate-700 rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div className="p-6 border-b border-slate-700 flex items-center justify-between">
              <h2 className="text-xl font-bold">{mode === 'edit' ? 'Edit Opportunity' : 'New Opportunity'}</h2>
              <button onClick={onClose} className="text-slate-400 hover:text-white text-xl">×</button>
            </div>
            
            <div className="p-6 space-y-4">
              <div className="grid sm:grid-cols-2 gap-4">
                <div className="sm:col-span-2">
                  <label className="block text-sm text-slate-400 mb-1">Title *</label>
                  <input
                    type="text"
                    value={form.title}
                    onChange={(e) => setForm({ ...form, title: e.target.value })}
                    className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                    placeholder="Full opportunity title"
                  />
                </div>
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Nickname</label>
                  <input
                    type="text"
                    value={form.nickname}
                    onChange={(e) => setForm({ ...form, nickname: e.target.value })}
                    className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                    placeholder="Short name (e.g., DHA-EHR)"
                  />
                </div>
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Agency</label>
                  <input
                    type="text"
                    value={form.agency}
                    onChange={(e) => setForm({ ...form, agency: e.target.value })}
                    className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                    placeholder="Contracting agency"
                  />
                </div>
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Ceiling ($)</label>
                  <input
                    type="number"
                    value={form.ceiling}
                    onChange={(e) => setForm({ ...form, ceiling: parseFloat(e.target.value) || '' })}
                    className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                    placeholder="Contract value"
                  />
                </div>
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Due Date</label>
                  <input
                    type="date"
                    value={form.due_date?.split('T')[0] || ''}
                    onChange={(e) => setForm({ ...form, due_date: e.target.value })}
                    className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                  />
                </div>
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Phase</label>
                  <select
                    value={form.phase}
                    onChange={(e) => setForm({ ...form, phase: e.target.value })}
                    className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                  >
                    {PHASES.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Priority</label>
                  <select
                    value={form.priority}
                    onChange={(e) => setForm({ ...form, priority: e.target.value })}
                    className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                  >
                    {PRIORITIES.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Win Probability (%)</label>
                  <input
                    type="number"
                    min="0"
                    max="100"
                    value={form.pwin}
                    onChange={(e) => setForm({ ...form, pwin: parseInt(e.target.value) || 0 })}
                    className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                  />
                </div>
                <div>
                  <label className="block text-sm text-slate-400 mb-1">Set-Aside</label>
                  <select
                    value={form.set_aside}
                    onChange={(e) => setForm({ ...form, set_aside: e.target.value })}
                    className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
                  >
                    <option value="">Select...</option>
                    {SET_ASIDES.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
                <div className="sm:col-span-2">
                  <label className="block text-sm text-slate-400 mb-1">Description</label>
                  <textarea
                    value={form.description || ''}
                    onChange={(e) => setForm({ ...form, description: e.target.value })}
                    rows={3}
                    className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500 resize-none"
                    placeholder="Brief description of the opportunity"
                  />
                </div>
              </div>
            </div>

            <div className="p-6 border-t border-slate-700 flex justify-end gap-3">
              <button onClick={onClose} className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
                Cancel
              </button>
              <button
                onClick={handleSave}
                disabled={saving || !form.title}
                className="px-6 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg text-sm font-medium disabled:opacity-50"
              >
                {saving ? 'Saving...' : 'Save'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // Main App
    function App() {
      const [opportunities, setOpportunities] = React.useState(DEMO_OPPS);
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [filter, setFilter] = React.useState('all');
      const [search, setSearch] = React.useState('');
      const [sortBy, setSortBy] = React.useState('due_date');
      const [modal, setModal] = React.useState(null); // { mode: 'new' | 'edit', opp?: object }
      const [mobileOpen, setMobileOpen] = React.useState(false);

      React.useEffect(() => {
        loadOpportunities();
      }, []);

      const loadOpportunities = async () => {
        try {
          const { data, error } = await supabase
            .from('opportunities')
            .select('*')
            .order('due_date', { ascending: true });
          
          if (!error && data && data.length > 0) {
            setOpportunities(data);
            setConnected(true);
          }
        } catch (e) {
          console.log('Using demo data');
        }
        setLoading(false);
      };

      const saveOpportunity = async (opp) => {
        try {
          if (connected) {
            if (opp.id && !opp.id.startsWith('demo-')) {
              // Update existing
              const { error } = await supabase
                .from('opportunities')
                .update({
                  ...opp,
                  updated_at: new Date().toISOString()
                })
                .eq('id', opp.id);
              
              if (error) throw error;
            } else {
              // Insert new
              const { data, error } = await supabase
                .from('opportunities')
                .insert({
                  ...opp,
                  id: undefined // Let Supabase generate UUID
                })
                .select()
                .single();
              
              if (error) throw error;
              opp = data;
            }
          } else {
            // Demo mode - fake ID
            if (!opp.id) {
              opp.id = `demo-${Date.now()}`;
            }
          }

          // Update local state
          setOpportunities(prev => {
            const existing = prev.findIndex(o => o.id === opp.id);
            if (existing >= 0) {
              const updated = [...prev];
              updated[existing] = opp;
              return updated;
            }
            return [...prev, opp];
          });

          setModal(null);
        } catch (e) {
          console.error('Save failed:', e);
          alert('Failed to save: ' + e.message);
        }
      };

      const deleteOpportunity = async (id) => {
        if (!confirm('Are you sure you want to delete this opportunity?')) return;

        try {
          if (connected && !id.startsWith('demo-')) {
            const { error } = await supabase
              .from('opportunities')
              .delete()
              .eq('id', id);
            
            if (error) throw error;
          }

          setOpportunities(prev => prev.filter(o => o.id !== id));
        } catch (e) {
          console.error('Delete failed:', e);
          alert('Failed to delete: ' + e.message);
        }
      };

      // Filter and sort
      let filtered = opportunities.filter(o => {
        if (filter !== 'all' && o.phase !== filter) return false;
        if (search && !o.title?.toLowerCase().includes(search.toLowerCase()) && 
            !o.nickname?.toLowerCase().includes(search.toLowerCase()) &&
            !o.agency?.toLowerCase().includes(search.toLowerCase())) return false;
        return true;
      });

      filtered.sort((a, b) => {
        if (sortBy === 'due_date') return new Date(a.due_date) - new Date(b.due_date);
        if (sortBy === 'ceiling') return (b.ceiling || 0) - (a.ceiling || 0);
        if (sortBy === 'pwin') return (b.pwin || 0) - (a.pwin || 0);
        if (sortBy === 'priority') {
          const order = { Critical: 0, High: 1, Medium: 2, Low: 3 };
          return (order[a.priority] || 4) - (order[b.priority] || 4);
        }
        return 0;
      });

      const totalValue = opportunities.reduce((sum, o) => sum + (o.ceiling || 0), 0);
      const avgPwin = opportunities.length ? Math.round(opportunities.reduce((sum, o) => sum + (o.pwin || 0), 0) / opportunities.length) : 0;

      const priorityColors = {
        Critical: 'bg-red-500/20 text-red-400 border-red-500/30',
        High: 'bg-amber-500/20 text-amber-400 border-amber-500/30',
        Medium: 'bg-blue-500/20 text-blue-400 border-blue-500/30',
        Low: 'bg-slate-500/20 text-slate-400 border-slate-500/30'
      };

      return (
        <div className="flex min-h-screen">
          <Sidebar />
          
          <div className="flex-1 p-4 lg:p-6">
            {/* Mobile Header */}
            <div className="lg:hidden flex items-center gap-3 mb-4">
              <a href="index.html" className="text-slate-400 hover:text-white">← Dashboard</a>
            </div>

            {/* Header */}
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
              <div>
                <h1 className="text-2xl font-bold">Pipeline</h1>
                <p className="text-slate-400 text-sm">{opportunities.length} opportunities • ${(totalValue / 1000000).toFixed(0)}M total • {avgPwin}% avg pWin</p>
              </div>
              
              <div className="flex items-center gap-3">
                <div className={`px-3 py-1.5 rounded-lg text-sm ${
                  connected 
                    ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' 
                    : 'bg-amber-500/20 text-amber-400 border border-amber-500/30'
                }`}>
                  {connected ? '● Live' : '○ Demo'}
                </div>
                <button
                  onClick={() => setModal({ mode: 'new' })}
                  className="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 rounded-lg text-sm font-medium transition-colors"
                >
                  + New Opportunity
                </button>
              </div>
            </div>

            {/* Filters */}
            <div className="flex flex-col sm:flex-row gap-3 mb-6">
              <input
                type="text"
                value={search}
                onChange={(e) => setSearch(e.target.value)}
                placeholder="Search opportunities..."
                className="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
              />
              <select
                value={filter}
                onChange={(e) => setFilter(e.target.value)}
                className="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
              >
                <option value="all">All Phases</option>
                {PHASES.map(p => <option key={p} value={p}>{p}</option>)}
              </select>
              <select
                value={sortBy}
                onChange={(e) => setSortBy(e.target.value)}
                className="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"
              >
                <option value="due_date">Sort: Due Date</option>
                <option value="ceiling">Sort: Value</option>
                <option value="pwin">Sort: Win Prob</option>
                <option value="priority">Sort: Priority</option>
              </select>
            </div>

            {/* Pipeline Table */}
            <div className="bg-slate-800/50 border border-slate-700 rounded-xl overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="border-b border-slate-700">
                      <th className="text-left p-4 text-sm text-slate-400 font-medium">Opportunity</th>
                      <th className="text-left p-4 text-sm text-slate-400 font-medium hidden sm:table-cell">Agency</th>
                      <th className="text-left p-4 text-sm text-slate-400 font-medium">Value</th>
                      <th className="text-left p-4 text-sm text-slate-400 font-medium hidden md:table-cell">Phase</th>
                      <th className="text-left p-4 text-sm text-slate-400 font-medium">pWin</th>
                      <th className="text-left p-4 text-sm text-slate-400 font-medium hidden lg:table-cell">Due</th>
                      <th className="text-left p-4 text-sm text-slate-400 font-medium">Priority</th>
                      <th className="text-left p-4 text-sm text-slate-400 font-medium">Actions</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-700/50">
                    {loading ? (
                      <tr>
                        <td colSpan={8} className="p-8 text-center text-slate-500">Loading...</td>
                      </tr>
                    ) : filtered.length === 0 ? (
                      <tr>
                        <td colSpan={8} className="p-8 text-center text-slate-500">No opportunities found</td>
                      </tr>
                    ) : (
                      filtered.map(opp => {
                        const daysUntilDue = opp.due_date ? Math.ceil((new Date(opp.due_date) - new Date()) / (1000 * 60 * 60 * 24)) : null;
                        return (
                          <tr key={opp.id} className="hover:bg-slate-800/30 transition-colors">
                            <td className="p-4">
                              <div className="font-medium">{opp.nickname || opp.title?.slice(0, 20)}</div>
                              <div className="text-sm text-slate-400 truncate max-w-[200px]">{opp.title}</div>
                            </td>
                            <td className="p-4 hidden sm:table-cell text-sm">{opp.agency}</td>
                            <td className="p-4 text-sm font-medium">${((opp.ceiling || 0) / 1000000).toFixed(0)}M</td>
                            <td className="p-4 hidden md:table-cell">
                              <span className="px-2 py-1 bg-slate-700 rounded text-xs">{opp.phase}</span>
                            </td>
                            <td className="p-4">
                              <div className="flex items-center gap-2">
                                <div className="w-12 h-2 bg-slate-700 rounded-full overflow-hidden">
                                  <div 
                                    className={`h-full rounded-full ${
                                      opp.pwin >= 70 ? 'bg-emerald-500' : 
                                      opp.pwin >= 50 ? 'bg-cyan-500' : 
                                      opp.pwin >= 30 ? 'bg-amber-500' : 'bg-red-500'
                                    }`}
                                    style={{ width: `${opp.pwin || 0}%` }}
                                  />
                                </div>
                                <span className="text-sm">{opp.pwin}%</span>
                              </div>
                            </td>
                            <td className="p-4 hidden lg:table-cell">
                              <div className={`text-sm ${
                                daysUntilDue <= 7 ? 'text-red-400' : 
                                daysUntilDue <= 30 ? 'text-amber-400' : 'text-slate-400'
                              }`}>
                                {daysUntilDue !== null ? `${daysUntilDue}d` : '—'}
                              </div>
                            </td>
                            <td className="p-4">
                              <span className={`px-2 py-1 rounded text-xs border ${priorityColors[opp.priority] || priorityColors.Medium}`}>
                                {opp.priority}
                              </span>
                            </td>
                            <td className="p-4">
                              <div className="flex items-center gap-1">
                                <button
                                  onClick={() => setModal({ mode: 'edit', opp })}
                                  className="p-1.5 hover:bg-slate-700 rounded text-slate-400 hover:text-white"
                                  title="Edit"
                                >
                                  ✏️
                                </button>
                                <a
                                  href={`missionpulse-warroom-v2.html?id=${opp.id}`}
                                  className="p-1.5 hover:bg-slate-700 rounded text-slate-400 hover:text-white"
                                  title="War Room"
                                >
                                  🎯
                                </a>
                                <button
                                  onClick={() => deleteOpportunity(opp.id)}
                                  className="p-1.5 hover:bg-red-500/20 rounded text-slate-400 hover:text-red-400"
                                  title="Delete"
                                >
                                  🗑️
                                </button>
                              </div>
                            </td>
                          </tr>
                        );
                      })
                    )}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Phase Summary */}
            <div className="mt-6 grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-8 gap-3">
              {PHASES.map(phase => {
                const count = opportunities.filter(o => o.phase === phase).length;
                const value = opportunities.filter(o => o.phase === phase).reduce((sum, o) => sum + (o.ceiling || 0), 0);
                return (
                  <div 
                    key={phase}
                    onClick={() => setFilter(filter === phase ? 'all' : phase)}
                    className={`p-3 rounded-lg cursor-pointer transition-all ${
                      filter === phase 
                        ? 'bg-cyan-500/20 border border-cyan-500/30' 
                        : 'bg-slate-800/30 border border-slate-700 hover:border-slate-600'
                    }`}
                  >
                    <div className="text-lg font-bold">{count}</div>
                    <div className="text-xs text-slate-400 truncate">{phase}</div>
                    <div className="text-xs text-slate-500">${(value / 1000000).toFixed(0)}M</div>
                  </div>
                );
              })}
            </div>

            {/* Footer */}
            <div className="mt-8 text-center text-xs text-slate-500">
              <div>Mission Meets Tech | MissionPulse Pipeline</div>
              <div className="mt-1">AI GENERATED - REQUIRES HUMAN REVIEW</div>
            </div>
          </div>

          {/* Modal */}
          {modal && (
            <OppModal
              opp={modal.opp}
              mode={modal.mode}
              onClose={() => setModal(null)}
              onSave={saveOpportunity}
            />
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
