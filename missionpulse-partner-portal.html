<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse - Partner Portal</title>
  <link rel="icon" type="image/png" href="MMT_icon_64px.png">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; color: #fff; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-slideUp { animation: slideUp 0.5s ease-out forwards; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #111C2E; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #243656; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #00E5FA; }
    .glass-card {
      background: rgba(17, 28, 46, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Supabase Config
    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc4MzUyMjQsImV4cCI6MjA1MzQxMTIyNH0.pBPL9l2zL7LLd_A5I--hPBzw5YwG3ajPMtbYsqsxIgQ';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Icons
    const Icons = {
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>,
      users: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>,
      userPlus: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>,
      mail: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>,
      shield: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>,
      document: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>,
      x: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>,
      clock: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6l4 2"/></svg>,
      eye: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>,
      ban: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>,
      refresh: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>,
      building: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>,
      search: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" strokeWidth={2}/><path strokeLinecap="round" strokeWidth={2} d="M21 21l-4.35-4.35"/></svg>,
      link: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    // Status configurations
    const INVITATION_STATUS = {
      pending: { label: 'Pending', color: '#F59E0B', bg: '#F59E0B20' },
      sent: { label: 'Sent', color: '#3B82F6', bg: '#3B82F620' },
      accepted: { label: 'Accepted', color: '#00D29F', bg: '#00D29F20' },
      declined: { label: 'Declined', color: '#EF4444', bg: '#EF444420' },
      expired: { label: 'Expired', color: '#6B7280', bg: '#6B728020' },
      revoked: { label: 'Revoked', color: '#DC2626', bg: '#DC262620' },
    };

    const TEAMING_STATUS = {
      pending: { label: 'Pending', color: '#6B7280' },
      sent: { label: 'Sent', color: '#3B82F6' },
      negotiating: { label: 'Negotiating', color: '#F59E0B' },
      signed: { label: 'Signed', color: '#00D29F' },
      declined: { label: 'Declined', color: '#EF4444' },
      expired: { label: 'Expired', color: '#6B7280' },
    };

    const INVITATION_TYPES = [
      { key: 'subcontractor', name: 'Subcontractor' },
      { key: 'prime', name: 'Prime Contractor' },
      { key: 'teaming', name: 'Teaming Partner' },
      { key: 'jv', name: 'Joint Venture' },
      { key: 'mentor_protege', name: 'Mentor-Protégé' },
    ];

    const ACCESS_LEVELS = [
      { key: 'full', name: 'Full Access', description: 'All modules and documents' },
      { key: 'standard', name: 'Standard', description: 'Core modules, no pricing' },
      { key: 'limited', name: 'Limited', description: 'Technical sections only' },
      { key: 'view_only', name: 'View Only', description: 'Read-only access' },
    ];

    const MODULES = [
      'Pipeline', 'War Room', 'Technical', 'Pricing', 'Compliance', 
      'Black Hat', 'Orals', 'Documents', 'Deliverables'
    ];

    // Demo Data
    const DEMO_PARTNERS = [
      {
        id: 'demo-1',
        partner_company_name: 'TechSolutions Inc.',
        partner_email: 'contracts@techsolutions.com',
        partner_contact_name: 'Sarah Johnson',
        partner_phone: '(703) 555-0123',
        invitation_type: 'subcontractor',
        access_level: 'standard',
        nda_required: true,
        nda_signed: true,
        nda_signed_date: '2025-01-10',
        teaming_agreement_status: 'signed',
        status: 'accepted',
        invited_at: '2025-01-05T10:00:00Z',
        responded_at: '2025-01-08T14:30:00Z',
        allowed_modules: ['Pipeline', 'War Room', 'Technical', 'Documents'],
      },
      {
        id: 'demo-2',
        partner_company_name: 'HealthIT Partners',
        partner_email: 'partnerships@healthit.gov',
        partner_contact_name: 'Michael Chen',
        partner_phone: '(571) 555-0456',
        invitation_type: 'teaming',
        access_level: 'full',
        nda_required: true,
        nda_signed: true,
        nda_signed_date: '2025-01-15',
        teaming_agreement_status: 'negotiating',
        status: 'accepted',
        invited_at: '2025-01-12T09:00:00Z',
        responded_at: '2025-01-14T11:00:00Z',
        allowed_modules: ['Pipeline', 'War Room', 'Technical', 'Pricing', 'Compliance', 'Documents'],
      },
      {
        id: 'demo-3',
        partner_company_name: 'SecureSoft LLC',
        partner_email: 'bd@securesoft.com',
        partner_contact_name: 'James Wilson',
        partner_phone: '(202) 555-0789',
        invitation_type: 'subcontractor',
        access_level: 'limited',
        nda_required: true,
        nda_signed: false,
        teaming_agreement_status: 'pending',
        status: 'sent',
        invited_at: '2025-01-28T15:00:00Z',
        allowed_modules: ['Technical'],
      },
      {
        id: 'demo-4',
        partner_company_name: 'CloudFirst Technologies',
        partner_email: 'team@cloudfirst.io',
        partner_contact_name: 'Emily Davis',
        partner_phone: '(410) 555-0234',
        invitation_type: 'jv',
        access_level: 'full',
        nda_required: true,
        nda_signed: false,
        teaming_agreement_status: 'pending',
        status: 'pending',
        invited_at: '2025-02-01T08:00:00Z',
        allowed_modules: [],
      },
    ];

    // Main App
    function PartnerPortalApp() {
      const [partners, setPartners] = useState(DEMO_PARTNERS);
      const [loading, setLoading] = useState(true);
      const [searchTerm, setSearchTerm] = useState('');
      const [statusFilter, setStatusFilter] = useState('all');
      const [selectedPartner, setSelectedPartner] = useState(null);
      const [showInviteModal, setShowInviteModal] = useState(false);
      const [activeTab, setActiveTab] = useState('all');

      useEffect(() => {
        loadPartners();
      }, []);

      const loadPartners = async () => {
        setLoading(true);
        try {
          const { data, error } = await sbClient
            .from('partner_invitations')
            .select('*')
            .order('invited_at', { ascending: false });

          if (error) throw error;
          if (data && data.length > 0) {
            setPartners(data);
          }
        } catch (err) {
          console.log('Using demo data:', err.message);
        } finally {
          setLoading(false);
        }
      };

      const filteredPartners = partners.filter(p => {
        if (searchTerm && 
            !p.partner_company_name.toLowerCase().includes(searchTerm.toLowerCase()) &&
            !p.partner_email.toLowerCase().includes(searchTerm.toLowerCase())) {
          return false;
        }
        if (statusFilter !== 'all' && p.status !== statusFilter) return false;
        if (activeTab === 'active' && p.status !== 'accepted') return false;
        if (activeTab === 'pending' && !['pending', 'sent'].includes(p.status)) return false;
        if (activeTab === 'nda_pending' && (p.nda_signed || !p.nda_required)) return false;
        return true;
      });

      const stats = {
        total: partners.length,
        active: partners.filter(p => p.status === 'accepted').length,
        pending: partners.filter(p => ['pending', 'sent'].includes(p.status)).length,
        ndaPending: partners.filter(p => p.nda_required && !p.nda_signed).length,
      };

      const updateStatus = async (id, newStatus) => {
        setPartners(prev => prev.map(p => 
          p.id === id ? { ...p, status: newStatus } : p
        ));

        try {
          await sbClient
            .from('partner_invitations')
            .update({ status: newStatus, responded_at: new Date().toISOString() })
            .eq('id', id);
        } catch (err) {
          console.log('Status update failed:', err.message);
        }
      };

      const revokeAccess = async (id) => {
        if (!window.confirm('Are you sure you want to revoke this partner\'s access?')) return;
        await updateStatus(id, 'revoked');
      };

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* Header */}
          <header className="glass-card border-b border-white/10 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="flex items-center gap-2 text-gray-400 hover:text-white transition-colors">
                    <Icon name="home" className="w-5 h-5" />
                  </a>
                  <div className="w-px h-6 bg-white/20" />
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-500 to-pink-600 flex items-center justify-center">
                      <Icon name="users" className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white">Partner Portal</h1>
                      <p className="text-xs text-gray-400">Teaming & Access Management</p>
                    </div>
                  </div>
                </div>

                <div className="flex items-center gap-3">
                  <button
                    onClick={() => setShowInviteModal(true)}
                    className="px-4 py-2 bg-gradient-to-r from-purple-500 to-pink-600 text-white rounded-lg font-medium hover:opacity-90 transition-opacity flex items-center gap-2"
                  >
                    <Icon name="userPlus" className="w-4 h-4" />
                    Invite Partner
                  </button>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8">
            {/* Stats Cards */}
            <div className="grid grid-cols-4 gap-4 mb-8">
              {[
                { label: 'Total Partners', value: stats.total, icon: 'users', color: '#00E5FA', tab: 'all' },
                { label: 'Active', value: stats.active, icon: 'check', color: '#00D29F', tab: 'active' },
                { label: 'Pending', value: stats.pending, icon: 'clock', color: '#F59E0B', tab: 'pending' },
                { label: 'NDA Pending', value: stats.ndaPending, icon: 'document', color: '#EF4444', tab: 'nda_pending' },
              ].map((stat, idx) => (
                <button
                  key={idx}
                  onClick={() => setActiveTab(stat.tab)}
                  className={`glass-card rounded-xl p-4 text-left transition-all ${
                    activeTab === stat.tab ? 'ring-2 ring-purple-500' : 'hover:border-white/20'
                  }`}
                >
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-gray-400 text-sm">{stat.label}</span>
                    <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ background: `${stat.color}20` }}>
                      <Icon name={stat.icon} className="w-4 h-4" style={{ color: stat.color }} />
                    </div>
                  </div>
                  <div className="text-2xl font-bold text-white">{stat.value}</div>
                </button>
              ))}
            </div>

            {/* Filters */}
            <div className="glass-card rounded-xl p-4 mb-6">
              <div className="flex items-center gap-4 flex-wrap">
                <div className="flex-1 min-w-[300px] relative">
                  <Icon name="search" className="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                  <input
                    type="text"
                    placeholder="Search partners..."
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                    className="w-full pl-10 pr-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-purple-500"
                  />
                </div>

                <select
                  value={statusFilter}
                  onChange={(e) => setStatusFilter(e.target.value)}
                  className="px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-purple-500"
                >
                  <option value="all">All Statuses</option>
                  {Object.entries(INVITATION_STATUS).map(([key, config]) => (
                    <option key={key} value={key}>{config.label}</option>
                  ))}
                </select>

                <button
                  onClick={loadPartners}
                  className="px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-gray-400 hover:text-white transition-colors flex items-center gap-2"
                >
                  <Icon name="refresh" className="w-4 h-4" />
                  Refresh
                </button>
              </div>
            </div>

            {/* Partners Grid */}
            {loading ? (
              <div className="flex items-center justify-center py-20">
                <div className="w-8 h-8 border-2 border-purple-500 border-t-transparent rounded-full animate-spin" />
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {filteredPartners.map((partner, idx) => {
                  const statusConfig = INVITATION_STATUS[partner.status] || INVITATION_STATUS.pending;
                  const teamingConfig = TEAMING_STATUS[partner.teaming_agreement_status];
                  const type = INVITATION_TYPES.find(t => t.key === partner.invitation_type);
                  const access = ACCESS_LEVELS.find(a => a.key === partner.access_level);

                  return (
                    <div
                      key={partner.id}
                      className="glass-card rounded-xl p-5 hover:border-purple-500/30 transition-all cursor-pointer animate-slideUp"
                      style={{ animationDelay: `${idx * 50}ms` }}
                      onClick={() => setSelectedPartner(partner)}
                    >
                      <div className="flex items-start justify-between mb-4">
                        <div className="flex items-center gap-3">
                          <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-purple-500/20 to-pink-500/20 flex items-center justify-center">
                            <Icon name="building" className="w-6 h-6 text-purple-400" />
                          </div>
                          <div>
                            <h3 className="font-semibold text-white">{partner.partner_company_name}</h3>
                            <p className="text-sm text-gray-400">{partner.partner_contact_name}</p>
                          </div>
                        </div>
                        <span 
                          className="px-3 py-1 rounded-full text-xs font-medium"
                          style={{ background: statusConfig.bg, color: statusConfig.color }}
                        >
                          {statusConfig.label}
                        </span>
                      </div>

                      <div className="space-y-2 mb-4">
                        <div className="flex items-center gap-2 text-sm text-gray-400">
                          <Icon name="mail" className="w-4 h-4" />
                          {partner.partner_email}
                        </div>
                        <div className="flex items-center gap-2 text-sm text-gray-400">
                          <Icon name="link" className="w-4 h-4" />
                          {type?.name || partner.invitation_type}
                        </div>
                      </div>

                      <div className="flex items-center gap-2 flex-wrap mb-4">
                        <span className={`px-2 py-1 rounded-full text-xs ${
                          partner.nda_signed 
                            ? 'bg-emerald-500/20 text-emerald-400' 
                            : 'bg-amber-500/20 text-amber-400'
                        }`}>
                          NDA: {partner.nda_signed ? 'Signed' : 'Pending'}
                        </span>
                        {teamingConfig && (
                          <span 
                            className="px-2 py-1 rounded-full text-xs"
                            style={{ background: `${teamingConfig.color}20`, color: teamingConfig.color }}
                          >
                            TA: {teamingConfig.label}
                          </span>
                        )}
                        <span className="px-2 py-1 bg-white/5 text-gray-400 rounded-full text-xs">
                          {access?.name || partner.access_level}
                        </span>
                      </div>

                      {partner.status === 'accepted' && partner.allowed_modules?.length > 0 && (
                        <div className="flex items-center gap-1 flex-wrap">
                          <span className="text-xs text-gray-500 mr-1">Access:</span>
                          {partner.allowed_modules.slice(0, 3).map((mod, i) => (
                            <span key={i} className="px-2 py-0.5 bg-purple-500/10 text-purple-300 rounded text-xs">
                              {mod}
                            </span>
                          ))}
                          {partner.allowed_modules.length > 3 && (
                            <span className="text-xs text-gray-500">+{partner.allowed_modules.length - 3} more</span>
                          )}
                        </div>
                      )}

                      <div className="flex items-center justify-between mt-4 pt-4 border-t border-white/5">
                        <span className="text-xs text-gray-500">
                          Invited {new Date(partner.invited_at).toLocaleDateString()}
                        </span>
                        <div className="flex items-center gap-2" onClick={e => e.stopPropagation()}>
                          {partner.status === 'accepted' && (
                            <button
                              onClick={() => revokeAccess(partner.id)}
                              className="px-3 py-1.5 bg-red-500/20 text-red-400 rounded-lg text-xs hover:bg-red-500/30 transition-colors"
                            >
                              Revoke
                            </button>
                          )}
                          {partner.status === 'pending' && (
                            <button
                              onClick={() => updateStatus(partner.id, 'sent')}
                              className="px-3 py-1.5 bg-blue-500/20 text-blue-400 rounded-lg text-xs hover:bg-blue-500/30 transition-colors"
                            >
                              Send Invite
                            </button>
                          )}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {filteredPartners.length === 0 && !loading && (
              <div className="text-center py-20">
                <Icon name="users" className="w-16 h-16 text-gray-600 mx-auto mb-4" />
                <h3 className="text-xl font-semibold text-gray-400 mb-2">No partners found</h3>
                <p className="text-gray-500">Try adjusting your filters or invite a new partner</p>
              </div>
            )}
          </main>

          {/* Partner Detail Modal */}
          {selectedPartner && (
            <PartnerDetailModal
              partner={selectedPartner}
              onClose={() => setSelectedPartner(null)}
              onUpdate={(updated) => {
                setPartners(prev => prev.map(p => p.id === updated.id ? updated : p));
                setSelectedPartner(updated);
              }}
            />
          )}

          {/* Invite Modal */}
          {showInviteModal && (
            <InvitePartnerModal
              onClose={() => setShowInviteModal(false)}
              onSave={(newPartner) => {
                setPartners(prev => [newPartner, ...prev]);
                setShowInviteModal(false);
              }}
            />
          )}

          {/* Footer */}
          <footer className="border-t border-white/10 py-4 mt-12">
            <div className="max-w-7xl mx-auto px-6 text-center text-xs text-gray-500">
              © 2026 Mission Meets Tech • MissionPulse v2.0 • Sprint 56
            </div>
          </footer>
        </div>
      );
    }

    // Partner Detail Modal
    function PartnerDetailModal({ partner, onClose, onUpdate }) {
      const [modules, setModules] = useState(partner.allowed_modules || []);

      const toggleModule = (mod) => {
        setModules(prev => 
          prev.includes(mod) ? prev.filter(m => m !== mod) : [...prev, mod]
        );
      };

      const saveModules = async () => {
        const updated = { ...partner, allowed_modules: modules };
        onUpdate(updated);

        try {
          await sbClient
            .from('partner_invitations')
            .update({ allowed_modules: modules })
            .eq('id', partner.id);
        } catch (err) {
          console.log('Module update failed:', err.message);
        }
      };

      const statusConfig = INVITATION_STATUS[partner.status];
      const teamingConfig = TEAMING_STATUS[partner.teaming_agreement_status];

      return (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="glass-card rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="p-6 border-b border-white/10">
              <div className="flex items-start justify-between">
                <div className="flex items-center gap-4">
                  <div className="w-14 h-14 rounded-xl bg-gradient-to-br from-purple-500/20 to-pink-500/20 flex items-center justify-center">
                    <Icon name="building" className="w-8 h-8 text-purple-400" />
                  </div>
                  <div>
                    <h2 className="text-xl font-bold text-white">{partner.partner_company_name}</h2>
                    <p className="text-gray-400">{partner.partner_contact_name}</p>
                  </div>
                </div>
                <button onClick={onClose} className="p-2 text-gray-400 hover:text-white">
                  <Icon name="x" className="w-5 h-5" />
                </button>
              </div>
            </div>

            <div className="p-6 space-y-6">
              {/* Contact Info */}
              <div className="grid grid-cols-2 gap-4">
                <div className="bg-[#0A1628] rounded-lg p-4">
                  <span className="text-xs text-gray-500">Email</span>
                  <p className="text-white">{partner.partner_email}</p>
                </div>
                <div className="bg-[#0A1628] rounded-lg p-4">
                  <span className="text-xs text-gray-500">Phone</span>
                  <p className="text-white">{partner.partner_phone || 'N/A'}</p>
                </div>
                <div className="bg-[#0A1628] rounded-lg p-4">
                  <span className="text-xs text-gray-500">Partnership Type</span>
                  <p className="text-white">{INVITATION_TYPES.find(t => t.key === partner.invitation_type)?.name}</p>
                </div>
                <div className="bg-[#0A1628] rounded-lg p-4">
                  <span className="text-xs text-gray-500">Access Level</span>
                  <p className="text-white">{ACCESS_LEVELS.find(a => a.key === partner.access_level)?.name}</p>
                </div>
              </div>

              {/* Status */}
              <div className="grid grid-cols-2 gap-4">
                <div className="bg-[#0A1628] rounded-lg p-4">
                  <span className="text-xs text-gray-500">Invitation Status</span>
                  <p className="font-medium" style={{ color: statusConfig?.color }}>{statusConfig?.label}</p>
                </div>
                <div className="bg-[#0A1628] rounded-lg p-4">
                  <span className="text-xs text-gray-500">Teaming Agreement</span>
                  <p className="font-medium" style={{ color: teamingConfig?.color }}>{teamingConfig?.label}</p>
                </div>
              </div>

              {/* NDA Status */}
              <div className="bg-[#0A1628] rounded-lg p-4">
                <div className="flex items-center justify-between">
                  <div>
                    <span className="text-xs text-gray-500">NDA Status</span>
                    <p className={`font-medium ${partner.nda_signed ? 'text-emerald-400' : 'text-amber-400'}`}>
                      {partner.nda_signed ? `Signed on ${partner.nda_signed_date}` : 'Pending Signature'}
                    </p>
                  </div>
                  <Icon 
                    name={partner.nda_signed ? 'check' : 'clock'} 
                    className={`w-6 h-6 ${partner.nda_signed ? 'text-emerald-400' : 'text-amber-400'}`} 
                  />
                </div>
              </div>

              {/* Module Access */}
              {partner.status === 'accepted' && (
                <div>
                  <h4 className="text-sm font-medium text-gray-400 mb-3">Module Access</h4>
                  <div className="grid grid-cols-3 gap-2">
                    {MODULES.map(mod => (
                      <button
                        key={mod}
                        onClick={() => toggleModule(mod)}
                        className={`px-3 py-2 rounded-lg text-sm transition-all ${
                          modules.includes(mod)
                            ? 'bg-purple-500/20 text-purple-400 border border-purple-500'
                            : 'bg-[#0A1628] text-gray-400 border border-white/10 hover:border-purple-500/50'
                        }`}
                      >
                        {mod}
                      </button>
                    ))}
                  </div>
                  <button
                    onClick={saveModules}
                    className="mt-4 px-4 py-2 bg-purple-500 text-white rounded-lg text-sm hover:bg-purple-600 transition-colors"
                  >
                    Save Module Access
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // Invite Partner Modal
    function InvitePartnerModal({ onClose, onSave }) {
      const [formData, setFormData] = useState({
        partner_company_name: '',
        partner_email: '',
        partner_contact_name: '',
        partner_phone: '',
        invitation_type: 'subcontractor',
        access_level: 'standard',
        nda_required: true,
        allowed_modules: [],
      });

      const toggleModule = (mod) => {
        setFormData(prev => ({
          ...prev,
          allowed_modules: prev.allowed_modules.includes(mod)
            ? prev.allowed_modules.filter(m => m !== mod)
            : [...prev.allowed_modules, mod]
        }));
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        
        const newPartner = {
          ...formData,
          id: `temp-${Date.now()}`,
          status: 'pending',
          nda_signed: false,
          teaming_agreement_status: 'pending',
          invited_at: new Date().toISOString(),
        };

        try {
          const { data, error } = await sbClient
            .from('partner_invitations')
            .insert([formData])
            .select()
            .single();

          if (error) throw error;
          onSave(data || newPartner);
        } catch (err) {
          console.log('Using local save:', err.message);
          onSave(newPartner);
        }
      };

      return (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="glass-card rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="p-6 border-b border-white/10">
              <div className="flex items-center justify-between">
                <h2 className="text-xl font-bold text-white">Invite Partner</h2>
                <button onClick={onClose} className="p-2 text-gray-400 hover:text-white">
                  <Icon name="x" className="w-5 h-5" />
                </button>
              </div>
            </div>

            <form onSubmit={handleSubmit} className="p-6 space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-400 mb-1">Company Name *</label>
                <input
                  type="text"
                  required
                  value={formData.partner_company_name}
                  onChange={(e) => setFormData(prev => ({ ...prev, partner_company_name: e.target.value }))}
                  className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-purple-500"
                  placeholder="e.g., TechSolutions Inc."
                />
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-gray-400 mb-1">Contact Name *</label>
                  <input
                    type="text"
                    required
                    value={formData.partner_contact_name}
                    onChange={(e) => setFormData(prev => ({ ...prev, partner_contact_name: e.target.value }))}
                    className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-purple-500"
                    placeholder="e.g., John Smith"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-400 mb-1">Email *</label>
                  <input
                    type="email"
                    required
                    value={formData.partner_email}
                    onChange={(e) => setFormData(prev => ({ ...prev, partner_email: e.target.value }))}
                    className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-purple-500"
                    placeholder="e.g., contracts@company.com"
                  />
                </div>
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-gray-400 mb-1">Phone</label>
                  <input
                    type="tel"
                    value={formData.partner_phone}
                    onChange={(e) => setFormData(prev => ({ ...prev, partner_phone: e.target.value }))}
                    className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-purple-500"
                    placeholder="e.g., (703) 555-0123"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-400 mb-1">Partnership Type</label>
                  <select
                    value={formData.invitation_type}
                    onChange={(e) => setFormData(prev => ({ ...prev, invitation_type: e.target.value }))}
                    className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-purple-500"
                  >
                    {INVITATION_TYPES.map(type => (
                      <option key={type.key} value={type.key}>{type.name}</option>
                    ))}
                  </select>
                </div>
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-400 mb-1">Access Level</label>
                <select
                  value={formData.access_level}
                  onChange={(e) => setFormData(prev => ({ ...prev, access_level: e.target.value }))}
                  className="w-full px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-purple-500"
                >
                  {ACCESS_LEVELS.map(level => (
                    <option key={level.key} value={level.key}>{level.name} - {level.description}</option>
                  ))}
                </select>
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-400 mb-2">Module Access</label>
                <div className="grid grid-cols-3 gap-2">
                  {MODULES.map(mod => (
                    <button
                      key={mod}
                      type="button"
                      onClick={() => toggleModule(mod)}
                      className={`px-3 py-2 rounded-lg text-sm transition-all ${
                        formData.allowed_modules.includes(mod)
                          ? 'bg-purple-500/20 text-purple-400 border border-purple-500'
                          : 'bg-[#0A1628] text-gray-400 border border-white/10 hover:border-purple-500/50'
                      }`}
                    >
                      {mod}
                    </button>
                  ))}
                </div>
              </div>

              <div className="flex items-center gap-3">
                <input
                  type="checkbox"
                  id="nda_required"
                  checked={formData.nda_required}
                  onChange={(e) => setFormData(prev => ({ ...prev, nda_required: e.target.checked }))}
                  className="w-4 h-4 rounded bg-[#0A1628] border-white/10 text-purple-500 focus:ring-purple-500"
                />
                <label htmlFor="nda_required" className="text-sm text-gray-400">Require NDA before access</label>
              </div>

              <div className="flex justify-end gap-3 pt-4">
                <button
                  type="button"
                  onClick={onClose}
                  className="px-4 py-2 bg-[#0A1628] text-gray-300 rounded-lg hover:text-white transition-colors"
                >
                  Cancel
                </button>
                <button
                  type="submit"
                  className="px-4 py-2 bg-gradient-to-r from-purple-500 to-pink-600 text-white rounded-lg font-medium hover:opacity-90 transition-opacity"
                >
                  Send Invitation
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    ReactDOM.render(<PartnerPortalApp />, document.getElementById('root'));
  </script>
</body>
</html>
