<!-- Access Requests Panel - Add to admin-users.html -->

  <div class="flex items-center justify-between mb-6">
    <div>
      <h2 class="text-xl font-bold text-white flex items-center gap-2">
        <svg class="w-6 h-6 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
        </svg>
        Access Requests
      </h2>
      <p class="text-gray-400 text-sm mt-1">Manage pending access requests from potential users</p>
    </div>
    <div class="flex items-center gap-3">
      <span id="pending-count" class="px-3 py-1 bg-amber-500/20 text-amber-400 text-sm rounded-full">

      </span>
      <button onclick="refreshAccessRequests()" class="p-2 text-gray-400 hover:text-cyan-400 transition" title="Refresh">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />

  <!-- Filter Tabs -->
  <div class="flex gap-2 mb-4 border-b border-slate-700 pb-2">

    </button>
    <button onclick="filterRequests('pending')" data-filter="pending" class="filter-btn px-4 py-2 text-sm rounded-lg text-gray-400 hover:bg-slate-700/50">
      Pending
    </button>
    <button onclick="filterRequests('contacted')" data-filter="contacted" class="filter-btn px-4 py-2 text-sm rounded-lg text-gray-400 hover:bg-slate-700/50">
      Contacted
    </button>
    <button onclick="filterRequests('approved')" data-filter="approved" class="filter-btn px-4 py-2 text-sm rounded-lg text-gray-400 hover:bg-slate-700/50">
      Approved
    </button>
    <button onclick="filterRequests('rejected')" data-filter="rejected" class="filter-btn px-4 py-2 text-sm rounded-lg text-gray-400 hover:bg-slate-700/50">
      Rejected
    </button>
  </div>
  
  <!-- Requests Table -->
  <div class="overflow-x-auto">
    <table class="w-full">

        <tr class="text-left text-gray-400 text-sm border-b border-slate-700">
          <th class="pb-3 font-medium">Name</th>
          <th class="pb-3 font-medium">Company</th>

          <th class="pb-3 font-medium">Requested</th>

      <tbody id="requests-table-body">
        <!-- Dynamic rows inserted here -->
        <tr id="loading-row">
          <td colspan="6" class="py-8 text-center text-gray-400">

  <!-- Empty State -->
  <div id="empty-state" class="hidden py-12 text-center">

    </svg>
    <p class="text-gray-400">No access requests found</p>
  </div>
</div>

<!-- Request Detail Modal -->
<div id="request-modal" class="fixed inset-0 z-50 hidden">
  <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeRequestModal()"></div>
  <div class="absolute inset-4 md:inset-auto md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 md:w-full md:max-w-lg bg-slate-800 rounded-2xl border border-slate-700 shadow-2xl overflow-hidden">
    <div class="p-6">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-lg font-bold text-white">Access Request Details</h3>
        <button onclick="closeRequestModal()" class="text-gray-400 hover:text-white">
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      
      <div id="modal-content" class="space-y-4">
        <!-- Dynamic content -->
      </div>
      
      <div class="mt-6 pt-4 border-t border-slate-700">
        <label class="block text-sm text-cyan-400 mb-2">Admin Notes</label>
        <textarea id="modal-notes" rows="2" class="w-full px-4 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white placeholder-gray-500 resize-none" placeholder="Add notes about this request..."></textarea>
      </div>
      
      <div class="flex gap-3 mt-6">
        <button onclick="updateRequestStatus('approved')" class="flex-1 py-2 bg-emerald-600 hover:bg-emerald-500 text-white font-medium rounded-lg transition">
          Approve
        </button>
        <button onclick="updateRequestStatus('contacted')" class="flex-1 py-2 bg-blue-600 hover:bg-blue-500 text-white font-medium rounded-lg transition">
          Contacted
        </button>
        <button onclick="updateRequestStatus('rejected')" class="flex-1 py-2 bg-red-600 hover:bg-red-500 text-white font-medium rounded-lg transition">
          Reject
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// ACCESS REQUESTS MANAGEMENT
// ============================================================

let accessRequests = [];
let currentFilter = 'all';
let selectedRequest = null;

// Load requests from Supabase
async function loadAccessRequests() {
  const loadingRow = document.getElementById('loading-row');
  const emptyState = document.getElementById('empty-state');
  const tableBody = document.getElementById('requests-table-body');
  
  try {
    if (!window.MissionPulse?.supabase) {
      throw new Error('Supabase not initialized');
    }
    
    const { data, error } = await window.MissionPulse.supabase
      .from('access_requests')
      .select('*')
      .order('created_at', { ascending: false });
    
    if (error) throw error;
    
    accessRequests = data || [];
    
    // Update pending count
    const pendingCount = accessRequests.filter(r => r.status === 'pending').length;
    document.getElementById('pending-count').textContent = `${pendingCount} pending`;
    
    // Render table
    renderRequestsTable();
    
  } catch (error) {
    console.error('[AccessRequests] Load error:', error);
    loadingRow.innerHTML = `
      <td colspan="6" class="py-8 text-center text-red-400">
        Failed to load requests: ${error.message}
      </td>
    `;
  }
}

// Render requests table
function renderRequestsTable() {
  const tableBody = document.getElementById('requests-table-body');
  const emptyState = document.getElementById('empty-state');
  
  // Filter requests
  const filtered = currentFilter === 'all' 
    ? accessRequests 
    : accessRequests.filter(r => r.status === currentFilter);
  
  if (filtered.length === 0) {
    tableBody.innerHTML = '';
    emptyState.classList.remove('hidden');
    return;
  }
  
  emptyState.classList.add('hidden');
  
  tableBody.innerHTML = filtered.map(request => `
    <tr class="border-b border-slate-700/50 hover:bg-slate-700/30 transition cursor-pointer" onclick="openRequestModal('${request.id}')">
      <td class="py-4">
        <div class="font-medium text-white">${escapeHtml(request.full_name)}</div>
        <div class="text-sm text-gray-400">${escapeHtml(request.job_title || 'Not specified')}</div>
      </td>
      <td class="py-4 text-gray-300">${escapeHtml(request.company_name)}</td>
      <td class="py-4">
        <a href="mailto:${escapeHtml(request.email)}" class="text-cyan-400 hover:underline" onclick="event.stopPropagation()">
          ${escapeHtml(request.email)}
        </a>
      </td>
      <td class="py-4 text-gray-400">${formatDate(request.created_at)}</td>
      <td class="py-4">${getStatusBadge(request.status)}</td>
      <td class="py-4 text-right">
        <button onclick="event.stopPropagation(); openRequestModal('${request.id}')" class="p-2 text-gray-400 hover:text-cyan-400 transition">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
        </button>
      </td>
    </tr>
  `).join('');
}

// Filter requests
function filterRequests(filter) {
  currentFilter = filter;
  
  // Update tab styles
  document.querySelectorAll('.filter-btn').forEach(btn => {
    if (btn.dataset.filter === filter) {
      btn.classList.add('bg-slate-700', 'text-white');
      btn.classList.remove('text-gray-400');
    } else {
      btn.classList.remove('bg-slate-700', 'text-white');
      btn.classList.add('text-gray-400');
    }
  });
  
  renderRequestsTable();
}

// Get status badge HTML
function getStatusBadge(status) {
  const badges = {
    pending: '<span class="px-2 py-1 text-xs rounded-full bg-amber-500/20 text-amber-400">Pending</span>',
    contacted: '<span class="px-2 py-1 text-xs rounded-full bg-blue-500/20 text-blue-400">Contacted</span>',
    approved: '<span class="px-2 py-1 text-xs rounded-full bg-emerald-500/20 text-emerald-400">Approved</span>',
    rejected: '<span class="px-2 py-1 text-xs rounded-full bg-red-500/20 text-red-400">Rejected</span>'
  };
  return badges[status] || badges.pending;
}

// Format date
function formatDate(dateStr) {
  const date = new Date(dateStr);
  const now = new Date();
  const diff = now - date;
  
  // Within last hour
  if (diff < 3600000) {
    const mins = Math.floor(diff / 60000);
    return mins <= 1 ? 'Just now' : `${mins} mins ago`;
  }
  
  // Within last 24 hours
  if (diff < 86400000) {
    const hours = Math.floor(diff / 3600000);
    return `${hours} hour${hours > 1 ? 's' : ''} ago`;
  }
  
  // Format date
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// Escape HTML
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>"']/g, m => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[m]));
}

// Open request modal
function openRequestModal(requestId) {
  selectedRequest = accessRequests.find(r => r.id === requestId);
  if (!selectedRequest) return;
  
  const modalContent = document.getElementById('modal-content');
  modalContent.innerHTML = `
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-xs text-gray-400">Full Name</label>
        <p class="text-white font-medium">${escapeHtml(selectedRequest.full_name)}</p>
      </div>
      <div>
        <label class="text-xs text-gray-400">Company</label>
        <p class="text-white font-medium">${escapeHtml(selectedRequest.company_name)}</p>
      </div>
      <div>
        <label class="text-xs text-gray-400">Email</label>
        <p class="text-cyan-400">${escapeHtml(selectedRequest.email)}</p>
      </div>
      <div>
        <label class="text-xs text-gray-400">Phone</label>
        <p class="text-white">${escapeHtml(selectedRequest.phone || 'Not provided')}</p>
      </div>
      <div>
        <label class="text-xs text-gray-400">Job Title</label>
        <p class="text-white">${escapeHtml(selectedRequest.job_title || 'Not provided')}</p>
      </div>
      <div>
        <label class="text-xs text-gray-400">Status</label>
        <p>${getStatusBadge(selectedRequest.status)}</p>
      </div>
    </div>
    ${selectedRequest.message ? `
      <div class="mt-4 p-3 bg-slate-900 rounded-lg">
        <label class="text-xs text-gray-400">Message</label>
        <p class="text-gray-300 mt-1">${escapeHtml(selectedRequest.message)}</p>
      </div>
    ` : ''}
    <div class="text-xs text-gray-500 mt-4">
      Requested: ${new Date(selectedRequest.created_at).toLocaleString()}
    </div>
  `;
  
  document.getElementById('modal-notes').value = selectedRequest.notes || '';
  document.getElementById('request-modal').classList.remove('hidden');
}

// Close request modal
function closeRequestModal() {
  document.getElementById('request-modal').classList.add('hidden');
  selectedRequest = null;
}

// Update request status
async function updateRequestStatus(status) {
  if (!selectedRequest) return;
  
  try {
    const notes = document.getElementById('modal-notes').value.trim();
    
    const { error } = await window.MissionPulse.supabase
      .from('access_requests')
      .update({
        status: status,
        notes: notes || null,
        reviewed_at: new Date().toISOString(),
        // reviewed_by would need current user ID
      })
      .eq('id', selectedRequest.id);
    
    if (error) throw error;
    
    // Update local data
    const index = accessRequests.findIndex(r => r.id === selectedRequest.id);
    if (index !== -1) {
      accessRequests[index].status = status;
      accessRequests[index].notes = notes;
    }
    
    // Refresh UI
    renderRequestsTable();
    closeRequestModal();
    
    // Update pending count
    const pendingCount = accessRequests.filter(r => r.status === 'pending').length;
    document.getElementById('pending-count').textContent = `${pendingCount} pending`;
    
    console.log(`[AccessRequests] Updated ${selectedRequest.id} to ${status}`);
    
  } catch (error) {
    console.error('[AccessRequests] Update error:', error);
    alert('Failed to update request: ' + error.message);
  }
}

// Refresh requests
function refreshAccessRequests() {
  loadAccessRequests();
}

// Initialize on load
document.addEventListener('DOMContentLoaded', () => {
  // Wait for Supabase to be ready
  setTimeout(loadAccessRequests, 500);
});

// Subscribe to real-time updates
function subscribeToAccessRequests() {
  if (!window.MissionPulse?.supabase) return;
  
  window.MissionPulse.supabase
    .channel('access_requests_changes')
    .on('postgres_changes', { 
      event: 'INSERT', 
      schema: 'public', 
      table: 'access_requests' 
    }, (payload) => {
      console.log('[AccessRequests] New request:', payload.new);
      accessRequests.unshift(payload.new);
      renderRequestsTable();
      
      // Update pending count
      const pendingCount = accessRequests.filter(r => r.status === 'pending').length;
      document.getElementById('pending-count').textContent = `${pendingCount} pending`;
    })
    .subscribe();
}

// Call subscribe after supabase is ready
setTimeout(subscribeToAccessRequests, 1000);
</script>

  /* Inline styles for panel (add to main CSS if preferred) */
  #access-requests-panel {
    animation: fadeIn 0.3s ease-out;

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
