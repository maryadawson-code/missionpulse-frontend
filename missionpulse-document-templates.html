  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; color: #fff; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-slideUp { animation: slideUp 0.5s ease-out forwards; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #111C2E; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #243656; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #00E5FA; }
    .glass-card { background: rgba(17, 28, 46, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc4MzUyMjQsImV4cCI6MjA1MzQxMTIyNH0.pBPL9l2zL7LLd_A5I--hPBzw5YwG3ajPMtbYsqsxIgQ';

    const Icons = {

      folder: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>,
      document: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>,
      download: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>,
      copy: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>,
      star: () => <svg className="w-full h-full" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>,
      starOutline: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>,
      search: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" strokeWidth={2}/><path strokeLinecap="round" strokeWidth={2} d="M21 21l-4.35-4.35"/></svg>,
      plus: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>,
      x: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>,
      eye: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>,
      clock: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6l4 2"/></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    const CATEGORIES = [
      { key: 'all', name: 'All Templates', icon: 'folder', color: '#00E5FA' },
      { key: 'executive_summary', name: 'Executive Summary', icon: 'document', color: '#8B5CF6' },
      { key: 'technical_approach', name: 'Technical Approach', icon: 'document', color: '#00D29F' },
      { key: 'management_approach', name: 'Management Approach', icon: 'document', color: '#F59E0B' },
      { key: 'past_performance', name: 'Past Performance', icon: 'document', color: '#EC4899' },
      { key: 'pricing', name: 'Pricing/BOE', icon: 'document', color: '#EF4444' },
      { key: 'compliance', name: 'Compliance', icon: 'document', color: '#06B6D4' },
      { key: 'orals', name: 'Orals/Presentations', icon: 'document', color: '#10B981' },
      { key: 'staffing', name: 'Staffing Plan', icon: 'document', color: '#6366F1' },
    ];

    const DEMO_TEMPLATES = [
      {
        id: 'tmpl-1',
        name: 'DHA Executive Summary - Healthcare IT',
        description: 'Proven executive summary template for DHA healthcare IT opportunities. Patient-centric outcomes focus.',
        category: 'executive_summary',
        file_type: 'docx',
        version: '2.3',
        customer_agency: 'DHA',
        use_count: 47,
        success_rate: 92,
        is_starred: true,
        tags: ['dha', 'healthcare', 'executive-summary'],
        last_updated: '2025-01-28',
        created_by: 'Mary Womack',
      },
      {
        id: 'tmpl-2',
        name: 'Technical Approach - Cloud Migration',
        description: 'Comprehensive technical approach for cloud migration projects. Includes FedRAMP compliance sections.',
        category: 'technical_approach',
        file_type: 'docx',
        version: '1.8',
        customer_agency: 'Multiple',
        use_count: 34,
        success_rate: 85,
        is_starred: true,
        tags: ['cloud', 'fedramp', 'technical'],
        last_updated: '2025-01-25',
        created_by: 'Mary Womack',
      },
      {
        id: 'tmpl-3',
        name: 'LCAT Rate Justification Matrix',
        description: 'GSA schedule comparison template with variance analysis for LCAT rate justification.',
        category: 'pricing',
        file_type: 'xlsx',
        version: '3.1',
        customer_agency: 'Multiple',
        use_count: 56,
        success_rate: 88,
        is_starred: false,
        tags: ['pricing', 'lcat', 'gsa'],
        last_updated: '2025-01-20',
        created_by: 'Mary Womack',
      },
      {
        id: 'tmpl-4',
        name: 'Past Performance Questionnaire',
        description: 'Standard PPQ format with evaluation criteria and reference contact templates.',
        category: 'past_performance',
        file_type: 'docx',
        version: '2.0',
        customer_agency: 'Multiple',
        use_count: 41,
        success_rate: 90,
        is_starred: false,
        tags: ['ppq', 'past-performance', 'references'],
        last_updated: '2025-01-15',
        created_by: 'Mary Womack',
      },
      {
        id: 'tmpl-5',
        name: 'Orals Presentation - 45 Min Format',
        description: 'PowerPoint template for 45-minute oral presentations with Q&A section.',
        category: 'orals',
        file_type: 'pptx',
        version: '1.5',
        customer_agency: 'VA',
        use_count: 22,
        success_rate: 94,
        is_starred: true,
        tags: ['orals', 'presentation', 'va'],
        last_updated: '2025-01-18',
        created_by: 'Mary Womack',
      },
      {
        id: 'tmpl-6',
        name: 'Compliance Matrix - Section L/M',
        description: 'Compliance tracking matrix for RFP Section L/M requirements mapping.',
        category: 'compliance',
        file_type: 'xlsx',
        version: '2.2',
        customer_agency: 'Multiple',
        use_count: 63,
        success_rate: 87,
        is_starred: false,
        tags: ['compliance', 'section-l', 'section-m'],
        last_updated: '2025-01-22',
        created_by: 'Mary Womack',
      },
      {
        id: 'tmpl-7',
        name: 'Staffing Plan - IDIQ Task Order',
        description: 'Staff loading chart and transition plan template for IDIQ task orders.',
        category: 'staffing',
        file_type: 'xlsx',
        version: '1.7',
        customer_agency: 'Multiple',
        use_count: 29,
        success_rate: 82,
        is_starred: false,
        tags: ['staffing', 'idiq', 'transition'],
        last_updated: '2025-01-12',
        created_by: 'Mary Womack',
      },
      {
        id: 'tmpl-8',
        name: 'Management Approach - Agile/DevSecOps',
        description: 'Agile and DevSecOps management approach with sprint planning and CI/CD pipeline descriptions.',
        category: 'management_approach',
        file_type: 'docx',
        version: '2.1',
        customer_agency: 'DHA',
        use_count: 38,
        success_rate: 86,
        is_starred: false,
        tags: ['agile', 'devsecops', 'management'],
        last_updated: '2025-01-24',
        created_by: 'Mary Womack',
      },
    ];

    const FILE_TYPE_ICONS = {
      docx: { color: '#2B579A', label: 'DOCX' },
      xlsx: { color: '#217346', label: 'XLSX' },
      pptx: { color: '#D24726', label: 'PPTX' },
      pdf: { color: '#FF0000', label: 'PDF' },
    };

    function DocumentTemplatesApp() {
      const [templates, setTemplates] = useState(DEMO_TEMPLATES);
      const [loading, setLoading] = useState(true);
      const [searchTerm, setSearchTerm] = useState('');
      const [categoryFilter, setCategoryFilter] = useState('all');
      const [selectedTemplate, setSelectedTemplate] = useState(null);
      const [showAddModal, setShowAddModal] = useState(false);

      useEffect(() => {
        loadTemplates();
      }, []);

      const loadTemplates = async () => {
        setLoading(true);
        try {
          const { data, error } = await sbClient
            .from('document_templates')
            .select('*')
            .order('use_count', { ascending: false });

          if (error) throw error;
          if (data && data.length > 0) setTemplates(data);
        } catch (err) {
          console.log('Using demo data:', err.message);
        } finally {
          setLoading(false);
        }
      };

      const toggleStar = async (id) => {
        setTemplates(prev => prev.map(t => 
          t.id === id ? { ...t, is_starred: !t.is_starred } : t
        ));
      };

      const filteredTemplates = templates.filter(t => {
        if (searchTerm && !t.name.toLowerCase().includes(searchTerm.toLowerCase()) &&
            !t.description?.toLowerCase().includes(searchTerm.toLowerCase())) {
          return false;
        }
        if (categoryFilter !== 'all' && t.category !== categoryFilter) return false;
        return true;
      });

      const stats = {
        total: templates.length,
        starred: templates.filter(t => t.is_starred).length,
        totalUses: templates.reduce((acc, t) => acc + t.use_count, 0),
        avgSuccess: Math.round(templates.reduce((acc, t) => acc + t.success_rate, 0) / templates.length),
      };

      return (
        <div className="min-h-screen bg-[#00050F]">
          <header className="glass-card border-b border-white/10 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="text-gray-400 hover:text-white transition-colors">
                    <Icon name="home" className="w-5 h-5" />
                  </a>
                  <div className="w-px h-6 bg-white/20" />
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                      <Icon name="folder" className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white">Document Templates</h1>
                      <p className="text-xs text-gray-400">Reusable proposal components</p>
                    </div>
                  </div>
                </div>
                <button
                  onClick={() => setShowAddModal(true)}
                  className="px-4 py-2 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-lg font-medium hover:opacity-90 transition-opacity flex items-center gap-2"
                >
                  <Icon name="plus" className="w-4 h-4" />
                  Add Template
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8">
            {/* Stats */}
            <div className="grid grid-cols-4 gap-4 mb-8">
              {[
                { label: 'Total Templates', value: stats.total, icon: 'folder', color: '#00E5FA' },
                { label: 'Starred', value: stats.starred, icon: 'star', color: '#F59E0B' },
                { label: 'Total Uses', value: stats.totalUses, icon: 'copy', color: '#8B5CF6' },
                { label: 'Avg Success', value: `${stats.avgSuccess}%`, icon: 'eye', color: '#00D29F' },
              ].map((stat, idx) => (
                <div key={idx} className="glass-card rounded-xl p-4">
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-gray-400 text-sm">{stat.label}</span>
                    <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ background: `${stat.color}20` }}>
                      <Icon name={stat.icon} className="w-4 h-4" style={{ color: stat.color }} />
                    </div>
                  </div>
                  <div className="text-2xl font-bold text-white">{stat.value}</div>
                </div>
              ))}
            </div>

            {/* Filters */}
            <div className="glass-card rounded-xl p-4 mb-6">
              <div className="flex items-center gap-4 flex-wrap">
                <div className="flex-1 min-w-[300px] relative">
                  <Icon name="search" className="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                  <input
                    type="text"
                    placeholder="Search templates..."
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                    className="w-full pl-10 pr-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500"
                  />
                </div>
                <select
                  value={categoryFilter}
                  onChange={(e) => setCategoryFilter(e.target.value)}
                  className="px-4 py-2 bg-[#0A1628] border border-white/10 rounded-lg text-white focus:outline-none focus:border-indigo-500"
                >
                  {CATEGORIES.map(cat => (
                    <option key={cat.key} value={cat.key}>{cat.name}</option>
                  ))}
                </select>
              </div>
            </div>

            {/* Templates Grid */}
            {loading ? (
              <div className="flex items-center justify-center py-20">
                <div className="w-8 h-8 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin" />
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {filteredTemplates.map((template, idx) => {
                  const category = CATEGORIES.find(c => c.key === template.category);
                  const fileType = FILE_TYPE_ICONS[template.file_type] || FILE_TYPE_ICONS.docx;

                  return (
                    <div
                      key={template.id}
                      className="glass-card rounded-xl p-5 hover:border-indigo-500/30 transition-all cursor-pointer animate-slideUp"
                      style={{ animationDelay: `${idx * 50}ms` }}
                      onClick={() => setSelectedTemplate(template)}
                    >
                      <div className="flex items-start justify-between mb-3">
                        <div className="flex items-center gap-3">
                          <div 
                            className="w-10 h-10 rounded-lg flex items-center justify-center text-white text-xs font-bold"
                            style={{ backgroundColor: fileType.color }}
                          >
                            {fileType.label}
                          </div>
                          <div>
                            <span className="text-xs text-gray-500">v{template.version}</span>
                          </div>
                        </div>
                        <button
                          onClick={(e) => { e.stopPropagation(); toggleStar(template.id); }}
                          className={`p-1 rounded transition-colors ${template.is_starred ? 'text-amber-400' : 'text-gray-500 hover:text-amber-400'}`}
                        >
                          <Icon name={template.is_starred ? 'star' : 'starOutline'} className="w-4 h-4" />
                        </button>
                      </div>

                      <h3 className="font-semibold text-white mb-2 line-clamp-2">{template.name}</h3>
                      <p className="text-sm text-gray-400 mb-4 line-clamp-2">{template.description}</p>

                      <div className="flex items-center gap-2 flex-wrap mb-4">
                        <span 
                          className="px-2 py-1 rounded-full text-xs font-medium"
                          style={{ background: `${category?.color}20`, color: category?.color }}
                        >
                          {category?.name}
                        </span>
                        {template.customer_agency !== 'Multiple' && (
                          <span className="px-2 py-1 bg-white/5 text-gray-400 rounded-full text-xs">
                            {template.customer_agency}
                          </span>
                        )}
                      </div>

                      <div className="flex items-center justify-between text-xs text-gray-500">
                        <div className="flex items-center gap-3">
                          <span className="flex items-center gap-1">
                            <Icon name="copy" className="w-3 h-3" />
                            {template.use_count} uses
                          </span>
                          <span className="flex items-center gap-1 text-emerald-400">
                            {template.success_rate}% win
                          </span>
                        </div>
                        <span className="flex items-center gap-1">
                          <Icon name="clock" className="w-3 h-3" />
                          {template.last_updated}
                        </span>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {filteredTemplates.length === 0 && !loading && (
              <div className="text-center py-20">
                <Icon name="folder" className="w-16 h-16 text-gray-600 mx-auto mb-4" />
                <h3 className="text-xl font-semibold text-gray-400 mb-2">No templates found</h3>
                <p className="text-gray-500">Try adjusting your filters or add a new template</p>
              </div>
            )}
          </main>

          {/* Detail Modal */}
          {selectedTemplate && (
            <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setSelectedTemplate(null)}>
              <div className="glass-card rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                <div className="p-6 border-b border-white/10">
                  <div className="flex items-start justify-between">
                    <div className="flex items-center gap-4">
                      <div 
                        className="w-14 h-14 rounded-xl flex items-center justify-center text-white font-bold"
                        style={{ backgroundColor: FILE_TYPE_ICONS[selectedTemplate.file_type]?.color }}
                      >
                        {FILE_TYPE_ICONS[selectedTemplate.file_type]?.label}
                      </div>
                      <div>
                        <h2 className="text-xl font-bold text-white">{selectedTemplate.name}</h2>
                        <p className="text-sm text-gray-400">Version {selectedTemplate.version}</p>
                      </div>
                    </div>
                    <button onClick={() => setSelectedTemplate(null)} className="p-2 text-gray-400 hover:text-white">
                      <Icon name="x" className="w-5 h-5" />
                    </button>
                  </div>
                </div>

                <div className="p-6 space-y-6">
                  <p className="text-gray-300">{selectedTemplate.description}</p>

                  <div className="grid grid-cols-2 gap-4">
                    <div className="bg-[#0A1628] rounded-lg p-4">
                      <span className="text-xs text-gray-500">Category</span>
                      <p className="text-white font-medium">{CATEGORIES.find(c => c.key === selectedTemplate.category)?.name}</p>
                    </div>
                    <div className="bg-[#0A1628] rounded-lg p-4">
                      <span className="text-xs text-gray-500">Agency</span>
                      <p className="text-white font-medium">{selectedTemplate.customer_agency}</p>
                    </div>
                    <div className="bg-[#0A1628] rounded-lg p-4">
                      <span className="text-xs text-gray-500">Times Used</span>
                      <p className="text-white font-medium">{selectedTemplate.use_count}</p>
                    </div>
                    <div className="bg-[#0A1628] rounded-lg p-4">
                      <span className="text-xs text-gray-500">Success Rate</span>
                      <p className="text-emerald-400 font-medium">{selectedTemplate.success_rate}%</p>
                    </div>
                  </div>

                  {selectedTemplate.tags?.length > 0 && (
                    <div>
                      <h4 className="text-sm font-medium text-gray-400 mb-2">Tags</h4>
                      <div className="flex flex-wrap gap-2">
                        {selectedTemplate.tags.map((tag, i) => (
                          <span key={i} className="px-3 py-1 bg-white/5 text-gray-300 rounded-full text-sm">
                            #{tag}
                          </span>
                        ))}
                      </div>
                    </div>
                  )}
                </div>

                <div className="p-6 border-t border-white/10 flex justify-end gap-3">
                  <button className="px-4 py-2 bg-[#0A1628] text-gray-300 rounded-lg hover:text-white transition-colors flex items-center gap-2">
                    <Icon name="eye" className="w-4 h-4" />
                    Preview
                  </button>
