<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposal Templates - MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyan: { 400: '#00E5FA', 500: '#00C4D4', 600: '#00A3B4' },
                        navy: { 900: '#00050F', 800: '#000A1A', 700: '#001025' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: linear-gradient(135deg, #00050F 0%, #001025 50%, #00050F 100%); }
        .glass { background: rgba(0, 229, 250, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.1); }
    </style>
</head>
<body class="min-h-screen text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc4MzQ0NjIsImV4cCI6MjA1MzQxMDQ2Mn0.zKdMYwjn6Gj9p1fY-4kWxLsYwBvmFg6I9-OxFJJx-V4';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const DEMO_TEMPLATES = [
            { id: '1', name: 'Full Proposal - IDIQ', description: 'Complete proposal template for IDIQ task orders including all volumes', template_type: 'full_proposal', contract_type: 'idiq', agency_type: 'dod', sections: ['Cover Letter', 'Executive Summary', 'Technical Volume', 'Management Volume', 'Past Performance', 'Pricing Volume'], use_count: 48, is_public: true, tags: ['idiq', 'dod', 'full'] },
            { id: '2', name: 'Technical Volume - DoD', description: 'Technical approach template optimized for DoD requirements', template_type: 'tech_volume', contract_type: 'standalone', agency_type: 'dod', sections: ['Technical Understanding', 'Approach', 'Staffing Plan', 'Quality Control', 'Transition Plan'], use_count: 35, is_public: true, tags: ['technical', 'dod'] },
            { id: '3', name: 'Management Volume - Healthcare', description: 'Management approach for DHA/VA healthcare IT contracts', template_type: 'mgmt_volume', contract_type: 'bpa', agency_type: 'dod', sections: ['Program Management', 'Risk Management', 'Communication Plan', 'Organizational Chart', 'Key Personnel'], use_count: 29, is_public: true, tags: ['management', 'healthcare', 'dha'] },
            { id: '4', name: 'Past Performance Volume', description: 'Past performance template with relevancy matrix', template_type: 'past_perf', contract_type: 'standalone', agency_type: 'civilian', sections: ['Contract 1', 'Contract 2', 'Contract 3', 'Relevancy Matrix', 'CPARS Summary'], use_count: 42, is_public: true, tags: ['past-performance'] },
            { id: '5', name: 'Executive Summary - 2 Page', description: 'Concise executive summary hitting key discriminators', template_type: 'exec_summary', contract_type: 'standalone', agency_type: 'civilian', sections: ['Value Proposition', 'Key Differentiators', 'Team Overview', 'Win Themes'], use_count: 56, is_public: true, tags: ['executive', 'summary'] },
            { id: '6', name: 'Pricing Volume - T&M', description: 'Time and Materials pricing template with labor categories', template_type: 'pricing', contract_type: 'idiq', agency_type: 'dod', sections: ['Labor Rate Table', 'ODC Pricing', 'Subcontractor Rates', 'BOE Narrative', 'Assumptions'], use_count: 31, is_public: false, tags: ['pricing', 'tm', 'cui'] },
            { id: '7', name: 'Pricing Volume - FFP', description: 'Firm Fixed Price pricing template with CLIN structure', template_type: 'pricing', contract_type: 'standalone', agency_type: 'civilian', sections: ['Price Schedule', 'CLIN Breakdown', 'Basis of Estimate', 'Assumptions'], use_count: 27, is_public: false, tags: ['pricing', 'ffp', 'cui'] },
            { id: '8', name: 'Cover Letter Template', description: 'Professional cover letter with compliance matrix reference', template_type: 'cover_letter', contract_type: 'standalone', agency_type: 'civilian', sections: ['Compliance Statement', 'Key Points', 'Contact Information'], use_count: 64, is_public: true, tags: ['cover', 'letter'] },
            { id: '9', name: 'GSA Schedule Response', description: 'Template for GSA Schedule task order responses', template_type: 'full_proposal', contract_type: 'gsa', agency_type: 'civilian', sections: ['Technical Approach', 'Staffing', 'Past Performance', 'Pricing'], use_count: 22, is_public: true, tags: ['gsa', 'schedule'] },
            { id: '10', name: 'GWAC Response - CIO-SP3', description: 'Template optimized for CIO-SP3 task orders', template_type: 'full_proposal', contract_type: 'gwac', agency_type: 'civilian', sections: ['Technical Volume', 'Management Volume', 'Past Performance', 'Price Volume'], use_count: 18, is_public: true, tags: ['gwac', 'cio-sp3'] }
        ];

        const TEMPLATE_TYPES = [
            { id: 'all', name: 'All Types', icon: 'fa-layer-group' },
            { id: 'full_proposal', name: 'Full Proposal', icon: 'fa-file-alt' },
            { id: 'tech_volume', name: 'Technical Volume', icon: 'fa-microchip' },
            { id: 'mgmt_volume', name: 'Management Volume', icon: 'fa-sitemap' },
            { id: 'past_perf', name: 'Past Performance', icon: 'fa-history' },
            { id: 'pricing', name: 'Pricing', icon: 'fa-dollar-sign' },
            { id: 'exec_summary', name: 'Executive Summary', icon: 'fa-file-contract' },
            { id: 'cover_letter', name: 'Cover Letter', icon: 'fa-envelope' }
        ];

        const CONTRACT_TYPES = [
            { id: 'all', name: 'All Contracts' },
            { id: 'idiq', name: 'IDIQ' },
            { id: 'bpa', name: 'BPA' },
            { id: 'gwac', name: 'GWAC' },
            { id: 'gsa', name: 'GSA Schedule' },
            { id: 'standalone', name: 'Standalone' }
        ];

        function ProposalTemplates() {
            const [templates, setTemplates] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedType, setSelectedType] = useState('all');
            const [selectedContract, setSelectedContract] = useState('all');
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedTemplate, setSelectedTemplate] = useState(null);
            const [showCreateModal, setShowCreateModal] = useState(false);

            useEffect(() => {
                loadTemplates();
            }, []);

            async function loadTemplates() {
                try {
                    const { data, error } = await supabase.from('proposal_templates').select('*').eq('is_archived', false).order('use_count', { ascending: false });
                    if (error) throw error;
                    setTemplates(data?.length ? data : DEMO_TEMPLATES);
                } catch (err) {
                    console.log('Using demo data:', err.message);
                    setTemplates(DEMO_TEMPLATES);
                }
                setLoading(false);
            }

            const filteredTemplates = templates.filter(t => {
                const matchesType = selectedType === 'all' || t.template_type === selectedType;
                const matchesContract = selectedContract === 'all' || t.contract_type === selectedContract;
                const matchesSearch = !searchQuery || t.name.toLowerCase().includes(searchQuery.toLowerCase()) || t.description?.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesType && matchesContract && matchesSearch;
            });

            function getTypeIcon(type) {
                return TEMPLATE_TYPES.find(t => t.id === type)?.icon || 'fa-file';
            }

            function getTypeName(type) {
                return TEMPLATE_TYPES.find(t => t.id === type)?.name || type;
            }

            if (selectedTemplate) {
                return (
                    <div className="min-h-screen p-6">
                        <div className="max-w-4xl mx-auto">
                            <button onClick={() => setSelectedTemplate(null)} className="flex items-center gap-2 text-cyan-400 hover:text-cyan-300 mb-6">
                                <i className="fas fa-arrow-left"></i><span>Back to Templates</span>
                            </button>
                            <div className="glass rounded-xl p-6 mb-6">
                                <div className="flex items-start justify-between mb-4">
                                    <div>
                                        <div className="flex items-center gap-2 mb-2">
                                            <span className="px-2 py-1 bg-cyan-500/20 text-cyan-400 text-sm rounded">{getTypeName(selectedTemplate.template_type)}</span>
                                            <span className="px-2 py-1 bg-blue-500/20 text-blue-400 text-sm rounded uppercase">{selectedTemplate.contract_type}</span>
                                            {!selectedTemplate.is_public && <span className="px-2 py-1 bg-yellow-500/20 text-yellow-400 text-sm rounded">CUI</span>}
                                        </div>
                                        <h1 className="text-3xl font-bold">{selectedTemplate.name}</h1>
                                        <p className="text-gray-400 mt-2">{selectedTemplate.description}</p>
                                    </div>
                                    <button className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium">
                                        <i className="fas fa-copy mr-2"></i>Use Template
                                    </button>
                                </div>
                                <div className="flex items-center gap-4 text-sm text-gray-400">
                                    <span><i className="fas fa-copy mr-1"></i>{selectedTemplate.use_count} uses</span>
                                    <span><i className="fas fa-building mr-1"></i>{selectedTemplate.agency_type?.toUpperCase()}</span>
                                </div>
                            </div>

                            <div className="glass rounded-xl p-6 mb-6">
                                <h2 className="text-xl font-semibold mb-4">Template Sections</h2>
                                <div className="space-y-3">
                                    {selectedTemplate.sections?.map((section, index) => (
                                        <div key={index} className="flex items-center gap-4 p-4 bg-navy-800/50 rounded-lg">
                                            <div className="w-8 h-8 flex items-center justify-center bg-cyan-500/20 text-cyan-400 rounded-lg font-medium">
                                                {index + 1}
                                            </div>
                                            <div className="flex-1">
                                                <h3 className="font-medium">{section}</h3>
                                            </div>
                                            <i className="fas fa-grip-vertical text-gray-500"></i>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {selectedTemplate.tags?.length > 0 && (
                                <div className="glass rounded-xl p-6">
                                    <h2 className="text-xl font-semibold mb-4">Tags</h2>
                                    <div className="flex flex-wrap gap-2">
                                        {selectedTemplate.tags.map(tag => (
                                            <span key={tag} className="px-3 py-1 bg-gray-700 text-gray-300 rounded-full text-sm">{tag}</span>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-6">
                    <div className="max-w-7xl mx-auto">
                        {/* Header */}
                        <div className="flex items-center justify-between mb-6">
                            <div className="flex items-center gap-4">
                                <a href="index.html" className="text-cyan-400 hover:text-cyan-300"><i className="fas fa-arrow-left"></i></a>
                                <div><h1 className="text-3xl font-bold">Proposal Templates</h1><p className="text-gray-400">Reusable templates for faster proposal development</p></div>
                            </div>
                            <button onClick={() => setShowCreateModal(true)} className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium">
                                <i className="fas fa-plus mr-2"></i>New Template
                            </button>
                        </div>

                        {/* Filters */}
                        <div className="glass rounded-xl p-4 mb-6">
                            <div className="flex flex-wrap items-center gap-4">
                                <div className="relative flex-1 min-w-[200px]">
                                    <i className="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                    <input type="text" placeholder="Search templates..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full bg-navy-800 border border-cyan-500/30 rounded-lg pl-10 pr-4 py-2 focus:outline-none focus:border-cyan-400" />
                                </div>
                                <select value={selectedType} onChange={e => setSelectedType(e.target.value)} className="bg-navy-800 border border-cyan-500/30 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-400">
                                    {TEMPLATE_TYPES.map(t => (<option key={t.id} value={t.id}>{t.name}</option>))}
                                </select>
                                <select value={selectedContract} onChange={e => setSelectedContract(e.target.value)} className="bg-navy-800 border border-cyan-500/30 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-400">
                                    {CONTRACT_TYPES.map(c => (<option key={c.id} value={c.id}>{c.name}</option>))}
                                </select>
                            </div>
                        </div>

                        {/* Stats */}
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                            <div className="glass rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-cyan-400">{templates.length}</div>
                                <div className="text-sm text-gray-400">Total Templates</div>
                            </div>
                            <div className="glass rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-green-400">{templates.filter(t => t.is_public).length}</div>
                                <div className="text-sm text-gray-400">Public</div>
                            </div>
                            <div className="glass rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-yellow-400">{templates.filter(t => !t.is_public).length}</div>
                                <div className="text-sm text-gray-400">CUI/Private</div>
                            </div>
                            <div className="glass rounded-xl p-4 text-center">
                                <div className="text-3xl font-bold text-blue-400">{templates.reduce((sum, t) => sum + (t.use_count || 0), 0)}</div>
                                <div className="text-sm text-gray-400">Total Uses</div>
                            </div>
                        </div>

                        {/* Template Grid */}
                        {loading ? (
                            <div className="text-center py-12"><i className="fas fa-spinner fa-spin text-2xl text-cyan-400"></i></div>
                        ) : filteredTemplates.length === 0 ? (
                            <div className="glass rounded-xl p-12 text-center">
                                <i className="fas fa-file-alt text-4xl text-gray-500 mb-4"></i>
                                <p className="text-gray-400">No templates found</p>
                                <button onClick={() => { setSelectedType('all'); setSelectedContract('all'); setSearchQuery(''); }} className="mt-3 text-cyan-400 hover:text-cyan-300">Clear filters</button>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {filteredTemplates.map(template => (
                                    <div key={template.id} onClick={() => setSelectedTemplate(template)} className="glass rounded-xl p-6 cursor-pointer hover:bg-cyan-500/10 transition-all group">
                                        <div className="flex items-start justify-between mb-3">
                                            <div className="w-12 h-12 flex items-center justify-center bg-cyan-500/20 text-cyan-400 rounded-xl">
                                                <i className={`fas ${getTypeIcon(template.template_type)} text-xl`}></i>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                {!template.is_public && <span className="px-2 py-0.5 bg-yellow-500/20 text-yellow-400 text-xs rounded">CUI</span>}
                                                <span className="px-2 py-0.5 bg-blue-500/20 text-blue-400 text-xs rounded uppercase">{template.contract_type}</span>
                                            </div>
                                        </div>
                                        <h3 className="font-semibold mb-2 group-hover:text-cyan-400">{template.name}</h3>
                                        <p className="text-sm text-gray-400 mb-4 line-clamp-2">{template.description}</p>
                                        <div className="flex items-center justify-between text-xs text-gray-500">
                                            <span>{template.sections?.length || 0} sections</span>
                                            <span><i className="fas fa-copy mr-1"></i>{template.use_count} uses</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Create Modal */}
                    {showCreateModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                            <div className="glass rounded-xl p-6 w-full max-w-lg">
                                <div className="flex items-center justify-between mb-6">
                                    <h2 className="text-xl font-semibold">Create New Template</h2>
                                    <button onClick={() => setShowCreateModal(false)} className="text-gray-400 hover:text-white"><i className="fas fa-times"></i></button>
                                </div>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-1">Template Name</label>
                                        <input type="text" className="w-full bg-navy-800 border border-cyan-500/30 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-400" placeholder="e.g., Technical Volume - DoD" />
                                    </div>
                                    <div>
                                        <label className="block text-sm text-gray-400 mb-1">Description</label>
                                        <textarea className="w-full bg-navy-800 border border-cyan-500/30 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-400 h-24" placeholder="Describe this template..."></textarea>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm text-gray-400 mb-1">Template Type</label>
                                            <select className="w-full bg-navy-800 border border-cyan-500/30 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-400">
                                                {TEMPLATE_TYPES.filter(t => t.id !== 'all').map(t => (<option key={t.id} value={t.id}>{t.name}</option>))}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm text-gray-400 mb-1">Contract Type</label>
                                            <select className="w-full bg-navy-800 border border-cyan-500/30 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-400">
                                                {CONTRACT_TYPES.filter(c => c.id !== 'all').map(c => (<option key={c.id} value={c.id}>{c.name}</option>))}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <label className="flex items-center gap-2 cursor-pointer">
                                            <input type="checkbox" className="w-4 h-4 rounded" />
                                            <span className="text-sm">Make template public</span>
                                        </label>
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 mt-6">
                                    <button onClick={() => setShowCreateModal(false)} className="px-4 py-2 glass rounded-lg hover:bg-cyan-500/10">Cancel</button>
                                    <button onClick={() => setShowCreateModal(false)} className="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-medium">Create Template</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<ProposalTemplates />, document.getElementById('root'));
    </script>
</body>
</html>
