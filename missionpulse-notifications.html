<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification Center | MissionPulse</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass { background: rgba(0,229,250,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,229,250,0.1); }
    .glass-card { background: rgba(15,23,42,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(51,65,85,0.5); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    .animate-slide { animation: slideIn 0.3s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const DEMO_NOTIFICATIONS = [
      { id: '1', title: 'Proposal Deadline Alert', message: 'DHA EHR Modernization proposal due in 3 days', type: 'deadline', priority: 'high', source: 'Pipeline', time: '5 min ago', isRead: false },
      { id: '2', title: 'Review Request', message: 'Sarah Chen requested your review on Technical Volume', type: 'review', priority: 'normal', source: 'Documents', time: '15 min ago', isRead: false },
      { id: '3', title: 'New SAM.gov Match', message: 'VA Cloud Infrastructure (92% match score)', type: 'opportunity', priority: 'normal', source: 'SAM.gov', time: '1 hour ago', isRead: false },
      { id: '4', title: 'Compliance Check Complete', message: 'All compliance items verified for CMS Analytics', type: 'compliance', priority: 'low', source: 'Compliance', time: '2 hours ago', isRead: true },
      { id: '5', title: 'Team Assignment', message: 'You\'ve been assigned as Capture Manager for IHS Telehealth', type: 'assignment', priority: 'high', source: 'Team', time: '3 hours ago', isRead: true },
      { id: '6', title: 'Partner Update', message: 'CloudSecure Solutions signed teaming agreement', type: 'partner', priority: 'normal', source: 'Teaming', time: '5 hours ago', isRead: true },
      { id: '7', title: 'Risk Alert', message: 'New high-priority risk identified for DHA proposal', type: 'risk', priority: 'high', source: 'Risk Register', time: '6 hours ago', isRead: true },
      { id: '8', title: 'Win Theme Approved', message: 'CEO approved "AI-First Healthcare" theme', type: 'approval', priority: 'normal', source: 'Strategy', time: 'Yesterday', isRead: true },
      { id: '9', title: 'System Update', message: 'MissionPulse v12.1 deployed with new features', type: 'system', priority: 'low', source: 'System', time: 'Yesterday', isRead: true },
      { id: '10', title: 'Budget Alert', message: 'Proposal budget approaching 90% threshold', type: 'budget', priority: 'high', source: 'Pricing', time: '2 days ago', isRead: true }
    ];

    const Icons = {
      home: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
      bell: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>,
      check: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
      clock: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2}/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6l4 2" /></svg>,
      alert: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
      user: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>,
      folder: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" /></svg>,
      shield: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
      dollar: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      cog: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
      archive: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" /></svg>,
      trash: () => <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
    };

    const Icon = ({ name, className = "w-4 h-4" }) => {
      const IconComponent = Icons[name];
      return IconComponent ? <span className={`inline-block ${className}`}><IconComponent /></span> : null;
    };

    const getTypeIcon = (type) => {
      const icons = { deadline: 'clock', review: 'folder', opportunity: 'bell', compliance: 'shield', assignment: 'user', partner: 'user', risk: 'alert', approval: 'check', system: 'cog', budget: 'dollar' };
      return icons[type] || 'bell';
    };

    const getTypeColor = (type) => {
      const colors = { deadline: 'red', review: 'blue', opportunity: 'emerald', compliance: 'purple', assignment: 'cyan', partner: 'pink', risk: 'orange', approval: 'emerald', system: 'slate', budget: 'amber' };
      return colors[type] || 'slate';
    };

    function NotificationCenter() {
      const [notifications, setNotifications] = useState(DEMO_NOTIFICATIONS);
      const [filter, setFilter] = useState('all');
      const [selectedNotif, setSelectedNotif] = useState(null);

      const filteredNotifications = useMemo(() => {
        if (filter === 'all') return notifications;
        if (filter === 'unread') return notifications.filter(n => !n.isRead);
        return notifications.filter(n => n.type === filter);
      }, [notifications, filter]);

      const markAsRead = (id) => {
        setNotifications(prev => prev.map(n => n.id === id ? { ...n, isRead: true } : n));
      };

      const markAllAsRead = () => {
        setNotifications(prev => prev.map(n => ({ ...n, isRead: true })));
      };

      const deleteNotification = (id) => {
        setNotifications(prev => prev.filter(n => n.id !== id));
        setSelectedNotif(null);
      };

      const stats = {
        total: notifications.length,
        unread: notifications.filter(n => !n.isRead).length,
        highPriority: notifications.filter(n => n.priority === 'high' && !n.isRead).length
      };

      const types = ['all', 'unread', 'deadline', 'review', 'opportunity', 'compliance', 'risk'];

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="index.html" className="p-2 rounded-lg bg-slate-800/50 hover:bg-slate-700/50 transition-colors">
                    <Icon name="home" className="w-5 h-5 text-slate-400" />
                  </a>
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-500 to-orange-500 flex items-center justify-center relative">
                      <Icon name="bell" className="w-6 h-6 text-white" />
                      {stats.unread > 0 && (
                        <span className="absolute -top-1 -right-1 w-5 h-5 bg-red-500 rounded-full text-xs text-white flex items-center justify-center font-bold">
                          {stats.unread}
                        </span>
                      )}
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white">Notification Center</h1>
                      <p className="text-sm text-slate-400">{stats.unread} unread notifications</p>
                    </div>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  {stats.unread > 0 && (
                    <button 
                      onClick={markAllAsRead}
                      className="px-4 py-2 bg-cyan-500/20 border border-cyan-500/30 rounded-lg text-cyan-400 hover:bg-cyan-500/30 transition"
                    >
                      <Icon name="check" className="w-4 h-4 inline mr-2" />Mark All Read
                    </button>
                  )}
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8">
            <div className="grid grid-cols-4 gap-6">
              {/* Sidebar Filters */}
              <div className="col-span-1">
                <div className="glass-card rounded-xl p-4 sticky top-24">
                  <h3 className="text-sm font-semibold text-slate-400 mb-3">FILTER BY TYPE</h3>
                  <div className="space-y-1">
                    {types.map(type => (
                      <button
                        key={type}
                        onClick={() => setFilter(type)}
                        className={`w-full px-3 py-2 rounded-lg text-left text-sm transition flex items-center justify-between ${filter === type ? 'bg-cyan-500/20 text-cyan-400' : 'text-slate-400 hover:bg-slate-700/50'}`}
                      >
                        <span className="capitalize">{type}</span>
                        {type === 'unread' && stats.unread > 0 && (
                          <span className="bg-red-500/20 text-red-400 px-2 py-0.5 rounded-full text-xs">{stats.unread}</span>
                        )}
                      </button>
                    ))}
                  </div>

                  <div className="mt-6 pt-4 border-t border-slate-700/50">
                    <h3 className="text-sm font-semibold text-slate-400 mb-3">QUICK STATS</h3>
                    <div className="space-y-3">
                      <div className="flex items-center justify-between">
                        <span className="text-sm text-slate-400">High Priority</span>
                        <span className="text-red-400 font-semibold">{stats.highPriority}</span>
                      </div>
                      <div className="flex items-center justify-between">
                        <span className="text-sm text-slate-400">Total</span>
                        <span className="text-white font-semibold">{stats.total}</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              {/* Notifications List */}
              <div className="col-span-3 space-y-3">
                {filteredNotifications.length === 0 ? (
                  <div className="glass-card rounded-xl p-12 text-center">
                    <Icon name="bell" className="w-16 h-16 text-slate-600 mx-auto mb-4" />
                    <p className="text-slate-400">No notifications to display</p>
                  </div>
                ) : (
                  filteredNotifications.map(notif => {
                    const color = getTypeColor(notif.type);
                    return (
                      <div 
                        key={notif.id}
                        onClick={() => { setSelectedNotif(notif); markAsRead(notif.id); }}
                        className={`glass-card rounded-xl p-4 cursor-pointer transition-all hover:border-cyan-500/30 animate-slide ${!notif.isRead ? 'border-l-4 border-l-cyan-500' : ''}`}
                      >
                        <div className="flex items-start gap-4">
                          <div className={`w-10 h-10 rounded-lg bg-${color}-500/20 flex items-center justify-center flex-shrink-0`}>
                            <Icon name={getTypeIcon(notif.type)} className={`w-5 h-5 text-${color}-400`} />
                          </div>
                          <div className="flex-1 min-w-0">
                            <div className="flex items-start justify-between gap-2">
                              <div>
                                <h3 className={`font-medium ${notif.isRead ? 'text-slate-300' : 'text-white'}`}>{notif.title}</h3>
                                <p className="text-sm text-slate-400 mt-0.5">{notif.message}</p>
                              </div>
                              <div className="flex items-center gap-2 flex-shrink-0">
                                {notif.priority === 'high' && (
                                  <span className="px-2 py-0.5 bg-red-500/20 text-red-400 text-xs rounded-full">High</span>
                                )}
                                {!notif.isRead && (
                                  <span className="w-2 h-2 bg-cyan-500 rounded-full"></span>
                                )}
                              </div>
                            </div>
                            <div className="flex items-center gap-3 mt-2 text-xs text-slate-500">
                              <span>{notif.source}</span>
                              <span>•</span>
                              <span>{notif.time}</span>
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })
                )}
              </div>
            </div>
          </main>

          {/* Detail Modal */}
          {selectedNotif && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-6" onClick={() => setSelectedNotif(null)}>
              <div className="glass-card rounded-2xl max-w-lg w-full" onClick={e => e.stopPropagation()}>
                <div className="p-6">
                  <div className="flex items-start gap-4">
                    <div className={`w-12 h-12 rounded-lg bg-${getTypeColor(selectedNotif.type)}-500/20 flex items-center justify-center`}>
                      <Icon name={getTypeIcon(selectedNotif.type)} className={`w-6 h-6 text-${getTypeColor(selectedNotif.type)}-400`} />
                    </div>
                    <div className="flex-1">
                      <h2 className="text-xl font-bold text-white">{selectedNotif.title}</h2>
                      <p className="text-slate-400 mt-2">{selectedNotif.message}</p>
                      <div className="flex items-center gap-3 mt-4 text-sm text-slate-500">
                        <span>Source: {selectedNotif.source}</span>
                        <span>•</span>
                        <span>{selectedNotif.time}</span>
                      </div>
                    </div>
                  </div>
                </div>
                <div className="p-6 border-t border-slate-700/50 flex justify-between">
                  <button 
                    onClick={() => deleteNotification(selectedNotif.id)}
                    className="px-4 py-2 bg-red-500/10 text-red-400 rounded-lg hover:bg-red-500/20 transition"
                  >
                    <Icon name="trash" className="w-4 h-4 inline mr-2" />Delete
                  </button>
                  <button 
                    onClick={() => setSelectedNotif(null)}
                    className="px-4 py-2 bg-cyan-500 text-white rounded-lg font-semibold"
                  >
                    Close
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <footer className="glass border-t border-slate-700/50 mt-12">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-2 text-slate-400 text-sm">
                <Icon name="shield" className="w-4 h-4" />
                <span>Mission Meets Tech • MissionPulse v12</span>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<NotificationCenter />);
  </script>
</body>
</html>
