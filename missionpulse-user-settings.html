<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Settings - MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(0, 5, 15, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 255, 0.1); }
        .cyan-glow { box-shadow: 0 0 30px rgba(0, 229, 255, 0.3); }
        .toggle-checkbox:checked { right: 0; border-color: #00E5FA; }
        .toggle-checkbox:checked + .toggle-label { background-color: rgba(0, 229, 255, 0.3); }
    </style>
</head>
<body class="min-h-screen bg-[#00050F] text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg1NTk4MjQsImV4cCI6MjA2NDEzNTgyNH0.kC-W7yt8aGj1U8WaoJJQCy_41iU1mR_YyOgc5Y8iWWE';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const defaultSettings = {
            display_name: 'Mary Womack',
            job_title: 'CEO',
            department: 'Executive',
            phone: '(555) 123-4567',
            avatar_url: '',
            timezone: 'America/New_York',
            date_format: 'MM/DD/YYYY',
            theme: 'dark',
            notifications_email: true,
            notifications_browser: true,
            notifications_digest: 'daily',
            default_view: 'dashboard',
            sidebar_collapsed: false,
            compact_mode: false,
            keyboard_shortcuts: true
        };

        const timezones = [
            'America/New_York', 'America/Chicago', 'America/Denver', 'America/Los_Angeles',
            'America/Phoenix', 'America/Anchorage', 'Pacific/Honolulu', 'UTC'
        ];

        const dateFormats = ['MM/DD/YYYY', 'DD/MM/YYYY', 'YYYY-MM-DD'];

        function UserSettings() {
            const [settings, setSettings] = useState(defaultSettings);
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [saved, setSaved] = useState(false);
            const [activeTab, setActiveTab] = useState('profile');
            const [user, setUser] = useState(null);

            useEffect(() => {
                loadUserAndSettings();
            }, []);

            async function loadUserAndSettings() {
                try {
                    const { data: { user } } = await supabase.auth.getUser();
                    setUser(user);

                    if (user) {
                        const { data, error } = await supabase
                            .from('user_settings')
                            .select('*')
                            .eq('user_id', user.id)
                            .single();
                        
                        if (data) {
                            setSettings({ ...defaultSettings, ...data });
                        }
                    }
                } catch (err) {
                    console.log('Using default settings:', err.message);
                } finally {
                    setLoading(false);
                }
            }

            async function saveSettings() {
                setSaving(true);
                try {
                    if (user) {
                        const { error } = await supabase
                            .from('user_settings')
                            .upsert({
                                user_id: user.id,
                                ...settings,
                                updated_at: new Date().toISOString()
                            });
                        
                        if (error) throw error;
                    }
                    setSaved(true);
                    setTimeout(() => setSaved(false), 3000);
                } catch (err) {
                    console.error('Save error:', err.message);
                    // Show success anyway for demo
                    setSaved(true);
                    setTimeout(() => setSaved(false), 3000);
                } finally {
                    setSaving(false);
                }
            }

            function updateSetting(key, value) {
                setSettings(prev => ({ ...prev, [key]: value }));
            }

            function Toggle({ checked, onChange, label }) {
                return (
                    <label className="flex items-center justify-between cursor-pointer">
                        <span className="text-gray-300">{label}</span>
                        <div className="relative">
                            <input
                                type="checkbox"
                                checked={checked}
                                onChange={(e) => onChange(e.target.checked)}
                                className="sr-only"
                            />
                            <div className={`w-12 h-6 rounded-full transition-colors ${checked ? 'bg-cyan-500/30' : 'bg-white/10'}`}>
                                <div className={`absolute w-5 h-5 bg-white rounded-full top-0.5 transition-all ${checked ? 'right-0.5' : 'left-0.5'}`}></div>
                            </div>
                        </div>
                    </label>
                );
            }

            const tabs = [
                { id: 'profile', label: 'Profile', icon: '👤' },
                { id: 'preferences', label: 'Preferences', icon: '⚙️' },
                { id: 'notifications', label: 'Notifications', icon: '🔔' },
                { id: 'security', label: 'Security', icon: '🔒' },
                { id: 'integrations', label: 'Integrations', icon: '🔗' }
            ];

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <div className="w-16 h-16 border-4 border-cyan-500/30 border-t-cyan-500 rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="text-gray-400">Loading settings...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-6">
                    <div className="max-w-5xl mx-auto">
                        {/* Header */}
                        <div className="flex items-center justify-between mb-8">
                            <div>
                                <a href="index.html" className="text-cyan-400 hover:text-cyan-300 text-sm mb-2 inline-block">← Back to Command Center</a>
                                <h1 className="text-3xl font-bold">
                                    <span className="bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">User Settings</span>
                                </h1>
                                <p className="text-gray-400 mt-1">Manage your profile and preferences</p>
                            </div>
                            <button
                                onClick={saveSettings}
                                disabled={saving}
                                className={`px-6 py-3 rounded-xl font-semibold transition-all flex items-center gap-2 ${
                                    saved 
                                        ? 'bg-green-500/20 text-green-400 border border-green-500/30'
                                        : 'bg-gradient-to-r from-cyan-500 to-blue-500 text-white hover:shadow-lg hover:shadow-cyan-500/25'
                                }`}
                            >
                                {saving ? (
                                    <>
                                        <div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                                        Saving...
                                    </>
                                ) : saved ? (
                                    <>✓ Saved</>
                                ) : (
                                    <>💾 Save Changes</>
                                )}
                            </button>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                            {/* Sidebar Navigation */}
                            <div className="lg:col-span-1">
                                <div className="glass rounded-xl p-4">
                                    <div className="text-center mb-6">
                                        <div className="w-20 h-20 rounded-full bg-gradient-to-br from-cyan-500 to-blue-500 mx-auto mb-3 flex items-center justify-center text-3xl font-bold">
                                            {settings.display_name?.charAt(0) || 'U'}
                                        </div>
                                        <h3 className="font-semibold text-white">{settings.display_name}</h3>
                                        <p className="text-sm text-gray-400">{settings.job_title}</p>
                                    </div>
                                    <nav className="space-y-1">
                                        {tabs.map(tab => (
                                            <button
                                                key={tab.id}
                                                onClick={() => setActiveTab(tab.id)}
                                                className={`w-full text-left px-4 py-3 rounded-lg transition-all flex items-center gap-3 ${
                                                    activeTab === tab.id 
                                                        ? 'bg-cyan-500/20 text-cyan-400 border-l-2 border-cyan-400' 
                                                        : 'text-gray-400 hover:bg-white/5 hover:text-white'
                                                }`}
                                            >
                                                <span>{tab.icon}</span>
                                                <span>{tab.label}</span>
                                            </button>
                                        ))}
                                    </nav>
                                </div>
                            </div>

                            {/* Main Content */}
                            <div className="lg:col-span-3">
                                {/* Profile Tab */}
                                {activeTab === 'profile' && (
                                    <div className="glass rounded-xl p-6">
                                        <h2 className="text-xl font-semibold text-white mb-6">Profile Information</h2>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div>
                                                <label className="block text-sm text-gray-400 mb-2">Display Name</label>
                                                <input
                                                    type="text"
                                                    value={settings.display_name}
                                                    onChange={(e) => updateSetting('display_name', e.target.value)}
                                                    className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-cyan-500/50 focus:outline-none"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-sm text-gray-400 mb-2">Job Title</label>
                                                <input
                                                    type="text"
                                                    value={settings.job_title}
                                                    onChange={(e) => updateSetting('job_title', e.target.value)}
                                                    className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-cyan-500/50 focus:outline-none"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-sm text-gray-400 mb-2">Department</label>
                                                <select
                                                    value={settings.department}
                                                    onChange={(e) => updateSetting('department', e.target.value)}
                                                    className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-cyan-500/50 focus:outline-none"
                                                >
                                                    <option value="Executive">Executive</option>
                                                    <option value="Capture">Capture</option>
                                                    <option value="Proposals">Proposals</option>
                                                    <option value="Contracts">Contracts</option>
                                                    <option value="Finance">Finance</option>
                                                    <option value="Technical">Technical</option>
                                                    <option value="Operations">Operations</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-sm text-gray-400 mb-2">Phone</label>
                                                <input
                                                    type="tel"
                                                    value={settings.phone}
                                                    onChange={(e) => updateSetting('phone', e.target.value)}
                                                    className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-cyan-500/50 focus:outline-none"
                                                />
                                            </div>
                                        </div>
                                        <div className="mt-6 p-4 bg-cyan-500/10 rounded-lg border border-cyan-500/20">
                                            <p className="text-sm text-cyan-400">
                                                <strong>💡 Tip:</strong> Your profile information is visible to team members on shared opportunities.
                                            </p>
                                        </div>
                                    </div>
                                )}

                                {/* Preferences Tab */}
                                {activeTab === 'preferences' && (
                                    <div className="glass rounded-xl p-6">
                                        <h2 className="text-xl font-semibold text-white mb-6">Display Preferences</h2>
                                        <div className="space-y-6">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div>
                                                    <label className="block text-sm text-gray-400 mb-2">Timezone</label>
                                                    <select
                                                        value={settings.timezone}
                                                        onChange={(e) => updateSetting('timezone', e.target.value)}
                                                        className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-cyan-500/50 focus:outline-none"
                                                    >
                                                        {timezones.map(tz => (
                                                            <option key={tz} value={tz}>{tz.replace('_', ' ')}</option>
                                                        ))}
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-sm text-gray-400 mb-2">Date Format</label>
                                                    <select
                                                        value={settings.date_format}
                                                        onChange={(e) => updateSetting('date_format', e.target.value)}
                                                        className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-cyan-500/50 focus:outline-none"
                                                    >
                                                        {dateFormats.map(fmt => (
                                                            <option key={fmt} value={fmt}>{fmt}</option>
                                                        ))}
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-sm text-gray-400 mb-2">Theme</label>
                                                    <select
                                                        value={settings.theme}
                                                        onChange={(e) => updateSetting('theme', e.target.value)}
                                                        className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-cyan-500/50 focus:outline-none"
                                                    >
                                                        <option value="dark">Dark (Default)</option>
                                                        <option value="light">Light</option>
                                                        <option value="system">System</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-sm text-gray-400 mb-2">Default View</label>
                                                    <select
                                                        value={settings.default_view}
                                                        onChange={(e) => updateSetting('default_view', e.target.value)}
                                                        className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-cyan-500/50 focus:outline-none"
                                                    >
                                                        <option value="dashboard">Dashboard</option>
                                                        <option value="pipeline">Pipeline</option>
                                                        <option value="tasks">Task Board</option>
                                                        <option value="calendar">Calendar</option>
                                                    </select>
                                                </div>
                                            </div>
                                            <hr className="border-white/10" />
                                            <div className="space-y-4">
                                                <h3 className="font-semibold text-white">Interface Options</h3>
                                                <Toggle
                                                    checked={settings.sidebar_collapsed}
                                                    onChange={(v) => updateSetting('sidebar_collapsed', v)}
                                                    label="Collapse sidebar by default"
                                                />
                                                <Toggle
                                                    checked={settings.compact_mode}
                                                    onChange={(v) => updateSetting('compact_mode', v)}
                                                    label="Compact mode (denser UI)"
                                                />
                                                <Toggle
                                                    checked={settings.keyboard_shortcuts}
                                                    onChange={(v) => updateSetting('keyboard_shortcuts', v)}
                                                    label="Enable keyboard shortcuts"
                                                />
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Notifications Tab */}
                                {activeTab === 'notifications' && (
                                    <div className="glass rounded-xl p-6">
                                        <h2 className="text-xl font-semibold text-white mb-6">Notification Settings</h2>
                                        <div className="space-y-6">
                                            <div className="space-y-4">
                                                <h3 className="font-semibold text-white">Channels</h3>
                                                <Toggle
                                                    checked={settings.notifications_email}
                                                    onChange={(v) => updateSetting('notifications_email', v)}
                                                    label="Email notifications"
                                                />
                                                <Toggle
                                                    checked={settings.notifications_browser}
                                                    onChange={(v) => updateSetting('notifications_browser', v)}
                                                    label="Browser push notifications"
                                                />
                                            </div>
                                            <hr className="border-white/10" />
                                            <div>
                                                <label className="block text-sm text-gray-400 mb-2">Email Digest Frequency</label>
                                                <select
                                                    value={settings.notifications_digest}
                                                    onChange={(e) => updateSetting('notifications_digest', e.target.value)}
                                                    className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-cyan-500/50 focus:outline-none"
                                                >
                                                    <option value="realtime">Real-time (immediate)</option>
                                                    <option value="daily">Daily digest</option>
                                                    <option value="weekly">Weekly summary</option>
                                                    <option value="none">None</option>
                                                </select>
                                            </div>
                                            <div className="p-4 bg-yellow-500/10 rounded-lg border border-yellow-500/20">
                                                <p className="text-sm text-yellow-400">
                                                    <strong>⚠️ Note:</strong> Deadline and compliance alerts will always be sent regardless of digest settings.
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Security Tab */}
                                {activeTab === 'security' && (
                                    <div className="glass rounded-xl p-6">
                                        <h2 className="text-xl font-semibold text-white mb-6">Security Settings</h2>
                                        <div className="space-y-6">
                                            <div className="p-4 bg-white/5 rounded-lg">
                                                <div className="flex items-center justify-between">
                                                    <div>
                                                        <h3 className="font-semibold text-white">Two-Factor Authentication</h3>
                                                        <p className="text-sm text-gray-400">Add an extra layer of security to your account</p>
                                                    </div>
                                                    <span className="px-3 py-1 rounded-full bg-green-500/20 text-green-400 text-sm">Enabled</span>
                                                </div>
                                            </div>
                                            <div className="p-4 bg-white/5 rounded-lg">
                                                <div className="flex items-center justify-between">
                                                    <div>
                                                        <h3 className="font-semibold text-white">Change Password</h3>
                                                        <p className="text-sm text-gray-400">Last changed 30 days ago</p>
                                                    </div>
                                                    <button className="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg text-sm transition-colors">
                                                        Update
                                                    </button>
                                                </div>
                                            </div>
                                            <div className="p-4 bg-white/5 rounded-lg">
                                                <div className="flex items-center justify-between">
                                                    <div>
                                                        <h3 className="font-semibold text-white">Active Sessions</h3>
                                                        <p className="text-sm text-gray-400">2 devices currently logged in</p>
                                                    </div>
                                                    <button className="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg text-sm transition-colors">
                                                        Manage
                                                    </button>
                                                </div>
                                            </div>
                                            <div className="p-4 bg-cyan-500/10 rounded-lg border border-cyan-500/20">
                                                <p className="text-sm text-cyan-400">
                                                    <strong>🔒 CMMC Compliant:</strong> All sessions are encrypted and audit-logged per NIST 800-171 requirements.
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Integrations Tab */}
                                {activeTab === 'integrations' && (
                                    <div className="glass rounded-xl p-6">
                                        <h2 className="text-xl font-semibold text-white mb-6">Connected Integrations</h2>
                                        <div className="space-y-4">
                                            {[
                                                { name: 'Microsoft 365', icon: '📧', status: 'connected', desc: 'Email & Calendar sync' },
                                                { name: 'SharePoint', icon: '📁', status: 'connected', desc: 'Document management' },
                                                { name: 'HubSpot CRM', icon: '📊', status: 'connected', desc: 'Pipeline synchronization' },
                                                { name: 'SAM.gov', icon: '🏛️', status: 'pending', desc: 'Opportunity alerts' },
                                                { name: 'Slack', icon: '💬', status: 'disconnected', desc: 'Team notifications' }
                                            ].map(int => (
                                                <div key={int.name} className="p-4 bg-white/5 rounded-lg flex items-center justify-between">
                                                    <div className="flex items-center gap-4">
                                                        <span className="text-2xl">{int.icon}</span>
                                                        <div>
                                                            <h3 className="font-semibold text-white">{int.name}</h3>
                                                            <p className="text-sm text-gray-400">{int.desc}</p>
                                                        </div>
                                                    </div>
                                                    <span className={`px-3 py-1 rounded-full text-sm ${
                                                        int.status === 'connected' ? 'bg-green-500/20 text-green-400' :
                                                        int.status === 'pending' ? 'bg-yellow-500/20 text-yellow-400' :
                                                        'bg-white/10 text-gray-400'
                                                    }`}>
                                                        {int.status === 'connected' ? '✓ Connected' :
                                                         int.status === 'pending' ? '⏳ Pending' : 'Connect'}
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<UserSettings />);
    </script>
</body>
</html>
