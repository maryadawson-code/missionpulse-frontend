<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Pipeline Intelligence</title>
  <link rel="icon" type="image/png" href="MMT_icon_32px.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; color: #e2e8f0; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse { animation: pulse 2s infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

// CONFIG - CORRECTED SUPABASE
const CONFIG = {
  SUPABASE_URL: 'https://qdrtpnpnhkxvfmvfziop.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc3NjQ4NjcsImV4cCI6MjA1MzM0MDg2N30.iqAJTDGEQsxMBSfnOCdnPFLgupmYvn4eUMW1Rwhv8Dg',
  LOGIN_PAGE: 'login.html',
  DASHBOARD_PAGE: 'missionpulse-dashboard-hub.html'
};

let supabase = null;
try { supabase = window.supabase?.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY); } catch(e) {}

// AUTH CHECK
const checkAuth = () => {
  const session = localStorage.getItem('MP_SESSION');
  const userStr = localStorage.getItem('MP_USER');
  if (!session || !userStr) {
    const demoUser = { email: 'demo@missionmeetstech.com', name: 'Demo User', role: 'CEO', isDemo: true };
    localStorage.setItem('MP_SESSION', JSON.stringify({ created: Date.now(), isDemo: true }));
    localStorage.setItem('MP_USER', JSON.stringify(demoUser));
    return demoUser;
  }
  try { return JSON.parse(userStr); } catch { return null; }
};

// DEMO DATA
const DEMO_OPPORTUNITIES = [
  { id: 1, nickname: 'DHA EHR Mod', title: 'Electronic Health Record Modernization', agency: 'DHA', ceiling: 125000000, phase: 'Capture', pwin: 72, dueDate: '2026-03-15' },
  { id: 2, nickname: 'VA Claims AI', title: 'Veterans Benefits Claims Processing AI', agency: 'VA', ceiling: 89000000, phase: 'Proposal', pwin: 65, dueDate: '2026-02-28' },
  { id: 3, nickname: 'CMS Analytics', title: 'Medicare Data Analytics Platform', agency: 'CMS', ceiling: 156000000, phase: 'Blue Team', pwin: 78, dueDate: '2026-04-10' },
  { id: 4, nickname: 'IHS Telehealth', title: 'Indian Health Service Telehealth Expansion', agency: 'IHS', ceiling: 45000000, phase: 'Gate Review', pwin: 55, dueDate: '2026-05-01' },
  { id: 5, nickname: 'CDC Surveillance', title: 'Disease Surveillance Modernization', agency: 'CDC', ceiling: 78000000, phase: 'Capture', pwin: 60, dueDate: '2026-06-15' }
];

const PHASES = ['Discovery', 'Capture', 'Gate Review', 'Proposal', 'Blue Team', 'Red Team', 'Gold Team', 'Submitted', 'Won', 'Lost'];

const Icons = {
  back: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>,
  search: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
  filter: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>,
  plus: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>
};

function PWinBadge({ pwin }) {
  const color = pwin >= 70 ? 'emerald' : pwin >= 50 ? 'amber' : 'red';
  return (
    <div className={`px-2 py-1 rounded-full text-xs font-bold bg-${color}-500/20 text-${color}-400 border border-${color}-500/30`}>
      {pwin}% pWin
    </div>
  );
}

function OpportunityCard({ opp }) {
  const formatCurrency = (val) => `$${(val / 1000000).toFixed(0)}M`;
  
  return (
    <div className="glass rounded-xl p-4 hover:border-cyan-500/50 transition cursor-pointer">
      <div className="flex items-start justify-between mb-3">
        <div>
          <div className="font-semibold text-white">{opp.nickname}</div>
          <div className="text-xs text-slate-400">{opp.title}</div>
        </div>
        <PWinBadge pwin={opp.pwin} />
      </div>
      <div className="grid grid-cols-3 gap-4 text-xs">
        <div>
          <div className="text-slate-500">Agency</div>
          <div className="text-cyan-400 font-medium">{opp.agency}</div>
        </div>
        <div>
          <div className="text-slate-500">Ceiling</div>
          <div className="text-emerald-400 font-medium">{formatCurrency(opp.ceiling)}</div>
        </div>
        <div>
          <div className="text-slate-500">Phase</div>
          <div className="text-white font-medium">{opp.phase}</div>
        </div>
      </div>
      <div className="mt-3 pt-3 border-t border-slate-700/50 flex items-center justify-between">
        <div className="text-xs text-slate-500">Due: {opp.dueDate}</div>
        <button className="text-xs text-cyan-400 hover:underline">Open →</button>
      </div>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [opportunities, setOpportunities] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [phaseFilter, setPhaseFilter] = useState('all');

  useEffect(() => {
    const userData = checkAuth();
    if (userData) setUser(userData);
    fetchOpportunities();
  }, []);

  async function fetchOpportunities() {
    setLoading(true);
    try {
      if (supabase) {
        const { data, error } = await supabase.from('opportunities').select('*').order('created_at', { ascending: false });
        if (!error && data?.length > 0) { setOpportunities(data); setLoading(false); return; }
      }
    } catch (e) {}
    setOpportunities(DEMO_OPPORTUNITIES);
    setLoading(false);
  }

  const filtered = opportunities.filter(opp => {
    const matchesSearch = opp.nickname?.toLowerCase().includes(search.toLowerCase()) || 
                          opp.title?.toLowerCase().includes(search.toLowerCase()) ||
                          opp.agency?.toLowerCase().includes(search.toLowerCase());
    const matchesPhase = phaseFilter === 'all' || opp.phase === phaseFilter;
    return matchesSearch && matchesPhase;
  });

  const totalValue = filtered.reduce((sum, opp) => sum + (opp.ceiling || 0), 0);
  const avgPwin = filtered.length > 0 ? Math.round(filtered.reduce((sum, opp) => sum + (opp.pwin || 0), 0) / filtered.length) : 0;

  if (!user) return <div className="min-h-screen flex items-center justify-center"><div className="w-8 h-8 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin"></div></div>;

  return (
    <div className="min-h-screen bg-[#00050F]">
      <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
        <div className="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <a href={CONFIG.DASHBOARD_PAGE} className="p-2 rounded-lg hover:bg-slate-700 text-slate-400 hover:text-white"><Icons.back /></a>
            <div className="flex items-center gap-3">
              <span className="text-2xl">🔍</span>
              <div>
                <div className="font-bold text-white">Pipeline Intelligence</div>
                <div className="text-xs text-slate-400">Opportunity Tracking</div>
              </div>
            </div>
          </div>
          <div className="flex items-center gap-3">
            <button className="flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white rounded-lg text-sm font-medium hover:opacity-90">
              <Icons.plus /> New Opportunity
            </button>
          </div>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-6 py-8">
        {/* Stats */}
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
          <div className="glass rounded-xl p-4">
            <div className="text-2xl font-bold text-white">{filtered.length}</div>
            <div className="text-xs text-slate-400">Opportunities</div>
          </div>
          <div className="glass rounded-xl p-4">
            <div className="text-2xl font-bold text-emerald-400">${(totalValue / 1000000).toFixed(0)}M</div>
            <div className="text-xs text-slate-400">Total Value</div>
          </div>
          <div className="glass rounded-xl p-4">
            <div className="text-2xl font-bold text-cyan-400">{avgPwin}%</div>
            <div className="text-xs text-slate-400">Avg Win Probability</div>
          </div>
          <div className="glass rounded-xl p-4">
            <div className="text-2xl font-bold text-amber-400">{filtered.filter(o => o.phase === 'Proposal').length}</div>
            <div className="text-xs text-slate-400">In Proposal</div>
          </div>
        </div>

        {/* Filters */}
        <div className="flex flex-wrap gap-4 mb-6">
          <div className="relative flex-1 min-w-[200px]">
            <Icons.search />
            <input
              type="text"
              placeholder="Search opportunities..."
              value={search}
              onChange={(e) => setSearch(e.target.value)}
              className="w-full pl-10 pr-4 py-2 bg-slate-800/50 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500"
            />
          </div>
          <select
            value={phaseFilter}
            onChange={(e) => setPhaseFilter(e.target.value)}
            className="px-4 py-2 bg-slate-800/50 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-cyan-500"
          >
            <option value="all">All Phases</option>
            {PHASES.map(phase => <option key={phase} value={phase}>{phase}</option>)}
          </select>
        </div>

        {/* Grid */}
        {loading ? (
          <div className="text-center py-12"><div className="w-8 h-8 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto"></div></div>
        ) : (
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {filtered.map(opp => <OpportunityCard key={opp.id} opp={opp} />)}
          </div>
        )}
      </main>

      <footer className="border-t border-slate-800 py-4 mt-10">
        <div className="max-w-7xl mx-auto px-6 text-center text-xs text-slate-600">
          <span className="text-amber-500">⚠</span> AI GENERATED - REQUIRES HUMAN REVIEW • Mission Meets Tech © 2026
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
