<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionPulse | Frenemy Protocol</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --mmt-cyan: #00E5FA; --mmt-navy: #00050F; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--mmt-navy); color: #e2e8f0; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 250, 0.1); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

const CONFIG = {
  SUPABASE_URL: 'https://djuviwarqdvlbgcfuupa.supabase.co',
  SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8',
  LOGIN_PAGE: 'login.html'
};

const DEMO_PARTNERS = [
  { id: 1, company: 'HealthTech Solutions', contact: 'James Wilson', role: 'Technical SME', access: 'active', ndaSigned: true, expires: '2026-03-15', modules: ['writer', 'swarm'] },
  { id: 2, company: 'CyberShield Inc', contact: 'Maria Garcia', role: 'Cyber Specialist', access: 'active', ndaSigned: true, expires: '2026-02-28', modules: ['compliance', 'writer'] },
  { id: 3, company: 'DataVault Systems', contact: 'Robert Kim', role: 'Cloud Architect', access: 'pending', ndaSigned: false, expires: null, modules: [] },
  { id: 4, company: 'GovConsult LLC', contact: 'Patricia Brown', role: 'Pricing Consultant', access: 'revoked', ndaSigned: true, expires: '2026-01-15', modules: [] }
];

function checkAuth() {
  const session = localStorage.getItem('MP_SESSION');
  if (!session) { window.location.href = CONFIG.LOGIN_PAGE; return null; }
  try { return JSON.parse(localStorage.getItem('MP_USER')); }
  catch { return { email: 'demo@mmt.com', role: 'CEO', name: 'Demo User' }; }
}

function PartnerCard({ partner, onRevoke, onActivate }) {
  const statusColors = { active: 'bg-green-500/20 text-green-400 border-green-500', pending: 'bg-amber-500/20 text-amber-400 border-amber-500', revoked: 'bg-red-500/20 text-red-400 border-red-500' };
  
  return (
    <div className={`glass rounded-xl p-4 border-l-4 ${partner.access === 'active' ? 'border-green-500' : partner.access === 'pending' ? 'border-amber-500' : 'border-red-500'}`}>
      <div className="flex justify-between items-start mb-3">
        <div>
          <h3 className="font-bold text-white">{partner.company}</h3>
          <p className="text-sm text-slate-400">{partner.contact} • {partner.role}</p>
        </div>
        <span className={`px-2 py-1 rounded text-xs ${statusColors[partner.access]}`}>{partner.access}</span>
      </div>
      
      <div className="flex items-center gap-4 text-sm mb-3">
        <span className={partner.ndaSigned ? 'text-green-400' : 'text-red-400'}>
          {partner.ndaSigned ? '✓ NDA Signed' : '✗ NDA Pending'}
        </span>
        {partner.expires && <span className="text-slate-400">Expires: {partner.expires}</span>}
      </div>
      
      {partner.modules.length > 0 && (
        <div className="flex gap-2 mb-3 flex-wrap">
          {partner.modules.map(m => <span key={m} className="text-xs px-2 py-1 bg-slate-700 rounded">{m}</span>)}
        </div>
      )}
      
      <div className="flex gap-2">
        {partner.access === 'active' && <button onClick={() => onRevoke(partner.id)} className="px-3 py-1.5 bg-red-600/20 hover:bg-red-600/40 text-red-400 rounded-lg text-sm">Revoke Access</button>}
        {partner.access === 'pending' && <button onClick={() => onActivate(partner.id)} className="px-3 py-1.5 bg-green-600/20 hover:bg-green-600/40 text-green-400 rounded-lg text-sm">Activate</button>}
        {partner.access === 'revoked' && <button onClick={() => onActivate(partner.id)} className="px-3 py-1.5 bg-amber-600/20 hover:bg-amber-600/40 text-amber-400 rounded-lg text-sm">Reinstate</button>}
      </div>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [partners, setPartners] = useState(DEMO_PARTNERS);

  useEffect(() => {
    const authUser = checkAuth();
    if (authUser) setUser(authUser);
  }, []);

  const handleRevoke = (id) => setPartners(partners.map(p => p.id === id ? { ...p, access: 'revoked' } : p));
  const handleActivate = (id) => setPartners(partners.map(p => p.id === id ? { ...p, access: 'active' } : p));

  const stats = {
    total: partners.length,
    active: partners.filter(p => p.access === 'active').length,
    pending: partners.filter(p => p.access === 'pending').length,
    revoked: partners.filter(p => p.access === 'revoked').length
  };

  if (!user) return <div className="min-h-screen flex items-center justify-center text-cyan-400">Loading...</div>;

  return (
    <div className="min-h-screen bg-slate-950">
      <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            </a>
            <div>
              <h1 className="text-xl font-bold text-white">🛡️ Frenemy Protocol</h1>
              <p className="text-sm text-slate-400">Partner Access Control & NDA Management</p>
            </div>
          </div>
          <button className="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg text-sm font-medium">+ Add Partner</button>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-6 space-y-6">
        {/* Stats */}
        <div className="grid grid-cols-4 gap-4">
          <div className="glass rounded-xl p-4 text-center"><p className="text-3xl font-bold text-white">{stats.total}</p><p className="text-sm text-slate-400">Total Partners</p></div>
          <div className="glass rounded-xl p-4 text-center"><p className="text-3xl font-bold text-green-400">{stats.active}</p><p className="text-sm text-slate-400">Active Access</p></div>
          <div className="glass rounded-xl p-4 text-center"><p className="text-3xl font-bold text-amber-400">{stats.pending}</p><p className="text-sm text-slate-400">Pending NDA</p></div>
          <div className="glass rounded-xl p-4 text-center"><p className="text-3xl font-bold text-red-400">{stats.revoked}</p><p className="text-sm text-slate-400">Revoked</p></div>
        </div>

        {/* Partner Cards */}
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          {partners.map(p => <PartnerCard key={p.id} partner={p} onRevoke={handleRevoke} onActivate={handleActivate} />)}
        </div>

        {/* Auto-Revoke Notice */}
        <div className="glass rounded-xl p-4 border border-amber-500/30">
          <h3 className="font-semibold text-amber-400 mb-2">⚠️ Auto-Revoke Policy</h3>
          <p className="text-sm text-slate-400">Partner access is automatically revoked upon proposal submission per CMMC 2.0 requirements. All access logs are retained for audit purposes.</p>
        </div>
      </main>

      <footer className="border-t border-slate-800 mt-12">
        <div className="max-w-7xl mx-auto px-4 py-4 text-center text-xs text-slate-500">
          Mission Meets Tech © 2026 | MissionPulse v3.0 | Frenemy Protocol Module
        </div>
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
