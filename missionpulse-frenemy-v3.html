  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>

  </style>
</head>
<body class="bg-[#00050F] text-white min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    // ============================================
    // CONFIGURATION
    // ============================================
    const SUPABASE_URL = 'https://qdrtpnpnhkxvfmvfziop.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkcnRwbnBuaGt4dmZtdmZ6aW9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY3MTcyNjUsImV4cCI6MjA1MjI5MzI2NX0.DACT1xnVtJeHx5tL7_K8y1hOx9NyJE7B6UBhPqwHHx8';
    const API_URL = 'https://missionpulse-api.onrender.com';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // ============================================
    // DEMO DATA
    // ============================================
    const DEMO_PARTNERS = [
      {
        id: 1,
        name: 'TechForward Solutions',
        type: 'subcontractor',
        relationship: 'strong',
        set_aside: 'SDVOSB',
        capabilities: ['Cloud Architecture', 'DevSecOps', 'Kubernetes'],
        work_share: 15,
        nda_status: 'active',
        nda_expires: '2027-06-15',
        ta_status: 'pending',
        contact: 'Sarah Chen',
        contact_email: 'schen@techforward.com',
        past_wins: 3,
        past_losses: 1,
        notes: 'Strong technical partner, reliable delivery',
        health_score: 92
      },
      {
        id: 2,
        name: 'Federal Health Partners',
        type: 'subcontractor',
        relationship: 'developing',
        set_aside: '8(a)',
        capabilities: ['Healthcare IT', 'HL7 FHIR', 'EHR Integration'],
        work_share: 12,
        nda_status: 'active',
        nda_expires: '2026-12-31',
        ta_status: 'active',
        contact: 'Dr. James Wilson',
        contact_email: 'jwilson@fedhealth.com',
        past_wins: 1,
        past_losses: 0,
        notes: 'New partnership, strong healthcare domain expertise',
        health_score: 78
      },
      {
        id: 3,
        name: 'CyberShield Inc',
        type: 'subcontractor',
        relationship: 'strong',
        set_aside: 'HUBZone',
        capabilities: ['Cybersecurity', 'CMMC Assessment', 'Penetration Testing'],
        work_share: 8,
        nda_status: 'active',
        nda_expires: '2027-03-01',
        ta_status: 'active',
        contact: 'Mike Torres',
        contact_email: 'mtorres@cybershield.com',
        past_wins: 5,
        past_losses: 2,
        notes: 'Go-to security partner for DoD work',
        health_score: 88
      },
      {
        id: 4,
        name: 'DataVault Analytics',
        type: 'teaming',
        relationship: 'cautious',
        set_aside: 'WOSB',
        capabilities: ['Data Analytics', 'Machine Learning', 'Tableau'],
        work_share: 0,
        nda_status: 'expired',
        nda_expires: '2025-12-31',
        ta_status: 'none',
        contact: 'Lisa Park',
        contact_email: 'lpark@datavault.com',
        past_wins: 0,
        past_losses: 1,
        notes: 'Previously competed against us on CMS contract',
        health_score: 45
      },
      {
        id: 5,
        name: 'GovCloud Experts',
        type: 'subcontractor',
        relationship: 'strong',
        set_aside: null,
        capabilities: ['AWS GovCloud', 'Azure Government', 'FedRAMP'],
        work_share: 10,
        nda_status: 'active',
        nda_expires: '2027-09-30',
        ta_status: 'active',
        contact: 'David Kim',
        contact_email: 'dkim@govcloudexp.com',
        past_wins: 4,
        past_losses: 1,
        notes: 'Premium rates but excellent cloud expertise',
        health_score: 85
      }
    ];

    const RELATIONSHIP_CONFIG = {
      strong: { color: 'emerald', label: 'Strong', icon: '💪' },
      developing: { color: 'blue', label: 'Developing', icon: '🌱' },
      cautious: { color: 'amber', label: 'Cautious', icon: '⚠️' },
      strained: { color: 'red', label: 'Strained', icon: '🔴' }
    };

    const SET_ASIDE_BADGES = {
      'SDVOSB': { color: 'purple', label: 'SDVOSB' },
      '8(a)': { color: 'blue', label: '8(a)' },
      'HUBZone': { color: 'emerald', label: 'HUBZone' },
      'WOSB': { color: 'pink', label: 'WOSB' },
      'EDWOSB': { color: 'rose', label: 'EDWOSB' }
    };

    // ============================================
    // COMPONENTS
    // ============================================

    // Stats Summary
    const StatsSummary = ({ partners }) => {
      const totalWorkShare = partners.reduce((sum, p) => sum + (p.work_share || 0), 0);
      const activeNDAs = partners.filter(p => p.nda_status === 'active').length;
      const activeTAs = partners.filter(p => p.ta_status === 'active').length;
      const avgHealth = Math.round(partners.reduce((sum, p) => sum + p.health_score, 0) / partners.length);

      return (
        <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
          {[
            { label: 'Total Partners', value: partners.length, color: 'cyan', icon: '🤝' },
            { label: 'Work Share', value: `${totalWorkShare}%`, color: 'purple', icon: '📊' },
            { label: 'Active NDAs', value: activeNDAs, color: 'emerald', icon: '📜' },
            { label: 'Active TAs', value: activeTAs, color: 'blue', icon: '✍️' },
            { label: 'Avg Health', value: `${avgHealth}%`, color: avgHealth >= 80 ? 'emerald' : avgHealth >= 60 ? 'amber' : 'red', icon: '❤️' }
          ].map(({ label, value, color, icon }) => (
            <div key={label} className="glass rounded-lg p-4 border border-slate-700/50">
              <div className="flex items-center gap-2 mb-1">
                <span>{icon}</span>
                <p className="text-xs text-slate-400">{label}</p>
              </div>
              <p className={`text-2xl font-bold text-${color}-400`}>{value}</p>
            </div>
          ))}
        </div>
      );
    };

    // Partner Card
    const PartnerCard = ({ partner, expanded, onToggle, onEdit }) => {
      const relationship = RELATIONSHIP_CONFIG[partner.relationship];
      const setAside = partner.set_aside ? SET_ASIDE_BADGES[partner.set_aside] : null;
      const ndaExpiring = partner.nda_status === 'active' && new Date(partner.nda_expires) < new Date(Date.now() + 90 * 24 * 60 * 60 * 1000);

      return (
        <div className={`glass rounded-xl border border-slate-700/50 overflow-hidden ${partner.health_score < 50 ? 'border-l-4 border-l-red-500' : ''}`}>
          {/* Header */}
          <div 
            className="p-4 cursor-pointer hover:bg-slate-800/30 transition-colors"
            onClick={onToggle}
          >
            <div className="flex items-start justify-between">
              <div className="flex items-start gap-3">
                <div className={`w-12 h-12 rounded-lg bg-${relationship.color}-500/20 flex items-center justify-center text-2xl`}>
                  {relationship.icon}
                </div>
                <div>
                  <div className="flex items-center gap-2 mb-1">
                    <h3 className="font-semibold text-white">{partner.name}</h3>
                    {setAside && (
                      <span className={`px-2 py-0.5 rounded text-xs bg-${setAside.color}-500/20 text-${setAside.color}-400`}>
                        {setAside.label}
                      </span>
                    )}
                  </div>
                  <p className="text-sm text-slate-400">{partner.type === 'subcontractor' ? 'Subcontractor' : 'Teaming Partner'}</p>
                  <div className="flex items-center gap-3 mt-2 text-xs text-slate-500">
                    <span className={`text-${relationship.color}-400`}>{relationship.label}</span>
                    <span>•</span>
                    <span>{partner.work_share}% work share</span>
                    <span>•</span>
                    <span>{partner.past_wins}W / {partner.past_losses}L</span>
                  </div>
                </div>
              </div>
              
              {/* Health Score */}
              <div className="text-right">
                <div className="flex items-center gap-2">
                  <span className={`text-2xl font-bold ${
                    partner.health_score >= 80 ? 'text-emerald-400' : 
                    partner.health_score >= 60 ? 'text-amber-400' : 'text-red-400'
                  }`}>
                    {partner.health_score}
                  </span>
                  <span className="text-xs text-slate-500">health</span>
                </div>
                <div className="w-24 h-2 bg-slate-700 rounded-full overflow-hidden mt-1">
                  <div 
                    className={`h-full ${
                      partner.health_score >= 80 ? 'bg-emerald-500' : 
                      partner.health_score >= 60 ? 'bg-amber-500' : 'bg-red-500'
                    }`}
                    style={{ width: `${partner.health_score}%` }}
                  />
                </div>
              </div>
            </div>
          </div>

          {/* Expanded Content */}
          {expanded && (
            <div className="border-t border-slate-700 p-4 bg-slate-900/30 space-y-4">
              {/* Capabilities */}
              <div>
                <h4 className="text-sm font-medium text-slate-400 mb-2">Capabilities</h4>
                <div className="flex flex-wrap gap-2">
                  {partner.capabilities.map((cap, i) => (
                    <span key={i} className="px-3 py-1 bg-slate-800 rounded-full text-sm text-slate-300">
                      {cap}
                    </span>
                  ))}
                </div>
              </div>

              {/* Agreement Status */}
              <div className="grid md:grid-cols-2 gap-4">
                <div className={`p-3 rounded-lg ${
                  partner.nda_status === 'active' ? 'bg-emerald-500/10 border border-emerald-500/30' : 
                  'bg-red-500/10 border border-red-500/30'
                }`}>
                  <div className="flex items-center justify-between">
                    <span className="text-sm font-medium">NDA Status</span>
                    <span className={partner.nda_status === 'active' ? 'text-emerald-400' : 'text-red-400'}>
                      {partner.nda_status === 'active' ? '✓ Active' : '✕ Expired'}
                    </span>
                  </div>
                  {partner.nda_status === 'active' && (
                    <p className={`text-xs mt-1 ${ndaExpiring ? 'text-amber-400' : 'text-slate-500'}`}>
                      {ndaExpiring ? '⚠️ ' : ''}Expires: {new Date(partner.nda_expires).toLocaleDateString()}
                    </p>
                  )}
                </div>

                <div className={`p-3 rounded-lg ${
                  partner.ta_status === 'active' ? 'bg-emerald-500/10 border border-emerald-500/30' : 
                  partner.ta_status === 'pending' ? 'bg-amber-500/10 border border-amber-500/30' :
                  'bg-slate-500/10 border border-slate-500/30'
                }`}>
                  <div className="flex items-center justify-between">
                    <span className="text-sm font-medium">Teaming Agreement</span>
                    <span className={
                      partner.ta_status === 'active' ? 'text-emerald-400' : 
                      partner.ta_status === 'pending' ? 'text-amber-400' : 'text-slate-400'
                    }>
                      {partner.ta_status === 'active' ? '✓ Active' : 
                       partner.ta_status === 'pending' ? '⏳ Pending' : '— None'}
                    </span>
                  </div>
                </div>
              </div>

              {/* Contact Info */}
              <div className="flex items-center gap-6 text-sm">
                <div>
                  <span className="text-slate-500">Contact: </span>
                  <span className="text-white">{partner.contact}</span>
                </div>
                <div>
                  <span className="text-slate-500">Email: </span>
                  <a href={`mailto:${partner.contact_email}`} className="text-cyan-400 hover:underline">
                    {partner.contact_email}
                  </a>
                </div>
              </div>

              {/* Notes */}
              {partner.notes && (
                <div className="bg-slate-800/50 rounded-lg p-3">
                  <p className="text-sm text-slate-300">💡 {partner.notes}</p>
                </div>
              )}

              {/* Actions */}
              <div className="flex gap-2">
                <button className="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg text-sm transition-colors">
                  📧 Contact
                </button>
                <button className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm transition-colors">
                  ✏️ Edit
                </button>
                <button className="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm transition-colors">
                  📜 View Agreements
                </button>
              </div>
            </div>
          )}
        </div>
      );
    };

    // Work Share Chart
    const WorkShareChart = ({ partners }) => {
      const withShare = partners.filter(p => p.work_share > 0).sort((a, b) => b.work_share - a.work_share);
      const primeShare = 100 - partners.reduce((sum, p) => sum + (p.work_share || 0), 0);
      const colors = ['cyan', 'purple', 'emerald', 'amber', 'pink', 'blue'];

      return (
        <div className="glass rounded-xl border border-slate-700/50 p-6">
          <h3 className="font-semibold text-white mb-4">Work Share Distribution</h3>
          
          {/* Bar */}
          <div className="h-8 rounded-lg overflow-hidden flex mb-4">
            <div className="bg-slate-600 flex items-center justify-center text-xs font-medium" style={{ width: `${primeShare}%` }}>
              MMT {primeShare}%
            </div>
            {withShare.map((p, i) => (
              <div 
                key={p.id}
                className={`bg-${colors[i % colors.length]}-500 flex items-center justify-center text-xs font-medium`}
                style={{ width: `${p.work_share}%` }}
                title={`${p.name}: ${p.work_share}%`}
              >
                {p.work_share >= 8 ? `${p.work_share}%` : ''}
              </div>
            ))}
          </div>

          {/* Legend */}
          <div className="flex flex-wrap gap-3 text-xs">
            <div className="flex items-center gap-2">
              <div className="w-3 h-3 rounded bg-slate-600"></div>
              <span className="text-slate-300">Mission Meets Tech ({primeShare}%)</span>
            </div>
            {withShare.map((p, i) => (
              <div key={p.id} className="flex items-center gap-2">
                <div className={`w-3 h-3 rounded bg-${colors[i % colors.length]}-500`}></div>
                <span className="text-slate-300">{p.name} ({p.work_share}%)</span>
              </div>
            ))}
          </div>

          {/* Compliance Check */}
          {primeShare >= 50 ? (
            <div className="mt-4 px-3 py-2 bg-emerald-500/10 border border-emerald-500/30 rounded-lg text-sm text-emerald-400">
              ✓ FAR 52.219-14 Compliant: Prime performing {primeShare}% (minimum 50%)
            </div>
          ) : (
            <div className="mt-4 px-3 py-2 bg-red-500/10 border border-red-500/30 rounded-lg text-sm text-red-400">
              ✕ FAR 52.219-14 Non-Compliant: Prime performing {primeShare}% (minimum 50% required)
            </div>
          )}
        </div>
      );
    };

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [partners, setPartners] = React.useState(DEMO_PARTNERS);
      const [expandedId, setExpandedId] = React.useState(null);
      const [filter, setFilter] = React.useState('all');
      const [search, setSearch] = React.useState('');
      const [connected, setConnected] = React.useState(false);
      const [loading, setLoading] = React.useState(true);

      React.useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        try {
          const { data } = await supabase.from('teaming_partners').select('*').order('name');
          if (data?.length > 0) {
            setPartners(data);
            setConnected(true);
          }
        } catch (e) {
          console.log('Using demo data');
        } finally {
          setLoading(false);
        }
      };

      const filteredPartners = partners.filter(p => {
        if (filter === 'subcontractor' && p.type !== 'subcontractor') return false;
        if (filter === 'teaming' && p.type !== 'teaming') return false;
        if (filter === 'nda_expiring') {
          const expiring = p.nda_status === 'active' && new Date(p.nda_expires) < new Date(Date.now() + 90 * 24 * 60 * 60 * 1000);
          if (!expiring) return false;
        }
        if (search && !p.name.toLowerCase().includes(search.toLowerCase())) return false;
        return true;
      });

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-16 h-16 border-4 border-purple-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-slate-400">Loading Partner Network...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <a href="missionpulse-dashboard-v3.html" className="p-2 hover:bg-slate-700/50 rounded-lg">← Back</a>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-purple-500 to-pink-600 flex items-center justify-center">🤝</div>
                  <div>
                    <h1 className="text-xl font-bold text-white">Frenemy Protocol</h1>
                    <p className="text-xs text-slate-400">Teaming Partner Management</p>
                  </div>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <button className="px-4 py-2 bg-purple-600 hover:bg-purple-500 rounded-lg text-sm font-medium">
                  + Add Partner
                </button>
                <div className={`px-3 py-1 rounded-full text-xs ${connected ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                  {connected ? '● Connected' : '○ Demo'}
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8 space-y-6">
            {/* Stats */}
            <StatsSummary partners={partners} />

            {/* Work Share Chart */}
            <WorkShareChart partners={partners} />

            {/* Filters */}
            <div className="flex flex-col md:flex-row gap-4">
              <div className="flex gap-2">
                {[
                  { id: 'all', label: 'All Partners' },
                  { id: 'subcontractor', label: 'Subcontractors' },
                  { id: 'teaming', label: 'Teaming' },
                  { id: 'nda_expiring', label: '⚠️ NDA Expiring' }
                ].map(f => (
                  <button
                    key={f.id}
                    onClick={() => setFilter(f.id)}
                    className={`px-4 py-2 rounded-lg text-sm transition-colors ${
                      filter === f.id ? 'bg-purple-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'
                    }`}
                  >
                    {f.label}
                  </button>
                ))}
              </div>
              <input
                type="text"
                value={search}
                onChange={(e) => setSearch(e.target.value)}
                placeholder="Search partners..."
                className="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:outline-none focus:border-purple-500"
              />
            </div>

            {/* Partner List */}
            <div className="space-y-4">
              {filteredPartners.map(partner => (
                <PartnerCard
                  key={partner.id}
                  partner={partner}
                  expanded={expandedId === partner.id}
                  onToggle={() => setExpandedId(expandedId === partner.id ? null : partner.id)}
                />
              ))}
              {filteredPartners.length === 0 && (
                <div className="text-center py-12 text-slate-500">
                  No partners match your filters
                </div>
              )}
            </div>
          </main>

          {/* Footer */}
          <footer className="border-t border-slate-800 py-6">
            <div className="max-w-7xl mx-auto px-6 flex justify-between">
              <p className="text-xs text-slate-500">© 2026 Mission Meets Tech</p>
              <p className="text-xs text-slate-600">AI GENERATED - REQUIRES HUMAN REVIEW</p>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
