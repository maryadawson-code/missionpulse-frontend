// AUTH & RBAC CHECK

const checkAuth = () => {
  const session = localStorage.getItem(CONFIG.SESSION_KEY);
  const userStr = localStorage.getItem(CONFIG.USER_KEY);
  if (!session || !userStr) {
    window.location.href = CONFIG.LOGIN_PAGE;
    return null;
  }
  try { return JSON.parse(userStr); }
  catch { window.location.href = CONFIG.LOGIN_PAGE; return null; }
};

const checkRBAC = (userRole) => {
  if (!RBAC.ALLOWED_ROLES.includes(userRole)) {
    // Invisible RBAC - redirect without message
    window.location.href = CONFIG.DASHBOARD_PAGE;
    return false;
  }
  // Audit log
  const auditEntry = {
    timestamp: new Date().toISOString(),
    module: 'blackhat',
    action: 'access',
    role: userRole
  };
  const auditLog = JSON.parse(localStorage.getItem('MP_AUDIT_LOG') || '[]');
  auditLog.push(auditEntry);
  localStorage.setItem('MP_AUDIT_LOG', JSON.stringify(auditLog.slice(-100)));
  return true;
};

const handleLogout = () => { localStorage.clear(); window.location.href = CONFIG.LOGIN_PAGE; };

// ============================================================
// THREAT GAUGE
// ============================================================
function ThreatGauge({ level }) {
  const color = level >= 80 ? '#ef4444' : level >= 60 ? '#f59e0b' : '#22c55e';
  const circumference = 2 * Math.PI * 40;
  const offset = circumference - (level / 100) * circumference;
  
  return (
    <div className="relative w-24 h-24">
      <svg className="w-24 h-24 transform -rotate-90">
        <circle cx="48" cy="48" r="40" stroke="#1e293b" strokeWidth="8" fill="none" />
        <circle 
          cx="48" cy="48" r="40" 
          stroke={color} strokeWidth="8" fill="none"
          strokeDasharray={circumference}
          strokeDashoffset={offset}
          strokeLinecap="round"
          className="transition-all duration-1000"
        />
      </svg>
      <div className="absolute inset-0 flex items-center justify-center">
        <span className="text-2xl font-bold" style={{ color }}>{level}</span>
      </div>
    </div>
  );
}
