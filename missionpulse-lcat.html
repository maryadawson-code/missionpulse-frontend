<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LCAT Manager | MissionPulse</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #00050F; min-height: 100vh; }
    .glass { background: rgba(0, 229, 250, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 229, 250, 0.1); }
    .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
    .cui-banner { background: linear-gradient(90deg, rgba(245, 158, 11, 0.1) 0%, rgba(245, 158, 11, 0.05) 100%); border: 1px solid rgba(245, 158, 11, 0.3); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Demo LCAT data
    const DEMO_LCATS = [
      { id: 1, code: 'PM-III', title: 'Program Manager III', minYrs: 12, education: "Master's", hourlyRate: 185.50, gsaRate: 192.00, burden: 1.45, status: 'approved', lastUpdated: '2025-01-15' },
      { id: 2, code: 'PM-II', title: 'Program Manager II', minYrs: 8, education: "Bachelor's", hourlyRate: 155.00, gsaRate: 160.00, burden: 1.45, status: 'approved', lastUpdated: '2025-01-15' },
      { id: 3, code: 'SA-III', title: 'Systems Architect III', minYrs: 10, education: "Master's", hourlyRate: 175.00, gsaRate: 180.00, burden: 1.42, status: 'approved', lastUpdated: '2025-01-15' },
      { id: 4, code: 'SA-II', title: 'Systems Architect II', minYrs: 6, education: "Bachelor's", hourlyRate: 145.00, gsaRate: 150.00, burden: 1.42, status: 'approved', lastUpdated: '2025-01-15' },
      { id: 5, code: 'SWE-III', title: 'Software Engineer III', minYrs: 8, education: "Bachelor's", hourlyRate: 165.00, gsaRate: 170.00, burden: 1.40, status: 'approved', lastUpdated: '2025-01-15' },
      { id: 6, code: 'SWE-II', title: 'Software Engineer II', minYrs: 4, education: "Bachelor's", hourlyRate: 125.00, gsaRate: 130.00, burden: 1.40, status: 'approved', lastUpdated: '2025-01-15' },
      { id: 7, code: 'SWE-I', title: 'Software Engineer I', minYrs: 2, education: "Bachelor's", hourlyRate: 95.00, gsaRate: 100.00, burden: 1.40, status: 'pending', lastUpdated: '2025-02-01' },
      { id: 8, code: 'BA-II', title: 'Business Analyst II', minYrs: 5, education: "Bachelor's", hourlyRate: 115.00, gsaRate: 120.00, burden: 1.38, status: 'approved', lastUpdated: '2025-01-15' },
      { id: 9, code: 'CYBER-III', title: 'Cybersecurity Engineer III', minYrs: 10, education: "Master's + CISSP", hourlyRate: 195.00, gsaRate: 200.00, burden: 1.48, status: 'approved', lastUpdated: '2025-01-15' },
      { id: 10, code: 'CYBER-II', title: 'Cybersecurity Engineer II', minYrs: 6, education: "Bachelor's + Sec+", hourlyRate: 155.00, gsaRate: 160.00, burden: 1.48, status: 'approved', lastUpdated: '2025-01-15' },
      { id: 11, code: 'DBA-II', title: 'Database Administrator II', minYrs: 5, education: "Bachelor's", hourlyRate: 135.00, gsaRate: 140.00, burden: 1.42, status: 'approved', lastUpdated: '2025-01-15' },
      { id: 12, code: 'CLOUD-III', title: 'Cloud Architect III', minYrs: 10, education: "Master's + AWS/Azure", hourlyRate: 190.00, gsaRate: 195.00, burden: 1.45, status: 'review', lastUpdated: '2025-02-02' },
    ];

    const STATUS_STYLES = {
      approved: { bg: 'bg-emerald-500/20', text: 'text-emerald-400', border: 'border-emerald-500/30' },
      pending: { bg: 'bg-amber-500/20', text: 'text-amber-400', border: 'border-amber-500/30' },
      review: { bg: 'bg-blue-500/20', text: 'text-blue-400', border: 'border-blue-500/30' },
      rejected: { bg: 'bg-red-500/20', text: 'text-red-400', border: 'border-red-500/30' },
    };

    function LCATManager() {
      const [lcats, setLcats] = useState(DEMO_LCATS);
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedLCAT, setSelectedLCAT] = useState(null);
      const [showAddModal, setShowAddModal] = useState(false);

      const filteredLCATs = lcats.filter(lcat => {
        if (!searchQuery) return true;
        const query = searchQuery.toLowerCase();
        return lcat.code.toLowerCase().includes(query) ||
               lcat.title.toLowerCase().includes(query);
      });

      const stats = {
        total: lcats.length,
        approved: lcats.filter(l => l.status === 'approved').length,
        pending: lcats.filter(l => l.status === 'pending' || l.status === 'review').length,
        avgRate: (lcats.reduce((sum, l) => sum + l.hourlyRate, 0) / lcats.length).toFixed(2),
      };

      const formatCurrency = (value) => `$${value.toFixed(2)}`;

      const getRateComparison = (rate, gsaRate) => {
        const diff = ((gsaRate - rate) / gsaRate * 100).toFixed(1);
        if (diff > 0) return { text: `${diff}% below GSA`, color: 'text-emerald-400' };
        if (diff < 0) return { text: `${Math.abs(diff)}% above GSA`, color: 'text-red-400' };
        return { text: 'At GSA rate', color: 'text-slate-400' };
      };

      return (
        <div className="min-h-screen bg-[#00050F]">
          {/* CUI Banner */}
          <div className="cui-banner px-6 py-2 text-center">
            <span className="text-amber-400 text-sm font-medium">⚠️ CUI // SP-PRVCY // CONTROLLED UNCLASSIFIED INFORMATION - Pricing Data</span>
          </div>

          {/* Header */}
          <header className="glass border-b border-slate-700/50 sticky top-0 z-50">
            <div className="max-w-[1800px] mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <a href="missionpulse-nav-hub.html" className="text-slate-400 hover:text-white transition-colors">
                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
                    </svg>
                  </a>
                  <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center">
                    <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold text-white">LCAT Manager</h1>
                    <p className="text-xs text-emerald-400">Labor Category Rate Administration</p>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <button className="px-4 py-2 bg-slate-800/50 border border-slate-700 rounded-lg text-sm text-slate-300 hover:border-cyan-500/50 transition-all">
                    Import GSA Schedule
                  </button>
                  <button 
                    onClick={() => setShowAddModal(true)}
                    className="px-4 py-2 bg-gradient-to-r from-cyan-500 to-teal-500 text-white text-sm font-medium rounded-lg hover:from-cyan-400 hover:to-teal-400 transition-all"
                  >
                    + Add LCAT
                  </button>
                </div>
              </div>
            </div>
          </header>

          <div className="max-w-[1800px] mx-auto px-6 py-8">
            {/* Stats */}
            <div className="grid grid-cols-4 gap-4 mb-6">
              <div className="glass-card rounded-xl p-4">
                <p className="text-sm text-slate-400 mb-1">Total LCATs</p>
                <p className="text-2xl font-bold text-white">{stats.total}</p>
              </div>
              <div className="glass-card rounded-xl p-4">
                <p className="text-sm text-slate-400 mb-1">Approved</p>
                <p className="text-2xl font-bold text-emerald-400">{stats.approved}</p>
              </div>
              <div className="glass-card rounded-xl p-4">
                <p className="text-sm text-slate-400 mb-1">Pending Review</p>
                <p className="text-2xl font-bold text-amber-400">{stats.pending}</p>
              </div>
              <div className="glass-card rounded-xl p-4">
                <p className="text-sm text-slate-400 mb-1">Avg Hourly Rate</p>
                <p className="text-2xl font-bold text-cyan-400">${stats.avgRate}</p>
              </div>
            </div>

            {/* Search */}
            <div className="flex items-center gap-4 mb-6">
              <div className="relative flex-1 max-w-md">
                <svg className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input
                  type="text"
                  placeholder="Search by code or title..."
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="w-full pl-12 pr-4 py-2.5 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500/50"
                />
              </div>
            </div>

            {/* LCAT Table */}
            <div className="glass-card rounded-xl overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead className="bg-slate-800/50">
                    <tr>
                      <th className="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase">Code</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase">Title</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase">Min Years</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase">Education</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase">Hourly Rate</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase">GSA Rate</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase">Comparison</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase">Burden</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase">Status</th>
                      <th className="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase">Actions</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-700/50">
                    {filteredLCATs.map(lcat => {
                      const comparison = getRateComparison(lcat.hourlyRate, lcat.gsaRate);
                      return (
                        <tr key={lcat.id} className="hover:bg-slate-800/30 transition-colors">
                          <td className="px-4 py-3 text-sm font-mono text-cyan-400 font-medium">{lcat.code}</td>
                          <td className="px-4 py-3 text-sm text-white">{lcat.title}</td>
                          <td className="px-4 py-3 text-sm text-slate-300">{lcat.minYrs}+</td>
                          <td className="px-4 py-3 text-sm text-slate-300">{lcat.education}</td>
                          <td className="px-4 py-3 text-sm text-white font-medium">{formatCurrency(lcat.hourlyRate)}</td>
                          <td className="px-4 py-3 text-sm text-slate-400">{formatCurrency(lcat.gsaRate)}</td>
                          <td className="px-4 py-3 text-sm">
                            <span className={comparison.color}>{comparison.text}</span>
                          </td>
                          <td className="px-4 py-3 text-sm text-slate-300">{lcat.burden}x</td>
                          <td className="px-4 py-3">
                            <span className={`px-2 py-1 text-xs font-medium rounded-full ${STATUS_STYLES[lcat.status].bg} ${STATUS_STYLES[lcat.status].text} border ${STATUS_STYLES[lcat.status].border}`}>
                              {lcat.status.toUpperCase()}
                            </span>
                          </td>
                          <td className="px-4 py-3">
                            <div className="flex items-center gap-2">
                              <button 
                                onClick={() => setSelectedLCAT(lcat)}
                                className="p-1.5 rounded-lg hover:bg-slate-700/50 text-slate-400 hover:text-white transition-colors"
                              >
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                                </svg>
                              </button>
                              <button className="p-1.5 rounded-lg hover:bg-slate-700/50 text-slate-400 hover:text-red-400 transition-colors">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                              </button>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Rate Guidance */}
            <div className="mt-6 glass-card rounded-xl p-6">
              <h3 className="text-lg font-semibold text-white mb-4">Rate Guidance</h3>
              <div className="grid grid-cols-3 gap-6">
                <div>
                  <h4 className="text-sm font-medium text-slate-400 mb-2">GSA Schedule Alignment</h4>
                  <p className="text-sm text-slate-300">Rates should be at or below GSA MAS Schedule rates. Current compliance: <span className="text-emerald-400">92%</span></p>
                </div>
                <div>
                  <h4 className="text-sm font-medium text-slate-400 mb-2">Burden Rate Formula</h4>
                  <p className="text-sm text-slate-300">Loaded Rate = Base × Burden × Profit Margin (typically 1.38-1.50x base rate)</p>
                </div>
                <div>
                  <h4 className="text-sm font-medium text-slate-400 mb-2">Last Updated</h4>
                  <p className="text-sm text-slate-300">Rate table last refreshed: <span className="text-cyan-400">January 15, 2025</span></p>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<LCATManager />);
  </script>
</body>
</html>
