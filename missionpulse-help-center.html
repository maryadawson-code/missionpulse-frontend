<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Center - MissionPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyan: { 400: '#00E5FA', 500: '#00C4D4', 600: '#00A3B4' },
                        navy: { 900: '#00050F', 800: '#000A1A', 700: '#001025' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: linear-gradient(135deg, #00050F 0%, #001025 50%, #00050F 100%); }
        .glass { background: rgba(0, 229, 250, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 250, 0.1); }
    </style>
</head>
<body class="min-h-screen text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = 'https://djuviwarqdvlbgcfuupa.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdXZpd2FycWR2bGJnY2Z1dXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc4MzQ0NjIsImV4cCI6MjA1MzQxMDQ2Mn0.zKdMYwjn6Gj9p1fY-4kWxLsYwBvmFg6I9-OxFJJx-V4';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const DEMO_ARTICLES = [
            { id: '1', category: 'getting_started', title: 'Welcome to MissionPulse', slug: 'welcome', summary: 'Get started with your proposal management journey', content: 'MissionPulse is your comprehensive proposal management platform designed specifically for federal contractors. This guide will help you navigate the core features and get your first opportunity set up quickly.\n\nKey Features:\n• Pipeline Management - Track opportunities from identification through award\n• War Room - Real-time collaboration for active proposals\n• Compliance Tracking - Monitor FAR/DFARS requirements\n• AI-Powered Analysis - RFP shredding and competitive intelligence\n• Team Coordination - Role-based access and task management', tags: ['beginner', 'overview'], view_count: 1250, is_featured: true },
            { id: '2', category: 'getting_started', title: 'Quick Start Guide', slug: 'quick-start', summary: 'Set up your first opportunity in 5 minutes', content: 'Follow these simple steps to create your first opportunity:\n\n1. Navigate to the Pipeline page from the main dashboard\n2. Click "Add Opportunity" in the top right corner\n3. Enter the basic details: title, agency, and contract value\n4. Set the submission deadline\n5. Assign team members to their roles\n\nOnce created, you can expand the opportunity with requirements, compliance items, and pricing data.', tags: ['beginner', 'setup'], view_count: 890, is_featured: true },
            { id: '3', category: 'proposals', title: 'Using the RFP Shredder', slug: 'rfp-shredder', summary: 'AI-powered RFP analysis and requirement extraction', content: 'The RFP Shredder is one of MissionPulse\'s most powerful features. Upload your RFP document and our AI will automatically:\n\n• Extract all requirements (L, M, and PWS sections)\n• Identify compliance obligations\n• Flag key evaluation criteria\n• Generate a preliminary compliance matrix\n• Highlight critical deadlines and milestones\n\nSimply drag and drop your PDF or Word document into the Shredder interface and let the AI do the heavy lifting.', tags: ['ai', 'analysis'], view_count: 650, video_url: 'https://example.com/video1' },
            { id: '4', category: 'proposals', title: 'Managing Compliance Matrix', slug: 'compliance-matrix', summary: 'Track compliance requirements across proposals', content: 'The compliance matrix is your single source of truth for tracking requirements. Each row represents a requirement extracted from the RFP, with columns for:\n\n• Requirement text and section reference\n• Compliance status (Met, Partial, Gap, N/A)\n• Response location in your proposal\n• Assigned owner and due date\n• Notes and clarifications', tags: ['compliance', 'tracking'], view_count: 520 },
            { id: '5', category: 'pricing', title: 'Pricing Module Overview', slug: 'pricing-overview', summary: 'Build competitive pricing with BOE support', content: 'The Pricing module supports comprehensive cost volume development including:\n\n• Labor category rate tables\n• Wrap rate calculations\n• ODC and material estimates\n• Subcontractor pricing\n• Basis of Estimate (BOE) narratives\n• Cost realism analysis\n\nAll pricing data is marked as CUI and restricted to authorized personnel only.', tags: ['pricing', 'boe'], view_count: 480 },
            { id: '6', category: 'compliance', title: 'CMMC 2.0 Requirements', slug: 'cmmc-requirements', summary: 'Prepare for CMMC certification', content: 'MissionPulse is designed to help you maintain CMMC 2.0 Level 2 compliance. Key features include:\n\n• CUI marking and handling controls\n• Access logging and audit trails\n• Role-based access control (RBAC)\n• Encryption in transit and at rest\n• Partner access restrictions with auto-revocation\n\nOur compliance dashboard shows your current posture across all 110 NIST 800-171 controls.', tags: ['cmmc', 'security'], view_count: 890, is_featured: true },
            { id: '7', category: 'team', title: 'Role-Based Access Control', slug: 'rbac', summary: 'Configure team permissions and access', content: 'MissionPulse supports 11 distinct roles:\n\n• CEO - Final Go/No-Go decisions\n• COO - Capture oversight\n• CAP - Win strategy (Capture Manager)\n• PM - Schedule management\n• SA - Technical approach\n• FIN - Pricing (CUI access)\n• CON - FAR/DFARS compliance\n• DEL - Staffing and delivery\n• QA - Quality assurance\n• Partner - Limited teaming access\n• Admin - System administration\n\nEach role has specific permissions that determine what features and data they can access.', tags: ['security', 'team'], view_count: 380 },
            { id: '8', category: 'integrations', title: 'Microsoft 365 Integration', slug: 'ms365-integration', summary: 'Connect SharePoint and Teams', content: 'Connect MissionPulse to your Microsoft 365 environment for seamless document management:\n\n1. Go to Settings > Integrations\n2. Click "Connect Microsoft 365"\n3. Sign in with your organizational account\n4. Grant the requested permissions\n5. Select which SharePoint sites to sync\n\nOnce connected, documents will automatically sync between MissionPulse and your designated SharePoint libraries.', tags: ['integrations', 'microsoft'], view_count: 410 },
            { id: '9', category: 'faq', title: 'Frequently Asked Questions', slug: 'faq', summary: 'Common questions and answers', content: 'Q: How do I reset my password?\nA: Click "Forgot Password" on the login screen or go to Settings > Security.\n\nQ: Can I export my data?\nA: Yes, use the Reports module to export data in PDF, Excel, or CSV formats.\n\nQ: How do I add team members?\nA: Go to Settings > Team Management (Admin role required).\n\nQ: Is my data secure?\nA: Yes, we use AES-256 encryption and follow NIST 800-171 guidelines.', tags: ['faq', 'help'], view_count: 1100 }
        ];

        const CATEGORIES = [
            { id: 'getting_started', name: 'Getting Started', icon: 'fa-rocket', color: 'cyan' },
            { id: 'proposals', name: 'Proposals', icon: 'fa-file-alt', color: 'blue' },
            { id: 'compliance', name: 'Compliance', icon: 'fa-shield-alt', color: 'green' },
            { id: 'pricing', name: 'Pricing', icon: 'fa-dollar-sign', color: 'yellow' },
            { id: 'team', name: 'Team & Access', icon: 'fa-users', color: 'purple' },
            { id: 'integrations', name: 'Integrations', icon: 'fa-plug', color: 'pink' },
            { id: 'faq', name: 'FAQ', icon: 'fa-question-circle', color: 'orange' }
        ];

        function HelpCenter() {
            const [articles, setArticles] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [selectedArticle, setSelectedArticle] = useState(null);
            const [feedback, setFeedback] = useState({});

            useEffect(() => {
                loadArticles();
            }, []);

            async function loadArticles() {
                try {
                    const { data, error } = await supabase.from('help_articles').select('*').eq('is_published', true).order('view_count', { ascending: false });
                    if (error) throw error;
                    setArticles(data?.length ? data : DEMO_ARTICLES);
                } catch (err) {
                    console.log('Using demo data:', err.message);
                    setArticles(DEMO_ARTICLES);
                }
                setLoading(false);
            }

            const filteredArticles = articles.filter(article => {
                const matchesSearch = !searchQuery || article.title.toLowerCase().includes(searchQuery.toLowerCase()) || article.summary?.toLowerCase().includes(searchQuery.toLowerCase());
                const matchesCategory = !selectedCategory || article.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            const featuredArticles = articles.filter(a => a.is_featured);
            const popularArticles = [...articles].sort((a, b) => b.view_count - a.view_count).slice(0, 5);

            if (selectedArticle) {
                return (
                    <div className="min-h-screen p-6">
                        <div className="max-w-4xl mx-auto">
                            <button onClick={() => setSelectedArticle(null)} className="flex items-center gap-2 text-cyan-400 hover:text-cyan-300 mb-6">
                                <i className="fas fa-arrow-left"></i><span>Back to Help Center</span>
                            </button>
                            <div className="glass rounded-xl p-6 mb-6">
                                <div className="flex items-center gap-2 text-sm text-gray-400 mb-3">
                                    <span className="px-2 py-1 bg-cyan-500/20 text-cyan-400 rounded">{CATEGORIES.find(c => c.id === selectedArticle.category)?.name}</span>
                                    <span>•</span><span>{selectedArticle.view_count} views</span>
                                    {selectedArticle.video_url && (<><span>•</span><span className="text-cyan-400"><i className="fas fa-video mr-1"></i>Video</span></>)}
                                </div>
                                <h1 className="text-3xl font-bold mb-3">{selectedArticle.title}</h1>
                                <p className="text-gray-300 text-lg">{selectedArticle.summary}</p>
                            </div>
                            <div className="glass rounded-xl p-6 mb-6">
                                <div className="prose prose-invert max-w-none">
                                    <p className="text-gray-300 leading-relaxed whitespace-pre-wrap">{selectedArticle.content}</p>
                                </div>
                                {selectedArticle.tags?.length > 0 && (
                                    <div className="mt-6 flex items-center gap-2">
                                        <span className="text-gray-400 text-sm">Tags:</span>
                                        {selectedArticle.tags.map(tag => (<span key={tag} className="px-2 py-1 bg-gray-700 text-gray-300 text-xs rounded">{tag}</span>))}
                                    </div>
                                )}
                            </div>
                            <div className="glass rounded-xl p-6">
                                <h3 className="font-medium mb-4">Was this article helpful?</h3>
                                {feedback[selectedArticle.id] !== undefined ? (
                                    <p className="text-green-400"><i className="fas fa-check mr-2"></i>Thanks for your feedback!</p>
                                ) : (
                                    <div className="flex gap-3">
                                        <button onClick={() => setFeedback(prev => ({ ...prev, [selectedArticle.id]: true }))} className="px-4 py-2 bg-green-500/20 text-green-400 rounded-lg hover:bg-green-500/30"><i className="fas fa-thumbs-up mr-2"></i>Yes</button>
                                        <button onClick={() => setFeedback(prev => ({ ...prev, [selectedArticle.id]: false }))} className="px-4 py-2 bg-red-500/20 text-red-400 rounded-lg hover:bg-red-500/30"><i className="fas fa-thumbs-down mr-2"></i>No</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-6">
                    <div className="max-w-6xl mx-auto mb-8">
                        <div className="flex items-center justify-between mb-6">
                            <div className="flex items-center gap-4">
                                <a href="index.html" className="text-cyan-400 hover:text-cyan-300"><i className="fas fa-arrow-left"></i></a>
                                <div><h1 className="text-3xl font-bold">Help Center</h1><p className="text-gray-400">Find answers and learn how to use MissionPulse</p></div>
                            </div>
                            <a href="mailto:support@missionmeetstech.com" className="px-4 py-2 glass rounded-lg text-cyan-400 hover:bg-cyan-500/20"><i className="fas fa-envelope mr-2"></i>Contact Support</a>
                        </div>
                        <div className="glass rounded-xl p-6 mb-8">
                            <div className="relative max-w-2xl mx-auto">
                                <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                <input type="text" placeholder="Search help articles..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full bg-navy-800 border border-cyan-500/30 rounded-lg pl-12 pr-4 py-4 text-lg focus:outline-none focus:border-cyan-400" />
                            </div>
                        </div>
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-7 gap-3 mb-8">
                            {CATEGORIES.map(cat => (
                                <button key={cat.id} onClick={() => setSelectedCategory(selectedCategory === cat.id ? null : cat.id)} className={`glass rounded-lg p-4 text-center transition-all ${selectedCategory === cat.id ? 'border-cyan-400 bg-cyan-500/20' : 'hover:bg-cyan-500/10'}`}>
                                    <i className={`fas ${cat.icon} text-2xl mb-2 text-cyan-400`}></i>
                                    <div className="text-sm">{cat.name}</div>
                                    <div className="text-xs text-gray-500 mt-1">{articles.filter(a => a.category === cat.id).length} articles</div>
                                </button>
                            ))}
                        </div>
                    </div>
                    <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 space-y-6">
                            {!searchQuery && !selectedCategory && featuredArticles.length > 0 && (
                                <div className="glass rounded-xl p-6">
                                    <h2 className="text-xl font-semibold mb-4"><i className="fas fa-star text-yellow-400 mr-2"></i>Featured</h2>
                                    <div className="space-y-3">
                                        {featuredArticles.map(article => (
                                            <button key={article.id} onClick={() => setSelectedArticle(article)} className="w-full text-left p-4 bg-navy-800/50 rounded-lg hover:bg-cyan-500/10 transition-all">
                                                <div className="flex items-start justify-between">
                                                    <div><h3 className="font-medium">{article.title}</h3><p className="text-sm text-gray-400 mt-1">{article.summary}</p></div>
                                                    <i className="fas fa-chevron-right text-gray-500"></i>
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}
                            <div className="glass rounded-xl p-6">
                                <h2 className="text-xl font-semibold mb-4">{selectedCategory ? CATEGORIES.find(c => c.id === selectedCategory)?.name : searchQuery ? `Search Results (${filteredArticles.length})` : 'All Articles'}</h2>
                                {loading ? (<div className="text-center py-12 text-gray-400"><i className="fas fa-spinner fa-spin text-2xl"></i></div>) : filteredArticles.length === 0 ? (
                                    <div className="text-center py-12 text-gray-400"><i className="fas fa-search text-4xl mb-3 opacity-50"></i><p>No articles found</p><button onClick={() => { setSearchQuery(''); setSelectedCategory(null); }} className="mt-3 text-cyan-400 hover:text-cyan-300">Clear filters</button></div>
                                ) : (
                                    <div className="space-y-3">
                                        {filteredArticles.map(article => (
                                            <button key={article.id} onClick={() => setSelectedArticle(article)} className="w-full text-left p-4 bg-navy-800/50 rounded-lg hover:bg-cyan-500/10 transition-all">
                                                <div className="flex items-start justify-between gap-4">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-2 mb-1"><h3 className="font-medium">{article.title}</h3>{article.video_url && (<span className="text-xs text-cyan-400"><i className="fas fa-video"></i></span>)}</div>
                                                        <p className="text-sm text-gray-400">{article.summary}</p>
                                                        <div className="flex items-center gap-3 mt-2 text-xs text-gray-500"><span className="px-2 py-0.5 bg-gray-700 rounded">{CATEGORIES.find(c => c.id === article.category)?.name}</span><span>{article.view_count} views</span></div>
                                                    </div>
                                                    <i className="fas fa-chevron-right text-gray-500 mt-2"></i>
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                        <div className="space-y-6">
                            <div className="glass rounded-xl p-6">
                                <h3 className="font-semibold mb-4"><i className="fas fa-fire text-orange-400 mr-2"></i>Popular Articles</h3>
                                <div className="space-y-3">
                                    {popularArticles.map((article, index) => (
                                        <button key={article.id} onClick={() => setSelectedArticle(article)} className="w-full text-left flex items-center gap-3 p-2 rounded-lg hover:bg-cyan-500/10">
                                            <span className="w-6 h-6 flex items-center justify-center bg-gray-700 text-xs rounded">{index + 1}</span>
                                            <span className="text-sm text-gray-300">{article.title}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="glass rounded-xl p-6 bg-gradient-to-br from-cyan-500/10 to-blue-500/10">
                                <h3 className="font-semibold mb-2">Need More Help?</h3>
                                <p className="text-sm text-gray-400 mb-4">Our support team is here to help you succeed.</p>
                                <a href="mailto:support@missionmeetstech.com" className="block w-full py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg text-center font-medium">Contact Support</a>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<HelpCenter />, document.getElementById('root'));
    </script>
</body>
</html>
